body:
  text: 禮部祠祭清吏司喪禮五一親王以下奉恩將軍以上固倫公主親王福晉以下縣君鄉君以上喪禮崇德年間定和碩親王喪聞輟朝三日遣禮部官視祭葬禮欽賜初祭大祭造墳匠役由工部撥給多羅郡王喪聞輟朝二日多羅貝勒喪聞輟朝一日皆遣禮部官視祭葬禮欽賜初祭大祭造墳匠役由工部撥給固山貝子鎮國公輔國公鎮國將軍輔國將軍奉國將軍喪聞皆遣禮部官視祭葬禮欽賜初祭大祭王貝勒貝子婚娶之子卒遣禮部官致祭又定和碩親王福晉多羅郡王福晉多羅貝勒夫人固山貝子夫人喪聞皆遣禮部官致祭順治九年題準和碩親王喪聞輟朝三日親王以下奉恩將軍以上民公侯伯都統尚書子以下佐領騎都尉以上固倫公主親王福晉以下縣君奉恩將軍恭人以上皆㑹喪府前陳設儀衛備采棺內襯錦段五層府屬官員及護軍校等官以上命婦咸成服至大祭日除服諭祭二次祭文由內院撰給遣禮部官奉至墳讀文祭酒宗人府題請賜諡內院撰給碑文工部立碑建亭給造葬價世子喪聞輟朝二日親王以下奉恩將軍以上民公侯伯都統尚書子以下參領以上固倫公主親王福晉以下縣君奉恩將軍恭人以上皆會喪府前陳設儀衛其采棺斂襯府屬官員及命婦成服除服諭祭二次及題請賜諡給碑文立碑建亭給造葬價等項皆與親王同多羅郡王喪聞輟朝二日一應喪儀與世子同多羅貝勒喪聞輟朝一日世子郡王以下奉恩將軍以上民公侯伯都統尚書子以下副都統侍郎本旗佐領以上和碩公主世子福晉以下縣君奉恩將軍恭人以上皆會喪府前陳設儀衛其采棺斂襯府屬官員及命婦成服除服諭祭二次及題請賜諡給碑文立碑給造葬價等項皆與郡王同惟不建碑亭固山貝子喪聞貝勒以上奉恩將軍以上民公侯伯都統尚書子以下本旗參領郎中以上貝勒夫人以下縣君奉恩將軍恭人以上皆會喪府前陳設儀衛采棺內襯三層府屬官員及命婦成服除服諭祭二次及題請賜諡給碑文立碑給造葬價等項皆與貝勒同鎮國公輔國公喪聞貝子以下奉國將軍以上郡君貝子夫人以下奉恩將軍恭人以上皆會喪府前陳設儀衛其采棺斂襯府屬官員及命婦成服除服諭祭二次及題請賜諡給碑文立碑給造葬價等項皆與貝子同鎮國將軍喪聞輔國公以下奉恩將軍以上皆會喪府前陳設執事朱棺內襯一層賜祭二次諭祭文內院撰給一次遣禮部官送至墳禮部具題候㫖立碑碑文內院撰給石碑工部建立應否與諡宗人府具題請㫖輔國將軍喪聞鎮國將軍以下奉恩將軍以上皆㑹喪府前陳設執事朱棺內襯一層賜祭二次諭祭文內院撰給一次遣禮部官奉至墳禮部具題候㫖立碑碑文內院撰給石碑本家自立今由工部立碑應否與諡宗人府具題請㫖奉國將軍喪聞輔國將軍以下奉恩將軍以上皆會喪府前陳設執事朱棺內襯一層賜祭二次諭祭文內院撰給一次遣禮部官奉至墳上奉恩將軍喪聞陳設執事朱棺內襯一層賜祭二次無祭文王貝勒貝子公婚娶之子卒不遣官致祭許陳鞍馬祭品各如其父例未婚娶幼子不許造墳閒散宗室卒皆得用朱棺內襯一層陳鞍馬致祭又定親王以下祭葬銀牲醴品物多寡有差和碩親王喪備鞍馬十有五匹散馬數亦如之初祭給牛犢一羊八酒九瓶楮帛三萬大祭亦如之造葬工部給銀五千兩初祭禮自備引幡一金銀定七萬並欽賜楮錢七萬饌筵三十一席於欽賜犢一羊八之外再加九羊為二九大祭禮如之百日期年致祭金銀定一萬楮錢一萬羊九饌筵十有五席世子喪鞍馬及散馬各十有四匹初祭給牛犢一羊八酒九瓶楮帛二萬五千大祭如之造葬工部給銀四千兩初祭禮自備引幡一金銀定六萬五千並欽賜楮錢六萬五千饌筵三十席於欽賜犢一羊八之外再加九羊為二九大祭如之百日期年致祭金銀定楮錢各一萬羊九饌筵十有五席多羅郡王喪鞍馬及散馬各十有四匹初祭大祭各給牛犢一羊六酒七瓶楮帛二萬三千造葬工部給銀三千兩初祭禮自備引幡一金銀定六萬並欽賜楮錢六萬饌筵二十五席於欽賜犢一羊六之外再加七羊為二七大祭禮如之百日期年致祭金銀定楮錢各一萬羊七饌筵十有三席多羅貝勒喪鞍馬及散馬各十有三匹初祭大祭各給牛犢一羊四酒五瓶楮帛一萬五千造葬工部給銀二千兩初祭禮自備引幡一金銀定五萬並欽賜楮錢五萬饌筵二十一席於欽賜犢一羊四之外再加五羊共為十大祭禮如之百日期年致祭金銀定楮錢各一萬羊五饌筵十席固山貝子喪鞍馬及散馬各十有二匹初祭大祭各給羊五酒五瓶楮帛一萬造葬工部給銀千兩初祭禮自備引幡一金銀定四萬並欽賜楮錢四萬饌筵十有五席於欽賜五羊之外再加三羊共為八大祭禮如之百日期年致祭金銀定楮錢各八千羊五饌筵八席鎮國公喪鞍馬及散馬各十匹初祭大祭各給羊四酒四瓶楮帛九千工部給造葬銀五百兩初祭禮自備引幡一金銀定三萬並欽賜楮錢三萬饌筵十有五席於欽賜四羊之外再加三羊共為七大祭禮如之百日期年致祭金銀定楮錢各七千羊四饌筵七輔國公喪鞍馬及散馬各八匹初祭大祭各給羊四酒四瓶楮帛八千工部給造葬銀五百兩初祭禮自備引幡一金銀定二萬並欽賜楮錢二萬饌筵十有五席於欽賜四羊之外再加三羊共為七大祭禮如之百日期年致祭金銀定楮錢各六千羊四饌筵七鎮國將軍喪鞍馬七匹初祭大祭各給羊二酒二瓶楮帛五千初祭禮自備引幡一金銀定一萬四千並欽賜楮錢一萬四千饌筵十席於欽賜二羊之外再加三羊共為五大祭禮如之百日期年致祭金銀定楮錢各七千羊三饌筵五輔國將軍喪鞍馬五匹初祭大祭各給羊一酒一瓶楮帛四千初祭禮自備引幡一金銀定萬二千並欽賜楮錢萬二千饌筵八席於欽賜一羊之外再加三羊共為四大祭禮如之百日期年致祭金銀定楮錢各六千羊二饌筵四席奉國將軍喪鞍馬四匹初祭大祭共給羊一酒二瓶楮帛六千初祭禮自備引幡一金銀定楮錢各一萬羊三饌筵六席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各五千羊二饌筵三席奉恩將軍喪鞍馬三匹初祭大祭共給羊一酒二瓶楮帛三千初祭禮自備引幡一金銀定楮錢各八千羊三饌筵五席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各四千羊二饌筵三席又題準王公葬期親王停喪本府候墳院造完日發引期年而葬郡王貝勒停喪本府五月發引七月而葬貝子以下公以上停喪本府三月發引五月而葬其應㑹喪官員必俟斂後始歸其家發引致祭日仍齊集又題準和碩親王福晉喪聞親王以下奉恩將軍以上固倫公主親王福晉以下縣君奉恩將軍恭人以上皆㑹喪府前陳設儀衛采棺內襯五層府屬官員及護軍校等官以上命婦咸成服大祭日除服諭祭一次祭文由內院撰給遣禮部官奉至墳和碩親王側福晉世子福晉喪聞世子郡王以下奉恩將軍以上固倫公主親王福晉以下縣君奉恩將軍恭人以上皆㑹喪府前陳設儀衛其采棺斂襯府屬官員及命婦成服除服諭祭一次皆與親王福晉同世子側福晉多羅郡王福晉喪聞一切喪儀皆與親王側福晉同多羅郡王側福晉多羅貝勒夫人喪聞世子郡王以下奉恩將軍以上和碩公主世子福晉以下縣君奉恩將軍恭人以上皆㑹喪其餘喪儀與世子側福晉同貝勒側夫人貝子夫人喪聞貝勒以下奉恩將軍以上郡主貝勒夫人以下縣君奉恩將軍恭人以上皆會喪府前陳設儀衛采棺內襯三層其餘喪儀與貝勒夫人同固山貝子側夫人鎮國公夫人喪聞貝子以下奉恩將軍以上郡君貝子夫人以下縣君奉恩將軍恭人以上皆㑹喪其餘喪儀與貝子夫人同鎮國公側夫人輔國公夫人喪聞貝子以下奉恩將軍以上貝子夫人縣君以下奉恩將軍恭人以上皆會喪其餘喪儀與貝子側夫人同輔國公側夫人喪聞輔國公以下奉恩將軍以上皆會喪其餘喪儀與鎮國公側夫人同又定親王福晉以下致祭牲醴品物多寡有差和碩親王福晉喪備鞍馬與親王同初祭大祭共給牛犢一羊八酒九瓶楮帛二萬初祭禮自備引幡一金銀定七萬楮錢七萬饌筵三十一席羊十有八大祭禮如之其欽賜牛羊楮帛入額內百日期年致祭金銀定楮錢各萬羊九饌筵十有五席和碩親王側福晉世子福晉喪備鞍馬與親王世子同初祭大祭共給犢牛一羊六酒七瓶楮帛一萬七千初祭禮自備引幡一金銀定六萬楮錢六萬饌筵二十七席羊十有六大祭禮如之其欽賜牛羊楮帛入額內百日期年致祭金銀定楮錢各萬羊七饌筵十有三席世子側福晉多羅郡王福晉喪備鞍馬與世子郡王同初祭大祭共給犢牛一羊六酒七瓶楮帛一萬五千初祭禮自備引幡一金銀定楮錢各六萬羊十有四饌筵二十五席大祭禮如之其欽賜牛羊楮帛入額內百日期年致祭金銀定楮錢各萬羊七饌筵十有二席多羅郡王側福晉多羅貝勒夫人喪備鞍馬與王貝勒同初祭大祭共給羊五酒五瓶楮帛一萬初祭禮自備引幡一金銀定楮錢各五萬羊十饌筵二十席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各萬羊五饌筵十席多羅貝勒側夫人固山貝子夫人喪備鞍馬與貝勒貝子同初祭大祭共給羊三酒三瓶楮帛七千初祭禮自備引幡一金銀定楮錢各四萬羊八饌筵十有五席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各八千羊五饌筵八席固山貝子側夫人鎮國公夫人喪備鞍馬與貝子公同初祭大祭共給羊二酒二瓶楮帛六千初祭禮自備引幡一金銀定楮錢各三萬羊七饌筵十有五席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各七千羊四饌筵七席鎮國公側室輔國公夫人喪備鞍馬與公同初祭大祭共給羊二酒二瓶楮帛五千初祭禮自備引幡一金銀定楮錢各二萬羊七饌筵十有五席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各六千羊四饌筵七席輔國公側室之喪備鞍馬與公同初祭大祭共給羊二酒二瓶楮帛五千初祭禮自備引幡一金銀定楮錢各一萬五千羊六饌筵十有三席大祭禮如之其欽賜羊楮入額內百日期年致祭金銀定楮錢各五千羊三饌筵六席又題準固倫公主喪聞一應喪禮與親王福晉同和碩公主喪禮與世子福晉同郡主喪禮與郡王福晉同縣主喪禮與貝勒夫人同郡君喪禮與貝子夫人同縣君喪禮與鎮國公夫人同鄉君喪禮與輔國公夫人同十二年題準下嫁外藩固倫公主喪聞內院撰給諭祭文遣內大臣侍衛及禮部理藩院官奉送至墳讀文祭酒下嫁外藩和碩公主喪聞內院撰給諭祭文遣侍衛及禮部理藩院官前往至墳讀文祭酒下嫁外藩郡主喪聞遣官讀文致祭與和碩公主同下嫁外藩縣主喪聞內院撰給諭祭文遣禮部理藩院官讀文致祭下嫁外藩郡君喪聞遣禮部理藩院官致祭無祭文下嫁外藩縣君喪聞遣官致祭與郡君同下嫁外藩鄉君喪聞遣官致祭與縣君同康熙四年定親王郡王等由宗人府奏賜諡號貝勒以下入八分公以上應否給諡請㫖遵行九年議準親王以下輔國公以上喪本府屬員具喪服外正紅旗禮親王鑲紅旗肅親王鑲紅旗承澤親王敬謹親王克勤郡王福勒黑公正藍旗饒餘親王豫郡王鑲藍旗鄭親王恪僖貝勒靖寧貝勒顧爾馬洪貝子以上十二支若繫本支所分者本身及府屬官咸具喪服各官命婦如其夫例其非本支王以下公以上或應㑹喪或不應㑹喪而願會喪者皆摘冠纓從官亦如其主例若繫長輩不具喪服者聽凡應㑹喪者入公署用常服辦事至喪家及墳所仍用喪服御前公侯伯內大臣護軍統領護軍參領以上官員及部員不應會喪者奉㫖遣往方許赴喪其餘各旗護軍統領護軍參領護衛各隨本府王等赴喪各官命婦亦隨本府王福晉等赴喪不許私往五十二年議準多羅貝勒生母喪聞喪儀皆如貝勒適夫人例遣禮部官讀文致祭五十四年覆準固倫公主有子孫奏請建碑給諡者準其立碑勒文並給與諡號雍正五年奏準王公致祭停止用牛其犍牛改為蒙古羊三牛犢改為蒙古羊二十三年十一月二十八日諭諸王貝勒貝子公朕維治天下之道首重親親親親之道首在愼終追逺我朝宗室皆太祖太宗後裔自當敦睦友愛豈可視為疏逖宗人府所奏服制一事各分支派殊有未協是以飭令復議嗣恭閲皇祖時皇考所奏摺內裕親王太福晉薨逝時皇祖行圍在外仍令太妃等臨喪令皇考及諸叔亦往成服由此觀之則彼時實存古道後朕叔怡賢親王薨逝皇考遣朕弟兄臨喪並令皇五子成服彼時衆意不過以為格外之恩未有言及理所當然者如此風漸長則將來皇子等皆以倨傲自恣而親親之義勢必泯沒無存朕常於此有深懼焉古人云以父母之心為心則天下無不和之兄弟以祖宗之心為心則天下無不睦之宗族爾諸王貝勒貝子公等惟當以太祖太宗之心為心視國事為家事彼此提撕共臻至善果能如此則朕敦睦親族之懷庶幾可副而祖宗鴻基大業從此貽慶於億萬斯年矣且親族者乃天地之常經必當有久遠不易之則豈可以君上一時之愛憎率意從事嗣後雖朕之子孫若遇近派尊屬薨逝亦當成服除諸王屬下仍照原定支派遵行外諸王貝勒貝子公等如何成服會喪之處必使合乎理節以盡親親之誼其旨內事宜著諸王貝勒貝子公等㑹同詳議具奏欽此遵㫖議準嗣後皇帝子孫照依㑹典所定五等服制遇期服胞伯叔兄弟之事除年幼未分封之皇子皇孫不議外年長者照例具奏再行臨喪既未分出自應停止成服其諸王貝勒貝子公宗室將軍閒散宗室等不論爵次凡近支皆照㑹典所定服制五等遇小功服以上之喪照例會喪成服期服六十日而除大功一月而除小功七日而除遇百日內致祭仍齊集摘冠纓宗人府委官稽察朝祭大典王公皆當侍班應令期服者於大祭日剃頭小功七日大功於出殯後剃頭遇齊戒日暫停前往喪所至親王福晉以下亦照定例準禮部傳令齊集委官稽察如喪家呈部願停止福晉等齊集者準其停止其喪服事宜仍照康熙九年定例遵行乾隆三年奏準期服者令大祭日除服大功服者令初祭日除服小功服者送殯日除服二十一年諭昔日諸王曾經血戰宣力國家諸王之側福晉又皆繫滿洲或蒙古是以定有豫祭之例此後諸王中除賞過側福晉外餘無側福晉者居多經朕降㫖視王等爵秩定例於是王等率皆奏請封立側福晉惟是側福晉若與適福晉一例豫祭殊非體制此本著發還該部嗣後王等側福晉薨逝其應否豫祭之處具奏請㫖即奉㫖豫祭亦不過致祭一次足矣其用祭文之處著永遠停止欽此一外藩喪儀崇德年間定外藩蒙古親王以下喪聞遣官致祭順治十二年題準外藩親王喪聞內院撰給諭祭文遣內大臣侍衛及禮部理藩院官前往奉至墳其親屬率屬員離墳一里跪迎候過隨入讀文祭酒時皆跪禮畢送諭祭官於迎處望闕謝恩行三跪九叩禮已下牲醴品物多寡有差郡王貝勒貝子鎮國公輔國公喪聞內院撰給諭祭文遣侍衛及禮部理藩院官讀文祭酒致祭如前儀一等至四等台吉塔布囊及都統功加達爾漢者卒內院撰給諭祭文遣禮部理藩院官讀文祭酒致祭如前儀其外藩親王以下公以上著有勳勞者建碑優恤特遣大臣侍衛出自聖㫖外藩親王福晉喪聞內院撰給諭祭文遣侍衛及禮部理藩院官讀文致祭如前儀郡王福晉喪聞內院撰給諭祭文遣禮部理藩院官讀文致祭如前儀貝勒夫人貝子夫人公夫人喪聞遣禮部理藩院官致祭無祭文外藩親王福晉以下優加恤典特遣大臣侍衛出自特恩一品官喪禮天聰八年定婦人有願殉夫者止許正妻殉仍行旌表一應妾媵不許殉若妻强逼侍女殉者其妻坐死如違律自殉者夫族兄弟各議罰首人許離本主順治三年酌定喪服之制列圖於律頒行天下九年題準郡主額駙民公以下各官卒陳設執事朱棺內襯一層行初祭大祭禮祭品各按品級多寡不等其父母及命婦未分家子卒一應祭禮各照伊夫伊父品級用庶人卒朱棺內襯一層行初祭大祭禮康熙七年定和碩公主額駙民公以下各官及庶人各增定祭品有差其百日期年常祭照初祭大祭定數減半用九年覆準官民喪儀仍照順治九年題準例行十二年定旗下本主强逼奴婢殉葬者嚴行禁止二十六年諭百行莫大於孝喪禮當自盡其誠近者漢軍居父母之喪親朋聚㑹毫無居喪之體令漢軍都統副都統將居喪演戲飲酒呼盧鬭牌照賭博例嚴行禁止欽此又定凡官員卒於官與官員之父母及妻之喪皆許歸殯於家城門人役不得阻抑雍正元年定凡和碩額駙公品級和碩額駙故采棺內襯三層陳設執事並鞍馬十匹初祭禮祭筵十有五席羊七大祭禮同三等民公故采棺內襯三層陳設執事並鞍馬八匹初祭禮祭筵十有五席羊七大祭禮同侯故朱棺內襯一層陳設執事並鞍馬七匹初祭禮祭筵十有三席羊六大祭禮同伯故朱棺內襯一層陳設執事並鞍馬七匹初祭禮祭筵十有二席羊六大祭禮同一品官故朱棺內襯一層陳設執事並鞍馬六匹初祭禮祭筵十席羊五大祭禮同二品官故朱棺內襯一層陳設執事並鞍馬五匹初祭禮祭筵八席羊四大祭禮同三品官故朱棺內襯一層陳設執事並鞍馬四匹初祭禮祭筵六席羊三大祭禮同四品官故朱棺內襯一層陳設執事並鞍馬三匹初祭禮祭筵五席羊三大祭禮同五品官故朱棺內襯一層並鞍馬二匹初祭禮祭筵四席羊二大祭禮同六品官以下有頂帶官員以上故棺內襯一層鞍馬二匹初祭禮祭筵三席羊二大祭禮同兵民故者棺內襯一層鞍馬一匹初祭禮祭筵二席羊一大祭禮同凡公以下有頂帶官員以上舊例父母妻各照伊子伊夫其未分居之子各照伊父嗣後未分居之子有職銜者仍照本身品級如無職銜者十五歲以上準照伊父品級其祭筵羊數仍減半用餘照舊例行凡公以下有頂帶官員以上周年百日及上墳常祭祭筵羊隻各照定例內減半用庶民常祭亦照定例從減又覆準饋粥乃愼重喪禮因有喪之家不暇飲食故各親族憐愛持饋粥以食之並非筵燕應行令八旗將饋粥為名多備豬羊大設肴饌之處嚴行禁止倘有此等該旗察出即行題參從重治罪又定斂衣官民故者前後斂衣共五襲又定官民人等出殯除量造紙劄車馬轎樓庫外其餘竒巧臺閣等項槩行禁止鞍馬衣箱等喪家力能自備者照定例數目備用其或力不能備除賃用槓輿棺罩執事外其鞍馬衣箱等項徒滋縻費應行禁止棺罩公侯伯用五采裝花青藍等段一二品官用銷金青藍等段三四五品官用青藍雲段六七八品官用青素段及青藍段九品以下官員生員監生用青絹兵丁庶民用青布其力不能自辦者聽其節省租用惟不許踰等官民塋葬永不許造地劵乾隆二年諭在京八旗文武各官遇有親喪例於持服百日之後即入署辦事原以旗員人少若令離任守制恐致誤公而伊等在二十七月之內仍各於私居持服以自盡其心惟是朝會祭祀之期或有執事或應陪祀之處仍皆一例行走未加分别俾盡孝思嗣後在京旗員有親喪者二十七月之內凡遇朝㑹祭祀之禮應一槩免其行走欽此十一年遵㫖議準官員服制除父母之喪應持服百日外其餘喪服皆不得藉名為偷安之計養子於本生父母之喪服制既降為期年亦應改為持服兩月於一月後剃頭當差親伯叔伯母嬸母親兄弟妻娶妻之子撫養庶母之喪原定持服兩月者改為一月後即剃頭當差此一戶內如有承辦其事者仍照常持服兩月親伯叔祖親伯叔祖之子親伯叔之子親兄弟娶妻之子親嫂親子婦娶妻之孫生子庶母之喪原定持服一月者今定於出殯七日後剃頭當差親伯叔祖母親伯叔祖之子婦親伯叔祖之孫親弟婦親伯叔之子婦親兄弟之子婦親孫婦之喪原定出殯七日後行走者今定於出殯後剃頭當差無服族人之喪原定出殯後當差者今定不準持服照常當差行走凡大臣官員持服日期其職任官差各異應行令各地方各量職任於其應行走之時即令當差行走恤典一恤典崇德年間定超等公一等二等三等公卒遣官致祭三次一等子副都統遣官致祭二次參領佐領遣官致祭一次如公以下佐領以上或陳亡或病故著有功績者遣官臨喪視祭葬優恤出自聖㫖順治二年定大臣病故者旗下官由該都統咨送吏部漢官具呈吏部察明轉行到部給與祭葬八年定民公侯伯一等子內有任內大臣都統大學士尚書鎮守將軍者由部具題候㫖立碑致祭一次內院撰文遣官讀文致祭如世襲公侯伯一等子止給祭品無祭文不立碑雖繫世襲而在任勤勞已滿三年者仍給祭文由部具題候㫖立碑二品三品官給與祭品如在任已滿三年者內院撰文遣官讀文致祭有戰功者吏部分别移送到部具題請㫖立碑又定民公侯伯以下官員致祭銀公四十兩侯三十五兩伯三十兩一品官二十五兩二品官二十兩三品官十有六兩四品官十有二兩五品官十兩知縣以上悉照加贈品級給與又定官員造墳工價銀一品官銀三百兩夫匠二百名每名折銀一兩二品官銀二百五十兩夫匠百五十名三品官銀二百兩夫匠百名四品五品官特恩賜葬者銀八十兩夫匠三十名又定豫諡大臣立碑工價銀公侯伯各四百兩一品官三百五十兩二品官三百兩三品官二百五十兩給本家自造十二年定佐領員外郎主事等官卒在任已滿三年者給與祭品內院撰文遣官讀文致祭未滿三年者不給祭文致仕官員同十五年定部院堂官加銜至一品二品者卒致祭一次工部立碑三品三年考滿者致祭一次工部立碑未經考滿者致祭一次不立碑護軍統領前鋒統領副都統步軍翼尉在任已滿三年者致祭一次工部立碑未滿三年者致祭一次不立碑本身所得一等男致祭一次工部立碑參領前鋒參領等官在任已滿三年者致祭一次不立碑四品卿少卿考滿者致祭一次不立碑未經考滿者不給祭文如文武官員陳亡者不論品級具題候㫖恩恤其內大臣都統大學士尚書護軍統領副都統前鋒統領侍郎學士步軍翼尉勤勞年久以原品休致病故者致祭立碑與見任官員同雲騎尉佐領騎都尉郎中員外郎主事等官致祭一次不給祭文世襲公侯伯一等子有職任者照職任與恤無職任者止給祭品十七年議準本身所得公侯伯一等子及都統有職任內大臣鎮守將軍卒給與全葬大學士尚書左右都御史加宮保及加級者照一品官例給與全葬無加銜及加級者照二品官例給與全葬侍郎學士副都御史三品卿有兼銜及加級至一品二品者不論己未考滿照二品官例給與全葬無兼銜及加級已經考滿者照三品官例給與全葬未考滿者給與半葬四品卿兼少卿銜等官照四品官例止給祭品護軍統領前鋒統領副都統步軍翼尉三年任滿者不論己未加級給與全葬未滿三年者給與半葬以上皆各祭一次內閣撰給祭文如各官內有戰功及勤勞以原品致仕病故者悉與見任官同其世爵公侯伯一等子一等男有職任者照職任與恤武官自參領以下文官自郎中以下皆不給祭品如文武官陳亡者不論品級具題候㫖遵行十八年定本身所得民公侯伯卒造葬遣官致祭一次如有加祭出自聖㫖都統內大臣大學士尚書左右都御史一等子鎮守將軍有加銜加級者各照品級造葬遣官致祭一次護軍統領前鋒統領步軍翼尉副都統侍郎學士本身所得一等男副都御史加銜加級至一品二品者各照品給造葬遣官致祭一次三品侍郎通政使大理寺卿已經考滿者給與全葬未經考滿者給與半葬遣官致祭一次參領協領輕車都尉郎中佐領騎都尉員外郎雲騎尉三等侍衛護衛以上官陳亡者遣官致祭一次漢文官一品二品官皆致祭造葬三品官三年考滿者致祭造葬未經考滿者給與半葬致祭一次在外布政使按察使以上官恤典皆照京官品級例行武官加銜副將以上造葬致祭一次無兼銜三年考滿者給與全葬致祭一次未滿三年者給與半葬致祭一次文官知縣以上武官守備以上陳亡者各照加贈品級造葬致祭一次滿漢文武官員以年老有疾原官致仕病故者應得恤典與見任同滿洲公侯伯以下文武二品以上大臣由吏部確核功績勤勞有應與諡者咨部應否與諡請㫖定奪漢官應與諡者各省撫按及科道官公舉由部酌議具題請㫖凡讀文致祭者遣禮部官奉諭祭文送至葬所又議準民公造墳銀六百五十兩侯六百兩伯五百五十兩一品官五百兩二品官四百兩三品官三百兩四品官二百兩五品至七品官百兩凡一品二品由部題請三品以下官死難者始行題請在旗工部給發直隸各省布政使司給發康熙元年議準凡世襲公侯伯一等子歲滿上朝後病故者給與全葬並致祭銀遣官讀文致祭一次應否與諡侯㫖定奪若有效力優恤出自聖㫖其承襲未及歲滿上朝病故者不賜恤散秩大臣一等侍衛鑾儀使冠軍使王府長史一等護衛前鋒參領護軍參領驍騎參領卒三年任滿者給與全葬並致祭銀遣官讀文致祭一次未滿三年者給與半葬並致祭銀遣官讀文致祭一次內有加級至一品二品者不論己未任滿皆照品級給與全葬四品護軍參領卒三年任滿者給與全葬並致祭銀遣官讀文致祭一次未滿三年者給與半葬並致祭銀遣官讀文致祭一次以上各官或年老有病以原官致仕病故者與見任官同九年題準本身所得公侯伯病故給與全葬並致祭銀遣官讀文致祭一次應否與諡出自聖㫖世爵公侯伯病故恤典同內大臣都統一等子品級散秩大臣大學士尚書左都御史一等子世襲一等子鎮守將軍提督各照品級給與全葬並致祭銀遣官讀文致祭一次應否與諡請㫖定奪如有陳亡者優恤出自聖㫖一等男品級散秩大臣護軍統領前鋒統領副都統侍郎本身所得一等男學士副都御史總督總兵官加級至二品巡撫各照所加品級給與全葬並致祭銀遣官讀文致祭一次應否與諡請㫖定奪三品侍郎學士副都御史巡撫通政使大理寺卿三年任滿者給與全葬未滿三年者給與半葬皆給致祭銀遣官讀文致祭一次不請諡有加級者仍照前例請諡布政使副將各照品級給與全葬並致祭銀遣官讀文致祭一次不請諡雲騎尉三等侍衛以上文官知縣以上武官守備以上陳亡者各照加贈品級給與全葬並致祭銀遣官讀文致祭一次凡與諡一品官工部立碑碑文內閣撰擬其遣官致祭者祭文均由內閣撰擬凡滿漢文武官員年老有疾以原品致仕及候補終養者病故恤典與見任官同尚書侍郎等官以原官原品解任及隨旗上朝官員病故恤典與見任同如無原官字樣止以原品上朝者不準恤尚書都御史侍郎學士副都御史通政使大理寺卿總督巡撫布政使提督總兵官副將以甄别京察年老有疾原品致仕病故者皆不準恤世爵官員加至一等男者給與半葬遣官致祭一次未加世爵承襲一等男本身所得雲騎尉承襲輕車都尉以下雲騎尉以上各照品級給與一次致祭銀令本家自行致祭承襲公以下雲騎尉以上未及歲滿上朝者不準恤凡滿漢官員各照品級給與一次致祭銀京官由部給發外官由地方官給發其遣官讀文致祭京官遣禮部官外官遣布政使司官十二年議準嗣後滿漢內外文武本身職任應得恤典之官員父母曾受誥命者應照其子例賜祭一次其造葬仍行停止三十八年奉㫖閒散一等子甚多有何給與諡號之處嗣後若一等大臣仍將應否給與諡號照舊請㫖閒散一等子及副都統侍郎等官將請給諡號之處悉著停止只將給與全葬半葬部內一次致祭之處題請四十二年覆準嗣後副將在任已滿三年病故者停給葬價不必具題按其品級給與一次致祭銀令本家自行致祭未滿三年者無庸議永為定例四十四年題準嗣後一等男以下雲騎尉以上官若繫本身所得之官與襲爵之後又能效力得官病故者仍照舊例給與一次致祭銀其襲爵官員停支給祭銀又定武官奮勇力戰陳亡除給恤銀加贈品級廕子弟一人外仍照例給與全葬遣官致祭五十二年奉㫖文武官員之父從無與諡之例但其子不願加本身恩典陳情懇切且伊父勞績素著者著給與諡乾隆十一年遵㫖議準公侯伯子等官襲爵後不兼他職行走者遵照定例停給葬價止給一次致祭銀或兼他職者應照定例給與全葬半葬並應否豫諡由部兩議題請候㫖裁定欽定大清㑹典則例卷九十一
