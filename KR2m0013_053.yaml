出境者拿解治罪其番僧若有夾帶姦人並私茶者沿塗官司檢出茶貨入官伴送夾帶人送官治罪若該衙門官縱容私買茶貨及私受餽送增改關文者聼巡按察究又題準進貢番僧應賞食茶須給勘合撥發由茶倉所照數支放不許收買私茶三年題準甘鎮以茶易馬各番許於開市處互市不得濫入邉內又題準民間食用米麥皆停收稅四年議準嚴禁州縣借落地稅銀名色及勢宦土豪不肖有司設立津頭牙店擅科私稅五年議準茶箆止供市馬不許開銷賞番九年覆準地方將領巡緝不許倚托營兵旗人販賣私茶十年覆準茶商舊例大引附茶六十箆小引附茶六十七斤餘今定每茶千斤槩準附茶一百四十斤如有夾帶嚴察治罪又題準凡鎮辨發銀市馬察核的確準令購買若有載茶易馬者槩行禁止康熙元年題準禁止有司私給稅單收稅十二年覆準小民肩挑背負尺布斗米蔬果食物貿易者地方官不許徴稅十八年覆準産銅鉛厰任民採取徴稅銀二分按季造報八分聼民發賣先盡地主報名開採地主無力許本州縣民採取雇募鄰近州縣匠役如别州縣越境採取及衙役攪擾皆照例治罪有墳墓處不許採取倘有不便督撫題明停止二十六年議準自康熙十五年至十九年直隸各省加增田房鹽當牙行等項稅銀通行各省免其徴收又免徴湖廣新增鐡茶商茶稅銀二十八年題準江寧民間鋪面歲輸房號廊鈔等銀悉行豁免四十一年覆準京城內外煤牙悉行禁革其煤牙額稅停止徴收四十三年覆準嗣後茶止於陜境交界處盤察行人攜帶十斤以上者停其搜捕有驢䭾車載無官引者即繫私茶照私鹽律治罪失察官辨照例議處四十四年覆準私茶十斤以下向停其搜捕恐姦民計圖免課分帶零運仍照舊緝拿處分四十五年議準嗣後一應牙行照五年編審之例清察更换新帖如有頂冒朋充巧立名色霸開總行逼勒商人不許别投拖缺客本久占纍行者嚴拿究治四十八年覆準姦民希圖射利揑稱牙行於良民買賣之際溷行索詐者令順天府尹通判大宛二縣五城兵馬司嚴行察拿照例從重治罪五十二年諭據四川提督奏稱蜀省一碗水地方聚衆萬餘人開礦差官力行驅逐等語此偷開礦厰之徒皆繫無室可居無田可耕貧民每日所得錙銖以為飬生之計若盡行禁止則伊等何以為生該地方文武官辨作何設法使窮民獲有微利養贍生活但不得聚衆生事妄行不法大學士會同九卿議奏欽此遵㫖議準凡各省所有之礦夲處無業貧民私行採取者各該地方官詢明姓名注册令其開採仍不時稽察毋致生事其外省之人不許開採並嚴禁夲處豪强富戶設厰如有此等情弊該管文武官辨隱匿不嚴行察拿照溺職例革職該督撫將軍提鎮徇庇不行揭參照徇庇例降三級調用五十五年議準免京城下等行鋪稅銀雍正三年覆準黃河以東蘭鞏平慶四府秦階二州茶政令湖廣督撫嚴飭産茶各州縣凡商茶照引運茶先行申報本省咨明豫撫轉飭經過地方察驗令陜州驗引移送出關外守取回文備案如該州借名勒索該撫即行題參治罪如商人離引行茶及夾帶餘茶並將舊引影射者該撫即行拿問又題準嗣後奉天買賣人出威遠堡法庫口至吉林黑龍江等處貿易領取車票繫民即在府尹衙門具呈察驗給票旗人仍照舊例在盛京兵部給票倘官兵胥役等有通同勒索等弊即題參從重治罪四年覆準陜省茶改令産茶地方官給發船票照依該商引目茶數逐一開明不得别給印票其應行盤察之處照依引目及正茶附茶斤兩盤察驗放不得勒索留難如於部引之外有搭行印票及附茶不依所定斤數多帶私茶者察拿照私鹽律治罪如察驗官故縱失察照例處分如地僻引多致茶壅滯不能行銷該商具呈該司詳報甘撫行令往别司分通融發賣辦課七年題準州縣徴收稅銀凡窮鄉僻社些小生理無關課稅者永行革除八年題準廣西柳州府舊有牛綱客人入猺獞之地販買納牛稅銀四十一兩二錢停止徴解九年諭向來各處落地稅銀定例報出稅銀八百兩者準加一級多者以次計算年來地方官員皆知守法奉公凡有稅課皆隨收隨報不敢侵隱其報出之數每倍於舊額祇恐將來不免冀幸功名之人希圖優叙以致恣意苛索擾纍小民且落地稅銀非正項錢糧有一定之數可比侵蝕隱匿者固當加以處分而爭多鬭勝者亦當豫以處分其作何定議並如何議叙加級處分之處吏部户部悉心妥議具奏欽此遵㫖議準各省落地稅銀如徴收正額之外搜求需索以致贏餘之數幾倍於正額者其稅契銀如有將民間從前置買産業苛索擾纍多收契羡者該督一并指名題參照例議處至正額外並無苛索擾纍實有贏餘報出八百兩者仍照定例準其加一級千六百兩者加二級二千四百兩者加三級如此外雖再有贏餘亦不得過加三級仍令各督撫將並無苛索擾纍之處於疏內聲明到日準其議叙又題準廣東曲江惠來陽春等三縣有額無徴稅課等銀共七百八十四兩有竒準其永遠豁免十年諭朕聞西寧北川口外白塔地方出産石煤繫附近漢土番回民人採取販賣以為生理每䭾納稅錢三十文於西寧委管之員收解充餉約計每年收銀一千九百餘兩近因西陲用兵之際西寧移駐兵辨較前為多率皆用煤以供炊㸑煤價漸至昻貴若仍照前例徴收稅錢恐價直不能平減於兵民均有未便著將應徴稅錢寬免該督撫轉飭有司實心稽察倘胥吏人等有照例私收或借端需索者務令察出從重究治欽此又奏準木魯烏蘇地方出産金砂附近窮番藉以開採資生應聼其自行開採毋得招集多人生事十一年諭各省商牙雜稅固有關國課亦所以便民是以各省額設牙帖皆由藩司頒發不許州縣濫給所以杜增添之弊不使貽纍於商民也近聞各省牙帖歲有加增即如各集場中有雜貨小販向來無藉牙行者今槩給牙帖而市井姦牙遂恃為護符把持爭奪抽分利息是集場多一牙户即商民多一苦纍况牙帖納稅每嵗無多徒滋繁擾甚非平價通商之本意著直省督撫飭令各該藩司因地制冝著為定額報部存案不許有司任意加增嗣後止將額內各牙退帖頂補之處察明换給新帖再有新開集場應設牙行者酌定名數給發亦報部存案如此則貿易小民可永除牙戶苛索之弊欽此十二年諭朕聞東省泰山有碧霞靈應宫凡民人進香者皆在泰安州衙門輸納香稅每名輸銀一錢四分通年約計萬金若無力輸納者即不許登山入廟此例起自前明迄今未革朕思小民進香禱神應聼其意不得收取稅銀嗣後將香稅一項永行蠲除如進香人民有願輸香錢者各隨所願不必計較多寡亦祇許本山道人收存以資修葺祠廟山路等費不許官吏經手絲毫染指永著為例欽此又諭湖北太和山香稅著照山東泰安州之例永行豁免欽此十三年十月諭朕聞各省地方於關稅雜稅外更有落地稅之名凡耰鋤箕帚薪炭魚蝦蔬果之屬其直無幾必察明上稅方許交易且販自東市既已納課貨於西市又復重徴至於鄉村僻逺之地有司耳目所不及或差胥役徴收或令牙行總繳其交官者甚微不過飽姦民猾吏之私橐而細民已重受其擾矣著通行內外各省凡市集落地稅其在府州縣城內人煙湊集貿易衆多且官員易於稽察者照舊徴收但不許額外苛索亦不許重復徴收若在鄉鎮村落則全行禁革不許貪官汚吏假借名色巧取著該督撫將通省額徴稅額分晰原額新增並原設稅口例載貨物應留應革款項造册題報其如何裁革禁約之處詳細造册報部察核欽此又諭民間活契典業者乃一時借貸銀錢原不在買賣納稅之例嗣後聼其自便不必投契用印收取稅銀其地方官徴收稅課多者亦停其議叙再在京兩翼收稅之處亦照此例行欽此又題準直隸正定府屬之插箭嶺倒馬關及所屬之上城鐡嶺口既收貨物牲畜之稅而出入往來空身之人向例復收稅錢著永行停止乾隆元年諭廣東有埠租一項乃民間自收之微利前經察出湊修圍基之費今圍基既動公項修築所有埠租一項免其徴收欽此又覆準牙戶如各牙行式微無力貿易有情願報官歇業者即令其開除報部不必俟頂補有人方準退帖違者照例處分又覆準浙江嘉興台州溫州處州等府屬之角里等處各口界址每年應徴商稅等銀永行禁革二年題準滇省鎮雄州繫食川鹽徴收過稅準其裁革於鹽課銀內開除又題準山東省魚筏稅銀五百三十八兩九錢一分有竒免其徴收又題準湖南永州府帶徴商稅及常德府報增餘出鹽鈔昌平熟鐡等稅武岡州報增餘出門攤酒醋等稅嶽州府屬之巴陵縣報增餘出漁稅察明繫屬零星商販及額外加增之項準全行禁革又題準湖北安陸府所屬之河家集等十六處襄陽府所屬之雙溝等十集鄖陽府所屬之安陽龍門江峪三處均繫小村落向徴稅銀全行禁革又題準平凉府屬之白水鎮布匹煙紙等稅臨洮府城褐稅並屬府之定羌驛內官營落地布麻褐等稅悉行禁革三年題準江蘇等屬落地稅銀分别裁留實在各屬請裁銀二千四百四十八兩五錢有竒準豫豁除又題準直隸遵化州寶坻縣及容城之白溝河等四集河西務等三處並撫寧之深河山海衛之海洋石門等處宣化府屬之蔚州河間縣之桑家林等處均繫零星交易土産貨物應徴稅銀均豫裁革又題準四川廣元縣每宰一猪徴銀三分商販活猪已經收稅宰猪又徴事屬重復應行裁革至經過䕫關在於本地糶賣之米糧既未載有一例徴收字樣似屬額外加徴嗣後免其徴稅四年諭昔我皇考惠愛商民恐州縣牙行歲有加增於雍正十一年諭令各督撫飭令藩司因地制冝著為定額報部存案不許有司任意加增止許將額內各牙退帖頂補之處察明換給新帖再有新開集場應設牙行者酌定給帖報部不許濫增近聞江蘇各屬於額帖之外陸續增請者一縣竟有數十張以至百餘張不等此必州縣官聼信吏胥播弄借新開集場準其增設之例或舊業而揑為新設或裁牙而溷請改充徒使貿易小民受其苛索莫可申訴江蘇如此則各省亦必皆然該部即通行各省督撫轉飭布政使司出示曉諭該地方若有新開集場應設牙行者該印官詳確察明取具印結由府州核實詳司給發牙帖如非新開集場朦溷請增者即行題參從重議處欽此五年諭近聞外省衙門胥吏多有更名揑姓兼充牙行者此輩倚勢作姦壟斷取利其為市廛之蠧尤非尋常頂冒把持者可比嗣後作何定例嚴禁及地方官失於稽察作何處分之處該部定議具奏欽此遵㫖議準嗣後胥役見在更名揑姓兼充牙行者令地方官嚴察確實即行追帖勒令歇業並將胥役充補牙行之弊永行嚴禁倘不法胥役仍更名揑姓兼充牙行者照例杖一百徒三年如誆騙客貨纍商久候一經告發照例枷一月發附近充軍若地方官奉行不力失於稽察罰俸一年有意徇縱者降二級調用如有受財故縱計贓從重以枉法論七年覆準客商販買米豆皆須投託牙行恐狡獪牙行有意把持高擡價直於中取利行令直省督撫轉飭該地方有司通行出示嚴切曉諭商人既不得藉貨居竒行家更不得把持增價倘有居竒把持等弊即察明究治九年題準嗣後地方官濫給牙帖者該管上司失於稽察將知府照巡綽官失於稽察例罰俸一年司道照不行詳察例罰俸六月若該管上司知情不據實揭報題參者照徇情例降二級調用牙行承充之時向本殷實厥後漸次式微致有拖缺客本者隨時革换倘州縣仍將銷乏牙行不即革退及並非殷實之人出結申送照襟監充認牙行州縣官奉行不力例分别失察徇縱議處如有枉法受贓等項按律處分並飭令地方官出示曉諭如有姦牙狡獪於發貨之日不令客人與鋪戶三面議價立定合同限帖届期同索者許客商赴官具控將該牙革退别募充當如鋪戶過限不清有意侵吞客貨者仍將鋪戶嚴追地方官倘有陽奉隂違釀成積案者以玩視民瘼題參又題準安徽等十三府州屬雜稅項下牛驢花布煙油等項銀或繫有款無徴印官捐解或空有地名並無市集或重徴經行牙行或雜𣲖於鋪家煙户實為擾纍悉準豫豁免十一年奏準湖廣衡州府設立賣鉛牙行頒給印照官稱凡赴買者該牙依次發貨如官買客販並至先盡官後給客仍聼買賣人等當面議價該牙在旁眼同兌交銀貨以免爭競倘有把持欺壓等事即行革究又題準江蘇碾餉闕額銀出自碾米之户完解因土俗變易民間皆置木礱自做碾戶稍乏並無頂補之人以乾隆十一年為始準其槩豫豁免又覆準江蘇額賦之外有城租闕額吏農班餘米軍餉碾餉闕額折穀無徴等項雜辦共銀六百二兩六錢五分七釐均屬有款無徴官民苦纍準其照數豁除十七年議準直省地方遼濶凡有種麻植靛燒炭烘茹開礦採捕等事無業窮民羣聚於深山大谷湖濱海汊之間務令該州縣親履其地勘明形勢細察來歷繪圖貼說造册申報督撫仍按季覆察該督撫嵗於四月十月內檄令巡道會同營辨稽察出結申報倘地方官及巡察官辨有縱容兵役滋擾纍民者該上司即揭報督撫題參又議準凡産硝硫黃之地除見在官為開採者仍循例妥辦毋許夾帶透漏不時稽察外其久經封禁之山澤及出産硝黃之地務嚴行申禁倘有頑民私自開採地方官不行嚴拿别經發覺即將該地方官嚴參議處務令獲犯治罪其不行揭報之各上司失於覺察之該督撫一并交部察議欽定大清會典則例卷五十
