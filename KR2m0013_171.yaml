body:
  text: 內務府奉宸苑一建置康熙二十三年設奉宸苑鑄給印信簡內務府總管一人掌之管理一切苑囿事務凡有題奏照上駟院武備院例自行題奏設郎中一人員外郎四人主事一人筆帖式九人四十年奏準增設筆帖式一人雍正元年奏準增設筆帖式二人六年奏準奉宸苑卿定為三品十三年奏準增設筆帖式二人乾隆十四年奉旨奉宸苑卿定為二人由侍衛內務府官各簡一人補授仍簡大臣兼管院事十六年奏準增設郎中一人筆帖式二人一奉宸苑所𨽻景山瀛臺蠶壇闡福寺永安寺南花園河道萬壽寺髙亮橋行宮各設八品苑丞未入流苑副各一人樂善園行宮八品苑丞未入流苑副各三人翰林花園未入流苑副一人初設八品催長二人領催十有二名康熙二十五年增設八品催長四人雍正二年增設八品催長二人乾隆四年增設催長一人領催四名十一年闡福寺增設催長一人領催一名十六年奏準增設八品催長三人領催六名以八品催長改為八品苑丞其由領催委署之副催長改為未入流苑副領催改為執事人一南苑設官順治十八年設員外郎二人康熙八年於員外郎二人內改一人為郎中二十三年設筆帖式六人二十四年奏準苑內原有大紅門小紅門東紅門南紅門西紅門五門又增設正國寺門黃村門回城門雙橋門共為九門大紅門設四品總領一人領催二名驍騎十有八名其餘八門每門各設五品防禦一人領催一名驍騎九名並屬南苑郎中管轄三十年奏準新舊行宮各設未入流苑丞一人苑副二人三十六年奏準南紅門行宮設未入流苑丞一人苑副二人五十二年奏準南紅門行宮增設苑副一人雍正元年奏準增設員外郎一人又於筆帖式內委署主事一人乾隆元年增設主事一人十八年增設八品催長一人聽差人十有五名一暢春園設官康熙年間定設郎中一人八品苑丞三人未入流苑丞十人筆帖式十人四十三年設西花園八品苑丞二人未入流苑副八人筆帖式二人一圓明園設官雍正元年奉旨圓明園設筆帖式四人又增設筆帖式四人二年設苑丞六人苑副十有二人五年增設筆帖式四人七年奉旨苑丞六人著授為六品賞戴藍翎苑副十二人以六人授為七品六人授為八品乾隆六年奏準於筆帖式內委署苑副二人增設學習筆帖式二人八年設主事一人增設七品八品苑副各一人十六年奏準設七品庫掌一人於筆帖式內委署苑副五人又奏準長春園設六品苑丞一人七品八品苑副各一人二十年奏準圓明園協理事務郎中員外郎闕即於本處主事及六品苑丞內簡選引見補授一靜明園設官康熙三十一年奉旨澄心園著改名靜明園設未入流苑丞一人未入流苑副三人筆帖式一人乾隆五年奏準由西花園撥往八品苑丞一人未入流苑副一人十八年奏準苑丞二人授為七品苑副四人授為八品一靜宜園設官乾隆九年奉旨著於西花園靜明園二處苑副內各簡選一人在香山行宮行走又奉旨設管理事務員外郎一人十年奏準設八品苑丞一人未入流苑副一人筆帖式一人十二年奉旨以香山行宮為靜宜園增設八品苑丞一人未入流苑副一人筆帖式一人十六年奏準八品苑丞二人改為七品未入流苑副四人授為八品又增設七品苑丞一人八品苑副一人筆帖式一人於七品苑丞內簡選一人協理事務十七年奉旨祭祀所用鹿交靜宜園餧養一清漪園設官乾隆十六年奉旨以萬壽山行宮為清漪園又奏準設六品苑丞一人七品苑副二人八品苑副二人筆帖式四人八品催長一人由奉宸院撥往未入流催長一人十八年奉旨由上駟院撥送七品牧掌六人改為七品苑副副牧掌六人改為委署苑副十九年增設六品苑丞二人一湯山行宮設官康熙五十四年題準設八品苑丞一人未入流苑副二人效力筆帖式二人乾隆四年增設未入流苑副一人一升除本苑郎中員外郎主事及管理暢春園事務郎中暢春園西花園湯山等處八品苑丞闕均由內務府簡選應升人員引見補授稻田場六品庫掌景山瀛臺等處八品苑丞闕均由苑簡選應升人員引見補授暢春園西花園等處未入流苑副闕均由內務府簡選人員補授景山瀛臺等處未入流苑副執事人靜明園未入流苑丞苑副湯山未入流苑副闕均由苑簡選補授總管圓明園事務大臣奉特旨簡任協理園內事務官員或該園總管大臣等奏委或奉特旨除授其六品苑丞七品八品苑副員闕均由該園總管大臣等簡選應升人員引見補授本苑圓明園暢春園靜宜園稻田場等處筆帖式員闕均由內務府掣籖補授一園𨽻園戶暢春園等處園隸共八十九名瀛臺長工九名花匠二名瓦匠一名豐澤園長工十有三名花匠三名瓦匠一名勤政殿長工六名花匠二名淑清院長工一名服役人一名花匠一名紫光閣長工五名服役人七名花匠一名五龍亭長工三名服役人二名花匠一名承光殿原有長工四名復於所屬長工花匠內簡選長工十有八名花匠二名景山長工十有四名東果園長工五名服役人六名花匠一名外虎城長工三名服役人一名水車房長工八名南花園長工十名服役人十有四名花匠三十名中海長工十名花匠四名南海長工十名北海長工十名凡掃除所需箕帚轆轤等物及水車房所需水具花匠所需盆盎均移咨各該處支取康熙年間定景山瀛臺靜明園南花園等處園戶匠役每名各給養贍家口地六十畝月支銀一兩各園園戶匠役各給地三十畝月支銀一兩米一斛功德寺園頭一名花匠二名種花地二十畝豐臺園頭一名花匠二名種花地六十畝將容城房山等縣取租地二十頃分給二處園頭備辦正陽門外三里河金魚池投充園頭一名月支銀一兩米一斛長工二名每名各給地六十畝月支銀一兩附於旗鼓佐領下支領其園頭長工闕各以其子弟充補乾隆二十年奏準增設之園戶各給地三十畝月支銀一兩凡園隸闕於管領下間散人內選補園戶闕於旗鼓佐領下間散人選補匠役闕於旗鼓佐領下選補不得其人於五城召募民人充補仍附旗鼓佐領下支領錢糧地畝乾隆七年奉旨瀛臺等處長工著改名園戶一苑戶初定南苑苑戶每名給地二十八畝康熙三十年題準新舊行宮設灑掃苑戶十有六名五十二年題準南紅門新舊行宮增設苑戶三十二名又定湯山苑戶每名月給銀五錢米一斛各項匠役各給地三十畝月給銀一兩米一斛五十六年題準永慕寺設苑戶十名乾隆十二年奏準湯山苑戶七十名每名月支銀五錢米一斛銀較各處獨少嗣後每名各支銀一兩米照舊支領至該處地方雖覺遼濶但苑戶七十名不免過多應裁去二十名奉旨湯山苑戶著裁去三十名一海戶原定南苑海戶一千八百名今一千六百名內千戶二名總甲二十二名小甲八十八名巡青海戶四十八名門軍八十一名海戶一千五百五十九名有闕以其子弟頂補康熙十一年奏準南苑海戶每名各給地二十八畝二十七年奏準增設海戶四百名即以海戶子弟充補每名照例撥給地畝五十一年奏準裁千戶二名總甲十名小甲四十名門軍四十五名海戶五百三名原給之地悉行徹回總甲每名各增給地三十二畝小甲及巡青海戶每名各增給地十二畝尚餘地八十八頃八十八畝仍為羊草地其牆外馬道及通州等處退出地畝七十四頃交戶部令該州縣徵收錢糧一蠶戶雍正六年奉旨圓明園於七年起著養蠶設立首領內監內監各一人管理蠶事乾隆九年建先蠶壇設八品催長一人領催二名內監二人園戶二十名又議奏先蠶壇飼蠶供事蠶婦蠶母均由內府三旗簡選因不甚諳練於圓明園養蠶民婦內選撥五戶在蠶壇當差同蠶婦蠶母隨時往蠶室教習使其熟練奉旨養蠶民婦交奉宸苑俟有園戶闕不必别選即將養蠶戶充補十年奏請前於圓明園撥給奉宸苑蠶戶五名候補園戶其看守掃除等項差務自應一體充當如值養蠶之期仍充本役較之園戶實屬有間按圓明園蠶戶分例每名歲支銀十有二兩米二十四斛冬令並給煤炭棉布五年一次給與狐皮帽領羊裘至本苑所屬園戶苑戶每名例給養贍家口地六十畝歲支銀十有二兩五年一次給羊皮十張粗布二丈今以蠶戶充補園戶自應仍支蠶戶分例俟其子孫長成頂補園戶之時再照園戶分例給與地畝錢糧奉旨此五名蠶戶俟園戶闕即行坐補仍領蠶戶分例其子孫頂補亦著領蠶戶分例十七年奏準圓明園蠶戶撥往萬壽山織染局當差一網戶初定霸州網戶四十六名江南網戶六名每名月支銀一兩歲支米二十四斛均附於旗鼓佐領下支領其江南網戶六名每年輪流四名在京該班除所領錢糧外總漕衙門每名月給養贍家口銀三兩其不該班之網戶二名除在京應領錢糧外每名月給飬贍家口銀一兩再於內府佐領內管領下簡選間散人二十名演習刺船每名月支銀二兩歲支米二十四斛沙河網戶二十六名效力當差不給錢糧乾隆十七年定江南網戶均令在京當差一雜徵康熙年間定玉泉山稻田場委司官二人管理設筆帖式二人領催十有三名聽差人四名每年豫領帑金以便雇人耕種十六年奏準每年步糧橋至玉泉山一帶河道共徵租銀三百八十九兩有竒又奏準紫禁城護城河歲徵蓮藕租錢三十貫又奏準三海蓮藕除貢進外餘令變價於每年四月內奏銷雍正元年奏準玉泉山稻田場設六品庫掌一人增設筆帖式二人二年奏準每年所得稻米除供內廷應用及備貯耔種外餘米交大宛二縣依時價糶銀交廣儲司庫三年奏準玉泉山稻田場歸并奉宸苑管理原委司官二人令回本任歲於苑屬官員內委出一人與庫掌協同辦理裁筆帖式一人領催八名再按每年恭進內廷應用細米及應貯稻共計不過六七百石今功德寺水田七頃四十四畝甕山水田八頃十有一畝各有竒所得稻已敷一年之用留此二處官種外其六郎莊北塢蠻子營黑龍潭等四處稻田地應租與附近居民徵租所種官地停其領帑即於地租銀內動用其用過餘剩數目於歲終具奏稻草變價銀一并入奏六郎莊水田五頃四十八畝四分一釐每畝租銀六錢旱地三頃七十五畝二分九釐每畝租銀三錢北塢水田九頃三十七畝七分一釐每畝租銀五錢至七錢不等旱地一頃八十八畝二分二釐每畝租銀一錢五分至二錢不等蠻子營水田十頃八分三釐每畝租銀四錢三分至六錢五分不等旱地一頃二十五畝三分五釐每畝租銀二錢黑龍潭水田五頃三十一畝六分九釐每畝租銀五錢旱地五十四畝三分一釐每畝租銀二錢石景山水田四頃八十二畝六釐每畝租銀六錢三分功德寺頭圈水田一頃三十五畝九分八釐每畝租銀四錢三分至七錢不等旱地一頃八十七畝五分三釐每畝租銀二錢五分至三錢不等甕山旱地一頃一畝一分三釐每畝租銀三錢六郎莊房基地十有五畝一分九釐共租銀十兩荷花池四畝八分租銀四兩功德寺房基地九畝五釐每畝租銀一兩房十間每間租銀一兩荷花池十有二畝四分五釐租銀八兩泄水河荷花池一區租銀七錢甕山荷花池一區租銀三兩五錢以上水田三十六頃三十六畝六分應徵銀二千有四十三兩五錢旱地九頃三十二畝八分應徵銀二百二十九兩六錢各有竒並房租地基租荷花池租及變價稻米稻草銀每歲除種地製備器皿雇覓人工使用外餘銀交廣儲司庫於次年二月奏銷每年於豐澤園後演耕藉禮種旱地一畝三分所種旱稻熟時碾得細米供獻奉先殿壽皇殿恩佑寺福佑寺安佑宮五處各一斗交送尚膳房二斗餘盡交奉先殿備每月供獻之用淑清院旱地七分三釐每年委會計司莊頭一名種麥所獲之麥咨交內管領官三倉大光明殿旱地四畝二分每年委會計司莊頭一名種瓜於進鮮之前交送甜瓜二箇供獻慈寧宮佛前再交髙麗黃瓜十六條送尚膳房乾隆九年議準德勝門外向有荷花池一區每年僅徵租銀四十五兩今勘得內有稻田九十四畝六釐一毫旱地三畝九分二釐九毫荷花池七十六畝五分五釐蒲地五十四畝七分一釐共地二頃二十九畝二分五釐擬定稻地每畝徵銀四錢三分荷花池蒲地每畝徵銀三錢旱地每畝徵銀二錢五分共應徵銀八十兩七錢有竒歲入奏銷又奏準德勝門內銀錠橋西所有官稻田三頃向屬本苑管理後因地勢髙窪不等難以耕種奏交會計司所有房屋交官房租庫管理年來挑揠河道疏濬順利業經栽種荷花已成荷池除房屋仍聼官房租庫收租外所有荷池地畝應仍歸苑管理以昭畫一擬定每年徵收租銀五十兩彚入奏銷一橋閘雍正四年奏準自下清河以上各閘交奉宸苑管理六年奏準圓明園後河隄蕭家河及西牆外出水河五空閘出水河東門外舊有出水河五道石橋三座並蕭家河之石橋均交奉宸苑管理其圍牆所有木橋令圓明園苑丞等管理又覆準凡瀛臺靜明園湯山髙亮橋等處所用松木橋版柁梁閘版閘繩等項有損壞者由苑移咨工部更換又定看守內外河道閘軍三百五十名每名月支米一斛閘軍闕召民充補各給印票三年更換看守城外河道五城總甲二十名每月二次赴苑點卯乾隆十二年議準下清河以上栁村等閘自雍正四年歸苑管理只有閘官一人閘軍四十八名皂隸二名今柳村閘閘官所管之萬年閘小東閘永慶閘及圓明園北隄一帶河道橋閘並新增閘板之兩空閘四空閘等處地方遼濶閘亦繁多閘官軍役不敷應差行文順天府轉咨直隸總督於天興閘閘軍撥出三十名前往柳村應差歸并閘官管束其應得錢糧及一切調撥差委事宜均令該閘官自行承辦再栁村閘及北隄一帶河道橋閘均與圓明園內圍相通關繫緊要每年六月至八月大雨時行並飭令天興閘閘官親赴柳村閘協勘河道十六年奏請清漪園前昆明湖向因河道窄狹並未設有宮殿又無應役園戶是以本苑酌撥閘軍於行船河路隨時芟草濬淤今湖靣寬展均圍繞宮殿之間關繫緊要見在清漪園有專管大臣又設苑丞苑副及園戶等役百有餘名請嗣後鳳凰墩並昆明湖所有附近水面橋閘並廣潤祠靜明園外船塢等處承應拉牽提閘濬淺各項差務於本苑酌撥閘軍五十名統歸清漪園管理其鳳凰墩至長春橋以及髙亮橋一帶河道橋閘並青龍橋夏令看守各閘仍由苑管轄奉旨清漪園亦繫爾苑應管之地何必委令一處管理所奏撥給閘軍五十名分令管轄為數甚少即撥給百名亦屬無多爾等公同商辦不必奏聞一修船康熙年間定暢春園等處船每年修艌由該總管等奏請瀛臺三海等處船每年由苑奏請修艌雍正五年奉旨圓明園暢春園西花園聖化寺等處船均交奉宸苑管理每年修艌著該苑察明奏聞修理銷算遵旨議定圓明園暢春園瀛臺三海等處船由苑每年於二月內察勘奏請修理三海拖牀每年黏補一次其修艌黏補所用桐油咨戶部領取杉木鐵葉釘炭絨繩工匠咨各該處領取魚鰾木賊草錚磨匠咨武備院領取辦買灰麻給發工價銀咨廣儲司領取彚題核銷三海暨靜明園湯山大小船每年所用黃花竹篙槳棹䉡繩及鋪墊之物有應更換者均由苑移咨各該處領取乾隆十六年奏準圓明園靜明園暢春園湯山瀛臺三海等處船歲由苑委官估計奏交各該處修艌但各處船多且大小不一臨期約估竊恐不能周詳且領帑之後又分交各該處自行承辦其錢糧是否實用船身果否堅固本苑勢難遍察嗣後圓明園靜明園萬壽山等處即交各該處每年按時自行奏請修理其暢春園湯山瀛臺三海等處船仍由苑辦理一稽察乾隆八年奉旨大西天經厰萬善殿皆奉宸苑所屬地方嗣後交該苑登載册籍管理稽察其廟宇地靣不時掃除務令潔淨又奉旨時應宮神像供器亦著奉宸苑登載册籍不時稽察一修理乾隆八年奏準瀛臺永安寺等處小修工程所需銀請於稻田場地畝銀內動用六百兩存留備用奉旨著照所請動支稻田場欵項不必拘數歲終即行奏銷九年奏準大西天經廠及萬善殿時應宮殿宇房屋牆垣如有滲漏倒壞應行修理者除應用物料仍向各該處行取外其應買物料並給發工價所需銀在三千兩以內者即於存貯瀛臺歲修銀內動支隨時辦理統於歲終奏銷此外如有修造所需物料工價數至五千兩者並令奏聞辦理十年奏準勤政殿豐澤園淑清院等處各門窗氊簾竹簾雨搭遇有損壞向繫各該處自行修補自乾隆六年修理以來懸挂已經數載此內除氊簾竹簾稍有破損酌量修補應用外至雨搭一項請交工部門簾庫將堪用者挑換絨繩其破壞者交該庫委官修補嗣後宮殿門窗氊簾竹簾及三海船塢雨搭如有應行修補者亦交該庫修補又定景山南花園等處房屋牆垣有應修理核明丈尺移咨營造司修理二十年奉旨嗣後不必存留稻田場地畝銀如有應修之處奏明修理織染局一建置康熙三年奉旨織染局交內務府總管管理舊隸工部又奏準設員外郎一人筆帖式三人領催六人九年設司庫一人庫使六人二十四年增設領催一人專司買辦六十一年設司匠二人乾隆十六年移織染局於萬壽山裁員外郎凡應辦事宜簡總理萬壽山大臣兼管其辦事官繫奏委無定員一織造假紗康熙初年無定額四十七年奏準歲造假紗三十八匹屯絹二百匹大紅長毛氆氌四十匹交廣儲司假庫雍正七年奏準改織暗花屯絹寧紬宫紬八絲假料均按三節進呈其每年額交假庫紗槩行停止一物料所用絲移文浙江布政使司解送染絲各色顏料戶工二部支取一靛戶西頂藍靛場四十名大通橋十名漷縣三十名沙窩場二十名每名各給地二十四畝歲徵靛百斤共徵靛萬斤雍正十年奏準官用西頂靛戶地七畝七分除靛三十五斤每年見徵靛九千九百六十五斤除染絲應用外餘靛由局照例每斤定價二分三釐折銀交廣儲司庫一匠役康熙初年設匠役八百二十五名二十五年裁一百五十一名四十七年裁二百名五十九年裁一百二十八名雍正四年裁十有五名十三年裁一百四十一名乾隆五年奏準裁氆氌匠十有四名屯絹匠十有四名十六年奏準裁各項匠役五十二名繡匠四十名歸隸廣儲司衣庫又奏準增設南匠十有二名各月給銀三兩米二斛見存京匠七十名內織匠二十六名絡絲匠二十二名絡經匠六名挑花匠四名揀繡匠二名染匠五名畫匠一名帶匠四名均由局召募民人充補各給印信照票每名各給官房一間內月給銀二兩五錢者六名二兩者十有七名一兩五錢者四十七名每名按季關支米二十一斛均呈堂咨戶部給領一蠶戶乾隆十七年奏準蠶戶十有三人移往萬壽山歸并織染局每名每年給食銀十二兩米二十四斛夏季藍布單袍挂各一件冬季藍布棉袍挂襖褲各一件五年一次冬給狐皮帽領布面羊裘一件欽定大淸會典則例卷一百六十七
