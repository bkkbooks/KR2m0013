body:
  text: 禮部儀制清吏司冠服一皇帝冠服崇德元年定冠用東珠寶石飾頂服黃袍帶用玉飾金銜珠康熙二十二年定凡大典禮及祭壇廟冠用大珍珠東珠飾頂禮服用黃色秋香色藍色五爪三爪龍文雍正元年定祭服用天青明黃大紅月白四色織為圓金龍九當龍口珠各一腰襴小圓金龍采雲環之下作山水之狀一皇后冠服國初定凡慶賀大典冠用東珠飾頂禮服用黃色秋香色鳳凰翟鳥及五爪龍文一皇貴妃貴妃妃嬪冠服國初定凡慶賀大典皇貴妃貴妃冠頂用東珠十有二妃用東珠十有一禮服均用鳳凰翟鳥五爪龍段糚段八團龍段若黃色秋香色不得用嬪冠頂用東珠十禮服用翟鳥五爪龍段糚段四團龍段一皇太子冠服康熙十四年定冠頂用東珠十有三禮服用秋香等色五爪三爪龍段滿翠八團龍等段帶用玉版以金銜之飾以東珠一親王冠服崇德元年定冠頂三層上銜紅寶石中飾東珠八前舍林飾東珠四後金花飾東珠三帶用玉四以金銜之共飾東珠四坐褥冬用豹皮夏用蟒段襯紅白氊順治九年題準冠頂三層共飾六分以下東珠十舍林飾東珠五後花飾東珠四帶玉各飾東珠四貓睛石一補用五爪圓龍文四服用滿翠五爪四團龍段坐褥冬用純貂皮夏用五爪龍紅段襯紅白氊一世子冠服順治九年題準冠頂三層共飾五分以下東珠九帶用玉四以金銜之各飾東珠三服與親王同坐褥冬用猞猁猻緣貂皮夏用四爪蟒文藍段襯紅白氊一郡王冠服崇德元年定冠頂三層上銜紅寶石中飾東珠七前舍林飾東珠三後金花飾東珠二帶用玉四以金銜之飾緑松石四坐褥冬用豹皮夏用蟒段襯紅白氊順治九年題準冠頂飾五分以下東珠八舍林飾東珠四後花飾東珠三帶玉各飾東珠二貓睛石一服與親王同坐褥與世子同一貝勒冠服崇德元年定冠頂三層上銜紅寶石中飾東珠六前舍林飾東珠二後金花飾東珠一帶用玉四以金銜之飾寶石四坐褥冬用虎皮夏用閃段襯紅白氊順治九年題準冠頂飾四分以下東珠七舍林飾東珠三後花飾東珠二帶玉各飾東珠二補服用四爪圓龍文二及蟒文糚花等段坐褥冬用猞猁猻皮夏用藍糚花段襯白氊一貝子冠服崇德元年定冠頂二層上銜紅寶石中飾東珠五前舍林後金花各飾東珠一帶用玉四以金銜之飾藍寶石四坐褥冬用方虎皮夏用段襯紅氊順治九年題準冠頂共飾四分以下東珠六舍林飾東珠二後花飾東珠一帶玉各飾東珠一服與貝勒同坐褥冬用白豹皮夏用藍段緣以糚段襯紅白氊一鎮國公冠服崇德元年定冠頂二層上銜紅寶石中飾東珠四前舍林飾東珠一後金花飾緑松石一帶用玉四以金銜之飾藍寶石四坐褥冬用方虎皮夏用紅褐襯紅氊順治九年題準冠頂共飾四分以下東珠五舍林飾東珠一後花飾緑松石一帶玉各飾貓睛石一服用四爪方蟒繡餘與貝勒同坐褥冬用紅豹皮夏用紅閃段襯紅氊一輔國公冠服崇德元年定冠頂二層上銜紅寶石中飾東珠三前舍林飾緑松石一後金花飾寶石一帶與鎮國公同坐褥冬用狼皮夏用紅褐緣皂褐襯紅氊順治九年題準冠頂共飾四分以下東珠四坐褥冬用方赤豹皮夏用青閃段襯紅氊餘與鎮國公同又定不入八分公以下均用三分以下東珠一鎮國將軍冠服崇德元年定冠頂上銜紅寶石帶用金圓版飾紅寶石四坐褥冬用獾皮夏用皂褐襯紅氊順治九年題準冠頂中飾三分以下東珠一帶用方玉四以金銜之各飾紅寶石一補服用麒麟餘與鎮國公同坐褥冬用狼皮夏用紅褐緣皂褐襯紅氊乾隆二年議準坐褥夏用紅褐餘如舊制一輔國將軍冠服崇德元年定冠頂上銜藍寶石帶用圓金版坐褥冬用貉皮夏用皂布襯紅氊順治九年題準冠頂上銜紅寶石中飾小紅寶石一帶用圓金版四各飾紅寶石一補服用獅餘與鎮國公同坐褥冬用獾皮夏用紅褐緣皂褐襯紅氊雍正八年議準冠頂上銜起花珊瑚中飾小紅寶石乾隆二年議準坐褥夏用紅褐緣皂褐餘如舊制一奉國將軍冠服崇德元年定冠頂上銜水晶帶用玲瓏鋄金方鐵版四坐褥冬用野山羊皮夏用藍布襯紅氊順治九年題準冠頂上銜紅寶石中飾小藍寶石一帶用起花金圓版四補服用豹餘與鎮國公同坐褥冬用貉皮夏用皂布襯紅氊雍正八年議準冠頂上銜藍寶石或藍色明玻璃中飾小紅寶石乾隆二年議準坐褥夏用皂褐緣紅褐餘如舊制一奉恩將軍冠服順治九年題準冠頂上銜藍寶石中飾小藍寶石一帶用鏤花圓銀版四以金銜之補服用虎餘與鎮國公同坐褥冬用野山羊皮夏用藍布襯白氊雍正八年議準冠頂上銜靑金石或藍色涅玻璃中飾小藍寶石乾隆二年議準坐褥夏用皂布襯紅氊餘如舊制一宗室覺羅冠服順治九年題準閒散宗室服用蟒段糚段倭段金花段及各種花素段衣裾四啓得掛數珠馬繫繁纓得用青段坐褥襯白氊覺羅服用金花段倭段各種花素段康熙十一年題準宗室服許用貂皮猞猁猻一固倫公主冠服崇德元年定冠頂大簪舍林領約各用東珠八順治九年題準冠頂等各飾東珠十補服用五爪團龍文四服用糚段及滿翠翟鳥五爪四團龍一和碩公主冠服崇德元年定冠頂大簪舍林領約各用東珠七順治九年題準冠頂等各飾東珠九補服與固倫公主同一郡主冠服崇德元年定冠頂大簪舍林領約各用東珠六順治九年題準冠頂等各飾東珠八補服與和碩公主同一縣主冠服崇德元年定冠頂大簪舍林領約各用東珠五順治九年題準冠頂等各飾東珠七補服用四爪團蟒文二服用蟒段糚段各種花素段一郡君冠服崇德元年定冠頂大簪舍林領約各用東珠四順治九年題準冠頂等各飾東珠六服飾與縣主同一縣君冠服崇德元年定冠頂大簪舍林領約各用東珠三順治九年題準冠頂等各飾東珠五補服與郡君同一鄉君冠服崇德元年定冠頂大簪舍林領約各用東珠二順治九年題準鎮國公女鄉君冠頂等各飾東珠四輔國公女鄉君冠頂等各飾東珠三服與縣君同一王公等側室女冠服康熙四十五年題準王貝勒側室女封授比適降二等冠服等各視所降品級用貝子鎮國公輔國公側室女雖降等食五品六品俸其冠頂服色仍與鄉君同一親王福晉冠服崇德元年定適福晉冠頂大簪舍林領約各用東珠八側福晉冠頂等各飾東珠七順治九年題準適福晉冠頂等各飾東珠十補服用五爪團龍文四服用糚段及五爪四團滿翠翟鳥五爪龍段側福晉冠頂等各飾東珠九服與適福晉同一世子福晉冠服順治九年題準適福晉冠頂服飾與親王側福晉同側福晉冠頂等各飾東珠八服與適福晉同一郡王福晉冠服崇德元年定適福晉冠頂大簪舍林領約各用東珠七側福晉冠頂等各飾東珠六順治九年題準適福晉冠頂服飾與世子側福晉同側福晉冠頂等各飾東珠七補服用團蟒文二服用糚段蟒段及各種花素段一貝勒夫人冠服崇德元年定適夫人冠頂大簪舍林領約各用東珠六側夫人冠頂等各飾東珠五順治九年題準適夫人冠頂服飾與郡王側福晉同側夫人冠頂等各飾東珠六服與適夫人同一貝子夫人冠服崇德元年定適夫人冠頂大簪舍林領約各用東珠五側夫人各飾東珠四順治九年題準適夫人冠頂服飾與郡王側福晉同側夫人冠頂等各飾東珠五服與適夫人同一鎮國公夫人冠服崇德元年定適夫人冠頂大簪舍林領約各用東珠四順治九年題準適夫人冠頂等各飾東珠五服與貝子夫人同側夫人冠頂等各飾東珠四服與適夫人同一輔國公夫人冠服崇德元年定適夫人冠頂大簪舍林領約各用東珠三順治九年題準適夫人冠頂等各飾東珠四服與貝子夫人同側夫人冠頂等各飾東珠三服與適夫人同一不入八分公及鎮國輔國奉國各將軍夫人冠服崇德元年定冠頂服飾止準正室各照夫品級用一超品民公侯冠服崇德元年定冠頂上銜紅寶石中飾東珠二帶用金瓖玉版四坐褥冬用方虎皮夏用紅褐襯紅氊一民公冠服崇德元年定冠頂上銜紅寶石中飾東珠一帶用金瓖圓玉版四各飾緑松石一坐褥冬用狼皮夏用皂褐襯紅氊順治二年定冠用起花金頂上銜紅寶石中飾東珠三帶用金瓖圓玉版四各飾緑松石一八年定冠頂飾東珠四帶玉各飾貓睛石一九年題定補服或用麒麟或用四爪蟒坐褥冬用虎皮夏用青閃段襯紅氊康熙元年題準補服用四爪蟒一侯伯冠服順治二年定冠用起花金頂上銜紅寶石中飾東珠一帶用金瓖方玉版四各飾紅寶石一六年定冠頂飾東珠二帶用金瓖圓玉版四各飾紅寶石一八年定侯冠頂飾東珠三帶玉各飾緑松石一九年題準侯伯補服或用麒麟或用四爪蟒又題準侯坐褥冬用方虎皮夏用藍段伯坐褥冬與侯同夏用紅褐皆襯紅氊康熙元年題準侯伯補服用四爪蟒乾隆二年議準侯坐褥夏用青色緑花閃段伯坐褥夏用藍雲段餘如舊制一固倫公主額駙冠服崇德元年定與貝子同若原繫貝勒以上各照封爵用順治八年定冠頂飾東珠六舍林飾東珠二後花飾東珠一帶用金瓖圓玉版四各飾東珠一九年定坐褥冬用白豹皮夏用藍段緣糚段襯紅氊一和碩公主額駙冠服崇德元年定與超品公同如封爵在超品公上者各照封爵用順治八年定冠頂飾東珠四舍林飾東珠一後花飾緑松石一帶用金瓖圓玉版四各飾貓睛石一九年題準坐褥冬用方赤豹皮夏用青閃段襯紅氊十六年定在京額駙冠頂嵌東珠五坐褥冬用紅豹皮夏用紅閃段襯紅氊皆視鎮國公康熙三十年定䝉古和碩公主額駙頂帶坐褥皆照貝子品級三十九年奏準公主下嫁與在京額駙照例頂帶坐褥皆視鎮國公品級戴雙眼孔雀翎一郡主額駙冠服崇德元年定冠頂上銜紅寶石飾東珠一帶用金圓版四飾緑松石四坐褥冬用狼皮夏用皂褐襯紅氊順治八年定冠頂飾東珠三帶用金瓖圓玉版四各飾緑松石一九年題準坐褥冬用方虎皮夏用藍段襯紅氊康熙元年題準補服用四爪蟒雍正五年題準郡主額駙冠頂用珊瑚一縣主額駙冠服崇德元年定冠頂上銜紅寶石帶用金圓版四飾紅寶石四坐褥冬用獾皮夏用青布緣紅布襯紅氊雍正五年題準縣主額駙冠頂用鏤花珊瑚一郡君額駙冠服崇德元年定冠頂上銜藍寶石帶用圓金版四坐褥冬用貉皮夏用青布襯紅氊乾隆十二年奏準郡君額駙冠頂視三品官用藍寶石及藍色明玻璃一縣君額駙冠服崇德元年定冠頂上銜水晶帶用鋄金方鐵版四坐褥冬用青山羊皮夏用藍布襯白氊康熙四十五年題準貝子側夫人所生女額駙授為六品雍正五年題準縣君額駙冠頂用青金石一鄉君額駙冠服崇德元年定冠用金頂帶用鋄金圓鐵版四坐褥冬用鹿皮夏用白氊康熙四十五年題準鎮國輔國公側夫人所生女額駙授為七品乾隆十二年奏準鄉君額駙視五品官冠頂用水晶及白色明玻璃一品官冠服崇德元年定都統尚書冠頂上銜紅寶石帶用金圓版四飾紅寶石四內大臣大學士副都統護軍統領前鋒統領侍郎冠頂上銜藍寶石帶用金圓版四一等侍衛護衛參領前鋒參領學士滿啓心郎郎中冠頂上銜水晶帶用鋄金鐵版四二等三等侍衛護衛佐領漢啓心郎員外郎冠用金頂帶用鋄金圓鐵版四護軍校主事冠用金頂帶用鋄金圓鐵版二又定坐褥都統尚書冬用貛皮夏用皂布緣紅布內大臣大學士副都統前鋒統領護軍統領侍郎冬用貉皮夏用皂布以上皆襯紅氊一等侍衛護衛參領前鋒參領學士滿啓心郎郎中冬用青山羊皮夏用藍布皆襯白氊二等侍衛護衛佐領漢啓心郎員外郎冬用鹿皮夏止用白氊順治二年定一品