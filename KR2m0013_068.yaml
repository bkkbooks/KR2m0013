三年題準文官四品以上用蟒段懸數珠馬繫繁纓五品以下不得用十一年題準民公以下四品官以上及侍衛護衛佩刀帶飾櫜鞬許飾緑松石珊瑚寶石五品以下不得用五品以下官朝衣常服許用蟒段糚段倭段為緣舉人官生貢監生生員不得用貂皮猞猁猻白豹皮蟒段糚段金花段護軍領催未入流筆帖式準用青素段紬綾紡絲絹葛苧梭布狼狐貉羊等皮軍民及聽差人書吏準用紬綾紡絲棉紬繭紬屯絹葛苧梭布狼狐貉羊等皮冠用染騷鼠狐貉沙狐皮帽上圓月準用片金不得用狐沙狐段紗及段鞾鞾上不得緣緑斜皮器飾不得用金緣事革職人不得用貂皮猞猁猻蟒段糚段金花段僧道除袈裟法衣外服用與民同奴僕優人皂隸準用紡絲絹棉紬繭紬毛褐屯絹葛苧梭布狼狐貉羊等皮冠用染騷鼠狐貉獺皮樂戶準用杭絹棉紬葛苧梭布羊皮不得用諸種段匹皮衣冠用本色騷鼠涼帽用緑絹裏緑絹緣邊十二年題準五品以下官緣袖得用貂皮裘襟用貂尾其妻首飾等得用緑松石珊瑚未入流筆帖式護軍領催例同已故官員子繫護軍領催驍騎執事人雖未出分止照本身服用若未經任事者準視其父品級用六十歲以上閒散人準照護軍服用凡未入流筆帖式以下至兵民等不得用銀鼠皮二十四年覆準服色已有定例應再加申飭通行遵奉違者治罪二十六年題準凡官民等不得用暗花之四爪龍四團八團龍段及照品級織造暗花補服又似秋香色之香色米色亦不得用大臣官員有上賜五爪龍段皆令去一爪用三十九年諭部院筆帖式服用僭越至於未入流筆帖式不過與驍騎護軍相等其有僭越者著再行禁止欽此又定民公侯伯以上不入八分公閒散宗室四品官三等侍衛以上貂皮猞猁猻蟒段糚段等皆得用其藍翎侍衛亦得用無品閒散覺羅五六七品官不得用蟒段糚段貂皮猞猁猻八九品官不得用蟒段糚段大花段紗及貂皮猞猁猻白豹天馬銀鼠滿洲䝉古漢軍官往口外寒冷處出差貂狼猞猁猻照常用漢官不於口外行走四品職官以下槩不得用其漢官京堂以上翰林科道滿洲贊禮官仍準用一等二等三等侍衛參領郎中許用貂皮緣披領及袍閒散輕車都尉佐領騎都尉以下不得用如上賜及諸王貝勒等賞給者皆許用其無品級筆帖式庫使八旗舉人官生貢監生生員護軍領催等除大花段紗及天馬銀鼠皮外止許服尋常段紗紬綾絹屯絹葛布夏布布貉皮沙狐灰鼠狼狐羊等皮帽圍領許用貂皮其妻均視夫服用止許金耳環至漢舉人官生貢監生生員例同軍民書吏外郎不得服狼狐冠不得用貂緣飾革職官除貂皮猞猁猻蟒段糚段外其餘服色均得用帽緣得用貂有封銜者仍照品級用藍翎侍衛佩刀等照五品以下官例不得飾緑松石珊瑚寶石等物其官兵甲胄佩刀櫜鞬等不在禁例奴僕優人皂隸等狼皮狐皮並不得用又覆準多羅貝勒親隨頂帶補服外服色準視七品官固山貝子入八分公親隨服色準視八品官四十年定太醫院官醫士等服飾悉照御前侍從例四十六年覆準部院大臣並八旗閒散官上朝及坐班時如非下雨戴雨帽者治罪四十九年覆準內外文武官或議敘加級或捐納加級例不得過一品今緣捐納事例任慿加級遂自一品以至出品冠頂坐褥莫辨尊卑均與定例不符嗣後七品八品九品加級者不準過五品五品六品加級者不準過四品四品三品加級者不準過二品二品加級者不準過一品一品如都統等大臣照例飾東珠一坐褥用狼皮雖有加級不得用東珠二用虎皮坐褥大學士尚書雖繫二品均是一等職掌若有加級冠頂坐褥與一品同此外文武官雖有加級不準飾東珠仍飾小紅寶石貛皮坐褥行令八旗並內府佐領直省一例遵行倘有僭越該管大臣嚴拏交部治罪如該管大臣不行嚴察一並議處五十一年覆準文官朝服武官披執禁止濫用在京官遇朝賀祭祀到任封印開印照常用朝服各省官員拜牌到任封印開印祭丁入場亦照常朝服披執外其文武官謁見迎送上司止用補服如違禁濫用者事覺照違禁例從重議罪雍正元年諭大小官員有一定之品級即有一定之服式所以重名器也近多不按品級輒帶數珠馬項懸纓前用導馬更有將紬為坐具者尤為僭越嗣後應各按品級遵奉定例而行著八旗大臣步軍統領都察院嚴行稽察如有此等之人即行指參若大臣官員等徇情疏忽經朕察出將伊等一併議處再舊例諸王等以數珠鞍轡賞伊屬下者許其服用此等人員難於稽察嗣後著將賞用之處行文該旗存案年底彙奏如此則等威有辨而僭越者少矣欽此又諭上三旗前鋒侍衛等向戴孔雀翎下五旗前鋒侍衛等向戴藍翎嗣後著一例戴孔雀翎欽此二年題準凡文武大小官員頂帶補服坐褥皆有等級定例五六品官不得過四品三四品官不得過二品二品官不得過一品近來官員皆越本職僭用此皆該管大臣自行僭用以致所屬官員效尤成風嗣後凡加級官員該管大臣務察其於何任加級及何處捐納倘不行嚴察仍有僭用者一並議處又官員軍民服色定例禁用黑狐皮秋香色米色香色等類近來官員軍民以及家奴等皆濫行服用皆由該管官不實心奉行所致嗣後如有違禁僭用者該管官不行拏送事發將僭用人及該管官皆於例外加倍議處五年諭王公大臣官員等朝服頂帶皆有定制但平時所用服色未辨等級其應如何分析之處著議政大臣九卿會議具奏欽此遵旨議準自親王以下及見任並候補候選官員舉貢生監平時所戴涼帽暖帽皆照朝冠頂顔色分别等級親王世子郡王長子貝勒貝子入八分公咸用紅寶石頂未入八分公固倫額駙和碩公主額駙民公侯伯鎮國將軍暨一品官咸用珊瑚頂輔國將軍奉國將軍多羅額駙二品三品官咸用起花珊瑚頂奉恩將軍固山額駙暨四品官咸用青金石頂五品六品官咸用水晶石頂七品官以下及進士舉人貢生咸用金頂生員監生咸用銀頂通行八旗直省一例遵行六年諭凡革職留任降級留任之官員其升轉開列及停扣俸祿之處自有定例但此等人員既留原任職掌班次一切照舊其朝服頂帶亦應仍照準用其本任品級準其穿戴以肅威儀著大學士九卿會議具奏欽此遵旨議定嗣後凡文武大小官員革職降級奉旨留任者除升轉開列及停扣俸祿之處照例遵行外其朝服頂帶準其仍照本任品級用又題準都察院衙門官除左都御史副都御史僉都御史及御史用獬豸補服外其都事經歷筆帖式等官補服各照本身品級皆不得用獬豸補服按察使司衙門官除按察使巡道外其所屬經歷照磨等官補服亦各照本身品級用七品官改用鏤花水晶頂八品官仍用金頂九品官改用鏤花金頂進士戴頂與七品同舉人改用銀托金頂貢生改用銀托鏤花金頂生員監生仍戴銀頂又副參領給四品虛銜戴青金石頂由七品以下官補授副佐領者給與六品虛銜戴水晶石頂副驍騎校護軍校照八品官例用金頂七年諭百官章服皆有一定之制所以辨等威昭品秩也向來屢申禁飭不許逾分濫用以開僭越之端定例昭然各宜遵奉聞近來服色頂帶及坐褥頂馬繁纓之屬又有不按定例任意假借者御史有稽察部院之責而各御史中即有參差不齊之處是己身先有逾分違禮之咎又何以彈劾他人嗣後紫禁城內著三旗侍衛稽察大城內著步軍統領稽察外城著五城御史稽察倘有違例僭越之人而侍衛統領御史不行參奏别經發覺者將稽察之人一並處分欽此八年諭大小官員頂帽補服坐褥等項各宜遵照見任品級不得僭越從前已降諭旨後因御史等察奏文武官員內有補服與帽頂不相符者朕又降旨頂帶等項各按本身品級不得計算加級所頒諭旨甚明近聞文武官員仍有越制擅用者及該管官員察問時則引從前準算加級之例掩飾支吾甚屬不合嗣後內外文武大小官員帽頂補服坐褥等項悉照本身見任品級不得指稱加級以開僭越之端在京著有稽察之責者嚴行稽察在外著該管上司稽察倘仍不遵除將本人議處外其失察之官一並處分欽此又諭大小官員帽頂從前定議未曾分别詳確著該部再行妥議定制具奏欽此遵旨將會典所定朝冠頂及雍正五年所定平時冠頂細加參酌自王公至一品大臣以上均照舊例外議定輔國將軍暨二品官朝冠頂銜起花珊瑚平時冠頂同奉國將軍暨三品官朝冠頂銜藍寶石或藍色明玻璃奉恩將軍暨四品官朝冠頂銜青金石或藍色涅玻璃五品官朝冠頂銜水晶或白色明玻璃六品官朝冠頂銜硨磲或白色涅玻璃七品官素金頂八品起花金頂九品鏤花銀頂平時冠頂並同乾隆二年覆準紅絨結頂冠惟皇子不論爵秩均準用其餘王公以下額駙等暨民公侯伯一二品大臣侍衛內有䝉上賜者止得將所賜之帽用之不得如式更制郡王以下均不得用織金彩色五爪龍衣服及五爪暗龍段若上賜者許用仍去一爪若王等賞所屬織金彩色龍者雖服過亦去一爪方得賞給貂衣不得賞五品以下官其餘服物若品級未到者均不得濫賞緣貂朝衣惟三品以上有職掌大臣得用餘不得僭用內外各衙門供事書吏非役滿考職者不得僭用金頂耆老遵例用錫頂亦不得僭用金頂商賈有捐納職銜者冠帶服飾各從其品無職銜者與庶民同不得僭越奴僕等不得用段紗及各種細皮定制之後凡有違者王公宗室覺羅等由宗人府察參議處文武大臣由吏兵二部參處文武官由該管大臣及禮部都察院察參送部議處違式之物入官若王公等不能約束所屬文武大小官不能約東家人致有僭越者察出犯者分别治罪本主亦照例議處又題準王以下八分公以上雨衣得用紅色一二品文武大臣惟用紅色雨帽四年題準禮部司官主事司務均有監禮察班等職事令其一例用朝珠以肅威儀五年奏準禮部主事司務行人太常寺博士典簿讀祝官贊禮郎鴻臚寺鳴贊光祿寺署正署丞典簿國子監監丞博士助教學正學録等官惟在壇廟執事及殿陛侍儀準挂朝珠平時燕處及在公署均不得用違者科道指名參奏照違制例議處又定外省佐雜微員謁見上司不得用蟒袍違者照例參處八年諭嗣後一品大臣及御前侍衛等皆許用紅色雨衣欽此十年覆準凡考職吏員在籍止用頂帽不許僭用補服十六年欽定御用雨衣雨冠均用明黃色十九年奉旨嗣後自十一月初一日為始凡朝會祭祀皆用緣貂朝衣永著為例欽此又奉諭旨巡撫官階雖屬二品但係統屬通省大員嗣後各省巡撫著一體穿用大紅雨衣欽此又奏準凡朝會隨圍齊集間遇雨雪服用雨冠雨衣舊例三品以下至軍民雨冠均用青色宜有差别以示等威除雨衣仍舊穿用外一品至三品冠用紅色四品至六品紅色青緣七品以下有頂帶人員靑色紅緣均前濶二寸五分後濶五寸御前侍衛乾清門侍衛上書房翰林南書房翰林奏事處批本處行走人員不拘品級均得用紅色軍民止許用青色欽定大清㑹典則例卷六十五
