body:
  text: 户部俸餉下一京師兵餉八旗前鋒親軍護軍領催弓匠長月給餉銀四兩驍騎弓匠銅匠月給銀三兩皆歲支米四十八斛步軍領催月給餉銀二兩步軍一兩五錢鐵匠一兩至四兩皆歲支米二十四斛炮手月給銀二兩歲支米三十六斛由覺羅補前鋒親軍護軍者月加餉銀一兩教養兵月給銀一兩五錢不給米官畜馬駝每馬駝月給豆草折價銀三兩八旗官親隨兵坐糧領侍衛內大臣滿洲都統各八名蒙古漢軍都統前鋒統領護軍統領各六名步軍統領五名滿洲副都統四名蒙古漢軍副都統各三名步軍翼尉一名前鋒參領護軍參領驍騎參領各二名副護軍參領副驍騎參領前鋒侍衛上三旗內府參領各一名有半以上親隨兵每名月給銀三兩米折銀一兩八旗佐領上三旗內府佐領各於本佐領額兵內食糧一分民公四名侯伯各三名大學士尚書左都御史內大臣子各二名侍郎學士左副都御史通政使大理卿詹事散秩大臣男王府長史各一名以上親隨兵每名月給餉銀一兩米二斛步軍協尉給坐糧二分步軍副尉捕盜官各二分步軍尉一分均於額設步軍內撥給緑旗巡捕三營馬兵月給銀二兩步兵一兩皆月給米三斗每馬一匹月給豆草銀二兩五錢順治初年定滿洲都統準親隨兵八名蒙古漢軍都統六名護軍統領前鋒統領五名民公四名侯伯滿洲副都統三名蒙古漢軍副都統領侍衛內大臣大學士尚書左都御史子各二名侍郎左副都御史學士通政使大理卿詹事王府長史前鋒參領護軍參領驍騎參領男佐領各一名又題準八旗前鋒護軍領催驍騎每名月給餉銀二兩匠役一兩二年定覺羅充驍騎校者月給餉銀三兩四年題準新歸旗內滿洲蒙古漢軍兵未經撥給地畝者照例折給馬乾銀六年定步軍月給餉銀一兩九年定前鋒護軍每名月給餉銀三兩十年定領催每名月給餉銀三兩十二年定步軍領催月給餉銀一兩五錢康熙六年覆準領侍衛內大臣準給親隨兵五名內大臣二名九年題準前鋒護軍領催月給餉銀四兩驍騎月給餉銀三兩十四年議準前鋒護軍領催驍騎每月各減銀一兩十八年覆準散秩大臣準給親隨兵一名二十二年題準前鋒護軍領催驍騎餉銀仍照舊給發二十四年題準前鋒護軍領催驍騎每歲給餉米四十八斛步軍二十四斛均按春秋兩季支給又題準親隨弓匠長及各旗弓匠長月給餉銀四兩其餘弓匠月給餉銀三兩二十五年奉旨步軍等餉銀每月加給五錢雍正元年議準見今八旗滿洲都統親隨兵八名蒙古漢軍都統各六名領侍衛內大臣前鋒統領護軍統領步軍統領各五名滿洲副都統三名蒙古漢軍副都統各二名步軍翼尉一名所得銀米舊例與驍騎相等後經裁減每月止給銀一兩米二斛應將副都統護軍統領步軍統領步軍翼尉等親隨兵仍照舊數給銀三兩至領侍衛內大臣職任較大其親隨兵數應與滿洲都統同前鋒統領護軍統領皆有管轄兵丁之責其親隨兵數應與蒙古漢軍都統同並支領銀三兩此項親隨兵毋庸給米照米數歲折銀十有二兩於支米時給發二年諭八旗大臣等親隨兵錢糧有領受者亦有不領受者此後著一槩照例給與欽此遵旨議準每旗前鋒參領二人前鋒侍衛二人護軍參領十有六人副護軍參領十有四人其前鋒參領護軍參領皆有食一兩錢糧之親隨兵一名今增給錢糧二兩米折銀一兩至前鋒侍衛副護軍參領向無親隨兵亦給與一名每月食錢糧銀一兩米折銀一兩奉旨前鋒侍衛亦照參領給與七年諭近有奏請上三旗增設副護軍校者朕思八旗佐領下均有副驍騎校八旗每佐領下著增副護軍校一人副驍騎校副護軍校每月著加賞銀一兩共食餉五兩米照常再從前所授副驍騎校均有頂帶今增授副護軍校亦著給與頂帶藍翎欽此八年奏準五城地方大小街衢設柵闌四百四十座每柵闌設緑營步兵二名共增步兵八百八十名於三營步兵隊內給與月餉令其輪班看守十二年議準八旗兵丁餉銀除老病告退人等其名已列入餉册送部例不增裁外伊等有闕頂補毋庸零星咨部其在逃獲罪斥革等闕令該旗於出闕之時即咨部注册以便核對追繳錢糧倘有領催人等將上月出闕日期揑報下月及侵分應繳錢糧者該旗都統察出即題參交部治罪並將失察該管官辨一并參處又議準八旗兵丁餉銀繫按月關支米繫豫領一季除老病告退及病故者仍照舊免追外嗣後革退在逃各兵所領一月餉即於革退及報逃之日按日追繳領過之米於一月內革退報逃者追繳後三月米兩月以內者追繳後兩月米三月以內者追繳後一月米三月以外免追十三年議準八旗護軍月支餉銀四兩驍騎三兩今將伊等歸并火器營其正身滿洲遇有護軍前鋒闕出遴選拔補後再照例支給餉銀四兩其養子及别載册籍人等既補驍騎若仍支錢糧三兩五錢似屬不均應裁去五錢照驍騎例支給三兩又議準公主等府屬兵均繫內廷撥給毋庸議外其郡主看門兵準給五名縣主郡君各四名縣君三名鄉君二名每名月給銀二兩每季米八斛郡主等薨逝後仍給錢糧令其看守墳墓如郡主等革去品級將銀米一并裁革乾隆元年諭八旗護軍校驍騎校等原繫食俸之人因欲令伊等用度從容故將俸改餉銀而遇閏之年不得與兵一例支領閏餉用度未免拮據著於本年為始凡遇閏月照兵丁例支給閏餉欽此又議準八旗世爵自男以上已有親隨兵若兼都統參領者只準一處支給不得重領又議準八旗佐領賞給親隨兵原因其有辦事之責此內如别有差委及不能辦理佐領事務或年幼未曽辦事者均停給别給委署之人若委署之人原有本任親隨兵則停其重給至差往軍前牧場等人繫出征效力其代署佐領之人停給仍給本人永為定例又議準八旗滿洲副都統原定親隨兵三名較滿洲都統少五名應加一名蒙古漢軍副都統原定各二名較蒙古漢軍都統各少四名應各加一名護軍參領前鋒參領驍騎參領原定各一名應各加一名副護軍參領副驍騎參領前鋒侍衛原定各一名應各加半名其上三旗內府參領等一例給與以上每名給餉銀三兩米折銀一兩按月關支至八旗佐領並上三旗內府佐領從前原各有親隨兵一名於康熙四十三年裁去今應於本佐領下額兵數內各給一分以資養贍又議準尚書侍郎等兼管都統副都統者其都統等任內親隨兵應準兼支郎中等兼佐領者亦準兼支又議準都統副都統參領有兼佐領者已支都統等任內親隨兵其佐領親隨兵不準兼支又議準各旗賞給都統副都統等職銜見有差委者仍照例支給親隨兵給空銜不任事者不準支給又議準額外都統副都統參領副參領等見在辦事者準給親隨兵不辦事者不準支給又議準文官三品以上原有親隨兵者仍照舊支給又議準都統等官奉差在外無養廉者準支親隨兵有養亷者不準支六年題準巡捕三營馬匹豆草無論年歲豐歉價直低昻每營馬一匹月折銀二兩五錢由部按月支給再向例給領價直按時價每兩扣存銀一錢名為節省今既酌定銀數再扣一成節省恐致不敷應免其扣存按照時價實數支給歲終令步軍統領將三營領過豆草乾銀數目造册送部核銷九年題準八旗兵米每季均有撒尾由領催等總領分支如有侵減之弊該都統立拏送部究處十四年定旗員革職留任並間散之人奉旨署理職任所辦事務與見任實授官無異應得親隨兵一例給與十五年議準在京八旗漢軍補授大學士尚書等職者原繫漢額毋庸給與親隨兵又議準八旗兵丁月餉册籍例於前一月十五日過部分别支扣嗣後兵餉凡升轉病故若於十五日即照餉册未經過部例辦理至十六日仍照餉册已經過部例辦理一直省兵餉馬兵月給銀二兩步兵一兩五錢守兵一兩皆月支米三斗馬兵每名給馬一匹春冬月支豆九斗夏秋六斗草均三十束八旗駐防武職丁糧馬乾將軍家口四十名馬五十匹副都統家口三十五名馬四十匹協領家口三十名馬三十匹佐領家口二十名馬二十匹防禦家口十有四名馬十有五匹驍騎校有品級筆帖式家口十有二名馬十匹未入流筆帖式領催驍騎家口七名馬六匹弓匠鐡匠家口五名馬三匹餉銀驍騎炮手月給二兩弓匠鐡匠一兩水師營兵與陸路兵同水手艌匠二兩至一兩不等直省緑旗武職親丁名糧提督八十分總兵官六十分副將三十分參將二十分均馬步各半遊擊十五分馬七步八都司十分守備八分均馬步各半千總五分馬一步四把總四分馬一步三順治元年題準凡部撥各省餉銀由布政使司轉發駐防兵馬處支給又定各處兵糧户部酌定題請截留漕糧支給如京城需米仍令起運就近採買供應又定各鎮馬兵月給餉銀一兩五錢步兵一兩二年定駐防關口及外省甲兵月給餉銀一兩又議準兵丁自備馬匹編入營伍騎操者給與草料各將辨自備不繫行伍差調者不得槩給三年覆準每馬一匹日支豆四升草一束又定八旗兵駐防逺地每名月給米五斗四年題準馬兵月給銀二兩步兵一兩五錢守兵一兩馬乾草豆照例按季關支春冬有豆草處每匹月給豆九斗草三十束每束重七斤無豆草處月給乾銀一兩夏秋有放青處月給乾銀五錢無放青處月給乾銀九錢又題準各鎮兵無論馬步戰守每名月給米五斗與餉銀按季同支五年定各督撫於題請兵餉疏內開列該撫額徴錢糧見在實數及兵馬歲需餉乾數目以便部撥又題準各鎮兵有米處支米無米處照時價折給又定發餉均用倉斗各鎮兵每名月給米三斗八旗駐防兵每二口月給米五斗又覆準各邊撥給屯糧不産米地方以小麥照數扺兑又覆準浙江駐防兵馬仍支本色緑旗營馬無論春夏月均給乾銀一兩又議準各旗兵馬每匹日給草二束六年覆準福建營馬每匹月給乾銀一兩八年議準駐防官兵既按口支發糧餉草豆其行月錢糧永行停止十年議準奉調出征兵月餉皆令軍前全支其家止給月糧三斗十一年覆準各督標兵馬三步七均為戰兵馬兵月支餉銀一兩五錢步兵一兩均月支米三倉斗無米折給銀四錢十二年題準兵丁皆給月糧若出征給與行糧月糧止給一半又議準各標兵馬有放青地方春冬月給乾銀九錢夏秋五錢無放青地方春冬月給乾銀一兩二錢夏秋九錢十三年奉旨嗣後兵丁出征差遣其家口月餉仍準全給又覆準水師營內正舵捕盜月給餉銀一兩八錢水手兵一兩又題準各省駐防都統限定家口六十名副都統四十名參領三十五名防禦三十名兵二名均給月糧十四年覆準各省駐防及緑旗官兵馬匹産豆省分照舊給豆其餘以本省所産糧米撥給又題準各省兵餉由部會計先撥十分之八其二分俟開送兵馬實在數目到部核明補給十七年議準駐防各官及督撫提鎮等家口向來月給餉銀二兩三匹馬草料今定月給餉銀一兩一匹馬草料又覆準京口水師增設捕舵什長繚碇手每名月給銀一兩五錢水手匠役一兩均月給米三斗康熙四年議準雲貴駐防驍騎家口月米每口二斗五升六年題準各省駐防領催家口限定七名驍騎限定五名均支月糧十三年議準陜西兵月糧均為三分二分撥銀一分撥米十九年議準荆州等處駐防兵每兵支給十名口糧三匹馬草料二十二年議準各處駐防將軍限定家口四十名馬五十匹副都統家口三十五名馬四十匹協領三十名馬三十匹佐領二十名馬二十匹防禦十有四名馬十有五匹驍騎校有品級筆帖式十有二名馬十匹未入流筆帖式領催驍騎七名馬六匹弓匠鐵匠五名馬三匹各準支給月糧草料二十三年題準各省駐