戰二守八俾樁手均食戰糧以賞勤勞今思直隸河工雖不得與二省比並然樁手較衆兵效力為多亦當加恩鼓勵著將直隸河兵改為戰一守九俾用力較多之樁手得食戰糧以厚其養贍欽此又題準江寧水師戰船隨糧準於建曠銀米內動給又議準江南水師營操演戰船二十隻舵工二十名每名各給守糧一分歲支餉銀十有二兩米一石五斗於建曠銀米內動給又題準直隸天津水師營都統有統轄訓練之責照八旗滿洲都統例給親隨兵八名每名月支銀三兩米折銀一兩又題準廣東左翼右翼二鎮廣州羅定二協增城三水崖州三營增設月餉共米六千五百三十四石準於駐防同城及附近順德等十三州縣田賦銀內各照原編科則每石除銀自九錢四分七釐至一兩四錢一分有竒共除銀七千三百六十六兩一錢九分有竒改米徵收就近支給新兵並外委官辨月餉其原領折米價銀扣貯司庫充餉又議準各省冬撥估餉各册定於十月內到部逾限者參處又覆準各省武職親丁名糧除出師官辨準其全支外其委署此任者如繫候補試用之人原無隨糧應照酌給之例署副將酌減十分給二十分署參將減八分給十二分署遊擊減五分給十分署守備減二分給六分各按所署之任酌給又題準各省武辨保題引見之人不免往來車馬之費仍支本任內一半親丁糧其一半扣存造報如委署繫候補試用人員即將扣存之銀按例支給如見任兼理並遞行委署出師引見員闕者各有本任自應仍支本任應得之數毋庸重給惟升遷事故員闕額設親丁糧並無原官支食者其署任支給之例亦應酌量變通如繫候補試用人員則應全支如見任遞行委署之人亦應即照所署之職全支其末後一官如繫見任兼理之人則於本任內準其全支署任內準其支給一半其一半仍扣存造報以備公用若繫候補試用人員仍準其照例全支又奏準參將以下遇有親喪給假如見任兼署為時無幾且該員原有本任親丁隨糧仍支本任如委署候補人員照酌給之例支給將所遺親丁隨糧扣存造報再委署引見並給假葬親員闕為時無幾停其遞行委署四年覆準陜西涼莊一帶駐防兵歲需口糧除五分小麥仍給本色外其餘五分以本地附近所産米給與一半本色其餘一半照秋後十月間粟米時價折給馬匹應支料草亦給一半本色其餘一半亦照秋後各色時價折給又題準浙省乍浦分駐旗營加給兵米萬五千七百六十石有竒照省倉折色採買之例每石折銀一兩四錢自五年為始於本年秋成時動支田賦銀給發乍浦同知採買存貯支給仍將用過價腳銀數造册報銷五年題準湖廣綏寧營兵餉本色不敷自五年為始每石折銀加至一兩所加四錢米價在於支剩解部米折銀內動支俟地熟價平之日照六錢例支給又覆準山海關改設副都統應每月支親隨兵二十分每歲支心紅紙張銀十兩又議準福建澎湖一協歲需餉銀兩季委官赴省關領逺隔重洋兵食不能接濟於藩庫豫撥一半餉銀運往澎湖通判庫內倘逾餉期該副將一面備文借領散給一面詳報察核俟餉銀領到歸款備用又題準直𨽻黃崖關增設馬守兵月支米每石折給銀一兩馬乾夏秋二季每匹月支銀九錢春冬二季月支銀一兩二錢均於田賦銀內動支造入豫估册內報部酌撥七年諭甘肅地方逺在邊陲土瘠兵貧非內地可比向來散給兵丁口糧皆繫四本八折而倉貯不敷之處又於四本之中多給折色是兵丁之得本色愈少矣每當米價昂貴之時所領折色不敷糴米之用度日未免艱難著將舊例每糧一石折銀一兩者增銀二錢定為一兩二錢之數料豆亦照此加增自乾隆七年秋季為始永著為例俾邊逺寒苦兵丁俯仰寬裕他省亦不得援例以請欽此又題準湖廣荆州駐防兵歲需米十萬石僅貯襄漕五萬餘石其餘武昌等屬應支兵餉無多存貯易致紅朽應將鄖陽等五倉原貯襄漕米內鄖陽撥出二千石東湖襄陽各撥出米三千石穀城均州各撥出米五百石共米九千石改歸荆倉支發駐防兵米又題準青州駐防兵歲需粟米半給本色半給折色如遇閏之年所需閏月本色米在於青州府倉榖內碾米支給計米一石扣銀一兩貯於府庫秋後買榖還倉東省榖價日昂每榖一石需銀六七錢有餘官民賠纍東省向有改徴黑豆十有一萬石以為在京八旗官兵及理藩院等衙門牧養駝馬之需亦繫隨漕起運豆價實賤於米價况青州地方原繫出産豆麥之鄉該地買豆則易買米則難應將附近青州各州縣內改徵黑豆項下量撥萬七千餘石仍照舊例徵收粟米運交青州以作兵糈即以青州榖價在於本境採買黑豆以補解京之數仍依限隨漕起運又題準湖南提標鎮筸等十四標營歲需兵餉見支六錢折價米貴兵艱應以該省停運貴州米二萬石分撥支給可供四月有餘不敷之米於各兵應領米折銀內豫領一季令營辨於秋後買米存貯俟來年本色米完將所買一季之米分作二季銀米各半搭放湖北督撫等標鎮營兵餉每米折銀七錢較湖南雖裕而時價仍有不敷應將全支折色各營每年豫給二季令營辨於秋成之後購買俟次年米貴之時按月支發又覆準湖南永順地方改土歸流增設營兵支給本色多有未便仍以折色支給至折色之後偶遇價昂亦應豫籌將永順縣節年所收榖內分撥三四千石貯於新建各倉以備接濟又議準甘省土瘠地磽産糧有限兵丁買食艱難應於每年九月協餉一半銀內於四月以前先解銀五十萬兩於各營關支秋餉之時即將冬春糧折銀一并豫領責令營辨及時買備按時給發又題準甘肅安西提標各營兵餉赴蘭請領往返兩月有餘令兩季兼領交與西安道廳衛貯庫季首文武會同散給再豫領冬夏二季餉銀時如鄰省協餉不敷先於司庫不拘何項銀內借支給領俟協餉到日照數還項八年諭兵餉有搭放制錢之例江南於乾隆六年設局鼓鑄僅設爐十二座鑄出之錢不敷搭放兵餉又核計成本每銀一兩鑄出錢八百九十六文是以題明每銀一兩止折制錢八百八十文餘錢十有六文充作錢局公費及運送餉錢之水腳等項經部議覆搭放兵餉暫照八八折發俟將來銅價漸減錢價漸平再酌增錢數或照舊制每錢千文作銀一兩搭放等語朕思兵丁所得月餉僅足以敷食用若搭放制錢又行除扣則所得減少著自乾隆九年為始仍照定例每銀一兩給錢千文其錢局公費運錢水腳準動公項稍有不敷成本照例準其銷算至見在鼓鑄各省如有折扣搭放者亦一例加恩照江南之例給發欽此八年題準武職官親丁隨糧改為養廉名糧嗣後各省大小武職遇有降革留任者準照文職降革留任之例一例支食養廉名糧以資辦公之用又題準雲南東川昭通鎮雄等府州均繫新闢夷疆人民交易在在需錢照東鎮之東川鎮雄尋霑三營每年官兵俸餉馬乾等銀十有四萬九百餘兩應以銀七錢三每錢千二百文作銀一兩搭放其錢即於東川局內動支仍扣餉歸還鑄本均造入鼓鑄及兵馬奏銷案內具題報銷又題準雲南普洱府屬寧洱縣夷民完納秋糧應改折色每石折銀一兩令該縣照數徵收採買本色以供兵餉九年諭上年朕降諭旨各省搭放兵餉自九年為始每千錢作銀一兩使兵丁各霑利益今聞江西南贑鎮標之十一營舊例自春夏以至秋仲計八月兵餉皆就近於贑關稅銀內支給秋末至冬季四月兵餉因稅銀不敷仍赴司庫支領其在司庫支領之四月則一例搭放一成鑄錢其在關稅內支領之八月則無錢搭放兵丁等不能霑格外之恩且關稅所支八月共銀四萬六千四百七十餘兩計一成搭放共需錢四千六百四十餘緡該省存庫制錢盡足搭放所需水腳亦屬無幾著自十年為始南贑鎮屬兵餉每年四季亦一例搭放一成制錢欽此又題準福建建寧鎮額兵內新增守兵四百名又徹回分防寧壽縣汛兵百有二名各兵月糧遞年給支折色其餘舊兵均支本色在米價平減尚可支持近價增長實屬不敷應將該鎮見在所支本折米數不分新舊均勻支給以免偏枯又題準江西兵不敷支給閏月米即於裁兵米折銀內酌動採買以濟兵糈又題準寧夏採辦駐防兵餉如遇豐年盈餘價銀歸入節省項下收貯司庫倘遇歉歲不敷即將節省銀酌量增補又題準陜西旗標兵本色米向例將上年額徵之米估計供應次年兵食今應將備貯之榖易米貯倉已買榖四萬九千七百餘石碾米支發兵餉未買之榖俟年豐價平即買米貯倉遞年支發統於額徵屯米內照數撥補還項倘遇歲歉價昂屯丁完納不前即以貯倉之糧給兵再有多餘減價糶給俟價賤買補再省城駐防及緑旗營官兵歲需米八萬石今貯穀僅十萬石不敷一年之用應再增買米三萬石以足一年兵糈所需價銀在於田賦銀內動支又覆準江西兵米向例按月支給原未編有閏月兵米計算應需米四千餘石約扣建曠米七八百石三年共應扣存米二千餘石尚不敷米二千餘石應於餘剩米折銀內豫行動支酌照時價採買以濟兵糈又題準四川夔協增設巡哨十船歲需舵夫水手餉銀米折共銀四百五十餘兩在於夔關稅銀內就近給發年終别行造册報部察核又奏準甘肅新改河鎮所轄江城苦水二堡坐落河西汛防與內地不同將二堡兵歲支折價糧料二百一石六斗每石折給銀一兩之外加銀二錢十二年題準福建倉榖碾米給兵秋成徵收折色買榖貯倉殊多周折嗣後按各屬徵收米色之數統於倉內全行碾米發給兵餉秋成以一米改徵二榖歸還倉項至汀州府屬解省米題定每石以九錢徵收即以九錢解省給兵毋庸别議再延建等府運省米亦一例徵榖以昭畫一十五年題準京口駐防兵歲需米前於康熙二十五年議定先盡丹徒一邑漕糧撥給嗣於雍正二年因漕糧不能歲內全完而兵糈又難隔年待放議令每米一石折給銀一兩二錢今價昂不敷買食應仍於丹徒縣漕糧內截留充餉不足於附近之丹陽金壇二縣漕糧內各半截撥遇閏應增之米亦於丹徒丹陽二縣內各半截留支給十六年諭乍浦水師滿兵自雍正七年設立於杭州江寧二處餘丁內選取移駐原定每名月支餉銀二兩米一石伊等水陸操防差務繁多而移駐將及二十年家口漸增所領銀米不敷食用自應加恩照杭州駐防之例給與米二石五斗其應支本色折色令該將軍督撫副都統酌量辦理欽此遵旨議準除原支米仍按月關支本色外其每名加增米一石五斗應按月支給折色於田賦存留款內動用十七年諭陕省今年被旱偏災米豆草價直昂貴駐防兵所領折支銀未免不敷購買著將十八年春季分西安駐防應領折支米豆照原定每石一兩之數加給五錢草價加倍賞給俾兵丁不致增價採辦欽此又奏準京口駐防歲需兵米六萬六千四百有二石自本年為始於丹徒丹陽金壇三縣漕糧內豫年分撥截留遇閏應增之米亦令豫先截留備支又覆準各省支放兵糈及豫借口糧均令營員會同地方官驗看米色秉公放給如有攙和黴爛或豫為借給希圖掩飾營員贍徇容隱者該提鎮咨報督撫即據實參奏若地方官支借好米而營兵故為勒索不肯領受者督撫提鎮隨時嚴懲以申法紀又覆準廣西太平思恩兩府所屬之新太隆憑馗纛三里上思鬱林思恩鎮安上林隆林右江等十一營兵米自雍正五年改為折色每石支給銀八錢今米價日昂不敷買食應改為半本半折支給其半支折色於司庫隨餉散給半支本色每年春夏各於所駐之州縣倉榖內按月支給仍令桂林府屬將額徵兵米於次年春間照時價糶賣解司給發各州縣買榖還倉一優恤俸餉順治二年題準覺羅幼丁每人月給銀二兩十年題準世爵無子繫兄弟承襲者所支俸銀祿米與故官之母妻均分至舊給田園留與故官母妻亡後給與應得家産之人永為定例十二年題準世爵無人承襲者其妻照夫爵秩給俸銀祿米之半養贍終身十三年議準宗室內無人承襲者郡王福晉歲給俸銀千五百兩貝勒夫人八百兩貝子夫人五百兩祿米隨銀支給公將軍夫人給其夫俸銀祿米之半又題準官員已故其妻服制內照夫品級給與半俸銀米服滿停止十五年議準宗室福晉夫人等寡居其子未襲封以前給與半俸十八年議準旗員年至六十以上致仕者照原品給與半俸銀米康熙七年題準外任旗員有革職休致仍留世爵者該都統咨部以到京為始給與世爵俸祿十二年議準旗員年至六十告老解任者分别食俸深淺有無效力以應否給與半俸具題請旨未至六十告病解任者不準給俸駐防官辨告老仍在外省居住及漢軍任緑旗官年老告退回京者不給半俸內府佐領官及有世爵承襲者亦不準給五十六年議準世爵未襲以前有妻子者準食半俸已襲爵未及年歲者亦準食半俸至及歲上朝準食全俸雍正十二年議準八旗致仕官奉旨賞給俸祿及身有世爵未承襲者均照未及歲未上朝之世爵例給以半俸十三年議準八旗寡婦不論年歲有無子嗣情願守節者兩族佐領具保照例給與一年半分俸餉該佐領等不得借端勒索又議準八旗已故官兵寡婦年至四十已有子嗣情願守節向兩族人等取結給與一年半分俸餉令其守節其年幼寡婦不論年嵗有無子嗣情願守節者該佐領等即具保結照例給與一年半分俸餉準其守節又議準定例間散宗室年及二十歲者月給銀三兩米三斛父故後其子不俟歲滿亦給月餉銀三兩間散覺羅年及十八歲月給銀二兩米二斛其未及歲之覺羅及給月餉米養贍寡婦向無定例均由各該旗酌量支給嗣後宗室覺羅等已及歲者照例支給其養贍寡婦月餉一槩停止至覺羅孤子照宗室之例父故後不俟歲滿給其一子月餉銀二兩如寡婦之子內有一子食俸餉者其餘子不得支給孤子月餉其已食孤子月餉之子至食餉之年不得仍前令其分居更將一子指行月餉覺羅寡婦乏嗣有將其夫近支子弟一人撫養為嗣守節者承嗣之子亦照孤子不俟歲滿例支給月餉銀二兩其嗣子已及食餉之年不得再繼一子支餉如寡婦病故其養贍寡婦之子已及食餉之年毋庸置議外未及年歲者其養贍寡婦月餉即行裁扣永為定例乾隆元年諭凡大臣中有引年求退奉旨以原官致仕者均繫宣力有年素為國家優禮之人雖經解組仍當加恩以示眷念耆舊之意見在滿漢大學士暨曽為部院尚書豫告在家者均著照其品級給與全俸在京於户部支領在外於該省藩庫支領永著為例欽此又奏準內府佐領內管領下年老無嗣及孤子寡婦除有産業者不給外其應行養育之人月給一兩錢糧俟孤子長成拔補驍騎執事等差仍裁二年議準各省緑旗軍政致仕官員內如有從前曽經出征效力者雖年老衰憊實難勝任準其原品休致仍令其子弟一人入伍食糧如無子弟給與守糧一分以資養贍又奏準八旗設教養兵以養贍寡婦幼子凡有二人闕遴選三人給與餉銀二兩原食餉銀三兩者仍給三兩如教養兵年至二十五歲不能射箭入選護軍驍騎者即行革退或充步軍至教養兵內有父兄陳亡子弟孤寒本身殘疾者仍給教養兵餉以資養贍三年諭大學士尚書內原品休致大臣給食全俸永為定例從前諭旨如自奏乞休朕加恩準令原品休致者著即照此旨給食全俸其遇京察自陳朕加恩準仍原品致仕者該旗該部以應否給食半俸具奏請旨若非自行奏請朕特旨令其原品致仕及遇京察自陳部議致仕人員不必給食俸祿至於八旗武官具呈告退均有量其軍功給食俸祿之例嗣後一二品武職大臣若自行奏請朕加恩準令原品致仕者著該旗察其軍功及食俸年分以或給全俸或給半俸具奏請旨若非自行奏請朕特令其原品致仕者不必給食俸祿欽此又諭從前聖祖仁皇帝時曽將陳亡兵丁之寡婦無依者永食半俸錢糧今八旗寡婦無子嗣又無家下食錢糧可依之人皆各加恩賞給錢糧况陳亡兵丁之妻其夫為國捐軀又守貞節其情更屬可憫宜格外加恩著交與八旗將陳亡官兵之寡婦等除有子嗣當差或家下奴僕有食錢糧可依者不議外如無子嗣或子年幼又無家下食錢糧可依之人各照其夫原官給與半分俸銀俸米若繫兵丁給與半分錢糧俾永逺受恩陳亡之人無妻止有父母者果無子嗣又無可依錢糧亦照此例給與欽此又奏準八旗賞給半俸半餉官兵寡婦悉照其夫所食正俸正餉折半給與一年又八旗原食半俸餉陳亡官兵寡婦即有子選為教養兵者仍準照數給與以資養贍俟其子長成或充各執事其所得銀米計足抵寡婦所食一半俸餉銀米時再行停止又議準八旗兵丁病故後其妻寡居向支一年半分錢糧惟前鋒護軍領催驍騎曽在軍前效力又經得有軍功後因病或殘疾告退及年六十以上告退者不論有無房屋可倚並有無子孫見在食餉每月給銀一兩米一斛若在軍前未立軍功者無房屋又無見在子孫可倚者每月止給銀一兩此等人年老病故之後其妻寡居更屬可憫應照其夫食過錢糧之數給與一年銀米其無米者亦月給銀一兩又議準凡八旗病故官員其妻例應支食周年半俸惟世爵未領周年半俸之前一經承襲不準請領嗣後未及支領周年半俸世爵已經承襲者繫子孫及親兄弟承襲不準給領外如旁支承襲族分較逺其寡婦周年半俸仍準支領又議準八旗未經上朝之世爵凡有承襲絶嗣之雲騎尉或因年幼未上朝者照依應食半俸之數支領五年諭今各部院將不能辦事年老官察奏休致朕思旗人皆賴俸餉度日一經休致必致失所殊非朕愛養旗人之意向例武職官因老病不能行走休致者視其勞績或賞全俸或賞半俸以養餘年今休致文官皆見在行走之人雖不能在部辦事若委以旗下看守直班之任尚能行走且藉此得俸養贍可以不致窮困將此等休致文官交與各該旗大臣照依原品官級與武職官一例給食俸祿暫令在旗行走俟其本旗步軍尉及守護壇廟尉吏城門領員闕即對品坐補欽此又諭朕思兵丁捐軀行陳情實可憫其豫支銀理應豁免若必待特降諭旨恐其中不無一二遺漏著為定例凡遇有此等事件該部援例請免庶恩恤之典可垂久逺欽此又覆準八旗官兵物故其妻守節者均照例給食半分俸祿錢糧一年其開户兵丁之妻不準支給如開户人等內有出兵中傷得功牌陳亡者亦照正户人等之例給賞周年錢糧六年議準駐防官兵身故寡妻願歸旗者俟到京後照在京八旗之例支給半俸半餉其正户官兵之寡婦願留彼處倚靠子姪親族養贍守節者照在京八旗之例不論年歲及有無子嗣該管官具保給與半俸半餉一年如繫年老告退因有軍功食半俸半餉之寡婦亦照在京之例仍按其夫所食半俸半餉之數給與如原繫世爵子孫已經承襲領俸者寡婦半俸停其支領又奏準八旗無依寡婦給與教養兵錢糧養贍終身七年議準八旗遊牧察哈爾內有已故官兵之寡婦情願守節者均照在內八旗之例支給半俸半餉一年又議準下五旗入於公中府屬佐領下無力養贍之孤寡人等照上三旗內府佐領內管領下之例每月給與一兩月餉如人口稀少者月給銀一兩不給米十一年議準定例宗室年二十者月給餉銀三兩雖足養贍家口間有子息衆多未及歲者一分月餉難以敷用嗣後十歲以上之宗室均月給銀二兩俟年至二十仍給銀三兩十二年議準外省回旗寡婦俸餉在外支領本色者回京後照其夫原食之數給與一半本色在外支領折色者回京後給與一半折色如繫半本半折者亦照半本半折給與十四年奏準嗣後親王以下宗室公以上其福晉夫人遇有寡居其子未襲封以前毋庸給與周年半俸至鎮國將軍以下爵秩與品官相同仍照舊例支給半俸一年十五年議準八旗世爵因病停俸雖與見任不同但病痊即得起用病故亦準承襲應給其妻半俸一年若革職留任雖期滿開復究非無事故者可比其妻不便支給半俸至降級留任之員病故仍照所降之級支給其妻半俸一年十八年奏準八旗革職官未完罰俸銀前經奏準照外官之例一例追繳但該員無力交納催追終屬無益嗣後如有未完罰俸銀暫行注册有開復原職及再行起用者照數扣繳又奏準八旗世爵官未及歲者例支半俸嗣後如年幼世爵隨其父兄外任其半俸槩行停止俟回京後給與又奏準八旗外任營員以老病告休歸旗因有軍功給與全俸半俸者照在外原食俸銀支給較之在京旗員不及十分之五似覺有名無實若照在京旗員之例一例按品支俸又未免過優嗣後八旗外任營員告休有軍功賞給全俸半俸者按其原品酌減一等照在京旗員之例支給俸銀俸米外任告休文職有因軍功賞俸者亦如之又奏準嗣後八旗教養兵闕每原額三名增設一名各給銀一兩五錢又奏準八旗駐防官因老病告休歸旗遇有軍功賞給全俸半俸者其俸米照在外之數關支較在京旗員應支俸米為數轉多應照在京之例給與又奏準定例間散宗室十歲以上者月給銀二兩二十歲者三兩間散覺羅十八歲者月給銀二兩今宗室覺羅有升任外省者其隨任子弟應否支領銀米例無明條嗣後宗室覺羅有升授陵寢及盛京等處官者非外省可比其隨任子弟仍準支領餘皆停止俟回京後給與二十一年奉旨王公薨逝無子襲封者親王郡王福晉歲給銀千五百兩貝勒貝子夫人五百兩俸米如之欽定大清會典則例卷五十二
