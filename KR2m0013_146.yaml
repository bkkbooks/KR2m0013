管領下人披剃內府三旗二十四人五旗各府屬八十四人如上三旗有闕移咨禮部行文內務府於本旗內管領下選一人頂補下五旗有闕移咨禮部行文各該王公於府屬管領下送一人頂補九年題準每嵗正月初八日至十五日後黃寺集喇嘛格隆班第誦經凡需用之物均由禮部光祿寺支給十四年題準後黃寺每年誦經喇嘛格隆班第定為四百人又題準後黃寺誦經喇嘛格隆班第每年賞銀千兩由户部支領康熙十一年題準在內王等取充後黃寺班第百有八人額闕將默爾根綽爾濟額外册內有名之班第頂補若無頂補之人仍行禮部於各原主名下取人充補逃走自歸者革退班第交還原主四十六年議準本院見已設立銀庫將後黃寺每年誦經應用香供等費銀八十二兩七錢四分五釐及賞給喇嘛格隆班第等銀千兩均改於本院庫內支給一分駐番僧盛京實勝寺大喇嘛一人永安寺即御花園大喇嘛一人瑪哈噶喇樓大喇嘛二人東西南北四塔大喇嘛各一人西勒圖庫倫扎薩克大喇嘛一人扎薩克喇嘛四人西安廣仁寺大喇嘛一人西寧西勒圖達賴諾們汗大喇嘛一人五臺山菩薩頂扎薩克喇嘛一人射虎川臺麓寺大喇嘛一人屬五臺山扎薩克喇嘛管轄歸化城扎薩克大喇嘛一人副扎薩克大喇嘛一人扎薩克喇嘛六人多倫諾爾會中善因二寺扎薩克大喇嘛一人大喇嘛二人副大喇嘛二人科爾沁等二十四部落大喇嘛各一人康熙十四年題準盛京西勒圖庫倫歸化城等處大喇嘛以下各設德木齊一人一番僧服色順治十二年題準喇嘛格隆服用黃紅色非奉上賜不許用五爪團龍班第用黃帽黃衣康熙六年題準喇嘛等許服金黃明黃大紅等色班第等許服大紅色其餘不得擅服曾蒙恩賞賜者各色均準服用違者大喇嘛罰牲畜一九班第以下鞭一百一番僧禁例順治十四年題準格隆班第等如為人治病必告知大喇嘛限定日期方許前往若有私往違限並擅宿人家或借端留婦女於寺廟者皆依律治罪再遊方之徒不得擅留違者亦治罪十五年題準喇嘛徒衆除院册有名外不準增設十七年題準歸化城喇嘛有事往厄魯特喀爾喀地方者均令具題請往都統不時稽察毋許妄為厄魯特喀爾喀往來人格隆班第等亦不許擅留違者治罪康熙元年題準外藩蒙古八旗遊牧察哈爾蒙古等欲送家人為番僧徒弟及留住外來之格隆班第皆令開具姓名送院注册違者坐以隱丁之罪五年題準在京喇嘛等奉使達賴喇嘛地方擅帶彼處班第等回來者罪之十年題準唐古忒處喇嘛徒衆非奉旨不許私來又題準凡喇嘛將自己家奴及受他姓送到之人作為班第並容留無籍之格隆班第者將該管之大喇嘛革退罰牲畜三九格隆班第等各罰三九如內地家人作為班第送至喇嘛處或隱匿在家及容留無籍遊行之格隆班第者將都統以下領催以上同本人一並交部分别議處治罪再外番蒙古地方除册籍有名之番僧外其遊牧之番僧班第皆著驅逐倘不行驅逐或隱匿容留及將各該屬家奴私為班第者事發王貝勒貝子公扎薩克台吉等各罰俸一年無俸之台吉罰馬五十匹入官仍革職間散鞭一百該管之王貝勒貝子公台吉等各罰俸九月都統副都統等各罰牲畜一九佐領驍騎校各罰二九領催什長各鞭一百所罰牲畜給首告人三分之一如經屬下家奴首出即準開戶將私為班第及收留之番僧班第勒令還俗撥回本旗給還原主其八旗遊牧察哈爾馬場人等有犯亦照此例又定凡蒙古地方驍騎壯丁不準私為伍巴什違者照私為格隆班第例治罪其年老殘廢丁册除名之人願為伍巴什者聽又定蒙古婦女不準私為齊巴罕察即尼僧違者亦照私為班第例罪之四十二年諭以民田展修廟宇有關民生嗣後凡修廟有礙民地者著永行禁止欽此雍正三年題準洮岷地方番僧以治病禳災為名誆騙蒙古應令扎薩克嚴禁如果治病有益分别保留其餘一概逐回原籍嗣後有隱藏者發覺將扎薩克等一並議處六年議準五臺山乃名山清淨佛地若埋葬尸骨有汚淨土嗣後凡喇嘛僧道旗民蒙古人等骨殖禁止送往五臺山埋葬如外藩蒙古大喇嘛等有願將骨殖送往五臺山埋葬者該部請旨具奏其本處喇嘛僧道尸骨亦令其逺寺廟埋葬乾隆二十七年奏準凡胡圖克圖大喇嘛等圓寂其本人所食錢糧停止給發其徒衆所食錢糧俟伊師骨殖起程之日再行裁汰一西番各寺順治七年題準河州宏化等寺總理國師韓禪巴遣徒繳明時所給敕書一道銅印一顆均準換給八年題準顯慶寺灌頂大國師丹巴堅錯繳明時所給鍍金銀印一顆都綱銅印一顆誥命敕諭各一道又宏化寺普應禪師諾爾布堅錯繳明時所給銀印一顆都綱司銅印一顆又紅山堡報恩寺番僧盧老藏靈珍繳明時所給劄付一紙一並換給十年番僧閻老藏靈珍繳明時所給都綱敕印照舊換給又西寧瞿曇等寺國師禪師都綱等各將明時所給誥敕印劄繳還懇請換給瞿曇寺國師公葛丹淨封為灌頂淨覺宏濟大國師給鍍金銀印渣思歡卓爾封為灌頂廣濟宏善國師給慈光普照象牙圖書各給誥敕一道其都綱拉思俄卓爾給銅印敕諭一道淨寧菩提寺國師沙拉索南封為妙勝惠濟灌頂大國師給鍍金銀印誥敕各一道劄付一紙淨覺寺國師班珠兒堅錯封為淨慈優善國師給銀印誥敕各一道國師所屬喇嘛查西堅錯給𢎞修善道象牙圖書靈珍堅錯給心性了無象牙圖書丹巴舍拉給堅修梵性象牙圖書各給敕諭一道慈利寺國師札思巴統諸封為宏善演教國師給銀印敕諭一道劄付一紙禪師毛錯南宫哈封為妙勝禪師給銀印敕諭一道劄付一紙延夀寺張舍拉朋錯封為廣濟宏修國師給銀印誥敕各一道普法寺國師丹進堅錯封為妙善通惠國師給銀印誥敕各一道國師所屬喇嘛索南巴爾丹給妙靜𢎞修象牙圖書敕諭一道吉祥寺禪師洛藏拉旦封為福教禪師給銀印誥敕各一道伊兒結寺喇嘛格拉堅錯給𢎞演宗尚象牙圖書又西納演教寺喇嘛班珠兒盆錯繳明時所給敕印執照封班珠兒盆錯為國師換給誥敕各一道又賜給通慧淨覺銀印又端嚴寺喇嘛山丹屯柱繳明時所給敕書劄付圖書換給敕書一道劄付一紙靖敕法界象牙圖書一方十七年題準岷州衛二十六寺內圓覺寺大崇教寺番僧后只即丹子繳明時所給誥命一道敕書二十一道肅謹戒行圖書一方換給敕書一道銅印一顆授為護印僧綱司命鈐束岷州各寺番僧其繳送敕書二十一道均應換給惟成化年間所封宏濟光教大國師一敕不準換給康熙二年題準岷州圓覺寺大崇教寺講堂寺剎藏寺宏教寺洪福寺法藏寺朝定寺石崖寺魯班寺永安寺廣善寺照慈寺洪濟寺廣德寺羊圈寺崇隆寺照慈寺寫兒朵寺讚林寺永寧寺諸番僧繳送舊敕一例換給五年題準三竹裕龍藏經三寺既經修葺應給發敕書其荔川工布二寺俟修理告竣再行請給十一年延夀寺廣濟宏修國師張哈完卜承襲換給誥敕十四年題準據甘肅提督奏稱圓覺寺番僧后只即丹子恪守敕印糾兵攻賊其前所請宏濟光教大國師之職準其承襲應頒誥命並給與鍍金銀印其番僧綱司敕印仍令掣繳送部十五年題準法藏寺僧丁桑節落旦應授為法藏寺僧綱司洮州著落寺番僧楊多剛應授為僧正均給與敕書二十一年題準圓覺等寺番僧后只即丹子等謝恩進貢並請給國師頂帽及番僧俸祿給髙頂僧帽一具撥賜岷州衛屬官地五頃免其納糧三十年覆準圓覺寺國師后只即丹子親姪首徒后丹子達節襲封岷州衛宏濟光教大國師三十六年覆準瞿曇寺灌頂淨覺宏濟大國師以公葛丹淨之孫觀著圓思多榮進承襲又西納演教寺通慧淨覺國師以班珠兒盆錯之孫達爾吉承襲三十七年覆準松山來之達克隆胡圖克圖奏請封典給與敕印三十八年覆準法藏寺番僧丁桑節落旦前以軍功議敘給與僧綱司敕書原無世襲字樣今該僧據報病故著繳送內閣換給護敕四十三年題準西寧教化寺僧羅卜藏欽瑧寶貝寺僧羅卜藏納木查繳明時所給誥命敕書並繳舊印又肅州歸化寺僧恭阿扎木蘇奏請承襲均換給誥命敕印四十六年奏準達克隆胡圖克圖病故換給伊姪藍占巴羅雷丹達爾敕書令約束僧衆四十九年覆準國師名爵甚大非有功績不得濫授岷州國師后丹子達節其師后只即丹子初授為護印番僧綱司後因攻賊有功升授國師給與鍍金銀印業已承襲一次今后丹子達節以年老辭職其徒后尖采寧布並無功績不得仍襲國師著照初封之職授為護印番僧綱司給與銅印敕書舊給國師印信誥命著繳送內閣五十二年題準洮州闡定寺喇嘛楊昂望繳明時所給崇梵靜覺國師敕印準其換給雍正四年議準西寧所屬百里外約其僧寺九十四處河州所屬僅止三處此內有名國師禪師而有敕印者有名國師而無敕印者有名為寺廟實無寺廟者有不名為寺廟而名為部落者其各處番僧或自二三名以至百六七十名不等此等處所原繫土番雜處明初頒給敕印之後我朝亦曽頒有敕印緣邊居之人野性難化故令其信任有名之喇嘛承襲管轄若因循舊制不酌量更定恐相沿日久竟恃為世守所關匪細應令各寺族佃歸並內地為民所給敕印盡行收取不令管轄番落其如何給與喇嘛空銜俸祿之處令該督詳議具奏到日再議乾隆八年題準洮州闡定寺崇梵靜覺國師以楊昻望之姪楊琢珞瓚承襲又奏準朝鮮琉球南掌安南暹羅蘇祿等國封恤事宜均由禮部辦理其蒙古王公台吉內外番夷喇嘛等封恤事宜均由理藩院承辦惟會典內載有陜西甘肅洮岷喇嘛承襲國師禪師都綱並給與敕印等事由禮部具題纍年有禮部専辦者有理藩院會同辦理者伏思蒙古內外番僧既屬理藩院所轄則陜西洮岷三處番僧嗣後承襲國師禪師都綱等事均應歸並理藩院承辦至請給敕印之事仍令理藩院會同禮部辦理九年奏準河州宏化顯慶兩寺國師兼都綱章珞柱堅錯之姪章敦柱堅錯請襲前來從前議敘國師禪師一應敕書其作何酌給空銜俸祿尚未議定今章敦柱堅錯請襲國師應俟該督議覆到日再辦其都綱印信原為辦理事務管束屬人而設應令國師章珞柱堅錯之姪章敦柱堅錯暫行管理都綱印務又奏準換給松山報恩寺達克隆胡圖克圖胡畢爾汗敕書十二年議準甘肅所屬各寺廟喇嘛自收國師禪師印信以來各自梵守靜修其屬下衆僧雖各設有法臺但約束不無渙散自應照依地方之大小番僧之多寡定為職銜以備稽察河州普綱寺靈慶寺宏化寺應各設都綱一人西寧縣之西那寺塔爾寺扎藏寺元覺寺沙衝寺仙密寺佑寧寺碾伯縣之瞿曇寺宏通寺羊爾貫寺普化寺大同衛之廣化寺歸德所之二疊闡寺垂巴寺馬尼寺應各設僧綱一人洮州衛之閻家寺龍元寺圓成寺應各設僧正一人均由院給與劄付其松山報恩寺喇嘛達克隆胡圖克圖胡畢爾汗紅山堡報恩寺都綱閻南木加岷州圓覺寺僧綱候章楊恩柱河州宏化寺都綱章敦柱堅錯皆有都綱僧綱印信毋庸再給此次所授僧綱僧正既皆議給劄付其從前所給岷州圓覺寺僧綱候章楊恩柱之敕書著徹回換給劄付嗣後國師之號均不準承襲所有洮州闡定寺國師楊琢珞瓚之印敕暫準存留俟闕出停止復襲今將原領印敕交禮部察銷又揚松羅布迦木燦年力富強才具明晰應授為僧綱令該督將揚松羅布迦木燦年貌並住持何廟之處詢明送院填給劄付十三年覆準揚松羅布迦木燦並無居住寺廟原居住著落族應照原議將揚松羅布迦木燦授為僧綱給與劄付欽定大清會典則例卷一百四十二
