body:
  text: 理藩院典屬清吏司一疆理喀爾喀凡四部八十二旗東至黑龍江界西至阿爾泰山與準噶爾接界南至內扎薩克界北至俄羅斯界東西袤延五千里南北三千里後路土謝圖汗一旗及所轄十九旗駐劄土喇河東至肯特山車臣汗部界西至翁金河賽因諾顔部界南至瀚海蘇尼特界北至俄羅斯界至京二千八百餘里東路車臣汗一旗及所轄二十二旗駐劄克魯倫翁都爾多博東至厄爾得尼拖羅海西至插漢齊老臺南至他爾衮柴達木北至翁都爾罕至京三千五百餘里西路扎薩克圖汗一旗及所轄十六旗駐劄杭愛山陽東至翁克西爾哈兒朱忒西至喀喇烏蘇俄落克諾兒南至阿爾察喀喇托輝北至推河至京四千餘里賽因諾顔部一旗及所轄二十一旗駐劄牧地東至博羅布爾哈蘇鄂倫西至庫爾薩牙索郭圖厄格嶺南至車車爾齊克北至齊老圖河至京三千餘里青海四部落厄魯特土爾古特喀爾喀回特凡二十九旗各旗駐牧地在陜西甘涼西寧河洮岷及四川松潘等處邊外東接陜西西連西藏南至四川北至甘肅安西府袤延二千餘里至京五千七十里分左右二境左境東自西寧邊外董科爾廟西至肅州嘉峪關邊外滔賴河南自西寧邊外波洛沖克克河北岸北至涼州邊外西拉搭拉東南自西寧邊外拉拉山西北至甘州邊外額濟內界東北自永昌邊外西南至嘉峪關邊外布隆吉兒河岸右境東自西寧邊外董科爾廟西至噶斯池南自四川松潘衛邊外漳臘嶺北至波洛沖克克河南岸東南自洮州邊外達爾吉嶺西北至嘉峪關邊外塞爾騰西爾拉津東北自西寧邊外克騰庫特兒西南至木魯烏蘇河諸部落散處其間賀蘭山厄魯特一旗東至寧夏府邊外界西至甘州府邊外界南至涼州府邊外界北至瀚海接喀爾喀界地方七百里至京五千里喀爾喀河厄魯特二旗一旗東至喀爾喀河西岸東南至納木爾庫河溝南至哈畢爾哈布喇克西南至納林布喇克西至額木根圖沙岡西北至布英克沙岡北至衣克塔什垓東北至烏塔噶禮圖袤延二百里乾隆二十六年奏準遷往鄂爾坤之烏蘭烏蘇居住屬賽因諾顔部轄其四至即在賽因諾顔疆里之內一旗東至額布爾布喇克東北至滚諾爾北岸東南至巴爾圖布喇克均與正藍旗巴爾虎接壤南至巴爾圖溫都爾興安山西南至圖勒爾河溝西至喀爾喀河東岸西北至胡魯蘇台伯爾齊爾北至烏和爾綽克沙岡袤延二百里至京二千八百餘里乾隆二十六年議遷烏蘭烏蘇不果二十七年奏準在推河居住屬賽因諾顔部轄其四至即在賽因諾顔疆里之內達拉爾河厄魯特一旗上至達拉爾河之源下至達拉爾河之哈拉濟西至阿祿科爾沁之東北界察漢舒龍東至扎魯特之西北界扎龍塊嶺地方百里至京千四百餘里乾隆二十六年奏準遷往鄂爾坤之烏蘭烏蘇居住屬賽因諾顔部轄其四至即在賽因諾顔疆里之內土爾古特一旗駐劄額濟內東至古爾鼐南至三岔河西至肅州邊北至坤都崙湖地方八百里至京五千里都爾伯特十有四旗舊屬準噶爾四衛拉特之一原駐額爾齊斯東至阿爾泰山西至齋爾南至青吉爾河北至塔爾巴哈台至京六千三百五十里該部長首先投誠因資其耕牧移其部於烏蘭古木在喀爾喀疆里之內烏魯木齊舊為準噶爾庫本諾雅遊牧處屬噶爾丹多爾濟之昻吉乾隆二十年大兵進討準噶爾噶爾丹多爾濟率其屬望風降地皆內屬有城周三里許至京九千八百九十里山環水繞土膏沃衍地宜種植分東西南北二境東西境自烏魯木齊城東行至木壘烏蘭烏蘇東接巴里坤境外地東南踰山接闢展界自烏魯木齊城西行至博羅塔拉西南俱接伊犁界南北境自烏魯木齊城直北行至塔爾巴哈台通俄羅斯界自烏魯木齊城東北行至額爾齊斯自烏魯木齊城西北行至齋爾接哈薩克界其南境近接天山踰山接哈拉沙拉界伊犁舊為準噶爾部乾隆二十年大兵進討準噶爾二十四鄂拓克汗之部屬二十一昻吉台吉之戶下九集賽職司喇嘛事務爭先迎降達瓦齊獻俘京師伊犁平阿睦爾撒納尋以伊犁叛二十二年分南北路進討阿睦爾撒納奔俄羅斯餘黨以次擒滅伊犁復定城三一建固爾扎周四里二分為屯田回民居住之所一建烏哈爾里克周四里一分一建塔爾竒周一里三分為屯田祿營官兵住居之所至京萬八百二十里分東南西北二境東南境自伊犁東南行至哈卜齊海南踰天山接哈拉沙拉界北接烏魯木齊東西境界東過博爾圖山接闢展界西接伊犁西北境界西北境自伊犁西北行北至巴爾喀什淖爾西至吹塔拉斯俱至沙磧通右部哈薩克界東北接左部哈薩克界東接伊犁東南境界南至天山踰山接阿克蘇烏什界八旗遊牧察哈爾東至克西克騰界西至歸化城土默特界南至太僕寺左右翼鑲黃旗正黃旗各牧場及山西大同府朔平府邊界北至蘇尼特及四子部落界袤延千有餘里鑲黃旗遊牧駐劄蘇門峯在張家口北三百四十里東西距百六十里南北距百九十里由張家口至京七百五十里正黃旗遊牧駐劄木孫忒克山在張家口西北三百二十里東西距百有十里南北距二百八十里由張家口至京七百三十里正白旗遊牧駐劄布爾哈臺在獨石口西北二百九十里東西距七十八里南北距二百九十五里由獨石口至京八百二十里正紅旗遊牧駐劄古爾班拖羅海山在張家口外西北三百七十里東西距五十五里南北距二百八十里由張家口至京八百里鑲白旗遊牧駐劄布雅阿海蘇默在獨石口北二百四十五里東西距五十六里南北距百九十七里由獨石口至京七百七十里鑲紅旗遊牧駐劄布林泉在張家口西北四百二十里東西距五十里南北距二百九十里由張家口至京八百三十里正藍旗遊牧駐劄扎哈蘇臺泊在獨石口東