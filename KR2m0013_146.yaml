更換大臣由院於散秩大臣八旗護軍統領副都統暨各部院侍郎內視其諳練蒙古事務者開列簡用又覆準北路軍營之烏里雅蘇臺地方見駐劄參贊大臣應委本院筆帖式一人馳驛前往隨印辦事四年議準駐劄西藏辦事司官筆帖式照駐劄哈密瓜州司官筆帖式例定為二年一換不必交錯更代俟新去之司官筆帖式到後舊駐劄之人留住三月將舊事交代明白再令回京五年議準土爾古特羅卜藏達爾扎年幼新襲貝勒應差本院司官一人前往駐劄辦理旗務每日折廩給銀一兩六年議準喀爾喀車臣汗部落既設副將軍應照例差隨印筆帖式二人馳驛前往其日支廩給及更代之期悉照各部落副將軍隨印筆帖式之例七年議準駐劄庫倫司官改為三年一次更代十年議準駐劄西藏大臣司官筆帖式均一例定為三年更代十一年議準恰克圖駐劄司官改為三年一次更代十三年奏準本院司官筆帖式等常有奉差在各處經年駐劄更代者向將伊應得三年廩給銀一起給發嗣後給發奉差官廩給銀在京起身時酌量給發一年俟滿差後再接發一年若在任所及奉差之處病故其多領銀數在百兩以上者請旨豁免百兩以下即移咨户部豁免十六年議準喀爾喀四部落副將軍處隨印筆帖式三年更代限期太速嗣後改為五年一次更代均不準保留十七年奏準土爾古特貝勒羅卜藏達爾扎今年已及嵗可以辦理旗務應將駐劄司官徹回十八年議準土爾古特貝勒羅卜藏達爾扎不能辦理旗務約束屬下人應仍遣司官一人駐劄其更代限期及廩給銀悉照前例二十四年奏準土爾古特貝勒羅卜藏達爾扎見今二十六嵗已能辦理旗務屬下人俱遵法度駐劄額濟內司官停止更換又議準庫倫恰克圖地方貿易事務日繁駐劄司官應給關防各一顆二十六年議準烏魯木齊特簡大臣二人統理諸務副都統二人綜理屯田侍衛三人今將安西提督移駐原駐大臣等俱移駐雅爾築城防守伊犂將軍一人統理諸務節制天山南北各路兵丁自伊犂至烏魯木齊巴里坤自喀什噶爾葉爾羌阿克蘇和闐至哈密等處所駐官兵悉聽調遣參贊大臣領隊前鋒統領副都統及侍衛無定員其經理厄魯特貿易及稽察臺站諸務與聽差各官均隨時酌委無定額二十七年議準派往庫倫會同桑宰多爾濟辦事之大臣三年一次更換由院列名請旨一會盟土謝圖汗及所轄十九旗盟於汗阿林地方為一會車臣汗及所轄二十二旗盟於克魯倫巴爾和屯為一會扎薩克圖汗及所轄十六旗盟於扎克畢賴塞欽畢都里也諾爾為一會賽因諾顔及所轄二十一旗盟於齊齊爾里克為一會康熙二十九年覆準喀爾喀土謝圖汗車臣汗等內屬應照四十九旗例永定會盟之典其台吉等有逺駐外邊者由院遣官豫行調取至會盟之期齊集三十年聖祖仁皇帝以喀爾喀新附數十萬衆必訓以法度俾知禮義特命行會閲禮於上都多倫諾爾之地前期命理藩院調集新附之喀爾喀兩翼部落並傳知科爾沁等四十九旗之王台吉皆豫屯於會閲之地百里以外聖駕發京師上三旗官兵隨行由張家口出下五旗官兵由獨石口出赴御營軍臨多羅諾爾布營設哨三旗護軍共為一營居中屯扎八旗前鋒為二營五旗護軍為十營火器營兵為四營共十六營環御營屯扎八旗前鋒為四汛八旗護軍為二十四汛各設廬帳繞營而屯傳諭蒙古喀爾喀等前屯於百里外者移附御營五十里屯扎不得入哨內命議定喀爾喀賞格為九等坐次為七行進見燕會禮儀悉照四十九旗例行屆期設帳殿於網城南門前中設御榻旁設武備院行帳幕次各二前張黃幕設反玷列尊罍設騎駕鹵簿於帳殿前聖駕出入作樂設燕筵於各班次衆畢集奏聞聖祖仁皇帝出御營乘馬臨帳殿升座理藩院大臣鴻臚寺官員引導喀爾喀汗濟農諾顔大台吉衆等聽排班奏樂鳴贊官傳贊行三跪九叩禮畢樂止理藩院大臣官員引內外王貝勒貝子公台吉等列於左喀爾喀汗等列於右各於本位一叩坐進御筵奏樂進茶衆喀爾喀皆叩首進茶畢乃進酒進酒大臣出班跪衆皆跪奏樂各於其位行一叩禮進酒畢坐執事者酌金巵立賜進酒大臣大臣跪受一叩飲畢復一叩興入班坐乃進饌次第演舞奏樂衆技畢陳有旨召喀爾喀汗濟農諾顔大台吉等近御榻前親賜以酒其餘台吉等令各侍衛於坐處賜酒畢御筵徹四十九旗之王台吉及衆喀爾喀行一跪三叩禮不贊謝恩仍按翼序立禮部大臣奏禮成聖祖仁皇帝駕還行宫次日八旗滿洲及漢軍火器營緑旗營官兵排列火炮上躬擐甲胄大閲畢宣訓諭敕書於衆喀爾喀先是土謝圖汗殺其扎薩克圖汗得克得黑墨爾根阿海從此起釁搆兵失其遊牧先後來歸聖祖仁皇帝洞鑒兩翼喀爾喀交惡之原委情事之曲直先傳諭澤卜尊丹巴胡圖克圖及土謝圖汗等令其具疏請罪於是集衆會盟渙汗大號免土謝圖汗之罪繼扎薩克圖汗之後使兩翼喀爾喀相好如初並去其濟農諾顔名號依次錫以汗王貝勒貝子公封爵其台吉亦分四等視四十九旗又按品級從優恩賚冠服銀幣等物其四十九旗亦按品級賜冠服銀幣有差頒賞訖均於網城南門前聽鳴贊官傳贊謝恩行三跪九叩禮會閲禮成聖祖仁皇帝回鑾雍正三年議準向例內扎薩克與外三路之喀爾喀等三年一次奏遣大臣前往會盟辦理一切刑名將丁數開造細册送院由院具題今辦理青海蒙古事務大臣見在西寧居住每屆三年不必由京師特簡大臣止令各旗核明丁數呈駐劄西寧大臣轉送到院照例具題再一切刑名事件著各旗訊明呈報駐劄西寧大臣如尋常事酌量遣官會同扎薩克辦理若繫大事令駐劄西寧大臣約定地方與扎薩克等會盟議結六年定喀爾喀四會每會設正副盟長各一人乾隆元年奏準喀爾喀四部落遊牧處兵丁萬餘向在遊牧地方操演守禦豫備有警刻期傳集誠恐日久廢弛軍裝器械亦必不時察閲如有舊敝即令修理更換該副將軍參贊貝勒公等每嵗一次會盟簡稽軍實奉旨喀爾喀遊牧地方防守兵丁俟會盟察驗軍容器械之時將軍與參贊大臣等會議於參贊大臣內令一人會同喀爾喀副將軍參贊貝勒公等一同察驗至幾年一次將軍親驗之處額駙䇿凌酌量辦理又奏準將土謝圖汗等十七旗兵丁於烏克圖爾濟爾噶朗圖地方察驗車臣汗二十二旗兵丁於克魯倫得爾格爾帑吉地方察驗王敏珠爾多爾濟等六旗兵丁於依克噶扎爾古爾班察漢布喇克地方察驗賽因諾顔部落之十九旗兵丁於塔密爾地方察驗扎薩克圖汗部落之和托輝特等六旗兵丁於哈綏地方察驗格勒克顔披爾等九旗兵丁於尼纍等處地方察驗但各部落與所定地方相離遙逺若令參贊大臣一人周圍察驗甚需時日傳集蒙古兵丁於所在地方久候則馬匹牲畜必致勞瘁應令參贊大臣二人前往一往西路扎薩克圖汗及賽因諾顔兩部落一往東路土謝圖汗及車臣汗兩部落奉旨今年著如此察驗再察驗之時令參贊大臣往一路去彼一路爾等酌委官員前往察驗十年諭喀爾喀四部落遊牧處防守示威兵丁每嵗軍營參贊大臣前往簡閲蒙古等逺離遊牧未免勞苦每年著各該副將軍等察驗其軍營參贊大臣著間嵗一次往驗欽此十六年議準青海扎薩克蒙古等停止每年會盟著間年一次舉行二十年議準以都爾伯特特古斯庫魯克汗為薩音濟雅噶圖盟長給與印信會盟一如喀爾喀之例舉行一敕印順治十年給厄魯特顧實汗金册印康熙十三年給喀爾喀扎薩克阿海代青台吉敕印三十一年覆準喀爾喀旗分應鑄給印信以昭職守其印文清字兼蒙古字印式與四十九旗同三十二年覆準達賴汗自伊祖顧實汗以來敬謹納貢應給與敕書三十五年覆準喀爾喀郡王有軍功者升為親王貝子有軍功者升為郡王該部撰給敕命乾隆十二年議準喀爾喀四盟長均給與印信與內扎薩克六盟長同二十年奏準給都爾伯特汗等印信管理扎薩克事務一禁令康熙二十一年題準厄魯特喀爾喀等人謝恩不得過二百名若來人衆多分為數次二十四年題準喀爾喀進貢人違禁得罪者大事照內例治罪小事行文扎薩克處令交所罰牲畜二十六年覆準興安後齊達齊牢地方禁止巴爾虎私進哨地遊牧又覆準嗣後著喀爾喀車臣汗嚴禁所屬毋得擅入哨地遊牧二十八年議準喀爾喀台吉從人在庫爾齊爾地方違禁放槍遊獵者該台吉罰五九牲畜從人鞭八十三十一年覆準喀爾喀等每扎薩克各頒給律例一册一隨圍乾隆六年定邊左副將軍具奏從前聖祖仁皇帝哨鹿行圍時御前及乾清門行走並諳於騎射之喀爾喀台吉等均扈從隨行今皇上哨鹿行圍應否令其扈從奉旨喀爾喀等既已備兵大扎薩克不必前來間散公台吉等內應令幾人前來著理藩院請旨欽此遵旨奏準聖祖仁皇帝哨鹿行圍曾選喀爾喀內諳於騎射之台吉等隨行今既奉旨不令備兵之喀爾喀大扎薩克前來其不備兵之公台吉內何人諳於騎射可以隨圍者應令間散公台吉內酌選數人於哨鹿行圍時扣算日期令往博羅河屯伺候十四年奉旨此次哨鹿圍場喀爾喀來隨圍諳於騎射者九人自額駙䇿凌奏準以來每次僅此數人前來喀爾喀四部落王公台吉內不無諳於騎射之人理宜輪班行走若分班前往皆得瞻仰朕顏朕亦得識認伊等况且前往之十人內如世子成滚扎布公品級額林沁等率領行走約束衆等亦屬有益其如何分班前往每班令何人率領著理藩院議奏欽此遵旨議準喀爾喀四部落內何人諳於騎射難以懸定且又有鄂爾坤烏里雅蘇臺軍營之班無從分晰應令額駙䇿凌於四部落王公台吉內每班選十人其率領約束均如世子成滚扎布公品級台吉額林沁之人令一人率領前往共分幾班何人率領令將名數具奏十五年議準喀爾喀四部落王公台吉隨圍分為四班每班十人輪班隨行其公品級額林沁照常率領行走外若遇定邊左副將軍親王成滚扎布應去之年令其預為奏請一恤唁康熙十一年題準外藩蒙古和碩親王薨逝賜犢一羊八酒九瓶紙萬張內閣撰擬清字蒙古字祭文遣內大臣一人侍衛一人禮部本院尚書或侍郎一人郎中或員外郎各一人前往讀文致祭多羅郡王薨逝賜犢一羊六酒七瓶紙八千張遣侍衛一人禮部本院侍郎一人郎中或員外郎各一人前往讀文致祭多羅貝勒薨逝賜犢一羊四酒五瓶紙五千張鎮國公溘逝賜犢一羊四酒四瓶紙四千張輔國公溘逝賜羊四酒四瓶紙三千張皆遣侍衛一人禮部本院郎中或員外郎一人前往讀文致祭一等台吉溘逝賜羊三酒三瓶紙二千張因功授子爵者溘逝賜羊二酒二瓶紙千張皆酌遣禮部或本院官前往讀文致祭下嫁外藩固倫公主薨逝賜牛羊紙酒遣官致祭之禮與和碩親王同和碩公主郡主親王適福晉薨逝賜牛羊紙酒遣官致祭之禮與多羅郡王同縣主多羅郡王適福晉薨逝賜羊五酒五瓶紙六千張酌遣禮部或本院官前往讀文致祭凡祭文均由內閣撰擬兼書清字蒙古字郡君貝勒適夫人薨逝賜羊三酒三瓶紙四千張縣君貝子夫人薨逝賜羊二酒二瓶紙四千張鄉君公夫人溘逝賜羊二酒二瓶紙三千張郡君貝勒夫人以下鄉君公夫人以上不給祭文酌遣本院官前往致祭以上遣往官員將祭文齎赴殯所本家率所屬官員於一里外跪迎候欽差過後隨行讀文祭酒時齊集之衆蒙古皆跪祭畢遙望闕廷恭謝天恩行三跪九叩禮三十六年議準外藩蒙古等向不焚紙嗣後凡致祭親王以下一等台吉以上親王適福晉以下公夫人以上皆停給紙張其牛羊祭酒若從此擕往路途遙逺且勞驛馬應於該部折價交與往祭官員在本處採辦四十三年奉旨嗣後公以上賜恤之事著照常繕本具題一等台吉以下賜恤之事不必繕本具題著繕摺奏聞五十九年定蒙古郡王福晉貝勒貝子公夫人薨故者應否賜恤由院先行奏請雍正三年奏請賜恤奉旨此等已故夫人其夫或子曾否效力受皇考眷顧之處朕知之不確難以即行批發嗣後爾院遇此等賜恤之事開其夫若子曾否效力受恩事迹於奏內另行夾簽仍兩議請旨四年題請青海輔國公賜恤奉旨青海地方甚逺若此處遣官往返有纍驛站西寧見有駐劄侍衛將祭文發往可以致祭著理藩院會同內閣議奏欽此遵旨議準嗣後青海如有致祭之事著遣西寧之侍衛倘侍衛不敷差遣令總理青海蒙古事務大臣行文該督於緑營參將遊擊內酌委一人代侍衛前往致祭其祭文並羊酒折價銀均由驛站發往十年奏請向例外藩王貝勒貝子公一等台吉薨故均加恩賜祭惟額駙無致祭之例按和碩公主之和碩額駙加貝子品級郡主額駙加公爵縣主額駙加一等台吉職銜今身故縣主額駙扎木素照一等台吉例應否加恩致祭相應奏請奉旨額駙扎木素既照一等台吉例應致祭嗣後遇有額駙病故者皆著加恩致祭一呼倫布俞爾授官雍正十二年覆準喀爾喀貝子顔楚卜多爾濟等奏巴爾虎人等感恩願移駐呼倫布俞爾地方遊牧計巴爾虎人共二千九百八十四名內選擇壯丁二千四百名餘皆作為隨丁應照索倫之例每一佐領設領催六名驍騎五十四名核計壯丁共編為四十佐領歸並八旗每翼設總管一人每旗設副管一人每佐領設佐領驍騎校各一人其俸祿錢糧均照索倫官兵之例給與闕出由黑龍江將軍擬定正陪送院引見補授再見在索倫兵有鳥槍二百桿今應增給鳥槍三百桿不按旗分但遴選巴爾虎等能用鳥槍者令其演習自總管以下均屬黑龍江將軍管轄乾隆八年議準移駐呼倫布俞爾之巴爾虎原設總管副管佐領驍騎為數過多應照索倫之例酌減其總管二人仍舊分轄兩翼副管八人應留四人各轄兩旗四十佐領應留二十四佐領每一佐領設領催四名驍騎三十六名作為額內兵丁其應裁副管佐領驍騎俟闕陸續裁汰一俄羅斯互市康熙二十八年議準黑龍江後綽羅那烏母河相近以格勒必齊河為界自大興安嶺以至於海山之陽為內地山之隂為俄羅斯地三十二年議準俄羅斯國貿易人不得過二百名隔三年來京一次在路自備馬駝盤費一應貨物不令納稅犯禁之物不準交易到京時安置俄羅斯館不支廩給定限八十日起程又覆準俄羅斯察漢汗奏文與外國奏文體式不合將貢物奏文一並發回但該國地逺不知中國制度將原奏不合式之處明白曉諭來使召見時照常恩賜帶來貨物仍令貿易嗣後俄羅斯奏文先令黑龍江將軍開看若有不合式處即自邊地撥回驗明合式方令入奏到京之日令來使於午門前跪奉置黃案上行三跪九叩禮又覆準俄羅斯有私越邊界者應拏送該管官照所犯輕重治罪今俄羅斯復有潛至景齊禮烏拉等處打貂行走恐伊等頭目不知應行文尼卜楚城守尉察拏治罪並申飭該國人嗣後不許私越疆界如城守尉察拏不嚴即行文該國察漢汗將城守尉一並治罪雍正五年諭俄羅斯既請將馬匹牲口留於口外牧放著照所請爾院差司官一人前去照看嚴禁賊盜爭鬭此次所去司官著曉諭俄羅斯郎喀因爾等馬匹牲口在此牧放特差理藩院官前來照看於所留人內選擇善為約束者為頭目令其約束屬下人勿令生事再行文與相近居住之總管等各飭所屬用心收管禁止賊盜俄羅斯乃外域小國其馬匹牲口若有被盜遺失繫何人地方即著該屬總管等嚴察務獲如察覔不獲該屬總管等即照數賠還欽此又議準俄羅斯人所居近山河者以山河為界無山河之空地設立鄂博為界自東邊之厄爾古納河以內至厄白爾哈黨蘇卡倫外空地從中平分如有偏出偏入交錯居住之人彼此察明令各移於界內居住以齊邊界又議準俄羅斯館內設立廟宇令在京之俄羅斯僧一人居住並照該國所請增俄羅斯僧三人俟送到時一並給與口糧食物聽其於廟內行俄羅斯教禮拜念經無庸禁止又使臣薩砙及留京學書之俄羅斯四人教習二人亦令在館居住一例給與口糧食物六年議準俄羅斯國學生俟送到時令其在俄羅斯館居住交與國子監選滿漢助教各一人往館教習清漢文九年奏準俄羅斯買賣人來時喀爾喀土謝圖汗等報院具奏請旨委官一人馳驛前往恰克圖地方伴接沿途照看其買賣人仍依原議不給口糧食物一應夫馬聽其自備由張家口至京路途歇寓令官兵護送看守到京進館後兵部奏點副都統及官兵看守買賣人出館行走皆令護軍等伴行特簡內大臣部院堂官數人總理俄羅斯事務其監視貿易官二人開列侍讀學士科道等職名引見簡用十年奏準俄羅斯貿易事畢起程時照例委官撥兵沿途護送並開列監視貿易官等職名候欽點一人送至邊界一烏魯木齊駐防乾隆二十六年題定滿洲兵三百名察哈爾厄魯特兵二百名駐防緑旗兵千四百九十二名今以安西提督率所屬標兵移駐原設兵丁移駐雅爾屯田乾隆二十三年烏魯木齊試墾地八千畝共收糧三千五百四十二石五斗二十四年屯兵八百名增墾地七千百三十畝共墾地萬五千百三十畝夏秋折收糧九千三百二十四石有竒又調征改屯兵百八十名新墾地千五百四十二畝夏秋折收糧七百七十一石有竒二十五年屯兵千八百四十三名共墾地三萬七千百七十四畝夏秋折收糧三萬九千七百七十三石有竒二十六年屯兵千三百四十五名共墾地二萬九千九百九畝夏秋折收糧三萬九千七百七十三石有竒設屯田副都統經理新疆地本膏