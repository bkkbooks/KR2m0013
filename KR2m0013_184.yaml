body:
  text: 火器營一建置康熙三十年設火器營以公侯大臣為總統専理營務訓練官軍所屬設護軍參領十有六人旗各二人鳥槍驍騎參領滿洲旗各二人蒙古旗各一人管鳥槍散秩官滿洲旗各五人蒙古旗各二人管炮散秩官滿洲旗各四人蒙古旗各一人鳥槍護軍校滿洲旗各十人蒙古旗各四人鳥槍驍騎校滿洲旗各十人蒙古旗各四人以上官校均兼任八旗滿洲蒙古每佐領下鳥槍護軍三名鳥槍驍騎四名炮驍騎一名又定火器營總統無定員由特簡參領員闕由護軍統領該旗都統會同本營總統於該旗參領內遴選引見簡委其管理槍炮散秩官驍騎校員闕由該旗都統於本旗滿洲蒙古散秩官驍騎校內揀選鳥槍護軍校員闕由護軍統領於本旗護軍校內遴選各咨送本營至止操日以官軍一半留營看守槍炮旗纛衙署以一半發回本營行走又定火器營鳥槍護軍驍騎人各給鳥槍一八旗各給子母炮五鳥槍營每旗設海螺各十有二炮營每旗設海螺各五又定火器營旗纛各按旗色護軍用金龍三角纛驍騎用金龍方纛均頂飾豹尾加白號帶以為别旗亦如之甲胄護軍校護軍驍騎校驍騎均與八旗護軍驍騎營同又定每年七月十六日開操遇閏七月即於閏七月十六日開操次年四月十六日止操年節封印日暫行停止每月初四初九十四十九二十四二十九等六日演炮初二初七十二十七二十二二十七等六日演鳥槍初六十六二十六等三日較射冬季八旗合操於安定門外鑲黃正黃兩旗教場內列陳操演陳式詳兵部三十五年鑄給管理滿洲火器營銀印雍正三年奏準遊牧察哈爾八旗護軍既有總管副管統轄其八旗護軍參領各二人應撤回京師改補火器營鳥槍護軍參領為火器營専設官餘仍以旗員兼任九年設筆帖式八人十年奏準以朝陽門內隆福寺前官房一所為火器營公署乾隆四年奏準火器營請照前鋒營護軍營之例以本營護軍參領驍騎參領內簡命四人協理事務一演炮乾隆十四年奏準每年秋後奏請往蘆溝橋演放子母炮十日候旨行十八年奏準俟漢軍演火炮鳥槍事畢本營總統率參校軍士往蘆溝橋演放子母炮十日開操第一日祭炮由太常寺掌行一應禮儀均與八旗漢軍同圓明園八旗護軍營雍正二年議準圓明園専設八旗護軍守衛於禁苑周圍建營房八所選京中八旗官軍前往駐劄以王公二人統轄營務設營總八人五品護軍副參領十有六人六品署副護軍參領三十二人護軍校八十人護軍三千名按旗分住各統以營總佐以參校每營總給房十有三間副護軍參領二人各給十間署副護軍參領四人各給八間護軍校十人各給六間護軍三百七十五名各給三間又奏準營總員闕於八旗護軍副參領內遴選副參領員闕於本營署副參領內遴選署副參領員闕於護軍校內遴選護軍校員闕於護軍內遴選均由總統王公引見補授又定本營官軍操演每月步射六次春秋二季習騎射演鳥槍遇軍政之年一例考驗一應親隨兵養亷及官軍優恤均與在京八旗護軍營同又定八旗官軍俸餉按季按月於户部關支外祿米月餉左翼於清河本裕倉右翼於安河豐益倉就近支領是年設教養兵九十六名六年議準鑲黃正黃正白鑲白四旗於適中之地共立學舍一設教習二人正紅鑲紅二旗共立學一設教習一人正藍鑲藍二旗暨內府護軍營各立學一各設教習一人均於八旗文生員內咨取選補月給銀二兩嵗給米四十二斛二斗四年期滿如教導有方生徒內有考取録用者列為一等咨部以筆帖式即用其僅能教導約束生徒者列為二等咨回該旗怠惰者將生員褫革又奏準八旗營總各鑄給關防七年定增設副護軍校七十二人每月食餉五兩十年奏準增設三品護軍參領八人原設五品副參領升為四品原設六品署參領升為五品又增設護軍校三十二人副護軍校四十人隨關防筆帖式三十二人三品參領員闕於八旗護軍副參領內選補其營總員闕即於三品參領內選補筆帖式員闕於護軍內選充仍食護軍本餉餘照舊例乾隆三年奉旨圓明園八旗護軍營增設教養兵三百八十四名十二年奉旨以京城八旗護軍八百名移駐圓明園增設護軍校副護軍校各十有六人增設營房二千三百二十八間照前分給官兵居住十六年奏準鑄給圓明園總統印即於總統王公大臣內列名奏請欽簡一人掌印以營總參領各二人護軍校四人筆帖式八人隨印協理事務其選補升降均照八旗護軍營隨印辦事之例二十一年奉旨圓明園護軍營學舍肄業子弟令専習淸書其膏火等項仍照舊例欽此遵旨議準教習選用翻譯生員生徒內有以翻譯考取録用者列為一等咨部以筆帖式用餘仍舊一守衛雍正二年定圓明園門汛警蹕共百處日以營總四人副護軍參領八人署副護軍參領十有六人護軍校護軍千名入直夜傳更籌十有六恭遇聖駕至圓明園及還宫自圓明園至紅橋以副護軍參領署護軍參領四人護軍校護軍八十名於路旁兩翼清蹕如聖駕由水路自暢春園西南門經聖化寺至長春橋以營總三人護軍參領副護軍參領十有六人護軍校護軍二百四十名於長河兩岸淸蹕乾隆四年恭逢皇太后駐蹕暢春園圓明園改設門汛共七十六處以營總護軍參領各二人副護軍參領署護軍參領十有五人護軍校護軍七百六十名守衛暢春園增設門汛十九處日以營總一人署副護軍參領四人護軍校護軍一百九十名守衛夜傳更籌八八年定每遇駕駐靜宜園設門汛五十一處日以營總二人護軍參領一人署副護軍參領十有三人護軍校護軍五百十名守衛夜傳更籌十車駕往還均以營總護軍參領各三人副署護軍參領二十人護軍校護軍五百二十名於經由之路左右清蹕恭遇駕詣黑龍潭大覺寺行禮以營總護軍參領各三人副署護軍參領十有四人護軍校護軍七百名沿塗淸蹕十年定增設長春園門汛二十處日以護軍參領一人副署護軍參領四人護軍校護軍二百名守衛夜傳更籌八十八年增設淸漪園門汛六處日以副護軍參領或署護軍參領一人護軍校護軍六十名守衛駕幸靜明園清漪園以營總護軍參領各三人副署護軍參領九人護軍校護軍二百四十名沿塗淸蹕健鋭營乾隆十四年諭去嵗金川用兵朕思我滿洲兵向用雲梯攻城因命八旗於前鋒護軍內選擇年壯人材勇健者千人特命大臣監視操演所選兵丁各奮勉學習不數月間皆已精練隨征金川功成凱旋如令仍回本營隨行行走則伊等前功徒費且我滿洲舊日技藝仍至廢弛若將伊等専設一營演習技藝均可為精鋭兵丁而於緩急之用更有裨益即朕遇有行幸令伊等隨往圍獵學習行走更得嫻熟俟回軍之日不必令回本營専設一營令大臣數人管轄操演特簡大臣一人總統其如何設立營伍學習操演遇朕行幸如何隨蹕再如何施恩使得升轉之塗著大學士公同管轄操演之大臣等詳議具奏欽此遵旨議準演習雲梯兵千名原委翼領四人前鋒參領十有六人前鋒校四十一人管轄今既専設一營應將雲梯兵千名分為兩翼每翼設翼領一人統轄八旗選前鋒參領八人副前鋒參領八人前鋒校五十人鑲黃旗九人正黃正白二旗各八人正紅等五旗各五人以上翼領參領護軍校各官不能兼任均應専設至雲梯兵千名上三旗五百名一旗一百六十六名二旗一百六十七名下五旗五百名每旗百名此內設副前鋒校四十人什長五十名隨印筆帖式四人又定健鋭營總統以王公大臣兼任請旨特簡翼領員闕於本營參領內參領員闕於副參領內副參領員闕於署參領內署參領員闕於前鋒校內前鋒校員闕於副前鋒校筆帖式內均由總統遴選擬定正陪引見補授副前鋒校闕由總統於筆帖式什長內什長筆帖式闕於前鋒內前鋒闕於委前鋒內委前鋒闕於教養兵間散壯丁及八旗驍騎教養兵內教養兵闕於壯丁內拔補十五年鑄給健鋭營銀關防又定日以參領一人前鋒校前鋒十名守衛靜宜園宫門駕幸靜宜園移駐碧雲寺孔道又奏準健鋭營八旗官軍住房左翼在東右翼在南翼領參領各給官房十有三間副參領十間署參領八間前鋒校六間前鋒三間委前鋒二間又奏準昆明湖趕繒船八號以健鋭營前鋒軍習演駕船水戰所用教習把總十人水手一百十名行文天津福建各水師營選送天津把總四人水手四十四名福建把總六人水手六十六名把總年滿送兵部仍交該直省録用其員闕於水手內由本營總統選補水手闕咨該直省補送以上兵辨駐於船塢其辨兵俸餉由內務府支給又奏準健鋭營官軍隨駕於京中官軍內分撥十分之四其軍政親隨兵養亷官軍優恤均與京城同支米與圓明園同官馬人各一匹每匹給官價銀六兩限一年內買足十六年增造新趕繒船二十四號輪換使用十七年奉旨健鋭營賞給教養兵百名每名給食餉銀二兩上三旗五十名下五旗五十名又奏準健鋭營操演事繁嗣後隨駕撥官軍十分之二又定恭遇行幸隨駕並操演時翼領著黃色馬褂前鋒參領藍鑲黃馬褂兵丁黃鑲藍馬褂又定旗色左翼鑲黃右翼正黃均繪金龍制同前鋒營加以黃號帶大纛同又定每月逢四九日操演雲梯大隊三槍逢二七日演撲躍馬騙馬三槍舞鞭舞刀射箭逢三五八十等日操演水戰其一六日各於本旗較馬步射放槍恭遇駕駐圓明園每日操演水戰常日用船四號四旗各二十五人共百人逢八日大操用船八號八旗共二百人均翼領率所屬隨時訓練戰船各用本旗色金龍旗幟十八年奉旨健鋭營增設署前鋒驍騎千名又增教演水師漢侍衛十人又奏準本營所增兵丁應設官管束每旗增設署前鋒參領各二人副前鋒校各五人此內以署前鋒參領二人副前鋒校旗各一人委前鋒旗各十有五人駐紅石山署參領員闕於本營前鋒校內遴選引見補授副前鋒校闕由總統遴委二十一年奉旨裁趕繒船八號二十三年奏裁趕繒船八號並裁隨船水手四十八名三旗虎槍營康熙二十三年黑龍江將軍送到精騎射善殺虎新滿洲四十名到京分𨽻於上三旗設虎槍營以內大臣或侍衛一人為總統每旗各以大臣侍衛參領官員內設虎槍總領每旗設長三旗設虎槍人百二十名凡大狩行田皆從虎槍總統總領皆著黃色馬褂槍長紅色馬褂虎槍人白色馬褂襟均鑲以青雍正元年奏準每旗設虎槍總領二人虎槍長七人副長七人每旗虎槍人百六十名學習虎槍人四十名如遇行田隨蹕人等所領錢糧路費馬匹等項皆由本營移文各該旗支領乾隆三年奏準請鑄給關防三旗設筆帖式三人如遇行田隨蹕人等所領俸祿錢糧路費馬匹均由本營行文支領欽定大清會典則例卷一百八十
