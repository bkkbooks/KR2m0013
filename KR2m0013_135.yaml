東省運河額設淺澑橋閘等夫除嵗給役食銀外每嵗各量給器具銀八錢各州縣額編役食銀三萬二千二百四十兩有竒其不敷銀於幫貼項下取給遇閏加增至大小濬募夫日給工銀六分每人給器具銀二錢八年覆準豫省堡房五百十有二座如遇州縣官升遷事故令其造入工程錢糧交代册內如有破損照不修炮臺烽墩例議處又議準豫省河工增設堡夫三百四十名九年議準江南黃運兩河隄岸每二里蓋堡房一座設夫二名共建堡房千一百五十四座設堡夫二千三百八名歸該管官辨管束住宿堡內常川巡守每日責令擔積土牛以資修補隄工之用十一年議準直隸運河嵗需疏濬應設淺夫六百三名半十二年議準黃河一堡二夫寒暑兩月免其積土每月積土十五方運河一堡二夫糧船往返修補犁溝橛眼每月積土十二方該管汛官各將堡夫所積舊土報明備案以雍正十二年正月為始每名每月如數擔積造於新土冊內彚報並入交盤以專責成十三年議準東省有泉之十七州縣泉夫七百八十四名自雍正十三年為始每名嵗給銀十兩在各州縣地畝銀內照河夫幫貼之例攤入大糧減正加耗分徵支給嵗以春夏秋三季在本境浚泉栽柳冬季調赴運河一例均令濬淺乾隆元年諭河南武陟縣木欒店沁河隄工關繫居民廬舍每年定為民夫修築以防水患里民按畝攤錢計二千四百餘緡頗為地方之纍若設立長夫三十名嵗支工食三百六十兩即可省民間二千餘金著河南總督照此辦理其長夫工食即動豫省存公銀不得私毫纍民永著為例倘胥吏土豪仍借名科斂從重治罪欽此又議準豫省浚栁船六十二向撥河兵看守今河兵既各歸本汛巡守應募長夫六十二名每名嵗給銀八兩運料之時加募水手浚船三名栁船五名每名日給銀五分二年覆準河南孟縣小金隄設樁掃夫四十名每名嵗給銀十二兩遇閏加增一兩三年覆準東省疏濬運河除器具銀外每夫日給工銀五分以為定額又奏準東省滕汛彭口大濬募夫三百名小濬百名均屬不敷應於嶧汛募夫大濬四百名小濬二百名內各減去百名歸於滕汛募用又覆準江南新建之正二閘仍名通濟正三閘仍名福興龍王閘仍名清江其淤閉之廣濟閘别築草壩原設閘夫三十六名以三十名隸通濟閘清江閘原設閘夫三十三名應減去三名福興閘應設閘夫三十名即將廣濟清江二閘所減閘夫九名撥用外再召募二十一名以符額數五年覆準黃運湖河隄工額設堡夫所積土牛改築子堰每夫二十名內選撥六名潑水夯硪免其積土六年奏準裁豫省浚船長夫四十名十年議準東省距河窵逺之泉夫協濬運河皆非素諳每名額支工食銀十兩嗣後扣除六兩嵗於霜降前照數於司庫內撥解河庫轉發沿河州縣代為召募如有餘剩仍令節存道庫以為大小濬通融辦理之用餘銀四兩仍照舊例按名支給止令在本境疏泉栽栁計沿河泉夫滕縣四十名嶧縣二十名魚臺縣二十名濟寧州九名汶上縣四十三名東平州七十八名內除八名撥防戴村壩例不濬河共泉夫二百二名均繫沿河近便仍令照舊協濬毋容扣銀别募其距河窵逺之泰安縣泉夫一百二十一名平隂縣泉夫十名令汶上縣代募萊蕪縣泉夫九十名肥城縣泉夫三十五名令東平州代募新泰縣泉夫七十五名令東阿縣代募寧陽縣泉夫六十一名令嘉祥縣代募泗水縣泉夫六十名曲阜縣泉夫四十名鄒縣泉夫三十名滋陽縣泉夫三十六名䝉隂縣泉夫十有六名均令濟寧州代募十一年議準直隸運河向設淺夫六百三名半嗣於改設河兵案內全行裁去但每嵗運河揠淺究非河兵所素習除零數不計外應酌復舊額之半設淺夫三百名每名月給銀一兩二錢照北運河衩夫之例動支紅撥銀給發報部核銷欽定大清會典則例卷一百三十一
