body:
  text: 工部都水清吏司河工一一職掌順治初年設河道總督一人駐劄濟寧州後移駐清江浦綜理黃運兩河事務通惠河分司一人駐劄通州北河分司一人駐劄張秋南旺分司一人駐劄濟寧州夏鎮分司一人駐劄夏鎮中河分司一人駐劄呂梁洪南河分司一人駐劄髙郵州衛河分司一人駐劄輝縣分管所屬境內嵗修搶修等事康熙四年裁衛河分司歸於彰衛懷道管理十五年裁南旺分司歸濟寧道管理又裁夏鎮分司所有滕嶧二縣河道各閘歸東兗道管理沛縣河道各閘歸淮徐道管理十七年裁北河分司分歸濟寧天津二道管理又裁中河南河分司分歸淮揚淮徐二道管理又議準滕縣河務改歸濟寧道管理又覆準河南歲修工程暫交該撫料理俟江南大工告竣仍照舊例總河親勘具題又議定山東河南特設管理道官一應督修挑築辦料諸務均令河道協同催䟎聨銜會詳一例責成二十二年諭河工關繫緊要蘭家渡決口築塞方完河南隄岸工程專令河南巡撫暫行料理如有應會總河事務仍移文商𣙜毋誤欽此二十三年諭朕觀高家堰地勢高於寶應高郵諸水數倍前人於此作石隄障水實為淮揚屏蔽且使洪澤湖與淮水并力敵黃衝刷淤沙關繫最重今高家堰舊口及周家橋翟壩修築雖久仍須嵗嵗防護不可輕視以隳前功欽此又諭蕭家渡九里岡崔家鎮徐升壩七里溝黃家觜新莊一帶皆緊要近澑之處甚為危險所築長隄與逼水壩須時加防護大約運道之患在黃河禦河全憑隄岸若南北兩隄修築堅固可免決齧則河水不致四潰水不四潰則濬滌淤墊沙去河深隄岸益可無虞今諸處隄防雖經整理還宜培薄增卑隨時修築以防未然又如宿遷桃源清河上下舊設減水諸壩蓋欲分泄漲溢一使隄岸免於衝決可以束水歸漕一使下流疏泄可無淮弱黃强清口噴沙之患近來凡有決工皆仿其意不過暫濟目前之急雖受其益亦有小損倘遇河水泛溢乘勢橫流安保今日減水壩不為他年之決口乎當籌畫精詳使黃河之水順軌東下水行沙刷永無壅決則減水諸壩皆可不用運道既免梗塞之患民生亦無墊溺之憂庶幾一勞永逸河工可告成欽此三十二年奉旨河南工程不必行總河往勘照該撫所請修築三十六年諭海口為黃水入海之道所關甚屬緊要河道總督每年委賢能河官專管修理勿致壅滯欽此三十七年設永定河分司三十八年諭朕審視黃河之水見河身漸高登隄用水平測量見河較高於田行視清口高家堰則洪澤湖水低黃河水高以致河水逆流入湖湖水無從得出泛溢於興化鹽城七州縣此災之所由生也治河上策惟以深濬河身為要諸臣並無言及此者誠能深濬河底則洪澤湖水直達黃河七州縣無泛溢之患民間田廬自然涸出不治其源徒治下流終無禆益今朕親閲下河到海之口及射陽湖一帶淤墊之處總河所帶效力人員甚多可速分委并力開濬蓄積之水倘能稍泄亦有益也至於黃淮交匯之口過於徑直所以黃水常逆流而入今宜將黃河南岸近淮之隄更迤東長二三里築令堅固淮水近河之隄亦迤東灣曲拓築使之斜行會流則黃水不致倒灌入淮矣再河流不迅急無以刷去河底之沙河直則澑自急澑急則沙自刷而河自深宜於清口之西數灣曲處試行濬直如直濬有益漸將上流曲處嵗加直濬庶幾黃河之險自除而河底漸深洪澤湖之水漸出七州縣之水患可漸息矣欽此四十年覆準裁通惠河分司歸通永道管理四十四年奉旨直隸山東河道與總河相距甚逺應照河南例令各該巡撫就近料理四十八年諭河防緊要不可稍忽宿遷以下有清水入黃河得以刷沙遄行宿遷以上至河南一帶無清水入黃河必須將兩岸隄工小心修防令水不出漕𨗳水由漕中行無淤沙之患至於黃河發水由上源寧夏而來著陜西總督轉行寧夏同知遇黃河長水時速報總河河南巡撫豫為修防欽此雍正二年議準以河南武陟中牟等縣隄工緊要設副總河一人管理豫省河務三年覆準豫省增設河官凡嵗修搶修均令河汛各官專司其事倘遇緊要大工仍令沿河印官與汛河各官協同辦理四年諭近年豫省河務險工下移隄岸完固山東河務甚屬緊要向繫山東巡撫管理但巡撫有地方責任恐不能兼理河務山東與河南接壤令副總河兼管欽此又議準直隸河道分為四局南運河與臧家橋以下之子牙河苑家口以東之淀河為一局令天津道就近管理舊有天津同知泊河同知及各地方管河同知通判縣丞主簿等官悉歸管轄永定河分為一局將永定河分司改為河道駐劄固安縣總理其沿河州縣各增設丞簿等官以資分防除所有同知一人外將向來效力人員一概徹回運河分為一局徹去分司歸通永道兼管其管河州判等官悉歸管轄苑家口以西各淀及畿南諸河為一局將大名道改為清河道移駐保定府舊有管河同知通判州判丞簿等官悉歸管轄又議準設江南葦蕩營參將一人守備二人五年議準黃河南岸劉家口壩工歸商虞二縣就近管理又奏準豫省險汛下移於開封府南岸增設主簿一人管理開封府下北河增設巡檢二人一駐祥符陳留適中之地一駐蘭陽儀封適中之地遇險要工程協同㕔汛各官辦理其祥符北岸汰黃隄一道亦令管理修墊六年議準江南河營設參將一人統轄淮徐九營淮揚十一營每營設守備一人淮徐淮揚各設游擊一人除舊存七營外如額建設以專責成七年諭治河之道惟有使黃水暢流無所壅滯則永慶安瀾然使黃水無所壅滯必須保固高家堰隄工使清水力能敵黃且以助其暢流之勢從前總河雖將石工稍加幫修不若多費帑金於隄工險要之所及卑薄之處皆加修石工務令堅固高厚以為久逺之計欽此又諭副總河專理北河總河兼理南北兩河之事今朕欲分任南北兩河又思治河之道必合全河形勢通行籌畫方可疏𨗳安瀾若分令兩人管理亦有推諉掣肘之處著詳議具奏欽此遵旨議準河之南北因地而分其原委分流本屬一貫河臣雖分兩人而辦事應如一體請授總河為總督江南河道提督軍務授副總河為總督河南山東河道提督軍務分管南北兩河其有江南河東修理工程令公同商酌會槀具題倘遇緊要搶修一面堵築一面知會不得藉會商為名以致遲誤工程至題補河官及奏銷錢糧等事仍令分辦又議準設河南豫河懷河守備各一人八年議準設直隸河道總督一人九年議準增設石景山同知一人屬永定河道管轄又覆準山東運河一應修築隄岸閘壩工程均責令管河㕔汛等官分司修防不得推諉倘有疏虞題參賠修如别案大工仍令地方官與管河各官分段修築又覆準江南邳睢同知照舊管黃運兩河工程宿虹同知專管黃河兩岸一百四十餘里並將宿桃中河通判舊管黃河葉家莊竇家林等工歸於該同知管理宿桃中河通判改為宿遷運河通判管理宿遷至古城運河兩岸子隄長九十里並將宿虹㕔舊管運河兩岸隄工長四十八里歸於該通判管理安清中河通判改為桃源安清中河通判原管運河自桃源三汊河起至清河縣楊家莊止兩岸子隄又運鹽中河一道自運口沿河閘起至安東縣止並將宿桃中河通判舊管古城以下至三汊運河兩岸子隄歸於該通判管理海防同知原駐廟灣應移駐童家營適中之處改為分管山安南岸河務海防同知將外河㕔南岸工程之內自新港頭工起至山安交界陳家社計長百有五里又山安㕔南岸工程之內自陳家社起至陶家社竈土隄尾止計長六十一里歸并該同知就近管理增設巡檢把總各一人管理原屬外河㕔所管上河汛新港頭起至葉家營止工長六千二十七丈江防同知改為揚河江防同知駐劄瓜洲原管江口及三汊河迤南河道二十五里將揚河㕔工程之內自邵伯迤北高江交界三十里鋪起至三汊河止兩岸各工長八十里分歸管理十年議準設江南河庫道十二年議準設山東運河道又議準直隸復設大名道兼管河務又增設永定河北岸同知三角淀通判乾隆元年諭治河之道在因其勢而利導之司河務者必將全河形勢熟悉胸中隄防疏濬在在得宜始可以行所無事而致安瀾之慶也黃河自河南武陟至江南安東入海長隄綿亘二千餘里舊設總河一人駐劄清江浦雍正七年復設河東總河誠慮鞭長不及故俾南北分隸各有責成惟是河流日久變遷舊險既去新險復生其間防浚事宜有病在上流而應於下流治之者有病在下流而應於上流治之者必須通局合算同心協理庶無顧此失彼之憂若河臣於南北形勢未能洞悉遇有開河築隄等事或至各懷意見彼此參商則上游下游必有受弊之處所關匪細徐州府當南北之衝為兩河關鍵最為緊要見設南河副總河應移駐徐州以專督率如兩河有應會商事宜就近可與南北河臣公同踏勘應開浚者即行開浚應堵築者即行堵築毋得推諉亦無得掣肘於河務似有禆益著江南總河河東總河確議具奏欽此遵旨議定副總河移駐徐州凡兩河應行會商事宜即就近與南北河臣公同酌議立即舉行其毛城鋪等處減水閘壩就近督率徐屬㕔營按時啓閉隨宜辦理如病在上流而應於下流治之者北河臣豫為知會副河臣與南河臣踏勘定議興工如病在下流而應於上流治之者南河臣亦即知會副河臣與北河臣踏勘定議興工如上流開河築隄有礙下流下流開河築隄有礙上流並知會副河臣會勘妥議其動用錢糧仍照南北工程定例又議準山東增設黃運河守備一人二年徹回江南副總河又議準江南徐屬同知改為銅沛同知並增設豐蕭碭通判一人其餘十五㕔仍舊管理又議準山東東平濟寧二州泉務令各該州州同管理汶上滕鄒泰安滋陽寧陽六縣泉務令各該縣縣丞管理平隂萊蕪肥城三縣泉務令泰安府經歷管理曲阜泗水二縣泉務令兗州府經歷管理䝉陰縣泉務令沂州府經歷管理新泰縣泉務令該縣上泗莊巡檢管理嶧縣泉務令滕縣縣丞兼管魚臺縣泉務令濟寧州州同兼管仍聽管泉通判管轄其地方一切公務管泉各官均免其差委至該州縣泉源泉河及䕃泉樹木沿河柳株均責令該員督率泉夫不時疏濬栽植倘因循怠惰泉務廢弛即將專管之官參究如通判不實力巡察通同徇隱該督撫一并參處至冬閒協挑運河亦令該員管押其有泉州縣印官改為兼管官令其稽察催䟎仍令管泉通判不時巡察所屬如泉流暢達樹木繁茂有益運道該河道總督酌量具題豫以議叙又奏準巡視山東漕運御史與河臣協同督察大濬小濬工程三年諭毛城鋪工程漸次就緒但此地至洪澤湖河湖水道六百餘里經過十數州縣土壤相錯若無專官統轄則丞簿微員呼應不靈所有一切隄岸壩座工程未必經久堅固况見在修防疏濬尚須逐年料理則歲修之費當豫為籌及者著總河會同總督悉心妥議於就近㕔員中歸并何官管轄並酌定歲修之費若干每年冬末春初河水未發時相度修治俾地方永受其益欽此遵旨議準毛城鋪減水壩迤下河道令豐蕭碭河務通判銅沛河務同知邳睢靈壁河務同知宿虹河務同知山盱河務通判各照所屬地方分界管理子堰或經卑薄河道間有淤阻均令隨時修補疏𨗳又議準河南商邱虞城三汛隄工應清界址虞隄自一堡至火神廟止長千有五十丈五尺改撥商汛與商隄相接商隄自五虎廟東埠口至蕭家莊止長千有九十一丈改撥虞汛與虞隄相接曹縣越隄一段長一百八十八丈東九十四丈改撥虞城上汛西九十四丈改撥商邱汛則工段聨絡便於巡防四年議準設河南儀考通判又議準設永定河營守備又奏準洪澤湖發源桐柏淮泗及七十二溪等處閒嵗冬春河臣會委大員將河形水勢通塞衰旺以及分支合流可引可截各情事詳細勘明豫為酌定五年議準設河南曹儀通判又議準山東兗沂曹道兼管黃河工程又議準總河所轄漕河每年應詳按形勢察明脈絡凡各處泉河淀泊以及支河汊港關繫濟運之處窮源溯委將道里逺近見在隄身高寬丈尺何處發源入漕何處泄水歸宿並將各隄閘壩舊制新增更改事宜逐一分晰繪圖黏單呈送到部以備稽考六年議準裁直隸祁河通判改設子牙河通判七年覆準河南彰德懷慶二府通判各令兼理河務九年奏準江南淮徐淮揚二道原繫分巡兼管河務但河工關繫緊要該二道有管轄㕔汛之責嗣後應令其專管河道十四年奉旨直隸河道令總督兼管又設江南協辦河務官職掌與副總河同十六年諭洪澤湖上承清淮汝潁諸水匯為巨浸所以保障者惟高堰一隄天然壩乃其尾閭伏秋盛漲輒開此壩泄之而下游諸縣胥被其患冬月清水勢弱不能刷黃往往濁流倒灌在下游居民深以開壩為懼而河臣轉藉為防險祕鑰二者恆相持朕南巡親臨高堰循隄而南越三滚壩至蔣家閘周覽形勢乃知天然壩斷不可開夫設隄以衛民也隄設而民仍被其災設之何用若苐掣流緩漲自保上游搶險各工而鄰國為壑田廬淹沒弗復顧惜此豈國家建立石隄保障生靈本意耶為河臣者固不當如此存心也天然壩當立石永禁開放以杜絶妄見近者河臣等於開天然壩亦深以為非而請於三滚壩外增建石滾壩以資宣泄朕親臨閲視謂增三為五即以過水一二尺言之向過三尺者即為五尺向過六尺者增而至丈是與天然壩名異實同人必有議其巧避開壩之名而隂襲其用者是當為之限制上年滾壩過水三尺五寸天然壩仍未開放應即以是為準俾五壩石面高下維均以仁義禮智信為之次仁義禮三壩一如其舊智信二壩則於石面之上加封浮土必仁義禮三壩已過水三尺五寸猶不足以減盛漲則啓智壩之土仍不減乃次及於信斯為節宣有度較之開天然壩之一往莫禦者懸殊矣再高堰石隄至南滾壩以南舊用土工石隄有首無尾形勢不稱應自新建信壩北雁翅以北一律改建石工南雁翅以南至蔣家閘水勢益平則石基甎甃如此方首尾完固屹如金湯永為淮揚利賴至洪湖束水藉以刷黃而上游宿虹鳳潁諸邑嵗被水患議者謂洪湖盛漲諸邑先被其災泄洪湖仍於上游無補自朕觀之漲減則上游之漫溢者亦減此固在封疆大吏於未被水時先事綢繆而司水土者亦未可謂閭閻休戚非己職掌所在而專以束水保隄為得計也河工宿弊不可枚舉而無益之費尤多或明知無用而因循不廢或因以為利而妄事興修即以朕巡視高堰一隄之內已不勝屈指數然觀河臣管領河漕數千里民命所繫視督撫綏緝一二省者為難冒涉風雨守護隄防亦視督撫坐辦案牘者為勞而督撫職在刑名錢榖事有實據是非難掩河臣遵守章程可以福命茍安無事則其任較易向來河臣不乏表表尸祝之輩而糜帑養患有罪無功其識機宜得關鍵實著功效者幾人哉果使全不興工則置民瘼於不問河臣幾於虛設固無此政體如其糜脂膏以擲虛牝則蠹弊之最巨者總之河不可不治而無循其虛名工不可不興而必歸於實用我皇祖聖祖仁皇帝屢幸南河躬親指示平成睿略萬世永賴朕何能仰企一二即經臨視有所籌畫亦不敢自信為必不可易惟愛養黎元揆理度務崇實敦本兢兢業業之衷可共白耳將此詳悉宣諭中外臣民其庀材興工一切應行事宜河臣會同督臣按例確估具題欽此一河員江南河道總督一人所屬河庫道一人淮徐河道一人轄六㕔同知四人通判二人二十四汛州同州判各一人縣丞五人主簿十有二人巡檢七人內大壩運河二汛各巡檢二人淮揚河道一人轄十一㕔同知五人通判六人三十八汛州同州判各三人縣丞十有四人主簿十人巡檢八人十四閘閘官十有一人內一官管四閘河營參將一人轄淮徐河營游擊一人守備九人千總八人把總十有三人淮揚河營游擊一人守備十有一人千總九人把總十有七人葦蕩營參將一人轄守備千總把總各四人山東河南河道總督一人所屬山東運河道一人轄七㕔同知二人通判五人二十八汛州同州判各三人縣丞九人內一丞管二汛主簿十有二人分理泉河州同二人府經歷三人縣丞六人巡檢一人四十八閘閘官三十一人內一官管二閘者九一官管三閘者四兗沂曹兼管黃河道一人轄一㕔同知一人四汛縣丞一人主簿二人巡檢一人河營守備一人千總五人把總二人管河衛守備二人千總二人河南開歸陳道一人轄四㕔同知通判各二人十二汛州判一人縣丞七人主簿四人彰衛懷道一人轄七㕔同知三人通判四人二十汛縣丞八人主簿十人巡檢二人河營守備二人協辦守備二人千總四人把總三人直隸總督兼管河道總督一人所屬永定河道一人轄四㕔同知三人通判一人十五汛州判三人縣丞主簿各五人吏目二人通永河道一人轄三㕔同知一人通判二人十三汛州同一人州判四人縣丞三人主簿五人天津河道一人轄四㕔同知通判各二人西汛縣丞三人東汛州判二人縣丞一人主簿五人巡檢一人清河道一人轄二㕔同知通判各一人分汛州判三人兼河務知縣三人縣丞七人主簿三人巡檢二人典史一人大廣順河道一人轄三㕔同知三人分汛兼河務知縣十有五人縣丞四人典史二人河營守備一人千總八人把總十有四人垡船千把總各一人一河兵江南河兵九千一百四十五名內食戰糧者千八百二十九名葦蕩營樵採兵千四百十有九名內食馬戰糧者六十名步戰糧者五十九名山東河兵六百名內食戰糧者百二十名河南河兵千一百名內食戰糧者二