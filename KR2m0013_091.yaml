帝見仁憲皇太后哀痛勞瘁慈顔瘦減遣大臣內監奏請滿月致祭時聖躬不必親往仁憲皇太后不允外藩王等因喪事進獻馬匹等物如例特加軫念令各減數王以下公以上納馬三匹台吉以下納馬一匹二十五日行周月致祭禮陳金銀定五萬楮錢五萬饌筵二十一席羊九酒九尊聖祖仁皇帝親詣殯宮王以下鎮國將軍以上民公以下滿漢文武三品官以上公主福晉以下鎮國將軍夫人以上民公夫人以下都統尚書子一品夫人以上齊集舉哀祭酒行禮如常儀禮畢聖駕還宮嗣後聖祖仁皇帝常詣殯宮上食舉哀或還側殿或居殯宮倚廬越日乃還每遇滿月致祭淸明致祭親詣祭酒王以下齊集舉哀行禮與初周月同四月初三日行百日致祭禮陳金銀定五萬楮錢四萬五千楮帛二萬饌筵二十五席羊九酒十有三尊聖祖仁皇帝親詣殯宮王以下各官外藩王等及公主福晉以下大臣命婦齊集舉哀讀文致祭行禮如大祭儀初五日行祖奠禮陳金銀定五萬楮錢楮帛各五萬饌筵三十一席羊九酒十有五尊聖祖仁皇帝親詣殯宮王以下鎮國將軍及內大臣侍衛都統尚書子以上並內府官員公主福晉以下鎮國將軍夫人及都統尚書子一品夫人以上及內府男婦齊集舉哀讀文致祭行禮如大祭儀大葬前期開列總理喪儀大臣並禮工二部內務府總管姻戚大臣請旨欽命者方得入地宮執事並開列管押匠夫官四人職名暨夫匠人數具奏其執香鐙內監交總管內監等奏除內監十人此外不得擅入初七日由殯宮奉移梓宮啓行儀駕全設舁大升輿校尉民夫一百二十八人首班末班用校尉餘用近畿民夫共分六十班日用三十班每班備四人城夫鄉夫除給衣履盤費外仍各免本身一年丁銀計夫役七千九百二十人直隸巡撫今改總督率司道府州縣等官管轄前來會同在京三品京堂以下科道主事以上八旗遴選公侯伯以下雲騎尉以上及前鋒參領護軍參領上三旗一等侍衛下五旗王府長史散騎郎一等護衛等官每班各四人管束工部夫頭四人豫備四人分為兩班輪擊響尺節示進退鑾儀衛官更番指示王以下奉恩將軍以上在土城關外大路南齊集內大臣侍衛及內府官員在日壇北齊集覺羅民公以下滿漢文武各官三品職掌以上官員留三分之二在署辦事其一分由各衙門奏請隨送及衍聖公五經博士等在八里莊西分翼齊集內監等在殯宮大門外東旁齊集公主福晉以下奉恩將軍及副都統侍郎男夫人以上在大門內齊集內務府婦女在兩旁牆外序立至期焚楮錢聖祖仁皇帝哀慟不勝祭酒三爵每祭行一拜禮衆皆隨行禮舉哀禮畢奉移梓宮至大門外登大升輿禮部尚書祭輿三祭三叩興靈駕發徽號玉册玉寶恭設輿內前行聖祖仁皇帝哭踊扶掖步行三里餘始乘馬舁夫更班時必下馬跪道旁沿塗哀慟哭不停聲所過門橋遣內大臣祭酒仁憲皇太后及妃等由别道行因隨送王以下各官豫往前候迎者衆恐道壅難及故王以下官員命婦齊集者各候靈駕至舉哀跪迎候過興不隨送王以下各官及公主福晉命婦各退隨送王以下各官及慈寧宮人公主福晉等並內府婦女各按隊乘馬及輿隨行靈駕將至蘆殿聖祖仁皇帝下馬步哭王以下各官至第七班豫往序立蘆殿北門外靈駕至跪哭隨後行奉安蘆殿祭酒行禮衆隨行禮舉哀畢各退在塗每日早陳設儀駕聖祖仁皇帝祭酒號慟步行數里每舁夫更班輒親行審視將至蘆殿復號慟步行如初啓行時王以下齊集跪哭送迎如前儀沿塗百里內文武官跪迎靈駕於道右舉哀候過至宿次在正門外行三跪九叩禮上食時隨衆行禮十四日禮部以是日丙辰例不哭泣奏請勿詣靈前不聽是日守暫安奉殿並執事各官及守孝陵皇后陵寢不直班各官皆至淋河舉哀跪迎候過隨行靈駕至奉安梓宮於饗殿設几筵是日遣大臣祗告孝陵皇后陵寢嗣後每日詣几筵前奠獻三次王以下各官齊集舉哀行禮十五日聖祖仁皇帝奉仁憲皇太后率妃等恭謁孝陵行三跪九拜禮祭酒三爵每祭酒一拜興舉哀詣皇后陵寢祭酒三爵每祭酒一拜興舉哀惟妃等行六肅三跪三拜禮朝鮮國使臣進香於饗殿致祭送往王以下各官咸齊集鳴贊官贊使臣行三跪九叩禮讀文祭酒時遣王一人祭酒衆隨行禮舉哀畢復贊使臣行二跪六叩禮畢各退十六日扈從王以下各官恭謁孝陵皇后陵寢行三跪九叩禮興舉哀十七日行奉安致祭禮陳金銀定三萬楮錢楮帛各三萬祭筵二十五席羊七酒十有五尊聖祖仁皇帝祭酒王以下各官齊集舉哀行禮如儀十八日行遷奠禮儀仗全設王以下各官序立饗殿右聖祖仁皇帝祭酒三爵王以下各官隨行禮梓宮出饗殿衆皆跪舉哀候過隨行至大門外分翼序立公主福晉等及內府婦女豫往大門內琉璃花門外分翼序立奉安暫安奉殿內府官奉册設梓宮左奉寶設梓宮右聖祖仁皇帝祭酒三爵衆隨行禮舉哀畢各退十九日奉安梓宮於暫安奉殿聖祖仁皇帝祭酒三爵王以下各官隨行禮舉哀奉安梓宮時聖祖仁皇帝躬親舉扶安設復哀慟祭酒三爵行三跪九拜禮衆隨行禮舉哀畢各退是日遣大臣祗告孝陵皇后陵寢聖駕駐蹕近陵所在俟修理殿工二十二日親詣暫安奉殿視封掩畢祭酒三爵哀慟良久乃還京設暫安奉殿奉祀郎中一人員外郎二人讀祝官二人贊禮郎四人筆帖式四人內務府關防筆帖式二人凡應行文移用孝陵奉祀關防內務府應行事宜用孝陵修造關防皆不别給每旗設防禦二人皆以皇后陵寢官員諳練者調補一半守護兵八十名附孝陵總管統轄內務府郎中一人內管領一人尚茶正尚膳正各一人其餘內監人等悉按孝陵例設五月初五日內閣會翰林院詹事府恭擬大行太皇太后尊諡曰孝莊仁宣誠憲恭懿翊天啓聖文皇后議上令該衙門擬