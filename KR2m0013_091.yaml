几筵陳册寶於左右奠獻舉哀畢各退是日遣官各一人祗告暫安奉殿孝陵孝誠仁皇后陵寢並遣官祗告孝陵后土昌瑞山神每日照常三次上食寧壽宮宮女及內府婦女照常齊集舉哀四月初五日行安奉遣奠禮陳羊酒祭筵楮帛如數王以下齊集舉哀致祭行禮如常儀初七日奉安梓宮於寶城地宮前期三日遣官各一人祗告天地太廟社稷至日送往王以下各官於大門外按翼序立奉移梓宮時皇子祭酒三爵衆隨行禮公主福晉以下婦女等豫至寶城蘆殿前甬道東序立俟梓宮至跪迎舉哀梓宮升龍輴陳册寶於兩旁皇子祭酒三爵衆皆隨舉哀行禮是日儀駕皆焚訖至時皇子祭酒三爵移龍輴由隧道入地宮安奉寶牀陳册寶於左右石几掩閉元宮皇子祭酒三爵舉哀衆隨行禮畢卒哭各退是日遣官祭孝陵后土昌瑞山神是日以孝惠章皇后奉安地宮禮成遣官祗告暫安奉殿孝陵並告孝誠仁皇后陵寢中元遣皇子詣孝東陵行禮如儀十二月初二日行恭題神主禮遣滿漢大學士各一人朝服盥手詣香案前跪上香畢同行一跪三叩禮興於神主空點處填石靑畢復行一跪三叩禮退初五日聖祖仁皇帝親詣孝東陵行期年致祭禮十六日奉孝惠章皇后神主升祔太廟詳見升祔儀孝恭仁皇后大喪儀雍正元年五月仁壽皇太后不豫世宗憲皇帝親侍湯藥至二十三日仁壽皇太后崩世宗憲皇帝劈踊號慟呼天搶地哭無停聲水漿不御戌時恭奉梓宫奉安寧壽宮正殿設几筵建丹旐於寧壽門外之右設奠舉哀於蒼震門內設倚廬以居簡命王大臣恭理喪儀並除進爵大臣乃成服世宗憲皇帝截髮辮成服及諸子王貝勒貝子咸截髮辮成服皇子孫輩咸成服孝敬憲皇后率貴妃妃嬪宮人等皆成服王以下奉恩將軍以上民公侯伯以下有頂帶官員以上咸成服公主福晉以下鄉君奉恩將軍恭人以上民公侯伯一品夫人以下男夫人以上內府三旗官員等妻咸成服罷斥宗室覺羅亦準成服太廟奉先殿祭神殿執事內監男婦及出征軍營官兵家屬漢官命婦皆停給孝服本人父母新喪及兒女出痘暫免成服外藩公主福晉等額駙王台吉等在制內至京者令成服除服後至京者男摘冠纓女去首飾三日軍前將軍以下兵丁以上文到之日為始摘冠纓三日移文各省督撫提鎮官員停其遣官進香回籍四品以上官免其來京叩謁梓宮二十四日行朝奠禮日中奠饌筵晡時夕奠王以下官員公主福晉以下命婦等咸齊集隨班行禮初喪三日內每日哭臨二次公主福晉以下鄉君入八分公夫人以上於寧壽門內西旁不入八分公民公侯伯一品夫人以下侍郎男夫人以上於寧壽門東門外內府官員等妻於命婦後齊集王以下入八分公以上內大臣侍衛滿漢大學士仁壽皇太后姻戚人等在寧壽門外不入八分公民公侯伯以下滿漢文武官員以上於寧壽門西門外內府官員於寧壽門外西牆下哭臨第四日王公大臣等以上公主福晉以下男夫人以上皆每日早齊集一次至祭祀奉移等日仍照常齊集內府三旗官員等妻日以一旗輪流齊集王以下文武官員百日內不作樂不嫁娶軍民人等摘纓除首飾不作樂不嫁娶凡二十七日次日頒仁壽皇太后遺誥於天下停止開讀禮部堂司官至內閣領取刋刻差官送往直省及朝鮮國自誥到之日為始照例成服二十七日而除是日諭理藩院皇妣天性仁慈衆所共知今皇妣大事外藩公主郡主等蒙古王公台吉等聞之自必速來伊等感戴皇考皇妣深恩竭誠來謁固所當然但時值炎暑蒙古內未出痘者甚多塗間急行人馬衝暑到京或致有傷則重違皇考皇妣之聖心朕有所不忍將此傳諭諸蒙古各旗伊等斷不可來前者皇考大事朕曾諭蒙古諸藩令於八月杪恭謁山陵目前正值炎暑著停止前來蒙古王內除未出痘者不必來外應來者於八月杪來京伊等旗下地方亦屬緊要不可踈防來時或扎薩克或協理旗務台吉必留一人辦事至公主郡主等有必欲來者亦不必急迫從容前來欽此又奉旨天甚炎暑年邁者六十五歲以上但於朝奠齊集一次六十五歲以下有疾病不能者亦著齊集一次二十五日行奉移致祭禮陳羊酒祭筵楮帛如數陳冠服王公百官咸齊集設俎豆於几筵前列饌筵於丹陛兩旁設祭文案於西簷下是日早禮部堂官奉祭文由寧壽宮中門入恭設於西簷下案上至時世宗憲皇帝詣几筵獻茶上食畢進奠几讀祝官奉祭文跪世宗憲皇帝於奠几前跪衆各於齊集處跪哀暫止讀文畢舉哀祭酒三爵每祭行一拜禮衆隨行禮舉哀徹饌王以下大臣官員以上皆出讀祝官恭奉祭文禮部堂官前導送至燎所交掌儀司首領內監奉立東側禮部堂官及讀祝官退女官舉冠服送燎所大臣命婦官員等妻咸送至燎位欽命王福晉祭酒三爵每祭一叩衆隨行禮興舉哀畢各退二十六日恭移梓宮奉安於壽皇殿世宗憲皇帝祭酒行禮梓宮啓行舉哀跪送儀駕全設恭奉徽號册寶陳采亭內前列凡仁壽皇太后服御器用令內侍恭奉前行由東華門出進景山東門諸王大臣宗室文武官員按翼齊集跪舉哀候過隨行漢大臣官員等豫至騎河樓齊集候靈駕至跪迎舉哀候過隨行內大臣大學士等於景山東門內尚書侍郎等於景山東門外序立舉哀孝敬憲皇后率貴妃妃嬪等豫往祗候於壽皇殿後左旁世宗憲皇帝豫由神武門出祗候於壽皇殿大門外候靈駕至舉哀跪迎奉安梓宮於殿內設几筵世宗憲皇帝祭酒行禮衆隨行禮畢諸王百官懇請還宮世宗憲皇帝乃於順貞門內設倚廬以居日親奠獻是日諭禮部恭上大行皇太后尊諡二十七日諸王大臣等疏稱時當盛暑請間兩三日躬親奠獻奉旨朕念皇妣誕育渺躬慈恩罔極今初成服間日一詣朕實難安按之典禮三次設奠皆宜躬親今止恭詣一次已勉從諸臣所請每日淸晨哭奠盡哀方得少展思慕父母之心不如是朕不能忍反於朕躬無益諸王大臣當諒朕此意勿得再奏六月初五日行初祭禮陳羊酒饌筵楮帛如數世宗憲皇帝親行奠獻儀與奉移致祭禮同次日繹祭陳羊酒饌筵楮帛如數致祭行禮如儀是日奏準梓宫照例漆飾四十九次十九日行大祭禮陳設禮儀與初祭同是日滿二十七日世宗憲皇帝除服衆皆除服次日繹祭陳設禮儀與前繹祭同二十三日行周月致祭禮陳羊酒祭筵楮帛如數儀與奉移致祭禮同凡周月祭儀同七月十五日行中元致祭禮陳金銀定十萬楮錢七萬畫段萬端楮帛二萬端饌筵二十一席羊九酒九尊世宗憲皇帝親行奠獻儀與周月祭同八月十二日恭上仁壽皇太后尊諡曰孝恭宣惠溫肅定裕贊天承聖仁皇后前期一日遣官祗告天地太廟後殿奉先殿社稷聖祖仁皇帝几筵恭上尊諡日儀駕全設於壽皇殿大門外一應禮儀均與恭上聖祖仁皇帝尊諡禮同世宗憲皇帝奉册寶執事各官及齊集王公官員咸素服禮成次日頒詔天下十七日行祖奠禮世宗憲皇帝親詣行禮讀文致祭與前奉移殯宮祗告禮同十八日恭移孝恭仁皇后梓宮至景陵前期三日遣官各一人祗告天地太廟社稷前期一日遣官各一人祗告景陵后土昌瑞山神沿塗分定五程每宿次搭蓋蘆殿是日世宗憲皇帝詣梓宮前祭酒舉哀跪視梓宮登大升輿步從至景山東門外王以下滿漢一品大臣及內府官員等於壽皇殿大門外二三品滿漢大臣於景山東門外四品以下有頂帶官員以上於城外關廂各按翼齊集公主近支王公福晉等於壽皇殿內齊集諸王福晉以下一品夫人以上於壽皇殿大門內西牆三旗大臣夫人內府官員等妻於壽皇殿大門外西牆下齊集各隨班行禮舉哀跪送靈駕發內府婦女六十人乘馬隨後行每班以內監十人近兩旁輪流步行恭理喪儀王公大臣內務府工部鑾儀衛堂官欽命近前王公及仁壽皇太后姻戚在靈駕左右隨行不送往之王公大小官員各退其隨送王公大臣官員各按次乘馬隨行每過門橋遣內大臣祭酒三爵焚楮錢世宗憲皇帝由地安門出東直門豫至宿次蘆殿祗候王公大小官員等在黃布幔城北門外按翼序立靈駕至舉哀跪迎奉安蘆殿行夕奠禮次日早陳設儀駕行朝奠禮跪送靈駕發世宗憲皇帝仍先詣蘆殿祗候行夕奠禮在塗及至山陵禮亦如之沿塗五十里內地方文武官咸於路右百步外跪迎舉哀候過至宿次在黃幔城外行三跪九叩禮奠獻時文官在左翼正藍旗末武官在右翼鑲藍旗末隨班舉哀行禮二十四日世宗憲皇帝謁暫安奉殿孝陵孝東陵祭酒行禮舉哀畢遂詣景陵祭酒行禮舉哀畢乃出至黃幄內祗候凡守護三陵官員同景陵大臣官員皆出興龍口之外排班跪迎舉哀候過隨行靈駕至世宗憲皇帝跪迎於碑亭前步從入饗殿之左蘆殿內安奉設几筵內府官奉册寶陳於几筵左右世宗憲皇帝祭酒行禮舉哀畢傳諭曰皇太后素性謙謹事聖祖仁皇帝數十年未常少懈今暫安奉仁壽皇太后梓宮於蘆殿饗殿內見奉聖祖仁皇帝梓宮仁壽皇太后前一應供獻及祭文不可由中門出入皆應於西門行走以仰體我皇妣謙沖至意是日遣官各一人以孝恭仁皇后梓宮至陵祗告暫安奉殿孝陵孝東陵聖祖仁皇帝几筵二十五日行安奉致祭禮儀駕全設陳羊酒饌筵楮帛如數王以下官員外藩王台吉等及守陵大臣官員內監執事人及大臣命婦官員執事人等之妻咸齊集世宗憲皇帝先詣聖祖仁皇帝几筵前奠獻畢詣孝恭仁皇后几筵前讀文致祭行禮舉哀齊集王以下各官皆隨行禮舉哀二十七日行百日致祭禮陳羊酒饌筵楮帛如數儀與安奉致祭禮同二十九日行奉移遷奠禮九月初一日行奉安寶城入地宮禮行恭題神主禮題畢行虞祭禮恭奉神主回京沿塗行朝夕奠禮一應大典並載聖祖仁皇帝大喪儀九月初四日奉聖祖仁皇帝神主孝恭仁皇后神主升祔太廟孝誠仁皇后孝昭仁皇后孝懿仁皇后神主同日升祔見升祔儀雍正二年五月二十三日孝恭仁皇后期年遣官詣景陵致祭行禮聖祖仁皇帝服闋世宗憲皇帝以孝恭仁皇后服制未滿仍齋居養心殿素服涖事總理事務王大臣等奏稱聖祖仁皇帝服制已滿祫祭太廟禮成允宜遵照古制舉行國家吉禮伏祈聖駕御乾淸宮統理庶政至宮內一應齋戒之處均按吉禮舉行奉旨國家大禮皇考皇妣雖有輕重之别而朕之私衷則不容分視外邊吉禮令照國家典制舉行已有諭旨朕於宮中務期獨盡人子之禮況今二十七月並非勉強從事沽取孝名以為觀美秪求朕心之安耳禮盡則朕心自安朕意已定諸王大臣毋得再奏欽定大淸會典則例卷八十七
