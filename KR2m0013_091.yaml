body:
  text: 禮部祠祭淸吏司喪禮二上孝端文皇后大喪儀順治六年四月十七日孝端文皇后崩恭奉梓宮於宮中正殿設几筵建丹旐於宮門外之右親王以下輕車都尉以上公主親王福晉以下正黃鑲黃二旗輕車都尉三等侍衛命婦以上六旗雲騎尉命婦以上各按翼齊集世祖章皇帝率王以下文武各官公主福晉以下官員命婦皆成服男摘冠纓女去首飾凡初祭大祭繹祭月祭百日等祭一應禮儀咸與太宗文皇帝大喪禮同七年二月奉移寶位恭送昭陵行加上尊諡禮合葬昭陵禮奉移禮三次祭文均內院撰擬前期禮部官恭奉至殯宫設西旁黃案上上尊諡日設黃幄於殯殿外大學士奉册文設黃案上恭上尊諡曰孝端正敬仁懿莊敏輔天協聖文皇后是日皇妃公主福晉以下貝勒夫人縣君一品夫人以上親王以下二品官以上按翼序列殯宫前奠獻饌筵世祖章皇帝跪祭酒三爵衆皆跪三叩徹奠畢大學士奉册宣讀內院官奉祭文宣讀衆皆跪宣畢興奉祭文送燎所焚畢衆皆退前期禮部官奉升祔太廟神主至內院奉安黃案上上香大學士一跪三叩興書尊諡於神主又於殯殿西張黃幄於路之正中內設黃案二奉移日黎明大學士一人於祔太廟神主案前一跪三叩恭奉神主奉安黃亭內一跪三叩內官舁亭前列御仗一對至黃幄止大學士詣亭前一跪三叩奉神主奉安黃幄內黃案上上香候靈駕至往送各官進殯殿內行奉移禮祭酒三爵恭奉寶位奉安黃輿啓行至黃幄前暫停大學士一人詣幄內黃案前一跪三叩興於神主上點石靑畢一跪三叩興往送各官奉靈駕啓行前詣昭陵安設致祭行禮合葬地宮咸與太宗文皇帝大葬儀同孝康章皇后大喪儀康熙二年二月十一日慈和皇太后崩先是慈和皇太后違豫聖祖仁皇帝朝夕親視湯藥及大漸憂悴弗勝寢膳皆忘輔臣近侍等見聖容淸減奏請還宮少休不允時太皇太后以慈和皇太后疾軫念日切聖祖仁皇帝數詣慈寧宮問安強斂戚容冀慰聖懷退輒涕泗交頥至是慈馭上賓聖祖仁皇帝劈踊哀號水漿不御哭無停聲近侍無不感泣恭奉梓宮於宮中正殿設几筵建丹旐於宮門外之右儀駕全設聖祖仁皇帝截髮辮成服王以下文武各官齊集宮門外公主福晉以下縣君及副都統侍郎男夫人以上齊集宮內咸服縞素每日三次上食聖祖仁皇帝親奠獻悲泣王以下各官每日二次輪流進內舉哀王以下各官不嫁娶不作樂各官命婦去首飾凡二十七日軍民人等摘冠纓婦女去首飾凡七日次日王以下各官公主福晉以下大臣命婦照前齊集舉哀至晚各退第三日早王以下各官公主福晉以下大臣命婦齊集舉哀公主福晉以下大臣命婦以後不齊集第四日早王以下各官齊集至日午各散嗣後在部院衙門辦事及在內直班衣帶各縞素冠皆摘纓諸王大臣等以聖祖仁皇帝哀痛過甚叩請節哀第五日頒哀詔禮部堂官至內院接奉至部遣官頒發各省及朝鮮國詔到日在外文武各官摘冠纓素服出城門跪接舉哀候過隨行奉詔安設公署內正中案上三跪九叩宣讀畢舉哀又三跪九叩自次日起文武各官於署內朝夕哭臨二次凡三日服白布服二十七日各官命婦去首飾服素服二十七日軍民人等摘冠纓婦女去首飾服素服七日服內不作樂不嫁娶禮部移文各省督撫提鎮三司官員免其遣官進香二十日以奉梓宮遣輔臣祗告几筵至日奉移梓宮安奉壩上殯宮儀駕全設內大臣侍衛齊集宮門外王公齊集東華門外各官齊集東安門外公主福晉以下大臣命婦先一日赴壩上靈駕發聖祖仁皇帝祭酒行禮攀號益切衆皆跪隨行禮舉哀太皇太后仁憲皇太后念聖祖仁皇帝沖齡荷宗社之重不便遠離紫禁親送梓宮頻降懿旨諭止聖祖仁皇帝雖勉遵慈諭仍哭踊不輟梓宮出奉舁校尉仍用鑾儀衛服色內大臣侍衛排跪舉哀候過隨行半隨送內府婦女一百八十人乘馬於靈駕後隨行靈駕出東華門王公按翼序列舉哀候過隨行在內大臣侍衛之次出東安門各官按翼序列舉哀候過隨行半隨送往送官員各按旗行每過門橋內府官進爵禮部堂官祭酒靈駕至壩上公主福晉以下大臣命婦以上按翼序立跪接舉哀隨入王以下各官在門外按翼序立候奉安畢王公內大臣侍衛都統子尚書皆進內按翼序立輔臣跪祭酒三爵王以下各官及公主福晉以下大臣命婦皆跪隨行三叩禮立舉哀畢各退二十七日淸明致祭陳饌筵二十五席羊九酒十有三尊公侯伯以下參領雲騎尉以上一半齊集內大臣侍衛輪流前往輔臣跪祭酒三爵各官隨行禮三月初七日行初祭禮儀駕全設陳楮製丹旐一金銀定以紙為之後仿此二十萬五千楮錢十有四萬五千畫段萬端楮帛五萬端饌筵八十一席羊二十七酒四十一尊王以下奉恩將軍以上民公以下各官一半齊集公主福晉以下縣君奉恩將軍恭人以上民公侯伯夫人以下副都統侍郎男夫人以上皆齊集行禮讀祭文時衆皆跪讀畢輔臣祭酒三爵衆皆隨行禮立舉哀慈和皇太后姻戚夫人至燎所舉哀祭酒三爵是日滿二十七日聖祖仁皇帝除服衆皆除服次日行繹祭禮陳金銀定二萬楮錢萬饌筵十有一席羊五酒五尊止內府官齊集行禮初周月致祭禮陳金銀定五萬楮錢五萬饌筵二十一席羊九酒九尊民公侯伯以下副都統侍郎男以上一半齊集以後周月致祭儀同奉安寶位禮致祭與周月致祭同二十五日行大祭禮儀駕全設衆咸齊集奠獻行禮與初祭同五月行百日致祭禮陳金銀定五萬楮錢四萬五千楮帛二萬饌筵二十五席羊九酒十有三尊儀與周月致祭同是月二十七日恭上尊諡曰孝康慈和莊懿恭惠崇天育聖皇后前一日聖祖仁皇帝素服御太和門恭閲册寶內院官一跪三叩奉册寶陳黃輿內聖祖仁皇帝還宮校尉舁輿前列黃蓋御仗禮部鑾儀衛堂官內務府官前導出東華門至壩上安設殯殿內禮部官一跪三叩奉册寶設黃案上復一跪三叩退奉移前期一日致祭儀駕全設陳金銀錠五萬楮帛楮錢各五萬饌筵三十一席羊九酒十有五尊王以下鎮國將軍以上咸齊集民公侯伯以下副都統侍郎男以上一半齊集設册於左設寶於右禮部讀祝官一跪三叩奉册寶宣讀次讀祝文畢輔臣跪祭酒三爵衆隨行禮畢隨送內大臣侍衛各官及內府婦女咸宿壩上是日早儀駕全設內大臣侍衛在殯宮門內各官在門外按翼序立舉哀禮部官於几筵前祭酒三爵至吉時慈和皇大后姻戚都統副都統恭奉寶位奉安寶輿內校尉舁輿大臣各官命婦等隨後步行至城門祭酒三爵出城後命婦等乘馬隨後內大臣侍衛及各官皆按旗乘馬隨行遇橋禮部堂官祭酒每晚至宿次大臣各官按翼齊集奠獻舉哀徹饌畢各退六月行安葬禮輔臣內大臣侍衛公侯伯以下文武三品官以上於網城外按翼序立候靈駕至跪舉哀候過隨至木城外序立舉哀恭奉寶位安設圓幄內衆皆退是日儀駕皆焚訖其安葬地宮致祭禮並載世祖章皇帝大葬儀九年三月加上廟諡曰章皇后升祔太廟詳見升祔儀孝莊文皇后大喪儀康熙二十六年十一月二十一日聖祖仁皇帝以太皇太后不豫詣慈寧宫問安嗣後日在左右躬親侍奉竭誠默禱於宮中遣官詣各寺廟進香祈禱二十七日諭刑部見監重犯槩豫減等以祈太皇太后遐算二十九日太皇太后疾漸劇聖祖仁皇帝憂慮愈切躬禱郊壇乃親製祝文辭旨懇篤有願減臣齡以增慈壽語十二月初一日親率王以下文武各官自宮中步詣天壇祈禱如禱儀躬讀祝文時聖祖仁皇帝涕泗交頤陪祀諸臣無不涕泣祀畢聖駕還仍在慈寧宮侍疾是日太皇太后疾少瘳初十日內閣部院諸臣以聖祖仁皇帝勞瘁過甚疏請還宮少休不允十二日諸王內大臣侍衛部院堂官詣慈寧宮門前跪奏聖躬自太皇大后違豫以來寢食捐忘憂勞日甚請間一還宮稍為休息奉聖祖仁皇帝諭太皇太后病勢漸覺沉篤朕心憂灼片刻難離亦不允至二十五日太皇太后崩聖祖仁皇帝劈踊哀號呼天搶地哭無停聲水漿不入口恭奉梓宮於宮中正殿設几筵建丹旐於宮門外之右簡命親王進爵大臣恭理喪儀頒大行太皇太后遺誥親王以下入八分公以上內大臣侍衛等於永康左門外齊集不入八分公以下及文武各官於午門外齊集大學士奉遺誥設慈寧門內黃案上王等齊集畢大學士由黃案上奉遺誥授禮部堂官跪受興奉出永康左門外置黃案行一跪三叩禮王以下入八分公以上內大臣侍衛等行三跪九叩禮以下皆不贊跪候宣讀畢舉哀復行三跪九叩禮禮部堂官由黃案上奉誥置雲盤內授禮部官跪受興黃蓋御仗前導至午門外置層臺案上張黃蓋不入八分公以下及文武各官行三跪九叩禮跪候宣讀畢舉哀復行三跪九叩禮畢禮部官奉誥置龍亭內行一跪三叩禮黃蓋御仗前導由大淸門出至禮部大堂所設案上禮部堂官行三跪九叩禮刋刻遣官頒行天下是日儀駕全設仁憲皇太后聖祖仁皇帝皇太子皇子妃嬪公主咸成服王以下文武大小各官齊集於永康左門外內府官員等齊集永康左門內公主親王福晉以下縣君奉恩將軍恭人以上民公夫人以下副都統侍郎男夫人以上齊集永康右門外咸成服內府三旗大小各官執事人護軍領催及內管領下食錢糧男婦皆成服每日三次奠獻時聖祖仁皇帝親上食祭酒行禮齊集王以下各官公主福晉以下命婦等咸隨行禮初喪三日內每日哭臨三次王以下入八分公以上內大臣大學士等及外藩王以下公以上至姻戚台吉等禮部工部理藩院堂官入永康左門至慈寧門內丹陛上序立不入八分公以下侍衛滿漢文武各官在永康左門外漢文武官由鴻臚寺分班隨八旗哭臨內府官員等在永康左門內公主親王福晉等內府命婦入慈寧門內西旁世子福晉以下奉恩將軍恭人及男夫人以上在永康右門外舉哀公主福晉以下及命婦每日早齊集至晚各退進紫禁城門固山貝子夫人以上乘馬公以下夫人步行從人親王福晉準隨七名世子郡王福晉六名貝勒夫人五名貝子夫人四名入八分公夫人三名不入八分公夫人及一品命婦各二名二品以下命婦各一名公主以下乘馬步行及從人名數各按福晉等品級其齊集處設席棚靑布步障第四日王公內大臣侍衛大學士學士等上三旗都統副都統等外藩王貝勒貝子公台吉等每日哭臨三次文武各官每日哭臨二次凡二十七日自初喪日為始王以下入八分公以上於梓宮未發引時在永康左門外齋宿發引後在午門外齋宿不入八分公以下部院官並間散各官二十七日內皆在午門外齋宿外藩王等每日哭臨畢各歸寓邸舊制宗室以上服緇素今以聖祖仁皇帝自持粗布服乃皆改用布王以下各官不嫁娶不作樂齋戒二十七日軍民人等摘冠纓婦女去首飾各齋戒二十七日在京寺觀各聲鐘三萬杵部院衙門文移皆用藍印惟題本用硃印詔旨藍筆批答凡儀駕每日陳設二次至滿月止遇祭期仍設凡外藩公主福晉等至京即入永康右門詣几筵前行禮舉哀王以下台吉以上至京理藩院導入永康左門在慈寧門外行三跪九叩禮立東旁舉哀外藩公主王等二十七日內至京者令成服除服後至京者男摘冠纓婦女去首飾各三日遣侍衛二人頒遺誥於朝鮮國至日令遵例制服在京朝鮮等國使臣工部給孝服免其齊集凡罷黜宗室覺羅官仍給孝服原品休致文武大員及八旗候補文武各官皆給孝服凡請假丁憂終養四品以上漢文官皆令來京詣梓宮朝謁禮畢即回禮部以致祭品物奏請奉旨孝務自盡其心不在儀物多寡所用祭品皆照世祖章皇帝往例二十九日行殷