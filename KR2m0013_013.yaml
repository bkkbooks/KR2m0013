body:
  text: 吏部文選清吏司除授一進士授職第一甲第一名授翰林院修撰第二名三名授編修二甲三甲進士除簡選庶吉士外餘均以知縣用其以部屬用以知縣即用以教職用於引見時恭候欽定一庶吉士散館奉㫖留翰林院者二甲授編修三甲授檢討以知縣即用者不論雙單月即用以知縣歸班用者仍歸進士原班候選乾隆四年奏準庶吉士散館以主事用者令其掣籤先分發六部在額外主事上行走選用班次載雙單月選法其中如有實心辦事熟練部務者遇本部主事員闕該堂官保奏引見補授一進士分部學習雍正二年引見新進士奉㫖朕批內用者著用為六部額外主事學習辦事八年奉㫖今科進士除選授庶吉士外其㸃出之五十八人著於六部額外主事上學習行走三年之後該部堂官題補果有才猷出衆明練政治之人於一年之後該堂官保奏引見一分部進士學習期滿乾隆元年議準學習進士三年期滿該堂官分别引見其以主事用者照甲第名次歸於月分選用班次詳載雙單月選用未經補授之先仍令在部辦事如有熟練部務者遇本部主事員闕亦準該堂官保奏引見補授以知縣用者歸進士原班選用如才具平常奏明咨部以國子監助教監丞司經局正字三項遇闕挨次具題補授有情願改教者準其呈明改補一進士選用知縣雍正元年議準歸班候選知縣均令回籍俟投供候選進士將次用完具題截取赴部投供照原甲第名次挨選乾隆元年奏準新科進士奉㫖以知縣即用者照奉㫖名次先後歸於雙單月進士班次之後各選用二人一進士選用教職康熙四十八年覆準進士候選知縣有情願就教者無論己未截取具呈到部以本省府教授按科分甲第名次挨選其有進士未任知縣奉㫖以教職用者遇本省府教授員闕即行補用一舉人簡選舊例會試下第後願就選者考授推官知縣通判等官康熙九年議準均以知縣用三十七年議準簡選舉人除雲貴川廣福建湖南等省不拘科分外直𨽻等近省舉人俟會試三科不第後有情願簡選知縣者準其簡選三十九年議準各省簡選舉人照鄉試名次先後挨序若科分相同則照名次先後若名次相同則照省分次序逐科分榜注册挨選嗣後一科與三科之人均照鄉試名次為序雍正元年題準舉人除一科外令直隸各省督撫於鄉試事竣會同主考官將願就知縣者秉公驗看彚册送部其不能作縣及願就教職者别册造送十一年議準截取起文之時督撫再行驗看其年力可以作縣者給文赴部如年力衰邁者咨部以教職注册乾隆四年奏準嗣後舉人候選知縣俟截取時各該督撫仍照舊例驗看給咨赴部其下科鄉試時先行驗看之例槩行停止至各省舉人就教應於每科會試發榜後雲貴川廣福建湖南等省會試一科直隸等近省會試三科後願就知縣者在部具呈簡選擇其年力富强者準以知縣注册其年力就衰者以教職注册倘有患病丁憂事故未經簡選準其下科補行簡選一舉人兼掣州同雍正三年議準直隸州州同歸入知縣班內令舉人兼掣補授籤掣詳月選例仍與知縣一例升轉一舉人就教康熙九年議準舉人願就教職者照考定名次以學正教諭用二十六年覆準免其廷試具呈到部照科分名次補用乾隆七年議準舉人一科不第如有情願就教及已經簡選知縣情願改教取具同鄉京官印結呈部或由本省督撫具呈咨部注册補用與驗看注册人員同較科分名次挨選一漢軍舉人授職順治九年題準漢軍舉人以筆帖式哈番用康熙二年覆準以知縣用三十九年覆準漢軍舉人照漢人例三科不中願就知縣者以知縣用各項知縣每選過三班大選以十七人為一班三班共五十一人選用一人乾隆七年奏準漢軍舉人每科會試榜發後願就知縣者不論科分取具該都統印文具呈到部簡選擇其年力富强者以知縣注册挨科分名次按班選用如年力就衰者以教職注册與直隸漢舉人較科分名次挨選一教職小京官中式留任乾隆三年諭見任教諭㑹試得中進士例應歸班者仍令回原任以教授銜管教諭事見任訓導鄉試得中舉人副榜者仍令回原任以教諭銜管訓導事若該員本班應選時仍照常銓選遇卓異薦舉亦照銜升轉永著為例欽此四年奏準見任內閣中書中式進士奉㫖以部屬用者以六部主事補用七年奏準訓導中式舉人又經中式進士例應歸班者亦令留任以教授銜管訓導又奏準七品以下小京官中式進士除欽選庶吉士及奉㫖用為部屬或以知縣即用者該衙門即行移會到部開闕其歸班選用者令留原任不必加銜仍接算前俸照見任推升停其以知縣候選十九年奏準見任中書中式進士奉㫖以部屬用者先令掣籤分派各部額外行走歸於五闕後補用一副榜恩拔歲貢授職原例各省學臣歲科考竣會同巡撫將恩拔副榜與歲貢傳齊驗看彚册送部注册副榜照科分名次恩貢拔貢歲貢照年分先後繫同年者由部遇闕代為掣籤副榜恩拔均以復設教諭用歲貢以訓導用康熙二十六年覆準捐納歲貢以復設訓導用雍正元年諭直隸各省教職等官乃專教士子之人今準捐納以致文理不通少年反為學問優長年高齒長者之師可乎伊既捐納應照伊品級别任補用之處交與該部議奏欽此遵㫖議定嗣後各省教職除正途照舊選用外其由生員捐納貢生者教諭改以縣丞用訓導改以主簿用三年奉㫖捐納教職人員內有由廪生出身者原通文理著照舊以教官用遵㫖議準廪生捐納歲貢照捐納日期先後以復設訓導用又議準直隸州州判漢軍令該旗都統漢人令各該督撫將恩拔副榜貢生簡選年力富强者造册送部遇有員闕掣籤補授調取來京引見與學正教諭較俸升轉一貢生肄業期滿雍正八年覆準恩拔副榜歲貢生肄業三年期滿使充教職給發執照回籍候選乾隆二年覆準在監肄業恩拔副榜貢生三年期滿如其中果有學問優深人品卓越者令該監秉公薦舉引見請㫖其餘循謹之士堪任訓迪者咨部以復設教諭選用如本班頂選仍歸原班選用歲貢肄業期滿咨部以復設訓導選用本班頂選者亦仍歸原班選用各省保舉優行生員準作貢生者照歲貢肄業期滿歸於各本年歲貢分內以復設訓導用肄業貢生選用教職各照期滿日先後挨選班次詳載月選例如遇考職之時一同咨送一貢監考職舊例貢生監生一例以州同州判縣丞主簿吏目考用雍正六年議準貢監生考職照科場式例取具地方官文結漢軍取具本旗印結及國子監肄業咨文到部將原捐執照呈驗并將年貌履歷三代籍貫投具親供京官主事以上印結及同考五人互結由部奏請欽㸃大臣閲卷並滿漢御史二人本部滿漢司官各二人㸃名給卷編列字號分坐如有包攬代作等弊該御史察參乾隆元年議準恩拔副榜歲貢除本人已就教職及直隸州州判仍歸原班選用毋庸赴部考試其願就佐二者準其照例考試恩拔副榜貢生考取一等者候選州同二等者候選州判三等者候選縣丞歲貢生考取一等者候選主簿二等者候選吏目入於雙月一應一捐之後選用二人均按考案年分名次挨選均令在籍候選未經選用之先遇鄉試之年照舊聽其鄉試考取之後有願就教職者仍準以教職用二年奏準捐納貢監生照歲貢之例以主簿吏目考取貢生考職均不論起貢年分監生捐納未滿三年不準收考三年奏準貢監考職嗣後於鄉試之年定期五月內考試文結務於三月內到部七年遵㫖議定漢軍歲貢及捐納貢監生亦照漢人之例準其以主簿吏目考取有願改降雜職者亦準改降主簿告降準以吏目用吏目告降從九準以巡檢等官用告降未入流準以典史等官用其改降人員不準遞行告降九年奏準貢監考職務擇其文理優通者酌量録取寧少無多文不入選者不録又諭嗣後除文武鄉會試並考試童生仍在貢院外其餘各項考試著照從前午門等處朝考舊例辦理仍於取録之後再行嚴加覆試欽此一廕生録用雍正元年覆準尚書給與一品官廕生以員外郎用侍郎給與二品官廕生以主事用總督與尚書同巡撫與侍郎同七年議準正一品官廕生以員外郎治中用從一品官以主事用正二品官以主事都察院經歷京府通判用從二品官以光祿寺署正大理寺寺副用寺副乾隆十七年裁正三品官以通政使司經歷太常寺典簿中行行人司乾隆十三年裁評博兼用從三品官以光祿寺典簿鑾儀衛經歷詹事府主簿京府經歷用四品官廕監生與捐納貢監考職者一例考定職銜入於應選班內分闕輪班選用乾隆四年奏準漢廕生引見除奉㫖外用及照例內用者均毋庸分部外其有奉㫖指出以何部員闕補用者即令其赴該部行走俟有員闕該堂官題補未補授之前給與單俸七年奏準左都御史職掌與尚書同其廕亦同一漢軍廕生録用康熙十二年題準一品官廕生以員外郎用二品官以大理寺寺正乾隆十七年寺正改為寺丞知州用雍正七年定廕生例用知州者以主事改補乾隆五年奏準三品官廕生以七品筆帖式用四品官以八品筆帖式用一廕生外用乾隆元年奏準廕生奉㫖以外任用者正一品官以府同知用從一品官以知州用二品官以通判用三品官以知縣用一廕生考試舊例廕生肄業期滿由國子監咨送到部照品級題廕年月先後挨選武職廕生咨詢兵部品級題廕年月有無事故其同日具題者照題疏名次先後録用雍正三年定廕生咨送到部將年二十以上者奏請考試引見七年定各項廕生有二三人到部即考試履歷進呈引見乾隆十一年奏準廕生到部試以古論及時務䇿試題由閲卷大臣擬出奏請欽㸃大臣閲卷定其甲乙恭呈御覽其文理優通議論明暢者交部引見荒謬者發回本籍讀書三年再行考試令考試大臣於進呈試卷摺內聲明停其引見十二年定廕生到部守候已逾三月尚無續至者即奏請考試引見一補廕復廕乾隆四年奏準凡文武官廕生廕監生未經出仕中式而病故及患病殘廢者均準將詔前所生子孫咨部核明具題補廕仍以原廕廕生題廕年分選授其由廕監生已得官職及科目中式者不準補廕已補而又病故及殘廢者亦不準復行補廕再文武官廕生廕監生國子監咨送到部除已經補用外其注册未用者如所廕之官降調少剩微職免其革廕其所廕之官革職廕生監生亦革去扣選後所廕之官還職或還職後别經降調及奉特㫖起用不論文武銜闕如品秩相當及在原品以上者均準其將原廕之人咨部具題給還原廕倘原廕之人殘廢病故或於革廕後業經出仕中式準其别將詔前所生子孫咨部具題補還原廕仍照先廕生年分注册挨選一廕生改武雍正三年議準武職廕生內除通習文理者照例考試以文職補授外其有幼習武藝人材壯健願改武職者呈報到部移咨兵部以武職改用十二年奏準文職尚書等官並四品廕監生如願改武者均照品級改用一難廕生録用康熙三年定三品以上廕知州四品以下廕知縣十八年定布按都三司首領及州縣佐二六品七品官之子準廕縣丞八品九品官之子準廕縣主簿未入流之子準廕州吏目均照本銜廕子不照贈銜一薦舉孝亷方正康熙六十一年十一月詔每府州縣衛各舉孝廉方正暫賜六品頂帶以備召用務期採訪真確毋得濫舉乾隆元年議準欽奉恩詔保舉孝廉方正令直省督撫轉飭府州縣衛各官令該地方紳襟耆庶鄰里鄉黨合辭公舉該地方正印各官採訪公評詳稽事實其所舉或繫生員會同該學教官考核造具事實册結加具印甘各結申詳該管上司逐加採訪督撫核實保題給以六品頂帶榮身如其中果有德行才識兼優堪備召用者準該督撫出具切實考語破格保薦給咨赴部會同九卿翰詹科道公同驗看如果衆論相符引見候㫖簡用五年議準嗣後保舉孝廉方正除朴實拘謹無他技能不能考試者照例給與頂帶榮身毋庸送部外其有德行才識兼優督撫逾格保薦者俟驗看之後試以時務䇿一道箋奏一篇會同禮部定期具奏於太和門內考試其試題先期移咨內閣由大學士恭擬進呈會同禮部監試將試卷進呈引見候㫖簡用一徵召山林隱逸康熙九年詔地方有才品優長山林隱逸之士該督撫具奏酌與録用雍正十二年議準遵奉恩詔如有山林隱逸之士該督撫具題覆準令其赴部其録用之處具題請㫖一薦舉優行生員雍正四年諭學政奉命課士黜劣舉優是其專責嗣後學政三年任內將生員中實在人品端方有猷有為有守之士大省舉四五人小省二人具題送部引見候㫖録用欽此一幕賔議叙雍正元年議準各省幕賔凡籍隸本省者槩不得聘如違交部議處其督撫幕賔務令選熟練老成深信不疑之人先將姓名履歷具題造册報部存案如果效力年久勤慎無過者該督撫保題議叙原有職銜者按其應得職銜即行補用無職銜者量給職銜如有才守出羣者特疏薦引從優議叙乾隆元年議準司道以下各官幕賔除緣事斥革及職掌書算內號瑣事並本官子弟親屬來署幫助者不準申送議叙外其實在聘來管理刑名錢穀之幕賔於到任時先將姓名籍貫申報督撫存案自申報之日計算六年期滿該員任內並無參罰事故果能深信其有為有守才識兼優出具印結申送督撫詳加驗看考試其文理缺優才具平庸者即行駮回如果文理優通熟諳吏治才具確有可用者方準保送將考試原卷一并送部俟直省彚齊之日由部照考職例請㫖欽㸃大臣校閲試卷分别等第給以職銜分班選用原有職銜者酌量豫以先用年老不能出仕者給與頂帶榮身如有文理荒謬不諳律例者將濫行申送之原保官並具題之督撫分别議處一吏員授職康熙三年題準吏員考職分為四等一等以正八品經歷用二等以正九品主簿用三等以從九品雜職用四等以未入流雜職用考試詳見驗封司雍正五年議準京通各倉倉書五年役滿倉糧毫無虧空咨送到部免其考職以從九品未入流二項令其兼掣再禮部儒士食糧三年期滿咨送過部免其考職以府檢校典史注册選用並由禮部以鑄印局大使簡選題補十三年議準各館供事闕將頂補之人姓名籍貫著役日期及頂補某人之闕豫先咨部如各衙門咨送者務令在原衙門著役四年以上方準送館俟到館後再補闕食公費二年方準咨部如各館自行召募者令其補闕食公費之後典籍㕔撥送者算補闕食公費五年期滿方準咨送考職如不足年分者不準選用乾隆二年奏準內閣六部太常寺等衙門事繁書吏五年役滿該堂司各官察其平素勤謹並無過犯者出具考語咨送過部將從九品未入流二項令其兼掣以掣得之闕注册選用以上各項班次均詳載月選條四年奏準內閣六部並各衙門即用書吏五年役滿各該衙門務於一月之內即將該吏著役時地方官印結並取具同鄉京官印結一并咨部注册選用一外省吏攢授職雍正十二年議準直隸等省吏攢五年役滿令該管衙門取具本吏親供保結送巡撫於每年七月內考試將試卷封固送部限於十月內到部與在京各衙門役滿書吏試卷一并校閲分為四等考定名次品級將執照封發原省給各該員收執在籍候選一外郎録用舊例六年滿日考定州同州判縣丞職銜照漢人例依次選用康熙二十九年題準外郎六年滿後考定職銜歸於貢監分內將貢監選七人外郎選一人欽定大清會典則例卷十
