者絞六分以上者斬照例籍沒家産抵償又議準運軍挂欠漕糧以一船糧米計算如挂欠不及一分者責二十革運追比追完免罪不完杖一百一分責三十革運追比追完免罪不完杖一百徒一年二分責四十革運追比追完免罪不完杖一百徒三年三分責六十革運追比追完免罪不完發附近衛所充軍四分責八十革運追比追完杖一百不完發邊逺衛所充軍五分責一百革運追比追完徒一年不完者絞六分以上者斬照例籍沒家産妻子抵償四十九年題準漕糧挂欠皆由糧道監兌押運等官不親詣水次面同兌足糧船抵淮總漕亦不嚴行盤察以致辨軍任意折銀沿塗盜賣嗣後將挂欠不及一分至六分之辨軍照例分别治罪其總漕糧道等官亦照例按所欠分數議處並將所欠漕糧算作十分分賠總漕半分糧道一分監兌官半分總押運官半分運官一分半僉丁衛所官半分運軍五分半按此分數令總漕等官於限內賠完不完總漕糧道各官交部議處運官運軍照例治罪仍將辨軍不能賠完之米著落總漕糧道等官賠償至挂欠糧米既總漕糧道令分賠全完者應加倍議敘山東河南湖廣三省糧道改為加升一級江南江北江西浙江三省糧道改為加升二級總漕議敘之例於康熙八年停止嗣後各省漕糧十分全完者仍將總漕照例加升二級又議準辨軍挂欠漕糧承追督催等官皆照經徴督催淮徐等倉糧銀例議處五十一年題準同幫運官連名互結如將赤貧之軍出結僉運以致挂欠不能賠補將本軍應賠五分半之內令互結各軍攤賠一分又題準嗣後一幫挂欠府廳等官罰俸一年糧道罰俸半年幾幫挂欠照此遞加罰俸又題準押運同知通判一次挂欠降一級留任二次降二級留任三次降三級調用又題準押運同知通判一次無欠加一級二次無欠加二級三次無欠不論俸滿即升又題準江浙積欠之幫一運全完其次挂欠之幫三運全完别幫五運全完均準其即升五十四年題準辨軍挂欠嗣後免其留通追比一年令倉場侍郎將欠糧運軍拏交運官即行發南追賠挂欠之米限次年搭運赴通交納如次年不搭運總漕照例題參六十年題準欠糧運官有於倉場未題之先已升任他職者革職發追俟完糧開復之日照例補用雍正元年題準領運千總一運全完加銜一等二運全完加升二等三運全完毫無事故者從優議敘即升其江浙積欠之幫仍照舊例二運全完準其即升二年議準搭解舊欠漕米必以本色交兌搭運過淮之時總漕盤驗足數方許開行北上如有麥豆雜糧等項抵充漕欠或過淮之後用小船趕送者總漕察明題參三年題準欠糧運官倉場即咨兵部開闕俟限內全完題請開復别行補用五年題準辨軍挂欠漕糧向照失風挂欠之例止收平米免其曬揚折耗嗣後非失風而挂欠者照起運之數搭運抵通十三年奏準運辨領運漕白船糧如有過淮違限而抵通全完者俟總漕將原參過淮違限題準開復之後始準議敘加銜乾隆二年奏準領運守千江浙等逺省一二運準按運加銜三運全完議敘即升不得復請加銜至三運以後再能全完仍準按運加銜山東河南二省官辨一三五運全完均紀録二次二四運全完均加銜一等至六運全完方議敘即升亦不得重復加銜至六運以後均照前相間紀録加銜又奏準重運效力武舉領運江浙等逺省每運全完準於補官日紀録二次領運山東河南近省每運全完準於補官日紀録一次三運運滿咨部注册推用三年奏準各省糧船抵通起卸漕米如有不足向例準買别幫餘米抵補但各省收兌如果足數抵通何致不敷嗣後如有不足即行參處著賠不準買補别幫餘米其各船運軍日用餘米坐糧廳給與驗票準其售賣外其餘各色漕米票米一槩不許買賣交與通永道通州知州實力稽察如有不遵即行拏究倘稽察不力被倉場及御史訪聞將該道該州題參議處四年題準山東河南二省遞年輪運薊糧督運通判押運全完照例議敘五年題準輪運薊糧千總準照山東河南近省運通全完之例議敘八年題準定例準以完糧議敘抵銷因公罣誤降級等案原指該辨本運降級事故即以本運應得議敘抵銷其一應罰俸案件不準將完糧議敘抵銷乃該辨等竟有以應加之銜故意遲延豫防將來罣誤降抵之計於例未協嗣後漕運各官因公罣誤應降調者如本運議敘準其抵銷其前運應加之銜槩不準抵十八年議準武職加銜既經刪除嗣後領運官議敘逺省者一運全完加一級二運全完加二級三運全完即升近省一運全完紀録一次二運全完加一級三運五運與初運同四運與二運同六運全完即升所加之級準其隨帶一漕船偶遭風火順治十五年題準漕糧改解兵米大江漂流準照漂沒糧數開銷又題準糧船在江洋黃河漂流者地方官察明給有印照總漕及各該撫覆勘明確據實具題準豫豁免如無題報即於本軍名下追賠若本軍無力補完將本幫餘米䉡羡扣抵務足原數康熙二十一年題準大江黃河漂沒搶救者將搶獲米灑帶各船運送其漂沒米準豫豁免若坐視不救該督題參從重治罪又題準漂流船糧令沿塗催趲各官及汛地文武官親臨確勘各出保結取具運官結狀該督撫具題豁免如未經漂沒船糧運糧官軍詐報漂沒並故將船放失及雖漂沒損失不多乘機侵盜至六百石者照律擬斬不及六百石者照律發邊衛永逺充軍漕米照數賠補其沿塗催趲各官及汛地文武各官不親臨確勘遽出保結者並行革職該督撫不嚴察確實遽行題豁後詐冒事露將具題督撫降二級調用又題準文武官凡遇漕船沉溺不將情由升報者降一級調用又題準押運官辨巡察不謹以致失火燒燬漕船者降一級調用地方官不行協救延燒别船者罰俸一年三十六年題準漕船失風沉溺船未抵通而糧已搭運到通全完者坐糧廳呈報戶部運軍領過行月錢糧免其追繳四十二年奉旨洪澤湖水勢更甚於大江黃河之水其失風漂沒船糧從寬豁免嗣後洪澤湖有漂沒船糧亦照大江黃河漂沒之例議奏欽此雍正元年題準漕船在內河失風將押運官辨照失於防範例罰俸一年仍取具押運官辨並地方文武官辨並無假揑印結送部倘有假揑情弊即將辨軍嚴加治罪出結官辨從重議處又題準糧船在內河漂流者不準豁免將該幫進倉米免其曬揚以所剩曬揚折耗餘米抵補漂流之數如抵補不敷將該幫羡餘銀扣抵該幫不足將該衛羡餘銀核總扣除務足原額四年議準失風漂流之米除將本幫餘米抵補外下剩米限次年搭運抵通正兌改兌均照平米收受仍免其曬揚折耗之米以示軫恤五年題準漕船入境地方官不顧風色水勢催趲前進在內河致有疏虞將該管地方官與押運官辨皆照失於防範例議處又題準漕船在江洋黃河洪澤湖漂沒片板粒米無存者準豫豁免六年題準領運辨軍凡遇海洋大江黃河危險地方遭風漂沒幸獲生全者照軍功保守在事有功之例官加一級運軍照軍功一等傷例賞給其漂沒身故者官不論銜級大小照軍功陳亡例皆以見在職任分别準廕加贈給與祭葬銀運軍亦照軍功陳亡例給與祭葬銀其無妻子親屬者照例給銀該督撫提鎮委官致祭至船內頭舵水手被淹身故者照軍功二等傷例賞給十三年議準海洋大江黃河及洞庭洪澤等湖領運辨軍被溺身故照軍功例賞恤贈廕其在內洋內河及以停泊海口島嶼等處修造漕船雖屬奉公差委與效力疆場者有間此等幸生之辨軍應照軍功例減等官給與紀録二次運軍人等照二等傷例減半賞給其漂沒身故者官照陳亡例各減一等分别廕贈減半給與祭葬銀運軍亦照陳亡例減半給與祭葬銀無妻子親屬收受者仍照例給銀二兩委官致祭再內洋等處遭風溺故之千總量減一等廕子弟一人以把總補用十三年題準漕船經運五六年及未至五六年而有風火等事之失責令賠造經運七八年而有事故責令買補經運九年而有事故以及腐朽不堪者責令雇募均至十年限滿準其給價配造乾隆三年題準漕糧內河失風漂流運軍賠纍艱難應交茶果銀槩行免交其糧已漂失臨倉買補無藉經紀車戶轉運者箇兒錢一並免交若船無破損米無虧闕到通轉運進倉者箇兒錢照舊交納又題準假揑失風希圖挂欠者仍照例議處若汛水漲發猝不及防失風之船能戽救修艌抵通糧無虧折或買補全完者領押守干丞倅皆免議處仍照例議敘倘船非滿號不能戽救米有挂欠雖買補全完亦仍照例議處至地方文武官辨協同戽救船糧均無虧者免其議處如不能協同戽救以致漂流者仍照例處分又題準押運丞倅遇有幫船失風事故向例與領運守干一例議處但丞倅統轄十餘幫較之守千專管一幫者有間嗣後量為輕減原例罰俸三月者改為一月罰俸六月者改為三月罰俸一年者改為六月降一級留任者改為罰俸一年降一級調用者改為降一級留任降二級調用者改為降一級調用革職者改為降三級調用四年題準糧船停泊處所他船失火該軍在船不即設法開放地方官不行星飛往救以致延燒者將火燬船責令官軍名下分賠造運五年題準漕船遇有事故各失防職名照例開送如有應行免議之處於咨內聲明聽候吏兵二部察議又題準副軍有在大江黃河被淹身故者照軍功二等傷例賞給六年題準各省出運船糧凡有失風漂流之米照例報部分别易換扣抵倘有徇隱揑報等弊照例題參七年議準糧船失風火燎其船不致被沉者無論己未過淮即令修固原船復載抵通如已被沉難戽者準雇民船載運隨幫過淮盤驗抵通倘過淮時未經雇募將米已分通幫帶運者不許中塗再雇民船裝運以杜盜賣攙和之端若過淮後失事或在黃河中流及該地方無民船雇募者仍令先分通幫帶運開行一面前塗雇覓民船裝運總著通幫衆丁出具互保各結抵通交納稍有虧欠責令賠補十四年議準漕船回次雖交與地方官收管仍著隨幫官辨約束稽察遇有風火事故即將該隨幫職名報參如新運千總既經接收幫船即將新運千總職名報參或漕船減存在次遇有事故隨運二辨均不能兼顧即開收管之地方官職名報參至押運同知等官如遇回空到次後風火事故免其參處欽定大清會典則例卷四十三
