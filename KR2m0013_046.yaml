失察盜賣漕糧專汛千把照州縣例議處兼轄遊守照道府例議處如專汛千把及文職州縣一年內能拏獲二次者紀録一次兼轄遊守及文職道府一年內於所管內拏獲至四次者紀録一次再有多獲照此遞加至汛兵疏縱失察者革役照不應重律杖八十知情賄縱者計贓以枉法從重論若能拏獲報官審實將米仍歸本船其應入官之米價追賞兵丁又奏準小船受雇裝載盜賣漕糧拏獲之日不得諉以不知照賣糧買糧枷責例減二等發落又奏準盜賣漕糧定例賣買之人枷一月責三十板糧交本船價追入官至運軍食米向無禁賣之條有將漕糧舂熟假稱食米盜賣者嗣後運軍多餘食米於抵通交米之後方準變賣如重運漕船沿塗賣米不論糙熟皆照漕糧治罪又奏準運軍不拘回空重運如有無故潛逃棄船中塗不顧者照守禦官軍在逃律治罪外仍於面上刺逃丁二字示警四年奏準如有重運盜賣漕米回空之船代為承認者該管官嚴加稽察察出將賣買軍民一并照例治罪又奏準失察盜賣漕米合算米數不在五十石者仍照失察次數處分其失察一二次米數至五十石以上者將該地方官降一級留任道府等官罰俸一年失察一起至三起合算米數至百石以上者地方官降一級調用道府等官降一級留任又奏準各省受兑開兑之時令總漕密加察訪如押運官辨以及糧道等衙門吏役有科斂陋規幫規之弊即嚴參究處並飭該管官不時嚴察有陽奉陰違者將與受之官軍等照例詳揭倘該管官徇隱不揭報一並題參五年題準江廣等幫漕船多帶土産竹木沿塗貨賣其竹木於天􅏃上裝載毋得過髙二尺如有違例多裝令押運官辨勒令起卸嚴加責懲竹木入官如官辨通同徇隱照例參處六年奏準糧道催米催船督押催船凡差役滋擾之弊定例皆經禁革惟豫省提幫出運時先發一牌繼差一役齎票前至衛所提催不無假威滋擾嗣後嚴行禁革並飭各省一例遵行如有陽奉陰違指名參處八年題準漕船如有失風事故以致米色黴黯不純驗明米色稍減尚屬堅實可以久貯者交倉受收其所減成色米責丁賠補於次年搭運抵通交納一回空禁例順治十六年題準押空官串通運軍盜賣漕船提究追賠買主從重懲處康熙五十一年題準糧船回空至德州桑園地方總漕選委能員協同德州衛辨搜索私鹽並飭地方文武官辨嚴拏窩囤如有夾帶私鹽事發將專委漕員德州衛辨押運官辨並該地方官題參嚴加議處雍正元年奏準回空船過天津關長蘆巡鹽御史會同天津鎮總兵官親往驗放至山東河南交界地方總漕巡撫鎮將差委知府遊擊等官搜檢如有夾帶私鹽盡拋入河失察各官照例議處二年題準回空糧船夾帶私鹽不服盤察持械拒捕者分别十人上下及傷人不傷人各按首從依律治罪其雖無私鹽但闖關闖閘者亦分别首從依律治罪若未闖關閘但夾帶私鹽者照販私律加一等治罪又題準糧船夾帶私鹽將販私地方之專管官降三級調用兼轄官降一級罰俸一年押空之運官照徇庇例議處隨幫革退其恃衆闖關闖閘及犯私拒捕傷人者押運等官革職隨幫照例責革三年題準糧船回空凡經由産鹽處所地方文武官辨晝夜催行前進不許逗遛並嚴拏囤户串通運軍販賣私鹽該管鹽務運司等官巡察各場竈不許夾帶餘鹽出場如有徇隱疏縱者參處又題準回空糧船至揚州府儀徴縣向例總漕委官協同揚儀營汛並地方官搜檢嗣後改於瓜洲江口令瓜洲營協會同江防同知搜檢如有私鹽事發究明場竈地方並裝運上船日期將各該地方官失察職名題參又題準押運官辨一年之內該管幫船並無私鹽事故準豫紀録一次隨幫能拏獲首明私鹽三次及該幫三次回空並無私鹽事故者該管上司出具印結咨部以千總推用四年題準漕船抵通完糧回日所餘行月等米舊例聽其沿塗買賣嗣後全糧過壩之幫遇有剩米必赴坐糧廳批照然後準賣若未經給照擅行私賣私買者照例議處十年奏準回空糧船過山東時該撫豫於晉省私黃入境之處令地方官辨分路巡察本省熖硝亦實力稽察毋許囤户偷販河干暗送入船並令搜檢私鹽之文武官帶檢硝黃如察出私帶硝黃亦照私鹽例究明參處押運官辨失察照糧船夾帶私鹽例議處乾隆元年奏準漕船回空押運官辨多不隨船南下頭舵水手人等往往欺壓行船嗣後如遇回空糧船行凶爭鬭藉端將來往行船阻留捆毆商民等事許沿河汛辨察明情由及幫次船號運軍姓名一面速令遄行一面詳報總河咨明總漕究治又題準回空軍船應帶食米燒煤向無定數嗣後江西省每船準留食米四十五石燒煤四十石湖南省每船準留食米三十六石燒煤三十二石湖北省每船準留食米三十三石七斗五升燒煤三十石江浙每船準留食米三十石燒煤二十五石自通州至宿遷淮揚等處逐關察驗扣除免稅放行不得越數多帶巡役人等亦不得勒索留難六年奏準押空隨幫一年之內並無私鹽事故者準其於補官日紀録一次七年奏準薊運回空行令直督轉飭薊州文武官辨俟糧船抵薊卸糧之後即催回空不許在該地方刨取白土裝載上船並令出示曉諭沿河各市鎮鋪户人等不許將白土賣與糧船致滋攙和情弊嗣後如經關口汛地察出薊運回空帶有白土並兵役人等遇有糧船偷買白土拏獲審出實情將該運辨與押空千總皆照運軍攙和水米運官不行稽察例革職其該船軍舵照運軍使水攙和發遣例減一等杖一百徒三年偷賣白土之軍舵同罪將白土攙入漕糧至百石以上者即照攙和水米例發遣黑龍江與兵丁為奴知情收買收賣之鋪户照違制例杖一百仍枷一月發落並不行察禁之薊州文武官辨皆照出洋商船私帶軍器地方官不嚴行禁止例罰俸一年十四年題準天津阿城淮安儀徴等處産鹽之鄉貧難老幼一遇漕船經過充塞河干負鹽售賣令督撫轉飭地方營汛官辨嚴行稽察毋許老幼男婦隨船貨賣其舵工水手應需食鹽只許向官鋪售買每船總不許出定例四十斤之外如多帶私鹽即嚴拏究治若不實力稽察照例議處一漕糧雜禁順治十四年題準領運辨軍如有借端擾害過往官商船及恣橫生事者督撫鎮道等官嚴拏照營兵鼓譟例先從重懲治一面題參送刑部究處康熙元年諭糧船經由漕河領運官軍依限抵通回空方為盡職無罪乃有等姦頑官役不守成法多有夾帶私放貨物隱匿犯法人口倚勢恃力行凶害人借名阻礙河道毆打平人託言搜尋失物搶劫民船且有盜賣漕糧中塗故致船壞以圖貽纍地方種種姦惡督漕各官並該地方官一有見聞即行參奏務將官員嚴提治以重罪若知而徇隱不奏亦從重處治欽此六十一年題準糧船頭舵水手有砍伐官柳折毁縴橋拔樁掘掃者嚴提治罪估價追賠押運官辨及地方文武各官并加參處又題準水手夥衆搶奪十人以上執持器械者首犯照強盜律治罪為從減一等十人以下無器械者照搶奪律治罪出結之運軍及頭工舵工容隱不首照強盜窩主律分别治罪又題準押運領運各官辨例應嚴押漕船毋許運軍舵工水手登岸生事如有不法即會同地方催糧各官協拏究治倘平時漫不約束臨時又復容隱者總漕指名題參照例革職雍正元年諭江南浙江江西湖廣山東河南各省總督巡撫漕船關繫緊要除本船正副運軍外其頭舵工水手皆應擇用本軍庶各知守法不敢誤漕生事近聞多雇募無籍之徒朋比為姦不服運軍彈壓當漕糧兌足之後仍挨延時日包攬貨物以致載重稽遲易於阻淺不能如期抵通及回空經産鹽之地又串通姦頑收帶私鹽此其弊端之彰著者聞尤有不法之事凡各省漕船水手多崇尚邪教聚衆行凶一呼百應邇年以來或因爭鬭傷害多人或行劫鹽店搶奪居民種種凶惡漸不可長亟宜懲治爾該督撫即嚴飭所屬各衛所嗣後糧船務於本軍內擇其能撑駕者充當頭舵工水手不許雇募無藉之人更嚴禁邪教諭令歸業務為良民如仍怙惡不悛該地方官不時察拏從重治罪如奉行不力即將該管官辨指名題參欽此五年題準姦徒專放糧船私債舊例許運官並運軍自首照私放官債加等治罪嗣後有違禁取利盤剝運軍者責令地方文武各官及坐糧廳立拏究治如地方官坐糧廳不即嚴拏及該管運辨縱軍私自借債者一經發覺皆交部嚴加議處十年覆準漕船損壞皆因運河水道舊堤遺址積年淘卸衝激日就窪下舊存石塊木樁淹沒水底糧船過此一經抵觸多致損壞應嚴飭沿河鎮道等官於水落之時沿塗細看凡有阻礙悉行起除倘起除不淨抵觸漕船總漕並巡漕御史將該管河道等官題參議處十三年諭朕聞南方濵江兩岸多繫蘆洲民間將蘆葦堆貯洲上賣以度日而江楚及上江各幫漕船由江經回竟有不法水手每遇蘆柴堆積之處輒糾集多人蜂擁上岸恃強奪取洲民攔阻動輒毆詈甚至有強取雞鴨等物者小民畏勢莫敢與較水手肆行如此運辨即坐本幫糧船之內安得推為不知至督運之糧道押運之府佐雖云統轄衆幫亦當留心稽察何得任其多事著漕運總督通行曉諭倘有仍蹈前轍者經朕訪聞必將大小文武運官分别嚴加議處欽此乾隆元年覆準糧船水手遇有事犯如已經離船以及未經上船之先者不得拖纍運軍如有棄差逃走者令在押運通判處十日一次呈報四年奏準催漕辨兵需索運軍銀錢土物者經該管上司及巡漕御史察出繫兵將該管千把照失察衙役犯贓例議處繫汛辨將該管上司照不揭報劣員例分别議處需索之辨兵計贓以枉法論土冝禮物照挾勢豪強之人接受所部餽送土冝禮物受者笞四十與者減一等律分别治罪贓物給還如兵辨需索運軍或運軍行賄而押運官不即申報照應申報上司而不申報例處分如知情故縱照以財行求律受財者與以財行求之運軍一同治罪追贓入官如運軍被索即時首告免罪追贓給主其贓少首多或因催行挾私誣首照誣告律分别治罪如不行首告仍照以財行求律與受同科贓物入官催漕辨兵遇有運軍行賄據實盡首免其治罪追贓入官運軍照以財行求律治罪五年覆準糧船沿塗提溜趕幫雇用短縴每夫每里給制錢一文打閘每船用夫一名給制錢一文如閘壩水急難過夫役守候臨時酌增催漕兵役母得借端需索至各夫雇價給與見錢毋得以貨抵給如有兵役夫頭派加短縴多索夫價從中取利貽害運軍者照霸占扛擡分外多取雇直不容本家雇人者枷兩月杖一百例治罪該管官辨自行察出懲究者免其參處如漫無覺察照失察衙役犯贓例議處其扶同徇隱者照縱役犯贓例革職又奏準各幫頭船運軍有借沿塗使費名色科派各船包攬侵蝕之弊應專責運辨稽察如運辨串通頭船運軍科派各船者照因公科斂律杖六十贓重者坐贓論若分肥入巳者計贓以枉法論如運辨知情徇庇者照縱容衙役犯贓例革職其失於覺察者照失察衙役例分别議處七年奏準漕規諸弊均有嚴禁之例惟恐日久弛玩刋刻木榜列於瓜洲閘口儀徵江口淮安之盤糧廳濟寧臨清天津通州各口俾往來辨兵觸目警心仍令該管官不時稽察如有干犯照例提參究處八年奏準運軍正身不押運者將承派運軍之衛守備罰俸一年領運守干徇私不稽察者降一級留任惟隨幫武舉向無責成嗣後領運官辨徇私縱容代運隨幫知而不報者照應申上而不申上律議處一倉漕奏銷順治十二年題準輕齎由閘席片板竹行月等項一應隨漕錢糧經管各官逐款備造舊管新收開除實在清册在糧道者總漕按年奏銷在坐糧廳大通橋者總督倉場侍郎按年奏銷又題準漕糧徴兌總漕派發