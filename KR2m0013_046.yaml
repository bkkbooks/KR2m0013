body:
  text: 戶部漕運三一計屯貼運直隸通州天津各所屯地每軍分給五十畝其通州所原存地畝未足者將天津門地撥補山東德州衛屯地每軍均分四頃七畝七分有竒輪流耕種每嵗除納正項錢糧外每畝公出銀二分一毫津貼運軍德州左衛撥德州衛屯地五百七十一頃三十二畝有竒給軍貼運其地仍歸德州衛承種每畝除正項錢糧外津貼左衛運軍銀二分七釐濟寧衛每船分給贍運田五頃四十畝任城衛每軍額徵起科地七十六畝有竒輪流承種濟運東平所每船給地五頃自為開墾以作贍運免其起科平山衛每船分給贍運地二頃四十五畝不等東昌衛每船分給贍運地五頃臨清衛每軍原贍地五十畝或二三十畝不等皆分派濟運又德州所屯地按軍分給錢糧不徵不解坐抵安家月糧之用每船該地四頃五畝有竒濮鄆等州縣每船給地三頃贍運江南江安糧道所屬江寧等衛原編屯丁運戶兩項其屯地照畝納糧額供兵餉運軍給以行月錢糧不給屯田安慶衛每軍授田五百二十餘畝分為上下兩運新安衛屯田額徵銀五千一百十有六兩二錢四分有竒勻分給軍凡幫貼散戶不論軍民管佃每年每畝津贍銀一錢宣州衛每船分田千四百二十二畝有竒嵗津運銀一百四十兩有竒續又每畝加津貼銀三分建陽衛每軍舊給額田四十畝今以實在田數分别等次均勻盡分無分屯軍運戶按船授田輪流領運廬鳳淮徐等衛屯田均繫分别等次品搭均勻給軍贍運其民種軍田者按畝津貼蘇松糧道所屬蘇松等衛所屯田分上中下三等各照領運船分别給軍浙江各衛所屯田每船均給百有二畝八分六釐有竒計屯起運凡有屯領運衛所即以原額田津派本衛所應運之船其分剩屯田分别等次津貼有衛無屯衛所按船分給至有屯無運衛所田畝徵租解道照則貼派無屯衛所之軍江西各衛所屯田照各衛原額漕船及屯軍數目均勻分撥每船編撥屯田六百二十九畝募佃耕種令佃戶完糧之外每畝每年運軍收租銀八分其民墾成熟轉售賣者除完正課外照民田則例按畝折徵解道津貼本衛所運軍其有減存之船將該船應得屯田地畝租息除完糧外所餘耔粒折價歸公湖北湖南各衛所屯田按畝科糧給軍其運辨俸薪等項並軍三小料及運軍安家糧銀均於屯田內照數徵解支給乾隆二年奏準各省屯田如有佃種不清者自應一并清理但民間相沿日久必須辦理妥協方無煩擾應令總漕各該省督撫酌量辦理又題準湖南長沙等三十七州縣統計間丁一千八百九十五名每丁徵銀二錢共徵丁銀三百七十九兩因各丁內有無産窮丁無力完納議令照依人丁匠班之例攤入各州縣地糧徵收三年諭朕思惠養斯民之道以輕徭薄賦為先凡各省田糧稍有偏重之處悉已陸續豁免以紓民力今安徽所屬懷逺衛軍田十三頃每畝徵銀八分八釐有奇較之民田未免稍重著照蒙城縣民田之例每畝徵銀二分一釐有奇共免銀九十八兩八錢七分又武平衛軍田五千二百九十一頃每畝加徵銀七釐三毫有奇除見在請禁衛田之私典等事案內每畝應留贍運銀一釐七毫外每畝著減去加徵銀五釐五毫有奇共免銀二千九百六十二兩六錢五分該部即遵諭行文該督撫自乾隆三年為始永著為例欽此五年奏準屯田租與民人耕種該運軍止許得當年租銀如加别年租銀立劵私交者照私典軍田例與受皆行治罪其田追入新運之軍租價入官又題準浙江溫州衛屯田三萬一千二百三十四畝內撥派本衛二幫田萬六千二百九十三畝該衛各軍均交親屬管收外其餘田萬四千九百四十畝找派寧紹處三衛之軍從前原因相隔遙逺未經執業未幾又值兵燹屯民墾熟為業以致軍民爭訟今議定按照上田一畝收榖三石中田二石下田一石六斗各半平分之數輸津給軍其佃户輸津完餉之處令該衛徵比該管府道催徵分别解餉給軍衛備徵解不全照例參處佃户不能完納别召良佃耕種私自典賣者治罪又題準各省屯田徹底清釐將實在數目造具清册送部倘不實力奉行該督撫一并題參八年題準湖北武昌等衛所屯田清出原額有屯清屯無屯清費每年德安所額船三十三號每船得幫銀百六十二兩襄陽衛三十船每船給銀百七十兩武昌衛五十六船武左衛五十五船每船得銀一百四十七兩三錢黃州衛二十六船每船給銀一百二十五兩蘄州衛三十二船每船給銀一百三十五兩各有奇又題準湖北荆左衛成熟並新墾升科屯田二千二百五十五頃八十五畝有奇荆右衛成熟運操屯田二千二百二十五頃三十二畝有奇沔陽衛屯田千九十六頃三十畝有奇又軍操田八十四頃有奇荆州左右中前後五所屯田六百十有二頃十有四畝操田千三百十有五頃五十八畝各有奇應令運軍民佃照糧一例分派凡軍田典賣在民及頂絶墾荒年久造有房屋墳墓願當軍差者即將本人編入軍户當差軍置軍産田差均去者亦準其當差管業其田不準回贖如民買軍田不願當差及軍買軍産田去差存而原戶貧乏不能回贖者分别津貼以贍漕運九年題準江西屯田清出原額新增田地基山塘堰除豁除坍塌外見在成熟者五千三百三十七頃七十八畝有竒內南昌前左撫州鉛山饒州等衛所隨田地基山塘堰並建德縣補軍屯田鉛山所運軍隱匿入官屯田袁州屯田塘五百七十六頃六十畝不徵餘租九江廣信鉛山等衛所成熟屯田二千四百二十七頃七十五畝有奇應徵餘租軍丁利於自取贍運外其南昌等衛所軍民管業屯田二千三百三十三頃四十二畝有奇每畝派徵餘租不等每年徵租銀九千五百九兩有竒吉安所坐落龍泉縣丈出餘屯改升民田六十一畝每年徵租榖折價銀四十兩九分有奇均由縣徵收解道轉給各衛所運軍勻分濟運十年題準山東衛所屯田除東昌濮州東平三衛所並無什軍分種均繫見運之軍執業外其濟寧臨清平山三衛所地畝什軍一例領地一軍駕運九軍津貼臨清衛貼運山東前幫河南前後兩幫每年每畝津銀三分濟寧衛貼運濟寧前後兩幫按地定肥瘠照收成分數折給東昌衛之平山前後兩幫每年每畝津銀八分其典賣地畝逐漸贖回歸輪運之軍亦令同贖田租輪收嗣後若再典賣與受一並治罪追田給運典賣地內葬有墳墓者酌給畝數永行津貼什軍應贖地畝未贖之前應令一例津運各幫永減船及間運軍田內有糧地畝每年每畝津銀八分以二分完糧六分津運每嵗津銀令各衛彚齊按原減原歇幫次勻給見運各軍久荒屯田軍民費本開墾者給照執業議津每年每畝津銀六分以二分完糧四分津運又題準浙江屯田除康熙二十五年裁減駕軍田畝外按各衛所出運千四百四十一船每船給田百有二畝八分六釐有奇運軍有自能執業者即令運軍完納收租有因坐落遙逺以及零星磽瘠不能自執業者歸屯佃管辦即令屯佃完餉輸津贍運其津銀數目照依地土隨時酌定令衛所印官徵解給軍又題準德州正左二衛贍運屯田坐落直隸山東二省從前原繫軍民承種貼租各軍自討襄運或有或無有名無實今清出地二千四百二十九頃有奇每年每畝以一分起租共銀二千四百二十九兩有奇分給運軍五十六名每名年給銀十兩什軍五百四名每名年給銀三兩七錢有奇如隸本衛者由衛徵租如隸直隸者每年造册咨直督轉飭州縣代徵關解衛備一例分給各丁承領任城幫四十七船並無額産仍照向例每船每年給贍軍銀十兩於地丁內動給彚入漕項奏銷十二年題準各省贍運屯田典賣與民照例備價回贖由衛所移明州縣飭令民人收價退田倘地方官不即飭退即將該州縣照承辦遲延例參處如該軍不即備價妄控退田以及一時草率不行詳察旋即更正者將該衛所官辨罰俸一年若實繫民田故作軍田揑報詐冒者將該衛所官辨降一級調用倘各衙門書識人等有隱占屯田情弊該管官辨皆照失察衙役犯贓例議處該役照侵盜官糧例治罪十三年題準湖北荆右沔陽三衛有貧乏赤丁按照原派輸幫銀數減免幫貼其枝彝長逺四所既隸荆州衛其舊存成熟田地千二百頃十畝有竒改照民田起科雖非運産究屬同衛運軍亦令津貼以重漕運一優恤運軍康熙二十年議準漕船凍阻將通濟庫銀借給仍令總漕將應給漕贈銀照數扣解補還原項三十五年題準江淮興武二衛漕船凍阻不能回南動支通濟庫銀每船給銀二十兩速催回次仍令總漕於漕贈銀內扣解還款四十六年議準各省領運運軍限內過淮抵通照數全完者令總漕賞給花紅以示鼓勵如抵通交糧於額糧之外有領運三年陸續多交米至百石者倉場咨部注册領運六年多交米至二百石者給以九品頂帶榮身如有運軍運米至二十年雖無多交之米並無挂欠及過犯事故者倉場侍郎咨部亦給以九品頂帶榮身六十年議準漕船回空凍阻暫動東省藩庫銀每船借給八兩於六十一年各該糧道應給運軍月糧內坐扣移解東省還項又議準到淮各幫漕船因雇募民船諸費浩繁借給河庫帑銀作民船口糧水腳之用江安漕船每船借銀五十兩蘇松漕白船每船借銀四十兩江西漕船每船借銀三十兩浙江漕白船每船借銀五十兩均於次年運軍應領行月銀米內扣還雍正元年議準各省完糧各軍並守凍完糧軍船每船正軍一名賞給銀二兩又山東張秋臨清一帶地方浙江江西江南等省幫船運軍頭舵工等守凍不能回次量支藩庫銀四千兩每船給銀六兩六年奏準回空漕船過淮安關頭工舵工水手人等零星稍帶梨棗六十石以下者免其報稅其餘貨物仍照例籤量按貨納稅經滸墅關稍帶梨棗及應上稅之物仍令輸稅七年諭運軍駕運辛苦若就糧艘之便順帶貨物至京貿易以獲利益亦情理可行之事著於舊例六十石之外加增四十石永著為例欽此八年題準各船頭工舵工二人每人準帶土宜三石水手無論人數每船帶土宜二十石合算每船準帶土宜共百二十六石九年議準河東二省截留存剩漕米三十萬石議令原船運通挽輸上下倍為勞苦按道里之逺近時日之多寡酌議在德州往返者每船給銀二十八兩三錢八分在臨清往返者每船給銀三十九兩三錢五分有奇共四百十有九船應給銀萬四千九百四十二兩一錢有奇再在德州往返各船先經兩次借給每船共銀三十八兩今每船多給銀九兩六錢二分有奇共多給銀千三百五十六兩一錢六分免其扣追十三年諭湖南明嵗應運漕糧已經截留為黔省振濟之用定例漕船停運之年給運軍一半月糧以為養贍朕思各船水手均由運軍雇募多繫别省貧民今湖南漕運既停各水手等在異鄉乏業未免歸費無資著湖南巡撫於本年回空漕船抵次之日就近驗明各水手內有别處民人即量給盤費資助令回原籍勿令逗遛滋事欽此乾隆三年奏準回空漕船舵水人等零星稍帶梨棗六十石免其輸稅四年題準各省重運糧船例帶土宜百二十六石向因各項貨物粗細不同按石計算漫無一定嗣後分别貨物粗細酌量捆束大小定數作石於過淮處立榜曉諭如有違例裝載以及書役人等稽延勒索嚴加究處七年奏準安徽蘇松浙江三省截留漕船於定例停給一半月糧項內再照浙例減半賞給又諭今年漕船北上時值河水淺涸各船盤駮加縴繁費實多借支庫項以作歸塗使用江西南昌等幫借銀四千四百兩江南興武等幫借銀千七百四兩揚州等幫借銀千七百九十二兩均著加恩賞給免其扣還欽此十年奏準首進幫船每年五六月間回空之時尚無梨棗可帶以致不能均沾利澤嗣後回空糧船行至山東如無梨棗可帶準其將核桃瓜子柿餅等物攜帶六十石以抵梨棗之數倘逾六十石者按則徵收稅銀十一年諭停運漕船例給一半月糧以資苫蓋上年兩江被水朕降旨蠲緩並截留漕糧以備振恤之用其減歇軍船自應照例支給但念該地方被災之後軍力未免艱難一半月糧慮不敷用著加恩於常例五分之外增給二分俾窮軍不致拮據欽此十三年諭本年四月初間湖南江西運船於桃源宿遷地方遭風沉溺重船五十隻所有虧折米數例應運軍買補其船亦應賠造但念窮軍力量艱難若令一時賠補難免拮據著加恩軫恤其船已滿年限者照例給價成造未滿年限者於道庫內借給令其及早成造限以三年陸續還款以紓軍力至此次失風實非人力疏忽所致運官及汛地各官均著免其處分欽此一徵收禁例順治九年題準運軍行糧應給本色有違例折銀者縣官與運辨皆嚴提究擬十二年題準兵道知府職不司漕有借驗糧名色苛索者官即指參胥役究治十三年奏準漕糧開徵之時如有州縣蠹役包攬代完及飛派無辜者即行指參十五年議準州縣拖欠漕項錢糧該管監兌糧道等官嚴檄行催不得差役致滋勒索違者指參又題準運軍子弟及積年舊役有謀充有漕各衙門書承者令總漕及督撫嚴察從重治罪如本官失於覺察及徇庇容隱者分别參處十六年題準州縣徵收漕米浮派雜費及僕役經承需索小民常例者嚴行禁止犯者題參究治康熙元年題準徵收糧米責成印官稽察不許顆粒囤貯私家如紳襟大戶仍囤私家不行交倉者管糧官詳報總漕題參四年題準各州縣徴收漕米如有淋尖踼斛剗削斛底改換斛面及别取樣米並斛面餘米者總漕各督撫嚴察題參三十年題準州縣官侵隱漕項銀揑稱民欠冒請蠲除者題參治罪其失察之該管上司交部議處又題準州縣經承盜賣漕糧依律治罪失察之本管官照例議處三十三年題準漕糧耗米例應徵收本色給軍如有私自改徴折色者各該督撫題參照私折漕糧例議處五十一年題準州縣兌糧責令監兌官坐守糧道親到水次稽察倘有折收情弊發覺將該管州縣及領運官皆革職監兑官降二級調用糧道降二級留任所折之米照數追賠一重運禁例順治五年題準運官奉單領運赴次違限者革職戴罪交糧核其完欠奏奪僉運退避者嚴拿究擬十年題準領運辨軍中塗侵盜漕糧按律治罪所欠漕米照數嚴催追賠十二年題準衛軍水次承運有衛官隨幫官常例書識管家抽豐名色州縣官知府同知通判及糧道漕院各衙門吏胥班役勒索陋規並過淮攤派使費沿塗需索土儀及抵通過壩交倉船規常例倉場坐糧廳書吏苛索使費飭令各該衙門盡行禁革在外責成總漕總河各該督撫在內責成倉場侍郎巡倉科道協同釐剔倘有前項弊端立即題參究處以肅漕政又題準監兌漕糧事竣之日監兌官將有無需索等弊具結投送督撫存驗事發以溺職坐罪十三年題準水次將米折銀罪在經徴有司並監兌官如過淮盤驗短少將監兌官照例參處其嚴禁盜賣令沿河各官具結呈報如糧船到通挂欠審繫某地方盜賣者即將該地方官參處賠補十五年題準運辨領運漕船各有定數如中塗歸并帶運冒支行月水腳等銀按照闕船數目嚴追從重究處康熙二年奏準運船交兌之初專責糧道曉諭商牙禁約運軍不許夾帶私貨漕糧兌畢未開之先專責監兌官逐船搜檢糧道隨取監兌官察明並無夾帶甘結送總漕總河倉場侍郎三處稽考如有犯者拏解糧道呈報總漕題參照律治罪又題準沿塗城市鎮店貨物輻輳之所專責押運通判極力催行不許停泊通幫前後不時稽察如稽察不嚴即將通判題參照例議處又題準運軍包攬客貨私載船內運官隨幫官嚴加稽察許於司漕衙門據實出首免罪如隱匿不報一經察出運官隨幫官加倍究擬運軍依律治罪又議準糧船經由地方自水次至淮安總漕同淮揚道盤詰一次至濟寧總河同濟寧道盤詰一次三年題準官軍赴兌漕糧爭索斛面酒席耻辱糧官者運官以故縱議處運軍俟船糧抵通之日嚴行究治五年題準運辨侵蝕各軍月糧銀米俟抵通交盤之日倉場嚴審究擬又題準運軍多收斛面入已並運官知而不舉皆從重擬罪勒索之米照追入官又題準領運官辨勒索運軍飯米擅扣行月公費等銀及縱容親僕需索常例者俟抵通交糧完日令倉場侍郎嚴提審追按律究擬又題準舊例辨軍爭告在未兌糧之先責令糧道嚴察不許領運如在領運之後俟完糧回南日聽該衙門審理嗣後有擅準運蠹呈辭拘繫新運幫官稽誤新漕者照誤漕例議處運蠹嚴審究擬六年題準運辨自誤限期揑辭卸罪誣告官吏糧里者依律擬杖八年題準運辨領運全單不填注支領糧銀月日照疏忽例議處十一年題準運辨私載客貨與已貨及裝載私鹽者皆革職運軍私攬客貨私載已貨及裝載私鹽運官失於覺察者降一級調用該管糧道不嚴禁者罰俸一年二十一年題準收兌漕糧多攙粳粞砂土者該管官革職監兌官降一級調用其抵通交兌漕糧米多粳粞及有砂土者押運官革職糧道降一級調用二十五年題準紅駮船分運漕米如有用石灰泡水及藥水灌漲糧米者領運辨軍呈報倉場侍郎究審將運船人夫發寧古塔等處兵丁為奴其短少之米勒限著落正身船户家産賠完如駮運米好辨軍勒索不收亦交與刑部從重治罪二十六年題準沿塗催漕將辨縱兵索詐漕船以致運軍畏避船米撞沉者革職嚴拏究擬二十七年題準運辨需索運軍未遂不顧風浪逼船渡江以致漂沒漕糧淹斃人口照例治罪追埋葬銀給死者之家漂沒漕米仍著落該辨賠補二十八年題準運官縱軍捉船駮淺漫無約束者題參照溺職例革職二十九年題準運官縱令運軍搭臺演戲停泊不行貽誤漕運