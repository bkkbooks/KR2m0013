少等情仍照例咨部分别定議至左右翼長均有表率稽察之責亦給以八品虚銜照例咨部注册五年奏準陵寢需用乳牛祭品攸關見今從張家口外選取柰路塗遥逺以致疲瘦誠恐有誤按康熙四十三年以前陵寢所用乳牛由部劄行兩翼監督收稅官採買以備應用除本年所需乳牛仍從張家口選用外自乾隆六年春季為始仍照從前令兩翼監督動支稅銀辦買令奉祀陵寢禮部官按季委官前期赴部領取照正數十頭外備用二頭以備臨期倒斃乏乳之用其所委領牛官役人等及馬匹沿塗口糧草豆照例按定往返起程日期報部行文戸部支給至所需錢糧兩翼監督自行報戸部開銷若有浮冒將兩翼監督從重議處至無乳牛犢令奉祀陵寢禮部官於領取乳牛時隨帶交兩翼照時價變賣沿塗口糧草豆照例給與其變價銀歸入稅項增買乳牛再或陵寢乳牛倒斃即令掩埋報部六年奏準陵寢餧養乳牛每乳牛日支豆四升草三束牛犢日支豆二升草一束其帶回之無乳牛及備牛每牛日給豆二升草二束每犢日給豆一升草一束由部行文戸部給票沿塗支領再牛犢在塗每六頭用荆筐一馬車一裝載以防天雨泥濘行走遲慢恐致遲誤祭期又備牛一項原與正數乳牛動支稅銀一同採買如未經換用應即照時價變賣歸項倘已經換用則帶回之牛必有殘疾無乳等情應即比照無乳之牛分别變價報銷至領牛之官四時來京郎中從役五人馬七匹員外郎主事各從役四人馬六匹贊禮郎筆帖式各從役二人馬二匹今陵寢所差官役及自備之馬均應比照勘合例令奉祀陵寢禮部官視牛多寡臨期酌量差委其沿塗口糧每官日支秔米八合三勺每役日支粟米八合三勺每馬站支豆二升草二束往返一例給發至備牛往返應令兩翼監督酌差人役隨帶以便沿塗餧養其人役口糧即照從役例給發十五年覆準養什木牧羣定例牛二十羣每羣百頭羊二十羣每羣五百隻每年牛百頭内倒斃十頭倒斃之大牛皮四張小牛皮五張各抵補二嵗牛一頭入羣牧養每年羊百隻内倒斃十六隻倒斃之大羊皮六張小羊皮七張各抵補二嵗羊一隻入羣牧養每三年牛三頭孳生一頭羊三隻孳生二隻額外孳生牛一頭準抵闕欠羊六隻牛犢一頭準抵闕欠羊羔五隻孳生羊六隻準抵闕欠牛一頭羊羔五隻準抵闕欠牛犢一頭祭祀應用牛羊使用犍牛均自出羣之日起不計孳生擠乳在舘倒斃之乳牛牛犢自在館倒斃之日起不計孳生該總管等三年任内於應得孳生額外多得孳生交部議敘闕額勒令在任一年賠補賠補不完者交部議處額外多得孳生均入羣外餘照依時價變賣所得銀交盛京戸部竢交完日咨報戸禮二部察覈其總管副管交兵部按例分别議敘十九年議準養什木補用牧長二十人人轄二羣交翼長總理牧長月銀一兩翼長二兩倘孳生不敷即將月費扣抵如仍不敷嚴加治罪其總管副管槩行裁汰一燕㑹牲牢順治初年議準備用筵燕及外藩供給於張家口取犍牛百五十羊五百在館餧養康熙九年題準在内大燕及部燕皆停用牛減去牛百頭止存五十其筵燕增用羊四百共九百在館餧養四十四年奏準筵燕所用羊禮部停其採買仍取口外羊送館餧養應用四十六年奏準牛羊館牛羊停止餧養仍照前劄行兩翼採買應用雍正五年奏準嗣後䝉古王來京在五旗王府筵燕應用牛者改用羊乾隆元年奏準筵燕所用羊令兩翼監督按季報價與祭祀所需羊一例辦理一賓館牲牢康熙九年奏準牛羊館減去牛百頭止留五十在館以備外藩供給應用四十四年奏準外藩供給用羊停其採買仍取口外羊應用四十六年奏準裁牛羊館照前在兩翼採買雍正五年奏準在京過年之固倫公主額駙親王等除夕所送筵席牲應用牛者改用羊十三年定公主郡主縣主郡君縣君自下嫁日始公主日給大䝉古羊一郡主以下三日給大䝉古羊一由部劄知兩翼監督折價給發若公主等往游牧地方停止領取回京日仍照例給發一賜䘏牲牢康熙二十九年議準致祭外藩牛羊定價冬春每牛價銀四兩羊一兩五錢夏秋牛三兩羊一兩雍正五年奏準内外賜䘏致祭牛羊嗣後除外藩固倫額駙親王郡王貝勒貝子公公主郡主縣主郡君縣君等照舊例折給牛價外在京親王世子郡王福晉公主等用牛者均改用羊欽定大清㑹典則例卷九十七
