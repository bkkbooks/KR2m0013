body:
  text: 禮部精膳清吏司餼廪一㑹試饔餼順治初年定鄉㑹試供給及需用物件由工部備辦康熙十年題定㑹試需用筆墨等項由部行文戸部咨取銀五百兩交提調官酌量支發餘銀交還户部事竣由部題銷將工部備辦物件交順天府收貯㑹試時由部行文順天府取用又定㑹試部委滿漢供給官劄順天府取大宛兩縣稅銀二千三百餘兩解部之日即令兩縣内外委官具領辦買事竣造册報部其銀由直隸總督題銷雍正元年議準順天鄉㑹試場内所用筆墨紙張等物亦著備辦以杜五城借用之擾六年覆準向來㑹試供給由順天府移取直隸藩庫銀委大宛兩縣佐貳官承辦直隸總督彚按題銷嗣後每逢文武㑹試年遴選亷能司官督率辦理發銀之時禮兵二部堂官一人㑹同順天府尹傳集内外委官當堂實給務令各行戸實領如有官吏藉端需索行戸等呈告該堂官立行題叅交部照例嚴加議處事竣由部㑹同順天府尹題銷八年定文㑹試有事各官及匠役入闈舉子食物自初五日為始是日在闈提調官供給官委官共供雞四鴨三豬肉二十斤羊肉十斤魚六斤白米五升老米一斗五升酒十斤米麪餅餌各五十六枚雞卵四十菜二種各七斤醬𤓰茄各一斤笋二斤山藥二斤香蕈木耳各五錢並椒葱鹽油醬醋等物初六日各官入闈共供雞三十二鴨十有四豬肉百五十斤羊肉六十三斤魚一百八十三斤白米五斗老米二斗麪五十斤雞卵二百菜四十四斤醬𤓰茄各五斤笋十四斤山藥十三斤木耳十兩並葱椒鹽油醬醋等物豫蓄各官食物每人白倉米各一升麪二斤酒一斤棗栗核桃各一斤油醬醋各八兩團粉鹽各一兩椒二錢燭二枝茶一兩又定自初七日始至徹闈日止各官食物分為三等主考知貢舉都統為一等每人日給雞二豬羊肉各四斤白米二升老米四升麪三斤雞卵八菜四種菽乳四方油醬醋各八兩醬𤓰四兩鹽二兩椒一錢燭八枝茶一兩五錢房考監試提調叅領叅將收掌總理供給所柴炭所各官為二等每人日給雞豬羊肉老米燭視一等各減半雞卵油醬醋各減二白麪醬𤓰各減一鹽一兩五錢茶一兩餘物視一等四所及廵綽搜檢督門醫官筆帖式内外委官坊官為三等每人日給雞一豬羊肉各一斤次白米一升老米二升次白麪二斤雞卵四油醬醋各四兩醬瓜一兩鹽一兩燭三枝餘物視二等領催十人内簾書吏八人各共得三等食物二分對讀生每人日給豬肉八兩鹽魚二兩次白米一升餅餌二枚鹽菜二兩油鹽醬醋各一兩湯一椀燭二枝茶一錢謄録書手每人日給老米一升生菜二斤菽乳二方燭三枝其豬肉鹽菜油鹽醋茶與對讀生同辦事書吏每人日給燭二枝食物與謄錄書手同刻字刷印匠每人日給老米一升生菜一斤鹽菜三兩菽乳一方油鹽醬醋各一兩茶一錢每場燭百枝刑皂及供給皂役每人日給老米一升鹽菜二兩菽乳二方油鹽醬各一兩場内廚役人等每人日給老米一升鹽菜二兩各官廚人並匠夫鼓手入等每人日給老米一升鹽菜二兩又定三場出題燕内簾各官共給雞十鴨七豬肉四十斤羊肉五十四斤魚十八斤白米二斗酒一缾餅餌三盤雞卵六十果則核桃龍眼葡萄栗蔬則山藥水笋香蕈木耳蘑菇金針菜生菜四種並油鹽醬醋椒等物燭六十枝茶六兩三場㸃名知貢舉以下共設果品二十席酒一缾三場進題官食物每場雞二豬羊肉各三斤白米四升麪四斤菜四種酒一壺燭四枝三場應試舉子食物每塲共供雞百有五十豬肉八百斤雞卵二百粉六十斤醬百五十斤清醬五十斤醋四十斤椒二斤蔬五種香蕈二斤紫菜一斤韭二十斤薑四十斤醬𤓰二百斤茶三種六安茶二十斤北源茶三十斤松蘿茶四十斤每人白米三合號軍每場人給老米一升鹽菜二兩每號燭十枝又定揭曉前一日填榜燕内簾等官共給雞二十鴨十有六豬肉七十斤羊如之魚五十白米三斗麪五十斤餅餌四盤雞卵八十酒二缾果則核桃龍眼栗梨蔬則香蕈山藥蘑菇金針菜生菜鹽菜並油鹽醬醋椒等物燭四百枝茶一斤部堂官及司官共給雞四鴨四豬肉十有五斤魚四白米五升麪五斤雞卵二十蔬則香蕈木耳蘑菇金針菜山藥水笋芽韭生菜並葱椒油鹽醬醋等物部堂司官從役共老米一斗豬肉六斤生菜五斤油鹽醬醋各一斤䕶榜鑄印局匠役八人共給次白米八升猪肉三斤油鹽醬醋各一斤進内簾謄十魁卷書手十人日給三等食物二分十三年諭向來文武科場需用器皿食物等項定例繋順天府委大宛二縣動用錢糧分發各行户備辦近聞承辦之人不能料理妥協以致各行戸未領銀之先吏胥有折扣價直需索規禮之弊及至發價之時又復任意短發扣剋中飽著順天府尹嚴飭大宛二縣即將前項情弊革除倘仍蹈故轍一經發覺定將該管各官一并議處欽此一賓館饔餼崇德二年定朝鮮國王子弟來朝每日給鵞一雞二魚四豬肉八斤秔米二升酒一缾細粉三斤葱二斤菜韭及醬各一斤清醬八兩醋三兩二錢鐙油六兩隨從每人日各給豬肉一斤並給鹽米三年定朝鮮國進表來朝都經歴大通官各日給豬肉一斤八兩鹽醬各二兩菜八兩每五日各給酒一缾小通事豬肉一斤菜一斤醬二兩回日都經歴大通事各給豬肉三十斤小通事二十斤以為旅次之供又定東方索倫薩哈爾察虎爾哈庫爾喀等部落貢貂來朝頭領每日各給豬肉二斤酒一缾鐙油二兩鹽一兩每三日給蒸餅一次回日旅次各日給豬肉八兩四年定朝鮮國慶賀萬夀元旦長至進表正使副使書狀官各日給鵞二雞三魚二菽乳一斤菜三斤每五日給羊一酒一缾油醋各十兩清醬十五兩醬一斤大通官給豬肉一斤八兩押物官豬肉一斤鹽醬各二兩菜八兩每五日酒二缾從人二人共給豬肉一斤並給鹽每五日二十人共酒一缾回日正使