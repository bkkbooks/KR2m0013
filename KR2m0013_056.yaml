body:
  text: 户部蠲恤一一賜復順治元年定京城遭明末寇賊蹂躙之後遷徙之家免賦役三年房舍被毁者免一年大兵經由地方田禾被踐者免本年租稅之半河北府州縣衛租賦屯糧免本年三分之一二年定山西地方初復免本年田租之半三年覆準江南各府漕米折價於恩詔外再免三分之一江隂漕白二糧亦如之潛山太湖英山霍山等縣盡豫蠲免五年覆準湖廣嶽州等處大兵經過附郭錢糧免半餘免三分之一衡永等處大兵駐劄頗久辰靖等處殘破附郭免十分之七餘免半十一年詔順治六七兩年直省地丁本折錢糧積欠在民者悉豫豁免十三年詔順治八九兩年直省地丁本折錢糧積欠在民者悉豫豁免又題準蠲荒流抵恐民間不得實惠令百姓親填布政使司原簿以禁濫徵十八年覆準江南之江都如臯海州三州縣修理烽墩馬路各免一年差徭康熙元年議準江西南昌府屬之寧州及南昌新建豐城進賢奉新靖安等六縣浮米折銀十有九萬五千一百二十二兩浮本色米十有四萬九千一百三十一石各有竒悉豫豁免三年詔直省順治十五年以前民欠各項銀米藥材紬絹布匹等項錢糧槩行蠲免四年詔直省順治十六十七十八等年各項民欠錢糧均豫蠲免八年議準陜西平涼臨洮鞏昌三府所屬各州縣田賦積欠七萬八千三百餘兩糧十有六萬三千餘石槩準豁免十年詔巡幸經歷通州以東至山海關地丁錢糧蠲免一年十九年覆準江南財賦繁多舊欠追比纍民康熙十二年以前錢糧均豫蠲免二十三年恩詔江南江西浙江湖廣等省自用兵以來供應繁苦宜加恩恤二十四年所運漕糧著免三分之一自十三年起至二十二年積欠漕項錢糧著自康熙二十三年起每年帶徵一年二十四年諭河南湖北康熙二十五年錢糧蠲免一半其二十四年錢糧全免直隸江南被災地方二十四年下半年二十五年上半年錢糧均豫豁免欽此二十五年諭直隸順永保河四府四川貴州二省康熙二十六年地丁各項錢糧及二十四年未完錢糧湖南福建兩省二十六年下半年二十七年上半年地丁各項錢糧及二十五年未完錢糧盡行蠲免欽此又諭直隸正順廣大四府康熙二十六年地丁各項錢糧一例蠲免欽此二十六年恩詔自用兵以來一應動用錢糧纍年未清者槩行豁免又諭除漕項錢糧外江蘇陜西省康熙二十七年應徵地丁各項錢糧均著蠲免二十六年未完錢糧亦悉豫豁免欽此二十七年詔免江南安徽府屬二十六年地丁漕糧又諭康熙十七年以前民欠漕項銀及米麥均著蠲免欽此又諭朕南巡至江南境上所經宿遷諸處民生風景較前次南巡稍加富庶朕念江南積年帶徵錢糧恐為民纍出京時曽詢户部知全省積欠約有二百二十萬除江南正項錢糧已與直隸各省節次蠲免外再將江南全省積年民欠地丁一應錢糧屯糧蘆課米麥豆雜稅槩豫蠲除欽此乂諭雲南百姓供億王師運送勞瘁著將二十一年至二十七年所欠屯賦銀及米麥等項盡行蠲免欽此二十九年覆準山東省本年地丁錢糧盡行蠲免三十年題準江西南昌等五府自二十二年起至二十七年止纍年積欠分年帶徵錢糧免其追徵又奉旨蠲免湖南三十一年漕糧又覆準江西吉水縣二十七年以前民欠地丁銀悉豫蠲免又諭朕撫御區宇三十年以來夙夜圖維惟以愛育蒼生俾咸臻安阜為念比嵗各省額徵錢糧業已次第蠲豁草歲運漕米向來未經議免朕時切軫懷所有京通各倉米穀撙節支給數載於茲今觀近年儲積之粟恰足供用應將起運漕糧逐省蠲免以紓民力除河南省明嵗漕糧已頒諭免徴外湖廣江西浙江江蘇安徽山東應輸漕米自康熙三十一年為始以次各蠲一年至江寧京口杭州荆州大兵駐防地方亦應豫行積貯將康熙三十一年起運三十年漕米各截留十萬石存貯倉厫以備需用欽此三十一年覆準廣東化州瓊山等四州縣自十八年至二十九年民欠槩豫豁免三十二年諭朕念廣西四川貴州雲南四省皆屬邉地土壤磽瘠民生艱苦與腹內舟車輻輳得以廣資生計者不同朕時切軫懷數嵗以來屢施恩澤廣西省康熙十六年通省錢糧十七十八年民欠錢糧貴州省二十二年秋冬及二十三年春夏地丁錢糧又貴州四川二省二十五年未完及二十六年應徵錢糧雲南省二十七年以前屯地積欠錢糧皆經次第蠲豁茲念育民之道無如寬賦矧邉省地方非再沛優恤之恩則閭閻無由充裕所有康熙三十三年四省應徴地丁銀米著通行蠲免欽此三十三年諭邳州二十四年至二十七年積欠租銀悉令蠲免欽此又諭直隸安州等十一州縣康熙三十四年地丁錢糧均豫蠲免欽此三十四年恩詔凡應追賠贓私如果家産盡絶力不能完者凖豫豁免又詔免河南三十二三四等年民欠三十五年諭漕項纍年積欠及帶徵未完銀米均著豁免欽此又諭直隸宣化府比年以來大兵供億殊勞民力著將三十六年地丁銀米全豫豁免欽此又諭比年以來軍前需用馬匹在大同府屬牧養者甚多措辦芻豆等項雖皆支用帑項而供億浩繁殊勞民力康熙三十六年大同府屬州縣衛所應徵地丁銀米著全豫豁免欽此又覆準陜西地方大兵往來供應勞苦其三十六年全省地丁並草折銀悉豫蠲免又奉旨免浙江台州衛所未完三十二年存留銀三十六年諭比年出師討冦大兵牧飬馬匹及三次師行出入皆經山西地方沿邉各州縣衛所其餘諸郡雖非師旅所經亦有協辦轉輸行齎居送之事又該省屢嵗不登民間生計艱難著將康熙三十七年山西通省地丁銀米一槩蠲免欽此又諭比年以來因厄魯特噶爾丹狂逞逆命遣發大兵分道進勦軍興供億不得已而煩民力甘肅所屬各州縣衛所榆林等處沿邉各州縣衛所適當師行要道其牧養軍前需用馬匹並大兵往來經過各項措辦雖皆支給正帑而供應繁多閭閻勞苦朕心深用軫念著將康熙三十六年甘肅巡撫所屬州縣衛所陜西巡撫所屬榆林等沿邉州縣衛所地丁銀米盡行蠲免行文各該撫遍加曉諭務俾小民均沾實惠稱朕體恤黎元至意甘肅所屬銀米既經全免需用錢糧著於鄰近省分作速撥給欽此又覆準蘇松等府州屬康熙十八年起至二十六年止民欠正雜錢糧盡行蠲免三十八年聖祖仁皇帝南巡駐蹕浙江將三十四五六年奏銷未完民欠地丁錢糧米豆麥雜稅一槩免徵又諭江蘇安徽所屬舊欠帶徵錢糧計及百萬念小民方供新稅復急舊逋物力維艱勢難兼辦今除康熙三十三年恩詔內已經赦免外其三十四五六等年奏銷未完民欠地丁錢糧米麥豆雜稅著戶部行文該督撫察明悉免徵收欽此又諭朕巡省民生風俗南至江浙茲已返蹕行經山東沿塗見父老咨詢農事幸今嵗雨暘時若二麥繼登小民可以無憂粒食但前年被災泰安等二十七州縣生計尚未豐盈宜更加恩休養所有康熙三十六年未完地丁銀米均著免徵其三十七年應徵錢糧原因災傷令三十八年完納今念一嵗之內並輸兩嵗之租恐物力艱難未能兼辦著分作三年帶徵以示寬恤欽此又奉旨直隸薊州所欠未完康熙三十三十一三十二等年退地追銀均著免追又覆準江南淮揚三十場竈户康熙三十七八兩年應徵鹽課盡豫蠲免又諭湖廣康熙三十九年全省地丁銀均豫蠲免欽此又諭甘肅巡撫所屬地方康熙四十一年地丁錢糧盡行蠲免欽此四十一年諭安徽康熙四十二年地丁銀盡行蠲免欽此又諭秦省不通水運河西一帶地方素稱貧瘠雖免四十一年錢糧民生未裕再將四十二年地丁錢糧通行蠲免欽此四十二年諭山東泰安郯城等七州縣四十一年未完錢糧均著蠲免欽此又諭山東康熙四十三年地丁銀米著通行蠲免有屢年錢糧積欠在民者亦著察明免徵欽此又諭江南徐州睢寧縣康熙三十七三十八三十九三年未完地丁錢糧悉著免徵邳州四十年未完錢糧亦著免徵欽此是年聖祖仁皇帝駕幸山西免康熙四十一年民欠銀米又奉旨河南民欠著蠲免又詔免河南全省康熙四十三年地丁漕糧又詔免雲南貴州廣西四川四省康熙四十三年應徵地丁各項錢糧四十三年諭山東全省康熙四十四年地丁銀著蠲免欽此又諭浙江康熙四十四年應徵地丁錢糧通行豁免欽此四十四年諭直隸各省每歲應輸額賦有以次第蠲者有頻蠲數年者有將帶徵積欠暫令停徵者凡以蠲除額賦專為小民樂業遂生曩年楚省錢糧雖屢行豁免但今已閲數載未經特蠲應將該省額賦全免一年以示朕加恩優渥之至意湖北湖南康熙四十五年除漕糧漕項外其餘地丁銀米一槩免徵舊欠未完者並停輸納欽此又諭嗣後蠲免新年錢糧時若令將纍年未完錢糧蠲免則一并蠲免若止令將新年錢糧蠲免並無將舊欠錢糧一并蠲免之旨則蠲免新糧之年停徵舊欠俟次年再照常徵輸欽此四十五年諭直隸山東地方雖屢收穫民氣漸舒而所有宿逋尚應輸納朕念黎元方有起色辦賦猶難一時新舊並徵勢難兼應宜更加寬恤以𢎞休養直隸自康熙四十一年至四十三年各府屬未完民欠銀八萬二千七百兩有奇糧五千九百石有奇山東自康熙四十二年各府屬未完民欠銀一百六十九萬千七百兩有奇糧五千九百石有奇或見在徵取或分年帶徵著通行蠲免俾小民實除逋負之纍倘應徵舊欠有先完納在官者即準抵本年正賦欽此又諭直隸各省錢糧次第全蠲一年者業經數舉獨是屢嵗逋負積纍加增舊稅新徵勢難兼辦縱使分年帶輸仍多拮據直隸山東積欠錢糧今年皆已蠲免其山西陜西甘肅江蘇安徽江西浙江湖北湖南廣東各省自康熙四十三年以前未完地丁銀二百十有二萬二千七百兩有奇糧十萬五千七百石有奇著按數通行蠲免或舊欠已完在官而見年錢糧未完足者亦準扣抵欽此四十七年奉旨免江南四十八年地丁銀四十九年諭朕比來省方時邁已閲七省南北人民風俗及日用生計靡不周知而民所以未盡殷阜者良由承平既久户口日繁地不加增産不加益食用不給理有必然朕洞燭此隱時深軫念爰不靳敷仁用蘇民力明年為康熙五十年原欲將天下錢糧一槩蠲免因廷臣集議恐各處兵餉撥解之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始於三年以內通免一周俾逺近均沾惠澤直隸奉天福建浙江廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外五十年應徵地畝銀共七百二十二萬六千一百兩有奇均豫豁免並纍年舊欠共一百十有八萬五千四百兩有奇亦均著免徵其五十一年五十二年應蠲省分至期候旨行欽此又奉旨免江南淮揚徐三屬淮徐泰三衛地丁銀又題請江蘇所屬府州縣無著銀將俸工等項捐賠補還奉旨此無著銀乃朕南巡時地方官公同動用不敢聲明但前任官那用虧空之項著落後任官賠補必致科斂擾害百姓此等朕知之甚悉心殊不忍此無著銀十萬八千有奇免其賠補以示朕軫念官民至意欽此又諭蠲免湖廣省康熙三十一年地丁銀康熙四十八九兩年民欠銀欽此又覆準蠲免盛京奉錦所屬各州縣地丁銀其承德等州縣康熙五十年應徵米豆亦一例蠲免又諭福建臺灣府屬康熙五十年應徵榖已經徵完在官雖蠲免與小民無益其應徵五十一年穀著行蠲免欽此又諭朕宵旰孜孜勤求民瘼永惟惠下實政無如除賦蠲租除每嵗直省報聞偶有水旱災傷照輕重分數蠲免正供仍加振恤外將天下地丁錢糧自康熙五十年為始三年之內全免一周使率土黎庶普被恩膏除將直隸奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南各直省康熙五十年五十一年地丁錢糧一槩蠲免纍年舊欠錢糧一並免徵外所有江蘇安徽江西山東各撫屬除漕項外康熙五十二年應徵地畝銀共八百八十二萬九千六百四十四兩有奇人丁銀共一百三萬五千三百二十五兩有奇悉豫豁免其纍年舊欠銀二百四十八萬三千八百二十八兩有奇著一並免徵計三年之內總免過天下地畝人丁新徵舊欠共銀三千八百有六萬四千六百九十七兩有奇各該督撫務須實心奉行體朕軫念民生至意欽此又諭陜西潼關衛山西大同府所屬康熙五十一年應徵米豆芻草既已徵完今雖蠲免亦無益於小民著將明年應徵者蠲免欽此又奉旨免陜西西安等屬地丁並纍年民欠銀五十二年恩詔天下地丁錢糧既沛恩澤於三年內悉豫豁免其自京城及各省房地租稅多繫貧民賃僦官地棲身營業宜並蠲免以覃恩惠著察明京城內及直省每年地租額數於康熙五十三年豁免一年其積年逋欠若干一并察明免其追補又奉旨山西河南地丁銀著蠲免又奉旨陜西西安府等屬錢糧著蠲免又奉旨會寧等處今嵗錢糧著補行豁免五十四年諭順天永平保定河間宣化五府五十五年地丁銀米豆穀草通行蠲免欽此五十五年諭䇿妄阿喇布坦近忽侵擾哈密故特徵兵備邉一應飛芻挽粟悉支正供毫無纍及閭閻今嵗山西陜西二省雖屬豐收猶念兵民效力轉輸無誤特將沿邉一帶運糧地方自山西大同府屬前衛右衛大同懷仁馬邑朔保德等七州縣衛直至陜西延安府屬府谷神木等共四十二州縣衛所堡康熙五十六年額徵銀八萬六千一百兩有奇糧米豆穀三十一萬七千七百石有奇草二千七十六萬五千九百束有奇通行蠲免並將從前積欠逋欠銀糧草豆悉豫蠲免欽此又奉旨直隸地丁銀米芻草著蠲免五十六年諭朕撫馭寰宇五十餘年各省正賦屢經全免纍年積欠亦已蠲徵近者民力雖已稍舒然念分年帶徵之銀若不格外優寬則小民一嵗所獲分納二年之賦以其贏餘飬贍室家斷難充足朕每懷及此軫惻良深宜更加殊恩通行豁免今將直隸江蘇安徽江西浙江湖廣西安甘肅等八省帶徵屯衛銀二百三十九萬八千三百八十兩有奇槩免徵收其漕項雖例不準免亦著破格施恩將江蘇安徽所屬帶徵漕項銀四十九萬五千一百餘兩米麥豆十有四萬六千六百十有餘石內免徵各半欽此又諭頃者朕巡幸口外經過三河等州縣及永平府交界地方見今歲秋成豐稔米價稱平惟是去年雨水過溢田畝間被淹沒朕深加軫恤蠲賦平糶轉漕分振貧民使不至失所今者雖復有年然僅足支一嵗之用恐來年之輸將尚多難繼是必再沛恩膏始可大培民力著將順天永平兩府所屬大興宛平通三河密雲薊遵化順義懷柔昌平寶坻平谷豐潤玊田良鄉涿武清永清香河霸大城文安房山保定延慶盧龍遷安樂亭灤撫寧昌黎等州縣山海梁城等衛所康熙五十六年地丁銀二十六萬四千三百餘兩米豆高糧二萬一千六百餘石草九萬四千九百餘束通行蠲免所有屢年積欠銀九萬三百九十餘兩米豆高糧萬六千二百餘石草八萬四千四百餘束亦並與蠲除欽此又諭大兵屯駐西邉一切軍興徵繕皆動支正供帑項不使纍及閭閻而轉輸挽運陜西百姓勉力急公勞苦實堪憫恤又莊浪等處地震隨經遣部院堂官星馳前往拯濟而用兵之後宜格外加恩用綏黎庶將陜西巡撫甘肅巡撫所屬各府州縣衛所錢糧除米豆草束外其康熙五十八年應徵地丁銀一百八十八萬三千五百兩有奇並纍年積欠銀四萬七百兩著一槩蠲免欽此又奉旨甘肅巡撫所屬康熙五十三四五六等年民間舊欠銀米草豆著盡行豁免五十九年諭沿邉數處師旅屯駐一切雖皆支用正帑而協辦轉輸行齎居送之事民力勞瘁曽將陜西甘肅巡撫所屬康熙五十八年額徵地丁銀一百八十八萬餘兩屢年舊欠銀四萬餘兩悉行蠲免而沿邉各州縣衛所軍行既多飛挽之勞辦賦復滋催科之擾若非格外加恩黎民恐致失業所有沿邉一帶陜西延安府屬府谷神木等六十八州縣衛所堡康熙五十九年應徵銀米豆草悉宜蠲免但目今繫有軍務之時除米豆草外將五十九年額徵銀九萬八千一百兩有奇盡行蠲免欽此又諭邇年因西陲用兵師行糧從雖芻束悉支正供絲毫無擾民間然轉輸必須民力勞苦宜恤曽將康熙五十八年陜西甘肅所屬額徵地丁銀一百八十八萬餘兩並纍年舊欠銀四萬餘兩康熙五十九年沿邉各州縣衛所額徵銀九萬八千一百餘兩浹沛恩綸屢行蠲免近聞二年歉收民有艱於粒食者辦賦急公力何能支著將陜西巡撫甘肅巡撫所屬各州縣衛所除應徵米豆草外康熙六十年應徵地丁銀一百八十八萬三千七百四十四兩有奇通行蠲免欽此又奉旨延慶等五州縣米豆榖雜糧均著蠲免欽此又議準臺灣康熙五十七年額徵民番銀二萬一千二百兩有竒粟十有三萬八千九百石有奇盡行蠲免六十一年十二月諭古北口一路為我皇考每年行幸之地北路百姓效力有年今將宛平順義懷柔密雲平谷五縣昌平一州雍正元年應徵正項錢糧一萬四千三百八十兩盡行豁免欽此又諭陵寢一路此時正當修道之際亦宜軫恤今將大興三河二縣通薊遵化三州雍正元年應徵正項錢糧一萬三千三百兩有奇亦盡行豁免欽此雍正元年覆準宛平等十一州縣地丁房租核桃榛栗等項除已蠲銀二萬七千七百兩有奇其未蠲銀二萬一千七百餘兩一並蠲免又諭江蘇等屬康熙三十三年以前未完民屯地丁等項錢糧一百三十一萬餘兩內蘆課等項銀九萬八百兩有奇雖非恩詔內應行豁免之項但此事閲年最久倘行催徵窮民必致受纍著一并盡行豁免欽此乂諭江蘇等屬康熙三十四年以後積年民欠錢糧七百二十九萬六千餘兩外蘆課等項銀十有九萬二千七百餘兩雖不應蠲免但此事閲年最久若行催徵窮民必致苦纍著一並豁免欽此又諭江蘇蘇太等衛積年未完屯折銀二萬四百餘兩內存留俸工銀一千二百餘兩雖不應豁免但此事年久既稱實繫拖欠在軍著一並豁免欽此又諭江蘇等屬四十七年以後民欠三百五萬九千餘兩內地租等項銀六千八百餘兩雖不應豁免但此事年久實欠在民著一並豁免欽此又諭陜西自軍興以來大兵駐劄運送糧餉供支草豆無一不需民力原非他省可比所有康熙六十年以前陜西借給耔種著該督撫察明定議分年帶徵外其餘凡有民屯衛所實在未完銀米豆草悉豫蠲免欽此又諭恩詔議免各省錢糧部議舊欠銀米應準蠲免者自康熙十八年至四十五年止著加恩將五十年以前舊欠銀米等項均察明豁免欽此又議準四十五年以前積年民欠銀一千六百二十餘兩米麥一千九百餘石一并蠲免又覆準廣東海康遂溪二縣於雍正元年八月內海潮湧溢田地鹹氣未消三年之後方可耕種其雍正二年未完地丁銀悉豫蠲免又議準直隸霸州等七州縣所有未完銀三萬七千七百二十六兩有奇蠲免一半又覆準湖北咸寧蒲圻等縣衛蠲免本年錢糧六年諭免直隸七年分起運銀四十一萬七千八百餘兩欽此又諭免福建省康熙五十五年起至雍正四年民欠地丁銀三十三萬八千三百餘兩其有已徵在官者即照數留抵雍正七年本户正賦欽此七年諭浙省為財賦重地民力輸將朕所軫念今浙省自雍正二年以前未完舊欠以及六年未完錢糧士庶踴躍輸將實為浙省風俗稱慶著將雍正七年額徵地丁屯餉錢糧蠲免十分之二共計六十萬兩著該督遍行宣諭欽此又諭西藏苗疆皆已寧謐朕心嘉慰著將雍正八年甘肅四川廣西雲南貴州額徵地丁銀悉行蠲免其西安地方亦有備辦軍需之事地丁銀蠲免十分之三至應徵耗羡凡遇特恩蠲免錢糧者其耗羡仍行輸納若因水旱蠲免者不得徵收耗羡將此永著為例欽此又諭朕前見四川崇慶州士民好義急公是以格外加恩蠲除正賦今見撫臣陳奏知瀘州里民有背運軍餉之劬勞又有樂助倉儲之忱悃著照崇慶州之例將瀘州雍正七年額徵錢糧全行豁免其已徵在官者準抵八年額賦欽此又覆準蠲免錢糧將所免分數仍刋串票填寫某户免銀若干付花户收執又覆準雍正七年蠲免錢糧內有蔚州既改入直隸應蠲銀著照直隸州分數别行蠲免又諭山東廣東二省雍正八年地丁各免四十萬兩直隸陜西已各蠲四十萬兩雍正八年著再各免四十萬兩山西安徽亦著各免四十萬兩欽此又諭國家經費既敷宜藏富於民朕特降旨蠲免已多今次第舉行應及於江西湖北湖南三省著將雍正九年各蠲免四十萬兩直隸乃畿輔首善之地應沛殊恩山東今歲被水之州縣稍多朕心深為軫念著將九年直隸山東通省錢糧各蠲免四十萬兩欽此又諭甘肅地方雍正八年地丁錢糧已降旨蠲免其河西四府州縣及各衛所額徵糧草又經免徵朕念新歸內地番民願附版圗其地畝額徵本色糧草與河西等處亦應一例蠲除著將雍正八年河東之河州廰洮州衛歸德所河西之西寧府屬涼州府屬一應番民糧草悉加恩蠲免欽此又覆準蠲免四川明正土司折徵貢銀又諭甘肅地方年來備辦軍需百姓挽輸效力勤勞著將河東河西各屬民戶屯户及番民等雍正十年應徵各項銀糧芻草一槩蠲免若已經完納者凖作來年正賦欽此又諭甘肅所屬本年應徵地丁銀二十七萬九千三百餘兩仍行豁免欽此又諭雲南元江普洱兩府猓夷蠢動夫役頻煩之後恐小民輸將力有不逮著將元普兩府雍正十一年分額徵條銀並公件銀悉行蠲免欽此十三年諭湖南接近黔疆雇募夫役赴黔運餉者多繫沅州之民除已降旨加增價直用示恩恤外朕念沅民急公倍於他處著將沅州今年地丁錢糧全行蠲免若有已徵在官者準抵明年應徵額賦欽此是年九月諭直省錢糧於恩詔蠲免外將雍正十二年以前實在民欠者一并寬免從前江南積欠錢糧內有官侵吏蝕二項從民欠中分出者亦著照民欠例寬免欽此又奉旨皇考山陵正在興工之時由京城至易州經過地方如大興宛平良鄉涿房山淶水易等州縣凡修道應差諸事不免資於民力朕心軫念著將該州縣乾隆元年應徵錢糧加恩蠲免欽此又諭朕加惠元元將雍正十二年以前各省民欠錢糧悉行寬免誠以民為邦本治天下之道莫先於愛民愛民之道以減賦蠲租為首務也惟是輸納錢糧多由業户則蠲免之典大槩業户邀恩者居多彼無業貧民終嵗勤動按産輸糧未被國家之恩澤尚非公溥之義若欲照所蠲之數履畝除租繩以官法則勢有不能徒滋紛優然業户受朕惠者苟十捐其五以分惠佃户亦未為不可近聞江南已有向義樂輸之業户情願蠲免佃户之租者閭閻興仁讓之風朕實嘉悅其令所在有司善為勸諭各業户酌量寬減彼佃户之租不必限定分數使耕作貧民有餘糧以贍妻子若有素封業户能善體此意加惠佃户者則酌量奬賞之其不願者聼之亦不得勉強從事此非捐修公項之比有司當善體朕意虛心開導以興仁讓而均惠澤若彼刁頑佃户藉此觀望遷延仍治以抗租之罪朕視天下業户佃户皆吾赤子恩欲其均也業户沾朕之恩佃户又得拜業户之惠則君民一心彼此體恤以人和感召天和行見風兩以時屢豐可慶矣欽此又諭直隸州縣有旗退地畝及入官地畝由地方官徵收租項閲年既久拖欠頗多向雖不在恩詔蠲免之內然租銀與地丁名色不同其為民欠則一著將雍正十二年以前旗退地畝租銀租糧及入官地畝租銀租糧一並加恩豁免欽此又諭甘肅雍正十二年以前舊欠本色糧草悉行豁免欽此又諭四川口外番部輸誠急公良可嘉憫著將明正沈冷各土司所屬一年雜糧折徵銀並貢馬銀及口外新附各處認納折徵銀該撫察明確數通行豁免欽此又諭四川建昌松潘所屬涼山會川鹽源阿樹木坪各土番等本年米折條銀以及本色雜糧貢馬等項著通行豁免再普安安阜酉陽等處見在建造城垣皆資民力所有本年應納貢賦亦槩行豁免欽此又議準西安甘肅均有挽運軍需之事而甘肅尤屬總匯之區準將乾隆元年甘肅額徵地丁錢糧全行豁免西安額徵地丁錢糧蠲免一半乾隆元年諭浙江嚴州所屯糧照杭州前右二衛科則徵收以舒軍力水著為例欽此又諭甘肅乾隆二年錢糧全行蠲免西安等屬蠲免一半欽此二年諭年來經理山陵大事自京師至易州七州縣民人應差趨役勤慎可嘉著將乾隆二年額徵錢糧再行豁免欽比又諭凡遇蠲免皆以奉旨之日為始其奉旨之後部文未到之前有已輸在官者凖作次年正賦永著為令欽此乂諭廣西平樂營奉調兵丁借支庫銀及土田州出征兵丁借支製備冬衣銀均著豁免欽此又諭陜西寧夏府屬之寶豐新渠二縣招墾新户安業未久所欠雍正十三年額賦既因盡納舊欠致虧正項今又新舊並徵朕心深為憫念著將十三年以前舊欠悉行豁免欽此又諭直隸宣化永平等府屬未完地糧民欠槩與豁免旗退地畝所有入官地畝租銀租糧民欠一并豁免欽此又題準陜西西安等屬雍正十年未完額徵屯糧及存留銀草並十二年未完存留屯銀牙稅學租屯糧更名銀糯米折價銀七五耗羡等項又西安漢中榆林等府鄜綏等州屬十二年未完額外銀糧耗羡等項又潼關縣首報屯地銀糧草又靖邉縣雍正三年至八年未完糧及長安縣雍正六七八等年民欠糧均遵奉上諭雍正十二年以前各省錢糧實欠在民者一並寬免又題準陜西寧夏府之新渠寶豐二縣額徵糧料準其豁免又涼西等處番民額徵糧草皆照屯地科則免三分之一又題準陜西甘肅額徵匠價銀如遇蠲免年分準其一例蠲免四年諭蠲免直隸本年錢糧九十萬兩江蘇百萬兩安徽六十萬兩並將所蠲正賦之耗羡一槩免徵欽此又諭陜西榆林一帶地土寒薄居民貧乏自雍正十二年至乾隆二年所借倉糧甚難輸將著將此十一州縣民借未完之常平倉榖悉行寬免欽此五年諭山東蒲臺縣地畝向因科則互異於雍正十三年題明丈出薄地並闕額荒地其應減應除之賦已經豁免惟是瘠薄改則地內未完銀因繫舊欠不應豁除尚在催追朕念窮黎艱於輸納著加恩一槩豁免以紓民力欽此六年諭朕初次行圍經過地方本年應徵額賦酌量蠲免十分之三欽此又諭準噶爾來使進藏熬茶曽令那克舒三十九部落豫備馬匹毫無違誤黽勉奉公甚屬可憫著加特恩將本年應納錢糧寬免欽此七年諭甘肅所屬涼州府之栁林湖肅州之三清灣柔逺堡毛目城雙樹墩九壩等處各屯户舊借牛具口食銀例應如數催徵完納朕思此等屯户原繫招徠窮民素無蓄積著加恩全行豁免欽此又諭甘肅涼州西寧二府所屬之武威平番永昌古浪西寧碾伯等六縣三年帶徵銀著令全行豁免欽此八年諭直隸雍正十二年以前民欠錢糧已於恩詔內寬免惟望都靜海冀武邑四州縣民欠米榖經部議繫出借之項不在寬免之例朕思此項閲年已久尚事追呼小民未免苦纍著一例加恩豁免欽此又諭盛京户部莊頭每年交納倉糧今朕恭謁祖陵親詣盛京軫念各莊頭終嵗勤苦輸將無誤著將八年分應交倉糧加恩寬免再各莊頭尚有七年分未完米豆草著核明一並豁免欽此又諭護送準噶爾來使進藏滿洲官兵馬匹牲畜經那克舒三十九部落番子各出馬匹牲畜豫備妥協此次雖未用所備馬匹牲畜但此等番子居處極邉急於公務甚屬可憫特加恩將明嵗應納錢糧蠲免欽此九年諭甘肅所屬之涼州府栁林湖肅州之三清灣柔逺堡等處及口外安西沙州栁溝布隆吉等處屯田民人開墾之始借有牛具口食銀未完朕前已降旨豁免惟肅州屬九家窰一處當時未經議及尚在帶徵著將九家窰未完牛具銀一例加恩豁免欽此十年諭我朝列聖相承深仁厚澤無時不加意培養元元以期家給人足百年以來薄海內外物阜民康共享升平之福朕臨御天下十年於茲撫育蒸黎民依念切躬行儉約薄賦輕徭孜孜於保治之謨不敢稍有暇逸常守節用愛人之訓凡以為民也今寰宇敉寧既鮮糜費之端亦無兵役之耗是以左藏尚有餘積數年來直省偶有水旱朕加恩振濟多在常格之外如前年江南被水撫綏安插計費帑金千餘萬兩凡此皆因災傷補救而沛恩澤者朕思海宇乂安民氣和樂持盈保泰莫先於足民況天下之財止有此數不聚於上即散於下仰惟我皇祖在位六十一年蠲租賜復之詔史不絶書又曽特頒諭旨將天下錢糧普免一次我皇考旰食宵衣勤求民瘼無日不下減賦寬徵之令如甘肅一省正賦全行豁免者十有餘年朕以繼志述事之心際重熙纍洽之候欲使海澨山陬一民一物無不均沾大澤為是特降恩旨將乾隆十一年直省應徵錢糧通行蠲免欽此經大學士等議準各直省除蘆課漕項例不蠲免外其地丁錢糧額銀共二千八百二十四萬餘兩將直隸奉天江蘇福建西安甘肅四川雲南貴州等省地丁錢糧共千有四十二萬九百餘兩於十一年全行蠲免河南安徽浙江廣東廣西等省地丁錢糧共八百六十二萬七千三百餘兩於十二年全行蠲免山東山西江西湖廣等省地丁錢糧共九百十有九萬二千二百餘兩於十三年全行蠲免又諭向來蠲免錢糧例止地丁而糧草不在其內惟是甘肅地處邉隅所徵地丁少而糧草多其臨邉各屬十一年應徵番民糧草著格外加恩蠲免再河東河西額徵屯糧及草亦著蠲免三分之一欽此又諭福建乾隆十一年地丁錢糧已全行蠲免惟是臺灣府屬一廰四縣地畝額糧向繫徵收粟榖今內地各郡既通行蠲免而臺屬地畝因其編徵本色不得一同邀免非朕普遍加恩之意著將臺灣府屬一廰四縣十一年額徵供粟十有六萬餘石全數豁免欽此又諭四川民番雜處賦糧不一有徵收米豆雜糧者有認納貝母青稞折徵米糧者其各廳營上司又有番民認納夷賦銀及按例完納本折貢馬等項皆與應徵地丁無異朕思該省乾隆十一年地丁錢糧業已全數蠲免而各民番土司所輸因非條糧不能普沾惠澤著加恩將十一年寧逺敘州二府屬州縣衛所建昌鎮標各營應徵米豆龍安府茂州松潘鎮營所屬番寨折徵米榖雷波黃螂苗民認納本色雜糧建昌鎮標會川會鹽南坪打箭爐各廰營新撫各土司番民認納夷賦銀各土司完納本折貢馬等項一槩蠲免欽此又諭雍正十一年瓜州安插回民開墾地畝渠夫借給牛價口糧例應分年交納因邉民寒苦尚有未經還項者著照安西等處屯戶未完之例開恩豁免欽此又奏準陜西西寧所屬玉樹等族並暫隸西藏管轄納克舒番衆人等應納馬貢入於乾隆十一年四川陜甘蠲免一年之例一并蠲免又諭各省蠲免正賦之年若有未完之舊欠仍按期帶徵則民間猶不免追呼之擾著一并停其徵收展至開徵之年令其照例輸納至於有田之家既邀蠲賦之恩其承種之佃户亦應酌減租糧使之均沾惠澤著該督撫轉飭州縣官善為勸諭感發其天良歡欣從事則朕之恩施更為周普均照雍正十三年十二月諭旨行欽此十一年諭朕愛育黎元特降諭旨將直省錢糧輪年通免均沾惠澤所有浙江溫台府屬玉環山海寧縣大亹中小亹開墾田地銀穀與腹內地丁無異因給佃承種名為租穀租銀是以不在所蠲之內彼邊海地瘠民貧自當一視同仁乾隆十二年該省輪免之期著將此項一例蠲免欽此又諭此番征勦瞻對四川各土司承辦軍糧莫不踴躍從事甚屬可嘉該土司等本年應納貢賦已經普免今軍務告竣著再加恩將打箭爐口內口外效力之各部番衆應納貢賦再蠲免二年欽此又諭直隸通省今年應徵地丁錢糧已加恩全行蠲免固安霸州二防守尉所轄屯糧例不在蠲免之內但朕念耕種屯田之旗户按畝輸穀在縣交納與民田正賦相同著將固安霸州二防守尉本年應徵屯糧穀一例加恩蠲免欽此又諭朕普免天下錢糧奉天本年繫輪蠲之嵗各省定例止蠲地丁銀米豆不在應蠲之例但奉天地丁錢糧向來銀糧並徵其額徵米豆即繫正賦著將奉錦二府十一年應徵米豆一例加恩蠲免欽此又諭朕巡幸五臺凡有供應皆動支正項惟是安營除道未免有資民力且五臺繫初次駐蹕宜沛恩施著將該縣乾隆十二年應徵地丁錢糧蠲免十分之三欽此十二年諭朕嘉惠黎元輪免天下正供山西通省地丁應於十三年全免惟該省太原平陽潞安寧武澤州蒲州六府遼沁平欣代保解絳八州及歸化城所屬有額徵本色米豆穀麥以供兵餉例不蠲免但此次特沛恩施亦應量加愷澤得以均沾著將太原等府州應徵本色酌免十分之三其大同朔平二府地處邉瘠頻年歉收著全行蠲免欽此又諭朕普免天下錢糧今嵗繫河南輪免之年聞該省之開封歸德彰德懷慶河南南陽等府有灘地官莊官地義田四項租課因非地丁正賦不在蠲免之內著加恩蠲免十分之三欽此又諭朕普免天下錢糧今嵗繫廣東輪免之年廣韶等府州屬向有應徵官租及屯田曠軍餘羡等項銀錢米穀並應徵學租因非地丁錢糧例不蠲免著將此項租銀錢米穀加恩蠲免十分之一欽此十三年諭朕時邁東巡前詣闕里至於岱宗舊典聿修明禋肇薦東省本年錢糧見已普免因思曲阜泰安歷城鑾輿駐蹕之所也著將三縣乾隆十四年應徵地丁錢糧全行蠲免俾小民均沾厚惠欽此十五年諭朕恭謁祖陵所過京東州縣田中收穫之象較往年似覺歉薄大抵因夏秋兩水過多是以不能盡獲豐稔今所見如此則前塗亦大略相似朕時巡省方輿蹕所至民依念切雖成災之處已照例振恤即不成災處所當薄收之年亦時為軫念向來臨幸地方應徵錢糧皆按分蠲除此次經過直隸州縣其實未被災仍屬豐收之處按照舊例蠲免十分之三若歉收之所著加恩蠲免十分之五該督速察明分别奏聞照例辦理欽此又諭朕恭奉皇太后西巡五臺塗經畿輔念宿麥含滋正值發生之候業已特頒諭旨戒飭一應扈從人貟車馬無得踐踏但時當舉趾所至地方除道安營不免有需民力著照上年秋間木蘭之例直屬經過州縣本年應徵額賦蠲免十分之三該督即行詳細確察妥協辦理務令民沾實惠以副朕軫念耕氓至意欽此又諭朕巡幸五臺一切供應皆動支正項不令絲毫擾纍閭閻惟是經過地方安營除道未免有資民力著將本年應徵地丁錢糧蠲免十分之三欽此又諭朕巡幸嵩洛一應供頓皆動用正項絲毫不以纍民惟是安營除道未免有資民力直隸所經之地已降旨照例蠲除所有河南經過地方著加恩蠲免錢糧十分之三欽此又諭此次巡幸河南省方問俗所至推恩尤念祥符為省會之區登封實望秩之所鑾輿駐蹕宜沛優施著將該二縣乾隆十六年應徵地丁錢糧全行蠲免俾愷澤均沾以愜小民近光之願欽此十六年諭朕巡幸江浙問俗省方廣沛恩膏聿昭慶典更念東南貢賦甲於他省其纍年積欠錢糧雖屢準地方大吏所請分别緩帶以紓民力而每年新舊並徵小民終未免拮據朕宵旰勤勞如傷在抱茲當翠華臨蒞倍深軫恤用普均沾之澤以慰望幸之忱著將乾隆元年至乾隆十三年江蘇積欠地丁銀二百二十八萬餘兩安徽積欠地丁銀三十萬五千餘兩悉行蠲免俾官無罣誤民鮮追呼共享升平之福夫任土作貢歲有常經自應年清年款江蘇積欠乃至二百二十餘萬之多催科不力有司實不能辭其咎而疲玩成習豈民間風俗之澆漓尚有未盡革歟朕以初次南巡故特加恩格外嗣後該地方官務宜諄切勸諭加意整頓其在小民亦當湔除舊習勉效輸將勿謂曠典可希冀屢邀而惟正之供任其逋負也其浙江一省雖額賦略少於江蘇而節年以來並無積欠豈犬牙相錯之地不齊乃至是歟此具見浙省官民敬事急公之義而江蘇官民所宜懷慙而效法者也朕甚喜焉著將本年應徵地丁錢糧蠲免三十萬兩以示鼓勵各該督撫其仰體朕惠愛黎元之意嚴飭所屬實力奉行使閭閻咸沾實惠倘有不肖官吏以完作欠希圗侵蝕察出即行糾參從重治罪欽此又諭朕上年巡幸嵩洛問俗省方清蹕所經已疊沛恩膏彰行慶施惠之典而該省紳民踴躍急公就瞻恐後其歡欣鼓舞之誠不惟無怨而益肫至今猶為繫念所宜再沛恩施者也其河南省乾隆十四年以前積欠帶徵緩徵錢糧三十五萬餘兩著再加恩槩行蠲免俾該省小民催科不擾益宏樂利之休該撫務董率有司實力辦理使閭閻均沾實惠欽此又諭朕南巡江浙經過畿輔雖一應供頓皆令動支公項而安營除道未免有需民力朕心深為軫念著將直屬所過州縣本年應徵額賦蠲免十分之三欽此又諭朕南巡江浙道出靑齊該省去臘以來雪澤沾足麥秋豐稔有望雖一應安營除道皆由官辦而當茲春融土潤正當有事西疇朕省方問俗念切閭閻著將經過山東州縣本年額賦蠲除十分之三欽此又諭朕愛養黎元惟恐一夫不獲時巡所至疊沛恩膏前已降旨將江南民賦積欠悉行豁免更念兩淮竈户僻處海隅専以煎鹽曬鹽為業且生計更窘於農民殊深軫切所有乾隆二年至十四年因災停緩帶徵各未完折價共銀四萬二千餘兩著加恩照民户例一例豁免俾斥鹵編氓咸沾實惠欽此又諭甘省積年民欠未完銀二十三萬七千餘兩未完糧百萬四千餘石往往舊欠未及清償正額又成積欠歲有徵催之名而無輸將之實經朕傳諭該督撫籌辦今據奏此內有究出胥役侵蝕之項見在治罪勒追至民欠繁多量請停緩設法清釐等語朕念甘肅民力拮據自非腹地可比著加恩將該省自乾隆十一年至十四年銀糧分作五年帶徵如有見準部文帶徵者仍照原限辦理其乾隆元年至十年舊欠銀糧槩豫豁除該省士民倍應感朕格外之恩急公輸納該地方官亦須實力整頓使年清年款不得任其仍蹈故習冀殊恩之可以屢邀也欽此一免科順治元年定明季加派三餉及召買津糧槩豫豁除三年覆準直隸任邱縣鹹水浸地賦稅無出照數豁免四年覆準江南淮徐荒地無主者錢糧全免有主者量免額賦三年漕米一年七年覆準免湖廣蘄州麻城羅田蘄水黃梅黃岡等縣五六年分荒田額賦八年覆準免直隸安州芝麻棉額解銀又覆準免山西朔州渾源州大同縣無主荒地一萬三千四百九十頃錢糧仍令有司招人開墾按年起科又覆準免山西荒地一萬五千頃額糧又議準西安鳯翔漢中延安四府興安一州有新荒民屯廢藩地畝及從前揑報民丁所徵銀三萬七千三百九十餘兩糧千二百八十餘石悉行豁免九年覆準陜西莊浪西寧肅州所屬故絶拋荒並水淹沙壓地畝額徵糧草悉豫豁免十一年覆準減江西瑞州袁州二府浮糧康熙元年覆準江南海州近海居民遷移內地所遺田糧準豫豁免二年覆準廣東福建遷移沿海田地無徵銀米悉豫豁除九年覆準江南淮屬邳海宿沭四州縣揚屬通泰二州坍塌入水地畝令勘明永免十年覆準河南陜州等處包荒銀及江南臨淮縣古荒地靈璧縣包荒地準豫豁免又覆準湖南各官揑報墾荒希圗紀録以至百姓包賠錢糧世受其纍令察明悉豫豁免十三年覆準江南丹徒金壇二縣田地有坍入大江者準豫永豁二十六年恩詔自康熙十三年以後加增各項雜稅該部察明豁免二十七年覆準江南丹徒縣康熙十八年以後坍卸入江田畝將錢糧豁除二十九年諭朕近見廣東高州瓊州等府所屬州縣地丁各項錢糧纍年每致逋欠如果因丁闕地荒不能輸納該督撫將實繫户口稀少田畝荒蕪徭賦無從辦納州縣積年所欠錢糧數目詳晰察明具奏欽此遵旨議定廣東高州府屬吳川縣瓊州府屬臨高澄邁二縣自康熙十八年起至二十八年止未完地丁銀十有二萬八千六百兩有奇米四千六百石有奇實繫户口稀少田畝荒蕪徭賦無從辦納照數悉行豁免三十年覆準江南睢寧縣坍廢地畝及闕額丁銀自康熙三十年為始槩豫豁免從前舊欠並免追徵又覆準豁免江南通州海門鄉坍江田地正賦銀四百九十二兩米麥百二十石三十一年覆準雲南鄧川州水衝石壓田畝不能開墾銀米永行豁除三十四年覆準山西津榮河二縣衝卸入河地畝錢糧永行豁免三十八年覆準浙江鄞縣潮水衝沒田地千有七十餘畝錢糧悉準豁免三十九年覆準浙江鄞縣十一都三圗近海田地舊有塘閘禦湖蓄水自順治十七年衝沒未建田地被水淹沒每年應徵銀永豫豁除四十九年覆準免江南荒地銀五十二年覆準免江蘇等屬荒地銀五十三年覆準浙江奉化縣水衝田地無徵錢糧悉行豁免六十一年十二月諭朕惟治安天下欲兵民並得其所必以敷恩減賦為要比年以來策妄阿喇布坦狂逞逆命發師致討四川陜西官兵經由險道往返萬有餘里甚屬勞苦朕深憫念其倒斃駝馬價銀及口外沿塗與西藏留駐兵丁續補駝馬價銀著悉免追賠又西陲軍興以來民間急公趨事應付差役實厪朕懷聞陜西甘肅二屬各州縣衛所地丁銀每錢額外徵收三釐米每斗額外徵收三合以為偹荒之用此項徒有加賦之名而無振濟之實著自雍正元年為始將額外徵收銀米永行停止如有舊欠亦悉豫豁免欽此又諭京師琉璃亮瓦兩廠官地每月按間計檩徵租相沿已久朕念兩廠多繫流寓賃住揭本經營之民情可憫惻嗣後止徵地租免其按間計檩逐月輸納欽此又覆準將宛平等縣一應地丁雜賦等項通行豁免雍正二年覆準浙江仁和等十一州縣水衝沙地無徵銀八十一兩三錢免其徵收又覆準江西南昌府屬之南昌新建豐城進賢奉新寧靖安七州縣浮糧銀七萬五千五百四十九兩有奇自雍正三年為始悉豫豁免三年諭朕仰體皇考愛民寬賦之盛心將蘇州府額徵銀蠲免三十萬兩松江府額徵銀蠲免十五萬兩著為定例俾黎民輕其賦稅官吏易於催科可飭令地方官知之欽此又覆準江南丹徒縣濵江坍沒民屯田地共一百八十一頃二十三畝有奇應輸錢糧永行豁除又覆準福建臺灣鳯山縣上淡水下淡水等八社自康熙十九年平定照舊額徵收丁賦番婦每口徵穀二石於康熙二十五年入於臺灣奏銷册內今將鳯山八社番婦一千八百四十四口折納穀三千六百八十八石自雍正四年為始照諸羅番婦一例免其納賦四年覆準河南祥符縣被河水衝決田地難以耕種將每年額徵地丁漕折等銀及康熙六十年六十一年雍正元年二年三年未完民欠地丁等銀槩行豁免五年諭各省之中賦稅最多者莫如江南之蘇松二府浙江之嘉湖二府考四府賦稅加重之由蓋始於明初籍富民之田以為官田按私租以為正賦此洪武之刻政也明二百餘年減復不一我朝定鼎以來仍照明例徵收蓋因陸續辦理軍需經費所在未便遽然裁減皇考聖祖仁皇帝常論及此雍正三年朕仰體皇考聖心已將蘇松二府額徵浮糧豁免今特沛恩膏將嘉興府額徵銀四十七萬二千九百餘兩著減十分之一計免銀四萬七千二百九十餘兩湖州府額徵銀三十九萬九千九百餘兩著減十分之一計免銀三萬九千九百九十餘兩共二府免銀八萬七千二百八十餘兩永著為例欽此六年覆準陜西西鄉縣六十一年無著浮糧銀千二百三十九兩九錢有奇準其豁除七年諭湖南武陵縣宿郎堰逼近洞庭下流淹沒田地著將每年額賦三百二十四兩有奇悉行豁除欽此九年題準福建鳯山縣鄭宗明等官莊園地被水衝陷自雍正四年起每年闕額無徵銀一百二十八兩有奇又王莊李進等莊自雍正七年起每年闕額銀五十九兩有奇悉準其豁免十年覆準福建寧洋縣鐡爐稅銀百二十兩久屬有額無徵於雍正九年起準其豁免又諭朕聞淮安府阜寧縣屬射陽湖地方於雍正五年題升淤地八千一百餘頃升租銀四千餘兩又康熙五十九年丈量射陽湖北岸灘地案內升地四百餘頃應升銀一百七十兩皆繫有糧無地小民賠纍難堪向來積欠纍纍從未清完甚屬纍民著將前項升地八千六百五十頃四十九畝零租銀四千二百六十一兩有奇悉行豁除以蘇民困欽此又覆準江蘇淮揚徐等屬開河築隄揠廢民屯田地豁除銀五千三百兩有奇又覆準陜西武功縣水衝民屯地額徵糧八石五斗一升有奇折色銀五十三兩七錢有奇地去糧存軍民賠纍準豫豁除乾隆元年諭江蘇淮安府屬之桃源縣徐州府屬之宿遷縣睢寧縣沿河地畝淹涸靡常雍正五年涸出睢寧縣報升地五千三十九頃宿遷縣報升地四千七十二頃桃源縣報升地三千八百四十二頃嗣蒙世宗憲皇帝以淤地勘報不實令河臣會同督臣委官察勘共豁地七千二百餘頃萬民感頌存地五千七百餘頃照各縣成例折算實地三千五百餘頃科則亦經減輕其潼安一衛裁汰改歸州縣徵收乃比年以來仍催徵不前蓋此淤出之地畝即舊有之糧田是以民力維艱輸將不繼也朕既洞悉其中情事自當加恩開除以紓民力著將宿遷睢寧桃源三縣見存新淤涸復改科地糧額徵銀六千五百四兩全行豁免其雍正十三年淤地未完錢糧亦免徵收至水沉地畝仍照例每年冬勘欽此又諭朕聞安徽所屬之泗州地勢極低凡虹縣桃源之水皆歸入泗州安河入洪澤湖舊存淤地千二百七十四頃入額升科此等淤地即在安河兩岸每年淹涸靡常收成無定著將泗州安河兩岸重糧水淹淤地額徵銀千二百二十二兩三錢麥百有十石八斗自雍正十三年為始盡豫豁免欽此又奉旨河南鄭州臨河之姚店等堡地方鹻鹵地糧準豫豁除又奉旨山東郯城等二十八州縣衝壓地畝地丁米麥悉行豁免又諭山東章邱縣揑報墾荒地畝相沿已久著將已攤入地畝者於乾隆元年核明開除免其徵收其未攤入地畝者自雍正十三年起悉行豁免欽此又諭豫省祥符等四十二州縣所有鹽鹻飛沙河坍水占荒廢地畝既據該撫確勘奏聞著將額賦永逺豁除欽此又題準直隸吕家灣等處有糧無地之項及糧存人亡水衝沙壓並沙石不堪耕種荒地共九頃六畝零應徵之糧準其豁除又覆準甘肅狄道縣闕額地糧並有額無徵各項賦銀悉與豁除又覆準河南滎澤縣地臨黃河莭次坍塌無著地該銀千二百十有二兩六錢二分有奇無著耔粒河地該銀百有七兩六錢三分有奇準豫豁免二年諭江蘇阜寧鹽城二縣有濵河地畝淹涸靡定有司誤報升科小民納賦甚覺艱難著督撫確核地畝額徵銀數悉行豁免其從前未完之舊欠一並赦除欽此奉旨江蘇高郵等五州縣隄工民房租銀永行豁除又題準欽奉恩詔內開蘇松浮糧前已蒙世宗憲皇帝諭旨裁免四十五萬兩以紓民力但江省糧額尚有浮多之處著再加恩免額徵銀二十萬兩該督撫確勘詳核務使均勻欽此遵旨減免浮糧悉照雍正三年例辦理將蘇松太二府一州並崇明昭文二縣劃分通州沙地共免浮糧二十萬兩又題準豁除山東商河縣鹻鹵不毛之官莊地畝銀五百十有二兩七錢三分有奇又議準甘肅河西各屬州縣衛所隨徵馬糧萬餘石自乾隆三年為始準豫豁除三年覆準四川射洪等六縣被水衝沒地畝所有應徵糧銀永行豁免四年諭雲南勳莊變價一案尚欠銀千八百二十九兩有奇此項田屢被水衝沙壓難以耕種承變各户逃散無可著追頗為地方之纍著將應徵銀準豫豁免欽此又題準西安同州鳯翔三府咸寧等十九州縣實在水衝民屯等地及莊基六十四間其應徵銀糧準其照例豁除又題準江蘇常州府武進陽湖二縣役田原繫明季該省巡撫捐銀買田每畝别收租銀以抵白糧水腳之用後歸入白糧經費裁存項下充餉在當日止令民間領價認租並無開報田地邱段於是遂有無田領價及有田私賣以致日久無著準其全行豁除以蘇民困五年題準河南中牟封邱等十四州縣鹽鹻沙積水衝隄壓地畝額賦及鄭州前項地户屢年積欠銀米一並豁除六年覆準湖南湘鄉臨武二縣水衝闕額地畝條餉等銀永行豁免七年諭甘肅一省從前屢次軍需凡供億經費大端皆已核算奏銷完結惟部駮察核各款尚有未楚者如寧夏則有康熙三十年至三十八年供應進勦大兵及駐劄滿漢官兵喇嘛等案肅州一路則有康熙五十四年至雍正四年辦過軍需各案又有康熙五十四年至雍正十三年供支出口官兵馬駝鍋帳食物等案西寧一路則有康熙五十四年至雍正六年辦過軍需各案又有康熙五十四年至雍正十三年供攴出口官兵馬駝鍋帳食物等案又有雍正元年勦撫西海用過錢糧等案陜甘二提涼寧肅三鎮則有康熙五十四年至雍正元年牧養馬駝各案以上諸件事閲多年官經數易往返駮詰不但案牘紛繁地方滋擾且使已故之員纍及子孫見任之員代人受罰朕心不忍用是大沛恩膏將康熙三十年至雍正六年以前未清之項悉豫豁除至雍正六年以後之案尚易清理著督撫於一年限內秉公確核其中應免不應免者一一分别造册具疏保題欽此又題準河南洧川等十一州縣河塌沙壓地一百四十七頃每畝攤銀不等內應豁漕米銀準其照數豁除又題準浙江錢塘縣勘實水衝沙壓難墾田地二頃七十五畝五分無徵起運地丁銀二十九兩六錢七分新加蠟茶銀五釐四毫南米一斗七合八勺以上無徵銀米於乾隆六年為始免徵豁除八年諭朕聞浙江溫台二洋為漁船採捕之所從前玉環未經展復以前凡漁船被汛兵需索陋規無異私稅後因展復玉環地方官恐經費無出遂將陋規改收塗稅此一時權宜之計也朕思濵海編氓以海為田每嵗出沒於波濤之中捕魚糊口生計淡薄應加軫恤著將此項永逺革除免至不肖官辨丁役苛刻需索擾纍貧民欽此又覆準湖北興國黃岡二州縣山水衝壓田地難以墾復應徵銀糧自乾隆八年為始照數開除九年題準陜甘等處軍需自雍正六年以後所有應行豁免者悉豫豁免又覆準四川成都等三十四州縣本年六月被水衝決成河地畝難以墾復共上中下田一百九十六頃二十四畝零應徵丁條糧銀一百七十六兩七分有奇悉準開除永免輸納又被水衝沒碾榨磨共十有九座每年應納課銀四兩五錢六分亦準豫開除十年覆準江西樂平德興玉山宜黃等縣山水衝坍田地不能修復共九頃六十六畝二分應徵地丁銀四十一兩一錢四分九釐漕項正腳銀三兩七錢六分有奇漕糧三十五石一斗五升三合有奇兵米三石九斗五升七合有奇自乾隆九年為始悉準其豁除又覆準陜西郃陽縣乾隆八年七月被水衝塌地二十七頃九十畝五分應徵本色糧七十七石二斗有奇折色均銀百有二兩五錢九分有奇準其豁除十一年諭直隸慶雲縣土瘠民貧連年荒歉朕心深為軫念著將慶雲縣每年額徵地丁銀豁免十分之三永著為例欽此又諭廣東瓊州府屬牛薪等項稅銀內有無著者加恩永行豁免欽此又題準福建閩侯官等八縣無著漁課銀分别豁除又題準浙江雲和縣坑爐稅銀自乾隆十一年起準豫豁除又題準江蘇城租向繫居民在沿城基地蓋房賃地輸租茲因屋坍民遷地勢低窪不堪棲止租闕無著又折穀無徵銀向繫州縣自理辭訟問罰抵辦今奉定例不許濫罰均繫有款無徵官民苦纍與乾隆五年原奉諭旨相符以乾隆十一年為始準其槩豫豁除十二年諭乾隆十一年分直省額徵地糧朕已普行蠲免其天津所屬有葦漁課銀一項向來攤入地糧完納著加恩一例豁除俾瀕海小民均沾恩澤欽此十六年諭朕聞常州府屬之武進陽湖二縣開抵役田租銀一項原繫前明時虛田領價後因夲户逃亡株連親族各將已産開抵實非前明原置之田亦非當日領價之户小民條糧役租力難並輸以致積年拖欠朕省方所至民隱勤求清問既周倍深軫念著將武進陽湖二縣開抵役田除應辦條漕仍照民田一例完納外其新舊租銀槩豫豁免以除民纍欽此又題準浙江淳安縣於乾隆十五年早禾被水衝淹沙石壅漲計田二頃六十三畝應徴地丁銀二十六兩二錢米一斗二升各有奇勘明實難墾種應照數豁除又題準陜省吳堡縣地三十八畝隸於葭州自前明撥入吳堡完糧佃於葭民耕種今據葭吳二州縣會勘被水衝塌地七畝應徵本色糧二斗五升五合折色糧七升四合糧折銀二錢一分九釐各有奇又官學糧折銀四分草十斤四兩丁匠均徭共銀一分九釐各有奇均準其豁除又題準浙江臨海瑞安二縣於乾隆十五年秋禾被淹衝塌地十有一頃二十四畝應徵地丁銀六十二兩一錢米二十五石三斗各有奇勘明實難墾種應準豁除十七年議準甘肅狄道等十五州縣乾隆十六年夏秋二禾被雹被水案內平涼縣被水衝陷地二十九頃四十一畝應徵銀四百九十兩三錢糧九百三十六石四斗番糧三十二石八斗草千八百九十一束均準其豁免十八年題準浙江仁和縣場乾隆十七年被水坍沒沙地四十四頃八十畝應徵銀二百六十一兩二錢有奇準豫豁除又議準浙省東江場周西團四甲竈地坍缷草蕩五十一畝四分八釐灘場四十九弓三尺七寸七分應徵正課銀五兩八錢八分四釐滴珠銀五分八釐車腳銀四分一釐各有奇自乾隆十八年為始停其徵收又題準安屬太平縣水衝田四十一頃九畝七分三釐應徵銀二百九十六兩四分八釐漕南米一百三十三石六斗一升三合南豆二十四石五斗九升一合各有奇準其豁除又題準福建臺灣於乾隆十五年六七八月猝被風潮衝陷難以墾復田園五百四十九甲八分有奇共無徵粟一千九百八十石七斗二升勻丁銀三十八兩二錢一分官莊銀百兩一錢五分又衝陷糖廍三張半共無徵廍餉銀十九兩各有奇自乾隆十八年為始均豫豁除又題準直屬四旗通判及熱河八溝同知所管地方於乾隆十六年秋被水災衝壓地共四十六頃五十二畝無徵銀一百十有三兩六錢有奇應準開除又題準東省官臺西由二場及平度掖二州縣民佃竈地於乾隆十六年被潮鹹廢地共四百二十頃四十四畝三分五釐額徵地丁銀四百三十八兩五分有奇準其豁免一除役順治元年題準各旗壯丁差徭糧草布匹永停輸納二年覆準江南丹徒丹陽二縣明末加派馬折銀悉豫豁除七年議準免江南桐城潛山太湖宿松休寧句容等縣逃丁荒地額賦康熙十二年議準停止河南僉派河夫如遇歲修準動河道銀雇募每夫月給銀二兩十六年覆準禁止有司派罰百姓修築城樓垜口二十三年諭東巡經行山東江南各州縣衛所丁銀曲阜縣地丁銀悉行蠲免欽此二十八年題準江寧民間鋪面歲輸房號廊鈔等銀悉行豁免五十二年恩詔嗣後編審增益人丁止將滋生實數奏聞其徵收辦糧但據五十年丁册定為常額永不加賦五十四年直省社倉勸輸之例富民能捐榖五石者免本身一年雜派差徭有多捐一倍二倍者照數按年遞免雍正二年覆準凡督撫提鎮及有屬員之官到任其屬員派纍兵民修理備辦及州縣守禦等官到任其屬下人役鋪設修理派及兵民者均嚴行禁止再不肖之官指稱修飾衙署等派纍兵民者該上司即行據實指名題參文職照科斂律武職照剋扣律治罪如該上司徇庇或勒令屬員修理衙署發覺之日將該上司一並交部分别議處又議準直隸各省督撫各該屬員署內遇有官事所用工料什物將設立總甲出票官買派工伺候之處嚴行禁止務照時價給與鋪户工役倘有不肖官員肆行科派擾纍小民者該管上司即指名題參從重治罪如該上司隱匿徇庇不行題參或别經發覺或被旁人首告或被科道糾參將該管上司一並交部議處八年諭新設永順一府所屬永順龍山保靖桑植四縣火坑鋤頭煙户等名色錢一槩刪除令該户自行開報開墾地方官給以印照永為世業欽此十三年十二月諭山西大同偏關老營水泉三汛兵丁交納徭銀向在餉銀內扣交每年徵銀六百八十兩有奇著自乾隆元年為始將此項蠲除永著為例欽此又諭江南太平縣雜派江夫河篷錢糧永行免納欽此乾隆元年諭朕聞康熙五十七年甘肅伏羌通渭秦安會寧等縣及岷州衛有地震闕額丁銀著該督察明即行豁除欽此又諭將湖北江夏等十九州縣未經攤減之丁銀八千三百兩有奇自乾隆二年為始全行豁免欽此又諭免江南長江一帶網户鰣魚折價銀永著為例欽此又諭四川松潘鎮屬番寨按年輸納正賦外各鎮將衙門不得絲毫科斂欽此又覆準陜西富平縣水衝民地十有九頃十有八畝六釐應徵折色均徭銀一百八十七兩三錢有奇準豫豁除三年奉旨豁免福建延平府南平縣浮多丁銀三千三百餘兩五年諭朕聞江省歲額錢糧地丁漕項蘆課雜稅之外又有名為雜辦者不在地丁項下編徵仍入地丁項下彚入分數奏銷款目甚多沿自前明迄今賦役全書止編應解之數未開載出辦原委即有開載出辦之處亦未編定如何徵收則例於是有闕額纍官者有徵收纍民者有纍在官而因以及民者有纍在民而因以及官者朕心軫念特頒諭旨除有款可徵無纍官民之項仍照舊徵解但須核明則例立定章程明白曉示以杜浮收隱溷等弊其實在闕額有纍官民者著督撫確勘請旨豁免欽此七年議準安徽所屬社倉有捐穀五石者免本身一年雜派差徭十一年覆準江蘇雜辦錢糧有城租吏農班餘米軍餉碾餉折穀等項均繫有款無徵與乾隆五年原奉諭旨相符以乾隆十一年為始準豫豁除一振煢獨順治八年題準大興宛平二縣收飬孤貧每月給米三斗銀三錢每年給發六月十年議準大興宛平二縣孤貧銀米每年給發十月康熙四十五年京城廣寧門外士民公建普濟堂頒賜御製碑文又御書膏澤回春四字雍正元年諭各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時養贍毋致失所欽此二年諭京師廣寧門外向有普濟堂凡老疾無依之人每棲息於此司其事者殊為可嘉聖祖仁皇帝曾賜額立碑以旌好義有地方之責者宜時奬勸鼓舞之但年力尚壯及遊手好間之人不得藉名溷入其中長遊惰而生事端欽此三年諭今冬天氣甚冷京城廣寧門外安定門外飬濟院三處將變色米賞給百石煮粥振濟以安窮民傳諭倉場侍郎將變色樣米呈驗然後賞給欽此十三年議準廣西鎮安府向未有孤貧口糧應準其各設四名每名每年給銀三兩六錢遇閏加增一兩二錢以雍正十三年為始均於地丁銀內動支又遷江縣所編口糧米折銀一兩四錢一分六釐有奇原編有孤貧口糧應核明充補照例開支又桂平縣原編板木銀五兩九錢六分五釐為殮葬孤貧而設亦以雍正十三年為始一例支銷如該年無病故孤貧留存備給無庸解充兵餉乾隆元年諭各省府州縣皆有養濟院以收養貧民此即古帝王哀矜煢獨之意朕聞歸化城地方接壤邉關人煙湊集其中多有疲癃殘疾之人無棲身之所日則乞食街衢夜則露宿荒野甚可憫惻彼地舊有把總官房三十餘間可以改為收養貧民之所每年於牛羊稅內撥銀二三百兩粟米百餘石為饘粥寒衣之費著該處同知通判簡選誠實鄉耆經理其事仍不時稽察以杜侵蝕之弊倘地方有樂善好施者聼其捐助共成善舉但不得稍涉勉強著該都統會同該同知通判妥協辦理務令窮民均沾實惠欽此二年題準江南淮揚徐海通三府二州額設孤貧原編有銀無米江蘇松常鎮太五府一州屬原編有銀有米歲支數目不一應一例均給每孤貧一名歲給銀一兩二錢六分米二石八斗三升各有奇遇閠加銀三分加米二斗三升各有奇於本縣照額動支其原編銀有餘者即裁充餉不足者於地丁銀內撥給原編米有餘者改歸南米項下撥給兵餉無米者即動地丁銀按每石一兩折給又題準江南安徽所屬額設孤貧自乾隆三年為始按名均勻支給口糧每名日給銀一分歲共給銀三兩六錢遇閠加增小建扣除又議準各州縣設立養濟院原以收養孤貧但因限於地額不能一同沾惠嗣後如有外來流丐察其聲音訊其住址即移送各本籍收養令各保甲將實在孤苦無依者開明里甲年貌取具鄰右保結呈報州縣官除驗補足額外其有浮於額數者亦收養院內動支公項散給口糧仍將散過額外孤貧口糧名數按年造册報銷如冒濫扣剋奉行不力照例參處又題準浙江所屬之奉化等二十九縣孤貧口糧荒闕銀九百二十九兩八錢八分三毫有奇按各縣荒闕之數在於解司地丁銀內補給又題準陜西額編孤貧二千一百九十一名支銀者每名日給一分支糧者每名日給一升為率其額外孤貧四百九十八名亦一例支給共應加增米一百二十五石五升二合在於各縣存留糧內支給加增銀五千九百六十五兩三錢五分四釐在於各州縣起運項下並存留公項銀內分别支給至小建銀米按日扣除造册報銷又覆準四川居民流寓最多與他省不同且地處萬山險阻難行若將逺方流丐照各省之例一槩送回原籍其老病煢民舉步維艱既多跋涉之苦亦非矜全之道將川省外來流丐飭令地方官稽察果繫疲癃殘疾無告窮民準其一例收入養濟院動支地丁錢糧給養又議準河南額編孤貧一千九百九十名自乾隆三年為始每名日給口糧銀一分其各州縣有額設冬衣花布銀者每名歲給銀三錢三分又題準浙屬鄞慈等九縣孤貧口糧自乾隆三年為始每名歲給口糧銀三兩六錢柴布銀六錢均於各該縣地丁銀內動支遇閠加增小建扣除又題準江西孤貧口糧每名嵗給銀一兩八錢日食不足請照安徽例每名日給銀一分歲共給銀三兩六錢於乾隆四年為始除原額之外新增銀在於起運項下動支遇閏加增小建扣除口糧既經倍給其冬月布衣銀裁革毋庸别立名色又議準湖北孤貧口糧每嵗給銀一兩八錢布花銀三錢共銀二兩一錢較之江南等省雖屬減少但楚省米價較平請照江省給米三石六斗之例每石折銀七錢每名嵗增銀四錢二分共銀二兩二錢二分在於地丁項下動支又題準雲南孤貧口糧向於常平捐輸項下每名日給穀一升請照江南等省之例每名日改給銀一分以資養贍通共歲給銀二千七百六十一兩二錢在於藩庫地丁銀內動支又題準四川孤貧口糧每名歲支穀七石二斗布冬衣一件棉一斤共折銀二兩四錢九分每日止得銀六釐零難免飢寒請照江南安慶議定之例每名歲給銀三兩六錢遇閠加增小建扣除在於地丁銀內動支又題準廣東孤貧口糧額設四千六百七十六名編徵糧銀六千二百八十三兩九錢五分有奇按數勻給每名僅三釐七毫不敷養贍準其每名歲給銀三兩六錢遇閏加增小建扣除其不敷銀在於地丁起運銀內撥補歸入備支項下册報四年諭各府州縣設立養濟院原以收養鰥寡孤獨疲癃殘疾之窮民近聞山西陜西一帶多有老病殘廢之人在塗行乞行旅見之惻然朕思各處既有飬濟院若有司實力奉行何至小民之困苦無依者飢寒難支乞食於道山陜一路如此則他省與此相類者不少矣著各省督撫各飭所屬州縣官體國家設立養濟院之至意與朕哀此煢獨之心實力奉行毋得視為具文故事該督撫亦當時時留心訪察欽此四年題準湖南孤貧口糧照江南勻給之例每名歲給米三石六斗無米州縣以每石六錢折算共折銀二兩一錢六分其各州縣有實徵米者即給與本色無實徵米者給與折色毋庸於常平倉內支放共額設孤貧千二百五十八名除每嵗有實徵米穀及原有銀外尚不敷三百四十二兩八分有奇在於各該縣地丁銀內動支報銷六年題準留養額內額外孤貧定上下稽察責成之法將見在額內額外孤貧飭定各該州縣逐一詳察凡不願居住院內及冒濫食糧者悉行革除將境內實繫老病無依之人照例取給收院頂補其餘多者亦準作額外孤貧收養有濫收揑結者照例治罪核定之後將實在人數按額內額外分造二册挨次編甲開列花名辨明年貌委繫何項殘疾孤苦之民並注明原住籍貫出具印結由府轉送上司稽察後遇裁革病故頂補新收隨時申明仍於年終將給過口糧柴布造册申核又議準令該管道府每年遇盤察或屣勘公事之時即帶原送册籍赴養濟院點驗如房屋完整孤貧在院並無冒濫出具印結呈報上司如房屋坍塌孤貧不盡在院或年貌不符冒給者該管官照違例支給例降一級調用道府不行察驗遽行加結轉詳照違例支給之轉詳官例罰俸一年若縱胥役及令為首之孤貧代領以致侵蝕該管官照縱役犯贓例革職道府不行察出照豫先不行察出例降一級調用如道府徇庇容隱及扶同出結照徇庇例降三級調用七年覆準江西南昌等十一縣原額孤貧一千八百八十七名應裁一百七名奉新等二十縣原額孤貧二百六十七名應加一百七名所裁口糧歸入起運項下解司所加口糧即於地丁銀內動支若煢獨尚多仍準額外收養隨時損益九年覆準各省流寓孤貧如繫附近都邑仍照例移送原籍收養其有隔省遙逺及本省相去至千里外者準其一例加恩收飬動支公項銀年終造册報銷又覆準廣東廣南等九府連羅二州額外孤貧二千九百十有四名準照額內之例每人日給銀一分共銀一萬四百九十兩四錢在於田房稅羡銀內動支遇閏加增小建扣除歲終造册報銷一養幼孤康熙元年於京師廣渠門內建立育嬰堂遇有遺棄病廢之嬰兒收養於堂有姓名年月日時可稽者一一詳注於册雇覓乳婦善為乳哺撫養有願收為子孫者問明居址姓名方與之仍補注於册籍至本家有訪求到堂識認者亦必詳細問明與原注册籍無訛方許歸宗雍正二年賜廣渠門內育嬰堂帑銀千兩八年又賜帑銀千五百兩令置立産業每年約收租銀六百餘兩又養濟院每年餘剩孤貧口糧分撥育嬰堂銀二百餘兩合銀八百餘兩及一年捐助之銀每嵗支銷款項均歸順天府察核又諭聞廣渠門內有育嬰堂一區凡孩稚之不能育養者收留於此數十年來成立者頗衆夫養少存孤載於月令與扶衰恤老同一善舉為世俗之所難朕心嘉悅特賜御書功深保赤匾額並白金千兩順天府尹等其宣示朕意並倡率資助使之益加鼓勵再行文各省督撫轉飭有司勸募好善之人於通都大邑人煙稠集之處若可以照京師例推而行之其於字弱恤孤之道似有禆益而凡人怵惕惻隱之心亦可感發而興起矣欽此乾隆六年覆準通行直省督撫將見在設有育嬰堂嚴飭地方官實力奉行擇富厚誠謹之人董理並令州縣率同佐二不時稽察將實在無依遺棄嬰兒收入養贍每於年終將所育嬰兒及支存細數分晰造報察核如有怠玩剋扣需索等弊即行報參一收羈窮京師廣寧門外普濟堂每嵗恩賜崇文門稅銀千兩撥給孤貧口糧銀二百餘兩堂內地租銀千餘兩以為養贍孤貧之用順治九年題準京都五城每年自十一月起至次年三月中止每城日發米二石煮飯銀一兩以供炊爨定例事宜載都察院康熙二十九年議準五城增飯厰五處每厰令賢能滿漢司官各一人逐日親往散給其新增五厰日需米二十石銀十兩並前五城原設飯厰均至六月終止四十九年議準五城設厰煮振於十月初一日起至次年三月二十日止每城日發米二石柴薪銀一兩其米行倉場於倉內支領其薪銀於户部庫內支領六十一年十二月諭治天下要道莫過安民朕纘承大統以來軫念蒼生痌瘝時切直隸山東河南連年歉收特降諭旨緩徵遣官振濟每歲京師五城設厰自十月初一日起至三月二十日止交五城御史煮振今猶青黃不接之時著展期一月散振至四月二十日止但就食之民來京者多每日各增米銀一倍務使得沾實惠以副朕憫念窮民之至意欽此雍正十三年議準將存厰稄米詳確驗看如果米好色純即飭令各該司坊官照數散振如繫減色仍照例赴倉支領又行令五城所設飯厰加振一月乾隆二年議準漕船縴夫中塗患病棄置河岸即無生理令河漕督臣轉飭沿河各官遇有此等病夫就近送入各州縣普濟堂調養或送附近庵觀量給口糧務令得所又議準令五城御史轉飭司坊官責令各鋪總甲每日下午分在於各所管地方遍行察看如有貧民凍臥道旁無所棲身者即就近引赴普濟堂棲流所等處宿歇飭掌管之人加意照看次早仍令赴厰就食俟來歲春融聼其去就三年諭每年十月京師五城設厰煮振以濟貧民今歲米價昻貴恐小民乞食者多著照常設厰早半月之期於九月半舉行欽此八年奏準本年直屬歉收普濟堂收養人多外來孤貧就食者亦衆所有錢糧及租息等銀不敷接濟者恩準賞給京倉老米二百石以敷窮民日食之用一安節孝乾隆十年覆準孝子節婦中有食貧守志難以存立之人或至飢寒失所較之泛常孤貧尤宜矜恤令該省督撫分飭州縣核實取具鄰右印官各結詳報酌量給與口糧俾存活有賴不致失所仍將動用款項數目造册報部一恤薄宦乾隆元年諭各省縣丞主簿典史巡檢等微員嗣後離任身故實繫窮苦不能回籍者該督撫於存留公項銀內酌量賞給還鄉路費每年造册報銷欽此十四年題準微員歸籍賞給路費一案節年各省酌給銀數有計算人口大小支給者亦有籠統酌給者有分别水陸程塗里數支給者亦有按每百里每千里約計省分逺近核給者亦有按其無力等次分别給與者辦理參差殊不畫一嗣後各省縣丞以下等官如遇病故休致因公革職並無侵貪重款窮苦不能回籍者不論家口多寡每千里給銀十兩按程塗扣算身故者不論逺近加扶柩銀八兩州縣官出結府州加結藩司於存留公項銀內核實支給不得額外加增至各省教官有相隔本地五百里以外實繫艱窘不能回籍者亦照此例支給一矜罪囚刑部南北兩監囚糧及各城門枷示之犯無家屬送飯者日給倉米一升每季在部攴米三百石以昭矜恤夏給氷水冬給棉衣並鐙油藥餌諸費在刑部秋審項下開銷雍正十年題準貴州每年囚糧在於秋糧耗米內撥給十一年題準直隸每囚一名日給米一升錢五文米動支倉糧錢每千折銀一兩動支耗羡十二年題準山西每囚一名日給米一升錢五文動支耗羡銀河南每囚一名日給米一升錢五文囚糧於倉穀內動給錢於耗羡內支銷福建每囚一名日給米八合銀四釐額徵囚糧銀內動支陜西西安每囚一名日給米一升錢五文米動常平倉錢動公用銀甘肅每囚一名日給米一升錢五文米於額徵存留糧內動支如有不敷及並無存留糧米者每糧一石折銀一兩同應給之錢均於藩庫公用銀內支給四川每囚一名日給米一倉升錢五文除官基地租銀租米外其不敷銀在於存公銀內動支棉衣一件工價銀四錢七分六釐單褲一條工價銀一錢四分八釐七毫五絲亦於存公銀內動支廣東每囚一名日給米一升於徵收耗米內支給鐙油柴鹽銀五釐於屯糧耗米內支給棉衣銀於火耗內支給十三年題準奉天每囚一名日給米一升大制錢五文又每囚一名給棉衣工價銀八錢至一兩不等米於徵收地米內支給錢照時價合銀於本省贓罰銀內動用不敷銀於田房稅契銀內支給山東每囚一名日給米一升大制錢五文米每石折銀一兩制錢每千折銀一兩均於存公銀內支給安徽每囚一名日給米一升錢五文於獄田租銀租米並常平倉糧存留公項銀內動支江西每囚一名日給穀二升錢五文折銀五釐其動支銀榖於存公銀內報銷湖北湖南每囚一名日給米一升照時價折給錢五文折給銀五釐於原有額設及捐置有獄田之司府州縣支給其有不敷及原無額設囚糧之州縣於公項銀動支廣西每囚一名日給米一升油薪鹽菜錢五文於額徴地丁銀內支給如有不敷於存公項下動支乾隆元年題準江南江蘇每囚一名日給米一升錢五文於獄田租銀租米及常平倉糧存留公項銀內支給又題準雲南每囚一名日給米一京升柴菜錢五文遇閏加增小建扣除米於獄田及常平倉項下支給錢於公件項下動支二年題準直隸每囚給棉衣一件折銀五錢二分棉褲一條折銀二錢八分於自理贖鍰銀內支給山東每囚一名給棉衣一件價銀五錢棉褲一條價銀三錢於本省自理贖鍰銀內動支如有不敷於存公銀內支給河南每囚一名給氈帽一頂價銀五分棉襖一件價銀六錢棉褲一條價銀三錢五分外藥餌每劑價銀二分棺木每具價銀一兩動支自理贖鍰銀如有不敷於耗羡內撥給江西每囚一名給棉衣一件工價自二錢五分至七錢二分不等其動支銀於外結贓贖銀內報銷福建每囚一名給棉襖一件折銀六錢四分棉褲一條折銀三錢四分於自理贖鍰銀內開銷甘肅每囚一名給棉衣一件每件價銀六錢三分至一兩不等又每名給煤炭銀五釐每年約計共支銀一百八九十兩不等每年除自理贖鍰銀動支外不敷銀於司庫公用內找支貴州每囚日給鐙油柴水鹽菜錢五文遇冬給棉衣一件報銷銀四錢五分患病每日用藥一劑報銷銀一分五釐病故給棺木一具報銷銀一兩三年議準江蘇所屬繫獄罪囚有赤貧之犯緣事繫獄家口不能逐日送飯準一例給與口糧油鹽等費湖廣湖北每囚夏月酌給席扇茶葉冬月生薑草薦各照時價均無定數棉衣一件價銀四錢服藥一劑價銀一分病故給棺木銀八錢湖南每囚夏月各酌給扇一把銀四釐席一條銀三分茶葉銀無定冬月日給炭銀五釐薑銀五毫草薦一條銀一分棉衣一件銀四錢每藥一劑銀二分八年題準福建囚糧每米一石定價九錢發給不敷隨時酌辦於常平倉穀內令各州縣動支碾米給散仍將額徵折價撥給原動倉穀之州縣盡數買補九年題準浙江每囚一名日給米一升錢五文動支地丁存公銀一撫難夷乾隆二年諭今年夏秋間有小琉球國裝載粟米棉花船二隻遭值颶風斷桅折柁飄至浙江定海象山地方隨經該省督撫察明人數資給衣糧將所存貨物一一交還其船及器具修整完固咨送閩省附伴歸國朕思沿海地方常有外國夷船遭風飄至境內者朕胞與為懷內外並無岐視外邦民人既到中華豈可令一夫失所嗣後如有似此被風飄泊之船著該督撫督率有司加意撫恤動用存公銀賞給衣糧修理舟楫並將貨物給還遣歸本國以示朕懷柔逺人之至意將此永著為例欽此欽定大清會典則例卷五十三
