扣數開報至上元等二十三縣毋庸開銷氣頭厫底再氣頭厫底穀照浙省之例九成八成者每石減價銀七分七成六成者每石減一錢五成者減一錢四分委官勘明照減價發賣造册報部察覈一盤察倉糧康熙三十九年覆準凡州縣収貯米穀遇颶風大雨等災輓運江海飄流並霉爛者該督撫題叅革職離任限一年内賠完免罪復職别補如逾一年之限賠完者止免罪不準復職二年之内如不賠完仍照例治罪著落家產追賠四十一年覆準凡官員將存倉米穀虧空霉爛者該督撫題叅照例革職留任限一年賠補賠完仍凖復職如逾限不完解任再限一年賠完仍準復職如二年外不賠完者照定例擬罪著落家產追賠四十三年覆準各省州縣虧空霉爛倉糧實在賠補完日令該府道卽出實在補完印結報明督撫藩司存案倘再有虧空之事發覺將該道府一并議處四十七年議準州縣官於額貯積穀之外買穀貯倉照盤察盈餘之例準其議叙或州縣官捐榖本管倉内捐少報多或將見貯之米揑作捐輸以邀議叙後本官任内復有虧空事發除知府照例分賠外原報之督撫一并議處五十二年諭霉爛倉穀官員限内賠完仍以原官補用不得别補欽此雍正二年議準直省督撫將各州縣積貯倉穀孰繫本色孰繫折色並實存本折數目稽察明白分晰題報如果無虧闕及以折色作本色等弊照元年議準之例嵗終出具印結送部倘有此等情弊卽行題叅一面買補還倉一面着落本人追賠至於道府州縣有當穀貴之時私將倉穀發賣或販徃穀貴之所糶賣希得重價肥已者以及地方大員有將捐穀不収本色擅自折銀或以所収銀每石短價散給州縣抑𣲖里民買補遷移者或被旁人首告或被科道糾叅將督撫等官交與該部從重議處三年議準凡州縣虧空倉穀卽令接任各官於秋成穀賤之時申詳督撫藩司酌動何項錢糧照時價先行買補該州縣出具倉収該管道府加具印結一面報部一面於虧空官名下勒限一年將動用帑銀照數追補還項如逾限不完卽照侵那倉穀定例治罪仍著落本人家產變易還項四年諭凡虧空錢糧猶可勒限追還無損國帑若虧空倉糧則一時旱潦無備事關民瘼是虧空倉穀之罪較虧空錢糧為甚自宜嚴加處分著大學士九卿確議定例具奏欽此遵㫖議準倉穀虧空處分以穀一石比照錢糧五錢定罪嗣後虧空倉榖繫侵盗入已者千石以下照監守自盗律擬斬準徒五年千石以上擬斬監候秋後處决不準赦免將侵盗穀數動支正項買補著落本犯妻子名下嚴追繫那移者除數止千百石照律準徒五千石至萬石照律擬流外萬石至二萬石發邊衛充軍二萬石以上者照侵盗例擬斬其虧空之穀動正項銀買補於各犯名下勒限一年追賠一積貯交代雍正元年議準州縣存倉米穀令各該督撫嚴飭該管各官覈實詳察於年終造册保題至督撫升轉離任將案卷交代新任督撫限三月察覈疏奏如有虧空卽行題叅倘新任督撫狥隱不叅後經發覺一并照例議處仍令分賠五年諭直隸各省倉穀若有前任官折價存庫者不許新任官接受交代仍令前任官如數買穀交倉其該管上司亦不得徇情寛縱如有故違者將本官及該管上司分别從重治罪欽此八年議準倉穀五萬石以上照例多展限一月如二萬五千石以上者亦許多展十五日或一人而有兩縣交代者則許多展限一月乾隆二年題準新舊交代見存米穀接任官於一月内先行盤収其採買續交米穀以報明運到之日起五日内盤収統於正限滿日截算如未足數别無開銷又無存價赴產米地方採買則繫虧空覈實叅追如有盈餘亦據實册報如限内必不能運到者應就採買地方遠近所買各數多寡隨時隨地酌量定限竢運到交倉再行報部若前官虛立文案揑報採買者察出叅追議處又題準出借倉項如前官各役有私借揑冐扣剋不實等弊應行詳叅若察明借放無弊欠戸的實後官勒限認追完報又議準交代倉穀旣經碾試或果有泥沙攙雜止須颺淨或實繫潮濕不堪止須曬乾監盤官公同驗看毋得抑勒其盤量夫工鋪墊等項令新任官料理一社倉積貯康熙四十二年諭直隸各省州縣雖設有常平倉収貯米穀遇饑荒之年不敷振濟亦未可定應於各村莊設立社倉収貯米穀直隸有旗下莊頭可合數村立一社倉其管理社倉事宜令莊頭内有情願經管者交與収貯百姓村莊公設社倉百姓有情願經管者交與収貯以備饑荒傳諭直隸廵撫如設立社倉果有益於民生著各省亦照例於各村莊設立社倉収貯米穀大學士會同九卿詳議具奏欽此遵㫖議準設立社倉於本鄉捐出卽貯本鄉令本鄉誠實之人經管上嵗加謹収貯中歳糶借易新下歳量口振濟四十五年覆準直屬社倉四十一二三等年勸捐米穀共七萬四千九百七十石有竒出借窮民得息米千有五十一石又四十四年永保二府陸續捐穀四百三十五石有竒皆貯各屬社倉繫本鄉捐出者卽貯本鄉令本鄉誠實之人經理五十四年議準直省社倉勸輸之例富民能捐榖五石者免本身一年雜項差徭有多捐一倍二倍者照數按年遞免至紳衿捐穀四十石令州縣給匾捐穀六十石令知府給匾捐穀八十石令本管道給匾捐穀二百石督撫給匾其富民好義比紳衿多捐二十石者亦照紳衿例次第給匾捐至二百五十石者咨吏部給與義民頂帶照未入流冠帶榮身凡給匾民家永免差役雍正二年諭社倉之設原以備荒歉不時之需用意良厚然往往行之不善致滋煩擾官民皆受其累朕以為奉行之道宜緩不宜急勸諭百姓聴民便自為之而不當以官法繩之也近時各省漸行社倉之法貯蓄於豐年取之於儉嵗俾民食有賴而荒歉無憂朕心深為嘉悦但因地制宜須從民便是在有司善為倡導於前留心照應於後使地方有社倉之益而無社倉之擾督撫當加意體察欽此又覆準社倉之法原以勸善興仁該地方官務須開誠勸諭不得苛斂以滋煩擾至収貯米穀先於公所寺院収存竢息米已多成造倉厫収貯設立簿籍逐一登明其所捐之數不拘升斗積少成多若有奉公樂善捐至十石以上給以花紅三十石以上奬以匾額五十石以上遞加奬勸其有好善不倦年久數多捐至三四百石者該督撫奏聞給以八品頂帶其每社設正副社長擇端方立品家道殷實者二人果能出納有法鄉里推服令按年給奬如果十年無過該督撫題請給以八品頂帶徇私者卽行革懲侵蝕者按律治罪其収息之多寡每石収息二斗小歉减息之半大歉全免其息止収本穀至十年後息已二倍於本止以加一行息其出入之斗斛均照部頒斗斛公平較量社長豫於四月上旬申報地方官依例給貸定日支散十月上旬申報依例収納兩平較量不得抑勒多収臨時願借者先報社長州縣計口給發交納時社長先行示期依限完納其簿籍之登記每社設立用印官簿一様二本一本社長収執一本繳州縣存察登記數目毋得互異其存數一本夏則五月申繳至秋領出冬則十月申繳至來春領出不許遲延以滋弊竇每次事畢後社長州縣各將總數申報上司如有地方官抑勒那借强行糶賣侵蝕等事社長呈告上司據實題叅三年題準河南社倉豫造排門細册將姓名年貌住址以及官紳士庶商賈逐一注明送官用印存案日後借貸悉以此為準其游手好閒者不許借貸於正副社長外再公舉身家殷實者一人總司其事令其不時稽察如有欺隱令其賠償果能使倉儲充牣題請加恩以示激勸此項積貯無論官員不得撥用卽同邑之社亦不得以此應彼如有官員抑勒那借許社長呈告上司據實題叅其所需紙張筆墨以及人工飯食或行勸諭或撥罰項以充其用不得濫行科斂致滋擾累至積米旣多於夏秋之交平糶秋成照時價採買還倉七年議準社倉米穀如有貧民偶遇荒歉借領倉榖者每石止収息榖十升還倉小歉借動者免取其息仍如本數還倉通行直隸各省遵行十三年題準雲南設立社倉通計一省所捐穀麥七萬餘石其中千石以上者僅二十餘處此外皆數百石數十石亦有全無社穀者民間緩急之需終不能免按各屬皆有常平倉及官莊等穀存貯尚多可以酌量暫撥以作社本將社倉存貯未及千石者按地方之大小計存貯之多寡在於該處常平官莊等榖内動撥五百石或八百石作為社本令社長一並經管出借窮民秋成加一還倉小歉免取其息歸於社倉項下積貯竢積有千石社本仍將原動常平等榖歸還原欵乾隆三年覆準社倉積穀將息穀十升以七升歸倉以三升給社長作修倉折耗如有逃亡故絶之戸無可著追者準令社長報明地方官察明確實取結通詳於七升息穀項下開銷又題準四川糶賣倉糧除買補正項外所剩餘價均買作社糧以為民倡而士民等隨各相率樂捐自乾隆二年秋後買貯穀二千九百七十餘石捐貯穀二萬五千六百餘石又逹州内江等三十餘處舊存貯穀二萬一千石以上川省新舊社穀共五萬四百三十石有竒令加謹収貯按年題報社穀旣多必需倉厫照前建常平倉例每穀四百石建厫一間其工料銀咨部於存公銀内動支四年題準江西社倉穀每石収息一斗仍循舊例五年覆準陜西甘肅所屬社穀有二項一繫百姓公捐自行議定倉正倉副經理出入報官存案不入官之交代仍聽民料理一繫加二耗糧内留五分為社糧責成地方官經理六年題準山西社倉奬勸之法捐十石以上至三十石者照例聽地方官給與花紅三十石以上至五十石者地方官給匾捐至百石者府州給匾二百石者本管道給匾三百石者布政使給匾四百石者巡撫給匾捐至五百石以上者具題給以八品頂帶榮身其連年捐輸者仍許積算捐數照見定等次分别奬勸地方官勸輸有方大州縣每年勸輸至千五百石以上中州縣至千石以上小州縣五百石以上者均於計典内據實開明分别考覈又覆準地方官勸輸社倉每鄉設立印簿一本聽願捐之戸不拘米麥雜糧及數之多寡自登姓名捐數於簿繳官以備稽察並將一人連年報捐先後積算至十五石以上亦凖遞加奬勸又題準社倉捐至三百石者給以八品頂帶四百石以上者給以七品頂帶七年題準江南安徽社倉能捐穀五石者免本身一年雜項差徭十石以上者照例給奬捐小麥粟米大米算作二穀諸雜糧均作穀數計算十年議準各省社長三年更換一次選擇殷實良民充補令經手社穀同鄉保互相交代取結報官存案如有虧闕責令賠補經管三年毫無弊竇同社公保再留三年又議準社穀行令徹底清釐如有實屬逃亡故絶取具里鄰甲保結狀地方官加具印結題請豁免實有着落者催還至豐年不能全行借出者轉飭各屬卽以實借實還按穀収息勿得虛揑以致開報不實其息穀充贏者有貧無依倚之人準其量借升斗以資接濟七年題準山東行銷票鹽地方共十有三萬七千五百有七票分别上中下三等使各商照票輸穀章邱濟陽萊蕪淄川新泰德平鄒平商河臨邑惠民十縣列為上等每票輸穀二石共穀八萬九千八百五十八石陵齊東陽信長山博山樂陵青城臨淄䝉隂臨朐益都高苑沂水費十四縣列為中等每票輸穀一石五斗共穀七萬六百二十六石莒新城博興濱蘭山海豐樂安蒲臺日照霑化利津壽光昌樂濰郯城十五州縣列為下等每票輸穀一石共穀四萬五千四百九十四石通計輸穀二十萬五千九百七十八石分限二年買完交倉倘遇本處歉収仍準呈詳展限於下年買足分發章邱等三十九州縣每年照社倉例於春夏之交察明實在乏食窮民借給照例加一収息應建倉厫令該商出貲在於城内及鉅鄉大鎮搆造每處立社長社副各一名二千石以上設斗級一名四千石以下斗級二名六千石以下三名八千石以下四名萬石以下五名萬二千石以下六名萬四千石以下七名社長社副每年各撥給息穀二十四石斗級每年各十二石以資養贍每年出借収領責成地方官稽察一義倉積貯康熙十八年題準地方官勸諭官紳士民捐輸米穀鄉村立社倉市鎮立義倉照例議叙雍正四年題準兩淮衆商公捐銀二十四萬兩鹽院繳公務銀八萬兩奉㫖以二萬兩賞給兩淮巡鹽御史以三十萬兩為江南買貯米穀蓋造倉厫之用所蓋倉厫賜名鹽義倉卽著兩淮巡鹽御史交與商人經理欽此遵㫖於揚州府治建倉積貯每年於青黄不接之時照存七糶三之例出陳易新或於米貴之時開倉平糶總至秋成糴補倘地方有振濟之用該撫一面具題一面動支管理之商人每年將出易糴補動支之用呈報巡鹽御史覈實奏報其出陳易新平糴平糶之内或有贏餘增買米穀乾隆十二年覆準山西義倉士民捐穀分别奬勵照直省社倉之例其所収雜糧按照米穀時價折算奬賞其州縣能捐俸急公首先倡率捐五十石者記功一次百石者記功二次百五十石者記功三次二百石以上者别行注册每逢奏報案内並别有政績卓越遴選升調别作一條事實彙册送部察覈先予記功三次三百石以上者於見任内紀録二次至義穀照直省之例分鄉収貯春借秋還照社倉例每石加息一斗所需倉費亦照直省於息穀内動用倘士民情願捐貲建倉或捐倉屋地基木料等物準其計價合算穀數彙入捐穀内分别奬賞再愼選倉正倉副分别勸懲游惰民人禁其濫借均照社倉例辦理所有義榖每遇州縣官交代時照例盤察如有私借那移分别叅處至貯穀之鄉附近村莊如猝遇冰雹例不成災農民有闕乏口糧籽種者準其將穀借給每年春借秋還先盡雜糧出易竢本息充裕之日再照存七糶三辦理其義倉出穀每百石収息穀十石内一石為倉正倉副紙張飯食之需一石為倉穀折耗一石為賃房之費如遇歉収免息之年所需費用於上年餘剩息穀内借給竢下年収有息穀照數撥還原項十八年覆準直隸士民捐輸義倉積穀及數應予奬賞者照例具題其捐穀數目每年一次專摺具奏凡上年報捐及出借動用之數於次年二月内奏明存案以備稽察一營倉積貯康熙三十年諭江寜京口等處官兵駐防之地著將漕米各截留十萬石建置倉厫以備積貯欽此四十年題準楚省漕糧二十萬九千餘石盡數截留存於江南江寜省倉以六萬四千石充給兵餉將採買兵米價直照數扣留以四萬五千石分發淮安等處平糶以濟民食竢秋成時將糶賣米價並兵米扣留價直照數買補還倉其餘存剩之米如不動用仍竢下年循例給兵發糶四十九年議準湖南鎮筸地方僻處苗邊改協為鎭移駐道㕔兵民日增若遇嵗歉恐食有不敷撥司庫銀三千兩買穀備貯雍正四年題準廣東邊海之南澳鎭右營澄海海門達濠等營貯穀五千二百石潮州鎮標三營黄岡協潮陽營共貯穀五千三百石碣石鎭標三營惠來平海大鵬等營貯穀六千二百石提標五營貯穀五千石督標並水師六營肇慶城守營共貯穀七千石計每兵一名存穀一石以備借貸秋収免息徴還其買穀動支羡餘銀造倉運貯盤察交代均取結報部侵那虧闕指名題叅七年題準廣東潮州城守饒平平鎮三營捐貲買榖三千石分給三營於青黄不接之時借給竢散餉時照數扣除槩免加息令各營將備經管倘有侵那闕少照正項錢糧例追賠治罪九年題凖廣東瓊州鎭瓊協龍門協虎門協香山協廣海寨共穀萬石分貯各協營其買穀價銀並建倉銀在於鹽政節省銀内動支十一年奏準四川潘州達建寺二處新設官兵應支米折銀照普安營之例將次年應支四季運折米價於本年秋成後卽全數領出買貯散給並於潘州協標貯米二千石達建寺營貯米五百石每於青黄不接酌量平糶借支秋成買補還倉又題準四川新設苗疆河西七兒堡建造倉厫貯米二千石交與該同知會同營員収貯又題準四川潘州達建寺二處修建倉厫潘州協貯米二千石達建寺營貯米五百石交營員収貯乾隆二年奏準湖南辰州府屬永綏協營兵糧不敷眷屬之資請於司庫三分公項内動銀二千兩令同城駐防永綏同知赴產米州縣採買運貯高巖倉交營員収貯遇有闕食兵丁酌量接濟所需米直脚價在於該兵應領季餉内扣存彙交同知買運循環供給四年題準四川成都駐防兵米均繫折色每遇價昻艱於採買將司庫見存生息餘剩銀飭發附近州縣及時採買遇青黄不接支給各兵在餉銀内分三月扣還如有浮冒扣剋者題叅其應需倉厫卽在協領佐領空房二所存貯如有滲漏交地方官估修又題準浙江温州鎭所轄樂清等九營請於公糧銀内動支買穀分貯以濟兵食通計各營兵丁六千五百十有九名每兵一名備穀二石應買穀萬三千三十八石令都司各官盤収監管遇青黄不接每兵按月借穀六斗分作六月扣存倉厫每間貯穀六百石共應建倉二十三間所需工料亦在公糧銀内動支又題準福建海壇金門澎湖閩安烽火銅山等六鎭協營共買穀二萬石分貯各鎭協營遇青黄不接酌借兵丁免其加息秋収散餉扣除買補共建倉四十三間所需工料在於正項銀内動支又題準浙江温州鎭標中左右三營及城守營共計貯穀五千九百二十八石其建蓋工費應照見在成例合計倉厫每間貯穀六百石應建倉厫十間每間工費銀二十兩共需銀二百兩樂清營貯穀千六百十有六石應建倉厫三間共需銀六十兩瑞安營貯穀千六百六十二石應建倉厫三間共需銀六十兩平陽營貯穀二千八十八石應建倉厫四間共需銀八十兩大荆營貯穀千二百有八石應建倉厫二間共需銀四十兩磐石營貯穀五百三十六石應建倉厫一間需銀二十兩均於公糧銀内動支五年奏準四川提標五營各兵食米維艱請將存剩公費銀動支買穀存倉自乾隆六年為始遇青黄不接卽按名借給照原買穀價於夏秋季餉銀内扣除買穀還倉營中見有倉厫毋庸别建九年奏凖河南駐防營所需糧餉草豆向繫折色糧價昻貴未免拮据請於兩翼各設常平倉一座將駐防營息銀於麥熟秋収價平之際無論米豆二麥均行買貯遇青黄不接照依原價糶給兵丁仍竢麥熟秋収再行買補其倉厫令城守尉酌定間數建造十二年咨準湖南永綏協營兵米因眷屬無資借動庫項買米接濟在南路高巖增建倉厫四間以備存貯今議將倉厫稍為開擴置買苗田八畝四圍高築牆垣改增房屋其工料銀在於公項内動給又題準四川成都駐防兵丁口糧與其全行折銀不如按月酌給米糧計兵丁每年應領銀四萬五千六百五十五兩内將二萬石米價銀豫先扣存藩庫竢秋収後令各州縣分買存貯駐防倉厫令副都統酌給兵丁其各州縣用過米價脚價據實報部又覆準山東河標兵丁食米拮据請將標營生息銀買穀四千石設倉存貯令城守營都司經管河標副將盤察春間借給兵丁秋収免息徴還倘有侵那等弊卽將經管各弁究叅其倉厫舊有四門城樓空閒高燥足敷収貯毋庸别建欽定大清會典則例卷四十
