body:
  text: 戸部積貯一常平榖本順治十二年題準各州縣自理贖鍰春夏積銀秋冬積榖悉入常平倉備振置簿登報布政使司彙報督撫嵗終造報戸部其鄉紳富民樂輸者地方官多方鼓勵毋勒以定數康熙十八年題準地方官整理常平倉每嵗秋収勸諭官紳士民捐輸米榖三十一年議準山東每畝捐榖四合除原有可貯倉厫外其無倉厫之州縣交與地方官酌量建造三十二年覆準浙江產麥無多所収不敷民食鄉紳士民捐輸夏秋幷作一次每畝捐榖四合三十四年議準令直省督撫飭各州縣衞官勸諭鄉紳士民每歲収穫時量力捐輸積貯遇榖貴之時將米麥貸於乏榖之人竢収穫照原領米麥之數交還如不肖有司有抑勒多収情弊照私派錢糧例處分三十六年覆準湖廣三十五年分各官捐輸之榖貯各屬常平倉以備振濟四十三年題準陜西人口衆多之州縣增貯米三千石其次州縣二千石又次州縣千石交與地方官採買存貯動西安司庫兵餉銀十有四萬兩以十萬兩照時價買米增貯以四萬兩於各州縣蓋造倉厫其甘肅地方旣無倉厫應於常平倉糧内十分之中動用一分蓋造將用過糧米闕數照原定數目補還再西安甘肅二處照依應徴地丁銀一錢米一斗輸納者令其捐輸糧三合以為備災之用如遇歉年停其捐輸又議準福建見在捐輸榖二十七萬餘石常平倉榖約五十六萬餘石其内地積榖仍按原存州縣之額數存畱常平榖照時價盡數發糶至臺灣一府三縣遠在海外見存捐輸榖八千六百餘石常平倉榖十有一萬石有竒除每縣應存之數加謹収貯以備每嵗出陳易新之用外其餘盡行發糶貯銀遇荒年振濟五十四年題準浙江平糶漕米十萬石存貯仁和錢塘等九縣倉厫開徴新糧之日難以並貯應於省城廣豐倉之舊址建厫二百四十間収貯又覆準湖北撫司道府州縣等官共捐輸榖三萬五千七百石分撥大中小州縣衛所収貯備用五十九年覆準河南截留漕米内撥十萬石運至西安存貯雍正元年覆準動浙江庫帑買米三萬石運廈門収貯萬石泉漳二府各貯六千石餘八千石運赴福州省城設遇米價稍貴一面奏請一面平糶又覆準豫省河北三府麥苗稀少秋禾未種小民艱於粒食將康熙六十一年漕糧六萬二千五百九十石截畱衛輝府存貯將陜州収捐米内酌撥二萬石運送懷慶府倉存貯以備需用四年議準江南地廣人稠需用米榖倍於他省動帑買運以濟民食恐稽時日暫照河工議叙貢監之例將銀改為本色米榖每銀一兩収米一石或榖二石鄰省之人亦準捐輸不論稄秈紅白兼収行文督撫一面動支正項錢糧委官於產米地方照依時價採買運送其採買若干運送何地該督撫公同商酌妥議具奏一面行文鄰省並出示曉諭本省生俊令其急公赴輸且分别府州縣之大小酌量應輸米榖之多寡竢各該處應貯米榖捐足之日卽行停止其所収米榖加謹存貯按季造册報部如有私自収取折銀及勒索包攬情弊卽指名題叅從重治罪此所貯米榖有應用平糶散振出借者該督撫卽具題動支將動用數目報部察覈又覆準江南蘇松常三府買榖八萬石収貯又覆準浙江寜波金華等府買穀五萬五千餘石分貯又覆準浙江杭嘉湖等府動司庫銀十萬兩買榖分貯又議準福建臺灣於常運平糶米五萬石之外動正項錢糧運米十萬石存邊海地方若遇臺灣豐収之年再酌量加增運貯仍令臺灣商販得至福泉等府貿易五年議準湖廣鹽商捐榖銀十萬兩分發湖北六萬兩湖南四萬兩交各府飭令就近採買存貯乾隆五年諭地方積榖備用乃惠濟窮民第一要務而州縣有司惟恐貯榖過多平時難於照料離任難於交盤瞻顧遷延實為通病朕知之甚悉巳屢降諭旨矣今年直隸山東河南江西等省皆獲豐収而各省奏報年榖順成者頗多况江西湖廣原繫產米之地皆當乘時料理積貯之政如捐監一事宜竭力勸導多方鼓舞將抑勒阻撓胥吏苛索等弊悉行革除其他凡可以積之於官藏之於民者皆當於此時悉心籌畫並切諭小民撙節愛惜毋糜費於無益之地如造酒造麴之事尤宜禁約庶不有虛上天之賜夫豐年不知積貯一至歉年束手無䇿咎將誰歸各督撫有司均有父母斯民之責應視民事如巳事毋得徒奉具文仍蹈茍且偷安之習欽此十年諭今年直隸宣化府所屬被旱歉収恐附近州縣所貯米榖未必處處充裕可以分撥濟用來嵗青黄不接之時或致米糧不敷此時應當計及著撥通倉米五萬石聽該督酌量分發闕米州縣存貯備用欽此十一年諭上年宣府所屬被旱歉収今春雨澤又復稀少著將通倉粟米撥運十萬石分發所屬州縣以備撥給倘今嵗秋成豐稔卽將此項補實倉儲其如何陸續輓運著倉埸侍郎會同該督妥議辦理欽此十三年議準収捐監榖原以實倉庾而備荒歉各省見在俊秀報捐除山東江南福建四川停其在内収捐山東振䘏用繁兼準在外收捐折色外其餘各省悉照在外収捐本色在内収捐折色之例辦理今各省常平積貯旣經定額則収捐監榖自無容於額外增貯除不敷定額之省仍以收捐補足外其額外有餘各省所収本色應令别案存貯遇有振䘏卽於此内撥用或平糶倉榖不能買補卽將此項倉榖撥抵所存糶價造册報部酌撥一常平榖數康熙三十年覆準直隸所捐米榖大縣存五千石中縣四千石小縣三千石倘遇荒歉卽以此項散給其留倉餘剩者均於每年三四月照市價平糶五月初旬將平糶價銀盡數解貯道庫九月初旬各州縣領出糴新榖還倉四十三年議準各省府州縣積貯米榖大州縣存萬石中州縣八千石小州縣六千石其餘按時價易銀解存藩庫其存倉米榖每年以三分之一出陳易新又覆準直隸各屬見存米榖惟南宫南樂長垣三縣過二萬石其餘州縣存貯不多仍令照舊存貯毎年出陳易新倘遇歉嵗詳明題請發糶又議準東省倉額大州縣貯榖二萬石中州縣萬六千石小州縣萬二千石又覆準山西之民别無他業惟資田畝恐積貯榖少一時需用購買維艱毎大州縣令存榖二萬石中州縣萬六千石小州縣萬二千石又覆準江西州縣大者止存榖萬二千石暫停糶三又覆準江蘇所屬大州縣存貯米五千石中州縣四千石小州縣三千石又覆準四川大州縣貯榖六千石中州縣四千石小州縣二千石無庸糶三又覆準盛京地方與各省不同無庸分别州縣大小定數其九州縣積貯米糧有多寡不同錦縣見積貯六萬石寜遠州見積貯五萬餘石為數頗多承德等七州縣止各存萬六七千石不等自四十三年起將錦寜二州縣應徴米豆改為徴銀解交承德等七州縣買糧建倉積貯又覆準貴州各府州縣常平倉見貯米千二百餘石稻及蕎麥共十有八萬餘石内惟貴安等地方均繫衝要且官兵駐劄自宜多貯貴陽府存貯稻萬有一千餘石貴筑縣存貯稻萬有四千餘石安順府存貯稻八千石其餘各府屬有六千石及三四五千石不等皆不足大中小州縣應存之數竢捐貯贏餘之日再請糶買五十一年覆準山東將捐榖分貯大縣萬石小縣八千石仍於沿河等處酌留數十萬石以備鄰省撥運雍正三年議準廣東於通省府州縣存倉榖數多者開倉平糶卽將價銀付榖少之州縣糴穀存貯其有虧闕者嚴追完補再廣西桂林等府捐榖糶三價直不必糴穀還倉仍買榖運交廣東分貯七年議準山東各府並附郭首縣貯榖二萬石大州萬八千石中州大縣萬六千石中縣萬四千石小縣萬二千石大衞萬石中衞五千石小衞二千五百石大所三千石以此定額其地要民稠或積窪易潦者酌加二三千石如有闕額動帑買補九年覆準江蘇所屬地廣需用米穀甚多應照雍正五年所定數目大縣存米萬五千石中縣萬石小縣八千石榖則倍之十一年議準喜峯口乃蒙古徃來之路所需口糧不可不備酌議於永平府屬糶賣原貯喜峯口成色米所易之穀及見存穀内量撥八千石令各州縣運送交倉十三年議準福建福州府倉貯榖二十一萬石為數繁多分撥福糧㕔萬石閩侯二縣各二萬四千石乾隆九年覆準陜西西安所屬常平榖二百七十三萬三千有十石按州縣大小分貯咸寜長樂二縣各貯榖七萬五千石葭州神木等七州縣各貯穀五萬石綏德膚施等十二州縣各貯穀四萬石富平臨潼等七州縣各貯穀五萬石乾州三原等八州縣各貯穀四萬五千石華州藍田等十一州縣各貯穀四萬石邠耀等七州縣各貯穀三萬石商鄜等十七州縣各貯榖萬七千二百餘石同官麟遊等七州縣各貯穀八千石興安洵陽等七州縣地氣潮濕多貯恐致紅朽仍以見存舊穀四萬四千五百四十石作為定額十三年諭邇年以來各省米價日見加增反覆推䆒莫知致此之由常平積貯所以備不虞而衆論頗以為採買過多致米價益貴因思生穀止有此數聚之官者太多則留之民者必少固亦理勢之自然考之康熙雍正年間各省常平已有定額直省常平積穀之數應悉準康熙雍正年閒舊額其加貯者以次出糶至原額而止或鄰省原額不足卽就近撥運補足所需運價照例報銷其如何彼此撥運並酌定原額及原額存糶之法著大學士會同該部悉心妥議具奏欽此遵㫖議準直省常平倉所貯米穀康熙年間或未經定額或定額無多難以稽考應照雍正年間舊額惟雲南地處極邊不近水次陜西所屬沿邊積貯兼備軍糈雍正年間倉貯多寡亦屬無定應以乾隆年間所定之額為準雲南積穀七十萬千五百石西安積穀二百七十三萬三千有十石甘肅積穀三百二十八萬石又福建環山帶海商販不通廣東嶺海交錯產穀無㡬貴州跬歩皆山不通舟楫倉貯均宜充裕見在米榖以乾隆年間定額計之或尚有不敷或僅可足額較之雍正年間已覺有餘酌量三省情形卽以見存之榖作為定額福建積榖二百五十六萬六千四百四十九石有竒廣東積榖二百九十五萬三千六百六十一石有竒貴州積榖五十萬七千十石有竒其餘直隸盛京山東山西河南江蘇安徽江西浙江湖北湖南四川廣西均以雍正年間舊額為準直隸積榖二百十有五萬四千五百二十四石盛京百二十萬石山東二百九十五萬九千三百八十六石有竒山西百三十一萬五千八百三十七石有竒河南二百三十一萬九百九十九石江蘇百五十二萬八千石安徽百八十八萬四千石江西一百三十七萬七百十三石浙江二百八十萬石湖北五十二萬九百三十五石有竒湖南七十萬二千一百三十三石有竒四川百有二萬九千八百石廣西二十七萬四千三百七十八石通計直省共積榖三千三百七十九萬二千三百三十石有竒較之乾隆十三年以前定額四千八百十有一萬六百八十石有竒計減積榖千四百三十一萬八千三百五十石令各該督撫視所屬府州縣之大小均匀存貯其間有轉運難出產少地方衝要以及提鎮駐劄各省犬牙相錯之處彼此可以協濟均應分别加貯十五年題準安徽各屬常平倉定額通省九十四萬二千石為準每大州縣額貯米萬二千七百石至萬八千石中州縣額貯米萬四千石至萬七千石小州縣額貯米萬一千石至萬四千石府倉自八千石至萬五千石不等除地土髙燥不準銷厫底氣頭外其安慶等八府州及懷寜等三十八州縣存貯一年者每石開氣頭三合二勺廒底八勺存貯二年者每石開氣頭六合四勺厫底一合六勺未及一年及三年之後米穀質已乾均不準開銷以乾隆十四年為始於該年奏銷册分晰造報一常平積貯米穀隨宜康熙三十年覆準直屬捐米内秫黍一種春氣一動卽易發紅著卽糶賣易粟還倉三十一年覆準福建沿海之地民間多種稻穀不比北省多種麥粟嗣後止令勸輸稻榖雍正三年諭積貯倉糧特為備荒之用但南省地方潮濕米在倉一二年便致紅朽改貯稻穀似可長久著詳議具奏欽此遵㫖議準江蘇安徽江西福建浙江湖廣四川廣東廣西雲南貴州各省内惟安徽但有稻榖原無貯米及福建浙江倉米有限無容改易其江西湖北湖南四川存貯米皆五萬石内外令於一年内改易稻榖江淮截漕米廣東存倉米皆八萬餘石廣西存倉米十萬餘石分作二年改易稻榖雲南米五十七萬餘石貴州米四十萬餘石一二年内不能盡易每年雲南應給兵餉十有四萬九千六百餘石貴州兵餉九萬五千六百餘石卽將二省存倉之米支給至秋成時徴収稻榖補倉雲南存倉米限以四年貴州限以三年盡可改易令各地方官增建倉厫以備積貯又覆準江蘇安徽江西福建浙江湖廣四川兩廣雲貴各省所存之米竢易榖旣完之後每年額徴兵餉仍収米給兵餘悉改徴稻榖各省均照此例其有虧空倉米者亦令悉以稻榖追補還倉凡有需用挨年先碾舊榖支給倘需用米多一時礱碾不及應給米一石者折給穀二石又覆準山西存貯倉米悉照奏銷兵馬錢糧成例每榖一石抵米六斗易榖入倉其民欠及虧空米糧亦令照例改折交倉存貯至􅐘子蕎麥等項各處出產不同令該撫嚴飭各屬確訪時價易榖入倉不得故為低昻至偏僻小縣暫令米榖兼買陸續易榖入倉又覆準河南存倉米麥糶賣後秋収卽將米價糴榖分貯榖少之州縣至民欠未完虧空買補各項亦以一米二榖徴収追補還倉又覆準四川富順等縣倉米改易稻榖茂州素不產米向貯米二百石今易蕎麥六百石其建昌府之左所米令搭放兵米徵稻榖還倉松潘衞存貯軍需米匀作兩年平糶仍買新米貯倉五年更換一次十一年覆準安徽鳳陽亳州等處地產粟穀稻非本地所出嗣後凡產粟穀之處每逢糶三卽準其買粟補倉挨年易換其多餘價銀增買粟穀竢買足之時分别報部察覈一直省常平積榖每嵗存糶之數康熙三十四年題凖江南積穀以七分存倉備振以三分發糶竢秋収買穀還倉三十五年覆準江南於各屬糶三銀内酌提四萬石價銀解省竢秋成時収買新穀貯省以為下年存七糶三之用四十三年覆準河南見存倉榖每年將一半存倉備振一半借給窮民四十九年題準陜西甘肅存貯之米日久恐有浥爛行令該管官於糧貴之年存半糶半糧賤之年存七糶三雍正三年議準州縣倉糧凡遇出陳易新之時令佐貳官公同収放如州縣私自糶賣佐貳官不據實通報扶同隱匿一并叅處四年覆凖陜西倉糧久未糶賣令於每年二三月内存七糶三至八九月買補還倉六年題準陜西存貯倉糧準其一米二穀易穀積貯每年於二三月間存七糶三秋後買補還倉九年議準江蘇所屬倉穀凡遇青黄不接出陳易新酌量糶賣不必拘定存七糶三乾隆元年覆準湖南各屬地有高下燥濕之不同常平倉穀存糶之數因地制宜列減糶為三等長沙等四十五府州縣地勢乾燥者仍存七糶三永州等三十一府㕔縣衞地勢稍濕者存半糶半龍陽等四縣地勢尤濕者糶七存三倘民間有不須糴買或不能糶半糶七聽該管官隨時斟酌又覆準四川龍安寜逺二府並茂州所屬及雷波衞黄螂所等處地居邊荒風土較異兼之積貯雜糧性不耐久應每年糶半存半餘循例存七糶三偶遇歉収不拘成例酌量借糶又議準廣東平糶倉穀將沿海卑濕之廣州等七府南海等三十九州縣新安等二縣丞所管準其存半糶半其糶三之穀全支兵米無可減糶之嘉應清遠等十四州縣亦令存半糶半南雄等三府羅定三水等三十六州縣旣非沿海卑濕之區照例存七糶三二年題準安徽地土高燥之滁州等七州縣及鳳陽潁州二府石埭等十二州縣常平貯穀照例存七糶三其臨近江湖地形卑下濕氣最重之安慶等十府州懷寜等三十八州縣減價糶半存半一買補之法雍正十一年議準廣東每年糶三倉榖自九月以後數在四千石以下者定限兩月内買補足數四千石以上者三月内買補足數九月以前有能先買者聽其便宜買補十三年議準直省各州縣秋成買補倉穀如遇榖價騰貴卽將所糶價銀解交府庫竢次年秋収價賤照數買補又本地買補恐有短價𣲖買抑勒富戸里民等弊務令於隣近州縣購買以杜弊端乾隆元年議準秋収買補倉穀務擇好穀照原糶之數買足還倉其買補價直照各地方時價有餘不足通融撥補足數給發不得稍有短少致有官賠並𣲖累里民等弊二年議準被災州縣如有倉糧散給無存者務於秋収豐稔之時卽題明撥銀買補以實倉儲又議準各州縣平糶倉穀務於本年秋収及時照數買補如逢水旱本地鄰境價直皆昻貴難買令該管官察覈確實將存價縁由咨部竢次年秋収無論價直貴賤卽行採買如次年仍延緩不買以玩視倉儲照例題叅又凡遇水旱災傷次年買補價昻察其實在不敷之數統計該省糶價有餘不足通融撥補買足如該省並無盈餘準動支藩庫存公銀買補仍造册題報察覈三年議準買補倉穀嚴禁𣲖累小民及發短價低銀抑勒交糧或斗秤以大易小以重易輕有蹈此者或被告發或被訪聞卽詳揭叅究督撫徇隱一并叅處又議準直省倉穀春糶秋糴若秋成穀價仍昻則就鄰近價平之處於春月購買補足如鄰近價亦未平卽察其積貯之多寡酌量緩急暫停買補或竢次年麥収豐稔買麥収貯秋成易穀還倉或竟竢次年秋成買穀隨時酌量辦理至倉穀無多地方不便虛懸令州縣確訪鄰省價平之處詳明該管上司委官採買其原糶價直不敷採買卽於通省糶價内通融撥補倘再不足準其將糧價運費脚費在於藩庫存公銀内酌量撥給造册題報又議準州縣赴鄰封及產穀地方採買時卽將應買數目報眀督撫行知受買地方如繫隔省卽知會彼省督撫轉行知照竢買足運囘之日卽取具地方官印結將米穀數目價直書明結内於申報採買収倉時一并送府驗報察覈如有情弊卽行叅處七年議準江西湖廣素產米榖於有収之嵗自七八月以至十二月將本地附近水次各屬米穀價直每月據實咨報各省以便採買若各省已赴採買而江廣等處適值價貴準於存倉穀内酌量撥運將鄰省價銀留貯竢秋成照數買補還倉八年議準買補倉榖如果一時買難足數本地有穀之家情願出售於官者議定價直必見穀交銀官為經理輓運無得豫發價銀强行𣲖買亦不得勒令賣戸上倉交納以致愆期揑報擾累民生九年諭積貯乃民食所關從前各省倉儲務令足額原爲地方偶有水旱得資接濟是以常平之外復許捐貯多方儲蓄無非為百姓計後因糴買太多市價日昻誠恐有妨民食因降㫖暫停採買俾民間米穀自在流通價直平減亦無非為百姓計也乃近聞各省大吏竟以停止採買為省事不思常平之設不特以備荒歉卽豐稔之年當青黄不接之時亦得藉以平糶於民食甚有關繫從前所降諭㫖總在督撫大吏奉行之時將實在情形籌酌妥協其間因時制宜原不可執一定之見今因停止採買之令遂任倉厫闕少置而不理將來必致糶借無資固非設立常平本旨又豈朕停止採買之本意乎各省督撫務須斟酌地方情形留心辦理應買則買應停則停總在相機籌畫不可膠執定見希圖省事欽此十一年諭各省積貯原以備地方荒歉之用今嵗豐収之處尚多正宜趁此時留心籌畫豫為積貯民食之計俾不致榖賤傷農但必以本地之穀補本地之倉恐収成分數不齊產米多寡不一或因一時採買米價又致昻貴有妨民食著各該督撫酌量所屬地方情形有二麥旣豐而秋成又稔者動撥屢年所存穀價分路採買亦不必迫期足額務須妥協辦理使倉儲可以漸充而米價不致增長欽此一豐年糴糶豫備倉儲康熙二十四年諭山海關古北口張家口等處積貯米穀以備蒙古饑荒令戸部官監視運送蓋造倉厫欽此三十年諭山西平陽等處麥田大熟著遣堂官一人前徃照時價採買積貯欽此四十三年諭山東昨嵗歉収江南乃產米之地又水陸易於輓運著總河等從江南買穀運至東省交倉欽此雍正三年諭湖廣為產榖之鄉運徃别省皆為近便今嵗収成豐稔著該省督撫動支庫銀十萬兩買穀於省倉及府州縣應貯之處加謹収貯但須陸續採買不可致穀價騰貴設民間穀價稍昻卽行停止以待來嵗秋収江南浙江今嵗均獲豐収著各該撫就近商酌若買穀有益卽動項採買定數奏聞欽此四年諭聞山東登萊青三府連年豐稔商販自東而西者絡繹不絶著該撫酌量動帑採買分貯於濟南等屬米少之州縣著勸諭各商販多運至濟南等三府俾民間得以収買存貯則明嵗青黄不接之時米價不致騰貴欽此九年議準東省被水州縣振濟所用之穀於通省見存新収粟米撥十五萬石再簡科道官二人動支帑銀徃天津等處率地方官買粟五萬石共二十萬石發與囘空糧船帶至山東令於德州常豐臨清等倉収貯再於奉天撥粟二十萬石由海運至天津再雇民船運至德州交與山東地方官運送其東昌以下之近水州縣將江西湖廣漕運截留三十萬石令該撫分撥存貯十三年題準直𨽻二麥豐収以奏準司庫存公銀内給清河道二萬天津道萬兩大名道三萬霸昌道萬兩河間府二萬分發各屬麥多價平之州縣盡數採買収貯本處倉内每年易穀積貯於年終造册報部察覈乾隆元年題準江西早穀豐収酌動存公銀買穀十萬餘石分貯各府州縣以裕本省之蓋藏兼備鄰封之緩急三年諭今嵗山東河南二省麥秋大稔但恐小民於有餘之時不知撙節耗費於無用之地如躧麴耗麥地方更當嚴禁於斯時勿以二麥豐収遂可稍弛其禁至於鄰省需麥之處甚多以本地之有餘濟他省之不足而貿易之利亦在其中務使商販流通彼此均受其益如果再有餘糧卽著地方官動支庫帑照時價糴買存貯公所以為餘蓄不使有榖賤傷農之慮但不可繩以官法勒令交易致滋擾累著該撫善為經理欽此四年諭湖北今嵗麥秋豐稔又豫省河以南麥已大熟當此有餘之時必需酌盈劑虛始於民生有益直隸江南上年歉収今嵗麥秋雨又愆期可行文直隸總督會同河南巡撫酌量市價民情委官採買存貯竢直隸需麥之時以便撥運湖北與江南鄰近其應否採買接濟有便民食之處亦行文江南督撫會同湖北巡撫商酌辦理欽此又議準川省秋収豐稔米價平減應動藩庫乾隆八年分雜稅銀三萬兩地賦銀十二萬兩委官於成都等六府州縣附近水次出產米榖最多處分行採買交該地方官於沿江州縣空出倉厫内加謹収貯其採買不拘額數限期但遇價増卽行停止一運費雍正十三年覆準春糶秋還其折耗並脚價等費是所不免如遇秋糴價賤除諸費外果有盈餘應聽該州縣自行據實詳明以備地方平糶振濟之用該管上司不得藉端要挾勒令多報乾隆三年覆準平糶糧米旣令運米至鄉糶賣又令四鄉分路採買還倉應酌量道里逺近給與脚價覈明應需銀數在於藩庫存公項内先行借給仍於糶糧盈餘價内照數還項又覆準買補之時時價或有不敷及赴鄰邑並江廣產米處購買其盤費運脚如州縣自有盈餘卽於盈餘内動用報銷若本郡邑並無盈餘則申請於别屬盈餘内通融撥用倘别屬亦無盈餘則於藩庫存公銀内給發又覆準運穀到鄉平糶脚價卽於米價内支銷又覆準動撥湖南倉穀十萬石運徃閩省備用委總運官二人協運官四人在岳城賃船編列字號分運抵蘇其運穀水脚湖南至江南每石給水脚銀一錢五分貴時加增每石外加耗穀五合每石酒錢三釐神福三釐舵工一釐自湖南至漢口沿塗駮淺官給半費餘出船戸由