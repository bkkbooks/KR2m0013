與奉天理事通判錦州府知府一例定議佐領防禦等官照承緝例與州縣一例定議驍騎校與吏目典史等官一例定議乾隆七年覆準東四旗遊牧察哈爾總管所屬蒙古遇有命案照西四旗例分别議處一盜案康熙十七年議準八旗前鋒護軍驍騎及執事人等行劫被獲或被人出首經刑部審實將該管佐領驍騎校領催議處每佐領下有一二人者佐領罰俸一月驍騎校罰俸兩月領催鞭五十三四人者佐領罰俸兩月驍騎校罰俸三月領催鞭七十五六人者佐領罰俸六月驍騎校罰俸一年領催鞭八十七人至十人者佐領罰俸一年驍騎校降一級罰俸一年領催鞭一百十人以上者佐領降一級罰俸一年驍騎校革職領催鞭一百二十人以上者佐領革職驍騎校革職鞭一百折贖領催鞭一百革退如前鋒護軍匠役人等於該班當差日為盜將前鋒校護軍校有頂帶司匠皆照驍騎校例議處無頂帶司匠照領催例議處其本佐領驍騎校領催免議如平時在家為盜將本佐領驍騎校領催照例處分前鋒校護軍校司匠皆免議在京間散人及墳園住居之正身為盜一人至三人者佐領罰俸一月驍騎校罰俸兩月領催鞭五十四人至六人者佐領罰俸兩月驍騎校罰俸三月領催鞭七十七人至十人者佐領罰俸六月驍騎校罰俸一年領催鞭八十十人以上者佐領罰俸一年驍騎校降一級罰俸一年領催鞭一百二十人以上者佐領降一級罰俸一年驍騎校革職領催鞭一百革退有窩盜之事發覺者亦照此例議處若佐領驍騎校等奉差在外所屬內有為盜窩盜者將署事之佐領驍騎校領催分别議處其奉差之佐領驍騎校等皆免議至差遣在外之人行劫被獲將同差遣之該管官照佐領驍騎校例分别議處其內府管領及王貝勒貝子公各府屬管領管屯領催莊頭八旗滿洲蒙古漢軍屯領催等所管之人有為盜窩盜者內府管領照佐領例議處內府副管領及王府管領照驍騎校例議處貝勒以下各府管領管屯領催莊頭八旗屯領催皆照領催例議處該管官於事未發覺之先自行察出送部治罪者免議奴僕為盜窩盜家主繫官照兵役為盜之該管驍騎校例議處常人照兵役為盜之該管領催例議處其該管之各官皆免議若家主於事未發覺之先自行察出送部治罪者亦免議又題準京城內揠門掘壁踰牆行竊其賊繫正身將同居父兄議處繫户下人將家主議處初次行竊者其同居父兄及家主皆免議二次者同居父兄及家主繫官罰俸一月常人鞭四十三次者同居父兄及家主繫官罰俸兩月常人鞭五十又題準外省駐防兵丁有一二人為盜者該管佐領防禦驍騎校罰俸一年協領參領總管城守尉防守尉罰俸九月三四人者佐領等降一級留任協領等罰俸一年五六人者佐領等降一級罰俸一年協領等降一級留任七人至十人者佐領等降二級調用協領等降一級調用十人以上者佐領等革職協領等降二級調用如間散人內有一二人為盜者該管佐領防禦驍騎校罰俸六月協領參領總管城守尉防守尉罰俸三月三四人者佐領等罰俸一年協領等罰俸九月五六人者佐領等降一級留任協領等罰俸一年七人至十人者佐領等降一級調用協領等降一級留任十人以上者佐領等降二級調用協領等降一級調用其統轄之將軍都統副都統等本管兵丁有一二三人為盜者罰俸三月四五六人者罰俸六月七人以上者罰俸九月十一人以上者罰俸一年十六人以上者降一級留任二十一人以上者降二級留任三十一人以上者降三級調用間散人為盜一人至五人者將軍等罰俸三月至十人者罰俸六月十五人者罰俸九月二十人者罰俸一年三十人者降一級留任三十一人以上者降二級留任若兵丁之奴僕有一二人為盜者家主鞭一百三人以上者枷一月鞭一百該管之佐領防禦驍騎校罰俸六月將軍都統副都統總管城守尉協領參領防守尉各官皆免議如將軍都統以下駐防各官之奴僕為盜一二人者將家主罰俸一年三四人者降一級調用五六人以上者降二級調用十人以上者革職該管官皆免議如該管官及家主於事未發覺之先能自行察出治罪者免議兵丁間散人為盜該管各官奉差在外者免議二十五年題準步軍尉於一年內拏獲強盜五名者紀録一次十名紀録二次十五名加一級三十名加二級協尉副尉所屬步軍尉等於一年內拏獲強盜十名者紀録一次二十名紀録二次三十名加一級翼尉所屬本翼步軍尉等於一年內拏獲強盜二十名者紀録一次四十名紀録二次六十名加一級統領所屬八旗步軍尉及番役等於一年內拏獲強盜四十名者紀録一次八十名紀録二次百二十名加一級以上各官拏獲之數多者各照應得議敘計數遞加步軍尉於一年內拏獲竊賊光棍六十名以上者紀録一次一百二十名以上加一級二百四十名以上加二級協尉副尉所屬步軍尉等於一年內拏獲竊賊光棍一百二十名以上者紀録一次二百四十名以上加一級翼尉所屬本翼步軍尉等於一年內拏獲竊賊光棍二百四十名以上者紀録一次四百八十名以上加一級統領所屬八旗步軍尉及番役等於一年內拏獲竊賊光棍四百八十名以上者紀録一次九百六十名以上加一級以上各官拏獲之數多者各照應得議敘計數遞加如繫副尉協尉翼尉拏獲者準照步軍尉例議敘至步軍尉拏獲之數雖不及紀録統領翼尉仍總計議敘其拏獲各犯均由刑部定擬之後咨部議敘三十一年議準外省駐防旗人有犯串結土豪放債盤利開賭詐騙準折子女強買市肆擅砍樹木鬨市辱官者依律治罪如犯至枷三月鞭一百之罪者將該佐領防禦驍騎校降二級調用協領參領城守尉防守尉降一級留任將軍都統等罰俸一年如協領以下驍騎校以上各官有本身自犯此等罪者皆革職治罪該將軍都統等降一級留任佐領以下各官有犯者該管協領參領城守尉防尉降二級調用將軍都統等罰俸一年若各官縱子為惡有犯此等罪者降二級調用該管各官降一級留任將軍都統等罰俸一年至奴僕有犯此等罪者家主繫官照佐領例議處常人鞭一百該管各官皆免議又議準外省駐防城內強盜劫掠城池搶奪倉庫獄囚者將軍都統副都統各罰俸六月三十七年議準京城內有盜賊白晝殺人搶奪財物該汛步軍尉等將盜賊當場全獲及一月之內全獲者免議一月內獲一半者步軍尉罰俸一年步軍副尉協尉罰俸六月盜賊照案緝拏一月內無獲者步軍尉降二級調用步軍副尉協尉降一級調用所有加級紀録不準抵銷步軍翼尉罰俸一年步軍統領罰俸六月該汛步軍各鞭一百盜賊交接任官照案緝拏又議準盛京所屬看墳及居住之人有偷採人參者將故縱之屯領催枷一月鞭一百失察者鞭一百各旗佐領下人有偷採人參者將故縱之佐領驍騎校革職領催革退枷一月鞭一百失察者佐領驍騎校罰俸一年領催鞭一百內府佐領下有偷採人參者將故縱失察之內府佐領驍騎校領催皆照旗人例分别議處故縱之無頂帶管領枷一月鞭一百失察者鞭八十奴僕偷採人參家主不知者不坐知而故縱者繫官革職常人鞭八十知而詐稱不知者繫官革職常人鞭一百其應採人參之人必領票以為執照若無票私自行走或有票擅自越界並不照票內定數多帶人畜該巡察官徇情故縱者革職領催革退枷一月鞭一百兵鞭一百若得財縱放及將人參隱匿入已者交刑部治罪因巡察人參借端誣拏無辜之人者官革職兵枷兩月鞭一百奪取財物者官革職交刑部治罪兵枷三月鞭一百若被拏之人以受誣揑控審虛者照誣告律治罪至一應人等有毁壞盛京鳯凰城等處邊界寨柵私自出入官兵不行緝捕及通同受賄者皆照巡察官兵之例治罪又議準步軍領催將拏獲盜賊得財私放該管步軍尉失察其贓在十兩以下者罰俸一年十兩以上者降一級留任知情故縱者革職四十一年議準京城內盜賊傷人劫去財物將該泛步軍副尉協尉各罰俸九月步軍翼尉罰俸六月步軍統領罰俸三月盜賊照案緝拏該汛直日步軍尉降二級留任罰俸一年限一年緝拏本汛看街領催步軍及本汛看守柵闌步軍各鞭一百如一年內拏獲一半步軍尉準其開復一年限滿獲不及半無别案失事者步軍尉降二級調用領催步軍皆枷一月鞭八十限內無獲又失事者步軍尉降三級調用領催步軍枷四十日鞭一百革退未獲之犯交接任官照案緝拏驍騎堆撥相近處失事該班官罰俸一年驍騎照步軍例鞭責又議準惡徒肆行無忌或借端挾詐勒騙財物公然搶奪攪擾市肆行凶者責成該汛步軍尉並步軍翼尉協尉副尉隨時巡緝有失察者將步軍尉罰俸六月步軍協尉副尉罰俸兩月翼尉罰俸一月領催步軍鞭一百倘明知不緝拏者革職如得財私縱謊稱逃脫者革職並領催步軍皆交刑部治罪若領催步軍得財私縱謊稱逃脫該步軍尉並不知情者照失察步軍犯贓例處分又議準拏獲惡徒刑部審實照光棍例治罪者每佐領下一年內有一二人犯者佐領罰俸一月驍騎校罰俸兩月領催鞭五十三四人犯者佐領罰俸兩月驍騎校罰俸三月領催鞭七十五六人犯者佐領罰俸六月驍騎校罰俸九月領催鞭八十七人至十人犯者佐領罰俸九月驍騎校罰俸一年領催鞭一百有頂帶管領並該管司匠皆照驍騎校例議處屯領催照在京領催例治罪奴僕為光棍者家主繫官照驍騎校例議處常人照領催例治罪該管官免議如該管官及其主於事未發覺之先自行察出送部治罪者免議至一應有犯光棍之人若該管官奉差在外者免議將署理之人議處雍正八年議準地方有竊賊之案該汛步軍尉等於事主呈報之日即轉報步軍統領勒限半年緝拏限內獲賊免議逾限不獲將該汛步軍尉罰俸三月步軍協尉副尉各罰俸兩月直日領催步軍各鞭五十被獲之賊供由何柵闌行走者將守柵闌步軍鞭一百如别汛之官於限內獲賊者紀録一次十二年議準奉天各州縣及旗莊地方均照直隸各省州縣之例編立保甲互相稽察如遇失事同參疏防協領城守尉無論專管兼轄照督緝例與奉天府理事通判一例議處佐領防禦等照承緝例與州縣官一例議處驍騎校照吏目典史例議處有因獲盜議敘者亦照此例若奉天各處旗人有犯盜案經地方文職官訪知確實行文關會拘緝該管官有心牽制不差人協拏致盜脫逃者降二級調用失察者罰俸一年屯領催不協力緝拏者鞭八十若受財故縱交盛京刑部治罪如同城地方文職官獲盜司城之旗員得免議處又議準興京岫巖鳯凰城三處界內如遇失事將旗員劾參勒限緝拏地方文職官令其協緝又議準吉林白都訥寧古塔等處設番役緝拏盜賊其管轄番役官如能實心督率於限內將一案盜賊全獲者每案紀録二次逾限不獲照州縣印捕官初參二參三參四參之例議處又議準西四旗遊牧察哈爾總管所屬蒙古有為盜者照外省駐防兵丁及間散人為盜例按其名數將專管兼管統轄各官分别議處其太僕寺牧場官所部蒙古有為盜者察參到日將專管之協領兼轄之翼領統轄之總管照此例分别議處又議準看守一應倉庫之官兵拏獲竊賊者每案官紀録一次兵於竊賊名下追銀二兩給賞乾隆五年議準捕盜步軍尉每旗五人輪流直月遇該旗地方有強竊之案將捕盜步軍尉勒限承緝不獲照例議處又奏準直月捕盜步軍尉該旗地方遇有強盜之案於事主呈報之日起勒限半年緝拏限內獲盜免議不獲降一級留任罰俸六月再限一年緝拏一年內獲半準其開復不及半者照所降之級調用捕盜步軍鞭八十遇有竊賊之案於事主呈報之日起勒限半年緝拏限內獲賊免議不獲罰俸三月捕盜步軍鞭三十又覆準京城內強竊各案經直月捕盜步軍尉於限內緝獲者該汛步軍尉等準免議若别管官緝獲者直月捕盜步軍尉免議其該汛步軍尉仍議處七年議準京城內有強盜之案該汛步軍尉隱諱不報或以強報竊以多報少或賄囑事主通同隱諱者將步軍尉革職步軍副尉協尉翼尉扶同隱諱者降三級調用失察者降二級調用步軍統領知情降一級留任失察罰俸一年如盜已全獲皆免議若事主未經呈報及失事未有實據别經發覺者仍照承緝定議免以諱盜議處又議準京城內有竊賊之案該汛步軍尉隱諱不報者降一級留任勒限半年緝拏限內獲賊準其開復不獲降一級調用步軍副尉協尉扶同隱諱者照步軍尉例議處失察者罰俸六月勒限半年緝拏限滿不獲罰俸一年竊賊照案緝拏能察出呈報者仍照承緝例定議若事主未經呈報該汛步軍尉免議仍於發覺日為始將賊犯勒限半年緝拏不獲罰俸三月賊犯照案緝拏又議準看守倉廒各官被賊竊米者罰俸三月看守之兵鞭三十又議準漕糧運送到京有攔路戳袋及鑽穴踰牆進倉偷米之賊審繫食餉之人將該旗都統副都統罰俸三月參領罰俸六月佐領驍騎校罰俸一年領催鞭一百若間散人其父兄繫官罰俸一年常人鞭一百若奴僕家主繫官罰俸一年常人鞭一百七年覆準東四旗察哈爾總管所屬蒙古遇有盜案照西四旗例分别議處十四年議準旗人為竊罪至發遣以上者不能管束之該管官及家主皆照旗人為盜例議處一捕逃順治十五年議準旗下奴僕逃走在京限五日二百里內限十日四百里內限十五日其主即據實呈報投遞逃牌如限內不投遞者繫官罰俸一年常人鞭二十若竟遺漏不行投遞及投回未經銷案又復逃走其主並不再行投遞逃牌者繫官降一級留任常人鞭七十奴僕未曽逃走揑報逃走者繫官降一級調用常人鞭八十若將姓名年月錯開投遞者繫官罰俸一年常人鞭五十至本主之逃牌已給領催而領催遺漏不投遞者領催鞭七十康熙七年題準旗員窩隱逃人者革職繫常人交刑部治罪九年題準旗員將良民冒認為伊家奴僕逃走者降一級罰俸一年十年議準旗下逃人在駐防旗員所轄地方居住在六月以內者免議如過六月不行察拏窩家鄰右等亦不行出首或被逃人之主控告或被旁人出首將失察之該佐領防禦驍騎校各降一級留任過一年者將失察之該佐領防禦驍騎校每一人降二級調用若明知縱容居住者革職協領參領於該管屬官二年內有一員失察逃人者罰俸一年二員失察者降一級留任三員失察者降二級調用將軍都統副都統於所屬官二年內有一員至四員失察逃人者罰俸六月五員以上者降一級留任如於所轄地方察拏逃人十五名者將佐領防禦驍騎校各加一級三十名加二級協領參領於該管屬官察拏逃人三十名者加一級六十名加二級將軍都統副都統於所管屬官察拏逃人二百名者紀録一次四百名加一級於此數多者各照察拏之數遞加統以一年一敘若不足加級紀録之數者又并一年議敘仍不足者將前一年之數截去止留一年之數於次年接算不準三年合算以上均令將軍都統副都統等於歲終造册報部并報刑部察核又議準旗人逃走不許私自差拏或報部行提或在該地方官處首告拏解如私自差拏者繫官罰俸一年常人鞭一百失察之地方官及窩家之罪無庸議若私差家人往窩家取討衣物者亦照此例議處十二年題準凡八旗各官有逃走者革職交刑部治罪若官逃走該管官揑作常人投遞逃牌者罰俸一年又題準兵丁逃走該管佐領驍騎校不於限內投遞逃牌者罰俸一月若竟遺漏不行投遞及投回未經銷案又復脫逃該管官並不再行投遞逃牌者皆降一級留任兵丁未曽逃走揑報逃走投遞逃牌者降一級調用若將姓名日月錯開投遞者罰俸一年又議準八旗逃人已經投遞逃牌後忽謊稱不曾逃走者罰俸六月四十一年議準黑龍江寧古塔等處將軍捕牲總管等將發遣人犯每月收領若干人逃走若干人未獲若干人已獲若干人造册咨送刑部至年終該將軍等將總數開明具奏刑部會部察對若發遣人犯有逃走一名者其主繫官罰俸三月常人鞭五十至二三名者按數加罪一年內逃至五名者該佐領防禦驍騎校各罰俸一月領催鞭五十逃至十名者協領罰俸一月佐領防禦驍騎校各罰俸三月領催鞭五十逃至二十名者將軍副都統等罰俸一月協領罰俸三月佐領防禦驍騎校各罰俸六月領催鞭八十逃至三十名者將軍副都統等罰俸三月協領罰俸六月佐領防禦驍騎校罰俸一年領催鞭一百逃至四十名以上者將軍副都統等罰俸六月協領罰俸一年佐領防禦驍騎校各降一級罰俸一年領催枷二十日鞭一百捕牲總管照協領例議處翼領照佐領例議處將軍按統轄地方逃人總數議處副都統有專管地方者照該管處逃人數目議處至人犯逃走其主在城內居住者限即日呈報離城百里以內者限次日呈報百里以外者限三日內呈報該管官隨差本佐領驍騎校率兵協同逃人之主追緝如驍騎校公出即令記名領催率兵追緝仍將逃走緣由呈報該上司報部察核如本主已經呈報而該佐領等不即轉報遲至十日以內者佐領防禦驍騎校罰俸六月領催鞭四十十日以外者佐領防禦驍騎校罰俸一年領催鞭六十一月以上佐領防禦驍騎校降一級調用領催鞭八十兩月以上佐領防禦驍騎校革職領催鞭一百如家主逾限遲延不報繫官照佐領例常人照領催例分别議處該管官免議若家主於限內呈報者免議其各省駐防旗下家人及發往當差為奴人等私自逃走者伊主及該管官皆照此例滿洲漢軍副都統按翼分設者按該翼逃走人數議處又議準邉界管汛管渡官兵將貿易割草之人於去時登記數目回時按名核對若人數短少即行文知會蒙古緝拏若並不稽察致發遣人犯溷入貿易割草人數內逃入蒙古地方者將管汛渡之官降一級調用兵鞭八十又議準王公府屬之人有犯命盜重罪逃走者該衙門緝拏時即行文知會該府屬協拏如一年限滿不獲該衙門題參將辦理府屬家務官罰俸一年該王公等交宗人府察議未獲逃犯仍令照案協同緝拏雍正元年議準負罪潛逃之犯容留之家除確繫不知情者照律免議外知情容隱笞杖罪犯者繫官革職徒流以上罪犯者繫官革職治罪不準折贖常人交刑部治罪該管官失於覺察如所容隱之人犯笞杖罪者將佐領驍騎校罰俸兩月領催族長鞭二十五犯流徒罪者佐領驍騎校罰俸一年領催族長鞭五十參領副參領罰俸六月死罪及重案要犯佐領驍騎校降一級罰俸一年領催族長鞭六十參領副參領罰俸一年都統副都統罰俸六月若所屬隱匿流罪以下人犯該管官知情不首報者降二級調用領催族長鞭八十死罪及重案要犯該管官知情不首報者革職領催族長鞭一百凡族長繫官皆照佐領例議處外省駐防官兵隱匿罪犯該佐領防禦驍騎校照在京佐領例總管城守尉協領防守尉照參領例將軍副都統照都統例分别議處六年議準在京奉旨捕緝人犯並命案及關繫重案人犯脫逃城內者責成該泛步軍尉住俸限一年緝拏如於一月內拏獲者免議一年限滿不獲降一級調用若非經管應捕之官並各該管上司各官於一月內拏獲一名者紀録二次一月以外拏獲一名者紀録一次乾隆五年議準廣東駐防旗員有所屬兵丁或間散人及奴僕逃走者該旗訪知確實下落密移該地方文武官撥兵給票協同緝拏如不移會地方官徑自差拏者罰俸一月如逃人已出廣東地方移會該省緝拏報部旗員不得越境差拏一禁賭定例八旗間散人有犯賭博及開場容留賭博者該管都統將軍副都統失察五次者罰俸一月該總管城守尉參領署參領協領失察三次者罰俸一月佐領防禦驍騎校每次罰俸一月族長繫官每次罰俸兩月常人鞭二十五領催每次鞭五十又定兵役人等差遣在外有犯賭博者將領去之該管官照佐領例議處領催照佐領下領催例議處該旗各官皆免議又定內府王公府屬佐領下人有犯賭博者將該管領副管領府屬參領驍騎校領催族長皆照旗下參領佐領驍騎校領催族長之例分别議處該旗各官免議又定旗下奴僕有犯賭博家主繫官罰俸兩月常人鞭二十五該管官免議在屯居住之人有犯將屯領催鞭五十在京該管官免議至奴僕在屯有犯其主在屯居住者照例議處在京居住者免議雍正二年議準失察賭博應議各官若有因公他往者免議該管之上司拏獲者亦免議又議準在京旗下各官失察賭博如本旗拏獲準其免議若被别衙門拏獲者其失察之都統副都統參領佐領等仍議處外省駐防各官失察賭博如本旗拏獲準其免議若被别衙門拏獲其失察之該管將軍都統副都統協領參領佐領等仍議處又議準旗人製造賭具該管官訪緝拏獲者佐領防禦驍騎校加一級若拏獲之賭具繫描畫紙牌經刑部減等擬罪者拏獲官紀録二次該管上司於所屬一年內並無别案失察製造賭具舊藏賭具販賣賭具及失察賭博等事於歲終彚册報部由部核明繫拏獲製造賭具之案將參領副參領協領城守尉總管各官每案紀録二次都統將軍副都統每案紀録一次繫拏獲描畫紙牌之案經刑部減等擬罪者參領副參領協領城守尉總管各官每案紀録一次將軍都統副都統等無庸議敘該管上司於所屬一年內但有一案失察者將别案拏獲賭具一槩不準議敘如所屬有失察等案該上司自行察出者將察出之上司按其拏獲起數議敘倘該上司因所屬拏獲賭具希圖議敘將别案失察通同徇隱不報者降二級調用以上拏獲之賭具造自别處者將别處失察官議處拏獲之官議敘其造自本處之賭具實繫新製不過半年者方準議敘如繫逺年存留賭具或雖新製而失察已過半年止免失察處分不準議敘倘有逺年存留賭具揑報現今製造及製造已過半年而揑報在半年以內者將應議敘加一級者即降一級調用應議敘紀録二次者即罰俸一年應議敘紀録一次者即罰俸六月其各該上司中有能將揑報情由察出揭參者將揑報之官議處仍察明本案如上司例應議敘即將揭參之上司議敘如例不應議敘因其察出揭參準免議處此等拏獲賭具議敘各官均由承審衙門聲明咨部定議六年議準八旗凡有察拏賭博之責若明知不即察拏代為隱諱者官降三級調用兵鞭八十若已獲受賄縱放及借察拏名色詐害平人挾讐誣指者官革職兵革退皆交刑部治罪該管官不揭參者罰俸一年又議準八旗賭博委官專司察拏如未能察拏别經發覺者罰俸一年九年奏準八旗內外官兵及佐領下正身人等有製造賭具者將失察之佐領防禦驍騎校降二級調用參領副參領協領城守尉總管降二級留任將軍都統副都統罰俸一年族長繫官降二級調用常人鞭七十領催鞭八十至描畫紙牌經刑部審明將該犯減等擬罪者失察之佐領防禦驍騎校各降一級調用參領副參領協領城守尉總管降一級留任都統將軍副都統罰俸九月族長繫官降一級調用常人鞭六十領催鞭七十以上內外各官失察製造賭具如本旗拏獲準其免議若别衙門拏獲者失察之該管各官仍議處又奏準旗員失察製造賭具未及半年别經拏獲者準其免議若失察已過半年别經拏獲者仍議處十一年議準八旗後任官拏獲製造賭具之人察明前任官如失察未及半年離任者免議失察已過半年者仍照例議處若將失察已過半年之前任官揑報未及半年改移月日代為掩飾者除將該員拏獲之案不準議敘外仍罰俸一年未經察出之該管上司罰俸六月該管大員罰俸三月能察出者皆免議至拏獲之後官到任半年以內因賭博發覺究出製造賭具或舊存牌板刷印不過半年即能拏獲者皆準議敘其應議處議敘之各官該管大員察明到任離任日期於咨疏內聲明以慿定議十二年覆準失察賭博各官於議處時將該員從前拏獲賭具議敘之加級紀録悉行注銷如該員已經數任後有失察賭博之案將前任內拏獲賭具議敘之加級紀録一并注銷其該管上司除因所屬别員拏獲議敘之加級紀録不必注銷外如因失察賭博之屬員從前拏獲賭具同案議敘之加級紀録亦悉行注銷若該員失察賭博時該上司先已離任或該員調任别省其失察之處已與原上司無涉所有該上司從前因該員議敘之加級紀録免其注銷至上司本身失察賭博仍將從前所有自行拏獲賭具之加級紀録並因屬官拏獲賭具之加級紀録悉行注銷其失察製造賭具舊藏賭具及販賣賭具皆照此例行又議準凡開賭場鬭鵪鶉鬭雞鬬蟋蟀者照開場賭博例治罪其該管官亦照賭博例議處乾隆元年議準旗人操演射鵠者不必察禁外倘有特開賭場抽頭及容留不射箭買局賣局之人並大賭銀錢者即行緝拏交部照開場賭博律治罪三年奏準旗員賭博及開場容留賭博並上司與屬官賭博者皆革職治罪凡稽察屬官賭博將佐領防禦驍騎校等官責之參領副參領協尉城守尉總管等參領副參領協領城守尉總管等官責之都統將軍副都統等如明知屬員賭博不揭參者將專責之官降三級調用其有在該旗賭博失於覺察者該佐領防禦驍騎校每次罰俸六月參領副參領協領城守尉總管等失察三次者罰俸六月都統將軍副都統失察五次者罰俸六月如在該衙門及直班公所賭博將該處失察之官降一級留任本旗該管各官免議若察出揭報者亦免議又奏準官員賭博經刑部審實繫旗員拏獲者將首先拏獲之人每次紀録一次如繫番役拏獲者將步軍統領每次紀録一次又奏準兵丁犯賭將失察之該管佐領防禦驍騎校每一次罰俸三月該管參領副參領協領城守尉總管有失察三次者罰俸三月該管都統將軍副都統有失察五次者罰俸三月又奏準兵丁犯賭該族長繫官每一次罰俸兩月常人鞭二十五領催每次鞭五十又奏準兵丁在直班當差處賭博將該處失察之官照兵役犯賭例議處本旗該管各官免議若在别處賭博本旗該管各官仍議處又奏準旗下奴僕有犯製造賭具及描畫紙牌等事家主照佐領例議處該管各官免議若奴僕在屯莊居住製造賭具者將失察之屯領催照在京領催例議處家主在屯居住者照例議處在京居住者免議至旗人在屯製造賭具亦將屯領催議處在京該管官免議四年議準奉天等處地方並無緑旗武職其駐防旗員即有稽察地方之責如有賭博賭具等案將該將軍副都統等照提鎮例定議協領參領等照緑旗兼轄官例定議佐領防禦驍騎校等照緑旗專汛官例定議至在京步軍營各官各有分管地方如有賭博賭具等案將步軍統領翼尉照提鎮例定議步軍協尉副尉照緑旗兼轄官例定議步軍尉照緑旗專汛官例定議又奏準內府及王公府屬之人有製造賭具及描畫紙牌者將該管領副管領及府屬參領佐領驍騎校領催族長等照旗下參佐領驍騎校領催族長之例分别議處內務府總管王公府屬長史貝勒府司儀長照都統副都統之例議處該旗各官免議五年議準旗員拏獲製造賭具繫首先訪緝者將該員並該上司議敘如繫文官及營員內首先訪緝該員繫協同拏獲者協拏之官紀録一次即同任旗員此官首先訪緝彼官協同拏獲其協拏之官亦紀録一次如繫拏獲描畫紙牌之案經刑部減等擬罪者將協拏之官每二案紀録一次至協拏之上司無庸議敘此等協拏緣由協拏之官申報該上司轉報該管大員察實於咨疏內聲明準其議敘若並未協拏假揑協拏希圖議敘者降二級調用扶同隱飾之該上司降一級調用若該上司並非有心扶同但據詳轉報者罰俸六月該管大員未經察出罰俸三月如製造賭具之人失於覺察該管上司及該管大員拏獲者將屬官仍行議處拏獲之上司及該管大員議敘十四年奏準出境販賣賭具未過半年者首先拏獲之官加一級協拏之官紀録一次該管上司於年終彚議時察照本案議敘如首先拏獲之官繫加一級者該管兼轄官每案準其紀録二次統轄官每案準其紀録一次一緝私康熙二十四年議準在京旗人有私鑄私燬或攙和小錢行使者事發照例治罪該管官知情者革職治罪失察者驍騎校降一級罰俸一年佐領降一級留任參領罰俸兩月都統副都統罰俸一月領催鞭一百若本旗之人在别旗地方有犯者本旗各該管官亦照此例議處如旗人及民人在步軍營所管地方有犯者該汛步軍尉照驍騎校例步軍協尉照佐領例步軍翼尉統領照都統副都統例分别議處如奴僕有犯家主知情者照例治罪失察者繫官降二級留任常人鞭一百房主及鄰右知情者照例治罪失察者繫官降一級留任常人鞭一百若城外居住及看墳之奴僕有犯家主照此例議處看守房屋奴僕賃與他人有犯者奴僕照房主例治罪家主免議在屯莊處有犯屯領催照在京領催例議處家主及該管官皆免議凡失察之該管官有能自拏獲者不論年月逺近準其免議繫本旗之官拏獲者同旗失察官亦免議步軍統領衙門拏獲者該汛失察官免議內府番役拏獲者內府失察官免議若繫别衙門及别旗拏獲者其失察之該管官仍議處駐防旗人有犯驍騎校照在京驍騎校例佐領防禦照在京佐領例協領總管城守尉防守尉照在京參領例將軍都統副都統照在京都統副都統例分别議處又議準旗人販賣私鹽者照律治罪繫正身將該佐領驍騎校罰俸一月領催鞭五十繫內府所屬人將內管領副內管領罰俸一月領催鞭五十繫奴僕家主繫官罰俸兩月常人鞭七十若屯莊居住之旗人有犯將屯領催鞭五十該管佐領驍騎校領催皆免議至因公差遣之人有犯將領去之該管官各罰俸兩月領催等鞭五十有能自行拏獲者皆免議一處分雜例原定旗員鬭毆至折傷以上及屬官毆該管官者皆革職治罪若該管官擅毆屬官者降三級調用不相統屬之官彼此互相鬭毆者革職奴僕有犯毆辱官員者除照律治罪外家主繫官罰俸兩月又定屬官惡言詈罵該管官者革職至各官有事奉委稽察雖向無統屬若於稽察時詈罵稽察官者降一級罰俸一年稽察官於稽察處溷行詈罵者罰俸兩月又定八旗有買良為娼或將家下婦女故縱為娼者娼婦入官其主繫官革職枷一月鞭一百不準折贖常人枷三月鞭一百至家人將伊自置僕婦故縱為娼亦枷三月鞭一百其主不知情者繫官降一級留任仍罰俸一年常人鞭一百知情者繫官革職枷一月鞭一百常人枷三月鞭一百族長繫官罰俸一年常人鞭一百領催鞭一百驍騎校罰俸一年佐領罰俸六月參領罰俸三月都統副都統罰俸一月城內交與步軍統領翼尉協尉副尉步軍尉察拏若不行察拏或被旁人拏獲步軍尉罰俸一年協尉副尉罰俸六月翼尉罰俸三月統領罰俸一月又定旗人私往各處借端挾詐囑託營私擾纍平民者繫官革職交刑部治罪常人交刑部治罪佐領驍騎校知而令去者降二級調用失察者佐領罰俸三月驍騎校罰俸六月領催鞭八十若奴僕以事差遣有犯此等者其主知情故縱繫官革職常人鞭一百奴僕交刑部治罪至旗人私往各處取債探親者繫官革職常人鞭一百佐領驍騎校知而令去者罰俸一年失察者佐領罰俸一月驍騎校罰俸三月領催鞭五十差遣奴僕前往取債探親者家主繫官罰俸一年常人鞭八十奴僕亦鞭八十其屯莊居住之人並奴僕私自出境亦犯此等者屯領催照在京領催例鞭責該佐領驍騎校在京領催及奴僕之主皆免議又定城內旗人將誘來人口隱藏在家販賣本佐領驍騎校領催明知匿而不首者佐領驍騎校皆革職領催枷一月鞭一百不知情失於覺察者佐領罰俸一月驍騎校罰俸三月領催鞭五十至旗下家人將誘來人口隱藏在家販賣伊主明知匿而不首者繫官革職常人枷一月鞭一百不知情失於覺察者伊主繫官罰俸三月常人鞭五十此內各該管之人或拏獲或出首或犯人自投首者該管各官並伊主皆免議其城外園內居住家人有犯此等者將伊主亦照此例議處在屯內住者將屯領催照旗下領催治罪又定八旗莊頭家人在外倚勢害民霸占平人子女威逼人命把持衙門此等事發繫內務府所轄將該管官降一級留任繫王公府屬所轄將辦理家務官降一級留任繫民公以下大小官員家人將其主降一級留任又定凡聚衆搶奪路行婦女及以藥餅撲項邪術迷拐男婦子女將失察之該汛步軍尉罰俸一年步軍協尉副尉罰俸六月如八旗佐領下人有犯此等者將失察之該佐領驍騎校罰俸一年領催鞭八十內府佐領內管領下人有犯此等者將失察之該內管領副內管領佐領驍騎校罰俸一年領催鞭八十又定旗員拏獲人犯應送有司審理者不許越俎若繫應行審理之案擅用非刑或將婦人夾訊者不論致死未致死皆革職該管上司不據實察報者降二級調用該將軍都統副都統不題參者降一級留任若將孕婦擅拶者降一級調用該管上司不據實察報者罰俸一年將軍都統副都統不題參者罰俸六月其番役兵丁私用非刑害人該管官不能察究者革職又定旗員將步軍拏至家中拘禁毆打者審實革職傷損者革職交刑部治罪染病祭祀嫁娶燕會行走步軍故意抑勒不放行者步軍鞭五十因被步軍抑勒即行責打有傷者罰俸六月又定佐領非繫公事將佐領下男婦無故責打者罰俸一年挾讐責打者降一級罰俸一年如因需索不遂責打者革職嚇詐財物者革職治罪又定間散人辱罵職官該員不送該管官懲治竟行責打損傷者罰俸三月又定王公等將旗分之人妄行擾纍未經請旨即行治罪者該都統等據實具奏若瞻徇隱匿不具奏者降三級調用又定旗員將禁止處番僧私請至家治病令其過宿者革職又定旗員因公差遣帶去兵丁有患病事故私行留住不交彼處該管官先回者罰俸一月又定旗員誣告人罪審屬全虛照律分别加等如告二事以上輕事審實重事審虛或告一事誣輕為重者皆反坐所剩之罪若告二事以上重事審實輕事審虛及數事罪本相等但一事告實者皆免罪又定旗員初次叩閽審虛者罰俸九月若已經叩閽審虛復稱寃枉叩閽者降二級調用常人交刑部治罪若於原辭之外復揑造言語叩閽審虛者除照例處分外繫官再降二級調用又定被告證左旗員偏徇揑供誣人至死罪者革職流罪降三級調用徒罪降一級調用杖罪罰俸一年笞罪罰俸六月又定駐防官貪酷殃民剋扣錢糧被人告發該將軍都統副都統不即審理者降一級罰俸一年其將軍統轄之城守尉等所屬各官有犯貪酷等款該城守尉等據告即為審明轉報將軍等察核無將軍統轄者即為審明報部若不即審理呈報亦照此例議處又定內外大小旗員有闕該管大員簡選擬補時有爭告者將具告之人並擬補之人秉公衡量人材勞績照例辦理如人材勞績不及擬補之人仍妄行爭告者參奏請旨交部確察妄告屬實繫官降二級調用常人交刑部治罪若擬補不當經部審出將該管大員降一級罰俸一年又定內外旗員於引見時不候諭旨即將所得功牌瀆奏者罰俸六月又定世爵官身故該佐領等具保實無應襲之人將敕書繳部奏明注銷之後原保之佐領等復揑稱尚有應襲之人妄行呈告者革職又定世爵官病故已將族中兄弟兄弟之子保送承襲後故官之妻及族人復將不應承襲之人告請承襲者鞭一百婦人照例折贖族人繫官降二級調用若承襲世爵有舛錯等弊將含糊出結官降一級罰俸一年又定凡應承襲之世爵遺漏未經承襲者承辦官罰俸一年該管大員罰俸六月又定京城內外黏貼匿名揭帖該步軍尉等不即察拏别經發覺將步軍尉罰俸一年協尉副尉罰俸六月翼尉罰俸三月統領罰俸一月又定旗員將已嫁之女經部斷不準離異仍留在家不送回者罰俸兩月若已斷離異不行領回復行強送毆壻者罰俸一年又定旗員家人犯贓其主不知情失於覺察者降一級調用康熙二十三年議準旗員因事夤緣餽送禮物與者受者皆革職提問如餽送雖未收受並未出首後經發覺將不出首官罰俸一年三十八年議準旗員宿娼者革職姦家下有夫之婦者降一級罰俸一年姦軍民妻者革職強姦軍民妻及姦官員妻者革職治罪拏獲姦夫姦婦私放者罰俸一年得財者革職又議準旗員將有夫之婦知而娶者革職不知者免議雍正元年奉旨旗員為外吏者每為該旗都統參領各官所制自司道以至州縣於將選之時必勒索重賄方肯出結咨部及得官後復遣人往其任所或稱平日受恩勒令酬報或稱家有婚喪等事緩急求助或以舊日私事要挾至五旗諸王府不體下情分外勒取或縱管事人肆意貪求種種勒索不可枚舉以致該員竭蹶餽送不能潔已自好凡虧空公帑罹罪罷黜者多由於此嗣後如有仍蹈前轍恣意需索等弊許本官據實封章密詳督撫轉奏督撫即據詳密奏倘督撫瞻顧容隱即許本官封章揭都察院轉為密奏倘不為奏聞即各御史亦得據揭密奏務期通逹下情以除積弊外任旗員勿得隱忍畏懼朕不治以干犯舉首之罪又議準八旗賞給兵丁之物該管官侵欺者革職交刑部治罪同官明知侵欺於部問時不據實直供者降二級調用若並不知侵欺失於覺察者罰俸六月十一年議準旗員科斂所屬官兵財物入已及餽送人者皆革職計贓治罪若因公朋扣財物不入已者為首降一級調用為從罰俸一年至並非因公或一時朋扣財物並不入已為首者罰俸一年為從者罰俸九月乾隆六年奏準在京八旗及外省駐防衙門在官兵役指稱公事犯贓該管官知情者革職失察贓至十兩以上者降一級留任不及十兩者罰俸一年欽定大清會典則例卷一百十七
