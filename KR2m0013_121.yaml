body:
  text: 兵部職方清吏司公式二八旗一章奏文册康熙十一年題準內外旗員有不繫密事妄稱密奏及借公行私以私事具奏者降二級調用其一應本章有不應密而密者罰俸六月雍正五年議準在京八旗除行文傳集在京官員人等不用封套外凡咨行部院衙門及外省一應公文均加封套實封事關重大者釘封至駐防將軍都統副都統等題奏本章事關緊要者將副本揭帖用密封字樣封固投遞通政使司咨行各旗及各部院並與屬官來往公文繫緊要事亦用密封以上內外都統將軍副都統等收到緊要密封公文均親拆收貯如將應密之事不密以致泄漏重者降一級留任輕者罰俸九月六年議準八旗衙門封印前一日於空紙及封套上豫行用印登記數目該都統等收貯以備封印後遇有緊要之事填用仍登記用過數目開印日將未用者驗明銷燬有借端作弊者交部治罪該都統等不行詳察罰俸六月又議準印文及出關票引有遺失者官罰俸三月兵鞭五十均仍補給十一年議準八旗各官具摺奏事奉有硃批諭旨者在京即行恭繳在外於下次奏事之便封固恭繳若任意遲延及隱匿不繳者革職十二年奏準差往馬場副都統起程之前將空紙封套鈐用本旗都統印信酌量足用數目帶往以備咨行之用回日將用過數目開明知照都統存案未用者當面銷燬倘有遺失者將差往副都統罰俸三月又議準八旗傳事印文傳畢即行取回銷燬倘不察收致人藉以夜行者承辦官罰俸兩月若將豫備傳事印文收貯不謹被人竊去夜行者承辦官罰俸六月乾隆三年奏準外任將軍都統副都統等奉有硃批諭旨未及恭繳之先有緣事降革及病故者於回旗之日或本人或親屬呈明該旗都統等代為恭繳如隱匿收存察出治罪七年奏準諸王貝勒貝子公等有行文該旗之事該長史並辦理家務之人列名用府屬參領關防送至該旗其有行文部院各衙門者用府屬參領關防送至該旗由該旗用印轉行如長史等不鈐用參領關防仍用白文及該旗將白文接受者各罰俸一年又議準旗員造報錢糧文册並不分晰明白以致款項不符者降一級調用轉報官罰俸一年將軍都統等罰俸六月將軍都統等核參者將造報轉報之人議處若文册內數目舛錯遺漏者造報官罰俸一年都統及轉報官各罰俸六月繫將軍都統等自行造報有舛錯遺漏者亦罰俸六月至造報舛錯遺漏非關錢糧之案者造報官罰俸六月轉報官罰俸三月一儀制八旗官員僭用引馬及馬項繁纓者罰俸六月該管官知而不禁者罰俸三月又定鑾儀衛儀仗如有遺失者掌衛事內大臣鑾儀使各罰俸三月該管冠軍使雲麾使治儀正整儀尉各罰俸九月損壞不呈請更換者該管冠軍使以下各官皆罰俸一月又定陵寢儀仗等物有遺失者該管官罰俸九月損壞不呈請更換者罰俸一月康熙四十二年覆準旗員於應用朝服之日不用及違例錯用者罰俸一月雍正二年覆準旗員恭遇升殿慶典及迎接詔書有失誤不到者罰俸六月所司已接部寺等衙門知會不即傳知者亦罰俸六月接駕不到及常朝不到者罰俸一月至朝賀齊集各官有班行不正跪立不齊者罰俸一月稽察官不舉報者議處之例同八年議準凡遇祭祀壇廟應行陪祀各官由部於前期數日將八旗都統副都統等繕名籖恭請欽點八人稽察齋戒祀畢仍將陪祀各官開列奏聞若應陪祀各官無故不行齋戒或已開齋戒不至齊集處者罰俸一年該管大員不行察參者罰俸六月若臨期後至不及陪祀者罰俸一月又議準官員遇常朝日托故不到者罰俸一月未朝詐稱己朝者罰俸一年揑供同朝之官罰俸兩月其已注病不在家他出者罰俸一年至無故出城過宿失誤朝期者革職如因掃墓醫病等事不及進城者罰俸一月十三年奏準旗員文武兼任者文職品級大用文職補服武職品級大用武職補服如品級相同用文職補服違者罰俸六月該管官知而不禁者罰俸三月補服與帽頂坐褥不相符者亦照此例議處乾隆元年議準朝會齊集之日看守午門端門闕門各官不將間雜書役人等攔阻聽其肆行出入者察由何門出入將該管門官罰俸一月至坐班行禮之際各官僕從令該旗所委驍騎校並看守朝房之步軍尉盡行逐出如不行逐出經稽察官參奏將該驍騎校步軍尉及僕從之主各罰俸一月三年奏準大朝大祀日暨車駕出入各官僕從肆行喧譁爭競衝突擁擠者拏交刑部杖一百其主罰俸三月常朝日有肆行喧譁爭競衝突擁擠者交刑部杖六十其主罰俸一月至在內執事人並大臣侍衛之僕從犯者交各該管衙門治罪又議準喪儀齊集之處有失誤不到者罰俸六月所司已接承辦衙門知會不即傳知者亦罰俸六月七年奏準旗員有瘋疾者令其親屬看管疾愈之後該管官仍留心試看一年果已全愈方準上朝其大內監工及守衛紫禁城之處永停差委在外仍行差委若疾愈未過一年即令上朝或仍差委大內監工守衛紫禁城者該管官罰俸九月又奏準八旗婚喪等事所用器物有違例僭越者繫官罰俸一年常人鞭五十失察之佐領驍騎校各罰俸六月領催族長鞭三十族長繫官亦罰俸六月該管參領副參領罰俸三月該管大員及察旗各官不行察出者皆罰俸兩月若有一處察出皆準免議又議準八旗官兵服色均有定制如僭用五爪龍立龍圓補服之類者繫官革職兵及間散人交刑部治罪僭用之物入官未經察出之佐領驍騎校每案罰俸三月參領副參領每二案罰俸三月都統副都統每三案罰俸三月領催族長鞭五十若奴僕有犯交刑部治罪其主繫官罰俸三月常人鞭五十該管各官皆免議僭用尋常服色者繫官罰俸一年兵及間散人鞭五十未經察出之佐領驍騎校每案罰俸一月參領副參領每二案罰俸一月都統副都統每三案罰俸一月領催族長鞭二十五若奴僕有犯鞭五十其主繫官罰俸一月常人鞭二十五該管各官皆免議以上應議之族長繫官照佐領例議處又奏準在外將軍都統副都統以下協領以上見任來京者若並無疾病事故凡值祭祀耕藉之期先期在附近地方齋宿仍聲明齋宿之處以慿稽察屆期投遞職名各按品級排班行禮恭遇御殿受賀諸大典禮亦一例排班行禮將軍都統列於在京都統之次副都統列於在京副都統之次協領列於在京參領之次十三年議準旗員應陪祀者於期前將職名造册送部其有故不能陪祀者於各該員名下注明祭祀之日由部委官於齊集處察收職名有不到者指名參奏若陪祀各官於齊集之日偶患疾病不能到者將情由呈報稽察衙門一錢糧康熙年間定八旗支領錢糧該參領佐領驍騎校等親赴户部銀庫與該管官公同稱兑支領之後佐領驍騎校親看散給如支領時參領佐領驍騎校不親赴銀庫各罰俸一年佐領驍騎校不親看散給致領催侵漁短少者降一級調用明知領催扣剋不即呈報者降三級調用通同扣剋者革職交刑部治罪又定旗員將正雜錢糧擅自那移别用者革職若因緊急軍需未經報明該管官私自那移應用者降一級留任俟銷算清完之日開復至存留公用錢糧因公那移者免議那移米豆草者亦照此例分别議處又定旗員有經管倉庫錢糧及承追拖欠等項若乾沒侵欺者革職交刑部治罪領催人等乾沒侵欺者交刑部治罪該管官革職如佐領驍騎校侵欺該管之參領副參領不行察出者降一級調用都統將軍副都統罰俸一年又定在京旗員有降罰處分奉旨後即行注册一面知照户部及該旗領俸時該旗將該員降罰之處聲明造册送部由外任升調京職者若有隨帶降罰之案本人呈報該旗造册送部由部將各員原有降罰並見在應照何品級食俸逐一察明轉送户部核給其造册送部之後有奉旨新用人員無原俸可支者及緣事開復未經開缺者春季在正月三十日以前秋季在七月三十日以前準造册補領過此限者不準革職之人即行裁扣又定旗員應支俸銀俸米春季於上年十二月十五日以前秋季於六月十五日以前造册送部兵丁應領錢糧於上月十五日以前馬駝應領銀錢於上月十八日以前造册送部若册內數有舛錯並總撒不符由户部即傳該旗承辦官改正仍將册領回三日內鈐印送部如三日內不行送部及各項册不依限造送者將承辦官照遲延例議處其應領之米户部移咨倉場限兩月內支放全完不完將監放之旗員察參違限不及一月者罰俸三月一月以上者罰俸六月二月以上者罰俸一年如監放五年均限內清楚並無生事作弊者紀録一次又定八旗宗室覺羅及滿洲蒙古漢軍武職各官俸銀俸米兵丁錢糧馬駝銀錢由該旗依限造册送部將增減數目察對轉咨户部核給俟歲終由部將一年內官兵支過銀數繕册一本米數繕册一本馬駝銀錢數繕册一本恭呈御覽又議準八旗有承追之銀千兩以下者於文到日限一年追完不完將佐領驍騎校罰俸一年參領署參領罰俸六月都統副都統罰俸三月再限一年不完佐領驍騎校降一級留任參領署參領罰俸一年都統副都統罰俸六月再限一年追完佐領驍騎校開復不完照所降之級調用參領署參領降一級留任都統副都統罰俸一年承追千兩至五千兩者以五年為期每案每年追完二分不及二分者佐領驍騎校初參降俸一級二參罰俸一年三參降一級四參再降一級皆留任五年限滿追完開復不完照所降之級調用承追五千兩以上者以十分為率勒限五年佐領驍騎校初參不完降俸二級二參罰俸一年三參降一級四參再降一級皆留任五年限滿能完至七分者準其開復未完之銀再行按年起限不及七分照所降之級調用督催各官千兩至五千以上者每案勒限五年按數督催遞年完至二分者免議不及二分者參領署參領初參罰俸六月二參罰俸九月三參罰俸一年四參降一級留任五年限滿全完開復不完降二級留任都統副都統每案初參罰俸三月一參罰俸六月三參罰俸九月四參罰俸一年五年限滿無完降一級留任未完之銀再行按年起限追完開復至接任承追督催各官均以任事之日起扣限追催如本人實繫無力完帑佐領驍騎校出結報明參領轉報都統副都統奏請豁免不得株連親族倘濫行著落親族代賠將承追官革職若豁免後本人見有隱暪産業悉行入官將出結之佐領驍騎校革職轉報之參領署參領降二級調用奏請之都統等罰俸一年所欠之銀著落出結之佐領驍騎校賠補如該管都統副都統及參領署參領有逼勒出結之事不行出首者將出結並逼勒之官皆革職又議準佐領驍騎校有承追之銀於一年限內追完三百兩以上之案者每案紀録一次千兩以上之案五年限內追完者紀録一次參領署參領追完三百兩以上之案者每三案紀録一次都統副都統追完三百兩以上之案者每十案紀録一次接任官以任事之日起限於一年限內追完千兩以上之案者加一級五千兩以上之案者加二級萬兩以上之案者加三級此等加級遇别案承追應降調者準其抵銷若於一年限內追完萬五千兩以上之案者以應升之官即用又議準八旗有冒領錢糧者繫官革職兵革退皆交刑部治罪通同徇隱之佐領驍騎校革職領催鞭一百革退轉報之參領署參領罰俸一年都統副都統罰俸六月若佐領下人冒領不行詳察之佐領驍騎校罰俸一年參領署參領罰俸六月都統副都統罰俸兩月雍正元年議準八旗兵丁揭借私債以應領銀米充為利息該管佐領驍騎校知情者革職參領副參領罰俸一年領催鞭一百革退失察者驍騎校降一級留任佐領罰俸一年參領副參領罰俸九月領催