body:
  text: 禮部儀制清吏司相見禮一內外王公相見儀崇德年間定外藩親王來見親王主人出殿降階迎主人居左賓居右由殿中門入主人西面立賓東面立行二跪六叩禮就坐主人位於東賓位於西從官於殿外行二跪六叩禮從賓後坐辭退從官行一跪一叩禮先退賓離位行一跪一叩禮主人答禮如之送至初迎處本府官屬送至府門外退外藩郡王來見主人出殿迎不降階由中門先入賓隨入行二跪六叩禮主人跪受半禮答半禮辭退賓離坐行一跪一叩禮主人跪拱手不叩興送至初迎處餘儀與外藩親王見同外藩貝勒來見主人離坐迎不出殿賓由殿右門入行二跪六叩禮主人拱手立受就坐主人位正中賓位西旁辭退賓離坐行一跪一叩禮主人立受如初賓出不送餘儀與外藩郡王見同外藩貝子公來見府屬官引進殿內行二跪六叩禮主人拱手正坐受辭退賓離坐行一跪一叩禮主人坐受如初從官退至原叩處行一跪一叩禮畢出餘儀與外藩貝勒見同外藩親王來見郡王主人迎送於大門內辭退賓主人各就坐行一跪一叩禮餘儀與見親王同外藩郡王來見與內外親王相見同外藩貝勒來見與外藩郡王見親王同外藩貝子來見與外藩貝勒見親王同外藩公來見郡王與見親王同外藩親王來見貝勒主人迎於府門外賓先行主人稍後入行一跪三叩禮從官行禮亦一跪三叩辭退送至初迎處餘儀與見郡王同外藩郡王來見賓主及從官行禮均一跪三叩餘儀與外藩親王見郡王同外藩貝勒來見賓主行禮咸一跪三叩餘儀與內外郡王相見同外藩貝子來見賓主行禮咸一跪三叩餘儀與外藩貝勒見郡王同外藩公來見與外藩貝子見郡王同外藩王貝勒來見貝子貝子迎於大門外賓先行主人隨入賓主行一跪一叩禮從官亦一跪一叩主人拱手坐受辭退從官行禮拱受如初送賓於初迎處候乘馬乃退餘儀與外藩郡王見貝勒同外藩貝子來見賓主行禮咸一跪一叩餘儀與內外貝勒相見同外藩公來見賓主行禮咸一跪一叩餘儀與外藩貝子見貝勒同外藩王貝勒來見公與見貝子同外藩貝子來見迎送於大門內餘儀與外藩貝勒見貝子同外藩公來與內外貝子相見同一王公塗遇儀崇德元年定親王出行郡王遇讓道行貝勒遇執事回避讓道旁行貝子鎮國公固倫額駙和碩公主額駙遇勒馬鞠躬側立道旁候過輔國公鎮國將軍民公都統尚書以下皆下馬立道旁候過固倫公主和碩公主遇相讓尊長在先分路行郡主以下縣君以上遇停車候過郡王出行貝勒公主以下遇與遇親王回避儀同貝勒出行貝子鎮國公固倫額駙和碩公主額駙遇讓道旁行輔國公鎮國將軍民公都統尚書遇勒馬側立道旁候過輔國將軍副都統侍郎等官以下皆下馬立道旁候過固倫公主和碩公主遇貝勒讓道行郡主縣主郡君遇相讓分路行縣君遇停車候過貝子出行鎮國公和碩公主額駙遇分路行輔國公鎮國將軍民公都統尚書遇讓道旁行輔國將軍副都統侍郎及參領等官遇勒馬側立道旁候過佐領等官以下皆下馬候過固倫公主和碩公主遇貝子勒馬候過郡主縣主遇貝子讓道行郡君縣君遇相讓分路行鎮國公出行輔國公鎮國將軍民公都統尚書遇分路行輔國將軍副都統侍郎及參領等官遇勒馬側立道旁候過佐領以下等官皆下馬候過輔國公出行鎮國將軍都統尚書等官遇分路行輔國將軍副都統侍郎等官遇讓道旁行奉國將軍參領佐領等官遇勒馬立於道旁候過護軍校驍騎校等官及軍民人等皆下馬候過鎮國將軍出行輔國將軍副都統侍郎等官遇分路行奉國將軍參領佐領等官遇勒馬立於道傍候過護軍校驍騎校等官及軍民人等皆下馬候過輔國將軍出行奉國將軍參領等官遇讓道旁行佐領等官遇勒馬候過護軍校驍騎校等官及軍民人等皆下馬候過奉國將軍出行佐領等官遇讓道行護軍校驍騎校等官及軍民人等皆勒馬候過間散宗室遇親王以下輔國將軍以上皆下馬遇民公以下大臣皆不下馬分路行覺羅有職者各照品級回避無職者遇親王以下輔國將軍以上皆下馬遇民公都統尚書等官皆引馬回避其餘各官皆不回避讓道行凡奉欽差及齎奉敕旨或欽賜恩賞者遇王等於道及過王府門皆不下馬又定親王府門郡王過並隨從人員皆不下馬貝勒過鞠躬趨馬過隨從人員皆下馬親王福晉郡王福晉過序長幼應下車者步行過不應下車者徑過隨從婦女各照其主固倫公主和碩公主郡主縣主過並隨從婦女皆不下車馬隨從人員皆下馬郡君縣君過不下車隨從男婦皆下車馬貝子和碩公主額駙民公以下官員及軍民人等過皆下馬貝勒夫人以下官員命婦及軍民人等婦女過皆下車馬郡王府門與親王同貝勒府門貝子鎮國公過不下馬隨從人員皆下馬輔國公和碩公主額駙民公以下官員及軍民人等過皆下馬貝勒夫人過序長幼應下車者步行過不應下車者徑過隨從婦女各照其主郡君縣君過並隨從婦女皆不下車馬隨從人員皆下馬貝子夫人以下官員命婦及軍民人等婦女過皆下車馬康熙十八年題準和碩公主遇親王郡王停車候過遇貝勒相讓分路行遇貝子貝子讓道行和碩公主額駙郡主額駙遇親王郡王皆下馬立道旁候過遇貝勒勒馬側立道旁候過遇貝子讓道旁行遇鎮國公分路行間散宗室遇和碩公主額駙不下馬分路行覺羅無職者遇和碩公主額駙不下馬引馬回避餘均照舊例行一王貝勒府屬慶賀儀崇德元年定親王生辰及元日該旗都統以下佐領以上官員齊集稱賀行二跪六叩禮郡王生辰及元日本府屬員齊集稱賀行二跪六叩禮貝勒生辰及元日本府屬員齊集稱賀行一跪三叩禮若該屬官員無事不至府慶賀者治罪順治九年題準親王郡王貝勒生辰及元日該府屬員聼鳴贊人員贊唱行禮作樂其鳴贊人員聽各府選擇一京官相見儀雍正五年定八旗官於本署白事都統副都統前參領侍立佐領以下官屈一膝其侍衛藍翎侍衛及騎都尉以上之副參領署參領並視參領雲騎尉以下之副參領並視佐領驍騎校等官白事於參領前屈一膝佐領前侍立步軍副尉在步軍統領前屈一膝翼尉前侍立步軍尉城門領在統領翼尉前咸屈一膝在協尉前侍立公所白事都統副都統前男以上官侍立輕車都尉以下官屈一膝管旗務之王貝勒貝子入八分公前參領以下官咸屈一膝佐領繫大臣兼攝者從其品繫小京堂及科道等官兼攝者視參領繫宗室於八旗都統前皆侍立前鋒統領護軍統領前前鋒參領侍衛護軍參領侍衛以下騎都尉以上之各副參領署參領並視八旗參領雲騎尉以下副參領署參領及護軍參領署參領並視八旗佐領前鋒校護軍校視八旗驍騎校如八旗官白事於别旗各長官與本旗同有越分違例者該管大員並稽察八旗御史題參議處又奉旨宗室管佐領白事於王公前皆著屈一膝又定各部院司官路遇堂官勒馬候過在本署理事堂官上坐司官侍立若事件繁多司官設褥席地序坐如在朝房堂官席地坐司官屈一膝白事堂官前往來皆趨過滿漢司官一例遵行不得互異違者堂官指參議處其漢科道亦照滿科道儀節違者如之堂官如徇情容隱察出一并議處一京官途遇儀崇德元年定固倫額駙出行鎮國公和碩公主額駙遇分路行輔國公鎮國將軍民公都統尚書等官遇讓道旁行輔國將軍副都統侍郎及參領等官遇勒馬立於道旁候過佐領等官以下遇皆下馬候過若額駙繫親王郡王貝勒各照本爵超品公和碩公主額駙出行都統子尚書等官遇讓道旁行副都統侍郎參領等官遇勒馬立於道旁候過佐領等官以下遇皆下馬候過若額駙繫親王郡王貝勒貝子各照本爵民公郡主額駙出行都統子尚書等官遇分路行副都統侍郎等官遇讓道旁行參領佐領等官遇勒馬立於道旁候過護軍校驍騎校等官及軍民人等皆下馬候過都統子尚書縣主額駙出行副都統侍郎等官遇讓道旁行參領佐領等官遇勒馬立於道旁侯過護軍校驍騎校等官及軍民人等皆下馬候過內大臣副都統護軍統領前鋒統領郡君額駙大學士侍郎等官出行參領等官遇讓道旁行佐領等官遇勒馬候過護軍校驍騎校等官及軍民人等皆下馬侯過一等侍衛護衛參領前鋒參領縣君額駙學士滿啓心郎郎中等官出行佐領等官遇讓道旁行護軍校驍騎校等官及軍民人等皆勒馬候過二等侍衛護衛鄉君額駙佐領漢啓心郎員外郎等官出行護軍校驍騎校等官及軍民人等遇讓道行超品公以下文武各官命婦皆照本夫回避例凡奉欽差及奉齎敕旨或欽賜恩賞者遇應回避官不下馬分路行順治八年題準官員回避等儀均與崇德元年定例同其新設官貟侯伯與民公同男與副都統同輕車都尉與參領同騎都尉雲騎尉與佐領同內大臣改與都統同九年題準民公和碩公主額駙郡主額駙侯伯出行都統子尚書等官遇分路行副都統侍郎等官遇讓道旁行參領郎中佐領員外郎雲騎尉主事等官遇勒馬立於道旁候過護軍校驍騎校等官及軍民人等皆下馬候過都統內大臣子尚書縣主額駙出行副都統侍郎等官遇讓道旁行參領郎中佐領員外郎雲騎尉主事等官遇勒馬立於道旁候過護軍校驍騎校等官及軍民人等皆下馬候過護軍統領步軍統領副都統侍郎男前鋒統領郡君額駙等官出行參領郎中等官遇讓道旁行佐領貟外郎雲騎尉主事等官遇勒馬候過護軍校驍騎校等官及軍民人等皆下馬候過一等侍衛護衛參領輕車都尉郎中縣君額駙等官出行佐領員外郎雲騎尉主事等官遇讓道旁行護軍校驍騎校等官及軍民人等遇皆勒馬候過二等侍衛護衛騎都尉佐領員外郎鄉君額駙雲騎尉主事等官出行護軍校驍騎校等官及軍民人等遇讓道旁行民公以下文武各官命婦均照本夫回避例康熙十八年題準在京武職民公侯伯以下散秩大臣男以上文職大學士尚書以下學士大九卿以上許用引馬一官卑及軍民人等遇皆照例下馬回避違者送該部議處其不應用引馬而擅用者官交該部議處民交刑部治罪一直省文職官相見儀康熙三十三年定督撫開門視事撫先督後每月逢五逢十督撫司道府廰等官均停相見大小各官除朝賀祭祀及到任外相見不具朝服雍正八年定總督河道總督漕運總督巡撫觀風整俗使學院巡鹽御史巡察御史巡視臺灣御史相見坐次及文移均平行司道見督撫大門外下轎由左門進督撫迎至堂後屛內初見用履歷手本具補服行庭參禮督撫親扶免三揖常見用官銜手本三揖坐次督撫正坐司道侍坐待茶辭出三揖督撫送至暖閣後司道三揖拱立俟督撫入屏門復三揖出督撫次日用名柬答拜凡司道揖督撫皆答揖文移督撫下行用牌司道上行用申文府廳見督撫由左門進初見用履歷手本具補服行庭參禮稟拜免三揖常見用官銜手本三揖旁坐待茶辭出三揖督撫起立不送不答拜凡府廳揖督撫皆答揖州縣見督撫稟揖皆起立拱手餘儀與府廳同如府廳州縣同見西向列坐府廳在前州縣稍後教官見督撫與州縣同首領佐二雜職等官見督撫由左門進初見用履歷手夲具補服一跪三叩不揖不坐常見用官銜手本餘儀同府廳見司道由左門進初見用履𩔶手本具補服行庭參禮司道親扶免三揖常見用官銜手本三揖坐次府廳西面司道東北面待茶辭出三揖兩司送至暖閣後各道送至大堂簷下三揖出司道於次日用名柬答拜凡府廳揖司道皆答揖文移司道下行用牌府廰上行用申文州縣見司道行庭參禮稟拜免不答拜餘儀