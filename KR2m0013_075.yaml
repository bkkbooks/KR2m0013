body:
  text: 禮部儀制清吏司儀衛一王公儀衛崇德元年定親王銷金紅繖二纛二旗十立瓜骨朵各二吾仗四郡王銷金紅繖一纛一旗八卧瓜二吾仗四貝勒旗六骨朵紅仗各二繖纛視郡王貝子畫雲紅繖一豹尾槍二旗六紅仗二城內止用繖仗鎮國公紅繖一餘視貝子城內止用紅仗以上各執事人均青衣紅帶青帽銀頂上插紅翎輔國公豹尾槍一餘視鎮國公城內止用紅仗執事人青衣紅帶藍翎紅氊帽鎮國將軍金黃繖一旗六城內用前引二名後從六名輔國將軍旗繖視鎮國城內用前引一名後從四名奉國將軍旗四城內用後從四名又定王公等至御前均不得設儀衛順治九年題凖親王紅羅繡五龍曲柄繖一紅羅銷金繖二紅羅繡花繖二紅羅繡花扇二青羅繡孔雀扇二立瓜卧瓜骨朵吾仗各四大纛二條纛二旗十大刀二豹尾槍二馬六匹京城內止用曲柄繖一繡花繖扇各二立瓜卧瓜骨朵吾仗全馬四匹世子紅羅繖一卧瓜骨朵吾仗各二大纛條纛各一旗八大刀二減紅羅繡花繖豹尾槍餘視親王京城內止用銷金繖二繡花扇二立瓜卧瓜骨朵吾仗全馬四匹郡王吾仗四條纛二減紅羅繖大纛大刀餘視世子京城內用馬二匹立瓜卧瓜骨朵吾仗全繖扇視世子貝勒紅羅銷金繖二紅羅繡花扇二立瓜卧瓜骨朵吾仗各二條纛一旗六馬四匹京城內止用銷金繖一立瓜卧瓜骨朵吾仗全貝子紅羅銷金繖一減卧瓜及馬餘視貝勒京城內止用立瓜骨朵吾仗鎮國公紅羅銷金繖一青羅繡孔雀扇一骨朵吾仗各二旗六京城內止用骨朵吾仗輔國公儀衛視鎮國公鎮國輔國奉國各將軍仍照崇德元年例各儀衛出京城乃許全設遇元日萬夀聖節冬至大朝日除纛旗外餘均全設至下馬牌止又定親王至午門外郡王至闕下貝勒以下在闕門外下馬牌各下轎馬又定王公均得乘明轎王以下貝勒以上用轎夫八人貝子公四人貝勒貝子公乘轎至皇城外易馬入如願乘馬者聽康熙六年題凖親王郡王轎夫執事人用繡團獅緑段衣貝勒貝子公轎夫執事人素緑段衣二十四年題準宗室親王世子郡王馬韁即扯手用金黃長子貝勒貝子用紫不得給與內外官員其從前給過者槩行禁止六十一年十二月奉㫖向例親王豹尾槍二大刀二郡王則無親王著給豹尾槍四大刀四郡王給豹尾槍二大刀二乾隆二年覆凖金黃秋香色鞦轡惟特恩賞用金黃朝衣坐褥之王等許用其餘親王以下均不得用二十一年奏凖世子增豹尾槍二長子儀衛與貝勒同一公主以下儀衛崇德元年定固倫公主清道旗二銷金紅繖一青扇一拂子二金水盂一金盆一紅仗吾仗各二轎車均用紅蓋紅幃青緣蓋角青垂幨和碩公主減旗及金盂餘視固倫公主轎車紅蓋紅幃藍緣蓋角藍垂幨以上赴朝止用繖扇紅仗吾仗郡主減金盆及紅仗餘視和碩公主轎車青蓋青幃紅緣蓋角紅垂幨赴朝用繖扇吾仗縣主紅仗二減扇吾仗餘視郡主車青蓋藍幃紅緣蓋角紅垂幨郡君銷金青繖一紅仗二車藍蓋藍幃紅垂幨赴朝各用繖紅仗縣君紅仗二車藍蓋藍幃紅緣青垂幨赴朝用紅仗鄉君車與縣君同順治九年題準固倫公主曲柄繖一紅寶相花繖二青寶相花扇二紅孔雀扇二纛二立瓜卧瓜骨朵吾仗各二轎車均用紅蓋紅幃青緣蓋角紅垂幨和碩公主減寶相花扇餘視固倫公主轎車紅蓋紅幃青緣蓋角青垂幨郡主減曲柄繖卧瓜餘視和碩公主轎車紅蓋紅幃藍緣蓋角藍垂幨縣主紅寶相花繖一青花扇二立瓜吾仗各二轎車青蓋青幃紅緣蓋角紅垂幨郡君車青蓋藍幃紅緣蓋角紅垂幨縣君車藍蓋藍幃紅垂幨鄉君車均藍蓋藍幃鎮國公女青緣紅垂幨輔國公女紅緣青垂幨康熙六年題準公主郡主轎夫執事人用繡團獅緑段衣縣主轎夫執事人素緑段衣公主以下鄉君以上赴朝儀衛至紫禁城止固倫公主許隨入婦女五名和碩公主郡主四名縣主三名郡君二名縣君鄉君一名三十年定固倫公主轎車金黃蓋紅幃紅緣蓋角金黃垂幨和碩公主紅蓋紅幃金黃緣蓋角金黃垂幨郡主紅蓋紅幃青緣蓋角紅垂幨縣主紅蓋紅幃藍緣蓋角藍垂幨郡君紅蓋藍幃藍緣蓋角紅垂幨縣君青蓋青幃紅緣蓋角紅垂幨鎮國公女鄉君青蓋青幃藍緣蓋角紅垂幨輔國公女鄉君青蓋藍幃紅垂幨乾隆二年覆準金黃馬韁金黃轎襻惟公主王福晉得用郡主夫人以下均不得用一福晉夫人儀衛崇德元年定親王福晉清道旗二銷金紅繖一青扇一拂子二金盂一金盆一紅仗吾仗各二轎車紅蓋紅幃青緣蓋角青垂幨赴朝止用繖扇紅仗吾仗郡王福晉減金盂紅仗餘視親王福晉轎車紅蓋紅幃藍緣蓋角藍垂幨赴朝用繖扇吾仗貝勒夫人銷金紅繖一拂子紅仗各二轎車青蓋青幃紅緣蓋角紅垂幨赴朝用繖紅仗以上執事人均青衣紅帶青帽銀頂上插紅翎貝子夫人車青蓋藍幃紅緣蓋角紅垂幨鎮國公夫人車藍蓋藍幃紅垂幨輔國公夫人車藍蓋藍幃青緣紅垂幨鎮國將軍夫人車青蓋藍幃青垂幨輔國將軍夫人車藍蓋藍幃藍垂幨奉國將軍淑人車藍蓋素幃藍垂幨親王以下各側室儀衛均降適一等順治四年定親王福晉曲柄繖一紅方繖二紅繡花繖二青繡花扇一紅繡孔雀扇一纛二立瓜卧瓜骨朵吾仗各二郡王福晉紅繡孔雀扇二減曲柄繖方繖青花扇卧瓜餘視親王福晉貝勒夫人紅繡花繖一青繡花扇一立瓜吾仗各二王以下貝勒以上各側室均降適一等親王福晉以下各轎車之制惟輔國公夫人改用藍蓋藍幃紅緣蓋角青垂幨餘均與初定例同九年題準親王福晉曲柄繖一紅繡寶相花繖二青繡寶相花扇二紅繡孔雀扇二纛二立瓜卧瓜骨朵吾仗各二轎車紅蓋紅幃青緣蓋角紅垂幨世子福晉減寶相花扇轎車青垂幨餘均視親王福晉郡王福晉減曲柄繖卧瓜餘視世子福晉轎車紅蓋紅幃藍緣蓋角藍垂幨貝勒夫人紅繡寶相花繖一青繡寶相花扇二立瓜吾仗各二轎車青蓋青幃紅緣蓋角紅垂幨貝子夫人以下奉國將軍淑人以上車飾均如舊制康熙六年題準親王福晉側福晉郡王福晉轎夫執事人用繡團獅緑段衣郡王側福晉貝勒夫人轎夫執事人用素緑段衣凡福晉夫人赴朝儀衛至紫禁城止親王世子福晉許隨入婦女四名郡王福晉三名貝勒夫人二名貝子公夫人一名三十年定親王福晉轎車紅蓋紅幃青緣蓋角金黃垂幨世子福晉紅蓋紅幃青緣蓋角紅垂幨郡王福晉紅蓋紅幃青緣蓋角青垂幨長子福晉紅蓋紅幃藍緣蓋角藍垂幨貝勒夫人紅蓋青幃青緣蓋角紅垂幨貝子夫人紅蓋藍幃藍緣蓋角紅垂幨鎮國公夫人青蓋青幃紅緣蓋角紅垂幨輔國公夫人青蓋青幃藍緣蓋角紅垂幨以上各側室均降適一等鎮國將軍夫人青蓋藍幃紅垂幨輔國將軍夫人藍蓋藍幃紅垂幨奉國將軍淑人青蓋青幃青垂幨奉恩將軍恭人同車自長子福晉以上朱轅貝子夫人以下紫轅奉國將軍淑人以上黑轅輪均用朱其幃蓋幨公夫人以上用雲段鎮國將軍夫人以下用素段一京官儀衛崇德元年定固倫公主額駙畫雲紅繖一豹尾槍二旗六紅仗二執事人青衣紅帶青氊帽銀頂上插紅翎城內止用繖仗超品公和碩公主額駙杏黃繖一豹尾槍二旗六城內止用前引二名從人十名民公郡主額駙豹尾槍一從人八名餘視超品公子都統尚書縣主額駙減豹尾槍用從人六名餘視公內大臣大學士副都統護軍統領前鋒統領侍郎郡君額駙旗六城內止用前引二名從人四名一等侍衛護衛參領前鋒參領縣君額駙學士郎中旗四城內止用從人四名二等侍衛護衛鄉君額駙佐領員外郎旗二城內止用從人二名三等侍衛護衛護軍校主事以下官許用從人一名順治三年定公掌扇貼方金一塊一品官扇貼圓金四塊二品官扇貼圎金三塊三品官扇貼圎金二塊四品官用灑金扇五六七品官用黑素扇八九品官用白素扇六年定公以下四品官以上用大小灑金扇各一文職用甘蔗棍二武職用棕棍二八年題準民公和碩公主額駙杏黃繖二旗十大小扇二各貼方金四侯郡主額駙杏黃繖一旗十扇二各貼方金三伯扇二各貼圓金一餘視侯一品官旗八扇二各貼圓金四繖視伯二品官旗六扇二各貼圓金三繖視一品三品官扇二各貼圓金二餘視二品四品官旗四灑金扇二宗室覺羅之有官者各從其品惟扇柄及棍皆髤以朱以上旗繖在京城內不得用進皇城內止用小扇不得用大扇及棍又定官民等鞍韉牙縫不得用黃色九年題準公侯伯都統尚書內大臣大學士及漢文官三品以上皇城外許乘四人暖轎願乘馬者聽漢武官不凖乘轎各官扇上均書清漢字官銜康熙元年題準滿漢公侯伯都統內大臣鎮國將軍子輔國將軍護軍統領前鋒統領副都統男大學士學士尚書左都御史侍郎左副都御史鑾儀使通政使大理寺卿以上在皇城外許乘四人暖轎願乘馬者聽又定停止滿漢學士左副都御史鑾儀使通政使大理寺卿設儀衛乘轎又定公和碩公主額駙旗十杏黃繖二金黃棍四執事人青衣緑帶紅氊帽銅頂上插緑翎京城內止用繖一侯伯郡主額駙減繖一餘視公都統鎮國將軍內大臣縣主額駙子滿漢大學士尚書左都御史旗八杏黃繖一棍二執事人青衣緑帶紅氊帽銅頂輔國將軍郡君額駙護軍統領前鋒統領副都統男滿漢侍郎學士九卿正卿鑾儀使左副都御史步軍統領旗六餘儀衛執事人均視都統三品官儀衛視輔國將軍四品官旗四京城內一品官以上用繖一棍二二品官用棍二三年定男散秩大臣在京城內停設儀衛散秩大臣內有世襲子爵者得設儀衛如子四年題準四品以上官乘馬許用繁纓在京大九卿詹事以上武官男副都統散秩大臣以上許用一人引馬前導餘官不得僭用六年定都統鎮國將軍內大臣縣主額駙子滿漢大學士尚書左都御史執事人帽頂上插緑翎七年題準凡加太師公和碩公主額駙金黃棍四改為紅棍四棍端用銅瓖執事人用緑布衣緑帶紅氊帽銅頂上插緑翎繖扇照前定例又定民公及加級侯郡主額駙金黃棍四改為紅棍四棍端用銅瓖執事人衣帽照前定例八年題準在京官停用杏黃繖金黃棍民公以下官員均照順治八年例又定公以下官員出京城許用鞍籠間馬前導軍民人等不得用違者治罪三十九年奉㫖衣服鞍轡原有禁例今觀鞍轡等飾甚為僭越下至家奴鞦鐙皆用鋄金朕御鞍轡未嘗以金飾之如此之類尤當嚴禁遵㫖議準馬鞍惟三品官輕車都尉以上許用虎皮及狼狐皮有品級無品級筆帖式及庫使舉人官生貢監生員護軍領催以至兵民等馬鞍不得用繡及倭段䌈線瓖緣鞍韂紅托鞦轡等物不得用鋄金雍正元年諭大小官定有品級近有不分官職馬繫繁纓使人引馬嗣後著八旗都統步軍統領都察院嚴行稽察如有此等即行拏奏如大臣等徇情踈忽察出將該管並大臣等一并議處又諸王有賞所屬人員鞍轡者著行文該旗注册嵗終彚奏欽此七年諭聞近來引馬繁纓之屬有不按定例任意假借者嗣後大城內著步軍統領稽察外城著五城御史稽察倘有違例僣越之人步軍統領御史不參奏别經發覺者將稽察之人一并處分欽此乾隆十五年諭本朝舊制文武滿漢大臣凡遇朝㑹皆乘馬並不坐轎從前滿洲大臣內有坐轎者是以降㫖禁止武大臣坐轎未禁止文大臣今聞文大臣內務求安逸於京師至近之地亦皆坐轎若謂在部院行走應當坐轎則國初部院大臣未嘗坐轎此由平時不勤習技業惟求安逸之所致也滿洲大臣當思本朝舊制遵照奉行似此並不演習乘馬倘遇緊急官差將何如耶嗣後文大臣內年及六旬實不能常乘馬者著照常坐轎其餘著禁止再王公等不分老幼一槩坐轎亦非古道嗣後長朕一輩之王等著照常坐轎其餘王公內有髙年者亦許坐轎餘皆乘馬王等既有儀衛除年節列儀衛坐轎朝賀外平時皆著乘馬將此通行傳知倘禁止後有坐轎者著察旗御史即行察參若御史不參奏經朕訪聞一并治罪斷不寬宥欽此又諭前因諸王及部院滿洲大臣等皆互尚安逸行動坐轎並不乘馬經朕降㫖禁止坐轎是令伊等嫻習武藝勿致廢弛滿洲舊制之意並非謂大臣等不應坐轎也近聞王大臣內竟有坐車者試思坐車與坐轎何異視此乃王大臣等全未識朕欲挽回滿洲舊制之意轉似有心致朕降㫖亦覺赧顔誠不知伊等是何居心也朕思王大臣早起來圓明園連朝奏事或身有疾病坐轎亦未為不可嗣後諸王及滿洲文職一品大臣如早起來圓明園或身有微疾者著照常坐轎王大臣等不識朕意仍總不乘馬專坐轎者經朕察出必懲數人以為衆戒伊等各宜仰體朕體恤之意勿致廢弛滿洲武藝應乘馬之處照常乘馬黽勉向上再八旗大臣以不應坐轎久經禁止近聞有坐車者但伊等有何勞苦官差亦尚安逸坐車耶且伊等既有教訓官兵之責理宜為衆表率嗣後八旗大臣及部院二品以下堂官內倘有坐車之人著御史等即行指名題參朕必將違禁之人治罪斷不寬宥欽此二十一年諭今王公大臣之轎夫開設賭場者甚多不獨將旗人引誘以失生理殊為可憫致令旗人流於匪僻無所底止關繫尤重是以朕從前降旨王等一品文大臣及年老之文大臣坐轎其餘槩不準坐轎者一則不致廢弛乘馬二則為旗人計將轎夫開設賭場之事清理之意今年少官卑人員皆行坐轎若不嚴行管束縱令轎夫開設賭場豈非欲儉省其工直誠如此尤可恥也應將伊等察出從重處分但為日已久又無專委察參之人此次朕不深究嗣後惟準親王郡王大學士尚書坐轎其貝勒貝子公都統等皆不準坐轎從前因年老之二品文臣皆令坐轎是以年少之大臣等亦照伊等坐轎嗣後二品文大臣及京堂官無論年老與否槩停坐轎仍令坐轎之王大臣等將轎夫各令在其家或於方近居住加意管束倘有令其逺居開設賭場者將該王大臣等一并議處此次降㫖以後仍有私行坐轎縱令轎夫開設賭場者著步軍統領及該衙門該旗御史等即行參奏從重議處若不嚴察以致懈弛仍蹈舊習將失察之衙門官員一并治罪斷不輕恕欽此二十二年諭外省駐防將軍及緑營之提鎮出行則皆乘輿夫將軍提鎮有總統官兵之責若養尊處優自圖安逸亦何以表率營伍而作其勇敢之氣况旗人幼習騎射即緑營中亦必以其弓馬優嫻始歷加升用乃一至大僚轉致狃於便安忘其故步此豈國家簡擢之意耶京師都統副都統既皆乘馬而滿洲侍郎則無論年逾六旬亦皆不得乘輿即朕巡省所至尚每日乘馬而行乃外省武職獨相沿陋習此甚非宜嗣後將軍提督槩不許乘輿其編設轎夫並著裁革如有仍行乘坐者照違例治罪可通行傳諭知之欽此又諭前因外省將軍提鎮有表率營伍之責出皆乘輿恐致狃於便安是以特行禁止但此內宣力已久之年老大員又未可一槩而論嗣後如年逾七十不能常行乘馬者令該員自行酌量奏聞請㫖餘不得假藉欽此一外官儀衛康熙五年定各省駐防將軍副都統視在京都統副都統七年題準文官總督杏黃繖二金黃棍二旗八扇二兵拳二鴈翎刀二飛虎旗二獸劒二藤棍二皮槊二槍四回避牌二肅靜牌二巡撫減兵拳鴈翎刀飛虎旗及槍二餘同布按兩司減旗二及獸劒藤棍槍餘視巡撫道府杏黃繖一旗四扇一藤棍二皮槊二回避牌二肅靜牌二同知通判知州知縣藍繖一扇一藤棍二皮槊二回避牌二州同州判縣丞藍繖一藤棍二雜職竹板二武官提督藤棍皮槊改用刑杖二餘視總督總兵大刀一減兵拳鴈翎刀刑杖及槍二餘視提督副將杏黃繖一金黃棍二旗六扇二回避牌二肅靜牌二參將逰擊都司杏黃繖扇各一旗四藤棍二回避肅靜牌各二守備減牌餘視都司一命婦車輿崇德年間定超品公命婦車青蓋青幃青垂幨公命婦藍垂幨餘同都統尚書子等官命婦車青蓋藍幃藍垂幨內大臣大學士副都統護軍統領前鋒統領侍郎等官命婦車藍蓋藍幃藍垂幨一等侍衛護衛參領前鋒參領學士郎中等官命婦車藍蓋素幃藍垂幨二等侍衛護衛佐領等官命婦車素蓋素幃藍垂幨順治九年題準公命婦車青蓋青幃緑緣蓋角緑垂幨侯伯命婦車青蓋青幃緑垂幨一品官命婦車青蓋青幃青垂幨以上均用銀頂二品官命婦車青蓋藍幃青垂幨三品官命婦車藍蓋藍幃青垂幨四品官命婦車藍蓋藍幃藍垂幨五品以下官命婦車藍蓋藍幃無垂幨以上均用錫頂庶民妻藍蓋藍幃無垂幨黑油木頂康熙元年題準三品以上官命婦車用銀頂四品以下官命婦用錫頂庶民妻同違者治罪三十年定三等公夫人車緑蓋青幃藍緣蓋角緑垂幨侯伯夫人車緑蓋青幃藍緣蓋角緑垂幨內大臣都統大學士尚書左都御史子一品夫人車青蓋青幃緑緣蓋角緑垂幨散秩大臣前鋒統領護軍統領步軍統領副都統侍郎學士左副都御史通政使大理寺卿詹事府詹事男夫人車青蓋青幃緑垂幨以上各幃蓋幨均用素段一等侍衛參領步軍翼尉王府長史太常太僕光祿寺卿國子監祭酒大理寺少卿內閣侍讀學士翰林院講讀學士侍讀侍講少詹庶子洗馬鴻臚寺卿郎中給事中御史太常太僕光祿寺少卿輕車都尉淑人車青蓋青幃青垂幨以上車均用銀頂閒散宗室二等侍衛佐領貝勒司儀長欽天監正內閣侍讀國子監司業鴻臚寺少卿通政使司參議中允員外郎步軍協尉騎都尉恭人車青蓋藍幃青垂幨三等侍衛雲騎尉宜人以下車藍蓋藍幃青垂幨以上均用錫頂幃蓋幨用布轅輪均用黑自公以下有頂帶官員以上各命婦均從夫見在品級不準以加級用欽定大清㑹典則例卷七十二
