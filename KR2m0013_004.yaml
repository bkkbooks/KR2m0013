body:
  text: 宗人府一天潢宗派以顯祖宣皇帝本支為宗室伯叔兄弟之支為覺羅順治九年題準宗室自親王以下至輔國公所生子女周歲由長史司儀長典儀等官詳開適出庶出第幾男第幾女母某氏所生子名某並所生子女之年月日時具册送府鎮國將軍以下至間散宗室由族長察明亦照例開報送府均載入黃册其收生婦某一并開送存案如將撫養異姓之子揑報者治以重罪覺羅所生子女報知各旗首領首領於生子三日內親加察詢某人某婦於某年月日時生第幾男第幾女名某收生婦某逐一開録於每年正月初十日以內親齎送府編入紅册如遲誤不報報不以實者首領從重治罪康熙五十二年諭宗室革退者向皆不入玉牒其子孫若不及今表著日後年逺必至湮沒所關甚大應察明載入玉牒酌量給帶為記覺羅等原繫同祖所生其犯罪革退者若不察明亦將湮沒所生子女皆應察明記載選秀女時勿令溷入著詳議具奏欽此遵旨議準革退宗室給以紅帶附入黃册革退覺羅給以紫帶附入紅册於纂修玉牒時附名册後所生子女均由本旗保結送府入册雍正元年題準宗室覺羅子女每年載入黃册紅册止有清文嗣後增設漢主事二人於進士內遴選引見補授每年宗室覺羅子女開列送府時即兼清漢文造入册籍七年議準宗室覺羅子女均繫宗室族長覺羅首領稽察明白册送記載應照佐領圖記之式各給圖記如有增設照例增給一宗室婚嫁乾隆三年諭男女婚嫁禮貴及時從前王公等多有候旨舉行者今宗室繁衍若不分逺近一槩候旨不能無逾時之事朕意近支內已定婚者奏聞若未定者酌量舉行其如何分别遠近定例之處令宗人府王等詳議具奏欽此遵旨議奏皇上伯叔輩王貝勒等子女兄弟輩王等子女至十五歲請旨其餘宗室子女繫特旨指婚者令候旨行餘酌量及時婚嫁應得品級該部照例奏給奉旨依議朕伯叔一輩王等之子未婚者內務府會同察奏又定王公之女許婚後由本家報禮部奏給品級成婚後由本家報禮部奏給額駙品級如以女與外藩蒙古者未聘定前本家奏請若繫間散宗室報府轉奏又議準宗室女不得與八旗别載册籍人户舊在户下後開户者結親行令八旗都統凡别載册籍之人皆造具清册送府存案嗣後宗室女許婚除勳舊世家外令將見欲聯姻之家族姓官職豫報族長呈府察對果非别載册籍之人方許結親一宗室命名康熙三十二年覆準王以下間散宗室以上有同名者令卑者幼者更改內有已得誥册者換給照所改名入册雍正十三年九月諭朕之兄弟等以名字上一字與朕名相同奏請更改朕思朕與諸兄弟之名皆皇祖聖祖仁皇帝所賜載在玉牒若因朕一人而令衆人改易於心實有未安昔年諸叔懇請改名以避皇考御諱皇考不許繼因懇請再四且有皇太后祖母之旨是以不得已而允從厥後常以為悔屢向朕等言之即左右大臣亦無不共知之也古人之禮二名不偏諱若過於拘泥則帝王之家祖父命名之典皆不足憑矣朕所願者諸兄弟等修德制行為國家宣猷效力以佐朕之不逮斯則尊君親上之大義正不在此儀文末節間也所奏更名之處不必行欽此乾隆十一年奏凖聖祖仁皇帝選擇日字玉字偏旁之字載入紅摺於此內命名宗室至今仿用不知回避實屬錯謬嗣後日旁字除已經命名外均不準用玉旁字除欽賜名外均命更改綿字一輩近支宗室等上用綿字下一字亦照此例回避心字一纂修玉牒順治十三年題準每十年由府題請欽命宗令宗正滿漢大學士內閣學士禮部尚書侍郎充正副總裁官以府屬理事官內閣侍讀學士或侍讀各一人充提調官翰林官三人府屬滿司官三人內閣侍讀一人禮部司官二人充纂修官內閣滿漢中書各八人禮部筆帖式八人各部院筆帖式十有二人充謄録官府屬筆帖式八人充收掌官合每年黃册紅册所紀彚入於牒每修成一次謄繕裝潢進呈御覽後恭送皇史宬尊藏仍繕二部一於本府一於禮部恭貯雍正元年增設漢主事二人遇修玉牒亦準充纂修官乾隆八年定將禮部玉牒送往盛京恭貯一宗室封爵列十有四等一和碩親王二世子三多羅郡王四長子五多羅貝勒六固山貝子七鎮國公八輔國公九不入八分鎮國公十不入八分輔國公十一鎮國將軍十二輔國將軍十三奉國將軍十四奉恩將軍皇子生十五歲由府請封其爵級出自欽定親王郡王適福晉所生之子二十歲後由府照例請旨考試親王適子奉特旨始封世子其未封世子者與餘子同授封爵餘子考授不入八分公天命年間立八和碩貝勒共議國政各置官屬凡朝會燕饗皆異其禮內有賜賚必均及是為八分天聰年以後宗室特恩封公及親王餘子授封公者皆不入八分其有功加至貝子準入八分如有過降至公仍不入八分郡王適子奉特旨始封長子其未封長子者亦與餘子同授封爵餘子考授一等鎮國將軍貝勒適子降襲貝子餘子考授二等鎮國將軍貝勒適子降襲鎮國公餘子考授三等鎮國將軍鎮國公適子降襲輔國公餘子考授一等輔國將軍輔國公適子世襲餘子考授二等輔國將軍不入八分鎮國公適子降襲不入八分輔國公不入八分輔國公適子降襲三等鎮國將軍餘子均考授三等輔國將軍一二三等鎮國將軍適子各降襲一二三等輔國將軍餘子均考授三等輔國將軍一二三等輔國將軍適子各降襲一二三等奉國將軍餘子均考授三等奉國將軍一二三等奉國將軍適子均降襲奉恩將軍餘子均考授奉恩將軍其奉恩將軍既無可降之品級將奉恩將軍適妻所生子但準一子考試承襲奉恩將軍餘子停封酌量人優者奏請考試準食雲騎尉俸皇女由中宫出者封固倫公主由妃嬪出者封和碩公主如中宫撫宗室女下嫁亦封和碩公主親王女封郡主郡王女封縣主貝勒女封郡君貝子女封縣君入八分鎮國輔國公女封鄉君順治十七年定親王及世子郡王妻封親王福晉世子福晉郡王福晉長子貝勒以下至輔國將軍妻封夫人奉國將軍妻封淑人奉恩將軍妻封恭人康熙元年議奏王貝勒貝子等有願撫養宗室之女者奏準撫養隨養父升降如未奏準私自撫養者仍照生父升降奉旨宗女不便照養父品級皆著照生父品級其從前照養父給過品級者仍著存留四十五年題準親王以下入八分公以上側福晉側室所生女與適出一例封授實為過優嗣後親王側福晉所生女降二等視貝勒適女授為郡君郡王側福晉所生女降二等視貝子適女授為縣君貝勒側夫人所生女降二等視鎮國公適女授為鄉君至貝子鎮國公輔國公側室所生女並無應降品級將貝子側夫人所生女食五品俸鎮國公輔國公側夫人所生女食六品俸其餘並稱宗女不授封乾隆七年諭嗣後皇子至應封之年宗人府先摺奏請旨俟奉旨準封再行具題如奉旨停封俟五年後再行摺奏如有旨又停封仍俟五年後再行具奏請旨永著為例欽此又議準舊制親王妾媵十人世子郡王六人長子貝勒貝子五人鎮國輔國公四人嗣後除奉特旨賞給王貝勒等側福晉側室外其餘即於妾媵內親王定側福晉四人世子郡王三人長子貝勒定側室二人貝子及鎮國輔國公一人冠服降適福晉正室一等凡應封側福晉側室者必生有子女將姻族姓氏奏明得旨後咨禮部注册如無應封之人不得拘泥定數濫行請封已封者雖有過失亦不得任意黜革必具奏得旨乃行其親王等請封側福晉側室每年由府彚奏一次八年定親王側福晉子考授二等鎮國將軍郡王側福晉子考授三等鎮國將軍貝勒側室子考授一等輔國將軍貝子側室子考授二等輔國將軍鎮國公側室子考授三等輔國將軍輔國公側室子考授一等奉國將軍又定親王妾媵子考授三等輔國將軍郡王妾媵子考授三等奉國將軍貝勒貝子妾媵子均考授奉恩將軍其餘妾婢所生之子為間散宗室不授封十三年奉旨親王側福晉四人世子郡王三人此即朕加恩所定新例也嗣後凡封授足數中有身故者不得再請封授其奉特旨賞給者不拘此例長子貝勒貝子公等側室亦如之又定世子適子恩封不入八分公如未恩封與餘子同授封爵餘子考授一等鎮國將軍側福晉子考授三等鎮國將軍妾媵子考授三等奉國將軍長子適子恩封一等鎮國將軍如未恩封亦與餘子同授封爵餘子考授二等鎮國將軍側福晉子考授一等輔國將軍妾媵子考授奉恩將軍又議奏宗室庶女繫妾媵所生從無授封之例其有許字蒙古者或念其逺適外藩格外加恩以示優禮似屬可行請嗣後俟本家奏準許婚後報府具奏請旨如奉旨授封轉行禮部照例具題奉旨依議親王郡王庶出女許字外藩者著宗人府照公適出女請封是年欽定封爵表一襲封國初定以適子孫承襲無適子孫方準庶子孫承襲如並無庶子孫準以親兄弟及親兄弟之子承襲至大宗子孫因罪降革其祖父原爵繫軍功得封者準以旁支子孫承襲又定親王以下至奉恩將軍薨故後其應襲之子即行承襲不拘年限若年及二十未襲封者先與餘子同授封爵至襲封時仍豫以應襲之爵如應襲之爵與前封爵相等即改授封為襲封換給誥册一授封康熙二十七年諭自古帝王展親睦族列爵錫封原欲選賢建能旌别淑慝俾咸知勸勉慶流奕葉此國家之常經奬勸之至意也朕篤念親親恩禮罔替年至十五即行授封但誼屬本支必皆飭躬砥行端良醇謹益自刻勵動不踰則始無忝於宗潢今親王以下奉恩將軍以上不問賢否槩豫封爵以致視為故典罔知激勸嗣後親王以下奉恩將軍以上子孫應俟其年至何歲作何辨其賢否定其品級等第始應授封著議政王貝勒大臣及親王以下奉恩將軍以上會同確議具奏欽此遵旨議奏親王以下奉恩將軍以上子年十五槩豫封爵恐致視為故典罔知激勸嗣後應停止此例俟年至二十辨其文藝騎射之優者列名引見請旨授封惟親王以下奉恩將軍以上有薨逝者即準一子襲爵不俟歲滿奉旨依議如人材超卓者不拘年歲特豫封授又議凖王貝勒以下至奉恩將軍之子年及二十應授封者考試國語及馬步射優者照例封授應得之爵平者降一等劣者降二等封授乾隆十一年奉旨應封宗室特定考試之法其學業平庸者降等封授原期示以懲勸若因奉恩將軍無級可降獨得照例授封必恃此不知自勉嗣後奉恩將軍考試應降等者仍授為奉恩將軍停俸三年十三年覆準由宗人府彚奏欽命大臣考試馬步射翻譯三項皆優者以應得之爵授封兩優一平者降一等一優兩平兩優一劣者降二等三項皆平及一優一平一劣者降三等一優兩劣兩平一劣一平兩劣及三劣者皆停封令其學習再行考試考試照武闈之例前一日先試弓馬注册次日試翻譯彌封散卷委護軍參領率領護軍監看以防弊竇又覆準應封奉恩將軍有考試應降一等者停俸二年降二等者停俸三年降三等者停俸四年其應封二等奉國將軍有降三等應封三等奉國將軍有降二等三等者除降至奉恩將軍外仍有應降之等每等亦停俸一年有半是年欽定考試授封表十六年奏準大內所貯皇册內王公覺羅二册向不改繕增注嗣後請照八旗世爵之例每歲底與吏部同日具奏得旨齎本府黃册紅册赴保和殿改繕增注一宗室追封乾隆十三年議準以孫襲祖爵者得追封其父母以曾孫襲曾祖爵者得追封其祖父母父母若入繼大宗為後因而襲爵者不得追封其本生父母如適妻先故者依夫爵追封以庶子襲爵者適母已故得封其生母降適母一等又議準宗室王公有因大宗降革以旁支襲爵者如父在亦準授封是襲一爵而同時並封父子一應章服體制殊屬難行請嗣後有旁支襲爵者如其父尚在不準請封至父故追封則非身受顯爵可比其應否追封及祖父未授封應否追贈幾代之處請旨定奪奉旨旁支襲爵王公其祖父未授封者著追封三代一封號順治九年題定諸王授封以素行為封號康熙九年題準凡襲封之子孫册寶均無庸更換但將承襲之名於原册內增注即稱其祖父封號一諡號康熙四年定諸王諡號皆於封號加一字為諡貝勒以下輔國將軍以上應否與諡題請欽定如奉旨賜給以二字為諡一上朝順治十四年題準王貝勒貝子公每月逢五常朝坐班以日出時稽察康熙四十年定每月左翼逢單日右翼逢雙日王公等照常朝例坐班皇上在宫在太和門齊集府屬官稽察繕名單具奏恭遇行幸駐蹕於午門齊集名單存府乾隆三年定遇行幸駐蹕名單交內閣同本隨進十五年奉旨王等朝班次序皆照原封所定並非因人而施其子孫既襲王爵自應仍照原班嗣後毋庸奏請如不繫襲替特恩肇封之王再將朝班序次請旨舊制親王郡王襲封後由府行文禮部將朝班序次奏請欽定貝勒貝子公序次不奏請各照輩數行次序坐一陪祭雍正元年議準皇帝親祭壇廟王以下入八分公以上均於祀日五鼓齊集門外按左右翼序立恭俟駕入隨入行禮舊制王以下至入八分公在內金水橋立候隨行雍正元年改定今制祭畢隨至午門內金水橋俟駕還宫始退不入八分公以下序立行禮與百官同堂子行禮自親王以下至宗室一品官均豫集大門外東向序立俟乘輿至跪迎隨入行禮畢以次隨至午門內金水橋如前儀王貝勒用護衛二人貝子公用護衛一人咸朝服騎從於下馬處接馬舊制王貝勒在內金水橋貝子以下在長安左門外跪迎隨行雍正元年改定今制乾隆二年奏準凡祭祀應陪祀之宗室將軍司官等均令在宗人府齋戒七年定大祀郊壇前期一日豫集齋宫門外左右序立恭俟駕入齋宫各歸齋所一朔望太廟上香乾隆十年欽點王貝勒貝子公專司其事由府分定班次每月朔望直班一人先期齋戒沐浴本日早朝服詣太廟太常寺官二人由太廟街門導引先進後殿右門於中位上香次左右上香畢於原進門退出至簷下正中行三跪九叩禮畢導引入中殿右門照後殿上香行禮禮畢退出若直班人臨期遇有公事令下班人行禮一太廟奠帛獻爵乾隆元年議準以宗室侍衛四十人宗室將軍官員二十人分班奠帛獻爵官員等均照侍衛之例給帶孔雀翎三年奏準世宗憲皇帝孝敬憲皇后位前奠帛獻爵增宗室將軍六人九年議準太廟後殿獻爵簡選八旗文武覺羅官引見奉旨點出二十四人十二年諭向來祭饗太廟獻爵奠帛用侍衛及太常寺官朕御極後皆令用宗室人員蓋因宗支繁衍實惟祖德所貽一氣感孚昭格尤為親切且使駿奔走執豆籩有事為榮亦得服習禮儀陶鎔氣質意蓋有在但演習禮節太常實所專司宗室既非所屬未必聽其指使嗣後每逢祭祀之期著令宗人府王公一人前往監視俾進退優嫻執事有恪以昭誠敬欽此十年奏準太廟後殿增覺羅奠帛官八人二十二年遵旨議準太廟奠帛獻爵均以宗室官後殿以覺羅官奉先殿以宗室侍衛其奠獻覺羅官五品以上給戴孔雀翎六品以下給戴藍翎一祭祀齊集乾隆十三年議準王公由府委官開列名單於齊集之處察其已到者於名單內加圈鎮國將軍以下至奉恩將軍由府委官察收職名均繕名單呈奏因病不到者於單內聲明無故不到者參處一祭陵寢乾隆元年諭盛京祭祀陵寢向以宗室覺羅輪班承事不但往返維艱亦且有誤執事應於鎮國輔國將軍內簡選遣往承祭著總理王大臣會同宗人府詳議具奏欽此遵旨議準盛京三陵四節忌辰祭祀於宗室將軍內情願前往居住者簡選引見欽點六人往居盛京各給田廬以承祀事順治十七年以宗室覺羅各二人前往承祭康熙八年停止每歲四節自貝勒以下至奉恩將軍覺羅男爵以上酌量遣祭十八年停遣貝勒以下以乾盛京將軍副都統侍郎致祭隆元年改定今制昭西陵孝陵孝東陵景陵泰陵每年忌辰清明孟秋望冬至祭祀由府移會太常寺以在京王貝勒奏請酌遣往祭歲除以貝子公奏請遣往若遇大事祭告諸陵王以下至八分公亦照此例奏請酌遣八年定端慧皇太子園寢四節祭祀均遣貝子公往十七年定孝賢皇后陵寢四節祭祀遣官與各陵同一行在扈從凡遇車駕巡幸由府開列王貝勒貝子公等名籖請旨點出隨駕如領府事王公等皆未點出即於隨駕之王公內請旨攝行在宗人府事凡恭遇大閲五旗王公應否入隊隨操由府請旨一左右兩翼各設宗學一雍正二年諭朕惟睦族敦宗務先教化特立義學簡選爾等教習隨其資質勸學興行有不遵教訓者小則爾等自行懲勸大則揭報宗人府會同奏聞其行止端方精勤好學者無論年齒長幼即行保奏從來立教之術莫要於奬善懲惡善不奬不能使之勸惡不懲不能使之改爾等既膺簡任務期勤慎黽勉恪恭厥職以副朕篤厚宗親殷勤教育之至意欽此三年議準王公將軍及間散宗室子弟十八歲以下願就學讀書及十九歲以上已曾在家讀書情願就學者均令入宗學分習清漢書學內兼置箭道學習騎射又議準每學以王公一人總其事設總管二人副管八人選宗室中分尊年長者擬定正陪引見補授令其輪流直日清書教習二人選罷間滿官及進士舉貢生員善翻譯者充補騎射教習二人選罷間官及護軍校護軍善射者充補漢書每學生十人設教習一人令禮部考取舉貢充補又議準總管給七品官食俸副管給八品官食俸讀書子弟月給銀三兩米三斗川連紙一刀筆三枝墨一笏自十一月朔至正月底各給炭百八十斤每學自五月朔至七月底日給冰一塊滿漢教習每月給銀二兩米二斛每年棉衣紗衣一次三年內皮衣二次騎射教習每月給銀一兩五年如果成就多人總管副管繫間散宗室以府主事用繫將軍等品級量加議敘教習騎射者咨本旗以應升官即用其滿漢教習三年期滿分别等第一等者由府引見交部照例敘用平等者留學再教習三年方準録用不稱職者參處十一年奏準兩學各以翰林官二人董率課程分日入學講解經義指授文法每月給公費銀與各館纂修官同給米與本學教習同四季給衣亦如之乾隆三年覆準兩學設總稽課程各二人每月試經義翻譯及射藝各一次欽命滿漢京堂官充之又議準宗學生徒每歲季秋由府奏請試以翻譯及經義時務䇿各一道欽命學士等官閲卷考列一等賞筆二十枝墨十笏二等筆十枝墨五笏三四等留學肄業五等教戒仍許留學六等黜退九年議準五年奏請欽命大臣合試左右翼學生凡本年考取一二等及往年考取一等並在家肄業願觀光者咸準與考拔取佳卷進呈御覽恭候欽定名次由府引見以會試中式注册俟禮部會試之年習翻譯者與八旗翻譯貢士同引見賜進士以府屬額外主事用習漢文者與天下貢士同殿試賜進士甲第有差十一年奏準左翼學生定數以七十人為準右翼以六十人為準十七年奉旨宗室等不應鄉會試皇祖皇考均有明旨後因條奏復令宗室等應鄉會試彼時宗人府總理事務王大臣並未聲明草率照覆實屬錯誤嗣後仍遵皇祖皇考原降諭旨將宗室等鄉會試及選庶吉士之例永行停止再不可條陳考試宗室內如果有學問優長者自施恩録用也二十一年奏準裁宗學漢教習九人改為翻譯教習其教習騎射每翼各止二人應各增一人再在學肄業宗室年滿考列一二等者例以府屬筆帖式補用需次無期别無效力之路請於此內擇其人去得者照部院貼寫筆帖式之例授為宗人府貼寫筆帖式二三年後如果行走勤慎辦事好者引見以筆帖式坐補其貼寫之時仍給與在學應得公費仍於歲終視其行走於恩賞宗室銀內酌量賞給以示鼓勵至騎射教習從前並未定豫勸懲嗣後騎射教習盡心者給以一等考語咨行各該旗於應升處列名懶惰者參奏治罪其學舍箭道應修理者即行修理俾肄業學生皆精通翻譯諳練騎射一八旗各設覺羅學一雍正七年議準覺羅子弟自八歲至十八嵗有志讀書及十九歲以上已讀書願就學者均準入學總管王公一人由府奏請欽點每學選覺羅二人為副管擬定正陪引見補授以滿進士舉貢生員善翻譯者一人教習清書以本旗善射者一人教習騎射以考取漢舉貢教習漢書每生徒十人設教習一人以滿漢京堂官八人稽察課程五年教有成績其副管由該管王公保送到府繫間散覺羅奏給八品官食俸有品秩者量加議敘其教習騎射者咨本旗升用教習清漢書者三年引見交部敘用不稱職者參處覺羅讀書子弟令該管王公等每年春秋考驗三年欽命大臣會府考試優者記名奬勸次者留學教訓劣者黜退學成與旗人同應歲科及鄉會試並考用中書筆帖式等官覺羅學副管教習及學生每月給銀米紙筆墨冬給炭夏給冰歲給衣服均與宗學同覺羅學生額數鑲黃旗六十一名正黃旗三十六名正白旗四十名正紅旗四十名鑲白旗十有五名鑲紅旗六十四名正藍旗三十九名鑲藍旗四十五名左翼共百五十五名右翼共百八十五名乾隆十六年覆準覺羅官學生亦準考選庫使照例補用一盛京照京師例設立宗室覺羅學共一學乾隆二年議準凡二十歲以下十歲以上情願入學讀書者準其入學分清漢書肄業兼習騎射不限以額數於盛京宗室覺羅族長教長將軍及間散宗室覺羅內選擇分尊年長行止端方者充宗學總管二人副管四人其由間散宗室充者總管定為七品官副管定為八品官送府引見補授覺羅學副管四人報府注册其宗學總管兼管覺羅學事於現任司官筆帖式內簡選長於翻譯者四人教習清書於間散官員以下領催驍騎以上選善於騎射者四人教習騎射於奉天府舉貢內選學問優長者四人教習漢書又議準讀書之宗室覺羅等交與將軍府尹每年會同宗學總管稽考將清漢書騎射優劣分為等次注册俟宗室讀書人數加增應行考試之時該將軍等報府將領府事王公及盛京五部侍郎開列職名請旨欽點二三人公同考試如果清漢書騎射優長會府奏聞有情願來京與選侍衛筆帖式者與京學肄業宗室一例録用其覺羅子弟肄業五年交與將軍府尹考試分别等第奏聞以盛京三陵及五部將軍等衙門省城口外等處筆帖式録用至滿教習與騎射教習五年期滿分别等第果能成就多人者滿教習交部議敘騎射教習交本旗以應升即用漢教習令將軍府尹等出具考語給咨赴府引見恭候欽定其不稱職者即行參革盛京宗室覺羅學生除年未及歲外其已食歲滿錢糧在學肄業者令該將軍於每歲秋冬圍獵時將情願隨圍之學生攜帶同往俾騎射並加嫻習總管副管教習及學生等每月應支銀米紙筆墨炭咸與京師宗學覺羅學同一習射由親王至間散宗室十歲以上左翼於每月初七十七二十七日右翼於每月初二十二二十二日在鑲黃旗教場演習騎射覺羅官亦與焉自年二十以上有品秩者每步射二次兼騎射一次每歲春秋二季各甲胄射二次由府核其勤惰優劣注册劣者交族長學長給限學習如仍怠惰者參處甚優者題奏王以下間散宗室覺羅官以上及王等護衛每年習射於七月十七日起至次年四月十七日止本府王公監視若適逢閏七月即於閏七月十七日起一驗閲軍器每五年兵部驗閲八旗後奏請左右翼王公等軍器分兩日驗閲若王公奉差出征及居住陵寢不隨驗閲有服制在百日內者本王公不隨驗閲其長史護衛典儀等官軍器許以子弟代驗順治十八年題準親王箭三千弓十郡王箭二千弓八貝勒箭千五百貝子箭千均弓六鎮國公箭七百輔國公箭六百均弓四鎮國將軍箭四百輔國將軍箭三百奉國將軍箭二百奉恩將軍箭百七十均弓二康熙十九年定世子箭二千五百弓九長子箭千七百弓七又定親王盔甲一撒袋二刀二大纛二條纛二旗槍十豹尾槍四儀刀四蒙古畫角二海螺四世子盔甲一撒袋一刀二大纛一條纛二旗槍八豹尾槍二儀刀二海螺四郡王盔甲一撒袋二刀二條纛二旗槍八豹尾槍二儀刀二海螺四長子盔甲一撒袋一刀一條纛一旗槍六海螺二貝勒貝子並盔甲一撒袋一刀一條纛一旗槍六海螺二鎮國公輔國公並盔甲一撒袋一刀一旗槍四一録用宗室康熙三十七年諭朕傳集諸王及間散宗室於景山校射以勸懲賢否及試以射人優而善射者頗多其有品秩之宗室皆為王府護衛官職既嫻禮法且升遷有階惟間散宗室雖有幹練之人無路上進應將宗室中材力矯健而長於騎射者詳察奏聞朕將授為闕廷侍衛職官視其才力果優勤於供職即授參領副都統職任庸劣者罷斥之或才具頗優願效馳驅而家貧無力者一并察奏朕將籌其生計欽此雍正二年諭朕臨御以來施恩於文武官各得疏通惟宗室等並無升遷之路除朕用為大臣侍衛外欲用在部院衙門倘伊等屬下有為堂官者如何行走欲令考試舉人進士與民等一例搜撿亦非體統惟有宗人府司官筆帖式等員可否補用爾等議奏再宗室內有學優材美者作何考選之處一并議奏欽此遵旨議準宗人府理事官副理官主事筆帖式等所辦議擬功罪稽察俸廩玉牒銀庫等事均關宗室事體不便盡用宗室管理應分一半照例用旗人外其一半用宗室令先在堂上學習遇員闕簡選補用鎮國輔國奉國將軍以理事官用奉恩將軍宗室佐領以副理官用五六品廕生以主事用至間散宗室內有考取一等二等者以筆帖式用嗣後遇理事官員闕以副理官升補副理官員闕以主事升補主事員闕以筆帖式升補其補授理事官副理官主事均由府擬正陪奏請引見補授又奏準府屬宗室司官開列出差及較俸升四五品京堂官與各部院旗員同五年諭增設宗室監察御史二人由宗人府在宗室官內簡選引見令專察宗人府事務仍與御史同屬都察院統轄欽此七年議準宗室侍衛共設九十人并入三旗隨班行走此內一等侍衛九人二等侍衛十有八人餘皆為三等侍衛府會領侍衛內大臣簡選引見補授侍衛什長即於宗室侍衛內補授其職事仍隸領侍衛內大臣八年奏準宗室御史轉補六科給事中與旗員同轉科後仍以給事中稽察府事乾隆二十一年奏準按見在宗室內雖各設有族長但並無總管稽察之人間散宗室不無妄行生事請於宗室大臣官員內每旗各簡選人明白能管轄者二人引見授為總管專令稽察宗室兼管各該旗族長如三年之內盡心勸導管束有方者與族長等各豫紀録一次如不能管束宗室內仍有非分妄為之人將總管族長等一并議處一恭遇恩詔自入八分公至間散宗室凡用為大臣侍衛者得依品級加封自不入八分公鎮國輔國將軍及宗室一二品官準送一子入監讀書均與文武官同一宗室升降崇德元年定宗室以功加封者自奉恩將軍遞加一等至和碩親王親王有功酌量賞給黃金白銀其以過降封者自和碩親王遞降一等至奉恩將軍無可降則為間散宗室其有大功及獲重罪者升降不限等級康熙三十六年題準親王以下子女已授封者均不隨父升降一宗室覺羅考敘王公將軍等兼攝文武職任遇有降罰案件由吏兵二部主稿會府辦理如無兼攝職任在王公將軍爵內遇有降罰事件由府辦理其兼攝之王公等遇罰俸之事照所兼官應罰之數於王公等本俸內扣除餘俸仍給如遇降級之事照八旗世爵之例以罰俸抵降其因事議敘亦給以紀録若於王公本爵內有勤勞議敘者每紀録一次抵本俸二年議敘軍功繫宗室由府主稿會同吏兵二部繫覺羅由吏兵二部主稿會府辦理宗室襲爵由府辦理覺羅襲爵該旗先呈府察明方準辦理至補授太廟執事之宗室覺羅官及府屬宗室官宗室御史宗學總管副管均由府辦理議敘總管覺羅學王公由府辦理議敘覺羅學副管由府奏交該部辦理八旗宗室覺羅文武官委撥隨圍出征及宗室御史轉科補授八旗覺羅文武官均不會府由該部該旗辦理議處宗室覺羅官文職由吏部武職由兵部主稿均會府辦理户婚田土事繫宗室由府主稿會同户部繫覺羅户部主稿會府辦理人命鬭毆事繫宗室由府主稿會同刑部繫覺羅刑部主稿會府辦理一旌表節孝順治九年諭諸王宗室覺羅內有孝友義順及守節貞烈者宗人府核實具奏禮部題請旌表欽此自親王以下至間散宗室覺羅孝友著聞自公主福晉以下至間散宗室覺羅妻女殉節及間散宗室覺羅妻女守節者均由府奏請旌表交禮部辦理一優恤宗室康熙十年定間散宗室年二十以上每月給養贍銀三兩每歲給米四十五斛無父幼子亦照此數其有殘疾不能行走者月給銀二兩每歲給米四十二斛二斗又定宗室已故將其一子不待歲滿準給養贍如無子準將近族之子過繼為子亦不待及歲給與養贍又定宗室官員革職者準給與終養銀三十二年諭宗室原一本所生理應雍睦矜恤今間散宗室有甚貧者遇婚喪之事每至稱貸積逋嗣後王以下間散宗室以上有力者於貧乏宗室著隨分佽助欽此三十九年諭宗室覺羅之女有願與朕撫養者朕為之撫養有女已長成其父母不能遣嫁者朕亦為之遣嫁著察明奏聞欽此四十一年奏宗室周急銀未限定數請令親王以下至間散宗室量力多寡限以定數奉旨宗室豈可勒令佽助朕意欲爾衙門照借戶部八年銀例擇賢能官滋生利息算給宗室婚喪之費著即議奏隨遵旨議準宗室婚喪等事由户部支領本銀六萬兩酌量滋生所領户部銀三年中暫停交還俟第四年並前三年銀陸續交納至八年全完所餘利銀數目奏聞仍作本銀滋生即置庫於府以待宗室覺羅婚喪之費於王公及大臣內各簡一人總理以左右司賢能官專司之四十三年以散振餘銀五千九百兩有竒一并交府滋生五十五年定宗室婚禮給銀百兩喪禮給銀百二十兩初定婚禮六十兩喪禮八十兩是年議增五十八年議準恩賞宗室婚喪銀凡間散宗室及其子孫均準給間散宗室官至大臣侍衛者不準給其已經革職者仍準給宗室大臣侍衛之子未分家者不準給其已分家者繫間散宗室亦準給鎮國將軍以下至奉恩將軍媵妾所生之子除正室無出承受正分家産者不準給外其餘未分家者不給已分家者果繫間散宗室亦準給將軍等媵妾所生之女父故出嫁除有承受正分家産之兄弟遣嫁外其餘亦準給雍正十年鑄給銀庫關防十三年議準間散宗室官止七品筆帖式者遇婚喪事一例給領乾隆五年議準宗室一二品大臣將軍等身故其父母後亡及有遣女出嫁繫兄弟伯叔及近支子弟承辦者如承辦之人未為大臣將軍照例給領六年定薨故革爵貝子公之子及現任侍衛五品以下官遇婚喪事皆準給八年議準喪事視身故之人婚嫁視娶妻及遣嫁之人照六年定例給領十一年議準薨故革爵之王貝勒其子繫間散宗室及革爵之將軍等遇婚喪事皆準給與已寡之妾隨子孫同居者身故亦準給又議準間散宗室除月給養贍銀米外其子弟至十歲亦月給養贍銀二兩又議準每歲季冬月發庫銀萬兩分賚八旗間散宗室見今察出宗室內家貧無産業者二百餘人將本年恩賞銀萬兩內以八千兩先給甚貧之宗室四十人每人二百兩各交族長教長等代置房地報府存案不許典賣其餘無業宗室於次年以後每年以四十人為率陸續代置房産俾五六年間皆得漸次立業其餘銀二千兩留作奬賞之用察有平素守分留心國語及武藝者均分散給若不安本分侈費妄為者不準給其見在察出之二百餘人無論已給産業及未給産業如武藝優嫻國語好均準入於奬賞之例嗣後由府每年彚奏一次俟皆立産業之後每年以銀八千兩合計應得賞給之八旗間散宗室均分散給其奬賞銀二千兩照例將宗室內有志上進武藝優嫻國語好者均分賞給至宗室內安分之人猝遇意外事故致失産業者本年賞賜之時量其家産亦於恩賞銀內酌量撥給俾得復完舊業又議準五旗諸王除期服至近之親各相敦睦外其大功小功及緦麻之宗室如平日守分循理有志上進而生計過艱或遇事故者令諸王酌量周濟至貝勒貝子公等亦各量其力之所能以恤近族宗室如貧乏宗室有不循分不知足肆意需索雖濟無益者不準周恤每年令族長教長於年終報府存案又議準宗室官員照旗員例借給滋生銀十三年奏準王公亦準借給庫銀諸王準借三千兩貝勒千五百兩貝子千兩公五百兩又議準管理銀庫之司官筆帖式照例三年更代即於府屬司官引見補授如有不敷令各部院衙門保送一優恤覺羅乾隆元年議準覺羅婚禮給銀二十兩喪事給銀三十兩自七品官以下至間散覺羅皆準給與其由間散用為侍衛告退者及六品官內護軍校驍騎校亦準給與又定覺羅除犯重罪遇赦不宥者不準給與外其犯拘禁數月之罪已經釋放及遇赦者皆準給與恩賞銀一給假驗病順治十四年題定自親王以下至奉恩將軍或掃墓或以他事出城停宿者均由府奏請得旨乃行在京公主以下縣君以上亦由府請旨間散宗室由府酌量給假康熙十年題準聖駕巡幸時王以下覺羅職官以上槩不準給假惟喪葬出城者不禁四十五年題準王以下公以上所生女受聘後均授封郡主以下品級不便給假同往外省嗣後額駙等停補外官如特用封疆大吏其郡主等應否給假自行奏請又定宗室以病告假及以老乞休者自王公至奉恩將軍由府察驗取結具奏雍正六年定宗室之將軍等以病告假者免其停俸察其病可漸愈給假調治若勢難痊愈即令告退其爵給應襲之人承襲一禁令順治十五年題定諸王以下毋得溺於逸樂耽絲竹及演戲觀魚在城外關廂放鷂致擾居民仍嚴飭各該長史等官令其規諫府官不時稽察有犯者該長史等官一并議處十八年題定城內關廂永禁放鷂王以下至宗室如有耽玩逸樂者令府參奏雍正元年諭宗室王公將軍等延漢人訓課子弟當於進士舉貢內擇端方謹慎之人其下第留京日久者多繫輕薄好生事端之徒不得聘請教讀及容納在家欽此一議罪國初定王以下及宗室有過犯或奪所屬人丁或罰金不加鞭責非叛逆重罪不擬死刑不監禁刑部又定郡主以下及宗女之夫有犯發遣之罪者應否隨行皆請旨順治九年題定郡王以上緣事或傳至府問供或在本府問供具奏候旨定奪十四年題定郡王以上犯大罪傳至府訊問若微罪止在本府訊問其貝勒以下皆傳至府訊問康熙八年題準宗室有過犯者輕重議處其革去宗室之例永行停止雍正三年諭嗣後有應問諸王之處行文訊問如必當傳至衙門者奏聞後再傳至衙門訊問將此永為定例欽此十二年諭舊例宗室等如犯枷責之罪皆準折贖覺羅等照平人例的決朕思覺羅者亦與宗室無異如一準折贖一照例治罪則待宗室覺羅逈乎不同覺羅竟與平人無别宗室亦不知畏懼嗣後宗室覺羅等如犯枷責之罪酌其情罪之輕重分别年限即於宗人府或拘禁或鎖禁俟日限滿後釋放抵罪如此則覺羅之處分與平人有别而宗室等亦知畏懼矣其如何酌量情罪之輕重分别定為年限之處宗人府會同該部定議具奏欽此遵旨議準嗣後除宗室覺羅犯軍流以上之罪者由宗人府看其情罪之輕重别行請旨定議外其犯笞罪有品秩者照官員降級罰俸例議處無品秩者笞十至二十罰養贍銀一月笞三十罰二月笞四十罰三月至滿笞五十罰四月止杖六十罰養贍銀六月杖七十罰七月杖八十罰八月至杖九十罰十月杖一百罰一年止犯徒罪者於空室拘禁犯軍流罪者於空室鎖禁均照旗人折枷日期以二日抵一日俟限滿日釋放犯重罪者臨時請旨乾隆二十二年奉旨王公之格格額駙等賚以品級原繫國家優待宗室之典額駙無罪自有應得品級設本身既因獲罪革職豈可仍留額駙品級冒濫頂帶且格格一經下嫁即為其婦自應一律如夫額駙品級既經革去其格格品級亦當一例斥革嗣後額駙因罪降革者格格品級一并降革之處交該部會同宗人府定例具奏遵旨議準嗣後如額駙等奉特旨革職及緣事斥革者將額駙品級革退其格格品級亦革退不準食俸其守門兵丁一并裁革將原封制册繳送禮部轉交內閣收貯如有開復將所繳制册照舊給還如額駙在職官任內有革職留任及降級留任者又如本身額駙品卑而見任品秩髙於額駙者雖有降級調任較額駙本銜尚優所有額駙品級皆免其降革其格格亦隨夫免其降革如在任內降級調用降一級者將額駙品級降一等如見繫郡主額駙即降為縣主額駙降二級者降二等即降為郡君額駙降三級者降三等即降為縣君額駙降四級者降四等即降為鄉君額駙其格格亦隨夫降等其俸銀俸米並守門兵丁銀米亦照所降品級遞減如降至無等可降將額駙格格品級盡革如遇格格得罪將格格額駙品級革去仍留額駙本身職官再降等之格格從前所授制册送內閣增注降等緣由仍給還如額駙後有開復亦將格格所授制册送內閣增注開復緣由亦仍給還嗣後額駙格格降革之事令各該旗報明宗人府禮部存案欽定大清會典則例卷一
