front:
  text: 欽定四庫全書欽定大清㑹典則例卷二十
  hash: sha256:6782fba65d3d2550b1ae37da0a1904f6623423aa2db169618bebc30501971dbd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_023-1a, image: WYG0620/WYG0620-0411a.png}
body:
  text: 吏部考功清吏司儀制一朝㑹祭祀康熙十二年題準官員朝賀接駕不到及常朝之日不朝或朝服之日不具朝服或違例錯服者皆罰俸一月又題準官員未經上朝詐稱上朝者罰俸一年揑供同上朝之官罰俸兩月其已注病而不在家者察出罰俸一年又題準凡壇廟祭祀車駕出入並升殿之日上朝官員跟役肆行喧譁爭競將聚集官員衝突擁擠者其主罰俸三月其常朝之日官員跟役肆行喧譁爭競將聚集官員衝突擁擠其主罰俸一月其內府人並大臣侍衛之跟役犯者各交與該管大臣治罪十四年題準外官不辭朝赴任者罰俸一年又題準恭遇車駕行幸所過地方應幾里以內官員迎接者該衙門具奏請㫖若所定里數之內一次迎接不到者罰俸一年二次不到者降二級調用又題準官員不照部定儀注行文彼此文移舛錯者罰俸六月又題準凡壇廟等處贊禮舛錯者罰俸六月乾隆二年議準各衙門應陪祀官員務各齊戒陪祀於太常寺文到令該堂官嚴行稽察務令住宿衙署齊戒陪祀不得藉端規避其實有疾病事故者亦令該堂官秉公稽察聲明緣由行文都察院至齊集處都察院收取職名倘並無事故不行齊戒或已開齊戒職名不至齊集處者將該員照違令私罪律議處該管官不行察出照不行詳察例議處一迎送詔書康熙二年題準頒送詔書經過五里以內官員别無公事在城不行迎送詔書者降二級留任若不探聼頒詔官經過實信以致迎送路塗差錯者罰俸一年頒詔官不遵限繳詔遲延三月以上者罰俸一年半年以上者降一級調用一年以上者革職四十二年覆準各省頒詔官員於起程之日計算往返直𨽻限十五日山東限二十五日河南山西河道總督限三十日漕運總督限四十五日江南限六十日江西浙江陜西湖廣限七十五日貴州限九十日福建四川廣東廣西限一百五日雲南限一百二十日該督撫將詔到日期報部察核其頒詔官員如果江湖風阻疾病耽延取具經過地方官印結報部倘有故意遲延違限者照頒詔官不遵限繳詔例分别議處一玩誤耕藉乾隆二年議準各省管理藉田官員如有將藉田荒蕪或聼民佃種及工程祭器等項並不留心經理者將該管官題參革職仍令該員逐一修治整理無闕始令回籍九年議準各省耕藉凡建造置備悉關動用錢糧嗣後各直省地方官倘仍有因循玩忽以致壇宇傾圯祭器闕失除州縣仍照例議處外所有徇隱失察之各該上司如不據實揭報題恭將徇隱之府道照徇情例降二級調用失察之撫司照失於詳察例罰俸一年文禁附僧道度牒一揑造鈔報康熙五十三年議準各省報房在京探聼事件任意揑造言語録報繫官革職該管官不行察出一次罰俸六月二次罰俸一年三次降一級調用五城監察御史及五城司坊官大宛二縣不時稽察倘有前項違禁之徒從重治罪該管官不行察出後經發覺照例議處在京大臣貴近亦須戒飭家人子弟不得濫交匪類倘有前項事發將濫交匪類之家人子弟並不行約束之家主一并照例議處治罪又議準姦棍等匿名揭帖妄行詐害不繫兩造對理布散部院衙門投送者槩不準行出首送揭之人緝拏移送刑部照例治罪不行拏送降四級調用若接受具題審理者將接受具題審理官革職若不肖之官唆使劣棍黏貼揭帖或令布散投送亦照黏貼布散揭貼之人例治罪其匿名揭帖不繫兩造對理揭帖布散黏貼之人該管地方官不行嚴加訪拏發覺將司坊官罰俸一年巡城御史罰俸半年雍正元年議準在京書吏提塘人等串通圖利訛造無影小鈔藉端嚇詐交與都察院給事中五城巡城御史司坊官順天府大宛二縣不時嚴行訪拏若不行嚴拏事發該巡城給事中御史各罰俸一年司坊兩縣官員各降二級調用一嚴禁訟師雍正三年奏準凡寫呈辭之人止令寫録實情控告若教唆辭訟增减情罪誣告並駕辭越告以致傷財害俗者令地方官嚴拏照律例從重治罪若地方官失於覺察該督撫訪聞題恭將不報之地方官照生監包攬錢糧該管官不行察出例罰俸一年若明知訟師誘惑愚民教唆誣揑等事仍復徇畏不報經上司訪拿將該地方官照姦棍不行察拏例降一級調用一嚴禁淫辭乾隆三年議準坊肆內一應小說淫辭嚴行禁絶將版與書一并盡行銷燬如有違禁造作刻印者繫官革職買者繫官罰俸一年若該管官員不行察出一次者罰俸六月二次者罰俸一年三次者降一級調用仍不準藉端出首訛詐一僧道度牒乾隆四年奏準僧尼道士凡有事故將原領牒照追繳勿許改名更替但恐地方官漫無覺察以致不肖僧道將已故之牒照暗行隱匿將見在之牒照私相授受應責成地方官不時稽察其應繳牒照年終彙繳不得遺漏如有隱匿影射情弊地方官不行察出照失察例罰俸三月僧道勒令還俗僧道必年逾四十方準招受生徒一人如年未四十即行招受及招受不止一人地方官不行察明照失察例罰俸三月所招生徒勒令還俗又奏準各省地方官遇有真人府法官𫝊度散帖之事不行拏究及溷行詳請咨部者府州縣官罰俸一年督撫司道罰俸六月至嗣教真人如有差委法官前往各省開壇𫝊度之處咨部請示禮部堂司官溷行咨準者將該司官罰俸一年堂官罰俸六月服飾一服飾違例康熙十一年議準凡違例越分僭用服色者繫官革職其違禁之物入官如該管官不行稽察被旁人獲首到官審實將違禁之物給與獲首之人其族長繫官罰俸三月若家下奴僕違禁者奴僕之主繫官罰俸三月其五城司坊官失察者每事罰俸三月該城滿漢御史失察者每事犯二次罰俸三月直𨽻各省軍民違禁該督撫失察三次罰俸三月司道失察二次罰俸三月府州縣官每事罰俸三月雍正五年議準凡屬員謁見上司遇公服之日止用補服不許擅用朝衣違者皆照錯誤儀注例議處七年諭百官章服皆有一定之制所以辨等威昭品秩也向來屢申禁約不許逾分濫用以開僭越之端定例昭然各宜遵奉聞近來服色頂帶及坐褥頂馬繁纓之屬又有不按定例任意僭越者御史有稽察部院之責而各御史中即有參差不齊之處是己身先有逾分違例之咎又何以彈劾他人嗣後紫禁城內著三旗侍衛稽察大城內著步軍統領稽察外城著五城御史稽察倘有違例僭越之人而侍衛統領御史不行恭奏别經發覺者將稽察之員一并處分欽此八年諭大小官帽頂補服坐褥等項各宜遵照見任品級不得僭越從前已降諭㫖後因御史等察奏文武官員內有補服與頂帶不相符者朕又降㫖頂帶等項各按本分品級不得計算加級所頒諭㫖甚明近聞文武官員仍有越制擅用者又該管官察問時則引從前推算加級之例掩飾支吾甚屬不合嗣後內外文武大小官員頂帶補服坐褥悉照本身見在品級不得指稱加級以開僭越之端在京著有稽察之責者嚴行稽察在外著該管上司稽察倘仍復不遵除將本人議處外其失察之員亦一并處分欽此乾隆二年議準各省官民服飾自定制之後凡有違者王公由宗人府稽察恭處文武大臣由吏部兵部稽察恭處各衙門官員由該管官察恭按其情罪輕重分别處分違式之物入官四年覆準官員違例錯用帽頂補服坐褥者皆罰俸六月五年奏準京官禮部司務太常博士典簿讀祝官贊禮郎鴻臚寺鳴贊光祿寺署正署丞國子監監丞博士助教學正學録等官恭遇壇廟執事殿陛侍儀之時準其懸掛數珠其平常在署仍按㑹典定制遵行不得越分擅用如有尋常無事之日懸掛數珠者一經科道察參照違制律議處十年覆準吏員僭用補服干謁地方官照違制例革去職銜至州縣佐雜等官均有地方之責理宜關防嚴肅如有與在籍吏員往來請託有玷官針者事發照因事囑託例革職欽定大清㑹典則例卷二十
