body:
  text: 兵部武選清吏司職制一一八旗武職順治初年定上三旗四品以上官都統等擬正陪具題補授五品以下官擬正陪咨部具題補授其前鋒參領護軍參領前鋒侍衛親軍校前鋒校護軍校等由該管官具題補授咨部注册下五旗五品以上官該旗簡選擬定正陪咨部具題補授至上三旗驍騎校以下五旗六品以下官及王公護衛均照咨補授槩不具題康熙十八年奉㫖王等護衛王府佐領均咨部具題引見補授六品以下仍照咨補授三十三年奉㫖八旗四品以上官皆朕親驗補授兵部不必逐案具奏著於每月三十日彚題三十九年議準各旗補授外省駐防官並步軍校等將補授之處咨部月終彚題雍正二年議準各省駐防佐領令本處協領兼管者由各該將軍都統副都統聲明具題毋庸送部引見乾隆七年奏準在京都統各統領駐防將軍都統副都統均由部開列具題補授陵寢總管翼領信炮總管河南鄭家莊二處城守尉黑龍江吉林管水手官由部引見補授在京驍騎參領以下官駐防協領以下官由各旗引見補授前鋒參領以下官由前鋒統領引見補授護軍參領以下官由該旗護軍統領㑹本翼護軍統領簡選引見補授凡補授五品以上者咨部月終彚題六品以下者咨部注册其駐防領催題補驍騎校附入月終彚題二十年奉㫖各省城守尉協領及各地方總管等官應各該旗簡選補授者由本旗引見如繫八旗公額由兵部簡選引見辦理殊未畫一從前未設直年旗所有公額簡選旗員兵部引見猶可今既定有直年旗辦理八旗事務則此等公中簡選之旗員理應直年旗引見嗣後應各該旗簡選補授者仍著本旗引見其公中簡選者著直年旗引見兵部引見之處停止欽此二十一年奉㫖直省記名領催人等皆繫補授驍騎校引見時記名之人理宜闕出即行坐補若每次皆經奏明始行坐補轉致紛繁嗣後似此記名之人著該將軍等酌量闕出即行坐補著於嵗底將坐補幾人彚報該旗轉奏一補授掌鑾儀衛事內大臣順治初年定掌衛事內大臣員闕由領侍衛內大臣將應補領侍衛內大臣內大臣職名開列送部由部具疏題請餘官見鑾儀衛一補授都統順治初年定滿洲都統員闕將蒙古都統前鋒護軍各統領滿洲蒙古副都統及外省將軍副都統並子爵以上官開列題補蒙古都統員闕將前鋒護軍各統領滿洲蒙古副都統及外省將軍副都統並子爵以上官開列題補漢軍都統員闕將漢軍副都統漢軍外任提督及外省副都統並子爵以上官開列題補康熙二十三年題準滿洲都統員闕將滿洲任漢軍都統副都統一并開列漢軍都統員闕將本旗前鋒護軍各統領滿洲蒙古副都統一并開列雍正十年議準八旗都統員闕不必越翼在本翼內不論旗分互相調補其左翼人見任右翼右翼人現任左翼者遇有本翼員闕將旗分注明題請調補乾隆七年奏準滿洲都統員闕將本翼蒙古都統蒙古任漢軍都統前鋒護軍步軍各統領滿洲蒙古副都統滿洲任漢軍副都統外省滿洲將軍都統副都統滿洲外任提督及由京官授歸化城都統副都統開列題補蒙古都統員闕將本翼前鋒護軍步軍各統領滿洲蒙古副都統滿洲任漢軍副都統外省滿洲將軍都統副都統滿洲外任提督及由京官授歸化城都統副都統開列題補漢軍都統員闕將本翼前鋒護軍步軍各統領滿洲蒙古漢軍副都統外省漢軍副都統漢軍外任提督開列題補其子爵以上官停其開列二十年奉㫖蒙古任漢軍副都統駐防蒙古將軍都統副都統蒙古外任提督遇滿洲都統闕一例開列一補授副都統順治初年定滿洲副都統員闕將蒙古副都統及王府長史前鋒護軍各參領論俸開列十人題補蒙古副都統員闕將王府長史前鋒護軍各參領論俸開列十人題補漢軍副都統員闕將參領及漢軍外任總兵官並男爵以上官開列題補康熙十二年題準蒙古副都統員闕將王府長史前鋒護軍各參領論俸開列八人驍騎參領論俸開列二人及男爵以上官一并開列二十二年奉㫖滿洲蒙古漢軍副都統員闕將本旗侍郎一并開列二十三年奉㫖滿洲副都統員闕將應升蒙古副都統之人一并開列又議準漢軍副都統員闕將滿洲王府長史前鋒護軍驍騎各參領論俸開列八人漢軍參領論俸開列二人及外省總兵官一并開列二十五年議準應升副都統之前鋒護軍參領如原由驍騎參領補授者開列時止論見俸不凖通理前俸其王府長史由參領補授者亦照此例雍正十年奏準副都統員闕如本翼見有署理副都統之人將其職名開列於前其應升各官仍照例開列又議準八旗副都統員闕不必越翼在本翼內不論旗分互相調補其左翼人見任右翼右翼人見任左翼者遇有本翼員闕將旗分注明題請調補十二年奉㫖滿洲副都統員闕將應升漢軍副都統之漢軍參領一并開列乾隆三年題準蒙古副都統員闕將游牧總管論俸開列如由參領補授者并論前俸由别途補授者止論總管俸七年奏準滿洲副都統員闕將本翼蒙古副都統滿洲任漢軍副都統開列題補並將本翼滿侍郎按旗開列本翼蒙古侍郎亦按旗開列本翼步軍翼尉參領等官每旗開列十人內先將步軍翼尉前鋒統領之協理事務前鋒參領護軍統領之協理事務護軍參領滿洲蒙古都統印房協理事務驍騎參領不論俸通行開列次將王府長史前鋒護軍驍騎各參領游牧總管論俸開列各足每旗十人之數滿洲外任總兵官者按旗開列於後如開列滿洲副都統遇有滿洲任漢軍副都統職名即將應升漢軍副都統之本翼漢軍侍郎按旗開列本翼漢軍參領每旗開列二人內先列都統印房協理事務參領一人次列俸深之參領一人再將本翼滿洲蒙古散秩大臣公侯伯子男冠軍使一等侍衛王府長史一等護衛前鋒護軍驍騎各參領內府護軍統領别列名單附疏以進蒙古副都統員闕將本翼蒙古侍郎按旗開列本翼步軍翼尉參領等官每旗開列十人內先將步軍翼尉前鋒統領之協理事務前鋒參領護軍統領之協理事務護軍參領滿洲蒙古都統印房協理事務驍騎參領不論俸通行開列次將王府長史前鋒護軍驍騎各參領游牧總管論俸開列各足每旗十人之數其滿洲外任總兵官者按旗開列於後再將本翼滿洲蒙古散秩大臣公侯伯子男冠軍使一等侍衛王府長史一等護衛前鋒護軍驍騎各參領內府護軍統領别列名單附疏以進漢軍副都統員闕將本翼漢軍侍郎按旗開列本翼步軍翼尉參領等官每旗開列十人內先將步軍翼尉前鋒統領之協理事務前鋒參領護軍統領之協理事務護軍參領滿洲漢軍都統印房協理事務驍騎參領不論俸通行開列次將王府長史前鋒護軍各參領滿洲漢軍驍騎參領論俸開列各足每旗十人之數并將外省總兵官通行開列於後再將本翼滿洲漢軍散秩大臣公侯伯子男冠軍使一等侍衛王府長史一等護衛前鋒護軍驍騎各參領內府護軍統領别列名單附疏以進十年奉㫖副都統補授侍郎者或準兼副都統不準兼副都統該部請㫖十一年議準開列副都統員闕將滿洲火器營協理事務鳥槍護軍參領列名於協理事務前鋒參領之後協理事務鳥槍驍騎參領列名於協理事務護軍參領之後十五年議準圓明園營總及護軍參領靜宜園健鋭營翼領及前鋒參領遇有副都統員闕與八旗參領一例論俸開列其營總列名於本旗協理事務護軍參領之次護軍參領與本旗應升之人論俸開列翼領列名於火器營協理事務鳥槍護軍參領之後圓明園協理事務營總之前前鋒參領與各參領論俸開列又奏準嚮導總統之協理事務參領遇有副都統員闕與前鋒統領護軍統領之協理事務參領一同開列十六年奏準開列副都統員闕將圓明園協理事務營總列於各營總之前協理事務護軍參領列於各營總之後二十年奉㫖蒙古見任漢軍副都統蒙古外任總兵官遇滿洲副都統闕一例開列一補授統領順治初年定前鋒統領員闕將滿洲蒙古副都統及前鋒護軍各參領開列題補護軍統領員闕將滿洲蒙古副都統及王府長史前鋒護軍各參領開列題補康熙二十三年議準前鋒統領員闕本翼護軍統領一并開列護軍統領員闕滿洲任漢軍副都統者一并開列步軍統領員闕將八旗驍騎參領步軍總尉論俸開列十人題補乾隆七年議準前鋒統領員闕將本翼護軍統領滿洲蒙古副都統滿洲任漢軍副都統開列題補護軍統領員闕將本翼滿洲蒙古副都統滿洲任漢軍副都統開列於前參領各官論俸開列十人內先將前鋒統領之協理事務前鋒參領護軍統領之協理事務護軍參領不論俸通行開列次將由前鋒護軍參領補授之王府長史及前鋒護軍各參領等論俸開列共足十人之數步軍統領員闕將滿洲蒙古副都統滿洲任漢軍副都統步軍總尉開列題補一補授駐防將軍順治年間定駐防滿洲將軍員闕將八旗滿洲蒙古副都統及本駐防副都統開列題補漢軍將軍員闕將八旗漢軍都統開列題補康熙十二年題準駐防漢軍將軍員闕將內外漢軍副都統及漢軍任提督者論俸開列十人題補二十三年議準滿洲將軍員闕將滿洲任漢軍副都統者一并開列乾隆七年奏準滿洲將軍員闕將滿洲任提督者一并開列一補授駐防天津都統乾隆二年題準天津都統員闕將前鋒護軍各統領滿洲蒙古副都統滿洲任漢軍副都統開列題補七年奏準天津都統員闕將滿洲任提督者一并開列一補授駐防副都統順治初年定駐防滿洲副都統員闕將滿洲驍騎參領本處協領各城守尉開列題補駐防漢軍副都統員闕將漢軍參領駐防漢軍協領按翼論俸開列十人並將外省總兵官一并開列乾隆五年議準駐防滿洲副都統員闕將在京記名參領等官各按本翼開列十人如八旗公額每翼開列十人均附疏以進又議準駐防滿洲蒙古協領引見記名者遇有駐防滿洲副都統員闕除將俸深應升之人照例開列外其記名協領别列名單附疏以進七年議準駐防滿洲副都統員闕將各處三品總管並滿洲任總兵者一并論俸開列八年議準駐防漢軍協領引見記名者遇駐防漢軍副都統員闕别列名單附疏以進黑龍江水師營漢軍總管與各省協領品級相同準照協領之例論俸開列十年奏準駐防副都統員闕將八旗見任副都統按翼開列附疏以進恭候調補一補授右衛副都統康熙四十八年議準右衛副都統員闕將在京副都統按翼開列題補乾隆五年奏準右衛副都統印由部將右衛副都統開列具題請簡一人掌管一補授歸化城副都統原定歸化城都統員闕由理藩院開列題補其副都統員闕由部將上三旗滿洲前鋒參領護軍參領驍騎參領開列題補一補授火器營總統康熙三十年議準火器營總統員闕將領侍衛內大臣前鋒統領護軍統領滿洲蒙古都統副都統滿洲蒙古任漢軍都統副都統開列題請兼管一補授嚮導總統原定嚮導總統員闕將前鋒統領護軍統領滿洲蒙古副都統滿洲任漢軍副都統開列奏補一稽察營房乾隆七年奏準城外營房將本翼都統副都統開列具奏請簡一人管理稽察十一年奉㫖八旗舊營房每旗各除大臣一人總轄官兵居住房屋毋致任意損壞著交部照管轄新營房之例將八旗大臣等職名進呈二十二年遵㫖議奏八旗滿洲蒙古舊營房居住之兵丁人數衆多稽察難周應於滿洲蒙古旗內各簡大臣一人管理又於滿洲蒙古前鋒護軍驍騎各參領內簡選二人擬正陪引見授為營總專司約束再每營見設滿洲旗分散秩官一人驍騎校五人請增設蒙古驍騎校二人驍騎五人合計每參領下驍騎校各一人驍騎各五人增設散秩官一人每營各設散秩官二人即令散秩官驍騎校稽察營房兵丁如有不守本分滋事擾纍者即報該營總察繫輕罪鞭責示懲重罪按律究治其散秩官以下如於三年之內實心稽察並無參罰事故者準其各紀録一次六年無事故者咨送該旗於應升內列名若稽察不嚴以致兵丁生事為匪及隱匿不報者分别議處如見在營房居住兵丁內有不守本分者即行察出送回該旗所遺房屋别選誠實兵丁居住再新營房內皆繫看守城門兵丁應於每營簡滿洲蒙古大臣一人管理具奏奉㫖所議將不安本分之兵丁遷入城內則城內之人轉致染其陋習應令㸃出之大臣等嚴加訓飭如於一年內能悔過自新者準其居住若仍不悛改即著發往拉林專管之大臣仍於一年報滿之日將應去應留之兵丁據實具奏分别辦理此後若再有為匪兵丁即繫大臣不能稽察其咎亦奚辭餘依議一稽察京倉雍正十二年議準在京各倉每倉以都統或副都統一人專司稽察三年期滿更代按任之人未滿三年者遇更代之期亦準更代屆期除已經稽察之都統副都統外其餘都統副都統由部通行開列具奏恭候簡用每倉籖掣一人管理一直年乾隆十六年奉㫖八旗大臣等辦理事件每多遲延雖有直月大臣將一應事件彚總承辦然推諉成風惟以草率塞責過此一月移交下旗可以完事並無實力辦理與事無益嗣後八旗大臣不必按旗直月朕特命數人一年一次輪流直年著該部將都統副都統等職名不論旗分全行進呈朕酌量選用令伊等於各旗參領等官內簡選好者將八旗一應彚辦事件令其承辦至年終將一年內已完事幾件未完事幾件按欵繕摺奏聞其是否實力辦理昭然可知著永為例一署印雍正元年奉㫖八旗事務緊要嗣後都統有奉差者該部奏請署印乾隆七年議準都統奉差在半月以內者令本旗副都統署印半月以外者由部奏請委人署印如一旗都統副都統皆經奉差雖在半月以內仍行奏請署印所有半月內外日期令奉差之人於起程前報部十二年奉㫖前鋒統領護軍統領等遇有出差事故不必奏請署印前鋒統領內有一人出差兩翼印務歸一人兼管護軍統領內有一二人出差所遺印務即著在京護軍統領按旗兼署如兩翼前鋒統領皆經出差及護軍統領等止剩四五人再奏請署印又議準護軍統領出差於本翼四旗內按旗署印十八年奉㫖嗣後護軍統領內遇有奉差隨圍雖剩四五人亦不必奏請署印俟止剩二人時再行請㫖一開闕雍正十三年議準在京八旗大臣有出征者其員闕開列題請補授俟凱旋之日將該員已經回京及原官已有人補授之處具奏請㫖乾隆三年議準在京八旗大臣有命往外省署事者其員闕應否開列補授具奏請㫖二十二年奉㫖向例各省將軍遇有升遷調補緣事離任者皆以副都統按翼署理如云按翼亦必二人新舊相同方可按翼若新舊相隔甚逺理應較其新舊令年久之人署理豈有轉令年新之人署事之理乎嗣後各省將軍等遇有升遷調補及緣事離任者其將軍印務即令本城年久副都統署理如接任年分相同無可區别者仍著按翼署理永著為例一補授王公屬官原定王府長史員闕由該王於所屬前鋒護軍驍騎各參領佐領散騎郎一二等護衛輕車都尉騎都尉內簡選擬定正陪咨部引見補授貝勒司儀長員闕由該貝勒於所屬佐領二三等護衛輕車都尉騎都尉及三四品官內簡選擬定正陪咨部引見補授一二三等護衛及四五六七八品典儀員闕除佐領輕車都尉以上世爵不準簡選外由該王貝勒貝子公等於所屬內按其應升品級簡選擬定正陪咨部五品以上者咨部引見補授六品以下者照咨補授又定簡選護衛典儀如一時不得其人準將越銜一等者擬補不得越二等其新封王貝勒貝子公無可擬補護衛典儀之人聲明情由準於無職人內擬定正陪咨部補授雍正四年具奏散騎郎員闕除佐領不準擬補由該王貝勒等於所屬子爵以下雲騎尉以上簡選擬定正陪咨部引見補授奉㫖各王屬散騎郎存留貝勒貝子散騎郎著停止嗣後王屬散騎郎員闕若有選取存留者令指名具奏乾隆七年議準王府長史員闕準將子男與參領等官一并簡選引見十八年奏準諸王長史貝勒司儀長繫首領官若僅於該王貝勒所屬各官內簡選補授恐人數無多必有遷就之弊嗣後諸王長史貝勒司儀長員闕於下五旗前鋒護軍驍騎各參領及世爵各官並於各王貝勒所屬應升長史司儀長之護衛令該都統每旗簡選二人送部㑹領侍衛內大臣該王貝勒簡選擬定正陪仍由部㑹該王貝勒引見補授一補用記名官乾隆五年奏準奉㫖記名各官三品者遇外省城守尉總管員闕或由部引見或由該旗引見照例分别辦理四品以下者該旗察由軍政卓異或軍前效力有年按其品級遇應升之闕指名奏請補授如記名人內未在軍前效力又無軍政卓異遇有應升之闕仍將記名之人擬正軍政卓異之人擬陪軍前效力有年之人開列於後一并引見若無軍政卓異之人即將軍前效力有年之人擬陪至此項記名之人遇調補升遷後將記名之處注銷若新任內又經記名於有闕應升時仍照從前記名之例辦理又奏準滿洲蒙古副都統員闕將奉㫖記名者於本翼內開列十人别繕清摺與題本一并進呈此所開十名內先將卓異及協理事務之前鋒護軍參領印房協理事務之驍騎參領一等侍衛冠軍使王府長史等官開列於前如十人之數不足再於前鋒參領等官論俸開列以足十人之數引見恭候欽定補授漢軍副都統員闕將記名之漢軍參領亦一并開列外省本翼副都統員闕照此例行如繫八旗公額每翼開列十人其餘公侯伯子男及王府一等護衛等官有因兼副參領佐領與印房行走引見記名者祗於隨摺內開列將記名之處注明不必引見一補用卓異官雍正六年奉㫖駐防卓異引見之官如遇應升員闕停其引見該將軍等即行奏聞補授乾隆七年奏準駐防卓異官引見已過三年者遇有應升員闕仍咨送來京引見一駐防豫保領催乾隆五年覆準各省駐防滿洲蒙古漢軍領催由該將軍都統副都統等簡選材技優長曽經效力者以本處驍騎校額數為準多者不過四十人少者不過三十人豫保送部引見恭候欽定記名發回記名一等者遇驍騎校員闕即行補用二等者不必論次序將效力好人去得者補用若記名之後有行止改變者咨部注銷俟用完之後再行豫保六年議準奉天各城驍騎校旗額翼額公額均照各省之例行十年議準各省駐防前鋒照領催例豫保送部引見記名以驍騎校用齊齊哈爾黑龍江默爾根城呼蘭四處管莊官五年任滿除通曉文義者該將軍具題豫保送吏部分别補用外若不通曉文義並不能遷移來京情願候補本處武職者五年任滿該將軍出具考語具題其行走勤慎之人遇驍騎校員闕與記名領催相間輪用尋常供職者俟記名領催用過三人之後用一人十七年議準各省駐防恩騎尉準以驍騎校升用各將軍都統副都統等於豫保領催時一同簡選送部引見記名候補又議準駐防領催停其豫保遇有驍騎校員闕由該將軍都統副都統等簡選擬定正陪送部交該旗引見如將擬正之人補授其擬陪之人應否準其記名發回題補恭候欽定十九年議準福建領催仍行豫保送部引見奉㫖記名發回以驍騎校題補倘行止改變咨部注銷又奏準廣州駐防防禦驍騎校各四十人遇有升遷事故員闕向繫將記名領催委用署理俾得學習諳練於旗員有益嗣後仍照舊例豫保一改補乾隆元年議準旗員補授緑旗營闕五年俸滿有於營務不甚相宜者該督提咨部轉咨該旗仍歸原處行走俟應用之官有闕副將以步軍翼尉城守尉協領改補參將游擊以前鋒參領護軍參領驍騎參領改補都司以前鋒侍衛副參領步軍協尉佐領及各省防守尉改補守備以步軍尉五品防禦改補其由副將改補步軍翼尉各官者仍照從二品頂帶食俸遇應升之官一同開列七年議準文職改補旗員者給事中御史郎中道知府以副參領佐領城門領改補同知知州以步軍尉司信炮官改補主事通判知縣以驍騎校改補小京官司府首領官州縣佐二筆帖式以城門吏改補都統等量才器使或令隨印辦事或令在旗行走試用一年果能黽勉遇應補之官擬定正陪引見補授一降補原定王公府屬各官有因王公薨故或王公緣事解任者如曽遇恩詔受封交旗酌量補用康熙十二年議準因王公緣事革去之府屬各官曽遇恩詔受封者交該旗降等與應補之人簡選擬補該員前任所得加級全行注銷未遇恩詔受封者毋庸議乾隆五年奏準一品之領侍衛內大臣內大臣都統將軍降一級調用者以內外副都統擬補降二級調用者繫滿洲以陵寢總管步軍翼尉城守尉協領前鋒護軍驍騎各參領擬補繫蒙古以游牧總管副管協領前鋒護軍驍騎各參領擬補繫漢軍以在京參領在外協領擬補降三級調用者繫滿洲以陵寢翼領信炮總管前鋒侍衛副護軍副驍騎各參領佐領步軍協尉城門領防守尉擬補繫蒙古以前鋒侍衛副護軍副驍騎各參領佐領步軍協尉城門領擬補繫漢軍以在京副參領佐領步軍協尉城門領在外參領擬補降四級調用者繫滿洲漢軍以司信炮官步軍副尉外省防禦擬補繫蒙古以步軍副尉外省防禦擬補其二品之前鋒護軍步軍各統領副都統鑾儀使散秩大臣降一級二級三級調用者與一品官降二級三級四級調用之例同以上遇有員闕察明降調應用之人繫開列具題者聲明降調情由列名於應升各官之後繫引見補授者聲明降調情由列名於各官應升之後均候欽定至一品官降五級調用二品降四級調用者不補前鋒校護軍校等官除該員原有世爵者令以世爵在旗行走外其無世爵者帶所降之級隨旗行走三年無過該都統等出具考語引見請㫖將降五級之一品官照降四級例擬補降四級之二品官照降三級例擬補若降級數多至無官可補者停其補用又奏準在京三品官降一級調用者以四品官擬補降二級調用者以五品官擬補降三級調用者以六品官擬補其四品官降一級二級調用者與三品官降二級三級調用之例同五品官降一級調用者與四品降二級調用之例同統俟遇有員闕由該衙門察明降調應用之人聲明降調情由列名於應升各官之後一并引見恭候欽定至三品官降至四級以下四品官降至三級以下五品官降至二級以下無官可補者停其補用又奏準各駐防三品以下官降級調用者均以本處駐防之官按品擬補此等降調之人遇有員闕該將軍都統副都統於咨送應升各官引見時將該員降調情由聲明一并咨送該旗列名於應升各官之後引見其降調應用驍騎校者接到部文之日送部引見發回遇有驍騎校員闕酌量題補至總管城守尉防守尉及所屬官降級調用者均令回旗俟該旗出有各處總管城守尉防守尉所屬員闕由該旗都統副都統等按其所降之級與應用之官相符聲明降調情由列名於應升各官之後一并引見以上各官若降級數多至無官可補者停其補用又議準王公府屬長史司儀長典儀各官降級調用者典儀有四品至八品不同由該王公按所降之級咨部擬補長史司儀長降級調用者由該王公以護衛之闕按品遞降咨部擬補如降至無官可補者革職一等護衛降一級調用者授為二等護衛二等護衛降一級調用者授為三等護衛三等護衛降一級調用者無官可補革職六年議準三品降四級四品降三級五品降二級調用者以城門吏擬補又議準一等侍衛降一級調用者授為二等侍衛二等侍衛降一級調用者授為三等侍衛三等侍衛降一級調用者革職七年議準三等侍衛以下尚有四等侍衛藍翎侍衛未便因降一級調用即議革職嗣後三等侍衛降一級調用者授為四等侍衛四等侍衛降一級調用者授為藍翎侍衛藍翎侍衛降一級調用者革職又議準鑾儀衛官降級調用者以冠軍使雲麾使治儀正整儀尉按品遞降遇應補之官由該衛聲明降調情由列名於應升各官之後引見一駐防官入覲雍正四年諭盛京等處將軍副都統等每年令輪班陛見各省駐防將軍副都統亦應來京陛見其作何輪班之處兵部議奏欽此遵㫖議準右衛寧夏江寧京口荆州廣州等處各有將軍一人副都統二人初次令將軍來京二次三次令副都統各一人來京西安杭州二處各有將軍一人副都統四人初次令將軍來京二次三次令副都統各二人來京歸化城有都統二人副都統四人初次二次令都統副都統各一人來京三次令副都統二人來京福州有將軍一人副都統一人初次令將軍來京二次令副都統來京均依次輪班周而復始每年定於十二月到京將軍印務酌交副都統署理內有新任及因公陛見回任未久者即暫停來京俟未經陛見之人輪班已周再行來京四川成都止有副都統一人令其三年來京一次印務交巡撫署理天津距京甚近每年令於封印後來京五年奉㫖嗣後各省副都統陛見各按原定班次來京如將軍輪當陛見豫為具題候㫖遵行十三年覆準各省駐防協領於每年停操之後該將軍等秉公考察給咨赴部由部核驗引見恭候欽定記名遇有開列升用之處將記名之人别列名單附疏以進乾隆八年覆準駐防協領引見後尚未升用者不必復行送部若新授協領俟任滿三年送部引見又議準福州增設副都統一人涼州設將軍一人副都統一人莊浪設副都統一人青州設將軍一人副都統一人熱河設副都統一人右衛將軍移駐綏遠城復增設副都統二人天津增設副都統一人山海關設副都統一人應令輪班陛見嗣後福州初次令將軍來京二次三次副都統各一人來京青州初次令將軍來京二次令副都統來京綏遠城右衛初次令將軍來京二次令綏遠城副都統來京三次令右衛副都統來京涼州初次令將軍來京二次令涼州副都統來京三次令莊浪副都統來京天津初次令都統來京二次令副都統來京熱河山海關副都統均間一年來京其各省將軍都統副都統來京時均將起程日期豫期報部熱河山海關副都統來京時印務交協領署理十四年議準歸化城副都統見裁二人陛見之期應行更定嗣後該處都統副都統分為二次輪班來京又覆準黑龍江總管城守尉參領均照協領之例送部引見十六年奉㫖各省駐防協領等例應三年一次輪班來京引見所以察其優劣酌量記名升用以示激勸之意其城守尉總管等定例時並未議及伊等皆防守城池督率官兵之大員所關更為緊要即如朕巡幸所至之處留心察看其優者升用示勸劣者降斥示懲若巡幸未至之處賢否既未周知其中庸劣之人得以姑容曠廢不但於公事無益即有才優之人亦因不得顯其所長以至阻抑上進之心於一應事務未免草率辦理嗣後各省駐防城守尉總管等亦照協領之例輪班引見其如何分定年限之處該部定議具奏欽此遵㫖議準盛京所屬之開原興京金州鳳凰城岫巖遼陽復州義州青州所屬之德州天津所屬之滄州及開封太原鄭家莊保定等處城守尉八旗游牧察哈爾總管副管參領吉林參領皆三品大員應照協領之例三年任滿由該管官出具考語送部引見其無大員統轄者於任滿之日報部調取引見至陵寢總管有按時上香行禮等事與駐防官不同毋庸輪班引見二十二年定京口鎮海標營奉㫖令江寧將軍兼管嗣後將軍照例閲二年一次來京陛見其江寧副都統二人京口副都統二人照西安及綏遠城右衛例每年各令副都統一人輪班陛見一八旗官守制乾隆二年奏準八旗都統前鋒護軍步軍各統領遇有親喪所管印務由部奏請署理副都統遇有親喪該旗同辦事之副都統又有事故亦奏委署理其餘有職任各官均由該旗委官署理報部駐防將軍都統副都統遇有親喪或回京治喪或扶柩歸葬如將軍都統來京印務交本處副都統署理副都統代為具題副都統來京將軍都統代為具題若副都統不與將軍同城者該將軍仍委人署理均一面具題一面回京其本無將軍統轄之副都統遇有親喪將印務委官護理報部由部奏請署理俟署理之人前往交代後起程回京又奏準八旗武職遇有親喪咨部注册百日後入署辦事照常支俸朝㑹祭祀均免執事二十七月內除奉特㫖升轉外其餘論俸推升之處概行停止服闋時準其接算前俸又奏準八旗駐防旗員父母在京病故呈請給假者該管官委官署理報部即令回京其無大員統轄之城守尉等官父母在京病故將印務委官署理報部回京治喪凡回旗治喪各官除往返日期外均給假百日假滿呈明該都統等報部銷假仍回原任其扶柩歸葬者亦照治喪之例給假又奏準京外旗員如遇父母祖父母及所後父母祖父母在任故者以故日為始居喪百日在他處故者以聞訃日為始奉差出征者以回日為始皆居喪百日其父母及所後父母並為祖父母承重者仍私居持服盡三年喪禮如親伯叔父母親兄弟並妻及娶妻之子故者居家兩月親伯叔祖親嫂親伯叔之子及娶妻之孫故者居家一月親伯叔祖母親弟婦親伯叔子之妻故者送殯後過七日令其行走宗族故者送殯後即令行走凡居喪持服各官皆呈報該旗都統及該管官準假再在京官有朝㑹㑹射等事該旗將準假情由報部並報吏部又奏準旗員居喪遇有應襲佐領世爵者均於百日後引見三年覆準親軍校前鋒校護軍校驍騎校雖屬六品尚與兵丁無異嗣後兵丁等有親喪者遇前鋒校等官仍準於百日後簡選拔補六年諭獨石口所屬之千家店防禦員闕該副都統奏稱獨石口驍騎校二人皆未滿服制而千家店驍騎校一人又有别項事故請令該旗簡選補授等語朕思外省駐防官員升闕甚少若因服制未滿行文在京簡選補授則該處應升之人未免壅滯著將千家店防禦員闕仍交該副都統簡選將所擬之人服制未滿緣由行文該旗轉奏令其暫行署理俟服滿之日咨送該旗引見實授嗣後各邉口駐防員闕皆照此辦理欽此九年奏準八旗應升五品以上官因服制未滿暫請署理者雖避升轉之名已得應升之任與停升之例不符嗣後五品以上官服制未滿不準署理應升之闕十一年奏準護軍遇城門吏員闕雖有親喪準其拔補如已補城門吏之後服尚未滿仍停其升轉十七年議準旗員遇有親喪二十七月內停其升轉此專指在京旗員而言嗣後察哈爾八旗各官內除由京補授者仍照例丁憂二十七月外其本處蒙古官遇有親喪二十七月之內不停升轉十八年奉㫖旗人補用八旗武職非文員外任可比嗣後旗員丁艱除文職及緑旗武職仍於二十七月內停其升轉外其在京武職及外省駐防陵寢各官於丁艱二十七月以內遇應升員闕仍準其照例列名請㫖補授毋庸停其升轉一終養乾隆元年奏準駐防官遇有父母祖父母年登耄耋疾病纒綿路逺不能迎養家無次丁奉侍者許將情由呈報該管官出具印甘各結報部準其終養倘有規避假揑者革職出結官降二級調用不詳察之該管上司罰俸一年又奏準八旗各官奉㫖記名及軍政卓異並年久應升遇有父母祖父母年登耄耋疾病纒綿家無次丁奉侍者許將情由呈報該管官出具印甘各結轉報該旗都統等奏明交部注册停升外任京官仍開列如有規避假揑者該員及出結並該管官皆照駐防官呈請終養不實例議處欽定大清㑹典則例卷一百三
