茶果項下動給又奏準截撥薊糧州縣收受如有曬颺撞斛撒漫及令運軍津貼車脚費銀之弊即行指恭運軍如有攙和糠土一并恭處又議準薊糧到次例限七日交清如遇天雨連綿不能装運許州縣按日計算接扣七日八年奏準直隸古北口外墾地日廣產米日多於豐收之年廣為採買以四萬七千餘石運赴薊遵等倉以供陵糈餘皆運通其山東河南二省應運薊糧照舊運通倉備用如價貴停買仍令二省運送陵糈又奏準撥運易糧漕船自天津至雄縣亞谷橋於每年糧船將到之前豫行探明淤淺處所及時挑濬如水小船重酌量起駮每船酌增駮價一兩一截撥兵米雍正六年題準滄州駐防兵米若秋冬截漕春夏採買恐價有不敷轉致遲延請照舊例每歲截撥江西漕米七千石以三千五百石作本年秋冬二季之需以三千五百石作次年春夏二季之用八年議準天津水師營兵米每歲截撥漕糧萬五千石每石每月準銷遞減米二合計一年減米三百六十石於正項内開除又題準撥兑天津滄薊各米照通倉之例限七日内交收清楚乾隆元年題準天津增建倉厫截撥兵米將隨漕蓆木板片隨糧交納二年題準截撥天津漕米將豫備正兑曬颺米四升七合改兑曬颺米四升八合一例交倉簡亷幹道府官赴倉監收抽驗曬颺覈算折耗外餘剩曬颺米皆作正數按照年月遞減此外再有虧闕叅追究治三年奏準截撥天津漕米向例每百石運軍加耗米一石嗣後免其交納又奏準截撥天津水師營並易州漕米停止曬颺照北倉之例抽掣辦理如有勒索等弊即行題叅五年題準漕糧截撥滄州天津及薊易等處較之抵通費用減省將原備三升八合飯米内運易船糧每石給運軍一升運薊船糧每石給運軍一升九合照抵通例給與價直以濟回空其餘剩之米仍令交倉至截撥天津滄州等處原備三升八合飯米責令一并交倉作正支銷六年題準截撥滄州漕米令承收之官同旗員驗看如繫好米即行收受毋許遲滯留難倘有攙和糠土者承收官及旗員詳報委官驗實照例報恭並將攙和米色面同運官装袋封印隨交呈驗其折耗之米於運軍回空食米内賠補或不足數别於後幫截補所欠之米咨南著追次年搭運赴通如並無攙和將呈報不實之官以有意勒索叅處八年題準通倉撥運天津兵米雇募民船駮價照直隸各屬領米之例每石每百里陸路給銀一錢水路給銀一分五釐一截留事例康熙三十三年題準截留武清永平等處漕米每石收耗米一斗八升三合九勺四抄又題準直隸永平等處截留漕糧每石耗米皆以一斗八升三合九勺四抄作正兑收三十八年題準江西湖廣漕糧截留江南山東等處每石耗米均以二斗五升作正交兑四十一年題準江南山東截留漕米出入交收準其每石加耗米三升五十八年題準江西湖廣漕糧截留江南安慶等處將加四耗米全數作正交兑十六年題準江西糧米截留直隸大名等處照三十八年之例每石以二斗五升作正交兑應交蓆木板片行文扣追應給䉡羡紅駮等銀停其支給雍正三年題準截留漕糧仍照舊例正兑以加二五改兑以加一七耗米作正交收又題準江西糧米截留直隸保定等處每紅斛米一石給耗米一斗其平斛米每石原有耗米二斗五升均令運通交倉所有水脚計運程逺近給發六年題準江西截留漕米十萬石存貯本省備用出入盤量請照江南旋收旋糶之例每年準其加耗三升於截漕贈軍耗米内扣抵其糶過米價銀存貯司庫竢秋收照數買補還倉七年咨準天津水師營截留漕米照薊滄之例每正兑正米一石外加耗米七升尖米四升二合尖耗米二合九勺四抄又新耗米六升九合改兑正米一石外加耗米四升尖米四升二合尖耗米一合六勺八抄又新耗米四升四合折正兑交九年題準截留天津北倉漕米四十萬石從前截收之時未有正兑耗米及曬颺入倉準照天津水師營截留漕糧之例每月每石遞減米二合一年統計共減耗米九千六百石又題準天津截留漕糧每百石給地方官耗米一升以作折耗又題準湖廣江西截留山東漕米除耗米二五一七作正截留外將所餘盤耗米按程計算折耗給還運軍其餘作正截留又議準截留直隸山東河南豫備振濟漕米務須隨到隨收不得稽遲時日致誤回空其一應水陸運價及苫蓋露囤等費均動用公項錢糧十二年題準截留山東漕糧每石除原給加耗一升外每月每石仍準遞減米二合至一年後再有虧折令各官照數賠補乾隆元年題準各省截留漕船介於起運停運之間行糧月糧應給應追向未定有成例應酌定成規以歸畫一嗣後江蘇安徽浙江截留漕船應支本折月糧三修銀準其照數全給至行糧盤耗贈銀負重等項各隨多寡分作十分自水次抵通按程塗逺近亦作十分計算行一分程塗給一分銀米如行一兩站未及一分者即按一兩站扣算支給贈米一項如米到州縣半月放清者按已行之程扣給其未行之程追繳半月以外每石給米一升滿一月者給米二升滿二月者給米四升滿三月者全給若幫船截留本次或旋兑旋卸或數月後收清贈米亦按月計算江西漕船較大装米數多每年額領三修銀不敷取辦於行月兼之水次開行逐節淺阻起駮長江守風過淮修艌一應費用較江浙不同遇有截留將原領折耗行月贈銀贈米斛面米均免扣追又每米一石徴耗米四斗為交通倉及沿塗折耗之費副耗米一斗三升為水次開行抵淮折耗如在淮安以南截留者將四耗米令其隨正交納一三副米免其追繳如過淮截留者將四耗米内正兑米隨交二斗五升改兑米隨交一斗七升並每石别交一升贈米外其餘米按由淮到通程塗作為十分計算行一分程塗即給一分耗米湖北湖南漕船灣泊岳州府濵臨洞庭風波不測截留漕船於例給一半月糧之外每船酌留頭舵水手四名防䕶每名日給口糧一升減去水手人等每名每站給盤費銀三分米一升均照時價折給二年諭各省截留漕船例有應追銀米但念運軍近年以來尚屬急公効力其從前挂欠之項事隔數年此時責令完補未免艱難著漕運總督詳悉覈明將雍正十二年以前各省截留漕船應追行糧漕贈盤耗等項除已完外其未完者一槩寛免欽此又奏準山東截留漕船應支三修月糧及任城幫贍運銀準其照舊支給其本折行糧及潤耗銀各按多寡準作十分水次抵通程塗亦作十分計算行一分程塗準銷一分銀米如行未及一分者按程扣算支給潤耗米五升即如江南之五米嗣後米到截留州縣半月内收清者按已行之程扣給其未行之程追繳如過半月給米一升滿一月者給米二升滿二月者給米四升滿三月者全給其截留在本次者雖船未開行而糧已装載與中塗截留者折耗相同潤耗米亦按月支給河南漕船皆繫别省協運除不議三修外倘遇截留之年月糧一項全數支給如船雖抵次尚未装載者河南亦無庸議給至潤耗行糧銀米各隨多寡計作十分其程塗亦作十分計算行一分程塗給一分銀米如行一兩站未及一分者即按站支給官役俸工亦照額支給如本船開行已及十數站奉文截留仍回原次交卸者往返程塗皆照重運程塗計算將所領前項銀米按程扣給其不足十分程塗之數按程計追潤耗米一項亦照東省例支給至盤駮銀截留船糧已抵臨清者全數支給如未抵臨清將所領盤駮銀作為十分自衛輝水次至臨清亦作十分程塗扣算計給四年題準湖北湖南運軍所領錢糧比别省較少截留漕船所領三修行月二耗並州縣津貼京脚銀米均免扣追惟所領四斗耗米視其船未出境在本省截留者均令隨正交收若已出境者内一五耗米按已行未行程塗分别追給五年題準各省截留漕船有到次尚未受兑及已兑未開行者原議未經議及作何支給錢糧嗣後未兑之船照停運例給與減半月糧已兑未開之船於減半月糧之外將三修一項照數全給各省畫一辦理六年題準各省漕船截留北倉少給餘米折耗等項與抵通應交茶果箇兒錢費用足以相抵但船截北倉較之抵通少行程塗約三百里可省人工飯食駮淺雜費應將領過行糧漕贈盤耗銀米一例按照程塗扣追其截留滄州船糧比北倉尤近天津水師營船糧與北倉僅逺數十里亦應按程分别扣追惟運薊軍船由天津海口入薊綿長九百餘里又運易軍船自天津抵次水程三百餘里領過銀米一槩免其追繳再各省凡遇截留如已兑開行之船所領一半月糧同行糧等項應匀作十分計算一并照例按程扣追七年題準各省截留漕船已兑開行按照定例扣追運軍多有苦累應酌量加給使軍力寛裕按各軍在次費用需銀並無需米之處今分别程塗逺近船糧多寡山東河南每船酌給銀五十兩江南浙江每船酌給銀六十兩江西湖廣程塗均逺於江浙江西装載正糧每船又較湖廣多至二三百石湖廣每船酌給銀七十兩江西每船酌給銀九十兩以敷各軍在次修船置備什物及雇募舵頭水手安家養贍之用其應給之銀即於行月折色銀内扣給所有存剩行月等項銀米山東河南江南浙江仍照舊按程分别追給再江廣二省程塗遙逺兼渉長江大河非他省可比其未經過江以前截留者除在次酌量給銀外其餘剩餘米一例按程塗分别追給如已過長江尚未渡河截留者應給與四分之三至渡河以北至臨徳等處截留者將各項銀米照抵通例準其全給八年題準湖南截撥廣東漕米每石加耗米三合於截漕減存里納二耗米内兑給九年題準江西截撥湖南漕糧每石準折耗米四合江浙二省截撥福建漕糧每石加耗米五合又題準截留平糶所賣之錢繫漕項錢糧或易銀解部或搭放兵餉將原給款項扣解以抵留漕費欽定大清㑹典則例卷四十一
