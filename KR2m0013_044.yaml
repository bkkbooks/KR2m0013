body:
  text: 戸部漕運一一正兑漕糧運京倉各省原額三百三十萬石山東二十八萬石河南二十七萬石江蘇一百十有一萬三千石安徽三十八萬七千石江西四十萬石浙江六十萬石湖北十有二萬二千九百四十二石七斗一升有奇湖南十有二萬七千五十七石二斗八升有奇内除永折米改徴黒豆米並節年荒闕開墾報升不足原額外以乾隆十八年計之共米二百七十五萬一千二百八十三石五斗六升有竒内山東十有五萬七千九百九十四石八斗三升有竒河南八萬一千六百二十八石六斗五升有竒江蘇百有七萬六千三百九十三石七斗有竒安徽三十萬七千十有六石一斗一升有竒江西三十五萬千五百有三石七斗九升有竒浙江五十八萬六千六百六十石有竒湖北九萬四千五百七十四石一斗八升有竒湖南九萬五千五百十有二石三斗有竒一改兑漕糧運通州倉各省原額七十萬石山東九萬五千六百石河南十有一萬石江蘇九萬三千九百五十石安徽二十萬四百五十石江西十有七萬石浙江三萬石湖北湖南均無改兑米内除永折米改徴黒豆米並節年荒闕開墾報升不足原額外以乾隆十八年共米五十萬一千四百九十石五斗一升有竒内計之山東六萬九千四百七十三石八升有竒河南三萬九千九百十有一石一斗七升有竒江蘇九萬二千四十四石三斗八升有竒安徽十有一萬八千八百四十五石五斗三升有竒江西十有五萬千八百五十石八斗五升有竒浙江二萬九千三百六十五石五斗有竒以上共實徴正兑改兑米三百二十五萬二千七百七十四石六升有竒一白糧分運京通各倉江蘇蘇松常三府太倉一州原額十有五萬四百三十八石四斗七升除改徴漕糧外實徴六萬九千四百四十七石白秔米六萬五千六百五十一石白糯米三千七百九十六石浙江嘉興湖州二府原額六萬六千二百石除改徴漕糧外實徴三萬五百五十三石白秔米二萬五千三百四十九石白糯米五千二百四石共實徴白糧十萬石一小麥運京倉河南正兑麥五千八十六石四斗改兑麥三千三十三石以上共實徴正兑改兑麥八千一百十有九石四斗一黒豆運京倉山東正兑豆四萬五百有四石二斗五升改兑豆萬六千五百五十五石二斗七升各有竒河南正兑豆三萬二千六百七十四石八斗四升改兑豆萬五千五百八十八石九斗九升各有竒以上共實徴正兑改兑豆十萬五千三百二十三石三斗五升有竒一永折漕糧山東七萬石河南七萬石均每石折銀六錢八錢不等江蘇十萬六千四百九十二石六斗九升每石折銀六錢七錢不等安徽七萬五千九百六十一石三斗一升每石折銀五錢六分七錢不等湖北三萬二千五百二十石六斗湖南五千二百十有二石五升各有竒均每石折銀七錢以上共永折米三十六萬一百八十六石六斗六升有竒一灰石改折江蘇二萬一千一百十有六石三斗浙江萬三千三百二十三石七斗以上共改折米三萬四千四百四十石遇閏加折二千八百七十石每石連耗折銀一兩六錢八分一隨漕正耗隨正起運以為京通各倉耗米並沿塗折耗等項之用山東每正兑米一石加耗二斗五升每改兑米一石加耗一斗七升隨正起交黒豆如之河南每正兑米一石加耗二斗五升二斗八升不等每改兑米一石加耗一斗七升隨正起交小麥黒豆如之蘇松糧道所屬之蘇州松江常州鎮江四府並太倉州屬每正兑米一石加耗四斗内二斗五升隨正起交一斗五升隨船作耗每改兑米一石加耗三斗内一斗七升隨正起交一斗三升隨船作耗常州府無改兑米江安糧道所屬之江寧安慶寧國池州太平廬州六府並六安州屬每正兑米一石加耗四斗鳳陽淮安揚州潁州四府通海泗三州屬並徐州府屬之邳州宿遷睢寧二縣每正兑米一石加耗三斗内二斗五升隨正起交一斗五升及五升不等隨船作耗又徐州府屬之銅山豐沛蕭碭山五縣每正兑米一石加耗二斗五升皆隨正起交江寧廬州二府廣徳州屬每改兑米一石加耗三斗鳳陽淮安揚州潁州四府通海泗三州屬並徐州府屬之邳州宿遷縣每改兑米一石加耗二斗五升又徐州府屬之銅山豐沛蕭碭山五縣每改兑米一石加耗二斗二升内一斗七升隨正起交一斗三升及八升五升不等隨船作耗徽州府並滁和二州屬無正兑改兑米廣徳州無正兑米安慶池州太平寧國四府並六安州及徐州府屬之睢寧縣均無改兑米江西每正兑改兑米一石加耗四斗内二斗五升一斗七升隨正起交一斗五升二斗三升隨船作耗浙江每正兑改兑米一石加耗四斗内二斗五升一斗七升隨正起交一斗五升二斗三升隨船作耗湖北每正兑米一石加耗四斗内二斗五升隨正起交一斗五升隨船作耗湖南每正兑米一石加耗四斗内二斗五升隨正起交一斗五升隨船作耗湖北湖南均無改兑米正兑米麥豆每石交倉耗米二斗五升内除運通運京共耗二斗一升二合詳見倉庾餘給運軍回空食米三升八合改兑米麥豆每石交倉耗米一斗七升内除運通運京共耗一斗三升二合詳見倉庾餘給運軍回空食米三升八合雍正元年奏準各幫運弁運軍有在倉交剩三升八合餘米本軍如有舊欠照數全扣本幫有欠三七扣留節年皆有舊欠將扣留之米按年分交銷如願賣與别幫抵欠即於册内開晰米數如抵賣之外再有餘剩秔米每石作價七錢稄米每石六錢粟米每石五錢動用茶果銀給與運軍顆粒不許出倉如茶果銀不敷即於通濟庫銀内動用給發所有餘米通行留倉作正支放四年題準運軍應得餘米或本幫有欠抵補本幫或别幫有欠賣補别幫賣抵之外仍有餘米準令經紀車戸買抵掣欠至尾幫有願赴坐糧廳領價者仍照例給發乾隆三年題準各省糧船抵通起卸如有不足不準買餘米抵補即照例叅處著賠其失風失火等船一時沉失事出意外準其照例買抵七年奏準漕船抵通起卸完日驗明飯米闕乏之幫將應得每石三升八合餘米三分交倉給銀七分給米以濟回空之用一隨漕輕齎易銀每正兑米一石山東河南又徴耗米一斗六升謂之一六輕齎江蘇安徽二斗六升謂之二六輕齎江西浙江湖北湖南三斗六升謂之三六輕齎每斗折徴銀五分又江蘇安徽江西浙江每改兑米一石又徴耗米二升謂之二升易米折銀每升折徴銀五釐均解倉場通濟庫山東河南並江蘇徐州府屬之銅山豐沛蕭碭山五縣改兑米均無易米折銀之項各省漕船到通除山東河南路近不給䉡夫銀外其江蘇安徽江西浙江湖北湖南六省漕糧按實過壩正米覈算每石給䉡夫銀一分又按到通漕船實數山東河南每船給羡餘銀一兩江蘇安徽每船二兩江西浙江湖北湖南每船四兩凡有挂欠漕糧者按所欠米數以通幫䉡羡銀均派扣除其中塗失風漂没損壞不到通者按船扣除順治十七年題準應給䉡夫羡餘銀務令運官親到坐糧廳唱名給發如有買照代領情弊即行恭究康熈五年議準輕齎等銀例應先漕解通以濟運務令各省巡撫就近督催糧道依期完解如有遲誤聼倉場侍郎題恭四十七年題準嗣後各省額解輕齎銀山東河南湖廣江西浙江五省及江南江安糧道所屬解貯通濟庫應用蘇松糧道所屬輕齎銀解交部庫如倉場不敷應用咨部支發六十年題準蘇松糧道所屬額解部庫之輕齎銀十有三萬兩仍分撥五萬兩解通濟庫備用其餘均解部庫乾隆二年奏準江西漕船每船例給羡餘銀四兩惟九江前後兩幫從前運送京口糧船並不到通向照江蘇之例每船止給羡餘銀二兩今既運通交卸照依該省定例每船給銀四兩三年議準江浙二省白糧改徴漕糧每年到通之時䉡羡脚抗等項悉照漕糧例辦理又咨準山東自備船應領䉡羡等銀於具領之日坐糧廳設一印票塡明銀數連銀封固給發回衛時將銀票並呈各衛所驗明按名匀給仍取具領状與原發印票一同申繳送部察覈如有侵扣隱蝕詳革究追又咨準買補及雇募船停給䉡羡等銀其山東運軍自備雇募船與各省風火失事買補雇募不同仍準照舊給與羡餘等銀五年覆準湖南起解輕齎銀需用盤費等項向於該省公捐備用銀内給發今公捐停止應將起解輕齎需用盤費等項於地丁額編解費銀内動給九年奏準欠米漕船例將副軍回空食米起作正項回空未免拮据嗣後將運軍應得䉡羡等銀全給副軍以資回空之費如運軍不能交納茶果行南比追於次年附解交通十年咨準䉡羡餘米等銀例繫按照到通船數米數覈給其中塗截留漕船槩不準支至抵壩之後派撥轉運各船應交茶果銀又經照數交納通濟庫其䉡羡餘米等銀準照到通之例辦理一隨漕席木板竹每正改兑漕糧二石山東河南徴長席一領縱六尺四寸廣三尺六寸江蘇安徽江西浙江湖北湖南徴方蓆一領縱廣皆四尺八寸其應改折色者每領徴銀一分應解本色者山東河南及江安糧道所屬各府州屬均徴本色席片給運軍解交蘇松糧道所屬各府州並江西浙江湖北湖南均徴銀給運軍辦買赴通交納江安糧道所屬之安寧池太各府蘇松糧道所屬之蘇松常鎮太倉州江西浙江湖北湖南每正兑正米二千石徴楞木一根長一丈四尺九寸圍圓二尺五分松板九片濶一尺三寸五分厚五寸五分其改徴折色者每楞木一根徴銀五錢至五錢五分松板一片徴銀四錢至四錢五分各不等山東河南及江安糧道所屬之廬鳳淮揚徐潁各府六安泗海通各州正兑改兑米均不徴楞木松板江蘇安徽江西浙江湖北湖南糧艘到通每船帶大竹一根中竹三根蘇松糧道所屬各府州大竹長二丈一二尺圍圓一尺一二寸每根價銀二錢四分中竹長一丈一二尺圍圓六七寸每根價銀一錢二分江安糧道所屬安寧池太淮五府廣泗二州大竹長三丈五尺圍圓一尺八寸至長一丈二尺圍圓八寸每根價銀一錢五六分至五六分不等中竹長一丈六七尺圍圓一尺二寸至長一丈圍圓四寸每根價銀一錢二分至八釐不等江寧府及海通二州毛竹向無定價悉照時價造報江西大竹長二丈中徑五寸每根價銀六分中竹長一丈二尺中徑二寸每根價銀五分湖北湖南大竹長二丈中徑五寸每根價銀湖北一錢湖南九分中竹長一丈二尺中徑二寸每根價銀湖北八分湖南六分順治十三年題準各省隨漕帶運本色席片板木倉場侍郎覈明隨糧完欠造册按年奏銷又題準席片板木各有長短濶狹尺寸隨糧解交務照定式不許短少充數亦不得濫收濫罰致滋弊竇十五年題準楞木松板向解交京糧廳收納今京糧廳既裁改歸大通橋監督交納又題準正兑米例進京倉應解楞木松板改撥通倉即照改通米數扣留板木以供鋪墊或有河兑其板木仍於大通橋交納十七年題準席片板木以供倉厫鋪墊如運弁挂欠不完總漕倉場侍郎限年追補雖漕糧全完不準議叙康熈二十五年題準各省應徴隨糧席片舊例繫三分本色七分折色嗣後將三分本色内再改折五釐雍正四年題準各省應徴楞本松板舊例繫三分本色七分折色江安寧池太各府屬將應徴本色徴給運軍蘇松常鎮四府太倉一州浙江江西湖北湖南各府州屬將應徴本色徴銀給運軍辦交嗣後將松板全解本色楞木改徴松板亦全解本色八年諭向因鋪墊倉厫需用松板令各省糧船隨帶到倉交納續經該部議定產木之省如江西湖廣及江安糧道所屬地方則全解十分本色其不產木之浙江蘇松等屬則解三分本色七分折色此便民利用之意也乃朕聞該地方所交三分本色亦於抵通之時始行採辦以至通州木商與胥役勾通包攬每板一片用銀