雜項錢糧初限不完降俸二級戴罪完納完日開復如年限內不完罰俸一年仍令完納承追一詳請豁免康熙十五年題準官員承追侵欺錢糧人犯如家産果盡不據實詳請豁免以致各犯父子夫妻分離者罰俸一年巡撫罰俸六月五十三年題準凡虧空之人如果家産全無本人身故妻及未分家之子不能賠補者該地方官取具印甘各結申報督撫保題豁免結案倘題後而本人别有田産錢財房屋人口發覺盡行入官將承追出結官革職督催知府直隸州知州各降二級調用司道降一級留任督撫罰俸一年其所欠贓銀米穀著落出結官賠補如承追官員不著落本人之妻並未分家之子行追借端將親族濫行著落追賠者將承追官革職奉旨該管上司官員如有逼迫出結之事屬官不行出首者著從重治罪欽此又議準官員追比侵盜錢糧犯人贓私若家産未盡揑結家産已盡被科道糾參或被旁人首告將揑結官降四級調用不行確察轉詳之司道府等官降二級調用督撫降一級調用一承追虧空等項康熙五十三年議準凡追賠虧空贓罰銀及分賠等項悉於文到之日定限一年其限內追完三百兩以上之案者承追官每案紀録一次督催知府直隸州知州每三案紀録一次道員每五案紀録一次督撫布按每十案紀録一次若不完將承追官罰俸一年督催知府直隸州知州各罰俸六月司道督撫各罰俸三月皆戴罪督催再一年限內不完將承追官降一級留任督催知府直隸州知州各罰俸一年司道督撫各罰俸六月再限一年督催全完開復若不完將承追官照所降之級調用督催知府直隸州知州各降一級留任司道督撫各罰俸一年其接任承追督催等官仍各照到任之日扣限五十九年議準凡追賠虧空贓罰銀等項及分賠等項除不及千兩之案仍照三年之例參處外至五千兩以上之案以十分為率勒限五年每年追完二分五年之內十分全完紀録一次每年完不及二分者初限不完降俸二級二限不完罰俸一年三限不完降一級四限不完又降一級皆留任戴罪承追五年限滿能完至七分者將所降之級準其開復再行按年起限承追如不完及七分者照所降之二級調用接任官以到任之日起限有能於一年限內追完千兩以上之案者準加一級五千兩以上之案者準加二級萬兩以上之案者準加三級如能於一年限內追完一萬五千兩以上之案者準以應升之官即用其督催五千兩以上者每案勒限五年分數催追遞年完至二分者免其處分遞年完不及二分者知府直隸州知州每案初參降俸一級二參罰俸六月三參罰俸一年四參降一級留任皆令戴罪督催五年限滿全完開復如不完降二級留任戴罪督催督撫司道每案初參罰俸三月二參罰俸六月三參罰俸九月四參罰俸一年五年限滿無完各降一級留任仍再行按年起限督催全完開復餘款仍照不及千兩之例行其督催虧空糧米道員責成糧道為督催督催虧空鹽課道員責成鹽道為督催其非管理糧鹽道員免其并參又議準大宛二縣五方雜處事務繁冗一切承追案件仍照不作分數錢糧例處分如該縣徇情推諉不著力行追或被傍人首告或被部內察出一并從重治罪將犯人不行賠完之項皆著落該縣賠完五城兵馬司承追贓罰變産等項應照大宛二縣承追一切贓欠銀皆照雜項錢糧例議處倘限滿無完該城御史即將司坊官職名呈報都察院咨行該部題參照例議處倘司坊官承追限滿無完而該城御史不將職名開送者經都察院刑部察出即行題參將該御史一并交部議處仍令各該司坊官將屢年承追之項造具清册三本一送都察院一送刑部一存該城御史察核雍正三年議準官員虧空如一人名下有侵欺又有那移者應無論那移侵欺之案並發及侵欺之案先發那移之案後發均令其先完那移之項後完侵欺之項以杜避重就輕之弊若完那移數內完足侵欺之數其餘侵欺那移之數委屬力不能限內全完者暫停正法仍再勒限監追此等虧空之案該督撫務宜秉公確審固不可以那為侵使人寃抑其有以侵為那及非實在力量不足者該督撫扶同徇庇借端巧為開脫將該督撫照徇庇例議處乾隆元年覆凖虧空人員自不應聼其開脫如本員經管錢糧所屬有借支借領與夫同官那借出有印領者皆繫虧空帑項該員既已虧空題參治罪借欠之員應分别追還至其平日債負或幫助親友以及同官私債雖有文約並無印領者無論逺年近年有無確據總繫借貸交接之私情並非有虧公帑應聼其自行索討一槩不準抵追十五年議準承追千兩至五千兩者以四年為期每年每案追完二分五釐四年之內十分全完準其紀録一次每年完不及數者初參降俸二級二參罰俸一年三參降一級留任戴罪承追四年限滿全完開復如不完降一級調用其督催各官遞年完至二分五釐者免其處分遞年完不及數者其初參二參三參四參處分悉照五千兩以上初參二參三參四參之例辦理災振一報災逾限順治十七年覆準夏災限六月下旬秋災限七月下旬先將被災情形題報仍扣去程途日期如詳報到省在限外而扣算程途日期尚未逾限免其揭參若到省在限外而計算應扣之程塗亦已逾限者即行照例參處如州縣官遲報逾限半月以內者罰俸六月逾限一月以內者罰俸一年逾限一月以外者降一級調用逾限兩月以外者降二級調用逾限三月以外怠緩已甚者革職巡撫布政使道府等官以州縣報到之日起算如有逾限者一例處分康熙十五年議準官員勘災不委廳官印官仍委教官雜職察勘或妄報飢荒或地方有異災不申報者皆罰俸一年若止報巡撫不報總督及報災之時未繳印結册內不分晰明白者罰俸六月督撫亦照此例處分又奏準官員將蠲免錢糧增減造册者州縣官降二級調用該管司道府官罰俸一年督撫罰俸六月如被災未經題免之先報册內填入蠲免者州縣官罰俸一年該管上司皆罰俸六月十八年覆準蠲免錢糧州縣官有借名肥已使民不沾實惠等弊或被旁人出首或受纍之人具告或科道察出糾參將州縣照貪官例革職拏問其督撫布政使道府等官不行稽察令州縣任意侵蝕者皆革職又議準州縣官不將民生苦情詳報上司使民無處可訴其事發覺將州縣官革職永不敘用若州縣官已經詳報而上司不準接題逹者將上司亦革職四十四年覆準各省州縣養濟院孤貧飭令逐一嚴察凡不願居住院內冒濫食糧之輩悉行革除將境內實繫老疾無依之人取結收院頂補其餘多者準作額外孤貧收飬悉令將實在人數注明年貌按照額內額外造册出結由府加結轉送上司備察遇有汏革病故頂補新收等項隨時報明上司支放孤貧銀米如遇應行散給之期正印官或因地方公事不能親身散給即遴委誠實之佐二等官親詣給發槩不得令胥吏丐長經手以致侵漁中飽並專令該管道府每年遇盤察之時或踏勘公事即帶原送花名年貌册籍赴飬濟院點驗如果繫房屋完整孤貧實住在院並無冒濫情弊出具印結報明上司如有房屋坍頺孤貧不盡住院或年貌不符冒濫支糧者將該管官照違例支給例降一級調用道府不行察驗遽行加結轉詳照違例支給之轉詳官例罰俸一年若繫縱令胥役丐長等代領以致冒領侵蝕等弊該管官照縱役犯贓例革職道府不行察出照豫先不行察出例降一級調用倘道府有徇庇容隱及扶同率結者皆照徇庇例降三級調用雍正六年覆準各省如有被災者其被災分數限四十五日察明造册題報照例扣算程途將已未違限月日分晰聲明如不依限造册題報州縣道府布政使巡撫各官亦照前例議處乾隆元年諭地方偶有水旱之事凡察勘户口造具册籍頭緒繁多勢不得不經由胥役里保之手其所需飯食舟車紙張等項費用朕聞竟有派纍民間並且有取給于被災之户口者嗣後直省州縣倘遇察勘水旱等事凡一切飯食盤費及造册紙張各費皆酌量動用存公銀毋得絲毫擾纍地方若州縣官不能詳察嚴禁以致胥役里保仍蹈故轍舞弊蠹民者著該督撫立即題參從重議處欽此又奏準凡遇振災飭令有司豫將察明分數振恤事宜先行宣示務令愚民洞悉規條俾知大澤難以濫邀非分不可妄冀倘有聚衆囂陵情弊應令該管督撫詳加確訪如果有司玩視民瘼即行察明照例嚴參倘繫不肖頑民借端要挾以及縱容婦女生事即行按律分别究擬毋得遽揭屬官以長澆風四年覆準地方時值偏災民食匱乏蠲免振濟倘有不肖書役於蠲免振貧之時暗中扣剋詭名冒領該州縣漫無覺察者降二級調用至平糶借榖原因地方收成歉薄米價騰貴藉以惠濟小民如地方州縣官不實力稽察以致書役包買漁利抑勒出入者應將該地方官降一級調用如胥役人等有前項等弊州縣官既已覺察而故為容隱者將該州縣官革職一捕蝗康熙四十八年覆準州縣衛所官員遇蝗蝻生發不親身力行撲捕藉口鄰境飛來希圖卸罪者革職拏問該管道府不速催撲捕者降三級留任布政使司不行察訪速催撲捕者降二級留任督撫不行察訪嚴飭催捕者降一級留任協捕官不實力協捕以致飬成羽翼為害禾稼者將所委協捕各官革職該管州縣地方遇有蝗蝻生發不申報上司者革職道府不詳報上司降二級調用布政使司不詳報上司降一級調用布政使司詳督撫不行題參督撫降一級留任乾隆十六年覆準凡有蝗蝻地方文武官辨合力搜捕應時撲滅者應行文該督確實察眀果繫即時撲滅俟具題到日準其紀録一次十八年諭定例州縣等官捕蝗不力藉口鄰封希圖卸罪者革職拏問該管上司不速催撲捕者降級留任向來督撫往往以該道府前經節次督催見在揭報情由於本內聲敘遂得邀免處分以致道府玩視民瘼並不留心督察今嵗直隸自春徂秋捕蝗未盡者即由於此嗣後州縣捕蝗不力應拏問者皆應將道府一并題參交部議處該督撫等不得有心姑息於本內濫為聲敘以為寬貸之地欽此一失火康熙二十二年議準五城所屬地方如有失火延燒房屋至十間以下者即行撲滅各官免議其延燒不能撲滅十一間以上至三十間者將該管官罰俸九月吏目所管地方以吏目為該管官副指揮所管地方以副指揮為該管官巡城御史罰俸三月延燒三十間以上者將該管官罰俸一年巡城御史罰俸六月延燒三百間以上者該管官降一級調用巡城御史罰俸一年延燒四百間以上者該管官降二級調用巡城御史降一級留任延燒六百間以上者該管官降三級調用巡城御史降一級調用又議準官員該管地方失火燒燬房屋者罰俸三月如不能救援以致延燒文卷及官倉米糧者罰俸一年如將錢糧文册不貯公所妄藏私家或交衙役以致被焚者降一級調用乾隆十年議準外省該管地方延燒民間房屋如繫城內將該管之州縣官照五城失火議處吏目副指揮之例按其延燒房屋間數分别議處同城府道照議處巡城御史之例分别察議如燒燬民房又燒燬文卷倉糧及錢糧文册妄藏私家或交衙役被焚者事屬相因而致應照例從重歸結其城外之村莊失火延燒民屋除該管道府統轄各屬事務紛繁僻逺村莊勢難兼顧應免察議外至於州縣官有專管地方之責雖城鄉相隔窵逺撲救不及然既經失火延燒自應與佐雜等官一例議處但該處官辨無多兵役有限應酌減處分嗣後村莊失火延燒民房十間以下即行撲滅該管之州縣佐雜等官免其議處延燒十一間以上至百間者州縣佐雜等官照城內失火延燒境內十一間以上至三十間例罰俸九月延燒百間以上照城內延燒三十一間以上例罰俸一年延燒五百間以上者照城內延燒三百間以上例降一級調用欽定大清會典則例卷十九
