body:
  text: 吏部考功清吏司催徵一徵收地丁錢糧順治十三年題準各州縣開徵豫頒由單定於十一月初一日頒發至報部之期直隸限十二月内到部山東山西河南限正月内到部江南浙江限二月半到部江西湖廣陕西限二月内到部福建廣東限三月半到部四川廣西限三月内到部如州縣官申報遲一月者罰俸三月兩月者罰俸六月三月者罰俸一年四五月者降一級六七月者降二級八月以上者降三級皆調用司道府等官申報遲一月者罰俸一月兩月者罰俸兩月三月者罰俸三月四五月者罰俸六月六七月者降俸一級戴罪督催遲八月以上者降一級調用康熙二年題準地丁錢糧初叅經徵州縣官欠不及一分者停其升轉罰俸一年欠一分者降職一級二分者降職二級三分者降職三級四分者降職四級皆令戴罪催徵欠五分以上者革職布政使知府經管錢糧道員直隸州知州欠不及一分者停其升轉罰俸半年欠一分者罰俸一年二分者降職一級三分者降職二級四分者降職三級五分者降職四級皆令戴罪督催欠六分以上者革職廵撫欠不及一分者停其升轉罰俸三月欠一分者罰俸一年二分者降俸二級三分者降職一級四分者降職二級五分者降職三級六分者降職四級皆令戴罪督催欠七分以上者革職又題準地丁錢糧被叅後催徵時州縣官限一年布政使知府直隸州知州限一年半廵撫限二年其年限内不完不復作分數照原叅分數處分州縣官原欠不及一分年限不全完者降一級留任再限一年催徵如又不能完即照所降一級調用原欠一分年限内不全完者降三級調用如果能催徵完至八九釐者降三級留任再限一年催完如仍不全完降三級調用原欠二分限内不全完者降四級調用原欠三分限内不全完者降五級調用原欠四分以上限内不全完者革職四年題準凡限滿未完錢糧大小各官如遇恩赦將赦前月日扣除以赦後月日算起至限滿續叅時注明赦前赦後分數具題如初叅欠四分者如赦前二分赦後二分年限内將赦前所欠二分已經全完止照赦後未完二分處分如年限内将赦前所欠二分未經全完仍合赦前赦後分數一并處分如初叅四分皆在赦前年限内未經全完仍照初叅分數例處分又題準州縣官經徵一應起運本年錢糧五萬兩以下一年内全完者紀録一次五萬以上十萬以下一年内全完者紀録二次十萬以上一年内全完者紀録三次督催知府直隸州知州及管錢糧道員十萬兩以下一年内全完者紀録一次十萬以上二十萬以下一年内全完者紀録二次二十萬以上一年内全完者紀録三次督催布政使五十萬兩以下一年内全完者紀録一次五十萬以上百萬以下一年内全完者紀録二次百萬以上一年内全完者加職一級其監屯同知通判督催衛所屯糧全完照督催知府例議敘經厯經徵衛所屯糧全完照經徵州縣官例議敘如地丁糧銀已完而本色顔料並一應起觧雜項等銀未完者不準議敘至經徵州縣官将未完之錢糧揑以全完轉報或一年内二三官徵完之錢糧揑為一官徵完申報者州縣官革職司道府官各降二級調用廵撫降一級調用如州縣官申報未完司道府作完申報者司道府革職州縣官免議如司道府申報未完廵撫作完題報者廵撫革職司道府免議如起觧錢糧並未起觧或庫内無銀申報有銀者各降二級調用廵撫罰俸一年如一應批迴未領稱為已領未發稱為已發者各罰俸一年五年覆準州縣官帶徵節年拖欠錢糧二年内全完一萬兩以上者紀録一次二萬以上者不論俸滿升轉其知府直隸州知州管錢糧道員帶徵錢糧二萬兩以上者紀録一次四萬以上者紀録二次六萬以上者不論俸滿升轉布政使帶徵全完十萬兩以上者紀録一次二十萬以上者紀録二次三十萬以上者不論俸滿升轉如帶徵錢糧全完而經徵錢糧不完仍不準議敘六年議準凡限滿未完錢糧各官限内又經遇赦者扣除赦前月日止以赦後計算年限滿日察明題叅照例處分又題準直隸州知州經徵本州錢糧叅後未完照州縣官限一年例處分其直隸州督催之各州縣錢糧叅後未完照知府限一年半例處分十年覆準署印官一年内錢糧全完者亦照例議敘十二年題準州縣官員如將已徵錢糧作為民欠或那用謊稱民欠者該州縣官革職拏問司道府等官明知朦隐不報者革職如申報督撫不行題叅者該督撫降五級調用又題準凡拖欠在民錢糧革職降級官員未經離任之先如能將拖欠錢糧全完者準其開復又覆準廵撫布政使經管錢糧道府直隸州知州原欠不及一分者限内不全完降一級戴罪督催再限内不全完降二級戴罪督催三限内仍不全完者降三級調用其餘皆照州縣例處分衛所官員原欠不及一分錢糧再限内不全完者降一級戴罪督催三限内仍不全完者降一級調用十四年題準凡接徵接催官員以到任之日為始接徵衛所官員限一年接催布政使道府直隸州知州限年半接催廵撫限二年催完如不能完題叅之日照見在未完分數以初叅例處分至於廵撫等官被叅催徵錢糧時年限已滿逾期該撫不将自欠原叅分數並布政使等官分數察叅者察出照原叅分數加倍治罪又題準官員將侵糧抗糧人犯揑報逃亡者降一級調用該管官罰俸一年如並不起觧侵欺抗糧人犯者亦照此例處分如不行速觧遲誤者罰俸一年該管官罰俸六月十五年題凖有司未完錢糧叅後續觧全完者各該經管衙門一面給與批收一面詳報該撫題請開復如已經申呈抑勒不詳及遲延不報或不應開復之官申詳開復者皆罰俸一年廵撫罰俸六月或已經開復之官重題開復及不列續完各官職名者皆罰俸六月十八年覆準州縣等官私加火耗及私派加徵者革職拏問其司道府官隠匿不報者亦革職拏問若申報督撫不行題叅将督撫亦革職至官員有加派貪婪之處被旁人首告經司道府官審出者其審出之司道府官所有未經首告之先不行察出之處免其議處三十四年覆準凡有分數錢糧接徵接催官員皆将已完分數扣除照見在未完分數處分四十四年議準蘇州松江常州鎮江四府屬賦税繁重州縣官本任經徵毎年地丁漕項錢糧如於奏銷時完至九分以上者其接徵未完舊欠錢糧於年限滿後復叅降級調用之例改為降級留任再限一年催徵如仍不完即照所降之級調用其督催各官亦照此例議處四十六年覆準江蘇賦繁州縣錢糧三載全完此内雖有奉蠲之年仍準即升五十四年覆準盛京旗人所種地畝應交米豆草經徵督催各官徵米一石作銀一兩考成如經催之官千兩以下一年内通完者紀録一次千兩以上三千兩以下一年内通完者紀録二次三千兩以上一年内通完者紀録三次督催官五千兩以下一年内通完者紀録一次五千兩以上萬兩以下一年内通完者紀録二次萬兩以上一年内通完者紀録三次如催追不完經催之官欠一分者罰俸六月二分者罰俸一年三分者降俸一級四分者降俸二級五分者降職一級六分者降職二級七分者降職三級八分者降職四級皆戴罪催徵完日開復欠九分十分者革職督催之官欠一分者罰俸三月二分者罰俸六月三分者罰俸一年四分者降俸一級五分者降俸二級六分者降職一級七分者降職二級八分者降職三級九分者降職四級皆戴罪督催完日開復欠十分者革職雍正七年覆準凡地丁錢糧若奏銷以前全完者不予議敘則額數繁多之處或難於嵗内通完致不得邀議敘無以資鼓勵應将嵗内全完議敘之例停止若奏銷以前果能通完槩予議敘倘仍有揑報全完希圖議敘等弊該督撫等即行指叅交部議處十三年議準地丁等項一切年限承追錢糧皆準扣除封印日期造報考成一徵收漕項錢糧康熙二年題凖漕白二糧及隨漕輕齎等項初叅州縣衞所各官欠不及一分者停其升轉罰俸一年欠一分者降職一級二分者降職二級三分者降職三級四分者降職四級皆令戴罪催徵欠五分以上者革職知府糧道欠不及一分者停其升轉罰俸六月欠一分者罰俸一年二分者降職一級三分者降職二級四分者降職三級五分者降職四級皆令戴罪督催欠六分以上者革職廵撫欠一二分者罰俸三月三分者罰俸六月四分者罰俸一年五分者降俸一級六分者降俸二級七分者降職一級八分者降職二級皆令戴罪督催完日開復三年題準白糧改折銀限文到半年内全完如有不完者督催之廵撫布政使司糧道及府州縣官皆照地丁錢糧考成例議處将未完錢糧再限半年完結如限内又有不完者亦照地丁錢糧限滿例議處又題準凡接徵接催漕白二糧之官均連前官總作十分以到任之日為始接徵州縣等官亦限一年接催糧道知府等官限一年半接催廵撫限二年催完題叅之日仍照初叅例處分又題準徐州淮安等倉錢糧初叅經徵州縣官欠不及一分者停升催徵欠一分者罰俸六月二分者罰俸一年三分者降俸一級四分者降俸二級五分者降職一級六分者降職二級七分者降職三級八分者降職四級皆令戴罪催徵停其升轉完日開復欠九分十分者皆革職布政使知府直隸州知州欠不及一分者停升督催欠一分者罰俸三月二分者罰俸六月三分者罰俸一年四分者降俸一級五分者降俸二級六分者降職一級七分者降職二級八分者降職三級九分者降職四級皆令戴罪督催停其升轉完日開復欠十分者革職廵撫欠不及一分者停升督催欠一分二分者罰俸三月三分者罰俸六月四分者罰俸一年五分者降俸一級六分者降俸二級七分者降職一級八分以上者降職二級皆令戴罪督催停其升轉完日開復署印官欠一分二分者罰俸三月三分四分者罰俸六月五分六分者罰俸九月七分八分者罰俸一年九分十分者降一級調用欠不及一分並署印不及一月者免議又題準徐州淮安等倉錢糧被叅後州縣官限一年内全完如原欠不及一分一年内不全完者罰俸一年欠一分二分一年内不全完者降三級調用欠三分四分一年内不全完者降四級調用欠五分六分一年内不全完者降五級調用欠七分八分一年内不全完者革職布政使及管錢糧道員知府直隸州知州限年半全完如原欠不及一分限年内不全完者罰俸一年欠一分二分限年内不全完者降三級調用欠三分四分限年内不全完者䧏四級調用欠五分六分限年内不全完者降五級調用欠七分八分以上限年内不全完者革職廵撫限二年内全完如原欠不及一分二年内不全完者罰俸一年欠一分二分二年内不全完者降二級調用欠三分四分二年内不全完者降三級調用欠五分六分二年内不全完者降四級調用欠七分八分二年内不全完者降五級調用欠九分十分二年内不全完者革職其接徵接催官員均以到任之日為始接徵州縣官員亦限一年接催布政使道府直隸州知州限年半接催廵撫限二年催完如不能完題叅之日照見在未完分數以初叅例處分至帶徵積年拖欠錢糧之大小各官不便與經徵官一例限二年内全完如二年内不全完皆以定例照各職分處分十四年題準漕白二糧被叅後州縣衞所各官限一年糧道知府限一年半廵撫限二年其年限内不完者不復作分數照原叅分數處分如州縣官原欠不及一分年限内不全完者降一級留任再限一年戴罪催完如又不完即照所降一級調用原欠一分年限内不全完者降三級調用如果能催徵完至八九釐者降三級留任再限一年催完如仍不全完者降三級調用原欠二分年限内不全完者降四級調用