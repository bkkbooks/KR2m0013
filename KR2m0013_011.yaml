body:
  text: 吏部文選清吏同遴選二一考選科道舊例郎中編修檢討補授御史停其試俸內閣侍讀員外郎主事試俸一年都察院考核稱職具題實授康熙九年議準主事由中書科評事博士升者不拘年限準其考選由别項升授者食俸二年方準考選十九年議準各官非正途出身者雖經保舉不準考選雍正五年定不拘科甲貢監十三年議準仍用正途二十年覆準捐納嵗貢不準作正途京官三品以上及總督巡撫子弟皆不準考選三十年議準凡父兄見任三品京堂外任督撫子弟不準考選科道其父兄在籍起文赴補及後經升任者有子弟見任科道皆令回避改補各部郎中四十四年議準中書評博等官除知縣升任者照舊考選外其初任選授者俟升任主事後方準考選凡遇考選時將正途出身之各部郎中員外郎雍正四年增設內閣侍讀升轉與員外同主事令各堂官保送引見簡用雍正五年議準給事中員闕將監察御史引見補授御史員闕將應考選人員引見補授候補科道人員人文到部遇員闕由部引見補授七年議準滿漢給事中及滿洲漢軍御史均改為正五品漢御史由郎中員外郎內閣侍讀編檢補授者定為正五品由中書評博及行取知縣補授者定為正六品乾隆三年奉旨例應考選翰林部屬等官一槩通行引見候旨記名俟用完之日吏部將如何考選之處再行請旨九年奏準御史員闕每闕於記名人員內論俸分班以編檢一人部屬等官二人引見候旨補授十一年諭向例御史員闕由保舉考選補授後因臣工條奏請朕於翰林部屬引見時記名特用今看來不若仍復舊制之為妥著九卿於應行考選人員內秉公保舉請旨考試候朕簡用欽此十三年奏準以御史用之滿漢人員按記名之先後俟前次記名之人用完再將後次記名之人引見十八年諭翰林部曹小京官補用御史既經簡擢同列諌垣即應無所區别乃舊有五品六品之分試俸不試俸之異嗣後給事中著仍為正五品御史皆著改從五品不必試俸欽此一行取知縣康熙四十四年議準行取知縣引見後以主事挨班補用遇考選科道時準其考選乾隆元年奏準三年舉行一次由部於正途出身知縣內食俸已滿三年任內無參罰事故者大省行取三人中省二人小省一人開列職名具題請旨並令各該督撫於所屬正途出身知縣內遴選才能出衆者不論何項參罰事故其食俸未滿三年者仍不準保題亦照部行取之數大省三人中省二人小省一人具題請旨十六年諭向例直省知縣三年行取一次吏部按期奏請康熙雍正年間少舉多停當朕臨御之初臣工中有援行取成規入告者朕以舊制可循敕部議覆旋經準行由今觀之此特相仍故套而於吏治人材毫無禆益所當永行停止欽此一各部司官酌定保題乾隆九年題準近年以來部屬所出滿漢員闕保題者多歸選者少致令應升及候補候選之員多致壅滯於銓法未為均平請令各部院堂官核明各司辦理事宜酌定應題之繁闕造冊送部遇有員闕準其保題其餘各闕均歸銓選至刑部事務雖屬殷繁但遇有員闕若照例咨一留一所題闕數未免過多請嗣後滿漢司官員闕如有三闕準其咨二留一倘題闕遴選無人仍咨部銓選一宗人府主事雍正元年設由進士出身之小京官及行取知縣在部候闕者遴選引見補授與各部主事論俸升轉一起居注主事雍正十二年奏準增設漢主事一人令翰林院掌院學士於進士舉人出身之見任中書內遴選引見補授與各部主事一同論俸升轉一內閣中書雍正二年議準不分進士舉人由內閣考取引見照取中名次遇員闕移送過部具題選用試俸一年聽內閣考核稱職移送過部具題準其實授雍正四年增設漢侍讀二員由內閣於中書內遴選引見補授與各部員外郎一同論俸升轉一國子監監丞助教等官雍正八年議準助教學正學録令九卿於進士舉人內保舉咨部引見補授十二年議準監丞典簿於守部進士舉人內遴選引見補授乾隆十三年奏準助教學正學録遇有員闕皆繫行令九卿於進士舉人內保舉咨送過部引見補授每一闕九卿保舉者不下十數人以一闕而以十數人引見似屬過多請將此次保送之舉人十四人一并引見除補授一闕外其餘各員仰懇聖鑒視其人材如有尚可備用者量豫記名交部遇有員闕照依名次引見補授十七年奏準助教員闕於學正學録中秉公簡選咨部察核如無應補應用助教人員及不合例事故均準其保題引見升用所遺員闕將保舉人員補用十九年奏準國子監學正學録等官舊例九卿保舉科目出身人員引見記名補用請嗣後照考試中書之例由部請旨進士舉人一例考試特簡大臣較閲其取録人員由部引見記名簡補二十年奏準國子監規制見以經義治事分教士子學正等官有教人之責其考試題目用四書制藝一篇經史策問一道恭請欽定考試之清晨閲卷大臣請題頒發按其文理酌量擬取嚴行覆試擬定名次交部引見記名俟有員闕按其名次引見補授一翰林院待詔康熙六十一年題準令掌院學士於各館修書舉人內考取乾隆七年定待詔員闕如修書舉人無人行文到部咨取見在守部舉人候選知縣情願改就者考用孔目員闕於各館修書恩拔副貢考取如不得人行文國子監咨取見在肄業之恩拔副貢考用均由翰林院考試能善書之人奏聞咨送到部題補一禮部鑄印局大使康熙十年題準以儒士選用乾隆二年議準由部於見在儒士內遴選移咨過部題補五年任滿果無過誤該堂官出具考語咨送過部以未入流應升之官歸於雙月即行升用倘五年內有參罰事故仍不準升俟咨送過部後照依大使對品之官歸於單月與應補人員較文到日期先後改補一刑部司獄雍正八年議準刑部司獄補授後三年無過該堂官出具考語咨送過部以從九品應升之官即行升用乾隆六年議準嗣後刑部司獄無論雙單月遇有員闕照五城兵馬司指揮吏目之例由部於從九品候補候選人員內一例遴選引見補授仍照舊例升用七年議準司獄三年報滿有參罰事故者不準升用俟咨送到部後照其司獄對品之闕歸於單月與應補人員較文到日期先後改補一各部設立督催所乾隆三年議準各部設立督催所酌委司官專司稽察將已未完結之處三月奏聞一次四年議準各部院事件送科道注銷令承辦各司將已未完事件造冊該司官就近調取號簿勘對明確列銜畫押鈐印令該經承持送科道注銷八年奏準在京各部院衙門所辦題咨事件每三月一次具數奏聞此定例也但今恭遇車駕巡幸恐各衙門辦理事件不能依限完結請月一奏聞以杜遲延俟回鑾之日仍循舊例辦理一本部兵部設立稽俸廳雍正七年議準本部設立稽俸㕔鑄給印信歸并稽勳司司官管理雍正十二年議準兵部設立稽俸㕔鑄給印信該堂官於事簡司分內酌委司官兼理凡文武職俸祿冊籍各由該部稽俸㕔注明咨送戶部支給一中書科協辦內閣中書事雍正十二年議準滿漢掌印中書舍人各一人筆帖式二人準留本科辦事外其不掌印之中書筆帖式均令至內閣協辦中書事務如恭遇覃恩內外誥軸繁多之時仍回本科専司辦事一太常寺官順治十五年題準漢寺丞員闕由協律郎贊禮郎內遴選擬補協律郎贊禮郎員闕由司樂論俸升補司樂員闕由樂舞生遴選頂補奉祀員闕由祀丞論俸升補署正員闕由署丞論俸升補祀丞署丞員闕由樂舞生遴選頂補以上官員均於本衙門升轉升至寺丞止準加品級服俸不得升補别衙門遇員闕先盡丁憂服滿病痊假滿之人如無人即於應升應補人員內不論雙單月補授康熙十三年題準由禮部及該寺移送吏部照咨補授停止具題雍正十二年奏準太常寺增設漢所牧一員由部於候補候選七品以下小京官內遴選引見補授照原銜食俸辦事三年今定五年之後果能潔己盡心加意飼養該寺堂官出具考語咨送過部具題議叙準其以應得之官即用一鴻臚寺官順治元年議準序班員闕由直隸河南山東山西四省學習生員內選擇儀度聲音擬補鳴贊員闕由序班內考選聲音洪亮者擬補主簿員闕由鳴贊論俸升轉其丁憂起復病痊假滿之員仍由寺考取聲音按原職即行補用康熙四十四年議準均由鴻臚寺遴選知照本部照咨具題補授乾隆九年議準鴻臚寺四省學習生員每省各用三人準其以十二名著為定額不得額外多收遇有某省學習生員闕出即行文該省學政咨取充補十七年奏準山東山西河南三省離京稍遠在寺學習者行走維艱且聲韻各别土語難變學習唱贊時雖極力教演究難合式惟直隸一省近居京師該生等行走不致拮据其聲音唱贊亦易合式應將山東等三省額設生員六名裁去四名止留二名合直隸原設六名共八名一并歸於順天學政咨取一欽天監官順治十五年題準凡欽天監官升至監正止加京官職銜仍掌監事康熙五十八年議準監副以員外郎升用五官正以主事升用照滿官升轉之例由部按其得有品級食俸之日算俸入於論俸推升之月八月十二月遇闕即補不積各項升轉之闕每年升用一人或八月或十二月止升一人此升用時先升監副一次後升五官正二次論次升補監副員闕由五官正靈臺郎主簿挈壺正升補五官正員闕由主簿五官司書博士升補靈臺郎員闕由五官監候博士升用主簿員闕由挈壺正司書監候博士升補挈壺正員闕由博士升補司書員闕由博士升補監候博士員闕由天文生考授至天文生員闕由監於世業肄業二班人員內自行考補凡欽天監官生丁憂均不開闕離任扣限三月期滿仍行供職雍正十二年奉旨欽天監升用人員擬正者照常論俸擬陪者於各員內簡選一并引見欽此一太醫院官順治十五年題準凡太醫院官升至院使止加京官職銜仍掌院事又題準太醫院院判員闕由御醫升補御醫員闕由八品吏目升補八品吏目員闕由九品吏目升補九品吏目員闕由醫士升補遇有員闕不論雙單月由太醫院於應升人員內按其醫學優長行走勤慎者遴選正陪奏聞請旨補授丁憂起復假滿候補之人仍按原銜先盡坐補乾隆七年議定凡太常寺鴻臚寺欽天監太醫院所屬官員如有奉旨即用者遇闕即行補用其議敘即用及分班選用者仍各按議敘原題分别補用一五城司坊官雍正十一年議準五城司坊官如有閲俸已滿三年果能辦事勤愼才猷練逹任內雖有因公參罰事故準令該城御史注明事實呈送都察院堂官察核薦舉並將因公參罰之處於疏內聲明引見請旨升用以示鼓勵乾隆三年議準五城司坊官由部於候補候選人員內遴選引見補授如候補候選人員不敷遴選正指揮於候補候選之正六品通判內簡用副指揮於候補候選從六品州同內簡用吏目於正從九品人員內簡用補授後均照原銜升轉乾隆六年奏準五城地方緊要今所出員闕見在對品人員人數甚少在伊等各有應補本項班次易於得闕又因五城事務繁劇難於勝任每遇簡選多致觀望不前按知縣本繫應升指揮之人且曾任民牧熟諳外任請嗣後於對品人員並候補知縣內一并簡選引見補授十八年奏準五城副指揮員闕見在並無候補候選人員其從六品候補候選州同亦止三四人不敷選用應請照正指揮之例於應升副指揮之候補州判等官一并簡選引見補授又奏準向例五城司坊官閲俸三年令該城御史注明事實呈送都察院堂官察核薦舉將參罰之處於疏內聲明具題後由部引見照例升用惟是薦舉之人任內有降革留任等項例應開復銷案後方準升轉該員等處分既多雖經薦舉究不能即邀升用似應稍為變通以示鼓勵而供驅策嗣後五城司坊官到任後已滿三年果能辦事勤謹才猷練達仍令該城御史出具切實考語呈送都察院堂官核實咨部引見奉旨之後所有降革留任之案原繫因公事故應請準其一例升用將降革留任之案帶於新任扣滿年限别請開復一京畿四路捕盜同知康熙二十六年議準直隸設捕盜同知四員令該撫簡選保題雍正二年題準令該督於本省見任官員內遴選駕馭捕役緝盜有方之人具題引見補授如所屬內遴選無人應令題明由部照理事同知之例將各部院衙門筆帖式中書小京官內遴選保舉引見補授一大興宛平二縣雍正十一年議準大宛二縣閲俸已滿三年如果才守兼優著有實績任內雖有因公參罰事故令該府尹總督開列事實加具考語别行保薦將參罰之處聲明俟部議覆準後送部引見量加升轉乾隆四年奏準大宛二縣向由外縣知縣推升續於雍正二年奏請特簡賢員補授邇年以來有由部簡選者亦有該督題補者未為畫一嗣後令該督㑹同府尹於屬官內遴選具題引見補授一旗員遴選理事同知通判康熙二十八年覆準理事同知員闕將應升主事八旗滿漢字人員論俸擬正陪具題補授理事通判員闕由八品小京官筆帖式內選擇具題補授雍正七年議準各省理事同知通判員闕由部行文內閣各部院衙門於中書小京官筆帖式內將通曉漢文並兼通翻譯者保送過部㑹同大學士各部尚書公同遴選將遴選之人照月官之例考試漢字履歷均須切實具奏不得襲用浮辭如已寫漢字履歷有能翻譯者亦聽將試卷進呈恭候引見記名者豫行注冊遇員闕將記名注册之人引見補授將次用完之時照例遴選考試乾隆四年議準通行各部院衙門遇有保送理事同知通判時遵例將京察一等合例人員內保送此內如有服制未滿見患疾病及不能離京情節並通曉部務而不宜於外任者均令該堂官將不便保送緣由聲明過部一順天府學教授訓導雍正十二年議準令直隸總督㑹同學政於通省見任教職內遴選人品端方學問優長者具題調補六年俸滿準其一例保題一奉宸苑閘官雍正四年奏準由部於候補候選未入流內遴選補授附入月選雜職內具題俟奉旨後給慿準作京俸與未入流等官較俸升轉一外官題闕定限乾隆元年議準各省正印佐雜官員及河道總督所屬官員由在外遴選各闕如繫丁憂病故員闕即以督撫題咨開闕之日起限一月內題咨調補其緣事議降議革及升任調任終養告休等官由部於每月二十日截限時行文知照以接到部文之日起限一月內令該省照例題咨調補如有違限分别議處一官員題升乾隆元年議準各省督撫應行保題各員如將官員題請升補升署止準以應升之職題補不得越級保題三年議準凡題升人員有降級降職革職留任及承追督催停升徴收之案者一槩不準保題四年奏準凡題升人員其有住俸停升緝拏降俸罰俸之案仍準一例遴選保題至於奉旨題補之人與尋常照例題補者不同若應升官員內無合例之人不論何項參罰並越銜保題悉準一例遴選請旨凡題升知縣以上官員均令赴部引見恭候欽定一官員題調乾隆四年奏準各省題請調補調署官員除降革留任例有展參及督催分數錢糧承追虧空贓罰不準調補外其承追督催不作分數之雜項錢糧及降俸住俸罰俸緝拏之案仍準題補如降革留任並無展參亦準一例遴選調補將降革之案帶於新任接算年限開復至奉旨題補之人亦不論何項參罰悉準遴選調補此等調補官員均無庸送部引見其因不能勝任題請調簡者仍送部引見請旨一知府州縣等官閲俸升調乾隆十三年議準守令各員內凡有應題員闕必本任內閲俸五年以上方準題升應調員闕必本任內閲俸三年以上方準題調該督撫於所屬知府直隸州知州及府屬知州知縣內每於年底細加訪察將曾經升調各員在任又滿三年才守兼優政績卓著者保題到部知府加道銜直隸州知州加知府銜知州加同知銜知縣加通判銜注冊遇有應升準其即行題升向例凡降革留任之員槩不準題升今此等加銜注册之員任內如有降革留任之案例有展參者自不準題升外其例無展參者原可帶於新任接算年限開復應準其一例聲明題升如此等加銜人員有緣事降調及開復服滿候補者準即照其加銜降用及補用若照銜降調之員而所降之級尚在見任以上及與見職相當者均毋庸令其離任惟將所加之銜察銷又議準三年準調五年準升之例應仍遵照辦理至員闕果繫緊要非幹練之員不能勝任而年例未符實有不得不為變通者準令該督撫將其人其地實在相需之處或應調補或應升署詳悉聲明專摺奏聞除奉特旨準行外如交部議俟奉旨後由部察明該員委無别項不合例事故請旨準行其升署人員仍照久任之例接算前後俸次扣足五年之限題請實授一煙瘴臺灣各員題調乾隆十四年議準邊省內有煙瘴之闕與內地情形不同如必循照三年準調五年準升誠恐一時難得合例之人請嗣後內地及苗疆各闕仍遵例計算本任之俸如無俸深之員即請旨簡發若繫煙瘴各闕不必計俸惟擇才優與能耐煙瘴者即準升調又議準福建臺灣一府越在海外均由內地調補既應核其年力又須察其辦事才情若亦以三年俸滿始準調補恐合例者未即勝任勝任者又難合例於海外要區鮮有裨益請嗣後內地各闕不得援照此例惟臺屬各官無論閲俸年限仍照舊例遴選題調一署事實授乾隆四年奏準凡各省署事官員題請實授繫銜職相當銜大職小者除降級降職革職留任之案不準實授外其餘各項處分均應一例準其實授銜小職大實授者與題升無異如任內有住俸停升緝拏降俸罰俸之案準其實授其降革留任及承追督催停升徴收等案均應俟銷案之後再行保題實授以上署事官員任內有此等案件本與題升實授之例不符而從前題署之時欽奉特旨準行者將來題請實授由部於議覆本內聲明應否準其實授恭候欽定至於署事實授銜大職小銜職相當者均毋庸送部引見其銜小職大者如從前奉旨命往之時指明以何項官員試用者亦毋庸引見如繫命往酌量委署試用未經指定銜職及由見任等項題升凡繫銜小職大人員均於題請升署之時送部引見請旨將來題請實授毋庸再行給咨送部若各省督撫以要闕需人題明先行升署者仍於實授時送部引見一河工署事實授乾隆十六年議準河工官員例應先行題署試看是以必經閲三汛後如果稱職送部引見實授若由見任調署之員均繫從前業經引見之人非題升及未經引見者可比至期滿題請實授時原可毋庸重復引見嗣後除題升及未經引見人員仍照定例遵行外其由見任調署者一年後果能勝任具題實授毋庸再行引見一保題官員引見乾隆四年奏準各省保題官員應行引見者均俟部議奉旨後行文知照該省再給文送部引見不得未準部覆即行隨本給咨送部一調闕準酌量題升康熙三十八年議準苗疆員闕停其部選該督撫保題調補雍正七年諭煙瘴地方文武官員闕向例調補者該督撫提鎮等於屬員內秉公酌量若有可以題升之人即具題請旨升授欽此乾隆四年奏準各省應題之闕知縣以上官員其原繫例應題補及煙瘴地方均準升調兼行不拘一格聽該督撫酌量具題外其餘一切應行調補之員令該督撫照例於屬官內對品改調不得濫行奏請升用若該省實無可調補之人而屬官內果有才守兼優政績卓著者於疏內將無可調補必須題升之處聲明由部察明與例相符令其送部引見應否準其升用恭候欽定如該省既無合例應調之員亦無可以題升之人即令該督撫奏聞由部於候補人員內遴選數人引見恭候簡用如在部候補人員不敷遴選即於候選人員內遴選引見補授至佐雜微員専司差遣巡緝與知縣以上官員不同凡在外遴選者均令督撫照例咨部改補如無可調之人其見任應升人員內有曾經薦舉卓異及保薦俸滿即升者亦準咨部升補附入月分彙題如無應調應升之人令該督撫奏明於候補人員內遴選引見補授倘候補人員不敷遴選即於候選人員遴選補授槩不準其將應調之員違例咨部升用以上應行調補之員如該省本有應調之人該督撫以無人具題及濫行奏請升用者一經發覺悉照定例議處一補用試用人題闕乾隆四年奏準凡各省奉旨命往及督撫題準以道府補用試用人員遇有員闕無論應題應調應選之闕令該督撫酌量才具擇其人地相宜者悉準題請補授署理其同知通判州縣如奉旨命往補用及督撫題明留於該省候補者無論應題應調應選之闕均準該督撫酌量具題如繫命往委署試用及督撫題準試用人員俟該省有應題闕出於見任內遴選調補升補其所遺應歸月選之闕準其署理俟題補完日仍歸部選此外應歸月選之闕槩不準將試用人員題署至例應題補之闕原準升調兼行不拘一格試用人員內有能勝任者準其一例遴選題署其應於見任內調補之員如試用人員內原繫候補及發往之後曾經題署得職緣事離任後經别補亦準遴選署理其有將初任試用未經得闕人員徑行題署調補之闕槩不準行又佐雜等官惟咨報要闕者應於見任內遴選調補其餘悉歸部選應將各省以佐雜補用試用人員遇有應歸月選之闕該督撫酌量才具咨部補用應行委署者咨部委署果能稱職别請實授一例附入月分彚題至應行調補要闕令該督撫悉行照例於見任內遴選調補其有命往以佐雜補用及留於本省候補並試用佐雜內有原繫候補並曾經咨署得職亦準酌量遴選補用署理如有將初任試用佐雜請署調補之闕者亦不準行一直隸州知州題補原定直隸州知州員闕令各省督撫於本省知州內遴選賢能之人引見調補如無可調之員即令於知縣內擇其才守素著明敏練逹者保題升用乾隆十六年議準嗣後直隸州知州升轉與同知一同較俸升用知府等官不必與府屬知州較俸仍升同知其府屬知州題補直隸州知州者應照題升之例辦理至品級仍應照舊一即升參罰保題乾隆五年議準各省保薦即升人員比照保題行取之例任內如有降革留任之案亦準保舉注册俟開復銷案再行升用其降俸降職罰俸住俸等項參罰仍準升用將降罰之案帶於升任一運副運判題補雍正十三年奏準各省鹽運使司運副運判員闕令該督撫㑹同鹽政於見任屬官內遴選具題送部引見補授乾隆七年奏準江振議敘條􅍁內開運副運判例不歸月選繫在外題補之闕此項議敘人員人文到部籖掣省分令其先赴該省委用遇有員闕不論日期先後先將議敘之人題補一人再將應升之人照例簡選題補一人輪流間用九年議準捐納運副運判等官籖掣省分題咨得闕時應照初任官員之例送部引見補授十年奏準各項開復人員例應以原官補用惟運副運判繫在外題補不歸月選此項開復應補各官既不歸於部選未便令其在部候補應比照捐納運副運判之例請將該員等籖掣省分令其先赴該省委用此內如未經引見發往者照例於得官之時送部引見如業經引見奉旨補用者免其送部引見並請嗣後凡有似此應補各員人文到部悉照此例遵行十三年議準運副運判等官一升一捐分班閒用應升之員繫在外於通判知縣等官內簡選題升按通判知縣等官升用之途尚廣運副運判則多人共守一闕守候無期應將部發捐納人員先盡補用俟補用完日仍照定例辦理一衝繁疲難各項簡選調補雍正九年議準除道府員闕繫請旨補授並沿海沿河苗疆煙瘴及一切應行題補調補之闕無論四項或兼或全或専及並非衝繁疲難均令督撫遴選具題外其同知通判知州知縣內督撫冊報衝繁疲難四項三項相兼者令該督撫於見任屬員內簡選調補二項一項及並非衝繁疲難者悉歸月分銓選於考試履歷進呈時將員闕注明候旨簡用乾隆元年議準道府員闕衝繁疲難四項三項者開列闕單請旨簡用二項一項者歸於月分銓選一佐二要闕調補雍正七年諭各省佐二微員有地方職掌緊要者亦有新設新移正需料理者必須於衆員中簡選才具稍優熟練事務之人方克勝任著各省督撫將佐二緊要之闕察明具奏交與該部注冊遇有員闕該督撫簡選題請調補如本省乏人或將别省所知見任之員題補或請旨簡發永著為例欽此十三年議準各省佐雜要闕均令督撫簡選咨部調補由部察明與例相符將各員詳晰開明履歷並督撫考語按月彙題俟命下之日由部行文知照準其補授一試用人員仍發原省乾隆五年奏準凡各省委署試用人員未經實授者丁憂服滿降革開復令其即由本省督撫給咨該員仍赴原任省分委署試用仍咨部存案至降革人員應行引見開復者俟奉旨準其開復後由部即行給照發往原省試用一河工服闋假滿仍準留工乾隆四年議準凡河工效力人員丁憂治喪除未經得官及題咨委署尚未實授者俟服闋假滿之時令原籍督撫給咨前赴河工聽候該督酌量委用仍咨部存案其已經實授得官人員於該員丁憂治喪之時令該河道總督詳察如繫諳練河務或該員情願前往河工候補準其於題咨內聲明俟服闋假滿後即由原籍督撫給咨前往該省河工聽候河督題補並咨部存案其未經聲明留工者仍照例給咨赴部别補一督撫不準隨帶人員乾隆二年議準凡各省督撫除河工效力外如有赴任之時奏請將平日所知人員帶往以備委用者槩不準行若調任後於前任屬官內確知有才能出衆人品卓越者準其保奏送部引見恭候欽定一簡選分發人員乾隆十六年諭向來分發各省人員由吏部堂官簡選引見雖該部職掌所在然未足以示慎重嗣後除特旨交該部於次日即行引見者仍由該堂官簡選外其餘凡有簡選之處該部將滿漢大學士九卿並該部堂官一同開列候旨特㸃大臣簡選交該部引見著為例欽此又奏準嗣後除簡選各省及驗發河工人員欽遵諭旨先期將滿漢大學士九卿並本部堂官職名繕寫名單進呈請旨欽㸃簡選外其餘例應在京簡選各闕內除各衙門自行簡選送部引見及由部㑹同各處簡選引見各闕應照舊例辦理外至五城司坊官刑部司獄太常寺司庫所牧國子監監丞典簿宗人府主事理藩院司庫鳯凰城迎送官督撫衙門筆帖式奉宸苑閘官等向皆由部簡選按以上簡選各官人數無多與簡發外省人員有閒亦仍照舊例在部簡選一逺省簡發人員雍正二年諭逺省州縣員闕部選官領慿赴任必需數月甚而懸闕日久署印屢易其官以致貽誤地方者不少著將候選舉人選期尚逺者簡選命往各省委署欽此十三年議準各省題請簡發委署試用人員槩行停止其雲南貴州四川廣東廣西等逺省經督撫題請簡發奉旨後由部將候補候選人員簡選引見命往乾隆十七年議準福建原屬邊逺兼屬海疆遇有需人之時準該督撫具題請旨簡發一直隸簡發人員乾隆十五年諭直隸為畿輔重地路當衝要政務繁多州縣各官或遇調委差務署內事件勢難兼理著該部將候補候選人員內簡選州縣十人佐雜二十人俟朕回鑾時引見交與該督差遣委用遇有員闕酌量補授至所發人員將次補完之日再行請旨簡發永著為例欽此又諭前因直隸委署需人朕敕部簡選引見曾發知縣十人佐雜二十人酌量委用今據該督奏稱口外理事同知共十餘員一經闕出委署乏人等語著將三十人數內減去知縣二人佐雜二人該部於候補候選理事同知內簡選數人俟朕回鑾時引見簡發委用俟有員闕即行題補前次知縣佐雜已經發往毋庸再減嗣後著每次發理事同知四人知縣八人佐雜十八人以足三十人之數欽此一奉天州縣由旗員遴選乾隆十五年議準奉天共十有二州縣其有戶婚田土辭訟等事凡旗民交涉者皆會同旗員審理往往意見參差致難完結若此十二州縣即將旗員銓選則不必會同該城旗員辦理較為畫一按奉天州縣向例衝繁疲難四項三項相兼者該府尹於見任屬官內簡選調補升補二項一項者歸於月分銓選原不論旗員漢員通行補用今既改用旗員則應用人員班次不得不豫行酌定又按知縣一項滿洲文進士翻譯進士文舉人俸深筆帖式皆例得選用但進士舉人各按科分甲第名次先後銓選筆帖式於雙月五甲五舉四捐三升之後選用一人今奉天知縣專用旗員若仍歸月選恐奉天出闕之月未必即屬旗員應選之班將遇闕先盡選補則於選法有礙將扣闕以俟旗員應用班次則員闕未免久懸請嗣後奉天應選知縣員闕將應用知縣之滿洲文進士翻譯進士按照科分甲第文舉人按照科分名次筆帖式按照俸次深淺三班各擬一人引見候旨簡補至知州員闕向由在部候補候選人內補用如無候補候選人員即將同知借補承德縣乃京縣知縣繫正六品例由該府尹於所屬知縣內簡選升補如所屬無可升之人亦應在部簡補今既改用旗員則滿洲小京官外用同知通判人員原繫各堂官遴選能通文理辦事明白者保送引見記名升用同知與知州通判與京縣知縣官階尚屬相近似可通融借補嗣後奉天應選知州員闕將記名以同知用之滿洲小京官簡選擬定正陪引見候旨簡補承德縣知縣員闕如所屬知縣內無可題升之人將記名以通判用之滿洲小京官簡選擬定正陪引見候旨簡用其四項三項相兼要闕仍照舊例令該府尹於見任屬官內簡選旗員調補升補如一時無可升調之人即令該府尹具摺奏請簡補本部亦即照此辦理一簡選佐雜乾隆六年奏準凡各省請簡發佐雜試用人員由部將候補捐納議敘即用選用恩拔嵗副貢生考職並倉書總吏提牢典吏應行即用人員均準簡選貢監吏員考職者不準簡選其河工海塘等處請發效力人員亦先盡候補及前項應行即用選用人員簡發如人數不敷貢監吏員考職人員亦一同簡選至於捐納職銜人員無論各省河工槩不準簡選一鹽庫大使簡選雍正六年議準各省鹽大使布政使司庫大使於候選知縣州同州判縣丞簡選引見補授給與正八品職銜與按察使司知事等官一例較俸升轉乾隆元年奏準閩省産鹽地方向繫委官辦理但見任官皆有本任恐於場務不免廢弛應於候補候選知縣州同州判縣丞各員內簡選引見發往如三年無過準其以相當之闕題咨補用倘不實心致誤餉課即行察參三年議準各省鹽埸藩庫大使員闕於候補人員並舉人候選知縣及恩拔副榜貢生考授州同州判縣丞職銜及曾經督撫驗看以直𨽻州州判咨部候選人員內停其取具身家殷實印結有情願遴選者令其赴部具呈由部遴選引見恭候簡用如該鹽政等以辦理需人奏請簡發亦於前項人員內遴選引見命往效用遇闕酌量題補至各省補授之後除貢生考授縣丞品秩相當應停其報滿照闕升轉外其由舉人候選知縣及貢生候選州同州判借補者應令於到任之後計算閲俸五年該鹽政會同督撫秉公分别果能才守兼優整飭鹽務準其保題以應得之官分班選用班次詳載月選例如繫循分供職之人即行咨部停其報滿與各省見任場員一例較俸升轉十年奏準向例場員庫大使皆閲俸五年分别保題惟閩省鹽場效力人員三年期滿即以相當之闕補用未免過優應照各省場員之例五年期滿如果稱職準其保題又奏準按向例場員藩庫大使員闕其恩拔副榜貢生考授州同州判縣丞及貢生曾經督撫驗準以直隸州州判咨部候選者與舉人候選知縣之人一同準其遴選見今舉人班次壅滯於遴選場庫一途略為疏通嗣後遇有遴選其貢生考職人員槩行停止二十年覆準閩省場員五年俸滿其由州同州判職銜借補者仍照舊例咨部留於該省以應得之闕補用其由舉人知縣職銜借補者該督保題送部引見其以知縣用者照例歸於月分選用其不稱保題奉旨回任者留於該省以對品之縣丞等官咨補至循分供職者亦照例咨部停其報滿以對品之縣丞等官咨補如有不諳吏治而品端學優者咨回原籍歸該員原班以教職改補一教職考試保題雍正四年奏準凡教職選授後發慿本省督撫考試一二三等者均準給慿赴任四五等者解任學習三年再行考試如果文理優通題明補用如仍前荒謬革職六等者革退其考列一二等之教官到任後如果文品兼優才能出衆所屬士子無抗糧興訟等過犯以到任日扣算俸滿六年督撫會同學臣保題送部引見恭候簡用一鹽場教職俸滿分别接算保題乾隆十一年議準鹽大使教職俸滿多有兩任接算保題者惟是俸滿保題原令該管上司核其才守果優方準保題升用若將前任之俸一槩準其接算恐到任未及數月閲俸已滿援例保題其才守之優劣難以遽定嗣後俸滿各員除前任閲俸甚淺後任尚需數年者仍算五年滿日分别報部如有前任閲俸已深在四年以上者雖接算年限已滿亦應俟到任一年後核其才守果優方準接算保題又議準鹽埸教職多有久逾俸滿之期始行保題到部者不惟辦理不畫一且恐其中不免因俸滿時該管上司未經保題復營求接任上司保題之弊嗣後俸滿之員如果才守兼優即行照例保題倘逾限至半年以上者一槩不準其保題升用十七年議準俸滿各員其果有才守兼優堪膺保薦而屆滿之期或有本員出差及上司新任督撫公出不能依限具題該督撫聲明保題到日由部將可否準其保題之處恭候欽定一雲貴等省教職康熙三十八年議準貴州普安一州餘慶安化普定平越都勻鎮逺銅仁龍泉永從等縣雲南永北一府昆陽彌勒陸涼馬龍霑益雲龍等六州各增設訓導一人均將恩拔副榜選授以教諭管訓導事升轉時照教諭升轉雍正四年遵旨議定雲南貴州四川廣東廣西福建等省教職將進士舉人恩拔副榜挨貢及捐貢人員照依科分名次所捐雙單月先後日期開列選法截定人數填給執照遇員闕令該督撫挨次升選每月具題照例考試令其到任並將各員履歷到任日期原發執照按季彙册送部察核再雙月推升之例教諭升教授訓導升正諭止在本省較俸亦截定俸次分發本省擬升以上各項均截給三十名惟教諭升助教知縣等闕訓導升府經歷縣丞等闕原與各省通同較俸仍歸部推升如遇月選推升之後本省又行擬升具題者將擬升之本省教職扣除以俸次之人升用乾隆六年奏準雲貴等六省教職員闕令該撫將擬選人員先行考試一靣具題一靣給照令其先行任事仍俟具題奉旨後準其實授由部即以奉旨補授之日注冊核算俸次升轉十八年議準雲南貴州四川廣東廣西福建逺省教職因恐部選稽遲故令在外督撫按月具題選授今察各省所題教職多因錯誤駮回所出各闕未有定員更多遲滯且逐月分案具題亦屬繁冗請將逺省教職仍歸部選一內外陰陽醫學僧道等官康熙十三年議準均由禮部察明咨送照咨注册仍咨禮部知會各該衙門一沿河州縣調補雍正元年議準河南之祥符滎澤中牟鄭蘭陽儀封商邱考城虞城武陟孟河內山東之德東平濟寧臨清單滕嶧魚臺汶上陽榖恩曹巨野江南之山陽江都甘泉高郵邳宿遷銅山沛虹靈璧泗旴𣅿等州縣員闕均令該督撫