三年果能稱職以升銜升用其升用之闕或仍以本省題補或具題到部以他省補授統令該督撫臨時酌量具題又議準沿邊煙瘴佐二雜職各官之忠州州同下雷土州吏目太平龍英萬承各土州州同安平土州州判茗盈結安佶倫都結下石西各土州吏目崇善欣城土縣馬平各典史三都汛穿山鎮各巡檢慿祥土州州判江州土州州同江口鎮巡檢上林縣丞典史思吉鎮巡檢慶逺府經歷太平府經歷宜山縣丞典史德勝鎮巡檢天河縣典史河池州州同吏目思恩縣典史南丹土州州同那地土州州判思恩府經歷司獄鎮安府知事奉議土州州判田州土州州同都康土州吏目向武土州州判西隆州州同吏目西林縣典史泗城府經歷崇善縣丞思州土州州同宜山縣龍門司巡檢歸順州吏目左州養利永康寧明果化土州各吏目平樂司巡檢百色巡檢天保縣典史凌雲縣丞典史東蘭州吏目柳州通道鎮巡檢梅寨巡檢等官三年俸滿即升九年題準廣西所有煙瘴正雜各官均於桂平等五府二州內簡選調補照例俸滿即升乾隆三年議準太平府明江理土同知通判寧明州知州吏目泗城府知府經歷平樂司巡檢凌雲縣知縣縣丞典史西隆州知州州同吏目西林縣知縣典史慶逺府屬之東蘭州知州吏目太平府屬之佶倫結安都結茗盈四土州吏目慿祥土州州判思恩府屬之百色同知巡檢鎮安府屬之向武土州州判都康土州吏目下雷土州吏目二十七闕水土最為惡劣别省人員不甚服習應於內地簡選福建湖南廣東雲南等省人員調補由部於各邊省附近之廣東等五省候補候選人員內簡選正雜三十人命往廣西交與該督撫遇有調補煙瘴所遺之闕即將發往人員委署補授以備將來調補之用六年議準廣西煙瘴之員闕例將廣東等五省人員內簡選調補如五省乏人即於各省候補候選人員內有平時熟習水土及情願前往效力者均準一同簡選引見命往並命廣東等五省督撫將該省在籍候選正八品以下各官有不能來京簡選情願前往煙瘴地方效力之人即令該督撫就近𫝊齊驗看擇其年力精壯堪以驅䇿者豫行造冊報部注册俟廣西煙瘴地方需人之時仍先盡候補候選人員內簡選如廣東等省人數不敷各省候補候選有情願簡選者亦準一例簡發如再不敷用將各省豫行驗看注冊人員內掣籖具奏給照交與督撫再加驗看如果年力可用即給照令其前往廣西委署試用未經簡發以前遇伊原班應選之時仍歸原班銓選若煙瘴佐雜員闕內地對品人員不敷簡調其簡發廣西試用之廣東等省人員亦準簡選署理俟將次用完再行題請簡發至調補後於俸滿之時該督撫即將居官實蹟出具考語分别題咨仍遴員前往調補俟交代後撤回內地令其照例候升其餘正印佐雜各官水土非甚惡劣俸滿後毋庸調回仍令在任候升一苗疆題補雍正五年題準雲南省元江府知府他郎通判鶴慶府維西通判廣南府知府鎮沅府知府威遠同知普洱府知府思茅同知昭通府知府大關同知師宗州知州鎮雄州知州魯甸通判恩樂縣知縣永善縣知縣恩安縣知縣寧洱縣知縣寶寧縣知縣各員闕該督撫簡選題補請三年俸滿保題即升十二年題準貴州省古州兵備道黎平府古州同知鎮逺府台拱同知清水江通判都勻府八寨同知丹江通判都江通判銅仁府松桃同知永豐州知州荔波縣知縣以上員闕該督撫簡選題補三年俸滿保題即升又題準雲南東川府知府會澤縣知縣貴州之貴西道貴陽府知府長寨同知黎平府知府鎮逺府知府安順府知府郎岱同知歸化通判都勻府知府大定府知府水城通判南籠府知府普安州知州黃平州知州獨山州知州清平縣知縣施秉縣知縣永從縣知縣清鎮縣知縣貴筑縣知縣普定縣知縣畢節縣知縣鎮逺縣知縣湖南之寶慶府知府理猺同知乾州同知鳳凰營通判永順府知府同知通判永州府理猺同知辰州府永綏協同知沅州府知府通判靖州知州道州知州新寧縣知縣宜章縣知縣綏寧縣知縣城步縣知縣寧遠縣知縣永明縣知縣江華縣知縣永順縣知縣龍山縣知縣保靖縣知縣桑植縣知縣安福縣知縣芷江縣知縣永定縣知縣湖北之施南府知府同知通判宜昌府知府同知鶴峯州知州恩施縣知縣宣恩縣知縣來鳳縣知縣咸豐縣知縣利川縣知縣長樂縣知縣以上員闕亦令該督撫簡選題補五年俸滿保題即升又題準佐雜各官如雲南之猛班巡檢按板井抱毋井二大使廣南府經歷普洱府經歷沅江府經歷知事師宗州州同吏目鎮雄州學正吏目昭通府教授經歷知事鎮沅府經歷知事恩樂縣典史鹽渡井巡檢魯甸巡檢毋亨巡檢永善縣丞教諭井底典史彜良州同威信州判劍川州忠甸州州判宣威州吏目會澤縣者海典史寶寧縣典史可渡巡檢新撫巡檢猛統巡檢猛𬗟巡檢則補巡檢恩安縣典史寧洱縣典史貴州之開泰縣丞永從縣丞天柱縣丞荔波縣丞册亨州州同羅斛州州判永豐州吏目黎平府照磨潭溪司吏目遇有員闕該督撫簡選咨部調補三年俸滿保題即升其雲南之東川府經歷歹補巡檢貴州定番州知州州判威寧州知州獨山州州同普安州州判黎平府經歷安順府經歷南籠府經歷鎮逺縣丞施秉縣丞清平縣丞威寧州巡檢黃平州巡檢湖南之永州府經歷龍山縣典史隆頭司巡檢桑植縣典史上下峝巡檢永順縣典史保靖縣典史安福縣典史辰州府永綏協經歷花園鎮巡檢排補美巡檢靖州直隸州州判綏寧縣典史城步縣典史青坡巡檢寶慶府寨頭巡檢江頭汛巡檢沅州府涼山巡檢永定縣典史遇有員闕簡選咨部調補五年俸滿保題即升欽定大清㑹典則例卷八
