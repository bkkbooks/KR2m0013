front:
  text: 欽定四庫全書欽定大清㑹典則例
  hash: sha256:f82b1be1f437c33349e84585b47308c3f9d7ecec957d06f637da50ebd9d04d4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_001-1a, image: WYG0620/WYG0620-0001a.png}
body:
  text: 上諭乾隆十二年正月初六日奉上諭國家立綱陳紀布在方䇿所以明昭代之章程備諸司之職掌以熙庶績以示訓行典至巨也大清㑹典修於皇祖聖祖仁皇帝康熙二十三年越我皇考世宗憲皇帝御極之初即允禮臣之請開館重修九年告竣刋梓頒行閲今又二十年矣其間因時制宜屢有損益向來諸臣每有以重修為請者朕以國家定制豈容數更踵事增文自有部册故概未準行近以幾餘時加披覽閒為討論乃晰由來有不得不重修者蓋緣編纂之初諸臣或沿襲舊文未經考證或略存近制未溯本源或限於案牘之不全或誤自參稽之不審而又未嘗請㫖取裁斟酌至當故舛訛疏漏均不免焉夫唐虞分職具載典謨周室經邦詳於官禮書曰監於先王成憲又曰其爾典常作之師既謹度以惟貞宜有條而不紊矧際重熙纍洽之期當禮明樂備之日敕幾慎憲職惟其時是當博考朝章詳稽故實正舊編之紕繆補記載之闕遺用蕆成書垂示法守所有一切開館事宜該部定議具奏欽此乾隆十二年二月初六日內閣奉上諭會典一書上自郊廟朝廷行之直省州縣凡禮樂兵刑之實財賦河防之要城池郵驛之詳大綱小紀無不並包薈萃必使制度沿革本末瞭然條貫井井方足備一代之典章垂之册府非若詞章之僅資諷詠紀纂之但誇淹博而已今既有事重修爾總裁官其敬率纂修諸臣詳悉參考事必究其遵行令必徴其實據勿以案牘浩繁而憚於檢閲致有闕遺勿以卷帖煩重而失於糾稽益滋舛錯即如見行典制共睹共聞而紀叙非實文與事戾一經指摘不覺爽然又如往昔施行屢經詳定自當􅕍括詞㫖略見源流而原議舊儀連篇並載徒為炫目反掩正文其他訛誤多端繁簡未當俱宜更正以示憲章詎宜因就草率從事再向者修書祗先呈樣本餘俟全帙告竣一併進呈既浩汗而不易披尋亦已成而難於改作未得編摩之要領豈云纂輯之良規著依明史綱目事例將稿本繕成一二卷即行陸續呈奏朕敕幾多暇將親為討論兾免傳疑而襲謬且毋玩日以曠時諸臣其敬承之欽此
