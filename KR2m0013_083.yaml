body:
  text: 禮部祠祭清吏司一陵寢國家肇基興京京城西北十里為肇祖原皇帝陵興祖直皇帝陵共一山稱興京陵盛京城東南百二十里為景祖翼皇帝陵顯祖宣皇帝陵共一山稱東京陵盛京城東北二十里為太祖高皇帝陵稱福陵盛京城西北十里為太宗文皇帝陵稱昭陵各設皇陵奉祀掌關防副關防尚茶尚膳內管領等官並各執事男婦人役置牛羊圈設吏專飼犧牲設莊園以供粢盛菜蔬崇德年間定嵗暮清明日祭饗興京陵用牛一遣守陵官行禮東京陵用牛二遣宗室覺羅大臣行禮福陵用牛一羊二遣大臣一人行禮忌辰孟秋望日萬夀聖節㸃香燭獻酒果均遣大臣一人奠帛讀祝行禮每月朔望致祭用牛一㸃香燭獻酒果不讀祝奠帛遣守陵官行禮順治八年封興京陵山為啓運山東京陵山為積慶山福陵山為天柱山昭陵山為隆業山均從祀方澤又每陵各設官員及守陵人户并定祭儀十年議準興京陵東京陵元旦清明冬至用牛一孟秋望十月朔用羊一均獻酒果㸃香燭讀祝奠帛遣宗室覺羅大臣行禮每月朔望用羊一獻酒果㸃香燭遣守陵官行禮福陵昭陵冬至之祭用牛一羊一豕一獻酒果㸃香燭奠帛讀祝行禮忌辰清明嵗暮孟秋望十月朔暨萬壽聖節均獻酒果㸃香燭不讀祝奠帛遣守陵官行禮又議準興京東京陵照福陵昭陵例停止元旦之祭豫於嵗暮日行禮十二年定凡遇忌辰遣官三人於本陵獻酒果㸃香燭致祭或遣在京官前往或遣盛京官致祭具題請㫖十三年題準陵山周圍立界界內禁止採樵又題準謁陵禮親王以下參領輕車都尉以上若至盛京並往來經過皆於福陵昭陵內門外叩謁行三跪九叩禮十五年奉移東京陵改祔興京陵安葬地宫罷積慶山祀典十六年稱興京陵曰永陵遣官致祭十七年諭興京有四皇帝陵盛京有太祖太宗陵理宜躬親致祭乃朕躬在京不能依時前往可將宗室內除數人居住盛京按時致祭著議政王大臣等㑹議具奏欽此遵㫖議準福陵著宗室鎮國將軍一人覺羅三等輕車都尉一人前往居住昭陵著輔國公一人覺羅三等輕車都尉一人前往居住至永陵致祭著伊等輪流往祭十八年建永陵稱饗殿為啓運殿門為啓運門立景祖翼皇帝顯祖宣皇帝遷祔永陵廟碑康熙元年奉安四祖四后神牌於啓運殿二年建世祖章皇帝陵於直隸遵化州之鳯臺山稱曰孝陵世祖章皇帝孝康章皇后孝獻皇后同日安葬地宮封鳯臺山為昌瑞山從祀方澤又題準隆恩殿中一間寢室奉安世祖章皇帝神位居左奉安孝康章皇后神位居右右一間奉安孝獻皇后神位均南嚮稱饗殿為隆恩殿門為隆恩門樓為明樓上懸孝陵牌匾每年以清明孟秋望冬至嵗暮為四大祭祭日奉世祖章皇帝神位居中孝康章皇后神位居左孝獻皇后神位居右均南嚮帝后同案奠獻行禮與昭陵禮同又題準陵寢周圍立界界內禁止採樵設孝陵官禮部設奉祀郎中工部設修理郎中兵部設守衛總管翼領防禦領催驍騎內務府設奉祀郎中等官及內監各執事男婦鑾儀衛設校尉二十四名户部設庫尉二人領催一名禮工二部設各項人役三百二十餘名又置牛羊圈設吏以飼犧牲設莊頭二人各給地七頃二十畝園頭一人給地一頃五十畝以供米麵菜蔬官員兵丁員額詳見吏部兵部內務府又除內大臣侍衛等守護山陵又奏準孝陵四時大饗由皇陵禮部設祝版香帛於龍亭校尉舁亭前列御仗恭送至陵凡執御仗校尉皆乘驛馬所用米麵油蜜等項用驛車裝送每月朔望所供果品盛於黃盒酒尊盛於黃架前列御仗校尉舁送至陵是年議準改建福陵昭陵明樓寶城地宫修理完竣前期一日各遣大臣一人以奉安祗告讀文致祭一如大饗禮是日焚楮帛五千祭酒三爵奉安地宫禮成祭酒三爵隆恩殿內安奉神牌及神龕寶牀衾褥帷幔楎椸均照太廟成式製造又題準謁陵禮凡有事往盛京者三品以上官於福陵昭陵羅城門外行禮若遇致祭日二品以上官進城門內隨守陵官陪祭歸時行禮同又定自分水嶺至鮎魚關寬天峪繫馬蘭口副將營兵周圍安設十八處堆撥其風水內地看守四十二處堆撥繫副將總管一同稽察如遇軍政之期所屬守備千把皆繫副將考驗造册申送總管翼領呈報兵部三年奏準各陵寢祭饗易豕為羊並酌定祭品又議準謁陵禮凡往東路經由石門者王貝勒於隆恩門外行三跪九叩禮守備直班官員啓隆恩門貝子以下三品官以上行禮不啓門皆由奉祀禮部官引禮回時不必進謁往湯泉者回時準其進謁若遇祭饗日免行禮又議準每嵗清明於各陵上土十有三擔承祭官總管掌關防官率官兵共十有三人升寶頂上土豫於界外取土貯各陵垣外潔淨處候用七年於福陵昭陵孝陵各建立聖德神功碑恭紀列祖功德昭垂萬世八年議準福陵昭陵停止宗室覺羅居住四陵每年四時大祭遣多羅貝勒以下奉國將軍並覺羅男以上前往致祭又議準盛京三陵每年四時祭祀令奉天將軍副都統侍郎致祭每祭豫期將職名開列具題孝陵照見定例仍奏遣王公前往國有大慶祗告各陵將和碩親王以下鎮國將軍並文武一品大臣以上奏遣前往九年聖祖仁皇帝奉太皇太后仁憲皇太后率孝誠仁皇后詣孝陵先期欽天監擇吉日禮部具題內閣撰祝文祭文太常寺辦告祭品物宗人府題請扈從王以下宗室覺羅等官各部院題請扈從堂上官科道官各一人各部院酌委官屬兵部題請扈蹕官軍額數鑾儀衛備隨行儀仗户部給扈蹕官軍行糧工部修理橋梁道路光祿寺豫辦御膳供具教坊司設導迎樂聖駕啓鑾前一日聖祖仁皇帝躬詣太廟行祗告禮不設鹵簿啓鑾日設騎駕鹵簿不作樂午門鳴鐘在京王以下文武各官咸常服於午門外分翼跪送時太皇太后仁憲皇太后孝誠仁皇后均由午門出長安左門聖駕經由通州三河薊州等處地方文武官咸常服於道右百步外跪迎次日駕發仍跪道右恭送其迎送各官吏部奏請朝見將至孝陵守陵官員不直班者於興龍口之外道右跪迎至日行謁陵禮太皇太后仁憲皇太后孝誠仁皇后公主等先行聖祖仁皇帝率王以下參領侍衛等官隨後行進昌瑞山紅門太皇太后駕入隆恩門至明樓階前降輿仁憲皇太后駕入隆恩門至隆恩殿階東南降輿孝誠仁皇后至隆恩門內燎爐旁降輿公主等至隆恩門外階下下車馬扈從婦女至三洞橋迤南下車馬太皇太后於方城上東旁坐祭酒舉哀仁憲皇太后率孝誠仁皇后暨公主等於明樓前正中行六肅三跪三拜禮隨舉哀祭酒時行三拜禮畢奉太皇太后升輿還行宮聖祖仁皇帝至下馬石牌降騎王以下各官均在五洞橋迤北下馬恭謁行禮出乘騎還行宮次日於隆恩殿行大饗禮又次日於寶城前設黃幄行焚楮帛讀文致祭禮恭奉太皇太后仁憲皇太后率孝誠仁皇后公主等先行至寶城前太常官讀祭文聖祖仁皇帝祭酒行禮王以下各官於陵寢門外均隨行禮如儀禮成聖祖仁皇帝御行宮守陵官員行朝見禮聖駕回鑾設儀仗作樂經過地方文武官咸朝服跪道右迎送至行宮行朝見禮至京日聖祖仁皇帝親詣太廟祗告畢還宮午門鳴鐘不隨從王以下文武各官咸朝服於午門外齊集跪迎候聖駕還宮各退越二日聖祖仁皇帝御太和殿設鹵簿大駕王以下文武各官咸朝服進表慶賀十年八月聖祖仁皇帝恭謁福陵昭陵前期一日聖祖仁皇帝躬詣太廟行祗告禮次日啓鑾設騎駕鹵簿不作樂午門鳴鐘不隨從王以下文武各官咸常服於午門外分翼齊集跪送王以下大臣出城恭送隨從王以下宗室覺羅官各部院官扈從官軍及各執事人員由各該衙門具題聖駕經過地方文武各官咸常服於道右百步外跪迎次日亦於道右跪送其迎送各官由鴻臚寺題請朝見至陵鴻臚寺豫行題請令守陵官暨盛京文武各官咸常服於道右跪迎至日恭謁福陵行禮次日恭謁昭陵行禮畢聖駕還行宫次日恭詣福陵昭陵隆恩殿行大饗禮又次日於福陵昭陵隆恩殿前設黃幄焚楮帛行讀文致祭禮因寶城前不能容設黃幄禮成還宫先期鴻臚寺題請守陵官員暨盛京文武各官咸朝服於崇政殿前序立行三跪九叩禮又令守陵官員盛京官員並老疾休致候補官員咸朝服於大清門兩旁分翼齊集設騎駕鹵簿於大清門前聖祖仁皇帝御門升座作樂賜燕頒賞畢各官均行三跪九叩禮次頒賞守陵官軍盛京官軍及老疾辭退官軍等畢聖駕還行宫遣王暨內大臣前詣永陵致祭如儀其祭福陵昭陵時諸妃園寢亦照常致祭頴親王克勤郡王功臣直義公費英東𢎞毅公額宜都武勳王揚古利忠義公圖爾格墓各遣大臣祭酒聖祖仁皇帝回鑾時率王以下各官恭詣福陵昭陵行告辭禮是日不啓正門聖祖仁皇帝進旁門下馬諸王於旁門外下馬各官於紅柱前下馬聖駕回鑾設儀仗作樂經過地方官咸朝服跪迎聖祖仁皇帝往返均詣孝陵祭酒行禮至京日恭詣太廟行祗告禮畢還宫午門鳴鐘不隨從王以下文武各官咸朝服於午門外跪迎候聖駕還宫各退次日王以下文武各官進表慶賀十五年題準每月朔望皇陵奉祀官㸃香燭行三跪九叩禮萬壽聖節行禮同又議準孝陵祭品內不用豕陵寢供獻酌定用五十盤個六十五盤凡每年清明孟秋望冬至嵗暮陵寢各遣官一人陳太牢俎豆上香奠帛獻爵讀文致祭遣官由宗人府具題三月十八日萬壽聖節及十月朔陵寢獻酒果不讀祝奠帛遣守陵官上香行禮各陵寢忌辰行禮同以上由太常寺具題每月朔望陵寢各獻羊一果實十二盤守陵官上香行禮十五年定忌辰祭陵均令奉祀官行三跪九叩禮十七年奉㫖孝陵應用黃蠟改用白蠟二十年營建陵寢告成自沙河鞏華城殯宮奉移孝誠仁皇后梓宮孝昭仁皇后梓宮於三月初八日同安葬寶城地宮稱皇后陵寢設守陵官員兵丁內府各執事男婦及牛羊吏置莊園凡四時大饗及朔望奠獻行禮皆與孝陵同是年建妃園寢設守衛官兵內府執事人等二十一年聖祖仁皇帝躬詣永陵福陵昭陵致祭凡隨從王以下文武各官及官軍均由各該衙門具題恭候欽命隨往聖駕啓行前一日祗告奉先殿往返經由州縣守土官迎送至盛京守陵官員暨盛京官員恭迎均如儀至日恭謁福陵昭陵並諏日行大饗禮次日行焚楮帛讀文致祭禮儀均與康熙十年同壽康太妃宸妃懿靖太貴妃園寢聖祖仁皇帝親詣祭酒康惠淑妃以下遣王等祭酒頴親王克勤郡王功臣費英東額宜都揚古利圗爾格墓遣大臣讀文致祭貝勒以下奉恩將軍以上一品官墓遣官祭酒東京莊親王篤義剛果貝勒墓亦遣大臣往奠祭饗福陵昭陵禮成聖祖仁皇帝恭詣興京展謁永陵親王以下一等侍衛三品官以上咸素服隨行禮聖祖仁皇帝由左門入至臺階下拜位行謁見禮其次日行大饗禮儀與福陵昭陵禮同永陵內武功郡王恪恭貝勒墓遣大臣於殿外兩旁設筵致祭禮成賞賚永陵居住官員兵丁各有差次詣黑龍江地方望祭長白山率諸王百官行禮禮成聖祖仁皇帝還盛京詣福陵昭陵祭酒回鑾往返均詣孝陵祭酒聖駕回京日午門鳴鐘不隨從王以下文武各官咸朝服於午門外跪迎是日祗告奉先殿其王以下文武各官表賀奉㫖停止二十六年聖祖仁皇帝恪遵孝莊文皇后遺命於遵化州昌瑞山孝陵之東南建造饗殿後殿於二十七年四月十九日安奉太皇太后梓宮於後殿稱暫安奉殿設奉祀禮部內務府郎中尚茶尚膳等官暨旗員兵丁執事男婦四時大饗及朔望奠獻行禮皆與孝陵同二十八年奉移孝懿仁皇后梓宮安葬於皇后陵寢寶城地宮三十六年諭暫安奉殿非繫山陵地方既近嗣後凡忌辰致祭著照四時大饗禮行欽此三十七年聖祖仁皇帝奉仁憲皇太后詣興京謁永陵自薩爾滸地方由琉璃河駐蹕福陵東謁福陵次謁昭陵翼日致祭福陵昭陵親臨勳臣揚古利費英東額宜都墓祭酒賜守陵官兵燕回鑾入山海關謁暫安奉殿謁孝陵次至仁孝皇后陵寢禮成奉仁憲皇太后還京師四十五年議準皇陵祭祀關繫重大嗣後守陵郎中員外凡遇出差必各留一人在署辦事四十八年奏準二月二十六日清明祭皇后陵寢是日值孝昭皇后忌辰例應致祭察從前並無二祭相值之日且忌辰無祭文今或將忌辰先行前一日致祭或二祭並於一日致祭具奏奉㫖著前期一日致祭五十七年奉移孝惠章皇后梓宮安葬於孝陵之東寶城地宮稱孝東陵並擇吉安葬諸妃及諸宮人於各墓設奉祀禮部工部內務府等官暨旗員兵丁執事男婦如制隆恩殿中寢室奉安孝惠章皇后神位左室奉安悼妃恭靖妃恪妃端順妃神位右室奉安貞妃淑惠妃寧慤妃神位均南嚮明樓上懸孝東陵牌匾嵗以忌辰清明孟秋望冬至嵗暮行大饗禮是日奉孝惠章皇后神位居中南嚮四妃神位居左西嚮三妃神位居右東嚮奠獻行禮皆與孝陵同諸妃奠獻咸用內監六十年聖祖仁皇帝以在位六十年躬祭孝陵分遣皇子祭告各陵盛京祖陵遣世宗憲皇帝率皇子皇孫詣盛京世宗憲皇帝祭福陵皇子祭昭陵皇孫祭永陵聖祖仁皇帝至東陵日躬詣暫安奉殿孝陵孝東陵展謁祭酒行禮如儀次日行大饗禮聖祖仁皇帝躬祭孝陵分遣皇子祭各陵一如時饗儀六十一年十二月諭朕念皇考陵寢如照定例止令總管關防守護朕心實屬不忍將朕諸弟內一人封以王爵兄弟之子內二人封以公爵永代朕身守護外以大學士一人尚書二人侍郎二人領侍衛內大臣一人內務府總管一人副都統二人散秩大臣二人乾清門侍衛四人御前侍衛四人侍衛四十人前往守護伊等有闕停補又定凡駐守官員等令大學士總理事務侍衛令領侍衛內大臣內務府人員及內監等令內務府總管各管理前郎中舊用關防繳部將關防內增入景陵字樣雍正元年議準皇陵一應守衛稽察等事宜各有專責分明各行管轄今馬蘭口副將既經遵㫖改為總兵官其所屬緑營官兵繫看守陵寢風水設立應停總管管轄嗣後仍照舊例守衛陵寢妃園寢大門三庫二處城門及收存册籍庫並每次祭杞服役等事仍令總管管轄外其風水內地看守四十二處堆撥並自分水嶺至鮎魚關寬天峪周圍巡察十八處堆撥等事令總兵官稽察如遇軍政之年所屬各員由該總兵官親身詳加考驗呈報兵部是年內閣交出御書景陵碑文二道明樓殿門牌匾三件奉㫖不用鉤摹即以此刋刻欽此遵㫖議準俟工部鐫刻完工交欽天監選擇吉日先期祗告聖祖仁皇帝几筵届期禮部堂官一人行禮恭懸牌匾是年六月遵聖祖仁皇帝遺㫖以敬敏皇貴妃從葬景陵寶城地宮九月初一日奉移聖祖仁皇帝梓宮安葬於昌瑞山景陵寶城地宮孝恭仁皇后同日祔葬又題準隆恩殿中一間寢室奉安聖祖仁皇帝神位居中孝誠仁皇后神位居左孝昭仁皇后神位居右孝懿仁皇后神位居左次孝恭仁皇后神位居右次奉安敬敏皇貴妃神位於右一間均南嚮明樓上懸景陵牌匾每年清明孟秋望冬至嵗暮行大饗禮是日恭請帝后神位南嚮敬敏皇貴妃神位東嚮奠獻行禮皆與孝陵禮同二年清明節世宗憲皇帝躬詣景陵至日恭謁暫安奉殿祭酒行禮如儀以次恭謁孝陵孝東陵畢恭謁景陵特降諭㫖凡屬聖祖仁皇帝諸皇子皇孫及當日親近大臣官員皆得進至明樓前行禮舉哀清明日行上土禮是日景陵內務府總管荷土禮部太常寺堂官二人恭導世宗憲皇帝至明樓親著黃布護履躬荷土擔親王二人前後奉筐由左旁磴道升至石柵闌世宗憲皇帝膝行至寶頂跪上土畢匍匐退行至明樓除護履禮部太常寺堂官恭導世宗憲皇帝詣隆恩殿行大饗禮成由隆恩殿東階降入陵寢門至寶城前舉哀畢回鑾三年十二月初十日恭奉孝莊文皇后梓宮安葬昭西陵寶城地宮是年建景陵聖德神功碑遣大學士工部欽天監堂官相度立碑方位奉㫖世祖章皇帝碑文字跡似小聖祖仁皇帝在位六十餘年功德隆盛文章字數甚多一碑不能盡載建立二碑一刻清文一刻漢文其碑若比世祖章皇帝碑亭寬展恐有未安即或加寬必不可加高爾等詳議務期合宜欽此遵㫖議準照依孝陵碑亭式樣建立二碑詳加相度方位繪圗進呈御覽鐫刻告成擇吉建立四年諭皇考聖祖仁皇帝三年大禮已滿朕追念罔極深恩欲於皇考忌辰每嵗遵照三年內祭禮舉行朕終身永慕豈三年祭禮所能限況億萬臣民感戴皇考深仁厚澤自古帝王罕能比並一切禮儀亦非定制所得拘也朕舉行此禮自展思慕誠切之衷至與舊制合否皆不遑計此禮亦惟朕躬特行於我皇考後世子孫不必奉為成例應行禮儀該部議奏欽此遵㫖議準每年聖祖仁皇帝忌辰照周年祭祀例其內務府禮部工部太常寺光祿寺及有執事各該衙門先期奏請遣堂官前往届期於在京王公大臣內或陵寢王公大臣內恭候欽命一人主祭在京王公各官三分之一遣往陪祭永遠遵行八年奏準十一月十三日恭遇聖祖仁皇帝忌辰適逢冬至請於十一日照周年禮致祭十三年十月諭據禮部以十一月十三日恭遇皇祖聖祖仁皇帝忌辰或照陵寢忌辰祭祀禮致祭或照四時大饗禮致祭之處具奏朕思皇考誠孝純篤哀慕無窮三年之後每遇聖祖仁皇帝忌辰於景陵祭祀之禮特加隆備並降諭㫖謂此禮惟朕躬特行之於皇考後世子孫不得奉為成例但朕仰體皇考孝思於皇祖聖祖仁皇帝忌辰祭祀之禮意欲仍照舊例舉行至於率親率祖理本同原孝饗明禋不容或異嗣後恭遇列祖列后忌辰應否遵照致祭景陵之禮一體舉行以展報本追遠之意王大臣㑹同禮部定議具奏欽此遵㫖議準饗祀固在備物而典禮尤貴酌中謹按各陵寢四時大祭牲用太牢獻帛爵讀祝文致祭於隆恩殿具朝服行禮從前聖祖仁皇帝於孝莊文皇后忌辰此禮行之最久原與各陵忌辰祭祀之禮不同至遇聖祖仁皇帝忌辰致祭景陵乃奉大行皇帝諭㫖於定例外仍照周年禮致祭是以又有不得奉為成例之㫖謹詳酌典禮今十一月十三日聖祖仁皇帝忌辰應照陵寢四時大祭用太牢獻帛爵讀祝文遣官承祭其承祭官暨執事官照例具朝服行禮陪祀大臣官員停其由京遣往在陵官員咸令陪祀祝文交翰林院撰擬進呈永遠遵行嗣後恭遇列祖列后忌辰皆照陵寢四時大饗禮舉行乾隆元年奏準列祖列后忌辰定為大祭增設莊頭二名共給地二十一頃增設園頭一名給地二頃八十八畝是年封太平峪為永寧山從祀方澤是年奏準特遣宗室將軍六人往駐盛京給以田廬永遠承祭三陵又奏準景陵妃園寢饗殿前增設抱厦大門外兩廂各增二間又奏準奉祀泰陵禮部設於易州之北隔以易水恐夏秋水盛有礙祭典請以祝版房並應用乳牛圈移建於夏莊之左二年奉世宗憲皇帝梓宮安葬於易州永寧山泰陵寶城地宮孝敬憲皇后同日合葬敦肅皇貴妃從葬御書明樓殿門牌匾暨碑文二道均由工部鐫刻彩飾鐫成之日先期祭告擇吉恭懸又題準隆恩殿中寢室奉安世宗憲皇帝神位居左孝敬憲皇后神位居右奉安敦肅皇貴妃神位於右一間均南嚮明樓上懸泰陵牌匾每年忌辰清明孟秋望冬至嵗暮行大饗禮是日恭請世宗憲皇帝孝敬憲皇后神位南嚮敦肅皇貴妃神位東嚮奠獻行禮皆與景陵禮同又定守陵人員貝勒二人公一人大臣官員十人侍衛十人皆奉㫖除往其奉祀禮部工部內府官暨守衛官兵內監執事男婦人役莊園均照景陵例設立並鑄給關防又奏準昭西陵孝陵孝東陵景陵相距甚近所設郎中等官無庸各立關防應將各舊關防繳部别鑄給孝陵奉祀禮部關防將各部院郎中暨陵寢見在郎中選擬正陪引見恭候欽命一人掌管關防凡一切陵寢事務令其㑹同各官辦理以馬蘭峪禮部衙門為辦事公所照各部院章程設立經承二名每事立稿存案以期典禮畫一再各陵寢贊禮讀祝等官禮儀殊不􅌻練應令掌關防郎中於祭祀閒暇時令其輪班來京赴太常寺演習俟一年後演習已􅌻停其來京每逢三六九日時加演習庶進退聲韻不至生疏再每年令太常寺堂官或於清明或於孟秋望前往陵寢察看如有錯誤即將該員參處又奏準遣大學士工部堂官各一人建立泰陵聖德神功碑又奏準凡恭遇皇帝親詣行禮典儀官贊執事官各共乃職贊引官贊就位至遣官行禮則典儀官贊排班就位未免參差應將贊排班就位贊進停止一如祭祀之儀行其元旦萬夀聖節十月朔及忌辰之祭贊執事官各共乃職並三獻爵均以贊引官一人兼贊與各祭不同應增設典儀官一人以昭畫一又每月朔望向皆陵寢掌關防官承祭獻茶畢上香退至丹陛嚮上立俟三獻畢行三跪九叩禮退不贊亦無導引官今各陵寢貝勒公王大臣輪流行禮恐儀節不齊應增贊禮郎二人導引仍不贊又奏準清明山陵增土因沿前明舊制俱負土十三擔往來二十餘次似覺煩數且十三擔並無取義恭擬每年清明於各陵皆增土一擔由西磴道升至石柵并為一筐但令承祭官一人敬謹奉筐而升祗跪上土於寶頂仍由西磴道降庶踐履不致多人而保護鞏固之意益昭誠敬又議準泰陵牛羊圈亦請移於夏莊是年諭朕自幼齡仰䝉皇祖慈愛撫育宮中又命太妃皇貴妃太妃貴妃提攜看視兩太妃仰體皇祖聖心恩勤備極周至朕心感念不忘意欲為兩太妃千秋之後别建園寢令王大臣稽察舊例王大臣奏稱古有别建園寢之例今若舉行於典禮允協朕奏聞皇太后欽奉懿㫖允行可傳諭該部於景陵附近之處敬謹相度擇地營造其規制稍加展拓以昭朕敬禮之意欽此又奉㫖妃園寢朔望㸃香燭著內府官行禮又景陵妃園寢饗殿兩次間增造寢室牀龕並定諸妃神位次序奉安溫僖貴妃神位於中龕內居左慧妃神位居右惠妃神位次左宜妃神位次右奉安榮妃神位於西龕內居首次平妃神位次良妃神位次宣妃神位四時大祭祝文內以次書三年駕詣泰陵展謁行禮扈蹕王等至東旁山側紅柱下馬貝勒以下去山稍遠下馬駕至東廂南降輿禮部堂官恭導進隆恩門左門隆恩殿東旁入陵寢門左門至明樓前行禮祭酒舉哀如儀禮畢恭導由陵寢左門出至東廂南乘輿還行宮次日清明躬詣泰陵親行上土禮畢於隆恩殿行大饗禮是年躬詣泰陵行禮儀與清明前一日展謁禮同是日皇太后率皇后謁泰陵皇太后乘輿由隆恩門入至隆恩殿臺階東南隅降輿皇后乘輿由隆恩門入至燎爐旁降輿扈從婦女於石橋旁下車隨入陵寢女官前導皇太后皇后由隆恩殿東旁進陵寢門左門至明樓前行六肅三跪三拜禮興退立東旁女官進奠几於正中皇太后詣正中跪三祭酒每祭行一拜禮皇后隨行禮畢皇太后皇后西嚮舉哀禮畢女官恭導至降輿處乘輿還行營次日於方城明樓前設黃幄行三周致祭禮皇帝親詣祭酒行禮如儀詳見周年禮是年議準端慧皇太子吉兆應稱園寢饗殿五間及兩廡大門均覆緑瓦其塋地請委官於黃花山湯泉一帶地方敬謹相度五年奏準恭進各陵寢祝版由奉祀禮部敬謹送往止設前引官二人應照在京恭進祝版例用前引十人一例增設若本陵寢贊禮郎筆帖式不敷即於各陵官員補足以昭畫一六年奏準恭按永陵福陵昭陵四時大饗福陵昭陵忌辰祭饗均由盛京禮部於往駐盛京宗室將軍六人內按名擬定正陪咨送太常寺具題欽命承祭行禮永陵每月朔望令掌關防官上香行禮福陵昭陵每月朔望由禮部輪委宗室將軍二人行禮如欽命後遇有事故無應補宗室將軍請於奉天將軍副都統侍郎內酌補行禮將職名送太常寺奏聞其小祭酌補行禮大臣照常注册是年奉移成妃金棺於景陵妃園寢安葬奉安神位於饗殿東龕內居首七年議準奉移端慧皇太子金棺於朱華山園寢設內副管領一人執事人二十戶尚茶尚膳八人各行人役六名八旗防禦八人內以一人委署翼領驍騎四十名領催內以一人委署驍騎校四時致祭照妃園寢例設讀祝官二人贊禮郎三人每祭令各陵奉祀禮部郎中或員外郎一人輪流前往監禮八年奉移慤惠皇貴妃金棺於景陵之東稱景陵皇貴妃園寢設內府員外郎一人禮部讀祝官二人贊禮郎三人看守驍騎校一人驍騎四十人尚茶三人尚膳四人執事人十有五戶均歸入景陵一例當差增設防禦四人同妃園寢防禦八人共十有二人增設內監四人皆於兩處輪流行走四時大祭及朔望之祭禮儀皆與妃園寢同又議準盛京三陵一例增設爵墊以備禮儀殿內應用白蠟祝案應設羊角鐙一以昭畫一又奏準三陵殿內陳設爐瓶五供及香合朝鐙應一式製造祭祀所用帷幕改用黃假以肅觀瞻又覆準皇帝躬祭永陵殿宇雖覺稍狹惟奠帛爵宜照康熙三十七年之例停止拜褥亦照例鋪設殿外其降神之初應請皇帝躬親上香以展誠孝以達馨聞再按舊例祭昭陵因帛案前隙地狹窄原有跪獻帛畢擇隙地行三拜之例似與典禮未協恭按各陵隆恩殿大祀禮儀原與太廟禮同㑹典開載躬饗太廟均繫獻帛官跪獻帛三叩獻爵官立獻畢各退是太廟帛爵並未載有親獻禮儀此次躬謁祖陵請遵照太廟親祭典禮並請載入儀注於祭祀前期進呈是年八月車駕躬謁盛京祖陵先期各衙門奏除扈從王公大臣官員先期一日親詣奉先殿祗告啓駕日陳騎駕鹵簿午門鳴鐘在京不隨從王以下文武各官咸常服於午門外跪送扈從王以下文武官皆隨行車駕經過沿塗文武官各常服於道右跪迎如儀駕至興京盛京文武官咸朝服至前塗跪迎朝鮮國王遣使臣表請起居躬謁永陵儀與康熙二十一年禮同次日行大饗禮如儀禮成賞守陵官員兵丁等有差是日永陵內附葬之武功郡王恪恭貝勒墓各遣官致祭附近之覺羅等祖塋皆遣官往奠駕至盛京恭謁福陵儀與康熙十年禮同次日行大饗禮成即往謁昭陵儀與謁福陵同是日駐蹕行宮次日行大饗禮如儀其福陵昭陵之壽康太妃宸妃懿靖太貴妃康惠淑妃並公主園寢各遣官致祭是年奉皇太后謁陵儀與康熙三十七年禮同躬謁祖陵禮成擇日親臨功臣之墓奉㫖朕親奠克勤郡王等園寢據禮部援引皇祖聖祖親奠功臣墳墓之例隨駕之皇子王等皆隨行禮此次隨駕之皇子王貝勒等應隨行禮具奏朕已降㫖依議竊思從前隨駕之皇子王等皆繫皇祖子孫是以均隨行禮此次隨行之王貝勒內有朕之叔輩或朕之兄弟輩非從前隨駕之皇子王等可比每祭酒時亦隨行禮似屬未便朕親臨祭酒功臣即為榮寵之至克勤王園寢王貝勒等仍隨往功臣揚古利等墳墓不必隨往此後朕之子孫若隨來朕降㫖遵行再䝉古王額駙王大臣墳墓皆不必隨往著令禮部記載欽此是日親臨克勤郡王功臣揚古利費英東額宜都之墓各祭酒三爵乂親王貝勒以及大臣等墓以次遣官往奠翼日禮部奏請遣官望祭長白山北鎮醫巫閭山及遼太祖陵禮成回鑾沿塗官員咸朝服跪候迎送駕至京午門鳴鐘在京王以下各官咸朝服跪迎駕還宮羣臣遙跪恭迎皇太后還宮衆皆退次日皇帝親詣奉先殿祗告如前儀越二日禮部奏請行慶賀禮儀與三大節朝賀同又奏準嗣後太常寺堂官前往陵寢稽察贊禮讀祝等官請㑹同陵寢總理事務大臣一同稽察九年奉移順懿密妃金棺於景陵妃園寢安葬奉安神位於饗殿東龕內在成妃神位之次十七年奉移孝賢皇后梓宮奉安於昌瑞山勝水峪寶城地宮稱孝賢皇后陵寢慧賢皇貴妃哲憫皇貴妃同日安葬設奉祀禮部工部內務府郎中員外郎主事筆帖式等官暨守衛官兵執事男婦均如制一切工程事務歸并石門工部辦理其忌辰四時大饗及朔望祭儀均與各陵禮同是年設立孝賢皇后陵寢暨慧賢皇貴妃哲憫皇貴妃祭饗增給莊頭地七頃七十畝園頭地二頃一十五畝十九年奉移純裕勤妃金棺於景陵妃園寢安葬奉安神位於饗殿東龕內在順懿密妃神位之次是年駕詣盛京恭謁祖陵先至吉林親望祭長白山畢詣興京謁永陵次日行大饗禮賞守陵官員兵丁遣官致祭附葬之武功郡王恪恭貝勒墓暨附近之覺羅等祖塋駕至盛京先謁福陵次謁昭陵皆於次日行大饗禮賞守陵官員兵丁遣官致祭福陵昭陵之壽康太妃宸妃懿靖太貴妃康惠淑妃並公主園寢禮儀皆與八年同皇太后率皇后恭謁三陵行禮並如八年儀又遣官致祭克勤郡王功臣揚古利費英東額宜都墓親祭北鎮醫巫閭山遣官祭遼太祖陵禮成回鑾在京王以下各官咸朝服跪迎越二日禮部照八年之例奏請御太和殿行慶賀禮是年議準展謁祖陵之日皇帝素服行禮大祭日皇帝禮服陪祀及執事大臣官員咸朝服又奏準福陵昭陵恭請祝版應用前引官十人如禮部官不敷即移取將軍衙門武辨其四時大祭永陵啓運殿稍狹請將祝案設於檐下二十年平定準噶爾遣皇子王等祗告昭西陵孝陵孝東陵景陵泰陵並告祭孝賢皇后陵寢又遣皇子祗告永陵福陵昭陵祭儀皆與康熙六十年同二十二年奉移定妃金棺於景陵妃園寢安葬奉安神位於饗殿東龕內在純裕勤妃之次是年奉移淑嘉皇貴妃金棺於孝賢皇后陵寢安葬奉安神位於饗殿西龕內哲憫皇貴妃之次欽定大清㑹典則例卷八十
