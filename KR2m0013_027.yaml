body:
  text: 吏部考功淸吏司邊禁一邊禁康熙十二年題準外國之人私自進口該管地方官不行察報者降一級調用該管上司罰俸一年十四年議準土官地方失事止限年緝拏限滿不獲降一級留任如斬絞重犯脫逃亦限年緝拏限滿不獲應降一級二級三級調用者止降一級留任應降四級五級調用者止降二級留任應革職者止降四級留任如遇貪酷不法等罪所犯重大仍行革職如諱盜因公罣誤例應革職等罪者皆免革職亦降四級留任二十一年議準土司地方將逃人失察一名或被别土司拏解或逃出之人供在某土司處將該土司降一級若在伊該地方明知故行隱諱不行出首者照隱匿逃人例革職二十二年議準滇黔土司無論逃人逃兵有拏解六十名者準加一級如多獲者亦照此數遞加不及加級者令該督撫酌量奬賞三十年題準土官凡有欽部案件奏銷錢糧及遲誤表箋等項皆應照處分流官定例一例處分但土官不食俸祿如有罰俸降俸等事皆照其品級計俸罰米每俸銀一兩罰米一石移貯就近常平倉以備賑荒四十二年題準湖廣鎮筸紅苖既設同知通判分界管理苗務其五寨司土官土民應聽該廳管轄遇有逃盜等事照例將土官一並處分四十三年題準紅苗歸誠納糧特設土官管轄除苗人有犯輕罪者仍聽土官自行發落外若有犯殺死人命强盜虜掠人口搶奪財物及捉拏人口索銀勒贖等情責令土官將犯罪之苗拏解道廳治罪如土官將犯罪之人藏匿不即行解送者革職又題準紅苗捉人勒銀取贖者令土官將犯罪之苖解送道廳衙門審理治罪外其該管土官雖不知情但平日不嚴行約束有一起者將土知府知州罰俸三月有二起者罰俸半年有三起者罰俸一年若該管官知情不行禁止者皆革職不準折贖責四十板若繫教令或通同取利者革職不準折贖枷示三月又題準黔楚相接之苗每因小忿動輒撡戈殺虜彼此拏人其該管土官雖不知情但平日不嚴行約束以致彼此互相搆釁聚衆不及五十人者將土知府知州罰俸三月至五十人者罰俸半年至百人者罰俸一年百人以上者革職若繫知情不行禁止者革職不準折贖枷示一月責四十板若繫教令或通同商謀希圗均分財物者皆照首犯一例治罪四十七年覆準民人擅入苗地民苗結親往來該管各官失於覺察者降一級調用該管上司罰俸一年又議準各省地方遇有民苗爭訟事件該督撫嚴飭該管各官作速察審完結如地界兩省或有關提之人或有會勘之處兩省大吏務須和衷辦理不得互相推諉如不肖有司託故稽遲巧為推卸者該督撫指名題參照例分别議處若該督撫任其遲延推卸不行題參亦照例議處雍正二年諭四川陜西湖廣廣東廣西雲南貴州督撫提鎮朕聞各處土司鮮知法紀所屬土民每年科派較之有司徵收正課不啻倍蓰甚至取其馬牛奪其子女生殺任性土民受其魚肉敢怒而不敢言莫非朕之赤子天下共享樂利而土民獨使向隅朕心深為不忍然土司之敢於恣肆者大率皆漢姦為之指使或緣事犯法避罪藏身或積惡生姦倚勢橫行此輩粗知文義為之主文辦事教之為非無所不至誠可痛恨嗣後督撫提鎮宜嚴飭所屬土官愛惜土民毋得視為魚肉毋得濫行科派如申飭之後不改前非一有事犯土司參革從重究擬漢姦立置重典切勿姑容寬縱以副朕子惠元元遐邇一體之至意欽此三年覆準凡土官病故限六月內具題承襲其該督撫未經具題之先亦即令應襲之人照署事官例用印管事地方官如有抑勒沉閣留難者將該管上司皆照違限例議處其支庶子弟中有馴謹能辦事者許本土官詳報督撫具題請旨酌量給與職銜令其分管地方事務其所授職銜視本土官降二等如夲土官繫知府則所分者給與通判銜繫通判則所分者給與縣丞銜照土官承襲之例一例頒給敕印號紙其所分管地方視本土官多不過三分之一少則五分之一此後再有子孫可分者亦再許其詳報督撫具題請旨照例分管地方再降一等給與職銜印信號紙四年遵旨議定熟苖熟獞皆一例編排保甲不許容留面生可疑之人地方官有不實力奉行不能稽察盜賊或别經發覺將專管州縣官降二級調用兼轄官繫同城降一級調用不同城降一級留任統轄官降一級照舊辦事如上司揭報題參者免議至巖疆交界地方兩地文武互相稽察使匪類不能潛聚毋得彼此推諉倘保甲鄉勇人等有疏縱姦徒怠玩巡緝及互相隱匿等弊地方官未經察出該督撫題參照例議處七年議準無土官管轄之生苖為盜地方各官照野賊苗蠻之例議處野賊苗蠻例載中樞政考其有土官管轄之熟苖為盜劫殺虜掠男女財物該土司明知故縱者革職養盜殃民者革職提問如實繫失察致苖蠻侵犯城池及聚一二百人或六七十人城內為盜村莊道路行劫此等大夥盜賊將該管土官亦革職該地方官不實力緝拏互相隱諱將該地方官並該管各上司照民人為大夥盜賊例議處大夥盜賊例載中樞政考其苗蠻聚集人數無多平常盜案責該土官限一年緝拏限滿不獲降一級留任俟獲盜之日開復該地方官初參停升限一年緝拏限滿不獲罰俸一年照案緝拏至鄰近苖蠻地方民人被盜未經獲賊之先將該管各官停升俟獲盜之日訊明來去踪跡如盜起自內地以文職為專管官降二級調用以武職為兼管官同城者降一級調用不同城者降一級留任統轄官降一級照舊管事上司官已經報明參奏免其議處若盜自外來武職照專管官治罪文職照兼管官治罪其土官中有能嚴行鈐束擒勦賊盜一應案件於一年內全結者該督撫具奏加一級一年完結過半該督撫酌量奬賞又議準凡姦民出入苗地把守軍兵失於覺察及知而故縱皆照律治罪外其商賈人等已經驗明如兵役藉端抑勒索詐者兵役治罪該地方各官一並題參照失察衙役犯贓例議處又議準私通土苗及容留外省流棍者失察各官照民人擅入苖地例議處又議準辦理土苖事件除不關緊要者照常行文外其緊要事務有應行申報之處及各上司有應行批飭之事均由內署寫就鈐印釘封飭發仍於各內署按年月日期造具印册密行掛號存案其文武平行衙門緊要文移亦照此例均不得經書吏之手如仍令書吏鈔寫以致泄漏事發之日將夲官照泄漏密封例分别議處又議準凡土苖夷猓有犯命盜搶奪爭訟等案如該犯住居土官所轄地方該土官經州縣移會徇庇不行拏解該州縣即揭報督撫題參將該土官革職擇伊子弟之賢者承襲如果案犯在逃照內地承緝之例六月限滿不獲將該土官承緝不力職名咨參限一年緝拏限滿無獲將該土官降一級留任俟緝獲本案凶苗或能拏獲别案凶苗準其開復若應議降級留任計至五案將該管土司革職擇伊子弟之賢者承襲如該犯居隔省隔邑均以文到之日為始限四月務行拏解限滿不解如繫庇匿即將庇匿之員指名題參照徇庇例議處若果繫犯逃無獲照承緝凶犯例六月限滿初參住俸勒限一年緝拏年限滿日復參降一級留任計至五案亦行革職又議準土苗夷猓命盜等案無論案之大小皆照內地所定事件限期審結承審案件以獲犯到官之日為始盜案限十月命案竊案限六月雜案限四月限滿不結照例咨參接扣限期完結如仍不審結該督撫題參照易結不結例議處至苖夷有犯軍流徒罪折枷責之案仍從外結即鈔招咨送刑部察核其罪應論死並情關重大者一槩不準外結亦不準牛馬銀抵償務按律定擬題結如有不肖之員或隱匿不報或改揑情節在外完結者事發之日將該員照溺職例革職其失察之該管各官一並議處八年覆準改土歸流之土司家口應令各該督撫據實確核其妻妾子女與應遷之父母兄弟照例遷徙外如該犯止有妻妾並子嗣及子嗣幼小又無應遷之父母兄弟即將伊妻妾幼子免其遷徙安插於本省省城令地方官稽察管束勿許生事至犯軍流罪改土歸流之土司家口無論有子無子照例隨同本犯遷徙外如夲犯未遷之先身故及子嗣幼小者亦將伊妻妾幼子免其遷徙安插省城令地方官稽察管束勿許生事該督撫即將應行遷徙與應留本省情由於疏內聲明取具地方官印甘各結報部察核如該地方官有揑報並無子嗣及子嗣幼小别無應遷之父母兄弟等弊將揑報之該管地方官照軍流人犯無年老父母稱有有以次成丁稱無之例降二級調用轉詳之上司罰俸一年具題之督撫罰俸六月又議準土司並家口遷於遠近省安插者飭令該地方官不時稽察毋許生事擾民出境如疏縱土司本犯將該地方官照軍流罪犯取保脫逃例議處如疏縱土司家口照疏脫遞回原籍人犯例議處又覆準凡凶手盜首逃匿土司地方不拘本省鄰省該土司能解拏五名以上者紀録一次十名至十四名紀録二次十五名者加職一級三十名者加職二級如一年不敷議敘之數準並次年接算議敘不準三年合算又覆準土司隱匿凶犯逃人不行拏解俟獲犯之日訊明如繫土司受賄將土司革職提問不準親子承襲擇本支伯叔兄弟子姪取具宗圖並夷衆信服印甘各結題請承襲如繫隱匿不報革職審無受賄情弊仍照定例承襲十二年議準新定苗疆地方塘汛兵丁擅役苗民需索强買等情及各衙門差役經由苗寨擅動苗夫科斂索詐該管文貟如有故縱者革職提問不行察出之該管知府降二級調用兼轄之司道降二級留任督撫降一級留任如兵役滋事擾纍事發不行申報復希圖掩飾曲為徇隱者將該員革職不行察出之該管知府降一級調用兼轄之司道降一級留任督撫罰俸一年如並不知情止於失察者將該員降一級調用不行察出之該管知府降一級留任兼轄之司道罰俸一年督撫罰俸六月十三年覆準土司省分其土官土人如有差委公務並緝拏逃盜等事應遠赴外省者許呈明該管官轉報本省督撫請領咨文牌照知會所往省分外省督撫於伊事竣日計程勒限毋許逗遛仍給與咨文執照知會本省督撫倘土官土人不請咨文執照私赴外省者將土官革職土人治罪不行管束之夲省該管文武各官降一級調用失於察報之外省地方官罰俸一年如土官土人有潛往外省生事為匪别經發覺者土官革職土人治罪不行管束之該管文武各官降二級調用失於察報之外省地方官降一級調用又覆準貴州雲南四川等省棍徒勾串頑苗捆掠人口輾轉販賣令地方文武巡緝各官年終分别勸懲如一年之內有能拏獲興販棍徒並頑苗十五名者紀録一次拏獲三十名者紀録二次拏獲四十五十名者紀録三次拏獲六十名者加一級再有多獲者照數遞加紀録至一百二十名者加二級若拏獲一百二十名以上者以應升之官即用若一年之內不能拏獲為别處拏獲者每五名罰俸一年十名罰俸二年十五名者降一級調用二十名者降二級調用滿五十名者革職該管土司無降級之例滿三十名者革職其所獲興販棍徒頑苖必將被掠人口一並拏獲審實定擬報部方準照數紀奬如有以少報多者將原報官照謊奏請功例革職若該督撫及該司道等容其朦溷者照謊奏請功具題官例降二級留任如有買囑誣報妄拏良民陷害者照誣良為盜例分别議處乾隆二年議準臺灣地方如有民人不法等事許令武辨移送地方官究治如兵丁生事滋擾亦許文員關會營伍責懲如有彼此推諉者照推諉例罰俸一年並飭各該地方汛防員辨實力奉行彼此按月稽察取具並無兵丁滋擾印結轉報該上司察核如或有意徇縱將該地方官照徇庇例議處又議準臺灣漢民不得擅娶番婦違者土官通事照