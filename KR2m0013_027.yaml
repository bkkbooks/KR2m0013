反以外海作為內地或為隱匿或擅給印票往來偵探通商漂海皆革職提問其轉詳並未經察出之道府各降三級調用總督降二級留任巡撫降一級留任其出界曬鹽者亦照出界例處分又題準海賊殺劫村莊民人地方文職州縣官與同城知府等官各罰俸一年該管同城道官罰俸六月照案緝拏十二年題準在洋行走之船經過地方各官並買貨物之地方各官知船經過縱其行走者革職不知者免議又議準官員奉遷沿海居民將不應遷之民妄遷應遷之民不遷者革職如未遷民之先不報上司或安插遷民稱地窄田稀無可撥給者各罰俸一年十五年議準姦商於逆賊接壤處所將硫黃熖硝等物販賣與賊不論官兵民人皆拏問治罪妻子家口入官該管官知情故縱者以同謀論亦拏問治罪其不知情者州縣官革職提問府道各降五級調用總督巡撫降三級留任將鹽布等物販賣與賊者販賣之人及知情故縱之該管官皆照販賣硝黃例治罪其不知情者州縣官革職府道各降三級調用總督巡撫降一級留任若將由夲汛販賣之人盤獲其該管文武各官皆免罪拏獲之官議敘十名以上者紀録一次二十名以上紀録二次三十名以上紀録三次四十名以上紀録四次五十名以上加一級百名以上者加二級若不繫本汛地方於别汛盤獲販賣之人十名以下者紀録一次十名以上者加一級二十名以上加二級三十名以上加三級四十名以上加四級五十名以上者不論俸滿先行升用百名以上者越升一級即用至於盤獲一人審時供出夥黨繫由捉獲犯人審出該管官免治罪倘若誣拏良民將誣拏之人照律反坐又議準違禁將熖硝硫黃軍器等物私載在船出洋貿易者仍照例處分防守地方該管官員通同知情縱放者亦照律治罪如不知情者專汛官革職兼轄官降四級調用統轄官降二級留任督撫降一級留任二十三年題準山東江南浙江廣東各海口除夾帶違禁貨物仍照例治罪外商民人等有欲出洋貿易者呈明地方官登記姓名取具保結給發執照將船身烙號刋名令守口官辨察驗準其出入貿易三十三年議準內地商人往外國貿易原坐去船損壞更換船來者到關時禀明地方官並海關監督驗看相符準其進關如坐去船不曾損壞竟造船帶來或暗帶外國之人偷買違禁之物者海關監督並防守海口地方官不行察出皆降一級調用四十二年覆準出洋漁船止許用單桅梁頭不得過一丈舵水人等不得過二十名取魚不得越出夲省境界未造船時先行具呈州縣該州縣詢供確實取具澳甲戶族里長鄰右當堂畫押保結方許成造造完報縣驗明印烙字號姓名然後給照其照內仍將船户舵水年貌籍貫開列以便汛口地方官辨察驗如有違例將給照之州縣降二級調用加級紀録不準抵銷船户舵水人等如有越數多帶或詭名頂替者汛口文武官員盤察不實亦降二級調用內有夾帶熖硝硫黃釘鐵樟板等物接濟姦匪者其取結之州縣官汛口盤察之文武官辨皆革職如繫賣放者革職杖一百流二千里其內港取魚五六人之小船不在此例又覆準商賈船許用雙桅其梁頭不得過一丈八尺舵水人等不得過二十八名其一丈六七尺梁頭者不得過二十四名一丈四五尺梁頭者不得過十六名一丈二三尺梁頭者不得過十四名於未造船時亦具呈該州縣取供嚴察確繫殷實良民親身出洋船户取具澳甲里族各長並鄰右當堂畫押保結然後準其成造造完該州縣親驗烙號刋名然後給照照內將在船之人詳開年貌履歷籍貫以備汛口察驗其有梁頭過限並多帶人數詭名頂替以及汛口盤察不實賣放者罪名處分皆照漁船加一等惟夾帶違禁接濟物件其罪名處分與漁船一例其有謀利之富民自造商船租與他人及寒薄無賴之人租船者失察之州縣官罰俸一年明知造船受租而容其造者降二級調用又如隔縣别府外省之人欲造船者必於各該本縣呈明察實該縣具印結申詳督撫轉飭沿海造船之地方州縣成造仍照例察驗舵水槓椇刋烙號數姓名其違犯之罪名處分皆照商漁船一例遵行如有不遵例報官私自偷造者失察之州縣汛口各官降一級調用五十一年覆準內地往臺灣之人該縣給發照單如地方官濫給往臺灣照單經該督撫題參一次者罰俸六月二次者罰俸一年三次者降一級留任四次者降一級調用如有良民情願入臺籍居住者令臺灣府縣察明出具印文移付內地府縣知照該縣申報海道稽察仍令報明該督撫存案若臺灣府㕔縣官不行察明以致姦宄叢雜居住經該督撫察出題參照隱諱例議處又議準姦匪船隻出入海口若遇失事將守口官罰俸一年至盜從外洋竊發原非守口官所能越汛稽察遇有失事發覺咎在分巡委巡將守口官免議至外洋行劫之後散黨登岸溷冒入口守口官失於覺察者仍照定例罰俸一年其有盜由海口以內奪船偷越出洋遇有失事發覺即將失察守口各官皆照海洋失事初參例降一級留任本案內如有逸盜勒限一年緝拏全獲準其開復限滿不獲照所降之級調用若本案已無逸盜定以三年有能拏獲别汛姦船以及本汛並無失事者皆令該督撫察明具題到日亦一例準其開復五十三年覆準漁船出洋不許裝載米酒進口亦不許裝載貨物違者嚴加治罪其守口各官不行盤察者照失察姦船出入海口例罰俸一年五十五年覆準凡內洋失事專兼各官仍照內地盜案定例處分若果繫外洋被劫難定專汛兼轄應將文職免其處分倘繫內洋失事揑稱外洋後被事主告發或察出之日將專兼各官皆照諱盜例處分既經事主告發該管督撫若不察明據實揭報題參者照徇庇例議處五十九年覆準沿海各省出洋商船炮械軍器槩行禁止攜帶如地方官不嚴察禁止致商船仍行私帶者照失察鳥槍例罰俸一年雍正五年覆準山東民人往奉天貿易及奉天民人有過海者凡船出口入口該州縣給與印票將客人姓名貨物及賣貨地方同船戶水手姓名開載票內守口官驗明掛號放行其往奉天傭工人等該州縣察明姓名年貌籍貫給與印票方許航海俟到卸船地方守口官驗對印票年貌相符者準其入口回時該地方官於原領票內鈐印令其帶回本地方察核如貿易傭工人等並無印票或與票內年貌未符及兵役人等刁難勒索者守口官自行察出者免議如有疏縱等情降二級調用七年議準每年沿海各汛出巡之後督撫不時密加體訪倘遇洋面失事文武官辨如有恐嚇賄囑不行通報情弊該督撫訪實題參照諱盜例議處又議準拏獲偷渡過臺人犯問明從何處開船將失察水汛及本地文武各官照失察姦船出入海口例罰俸一年如文武衙門隱匿不報者或被告發或被上司察參將該管之兼專文武各官皆照諱盜例分别議處八年覆準如有將黃金販賣出洋者照鐵貨銅錢等物私出外境下海律治罪其督關守口官辨受賄故縱者與犯人同罪失於覺察者照律參處若官辨兵役藉端留難抑勒商民者察參議處分别治罪九年諭據廣東布政使奏稱鐵器一項所關綦重不許出境貨賣律有明禁乃粵東地方出産鐵鍋凡洋船貨買向未禁止臣到任後檢察案册見雍正七八九年造報夷船出口册內每船所買鐵鍋少者自一百連至二三百連不等多者買至五百連並有至千連者按鐵鍋一連大者二箇小者四五六箇每連約重二十斤不等百連約重二千餘斤如一船帶至五百連約重萬斤帶至千連約重二萬斤計算每年出洋之鐵為數甚多誠有關繫請嗣後此項鐵鍋應照廢鐵之例一例嚴禁毋論漢夷船槩不許貨賣出洋違者該商船户人等即照捆載廢鐵出洋之例治罪官役通同徇縱亦照徇縱廢鐵例議處凡遇洋船出口仍交與海關監督一例稽察至於商船每日煮食之鍋仍照舊置用官役不得藉端勒索滋擾如此則外洋之鐵不致日積日多於防姦杜弊之道似有裨益至煮食器具銅鍋沙鍋皆屬可用非必盡需鐵鍋亦無不便外夷之處於朝廷柔懷遠人之德意原無違礙等語尺鐵不許出洋例有明禁而廣東夷船每年收買鐵鍋甚多則與出洋之功令不符矣所奏甚是嗣後稽察禁止及官員處分商人船戶治罪之處悉照所請行倘地方官辨視為具文奉行不力經朕訪聞或别經發覺定行從重議處粵東既行察禁則他省洋船出口之處亦當一體遵行著該部通行曉諭永著為例欽此十二年覆準商人置貨販洋由本籍地方取結給照其中小本商民請照而往逮從外番貿易回至內地復欲奔回夲籍請照程塗稍逺勢所不及又有已在夲籍請照到廈其報配之船業至滿載欲搭别船因照違礙廢時守候於小商多有不便飭令廈防㕔察明此等情節即取具行户船主保結準其赴㕔請給印照前往該㕔將給照原由一面行知該地方官其請照各商仍俟回棹之日赴㕔銷單如該㕔有朦溷給照令該督撫嚴察題參將該㕔照盤察商船不實給照例降三級調用如該㕔胥役有勒索等弊亦令該督撫分别知情失察題參將該㕔照衙役犯贓例分别議處其該船舵水貨客回棹之日或有在番地因賑目不清及别項事故者仍照例取具同鄉鄰船客商水手等甘結報明廈防㕔移文該地方官存案下期回日報銷又覆準海洋重地非內地可比該汛地方文武官辨拏獲偷渡外番十名以上者專管官紀録一次兼轄官毋庸議敘二十名以上者專管官準其紀録二次兼轄官準其紀録一次三十名以上者專管官準其加一級兼轄官準其紀録二次四十名以上者專管官準其加二級兼轄官準其紀録三次五十名以上者專管官準其以應升之官即用兼轄官準其加一級倘不實力稽察以致疏縱十名以上者專管官罰俸一年兼轄官免議二十名以上者專管官降一級留任兼轄官罰俸六月三十名以上者專管官降二級留任兼轄官罰俸一年四十名以上者專管官降三級留任兼轄官降一級留任五十名以上者專管官降一級調用兼轄官降二級留任至官辨兵役如有隱徇賄縱該督撫分别嚴參治罪其各官辨有降級留任之案倘能别案拏獲按其拏獲名數抵銷如三年內並無過犯稽察嚴密本汛內果能肅清令該督撫提鎮察明保題準其開復若有偷渡人犯希冀開復揑飾諱隱一經發覺題參交部議處該督撫提鎮不行詳察溷行保題者亦交部議處十三年覆準東省豆船並無印票裝運出口及有匿票私賣與原票不符一經察出根究明確販豆人等按律分别治罪該管官不行詳察致有偷漏私越情弊别經發覺照失察姦船出入海口例罰俸一年仍令該督撫不時稽察如有藉稱給票驗票名色勒索留難苦纍商民等情即行指名參處乾隆元年覆準各處汛口官嚴詰販米出海如有地棍姦牙將米穀偷運出口及在洋接濟姦匪者該管文武各官除通同受賄知情故縱仍照違禁貨物出口律治罪外如或巡察懈弛及偷越各處汛口後經别汛拏獲審明失察偷運米百石以上穀二百石以上者將各該官辨皆降一級留任米百石以下穀二百石以下罰俸一年米不及十石穀不及二十石者罰俸六月又議準船戶貪圖獲利在沿海地方私攬無照之人裝載偷渡過臺該地方文武官辨失於覺察者照失察姦船出入海口例議處如有意隱匿不報照諱盜例議處二年議準過臺商船舵水人等令原籍州縣官將各該舵水年貌鄉貫填明照中或因有事别雇就地給單填注取具船戶行保甘結汛口各官驗明放行臺地各官仿照內地設立十家牌填注實在籍貫人口確數並作何生理遇有事故一例開除每月出具並無招攬游民結狀報明所司察核如有違礙一經發覺將出結船戶人等照例治罪不行實力稽察之地方各官該督撫察明參送到日照失察偷渡例分别議處五年覆準沿海關汛所有文武官辨巡察掛號之處嚴行飭禁不許藉端需索故意留難如有此等情弊即行察參將守口官辨照衙役犯贓例分别議處如守口官辨藉端留難抑勒苦纍商民别經發覺將守口官辨照藉端抑勒例降二級調用該督撫提鎮失於覺察罰俸一年十三年覆準雜糧麥豆偷運出洋接濟姦匪者其文武官辨失察故縱處分皆照偷運米穀出洋定例處分十四年覆準商民出洋貨物一應銅器廢銅皆嚴行禁止不許攜帶各洋貨賣如將紅銅黃銅私販各洋貨賣其關汛文武官辨不行搜檢察拏知情故縱者皆照出洋漁船夾帶硝黃釘鐵等物汛口之文武官辨革職例革職如繫賣放者照例革職治罪若止於失察者降一級調用十九年覆準各省商漁船在洋除實繫搶奪並未劫盜者仍照搶奪辦理外如有盜劫之案溷以搶奪具報希圖規避處分者將揑報之文武各官照諱盜為竊例革職欽定大清㑹典則例卷二十四
