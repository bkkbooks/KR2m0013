又年限已滿不獲仍罰俸一年各帶所降之級緝拏拏獲私鹽之日皆準其開復失察三次者革職道府直隸州知州等官失察一次者降職一級失察二次者降職二級失察三次者降職三級皆留任戴罪緝拏一年限滿無獲罰俸六月各帶原降之級緝拏如又年限已滿不獲仍罰俸六月帶所降之級緝拏拏獲私鹽之日皆準其開復失察四次者降三級調用至上司因屬官失察帶所降之級緝拏自行拏獲者固應開復若原參案內所轄屬官降級之案因拏獲私鹽開復其本案之上司亦準其開復又議準小夥鹽徒拒捕殺傷兵丁不能擒獲者仍照例處分照失察小夥私鹽例分别議處全獲者免議拏獲一半者專兼統轄官免其處分餘賊限一年緝拏如一年內不獲將專管官罰俸一年兼轄官罰俸六月統轄官罰俸三月餘賊照案緝拏五十六年題準地方各官失察外省棍徒來境私販仍照定例按次處分有能拏獲私販千斤以上者將該管官核實題請紀録如有不肖官員貪圖紀録將貧難軍民肩挑背負易米度日之人及外省來貿易之平民濫作私販察拏私用非刑害人致死者將該員照誣良為盜例革職如未經致死者將該員降一級調用雍正二年議準私販鹽梟由他處入境巡役緝拏拒捕殺傷或當場人鹽並獲或於疏防限內拏獲過半以上者將事由據實呈報咨部免其疏防處分餘犯照案緝拏其有大夥興販隱諱不報及人鹽並獲輕為開脫者將專管官革職兼轄官降二級調用不知情者各照失察私鹽例處分六年議準鎮江閘口盤察私鹽責成江常鎮道督同鎮江府及海防同知就近分班輪流盤驗無論糧艘兵船大小差船均令親身察驗如有夾帶整包私鹽即行拏究照興販律治罪其一切水陸私販並嚴飭該管官分頭緝拏如有疏縱失察照例參究仍嚴禁官役毋得借拏私鹽名色故意抑勒商民需索進閘使費倘該道員不能實力整頓或有夾私而不能緝拏或有勒索而不能懲禁該督即行指參失察私鹽照失察例處分不能懲禁勒索照失察衙役犯贓例處分不能察禁屬官照約束不嚴例處分乾隆元年覆準姦徒搶奪鹽店及鬨鬧場竈等事地方文武官辨即行拏獲究出主使同夥如獲犯過半並獲首犯者仍參疏防照依盜案之例免其處分如獲犯不及一半或不獲首犯者照依盜案例參處限年緝拏限滿不獲亦照盜案例處分如平時漫無約束臨時不即擒拏有意姑息致長刁風者即將該管官辨題參照溺職例革職各犯交於接任官照案緝拏該管巡道府㕔直隸州知州等不行揭報一并察參如地方官辨整飭有方鹽引疏銷私販斂跡一年之內並無應參之案者準其紀録一次三年之內整飭有方鹽引疏銷私販斂跡並無應參之案準其加一級若有司希圖議叙隱匿不報或將大夥之案揑作偶然凑合巧為開脫者照失出例處分七年奏準衙役私行煎販該管官自行拏獲者免議或自行察出未經拏獲詳報通緝者皆照例革職降級留任限一年緝拏逾限不獲仍照例降革其兼轄之上司免議如旗人私鹽事發其主繫官罰俸兩月如本官自行拏獲者免議至官員行鹽無術以致商販不前或不遵行食鹽舊例借端不行鹽者皆罰俸一年或苦纍需索以致商販不前者降一級調用一修築鹽池康熙二十八年題準河東鹽池修築禁墻渠堰以防水患務期修築堅固如有鹽池牆堰不固倒決者該州縣官降一級戴罪督修工完之日該御史題請開復雍正六年奏準鹽池渠牆隄堰嵗修大修工程責令運同管理仍於附近州縣內擇其才幹誠實者遇修築之時委用五六人協助堅修令運同督責其成如有玩誤浮冒者將該管協助各官降一級戴罪督修工完之日鹽政題請開復一私茶雍正四年覆準茶商買茶應令産茶地方官給發船票開明該商引目茶數不得别給印票收茶其應行盤察之地方官悉照引目及正附茶驗放不許抑勒留難如於部引之外有搭行印票及附茶不依所定斤數多帶私茶者即行察拏照私鹽律治罪如察驗地方官故縱失察者照失察私鹽例處分又議準興販私茶潛住邊境與外國交易及在腹裏販賣與外國人及在西寧甘肅河州洮州四川雅州販賣者皆按律治罪其官員縱容子弟家人等興販知情故縱者降一級調用失於覺察者降一級留任不繫專司察緝官員失察子弟家人興販並無知情故縱情節者免議乾隆八年議準商人運茶例應領結引目所以分别官私以憑稽察無官引即屬私茶嗣後凡有商販到境務須嚴行稽察如無官引及茶引相離者即行究問照私鹽律治罪一失察私鹽私茶因公出境免議乾隆二年覆準私茶私鹽經過境內如有實繫因公出境之員即於核參案內據實確核將專管兼轄各官聲明到部準其免議如並非因公出境濫行詳請者降一級調用該管上司並未確核代請免議者罰俸一年關稅一關稅考核康熙八年題準徵收關稅官缺不及半分者降一級留任缺半分至一分以上者降一級調用缺二分以上者降二級調用缺三分以上者降三級調用缺四分以上者降四級調用缺五分以上者革職其溢額者亦不準加級紀録如有降調革職丁憂事故皆以離任之日為始作為分數考核至官員所收稅數不行親填令伊衙役代填或不給商人紅單者皆罰俸一年如將部頒稅册用伊印信填送或將商人親填簿紅單違例不按季送部者皆罰俸六月十一年題準關差各官差滿回京之日將敕書批文親繳部科回京日期違原限一月以內免其糾參違限一月以外照違限例處分十八年定各處關差如有將不應納稅之物額外橫徴差役四出踞津濫稅擾害商民者該督撫即行題參若不題參事發照不揭報劣員例處分又定官員給與旗下人用印出關執照往别省貿易者降一級調用二十五年議準海內採捕船如州縣官隱匿一船者罰俸六月隱匿五船至十船者罰俸一年至十五船者降一級留任至二十船者降一級調用至二十五船者降二級調用至三十船者降三級調用隱匿三十船以上者革職仍將所隱匿船計應徵稅銀照數賠補五十五年議準各省關差一年差滿闕缺錢糧照例處分外若以闕額題請展限并已展限而額稅仍闕者照溺職例革職所闕銀交該旗勒限著落家産追還其任滿回京於兩月內具呈考核如將收稅冊籍不行交納不具呈考核違例遲誤者將出差官員暫停升轉俟考核具題完日照常升用雍正元年題準凡出關之人令該管官吏嚴行盤察若無用印文票私出及有文票而數目浮多情節不符不行察拏令其出口者將看守關口之官辨降一級調用十年覆準附近關口之地方官將題定見行則例刋刷小本頒發各行户散賣俾商民人人共曉每本定價二分仍委官不時訪察如各關木榜有黏貼掩蓋及書役苛索等弊即行詳報上司察參至地方官刋發則例如有不詳晰校定以致遺漏錯誤或扶同徇隱不行嚴察者一并參處十三年覆準各省如有設爐開採之處一切採砂錘鍊人夫責令山主雇覔土著良民協同保鄰户首眼同填明實在人數並姓名年貌籍貫經管執事出具並無隱匿姦商匪類甘結報明該地方官詳報督撫存案不許招集外來人民致生事端倘厰內人夫或有更換增減亦如前登填報明仍飭令該管文武官辨及巡捕各官勤加稽察如巡察之官辨兵役人等有徇縱情弊該管文武官辨照漁船舵水人等有越數多帶及冒名頂替文武官辨盤察不實例降二級調用兵役人等按律治罪又覆準産鐵地方如有殷實良商販運他省售賣者令將所買斤數運銷地方呈眀該地方官轉詳該督撫給咨該商親自賫投轉飭産鐵地方官準照咨內採買發運於該商起程之時報眀地方官詳請咨明經由各關及往賣地方督撫察明將印照一例詳請咨銷仍嚴飭沿江沿海各州縣及口岸汛辨凡遇商船出口務須實力稽察如有違例夾帶即照本省商人夾帶例分别治罪其無照票私販關津不行察拏往賣地方不行詳報及各口汛辨疏縱需索照例參處其沿海地方並沿江沿河等處如有將鐵遞運私賣事發失察賣放之文武官辨皆照出洋漁船夾帶釘鐵例分别失察賣放議處乾隆十五年題準各關管稅務日期凡接任徵收者毋論兩任三任均令扣足一年為滿其管關一年零數月者將一年贏餘奏報零月歸於下屆統俟扣足一年再行彚奏以昭畫一其各任所徵贏餘較之成數均屬無虧及此任徵多能補彼任短少者皆毋庸議倘此任短少而彼任所餘之數不能扺補者止將短少之官議處如各任所徵銀數皆少者各照例議處如此分别辦理庶各關有所遵照皆知慎重再各關監督如前任所收稅課果繫實力稽徵盡收盡解飭令接任之官詳細確察出具並無揑飾印結送部其已經出結以後責成接任不得復將短少緣由推諉前任倘接任官察出前任果有徵多報少之侵蝕等弊即行據實參奏如扶同徇隱並不實力詳察或經部察出或别經發覺即將濫行具結之官一并交部議處一清察牙行康熙二十五年議準各處牙行領帖開張照五年編審例清察換照若有光棍頂冒朋充巧立名色霸開總行逼勒商人不許别投拖缺客本久占纍商者該地方官不時嚴行察拏照律治罪如地方官有意徇縱者降二級調用如有受財故縱者計贓以枉法論又議準牙行經紀除稅課內應立牙行者準設立外其姦宄之輩揑稱牙行於良民買賣濫行索詐者在外責成州縣官在京責成順天府尹通判大宛二縣五城兵馬司不時嚴行察拏照例治罪如該管地方官不行嚴拏仍留積年姦匪以致纍民將失於覺察之人罰俸一年有意徇縱者降二級調用受財故縱者計贓以枉法論雍正十二年議準各省牙帖悉由藩司鈐蓋印信頒發不許州縣濫給滋弊倘各省州縣仍有私行濫給牙帖者該督撫題參照地方官妄用印信例降一級調用十三年覆準民間開設鋪面聼民間便益不得私分地界不令旁人附近開張更不得以本身無力開設將地界議價若干然後允其承頂至酒坊賣酒應聼雇車載運毋許車户設立車牌開寫姓名認定一店不令别人攬運惟估衣行給有牙帖每年納有牙稅應聼其安分營生仍照五年編審例清察換帖毋許無籍之徒往來市上借名影射左右觀望覬覦分肥至於鋪行一切什物皆繫本商自置倘本身無力開設而所置什物復不許售與承頂之人則本錢不免虧折似屬未便除地界之外此項不在禁內又如無籍之徒違禁把持仍犯前項情弊者即將該犯照例治罪仍令地方該管各官嚴飭捕役人等不時稽察如番役人等不行察拏者按律治罪該管地方官奉行不力者照失於察參例罰俸一年有意徇縱者照徇情例降二級調用受財故縱者計贓從重以枉法論乾隆二年覆準大小衙門凡公私所需貨物務照市價公平交易不得充用牙行縱役私取即辦官差必須秉公提取毋許借端需索作踐良民如有不肖官役陽奉隂違或被地方告發或被上司察出參劾該管官如繫縱役私取將該管官照縱役犯贓例革職如繫失於覺察照失察衙役犯贓例分别議處乂覆準直隸山東河南山西陕西等處富商巨賈廣收小麥肆行屣麴大開燒鍋者嚴行禁止其失察之地方官每一案降一級留任失察至三案者降三級調用三年奏準民間製麴自用為數無多者仍免察禁外如有廣為收麥開坊屣麴牙行經紀車户船家代為交易運送關津隘口一例察拏隱漏出境者經過失察之地方每一案罰俸六月九年覆準地方官濫給牙帖該管上司失於覺察者將知府照失於覺察例罰俸一年十四年覆準失察製造紅麴紅糟船裝興販與失察屣麴事同一例所有失察之地方官比照失察屣麴之例察議一嚴禁苛索稅羡雍正十三年十月諭朕聞各省地方於關稅雜稅外更有落地稅之名凡耰鋤箕帚薪炭魚蝦蔬果之屬其價無幾必察明上稅方許交易且販自東市既已納課貨於西市又復重徵至於鄉村僻逺之地有司耳目所不及或差胥役徵收或令牙行總繳其交官者甚微不過飽姦民滑吏之私橐而細民已重受其擾矣著通行內外各省凡市集落地稅其在府州縣城內人煙湊集貿易衆多且官員易於稽察者照舊徵收但不許額外苛索亦不許重復徵收若在鄉鎮村落則全行禁革不許貪官汚吏假借名色巧取一文著該督撫將裁革禁約之處詳造細冊報部察核倘奉㫖之後仍有不實心奉行暗藏弊竇者朕必將有司從重治罪該督撫并加嚴譴此㫖可令各省刋刻頒布務令逺鄉僻壤之民共知之欽此又議準各省稅項及民閒置買産業不得苛索擾纍多收如有前項情弊該督撫指名題參將違禁多取之人革職治罪欽定大清㑹典則例卷十八
