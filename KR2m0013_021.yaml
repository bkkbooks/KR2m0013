body:
  text: 吏部考功清吏司錢法一私鑄私銷康熙十二年覆準官員將私鑄錢及私銷大小制錢之犯實心訪拏不論本管地方及别州縣拏獲一起者紀録一次二起者紀録二次三起者紀録三次四起者加一級二十四年議準家僕私鑄銅錢燬化制錢其主不知情繫官降二級留任若知情者革職賃房之主知情照為從治罪不知情繫官降一級留任其在城外所住或看守墳園家人私鑄燬化亦將其主處分若此等處看守家人將房賃與他人銷燬私鑄者將看守家人照伊賃房之主處分將其主免議在屯莊處屯領催知情照為從治罪不知情鞭一百將其主及其所管之人皆免議再私鑄銅錢其鄰右總甲十家長知情照為從治罪若不知情繫官降一級留任以上自行拏獲者皆免議三十六年議準私鑄錢及私銷制錢該地方官知情任其私鑄私銷者處斬家産入官不知情失於覺察者在內五城坊官在外州縣官一起降三級調用至二起者革職掌印兵馬司知府直隸州知州一起降二級二起降四級皆調用至三起者革職司道一起降一級二起降二級三起降三級皆調用至四起者革職五城御史直隸各省巡撫一起降一級二起降二級三起降三級皆留任四起降四級調用至五起者革職其不知情之地方官但能拏獲者不論年月逺近皆免其處分雍正四年議準文官拏獲者並免同城之武官處分武官拏獲者亦免同城之文官處分接壤州縣此縣拏獲彼縣亦免處分乾隆四年議準京師五城地方該管文職拏獲準免該管武職處分該管武職拏獲準免該管文職處分十八年議準察拏私鑄之案必以首犯及匠人為重如果能實心拏獲照例分别議敘外其或察拏之時僅獲為從之犯而首犯及匠人脫逃者不得濫請議敘仍令勒限嚴行緝拏如不實力緝拏將該管官照命案緝凶之例扣限參處其接緝官亦照命案接緝之例察議一行使廢錢康熙四年題準明季廢錢及本朝禁革舊錢攙扣使用者如該州縣官失於覺察一起降二級調用二起降四級調用三起革職如督撫不力行疏通錢法仍行使用舊廢之錢或被科道題參或被傍人首告一起督撫罰俸三月司道官罰俸六月知府直隸州知州罰俸一年二起督撫罰俸六月司道官罰俸一年知府直隸州知州降一級留任三起督撫罰俸一年司道官降一級知府直隸州知州降二級皆留任四十四年題準在內五城坊官在外州縣官如該管地方經紀鋪户有販賣攙和私錢行使不行察拏一起降三級調用至二起者革職掌印兵馬司知府直隸州知州每一起降二級留任至二起者降四級調用至三起者革職司道每一起降一級二起降二級皆留任三起者降三級調用至四起者革職五城御史直隸各省巡撫每一起罰俸一年至二起者降一級三起者降二級皆留任四起者降三級調用至五起者革職再知府下捕盜同知通判州縣下吏目典史照各掌印官例運使照司道例分司照知府例盬場大使照典史例以上議處官員有因公出境者免議至有船户夾帶私錢事發押船官員知情任其夾帶者革職不知情者照地方官失察例降三級調用又覆準有將大錢運往外省販賣自外省將小低錢運至京城販賣者通行嚴禁若經拏獲將錢入官販賣人照例治罪凡經過地方州縣衛所官辨皆照失察私鑄例降三級調用雍正十三年覆準剪邊錢不許攙和行使該地方官不嚴行收禁以致仍有剪邊錢行使者將奉行不力之該地方官失察一次者降職一級二次者降職二級三次者降職三級四次者降職四級皆準其戴罪限一年內拏獲私鑄一次者還職一級二次者還職二級三次者還職三級四次者還職四級失察五次者降一級調用如地方官並上司不行訪拏仍有剪邊燬化至十千以上者照失察私鑄例州縣吏目典史等官一起降三級調用至二起者革職知府直隸州知州同知通判等官一起降二級二起降四級皆調用至三起者革職司道一起降一級二起降二級三起降三級皆留任四起降四級調用至五起者革職如剪邊燬化不及十千者州縣吏目典史等官一起降二級二起降三級皆調用至三起者革職知府直隸州知州同知通判等官一起降一級二起降二級三起降三級皆調用至四起者革職司道一起降一級二起降二級三起降三級皆留任四起降四級調用至五起者革職巡撫一起罰俸一年二起降一級三起降二級四起降三級五起降四級皆調用至六起者革職如數止千文以下者州縣吏目等官降一級留任一辦解銅康熙十四年議準各省官員將採買銅項並未起解揑報起解者降二級調用雍正二年議準各省分辦銅報解初次逾限將承辦官革職留任委辦上司各官降二級留任許其展限四月戴罪承辦如仍不完將承辦官革任交部從重治罪别委能員接辦察有虧空著落家産追賠其委辦上司各官降二級調用並令分賠完結如參後六月內將銅買足解部交完者準豫開復乾隆二年議凖二參四月限內能完至三分之二者免其革任治罪再寬限四月照數辦足解部如限滿仍未完解即將承辦之員革任交刑部從重治罪别委能員接辦察有虧空著落賠補委辦上司照例降調分賠如參後六月內將銅買足解交亦準豫開復至該撫報解之後即知㑹沿塗官辨速催抵通如逾限不到將領解官革職戴罪管解委解上司各官降三級留任行令該地方確察是否揑報有無扶同具領中塗盜賣等弊據實按律究擬並將沿塗催趲官辨照催趲糧船不力例題參所缺銅著落本解官追賠委解上司各官分賠如參後三月內解部交完者亦準其開復四年奏準各省採買銅解部核驗如繫低潮按依成色令原解官減價報銷其核減銅色銀勒限一年全完限滿不完降俸二級戴罪完納年限內不完罰俸一年其所辦正項銅如繫參後全完者雖核減銅色銀未經完繳而議處之本案業已完結應準其照案開復至核減銅色銀如逾限無完仍照降俸罰俸例分别議處又奏準管理礦廠官員如有銅鐵等項爐户私運出廠不行察出者罰俸一年七年議準滇省解送京銅自滇省至水寧計程二十三站各運官自滇省起程限二十三日到永寧如沿塗逗遛至二十三日之外者照在京衙門行察事件承辦官遲延之例遲延一日至十日罰俸一月十日以上罰俸三月二十日以上罰俸六月三十日以上罰俸一年如果有中塗患病及阻滯等情令該員呈明該地方官出具印結於參案內聲明以憑免議十四年議準自永寧至漢口限四月漢口抵通限五月其漢口儀徵換船換簍之處漢口限四十日儀徵限二十日通計永寧抵通定限十有一月如逾限一月以上即行照例察參領解官革職戴罪管解委解各上司降三級留任如遇有守凍日期準沿塗地方官據實勘確呈報咨部仍照例扣除至守風守水日期定限已屬寬裕皆不準扣算再每運銅均有正協二人倘沿塗或有沉溺打撈需時及患病事故等事即令一人先運前行如有藉辭停留者亦不準其扣算其銅到處應令地方文武官辨按站交代催趲前進不許片刻停留多撥兵役巡察將出境入境日期即刻轉報督撫按日確察即行報部察核倘運官無故逗遛及有盜賣情弊該地方官辨漫不經心不實力催趲及徇隱不報者即照徇庇例降三級調用該督撫一并議處十五年覆準銅鉛到境該地方官即協同運官選擇身家殷實船户並熟練頭舵水手倘所雇之船有不諳路徑風色致有沉失銅鉛等事將原雇之地方官報部照官員解送匠役不將良工解送以不諳之人塞責者罰俸六月例罰俸六月如實繫風水驟發非人力所能防護該管官察明具結申報將原雇之地方官免其議處至沉溺銅鉛打撈一年限內運官如有升遷事故仍留在川打撈俟事竣之日分别赴任回籍至該管地方文武官辨遇有銅鉛沉溺照漕船失風之例處分外仍於一年限內停其升轉責令協同運官實力打撈限內能撈獲過半者免其察議或限滿無獲或撈不及半者將地方文武各官罰俸一年其沉溺之銅鉛運官打撈無獲一年限滿將該員題參革職限一年內賠足準其開復如逾限一年賠完免罪不準開復二年之內不能賠完照律治罪嚴追鹽法一鹽課奏銷順治八年覆準巡鹽御史鹽課缺不及一分者罰俸一年缺一分以上者降俸二級缺二分以上者降職一級缺三分以上者降職二級皆留任缺四分以上者降三級缺五分以上者降四級缺六分以上者降五級皆調用缺七分以上者革職康熙四年題準巡撫管理通省糧餉其鹽課考成缺一分者罰俸三月缺二分者罰俸六月缺三分者罰俸九月缺四分者罰俸一年缺五分者降俸一級缺六分者降俸二級缺七分者降職一級缺八分者降職二級缺九分者降職三級缺十分者降職四級皆令戴罪督催停其升轉運司提舉司分司大使等官繫專管鹽課之官缺不及一分者停其升轉罰俸六月缺一分者罰俸一年缺二分者降職一級缺三分者降職二級缺四分者降職三級缺五分者降職四級皆令戴罪督催缺六分以上者皆革職兼管鹽務之知縣知州知府布政使各道缺不及一分者停其升轉缺一分以上者降俸一級缺二分三分者降職一級缺四分五分者降職三級缺六分七分者降職四級皆令戴罪督催停其升轉完日開復缺八分以上者革職署運司提舉司分司大使等官缺不及一分者罰俸三月缺一分者罰俸六月缺二分者罰俸九月缺三分者罰俸一年缺四分五分者降一級調用缺六分七分者降二級調用缺八分以上者革職署印不及一月者免議署司道府州縣事兼理官員缺一分二分者罰俸三月缺三分四分者罰俸六月缺五分六分者罰俸九月缺七分八分者罰俸一年缺九分十分者降一級調用署印不及一月者免議又題準鹽課被參後州縣大使等官限一年全完其年限內不完不復作分數照原參分數處分州縣等官缺不及一分一年內不全完者降一級留任再限一年戴罪催完如再不完照依所降一級調用缺一分二分一年內不全完者降三級調用缺三分四分一年內不全完者降四級調用缺五分六分一年內不全完者降五級調用缺七分以上一年內不全完者革職運使提舉分司被參後限年半全完至運使提舉繫專管鹽課之官應照布政使地丁錢糧例處分分司大使照州縣官地丁錢糧例處分如年限鹽課繫原被參之官限內不完者不復作分數仍照原參分數題參如繫接徵接催官員以到任之日為始接徵州縣大使等官限一年接催布政使道府直隸州知州運使等官限年半接催巡撫限二年如不能完題參之日照見在未完分數以初參例處分兼管鹽法之布政使各道並知府直隸州知州被參後限一年半全完如缺不及一分年限內不全完者降職一級停其升轉缺一分二分年限內不全完者降三級調用缺三分四分年限內不全完者降四級調用缺五分六分年限內不全完者降五級調用缺七分以上年限內不全完者革職各省兼管鹽法之巡撫限二年全完如缺不及一分二年內不全完者停其升轉缺一分二分二年內不全完者降職一級缺三分四分二年內不全完者降職二級缺五分六分二年內不全完者降職三級缺七分八分二年內不全完者降職四級缺九分十分二年內不全完者降職五級皆令戴罪督催完日開復十二年題準銷引缺一分者停其升轉缺二分者降俸一級缺三分者降俸二級缺四分者降職一級缺五分者降職二級缺六分者降職三級缺七分者降職四級皆令戴罪督銷缺八分以上者革職其戴罪督銷者限一年銷完如限年內不完照徐淮等倉錢糧年限內未完例處分如行鹽地方各官有私派户口勒買