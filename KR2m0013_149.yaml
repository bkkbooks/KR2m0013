body:
  text: 都察院一憲綱天聰千年諭凡有政事背謬及貝勒大臣有驕肆慢上貪酷不法無禮妄行者許都察院直言無隱即所奏涉虛亦不坐罪倘知情䝉蔽以誤國論如盡心職業秉公矢行三年考滿定加升賞欽此崇德元年諭都察院各官皆朝廷諫諍之臣朕躬如有不親政務忠良失職姦邪得位有罪者録用有功者降謫等事爾等有所見聞即行規諫至於諸王貝勒大臣有曠廢職掌耽酒色好逸樂取民財物婦女或朝㑹輕慢冠服不具及以不適已意託病偷安不朝參入署者禮部稽察若禮部狥情容隱爾等察奏或六部斷事偏謬及事未審結誑奏已結者爾等亦稽察奏聞凡人在部控告未經審結又赴告於爾衙門者爾等公議應奏者奏不應奏者逐之至爾衙門有受賄之弊須互相防檢若以私讐誣劾定加爾等之罪其餘所奏是者即為允從非者亦不加罪並不令爾等與被劾之人質對欽此順治九年諭都察院為朝廷耳目之官上至諸王下至諸臣孰為忠勤與否及內外官員之勤惰政事之修廢皆令盡言如滿漢各官有賢有否督撫按各官有廉有貪鎮守駐防各官有捍禦勤慎者有擾害地方者皆令分别察奏其推舉銓用與黜革降罰及內外各衙門條陳章奏有從公起見者有專恣狥私者皆令眀白糾駮欽此十年諭朝廷設立言官原為繩愆糾謬事關朕躬尚許直言無隱况諸司過失理當糾舉其言果當宜虛心靜聽即言有未當正宜分晰事理聽候朕裁不許私嗔報復至言官論事亦須眀白確指不得托拾風影挾私妄訐欽此十一年諭凡言官務在知無不言言無不實庶使僉壬屏跡中外肅清若緘默苟容顛倒黑白狥私報怨眀知姦惡庇護黨類不肯糾參而誣陷良善驅除異已溷淆國是者定行重懲欽此又諭凡事關政治得失民生休戚大利大害應興應革切實可行者言官宜悉心條奏直言無隱如果能抒誠有裨政事朕自不靳懋賞欽此十二年諭凡事關朕躬何令不信何政有差諸王貝勒在事諸臣曠職之愆叢弊之處及內外各司何害未除何利未興言官各據見聞極言無隱一切唘迪朕躬匡弼國政者所言果是即與採用如有未當必不加罪毋得浮泛塞責欽此又題準言官糾參實指姦貪是其職掌若結黨挾私肆行陷害者反坐十三年諭科道為耳目之官職在察姦剔弊凡大姦大惡從未經人糾劾者果有見聞即據實直陳不許狥私黨比托拾塞責將人已糾參之事𠞰襲妄陳欽此十八年題準文武大臣果繫姦邪小人搆黨為非擅作威福紊亂朝政致令膏澤不宣災異迭見但有見聞不避權貴具疏彈劾內外各衙門大小官有不公不法等事皆得糾劾其糾舉之事須眀注年月指實陳奏若繫機密重事實封御前開拆並不許挾私苛求泛言塞責又題準官民果有寃枉許赴院辨眀除大事奏聞外小事立豫裁斷㦯行令該督撫覆審昭雪又題準言官題奏應密不密者罰俸六月康熙九年題準言官列款糾參貪婪官吏有一二事審實者免議若審問全虛及條陳事件隱􅍭譏刺㦯不據實回奏或參官員老病衰庸涉虛者皆降二級調用十五年議準言官條陳譏刺及回奏不實㦯凡事不據實陳奏或並無可據稱風聞具題者降一級調用三十一年諭國家設立言官職司耳目一切吏治民生得失利弊皆宜殫思極慮據實直陳近見滿漢科道官建白甚少殊非朕責望言路之意嗣後應各矢公忠研求時務凡有可以裨益國家之事悉據所見奏聞以俟採擇但不得懷挾私情紛更定例𠞰襲陳言浮泛塞責其有真知灼見應糾劾者即行參奏亦不得暗受囑託代人報復苛責細事希圖傾陷欽此三十六年諭國家設立都御史科道官以建白為專責所以逹下情而祛壅蔽職任至重使言官果能奉法秉公實心盡職則閭閻疾苦咸得上聞官吏貪邪皆可釐剔故廣開言路為圖治第一要務近時言官奏疏寥寥間有入告而深切時政從實直陳者甚少此豈委任言路之初指乎嗣後凡事關國計民生及吏治臧否但有確見即應指陳其所言可行與否裁酌自在朝廷雖言有不當言官亦不坐罪自皇子諸王及內外大小官有所為貪虐不法並交相比附傾軋黨援理應糾舉之事務必大破情面據實指參勿得畏怯貴要瞻狥容隱即朕躬有失亦宜進言朕決不加責其有懷挾偏私藉端傾陷者朕因言察情隱微自能洞悉凡屬言官尚各精白乃心力矢忠讜以無負朕殷切責望至意欽此三十九年御製臺省針臺省之設言責斯專寄以耳目寧取具員通眀無滯公正無偏黨援宜化畛域宜捐洞逹政體斯曰能賢古昔諍臣風規凛然訏謨讜論垂光簡編朕每覽繹如鑒在懸居是官者表裏方直精白乃心充廣其識國計民生臧否黜陟凡所敷陳敬將悃愊風霜之任以懲姦慝搏擊之威以警貪墨毋托細務茍塞言職毋紛成憲妄逞胸臆書思入告當寧對揚沽名匪正營私孔傷㦯藏嫌怨謬為雌黃受人指囑尤為不臧形諸奏牘有玷皂囊職司獻替亟宜審詳敬爾在公風紀巖廊辭針用勗誕告聯常雍正元年諭朕仰承大統遵守成憲首以求言為急科道諸臣原為朝廷耳目之官與朕躬最親與國家最切凡有所見自應竭誠入告今雖備位臺垣即將來之公卿大吏為科道時不能盡言則日後官至大僚豈能期爾建白乎今後各科道每日一人上一密摺輪流具奏或二三人同日具奏一摺一摺止言一事無論大小事務皆可據實陳之即㦯無事可言摺內亦必申眀無可言之故具摺後在外候㫖或召進面見或令且退所言果是朕即施行㦯未甚切當朕亦留中不發決不令一人知之倘有狥私挾讐顯繫情弊巧為瀆奏者亦不能惑朕之耳目也密摺不許人參酌如有漏泄㦯同僚中知而言之則同僚即可據以密聞朕將兩人之摺合驗情事能隱諱推諉乎至於有面奏廷諍㦯彈劾權要㦯更革弊端不妨仍照例露章奏聞朕亦不拒禁爾諸臣其敬承明諭各抒忠悃無負朕懸鞀設鐸之意欽此又諭外任旗員受該旗都統參領及五旗本王恣意需索者許本官據實封章密詳督撫轉奏倘督撫瞻顧容隱許本官封章揭都察院轉為密奏倘不為奏聞即各御史亦得據揭密奏務期通逹下情以除積弊欽此又諭勘合之外有多索一夫一馬者許前塗州縣據實揭報都察院糾參欽此又議準大臣為小臣之表率若屬官簠簋不飭虧空錢糧者多即繫上司不能以清操為率盜賊繁多諸務廢弛即繫上司不能以勤慎為率皆許科道於年終察實題參二年奉㫖以六科隸都察院又奉㫖凡科道露章必候朕御門聽政之日進奏在各部院奏事之後陳奏又諭諸王貝勒屬下人繫纍世效力舊人或念其先世豢養之恩見幼主有過直言規諫㦯因需索不遂並聽讒佞之言將效力之人妄加殘害藉端送部治罪則忠直之輩人人箝口而讒佞小人轉得任意橫行矣嗣後如此等曾在其先世效力之人幼主無故尋釁妄行陷辱藉端送部治罪者準其聲眀寃抑或赴宗人府㦯赴都察院呈訴該衙門奏聞詳審果繫寃情㦯撥於别旗或撥於他王門下若所訴盡誣加等治罪欽此又諭外省督撫有懷私背法逞威等事給事中御史等受其請託賄賂為之狥隱經朕聞知將都察院堂官一并議處至上彈劾本章或有畏難之心亦未可定將本章封固秪稱參本不必聲眀姓名事由欽此三年諭朕為天下臣民之主一夫不獲尚厪朕懷豈可令郡縣司牧枉受寃抑乎朕屢降諭㫖令督撫秉公體恤屬官尚恐有寃抑之人嗣後道府以下知縣以上各官有實在寃抑被參降革者令赴都察院具呈確察原參緣由核實具奏其並無寃抑實有罪愆人品不端才力不及之人妄行具呈者亦必重治其罪欽此四年議準直省州縣交代舊任官虧空各上司逼勒新任官接受者許被勒之人直揭部科代為陳奏其有干連督撫者將具揭之人與虧空之人押赴來京交與都察院察審明確將該督撫一并從重議處如繫誣揭交與刑部加倍治罪至出揭之人調任别省該管上司有因其從前揭報之故多方搜求藉端誣陷者該員赴院呈辨果繫參處寃抑將該上司交部議處如誣辨不實加倍治罪七年諭科道乃朝廷耳目之官專以進言為職朕令其於露章之外復行密奏者蓋欲其時進讜言匡朕不逮有益於吏治民生也既繫密奏則當謹慎不謀於人不泄於外方無忝於事君之義而不愧言官之任嗣後倘有密奏之事朕未將本人姓名發出而本人自行露泄或私自存稿者一經發覺朕必嚴究重治其罪欽此十三年十一月諭往者聖祖仁皇帝特製臺省之針以重言責皇考世宗憲皇帝諭㫖亦諄諄及之洵以耳目之司乃國是所由彰官常所由肅也朕以藐躬纘承丕緒一日萬幾常恐措置失宜以負皇考付託之重繩愆糾謬正爾諸臣得自竭其忠誠之㑹也中外大臣㦯有詭法行私及昏庸不能任職者近者實跡有徴逺者輿論不協皆宜據實彈劾以廣朕之聰眀而近觀諸臣所奏大率毛舉細故無關體要朕以實心求言而專司言責者仍以虛文塞責無乃內負夙心而外慚清議乎其各自砥勗凡有關於國政民依者知無不言無㦯畏葸若仍以不急之務漫充奏牘㦯其人已自敗露而後托拾其非又安用此至於懷私挾怨受人指囑互相攻訐乃皇祖之針所謂尤為不臧者有或蹈此乃自貽伊戚也勉之慎之欽此又諭朕御極之初一時見聞未遍恐不能周知天下之庶務欲開言路以期集益廣思爰遵皇考時舊例令滿漢文武大臣官員科道等輪班條奏使各抒己見用備採擇兹者條奏已將一周其中固有通逹治體可以見諸施行之事而胸無確見真知因迫於班次已屆勉强湊合支贅成篇者亦復不少自今一輪之後不必拘定班次倘有所見隨時陳奏此朕切望廷臣嘉謨入告實有裨於政治之意並非奏牘繁多厭於披覽也欽此乾隆元年諭國家設科道官原以發抒忠悃隨時獻替為專職而進諫之道莫大乎繩愆糾謬上佐君德其規切用人行政指陳吏治民生者次之此古名臣之所以志在格君而嘉猷碩畫有造於國是民依也朕近敬閲世祖章皇帝實録見當時言官奏疏尚有骨鯁謇諤之風竟能直指君德之得失而不顧一己利害之私朕輒改容誦之以為我朝人物挺生忠良之佐匪躬之節未嘗逺遜古人也朕御極以來求言之詔屢下而司諫之臣從未聞有忠言讜論可藉以為啓沃之助者計其封章條奏不過托拾細事茍且塞責即欲求其切中政體痛斥官方之言尚不可得何論上及朕躬塞違昭德以盡納誨之實乎夫朕之一身豈無闕失正賴廷臣直言以襄不逮即云大德不踰而日理萬幾或發號施令之失其宜或慶賞刑威之過其則或進退黜陟之乖其分或輕重緩急之爽其衡皆朕所不能自信者乃朕誠心求之而諸臣不能以誠心應之則諸臣不能辭曠職之咎也繼自今大臣暨科道等務以古處自期各矢忠藎為上為德為下為民悉盡言無隱以修臣職以繼芳踪毋使先正氣骨獨自擅美於前庶稱朕拳拳冀望之心至本朝定鼎以來從前臣工章疏有忠讜剴切卓然可傳者著內閣翰林院委官精選進呈刋刻以垂示將來俾後進奉為模楷其入選章疏諸臣內有素行端純完名全節者準入祀賢良祠用昭朕崇禮直臣風勵百僚之意欽此又諭朕即位以來屢下求言之詔至再至三出於誠切並非尚納諫之虛文誠以朕躬闕失無由自知必賴直言匡正而隨時納誨者乃臣子之大義胸有所見即當直陳使言之果當朕當即改易可收轉圜之益言之不當朕亦得以己意明白剖示釋其疑心亦開誠布公之道也惟是公私之辨不可不嚴倘有藉直諫之名以自行其私妄冀惑亂朕聽亦斷不能逃朕之洞鑒也欽此又諭人臣奏事理宜慎密若參劾既非露章而用封奏尤不當漏泄於外以自作威福欽此又奉㫖嗣後倘有被步軍統領衙門番役等騙害者準本人赴刑部都察院控告該部院即據實奏聞朕必將番役嚴審治罪不少寬貸二年諭國家設立科道專司建言之責必心本無私又能通逹治理乃為無忝厥職若識見雖未眀通而居心朴誠則言雖愚戇尚無害於事理朕亦鑒其忱悃而優容之惟胸懷愛憎之私藉奏章以展其巧詐者則有玷臺垣國法不可以輕恕即如並未深悉地方民情而奏稱某地某事甚善而承辦之人已暗受其推薦奏稱某地某事不善而承辦之人已暗受其中傷是其敷陳之時並未據實秉公匡襄政務而言在於此意注於彼其居心尚可問乎近見科道中此等習氣頗不能免亦難逃朕之洞鑒科道官當捫心自問如稍有愛憎之私未泯於中者各宜猛省悛改毋蹈罪戾欽此又諭從來言官陋習相沿多由迎合若人主意在綜核率刻意吹毛求疵巧避瞻徇之迹而置君德於不問若人主意在樂聞已過則又往往於朝廷之政事吏治之得失不一言及甚有臣工不能靖共羣僚或植黨援曾不敢一指摘以逺嫌避害惟事托拾陳言以自沽能正君心之名是其居心之隂巧乃國家之大蠹也朕孜孜求治常恐不及使偶有闕失言官果能切實指陳朕自樂於聽受即大臣中或有過眚果能據實彈劾亦足為用人鑒戒若徒𠞰襲膚辭則史册具在盡足披覽何用伊等喋喋陳奏乎倘錯會朕意轉生畏葸之念則又不知朕推誠布公之心者也欽此三年諭朕令科道條陳事件原許各陳所見以裨政治雖所陳奏不能盡合機宜且往往有揣摩朕意有心迎合者此等固不足採但伊等職司言路條陳既多其中豈無可行之事朕敕交九卿會議爾等自宜虛公斟酌不可稍有偏執欽此四年奏準本院職司稽察凡有寃枉均得陳奏準理嗣後候補候選及曾經議處官辨如有應行呈眀情節許赴吏兵二部具呈交與該司將應準應駮緣由詳加察核逐款明晰批示分别辦理果有實在寃抑應令其親自赴院具呈察明應行準理者即行文調取該部辦理原案及一應定例如實繫舛錯即為奏請更正該部堂司官如有辦理未協亦即奏明請㫖察議倘有營私受託等弊經院訪確即行參奏八年奉㫖嗣後有交部發議事件科道不待部覆參差具奏者該部於議覆本內將伊等意見參差之處聲眀請㫖十三年奉㫖各衙門京堂屢經酌定仍不免參差僉都御史有漢官無滿官應作何裁改著該部定議具奏遵㫖議準裁僉都御史俟員闕時停止奏請簡用又題準御史原繫言官凡遇有應行奏聞事件各御史果訪聞確切不必拘定省分衙門仍聽隨時據實陳奏欽定大清會典則例卷一百四十五
