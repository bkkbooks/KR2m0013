  text: 欽定四庫全書欽定大清㑹典則例卷一百四十七
  hash: sha256:8ab38ef9442594a6c48502102817d846c74bc6c0832dfd5d80aca269856f9ec2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_151-1a, image: WYG0624/WYG0624-0621a.png}
body:
  text: 都察院三一稽察部院事件康熙四年議準御史稽察各部院事件月終用該道印具題十六年諭向來各衙門事件闗繫重大者雖有定限赴科道稽察但事有易結者即應速結必竢限滿方行題覆多致壅滯更有各項呈狀不繫注銷者任意躭延藉端拘提人犯數月不為審結無辜牽連殊堪憫惻以後具題本章悉令速行辦理不必盡拘定限至於審理事件亦速為完結著照注銷欽件例定限每月造册赴都察院科道稽察具奏爾等各宜力圖振作體䘏民隱以副朕意欽此又議準部院督撫具題及科鈔事件皆令造册送各道稽察十八年議準大小官員在衙門不待事畢推諉滿官早歸遲進燕㑹嬉遊者或辦理公務瞻徇遲延不行即結者司官聽堂官題叅堂官聽科道題叅四十四年覆準各衙門科鈔及彙題事件注銷日將原案齎送察覈四十五年題準嗣後凡奏聞及照常行文事件各部院衙門令該司官親自造册送各科道注銷月終奏聞雍正元年議準各部院一應咨提行詢事件一面咨行該處一面知㑹科道存案若逾限期令行文之部院叅劾如行文之部院徇隱不叅科道即將逾限各官及不行叅劾之部院一并列叅又議準寳泉局寳源局停止滿漢科道注銷三年諭凡速議事件與尋常事件業已定有限期嗣後務遵定限議覆歸結倘有行詢他處咨提人犯不能依限歸結者於限滿之日聲明情由交送内閣奏聞如並無别項情由而逾限不結科道即行糾叅倘科道不叅著内閣都察院一并叅奏欽此又奏準部院各衙門每月將己未結科鈔事件造册分送科道勘對限期有遲延違誤者覈叅又覆準八旗行各部院事件均送科道衙門注銷但八旗皆清字公文必須譯出漢文始可定稾結案嗣後行文各部院衙門事件無論應具題不應具題之件均限三十日完結又議準凡一應奉㫖交議事件與摺奏事件均令於到部之日即將緣由聲明知㑹内閣並科道如有逾限即行題叅四年諭嗣後應於八旗完結事件不行完結推諉部院者都察院即行叅奏應於部院完結事件不行完結推諉八旗者亦行叅奏欽此五年諭向來督撫提鎮陳奏本章例有副本投遞通政使司又有揭帖知㑹闗渉之各部院往往緊要之事未達朕前而先已傳播於衆口又如内外咨呈文書往來該衙門尤易疎忽以致匪類探聽多生弊端間有緝拏之犯聞風逺颺遂至漏網此皆不慎不密之故貽誤匪輕嗣後一切本章咨呈文書除尋常通行事件外其有案闗緊要及緝挐人犯内外各衙門應密封投遞各該管官應謹慎辦理以防漏洩倘有疎忽事發究明根由必將洩漏之人及該管官從重治罪其稽察之處交與科道官倘有疎忽漏洩之事科道不行察出一并處分欽此遵㫖議準嗣後應密之事並不密封以致漏洩者將封發官叅劾如收受承辦官不慎以致漏洩者將收受承辦官叅劾事理重者降一級留任輕者罰俸九月該管科道官不稽察糾叅罰俸六月六年議準嗣後除漏洩密封事件仍照定例分别議處治罪外其雖非密封但未經御覽批發之本章一槩嚴禁不許刋刻傳播如報房與書吏彼此勾通本章一到即鈔錄刋刻圖利及揑造訛名並招搖詐騙情弊各照例分别治罪該管官失於覺察科道不行糾叅皆照漏洩密封事件例分别議處又諭各衙門事件交與科道官稽察欲其按限歸結不致遲誤近見科道行詢之案該衙門隨便託辭囘覆而科道遂不復問情由是科道之稽察不過察其遺漏而已其遲延之故並未致問殊非差委科道之本意嗣後該衙門託辭囘覆科道官並不詳察定將科道官一并處分欽此七年奉㫖崇文門税課司事務繁多不必按月注銷又奏準太常寺光祿寺大理寺鴻臚寺順天府鑾儀衛欽天監既與各部院文移往來又有闗繫錢糧之事著將所辦一應事件每月兩次造册送科道依限察覈乾隆四年議準各部院議覆一應條奏事件奉㫖後將原奏知㑹各道存案以備稽察又奏準各部院注銷惟户兵二部將事件原槀并册赴科道檢覆其餘各衙門皆不送原稾止將事由册填寫已完未完字様嗣後令各司將己未完結詳造清册送督催所該所就近傳取各號簿勘對明確如果無朦溷該督催所於各司册尾填寫勘對明確並無遺漏遲延字様列銜畫押鈐印付各司經承持送科道衙門注銷如有遺漏遲延該督催所即行呈堂酌量辦理科道仍不時稽察分别奏聞倘督催所不行察出囘堂經科道察出將該司督催所一并議處又議準各部院八旗辦理案件有將不應駮之事濫駮者均令科道覈㕘又議準理藩院堂司各官均繫滿洲䝉古一切册籍均繫清字是以造送注銷册並三法司㑹稾亦繫清字只滿御史注銷畫題嗣後理藩院注銷册並三法司㑹稾該道筆帖式譯出漢文滿御史較正與漢御史公閲畫題至順天府衙門均繫漢官是以注銷册專用漢字只漢御史注銷嗣後滿漢御史公同注銷畫題六年奏準除密議密奏外其餘所奉一切傳鈔諭㫖批發摺奏事件應某衙門承鈔辦理並傳該科一同鈔錄報院轉發衆科道閲看十四年奏準在京各衙門見行注銷事件雖六部事務繁多其餘衙門有每月僅十數件及數件不等者今既遵㫖定為十五道分管稽察自應按照十五道分辦注銷事件各繕一本具題又題準内閣翰林院詹事府都察院六科中書科五城宣課司左右翼監督寳泉局寳源局漕運總督河道總督向不注銷揆厥由來内閣為綸扉重地專辦進本票籤事宜且見有欽奉上諭處專司稽察翰林院詹事府專備經筵日講入直撰文六科專司封駮發鈔中書科專辦誥勅與部院所辦事件原屬不同故向例並不造册送道注銷至宣課司寳泉局寳源局於雍正年間欽奉諭㫖不必按月注銷左右翼監督繫專官收税自行覈實具奏向例亦不造册五城事件見經本院奏準設督催所專委御史按限覈催又五城審送刑部事件例繫察院兩月一次具題注銷漕運總督河道總督駐劄外省其題達事件向繫揭報該道稽察嗣後仍令各道照舊辦理十八年議準各旗應領祿米兵餉所造册籍於何日咨部部内於何日劄倉各倉於何日開放均報明都察院察覈倘有遲延即行指叅十九年議準直省所辦旌表壽民節孝賜䘏祭葬等事由禮部定議無論單題彙題奉㫖之日皆鈔錄原案開載姓名知㑹經管衙門及直省辦完彙入奏銷經管衙門自可就原案覈對如有不符大則題駮小則咨駮亦皆有成例可循無如書吏漫不經心只圖展限並不覈對原案一槩行詢視其來文亦並無可登答惟再鈔原題原奏咨覆而已嗣後如無應駮之處徒藉行詢為展限之計該稽察衙門即行糾叅一注銷限期康熙四年定各部科鈔咨呈事件在本部題覆者定限二十日完結行詢㑹稾各部院衙門者定限三十日完結雍正元年定户部案件繁冗嗣後凡在該部題覆者限三十日完結行詢㑹稾各部院衙門者限四十日完結五年定一應不待察覈易辦事件如吏禮兵刑工等衙門向例二十日完結者今定限十日完結户部向例三十日完結者今定限二十日完結八旗及直月旗分所辦易結事件均定限十日完結議政及九卿㑹議如有行詢事件定限三十日完結不待行詢易辦事件限十日完結八旗行各部院衙門事件限三十日完結如有違限未結者皆照欽部事件按其違限月日分别議處逾限不及一月者罰俸三月如事已完結者免議逾限一月並一月以上者罰俸一年乾隆五年議奏按例内違限不及一月事已完結免議之條原因外省事件皆限四月是以違限不及一月事已完結準其免議至在京各部院衙門雖明定以十日二十日三十日四十日之限實各暗増二十九日承辦之人不免任意躭延嗣後凡在京各部院衙門事件定限十日二十日完結者如違限不及十日事已完結者始準免議定限三十日四十日完結者如違限不及二十日事已完結者始準免議如違限十日二十日以外事雖完結仍照定例逾限一月以内者罰俸三月一月以上者罰俸一年再移咨各部院衙門者移咨衙門定限十日咨覆承辦衙門準其扣除移咨日期按限辦理具題事件準其扣至交本日期為止按限察覈九卿㑹議事件準其扣至九卿上班㑹議畫題日期為止按限察覈如逾限不完照例議處奉㫖外省欽部事件正限四月者方準餘限一月在京各部院事件正限原繫二十日於雍正五年皇考勅交九卿酌議將各部院二十日户部三十日限期各減去十日亦繫在正限内酌減見在議定餘限自應以正限日期為主嗣後吏禮兵工等部正限十日者準餘限十日正限三十日者準餘限十五日户部正限二十日者準餘限二十日正限四十日者亦準餘限二十日刑部事件人命攸闗應倍加詳慎著照戸部扣限餘仍照所議辦理又奏準凡在京文衙門餘限之例均照六部之限畫一稽察均以各部堂到日期扣算十四年諭向來定有正限又有餘限是以照例酌減朕思正限餘限名雖不同其實則在餘限内完結者與未出正限之案一例免議而各部院辦理案件又少肯在正限内趕辦完結則又何必多設名目列為章程非所謂政尚簡要也嗣後各部事件在本部題結者吏禮兵工四部及各衙門各定限二十日户刑二部定限三十日行詢㑹稾繫吏禮兵工及各衙門主稾者定限四十日户刑二部定限五十日内所㑹各衙門各定限五日户刑二部各定限十日逾限即行叅處欽此十七年奏準同隸一衙門之司官彼此移付事件有闗題奏者均照各衙門㑹稾定限移覆並令各司於移付時聲明應題應奏情由付督催所存案仍於注銷之日彙送科道衙門覈對倘有違限照例叅奏附各衙門赴院注銷日期河南道今京畿道每月初二日繫上月十五日前事十二日繫上月十五日後事餘仿此京畿道今河南道初八日二十日江南道初八日二十二日浙江道初七日二十二日山西道初六日二十日山東道十一日二十一日陜西道初八日二十二日湖廣道初六日二十日江西道初八日二十二日福建道初七日二十二日廣東道初七日二十日廣西道初十日二十日四川道初八日二十二日雲南道初八日二十一日貴州道初七日二十二日又河南道十二日二十二日注銷歩軍統領衙門事件均繫上月事次月具題至各部院承辦科鈔有轉行内外衙門不能依限完結者於注銷册内逐一聲明其奉㫖特交轉交事件具題後仍知照内閣注銷如月終並無特交轉交之事亦知照内閣存案一稽察部院書吏康熙三十八年覆準各衙門年滿書辦由都察院嚴飭五城及司坊官親加緝察即催囘籍倘有潛住在京及藏頓之家一并從重治罪五城官員如有徇情容畱者照容畱廢官之例處分雍正元年諭都察院各衙門募設書辦不過令其繕錄文書收貯册籍但書辦五年方滿為日既久熟於作弊甚至已經考滿復改姓名竄入别部潛踪掩跡無所不為甚至獨掌一司之事盤踞其中事無大小一手握定而不肖司官交通賄賂倚為心腹上下朋姦莫能察究書辦尚可更換而此等人總無改移子孫相承竟成世業各衙門姦弊叢生未有不由於此者嗣後書辦五年考滿部院堂司嚴行稽察勒令囘籍候選逗遛不歸者著都察院飭五城司坊官稽察驅逐至於盤踞之人多捐納官職原有勢力可以抗違爾衙門職掌糾察立即題叅革究押解囘籍庶作弊之本源永絶而官方可以肅清矣著各部院㑹同確議具奏欽此遵㫖議奏各部院盤踞之吏並年滿書辦奉㫖察拏除拏獲者已解原籍外餘皆聞風逃遁但此輩行踪詭秘或潛匿京師或暫去復囘應令各部院司官嚴察並飭五城司坊大宛二縣不時稽察如有潛匿京中及囘籍復來者拏送刑部審究遞囘原籍取具該地方官收管印結其有捐納官職敢於抗違者由院題叅究革如各司官通同徇隱司坊等官不行嚴察經人首告或被科道察出將部院司官及司坊各官一并叅處嗣後考滿書辦部院移咨到院行令五城立押囘籍毋許逗遛奉㫖著各部院一年一次保結具奏倘有潛居京師者或經朕聞知或被科道題叅將保結具奏之大小官員一并治罪又定各部院一年一次將並無盤踞之吏及年滿書吏更名重充之處保結送院由院每年七月内題達十三年諭各部貼寫著都察院委出滿漢御史輪流稽察倘有徇隱揑飾等弊一經發覺則咎在堂官并稽察之御史欽此又定各部院經承及貼寫書吏每年四季滿漢御史各一人按應稽察之衙門㸃名稽察十三年十二月諭今之書吏即古之府史胥徒也各部院皆額設召募所以檢收册籍繕錄文書乃役滿之後復改名竄入别部舞文作弊更有己身並未充役居然盤踞都中呼朋引類遇事生風影射撞騙靡所不為此十數年以前之積弊皇考洞悉此種惡習屢降諭㫖著都察院飭五城司坊官嚴察訪緝其有潛匿京師及近京州縣者該地方官定以失察處分有能拏獲者以名數多寡分别議敘載入欽定條例俾各實力奉行用是元二年以後姦徒歛跡部務整齊此皇考之所以芟鋤稂莠而滋植良苖民生吏治均受裨益也朕御極以來仰遵皇考遺詔每事務從寛厚凡八旗直省以及窮邊極壤無不殫慮精思周詳體䘏冀臻惇大成裕之治然寛厚二字非可一槩視也厚民生紓民力加惠於兵丁施恩於百姓乃為寛厚朕所以仰承先志而日夜孜孜者此耳朕深恐此輩不知朕所以用寛厚之意而故智復萌以身試法著都察院五城司坊官順天府大宛二縣及歩軍統領不時嚴察倘有此輩潛匿京城或溷入貼寫之中並有罪遞囘原籍之後仍潛入京師或近京地方者事發之日除本犯治罪外定將失察各衙門照例處分欽此一刷卷順治九年題準設京畿道今河南道專管照刷在京大小衙門文卷除軍機大事外其餘事件一年一次稽察十一年題準照刷文卷内有訟獄淹滯刑名違錯錢糧埋没賦役不均等弊應請㫖者奏請取問應治罪者依律治罪其移送照刷文卷均用印信册結照刷事畢具疏奏繳康熙元年題準照刷各衙門文卷及錢糧等項以稽覈埋没違誤等弊各衙門只開收存數目而支放之數未開如有破冒從何稽察嗣後有錢糧各衙門將支放數目詳細開送以憑稽覈六年覆準直省錢糧户部不必别設磨勘司責成各司於奏銷時詳加磨勘按年送京畿道刷卷七年題準在京各衙門上年所辦文卷均於次年八月内送刷三十九年議準光祿寺於年終奏銷黄册後將按月啟奏細數底册一并送刷雍正元年議準凡還庫銀並繳還俸銀公費等項逐一造入刷卷册内送覈又議準刑部銀庫給發過各司辦買秋審朝審紙版等項工價及各省解送贓贖銀一并送刷又議準户部山東司所領鹽引心紅紙張銀造入刷卷册内送覈又議準工部營繕等四司並料估所節慎庫月册奏銷之後均造册送刷又議準坐糧廳修牐濬淺動用税課並贏餘銀造册送刷三年奏準在京各衙門凡闗錢糧刑名案件每年八月内彙造印册送京畿道刷卷除遲錯者覈叅外餘令該道陸續磨對限十二月封印前繕黄册進呈十一年議準吏兵二部議結各省補叅之案知照三法司造册送刷又議準在京各衙門領取刷過卷宗定期於每年二月内該道照衙門次序豫定領卷日期知照各衙門令該經承按所定日期赴道領卷該御史覈明即行給發倘該道書役有藉端勒索等弊計贓以枉法論照知法犯法例加等治罪該御史知情者照故縱例議處不知情者照失察例議處至各衙門遲延月日不依期令該經承領囘者該御史叅奏照刷卷遲延律議處若各衙門已經依限赴領不按期給發者亦照此例處分若給領之時其案卷或有遺失不全給者照遺失科鈔例議處乾隆二年議準户部三庫一應交納錢糧均繫户部各司承辦每歳各司已將原案送刷凡各處交納錢糧數目即可覈對且三庫案件自交院覈對以來若有冒領冒銷即能察出毋庸三庫造册送刷又議準五城司坊承追贓罰收贖五城振濟貧民飯食銀米並一應支領公項均造册送刷一稽察户部三庫雍正五年題準户部三庫出入數目每月進呈御覽奉㫖後即交都察院將各處所領銀段顔料等物原稾數目察覈如有不符即行題叅乾隆十三年奏準各部院將所領三庫銀段顔料等項務於下月初十日以内造具細數總册並原稾送江南道逐一察覈歳終彙題倘各該處有不按月咨送及遺漏遲延等弊該道即據實叅奏其各處所送支領清册務按月詳對呈堂存案該堂官等畱心稽察其數目相符者該道按月注册於歳終彙題本内聲明如有不符即行叅奏交部察究倘有重支冒領等弊該道不行覈叅别經發覺將該道並該堂官交部察議又題準見在稽察三庫月奏與部院各衙門原稾印册逐一較對内有内閣典籍領侍衛内大臣處一統志館㑹典館鄂羅斯文館六科稽察内務府御史衙門左右翼税務監督寳泉局監督大通橋監督鷹房狗房等處止有印册並無原稾嗣後不具稾之各該處均令立稾鈐印同清册一并咨送察覈再本年二月分起至九月分月摺業經於年終彙題至十月分月摺例於十二月初十日内移送覈對年終不及覈辦應將十月以後支領各項入於次年終彙題嗣後照此辦理其三庫所送月摺江南道按月鈔錄注册竢題明後將月摺送囘十五年奏準各衙門所取物料如有餘剩應行繳囘者皆令行文户部該庫官即將原文加謹收貯限五日内赴庫交納如逾限不交該庫官呈堂行文催交再有遲延咨取職名叅處再各該處交囘物料該庫即將所收數目造具清册每於月終彙稾呈堂存案仍移送江南道察覈並行文各衙門將應交囘物料細數亦造具清册移送江南道以便覈對其叚疋庫一應收發察覈之處亦照顔料庫辦理又議準各衙門支領顔料叚疋等項有應行繳囘者一得庫收即造具清漢細册注明行文户部及交庫各日期並將原稾庫收移送江南道察覈五日後仍出具印領赴江南道將原稾庫收領囘倘有遲延遺漏一經察出即行叅奏一稽察工程康熙十八年題準修造工程甚多或有遲延浮冒侵蝕情弊除内務府監造外其餘修造之處均令都察院逐一稽察六十年題準一應修理工程工價五十兩以内物價二百兩以内者照依各處印文工部準其修理其工價五十兩以上物價二百兩以上者著該處料估啟奏到日陜西道御史㑹同工科覆覈工完察銷雍正元年奏準宫殿各門門簾對聫門神遇更換時陜西道滿御史内務府官各一人㑹同製造庫官驗明應修應造確覈具題一稽察宗人府事件雍正五年諭宗人府事務設宗室御史二人稽察每月兩次注銷鑄給印信月終具題欽此六年議準宗室御史稽察銀庫錢糧册籍行文八旗將每月宗室等婚喪事優䘏銀借給八旗官員銀拖欠還過細數造册移送覈對如有不符宗室御史覈叅年終將稽察過數目詳細覈算奏聞十三年奏準宗人府銀庫繫特恩設立宗室等所得優䘏銀及借給八旗官員等滋生坐扣等項不可無人稽察嗣後請照理藩院之例委御史一人不令辦事只令稽察錢糧數目一稽察内務府事件雍正四年諭部院事件均有御史監察應將内務府官員内簡選四人授為御史互相稽察於事務有益欽此又奏準稽察内務府事務請照各部院衙門注銷之例將三院七司並上三旗内府佐領内管領令其稽察凡有欽案事件咨文呈狀照部院定限完結其有不能依限完結者豫行聲明令該御史酌量展限稽察注銷月終奏聞十三年裁内務府御史乾隆三年諭内務府向有專設之御史近經裁汰見在無稽察之人著專委御史二人稽察照八旗之例不必逐年更換將來員闕頂補即著辦理稽察内務府之事欽此五年奏準武備院每年用過錢糧數目照司院之例將舊管新收開除實在按欵開造黄册歳終進呈御覽仍送稽察内務府御史衙門察覈注銷十三年奏準内務府廣儲司六庫等官遇更調交盤及取用存貯物件之數該御史不時稽察每月初五日二十五日注銷一稽察理藩院銀庫内外館及照看鄂羅斯來使雍正二年議準理藩院銀庫簡御史一人令其協同司官辦理庫務兼察庫弊三年更代四年奏準理藩院内外館務本院選滿科道各一人送理藩院與各部院滿司官一同引見簡用又奏準鄂羅斯來使進京委滿科道照看開列職名送理藩院與滿侍讀學士等引見簡用十一年奏準稽察理藩院銀庫御史停其辦理錢糧事務只令親行監放䝉古等口糧銀稽察庫弊若司庫之官有營私作弊該御史瞻徇情面不行叅奏者發覺之日一并叅處一稽察八旗事件雍正元年諭滿洲御史事務無多八旗各委二人照稽察部院之例一應事務令其稽察凡有應奏應叅事件即行察奏再五旗王等有不按定例使用旗員及濫行治罪者亦著稽察所用御史著調旗分委欽此遵㫖議準八旗奏過事件與各衙門彼此行文事件一應闗擊錢糧事件及補官襲爵並各省在旗武官員闕補授日期有無逾限每月造具清册送該御史稽察三年議準八旗補授佐領承襲世爵並補授前鋒叅領前鋒侍衛䕶軍叅領䕶軍校有不能於限内完結者該旗將情由聲明行知稽察該旗御史倘有隱匿徇庇等弊著該御史糾叅四年諭從前每旗特令御史二人稽察事務近聞八旗大臣等於午門前徒有㑹議之名並不議事以致諸務遲誤御史視以為常不行嚴察夫旗務不比部院事件均有條理又有限期所以特令伊等稽察乃伊等仍行怠惰致令事皆遲誤可將此再行嚴飭嗣後務加嚴察不可稍徇情靣若仍前懈惰必一并治罪斷不輕釋欽此又奏準八旗各部院互相行文必鈐用印信惟封印後方用白文近見尋常時亦有用白文者嗣後除年節封印外用白文之處永行禁止稽察旗務御史嚴行稽察五年議準八旗及直月旗所辦易結事件限十日完結七年諭八旗操練兵丁如都統等有託故不往者稽察御史即行叅奏若瞻徇不奏經朕聞知一并議處欽此又奏準八旗事件照部院之例令其每月一次送御史稽察月終彙奏如有逾限遺漏等弊一并題叅又議準刑部及各部院行詢八旗事件易於完結者令於十日内即行完結倘有輾轉移詢調取不能依限囘文者該旗將緣由聲明咨部如有故為遲延者令該衙門於注銷册内聲明咨送科道詳察將該旗遲延月日情由入於注銷本内一并叅奏又奏準凡奉諭㫖禁約及條奏準行之事交與八旗各按欵項彙成一册送院稽察八年奉㫖八旗官兵婚䘮等事果有違例僭越者著稽察旗務御史即行叅奏九年奉㫖八旗都統訓練兵丁著稽察旗務御史前往稽察乾隆二年議準八旗都統叅領所辦案件有未妥恊以及錯謬遲延等事該稽察旗務御史不行察出叅奏别經發覺照不行詳察例罰俸六月倘有瞻徇情面明知錯謬不行叅奏者照徇情例降二級調用三年諭命御史等稽察八旗事務者非秖令稽察補官注銷事件而已如都統等勒索所屬旗員等舞文弄弊皆當察明奏聞前以稽察旗務叅領侍衛煩瑣因而裁汰是專令爾等畫一稽察也爾等責任愈重今八旗大臣内有被叅議處者有經朕特交議處者爾等並未察出叅奏從前不知則已嗣後如仍不畱心稽察朕必將爾等嚴加治罪欽此又奏準旗人如有寃抑具呈本旗都統者即將具呈月日移咨稽察旗務御史存案續將如何完結移咨察覈倘辦理遲延或有應行辦理而將呈辭發還者即行奏聞四年奏準每旗有滿洲䝉古漢軍三都統並䕶軍統領前鋒統領等處見在稽察旗務每旗御史二人實屬不敷令部院注銷科道一例稽察又漢軍御史雖在漢御史數内實屬旗員請每旗再増一人令各察一旗將滿洲漢軍科道並見在稽察旗務御史共簡二十四人列名奏聞仍照例調旗分察遇有逺差入闈服制等事以俸淺之人挨補其䝉古漢軍事件較滿洲旗分稍簡請將每月䕶軍統領事件并入䝉古旗分注銷前鋒統領事件并入漢軍旗分注銷月一奏聞又議準八旗婚喪優䘏銀按月將銀數事件縁由移送内務府稽察仍移送稽察旗務御史察覈五年議準八旗事件易結者仍限十日完結外其各叅領㑹同察辦事件十日限内不能完結者將情由呈明都統限二十日完結仍移咨原行衙門察覈並於注銷册内聲明移送御史稽察九年議準八旗承辦事件如實不能依限完結務於餘限内開明情由呈請都統展限照舊例正限限二十日餘限限二十日完結仍移㑹原行衙門並稽察旗務御史稽察如遲延至餘限外始呈請展限者將承辦官計違限月日叅處又奏準八旗注銷册務於每月十五日以前移送察覈倘有過十五日以後者稽察旗務御史即將承辦官叅處十一年奉㫖八旗每逢較射之期著稽察旗務御史前往稽察又議準某旗直月即令稽察該旗御史於進呈月摺時將直月旗事務有無逾限沉積之處聲明十二年議準八旗公産地價五限内交納之事仍遵原奏無庸造入注銷册内其餘一應辦理公産地畝案件均一例造入注銷册移送稽察旗務御史察覈如有遺漏遲延照例叅處十六年奏準八旗直月處一應已完未完皆於月終造册繫某旗造送之册即繫稽察某旗之科道詳覈奏聞今既特簡王大臣專辦直年事務則稽察旗務之科道亦應特簡四人令其專司稽察一年旗務一稽察五城事件康熙初年定五城御史審理之事每月一次注銷送刑部者兩月一次具題雍正八年諭五城振濟貧民飯食銀米著都察院堂官不時察看欽此遵㫖議準五城振濟各設循環簿登記所振數目一日一換平糶設簿亦如之五日一換均由院察覈其振粥米糧柴薪及糶米數目並棲流所用銀均報明户部覈銷由院確察轉送十二年覆準五城自理事件訪拏者以獲犯日控告者以具呈日均扣限十日完結五日一次呈報半月一次注銷乾隆二年定五城竊案委山東道代比每月初三日十七日該坊官將從前所報竊案造册一本開明事主所失物件並承緝差捕的確姓名呈堂察覈外仍一面造册將正身捕役押赴山東道聽比六年奏準五城三營地方遇有盜案本院與歩軍統領彼此闗白協同緝究以報官日為始三月無獲即㑹疏題叅又奏準五城竊案該坊官逐案報明山東道該道按限傳集承緝捕役嚴比如司坊官有縱捕豢竊等弊聽該道據實指叅年終該道逐一察覈將新舊共被竊若干案捕獲若干案彙題注銷以專責成倘該道瞻徇不實力嚴比即叅奏交部察議八年覆準五城竊案該坊官即申報廵城御史並山東道以報官之日為始勒限四月緝捕如限内全獲或獲及半者免叅如限内尚未全獲或雖獲不能及半者該城御史叅送到部將該坊官住俸勒限一年緝捕限内全獲或獲及半者準其開復如逾限不獲該城覈叅罰俸一年賊犯照案緝捕其未經案緝之先山東道御史按限提比其有廢弛怠玩山東道御史覈叅如該城不據實報叅山東道不實力稽察由院察明叅奏交部議處一稽察歩軍統領衙門事件雍正五年奉㫖歩軍統領衙門事務著委滿漢御史稽察乾隆六年議準御史職司稽察遇有違例犯禁之事皆可不時察劾況歩軍統領衙門事件向在河南道注銷則番役人等令其一并稽察更為妥協嗣後皆照各部院經承貼寫送察之例將正身畨役開載年貌籍貫按季造册出具並無白役等結移送河南道御史考覈倘册結不實别經發覺將該統領及不行詳察之該御史一并議處又議準内外各衙門拘拏人犯該管官必給印票以杜詐冒滋擾之弊獨歩軍統領衙門有指名訪拏者有廵緝拘拏者即如竊盜鬭毆之類廵緝所至隨遇隨拏不能少待應每名豫給印票一張令其不時訪緝仍令該統領覈明何等案犯應豫行給票並於票内開明欵項給發該畨役收執並將豫給印票欵項移明河南道察覈一稽察直省補叅事件雍正元年諭刑部直省命盜案件主稾雖在刑部然亦由三法司公同確勘畫題方行請㫖今刑部議覆被盜疎防及人命失察等案有該督撫未將所屬地方官弁報叅者刑部於具題完結本尾聲明行令覈叅到日再議該督撫有照例補叅者亦有援例請免者止用咨覆刑部既不再題又不照㑹都察院大理寺是以部中姦猾胥吏得以操縱其事暗地招搖有部費者則為援引輕例且有竟將咨文沉匿日久潛消者如無部費雖督撫聲明在所可寛亦不準邀免欺隱朦溷事同議異嗣後三法司㑹議案件本尾有行令補叅者督撫咨覆到部其或處分或寛免作何完結之後令刑部知㑹畫題衙門公同刷卷如此則胥吏不得萌逞故智上下其手矣欽此十一年議準三法司行令督撫補叅文武各官案件該督撫咨覆刑部隨轉咨吏兵二部定議該部議結後將如何完結知照三法司並令刑部行知各省凡遇補叅之案一咨刑部一咨本院一咨大理寺以憑稽察一稽察直省難結事件雍正六年議準直省難結事件咨部展限時一并報明科道事結後題覆本内聲明注銷科道於年終分别己未完結彙題其有久不題覆又不展限者科道察明題叅十一年定直省難結事件督撫提鎮府尹等衙門每季將己未完結及曾否展限造具細册分送科道察覈如本季並無難結事件亦即聲明乾隆十四年定除直省應行揭報事件仍照例按省分揭各道外其難結事件隸吏部者季報河南道隸户部者季報江南道隸禮部者季報浙江道隸兵部者季報山西道隸刑部者季報山東道隸工部者季報陜西道如無難結事件亦各按季聲明以憑察覈彙題一稽察移咨直省事件乾隆十四年奏準由院據呈移咨案件該省督撫一面即將準咨日期先行咨報一面速飭承辦各官依限察覆果有難結緣由即於正限四月内詳報咨展如並無難結而逾限不行咨覆者照事件遲延例分别議處如限内任意躭延至逾限之後揑辭䑃溷託故申覆者經院叅奏將承辦官照朦溷造册例降一級調用轉報之上司罰俸一年不行詳察之督撫罰俸六月一稽察㑹議㑹審雍正三年議準秋審朝審令滿漢御史各一人稽察無故不到班者題叅七年諭凡㑹議㑹審九卿因有他務不能到班者仍照例行文知㑹主稾衙門嗣後著令滿漢御史二人將有事不到之九卿注册備考不必叅奏至於宗人府府丞太常寺太僕寺光祿寺正卿少卿嗣後凡遇㑹議㑹審秋審之時皆令在旁觀聽使之與聞但不得叅議亦不必畫題倘九卿所議未當或伊等别有所見準其密奏欽此又諭嗣後八旗大臣㑹議著擬定時候若有事故不能到班豫先知㑹若逾時未至先集之大臣即便㑹議若無故逾時始集者著御史詢問緣由具奏毋得瞻徇欽此又議準八旗㑹議分别左右翼按旗序品列坐如有越次不整者稽察御史題叅乾隆三年議準八旗㑹議大臣内有出差患病服制不得上班者均移報直月旗今直年都統造册轉送御史稽察一京察順治十三年議準六年考察一次在京各衙門官屬均聽本衙門堂官考覈照考察格式填注考語事跡或賢或否應去應畱造册密送吏部都察院吏科河南道今京畿道㑹考如將應考遺漏不應考者造入聽部院糾叅又題準各部院衙門筆帖式照有職掌官員例一例考察十五年題準凡京察吏部都察院吏科河南道封門閲册公同磨對過堂考察畢即行具題十七年議準凡京察時各衙門堂官不許接見屬官吏部都察院吏科河南道門上各貼廻避字様不許接見賓客如有囑託者自行舉發倘徇庇隱匿聽科道糾叅康熙六年題準盛京及奉天府各官照在京官一例考察雍正元年議準三年考察一次在京各衙門屬官於雍正四年三月内該堂官填注考語造册密送吏部都察院吏科河南道詳加考察分别去畱又議準盛京五部屬官及奉天府府丞以下城内官均令該部府堂官填注考語於雍正四年三月内造册移送吏部都察院吏科河南道照在京官例一并考察分别去畱四年奉㫖嗣後京察著大學士吏部都察院吏科河南道公同閲看著為例又題準六科滿漢官將行過事實開列册内送院堂官填注考語送部㑹同考察又題準御史考察由院填注考語司坊官考察由本城御史填注考語送院覈定一大計順治四年定外官大計三年一次永為例吏部吏科㑹都察院河南道今京畿道考察十二年議準大計督撫造册三本一送吏部一送都察院一送吏科毋得叅差十五年議準外官大計果有竒貪大酷令督撫按露章糾叅勿庇見任而苛去任勿寛大吏而責卑官如開報不實聽科道糾叅又議準大計册内考注優等而科道以貪酷指叅發審有據者該督撫一并治罪十八年議準大計吏部考功司吏科河南道詳覈各官應去應畱者照八法議處吏部都察院堂官詳覈如册内賢否倒置造報不實者科道特疏糾叅又定外任官評全憑撫按如有賢否倒置不合公論者聽部院堂官暨科道據實糾叅康熙十二年定大計册限十二月内送到二十五年議準督撫將屬官賢否造册三本分送吏部都察院吏科其布按二司所造各官賢否錢榖刑名等册分送各部院者停止一軍政順治年間定督撫將武職賢否五年一次造册送覈如遇展限具揭送都察院並河南道今京畿道察覈一鹽政考覈順治年間定凡鹽政一年差滿將任内經徴鹽課及部院勘劄事件揭報户部户部㑹本院並河南道今京畿道考覈具題一議處順治初年定宗人府吏兵二部皆有議處人員之責至該衙門有應議處者自應交别衙門議處嗣後宗人府吏部有應議處之案均交都察院辦理兵部交吏部辦理一驗看月官順治初年定月選文職官科道同九卿秉公驗看乾隆元年議準凡月官内有才品優長知之有素及行止不端出身不正者科道各舉以聞十七年奏準嗣後驗看月官開列掌科掌道職名恭候簡命一二人隨簡命之九卿公同驗看倘有瞻徇即行陳奏十九年奏準直省選拔貢生朝考取入一二等者照驗看月官之例開列滿漢九卿及掌印給事中御史等職名移送禮部奏請簡命公同簡選一驗看因公降革人員雍正十三年諭在京筆帖式驍騎校以下等官應去應畱者若一槩引見未免太繁著該管官出具考語分别去畱之後都察院秉公驗看若去畱允當即行奏明若將應去者議畱應畱者議去或人材可用或在行間曽出格効力者著都察院堂官將情由聲明引見欽此乾隆四年議準在京部院司官暨八旗武職因公降革者該管官即將該員降革之案確實察明咨送到院秉公察覈送囘各該處非繫因公者無庸引見果繫因公者該管官出具考語自行引見再在京廵捕營之叅將游擊守備等官照在京八旗武職例辦理外省駐防武職已經歸旗者照在京文職例辦理十二年諭各省文武官弁有因公罣誤部議降調繫該員應得之處分部覆時酌其情罪或令該督撫出具考語送部引見酌量錄用已屬格外之恩至於降㫖依議降調之人自應照所降之級赴部候補乃又有送都察院考覈引見之例此等人員有因原叅督撫所出考語平常遲至數年竢督撫離任始行赴部更有降調時並不請咨赴部及督撫屢更復以無憑出具考語呈請引見者既滋弊竇且事屬重複大抵為政貴簡而得要例愈繁而弊愈多嗣後著停止其在京文武官並旗員及各省駐防人員因公降革有令該堂官該旗大臣出具考語引見者又有送都察院考覈之例亦覺繁多不免啓趨避之途其如何刪繁就簡酌中定例著大學士九卿八旗都統詳議具奏欽此遵㫖議準屬官之優劣惟該堂官該旗都統知之最悉定例既許該管官出具考語引見自無庸咨送都察院察覈嗣後在京部院司官及五城正指揮等官並旗員各省駐防官廵捕營叅將游擊守備因公罣誤至於降革者其中如有辦事勤練人材可用任内並無錢糧不清及治罪之案該管大員㑹同都察院詳覈如果應引見交與該管大員出具切實考語保奏引見其各省駐防官員著咨送該旗引見應否去畱候㫖定奪一科道降革畱任三年期滿本院咨部開復一議敘人員補授滿經歴都事者試俸三年期滿由院具題實授一滿洲廕生在院學習者二年期滿由院具奏或仍畱本衙門遇有經歴都事闕題補或奏明咨部補用一筆帖式如有通曉繙譯諳練事務者遇有經歴都事員闕由院保奏請㫖補授一六科筆帖式遇有升遷由院劄行該科出具考語送院覈定轉咨吏部一筆帖式考試繙譯雍正十一年議準都察院筆帖式每月或以上諭或以揭帖為題該堂官酌量令其繙譯分别等第以示懲勸並交與各道御史察其勤惰如有託故不進署及不實心學習者該堂官叅處一司坊官俸滿保題康熙五十七年覆準五城司坊官如有聲名不好者本院不時叅劾處分其食俸已滿三年果有操守清㢘辦事勤敏並無事故者聽五城御史注明事實呈堂察覈薦舉乾隆三年議準司坊官如一年限内所轄地方竊賊稀少或竊賊雖多緝獲過半者準其記功遇保題之時準其開明保奏如年内竊賊甚多緝獲不能過半者分别記過七年議準司坊官能獲别城竊犯至三案以上者照本城緝獲竊案之例量與記功十二年諭京師為五方雜處之地察拏匪竊原以肅清輦轂考校自應較嚴但地廣人稠姦良莫辨其躧緝之案甚多若定例過嚴則司坊官動罹叅處永無上進之階其作何定例使寛嚴得中著妥議具奏欽此遵㫖議準嗣後司坊官三年俸滿有堪保薦者將該員三年任内事主被竊未報當經捕役躧獲贓賊有據之案入於承緝己未獲各案内通算獲賊過半者準其保題不能過半者仍行記過不準保題倘該員記過之後果能實心訪緝獲賊有功準其將記過之案注銷再行覈明保題十八年奏準五城司坊官到任已滿三年果繫辦事勤謹才能練達之員該城御史出具切實考語送院覈實移咨吏部引見奉㫖後察其降革畱任之案原繫因公者應準其一例升用其降革畱任之案帶於新任扣滿年限别請開復一讞獄康熙十二年議準各省刑名事件分道御史與掌道御史一同稽覈十七年議準各省由三法司覈擬事件各具揭帖二通一揭送院一揭送該道二十七年議準外省揭帖到日御史豫看全招竢三法司覈擬㫖下㑹議定稾如有情節不符許别議三十一年定凡外藩地方命盜案件理藩院㑹同三法司覈擬具題雍正二年議準刑部應㑹三法司畫題事件將稾面鈐蓋司印注明緣由移送法司衙門畫題限十日内亦用印文送囘如稾内有酌議改易之處限五日内即將應酌議改易之處用印文聲明緣由送囘刑部察覈定議刑部仍用印文將應否改易之處聲明再送法司衙門六年諭凡律例之設乃詳情察理揆度至當而後定者也審擬罪案之時應引某條則引之斷無輕重任意亦無介在兩端之理常見外省本章及法司擬覈疏内往往有先引一例而云不便照此治罪更引重罪以治之以此兩説載入一本此乃臣下巧於營私之陋習或欲以嚴刻之名歸之於上而為此語均非讞獄明允之道從前已經降㫖禁止而去冬刑部本中猶有此陋習夫治獄之道貴乎得中而司刑之官在乎執法今以一罪而引兩律則是法無一定而獄不得其平矣豈朕明刑弼教之意乎嗣後若再有兩引律條者外省督撫提鎮本章著通政使司駮囘將情由叅奏三法司本章著内閣駮囘將情由叅奏倘所犯之罪當引輕律而故意坐以重罪亦難逃朕之洞鑒内外執法臣工各凛遵毋忽欽此十一年議準凡引用律例務必情罪相符如律内數事共一條全引恐有不合者仍聽止引所犯本罪若一條止斷一事不得任意刪改以致罪有出入至律例無可引用援引别條比附者應令刑部㑹同院寺公同議定罪名於疏内聲明律無正條今比照某律某例科斷或比照某律某例加一等減一等科斷詳細奏明恭候欽定至都察院大理寺同為法司理宜一體詳慎嗣後凡應法司㑹議者刑部引律不確院寺即行察明律例改正院寺駮改未允三法司堂官㑹同妥議如院寺扶同朦溷或草率疎忽别經發覺將院寺官一并議處乾隆六年諭兩議之事間或一二人意見不同則可乃三法司本屬一體而與刑部判然兩議將來一衙門立一意見甚有闗繫著訓諭知之欽此又奏準凡三法司覈擬之案動輒兩議沿習成風闗繫非小嗣後三法司覈擬事件刑部定稾移送畫題如遇有院寺見以為應酌改者移知刑部刑部即速定期移知院寺齊赴刑部公同靣議主稾者不得狃成見而不移㑹稾者不得逞私心而自用務期細繹案情詳擬律例各秉虚公畫一定擬十一年奏準近來法司衙門㑹覈之案有兩議並陳者主稾衙門或又夾片申明前議之是指駮後議之非有闗政體實非淺鮮嗣後㑹議之案間有同異務於進本之前平心商確期於平允倘必不能畫一則兩議並陳靜候上裁不得夾片豫為申說十八年諭讞獄重案勅交三法司覈擬原期詳慎以昭平允其事屬衆議僉同固成信讞如或迹渉兩是有一二人不能盡歸畫一者自不妨各抒所見候㫖酌奪向來原未定有不準兩議之例夫讞一成而不變案情律意推校不憚周詳要歸一是而已固不得逞其偏見攘臂相爭而避立異之名茍且附和亦豈國家設官集議之本意且懦黠者流轉得藉口為蒿目無策嗣後三法司覈擬重案如有一二人意見不能相同者原可兩議具題但不得合部合院各成一稾朕欽䘏庶獄不厭博諮諸臣亦當悉袪成見勵乃靖共欽此一㑹審順治十年題準刑部審擬人犯有犯罪至死者亦有犯罪不應至死者若槩經三法司擬議恐於典例不合嗣後凡犯罪至死者刑部㑹同院寺覆覈十五年議準御史理刑是其職掌凡人命重情舊例刑部鈔招分送先閲文移往來虚費日月且事不同審稾不靣議豈能得平嗣後凡奉㫖三法司覈擬事件御史㑹同部寺靣審同議康熙二十七年議準凡㑹審重案刑部即將原供送該道看閲三十一年題準凡闗繫人命事件照熱審之例三法司公同㑹審一次具題雍正三年議準凡㑹審事件刑部移㑹到日該道滿漢御史各一人到部㑹同承辦司官取供都御史一人㑹刑部堂官錄供定稾刑部堂官畫題續送院畫題若有兩議五日内繕稾送部一并具題一熱審順治十八年題準凡遇熱審刑部㑹院寺官公審雍正元年議準凡軍流徒罪並旗人犯軍流徒罪折枷者槩不準減等其犯枷杖等輕罪人犯㑹同三法司仍照例減等發落笞罪寛免至部内見審案件審明減等十日一次彙題其人犯皆交該旗該地方官暫行保釋竢六月終送部發落如斬絞重犯内或有情罪可矜可疑者刑部㑹同院寺别行請㫖倘内外讞獄衙門有故意遲延恣行姦弊或妄為巧脱人犯者除本犯不準減等外將夤緣作弊之官吏嚴加治罪一秋審朝審雍正十二年奏準凡案内有不應如原擬罪名者㑹議官各據所見摘出别錄一單開列罪犯姓名注明作何改擬字様交與稽察之御史察看乾隆十四年奏準嗣後秋朝審時除掌道御史照舊與審外其餘御史遇審某省即令某道御史一同上班與審朝審令河南道今京畿道御史上班與審一廵視監獄雍正十二年奏準刑部南北二監皆繫重犯無論貧富務使一例辦理並交與都察院委滿漢御史各一人前往稽察如有苦樂不均等弊即行題叅將提牢司獄等官議處獄卒立拏嚴究又議準刑部南北二監十五道御史按月輪流差委稽察仍於月終將所委御史知照刑部轉飭司獄將羈禁人犯造具花名清册送該御史稽察乾隆九年議準各旗門監照稽察南北監之例每月令滿漢御史前往稽察如有弁兵陵逼營私者即行叅究治罪一勾決乾隆十四年諭向來勾到本章皆繫新資御史承辦此相沿陋例初無意義不過備員塞責非所以肅政典也今既分定十五道各有專職自應分省辦理嗣後凡遇勾到某省本章即著某道御史承辦近經去其冗複本章已簡其令該御史悉心詳對設有魚魯則咎歸御史其朝審令河南道今京畿道專辦欽此又諭朕因刑科三覆奏之例各省奏牘繁多迫於時日轉致不能詳覽徒事具文已命减去二覆以從務實今思勾決之時朕詳閲招册反覆斟酌辨論大學士在朕前一靣秉筆代勾一面聽受諭㫖雖殿廷咫尺自不至有舛誤但多經一徧親覽於勾決更為慎重嗣此著於勾到後將原本進呈覆覽再行批發所謂去無益而就有益著為例欽此一州縣揭報凡州縣原讞情罪果與律例脗合上司溷駮許承審官照抑勒交代例鈔錄原審供册並批駮案卷一并直揭三法司刑科察覈得實將偏私濫駮之上司照例議處如承審各官徇私瞻顧所擬情罪與律例不符以致上司批駮固執原擬不為改正遽揭三法司刑科者察實將承審官照官吏挾詐欺公妄生異議律治罪欽定大清㑹典則例卷一百四十七
