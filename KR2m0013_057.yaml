body:
  text: 户部蠲恤二一救災康熙二十七年覆準雲南鶴慶劍川二處地震該撫委官振濟壓斃者每名給銀一兩壓傷者每名給銀五錢倒壞房屋每間給銀二兩被災無棲止者每名給榖一石幼者給榖五斗動支常平積榖五十七年諭索倫人等於圍場效力甚屬年久見在亦有出兵之人聞被水災朕心深為惻憫將户部備用銀內動支萬兩前往散給將被災之人逐一察眀無房屋者即賞給房屋無衣服者即賞給衣服務令均沾實惠以副朕軫恤至意欽此五十九年覆準臺灣颶風大作傷損人民倒塌房屋照散振例散給其船壞淹溺兵丁照出征病故緑旗兵丁之例賞給雍正元年覆準河南中牟縣黃水漫溢武陟縣沁黃並漲衝塌房屋貧民共三千五百八户動支地丁銀每户給銀一兩六年覆準福建永定縣五月大雨山水驟發傍溪房屋人口被衝每大口給銀一兩小口給銀五錢倒壞房屋住房每間給銀一錢浮店每間給銀四分五釐八年諭昨午地震兵民房屋牆垣必有頽塌者其內外城居民每城令滿漢御史各一人分詢民間房舍倒塌牆垣傾頽者作速分别具奏朕將加恩賞給欽此遵旨察勘給中城銀七百八十四兩有竒東城三千五百十有六兩南城八百六十五兩西城萬二千三百六十兩有竒北城萬三千六百七十兩有竒均發內帑賞給乾隆二年題準地方倘遇水災驟至督撫聞報一靣題報一靣委官量撥存公銀會同地方官確察被災之家果繫房屋衝塌無力修整並房屋雖存實繫飢寒切身者均酌量振恤安頓如遇氷雹颶風等災其間果有極貧之民亦準其一例振恤又諭前因畿輔地方被水特命侍衛等前往振恤居民其各營汛防被水兵丁據議稱兵丁領受餉銀其房屋亦繫官給不應在振恤之內朕思兵民均屬一體此畨被水室廬坍塌妻子無依情殊可憫應每名量行賞銀二三兩為目前養贍以待官蓋營房著即傳諭振恤官員等酌量輕重作速妥協辦理欽此遵旨議準將營兵被水至重人口多者賞銀三兩被水稍重人口無多者賞銀二兩被水至輕人口少者賞銀一兩三年諭各省督撫身任地方皆有父母斯民之責於所屬州縣水旱災傷自應速為訪察加意撫綏朕前屢經降旨訓示該督撫等自能仰體朕心不致玩視民瘼稽延時日朕念水旱之災同宜振救而水為尤甚旱災之成以漸猶可先事豫籌水則有驟至陡發之時田禾浸沒廬舍漂流小民資生之策蕩然遽盡待命旦夕尤當速為拯救庶克安全不致流移失所見在成例分别極貧次貧其應即行拯救者原不待部覆但恐各省辦理不一或仍有拘泥遷延致災民不能及時沾惠者用是再降諭旨嗣後各該督撫可嚴飭地方官凡遇猝被水災迅文申報督撫即刻委官踏勘設法拯濟安置一靣辦理一靣奏聞務使早沾實惠俾各寧居以副朕憫念災黎之至意倘或怠玩濡遲致傷民命或有司奉行不力胥役侵蝕中飽以及藉名揑飾浮冒開銷等弊該督撫照例嚴參倘辦理未協積弊未除則咎在督撫將此永著為例欽此七年覆準江蘇所屬山陽等二十州縣夏秋被水衝坍民房十有四萬八千四百八十七間給銀搶修草房每間給銀四錢五分瓦房每間給銀七錢五分又覆準安徽所屬懷寧等二十六州縣被水衝坍民房六萬六千三百八十間照例分别瓦房草房按間給與修葺搶修之費又覆準江西興國贑寧都瑞金萬安龍泉等縣夏被水災淹斃人口衝倒房屋大口每口給銀一兩五錢小口八錢瓦房每間給銀八錢草房每間五錢八年議準四川西昌縣城鄉等處雨水衝沒民房瓦房每間給銀二兩草房每間一兩牆壁脫落三靣者給銀三錢脫落二靣者二錢脫落一靣者一錢淹斃人口每口給銀二兩九年覆準江南江浦六合等縣水衝民屋瓦房每間給銀七錢五分草房每間四錢五分淹斃人口每口給銀五錢十年議準上下江被災民房上江瓦房每間給銀四錢草房三錢次貧各減一錢下江瓦房每間給銀七錢五分草房四錢五分仍於定例之外每間各加銀二錢又淮安所屬阜寧縣水衝民房草房每間給銀六錢五分外每間加給三錢十一年議準陜西通渭縣水衝民房每間給銀五錢淹斃人口每口給銀二兩平涼縣水衝民房每間給銀一兩塌損民房每間給銀五錢秦州水衝民房每門給銀一兩壓斃人口每口給銀一兩十二年議準江南崇明縣風潮為災坍塌民房除瓦房草房於每間常例給銀外每間加給二錢又覆準山東鄒平等九十州縣衛所被水衝倒民房極貧每户給銀一兩五錢次貧每户給銀一兩再次貧每户給銀五錢十六年諭上年江安二省內有偏災之宿州鳯陽泗州長淮宿遷邳州大河海州等處各該撫業將本年應徴新舊漕糧題請分别蠲緩所有此項減船軍丁苫蓋食用之需未免拮據著加恩於定例折給半月之外再賞給二分以恤丁力欽此又諭據奏朝邑縣於六月十四五等日河水驟漲淹及居民輕重不等見在察勘分别振恤等語朝邑逼近黃河地夲窪下此次河水漲溢被災貧民雖經照例撫恤但其中有房屋家具糧食盡被淹沒者家室漂搖更可憫惻著該督撫察眀此等被災較重之户於常例外加恩賞給一月口糧欽此十七年題準湖南茶陵州及􅌕縣於乾隆十六年被水衝倒房舍七百十有二間每間給銀五錢草房二百六十七間每間三錢淹斃老婦每口給銀一兩幼孤每口銀五錢一拯飢順治二年題準八旗潦地每六畝給米二石又題準口外八旗蒙古地畝被災按飢民名口折給米銀許其沿邊糴米毋令進口又題準八旗遊牧地方被災人口每月給米一斗在張家口者給米古北口者給銀又題準王貝勒貝子公等府屬人役潦地振米照例支給其投充人帶來地不準給五年題準直省駐防官應給潦地米所留家口在京支給隨帶家口在駐所支給六年定八旗每嵗倚恃振給不務農桑嗣後停其踏勘如遇荒嵗王以下食俸官員以上每嵗照俸米倍給又定地方被災督撫即詳察頃畝分數具奏八年覆準山左江浙水災亟需振濟以倉榖振窮民以學租振貧士十年題準振恤旱潦地畝自王等府屬佐領以下至所屬旗人令該旗都統確察口數七嵗以上為一口六嵗以下四嵗以上為半口不得以投充及傭雇人充數又題準八旗貧人滿洲蒙古每佐領下給布六十匹棉六百斤米百石漢軍每佐領下給布三十匹棉三百斤米五十石十一年覆準八旗潦地令即振給到通漕米滿洲蒙古每佐領下給倉米二百石漢軍每佐領下給倉米百石不論有無俸糧該旗都統酌量散給又覆準八旗旱地每六畝給米二斛米折各半折色照時價支給又覆準看守南苑海户災地每六畝給米一斛是年發户禮兵工部庫貯銀十有六萬並內帑銀八萬兩分振直𨽻各府飢民十三年題準八旗滿洲蒙古每佐領給米三百石漢軍每佐領給米百石著該佐領領催親驗貧户給發其官員家人充兵者不準給又題準八旗被災地畝每六畝給米一斛是年發內帑銀三萬兩振濟直𨽻飢民十四年發內帑銀十萬兩分賞八旗兵丁及振濟直𨽻飢民康熙元年覆準八旗被水災地每六畝給米二斛蝗雹災地每六畝給一斛三年覆準振給八旗災地米京通各倉挨給駐防在外者行文該地方官支給九年特遣部院堂官往勘淮揚水災以鳯陽倉米麥及捐輸等各項米榖盡數振給如仍不敷即動正糧接濟十年遣部堂同江南督撫截留漕米並鳯徐各倉米振濟淮揚災民每名給米五斗六嵗以上十嵗以下給半各處同日散給以杜重冒之弊又題準江南淮揚府州縣分設米厰散給飢民每人日給米一升三日一放部差司官每府一人協同地方官親驗給放十一年覆準八旗旱災地每六畝給米二斛本折各半其折色照時價支給二十五年特遣大臣往鳯陽徐州等處發鳯陽倉銀米並動支附近州縣正項錢糧振濟二十八年諭振濟飢民關繫緊要著撥户部庫銀三十萬兩解交直𨽻巡撫速行振濟欽此三十年諭近因西安等處災荒撥發正項錢糧振濟著遣部院堂上官一人前往親行驗給務使飢民均沾實惠欽此又議準陜西西安鳯翔等府被災每大口日給米三合小口日給米一合五勺照時價折銀散給又覆準陜西西安府屬被災二十四州縣衛所鳯翔府屬被災三縣撥發山西省銀二十萬兩解赴陜西振濟大口日給米三合小口一合五勺照時價折銀給發至次年四月終停止又覆準直𨽻被災井陘等十四州縣將積榖振濟大口日給米四合小口日給二合三十三年直𨽻霸州文安等十州縣被災將各州縣見貯備振米糧委道官按日給發大口日給米三合小口日給一合五勺自二月初一日起至四月終止三十六年諭直省被災地方著差户部賢能司官一人會同該撫等逐一親行確勘具奏欽此三十七年諭山東濟兗東三府屬比嵗不登米價騰貴令保舉賢能司官二人前往會同該撫一靣振濟一靣奏聞欽此四十年覆準陜西甘肅河州所屬土司旱災照內地每大口月給米一倉斗小口月給五倉升四十二年江南鳯陽府屬亳州等州縣衛振濟飢民大口每名日給米五合小口日給二合又議準山東振濟飢民差户部賢能司官馳驛速往截留漕運尾船米五十萬石交與山東地方官並委八旗官貟各支庫銀三千兩前往山東會同地方官振濟飢民又諭振濟山東飢民事關緊要應分為三路每路差大臣一人與先差往司官一同往返巡察於事有益截留漕糧亦屬緊要漕運總督見今無事著作速前來親看截留其振濟飢民官員所領雖繫公項若勉力自效有益於民事竣回時一併議敘欽此四十三年覆準湖廣監利縣被災將常平倉榖每大口日給榖一升小口日給六合自十一月起至次年二月止四十六年諭江南地方頻年雨㿩時若百榖用成閭閻黎民咸得遂生樂業但民間夙鮮蓋藏禦荒無術一遇歉嵗即有匱乏之憂朕屢次南巡素所洞悉今年自夏入秋雨澤愆期該督撫先後奏至因念小民久未被災驟罹荒旱所關甚巨隨命九卿等速同詳議應行事冝業經飭令停徴並發倉榖振濟顧倉榖數少未足遍給惟各州縣截留漕米可以實惠及民目下時已屆冬總漕無事著會同總督巡撫親往各州縣被災地方備加察勘將夲年所徴漕糧每州縣或留八九萬石或留十萬石酌量足支振給之數分别多寡存留支散及今漕米尚未開兌截見收之糧以濟待哺之衆實於民生大有禆益此朕殷殷懷保赤子軫念如傷之至意户部即移文該督撫等實心奉行仍開具振濟實數奏聞欽此四十七年覆準江南淮徐揚三府屬水災倉無存榖將司庫四十七年截留平糶銀動支十萬兩振給大口月給銀三錢小口月給一錢五分四十九年議準福建泉州漳州地方被旱災將今冬應運鎮江漕糧截留十萬石運至狼山松江湖州漕糧各截留十萬石運至乍浦令福建總督選賢能總兵官二人親帶大小戰船至狼山乍浦交割運至漳泉等處散給五十三年覆準陜西甘屬去嵗薄收於附近存貯糧內撥振自二月起至六月止每大口日給米三合小口日給二合五十四年議準遣大臣一人巡察甘肅被災地方銀米兼行振濟五十九年議準動户部庫銀五十萬兩委司官運送西安延安蘭州分作三路散振並將陜屬各州縣衛所廳常平倉糧六十九萬二千石有竒甘屬各州縣衛所廳常平倉糧六十七萬二千石就近酌量散給除歉收地方外如有應行散給之處一靣題報一靣會同散給再旗民有情願效力人員許自備銀米赴部具呈將職名送散振官處俟效力事竣照銀米數之多寡核明議敘六十年諭今春雨澤甚少備荒要緊著發帑金五十萬兩差大臣往山陜地方買米振濟欽此六十一年特遣大臣振濟直𨽻贊黃等處四十二州縣飢民並發米各州縣煮粥振濟雍正元年覆準東省連年荒旱動用庫銀委官會同該地方官按名散給著振濟三月有鄰省就近覓食窮民亦一例散振又覆準浙江富陽等縣衛被旱乏食飢民按口煮振至來年麥熟停止又議準直𨽻河南二處各遣大臣一人會同該撫將乏食窮黎速動常平倉榖察眀户口振濟如常平倉榖不敷將分貯監榖及截留漕米振濟其耕種無資衣食匱乏者酌量資給至携家覓食不能回籍者令直𨽻山東河南巡撫察眀加意撫綏招輯復業仍將振過大小户口米榖數目造册報部察核如有不肖官員侵蝕肥己並遲延遺漏者即令遣往大臣指名題參三年諭今嵗直𨽻地方被水小民乏食朕軫念維殷已截漕發倉多方振恤但恐停振之後正值東作之時農民謀食無策著再加振一月如從前所發之米不足振糶著確察奏請增發米糧欽此又覆準江南睢寧宿遷二縣水災動支積榖自十月初一日為始煮粥散振五月又覆準直屬霸州等七十二州縣廳所秋禾被水散振三月大興等四縣雖勘不成災小民被水乏食亦量振一月四年覆準江南安徽所屬之無為望江等州縣被災窮民冬寒乏食煮振五月其應振米榖於鄰近州縣積榖內撥給五年遣大臣御史分往直隸被災玉田等二十三州縣逐户計口悉心勘察發帑散振六年覆準監振各官遵例減從無擾經承造册紙筆飯銀之費令各州縣量給又議準地方被災督撫等嚴飭各屬親勘填册按户給振毋得假手胥役里甲徒滋侵蝕又議準凡拯濟飢民近城之地仍設粥厰其逺在四鄉於二十里之內各設米厰一所照煮振米數按口一月一領七年議準遇災振濟之後即將振過銀米數目户口姓名月日刋刻告示通行曉諭以杜吏胥中飽八年覆準山東被災動榖散振大口月給榖三斗小口月給一斗五升各給三月又覆準西寧州夏旱振濟大口日給粟米六合小口日給三合又奏準北河水勢漫溢直𨽻順德廣平大名河間四府所屬州縣被淹之處居民遭值水患遣侍郎副都統科道翰林等前往分為四路每路各於户部領帑銀二萬兩察勘振濟若有動用倉榖之處即將本地倉榖動用奏聞九年江南邳州等處被水振濟三月十一年諭上年江南沿海被水地方如常熟等二十三州縣並續報之華亭等六縣該督撫等已遵旨撫綏振恤定議大振三次每次以一月為期料寒冬初春以來窮民存飬有資不致失所矣朕思二三月間正青黃不接之時尚須籌畫接濟資其力作庶可無誤春耕著再加振四十日以昭格外之恩其有從前遺漏貧民並先可糊口而目下力不能支者亦著察眀增入補振之內再被災之鹽場竈户亦照貧民例加振一月該督撫鹽政等務須督率有司實力奉行使被水之家均沾恩澤以副朕恤災拯困之至意欽此乾隆元年諭地方偶有水旱之事凡察勘户口造具册籍頭緒繁多勢不得不經由胥役里保之手其所需飯食舟車紙張等費朕聞竟有派纍民間並且有取給於被災之户口者若遇公明之有司尚知稽察禁約至昏憒慵懦者則置若罔聞益滋閭閻之擾矣嗣後直省州縣倘遇察勘水旱等事凡飯食盤費及造册紙張各費皆酌量動用存公銀毋許絲毫派纍地方若州縣官不能詳察嚴禁以致胥役里保仍蹈故轍舞弊蠹民者著該督撫立即題參從重議處欽此又議準被災各屬飢民咸使得所惟貧寒士子不在齊民振恤之列原以鄭重斯文但貢監生員實有赤貧乏食者令報明該教官造册轉送地方官按其家口量加撫恤並飾教職不得徇情詭冒挾私二年覆準州縣散振假手書役米糧多雜沙土斗斛不能足數皆由有司漫不經心之故令該管上司察出嚴參議處三年諭各省學田銀糧原為散給各學廪生貧生之用但為數無多地方偶遇歉年貧生不能自給往往不免飢餒深可憫念朕思士子身列膠庠自不便令有司與貧民一例散振嗣後凡遇地方振貸之時著該督撫學政飭令教官將貧生等名籍開送地方官核實詳報視人數多寡即於存公項內量撥銀米移交夲學教官均勻散給資其饘粥如教官開報不實給散不均及為吏胥中飽者交督撫學政稽察即以不職參治至各省學租務須通融散給極貧次貧生員俾霑實惠欽此又議準辦振各官如果有實心實力潔己愛民使被災黎庶不致失所者督撫保題撫綏得宜辦事妥協者督撫分别題請議敘其有不實力奉行釐剔弊端致小民不克均沾實惠者督撫題參至若私徴勒派扣剋侵肥應據實指參計贓科罪不得概準限內完贓減免其應追銀著落賠補又覆準甘肅地處邊隅從前辦理軍務需糧浩繁倉貯未能即裕倘一時偶被偏災倉糧不敷以及鄰邑窵逺勢難接應應以銀折給者行令該督撫臨時酌量時價奏聞辦理四年諭上年江南地方收成歉薄民食維艱朕宵旰焦勞多方籌畫惟恐一夫不得其所據部臣與該督定議振濟之例極貧户口振四月次貧者振三月又次貧者振兩月皆以本年二月為止朕思三四月間正青黃不接之際在官倉雖有平糶之米而無力窮民仍苦糴買無資難以糊口良可軫念下江地方著將極貧之民加振一月上江去嵗歉收較下江為甚著將被災五分以上之州縣加振極貧次貧者二月被災四分以下之州縣加振極貧者一月該部可即行文該督撫豫先籌辦米榖並飭有司實力奉行俾閭閻均沾實惠欽此又覆準直𨽻被災地方於定議振恤之外將災重之地各户加振一月災輕之地老弱貧民加振一月又覆準直𨽻天津河間文安靜海大城雄縣積水未涸之地內有將來易涸之一百十有四村莊加振一月其深窪難涸之一百三十二村莊加振兩月又覆準振災之時飭令地方官豫將被災分數及振恤事宜先行宣示俾愚民洞悉規條如有聚衆囂陵情弊督撫確訪果繫有司玩視民瘼即行參劾若姦民藉端要挾以及縱容婦女生事即按律分别究擬毋得遽揭屬官致長澆風五年覆準安徽所屬泗亳宿三州靈璧虹阜陽潁上蒙城五縣極貧次貧及又次貧災民加振一月又議準各省振濟米數每名日支三四合或至七八合不等其間數目參差見無成規嗣後大口日給米五合小口日給二合五勺多少適中著為定例又議準凡遇年嵗災歉遊手貧民與力田之民一例與振六年覆準江南所屬江浦六合海州沭陽極貧災民加振兩月次貧災民加振一月清河桃源安東銅山沛宿遷極貧災民加振兩月七年諭今嵗六七月間江南淮徐揚州一帶淮黃交漲水勢漫溢甚於往時朕已屢降諭旨令該督撫等加意撫綏見又命大臣前往會同辦理兹據該撫奏稱揚州目下河水日逐增長民間自中人之家以及極貧下户皆流離四散雖有平糶之官糧撫恤之公項亦不能奔走領糴似此情形實非尋常被災可比朕心深為軫惻該督撫等不得拘於常例務須多方設法竭力拯救使災黎稍可資生以俟水退倍加撫綏俾得安其故業毋致失所欽此又覆準山陽阜寧清河桃源安東五縣當上年夏秋兩次失收之後今夏麥又被淹即補種雜糧秋成尚早極貧之民除先行撫恤一月外應加振兩月次貧之民普振一月極貧從七月至八月次貧八月一月動用常平倉項每大口月給米一斗五升小口七升五合榖則倍之淮安大河二衛被災飢軍坐落州縣一例分别振恤又覆準江蘇所屬秋災被水最重之山陽阜寧安東清河桃源銅山沛邳宿遷睢寧海沭陽十三州縣極貧之民先撫恤一月甘泉髙郵興化寶應泰鹽城六州縣不分極貧次貧皆先撫恤兩月極貧自十月起振四月次貧自十一月起振三月次重之六合江都二縣極貧自十一月起振三月次貧自十二月起振兩月稍輕之江浦豐碭山贛榆四縣極貧自十一月起振兩月次貧自十二月起振一月淮安大河揚州徐州四衛隨坐落州縣一例撫恤振濟又覆準安徽所屬之鳳陽臨淮懷逺定逺宿虹靈璧鳳臺夀阜陽穎上霍邱亳蒙城太和泗盱眙天長五河十九州縣被夏災飢民於七月撫恤被秋災飢民於八月撫恤夏秋連災者接撫兩月被災最重之地極貧之民撫恤畢即於九月起振四月次貧於十月起振三月次重之地極貧於十月起振三月次貧二月稍輕之地極貧於十一月起振二月次貧於十二月起振一月鳳陽衛鳳陽中衛及長淮宿州泗州共五衛皆隨所坐州縣一例撫恤振濟又覆準江蘇所屬之銅山沛邳宿遷桃源清河安東海沭陽等九州縣續罹水災沛縣近城一帶原報次貧者轉成極貧應先加振十月一月又諭江南上下兩江有疊被水災之州縣朕心深為軫念己命大臣前往會同該督撫加意撫恤以蘇民困又思此等地方百姓於積困之餘又罹災患非加恩於常格之外不足以振阽危其最重者著於定例應振月分之外加展三月其次者著於定例應振月分之外加展兩月至於災至六分次貧不振者亦賞振一月其被災屯衛軍丁著照坐落州縣一例加展月分又無業貧民乏食生監各隨所居鄉村準其照例領振其應於何時開振該撫即酌量情形舉行務委賢能有司官殫竭天良實力撫恤其下江被災等處即著欽差大臣會同該督撫照此旨酌量辦理務使災民均沾實惠欽此又諭向來外省地方災荒有司辦理不善每將應振人數有意裁減以致人多振少國家雖沛恩膏而小民仍有不免飢餒者今年江南被水甚重且當連年災荒之後更非尋常可比凡屬應振災民務須將大小口數據實造册不得仍踵前弊致有遺漏可速傳諭欽差大臣及該督撫加意稽察轉飭有司實力奉行欽此又諭江南山陽阜寧安東清河桃源淮安大河等七縣衛疊被災祲黎民困苦自應格外施恩著將夏災所振米價準與秋災一例報銷每米一斗折銀一錢二分欽此又覆準直𨽻磁州等八州縣貧民於常例外加振一月又議準地方如遇水旱即行撫恤先振一月再行察明户口被災六分者極貧加振一月連撫恤共兩月被災七八分者極貧加振兩月連撫恤共三月次貧加振一月連撫恤共兩月被災九分者極貧加振三月連撫恤共四月次貧加振兩月連撫恤共三月被災十分者極貧加振四月連撫恤共五月次貧加振三月連撫恤共四月又覆準若地方連年積歉抑或災出非常將凡屬應行振恤事宜該督撫因時因地妥議題明除偶被偏災照例振濟外其有不能照常辦理者或將極貧加振自五六月至七八月不等次貧加振自三四月至五六月不等又議準山西湖廣貴州等省原不分别極貧次貧山東陜西等省止分别極貧次貧皆按月給振惟江南浙江等省原分為極貧次貧又次貧三項但被災待振每至數千户分為極貧次貧易於察驗至又次貧一項與次貧相去無幾不便酌減振恤致有偏枯且逐一察案分晰未免耽延振期徒滋胥役煩擾應止分為極貧次貧其又次貧即列於次貧之內一例辦理八年諭上年江南淮徐鳯潁等府遭值水災朕宵旰焦勞無一時釋於懷抱特遣大臣會同督撫百計經營不惜千萬帑金期登斯民於袵席頃據陸續進報被水之地漸次涸出冬間可以種麥石林決口亦已堵禦水勢減落朕心稍慰但念兩江受水之地甚廣其見在已經涸出者民間努力耕種自不待言其沮洳將涸者開春布種春麥大麥及雜糧之屬亦可冀望有收惟是最窪之地積水較深有非人力所能計日宣泄者倘春月不能趕種春麥雜糧而停振之期已屆窮民何以為生朕思慮及此深為憫惻著欽差大臣及該督撫將實在不能涸出補種之地一一察勘所有飢民口數若干按其情形酌定月分接續振恤毋使失所欽此又諭山東今嵗偶被偏災見在開倉振濟但積貯未能在在充裕如有倉榖不敷之州縣勢必銀榖兼振向例折銀五錢作榖一石按口散給朕思東省被災之地榖價必昂五錢之價恐