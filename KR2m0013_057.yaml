有收惟是今年閏月節候較遲麥秋尚早例振之期已將屆滿窮黎糊口之資更宜豫為區畫著該督撫等就各州縣衛災地重輕察明極次貧户再行分别加振一月兩月其無庸加振者仍酌量平糶以濟民食一靣督率所屬實力察辦一靣奏聞欽此又諭上下兩江被災州縣已疊次加恩前因今年遇閏恐青黃不接之日民食拮據傳諭該督撫察明酌量再加振恤今據奏請分别加振平糶著照所請將上江之宿鳯陽臨淮懷逺虹靈璧泗盱眙五河等九州縣長淮鳯陽泗州等三衛下江之阜寧鹽城興化海沭陽山陽清河桃源安東髙郵泰甘泉寶應銅山沛邳宿遷睢寧等十八州縣鎮江淮安大河揚州徐州等五衛無論極次貧户皆再加振一月其餘災輕州縣仍及時平糶以資接濟該督撫等其督率所屬加意拯恤務使災黎均沾實惠欽此又覆準安省夀定等州縣乾隆十七年秋被水災共振過貧民貧軍貧生銀五萬二千六百六十九兩有竒二十年諭江南淮徐等屬連年被水原繫積歉之區今窪地又被水淹民力必致拮據朕心深切軫念著該督撫等速行察明被水州縣貧民應振恤者分别振恤所有涸出地畝尚可補種秋禾者即行借給耔種速令補種務俾口食有資災黎不致失所欽此又諭江蘇等各府屬今年被水成災朕心深為軫念己屢經降旨截漕撥粟俾振糶所需務從寬裕其應振户口並令銀米兼振但該處見在糧價稍昂著加恩每米一石加給銀二錢以敷買食至本年應運漕糧除已截留外見屆開徴該省既經被水米色顆粒自當稍減所有交倉之米並著不論紅白秈粳地方官酌量可收一體準豫收兌此等米俟兌運抵通即先行撥放俸餉該部遵諭速行欽此又諭浙江杭湖紹等府屬今秋雨水過多偶被偏災朕屢降旨令該督加意撫綏蠲緩並截漕偹用見今已屆冬令災民口食維艱朕心深為軫念著將被災較重之山隂會稽餘姚上虞安吉五州縣極貧加振三月次貧加振兩月仁和歸安烏程德清長興武康諸暨蕭山八縣曹娥金山鳴鶴下砂四場湖州守禦一所被災稍輕之處極貧加振兩月次貧加振一月並準其銀榖兼振該處見在糧價稍昂若照例酌給猶恐小民不敷買食再著加恩每榖一石折銀七錢每米一石折銀一兩四錢該督撫等分委妥員實力察辦毋任胥吏乘機侵扣務使災黎均沾實惠欽此又覆準蘇屬上元等州縣乾隆十七年夏秋水旱風潮田禾被災共振濟災民銀七千七百六十六兩六錢又振恤倒房銀二千八百九十八兩各有竒應準其照數開銷又覆準安省泗盱等州縣乾隆十九年秋禾被水振過貧民貧軍銀一萬八千八百六十六兩六錢有竒一平糶順治十七年議準常平倉榖春夏出糶秋冬糴還平價生息務期便民如遇凶荒即按數散給災户貧民飭有司實力奉行康熙三十年覆準直屬所捐米榖大縣存五千石中縣四千石小縣三千石倘遇荒歉即以此項給散其留倉餘剩者皆於每年三四月照市價平糶五月初旬將平糶價銀盡數解貯道庫九月初旬各州縣仍領出糴新榖還倉三十三年諭各州縣積貯米榖減價發糶於民生大有禆益霸州等被災地方所積榖除散振外餘著減價發糶其沿河一帶景州等各州縣衛著將山東漕米每嵗截留二千石亦發糶以平米價欽此四十年題準截留楚省漕糧四萬五千石分發淮安等處平糶以濟民食四十二年議準將山東附近州縣漕糧截留二萬石運送被災州縣減價平糶雍正三年議準廣東於通省府州縣存倉榖數多者開倉平糶即將價銀付榖少之州縣糴榖存貯其有虧闕者嚴追完補再廣西桂林等府捐榖糶三價直不必糴榖還倉仍買榖運交廣東分貯四年議準平糶之時如有姦商勢豪居積射利者即時訪拿按律治罪該州縣官不嚴行察禁該督撫題參交部議處又議準凡有平糶州縣多立厰所各豫定日期令附近村莊居民赴厰糴買該州縣官親行監糶毋使窮民有逺涉守候之苦又議準州縣官有將平糶米榖雜以灰沙者一經察出或百姓首告該督撫即指名題參徔重治罪其所糶倉榖或積貯年久及零星量糶稍有虧折各州縣據實詳報每石準銷三升該督撫核實稽察倘有揑報者亦即指參交部治罪十一年諭前據直𨽻奏請順天天津等七府五州酌量運米以備平糶並將所存倉榖存七糶三以濟民食朕已允行今思此時正當青黃不接糧價漸昂各處皆有常平倉榖其存貯倉榖萬石以外者準其存七糶三萬石以內者準其於糶三之外酌量加增若存貯甚少者或增運北倉漕米或撥領鄰近倉儲務令各處米價得平小民易於糴買欽此十二年議準地方偶遇歉收即動本地方積貯倉榖減價平糶或存七糶三尚有不足則酌量詳報不必拘定糶三之數十三年議準平糶常平倉榖凡遇價直偶貴各該州縣酌定賣價一靣開糶一靣詳報乾隆元年諭積貯平糶之法原以便民乃聞各省州縣於倉榖出入竟有派纍百姓者當出糶之時則派單令其納銀領榖若干及買補之時則派單令其納榖領銀若干納銀則收書重取其贏餘納榖則倉胥大肆其勒抑每至以黴爛之榖充為乾潔小民畏勢不敢不領惟有隱忍賠纍而已更有山多田少之地産榖無多而該地方官不能向他處採買但按田畝册籍核算發價派令百姓將田畝嵗收之榖交倉絶不為民間計及蓋藏至有十餘畝之田而亦責其承買米榖者在附郭居民去倉不逺尚可就近轉輸至於逺鄉僻壤離城百里或七八十里之遙亦一概令其領銀納榖小民負戴越嶺登山窮日之力始至交納之所而姦胥蠹吏又復任意留難及平糶之日窵逺鄉村更不能均沾實惠是不蒙積貯之益而徒有轉運之苦良法美意行之不善以致流弊種種其作何變通使閭閻實受其惠而無有擾纍各該督撫大吏當悉心籌畫令有司實力奉行以副朕愛飬斯民之至意欽此又議準地方年嵗豐歉不常時價低昂不一如該州縣連年豐收平糶之時時價較前常價略有增長即照常價減糶以為出陳易新之計如遇歉嵗時價髙昂民食維艱若糶賣之時先恐不敷買補而稍為減價虛應平糶之名於民食仍無禆益應令歉收時大加酌減以濟民食三年議準出糶倉糧如遇歉嵗平糶酌量於鄉鎮村莊增厰糶賣豐年仍在城中發糶並令貧户齎甲牌赴糴分圖輪買又覆準陜省甘肅平糶倉糧除在城在鄉見在倉厰分貯地方臨時平糶外其餘村莊鎮堡酌量道路逺近於適中之地設厰運糶不必增建倉厰致滋糜費又議準衝要之所東西南北分設各厰老幼男婦令其分路出入不使擁擠守候豫期先將時價減價實賣若干之處榜示曉諭至於鄉村市鎮離城窵逺將倉榖運往酌量鄉户多少以定糶榖之數其監糶之人一邑佐雜無幾既須在城監糶勢難兼須應飭地方官即於本地襟耆內擇其篤實謹飭有身家者申報上司委其辦理有成效者給奬不肖者斥之又議準平糶除近城二十里以內仍聽赴城就糴其二十里以外按地方廣狹於適中之大鄉鎮分設糶厰將米榖運往遴委教職佐二監看不得専任衙役又議淮平糶之時應令貧户各齎門牌赴厰驗糶保甲稽察糶給之數每户以二斗為率不許過多六年諭國家設立平糶之法乃惠濟貧民第一要務但恐發賣官榖之處與鄉村相隔遙逺則小民赴糴為艱是以乾隆二年因直隸山東平糶濟民曾降諭旨如離府縣城郭路逺鄉村有司當設法運糶倘腳價無出或動存公銀或動正項錢糧今年江浙地方有被災之州縣明年麥秋以前非平糶不能接濟民食該督撫務飭有司審度道路之逺近將倉米四路分糶以就民便著各該督撫妥協辦理欽此七年諭徔前蘇撫奏請減價糶榖於成熟之年每石照市價核減五分米貴之年每石照市價減一錢此蓋欲杜姦民賤糴貴糶之弊也但思尋常出陳易新之際自應遵此例行假令荒歉之嵗榖價甚昂止照例減價一錢則窮民得米仍屬艱難不沾恩澤嗣後著該督撫臨時酌量情形應減若干豫行奏聞請旨如有姦民賤糴貴糶之弊嚴拿究治欽此又諭各省凡遇嵗歉米貴之年著該督撫即飭地方官多出倉貯減價平糶務期有濟民食毋得拘泥成例欽此又諭各省地方每遇歉收米價昂貴國家動發倉儲減價平糶乃飬民之切務然有司經理不善即滋弊端是以乾隆四年有奏請減價糶榖於成熟之年每石照市價減五分米貴之年每石照市價減一錢者本年二月間特降諭旨令該督撫等於地方歉收平糶之時酌量情形應減若干豫行奏聞請旨今朕再四思維地方當飢饉之時黎民乏食朝廷百計區畫方且開倉發粟急圖拯濟一振再振以安全之豈有於平糶一節豫防姦民之賤糴貴糶不為多減價直而使嗷嗷待哺之窮民仍復艱於糊口乎况赴倉糴買官米與赴店糴買市米其難易判然又可歷數銀色有髙低之不等等頭有輕重之不同道里有逺近之各殊守候有久暫之莫定此在平時且然何况年荒乏米之日若官價照時價略為少減則所差幾何是國家徒有平糶之恩而閭閻未受平糶之益也朕痌瘝在抱言念及此再明白曉諭嗣後務將該地方實在情形必須減價若干方與百姓有益之處確實奏聞請旨至於姦民當歉收之年圖利囤積將官榖賤糴貴糶則惟在州縣官嚴行察拿倘或疏漏隱匿該督撫即刻嚴參徔重治罪欽此又議準各省荒歉之嵗窮民待哺孔殷向奉恩綸準其大加酌減閭閻已沾惠澤惟是各省道里逺近不等情形緩急不同若必俟奏請之後始行減糶恐小民不免守候之苦應通行各省如遇荒歉之嵗督撫審其實在情形將必須減價若干始於生民有益之處一靣奏聞一靣辦理十五年諭朕明春巡幸江浙曾經降旨每省各截留漕糧十萬石以資平糶之用今據浙撫奏稱溫台各屬今嵗秋收稍薄米價未免增長等語著將浙省乾隆十五年漕糧再截留五萬石俾糶用充裕民食有資所有截留撥運事冝仍著該撫詳悉酌籌妥協辦理欽此十六年諭京師米價較往年漸覺昂貴向來八旗米厰原為平減市價而設但照舊發糶恐尚不足以資調劑徔前曾因米貴增設厰局遣乾清門侍衛等分局監糶今雖不至如甚貴之年但米價既昂應酌量增設米局自於民食有益著在京總理事務王大臣速行定議一靣辦理一靣奏聞欽此遵旨議準八旗內務府二十七米局並五城各厰應令該管官實力奉行如米不敷陸續赴倉支領倘有姦户囤積旗民爭糴以及各局厰重等稱收等弊令各旗都統步軍統領都察院五城御史順天府尹嚴行察拏究治見在京師米價老米每石一兩六錢五分稄米倉米皆每石一兩五錢五分若僅照從前奏準每石減時價一錢平糶似不足以資調劑請照乾隆十三年之例老米每石定價一兩四錢稄米倉米每石定價一兩二錢糶賣之米銀錢兼收再京外各米價亦未平減農民買食維艱請於四路同知駐劄之處分設四厰各發米二千石即令各該同知就近經管平糶並令通永霸昌二道督率辦理酌委科道官四人各部賢能司官八人前往督察其米悉照京厰定價零星糶賣多不過一石並酌量分設米厰毋致擁擠務須嚴密稽察勿使姦民囤積如該地方官稽察不周致滋弊竇該科道察出參處至八旗五城米局並各鄉增設米厰應需之米令倉場侍郎每米千石發老米二百石稄米倉米各四百石以便民食其四鄉需用米即速分倉照例撥車運送四路同知所有一應稽察平糶各事冝均照乾隆九年之例辦理又諭前因京師米價騰貴朕經降旨於京城及四鄉分設米厰減價平糶今回鑾至京聞市價仍復稍昂目前麥收雖近尚未登場正資米接濟著再撥米十萬石照前所辦平糶章程辦理以裕民食欽此又諭前因京師米價稍昂經朕屢降諭旨特撥倉米於城鄉分局平糶以濟民食但念京師內外既有八旗及五城平糶米局又經賞給兵丁季米米糧充裕易於購買惟四鄉地方所設米厰僅各一處其村莊僻逺者未免往返艱難當此青黃不接之候需米孔殷應照乾隆二年之例俾四鄉增設米厰得以就近糴買更為有益並遣御前侍衛前往督察如有姦徒市儈乘機射利私販囤積者著順天府步軍統領衙門多差巡役嚴行察拏從重治罪其如何分撥米增設米厰之處著軍機大臣速議具奏欽此遵旨議準見蒙聖恩賞給八旗兵米一季即於閏五月開放將來京城內外米糧自必充裕八旗五城毋庸更行撥糶此次酌撥米十萬石悉運往四鄉平糶以便民食又諭浙省溫台等處米價昂貴本地存倉米榖不敷平糶著江浙二省督撫於浙省及江省稍近州縣常平倉榖內酌量應需數目作速撥動碾米運往溫台等屬接濟平糶其平常闕額即於浙省冬兌漕糧內照數截留撥補還倉欽此又諭據浙撫奏稱浙省見資糶振請於湖廣兩省撥榖碾米協濟若繫額外溢榖即補浙省未足之額若繫額榖則將浙省見存糶價解楚歸欵等語著照所請令楚省督撫酌量撥榖碾米二十萬石即著浙省委官前至漢口接運赴浙以備振糶之用欽此十七年諭江西南康九江廣信饒州四府屬上年收成歉薄經冬及春雨雪嚴寒糧價益貴朕心深為軫念著該撫速行妥協籌辦或就近動撥倉糧大為減價平糶或即賜以一月振恤總不必拘定勘不成災常例務俾窮黎得續饔飱不致失所欽此二十年諭地方被災米貴所賴商販流通接濟是以向來嚴禁遏糴前復諄切訓諭封疆大吏宜以救患恤災為心豈可妄分畛域總河於修防事宜是其専責民間災振本非所職乃竟出諭禁止販運雖邀淮屬一隅感頌而罔顧他郡之嗷嗷殊屬糊塗不知政體著交部嚴察議奏欽此一貸粟康熙三十年諭山西平陽府嶽陽等八州縣被災人民將五臺崞縣儲米借給欽此又覆準山西平陽府屬夏聞等十五縣再將太原大同二府屬買貯捐米借給三十一年覆準山東存貯捐榖二十八萬九千餘石酌量借給窮民接濟春耕又覆準山西夏聞等縣捐項將竣飢民日增各州縣有分貯米價令借給窮民又覆準陜西西鳯二府屬疊遭荒旱動州縣捐銀借給以為種耔之用三十五年諭直隸寶坻等州縣被水今年錢糧業已免徴無可蠲恤該撫責成賢能地方官確察實繫窮民借支倉米務令均沾實惠不致流離失所欽此三十八年覆準直屬贊皇縣向因土賊為害居民悉多逃避今漸歸鄉里失業已久資生無術暫動倉糧借給牛種耔粒四十一年覆準將西寧運送西安糧米借給本地窮民又覆準山東海豐等州縣被水於積貯糶三存七米榖借糶並行以濟窮民四十二年覆準將盛京所貯米榖酌量借給捕牲烏喇虞人四十三年覆準河南見存倉榖每年將一半存倉備振一半借給窮民四十五年題準畿輔米價漸昂已將常平倉米榖動十分之三減糶其有實在窮民無力買米者亦於三分之中酌量借給四十七年題準河南各州縣常平倉存貯米榖每年三分之一出陳易新令將新貯倉榖亦照常平倉之例不必限定借數隨民便借給六十年覆準直隸大名府長垣等四州縣因黃沁水溢秋禾被淹貧民乏食該州縣將存倉米榖借給如有不敷於截留漕米內動支又覆準黑龍江兵丁水手人等所種地畝被災借給口糧又覆準陜西甘肅五十九年夏秋被災今值春耕撥解庫銀二十萬兩借給耔種雍正三年覆準東省曺縣魚臺縣黃水漫溢被淹窮黎難於度日暫動常平倉榖酌量借給又覆準直省州縣遇借給民糧之時有貧乏兵丁需借米榖者該管官詳報督撫一靣報部一靣批行該州縣察驗得實取具該管官辨印領借給又議準出借米榖務令各州縣官按名靣給秋熟之後按户繳還若吏胥蒙溷揑名虛領追欠無著將揑領之胥吏從重治罪其所欠米榖即於該州縣官名下追還並照失察例治罪七年題準廣東潮州城守饒平平鎮三營照例於青黃不接時將買貯倉榖借給窮兵八年題準陜西西安縣蔚州蔚縣被旱被雹居民乏食動用存倉社榖蔚州並動用存貯晉省兵米酌量借給乾隆二年諭各省出借倉榖於秋後還倉時有每石加息榖一斗之例如地方本非歉嵗循例出陳易新則應照例加息若值歉收之年國家方振恤之不遑非平時貸榖者可比至還倉時止應完納正榖不應令其加息將此永著為例欽此三年題準粵東各屬民借社倉米榖槩行停止加息豐收之年每石加耗三升如遇收成稍歉即將應加耗榖一并免其交倉又議準各省出借倉榖仍照舊例分别年嵗豐歉收息免息至廣東福建等省向不收息者令照舊辦理四年議準出借米榖除被災州縣毋庸收息外如收成九分十分及收成八分者仍照舊每石收息榖一斗其收成五分六分七分者免其加息又議準出借米榖如本年收成五分者緩至來年秋後徴還收成六分者本年先還一半次年徴還一半收成七分者本年秋後免息徴還收成八分九分十分者本年秋後加息還倉六年諭自上冬及新正以來直隸山東山西河南陜西五省陸續奏報均得瑞雪春日載陽土膏滋潤播種不可後時著五省督撫轉飭有司勸導小民努力東作其有貧乏之家耔種不足者量為借助欽此七年諭上江鳯潁泗三屬連年被潦民困為甚著將三屬已振貧民再借與口糧一月其正月止振之處去麥秋尚逺最貧之民借與口糧兩月至五分災不振者定例於春月酌借口糧統於秋成還倉若近處米榖不敷由逺處撥運恐緩不濟急即照例用銀折借欽此又覆準江蘇所屬之江浦六合山陽阜寧清河桃源安東淮安大河興化銅山沛蕭邳宿遷睢寧海沭陽共十八州縣衛雨雹水溢傷損二麥秧田各州縣衛除興化一縣外其餘皆繫上年被水之後貧民補種秋禾皆屬艱難應於常平倉項下或動米榖或動糶價借給耔種口糧所借倉糧秋成免息還倉又題準鳯陽臨淮等二十四州縣衛被淹地畝將來涸出貧民不能自偹麥種於附近豫省購買二麥借給百姓俟豐收之後分兩年交還又諭江南被災之後著有司勸諭災民愛護耕牛官借給草價以資牧飬欽此八年諭江南淮揚徐鳯頴泗等五府一州上年水災甚重兵丁食用艱難準在司庫借支一季餉銀於今年分作四季扣還今朕聞各省糧價漸增若再扣還借項則食用更苦著將前借一季餉銀緩至本年秋成後散給冬餉時扣起作四季扣還欽此九年題準四川冕寧縣被水不及十分之四實不成災無庸議振於來嵗青黃不接之時酌借倉榖以紓民力又奏準四川西昌縣被水各户借給倉榖又瀘寧被雹各户借給倉榖均於秋後免息還倉至南江縣屬被雹各户所借倉榖俟來嵗秋後免息還倉十年題準江南鳯臺潁上蒙城三縣被雹貧民在常平倉內借給口糧耔種如倉榖不敷即動銀折借又奏準直隸天津府屬之慶雲縣地瘠民貧被災之後耕牛甚少應給銀三千兩令天津府知府委官前赴張家口採買耕牛送交慶雲縣散給無力貧民田多者每户給與一牛田少者兩三户給與一牛俾得盡力南畝廣行播種十一年議準陜西西安榆林葭州等七州縣每嵗糶三榖內除出借給外其餘糧米盡數出糶交價府庫以為次年借給出口種地窮民牛具之需又諭直隸鹽山慶雲寧津三縣原屬上年災重之地先經借給耔種口糧此時想已告匱著照大小户口再借口糧一月以資接濟按畝借給耔種粟米四升以資耕作欽此十三年諭山東萊州府屬之髙密平度膠昌邑即墨五州縣當積歉之後本年復被水災民間耕牛不敷犂種若不豫為籌畫更恐坐誤春耕著照乾隆十年直隸慶雲等縣之例於東省庫貯本年振濟用剩銀內動撥購買耕牛賞給俾小民力作有資以示惠濟窮黎之意欽此十六年諭今嵗浙省被旱成災米糧昂貴著加恩將浙省被災各標協營緑旗兵丁每名借給米二石俟各省協濟米運到及截有漕米之日該督撫分次借給於十七十八兩年內扣餉歸款欽此又諭朕因浙省寧紹等屬歉收米貴曾降旨將被災各標協營兵令借給米糧以資接濟念該省今年旱災稍重各屬米糧一例昂貴著再加恩將浙江通省兵丁每名借給一季餉銀於司庫內動項借給俟明年夏季後分作四季扣還欽此又題準安省乾隆二四六七八九等年夀宿等州縣衛原借耔種口糧牛草計未完米榖等項共三萬六千二百五十三石五斗五升銀九萬六千六百四十七兩九錢五分各有竒內應催還米麥等項共千五百九十八石三斗八升銀千一百八十七兩一分各有竒實欠米榖等項共三萬四千六百五十五石一斗五升銀九萬五千四百六十兩九錢三分各有竒實在無力完繳應準豁免十七年奏準各省被災貧民借給耔種口糧夏災借給者於秋後免息還倉秋災借給者於次年麥熟後免息還倉均扣限一年自十七年為始扣限造報以昭畫一欽定大清會典則例卷五十四
