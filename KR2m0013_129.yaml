body:
  text: 刑部秋朝審一秋審朝審順治十年題準每年於霜降後十日舉行將刑部見監重囚引赴天安門外三法司㑹同九卿詹事科道官逐一審錄刑部司官先期將重囚招情畧節刪正呈堂彙送廣西司刋刻刷印進呈並分送各該㑹審衙門㑹審時各犯有情實矜疑者例該吏部尚書舉筆分為三項各具一本均由刑部具題請㫖内有奉㫖勾除者方行取決其未經勾除者仍舊監候又題準直隸監候重犯刑部差司官二人勒限㑹同該撫詳審具奏又覆準凡情實各囚綁赴市曹都察院委滿漢御史各一人刑部委滿漢司官各一人為監斬官將各犯姓名具本題覆法場内候㫖奉㫖勾除者遵照行刑其餘監候監斬畢仍具本覆命十三年定審決囚犯關繫重大直隸地方應差三法司堂官前往㑹同該撫按詳審具題候㫖處決十四年定直隸秋審停遣三法司堂官照舊差司官二人㑹同該撫按審錄奏請候㫖定奪又覆準處決重囚於冬至前十日奏請聽刑科覆奏至本内各犯有同名同罪者即於本犯名下注明籍貫及犯罪緣由題請候㫖行刑十五年題準重罪人犯除畿輔照舊審錄外其各省秋審務依地方逺近先將奉㫖秋決重犯各該巡按㑹同該撫及布按二司等官照在京事例詳審將情實應決應緩並有可矜可疑者分别開列於霜降前具奏候㫖定奪十八年覆準審錄重罪人犯巡按已經停止在外秋審該撫照例舉行康熙四年題準直省秋決人犯督撫照例於霜降前審明具題後有奉㫖續到人犯並霜降以後冬至以前續到者該督撫於文到日即陸續審明具題内有可矜可疑者仍行覈擬題請減釋其情實應決者於奉㫖文到之日照例行刑如已過冬至該督撫題明監候於次年秋審之期一并題明處決五年題準直隸各省監候秋後處決人犯該撫㑹同總督審錄具題候㫖咨行處決其直隸地方差遣司官永行停止令各省巡撫㑹同總督審錄具題由部㑹同都察院大理寺覆覈具奏七年覆準朝審秋決重犯將矜疑緩決情實者分别三項具題竢命下之日矜疑者照例減等緩決者仍行監候情實者刑科三覆奏聞竢命下之日别本開列各犯姓名奉㫖勾除方行處決其未經勾除者仍行監候又覆準朝審重犯畧節招册應照㑹審各官每人分送一帙至㑹審時仍將各犯原招口供帶赴覈擬又題準奉天江寧西安杭州寧古塔等處秋決人犯三法司於立秋之後即將可矜可疑情實等項詳審先行具題咨行該地方於霜降以後冬至以前完結九年題準凡將應入秋審重犯不行解送或已經解送在路遲延以致秋決愆期者府州縣官降一級調用司道罰俸一年督撫罰俸六月十二年題準直省秋審令該督撫㑹擬情實緩決矜疑分别具題每年於七月十五日内到部若限内不到者將該督撫交部議處各犯原案皆在本部將該督撫所題貼黄加三法司㑹議看語並該督撫㑹審情實緩決矜疑看語刋刷招册進呈御覽後分送九卿科道官員各一册八月内在天安門外㑹議情實緩決矜疑分擬具題請㫖定奪竢命下之日咨行直隸各省將情實犯人於霜降以後冬至以前正法雲南貴州四川廣西廣東福建均限四十日江西浙江湖南甘肅均限二十五日江南陜西湖廣均限十八日河南限十二日山東山西均限九日直隸限四日盛京限十五日寧古塔限一月將咨文封面上明注限期發行若沿塗該地方官限内遲延不到者該督撫察明題叅至直省督撫將情實緩決矜疑者審擬具題之後有續發事件不必具題竢來年秋審其盛京等處監禁重犯亦造黄册入直省秋審内具題完結十七年覆準直省秋審事件止照原案定擬勿得有案内牽連並被害之人重提質審以滋擾累十九年定人命關繫重大監候秋後重犯招册每省著各為一本陸續具奏二十三年覆準凡秋審重犯定於長安右門内金水橋之西審理二十五年題準各省監禁重犯招案見在三法司者即據各案㑹審具題其有不應減等者仍於秋審册内㑹審二十六年題準頒赦以後見在監禁重犯為數無多本年内外秋審暫行停止二十七年奉㫖今年内外秋審悉著停止二十八年奉㫖此情實各犯今年處決著停止二十九年諭今年内外秋決著停止情實及緩決各案皆不必具題其情可矜疑者著照例具奏欽此三十一年諭今年秋審人犯情實者停其正法矜疑者照常完結先經具題情實正法人等亦著作速行文停其正法欽此三十四年奉㫖内外秋審重犯今年著停止處決其情可矜疑者仍照例具題發落三十五年奉㫖今年朝審秋審悉著停止三十八年諭監禁緩決人犯甚多今又増一年人犯愈致繁多秋審朝審時亦甚冗劇若乆禁囹圄死者必多皆應從寛免死各枷三月鞭一百分别發於黑龍江當差欽此三十九年奉㫖此情實各犯今年著停止處決其情有可矜各犯著分别覈擬照例減等發落四十一年諭朕欽䘏民命念切好生每於法司奏上爰書必披覽再三詳求可生之理其或情罪允當而不忍立置之法者則令監候緩決以竢来歲之再讞顧罪犯一經緩決即皆冀望生全而長困桁楊淹畱歲月自新無路朕甚傷之今方春始和用沛矜釋之仁見在爾部及直省監禁人犯凡經康熙四十年秋審奉㫖緩決者著察明通行減等發落仍開具人數奏聞欽此又奉㫖今年内外秋審案内情可矜疑者照例具題發落其情實緩決各犯悉著於来年秋審具題四十二年奉㫖今年三月已頒恩詔所有罪犯無多秋審著停止四十四年奉㫖今年情實人犯著停止處決四十六年奉㫖今歲各省重犯甚少秋審著停止四十七年恩詔今年内外秋審情實人犯除已結省分外其未經具題各案情實者著處決緩決者減等矜疑者皆照例發落欽此四十八年諭江南浙江連年災荒地方困苦又今年兩省疾疫盛行人命傷斃者甚衆雖該省督撫未經奏聞朕訪知災病之狀深用惻然民命至重朕宵旰孜孜惟以矜全百姓為念一切刑獄奏讞尤加欽䘏比年因江浙盜案疊見凡犯盜刼者悉皆依律坐罪今閱秋審情實各案所議情罪均屬允協但念災荒疾疫之餘又將數十罪犯一時正法朕心殊為不忍江浙兩省應處決情實人犯悉著停止一年欽此四十九年奉㫖情可矜疑各犯照例審擬具奏情實各犯今年著停審五十年奉㫖情實人犯今年著停止處決五十一年議準直隸送部秋審招册乆經停止如不肖官員仍藉端科斂該督撫即指名題叅從重治罪五十二年奉㫖今年恩詔頒行天下事件皆已完結見在事甚少今年内外秋審朝審悉著停止五十三年奉㫖今年秋審著停止情可矜疑人犯著照常審理具奏見審人犯内罪不至死者亦著減等發落五十四年奉㫖情實各犯無幾今年著停止處決五十五年奉㫖今年著停止處決五十六年奉㫖情實各犯今年著停止處決五十七年奉㫖情實各犯今年著停止處決五十八年奉㫖重犯人等去年恩詔釋宥者甚多見今内外所餘人犯無幾今年朝審秋審著停止五十九年奉㫖情實各犯今年著停止處決六十年奉㫖情實各犯今年著停止處決六十一年奉㫖内外情實人犯今歲著停決雍正元年奉㫖情實人犯今年停止處決二年諭朕惟明刑所以弼教君徳期於好生從来帝王於用刑之際法雖一定而心本寛仁是以虞廷以欽䘏垂訓周書以慎罰為辭誠以民命至重寧過乎仁毋過乎義也朕自臨御以来一切章奏無不留心細覽今刑獄一事尤加詳慎誠恐法司未能平允輕重未能悉當朕心深用惻然故凡京城及各省題奏讞獄但少有可矜者無不法外施仁量加末減獨念朝審重囚其情實者刑科必三覆奏聞勾除者方行處決而外省情實重囚惟於秋審後法司具題即咨行該省無覆奏之例朕思中外一體豈在京諸囚宜加詳慎在外省者獨可不用詳慎乎人命攸關自當同仁一視自今年為始凡外省重囚經秋審具題情實應決者爾法司亦照朝審之例三覆奏聞以副朕欽䘏之至意遵㫖議準按朝審情實重犯刑部具題後刑科三覆具奏該御史將重犯姓名開列具奏奉出奉㫖勾除之本㑹同刑官遵奉勾除正法餘者牢固監禁覆㫖今外省秋審亦照朝審例施行應將秋審情實重犯刑部具題後刑科三覆具奏該御史將重犯姓名開列具奏奉出奉㫖勾除之本到部欽遵分别己未勾除並將原議情實之處明白鈔錄咨行各省其決過日期該督撫奏聞又奉㫖情實人犯今年停止處決三年諭人命至重須平心研究求其可生之路至萬無可生然後勾決則國法所不容亦其自取耳從來法寛則愚民易犯非刑期無刑之意欽此四年奉㫖秋審情實人犯今年停止勾決五年奉㫖秋審情實人犯停止勾決七年奉㫖秋審情實人犯停止勾決八年奉㫖秋審情實人犯停止勾決十年奉㫖秋審情實人犯停止勾決十一年諭今年各省秋審人犯有不應緩決之案經九卿改為情實者甚多督撫通省大僚臬司刑名總匯錄囚定獄何等重事豈可因循茍且如有司執法科罪而九卿奏請平法或九卿據法定議而朕酌奪從寛方合政體豈有執法之官而任意於法外徇縱者乎倘督撫臬司或謂九卿定議從刻稍存迎合之見遂於矜疑之案㮣以情實奏讞其弊尤不可言爾等將改正各案逐一覈明通行申飭之欽此又諭明刑所以弼教除暴所以安民朕臨御萬方不得一道同風俾我民免於刑戮每以自咎所望内外大臣抱刑期無刑之心執辟以止辟之法先使民不敢犯俾無漏網之姦兇繼則導人不為非漸化向風之頑懦如此需之歲月庶幾習俗可移朕十年以來一切刑獄莫不虚衷斂息詳慎推研寛嚴本無成見惟其自取每見廷臣大吏諄切開示諒已悉朕心矣今者秋審大典詳覽秋審各册有法無可貸情無可原而各督撫槩擬緩決並無勘語且有上次擬情實而今年自改緩決者有監候多年之犯而每年秋審忽擬情實忽擬緩決者有本定緩決因部改情實即照擬情實本定情實因部改緩決即照擬緩決者試問該督撫等豈竟漫不經心抑竟漫無定見耶夫疎縱之過甚於苛刻姑息之害等於殘忍但本公誠之至意達仁義之通權方為平允若以為欲嚴是負朕心若以為欲寛亦辜朕訓内外大臣務籌遠大不枉法不弛刑由此類推庶政皆然其各身體而勤求之毋忽欽此十三年諭朕聞外省㑹審之時不論案件多寡悉於一天定議均聽督撫主張司道守令不敢置喙究其實督撫亦未必了然不過憑幕賓畧節貼於册上徒飾觀瞻而已夫刑者不得已而用之者也天以父母斯民之責畀之吾君臣平時不能撫綏化導使之守法免罪已忝厥職及陷刑辟之後又復視為泛常不察情罪之輕重率定爰書之出入以致讞獄不平寃情莫訴勸懲兩失兇暴肆行所謂明刑弼教者安在清夜捫心能無愧乎朕臨御以來於一切刑名莫不詳慎推研法司所進立決本章亦令三次奏覆每年朝審秋審先期細覽招册至勾到時復與廷臣往復講論蓋哀矜惻怛之意動於不得已而發於不自知並非欲博欽恤好生之名也聖祖於當年勾到日皆著素服朕亦效法行之凡受朕封疆之寄者應同此心乃刻期草率定局並不博採羣議且有結采設筵徵歌演劇者此則殘忍性成不學無術者之所為嗣後各宜敬慎周詳殫心辦理不妨多寛時日毋得視為具文至於㑹集既乆除常餐外倘有肆筵設席仍蹈前習者經朕訪聞必加嚴處欽此九月奏準停止秋審乾隆元年奉㫖本年秋審情實人犯著停止勾決二年奉㫖本年秋審情實人犯著停止勾決三年覆準舊例解送秋審人犯至省均繫由府解司發回之時亦繫由府轉發道路紆迴不免案件稽遲及意外疎脱之慮嗣後秋審人犯令各該州縣徑行解司仍報明該管各府至㑹審之後即由司給發䕶牌就近分發各州縣收禁仍彙文行知各該府取具收管彙送稽覈又覆準秋審人犯於起解時患病者如繫初次解審之犯仍令照例提解不準留養外如已經秋審一次者於起解時患病不能行動該州縣即報明上司委官驗實取具印甘各結準其留養該督撫即憑原招覈擬具題揑飾者照例叅處五年奉㫖秋審情實人犯著停止勾決六年奉㫖秋審情實人犯著停止勾決八年奉㫖秋審情實人犯著停止勾決九年奉㫖秋審情實人犯著停止勾決十年諭向來冬至既届一應秋審之犯例不行刑若逺省地方奉到文書在冬至以後者則留至次年冬至前正法後因此等人犯盡屬兇惡罪無可緩若遲至一年之乆未免别生事端仍於奉到部文時處法諸犯既無可緩適直冬至亦須稍遲嗣後如有過期接到部文者著於冬至七日以後照例處決該部行文各督撫知之欽此十一年奉㫖秋審情實人犯本年停止勾決十三年奉㫖秋審情實人犯本年停止勾決十四年諭朝審情實人犯例由刑科三覆奏其後各省秋審亦皆三覆奏慎重民命即古三刺三宥遺制謂臨刑之際必致詳審不可稍有忽畧耳非必以三為節也朕每當勾到之年置招册於旁反覆省覽常至五六遍必令毫無疑義至臨勾時猶必與大學士等斟酌再四然後予勾豈啻三復也哉若夫三覆奏本章科臣匆遽具題不無豕亥且阻於時日豈能逐本全覽嗣後刑科覆奏各省皆令一次朝審仍令三覆欽此又諭向來勾到本章皆繫新資御史承辦此相沿陋例初無意義不過備員塞責非所以肅政典也今既分定十五道各有專責自應分省辦理嗣後凡遇勾到某省本章即著某道御史承辦近經去其冗覆本章已簡其令該御史悉心詳對設有魚魯則咎在御史其朝審令河南道今京畿道專辦監視行刑著刑科給事中及刑部侍郎一人著為例欽此又諭朕因刑科三覆奏之例各省奏牘繁多迫於時日轉致不能詳覽已命簡去二覆以從務實今思勾決之時朕詳閱招册反覆斟酌辯論大學士在朕前一面秉筆代勾一面聽受諭㫖雖殿廷咫尺自無舛錯但多經一徧視覽於勾決更為慎重嗣此著於勾到後將原本進呈覆閱再行批發著為例欽此又諭秋審為要囚重典輕重出入生死攸關直省督撫皆應詳慎推勘酌情準法務協乎天理之至公方能無枉無縱各得其平朕於情實招册皆反覆省覽再三究極情狀毫不存從寛從嚴之成見所勾者必其情之不可恕所原者必其情之有可原惟以一理為權衡而於其人初無愛憎好惡之見者存也今年各省招册經九卿改定之案甚多皆屬允當其中有緩決改入情實者四川八名湖北四名江蘇八名河南山東各五名山西六名直隸七名或謀殺或故殺或拒捕或誣良致死或威逼致死或姦民聚衆不法或邪術迷拐或强姦幼女或羞忿自盡或連砍數人或毆死有服尊屬皆情罪較重萬無可貸雖各省情實人犯臨勾之時稍有可原必加寛宥而此等兇徒斷不應擬以緩決設非九卿改正經朕裁酌置之典刑則姦徒倖免死傷屈辱者寃無可伸而刑罰於是乎失中豈所謂詰姦止辟之義耶此於法紀倫常風化所繫甚重督撫身任封疆為國家明罰勅法豈宜出入所有審擬不當之各該督撫皆著嚴行申飭欽此又諭朕於侵貪各案諄諄垂戒前後所降諭㫖不啻三令五申此次勾到辦理侵貪各案有督撫輕擬九卿改入情實者有九卿溷入緩決經朕指示情節改入情實者所有二年限滿之犯完數如例者業經分别原減其逾限未完營私入已確然有憑者予勾正法誠以律不容弛法當共守與其失之寛而犯者衆不如顯然示以無所假藉俾知所戒而不至更蹈覆轍所全者實多也朕前降㫖令刑部於秋朝審時將各省官犯彙為一册得以詳悉推勘以昭慎重之意此雖不僅指侵貪而官犯内惟侵貪者常多以理論之潔己奉公人臣之職分應爾倉庫錢糧莫非小民脂膏上以供軍國經費人君且不得私有而乃漫無顧忌如取如攜婪正供而入私橐是閭里之輸將徒為若輩填谿壑也夫取非其有謂之盜況取國家之所有乎貪人之財猶謂之盜而況其貪國家之財乎此其情尚可恕乎乃向來錮習以為寧盜無貪此在為上者愛民之深權其輕重謂與其厲民毋寧損上以是重言人臣之不可貪耳而豈忍以盜待臣子哉為臣子者又豈甘以盜自處哉人徒知漁利於民者貪也蠹食於官者侵也援律傅罪輕重判然不知貪者固有害於下而侵者實無所畏於上以無畏之心而濟之以無窮之慾則派累以肥橐者有之因事而勒索者有之甚至枉法受贓者有之朝廷之府庫且所不顧更何民瘼之可矜民膏之足惜此侵則必貪勢使然也此等劣員多留一日則民多受一日之殘國多受一日之蠹既以劣蹟敗露尚可因循姑息繫之囹圄獲全首領下愚不肖之輩其何所警惕而絶其行險徼倖之心又安知其不轉以身被刑辟之虚名而子孫享富厚之實惠且自為得計耶是斧鑕一日未加則侵貪一日不止惟一犯侵貪即入情實且即予勾決人人共知法在必行無可倖免身家既破子孫莫保則饕餮之私心必能自禁何至甘心扞網冒法此狂瀾之必不可不迴而膏肓之必不可不救旋轉之機斷在於此用是再頒諭㫖詳悉開導俾共知潔己奉公之大義凛服官典守之大防杜絶侵漁終遠刑辟為良有司國家實嘉賴焉如其不知畏懼不知悛改則三尺具在斷在必行前鑒昭然慎勿視為具文也此諭著刋刻頒發令内外文職衙門入於交盤册内永遠傳示各宜凛遵欽此十五年諭本年秋審情實人犯停止勾決欽此十六年諭本年秋審情實人犯停止勾決欽此十七年諭各省由立決改為監候人犯皆繫服制攸關其改擬監候已屬原情酌減若秋審時入於緩決則減之又減殊非慎重倫常明刑弼教之道是以上年降㫖令改入情實此其中情節多端如父母被毆致傷或勢在危急救䕶乃其至情使父毆叔而子助父以斃叔亦得謂之救父則是長不友不睦之風非止辟之意但散在各省招册中有勾決者有未勾決者或未悉朕輕重權衡反滋擬議著該部將此等案犯彙為一册與官犯招册先期進呈候勾其有應宥者亦可即予減等發落朕於各省招册反覆研究務協理法之大中人命至重大徳好生何忍不以哀矜為念但骫法違道務在活人斯乃婦人之仁中外問刑者其共知之欽此十八年諭各省由立決改監候人犯情罪本重累次秋審仍列入情實上年四十起内未勾者二十三人此次已勾一起但節次存留監禁將積而愈多是因緩死而屢次綁赴市曹亦非所以重刑章也嗣後此項除本年未勾人犯下次仍入情實外其餘著大學士㑹同刑部堂官將招册覆加詳勘其有實在情節可寛如弟毆兄斃或果因其兄干犯父母迫於親命或素有瘋疾一時病發凡似此類酌量分别敘述案情確加看語請㫖即入緩決蓋倫常所繫不厭周詳朕於勾決册内已再三審量更一番公同斟酌則情節益明庶協明慎用刑矜䘏民命之至意著為令欽此十九年諭本年秋審情實人犯停止勾決欽此又諭停決之年有情罪極重之案如聚衆抗官毆差奪犯侵貪多贓者由部節敘案情請㫖勾決欽此欽䘏一欽䘏天命六年諭凡應死笞罰諸罪必追論其功有功則當死者贖當罰者免當笞者戒飭而釋之功罪宜令相準其由武功授職者必行間獲罪乃革其官他罪皆贖若不由武功授職者視罪之輕重為斷著為令欽此十年九月頒詔大赦自死罪以下咸赦除之崇徳元年頒詔大赦除十惡外咸赦除之有以赦前事首告者反坐二年頒赦除十惡外一切罣誤小竊盜隱匿咸宥釋之五年特㫖赦死罪以下七年諭爾等衆犯有罪應至死者有應責應罰者朕因行祈禱皆釋爾罪其各改過自新欽此八年特㫖自大辟以下咸赦除之順治元年七月赦死罪以下又奏準法司各衙門以清獄省刑為首務非事關重大不得繫獄仍飭各撫按不時親詣郡邑察獄犯之多寡定有司之仁暴又諭人命至重豈容一槩誅戮以後在京重大獄情詳審明確奏請正法在外仍明律斷罪如有恣意輕重等弊指叅重處欽此又議準䘏刑官應五年一差慎選廉明者命往又奏準監犯淹滯可憫令刑部遣司官五日一次按驗速行審結直省督撫通飭有司凡死罪人犯準令寛限詳察其餘十日内即與結案應繫者繫應保者保應釋者毋得留滯又定凡每年元旦令節七日上元令節三日端午中秋重陽令節恭遇聖誕令節各一日萬夀聖節七日各壇廟祭饗齋戒以及忌辰素服等日並封印日期四月初八日每月初一初二日皆不理刑名四年定凡年七十以上十五以下及廢疾犯流罪以下收贖八十以上十歲以下及篤疾犯殺人應死者議擬奏聞取自上裁盜及傷人者收贖餘皆弗論九十以上七歲以下雖有死罪不加刑其有人教令坐教令者若有贓應償受贓者償之犯罪時未老疾而事發時老疾者依老疾論若在塗年限内老疾亦如之犯罪時幼小事發時長大依幼小論又定犯罪未發而自首者免罪猶徵正贓其輕罪雖發因首重罪者免其重罪若因問被告之事而别言餘罪者亦如之其遣人代首若於法得相容隱者為之首及相告言各聽如罪人身自首法若自首不實及不盡者以不實不盡之罪罪之至死者聽減一等其知人欲告及逃叛而自首者減罪二等坐之其逃叛者雖不自首能還歸本所者減罪二等損傷於人於物不可賠償事發在逃私越度關及姦並不在自首之律强竊盜詐欺取人財物而於事主處首報及受人枉法不枉法贓悔過回付還主者與經官司自首同皆得免罪若知人欲告而於財主處首還者亦得減罪二等其强竊盜若能捕獲同伴解官者亦得免罪又依常人一例給賞又定犯十惡殺人盜繫官財物及强盜竊盜放火發塚受枉法不枉法贓詐偽犯姦畧人畧賣和誘人口若姦黨及讒言左使殺人故出入人罪若知情故縱聽行藏匿引送説事過錢之類一應實犯雖㑹赦並不原宥其過誤犯罪及因人連累致罪若官吏有犯公罪並從赦宥其赦書臨時欽定罪名特免及降減從輕者不在此限徒流人在道㑹赦計行程過限者不得以赦放有故者不用此律若曾在逃雖在程限内亦不放免其逃者身死所隨家口願還者聽遷徙安置人準此其徒流遷徙安置人已至配所及犯謀反叛逆緣坐應流若造畜蠱毒採生折割人殺一家三人家口緣坐應流者不在此限又定獄囚每日給倉米一升冬給棉衣一襲夜給鐙油有患病者令醫官胗視給藥並酌寛刑具八年諭方今天時向熱宜行熱審之例令刑部通察刑獄五城司坊順天府京縣察監犯有無干牽連者即日釋放笞杖流徒次第減免死罪情可矜疑者奏請定奪欽此十年諭立春不雨入夏苗旱朕心甚切憂惶常思雨澤愆期多由刑獄寃滯刑部堂官即日㑹同都察院大理寺及凡有刑名事件衙門督率司官將在部監犯及發各處羈候聽審人犯如實犯死罪未經審結果有情可矜疑者即日審明具奏定奪徒流人犯察非重情準與減等笞杖豁免候審干連證犯先行釋放限十日内開具簡明情節減免罪名及釋過人犯具奏發落大小獄情未審結者限一月内通行完結順天府督同宛大二縣五城御史督同司坊官直隸督撫按督同所屬道府州縣一體遵行務期申寃疏滯上格天心欽此又定每年小滿後三法司㑹審見監人犯笞罪釋放徒流以下減等發落重囚可矜疑者奏請定奪直隸各省歲一舉行十二年諭朕日覽三法司章奏議決重囚一日必五六人或十餘人念兹愚民兵戈災祲之後復羅法網深可憫惻稽古有虞之世民不犯於有司漢文帝唐太宗亦幾致刑措今犯法者衆豈果風俗日偷民盡愍不畏死歟抑朝廷徳教未敷故百姓從化無路歟或讞決諸臣膠執爰書輕於失入歟又或所在有司不肯留心化導以致扞網紛紛歟干和召戾皆朕之責今後爾等問刑衙門遵奉此諭即將見在未結獄案悉心清理原情準法務求平允但不得故縱市恩仍傳諭各直省督撫申戒所屬慎重刑獄不得羅織刻覈郡邑長吏亟倡明教化使小民明於親遜之誼各愛身家毋輕抵罪自然獄案漸減囹圄可空以仰符天心漸致太平未必不由於此若奉行不力負朕好生至意必不輕貸欽此又定凡遇䘏刑之年内外悉暫停秋審又覆準䘏刑官審錄罪囚有死罪可矜可疑及事無證左可結者具奏處置流徒以下減等發落若原問官有故入人死罪者㑹同該巡按題叅流徒以下免其追究充軍人犯除已經發解差伍外其餘不分曾否詳允及雖經定衞尚未起解者逐一開送審錄内有應釋應減者㑹同巡按酌量發落又軍罪有不用全例摘引例文及不分首從濫坐者如未發遣即附入矜疑疏内題請開釋準徒五年總徒四年者各減去一年枷示笞杖就便釋放又題準凡遇䘏刑之年未經差官審錄者不得竟決又定每年六月内審定立決重犯竢七月具題正法十三年定凡滿洲䝉古漢軍官員除謀叛十惡重罪外其餘犯死罪者伊祖父伯叔兄弟有陣亡功及本身出征負有重傷軍前効力有據者皆免死一次至文武官有犯除實犯死罪外餘罪折贖是年十二月頒詔除十惡及受贓官吏盜欠錢糧員役不赦外其餘死罪皆減一等軍罪以下咸赦除之在京朝審候決重犯及直省秋決重犯皆與減等發落十四年諭今歲自春入夏連月不雨三農失望朕夙夜儆惕黙思其故必由刑獄未清無辜寃抑以致上干天和膏澤不降特遣内閣大臣㑹同刑部將見在獄犯無論已結未結逐加詳審其有無知而罹法網小過而陷重辟者即與察覈奏聞務使情法允協有枉必申以昭朕祈天䘏民之至意欽此又覆準熱審之例定於小滿後十日舉行在京者照常題明審理其直隸各省逺近不一停其具題行咨各該督撫即照定例舉行十五年頒詔除十惡死罪不赦外其餘死罪以下咸赦宥之康熙元年恩詔凡罪不論已結及見在告發者但繫元年以前事悉赦之又定凡婦人有孕犯死罪者竢生産後處決三年覆準凡提牢官有縱容獄卒凌虐罪囚及給以塵羮土飯者指叅治罪至各省有刑獄官員遇有罪不至死之人乆淹獄中致獄官將犯餓斃並縱容獄卒私自拷打等弊督撫題叅議處四年定凡犯死罪非常赦所不原有祖父母父母老疾應侍家無次丁者開具所犯罪名奏聞取自上裁其犯贓等罪流犯有親老疾無人侍養者取具地方官印結或準與否請㫖定奪九年題準軍罪人犯遇熱審亦照例減等軍流徒杖等罪於熱審之前已經具題未曾奉㫖發落者遇熱審亦準減等又定流徙人犯六月及十月至正月皆停發遣十年覆準直省督撫在熱審之先具題到部之案遇熱審仍行減等發落其在熱審時具題之案雖遇熱審之期到部者亦仍減等發落十一年諭刑獄重地人命攸關天氣炎熱急宜清理雖熱審見有定例但已結大案見在監禁各犯乆淹羈禁朕心惻然其令詳加審鞫有情可矜疑者即與察明事由開列具奏欽此又定免死流犯有告稱祖父母父母老疾家無次丁者地方官覈明照旗人例折枷存留養親若結報不實者議處十八年諭刑獄重地人命攸關遣閣臣㑹同三法將已結大案在監者詳加審理無使寃滯直省監候重犯選賢能司官㑹同該撫將大小刑名事件不論已結未結逐一詳審其重罪内情可矜疑者奏請定奪小罪即行完結造册報部欽此又諭朕因乆旱軫懷誠恐外省罪犯中或多寃抑特選爾等體朕矜䘏庶獄之意凡事務推勘確實從公審斷勿徇私見顚倒是非仍宜兼程遄往作速清結倘遲延時日恐無賴之徒藉端生事揑辭妄訐反累良民至所審案件或當或否朕無不洞悉爾等慎之欽此二十一年諭山海關以外及寧古塔等處官吏軍民人等除十惡死罪不赦外其餘已結未結一切死罪皆減等發落軍流以下悉予赦免欽此二十三年奉㫖軍流人犯甫離刑獄一綫僅存盛暑嚴寒必致死亡令皆停遣二十五年諭獄訟重情關繫民命今天氣災熱恐有情可末減者淹斃囹圄朕心不忍特遣大臣㑹同三法司詳審具奏直省督撫一體遵行欽此又諭明罰勅法國憲不可以已雖嘗屢行矜䘏絶去煩苛終思尚徳緩刑乃為至治之極軌自康熙元年中外臣民習染澆風姦貪詐偽頑鈍者恬弗知恥狡黠者愍不畏法以致是非乖謬綱紀陵夷朕親政後洞悉姦弊加意釐剔務使骫律干紀之衆人無遯情法無旁貸庶幾禁遏頑豪杜塞僥倖近見罹罪罟者漸少但革面未能革心秖因法令嚴宻輒思茍免茍免之心切則彌縫之弊深巧偽滋多亦未可定今欲崇尚徳化務存惇大一切令之自新除前經審擬完結各案及關繫工程錢糧不議外一應枉法得贓行賄與受人員仍革職免擬重辟照例追贓其未經發覺者悉予寛免有以諭前事叅訐者槩不準自諭以後中外臣民須洗心易慮省改前非守法奉公敦勵廉恥以副朕使人寡過之至意欽此三十年議準每年熱審減等事件如遇七月立秋應以立秋前一日為限其六月立秋之年以六月底為限三十一年題準本年四月初五日小滿六月二十五日立秋相應照例將見審在監人犯詳審軍流徒杖罪減等發落笞罪豁免重囚内有可矜疑者請㫖定奪嗣後均照此例行三十八年諭朕愛養生民慎重刑獄凡有奏讞時示矜全兹鑾輿南巡見沿塗老穉男婦環跪歡迎心甚嘉悦念此編氓皆吾赤子原期生聚教訓共底善良其或陷於刑章致困囹圄改過無路惻然傷之所經過山東江南兩省見在監禁人犯除十惡死罪並官吏犯贓不宥外其餘自康熙三十八年三月二十六日以前死罪及軍流徒罪以下已結未結悉著寛釋此朝廷巡幸所至欲使並生之至意可通行曉諭咸悉朕懷欽此又諭朕巡視東南行次浙省留蹕數日以慰喁喁奏請之情獨念獲罪人犯身淹刑獄一干法網無由自新兹乘輿經臨惻然矜憫用沛好生之澤聿示格外之仁該省各屬地方有罪犯見在監禁者令照山東江南例一體赦免欽此四十二年奏準罪犯之父年五十以上例不留養其實繫廢疾者亦準留養四十三年停止熱審之例五十年諭為政惟以真誠為尚徒博矜憫之虚名遇熱而審遇寒而審不時遣官䘏刑將督撫審讞案牘頻飭駮改則貽累滋多互訐之端何所底止夫有司簡清辭訟速結案件即為良吏雖不熱審亦無所害著通行問刑衙門知之欽此五十五年奉㫖刑部緩決人犯長繫囹圄殊屬可憫令九卿㑹同按其年分乆遠情屬可矜者分别奏明減等雍正元年諭直省大小獄訟各設按察司以專察之一切州縣申詳至爾司成獄督撫題達由爾司定案任豈不重歟皇考好生之徳洽於民心六十餘年於兹朕嗣守大訓夙夜凛凛焉何道而能不濫不寃實爾司是賴朕惟國家考定律例所以弼教非以厲民故嚴立刑書防其或罹於法及於斷獄又思曲全其生書曰欽哉欽哉惟刑之恤哉又曰與其殺不辜寧失不經此律例之本意也今或情例相違牽合文法以納民於網或有兩例並較上下其手以自遂其私安得無寃抑哉夫折獄憑口供而平反憑案卷今法吏不求得情只圖完結州縣之申詳多鍛鍊供招附於律例冀免爾司之駮詰爾司之詳督撫督撫之揭部院又加文致焉漢路温舒所云奏當既成雖臯陶聽之猶以為死有餘辜者也今宜釐剔宿弊歸於明允毋得因循故事自墮姦欺大計黜陟由爾司詳報宜以用刑明慎執法不阿者為賢能地方豪猾若苖有莠不除不剪害我嘉禾至於良善巨室致政大臣滑吏或藉端侵抑非所以稱朕意也若納賄出入人罪於法尤重國憲難逃天罰不免呂刑曰獄貨非寶非聽訟者之明訓與爾司其正已率屬使法無枉撓庶幾刑措之風尚其朂諸欽此又諭熱審減等舊有成例迨日乆弊生罪人妄希巧脱胥吏因緣為姦故延日期致逃法網是以停止我聖祖仁皇帝如天好生每歲夏月必特沛恩綸監候者免其刑具枷責者緩至秋凉雖停熱審之例仍寓減等之心澤至渥也朕仰體聖慈時深欽䘏仍復熱審減等舊例其監禁重犯亦量加寛䘏至情罪可疑及牽連待質人等暫予保釋竢秋後再行拘禁凡内外一體詳慎遵行其有故意遲延希圖漏網者本犯不準減等官吏嚴加議罪欽此又議準凡軍流徒罪並旗人犯軍流徒罪折枷示者皆不準減等其犯枷杖等輕罪人犯㑹同三法照例減等發落笞罪寛免二年諭刑名重務未能清理下傷民命即足上干天和朕於讞獄再三詳慎法外從寛者不可勝數並未寃抑一人此亦可自信者爾等執法之官固宜外示嚴明亦須中存仁恕凡案件易結者毋執定限速行審理使輕罪早脱囹圄無辜亦免牽連倘任意躭延雖所告得伸亦多含怨即訊鞫罪人亦不可輕用重刑若云非夾訊不能定案此尤爾部之大謬矣錄囚之際但求平允不可過當所謂如得其情則哀矜而勿喜也爾等訊獄動刑習為常事當思無負委任亦須自念子孫豈可疎忽致有後悔乎尚其同寅協恭速為辦理毋恃才偏執毋推諉瞻徇以體朕心以䘏民命欽此又定命案留養除故殺謀殺不準援請外其鬬毆殺人之犯以傷至數處及金刃致死者為重傷以傷非金刃又止一二處及戲殺誤殺為輕傷如有祖父母父母老疾應侍者照例開具所犯情由請㫖如準其存留養親將該犯照免流犯例枷示兩月責四十板仍令該地方官酌量該犯情重情輕如繫有力之家情重者追銀五十兩情輕者追銀三十兩如果貧難無力之人情重者追銀二十兩情輕者追銀十兩給與死者家屬仍於應侍疏内聲明有力無力並取具鄰保族長甘結地方官印結報部又定殺人之犯有奏請存留養親者覈明被殺之人有無父母是否獨子於本内聲明如被殺之人亦繫獨子親老無人奉侍則殺人之犯不準留養四年奉㫖毆殺胞兄而父母尚存向有獨子留養之例倘父母皆亡别無兄弟亦宜準其承祀若因争奪財産及謀殺故殺者不得援請五年諭刑名關繫民命死者不可復生王制曰刑者侀也侀者成也一成而不可變故君子盡心焉朕於刑名更加慎重書曰天討有罪五刑五用哉必輕重悉當天理乃為欽承天道若應嚴而寛便是逆天寛且不可而況嚴乎朕為人君尚不可稍失其平況人臣居法司之任乎蓋鴟鴞不除無以致鸞鳳稂莠不剪無以植嘉禾姑息養姦則小人無懲戒必不能改惡以從善故刑者使人遷善遠罪所以輔教化者也居法司之任者務操至平至公之心時凛天監在兹之懼使寛嚴悉當輕重允孚則不愧明允之司而成無刑之治矣欽此七年奉㫖每日所進本内有擬以立決之犯雖其情罪重大律無可寛然朕心猶欲慎重而後置之於法嗣後遇此等本章已閲過票籖交與本房者著批本官進呈三次然後批發九年奉㫖清理刑獄除重罪候決人犯外凡有牽連待質及候審結輕罪之人著刑部覈明速行完結或暫予保釋八旗髙牆拘禁人犯亦照此辦理毋得稽遲枷示人犯除永遠枷示者不宥外其有限期未滿者照例保釋於處暑後補枷其外省輕罪人犯亦酌量加恩將已經到部之案有擬徒杖準折贖者悉寛免之十年諭凡疑獄監候待質人犯除強盜案件外如人命等案有正犯未獲將牽連餘犯監候已過三年者著取的保釋放有私自逃匿者將本犯重治其罪令直省一例遵行欽此十一年奏準夫毆妻死審無故殺别情其家如無次丁準留承祀十三年九月欽奉恩詔大赦天下十月奉㫖見今所犯罪重並拖欠銀兩數多之人因遇恩詔尚邀豁免其從前拖欠銀兩之人若以既入辛者庫已經結案遂不得入於赦免之例實屬可憫著交與内務府刑部將一應不能完交錢糧已入辛者庫及犯罪入辛者庫人等原案情由并伊等祖父原繫何人之處皆著察明具奏再從前漢人犯罪入旗入辛者庫安挿莊屯者亦令察明一并具奏十一月欽奉恩詔從前發徃各處安置人員查有情罪尚輕在外已過三年能安靜悔過者具奏請㫖又軍流人犯有本人身故其妻子願回本籍者著該管官覈明報部即令回籍不得留難永著為令十二月欽奉恩詔除十惡不赦外犯法婦人盡行赦免乾隆元年諭明罰勅法國之大典而肆赦所加原以昭法外之仁也恩詔之頒期以息事寧人使遠邇咸知遷善改過共為良民以成太平之治乃聞各直省於一切案件仍行提審駮審嚴刑酷夾恣意株連使無辜之人困於囹圄細微之事刻為鍛鍊含寃稱屈所在多有夫罪名未定案情未協或有仍須審詳者但既非犯在不赦則斷讞亦易成招若使合於赦款之人不得即邀赦免之澤而以酷刑斃命或因拖累破家則後即審明援赦亦已無及是朝廷已生全之有司故戕害之藐視功令殘虐民生莫此為甚且頒詔之後已逾半年而題結咨結批結之案尚屬寥寥遲玩已極著刑部即行各該督撫速行嚴飭各屬立即詳慎察明逐一詳報歸結省釋如有仍前濫刑擾累及擔延滋弊以沮抑國家徳意者一經察出罪有攸歸斷不輕貸即刑部所有案件亦應速為剖晰勿致沉擱以副朕哀矜庶獄之意欽此又諭直省秋審册内有自康熙五十二年至雍正三年以前皆繫緩決者此等案犯遇赦不準援免論法本無可貸而已經擬以緩決閱有年所不復再擬情實徒使長繫囹圄瘦斃獄底於情亦屬可憫此項秋審著九卿科道等將康熙五十二年以後至雍正三年以前秋審各犯逐一詳加察覈如有屢經情實未勾今應仍擬情實者毋庸開入外其積年擬緩決之犯悉心簡閱酌予減等欽此又諭發給黑龍江寧古塔等處兵丁為奴之犯聞各處兵丁等竟有圖占該犯妻女不遂所欲因而斃其性命者情甚可惡見在為奴人犯内有曾為職官及舉貢生監者一㮣免其為奴嗣後職官舉貢生監等有罪應發遣者不得加以為奴字樣欽此又覆準軍流人犯之妻如有患病留養本犯先行發遣者伊妻於病痊補解時許親屬隨行再犯人之妻如有年逾六十老病不能隨行者聽又奏準軍流人犯在配身故其妻子不願回籍及遇赦不準放還者毋庸議外其例準回籍者令該地方官一面察明如有丁男親戚酌發口糧給文領齎自行回籍仍報明上司存案如繫孤身犯婦或止有幼子並無親戚者即行詳報督撫咨取原籍親族人等領回所有沿塗口糧按道里逺近給發造册報銷二年欽奉恩詔見在定議軍流徒罪人犯未至配所者㮣予寛免是年遵恩㫖察議將從前不能完納錢糧入辛者庫並安挿屯莊及犯罪入辛者庫之本身及妻子等各案情察明具奏奉㫖將伊等本身及伊等妻室子孫皆從寛準其釋歸旗籍又覆準從前八旗滿洲及内務府五旗王公府屬滿洲凡因罪給與公主郡主之人察其案情輕重并將伊等祖父及本身有無効力之處察明具奏請㫖赦令回旗四月欽奉恩詔漢軍犯軍流罪者已照舊例以枷責完結其從前發遣在配者該部按其情罪具奏請㫖又軍流人犯已到配所者向例遇赦不準放回今特加恩此等人犯内除情罪重大及免死減等實繫兇惡棍徒外其餘因事議遣在配已過三年安靜悔過情願回籍者該督撫具奏請㫖準其回籍又諭從前發遣各處之人其情罪尚輕者先於恩詔内令該管官具奏請㫖其情罪較重者原無赦回之例今朕思未經赦回之犯其中有年逾七十雖原案較重而年已衰老且在外年乆國法已伸仍留遣所情亦可憫著該管官覈明除强竊行兇等重罪外其餘各犯有年老在七十以上者將所犯情罪具奏請㫖再軍流人犯本身已故其妻子準其回籍已於恩詔内著為定例今朕思從前發遣在外安置及當差之犯雖情罪較重然本身已故其妻子原繫連坐之人著各該管官覈明報部奏聞準其回籍欽此又諭向來每年熱審之時凡應杖責者有八折之例内外通行本年福建巡撫條陳熱審事宜經刑部議稱律文無八折之條地方有司或將笞杖之罪槩行八折則輕重溷淆未為允當嗣後每遇熱審之期將一切案件應行減等寛免之處務令畫一遵行等語朕思小民之犯杖責者其罪本輕而盛暑之中量其敲卜之數乃國家寛䘏之仁八折之例由來已乆不當以有司之偶然奉行不善而輕為改易者著再議具奏欽此遵㫖議準凡一應杖責之犯時遇熱審統於減等之中照舊遞行八折發落又諭雨澤愆期恐有滯獄前已降㫖刑部將牽連待質人犯及枷責輕罪悉行覈明省釋至於雍正十三年兩次恩詔後仍行監禁者原繫不應赦免之人上年秋審時已令九卿科道等將康熙五十二年至雍正三年以前不赦之案覆加分别減等其雍正四年以後十三年以前所有不赦各案其中或有介於疑似及屢經秋審緩決之犯或尚有可矜亦未可定著總理事務王大臣㑹同刑部將秋審朝審招册詳加覆勘如果有一綫可原應行減等者即酌定請㫖欽此四年諭朕慎重刑獄罪疑惟輕數年之中屢頒恩詔凡有應行赦免之犯皆在三宥之中矣其不在恩詔中者復於乾隆二年三年特降諭㫖令大臣㑹同刑部將秋審朝審招册詳加覆勘如有一綫可原應行減等者酌定奏聞請㫖減等發落此次辦理外其未經減等者皆情罪較重之犯因繫乆緩不復處決即令終斃囹圄已屬寛典無可矜憐但此等人犯淹禁既乆積案日多朕再四思維清理滯獄亦法外之仁著九卿等將秋審朝審緩決五次以上之人犯酌其情罪稍輕尚可貸其生路者逐一分别請㫖比照兇盜免死減等之例充發邊逺煙瘴地方如此辦理則較之可矜減等杖流之例為重而較之永遠監禁之犯為輕是亦清理滯獄之意至於情罪可惡者雖經屢年緩決亦不在減等之例欽此五年諭見今雨澤愆期朕宵旰憂勞無時或釋因思清理刑獄亦感召天和之一端爾部見在監禁人犯内有一綫可原者著大學士軍機大臣等㑹同爾部分别具奏候朕降㫖其輕罪人犯有應減等者亦著具奏減等速行發落欽此又覆準旗民發遣人犯内繫奉㫖僉遣及例應僉妻者其妻子解至遣所聽該管衙門同本犯一例管束至本犯身故有情願攜骸回歸者應令該將軍等具奏請㫖若非奉㫖僉遣及例應僉妻之犯屬皆繫情願隨往之人與連坐之家口不同應令各該衙門於起解文内按名注出到配時毋得與本犯一例羈管至本犯身故其妻女子孫有願攜骸回籍者覈明報部即準回籍七年諭數月以來雨澤稀少朕宵旰靡寧虔誠祈禱雖得微雨未為霑足從前因天時亢旱曾降㫖清理刑獄今著刑部將在部各案内有牽連待質者有輕罪情可矜原者或應省釋或應末減㑹同都察院大理寺悉心詳覈妥議具奏至於直隸山東河南三省目下雨暘不均亦著照此例行嗣後各省凡遇災眚之年著該撫將清理刑獄之處奏聞請㫖欽此又覆準監候待質人犯内除續獲盜首未認無憑質審罪關斬決者仍應監候外其續獲盜犯並非盜首又未傷人止因年乆贓物花銷無可質證始行監候者此等人犯供認既經確鑿而監禁實無可待其已入秋審者不拘年限於秋審時覈明情節即照未傷人夥盜例擬以發遣其並無贓據堅不承認之犯是其為盜原屬無憑應於秋審時酌量擬以保釋皆别繕招册進呈請㫖遵行又諭今年上下兩江被水情形非常年可比朕宵旰焦勞凡極撫綏之道亦屢經籌畫矣今又思周禮荒政載有緩刑之條是舉行矜䘏之典亦感召和氣之一端見在江蘇安徽兩省秋審人犯中有情有可原當在矜疑之列者或多年緩決不至正法乆繫囹圄者皆應減等完結以示因災䘏刑之意著大學士㑹同刑部詳閱招册分别妥擬具奏欽此又諭乾隆四年朕曽降㫖秋審朝審緩決五次以上之人犯酌其情罪稍輕尚可貸以生路者比照兇盜免死減等之例充發邊遠煙瘴地方較之可矜減等杖流之例為重而較之永遠監禁之犯為輕其情罪可惡者雖經多次緩決亦不在減免之例今已隔數年監禁之犯倍多於前乆繫囹圄亦屬可憫著大學士九卿仿照乾隆四年之例悉心辦理分别請㫖再情實未勾人犯内或有情罪稍輕可以照此辦理者亦著大學士㑹同刑部分别具奏欽此八年覆準遣犯家屬除律載緣坐及强竊盜内免死減等並例應僉遣者皆仍僉妻外其餘軍流人犯㮣免僉妻如本夫願帶或妻妾願從者聽又覆準孀婦獨子有犯戲殺誤殺等案如伊母守節已逾二十年者該督撫察明被殺之人並非孤子取結聲明具題法司覈覆奏請留養其鬭毆殺人者審無謀故别情該犯之母守節已逾二十年而又年逾五十者亦準其照例題請法司覈覆夾籤入本恭候欽定如䝉恩準留養皆照例枷責追給埋葬銀兩至犯該軍流徒罪除姦盜誘拐行兇及有關倫理擾害地方者照例科斷外其無知誤犯者該督撫察明將果繫獨子及伊母守節已逾二十年之處聲明報部詳覈照例分别枷責仍令按季彙題又奏準直省督撫每届熱審秋審時將案情通行檢覈倘有臨期極口稱寃按之情罪稍未允協即細加研鞫果繫從前枉斷十分寃枉者立即改正具題十年諭京師三月以來雨澤愆期今麥秋已屇未沛甘霖仰望心切朕已降㫖虔誠祈禱因思清理刑獄亦祈求雨澤之一端著刑部堂官將徒杖以下等犯覈明情罪或應釋放或應減等即行具奏其尋常案件亦速為完結毋得牽累稽延並行令直督一例辦理欽此十一年諭古帝王治天下之道以省刑薄賦為先朕臨御以來愛育黎庶惟日孜孜於兹十年矣仰荷天祖眷佑海宇乂安萬民樂業朕心慶慰特沛曠典與民休息上年夏月頒發諭㫖將天下正賦普免一週是閭閻已均被惠澤矣惟念各省獲罪之犯於上年勾到之後見在羈禁囹圄者雖伊等孽由自作法無可寛而其中情事不同輕重亦由差别國家赦宥之典或因行慶施惠或因水旱為憂間一舉行今朕哀矜庶獄不忍令其淹滯圜扉所有刑部及各省已經結案監禁人犯除情罪重大及常赦不原者無庸辦理外其餘著大學士㑹同刑部酌量分别請㫖減等發落其軍流徒杖以下一并分晰減等完結俾伊等同沾肆赦之恩勉圖自新之路以副朕協中欽䘏本懷欽此又諭朕特行赦宥之典將刑部及各省已經結案人犯令大學士㑹同該部酌量案情請㫖分别減等發落軍流徒罪以下人犯一并分晰減等完結後經大學士等將已經定案者分别辦理其各省審題案件經法司衙門駮詰尚未題覆者凡自乾隆十一年正月初三日以前羈禁人犯仍準於該督撫定案之日分别減等惟是外省人犯該督撫審題法司指駮者既得邀恩而在外督撫指駮未結者其犯罪羈禁年月同在恩㫖以前亦應一體沾恩著將在外督撫指駮未結各案及恩㫖以前已經督撫定案尚未題逹者自乾隆十一年正月初三日以前並令刑部覈明仍著大學士㑹同該部分别減免請㫖其各省所有尚未具題之案著該督撫於題本内將事在恩㫖以前之處聲明法司隨本分别請㫖欽此又諭朕此次西巡輿蹕所經兵民歡慶惟念圜扉之中不得一體沾恩朕心深為惻然著將直隸山西二省本年正月初三日恩㫖以後所有軍流以下人犯令該督撫分别情罪請㫖減等發落欽此十四年題準凡鬭殺案内理直傷輕及戲殺誤殺等案照例準其留養如該犯實繫理曲或金刃重傷及雖非金刃而連毆多傷致死者此等情重各犯於定案日議以不準留養十五年諭國家欽䘏民命徳協好生至於鰥寡㷀獨尤所矜憫是以定有獨子留養之例凡屬情輕皆已霑恩減等惟是愚民無知往往輕身鬭狠不知留養為格外施仁或轉恃此為倖免之路以致罹於法網因其案情稍重或理曲尋衅金刀重傷雖經督撫聲請仍以原罪定擬不準留養固屬該犯罪所應得但聲請之案不過尋常鬭毆等類斷不至入於情實徒使淹禁囹圄不得侍養而窮老孤孀無所倚賴深可軫惻朕思此等罪犯本非有謀故重情為常赦所不原既經定擬本罪拘繫逾時已足馴其桀驁之氣應量為末減俾得自新上年秋審此等案犯經九卿定擬矜減者止有二起餘仍監候著該部察明各犯祖父母父母見存果無次丁侍養槩以可矜減等請㫖發落嗣後獨子犯罪未邀寛減者該督撫於秋審朝審册内聲明九卿覆覈時照此辦理以昭軫䘏無告之意著為令欽此又欽奉恩詔秋審緩決五次以上人犯量予減等犯法婦女除十惡不赦外其餘㮣予赦免見在監候質審干連人等準予保釋又諭朕今歲初次巡幸豫省鑾輿所過既已疊沛恩施惟是薄賦省刑事宜並舉所有河南省軍流以下罪犯著察明減等發落用昭慶典俾予自新欽此十六年諭朕惠養黎元哀矜庶獄昨歲推恩中外曠典特頒已將五次緩決罪犯覈明減等發落咸予自新顧念比年以來獲罪之犯尚有覊禁圜扉者其情罪重大之案數經讞鞫施行其餘緩決之人按情自屬稍輕而淹繫經時爰書日積朕心惻焉自昔行慶施惠載在孟春欽䘏之仁宜加推廣所有直省朝審秋審各犯緩決至三次以上者即著該部察明酌量案情分别請㫖減等發落用宏肆赦之恩以副協中之治欽此十七年諭朕命刑部察奏命盜等案因贓跡未明監候待質者共五十四案内康熙年間一案雍正年間十一案而自乾隆元年至十七年統計己未入秋審者積至四十五案雖年遠之案漸消漸少近者則積而見多然使於辦理之初即能詳慎研究務在得情則監候之案何至如此即此亦可見近來辦事諸臣不如從前之實心振作矣此非使無辜之人乆繫囹圄即使應辟重犯乆羈顯戮而犴狴之中淹禁多人亦非所宜皆因承審各官不能實力辦理又或刑部司員以有遵駮改正議敘之例多尋罅漏外省無以登答轉成疑案一經題明監候待質即束之髙閣而接任之員又以非本任之事率多因循殊非明慎用刑而不留獄之意著刑部將此沉案速行清理嗣後内外問刑衙門於一切命盜重案各宜留心迅速辦理應緝拏者上緊緝拏應定擬者即行定擬勿致塵案日積若本非難結之案承審各官不能審出實情惟以監候待質為遷延時日之計且藉得邀免處分希冀錄敘該堂官督撫察出即嚴行叅處此亦清理庶獄之一法可通行曉諭知之欽此又奉㫖嗣後凡例應留養之犯必察明見在本籍者方準援請若在他省獲罪即屬忘親不孝之人雖與例相符該部亦不準其留養十八年諭見在刑部辦理秋審案件其中緩決人犯閱時既乆為數益多爰書日覺紛繁囹圄徒滋淹繫朕心深為憫惻著該部察明朝審秋審各犯酌其情罪稍輕緩決至三次以上者分别請㫖減等發落至此外有情罪本重累年辦理未經寛減而定案在康熙雍正年間緩決十餘次至數十次内有一綫可原者亦著察明分别請㫖欽此十九年諭從前各省尋常鬭毆情罪稍重之案經部定議不準留養後因此等人犯秋審時原不至入情實徒使淹禁囹圄而窮老孤孀無所倚頼於乾隆十五年特頒諭㫖令各該督撫秋審時另册辦理但十五年以前此等親老丁單之犯間有原題内未經聲敘者遂不得一例邀恩情亦可憫著該部傳諭各該督撫將從前雖未附聲明確有成招原案可憑者據實覈明準其一例入册量予末減以示矜䘏欽此又諭仰惟列祖創業東土光啟萬年景運山陵永峙福佑靈長我皇祖聖祖仁皇帝三詣陪京躬親展謁禮成行慶典册昭埀朕寅紹丕基時深景慕緬自乾隆八年秋瞻仰橋山迄今已逾十載追遠之誠常如一日本年七月恭奉皇太后安輿由熱河起鑾取道吉林巡歴遼瀋車駕所至兵民各安本業風俗淳樸輦路歡迎扶攜恐後具著忠愛悃忱仰見先澤留貽乆而益懋朕心深用欣慰兹於九月初五等日謁祭三陵大禮告成宜敷愷澤其將奉天所屬府州縣乾隆十九年地丁正項錢糧通行蠲免經過地方前㫖所免十分之三及被水地畝應蠲錢糧仍於明年應徵額内補行豁除自山海關以外及寧古塔等處官吏軍民人等除十惡死罪外其餘已結未結一應死罪皆著減等發落軍流以下悉予寛免凡我留都士庶尚其敬念根本重地益務敦龐毋忘先民矩矱共享昇平之福永承樂利之休用稱朕嘉惠優䘏至意欽此二十年欽奉恩詔除謀殺故殺外如原無讎隙偶因一時忿激相毆傷重致死者將兇犯免死決杖一百照例追銀四十兩給死者家屬軍流以下人犯槩予減等督捕治罪各條詳督捕則例一督捕順治十年設督捕衙門專理緝逃捕盜事務康熙十五年諭兵部督捕衙門逃人事情關繫旗下重大前恐百姓株連困苦故將條例屢行更改減定期於兵民兩益近見各該地方官奉行疎玩緝獲日少旗下民生深為未便應遣部院大臣㑹同爾衙門將新舊條例逐一詳定務俾永遠可行欽此三十八年督捕衙門改隸刑部為督捕司先是督捕衙門隸兵部設侍郎一人理事官一人及郎中員外郎主事各官至是裁侍郎理事官乾隆八年奏準督捕則例自康熙十五年編纂以來閱今七十餘年未經修輯其間先後改定條例援引易於錯誤謹将舊刻條例與見行條例刪定為一百三條名曰督捕則例於律例外别為一集分上下二卷欽定大清㑹典則例卷一百二十五
