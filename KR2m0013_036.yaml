入蜀開墾者準其入籍二十六年題準凡身隸奉天府版籍應順天文武鄉試中式者即令於奉天所屬州縣居住如有居住原籍並别省者該府尹察出送部褫革其入籍出仕之人解任後居住别省該撫察明題參仍令於奉天所屬地方居住如各省容留不行察出將地方官及該督撫一并處分二十九年覆準川省民少而荒地多有情願往川墾荒居住者子孫準入籍考試如中式後回籍並往别省居住者禁止五十一年奉㫖武官駐劄地方不許入民籍立産業其已立産業者令變賣回籍若身殁後有實不能遷移者督撫核明具題雍正元年覆準提督總兵官副將等均不許在見任地方置立産業即丁憂休致事故解退之後亦不許在彼處入籍居住此內或於任內置有産業已經身故及不能回籍者該督撫詳晰具奏請㫖定奪參將已下等官任所置有産業或夲身休致事故解退已經身故子孫留住任所有欲在彼入籍者皆許令該地方官報明督撫即準其入籍居住田土丁糧與土著之民一例輸納乾隆二年覆準武職緣事革職果無原籍可歸如任所地方安葬祖父墳墓其年已久不得已欲在彼入籍者副將以上等官該督撫具奏請㫖定奪參將游擊都司該督撫確察報部兵部再咨詢該貟原籍地方如果無産業宗族該原籍地方官出具印結送部即準其任所入籍免回原籍如繫假揑希圖逗遛任所者照例治罪押回原籍其不行詳察出結之地方官照濫行出結例議處守備以下革職微貟如夲籍果無户口墳墓取結報部聼其入籍當差四年覆準貧民入川墾地者聼其散居各府州縣佃種傭工為糊口之計該督撫將姓名籍貫開造移詢各原籍限文到三月內備造清冊回覆川省核實稽察其素非良善者逐回如實繫安分貧民無力佃種者酌撥地畝給與牛具籽種耕墾分别水田旱地及領墾年分報部升科自行傭工開墾者聼其自便情願回籍者給與印票仍令造冊存案其散往各府州縣佃種者責令佃主出結貿易者市鄰出結依附親故者親故出結寄宿寺廟者留宿地主出結仍與土著同編入保甲互相覺察如有生事可疑之人許原出結人呈報並許鄉保鄰右人等首報仍令該地方官不時稽察如有失察者參處又覆準江南福建浙江府州縣內搭棚山居以種麻種靛煽鐵開爐造紙作菰等項為資生之計者其間土著甚多亦有鄰省失業流寓之人著照保甲例按户排入編冊責成地主並保長出具保結呈送州縣官據冊稽察倘居住星散不論棚數多寡自為一甲互相稽察內有已置産業並願投認絶户丁糧入籍者皆編入土著同當差役至有四五百户以上者該管官即於棚居鄉壯內選立保長甲長専司巡察仍於農隙時逐棚察驗不得借端需索其見在有願回籍者聼仍將姓名開除勿令復至若招引匪類匿編户地主保長不行首告者連坐該管官以失察議處又覆準廣東州縣有入山搭寮取香木舂粉砍柴燒炭為業者照保甲例編冊每寮給牌一張令寮人互相保結擇老成謹慎者為寮長寮户聼其鈐束遇有遷移及續入者寮長及互結之人將牌赴縣增除倘窩藏姦宄容隱不報者發覺連坐寮長照總甲容留棍徒例治罪至凡業主招佃搭寮必將寮丁報官或繫官山前往搭寮墾種者赴官報明察驗違者照盜耕田畝律治罪山主照違令律治罪其墾種之地以十年起科即與為業仍令州縣民壯每月巡察如有匪類在山出入寮民能獲一名者賞銀三兩能獲犯案之盜賊每名賞銀二十兩多獲者按數加賞文武官辨不經心約束以致窩匪者照例議處又覆準吉林等處有直省百姓情願入籍者準其入籍但不得容匿逃人重犯改換姓名潛居其地必行詢各原籍咨覆到日於户口冊內照奉天所屬民人每民徴丁銀一錢五分五年議奏寄居奉天府流民設法行遣陸續令回原籍奉㫖情願入籍之民準令取保入籍其不情願入籍者定限十年令其陸續回籍八年奏準山西陜西邊外䝉古地方種地民人甚多其間姦良難以分晰應設立牌頭總甲令其稽察即於種地民人內擇其誠實者每堡設牌頭四名總甲一名如種地民人內有拖缺地租並犯偷竊等事及來厯不明之人即報明治罪如通同徇隱將該牌頭等一并治罪十年題準粵省在臺灣人民情願挈眷者止許般取妻子令地方官取具鄰右保結照內填注名數如地方官不察明溷行給照照濫給印結例議處夲人嚴加治罪十二年題準挈眷赴臺灣完聚者地方官取具鄰右保結將般取祖父母父母妻室子女幾名口填注照內如乘機攜帶親族溷行給照者地方官照濫給印票例議處夲人嚴加治罪其親族有暫時赴臺灣探視者開明姓名年貌呈夲籍地方官注冊仍填給印照定限五月回內地銷照若屆期有疾病事故淹留者臺地印官於回籍文內聲明凡州縣填照給文密封交夲人齎投厦防臺防二廳兩經拆驗易文封照交夲人親投臺屬廳縣驗明留照注冊有人照不符者逐回若由臺回籍亦照此察驗凡內外臺地給照銷案緣由月終通報督撫稽察嵗終報部考核十三年覆準山西陕西邊外設立總甲牌頭令其専察不肖人等如有犯罪逃往䝉古地方行竊並情有可疑之人即禀明該管各官解回原籍該管各官於每年春秋二季取具總甲牌頭等並無容隱甘結注冊十五年覆準奉天府流民歸籍一案今已滿十年請將不願入籍而未經飭令回籍者令地方官確察實數速行辦理此外有無游手無業未經驅逐之人亦確察辦理並令奉天沿海地方官多撥官兵稽察不許內地流民再行偷越出口並行山東江浙閩廣五省督撫嚴禁商船不得夾帶閒人再山海關喜峯口及九處邊門皆令守邊旗貟沿邊州縣嚴行禁阻庶此後流民出口可以杜絶一改正户籍雍正元年議準山西等省有樂户一項原屬忠義之後其先世因明建文末以不附篡立被害遂遭荼辱編為樂籍世世子孫不得自拔為良民飭令各屬嚴行禁革令其改業得為良民又覆準浙江紹興府屬之墮民賤辱已極實與樂籍無異行令削除其籍俾改業自新與編民同列七年諭粵東地方四民之外别有一種名曰蛋户即徭蠻之類以船為家捕魚為業通省河路均有蛋船生齒繁多不可數計粵民視蛋户為卑賤之流不容登岸居住蛋户亦不敢與平民抗衡畏威隱忍局蹐舟中終身不獲安居之樂深可憫惻蛋户夲屬良民無可輕賤擯棄之理且彼輸納魚課與民相同安得因地方積習強為區别遂令飄蕩靡寧著該督撫等轉飭有司通行曉諭凡無力之蛋户聼其住船自便不必強令登岸如有力能建造房屋及搭掤棲身者準其在於近水村莊居住與齊民一同編列甲户以便稽察勢豪土棍不得借端欺凌驅逐並令有司勸令蛋户開墾荒地播種力田共為務夲之人以副朕一視同仁之至意欽此八年覆準江南蘇州府屬之常熟昭文二縣丐户與浙江墮民無異族居沿海久陷沉淪準其削除丐籍同列編氓一番民歸化彚入版圖者令専管官編立保甲察緝匪類望日宣講上諭以興禮讓雍正十二年諭聞四川重慶府地方昔年有成都府屬威茂等處蠻民每於冬初來此傭工春暖始歸嵗以為常近來有等姦蠻自號大小頭目各攜婦女千百成羣前來重慶對岸搭房居住為娼流棍姦匪亦皆溷跡其中甚有關於地方風俗朕思此等姦蠻自應嚴行驅逐免致滋事但威逺等處回民多藉傭工度日若因此槩行禁止不令出境恐失其生理又非情法之平著𫝊諭該撫轉飭地方官實力稽察除實繫傭工力作之人仍聼其往來居住外若攜帶不良蠻婦有關地方風化者即行逐回交該管官約束不許出境將流棍等一并懲治欽此十三年題準福建臺灣府屬彰化縣生番一百九十九名彚入彰化縣版籍嵗貢鹿皮折銀二兩四錢彚入奏銷又題準廣西慶逺府屬之宜山縣龍門司接界索潭等六村歸流土民一百七十九口歸入宜山縣版籍熟田七十四畝額徴銀二兩六錢二分三毫遇閏徴銀二兩七錢九分七釐有竒升科徴夲色米三石一斗六升七合二勺歸入宜山縣管轄造入地丁奏銷乾隆三年題準臺灣府屬合番社向化生番男婦二百八十五名附入臺屬版圖嵗貢鹿麞皮各一張變價充餉一安集流民順治十一年覆準各旗及富户有能捐資安插窮丁者報部題請敘録十二年覆準州縣官安插流民千名至五千名者準與紀録督撫總計通省名數議敘康熙五年題準地方官招集流民萬名者紀録一次七年覆準見任文武大小各官有能捐資遷移四川流民歸籍每百家以上者紀録一次四百家以上者加一級五百家以上者加二級六百家以上者加三級七百家以上者不論俸滿即升招回之民責令地方官安插乾隆元年覆準䝉古人流移口外大通地方者稽察明白分晰安插繫有原管之扎薩克者仍交與收管其别無管轄者交附近各部落安插將户口細冊送理藩院其立有産業者地方官估直動支公項銀按數給與俾赴安插處所别立産業其原立産業交地方官經管如有民人情願承業者即照數定價歸項令其執業其無産業者大口賞羊六隻小口賞羊四隻酌量交附近各部落分别安插自清釐安插之後如有容留外來䝉古將容留人治罪失察官參處三年題準閩人往番年久準其攜帶妻子回籍如夲身已故所遺妻子等許其在番親戚故舊帶回若無親故許將故父鄉貫族屬並隨帶人口書單交給船户齎回入口報明汛辨轉報地方文武官按單㸃驗將單轉發夲籍令族屬保領如無保領及姓名互異即行究治其所帶回妻妾不許别嫁以杜拐販一買賣人口雍正四年議準漢人家生奴僕印契所買奴僕並雍正五年以前白契所買及投靠養育年久或婢女招配已生子者男屬世僕永逺服役其女婚配悉由家主仍造清冊呈明地方官存案凡漢人買僕及婢女招配並投靠之人均書明文契呈地方官鈐印如有事犯驗明報官冊及印契照例治罪欽定大清㑹典則例卷三十三
