body:
  text: 户部户口下一直省户口總數順治十八年直省人丁二千一百六萬八千六百口康熙六十年直省人丁二千五百三十八萬六千二百有九口雍正十二年直省人丁二千七百三十五萬五千四百六十二口乾隆十八年直省人丁三千八百八十四萬五千三百五十四户萬有三百五萬口直隸人丁三百有七萬一千九百七十五户九百三十七萬四千二百十有七口盛京人丁五萬九千二百十有二户二十二萬一千七百四十二口山東人丁四百五十三萬九千九百五十七户一千二百七十六萬九千八百七十二口山西人丁百七十七萬九千二百四十七户五百十有六萬二千三百五十一口河南人丁三百二萬九千五百二十八户七百十有一萬四千三百四十六口江南江蘇人丁五百四十七萬八千二百八十七户一千二百六十一萬八千九百八十七口安徽人丁四百十有三萬六千一百二十五户一千二百四十三萬五千三百六十一口江西人丁二百十有八萬五千一百九十五户五百有五萬五千二百五十一口福建人丁一百十有二萬七千七百四十六户四百七十一萬三百三十九口浙江人丁三百四萬三千七百八十六户八百六十六萬二千八百有八口湖廣湖北人丁百七十五萬六千四百二十六户四百五十六萬八千八百六十口湖南人丁百六十六萬四千七百二十一户四百三十三萬六千三百三十二口陕西西安人丁百有三萬三千一百七十七户三百八十五萬一千有四十三口甘肅人丁百萬二千五百十有八户二百十有三萬三千二百二十二口四川人丁七十五萬七百八十五户百三十六萬八千四百九十六口廣東人丁百二十四萬一千九百四十户三百九十六萬九千二百四十八口廣西人丁九十四萬三千二十户一百九十七萬五千六百十有九口雲南人丁三十七萬一千二百八十四户百萬三千有五十八口貴州人丁六十二萬九千八百二十五户百四十一萬八千八百四十八口一編審順治五年題準三年一次編審天下户口責成州縣印官照舊例攢造黃冊以百有十户為里推丁多者十人為長餘百户為十甲城中曰坊近城曰廂在鄉曰里各設以長每遇造冊時令人户自將夲户人丁依式開寫付該管甲長該管甲長將夲户并十户造冊送坊廂里各長坊廂里各長將甲長所造文冊攢造送夲州縣該州縣官將冊比照先次原冊攢造類冊用印解送夲府該府依定式别造總冊一夲書名畫字用印申解夲布政使司造冊時民年六十以上者開除十六以上者增注十一年覆準每三年編審之期逐里逐甲察審均平詳載原額新增開除實在每名徴銀若干造冊報部如有隱匿揑報依律治罪十三年覆準五年編審一次十五年議準各省編審人丁五年一次造冊具題於編審次年八月內到部如不照限題報者經管官照違限例議處府州縣編審年分借名造冊科派者從重治罪督撫不參究一并議處康熙十一年覆準直省編審槩令繕疏具題二十六年覆準編審闕額人丁令該撫陸續招徠於下次編審補足五十二年恩詔嗣後編審增益人丁止將滋生實數奏聞其徴收辦糧但據五十年丁冊定為常額續生人丁永不加賦五十五年覆準新增人丁欽奉皇恩永不加賦令以新增人丁補足舊闕額數除向繫照地派丁外其按人派丁者如一户之內開除一丁新增一丁即以所增抵補所除倘開除二三丁夲户抵補不足即以親族之丁多者抵補又不足即以同甲同圖之糧多者頂補其餘人丁歸入滋生冊內造報五十六年題準續增人丁既不加賦將增丁之州縣官貟議敘停止又題準如有州縣將滋生人丁私行科派者該督撫即行題參乾隆元年議準滋生户口每逢五年務須據實造報實力奉行不得視為具文脫户漏口五年議定直省督撫於每嵗十一月將各府州縣户口增減繕寫黃冊具奏仍將奏明數目報部察核彚奏又題準造報民數每嵗舉行為時既近而自通都大邑以及窮鄉僻壤户口殷繁若每年皆照編審造報誠恐紛煩滋擾直省各州縣設立保甲門牌土著流寓一切臚列原有冊籍可稽若除去流寓將土著造報即可得其數目令該督撫於每年仲冬將户口實數與榖數一并造報以免紛擾至番疆苖界向不入編審不必造報一清釐丁役順治四年題準編審人丁凡年老殘疾並逃亡絶户悉行豁免十三年議準江南通計州縣田地總額與里甲之數均分辦糧當差豪户不得多占隱役苦纍小民其推收編審悉照均田均役聼民自相配搭又覆準屯丁納糧準免民田重科康熙五年覆準廣西西隆州西林縣改歸內地停其編丁三十五年覆準雲南兵丁除夲身外其兄弟親族等餘丁悉令清出編入丁數輸稅四十年覆準四川東川府僻處極邊難與腹裏州縣一例編丁應停其編審雍正四年改隸雲南省五十三年覆準甘肅實在無業窮民編入丁冊免其納丁五十五年議準買賣地畝其丁銀有隨地起者即隨地徴丁倘有地賣丁留與受同罪雍正六年覆準河東鹽池渠堰嵗修大修既有動支之費其鹽丁民夫永裁將丁夫編入民籍與民一例差役七年議準廣西寧明東蘭二州以土改流免其編審九年覆準停止廣西歸順州編審十一年覆準滇省緬寧地方改土歸流停其編入丁冊一口賦直隸布政使司所屬人丁每口三分至二兩六錢有差民丁屯丁稅共四十二萬四千四百四十四兩一錢九分八釐遇閏加徴一萬六千二百八十兩九錢四分二釐五毫奉天府尹所屬人丁每口一錢五分至二錢有差遇閏不加徴山東布政使司所屬人丁每口五分三釐九毫至七錢八分零有差共民屯丁稅三十四萬七千四百四十九兩八錢八分有竒遇閏加入地畝內徴解竈丁稅六千六百二兩六錢三分三釐有竒山西布政使司所屬人丁每口一錢至四兩五分三釐零有差更名國初以明代各藩所占之田歸民墾種曰更名田因有更名丁後同屯丁口一錢至三錢零有差共銀五十六萬三千七百十有三兩九錢九分地差銀七萬八千二百九十三兩二錢各有竒遇閏不加徴河南布政使司所屬人丁每口一分至二錢零有差收并衛所口二分至一兩五錢有差共民丁稅十有一萬三千百六十兩五錢七分六釐衛所丁稅六千九百四十八兩七錢六分更名寄莊寄糧丁稅百五十四兩四錢四分八釐各有竒遇閏不加徴江南江蘇布政使司所屬人丁每口一分四釐至二錢零有差别有科錢五文者共民丁稅二十三萬九千五百四十六兩九錢六分三釐有竒遇閏加徴千八百二十七兩二錢六分一釐有竒軍丁稅萬一千二百二十四兩五錢九分七釐有竒遇閏不加徴安徽布政使司所屬人丁每口五分至五錢一分九釐零有差鹽鈔口銀七釐四毫共民丁稅二十萬七千八百七十六兩八錢七分有竒遇閏不加徴衛所丁稅萬二千五百七十二兩三分有竒遇閏不加徴屯丁稅二十六兩六錢九分二釐二毫遇閏加徴二錢二分六釐寄莊丁稅八兩九錢六分一釐遇閏不加徴匠班丁稅三千八百七十兩三錢有竒遇閏加徴三錢三分七釐五毫江西布政使司所屬人丁每口三分二釐零至一兩三錢四分六釐零有差鹽鈔小口口二釐六毫至九釐五毫零有差共民丁稅十有八萬三千六百七十五兩有竒遇閏加徴千八百五十五兩有竒屯丁稅千三百二十六兩遇閏加徴二十三兩各有竒福建布政使司所屬人丁每口八分三釐九毫零至二錢九分一釐有差鹽鈔小口口一分四釐七毫至一分八釐一毫有差共民丁稅十有七萬五千有七十五兩四分四釐七毫屯丁稅五千四百二十四兩七錢六分五釐五毫各有竒遇閏不加徴浙江布政使司所屬人丁每口二釐至五錢七分二釐零有差别科米二合二勺至三升三合有差共民丁稅二十三萬六千九百九十一兩七分有竒遇閏不加徴屯丁稅五百二十七兩六錢二分三釐遇閏不加徴湖廣湖北布政使司所屬人丁每口一錢五分四釐零至六錢四分三釐八毫零有差共民屯丁稅十萬九千九百九十九兩五錢四分有竒遇閏不加徴湖南布政使司所屬人丁每口三分零至八錢三分五釐零有差共民屯丁稅七萬七千三十六兩四釐有竒遇閏不加徴陕西西安布政使司所屬人丁每口二錢共民屯丁稅二十四萬三百十有三兩一錢五分有竒遇閏加徴八千七百二十七兩八錢三分有竒甘肅布政使司所屬人丁每口二錢共民屯丁稅六萬一千九百四兩三錢三分有竒分河東河西河東遇閏加徴二千四百三十三兩七錢四分有竒河西遇閏不加徴四川布政使司所屬人丁每口一錢二分至五錢一分零有差共丁稅五萬六千九百九十一兩八錢二分一釐四毫有竒廣東布政使司所屬人丁每口一釐九毫零至一兩三錢二分六釐零有差共民丁屯丁黎丁稅十有二萬三兩七錢九分有竒遇閏加徴五千五百十有八兩四錢七分九釐有竒廣西布政使司所屬人丁每口一錢五分至四錢五分二釐零有差共民屯丁稅四萬六千三百三兩一錢有竒遇閏加徴三百二十四兩二錢雲南布政使司所屬人丁每口三分至五錢五分有差共民站丁土步軍丁魚户丁稅二萬九千三百三十九兩一錢二分六釐新增威逺三圈蠻令等村丁銀三十二兩新增貴州威寧州撥歸宣威州丁銀三十四兩八錢遇閏不加徴貴州布政使司所屬人丁每口一錢五分零至四兩零有差共民丁夷丁稅一萬三千七百八十一兩一錢二分有竒遇閏加徴六百六十三兩四錢三分有竒一丁銀攤徴康熙十一年覆準浙江所屬食鹽鈔銀均攤入地丁內徴收三十六年覆準浙江匠班銀七千四百九十兩有竒均攤於通省地丁下帶辦三十九年覆準湖北匠班銀照浙江之例歸入地丁徴收四十一年覆準山東匠班銀歸入地丁徴收五十五年議準廣東所屬丁銀就各州縣地畝分攤每地賦銀一兩均攤丁銀一錢六釐四毫不等雍正元年覆準直𨽻所屬丁銀均攤地糧之內徴收每地賦銀一兩合攤丁銀二錢七釐有竒二年覆準福建所屬丁銀就各州縣地畝分攤每地賦銀一兩合攤丁銀五分二釐七毫至三錢一分二釐有零不等屯地每兩徴丁銀八釐三毫至一錢四分四釐八毫零不等三年覆準山東所屬州縣衛所各項丁銀皆攤入地畝內徴收每地賦銀一兩合攤丁銀一錢一分五釐四年覆準河南所屬丁銀攤入地畝徴收每地賦銀一兩合攤丁銀一分一釐七毫六絲至二錢七釐二絲零不等又覆準浙江各屬丁銀以通省之田畝均攤每田賦銀一兩均攤丁銀一錢四釐五毫不等又題準陕西西安所屬民屯更名地等丁攤入地糧徴收每地賦銀一兩合攤丁銀一錢五分三釐遇閏每銀一兩合攤丁銀一錢五分七釐有竒又題準甘肅所屬有民屯更名監牧等丁河東地糧輕而丁多河西地糧重而丁少不能通省一例攤派河東每銀一兩攤丁銀一錢五分九釐三毫有竒遇閏每銀一兩加徴銀一錢七分四釐八毫河西每銀一兩攤丁銀一分六毫有竒遇閏不加徴又題準四川所屬丁銀向繫以糧載丁徴收經年已久惟威州等十一州縣繫丁地分催自五年為始亦令以糧載丁每糧五升二合至一石九斗六合零不等算人丁一丁徴收五年題準江南江蘇所屬丁銀在於各屬田地項下攤徴省衛外衛丁銀在於各屬屯衛田地項下攤徴安徽所屬丁銀在於各屬田地內攤徴各衛所屯丁在於各屬屯衛田地內攤徴均每畝攤徴丁銀一釐一毫至六分二釐九毫零不等又婺源縣寄莊人丁又匠班銀均在田地內按畝攤徴又覆準江西所屬丁銀攤入田畝屯糧內完納每地賦銀一兩合攤徴丁銀一錢五釐六毫屯地每兩徴丁銀二分九釐一毫有竒六年題準