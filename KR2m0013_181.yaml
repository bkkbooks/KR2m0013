  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_181-1a, image: WYG0625/WYG0625-0599a.png}
body:
  text: 八旗都統公式一軍政順治十一年議準武官軍政五年舉行一次二品以上官具疏自陳三品以下該管官分别優劣送部具題雍正元年議準八旗都統副都統前鋒䕶軍歩軍各統領皆近御大臣不必具疏自陳至所屬武職各官令其確覈賢否注考舉劾又議準内外考察旗員有在軍前受傷得功者均詳注於冊其不入舉劾照常留任者均注冊送部由部奏請欽簡王公大臣公同考察乾隆五年議準八旗軍政向無定例嗣後考察各官定以四格一曰操守或亷或平或貪一曰才能或長或平或短一曰騎射或優或平或劣一曰年歲或壯或中或老並將各官履歴及在軍前受傷得功之處注明於冊送兵部覈覆其堪膺薦舉者有職任官必有行止端方弓馬嫻熟馭軍嚴肅居官勤慎不擾所屬給餉無虛考語無職任官必有行止端方弓馬嫻熟馭軍嚴肅居官勤慎考語方準薦舉糾劾之官必貪酷不謹罷軟年老有疾才力不及浮躁者方準糾劾此内如世爵患病必全不能行走者照例糾劾若猶能黽勉及年老者皆著寛免其軍政冊於本年十月内具題到部七年奏準卓異官遇下次改為二三等者其從前卓異咨部注銷十五年諭大計軍政固三載考績之義以示激揚但文武大臣具疏自陳雖屬遵循舊例而於實政未有裨益蓋中外大臣皆朕所簡用旣經委任其居心之誠否才具之短長舉在洞鑒之中如其不能稱職早已隨時甄别其待至三年而計去者實職非要任而人非大過介在可否之間者至於大臣恪共職守正宜久任以收實效而届期輒求斥退復降㫖令照舊供職拘成例而事繁文非崇實務本之道也至御前大臣領侍衛内大臣等或簡自勲戚或拔從宿衛其辦理閣務卿長以及八旗職任皆量才器使非循資錄用者比且多世沐國恩趨承左右論其情理亦不當引退就閒甘心暇逸而每至三年亦循例求罷是轉以疎逺自居如君臣一體之義何前因宗室王公兼有職任者皆繫宗潢近派特㫖令其不必自陳嗣後御前大臣領侍衛内大臣御前侍衛乾清門侍衛兼理閣務及八旗事務者遇大計軍政皆不必自陳餘仍照舊例行欽此十八年奏準軍政之年八旗都統等於九月初一日至初十日造具事實清冊送部又奉㫖八旗世爵不必入軍政考察交該旗大臣三年一次引見於引見時仍將平日行走何如之處一并聲明具奏永著為例一計功雍正三年議準兵部歲將印紙分發各旗遇有應紀錄官員詳書印紙加用旗印給發歲終彚咨兵部注冊其應得紀錄條欵凡十有三條一叅佐領能遵循禁令訓示所屬除惡向善者至五年準加一級一叅佐領及各校能正己率屬守分急公者五年準紀錄一次一叅領能訓練兵丁弓馬嫻習遇公事無失期㑹者準紀錄二次一佐領驍騎校能令所部通習國語嫻熟禮儀工馬歩射者三年準給佐領紀錄二次驍騎校一次一佐領驍騎校能拏獲盜逃賭博及金刃傷人之犯至五次者各準給紀錄一次一監放倉米之旗員五年無過能舉職者準紀錄一次一牧場官校能加意牧放如一叅領所轄之馬駝肥腯其屬官校各準紀錄一次一旗所轄之馬駝肥腯叅領紀錄二次其屬官校各紀錄一次一監修工作官能節省錢糧工程堅固三年無傾圯者準紀錄一次一承追虧空官能將隱匿房産察出價直二千兩以上者奏聞準紀錄一次直四千兩者二次六千兩者三次八千兩者加一級數更多者按例予以加級紀錄一散秩官内有勤職工射及器械修理者三年準紀錄一次一錢糧冊籍有弊能知情舉首者按其事之輕重量予紀錄一官員奉差辦事實心稱職者事按大小其應給紀錄者準給一次一族長果能敎導族人日進於善者三年量給紀錄以上條欵著永為例五年奉㫖嗣後八旗將紀錄人員於歲底彚奏之時但令直月旗敘入案呈具奏各旗不必將案呈敘入若特㫖賞給紀錄者著照常彚奏其旗下應給紀錄者各旗都統於奏事之便奏聞再於歲底彚奏乾隆三年覆準族長所管本族内並無匪人出結呈佐領驍騎校加具印結每月終呈該旗存案年終考察一次如三年無過者交兵部照例議敘至佐領驍騎校敎導所部乃其分内之事如果實心敎導者該都統於應升處列名無庸議敘四年覆準已滿三年之族長繫見任官照例咨部議敘外其未得官之族長造冊二本各鈐印一送兵部竢補官日覈對該旗來文補給紀錄一存本旗如未得官之前有應議之罪一并咨部準其將紀錄抵銷五年議準印房俸餉房及各叅領承辦之事於一年内依限全完者準給紀錄一次佐領事簡於三年内均依限全完者佐領驍騎校領催各準給紀錄一次應紀錄之叅領以歲終佐領驍騎校以三歲均彚冊具奏咨部其領催應得紀錄注冊竢補官日照例覈給如於未得官之前有應議之罪者準將紀錄抵銷六年議準佐領驍騎校敎導所部向例議敘之處已經停止則叅佐領訓練兵丁嫻習騎射期㑹無誤並叅佐領及各校遵循禁令訓示所部正己率屬守分急公散秩官勤職工射器械修理均繫分内應為之事槩予議敘轉滋冐濫應請停止再八旗應紀錄官均由本旗彚奏其由直月旗具奏之處亦應停止七年奏準族長内有文職應得紀錄者仍行兵部轉行吏部注冊仍知照該旗十八年奏準佐領拏獲逃人賭博監倉官五年無弊監工官節省錢糧工程完固奉差官實心辦事均分所應為至錢糧冊籍禀首情弊定例以來未有其事例為虛設向例給予紀錄之處均請停止再八旗奏給官員紀錄旣於本年照數奏給其次年歲終奏銷事屬繁冗亦應停止至領催族長無官職者其紀錄注冊毋庸入奏竢補官日入於見年應請紀錄官員摺内聲明具奏一劾過雍正三年奉㫖嗣後八旗都統察其該旗一切應行叅奏之事即行叅奏其曽經奏過之都統等將職名與叅案緣由並奏過幾次皆於歲終彚疏以聞至未經叅奏一次者亦令聲明乾隆四年奏準八旗五品以上官有應議之案題叅六品以下官咨兵部又奏準五品以上官本身有犯仍照例題叅外其因人株連及失察等事仍咨兵部議處又奏準八旗各叅領等㑹辦之事如實繫限内不能完結者呈明展限如無故違限承辦官記過一次印房俸餉房皆總理一旗事務之所五叅領乃匯理各佐領事務如一月違限至三件者承辦官記過一次佐領承辦之事一月内違限一件者佐領驍騎校各記過一次承辦展限事務之叅領官員等並不將展限之處報明至遺漏者記過一次歲終彚考記過各官記過一次者免議記過二三次者行兵部議罰領催記過至三次者交該叅領責懲五年定在京三品以下五品以上降革旗員如任内無錢糧未清及治罪之案者該管大員將該員降革之案咨送都察院秉公覈覆該管大員出具考語引見其外省駐防降調各官由該駐防上司官咨在京本旗轉行都察院覈覆該駐防上司官出具考語送旗引見非因公者不在此例又定革職留任官四年無過該管官奏請開復六年定世爵及世管佐領兼文武職任官犯有貪汚行止不端者不論何任事發皆全革因溺職叅革者其世爵應革應留由旗奏請奉特㫖革職者按其獲罪繫何任内除所獲罪之本任照例革職外餘所兼之職具奏請㫖其世爵佐領選充侍衛因家道不能行走經該管官駮囘者仍留其世爵佐領若因怠惰曠職行止不端叅革者一并革退七年奏準軍政考察職任官兼世爵佐領以浮躁叅者留世爵職任官與佐領一并降調以才力不及叅者將見任官降調仍留世爵佐領若繫公中佐領不在此例一朝㑹班聨順治九年定八旗官員恭遇萬壽聖節元旦前後七日上元節前後三日上三旗四品以上官於太和門外五品以下及下五旗官於午門外咸朝服列坐五旗王公所屬佐領下官員遇元旦前後七日上元節三日於本王公府第坐班餘日仍於午門外分翼坐班又定八旗武官大節及常朝日上朝外每月初一初十二十日具補服於午門外分翼坐班如遇車駕廵狩方嶽每日常服坐班康熈元年題準凡遇典禮上朝及常朝日齊集公侯伯都統子尚書在頭班坐䕶軍統領副都統前鋒統領侍郎男歩軍翼尉大九卿在二班坐一等侍衛䕶衛叅領輕車都尉歩軍協尉小九卿郎中在三班坐二等侍衛䕶衛騎都尉佐領員外郎科道官在四班坐三等侍衛䕶衛雲騎尉鳴贊官主事歩軍尉在五班坐䕶軍校驍騎校筆帖式在六班坐其坐次各照職銜不論加級違者察出送部議處乾隆元年奏準凡遇朝㑹之期一應閒雜人等令守衛禁門官軍並各旗委驍騎校二人協同管束毋得肆行出入喧譁違者拏究一侍班乾隆四年奏準八旗都統前鋒䕶軍各統領於輪班奏事之日各以所屬十人出具考語照部院司官例侍班引見奉㫖記名者咨兵部注冊佐領内兼文武大臣或直御前乾清門侍衛及叅佐領兼部院司官者均毋庸侍班引見一齋戒雍正五年奉㫖壇廟祭祀關繫綦重理宜嚴潔齋戒聞大小官員於齋戒處飲酒嬉戲殊非敬謹之禮嗣後令御史二人各部院司官四人每旗賢能官一人内務府官二人三旗侍衛二人往壇内稽察如被察出即行叅奏其齋戒臨近時將旗下大臣職名具奏朕酌量簡徃欽此七年覆準凡遇大祀八旗齋戒各官向在外金水橋齋宿今見設八旗公署令各在該署齋宿八年覆準遇齋戒日各該旗將齋戒官職名照例造冊咨送若有遺漏將造冊官議處其應齋戒而不到者將不齋戒官議處又覆準遇齋戒日若值一旗大臣均縁事不齋戒即於不齋戒之大臣内著一人在署約束齋戒各官十年覆準大祀前期欽㸃稽察大臣及承察之御史叅領侍衛内著一半宿城外稽察十二年覆準齋戒之期各旗除將各官職名冊送太常寺外别具冊一本送寺存貯竢欽㸃稽察大臣委官赴寺領冊察覈其不造冊送寺者造冊官叅處乾隆十三年奏準凡應齋戒官如有奉差患病等情據實結保附注於冊如造冊不符或冊送而該員不到者叅處如偶遇患病臨期不及齊集者報承察衙門免議一稽察倉厫康熙元年覆準每季放米各倉差旗員一人㑹該監督監視支放如通同作弊者由倉場侍郎叅處雍正五年諭在京十倉每倉或都統或副都統各差一人御史不論滿漢各一人專任稽察之責其支放奏銷等事不必經管其倉房滲漏牆垣損壊與倉内鋪墊曁匪類盜竊各弊察出即行文倉場侍郎知之若倉場侍郎等遲延不及時辦理妥協即據實奏聞倘不能察出弊端以致虧損倉糧著落都統副都統御史與倉場侍郎等官分賠其通州三倉即照此例交與通永道通州副將稽察其失察分賠之例亦與京倉同欽此乾隆十年奏準察倉都統等如有出差患病事故止在二三月之内者不必奏簡大臣即令該察倉御史兼管若該御史亦有出差事故或都統等出差在三月以上者奏請署理十二年奉㫖廵倉都統御史定為三年一次更代又議準在京各倉有應修葺之處該監督估報倉場侍郎及稽察之都統御史覈實興修其工程在百兩以上者都統御史㑹倉場侍郎確估奏聞興修十三年諭令都統御史察倉並非止令稽察倉厫滲漏原令其兼察偷米等弊今察倉大小官員以非關己任不行管理實非差徃之本意著察倉都統御史等凡有偷領私米等弊嚴加稽察毋致疎忽欽此又議準開倉領米該監督㑹同該旗委出之叅領等覈明冊籍米數相符乃如數支放每車給隨車領催兵丁等小票一紙注明米色數目以便倉門守兵稽察如無票或米數不符者拏究又奏準八旗領米時務將佐領下各項米數及赴倉領米之領催等姓名造冊鈐用該叅佐領關防圖記交監督㑹監視支放之旗員覈驗如冊内無名之人毋得放入一公署辦事雍正元年諭嗣後八旗著各當直一月每月將應當直都統等職名開列具奏竢朕㸃一人總承八旗公辦事件及傳集立稾等事若於齊集之時有不到者於㑹議摺内不必列其職名欽此五年議準八旗公所辦事都統正坐副都統旁坐叅領於副都統稍後坐白事於都統副都統前叅領起立佐領以下官均屈一膝其侍衛藍翎侍衛視叅領副叅領署叅領繫騎都尉以上官充補者亦如之雲騎尉以下官充補者視佐領散秩官繫男以上者視叅領輕車都尉以下者視佐領白事於管旗務之王貝勒宗室公前叅領以下官咸屈一膝白事於管佐領之大臣前各照品級行其佐領繫科道以下官充補者與叅領同宗室充補者於旗下大臣前咸侍立白事驍騎校等白事於叅領屈一膝於佐領前侍立其前鋒䕶軍各統領在公所辦事前鋒叅領侍衛䕶軍正副叅領並騎都尉以上官署前鋒叅領侍衛䕶軍正副叅領者視八旗叅領雲騎尉以下署叅領等官者視八旗佐領前鋒䕶軍校均視八旗驍騎校凡八旗各官公所遇别旗大臣與本旗大臣同又奉㫖宗室管佐領者於王公前白事著屈一膝又議準副叅領向繫五品今旣定為四品在公所辦事應在叅領之次佐領之上其宗室補授叅領者白事儀注照宗室管佐領之例行又覆準八旗一應特㫖交辦之事並簡選引見人員直月都統等自應備悉其已結未結即令其詳察奏聞又奏準八旗及直月旗所理易結之事均限十日完結六年奏準八旗輪流直月並無公所每月未結案件移文下月承辦已結者上月該旗收貯遇有覆檢之事挨旗稽考必致遲誤嗣後設立直月公署不論旗分每翼官二人校二人在署辦事一年更代凡已結未結之事均令注冊勤慎者公同保奏再於領催驍騎内擇能書者八旗滿洲䝉古漢軍各一人令其繕冩勤慎者行知該旗於應升處列名又奉㫖直月旗所奏摺内不必將直月都統之職前列仍照管理旗務王大臣之品級開列從前似此具奏者著改正注冊七年奉㫖凡交議之條陳事件其原條陳之大臣亦著入班㑹議又覆準八旗一應奏摺及覆奏之㫖均黏連鈐印敬謹收貯將年月事由及所奉諭㫖登載簿籍鈐印以備稽考承辦官於接代日交代如有玩忽及舞弊者叅奏議處又覆準由旗咨行各衙門之事皆著實封若𦂳要之事宻封應封不封致漏洩者將承辦之員按事輕重議處乾隆元年奏準八旗㑹議有不得到班之大臣著將所定之藁錄送應改者限三日内改正畫押送囘如無故不到及畫押逾限者直月都統叅奏有應行問各衙門者照例於限内咨覆逾限不覆者叅奏亦如之如實繫限内不能完結者直月都統等奏請展限三年奏準八旗㑹議之事各大臣務須齊集畫題其有故不到者於次日齊集補畫仍托故不到直月都統等察叅交部議處其送稾畫題永行停止五年議準八旗易結之事限十日完結各叅領㑹理之事限内不能結者呈該都統限二十日即將扣限之處行原行及各稽察衙門直月旗易結之事限十日有行察調取者限二十日以上限十日者各給餘限十日二十日者各給餘限二十日如逾餘限者察叅議處六年議準八旗直月每月於二十六日交代應直月都統等由下月該旗列本旗各都統等職名奏請簡用九年奏準每月注銷己未完旗務並補授各官均於每月十五日以前冊送該御史察覈如有逾限者承辦注銷官叅處十二年奏準八旗公産地價銀繫五限交納之案毋庸注銷外其餘一切公産地畝之事均入注銷移稽察上諭處及該御史察覈遺漏遲延者叅處十六年諭八旗都統等辦事每每遲延雖有直月都統等彚總承辦均推諉成習惟茍且過此一月移於下旗便完伊等之事並不實力奉行此風甚陋於事無益嗣後八旗按旗直月著停止朕特簡數人一年一次輪流直年不必論旗將八旗都統副都統職名該部全列朕酌量簡用令伊等各於旗員内選其優者八旗應彚辦事務令其承辦歲終將一年内所完事幾何未完事幾何逐欵繕摺奏聞伊等實力奉行不奉行之處即可槩見將此永著為例欽此又議準凡奉㫖交議及畫一定議之事由直年處㑹八旗都統等公議直年處定稾集八旗都統等念槀同聽有應改者即改正畫題其有不得㑹議者直年處交該旗官送閱畫題即繳送直年處具奏完結一關支俸餉康熙元年奏準八旗俸餉冊每季以上月初十日送戸部逾限者造冊官題叅交部議處三十九年議準八旗官兵俸餉按限造冊送部轉劄該庫該倉至期赴領馬銀亦照此辦理統於歲終繕黄冊進呈雍正二年奏準各佐領下支領銀米冊將該佐領下實在兵丁額數填寫其拔補入别佐領下者即歸見補之佐領冊内支領七年奉㫖八旗官員俸米一佐領給與一票按票支放兵丁仍照舊例支放八年奏準八旗各設左右司銀庫令右司辦理十二年議準凡在京文武官降罰之案奉㫖後吏兵二部行知户部領俸時令各該處將各官有無事故造具清冊春季於上年十二月十五日秋季於六月十五日以前咨吏兵二部其外官調補京職所有隨帶降罰之案亦令本人呈報該衙門一例造送由吏兵二部覈實行戸部關支又議準八旗文武各官於俸冊過部之後告休身故者不行裁扣革職者裁扣又奏準支放庫銀令八旗叅領佐領驍騎校㑹庫官公同稱兊收領領囘該官校監視散給又奏準八旗休致身故官員未完罰俸銀免其追繳如世爵及休致有俸者不在此例十三年奉㫖裁左右二司銀庫令印房叅領管理又議準八旗外任官調補京職於俸冊過部後囘京者該員原俸已經離任截支又不得造入旗冊支領與在京升補之官殊不畫一嗣後此等人員如遇俸冊過部之後該旗將其原任職銜造冊送部乾隆元年諭八旗䕶軍校驍騎校等多由兵丁拔補原繫微末之員遇有罰俸著每月扣除一半支領一半俾伊等稍資用度以示朕體䘏旗員之至意欽此又奏準冊過部後新補官員如繫閒散人無原俸原餉可支在春秋季孟月三十日前奉㫖補授者准其具冊補領縁事開復官亦照此例行二年覆準八旗兵米定為四季於二五八十一等月放給又議準各旗支領俸銀俸米定有成限所造冊内或有數目舛錯駮囘改正未免稽延應令戸部傳該旗承辦之官赴部與該司官公同改正該司官即具稾備劄仍令該旗員領囘鈐印限三日内送部劄庫支領又奏準俸餉各冊無論有無駮改俸冊總以六月十二月之十五日餉冊以每月之十五日為過部定限官兵升轉在限前者準支新任俸餉在限後者不與告休身故在限後者準其攴領在限前者裁扣各倉米以每季孟月初一日為限如官兵降革在限前者米追繳限後者免追其或不遵例按月報部及送冊逾限者承辦官叅處三年奏準在京八旗世爵繫造入旗冊關支而外省文職各官向照地丁額編數目支領今以世爵而為外省文職者若在任所關支不但該省編額項下數目不敷且各省奏銷亦無開銷俸米之例若竟隨旗支領如遇外任内扣荒罰俸等項必致無慿扣除嗣後除外任俸銀若干行文任所支領外其餘銀米均留京支領其世爵之俸與外俸相等或外浮於内者均令在任所支領俸米仍全數留京又議準盛京官員有父母年老或家口不能攜徃任所願將俸祿留於京師以資養贍者令該旗覈實具印結咨部準其銀米一并留京四年覆準八旗世爵為各省駐防官者支領俸銀照乾隆二年世爵為外省文職例辦理俸米照俸銀例辦理十三年議準八旗設立銀庫一應官銀該叅佐領呈報都統等暫貯旗庫委叅領專管撥兵輪班看守其應交部庫者該都統分案具批委官解部具印簿二本記出納細數遇該叅領接任時盤察交代如有侵那等弊由該都統叅追十七年諭向來八旗兵米皆按四季支放但放完之後去下次放米之期尚逺舖戸得以乘機囤積米價日昂若將兵米陸續支放未免紛繁其應如何酌分旗色按月輪放之處妥議具奏欽此遵㫖覆準鑲黄正黄二旗兵米於正四七十月支放正白正紅鑲白三旗於二五八十一月支放鑲紅正藍鑲藍三旗於三六九十二月支放十八年定閒散覺羅有隨任子弟至十八歲者繫在陵寢地方及盛京者準其在京城支領銀米若隨任各省者均停支囘京後報明旗部按數補給一出入符信順治十五年題準旗人出關該都統咨兵部給票採木人工部咨兵部給票康熙五十一年覆準山海關行走旗人甚多侍衛官員前鋒䕶軍驍騎各執事人等徃盛京吉林黒龍江等處與祖父上墳探親般取家眷或有將誘賣之人買去雜入役從内帶至彼處轉賣者亦未可定嗣後八旗官兵及閒散人等前徃盛京吉林黒龍江等處所屬地方者繫侍衛令領侍衛内大臣繫前鋒䕶軍令前鋒䕶軍統領繫驍騎校領催驍騎閒散人等令都統副都統均逐一驗明令其領取部票前徃如有將此等人隱漏多行夾帶者各該管大員題叅交部治罪乾隆五年奏準八旗官員有事告假徃盛京游牧地方及近京等處繫官該都統具結咨兵部給以路引繫領催驍騎人等由該佐領報叅領給與關防印票前鋒䕶軍各執事人慿來文給票如之閒散人給以圖記印票票各注限期與所徃之地均呈該都統存案其告假徃外省者官兵均咨部給引其引票囘日繳銷不繳銷引票及逾限不囘者鞭五十不告假而私徃或徃非所指之地者鞭一百兵革退以上所犯繫有職人交部議處又議準駐防旗人因考試襲爵承廕赴選省親等事來京該管官取具本人三代年貌冊送該旗再具印文並將年貌注明給本人齎投其外省隨任子弟有事來京者大臣子弟該父兄具冊咨旗餘官子弟該父兄冊呈該管上司轉咨各具印文給本人齎投並如前例至來京事畢各仍囘原處者呈該旗行知該地方具咨給本人齎呈該管官覈驗如不候咨私來及私囘或領咨而徃他處並所司留難不給咨者皆交部議處七年奏準旗人為地畆事及收租告假下屯按道里逺近酌量給假俾得從容料理八年奏準夜行傳事例用執照嗣後務將月日注明臨時給與傳事人次日繳銷不得豫行給發以滋假冐如執照月日不符者拏究并將給發之該管官議處一禁令康熙六十一年定喪家備禮自宜量力除能自備者照定例詳禮部備用外其無力者止許賃棺罩執事等項至租賃鞍馬衣箱徒滋糜費反渉欺誑應行禁止雍正元年諭凡旗員為外吏者每為該旗都統叅領各官所制自司道以至州縣於將選之時必勒索重賄方肯出結咨部及得官後復遣人徃其任所或稱平日受恩勒令酬報或稱家有婚喪等事緩急求助或以舊日私事要挾至五旗諸王不體下情分外勒取或縱管事人肆意貪求種種勒索不可枚舉以致該員竭蹶餽送不能潔己自好凡虧空公帑罹罪罷黜者多由於此嗣後如有仍蹈前轍恣意需索等弊許該員據實封章宻詳督撫轉奏督撫即據詳宻奏倘督撫瞻顧容隱即許該員封章宻揭都察院轉為宻奏倘不為奏聞即各御史亦得據揭宻奏務得通逹下情以除積弊外任旗員勿得隱忍畏懼朕不治以干犯舉首之罪欽此又諭八旗各佐領下私行科斂殊非善事貧乏兵丁所恃以為生者惟在錢糧嗣後凡佐領下一應公中事務槩不許私行科斂若有不遵者即以作弊治罪欽此又議準官民婚娶止許照定例詳禮部行納采成婚禮不許行挿戴等禮其財禮用金銀婦輿用采結樓亭者悉令禁止又議準駐防官兵除盛京等處外餘省官兵故者令送柩囘京不準在彼立墳又覆準兵丁每遇喜喪事向富室借貸令立文契以七兩為十兩或以二十兩為三十兩將米充為利息名為借銀其實暗典兵米嗣後以米為利借給銀者槩不準還如仍有借放之人或經事發將叅佐領驍騎校領催及借放中保人等一并交部議處二年覆準不肖之領催驍騎校等於該佐領下借放私債名曰印子銀每月坐扣兵餉嗣後除兵丁等自相借貸不禁外其佐領等借放印子銀坐扣兵餉之習槩行禁止每月關支兵餉令佐領驍騎校親身驗放並飭各該叅領稽察如有犯者將失察之叅領等一并議處又奏請八旗兵丁聚飲園館者責革繫官叅劾治罪奉㫖著八旗都統等照依所奏實心奉行不時稽察敎訓若視為具文茍且塞責經朕察出將該都統等從重治罪七年諭聞盛京之部屬旗員兵丁等每遇升轉遷移及喜慶等事均攅集分金彼此餽送而無力之微員及兵丁人等亦不得不勉强從事徃徃日用不敷而此例不能廢甚以為陋禮云貧者不以貨財為禮盛京此等陋習皆由於生事結納之人偶倡率於先遂致相沿成習莫知省改此亦風俗之所當禁約者著該管各官通行曉諭嗣後除吉凶大禮本人情誼敦篤情願自行餽送外倘遇尋常升轉喜慶之事不許攅集分金務虛文而耗實用如或不遵該管官察出將本人及為首邀約者一并照例治懲欽此八年具奏八旗遇婚喪事均豫行報知該佐領等照例遵行若有違例僭用者該佐領族長呈報都統送刑部治罪若有徇隱該佐領族長交兵部議處奉㫖依議著該都統察旗御史叅領侍衛及歩軍統領一同稽察果有違例僭越者即行叅奏若該旗都統察旗御史叅領侍衛歩軍統領有一處察出具奏餘皆免其議處若經他處察出將該旗都統察旗御史叅領侍衛歩軍統領等一并議處九年議準八旗瘋病之人其親屬人等即報該佐領令其親屬鎻錮看守如無親屬即交族長人等如法看守如親屬族長隱匿不報不行看守或已報而佐領不飭令親屬人等看守致病人自殺或殺他人者該佐領議處親屬族長按律治罪十三年諭古之葬者厚衣之以薪葬於中野後世聖人易之以棺槨所以變通宜民而逹其仁孝之心也本朝肇迹關東以師兵為營衛遷徙靡常遇父母之喪棄之不忍接之不能故用火化以便隨身奉持聊以遂其不忍相離之願非得已也自定鼎以來八旗䝉古各有寧居祖宗墟墓悉隸鄉土喪葬可依古以盡禮而流俗不察或仍用火化者狃於沿習之舊不思當年所以不得已之故也朕思人子事親送死最為大事豈可不因時定制痛自猛省乎嗣後如逺鄉貧人不能扶柩囘里不得已攜骨歸葬者姑聽不禁外其餘一槩不許火化倘有犯者按律治罪族長及佐領等隱匿不報一并處分欽此乾隆元年議準各省駐防官兵亡故如家貧不能扶柩囘京準照軍前之例火化官為送囘再各省駐防已故婦女閒散人等骨殖亦於官兵每年官送之便一并送京又奏準旗人如有習天主敎者拏獲從重治罪其叅佐領驍騎校族長等失察隱匿者該都統題叅交部嚴加議處三年奏準凡旗人果有親族婚喪等事邀請分資以完正事者毋庸禁止外如有指稱名色設席演劇邀請分資及不守分之徒將良家子弟誘引演劇造言聚衆者嚴拏從重治罪五年奏準盛京等處旗人身故祖塋遥逺不能送囘呈請火化歸葬者由該佐領申報都統移咨歩軍統領衙門委官徃驗火化再京外旗人奉差告假出外身故無力扶柩囘京者呈報該處官員火化攜囘其餘槩不準火化違者治罪佐領族長隱匿不報者交部議處七年奏準賭博酗酒出入園館借放轉子印子典當兵米等事每旗或委叅領旗員或驍騎校前鋒䕶軍火器營亦委叅領䕶軍校等訪拏繫賭博之案交刑部辦理其餘違例生事之案交該管大員懲戒示衆失察官交部察議仍令都察院滿堂官察旗御史五城滿給事中御史歩軍統領翼尉等嚴行訪拏又奏準凡有較射鵠者準照常習射外若開設賭場抽頭容留買局賣局之人賭錢者拏交刑部治罪八年議準八旗鑄給圖記原為公事而設至私借債負等事不得用圖記作保如有濫用者該都統指名題叅二十年奉㫖旗人罪犯充徒例折枷責此原指常犯而言若告主旗奴則當有别嗣後旗奴告主應問徒者著予實徒不準枷責完結又奏準向例旗奴徒滿之後仍給還原主但奴僕告主嫌釁旣開若徒滿後仍給原主恐伊主挾嫌陵虐或該奴積怨愈深轉致釀成事端若使徒滿囘旗又與開戸為民者無别請嗣後旗奴告主徒罪限滿之日交各該旗照例官賣仍令為奴其身價給還原主一守制順治年間定凡遇父母之喪持服百日過繼之子為本生父母持服百日為親伯叔父母親兄弟妻及已婚之子養母庶母皆持服兩月為親伯叔祖及伯叔祖之子親伯叔之子親弟兄之已婚子親嫂及子媳已婚之孫生子庶母皆持服一月為親伯叔祖母親伯叔祖之子媳及孫親伯叔父之孫親弟婦親伯叔之子媳親弟兄之子媳及親孫之媳皆於送殯後七日當差為族人於送殯後當差雍正元年議準祖父母父母故者持服百日親伯叔父母親兄弟並妻及已授室之子持服兩月親伯叔祖父親嫂親伯叔之子及已授室之孫持服一月親伯叔祖母親弟婦親伯叔子之妻出殯後持服七日宗族故者出殯後即令其行走三年覆準在外旗員丁憂據該督撫揭帖開闕其該旗行給督撫司道各印結不得給該員家人齎送限十日咨部由部轉發該撫令囘旗守制乾隆二年覆準各駐防旗員如父母在京故者該駐防處大員代為具題報部由部給假百日囘京治䘮除徃返在道日期不計外百日假滿具呈該旗行部銷假仍囘原任又奏準世爵官佐領遇親喪百日後仍引見承襲又議準文武旗員如遇親喪咨部注冊百日後入署辦事照常支俸朝㑹祭祀均免執事二十七月内除奉特㫖升用外其餘論俸推升之處皆停止服闋仍準積算前俸三年覆準八旗䕶軍驍騎等於二十七月内前鋒校等闕準其簡補四年議準京外官員如遇祖父母父母及所後祖父母父母故者皆呈該管官準假其武職如遇親喪應暫停升者報兵部五年奏準八旗文職丁憂並服闋者該員以聞訃服闋之日呈叅佐領其見任筆帖式及候補文職各官於本月三十日截限以前具冊報部考試取中及各項候補筆帖式見在注冊應用人員於毎月十五日截限以前具冊報部若事在截限以後者各展限五日盛京陵寢等處及駐防所有文職亦令本人以聞訃服闋各日期呈報該管官限十日内咨部如本人不即呈報該叅佐領等轉報遲延者皆交部議處又奏準駐防大小各官遇親喪給假囘旗者繫將軍都統以副都統䕶印代題繫副都統由將軍都統代題不與將軍同城者仍由將軍委官䕶印均一面具題一面囘旗其天津都統及無將軍統轄之副都統委官䕶印咨兵部奏銷竢署理官前徃交代後來京至無大員管轄之總管城守尉等官委官䕶印報部囘旗餘官均由該管官委官署理均一面報部一面囬旗其給假治喪仍如舊例各官之扶柩歸葬者亦如之十一年定八旗在制之䕶軍前鋒領催執事人等遇七品城門吏闕著一例升補如再遇應升未服闋者仍停升又奏準出繼之子其本生父母身故持服兩月親伯叔父母親兄弟養母庶母妻已授室之子皆持服一月同居治喪者兩月同曾祖之伯叔祖父伯叔父有子之庶母親伯叔之子親嫂親兄弟之子已授室者已授室之孫皆出殯後七日行走同曾祖之伯叔祖母伯叔母兄弟同祖兄弟之妻若子親兄弟之子親兄弟之子婦曾孫婦皆出殯後即令行走族人故者不在持服之例又議準官員服制除父母之喪應持服百日外其餘喪服皆不得藉名為偷安之計養子於本生父母之喪服制旣降為期年亦應改為持服兩月於一月後剃頭當差親伯叔伯母嬸母親兄弟妻娶妻之子撫養庶母之喪原定持服兩月者改為一月後即剃頭當差此一戸内如有承辦其事者仍照常持服兩月親伯叔祖親伯叔祖之子親伯叔之子親兄弟娶妻之子親嫂親子婦娶妻之孫生子庶母之喪原定持服一月者今定於出殯七日後剃頭當差親伯叔祖母親伯叔祖之子婦親伯叔祖之孫親弟婦親伯叔之子婦親兄弟之子婦親孫婦之喪原定出殯七日即行走者今定於出殯後剃頭當差無服族人之喪原定出殯後當差者今定不準持服照常當差行走凡大臣官員持服日期其職任官差各異應行令各地方各量職任於其應行走之時即令當差行走又奏準在京旗員為祖父母承重者準其一例守制十八年奉㫖旗員原無二十七月停升之例後經議準施行但旗人補用旗闕非文官外任可比理應照舊遵行嗣後旗員補用内外文官外省綠旗武弁仍丁艱二十七月停其升轉外京城武弁各省駐防陵寢旗員補用旗闕皆照舊例將職名進呈二十七月内無庸停其升轉一終養乾隆元年奏準直省武職及駐防官遇祖父母父母老疾路逺不能迎養且家無次丁者許其呈報該管官出具印甘各結報兵部奏請終養六年覆準旗員應升外任有祖父母父母老疾家無次丁者呈報該叅領具印結申都統具奏咨兵部注冊停升外任九年奏準八旗外任官祖父母父母年老例得終養者由部行知本旗覈實具印結報部準其囘京引見有㫖以旗員改補者該旗遵㫖辦理竢起用時將該員年力衰壯咨部辦理如佐雜微員無改補之職者於本旗應當之差準其選充起用時仍咨部以應得之官用一留養乾隆元年奏準駐防兵丁有祖父母父母年老而家無次丁欲將伊子調囘或伯叔父母無嗣欲將兄弟之子調囘養贍者均令該族長佐領覈實具結咨部準其退伍調囘至同胞兄弟以無子嗣呈請囘旗槩不準行五年奏準直省駐防各官老病告休緣事革職或降調年老不願補官並革退之兵丁囘京中雖有子與薄有産業不足養贍而外省有子孫兄弟及兄弟之子居官充兵或家人充兵願留養者呈報該都統咨兵部準其所請留養其在京休致革退官兵槩不準就養外省又奏準各省駐防已故官兵之妻有子弟家人已經充兵足資養贍者準其留養又奏準已故官兵之妻在駐防處依子弟充兵度日如在京有子弟居官充兵呈請迎養者準其迎養其弟兄之家口不準偕囘又定八旗官兵年逾五十無子又無兄弟子承祧者呈請願將兄弟之孫自外省調囘者準其調囘又定駐防兵丁内向有父母兄弟在旗後因年久戸絶呈請囘京守墓者準令一人同家口囘京承祀一患病乾隆五年奏準内外旗員患病該管大員委官確驗酌量給假不得過六月如過六月未愈有職任者開闕如世爵停支俸祿病痊之日呈該都統隨旗當差支俸無世爵者候闕補用欽定大清㑹典則例卷一百七十七
