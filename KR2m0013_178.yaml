body:
  text: 八旗都統兵制一八旗兵制驍騎營八旗滿洲䝉古漢軍按旗分設前鋒營八旗前鋒按左右兩翼分設護軍營八旗護軍按旗分設凡前鋒護軍皆滿洲附以䝉古步軍營八旗滿洲䝉古漢軍按旗分設以上詳見前鋒護軍步軍三營火器營以八旗滿洲䝉古每旗有護軍驍騎二營詳見火器營天聰八年諭朕仰承天眷撫有滿洲䝉古漢人兵衆前此步騎守哨等雖各有營伍未分名色故止以該管將領姓名稱為某將領之兵今宜分辨名色永為定制隨固山額貞行營馬兵為阿禮哈超哈即驍騎步兵為白竒超哈擺牙喇哨兵為噶布什賢超哈即護軍前鋒駐防盛京炮兵為守兵間駐兵為援兵外城守兵為守邊兵舊䝉古右營為右營兵左營為左營兵舊漢兵為烏貞超哈即漢軍元帥孔有德兵為天祐兵總兵官尚有喜兵為天助兵後䝉古兩翼仍分八旗天祐天助兵均歸入漢軍欽此順治元年定每佐領下設領催六人漢軍佐領下四人康熙三十年議準滿洲䝉古每佐領設鳥槍護軍三人鳥槍驍騎四人撥火器營當差行走四十三年議準每滿洲䝉古佐領下裁領催一人雍正二年諭八旗滿洲䝉古漢軍均繫纍世效力舊人承平既久滿洲户口滋盛餘丁繁多或有丁多之佐領因護軍驍騎皆有定額其不得充伍之閒散滿洲至有窘迫不能養其妻子者每思及此惻然動念將如何施恩俾得生計之處再四籌畫並無長䇿欲增編佐領恐正餉不敷若不給以錢糧俾為養贍何以聊生既不能養其家口何由造就以成其材今將旗下滿洲䝉古漢軍共選四千八百人為教養兵訓練藝業每人各給三兩錢糧每年共需錢糧十有七萬二千八百兩每旗滿洲䝉古漢軍共六百名內滿洲每旗四百六十名䝉古六十名漢軍八十名其漢軍之八十名令為步兵食二兩錢糧就此錢糧數內通融料理可多得四十名漢軍每旗著選百二十名此所設教養兵若計佐領選取恐多寡不同應於參領下計數選取欽此又議準漢軍於每佐領下驍騎內設藤牌兵四名八年諭八旗各佐領下所有弓匠鐵匠􅛸匠鞍匠銅匠徒食錢糧並無製造何從學習此等匠役均繫出征行圍所需之人若在京師縱不能製造尚可雇人若值出外必至誤事如此不如將伊等裁去但其所用之器具非人人可能置辦之物將伊等或八旗按翼令其學習或於各旗內學習或一年或半年一次考驗優者奬勸劣者懲責既可以得良匠而於需用亦為有益著八旗都統㑹議具奏欽此遵㫖議準按八旗所有弓匠千一百十有八名鐵匠千一百十有三名鞍匠四百四十七名􅛸匠二百二十二名銅匠二十三名此五項匠役內弓匠均繫驍騎數內之人其上三旗弓匠乃武備院所屬所用官弓均伊等親身製造應毋庸議外其下五旗弓匠雖嵗有砍弓胎採樺皮並製造交兵部之官弓等差但又在該王公門下當差行走是以不如上三旗整齊且親身能製造者亦少嗣後將親身製造者停其在該王公門下當差著該弓匠族長勒限一年令其學習限滿從該都統驗看實能製造者給食錢糧不能者革退教習懶惰之族長等鞭七十再按鐵匠雖製造一應炮位鳥槍腰刀等物但半繫不能製造之人應按翼簡選參領一人令其總管一翼之鐵匠又每旗委驍騎校一人令其學習教導給限一年該參領察驗將粗能製造者令食錢糧歸鐵厰學習不能者鞭七十革退至八旗鞍匠四百四十七名􅛸匠二百二十二名除上三旗鞍匠五十名􅛸匠一百三十五名在武備院製造毋庸議外其下五旗所有鞍匠􅛸匠伊等既不能親身製造又於出征行圍之處無所需用應槩行裁去俟步軍闕充補見今八旗滿洲䝉古旗下並無銅匠所有漢軍旗下銅匠二十三名應歸武備院學習聼其分别去留又諭前漢軍懇請出兵效力朕諭該都統等漢軍騎射生疏平時不肯演習而務出征效力之虛名於事無益可於每旗操演兵丁千名備用昨據都統等奏鑲黃正黃正白三旗除常行當差兵外見在輪流操演可得千人正紅鑲白鑲紅正藍鑲藍五旗除當差外不敷千人之數我朝定鼎漢軍從龍入關技勇皆為可用今承平日久耽於安逸是以武藝逺不如前目今官至提鎮副參者寥寥無幾而在內簡用都統副都統時亦難其人朕思漢軍生齒日繁當籌所以教養之道而額設之兵為數又少似應酌量加增於國家之營伍旗人之生計均有裨益且如在外駐防漢軍子弟日漸繁衍而本身錢糧各有定數難以養贍應令餘丁回京當差又如外任官子弟往往以隨任為名逰蕩荒廢前曽有㫖嚴禁悉令回京當差學習弓馬又如候闕微員一時難以銓選者若情願入伍當差到選期時仍許輪班補用又如內府人丁亦衆於充役當差外其閒散人丁撥入八旗充驍騎亦可再五旗諸王之漢軍佐領仍屬本王外其貝勒貝子公等之漢軍佐領實無所用應徹歸旗下公中當差且可免掣肘之虞其如何增設漢軍佐領永逺可行著詳議具奏欽此遵㫖議準漢軍鑲黃旗四十三佐領有半正黃正白二旗皆四十二佐領正紅旗二十七佐領有半鑲白旗二十八佐領鑲紅旗二十七佐領正藍鑲藍各二十八佐領通計領催槍手炮手棉甲兵教養兵銅鐵匠弓匠聼差護城守門守炮守火藥局守教場以及步軍門軍共萬七千五百二十八人今應於原有之二百六十五佐領及兩半分佐領外增設三佐領並增足兩半分為兩整分上三旗每旗定為四十佐領下五旗每旗補足三十佐領共二百七十佐領其新設佐領下應增領催十有五名步軍領催三名步軍四十八名每佐領下均增足槍手四十名棉甲兵八名上三旗每旗補足教養兵一百八十八名下五旗每旗補足教養兵一百四十九名共增兵二千四百七十二名以足二萬之數至增設各項兵丁應於在京閒散壯丁及外省駐防漢軍餘丁外官隨任子弟願充驍騎者並候選未得官之微員內選補再下五旗漢軍佐領除王等仍舊分設外貝勒貝子公等佐領悉歸入各旗作為公中佐領乾隆元年議準漢軍每旗設藤牌兵百名三年議準原設教養兵每二名作為三名每名給餉三兩者改給二兩滿洲䝉古旗每佐領下增足教養兵十名漢軍旗每佐領下增足六名十八年議準教養兵每三名作為四名每名給餉二兩者改給一兩五錢一八旗游牧察哈爾初編佐領時每佐領下設親軍二名前鋒二名護軍十有七名領催四名驍騎二十五名共五十名雍正二年每旗增設捕盜兵十名十年每佐領下增設護軍八名領催二名驍騎十名共七十名乾隆五年每旗增設捕盜兵十名一八旗鐵匠局乾隆六年奏準兩翼各設二局每翼以副都統一人參領一人總理局務散秩官驍騎校每旗滿洲䝉古漢軍各二人協理每局以鐵匠四十名送武備院學習至二年更换一次其兩翼四局匠役每年由武備院委官察驗一次嵗終㑹同八旗都統察驗一次詳較優劣以示鼓勵所需置立器具及一切費用每旗各月支銀四兩八錢於各該旗房租銀內動支所需煤鐵移文工部支領一畿輔駐防兵制順治二年設駐防獨石口八旗滿洲旗各十名張家口喜峯口八名古北口四名固安縣鑲紅旗滿洲五十名采育里鑲白正藍二旗滿洲各五十名山海關八旗滿洲䝉古四十六名五年設駐防滄州八旗滿洲䝉古三百十一名弓匠二名鐵匠二名順義縣鑲黃旗滿洲五十名大名府正紅鑲紅二旗滿洲䝉古四百有一名六年設駐防三河縣正白旗滿洲五十名東安縣鑲藍旗滿洲五十名移駐防大名府之正紅鑲紅二旗滿洲䝉古四百一名匠役四名於保定府八年設駐防昌平州正黃旗滿洲三十七名䝉古十有三名良鄉縣正紅旗滿洲五十名九年增古北口駐防八名十年增張家口駐防十有六名十六年增喜峯口駐防八名康熙九年設駐防冷口正黃正藍二旗滿洲䝉古十有二名羅文峪鑲白正藍二旗滿洲䝉古十有二名十二年移駐防采育里之鑲白旗滿洲䝉古五十名於寶坻縣設駐防霸州正黃正紅二旗滿洲䝉古雄縣鑲紅鑲藍二旗滿洲䝉古玉田縣鑲黃正白二旗滿洲䝉古各五十名灤州鑲白正藍二旗滿洲二十五名十四年增山海關駐防七百五十四名共八百名二十年裁山海關駐防四百名二十二年增張家口駐防一百三十六名灤州駐防二十五名二十三年增古北口駐防六十八名獨石口六十八名喜峯口六十四名冷口羅文峪各十有二名二十七年調山海關駐防漢軍三百三十四名移駐盛京小凌河白旗堡小黑山閭陽驛以京師八旗壯丁九十四名撥補三十四年移駐防灤州之鑲白正藍二旗滿洲䝉古於永平府又增永平府三河縣玉田縣駐防五十名各為百名均領催十名驍騎九十名增山海門駐防四十名三十七年於滄州駐防三百十有一名內設領催三十一名驍騎二百八十名張家口駐防一百六十名內設領催十有六名驍騎一百四十四名五十年於獨石口駐防八十名內移四十名於千家店雍正元年設駐防鄭家莊八旗滿洲䝉古兩旗合一佐領每佐領下領催四名驍騎九十六名弓匠一名鐵匠一名漢軍左翼四旗合一佐領右翼四旗合一佐領每佐領下鳥槍領催四名鳥槍驍騎九十六名弓匠一名鐵匠一名共領催十有六名鳥槍領催八名驍騎三百八十四名鳥槍驍騎一百九十二名弓匠六名鐵匠六名設駐防熱河八旗滿洲䝉古領催六十四名驍騎七百三十六名分駐熱河四百名喀喇河屯樺榆溝各二百名二年增獨石口領催四名驍騎五十六名合前四十名為百名古北口喜峯口各二十名冷口二十六名於昌平霸二州良鄉順義固安東安雄五縣及采育里駐防各五十名內設領催五名驍騎四十五名增保定府駐防兵九十九名共五百名外匠役四名三年設駐防天津府水師營八旗滿洲䝉古二千名四年自浙江福建造送天津府水師營大小趕繒船各十號江南造送大小趕繒船各六號設水手五百三十六名五年分駐防天津府水師營八旗滿洲䝉古為二營以左翼四旗為左營右翼四旗為右營各分甲兵千名內委鳥槍前鋒校二名前鋒四十八名鳥槍領催六十四名驍騎八百八十六名七年增羅文峪駐防十有六名天津水師營炮手一百四十四名八年裁天津府駐防水師營小趕繒船八號更造彭仔船八號九年裁天津府駐防水師營水手五十六名十一年裁天津府駐防水師營水手百六十名乾隆三年增熱河駐防一千一百名共二千名內委前鋒校八名前鋒九十二名鳥槍領催二十六名鳥槍驍騎五百名領催七十四名驍騎千二百名炮手四十名弓匠箭匠鐵匠各二十名四年裁天津府駐防水師營彭仔船八號小趕繒船四號水手百二十名炮手四十八名七年增張家口駐防八旗滿洲䝉古一百四十名共三百名內鳥槍領催六名鳥槍驍騎九十四名領催十名驍騎一百九十名八年增山海關駐防六百名共八百名內委前鋒校二名前鋒三十八名鳥槍領催十名鳥槍驍騎一百九十名驍騎四百四十名炮手領催四名炮手七十六名增喜峯口駐防百名為二百名內鳥槍領催八名領催八名鳥槍驍騎九十二名驍騎九十二名增冷口駐防一百名共百五十名內鳥槍領催六名領催六名鳥槍驍騎六十九名驍騎六十九名增羅文峪駐防六十名共百名內領催八名驍騎九十二名增天津府駐防水師營教養兵一百九十二名九年增天津府駐防一千名共三千名內委前鋒校四名前鋒九十六名領催鳥槍領催各六十四名驍騎鳥槍驍騎各千三百六十六名增滄州駐防二百名共五百十有五名內鳥槍領催十名鳥槍驍騎九十名領催二十一名驍騎三百九十名弓匠二名鐵匠二名增古北口駐防百名共二百名內領催十有二名驍騎一百