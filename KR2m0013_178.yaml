步軍內選取或該旗內有貧乏孤寡不得錢糧養贍者傳集其佐領下人遍行曉諭將孤寡之家人充補驍騎又諭凡年老護軍除應升護軍校驍騎校外其年已老邁又不在應升之列者若竟革退殊覺可憫著該統領㑹同都統等將伊等轉補驍騎行走其護軍闕即令人材少壯之驍騎轉補如此則護軍亦得整齊矣欽此八年覆準候補候選微員自度選期尚逺情願入伍食餉者亦準其選取驍騎至應選時仍許其按班補用乾隆三年諭前次自軍營撤回開户之領催驍騎內一等二等均著為正身别載冊籍至和通呼爾罕諾爾烏孫珠爾等處打仗陳亡開户分户之領催驍騎轉不能沾恩實屬可憫著交與八旗將此等陳亡開户領催驍騎之子孫亦著為正户與别載冊籍之人一例選取驍騎欽此又諭向來八旗簡選驍騎皆憑騎射今聞都統等並不校閲騎射止傳赴衙門令其開弓即行選取旗人騎射甚為緊要如此選取何由長進夫教訓兵丁學習騎射乃都統等專責嗣後務須痛改以期各盡厥職倘仍如是斷不姑容欽此又覆準八旗生齒日繁而驍騎限有定額理應將正身選取不應並選開户之人其見在開户人內有既經選補驍騎者毋庸革退至步軍匠役等闕例應選取家人若開户人內有情願入選者即行選取又覆準食二兩錢糧教養兵選補之門軍準選驍騎食三兩錢糧教養兵選補之門軍照常選補護軍領催六年覆準八旗漢軍正户閒散餘丁甚多而開户家人亦復不少若驍騎闕並選開户之人正户人等轉至壅滯嗣後八旗漢軍驍騎不準開户人選補至八旗滿洲䝉古驍騎先於年壯正身內選取如不得人再於本佐領下開户家人內驗其能騎射者選取又議準八旗選補驍騎定限每月初十日以前所出之闕於本月錢糧冊籍未經過部之前選補一并造冊送部其在初十日以後所出之闕於下月初十日以前選補如將初十日以前所出之闕遲延不報及呈報後該管官不即選補或已選補不即造花名入冊送部者皆參奏交部議處七年奉㫖五旗王公宗室等府屬佐領下人均繫盛京跟隨來京之人著交王公等將不能養贍之正身滿洲䝉古之子孫核實行知各該都統於丁少無正户可選之佐領下選取驍騎及執事人仍不許離其佐領止令本身在旗當差若其本主欲選補護衛等官調用别項差使均聼其便一革退官兵選取護軍驍騎順治元年定護軍驍騎人等有以金刃傷人及自傷者皆不準復充雍正元年覆準革退旗員不得照舊例一槩令當苦差或有家計艱窘願得錢糧者遇有驍騎執事人等闕準其選取八年覆準自發遣處寬免放回或自行贖回及籍沒家産人等之子孫有願充護軍驍騎者準其選取十三年覆準八旗犯罪革退兵丁除犯十惡及因軍務獲罪殺傷人命減等枷責並帶軍器逃走人外因别項獲罪革退之兵丁內有年力精壯可以當差者仍準其選充護軍驍騎如果改過自新黽勉效力者應升之處並準其列名乾隆五年覆準兵丁犯罪由部審擬除部文內聲眀革退者照部文革退外其未經聲眀者如犯竊之案及一切公私罪名在鞭一百以上者皆革退罪止鞭一百及一百以下者仍準當差二十一年議準八旗選拔護軍及護軍調補驍騎應令該旗㑹同護軍統領秉公辦理如護軍內有年老難充護軍必察繫曽在行間及行走年久並精力尚健者方準調補驍騎若年齒方壯而騎射平常者嚴加訓練務令弓馬嫺習設有怠惰偷安不遵督飭者即行革退駮回該旗補步軍如能奮勉勤習騎射嫺熟國語三年後方準拔補驍騎一選補弓匠鐵匠康熙二十二年奏準下五旗弓匠每佐領下一人照武備院所屬上三旗弓匠之例作為佐領下驍騎額內支給錢糧製備軍器其弓匠族長照領催例支給錢糧於該旗匠役內選補雍正十二年覆準鐵匠乃製造軍器緊要匠役應於不能騎射並不習國語䝉古之開户人內將年力強壯者選為鐵匠令其永逺學習行走不準拔補别項差役交與該管大員官長等秉公甄别如技藝平常者仍給餉銀一兩稍優者作為三等給餉二兩更優者作為二等給餉三兩超衆者委為頭目作為一等給餉四兩十三年覆準八旗鐵匠步軍向於家人內拔補嗣後除旗下典雇之家人不準拔補外如白契所賣之人亦準拔補至孤寡貧苦之家並無家人借其親戚家人充補者該佐領詢實並驗眀原契呈眀該都統亦準拔補乾隆五年奏準弓匠族長在上三旗者屬武備院管轄在下五旗者屬王公門下管轄其闕仍聼武備院及該王公選補外其公中佐領下之弓匠闕該頭目報都統於該佐領下正户驍騎教養兵閒散壯丁內選補弓匠族長闕於弓匠內選補並咨兵部注冊一選補教養兵雍正二年遵㫖議準滿洲旗分佐領人數多寡不甚相逺所選教養兵不論佐領在本參領內選取䝉古漢軍旗分佐領數目多寡不同論旗選取恐有不均應不論旗分各計八旗總數按其佐領多寡均勻選取其選取時必實繫貧乏正户餘丁方準選補乾隆元年覆準嗣後選取教養兵該都統於閒散餘丁內年壯可以當差者照常選取外如旗內幼丁並無産業及無執事兵丁錢糧可以養贍者年過十嵗該參佐領據實具保該都統覆核無異即行拔補三年覆準八旗增設教養兵將鰥寡人等之子不論年嵗拔補至獨身人等既無子嗣又年老不能當差實屬可憫嗣後㷀獨之人除犯重罪革退官職執事等差外如犯輕罪黜革之人未經當差無錢糧可支者亦給與教養兵錢糧以資養贍仍通行八旗都統於人多旗分照例選取十嵗以上之餘丁如並無倚靠實屬孤苦雖未及嵗亦準拔補人少旗分先盡十嵗以上之餘丁選取不敷再於十嵗以下之幼丁內選取四年覆準嗣後教養兵闕自首别載冊籍及在軍前陳亡列一二等奉㫖作為正户别載冊籍人等並內務府奏準分給漢軍旗當差人之子弟內無錢糧者均照正户例準其選取六年議準教養兵闕或於本參領內選補或論旗分人數多寡計餘丁之年嵗選補辦理殊不畫一嗣後統於本參領下選補其䝉古漢軍不論旗分各計八旗總數選取之例停止十八年議準八旗選往靜宜園健鋭營一千兵丁內滿洲每旗應選九十四名䝉古每旗三十一名即令該都統於見設教養兵內遴選撥往所餘千名教養兵闕選取食一兩五錢之教養兵外嗣後有闕各旗均選取食一兩五錢之教養兵每選三闕加增教養兵一名如此辦理滿洲䝉古漢軍舊額萬五千一百二十四名又加增五千四十四名於旗人生計大有裨益一拔補炮手順治六年題準漢軍召募炮手每旗額設五十名嗣後闕額即以其子頂補無子者行咨外省選取康熙六年題準炮手闕額停令外省咨取聼該旗都統於步軍內酌量補用八年題準炮手闕額或以旗下舊人或以駐防帶回之召募炮手各旗酌量頂補無可補者以召募炮手之子弟頂補五十九年奉㫖炮手闕以內府旗鼓佐領下人兼選一選補藤牌兵雍正二年議準八旗漢軍每佐領下於驍騎內簡選四名演習藤牌乾隆六年議準藤牌兵歸并大營每旗百名於槍手額內選取並簡選參領一人散秩官驍騎校各二人領催五人令其管轄一軍器國初定每都統各給龍纛一佐領各給纛一領催各給小旗一各依本旗之色又定八旗甲背盔纓皆用旗色號帶上書銜名文武官辨皆同都統盔槍插鵰翎二作燕剪形垂貂尾為纓副都統以下官盔槍插獺尾垂紅纓驍騎校鐵盔槍紅纓領催驍騎均垂黑纓甲衣及護項護耳官以段為表兵以繡布為表均傅以鐵葉順治五年題準八旗甲兵需用甲胄軍器均移文工部造給或給銀令其自製務須整齊每年秋季㸃驗軍器康熙六年定都統以下驍騎校以上均給弓二櫜鞬一佩刀一都統矢四百副都統三百五十參領二百五十佐領二百驍騎校一百驍騎各給弓一櫜鞭一矢五十每驍騎二人各給長槍一惟正黃正紅旗朝鮮佐領驍騎各給鳥槍一又定八旗驍騎營每佐領下各設海螺一每參領下各設海螺二二十四年定八旗漢軍每佐領設鹿角一架每架設棉甲兵四名後增四名每名給連耞棍各一雍正元年議準八旗以軍器質當者官革職兵鞭一百革退軍器追繳該管官失察者罰俸一年二年定漢軍藤牌兵每名給藤牌一㓲刀一又定漢軍藤牌營每旗各設海螺五鳥槍營炮營每旗各設鼓一金五五年覆準官兵遇升遷事故其本人舊有軍器繫動官帑製備者給與頂補之人若繫本人自製者官員聼其自便兵丁軍器該管官視其利鈍酌量定價給新補之兵即將新補兵丁名下應領錢糧陸續扣給原主六年奏準將軍器私賣者皆革退交刑部治罪失察之該管官罰俸一年乾隆十五年諭八旗官兵器械闕少者均咨部官為造給器械內弓箭尤為緊要惟賴不時整理善為收貯自兵部八旗大臣㑹議訓飭八旗官兵將器械善為收貯曽經奏準施行今都統等或因日久廢弛亦未可定著再傳諭務遵原奏留心稽察欽此一火器國初遣官鑄巨炮號神威大將軍康熙十四年鑄大炮八十十五年鑄炮五十有二欽定名號為神威無敵大將軍十九年造􅛸金龍炮八二十年造銅炮二百四十欽定名號為神威將軍二十四年造鐵心銅炮八十有五二十五年造􅛸金龍炮一二十六年鑄炮五欽定名號為威逺將軍即衝天炮二十七年福建進臺灣銅炮雲南進渾銅炮二十八年造大炮六十有一欽定名號為武成永固大將軍又造炮八十號為神功將軍二十九年造鐵子母炮二百有二三十四年鑄銅炮四十有八欽定名號為制勝將軍四十七年奉㫖鳥槍等火器秪當用於搜獵行陳之間此外一應旗民不得擅用五十七年造威逺將軍銅炮十五十八年造威逺將軍銅炮十有六六十年造鐵子母炮六雍正五年造威逺將軍鐵炮十􅛸金子母鐵炮十有七􅛸銀子母鐵炮三十年浙江進木把鐵子母炮工部交十把拂郎磯鐵子母炮十二年廣東進九節銅炮乾隆二年工部製造行營鐵炮八旗漢軍炮局所貯鑲黃旗六十九位正黃旗七十九位正白旗六十九位正紅旗七十四位鑲白旗六十三位鑲紅旗六十八位正藍旗六十五位鑲藍旗七十二位一畜牧康熙三十四年議準八旗滿洲䝉古每佐領下養馬二十八匹漢軍養馬二十五匹又議準每兵養馬一匹三十六年平定朔漠將漢軍所養之馬槩行裁去滿洲䝉古所養之馬裁去一半仍照前養馬二十八匹三十七年奉㫖八旗佐領下所養之馬每佐領下或留六匹或留七匹其餘於四月內出場牧放九月初間回京如此不但減省錢糧其殘疾之馬亦可牧放壯健其出場牧放之時每旗簡副都統各一人參領各二人其官員兵丁酌量除往於水草好處牧放著大學士㑹同户兵二部議奏欽此遵㫖議準八旗所養之馬每佐領下存留七匹其餘馬於每年四月初十日以內各旗出場牧放九月初間回京三十九年議準每佐領下增養駝一隻雍正元年覆準官馬皆交參佐領驍騎校等於各佐領下擇驍騎之小心者令其餧養倘有不養馬匹冒領錢糧除本人治罪外不行察出之該參佐領交部議處又奏準所養馬駝若疲瘦不堪者將參佐領等交部議處二年覆準官馬出牧時不肖之徒欲行網利駝載各項物件多至疲瘦及到場時天氣炎熱且多蚊虻馬駝不能肥壯皆由於此請於出牧往回之時不許䭾載物件夜間亦不許入圈四年議準官馬火印定為長三寸徑二寸文曰某旗官馬每旗滿洲五參領䝉古二參領定為七樣小火印凡新换馬匹皆令都統等驗看烙該旗火印再交參領等烙該參領火印如有不堪用之馬參佐領等呈都統驗眀毁其火印更换倘有私行更换等弊察出指名題參五年覆準每年出牧時將前鋒護軍內年少未經隨圍者每佐領下各選一人於驍騎數內令往馬場與驍騎等一同操演騎馬巡察看守庶馬上可得熟練每旗委護軍校二人前鋒校一人令其管轄其護軍參領不必委往即令出牧之副都統參領等兼管奉㫖既令前鋒護軍前往著委護軍參領四人與驍騎參領將前鋒護軍領催驍騎等公同管轄若某旗委出護軍參領其本旗之驍騎參領即不必委往六年奏準馬駝出場左翼四旗由古北口出入右翼四旗由張家口出入七年覆準八旗官馬交各佐領下驍騎內善於飼秣者餧養如有餘剩官馬呈該都統等令佐領驍騎校等餧養仍咨行馬銀並將實在養馬人姓名入冊咨行如指兵丁姓名冒養馬匹及兵丁所養之馬佐領恃強乘騎者察出參奏交部議處十一年議準出場之馬駝如有驚失仍著落出場副都統官員賠補若遇殘疾倒斃令該管官割取耳尾報副都統注冊俟回日交與該佐領馬每匹領三月錢糧駝每隻領存旗房租銀買補十二年議準除往馬場副都統等所有送京文移於起程之前向本旗都統處將鈐印封筒并鈐印之紙酌量足用帶往備用俟回日將用過數目開除知照都統存案餘於都統前銷毁又奏準察驗馬匹疲瘦三分者議處其不及三分者免議乃該管官彼此調换送驗皆令不致三分希圖免議應於出青時即令各該旗將各佐領下馬匹毛齒造具清冊送部存案回京之日按冊核對驗看烙印如有調换情弊將調换之官兵加倍治罪該管副都統官員嚴加議處十三年覆準八旗官馬每年出場其留京之馬原繫選出肥壯備官差之用即使果有官差亦必待兵部印文方許乘騎至各旗跟班傳事察泛原有豫備之馬若濫行乘騎該旗都統參奏交部議處乾隆元年奏準八旗官馬出場後凡出差馬匹如在五月以前回京者仍送場牧放如在六月初一日以後回京者無庸送往即留京餧養三年議準各旗所有官駝除留京備用外其餘駝馬皆出場牧放又奏準八旗佐領下餧養官馬每年兵部酌定留京若干出場若干奏請欽命副都統每翼各二人於立夏後四日督率官兵以次赴馬場口內每站各給空草一束户部委司官一人支給回京日期不必拘定八月九月酌定天時冷暖草枯遲早豫為定期報部來京自口進京每站各給空草一束由户部委官監放又奏準出青馬駝沿塗縱食田禾及不在場牧放踐食田禾者兵丁專管官兼管官副都統領催分别議處治罪其踐食之田禾皆追糧賠償地主至強令民人代為看馬及勒索酒食擾害生事者本人交刑部治罪專管官兼管官副都統領催亦分别議處治罪又奏準出場各官遇有切近喪事及患病屬實者副都統即令回京行文該旗補委他官前往至有婚嫁之事告假者副都統給與一月限行文該旗視其事竣催令前往若官馬於一月二十日以內將次徹回皆不必委官代往其告假之官踰限不往及副都統等不行詳察即準給假者皆議處再各官於委出後有逗遛觀望不赴牧場及到牧場私自潛回者皆革職又覆準官馬倒斃扣存三月錢糧買補駝倒斃向繫動用房租銀買補但房租所餘無多嗣後官駝如有倒斃扣存四月錢糧按時價買補不敷將房租銀湊買統於嵗終入冊奏銷六年議準八旗每年出牧官兵數目滿洲每旗委參領一人護軍參領與驍騎參領按年輪委䝉古每旗委參領一人䝉古參領與漢軍參領按年輪委滿洲䝉古每參領下委散秩官二人前鋒校護軍校驍騎校等每參領下合委一人滿洲䝉古每佐領下前鋒護軍合委一名領催驍騎合委三名出牧各官遇有切近喪事實繫患病及婚嫁之事準其告假回京其兵丁有婚喪患病等項事故亦必核實方準給假回京仍行文該旗補委官兵前往再出牧馬駝減少之年其出牧官兵應令委出副都統㑹同各該旗酌量裁減七年奉㫖出場馬駝回京之期報眀該部俟該部咨覆到日再行回京十年奉㫖八旗餧養官馬甚關緊要乃交隨圍馬匹之時每有以銀交納者皆平日餧養不勤而臨時監看交馬之大員又不加察以致如此嗣後八旗都統不時嚴察凡遇交官馬時將八旗都統副都統等職名當月旗彚奏每旗各簡一人令其監看又奏準八旗官馬駝每佐領下駝一隻給佐領與驍騎校餧養佐領止準養官馬一匹其餘官馬選善於餧養之護軍校前鋒護軍等餧養不準給大臣子弟再鳥槍驍騎亦不時操演酌給餧養又奏準八旗馬駝事務請於八旗都統副都統內每旗欽命一人令與本旗都統一同察辦又奏準凡出差人員所騎官馬奏眀領取者照例給與咨取者槩不準給又奏準各旗官馬駝於該旗都統副都統內欽命一人令其專管其馬冊房參領官員驍騎校由都統等於本旗見任各官內委令兼管又奏準交官馬時靣飭嚴禁不得勒索用銀一經察出分别與受懲治十三年奏準凡餧養官馬或有疲瘦不能賠補者將馬徹出於佐領下一應當差人內通行遴選令其餧養十五年奏準八旗官駝如有倒斃該旗即報當月旗今歸直年都統存案如非緊要用駝之時將官駝四月錢糧及皮骨所變之價並户部增補銀一同領出交當月旗其每月十五日以內咨到當月旗者即令辦買不得移交下月其十六日以後咨到者存案移交下月辦買至辦買時當月旗都統等簡委賢員勿逾原定價值擇其肥腯無殘疾者送當月旗都統等驗看烙印交該旗餧養補額如有餘剩之銀暫貯該旗庫內若值巡幸起程日近遇有倒斃之駝即行買補不必候領四月錢糧即由户部領取增補銀二十兩並皮骨變價銀照例採買不敷即於平時買駝餘剩銀內酌量湊買如無餘剩之銀暫將户部增補買駝銀內借支買用俟有餘剩銀補還借項其所買駝數並用過銀數當月旗行文户兵二部存案於年終各該旗將所買駝及皮骨變價支領增用銀並餘剩繳還銀各數目造具清冊咨送當月旗當月旗將八旗倒斃駝若干所用銀若干彚行奏聞交都察院察核十六年奉㫖每佐領各增牧駝一隻是年奏準八旗牧養官馬共二萬七百七十三匹每匹月給馬乾銀三兩近因京城豆價草價皆昻所支銀不敷購買應暫為通融籌辦請於所牧官馬內酌撥萬匹在京外牧養熱河撥給馬千匹近京各莊頭撥給馬二千匹此外七千匹交直𨽻各標營牧養其熱河及各莊頭草料銀由該副都統內務府㑹計司官赴户部支領按月給發直𨽻各標營就近於藩庫動支如有減剋草料以致疲瘦者該管官交部議處兵丁莊頭嚴行治罪或有倒斃照八旗之例於馬乾銀內按月扣存買補並請特簡大臣均勻搭配不得槩以疲馬充數如有不肖兵丁乘便將殘廢馬私行抵换者一經察出即將本人從重治罪佐領及都統等一并交部嚴加議處十七年奏上年因京師草豆價昻八旗牧養官馬每月所支馬乾銀不敷購買經大學士等遵㫖議奏將八旗官馬撥出萬匹交與直𨽻各標鎮營並熱河副都統及近京莊頭分領牧養俟次年草豆價平仍分與八旗官兵牧養察目下京師草豆較上年價直已減此項官馬或仍交直𨽻等處牧養或遵照原奏留京牧養奉㫖此項官馬前經交直𨽻各標營牧養脿既屬充足且聞於該兵丁等亦屬有益著不必交熱河副都統及各莊頭俟回鑾後撥出萬匹皆交與直𨽻總督仍前分撥牧養十九年奏準八旗官駝照官馬例交與直𨽻總督分給各標營牧養欽定大清㑹典則例卷一百七十四
