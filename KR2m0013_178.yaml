歩軍内選取或該旗内有貧乏孤寡不得錢糧養贍者傳集其佐領下人遍行曉諭將孤寡之家人充補驍騎又諭凡年老䕶軍除應升䕶軍校驍騎校外其年已老邁又不在應升之列者若竟革退殊覺可憫著該統領㑹同都統等將伊等轉補驍騎行走其䕶軍闕即令人材少壯之驍騎轉補如此則䕶軍亦得整齊矣欽此八年覆準候補候選㣲員自度選期尚逺情願入伍食餉者亦準其選取驍騎至應選時仍許其按班補用乾隆三年諭前次自軍營撤回開户之領催驍騎内一等二等均著為正身别載冊籍至和通呼爾罕諾爾烏孫珠爾等處打仗陣亡開户分户之領催驍騎轉不能沾恩實属可憫著交與八旗將此等陣亡開户領催驍騎之子孫亦著為正户與别載冊籍之人一例選取驍騎欽此又諭向來八旗簡選驍騎皆憑騎射今聞都統等並不校閲騎射止傳赴衙門令其開弓即行選取旗人騎射甚為𦂳要如此選取何由長進夫教訓兵丁學習騎射乃都統等專責嗣後務須痛改以期各盡厥職倘仍如是斷不姑容欽此又覆準八旗生齒日繁而驍騎限有定額理應將正身選取不應並選開户之人其見在開户人内有既經選補驍騎者毋庸革退至歩軍匠役等闕例應選取家人若開户人内有情願入選者即行選取又覆準食二两錢糧教養兵選補之門軍準選驍騎食三两錢糧教養兵選補之門軍照常選補䕶軍領催六年覆準八旗漢軍正户閒散餘丁甚多而開户家人亦復不少若驍騎闕並選開户之人正户人等轉至壅滯嗣後八旗漢軍驍騎不準開户人選補至八旗滿洲䝉古驍騎先於年壯正身内選取如不得人再於本佐領下開户家人内驗其能騎射者選取又議準八旗選補驍騎定限每月初十日以前所出之闕於本月錢糧冊籍未經過部之前選補一并造冊送部其在初十日以後所出之闕於下月初十日以前選補如將初十日以前所出之闕遲延不報及呈報後該管官不即選補或已選補不即造花名入冊送部者皆叅奏交部議處七年奉㫖五旗王公宗室等府属佐領下人均繫盛京跟隨來京之人著交王公等將不能養贍之正身滿洲䝉古之子孫覈實行知各該都統於丁少無正户可選之佐領下選取驍騎及執事人仍不許離其佐領止令本身在旗當差若其本主欲選補䕶衞等官調用别項差使均聼其便一革退官兵選取䕶軍驍騎順治元年定䕶軍驍騎人等有以金刃傷人及自傷者皆不準復充雍正元年覆準革退旗員不得照舊例一槩令當苦差或有家計艱窘願得錢糧者遇有驍騎執事人等闕準其選取八年覆準自𤼵遣處寛免放回或自行贖回及籍沒家産人等之子孫有願充䕶軍驍騎者準其選取十三年覆準八旗犯罪革退兵丁除犯十惡及因軍務獲罪殺傷人命減等枷責並帶軍器逃走人外因别項獲罪革退之兵丁内有年力精壯可以當差者仍準其選充䕶軍驍騎如果改過自新黽勉効力者應升之處並準其列名乾隆五年覆準兵丁犯罪由部審擬除部文内聲眀革退者照部文革退外其未經聲眀者如犯竊之案及一切公私罪名在鞭一百以上者皆革退罪止鞭一百及一百以下者仍準當差二十一年議準八旗選㧞䕶軍及䕶軍調補驍騎應令該旗㑹同䕶軍統領秉公辦理如䕶軍内有年老難充䕶軍必察繫曽在行間及行走年乆並精力尚健者方準調補驍騎若年齒方壯而騎射平常者嚴加訓練務令弓馬嫺習設有怠惰偷安不遵督飭者即行革退駮回該旗補歩軍如能奮勉勤習騎射嫺熟國語三年後方準㧞補驍騎一選補弓匠鐵匠康熙二十二年奏準下五旗弓匠每佐領下一人照武備院所属上三旗弓匠之例作為佐領下驍騎額内支給錢糧製備軍器其弓匠族長照領催例支給錢糧於該旗匠役内選補雍正十二年覆準鐵匠乃製造軍器𦂳要匠役應於不能騎射並不習國語䝉古之開户人内將年力強壯者選為鐵匠令其永逺學習行走不準㧞補别項差役交與該管大員官長等秉公甄别如技藝平常者仍給餉銀一两稍優者作為三等給餉二两更優者作為二等給餉三两超衆者委為頭目作為一等給餉四两十三年覆準八旗鐵匠歩軍向於家人内㧞補嗣後除旗下典雇之家人不準㧞補外如白契所賣之人亦準㧞補至孤寡貧苦之家並無家人借其親戚家人充補者該佐領詢實並驗眀原契呈眀該都統亦準㧞補乾隆五年奏準弓匠族長在上三旗者属武備院管轄在下五旗者属王公門下管轄其闕仍聼武備院及該王公選補外其公中佐領下之弓匠闕該頭目報都統於該佐領下正户驍騎教養兵閒散壯丁内選補弓匠族長闕於弓匠内選補並咨兵部注冊一選補教養兵雍正二年遵㫖議準滿洲旗分佐領人數多寡不甚相逺所選教養兵不論佐領在本叅領内選取䝉古漢軍旗分佐領數目多寡不同論旗選取恐有不均應不論旗分各計八旗總數按其佐領多寡均匀選取其選取時必實繫貧乏正户餘丁方準選補乾隆元年覆準嗣後選取教養兵該都統於閒散餘丁内年壯可以當差者照常選取外如旗内㓜丁並無産業及無執事兵丁錢糧可以養贍者年過十嵗該叅佐領據實具保該都統覆覈無異即行㧞補三年覆準八旗増設教養兵將鰥寡人等之子不論年嵗㧞補至獨身人等既無子嗣又年老不能當差實属可憫嗣後㷀獨之人除犯重罪革退官職執事等差外如犯輕罪黜革之人未經當差無錢糧可支者亦給與教養兵錢糧以資養贍仍通行八旗都統於人多旗分照例選取十嵗以上之餘丁如並無倚靠實属孤苦雖未及嵗亦準㧞補人少旗分先盡十嵗以上之餘丁選取不敷再於十嵗以下之㓜丁内選取四年覆準嗣後教養兵闕自首别載冊籍及在軍前陣亡列一二等奉㫖作為正户别載冊籍人等並内務府奏準分給漢軍旗當差人之子弟内無錢糧者均照正户例準其選取六年議準教養兵闕或於本叅領内選補或論旗分人數多寡計餘丁之年嵗選補辦理殊不畫一嗣後統於本叅領下選補其䝉古漢軍不論旗分各計八旗總數選取之例停止十八年議準八旗選往静宜園健鋭營一千兵丁内滿洲每旗應選九十四名䝉古每旗三十一名即令該都統於見設教養兵内遴選撥往所餘千名教養兵闕選取食一两五錢之教養兵外嗣後有闕各旗均選取食一两五錢之教養兵每選三闕加増教養兵一名如此辦理滿洲䝉古漢軍舊額萬五千一百二十四名又加増五千四十四名於旗人生計大有裨益一㧞補礮手順治六年題準漢軍召募礮手每旗額設五十名嗣後闕額即以其子頂補無子者行咨外省選取康熙六年題準礮手闕額停令外省咨取聼該旗都統於歩軍内酌量補用八年題準礮手闕額或以旗下舊人或以駐防帶回之召募礮手各旗酌量頂補無可補者以召募礮手之子弟頂補五十九年奉㫖礮手闕以内府旗鼓佐領下人兼選一選補藤牌兵雍正二年議準八旗漢軍每佐領下於驍騎内簡選四名演習藤牌乾隆六年議準藤牌兵歸并大營每旗百名於槍手額内選取並簡選叅領一人散秩官驍騎校各二人領催五人令其管轄一軍器國初定每都統各給龍纛一佐領各給纛一領催各給小旗一各依本旗之色又定八旗甲背盔纓皆用旗色號帶上書銜名文武官弁皆同都統盔槍挿鵰翎二作燕剪形垂貂尾為纓副都統以下官盔槍挿獺尾垂紅纓驍騎校鐵盔槍紅纓領催驍騎均垂黒纓甲衣及䕶項䕶耳官以段為表兵以繡布為表均傅以鐵葉順治五年題準八旗甲兵需用甲胄軍器均移文工部造給或給銀令其自製務須整齊每年秋季㸃驗軍器康熙六年定都統以下驍騎校以上均給弓二櫜鞬一佩刀一都統矢四百副都統三百五十叅領二百五十佐領二百驍騎校一百驍騎各給弓一櫜鞭一矢五十每驍騎二人各給長槍一惟正黃正紅旗朝鮮佐領驍騎各給鳥槍一又定八旗驍騎營每佐領下各設海螺一每叅領下各設海螺二二十四年定八旗漢軍每佐領設鹿角一架每架設棉甲兵四名後増四名每名給連耞棍各一雍正元年議準八旗以軍器質當者官革職兵鞭一百革退軍器追繳該管官失察者罰俸一年二年定漢軍藤牌兵每名給藤牌一㓲刀一又定漢軍藤牌營每旗各設海螺五鳥槍營礮營每旗各設鼓一金五五年覆準官兵遇升遷事故其本人舊有軍器繫動官帑製備者給與頂補之人若繫本人自製者官員聼其自便兵丁軍器該管官視其利鈍酌量定價給新補之兵即將新補兵丁名下應領錢糧陸續扣給原主六年奏準將軍器私賣者皆革退交刑部治罪失察之該管官罰俸一年乾隆十五年諭八旗官兵器械闕少者均咨部官為造給器械内弓箭尤為𦂳要惟賴不時整理善為收貯自兵部八旗大臣㑹議訓飭八旗官兵將器械善為收貯曽經奏準施行今都統等或因日乆廢弛亦未可定著再傳諭務遵原奏留心稽察欽此一火器國初遣官鑄巨礮號神威大將軍康熙十四年鑄大礮八十十五年鑄礮五十有二欽定名號為神威無敵大將軍十九年造􅛸金龍礮八二十年造銅礮二百四十欽定名號為神威將軍二十四年造鐵心銅礮八十有五二十五年造􅛸金龍礮一二十六年鑄礮五欽定名號為威逺將軍即衝天礮二十七年福建進臺灣銅礮雲南進渾銅礮二十八年造大礮六十有一欽定名號為武成永固大將軍又造礮八十號為神功將軍二十九年造鐵子母礮二百有二三十四年鑄銅礮四十有八欽定名號為制勝將軍四十七年奉㫖鳥槍等火器秪當用於蒐獵行陣之間此外一應旗民不得擅用五十七年造威逺將軍銅礮十五十八年造威逺將軍銅礮十有六六十年造鐵子母礮六雍正五年造威逺將軍鐵礮十􅛸金子母鐵礮十有七􅛸銀子母鐵礮三十年浙江進木把鐵子母礮工部交十把拂郎磯鐵子母礮十二年廣東進九節銅礮乾隆二年工部製造行營鐵礮八旗漢軍礮局所貯鑲黃旗六十九位正黃旗七十九位正白旗六十九位正紅旗七十四位鑲白旗六十三位鑲紅旗六十八位正藍旗六十五位鑲藍旗七十二位一畜牧康熙三十四年議準八旗滿洲䝉古每佐領下養馬二十八匹漢軍養馬二十五匹又議準每兵養馬一匹三十六年平定朔漠將漢軍所養之馬槩行裁去滿洲䝉古所養之馬裁去一半仍照前養馬二十八匹三十七年奉㫖八旗佐領下所養之馬每佐領下或留六匹或留七匹其餘於四月内出場牧放九月初間回京如此不但減省錢糧其殘疾之馬亦可牧放壯健其出場牧放之時每旗簡副都統各一人叅領各二人其官員兵丁酌量除往於水草好處牧放著大學士㑹同户兵二部議奏欽此遵㫖議準八旗所養之馬每佐領下存留七匹其餘馬於每年四月初十日以内各旗出場牧放九月初間回京三十九年議準每佐領下増養駝一隻雍正元年覆準官馬皆交叅佐領驍騎校等於各佐領下擇驍騎之小心者令其餧養倘有不養馬匹冐領錢糧除本人治罪外不行察出之該叅佐領交部議處又奏準所養馬駝若疲瘦不堪者將叅佐領等交部議處二年覆準官馬出牧時不肖之徒欲行網利駝載各項物件多至疲瘦及到場時天氣炎熱且多蚊蝱馬駝不能肥壯皆由於此請於出牧往回之時不許䭾載物件夜間亦不許入圏四年議準官馬火印定為長三寸徑二寸文曰某旗官馬每旗滿洲五叅領䝉古二叅領定為七様小火印凡新换馬匹皆令都統等驗看烙該旗火印再交叅領等烙該叅領火印如有不堪用之馬叅佐領等呈都統驗眀毁其火印更换倘有私行更换等弊察出指名題叅五年覆準每年出牧時將前鋒䕶軍内年少未經隨圍者每佐領下各選一人於驍騎數内令往馬場與驍騎等一同操演騎馬廵察看守庻馬上可得熟練每旗委䕶軍校二人前鋒校一人令其管轄其䕶軍叅領不必委往即令出牧之副都統叅領等兼管奉㫖既令前鋒䕶軍前往著委䕶軍叅領四人與驍騎叅領將前鋒䕶軍領催驍騎等公同管轄若某旗委出䕶軍叅領其本旗之驍騎叅領即不必委往六年奏準馬駝出場左翼四旗由古北口出入右翼四旗由張家口出入七年覆準八旗官馬交各佐領下驍騎内善於飼秣者餧養如有餘剰官馬呈該都統等令佐領驍騎校等餧養仍咨行馬銀並將實在養馬人姓名入冊咨行如指兵丁姓名冐養馬匹及兵丁所養之馬佐領恃強乗騎者察出叅奏交部議處十一年議準出場之馬駝如有驚失仍著落出場副都統官員賠補若遇殘疾倒斃令該管官割取耳尾報副都統注冊竢回日交與該佐領馬每匹領三月錢糧駝每隻領存旗房租銀買補十二年議準除往馬場副都統等所有送京文移於起程之前向本旗都統處將鈐印封筩并鈐印之紙酌量足用帶往備用竢回日將用過數目開除知照都統存案餘於都統前銷毁又奏準察驗馬匹疲瘦三分者議處其不及三分者免議乃該管官彼此調换送驗皆令不致三分希圖免議應於出青時即令各該旗將各佐領下馬匹毛齒造具清冊送部存案回京之日按冊覈對驗看烙印如有調换情弊將調换之官兵加倍治罪該管副都統官員嚴加議處十三年覆準八旗官馬每年出場其留京之馬原繫選出肥壯備官差之用即使果有官差亦必待兵部印文方許乗騎至各旗跟班傳事察汎原有豫備之馬若濫行乗騎該旗都統叅奏交部議處乾隆元年奏準八旗官馬出場後凡出差馬匹如在五月以前回京者仍送場牧放如在六月初一日以後回京者無庸送往即留京餧養三年議準各旗所有官駝除留京備用外其餘駝馬皆出場牧放又奏準八旗佐領下餧養官馬每年兵部酌定留京若干出場若干奏請欽命副都統每翼各二人於立夏後四日督率官兵以次赴馬場口内每站各給空草一束户部委司官一人支給回京日期不必拘定八月九月酌定天時冷煖草枯遲早豫為定期報部來京自口進京每站各給空草一束由户部委官監放又奏準出青馬駝沿塗縱食田禾及不在場牧放踐食田禾者兵丁專管官兼管官副都統領催分别議處治罪其踐食之田禾皆追糧賠償地主至強令民人代為看馬及勒索酒食擾害生事者本人交刑部治罪專管官兼管官副都統領催亦分别議處治罪又奏準出場各官遇有切近䘮事及患病属實者副都統即令回京行文該旗補委他官前往至有婚嫁之事告假者副都統給與一月限行文該旗視其事竣催令前往若官馬於一月二十日以内將次徹回皆不必委官代往其告假之官踰限不往及副都統等不行詳察即準給假者皆議處再各官於委出後有逗遛觀望不赴牧場及到牧場私自潛回者皆革職又覆準官馬倒斃扣存三月錢糧買補駝倒斃向繫動用房租銀買補但房租所餘無多嗣後官駝如有倒斃扣存四月錢糧按時價買補不敷將房租銀湊買統於嵗終入冊奏銷六年議準八旗每年出牧官兵數目滿洲每旗委叅領一人䕶軍叅領與驍騎叅領按年輪委䝉古每旗委叅領一人䝉古叅領與漢軍叅領按年輪委滿洲䝉古每叅領下委散秩官二人前鋒校䕶軍校驍騎校等每叅領下合委一人滿洲䝉古每佐領下前鋒䕶軍合委一名領催驍騎合委三名出牧各官遇有切近䘮事實繫患病及婚嫁之事準其告假回京其兵丁有婚䘮患病等項事故亦必覈實方準給假回京仍行文該旗補委官兵前往再出牧馬駝減少之年其出牧官兵應令委出副都統㑹同各該旗酌量裁減七年奉㫖出場馬駝回京之期報眀該部竢該部咨覆到日再行回京十年奉㫖八旗餧養官馬甚闗𦂳要乃交隨圍馬匹之時每有以銀交納者皆平日餧養不勤而臨時監看交馬之大員又不加察以致如此嗣後八旗都統不時嚴察凡遇交官馬時將八旗都統副都統等職名當月旗彚奏每旗各簡一人令其監看又奏準八旗官馬駝每佐領下駝一隻給佐領與驍騎校餧養佐領止準養官馬一匹其餘官馬選善於餧養之䕶軍校前鋒䕶軍等餧養不準給大臣子弟再鳥槍驍騎亦不時操演酌給餧養又奏準八旗馬駝事務請於八旗都統副都統内每旗欽命一人令與本旗都統一同察辦又奏準凡出差人員所騎官馬奏眀領取者照例給與咨取者槩不準給又奏準各旗官馬駝於該旗都統副都統内欽命一人令其專管其馬冊房叅領官員驍騎校由都統等於本旗見任各官内委令兼管又奏準交官馬時靣飭嚴禁不得勒索用銀一經察出分别與受懲治十三年奏準凡餧養官馬或有疲瘦不能賠補者將馬徹出於佐領下一應當差人内通行遴選令其餧養十五年奏準八旗官駝如有倒斃該旗即報當月旗今歸直年都統存案如非𦂳要用駝之時將官駝四月錢糧及皮骨所變之價並户部増補銀一同領出交當月旗其每月十五日以内咨到當月旗者即令辦買不得移交下月其十六日以後咨到者存案移交下月辦買至辦買時當月旗都統等簡委賢員勿逾原定價值擇其肥腯無殘疾者送當月旗都統等驗看烙印交該旗餧養補額如有餘剰之銀暫貯該旗庫内若值廵幸起程日近遇有倒斃之駝即行買補不必候領四月錢糧即由户部領取増補銀二十两並皮骨變價銀照例採買不敷即於平時買駝餘剰銀内酌量湊買如無餘剰之銀暫將户部増補買駝銀内借支買用竢有餘剰銀補還借項其所買駝數並用過銀數當月旗行文户兵二部存案於年終各該旗將所買駝及皮骨變價支領増用銀並餘剰繳還銀各數目造具清冊咨送當月旗當月旗將八旗倒斃駝若干所用銀若干彚行奏聞交都察院察覈十六年奉㫖每佐領各増牧駝一隻是年奏準八旗牧養官馬共二萬七百七十三匹每匹月給馬亁銀三两近因京城豆價草價皆昻所支銀不敷購買應暫為通融籌辦請於所牧官馬内酌撥萬匹在京外牧養熱河撥給馬千匹近京各莊頭撥給馬二千匹此外七千匹交直𨽻各標營牧養其熱河及各莊頭草料銀由該副都統内務府㑹計司官赴户部支領按月給發直𨽻各標營就近於藩庫動支如有減剋草料以致疲瘦者該管官交部議處兵丁莊頭嚴行治罪或有倒斃照八旗之例於馬亁銀内按月扣存買補並請特簡大臣均匀搭配不得槩以疲馬充數如有不肖兵丁乗便將殘廢馬私行抵换者一經察出即將本人從重治罪佐領及都統等一并交部嚴加議處十七年奏上年因京師草豆價昻八旗牧養官馬每月所支馬亁銀不敷購買經大學士等遵㫖議奏將八旗官馬撥出萬匹交與直𨽻各標鎮營並熱河副都統及近京莊頭分領牧養竢次年草豆價平仍分與八旗官兵牧養察目下京師草豆較上年價直已減此項官馬或仍交直𨽻等處牧養或遵照原奏留京牧養奉㫖此項官馬前經交直𨽻各標營牧養脿既属充足且聞於該兵丁等亦属有益著不必交熱河副都統及各莊頭竢回鑾後撥出萬匹皆交與直𨽻總督仍前分撥牧養十九年奏準八旗官駝照官馬例交與直𨽻總督分給各標營牧養欽定大清㑹典則例卷一百七十四
