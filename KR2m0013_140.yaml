役工食銀一百八十六兩向於額數內動支報銷裁鐙夫二名巡役十名歲減工食銀彚入正稅年終解部充餉七年覆準潘桃口收稅各口繫大河小河二處設為正關監督親驗收稅但大河過關木植由潘家口而進小河由桃林冷口而來二口岐路甚多繞關最易嗣後將大河小河二處正關移於潘家桃林二口各設稅局分鑄斧號該監督親驗烙號放關其有姦商豪戶運木進口揑稱完稅驗放之後私藏在家乘監督新舊交代串通守口人役減半交稅暗行烙號逾限不報者限一月內自行首報輸稅免究若經察出或被首告即將漏稅之木盡數入官交地方官變價解部仍將該商戶解部治罪再各處關口商貨照依納稅然後放關獨潘桃口木植該商報驗烙號即便放關於通關後始將應完稅銀開具欠呈小版木稅限二月於永平完交大版木稅限四月於天津完交每多遲延濛溷之弊嗣後以過關之日為始定限五月木商親身赴關完納如逾限不完及完不足數者即將該商木植確估抵交應完銀數交地方官變價解部餘木聽商自賣又覆準古北口稅課每年額徵銀四萬三百四十一兩五錢交密雲縣請領部科循環印簿將商人過關木植十分取一折銀按季報部一年屆滿將循環印簿呈送部科察核所收稅銀照數解部又覆準南新關徵收竹木正關之外分設漁臨美政安溪富新北新觀音版橋良畎籹粫古蕩十小關分徵零散竹木向例差役在口就近收稅每年額發商人親填簿册一本存於正關同各小關收數一總彚填簿內年滿送部考核各小關分設地方距正關遙遠於正關號簿之外增設小關印簿十套分給就近登填以免商民逺赴正關八年覆準古北口一路近年木植進關甚少額徵銀一千十有二兩五錢一分九年覆準辰關木稅以一萬二千五百兩為定額如遇閠月加九百兩每年請領循環印簿將商人姓名木植數目年月日期飭商親填一年期滿送部考核十年議準徵收瓜儀由閘河餉銀嗣後令該管道員照依各關之例赴部請領親填簿令船戶據實登填期滿題報考核十一年覆準川省渝關木稅設關之始並未請有部頒詳細則例杉木柏木估本稅銀大小尺寸均無一定未免輕重之偏今若將各號木植竟照所直之價估本收稅恐商人不能多獲利益應請留其有餘照各號圍圓尺寸較原估本量加三四成按則科算各銀一兩取稅三分又覆準瓜儀由閘徵收河餉嗣後於原額之外如有溢收準其報解戶部倘有闕少在於徵解戶部項下之撫增等餉銀內照數補足又覆準鳳陽蕪湖兩關平法等子均不畫一交工部成造頒給該管官如有私造故為輕重情弊令該督撫核實題參其所收商稅銅斤水腳銀照正關一例填入單內給商收執俟早晚放關即驗單截角放行至年滿考核時將所收正稅若干銅斤水腳若干分造清册報部十二年覆準南新關徵收稅課分解藩司杉木料銀四千七百八十二兩五錢俟該關徵收期滿之日照例解交司庫委官附解戶部十三年覆準交城縣徵收武元城木稅每年以一千二百三十一兩有奇為定額又奏準松阿里江上遊輝發穆欽等處木植十取其一免徵山分銀交與地方官徵收乾隆元年議準裁宿遷關額徵石價銀八百二十兩又覆準臨閘稅務歸并臨清大關每年以四千五百七十二兩七錢四分為定額三年覆準密雲縣徵收古北口木稅緣牆子等四路封閉遞年闕額請照雍正十二年六百四兩有奇之數徵收與雍正八年題覆定額懸殊恐滋侵隱今仍以一千十有二兩五錢一分為歲額四年覆準殺虎口監督徵收歸化城木稅每年以四百四十六兩為定額五年覆準各關徵收稅銀皆改用題本嗣後各關於一年任滿時繕本具題畫一辦理六年議準宿遷關徵收豐沛蕭碭四縣陸稅仍舊改隸縣徵解歸藩庫奏銷扣除四縣陸稅銀二百九十六兩以存銀四萬八千八百八十四兩為每年定額徵收報解十年議準瓜儀由閘徵收河餉一年期滿改歸蘇州巡撫題報考核所收銀解交總河衙門以備河工之用十二年諭關稅定有正額徵收闕少例應著令賠補若一人而兼管兩關者此關徵收有餘應準其抵補彼關不足之數再有短少令其賠補該部察核各關稅銀均著照此辦理十六年議準輝發穆欽等處木稅以三百七十兩作為定額一徵收禁令順治十六年議準喜峯口外所屬蒙古及八旗網戶木匠砍伐柏版進口販賣亦照十分取二之例徵取如有私行進口不遵徵稅者該差官指名報部題參治罪木植入官十七年議準凡邊外伐木之處不許恃強占據如違指名參奏康熙元年題準旗民採木人役以兵部給發關票之日為始限半月內出口其關票限一年繳銷如過限不回及不銷票者送該部議罪十六年題準凡各商木植進口該管官親身察驗照數徵取以備各工取用如有隱漏長大木植止徵短小者題參重處二十二年議準盛京佟家烏喇地方所産大木有願採伐貿易者聽工部盛京工部寧古塔將軍發給執照令沿海運至天津貿易不許夾帶禁物竊捕貂鼠私採人參二十六年題準古北口木稅該差官於任滿日起限四月內明白交完潘桃口收稅繫由海運以任滿日起限八月如限內不完者照各關拖欠銅斤例議處商人亦照交納銅斤闕少例治罪如差官隱漏大木止收小木及通惠河分司差滿報部有遺漏舛錯者一併題參議處二十九年覆準嗣後領部票商人木植被水衝散有恃強偷盜者照常人盜官物例治罪三十三年題準凡木商出口帶領人夫令監督將姓名年貌逐一開填票內給發驗收兵部行文管口官將出入人夫與票內所開逐一察對明白放出進口時亦照此例或有病故者商人豫報管口官注册如管口官不稽察人數任其出入該部議處如商人揑報人夫病故者交刑部治罪雍正八年議準潘桃口木植所經之地路僻水險沿河匪類或因水發木漂乘機盜竊或結黨截道攔阻木筏或暮夜上筏砍繩乘機撈搶一經商人呈告該監督即會同永平府審訊明確照白晝搶奪律治罪十一年覆準荆關徵收竹木鈔稅所給商票照船稅一例換用聨二串票飭令將應完鈔銀開載照票給商過關根票截存繳部十三年覆準潘桃古北殺虎等口商人砍木部給印票向繫兼書清漢字樣但該處繫蒙古地方或有不肖商人揑書漢文以欺蒙古溷入砍木亦未可定嗣後令各該監督請領兼書清漢蒙古三體字印票俟給發到日即將舊票繳回並轉咨吳喇忒公歸化成都統嚴飭蒙古不時稽察倘有並無清漢蒙古字印票溷入砍木者即時拏獲送部治罪如蒙古徇庇不報即將蒙古一并治罪至大青山木植不免夤夜偷放木筏以圖漏稅等弊嗣後令殺虎口監督並該御史不時稽察倘漫不經心以致差役商賈夤緣漏稅一并交部議處又覆準宿遷關所管豐沛蕭碭四縣應徵陸稅銀照依見收稅銀則例刋刻曉諭遴選幹辦書役前往彼地據實徵收不得仍前侵隱所收稅銀彚同該關徵收稅銀照例按季解部期滿具題考核該監督不時嚴行稽察無致書役徵多報少刻意苛索苦纍商民如有此等情弊一經察出嚴行究治仍令該地方官將稅老土豪人等嚴行禁革不得仍前把持以杜包收侵隱之弊並令將各屬經徵陸地等稅徹底清理飭該地方官照數盡收盡解如有土豪包收情弊一槩嚴行禁革倘經管官希圖通同侵隱照例參究乾隆六年覆準龍江關徵收木稅嗣後水平橫量簰面如中髙一尺邊低一尺將髙低折實除還一半止以五寸科算永禁飛量之法十年覆準宿遷關散裝船貨不拘頭稍倉跨悉照成包成捆貨物一例籤驗見數按擔徵收永禁通船一載之例考核禁令戶部同者不重載欽定大清會典則例卷一百三十六
