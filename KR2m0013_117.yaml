body:
  text: 兵部職方清吏司軍政一軍政考察通例順治十一年議準武職軍政五年舉行一次二品以上具疏自陳三品以下該管官分别優劣遇應行軍政之年由部於二月內具題行令考察如法又議準內外軍政各官升任裁汰降調離任一年以上者舊任不必注考於新任注考不及一年者仍於舊任注考均於十月內具題到部部會都察院兵科河南道今京畿道察核題覆又題準各省軍政造具四柱文册分送本部及兵科河南道今京畿道考核其册開各官除本部題覆出榜曉諭外如有遺漏舛錯仍聽科道各官參劾又題準軍政應考各官有營求囑託及羅織生事或親自出名或主使他人投辭告訐匿名造揭暗圖侵陷者在外聽督撫在內由部行五城御史巡捕營緝拏參究又題準軍政考核届期閲册各官於寓所各書回避黏貼門首郎中員外郎主事住宿衙署均嚴加關防閲册畢會同兵科河南道今京畿道參訂賢否以定去留雍正元年議準軍政自陳各官有遺漏舛錯上次自陳以前之事者槩免議處其奉㫖察議者仍照例議處若遺漏已經議處降罰案件有關考成者罰俸一年遺漏廕子加級等事無關優劣者罰俸六月至失用印信不開籍貫舛錯一應細故者止行嚴飭又題準軍政薦舉各官考語有參差無甚關礙者亦準卓異四年奉㫖嗣後凡降罰之案奉㫖特免者不必載入自陳本中著吏兵二部一例遵行乾隆十七年諭京察之年部院堂官各省督撫循例自陳求斥罷候㫖照舊供職此雖三載考績之義但卿二職贊機務督撫任寄封疆朕量材簡擢日復於懷其有不副委任或不稱簡畀者率已隨時黜陟斷無遼待三年之理凡可俟至京察解退者不過閒曹冷署年力衰昏而又非有大過介於可去可留之間者耳且身列大臣謬以斥罷為辭是相率為僞誠無謂也嗣自今內而部院司官外而道府京察大計之例仍舉行以昭激勸其自陳繁文著停止以示崇實武職五年軍政視此欽此一軍政卓異通例順治十二年題準卓異各官移咨禮部賜衣一襲又題準各官有清亷能幹其降罰之案繫因公罣誤者皆準其卓異其食俸未滿三年及有盜案未結者不論多寡槩不準卓異若繫前任內曾有盜案已經議結見任內並無事故及考語閒有參差無甚關礙者亦準其卓異雍正元年議準卓異官引見注册後遇有員闕應升列名題補其食俸未滿三年者不準卓異二年奉㫖嗣後卓異官有不合例者將何人保舉並與例不符情由别行開明具奏又奏準軍政卓異各官移咨禮部賜蠎衣一襲乾隆七年奏準凡內外武職上次軍政卓異下次降為平等者將上次卓異報部注銷一軍政糾劾通例原定貪酷有款者革職提問不謹罷軟者革職年老有疾者勒令休致才力不及者降二級調用浮躁者降一級調用前有卓異應升及加級紀録不準抵銷又定八法各官通為一本參奏貪酷有款者革職提問如事在赦前免罪永不敘用不謹罷軟者革職年老有疾者勒令休致才力不及者降二級調用浮躁者降一級調用不準援赦從前卓異即升及一應加級紀録不準抵銷其不謹罷軟有疾不及浮躁等官均送部引見年老者不必送部引見如有情願赴部者該督撫提鎮仍給咨送部雍正二年諭吏部兵部三年一次舉行大計軍政此內有應革職者若俟部議奉㫖之後方行解任其地方遠者為日甚久劣員豫知被革恐其恣肆妄為嗣後舉行大計軍政之時有應革者即行解任若具題之後或有免其革職者仍再行補授欽此一考察八旗武職康熙十一年議準鑾儀衛滿官不考察又議準犧牲所官不入軍政雍正元年議準領侍衛內大臣八旗都統前鋒統領護軍統領步軍統領副都統皆繫近御大臣不必具疏自陳至所屬武職各官令其確核賢否注考舉劾將行止端方居官勤慎弓馬嫻熟馭兵有律給餉無虛者列名薦舉貪酷不謹罷軟年老有疾才力不及浮躁者分别糾劾其步軍尉暨守壇廟官散秩世爵有疾不能行走者題參年老者免其糾劾至各省駐防官五年考察一次將軍都統副都統自行陳奏所屬官令將軍等秉公考察又議準御史部院司官兼任武職者不在軍政之例內外考察旗員有在軍前受傷得功者均詳注於册其不入舉劾照常留任者均令該管官注考造册送部至考察在京旗員由部疏列管理旗務王公滿洲蒙古都統副都統前鋒統領護軍統領滿洲授漢軍都統副都統本部滿尚書侍郎奏請簡命公同考察河南太原二處城守尉各官同前列名奏請遣往考察內外考送軍政册於本年十月具題下部部會都察院兵科河南道今京畿道察核具奏黜陟如法二年議準圓明園八旗武職遇軍政之年令該管王大臣一例考察四年題準鄭家莊昌平州保定府固安縣寶坻縣東安縣良鄉縣霸州采育里駐防各官遇軍政之年令巡察駐防之護軍統領副都統同該管官考察具奏乾隆二年議準內務府所屬兼文職佐領各官仍入京察外其三旗護軍統領護軍參領護軍校驍騎參領佐領驍騎校散秩官不兼文職者照八旗軍政例考察七年奏準緑旗軍政均詳開履歷分别去留旗員軍政向無定式嗣後考察定以四格一曰操守或廉或平或貪一曰才能或長或平或短一曰騎射或優或平或劣一曰年嵗或壯或中或老並將各官履歷及有無出征效力受傷得功注明於册送部核覆又議準步軍尉前鋒校驍騎校遇軍政之年令參領協領注考申報該管大員察核明確彚册送部內外旗員調任一年以上者於新任填注考語不及一年者仍於舊任填注考語又議準八旗都統前鋒統領護軍統領步軍統領副都統舉行軍政之年咸令具疏自陳其部院文職兼都統等任者不在此例軍政自陳於九月初一日至初十日送通政使司陳奏有出差者俟差竣補行交部察議者照軍政考察例會同都察院兵科河南道今京畿道察核具題十二年諭凡兼有職任之王公遇大計軍政之年皆與大臣等一體自陳舉賢自代但王公等皆朕宗室特㫖令其兼辦非按資格録用之大臣可比且宗人府王公等並不自陳嗣後遇大計軍政之年兼有職任之王公等悉停其自陳欽此十五年諭大計軍政固三載考績之義以示激揚但文武大臣具疏自陳雖屬遵循成例而於實政未有裨益蓋中外大臣皆朕所簡用既經委任其居心之誠否才具之短長舉在洞鑒之中如其不能稱職早已隨時甄别其待至三年而計去者實職非要任而人非大過介在可否之間者至於大臣恪共職守正宜久任以收實效而屆期輒求斥退復降㫖令照舊供職拘成例而事繁文非崇實務本之道也至近御大臣領侍衛內大臣等或簡自勳戚或拔從宿衛其辦理閣務卿長以及八旗職任皆量材器使非循資録用者比且多世沐國恩趨承左右論其情理亦不當引退就間甘心暇逸而每至三年亦循例求罷是轉以疏遠自居如君臣一體之義何前因宗室王公兼有職任者皆繫宗潢近派特㫖令不必自陳嗣後近御大臣領侍衛內大臣御前侍衛乾清門侍衛等兼理閣務及八旗事務者遇大計軍政皆令不必自陳餘仍照舊例行欽此十七年題準靜宜園八旗官照圓明園各官軍政之例一例考察十八年諭上年朕雖經降㫖將考察軍政武職大臣自陳請罷之例停止但該部仍應具奏請㫖著交兵部遇軍政之年八旗都統內兼管之諸王尚書外其餘都統前鋒統領護軍統領副都統等職名事實著繕摺具奏請㫖欽此又諭八旗世爵與職任官一體軍政填注操守才能均屬虛名究非實事伊等只應論其弓馬人材平素行走何如耳嗣後八旗世爵不必入軍政考察交該旗大臣三年一次引見於引見時仍將平日行走如何之處一并聲明具奏永著為例欽此又奏準領侍衛內大臣御前大臣侍衛乾清門侍衛兼領旗務者向不自陳均毋庸開列事實其駐防將軍都統副都統亦照八旗開列事實之例請㫖嗣後軍政之年八旗都統等於九月初一日至初十日造具事實清册送部駐防將軍等於十月內造具事實清册送部由部彚疏以聞一八旗軍政卓異乾隆七年議準外省駐防官有引見未滿三年而該上司舉為卓異者由部請㫖定議具奏不必引見又議準駐防各城軍政卓異官如山海關等處協領各城城守尉遇有外省副都統員闕由部開列題補張家口總管各城防守尉佐領由該旗以城守尉京城參領題補各城防禦由該旗以本處防守尉圍場總管及京城步軍副尉題補各城驍騎校由該旗以本處防禦及京城步軍尉題補巡察圍場官由該旗以圍場總管及京城步軍尉題補各城領催令該管之城守尉防守尉等選弓馬嫻熟效力年久者保舉咨部以本處驍騎校京城驍騎校及六品官題補以上官及領催內有願居在外者呈明考察大臣仍留本處十八年奏準駐防官五年軍政大典攸關各省薦舉理應慎重應按地之大小官之多寡酌中定額黑龍江七人盛京六人吉林五人西安綏遠城右衛各四人江寧杭州荆州各三人京口寧夏凉州莊浪成都廣州各二人熱河山海關青州福州各一人至河南太原過軍政之年向繫特簡大臣考察獨石口千家店張家口古北口鄭家莊昌平州六處保定府固安縣寶坻縣東安縣雄縣良鄉縣霸州采育里八處向有巡察大臣統轄以上駐防各處官數無多無庸定額嗣後軍政令各該管官秉公考察果有賢能出衆準其薦舉一人若無堪膺薦舉者寧闕毋濫其各省將軍等或因定有薦額循私濫舉經部察出據實參處二十一年諭駐防城守尉之設表率將辨整飭營伍是其專責近京地方如保定等處城守尉有護軍統領管轄不時督察巡閲惟河南太原兩處並無大員節制且與所轄之佐領官階體制不甚相懸一切稽察彈壓之處未免因循瞻顧嗣後著即歸於巡撫節制所有該官辨技勇及馬匹器械該撫隨時察核分别奏聞其有懈弛不職弓馬生疏者即將該官辨據實參處欽此一八旗軍政糾劾乾隆二年覆準在京八旗軍政案內不謹罷軟年老有疾才力不及浮躁應降革休致各官除驍騎校等繫六品微秩毋庸引見外餘於議處本內敘明應否引見請㫖欽定又覆準內外八旗武職遇軍政之年令欽㸃王大臣並該管各上司秉公考察有年老而精力未衰曽經出征效力著有軍功者仍留原任若年力皆衰雖有軍功實難任事照例令其休致此等休致之人曽經陳戰受傷及得有功牌者核明請㫖給以全俸以養餘年其出征未曽臨陳及無功牌者核明請㫖賞給半俸至效力年久並未出征者仍照八法例勒令休致年至六十以上填注有疾者亦照年老休致給俸之例行三年奉㫖駐防糾劾各官著問伊等有情願來京者該管大員給咨赴部引見七年議準京口福州廣州將軍所轄旗員仍照八旗軍政之例行其所轄緑旗營辨照直省緑旗營辨軍政例辦理又奏準職任官兼佐領世爵軍政案內以浮躁糾參者留其世爵將職任官與佐領一并降調以才力不及糾參者將見任官降調仍留佐領世爵若繫公中佐領不在此例又議準軍政休致各官曽在軍前效力本身兼世爵及世管佐領者應給全俸半俸俟應襲爵承廕之後再行請㫖如繫兄弟之子承襲準其分别給俸子襲者不準給俸一考察緑旗武職原定軍政五年舉行一次將上屆軍政以後所行之事並事故詳仃開注副將以下各官屬總兵官管轄者總兵官注考不屬總兵官管轄者該副將參將等官注考其注考時將各官履歷賢否實蹟造具清册填入考語徑送督提等再詳加考核確定去留造册密封送部其應自陳之提督總兵官於各官文册起送之日一並自陳至在內鑾儀衛漢鑾儀使自陳冠軍使以下整儀尉以上等官由滿漢堂官注考造册密封送部巡捕三營將備及各門千總由步軍統領注考造册密封送部直省衛所經管錢糧各官由布政使司及糧道詳注考語密呈督撫督撫再詳加考核造册密封送部康熙十一年議準軍政考語含糊參差及將應注考者不注不應注者注考或開報年歲不符並失注去留者督撫提鎮罰俸六月申報之該管官罰俸一年三十六年諭軍政大典五年一舉所以黜陟將辨砥礪官方使賢者知勸而不肖者知警關繫綦重每見督撫提鎮不能實心奉行輒向所屬需索部費恣意誅求因而將辨以下節次侵削重為兵害至於所舉所劾或瞻徇情面或曲庇私交將扣剋額餉虛冒兵糧濫受餽遺虐取規例委繫貪酷及衰懦闒茸不能騎射之人不行糾劾止將微員細事草率塞責以致貪婪庸劣之輩無所戒懲而守法奉公宣勞盡職者抑遏不揚無所激勸殊負朝廷旌别淑慝之意爾部可即通行各督撫提鎮此次舉行軍政務矢公矢慎力破積弊俾舉一人衆皆以為賢劾一人衆皆以為不肖庶激揚咸當而國家允收得人之效倘因仍陋習不知悛改後有發覺定將該管官一并從重治罪欽此又議準官員值軍政之年有藉端科斂者革職提問若該管官知而隱匿不揭報者革職如已經揭報該提鎮不題參者降五級調用雍正元年諭五年舉行軍政其居官優者列為卓異劣者分别重輕置之八法所以澄敘官方勸善懲過典至重也朕思卓異八法所舉所劾不過十數人而平等供職不列舉劾者尚多如武官騎射之優劣訓練之勤惰皆未填注考語是考課尚有遺漏之處也嗣後軍政除卓異八法照舊例舉行外其平等官員自守備以上皆於軍政之年令督撫提鎮注明考語造册詳報兵部務期秉公核實不得徇情任意顛倒是非欽此又議準不入舉劾武官自守備以上詳開履歷造具文册並將該員散給兵餉訓練營伍騎射年力緝盜安民各如何之處由該管官詳悉填注考語至衛所官經手錢糧有無虧空及辦事勤惰之處亦令該管官詳悉填注考語造册送部以憑考核五年奉㫖向來軍政之年該管官往往以千把總舉劾塞責似此微員優者可以隨時拔用劣者原可咨部黜革何必待五年軍政之時嗣後千把總於軍政舉劾之處著停止乾隆六年奏準京口福州廣州將軍所轄旗員軍政仍照八旗軍政例遵行外其所轄緑旗營各官遇軍政之年照提督之例辦理有應議者亦照提督之例議處又議準軍政注考違例若不由該管官申報繫督撫提鎮自行填注者即照申報官例議處如將舉劾官合為一本具題者該督撫提鎮罰俸一年七年諭各省軍政五年一舉乃黜陟將辨鼓勵戎行之要務為督撫提鎮者留意於平時而舉行於此日必公正無私甄别允當舉所當舉而衆人皆知奮興劾所當劾而衆人皆知警戒將見人材輩出士氣益勵國家於以收干城腹心之效所關非淺鮮也昔我皇祖皇考加意武備訓諭諄諄其因舉劾不公降㫖申飭至嚴且切今當軍政之期倘司其事者或瞻徇情面庇護私人將居官貪劣及衰懦闒茸不能騎射之人姑容在職止將微末員辨數人填注充數而使技勇過人勞績素著或秉性質朴實心效力者遏抑隱藏無所表見則賞罰不明賢否倒置人心懈怠戎政廢弛重負朝廷委任之意其罪不可逭矣用是特頒此㫖務各洗心滌慮將從前情弊陋習一一屏除以肅詎典倘有仍蹈前轍者經朕訪聞或被科道糾參必當加以嚴譴欽此一緑旗軍政卓異順治十二年題準緑旗軍政卓異各官必須才技優長年力精壯馭兵有術紀律嚴肅給餉無虛兵民相安食俸已滿三年者方準以卓異具題由部院核覆其與例相符應準卓異之人如繫游擊以上官引見未滿三年者由部具奏請㫖不必送部引見至引見已過三年及未經引見並都司以下引見未滿三年者均令送部引見後以卓異注册若不候部院題覆遽行赴部者給咨之督撫提鎮罰俸六月又議準武職軍政卓異必須詳慎方足以符巨典如將有盜案之官保薦者督撫提鎮各罰俸六月申報之該管官罰俸一年康熙二十三年議準督撫提鎮濫將匪人徇情薦舉者降二級調用申報之該管官降三級調用雍正六年議準卓異之官原任內有貪酷不法原薦舉官即行揭報題參者免議如不揭報題參將原薦舉之督撫提鎮降五級調用副參游等官皆革職若卓異後或回本任或升轉他省别犯貪贓不法之款審實者其原薦舉各官仍與卓異之官同在一省未敗露之先察出揭參者免其處分若不揭報題參將督撫提鎮降二級調用副參游等官降三級調用原薦舉各官已不與卓異之官同在一省於貪贓不法之處無從揭報題參者將督撫提鎮降一級調用副參游等官降二級調用此等皆降實級任內雖有加級薦紀軍功卓異即升不準抵銷十二年諭各省卓異人員均有見任地方之責每當大計之年理應先行具本候㫖交部院察議其與例相符應準卓異者奏聞令其來京引見其與例不符不準卓異者候朕酌量應令引見與否再降諭㫖如此則地方事務不致廢弛而與例不符之人亦不徒費往返永著為例欽此一緑旗軍政糾劾雍正元年議準軍政八法除貪酷不謹外其餘糾參各官有曽經出征受傷立功者若例應革職者仍給本身空銜例應休致降調者準令子弟一人入伍食糧乾隆二年議準軍政年老各官內如從前曽經出征效力今繫年老衰邁實難勝任者準以原品休致令子弟一人入伍食糧如無子弟給守糧一分以資養贍其年齒雖老而精力未甚衰憊尚可辦事者該督撫提鎮酌量仍留原任或行調簡俾效力之人不致因年老失所五年諭緑旗武職軍政年老各官朕前降㫖將曽經出征效力者準其原品休致令子弟一人入伍食糧如無子弟給守糧一分以資養贍至軍政有疾曽經出征受傷得功之人雖有子弟食糧之例其無子弟者尚未議給養贍並著議給再有疾各官曽經出征效力之人有以老病告休者因未屆軍政之年轉不得援養贍之例情殊可憫嗣後各省除副參等大員外都守以下各官有以老病告休者著該督撫提鎮核明該員實有出征效力之處於題咨內分别聲明亦照軍政年老有疾之例一體加恩優恤欽此六年奏準軍政八法除貪酷不謹悉行議革外其罷軟官有曽經出征受傷立功者給與本身空銜年老官有曽經效力今衰憊不能勝任準原品休致有子弟者令一人入伍食糧無子弟者給守糧一分以資養贍若精力未甚衰憊或留任或調簡該督撫提鎮酌量請㫖遵行有疾官曽經出征效力者準以原品休致有子弟者令一人入伍食糧無子弟者給守糧一分至滿洲䝉古漢軍外任營官如遇軍政填注老疾曽經出征受傷及得有功牌者仍照在旗武職老疾休致之例分别優恤十年諭向例軍政糾參年老有疾休致各官及都守以下老病告休者如曽經出征準令子弟一人入伍食糧如無子弟給守糧一分以資養贍其各省甄别候補守備之年滿千總因年力就衰咨部休致者亦照此例辦理如因人材平常弓馬生踈則例不準給朕思此內不無曽經出征著有勤勞之人應一并加恩以示優恤嗣後著該督撫等核明實有出征效力之處於題咨內聲明亦照前例準令子弟一人入伍無子弟者給守糧一分俾不至於失所欽此一緑旗武職薦舉原定直省總兵官不準薦舉其副將參將游擊都司守備每二年半薦舉一次陜西薦舉五人直隸江南福建浙江湖廣四川廣東各薦舉四人山東山西江西廣西雲南貴州各薦舉三人河南薦舉二人必才技優長年力精壯馭兵有術紀律嚴肅給餉無虛兵民相安者各按省分額數薦舉準其紀録一次如無賢能之員即停其薦舉若將有盜案之人薦舉及薦舉後見任內有劣蹟發覺將原薦舉官皆照軍政例議處此薦舉時如有劣員一并糾參照軍政八法例分别議處康熙三十七年議準若遇軍政之年將舉劾停止乾隆十一年議準漕運總督於二年半舉劾標員之外又别將各省沿塗催漕各官舉劾但催漕各官該本省既有二年半舉劾之例自應歸各本省督撫提鎮舉劾若漕運總督復行舉劾事屬重復應行停止軍功一軍功奉㫖從優議敘康熙二十年平定黔滇議敘克復普安州等處各官各功加一等攻取重關太平橋走馬街等處各官各功加三等迎敵殺賊及克復雲南省城各官各功加四等二十一年福建克復海壇厦門金門等處議敘有功官辨例應功加一等者加二等應功加二等者加四等餘照等倍加是年平定臺灣議敘官各加一級兵各賞一次奉㫖官兵遠抵海疆冒險勦寇非陸路用兵可比在事官員著各再加一級兵丁著再賞一次三十七年平定厄魯特噶爾丹議敘大將軍三等伯奉㫖加封一等公西路官兵自參贊以下實授官員以上各給一雲騎尉準襲一次所有功牌仍照例分别議敘護軍驍騎校各加一級食俸兵丁各加賞賚西路進勦緑旗官兵自將軍提督總兵官以下見任官各功加二等候補候選官於補官日各功加二等陳亡各官給與恤賞陳亡兵丁為首者贈千總第二第三贈把總各照所贈之官給與恤賞奉㫖緑旗官兵同滿洲大兵勦滅厄魯特在事有職任守備以上官著給與雲騎尉三十八年議敘中西寧夏三路挽運軍糧各項效力人員分為四等見任官一等者以應升官即用二等者加三級三等者加二級四等者加一級候補候選官一等者有闕即用二等三等四等者於補官日照等加級停用功加投誠及外委官一等以守禦所千總用二等以衛千總用三等以營千總用四等以把總用降級官一等者復還原級以原官用二等三等四等於補官日照等加級革職官一等者復還原職二等給六品頂帶三等給七品頂帶四等給八品頂帶以上一等內有三品以上因繫大員不便應升即用改為加四級護運軍需各項並守米牧放人員雖非挽運可比但既經效力亦應議敘見任及候補候選官各加二級停用功加投誠及外委官均以千總用其在近地挽運者見任及候補候選官各加一級停用功加投誠及外委官均以把總用五十四年駐防哈密官兵擊敗準噶爾賊衆議敘領兵進戰之游擊越等以副將用守備越等以參將用千總越等以游擊用把總越等以守備用兵丁均給把總劄付內有陳亡者令其妻子食把總俸雍正元年議敘克復臺灣官辨各功加三等防守淡水各官各功加二等防守澎湖厦門各官各加一級奉㫖臺灣地方自古未屬中國皇考以聖略神威取入版圖逆賊倡亂占據臺地皇考籌畫精詳指授地方官員遣調官兵七日之內克復全臺官兵感戴皇考教育之恩奮勇攻取甚屬可嘉官員議敘之外槩加一等又平定西藏議敘奉㫖西藏乃自古未至之絶域所以皇考曽有從優議敘之㫖此一次議敘軍功前因無例可援後亦不得為例八旗官員進勦之將軍等著給與世襲三等輕車都尉參贊大臣給與騎都尉副都統營總給與雲騎尉護軍校驍騎校給一等功牌仍加一級緑旗官員一等者功加一倍二等者功加五等三等者功加二等至於滿洲漢軍緑旗之外委官皆繫一體效力無論由部委外委槩行從優議敘一等軍功功加十等二等軍功功加五等三等軍功功加二等二年奉㫖嗣後文官在軍前效力者令兵部議敘永著為例五年平定雲南威遠新平議敘總督加二級總兵官加二等其餘有功官辨一等者功加二等二等者功加一等三等者加一級又平定貴州狆苗議敘總督加三級提督總兵官功加三等其餘有功人員一等者功加二等二等者功加一等三等者加一級六年平定雲南土司窩泥議敘總督加二級提督功加二等其餘有功官辨一等者功加二等二等者功加一等三等者加一級七年平定西海議敘將軍奉㫖封為三等公其餘有功官辨一等者功加二等