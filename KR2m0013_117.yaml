俟後再有本旗前進之功將兩次三等功牌準作一次二等兩次二等功牌準作一次一等積至三次一等者咨吏部授爵其隨隊伍進攻或隨衆斬射或追擊敗兵或於敵少處進攻者均不在給賞授爵之例又題準大兵出征如敵人掘濠排栅列陳相持我兵力戰不退八旗執纛人有能鼓勇前進者賞銀百兩咨吏部授爵次進者賞銀八十兩又次進者賞銀六十兩如官兵前進將及十人執纛人續進者第一人賞銀五十兩其餘均不給賞若整兵對敵之時一旗內有一參領下執纛人在衆參領之前首進者賞銀五十兩注册給一旗執纛首進一等功牌俟後立功有三次一等功牌咨吏部授爵執纛人次進者賞銀四十兩又次進者賞銀三十兩如官兵前進將及十人執纛人續進者賞銀二十兩餘不給賞以上均令統兵將帥分别等第造册送部執纛人軍功三等以上者準其給賞四等以下者不準又題準水戰時有能超登敵舟殺賊獲衆者統兵大臣驗明舟之大小分為三等注册一等舟賞五人先登者賞銀二百五十兩第二人二百兩均咨吏部分别授爵第三人賞銀百五十兩給一等舟三等功牌第四人賞銀百兩給一等舟四等功牌第五人賞銀五十兩給一等舟五等功牌均注册俟後復有超登一等舟戰功將兩次五等功牌準作一次四等兩次四等功牌準作一次三等積至兩次三等者咨吏部授爵二等舟賞四人先登者賞銀二百兩移咨吏部授爵第二人賞銀百五十兩給二等舟二等功牌第三人賞銀百兩給二等舟三等功牌第四人賞銀五十兩給二等舟四等功牌均注册俟後復有超登二等舟戰功將兩次四等功牌準作一次三等兩次三等功牌準作一次二等積至兩次二等者咨吏部授爵三等舟賞三人先登者賞銀百五十兩給三等舟一等功牌第二人賞銀百兩給三等舟二等功牌第三人賞銀五十兩給三等舟三等功牌均注册俟後復有超登三等舟戰功將兩次三等功牌準作一次二等兩次二等功牌準作一次一等積至兩次一等者咨吏部授爵其三等以下常舟不列等次先登者賞銀八十兩給常舟一等功牌第二人賞銀六十兩給常舟二等功牌第三人賞銀四十兩給常舟三等功牌均注册俟後復有超登常舟戰功將兩次三等功牌準作一次二等兩次二等準作一次一等積至三次一等者咨吏部授爵以上超登敵舟殺賊獲衆戰功視舟之等次遞減一等準其積算如超登一等舟之第三人後得二等舟二等功牌或得三等舟一等功牌或得常舟兩次一等功牌均咨吏部授爵餘準此若追獲空舟小舟及敗走之舟者不在給賞授官之例統兵將帥不將先登情由及所獲舟數分别等次者止照常舟例給賞在舟督戰官照第二人例餘官照第三人例護軍校驍騎校等照第四人例均按舟論功又議準出征護軍校驍騎校及署護軍校署驍騎校有一等軍功四次復有二等三等四五等功牌授以世爵不足者注册陳亡者給一雲騎尉又題準出征護軍校驍騎校員闕委署者委署官立功後即照護軍校驍騎校議敘額外委署者不準康熙十二年覆準招撫兵千名以上舟三十隻以上者為五等軍功兵千五百舟四十以上者為四等軍功兵二千舟五十以上者為三等軍功兵二千五百舟六十以上者為二等軍功兵三千舟七十以上者為一等軍功兵三千五百舟八十以上及招撫僞王竊據之府城者均臨時酌量從優議敘招撫府城為一等軍功州城為二等縣城為三等衛所城為四等有名寨崖為五等參贊之都統護軍統領副都統分發將領與將領下遣去頭領及與事各官均準議敘不與事者不準十三年題準八旗兵丁奴僕得過一等功牌三次者準其開户十九年奉㫖八旗從征奴僕得一等功牌二次者準其開户二十二年議準官兵攻城對陳若於敵人未動之先被傷退回及敵人既敗不行追擊者均不準請功三十五年諭八旗官兵之家下兵丁及從役人等有能踰營進擊者作何給還本主身價令其出户以示鼓勵著集議具奏欽此遵㫖議準官兵家下兵丁及隨役內或於鹿角營或於檔木營或於列陳對敵之地有能奮勇前驅衆人隨後殺敵追逐者將奮勇前驅之家下兵丁隨役本身及其父母妻子均著出佐領為正户仍照例按人口償給伊主身價雍正元年議準八旗武職立功身故者無論功績大小官員給七品監生一人護軍校驍騎校給八品監生一人均於子弟內充補至病故兵丁及委署官護軍校驍騎校等各給祭奠銀二十兩再折給功牌銀五十兩永為定例四年覆準隨從王等出征護衛各官果有奮勇爭先不顧身命者令統兵大臣列敘功績分别等第造册報部照出征衝鋒官一例議敘十年奏準凡軍功人員議敘之時該將軍等所送戰功等第原册由部核實如立有一次戰功者即豫一次功牌有數次戰功者即豫數次功牌十一年奉㫖前年令八旗選户下兵丁出征時朕曽降㫖特沛恩膏俟成功回日將伊等妻子均於其主家中開出作為正户其各路出征人等內有開户分出領催驍騎久住軍前著有勤勞甚屬可憫著交各路將軍大臣等將此等開户領催驍騎內如有效力出衆者令各該大臣將姓名注册俟大兵凱旋之日將伊等户下兵丁作為正户乾隆二年奉㫖開户兵丁在軍營效力列在一等二等者均準作為正户又奉㫖八旗家下驍騎及家人抱養之子既在軍營效力多年著加恩照開户兵丁例均準作為正户四年奏準八旗武職立功病故所給監生應按其立功之等第以定監生之品級嗣後出征立功未經議敘身故者統兵將帥將該員立功大小分别等第造册送部繫一等二等軍功給該員子弟一人監生食七品官俸三等四等軍功給該員子弟一人監生食八品官俸準其隨旗行走遇有應升之處仍照例簡選繫五等軍功給該員子弟一人監生照捐納監生例準其應試七年奏準