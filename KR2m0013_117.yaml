又奏準每年春秋二季由部傳行八旗合操四次內春季甲胄操演一次其兵數及選擇地方操演之處交與八旗都統前鋒護軍火器營各統領臨期請㫖遵照辦理四年奏準每年春季將本旗各營官兵合於一處各於本旗教場操演二次八旗各營官兵於鑲黃正黃二旗教場合操一次至秋季仰善窪操演奏明日期將八旗各營官兵會於一處合操二次其隊伍號令官兵數目均如大閲之制五年諭八旗兵丁赴蘆溝橋演放槍炮定例三年一次於九月內舉行兵丁人等雖豫領有本月分錢糧但家中養贍與在橋日費不能兼顧未免拮据今屆操演之期朕心軫念著賞給一月飯銀以示優恤再應用帳房亦著赴工部關領俾營制齊一以肅觀瞻仍交該管官於完操之日按數繳部嗣後三年一次赴蘆溝橋操演均照此例行欽此六年議準八旗驍騎營每年春秋二季擐甲步射二次由旗定期報部騎射二次由部定期通行十七年諭近聞八旗於閲兵操演之際該大臣等皆在帳幕內互相對閲並不親赴隊伍操演則進退之規不獲嫻熟嗣後閲兵操演之時令該大臣等輪流入隊率領操演欽此遵㫖議準八旗合操時閲兵王大臣等逐次前往監看稽察如有無故不到者閲兵王大臣等指名題參議處二十二年奏準八旗漢軍向例三年一次運炮赴蘆溝橋演放一月三年之內炮手新舊更換未免斷續疏懈嗣後照滿洲火器營例每年秋季運炮赴蘆溝橋演放十日奏請簡委都統副都統二人前往統轄至鳥槍按季操演皆能練習毋庸每年同往演放應於演炮之第三年秋季槍炮同赴蘆溝橋演放十日仍照例奏請簡委都統副都統四人前往統轄兵部堂官於演放之第八九日前往察閲分别優劣具奏其餘均照舊例行一八旗駐防官兵操演順治年間定較閲騎射春秋合操均與京師同又定各省八旗水師營每年春秋二季將軍都統副都統等督率官兵分駕戰艦操演金州福建乍浦廣東出海口操演黑龍江齊齊哈爾默爾根江寧出江操演天津水師營每年四月起八月止出海操演均擇天氣晴和潮平風順時官兵乘戰艦出洋列陳張帆起碇掌號發炮以次操練停操之後各督率官兵講習水務一直省簡閲營伍順治十一年題準營兵每年給與操賞銀定期演習騎射優者該督撫提鎮酌量奬賞又題準武職官並不操演或傲慢怠惰託病規避擅離汛地以致廢弛營伍者革職兼轄統轄官不參劾者照不揭報劣員例分别議處又議準營汛官辨操演巡防各有職守若該管上司擅行差遣者罰俸一年被差遣之官免議至城守官辨因公出境將城守事務交與不應管之人者罰俸一年如上司將城守官辨盡行傳去以致巡防虛空者罰俸一年康熙五十二年欽命大臣分往各直省賞賚營兵仍會同該督撫提鎮操演騎射以數軍實雍正十一年諭各省營伍必須武職大員平日親行巡察庶可以除怠惰廢弛之弊提督一官節制全省統轄之地甚廣難以親身遍歷至於總兵官分轄地方道里不甚遼濶巡察尚易周遍嗣後各鎮臣有應行巡察者著先期奏聞請㫖候朕批示遵行不必拘定限期免各營豫備供應致滋擾纍倘有苛纍所屬辨兵者經朕察出定行從重議處欽此又議準各省總兵官巡察所屬營汛於親標兵內跟隨一二十名自帶帳房羅鍋下營駐劄若絲毫苛纍辨兵及收受各營供應並擅役民夫照因公科斂例議處該督提不能察出照不揭報劣員例議處如跟隨兵丁騷擾地方不能覺察者照失察營兵生事擾民例議處其各營汛騎射是否優嫻軍裝器械是否整齊具結詳送該督提核明報部若有不實者照察報不實例議處乾隆元年奉㫖各省營伍離提鎮遼遠不能親身稽察該督撫酌量地方營制如何令提鎮等隔數年一次親身察閲詳議具奏遵㫖議準直隸提督營汛分為三路每年閲一路馬蘭宣化正定三鎮營汛每年各閲一次泰寧天津二鎮營汛二年各閲一次山東袞州鎮營汛每年於催漕事竣閲臨清等處其沂州等處委官往閲二年通閲一次登州鎮營汛一年閲東南各處其西南各處委官往閲一年閲西南各處其東南各處委官往閲二年通閲一次山西太原大同二鎮營汛每年各閲一次河南南陽河北二鎮營汛每年各閲一次江南蘇松鎮所屬營汛繫駐劄同城無庸察閲提督一年閲一次狼山壽春二鎮營汛每年各閲一次江西南昌南贑二鎮營汛每年各閲一半以二年而遍福建總督到任後閲一次水師提督一年閲海壇閩安烽火門等處一年閲金門南澳銅山等處以二年而遍陸路提督一年閲興化福州福寧建寧延平等處一年閲泉州漳州龍巖汀州邵武永春等處以二年而遍海壇金門南澳臺灣四鎮水師營汛每年閲一次福寧汀州建寧漳州四鎮陸路營汛每年閲一次浙江提督每三年閲一次定海黃巖溫州三鎮營汛每年閲一次衢州處州二鎮營汛每年閲二次湖廣總督到任後閲一次提督每年巡閲一次湖北湖南以三年而遍襄陽宜昌永州鎮筸四鎮營汛每年各閲一次陜西總督五年閲一次提督三年閲一次延綏興漢河州凉州寧夏西寧肅州七鎮營汛每年各閲一次四川川北重慶建昌松潘四鎮營汛每三年各閲一次廣東左翼右翼高州瓊州碣石潮州南澳七鎮營汛每年各閲一次廣西提督三年閲一次左江右江二鎮營汛每年各閲一次雲南貴州提鎮所屬營汛酌量數年內閲一次各將出巡回任日期及各營汛官兵技藝是否純熟軍裝器械是否齊全具本題報又議準各省營汛屬總兵官所轄者該總兵官親身察閲專屬提督所轄者該提督親身察閲至於提鎮駐劄窵遠不能親身往閲者委附近之副參游等官察閲詳報如有苛纍及閲報不實一例議處六年諭武備所關緊要外省營伍整飭者少廢弛者多嗣後各督撫提鎮等當盡職守以勵戎行如一二年後朕命公正大臣前往驗其優劣如騎射果否嫻熟軍容果否改觀皆顯而易見難於掩藏者倘仍前廢弛朕必將該管大員嚴加處分欽此九年具奏國家武備不可廢弛應遣大臣前往近省察閲其邊遠省分或即於駐防將軍副都統內命往察閲如有將辨貪縱不法兵丁闕額不補技藝生疏器械朽鈍者即據實參奏奉㫖直隸山東武備尚屬整飭先命大臣由河南一路稽察上下江一帶餘省候㫖又奏準欽差大臣察閲營伍其器械之堅脆技勇之生熟人數之虛實糧馬之虧盈自難掩蓋惟是旗帳甲胄弓刀馬匹等項修整買補勢所不免不肖官辨或乘此藉端科斂或坐扣營兵月糧皆未可定應飭各督撫提鎮等嚴行稽察如有前項情弊立即參劾倘容隱徇庇一并嚴加議處又諭國家承平日久各省營伍日就廢弛朕早已知之今各處情形大槩甲仗旗幟尚屬鮮明而鳥槍騎射各種技藝則皆屬平常該管大員平日所司何事而輕視武備若此乎該將軍督撫提鎮等各宜痛改舊習勤加訓練俾士皆精鋭戎行改觀務期平時可資捍衛有事可以折衝禦侮孔子曰不戒視成謂之暴今朕與以三年之限著兵部請㫖遠省地方亦必差官察閲其就近省分已經閲過者有無整頓亦必再行考驗該管大員等皆朕信任之人於職分所在未能辦理以致營伍廢弛負朕委任之意豈不可愧此次命往察閲及將來所遣之人皆朕親信簡用者自必據實陳奏斷不肯代為容隱倘此番訓諭之後尚不自勉仍復因循怠忽視為具文或經朕訪聞或被欽差察出則曠職之咎不能為該大員等寬也欽此十年諭國家設立營伍修明武備以為折衝禦侮之用必訓練精熟於平日斯可奮勇决勝於臨時是以陸路設營汛沿海設水師皆須勤演習收實效者自去年朕命大臣察閲營伍後陸路該管大員頗有竭力整頓氣象而水師操演則不過將演就陳法塞責了事其操舟破浪之法官辨兵丁茫然不知以為此水手之事漫不留意即至舵工水手其能熟練者亦屬寥寥平日操演之時各船進退尚且參差往來間斷苟其臨敵何以致用夫水師以舟為主出沒風濤去來倐忽必掌舵者能操縱自如而搶風折破浪衝波水手等盡能嫻習即官辨兵丁等亦皆心領神會不待呼應而自靈然後猝然遇敵駕駛輕捷一舟之中臂指相使如一人之身則應變制勝無難向來水師官辨仍以水師用原欲其熟悉情形收得人之效今則視為故套該管者不加察徼幸者苟延玩是育材之善政為容身之捷徑矣著通行申飭沿海將軍督撫都統提鎮等務遵朕㫖實心訓練實心甄别毋得仍前玩忽虛應故事欽此十一年諭國家設立營制所以嚴拱衛而固苞桑務在選精鋭以儲干城勤訓練以資捍禦所謂兵可百年不用不可一日無備也從前因各標營日漸廢弛朕命大臣前往山東河南江南等省先行閲看並降㫖申飭復於督撫提鎮奏摺中時加批諭令其實力整頓今各省操演之法大抵旗纛戈甲期以飾觀步伐陳圖似為練習其實在技勇精强弓馬嫻熟者甚少在水師營汛亦不過演就水陳聊以塞責而已即軍政薦舉未能盡屬公當徒為具文以是整飭戎行豈能使壁壘一新士氣日奮即如西北稱徑旅而江浙多柔脆不知既已為兵自應鼓其鋭氣使弱者日近於强豈可任其委靡不加振作蓋營伍之中兵馬錢糧甲胄器械皆宜事事留心向來虛冒兵糧私扣朋馬夤緣拔補那借軍裝等弊猶未盡除而教訓演習惟事粉飾因循怠忽尚沿舊習殊非設兵衛民之意是必立定年限專差大臣閲看庶將辨知有責成不敢怠廢而各兵亦知有考驗時時警惕技藝不致生疏於戎行自有裨益朕前㫖與以三年之限著兵部請㫖並未定有分省察閲之年分今已閲之省則已過二年其餘則未命前往也其如何分年分省差大臣往閲著該部定議俟臨時酌量或自京命大臣前往或即命本省督撫察閲欽此遵㫖議準自乾隆十二年為始閲直隸山西陜西甘肅四川五省十三年閲湖北湖南雲南貴州四省十四年閲福建浙江廣東廣西四省十五年閲山東河南江南江西四省以上分年察閲周而復始但每年應閲之處定以四五省其間地方遙遠營汛遼濶若止欽命大臣一人勢難周遍至甘肅一省地處極邊安西提標駐防塞外若令察閲川陜之大臣並閲則幅􅊷廣遠難周請於應閲直隸等省之年直隸山西差往一人陜西四川一人甘肅一人應閲湖北等省之年湖北湖南差往一人雲南貴州一人應閲福建等省之年福建浙江差往一人廣東廣西一人應閲山東等省之年山東河南差往一人江南江西一人由部於每年開印後將應閲之省具奏請㫖並將領侍衛內大臣滿大學士都統尚書侍郎各職名開列進呈或欽㸃大臣前往或即令該省督撫就近察閲恭候欽定再向來各省督撫提鎮原有分年察閲營伍之例嗣後各該省如遇欽差大臣察閲之年該省督撫提鎮停其察閲各省將軍督撫提鎮務期加意整飭毋事虛文陸路不徒以甲胄鮮明飾觀水師不徒以演就陳圖塞責兵糧朋馬無許虛冒浮開那移掩飾至軍政薦舉尤關巨典更當慎重遴選以收干城之用如有因循舊習一經欽差大臣指參照例嚴加議處又議準營伍技藝生疏器械闕少經督提鎮將該管官以廢弛營伍題參者於題參本內將該將備何年月日到任及該處營伍向來情形據實聲明如任事已滿一年者仍照例革職若在半年以上者革職留任三月以上者降四級留任三月以下者暫免議處令加意整頓以觀後效十二年諭國家承平日久各省武備恐致廢弛屢經降㫖訓飭未見實力整頓是以上年特令兵部定議分年分省請㫖差大臣前往察閲嗣經該部分别議定近聞各省知有察閲之舉無一事不加緊豫備即如操演兵丁應於常時按期練習使各兵技藝嫻熟今則責效於倉卒略無休息不但非愛養士卒之道於此愈見其平日之廢弛矣又如旗幟甲仗號衣等類以分隊伍以壯軍威原繫營制所必需向來動支公項製辦自當按數貯營以備操演之用今則於察閲之時始行修整豫備甚至兵丁衣服等項亦必欲一色鮮明令其勉力措置此皆徒務外觀不求實際比比皆然是營將不以本務為事惟留心於末節其有項可支者既致虛縻無項可動者勢必有坐扣滋擾等弊在將辨不知大體止圖掩飾於目前而該管大員又以為如此豫備可以了此番之看驗而不顧貽纍兵丁於日後豈朕振勵戎行體恤士卒之本意乎且定議欽差大臣察閲亦以驗其技勇之生熟兵數之虛實糧馬之盈虧以覘該督撫提鎮平時訓練整飭之實政非止於旗幟甲仗衣服之間取其美觀而已也况輪年應閲省分或由京差大臣前往或令該省督撫察閲抑或不必察閲總在臨期裁奪各該管督撫提鎮當善體朕意統率屬員從容整飭為之以漸而要之以久不當若此急遽粉飾務末而忘其本是不但無益於營伍且有纍於兵丁也著通行曉諭各省督撫提鎮等仰體朕心恪遵朕訓將向來積弊悉加祛除則訓練有實效考驗非具文戎政可望煥然改觀矣欽此十六年奉㫖直省營伍操演武藝不過拘泥成法於安營住宿之道馳騁奔走之勞無從肄習於行陳未有實濟惟行圍可使將辨士卒練習勤勞著通行直省提鎮每歲冬季輪選標兵親身督率實力舉行務使嫻熟嚴整以裨實用但既令出圍仍復按期操演兵丁未免過勞著於行圍之時酌量停止操演日期以示體恤並嚴加約束不得蹂踐田園占宿廬舍致滋騷擾一墩臺營房國初定邊境設立墩臺營房以司偵瞭遇有緊急舉煙為號寇至百人者挂席一領放炮一聲至三百人者挂席二領放炮二聲至五百人者挂席三領放炮三聲至千人者挂席五領放炮五聲至萬餘人者挂席七領連放炮聲接遞傳報康熙七年題準各省孔道均設墩臺營房撥兵看守如有緊急軍機接遞傳報雍正十二年議準墩臺營房該管官會同地方文職按汛地建造嚴飭汛兵加謹保護如遇殘闕坍損亦㑹同文職修理若該管官疏縱致令汛兵作踐拆毁者降一級調用仍著落賠補兵丁責革兼轄官不揭報者罰俸一年至該管官離任時將墩臺營房與接任官交代取結詳報存案倘在任之日不㑹同文職修理經接任官詳揭者將該管官降一級調用仍著落賠修若該管官無力即著落平日不稽察之兼轄官分賠接任官濫行出結亦著落賠修或墩臺營房並無闕損接任官故意勒索照交代勒索例議處乾隆二年議準墩臺營房如遇殘闕坍損該管官移㑹文職按照地方衝僻次第修理如遲延不報照遲延例議處三年奉㫖各省水陸孔道之旁設立墩臺駐宿兵丁所以護衛行人稽察匪類朕聞外省情形種種不一其間兵卒成行器械成列於行李往來之時留心防護者有之防汛止二三人而不成行列器械不整者有之營房雖設而閴其無人一任偷竊潛行漫無知覺者亦有之大抵與督撫提鎮等駐劄大營相近者尚覺整齊其遠者即多廢弛夫防汛兵丁既無差操之勞專司稽察之事而乃怠惰縱逸至此則國家設立汛兵之意安在皆該管官辨約束不嚴董率不力有以致之其如何增設懲警之法令督撫提鎮等轉飭所屬將辨實心奉行俾各勤於職業不似從前之耽逸偷安任意曠誤著兵部定議具奏遵㫖議準各省督撫提鎮將所屬地方詳細籌畫除汛兵已經足額者毋庸再行撥補外其有汛兵闕少之處各按地方衝僻情形悉心酌定即行撥補撥補之後不許闕額所有器械務須整齊仍令該管官不時察驗倘有離汛偷安曠誤汛防者將兵丁責革别補該管官稽察不力者照約束不嚴例議處欽定大清會典則例卷一百十三
