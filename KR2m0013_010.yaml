body:
  text: 吏部文選清吏司遴選一旗員遴選一國子監司業雍正六年奏準滿司業員闕傳齊應升各官交九卿遴選四五人由部引見恭候簡用七年議準蒙古司業員闕由部傳齊各部院蒙古郎中員外郎會同理藩院遴選能翻譯蒙古文藝通曉清文蒙古字語者四五人由部引見恭候簡用一科道雍正五年遵旨議準稽察宗人府御史二人由宗人府於宗室內簡選引見補授仍屬都察院統轄十二年議準滿給事中員闕由部行文都察院咨取見任宗室滿洲蒙古監察御史通行引見轉補再蒙古御史額設二員若蒙古御史每遇轉科時將所遺御史之闕歸於滿洲升補俟蒙古給事中員闕如將滿洲御史轉補即以所出滿洲御史之闕歸於蒙古升補仍統計蒙古科道二員十三年議準滿洲蒙古御史員闕行文各部令該堂官於郎中員外郎等官內保送引見候旨簡用乾隆三年奏準將應行考選之各部院郎中員外郎通行引見其奉旨記名者遇有御史員闕將奉旨記名之郎中員外郎各論俸次郎中二人員外郎一人引見補授八年覆準宗室御史遇滿洲御史內升時凖其一同開列各科給事中員闕亦準其與滿洲御史通行引見如將宗室御史轉補科員所遺宗室御史員闕自應别行補授但宗室御史原奉特旨設立二人令其専察宗人府事件既不便額外增設又不便令滿洲御史稽察請嗣後如宗室御史轉補科員後所遺宗室員闕將滿洲人員補授其稽察宗人府事件即令轉補之宗室科員與見任宗室御史一同稽察至宗室科員升轉滿御史轉補之後再將宗室御史員闕照例補授十三年奏準以御史用之滿漢人員按記名之先後俟前次用完再將後次記名之人引見一戶部庫官調補乾隆三年奏凖戶部三庫郎中員外郎員闕由該堂官行文各部院於郎中員外郎內遴選潔己奉公辦事勤愼之人保送該庫堂官引見調補三年期滿照例更代五年奏準戶部三庫年滿官員即以各衙門調補所遺之闕轉補其有品級不相當者以原銜暫行轉補俟在京有對品員闕不論雙單月由部即行具題坐補將所遺之闕再行開選九年奏凖三庫掌籍主事一人三年期滿應照郎中貟外郎之例於各部院滿主事內遴選調補仍於三年期滿照例更代又奏凖司庫職司出納稽核盤驗大使亦有監收錢糧呈報批文之責請均一例令三年更代三庫司庫等五人於各部院衙門正七品從七品小京官遴選保送調補俟調庫後各準其仍以原銜辦理司庫事務其由三庫更代之司庫等亦各以原銜辦理所代官員事務均令仍食各本身原俸統俟有闕時由部各按闕底銓選三庫大使四員於各部院衙門見任滿洲筆帖式內遴選更代遇員闕行文各部院衙門各保送一人由該庫堂官每一闕遴選二人引見調補其各部院衙門調補之筆帖式準其以筆帖式辦理大使事務由三庫更代之大使等亦各以原銜在所代筆帖式上行走均令仍食各本身原俸統俟有闕時由部仍各按闕底按旗補用十四年奏準三庫員外郎員闕內閣侍讀亦準一同遴選引見如蒙恩準調補三庫即將該員授為員外郎其更代之員外郎交部即用一工部庫官調補康熙十年題準工部節慎庫郎中員外郎員闕由工部郎中員外郎選擇調補製造庫員外郎員闕由部照例升選乾隆十八年諭工部製造庫郎中員闕緊要向例由吏部將六部俸深郎中擬定正陪引見多繫年老平常之員往往不得其人嗣後遇有員闕著工部堂官於本部司官內遴選保題引見補用欽此一步軍統領衙門員外郎等官雍正十三年奏準步軍統領衙門員外郎員闕各部院將主事等官保送該衙門遴選通曉清漢文移熟悉刑名者補授主事員闕即於該衙門司務筆帖式內遴選補授均由該統領引見司務員闕由該統領於筆帖式內遴選咨部題補一各部院堂主事康熙十五年題凖起居注衙門滿堂主事六部理藩院漢軍堂主事員闕令各部院衙門將熟習翻譯之應升主事人員出具考語保送過部會同本部堂官遴選正陪由部引見補授雍正十二年奏準漢軍堂主事員闕遴選補授五人後將翻譯舉人出身之漢軍中書筆帖式論俸擬正陪升用一人一內閣侍讀康熙十六年題準滿洲蒙古漢軍侍讀員闕由內閣於中書內每闕遴選二人擬定正陪出具考語咨部引見補授一內閣中書雍正三年覆準滿中書員闕由內閣於貼寫中書內按旗每闕遴選二人擬定正陪咨部引見補授乾隆五年議準貼寫中書補用五人外遇有宜用各項舉人出身之筆帖式應令內閣會同本部將此項人員與貼寫中書一同考試翻譯擇其佳者引見補授十三年奏準滿洲中書共七十人酌定每旗各七人共五十六人其餘十四人定為八旗公額旗額於貼寫中書內按旗選補公額定為文舉人翻譯舉人出身之筆帖式與貼寫中書分班間用十五年奏準嗣後八旗額設滿中書五十六人歸貼寫中書按旗分遴選擬定正陪引見補授外其餘公額滿本房七人漢本房七人共十四人改為考取班次挨旗輪補俟有員闕行文該旗將間散文舉人翻譯舉人咨部移送內閣與該旗貼寫中書會同考試每闕考取二人擬定正陪引見補授一蒙古中書乾隆五年議凖遇員闕由部將應用之見任蒙古筆帖式並文舉人翻譯舉人出身之筆帖式及間散之文舉人翻譯舉人不論旗分一同移送內閣考試翻譯擬定正陪引見補授補用五人後將降調人員免其考試補用一人如降至從六品者以原銜借補中書仍支原俸升轉其由理藩院等衙門筆帖式考取者以理藩院等衙門升用由本部等衙門筆帖式考取者以六部等衙門升用再唐古忒中書員闕由唐古忒學出身之筆帖式升用九年議準內閣新設蒙古貼寫中書六人應照滿洲貼寫中書之例分班間用嗣後遇有蒙古中書員闕先將蒙古貼寫中書論俸擬用一人次將蒙古各項人員考補一人均分班間用一漢軍中書乾隆五年議準遇有員闕由部將應用之見任漢軍筆帖式並翻譯舉人出身之筆帖式及間散翻譯舉人不論旗分一同移咨內閣遴選考試擬定正陪引見補授十四年議準漢軍間散翻譯進士如有情願考試中書者亦照翻譯舉人之例一同考試一掌關防郎中乾隆元年奏準孝陵奉祀掌關防郎中員闕由部行文各部院於郎中內將老成謹愼之人各遴選一人出具考語保送過部與陵寢各郎中一同較俸擬定正陪引見恭候欽定一盛京三陵掌關防等官乾隆十九年覆準三陵掌關防官員闕將三陵尚茶正尚膳正內管領一并遴選題補三陵尚茶正尚膳正內管領員闕將三陵副管領一并遴選題補至副管領員闕於本陵尚茶尚膳香鐙執事人內遴選題補一理藩院主事康熙十五年題準理藩院滿洲蒙古堂主事員闕由理藩院將應升之小京官筆帖式等每闕遴選二人擬定正陪出具考語咨部引見補授一領侍衛府主事康熙二十七年覆準遇有員闕由該府將應升人員擬定正陪引見補授一京學教授訓導雍正四年奏準增設順天府滿教授一人由進士舉人補用訓導一人由貢生補授均赴禮部具呈考取正陪送部引見補授乾隆十一年議準滿教授訓導六年俸滿經府尹學政等保題引見奉旨準其應升者將該員應升之處注册以奉旨之日起不論雙單月保題升選一并計算五人之後選用一國子監滿助教雍正三年議凖遇有員闕由國子監將應升應用人員傳齊考試送部列名引見補授十三年奉旨助教一官專司訓迪必得老成謹愼之人方為有益嗣後年少者皆不準考試一國子監蒙古助教雍正二年議準於理藩院及修書處筆帖式國子監間散巴克什內令該監會同理藩院遴選滿洲蒙古字語好者擬定正陪引見補授一唐古忒學蒙古助教一員乾隆五年議準由理藩院於應用人員內考選唐古忒字語好者擬定正陪引見補授與理藩院衙門出身之人一同論俸以理藩院應用之職升用一咸安宫教習乾隆五年議準咸安宫教習三人由禮部將翻譯進士考取挨次充補其有見任筆帖式者令其仍食原俸其由間散進士者月給三兩錢糧三年期滿該管官分别等第引見録用九年議凖翻譯進士乏人請於翻譯舉人內考取間用其三年期滿引見以主事小京官用者入於單月議敘班內與各項議敘人員較日期先後補用以筆帖式用者入於本旗議敘班內與各項議敘人員較日期先後補用一盛京禮部助教乾隆八年議準盛京禮部助教四人均歸本處人員考試補授遇員闕盛京禮部會同盛京兵部於盛京各部等處筆帖式及舉人貢生副榜考試咨部引見補授一寧古塔助教雍正二年議準寧古塔助教二員由該將軍於本處八九品及未入流筆帖式內擬定正陪咨部引見補授六年任滿該將軍出具考語具題到部由八品筆帖式補授者以京城主事等官用由九品筆帖式補授者以京城正從七品小京官用均歸於雙月推升五人之後與盛京等處倉官較年滿文書到部先後升用一人一司庫遴選乾隆五年奏準理藩院太常寺司庫員闕令各部院衙門各遴選俸深筆帖式一人出具考語保送過部由部再行遴選每一闕以二三人引見恭候欽定一贊禮郎等官乾隆二年議準太常寺暨陵寢讀祝官贊禮郎鴻臚寺鳴贊員闕由八旗驍騎校護軍校護軍各部院筆帖式庫使及舉人副榜貢生令該寺堂官遴選聲音宏亮唱贊好者引見補授由護軍校驍騎校補授者仍授為六品由筆帖式等補授者均授為七品均準用六品頂帶乾隆二十年奉旨嗣後簡選贊禮郎著將東三省之新滿洲烏喇齊一并簡選欽此二十一年奏準嗣後贊禮郎員闕無論文武官員兵丁執事人生員官學生均準其簡選引見補授如繫文武官員仍令於原任行走一盛京禮部讀祝官贊禮郎雍正三年題準由部選取應用人員咨送太常寺與在京應升人員一同唱贊遴選好者引見補授一寶泉寶源二局大使雍正七年奏準戶部寶泉局大使由戶部堂官於該部筆帖式內遴選補授工部寶源局大使由工部會同戶部於工部筆帖式內遴選補授均咨部注册五年期滿保題咨部升用一盛京三部司庫乾隆三年議準盛京戶部刑部工部司庫員闕由在京部院衙門各遴選筆帖式一人保送過部論俸擬定正陪引見補授各三年任滿堂官核明該員任內經手錢糧出具考語咨部以在京司庫並司庫對品小京官員闕調補如三年任內遇有應升時以升銜留任仍以升銜較俸升轉所遺司庫員闕别行遴選一刑部司獄乾隆六年議準刑部司獄四人由該部堂官於該部筆帖式遴選補授其筆帖式員闕不必開選移咨到部注册三年期滿仍令回筆帖式原任保送過部候升一刑部提牢官雍正十一年議準刑部提牢官由該部堂官於額外及試俸主事內選委管理一年果能稽察防範勤敏無過俟期滿後該堂官出具考語咨送到部額外者題請實授試俸者準作實俸一內務府官乾隆元年議準遇有員闕仍由內務府將應升人員擬定正陪引見補授其堂郎中一人總理六庫郎中二人補授後咨送過部於應升之處一例列名升用一欽天監官康熙二十年題準滿洲五官正以下漢軍秋官正以下均由欽天監將應升人員擬定正陪出具考語咨部引見補授雍正十二年奉旨嗣後欽天監升用人員擬正者照常論俸擬陪者於各員內遴選一并引見不必論俸一考選蒙古五官正雍正六年議準欽天監蒙古五官正員闕由理藩院於內閣中書各衙門筆帖式考選擬定正陪送部引見補授由理藩院等衙門出身者以理藩院應升之官升用由六部出身者以六部應升之官升用一太僕寺主簿雍正二年奏準由該衙門筆帖式內遴選正陪出具考語咨部引見補授一王府官員闕順治初年定由該王府咨送補授注册一五旗司弓員闕順治初年定由該旗咨送補授注册一盛京刑部蒙古主事員闕乾隆十四年奏準由各部院蒙古小京官筆帖式內遴選能辦事者引見授為主事銜三年無過該部保題到部凖其實授三年期滿凖其調補在京各部院主事一盛京將軍等衙門主事乾隆二年議準盛京將軍衙門掌案主事一員照盛京五部主事例升轉吉林將軍衙門掌案主事一員吉林將軍衙門理刑司主事一員由在京六部堂官各遴選筆帖式一人保送過部引見補授均不準調補京職其黑龍江將軍衙門掌案主事一人由該將軍將本處應升人員擬定正陪咨部引見補授三年議準黑龍江將軍衙門增設理刑司主事一人銀庫主事一人其員闕亦照吉林主事之例於六部筆帖式內遴選保送引見候旨補用十六年奏準盛京將軍衙門主事止有一員應歸於本處小京官內較俸升用一管理八旗遊牧察哈爾員外郎升轉雍正十一年議準由京補授之八旗遊牧員外郎每旗二人共十六人由京補授八人由該總管補授八人員闕交與理藩院於部院本旗蒙古主事小京官中書筆帖式內遴選滿洲蒙古文理好能辦事者咨部引見補授由主事補授者即授為員外郎各論俸升轉由小京官中書筆帖式補授者授為主事由本處總管補授之八旗遊牧員外郎員闕令該總管於本處散秩官筆帖式及驍騎校護軍校內遴選人去得者保送理藩院引見補授如保送之人平常將京城本旗通曉滿洲蒙古字語之護軍校驍騎校護軍內遴選辦事去得者亦由理藩院引見補授均於本處以佐領升轉不準調京乾隆二年議準由京補授遊牧員外郎八人其由小京官中書筆帖式授為主事者三年無過該總管保題實授員外郎在員外郎任五年期滿令該總管出具考語咨部注册其由六部出身之人仍俟六部蒙古員外郎員闕無論保題升選補用二人後將年滿遊牧員外郎論俸咨取一人調補由理藩院等衙門出身之人亦俟理藩院等衙門蒙古員外郎員闕無論保題升選補用二人後將年滿遊牧員外郎論俸咨取一人調補如五年內遇有應升以升銜留任仍以升銜較俸升轉一驛站監督雍正十二年議準盛京五路驛站正副監督各一員由盛京五部堂官於郎中員外郎主事內公同遴選人明白能管理者各一人出具考語題請實授管理三年令盛京戶部兵部會同稽察驛站副都統察該員果能整飭驛務錢糧不致浮冒保題到日由兵部移送到部照例議敘如有浮冒錢糧廢弛驛務等事題參治罪乾隆四年奏準驛站正副監督二人請照關口官之例三年內如遇論俸應升時以升銜留任仍以升銜較俸升轉一調補驛站官乾隆三年奏準張家口喜峯口獨石口殺虎口古北口管站員外郎員闕由理藩院於該院員外郎內遴選引見差往管理三年期滿照例更代所遺更代員闕不行開選即將換回之人頂補一驛站官乾隆四年議準寧古塔驛站官二員由該將軍於本處倉官筆帖式內每一闕遴選二人擬定正陪出具考語咨部引見由倉官八品筆帖式補授者授為七品由未入流筆帖式補授者授為八品六年任滿該將軍出具考語咨部注册七品官以京城主事等員闕升選八人後升用一人八品官以京城正從七品小京官員闕升選六人後升用一人至黑龍江驛站官員闕由該將軍於本處應升之官遴選正陪咨部引見補授一邊地同知通判雍正十一年奏準理事同知有管理民人辦理刑名之責必得通曉漢文律例之人方能勝任應令各部理藩院將滿洲蒙古員外郎主事內通曉漢文人明白者遴選引見補授乾隆四年議準各部院衙門遇有保送理事同知通判之時將京察一等合例人員內保送倘此等人員內如有服制未滿見患疾病及實有不能離京情節並通曉部務而不宜於外任者均令該堂官將不便保送情由逐一聲明過部别行遴選合例人員保送五年議準各邊地理事同知員闕除員外郎不行補用外由部行文內閣並部院衙門於滿洲蒙古內京察一等之主事小京官筆帖式遴選通漢文曉蒙古語賢能之人保送過部會同理藩院並各部院遴選考試漢文及蒙古字語務期循名責實分别去取引見補授其邊地理事通判員闕除主事不行升用外止將小京官筆帖式一例考試注册補用一威逺堡等關口守口官雍正十一年議準威逺堡等六關口各設守口官一人盛京兵部會同盛京將軍於五部員外郎主事小京官內每一闕遴選二人擬定正陪咨部引見補授二年期滿仍令盛京兵部會同盛京將軍察明該員果能黽勉效力者保題到日由部按該員原銜議敘如尋常供職者即咨回部以應得之官補用如有怠忽廢弛等事即行題參若二年內遇有應升以升銜留任即以升銜較俸乾隆八年議準六關口守口官以原銜管理關口事務其本任員闕毋庸别行開選二年期滿各回原任其有黽勉效力保題議敘者仍照舊例保題議敘如繫在京人員補授者年滿之日仍照舊例調補京官其未經調補之先業經任滿者仍回原衙門辦事遇有在京員闕由部照例調補一盛京銀庫監督雍正元年議準盛京戶部銀庫掌關防監督一員由在京部院堂官遴選郎中出具考語咨部引見恭候欽點管理三年期滿更代一盛京銀庫員外郎乾隆三年議準盛京戶部銀庫增設員外郎一人於該部司分員外郎內遴選一人管理庫務三年期滿照例調京仍於司分員外郎內遴選調補所遺司分員外郎闕再行咨部銓補一守衛壇廟官順治初年定凡守衛天壇地壇社稷壇太廟堂子皇史宬官並朝鮮通事員闕由禮部及該旗開送正陪移咨過部五品以上引見補授六品以下本部堂官驗看補授一盛京工部司匠康熙二年題準司匠員闕由盛京五部暨在京各部院衙門九品筆帖式令堂官各遴選一人保送過部列名引見補授如有奉旨記名者由部注册知照該部遇司匠闕挨次補授一奉天等處倉官原例奉天黑龍江寧古塔等處各倉倉官員闕由將軍副都統五部堂官於各本處八九品未入流筆帖式內每一闕遴選二人擬定正陪出具考語咨部引見補授乾隆五年議準黑龍江等處倉官伊等均繫本處生長之人其有無力般移不能來京情願守候本處武職員闕者與豫行保舉之領催等一并咨送兵部引見俟奉旨記名後遇本處驍騎校員闕令該將軍酌量與記名之領催一并升補八年議準由筆帖式遴選補授倉官其筆帖式原闕不必開選三年任滿如居官好堂官保題到部歸於單月遇有本處應升之主事將本處人員升用三人後升用一人其筆帖式原闕即行開選若繫尋常之人出具考語咨部注册仍回筆帖式原任以在京各項小京官員闕於雙月分推升三人之後升用一人一鳯凰城迎送官乾隆五年奏準迎送官三員定為八旗公額遇員闕由禮部該旗咨部本部行文八旗將騎都尉以下驍騎校以上官員每旗遴選一人出具考語咨送過部由部驗看擬定正陪引見補授如以驍騎校補授授為五品一滿官掌印順治十八年題準各部院衙門堂司悉令滿官掌印六科及京畿道河南道掌印由都察院題請欽點其餘各道以見任資深者轉補各部院屬司由各該堂官遴委郎中掌印若郎中有事故則遴委員外郎掌印欽定大清會典則例卷七
