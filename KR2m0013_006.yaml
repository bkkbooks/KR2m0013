  text: 吏部文選清吏司官制一宗人府國初於篤恭殿前列署為諸王議政之所順治九年置宗人府設宗令一人以親王郡王總理府事左右宗正二人貝勒貝子兼攝左右宗人二人公與將軍兼攝漢府丞一人覺羅啟心郎一人漢軍啟心郎一人左右司覺羅理事官十有六人繙譯經歴一人滿經歴二人漢經歴一人滿筆帖式十有六人繙譯筆帖式四人康熈十二年裁啟心郎漢經歴定為理事官四人副理官四人經歴二人主事六人筆帖式二十四人雍正二年議凖理事副理主事等官半用宗室半用旗員設漢主事二人五年設宗室御史二人稽察府事仍隸都察院一内閣國初置内國史内秘書内𢎞文三院順治元年設滿漢大學士六人不備官兼各部尚書銜滿學士三人漢軍學士三人漢學士無定員滿典籍三人漢軍漢典籍各三人清文侍讀五人清漢文侍讀六人蒙古侍讀二人漢軍侍讀二人滿中書七十有五人清文撰文二十人辦事二十人清漢文撰文十有七人辦事十有八人蒙古中書十有九人撰文九人辦事十人漢軍中書十有三人撰文五人辦事八人漢中書三十六人撰文六人辦事三十人二年以翰林官分隸三院稱内翰林八年設滿侍讀學士三人漢軍侍讀學士三人十五年改内三院為内閣以大學士分兼殿閣稱中和殿大學士保和殿大學士文華殿大學士武英殿大學士文淵閣大學士東閣大學士十八年仍稱内三院増滿侍讀學士三人設蒙古侍讀學士三人康熈九年仍稱内閣裁學士滿一人侍讀學士滿二人蒙古漢軍各一人定滿漢典籍各二人以中書掌理十年増滿學士四人定漢軍學士二人漢學士二人滿漢均兼禮部侍郎銜十二年以漢軍學士并入漢闕共四人三十八年裁滿侍讀一人中書滿五人清文撰文辦事各一人清漢文撰文一人辦事二人蒙古三人撰文一人辦事二人漢軍五人撰文一人辦事四人漢四人撰文辦事各裁二人雍正四年設漢侍讀二人乾隆十三年定大學士滿漢各二人協辦大學士滿漢各一人以大學士分兼保和殿文華殿武英殿體仁閣文淵閣東閣是年裁中書二人十七年定漢軍侍讀學士兼用漢人以京堂科道各部郎中俸深者引見簡用一中書科初設滿中書舎人一人漢中書舎人八人滿筆帖式十有二人乾隆十三年裁漢中書舎人四人滿筆帖式二人十四年増設滿中書舎人一人一吏部國初設吏部以貝勒總理部務置承政叅政理事官副理事官主事啟心郎筆帖式等官順治元年停貝勒總理例改承政為尚書叅政為侍郎理事官為郎中副理事官為貟外郎各部同設滿郎中四人漢軍郎中二人滿洲蒙古貟外郎八人漢軍貟外郎六人滿堂主事四人司主事四人漢軍堂主事一人漢司務二人文選司設漢郎中一人貟外郎一人主事二人考功驗封稽勲各司均各設漢郎中一人貟外郎一人主事一人設滿筆帖式五十七人蒙古筆帖式四人漢軍筆帖式十有二人分隸堂司四年裁漢司務一人五年定滿漢尚書各一人七年設滿尚書一人八年仍令親王郡王兼攝部務各部同九年停親王郡王兼攝部務十年裁滿尚書一人十二年増滿郎中四人貟外郎停兼用蒙古十五年定滿漢左右侍郎各一人漢右侍郎兼翰林院學士銜其非翰林出身者不兼今停滿漢司務各一人十八年設蒙古貟外郎一人康熙元年裁蒙古貟外郎三十八年裁漢軍貟外郎四人筆帖式四人五十七年増設蒙古郎中一人復設蒙古貟外郎一人増設蒙古主事一人雍正元年以大學士兼理部務五年裁漢軍郎中貟外郎増文選司漢貟外郎一人考功司漢主事一人一戸部順治元年滿漢尚書無定貟滿漢左右侍郎各一人漢總督倉場侍郎一人滿漢司務各一人滿郎中二十一人内管理銀庫縀庫顔料庫各一人蒙古郎中四人漢軍郎中二人滿貟外郎四十四人内管理三庫各二人蒙古貟外郎五人漢軍貟外郎六人滿堂主事四人司主事十有四人蒙古司主事一人漢軍堂主事二人滿司庫九人江南浙江江西湖廣福建山東山西河南陜西四川廣東廣西雲南貴州十四司各漢郎中一人貟外郎一人主事三人滿筆帖式共九十有九人漢軍筆帖式十有六人倉場滿筆帖式四人寳泉局漢大使一人五年定滿漢尚書各一人十一年各司漢主事各裁一人康熈六年裁江南浙江江西湖廣福建河南陜西廣西四川貴州司漢主事各一人七年設倉場滿侍郎一人裁漢倉場侍郎八年定總督倉場侍郎滿漢各一人裁司庫三人三十八年裁蒙古漢軍郎中貟外郎等官山東山西廣東雲南司漢主事各一人司庫一人五十七年復設蒙古郎中一人貟外郎一人主事一人筆帖式二人雍正元年以親王大學士兼理部務特鑄管理三庫銀印簡王公大臣總理庫務三年増設三庫稽察案卷滿主事一人三庫滿大使四人滿筆帖式十五人四年増設寶泉局漢大使四人七年改寶泉局漢大使為滿大使十二年増設蒙古筆帖式二人一禮部順治元年滿漢尚書無定貟滿漢左右侍郎各一人漢侍郎兼翰林院學士銜其非翰林出身者不兼今停滿漢司務各一人滿郎中四人滿貟外郎六人滿堂主事三人司主事四人蒙古章京四人漢軍郎中八人貟外郎五人堂主事一人儀制祠祭主客精膳四司各設漢郎中一人貟外郎一人主事一人滿筆帖式三十四人漢軍筆帖式四人滿宣表官二人初設六人後裁四人今裁歸太常寺守皇史宬滿官三人蒙古司牲官二人朝鮮國通事官八人鑄印局滿貟外郎一人後裁大使一人㑹同館大使一人教坊司奉鑾一人左右韶舞各一人左右司樂各一人協同官十人俳長無定貟二年裁主客精膳二司漢貟外郎五年定滿漢尚書各一人十二年増設滿貟外郎四人十八年増滿郎中二人康熈九年裁蒙古章京二人以一人改