body:
  text: 內務府上駟院一建置順治初年設御馬監掌各廄政令十八年改御馬監為阿敦衙門以大臣侍衛管理均無定員設筆帖式十有五人康熙十六年改阿敦衙門為上駟院鑄給印信以管理大臣掌之設員外郎四人主事一人二十四年增設郎中一人員外郎二人二十九年增設筆帖式七人三十三年設左右司增設主事三人侍衛四人以郎中一人主事二人筆帖式八人辦理堂務左右司各以侍衛二人員外郎三人主事一人筆帖式七人辦理司務三十四年奏準鑄給左右司印信以郎中掌左司印以侍衛或員外郎一人掌右司印五十九年奏準堂司各增設筆帖式一人雍正六年奏準上駟院卿定為三品乾隆十四年奉旨上駟院卿定為二人由侍衛內務府官各簡一人補授仍簡大臣兼管院事又奏準皇子每位原設司鞍一人司轡四人因不敷用增設司鞍一人司轡四人一內外馬廄康熙年間定紫禁城內設御馬走馬各一廄均隨時增減無定額御馬廄附應差駑馬五匹仗馬一廄三十匹附應差駑馬十匹東安門內駑馬四廄各二百匹駕車馬一廄馬七十匹騾三十匹西安門內川馬一廄無定額駝一廄百匹附應差駑馬十有五匹南苑御馬內馬共六廄無定額每廄附巡羣馬三十匹甕山駑馬一廄二百四十匹雍正元年諭皇考親乘良馬著謹慎飼養如有偷騎調換等情即行處斬欽此又議準每廄駑馬額定二百四十匹乾隆二年奏準紫禁城內走馬一廄改為皇子乘馬五年奏準內管領所管駕車騾歸院管理設廄於西安門內額定馬三十匹騾七十匹十一年定南苑六廄內設挏馬一羣額騰馬十牝馬八十以備取湩之用十六年移甕山馬廄於安河十八年改駝廄為駑馬廄並大有莊駕馬一廄京城駑馬四廄共馬千二百匹作為六廄每廄各二百匹其駝百匹分養京城駑馬五廄每廄各二十其附養駝廄之應差馬十五匹以十匹附仗馬廄以五匹附皇子乘馬廄又奏準挏馬羣內裁騰馬六匹牝馬四十四匹又奏準安河馬廄減馬四十匹十九年定西安門內駕車馬廄增養騾十匹二十年奉旨駕車馬二廄各設馬五十匹騾五十匹一大凌河牧羣康熙八年奏準設牝馬十羣十八年以盛京馬三羣歸大凌河牝馬羣內牧養别將羣內騸馬分設二羣三十年增設牝馬十羣騸馬二羣三十九年增設騸馬二羣四十四年奏準將羣內牡馬牝馬共選三千七十一匹作為五分分給土默特二處喀喇沁三處孶生牧養每年將孳生倒斃馬數呈報理藩院三年一次具奏咨院存案四十六年增設牝馬六羣雍正元年增設牝馬騸馬各四羣五年奏準喀喇沁所養孳生馬一分仍交大凌河牧養十三年奏準南苑牧養牝馬十羣移於大凌河牧羣內牧養乾隆六年增設牝馬六羣騸馬二羣是年裁騸馬二羣十三年奏準牝馬三十六羣共大小馬一萬九千七百匹內撥出馬五千匹交哲里穆盟長親王五千匹交上都總管牧放孳生餘齒老殘病之馬照例變價留牝馬八千分為二十羣每羣三百至五百不等十九年議準養什木騸馬二羣分在大凌河騸馬羣內牝馬六羣改為四羣亦移於大凌河一上都達布遜諾爾馬羣順治年間設牝馬二十羣騸馬六羣康熙四年增設牝馬二十羣十三年增設騸馬四羣十四年增設牝馬三十羣三十三年增設牝馬十羣騸馬四羣三十五年增設騸馬十羣三十六年增設敖爾吉牝馬一羣三十八年增設騸馬四羣牝馬十四羣四十四年增設牝馬十八羣五十年增設牝馬十一羣五十五年喇嘛庫禮成貴貢走馬一羣乾隆二年增設騸馬十二羣三年奏準增設牝馬二十羣騸馬十六羣六年移牝馬二十羣於達里岡崖牧養是年裁騸馬六羣存留牝馬一百三十四羣騸馬四十羣走馬一羣每羣自三百至五百不等一達里岡崖馬羣康熙三十九年設牝馬三羣四十二年增設牝馬七羣四十五年增設牝馬六羣五十五年增設牝馬二羣五十七年增設牝馬二羣六十年增設牝馬二羣雍正四年增設牝馬十八羣乾隆六年奏準移上都牝馬二十羣於達里岡崖牧放共牝馬六十羣每羣自三百至五百不等十九年奏準裁騸馬四羣增牝馬三羣一上都駝羣順治年間設牝駝十羣騸駝二羣康熙三十九年奏準移牝駝五羣於達里岡崖牧放四十五年奏準移牝駝五羣於達里岡崖牧放四十六年奏準在京騸駝六羣內選百匹存廄外餘交上都分四羣牧放共騸駝六羣每羣百匹至二百匹不等一達里岡崖駝羣康熙三十九年設駝一羣牝牡各五十匹是年移上都牝駝五羣於達里岡崖牧放四十五年移上都牝駝五羣於達里岡崖牧放是年增設牝駝四羣五十七年增設牝駝二羣六十年裁牝駝一羣存留牝駝十六羣每羣自一百至二百不等一盛京差馬順治年間定設差馬三羣每羣五十匹一各遊牧羣給與乳牛犍牛其所孳生之牛均交所屬衙門一馬廄典牧官役京師各廄均設廄長一人廄副二人廄丁二十名草夫御馬廄三十六名走馬廄二十八名仗馬廄三十名川馬廄十有四名駑馬四廄各四十四名駕車馬騾二廄各三十二名南苑六廄各二十八名甕山駑馬廄二十四名各草夫內共設百總六人外郎十有六人駕車馬騾二廄各設驍騎四十名雍正元年奏準川馬廄裁廄長一人廄副一人廄丁十名以駝廄廄長兼管乾隆十七年定京畿原設牧羣共設牧長副牧長各十有一人牧副二十二人牧丁二百二十名今牧羣既經裁汰其各羣員役止留牧長副牧長各五人牧副十人牧丁百名充本院備馬等差餘員役仍食原餉撥給奉宸院淸漪園等處充役十八年奏準駝廄改為駑馬廄其川馬廄即以駑馬廄長兼管一上都典牧官役順治年間定設掌關防總管二人翼領三人蒙古筆帖式五人效力筆帖式三人牝馬每羣設牧長一人牧副二人牧丁七名騸馬每羣設牧副一人餘