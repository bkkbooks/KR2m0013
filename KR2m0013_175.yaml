body:
  text: 八旗都統一編旗設官太祖髙皇帝辛丑年滿洲生齒日繁諸國歸服人衆設四旗以統之以純色為辨曰黃旗曰白旗曰紅旗曰藍旗每旗下以三百人為一牛彔每牛彔設額貞一牛录矢名先是出兵校獵每人各取一矢十人設長以領之其長為牛彔額貞至是廣三百人為一牛彔甲寅年削平諸國中外臣民歸附者衆増設四旗以初設四旗為正黃正白正紅正藍増設之旗為鑲黃鑲白鑲紅鑲藍黃白藍均鑲以紅紅鑲以白合為八旗統率滿洲䝉古漢軍諸衆八旗編設滿洲牛彔三百有八䝉古牛彔七十有六漢軍牛彔十有六每五牛彔設一甲喇額貞五甲喇設一固山額貞每固山額貞左右設兩梅勒額貞天命元年増編滿洲牛彔二七年増編滿洲牛彔一八年増編䝉古牛彔一天聰三年増編滿洲牛彔一四年増編䝉古牛彔十漢軍牛彔二五年増編䝉古牛彔一六年増編䝉古牛彔三七年増編䝉古牛彔一八年諭嗣後我國家設官及城邑名皆當易以國語勿仍襲總兵副將叅將游擊備禦等舊名凡賞冊書名悉為釐定五備禦之總兵為一等公一等總兵官為一等昻邦章京二等總兵官為二等昻邦章京三等總兵官為三等昻邦章京一等副將為一等梅勒章京二等副將為二等梅勒章京三等副將為三等梅勒章京一等叅將為一等甲喇章京二等叅將為二等甲喇章京游擊為三等甲喇章京備禦為牛录章京代子為分得撥什庫章京為小撥什庫旗長為壯達屯撥什庫仍舊名凡管理不論官職管固山者即為固山額貞管梅勒者即為梅勒章京管甲喇者即為甲喇章京管牛彖者即為牛彔章京管巴牙喇纛額貞即為纛章京管巴牙喇甲喇額貞即為甲喇章京其瀋陽稱曰天眷盛京赫圖阿喇城曰天眷興京毋得仍襲漢語舊名皆照我國新定者稱之若不遵新定之名仍稱漢字舊名者是不奉國法恣行悖亂者也察出决不輕恕欽此是年増編滿洲牛彔四䝉古牛彔四漢軍牛彔十有六九年設䝉古八旗旗色與滿洲八旗同每旗設固山額貞一人梅勒章京二人甲喇章京二人分統所編䝉古各牛彔是年増編滿洲牛彔一䝉古牛彔二十五漢軍牛彔十崇徳元年増編䝉古牛录一漢軍牛彔一二年漢軍始立二旗每旗設固山額貞一人分統所編漢軍牛彔是年増編䝉古牛录一漢軍牛彔六三年増編漢軍牛彔二四年以漢軍二旗分為四旗是年増編䝉古牛彔一漢軍牛彔三五年増編滿洲牛彔一漢軍牛彔二七年以漢軍四旗分為八旗旗色設官與滿洲䝉古八旗同是年増編䝉古牛彔三漢軍牛彔百八年増編滿洲牛彔一漢軍牛彔九九年増編䝉古牛彔二順治元年増編滿洲牛彔一䝉古牛彔二漢軍牛彔四二年増編滿洲牛彔二䝉古牛彔二漢軍牛彔十有二三年増編䝉古牛彔一漢軍牛彔十有七四年禮部遵㫖議定固山額貞昻邦章京纛章京梅勒章京甲喇章京牛彔章京噶布什賢噶喇昻邦噶布什賢章京皆管兵官銜不論世爵大小有無授此官者即照此銜稱之凡箭號等項亦書此銜於上其世爵昻邦章京改為精竒尼哈番梅勒章京改為阿思哈尼哈番甲喇章京改為阿達哈哈番牛彔章京改為拜他喇布勒哈番半箇前程改為拖沙喇哈番其在部院官及各直省駐防章京官銜仍照舊是年増編漢軍牛彔四五年増編漢軍牛彔三七年増編䝉古牛彔二漢軍牛彔一八年増編滿洲牛彔三漢軍牛彔二十年増編䝉古牛彔一漢軍牛录一十六年鑄八旗都統二十四印十七年諭嗣後固山額貞清字仍稱固山額貞漢字稱為都統梅勒章京清字仍稱梅勒章京漢字稱為副都統甲喇章京清字仍稱甲喇章京漢字稱為叅領牛录章京清字仍稱牛录章京漢字稱為佐領昻邦章京清字仍稱昻邦章京漢字稱為總管烏貞超哈清字仍稱烏貞超哈漢字稱為漢軍欽此又定噶布什賢噶喇昻邦漢字稱為前鋒統領纛章京漢字稱為䕶軍統領噶布什賢章京漢字稱為前鋒叅領巴牙喇章京漢字稱為䕶軍叅領噶布什賢壯達漢字稱為前鋒校巴牙喇壯達漢字稱為䕶軍校分得撥什庫漢字稱為驍騎校康熙元年増編滿洲佐領一䝉古佐領一三年増編滿洲佐領一四年増編滿洲佐領二䝉古佐領一五年増編滿洲佐領三六年増編滿洲佐領十有二䝉古佐領二七年増編滿洲佐領八䝉古佐領三漢軍佐領一八年増編滿洲佐領二十三䝉古佐領六漢軍佐領二九年増編滿洲佐領六䝉古佐領二十年増編䝉古佐領一十一年増編滿洲佐領二十七䝉古佐領十十二年増編滿洲佐領七漢軍佐領三十三年増編滿洲佐領三十五䝉古佐領四十四年増編滿洲佐領一䝉古佐領一漢軍佐領三十五年増編滿洲佐領一十六年増編滿洲佐領一十八年増編漢軍佐領五十九年増編滿洲佐領三漢軍佐領一二十年増編滿洲佐領二漢軍佐領五二十一年増編滿洲佐領六䝉古佐領二二十二年増編滿洲佐領五漢軍佐領二十四二十三年増編滿洲佐領一百三十有九䝉古佐領二十五漢軍佐領五二十四年増編滿洲佐領三漢軍佐領五二十五年増編滿洲佐領一䝉古佐領一二十六年増編滿洲佐領一䝉古佐領一三十二年増編䝉古佐領一三十三年増編滿洲佐領五三十四年増編滿洲佐領四十一䝉古佐領九又以每甲喇叅領一人因不敷用増設委署叅領各一人於世爵佐領及前鋒親軍䕶軍驍騎諸校歩軍尉内選擬正陪引見補授三十六年増編滿洲佐領二三十七年増編䝉古佐領一三十八年増編滿洲佐領一漢軍佐領一四十年増編滿洲佐領二四十一年増編滿洲佐領一四十三年増編滿洲佐領一四十五年増編漢軍佐領一五十三年八旗都統印信改鑄左右翼印每翼給一印六十一年増編滿洲佐領三雍正元年奉㫖向例每甲喇祇設叅領一人因不敷用始委署一人協理今將委署叅領改為副叅領著為例又奉㫖八旗每旗給一印共八印是年増編滿洲佐領一又覆準八旗都統印信所有清文固山額貞字樣額貞二字所關甚鉅非臣下印信可得濫用應行改定以昭名分將固山額貞字樣改為固山昻邦漢名仍舊伊都額貞改為伊都章京漢名班領二年増編滿洲佐領一䝉古佐領二四年奉㫖八旗都統印信仍照舊例給二十四印五年鑄給八旗叅領關防佐領圖記八年増編滿洲佐領三九年増編漢軍佐領五十二年増編滿洲佐領一十三年増編滿洲佐領一乾隆元年覆準精竒尼哈番至拖沙喇哈番均未定漢名請按封爵之制自成周以來公侯伯子男列爵惟五秦漢時爵二十級並非世爵其世襲者王以下惟有侯爵分縣侯鄉侯亭侯三等至於唐宋並依周制爵分五等本朝定制公侯伯之下未列子男之爵别立五等世爵以視古法尤為隆備但未定漢文名稱誠宜補入今擬精竒尼哈番一等者漢文稱為一等子二等者為二等子三等者為三等子阿思哈尼哈番一等者漢文稱為一等男二等者為二等男三等者為三等男阿達哈哈番漢文稱為輕車都尉仍分一等二等三等拜他喇布勒哈番漢文稱為騎都尉拖沙喇哈番漢文稱為雲騎尉十六年増恩騎尉為七品二十一年裁漢軍佐領四八旗佐領以乾隆二十二年見數計之滿洲佐領鑲黃旗八十五有半内宗室一覺羅四新滿洲四䝉古九俄儸斯半正黃旗九十二有半内宗室三覺羅四新滿洲四䝉古八有半朝鮮二正白旗八十六内宗室二覺羅四新滿洲四䝉古二正紅旗七十四内覺羅三蒙古一朝鮮四鑲白旗八十四内宗室一覺羅四䝉古四鑲紅旗八十六内覺羅四䝉古一正藍旗八十四内宗室八覺羅四䝉古八鑲藍旗八十六有半内覺羅四䝉古二有半䝉古佐領鑲黃旗二十八正黃旗二十四正白旗二十九正紅旗二十二鑲白旗三十一鑲紅旗三十二正藍旗三十鑲藍旗二十五漢軍佐領鑲黃正黃正白旗各四十鑲白正藍旗各三十正紅旗二十八鑲紅鑲藍旗各二十九一八旗方位順治元年議準國家定鼎燕京分置八旗拱衛皇居鑲黃旗居安定門内正黃旗居德勝門内並在北方正白旗居東直門内鑲白旗居朝陽門内並在東方正紅旗居西直門内鑲紅旗居阜城門内並在西方正藍旗居崇文門内鑲藍旗居宣武門内並在南方以寓制勝之意雍正六年奏準鑲黃滿洲䝉古漢軍三旗自鼓樓嚮東至新橋自新橋大街北口城根嚮南至府學衚衕東口與正白旗接界滿洲官兵自鼓樓嚮東循大街至經廠為第一叅領下各佐領居址自經厰循交道口轉南至棉花衚衕東口為第二叅領下各佐領居址自南鑼鼓巷北口至南口南鑼鼓巷兩邊之鼓樓院方甎厰真武廟魚兒衚衕福祥寺㡌兒衚衕炒豆衚衕棉花衚衕兵馬司前圓恩寺後圓恩寺局兒衚衕為第三叅領下各佐領居址自交道口大街嚮東循新橋轉南至香兒衚衕東口為第四叅領下各佐領居址自香兒衚衕東口嚮南至府學衚衕馬將軍衚衕大興縣騷達子衚衕土兒衚衕香兒衚衕錢局周圍為第五叅領下各佐領居址䝉古官兵自交道口大街嚮北至安定門為第一叅領下各佐領居址自北鑼鼓巷南口至北口北鑼鼓巷兩邊所有之倒抄衚衕經厰粉子亭謝家衚衕伽藍殿法通寺淨土寺豆腐池兒衚衕髙古庵郎家衚衕碾兒衚衕為第二叅領下各佐領居址漢軍官兵自新橋大街嚮北至方家衚衕為第一叅領下各佐領居址自方家衚衕嚮北至城根為第二叅領下各佐領居址國子監前後頭條二條三條衚衕方家衚衕國子監大溝巷蕭家衚衕為第三叅領下各佐領居址栢林寺前鼓哨衚衕草厰王大人衚衕栢林寺為第四叅領下各佐領居址自北小街南口至城根胡椒圏周圍手帕衚衕羊館衚衕針線衚衕寛街為第五叅領下各佐領居址正白滿洲䝉古漢軍三旗與鑲黃旗接界之處自府學衚衕東口嚮南至大市街報房衚衕東口與鑲白旗接界之處自皇城根至東大城根滿洲官兵自鑲黃旗接界處之棉花衚衕東口循大街嚮南至大佛寺西北角為第一叅領下各佐領居址自大佛寺西北角嚮南至報房衚衕西口為第二叅領下各佐領居址皇城東邊寛街草厰衚衕取鐙衚衕晾榖厰弓弦衚衕䨇塔衚衕為第三叅領下各佐領居址西大街内鐵獅子衚衕賈家衚衕汪芝麻衚衕魏家衚衕十景花園馬大人衚衕大佛寺衚衕羊尾衚衕山老兒衚衕喇叭營為第四叅領下各佐領居址自馬市口嚮東至大市街隆福寺周圍之細小衚衕為第五叅領下各佐領居址䝉古官兵自府學衚衕東口循大街至五條衚衕為第一叅領下各佐領居址自五條衚衕至大市街為第二叅領下各佐領居址漢軍官兵自新橋大街至東直門為第一叅領下各佐領居址北新倉海運倉興平倉南新倉舊太倉富新倉相近為第二叅領下各佐領居址自東直門南小街北口宋姑娘衚衕口袋衚衕慧照寺王家衚衕船板衚衕板橋衚衕為第三叅領下各佐領居址北新橋大街六七八九十條衚衕為第四叅領下各佐領居址北小街頭二三四五條衚衕為第五叅領下各佐領居址鑲白滿洲䝉古漢軍三旗與正白旗接界之處自報房衚衕嚮南至就日坊與正藍旗接界之處自皇城根嚮東至大城根滿洲官兵自正白旗接界處之東長衚衕東口循大街嚮南至院府衚衕東口為第一叅領下各佐領居址自院府衚衕東口至長安坊為第二叅領下各佐領居址東安門大街兩邊翠花衚衕東長衚衕奶子府衚衕燒酒衚衕錫鑞衚衕莱厰衚衕院府衚衕梯子衚衕口袋衚衕理藩院後衚衕為第三叅領下各佐領居址自東長安坊嚮東至就日坊為第四叅領下各佐領居址自鐙市口大街西口至東大市街嚮南兩大街之間椿樹衚衕西堂子衚衕金魚衚衕煤炸衚衕帥