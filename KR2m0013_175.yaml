至絨線衚衕轉東至河漕沿六部口抽屜衚衕関帝廟衚衕牛肉彎為第五叅領下各佐領居址䝉古官兵自宣武門至絨線衚衕西口油房衚衕南拴馬樁翠花衚衕棗樹街為第一叅領下各佐領居址中街半壁街前細瓦厰新簾子衚衕舊簾子衚衕為第二叅領下各佐領居址漢軍官兵自瞻雲坊西邊包子街東口至西口為第一叅領下各佐領居址自手帕衚衕東口至西口為第二叅領下各佐領居址自鐵匠衚衕東口至西口為第三叅領下各佐領居址自石駙馬大街東口嚮西至椶毛衚衕為第四叅領下各佐領居址自頭髮衚衕東口嚮西至臭水河為第五叅領下各佐領居址一直班順治元年定京師内城九門每門設城門領各二人城門吏各二人指揮千戸四年改為門千總下仿此各二人驍騎二百六十名礮手十有八名外城七門每門設城門領各一人城門吏各一人指揮千户各二人驍騎礮手共七十名雍正二年議奏八旗官兵看守倉庫與外藩進貢人之馬匹或有不肖匪類強索直班兵丁錢財代為直班諺所稱坐地虎者著直班官員呈報該旗都統送部從重治罪奉㫖所議是既將坐地虎之處具奏都統等若不嚴察除此惡習斷然不可直班都統即非本班若遇閒暇亦當各察該管人等朕亦不時遣人往察若經察出將直班大臣及該旗都統一幷議處其加意整飭之六年覆準看守九門之滿兵均在城内今於崇文門等八門之外建造營房每旗委滿洲䝉古漢軍官四人驍騎校四人驍騎滿洲百二十名䝉古漢軍各四十名馬二匹令其挈家居住正藍旗於崇文門鑲藍旗於宣武門鑲白旗於朝陽門鑲紅旗於阜城門正白旗於東直門正紅旗於西直門鑲黃旗於安定門正黃旗於徳勝門外各旗均分為四班輪流看守每班官校各一人驍騎五十名其每旗所委官四人内由該旗引見簡一人為營總八年奉㫖嗣後凡有差委驍騎營官兵看守之處皆著奏聞再令看守有不可緩者即令看守補行具奏又議準紫禁城内寕夀宫牆東北隅令鑲黃旗滿洲西北隅鑲黃旗䝉古漢軍正東正白旗漢軍正西蹈和門正黃旗滿洲文華殿門正白旗滿洲各委官一人領催一名兵九名東華門内庫鑲黃旗滿洲戸部銀庫鑲黃旗䝉古漢軍各委官二人領催二名兵十有八名顔料庫正黃旗滿洲䝉古漢軍官四人驍騎校四人領催四名兵三十八名叚疋庫正白旗滿洲䝉古漢軍官二人驍騎校二人兵五十名工部製造庫正紅旗滿洲䝉古漢軍兵五名節慎庫鑲紅旗滿洲光禄寺銀庫正藍旗漢軍刑部贓罰庫鑲藍旗滿洲䝉古漢軍各委官一人領催一名兵九名宗人府庫理藩院庫左翼四旗每庫輪委官一人領催一名兵九名海運倉鑲黃旗北新倉正黃旗儲濟倉鑲白旗裕豊倉鑲紅旗各委滿洲䝉古漢軍官二人領催二名兵三十八名舊太倉正白旗興平倉正紅旗南新倉鑲白旗富新倉鑲紅旗各委滿洲䝉古漢軍官二人領催二名兵十有八名萬安倉正紅旗滿洲䝉古漢軍官四人領催四名兵三十一名禄米倉正藍旗滿洲䝉古漢軍官二人領催二名兵三十三名太平倉鑲藍旗滿洲䝉古漢軍官四人領催四名兵四十一名戸部内倉正白旗滿洲領催二名兵六名鴻臚寺龍亭正紅旗滿洲䝉古漢軍兵八名圓明園直月今為直年衙門左右翼各輪委領催一名兵二名禮部庫西什庫宗人府空室八旗輪流每處各委官一人領催一名兵九名工部濯靈厰八旗漢軍輪委官四人兵二十名以上各晝夜看守喀爾喀館圍牆於䝉古到日委正藍旗滿洲䝉古漢軍官二人兵十名館門正藍旗官一人領催一名兵九名俄羅斯館於俄羅斯到日八旗滿洲䝉古漢軍共設班房十有六處每四處委叅領一人每處委官一人兵十有五名館門輪委叅領一人兵二十名外館於馬匹到日八旗滿洲䝉古輪委官二人驍騎校二人兵二十名後黃寺於䝉古使臣及喇嘛來使到日八旗滿洲䝉古輪委官一人兵十名晝夜看守均於回日徹退各直班官兵該管官不時稽察如有曠誤者叅奏交兵部議處十二年覆準正陽門兩旁城門即於看守八門官兵内八旗共委官四人驍騎校四人每旗各委驍騎十名按翼看守十日一次更代每日按翼各委兵十名晝夜廵宿率以為常如有曠誤不到者該管官覈叅乾隆五年奏準嗣後駕幸口外滿洲䝉古漢軍三旗於城上設堆撥十有五處委官十人看守叅領二人廵察約束如遇㳟謁陵寢及行幸駐驆並逢年節封印後於城上設堆撥六處各委官校與歩軍營堆撥相間看守仍於滿洲䝉古漢軍三旗㑹委叅領一人令其約束二十二年奏準紫禁城内文華殿蹈和門銀庫三處守衛均易以䕶軍一防禦火災康熙二十六年諭昨夜正陽門外失火漢官皆不事撲滅但袖手旁觀八旗都統副都統向不與直宿可於要地分班輪直若偶遇火即為撲滅倘有傳集之事亦易齊聚欽此雍正八年諭嗣後或偶遇東南失火著正藍鑲白二旗往救西南鑲藍鑲紅二旗東北鑲黃正白二旗西北正黃正紅二旗若皇城之内每翼著二旗往救如此不致煩擾於事有益將此傳諭歩軍統領等見某處失火即報知稍近該旗不可有誤欽此又奏準直火班之大臣不令稽察他處以專責成有出差兼别職者不準以官員代替即令其餘大臣輪直十年奏準火班八處每處叅領一人官員五人率領催五名驍騎四十五名激筩八處每處叅領一人官員三人率領催三名驍騎二十七名十一年覆準遇有救火之事停止八旗激筩將見有激筩交歩軍統領衙門備用其原設激筩堆撥處官兵仍著在火班輪直倘各該旗汛地遇有失火直班都統即於直班官兵内率領一半前赴失火之處禁約閒雜人等不許在就近街道中站立行走俾街道不致擁擠汲水可以速到其餘一半官兵仍留該班處備用激筩即令移貯歩軍營其兵丁應需櫜鞬三十副仍存該班處遇救火即令佩帶隨都統前往管束乾隆六年議準八旗火班八處每處滿洲䝉古漢軍三旗輪流都統或副都統一人叅領二人官八人領催八名驍騎七十二名設櫜鞬三十副每班備官馬十匹備用十年奏準直火班之三旗都統内如有别項執事差遣患病持服不能到班情由其餘都統副都統如尚有三人即照常直班若止剰一二人各該旗於正叅領或男以上官内簡賢能者一人直宿仍以職名送兵部欽定大清㑹典則例卷一百七十一
