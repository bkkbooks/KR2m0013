body:
  text: 八旗都統一編旗設官太祖髙皇帝辛丑年滿洲生齒日繁諸國歸服人衆設四旗以統之以純色為辨曰黃旗曰白旗曰紅旗曰藍旗每旗下以三百人為一牛彔每牛彔設額貞一牛録矢名先是出兵校獵每人各取一矢十人設長以領之其長為牛彔額貞至是廣三百人為一牛彔甲寅年削平諸國中外臣民歸附者衆增設四旗以初設四旗為正黃正白正紅正藍增設之旗為鑲黃鑲白鑲紅鑲藍黃白藍均鑲以紅紅鑲以白合為八旗統率滿洲䝉古漢軍諸衆八旗編設滿洲牛彔三百有八䝉古牛彔七十有六漢軍牛彔十有六每五牛彔設一甲喇額貞五甲喇設一固山額貞每固山額貞左右設兩梅勒額貞天命元年增編滿洲牛彔二七年增編滿洲牛彔一八年增編䝉古牛彔一天聰三年增編滿洲牛彔一四年增編䝉古牛彔十漢軍牛彔二五年增編䝉古牛彔一六年增編䝉古牛彔三七年增編䝉古牛彔一八年諭嗣後我國家設官及城邑名皆當易以國語勿仍襲總兵副將參將游擊備禦等舊名凡賞冊書名悉為釐定五備禦之總兵為一等公一等總兵官為一等昻邦章京二等總兵官為二等昻邦章京三等總兵官為三等昻邦章京一等副將為一等梅勒章京二等副將為二等梅勒章京三等副將為三等梅勒章京一等參將為一等甲喇章京二等參將為二等甲喇章京游擊為三等甲喇章京備禦為牛録章京代子為分得撥什庫章京為小撥什庫旗長為壯達屯撥什庫仍舊名凡管理不論官職管固山者即為固山額貞管梅勒者即為梅勒章京管甲喇者即為甲喇章京管牛彖者即為牛彔章京管巴牙喇纛額貞即為纛章京管巴牙喇甲喇額貞即為甲喇章京其瀋陽稱曰天眷盛京赫圖阿喇城曰天眷興京毋得仍襲漢語舊名皆照我國新定者稱之若不遵新定之名仍稱漢字舊名者是不奉國法恣行悖亂者也察出决不輕恕欽此是年增編滿洲牛彔四䝉古牛彔四漢軍牛彔十有六九年設䝉古八旗旗色與滿洲八旗同每旗設固山額貞一人梅勒章京二人甲喇章京二人分統所編䝉古各牛彔是年增編滿洲牛彔一䝉古牛彔二十五漢軍牛彔十崇德元年增編䝉古牛録一漢軍牛彔一二年漢軍始立二旗每旗設固山額貞一人分統所編漢軍牛彔是年增編䝉古牛録一漢軍牛彔六三年增編漢軍牛彔二四年以漢軍二旗分為四旗是年增編䝉古牛彔一漢軍牛彔三五年增編滿洲牛彔一漢軍牛彔二七年以漢軍四旗分為八旗旗色設官與滿洲䝉古八旗同是年增編䝉古牛彔三漢軍牛彔百八年增編滿洲牛彔一漢軍牛彔九九年增編䝉古牛彔二順治元年增編滿洲牛彔一䝉古牛彔二漢軍牛彔四二年增編滿洲牛彔二䝉古牛彔二漢軍牛彔十有二三年增編䝉古牛彔一漢軍牛彔十有七四年禮部遵㫖議定固山額貞昻邦章京纛章京梅勒章京甲喇章京牛彔章京噶布什賢噶喇昻邦噶布什賢章京皆管兵官銜不論世爵大小有無授此官者即照此銜稱之凡箭號等項亦書此銜於上其世爵昻邦章京改為精竒尼哈番梅勒章京改為阿思哈尼哈番甲喇章京改為阿達哈哈番牛彔章京改為拜他喇布勒哈番半箇前程改為拖沙喇哈番其在部院官及各直省駐防章京官銜仍照舊是年增編漢軍牛彔四五年增編漢軍牛彔三七年增編䝉古牛彔二漢軍牛彔一八年增編滿洲牛彔三漢軍牛彔二十年增編䝉古牛彔一漢軍牛録一十六年鑄八旗都統二十四印十七年諭嗣後固山額貞清字仍稱固山額貞漢字稱為都統梅勒章京清字仍稱梅勒章京漢字稱為副都統甲喇章京清字仍稱甲喇章京漢字稱為參領牛録章京清字仍稱牛録章京漢字稱為佐領昻邦章京清字仍稱昻邦章京漢字稱為總管烏貞超哈清字仍稱烏貞超哈漢字稱為漢軍欽此又定噶布什賢噶喇昻邦漢字稱為前鋒統領纛章京漢字稱為護軍統領噶布什賢章京漢字稱為前鋒參領巴牙喇章京漢字稱為護軍參領噶布什賢壯達漢字稱為前鋒校巴牙喇壯達漢字稱為護軍校分得撥什庫漢字稱為驍騎校康熙元年增編滿洲佐領一䝉古佐領一三年增編滿洲佐領一四年增編滿洲佐領二䝉古佐領一五年增編滿洲佐領三六年增編滿洲佐領十有二䝉古佐領二七年增編滿洲佐領八䝉古佐領三漢軍佐領一八年增編滿洲佐領二十三䝉古佐領六漢軍佐領二九年增編滿洲佐領六䝉古佐領二十年增編䝉古佐領一十一年增編滿洲佐領二十七䝉古佐領十十二年增編滿洲佐領七漢軍佐領三十三年增編滿洲佐領三十五䝉古佐領四十四年增編滿洲佐領一䝉古佐領一漢軍佐領三十五年增編滿洲佐領一十六年增編滿洲佐領一十八年增編漢軍佐領五十九年增編滿洲佐領三漢軍佐領一二十年增編滿洲佐領二漢軍佐領五二十一年增編滿洲佐領六䝉古佐領二二十二年增編滿洲佐領五漢軍佐領二十四二十三年增編滿洲佐領一百三十有九䝉古佐領二十五漢軍佐領五二十四年增編滿洲佐領三漢軍佐領五二十五年增編滿洲佐領一䝉古佐領一二十六年增編滿洲佐領一䝉古佐領一三十二年增編䝉古佐領一三十三年增編滿洲佐領五三十四年增編滿洲佐領四十一䝉古佐領九又以每甲喇參領一人因不敷用增設委署參領各一人於世爵佐領及前鋒親軍護軍驍騎諸校步軍尉內選擬正陪引見補授三十六年增編滿洲佐領二三十七年增編䝉古佐領一三十八年增編滿洲佐領一漢軍佐領一四十年增編滿洲佐領二四十一年增編滿洲佐領一四十三年增編滿洲佐領一四十五年增編漢軍佐領一五十三年八旗都統印信改鑄左右翼印每翼給一印六十一年增編滿洲佐領三雍正元年奉㫖向例每甲喇祇設參領一人因不敷用始委