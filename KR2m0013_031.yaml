  text: 欽定四庫全書欽定大清會典則例卷二十八
  hash: sha256:a31fd2246764a2d173033b631084efa2804f200b5665644349b9a7c37daee886
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_031-1a, image: WYG0620/WYG0620-0552a.png}
body:
  text: 吏部考功清吏司修造一修造順治初年定官員將通衢大路緊要隄橋不行豫修以致衝決損壞者將府州縣官各罰俸一年該撫罰俸六月如有城池不豫先修理以致倒壞者罰俸六月康熙三年議準官員捐資修理城郭樓臺房寨器械等項該督撫親身詳加察驗保奏後若有不堅固不如式三年內坍壞者仍令該督撫並督工官賠修本工捐資紀録銷去免其處分若限內坍壞該府州縣官隱匿不報被傍人出首者將該管官革職如該管官申報督撫督撫隱匿不報將該督撫各降二級留任九年題準官員解送一應匠役或名數短少或不擇良工以老病不諳之人塞責者皆罰俸六月又題準官員解送金甎杉木不選擇精美以不堪用者解送或折損或遲延皆罰俸一年布政使巡撫各罰俸六月又題準官員將安插官兵居住房屋不行修理安插以致占住民房者罰俸一年十五年題準官員織造段匹不精好者降一級調用又議準官員修造炮臺邊界烽墩不速行修造完結者降一級留任修完之日仍還其所降之級不行催之上司罰俸一年二十六年題準古北口徵收木植該差官以任滿日期計四月內交完潘家桃林徵收木植以任滿日期計八月內交完如限內不完者照拖欠銅斤之例勒限議處如差官不收大木而收小木察出題參將該差官照徇情例降二級調用差滿交代備造清册報部如有遺漏舛錯照造册遺漏例罰俸一年六十年題凖在京各處修理工程工價五十兩以內物料價直二百兩以內者照依各處印文準其修理其工價五十兩以上物料價直二百兩以上者著該修理處料估啓奏工部差官覆核會同該處官員首領監修將用過錢糧著管工官名下銷算如多用錢糧不行啓奏即便承修者將行文與承修堂司官皆照應奏不奏例降三級調用雍正元年覆準各省修理行宫並直省倉廒等項工程一應動用錢糧事件皆令該督撫奏聞工部議覆再行修理工完之日該督撫察明造册具題工部詳加核算題銷如有關繫錢糧應啓奏事件不行啓奏擅自咨部請銷而該部據咨完結者即行題參照修理工程不行奏請例議處五年議準各省城垣督撫驗明新舊倒塌如城垣本屬修整偶有些小坍塌令地方官於農隙及時修補務令堅固若漫不經心致坍塌過多該督撫察參將該地方官照修造炮臺等項遲延例降一級留任修完之日仍還其所降之級其原坍塌已多必須備辦物料者該地方官量行捐修工竣後將丈尺詳報督撫委官勘眀具結申報如果工程堅固將捐修各官造册具題交部議敘如各地方官正在興修尚未竣工遇有升遷事故將所修城垣丈尺報眀督撫造入交盤册內移交接任之人俟續修完竣將修理之工程丈尺數目分别新舊造具總册報部倘地方官因循怠忽不實心任事將未修城垣揑報修完者照修造戰船未經修完揑報完工例革職甚至借修城名色科派民間者照私派例革職治罪七年議準一應工程該管工官不依定限完工者工部察參照玩誤工程例議處如不照限呈遞銷算清册而該司亦不依限據實核銷者皆照遲延事件例參處如該管工官或有因限期已屆修理未完而規避處分揑報工竣者察出别行指參按所得之罪議處其有應繳銀不遵定限繳庫完結者即將該員參奏革職勒限催追限內全完準其開復逾限不完交部照侵蝕正項錢糧例治罪仍著落家産追還如該司官員通同遮掩者亦照承追虧空不力例議處此外或有工程浩繁辦料維艱其工料銀數至三萬兩以上難以依限完工者繕摺奏聞再行定限修竣又議準京師城牆上下應令步軍統領會同工部各委官一人凡有應行葺補修理之處勘明報部務於雨水之前堅固修葺其所委之官俟一年任滿再委官更代倘官員不加謹修理及不實力察勘者一經察出即行題參照造作遲延例議處乾隆二年覆準各省墩臺營房如有坍塌傾圮之處倘武職不行詳報照承察遲延例議處文員不行修造照修造遲延例議處四年遵旨議準凡修建工程所需物料不必拘泥從前造報物料定價悉照時價確估造報工竣之日該管上司委官驗勘並取印結詳報該督撫等確訪時價核明題咨到日工部再行核銷倘承辦各官浮開揑報該督撫即照冒銷錢糧例指參如委官驗看不實即以扶同徇隱例參處五年覆準採買一切物料工部照定例發價如承辦官侵蝕入已者察出照冒銷例參處倘有匠作搬運等費許承辦官將緣由呈明以聽核奪如該員並不呈報經工部察出參奏照應申上而不申上律罰俸九月河工一河工順治初年定河工衝決地方限十日內申報如過十日報者降二級調用如沿河隄岸豫先不行修築以致漕船阻滯者將經管官降一級調用該管官罰俸一年總河罰俸六月至河工隄岸衝決少而該管官報多者降三級調用不行詳確轉詳之官降二級調用不行詳確具題之總河降一級留任又定經徵河銀一年內全完三百兩以上者紀録一次康熙九年題準官員奉修衝決地方催夫不發或令揠淺不行揠者或稱非本汛推卸者或將柳掃椿木等物不行速辦以致遲延河工者州縣官降三級調用道府官降一級調用十五年議準黃河水勢洶涌與運河不同修築黃河隄岸定限一年運河隄岸定限三年如黃河隄岸半年內運河隄岸一年內衝決者將經修防守同知通判州縣等官皆革職道員降四級調用總河降三級留任如黃河隄岸過半年運河隄岸過一年限內衝決者將經修防守同知通判州縣等官降三級調用道員降二級調用總河降一級留任如過限年衝決者將管河各官皆革職戴罪修築道員住俸督修工完開復總河罰俸一年若限年之內修築之官已去而防守之官疏忽致有衝決者將原修防守之官一例處分其限年內本官所修隄岸衝決隱匿不報别指他處申報衝決者將經修防守各官革職司道降五級調用不行確察具題之總河降三級調用十七年議準知府有地方之責如遇衝決等事照道員一例處分凡隄岸工程均限半年完工如限內不完將承修官罰俸一年督修道府罰俸半年再限三月完工如再不完將承修官降一級調用督修道府罰俸一年如繫革職戴罪承修之官半年限內不完降一級調用其降調官工程别委官限三月完工如不完罰俸一年督修道府所屬官員工程一年內不完降一級調用如限內不完總河不行題參罰俸三月若繫限內難完之大工總河豫先題明至於分管官所築隄工有一處不堅固盛水即漏並有一二丈不豐滿合式者降一級調用兩處不堅固盛水即漏並有三四丈不豐滿合式者降二級調用三處不堅固盛水即漏並有五丈以上不豐滿合式者革職監理官所轄分管官有因築隄不堅固合式一人議處者罰俸一年二人議處者降一級調用三人議處者降二級調用四人以上議處者將監理官革職如議處議敘相同者準與抵算如繫監理官揭參者免連坐如興舉大工附近地方官不協同募夫不將急需物料速即協買上緊解運以致遲誤河工者題參將州縣官降三級調用道府官降一級調用二十三年遵旨議定隄岸衝決河流遷徙者仍照舊例處分至河水漫決河流不移者限年之內令經修官賠修如過年限漫決者令防守官賠修三十九年覆準河工隄岸衝決如河流不移者將管河各官皆革職戴罪勒限半年賠修道員各降四級督賠工完開復如限內不完將賠修官革職道員降四級調用總河降一級留任未完工程仍令賠修如限內不完道員不行揭報總河不行題參照徇庇例議處四十六年議準修防工程道員按工發帑廳員領帑作工其微員末辨以及效力人員止令防守險工催趲夫役及押運物料不得輕給帑金如該廳親具保給申詳該道轉詳該督方準給發如濫委匪人以致工程不完虧空帑金將本身革去職銜限一年追完完日復還原職逾限不完將該廳官革職戴罪勒限一年賠完完日開復再逾限不完將該廳官革職該道降四級勒令賠完完日該道準其開復如又限內不完將該道降四級調用該督降一級與該道廳同賠完日準其開復不完將該督每案罰俸一年仍令該督及道廳同賠還項四十九年覆準河南省隄工如遇水長管河等官協同地方官率領堡夫合力搶護如有怠玩誤工者將管河地方官照黃河定例議處仍按照年限著落賠修五十四年諭江隄與黃河隄塍不同黃河水流無定時常改移故特設河官看守江水並不改移故止交與地方官看守如江水倘一泛漲亦非人力所能保湖廣隄岸引黃河看守隄工例議處地方官員之處著詳察再議具奏欽此遵旨議定嗣後湖廣隄岸衝決府州縣官員各罰俸一年該撫罰俸六月雍正二年議準河工修築不堅致有衝決力能賠修者别委官督令賠修不能賠修者題參革職别委賢員給發錢糧修築將所用錢糧勒限一年令其照數賠還如限內賠完仍準其開復如逾限不完題交刑部治罪三年議準豫東江南蓄水諸湖栽葦官員栽葦一頃者紀録一次二頃者紀録二次三頃者紀録三次四頃者加一級殷實之民種葦四頃準以九品頂帶榮身次年驗明栽種活數造册題請議敘四年遵旨議定河工承修官員估計工程總河及該督撫等委官確勘工段丈尺樁掃料物如果與所估數目相符核實具題發帑興修如估計過多存心浮冒察出將承修之官照溺職例革職驗勘之官不實心勘驗扶同徇隱照徇庇例議處至工完之日該總河督撫等再行確勘如工程單薄物料剋減錢糧不歸實用以致修築不堅不能保固將承修之官照侵欺錢糧例分别治罪其侵欺銀勒限著落該員家産追賠還項至所修單薄工程該員既經浮冒工程必難保固令總河督撫等别委賢員動帑堅固修築工完題銷但河防重大水性無常倘一時水勢暴漲人力難施致有衝決該總河督撫察明具題仍照黃運兩河衝決例分别年限處分又議準直隸一切河道工程令該管官各分工段照例保固如有隄岸修築不堅以致衝決者該督察明題參繫一年內衝決將該管官降三級調用管河道員降二級調用總督降一級留任一年外衝決者該管官皆革職戴罪修濬道員住俸督修完日開復若河工衝決例應參處知府者知府亦照道員例處分五年遵旨議定黃河一年之內運河三年之內隄工陡遇衝決而所修工程實繫堅固工完之日已經總河督撫保題者止令承修官賠修四分其餘六分準其開銷如該員修築錢糧均歸實用工程已完未及題報而陡遇衝決者該總河督撫將衝決情形並該員工程果無浮冒之處據實保題亦令賠修四分其餘皆準開銷如黃河一年之內運河三年之外隄工陡遇衝決而該管各官實繫防守謹慎並無疏虞懈弛者該總河督撫核明具題止令防守該管各官共賠四分內河道知府共賠二分同知通判守備州縣共賠一分半縣丞主簿千總把總共賠半分餘六分準其開銷其承修防守各官皆革職留任戴罪效力工完之日方準開復倘總河督撫有保題不實者後經察出照徇庇例議處所修工程仍照定例勒令各官分賠還項七年議準江南蘇松等府兼管水利各官一年內果能實力奉行疏濬河道修築隄岸均有成效該管道員申報督撫該督撫核實保題準加一級二年內能無誤工程準其加銜一等三年內始終無懈於河道實有裨益該督撫保題到日以應升之官即用其玩視興修致河道淤淺隄岸傾圮者該督撫即指名題參所用錢糧責令賠補十二年覆準江南黃運兩河隄岸令河道總督轉飭經管廳汛各官督率在工兵夫各照本汛應積土方數目逐漸堆積工所以資工用除寒暑兩月免其積土外其餘每月黃河一堡二夫責令堆土十五方運河一堡二夫除糧船往返修補犁溝橛眼外責令積上十二方以一年合算計積土十萬餘方每月察明細數詳報總河衙門不得漸次短少除河兵所積土方入於該備辨交代項下外其堡夫所積土方每月造於新土册內彙報算入交代倘不能如數挑積專汛官罰俸一年該管廳員罰俸半年若擔積不及一半將專汛官降一級暫留原任戴罪趲挑該管廳員罰俸一年乾隆二年覆準豫省應修水利地方如繫動帑修築工程承修各官果能實力辦理修築堅固錢糧並無糜費俟保固三年之後該督撫將該員功績核定造册題請交部分别議敘其專轄監修統轄督修之員果能督率有方各屬內毫無怠忽應照河工秋汛平穩之例量加議敘倘承修之官膜視悠忽不豫期修築以致田畝被淹者照河工隄岸豫先不行修築例降一級調用專管監修之官罰俸一年統轄督修之官罰俸六月倘有虛冒錢糧侵蝕入已以致工程不堅者將承修之官照侵欺河工錢糧例革職治罪該管各官徇隱不報照徇庇例議處三年覆準河南山東沿河文武官辨於沿河地方有能出已資捐栽成活小楊五百株者準其紀録一次千株者紀録二次千五百株者紀録三次二千株者準其加一級其瀕河民人有情願在官地內捐栽成活小楊二千株或在自己地內栽成千株者該管官申報河督勘明成活數目造册報部給以九品項帶榮身如不及議敘之數準其次年補栽仍將栽成楊樹責令汛官收管培養如廳汛各官有將民地指為官地強占栽種希圖議敘者察出嚴參照強占官民山場河泊律治罪六年覆準凡工程完竣應追核減銀照依雜項錢糧例計以年限著追如限滿不完將承追官初參降俸二級戴罪督催完納復參罰俸一年如承辦之員遇有升遷事故於任所原籍催追限滿不行完繳者該督撫指名察參分别議處十八年議準河工同知通判等官交代皆繫工程物料向因核算需時並未定有限期往往任意遲延嗣後廳員遇有升調事故皆限三月內將一應經手錢糧並歲修搶修工程統行交代清楚出具切結呈報如有錢糧繁多應展限者咨部請展倘有虧闕逾限等事即行分别揭參該管道員督催不力亦照例參處二十年奏準南河栽種柳楊在報捐之人雖稍出己資並不親身料理大槩託河工辨兵代為栽植往往以細小嫩枝溷插充數幸而成活即可幸邀議敘逮驗看之後報捐者絶不照管或漸次枯稿實屬有名無實所有南河官民捐栽議敘之例應請停止以免冒濫又議準河工楊柳葦草均有捐栽議敘之例但行之既久恐滋冒濫之漸自應稍為分别除柳株一項既有捐栽又有兵夫額栽易於溷冒惟楊樁葦草二項並無兵夫額栽易於核驗不致有名無實且定例以來官民捐栽楊樹葦草者寥寥無幾應督令各力行勸捐以裕工料嗣後河南山東官民捐栽楊柳樹照依南河之例停止議敘以免冒濫其楊樹蘆葦二項河東與江南稍有不同必須及早勸諭捐栽以資工用勢不能照依南河一例停止應照舊辦理仍令該督嗣後官民捐栽楊葦務須委官察驗實在成活數目取結造册送部題明分别議敘母使溷冒影射致滋冒濫欽定大清會典則例卷二十八
