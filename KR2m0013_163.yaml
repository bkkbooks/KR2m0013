前引後扈大臣青狐皮端罩立蠎段緣貂朝衣一等侍衛冠軍使等緣貂猞猁猻端罩襴蠎段緣貂朝衣二等侍衛雲麾使等紅豹皮端罩方補襴蠎段緣立絨朝衣三等侍衛治儀正等狐皮端罩方補段緣立絨朝衣其衍聖公滿漢大學士都統滿漢尚書暨內廷侍直諸臣有奉特㫖頒賜者亦給與朝冠皮端罩緣貂朝衣以上賞賜冠服除升轉病故不繳外革職者仍令繳還貯庫乾隆四年奏凖一等侍衛原領端罩朝衣二十一分增造二十四分二等侍衛原六十分增造七十分三等及藍翎侍衛原一百八十三分增造一百四十四分再增造前引後扈大臣十二分除侍衛等領過外其新增之端罩朝衣均貯庫備用一賞官兵被褥雍正七年奏凖紫禁城內直班侍衛官員兵丁凡一千二百八十八人侍衛官員各給紬面布裏被褥氊條一分護軍校等各給紬面布裏被細布褥一分護軍各執事人各給細布被褥氊條一分領催驍騎步軍校尉服役人各給布被褥一分每年自十月初一日鞔以羊皮至二月初一日折皮繳庫被褥二年一漿洗五年一更換八年奏凖圓明園直班乾清門侍衛等給與紡絲被褥紗帳葛布褥二十二分漿洗修換均照前例一較射賞賜康熙十二年定凡奉㫖較射領侍衛內大臣及侍衛等有射十矢中九矢者賞鞍馬一中八矢者賞蟒段一段一中七矢者段一紬一中六矢者洋段一紬一中五矢者彭段一紬一中四矢者段一三旗內府護軍領催驍騎槍手等中一矢一槍者賞銀五錢中十矢十槍以下八矢八槍以上者加賞弓一張折銀三兩十三年定三旗內府護軍校護軍等有射十矢中八矢以上者賞段一紬一弓一中七矢者段一紬一中六矢者段一中五矢者洋段一中四矢者彭段一中三矢者紬一中二矢者布三中一矢者布二十五年定內府三旗佐領內管領下官員護軍驍騎等較試騎射步射皆列優等者賞內用段一骲箭一步射優而騎射中等騎射優而步射中等者賞官段一或止騎射優或止步射優或騎射步射皆中等者賞洋段一或彭段一或止騎射中等或止步射中等者賞紬一槍手放槍三次全中者賞彭段一中二次者布二中一次者布一十九年定三旗內大臣侍衛有射十矢中九矢者賞蟒段一段三中八矢者蟒段一段二中七矢者段三中六矢者段二中五矢者段一中四矢者彭段一二十年定領侍衛內大臣侍衛等射十矢全中者賞蟒段一段四餘照十九年之例賞給乾隆十六年定凡遇車駕巡幸扈從王公大臣御前較射應賞段匹據領侍衛內大臣來文頒給一賞賜藩服順治初年定䝉古扎薩克等進貢馬駝分别等次馬作價自一百三十兩至十兩駝作價自六十兩至十有五兩各有差均折給段匹康熙十四年奏凖歸化城居住之喇嘛䝉古等貢馬均折半賞給二十三年奉㫖嗣後歸化城喇嘛進貢不必折半給賞餘仍折半給賞遵㫖議凖䝉古貢物折銀不及二兩五錢者不賞外西藏逹賴喇嘛班臣額爾德尼喀爾喀澤卜尊丹巴胡圖克圖等均折給上用龍段糚段片金段大段官用紬段公主均折給上用段官用段王以下扎薩克台吉塔布囊以上均折給官用段彭段水獺皮等項一等台吉以下均折給毛青布如價直多者亦折給官用段彭段又定朝鮮安南琉球暹羅等國進貢方物均折給蟒段采幣紬絹紗布及來使段布有差又奏凖每年萬壽冬至元旦朝貢每次賞朝鮮國王五等貂皮百張上用糚段四段九賞來使上用段一帽段一彭段一乾隆七年奉㫖嗣後凡進貢馬經朕賜名號者進貢馬人賞給內庫上用段四匹著為例十年奉㫖察哈爾貢馬嗣後每匹作銀二十兩折賞大段二匹一賞賜貢馬大臣侍衛國初定大臣侍衛有貢獻馬駝者均令估計賞銀段有差康熙八年諭嗣後大臣侍衛進馬應賜鞍者先令請㫖再議估價直欽此一賞賜進書順治十八年議凖玉牒告成賞總裁纂修官表裏由禮部咨段庫給發康熙十一年議凖實録告成賞給監修總裁纂修官表裏與玉牒告成同一優恤官軍乾隆二十一年議凖紫禁城內日直官軍所需飯食銀歲計九千五百四十餘兩日於銀庫支領年終奏銷一優恤舉子雍正八年奉㫖㑹試時天氣尚寒舉子衣單可製造布棉襏襫每舉子各給一領禦寒遵㫖成造粗布厚棉襏襫五千五百二十九領每逢㑹試據禮部來文按人數給發事竣仍繳庫收貯殘闕者呈堂修補一女朝衣雍正二年奏準凡遇宮中朝賀燕饗大臣侍衛官員命婦所用冠服不能齊備令衣庫成造數十分備用禮成繳還乾隆七年奏準先蠶壇執事命婦亦準於庫內各領冠服禮成仍繳還一優恤婚喪雍正元年奉㫖發內庫銀九十萬兩生息所得利銀賞給八旗並內府三旗官員兵丁以濟婚喪之用欽此遵㫖議準此項銀按一分利滋生所得利銀八旗滿洲䝉古每旗每月豫領銀千兩備婚喪恩賞之用用過數目於次月咨府再按用過之數補給內府三旗官兵優恤銀由銀庫存貯官員及尚茶尚膳人員護軍領催等遇喜事賞銀十兩喪事二十兩驍騎喜事六兩喪事十有二兩步軍喜事四兩喪事八兩八旗並內府三旗各將所用銀數於歲終具奏銀庫彙總繳銷乾隆元年奏準八旗漢軍官兵婚喪恩賞動支內庫銀二十萬兩亦按一分利滋生所得利銀鑲黃正黃正白三旗每旗豫領銀三百兩餘五旗各領二百二十兩備用其咨報補領及奏銷均照滿洲䝉古例行五年奉㫖嗣後恩賞滋生餘剩銀數至十萬兩著內務府總管具奏歸入正項辦理二十一年議準恩恤銀停止生息凡賞內府上三旗婚喪銀每月於户部移取長蘆兩淮鹽課銀一萬三四五千兩不等一優恤高年康熙二十五年議準內府三旗佐領下人年九十以上曾出仕者男婦各賞段二未仕者銀各二十兩八十以上本身出仕及其父母妻各段一彭段一未出仕者銀各十有五兩七十以上本身出仕及其父母妻各段一綾一未仕者銀各十有二兩內大臣散秩大臣年高者給蟒段一雍正元年定各直省督撫題報年逾百歲之男婦奉㫖加賞銀幣者由庫遵㫖賞給一優恤內監及執事人役順治初年定宮殿門及陵寢首領內監內監等歲給段布衣帽有差又定治辦奉先殿祭品厨役等每四年給與羊裘一領康熙二十八年議準內管領下掌管內外事男婦及各項匠役採蜜壯丁游牧處男婦等歲給布棉羊皮有差又議準贊祀婦長每人歲給官用段光素段青素段官紗小潞紬綾紡絲杭紬各一贊祀減青素段餘同又議準內監僧道均給與四季衣服又議準歲給守陵首領內監每名官用青素段紡絲各一毛青布五棉四斤內監每名彭段杭紬各一毛青布四棉三斤茶膳房婦長每名官紗二朝鮮貢布二婦人每名屯絹一朝鮮貢布一皆據掌儀司開明人數由段庫委庫使二人移付都虞司委領催一人驍騎四人送往分給又定歲給內廷各處坐更內監每人布面羊裘一或折粗布一棉花八兩狐皮領一據宮殿監來文給發三殿文華殿新進坐更內監應給狐皮帽狐皮領據營造司來文給發奉先殿茶膳房新進內監應給羊裘狐皮領據掌儀司來文給發雍正三年奏準圓明園內承應水手每名春夏給單布衣一襲秋冬給棉布衣一襲每五年各給羊裘一狐皮帽領各一一匠作銀作司成造金銀器皿首飾裝飾數珠小刀皮作司洗刷皮張成造各鐙及寶蓋流蘇瓔珞之屬銅作司鑄造銅鍚器皿及成造樂器染作司染洗綾紬布匹絲絨棉線氆氌及鍊絹彈粗細棉花衣作司成造衣服縫合皮毛繡作司刺繡花作司成造各色綾紬紙絹通草供花及燕花瓶花各作見設各項匠人一千二百有六名內召募民匠二十一名康熙二十五年奏準匠役有特等精巧者給食銀二兩次等精巧者一兩五錢雍正六年議準凡成造物件食糧匠役如不敷用許雇民匠幫工自二月初至九月杪為長工日給制錢一百五十四文自十月初至正月杪為短工日給制錢一百三十四文乾隆五年議準匠役闕六庫郎中同該庫官遴選充補一年者為學手二年為半工三年為整工如三年後不能造作即革除有特等精巧者奏明加增錢糧欽定大清㑹典則例卷一百五十九
