body:
  text: 內務府一扈從恭遇皇太后皇后皇貴妃妃嬪出入內務府總管一人率內府護軍豹尾班扈從其引導扈從侍衛等官移咨領侍衛內大臣委除其引導委除郎中員外郎等官詳都虞司雍正十三年奉㫖從前皇考時內廷宫眷出入以郎中委署內務府總管率豹尾班扈從今皇太后出入不便令郎中率豹尾班嗣後令總管率豹尾班扈從如總管遇有差著奏請别簡散秩大臣乾隆三年奏準總管遇有差不能扈從奏請别簡散秩大臣倘不及奏請即知㑹領侍衛內大臣於直班散秩大臣內委一人扈從一監視用寶康熙八年大學士等傳㫖遇行幸駐驆用寶時㑹同內務府總管監視鈐用一升除順治初年定內務府屬各官均由內務府總管引見補授康熙四十年奉㫖內務府司官間用旗員雍正元年奉㫖內務府屬司官所用之旗員簡選好者奏留其餘一槩撥回不堪用者即行參革不可狥情所遺之闕即著補用內府人員遵㫖議凖凡內務府屬官嗣後均用內府人員郎中員闕於員外郎參領內簡選員外郎員闕於主事六品司庫庫掌副內管領驍騎校護軍校暢春園苑丞內簡選主事員闕於筆帖式未入流司庫內簡選司庫員闕於未入流司庫庫使筆帖式內簡選內管領員闕於舊內管領子孫及副內管領內簡選副內管領員闕於筆帖式庫使庫守領催內簡選朝鮮通事官員闕於本佐領保送人員內簡選暢春園行宫各等處苑丞員闕於苑副內簡選八品司匠催長員闕於筆帖式未入流司匠催長未入流司庫庫使內簡選未入流司庫庫掌司匠催長暢春園等處苑副闕於筆帖式庫使庫守內簡選均引見補授奉㫖未入流司庫以下等官即著內務府總管選補七年覆凖嗣後內務府郎中以下六品官以上員闕凖於月抄截限次月初十日內遴選應升人員於二十五日以內引見補授十三年奏凖凡官員奉差二三年之久及患病至半年者均令開闕别補乾隆六年奉㫖口外自巴克什營行宫至張三營交熱河總管口內自瑶亭行宫至湯山著交內務府總管於郎中員外郎內簡選人去得者引見授為湯山總管令其總理八年奉㫖嗣後引見副內管領時將舊內管領子孫亦著一并引見九年諭內務府補授屬官有春季甫授員外郎秋季即引見補授郎中者凡一應升轉理宜論其年分次序簡選補用乃並不論其行走年分只將目前驅使熟識之人屢加遷擢年久陳人轉致屈抑壅滯豈年久陳人實皆不堪任使其所簡年淺之人舉傑然出衆者乎似此辦理不但非鼓勵人材之道亦滋惡習無益於事若以見出之闕果屬緊要其人不能相宜即於補授之後原可酌量改調嗣後推升簡選人員著仍論其年久人去得能辦事者簡選引見如年雖淺而人品實在出衆才具優長著將其地必須其人情節聲明具奏一并引見永著為例欽此遵㫖奏凖堂郎中辦理六庫郎中皆繁要之闕似難論俸應於各司郎中內簡選奏補郎中員外郎掌關防內管領員闕於應升人員內將奉㫖記名並京察凖為一等者為一班京察列二等年久者為一班遇闕分班間用論俸開列主事司庫八品苑丞司匠催長等員闕於應升人員入京察者按等次論俸不入京察者只論俸開列內管領員闕按向例將舊內管領之子孫與應升人員一并簡選引見但舊內管領之子孫有有品級者有無品級者從前於五品內管領六品副內管領員闕槩行列名嗣後舊內管領之子孫有品級者升補內管領無品級者升補副內管領與各項應升人員一同引見凡俸滿員外郎食見任俸五年主事食見任俸二年司庫六品庫掌六品苑丞內管領均食見任俸六年副內管領除舊內管領子孫外食見任俸八年筆帖式食見任俸十二年未入流司庫司匠催長庫掌苑副食見錢糧八年方凖升補其各項未入流司庫等員闕所有應升之庫使庫守執事人領催等均於本差行走十年者方凖補授凡雜職除未入流苑丞苑副原屬簡選之闕仍於各該處保送人員內簡選補授外其各司各處之未入流司庫庫掌司匠催長掌果等闕各該司均有候升之庫使庫守領催果房人等嗣後何司闕出即令該司於所屬各處應升人員內簡選年久人去得者擬定正陪補授凡保送人員該處有十人以外者每次凖保送二人十人以內保送一人五人以內間一次保送一人其京察列為三四等者槩不凖保送凡議敘以應升之官即用人員擬為一班與應升人員分班間用議敘以應升之處列名人員與應升人員一同論俸簡選録用凡引見人員除特題及補授護軍統領盛京佐領內府佐領內管領不拘額數外其餘每闕擬定正陪各一人引見擬陪者下次即擬正倘有事故仍停其升轉十一年奏凖嗣後郎中員外郎員闕即聲明現在所出之闕將應升人員引見補授其郎中員外郎內或有繁簡不甚相宜應調補者奏明調補各司郎中掌印及兼管别司亦皆奏明其主事以下官調繁調簡亦皆注册至京察考核時按其所調繁簡以分優劣其見委别項差務在各司挂銜者亦視其所委差務之繁簡該處出具考語以定優劣十三年奏凖嗣後內務府堂主事食俸已滿者遇有應升擬以前列與應升之司院主事一同引見補授再本府額設之堂筆帖式內京察凖為一等及俸深應升者别立一班與各司院京察一等俸深議敘三班應升人員輪班升用又定嗣後遇有堂筆帖式應升主事公闕先於京察凖為一等筆帖式內按行走年分擬定正陪凖其升用一人續於各司院人員三班升用後再遇堂筆帖式等應升主事公闕即於俸深筆帖式內按行走年分擬定正陪凖其升用一人再本府委署主事承辦一切差務均與堂主事無異此內有議敘一等俸深應升之人嗣後如京察凖為一等應題堂主事人員用完尚未届京察之際遇有堂主事員闕即於此項人員簡選題補十四年奉㫖上駟院奉宸苑武備院原屬內務府統轄嗣因專設大臣管理漸致本處大臣竟有奏請補授者其卿員亦多寡不一嗣後除特㫖補授管理者不計外此三院各定卿二人一由侍衛一由內務府司官簡選補授由侍衛補授者許著黃馬褂由內府司官補授不必著如侍衛卿員闕著領侍衛內大臣內府司官卿員闕由內務府總管㑹同該衙門大臣簡選引見十五年奏凖嗣後各處應題主事槩行更定停其專以本處人員題補仍照舊例一槩歸班選補十六年奏凖嗣後熱河行宫總管員闕作為內府額外郎中如奉特㫖補授者凖帶原銜兼任十七年奏凖辦理雍和宫事務內府郎中員外郎各一人照管理中和殿之例作為額外之員停其兼司開闕别補又議凖司爼官贊禮郎八品苑丞司匠催長前例未定以應升年分嗣後司爼官如行走三年無過凖該處保送升轉其七品贊禮郎八品苑丞司匠催長照未入流司庫之例食見任俸八年方凖各該處保送升補一補用筆帖式庫使等闕康熙二十三年奏凖內務府各司院筆帖式庫使庫守等員闕於三旗貢監生員護軍驍騎閒散人內奏請委官考試其考試取中者具奏後即將伊等名籤入筒俟有闕該管官呈堂掣籤補用各司院領催等闕於各司院衙門保送人役及各佐領內管領下驍騎閒散人內一同簡選亦將名籤入筒掣補雍正七年奏凖補用筆帖式庫使庫守人員內考取翻譯者凖以筆帖式先用續將清漢字及清字一等者挨次補用清字二等者以庫使庫守果房人補用漢字者以漢字筆帖式補用凡上駟院飬什木等處馬羣效力人慶豐司張家口外牛羊羣效力人湯山效力人掌關防內管領處效力人均據各該處效力年滿咨文到日凖以筆帖式補用再西洋字學官學生考取一等者據該管官呈堂亦凖以筆帖式補用乾隆四年議凖除掌關防內管領處效力人照例將名籤入於考取漢字筆帖式筒內一同掣補外其餘將效力人名籤别設一筒與考取筆帖式入筒人等輪流掣補五年奏凖嗣後景山官學生三年一次考試時將內府應行考試筆帖式人員不分滿漢員闕槩以翻譯考試其翻譯清漢字兼優者以筆帖式即用稍通翻譯清漢字優者以筆帖式用不能翻譯清漢字優者以庫使庫守用其考取入選者繕摺具奏入筒掣補至於僅能書清字或漢字者槩不凖試再上駟院等處由廄丁閒散人選在逹里岡崖等處效力三年期滿以筆帖式補用者至年滿咨送到日委官考試如果稍通翻譯清漢字好者凖以筆帖式用倘不能通曉翻譯只能書清漢字者以庫使庫守補用六年議凖嗣後各該處遇有筆帖式庫使庫守執事人領催等闕悉由筒內掣籤補用其本處效力行走之人槩不凖其坐補至於堂筆帖式員闕仍於各司院見任筆帖式內擇其人去得諳練事務清漢字兼優者簡選調補如見任筆帖式內不得其人仍由筒內掣補其在堂效力行走之人亦不凖坐補如别司有闕將堂上效力人員名籤掣出照例得給俸祿公費仍留堂候堂筆帖式員闕轉補所遺司闕由該司再行掣籤補用八年奏凖嗣後三年一次考取入筒籤掣補用筆帖式庫使庫守等闕於內府應行考試人員及景山官學生內額定每次考取不得逾二百名十年奏凖湯山效力筆帖式四人逹里岡崖馬羣效力筆帖式十人張家口外牛羊羣效力筆帖式二人樂部效力筆帖式八人掌關防內管領處效力筆帖式四人雍和宫效力筆帖式四人以上均繫從前奏凖於內府三旗生監及驍騎牧丁廄丁並閒散人內情願效力行走者按闕選補三年期滿後其能翻譯書清漢字者並以筆帖式補用但伊等皆非入筒候補之人此內多用一人筒內即少掣一人與其於筒外别取效力之人以致考補候補者壅滯録用莫若即將筒內考取之人簡選效力行走如逹里岡崖等處及張家口外牛羊羣效力之人向來原於廄丁內簡選嗣後筒內候補人員有情願前往效力者凖其前往效力其廄丁仍照舊例三年期滿分别考試入筒候補外其由候補人員效力者定以一年六箇月期滿更換來京遇闕補用其京城各項效力之人均由候補人員內簡選令其效力行走定以二年期滿遇闕補用如於未滿年分之前由筒掣出並聽其坐補其效力之闕別行簡補此等效力人員如食餉者仍給原餉未食餉者若在京城效力毋庸給餉若在逹里岡崖及張家口外等處效力者無論佐領內管領下人均凖其暫補該處廄丁食餉效力凡由筒內簡選筆帖式效力行走者補用之日凖將效力年分一并接算十一年奏凖嗣後考取筆帖式庫使庫守停止三年一次考試改為五年一次考試十三年奏凖嗣後府屬效力行走之候補堂筆帖式定以二年期滿遇闕即補又議凖本府效力筆帖式由各司簡選者定為二十人由考取入筒人員內簡選者定為十人十四年奏凖圓明園銀庫器皿庫由內務府考取入筒候補庫守人員並官員子弟內擇其家道殷實通曉文義者兼取庫守六名令其專守二庫行走三年黽勉勤慎者即以該處筆帖式轉補十六年御舟統領處奏凖該處增設筆帖式二人由本府考取入筒人員內掣補行走三年無過期滿之時咨府以三院七司及各處筆帖式轉補遺闕别行掣補十九年奏請武英殿修書處筆帖式員闕於本處執事人內轉補奉㫖筆帖式內五人著轉補三人餘仍照舊例由筒內掣補一補用漢字筆帖式雍正元年奉㫖嗣後各司月摺皆著兼漢字具奏爾等將佐領內管領下能書漢字者選取遵㫖議奏將佐領內管領下貢監生員驍騎閒散人內選能書漢字者五十人請照藥房漢字筆帖式之例補用奉㫖伊等行走著定為三年或五年以外任補用俾得盡心效力著總管等議奏遵㫖議凖此等漢字筆帖式行走五年期滿由貢生補授七品筆帖式者照例以知縣選用由監生補授八品筆帖式者以通判運判選用由生員驍騎閒散人補授未入流筆帖式者以州同州判縣丞選用三年奉㫖嗣後總管內務府武備院等處一應具奏之事皆著兼漢文再各處文移亦兼漢文四年奏請內務府衙門改正翻譯事件懇三四人承辦奉㫖交與吏部於候闕翻譯人員內簡選三四人給與照品補用如候補筆帖式者即以筆帖式補用如行走好題補主事七年奏凖年滿漢字筆帖式原應以外任補用但伊等自幼在內行走未悉外任事宜請將見令選取年滿之筆帖式十有一人於內府應升之官簡選引見乾隆十一年奏凖見出筆帖式一闕停其由部補送即於內府各司各處見任筆帖式內簡選由翻譯進士舉人生員出身諳練事務之人調補外其見在翻譯筆帖式皆行走多年並無過愆應請仍留內府行走遇伊等闕出槩以內府人員調補停其由部咨取一京察康熙十二年議奏內府官員應否照部院之例京察筆帖式應否一并考察再三品以上堂官例皆自陳總管等亦請自陳奉㫖內府官員著京察總管不必自陳筆帖式亦著考察又議奏內管領應否考察奉㫖內府官員不宜照外部官員之例以八法考察降調者亦無可補之官將內府官員內管領一并考察不及者即議革退遵㫖議凖將內府官員及內管領一例考察擬定一等二等者為稱職三等四等者為平等不及者皆議革退具奏十八年奏凖上駟院武備院官員令各該堂官考察雍正四年議奏內府官員筆帖式均照康熙十二年之例一例舉行京察上駟院武偹院奉宸苑官員筆帖式等仍照例令各該堂官甄别考察至總管及三院堂官應否自陳奉㫖著自陳乾隆二年奏凖內府所屬兼文職佐領等官仍入京察其三旗護軍統領護軍參領護軍校及驍騎參領佐領驍騎校散秩官員等應照八旗例出具考語咨送欽命王大臣等照例入於軍政不必溷入京察三年奏凖本府照部議將京察一等官員筆帖式均引見凖其一等者加一級注册遇有保舉先儘此項人員簡選九年奏凖三年京察巨典攸關若不酌定額數恐不堪保舉者濫膺是選不足以示鼓勵嗣後京察之年內府所屬各處筆帖式等於十人內保舉一人不得濫舉十一年奏凖嗣後七品贊禮郎八品司匠催長等均照內府官員之例編入京察本內具題其未入流庫掌委署司庫司匠催長掌果以下等微員亦於京察時由該處呈堂驗看甄别有不稱職役者黜革平等供職者仍視其行走年分歸班升補如有才堪辦事行走勤慎傑出者照京察一等注册之例不拘年分即行注册與應升人員一例録用十七年諭嗣後內而部院司官外而道府京察大計之例仍舉行其自陳繁文著停止武職五年軍政視此欽此十八年奏凖奉宸苑南苑等處六品以上官共十有三人內凖卓異二人圓明園清漪園等處官共十有三人內凖卓異二人武偹院官十有九人內凖卓異二人上駟院官九人內凖卓異一人七品以下苑丞司匠催長等官亦照本府筆帖式之例凡十人內凖卓異一人仍遵例由該衙門自行奏請由府引見嗣後該衙門倘不遵奏凖定數濫行卓異即行參奏又奏凖黃新莊並盤山湯山三處行宫辦理事務官各一人均一例入於本府京察本內具題其行宫等處額設之七品八品苑丞苑副仍由該衙門該處考察入本具題一選補盛京司庫向以該處三旗佐領下人簡選補用雍正五年議凖盛京司庫令內務府總管簡選內府應升人員擬定正陪引見補授乾隆元年覆凖盛京司庫員闕仍將該處保送之人與在京應升人員一同引見補授十九年奏凖盛京內務府額設司庫三人內改授堂主事一人所遺之闕即行裁汰其司庫作為二人嗣後如遇主事闕由該處將應升人員保送由府引見補授一選補江浙織造官員江寧蘇州杭州織造官員闕於內府郎中員外郎內簡選引見補授司庫員闕於三處織造筆帖式庫使及在京筆帖式庫使內簡選筆帖式庫使員闕於在京筆帖式庫使內簡選均引見調補乾隆四年覆凖織造所屬之筆帖式庫使於各司院筆帖式內簡選將名籤入筒遇有織造處筆帖式庫使員闕該織造官呈報到府掣籤補用毋庸引見如織造處司庫筆帖式庫使內果有在任五年辦事稱職者該織造官出具考語保送酌量以應升之官同在京應升人員一并引見補授其筆帖式庫使如有過愆即行呈堂更換一限期題奏事件限三十日呈堂事件限二十日付咨事件限十日完結限內不完結者聲明情由呈堂展限再辦理事件計逾定限或遺漏注限於三月彙題疏內將該司該處應議人員分别聲明一應題奏行移案件每月二次造册送稽察內務府御史察核注銷廣儲司一設立六庫銀庫掌金錢珠玉珊瑚瑪瑙及諸寶石假庫掌龍蠎糚假紗紬絹布皮庫掌貂狐猞猁猻水獺銀鼠等皮及哆囉呢氆氌絨褐羽假象牙犀角凉席茶庫掌茶葉人參香紙顔料絨線衣庫掌朝衣端罩各色衣服瓷庫掌瓷器及銅錫器皿國初設御用監順治十二年奏凖各庫鑰匙每晚交送內廷收貯十八年改設銀庫假庫皮庫衣庫分掌出給康熙四年奉㫖各庫鑰匙交乾清門直宿侍衛班領十七年奏凖內務府所奏本章令廣儲司銀庫收貯十九年命內務府工部司官各一人往江西燒造瓷器二十五年奏凖皮庫偹用染色皮張停其委官前往著將貂皮水獺皮各一百五十張每年交與盛京送布來京之司庫攜回如式染就於次年送布時一并解送二十七年奏凖停止江西燒造瓷器二十八年增設茶庫瓷庫又議凖內廷交出一應金玉册寶印銀庫收貯內務府印廣儲司印亦交銀庫收貯用時各令筆帖式一人領取用訖封識繳庫又奏凖銀庫偹用一二三等赤金如成色不足呈堂鎔鍊足色其九成至四成淡金如不敷用凖動庫金鎔對偹用三十九年奏凖染色皮張不必定數每年酌量應染之貂皮水獺皮令盛京司庫攜回染就同布解