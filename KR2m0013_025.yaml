  text: 欽定四庫全書欽定大清㑹典則例卷二十二
  hash: sha256:92f2788850d573149898c1457571b50bd6b765f63a08e59fd1b58793b15a5a1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_025-1a, image: WYG0620/WYG0620-0424a.png}
body:
  text: 吏部考功清吏司科場一科場順治十五年議準順天府暨各省布政使解卷遲延十日者罰俸兩月仍詳察原文起解月日繫本官遲延者責在本官如與本官無涉繫解役遲延者行該管官從重治罪又題準官員不將正身書手選送或送雇替之人或送不堪用之人者罰俸一年又題準墨卷錯落題字及文內失格違禁後場違式真草不全等項應貼不貼者受卷所官各降一級調用如受卷官將不應貼而貼出者一卷罰俸三月二卷罰俸六月三卷罰俸九月又題準謄寫硃卷繫謄録官專責亦有謄録所錯落數行對讀所對出改正者如竟不經心對讀任錯不改者謄録對讀官各罰俸九月又題準場內所取中卷宜三場遍閲有同考官藍筆未經㸃到者降一級調用主考官不能覺察者各罰俸一年又題準場中如墨筆添改罪在主考將主考官降三級調用藍筆添改罪在本房將本房同考官降三級調用又題準中式硃卷面應先填舉子名次後填姓名其墨卷面雖有舉子姓名亦應填寫名次如違主考官各降一級調用十六年議準謄録所用硃對讀所用紫如擅用别色者該所官降一級調用十七年議準卷面列主考本房同考官職名各注批語不得遺漏錯亂如有違式不列及署名顛倒者責在主考將主考各降一級調用又題準各省鄉試外簾官將科目及正途出身之知縣教官一並取用倘有推託規避者罰俸一年知府徇私不察報者罰俸六月康熙七年題準墨卷題字及四書五經文章策論表判內字有錯訛謄録不照原字謄自行改正對讀官不行對眀徑送內簾一卷謄録對讀官各罰俸九月二卷各罰俸一年三卷各降一級調用四卷各降二級調用五卷各降三級調用六卷以上革職其墨卷錯字硃字卷改正內簾正副主考同考官均不知免議又題準收卷官將卷面籍貫不眀不行詳看駮回者經管收卷官各罰俸六月彌封官將卷面籍貫不眀不行詳看即錯印者經管彌封官各罰俸六月主考官原照所編字號中式如外簾錯編字號移送內簾於拆看時未及察出者正副主考官各罰俸六月又題準前場卷錯印後場卷號後場卷錯印前場卷號者其經管官罰俸三月又題準經管試卷用印官將試卷號印重印及用印糢糊者其經管號印官各罰俸三月經管號印官將木號印重送及移送木號印字糢糊者經管木印官各罰俸三月又題準應試舉人貢監生員等姓名㸃名冊內錯寫者其㸃名冊官各罰俸三月又題準彌封所不將試卷用條記移送謄録所者彌封官各罰俸三月謄録所見彌封所失印條記不行呈眀令其補印條記私自差役投送者謄録官各罰俸三月謄録書手姓名誤寫卷面者謄録官察出不行呈明及不行察出各罰俸三月又題準受卷所官將書經卷誤收詩經卷內交送彌封所彌封所官又不詳察錯印詩經字號送內簾者受卷彌封官各罰俸三月如有自行檢舉呈眀改正者免議又題準墨卷未落硃卷謄録遺句主考抹出同考官未經抹出者罰俸六月其舉人行文筆誤罰停㑹試一科倘未經抹出同考官每一卷罰俸一年正副主考各罰俸六月又題準册卷相同錯寫貼示字樣者經管貼示官罰俸三月又題準主考官場內發題如過卯辰二時不將題紙全發出者將正副主考官各罰俸六月又題準正副主考官遺批取中字樣同考官遺漏薦字者皆罰俸六月又題準正副主考一次出題錯字各罰俸三月本經同考官各罰俸六月正副主考官二次出題錯字各罰俸六月本經同考官各罰俸九月正副主考官三次出題錯字各罰俸九月本經同考官各罰俸一年自行檢舉者正副主考官各罰俸三月本經擬題同考官各罰俸六月十八年議準闈中閲卷每官􅍐分硃卷若干即於卷面上打某經某房木印如某房有弊即將本房本官處分如舉子應黜革一名者同考官即應革職舉子黜革二名以上者同考官革職提問舉子黜革一名者正副主考官降二級調用黜革二名者降三級調用黜革三名以上者革職舉子罰停㑹試三科者每一名同考官降一級調用正副主考官各罰俸一年罰停㑹試二科者每一名同考官降一級留任正副主考官各罰俸九月舉子罰停㑹試一科者每一名同考官罰俸一年正副主考官各罰俸六月又議準考官私訪聚談薦卷私通小帖所閲硃卷私帶入房主考同考暗帶主文幕友隨入內簾將硃卷埋藏偷換凡繫場內目擊情弊御史容隱不行指名題參如有别經發覺將內簾御史皆降二級調用二十五年議準官員失落試卷者罰俸一年如染汚損裂者罰俸六月又議準官員將黜革之人入考者降一級調用又議準各省主考官出闈之後許住省一月刋刻試録事完日即遵限回京不得任意遲延如有疾病事故仍照例取州縣官印結報部存案若無故在外任意耽延不行即回者各該衙門察參照奉差不復任例議處二十六年覆準官員奉文移取入簾推托不赴者罰俸一年三十九年覆準中式冒籍舉人其收考送考出結官並學臣及地方官教官照定例處分其主考官免議如舉人貢監生員濫認父母假冒籍貫品行不端者或被宗族鄰里告發或被科道糾參察審眀確即行斥革交送刑部如有察核不詳草率令其考試者照溷行收考例降一級調用其行察不據實呈報者照假冒出結例革職如冒籍之父兄在見任地方令其子弟冒籍者革職若不肖之徒賄買舉人及代為營謀者事發皆從重治罪六十年議準保定等衛軍户仍照舊例考試但恐不肖之徒改名易姓假冒衛籍令該府縣及教官察眀出具保結中式後有冒籍頂名等弊將頂冒之人照假官例治罪送考及出結官員照徇庇例處分雍正元年議準順天鄉試外簾官向繫調取直屬州縣但州縣官各有地方專責不宜久曠職守嗣後停其調取屆期將科甲出身之員外主事小京官行取主事守部進士舉人並翰林院庶吉士開列題請又議準中式之人如有聨號換卷𫝊遞埋藏夾帶文字等弊審實將不行察出之監臨提調監試巡察各官照容隱例降二級調用外簾搜檢各所官照溺職例革職如有通同作弊受賄者交送刑部計贓治罪又遵㫖議定如有下第諸生不安義命妄行鬨鬧者立即拏送刑部嚴審若內簾外簾果有情弊將各官照例嚴加治罪若毫無實據逞其私忿將本人照光棍例治罪如該管官不行察拏照容隱例降二級調用又覆準考官出場或正考官風聞中式之人與副考官同考官有弊正考官即行舉奏或副考官風聞中式之人與正考官同考官有弊副考官即行舉奏並同考官風聞中式之人與正副考官别房同考官有弊即行舉首將中式之人請㫖覆試本官免其失察處分倘正副主考官眀知而不舉或經科道糾參或被旁人首告交與刑部審實治罪六年覆準科場除違式應貼之卷收卷官照例呈眀監臨貼出外其應送彌封所試卷每十卷收卷官即用紙包裹固封送彌封所如收卷官將試卷與提調等官先行翻閲在京許監試御史外省許監臨指名題參將收卷並提調等官各降二級調用倘有指示改正等弊將收卷官並監臨官皆降三級調用如監試御史監臨官隱匿疏漏不行題參别經發覺各降二級調用其試官閲卷必將後場試卷盡行細加校閲首場雖佳而二三場草率者不得取中若首場雖屬平通而後場眀確通逹者亦得取中不得專重頭場忽略後場如經磨勘策判有剿襲雷同者將主考房官一并題參議處十三年議準文武生員及舉貢監生遇本生父母之喪令其呈眀期年內不許應歲科兩試及鄉㑹試其童生亦不許應府州縣及院試其隱匿不報朦溷干進者事發照匿喪例治罪又議準鄉試之年應試諸生如有因本房無官卷之例揑造出繼或已經出繼因本房有官卷之例改回本房及本房已經降革而子孫弟姪猶指稱官卷並以恩養螟蛉溷入官卷者或經告發除本房革職本生黜革照例治罪外將該教官州縣官皆降二級調用知府直隸州知州降一級調用布政使司降一級留任巡撫學政罰俸一年乾隆元年議準順天鄉試外簾官將小京官及額外主事守部進士等官內開列具題其庶吉士相應停其開列倘有推托規避者罰俸一年又議準㑹試與順天鄉試內簾主考同考官除同姓無服者與郎舅中表等戚不必回避外其有服之同姓與翁壻甥舅皆令回避如將應回避之人不行開出者革職又覆準大比之年凡試卷內㸃畫小誤及擡頭少差之類免其貼出仍準謄録三年議準各學教官務將科場條規平時傳集諸生嚴行訓諭務使臨場凛遵成憲如有不遵約束紊亂場規者該監臨官察參將該教官降一級調用若該學政於士子科舉時不慿文字之優劣濫行收録將該學政罰俸一年十五年諭今年鄉試屆期已降㫖令直省監臨等官嚴加搜檢屛除弊端以副賓興大典朕思外省房考各官例將本省科目出身之見任同知通判州縣調取委用向因入闈閲卷非隔省逺出可比所有印務例不委員署理一應案件皆準展限但計奉調之初以及揭曉之後為期不啻一月有餘於公務不免曠誤且本省州縣等不皆科目出身之員每值鄉闈皆可先期揣摩而州縣等以本任無署理之員雖經奉調其於未入簾以前甫徹棘以後一切稿案尚須攜帶辦理中間幕友胥吏家人子弟往來出入或不免與士子結納夤緣招搖生事著於本年為始各省房考於奉文調取之日即委官署理案件不展限庶該房考得以嚴密關防專心分校而士子等不得妄希幸獲照應關通以慎司衡以重官守著為令欽此學政附教職一考核學政康熙二年題準學政據教官舉報劣生不行盡法懲處者一名降四級調用二名革職十八年議準提學有積習十弊一童生未經府考冊內無名鑽求學政徑取入學巧圖捷便一弊也一考試各府州縣衛所童生額外溢取撥發别學眀收冒籍以占本縣正額二弊也一彌封編號印簿及場內坐號紅簿不發該府州縣封貯及收存學道署內私察某卷某號繫某人對號賄買三弊也一考完一府不將紅案速行發學任意遲延徇私通賄更改等第拔下作上四弊也一每考一處令書辦承差快手人等出入過付暗訪生員稍有家資者先開六等考單嚇詐保等有銀送入準放三等五弊也一文童額少武童額多將文童充為武童入學之後夤緣改文娼優隸卒濫行收取善騎射者擯而不録六弊也一各府地方設有考棚憚於親往將生童逺調考試其各州縣告病生員扛擡驗病困苦難堪七弊也一縱容無賴教官包攬生童私通線索效勞分潤名為作興大壞風教八弊也一曲徇上司同僚情面並京師鄉宦私書及親屬朋友隨往地方討情抽豐將孤寒之士棄而不録九弊也一報部學冊將額外濫取入學之童生未經科歲考試豫附三等其姓名不入新案造入事故衣頂項下以趙甲頂補錢乙溷作實在之數朦報禮部十弊也嗣後考核學政之時均注剔除此十弊若不能剔除此十弊者該督撫指參有貪贓之弊者照貪贓例革職提問如無貪贓之處照才力不及例降二級調用其考核疏內不注剔除此十弊字樣並未有剔除而注寫剔除者由部察出或科道糾參果實將該督撫照不報劣員例降三級調用至督撫有需索陋規者被科道糾參果實將該督撫亦照貪贓例處分至上司同僚京官鄉宦私書及親族朋友隨往地方討情抽豐至州縣官傳遞私書鄉紳投刺請席者督撫科道題參有官者革職無官者交與刑部治罪二十五年議準學政考試遲延限內不能完結者降一級調用三十一年覆準學政或有將祠生贊禮生額外濫行批設者照濫取入學例議處三十九年議準凡督撫勒索學院棚規司道需索常規及學臣與者皆革職提問如有勢宦京官請託及教官巡捕進士舉人說情並書吏皂快之類討賞事發有官者革職提問無官者從重治罪若學臣徇情市恩者亦革職一并提問知府如有包攬入學童生要挾抑勒將文理不通之童生考送者或學臣申報或督撫指參將知府革職提問學臣與提調知府扶同作弊者一并革職提問如督撫不行察參學臣不行申報者皆革職再督撫如有藉考名色及開送秀才童生者照勒索棚規例治罪知縣有賄薦案首及各官效勞分肥提鎮等官說情並學臣扶同事發者皆照例治罪如學臣遇有挾制干請者準徑封奏上聞再姦胥猾吏如有勾通惡劣蠹棍勢僕私親密友招搖者令該地方官察拏照光棍例治罪再祖父兄弟為子孫弟姪營謀者事發除本童責革外祖父兄弟有官者革職無官者從重治罪雍正五年議準提調官如聽學臣貪墨通同作弊及引誘為非者一經發覺將提調官照貪官例同學臣一并革職提問如學臣暗通關節私鬻名器提調官雖無通同引誘情弊而防範不嚴照溺職例革職如有猾吏姦胥招徭撞騙以及受賄傳遞等弊提調官不行訪拏究治别經發覺將提調官照失察衙役犯贓例議處倘學臣保守清廉杜絶情弊而提調官不得遂其引誘反行挾制把持者準學臣即行指參審實將提調官照貪官例治罪七年諭士子者百姓所觀瞻士習不端則民風何以得厚是以考課士子設立舉優黜劣之典以為移風易俗之道所關亦綦重矣而無如教官愚懦無能學臣因循茍且往往視為具文奉行不力每當學臣按試之時教官輒以無優無劣具文申詳草草塞責如此則善者何由而勸不善者何由而懲夫善者之湮沒不彰一時尚難覺察而不善之人僥幸茍免於目前不旋踵而劣蹟敗露每見蕩間踰檢犯法亂紀之士子皆從前學臣教官之未曽開報劣行者其間情罪雖難一一追究然即此可知其中之容隱不少矣嗣後若教官沽名邀譽縱容劣生不行舉報者經學臣察出立即指參將教官照溺職例革職若學臣瞻徇情面不行糾參者一經發覺將學臣照徇庇例降級調用將此永著為例欽此又議準貢監生員拖缺錢糧經州縣等官申報學政即行黜革照民例治罪如學政徇隱不報者降三級調用又議準官生録科學臣秉公嚴加考試不許瞻徇情面濫行録送入場如官卷內有文理荒謬幸邀科第者發覺之日將送考官照濫行收考例議處十三年覆準槍手入場經學政飭發鞫審倘該提調官不實力嚴緝照軍犯脫逃例初參罰俸六月再限一年緝拏限滿不獲罰俸一年照案緝拏至槍手日久潛歸而原籍地方官漫無覺察仍聽應考或再經作弊事發者照軍犯私回不行察出例將原籍地方官罰俸一年乾隆元年覆準學臣考試地方如有姦棍聚衆生事凌脅官長等情學臣繫封鎖衙門內外隔絶無由禁緝該提調及地方官並駐防武職等官立即協拏務獲審實照例分别首從治罪若提調及地方官事前不能豫先鈐止事後又不嚴拏及批審之後徒以一二軟弱無辜抵塞結案者聽督撫學臣據實題參交吏部嚴加議處武職交兵部議處其廩保不加詳慎濫保匪人以致場內生事者將該生褫革又覆準直省選拔貢生咨送到京欽㸃大臣嚴加考試倘該學政不秉公核實有徇情冒濫等弊及咨送到京考試有學問荒陋人品不端才具庸劣者除本生斥革外仍將該學政照例分别嚴加議處又議準生員偶有過愆止應戒飭者地方官㑹同教官照例在眀倫堂朴責如有擅自叱呵飭責者聽學臣察參以違例處分其有肆行不法等事該地方官一面察拏一面申詳督撫學臣革退審理如地方官挾私妄報察出將地方官照例分别參處如繫生員恃襟橫行嚴審按律定擬四年覆準各省學政將缺考各生務令按次補考即於彙報歲科學冊內分别補考一項逐一細注以慿察核如有將數次只考一次及徑行附等之處即咨部照徇情例議處一考核教職康熙四十三年議準教職部選後由撫臣考核一二三等者給慿赴任四五等者解任學習三年再行考試六等者革職雍正四年覆準各學教官所屬文武生員果能盡心勸導閲俸六年之內所屬士子並無過犯該督撫學臣據實保題準其以應升之官即行升用又議準凡計典內教官賢否皆由知府具報則教官賢否勤惰知府原有稽察之責令各省督撫轉飭各府必從實考核如有姑息容隱將該管知府照徇庇例題參議處七年議準教官除錢糧拆封比較生員拖缺錢糧並州縣㑹審案件凡有關戒飭生員之處仍令赴州縣衙門公同辦理外其一切地方事務均不得干與倘州縣官不遵定例仍傳教官同辦地方事務而教官違例前往干與者一經發覺將州縣官照將事務交與不應交之人例議處教官照不應得為而為之律分别議處又議準新進武童新案到學教官造册移送駐防武職備案每月定期傳集諸生㑹同考驗弓馬內有生疏者寬限學習限滿仍未嫻熟面加訓飭如抗不赴考或託故規避移學責警其生事犯法者據實即㑹詳褫革究擬倘教官徇庇不移㑹有司轉詳學臣咨部照徇庇劣生例革職又議準貢監生員包攬錢糧將不行察出之該管官罰俸一年十二年覆準貢監生員果有豪橫不法行止有虧者地方官先報學臣斥革以便審擬一面咨詳禮部如日後審眀無辜實繫牽連者即詳眀開復其拖缺錢糧革後全完者該地方官照例即詳請開復如抑勒索詐不即詳請並故揑情弊詳革不實者一經察出將該地方官題參皆照例分别議處又議準各學教官所屬貢監文武生員有窩匪抗糧揑辭生事唆訟陷人滅倫悖理等事該教官即行詳報州縣及督撫學臣者免其議處若漫無覺察或被府州縣訪出及傍人首告審實不準補開詳揭將正副教官照溺職例革職如府州縣官曲徇情面於事發之後仍令該教官補開詳揭將府州縣官照徇庇例降三級調用若教官於此等不法生監有受賄徇隱及借端勒索等弊察出將該教官革職交與該督撫分别究擬府州縣不行申報者亦照徇庇例議處十二年覆準教官按月月課四季季考除實在丁憂患病游學有事故之外其餘生員照定例嚴加考試如有託故三次不到者該教官即行嚴傳戒飭其有並無事故終年不到者詳請褫革如教官內不力行課試經上司察出揭報咨參計其月課季考廢弛次數每一次罰俸三月二次罰俸六月三次罰俸九月四次罰俸一年若視為具文將月課季考竟不舉行者革職十三年覆準文武生員如有犯聚賭誘賄等事該管教官自行察出詳報者免其議處其失於稽察者罰俸一年若眀知賭博不行察報别經發覺者將該教官革職留任至教官失察士子造賣賭具即照溺職例革職乾隆三年覆準各省教官有仍前勒索贄見規禮以致舉報優劣不公一經發覺令該督撫學政核實參處將該教官照借師生名色私相餽送例革職倘别經發覺將該督撫學臣照不行詳察例議處十八年諭向例各省教職六年俸滿該督撫學政公同甄别堪膺薦舉者保題送部引見其年力衰邁者咨部休致但督撫陋習既不肯輕保舉亦不肯多咨革是以保題者固屬寥寥而休致者亦不多見惟使龍鍾衰老之輩濫竽戀棧無所區分蓋視教官為無足重輕初不計及為造士之根本也前以選拔貢生為教職之階曾降㫖訓諭各督撫學政令其加意慎重嗣後教職除有劣蹟者隨時參劾外至六年俸滿堪膺民社者保題其年尚强壯精力未衰可以留任者出具考語送部引見若準留任俟六年再滿仍如是甄别如年老人員即著咨部休致有願來京引見者照大計之例該督撫聲眀給咨引見至訓導一官例止得升縣佐該上司尤多忽略嗣後甄别之例與教職同著為令欽此欽定大清㑹典則例卷二十二
