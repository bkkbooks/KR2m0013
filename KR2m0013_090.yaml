body:
  text: 禮部祠祭清吏司喪禮一下世宗憲皇帝大喪儀雍正十三年八月二十三日世宗憲皇帝崩皇帝於本日親視小斂至申時大斂奉梓宮於乾清宮中設几筵簡命王公大臣恭理喪儀並簡進爵大臣皇帝截髮辮諸皇子咸截髮辮成服皇太后皇后妃嬪公主皇子福晉及凡宮人等咸剪髮摘耳環成服大行皇帝鹵簿全設親王以下有頂帶官員以上公主和碩福晉以下佐領三等侍衛妻以上及內府男婦咸齊集近支王等福晉遵從前世宗憲皇帝之旨在內齊集是日奏準按八月節氣每日於辰時設朝奠申時設夕奠午時獻饌筵二十四日諭朕受皇考鞠育顧復深恩昊天罔極今忽遭大故龍馭上賓朕自念生平無纖毫之報答日夜哀泣痛入五中況我皇考仰體聖祖仁皇帝付託之重教養萬國臣民十三年來旰食宵衣苦心遠慮備極勞瘁此朕所親知親見者是以薄海內外共享升平之福貽及子孫不獨朕心感切仰報無由也若服制一節仍遵定例朕心實為不忍惟有行三年之喪稍盡思慕之情於萬一天下臣民仍照定例行著諸王大臣即行會議具奏欽此又諭嗣後奠獻時總理事務王大臣著在乾清宮廊下瞻仰行禮欽此是日朝奠時由部將齊集之王公大臣蒙古額駙等職名開列具奏奉旨特簡親王貝子公等數人進內瞻仰此後王公大臣及額駙台吉等有初到者均遵旨開列職名進呈候旨命其進內瞻仰是日奏大行皇帝入梓宮後鹵簿大駕全設設丹旐於乾清門外之左王以下文武各官以上公主和碩福晉以下宗室之女佐領三等侍衛等之妻以上咸令成服革職宗室覺羅亦令成服革職滿漢大臣官員不準與外藩進貢人員並外藩公主福晉郡主等額駙王台吉等若未除服前到京並令成服除服以後令其男摘冠纓女摘耳環三日專司太廟奉先殿夀皇殿祭神殿陵寢祭祀事務男婦內監等及出征在軍營官兵家屬皆停給孝服本人父母新喪及兒女出痘暫免成服御前大臣侍衛乾清門侍衛等咸令在乾清門內五旗王以下入八分公以上內大臣內閣大學士前鋒統領護軍統領上三旗都統副都統學士等及上三旗侍衛內務府官員每日令其三次在乾清門外分翼排立五旗都統副都統八旗官員各部院大臣官員漢大臣官員均每日令其三次在景運門外分翼排立俟奠獻時隨班行禮舉哀若命婦不齊集日右翼大小官員令其照常在隆宗門外排立王貝勒貝子公大臣等公主和碩福晉以下郡主入八分公夫人以上每日令其三次俟奠獻時隨班行禮舉哀在內皇子王等福晉公主郡主等令其在景山前東柵闌外乘馬進神武門至蒼震門下馬進內五旗王等福晉郡主等令其在景山前東柵闌外乘馬進神武門至隆宗門下馬進內大臣夫人令其在景山前東柵闌外乘馬至神武門下馬步行進隆宗門在京漢文官隆宗門外齊集每日隨班舉哀三次三日後停止四日王貝勒貝子公公主福晉等皆各在私第部院官在各公署間散官在闕門外共齋戒二十七日王以下文武官一年不作樂百日不嫁娶在京軍民人等摘冠纓素服二十七日一月不嫁娶百日不作樂二十七日不祭祀漢文武候選候補官舉貢生監吏典僧道官咸素服於順天府齊集早晚哭臨凡三日未除服內批本用藍筆各部院行文皆用藍印奏章俟十五日後再行具奏均用朱印京師寺廟各聲鐘三萬杵本日奉旨是過十五日以後仍用藍筆是日王公百官及福晉命婦等哭臨仍照二十三日齊集之處齊集行禮二十五日奉旨聖祖仁皇帝龍馭上賓時間散覺羅等曾與孝服今皇考大事亦著照前例行又諭大行皇帝前奠獻茶膳所須器皿皆著用皇考從前常用者尚膳人員於奠獻陳設不甚熟練嗣後著伊等將膳案舉至乾清宮前簷下令內監接進奠獻欽此又奉旨頒發大行皇帝遺詔例繫大學士恭奉安設於几筵前東案朕今欲親身恭奉安設二十六日奉旨皇考前奠獻時間散宗室覺羅皆在乾清門外齊集亦著伊等進乾清門瞻仰如何令伊等瞻仰之處議奏遵旨議準每奠獻時以宗室三十人覺羅二十人輪流入內瞻仰以申哀慕二十七日頒大行皇帝遺詔大學士奉詔至乾清宮簷下皇帝接受安奉於黃案行一跪三拜禮興由乾清宮左門出西嚮立大學士由右門入進至黃案前行三叩禮跪奉詔興由中門出皇帝跪候過回苫次餘儀均與康熙六十一年同統兵大臣官員於遺詔到日摘冠纓素服跪接進營行三跪九叩禮跪聽宣讀畢舉哀行禮官兵皆摘冠纓三日直省文武各官遺詔到日摘冠纓縞素跪接至公署行三跪九叩禮跪聽宣讀畢興舉哀行禮成服朝夕哭臨凡三日至二十七日除服官員命婦軍民人等及妻皆二十七日素服凡有頂帶官員及舉貢監生典吏僧道官咸素服於各該管衙門內朝夕舉哀三日督撫提鎮咸免進香悉照康熙六十一年喪儀定制行是日奏準九月初一日辰時三刻值日食是日朝奠請移於卯時正二刻九月初一日祭帝王廟承祭官及分獻執事官咸素服雨冠不作樂百官不陪祀初四日諭自古臣子之於君父皆有諱名之義載在禮經著於史册所以展哀慕而致誠敬也雍正元年皇考特頒諭旨謹將聖祖仁皇帝聖諱二字欽定避易書寫今朕紹承大位哀痛方深皇考聖諱理應恭避敬遵皇考從前欽定典制嗣後凡內外各部院文武大小衙門一切奏章文移遇聖諱上一字則書允字聖諱下一字則書正字該部敬謹遵行欽此又諭自古聖帝明王功德大成必有顯號徽稱所以昭垂萬世典至巨也我皇考大行皇帝乘乾御極撫御萬邦錫福諴民德化翔洽虔恭寅畏昭事蒼穹郊祀祈年必親必敬欽承祖烈光大前猷至孝肫誠千古未有當皇祖上賓時盡制盡倫喪儀隆備親送梓宮屢謁陵寢歲時瞻拜御容舉念常伸孺慕繼顯謨之盛推錫類之仁宸衷祗敬則朝乾夕惕歷久彌勤親政憂勞則盛暑祁寒未嘗稍間整綱飭紀明目逹聰施措咸宜德威並用篤宗室則立學以隆教育惠八旗則賜帑以備吉凶厚臣工而加俸養廉眷忠臣而建祠賜祭勵廉能以察吏宏薦拔以羅才廣藉田以重農桑定品式以崇節儉重道則經筵歲舉愛士則科目頻加隆先師五代之王封新闕里千秋之廟貌修明典禮懷柔百神厚植綱常旌揚節孝蠲逋減賦不惜億萬之帑金開墾築堤永享萬年之樂利備振則廣行積貯養兵則優贍身家律例則釐定科條決讞則特詳咨酌廣開言路詳示硃批洞矚羣情慮周六合大閲以詰兵戎訓練以修武備睿謨獨運而小醜立奏蕩平聖武布昭而荒徼永圖綏靖開天明道聖學髙深覺世牖民宸章炳煥闡聖賢之精蘊宣心性之圓機函蓋古今彪爍宇宙天心協應有感必通德盛化神諸瑞畢至千古帝王之良法善政至皇祖而集其大成我祖宗之駿烈宏猷逮皇考而益徴善述眇豫沖子寅奉丕基仰惟功德之隆宜備尊親之典敬循禮制恭上尊諡廟號爾部詳察典禮具奏欽此又諭諸王大臣奏稱三年之喪難以舉行請朕仍依舊制以二十七日除服朕受皇考顧復深恩昊天罔極中心哀慕實不能自已所以欲行三年之喪稍盡子臣之誼朕承皇考付託之重總期恪守貽謀仰遵先志使天下乂安永享升平之福乃朕之孝非以持服三年遂為盡孝也自古帝王亦有行三年之喪者今諸王大臣所引杜預心喪之説後人多議其非朕自幼讀書與未嘗披覽載籍者有間此等議論豈可援以為據耶若以遺詔有二十七日釋服之旨此乃為天下臣民而言非指朕一人也從前皇祖聖祖仁皇帝沖齡踐阼未得舉行而我皇考大行皇帝即位之時軍國重務速應辦理之處甚多是以俯準廷臣之請然素服齋居三年如一日也今經皇考十三年宵旰勤勞孜孜圖治舉凡大綱小紀莫不悉有章程今日遵守成規一如皇考在日朕親承指授一一奉行不已輾轉思維三年之喪在朕今日實屬可行況昨日大學士等奏稱十五日以後應照例送本辦事朕已允行豈行三年之喪遂不能辦理一切事務乎至於郊壇祭祀大典原可並行不悖諸王大臣所奏以日易月之説斷不準行朕意已定毋得再請其如何舉行三年之喪諸王大臣詳稽典禮確議具奏欽此是日奏準恭上尊諡廟號大典攸關應遵舊典會同諸王大臣九卿詹事科道文官六品以上武官四品以上詳考舊章從公確議初五日行殷奠禮與康熙六十一年儀同是日送燎皇帝親詣祭酒自是每祭送燎奏遣大臣祭酒皆奉旨親詣初六日諭朕惟致治莫先於崇孝徽稱首重夫易名天地之覆載同功帝后之尊親一體欽惟孝敬皇后作配皇考𢡟著坤儀孝德夙洽於宮闈仁惠久孚於壼掖朕恭承顧復備荷恩慈兹恭上皇考大行皇帝尊諡宜並追崇恭上尊諡以展孝思以昭萬世爾等詳稽典禮具奏欽此又諭各省督撫大員有進貢方物之禮昨福建督撫齎到閩省果品仍照例進獻於皇考之前者朕不便發回已交所司敬謹收貯以備几筵供應之用若遠省大員進貢皇考之物已齎送在塗者準其赴京交奏事官員轉奏其各省照例進朕之物槩行停止雖食物果品亦不許進俟三年之後候朕再降諭旨著通行傳諭各省督撫等一體遵行欽此初七日諭今日禮部奏稱奉移梓宮擇於本月十一日伏念奉移之期太近朕覽奏慟入五中諭令展期而諸王大臣奏稱奉移之後尚有大祭典禮限於時日不便更易朕勉從十一日之請禮部又奏稱梓宮出東華門時朕乘輿由别路先至雍和宮迎迓等語朕在哀痛迫切之際豈可乘輿由别路前行當步行隨梓宮後送至雍和宮禮部又奏稱奉安梓宮之後是日朕即回宮等語敬思梓宮安奉之後哀慕正切何忍遽離朕意欲於雍和宮苫次居住百日稍展思慕之忱於萬一欽此是日奏準奉移梓宮皇帝聖孝純篤必欲步行不敢勸阻至於雍和宮居住百日之諭旨再四酌議二十七日後皇帝涖官聽政必應在宮殿之中此乃一定體制謹仰體皇帝孝思請於二十七日內皇帝在雍和宮苫次居住至奉移梓宮之日及大祭次日繹祭之期皇帝例應回宮者仍應循照國朝定制又諭諸王大臣援引典禮議稱朕於二十七日之後應在宮殿之中乃一定之體制等語朕思二十七日之後既不於雍和宮苫次居住則朕哀慕之思何能自釋應於百日之內每日親詣雍和宮一次奠獻諸王大臣將親詣時刻酌定具奏欽此遵旨議準二十七日後皇帝涖官聽政事務殷繁若每日親詣雍和宮一次往來數十里難以兼辦政務謹擬奉移梓宮後百日內應請皇帝於數日親詣雍和宮一次其親詣之日或早或午不必拘定時刻如此既可展皇帝之孝思而於典禮亦協初八日奉旨一月之內朕每日親詣一次一月以外間一日親詣一次兩月以外間二日親詣一次初九日諸王大小官員議奏欽惟大行皇帝丕冒八埏曲成萬物有與天同體之德有敬天行健之功凡運會之彌昌彌熾皆聖德之可法可傳中以宅心正以體政文以敷化武以定功英以決幾明以燭理寬以居之仁以行之信以成之毅以守之而皆本之於大孝運之以至城謹按虞書曰慎乃憲説命曰惟聖時憲又曰監於先王成憲周禮疏云憲法以示人曰憲蓋惟憲天立教之聖人然後能慎法度修政事俾萬世奉為成憲守而不忘若虞舜商湯周之文王武王皆是也竊謂大行皇帝尊諡於憲為宜又按禮記祖有功宗有德周公作無逸稱殷有三宗而周文武之廟並稱世室竊惟大行皇帝廟號宜稱世宗與太祖太宗世祖聖祖並為百世不祧之廟擬敬上尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號曰世宗天下萬世稱曰世宗憲皇帝庶足以顯揚大德表著巍功本日諭諸王大臣公同議上皇考大行皇帝尊諡曰憲皇帝廟號曰世宗於我皇考至德鴻猷實相符合禮稱祖有功宗有德廟號之稱祖稱宗均屬尊崇之極而象功昭德惟期允當方協公昔我皇祖聖祖仁皇帝久道化成身兼創守平定逆藩掃清朔漠神功駿烈自古莫與比隆廟號定應稱祖皇考大行皇帝善繼善述敬天勤民十三年來宵旰憂勞咸熙庶績昭萬年之景福固百代之丕基廟號世宗正合古宗有德之意上配烈祖百世不祧此乃天下萬世之定論非在廷諸臣尊崇祖父敷揚稱頌之私情尤非朕一人哀感隆恩表章盛德之私願所能強置一辭也在我皇考神謨垂於宇宙厚澤洽於臣民即罄厥揄揚難盡萬一今據所奏敬擬上尊諡廟號詳慎公當足以昭示萬年朕心深為慰愜所有應行典禮該部敬擬具奏欽此是日以奉移梓宮祗告几筵讀文致祭行啓奠禮皇帝親祭酒命總理事務辦理喪儀王大臣及近御諸臣齊集乾清門內隨行禮餘儀與初五日殷奠同初十日諭十月三十日為我皇考聖誕伏思皇祖聖誕之期天下臣民虔誠齋肅禁止屠宰嗣後恭遇皇考聖誕之日著遵照此例敬謹奉行欽此十一日奉移大行皇帝梓宮暫安於雍和宮皇帝步行恭送是日鹵簿全設屆時皇帝詣梓宮前祭酒三爵退跪於東旁俟奉移梓宮升小輿皇帝躬導至景運門外梓宮登大升輿皇帝於東北隅西嚮跪禮部堂官祭輿三祭酒行三叩禮衆隨行禮畢靈駕發皇帝於左旁隨行由東華門東安門出王以下公以上於東華門外按翼齊集內務府官於東安門內西旁齊集左翼民公侯伯以下有頂帶官員以上於金魚胡同南大街齊集右翼民公侯伯以下有頂帶官員以上於鐙市口北大街齊集漢文武各官於新橋東大街齊集皆候靈駕至跪迎舉哀候過隨行皇太后率皇后妃嬪由神武門地安門出豫往雍和宮殯殿後恭候公主福晉以下內務府官員妻以上咸豫往各齊集處排立候靈駕至舉哀跪迎內府護軍領催人等之妻皆於東華門內三座門外跪舉哀候過舁輿夫役八班首班末班以鑾儀校尉八十人餘班每班八十人選五城民夫給以衣履令其澡沐又以民公侯伯一等侍衛以下參領輕車都尉以上給事中御史郎中以下員外郎等官以上每班令八人管轄鑾儀衛官四人輪流指示進退舁丹旐每班三十二人以部院官四人內府官四人隨行所過門橋遣內大臣祭酒焚楮錢梓宮至雍和宮昭泰門前降大升輿登小輿由中門入於雍和宮永佑殿暫安奉皇帝隨入殿外東旁立執事官入內奉安梓宮畢皇帝入立左旁王以下奉國將軍以上大學士以下副都御史以上民公侯伯以下副都統以上於雍和門外兩旁序立舉哀其餘大小官員咸於昭泰門外序立舉哀皇帝祭酒三爵每祭行一拜禮衆皆隨行禮畢焚楮定丹旐遂以别殿為苫次皇太后皇后妃嬪皆還宮衆各退是日諸王大臣遵旨議定三年喪禮具奏本日召入諸王大臣靣諭諸王大臣所議三年喪禮援據經傳斟酌典章甚為詳悉朕惟皇考臨御十有三年居心行政念念出於至誠此諸王大臣所共知共見者皇考聰明天亶建極綏猷垂法萬世朕雖不能仰企萬一惟此誠之一字實欲身體力行黽勉效法以圖善繼善述至持服三年乃朕哀慕至情萬不能已並非欲博行三年喪之名也況持服三年亦何足以言孝所願吾君臣同德同心勤求治理使民物康阜海宇乂安令天下咸頌我皇考付託得人此吾君臣所當勉者今覽所奏諸王大臣深悉朕迫切苦衷俾得稍展哀忱可謂能諒朕心矣但所議尚有一二宜酌者如元旦朝賀請朕吉服升殿朝正固國家之吉典然羣臣實為朕一人稱慶在二十七月之內吉服受賀朕心實切不安又稱御門涖官聽政用素服冠綴纓緯等語朕縞素齋居凡一切引見官員啓事降旨皆可於便殿隨時舉行非必須御門方可辦理也至郊廟大祀朕自不敢因一已孺慕之私情有闕天祖禘嘗之巨典所議朕詣行禮甚是但先期齋戒所以潔齋心志對越神明朕意遇齋戒之日即當素服冠綴纓緯其視祝版亦當照例用禮服以昭敬謹朝日夕月雖遣官行禮然誠敬之心默為昭格陟降左右不啻親承朕意於遣祭正日亦應素服冠綴纓緯方與禮意相合又所議朕躬及羣臣諸典制皆屬明備皇后妃嬪及皇子持服之處尚未議及爾等一並詳稽典禮再議具奏欽此遵旨議準謹按王制喪三年不祭惟祭天地社稷為越紼而行事注謂不敢以卑廢尊是天地社稷之祭三年之內於古禮本當親行明呂坤謂祖宗不輕於父母奉祭不緩於居喪何可久廢誠以天祖一理宗廟之祭亦當並舉凡遇天地太廟奉先殿社稷大祀皇帝親詣行禮皆禮服行禮作樂先期齋戒用素服冠綴纓緯視祝版用禮服朝日夕月饗帝王先師先農遣官行禮咸用禮服作樂正祭之日皇帝素服冠綴纓緯按諒隂之制先儒謂上古本無可考史載魏孝文帝唐德宗釋服後仍以素服練巾聽政宋仁宗雖用以日易月之制改服臨朝宮中實行三年之喪蓋縞素不可以臨朝前代行三年之喪者亦惟宮中素服而已朱子云人主不免於視朝聽政豈可不酌輕重而為之權制此不易之論也謹擬百日內皇帝服縞素百日外請髮易素服詣几筵前仍服縞素御門涖官聽政恭詣皇太后宮咸素服冠綴纓緯遇升殿受朝不宣表不作樂咸用吉服禮服並一切典禮咸用禮服至二十七月服滿照百日禮致祭禮畢皇帝除服帝后齊體服制不容有異皇后持服自應遵照皇帝舉行伏惟皇后朝夕侍奉皇太后兼有祭神報祀之禮應於二十七日後在宮中素服遇一切典禮日期咸禮服恭詣几筵前仍用縞素妃嬪於二十七日除服後二十七月之內咸素服遇一切典禮日期咸禮服皇子與諸王羣臣同在京王公百官咸二十七日除服百日剃頭除服後各衙門有應行典禮及朝會坐班仍用禮服吉服從事入朝奏事在署辦事咸素服冠綴纓緯恭詣几筵前則冠去纓緯二十七月服滿皇帝除服後咸遵吉禮行在京王公百官二十七月內不作樂不燕會一年內不嫁娶外省官員及軍民人等仍照從前定例行各衙門進呈本章於二十七日百官除服後皆用硃印二十七月內門神對聨太和殿中和殿保和殿仍照常張挂餘處俟除服後張挂王公以下有頂帶官員以上咸俟二十七月後張挂軍民人等仍照常例行十五日行初祭禮是日早陳羊酒祭筵各祭物如數設大行皇帝冠服於几筵陳鹵簿大駕於雍和門至寰宇尊親牌坊陳楮錢於牌坊內和碩親王以下內大臣侍衛民公侯伯副都統侍郎以上咸於雍和門外按翼序立內府佐領內管領於雍和門外序立三品官員以下有頂帶官員以上於昭泰門外按翼序立在內皇子王等福晉公主郡主等在雍和宮內照常齊集在外諸王福晉以下子一品夫人以上在大門內右旁齊集三旗內府佐領內管領下官員執事人護軍領催等之妻在命婦後序立雍和宮月臺兩旁安設祭品案中間設祭酒案殿簷下西旁設祭文案質明禮部堂官恭奉祭文由雍和門中門入陳於案至時奏請皇帝詣几筵前舉哀讀祝官奉祭文跪皇帝跪衆皆跪暫停舉哀讀文畢舉哀皇帝祭酒三爵每祭行一拜禮衆皆隨行禮祭畢皇帝復原位立舉哀俟徹饌畢讀祝官奉祭文禮部堂官前導至燎所東立西嚮皇帝豫出左門祗俟內監等恭奉大行皇帝冠服出皇帝跪候過隨行至月臺下內大臣十人前引出雍和門中門王公內大臣侍衛二品以上大臣官員咸跪候過隨行鴻臚寺官豫引昭泰門外齊集各官至燎所東西牆旁序立俟祭文大行皇帝冠服至皆跪候過起立皇帝詣祭酒處跪衆皆於原立處跪大臣進爵皇帝祭酒三爵每祭行一拜禮衆隨行禮祭酒畢皇帝興東嚮立俟進爵大臣灌畢止哀皇帝退由西牆門出乘輿還宮衆皆退是日奏準蒙古額駙等於十六日質明詣雍和宮瞻仰几筵十六日繹祭內務府禮部工部堂司官員等及內務府官員等妻齊集舉哀致祭陳設禮儀與康熙六十一年同十八日奏準漆飾大行皇帝梓宮應照欽天監選擇吉期自本月二十四日起照例漆飾四十九次今先行漆飾數次天氣漸寒暫行停止俟來春再加漆飾十九日行大祭禮齊集讀文舉哀致祭皇帝親詣祭酒陳設禮儀與初祭禮同是日在京王公文武各官咸除服二十日繹祭陳設禮儀與十六日同二十三日行周月致祭禮王公各官咸照常齊集行禮致祭儀與初祭同後凡遇周月致祭禮儀皆同二十六日遵旨議準恭上大行皇帝尊諡廟號所有應用玉册玉寶香册香寶絹册絹寶及寶盝册箱袱架等項均交工部敬謹造辦其册文寶文交翰林院撰擬至告成日令欽天監擇吉由部以恭上尊諡應行典禮具奏十月十三日遵旨議準謹按郊祀巨典吉禮攸先但今冬至大祀尚在大行皇帝賔天百日之內此次祀典應遣官恭代至明年正月上辛祈榖則已逾百日請於乾隆元年正月祈榖時恭請皇帝親詣行禮又按十一月十三日為聖祖仁皇帝忌辰見在百日內鑾輿未便逺行亦應遣官恭代俟明年清明節親詣景陵為期不遠得展孝思至歲暮大祫已逾百日所屆合食之期允宜恭請皇帝親行祼獻十六日奏準十月三十日大行皇帝聖誕皇帝早詣雍和宮於几筵前行禮未滿百日應仍喪服十一月初二日題準恭選得十一月十二日巳時恭上大行皇帝尊諡前期一日遣官各一人祗告天地太廟後殿奉先殿社稷暨孝敬皇后几筵至日陳鹵簿於雍和門外皇帝素服御太和門閲册寶行一跪三拜禮畢還宮易喪服詣雍和宮别殿祗俟屆時恭進册寶宣讀行禮親王以下文武四品官以上咸隨班行禮奠帛讀祝三獻爵送絹册寶詣燎位一應禮儀均與康熙六十一年同禮成皇帝乘輿還宮衆皆退翼日頒詔布告天下祗告天地太廟社稷遣官及執事各官咸朝服奉先殿補服孝敬皇后几筵前素服几筵前奉册寶大臣執事官員及齊集王公大臣官員咸素服綴冠纓行禮十一月二十一日恭上孝敬憲皇后尊諡儀駕全設於田村殯宮大門外皇帝御太和門恭閲册寶畢豫詣田村幄次恭俟至時恭進册寶宣讀行禮奠帛獻爵讀祝送燎儀均與恭上世宗憲皇帝尊諡禮同二十四日諭雍正元年我皇考請髮及御門聽政皆在皇祖梓宮奉移山陵之後今百日將屆皇考梓宮尚在雍和宮若即剃頭朕心不安但歲底新正又有壇廟祭祀大典朕當親行者其禮當何如王大臣等確議具奏欽此遵旨議準雍正元年元旦尚在聖祖仁皇帝大事百日之內而奉移山陵之期甚近是以世宗憲皇帝請髮以及御門聽政均得於奉移山陵後舉行今乾隆元年元旦已在世宗憲皇帝大事百日之後而山陵工程尚未告竣奉移之期尚早歲暮新正一應壇廟祭祀大典皇帝親詣行禮之處甚多時有不同禮以義起應請皇帝於二十九日請髮十二月初一日後御門聽政於禮允洽是日奉旨王大臣議奏乾隆元年正月初一日朕躬若往雍和宮行禮不便具禮服亦不便摘冠纓於初二日再往行禮等語正月初一日朕躬若不往雍和宮行禮朕心如何得安況有雍正元年正月初一日皇考素服往夀皇殿門下行禮之例乾隆元年正月初一日朕躬前往夀皇殿行禮畢在觀德殿更素服往雍和門下行禮二十九日行百日致祭禮陳羊酒祭筵各祭物如數王以下大小官員咸齊集儀與初祭同十二月初九日奏準本月二十三日乃周月致祭之期是日適逢立春應移於豫期二十一日致祭二十一日奏準太廟祫祭皇帝親詣行禮自二十六日為始齋戒三日世宗憲皇帝歲暮致祭禮應移於二十五日二十五日行歲暮致祭禮陳羊酒祭筵各祭物如數王以下大小官員咸齊集儀與初祭同二十九日奏準乾隆元年正月初一日雍和宮照常三次奠獻此一日停止舉哀乾隆元年二月十四日奏準朝鮮國王遣陪臣恭詣世宗憲皇帝几筵前進香於十七日行禮是日設世宗憲皇帝鹵簿於雍和門外讀祝官恭奉朝鮮國祭文進雍和門豫設於永佑殿簷下黃案上王以下奉恩將軍以上民公侯伯以下滿漢文武四品官以上咸齊集按翼序立朝鮮國陪臣等官戴展翅烏紗帽素服角帶鴻臚寺官引立於右翼之末內府官陳設祭品點朝鮮國所進香燭畢鴻臚寺官引朝鮮國陪臣等官至儀仗之南嚮北立聽贊行禮儀與雍正元年同二十四日行清明致祭禮陳羊酒祭筵如數此日不焚楮帛豫日進挂紙錢寶花一座於几筵之左旁設祭品案於永佑殿月臺兩旁設奠几於月臺正中王以下一品大臣以上於雍和門外按翼序立二品以下官於昭泰門外按翼序立至時奏聞皇帝詣几筵前舉哀獻茶上食畢皇帝詣奠几前跪衆各於序立處隨跪皇帝祭酒三爵每祭行一拜禮衆隨行禮畢皇帝興退立原位舉哀衆隨舉哀畢皇帝乘輿還宮六月二十二日奏準本月二十三日繫周月致祭之期適值大暑禁焚楮帛之時几筵前請停止安設衣冠七月十五日行中元致祭禮陳羊酒祭筵各祭物如數王以下大臣官員以上咸齊集儀與初祭禮同八月初十日諭本月十三日詣雍和宮行禮據禮部儀注奏稱請照今年元旦之例雍和門行禮朕思元旦乃天下臣民公共之大節只得勉從所請今朕一人誕辰非元年歲朝可比朕仍詣几筵前行禮欽此二十日奏準恭按世祖章皇帝於二周年後安奉地宮彼時自期年後每日一次奠獻每月饌五筵羊三酒三尊楮錢五千楮帛五千致祭聖祖仁皇帝於期年內安奉地宮於安奉前每日仍三次奠獻每月饌十有一筵羊五酒五尊楮錢二萬楮帛一萬致祭本月二十三日於世宗憲皇帝前行期年致祭禮至十月十一日奉移梓宮於泰陵至次年三月初二日安奉地宮奉移之前請照聖祖仁皇帝前奠獻之例每日三次至奉移泰陵安奉地宮之前請照世祖章皇帝前奠獻之例每日一次其月祭所用饌筵羊酒楮錢楮帛等項仍照見行例致祭二十三日行期年致祭禮陳羊酒祭筵各祭物如數王以下大小官員以上咸齊集儀與初祭同九月初四日諭禮部議奏恭送梓宮儀注內稱奉移梓宮發引時朕隨出寰宇尊親牌坊門跪於街南恭候過後朕乘輿出西直門前往恭候至於靈駕到泰陵三洞橋更換小輿時朕先至隆恩門恭候到陵後安奉次日祭畢即行還京等語雍和宮奉移之日朕不忍於城內乘輿前往應步送出城再乘輿由别路前往以便跪接至三洞橋更換小輿時朕仍在旁跪候不必先至隆恩門安奉次日祭畢即回朕心實為不安朕欲在彼居住數日以申哀慕之忱著總理事務王大臣議奏十月初九日行奉移禮畢朕即在雍和宮居住恭候發引欽此遵旨議準謹按前代帝王親送梓宮者少無成憲可稽禮曰既葬反而卒哭又曰既反哭主人與有司視虞牲有司以几筵舍奠於墓左反日中而虞是安奉既畢原無復行居住之文應請皇帝遵照雍正元年世宗憲皇帝恭送聖祖仁皇帝梓宮祭畢回鑾之例於次日祭後回鑾實屬允洽初六日諭總理事務王大臣等所議奉移皇考梓宮送至陵寢照從前世宗憲皇帝孝恭仁皇后恭送聖祖仁皇帝梓宮之例內稱皇太后宮眷於每日早晨先行由别修道路豫至蘆殿駐次於朕黃幔城之右等語雖云天子行營宜居正中但朕心實不安伏思皇太后恭送梓宮宜瞻望靈駕起行後稍間在後隨行駐次亦應於靈駕營內至回京時皇太后仍由原行路回京則既與理相合亦不致勞民動衆修墊三道著總理事務王大臣會同再議具奏欽此遵旨議準奉移世宗憲皇帝梓宮日皇帝於梓宮前祭酒三爵皇太后於梓宮旁祭酒三爵皇太后宮眷皇后宮眷瞻望靈駕起行後由阜成門出候靈駕過隨行駐次請於蘆殿大營東邊稍後建立行營設皇太后黃幔城每日早晨瞻望靈駕起行後稍間隨行晚門停止進謁至日由駐次所修新路先至隆恩門西所設黃幔城恭候回鑾時仍由去時所行道路還京十八日奏準世宗憲皇帝梓宮於十一月十一日奉移陵寢前期三日各遣官一人祗告天地太廟社稷暨孝敬憲皇后几筵至陵寢前期一日各遣官一人祗告泰陵后土之神永寧山神十月初九日於世宗憲皇帝几筵前行祖奠禮陳羊酒祭筵各祭物如數王以下大小官員咸齊集儀與初祭同十一日奉移梓宮於泰陵沿塗分定五程每宿次蓋造蘆殿第六日至陵寢暫安奉於陵寢饗殿前期三日遣官各一人祗告天地太廟社稷皇陵后土之神永寧山神是日鹵簿全設王以下內大臣侍衛滿漢大學士民公侯伯三品官以上在昭泰門外按翼齊集四品以下有頂帶官員以上及年老不能步行之大小各官皆於城外關廂內齊集在內公主王福晉郡主等於永佑殿內齊集在外諸王福晉以下一品夫人以上在雍和門內齊集內府男婦於雍和門外齊集至時皇帝詣梓宮前舉哀祭酒三爵每祭行一拜禮衆皆隨行禮禮畢奉移梓宮升小輿皇帝先詣大門外東旁立梓宮出跪舉哀興隨出大門梓宮登大升輿皇帝跪於左禮部尚書祭輿三祭三叩興靈駕發皇帝隨出步送出安定門外先詣宿次祗候皇太后皇后妃嬪以下瞻望梓宮啓行後均由别路先至宿次祗候不隨送之王以下大小官員等隨行出城外關廂在齊集處按翼排班跪送舉哀候靈駕過後各退應隨送王以下大小官員等於過關廂後乘馬隨行內監每班十人侍衛每班二十人咸更番在靈駕兩旁隨行近行王大臣侍衛內監等皆近靈駕隨行恭理喪儀王公大臣內務府工部鑾儀衛堂官在靈駕前後兩旁巡察隨行每校尉更班時隨行王公大臣侍衛內監等皆下馬跪俟更班畢仍在原處隨行其次隨靈駕豹尾班內大臣侍衛隨行其次二班侍衛隨行其次王以下大小官員隨行沿塗所過門橋遣內大臣二人輪流祭酒靈駕將至蘆殿皇帝於黃幔城北門外跪迎舉哀王以下各官咸排班跪迎舉哀靈駕由北門進蘆殿衆於黃幔城左右繞至大門外按翼序立陳鹵簿於門前安奉靈駕列册寶於左右乃行夕奠禮皇帝親祭酒衆隨行禮舉哀畢各退在塗每日早陳設鹵簿王公百官齊集恭奉册寶安奉亭內行朝奠禮皇帝祭酒三爵衆隨行禮舉哀跪送靈駕發王以下大小官員等分翼跪舉哀候過隨行皇帝步送至第二班仍先詣宿次至蘆殿敬視陳設跪迎安奉靈駕行夕奠禮儀與初啓行同沿塗百里以內文武官在路右百步外跪迎舉哀候過隨至宿次在黃幔城門外行三跪九叩禮夕奠時文官在正藍旗末武官在鑲藍旗末序立隨班行禮舉哀十二日諭此番恭送皇考梓宮隨從侍衛官員及內監執事人兵丁校尉等皆應加恩賞賚其夫役人等雖繫雇覔且免丁差一年但今日塗中遇雨衣履未免沾濕亦著一體加恩賞賚欽此十六日世宗憲皇帝靈駕至陵送往王公百官及陵寢官員皆於神石山牌坊外排班跪迎俟靈駕至舉哀候過隨行皇帝於紅門外跪迎舉哀候過隨行靈駕自紅門東柵闌入由甬路中道行至三洞橋皇帝跪候梓宮降大升輿登小輿暫安奉隆恩殿設几筵內府官恭奉册寶設几筵左右皇帝祭酒三爵衆隨行禮舉哀各退是日奏準世宗憲皇帝梓宮至泰陵安奉隆恩殿每日三次點香燭晡時奠果饌一筵陵寢之貝勒公大臣侍衛等分作二班輪流齊集安奉地宮以前隆恩門令大臣侍衛等守衛周圍內外令總管率八旗官兵總兵率緑旗官兵各輪班守護每月二十三日周月致祭由部奏遣親王承祭行禮舉哀如儀十七日駕詣隆恩殿行暫安奉禮陳設禮儀與雍正元年景陵安奉禮同十一月初八日遵旨議準各陵大祭遇清明中元歲暮忌辰皆朝服行禮祭畢更素服舉哀冬至日惟朝服致祭不更素服舉哀是以會典喪儀內未載有冬至之祭今奉旨以冬至祭祀關繫大典請於世宗憲皇帝几筵前供牲帛三獻讀祝致祭令贊禮官贊禮但梓宮尚未安奉地宮且在二十七月以內所有承祭執事各官應不綴冠纓素服行禮祭品由泰陵禮部內府掌關防奉祀等官敬謹製辦牲帛由太常寺送往祭文由翰林院照陵寢冬至祭文體式撰擬十二月初十日諭明年二月二十二日朕親送孝敬憲皇后梓宮前往泰陵前已頒發諭旨今因禮部奏進儀注奉皇太后懿旨屆期亦欲親送朕思奉移之日距安奉地宮之期尚遠皇太后慈輿可以遲數日啓行少節勞勩再三奏懇未蒙俞允又降懿旨孝敬憲皇后梓宮奉移大事若不親送於禮未盡於心未安欽此傳諭總理事務王大臣禮部工部內務府將一切儀注及塗次行走事宜一並詳議具奏欽此遵旨議準乾隆二年二月二十二日奉移孝敬憲皇后梓宮至泰陵是日辰時奏請皇帝詣梓宮前祭酒三爵皇太后於梓宮旁祭酒三爵皇太后宮眷皇后宮眷瞻望梓宮啓行梓宮由殯殿出皇帝豫詣大門外東旁跪視梓宮登大升輿興在左隨行至下馬紅柱處候靈駕過乘輿由别路豫往蘆殿祗俟皇太后皇后宮眷由御路往行營宿次靈駕將至皇帝跪迎候過隨行安奉蘆殿畢供獻果饌皇帝行夕奠禮畢由東南角門出翼日早皇帝詣蘆殿前行朝奠禮皇太后皇后宮眷退於蘆殿東間瞻望靈駕啓行每日恭迎行禮之處皆照此例行至陵之日皇帝皇太后皇后皆先詣世宗憲皇帝几筵前恭謁畢皇帝至紅門內東更衣殿內恭俟靈駕至紅門外橋東跪迎候過隨行俟奉安畢於梓宮前行奠獻禮乃還行營衆皆退皇太后皇后宮眷均詣殿內祭酒三爵畢回行營又奏準世宗憲皇帝梓宮奉安地宮應將香册香寶一同安設孝敬憲皇后合葬應將全書恭上尊諡之册寶安設地宫內其從前册寶於祖奠致祭日焚化二十五日遣官詣泰陵於世宗憲皇帝几筵前行歲暮致祭禮陳羊酒祭筵各祭物如數在陵貝勒公大臣貝勒夫人公大臣官員命婦內府男婦等咸齊集承祭官行禮如常儀乾隆二年二月二十一日於孝敬憲皇后几筵前行奉移禮陳羊酒祭筵各祭物如數王以下大小官員咸齊集儀與奉移世宗憲皇帝梓宮祖奠禮同二十二日奉移孝敬憲皇后梓宮於泰陵是日由田村啓行儀駕全設親王以下內大臣侍衛滿漢大學士四品官以上及三旗內府官咸於田村殯殿大門外按翼齊集五品以下有頂帶官員以上及內府佐領人等皆於二班齊集近支王福晉公主郡主等於殯殿內齊集諸王福晉以下命婦以上於殯殿二門內兩旁齊集三旗內府佐領內管領下官員各執事人等護軍領催男婦在二門外兩旁齊集各於齊集之處舉哀俟奉移祭酒時隨行禮皇帝詣梓宮前祭酒三爵衆隨行禮舉哀畢恭理喪儀王公大臣等率夫奉梓宮升小輿至大門外登大升輿乃啓行送往之王公百官由别路先往不送往者豫詣二班跪舉哀候過各退校尉陳儀駕於馬上分隊前行册寶鳳輿於黃蓋後行靈駕左右內監每班各十人在旁隨從步行次宮女車隨行次內府婦女六十人乘馬隨行次掌儀司遴內監二十人乘馬隨行次近行王公姻戚隨靈駕豹尾班侍衛隨行次二班侍衛行次稍間王公大小官員乘馬隨行所過門橋遣內大臣二人輪流祭酒沿塗分為四程每程豫蓋蘆殿靈駕將至送往之王公百官豫詣蘆殿之黃幔城外按翼序立候至皇帝跪迎舉哀隨入衆跪舉哀俟入由黃幔城外繞至大門前排立校尉等下馬設儀駕於大門外靈駕奉安時乘車宮女於北門外恭候奉安後校尉出畢下車入六十婦人在黃幔城外下馬隨入送往之姻戚婦女豫往蘆殿幔城內祗候皇帝祭酒行禮舉哀衆隨行禮舉哀畢各退翼日陳設儀駕衆照常齊集啓行沿塗五十里內地方文武各官在道右跪舉哀候過至宿次於黃幔城外叩謁行三跪九叩禮奠獻時文武官各分立兩藍旗末隨行禮舉哀是日奉移敦肅皇貴妃金棺一同送往二十三日諭據禮部奏稱向來點主有具采服之例今世宗憲皇帝點主日期在二十七月服制之內除簡命點主之大學士具朝服外朕與羣臣皆素服不綴冠纓等語朕思服制之內固素服為是但點主乃繫皇考萬年崇祀之吉禮朕與臣工在隆恩殿行禮時咸應從吉服冠綴纓緯可傳諭禮部知之欽此又諭點主大禮攸關必取其人品名望素優老成端慤者俾之敬謹將事方克稱尊奉之隆儀卿等皆國家大臣夙荷皇考恩遇倚任有年名望素著故藉卿等襄此巨典其體朕哀慕悃忱齋莊儼恪靜慮凝神以對越皇考在天之靈庶得仰邀皇考歆鑒朕有厚望焉欽此二十五日奉旨衆蒙古王等因皇考梓宮奉安地宮懇請叩謁前來將伊等分作三班每日令一班入隆恩門隨行禮又奉旨隨朕恭謁泰陵之大小官員有年老不能騎馬及漢大臣官員皆著先往祗候二十六日孝敬憲皇后梓宮至泰陵皇帝先詣世宗憲皇帝几筵前行朝謁禮畢乃於紅門內更衣殿祗俟跪迎陵寢貝勒公侍衛官員內府佐領下官員人等咸於神石山牌坊外跪迎舉哀候過隨行梓宮入隆恩殿左旁蘆殿內設几筵陳册寶於左右皇帝祭酒舉哀行禮衆隨行禮舉哀畢各退二十七日於孝敬憲皇后几筵前行暫安奉禮陳設禮儀與世宗憲皇帝奉安禮同二十九日遣官各一人以安葬泰陵祗告天地太廟社稷三月初一日行遷奠禮世宗憲皇帝几筵前皇帝親詣行禮孝敬憲皇后几筵前遣官恭代送往之王以下大小官員並陵寢大小官員執事人咸於隆恩門外齊集在陵之貝勒公夫人大小官員命婦執事人等之妻咸於孝敬憲皇后蘆殿前齊集世宗憲皇帝鹵簿孝敬憲皇后儀駕全設祭文一同奉入各安設於案祭畢恭送冠服於燎所祭酒畢衆皆退至吉時奉移梓宮升龍輴後鹵簿儀駕與楮帛一同焚化是日祭畢奉移世宗憲皇帝梓宮孝敬憲皇后梓宮各祭酒三爵衆皆於大門外齊集祭酒時衆皆隨行禮婦女等豫往方城西旁立俟梓宮至跪候過序立舉哀奉世宗憲皇帝梓宮升方城前所造蘆殿內正中龍輴上奉孝敬憲皇后梓宮於蘆殿內左旁均北嚮設册寶於梓宮兩旁黃案各奠果饌一筵祭酒三爵衆皆隨行禮舉哀畢各退初二日辰刻恭奉梓宮安葬泰陵是日早行大葬禮梓宮前各祭酒三爵衆隨行禮謹奉移世宗憲皇帝梓宮龍輴由隧道入地宮安奉寶牀次奉孝敬憲皇后梓宮升龍輴入地宮安奉寶牀皇帝親視安奉又特命和親王隨入皇帝號痛不已諸臣再四叩請方出册寶各設於兩旁石案乃掩閉元宮石門畢皇帝於祭臺祭酒三爵舉哀行禮衆隨行禮舉哀畢乃卒哭退是日遣官各一人以大葬禮成告祭泰陵后土之神永寧山神是日以敦肅皇貴妃金棺從葬梓宮安奉地宮禮成皇帝出至幄次更衣俟隆恩殿陳設俎豆牲牢畢禮部堂官奏請詣隆恩殿行恭題神主禮鑾儀衛豫設黃輿二於隆恩殿前丹陛之下設奉神主龍鳳寶座各一於隆恩殿內正中左右各一前設供案又前設香案均南嚮設恭題神主案二於香案之旁一在東西嚮一在西東嚮設安神主櫝案於寶座兩旁南嚮設御拜褥於正中至時皇帝御龍袍衮服滿漢大學士各二人朝服執事官陪祭官咸蠎袍補服贊引官二人恭導駕由隆恩門左門入升正面左階進殿左門至中北嚮立鴻臚寺官引王以下入八分公以上由左右門升左右階至丹陛上立文官五品武官四品以上於丹陛下按翼序立恭奉神主大臣二人就案上啓櫝奉神主各設左右黃案上東西嚮滿漢大學士各詣案前一跪三叩興各就位於神字空處恭點石青畢退立兩旁二大臣恭奉神主各跪安於龍鳳寶座三叩退乃行虞祭禮上香奠帛讀祝三獻爵送燎均如常儀禮成鑾儀衛堂官率校尉舁黃輿升丹陛左右設均南嚮太常寺官跪奏恭請世宗憲皇帝神主孝敬憲皇后神主升祔太廟皇帝詣寶座前一跪三拜恭奉世宗憲皇帝神主大學士恭導由饗殿中門出奉安於正中黃輿內親王一人恭奉孝敬憲皇后神主隨出皇帝奉安世宗憲皇帝神主畢奉孝敬憲皇后神主親王奉至黃輿右旁立皇帝恭接奉孝敬憲皇后神主跪安於右黃輿內興就拜位行一跪三拜禮退立東旁校尉舁黃輿行黃蓋御仗內大臣十人大學士四人及禮部堂官前導神主黃輿過皇帝跪王以下各官皆跪候過隨行至隆恩門中門駕由東門出跪候過興先詣宿次恭俟塗次按程設黃幄安奉世宗憲皇帝神主黃輿居左孝敬憲皇后神主黃輿居右執事官各設供案於輿前每案陳果品十二盤酒三爵前正中設香案陳設畢禮部太常寺堂官奏請皇帝於神位前行夕奠禮恭導駕入黃幄詣香案前司香官跪進香皇帝三上香就拜位行三跪九拜禮畢恭導駕出黃幄至升輿處升輿還行營是奠百官不隨行禮翼日早設酒三爵奏請皇帝行朝奠禮上香一跪三拜餘如前儀禮部太常寺官恭導皇帝出黃幄立東旁執事官徹案鑾儀衛官引校尉進黃幄舁輿仍前列黃蓋御仗十大臣豫至網城南門外上馬處恭候禮部太常寺堂司官十人前引至網城南門外退神主黃輿出皇帝跪候過興至升輿處升輿王公百官於網城外按翼跪候過隨行每日朝夕奠儀同百里內文武各官咸朝服於百步外跪迎路右至晚詣黃幄前三跪九叩行謁見禮按日分為三站至第四日還京升祔太廟儀别載八月二十三日遣官詣泰陵行再期致祭禮陳羊酒祭筵各祭物如數寶城前設黃幄几筵遣官於祭臺前祭酒行禮儀與期年祭禮同十一月十九日皇帝恭詣泰陵行釋服禮在京王公大小官員奏遣一半隨往於寶城前設黃幄几筵讀文致祭陳設禮儀與期年致祭同是日王以下大小官員咸素服不綴冠纓於隆恩門外齊集陵寢居住之貝勒公夫人大臣官員命婦內府佐領婦女於方城前月臺西旁齊集皇帝行禮時鴻臚寺官引王以下公以上大學士內大臣侍衛在陵寢門外民公以下文武各官在隆恩門外東西廂前按翼序立祭時隨行禮舉哀祭畢皇帝釋縞素綴冠纓衆皆綴冠纓禮部堂官恭導駕出乘輿回鑾三年八月二十三日世宗憲皇帝三周屆期皇帝躬詣泰陵於寶城前致祭行禮如儀欽定大清會典則例卷八十六
