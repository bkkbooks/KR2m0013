二人由禮部選補又定每年元日親詣堂子行禮或不行禮由禮部豫期奏請又定元日親詣堂子行禮親王以下貝勒以上外藩來朝親王以下貝勒以上皆赴太和門齊集鹵簿大駕樂器陳設如常儀駕出王等在午門內金水橋南分翼序跪候駕過隨行貝子以下鎮國將軍以上民公侯伯都統子滿漢尚書漢武官一品以上等官及外藩來朝貝子以上都統以上均於長安左門外齊集俟駕至跪候過隨行至堂子行禮時王以下各官隨行禮畢駕還宫王公從其不隨往之文武各官咸朝服於午門外齊集皇帝往還時皆排跪迎送又定每年元日躬率王公羣臣展拜於堂子禮成回鑾王貝勒貝子等詣乾清門恭候皇帝率王貝勒貝子於宫中祭神殿行禮由禮部豫期請旨康熙十一年諭人君對越神祇務盡其誠敬之心禮儀節文宜臻明備每年元旦躬詣堂子展拜可令鳴贊贊禮永著為令欽此十二年奉旨嗣後堂子行禮漢官不必隨往二十九年定元日皇太子隨駕詣堂子行禮是日內務府總管於圜殿進楮帛畢次以皇太子楮帛進皇太子隨駕出宫至堂子於皇帝拜位後稍左隨行禮宫中祭神殿行禮儀同雍正元年議準元日皇帝詣堂子王以下滿文武一品官於街門內內門外西邊序立聖駕至跪候過隨入行禮乾隆元年奏準增設堂子祭神殿黃紗鐙四座圜殿黃紗鐙四座大門紅鐙四座甬道紅鐙二十八座又奏準堂子增設灑掃人役十有二名由內務府選送十七年奉旨堂子祀典載入內務府會典一春秋二季立杆致祭崇德元年定親王郡王貝勒每家各祭三杆貝子鎮國公輔國公每家各祭二杆鎮國輔國奉國將軍每家各祭一杆不祭者聽無爵宗室不得祭每月初一日大內致祭初二日以後親王郡王貝勒貝子公等各以位次按日致祭各家應祭之日若遇大內致祭則應祭之家暫停凡祭三杆之家於定期內各祭一杆過十一日後再各祭二杆或致祭日有兩三家同祭者仍依位次俟應先祭之家祭畢次祭之家方祭如諸王貝勒於定期致祭之日有事不得祭豫期知會禮部令次祭之家致祭其有事者隨便補祭今自分公大內至入八均祭一杆鎮國將軍以下不立杆致祭凡為馬羣致祭者親王以下輔國公以上許祭鎮國將軍以下不許有違例多祭及爭先致祭者議處又定凡官員庶人等設立堂子致祭者永行停止又定每年春秋立杆致祭於堂子用松樹一株留樹杪枝葉十有三層餘皆芟去枝葉削成杆長二丈楠木幡頭黃絹幡一首五色綾各九尺剪為縷三色朝鮮貢紙八十張打為錢黃棉線三斤八兩及染幡染紙用紫花槐子白礬均交各該處辦進順治二年定每年春秋立杆致祭聖駕親詣行禮祭日鹵簿大駕全設內務府掌儀司官設御拜褥於堂豫祭神殿內圜殿內甬道鋪棕薦兩殿內鋪五采花席花紅氊皇帝御禮服乘輦出王以下入八分公以上在午門內金水橋南兩翼排跪侯駕過隨行不入八分公以下暨文武各官均於午門外排班跪送駕至堂子門外降輦入至殿外嚮東坐王貝勒等在丹陛上貝子入八分公等在丹墀內坐皇帝於正殿及圜殿兩處行一跪三拜禮諸王大臣皆序立不隨行禮禮成於殿簷下西旁正坐公以上在丹陛上分翼序坐進福餕飲福酒畢皇帝升輦作樂還宮又定春秋致祭贊祀所用朝衣及請神位至堂子所用黃輿御仗衣帽均於各該處領取康熙二十年定凡遇春秋致祭大內致祭次日皇太子宫致祭五十七年奏準嗣後奉請神位至堂子令步軍除道淸蹕侍衛十人前導掌儀司官及司俎官導引隨行以肅觀瞻所用黃輿及執御仗內監導引官員均由司辦理外其前導侍衛移文領侍衛內大臣委侍衛十人並移文步軍統領淸蹕除道乾隆十一年奉旨嗣後春秋立杆致祭親詣堂子行禮儀注著禮部會內務府同奏十九年諭王公等建立神杆應按爵秩設立整齊以肅觀瞻嗣後著每翼作為六行每行六分以未分封皇子等列於前其次則親王郡王貝勒貝子公等分為六層設立神杆皇子內已受封爵者其神杆視所封爵立於應立之處所有石座不必移動神杆各按爵秩更換每年修整一次著禮部會同內務府總管察看繪圖進呈著為例欽此遵旨議準神杆石座每翼作為六行每行列六座皇子神杆列前一行其次親王郡王貝勒貝子公各按行排列見在左翼親王七人郡王三人貝勒三人貝子一人公二人應將第七親王神杆石座列於次行郡王之首餘皆按次排列右翼親王四人郡王六人貝勒二人貝子一人公十有七人人數多寡不齊應將親王列於前其次郡王貝勒貝子公按一行六座之數通融序列謹繪圖黏籤進呈御覽嗣後遇有應那移神杆宗人府豫期行文禮部注册至年終禮部滿堂官會同內務府總管赴堂子敬閲將神杆石座修整一次再見在所有神杆石座原繫各王貝勒貝子公本家設立石塊大小不一亦不整齊應交工部選其堪用者修飾應用不堪用者别行製造均修飾潔淨安設一月朔致祭崇德元年定每月朔親王以下貝子以上每府委官一人前期齋戒是日詣堂子供獻今自郡王以上供獻一浴佛崇德元年定每年四月初八日大內並每旗王貝勒一人依次往堂子供獻今惟親王郡王供獻是日大內及各旗佐領軍民人等不祈禱不祭神禁屠宰不理刑名順治二年定浴佛日贊祀所用朝衣及請佛至堂子用黃輿御仗衣帽於各處領取與春秋致祭同一大內祭神順治初年定大內每日祭神二次晨以寅卯時晚以未申時均用豕二月朔皆用時果九盤餘日皆糕九盤一應造辦均由祭神殿司俎官率各執事首領內監率內監司香婦長率司香婦掌㸑婦碓房婦祗承其事由司掌行祭豕粢盛柴薪及造辦祭品一應器皿均照司俎官呈報移文各該處敬謹辦進祭神所用安春香每年一次於口外採取移文會計司並內管領又定祭神殿設司俎官五人正六品司俎執事十有八人宰牲十人掌籍三人服役二十人贊祀女官長二人贊祀女官十人均於上三旗覺羅命婦內選取司香婦長六人司香婦二十四人掌㸑婦長三人掌㸑婦十有六人碓房婦長六人碓房婦三十一人內監首領三人正八品二人未入流一人內監二十六人又定每歲四孟月以牛二馬二金十兩銀百兩幣十布四十敬獻於神豫期具奏交各該處備辦及敬獻畢付會計司計直辦豕以供祭祀康熙二十年定贊祀女官十有二人歲給官用段二匹紗綾紬絹杭細各一匹其長二人加給官用素段一匹均以歲十月於廣儲司領取又定皇太子宫每日祭神暨四季敬神皆視大內之半四十七年停止歸於大內又定皇子分封後該府內安神祭神敬神所用馬牛金銀段布及一切所用各項陳設祭品均按爵秩奏準移付各該處照例如數給發雍正四年奉旨祭神殿執事婦人皆賞給銀米遵旨議準司香婦長六人各月給銀二兩米二斛司香婦二十四人掌㸑婦長三人碓房婦長六人各月給銀一兩米一斛二斗五升掌㸑婦十有六人碓房婦三十一人各月給銀五錢米一斛銀於廣儲司米於內管領處支領如有增減據司俎官開報咨行八年奉旨嗣後四孟敬神於己午未三時內擇定一時具奏乾隆十六年奉旨來年祭神及敬神均定於初四日遵旨議準正月祭神選吉日請旨如年前立春將祭神日及敬神日一並具奏如正月立春别選敬神吉日具奏一出師展拜堂子崇德元年太宗文皇帝親征朝鮮是日恭詣堂子行三跪九拜禮復於堂子外建立八纛致祭行禮畢啓行二年班師恭詣堂子行禮三年命王貝勒等為大將軍出征聖駕親詣堂子行三跪九拜禮外立八纛行一跪三拜禮康熙十三年聖祖仁皇帝命王為大將軍率領大兵出征是日率出征王及諸王貝勒都統尚書等官出征副都統以上各官詣堂子行三跪九拜禮次於纛前行三跪九拜禮十四年撫逺大將軍王副將軍大學士等平定察哈爾大兵凱旋聖祖仁皇帝率大將軍暨在京諸王公大臣詣堂子行禮三十五年聖祖仁皇帝親率六軍征討厄魯特噶爾丹率諸王大臣詣堂子行三跪九拜禮禮畢至內門外致禮於旗纛之神畢乃啓行是年聖祖仁皇帝自克勒和朔統軍回鑾鹵簿大駕全設詣堂子率皇太子諸皇子王公滿大臣等行三跪九拜禮五十七年聖祖仁皇帝命撫逺大將軍王西征躬率將士詣堂子行禮拜纛如儀雍正七年世宗憲皇帝命定邊大將軍北征躬率將士詣堂子行禮拜纛如儀乾隆十三年命大學士經略金川兵部建御營黃龍大纛二八旗護軍纛八於堂子內門外之南皇帝率經略及從征二品大臣王公各官於堂子行禮畢詣纛前行三跪九拜禮十四年諭堂子之祭乃我朝先代循用通禮所祭之神即天神也列祖膺圖御宇既稽古郊禋而燔柴典重舉必以時堂子則舊俗相承遇大事及春秋季月上旬必祭天祈報歲首最先展禮定鼎以來恪遵罔怠且不易其名重舊制也考諸經訓祭天有郊有類有祈榖祈年禮本不一兵戎國之大事故命遣大將必先有事於堂子正類祭遺意而列纛行禮則禡也我祖宗於行營中或别有征討不及歸告堂子則望祭而列纛行事其誠敬如此朕思出師告遣則凱旋當告至乃天地宗社皆已祝册致虔且受成大學而堂子則弗之及祠官疏略如神貺何祀典攸關彝章宜備著議政王大臣等詳悉具議朕親為裁定載入會典欽此遵旨議準凡大兵凱旋致祭於天地太廟奉先殿社稷陵寢如常儀外皇帝展拜於堂子令欽天監擇吉屆期鹵簿大駕全設凱旋將帥大臣等在金水橋文武各官在午門外常朝處王貝勒貝子公大學士都統尚書等一品官在堂子內門外序立禮部堂官奏請皇帝詣堂子行禮不隨行禮王以下各官候駕過跪送凱旋將帥皆隨行諸王貝勒貝子公大學士都統尚書等一品官俟駕至跪候過隨入禮部堂官恭導皇帝進堂子就拜位凱旋將帥大臣等皆依次序立鳴贊官奏跪拜興皇帝行三跪九拜禮凱旋將帥等均隨行禮畢奏禮成禮部堂官恭導皇帝出至內門外乘輿還宫詳見禮部軍禮則例一祭羣神之禮雍正元年奉旨以西苑紫光閣北前後殿改建為時應宫前殿奉四海四瀆龍神後殿中奉順天佑畿時應龍神兩旁左右奉十有七省龍神設住持道士以供香火每月六月十三日新正前後九日萬壽聖節前後三日皆啓建道場四年奏準建內城隍廟於紫禁城內西北隅以奉紫禁城城隍之神每歲萬壽聖節及季秋與都城隍廟同日致祭祭品同遣內務府總管行禮五年遷直省龍神位奉於各省增修後殿以奉八方龍神六年諭朕惟風雨時若百物繁昌皆由敬誠感格天心用能福佑下民時和歲稔而司天號令長養阜成風神之貺厥功允懋頻年以來朕虔祝龍神有祈必應其福庇蒼生者歷有明驗因思風神巽順和煦茂時育物亦宜特隆祀典以答洪庥考之周禮大宗伯以槱燎祀風師虞書禋於六宗劉歆鄭康成注咸謂六宗之內風神師其一也歷代各置壇兆至宋祥符間曾立風伯廟近代及本朝皆列南郊四配之中典禮具備今欲於都城和會之地特建廟宇因時禱祝以展朕為民祈福之誠應如何考據禮儀相度營建之處著禮工二部會同內務府詳議具奏欽此遵旨議準風師為箕星經傳考據既有明文箕星為蒼龍之第七宿位在東北致祭方向自宜就其星位於都城內東北和會之地建立廟宇其廟宇規制仿時應宫式營建其風神封號並廟名匾額交與內閣撰擬字樣進呈御覽恭候欽定刋刻神牌製造匾額俟廟成之日令欽天監選擇吉日敬謹供奉懸挂禮部於都城道士內遴選住持其每年立春後丑日致祭以及朔望祭品每日香鐙交內務府備辦是年欽定風神封號曰應時顯佑風伯之神廟曰宣仁廟七年諭朕惟雲雨風雷之神代天司令俾百昌萬寶普含膏澤以錫福於蒸民厥功並懋朕躬承天眷恪修祀典為四海蒼黎仰祈嘉佑已經特建廟宇崇祀龍神風伯而雲師雷師尚闕專祠嘗考虞書禋於六宗之文漢人以乾坤六子釋六宗震雷巽風咸列禋祀而易曰雷以動之風以散之則風雷之發生萬物功實相等禮記曰天降時雨山川出雲周禮亦以五雲辨年歲是雲與雨皆運行造化同昭天祀者也前代及本朝南郊大祀雲雨風雷皆列從壇之次式隆配饗典禮亦既備矣邇年以來雲物兆祥雷行應候茂育庶彙宣布陽和庇國佑民之德靈應顯然今欲特建廟宇虔奉雲師雷師之神因時禱祀敬迓洪庥以展朕為民祈禱之意其考據禮儀相度營建之處著禮工二部詳議具奏欽此遵旨議準大明集禮既稱雷雨在西風雲在東今雷師廟宇應建於西方雷師照古制於立夏後申日致祭惟雲師古無專祀日期應依明會典合祭之期每歲於秋分後三日致祭其廟宇規制悉仿宣仁廟式建造其封號並廟名匾額字樣交與內閣撰擬進呈御覽恭候欽定刋刻神牌製造匾額俟廟成之日欽天監選擇吉日敬謹供奉神像安設神牌懸挂匾額於都城道士內遴選住持雲師廟於每歲秋分後三日致祭雷師廟於每歲立夏後申日致祭並朔望祭品每日香燭一如宣仁廟祀風神禮是年欽定雲師封號曰順時普蔭雲師之神廟曰凝和廟雷師封號曰資生發育雷師之神廟曰昭顯廟九年奏準建廟於皇城西安門內以奉皇城城隍之神歲祭之期及祭品遣官均與內城隍廟同是年欽定皇城城隍廟曰永佑廟欽定大淸會典則例卷一百六十一
