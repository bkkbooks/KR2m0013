body:
  text: 內務府掌儀司一一祭饗奉先殿順治十四年定元旦冬至歲除皇太后聖壽萬壽聖節册封吉日及每月朔望奉請神位於前殿設籩豆讀祝奏樂祭饗是年諭奉先殿恭祭太祖太宗未經合祭四祖朕之孝思猶為未盡嗣後遇元旦皇太后聖壽及朕誕辰恭請太廟後殿四祖四后神位於奉先殿與列聖列后合祭欽此康熙十三年奏準凡遇元旦太皇太后聖壽皇太后聖壽萬壽聖節恭請太廟後殿四祖四后神位於奉先殿合祭每月朔望冬至及册封等日大饗如前十五年奏準册封等日停止大饗遣官於後殿祗告又奏準奉先殿大饗祗告如遇躬祀壇廟之日俟祀壇廟禮成然後行禮三十八年奉旨元旦百官齊集人多奉請神牌往返朕心未安著大學士內務府禮部太常寺會議具奏欽此遵旨議準四祖神牌安奉太廟後殿每歲時饗後殿遣官行禮歲除大祫於太廟元旦又奉請神牌合祭於奉先殿似屬重復請嗣後元旦皇太后聖壽萬壽聖節停止恭請後殿四祖神位合祭於奉先殿即於太廟後殿遣官一如奉先殿儀列籩豆讀祝奠帛獻爵行禮雍正十三年奉旨祭奉先殿遵太廟四孟時饗之禮增上香儀是年十月奉旨嗣後朕親詣奉先殿行禮令太常寺官贊禮執事乾隆元年奏準奉先殿各香案增設燭臺二再各案增設爵墊一升祔奉先殿順治十四年鼎建奉先殿前殿九間後殿九間穿堂三間後殿同殿異室每寢室各設神龕寶牀帷幄帳幔揮椸奉安前期內府官豫於奉先殿設龍鳳寶座各一於殿中南嚮設龍鳳寶座各一於左一間東位西嚮設朝鐙香几爐各十有二寶座前均設籩豆案前設香帛案兩序設尊爵帛篚案中一間左旁設祝案設御拜位於閾內正中奉安之日黎明內府掌儀司官率所屬陳祝帛登鉶簠簋籩豆於各案點香燭內府各執事官暨太常寺贊禮官樂舞生等各共執事內大臣侍衛內務府官咸朝服於誠肅門外兩旁序立世祖章皇帝御禮服升輿出宮至恭造神牌處降輿詣太祖髙皇帝神位前行一跪三拜禮恭奉神位內府官在後隨行禮執事官設黃輿一於門外正中一於左均南嚮世祖章皇帝恭奉太祖髙皇帝神牌恭奉神牌官各恭奉神牌奉安黃輿內世祖章皇帝於黃輿前行一跪三拜禮奉請各官隨後行禮畢內府官舁黃輿由中門出詣奉先殿世祖章皇帝隨出升輿隨行內大臣侍衛等皆跪候黃輿過隨行至誠肅門世祖章皇帝降輿隨入內大臣侍衛內務府官咸隨入至奉先殿前階下分班兩翼序立黃輿由奉先門中門入至殿陛上北嚮止贊引官二人恭導世祖章皇帝詣黃輿前行一跪三拜禮恭奉神牌各官隨後行禮畢各恭奉神牌以次升奉先殿奉安於各寶座正中奉安太祖髙皇帝神牌於左髙皇后神牌於右南嚮左一間奉安太宗文皇帝神牌次孝端文皇后神牌東位西嚮世祖章皇帝行一跪三拜禮奉請各官隨後行禮退執事官徹黃輿世祖章皇帝詣拜位前立掌儀司官引內大臣侍衛內府官於階下咸東西上北面立乃行大饗禮凡贊禮作樂奠帛獻爵一如太廟時饗儀惟不設牲牢不行飲福受胙禮禮成贊引官恭導世祖章皇帝由殿左門出立簷下東旁西嚮內大臣侍衛內府官於兩旁序立樂闋恭導世祖章皇帝入殿內於太祖髙皇帝神位前行一跪三拜禮恭奉太祖髙皇帝神牌奉請各官隨後行禮畢各恭奉神牌以次升入後殿奉安太祖髙皇帝神牌於中一室神龕內居左孝慈髙皇后神牌居右奉安太宗文皇帝神牌於東一室神龕內居左孝端文皇后神牌居右均南嚮奉安畢世祖章皇帝退至寢室門外上香行一跪三拜禮奉請各官隨後行禮贊引官恭導世祖章皇帝由後殿左門出由殿東出奉先門左門至誠肅門外升輿還宫十八年恭奉世祖章皇帝神牌升祔奉先殿豫期祗告是日恭奉列聖列后神牌於前殿奉安世祖章皇帝神牌於右一間西位東嚮行大饗禮如儀禮成恭奉世祖章皇帝神牌奉安於後殿西一室神龕內南嚮康熙六年奉孝康皇后神牌升祔奉先殿豫期祗告是日恭奉列聖列后神牌於前殿奉安孝康皇后神牌於右一間世祖章皇帝之次行大饗禮如儀禮成恭奉孝康皇后神牌奉安於後殿西一室神龕內世祖章皇帝神位之右南嚮十四年奉仁孝皇后神牌祔饗奉先殿豫期聖祖仁皇帝親詣後殿祗告是日奉太祖髙皇帝孝慈髙皇后神牌於奉先殿正中太宗文皇帝孝端文皇后神牌於左一間世祖章皇帝孝康章皇后神牌於右一間均南嚮奉仁孝皇后神牌於左二間東旁西嚮遣官行大饗禮如儀禮成恭奉仁孝皇后神牌奉安於後殿左二室神龕內南嚮十八年奉孝昭皇后神牌祔饗奉先殿前期聖祖仁皇帝親詣後殿祗告是日遣官行禮一如仁孝皇后祔饗儀奉安孝昭皇后神牌於仁孝皇后之次東旁西嚮禮成恭奉孝昭皇后神牌奉安於後殿左二室神龕內仁孝皇后神位之右南嚮是年恭修奉先殿暫奉列聖列后神牌奉安於太廟中殿各寢室仁孝皇后孝昭皇后神牌並寶座仍奉奉先殿東旁一間用黃幄籠罩遮以步障自是暫輟朔望時令祭饗每月令內府官照常薦新有事則告二十年恭修奉先殿告成是日恭奉神牌各官至太廟各於神位前上香行一跪三叩禮恭奉神牌安奉黃輿行一跪三叩禮校尉舁輿前列御仗聖祖仁皇帝衮服於奉先殿誠肅門內之南內大臣侍衛咸補服於誠肅門外恭迎黃輿至跪候過興黃輿進至殿陛上北嚮止引禮官恭導聖祖仁皇帝隨入內府官引內大臣侍衛隨入於階下兩翼序立恭奉仁孝皇后孝昭皇后神牌官二人恭奉神牌拱立於左側聖祖仁皇帝詣太祖高皇帝黃輿前行一跪三拜禮奉請太祖高皇帝神牌奉請各官隨後行禮畢各恭奉神牌入奉先殿以次奉安於各寶座畢行一跪三拜禮奉請各官隨後行禮畢退執事官徹黃輿聖祖仁皇帝就拜位行大饗禮如儀內大臣侍衛內府官均隨行禮禮成恭奉神牌還御奉先殿後殿各寢室二十七年恭奉孝莊文皇后神牌升祔奉先殿是日恭奉列聖列后神牌於前殿遣大臣二人恭奉世祖章皇帝孝康章皇后神牌東嚮側立大臣二人恭奉仁孝皇后孝昭皇后神牌稍下西嚮側立聖祖仁皇帝恭奉孝莊文皇后神牌入奉先殿奉安於左一間孝端文皇后之次南嚮次奉世祖章皇帝孝康章皇后神牌大臣二人奉安神位於寶座奉仁孝皇后孝昭皇后神牌大臣二人奉安神牌於拜席退立兩旁贊禮官跪奏祗見孝莊文皇后聖祖仁皇帝代行三跪九拜禮畢大臣二人跪奉神牌興奉安於寶座聖祖仁皇帝詣拜位行大饗禮如儀禮成恭奉孝莊文皇后神牌奉安於後殿東一室神龕內太宗文皇帝神位之右南嚮二十八年奉孝懿皇后神牌祔饗奉先殿一如仁孝皇后祔饗儀奉安孝懿皇后神牌於孝昭皇后之次東旁西嚮禮成恭奉孝懿皇后神牌奉安於後殿左二室神龕內仁孝皇后居中孝昭皇后居左孝懿皇后居右均南嚮五十七年恭奉孝惠章皇后神牌升祔奉先殿時聖祖仁皇帝足疾不能行禮遣皇子行禮一如孝康章皇后升祔儀奉安神牌於世祖章皇帝神位之次孝康章皇后神位之上南嚮禮成奉孝康章皇后神牌奉安於後殿右一室神龕內世祖章皇帝居中孝惠章皇后居左孝康章皇后居右均南嚮雍正元年恭奉聖祖仁皇帝孝恭仁皇后神牌升祔奉先殿豫期祗告是日恭奉列聖列后神牌於前殿設聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后神位於東二間均南嚮世宗憲皇帝恭奉聖祖仁皇帝神牌命親王四人恭奉孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后神牌升入奉先殿奉安聖祖仁皇帝神牌於東二間第一寶座南嚮奉四后神牌王等各跪安四后神牌於拜席北嚮退立兩旁贊禮官跪奏祗見聖祖仁皇帝世宗憲皇帝於神牌後恭代行三跪九拜禮興恭奉神牌王等就拜席跪各恭奉神牌以次奉安於聖祖仁皇帝神位之次奉神牌王等退出殿外階上內大臣侍衛內府官於階下均隨行禮世宗憲皇帝詣拜位行大饗禮如儀禮成恭奉聖祖仁皇帝四后神牌奉安於後殿東二室神龕內聖祖仁皇帝居中孝誠仁皇后居左孝昭仁皇后居右孝懿仁皇后於孝誠仁皇后之左孝恭仁皇后於孝昭仁皇后之右均南嚮乾隆二年恭奉世宗憲皇帝孝敬憲皇后升祔奉先殿豫期祗告是日恭奉列聖列后神牌於前殿設世宗憲皇帝孝敬憲皇后神位於西二間均南嚮皇帝恭奉世宗憲皇帝神牌命親王恭奉孝敬憲皇后神牌升入奉先殿奉安世宗憲皇帝神牌於西二間第一寶座南嚮奉孝敬憲皇后神牌親王跪安孝敬憲皇后神牌於拜席北嚮退立西旁贊禮官跪奏祗見世宗憲皇帝皇帝於神牌後恭代行三跪九拜禮興就拜席跪奉孝敬憲皇后神牌奉安於世宗憲皇帝神位之次皇帝詣拜位行大饗禮如儀禮成恭奉世宗憲皇帝孝敬憲皇后神牌奉安後殿西二室神龕內世宗憲皇帝居左孝敬憲皇后居右均南嚮是年重修奉先殿豫期祗告恭奉列聖列后神牌奏安於太廟中殿暫輟朔望時令祭饗每月照常薦新有事則告三年重修奉先殿告成是日恭奉神牌各官至太廟於各神位前上香行一跪三叩禮恭奉神牌安奉黃輿內行一跪三叩禮校尉舁輿前列御仗導引皇帝衮服立俟於奉先殿誠肅門之西和碩親王以下內大臣侍衛暨內府各官咸補服立於誠肅門外之南西面恭迎神牌黃輿至誠肅門外皇帝跪衆皆隨跪候神牌黃輿過興贊引官恭導皇帝隨後行衆皆隨行黃輿至奉先門內殿陛上北嚮止贊引官恭導皇帝詣太祖髙皇帝黃輿前立恭奉神牌王等各隨至黃輿前引禮官引內大臣侍衛及內府官由誠肅門奉先門兩旁門入至階下按翼東西面序立皇帝行一跪三拜禮恭奉神牌王等在後隨行禮皇帝恭奉太祖髙皇帝神牌奉神牌王等各恭奉神牌隨皇帝以次進殿奉安於各寶座行一跪三拜禮王等均隨行禮皇帝就拜位立王等各退出於殿陛上按翼北面序立內大臣以下各官均北面立行大饗禮如儀奉神牌王等暨內大臣以下均隨行禮禮成恭導皇帝由殿左門出立簷下東旁西嚮引禮官引陪祀王公大臣官員兩旁序立樂闋恭導皇帝入殿詣太祖髙皇帝神位前行一跪三拜禮恭奉太祖髙皇帝神牌奉神牌王等各詣神位前隨行一跪三叩禮各恭奉神牌以次隨行還御於奉先殿後殿各寢室皇帝退至寢室門外上香行一跪三拜禮王等隨後行禮畢恭導皇帝由後殿左門出由殿東出奉先門左門至誠肅門外升輿還宫十八年奉孝賢皇后神牌祔饗奉先殿豫期皇帝親詣後殿祗告是日遣親王行禮設孝賢皇后神牌於左三間東旁西嚮禮成恭奉孝賢皇后神牌奉安於後殿左三室神龕內南嚮一加上廟號尊諡康熙元年恭加上太祖髙皇帝太宗文皇帝廟號尊諡恭奉改題加上廟號尊諡神牌奉安於奉先殿後殿遣大臣行禮九年恭加上孝康章皇后廟號恭奉改題加上廟號神牌奉安於奉先殿前期一日遣官祗告是日聖祖仁皇帝親詣行大饗禮如儀雍正元年恭加上列祖列后尊諡恭奉改題加上尊諡神牌奉安於奉先殿世宗憲皇帝親詣行大饗禮如儀乾隆元年恭加上列祖列后尊諡恭奉改題加上尊諡神牌奉安於奉先殿皇帝親詣行大饗禮如儀一祗告順治十四年定春秋御經筵前期行幸前期還宫次日均於後殿讀祝文祗告康熙十一年聖祖仁皇帝行耕藉禮前期遣官祗告於後殿十三年奏準春秋御經筵日遣官祗告雍正五年奏準春秋御經筵及行幸如遇大風雨雪則請旨改期將前期祗告改為本日至行耕藉禮定期亥日仍用前期乾隆二年奏準車駕行幸仍於前期祗告如遇朔望則改於本日一列聖列后忌辰及元宵立春淸明四