body:
  text: 禮部祠祭清吏司喪禮一上太宗文皇帝大喪禮崇德八年八月初九日太宗文皇帝崩是日鹵簿全設內外親王以下佐領以上及朝鮮國世子和領福晉以下佐領命婦以上咸成服王以下奉國將軍以上公主和碩福晉以下縣君奉國將軍淑人以上齊集清寧宮前舉哀都統尚書以下各官齊集崇政殿前命婦等齊集大清門外各按旗序立舉哀次日作樂奉安梓宮於崇政殿設几筵樂止王以下各官每日入臨二次上香奠獻祭酒三爵三叩興舉哀凡三日止第四日王公各於府第齋宿部院官各於衙門齋宿間散官於篤恭殿前齋宿凡十八日止諸王以下各官不祈禱不祭祀不燕會凡百日止軍民人等凡十八日止禁屠宰凡十三日止外省官民人等以詔到日摘冠纓成服各官於本衙門齊集每晨夕上香三跪九叩興舉哀凡三日止至二十七日除服初祭禮王以下佐領以上固倫公主和碩福晉以下佐領恭人以上齊集行禮大祭禮鹵簿全設讀文致祭王以下各官公主福晉及官員命婦齊集行禮與初祭同滿月致祭禮王以下各官公主福晉及官員命婦齊集行禮與初祭同九月恭奉寶位詣昭陵前期於几筵前祗告祭酒三爵鹵簿全設作樂前引公主福晉等皆在城門迤北序立候靈駕至跪舉哀候過隨行都統尚書以下佐領以上及佐領恭人以上並外藩喀爾喀鄂爾多斯土默特索倫薩哈爾察等分翼按旗序立候靈駕至跪舉哀候過隨行恭送至陵俟安設畢行奉安禮親王以下佐領以上固倫公主和碩福晉以下副都統夫人以上齊集讀文致祭是日親王以下佐領以上和碩福晉以下佐領恭人以上咸除服凡初祭大祭之次日繹祭禮內大臣侍衛齊集朝鮮國王遣官進表呈送龍燭祭品等物致祭百日致祭禮親王以下參領以上固倫公主和碩福晉以下副都統夫人以上齊集歲暮致祭禮鹵簿全設親王以下佐領以上固倫公主和碩福晉以下固山夫人以上齊集清明致祭禮鹵簿全設親王以下參領以上固倫公主和碩福晉以下縣主以上齊集期年致祭禮親王以下佐領以上固倫公主和碩福晉以下奉國將軍淑人都統尚書一品夫人以上齊集讀文致祭奉安寶位致祭禮親王以下佐領以上固倫公主和碩福晉以下縣主奉國將軍淑人都統尚書一品夫人以上於殿階西齊集孝端文皇后率公主等詣奉安寶位處舉哀跪祭酒三爵畢內大臣輔國將軍奉寶位由中階升至殿內奉安正中位上乃於寶位前恭獻祭品祭酒行禮如儀康熙二年九月改建昭陵十二月安葬寶城地宮祭酒行禮如儀世祖章皇帝大喪禮順治十八年正月初七日世祖章皇帝崩是日鹵簿大駕全設聖祖仁皇帝截髮辮成服王以下文武各官固倫公主和碩福晉以下宗女佐領三等侍衛命婦以上皆成服男摘冠纓截髮辮女去首飾剪髮恭奉梓宮安奉乾清宮張繡九龍黃綺帳幔建丹旐於乾清門外之左設几筵朝晡日中三設奠聖祖仁皇帝親詣尚食哀慟不已太皇太后揮淚撫慰左右無不感動王貝勒貝子公大臣等公主和碩福晉以下縣君宗室公夫人以上每日二次詣几筵前聖祖仁皇帝親視奠祭酒三叩立舉哀副都統以上在乾清門外序立每日二次舉哀命婦皆免齊集在京漢文官依次赴乾清門景運門外齊集武職各官依次赴隆宗門外齊集每日二次舉哀凡三日止外藩進貢官員各給白布服三日而除漢文武候選候補等官及監生吏典僧道等官咸縞素赴順天府署朝夕哭臨凡三日止第四日王貝勒貝子公等公主福晉等各於府第齋宿部院官於各衙門齋宿間散官於午門外齋宿凡二十七日二十七日後王以下奉恩將軍以上都統內大臣尚書子以上每日一次入宮前丹陛上序立副都統男侍郎侍衛每日一次入宮前丹墀序立舉哀其餘各官在乾清門外按翼序立舉哀王以下文武官員不作樂不嫁娶凡百日在京軍民人等摘冠纓服縞素二十七日而除不嫁娶凡一月不作樂凡百日禁屠宰凡四十九日不祈禱不祭神凡二十七日專司太廟奉先殿祭神殿陵寢祭祀事務男婦內監及出征在軍營官兵家屬皆停給孝服本人父母新喪兒女出痘暫免成服未除服前票本用藍筆各部院衙門文移用藍印各衙門本章於十五日後進奏用硃印在京各寺觀自大喪日始各聲鐘三萬杵初八日頒遺詔自宮中奉出至乾清門外禮部尚書跪接由中道奉至午門外奉安層臺上張黃蓋滿漢文武各官素服三跪九叩興復跪聽宣詔畢立舉哀行三跪九叩禮禮部官奉詔設龍亭內由中道出大清門至禮部謄黃遣官頒行天下初九日諭朕惟自古聖賢之君必有顯號徽稱用昭功德之隆垂於萬世此國家不易之巨典也仰惟我皇考大行皇帝纘紹鴻緒統一寰區十有八年敬天尊祖勤政愛民奉侍慈闈克諧孝道敦睦宗族攸敘彝倫典學日新修身思永制禮作樂振武崇文敕法明刑立綱陳紀盛德之事不一而足朕方與天下臣民均切怙戴不幸龍馭上賓顧豫沖人嗣膺大統仰承佑啓之恩敢後顯揚之禮謹考彝章宜升尊諡該部詳察典禮具奏欽此外省領兵王公大小各官遺詔到日咸摘冠纓服縞素跪候過至衙門內安設行三跪九叩禮跪聽宣詔畢立舉哀行三跪九叩禮興官兵摘冠纓三日至第四日照常供事直省文武各官詔到日咸摘冠纓服縞素跪候過至衙門內安設行三跪九叩禮跪聽宣詔畢立舉哀行三跪九叩禮朝夕哭臨凡三日至二十七日除服官員命婦亦素服二十七日而除軍民人等及妻素服十三日而除不嫁娶凡一月不作樂凡百日督撫提鎮及三司官皆免進香十一日孟春時饗太廟遣官素服行禮樂設而不作各官咸不陪祀十九日几筵前行殷奠禮聖祖仁皇帝親詣陳金銀定以楮為之後仿此三萬楮錢楮帛各三萬祭筵二十一席羊九酒十有一尊是日黎明王以下滿漢文武各官以上縣君奉恩將軍恭人以下民公侯伯都統內大臣尚書子命婦以上齊集讀祭文時聖祖仁皇帝跪衆皆跪讀畢祭酒三爵立舉哀祭畢讀祭文官奉至燎位焚畢衆皆退二月初一日奉移梓宮行啓奠禮聖祖仁皇帝親詣陳設禮儀與殷奠同初二日奉移梓宮至景山夀皇殿是日鹵簿大駕全設奉移時祭酒三爵經過門橋皆祭酒焚楮錢三旗侍衛舁輿出宮舁輿夫校分設八班首班末班以鑾儀衛校尉八十人餘班每班八十人選五城民夫給以衣履令其澡沐服紅紬團花遜衣戴插黃翎氊帽又以民公侯伯一等侍衛以下參領輕車都尉以上給事中御史郎中以下員外郎等官以上每班八人管轄鑾儀衛官四人更番指示進退舁丹旐每班三十二人以部院官四人內府官四人管轄王以下奉恩將軍以上內大臣侍衛在乾清門外按翼序立候靈駕至跪舉哀候過隨行覺羅民公侯伯以下滿漢文武各官在東華門外按翼齊集候靈駕至跪舉哀候過各按旗排列隨行將至景山時王以下男以上先趨進至門內其餘文武各官先趨至門外按翼序立公主福晉以下縣君奉恩將軍恭人以上都統內大臣尚書子等命婦咸於門內副都統侍郎命婦以下佐領三等侍衛命婦宗室女以上在門外按翼序立候靈駕至皆跪舉哀候過聖祖仁皇帝恭隨靈駕步行號泣王以下滿漢文武官員伏地悲慟既至夀皇殿奉安梓宮設几筵聖祖仁皇帝祭酒三爵每一祭酒一叩後同哀戀不已太皇太后再三慰諭始還宮衆皆退乃焚丹旐楮錢初三日行初祭禮聖祖仁皇帝親詣陳冠服楮製丹旐一金銀定二十萬五千楮錢十有四萬五千各色畫段以楮為之萬端楮帛五萬祭筵八十一席羊二十有七酒四十一尊鹵簿大駕全設於夀皇殿大門前王以下各官公主福晉以下四品官三等侍衛命婦以上齊集讀祭文衆皆跪讀畢聖祖仁皇帝祭酒三爵衆皆三叩立舉哀祭畢讀祭文官奉至燎所祭酒三爵焚畢衆皆退是日滿二十七日聖祖仁皇帝除服衆皆除服次日繹祭金銀定二萬楮錢一萬祭筵十有一席羊五酒五尊內大臣侍衛禮部工部堂官齊集致祭聖祖仁皇帝親祭酒行禮初七日行滿月致祭禮金銀定五萬楮錢五萬祭筵二十一席羊九酒九尊是日王以下鎮國將軍以上公侯伯以下侍衛文武三品官以上公主福晉以下鎮國將軍夫人都統內大臣尚書子命婦以上齊集聖祖仁皇帝親祭行禮餘與初祭同以後百日內滿月致祭與初滿月同期年內滿月致祭金銀定二萬楮錢一萬祭筵十有一席羊五酒五尊不讀文清明日不讀文不焚楮錢進挂紙錢寶花一座聖祖仁皇帝親詣祭酒舉哀行禮衆皆齊集餘與初滿月同三月工部敬製廟號尊諡册寶成送內閣刻字填靑大學士禮部堂官行一跪三叩禮填靑畢敬貯內閣擇吉恭上尊諡曰體天隆運英睿欽文大德𢎞功至仁純孝章皇帝廟號世祖前期三日齋戒如常儀前期一日遣官各一人祗告天地太廟社稷至日鑾儀衛官於夀皇殿大門前陳設鹵簿大駕作樂內禮儀院設册寶黃案二於殿門外一設正中一設左旁鴻臚寺設册寶黃案二於太和門階上正中設采輿二於階下大學士二人奉册寶奉安黃案上一跪三叩興聖祖仁皇帝素服御太和門大學士二人各詣黃案前一跪三叩奉册寶奉安各亭內復一跪三叩退校尉舁行册前寶後黃蓋一柄御仗二對前導鴻臚寺官恭導聖祖仁皇帝降階升輿隨亭後行親王以下奉恩將軍以上於協和門外兩旁序立俟亭至跪候過隨行文武四品官以上於東華門外序立俟亭至跪候過隨行亭由景山東門入至夀皇殿大門外聖祖仁皇帝降輿册寶亭由中門入至簷前左旁安設導引官恭導聖祖仁皇帝由左門入至殿門外左旁立王以下公以上咸序立於大門內兩旁文武四品官以上序立於大門外兩旁大學士二人至册寶亭前一跪三叩各奉册寶設左旁案上先奉絹册寶設正中案上太常典儀官唱執事官各共乃職導引官恭導聖祖仁皇帝就拜位立贊引官奏跪拜興聖祖仁皇帝行三跪九拜禮興王以下各官皆隨行禮贊引官奏跪聖祖仁皇帝跪奏進册奉册大學士從左案恭奉跪進聖祖仁皇帝奉册恭獻畢授右旁大學士跪接設於正中案上奏進寶奉寶大學士從左案恭奉跪進聖祖仁皇帝奉寶恭獻畢授右旁大學士跪接設於正中案上奏宣册宣册官詣册案奉絹册跪宣畢仍設案上三叩退奏宣寶宣寶官詣寶案奉絹寶跪宣畢仍設案上三叩退贊引官奏跪拜興聖祖仁皇帝行三跪九拜禮王以下各官皆隨行禮次於几筵前致祭贊引官奏行三跪九拜禮王以下各官皆隨行禮贊行初獻禮司帛官司爵官詣几筵前恭獻贊引官奏跪聖祖仁皇帝跪衆皆跪贊讀祝讀祝官一跪三叩從案上奉祝文跪讀畢陳帛案上一跪三叩退贊引官奏行三拜禮王以下各官皆隨行禮贊行亞獻禮司爵官進獻於左如初獻儀贊行終獻禮進獻於右如亞獻儀奏行三跪九拜禮王以下各官皆隨行禮贊恭送祝帛詣燎位奉絹册寶官奉祝帛官皆詣案前一跪三叩以次奉至燎所焚訖大學士二人各行一跪三叩禮奉香册寶贊引官恭導聖祖仁皇帝詣几筵前奉安奏行一跪三拜禮禮成聖駕還宮次日頒詔天下四月十七日行百日致祭禮金銀定五萬楮錢四萬五千楮帛二萬祭筵二十五席羊九酒十有三尊王以下各官公主福晉以下縣君奉國將軍淑人都統內大臣尚書子命婦以上齊集讀文祭酒行禮是日行恭題神主禮內閣大學士一人進觀德殿內於升祔太廟神主前上香一跪三叩恭奉神主禮部官導至夀皇殿門外所設黃幄內奉安黃案上上香一跪三叩退內閣滿漢大學士各一人咸朝服盥手詣神主香案前一跪三叩興於神主神字空處恭點石靑畢一跪三叩奉安黃幄內王以下文武各官齊集東華門外按