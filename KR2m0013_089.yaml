旗末武官在鑲藍旗末序立隨班行禮舉哀四月初二日靈駕將至景陵世宗憲皇帝先恭謁暫安奉殿孝陵孝東陵孝誠仁皇后孝昭仁皇后孝懿仁皇后陵寢行禮畢至紅門內更衣殿祗俟仁夀皇太后率孝敬憲皇后貴妃等次第謁陵禮畢於陵寢大門之西所設黃幔城內祗俟是日凡皇陵不直班官員咸於興龍口之外排班跪迎靈駕至舉哀候過隨後行世宗憲皇帝於紅門外跪迎舉哀候過徒步隨行靈駕入東門東柵門由甬道行至七洞橋北由景陵甬道至三洞橋南降大升輿時跪於左旁候梓宮升小輿豫進大門內東旁跪候過興梓宮安奉設几筵畢內務府禮部堂官奉册寶列於左右世宗憲皇帝祭酒行三拜禮衆隨行禮舉哀畢各退是日諭扈從諸王滿漢大臣前在京師原議明日祭畢回京朕親送梓宮沿塗於大禮雖獲免闕遺而思慕未有窮期哀痛何能自已若明日即叩别梓宮實為不忍朕欲留住山陵數日然後回京爾諸王大臣務體朕意再議具奏諸王大臣等合辭固請奏稱聖駕奉皇太后在此若不回鑾皇太后亦必愈加哀慟所關甚重懇請仍照原議初三日行暫安奉致祭禮陳羊酒祭筵各祭物如數鹵簿全設扈從王公大小官員及外藩諸臣咸齊集排班行禮讀文致祭世宗憲皇帝恭送冠服於燎所祭酒盡哀是日回鑾初九日總理事務王大臣奏請御門聽政奉旨諸王大臣所奏雖是我皇考梓宮尚在饗殿朕即臨御正門聽政心實不安念皇考付託重大節養朕身至一切禮儀多有未盡每以天下萬民事關緊要勉強照常辦理亦無貽誤臨御正門聽政俟梓宮奉安地宮後舉行欽此十一日王大臣等復合辭固請以禮制情擇期聽政用慰中外臣民之望乃勉從衆請十五日恭奉聖祖仁皇帝御容於夀皇殿凡平日圖書器用服御之物悉陳左右自是每逢朔望及四時節序世宗憲皇帝必親詣行禮先是仁夀皇太后自聖祖仁皇帝升遐哀痛過甚體常違豫及親送聖祖仁皇帝梓宮至陵事畢回宮積哀莫解至是疾大漸五月二十三日慈馭上賓世宗憲皇帝劈踊號痛連辰逹旦奉安梓宮於寧夀宮中在蒼震門內設倚廬以居喪儀别載七月十五日遣官詣景陵饗殿行中元致祭禮陳設禮儀與順治十八年中元致祭儀同八月十八日奉移孝恭仁皇后梓宮世宗憲皇帝親送至景陵二十四日世宗憲皇帝恭謁暫安奉殿孝陵孝東陵行禮祭酒舉哀遂詣景陵至饗殿几筵前行禮祭酒舉哀畢至黃幄內恭候孝恭仁皇后梓宮安奉畢乃出二十五日世宗憲皇帝詣景陵先於聖祖仁皇帝几筵前上食奠獻旋詣孝恭仁皇后几筵前行暫安奉禮讀文致祭畢乃出傳旨翼日仍詣景陵景陵饗殿內原奉孝誠仁皇后孝昭仁皇后孝懿仁皇后神位暫移於東一間暖閣恭修加上尊諡廟號聖祖仁皇帝梓宮奉安殿中於殿左恭造蘆殿奉安孝恭仁皇后梓宮陳設几筵咸如儀二十八日諭大學士等點主一事所關甚重古人必取名望素著德性純粹者充此職今爾等位既貴顯人品皆優故簡命爾等當體朕敬重之誠勿視為差委故事誠意所聚儼若聖祖神靈洋洋如在筆間方副朕一片孝思欽此二十九日行祗告大葬致祭禮聖祖仁皇帝鹵簿全設孝恭仁皇后儀駕全設扈從王以下官員及守陵大臣官員大臣命婦官員妻等咸齊集至時世宗憲皇帝詣饗殿於聖祖仁皇帝几筵前讀文致祭奠獻行禮畢詣孝恭仁皇后几筵前讀文致祭奠獻行禮畢乃暫出至隆恩門外幄次俟徹祭品少頃復入於聖祖仁皇帝梓宮前祭酒奉移時聖駕前行至明樓前蘆殿恭奉聖祖仁皇帝梓宮奉安於龍輴畢復至孝恭仁皇后梓宮前祭酒舉哀奉安於聖祖仁皇帝梓宮之右均北嚮册寶各設於梓宮兩旁行奠獻禮是日命凡聖祖仁皇帝諸皇子皇孫及向日親近大小臣工皆得入蘆殿瞻仰梓宮是日焚鹵簿儀駕九月初一日恭奉梓宮安葬景陵是日早世宗憲皇帝詣景陵行奠獻禮凡聖祖仁皇帝皇子皇孫及向日親近大小臣工皆命至蘆殿內瞻仰梓宮駕至蘆殿內跪撫梓宮劈踊哀痛欽天監奏報吉時乃於聖祖仁皇帝梓宮前祭酒三爵次於孝恭仁皇后梓宮前祭酒三爵各行三拜禮畢至陵寢門外向北跪哭以俟諸臣恭率校尉先奉聖祖仁皇帝龍輴入地宮次奉孝恭仁皇后龍輴入地宮奉安梓宮於寶牀陳册寶於各石案畢掩閉元宮石門畢世宗憲皇帝於祭臺前祭酒三爵行三拜禮衆隨行禮舉哀畢乃出至幄次俟隆恩殿陳設俎豆牲牢畢禮部堂官奏請詣隆恩殿行恭題神主禮鑾儀衛豫設黃輿二於隆恩殿前丹陛之下內府官設奉神主龍鳳寶座各一於隆恩殿內一正中一居右前設供案又前設香案均南嚮設恭題神主案二於香案之旁一在東西嚮一在西東嚮設安神主櫝案於寶座兩旁南嚮設御拜褥於正中至時世宗憲皇帝龍袍衮服滿漢大學士各二人朝服執事官陪祭官咸蟒袍補服贊引官二人導聖駕由隆恩門左門入升正靣左階進殿左門至中北嚮立鴻臚寺官引王以下入八分公以上由左右門升左右階至丹陛上立文官五品武官四品以上在丹陛下按翼序立恭奉神主大臣二人就案上啓櫝奉神主各設左右黃案上東西嚮滿漢大學士各詣案前一跪三叩興各就位於神字空處恭點石青畢退立兩旁二大臣恭奉神主各跪安於龍鳳寶座三叩退乃行虞祭禮上香奠帛讀祝三獻爵送燎均如常儀禮成鑾儀衛堂官率校尉舁黃輿於月臺上一設正中一設於右均南嚮太常寺官跪奏恭請聖祖仁皇帝神主孝恭仁皇后神主升祔太廟世宗憲皇帝詣寶座前一跪三拜恭奉聖祖仁皇帝神主大學士恭導由饗殿中門出奉安於正中黃輿內親王一人恭奉孝恭仁皇后神主隨出世宗憲皇帝奉安聖祖仁皇帝神主畢親王奉安孝恭仁皇后神主於右旁黃輿內退至正中一跪三拜興轉立東旁校尉舁行黃蓋御仗內大臣十人大學士四人及禮部堂官前導神主黃輿過世宗憲皇帝跪王公各官皆隨跪候過興隨行至隆恩門中門聖駕由東門出先詣宿次恭俟塗次按程設黃幄奉聖祖仁皇帝神主黃輿居左孝恭仁皇后神主黃輿居右執事官各設供案於輿前每案陳果品十二盤酒三爵正中設香案陳設畢禮部太常寺堂官奏請世宗憲皇帝詣神位前行夕奠禮恭導世宗憲皇帝入黃幄詣香案前司香官跪進香世宗憲皇帝三上香就拜位行三跪九拜禮禮畢恭導世宗憲皇帝出黃幄至升輿處升輿還行營是日以山陵禮成遣官祗告暫安奉殿孝陵孝東陵並祭皇陵后土昌瑞山之神初二日禮部太常寺堂官恭導世宗憲皇帝至黃幄黃輿前朝奠禮畢校尉舁行世宗憲皇帝仍先詣宿次黃幄祗俟行夕奠禮如前儀初三日朝奠禮畢世宗憲皇帝先回京祗俟遣官一人代行夕奠次日朝奠禮初四日神主黃輿至京城由朝陽門入在京大小官員咸朝服跪迎於大清門外世宗憲皇帝御祭服率王公內大臣大學士侍衛等咸朝服跪迎於端門之外隨入太廟街門遣王等三人恭請孝誠仁皇后孝昭仁皇后孝懿仁皇后神主奉安於各黃輿內俟聖祖仁皇帝黃輿過四后神主黃輿以次隨行至廟門外黃輿止世宗憲皇帝親奉聖祖仁皇帝神主諸王各奉四后神主入太廟行升祔大祭禮詳見升祔儀十一月十三日聖祖仁皇帝忌辰世宗憲皇帝詣奉先殿行禮辰時詣夀皇殿聖祖仁皇帝御容前行禮先期特命皇子詣景陵恭代行期年致祭禮其隨往大小官員於各部院衙門照例遣三分之一前往至是日陳羊酒祭筵各祭物如數設奠几於隆恩殿月臺正中排列隨饌於月臺兩旁設祭文案於隆恩殿西簷下禮部堂官恭奉祭文由隆恩門中門入設於案上諸王內大臣侍衛大學士於隆恩門外按翼序立文武官員於三橋前按翼序立守陵官員命婦內府婦女咸於大門內西牆序立至時禮部堂官引皇子進至隆恩門西門上右階於月臺西邊立陳設畢讀祝官奉祝文跪皇子詣奠几前跪衆在齊集處隨跪哀暫止讀祭文畢禮部堂官奉爵皇子祭酒三爵每祭行一叩禮衆隨行禮畢徹饌讀祝官恭奉祭文禮部堂官前導恭送燎位皇子隨出至燎所祭酒三爵每祭行一叩禮衆隨行禮舉哀畢各退十二月十五日工部奏張挂門神對聯奉旨居中宮殿及中門照常張挂至朕所居之養心殿暨宮內各處皆過三年再行二年九月初六日以元旦元夕及慶賀行禮廷臣朝服日期奏請奉旨俟朕素服三年後著照所請行十一月十二日冬至禮臣請於次日升殿行禮奉旨去歲冬至因聖祖仁皇帝配天禮成頒詔天下是以御殿今年冬至次日著停止行禮十三日遣官恭謁景陵行再期致祭禮十二月初十日部臣奏請雍正三年二月十三日服制已滿請祫祭太廟頒示中外臣民即吉釋哀奉旨朕受皇考四十餘年顧復深恩罔極莫報默盡哀情非謂能行歷代帝王不能行之事欲立法定制以垂令名昔世祖聖祖皆以沖齡登極一時禮制容或未備設踐阼之日已若朕躬之年則盡禮盡制必有朕所萬不能逮者今朕諒隂三年不過默盡其心抱歉之處尚多敢云盡禮乎至深山窮谷無不哀戀思慕遏密八音此皇考六十餘年深仁厚澤愈久不忘出於人心之自然非朕有所禁約而然也所奏著九卿詹事科道會議具奏遵旨議準於聖祖仁皇帝服制滿後擇吉行祫祭禮並敕諭順天府府尹及直省督撫遍示臣民俱行吉禮三年欽天監謹奏二月二日庚午二曜合璧五星聨珠為四千餘年未有之嘉瑞諸王文武大臣等合辭懇請升殿受賀奉旨朕惟皇考六十餘年敬天勤民始終如一是以上天申眷睹此嘉祥在皇考為福鍾喜慶之餘在朕躬為迎迓天庥之始惟期與大小臣工矢誠心而敦實政升殿受賀不必舉行但念天瑞實因皇考而致遣官告祭景陵二月十二日聖祖仁皇帝服制二十七月期滿世宗憲皇帝詣太廟行祫祭禮讀祝奠獻一如歲暮大祫儀次日諭順天府府尹直省督撫朕惟古昔帝王以孝治天下誠以孝者天之經地之義民之則也故魯論云慎終追遠民德歸厚矣朕以眇躬纘承大命永惟皇考聖祖仁皇帝顧復洪慈恩德罔極中心哀痛什伯恆情以日易月實所不忍特以郊廟大祀朝會重典不容久曠時亦勉從諸王大臣之請遵禮舉行惟於宮庭內素服齋居默盡此心每撫時觸景輒增悽愴僾見愾聞之際哀發於中澘然出涕古人云禮之至者無文哀之至者無節實非有所仿而行亦非欲以立法定制垂於天下後世也終身孺慕寧有巳時今諸臣據二十七月即吉之文合辭公請祫祭釋服朕以禮制情勉允所請於雍正三年二月十二日祫祭太廟釋服即吉伏念皇考聖祖仁皇帝御極六十一年深仁厚澤普遍寰區賓天之日凡京畿直省海澨山陬士農工商白叟黃童莫不呼號哀泣孺慕之誠三載以來有如一日今舉行吉禮應敷告天下朕嗣位以來惟日兢兢嚴恭寅畏不敢怠息庶幾克荷皇考聖祖仁皇帝付託之重百姓受皇考聖祖仁皇帝教育深恩當勉勵忠誠勤守職業言慈言孝克友克恭農夫盡力於南畞工商致精於器用毋尚奢侈毋事浮偽共期歸真返朴比戶可封以無負皇考六十餘年培養漸摩之至德於朕奉先思孝之心實有賴焉爾該地方官遍行曉諭俾薄海黎民咸悉朕意欽此是年十一月十三日聖祖仁皇帝三周屆期世宗憲皇帝率孝敬憲皇后妃嬪等恭謁景陵致祭至日豫設饌案祭文案禮部堂官恭奉祭文由隆恩門中門入安奉西簷案上王公大臣侍衛等豫於隆恩門外文武官員於三橋南按翼序立守陵官員命婦執事婦女豫入陵寢門內西牆排立祭前孝敬憲皇后妃嬪等自行營先至隆恩門外西旁幄次內候世宗憲皇帝至隆恩門外東旁幄次孝敬憲皇后妃嬪等豫由隆恩門西門入至明樓前祗俟禮部堂官奏請世宗憲皇帝由隆恩門東門升正靣左階進隆恩殿左門舉哀進茶進饌畢執事官進奠几於正中世宗憲皇帝詣几前北嚮跪衆皆跪讀祝官奉祭文至殿中閾外正中跪讀哀暫止讀畢大臣進爵世宗憲皇帝三祭酒每祭行一拜禮孝敬憲皇后妃嬪等在明樓前均隨行禮諸王大臣侍衛官員等於各排立處隨行禮禮畢徹饌讀祝官恭奉祭文禮部堂官前導由中門出送燎所遣官祭酒三爵每祭一叩王以下官員以上隨行禮舉哀畢各退欽定大清會典則例卷八十五
