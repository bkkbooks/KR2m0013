臣在地宮前跪祭酒三爵內大臣侍衛文武各官咸隨行禮舉哀各退是日鹵簿儀仗盡焚訖次日輔臣內大臣侍衛文武各官詣陵謁辭皆進圓城內序立舉哀畢輔臣等跪於陵前祭酒三爵文武各官皆行三跪九叩禮兩旁序立舉哀畢各退回京饗殿告成奉安世祖章皇帝神位於正中寶座孝康章皇后神位於左孝獻皇后神位於右均南嚮乃行致祭禮讀祝奠獻一如時饗儀聖祖仁皇帝大喪儀康熙六十一年十一月十三日聖祖仁皇帝崩小斂時凡帶履之屬世宗憲皇帝皆躬奉首戴以進敬體聖祖仁皇帝孝思用太皇太后昔時所賜冠服十四日諭皇考教養文武大小臣工六十餘年孰不躬沐深恩今一旦升遐衆心哀痛切至大斂時著令王貝勒貝子公文武大臣皆入乾清門內令其瞻仰得盡哀戀之情欽此是日奏儀注內公主福晉咸於乾清宮丹墀齊集奉旨皇考之女朕兄弟之福晉豈可遠列丹墀朕心不忍著仍入大內親近梓宮使得盡哀朕之兄弟子姪亦皆令入乾清門在丹陛上隨朕行禮嗣後公主近支王公福晉夫人咸齊集於几筵殿內是日戌時大斂既斂乃奉梓宮於乾清宮中設几筵乃奠以東廡為倚廬建丹旐於乾清門外之左簡命王公大臣恭理喪儀並簡進爵大臣凡入乾清門陳設官員執事人等皆豫行奏聞並令直班之班領侍衛隨入是日鹵簿大駕全設世宗憲皇帝截髮辮諸皇子截髮辮成服仁夀皇太后孝敬憲皇后妃嬪公主皇子福晉均剪髮摘耳環成服王以下文武各官內務府官員等公主和碩福晉以下宗室命婦佐領三等侍衛命婦以上皆截髮成服罷黜宗室官員及間散覺羅人等亦準成服外國貢使及外藩公主福晉等額駙王台吉等在二十七日內至京者成服二十七日後至京者男摘冠纓女去耳環三日專司太廟堂子奉先殿祭神殿陵寢祭祀事務男婦內監及出征在軍營官兵家屬皆停給孝服本人父母新喪兒女出痘暫免成服十五日世宗憲皇帝行朝奠禮至日中至晡時禮皆如之齊集王以下文武各官公主福晉以下命婦等皆隨行禮是日冬至大祀圜丘照常奏樂遣官分獻陪祀執事各官咸朝服將事初喪三日內每日哭臨三次王以下入八分公以上內大臣內閣大學士學士前鋒統領護軍統領上三旗都統副都統侍衛等內務府官員於乾清門外五旗都統副都統各部院滿漢大臣以下有頂帶官員以上各依班次齊集於景運門外在內公主福晉等乘馬至蒼震門入內五旗王福晉郡主等乘馬依次進至隆宗門入內大臣命婦等步行依次進至隆宗門哭臨均由神武門出入值大臣命婦官員妻不齊集之日右翼滿漢官員仍於隆宗門外序立俟朝夕奠祭酒隨班舉哀畢退第四日王貝勒貝子公等公主福晉等在府第齋宿部院職事官在本衙門齋宿散秩官在午門外齋宿仍每日哭臨凡二十七日而止自初喪日為始王以下文武官員以上一年內不作樂百日內不嫁娶在京軍民人等二十七日內摘冠纓服素服百日內不作樂一月內不嫁娶二十七日不祭神凡候選候補文武官員舉貢監生吏典僧道官素服齊集順天府朝夕哭臨凡三日二十七日內各部院文移皆用藍印惟奏章過十五日後用硃印詔旨藍筆批答京城寺觀各聲鐘三萬杵十六日頒大行皇帝遺詔禮部遵例奏進儀注內未有皇帝應行之禮乃諭王大臣禮部遺詔自官奉出朕豈可安處苫次應作何行禮公同議奏欽此遵旨議準遺詔奉出時聖駕在乾清宮外東立西嚮大學士謹奉遺詔由中道出聖駕跪俟過回苫次大學士奉遺詔至乾清門外授禮部堂官禮部堂官三叩跪接由中道出午門至天安門外安設層臺上張黃蓋親王以下滿漢文武各官三跪九叩聽宣讀畢齊立舉哀復行三跪九叩禮禮部官奉詔設龍亭內由中道出大清門至禮部謄黃刋刻遣官頒行天下領兵之諸大臣各於遺詔到日皆摘冠纓素服跪接進營行三跪九叩禮跪聽宣讀畢興舉哀復行三跪九叩禮官兵摘冠纓三日至第四日照常辦事直省文武各官遺詔到日皆摘冠纓服縞素跪接至公署安設三跪九叩跪聽宣讀畢興舉哀又三跪九叩成服朝夕哭臨三日至二十七日除服官員命婦亦素服二十七日官員一年內不作樂百日內不嫁娶軍民人等及妻二十七日內素服不祭神百日內不作樂一月內不嫁娶凡有頂帶官員及舉貢生監吏典僧道官咸素服於各該衙門齊集三日內朝夕哭臨督撫提鎮及三司官悉免進香又諭蒙古王台吉等皇考時凡有大事未出痘者不令來京朕仰遵皇考愛恤外藩至意著行文各蒙古未出痘者不必來京欽此遺詔二十七日除服十八日諭諸王大臣等朕凡事無不遵奉皇考遺旨但持服乃人子之道二十七日服制朕斷然難從若此事朕不得行其志必至悶恨無己爾等宜體朕意欽此十九日禮部奏本月二十日紹承大寶行祗告禮其朝奠應遣官恭代奉旨朕仍親奠明早上食時朕祭酒畢旁立俟徹奠案後再行祗告禮二十日諭朕惟自古賢聖之君必有顯號徽稱以昭功德之盛垂於萬世此國家不易之巨典也仰惟我皇考大行皇帝臨御六十一年早承大統寅畏小心旦明凛昭恪之忱郊祀親升中之典監於成憲率由舊章孝奉兩宮尊養兼至展敬陵廟備物盡誠總覽萬幾阜成兆姓蠲賦動盈千萬振恤曾不稽時水旱先籌雨暘必達寬刑肆赦德洽好生盛暑則釋囹圄嚴寒則振饘粥兵糧豫給優賞屢頒淮甸屢巡動纍百萬之帑金運睿謨而兩河底績魯郊特幸行數千年之殊禮屈帝尊而九拜崇師覽奏牘而利弊周知覲臣僚而賢愚立辨保全勳舊庇蔭宗支廣育人材敦厚風俗布昭聖武申討不庭元裔背叛而旋踵就殲三孽逆命而剋期獻馘鄂羅斯占喀爾喀之疆圉諭以威德即奉約章喀爾喀逼厄魯特之暴殘納其困窮胥登袵席噶爾丹肆毒鄰境三臨絶漠掃盡烽煙䇿妄阿拉布坦摧滅與國出師命將恢復藏地臺灣置郡紅苗格心南朔東西無思不服至於天縱生知日新好學講筵時御手定六經廣博士於五賢配先儒於十哲文嫓二典書邁百家貫徹天文總括地理旁羅術數考正元聲研索羣編鑒裁纂輯凡此難名之美善洵互古帝王首出之一人雖復纍牘連章不能繼述萬一朕方與天下臣民均切怙戴不意龍馭上賓顧豫沖人嗣膺大統仰承佑啓之恩敢後顯揚之禮謹考彝章宜升尊諡詳察典禮具奏欽此二十一日諸王大臣等以萬幾至重難以久曠請遵遺詔二十七日除服奉諭除服之制以日易月雖始於漢文而髙宗諒隂三年獨非古制乎朕不能上比髙宗而思慕之情何能自已揣爾等惟恐過勞朕躬殊不知有服朕尚可稍進饘粥暫眠苫塊若必強朕除服必至寢食皆廢矣皇考遺命一句一字朕無不拳拳服膺只此二十七日除服之詔非敢故違而罔極深恩哀思迫切雖蹈違命之愆亦不恤也朕言及此曷勝嗚咽實不能悉朕之悲思爾諸王大臣其諒之欽此二十三日行殷奠禮陳羊酒祭筵各祭物如數設大行皇帝冠服於几筵鹵簿全設王以下大臣官員以上公主福晉以下大臣命婦以上照常齊集設饌案於乾清宮几筵前設隨饌筵於月臺上御道左右設祭文案於宮廊之西簷下是日早禮部尚書恭奉祭文侍郎前導由乾清門中門入設西簷下黃案上至時奏請世宗憲皇帝詣梓宮前東立西嚮舉哀視陳設祭饌上食畢執事官進奠案於正中讀祝官奉祭文跪世宗憲皇帝跪衆於齊集處隨跪哀暫止讀文畢舉哀世宗憲皇帝祭酒三爵每祭一拜衆隨行禮畢興乃徹祭饌讀祝官奉祭文禮部堂官前導送至景運門外燎位於左旁立內監等恭舉大行皇帝冠服由中門出自丹陛起內大臣十人恭導由乾清門中門出齊集之王公大臣皆跪候過隨行至燎位承奠王祭酒三爵跪拜時衆隨行禮舉哀禮畢衆皆退是日諸王大臣等考據古今喪服典禮合辭虔懇奏稱從來天子之孝與士庶人不同孝經云天子以德教加於百姓施於四海為孝書稱髙宗諒隂晉臣杜預謂是釋服後心喪之文蓋以人君一身為郊廟社稷之主祭為吉禮必於除服後舉行若二十七日不即除服則祀典不免有闕大行皇帝聖學淵深若易月之制可以更易豈肯於遺詔中諄諄垂訓伏乞上思郊廟神靈之所倚賴下念中外臣民之所託命勉遵遺詔俯順輿情疏入復叩首固請始奉旨朕覽諸王大臣所奏引據經書義理明晰朕惟有嗚咽悲痛耳始知為君之難祗此持服一節乃天子第一苦衷轉不如臣庶尚能各盡其心雖勉從所請朕之哀思因兹愈切矣逮二十七日世宗憲皇帝釋縞素仍素服至雍正三年八月二十一日孝恭仁皇后服闋後始釋二十四日總理事務王大臣內閣禮部翰林院奏稱大行皇帝聖德神功頌揚莫罄尊諡廟號乃追崇大典臣等蠡測管窺未能比擬萬一皇上至孝性成惟聖人能知聖人伏乞睿思親定昭垂萬世奉諭朕思子臣尊崇君父之心何有止極然必至允至當方孚千秋定論我皇考纘繼大統本應稱宗但經云祖有功而宗有德我皇考鴻猷駿烈冠古爍今拓宇開疆極於無外論繼統則為守成論勳業則為開創朕意宜崇祖號方副豐功但追崇大典理應僉謀共協一人之心即千萬人之公心一時之論即千萬世之公論爾諸王大臣等可會同九卿翰詹科道文六品以上武四品以上詳考舊章從公確議欽此二十六日諸王貝勒貝子公文武大臣官員等奏稱大行皇帝功德巍煥天地化育有未周者大行皇帝實贊之祖宗經綸有未竟者大行皇帝實𢎞之孔子集千聖之大成大行皇帝集百王之大成史稱帝堯其仁如天惟大行皇帝實與並之又按禮經稱有虞氏祖顓頊而尚書所載有格於文祖格於藝祖之文則有虞氏有三祖是知凡配天者皆得稱祖也廷議僉同輿情允洽惟聖字可以贊揚大行皇帝之峻德惟祖號可以顯彰大行皇帝之隆功恭擬尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝廟號曰聖祖天下萬世稱曰聖祖仁皇帝奏入本日奉諭諸王大臣官員深悉我皇考一生神聖實行同心合辭恭上尊稱甚愜朕意因親刺指血將本內聖祖字圈出恭奉授大學士等齎出十二月初一日於几筵前致祭行啓奠禮陳設禮儀與殷奠同是日諭近支王等曰皇考明年七旬大慶吾兄弟方思以萬夀聖節在暢春園供奉甘旨與四海臣民共效無疆之祝豈意今年此日乃於乾清宮作如此陳設耶言念及此心肝摧裂因大慟不止諸王皆伏地號泣是日向夕復於乾清宮陳設果饌並隨筵二十七席世宗憲皇帝詣几筵前躬奉酒饌跪而勸侑痛哭失聲初三日行奉移禮是日鹵簿全設至時世宗憲皇帝詣梓宫前祭酒三爵畢退立東旁跪候遷移梓宮俟過隨行至景運門外梓宮升大升輿世宗憲皇帝西嚮跪舉哀禮部堂官祭輿祭酒三爵行三叩禮衆隨行禮畢靈駕發世宗憲皇帝於左隨行每舁校更班時皆跪候內大臣侍衛在乾清門外分翼齊集王以下公以上在東華門外南池口齊集左翼大臣官員等在東安門內大街齊集漢大臣官員等在騎河樓路口齊集右翼大臣官員等在景山東門北齊集皆候靈駕至跪舉哀俟過隨行仁夀皇太后孝敬憲皇后妃嬪等自順貞門升輿先出神武門進景山門在夀皇殿祗候在內福晉公主等豫在夀皇殿大門內在外福晉以下官員命婦以上豫往夀皇殿大門外西牆序立內務府官員妻亦豫往在命婦後序立候靈駕至咸跪舉哀王公內大臣大學士前鋒統領護軍統領上三旗都統副都統侍衛等內閣學士內務府官員等於景山東門內分班序立舉哀五旗都統尚書漢大臣至有頂帶官員均於景山東門外分翼序立舉哀候過舁輿夫役八班首班末班以鑾儀衛校尉八十人餘班每班八十人選五城民夫給以衣履