body:
  text: 光祿寺一祭祀執事恭遇親祀各壇廟飲福受胙夲寺卿少卿進爵進胙爵胙案左右滿署官各一人専司爵盤乾隆四年奏準祭祀壇廟太常寺移文取監宰官夲寺委署正一人赴宰牲所會執事官監宰牲瘞毛血十七年奏準大祀宰牲增光祿寺卿一人監視一頒胙祭天地社稷宗人府內閣各十斤六部理藩院都察院大理寺通政使司詹事府鑾儀衛京畿道各七斤順天府太常寺太僕寺光祿寺六科五城起居注各五斤翰林院國子監鴻臚寺太醫院欽天監中書科各四斤內務府掌儀司牲俎半分祭太廟前代帝王廟宗人府內閣各二十斤六部理藩院都察院大理寺通政使司詹事府鑾儀衛京畿道各十有五斤順天府太常寺太僕寺光祿寺六科五城起居注各十斤翰林院國子監鴻臚寺太醫院欽天監中書科各七斤內務府掌儀司牲俎一分胙肉由太常寺交送夲寺分派委官監視傳知各衙門於祭所支領一滿席一等席用麵百二十斤紅白饊支三盤餅餌二十四盤又二碗乾鮮果十有八盤二等席用麵百斤品數與一等席同三等席用麵八十斤紅白􅠑饊三盤棋子四碗麻花四盤餅餌十有六盤乾鮮果十有八盤四等席用麵六十斤紅白􅠑饊三盤棋子四碗麻花四盤餅餌十有六盤乾鮮果十有八盤五等席用麵四十斤品數與四等席同六等席用麵二十斤紅白􅠑饊三盤棋子二碗麻花二盤餅餌十有二盤乾鮮果十有八盤萬夀聖節元旦朝賀公主郡主成婚各燕皆用四等席燕朝鮮國進貢正副使西藏達賴喇嘛班陳額爾德尼貢使除夕賜下嫁外藩公主暨蒙古王公台吉等饌筵皆用五等席每席用熟鵝一經筵講書衍聖公來朝及朝鮮進貢押物等官安南琉球暹羅𬗟甸蘇祿南掌等國貢使都綱喇嘛畨僧來京各燕皆用六等席每席用熟雞一經筵用熟鵝一乳酒每瓶十斤黃酒每瓶十有五斤乳茶以筒計筵席茶酒數目均照禮部劄辦送奠筵曰近前饌筵曰隨筵曰午奠筵近前饌筵用麵百三十斤由內務府造辦品物移寺備進隨筵用麵百二十斤由寺造辦妃嬪近前饌筵用一等隨筵用三等貴人近前饌筵用一等隨筵用四等常在答應女子近前饌筵隨筵均用五等皇太子近前饌筵用一等隨筵用二等皇子近前饌筵用一等隨筵用三等應用燒酒及品物均據內務府來文辦送滿一等席價銀八兩二等席七兩二錢三分一釐三等席五兩四錢四分四等席四兩四錢三分五等席三兩三錢三分六等席二兩二錢六分一漢席文武會試考官入闈出闈各燕用漢席主考知貢舉等官每席用肉饌蒸食果實三十四器同考官監試御史提調官每席用肉饌蒸食果實三十一器內簾外簾收掌四所及禮部光祿寺鴻臚寺太醫院各執事官每席用肉饌蒸食果實二十六器酒每席一斤實録會典等書告成賜燕用漢席與入闈出闈燕同文武殿試讀卷等官賜飯用漢席每人日給三餐每席肴饌十碗糕餅四盤乾果八盤酒一斤午餐去糕易鮮果一盤閲卷之末日午餐加寶裝花一座鵝肉一盤餅餌四盤小菜四碟進士給二餐朝餐人給湯一碗饅頭四午餐人給餅四梨二茶一巡文武進士恩榮燕會武燕皆用漢席讀卷執事各官每席寶裝花一座大小錠二十八大小饅頭二十二糕餅三盤鵝雞豬羊前蹄五生鵝雞羊肉四熟肴饌八碗果實五盤進士每席寶裝花一座絹花三朵中小錠二十八饅頭二糕餅四盤羊雞魚三生羊肉一熟肴饌八碗乾果五盤湯三碗酒一斤漢席所用品物各按時價核銷一誦經供品喇嘛僧道啓建道場誦經經棚供獻齋筵應用品物均依掌儀司來文由寺委官辦送監經官每餐人各素饌一席十二器執事各官每餐二人合素饌一席由寺備供喇嘛僧道等所需齋食各折價給銀大喇嘛日給銀四錢五分文贊德木齊日給銀三錢衆畨僧日給銀一錢五分掌印僧道官日給銀三錢九分僧道官日給銀二錢六分衆僧道日給銀一錢三分鋪排日給銀九分鼓手日給銀六分五釐步軍日給銀四分如有薰壇各給七日半齋銀又定承辦漢席及祭筵卓飯誦經供品齋食應用茶役厨役蒸鍋匠黏果匠拖爐匠均計工給直每工一錢五分其中正殿等處喇嘛誦經造辦飯食應用厨役工直據掌儀司來文數目核給大官署一供用蔬菜奉先殿薦新蕓薹菜茼蒿萊蘿蔔茄子黃瓜香瓜西瓜由署辦送上墳奠筵所需香瓜西瓜鮮菜各據所司移付給發朝鮮安南琉球西洋暹羅𬗟甸蘇祿南掌及土魯畨鄂羅斯諸國貢使內藥房醫生通曉天文之西洋人每日廪給所用蔬菜據禮部劄欽天監太醫院來文給發一供用豬及豬肉設行户一人和買每豬五十斤內用給價三兩一錢五分外用二兩五錢小豬三錢九分豬肉內用每斤六分五釐外用每斤五分豬油內用每斤五分二釐外用每斤五分蹄每斤二分八釐心肺每副二分八釐肝每斤二分七釐胃四分豬首每斤二分舌二分腰子一分五釐尾五分管每根一分五釐脊髓每斤八分四釐大腸每條二分八釐小腸每條一分九釐醃肉每斤六分五釐燻肉每斤八分火腿肉每斤一錢奉先殿節序忌辰之祭應用豬及肉饌文武會試賜燕用豬肉均由署備送大內種痘祀神應用豬下嫁外藩公主郡主等館於京師月給豬及豬肉咸安宫景山教習廪給用豬肉及各處增用豬油據內務府來文給發恭鑄金寶用豬鑄印用豬首除夕賜來京朝賀之下嫁外藩公主郡主縣主額駙蒙古王貝勒貝子公台吉塔布囊等豬朝鮮諸國貢使從人每日給豬肉據禮部劄給發通曉天文之西洋人內藥房醫生廪給豬肉據欽天監太醫院來文給發乾隆十三年定尚膳房應用豬及豬肉等物按月分三旬支銀俟尚膳來文開數核銷一收貯器物原存方卓五十九條卓一百十有四策卓四百十有七紅油卓五百六十一紅油髙卓二金漆髙卓一奠卓四乾隆十五年