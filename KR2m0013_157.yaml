body:
  text: 翰林院一經筵每嵗春秋二仲舉行由院列講官名奏請欽定滿漢各二人直講官同掌院學士㑹擬所講經書奏定撰講章繕清漢文進呈欽定後繕正副夲恭竢御論𤼵出繙譯清文進呈届期駕御文華殿講官同諸臣赴階下行禮畢入殿講官出班至講案前行一跪三叩禮起立進講講畢恭聼御論禮成夲院官恭進御論及講章正夲康熙十四年奉㫖講章内書寫稱頌之言雖繫定例但凡事皆宜以實如秉至誠以御物體元善以宜民固已嫓羙三王躋隆二帝等語似屬太過著改奏二十一年奉㫖講章須有勘誡箴規之意乃稱啟沃今講章内有道備君師功兼覆載二語太過其易之二十二年諭經筵大典自大學士以下九卿詹事科道皆侍班所講之書必君臣交儆上下相成方有禆於治理向来進講皆切君身此後當兼寓訓勉臣下之意欽此五十年諭従来經筵之設皆帝王留心學問勤求治理之意但當期有實益不可止飾虚文朕觀前代講筵人主惟端拱而聼黙無一言如此則雖人主不諳文義臣下亦無由而知之朕御極五十年聼政之暇勤覽書籍凡四書五經通鑑性理等書皆經研究每儒臣逐日進講朕輒先為講解一過遇有一句可疑一字未協之處即與諸臣反覆討論期於義理貫通而後已葢經筵夲繫大典舉行之時不可以具文視也欽此乾隆五年諭經筵之設原欲敷宣經㫖以獻箴規朕觀近日所進講章其間頌揚之辭多而箴規之義少殊非責難陳善君臣咨儆一堂之意葢人君臨御天下敷政寕人豈能毫無闕失正頼以古証今獻可替否庶收經筵進講之益若頌羙過甚不能實踐躬行反滋朕心之愧此後務剴切敷陳期有禆於政治學問勿尚鋪張溢羙之虚文而無當於稽古典學之實意欽此一經筵講官順治十四年定滿漢各八人康熙十年定滿講官以内閣學士翰林院掌院學士侍讀侍講學士詹事府詹事少詹事暨六部尚書侍郎都察院左都御史左副都御史通政使司通政使大理寺卿之曾任内閣學士翰林院掌院學士讀講學士者充補漢講官以内閣學士翰林院掌院學士侍讀侍講學士詹事府詹事少詹事國子監祭酒暨六部尚書侍郎都察院左都御史等官由翰林官升任者充補均由院具題恭候簡用一日講順治十二年諭朕惟自古帝王勤學圖治必舉經筵日講以資啟沃今經筵已定於文華殿告成之日舉行日講深有禆益不宜刻緩爾等即選滿漢詞臣學問淹博者八人以原銜充講官侍朕左右以備諮詢欽此乃定日講之禮毎嵗自二月經筵後始夏至日止八月經筵後始冬至日止毎日於部院官奏事後進講講章繕正副二夲以正夲先期進呈夲日掌院學士率講官二人或三人以副夲進講嵗終彚録成帙進御康熙十四年諭日講原期有益身心增長學問今止講官進講朕不覆講但循舊例日久將成故事不惟於學問之道無益亦非所以為法於後世也嗣後進講時講官講畢朕仍覆講如此互相討論庶㡬有禆實學欽此十六年諭帝王之學以眀理為先格物致知必資講論向来日講唯講官敷陳講章朕躬黙聼即不諳文義講官無由得知此雖係循行舊例然而經史精義未能研究印證朕心終有未慊前曾諭内閣諸臣或朕自講朱注或解說講章内閣諸臣奏講朕宜随便發明書㫖不必預定規程今思講學必互相闡𤼵方能融㑹義理有禆身心嗣後日講或應朕躬自講朱注或解說講章仍令講官照常進講著大學士會同内閣諸臣翰林院掌院學士議奏欽此遵㫖議準講官進講時候聖意或先將四書朱注講解或先將講章講解或先將通鑑等書講解使得仰瞻聖學講畢講官仍照常進講十七年奉㫖日講講章停止嵗終彚寫止具夲奏聞二十二年奉㫖齋戒日照例停講如不親詣行禮則仍進講一日講官滿八人漢十有二人兼起居注除滿漢掌院學士兼攝外其餘以夲院官與詹事府坊局各官充補由院題請簡用三十九年奉㫖嗣後題補漢日講官開列人員内有由一甲進士出身者注明夲人名下雍正元年議準嗣後如講官出差即將應開列之人通行開列題請欽㸃署理竢差滿回京日署理之人仍回夲任一撰文順治十六年定尊崇冊立冊封妃嬪各冊寳印文恭上恭加尊諡升祔冊諡各冊寳文均由院撰擬進呈酌委夲院官會同内閣官監視鐫刻冊封王貝勒貝子公將軍冊誥文由院題定文式填名咨送中書科祭告祝文及諭祭内外文武官祭文碑文夲院遵照禮部来文撰擬繙譯進呈欽定後仍交禮部轉行封贈内外文武各官誥勅文由院開列撰擬官職名送内閣具題康熙十年題準誥勅文按品刋刻文式停止撰擬二十四年議準誥勅文各照官職撰定文式頒給二十八年諭大學士翰林掌院一官職任𦂳要必文學淹通衆所推服者始克勝任凡翰林院撰擬之文亦須掌院詳加刪潤然後成章聞明代大學士有兼管掌院之例大學士徐元文著兼管翰林院掌院學士事掌院不設専員以重臣兼領始此三十四年諭翰林院専委以文章之事撰擬文字外更無他務嗣後凡碑文祭文其撰擬之姓名並奉有俞允之㫖及申飭之㫖皆書於冊三奉俞允之㫖三奉申飭之㫖者具以聞欽此四十三年議準凡入八分公以下奉恩將軍以上兼大臣侍衛等官閒散宗室補授大臣侍衛等封贈誥勅文各照官職撰定文式頒給一纂修書史恭纂實錄聖訓掌院學士充副縂裁官侍讀學士侍講學士侍讀侍講修撰編修檢討充纂修官典簿待詔孔目充收掌官筆帖式充謄録官亦間充收掌官恭修玉牒以滿洲䝉古漢軍修撰編修檢討職名移送宗人府充纂修官亦間以庶吉士擬送纂修書史掌院學士充正副縂裁官侍讀學士以下編檢以上充纂修官亦充提調官庶告士亦間充纂修官典簿待詔孔目充收掌官筆帖式充謄錄官亦間充收掌官編纂諸書刋刻告竣皆得奏請頒賜其與纂諸臣及告竣時已出舘局者並許列銜一入直侍班順治十七年諭翰林各官原係文學侍従之臣今欲於景運門内建造直房令翰林官直宿朕不時召見顧問兼以觀其學術才品應分㡬班毎班酌用㡬人即列名具奏欽此遵㫖奏準分翰林官為三班毎班用讀講學士二人讀講二人編檢四人依次入直周而復始康熙三十三年諭翰林乃近侍之臣向因日講時時進見是以猶知其言語舉止近来進見稀少講官侍班不過頃刻難以悉其賢否著翰林詹事官毎日以四人進南書房侍直令學習文章字畫亦可以知其人之髙下以備擢用著即定議具奏欽此遵㫖議準夲院讀講學士以下編檢以上與詹事府詹事以下中賛以上毎日四人一班進南書房侍直四十七年停止五十三年諭翰林官員朕多不識其學問之高下亦不能悉知嗣後朕駐蹕暢春園時著四人一班與南書房翰林一處行走五日一更代六十一年停止五十七年諭毎逢奏事令翰林官五人侍班六十一年停止雍正三年諭毎逢聼政著翰林院滿漢編修檢討四人侍班班在科道之上乾隆五年定毎逢夲院直日引見編修檢討等十人一行在扈從康熙五十年奉㫖翰林院滿洲漢軍翰林甚多毎行圍著二人學習行走一升除夲院滿掌院學士由吏部開列題補讀講學士以下由吏部以應升官擬正陪題補漢掌院學士由吏部開列題補讀講學士暨國子監祭酒司業由院㑹同詹事府以應升官職名咨送吏部題補考選監察御史以編檢保送康熙四十八年議準凡夲院暨詹事府官一應升轉均以編檢任内俸通論雍正二年定凡遇升轉由院㑹同詹事府以應升官及其次應升官職名一併咨送吏部題請簡用又定漢官奉差如遇升轉仍照例咨吏部題補降補别官復回任者以見補官品為序不序前俸一舘選授職順治三年定進士殿試畢即簡授庶吉士先由吏部移咨到院題請日期至期駕御便殿御座前設案陳硃筆硯掌院學士豫以新科進士名單進呈次第引見伏候欽選大學士依次跪御案左西靣掌院學士在大學士後跪講官立殿西東靣選畢由院以選中諸進士並一甲進士籍貫及鄉試會試殿試名次與所習夲經開明進呈御覽得㫖後交内閣欽遵上諭分别讀清漢書具夲啓奏九年奏準按直省大小取漢進士四十人滿洲四人䝉古二人漢軍四人一同讀書自此以後因地取才遞有增減累科沿之雍正元年諭新科進士於引見之前朕欲先行考試知其學問再行引見選㧞庶人才不致遺漏目令天時寒冷考試之日一應仍照殿試豫備考試題目朕將詩文四六各體出題視其所能或一萹或二三萹或各體皆作悉聼其便欽此試卷鈐夲院印由院備餘會同禮部辦理又諭新科進士著問九卿有知其居家孝友人品端方者各就所知舉出毋得隠而不言親戚相識亦不必廻避問眀即注於進士姓名之下一併奏聞欽此又諭選庶吉士著照依文字入選有保舉無保舉名次引見其文字不入選與無保舉者仍照殿試甲第引見欽此又諭昨引見新科進士有記名者十七人皆正壮年將来還可望其進益傳問伊等有情願在各舘効力及在内閣學習者令各自陳若行走勤謹學問優者朕仍㧞置翰林欽此五年定試諸進士以論詔奏議詩各一萹乾隆二年諭新科進士著縂理事務王大臣騐看分别三等具奏候朕親加簡選欽此十六年試諸進士論奏議詩賦各一萹一教習庶吉士由院以應開列各官職名奏請欽定滿漢各一人國初定内院學士掌教習侍讀等亦與康熙九年定以掌院學士或内閣學士領其事三十三年奏準漢庶吉士學習漢書亦於侍讀侍講修撰編修檢討内擇學問優長者為小教習教習詩文四六雍正八年停止六十一年定大學士尙書侍郎之不兼掌院事者並得掌教習事雍正元年諭向来庶吉士學習清書散舘之後毎至荒廢以三年學習之功置之無用殊為可惜嗣後清書㪚舘之翰林不可令其荒廢今年新科進士選㧞庶常朕意學習清書者少㸃數人令其盡心學習務期通曉或在翰林或用部曹即令與滿官一同繙譯如此方實有禆益欽此乾隆十年諭㑹典開載康熙年間選㧞庶吉士後有選讀講修撰編檢數人為小教習之例教習庶吉士詩文四六今科之庶吉士著掌院暨教習庶吉士之大臣於見任讀講修撰編檢内選數人為小教習欽此十六年諭庶吉士分習清書例由翰林院掌院學士分習惟量其年力不拘省分舊時清漢各半自雍正年間分習清書者漸少毎科尚有十四五人十七八人不等朕思邉省之人選館夲少聲律亦素所未嫻既習國書自必専意殚精惟清文是務非天分優而學業勤者不能兼頋漢文致日就荒落迨㪚舘時或以清書優等授職而留舘後遇通行考試往往絀於詩賦列入下等改令别用究其所肄清文自㪚舘一試外别無職分應用之處㣲獨邉省即北五省庶吉士類然翰苑中江浙人員較多而逺省或致竟無一人者非所以均教育而廣儲才也嗣後雲南貴州四川廣東廣西等省庶吉士不必令習清書直𨽻山東山西河南陕西等省亦視其人數若在三四人以上酌以年力少壮者一二人其江浙等省人數在五六人以上者酌以二三人率以三十嵗以下者充之毎科通計在十人内外寕闕無濫循舉舊章備國朝典制足矣欽此一㪚舘庶吉士讀書三年滿漢教習學士引庶吉士等行三跪九叩禮吏部官㪚卷内閣滿漢學士以題分授滿漢教習學士随分授庶吉士等試畢吏部官收卷進呈欽定甲乙引見分别除授留舘者二甲出身授編修三甲授檢討餘改用有差雍正元年諭朕特恩開科人才軰出將来選㧞庶常朕當親加考試至日後㪚舘仍照舊例以三等分用欽此又議準滿洲庶吉士㪚舘文理優者除授編修檢討平常者照滿洲㪚進士例以通政使司知事等官補用一舘舎餼廩康熙四十二年定長蘆兩淮兩浙兩廣河東福建等處塩差及滸墅蕪湖崇文門等處稅差各八十兩湖口淮安等處稅差各七十両北新鳯陽閩海太平橋龍江闗等處稅差各五十両掦州贑闗天津粤海浙海臨清闗等處稅差各四十両山海闗江海南新等處稅差各三十両共計銀千四百有四両毎年解交户部送院除丁憂告病回籍者不給外見在舘庶吉士均得分給御試授職之後停其給發雍正十一年諭翰林院教習庶吉士所以造就人材使之沉潜經籍涵泳藝林可以典制誥之文鳴國家之盛也従前庶吉士皆就翰林院讀書教習諸臣不時策勵是以身心約束學殖易増舘閣之間蔚然稱盛朕意今科選㧞庶常仍令在衙門讀書俾教習諸臣得以朝夕訓課兼厚給廪餼資其膏火庶㡬枕經葄史文藻可觀克稱詞臣珥筆之職應稽考前例及如何加與稟給之處其酌議以聞欽此遵㫖議準庶吉士廪餼毎人月給銀四両五錢器用什物由工部支取並撥給官房一所為教習舘令庶吉士肄業其中頒給經史詩文各種存貯館内以資課習一出使外國順治初年朝鮮用滿官安南琉球用漢官康熙二十三年安南琉球等國兼差滿漢官由院開職名移咨禮部題請欽定一丁祭國初定毎嵗春秋上丁釋奠於先師以大學士具名上請以修撰編修檢討資深者二人分獻致祭夲院先師祠以夲院官之資深者一人主祭餘均助祭一選録墨卷雍正元年議準鄉試會試墨卷於侍讀侍講修撰編檢内酌委數人會同禮部秉公選録進呈御覽裁定頒行刋刻給假囘籍順治十六年題準掌院學士以下檢討以上有請假省親終飬遷葬告病者均令自行陳奏康熙十四年題準掌院學士自行陳奏餘均送吏部具題一稽察史書録書雍正八年諭史書録書毎年㸃出滿漢翰林官各二人悉心稽察専司其事倘有玩忽潦草之處該翰林據實奏聞如徇隠不奏後經察出將該翰林官一併議處欽此一専員理事雍正元年諭部院衙門均設司官専管定稾說堂筆帖式専管繙譯㕔官専管收𤼵文書翰林院衙門亦有錢糧出納升遷議叙并各衙門文移往来事務繁瑣闗繫不輕乃皆出筆帖式典簿之手故遲速輕重多有弊端當於俸淺編檢内擇才守優長者漢滿各二人専主定稾說堂庶小吏不得作弊而衙門永清矣所委司事之編檢如果實心任事辦理公敏者據實奏聞加以殊恩欽此起居注舘一起居注官均兼日講官自掌院學士詹事以下坊局編檢以上皆得開列請簡以原官充補康熙九年初置起居注館於太和門西廊設滿漢記注官五十六年停起居注官雍正元年諭自古帝王臨朝施政左史記言右史記動葢欲使一舉動一出言之㣲無不可著為法則垂範百世也皇考聖祖仁皇帝英年踐祚即設日講起居注官於詞臣中擇其才品優長者以原官充補鉅典茂昭度越前代誠為聖帝哲王之盛事御極六十一年紹精一執中之統勵敬天勤民之心文謨武烈經緯萬㡬盛徳日新大業丕顯天下臣民仰瞻至治不啻日月麗天江河行地莫不敬信悅服記注之臣羙不勝書皇考聖祖仁皇帝謙徳彌光聖不自聖惟恐史官或多溢羙之辭故康熙五十六年裁省記注祗令翰林五人於理事時輪侍班行凡有重務要㫖仍令諸臣記而存之意至周宻也兹朕纉承大統夙夜兢業日昃不遑思所以上繼皇考功徳之隆下至四海晏安之治頋惟凉徳甚懼負荷之難今御門聼政之初益當寅畏小心綜理庶事咸期舉措允冝簮筆侍臣何可闕歟當酌復舊章於朕視朝臨御郊祀壇廟之時令滿漢講官各二人侍班不獨記載諭㫖政務或朕有一言之過一事之失皆必據實書諸簡策朕用以自警冀寡尤悔庶㡬凛淵氷之懐以致乆安慎樞機之動而圖長治其仍復日講起居注官如康熙五十六年以前故事欽此遵㫖奏準復設滿漢日講起居注官乾隆元年增設滿日講起居注官二人一侍直康熙九年定滿漢各一人侍直事畢以夲日應記之事用清漢文記注十四年諭朕向詣両宫問安爾等常随行記注朕思昏定晨省問安視膳為子孫者之恆禮嗣後朕詣両宫問安侍直官不必随行欽此十八年諭朕毎日聼政一切折出票籖應商酌者皆國家切要政務得失所闗今後起居注官除照常記注外遇有折夲啓奏令侍班記注惟會議機宻重情暨召諸臣近前靣諭記注官不必侍班欽此雍正元年定侍直記注官滿漢各二人恭遇御門聼政記注官先於西堦下東靣立竢駕御座記注官升堦去御前丈許東靣立大學士學士敷奏折夲時近前二尺許恭聼玉音以備記載大學士學士退記注官亦退毎御殿日記注官昧爽至太和殿内西次間前楹東靣立賜茶時記注官亦賜坐賜茶駕還宫乃退凡頒詔冊封文武傳臚諸典禮記注官侍立同前元旦冬至皇太后聖夀萬夀聖節皇上先詣皇太后宫行禮記注官豫入永康左門至慈寕門外西階下東靣立竢禮成駕還宫至隆宗門記注官由右翼門入竢於中和殿外丹陛之西駕御中和殿記注官随執事各官行禮畢由太和殿後門趨至殿内侍班如常儀殿試讀卷記注官與讀卷官恭候於乾清門竢駕御便殿記注官先入至殿内西立東靣讀卷官乃入賜茶記注官亦賜坐賜茶太和殿閲祝版香帛記注官在殿外丹陛西東靣立中和殿閲祝版閲祭文香帛閲耒耜均在殿外丹陛西東靣立躬祭壇廟視學釋奠記注官侍班均按右翼豹尾班之次經筵御文華殿同諸臣入殿西侍班於九卿之次躬耕耤田記注官於耤田外随右翼豹尾班行暨御觀耕臺於臺上右翼豹尾班之次東靣侍立大閲侍班如耕耤儀上元及嵗除燕外藩䝉古記注官與燕坐於右翼豹尾班之次賜坐時行一跪一叩禮侍衞行酒至亦如之燕畢降自西階随衆行禮出師命將記注官於太和殿内侍班凱旋迎勞侍立於黄幄外右翼豹尾班之次受俘禮侍立於午門樓前檐下右翼豹尾班之次勾決日記注官同大學士内閣學士刑部尚書侍郎祗候召入駕東嚮坐記注官負北序立一扈從駕謁陵校獵暨駐蹕南苑廵狩方岳記注官皆扈從均於右翼豹尾班之次一記注毎月記注清漢文各二冊書日月及該直官姓名凡侍班所記下直時備載於冊卷末彚為縂䟦冊中毎葉鈐以翰林院印貯之鐵匭扄鐍封識嵗終題眀送内閣會同内閣學士監視藏之内閣大庫雍正二年議準凡各衙門奉有訓勵奬勸所降諭㫖各於月終詳録原由月日移送記注館該直官補入記注冊六年奏準八旂具奏事件及補授官職等事均移送到館以備記載七年奏準令各省題奏夲章均增掲帖一通送館記注後移交内閣收貯詹事府一兼衘詹事兼翰林院侍讀學士衘少詹事兼侍講學士左庶子兼侍讀右庶子兼侍講洗馬兼修撰中允兼編修賛善兼檢討正字以中書舎人魚攝一日講康熙二十五年議準皇太子講官滿二人漢四人以詹事府坊局官暨翰林院官充補日以講官滿一人漢二人輪直進講正夲先期送進副夲由司經局正字謄繕講官恭奉進講毎日早講官進至内左門外坐賜茶候内監出引至毓慶宫惇夲殿行一跪三叩禮進至講案前皇太子先講夲日書畢滿漢講官以次進講先講四子書後講五經講畢各退皇太子日講之期新嵗開印後請㫖開講遇躬祭壇廟與三大節慶賀日停講忌辰停講外雖寒暑齋戒日期及封印後均不停講至嵗暮祫祭齋戒日始暫停一㑹講康熙二十五年奏準毎嵗二月八月駕御經筵後欽天監擇吉具題皇太子行會講禮是日皇太子恭詣傳心殿祗告禮成陞主敬殿座各大臣官員排班序立行二跪六叩禮退立原班滿漢講官詣講案前一跪三叩以次進講先四子書後五經講畢同大臣官員等退出殿外丹墀下序立仍行二跪六叩禮畢各退講章由詹事府先期送進講官滿漢各二人一集議詹事府職掌均與翰林院同惟騐看月官毎嵗朝審詹事少詹事皆入班詹事坐於大理寺卿之次少詹事坐於右通政大理寺少卿之次九卿會議大政有奉㫖令九卿詹事科道議者班次與前同一升除順治九年題準詹事以下正字以上由内院題補主簿以下由吏部題補十一年題準詹事府坊局等官均移咨吏部題補康熙十四年議準滿漢詹事由吏部開列題補滿少詹事坊局等官由吏部以應升官以正陪題補漢少詹事坊局等官由府會同翰林院將應升官擬出咨送吏部題補四十八年議準凡夲府官一應升轉均以従前編檢任内俸通論雍正二年定凡遇升轉由府㑹同翰林院以應升官並其次應升官職名一并咨送吏部題請簡用乾隆十八年諭會典舘進呈纂修詹事府會典則例多沿􅊞舊文未加更定詹事乃東宫僚佐儲貳未建其官原可不設苐以翰林叙進之階姑留以備詞臣遷轉地耳古稱建儲為國夲計朕酌古準今深知扵理勢有所難行載在史冊者姑置弗論即如理宻親王當皇祖聖祖仁皇帝時聖慈鍾愛初無間言嗣以東宫既建狎昵匪人陷於失徳再致廢黜其先所置宫僚何常非一時之選如湯斌即所稱當代醇儒然亦何禆萬一葢别立宫府即僚屬多人賢否叅雜㫁難保其不滋事端夫以皇祖之包含宏大尚廹於宗社之重必不可容可見建儲一事亦如封建井田固不可行之近世也是以皇考鑒於前事黙定宸衷不事建儲分府惟擇老成宿望大臣如朱軾鄂爾泰傅敏張廷玉蔡世逺等勸讀内廷聖謨深逺慈覆如天朕纉承以来恪遵家法今皇子等讀書内廷亦惟慎簡師傅俾之薫陶徳性講習經書日有程課其視出閣就傅有名無實者相去為何如耶要之豫教固所當重實亦存乎其人此則蒼穹之敷佑宗社之貽庥景運靈長有非人力所致者矣會典載春秋進講虚文縟節甚為無謂又如皇太子賀箋論體制當由内閣擬乃由詹事頒發此亦前明坊局閒曺藉以招事示權已耳果爾則賀皇太后皇后表箋亦當内務府頒發耶此皆沿襲之謬著該縂裁官改正進呈欽此欽定大清㑹典則例卷一百五十三
