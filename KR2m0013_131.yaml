body:
  text: 工部營繕淸吏司城垣一京城規制內城周四十里南面廣二千二百九十五丈九尺三寸北二千二百三十二丈四尺五寸東長千七百八十六丈九尺三寸西千五百六十四丈五尺二寸下石上甎共高三丈五尺五寸堞高五尺八寸趾厚六丈二尺頂濶五丈設門九門樓如之角樓四城垜一百七十有二旗炮房九列戍八十四屯儲火藥房九十六所雉堞萬一千三十有八炮窗二千一百有八凡門樓均朱楹丹壁檐三層封檐列脊均緑琉璃城闉九惟正陽門城闉闢三門譙樓一樓三餘八門城闉各一門譙樓樓各一凡譙樓樓均四面甎垣設炮窗雉堞均留槍竇正陽門東西崇文門東宣武門西朝陽門南東直門南德勝門西各設水關一均內外三層每層皆護以鐵栅外城環內城南一面計二十八里南面廣二千四百五十四丈四尺七寸東長一千八十五丈一尺西一千九十三丈二尺下石上甎共高二丈堞高四尺趾厚二丈頂濶一丈四尺設七門門各有樓城闉七角樓六城垜六十有三列戍四十二屯儲火藥房七所雉堞九千四百八十有七炮窗八十有八凡東西便門樓及角樓制如內城譙樓設炮窗雉堞均留槍竇東便門東西便門東水關各一皆三洞每洞內外均有鐵栅東便門西水關一內外二層鐵栅如之內城濠河發源玉泉山經高梁橋至城西北分二支一循城北轉東折而南一循城西轉南折而東環繞九門經九閘匯流至大通橋而東悉砌甎石於兩岸地形高下不同濠之淺深因之正陽門外石梁三餘八門各跨一梁外城濠河亦自玉泉山分流至西角樓繞城南流折而東至東角樓環繞七門東逹運河門外各跨一梁一守禦器械內城正陽門信炮五大炮十炮車十火藥一甕計三十斤號杆龍旗號鐙各五櫜鞬二十弓二十矢四百架二座鳥槍長槍各二十架二座餘八門如之雲牌各一崇文門東直門鐘各一無雲牌正陽門鎖鑰四紅杖四十餘八門半之正陽崇文宣武朝陽四門激筒各一正陽朝陽阜成西直安定五門各貯墊板十有六塊崇文等八門共分貯舊炮千八百二十有七外城永定門鎖鑰二雲牌一櫜鞬十弓十矢二百長槍十銅炮五炮車五火藥二千斤餘六門均如之永定門烘藥二十九斤右安門十有四斤餘五門各貯二十八斤各有竒西便門紅杖二十廣寧門紅杖十餘各四十一修繕京城崇德年定城垣房屋衙門工完令部臣察驗堅否工作不堪者即令原管工官修理如果堅固仍定限三年內塌壞者責令賠修順治十七年題準由部委官不時巡視內外城垣凡有損壞即行修葺康熙五年題準內城下護城河岸遇有水衝處由部委官修築外城河岸順天府及五城官修築又題準凡城上遇有窪漏之處步軍統領即㑹同本部委官察驗修補堆築堅緻俾水道流通無致浸齧二十八年題準外羅城東便門起至西便門止水關倒壞之處本部侍郎㑹同府尹監修三十九年議準嗣後八旗城上火藥房遇有傾圯由部㑹同步軍統領察驗核算奏聞令步軍營官兵修理其餘由部修理雍正八年覆準內外城牆除土心之外舊趾濶五六尺頂濶三四五尺不等今議以趾濶六尺頂濶四尺著為定例城頂海墁堅築灰土鋪墊平坦毋使積水向來城垣俟有坍塌始行修葺不惟城甎破損而牽連坍塌者必多嗣後著步軍統領㑹同本部各委官一人不時巡視於雨水之前修葺堅固一年任滿委官更代一直省城垣順治十一年諭各省城垣傾圯橋梁毁壞地方官能設法修葺不致纍民者該督撫具題敘録欽此十五年覆準各官捐修城垣務將丈尺及用過工料逐一詳勘方準具題如藉端科斂纍民即行指參又題準修完邉牆五十丈至百丈者紀録一次十六年覆準禁止有司罰百姓修築城樓雉堞康熙元年題準捐修城垣務照舊式堅築取結報部如不合舊式並三年內塌壞者管工官役該督撫指名參處三年定凡捐修城垣譙樓雉堞房屋等項督撫親身察驗保題若三年內損壞者監工員及該督撫皆降級賠修四年奉㫖捐修城垣令附近道員驗看取具堅固印結督撫具題議敘七年議準停止見任官捐修城垣事例十五年題準城池不豫先修理以致傾圯者罰俸六月二十四年題準各省倒壞城垣令督撫稽察速行修築堅固彙數報部如仍漫不修理將該督撫交部議處三十三年覆準提鎮及專城副將參游每年量捐工食給與步戰守兵修理邉牆至二百丈者紀緑一次八百丈者加一級多者照數遞加各將辨量捐銀數修理丈尺每年造册具報兵部察核具題照例議敘三十四年議準修築邉牆每兵日給銀四分邉汛武官捐銀至六百兩者準隨帶加一級三百兩者不隨帶加一級百兩者紀録一次五十五年覆準修築邉牆議敘之處著永行停止如有傾圯令各鎮同地方官及時修補雍正五年議準行令直省督撫察所屬各處城垣如些小坍塌令地方官及時修補如漫不經心以致坍塌過多即行參奏其原坍已多者地方官量行捐修工完詳報委勘工程堅固量豫議敘如興工未竣遇有升遷事故將所修城垣造入交盤册內移交接任官續修工完分别新舊造册報部倘地方官因循怠忽或未修揑報並藉修城名色科斂民間者督撫題參治罪七年定外省新修城垣地方官遇有升轉離任將有無坍塌之處交代與接任官交代不明致有坍壞仍著前任官修補八年覆準晉省坍塌邉牆該地方文武各官不時修築果能堅固如式百丈以上者該撫提勘確年終題請議敘準豫紀録一次多者以次計算不及百丈者該撫提酌量奬勵倘揑報修築照妄冒軍功例治罪乾隆元年覆準各處城垣遇有些小坍塌令地方官於農隙時修補如有任其坍塌者即行參奏其坍塌已多需費浩繁者該督撫分别緩急報部有必應急修者一并妥議具題二年諭今年春夏之交直隸山東雨澤愆期二麥歉收雖屢降諭㫖蠲振平糶恐閭閻尚有艱食之虞著巡撫悉心計議開渠築堤修葺城垣等事酌量舉行使貧民傭工就食兼贍家口庶免流離再年嵗豐歉難定而工程之修理者必先有成局然後可以隨時興舉一省之中工程之最大者莫如城郭而地方以何處為最要又以何處為當先應令各督撫確察分别緩急豫為估計造册報部將來如有水旱欲以工代振即可按籍速為辦理於民生殊有裨益欽此九年奏準州縣城垣雖年久難免損壞亦由於地方有司未能隨時修葺以致日益傾圯有曽經題咨估需工料僅數百金至千餘金者嗣又陸續坍塌估至一二萬金不等是前估未修續坍又至何所底止應就見在坍塌之處報有段落丈尺及已經勘估報有工料銀數者為準造册由府州核明詳撫存案飭令加謹防範嗣後凡有續坍處所除猝遇暴水衝壞以及積雨淋坍實在工程浩大者據實詳明委該管府州親詣確勘出結造册咨部存案俟歉嵗以工代振外其餘些小坍塌均責令州縣於農隙時酌撥本地就近民夫徐為修補不得濫請動項亦不許請留代振致滋推諉仍責令該管府州於每年盤察所屬時攜帶原估册籍親加勘驗果無未經補修之工程即加結備考倘有續坍未經修整即酌定限期勒令修理完固如延玩不修該府州即以玩視城工詳參倘通同徇隱即令該府州分認賠修至見在已坍者亦應分别工料多寡次第修舉州縣原設有存公銀地方公事孰大於城垣即以此項購料興築並非捐墊其估需千金者除土方小工酌用民力外所需料價均令各州縣即在額設存公項下動用按年分修完固如遇升遷離任著接署之官驗明工段設有短少詳令修足倘通同徇隱著落署官賠修十三年覆準令各省督撫將所屬城垣周若干里高厚若干丈尺並見在坍塌長濶厚各若干逐一造册報明以備稽察其或别有些小坍塌之處責令地方官及時修補倘玩視不修致令日漸傾圯即著賠修仍照例參處如遇新舊交代著新任官照册察明令前任官賠修倘徇隱不報著新任官賠修又議準陜省邉牆在河套內者二千里在河西者三千里套內之地沙浮無土而輕揚牆當浮沙之上坍塌者多河西之沙兼土而實坍塌者少套內舊建十有二堡見在居人八百十有九寨七十八小墩十有五大墩尚有堅完可觀者其牆雖傅浮沙亦可為中外之限一切甎石自不應聽其倒塌為閒人取去若河西之牆則尤不可使之漸壞令陜西督撫將見在邉牆飭令該管官辨加意保護其有坍塌甎石收貯備用毋許聽人竊取如漫不經心即將該管官辨照例指參凡有邉牆各省均照此例辦理一城垣禁令順治二年定內外城樓及城上堆鋪不許閒人登視違者交部治罪十七年題準內外城垣凡有頑民竊甎盜賣者送刑部依律治罪雍正八年奏準令步軍統領嚴飭該管營辨不許附近居民於城根取土乾隆九年諭各省城垣自應加謹防範以資保障其殘闕處所修理雖有緩急若地方官果能隨時補葺自不至介然成路豈可縱容民人登陟不為察禁整理朕從前經過地方見有殘闕之處聽民人踰越漸成路徑者令各省督撫董率有司留心整飭毋得仍前玩視欽此鐘鼓樓附鼓樓在皇城地安門北趾高一丈二尺廣十六丈七尺有竒縱減三之一四面有階上建樓五間重檐前後劵門六左右劵門二磴道門一繞以圍廊甎垣周匝鐘樓在鼓樓北制相埓建樓三間柱棁榱題悉制以石舊制用木乾隆十年改建以石十二年告成府第房屋附一府第規制崇德年間定親王府制正屋一座廂房二座臺基高十尺內門一重在臺基之外均緑瓦門柱朱髤大門一重兩層樓一座及其餘房屋均於平地建造樓大門用㼧瓦餘屋用版瓦郡王府制大門一重正屋一座廂房二座臺基高八尺內門一重在臺基之上正屋內門均緑瓦門柱朱髤廂房用㼧瓦餘與親王府同貝勒府制大門一重正屋一座廂房二座臺基高六尺內門一重在臺基之上均㼧瓦門柱朱髤餘與郡王府同貝子府制大門一重正屋一座廂房二座均於平地建造用版瓦門柱朱髤順治九年題準親王府基高十尺外周圍牆正門廣五間啓門三正殿廣七間前墀周衛石闌左右翼樓各廣九間後殿廣五間寢室二重各廣五間後樓一重上下各廣七間自後殿至樓左右均列廣廡正門殿寢均緑色琉璃瓦後樓翼樓旁廡均本色㼧瓦正殿上安螭吻壓脊仙人以次凡七種餘屋用五種凡有正屋正樓門柱均紅靑油飾每門金釘六十有三梁棟貼金繪畫五爪雲龍及各色花草正殿中設座高八尺廣十有一尺修九尺座基高尺有五寸朱髤彩繪五色雲龍座後屏三開上繪金雲龍均五爪雕刻龍首有禁凡旁廡樓屋均丹楹朱户其府庫倉廩廚廄及祗候各執事房屋隨宜建置於左右門柱黑油屋均版瓦世子府制基高八尺正門一重正屋四重正樓一重其間數修廣及正門金釘正屋壓脊均減親王七分之二梁棟貼金繪畫四爪雲蟒各色花卉正屋不設座餘與親王府同郡王府制與世子府同貝勒府制基高六尺正門三間啓門一堂屋五重各廣五間均用㼧瓦壓脊二獅子海馬門柱紅青油飾梁棟貼金彩畫花草餘與郡王府同貝子府制基高二尺正房三間啓門一堂屋四重各廣五間脊安望獸餘與具勒府同鎮國公輔國公府制均與貝子府同又題準公侯以下官民房屋臺階高一尺梁棟許繪五彩雜花柱用素油門用黑飾官員住屋中梁貼金二品以上官正房得立望獸餘不得擅用十八年題準公侯以下三品官以上房屋臺階高二尺四品官以下至士民房屋臺階高一尺一賜宅額數順治五年題準一品官給屋二十間二品官十有五間三品官十有二間四品十間五品七間六品七品四間八九品官三間護軍領催驍騎各一間十六年題準一品官給屋十有四間二品十有二間三品十間四品八間五品六間六七品各四間八九品各三間護軍領催給屋二間驍騎步軍一間或買或造照數撥給又定侍衛等給屋數目均照文官例一等侍衛照三品官二等侍衛照四品官三等侍衛照五品官藍翎侍衛照六七品官其護軍前鋒領催等各給屋二間驍騎閒散人等各給屋一間一屋價順治五年題準一等屋每間折給銀百二十兩二等屋每間百兩三等屋每間八十兩四等屋六十兩五等屋四十兩六等屋二十兩侍衛等屋折價亦如之九年議準六等屋每間折給銀三十兩又定凡由內城遷徙外城官民照原住屋數給銀為拆蓋之費仍令部同五城御史察南城官地並民閒空地給與營造康熙七年題準盛京後來兵丁未得房屋者該旗咨部照每人給屋一間例折給價銀三十兩令其自行建造八年題準自一等屋至六等屋各減銀十兩嗣後各處投誠人員給與官地建屋均照此例給價一八旗房屋順治十一年議準八旗官員兵丁均照分定地方居住若遇調旗更地仍準住原處有情願買屋遷移者聽從其便該都統等不許強令遷移如欲自蓋房屋者該都統察給本旗空地準令自造至外來歸附之人應得房屋照所撥旗分買屋安插若無房屋由部於本旗空地蓋給乾隆六年議準旗民傾圯房屋情願自行修理者勒限令其苫蓋力不能修者酌量借給官銀修理若力不能修情願交官修理者照例給與房價動帑修補並分别緩急先將通衢大街房屋基地情願交官修理者給與價直委官估修借銀自修者借給官銀分限扣還及時辦理其巷內臨街房屋統於次年借給官銀陸續興修一禁令順治初年定王府營建悉遵定制如基址過高或多蓋房屋者皆治以罪四年鄭親王建造王府殿基踰制又擅用銅獅龜鶴罰銀二千兩雍正十二年議準京師重地房舍屋廬自應聨絡整齊方足壯觀瞻而資防範嗣後旗民等房屋完整堅固不得無端拆賣倘有勢在迫需萬不得已止許拆賣院內竒零之房其臨街房屋一槩不許拆賣乾隆八年奏準兵民人等臨街房屋皆其恆産非有急故誰肯輕棄或因年久傾圮修整無力即欲變價苦無售主又礙禁令不敢違例拆賣勢必日就坍倒甎瓦木植盡歸無用嗣後除旗人指俸認買官房扣限未滿私行拆賣者照例治罪外其已清帑項作為本人産業或因傾頺無力修整或有萬不得已拆賣濟急情由城內報明該地方步軍尉城外報明司坊官存案準其拆賣其有不告官司將認買官房私行拆賣者察出照例治罪至於兵丁自置産業無論院內臨街均聽自便番役人等不得藉端勒索又奏準京城廬舍觀瞻所繫今旗民臨街房屋準其拆賣雖屬便民之舉但不為設法辦理恐將來拆毁過多不足以肅觀瞻嗣後旗民人等臨街房屋實在拆賣濟急者呈明該地方官察看果繫僻巷尚可建築牆垣令其拆賣即行築牆遮蔽聯絡整齊其餘臨街房屋不可建築牆垣者仍一槩不準拆毁十九年諭京師為萬方輻輳之地街衢廬舍理應整齊周密以肅觀瞻乃近來京城內外多有拆舊房屋者行戶等亦藉以居竒射利此陋習也見因八旗人衆居住不敷特發帑金增置以資棲止該管大員秪圖近便率購舊料致將已成之屋輾轉拆蓋料物必多耗折是因增而轉減於生計亦屬無益著工部步軍統領順天府尹五城御史出示嚴行禁止欽此一優恤順治十年京城霪雨倒塌房屋奉㫖發內帑銀八萬兩撫恤滿漢兵民又覆準令五城御史察造空鋪火房安息窮民所用錢糧於工部支取又覆準每城造棲流所屋二十間交五城察管俾窮民得所康熙十八年以京師地震傾倒房屋奉㫖發內帑銀十萬兩振恤兵民雍正三年諭今年雨水過多人家屋漏牆垣倒塌貧乏兵丁不能修葺朕深加憐念所宜特沛恩施務令咸得安居著發戶部庫帑九萬兩賞與八旗每旗萬兩上三旗內府佐領萬兩俾貧乏兵丁修理房屋得有裨益欽此五年諭邇來頻雨想八旗兵丁房屋牆垣必有坍塌者將戶部庫銀賞給滿洲旗下每佐領百兩䝉古漢軍人數較少䝉古旗下每佐領七十兩漢軍旗下每佐領五十兩上三旗內府佐領內管領及五旗諸王之府屬佐領照滿洲旗例賞給諸王之管領下人等不必賞給將所賞銀交與各旗該佐領察屋垣倒壞應賞者賞之如該佐領下無屋垣倒壞者即均勻賞給欽此又諭來京考試舉子等朕加恩體恤屢諭崇文門監督不必檢其行李致滋勒索但恐巡役人等未必奉行盡善且恐日久弊生或有不肖之徒假冒舉子名色夾帶貨物亦未可定可於蘆溝橋收稅之所設立店房務期寬展可容多人令考試舉子等即於店內安放行李其行李內有無應行上稅之項著人驗看看畢給與照單令其入城廣寧門不必重驗如此則舉子行裝不致狼籍亦可免宵小假冒之弊即尋常商賈在內歇宿亦屬甚便此事可否舉行之處詳加酌議具奏欽此遵㫖議準於蘆溝橋之西北近稅局處建造房屋三所共八十八間乾隆二年奉㫖賞給公産地價銀十有六萬七千餘兩建立官房分給旗人居住十六年奏準先經直督奏請八旗正戶人等有願下屯種地者上地撥給百畝中地百五十畝下地二百畝並給與房屋牛具銀令其下屯耕種以裨生計今乃不惟無益且有不肖之徒冒領花消逃回京者應令直督察緝逃戶依律治罪嗣後旗人停其下屯種地但八旗生齒日繁無業旗人難免不敷居住之慮京畿重地空隙之處理宜修建整齊請將分給八旗屯種人戶存退餘絶地畝租銀及直屬見存續行入官與未賣公産等地嵗入租銀令步軍統領檢出京城空隙地基給價置買交與工部估建官房賞給貧乏旗人居住其臨街房屋或有坍塌詢明原業情願售賣者照例給價置買一例修建仍將用過工料銀按年題銷各旗該管官不時稽察或有私相典售者將房屋徹出價銀入官照律治罪該管官不能察出亦照例議處再乾隆二年分給旗人官房迄今十有五年或有坍塌不堪居住及不肖人私相典售者令各旗嚴察毋得徇隱如有坍塌之處核明報部確估興修彙案題銷隨按八旗地界檢㸃出空隙地基五百三十八處內情願自己修葺者二百七十八處無庸建造者五十四處其餘空地二百六處約可蓋房三千九百六十一間委官估計俟辦料齊備陸續興修再八旗所報官修地基內此際如有復報自修者準其自行修理見報自修地基內倘不能自修復行報官修理者亦準其呈報官為修理見在旗人居住官房如有坍塌俟各旗送齊一例興修十八年先將八旗空地一百三十七處增蓋官房四百四所計二千六百六十四間門樓千二百六十一間垣牆三千四百五十一丈官買地基一百十有八處折見方丈七千三百六十餘丈共約估物料工價銀十有四萬一千五百餘兩陸續由戶部支領工竣核實題銷公廨一修理公廨順治八年題準凡有錢糧衙門或遇損壞由部委官估計酌定工料數目轉行該衙門動支雜項銀徑自修理原無錢糧衙門由部議估興工又題準八旗演武教場各按旗分建立十年議準親王以下宗室子弟建立宗學量給工價自行蓋造十一年覆準委官修理國子監衙門動支該監積貯銀如有不敷由部增給嗣後如有損壞該監動額設錢糧自行修理十三年建大閲教場於德勝門外十八年改鑲黃旗教場於安定門外正黃旗教場於德勝門外正白旗教場於東直門外鑲白旗教場於朝陽門外正紅鑲紅旗教場於阜成門外正藍旗教場於崇文門外鑲藍旗教場於宣武門外各建演武廳康熙元年定京城貢院每逢試期順天府咨呈工部委官修理今各項錢糧歸并戶部應令工部委員㑹同順天府官確估具題交順天府動該府存貯戶部銀修理工完造册報部核銷其貢院廳堂房屋共二百十有八間東西號舍共七千二百四十間七年題準八旗官學房舍傾圮察核修理十一年覆準增蓋貢院號舍千間二十四年題準修理貢院號舍易以椽瓦三十八年覆準貢院前建牌坊三座四十一年題準貢院號舍不足向例復取轎號今加增號舍七十五間以免鋪戶擾纍五十四年覆準重建明遠樓四角樓修蓋號房千五百間及都統監察謄録供給等處房屋外圍牆垣槩砌以甎雍正二年諭宗室學房左右兩翼著各立一所欽此遵㫖議準左翼給鐙市口官房百有三間右翼給瞻雲坊官房九十二間又題準增給八旗官學房舍八十三間又議準八旗教場各造演武㕔一座鑲黃正黃旗各五間餘六旗各三間看守房各三間四年奏準將安定門內大街官房六十七間為步軍統領衙署七年奏準五城司坊官惟東城正指揮舊有衙署餘皆賃屋治事請酌撥官房十有四處賞給各城司坊作為官廨十二年奏準步軍統領所轄捕盜旗員三營將備以及番役人等拏獲人犯向無公所羈禁繫原差領回看守待質是以蠹役得以藉端索詐多方恐嚇擬於衙署之內設立羈禁審犯之所仍請照監犯例支領柴米别委辨兵看守以杜兵丁番役人等需索恐嚇之弊但見有公署既無羈禁審犯之地且問事處所密邇街衢未為允當請將瞻雲坊內務府官房九十四間給為步軍統領官廨舊有安定門大街公署仍交與內務府收管又議準貢院地既寬大房屋號舍甚多一應房舍什物等項應設立專官管理將順天府屬照磨移駐貢院於貢院西轅門內空基蓋造房屋十有二間令照磨居住掌管貢院並經管一應存貯官物又議準步軍統領所轄巡捕三營游守向無衙署本汛緊要地方無可賃房屋內汛皆然其外汛落鄉更難得堪作衙署之屋均於關廂附近租賃民房實不便稽察巡緝應照五城司坊之例於該汛適中緊要地面給與官房以為衙署見在官房之內可作衙署者共五十處但房間多寡不等難以畫一分撥今擬給游擊二十餘間守備十餘間無官房處量給官地令其起蓋衙署其需用工料於步軍統領衙門存公房租銀內動用仍令該統領委官據實確估工竣之日造册咨部核銷十三年覆準增設貢院號舍千六百八十五間與前八千三百十有五間統成萬間之數如式建造工完造册題銷乾隆二十一年奏準將地安門外禮部㑹同館宇改為步軍統領公廨舊有宣武門內瞻雲坊公廨即改為禮部㑹同館一各省分廨雍正二年覆準凡督撫提鎮及有屬員之官涖任其屬官科纍兵民修理衙署備辦器皿及州縣守禦等官到任屬下人役鋪設修理纍及兵民者悉嚴行禁止不肖有司指稱修飾衙署等項科纍兵民該上司即據實指名題參文職照科斂律武辨照剋扣律治罪如該上司徇庇或勒令屬官修理衙署者發覺之日將該上司一并交部分别議處再官員離任署內在官一應物件移交接任官倘物件被家人毁盜將家人照毁盜官物律治罪其毁盜物件仍著舊任官照數賠補又議準地方有司遇有修理衙署及一應官事所用工料器物務照時價給發鋪戶工役買備其設立總甲出票官買派工伺候之處嚴行禁止倘有不肖官員肆行科斂擾纍小民者該管上司即指名題參從重治罪如該上司隱匿徇庇或别經發覺或被旁人首告或被科道紏參將該管上司一并交部議處乾隆元年諭各省州縣與民最親凡大小案件無不始終於州縣衙門是以舊制錢糧刑名等項分委承辦設有六房即附於州縣公堂之左右使經制胥吏居處其中既專一其心志亦愼重其防間立法最善乃聞近年以來多有六房傾圮不加修葺胥吏棲身無所往往挾其卷牘收藏於家每遇急需檢閲之案無以存貯悉以胥吏之口為慿而隱匿抽換之弊不可枚舉前後印官雖心知其弊而因循茍且或修理無資遂沿習而不知整理此亦有關吏治之一端也著各省督撫通行所屬州縣驗明六房屋宇或有未備者各於舊基如式建造將一應案牘愼密收藏並分别號件登記總簿以備稽考倘胥吏換班有私帶文卷出署者從重治罪若本官失察一并議處其修造之費著該督撫藩司於本省公用銀內確估給發欽此五年奏準各省文武衙署照倉庫營房之例造入交盤册內前後交代如有些小滲漏坍塌令該官辨隨時黏補修理如實繫年久傾圮必須拆卸大修需費浩繁者亦照城垣之例該官辨詳明督撫委官勘估取具並無浮開印結該督撫確核具題議覆興修十六年奏準雲南督撫學政藩臬糧鹽及迤西道各衙門因地處邉陲山髙風烈房屋皆用㼧瓦灰泥膠砌一處滲漏拆修通體皆須苫蓋且梁柱椽枋易於折蛀亦須不時更換工多費繁先繫斂自里民總名公件嗣後核實清釐按衙署之大小定修費之多寡督撫二衙門每年各修理銀八百兩藩司六百兩臬司四百兩糧鹽二道各二百四十兩迤西道及學政衙門各二百兩按年聽其自行支銷相沿已久乾隆十三年釐定章程未準戶部議及但滇省屋宇情形與他省迥異實在必需況迤東道衙署因向無額設循照迤西道之例年給修署銀二百兩業經列入章程則各該衙門自應一例準其支給應將此項修署銀在乾隆十三年未定章程以前者免其造册報銷已定章程以後者仍準按年於公件項下照數動給又奏準雲南督撫學政司道衙署該撫以該省屋宇情形與他省迥異實在必需隨時修理奏請按年照數支給惟是一切工程定例由部核銷今按年自行支給有餘不敷無慿稽察且官署既經修理自可以保固數年何至歲需葺治請自乾隆五年至十一年在未定章程以前者應遵㫖免其造册報銷至乾隆十三年以後動支銀數章程案內既無議給之款應令該撫將十三四五等年修理之項轉飭造册報部核銷嗣後該省督撫學政藩臬糧鹽及迤西道各官衙署未便按年支修如果勘明滲漏坍塌必須修葺仍令該撫隨時奏明動款興修實用實銷毋得浮於從前酌定之數並將確估工料細數據實報部核銷倉廒一倉廒營建順治初年定京城八倉通州三倉每倉以五間為一廒每間七檩六椽濶丈四尺深五丈三尺山柱高二丈二尺五寸檐柱高丈五尺五寸每廒頂各開氣樓一座廒底甎砌上鋪木板廒門及牆下均開竇穴以泄地氣京倉祿米倉共二十五廒官廳三間官舍七間科房三間井一南新倉共三十廒官廳一座官舍八間科房四間井一舊太倉共四十二廒官廳三間科房三間井二海運倉共三十八廒官廳三間科房三間井一北新倉共四十九廒官廳三間科房四間井二富新倉共二十八廒官廳三間官舍八間科房三間井二興平倉共三十廒官廳三間科房二間班房一間井一太平倉共十有五廒水門三道官廳三間官舍四間科房三間通州西倉共一百十有二廒倉西門官廳三間後房一間倉南門官廳三間後房一間井三中倉共六十四廒倉南門官廳三間倉東門官廳三間倉北門官廳三間科房三間井一南倉共四十五廒倉東門官廳三間倉北門官廳三間官舍六間科房一間井一乾隆十八年奏裁石壩號房五十六間大通橋盤糧廳三間號房六十四間朝陽門外號房二十八間一倉廒增建順治十七年覆準各倉場基囤基均用甎鋪砌康熙六年題準增設京倉廒房由部確估移咨戶部轉行倉場動支通濟庫輕齎銀如不足用戶部補給二十二年題準增造海運祿米等倉八十一廒三十二年題準舊太南新等六倉增三十六廒通倉增十廒四十一年題準通州增建看守三倉官房四十八間兵房二百四十間四十二年題準富新太平等倉增四十一廒通倉增二十四廒四十四年議準太平倉廒歸并祿米倉别建三十新廒四十六年題準建本裕倉三十廒號房五間井一四十九年題準大通橋號房十間歸并太平倉改建十廒五十二年議準通州中南大西三倉增建百廒五十五年題準舊太海運太平等倉增四十六廒五十六年題準興平南新等倉增三十一廒通倉增二十四廒雍正元年議準建萬安倉四十二廒官廳三間官舍十間科房三間又議準太平倉南增二十五廒海運等倉增三十九廒通倉增二十四廒二年奏準重修石壩號房三十間建造土壩號房三十間增造通州新舊二城號房各十有五間四年議準萬安倉照太平倉之例增立東水門二道五年議準大通橋河東號房十有六間移建於朝陽門外又議準石壩號房見有五十六間外增建五十間朝陽門外見有號房二十八間外增建十有四間六年議準增建裕豐倉共六十三廒官廳三間官舍十有五間科房六間又增建儲濟倉共百有八廒官廳三間後廳三間科房三間井一七年奏準北新海運南新舊太富新興平祿米七倉共建堆房三十三所太平萬安二倉共建堆房八所交與該倉監修官蓋造照例保固三年是年議準增建豐益倉共三十廒官廳三間官舍二十間科房四間號房十間退堂房三間皆由內務府經理又議準各倉附近之處撥給官房三間以為收貯文卷辦事之所如無官房可撥即於本倉茶果銀內動用建造八年奉㫖本裕倉圍牆下用甎砌水道别倉亦照此例乾隆元年議準在京各倉積貯充盈新糧不敷收受祿米裕豐富新三倉並無隙地無庸增建南新倉增一廒舊太倉增九廒海運倉增二十廒北新倉增五廒興平倉增一廒太平倉增六廒萬安倉增三廒儲濟倉增四十八廒二年題準萬安倉東水門二道移建太平倉四年議準分儲濟倉四十八廒建萬安東倉增建官廳三間科房三間以舊萬安倉為萬安西倉六年議準京通各倉各就廒房之多寡地基之廣狹酌增井以備緩急太平裕豐二倉取水近便毋庸掘井祿米倉增井五南新富新北新三倉各增井八舊太興平二倉增井七海運倉增井九儲濟本裕二倉各增井二萬安西倉開建東水門五道萬安東倉掘井四通州西倉增井六中倉增科房十間井四南倉增井三又議準倉中竹席板木因積貯充實並無空廒堆貯應於廒座相間處依牆下柱上加椽瓦後用閘版每倉修蓋三五處以資收貯計祿米南新舊太海運富新興平太平東西萬安儲濟十倉各建貯席板房三間北新裕豐二倉各建貯席板房五間一修葺倉廒順治初年定三年一小修五年一大修工價屬戶部辦料屬工部自錢糧歸并戶部所需料價銀並咨戶部給發又覆準守倉夫役每名月給米六斗每歲額修倉廒七十五間如遇工作每名日給米一升九年題準京通倉廒小修屬倉場侍郎酌量委監督隨時修理於戶部支銀如遇大修時由部確察勘估措辦物料戶部給發工匠價直十三年題準修理倉廒所估應用物料工價經管官造册移送巡倉御史察核如有取用舊材開銷新價及虛報浮估者聽巡倉御史糾參十六年議準修造倉廒三年內損壞者令原修官役賠修一年內坍塌者除原修官役賠修外仍照例治罪康熙五年題準停止倉廒歲修之例如遇漕糧壅積闕廒收貯或有坍壞應修者倉場侍郎具題敕部㑹同戶部暨倉場侍郎察驗確估具題修理六年議準通倉應修廒房倉場侍郎具題由部㑹同戶部公同驗估動支通濟庫輕齎銀發通惠河分司鳩舉十八年題準京倉差本部官督修通倉交通惠河分司修理仍差戶部官一人公同估計其通濟庫輕齎銀截充兵餉應用銀於戶部支取二十五年諭聞得倉廒年久滲漏米糧浥爛深厚倉糧軍民所需關繫綦重毁壞漏雨應修廒房倉場侍郎親身逐一細察具題欽此遵㫖議準動通濟庫銀交各監督修理嗣後倉廒倒壞即照此例修理造入年終册內題銷三十八年覆準嗣後各倉廒及號房圍牆或有倒塌倉場侍郎親身驗明即令該監督等估計動用通濟庫銀呈報戶部速行修理工完將用過銀數奏銷雍正二年覆準各倉牆垣如有滲漏坍塌之處該監督報明倉場侍郎即親身驗看明白該監督果能捐修完固俟任滿交代清楚之後倉場侍郎核明具題將實在捐修銀數造册送部核明交與吏部照例議敘按銀數多寡準其加級紀録以示奬勵三年奏準京倉向用木板鋪墊十年一換通倉例用席片應將京倉展限至十六年一換所餘木板鋪墊通倉四年覆準各倉已開濬水溝墊土造橋令各監督於每年二八月中巡視疏濬永為定例不行修築者題參議處並行令步軍統領飭該地方步軍禁止堆積壅滯又覆準令倉場侍郎驗明見在放空之廒即將見存板木滿鋪廒底堅固鋪墊如有不敷確估報部動支戶部庫銀採買板木應用嗣後放空之廒俟各省隨糧解送本色板木到日陸續鋪墊五年諭京通倉廒多有屋瓦滲漏牆垣損壞者在京各倉每倉或都統或副都統各一人御史中不論滿漢每倉各委一人專任稽察之責其支放奏銷等事不必經管惟倉房滲漏牆垣損壞與倉內鋪墊及匪類偷竊各弊察出即行文倉場侍郎知之若倉場侍郎遲延不及時辦理妥協即據實奏聞倘不能察出弊端以致虧損倉糧著落稽察之都統副都統御史與倉場監督等分賠其通州三倉即照此例交與通永道通州副將稽察其失察分賠之例亦與京倉同欽此十二年議準京中各倉每年戶部各發銀百兩交貯倉場侍郎衙門凡有一切竒零修葺之處該監督確估申報倉場侍郎並稽察之都統御史㑹核領銀及時修補如有違誤稽察官據實參奏工竣照例保固造册送部委官核驗倉場衙門仍於歲終彙造各倉用銀清册送部覆核題銷至工程用銀在百兩以上者應令稽察之都統御史㑹同倉場侍郎詳細估計專案奏明於戶部領銀興修工竣日造册送部題銷乾隆三年覆準通州西中南三倉放空之廒有應修者所需工料銀照在京之例豫行估計報部如百兩以上者題請動項工竣造册題銷如不及百兩者就近在於通庫輕齎銀內動支興修工竣據實造册報部察核仍於歲終將準銷銀數彙册具題至扣存公費銀俟動用完工將逐項準銷細數開單咨部四年奏準凡各倉修理工程咨部委官估計將清册移送該倉自行修葺工完之日該倉巡察細加察驗造册送部委官察核俾承修官於工程不敢草率於錢糧不致浮冒若將倉廒工程令工部委官估計復委官監修及至工竣又繫工部司官察核其中恐有扶同侵隱之弊應將各倉工程照舊自行修理工部料估核銷則彼此互相稽察均有裨益六年奏準各倉廒鋪墊板木向例十六年一換今皆堅固整齊毋庸復拘定例統俟每季放空之後察有朽壞者用歲收板木每廒酌量抽換隨時修理八年奏準各倉廒抽換板片例應由部委官察驗核銷每因新糧到通需廒貯米不及候驗嗣後抽換廒板如在新糧未到糧務完竣之日仍照舊例辦理倘遇新糧到通之時由倉場侍郎委官就近察驗咨部核銷十八年諭嗣後各倉遇有應修工程著工部倉場該旗各委官一人㑹同料估修理欽此又奏準通州西中南三倉收貯漕白米糧支放俸糈每年額貯至多不過四五十萬石不等計各倉廒貯米之外見空者二百二十六廒酌量情形西中二倉足敷收貯南倉八十一廒似可不設再雍正年門京師增建東西萬安裕豐儲濟等四倉漕糧運京者多通倉貯米只有此數因之空廒日增而滲漏傾頺亦所時有定例廒房應修無論有無需用該監督例應呈報察核興修工竣仍多閒置虛糜帑金請俟南倉米糧放完之後即將該倉裁汰其額貯數目歸并西中二倉照常收貯無庸再為設立見在報修之廒即行停止一直省倉廒順治十三年議準積榖振濟務令修葺倉廒康熙二十四年議準喜峯口張家口下堡城殺虎口殺虎堡城內各造倉房五間二十五年題準默爾根地方起造倉廒收貯米榖二十六年題準古北口建造倉房十有五間三十一年覆準古北口外坡賴村建造倉房十有五間三十二年奏準湖灘河朔建造倉房一百五十四間三十六年題準湖灘河朔建造倉房五十間雍正四年諭凡倉榖黴爛皆由於倉廒不修之故平日地方官所司何事以致倒塌滲漏虧折米糧愈當加懲者今若寬其處分則有司於倉廒平日必不加意修理以便措辭著九卿議奏欽此遵㫖議準凡該地方倉廒無多將倉糧寄貯僧道寺院者或有露囤者該地方官即行具詳該督撫確勘具題倘州縣官因循怠玩不將倉廒葺補修治又不詳請建造以致米榖黴爛應照溺職例革職倉廒既經修理猶有託名黴爛虧空者照侵蝕例治罪十一年議準喜峯口倉就近歸於遷安縣經管每閒貯榖五百四十石應建倉廒二十六間乾隆四年議準直省興建倉廒準在存公銀內動給每間貯米五百石需工料銀二十兩十八年奏準積貯為本計所關而推行惟義倉尤便蓋鄉村分貯領散可以隨時典守在民吏胥無由滋弊直隸密邇畿輔緩急尤宜豫備於四鄉酌設倉廒自三四區以至十有八區擇人煙稠密形勢高阜之處使四面村莊為附麗近在十五里內者三十三縣在二十里內者七十三州縣在二十里及十餘里者三十三州縣在三十里內者三州縣在四十里內者二縣督諸有司隨宜勸導俾各出有餘不限粟麥悉從其便見據報新舊義榖二十八萬五千三百餘石將各州縣衛大小村莊並各村到倉里數悉載於圗統計為圗百四十有四合百四十四州縣衛共村莊三萬五千二百有十倉一千有五使各州縣衛按圖計倉知各村之孰遠孰近按倉稽榖知四境之或絀或盈凡於境內振糶惠民之舉一目了然亦足以資措理營房一京師營房皇城內八旗滿洲官廳十有六所步軍堆撥房九十所鑲黃鑲白二旗官廳各二堆撥各十正白正藍二旗官廳各二堆撥各十有一正黃正紅鑲紅鑲藍四旗官廳各二堆撥各十有二內城八旗堆撥房左翼三百二十七所鑲黃旗滿洲五十三所䝉古二十二所漢軍十有七所正白旗滿洲五十一所䝉古二十所漢軍十有四所鑲白旗滿洲四十六所䝉古十有三所漢軍十有二所正藍旗滿洲四十五所䝉古十有九所漢軍十有五所右翼二百九十九所正黃旗滿洲五十五所䝉古漢軍各十有八所正紅旗滿洲三十八所䝉古十有四所漢軍十所鑲紅旗滿洲四十八所䝉古十有三所漢軍十所鑲藍旗滿洲五十所䝉古十有五所漢軍十所各旗官㕔䝉古漢軍各二所滿洲各五所守門班房每門左右各五間城上堆撥房左翼四十三所右翼四十一所儲火藥房左翼四十七所右翼四十九所所各三閒每門旗炮房三閒屬左翼者五屬右翼者四城內更房正陽門四間崇文東直西直三門各二間餘五門各一間外城巡捕三營堆撥房中營官廳九所馬兵五十四所步兵五十五所南營官廳八所馬兵六十二所步兵八十二所北營官廳八所馬兵四十九所步兵四十所守門班房東西便門各六間餘五門各十間城上步兵堆撥共四十三所官廳六所每門城上儲火藥房及看火藥房各一間城內更房永定廣渠二門各四間東便廣寧二門各三間西便門二間左安右安二門各一間圓明園暢春園八旗步軍堆撥五十所三營馬步堆撥六十七所馬兵十有五所步兵五十二所靜明園三營步兵堆撥十有二所靜宜園馬步堆撥二十一所馬兵三所步兵十有八所康熙三十四年題準於八旗教場等處蓋造兵丁住房每旗二千間共萬六千間無房兵丁每人給房二間居住三十九年議準京城城上房及營房等工如有坍塌傾頺由步軍統領咨部隨時修理雍正二年議準圓明園設八旗護軍官兵營房每旗參領一人給房十有三間副參領二人各給十間署副參領四人各八間護軍校十人各六間護軍三百七十五名各三間又設內府三旗護軍官兵營房每旗參領一人給房十有二間副參領一人給十間署副參領一人八間護軍校三人各六間護軍四十名各三間六年奏準京城九門內均有八旗兵丁看守城外獨無應增撥八旗官兵看守正陽門外見有巡捕營官兵毋庸再撥旗兵外其崇文等八門城外各旗撥滿洲䝉古漢軍散秩官四人驍騎校四人驍騎二百名令各攜家口駐防官員各給住房八間驍騎校各五間驍騎各二間再於城門相近各設堆撥房八間令駐防官兵輪班巡守共蓋造官員驍騎校兵房堆鋪每門四百六十間計三千六百八十間乾隆十年奏準內九門城上共房二百四十一所每所三間計房七百二十三間除收貯鐙旗信炮火藥外尚有堆撥房百三十五所設步軍堆撥八十七處如遇駐蹕圓明園增驍騎堆撥四十八處恭遇車駕巡狩方嶽將步軍徹下分防大街巷口城上悉令驍騎看守其房屋如有坍塌照例移咨工部隨時修理至外七門城上繫巡捕三營官兵看守設有堆鋪十八處其堆鋪並非官建悉無瓦片木料皆屬遠年自行建造之土房見多傾頺難於棲止且周圍二十五里有餘僅設堆撥十有八處相距窵遠守望不周應於七門城上增蓋堆鋪二十八間除分給直班千把總三間外餘悉安設堆撥二十五處即動支步軍統領衙門房租銀建造十二年奉㫖圓明園八旗每旗增護軍百名照例每名各給住房三間十四年議準隨征金川雲梯兵千名别設一健鋭營分為兩翼左翼翼領一人右翼翼領一人各給房十有三間每旗參領一人各給房十有三間副參領一人各給房十間前鋒校鑲黃正黃二旗各七人餘六旗各六人均各給房六間八旗前鋒每名給房三間左翼建四層碉樓十有四座三層碉樓十有八座右翼建五層碉樓二座四層碉樓十座三層碉樓二十四座十八年奉㫖健鋭營增設驍騎千名蓋造官兵營房二千一百五十二間紅石山水師營委署前鋒參領二人各給房八間副前鋒校八人各給房三間驍騎百二十名各給房二間鑲黃正黃正白鑲白鑲紅鑲藍六旗每旗委署前鋒參領二人正紅正藍二旗委署前鋒參領各一人均各給房八間八旗驍騎各百有十名每名各給房二間一直省營房順治十四年覆準甘肅文武各官輸銀建造營房照修城例分别議敘又題準浙江杭州官紳捐造羅木營房照例議敘康熙元年題準江西建昌營房動支垜夫工食銀建造三年題準貴州省動支四稅銀修蓋營房安插投誠官兵九年題準官員將官兵營房不行修理安插以致占居民房者罰俸一年十三年議準直隸增設八旗駐防官兵營房動該地方正項錢糧蓋造三十三年題準撥給右衛駐防官兵房屋共蓋造十萬八千五百二十九間又題準造給古北口石匣營二處營房千七百五十間張家口營房千間皆動支正項錢糧三十四年題準陜西寧夏蘭州二處駐防官兵撥給房屋將軍二十五間副都統各二十間協領各十有五間參領佐領各十有二間防禦各八間驍騎校各六間驍騎各二間四十四年覆準蓋造湖廣提督標下官兵營房四百間四十七年覆準貴州銅仁府增設文武官兵於正大龍頭二處修造廨舍營房一百三十七間五十五年覆準奉天旅順口水師營蓋造官兵住房一千三百四十四間五十七年覆準蓋造河南省城八旗駐防兵丁匠役等房二千五百八十四間六十年題準造四川成都府八旗駐防官兵營房四千九百八十間捐造各官照例議敘雍正四年議準天津州設立水師營建造營房照寧夏駐防間數分給五年覆準陜西潼關蓋造駐防官兵營房二千六十四間六年覆準遷安縣冷口增蓋官兵營房十間七年覆準寧古塔伊屯設立官兵蓋造營房共四百五十間八年覆準浙江乍浦新設駐防建造營房千六百間又旱門水門及營內守宿房共三十二間十二年覆準各省墩臺營房令州縣官㑹同該汛營辨稽察隨傾隨扶仍令該管道府將備不時嚴察如文官怠玩草率遲延令道府揭參武辨疏縱兵丁殘毁令將備揭參倘道府將備互相推諉令督撫提鎮核參至文武官辨離任時仍照壇宇倉廒之制并入交代取具接任官印記各結詳報該上司存案倘在任時不加修葺以致倒塌後任官不肯接受者該上司察實著令賠修題參議處如去任官辨無力賠修文官著落不嚴參之道府武官著落不嚴察之將備修理如兵丁作踐拆毁一經察出將該目兵責革仍著落汛辨獨賠汛辨無力即著落將備分賠至交代時後官若有勒索及濫收等弊該上司亦即題參十三年覆準宣化鎮新增官兵每兵一名給大房一間其沿邉隘口造給房二間看守墩臺之兵仍照舊例每兵五名給房三間乾隆三年覆準下江各汛墩臺營房應定歲修之法責令兵丁隨時修補凡新造之營房於六年限內每年每間給銀二錢其六年之後每間歲給銀三錢牌坊木樓煙龍每項給銀五分仍令該管官辨不時稽察修補除江岸海濱颶風暴雨潮汐衝突致有坍損酌量免賠外其餘如漫不經心任聽坍頺官則分賠兵則革換其每年用過銀數統於歲終彚册核實報銷又奏準上江營房亦照下江之例一例準給歲修永定章程於存公銀內動支四年覆準雲南塘汛營房照江南歲修之例按年修理牌坊木樓等項亦照例歲給銀五分至草房土舍六年限內每間歲給銀一錢五分六年限外給銀二錢統於存公銀內動支又覆準直屬墩臺營房除永清等二十二州縣地處偏僻向無設立墩臺營房外所有霸州等七十一州縣原非衝塗孔道其土墩土草營房見屬完固足資守望應飭隨時修葺入册交代其東西南北四大路皇陵大路五十州縣土墩土草營房應分别先後著大興等州縣次第委官㑹同地方官確勘核估逐案報部興修改建甎瓦按年彚册題銷自乾隆四年為始分作三年辦理工竣之後仍交與地方官隨時修葺入册交代再新設承德一州乾隆七年裁歸熱河同知移駐向無汛撥往來商賈甚多應設汛十有九處建墩臺十有九所以資瞭望共營房一百九十間分年陸續辦理其所需工料銀令該督先行確估一并造册核銷五年覆準廣東沿海緊要炮臺如遇損壞令營辨驗明移報州縣州縣官即日親往驗看報明督撫委官察實確估一面給銀興修一面造册報部勒限兩月完竣如逾限不完照承修遲延例核參其僻在內港炮臺雖非扼要然竟任地方官次第修理惟恐不肖州縣藉無承修定限竟不修理則日漸傾頺轉致需費浩繁應飭該地方官如有坍塌處所即隨時修葺仍按季造册報部其草蓋營房準其改為瓦屋將見在朽爛之沿海等處營房先行確估報部動項修蓋亦照墩臺之例定限兩月完竣其餘草房俟有倒壞陸續報部更修又覆準湖廣各路塘房將地處衝要及比連鄰省要隘陸路塘房飭令地方文武官辨察勘其見在完固及偏僻塘汛槩不得任意報修如實因年久傾圮必應修建者方準動項興修工竣後仍交與地方官隨時修葺文武離任時造入交盤册內交代如兵丁作踐不加保護即將兵丁責革塘房責營辨賠修七年覆準青州駐防城內衙署兵房牆垣等項每年遇有竒零修理工程數在百兩以內者動用房租銀修理工竣造册報銷如有大修銀數在百兩以上者照部原奏將應需工料銀數核實具題興修八年覆準山西塘汛營房等項照江南歲修之例每年給與歲修銀責令營辨隨時修葺地方官不時稽察倘有將銀侵蝕任其傾圮等弊一經察出即行題參仍將坍塌營房並侵蝕銀在於該營辨名下追賠修理其應需歲修銀在公項銀內動撥十五年覆準江蘇各屬歲修營房等項仍照乾隆三年例歲修銀數隨時分别動支毋庸逐案具奏欽定大清㑹典則例卷一百二十七
