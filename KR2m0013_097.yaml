body:
  text: 禮部主客清吏司朝貢上一勅封崇徳二年朝鮮國王李倧舉國歸附勅封為朝鮮國王賜龜紐金印給誥封王妻為王妃子為世子順治元年定外國繳送明季勅印者聽地方官具題六年遣正副使齎詔勅往封朝鮮國世子李淏為朝鮮國王妻為王妃是年題準往封朝鮮國王詔勅各一道由内院撰擬正副使啟塗工部給黄繖旗仗欽差牌肅静迴避牌各一對兵部給郵符起沿塗夫馬給兵票撥營汛兵䕶送至山海闗出闗撥旗兵送至朝鮮國界給路引載随行通事官從人及車馬弓矢佩刀之數以備出闗稽察八年覆準琉球國納欵差陪臣齎表及通事到京頒勅一道諭該國將明季勅印繳換即令差官齎回十一年琉球國世子尚質遣陪臣繳到明季鍍金銀印一顆襲封王爵詔一道勅書一道遣正副使齎詔勅各一道及鍍金駝紐銀印一顆往封琉球國世子尚質為中山王是年題準往封琉球國王開列内閣典籍中書舍人翰林院讀講編檢六科給事中禮部郎中員外郎主事行人司行人恭候欽㸃正副使各給蠎段朝衣麒麟補服工部豫行福建督撫備渡海大舟務擇精良者至啟行乘傳給繖仗旗牌皆如例十六年遣使齎詔勅往封朝鮮國世子李棩為朝鮮國王是年定往封朝鮮國王開列内大臣散秩大臣一等侍衞滿内閣學士翰林院掌院學士禮部侍郎恭候欽㸃正副使各一人十八年覆準安南國王黎維禔奉表投誠照琉球國例頒勅一道令來使齎奉回國康熙元年覆準順治十一年往封琉球正副使至閩因道阻未及渡海行令閩浙總督造舟送往三年以荷蘭國王助兵克取廈門金門頒勅諭二道褒奬是年部覆安南國世子黎維禧請封一疏奉㫖竢該國繳送明季勅印再行議奏五年安南國世子黎維禧送到明季勅一道印一顆遣正副使齎勅及鑄給鍍金駝紐銀印往封黎維禧為安南國王又題準往封安南國王開列正副使及給蠎段朝衣麒麟補服悉照出使琉球之例十二年暹羅國請封給與勅書並駝紐鍍金銀印貢使於午門外祗領並行令該國王恭迎各如儀十四年遣正副使齎詔勅封朝鮮國世子李焞為朝鮮國王妻為王妃二十一年遣使齎勅往封琉球國世子尚貞為琉球國中山王二十二年遣使齎勅封安南國世子黎維正為安南國王以舊印糢糊並換給新鑄駝紐鍍金銀印三十年朝鮮國王廢妃仍封為妃補給誥命其側室仍處以副室繳前所封誥命三十六年諭朝鮮國奏稱正妃無子請將側室所生之子李昀封為世子應準其所請賜物照例由户部支取遣正副使臣齎勅往封四十二年定朝鮮國王繼室照例封為王妃其誥命及賜封王妃禮物均與封適妃同五十七年琉球國王世曾孫尚敬具奏自四十八年中山王尚貞薨逝世子尚純早世世孫尚益權署國事未及請封亦薨今遣耳目官正議大夫等請封襲王爵奉㫖琉球國世守臣節忠誠可嘉準該國王世曾孫尚敬所請勅賜承襲琉球國中山王遣使行勅封禮五十八年遣使齎勅封安南國世子黎維祹為安南國王五十九年遣使齎勅封朝鮮國世子李昀為朝鮮國王是年朝鮮故王妃奏準世子原配追贈王妃繼室封王妃頒賜誥命六十一年朝鮮國王奏請封其弟李昑為世弟部覆與例不符奉㫖照所請行遣使齎勅往封其弟李昑為朝鮮國王世弟雍正二年遣使勅封朝鮮國王世弟李昑為朝鮮國王妻為王妃三年朝鮮國王請封側室所生之子為世子奉㫖建立世子該王必再三斟酌始懇切具呈著照所請行是年遣使齎勅往封其子李緈為朝鮮國王世子是年西洋教化王入貢頒勅一道付來使齎回五年西洋博爾都噶爾國入貢頒勅一道付來使齎回是年諭蘇禄國向來未通職貢今該國王輸誠嚮化遣使逺來進貢方物奏辭懇切具見悃忱其有應行議奏之處著大學士九卿詳議欽此遵㫖議準蘇禄國入貢照東南海外安南琉球荷蘭暹羅諸國初次奉表納貢之例欽頒勅諭一道給賜該國王即令來使齎奉還國七年暹羅國入貢内閣撰勅一道付來使齎回八年南掌國入貢欽頒勅諭照蘇禄國初次納貢之例十一年遣使勅封安南國世子黎維祜為安南國王乾隆二年朝鮮國王李昑以世子李緈早世遣使請封子李愃為世子奉㫖該王既稱遲暮之年子李愃知識漸長輿情所在願名位早定情辭懇切著照所請行是年遣使齎勅往封李愃為朝鮮國王世子是年遣使齎勅封安南國王弟黎維禕為安南國王十六年奏準緬甸國入貢照蘇禄各國初次入貢之例欽頒勅諭一道賜該國王以示嘉奬即令來使齎奉還國二十一年遣使齎勅封琉球國王世子尚穆為琉球國王一貢期崇徳二年定朝鮮每年進貢一次並聖節元旦冬至三大節為四貢同進順治十一年定琉球貢期二年一次十三年諭荷蘭國慕義輸誠航海修貢念其道路險逺著八年一次來朝欽此康熙二年覆準安南貢期三年一次四年定暹羅貢期三年一次七年安南國入貢乞將三年一貢之例改為六年兩貢得㫖允行二十五年覆準荷蘭國入貢原定貢期八年一次今該國王感被皇仁更請定期改為五年一次雍正元年奉㫖朝鮮國所進萬夀表文貢物不必於九月内來京著仍照例於十二月内與年貢並進七年諭朝鮮王世篤恭順虔修職貢昔蒙世祖章皇帝軫念藩封特頒勅諭令聖節元旦冬至表儀皆準與年貢同進以彰柔逺至意近見該國王於領受賞賚等事皆遣使臣齎表奏謝朕念該國距京三千餘里貢使往來未免勞費嗣後凡属謝恩表章皆著與三大節表一同齎奏不必特遣使臣永著為例欽此八年覆準南掌貢期定為五年一次乾隆八年蘇禄國王齎表進貢奉㫖覽王奏具見悃忱爾國逺隔重洋再修職貢良可嘉尚至所請三年復貢之處恐該國道逺風信難期著仍遵雍正五年所頒勅諭酌竢五年之外一修嵗獻之㫖行又諭南掌國貢象舊例以五年為期朕思該國僻處天末逺道致貢未免煩勞著改為十年一貢欽此一貢道崇徳二年定朝鮮貢道由鳯凰城順治八年議準琉球貢道由福建十三年議準荷蘭貢道由廣東康熙元年議準緬甸貢道由雲南四年議準安南貢道由廣西太平府六年議準西洋貢道由廣東又議準暹羅貢道由廣東二十五年覆準荷蘭貢道改由福建雍正二年議準嗣後安南貢使來京令廣西巡撫填給勘合由湖廣江西山東等處水路進京回日兵部照原勘合換給由水路歸國永為例又諭向來驛遞供給差遣多有騷擾曽降諭㫖定例外不許溢額今安南國王慶賀登極大禮遣使逺來應加恩䘏其經過地方供給日用酌量加増欽此四年議準蘇禄貢道由福建七年議準南掌貢道由雲南一貢物崇徳二年定朝鮮貢物年貢黄金百兩白金千兩苧布二百疋各色棉紬四百疋各色木棉布四千四百疋龍紋席二花席二十鹿皮百水獺皮四百豹皮百四十有二青黍皮三百佩刀十大小紙五千卷米百石萬夀聖節禮物各色苧布三十疋各色棉紬七十疋龍紋席二各色花席六十豹皮十水獺皮二十白棉紙二千卷厚油紙十部元旦冬至二節減棉紬三十疋及水獺皮油紙二種皇后千秋節苧布三十疋棉紬三十疋花席三十元旦冬至二節加螺鈿梳函一具三年朝鮮國王恭進慶賀方物苧布六十疋棉紬七十疋龍紋席二花席四十五豹皮五白棉紙二千卷又進謝恩方物如之又陳奏方物減苧布二十疋花席五加水獺皮二十青黍皮三十筆百枝墨五十笏恭進皇后苧布二十疋棉紬二十疋花席二十順治元年議準外國朝貢以表及方物為慿該督撫察驗的實方準具題入貢又定貢使到京所貢方物會同館報部提督該管司官赴館察驗撥役管領由部奏聞貢物交進内務府象交鑾儀衞馬交上駟院刀鹿皮青黍皮等物交武備院硫黄交該督撫收貯十一年琉球國王世子尚質進貢慶賀方物金飾柄匣佩刀銀飾柄匣佩刀金酒缾銀酒缾泥金畫屏泥金扇泥銀扇蕉布苧布紅花胡椒蘇木又恭進二年一次常貢方物馬十匹螺殻三千硫黄萬二千六百斤十三年荷蘭國王恭進御前方物瓖金鐵甲鍍金馬鞍瓖銀劍鳥銃珫藥袋瓖銀千里鏡玻璃鏡八角大鏡珊瑚珊瑚珠琥珀琥珀珠哆囉絨嗶吱段西洋布花被面大氊毛纓丁香番木蔲五色番花桂皮檀香恭進皇后方物玻璃鏡玳瑁匣玻璃匣烏木飾人物匣珊瑚珠琥珀珠琥珀哆囉絨嗶吱段西洋布白倭段花氊花被面玻璃杯花石合白石畫薔薇露十八年安南國王差陪臣奉表投誠入貢方物金香鑪花缾銀盆沉香速香紫降香白木香黒線香白絹犀角象牙康熙元年定朝鮮國每年進貢太皇太后皇太后二大節及遇慶賀謝恩陳奏進貢方物均與皇后禮同三年定外國慕化來貢方物照其所進收受不拘舊例是年琉球國王尚質因謝勅封恩進貢方物金飾佩刀銀飾佩刀漆柄大刀漆杆槍漆盔甲泥金畫屏泥金扇泥銀扇畫扇紅銅胡椒絲綿土苧布蕉布四年覆準琉球國王補進慶賀貢物與順治十一年同貢船在梅花港口遭風飄失貢物免其補進是年暹羅國王差陪臣入貢御前方物龍涎香西洋閃金段象牙胡椒螣黄荳䓻速香烏木大楓子金銀香蘇木孔雀龜凡十有三種皇后前方物並同各減半例於常貢外有加貢無定額五年琉球國王補貢四年方物奉㫖琉球國王補進飄失貢物具見恭順但前已有㫖免進這補進金銀器皿仍著發還六年琉球國王進常貢方物加紅銅五百斤螺鈿漆盤十又覆準琉球進貢硫黄應留福建督撫收貯餘貢物令該撫差人解送來使不必到京即給賞遣回下次貢使仍令齎表入京是年荷蘭國王進貢方物大馬鞍轡具瓖金瓖銀銃起花金刀哆囉呢嗶吱段嗶吱紗荷蘭絨大花段荷蘭五色大花段大紫色金段紅銀段大珊瑚珠五色絨毯五色毛毯西洋五色花布西洋白細布西洋小白布西洋大白布西洋五色花布褥大玻璃鏡玻璃瓖鐙荷蘭地圗小車大西洋白小牛並進大琥珀丁香白胡椒大檀香大象牙並琉璃器皿一箱八年琉球國王入貢於常貢外加貢紅銅千斤絲煙百匣螺鈿茶鍾百九年西洋國王阿豐肅遣陪臣奉表入貢方物國王畫像金剛石飾金劍金珀書箱珊瑚樹珊瑚珠琥珀珠伽枬香哆囉絨象牙犀角乳香蘇合油丁香金銀乳香花露花幔花氊凡十有七種十年琉球國世子尚貞入貢於常貢外加貢鬃煙番紙蕉布十二年諭暹羅國航海逺來抒誠進貢其蟲蛀短少等物免令補進嗣後各國皆照此例欽此十七年西洋國王阿豐肅遣陪臣奉表貢獅子二十年奉㫖琉球國進貢方物以後祗令貢硫黄海螺殻紅銅其馬匹絲煙螺鈿器皿均免進貢二十一年聖祖仁皇帝恭謁祖陵朝鮮國王遣陪臣至盛京迎接進貢方物豹皮鹿皮水獺皮青黍皮倭劍全鰒八帶魚大口魚海参海帶莱紅蛤浮椒白蜜栢子銀杏黄栗柿乾二十三年琉球國王尚貞因勅封謝恩進貢方物與康熙三年同又以特賜御書加貢金鶴一對二十五年奉㫖朝鮮國王謝恩引罪進獻禮物嗣後均停收又覆準荷蘭道路險逺航海艱辛嗣後進貢方物酌量減定令貢珊瑚琥珀哆囉絨織金毯嗶吱段自鳴鐘鏡馬丁香檀香冰片鳥槍火石餘均免貢二十七年琉球國因準陪臣子弟入監讀書於常貢外加貢圍屏紙三千張嫩蕉布五十疋是年奉㫖琉球國航海入貢塗逺勞煩海螺殻嗣後免進三十二年奉㫖朝鮮世篤悃忱克殫恭順頃復輸應軍需捐進鳥槍三千可嘉年貢内黄金百兩及藍青紅木棉嗣後永著停止是年琉球國以免常貢海螺殻補進白剛錫千斤三十七年朝鮮國王為平糶及賞給米穀恭進謝恩禮物奉㫖為平糶謝恩禮物發回為賞給米穀所進謝恩禮物準收三十九年諭朝鮮國王因送回飄溺人民賞賜謝恩其禮物不必收嗣後此等奏謝著停其進貢四十七年暹羅國王遣陪臣恭進表文入貢方物外加貢物九件其副貢船貢馴象二隻外加貢金絲猴二五十一年諭朝鮮國慎守封圻恪循儀度四十餘年來未嘗稍懈朕用嘉羙將該國貢典屢加裁減至於甚輕今貢物内有白金千兩紅豹皮百四十二張猶恐艱於備辦嗣後將二項永停貢獻又覆準朝鮮國前次謝恩禮物既停收受復念路塗遙逺帶囬維艱著與收留準作本年貢物今該國復進禮物謝恩又奉㫖蠲免仍照前例準留作貢物但所貢筆墨不在貢例豹皮已永停貢獻仍交來使帶回五十四年覆準朝鮮國謝恩禮物久已停收留作正貢復行曉諭該國王嗣後謝恩照常進表其禮物不必進獻五十五年奉㫖安南路逺解送重物甚属勞苦嗣後犀角象牙免其進獻金香鑪花缾銀盆準折作金銀同其餘貢物均交廣西藩庫收貯如有應用之物内務府咨部移咨該撫差官解送五十六年安南國王嗣子黎維祹以諭㫖軫念該國路逺免其解送重物請遣陪臣謝恩照例準其進貢之年進表五十九年暹羅國王遣陪臣恭奉金葉表文貯以金筩裹以錦袱上飾金珠三金圏七合二重内合飾螺鈿外合飾金紫梗牌二入貢馴犀又貢使呈稱國王命加貢西洋金段二大西洋濶宋錦一雍正元年諭朝鮮國自歸順我朝恪供藩職列聖以來屢次施恩減免貢物今所貢或尚有可減者著確議具奏欽此遵㫖議準朝鮮貢物明時有金銀器皿人參馬匹苧布棉紬等數十種我太宗文皇帝崇徳二年免本年常貢之半五年免貢米九千包世祖章皇帝時凡金銀器皿人參馬匹槩與停免聖祖仁皇帝康熙三十二年免黄金百兩青紅藍木棉布六百疋五十年免白金千兩紅豹皮百四十二視明時貢物已免過半今惟年貢内可減去青黍皮三百水獺皮百木棉布八百疋白棉紙二千卷餘貢如常二年琉球國王恭進慶賀登極方物金銀飾佩刀金銀缾泥金畫屏扇圍屏紙紅銅白剛錫蕉布夏布恭進皇后金銀粉匣扇蕉布夏布是年安南國王慶賀登極並謝恩恭進方物均如常貢又暹羅國進獻穀種果樹洋鹿獵犬等物奉㫖暹羅國欽遵聖祖仁皇帝諭㫖不憚險逺進獻諸物最為恭順殊属可嘉其穀種鹿犬已經差官送至各種果樹竢來嵗春和再行委解三年奉㫖朕垂念逺方時存軫䘏朝鮮國既有哀戚之事其因賜祭謚謝恩禮物朕心甚為不忍著不必收納至封王所貢儀物照例收受是年西洋伊達里亞國教化王伯納第多遣使奉表慶賀登極進貢方物厚福水緑玻璃鳯壺各色玻璃鼻煙壺玻璃碁盤碁子哩阿波羅盃蜜蠟盃小盃小缾小刀柄法琅小圎牌銀纍絲連座船四輪船缾花大小花盤小花缾小漏盤小銅日晷水晶滿堂紅鐙咖什倫鼻煙罐蓋杯緑石鼻煙合帶頭片各寳鼻煙壺玩器圎毬素珠實地銀花盤花匣小罐素鼻煙合花砂漏瓖寳石花線花畫皮畫皮扇面畫繡花紙盤花紙盤花石鐵花盆巴爾薩木油阿噶達片番銀筆裹金規矩瓖牙片瑪瑙刀柄鼻煙壺珠各色石鞭頭小石合珊瑚珠香枕囊火漆石印紐火漆八包顯微鏡火鏡照字鏡大紅羽段周天球鼻煙凡六十種四年諭琉球國王因朕頒賜御書匾額及采段玉器等件特遣使臣進表謝恩貢獻儀物具見悃誠朕加惠逺藩不受貢物但既航海逺來不忍令其帶回本國向來朝鮮國王進獻禮物若不收受有交送内務府存留準作年貢之例今琉球國王所進禮物準作三年一次正貢欽此又覆準安南國王恭進謝恩禮物應令暫停仍照定例竢正貢之年一并具表赴京五年奉㫖朝鮮年貢之例每年貢米百石朕念該國路塗遙逺運送非易著減去稻米三十石糯米三十石每年進貢糯米四十石足供祭祀之用永著為例是年西洋博爾都噶爾國王若望遣使麥徳樂等具表慶賀恭請聖安因進方物大珊瑚珠寳石素珠金法琅合金瓖咖什倫缾蜜蠟合瑪瑙合銀瓖咖什倫合藍石合銀鍍金瓖玳瑁合銀鍍金瓖雲母合各品藥露五十缾金絲段金銀絲段金花段洋段大紅羽段大紅哆囉呢洋製銀柄武器洋刀長劍短劍鍍銀花火器自來火長槍手槍鼻煙葛巴依瓦油聖多黙巴爾撒木油璧露巴爾撒木油伯肋西里巴爾撒木油各品衣香巴斯第里葡萄紅露酒葡萄黄露酒白葡萄酒紅葡萄酒咖什倫各色法琅烏木瓖青石桌面瓖黄石桌面烏木瓖各色石花條桌織成逺視畫凡四十一種其來使呈稱國王蒙聖祖仁皇帝撫䘏多年兼慶皇上御極仍一視同仁感戴洪恩敬備方物願恭奉至御前親身進獻庶得達國王敬奉皇朝之盛心其表文由内閣繙譯貢物由部具奏奉㫖準其進獻又蘇禄國王母漢末母拉律林遣正使奉表入貢方物珍珠玳瑁描金花布金頭牙薩白幼洋布蘇山竹布燕窩龍頭花刀夾花標槍滿花番刀藤席猿凡十有二種六年議準琉琉國前進謝恩禮物奉㫖存留作貢今循舊例進到四年正貢應遵前㫖存留作六年正貢其六年應進表文仍令遣使恭進七年諭據福建巡撫奏稱琉球國中山王尚敬差耳目官毛鴻基等進貢方物照例進港安插館驛朕以琉球歴來恪守臣節不失貢期而地處重洋之外使臣逺渉風濤深可軫念是以令其四年進貢方物準作六年正貢其六年應進表文竢八年正貢一同恭進所以寛其朝貢之期與海邦休息之意也今該國王以未接部文仍按期遣使實因未知朕之明㫖並非有違成例且其船已經進港行李已安頓館驛寧可以不合例而却之使空往返於洪濤巨浪中乎著照例準其入貢該撫委官伴送來京一應廩餼舟楫悉遵二年例從厚辦給欽此又諭琉球處重洋之外奉表脩貢逺渉風濤朕心深為軫念是以從前降㫖將雍正四年該國王所貢謝恩儀物準作六年正貢以示恩眷今該國王以六年正貢之期仍遵定制遣使奉表情詞懇切具見悃誠著將六年貢物準作八年正貢若八年貢物已經遣使起程即準作十年正貢欽此是年暹羅國王遣陪臣朗微述申黎呼等齎金葉表文貯以金筩錦囊與康熙五十九年同入貢御前方物馴象龍涎香幼鐉石冰片沉香犀角孔雀尾翠鳥皮象牙速香安息香紫降香荳蔲螣黄胡椒大楓子烏木蓽撥紫梗桂皮兒茶皮樟腦硫黄檀香樹膠香織金頭白袈裟桃紅袈裟幼花布濶幼花布織金頭白幼布濶紅布花幼幔大荷蘭氊冰片油薔薇露皇后前方物不進象餘物減半又加進寳劍仗劍金地交枝柳條版帶奉㫖暹羅國王遣使逺來貢獻方物具見悃誠朕念該國逺隔海洋齎送不易欲酌量裁減以示恩䘏逺藩之意但此次貢物既齎送前來難以帶回著照往例收納其常貢内有速香安息香袈裟布疋等十件無必須用之處嗣後將此十件免其入貢永著為例欽此遵㫖議準免貢速香安息香胡椒紫梗紅白袈裟白幼布幼花布濶幼花布花布幔等物皇后前照此免貢八年安南國王黎維祹遣陪臣丁輔益等進四年七年正貢又為謝賜御書書籍段幣寳玉器皿恭進禮物並進金龍黄紙二百張玳瑁筆百枝斑石硯二方土墨二包又為賜給疆地及準貢使經由水路各進謝恩禮物照例收受又恭進奏事禮物停收又南掌國蘇瑪喇薩提拉島孫差頭目叭猛花叭猛腊叭細禮松發帶先目後生人等到京奉銷金緬字蒲編表文一道貢馴象二隻九年諭朕因琉球地處重洋之外奉表脩貢深為軫念曾經降㫖將雍正八年貢物準作十年正貢今該國王奏請按期入貢情辭懇切具見悃誠著仍遵前㫖若十年貢物已經起程即準作十二年正貢十一年不必遣使前來欽此九年琉球國官生業成歸國國王加進謝恩禮物嫩蕉布百疋圍屏紙五千張照例收受十二年諭琉球國八年進貢曾經降㫖準作十年正貢今該國王復行奏請仍遵舊典按期入貢情詞懇切具見悃誠著仍遵前㫖行欽此乾隆二年諭朝鮮國王為請封世子進獻禮物若仍令來使齎回未免徒滋往返著暫留收貯準作來年正貢欽此六年琉球國進謝賜御書恩禮物照雍正四年例留準七年正貢該使呈請謝恩禮物免其準貢奉㫖仍遵前㫖行是年議準琉球國王進到七年正貢準作九年正貢其九年應進表文照例遣使恭進八年車駕恭謁盛京祖陵朝鮮國王遣陪臣迎接進貢方物與康熙二十一年同十一年朝鮮國王遣陪臣陳奏莾牛哨設兵並栅外起墾之事恭進禮物仍留準貢十二年朝鮮國王為停止鳯凰城展栅及莾牛哨設兵並栅外起墾之事謝恩恭進禮物仍留準貢十四年暹羅國王遣陪臣朗呵派哌提等奉金葉表文入貢御前方物象二龍涎香一斤犀角六沉香二斤土璇石十一兩二錢象牙紫降香大楓子荳蔲螣黄烏木各三百斤胡椒花桂皮樸齒舌皮樟腦檀香硫黄各百斤蘇木三千斤上冰片一斤氷片二斤冰片油二十瓢翠毛六百副孔雀尾十屏紅布幔十疋賀南氊二塊皇后前不貢象餘物各減半又附洋船貢到黒熊鬬鷄金絲猿令其進獻十六年緬甸國王遣陪臣希里覺填奉表入貢御前方物氊段四緬布十有二馴象八皇太后前馴象二一從人順治九年議準各國由陸路進貢每次不得過百人入京止許二十人餘皆留邊聽賞由海道進貢不得過三船每船不得過百人一應接貢探貢等船不許放入十一年議準琉球進貢人數不得過百五十人正副使從人十有五名入京餘留邊聽賞十三年議準荷蘭入貢貢役不得過百人入京員役止二十名餘留住廣東該地方文武官嚴加防衞竢進京人回一同遣還不得久住海濵康熙四年議準暹羅正貢船二令員役二十人來京補貢船一令六人來京六年覆準暹羅國進貢不得過三船每船不得過百人來京員役二十二人存留邊界梢目給與口糧其接貢探貢等船槩不許放入七年覆準安南貢船不得過三每船不得過百人來京員役不得過二十人又覆準西洋國入貢正貢一船䕶貢三船嗣後船不許過三每船不許過百人令正副使及從人二十二名來京其留邊人役地方官給與食物仍加防守十八年琉球國補進十七年貢物除赴京官伴外其餘員役令先乘原船歸國二十八年議準琉球國入貢兩船人數準其加増共不過二百名接貢一船亦免收稅合三船之數四十二年琉球國遣耳目官入貢除留閩官伴外其餘員役照例先回雍正八年議準南掌國進貢員役不得過百人赴京止許二十人乾隆十六年議準緬甸國進貢員役不得過百人赴京止許二十人一朝儀崇徳二年朝鮮國王李倧舉國歸附太宗文皇帝命坐於和碩親王之上其長子李􅓭次子李淏三子李㴭坐於貝勒之次又定凡朝鮮國來使有職銜稱君者竢朝賀行禮畢引入殿内坐於右翼輔國公之下隨班賜茶康熙五十九年西洋國遣使臣斐拉理奉表來朝是日設表案於暢春園九經三事殿階下正中聖祖仁皇帝御殿陞座禮部鴻臚寺官引貢使奉表陳案上退行三跪九叩禮仍詣案前奉表進殿左門升左陛膝行至寳座傍恭進聖祖仁皇帝受表轉授接表大臣貢使興仍由左陛降出左門於階下復行三跪九叩禮入殿賜坐賜茶畢謝恩退雍正三年安南國王遣陪臣入貢方物奉㫖召見四年琉球國王尚敬為賜御書匾額玉器采段遣使恭進謝恩禮物其正使紫巾官召見五年西洋國遣使臣麥徳樂等進表慶賀儀與康熙五十九年同七年奏準朝鮮國差陪臣驪川君李增謝恩來京未遇陞殿世宗憲皇帝御乾清宫寳座禮部堂官一人引來使隨帶通事一人由乾清門右門入至丹墀西行三跪九叩禮畢引入乾清宫右門賜坐於右翼大臣之末賜茶來使叩頭飲訖世宗憲皇帝慰問來使跪聆畢引出至乾清門外謝恩齊集之大臣咸補服議政大臣及應齊集大臣均入内大臣班列坐豹尾班侍衞隨進扈衞不賜茶在圓明園召見於正大光明殿儀同又諭嗣後朝鮮差來陪臣有職銜稱君者遇升殿之日照常賜茶如未遇升殿著禮部於使臣起程之前奏聞令其便殿進見賜茶遣回欽此又奏準琉球國差陪臣耳目官毛鴻基等入貢來京恭遇聖駕陞殿竢百官行禮畢將耳目官毛鴻基正議大夫鄭秉彛引至丹墀西行三跪九叩頭禮畢於右翼衆官之末賜坐賜茶又議準暹羅國來使共四人或召見大貢使一人或四人一同召見奉㫖著大貢使於同來貢使内選一人令二人進見八年奏準南掌國通事刁猛原繫緬人雖通漢語但語言蹇澁恐奏對時不能明晰有伴送貢使之把總康天錫熟悉南掌國言語令其隨貢使進見十二年奏準朝鮮國陪臣密昌君李樴安南國陪臣范公容琉球國陪臣温思明等於元旦令節聖駕陞殿已經行禮停其進見乾隆元年議奏暹羅國陪臣朗三立哇提等四人入貢來京或召見大貢使一人或四人或令其選一人同大貢使二人進見或停其進見奉㫖皆令進見又奏朝鮮國來使召見賜坐賜茶原因其該國王族人稱君者與我國内大臣位次不甚相懸故相待如此之優至琉球安南暹羅等國差來陪臣若繫該國王兄弟世子來朝自應如朝鮮之例若尋常貢使乃伊國陪臣與大臣相去懸逺召見儀注似不宜照朝鮮國稱君來使之例今暹羅國貢使朗三立哇提等召見之日皇帝御乾清宫寳座應入班之内大臣侍衞等照例排班序立禮部堂官引來使隨帶通使一人由乾清門西門入於丹墀西邊行三跪九叩禮畢禮部堂官由西階引至乾清宫中門外跪通事在來使西邊稍後跪皇帝慰問畢引出候㫖賜茶或賜飯畢引至午門外謝恩其議政大臣等齊集賜坐賜茶之處似應停止嗣後琉球安南等國來使如蒙召見皆照此例遵行奉㫖所奏是此次仍照世宗憲皇帝召見例行四年議準琉球國使臣王舅向啟猷等已於本年元旦隨班行禮例應停其進見但雍正二年琉球國遣王舅翁國柱等來京朝賀已經隨班行禮蒙世宗憲皇帝特㫖召見今向啟猷等援例呈請應準其進見八年奏準蘇禄國使臣雖經召見尚未起程恭遇陞殿之期應令其謝恩行禮九年奏準朝鮮國陽平君李檣事已告竣未遇陞殿自當照例進見據李檣呈稱年已七旬素患氣喘兼有足疾恐難如儀應將李檣照例停其進見十四年奏準暹羅國使臣朗呵派哌提等奉表來京恭遇車駕巡狩於起鑾之日禮部滿堂官引來使等四人並通事一人至圓明園宫門外於車駕未啟行之先行三跪九叩禮恩賞該國物件於宫門前賞給隨率至王公百官送駕排班之末跪候瞻仰如䝉慰問來使跪聆畢禮部堂官領回十六年奏準緬甸國使臣希里覺填等奉表來京恭遇陞殿已經行禮應照例停其進見十八年奏準暹羅國使臣郎損吞派沛等奉表來京恭遇駕幸南苑已令使臣道旁瞻仰應照例停其召見又奏準西洋國使臣巴哲格等奉表來京令來使候於後左門恭候皇帝御乾清宫寳座禮部堂官一人率領在京居住西洋人一人引來使進見進表儀與雍正五年同是日齊集之大臣咸補服議政大臣入内大臣班不賜茶豹尾班侍衞照常隨進扈衞如儀一賜予崇徳二年賜朝鮮國王裘㡌及鞍馬一匹貂皮百有二十銀百兩正副使各鞍馬一匹貂皮五十朝鞾一雙銀五十兩書狀官押物官貂皮銀鞾從人銀布各有差順治五年賜朝鮮國王世子鞍馬貂冠貂裘狐裘羅袍段袍朝鞾内監甲將通事外郎貂皮銀各有差六年議準朝鮮國告哀使臣賜大段㡌段彭段紬各一銀五十兩書狀官一人大段紬各一銀二十兩大通官三人各彭段一紬一銀十五兩從官十有八人各彭段一銀十兩從役二十三名各銀四兩又議準勅封朝鮮國王賜國王黒狐皮裘黒貂皮一百玲瓏鞍轡馬一匹大蠎段大段四團補段各二小蠎段糚段錦段石青段各一王妃大蠎段糚段錦段倭段閃段㡌段青段石青段各二大段彭段各三紡絲紗各四付封使齎往十年議準朝鮮國王賀萬夀聖節賜國王鞍馬一匹黒貂皮二十貂皮一百銀百兩正使大段㡌段彭段紬紡絲各一銀五十兩氊襪一等鞾鞍馬副使同書狀官大段彭段紬各一銀五十兩氊襪二等鞾大通官三人各大段一紬一銀三十兩氊襪馬皮鞾押物官二十四人各彭段一紬一銀二十兩氊襪牛皮鞾從人三十名各銀五兩元旦節賜國王及正副使以下如聖節例又奏準黒貂皮二十折采段表裏各五疋貂皮百折銀百五十兩又議準進年貢及賀冬至節賜國王與正副使如元旦例惟不給鞍馬其書狀官以下員役賞給有差十一年議準琉球國進貢賜國王蠎段二采段六藍段三素段閃段各二錦三紬羅紗各四王妃采段四糚段閃段各一藍段青段錦段各二羅紗各四正使王舅采段表裏各四閃段一羅二紬紗各四副使正議大夫采段表裏各三藍段一羅紬紗各二使者采段表裏各二藍段紬羅紗各一通事從人段紬紗布銀各有差十三年議準荷蘭國進貢賜荷蘭國王大蠎段糚段倭段各二花段八閃段㡌段藍段青段各四綾紡絲羅各十銀三百兩使臣二人每人大蠎段糚段倭段各一花段六藍段三綾紡絲絹各四銀百兩標官糚段倭段藍段各一花段三綾紡絲絹各二銀五十兩通事從人段紬絹銀各有差十八年議準朝鮮領時憲書差來使臣賞銀三十兩通事八兩從人各四兩凡有咨部事件齎咨官及通事從人賞銀同又議準頒詔天下遣正副使齎詔頒於朝鮮國王如恩詔有外藩王公加恩賜一款賜朝鮮國王大蠎段糚段補段片金段倭段各二㡌段閃段藍段青段各五各色段十洋段十共五十又恩詔有外藩福晉夫人加恩賜一款賜朝鮮王妃大蠎段糚段錦段倭段閃段㡌段素段各二大段彭段各三藍段二紡絲紗各四共三十又議準朝鮮國遣陪臣慶賀謝恩及有事陳奏各進貢方物賜來使至從人與元旦節同若附正貢同來統於正貢之賜非正貢