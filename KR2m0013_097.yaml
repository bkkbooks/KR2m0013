守法度行止無愆朕自推恩撫䘏兹因使臣歸國特頒斯勅並賜糚段錦段大段六十疋次段四十疋王其受領悉朕惓惓之意是年賜國王大蠎段糚段倭段各四片金段二閃段藍花段青花段㡌段藍段青段各六綾紡絲各十有八羅十絹四銀三百兩使臣大蠎段糚段倭段㡌段藍花段青花段藍段各二綾紡絲各六絹四銀二百兩又特賜國王貂皮人参各色糚段錦段大段次段洋漆器瓷器芽茶紙墨絹扇等物是年琉球國王為賜御書玉器采段謝恩入貢賜國王及正副使皆照康熙六十年加賞之例其都通事賞采段二裏一絹一毛青布六留邊通事同至京從人毛青布各六留邊從人同伴送官及土通事彭段袍各一領乂特賜國王内庫段二十玉器十件玻璃器二種共十件瓷器十二種共百五十件法瑯器一件松花石硯二方正使紫巾官内庫段八疋銀百兩又諭琉球國逺隔海洋該國王受賜不必專遣使臣謝恩著於正貢之年一同奏謝將此諭該國王知之欽此五年西洋博爾都噶爾國入貢賜國王大蠎段糚段倭段各六片金段四閃段藍花段藍段㡌段素段各八綾紡絲各二十二羅十三絹七貢使大蠎段一糚段倭段各二㡌段一藍花段青花段藍段各三綾紡絲各六絹三銀百兩䕶貢官十人每人倭段一藍花段青花段藍素段綾各二紡絲三紬二絹一銀五十兩從人三十名每名各紬紡絲三絹二疋銀二十兩廣東伴送把總彭段袍一領又特賜國王人參内庫段瓷器洋漆器荔枝酒芽茶紙墨絹鐙扇香囊等物來使亦加賜有差又議準蘇禄國入貢其奉表使臣頒賞及遣官伴送等事宜均照琉球國例舉行賜國王蠎段六青藍采段藍段青段各十閃段八錦段六紬羅紗各十來使采段六裏四羅四紡絲絹各二通事照都通事例賞采段二裏一絹一毛青布六從人五名賞毛青布各六特賜國王玉器瓷器等物正使加賞内庫段六銀八十兩副使段二銀二十兩是年琉球國王入貢照康熙六十年加賜之例其肄業官生業成歸國照都通事之例賞給各采段一裏一毛青布四從人二名照例賞毛青布各四奉㫖加賞官生内庫段二裏二從人每名官段一七年諭朕覽禮部具題頒賜朝鮮國王儀物本内開載賞賜銀百兩又貂皮折銀百五十兩朕思賞賜之例既已開載貂皮何以又折為銀至於賞銀百兩亦應用儀物以示朕優重藩王之意爾等酌議具奏其餘鞍馬段疋等物亦應將精良者賞給著禮部堂官於頒賜時驗看稽察其所賞正副使臣段疋亦著内庫取用欽此遵㫖議準賞貂皮一百不必折價其段疋均於内庫取用令該衙門遵奉施行至賞給國王銀百兩改為内庫糚段四疋雲段四疋永著為例是年琉球國入貢照康熙六十年加賜之例又特賜國王内庫段二十玉器十件玻璃器二種共八件瓷器十四種共百五十件法瑯器一白王硯松花石硯各一方使臣内庫段四銀五十兩又暹羅國入貢照康熙六十年加賞例賜國王段羅各十有八紗十有二錦段織金段羅紗各八王妃段羅紗各六織金段紗羅各四來使四人每人各段八羅絹五織金羅三裏二布一通事各段羅五絹三從人各絹三布八特賜國王御書天南樂國四字内庫段二十玉器八件法瑯器一件松花石硯二方玻璃器二種共八件瓷器十四種共百四十六件貢使内造段八銀百兩又南掌國入貢頒賞照蘇禄國初次納貢例又特賜國王玻璃器八件瓷器十八種共百三十三件糚段大段各四倭段蠎段各二錦段八猩猩氊二人參六斤正使蠎段一大段三銀百兩副使大段四銀五十兩九年琉球國入貢照年例加賞外特賜王舅玻璃器三玉器三瑪瑙器一石器二銅法瑯器二青緑鼎一漆器八瓷器十二種共十有九件乾隆元年暹羅國入貢照康熙六十一年加賜之例又貢使呈稱國王衷曲懇祈轉奏乞邀恩眷頒賜蠎龍大袍一二襲奉㫖暹羅逺處海洋抒誠納貢除照定例賞給外著特賞蠎段四端四年琉球國進登極賀禮並入貢照康熙六十年加賜之例又特賜御書永祚瀛壖四字並勅諭琉球逺隔重洋不必專遣使臣謝恩竢正貢之年一同奏謝欽此六年南掌國入貢賜國王蠎段六青藍采段藍素段青素段各十閃段八錦六紬羅紗各十貢使采段六裏四羅四紡絲絹各二先目二人采段各三裏各二絹各一毛青布各六通事二人采段各二裏各一絹各一毛青布各六後生九名毛青布各六伴送典史千總彭段袍各一領八年駕幸盛京朝鮮國王遣陪臣入貢奉㫖朝鮮世篤忠誠謹遵軌物今朕恭謁祖陵因至盛京特遣陪臣進表貢獻具見悃忱理合逾格加恩以昭敬順朕已手書匾額匾額式表東藩頒賜再應如何賞賚著内務府議奏遵㫖議準賜國王弓矢全副貂皮百鞍馬一紅糚段龍襴段各四大段紡絲各五正使糚段一段四鞾襪鞍馬銀五十兩書狀官段二鞾襪銀四十兩大通官三人每人各賞中段一鞾襪及銀三十兩押物官十有五人各賞段一銀二十兩從人二十名各賞銀五兩是年琉球國安南國並入貢賞賚均照康熙六十年之例十四年暹羅國入貢照康熙六十一年加賜之例又特賜國王御書炎服屏藩四字蠎段片金段糚段閃段各二錦段四各色段八玉器六瑪瑙器二法瑯鑪缾一副松花石硯二方玻璃器五種共十件瓷器二十三種共百四十六件是年南掌國入貢賜國王及正使等均照乾隆六年例十六年緬甸國入貢諭緬甸越在荒裔自前明嘉靖後職貢不通兹復専遣陪臣齎表闕廷嚮化奉琛具昭忱悃向來南掌等國入貢筵燕賞賚均照各國貢使之禮所有緬甸貢使到京一應接待事宜亦應照各國例以示綏懐欽此賜國王蠎段錦段各六閃段八青藍采段藍段素段紬羅紗各十王妃織金段織金紗織金羅各四段紗羅各六貢使采段六裏四羅四紡絲絹各二緬目四人每人采段三裏二絹一毛青布六象奴十有九名緬