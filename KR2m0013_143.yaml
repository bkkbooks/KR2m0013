部官往往推承辦武職而武職不諳律例且繫本地之人不免舛錯瞻徇嗣後奉天拏送偷採人參之犯不論已得未得十兩上下及私販者皆交盛京刑部會同將軍管轄威遠堡六邊侍郎府尹照例分别審理盛京工部一城垣天命十年自東京遷都瀋陽是為盛京天聰五年增拓盛京舊城周九里三百三十二步高三丈五尺厚丈八尺池周十里二百四步廣十四丈五尺闢門八康熙十九年築關城高七尺五寸周三十二里四十八步東南隅水柵二以通瀋水二十一年重修諸門城樓二十二年覆準凡在城基取土行車交與該將軍及盛京工部嚴禁三十二年諭盛京城垣關繫重大著工部侍郎一人前往會同該將軍盛京工部將應作何修理之處詳看議奏欽此遵旨議準修理城垣三百六十餘丈並於街道開溝以泄積水四十九年諭盛京城垣工程著遣在京工部堂官一人率領司官前往堅固修理欽此五十四年修理八門城樓並四角樓及內外城垣百餘丈乾隆十七年題準修理城垣八百餘丈於將軍五部府尹衙門選官分段監修並委官隨工察驗支用盛京戶部帑銀三萬餘兩一宮殿國初定凡宮殿歲時修理內務府專掌其事康熙十一年奉旨嗣後盛京宮殿有應修之處內務府會同工部擇吉修理又定凡采畫油飾需用顏料桐油及罘罳所用銅絲等項於工部移取部委官監視乾隆十四年重修崇政殿後房收貯法駕鑾駕鹵簿十七年重修盛京宮殿增設圍牆六十一丈五尺移取盛京戶部帑金千六百兩統歸戶部奏銷一壇廟順治十三年定凡盛京壇廟有應修之處即行估直修理一陵寢國初定凡修永陵於東一里外取土西南七里外燒甎西南四百里外燒石灰小石採於張家口碑石龍趺石取於盛京香爐山順治八年定凡修福陵於西五里外取土西南二十里外燒甎正南百里外燒石灰大石採於易州南山小石採於香爐山流泉湖屯碑石龍趺石自順天府運送又定凡修昭陵於西四里外取土南八里外燒甎南百里外燒石灰大石採於易州南山小石採於梨花峪香爐山瓢杓屯流泉湖屯碑石龍趺石自順天府運送是年福陵昭陵工成監造官各給以世爵仍各賞朝衣鞍馬其在工官役賞衣冠鞍馬白金有差十四年永陵工成分别在工久暫理事官各給世爵仍賞朝衣鞍馬其餘官役賞白金布匹有差又議準三陵官員兵丁匠役所住房屋有礙風水者悉令遷移康熙三十一年重建昭陵饗殿又定凡三陵采繪油飾需用顏料桐油及罘罳所用銅絲等項於工部移取四十二年覆準福陵應用甎瓦令欽天監委官前往指示無關風水之處取土燒造五十六年覆準永陵應用甎瓦令欽天監官前往同盛京工部侍郎驗看無關風水有好土之處建窰燒造雍正三年奏準福陵官山周圍設斥堠四所分委官兵守護八年奉旨恭建永陵西小河石隄石橋攔水􅄵並增建右廂房五間又奉旨恭建福陵順水石隄攔水􅄵又濬引河及左右引水小溝乾隆十五年奏準昭陵四面設斥堠守護如福陵之制各建屋三間十七年重修永陵啓運門紅柵昭陵西北角樓及懿靜大貴妃園寢一盛京公廨天聰六年建學宮於德盛門內殿三間㦸門三間廟門一座又建吏部於德盛門內街東吏部南戶部大堂三間司房九間案卷房三間班房四間儀門五間大門三間銀庫十有八門戶部南禮部大堂五間後堂三間司房六間六品官辦事房三間大門三間貯果房三間梨窖冰窖各一所朝鮮使館一所又建刑部於天祐門街西其南兵部又南工部順治元年改建工部於禮部之南大堂三間後堂五間左右司房八間儀門一間大門三間班房四間銀庫一間顏料庫三間熟鐵庫荒鐵庫大繩庫各四間線麻庫三間織造庫在懷遠門內共十有四間十四年建奉天府署於德盛門內街西大堂後堂各三間吏房六間住房十有四間儀門一間大門三間班房二間康熙三年重修刑部大堂五間南肅紀左司肅紀後司北肅紀前司肅紀右司各三間後堂三間儀門一間大門三間案卷房三間司獄司正房五間廂房一間大門一間監獄在城西南隅又建府丞署於天祐門內街西大堂五間住房八間吏房六間大門三間儀門一間署東建試院大堂三間住房五間東西考房各三間大門三間儀門一間街東建通判署大堂三間住房五間大門三間撫近門外建治中署大堂五間住房共十有六間科房五間大門一間署南建經歷署十有八間六年建承德縣署於懷遠門內街南大堂三間住房九間書吏房三間大門儀門各一間庫一間監獄六間又門外街南建倉一百二十七間署西建典史署大堂三間住房七間十三年重修吏部改為盛京將軍署大堂後堂各三間司房六間儀門一間大門三間庫一所倉在城內西南隅火藥庫在城外東南隅教場在城外東北隅三十年重修兵部大堂三間後堂五間司房六間大門三間儀門一間三十二年重修學宮增建崇聖祠三間明倫堂三間東西齊房各三間學署六間庫房六間大門儀門東西角門各一間一寺廟順治十三年定各處寺廟有應修理之處各照來文核明應用錢糧移文工部覆準之日興工修理康熙三十一年定各處寺廟采繪油飾需用顏料及罘罳所用銅絲等物於工部移取部委官監視一匠役原定四品官管下永陵窰匠六名瓦匠四名每年自二月初一日起至九月初一日止各給口糧米二十四石三斗八合鹽六十八斤十二兩永陵木匠四名鐵匠二名每名歲給四十日口糧米二石八斗三升二合鹽八斤三年給皮衣二領五品官管下黃瓦厰匠十有七名每名歲給朝鮮貢布三匹木棉二斤四兩六品官管下匠一百七十三名每名歲給銀六兩米三石五斗四升稗視米數每月給鹽五斤五旗匠人一百三名每名歲給銀六兩崇政殿壯丁六名家屬共三十口每口歲給米一石四斗一升六合稗視米數