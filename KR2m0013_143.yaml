body:
  text: 盛京戶部一官莊國初定興京附近官莊二十所每莊歲徵米九十石穀草四千束盛京附近官莊九十六所內二十莊每莊歲徵米百二十石穀草四千束餘七十六莊每莊歲徵米百二十石穀草千五百束芻草三千束各莊並徵線麻檾麻鵝雞等物鹽莊三所每莊歲徵鹽萬二千斤棉花莊五所每莊歲徵棉七百斤莊設壯丁十名牛六頭鹽莊加牛二頭共設領催八名承管應徵米鹽木棉等物按定數作為十分如缺不及一分莊頭免責缺一分鞭五十缺二分鞭八十皆令賠補缺三分枷兩月鞭一百交內務府當差承管領催各照各管定數作十分缺一分二分鞭責與莊頭同缺三分枷一月發為官莊奴僕專管官各照總管定數作十分缺不及一分罰俸半年缺一分罰俸一年缺二分降一級罰俸一年缺三分降二級調用盛京戶部侍郎亦照所管作十分缺不及一分罰俸三月缺一分罰六月缺二分罰一年缺三分降一級罰俸一年留任其額外多輸米一石鹽百斤棉十斤莊頭賞銀五錢積賞至五兩承管領催賞銀一兩如遇旱潦災傷委司官筆帖式勘驗被災每六畝免米一石棉五十斤若地畝全荒給莊頭口糧田種及耕牛草豆耕耘時屯丁及牛有闕每丁免米五石棉五十斤鹽五百斤每牛免米十石棉百斤鹽千斤又定屯丁逃亡移咨盛京將軍注册仍從戶部撥補牛倒斃動帑買給牛皮解交工部康熙四十年定興京等處官莊二十所一應差徭均歸驛站供應每莊增糧三十石歲輸糧百二十石五十八年定盛京戶部所管官莊百二十六所每年一莊牛倒斃不得過二頭每牛定價七兩如倒斃過多將該部堂司官管屯官一並從重議處五十九年定官莊所報米糧數目嗣後自京遣部院堂官一人會同盛京戶部監收雍正三年定寧錦廣三州縣官莊收貯米穀自本年以後掘地置窖盛貯其工料動支正項錢糧所用地畝照蓋倉之例將别處地畝補給八年定盛京戶部官莊百二十六所從前均繫按丁徵糧但糧米出自地畝嗣後將官莊編定等次停其按丁徵收內棉莊五所鹽莊三所並無别項差使均作一等糧莊其一百十有八所分一等十有二所每莊歲徵米三百八十二倉石二等二十所每莊歲徵米三百五十二倉石三等三十七所每莊歲徵米三百七倉石四等四十九所每莊歲徵米一百九十二倉石共徵米三萬二千三百九十一倉石除折糧存留供應三陵及各祭祀蘇麥米豆高酒並匠役牧場人口糧過往差役飼馬人丁口糧馬豆又需用雞鵝鴨卵茜草檾麻線麻羊草青草油柴炭席瓢刷箕帚木掀等項外餘悉交內倉收貯乾隆十二年定官莊額丁子弟例應分交莊頭給地耕種見在莊頭生齒日繁並無餘地可給而額丁內倉軍樓軍傳事人匠人趕車官丁等子弟均隨其父兄在城居住若不令當差恐遊逸成習按鹽莊每年所交鹽不敷公用由盛京內務府領用一萬三四千斤不等將此五項額丁子弟分隸鹽場煎鹽令歲輸鹽一萬四千斤作為定額專設領催一名司管束收納十六年定盛京戶部所屬官莊每年應交額糧內除原飼牧羣馬匹將稗子改徵黑豆四千八百八十五石二斗仍照舊徵收外其羊草人夫油炭席片等項折糧一萬一百三十七石八斗有奇每石準以二錢二分折銀交納免其徵豆運送一旗地康熙十九年定奉天地東自撫順起西至寧遠州老君屯止南自蓋平縣闌石起北至開原縣止共丈出荒甸地三十四萬八千八十五頃二十六畝除燒甎及打草甸馬場甸羊草甸地共萬九千三十五頃九十六畝實丈出三十二萬九千四十九頃三十畝分定旗界內地二十七萬六千三百二十二頃八十畝餘繫民界內地又定旗丁力不能開墾又復霸占者嚴察治罪二十四年特遣大臣督領盛京官兵至黑龍江分給牛種墾地九十頃有奇二十五年定錦州府鳯凰城等處荒地分撥旗丁給牛屯墾每十六丁內二丁承種十四丁助給口糧農器合民丁所墾共地一千四百七十九頃又定錦州府鳯凰城等處遣大臣三人司官八人前往會同盛京將軍戶部侍郎酌量屯墾二十八年諭奉天等處地方旗民雜處地畝隴界交連耕種者甚多旗地界內居民有力墾種者許其耕種照例徵收錢糧若旗丁有力開墾亦聽墾種不許互相攔阻欽此又諭奉天等處旗地民地所立界限不明著將各部賢能司官具題差往會同盛京侍郎府尹將旗地民地並牧場逐一確察各立界限詳議具奏欽此遵旨議準旗民互相墾種以致爭告不已嗣後旗丁不許在民界內墾種又定盛京所屬如有多餘荒地旗丁情願耕種者務將地名畝數呈明盛京戶部在各界內聽部丈給三十二年議準盛京旗丁所種地畝每地六畝歲徵豆一升草一束今將地畝丈量不論何項人均照八旗十四城所管地界交與協領城守尉徵收三十七年奉旨著停止差往種地嗣後不必具題如差往種地再行降旨三十九年定旗丁所種地畝交該管官徵收五十四年諭奉天地方旗民雜處生事之人及盜賊命案較前甚多必照旗兵駐防省分旗民分居之例方可無事亦與地方有益九卿議奏欽此遵旨議準旗民雜處年久暫停其般移嗣後有賣房者在旗界內之民房令其賣與旗丁若不照此遵行仍越界居住照侵奪例治罪五十五年定除見在旗民有情願互相調換房屋者即令般移居住外嗣後所勘旗界內房屋不許賣給民人賣買者各呈報該管官違者治罪又定旗丁開墾地畝令該管官出具保結呈報盛京戶部將墾過畝數於年終彚報戶部察核雍正二年定盛京旗丁所種地畝仍照舊例在何界內種地即將彼界協領城守尉為督催之官佐領防禦驍騎校為經催之官如有抗缺不交者督催官即拘拿治罪如有催追不完之數計分數題參四年定盛京旗地自康熙三十二年輸草豆以來未經核丈册籍舛錯旗民彼此爭告經年不絶將王以下至閒散宗室盛京所有地畝內管領莊頭壯丁捕牲人等姓名居住村落詢明某王府某閒散宗室之人行文八旗分别造册送盛京將軍戶部以便於核丈地畝之大臣會同稽察仍將丈過地畝若干輸納草豆若干造册具題察核又定盛京地畝令將軍戶部侍郎府尹會同差往丈量大臣將十四城界內旗地公同委賢能屬官勘丈其皇莊捕牲人三陵內佐領官兵屯莊執事人閒散人等千丁驛站臺上園丁戶禮工三部屯莊官丁僧道各項人等地畝率領各該管官公同勘丈務期詳悉淸楚丈完之日將丈過地畝數目造册送部倘有隱匿不淸之處發覺日將勘丈之官從重治罪五年定錦寧等州縣莊頭圈餘退出地畝照各州縣徵糧數目一例徵收七年定錦寧等州縣旗丁承種莊頭圈餘地畝額徵每多逋缺緣民官無懲責旗丁之例是以抗比挨延嗣後交與旗官追比以十分計算考成如有未完照地方官未完分數例處分乾隆元年定錦寧等州縣旗丁承種莊頭圈餘地畝每年額徵米穀每米一石折徵黑豆二石轉交錦州副都統酌撥牧養馬匹餘照例貯倉二年定盛京旗丁地畝應徵銀米各項並不按各屬地界就近催追率皆令該管州縣官督催以致遲緩積缺難淸嗣後十四城旗丁地畝照奉天民地按界催追令各該城守尉先將本界內何人地畝及承種各姓名逐一稽察明白其應徵銀米等項如業戶在本界居住者向業戶催納業戶住居别界即於承種之人名下催追準於業戶租息內扣除遇有典賣更易均就近呈報立案更名不行呈報者照例懲治督催承追各官分别考成一儲積康熙二十九年奉旨倉糧關繫緊要著盛京戶部侍郎稽察收貯米穀每年仍將出入數目報部又定奉錦二府地丁錢糧每歲剩銀五千餘兩解盛京戶部轉發錦州府等處城守尉酌量價直陸續買米其部官所收牛馬稅銀三千餘兩彙入外城稅銀亦酌價買米入盛京倉內每年出陳易新均交該將軍辦理三十三年諭積穀於百姓最有裨益聞天津鹽船由海口抵盛京三岔口只須六日將山東河南漕米截留一二萬石如何運至三岔口之處作速詳議具奏欽此遵旨議準將山東漕米截留二萬石自天津運至三岔口交盛京戶部收貯雍正三年定盛京存倉米豆自明年為始於靑黃不接之時照定例十分之三出陳易新酌量借給不願借耆聽其自便如三分之內有借給多餘米豆照時價糶賣秋後買補還倉五年奏準倉內米穀令盛京戶部侍郎會同府尹將軍於收糧時總計十四城九州縣見存米穀若干酌量備用應存貯米穀若干限定額數加謹收貯每年於靑黃不接時照存七糶三之例出陳易新其餘米穀同見在豆七萬三千五百五十石有奇草一百八十四萬八千一百五束飭令各該地方官按時價糶賣所賣銀交盛京戶部充餉並將應存米穀及糶賣餘剩米穀豆草數目並所賣銀數各若干一並分晰造册具題察核仍令侍郎不時稽察如該管官將存貯米穀那移侵蝕及將糶賣穀價以多報少等弊即指名題參乾隆十三年定奉天府常平倉額米六十萬石錦縣寧遠州各十萬石遼陽州廣寧縣各五萬石承德海城蓋平鐵嶺開原復州義州各四萬石寧海縣二萬石一廩給守衛陵寢國戚子孫至十八歲呈請當直守陵者據各總管保結移戶部題準每人月給銀二兩自京師來圍獵侍衛據內務府來文來收樺皮協領等據戶部來文往寧古塔採買黑狐皮貂皮據盛京將軍來文各給廩餼其買到狐皮貂皮同官貂皮解送戶部三旗馬羣牧副每人月給銀三兩牧人每名月給銀二兩守篤恭殿人守將軍衙門人本部聽事人守倉人巡庫兵禮部聽事人廚役飼牛羊人每名月給米一斗鹽一斤守庫庫尉每名歲給鹽三十斤取乳䝉古人日給米半升鹽一兩匠役自京師差來者每名月給小米一斗鹽一斤八兩穀米一斗二升豆一斗又每十名給滷水鹽三斤回時計抵山海關日期日給米半升在盛京者每名月給小米一斗鹽一斤據各衙門來文支給自京師來採蜂蜜領催等每名日給糙米二升鹽一斤足三十日停給入山採蜜人每名給三月行糧共米三斗鹽三斤麵一斗五升出山回日每名給一月糧共米一斗其領催等一半回京每名給十日行糧共米五升一半存留之人每名給十日坐糧共米二斗又登山躡尋掃雪鼠踪人給一月行糧米及麵各一斗鹽一斤回時照採蜜人例給一月行糧來染貂皮鹿皮人等每名日給粟米八合三勺新滿洲人等遷家口來者不限人數官給粳米餘人給糙米日各半升給至收穫一次時止所需鹽酒照戶口支領若撥地耕種豆地每六畝給豆種一斗穀地每六畝給穀米或黏高粱米六升據各將軍來文給發其不在盛京居住或隆冬遷來者别議加給盛京禮部採蜜屯長等入山坐糧回塗行糧據來文移寧古塔將軍給發又定西勒圖庫倫喇嘛歲給銀八百兩據內務府來文給發其運載車馬護送官兵行盛京將軍裝銀器具行盛京工部發給一賞給服物三陵廚役歲給衣服飼牲人丁歲給春秋衣服三年給冬裘本部匠役禮部廚役取牛乳人工部匠役年給衣服本部庫軍禮部校尉三年給冬裘官兵有虎皮送部者官給彭段兵給布虎皮解交戶部每年三陵應用及賞喇嘛虎爾哈庫爾喀等蠎段十五匹糚段十匹紅段二十五匹衣素五匹紬五十匹絹十匹紡絲五匹紗十匹毛靑布五千匹粗細布千匹紙六千二百張金銀箔十萬張茶葉八百六十斤銀硃五十斤移戶部取給一供給物用三陵需用心紅紙張鐙油木棉據該衙門來文給發盛京將軍各部及各城守尉邊口衙門僧録道録司等處需用心紅紙張鐙油木棉據各該衙門來文給發宮殿及各寺廟糊飾所用紙張油麵等物據該衙門來文給發一支給芻茭三陵所用生雉及犧牲牛羊取乳牛並照盛京禮部文按日給豆及高粱祭長白山牛