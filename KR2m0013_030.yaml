  text: 欽定四庫全書欽定大清㑹典則例卷二十七
  hash: sha256:882a0c68ef868ab43a36560170fc7ee66215aa1f375b596e1873900cbbfe3ecc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_030-1a, image: WYG0620/WYG0620-0526a.png}
body:
  text: 吏部考功清吏司逃人一緝捕逃人順治十一年題凖凡漢官赴任之後有本家人窩隱逃人者本官不知情免議將窩隱之人斷作窩家又議凖凡旗下人民雇覓逃人作工及賃房與住若有旗下人民作保者即將保人斷作窩家其雇覓之人免罪既繫有保人雇賃其地方十家長鄰右地方官免議若無保人留住過十日者雖繫賃房雇工仍照例治罪十三年題凖凡逃人過一關至二關拏獲或被首告拏獲者將不行盤獲誤放過關之官罰俸六月十四年議凖官員署任內如拏獲逃人失察逃人者皆各照所署之職議其功過十五年題凖州縣吏目典史等官拏解逃人十五名者加一級道員所屬地方拏解四十五名者加一級又題凖凡官員升任未離任之先若有窩隱逃人事發仍行議處若先有獲解逃人之功仍凖議叙十七年題凖凡勒限拏解逃人接任官將不獲情由豫行申明者免議如過限不行申報者罰俸六月如申報不獲之後被旁人仍在先報之處拏獲者將接任官革職康熙元年題凖凡移住别處窩隱逃人者將移住之處兩鄰十家長地方及地方官照例治罪四年議凖凡地方官唆令逃人指攀富室行詐情實者革職交部議罪又題凖凡逃人逃在地方如犯殺人等死罪止將逃人申解刑部如申解三名以下地方官每一名差有家産解役四名嚴加肘鎖申解如逃人至三名以上申報該督撫酌量增差護解如脫逃者照脫逃強盜例治罪其窩家地方官功過照常例議處五年覆凖凡各省總督順天府奉天府尹逃人功過皆免議七年題凖凡往各省駐防旗下官員窩帶逃人者革職八年題凖凡逃人攀有窩家行文地方官提解具文申報無有復行文巡撫詳察仍具文報稱無有後若窩家仍在彼處被旁人出首是實者前報無有之地方官并巡撫照失察逃人例處分十年題凖凡失察逃人題參如繫隔省拏獲逃人或被本主及旗下人拏獲逃人者將巡撫以下吏目典史以上題參若隔府拏獲逃人繫别道員所屬者將道員以下典史吏目以上題參若繫一道所屬者將知府以下典史吏目以上題參若隔州縣拏獲逃人者止將州縣官及典史吏目題參又題凖凡州縣吏目典史等官失察逃人一名者降二級調用知府及直隸州知州所屬地方二年內有一官失察逃人者罰俸一年兩官失察逃人者降一級留任三官失察逃人者降二級調用道員所屬地方二年內有一官失察逃人者罰俸九月有兩官者罰俸一年三官者降一級留任四官者降二級留任五官者降三級調用巡撫所屬地方二年內有一官失察逃人者罰俸六月有二三四官者仍罰俸六月五官以上者降一級留任鹽場失察逃人將運使照道員例分司照知府例鹽場官照典史例在京錢局失察逃人該管官照知府例外省錢局失察逃人布政使照道員例錢局同知照知縣例窰廠中失察逃人將該管官照知府例五城地方失察逃人兵馬司掌印指揮照知府例副指揮吏目照知縣例同知通判有捕盜職任者各照掌印官例處分凡官員干繫逃人事件處分若有加級紀録皆凖抵銷又題凖凡地方官於所屬地方如不設立十家長不給木牌稽察逃人者將地方官降一級留任又題凖凡州縣官申解逃人每一名差有家産正身解役二名押解如所差正身解役不行押解私自轉交别人押解或將逃人疏脫者將僉差不慎之地方官罰俸一年又題凖凡地方官將實在逃人指稱民人保結釋放之後或被本主識認或被旁人出首若果繫逃人將不行詳察取保之官革職又題凖凡地方官拏獲逃人即行解部如監禁遲滯過一月者將該地方官革職如一月內不能察明申解者豫行申報展限又題凖凡地方官將未離原籍土著之民作逃人拏解者降一級留任又題凖凡官員因逃人降級留任後若拏獲逃人足加級之數者凖復還所降之級不足加級之數者不凖叙各該管上司之功其鹽運使並管內外錢局窰廠等官五城兵馬司官亦照此例又題凖凡逃人無主識認者地方官功過不議至如面上刺字無主識認之逃人窩家及地方官功過仍照例察議又題凖凡父母帶逃時十五歲以下之子女如同父母拏獲解來者地方官不記功别行拏獲解來者照隻身逃走十五歲之子女一例將地方官記功若被伊主認獲及旁人出首者將失察之地方官及窩家仍照例察議十二年題凖凡逃人之主不許私自差拏逃人凖其在部控告行提或首告該地方官拏解若違例私自往拏地方官及窩家之罪無庸議逃人之主繫官罰俸一月又題凖凡逃走情實者凖遞逃牌其在莊屯居住不曽逃走者若遞逃牌其主繫官照違令律議處十二年題凖凡旗人民人將房地賃與逃人如有保逃人之人將保人作為窩家如無保人或有引進之人將引進之人作為窩家既有保賃引進之人其鄰右十家長地方及地方官照例免議如無保人及引進之人將房地之主仍作窩家或將房地已賣移往他處居住去後事發將房地之主斷作窩家其原處之兩鄰十家長地方及地方官照常治罪又議凖凡公主等家下買賣人及莊屯人在京城居住之人並所屬正户之人逃走者窩家地方官皆照常例議其口外蒙古之逃人拏解者咨送理藩院歸結地方官功過無庸議十三年題凖不肖官員覓買旗下奴僕帶去謊充逃人申解邀功者革職拏問如外省册報或並無逃人揑造空名移送邀功者亦照此例十五年議凖凡逃人被别處及旁人拏獲之後窩家雖將逃人之妻子出首仍照例斷作窩家地方官照例議處若未被他處及旁人拏獲之先窩家將逃人妻子出首者窩家免罪地方官仍記功又議準凡府州縣衛所官行文提取逃人窩主及窩主之妻子家産人口並干連之人及空文行詢百里以內者往返限十日內解至如不到又照此定限十日行催一次亦照此限內解至二百里以內者限十五日解至三百里以內者限二十日解至四百里以內者限二十五日解至五百里以內者限一月內解至六百里以內者限一月零五日解至七百里以內者限四十五日解至九百里以內者限五十日解至千里以內者往返限兩月解至如不到各照定限行催一次亦各照限內解至千里以外百里者往返加四日扣算如行提逃人窩家並牽連人犯及空文行察違此兩次定限不解不報者罰俸一年二十五年議準州縣等官拏解逃人三十名者加二級知府及直隸州知州拏解逃人三十名者加一級六十名加二級道員所屬地方有拏解逃人九十名者加二級於此數多者各照數遞加巡撫所屬地方拏解逃人二百名者紀録一次四百名者加一級於此數多者亦照數加級紀録同知通判吏目典史自行拏獲逃人各照掌印官例五城兵馬司掌印指揮照知府例副指揮吏目照知縣例鹽運使照道員例分司照知府例管鹽場大使照典史例內錢局拏解逃人將所管之官照知府例外省錢局拏解逃人布政使照道員例錢局同知照知縣例窰廠拏解逃人者將所管之官照知府例將功一年一敘若不至加級之數者又并一年議敘若仍不足者將前一年之功截去止留一年之功於次年接算不準三年合算又議準兵馬司正指揮拏獲逃人三十名副指揮吏目拏獲十五名各加一級如有特交緝拏之重犯並逃人能照數拏獲者準其加級若止將逃人拏獲而不能拏獲要犯者不準加級若知繫逃人要犯不行嚴拏而縱容在地方者事發題參照藏匿重犯例革職又議凖凡旗下人買民皆應帶令伊屯莊居住或帶回京來若買後不行收回違禁令在彼處居住者將買主繫官容留一家者罰俸一年兩家者降一級三家者降二級皆留任四家者降三級五家者降四級皆調用容留六家以上者革職該州縣衛官不行察逐容留一家居住者罰俸六月兩家者罰俸一年三家者降一級留任四家者降二級調用五家者降三級調用六家者降四級調用六家以上者革職道府所屬地方容留一家居住者罰俸三月兩家者罰俸六月三家者罰俸九月四家者罰俸一年五家者降一級六家者降二級皆留任七家者降二級調用八家以上者革職督撫所屬地方容留五六家者罰俸六月七八家者罰俸一年九家十家者降一級十五家以上者降二級皆留任同城知府照州縣官處分不同城知府照道員例處分又題凖凡旗人民人首告逃人該管官即拏解者將該管各官免議如將實在所有之逃人謊稱無有不行拏解或被别衙門察知或被旁人首告或被他處拏獲控告之時該逃人在脫逃地方情實將該巡撫罰俸六月該管各官照失察逃人例議處又行提逃人之妻謊稱病故空文回覆者革職不行詳察轉申之知府降一級調用至逃人在脫逃地方所娶之妻非繫從家帶逃若以有謊稱無空文回覆者將地方官降一級調用轉報之知府罰俸一年又議凖拏解逃人及窩犯者地方官嚴加肘鎖每一名差正身有家産解役二名押解如不差正身有家産解役及少差解役以致疏脫或解役同逃人逃走並不加肘鎖脫逃者將該地方官降一級調用如逃人一名差有家産正身解役二名押解嚴加肘鎖中塗犯人疏脫或同逃人逃走者地方官免議如解逃人無護送之牌或將護牌及部文遺失中途脫逃禀知州縣不行追趕或因解逃文書擦損不收或行拏之部文已到稱為未到或逃人雖未脫逃但違例止差解役一名者罰俸六月其逃人未經審實在塗疏脫者免議俟獲日再議至起解逃人不加肘鎖致令在路塗搶奪者罪在解役原起解官免議又議凖逃人不即轉解以致脫逃者革職至凡拏獲逃人著令遞解仍將批文內限定日期若逾限者將逾限之地方官罰俸一年又議準凡解送逃人若有中塗患病者原解役即報地方官驗明許其暫留撥人看守延醫調治報明該管上司報部存案俟病愈即轉解前塗如有將無病逃人謊報有病故為留滯將實在患病逃人不肯留養或留養而不撥醫調治以致死亡或病愈後不即行轉解者將任其謊報故為留滯及病愈後不即行轉解之員照遞解違限例罰俸一年將不留養患病逃人以致病故之員照軍流等犯不留養以致病故例按人數分别處分又議準凡官員將别官拏獲之逃人謊報繫伊拏獲或將伊衙役拏獲之逃人謊報同别縣拏獲或奉部行提之逃人謊報未奉部文之先已經拏獲者皆降二級調用如將逃人文册違限不解報稱齎送者罰俸一年或將所獲之逃人不行解部私自釋放者革職至凡窩逃之家産解送一半隱留一半不解者將地方官罰俸一年或將窩家未休之婦稱繫休離回覆者亦照此例又議準凡糧船有窩隱逃人者將失察之押運文職各官皆罰俸九月又議準官員將應赦逃人誤行刺字者罰俸一月雍正二年議準州縣拏獲逃人詳報巡撫請咨遞解該巡撫於每年四月內將各州縣拏獲逃人數目核實造具清册二本一本彚送刑部察核一本彚咨本部備案俟刑部察明咨部照例議敘七年遵㫖議準旗下三品以上大員之家人及王公等之辛者庫即府屬管領人等有犯命盜重罪脫逃者該衙門察拏之時即行知㑹本主協同緝捕如一年限滿不獲令該衙門即行題參並聲明此案脫逃旗下凶犯協緝之家主繫何職銜該部即將協緝不力之家主罰俸一年若繫各王公等辛者庫人將辦理府屬事務官員亦罰俸一年其各該管王貝子貝勒公等各罰俸一月未獲逃犯仍令照案協同緝拏乾隆三年議凖逃人逃在地方居住在六月以內者免議六月以外地方官不行察拏鄰右窩家等不行出首或被逃人之主控告或被旁人出首被獲者將知州知縣吏目典史等官降一級留任十家長地方鄰右窩家照律責懲若過一年地方官仍未拏獲窩家鄰右等亦不行出首或被逃人之主控告行提或被旁人出首者每一名將失察之知州知縣吏目典史等官降二級調用十家長地方鄰右窩家照例治罪如不知情之窩家免議又議準地方官明知逃人不行拏解而縱容居住者照藏匿重犯例革職四年覆準理事衙門所轄旗莊地方如有屯莊户口不清及入官人口借名贖身潛匿境內未經察出者將各官照脫漏户口律議處如旗人有犯一切賭博私燒私宰逃盜匪類不法等事其失察之該理事丞倅如與州縣官同城駐劄失於緝拏與地方官一例處分如與州縣非同城有旗人不法等事失於緝拏照該管知府例分别議處八年覆準直隸近京五百里以內旗民雜處旗人居住頗難物色設有失察與外省並無旗人居住之州縣一例處分殊非因地制宜之義嗣後近京五百里以內旗民雜處之州縣文武各官如遇失察逃人在一年以內者應請免議若失察已過一年者降一級留任過二年者降二級調用其明知故縱者仍照乾隆三年定例遵行至古北口外四旗承德等五廳旗民雜處實與近京州縣無異亦照此例分别寬減雜犯一賭博康熙十五年議凖凡失察民人賭博之司坊官每案罰俸一月至於地方內有犯賭博二次者將巡城滿漢官各罰俸一月雍正四年議準官員無論賭銀賭飲食等物有打馬吊鬭混江者及與屬員鬭牌擲骰為樂者皆革職治罪永不叙用至官員賭博令該管上司及督撫不時稽察如官員犯賭而該管上司及督撫徇庇不行揭參或被旁人告發或被科道糾參將該管之上司督撫皆照徇庇例降三級調用凡稽察官員賭博縣屬職官責之知縣府屬職官責之知府知府之上責之司道司道以上責之督撫如明知屬官犯賭不行揭參别經發覺者將專責之員仍照定例降三級調用如止繫失察屬官犯賭繫同城者將專責之官降一級留任不同城者罰俸一年其已經揭參者免議又議準衙門書役犯賭本官自行察出申報者免議失於覺察者罰俸三月如明知賭博不行察究别經發覺者將本官罰俸一年若别衙門書役犯賭既已察出而瞻顧同寅情面相為隱匿後經發覺者將瞻顧情面之員亦罰俸一年又議準凡開鵪鶉圈鬭雞坑蟋蟀盆並賭鬭者照開局賭博例治罪其該管官亦照開局賭博之該管官員例議處又議準民人販賣紙牌骰子地方官不嚴行察拏一經發覺將失察之地方官罰俸三月七年遵㫖議凖凡拏獲賭博其製造賭具之家審明確有證據出於某州縣若失察已過半年别經拏獲將該州縣并典史巡檢吏目等官皆照溺職例革職知府直隸州知州捕盜同知通判直隸州州同州判等官皆革職留任督撫司道等官各降一級留任如失察未及半年别經拏獲該督撫於劾參文內聲明皆準免其議處該上司未及半年者亦準免議如製造賭具不過半年即能實心稽察拏獲者州縣典史吏目等官加二級知府捕盜同知通判直隸州州同州判等官加一級督撫司道紀録二次若失察已過半年雖經拏獲功過僅足相抵止應免其失察處分不準送部議敘倘境內有將牌版藏匿並舊製賭具存留在家該地方官在任半年以上不行察出降一級調用又議凖凡拏獲賭具照拏獲私鑄例文官拏獲免同城武職處分武辨拏獲亦免同城文職處分接壤鄰邑拏獲亦免失察地方官處分如隔屬州縣並非交界接壤者仍將失察之該地方官議處至本縣有製造賭具之家經别縣訪聞差役拏捕而本邑官差役協同拏獲或本縣有製造賭具之家攜往别邑販賣經本邑訪聞差役往拏而彼邑官差役協同拏獲此等協拏緣由令拏獲之員申報上司該督撫察核得實即於咨疏內逐一聲明始免本地方失察處分鄰邑協拏之員一起凖豫紀録一次二起紀録二次三起紀録三次四起加一級鄰邑拏獲賭具亦照此例議敘該管上司功過相抵不準議敘若並未協同拏獲希圖規避失察處分揑稱協拏將揑飾之員照規避例革職扶同揑報之州縣並扶同隱飾之知府皆照徇情例降二級調用司道並不覺察照不據實察報例罰俸一年督撫照不行詳核例罰俸六月如該管知府據詳轉報並非有心扶同隱飾者將知府照不據實察報例罰俸一年如本境有造賣賭具之人該州縣平日漫無覺察被知府以上等官差役拏獲者將該州縣仍照失察例議處拏獲之知府以上等官照本例議敘後官拏獲造賣賭具之人察明前任官如失察未及半年離任者將前官免其議處如失察已過半年仍將原失察製造賭具之地方官照例議處至拏獲之後官其到任在半年之內或因賭博發覺究出見造之賭具或繫舊存之牌版刷印不過半年即能拏獲者皆準豫議敘其該管上司令該督撫核明到任離任日期於咨疏內聲明分别議處議敘十年議準凡失察賭具之員該督撫於題參疏內將該員先經拏獲賭具幾案已經議敘之處聲明由部再加察核從前止有拏獲議敘一二案者仍照例革職外若曽經拏獲議敘至三案以上者將該員議以革職留任俟三年無過題請開復如三年內有再犯失察賭具者仍行革任失察之州縣既因有拏獲議敘之案議以革職留任則此案失察之上司亦應稍為寬減應將知府降三級留任司道督撫各罰俸一年十二年議準失察賭博各員經部內議處時核明該員從前拏獲賭具議叙之加級紀録無論幾案悉行注銷如該員已逾數任後有失察賭博之案將前任內拏獲賭具議敘之紀級一并注銷其該管上司除因所屬别員拏獲賭具議敘之紀級毋庸注銷外如因失察賭博之屬官從前拏獲賭具同案議敘之紀級亦應盡行銷去若屬官失察賭博時或該上司先已離任或該員調任别省其失察之處已與原上司無涉所有該上司從前因該員議敘之紀級免其注銷至上司親身失察賭博仍將從前所有自行拏獲賭具議敘之紀級並因屬官拏獲賭具議敘之紀級盡行銷去其失察製造存留販賣賭具等案皆照此例行十三年議準凡拏獲賭具除該犯製造未及半年者仍照例議敘外若製造已過半年揑稱在半年之內及舊存賭具揑稱新製者將揑詳之地方官及轉報之各上司皆按其議敘之加級紀録分别議處如例應議敘加二級者因其揑報即降二級調用例應議敘加一級者因其濫行轉報即降一級調用例應議敘紀録二次者因其不加詳察即罰俸一年其各該上司中有能將揑報情由察出揭參者除揑報之員照例議處仍核明本案拏獲賭具如該上司例應議敘即將參揭之上司照例議敘如例不準議敘者因其察出揭參亦照功過相抵例免其議處至新任署任官拏獲賭具在半年以內或為失察已過半年之前任官揑詳未及半年察出除該員本任內拏獲賭具不準議敘外仍照朦溷造册例降一級調用若上司未經察出知府直𨽻州知州等官照不據實察報例罰俸一年司道照不行詳察例罰俸六月如上司已經察出者免議同城文武各官拏獲賭具繫文職首先訪緝者將文職照例準其加二級協拏之武職紀録二次繫武職首先訪緝者將武職照例準其加二級協拏之文職紀録二次即同在文職武職中此官首先訪緝彼官協同緝拏亦照此例分别議敘該管各上司繫文職首先訪緝即將文職之上司議敘武職首先訪緝即將武職之上司議敘其協拏各官之上司無庸議敘又議準拏獲賭具除拏獲之地方官於本案議敘外其該管各上司無庸隨案并敘如該上司所屬地方一年內並無失察製造賭具及舊藏賭具販賣賭具與失察賭博等事準其將所屬拏獲賭具之案於歲終彙册報部核明與例相符知府直隸州知州同知通判等官每案照例加一級司道督撫每案照例紀録二次若該上司所屬地方一年內有一案失察者將别案拏獲賭具槩不準議敘如所屬有失察等案該上司皆能自行察出者將察出之上司按其拏獲起數仍照例議敘倘上司因所屬拏獲賭具希圖議敘將别案失察等案通同徇隱不報别經發覺者即將徇隱之上司照徇庇例議處乾隆四年奏準外省官員失察賭博照司坊官失察賭博之例每案罰俸一月其同城文武官員拏獲賭博亦援照同城拏獲賭具之例免議又奏準京城內文武各官分管地方亦照外省同城拏獲賭具之例凡京城內外地方有犯賭博如該管文官拏獲者免該管武辨處分武辨拏獲亦免該管文官處分其拏獲製造賭具之案亦照此例辦理又奏準地方有描畫紙牌將失察之州縣照地方官失察賭具原例減等降二級調用知府直隸州知州同知通判降二級留任督撫司道罰俸一年至描畫已成之牌出境販賣仍照販賣賭具例罰俸三月或存留在家仍照存留賭具例降一級調用其拏獲描畫紙牌之地方官仍照拏獲製造賭具原例議敘五年議準京城製造賭具之家該管官及該管上司失察未及半年别經拏獲皆準免其議處若失察已過半年别經拏獲本處未經差役協拏仍照例議處一官員犯姦康熙二十三年議準官員姦家下有夫之婦者罰俸六月雍正三年奏準職官姦職官妻及職官姦軍民妻者皆革職治罪一禁止邪教康熙十四年奏準官員該管地方有愚民自稱為神為佛不能察緝者降二級調用或不能禁止邪教以致聚衆張旗鳴鑼者降一級調用如給與此輩執照告示者革職該管官降一級調用督撫罰俸一年如有愚民創建廟宇不能察禁反給告示者罰俸一年二十五年奏準地方內有迎神進香擊鼓鳴鑼聚衆張旗等項肆行無忌倡衆為首者若該管官不行察拏繫民將司坊官府州縣官每案罰俸半年五城御史布按司道每案罰俸三月總督巡撫每案罰俸兩月若繫僧道將該管僧道官革職乾隆五年議準地方有頑民倡設邪教附和邪術煽惑聚衆以致釀成不法將平日漫無覺察之該地方官革職該管上司降二級調用督撫降一級留任一禁止聚衆康熙五十三年題準凡有司牧民之官平日失於撫字激變良民因而聚衆者仍照例治罪外其刁惡頑梗之輩假地方公事聚衆聯謀抗糧搆訟辱官塞署或有寃抑不於上司控告擅自聚衆至四五十人者地方官與同城武職無論是非曲直協同擒拏解送上司秉公審究若不將實在為首之人擬罪濫行指人為首事發將承審各官革職治罪其該地方文職不能彈壓撫恤以致百姓糾衆妄行者皆照溺職例革職其該管之府道徇庇不即申報者令該督撫嚴察題參照徇庇例議處如督撫不行題參事發將該督撫亦照例議處又議準地方如有豪強之人窩養凶惡之徒作為爪牙該地方官不嚴拏詳報縱容隱匿者照溺職例革職該督撫徇庇不行題參將督撫照徇庇例降三級調用雍正元年議準地方有歃血訂盟結連土豪及衙役兵丁為害良民據鄰右鄉保首告地方官如不準理又不緝拏或致蜂起為盜虜掠橫行將不行準理又不緝拏之地方文武各官該督撫題參革職治罪其平時失察逮首告之後不自隱諱即能擒獲之地方官免其議處二年議準地方如有借事聚衆罷市罷考毆官等事其不行嚴拏之文武官辨皆照溺職例革職七年議準地方光棍潛往京師流寓無定其現在拏獲地方自難辭徇庇失察之咎但從前或久居别坊適值新遷發覺則或以一二日失察驟罹參處而容留日久反得脫然不免寃仰僥幸之處嗣後拏獲光棍務得新舊寓處逐一訊明分别處分十三年覆準城市鄉村有深夜懸鐙當街演劇者應責成該地方文武各官力為嚴禁倘該地方文武各官不實力奉行照失於覺察例罰俸一年一偏信地師雍正十二年覆準民間有將已葬棺槨依禮改葬者聽其自便外其有偏信地師之說無故改葬地方官勘明詳報須究出地師不得隱諱寬縱如有不行實力究治者經上司察出將該地方官照不行察出訟師例罰俸一年禁獄一禁獄不嚴康熙六年題準獄官防範不嚴以致斬絞人犯執持鐵器等物在獄傷人者如未經出獄降一級調用該管有獄官罰俸一年九年議準官員將斬絞人犯越獄脫逃隱匿不行申報或不行羈禁準人取保以致脫逃者革職或發到收監之犯不收自監推付别衙門以致脫逃者降四級調用如該管上司不據實具報者降二級調用又題準官員將斬絞人犯在獄不加杻鎖以致自盡者降一級調用上司不據實申報者罰俸一年如已加杻鎖自盡者免議又題凖督撫所參貪劣官員委官看守如踈忽看守以致自盡者將看守之官罰俸三月十四年議準反叛斬罪人犯越獄不論名數多寡將獄官革職拏問該管有獄官亦革職戴罪勒限一年督緝全獲開復逾限不全獲者革職又議準凡巨盜斬絞重罪人犯越獄者不論名數多寡將獄官革職拏問該管有獄官革職戴罪勒限一年督緝全獲者開復逾限一名不獲者降二級調用二名不獲者降三級調用三名不獲一名者革職其越獄人犯交與接管官亦勒限一年督緝如能全獲者不論俸次即照其應升之官升用如一名不獲者罰俸三月二三名不獲者罰俸六月四五名不獲者罰俸九月六名以上不獲者罰俸一年未獲逃犯照案緝拏又議準笞杖徒流等犯越獄者不論名數多寡將該管獄官革職留任戴罪勒限一年緝拏全獲開復逾限不獲仍照例革職逃犯交與接任官勒限緝拏該管有獄各官住俸戴罪勒限一年督緝全獲者開復逾限一二名不獲者罰俸一年三四名不獲者降一級調用五六名不獲者降二級調用七八名不獲者降三級調用九名十名不獲者降四級調用越獄人犯交與接管官亦勒限一年緝拏全獲者不論俸次即照其應升之官升用如一名至四名不獲者罰俸三月五六名不獲者罰俸六月七八名不獲者罰俸九月九名十名以上不獲者罰俸一年未獲逃犯照案緝拏又議準凡官員將逃犯正在緝拏之間或經别案降革及丁憂離任者責令接管官再限一年緝拏前官全未拏獲接管官全獲者不論俸次即照其應升之官升用如前官止獲一二名其所餘逃犯接管官如能全獲者不論名數多寡紀録一次逾限不獲仍以罪之輕重名數多寡照接管官例議處其原參有名戴罪督緝官員年限之內未經全獲照名數降級調用如有紀録加級抵銷仍留原任者應再限一年緝拏如不獲照接緝官例分别議處全獲者原繫本任內逃脫人犯不準議敘又奏準官員將别案緝獲賊犯作此案越獄之犯謊稱被獲被斬縊死溺死者皆革職司道府等官不行確察遽行轉詳罰俸一年督撫不行詳察具題罰俸六月至署事官在署事任內有越獄之事仍照見任官例處分外凡虛革虛降官員未滿一年之限正在緝賊之間離任者皆照離任官例罰俸一年又議準官員將越獄逃犯即行拏獲或被官兵追迫投水而死或自盡者皆免其處分又議準斬絞重犯越獄因公出境該管有獄各官非繫親身在任越獄者初參應免其處分仍限一年督緝如逾限一二名不獲者罰俸六月三四名不獲者罰俸一年五六名不獲者降一級調用七八名以上不獲者降二級調用笞杖徒流等犯越獄因公出境官員初參免其處分亦限一年督緝如逾限一二名不獲者罰俸三月三四名不獲者罰俸六月五六名不獲者罰俸一年七八名以上不獲者降一級調用至反叛人犯越獄因公出境官員仍照承緝官例處分二十五年題準貪婪革職官員並提問之犯不監候具題完結縱回原籍或聽其散處脫逃者皆革職逃犯交與接任官照越獄例限一年緝拏如解餉官失銀縱放脫逃者那用錢糧官未經追完縱往他處者皆降一級留任限一年緝拏如限內不獲降一級調用二十九年覆準刑部滿漢司官每年各委一人一同提牢輪直㸃驗若不將監內嚴行約束以致閒雜人等出入行走將提牢滿漢司官司獄官皆照縱容外人入獄律議處雍正三年覆準知府及直隸州知州於所屬州縣內有笞杖徒流等犯越獄一二案者罰俸六月三四案者罰俸九月五六案以上者降一級限一年催緝限內全獲準其開復逾限不獲再限一年如不獲照所降之級調用又議準凡擬死罪監候人犯之親屬許於每月初二十六入監探視將見在監中重犯逐一詢明父母妻子適親兄弟姓名年貌登記號簿其各省解京及刑部陸續審結各重犯於未入監時即行訊明注册交付獄官遇放家口日期詳加驗對放入至未結案之犯其親屬人等一槩不許入監如不應放之人朦溷放入察出將管獄官照縱容外人入獄律議處又議準書辦皀𨽻以及官員家僕有擅自出入監所私通消息教令串改口供情弊者提牢官司獄立即拘拏回堂將書吏責革家人之主一並議處若不行拘拏被察出者提牢官司獄官皆照縱容外人入獄律議處四年遵㫖議定凡斬絞重犯越獄該管官員除赴部引見委解錢糧奉調審理案件承辦要務因公出境以及奉調入闈者該督撫即於疏內聲明仍照因公出境例議處外至該管官或委署鄰邑或檄調赴省等項此等公出斬絞重犯越獄脫逃者仍照越獄定例處分至軍流徒罪等犯與斬絞重犯有間該管官員或因公出境一時防檢偶疏以致越獄脫逃該督撫亦務將該員於某月日因何事公出何處逐一聲明送部察核仍照因公出境例議處如有並非因公出境該管上司瞻顧情面受屬員請託揑稱因公出境掩飾具奏將該管上司照徇情例降二級調用該管有獄官照規避例革職七年議準州縣監內斬絞重犯越獄該管知府直隸州知州有一二案者罰俸一年三四案者降一級五六案以上者降二級皆限一年督緝全獲開復如逾限不獲一二案者再罰俸一年逃犯照案緝拏三四五六案者照所降之級調用未獲逃犯交與接任官照案緝拏督撫按察使有一二案者罰俸三月三四案者罰俸六月五六案以上者罰俸一年皆限一年督緝逾限不獲一二案者罰俸六月三四案者罰俸一年五六案以上者降一級留任逃犯照案緝拏全獲之日凖其開復又議準越獄重犯承審各官務究賄縱實情若能究出免其從前失察犯贓處分如不嚴究實情照未經審出贓銀例降三級調用又議準獄官及有獄各官務須常詣監所察視如不親視以致監牆傾圯吏卒疏忽者雖無越獄事犯亦將獄官照禁役防範不嚴例降一級調用該管有獄官罰俸一年又議準獄官於獄內重犯能董率提牢吏役嚴加防守除一二名外一年內有三名以上重犯並無疏失者準其紀録一次每三名加一等十五名以上者加一級再有數多而並未疏失者以次遞加又議準重犯越獄鄰境文武正雜等官有能拏獲者按其名數照拏獲盜首例一月內拏獲者每一名準其加一級再紀録一次一月外拏獲者每一名加一級又議準管獄之司獄司不許濫行差調吏目典史除捕務外亦不許濫行差調如有濫行差調上司照虛懸城守例議處其吏目典史如遇緝限届期例當降革謀差展限者將該員照規避例革職至於官員署事任內有重犯越獄脫逃獄官有獄官皆照見任官分别議處勒限緝拏如未經限滿即行離任者仍照離任官例罰俸一年十二年議準未經擬定罪名人犯越獄脫逃定限四月題參疏防該督撫先於限內將所犯事由與應擬何罪之處逐細嚴察如取供已明衆證有據雖經脫逃而罪無可疑者即於疏防文內聲明該犯應得罪名以憑照例議處如果繫監候待質供證未確罪難懸擬者亦於疏防文內據實聲明該犯罪既未定不便竟照斬絞重犯越獄之例從重議處應照軍流等犯越獄例初參不論名數多寡將獄官革職留任戴罪勒限一年緝拏全獲開復逾限不獲照例革職逃犯交與接任官勒限緝拏該管有獄官一名至十名皆住俸戴罪勒限一年督緝全獲開復逾限一二名不獲者罰俸一年三四名不獲者降一級調用五六名不獲者降二級調用七八名不獲者降三級調用九名十名不獲者降四級調用未獲逃犯交與接任官勒限一年緝拏如越獄至十一名以上初參將該管有獄官革職戴罪限一年督緝全獲開復限滿不獲仍照例計名數多寡分别議處其逾限未獲十一名以上者革職未獲逃犯亦交與接任官勒限一年緝拏至越獄逃犯有罪無可疑仍揑稱罪難懸擬者將該管有獄官照規避例革職該管上司不行確察具報者知府直隸州知州照失於覺察例罰俸一年轉詳之司道罰俸六月督撫罰俸三月若受屬員請托代為轉報者知府直隸州知州照徇情例降二級調用轉詳之司道降一級留任督撫罰俸一年乾隆三年覆準各省州縣監獄繫吏目典史管理如州縣監獄遇有越獄之案其人犯輕重將吏目典史皆照獄官定例議處如三年之內並無疏失亦照獄官定例議敘四年奏準越獄疏防案件該管有獄官以及該管之各上司如繫帶印公出者仍照定例察議若繫交印公出該督撫亦於疏內聲明到部免其承緝處分無庸限緝回任之後照接緝官察議其無接緝處分者免其議處未獲逃犯照案緝拏其署事官照承緝官議處又議凖軍流徒罪人犯在獄傷人管獄官降一級留任有獄官罰俸九月若繫笞杖人犯與干連應質之人散寄外監者獄官失於防範以致毆傷人命者罰俸一年該管有獄官罰俸六月一淹禁康熙九年議準官員凡承審案件將正犯於限內並不取供審理遲延一案之內監斃一二人者罰俸六月三四人者罰俸一年五六人者降一級留任七八人者降二級調用九人以上者革職如將干連之人監斃一二人者罰俸一年三人者降一級留任四人者降二級調用五人者革職若上司不據實題奏降二級調用至逾限不行審結將正犯監斃雖已取口供亦照限內不取口供致死例處分若將干連之人監斃一人者降一級調用二人者降二級調用三人以上者革職上司不據實題奏者降二級調用若限內不能完結再行展限仍不能定有淹禁致死者亦照限內並不取供監斃例處分又議準官員將重罪要犯致死以圖滅口者革職提問如上司不據實具報降二級調用十一年題準承問官將正犯取有口供於限內不早行題結監斃一二人者免議三四人者罰俸三月五六人者罰俸六月七八人者罰俸一年九人十人以上者降一級留任其事結具題之後將人犯監斃者免議十六年覆準凡遇赦詔到日將應赦人犯即時釋放如將應赦人犯仍濫行監禁或應放人犯不即釋放遲誤十日者將該管官革職其有未經法司核覆明白者該法司核明文到之日不即釋放亦革職該管上司不行詳察揭參者皆降二級調用督撫降一級留任若有情罪可疑該管官不於一月內詳明奏請違限一月以上者降一級調用該管上司不行詳察揭參者罰俸一年督撫罰俸六月違限二月以上者該管官降二級調用該管上司降一級留任督撫罰俸一年違限三月以上者該管官革職該管上司降二級調用督撫降一級留任如有上司督撫遲延者將上司督撫亦照此例處分該管官免議二十二年議準在京凡問刑部院衙門承審官員將問理案件於限內並不取供審理遲延逾限雖取供不行審結及雖限內取録口供不速行題結以致犯人並牽連之人監禁斃命或羈禁門監淹斃者應照一案所斃人數將承審司官皆照外官之例處分若堂官不據實題參者照督撫之例處分二十五年議準司道府官未奉督撫行文遽將無罪之官擅自拏禁並不至於拏禁之官拏禁者革職四十五年覆準各府州縣等問刑衙門原設監獄除重犯羈禁外其餘干連輕罪人犯令地保保候審理如有不肖官員私設倉鋪等項懷挾私仇受囑恐嚇將輕罪犯人私禁致斃者該督撫即行指參將該管官照懷挾私仇故禁平人律治罪雍正元年議準獄卒有受罪人仇家賄囑謀死本犯等弊者照律治罪其失察之該管官革職二年題準凡命盜等案有監斃人犯者或隨招附參或監斃在具題之後仍行補參勿得於正案未經審結之先咨參監斃藉端銷案其有重犯已斃母庸具題者務將原供全案備細報部刑部嚴加察核不協者仍駁令改正其允協者注明情罪允協應照該督撫所咨完結其監斃職名咨部照例議處三年議準盜犯如已經取供審明後管獄官並無致斃情事在監病故不論首盜夥盜四人以下者將管獄官免其議處至將一案內盜犯監斃五人以上者將管獄官罰俸一年凡強盜案件有監斃者各該督撫務於本內分别聲明又議準在監人犯有被禁卒人等陵虐需索者將禁卒人等計贓治罪仍追原贓給還本人提牢司獄不行察出事發照失察衙役犯贓例議處五年遵㫖議定獄卒陵虐罪囚其司獄官典吏等知而不舉仍照律治罪外若非陵虐而病斃者如繫斬絞重犯一案內監斃一人者管獄官罰俸一月二人罰俸三月三人罰俸六月四人罰俸九月五人以上罰俸一年如繫軍流罪犯一案內監斃一人者管獄官罰俸三月二人罰俸六月三人罰俸九月四人罰俸一年五人以上者革職徒罪以下人犯一案內監斃一人者管獄官罰俸六月二人罰俸九月三人罰俸一年四人以上者革職至於刑部乃刑名總匯之地案件繁多非一州一縣可比其司獄官典監斃斬絞重犯一案內監斃三四人者司獄罰俸一月五六人者罰俸三月七八人者罰俸六月九人十人者罰俸九月十一人以上者罰俸一年軍流罪犯一案內監斃三四人者司獄罰俸三月五六人者罰俸六月七八人者罰俸九月九人十人者罰俸一年十一人以上者革職徒罪以下人犯一案內監斃三四人者司獄罰俸六月五六人者罰俸九月七八人者罰俸一年九人以上者革職如一案內一時監斃斬絞軍罪徒流之犯數人以上者照內外所定各條分别議處其徒罪以下人犯患病獄官即行報明承審官承審官即親赴驗看患病果實取具甘結旗人交與該佐領驍騎校民人交與該地方官保出調治病愈即送監審結其外解人犯無人保出者令其散出外監醫治如本犯有病而獄官不即呈報將獄官照淹禁律治罪如本犯無病而串通獄官醫生揑報有病者將本犯並獄官醫生皆照詐病避事例治罪或病已痊愈而該佐領驍騎校該地方官不即送監審結者將本犯與該佐領驍騎校該地方官亦照詐病避事律治罪若保出故縱者將保人治以本犯應得之罪疏脫者減一等仍將取保不的之該佐領驍騎校該地方官照例題參議處以上各項內若有受賄情弊並計贓以枉法從重論再督撫題報監斃人犯務將本犯所犯罪名所患病症及有無陵虐並輕罪人犯曾否保釋原由逐一聲明如有朦溷情弊經部內察出將該督撫每案罰俸三月若承審各官不行詳報聲明各罰俸六月又議準刑部見審事件著令承審司官每於月終各將所審案件逐案開具簡明略節並監犯名數收監日期造具清册其有行提應質人犯等項不能依限完結者將緣由一并造入册內呈堂察核若有濫行監禁及無故遲延不結者即將該司官指名題參照例分别議處若刑部不行題參或被科道察出或别經發覺將堂官一并議處其直省問刑各衙門亦於每月造具清册呈報督撫察核如有濫禁等弊該督撫即行題參照例議處若督撫不行題參或被部院科道糾參或别經發覺將該督撫一并議處六年議準各省虧缺帑項人員除侵欺不及三百兩那移不及千兩應散禁者如看守疏忽以致自盡應仍照委員看守疏忽例處分侵欺至三百兩以上那移至一千兩以上應行監追人員在監自盡者應仍照在獄縊死例處分外其應行監追之犯不行監追令其在外居住者將該管之州縣官照溺職例革職其令本犯在外居住失於防範以致自盡者亦照溺職例革職本犯應追銀家屬不能完納即令該管官賠補其該管司道府等官如繫同城明知徇隱不行揭報者皆照徇庇例降三級調用不同城之司道府等官失於覺察者照不知不報例降一級留任如已有聞見不行察明揭報經督撫題參者亦照同城例各降三級調用直隸州知州照知府例分别處分其督撫失於覺察者照豫先不行察出例罰俸一年倘已有聞見不行題參或被科道糾參或别經發覺者照徇情例降二級調用七年議準承問官將盜犯取有口供未經題結監斃者令該督撫於疏內聲明無論首盜夥盜一案監斃四人以下者免議五六人者罰俸三月七八人者罰俸六月九人十人以上者罰俸一年事結具題之後監斃者免議至其餘監斃各項人犯仍照原定例處分又議準人命重案正犯已獲證左未明難以定招者將難結緣由於初參文內聲明聽部察核二限之內該犯病故者照承審限內並不取供審理監斃一二人者罰俸六月三四人者罰俸一年五六人者降一級留任七八人者降二級調用九人以上者革職若犯證已齊别無事故礙難質審之處而承審官漫不經心限內竟不訊取口供以致該犯於限外禁斃者若繫正犯仍照承審限內並不取供審理例議處若繫案內證左人等監斃者照監斃干連人犯例一二人者罰俸一年三人降一級留任四人降二級調用五人者革職乾隆元年覆準各省每府設立循環簿飭令所屬各州縣將每日出入監犯名姓填注簿內按月申送該府逐一稽察如有不應收禁之人濫行監禁及懷挾私仇故禁平人者皆照律擬罪外倘該州縣故將收監人犯隱漏不行填注者照朦溷造册例降一級調用如繫遺漏未造照造册遺漏例議處又覆準凡應禁人犯令該管官嚴行收禁將一應鋪監使費永行革除如有仍敢藉端需索除將該犯計贓以枉法治罪外并將失察之該管官照失察衙役犯贓例分别議處如知情故縱者照縱役犯贓例革職五年覆準遞回原籍人犯內凡犯笞杖等輕罪遞回原籍安插人犯令承審衙門於遞解文移票內注明該犯罪名並不應收監字樣其前途接遞州縣如遇該犯住宿之夜即遴選妥役將該犯押交坊店歇宿不許濫行監禁仍取具前塗收管母得疏縱如接遞之州縣將不應收監人犯濫行收監者將該州縣官照不應禁而禁公罪律罰俸一年凡犯笞杖等輕罪承審衙門於文內移明該犯原籍地方官折責母得先行杖責致令長塗苦纍如承審衙門先責後解者將該州縣官照違令公罪律罰俸九月欽定大清㑹典則例卷二十七
