body:
  text: 內務府武備院一建置順治初年置鞍樓設三旗侍衛三人總理所屬員外郎四人筆帖式十有五人庫掌三人庫守二十四人十一年改鞍樓為兵仗局十八年改兵仗局為武備院康熙十五年分設甲庫鞍庫氊庫增設員外郎二人庫掌三人庫守十有八人十六年鑄給武備院印信以理院事侍衛一人掌之設堂主事一人二十一年設郎中一人二十三年增設筆帖式五人三十四年裁筆帖式二人三十六年增設庫守四人三十七年分鞍庫為二庫曰北鞍庫南鞍庫增設未入流庫掌二人四十三年增設未入流庫掌二人四十五年增設員外郎二人庫掌二人未入流庫掌四人筆帖式八人庫守十人雍正六年裁淸字筆帖式四人增設漢字筆帖式四人又議準領院事侍衛改為三品卿乾隆元年奏準增設主事一人十四年奉㫖武備院卿定為二人由侍衛內務府官各簡一人補授仍簡大臣兼管院事一四庫員役甲庫設司函官六人司函執事人六名􅛸作設司匠六人領催二十四名􅛸匠九百七十六名鞘匠十名洗金匠五名釘匠內監二人甲作婦人二十一人北鞍庫鞍房設領催一名鞍匠一百十有一名鞍版匠三十五名木匠二十一名繳蓋房設掌蓋二人擎蓋十有四人應役人三十二名幄次房設司幄三人幄長十有二人幄人一百二十名工部針工十有五名南鞍庫皮作設領催三名纓匠十有三名縧匠三十六名牛皮匠黑股皮匠各四十五名鹿皮匠三十三名馬皮匠九名斜皮匠十有二名縢皮匠三十六名鞅匠五名針工四十五名氊庫設司弓三人委署司弓三人族長三十三人隨侍弓匠三十六人內府弓匠六十二名八旗滿洲䝉古漢軍每佐領下弓匠各一名司矢二人委司矢三人族長六人隨侍備箭執事人六人備箭執事人九人箭匠四十一名漢軍箭匠二十五名鳴鏑匠族長一人鳴鏑匠八名氊作設領催一名冠帽匠十有八名氊匠鞾匠皮匠各六十名鞾底匠三十二名針工十有五名順治十四年奏準增設甲作婦人九人康熙九年奏準建氊作於沙河設司匠一人筆帖式二人庫守領催各三人佐領內管領下氊匠百名投充氊匠二百名又奏準增設箭匠十有五名鳴鏑匠五名十一年奏準增設司矢一人十六年奉㫖裁繖蓋房應役人二名二十年奏準增設擎蓋一人二十一年奏準增設擎蓋七人應役人二十名二十二年奏準增設擎蓋八人二十七年議準裁鞍匠六十六名又奏準裁􅛸作司匠三人領催六名􅛸匠一百三名又奏準裁沙河氊匠七十四名三十二年奏準增設隨侍備箭執事人十有五人箭匠十有六名隨侍弓匠三十六名三十三年奉㫖增設司蓋一人裁應役人十有五名三十四年奉㫖增設骲箭匠一人三十六年奉㫖裁箭匠三十六名增設漢箭匠五名三十七年奉㫖增設幄人內府三旗每旗各十有五名又定增設幄長三人又奏準增設鳴鏑長一人三十八年奏準增設漢箭匠三十九名三十九年奏準增設鞾作司匠一人領催二名又奏準增設幄長五人八旗席伯幄人四十五名又奏準增設席伯鳴鏑匠六名席伯箭匠三十三名四十年奏準增設鞍作司匠一人領催二名皮作司匠一人又奏準司函官內設司函長一人四十五年奏準增設內府三旗幄長六人幄人六十名又奏準增設席伯鳴鏑匠三十一名雍正四年裁冠帽匠四名漢箭匠九名鞍匠十有三名皮作各匠共五十九名􅛸匠一百二十三名氊匠七名鞾匠皮匠共二十八名九年裁􅛸匠四十五名一繖蓋凡御殿躬祀壇廟陳設黃羅繡九龍三檐曲柄華蓋巡狩行幸陳騎駕鹵簿日設黃羅銷金九龍三檐曲柄華蓋尋常黃綾銷金二檐繖或靑羅繖羽段繖遇雨用大黃油繖小黃油繖並備皇太后宫皇后宫雨蓋康熙三十六年奉㫖掌蓋著授為三等侍衛如有事故著鑾儀衛官及各處侍衛代替一兵仗豹尾班所用朱漆畫龍綴豹尾朱氂槍十杆巡狩用本色木槍杆􅛸金雕龍大儀刀十把由院成造交侍衛班領皇太后皇后豹尾班各造槍刀如之交內府護軍參領內監所執槍四杆所佩腰刀四把內監坐更班房用腰刀四十七把槍四十七杆隨圍虎槍三百杆紫禁城內各門所設畫龍硃漆槍共三百十有五杆隨各該處咨取給發順治初年定凡禁門及各汛紫禁城四門陳設櫜鞬弓矢長槍等項軍器弓每日令弓匠張弛矢每十日令箭匠端杆磨鏃並礪槍年終見新其平時有應行修整者該直班官軍呈報統領行文本院修整康熙四十六年奏準紫禁城內兵丁看守各門班房所設軍器交內務府總管同直班護軍參領㸃驗交代如有損壞報院修理如不小心看守以致損壞者即將直班參領題參雍正元年定各門櫜鞬每八年弓矢十年槍十五年更換一次若未至更換之期即毁損不堪者統領劾奏將官軍嚴處五年奉準紫禁城內各班房軍器如不小心看守以致損壞者由院察參一鞍轡凡御殿躬祀壇廟鹵簿仗馬飾嵌珊瑚靑金緑松石􅛸金雕龍鞦轡繡龍黃段韂金鞍十具夏秋用茜紅氂牛尾繁纓春冬用靑狐尾繁纓御用鞍轡春冬用江獺皮緣豹皮韂夏秋用繡龍段韂凡􅛸金龍飾豹尾鞦轡鞍十具􅛸金龍飾黑馬尾鞦轡鞍十具遇朝服及慶典日用之其餘鞍轡均無定額每鞍各備鞍籠一皇子每位乘用小鞍各二具大鞍各四具均貯北鞍庫官鞍凡漆鞍三十具棕鞦轡鞍百五十具傳事鞍五具擎蓋用繡水韂鞍十具漆鞍二具豫備坐鞍五百四十具銅飾鞦轡鞍四十具載衣包鞍二具載書鞍一具載茶鞍三具載炮鞍五具載繖蓋鞍五具備䭾載鞍一百九十六具均貯南鞍庫一設褥太和殿中和殿保和殿乾清宮寶座設褥夏秋用黃龍糚段春冬用黑貂隨侍豫備段褥皮褥同順治初年定三大殿等處設褥每年於春秋換季之日更換內廷各處鋪設紅白氊每年一次將應換者奏請更換康熙二十五年奏準每年更換氊條令總管內監驗看奏準乃換一幄次上用黃幕以段或布為之官用靑幕以布為之上用圓幄方幄官用圓幄均以氊為之帳房以靑藍白色布為之恭遇巡幸均奏請數目隨往順治初年定聖駕巡幸先期將御用甲胄具奏請㫖豫備應用之大營幕幄及黃布幔城網城均繪圖呈覽搭造布城網城及隨纛之護軍參領護軍率領輜重之嚮導人員均移咨護軍統領除委牽駝之八旗驍騎並管轄官員咨兵部轉行八旗除委又定恭遇大閲先期將御用甲胄及應用御幄帳殿兩旁青幕均奏請豫備康熙三十六年奉㫖大閲停止搭蓋兩旁青幕乾隆二十年奉㫖停止八旗驍騎牽駝增設八旗幄人二百名一櫜鞬上用倭段櫜鞬一具隨侍櫜鞬二十八具乾淸門陳設櫜鞬二十具圓明園宮門陳設櫜鞬二十四具紫禁城各門班房陳設櫜鞬共五百六十九具康熙六年奏準躬祀壇廟具御用飾東珠倭段櫜鞬以司弓司矢恭奉隨侍一射侯步射布侯髙四尺七寸廣一尺以木為邊鞔以素布畫鹿形為正氊侯髙五尺廣四尺虛中徑三尺中棲皮為的席侯亦如之皮鵠徑九寸至一寸五分布鵠徑一尺二寸至四寸各有差試武舉席侯髙八尺廣五尺髤以朱繪鵠三上插五色旗五馬射氊毬圓徑八寸以白氊為之實以駝絨上綴朱髦鳥槍設木牌為的髙二尺廣半之一採伐木材順治初年定古北口外鞍匠三十五戶間一年採取鞍版一千三百五十具令驛傳遞送又定八旗弓匠等每年往大水峪採取上用弓胎六百官用弓胎三千五百二十有五又定牆子嶺曹家路北山採取弓胎差司弓一人弓匠十有六名地方官給兵二百四十五名嚮導人八名嚮導每名給盤費銀十八兩四錢所採弓胎令地方官運送十八年題準古北口外採取鞍版間一年採送七百具停用驛傳令匠役等自行運送康熙十八年議準盛京佐領處每年採送楊木箭杆三千枝樺木箭杆二千枝作槳木百根槍杆三百根樹黃三倉斗六升火茸三斤火石一斗三十九年奏準盛京佐領處每年額交圓幄柳木椽四百根四十五年議準牆子嶺採取弓胎停止該地方官嚮導兵丁差司弓一人引路新滿洲八名每旗弓匠族長一名弓匠九名給官馬前往雍正五年奏準每年採取古北口外弓胎委出八旗司弓一人每旗弓匠族長一人弓匠十名照例給與官馬各給四十日口糧將所採弓胎令驛傳運送至京如貯庫弓胎有餘間年採取又奏準御用弓胎二千具貯庫官用弓胎三千二百具交兵部存貯乾隆十五年議準樺木箭杆二千枝停止交送楊木箭杆每歲交七千枝一徵收皮張順治初年定馬牛駝皮由馬牛羣及各莊園交納鹿麅熊麞豬野豬等皮由尚膳房移送象皮由光祿寺移送均收貯備用又定每年委庫官一人率領催匠人往張家口㑹同稅務監督於游牧處倒斃馬駝牛皮內選取足用令監督運送至京十六年題準盛京將軍每年交送鹿皮一百六十張麅皮一百四十張十八年題準每年由戶部支取朝鮮國靑黍皮即緑斜皮一百五十張鹿皮五十張康熙七年題準朝鮮國進貢靑黍皮二百八十張鹿皮百張腰刀十口每年由禮部移送十三年定外藩進貢熏皮啓奏收貯內庫估價給賞十八年題準盛京將軍每年止徵鹿皮百張二十五年題準緑斜皮停止由戶部支取著本院自行成造二十六年題準盛京佐領每年交送上用皂皮三十張官用皂皮七十張其染造需用五棓子三十斤由院置買給付雍正元年免朝鮮國進貢靑黍皮四年奏準牛馬皮停止差官往張家口交稅務監督會牧場總管揀選運送至京又定張家口每年額送馬皮二千張馬駒皮千張駝皮百張牛皮三百張小牛皮千五百張犢皮二百張八年定馬皮駒皮駝皮停支交送俟應用時行文支取乾隆六年定張家口交送牛皮每年增五百張十一年定盛京佐領每年交送上用皂皮十五張官用皂皮停止交送又定染皂需用五棓子減去十五斤一徵收毛角筋膠順治初年定每年春秋二季慶豐司剪取羊毛並廣儲司所有熟皮羊毛交送收貯又定各莊園牛羣牛角尚膳房鹿角鹿筋均隨時交送貯庫又定鰾膠以庫內存貯朽皮每年熬煮水膠鹿角膠盡用熬煮魚鰾廣膠酌量所用奏請由戶部支取烏喇捕牲人所得鱏魚鰾交送貯庫又定每年差庫官一人率領催匠人往張家口會稅務監督於游牧處剪得羊毛內揀選可用者令監督運送至京其寒羊毛羊絨由戶部支取康熙九年題準游牧場春秋二季所剪之毛令其交送付沙河氊作四十八年奏準寒羊毛羊絨停於戶部支取寒羊毛交臨淸關稅務監督每年辦三千斤羊絨交河東鹽政每年辦千斤運送五十四年定寒羊毛由山東巡撫辦送雍正元年奏準停止河東交送羊絨遇用時動廣儲司庫銀採買四年議準張家口牧場所剪之毛停止差官辦理交該稅務監督會馬駝牛羊羣總管揀選運送乾隆三年奏準貯庫黑白羊毛如不敷用奏交張家口稅務監督購買交送一徵收樺皮木賊草順治初年定寧古塔將軍每一年一次額交進呈樺皮二百張上用樺皮五千張官用樺皮二萬五千張暖木皮四百五十斤木賊草四百五十斤由兵部移送又定盛京佐領每年額交木賊草五百斤又定山海關外莊頭每名歲交茜草五十斤由會計司移送乾隆四年奏凖山海關外莊頭額交茜草每斤折銀七分交廣儲司庫收貯應用茜草由院委官於廣儲司領銀採買用過銀數年終題銷十年定每二歲額交樺皮萬張一徵收翅翎順治初年定雕翎鸛翎鸛筋每年打捕戶捕送由都虞司交送收貯其鸛翅雉翅鴈翅遇用時行都虞司著捕戶捕送又定奉宸苑所養孔雀等翎均隨時交送收貯䝉古王台吉等進貢鳥翎由內庫給賞若不足用由院採買又定每年奉天將軍等捕送雕鸛等翅無定數到日令司矢揀選分别等第奏聞折賞一等虎班雕每副