body:
  text: 兵部職方清吏司公式一八旗緑旗通例一通例順治年間定官員犯笞杖等罪分别公私定議公罪笞一十者罰俸一月二十者罰俸兩月三十者罰俸三月四十者罰俸六月五十者罰俸九月杖六十者罰俸一年七十者降一級八十者降二級九十者降三級皆留任杖一百者降四級調用私罪笞一十者罰俸兩月二十者罰俸三月三十者罰俸六月四十者罰俸九月五十者罰俸一年杖六十者降一級七十者降二級八十者降三級九十者降四級皆調用杖一百者革職又定武職各官有應降一級者準以加一級或紀録四次抵銷罰俸一年者以紀録二次抵銷罰俸半年者以紀録一次抵銷又定老病休致武職各官任內有承督未完之案令接任官完結者本官已經休致免議若有侵那貪酷營私等弊仍照例處分又定武職各官有承督之案初參援赦免議限期又滿仍未完結復參者均以赦後起限仍作初參處分又定武職各官經上司糾參之後乃將上司列款訐首者將訐首之事不準行仍照例處分又定營員議處察明何繫專管何繫兼轄統轄照例議處若處分止稱該管官者止將專管官議處不及兼轄統轄官又定武職戴罪圖功者或别立軍功或將原案盜賊全獲或遇恩赦均準開復若三年內原案盜賊獲半地方寧謐者亦準開復如續有議降之案以後議之日計算三年無過開復其議處之時例應戴罪圖功者該員如有軍功加級紀録及薦舉者準其抵銷免戴罪圖功又定旗員緣事有降級留任者按所降幾級即降俸幾級應降級調用者各按品級遞降世爵緣事應降級留任者亦按所降幾級即降俸幾級應降級調用者每一級罰半俸三年二級罰半俸六年降級多者照此遞加俟罰俸扣完之日再行升轉若世爵兼有文武職任所犯由職任得者不論世爵大小皆就職任議處不由職任得者世爵大就世爵議處職任大就職任議處又定旗員參領以下及領催人等於本任內應辦之事果能奮勉例應議敘者由部將鈐印號紙分發各旗都統遇有應行紀録者即於號紙內書明事蹟用旗印鈐蓋給與該員收執於歲終彚奏若奉特旨賞給紀録或由部議敘紀録亦於歲終彚奏造册咨部存案紀録積至四次者準作加一級又定武職各官緣事降級留任及降級照舊管事者三年無過開復革職留任者四年無過開復其降級留任者三年內復有降級留任之案以後降之日為始計滿三年開復革職留任者四年內復有革職留任之案以後革之日為始計至四年開復康熙十一年議準武職大員將曾經奉旨永不敘用之人私用為官者革職至參官有不書名者將揭報具題官各罰俸六月二十三年覆準武職各官有議處之案到部或專本題準或彚本題覆宜分别辦理以昭畫一如盜案錢糧處分例應革職降調者逐案專本題覆若例止降俸降職降革留任罰俸戴罪督催等項入半月彚本題覆其錢糧案內如馬政驛站之類有造報違限並分數未完之文職經督撫題參到部者本部無庸具題將該督撫所參違限月日及未完分數移咨吏部議處至本部應入彚題之案繫本月內到者於次月內兩次彚題完結其中或情節未明應駮詰者即具槀咨察俟覆到日再議又覆準見任千總把總及功加效用各官有病故及老疾告退者皆先行報部將原劄繳銷於年終彚題若續有議處之案核明應免議者準其免議二十六年議準旗員本身出征因軍功所得世爵若犯賭博宿娼枷責以上罪者即議黜革雖有襲次不準承襲其餘所犯之罪應黜革者免其黜革永停半俸俟身故後仍準子孫按次承襲支食全俸若本身效力隨衆所得世爵緣事應黜革者即議黜革雖有襲次不準承襲至父祖所得世爵承襲之子孫緣事應黜革者即議黜革察明應襲之人承襲三十九年議準提鎮關繫重大緊要之事例應議處者仍照定例議處至裁汰戀職未經察出遲延開復與丁憂違限未經咨報及一應無關緊要之事並定例內未經開載應比照督撫之例罰俸一月至六月者皆免議處四十二年議準官員已經革職有前任之事到部議處必將應降應革分晰題明注册不得止以毋庸再議一槩抹銷倘革職之案辨明開復仍將前任之事逐一察明如有應革之罪不得即與開復有應降級者即照原官議降有應罰俸者議於補官日罰俸又議準已經革職各官除重大事情仍照例議處題明注册外其餘原任內所有事故皆免議處又覆準內外武職大員如有亷能屬官屈為貪劣題參審明涉虛將原誣揭官降二級調用具題官降一級調用又覆準升任降調裁汰給假丁憂解任武職各官如遇原任之事有應罰俸者升任官於新任內罰降調官於降補任內罰裁汰給假丁憂解任官於補官日罰至初任官有應罰俸者於到任日罰又題準將軍都統貪婪副都統不據實參奏副都統貪婪將軍都統不據實參奏提督貪婪總督不據實參奏總兵官貪婪提督不據實參奏發覺審實之日無論同城不同城皆降三級調用又覆準緑旗武職該管上司將屬官經管事務並在任月日錯誤開報以致本官革職者將開報上司降二級調用督撫提鎮降一級留任降級者將開報上司降一級調用督撫提鎮罰俸一年罰俸者將開報上司罰俸六月督撫提鎮罰俸三月如將不應參之官開報誤參未經處分經部察出改正繫革職降調將開報上司罰俸一年督撫提鎮罰俸六月繫虛革虛降住俸罰俸者將開報上司罰俸六月督撫提鎮罰俸三月雍正元年議準千總把總經督撫提鎮以巡防懶惰盜劫頻聞及營伍廢弛私離汛地咨革者雖遇赦免罪仍行革職又覆準武職各官以暴虐被參者遇赦雖免革職仍勒令休致三年覆準武職各官原任內有承督未完之案應議降俸降級革職及罰俸三月六月九月仍令承督者未滿年限之先或别案降調離任或升遷離任或報題升轉離任皆以罰俸一年議結若奉特旨升調原任內承督未完之案應議降俸降級革職者仍照離任官例罰俸一年完結如止應罰俸三月六月九月者皆各照依原任處分議結又議準武職各官升任後除原任內所有軍功加級準其隨帶外其曾經奉旨賞給隨帶之級及議敘並捐納所加之級原有隨帶字樣者仍準隨帶其餘均改為紀録一次至對品調補及品級相同改補者所有一應加級均準隨帶又議準八旗文武官兼世爵佐領有犯貪汚行止不端革職者不論何任事發所兼之官悉行議革其應襲之世爵佐領該旗將應襲之人奏請承襲若因溺職革職者將佐領并所兼文武之職議革其世爵應否存留該旗具奏請旨至奉特旨革職由武職內獲罪者其所兼文職應去應留該部院等衙門具奏請旨所兼世爵該旗具奏請旨由文職獲罪者其所兼武職應去應留該旗具奏請旨若不兼文職止由武職獲罪者其所兼世爵應去應留該旗具奏請旨其因公罣誤止於革職者由文職罣誤革文職仍留所兼武職及世爵由武職罣誤革武職仍留所兼文職及世爵若不兼文職止以武職兼世爵者由武職罣誤革武職仍留世爵因公罣誤降級調用者於何職議處即由何職降調革職留任者於何任議處即停何任之俸若所剩世爵尚有餘俸仍行給與再由世爵佐領簡選之侍衛因家貧不能行走經領侍衛內大臣奏退侍衛者回旗仍在世爵佐領上行走若因怠惰規避行止不端參革者將世爵佐領悉行議革該旗察明應襲之人奏請承襲四年議準武職各官有降級留任革職留任者計滿三年四年無過在京旗員二品以上在外將軍都統副都統及緑旗提督總兵官自行奏明準其開復旗員大小世爵及參領協領以下緑旗副將以下等官由該管大員詳察咨部題請開復倘不核明該員降罰情由遽請開復者罰俸六月有轉詳官者將轉詳官罰俸一年如該管大員將該員降罰之案不行聲明遽請開復者罰俸一年至本人已經呈請開復該上司不為轉詳者罰俸一年已經轉詳該管大員不為請開復者罰俸六月若本人隱瞞已身降罰事故遽請開復者罰俸一年至旗員如總管城守尉等官無大員統轄者自行呈部由部題請開復五年諭官員先參婪贓革職提問者原因婪贓被參故革職以便審訊如審無婪贓其罪不至於革職自應準其開復倘因已經革職遂謂無庸議未免寃抑嗣後凡被參革職訊問之員審繫無罪者皆著以開復定擬不得稱已經革職無庸議將此永為定例欽此又奉旨嗣後停俸降級革職留任之人奉特旨升補者將停俸降級革職留任之處核明奏聞又覆準在籍武舉並候選衛所千總等微員有把持公務武斷鄉曲一切犯法之事例應革職審問者該督撫咨部斥革彚題如審繫無辜咨部彚題開復若在籍微員有犯法之事不行懲治將地方官照徇庇劣員例議處至該微員本無劣蹟而地方官挾嫌揑款揭報者將地方官照揑報劣員例議處六年奉旨嗣後降調革職留任之員再有降革處分朕復加恩寬免留任者將後案注册俟前案開復再將後案計至三年無過準豫開復其有數案處分者計案遞加永著為例又議準八旗所屬各官貪婪該管官不據實詳揭經將軍都統副都統題參審實之日繫知情者無論同城不同城將該管官降三級調用統轄官降二級調用失察者同城之該管官降一級留任統轄官罰俸一年不同城百里以內者該管官罰俸一年統轄官罰俸九月百里以外者該管官罰俸九月統轄官罰俸六月在京巡捕營不詳揭屬官貪婪者照此例行直省副將參將至千總把總貪婪該管官不據實詳揭經督撫提鎮題參審實之日繫知情者無論同城不同城將親標該管官降三級調用統轄官降二級調用失察者同城之親標該管官降一級留任統轄官罰俸一年不同城在百里以內者親標該管官罰俸一年統轄官罰俸九月百里以外者親標該管官罰俸九月統轄官罰俸六月衛所各官不詳揭屬官貪劣者照此例行如統轄官將貪劣屬員申報將軍都統副都統督撫提鎮該管官不詳揭或該管官申報統轄官統轄官不申報將軍都統副都統督撫提鎮或該管官申報將軍都統副都統督撫提鎮竟不申報統轄官者亦照此例分别議處其不同城各官於疏內將里數聲明以慿察議倘里數聲明失實將轉詳官照徇情例議處至貪婪之處該管上司正在訪察而將軍都統副都統督撫提鎮先已發覺即行詳揭者該管上司止照失察例議處再題參貪劣屬員不將未經詳揭之該管各官附參者罰俸一年署印官不詳揭貪劣屬官者如任事不及一月免議一月以上與實授官一例議處至科道糾參貪劣官款蹟審實之日將不詳揭之該管統轄各官分别議處不題參之將軍都統副都統督撫提鎮皆照統轄官議處又議準將軍都統副都統督撫提鎮等聞有貪劣屬員行令該管官訪察該管官不即速申覆或泄漏風聲以致貪劣官自盡潛逃者將該管官罰俸一年其自盡者如有威逼致死情由審實有確據者將威逼之官革職提問至屬員互相訐告該管官不行詳報及經將軍都統副都統督撫提鎮知覺行令訪察又復詳報遲誤或將軍都統副都統督撫提鎮訪察屬員優劣該管官不速申覆者皆罰俸一年若該管官未奉將軍都統副都統督撫提鎮明文即將屬員拘拏羈禁者革職又議準武職各官裁汰告假丁憂者補仕後準接算前俸所有原任即升加級紀録準其隨帶緣事應降應革遇有恩赦免議及本案審虛開復或奉旨以原參之案本屬寃抑復還原職者均準接算前俸所有即升加級紀録亦準隨帶如並非本案開復及業經緣事降革奉旨起用者不準接算前俸所有即升加級紀録不準隨帶又議準八旗老病休致各官原任內所有加級紀録仍行注册後遇議處準其抵銷又覆準議處武職各官凡例內載明加級紀録不準抵銷者均於本內將原有加級紀録與不準抵銷之例一并聲明若并無載明不準抵銷字樣皆繫例應抵銷即於議以降級罰俸時核明該員加級紀録槩行抵銷至降級留任之人原繫虛降除戴罪並承督等案俟本案完結日開復外其因公罣誤降級留任者加級紀録皆準抵銷至降級留任以後捐納加級不準抵銷遇有恩詔加級及議敘加級皆準抵銷倘被議之人有應行抵銷部議遺漏抵銷者許本人詳明將承辦官交吏部議處若本人明知受屈隱忍不行詳明别經發覺將本人加級紀録不準於本案改正抵銷仍罰俸六月又覆準凡降革留任官員除不許升轉外其朝服頂帶皆許照本人品級七年奉旨凡外任官員因公罣誤革職者朕恐其人材尚屬可用而罷黜之由乃限於定例不忍使之廢棄終身是以格外施恩於部議革職之時往往酌量降旨令其交代後該上司出具考語送部引見此朕愛惜人材體恤下情之意惟是外官在任參罰之案常多每有先經革職奉旨來京引見之人陸續又有别案革職者此等官員著交部核明若續參之案情罪重於前案非繫因公罣誤則不應引見若後案仍繫因公罣誤與初參革職之案情罪相同仍著引見於奏摺內將該員共有處分幾案之處聲明候旨又議準武職各官被參革職發審本案審繫全虛者皆以開復定擬不得稱已經革職毋庸議完結如革職發審之人先經别案降革者本案審虛止將審虛之案開復其從前降革之案不得槩豫開復其先經别案革職留任降革留任者本案審虛亦止將審虛之案開復於補官日將從前降革留任之案帶於新任至原參重罪審虛而該員尚有輕罪應降級罰俸者將該員原參革職之案開復按其所犯輕重應降級者降級應罰俸者罰俸原任內所有加級紀録等項應抵銷者仍準抵銷八年奉旨內外大小官帽頂補服坐褥等項悉照本身見任品級不得藉稱加級以開僭越之端在京著有稽察之責者嚴行稽察在外著該管上司稽察倘有不遵除將本人議處外失察之人一并議處九年議準武職各官有出征及差往屯種駐劄者遇有議處之案應罰俸者準其注册於事竣之日補行罰俸應降級留任革職留任者仍按年限題咨開復應降級調用者帶所降之級仍留軍營效力於事竣之日該管官出具考語給咨送部引見請旨應革職者於議處本內將應否仍留效力之處聲明請旨如準留營效力亦俟事竣之日該管官出具考語給咨送部引見請旨以上降革留營效力官不必開闕均照原官支領俸薪等項以資飬贍十年議準千總把總外委等因軍功議敘職銜遇有因公罣誤應行降調者如降一級將所得功加銷去一等抵降一級若降級多者照此計算銷去功加十一年奉旨嗣後有一人而兼數任者遇有議敘若僅止一案只就一任內議敘如遇有議處亦止就一任內議處將此永著為例又議準武職各官升任後遇原任事發應降級調用者如繫營私作弊情罪重大者於原任內議以降調若繫尋常因公罣誤或情罪尚輕者於見任內議以降調此內有旗員繫營私作弊情罪重大於原任內議以降調者將所兼之任一并降調繫因公罣誤於見任內議以降調者仍留所兼之任十二年議準內務府官員遇有降級調用之案向皆議以留任但實降之與虛降原有輕重未便一例辦理嗣後內務府官員應議降級調用者照例仍準留任外將降一級調用者加罰俸一年降二級調用者加罰俸二年雖有紀録不準抵銷又議準參領副參領兼管佐領者遇有因公革職之案繫參領任內之事將參領議革仍留佐領繫佐領任內之事將佐領議革所兼參領副參領該管大員出具考語具奏請旨因公降調之案繫參領任內之事將參領議降仍留佐領繫佐領任內之事如世襲佐領按所降幾級以罰佐領半俸議抵如公中佐領即行降調如有兼銜留其小街所兼參領副參領該管大員出具考語具奏請旨至副都統以上等官有兼佐領者遇有因公革職之案繫副都統等官任內之事將副都統等官議革仍留佐領繫佐領任內之事將佐領議革所兼副都統等官於本內聲明請旨因公降調之案繫副都統等官任內之事將副都統等官議降仍留佐領繫佐領任內之事如世襲佐領按所降幾級以罰佐領半俸議抵如公中佐領即行降調如有兼銜留其小銜所兼副都統等官於本內聲明請旨又議準武職各官有軍功加一級者準抵銷降二級如遇有降一級一案將軍功加一級抵銷仍給還軍功紀録二次軍功紀録二次者準抵銷降一級軍功紀録一次者準抵銷罰俸一年如遇有罰俸六月之案將軍功紀録一次抵銷仍給還尋常紀録一次其餘議敘加一級或紀録四次或不論俸滿即升或卓異一次或薦舉二次者皆準抵銷降一級薦舉一次或紀録二次者皆準抵銷罰俸一年紀録一次者準抵銷罰俸六月至軍政應議各官雖任內先有薦舉紀録卓異不準抵銷亦不準隨帶若軍功加級及别項加級紀録不準抵銷仍準隨帶再議處拖缺錢糧各官任內有軍功及錢糧全完加級紀録者準其抵銷别項加級紀録不準抵銷又議準武職各官有紀録一次者抵銷罰俸六月如任內有紀録一次罰俸僅三月者徑行罰俸仍留紀録若罰俸一年銷去紀録一次抵罰俸六月仍罰俸六月餘均照此扣算十三年議準八旗武職有應參劾者該管大員開具事由奏請交部其應革職治罪者由部核實請旨又議準八旗在京驍騎校以下微員無級可降者如緣事應降級留任仍議以降級留任三年無過開復若承督等案於事完之日開復若有數案仍逐案開復至應降級調用者如在三級以內行察該旗令該管官將該員居官如何之處聲明報部於議覆本內將居官好者議以革職留任三年無過開復平常者議以無級可降革職如議處之人甫經任事尚未定其賢否該管官將甫經任事之處聲明報部於議覆本內議以暫行留任仍令該管官試看一年如能供職報部注册於奉文試看之日扣限起至三年無過開復如不能供職該管官即行參革此等微員於分别去留具題之後交與都察院堂官秉公驗看若去留允當即具摺奏聞若將應去者議留應留者議去或內有人才可用或在行間曾出格效力者都察院將情由聲明引見至外省駐防驍騎校以下微員無級可降者該管官於題咨之日即將該員居官如何之處於文內聲明由部覆核將應去應留之處敘入議覆本內請旨其有未將該員居官如何之處聲明者由部咨察該管官俟出具考語到日將該管官所出考語及應去應留之處附入彚題請旨以上京外八旗無級可降微員如一案內降調過於三級者即行革職不準留任或已經革職留任未經開復又復别案降調即行革任如遇降級留任之案仍準留任逐案開復至緑旗七品武職乃無級可降之員如緣事應降級留任者仍議以降級留任三年無過開復若承督等案於事完之日開復若有數案仍逐案開復應降級調用者該督撫提鎮於題咨之日即將該員居官如何之處於文內聲明由部覆核若該員降調之案在三級以內於議覆本內將居官好者議以革職留任三年無過開復平常者議以無級可降革職如議處之人甫經任事尚未定其賢否該督撫提鎮等將甫經到任之處聲明報部於議覆本內議以暫行留任仍令該督撫提鎮等試看一年如能供職報部注册於奉文試看之日扣限起至三年無過開復如不能供職該督撫提鎮等即行參革其有題咨文內未將該員居官如何之處聲明者由部咨察該督撫提鎮等俟出具考語到日將應革應留之處附入彙題請旨至一案內所降調之級過於三級者即行革職不準留任或已經革職留任未經開復又遇别案降調即行革任如遇降級留任之案仍準其留任逐案開復其千總雖繫六品遇有降二級調用之案準照七品官之例行乾隆元年奉旨嗣後侍衛等差使遇有議處著領侍衛內大臣即行議奏三年議準旗員五品以上者遇有降革罰俸之案該管官題參送部其一切因人連纍等事該管官咨參送部繫降調革職者專本題覆繫虛革虛降罰俸者入於半月彚題完結至六品以下等官降革罰俸之案均令咨部議處入於彚題完結四年議準內外旗員遇有罰俸之案除原有紀録準其抵銷外若任內有議敘加級願改為紀録抵銷罰俸者準其呈明每級改為紀録四次遇有罰俸之案照數抵銷其抵銷所剩紀録於升任時核明繫隨帶之級所改者仍準隨帶不繫隨帶之級所改者改後抵銷過一二次或三次者槩行注銷若所改紀録並未抵銷罰俸升任時準以紀録一次帶於新任其餘一應加級不準改抵又議準在京旗員三品至五品因公降革如任內無錢糧不清及治罪之案者該管大員將該員降革原案咨送都察院察核實屬因公者咨回該處由該管大員出具切實考語引見請旨非繫因公者無庸引見其外省駐防降級調用官由該將軍都統副都統等察明該員降調原案咨送在京該旗轉咨都察院察核實繫因公者行文該處將該員出具考語咨送來京引見非繫因公者仍案所降之級候補駐防革職官除已經在外留飬者無庸議外如已經歸旗亦照在京旗員之例辦理直省副將以至守備因公降調者俟交代清楚後該督撫提鎮出具切實考語給文赴部由部將該員原參之案咨送都察院察核實繫因公者由部將該督撫提鎮所出考語並都察院察核緣由聲明引見請旨非繫因公者照例候補至巡捕營參將游繫守備遇有因公降革無錢糧不清及治罪之案者該統領將該員降革原案咨送都察院察核實繫因公者由該統領出具考語引見請旨非繫因公者降調人員該統領咨部候補革職者令其回籍又議準一事之內有兩罪名者不必重科惟案罪名大者議處至事非一案或一時同發或先後並發仍逐案議處又議凖檢舉處分例內定有專條者仍照例遵行外其並無明文者在京八旗副都統以上在外將軍都統副都統及提督總兵官所辦事務始初無心錯誤或繫失察後經察出檢舉由部將照例處分及應否寬免之處兩議請旨其餘在京八旗參領巡捕營參將以下在外協領及副將以下無心錯誤自行檢舉者各按應得處分减等如例應革職者議以革職留任應革職留任者議以降四級留任應降級調用者議以降一級留任應降級留任者議以罰俸一年應罰俸一年者議以罰俸六月應罰俸六月者議以罰俸三月應罰俸三月者免議本人既以檢舉减等其該管上司均免失察處分倘所犯之事繫有意營私别經發覺希圖减等倒提月日及斷罪失入已行論决者雖自行檢舉不準減等又奏準在京巡捕營武職各官如有議敘加級願改為紀録抵銷罰俸者呈該統領咨部每級改為紀録四次遇有罰俸之案照數抵銷其抵銷所剩紀録於升任時核明繫隨帶之級所改者仍準隨帶不繫隨帶之級所改者改後抵銷過一二次或三次者槩行注銷若所改紀録並未抵銷罰俸升任時準以紀録一次帶於新任其餘一應加級不準改抵又奏準武職各官有一人而加數級者遇有處分按其加級年月先後依次抵銷又議準候補候選及議處之武職人員內如有應行呈明情節赴部具呈聽候批示辦理具呈一次之後復行揑辭妄瀆者槩不收録倘實屬寃抑自赴都察院具呈有應行準理者由都察院調取原案詳考定例如實屬舛錯奏請更正若部內辦理未協將堂司官奏請察議有營私受託等弊都察院即行察參五年議準八旗印房總辦俸餉及各參領總辦事務一年內並無遺漏逾限者將承辦官各紀録一次各佐領下事務三年內並無遺漏逾限者將佐領驍騎校各紀録一次領催族長應給紀録者注册咨部備案俟得官之日給與未得官之日遇有過誤將注册之紀録抵銷其應給紀録者該都統將紀録號紙給發於年終奏聞咨部注册又奏準武職降級留任各官三年內遇有罰俸者如將所罰之俸繳完及按季扣完者免其扣除罰俸年限計滿三年開復革職留任各官四年內遇有罰俸者如將所罰之俸繳完亦免其扣除罰俸年限計滿四年開復如降革留任之員罰俸未經全完者各按完過銀數免其扣除罰俸月日若全未繳完扣完皆將罰俸月日扣除計滿年限開復六年奏準八旗武職該管上司將所屬官員經管事件並月日不行察明謊開以致本官革職者將申報上司降一級調用將軍都統等降一級留任如本官降級者將申報上司降一級留任將軍都統等罰俸九月本官罰俸者將申報上司罰俸六月將軍都統罰俸三月如將不應參之官誤報題參未經處分經部察出若繫革職降級事件將申報上司罰俸一年將軍都統等罰俸六月若繫虛降虛革及住俸罰俸事件將申報上司罰俸六月將軍都統等罰俸三月又議準王公所屬六品以下官原繫咨部補授如有過犯照例咨革至五品以上官有應革者該王公據實參奏交部察議入於半月彚題完結又議準外省駐防官有應議處之案如例無專條者繫將軍都統副都統照在京都統副都統例定議總管副管翼領城守尉協領參領防守尉照在京參領例定議佐領防禦驍騎校照在京佐領驍騎校例定議其在京副參領步軍副尉有議處之案如例無專條者副參領照參領例定議步軍副尉照步軍協尉定議又奏準直省武職各官如被上司恃勢抑勒許該員詳報該將軍提鎮核參若將軍提鎮徇庇或自行抑勒許該員詳報總督核參如總督徇庇或自行抑勒該員受屈難伸及該省未經設有總督者準其直揭部科至督撫親標及衛所各官被上司恃勢抑勒許詳報督撫核參若督撫徇庇或自行抑勒亦準其直揭部科該部科察明揭內情辭果有實據即行具奏事關將軍總督提鎮者交巡撫察審事關巡撫者交總督察審事與督撫皆關者請旨簡命察審該上司暫免解任審明上司抑勒屬實照例議處若明知上司訪款揭參乘參本未到之先揑砌誣揭該部科察明情辭無據將該員奏明解任原揭發交總督確實察審果繫誣揭將該員革職如該員被參本罪輕於所誣之罪者於本罪外仍治以誣告之罪倘本罪重於誣告即從重歸結又奏準武職各官有例應議處之案奉該管上司行取職名該員開送遲延者罰俸一年轉催官罰俸六月若屬官例應議處並無應詢緣由該管上司揭報遲延者按限期處分不得藉屬員開送遲延希圖推卸至行取例應議處職名該管官不行開送經將軍都統副都統督撫提鎮以徇庇附參者降二級調用七年議準世爵所得加級後經補授别任其品級與世爵相等或較小於世爵者均準隨帶若品級大於世爵將應行隨帶者準其隨帶應改紀録者改為紀録至職任內先得加級後經承襲世爵無論職任兼與不兼若世爵品級與職相等或較小於職任者均準隨帶若世爵品級大於職任將應行隨帶者準其隨帶應改紀録者改為紀録其佐領任內所得加級後升參領以上等官雖仍兼佐領亦察明應隨帶者準其隨帶應改紀録者改為紀録又議準旗員緣事議處應議降一級二級留任兼罰俸一年二年者除加級紀録足抵降罰之數準其抵銷外如加級紀録不足抵降罰之數將見有加級紀録抵銷仍分别議以降級罰俸降級之員俟三年無過開復未經開復之先即罰俸年限已滿止照所降之級食俸罰俸之員按所罰之數扣除又議準副驍騎校護軍校等遇有議處之案無俸可罰無級可降皆以鞭責完結罰俸一月者鞭一十兩月鞭二十三月鞭三十六月鞭四十九月鞭五十一年鞭六十降一級留任者鞭七十降一級調用及降二級留任者鞭八十降二級調用及降三級留任者鞭九十降三級以上調用及革職留任者鞭一百仍留當差如犯革職之案鞭一百革退至領催兵丁有犯如例無專條者亦照此鞭責八年奉旨向來在京八旗武職及外省駐防並在京文武官員遇有罰俸之案準其將議敘加級改為紀録抵銷惟在外文武各官不在此例朕思大小臣工雖職分有大小之殊而以功抵過均屬一體嗣後外省地方文武各官有情願將議敘加級改作紀録抵銷罰俸者著照在京文武官之例準其抵銷又覆準在京八旗武職及巡捕營參將以下各官遇有罰俸三月之案不至銷去紀録一次者將罰俸之處注册俟再遇罰俸三月之案合算抵銷十三年議準武職各官若因公降革向有送都察院察核引見之例徒滋弊竇應行停止嗣後在京旗員因公罣誤至於降革其中有辦事勤敏人材可用並無錢糧不清及治罪之案者該管大員㑹同都察院察核如果應行引見由該管大員出具切實考語保奏引見外省駐防者由該將軍都統副都統等出具切實考語咨送各該旗核明引見應去應留均候旨遵行至在京巡捕營參將游擊守偹等官有因公罣誤至於降革者其中有辦事勤敏人材可用並無錢糧不清及治罪之案者該步軍統領㑹同都察院察核如果應行引見由該步軍統領出具切實考語保奏引見應去應留候旨遵行十四年奉旨近定因公降調人員如以原官補用仍將所降之級帶於新任嗣後引見時如經朕特旨降補者不拘所降級數槩行注銷不必隨帶又覆準在京旗員二品以上在外將軍都統副都統及緑旗提督總兵官遇有降革留任之案於年限屆滿時各開具事由咨部由部察例題請開復不必自行陳奏十六年議準參領以下等官辦事並無遺漏遲誤者分别給以紀録原屬鼓勵旗員之意其一人兼數任者即給以數任紀録未免過優嗣後參領兼印房辦事又兼佐領者止給以參領紀録佐領兼印房辦事者於印房任內給以紀録部院各官兼佐領者準給以佐領紀録其餘所兼之任均不準重復紀録十九年覆準守備以上各官遇有因公降調者準以功加一等抵銷降一級免其降調欽定大清㑹典則例卷一百十六
