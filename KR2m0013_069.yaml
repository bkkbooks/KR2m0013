body:
  text: 禮部儀制清吏司貢舉上一試期順治二年定秋八月舉行鄉試初九日第一場十二日第二場十五日第三場均先一日㸃入次一日放出春二月舉行㑹試三場試期與鄉試同夏四月初一日殿試初五日傳臚又定嗣後以子卯午酉年八月鄉試丑辰未戌年二月會試奉特旨開科則隨時定期又定會試掲曉日期由考官酌定禮部奏聞五十二年聖祖仁皇帝六十萬壽特開鄉會恩科題凖二月鄉試八月會試十月初九日殿試雍正元年恩旨開科議凖本年四月鄉試九月會試十月二十七日殿試其癸卯甲辰鄉會正科改期於雍正二年二月鄉試八月會試十月殿試四年諭明年乃會試之期春季適有閏月二月節候天氣尚寒凡應試舉子塗次逺來及闈中考試誠恐寒苦著將明年二月入場之期改至三月令該部即行文各省諭令知悉若近京各省舉子竢開春起送亦覺甚便嗣後㑹試之年遇有閏月該部先期奏聞欽此十三年九月諭國家大典首重掄才我朝培養多年人才日盛是以皇考御極之初於三年大比之外特開鄉會恩科廣羅俊乂所以鼔舞而振興之者至為周備今朕纘承統緒照雍正元年特開恩科之例舉行兹典乾隆元年繫丙辰㑹試正科著於八月舉行鄉試乾隆二年二月舉行會試以副朕興賢育才之至意欽此乾隆九年諭明年二月會試天氣尚未和暖著改期於三月舉行欽此十年諭三載賓興國家舉賢右文之大典必諸弊悉去然後可以拔真才所謂稂莠不剪則嘉禾不生其理顯然向來察弊之法不得不嚴者正慎重科名厚待良士之道昨歲朕親臨貢院遍觀堂所周覽號舍矮屋風檐備極辛苦深可軫念比賦四詩命刻堂壁可以知朕心矣今歲會試已展期三月以待春溫嗣後即以為例兹特豫降明旨命禮臣知貢舉俾得先期計議從容料理當嚴則嚴當寛則寛於剔除弊端之中寓優䘏士子之意知貢舉者其善為之欽此又諭向來會試之期在二月則三月發榜四月初間殿試雍正五年乾隆二年會試改期三月則四月𤼵榜五月初間殿試朕思五月天氣漸熱向改殿試之期者因三月㑹試乃偶一舉行之事今三月會試已著為定例則殿試之期自應酌量變通著自今科為始於四月二十六日殿試五月初一日傳臚該部即通行曉諭知之欽此一試藝順治二年定第一場四子書義三篇經義四篇第二場論一篇詔誥表各一道判五條第三場策五道又定四書第一題用論語第二題用中庸第三題用孟子如第一題用大學第二題用論語第三題仍用孟子又定殿試用時務策一道又定策題以闗切事理明白正大為主不許搜尋僻事掩匿端倪必問者列款而示使對者可按牘而陳庶乎真才易辨又定文有正體凡篇内字句務典雅純粹不許故摭一家言飾為宏博又定後場博雅通逹而前場稍未純粹者亦得兼收八年題凖八旗鄉試滿洲䝉古或繙譯漢文一篇或作滿文一篇漢軍作漢文第一場四書文二篇經文一篇如未通經者作四書文三篇第二場論一篇第三場策一道至次科第一場四書文三篇經文二篇第二場論一篇判五條第三場策三道以後應試均照漢人例行十六年議凖場中作判務宜隨題剖斷引律明確不專以駢麗為工又議凖考官於後場論題間出孝經以勵士尚十七年議凖二三場原以覘士子經濟凡坊間有時務表策名色槩行嚴禁康熙七年題凖出題錯字者正副主考官一次罰俸三月二次六月三次九月同考官一次罰俸六月二次九月三次一年自行檢舉者正副主考官罰俸三月同考官六月内簾官錯出題目字様士子各習専經不禀明監臨官傳進内簾官改正照題紙錯字謄録以致中式者罰停會試二科九年題凖春秋止以單題合題酌量均出二十年題凖第一場文字每篇限六百五十字違例謄録取中照例議處二十六年覆凖三場策題止宜簡明發問不得過三百字二十九年議凖鄉會試二場孝經論題甚少嗣後將性理太極圖說通書西銘正䝉一並命題三十二年覆凖刋刻闈墨務照原卷若考官不照原卷發刻者交部議處四十一年議凖詔誥二題令習五經者兼作闕者不録其習一經者仍如見行例五十二年諭近見鄉會試皆擇取冠冕吉祥語出題每多宿搆倖獲致讀書通經之士漸少今後闈中題目應不拘忌諱庶難豫作揣摩實學自出欽此五十五年議準二場表題不許出本年時擬近事雍正元年覆凖考官若仍出熟習擬題交該部議處十年諭制科以四書文取士所以覘士子實學且和其聲以鳴國家之盛也語云言為心聲文章之道與政治通所闗鉅矣韓愈論文云惟陳言之務去柳宗元云文者所以明道不徒務采色夸聲音而以為能也况四書文號為經義原以闡明聖賢之義蘊而體裁格律先正具在典型可稽雖風尚日新華實並荗而理法辭氣指歸則一近科以來文風亦覺丕變但士子逞其才氣辭華不免有冗長浮靡之習是以特頒此旨曉諭考官所拔之文務令雅正清真理法兼備雖尺幅不拘一律而支蔓浮夸之言所當屏去秋闈期近該部可行文傳諭知之欽此十一年諭國家以制科取士原以覘士子所學而士子所學闗乎世道人心是文體之所繫固甚重也士子讀聖賢書果能講求聖賢明體逹用之學則以平日之蘊蓄發為文章自然法正理純得聖賢語氣可以傳世而行逺作後學之津梁此則有本之學有用之文為國家所重頼者若不於根柢講求而但以華靡相尚則累牘連篇皆屬浮辭聖賢精義全無發明聖賢語氣又毫不相肖國家亦安用此浮夸淺薄之士哉至於二三場策論尤足覘經濟實學乃向來士子多不留心而衡文者又每以經義已經入彀遂將策論濫收恕取不復加意閱㸔殊非設科本意今㑹試伊邇着禮部先期曉諭應試士子於三場文義均應努力殫心毋得潦草完卷考試官如以限於時日不能細心校閱後場不妨奏請展限務得真才以收實用若所取試卷中有經義可觀而策論疵謬荒疎者朕惟於主考官是責欽此十三年十月諭文以載道與政治相通故二帝三王之盛在廷敷奏及宣諭衆庶之言皆為謨為誥炳著六經西漢治猶近古人心淳樸故見於文者原本經術指事類情質實曉暢猶有周人之遺降及魏晉以文滅質漸就浮靡六朝尤甚姿態益工意格亦陋文運所闗非淺鮮也朕思學者修辭立誠言期有物必理為布帛菽粟之理文為布帛菽粟之文而後可以垂世行久若夫雕文逞辭以炫一時之耳目譬猶摶土掲木塗飾丹鉛以為器物外雖可觀不移時而剝落曷足貴耶國家累洽重熙之日務學績文者正宜沐浴教化爭自濯磨蘄近於大雅勿尚浮靡勿取姿媚斯於人心風俗有所禆益至於古人臨文原無避諱誠以言取足志一存避諱之心則必輾轉囁嚅辭不逹意嗣後一切章疏以及考試詩文務期各展心思獨抒杼軸從前避忌之習一概掃除尤宜禁者鄉會兩試考官每因避忌字様必擇取經書中吉祥之語為題遂使士子易為揣摩倩人代作臨場鈔冩以致薄植之少年得以倖取科名而績學之老生無由展抒底蘊嗣後凡考試命題不得過於拘泥俾士子殫思用意各出手眼以覘實學欽此乾隆元年覆凖鄉會場之春秋合題槩行停止四年諭向來殿試策中皆用頌聨以致士子得以豫先撰擬分送請託致滋弊端况士子進身之始即習為獻諛之辭尤非導之以正古人對策中無此體裁也今當殿試之期朕親製策問不拘舊式以免諸生豫先揣摩諸生策内不許用四六頌聨但取文理明通敷陳切當不必泥於成格限於字數此次試期已近倘有不畫一之處亦不必以此為去取將來如何酌定款式著大學士九卿會議具奏欽此遵旨議凖殿試試卷舊無横格嗣後貢士等果有通逹治體學問淹通者應聼其發抒不必限以字數惟最短者亦必以千字為率不及千字者不以入式者論至於四六頌聨並一應膚泛套語槩不凖復用其前幅策冒十四行後幅空白十四行原非古式不必拘泥惟承問逐條詳對起處仍書臣對臣聞字様訖處仍書臣草茅新進云云字様以昭畫一十年諭國家設制科取士首重者在四書文蓋以六經精微盡於四子書設非讀書窮理篤志潛心而欲握管揮毫𤼵先聖之義蘊不大相逕庭耶我皇考有清真雅正之訓朕題貢院詩云言孔孟言大是難乃古今之通論非一人之臆說也近今士子或故為艱深語或矜為俳儷辭爭長角勝風檐鎖院中偶有得售彼此仿傚為奪幟爭標良技不知文風日下文品益卑有闗國家掄才鉅典非細故也夫古人論文以渾金璞玉不雕不琢為比未有穿鑿支離可以傳世行逺者至於詩賦掞藻敷華雖不免組織煊染然亦必有真氣貫乎其中乃為佳作至於四書文採掇辭華以示淹博不啻於孔孟立言本意相去萬里矣先正具在㒺識遵從習俗難化職此之由嗣自今其令各省督學諸臣時時訓飭鄉會考官加意區擇凡有乖於先軰大家理法者擯棄勿録則詭遇之習可息士風還淳朕有厚望焉欽此二十一年定鄉試第一場四子書義三篇二場經義四篇三場策五道會試二場加表一道詳見磨勘則例二十二年諭前經降旨鄉試第二場止試以經文四篇而會試則加試表文一道良以士子名列賢書將備明廷制作之選聲韻對偶自宜留心研究也今思表文篇幅稍長難以責之風檐寸晷而其中一定字靣或偶有錯落輒干貼例未免仍費檢㸃且時事謝賀每科所擬不過數題在淹雅之士尚多出於夙搆而倩代强記以圖僥倖者更無論矣究非覈實拔真之道嗣後會試第二場表文可易以五言八韻唐律一首夫詩雖易學而難工然宋之司馬光尚自謂不能四六古有能賦詩而不能作表之人斷無表文華贍可觀而轉不能成五字試帖者况篇什既簡司試事者得從容校閱其工拙尤為易見其即以本年丁丑科㑹試為始見在各省㑹試舉子將已陸續抵京該部即行曉諭知之欽此又諭會試人數衆多如三江九佳等字數窄少之韻自不宜用以避雷同所應限者不過在東冬支虞陽庚等十數韻之内場中自有刻字人役可令將此限本韻刪去小注刋刻一紙隨題按號散給以便拈用欽此是年覆凖鄉試自乾隆己卯科為始於第二場經文外一體試以五言八韻唐律一首其所出詩題限用官韻即照會試之例於場中將本韻别刻一紙給𤼵二十三年奏凖鄉會試於四書文三篇外令作性理論一一考官順治二年定題差鄉試考官雲南貴州四月初十日福建四川廣東廣西五月十二日江西浙江湖廣六月十三日江南陜西六月二十三日河南七月十三日山東山西七月二十日順天八月初四日具題又定順天鄉試凡開列具題内外簾之文武大小官皆於八月初六日黎明各具朝服備行李齊集午門外聽候宣旨入簾者一同謝恩即入貢院如有不到者叅處又定各省主考官於命下日剋期起行不攜家不辭客不隨從多人騷擾驛遞在塗不閒遊不交接抵所差之省提調官即迎入公館不得接見所寓公館仍用考官封條監試委官廵邏依時啟閉遇鹿鳴等燕正考官居中副考官居左監臨官居右行次如之其同考官旁坐又定主考官如實遇重病即於命下日具疏辭免在京丁憂者用本衙門印信文書移部即題請更代其出京未逺者度其道里時日尚可更代者取所在官印信公文差人赴部投遞即與題請更代如題請不及者止行所在有司轉申本省撫按官代奏本官即先回籍守制其見在考官或正或副即前赴科場一人兼辦其已到地方丁憂者監臨官具奏其丁憂官仍須起有原籍印信公文或家眷在京起有本衙門印信公文送至所差有司衙門看無違礙方許申報本官不得擅通家報三年定會試主考官届期禮部開列内院大學士學士六部尚書侍郎都察院堂官職名題請簡用十五年題凖殿試讀卷官十四人由部列内三院詹事府吏户兵刑工五部都察院通政使司大理寺各衙門堂官名銜題請簡用又定禮部堂官除提調外亦凖開列讀卷候旨簡用十七年題凖直省正副主考除曽經典鄉試及會試分房不開外其見在各衙門應差各官通行開列題請命下日轉行兵部各給郵符尅期起行不許淹留京邸又定各主考到省禁絶監臨提調官迎接拜望以遠嫌疑自出京以至入院務令扣定日期凡省中寓所均用廵察封條封閉入簾行李聽監臨提調官公同驗明該地方官豫備官板書籍亦許正副主考攜帶以備考正康熙三年題凖鄉試正副主考各衙門應差官員職名槩行通列題請簡用十一年題凖各省鄉試主考内閣進士中書與各衙門應差官員一同開列題差十八年議凖正副主考入場許隨三人同考許隨二人如有暗帶主文冐充僕從察出將本官議處所帶之人治罪二十九年議凖翰林院各部院衙門官如有病痊假滿服闋遇鄉試之年補任者皆不凖開列三十九年覆凖順天正副主考除應開列官員照常開列外將侍郎學士京堂翰林科道部屬等官由進士舉人出身者無論己未典試通行開列雍正三年諭前各省正副主考朕皆視其人謹慎者命往並未試其文藝間有不能衡文者此皆由中式之後荒疎年久故耳著將應差委之翰林由進士出身之各部院官具奏朕試以文藝差委欽此遵旨將翰林院及進士出身官員具奏召集於太和殿試以四書文二篇彌封訖恭呈御覽親定甲乙封貯内閣以備鄉試差遣又奏由舉人出身之郎中主事中行評博應否一并考試奉旨用進士出身之人不用由舉人出身之人十三年諭今年鄉試之期著將在京應差人員遵照舊例考試候旨欽此乾隆元年諭今歲八月舉行恩科鄉試其正副考官必用人品端方學問醇正者始足膺衡鑒之寄朕即位之初不能深知諸臣之底蘊著大臣於翰林科道部屬内各據所知多舉數人於五日内交送内閣彚奏候朕考試簡用庶得才品兼優之員以副掄才之大典欽此三年諭今年鄉試届期昨降旨令大臣等各舉數人以備考試簡用今思翰林科道部屬等官應差主考者人數甚多其未與保舉之例者亦著一同考試不願出差者聽欽此又議凖各省主考起程日期雲南貴州四川廣東廣西福建湖南以十日為限江南江西浙江湖北陜西以七日為限河南山東山西以五日為限倘有逾限逗遛者由部察實叅奏又諭每科主考差往各省彼地督撫有無餽送路費向無定例今朕酌量道塗之逺近分别路費之多寡雲南八百兩貴州七百兩四川廣東廣西福建湖南六百兩江南江西浙江湖北陜西五百兩河南山東山西四百兩爾等可行知各督撫遵照此數不得以私意増减主考等亦不得於此數之外更有所受將此永著為例欽此六年諭各省主考回京時例於該省存公銀内賞給路費朕念伊等出京時資斧艱難著户部每人先給銀二百兩該省於應給路費内扣除欽此九年諭今年鄉試届期著大學士尚書侍郎於翰詹科道部屬等官應差主考人員内擇其人品端方學問醇正堪膺衡鑒之寄者各舉所知交送内閣彚奏候朕簡用其非科甲出身及無真知灼見者不必强舉欽此十二年諭向來各省鄉試正副主考官有通行考試者亦有令大臣保舉者各科往往不同今歲大比之年各省正副考官著將應行開列人員通行考試其不願考試者聽仍於應行開列中著大學士九卿等將學問優長精於衡鑒者各舉所知宻封交送内閣進呈候朕簡用如此考試與保舉並行内有保舉而考列優等者固可簡任衡文即未經保舉而文藝入選者亦一并簡用其非科甲出身及無真知灼見者不必强舉欽此十八年諭本年八月鄉試所有各省正副考官著將應行開列人員通行考試以備簡用欽此一同考官順治二年定直省房考取本省科甲屬官不足聘鄰省科甲推知及教官必選取治行最年力强學識兼到之員罣議遷謫者不與三年定會試同考官翰林院及部科衙門推舉資俸優深者送内院裁定入闈閱卷十五年定會試同考官十有八人内易經詩經各五房書經四房春秋禮記各二房其應開送同考官各衙門除曽經直省典試及會試分房不開外其見在各官臨期移部題請簡用十七年定順天同考各官除郎中不差外吏部取各部員外郎主事中書評事博士國子監科甲出身官及近京亷慎素著科甲推知開列題請欽定各省同考督撫將本省及鄰省才望素著推知或科甲教職等官倍數宻取到省即日公鬮入闈以上各同考官先取進士出身者不足兼取舉人出身之人康熙五十二年議凖直𨽻江南浙江鄉試人數倍於他省應照㑹試例各用房考十八人雍正元年諭考官以秉公精鑑識拔文才為主何論曽否入闈嗣後凡遇鄉科各省督撫臨場調齊科甲出身之人不論己未分房監臨試以時藝一篇其文理優長者入内簾荒疎者供外場執事則分校得人而佳文盡拔矣欽此四年覆凖江西鄉試應加増詩經房同考官一人乾隆元年覆凖廣東鄉試應加増詩經房同考官二人三年議凖江寧安徽既増額分中應將易經詩經二房増設同考官各二人十八年議凖直省同考官除順天江南各十八人江西十四人湖南山西各九人陜西四川廣西各十人雲南八人毋庸議减外浙江酌減易經詩經各一房定為十六人福建酌減易經一房定為十一人湖北酌減易經一房定為十人山東河南均酌減易經詩經各一房定為十二人廣東酌減易經一房詩經二房定為十人貴州酌減易經詩經各一房定為十人二十一年諭外省鄉試同考官例於州縣内之科目出身者考試入簾然該督撫往往視為具文率以地方不甚𦂳要而辦事平常者充其選又或年力已近衰頺精神不能周到亦得濫竽其列夫衡文之柄雖專在主考而分房閱薦必藻鑑精明方不致有魚目之溷且應試大省士子或數逾萬人主考官即捜取落卷又豈能遍閱無遺如分校之得以從容詳審乎今歲鄉試届期所有各省同考官其令該督撫等慎重遴選精明考試擇其年壯學優者共襄試事以副國家掄才大典鎖闈不過匝月本任即繁劇原有委員代理於地方亦何貽誤耶可將此通行傳諭知之欽此一經理試事順治二年定順天鄉試用監察御史二人入場總理諸務廵察御史二人搜檢諸生進場由順天府咨呈都察院由院轉咨禮部坐名題差各省用廵按御史為監臨官又定京闈監試御史以一月前題請即於命下日進院三年定㑹試以禮部侍郎一人充知貢舉禮部司官二人充正副提調其監試廵察御史各二人均坐名題差十二年増滿監試廵察御史各二人十五年題凖殿試提調用禮部堂官監試用御史康熙二年題凖各省廵按已經裁徹用廵撫監臨提調用布政使司官二人監試用按察使司官二人如布政使署監臨事以按察使充提調守廵道充監試永著為例如廵撫間有事故以按察使署監臨事以守廵道充提調監試三年題凖會試及順天鄉試監試廵察御史停其坐名題請通行開列奏請簡用十八年議凖順天鄉試内簾増設滿漢御史各一人不與文事專司糾察其封門發題進卷分卷闗防諸事均令管理會試亦如此例行其新設滿漢御史與内外監試御史一同列名奏請簡用考官同考官閱卷之時御史向上對坐每晚停閱之時檢明卷數入箱考官與御史共加封鎖次日公同開閱不得私攜入房違者糾叅雍正七年諭各省鄉試之年舊例以廵撫為監臨以布政使為提調以道員為副提調以按察使為監試以道員為副監試朕思藩臬二官乃通省錢糧刑名之總匯入場一月有餘將地方公事沈閣遲延於官民均為未便况既有道員二人則科場之事已有大員料理不必又用藩臬即從今科為始各省以道員一人為提調官一人為監試官永著為例欽此十年議凖各省鄉試除場内之事専令道員二人料理至外場三次㸃名散卷稽察等事仍令藩臬二司與道員一同辨理乾隆元年覆凖各省鄉試亦照順天之例増設内簾監試官一人在道府内委用如道府人不敷用即於同知内遴委六年覆凖各省既設内監試職司稽察各房薦卷令其驗明登號並照京闈定例遵行九年覆凖棘闈封門之後官員毋得出入各省監試提調等大員有不得已而出入者在内之家人毋許隨出在外之家人毋許隨入違者照違制例議處十年奏凖外場廵察御史先期前往貢院大門外駐宿以便搜檢運送之供給及進院之夫役人等並主考同考監試提調副都統内外簾執事各官從役鋪陳等項逐一驗明搜檢放入以杜執事人役代士子懷挾之弊二十一年覆凖各省鄉試於八月二十日貼示三場試卷之後廵撫即可出闈其中督率事宜交與提調監試二道循例辨理不必令藩臬二司入闈關防一執事順治二年定順天鄉試外簾各官共用十六人於八府知縣教官内科甲出身者由順天府尹行取題用又定外簾四所書役必取土著正身以防頂替凡卷靣必印官役姓名以慿稽考四所官皆要精明强幹四所總門除送薪水一次外皆實封鎖提調監試輪日稽察竢謄録對讀完日方許徹封又定直省鄉試取醫士一名入場聽用十二年定㑹試受卷彌封謄録對讀監門等官均於内院中書科國子監光禄寺順天府等衙門官取用其廵綽官用京衛守備千總等弁供給所用禮部司官均豫行各該衙門開送坐名委定執事届期具題十四年題凖在京貢院外圍令兵部酌撥八旗官一員及兵丁分與汛地同近貢院本旗廵街之官晝夜廵緝永為定例十五年題凖謄録書手對讀生員各府州縣務細加考驗擇善書樸實之人開明籍貫年貎如有雇替將起送之官題叅各役正身及雇替之人皆從重究又題凖殿試受卷彌封掌卷用内院侍讀學士以下官禮部司官六科給事中内院典籍撰文辦事中書等官印卷用禮部司官廵綽用鑾儀衛供給用光禄寺禮部司務等官寫榜用内院禮部等官十六年議凖受卷各役在京責成大宛二縣在外責成附省州縣選撥勤慎書手共十四名造具年貎籍貫清册送提調官臨期選送受卷所令本所官細心督察又議凖謄録書手行各府州縣務令場期二十日前觧送到部該提調官按冊籍考驗堪用者印臂留用不堪用者駁回將原送官叅處書手到所之日該所官於每十名内選取總書一名以起責成其起用冊應令各府州縣一様起送二本一本留提調官察驗一本付本所官稽察對讀生員責成該學政行各學簡選年力精壯文理通明之士按年貎籍貫造冊交送提調内有㸃驗不到及朦溷塞責者將本生黜革開送官叅處康熙二年題凖各省印卷收掌受卷彌封謄録對讀等官以府佐貳首領並州縣正佐内由正途出身各官選用其廵綽搜檢供給等官於衛弁雜職内取用三年題凖㑹試及順天鄉試内外簾執事等官亦與正副考官等一並題請欽定三十二年議凖文武㑹試内收掌官將内閣中書中書科中書無論俸次盡行開列題請三十九年覆凖順天鄉試内簾分卷及印卷靣號印交與收掌試卷官仍用内監試御史監視四十年覆凖㑹試外簾例開光禄寺國子監順天府學衙門等官恐人數太少臨期將守部候選之内外七品官一并開列五十三年覆凖鄉會試號軍每多頂冐入場易於作弊應移咨歩軍統領嚴飭該管官弁務選正軍每十名内以一人為號頭將號軍靣用印記造冊送該管處如有作弊事發將該管官弁治罪五十四年定鄉㑹試兩翼欽㸃都統各一人副都統各二人恭領各一人散秩官各二人入場約束八旗應試士子三場試畢出場六十年定八旗都統等竢出榜一同出場雍正元年議凖順天鄉試外簾官原繫調取直屬州縣但州縣官各有地方專責不宜久曠職守嗣後停其調取由部行文各衙門將進士舉人出身之員外郎主事中書評事博士助教守部進士舉人並翰林院庶吉士行取主事開列題請又覆凖㑹試外簾官將翰林院庶吉士與進士出身之國子監中書科内閣中書等官開列四年奏凖場内每翼命副都統一人叅領一人散秩官一人與考試官一同進場稽察三場畢士子出場時副都統等官一同出場六年覆凖科場對讀例用五等青生惟順天除京學外兼將外縣新進十名以外之生員充補未免阻其上進之志嗣後應照見行例槩用五等青生對讀事竣凖復附生如人數不足以四等生員充補其以新生充補對讀之處永行停止又覆凖每翼各委賢能恭領一名於貢院甎門外一同㸃名又議凖考試期近兵部咨取副都統叅領旗員職名時各該旗副都統即將本旗老成勤慎能識漢字領催選出五名候宣旨之日各率至午門恭候得旨一同入場十一年覆凖㑹試外簾四所官照順天鄉試之例受卷彌封謄録對讀每所各用四人共十有六人又覆凖督門官二人鄉試旣用營弁㑹試亦不必定用部屬應照鄉試之例用千總二人督門三場畢徹囘乾隆元年覆凖順天鄉試外簾停止開列庶吉士其應用外簾各官於小京官及額外主事守部進士等官内開列又覆凖各省鄉試於調取通省應行分房之同知通判州縣等官内文理平常者供外場執事如不敷用仍調取本省佐貳差委又覆凖鄉㑹場應行文歩軍統領簡委營弁兵丁自入闈至出榜日皆令於貢院周圍廵綽仍將兵丁數目開報廵察官令其稽察如有違誤移送歩軍統領究治三年覆凖順天鄉試應加増謄録二百四十名共計千名以敷謄録之用按舊例謄録七百六十名均在順天一府調取事屬不均應於順天額數過多之州縣内減去二百六十名順天一府止觧送五百名其餘五百名令直𨽻總督照會試例於所屬州縣内酌量地方大小坐定名數該府彚齊加結先期送順天府聽用又覆凖江南鄉試外簾増設受卷官三人彌封官二人六年覆凖順天學政嗣後每遇鄉試之年將通屬四五等生員照冊開送順天府承充對讀仍飭各該教官嚴飭各生務須科場十日前赴該提調處齊集㸃驗其中實有患病事故必飭取該生里隣及該教官印甘各結以慿稽察如有托故不到者本生禠革開送官題叅議處八年覆凖鄉試五等青生不敷對讀請兼用四等武生免其録遺凖入武場鄉試十年奏凖㑹試凡八旗滿洲䝉古繙譯合為一場事務更屬繁多外場廵察御史既先期往貢院大門外駐宿並請簡大臣數人以便協同稽察十二年覆凖外簾各官隨從人役各帶二人副都統各帶三人叅領旗員各帶二人不得違例多帶以滋繁擾十八年覆凖廣西鄉試舊設受卷謄録官各四人各酌減二人二十一年覆凖㑹試及順天鄉試外簾執事各官由部咨取正途出身之主事以下小京官以上官員其守部進士舉人入簾之例悉行停止一送試順治二年定遇鄉試年照直省每中式舉人一名取應試生儒三十名提學考試精通三場者方凖應試不得將初學之士冐濫應試亦不許仕宦子弟於父兄原任衙門移文起送違者不許入場取送過多者叅處又定教官及在籍恩歲貢生監生願就本省鄉試者均許與生員一同考送卷靣書官字貢字監字别案𤼵落儒士必三場悉通者方凖應試至考選遺才務照應取名數録送其假滿病痊事結未經補考者不得溷録又定在京肄業貢監生均聽本監官考選科舉臨場不準改名改經其各省貢監生願就本省鄉場者與生員一例編號不得别分皿字若直𨽻貢監生内有仍赴學政及吏部考送京府應試者通編皿字號亦不許溷入生員至直省見任教職年力精强文學優長者凖提學考送應試八年題凖滿洲䝉古漢軍生員開科鄉試各衙門未入流筆帖式亦同生員應試又題凖新舊舉人起送會試直𨽻限十二月山東山西河南陜西限十一月江南江西浙江湖廣限十月福建廣東廣西四川等省限九月各如期起送如司府遲延違限聽部題叅又題凖順天鄉試例監生於本年援納者不凖本年應試十六年議凖例監生援納在前而部文劄監於科舉年方到者仍凖應試康熙三年題凖舉人考授内閣中書及見任者皆凖㑹試五年題凖直𨽻舉人責成順天等府起送各省舉人責成布政使司起送除欠糧緣事黜革及見在議處未結與罰科丁憂患病等項察實不送外其應試舉人於會試年前詳覈造冊限十一月内送部仍逐名給文於會試年前十一月初一日起至㑹試年正月初十日止赴部投文如過期投文者不凖收試地方官不照定限數部並遲誤給文者由部指名題叅七年題凖舉人就教仍凖會試九年議凖㑹試闗繫取士大典展期於二月初一日以内投文凖其會試二十八年覆凖滿洲䝉古漢軍應鄉試之監生生員均由兵部驗射馬歩箭能射者凖其移送順天府入場鄉試二十九年覆凖江南浙江每中舉人一名額定録科六十名應試又題凖直省本年捐納米糓監生皆凖其於本省鄉試又題凖奉天府滿洲䝉古漢軍鄉試之監生生員令奉天將軍副都統等驗射馬歩箭能射者交與該府丞分别考取移送鄉試三十年覆凖江南浙江録科額數每中舉人一名於舊額六十名之外加四十名三十二名題凖各省常平倉捐納監生遇鄉試之年亦與各項監生或在順天或在本省一例凖其鄉試四十四年題凖順天鄉試應試諸生務在場期十日以前咨送五日以前投納試卷逾限不凖入場雍正元年諭前㑹試舉人已經中式者除過犯黜革外其有因殿試謄録錯誤不合體式及有事故不得考者著禮部覈實凖其再行殿試欽此五年議凖官生録科飭令學臣嚴加考試不得徇情濫録如有文理荒謬者將學臣一并嚴加議處六年題凖外省貢監赴京闈者親齎地方官印文及地鄰甘結限鄉試年二月内到監其湖南四川閩粤滇黔諸省路塗遥逺凖其展限兩月到監該監驗明印甘各結留監肄業仍於録科時取同考各生互結凖其收考移送順天鄉試倘雖到監而規避考課並無互結者槩不凖收考七年諭各省拔貢聞已陸續來京旣不能應本省鄉試則當凖其應試北闈俾得觀光盛典凡拔貢之有貢單者皆著該部咨送順天府令其應試再修書各館内從前有外省生員在館効力者若情願入場考試著取同鄉京官印結保送順天府亦凖入場欽此又覆凖教官情願應試許呈報學臣入册送考倘藉應試私回鄉里者照無故擅離職役律罰俸九月又諭凡由舉人考試補用筆帖式者皆凖其與舉人一同㑹試至於由貢監生員考取小京官筆帖式之人其中未必無通曉舉業文藝者若因其已經得官遂不得與於鄉試則彼平日之所學莫由表見亦屬可惜著通行八旗凡由貢監生員考取之小京官筆帖式者若願就鄉試皆凖其與舉子等一同入場考試使片善寸長不致遺棄以副國家教養人才之典欽此十三年奏凖考試大典攸闗良賤名分宜肅八旗開户家人來厯不一當我朝定鼎之初有投充者有養育者有俘掠者本繫良民旣經開户即猶之復籍自應凖其居官並與考試至於旗下累世家奴實屬出身微賤或因已經開户當差効力著有勞績凖其居官已為不拘世類之寛典若並凖其一例考試則與出身微賤不凖考試之定例不符嗣後凡實繫旗奴開户者但許由旗下别途進身其本身及子孫永行禁止考試乾隆元年諭凡由捐納候選之貢監舉人例不得與鄉㑹試從前事例内有捐應鄉會試一款今捐例已槩停止此等貢監舉人有志科名者勢皆不得援例與試矣朕思此等人員尚在需次選曹與旣登仕籍者有間不得因捐資候選屏諸場屋之外直𨽻各省貢監生捐官願與鄉試舉人捐官願與會試者凖令一同考試以示鼓舞人材之意欽此又議凖在京新捐貢監若繫臨場期廹本籍遥逺實難取本地方文結者凖其取具同鄉六品以上京官印結並取同考五人互結録科送考如有頂冐情弊將本身及出結互結之京官貢監一併照例治罪又覆凖遇會試之年該州縣官於舉子具呈到日即出具文結申詳布政使司覈明勒限給咨不許胥吏任意稽延亦不得借端駮詰倘州縣官不詳請布政使司不即給咨該督撫察出指名叅處七年諭各省應試生員貢監由學臣録送入場向例舉人一名額取科舉三十名嗣後加至百名不為不多矣乃學臣等博寛大之名於科舉之外遺才大收一槩録送且有督撫普收送考者以致文理荒疎之人亦得濫冐入場試卷太多不但試官於倉卒之中難於别擇即浮薄士子將以觀光為游戲不復攻苦於寒牕於賓興大典甚有闗係嗣後學臣各宜留心慎重辦理毋得濫溢永著為例欽此八年覆凖臺灣孤懸海外其情形與内地不同向來額中舉人二名錄送鄉試者約五百人今遵定額止送二百名即應裁減過半恐無以鼓勵邊逺士子之心應將臺灣額中舉人二名許學臣依額録送之外擇其文理清通者酌量増加不得將文理荒疎之人普收送考至於内地錄科不得援此為例九年議凖直𨽻江南江西福建浙江湖廣為大省凖其每舉人一名録送科舉八十名山東山西河南陜西四川廣東為中省每舉人一名録送科舉六十名廣西雲南貴州等為小省每舉人一名録送科舉五十名其順天鄉試滿合夾旦南北中皿等字號應試人數雖屬無多亦必以精通三場者方凖録送嗣後即應試人衆仍不得過八十名之額十二年覆凖順天鄉試貝字號科舉照山東省例每舉人一名録送科舉六十名二十一年覆凖天文生由生員入欽天監肄業者該監將考取名額造具清册送部存案届期鄉試移送學政録科學政咨部與原册覈對相符方凖考録應試欽定大清㑹典則例卷六十六
