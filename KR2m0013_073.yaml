body:
  text: 禮部儀制清吏司學校三一考場規條順治九年題準學政出巡半月前行巡視學校牌三日前行起馬牌各提調教官遇巡視牌到將應考生童册籍及應行事宜逐一備完府提調官遇起馬牌到將應考生童數目開揭送核就近調取生童可足兩場者候考其餘俟下馬日品搭定期出示調取駐劄衙門須寬大可試千餘人髙垣厚壁環覆以棘不許故留水道穴隙及假墻虛壁一切弊竇吏書房不得近厨厠不得近巷市仍各總界一門門各異鑰鑰各異牌總貯一匣以時啓閉鈔案門皂等房與外房須隔以墻各備行竈淨器堂上設公座稍前置小公座以便接見試場須高敞不留空隙堂外甬道東西以千字文橫列編號每額懸粉牌一靣大書某字號懸鐙於上考案前後左右各相去各二尺上置界尺一下置淨器一案腳用長竹編結以防移動仍貼某字幾號於案上盡號止即照案數置坐號籖東西分為二筒每一號為一束又備造一册務令册對籤號籤對案號於學政到日呈送堂左設案二候置出題等書及照出手牌三十靣旁設大雲版一架堂東西壁各備出題長柄牌六靣提牌八靣小公座前置長案一北首置移席換卷丢紙説話顧盼攙越抗拒犯規吟哦不完小印十箇印色備中放東西文場坐號籤筒南首留與教官用印兩旁設受卷長案各一分置各府州縣學坐牌在上每案置界尺四呈文紙五十張筆墨硯各一照進長柄粉牌二文場四隅各置案一金四以備巡綽人役瞭望二門內大門外各設大鼓一先試一日提調官齊備生童試卷各照定式不許長短不齊卷靣三圈上圈書府州縣中圈書廪增附青社及武生童生填文武童下圈書習某經接縫處上用提調下用儒學各印鈴蓋置印信方簿靣開某府州縣生童號簿內開送考生童姓名生員注廪增附青社等字各名上留空白二寸許以便書號仍照千字文置籤一筒將形音相似如冰水王玉雨辰臣之類除去不用考前一日提調官信手抽籤記簿照號書於卷背後用教官印鈐蓋摺疊彌封再用提調印鈐蓋卷靣加浮籤書姓名第三圈下旁留少許以備填坐號填號處仍鈐提調印半在卷半在浮籤用印畢依照入牌人數每二十卷一封書某州縣生童第幾牌試卷入箱封鎖將號簿固封提調官署內具五經四子書性理通鑑綱目孝經小學及武經七書呈送以備出題試日用印卷受卷散籤給牌官東西各一人以教官充供給巡綽官各一人司儀門啓閉官一人以州縣佐二或府首領官充司照進照出牌官二人以巡檢大使充巡綽瞭望快手八名分為二班外用巡捕官二人以佐二首領官充報名吏二名書題兼受卷封卷書吏四名搜檢官二人以衛所官充帶領民壯二十名軍牢二十名分東西搜檢前一日皆開具姓名册呈驗仍於隔别州縣分撥二班以備臨期調換試日漏下五鼓外巡兵壯舉放號炮以便諸生齊集執牌吏將生儒依次排齊於大門外候門啓提調官入至儀門止吏舁卷箱隨入巡捕官帶民壯軍牢立儀門外兩旁先將執事官廪保內搜檢員役點進生童各持筆硯水注隨牌聼點州縣官於大門外照册唱名隨牌引至儀門外魚貫序立搜檢官連唱仔細搜檢兩旁齊應二人對搜一人搜畢提調官點名給卷執照入牌官引二十人至公座前聼點用隔别州縣軍壯覆搜引卷散籖教官在小公座前東西相嚮照點册唱名本生應名隨以卷呈東立教官案上用督學印一顆西立教官信手掣籖給本生即令吏書坐號於卷靣書姓名於坐號册東籤者東下西籤者西下各認號就坐進畢內搜檢官役出提調官教官繳點名册計入考若干名有不到者大書不到二字於本名卷上以空箱及鎖匙同繳提調官領坐號册率外搜檢官役出巡捕官稟領大門鎖鑰檢點大門內二門外並無一人方從外封鎖次司儀門官將儀門封鎖鎖畢堂上聲雲板堂上下皆肅靜吏執題目牌於甬路上下行走俾其熟視短視者立稟教官將題高誦二三遍不許往就兵快輪班登案瞭望凡遇各項犯規認定行次靣貌鳴金一聲高稟某字第幾號生童犯某事本生自持卷赴堂印記二人共犯二卷同印抗拒者重究如犯規不舉及不犯妄稟者官役重究巳時供給官稟明二門上擊鼓三聲許飲茶如厠一次重出者不準未時大門外擊鼓三聲堂上巡綽官接雲版三聲呼快謄真申時大門外重擊鼓堂上擊雲版呼快交卷酉時大門外重擊鼓堂上擊雲版不論己未謄完皆交卷不交者收卷扶出其原給號籖同卷交還執事官二人候立儀門內一收照出牌一司啓閉受卷官東西各一人督率封卷吏照府州縣坐牌每學以十卷為一束三束為一封注明某學三十卷某官某吏封送判收貯各卷箱交卷時本生將浮籤揭下帶回受卷官每收一卷先檢卷靣如不揭浮籤或書姓名門第關節及卷內夾帶片紙者不許給牌即時稟究篇數不完者印不完二字卷上有犯規等項印記不許給牌將卷付本生執立堂下候出盡詢繫移席換卷丢紙者生員黜退童生責懲餘弊生員閲卷定奪童生卷屛不閲領牌至三十牌足司儀門官稟請鎖鑰開門收一牌方放一人無牌者即繫帶出試卷司儀門官拘留稟究如交卷時值牌盡執卷立候等收足三十牌巡綽官公同數明繳上原案高聲稟收牌訖擊鼓一聲大門外巡捕官亦擊鼓一聲從外開鎖門止半開逐一放出把大門官吏不許入閾內二門官吏不許出閾外生員出盡收卷官計算收過籤數收過卷數與送考人數有無異同稟請點名册填送察核至發落先一日牌出提調官備絹紗絨花紙墨筆以為一二等生員奬賞紙筆紙花以為三等前十名奬賞當日送進提調吏書就等第名數起止文案呈提調鈐印訖次日開門提調官領出閲過試卷傳齊生童校對彌封及坐號簿拆封填名先拆不取童生卷次拆六等生員卷將各卷唱名給看彚繳如有字號舛錯等弊持案進稟如無别弊諭令先散次拆生員一等至五等及取進童生卷各填卷填案唱名給看若字號舛錯持卷進稟發案畢同原編號簿送核教官隨領諸生聼候發落先將訪過優劣生員同衆審問衆情厭服方行賞罰既畢諸生聼候唱名循序至簷下一等二等各為一班三等人多量分數起交卷領賞用鼓樂導引行優者居前次一等次二等者由中門出次三等由東角門出次四五等由西角門出發落不到者革頂帶限一月考奪取進童生即隨生員進以次發落又題準童生乃進身之始不可不嚴為之防學政文到先期曉諭報名取鄰里甘結身家無刑喪替冒各項違礙方準收試每府各州縣關會一日同考府試亦彙齊一日以防重冒務照入學名數縣取二倍府取一倍府考取録已定册報名數榜示童生照所取次序五人為一結取行優廪生親筆花押保結照格眼册式當堂令各童親填年貌籍貫三代經書彙為一册並各結狀黏送核對其點名册仍書年貌不對者不準收考每名仍開保結廪生姓名於下點名時廪生與同結五人互相覺察如有倩代等弊即時舉出容隱者五人連坐廪生黜革其府州縣原取之卷合釘封貯候發落核對至於寄學改回及稱遊學隨任等事别送者悉不準行發案日再行覆試筆迹雖同而文理不通亦不準入學詐冒籍貫投充入學及詭寫兩名隨處告考或假揑士大夫子弟希圗僥幸或繫優娼隸卒之家及曾犯罪名問革變易姓名等弊訪出嚴行究革若教官納賄容隱生員扶同保結一例治罪更有冒名頂替換卷代筆之徒尤屬傷風敗類臨時嚴察重治又題準學政按臨提調官送憲綱册首開提調正官次佐二首領教官各注在任公出等字以便接見見時免用手本次鄉賢名宦見在祀者各爵里姓名行實次旌過孝子順孫義夫節婦各姓名年嵗籍址行實繫何人舉報次先聖先賢祠墓次鄉大夫爵里進士舉貢科第次有無山林隱逸懷才抱德之士次鄉飲賔介行實姓名及某人保舉次射圃社學鄉約址所教讀約正副姓名次學田地畝廛房租稅數目次本郡州縣山川圖志名賢書籍碑刻古迹以上各為一册又格眼册將通學生員年貌籍貫三代所習經書及某年月日入學考取幾等幾名中間補廪補增停降發社收復科舉及丁憂緣事改名給假患病等類挨年月開明內廪增附青社各以資次為序廪停未降者附廪末降增附者列增附前增停未降者列增後降附者列附前緣事者注明曾否歸結患病給假原限何時復學丁憂者何時服闋纍次未經嵗考者原繫何因改經改學改名原繫何學何經何名問革者奉何衙門批問皆令各生親筆填注中有差錯各生任之惟患病給假許書吏代書候本生復學用紙大如格眼親書繳送以便更貼其武生亦照式填注册末凡舊案有名今中式應貢告免病故援例等事未經除名者均明白開款附於册後上用提調印下用儒學印候考校牌到一月內差人解閲如有錯漏增減隱匿者教官議處吏坐贓究革又便覽册開造通學生員若干名內廪增附青社若干名現在聼考若干名丁憂患病等項若干名必總撒相合其前案幾等生員若干名賞格幾何優劣幾名童生入學儒士科舉送考遺才各若干名止具總數並五科內鄉試及十年內所出題目候出巡下馬日送又覆準嗣後凡府州縣考試文武童生時即照學政衙門考試之例令本籍廪生一體保結仍於點名散卷時識認倘有冒替等弊將廪保黜革治罪若府州縣官不遵定例令廪保識認經學政糾參將府州縣官照溷行收考例議處又雇倩槍手代筆照誆騙舉監生員人等財物指稱買求中式例其雇倩代筆之人照舉監生員央浼營幹買求中式例知情保結之廪生照知情不首例再槍手之弊多由包攬之徒隨場窩藏射利嗣後如有包攬之人與槍手同罪其窩留之家不知情者照不應重律治罪其有入已贓銀者計贓以枉法論如有仍前草率完結者令該督撫指參將學政提調官分别議處康熙九年覆準嗣後江南鳳陽府屬之鳳陽鳳中長淮等三衛並上江所屬衛學皆照新安衛例與考童生責令該衛守備按名造具印卷印册考試録送提調提調考試録送學政其童生保結即令該衛廪生認保如無廪生該衛增附生員互保倘有槍手冒籍等弊即將該衛守備照例議處互結生員一例治罪至武童亦照此例辦理十年覆準嗣後苗猺生員應嵗科兩試彌封後别於卷面填注苖猺字樣以便學政閲卷時與民籍生員相校酌量位置又覆準嗣後學政按臨各府於考試招覆之日提調官即對明坐號姓名將縣府原取本卷解送學政與所取之卷逐一磨對倘文氣筆迹稍涉可疑即行按究則立法更為周密而代倩之弊可除二十八年覆準滿洲生員不能騎射者不準考試二十九年覆準奉天滿洲蒙古漢軍考取生員令奉天將軍副都統等驗射馬步箭能射者交該府丞考試又覆準州縣府考取童生不必限數照常考送如荒謬不通故意朦溷準學政核參其縣府兩試卷一併解送學政三連對驗筆迹雍正元年覆準童生考試由州縣送府由府送學政各加印結方準考取生員行令各督撫學政實心奉行嚴飭廪生不許擅保品行不端之士又覆準童生應試未取之卷槩不發出或學臣不肯盡心批點以致遺落佳文亦未可定嗣後嵗科兩試學政務將未取之卷批出不取緣由交與教官令該各童領去閲看七年定八旗送考童生照外省考試由本佐領考試過送本參領考取再報都統咨送學院入場之日各該佐領親率領催點名搜檢或生童等仍前代考夾帶或參佐領不秉公考試察出一并治罪又覆準嗣後八旗考試文童於四月以前由部行文該旗移取名册該旗於文到日將應試之人姓名年貌備造清册於兩月以前移送到部由部會同兵部將應試名册校對清楚如該旗兩月以前不移送到部者由部據實題參如禮兵二部不詳為校對以致遺漏舛錯者監射大臣據實題參仍將遺漏舛錯之人姓名補行改正入於册內準其考試嗣後考試每旗委參領一人每參領下委賢能官一人本佐領內管領下各委領催一名帶領應試之人送參領等官看驗於騎射時公同送考並將委出之參領等職名與應試人名册一并移送到部注册由部同兵部校對名册時亦傳集伊等公同對閲毋致遺漏舛錯射箭後入場之時亦令原委參領等識認送到如有對册考箭入場之時原委之參領等有不到者該部即題參議處九年覆準大宛二縣考場僻在通州以知州為提調兩縣童生非其統屬不能彈壓應改并貢院與八旗生童分作兩日考試順天府治中專司提調與府丞一同稽察頂冒代替等弊其中旗民應令各編字號毋致溷淆十年覆準順天所屬童生除大宛二縣外其餘二十三州縣童生州縣考後皆由霸昌道録取送院但該道駐劄昌平各州縣隔逺有多至數百里者而該道事繁不能按期考試守候需時嗣後二十三州縣童生於州縣考後免其遠赴昌平令四路同知各按本轄之州縣就近分考録取送院該同知於駐劄地方酌設考場關防愼密按期考試又議準八旗童生遇考試之年由部行文到日各參領遍傳各佐領下童生彚齊造册申送本旗都統擬定考試日期行文翰詹衙門咨取科甲出身滿官一人在該旗公所會同參領佐領考試應試童生於試日黎明齊赴該旗公所聽各該佐領點名識認以杜頂冒等弊試竣將録取童生數目呈都統造具三代履歷年貌滿漢清册移送到部轉送兵部考箭其試卷鈐印彌封巡邏搜檢等項均交各該旗委官辦理十一年覆準例載凡童生州縣考試於督學文到每府各州縣關會一日同考府試亦彙齊一日以防重冒其點名手册仍書年貌有不對者不準收考嗣後府州縣有徇情濫縱不肯點名及地方豪紳劣襟有倡縱閙場之處該學政訪聞即會同該督撫指名題參至童生院考該學政嚴察保廪如有假冒槍手等情即將保廪照例斥革究治十二年覆準嗣後學臣下馬即行封門考試先文生次文童將文案發過然後較試武場生童先考騎射次考䇿論俾文武內外場規肅清又覆準嗣後大宛二縣文武童生於嵗科兩試亦照例由縣審音考試試畢發案造册送府丞考試發案造册送學政隨棚考試其縣府原卷照例合訂以備核對如童生內有不經由府縣兩試者該學政不得濫行收試乾隆十九年覆準直省學政考試遇州縣應試人多府考事竣提調官豫將取録童生總數申報學臣存案以杜造册送院時胥吏受賄攙入冒籍互考姓名之弊學政按臨提調官按應考人數刋刻坐號戳記投納學署催齊生童試卷於卷面加貼浮籤開具姓名鈐以印信半在卷靣半在浮籤於卷後用小字編號折角固封生員卷鈐教官圗記童生卷鈐州縣官印再蓋以提調印是為彌封字號更置彌封册將生童姓名籍貫並卷後編號詳載於册封貯提調公署試日候學政門初啓即具點名册連卷箱一同投進其坐號姓名册停其進送學政於門內東西文場適中之地設公座兩旁各設長案每案酌量多寡委教官數人生童點名給卷時不鈐學政關防不别設號籤書卷面以致延誤晷刻但取提調官所進坐號戳記攪亂分為數盤配以印色各置兩旁案上仍各設空盤備用提調官於大門外點名每二十名一牌引至二門聽唱名魚貫而入學政堂吏給卷生童領卷後單名向東案雙名向西案教官各信手取坐號鈐於卷面隨以用過之號别置空盤生童認坐號就坐位點名畢學政以點名册發出封門教官以餘號及點名不到之卷封繳學政生童試藝既畢自揭卷靣浮籤交納試卷各記明坐號候啓門出學政閲卷取録止憑坐號發招覆團案覆試已定生員於等第全卷童生於取録各卷均鈐學政關防發交提調官拆出卷後編號驗與編號册姓名相符然後填榜發案一生童戶籍順治元年題準設寓學於京城遠方士子遊學者取的當保結準附順天府學一例考試又設廪十名照縣學例充貢二年題準寓學諸生本年鄉試暫分監生中額三名嗣後皆發回本省如父母墳墓向在北方即繫土著學政核實令入籍應試十一年題準教職子弟隨任入學者嚴加考試如文理明通發回原籍肄業其餘嚴行黜革又題準遼陽設立儒學其永平府遼生均歸遼學肄業康熙五年題準遼生寄籍山東者歸併山東各學考試寄籍永平者歸并永平府學考試其山東永平寄籍遼生並夾字號名色咸除去十年題準四川士子寄籍他省入學者各直省巡撫察詢自順治元年以來有願回籍者令其回籍蜀撫核明本生籍貫撥入該府州縣儒學考試四川學政將回籍生員造册報部直省各學政亦於報部册內注明回籍以便察核如有冒籍四川希圗應試者本生黜革治罪該地方官參處又題準安插墾荒武辨永駐入籍納糧當差者其子弟均準考試十六年議準凡監生生員有冒籍者許本生赴部自首改歸原籍免其斥革在外赴學政自首改正報部三十九年覆準在京冒籍生員除入籍二十年以上者不議外餘以部文到日為始限兩月內具呈自首改歸原籍如過期仍照例黜革四十年覆準嗣後如有彼州縣在此州縣入學又有同省異府同府異縣冒籍入學許本籍童生出首將不能察出各官題參治罪又覆準廣西土官土目子弟有願考試者先送附近儒學讀書確驗鄉音收送如試官竟自收考及土官禁遏與試者該撫題參交部嚴加處分四十二年題準貴州童生照滇省例許同省各府之人應考俟人文充盛再行禁止六十年覆準直𨽻冒籍生員以部文到日為始限兩月內具呈自首改歸各省亦照此例遵行雍正二年覆準貴州儒童日漸增益即下州小縣亦可不至闕額嗣後將考取童生隔府隔縣撥入别學之例永行禁止又覆準各省異籍之人每臨期冒稱本省住居窵遠頂替代倩無從察核令該學政飭地方官並提調官教官嚴行禁止如有徇私容隱等弊察出將冒籍之人與頂替代倩並保結之人從重究治該地方官并提調官教官照例議處又覆準寄籍生員內有食廪挨貢者應照康熙六十年之例盡行改歸原籍食廪挨貢悉照本身年分次序其父兄既經改歸則子弟自不能援例冒籍三年覆準直隸冒籍生員自康熙六十年議定改歸原籍限期兩月今行至四年猶未止息嗣後有未經呈首者一槩不準改歸察出照例黜革又覆準貴州黎平府永從縣二學半繫五開衛人今五開銅鼓歸黔管轄其生童就黔考試無容置議至黎平永從二學自衛改縣治劃清地界令隸府屬者歸府隸衛屬者歸縣仍將分隸之處報部又覆準廣東廣州十二衛東莞等二十六所軍户田糧皆歸并附近州縣其衛所軍童入學原有定額名數今一衛所戶口屯糧有收入附近數州縣者若各就屯糧歸併之州縣則零星難以考試嗣後仍歸從前原考之州縣考録申送四年覆準甘肅平涼衛附近屯民編列衛籍準赴平涼縣考試照舊撥府學兼管岷州衛西固所附近屯民亦準赴岷州廳考試其歸德所向繫河州統轄今河州衛雖裁而生童考試歸并河州其歸德所生童亦照例附入河州考試五年覆準盛京幅􅊷廣闊未便總屬奉天府學教官稽察見在滿合字號入學諸生一百十有九人詢明居址撥歸各相近之州縣學令該學教官與本學民籍生員一同管束每遇嵗科正考即由該學申送府丞考試一案發落按其名次補廪補增出貢其見在府城及承德縣界居住者仍隸府學嗣後滿合童生考試之前先令該將軍將各童居址開送府丞以憑入學時分撥附近之州縣學六年議準寄籍廪生改歸者皆改為候廪與原籍諸生照考案先後挨次新舊間補較其食糧年分挨序出貢至嵗科考試童生飭令該地方官核明實繫土著之人取具廪生的保五童連名互結方準收考倘有仍前冒考者除本童照冒籍例治罪外并將廪保黜革互結之各童一同治罪仍將收考地方官照濫行收考例降一級調用又議準廣東韶州右翼鎮三營兵丁隨師入廣迄今三世分防各縣田宅墳墓皆在斯土無籍可歸與入籍二十年以上之例相符應準其入籍分防之各縣照商童用商人保結之例於縣考時令各營該管之千總把總出結保送並令各營童五名互結先期投遞本管專轄官以便移送入籍之各縣該縣驗明即準收考倘有不繫兵丁子弟及入籍未滿二十年者本童並互結各童濫行出結之武辨照例治罪再民籍廪生與營童聲氣不通恐借端勒索業有本營保送準暫停民籍廪保俟營童中有入學補廪者再準保結其别處有與韶州鎮事體一類者照此例遵行又覆準江南蕪湖寄籍童生計其入籍已二十年以上該地方官秉公察核按其入籍年分造具清册申送學政準其與考其已經入籍蕪湖之人不許仍在原籍地方考試又覆準粵東廣州潮州等府屬向有通考之弊隔府隔縣濫冒入學者甚多童生取進後各歸本籍教官多不識靣百弊叢生應照臺灣改歸本籍之例限兩月內許其具呈自首該地方官會同教官逐一核明改歸原籍七年議準浙屬冒籍文武生員除入籍二十年以上有田産廬墓者不議外其餘照臺灣例限文到兩月內具呈自首改歸原籍其廪增改為候廪候增俟改歸後考居優等準其與本籍諸生按名次間補仍照原食餼年分挨次出貢如過期不首黜革治罪又覆準四川烏蒙鎮雄二府改歸雲南應將寄籍二府生員並舉貢監生按其的實籍貫改歸應試除烏蒙府並無土著生員不議外其鎮雄府土著文武生及舉貢監生均改歸雲南應試該撫造册報部又議準湖南鎮溪所學生員九十餘名外籍冒占者三十餘名照冒籍苖猺改歸之例限兩月內具呈自首地方官教官察明改歸原籍其中廪增改歸者令其以附生應試俟改歸考居優等方準挨補嗣後再有冒籍鎮溪所者將該地方官照明收冒籍童生以占本縣正額之例降二級調用廪生即行褫革本童照冒籍例治罪又辰州屬之五寨司向來亦多冒籍亦照此例釐清該學政仍造清册報部稽察又議準浙省舊俗多有以出繼外親之姓與考入學又有因試不獲售急於進取即以他姓赴考僥幸入學者許其具呈自首令本學教官逐一究明的實姓名加結申詳改正學政於學册內注明報部嗣後生員不復本姓及童生冒姓入學者除本人褫革外仍將失察教官及濫送之地方官照例議處行文直省一例遵行九年覆準湖北從前寄籍諸生照浙江之例限文到兩月許其呈首改歸原籍但自首改歸諸生又多冒名頂替之弊今湖北生員有遠至數百里千餘里者居址遼隔真假難稽以甲換乙勢所不免應令該生於自首呈內開明原籍族黨鄰里三代名字及本身年貌因何冒籍緣由該地方官會同該學教官察核明晰加具印甘各結造册報部準其改籍應試嗣後如有冒名頂替等弊發覺將出結各官嚴加議處其應試童生照定例入籍二十年準其收考如有仍前濫冒送考者將本童並送考之地方官照例議處又覆準廣西泗城鎮安二府見無應試童生應令外省及本省異府之人有情願入籍者具呈府縣送入煙户册即申詳布政使司咨詢本籍如無過犯準其入籍考試仍呈明學政衙門注册該學政於考試時按籍而稽如册內無名不得濫考入學中舉之後照奉天定例不許移回原籍其子弟及兄弟之子同時入籍有名者準其考試無名者不準冒考至入籍後飭令地方官嚴行稽察如有行蹤詭祕不守本分者立即逐回原籍地方官失於覺察該管上司指名題參照例議處再童生應試例用廪生保結及五生互結泗鎮二府既無廪生應令入籍考試之人即為土著童子之師使之薰陶漸染以開其愚蒙至應試時即令以業師為保結其慶逺府屬之荔波州東蘭州太平府屬之寧明州既無應試生童與泗鎮二府相同應準照此例嗣後如有土屬內以土改流之州縣亦均照此例俟十科後均行停止又覆準楚省士子寄籍黔省入學越占黔省士子額數應照浙省改歸原籍之例令地方官會同教官將黔中寄學各生逐一改歸楚省該學政别造清册報部察核又覆準順天府考試童生例由大宛二縣嚴加審音的繫本籍童生然後造册由府送院嗣後令府尹不時稽察如大宛二縣視為具文朦朧申送照徇庇例議處如既經送院之後不肖廪保有借端索詐者亦照例治罪又覆準四川茂州羌民久列版圖載糧入册與齊民無異應準其與漢民一同應試卷靣不必分别漢羌取額不必加增憑文去取廪貢科舉一循定制候人文蔚起再請增額其所屬汶保二縣羌民果能觀感興起亦照此例考試十年覆準嗣後苖童應試用漢廪生一名苖生一名不論廪增附生公同聯名保結照定例用五童互結如有民童冒入苖籍者一經察出將保結各生究問褫革教官濫行收試者題參議處又覆準湖南永順桑植二縣尚未設有學校其撥歸永順之生員四十名應令其暫附安福縣學與本學生員一同考試仍將撥歸之生别造清册送部察核其撥歸永順之廪增照舊注册應出貢者準其一例出貢其增附生有考居前列者與本學生員照考案先後挨次間補十年諭冒籍頂名例有嚴禁况嵗科考試為士子進身之始尤宜加意清釐江蘇地方童生應試率皆彼此通融互考甚且有一人冒考數處或多作重卷數名以為院試時售賣之地者此種弊端所關士習匪淺朕思各府州縣皆有煙户册籍難以朦溷誠於州縣考試之時童生報名校對煙户無訛方許廪保填結府考院考皆令原保廪生識認則冒籍頂名之弊可除著該督撫轉飭所屬實力奉行不得視為故事學政亦不時稽察如有仍蹈前轍者察明按律究治欽此十二年議準嗣後寄籍之恩拔嵗貢生勒限三月許呈首地方官申詳學政改歸本籍其見任教官內有繫本邑及鄰邑之人亦令呈明改歸本籍仍聽隔府調補如逾限不行呈明一經察出照冒籍例題參褫革治罪至由俊秀寄籍捐納貢生者亦令地方官飭令依限自首一例改正又覆準各省教官有隨任子弟遇考試時即令在見任地方冒籍入學殊干定例嗣後遇嵗科考試令該教官出具並無子弟隨任冒考印甘各結申送學政衙門存案如有仍前冒考者一經發覺除將本童及廪保褫革治罪仍將該教官題參議處其從前有隨任冒考入學者以文到日為始限兩月內許其具呈自首改歸原籍如過限不行呈首察出照例黜革十三年十月議準八旗開户人等當我朝定鼎之初有投充者有養育者有俘獲者本繫良民既經開户即猶之復籍自應準其考試至於旗下纍世家奴實屬出身微賤其本身及子孫考試永行禁止又議準川省各屬寄籍之生員限文到兩月內許其具呈自首該地方官會同教官逐一改歸原籍其子弟亦令隨父兄改歸本籍考試如寄籍各生有逾限不首及子弟有仍前冒考者將該生究問黜革冒考之子弟嚴加懲治又覆準粵東廣州等府從前考進雷瓊等府屬之貢監見在呈首者該學政造册報部改歸其未經呈首者以文到日為始限兩月自首改正如限內不首一槩不準改歸將來倘在地方恃符生事或經訪聞或被告發繫附籍之貢監照例黜革仍從重究處又覆準粵省各衛所屯軍籍童生額多人少且軍民兩籍冒考控訐不已應照直隸河間等衛裁并歸縣之例將粵省各衛所屯童生歸入見在住居納糧之州縣民籍內應試所遺各軍籍撥入各該府學文武童生額數悉由各該屬州縣民籍內一同憑文撥取又覆準黔省畢節縣屬之赤水河北地方撥歸永寧縣統歸川省管轄所有赤水河北儒童自永邑歸川之後即赴永寧考試入學已逾三年而文武生員嵗科兩試至今仍赴黔省應將畢節縣河北地方之文武生員改歸永寧縣仍令該學政將撥歸之文武生員備造清册送部察核並嚴飭改歸以後不得仍入原籍考試乾隆元年覆準滇省廣南麗江普洱三府及昭通府屬之思安永善二縣鎮沅府屬之恩樂縣東川府屬之會澤縣見在夷多漢少人文寥落難以敷額除見任本處官員子弟不準入籍考試外如有異省及本省異府之人情願移家入籍者準照廣西太平等府之例同土著之人一同考試或該地方漸染薰陶人文日盛可以無慮闕額即將入籍夷鄉之例奏請停止其從前寄籍各學之生若改歸原籍則土著無多未免學校空虛應免其改歸原籍二年覆準江南昭文崇明士子考試將薛家等沙畫定界址以崇明之半洋大安戲臺沙為準沙以南赴昭文崇明考試沙以北赴通州考試其有田産在江北沙洲而見今居住崇明境內及新近遷入通界未及二十年者仍在昭文崇明考試其向繫沙洲入籍在通見有廬舍户册足據不論是否二十年有無墳墓皆準其赴通考試如將應在該州考試之人或妄行攻揭及廪保抑勒者照例分别治罪至從前冒考通籍入學者照寄籍改歸之例限文到兩月內令其據實自首準其改歸原籍如逾限不首即照冒籍例治罪又覆準川省實多湖廣等省遷移之人其各學生員內如有外省之人假借糧名冒考入學者定例二年以來自己察明改歸至既經在川置有田宅承糧應差父母妻子聚廬而處即不得聼其任意改歸且有此縣實繫本籍而希圗彼縣便宜或稱同姓為本支或指田糧為證據本生借名改歸各學互相攻詰事屬紛擾適滋冒考之弊應將川省寄籍改歸之例即行停止三年覆準廣西泗城鎮安二府及慶逺府屬之東蘭州荔波縣太平府屬之寧明州準令外省入籍考試之例即行停止仍令該府轉飭該地方官留心稽察嗣後倘有外省之人竄名冒考情弊將本人及廪保照例治罪并將失察官題參議處又覆準滿洲漢軍考試各有一定籍貫不能溷淆惟內府及王公府屬人員有假充莊頭子弟隸內府管轄編入上三旗者又有舊漢人在內管領下及下五旗王公府屬旗鼓佐領內者此等人員原繫漢人並非滿洲因考試之時皆由滿洲都統咨送是以從前每有在滿洲額內入學中式者應行文內務府並八旗滿洲都統有內府及王公府屬舊漢人誤在滿洲額內入學出貢應歸入漢軍額內考試者定限三月逐一清出緣由取具該參佐領印結造具清册咨部存案嗣後內府王公府屬人員考試之時內務府及八旗滿洲都統務嚴飭該管官逐一稽察其投充莊頭子弟及內管領旗鼓佐領之舊漢人均别册送部歸入漢軍額內考試有將應歸漢軍考試之人造入滿洲册內咨送者察出參奏將該管都統佐領照朦溷造册例議處又覆準定例入籍二十年以上方準應試蓋謂無籍可歸者而言如本有應考之原籍而以寄籍地方見有田廬可據兩處考試者此等僥幸之習斷不可長應令地方官逐一稽察如無籍可歸而入籍之年又與定例相符者方準收考其或寄籍地方雖有田廬而實有原籍可歸應令地方官彼此關會將此等童生撥回原籍考試倘實繫無籍可歸申詳督撫學政許其應考立案如無知之徒聚衆攻擊者為首照誣告人杖罪加所誣罪三等律杖六十徒一年為從減一等杖一百仍停其考試四年覆準廣西泗城鎮安慶逺等府西隆歸順東蘭等州外省入學之文武生六十餘名非見任官之子弟親戚即各衙門西席幕賔應令該學政究明咨回本籍肄業應試仍分晰造册報部以杜冒濫之弊又覆準從前冒籍順天生員除康熙六十年雍正十三年勒令改歸後或仍有實繫南人認宗冒考或本繫南生重考入學者統以一年為限令該教官逐一詳報學政暨順天府丞並許該生自首均改歸原籍如逾限不改察出褫革仍令該教官出具並無冒籍印結申詳存案務秉公確實勿許借端苛求嗣後考試應仍令該學政嚴飭該教官廪生等於應試童生務逐一認識出具保結該縣及該府丞於府縣考之前詳加審音倘仍有前項認宗冒考等弊除本人治罪外仍將不行稽察之各該管官以及廪保等照例分别議處五年覆準八旗投充養育俘獲人等曾在主家服役開户之後究有主僕之分其子孫應不準考試至别載册籍人户內惟奉旨準其居官考試及抱養民人本繫良家者均準考試外其餘考試一槩停止七年議準安插江西改土為流之土司子弟準照湖廣等省苖猺例一同入籍考試八年議準商童考試例由鹽道衙門録送雖有廪生保結仍以甲商保結為憑嗣後如有甲商濫保冒籍者即將該商斥革照不應律治罪九年覆準川省土著甚少多繫湖廣遷移之人各府州縣互相冒籍入學嗣後有居住該州縣而入學他邑限文到兩月內自行呈首將里居田糧墳墓逐一造册該州縣務徹底清釐册送學政察核仍交該教官與本生一體考察按季報學政分别勸懲如逾限不行呈首即行褫革十年覆準冒籍順天考試之人除入籍二十年並無原籍可歸外其未滿二十年及已滿二十年有原籍可歸者統以部文到日一年為限由科甲出身之見任官及候選之進士舉人貢監具呈大宛二縣申順天府尹廪增附生員呈該學教官申順天府丞轉申學政均咨回本籍報吏部禮部注册生員食餼挨貢照舊例按年月次序倘逾限不改一經發覺生監舉貢及職官進士皆照例斥革奉行不力之該管官罰俸一年自行察出者免議又覆準順天府丞考試移咨都察院奏委滿漢御史各一人會同審音如有冒籍將廪保褫革照變亂版籍律杖八十受財者計贓論十六年覆準廣東商籍生員册開二百餘名其應嵗科考者僅百餘名餘皆入遊學患病項下至鄉試之時始赴補考録遺是商籍諸生平時半回本籍並非實繫商人子弟相依不能逺離者可知嗣後必實繫商人子弟在行鹽地方居住不能回籍應試者方準於商籍應試若雖繫商人一族而不住行鹽地方及他姓子弟冒入商籍者將保送之商人照例究處一衡文黜陟順治九年題準生員考案一等文理平通增附青社俱補廪無廪闕附靑社先補增無增闕靑社先復附仍各候廪原廪增停降者準收復照序補廪二等文理亦通增補廪附靑社補增無增闕靑社先復附原停廪降增者準復廪增降附者止準復增候補不準補廪三等文理略通原停廪者準收復候廪其丁憂起復病痊考復緣事辨復及原增降附者亦準收復照新舊間補青衣發社者準復附廪已降增者不準復四等文理有疵廪姑免責暫停食餼不作闕子限讀書六月送考定奪原繫停降者不準限考至下次嵗考定奪增附靑社均撲責示懲五等文理荒謬廪停作闕原停廪者降增增降附附降靑衣靑衣發社原發社者黜為民六等文理不通廪膳十年以上發社近六年以上與增十年以上者發本處各充吏不願者聽餘皆黜退為民內進學未及六年者發社雍正二年覆準各省學政務恪遵定例秉公考校分别等第以示勸懲毋得過寬徇私其或有州縣人文果盛確無荒謬不通之卷亦不必苛刻推求必列後等以示無私又覆準八旗生員特恩給與錢糧贍養讀書若無考校恐或怠於誦讀令該旗都統於嵗考前將領錢糧生員備造清册咨部轉送學政嚴加校閲考居前等者照常領給居四等以下者停其給發遇下次考居一等二等三等照漢廪生開復例仍給原領錢糧如四等不願再考即將學册除名聼其復歸護軍驍騎當差又議準嗣後令八旗都統遇嵗考之年將各佐領生員嚴催赴考學臣照考漢生員例優等補廪補增劣等降靑降社但八旗生員有考箭之例文理兼長為難如無甚荒謬不必苛求但置之後等一勸懲優劣順治八年題準該管有司官於諸生進見須設立門簿或公事或私事或自搆訟或為人訟或自為證或被牽訟全載情節其有事不干已輒便出入衙門乞恩網利議論官員賢否者許即申呈學政以行止有虧革退若糾衆扛幫聚至十人以上罵詈官長肆行無禮為首者照例問罪其餘不分人數多少盡行黜革為民又題準在學生員凡遇萬夀聖節元旦冬至及丁祭一應禮儀務須整齊嚴肅有高卧不赴與舛錯驕蹇者即行責治如以浮靡輕佻相高縱酒宿娼蕩間踰檢自等於市井之輩有犯必黜不得少貸又題準各省生員間有身列黌宮見充書吏者又有原繫積年衙蠹經犯罪名蒙溷入學者皆斥革嚴究治罪至見在衙門應役之人冒應童試嚴察重治廪生教官扶同保結者并行議處九年覆準士子有敦本尚實行誼表著者提調官細加體察取具本學師生及本族鄰里甘結申送學政核實即加奬賞若有平日不務學業囑託把持武斷包攬或揑造歌謠興滅辭訟及敗倫傷化過惡彰聞者體訪得實不必品其文藝即行黜革但行優者不許通同賄冒行劣者不許徇情姑息並不許輕信開送致被挾私中傷違者從重參處十五年題準各學劣生有不遵條例者教官揭報學道嚴行褫革如教官徇情不報罰俸六月至三名者革職學政經教官揭報不盡法懲處被撫按糾察每一名以上罰俸六月三名以上罰俸一年五名以上降一級七名以上革職至舉優行者以孝弟為先不得以操履平常充數如有扶同受賄情弊察出將教官重處康熙二年題準教官徇情不報劣生者一名革職學政不盡法懲處者一名降四級三名革職雍正元年覆準飭令各省學政務細加察核生員有品行端方行誼表著即奬賞列薦送入國學其品劣敗倫者即行黜革各教官務舉核確實如有通賄濫舉挾讐妄劾者學政察出即題參議處教官之舉劾咸當者於計典內聲明列薦學臣報滿之日將任內舉黜之數奏聞造册報部察核又覆準自來學政考試文武生員衡文之外未聞舉一優行黜一劣行著再申飭學政轉行教官實心訪察有居家孝友品行端方者列為上等至若武斷把持過惡彰聞者列為下等造具實行淸册於學臣按臨未經考試之前申送察核學政衡文時閲其文理優長而品行端方者拔置上等給以奬賞至册開下等生員廉訪得實即行褫革報滿之日將任內舉黜之數别造清册與考册一同報部察核又議準邇來貢監妄生事端皆由無人約束所致嗣後令學臣會同督撫轉飭地方官除恩拔嵗副正途外凡捐納貢監生細加察訪如有敦本尚實行誼表著者出具印結申送督撫提學會同確訪無異即加奬賞其有倚恃護符行止不端亦令申報造具淸册嵗終彚册送部察核二年議準嗣後除文武生員謀殺故殺人及戲殺誤殺過失殺傷人者仍照例治罪其原有欺壓情形一時爭競互相鬪毆致死者亦仍照鬪毆殺傷例治罪外如有武斷鄉曲倚仗衣頂橫行欺壓平民其人不敢與爭旁人不敢阻勸將人毆打至死者質審確實從重擬斬監候秋後處決三年覆準飭令直隸各省督撫學政嗣後如有生監人等假托文會結盟聚黨縱酒呼盧者該地方官即拏究申革其有逺集各府州縣之人標立社名論年序譜指日盟心放僻為非者照姦徒結盟律分别首從治罪如地方官知而故縱將該管官從重議處四年覆準學政每嵗舉報生員優劣皆由教官造送但恐頑劣之徒教官或畏其讐恨不敢舉報嗣後被褫劣襟如有挾讐肆橫以圗報復者照所犯應得之罪加一等治罪如教官任其為害不行揭報告發或被上司訪察將教官一并嚴加議處五年諭各省學政奉命課士黜劣舉優乃其専責嗣後學政三年任滿將生員中實在人品端方有猷有為有守之士大省舉四五人小省舉二三人送部引見朕親加考試酌量擢用見在報滿各學政即遵照薦舉其到任未久者如有所知亦即舉出夫一省而舉數士不可謂無人學政巡試各府三年之久日與士子相親考文察行不得謂不知但能虛公衡鑑所舉必得其人且風聲所樹凡讀書士子必皆鼓舞振興於士習人才大有裨益該學政其各實心奉行毋得茍且塞責如有徇私冒濫等弊必嚴加治罪欽此又覆準貢監既令學政約束應照依生員之例令州縣官設立門簿凡貢監出入衙門逐一填造每月申報督撫學政嚴加察核又覆準捐納貢監咨部褫革後始行審理文書往來動經旬月嗣後有應褫革者令地方官申報督撫學政事屬督撫者督撫移咨學政事屬學政者學政移咨督撫即褫革發審再具文報部至年終仍將審明緣由造册送部以便察核又覆準貢監生員舉報優劣有司教官務將確實事迹明白指實以憑督撫學政秉公察核督撫學政仍親加體察以杜欺誑凡學政報滿之日將核定優劣貢監生員榜示通衢使知榮辱攸分六年議覆近年各省學政舉報優行並無一人開報劣行不過將緣事已革者造報塞責總由三年任滿方行造報其中不免瞻徇顧忌市恩沽譽嗣後學政每考一處各學教官即將所屬文武生員優劣款迹秉公據實開報其府州縣亦呈送優劣密單該學政再細加訪察倘府州縣及教官開報不實或有通賄濫舉挾嫌妄報者即以袒庇營私參處如舉報得實於考畢時靣行奬戒將各生姓名造册達部存案於三年任滿時具疏彙題優者升入太學肄業劣者褫革其先經達部之劣生果有改悔向善者仍於任滿彙題時聲明除去原册劣生之名倘學臣有瞻徇隱漏情弊察出照例嚴加議處奉旨依議夲內議稱劣生果能改悔即除去原册劣生之名等語夫分别優劣以昭勸懲原以望其自新但人之遷善亦有勉強於一時而不能始終如一者倘既除劣生之名將來又復開報不但紛擾亦且非體嗣後凡有劣生改過自新者即於册內開注不必除名又覆準嗣後士子作文以明理為主放誕狂妄之語應行禁止令該教官及地方官嚴切曉諭仍不時察訪如有妄肆譏訕侮慢聖言治以應得之罪倘教官及地方官容隱不究一并嚴加議處七年諭士子者百姓之觀瞻士習不端民風何由得厚是以考課士子設為舉優黜劣之典以為移風易俗之道所關亦綦重矣而無如教官學政往往視為具文奉行不力每當按試之時教官則以無優無劣具文申詳如此則善者何由而勸不善者何由而懲夫善者之湮沒不彰一時尚難覺察而不善之人僥幸茍免於目前不旋踵而劣迹敗露每見蕩間踰檢犯法亂紀之士皆從前學政教官之未開報劣行者其間情罪雖難一一追究然即此可知其中之容隱不少矣嗣後若教官沽名邀譽縱容劣生不行舉報者經學政察出立即指參將教官照溺職例革職若學政瞻徇情面不行糾參者一經發覺將學政照徇庇例降級調用將此永著為例欽此又覆準告頂生員嗣後應照禮部覆準生員五人互結之例結得並無抗糧包訟等情一生犯事互結之生同罪於每年十月內投遞該學教官加具印結並於嵗考時别造優劣淸册一同送學政稽察有行止不端者仍即詳請褫革如徇情袒護一經察出照徇庇例議處又覆準嗣後學臣考試府州縣教官各自呈送優劣密單如有互相關會情弊學政察出題參議處又覆準各督撫轉飭地方官將欽依刋刻臥碑御製訓飭士子文敬謹刋刻裝潢成帙奉藏各學尊經閣內遇督撫等到任及學臣到任按臨於祗謁先師之日該教官率生員貢監等詣明倫堂行三跪九叩禮畢教官恭奉宣讀令其拱聽如有無故規避者行學戒飭其有居址遙逺者令其輪班入城恭聽宣讀至生員貢監內有唆訟抗糧緣事曾經戒飭者令其階下跪聽以示懲戒倘該教官不實力奉行或借端需索奉行不善者該管上司題參議處又議準文武生員緣事斥革審訊者如繫具題之案部文到日即移會學臣若外結之案承審官於事結後限一月內即鈔招録案申報學政分别開復除名以杜弊端如承審官遲延不報者罰俸一年八年議準優生升入太學事關大典不容冒濫今各省造報優生少者僅二三名多者至八九十名不等其請升入太學者並無優行實迹亦有未經聲明應否升入太學者應令該學政再確訪實迹取具府州縣官及儒學印結學政出具考語果繫文行兼優者照原議升入太學給與印結彙送淸册報部其武生如果文行騎射兼優者亦照文生之例升入太學至所報劣行生員册內有稱改悔自新者應毋庸議其餘悉照原議斥革十二年覆準舊例有司所設門簿例由各學造送學臣鈐印分發州縣而州縣有司多以學校非其専責往往沉閣遲延按知府一官於學校考試原有提調之責州縣案件無不周知嗣後門簿應由學政鈐印將諸生二字易為貢監生員照式刋刻夲條全文交與該府轉發州縣遇事登記該州縣於季底申送該府轉呈學政衙門察核又議準嗣後如地方官果有不公不法凌辱士子等情生童等身受其害者準其赴該管上司控告該上司秉公審理將該地方官題參按其情罪之輕重照例議處倘繫情虛將該生童等治以誣妄之罪倘該上司袒護地方官不行準理或徇情營私一經發覺將該上司從重議處如有豪橫之徒逞其一時私忿輒聚衆罷考挾制官長者照山陜題定光棍之例分别首從治罪其逼勒同行之生員褫其衣頂童生記名册案槩停考試如合邑合學同罷考即將合邑合學罷考生員全褫衣頂童生全停考試仍照例分别杖責如已經懲治之後果能改過自新該督撫會同學政察實具題請旨倘學政暗中寢息或將罷考案內之人濫行收考者該督撫指參將該學政照徇庇例議處督撫通同徇隱一經發覺一并嚴處至該教官有教導士子之責倘有生員等罷考是必其平日不能約束所致應將該教官照溺職例革職倘於生童罷考之時該教官畏懼處分或有同城武辨與之從中調處寢息其事者皆照私和公事例治罪乾隆元年覆準學政舉報優劣於三年任滿時彚題嵗考去彙題尚逺科考則去彙題甚迫如科考亦同嵗考舉優黜劣其優者固不免粉飾幸邀而劣者以迫於彙題旋報旋革未免阻其自新之路嗣後直省文武生員祗令學政於嵗試時隨場舉報優劣一次造册送部仍俟三年試滿彙題至科試停止舉報優劣有抗糧唆訟行止不端等弊仍許各地方官不時詳報大者請革小者按所犯之罪分别戒飭又覆準嗣後監生果繫豪橫不法及行止有虧者有司先詳報學政斥革以便審訊即報禮部審繫無辜實屬干連者詳明開復倘該管有司或借端寃抑出入人罪將該地方官照例參處又議準生監既並隸儒學果有抗糧包訟等事該學自可詳革若惟以五生互結為憑良善者固氣類相投不肖者豈不能朋比掩飾應將嵗終責取互結之例停止又生員事關切已與包攬詞訟不同若必令其赴學挂號求用戳記必有不肖教職挾嫌勒索徇私容隱徒滋弊竇應將赴學挂號戳記之例停止又議準生員身列黌宫包攬詞訟誠為不法但未經審理遽黜其名其中豈無屈抑應將一牽獄訟先革後審之例停止其文武生員果繫事非切已代親族具控作證冒認失主尸親者仍照例科罪又交納錢糧凡富生上户遵例五月完半十月全完如屆期不淸再展二月以嵗底全完為率其中下貧生以八月完半嵗底全完如屆期不淸分别再展數月以開嵗二月四月全完為率如逾期不完始行詳革革後全完仍準開復若委繫赤貧無力而尾欠僅屬分釐者仍照例暫免詳革其不待限期先行完納者該地方官照例量加奬賞應將交納錢糧嚴立三限之例停止又文武生員有武斷鄉曲倚仗衣頂橫行欺壓平民其人不敢與爭旁人不敢勸阻將人毆打致死者仍照定例治罪外其被褫革劣矜有挾讐肆橫並生監內有串通竊盜􅌪頓牛馬代寫辨狀誘人賣妻作媒圗利者照原律分别定擬應將加等治罪之例停止又催科之法大約以五月完半嵗底全完為率而學政嵗時按臨周行各府未必下車之日適當納課之時且學政按臨大府不過一月小府不過一旬諸生既須應試又令完糧勢難兼顧若不收考必致隨場補試今交納錢糧已經立限嗣後將完糧後方準收考之例停止又生監緣事斥革一槩不許出境是罪止斥革而又加以禁錮似屬已甚况頑悖之人在夲籍亦能生事不必出境也至於重犯事端自應按律例定擬不必在籍而寬豈以出境而重嗣後將被褫後不許出境之例停止又議準貢監生員如有包攬錢糧侵收入已者照例革去貢監生員仍照常人盜倉庫錢糧律并贓論罪定擬繫八十兩以上照不應為而為之律杖八十仍革去貢監生員如不及八十兩以上仍照攬納稅銀杖六十之例定擬收贖又覆準學政考試地方如有姦徒聚衆生事凌脅官長學政繫封鎖衙門無由禁緝提調及地方官並駐防武官協拏務獲審實照例治罪如提調等官事前不能鈐止事後又不嚴拏及批審之後徒以一二軟弱無辜抵塞結案者督撫學政題參文官交吏部武官交兵部議處其廪保濫保匪人以致場內生事者一并褫革三年覆準優行生員如舉優注册之後該生改行易轍實有劣迹可指該州縣官及教官仍應據實申詳該學政留心體察四年覆準生童於臨考時不待聯謀羣相萃集偶與市民爭訟輒喧播觀看雖未有不法情事實屬囂凌陋習令學政等官時時訓誨務俾率德改行其有蕩間踰檢有玷宫牆者分别革懲俾知畏法自守一優恤諸生順治八年題準生員與武職兵丁有爭聽學臣處治不許武職擅責武職兵丁該管衙門處治不許生員結黨爭抗九年題準凡生員丁父母憂免其應試服闋呈學轉詳提調官取師生鄰里保結試以經書論三篇廪解卷詳奪增附青社徑行學起復過限三月申究半年廪作曠增附遞降一年黜凡遊學從師隨祖父之任告假出行者由學開明事由呈提調官轉詳批允給假不得誤嵗考違者黜果千里外未能即回勘明取結具詳限三月補考再違者黜凡患病者提調官取該學及醫生甘結開報限三月內補考違限者青衣徑黜廪停作曠增降附附降青衣再違三月皆黜無故臨考不到者徑黜凡緣事者承問官取問明白即序案通詳若别衙門批允或開復或問革均鈔招申詳非奉學政明文開復黜革者不得收學除名按臨時除重犯候詳外輕罪與干證雖未詳允皆仍送考不得概造緣事項下廪膳緣事三月以上不結停食餼不作闕事結供明準補支坐罪不至革計拘發收復月日作曠不補支凡願告老者呈學轉申提調官檢例無礙取結於按臨半月前申詳免試若已赴考及緣事未結靑衣發社與行止不端者不準凡批限補考者違限半月即考附一二等不準幫補四五六等照案行凡補考者提調官靣試經書論各一篇即將原卷封固令夲生親齎送考對驗以防冒替等弊康熙九年題準生員關繫取士大典若有司視同齊民撻責殊非恤士之意今後如果犯事情重地方官先報學政俟黜革後治以應得之罪若辭訟小事發學責懲二十二年覆準各省學租有發給貧士將所餘以充兵餉有竟不給發者應行令各直省督撫給發廪生貧士以助膏火之費二十七年議準學田租賦應給贍貧生務在嚴核舉行俾沾實惠毋聽姦胥冒濫侵欺除通稽各學田原額若干每年額租若干先造淸册報部外每年終將用過某費若干項贍過貧生某某若干名詳開舊管新收開除實在造册報部如册部隱漏遲延振貧虛名無實及教官學霸豪強之家私據侵占者察出按法追究雍正二年議準滿洲蒙古漢軍生員年老有疾亦準給衣頂如丁艱告假患病緣事及隨任等情據實呈教官申報學政仍照例補考八年覆準例載曾經犯罪問革變名易姓僥幸出身殊壞士習訪出嚴行究問革職若教官納賄容隱生員扶同保結者一例治罪嗣後此等生員應令提調官詳察或罪止褫革或本案情罪尚有可原及革後能改過自新者取具教官廪保印甘各結準其以原名考試童生如情罪可惡並不改過自新變名冒考入學者除將本人嚴究黜革外其提調教職皆照徇庇例議處廪保即行黜革十二年議準已經褫革之貢監生審明果繫無干及拖欠錢糧革後全完者地方官即詳請開復其或抑勒索詐並故揑情弊詳請者察出將地方官議處十三年議準凡為人後者遭本生父母之喪服雖降期仍心喪三年若出應試實非情理所安嗣後文武生員遇本生父母之喪令其呈明期年內免應嵗科兩考及舉貢監生停其鄉會二試童生亦不許應府州縣及院試有隱匿干進者照匿喪治罪又議準廪增遇本生父母之喪期年不應試毋庸出闕乾隆元年諭任土作貢固有常經無論士民均應輸納至於雜色差徭則紳襟例應優免乃各省竟有令生員充當總甲圖差之類者殊非國家優恤士子之意嗣後舉貢生員等著槩免雜差俾得專心肄業倘於本户外别將族人借名濫充仍將本生按律治罪欽此又議準生員有應戒飭者地方官會同教官將事由具詳學政酌斷批準然後照例在於明倫堂撲責如因一言抵牾輒任意呵叱不待申詳不會同教官擅自撲責者聼學臣糾參以違例處分學政亦不得袒庇生員違公批斷三年諭各省學租原為給散各學廪生貧生之用但為數無多或地方偶遇歉年貧生不能自給往往不免飢餒深可憫念朕思身列膠庠者自不便令有司與貧民同給升斗嗣後著該督撫學政飭令教官將貧生等名籍開送地方官核實詳報視人數多寡即於存公項內量撥銀米移交教官均勻給散資其饘粥如教官開報不實給散不均及為吏胥中飽者交督撫學政稽察即以不職參治至各省學租務須通融散給極貧次貧生員俾沾實惠此朕體恤生員之意若諸生員不知自愛因此而干與地方肆行不法之事該督撫等仍應照例稽察毋使蹈於罪戾欽此五年諭朕從前降旨將代賠祖父虧空已奉恩免人等停選停補者準歸入班次銓用其應追賠祖父虧空革職之員亦準其一體開復今朕念旗人有因代賠祖父虧空力不能完治以枷責之罪者此等人員與本身虧空及緣事枷責者究屬有間槩行擯棄情亦可憫伊等如願考試者該旗除原案內載有不準考試字樣外皆準一體考試俾各奮勉自新以昭格外加恩之至意欽此又議準旗人有因祖父虧空力不能完治以枷責之罪者除間散人等準其照例考試外其已經出仕及進士舉人貢監生員等如願考試亦照間散人等準應童子試並與旗下翻譯等項考試以圖上進但不得借考試之端希圖開復若繫曾經發遣並入辛者庫即內管領赦回其罪原不止於枷責者其本身仍不準考試又奏準緣事斥革生員除包攬辭訟武斷鄉曲及凡實繫本身重犯於律無可貸者仍舊斥革外其有因人波纍與本身事犯情有可原及罪在杖一百以內革後能改過自新者均準以原名考試童生監生亦許以原名捐復其舉人貢生有願考試者亦照例準其應童子試以圖上進取具里鄰確實甘結報地方官及教官核實加結繫應童試者申送學政繫捐復監生者申送撫藩各加核實準行如有隱匿重情朦溷濫邀者仍斥退其應行收考收復者毋許地方士庶挾嫌告訐違者以誣告治罪又奏準文武生員除篤疾之人照例令該學教官據實具詳準給衣頂外其有以年老告給衣頂者按其入學已閲三十年無論衰病與否均為合例或入學雖不滿三十年其年已及七旬者亦為合例統令呈該學教官察驗確實出具並無假揑規避印結申詳學政衙門即準給與衣頂免其考試八年覆準嗣後患病欠考之生請給衣頂者如已成痼疾及年屆七旬者出具並無假冒規避印結即準免其補考給與衣頂至武生必年富力強始可入選若年屆六十力已衰邁於一切技勇不能嫻習亦準給與衣頂一廣勵學業順治二年題準滿洲子弟就學肄業分為四處每處用十人教習每十日赴國子監考課一次九年題準每鄉置社學一區擇文藝通曉行誼謹厚者考充社師免其徭役給廪餼優膳學政按臨日造姓名册申報考察十一年題準八旗每佐領下留官學生一名禮部會同國子監察驗如學業無成者退歸佐領仍於本佐領下選補以後三年一次察驗永為定例十四年諭八旗滿洲漢軍每佐領送官學生一名讀書蒙古兩佐領送官學生一人讀書十五年題準土司子弟有向化願學者令立學一所行地方官取文理明通者一人充為教讀以司訓督嵗給銀八兩膏火銀二十兩地方官動正項支給十八年諭滿洲漢軍每佐領各增官學生二名共送子弟二人一習清書一習漢書康熙六年題準官學生除國子監考課外每年禮部嚴考一次送部録用如肄業怠廢即開助教教習職名參處四十一年覆準京師崇文門外設立義學賜御書廣育羣才匾額五城各設一小學延孰師教育有成材者選入義學義學小學每年廪餼共三百兩於府縣按月支給四十五年覆準黔省府州縣衛皆設義學俾土師子弟肄業頒發御書匾額懸挂五十二年諭景山北上門兩旁建立官學簡選教習令內府佐領內管領內可教之子弟讀習清漢書欽此雍正元年覆準州縣設學多在城市鄉民住居遼逺不能到學照順治九年例州縣於大鄉巨堡各置社學凡近鄉子弟年十二以上二十以下有志學文者令入學肄業擇生員行端學優者充補社師給豫廪餼將學生姓名造册於學政按臨時由學申報如有能文入學者社師優賞若怠於教習鑽營充補者褫革該管官議處又覆準八旗教習將考取之新進士及恩拔嵗副貢生考取間補至捐貢不準充教習二年覆準設立官學原欲清漢兼優以備部院衙門補用令國子監滿漢祭酒司業轉飭助教教習等官每日親臨督課祭酒司業不時稽察以勸勤警惰三年議準左右兩翼立宗學每翼滿學一漢學一王貝勒貝子公將軍間散子弟有願讀書者聼其入學於各部院司官中書內簡選四人每翼各分二人教習清書令禮部簡選教習四人每翼各分二人教習漢書又覆準雲南威逺地方設立義學令夷人子弟有志讀書者入孰誦讀五年覆準雲南東川府土人設立義學擇本省貢生生員熟習土風品學兼優者令其實心教誨俟學業有成該撫具題照湖廣猺童例别編字號果有可取之卷即於東川府學額內酌取其教習由該督撫酌量奬賞七年議準立覺羅官學八旗各擇官房一所設為衙署旁設滿漢學各一覺羅子弟自八嵗以上十八嵗以下皆令入學讀書由各部院見任筆帖式內簡選能翻譯者八人每旗各用一人教習清書由禮部簡選八人每旗各用一人教習漢書八年覆準四川建昌府四面環夷復有熟番雜處其中未知禮教應延孰師訓習但該童不解官語孰師不能譯語應於漢境內擇大村堡令地方官照義學例建立學舍擇本省文行兼優生員延為孰師令附近熟番子弟來學日與漢童相處宣講聖諭廣訓俟熟習之後再令誦習詩書照烏蒙設學之例以六年為期如果教導有成孰師準作貢生三年無成該生發回别擇應需經書食用等項令該撫照例備辦毋得𣲖纍里民俟熟番子弟學業有成令往教誨生番子弟俟熟習通曉之後準其報名應試該地方官照例收考申送學政又覆準湖南永綏六里每處立義學二所每所延師二人在乾鳳兩廳所屬苖生中擇其謹厚通曉者令其教導宣講聖諭廣訓然後課以經書至建立學舍及孰師每年應給廪餼等項應於本省公費銀內酌量動支十一年諭各省學校之外地方大吏每設立書院擇一省文行兼優之士讀書其中使之朝夕講誦整躬勵行有所成就俾逺近士子觀感奮發亦興賢育才之一道也督撫駐劄之所為省會之地著該督撫商酌舉行各賜帑金千兩將來士子羣聚讀書豫為籌畫資其膏火以垂永久不足者於存公銀內支用封疆大員並有化導士子之職各宜殫心奉行黜浮崇實以儲國家菁莪棫朴之選欽此乾隆元年諭古者鄉學之秀始升於國然其時諸侯之國皆有學今府州縣學並建而無遞升之法國子監雖設於京師而道里遼遠不能胥會則書院即古侯國之學也居講席者固宜老成宿望從遊之士亦必立品勤學爭自濯磨庶人材成就足備朝廷任使該部即行文各省督撫學政凡書院之長必選經明行修足為多士模範者以禮聘請生徒必擇鄉里秀異沉潛學問者酌仿朱子白鹿洞規條立之儀節以檢束身心仿分年讀書之法豫之程課使貫通經史學臣三年任滿咨訪考核如果教術可觀人才蔚起各加奬勵六年之後著有成效奏請酌量議敘諸生中材器尤異者準薦舉一二以示鼓舞欽此又覆準咸安宫教習向例於舉貢內考取充補嗣後應於新科進士內傳問有願充者令報名禮部會同吏部簡選引見陸續充補三年期滿該總管將稱職之人分别等第引見授為主事及即用知縣恭候欽定又奏準凡考試滿教習由部行文八旗咨取翻譯進士舉人生員並恩拔嵗副貢生通曉翻譯願考者年逾三十以上造册送部奏請欽命大臣在午門內請題考取挨次補用又奏準八旗廢員及告退筆帖式並從前效力軍前年老有疾就間之人不無精於翻譯而人品老成者嗣後考取滿教習令與八旗舉貢生員一并考試又覆準義學之設原以成就無力讀書之士令順天府尹飭大宛二縣清理義學舊址酌量修葺俾生徒得以聚處該府尹慎選文行兼優之士延請為師不論鄉城老幼願就學者皆聼肄業其中有貧乏無力者府尹酌給薪水至修建房屋師生膏火等費應於存公銀內酌量奏請再造士之典務須經久應令府尹量撥所屬官地數頃以資逐年之用又覆準社學之設著有成例其黔省地處偏僻或有未經設立之處應再行該督遵照雍正元年定例飭令州縣官酌量舉行至量加廪餼動何錢糧令該督隨地酌辦二年奏準咸安宫漢教習仍於新進士內加以考試選取不足於舉人內考取充補三年期滿分别引見進士以主事知縣即用舉人以知縣教職即用三年奏準兩翼宗學各增設漢教習二人四年諭聞浙江敷文書院內生童衆多每嵗帑金租息僅四百餘兩不敷廪餼著加賜帑金千兩交該撫經理嵗取息銀以資諸生膏火欽此又議準通計宗室在學生徒按十名設教習一人其未滿十名者即均分在各教習名下訓課毋庸增設除見在教習十有四人外尚須增設滿漢教習應令宗人府移咨禮部按數增補嗣後有應增設之處遵照辦理又覆準八旗義學師生終年課誦應酌量加恩於每學每月各給銀三兩以為茶水煤炭之資五年覆準稽察八旗義學禮部司官以生徒優劣定教習之勤惰於期滿日照例出具考語引見惰者即行退出又覆準八旗義學功課除委禮部司官每月稽考外仍令諸生每季到部考課翻譯經義背書寫字皆詳登册籍嵗終分優劣以定去留二十一年奏準裁宗學漢教習二十三年裁本部義學一執事奉祠康熙二十五年覆準聖賢適裔有充奉祀生者仍給衣頂確開名數報部又覆準府州縣衛學贊禮生不許濫用應照國子監例選擇在學肄業文行兼優儀表端莊聲音宏亮者補充大學六名小學四名考試時準為優等仍行報部三十三年覆準凡地方大小各官惟萬夀聖節元旦長至春秋二丁祭用生員贊禮大中小學均不得過四名其準為優等之處著停止雍正二年覆準先賢有祠宇處察明適裔給與印照為奉祀生但事久弊生無論有無祠宇是否賢裔稱繫同姓即給印照各省督撫及衍聖公並不將奉祠生名數報部致有假造印照冒濫充補行令衍聖公會同山東巡撫學政核實察明其各省奉祀生令督撫學政通行嚴察果繫先賢適裔建有祠宇將本生履歷造册咨部銷毁原給印照換給禮部印照其冒濫者革除嗣後設立奉祀生關涉衍聖公者衍聖公會同巡撫學政照例察核報部換照其各省由督撫學政者亦確察咨部五年覆準山東曲阜縣樂舞生入學均於見在樂舞生考取該學政會同衍聖公將見在文廟供事之樂舞生秉公詳察其不諳音律者均令澄汰照數選補百五十四名造具年貌籍貫清册存案每學臣考試之前先將樂章音律當堂考驗果能諳練通曉然後考其文理優長者酌取四名入曲阜縣學充附其兖州府學充附之三十六名悉行裁停十三年題準春秋祭祀例用樂舞應慎重選補令各州縣會同教官將見在樂舞生詳加考驗擇其實繫本籍俊秀子弟通曉音律嫻熟禮儀者仍行存留飭令教官勤加學習虔供祀事如有冒濫悉行黜退將原給執照槩行追銷其學政執照之處永行禁止嗣後如學政濫給印照該督撫即行嚴參其樂舞生如有假冒朋充把持武斷等情地方官一靣詳革即行究治乾隆五年奏準各府州縣學樂舞生每學例用六佾即照佾舞之數額設三十六名外加四名以備疾病事故更替之用務令各州縣會同教官考選本籍俊秀通曉音律嫻習禮儀者方準充補遇闕别行考選足數此外不許浮充仍造册申報學政察核每遇學臣按臨免其府縣兩試由教官册送府縣敘入考案之後申送院考憑文録取六年覆準順天府遴選樂舞生照考試儒童之例責令取具廪保甘結由教官加結送縣審音委繫本籍之人方準選補至考試時仍令教官察核確實申送院考如有頂冒情弊將出結各官照例參處八年覆準嗣後樂舞生令州縣於與考童生內略知文義者取具鄰族甘結會同教官選補送學臣察核至院試時仍用廪保童生各結以防頂冒至學臣按臨之時將該屬册載之樂舞生飭令提調官按名考驗實繫應試儒童略知文義者方準永逺充補若繫目不識丁之人即詳明斥革别行選補將濫選州縣學官察參議處欽定大清會典則例卷七十
