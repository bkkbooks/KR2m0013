body:
  text: 兵部武選清吏司職制二一直省武職開列康熙三年題準直省提督員闕以八旗副都統見任總兵官論俸開列總兵官員闕以八旗參領見任副將論俸開列如一員闕內外輪推二員闕內外各推一人均將俸深十人列名具題請㫖補授副將員闕將應升副將之人通行較俸推升五十一年奉㫖提督員闕以副都統開列具題總兵官按年分繕摺進呈總兵官員闕以參領開列具題副將按年分繕摺進呈雍正四年覆準副將員闕停其在部推升將俸深參將十人並應補副將之人文到部者一并開列具題再將俸淺參將內有軍功保舉者不論多寡别繕名單隨本進呈六年奉㫖副將員闕將本省見任參將一并開列具奏八年議準福建臺灣水師營副將俸滿之日該督提察核題報遇有水師總兵官員闕於開列本內將俸滿之處聲明十年議準服滿候補副將人文到部遇有員闕指名題請補授俟奉㫖後引見乾隆三年奉㫖各省總兵官副將員闕於具題補授之時或繫水師或繫陸路均於開列本內聲明其别摺開列之副將參將或見繫水師或見繫陸路亦於摺內聲明六年奏準提督員闕將八旗漢軍副都統論俸開列十人具題總兵官按年分繕摺隨本進呈總兵官員闕或繫水師或繫陸路本內聲明將八旗漢軍參領論俸開列十人副將分别水師陸路按年分繕摺並將記名副將繕摺隨本進呈副將員闕將記名參將繕摺隨本進呈如副將參將內有俸滿議敘應升即用者均於摺內聲明二十二年諭各省提鎮皆有專閫之責履任三年已滿自應請㫖陛見朕得隨時察看以别賢否向來未經定有成例或有閒越數年不行奏請入覲者殊非慎重職守之意嗣後各提鎮著照藩臬之例三年已滿奏請陛見如未允準次年仍具摺請㫖其踰期不行陳請者該部即察明具奏欽此一銓選順治十一年題準職方司每兩月一選武選司每三月一選康熙元年題準兩司選期均改雙月由部㑹同科道掣籖又題準見任推升武官由部㑹同科道代為掣籖選補各官悉令親掣七年題準停止㑹同科道掣籖十一年題準候選營衛各官均於單月初一日投供初三日過堂照文到先後於雙月二十五日掣籖如掣籖不到者以規避提參革職有衰老病廢者於過堂時驗明勒令原品休致又議準每月截闕以二十日為限二十日以內員闕到部者入於本月推選二十一日以後到部者歸於下月推選其由部議處以降革具題開闕者每月十二日以內到部於十七日以內具題入本月推選十三日以後到部歸下月推選又議準督撫提鎮糾參貪酷各官或應革職提問或應解任聽勘及奉㫖提解來京並别部提解質對此省之官有應發往彼省質審訊問者皆開闕歸於月分將應用之人銓選若本省所屬各官有質審訊問情節者不行開闕又議準營衛守備以下微員遇有老病請休及告假等項事故咨文到部之日即行開闕於半月彚題又題準單月參將員闕將小銜參將署參將銜以下守備銜以上管參將事者大銜游擊都督銜以下游擊銜以上管游擊事者通共較俸升用游擊員闕將小銜游擊署游擊銜以下署守備銜以上管游擊事者大銜小銜都司都督銜以下署守備銜以上管都司事者大銜守備都督銜以下署都司銜以上管守備事者通共較俸升用都司員闕先將藍翎侍衛擬補一人一年止用五人如並無都司止有守備即以守備一闕先擬補藍翎侍衛合都司守備每年止用五人其餘員闕繫正月七月分將加都司銜之門衛千總奉㫖以營員用者升用繫三月五月九月十一月分以營衛守備較俸升用守備員闕繫正月七月分將門衛千總並加署都司銜守備銜署守備銜之門衛千總以營員用者升用繫三月五月九月十一月分將見任千把總捐升守備及門衛千總應升營守備者共為一班捐升用二人之後次用應升者一人為升班一見任千把總之功加應用守備考驗一等者用一人為功班一營衛署守備銜管守備者用五人為小銜守備班五分發各省題補之千總用一人為分發千總班一巡捕營當差千總用一人為當差千總班一又題準雙月參將游擊都司員闕繫二月分以參將游擊之闕用一等二等侍衛參將游擊並有員闕先用參將每年止用一人繫四月六月八月分以游擊都司之闕用三等侍衛游擊都司並有員闕先用游擊每年止用三人均按月行文領侍衛內大臣鑾儀衛將行走已滿三年簡選二三人出具考語送部引見恭候簡用守備員闕以開復降調捐還三項相間輪用一人為還班一武進士用二人為科班二年滿保送千總注册候推者用二人為委班二澎臺俸滿千總與難廕守備以營用者相間輪用一人為劄班一無職任之功加應用守備考驗一等者用一人為功班一效勞期滿以營用者用一人為勞班一候補候選守備捐即用者用一人為捐班一武進士充補提塘年滿者用一人為效力班一分發各省題補之千總用一人為分發千總班一巡捕營當差千總用一人為當差千總班一廕生改武以營用者用一人為廕生改武班一又議準銓選次序如小銜守備門衛千總均按食俸之先後用開復降調捐還各官各按緣事開復還職日期先後用注册千總澎臺千總均按引見日期先後用如同日引見將俸滿日期在前者用巡捕營當差千總按步軍統領咨送名次先後用分發千總按分發先後用如同日分發將俸滿在前者用又議準應選之武舉武進士取本籍地方官印文申送督撫給咨赴部候選其㑹試下第武舉本年內具呈者照本籍起送㑹試文書並部給執照準入册投供候選次年具呈不準營衛裁汰還職降調並完糧給劄及完糧開復各官或由見任督撫或由原籍督撫給咨赴部年滿千總及功加各官由該省總督給咨赴部如無總督者由提督申送赴部無提督者由總兵官申送赴部若屬將軍巡撫標下者由將軍巡撫給咨赴部均照各省定限赴部投供聽候選補又題準地方失事督撫提鎮題參疏防各官以揭帖到部停其升轉如無揭帖者以科鈔到部停其升轉如輪推已經掣籖尚未具題有以地方失事題參奉㫖到部者即行扣除督撫提鎮特疏糾參各官亦以揭帖到部即停升轉如無揭帖者以科鈔到部停其升轉其提問拘問者不候事結即停升轉若督撫提鎮題參因公罣誤之案議覆未結及科道糾參或被人訐告等事議覆未結遇有升轉不停雍正元年議準候選營衛各官於掣籖後考驗人材弓馬如庸劣不堪者奏請革退其衛所各官內祖父有拖缺錢糧者扣除不用俟錢糧完日再補三年議準各官選用升用之後如督撫提鎮將前官題留原任或别題補有人其選升之人未經引見奉㫖者仍歸原班即用其選用已經引見升用業已奉㫖尚未給劄及給劄尚未赴任者不入班次雙單月遇闕即用若有情願赴該省候闕者仍令前往遇有員闕該督撫提鎮即行題請補授其已經給劄赴任無任可到者各留該省遇闕即行題請補授若無應得之闕暫令署事俟有員闕即行題請補授如該省出有應歸月選之闕由部即行奏請補授又奏準功加應用游擊都司者歸於雙月用應用守備者雙月單月皆立一班雙月用無職任效力應用守備之功加單月用外委及見任千把總應用守備之功加其應用都司之功加準以都司守備兩項兼補八年議準應升參將各官如繫大銜游擊都督銜以下游擊銜以上管游擊事者升參將者令赴參將任若繫小銜游擊參將銜以下署守備銜以上管參將事者應升銜者加銜一等留原任一次其員闕以接次應升之大銜游擊並升銜留任一次應行調任之小銜參將升用如接次無應升之大銜游擊並應行調任之小銜參將即將升銜之小銜參將亦令赴新任應升游擊各官如繫都司及大銜守備都督銜以下署都司銜以上管守備事者升游擊者令赴游擊任若繫小銜游擊署游擊銜以下署守備銜以上管游擊事者應升銜者加銜一等留原任一次其員闕以接次應升之都司及大銜守備並升銜留任一次應行調任之小銜游擊升用如接次無應升之都司及大銜守備並應行調任之小銜游擊即將升銜之小銜游擊亦令赴新任又議準卓異官引見奉㫖準其注册者歸入二月四月六月十月分以應升之官即用升任後將卓異注銷十年奉㫖武職引見扣除者照吏部例將應否一體掣籖之處於月選前請㫖又議準武職各官裁汰赴部候補者按人文到部日期先後無論雙單月不入班次遇闕即用十二年議準部推小銜參將小銜游擊初次升銜者均加銜一等留原任一次其員闕以接次應升之大銜游擊及都司並大銜守備升用今武職各官既回避本省論俸推升時如遇籍隸本省之小銜參將小銜游擊雖繫初次推升例應留任一次者不必仍留原任即加銜一等令赴新任乾隆元年奏準發回原任千總各督撫提鎮或因題闕多用豫保人員或因題闕無多遂礙難保題此項千總既經督撫提鎮保送乃因發回原任致令壅滯似未平允應令各該督撫提鎮詳加考驗如人材壯健技藝優嫻堪膺題補而實無闕可題者出具考語造册送部將見在選隨營候推千總之二委班內分一班選發回原任之千總照奉㫖發回先後挨次用俟此項千總用完仍用隨營候推千總又奏準各省保送水師千總授為藍翎侍衛原以備用水師各官但並無水師可用之闕以致守候無期按定例每年單月陸路都司守備員闕先用藍翎侍衛一人一年止用五人請將備用水師之藍翎侍衛遇有部推內河水師都司守備員闕行文領侍衛內大臣簡選二三人出具考語送部引見恭候簡用二年奏準四等侍衛與藍翎侍衛品級相同無庸别立班次歸入藍翎侍衛班內一例簡選送部引見恭候簡用五年奏準候選武進士有情願分發各省隨營學習者以五年為滿果弓馬嫻熟諳練營伍準以守備題補如未滿五年已届銓選之期或因弓馬稍次經督撫造冊送部銓選於原定二科班內以一班選用在部投供簡選一等二等武進士按其簡選年分等第名次先後以一班選用分發各省武進士按其科分名次先後如分發各省武進士無人所有一班統歸在部投供武進士選用又奏準功加考驗一等應用游擊都司者入於雙月推用應用守備者入於雙月單月輪班用其候補游擊情願告降者亦準以守備用均按引見日期先後用如同日引見見任千把按食俸之先後用無職任效用者按食糧之先後用又奏準營衛各官奉㫖即用者無論雙單月不入班次即用其奉㫖補用各官內如守備守禦所千總衛千總有班可歸者仍歸本班用若無班可歸者均入於雙月分以奉㫖之日起積算用五人後用一人如有同日奉㫖者在部公同掣籖先用一人其餘再加算五人後用一人至奉㫖以何省補用者遇該省有闕即先準補用六年奏準雙單月升選參游都守等官彚為一疏具題又奏準科道糾參或有不實被人訐告或有挾嫌雖議覆未結均不停升轉若督撫提鎮題參因公罣誤之案處分降級革職罰俸不等雖議覆未結亦停升轉七年奏準雙月選用營守備之武進士原有二班以一班選在部投供簡選一二等武進士以一班選用分發各省武進士如分發各省武進士無人所有二班統歸在部投供武進士選用今分發武進士未經選用者人數尚少不致壅滯惟簡選一二等之武進士未經選用者人數甚多約計一年之內僅用三四人未免壅滯按雙單月選營守備班內均有功加一項久無在部投供應選之人遇輪班選用之時每以無人過班嗣後在部投供武進士除雙月原班仍照例選用外其雙單月輪用功加之時若無應用之人即將在部投供之武進士選用八年奏準武職各官有因父母年老告請歸養者終養後赴部候補無論雙單月不入班次即用又奏準候選營衛各官初次赴選均取具原籍督撫布政使司印文赴部投供方準銓選但投供後有因選期尚早回籍者往往遲至二三年以及六七年復行赴部投供若因其回籍既久行詢原籍俟咨覆到日始行銓選未免等候羈遲若不行詢其在籍有無事故無憑察考應酌定候選營衛各官有投供後回籍未過一年者免其行詢如已過一年無論年分逺近令取具同鄉京官印結赴部一面準其投供銓選一面將在籍有無事故行詢原籍如咨覆到日並無事故者即存備案如有事故别行具奏辦理又奏準每月十二日以前應進開闕本倘遇二十日內有例不進本日期即繕摺奏請開闕又奏準營守備一項先因捐納無人將舊有捐班裁去改為效力班今應於效力班之上仍設一捐班按投捐日期先後用又覆準巡捕三營各官有照例參送議處之案不至降級革職者不停升轉遇有員闕準其照常簡選升拔所有原參處分帶於新任十年奏準年滿隨營候推之千總向例入於雙月兩委班內選用嗣因發回原任之年滿千總無班可選奏準將二委班借用發回原任之年滿千總如發回原任之年滿千總用完仍選隨營候推千總今按隨營候推之千總甚多若止以一班銓選候闕需時甚屬壅滯應於第二委班下再增一委班用隨營候推千總俟發回原任千總用完之日仍將第二委班歸還隨營候推千總統計共以三班銓選可謂漸次疏通又奏準年滿千總隨營候推者雖於兩委班之下增設一班選用但伊等在外既無題補之闕而第二委班尚有發回原任之千總選用約計候推千總一年不過選用三四人究屬闕少人多按雙月選用守備班內有捐班見在捐納無人又單月有升班繫以營用之門衛千總升用今門衛千總應以營用者亦屬無幾嗣後輪用捐班升班之時如本班有應用之人先盡本班選用如無應用之人即將隨營候推千總選用十一年奏準內河水師都司應歸部選者四守備應歸部選者八如遇都司員闕仍用水師藍翎侍衛其守備員闕以水師藍翎侍衛及水師年滿千總輪流間用十三年奏準官員開闕為銓選所關必分别畫一辦理方免髙下其手千把微員議處應降革者半月內彚題開闕營衛守備以上各官議處有應革職降調者按文到日期先後逐案題覆開闕如降級抵銷降級留任停升住俸罰俸等案不開闕者於半月內彚題副將有以老病告休者員闕不便久懸逐案題覆開闕至老病告休之參游都守均以揭到日開闕於半月內彚題十四年奏準見任武職各官因姻親回避赴部候補者人文到部歸於雙月不入班次即用十五年奏準隨營候推之年滿千總壅滯甚多雖經疏通約計每年選用不過十餘人而未經選用者日漸加增銓補竟無限期按雙月選用守備劄班繫澎臺俸滿千總與難廕守備以營用者相間輪補今難廕無人澎臺俸滿千總注册候推者人亦甚少每值此班因無人輪用將闕歸於下班用别項之人嗣後雙月輪用劄班之時如遇本班有應用之人先盡本班選用如無應用之人即將隨營候推千總選用又奏準開復守備於還班內輪班間補每年僅用一二人見在投供者須至二三年之久始能得補守候需時按廕生改武者於各班之末用一人今改武廕生甚少每值此班竟無人輪用嗣後開復守備仍於還班照例間補外如輪用廕生改武之班本班有應用之人先盡本班選用如無應用之人即將開復守備選用又奏準雙月應用游擊都司之三等侍衛一年共用三人加之有簡選分發各省委用者遂至行走已滿三年之人漸致稀少屢遇游擊員闕僅以一人請㫖補授是一人指補一闕既與定例未符亦覺升遷太速請定以四年為滿方準保送如遇應用月分行文領侍衛內大臣鑾儀衛將行走已滿四年者保送二三人引見恭候簡用如無合例之人即以無人保送咨覆由部别行銓選若僅止一人經領侍衛內大臣鑾儀衛以弓馬嫻熟保送者由部考驗果弓馬嫻熟即引見補授如弓馬生疏駮回令其演習俟嫻熟後同其次年滿侍衛一并引見四等侍衛藍翎侍衛定例亦繫行走三年以單月都司守備用每年共用五人請亦照三等侍衛之例統以行走四年為滿十七年奏準外海水師降補人員因並無部推之闕該員等到部後均奏請引見或發往該員本省或發往鄰省有外海水師之題闕者交與該督等以該員應用之闕酌量題補至內河水師降補人員向來未有辦過成例該員等一經降調赴部其參將游擊尚有部推之闕可以銓補至守備一項部推雖有八闕先經奏準第一闕用水師藍翎侍衛第二闕用造册送部選用之水師年滿千總再有闕均照此輪用在案是降調赴部應補內河水師守備無班可歸按內河水師守備題闕江南十有二廣東三嗣後內河水師守備照外海水師之例遇有降調守備者由部引見請㫖發往有內河水師守備題闕之江南廣東二省交與該督等與應補人員一同酌量題補再察內河水師部推都司止有四闕亦經奏準補用水師藍翎侍衛如有降補都司之人亦無班可歸察內河水師都司題闕江南四浙江一嗣後遇有降補都司赴部者並照守備一例辦理十八年諭武職兼銜乃沿明代舊制其中升銜升任條例紛繁即以録序軍功不可不留此勳階以為奬賞之地然與見任職事何與焉徒使胥吏得以高下其手且外省參游遇升銜調任畏遷移繁費至有營求督撫保奏留任者是升銜本以鼓勵戎行而日久轉為苦纍亦何用此虛文為也嗣後武職中之大銜小銜應刪除更定一歸簡易止就見在官職分别年分論俸升轉著該部詳悉定議具奏欽此遵㫖議準月選參將以下守備以上嗣後不論銜大銜小參將員闕以游擊論俸推升游擊員闕以都司論俸推升都司員闕以守備論俸推升