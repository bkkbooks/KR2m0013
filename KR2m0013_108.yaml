務又不熟練者隨時咨汰若騎射雖屬平常果深通水務該督撫提鎮咨部記名專以水師營補用七年議準直省將軍督撫提鎮拔補經制千把總咨報到部與定例相符者按月一本彚題請㫖給與劄付令其任事八年議準把總食俸已過三年果騎射兼優人材出衆任內並無盜案疏防參罰止有承追降職降俸之案未經開復者該將軍督撫提鎮於拔補文內聲明由部察核彚題準其拔補千總仍將降職降俸之案帶於新任十三年議準直省各鎮協營不待把總員闕先將外委兵內每營選擇數名或於請餉公事或隨將備調考之便呈送將軍督提考驗將合式者記名俟有把總員闕先盡本營所送之人考驗拔補應調拔者照例調拔如所送之人不堪拔補該將軍督提即於記名人內擇其等次最優營分附近者指名調考拔補仍令該管官於嵗終將記名之人造册彚報倘有行止更改弓馬生疏者據實呈報該將軍督提將記名注銷如記名之人將近用完再令各營呈送考驗該將軍督提每年將考驗記名之外委及兵姓名開造履歷事蹟清册報部乾隆六年奏準千把總緣事斥革者即令離營原劄繳部塗銷存案又奏準將軍督撫提鎮將部册無名未食糧之人拔補把總者照徇情例降三級調用若該管官詳報將軍督撫提鎮拔補者將該管官降三級調用將軍督撫提鎮罰俸一年又奏準直隸馬蘭泰寧二鎮千把總員闕該督將應用千把之人擬定正陪咨部引見補授一千總俸滿順治初年定千總六年俸滿咨部時將原領劄付令本人隨帶赴部親繳如不將原劄親帶赴繳者不準注册引見又定千總六年俸滿由督撫提鎮考驗優者保送引見平常者咨部注册不準保送康熙三十年議準巡捕營千總與直省千總一例六年俸滿不算京俸雍正六年議準河營千總六年俸滿如有熟悉樁掃勤敏盡職者該督咨部留工效力遇守備員闕與見任千總一例簡選題補七年奉㫖咨部注册不行保送之年滿千總有情願來京引見者自赴兵部報名考試平常者仍行注册技勇可用者列名具奏請㫖引見十二年議準千總俸滿如有盜案參處及别項降職降俸等案未經開復該將軍督撫提鎮詳加考驗平常者勒令休致若人材弓馬可觀出具考語保送於文內將降罰之案詳悉聲明由部引見如别行補用將降罰之案帶於新任三年無過開復十三年奉㫖凡年滿千總發回原任者因其人材中平又未知效力何如是以發回令各督撫提鎮再行試看如效力果好遇有守備員闕仍可於各標千總內比較酌量題補不得因其回任即礙難保題乾隆三年奏準千總俸滿除不堪保送者咨部開闕外凡保送者詳加察核出具切實考語如弓馬人材實在可觀及有效力實績者方準保送其雖無勞績而弓馬人材可觀又諳練營伍者亦準保送該千總到部由部復加考試如人材弓馬不堪並無勞績者即行駮回不準引見其引見者將本省鄰省有無在外題補之闕於名籖上注明如奉㫖發回本省並發往别省題補者該督撫提鎮遵㫖題補如交巡捕營當差者歸於應得之班選用注册候推者仍發回本省給與馬兵糧隨營差操按引見奉㫖日期先後歸入本班挨次推用除陸續題補推補外若過三年後尚未題補推補者該督撫提鎮再加甄别果弓馬純熟營務諳練並從前有效力實績材尚可用者仍留標候題候推如弓馬漸次生疏差操漸次懈惰又並無前勞可念者即咨部注册令其回籍七年諭近年以來外省保送年滿千總似覺過多一時不能得用未免轉致壅滯著各省督撫提鎮於保送時留心選擇如果材技優長及有軍功勞績者方準咨部引見毋得濫行保送欽此又諭武辨中守備一官乃將帥之臂指千把之表率非平庸之人所能勝任各省有分發候補守備之年滿千總該督撫自必先盡材技可觀者題請補用若弓馬人材不及之人守候日久年力愈衰技勇日退及得官之後於營伍操防何能收其實用非振飭戎行之道著各省督撫提鎮將見今分發候補守備之年滿千總秉公甄别除年力壯盛材技可觀者仍留候補外其弓馬人材平常年力漸衰者皆準其原品休致則強鋭者既得及時授官而衰庸者亦免於守候嗣後三年舉行一次所留候補之人著於支食千總俸銀外加給步兵糧以資其食用至保送年滿千總務將人材壯健可以造就及實曾出力者舉出寧闕毋濫不得姑息庶不致升途壅滯亦可收得人之效矣欽此十年奏準各省俸滿千總該督撫提鎮保送者十居八九咨部注册者無幾不過以該辨在營日久並無過愆曲示優容以致保送過多不但隨營食餉多占兵額且使候補候選之人一槩壅滯嗣後俸滿千總除人材弓馬可觀著有勞績者仍照例保送外其雖無勞績而人材弓馬可觀者務須詳加考核酌定人數每十人內保送不得過二三人至於人材弓馬均屬平常即咨部注册槩不得濫保如將實非出衆之人多送由部於考驗時照例駮回至年滿千總內發回本省題補並注册候推未經得用者如遇三年甄别秉公考驗其有年力就衰弓馬生疏者即勒令離營報部又議準發回本省以守備題補之年滿千總定例以本省應題補之守備題補其未經題補者例由該督撫提鎮出具考語造册送部歸於雙單月分發班內銓選但每年分發班內不過選用二三人除有在外應題守備之省發回年滿千總尚有題補之期無庸置議外惟山西河南江西三省向無在外應題之守備該辨等在本省守候既無可題補若令盡行造册送部與各省年滿千總挨次推用則守候仍屬需時請嗣後山西河南江西三省部推守備如有五闕以第一二三四闕歸部銓選第五闕行令該督撫將發回以守備題補之年滿千總題請補授周而復始如繫本省之人照例題補隔府别營仍於本內聲明若所出闕與候補之人繁簡不甚相冝或定例應行回避者準其於别營通融調補此等人員如從前已經造册送部銓選者仍準其題補其未經題補者亦準其造册送部銓選未及題選之時如遇三年甄别秉公考驗其有年力就衰弓馬生疏即令離營十一年奏準各省水師千總俸滿送部引見者發回本省以水師守備題補但外海水師守備例應題補者尚多皆得陸續題補惟內河水師守備各省額設無多如江南浙江廣東等省尚有在外題補之水師守備候補之人不致補用無期至湖廣並無內河水師守備應題補者候補水師守備雖有候補之名終無題補之路江西省亦無在外應題補之水師守備見有額設水師千總將來俸滿保送發回候補亦屬無可題補按陸路年滿千總發回本省題補者如題闕無多及並無題闕之省準令該督撫提鎮出具考語造册送部銓選請將並無題闕之省所有發回題補之水師年滿千總照陸路之例令該督撫提鎮詳加考驗出具考語造册送部注册遇有內河水師部推守備員闕以水師藍翎侍衛與水師年滿千總輪班選用十四年奏準發回本省題補之千總有因該省本無在外題補之闕及雖有無多者補用無期是以令各該督撫提鎮出具考語造册送部歸班銓選掣籖後行文調取引見但隨營候推之千總銓選得官例不調取引見至發回本省以守備題補者於題補時亦不送部今遇部推復調取引見例不畫一嗣後於部推之後照例具題俟奉㫖給發劄付令其赴任免其調取引見十七年奉㫖嗣後引見之雲南貴州廣東廣西福建等五省年滿千總留巡捕營當差者將伊等有無親老及别情不能逺離之處爾部詢問如有不能逺離情節仍發回本省照例補用十八年奉㫖各省六年俸滿千總經保送引見者分發本省鄰省以守備題補其發回本省隨行候推之員逐年積纍人數甚多雖有三年再加甄别之例率皆視為具文多有以守候壅滯為言者使但嚴其甄别而不稍為疏通亦無以示鼓勵嗣後候推之人届三年甄别之期該督撫提鎮各冝實力奉行不得姑息濫豫其有實在行走勤勞人材出衆者準其再行保舉引見交部即用若原應題補而非實在出色年力又未至衰老者即咨部降為候推至候推之人內有應拔置題補者亦準其保送引見其不在保送之例而人材尚屬可留者仍令隨營候推衰庸怠惰者咨部休致應如何酌定班次録用之處該部定議具奏欽此遵㫖議準嗣後候補候推之年滿千總每届三年詳加甄别其原應題補而非實在出色者即降為候推原繫候推而實在衰庸懶惰者即咨部休致如候補候推兩項內有行走勤勞材藝出衆者於三年甄别時保舉送部引見將原應題補者改為即用於單月選兩人後輪用一人原繫候推者拔置題補令該督撫提鎮遇有員闕酌量題補至原應題補降為候推者歸入候推千總應用班內較其從前奉㫖日期如同日奉㫖較其俸滿日期先後選用一營兵外委定額雍正五年議準各營之中凡額兵二百名許外委把總一人額兵四百名許外委千總一人均於馬步兵丁內考驗操防勤慎及人材弓馬好者秉公選擇造册送部六年議準外委千把總於額兵數內拔補給與八品頂帶令其同經制千把總辦理汛務如遇經制千把總員闕簡選拔補十二年議準各標協營考拔外委之時照經制千把總之例與同城互調拔補不得以本營兵丁拔補本營外委至於獨營地方無鄰近營汛可以互調者即於本營左哨右哨頭司二司內彼此互調拔補十三年議準將軍督撫提鎮有將營外之人濫給委牌者照徇庇例議處又議準直省援剿營之外委有未照防守營之外委分撥哨司辦理汛務者均照經制千把例分撥哨司令其管轄汛兵操防巡緝如遇疏防失事以及兵丁生事擾民約束不嚴等案該將軍督撫提鎮將該辨隨經制千把總一例參處欽定大清㑹典則例卷一百四
