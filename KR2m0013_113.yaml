body:
  text: 兵部武選清吏司出征一親征天命三年太祖髙皇帝興師伐明諭諸貝勒大臣曰俘獲之人勿去其衣服勿淫其婦妾勿離異其匹偶拒戰而死者聽之若歸順者慎勿輕加誅戮欽此乃率貝勒暨統軍衆將鳴鼓奏樂謁堂子畢啟行五年伐明克瀋陽進攻遼陽遼陽官民城内結采焚香備乘輿設臯比錦茵張鼓樂導迎太祖髙皇帝入城撫定軍民秋毫無犯天聰三年太宗文皇帝親統大軍伐明謁堂子啟行以蒙古喀喇沁部落爲嚮導六年太宗文皇帝親征察哈爾出撫近門謁堂子畢大軍西發察哈爾遁走自布隆圖旋師八年諭我軍征明宜直抵宣大蒙古察哈爾國先爲我兵所敗心膽皆裂舉國騷然彼貝勒大臣將衆來歸我師往大同即可收納察哈爾來歸官民每佐領下出驍騎二十名䕶軍八名右翼五旗由上榆林出口左翼五旗由沙嶺出口凡隨滿洲旗䝉古貝勒所屬佐領甲兵令各該管叅領率之以行其蒙古貝勒各該都統率之以行勿使一二後期即滿洲蒙古驍騎兵亦勿使一二後期每叅領出弓匠二名每佐領出鐵匠一名钁五鑹五鍬五斧五錛二鑿二每人帶䥥刀各備一月糗糧每佐領纛一每二人共槍一矢五十每叅領出雲梯二各備冬衣一襲都統以下佐領以上各量力備雨衣凉㡌凡馬絆及椀勺皆書字號每兵攜帳房一架欽此是年太宗文皇帝征明率貝勒大臣統軍出撫近門謁堂子列八纛陳八牛吹螺鳴角祭畢西行崇德元年太宗文皇帝親征朝鮮國頒行軍律令分兵爲左右翼右翼兵由東京大路至渾河列陣左翼兵至撫順大路列陣親祭堂子旗纛遂行至南漢城西駐營二年朝鮮國王服罪請降詔班師諭從征親王以下毋得殺降擾民康熙三十五年聖祖仁皇帝親征厄魯特噶爾丹諭朕統御中外念切撫綏惟務休養民生未嘗逺事征剿比年以來海宇昇平閭閻樂業四方固已無事獨噶爾丹荒裔狡寇肆逞兇頑自烏蘭布通敗遁之後不自悔禍仍行狂逞悖天虐衆違蔑誓言侵掠我臣服之喀爾喀竊踞巴顔烏蘭之地詭謀叵測逆狀已彰乘其竄伏近邊自應及時撲勦倘目今不行翦滅恐致異日沿邊防戍益累兵民聲罪迅討事不容已用是遣發各路大兵分路並進朕特躬莅邊外相機行事以衆擊寡以正誅逆天意人謀無不允協此寇一殄則邊塵蕩滌疆圉輯寧内安外攘實在此舉一應事宜著察例具奏欽此遵㫖議準皇帝躬統六軍進發應遣官祗告天地宗廟社稷致祭太歲礮神及道路之神頒行軍律令出師之日鑾儀衞陳騎駕鹵簿於午門外兵部陳八旗蒙古畫角十有六鳴角軍每旗四人海螺二百鳴螺軍每旗二十五人以次列於堂子街門外設八旗䕶軍纛八火器營纛八於堂子内門外䕶軍鳥槍叅領十有六人蟒袍補服持纛依次而列駕出午門詣堂子行禮畢至内門外致禮於旗纛之神御櫜鞬乘馬内大臣侍衞率親軍舉黄龍大纛隨行由安定門大街出德勝門至土城闗外八旗官軍分翼列陣首前鋒次鳥槍䕶軍次䕶軍次鳥槍驍騎左右翼各按旗分次第序列出征皇子王等旗纛䕶衞各序列於本旗䕶軍之中末旗鳥槍驍騎之下列滿洲礮兵次漢軍礮兵次漢軍火器兵聖駕出郭三發礮至陳兵處八旗官兵各於馬上俯伏候過整齊隊伍以次進發並肅清道路嚴禁僕從馬匹喧雜之聲又諭本朝用兵以來所向無敵野戰則勝攻城則克惟以弓矢劒㦸爲用自三逆叛後南方皆稻田賊人用火器相持遇之莫不摧敗朕以故洞悉特立火器製槍礮令八旗演習由是我朝之威靈益震於四域矣今噶爾丹遊魂假息喀爾喀左近肆行竊掠朕欲一舉立殄是以整理諸路糧餉器械熟計而行是師之舉與昔不同爾將卒以下厮役以上各當勉力奏凱而還朕必大沛殊恩陣亡者除照常給賜身價外䕶軍則廕一子爲七品官食俸驍騎則廕一子爲八品官食俸如無子則照本身錢糧給其孀妻終老所借公帑官銀皆予寛䘏倘違軍令定以軍律治罪欽此又定軍中豫備火礮八旗滿洲每旗馬䭾子母等礮各五位漢軍每旗馬䭾子母等礮各九位龍礮各一位每翼衝天礮各一位大同府所有神威礮二十四位交該總兵齎赴西路大軍宣化府所有神威礮二十四位交該總兵齎赴中路大軍其臺灣解到神威礮約重四百斤攜行輕便應將此礮每旗各增攜一位又議準西路進勦京師八旗兵三千四百七十名山西右衞兵五千名大同綠旗兵五千名合官兵厮役計二萬四千二百六十有奇八旗兵每佐領下䕶軍三人鳥槍兵一人均給馬四匹從役各一人合爲一幕各齎口糧八十日甲胄四副戰箭二百二十枝帳房二鍋二鑹斧鍬各一行囊四及各種需用雜物統計重九百七十五斤有竒馬十有六匹兵與役各乘一馬餘八匹以充䭾載每馬應分載百二十斤有竒餘兵均照此例行又諭軍士接戰當豫編隊伍首隊必多諸王可編入二隊兩翼兵亦應撥定所選勇士可編入首隊二隊及左右兩翼之兵爲最要軍士不得以前進相爭其各集議以聞欽此遵㫖議準首隊正中設八旗鹿角及綠旗兵次列左右翼漢軍火礮鳥槍兵次列左右翼滿洲火礮兵四百名每佐領鳥槍䕶軍一名䕶軍一名再兩佐領親軍一名鳥槍驍騎一名勇士及情願効力者均編入首隊其二隊每佐領䕶軍一名兩佐領親軍一名皇子王公等均在二隊其列於左右兩翼者每佐領䕶軍一名兩佐領鳥槍䕶軍一名鳥槍驍騎一名每旗子母礮即令鳥槍驍騎兼管行李令在二隊後各隨本旗本叅領立於百步之末再每佐領前鋒一名兩佐領下鳥槍䕶軍一名内府䕶軍各執事人等及部院大小官員筆帖式均令在御前以備調用察哈爾兵八百名喀喇沁兵五百名與衆扎薩克兵别爲一隊以備追擊其領兵接戰之大臣均由特簡又奉㫖中路䕶軍驍騎可列爲十六營著集議具奏遵㫖議準聖駕駐蹕處爲一營八旗前鋒軍列二營八旗䕶軍驍騎列十六營八旗漢軍火器營兵隨礮兵礮手棉甲兵列四營部院堂司官筆帖式列一營察哈爾兵列二營宣化府古北口綠旗兵各爲一營御營網城内建刁斗設廵警二十一處每處以旗員一人内府䕶軍及執事人十名守之網城三門每門以䕶軍及執事人十名守之外營安設廵警八處每處以旗員一人侍衞鑾儀衞官執事人十名守之外營四門以䕶軍執事人四十名守之馬匹牧場於上三旗每旗以旗員一人侍衞鑾儀衛官執事人共三十名守之禁止喧譁者於上三旗每旗以旗員一人䕶軍執事人共二十名司之以上需用五百四十人此分編營壘以及守䕶御營諸事均交領侍衞内大臣䕶軍統領及内務府總管約束督理其八旗十有六營八旗漢軍火器營四營及八旗察哈爾蒙古兵營均特簡皇子王公大臣等分領又諭官兵馬駝及坐臺馬匹闗繫緊要應檄知衆扎薩克及喀爾喀扎薩克等嚴禁各旗偷盜如有干犯者即按軍法梟首示衆家產籍沒入官其該扎薩克以及該管人員從重治罪欽此又諭此番出征兵馬衆多可分爲兩路出口前隊牧馬於路左留路右以待後隊則牧場不傷於軍士大有裨益可將鑲黄正黄正白正紅四旗前鋒軍並綠旗營前鋒軍爲一隊宣化府綠旗兵左翼察哈爾兵爲一隊繼以御營四旗兵爲四隊漢軍火器營兵爲一隊出獨石口鑲白鑲紅正藍鑲藍四旗前鋒軍並綠旗前鋒軍爲一隊古北口綠旗兵爲一隊繼以四旗兵爲四隊漢軍火器營兵爲一隊令其出古北口軍行一日一隊接踵進發出獨石口之前鋒軍鑲黄正黄兩旗兵綠旗兵牧馬於路左正白正紅兩旗兵及漢軍火器營兵牧馬於路右出古北口之前鋒軍鑲白鑲紅二旗兵綠旗兵牧馬於路左正藍鑲藍二旗兵及漢軍火器營兵牧馬於路右可傳行通諭知之欽此是年聖祖仁皇帝親統大軍由中路進討至庫庫車爾偵得噶爾丹所在躬率八旗前鋒兵於前次八旗鹿角及綠旗兵次左右翼八旗漢軍火礮鳥槍兵次八旗滿洲火礮兵皆按翼列陣隨行其鹿角後頭隊兵列各旗鳥槍䕶軍次列䕶軍次列鳥槍驍騎二隊兵亦照頭隊排列隨行兩翼援兵每旗子母礮令滿洲鳥槍驍騎兼管三旗大臣侍衞等領龍纛而行諸王及皇子等各在纛前進發内府官兵執事人等部院官及䝉古兵均按隊伍列陣隨行御用行李及各營行李均按各旗隊後令防䕶行李官兵守䕶隨行至克魯倫河密諭大小營中大臣等安扎營壘如故營内盡徹帳房即御用行幄幔城亦皆不設各處皆伏兵空壁以待之抵暮聖祖仁皇帝親廵視營伍噶爾丹聞風震懾天威遁走巴顔烏喇西路諸將領先奉指授遏賊歸路至是遇之於昭莫多奮擊敗之聖祖仁皇帝軍至拖諾乃分兵追躡自克勒和朔回鑾嗣噶爾丹收集散亡復圖侵掠聖祖仁皇帝復親廵邊奉諭朕出塞試鷹當減從而往撥侍衞二百人御營撥三旗新滿洲䕶軍驍騎三百人著隨子弟以代僕從撥三旗親隨䕶軍三十人八旗前鋒四百人火器營䕶軍千人每旗帶馬上礮三位此次隨駕前鋒䕶軍驍騎以佐領内餧養之馬每人各給四匹侍衞内有無馬之人亦各給四匹火器營䕶軍千人分爲兩營此行各項人等不得告請從行其部院官照秋圍例從少㸃出馬匹著戸兵二部辦理欽此駕發京師向歸化城至湖灘河朔渡河駐蹕東斯垓厄魯特人絡繹來降噶爾丹遣使納欵乃降勅招撫班師囘鑾三十六年聖祖仁皇帝三舉北征仍分兩路出師廵幸山西陜西駐蹕狼居胥山指授方畧截窮寇遁走之路哈密生擒噶爾丹之子塞卜騰般爾珠爾俘送軍前厄魯特部長宰桑等皆稽顙求降三月噶爾丹於阿察阿穆塔台仰藥自殺丹濟拉諾顏格隆等攜噶爾丹尸及其女率三百戸來歸奉㫖噶爾丹已死其屬下三百餘戸帶噶爾丹之尸及伊女來降著大將軍選兵往覔丹濟拉所在押䕶前來餘兵遣囘一命將出師順治十三年定出征諸王貝勒貝子公於出師前一日將例賞衣服馬匹弓刀等物於午門前頒給大將軍率從征將士詣御前靣授行師方畧賜燕至出師日皇帝御太和殿授大將軍勅印詳見禮部賜茶遣行康熙十三年定命大將軍出征皇帝御殿授勅印畢兵部設海螺二百鳴螺軍士每旗二十五人於堂子街門之東設八旗䕶軍纛八䕶軍叅領八人於内門之南持纛依次而列皇帝於堂子行禮畢鳴角吹螺致禮於旗纛之神皇帝入長安左門出長安右門停輿竢大將軍䇿馬行過還宮命内大臣禮兵二部堂官祖餞於德勝門外以上詳見禮部雍正二年議準餞送出征大將軍命王大臣與大將軍副將軍奉茶酒禮兵二部堂官與叅贊大臣奉茶酒侍衛與出征各官奉茶酒畢望闕謝恩禮畢啟行七年命大將軍出征皇帝詣堂子行禮拜纛如儀惟不用叅領持纛乾隆十四年議準國家陳師鞠旅或命重臣經畧軍務或命大將軍統軍出征均臨時酌量奏請欽定其體統大畧相埓其應行事例約十有二條一曰授勅印經畧大將軍出師皇帝臨軒王公文武百官朝服侍班頒勅印於太和殿經畧大將軍率隨征諸將於丹陛上跪受勅印行禮如儀二曰祓社經畧大將軍出師先期祗告奉先殿啟行之日皇帝率經畧大將軍及隨征諸將詣堂子行禮鳴角吹螺祭纛於門三曰祖道經畧大將軍啟行乘輿親餞於長安門外賜巵酒佩弓矢上馬文武大臣承詔送至郊外有司具祖帳及燕禮兵二部堂官奉經畧大將軍茶望闕謝恩乃行四曰整旅凡隨征叅贊大臣均奉㫖欽簡外䕶勅印官内閣學士一人中書翰林院筆帖式各二人記室官四人戸兵二部司官各一人刑部理事官一人如蒙古地方則委理藩院官一人應隨侍衞候㫖欽定經畧大將軍前隊列上賜軍械如甲胄刀槍弓矢之屬次列令箭十二枝次列勅印䕶勅印官隨行經畧大將軍乘馬後建大纛叅贊大臣及戸兵二部司官刑部官記室官中書侍衞等均隨纛行又次以十二標旗大隊軍旅殿按領侍衛内大臣統兵或帶八旗大纛或帯黄龍大纛由部臨期請㫖五曰守土官相見經畧大將軍所過地方守土官將軍督撫蟒袍補服文官司道以下咸蟒袍補服武官總兵以下咸披執率弁兵列陣道旁跪迎提督副都統近前問安經畧大將軍升官㕔正坐將軍督撫旁坐文官司道以下武官提督副都統以下行庭叅禮至起行時將軍督撫以下各官候送如前儀六曰封章拜詔凡封奏營門鼓吹聲礮在營官弁兵丁均兩旁肅立記室官恭奉奏函安置帳中所設案上經畧大將軍行三跪九叩禮畢兵部司官恭奉奏函由中道授臺站立齎馳若詔書至營守營官兵肅立鼓吹聲礮如前儀經畧大將軍出營恭候兵部司官接受黄篋安置帳中所設案上經畧大將軍行三跪九叩禮受篋啟閲如遇欽差大臣到營經畧大將軍率在營大臣等離營三里外迎候跪請聖安守營官導引經畧大將軍與欽差大臣並馬進營鼓吹聲礮入幕欽差大臣宣㫖畢經畧大將軍正坐欽差大臣按品級坐欽差大臣囘京經畧大將軍率所屬離營恭送跪請聖安如前儀七曰升帳接屬凡軍營設大幕惟經畧大將軍近侍官暨辦理軍機有職掌者準令出入餘官均令幕外祗候擅入者禁議事時經畧大將軍正坐叅贊大臣及一品官均僉坐有問則起立致辭叅贊出入經畧大將軍起立不迎送提鎮等官禀事先由傳宣官轉達令入則引進令坐則向上僉坐每月吉及逄五逄十常叅之期叅贊大臣等官入幕按品列坐待茶凡叅贊大臣一品官入見於營門内下馬餘官於營門外下馬由角門出入如經畧大將軍之下設有將軍者與經畧相見照叅贊大臣一品官儀若外藩部落謁見幕外官均進幕肅立直班官弁兵丁按汛整齊肅立軍門鼓吹聲礮經畧大將軍升坐外藩人前跪禀辭畢即引出各官兵丁咸退八曰簡閲凡簡閱營伍經畧大將軍起行軍門鼓吹聲礮守營各大臣及官弁兵丁離營里許候送首隊齎勅印前行十二標旗隨後周廵提鎭等官屯營之處每至一營官兵皆離營一里外整隊列陣迎候經畧大將軍閲過提鎭等率所屬官兵隨行離本汛乃止九曰獻俘經畧大將軍告㨗解送俘囚至京欽天監擇吉獻俘於太廟社稷壇至期兵部率解俘官兵押俘以白組繫頸由長安右門入進天安門右門至太廟街門外嚮北立候告祭大臣至令俘嚮北跪告祭大臣進太廟行禮畢兵部率解俘官兵押俘至社稷街門外令俘仍嚮北跪告祭行禮如前儀獻俘之次日皇帝御午門樓王公百官朝服侍班鐃歌大樂金鼓全作兵部堂官以經畧大將軍解到逆俘跪奏請㫖有制宣下刑部刑部堂官跪領㫖押俘出天安門右門王公百官慶賀聼贊行三跪九叩禮十曰受降凡經畧大將軍克敵受降軍營飛章入告得㫖允降乃大書露布傳示中外築受降壇於大營之左壇方南嚮壇以南百步樹大旗書奉詔納降字降者至兵部司官引立旗下經畧大將軍出營鼓吹聲礮叅贊大臣各官皆隨行兵部司官令降者於受降旗旁嚮北跪匐伏候經畧大將軍登壇鼓吹聲礮叅贊大臣及一品官分翼僉坐隊伍將領等官分翼肅立其餘官兵分班排立兵部司官引降者抵壇前匐伏乃宣諭德音酌加賞賚聲礮鼓吹降者泥首伏謝而退十一曰告成凡奏凱告成致祭天地宗廟社稷陵寢釋奠於先師孔子勒碑太學羣臣恭進賀表並請編纂方畧以垂奕禩十二曰勞師凡師旋將入城遣廷臣出郭迎勞經畧大將軍還朝謝恩皇帝御殿設鹵簿王公百官齊集如儀鴻臚寺官引經畧大將軍從征各官於丹陛上恭繳勅印行三跪九叩禮畢皇帝還宮翼日賜燕頒賞進爵有差一軍令天聰三年諭朕仰承天命興師伐明拒戰者不得不誅若歸降者雖雞豚毋得侵擾俘獲之人毋離散其父子夫婦毋淫人婦女毋掠人衣服毋折廬舎祠宇毋毁器皿毋伐果木如違令殺降淫婦女者斬毁廬舎祠宇伐果木掠衣服及離大纛入村落私掠者鞭一百又毋食明人熟食酗酒聞山海闗内多有鴆毒更宜謹愼以乾糧飼馬或馬匹羸瘦可量煮豆飼之肥者止秣以草竢休息時再飼以糧凡採取柴草毋得妄行須聚集衆人以一人爲首有離衆馳往者拏究如有故違軍令者將不行嚴禁之都統叅領佐領一并治罪欽此崇德三年諭凡和碩親王多羅郡王多羅貝勒固山貝子臨陣交鋒若七旗王貝勒貝子却走一旗王貝勒貝子拒戰七旗獲全即將七旗佐領下人丁給拒戰之一旗若七旗拒戰一旗却走即將却走人丁分與七旗若一旗内拒戰者半却走者半即以却走人丁分給本旗拒戰者有因屯劄他所未拒戰而無罪者免革人丁其拒戰之王貝勒貝子别行給賞若七旗未及整伍一旗王貝勒貝子拒戰得功者按功次大小俘獲多寡賞之野戰時本旗大臣率本旗軍下馬立王貝勒貝子等率䕶軍乘馬立於後若與敵兵對仗王貝勒貝子大臣不按隊伍輕進或見敵寡妄自衝突者奪所乘馬匹及俘獲人口凡兩軍相對必整齊隊伍各按汛地從容前進如擅離本隊隨别隊行擅離本汛由他汛入及衆軍已進獨却立觀望者或處死或籍沒或鞭責或革職或罰銀酌量治罪凡整伍前進稍有先後毋得彼此爭論但以按汛擊敵不致退縮爲上若有以此爭論者即爲立心不端之人如敵人不戰而遁我軍追擊之宜選精兵驍騎合力馳擊䕶軍統領不得前進止宜領纛整伍分隊以躡其後倘遇伏兵或於追躡時遇敵旁出䕶軍統領乃親擊之凡大軍起營時各按佐領旗纛整隊而行若有一二人離隊往來尋索遺物及酗酒者皆貫耳自出城門務遵軍律肅静行伍毋得喧譁都統副都統叅領䕶軍統領佐領以次各有統束統束嚴明則該管隊伍豈有喧譁之理今後有喧譁者該管官坐以應得之罪喧譁者責懲軍行時如有一二人離旗行走者許同行人即報送本都統執送者賞銀三兩下營時凡取薪水務集衆同行妄致失火者斬軍士甲胄均書號記胄兩旁皆用圓鐵葉無甲者衣㡌後亦書號記一切軍器自馬絆以上均書姓名馬必繫牌印烙不印烙者罰銀二兩箭無姓名者罰銀二十兩如得他人箭隱匿不出者亦罰銀二十兩軍行時若見禽獸馳馬追射者兵丁射以骲箭貝子大臣坐以應得之罪夜行時每佐領人等有别吹竹爲號者執治貫耳若不執治議叅領罪盜鞍韂及轡絡羈絆者按法治罪若馬上行李偏墜應整理者本旗人均站立待整乃行兵入敵境者若有一二人離營私掠被殺者妻子入官仍治本管官罪勿毁寺廟勿妄殺平人抗者戮之順者養之俘獲之人勿褫其衣服勿離散人夫婦雖不爲俘獲者亦不許褫衣侵害其俘獲之人勿令看守馬匹如有一二人妄取糧草被殺者罪與離伍擒掠者同勿食熟食勿飲酒前此我兵飲食不愼以不知敵人置毒於中耳今特曉諭宜加謹愼有不遵者依律治罪欽此順治八年定發兵之時或在家或在外違限者該管叅領佐領等官每兵一名罰銀五兩若至革職等重罪候㫖定奪兵丁不遵約束抗違者酌量罪犯責懲該管官仍行議處十三年定隨征前鋒䕶軍領催驍騎厮養卒等私自逃回初次鞭一百遞發軍前二次正法康熙十一年題準官員出征在家規避不起身者革職在外違約者革職提問䕶軍及領催驍騎等在家規避不起身者鞭一百仍發軍前在外違約者鞭一百所獲人口入官若繫差遣之處不遵號令違誤者鞭一百出兵之處不遵號令妄行者爲首人正法餘各枷三月鞭一百該管官罰俸一年十八年諭領兵諸王將軍等藉通賊爲名燒民房舎擄掠子女搶奪財物或分兵所往之處私自擄掠者令該督撫題叅治罪如督撫隱匿事發日督撫革職欽此十九年題準或攻城或野戰如將陣亡屍骸不能救出者同戰之叅領散秩官䕶軍校驍騎校降二級調用領戰之該營總降一級調用領戰之大員罰俸一年二十三年議準官兵被傷退回者若係一二等傷痕免議三等以下傷痕仍與失利者同罪如未經被傷冐作傷痕退回者照規避例治罪若繫官員重傷止許親隨人等送出無親隨人令驍騎一二名䕶送兵丁重傷亦止令驍騎一二名䕶送多差者將差撥各官治罪多送之驍騎亦同議處二十九年諭本朝自列聖用兵以來戰必勝攻必克所向無敵者皆以賞罰明法律嚴兵卒精鋭器械堅利人思報國殫心奮勇之所致也今軍行其令各該都統以下察覈軍實凡甲胄弓矢諸軍器務令犀利堅好盔甲均繫號帶並書旗分佐領姓名繫於馬尾其行也視大纛整隊齊發有零星前後亂行及酗酒者該管官立拏懲責其止也各按旗分隊伍分别屯劄有前後錯亂者罪及該管大員馬無印矢無名各罰以銀給拏獲者竊取鞍轡什物馬匹者視其多寡之數治罪失火者從重究懲官兵廝役所過地方毋騷擾毋搶掠毋踐踏有擅離營伍入村落山谷奪人財物者軍法從事並罪本主及該管官軍士廝役逃亡在汛界内立行察拏治罪如出汛界外該管大員即遣官兵窮追務獲立斬以徇如不能獲則將往追官兵從重治罪其逃人之主及該管官一幷嚴行究懲既出我境哨探斥堠務期嚴密如曠野列陣交兵王貝勒貝子公大臣有不按次序攙越前進及見賊兵寡弱不復請令冐昩前進者有功不叙仍治以罪其進也須齊列緩轡按隊前行如自離其隊而附人後或自棄其伍而入别行或他人已入而獨留不進者其應斬應籍没及懲責革罸分别治罪如整旅而進擊敗賊兵厥功維均勿以畧分先後致生爭競至敵兵不戰而潰則選精騎追逐之後隊躡踪而進如遇伏兵或賊兵有旁出者則後隊接戰夫兵者所以討逆而安順也領軍大臣果能嚴束其下不使良民受害膺上賞違者罰無赦凱旋之日有以兵器私售䝉古者本人治罪並及該管官馬乃大軍急需須視水草佳處小心牧養起行時則留將卒察遺失之馬轡騣尾所繫字様交還原主如繫疲馬則開明馬色數目交所在官司人民䝉古善爲牧養報知兵部如有隱匿私乘及殺之棄之者治以罪其遺失馬匹之人亦開明馬色報兵部存案恐官兵未能徧知爾部其刋布曉諭之欽此三十六年諭議政大臣等凡調遣外藩兵馬之事已交大將軍如皆請㫖而行則設有倉卒軍機必致遲誤嗣後均聼大將軍便宜調遣欽此雍正元年諭自古用兵之道首以申明號令爲務周易曰師出以律周書曰不愆於六步七步不愆於四伐五伐乃止齊焉可知進退步驟之閒尺寸不可違越方爲節制之師必須平日申明號令使三軍之士無不熟知深曉倘其中或有不遵者則按軍律置之於法是其獲罪乃本人之自取無所歸咎雖領兵將帥不能以已意一毫輕重於其間此大公之道也我國家武備精强超越往古從來軍行之際紀律嚴明信賞必罰是以天戈所指迅奏膚功此中外臣民所共知者今承平日久新進少壯之人未曾親履戎行則於從前規制未必一一諳練若不詳細申明宣諭以致官弁兵丁等或因陷於不知而遽罹罪譴朕心實爲不忍今特令大臣等酌議軍令條約經朕親加鑒定凡大端細務莫不備載其中者蓋以軍機闗繫至重必使事事合於紀律人人祗奉章程勿犯重罰而妄冀從輕勿因事小而不遵成法將來荷天眷佑奏凱言旋凡我弁兵等數十萬人有大功而無小過此則朕心所厚望者也著即刋刻交與兩路大將軍通行頒布咸使凛遵欽此遵㫖議準凡戰陣之際聼掌號擊鼓鳴金爲進止聞鼓不進聞金不止者斬遇敵進戰有回顧畏縮交頭接額私語者斬專司掌號擊鼓鳴金之人聞令即掌號擊鼓鳴金令止即止違者八旗兵鞭責四十緑旗兵棍責三十臨陣違令者斬大將軍密傳軍令轉傳之人增減要言者斬大將軍授緊密軍令私告他人以致宣揚誤事者斬官兵殺傷良人冐功者斬掠取他人戰功及詭稱功績以無爲有以輕報重者斬沿塗欺壓民番恃强買賣掠財物毁房屋姦婦女者皆斬指稱夢見鬼怪造言惑衆者斬兵丁中塗染病該管委署䕶軍校領催紅旗管隊即同䕶軍校驍騎校千總把總一同騐確禀明該管官令醫調治如不驗看醫治該管委署䕶軍校領催鞭五十紅旗管隊棍責四十䕶軍校驍騎校千總把總插箭如兵丁詐病偷安者斬大將軍與同官密議軍情有私行竊聼者斬差往探聼賊人形勢畏縮不往詭稱已去妄報虗實及探聼不實貽誤軍機者斬䕶逸馬隱匿私乘不給馬主者八旗兵鞭五十緑旗兵棍責四十仍插箭遊營有獲馬私宰或售與别人者皆斬臨陣竊馬潛逃者斬傳首示衆如在劄營地方犯者八旗兵鞭一百緑旗兵棍責八十劄營地方輪班守卡嚴肅訪察夜遇警急即密禀申報設備以竢有驚怖喧譁擾動散走以致亂營者斬私語嗟怨長噓短嘆者八旗兵鞭七十綠旗兵棍責六十責後復犯並臨陣時故違者斬黑夜無故驚呼疾走致亂營伍者斬白晝犯者八旗兵鞭五十緑旗兵棍責四十面承該管官諭令辭色傲慢者八旗兵鞭五十緑旗兵棍責四十有意抗違致誤軍機者斬踈防失火燒燬草廠八旗兵鞭一百緑旗兵棍責八十若臨敵境失火致燒草廠者斬失火致燒衣服器械八旗兵鞭五十緑旗兵棍責四十如在存貯火藥地方尖火者八旗兵鞭一百綠旗兵棍責八十該管䕶軍校驍騎校委署䕶軍校領催千總把總紅旗管隊皆插箭遊營臨陣時軍營失火致誤大事者兵丁及該管委署䕶軍校領催紅旗管隊悉斬以徇兵丁夤夜夢魘旁人即行喚醒如有隨聲應和擾及營伍者八旗兵鞭七十緑旗兵棍責六十該管委署䕶軍校領催紅旗管隊插箭遊營臨敵營犯者皆斬管守營門縱人擅入者八旗兵鞭七十緑旗兵棍責六十對敵時犯者斬差往偵探之人遇賊投誠不禀報者八旗兵鞭七十綠旗兵棍責六十如將投誠之人不即解送以致逃散者八旗兵鞭一百綠旗兵棍責八十因而洩漏軍中虗實者照洩漏軍機例治罪大兵進勦敗賊後不奉大將軍令擅奪車馬輜重者插箭遊營因而擾亂營伍者斬倚强欺弱酗酒爲非不遵約束輕者鞭責重者插箭汚穢水泉飲不以次者八旗兵鞭一百綠旗兵棍責八十支領口糧肆行抛棄狼籍者八旗兵鞭一百綠旗兵棍責八十該管委署䕶軍校領催紅旗管隊等不即呈報者插箭兵行不按隊伍踐踏草地者八旗兵鞭一百綠旗兵棍責八十劄營時牧放馬駝牛羊縱令蹂躪者八旗兵鞭一百綠旗兵棍責八十仍插箭遊營該管官插箭兵丁押運軍糧在塗私竊升合或竊同行兵丁口糧及損傷盛米囊橐致多虧折者八旗兵鞭一百綠旗兵棍責八十弓箭撒袋腰刀皮索一切軍器不加收管致有遺失並應攜器械擅自離身八旗兵鞭一百綠旗兵棍責八十該管委署䕶軍校領催鞭四十紅旗管隊棍責三十䕶軍校驍騎校千總把總等插箭在塗見遺失刀箭等物拾取不禀報給還者八旗兵鞭四十綠旗兵棍責三十均插箭遊營無𦂳急事私行馳馬者八旗兵鞭五十緑旗兵棍責四十追奪馬匹令其步行兵行各按隊伍以次而前無論道路險夷寛窄有先後離隊攙越者八旗兵鞭五十綠旗兵棍責四十均插箭遊營結營之後各帳房出一人見藍旗則取柴見黑旗則取水有便溺者守門官兵驗明照牌準其出入起更後不準出營違者八旗兵鞭四十綠旗兵棍責三十該管委署䕶軍校領催紅旗管隊等不嚴行約束者插箭夜傳軍令怠慢不遵廵察坐堆偷安寢睡誤更曠班者八旗兵鞭一百綠旗兵棍責八十該管紅旗管隊不察報者八旗兵鞭五十綠旗兵棍責四十臨陣時犯者斬妄行動作傲慢官長者插箭遊營各營馬步兵所攜槍礮火藥不加謹收貯以致潮濕不能著火及玩忽抛棄或用藥任意狼籍者八旗兵鞭五十綠旗兵棍責四十該管紅旗管隊插箭遊營如有遺失火藥者八旗兵鞭一百綠旗兵棍責八十該管委署䕶軍校領催紅旗管隊插箭遊營鉛弹務按槍口之大小如式製造如鉛彈不合槍口繫平日演放八旗兵鞭五十綠旗兵棍責四十皆插箭遊營該管委署䕶軍校領催紅旗管隊插箭遊營䕶軍校驍騎校千總把總插箭臨陣時兵丁用不合槍口之鉛彈施放者斬該管委署䕶軍校領催鞭一百紅旗管隊棍責一百䕶軍校驍騎校千總把總插箭遊營營總叅領叅將守備記大過一次馬駝牲畜不遵照傳檄如法牧養者八旗兵鞭一百綠旗兵棍責八十該管䕶軍校驍騎校委署䕶軍校領催守備千總把總插箭沿塗所遇井泉飲馬之時以次而前不得爭先擁濟有故意爭奪縱馬踐踏汚穢泉水者八旗兵鞭一百綠旗兵棍責八十乾隆十三年諭軍旅乃國家第一要務軍法從事定例綦嚴今刑律内玩寇老師有心貽誤竟無正條非所以重軍務儆戒失律也夫科場作弊尚即正典刑若以行軍相較孰爲輕重自應稽察舊案明著刑章俾衆知畏法方能鼓勇用命此非朕欲用重典實以昭示武臣肅紀律而勵勇敢辟以止辟之義也見在纂修㑹典著軍機大臣㑹同該部詳酌定議具奏載入遵行欽此遵㫖議準重臣膺閫外之寄自當戮力疆場綏寧邊徼至於玩愒偷安甘心養寇傾險妒功忍心誤國實屬情罪重大今按中樞政考軍令一篇均爲所屬弁兵約法不及統兵之人誠於責成專閫申嚴軍紀之意有所未備嗣後凡統兵將帥玩視軍務茍圖安逸故意遷延不將實在情形具奏貽誤國事者又凡將帥因私忿媢嫉推諉牽制以致糜餉老師貽誤軍機者又凡身爲主帥不能克敵轉布流言搖惑衆心藉以傾陷他人致誤軍機者均屬有心貽誤應擬斬立決庶軍律嚴明而身任元戎者亦知儆懼奮勵矣十四年諭國家設立營伍領以將弁所以禁暴止姦折衝禦侮責綦重也兵法失律有誅書稱不用命戮於社立法之嚴如此近來法司衙門於官犯相䝉多入緩決因而武弁亦邀寛典大非立法之本意夫軍旅之事國家不能保其百年不用必當申明紀律信賞必罰方足以振憲綱而作士氣誠使爲將弁者在平時則勤訓練嚴拔補謹廵防以固疆圉設有緩急統帥則詳審機宜熟籌勝算其偏裨士卒則奮勇爭先摧鋒陷陣不避矢石効臂指之使自能克敵制勝若平時不能拊循而流於廢弛或苛急而激爲忿怨偶遇小醜竊發則號令不明指揮不定畏葸退縮縱寇老師或臨陣之時望風委靡甚至欺蔽容隱負恩僨事國家所倚以爲干城腹心者何在此而不誅何以示懲乃使久繫囹圄累歳經年虗擬罪名獲全首領是骫法也後之任事者何由知戒朕以仁治天下慎重民命罔敢弗欽而天討所在朕勿敢赦如訥親張廣泗之誤國負恩屢頒諭㫖已立正典刑慶復之欺䝉縱寇亦已賜令自盡而詳閲秋朝審册内除李質粹宋宗璋尚須待質袁士弼情非退縮應該緩決此外如許應虎之失誤軍機臨陣退縮沈瑞龍之私回任所託病偷安胡璘劉鍾之恇怯退避離汛失守又如張通楊文富之棄地不守阻囘援師皆法之斷不容貸而情之毫無可原者即其中有先經緩決之犯皆令改擬予勾正法以爲炯戒凡在披堅執鋭之徒當思臨陣爭先赴蹈危險死於鋒鏑或所不免而國家加恩贈䘏廕及子孫如有退縮偷安挫衂失事縱一時茍免終於身伏斧鑕等死耳死敵者榮死法者辱雖至愚亦當審擇而知所處矣若專事姑息積玩成疲於軍務大有闗繫訥親張廣泗慶復之敢於貽誤未必非向來失律倖免人心無所震悚有以啟之也今於勾到後特頒此諭詳悉開導令武臣咸知僨事者必無軼罰罹罪者斷難倖生與其伏法於誤事之後不如捐軀於臨事之時大義昭然將必致身効命以戰則克以守則固不致茍且偷生蹈於顯戮正辟以止辟之義也此諭着刋刻頒發令内外武職衙門入於交盤冊内永遠傳示各宜凛遵欽此又議準軍前傷病亡故軍兵不許開報原籍惟令報明統兵大員㨿實察驗如有在原籍私行妄報者按法嚴究又議準調撥鄰省官兵已到軍前悉令統兵大員節制該官兵或有事故應報原管督撫提鎮者詳明統兵大員聽候轉咨不得私自通報察岀即行叅處又奏準凡報軍機如應付官兵軍裝協解兵餉等事仍用密題得㫖亦令密行不得發鈔欽定大清㑹典則例卷一百九
