照向來頒給之式關防條記分寸本無一定應將舊頒大小各衙門印模分寸比照定式每銅十兩經火煉三次應加折耗銅六兩鑄造已成應將二十八顆注銷數目折耗分兩及見在每顆重若干兩之處逐一存案並將厚薄分寸亦詳細注册作為成式嗣後印記關防有大小厚薄不合定式或篆文有訛者令各督撫驗實奏聞咨部換給冉鑄印工匠養贍不敷必多侵蝕請照工部製造庫匠役工食之例每月給銀一兩米二斛二斗五升鑄印所需煤炭亦請酌增一倍乾隆元年奏準直省督撫藩臬印信關防及文武各官新設衙門由吏部兵部會同禮部校正印模擬定字樣鑄給以昭畫一二年奏準鑄造金寶銀印每兩止準折耗二分又奏準鑄印局向有額設漢貟外郎一人後經裁汰請復設員外郎專司其事給與關防至大使一人由該部儒士補授朝夕在司董率鑄造亦屬事繁之任應令五年期滿咨吏部入於升班選用又定副都統銀印方三寸二分厚八分又奏準內務府改鑄二品衙門印信方三寸二分厚八分六部理藩院都察院均改鑄一品衙門三臺印信方三寸三分厚九分七年覆準各省印信關防文官自州縣以下武官自副參以下均停其專差赴部請領所有關防印記發交提塘由部用重紙密糊膠封於印面騎縫處鈐蓋司印將給發日期填注文內一並交發各提塘務照依文移程限齎送該督撫提鎮仍將收到印信開用日期報部察核倘有遷延違限以致滋弊者由部察明參劾交兵部議處又覆準凡舊印繳部令該衙門於印面清漢印文正中鐫一繳字呈送上司驗看封固送部由部驗明封貯存司彚齊銷燬十一年議準文書以印信為慿嗣後封印之前各衙門豫備空白文書於應用印信處豫為鈐蓋存貯備用俟開印時將未用之空白文書銷燬不得仍用印信遵封字樣十三年諭國家寶璽朕依次排定其數二十有五向兼清漢文漢文皆用篆體清文則有專用篆體者亦有即用本字者今國書經朕指授篆法宜用之於國寶內有青玊皇帝之寶本繫清字篆文乃太宗時所貽自是以上四寶均先代相承傳為世守者不宜輕易其檀香皇帝之寶以下二十一寶則朝儀綸綍所常用者宜從新定清文篆體一律改鐫欽此遵旨奏準於內閣見在用寶頒發誥敕內敬將制誥之寶遵照指授篆法用玉筯體擬篆清文恭呈御覽俟欽定後即交該衙門選擇吉期於大內恭領應鐫御寶敬謹改鐫皇太后皇后金寶各宫妃金寶金印均玊筯篆體統俟册封皇后舉行慶典加上徽號時交該衙門照例敬謹成鑄恭鐫是年奏準親王金寶郡王飾金印向無鈐用之處應令諸王各將寶印送部照式改鐫朝鮮國王金印應俟襲封時别鑄換給內外文武衙門印信關防條記應令各衙門齎送印模到部酌量衙門大小職事繁簡先改鑄內部院領侍衛內大臣八旗都統外督撫藩臬將軍都統提鎮其餘依次改鑄換給又奏準本朝定例大內寶文皆玉筯篆親王寶文郡王印文朝鮮國王印文及內外文職大小衙門印信關防條記皆上方大篆內外武職大小衙門印信關防條記皆栁葉篆文伏思親王郡王朝鮮國王與大內寶文宜有分别今擬親王金寶郡王飾金銀印朝鮮國王金印均用芝英篆宗人府衍聖公辦理軍機事務處內務府翰林院六部理藩院都察院總理三庫事務鑾儀衛盛京五部銀印均用上方大篆三旗領侍衛內大臣都統護軍統領前鋒統領火器營嚮道總領經略大將軍將軍鎮守將軍副都統提督銀印均用柳葉篆通政使司大理寺太常寺順天府奉天府各省布政使司銀印均用小篆詹事府各省按察使司鹽運使司武備院上駟院奉宸苑光祿寺太僕寺銅印均用小篆鴻臚寺國子監一二品衙門各司欽天監太醫院左右春坊司經局鑾儀衛各司各所六科各道鹽政時憲書銅印均用鐘鼎篆中書科五城兵馬司三四品衙門各司欽天監各科經歷司司獄司直省知府知州知縣以下等官銅印均用垂露篆直省總督總河總漕總督倉場巡撫銀關防欽差大臣銅關防均上方大篆內翻書房各省學政銅關防均小篆五城御史順天府丞奉天府丞户部銀庫段庫顔料庫坐糧廳各處監督道官織造銅關防均鐘鼎篆各部院衙門廳署庫所局各處大使同知通判州同州判銅關防均垂露篆總兵官銅關防柳葉篆參領各處總管城守尉協領防守尉副將參將遊擊銅關防均殳篆都司銅關防佐領內務府管領守備以下等官銅條記圖記均懸針篆京城僧録道録銅印直省僧綱道紀等銅關防均用垂露篆又奏準凡鑄大內寶印本部會同內務府造辦處敬謹鑄造十四年奏準翰林院堂印向繫五品銅印今翰林院掌院學士繫從二品經內翻書房列入一二品衙門定印文為上方大篆應照原奏將翰林院換給二品銀印以符體制又奏準改鑄理藩院堂印清漢字樣均照欽定篆文蒙古字樣應否仍照本文鐫刻奉旨理藩院印文之蒙古字樣不必篆書外藩扎薩克盟長喇嘛並蒙古西藏一應清文蒙古唐古忒文亦不必篆書其在京扎薩克大喇嘛印清文著篆書蒙古文不必篆書又奉旨見因辦理清文篆書將一應印信悉照篆文鑄造據禮部奏稱有大光明殿住持及龍虎山上清宫提點司兩銅印應行徹回無庸改鑄再妙正真人文覺禪師無閡永覺禪師之銀印均無鈐用之處無庸改鑄其應否徹回候命下遵行等語大光明殿住持及上清宫提點兩印應照部議徹回其妙正真人文覺禪師無閡永覺禪師三銀印繫雍正年間並敕諭一同頒發乃賜給本人不過圗章之類非外藩喇嘛傳授承用印信可比無庸改鑄亦無庸徹回應俟本人身後繳部銷燬再似此者尚有幾何著禮部詳考奏明遵照辦理該部存案嗣後如有特賜方外人等印信均照此例行十四年諭近用新定清文篆書鑄造各衙門印信所司檢閲庫中所藏經略大將軍將軍諸印凡百餘顆皆前此因事頒給經用繳回未經銷燬者會典復有命將出師請旨將庫中印信頒給之文遂致濫觴朕恩虎符鵲紐用之軍旅所以昭信無取繁多庫中所藏其中振揚威武建立膚功者具載歷朝實録班班可考今擇其克捷奏凱砥定迅速者經略印一大將軍將軍印各七分匣收貯稽其事迹始末刻諸文笥足以傳示奕祀即仍其清漢舊文而配以今製清文篆書如數重造遇有應用具奏請旨頒給一并藏之皇史宬其餘悉交該部銷燬此後若遇請自皇史宬而用者蕆事仍歸之皇史宬若遇因一事特行頒給印信者事竣交部銷燬欽此又奏準印信關防所關甚重篆文既經欽定理應普給頒發以昭畫一據內翻書房並辦理漢篆之大臣每日可得印模八九張隨篆隨鑄每年可得三千餘顆約計三年可以完俟所有加雇匠役工價並鑄印銀銅及煤炭等項仍於户工二部支取俟工竣之日仍照舊例辦理又覆準土司距省逺近不一若通行飭取更改印信恐滋疑懼應令於承襲時換給十六年奏準東陵泰陵承辦事務關防照內務府總管印用上方大篆尚虞照三品文職印用小篆總管尚膳尚茶圗記照三品武職關防用殳篆廣恩庫鈐記照户部三庫印信用鐘鼎篆通州倉關防照武職三品關防用懸針篆灌頂普善廣慈大國師印慧悟禪師印總管京師喇嘛班第扎薩克大喇嘛印盛京總管喇嘛班第印均用轉宿篆又奏準印信以昭法守防弊務期周密原定發印章程雖用紙封固鈐以司印但恐巧詐之徒或於塗間設法啓揭私行開用亦未可定請嗣後鑄印之時於印邊無字之處多留一腳俟頒發後齎與本官領受然後截去其腳磨平印邊於開用日期文內一并聲明報部其印中有字處仍舊加封鈐固以除弊端又奏準印信關防應於鑄造之時四角各留一柱俟齎到本官截磨開用一並聲明報部十七年奏準新鑄銅印均用紅銅白鉛三七配搭鑄造嗣後遇有各衙門印信糢糊請換者應照新印銅色鑄給以昭畫一又奏準印信關防圗記自十四年起三年期滿已照數鑄完次第恭呈御覽嗣後如有新增及應行補給者仍送翻書房篆文由部照式鐫造所有原設匠役八名仍照舊例辦理無庸别給工價十八年奏準各省舊印應照督撫咨覆各部院公文之例以新印開用日期限四月之內將舊印鐫字封固繳部如逾限不繳照例參處欽定大清會典則例卷六十三
