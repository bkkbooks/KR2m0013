body:
  text: 禮部儀制清吏司進表一進表箋順治元年定萬壽元旦冬至三大節在京王公暨文武百官各進賀皇帝表文一通表文由內閣撰擬表袱表匣由工部備造如遇特典應進慶賀表箋則內閣臨期撰擬在外直省文武各官進賀表箋均敕內閣撰擬定式頒發各布政使司按察使司都司直隸各府州各差官齎進是年題準慶賀皇帝萬壽元旦冬至表式在京稱某親王臣某等諸王貝勒文武官等在外稱某官臣某等誠歡誠忭稽首頓首上言伏以德統乾元首正六龍之位建用皇極宏開五福之先恭惟皇帝陛下率育蒼生誕膺景命寰區和協聲教覃敷四海一而萬國來王川嶽靈而俊乂斯出太平有象厯服無疆臣等恭遇熙朝欣逢聖誕元旦羈長至心在外官於此下增身職業戀闕廷二句伏願玊燭長調慶雍熙於九牧金甌永固登仁夀於萬年臣等無任瞻天仰聖歡忭之至謹奉表稱賀以聞又題準慶賀皇后千秋元旦長至箋式具官至上言同前伏以祥凝璇室仰內治之宏昭瑞靄椒宫慶母儀之光大敬惟皇后殿下安貞表範恭儉垂型博厚協載物之仁恩隆逮下肅雍贊齊家之化德茂承天臣等以下式同前欣逢令節元旦長至伏願徽音益著彌增彤管之輝景福駢臻永紀瑶編之盛以下式同前又定凡表並用小字楷書表文前上面黏黃帖一方如印大帖下用印黃帖所書如萬壽書進賀萬壽表文元旦書進賀元旦表文冬至書進賀冬至表文末後年月日上亦用印束封上用黃帖上所書如前黃帖下用印印下書某官臣某上進謹封於上進謹封字上用印副本用手本小字楷書後年月日上用印黃綾裱褙袱匣箋文繕書印封皆與表同八年定元旦冬至直省文武五品以上官各進賀皇太后表文皇帝表文皇后箋文布政使及參政參議道等官每節共進表二箋一按察使及副使僉事道等官每節共進表二箋一鹽運使各府直隸州衍聖公每節各進表二箋一總兵官副總兵參將遊擊等官每節各進表二箋一都司行都司各衛每節各進表二箋一萬壽節秖進皇帝表一總督巡撫不進表箋凡遇慶賀大典具本慶賀九年諭賀表賀本體式不同近來賀本均用表體著撰擬本式頒發通行欽此十三年定皇太后聖壽照元旦冬至例直省文武各官均進賀表康熙元年聖祖仁皇帝尊上太皇太后兩宫皇太后尊號禮成是日早禮部官設香亭表亭奉在京王以下文武各官所進清漢字表設表亭內校尉舁行鼓樂前導由長安左門中門進天安門左門至午門前陳設禮部官自亭奉表入午門左門設太和殿前黃案上候升殿王以下各官皆跪大學士奉表恭詣御前跪讀王以下文武各官均行三跪九叩禮畢頒詔天下各直省文武官五品以上諸司應進表文差官齎進慶賀又定嗣後遇太皇太后皇太后聖壽及元旦冬至各節均照例齎表入賀其賀表文式內院撰擬交與禮部頒發依式齎進是年題準慶賀皇帝萬壽元旦冬至表式與順治元年同又題準慶賀太皇太后聖壽表式具官至上言同前伏以坤德無疆首立母儀之極天庥滋至聿彰聖壽之隆慶積重闈歡騰函夏恭惟昭聖慈壽恭簡安懿章慶敦惠太皇太后陛下齋莊中正光大含𢎞開厯服億萬年燕天昌後邁春秋八千嵗錫類施仁兹當壽豈之辰咸切尊親之戴臣等王等屬在懿親文官職守封圻武官職典戎行土官職在邊方欣逢盛節伏願瑞靄宮庭常集介睂之祜化行寰海永昭恆月之輝臣等無任瞻天仰聖歡忭之至謹奉表稱賀以聞又題準慶賀太皇太后元旦表式具官至上言式同前伏以乾元啓瑞坤厚凝禧欣瞻四序回春永賴重闈有慶恭惟昭聖慈壽恭簡安懿章慶敦惠太皇太后陛下敬孚壼範德著徽音慈恩篤祜升平聖善宏開景運化日舒長於萬國太和光被於昌辰臣等以下式同前恭逢元旦轉璇樞而獻頌望切瞻雲祝嵩壽以陳辭誠抒拱極以下式同前又題準慶賀太皇太后冬至表式具官至上言式同前伏以初陽來復六宇升平龍樓瑞靄昌時鳳厯和舒化日恭惟昭聖慈夀恭簡安懿章慶敦惠太皇太后陛下肅雍叶慶純敬昭徽配德端位於重闈啓後著功於皇極安貞體順尊養凝庥臣等以下式同前欣逢長至誦孝慈之則四海回暄見天地之心萬靈受泰以下式同前又題準慶賀皇太后聖夀表式具官至上言式同前伏以坤德宏昭啓一人之有慶天庥茂集綿萬壽以無疆喜溢宫闈歡騰海宇恭惟仁憲皇太后陛下恩隆錫類化著慈徽開奕葉之靈長仁膏普被介千秋之純祜福履駢臻兹當夀豈之辰咸切尊親之戴臣等以下式同前恭逢盛節伏願瑞靄彤闈􅜯算益增昌熾祥呈瑤牒洪禧永並升恆以下式同前又題準慶賀皇太后元旦表式具官至上言式同前伏以乾元肇瑞坤厚凝禧天工合隂教以咸亨嵗序慶陽和而成泰恭惟仁憲皇太后陛下仁宏育物德懋嗣音澤流時夏知化日之方長世濟如春適昌辰之初啓臣等以下式同前恭逢元旦望椒殿而稱觥願膺純嘏喜瑶階之增策茂對清時以下式同前又題準慶賀皇太后長至表式具官至上言式同前伏以一陽初復萬彚昭蘇泰階共際升平福履彌增昌熾恭惟仁憲皇太后陛下恩隆祚嗣化洽宫庭象坤道以安貞惟德用懋集天庥而永固與時偕亨臣等以下式同前欣逢長至祥呈雲物瞻化日之舒長頌獻升恆祝純禧之茂集以下式同前又題準慶賀皇后千秋元旦長至箋式與順治元年同八年定文官表箋布政使司彚進衛所表箋都司彚進武官表箋提督彚進無提督之省總兵官彚進康熙十四年題準皇太子千秋節元旦長至箋式具官至上言式同前伏以天心眷佑綿萬世之洪圖國本茂隆介千秋之景福敬惟皇太子殿下元良德裕英敏性成膺有道之昌期臣民歡戴奉無疆之寶籙宗社奠安臣等以下式同前欣逢令旦正旦長至伏願永承泰運合宇宙以諴和大集祥符躋升恆於悠久臣等無任歡忭踴躍之至謹奉箋稱賀以聞以上書寫封印皆與表同但易箋文並紅綾袱匣十六年題準皇后千秋箋文照例齎進二十七年覆準正定總兵官既裁嗣後紫荆等協營路慶賀表箋令該撫彚進二十九年議準慶賀表箋訛書遺漏並顛倒違式交部議處其表箋發還令照式再繕補進三十一年定直隸各省文武官凡遇慶賀表箋停其専官齎送按節統於總督衙門彚齊與總督慶賀表章同由驛遞送進無總督之省由巡撫彚送三十二年題準各省文武官慶賀表箋通省統用火牌専遣承差齎送又覆準衍聖公慶賀表箋按節仍令專差齎送四十四年議準朝鮮國王慶賀表箋每嵗更換辭句不盡合式應頒發定式令照式繕進以省繁文五十五年議準表箋事關大典自五十六年萬夀聖節為始文官按察使以上武官副將以上準其進表仍照例該督撫彚齊由驛遞投禮部轉送內閣如有藉進表名色派斂需索該督撫科道核明治罪六十一年十二月題準慶賀皇帝萬壽元旦長至表式具官至上言式同前伏以德統乾元首正六龍之位建用皇極宏開五福之先恭惟皇帝陛下率育蒼生誕膺景命撫時出政八風順而嘉榖蕃昌受籙敷猷萬國寧而俊民樂育太平有象厯服無疆臣等恭遇熙朝欣逢聖誕元旦長至伏願玊燭長調慶雍熙於九牧金甌永固登仁夀於萬年以下式同前又題凖慶賀皇太后聖壽表式具官至上言式同前伏以坤德宏昭啓一人之有慶天庥茂集綿聖夀以無疆喜溢宫闈歡騰海宇恭惟仁夀皇太后陛下恩隆錫類化著慈徽長樂春暉備古今之遐福萬安日永迎天地之瑞符兹當壽豈之辰咸切尊親之戴以下式同前又題準慶賀皇太后元旦表式具官至上言式同前伏以乾元肇瑞厚德凝禧天工合隂教以咸亨嵗序應陽和而成泰恭惟仁壽皇太后陛下仁宏育物德懋嗣音化日舒和三百六旬之始春臺降祉七十二候之期以下式同前又題準慶賀皇太后冬至表式具官至上言式同前伏以一陽初啓萬彚昭蘇泰階共際升平福履彌增昌熾恭惟仁壽皇太后陛下恩隆祚嗣化洽宫庭值斗柄之方旋光輝南極見葭灰之初動瑞應融風以下式同前又奉旨元旦冬至賀表皆俟雍正二年舉行萬壽表文俟過二十七月頒發雍正元年題準慶賀皇后千秋箋式具官至上言式同前伏以祥開盛序啓福履之咸綏節介壽祺合宫闈而稱慶敬惟皇后殿下溫恭成性雍肅垂型懋柔順之徽音承天德盛邁幽間之美化逮下恩隆臣等以下式同前欣逢令節伏願含𢎞益著協地道之無疆光大彌昭贊乾行於不息以下式同前又題準慶賀皇后元旦箋式具官至上言式同前伏以璇宫瑞靄應嵗序以咸亨椒室祥凝迓天庥而同永敬惟皇后殿下關睢孝敬芣苡和平德合兩儀慶昌辰之初啓光同二曜逢春日之方長臣等以下式同前欣逢元旦鴻禧丕懋益增彤管之輝景福長新永紀瑶編之盛以下式同前又題準慶賀皇后長至箋式具官至上言式同前伏以乾元肇瑞初飛玊管之灰坤厚凝禧彌衍椒塗之慶敬惟皇后殿下靜専體順孝敬昭徽配德端位於宫闈基化著功於中外昌辰靄瑞化日舒長臣等以下式同前欣逢長至伏願日星恆照開萬祀之宏庥福祿益增介千秋之純嘏以下式同前十三年十月題準慶賀皇帝三大節表式具官至上言式同前伏以德統乾元首正六龍之位建用皇極肇開五福之先恭惟皇帝陛下率育蒼生誕膺景命順時熙績百昌遂而萬國和寧御宇綏猷四序調而兆民樂利太平有象福祚無疆臣等恭遇熙朝欣逢聖誕元旦則書元旦冬至則書長至伏願玊燭長調慶時雍於九牧金甌永固綿泰運於萬年以下式同前又題準慶賀皇太后三大節表式具官至上言式同前伏以慈範宏昭洽嘉祥於萬國天庥滋至介壽豈於千春欽惟崇慶皇太后陛下道軼湯莘德超周姒璇宫育瑞永貽燕翼之祥華渚呈符肇啓鴻圗之慶覃仁慈之廣被備尊養之兼隆臣等幸際昌期欣逢聖壽元旦長至書式同前伏願徽音逺嗣啓昌熾以彌增福履長綏偕升恆而並久以下式同前乾隆二年題準慶賀皇后三大節箋式具官至上言式同前伏以龍符叶瑞正中壼以延禧鳳葆增華統六宫以衍慶敬惟皇后殿下仁宣雅化孝嗣徽音厚德承天四序協順成之運光明儷日萬方同久照之功臣等幸際昌期欣逢令節元旦長至書式同前伏願純庥茂集綿福祚於千春內治丕昭播芳猷於奕祀以下式同前十五年題準慶賀皇后三大節箋式具官至上言式同前伏以祥開玊宇椒宫集多祜之庥瑞啓璇霄蘭掖迓無疆之福敬惟皇后殿下仁符厚載德協安貞茂育垂型承健行而不息溫恭表範並麗照以常眀臣等幸際昌期恭逢令節元旦長至書式同前伏願坤儀丕著綿景福而慶衍鴻圖內治彌隆播芳猷而輝生彤管以下式同前十八年諭元旦長至萬夀三大節外省文官臬司以上武官副將以上例得隨進表箋稱賀朕思督撫提鎮封疆大吏事皆專達表賀為宜藩司副將既不得專達章疏其由督撫附進表箋亦可不必且不過由部送閣存貯並不呈覽此亦向來虛文陋習甚無取焉其槩行停止欽此進書一恭進實録康熙十一年世祖章皇帝實録成擇吉恭進前期一日禮部鴻臚寺官設表案於太和殿丹陛之東設實録案於階下正中設表亭香亭采亭於實録館內是日早鹵簿大駕鼓樂設於太和殿前王以下公以上朝服齊集於太和門外文武各官朝服齊集於午門前監修總裁纂修等官咸朝服齊集于實録館前監修官奉表設表亭纂修官奉實録設采亭各官於采亭前行一跪三叩禮校尉以次舁行前張黃蓋列御仗二禮部官前引和聲署作樂香亭實録亭由金水橋道中行表亭由道左行監修等官後隨入太和門香亭實録亭由中門入表亭由左門入齊集王公文武百官