front:
  text: 欽定四庫全書欽定大清會典則例卷五十七
  hash: sha256:49e4412e303f35636abdf4e63f16caf9412cd980615c885d2f334f7553d272c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_060-1a, image: WYG0622/WYG0622-0025a.png}
body:
  text: 禮部儀制清吏司登極一登極天命元年正月太祖高皇帝即皇帝位建元天命貝勒國初貝勒視今之親王羣臣上尊號曰覆育列國英明皇帝八大臣出班跪進賀表侍臣接表宣讀太祖高皇帝率貝勒羣臣告天行三跪九拜禮畢御寶座貝勒大臣各率本旗官員行慶賀禮天命十一年九月太宗文皇帝嗣皇帝位是日鹵簿大駕全設太宗文皇帝率貝勒羣臣告天行三跪九拜禮畢御寶座貝勒羣臣慶賀行三跪九叩禮是日頒詔大赦天聰十年四月建國號曰大清改元崇德和碩貝勒羣臣上徽號曰寬溫仁聖皇帝前期築壇於天壇之東設寶座於壇上設鹵簿大駕於壇前屆期太宗文皇帝率貝勒以下文武百官出德盛門詣天壇祗告天地禮成文武各官奉御寶先至天壇之東導引官二人恭導太宗文皇帝由中階升壇御寶座貝勒大臣等行三跪九叩禮畢皆跪和碩貝勒等奉御寶跪獻太宗文皇帝受寶授內院官羣臣復行三跪九叩禮畢皆跪宣讀官奉滿洲蒙古漢字三體表文立於壇東以次宣讀羣臣復行三跪九叩禮畢復位乃列儀仗奏樂還宫次日行慶賀禮太宗文皇帝御殿樂作貝勒大臣率滿洲各官行三跪九叩禮畢奉表跪進侍臣接至御前跪宣羣臣復行三跪九叩禮畢退次外藩貝勒大臣進表行禮次漢官進表行禮均如前儀次執事各官行三跪九叩禮畢賜貝勒羣臣等燕是日頒詔大赦崇德八年八月世祖章皇帝嗣皇帝位前期遣官祗告郊壇宗廟是日王公百官朝服齊集篤恭殿前世祖章皇帝乘輿由左翊門出羣臣跪迎世祖章皇帝御寶座王以下文武百官行三跪九叩禮次外藩王以下官屬行三跪九叩禮畢衆復跪乃頒恩詔大學士詣案前奉詔書至丹陛上立宣畢復行三跪九叩禮復位世祖章皇帝乘輿還宫王公百官跪送是日不設鹵簿不作樂不設燕順治元年五月世祖章皇帝定鼎燕京祗告天地受朝賀前期太常寺官掃除壇壝司設監設寶座於郊壇之東南嚮設寶案於座前是日遣官祗告太廟社稷鹵簿大駕全設世祖章皇帝御祭服由大清門出親詣南郊祗告天地行禮畢內院大學士跪奏禮成禮部堂官恭導至天壇之東御幄次更禮服御寶座王以下文武百官皆跪禮部堂官引大學士一人由東階升正中北面跪學士一人自案上奉寶授大學士大學士奉寶致辭云皇帝君臨萬國諸王文武羣臣不勝歡忭奏畢以寶授學士學士跪接陳案上退復位羣臣行三跪九叩禮畢駕還宫是日鴻臚寺設御座於皇極門太今名和門正中設表案於簷東諸王貝勒貝子公序立於內金水橋之北文武各官序立於橋南均東西面樂作世祖章皇帝御寶座樂止鳴鞭內大臣侍衛內院禮部都察院鴻臚寺執事各官先於階上行三跪九叩禮畢各就執事位王公文武百官跪進表內院大學士奉王等所進表跪設案上鳴贊官贊宣表宣表官詣案前奉表大學士二人跪展表宣表官跪宣畢仍設案上行三叩禮復位羣臣行三跪九叩禮畢鳴鞭駕還宫越九日頒詔天下順治十八年正月聖祖仁皇帝嗣皇帝位分遣官祗告天地太廟社稷聖祖仁皇帝衰服詣世祖章皇帝几筵前行三跪九拜禮祗告受命詣側殿更禮服乃詣聖祖母太皇太后宫行三跪九拜禮次詣聖母仁憲皇太后宫聖母慈和皇太后宫各行三跪九拜禮先御中和殿內大臣侍衛內院禮部都察院執事各官行禮乃御太和殿即皇帝位王公百官上表行禮不宣表不作樂賜茶不設燕駕還宫反喪服就苫次是日頒詔天下康熙六十一年十一月世宗憲皇帝嗣皇帝位禮儀與順治十八年同惟免賜茶是日內監下乾清宫簾鑾儀衛於乾清宫丹陛中設金輿奏請世宗憲皇帝乘輿由乾清門中門出奉旨乾清宫雖下簾朕何忍於皇考前乘輿出中門朕從乾清門左旁門出外乘輿心中始安欽此雍正十三年九月皇帝登極先期禮部遵照康熙六十一年禮儀具奏奉旨是停止宣表免賜茶此奏內稱奉輿於乾清門正中今皇考梓宫見安奉乾清宫朕曷敢於乾清門正中乘輿著安輿於左旁欽此尊崇一恭上太皇太后皇太后尊號徽號之禮崇德八年世祖章皇帝嗣位尊母后皇后為皇太后聖母為皇太后順治八年世祖章皇帝躬親大政恭上聖母皇太后徽號曰昭聖慈壽皇太后前期一日世祖章皇帝禮服御中和殿北嚮閲奏書畢詣昭聖慈壽皇太后宫恭上奏書屆期世祖章皇帝禮服御太和殿閲册寶畢率王公百官詣昭聖慈壽皇太后宫恭上册寶禮成次日世祖章皇帝御太和殿王公百官進表行慶賀禮頒詔布告天下是年八月世祖章皇帝大婚禮成加上昭聖慈壽皇太后徽號曰昭聖慈壽恭簡皇太后十一年世祖章皇帝大婚禮成加上昭聖慈壽恭簡皇太后徽號曰昭聖慈壽恭簡安懿皇太后十三年册封皇貴妃加上昭聖慈壽恭簡安懿皇太后徽號曰昭聖慈壽恭簡安懿章慶皇太后以上典禮均與順治八年同十八年聖祖仁皇帝嗣位尊聖祖母皇太后為太皇太后尊母后皇后為皇太后聖母為皇太后康熙元年恭加上聖祖母太皇太后徽號曰昭聖慈壽恭簡安懿章慶敦惠太皇太后恭上母后皇太后徽號曰仁憲皇太后恭上聖母皇太后徽號曰慈和皇太后時以諒隂不朝賀前期分遣官祗告天地太廟社稷次日進表頒詔天下均如儀四年聖祖仁皇帝大婚禮成加上昭聖慈壽恭簡安懿章慶敦惠太皇太后徽號曰昭聖慈壽恭簡安懿章慶敦惠溫莊太皇太后加上仁憲皇太后徽號曰仁憲恪順皇太后先期一日同上太皇太后皇太后奏書大學士二人奉太皇太后奏書陳設於中和殿黃案正中奉皇太后奏書陳設於東旁稍後聖祖仁皇帝禮服御中和殿北嚮閲奏書畢大學士二人奉奏書前行聖祖仁皇帝乘輿從豫設黃案一於隆宗門外仁憲皇太后奏書暫陳於黃案少俟先詣太皇太后宫恭上奏書禮成次詣仁憲皇太后宫恭上奏書均行禮如儀屆期陳册寶於太和殿黃案上如陳奏書儀設太皇太后册寶龍亭於太和殿正中設仁憲皇太后册寶龍亭於東稍後聖祖仁皇帝御太和殿閲册寶畢奉册寶官奉安亭內鑾儀校舁亭前行聖祖仁皇帝乘輿從仁憲皇太后册寶龍亭於隆宗門外少俟先詣太皇太后宫恭上册寶禮成次詣仁憲皇太后宫恭上册寶王公百官咸朝服隨行禮如儀六年聖祖仁皇帝躬親大政加上昭聖慈壽恭簡安懿章慶敦惠溫莊太皇太后徽號曰昭聖慈壽恭簡安懿章慶敦惠溫莊康和太皇太后加上仁憲恪順皇太后徽號曰仁憲恪順誠惠皇太后十五年册立皇太子加上昭聖慈壽恭簡安懿章慶敦惠溫莊康和太皇太后徽號曰昭聖慈壽恭簡安懿章慶敦惠溫莊康和仁宣太皇太后加上仁憲恪順誠惠皇太后徽號曰仁憲恪順誠惠純淑皇太后二十年滇黔蕩平加上昭聖慈壽恭簡安懿章慶敦惠溫莊康和仁宣太皇太后徽號曰昭聖慈壽恭簡安懿章慶敦惠溫莊康和仁宣𢎞靖太皇太后加上仁憲恪順誠惠純淑皇太后徽號曰仁憲恪順誠惠純淑端禧皇太后以上典禮均與康熙四年同六十一年世宗憲皇帝嗣位尊聖母為皇太后恭上徽號曰仁壽皇太后雍正十三年皇帝嗣位尊聖母為皇太后恭上徽號曰崇慶皇太后前期遣官祗告天地太廟社稷次日頒詔布告天下不行朝賀禮均與康熙元年同乾隆二年册立皇后加上崇慶皇太后徽號曰崇慶慈宣皇太后十四年册立攝六宫事皇貴妃是年金川平定加上崇慶慈宣皇太后徽號曰崇慶慈宣康惠皇太后禮部奏四月初六日册封攝六宫事皇貴妃次日應御殿受賀又廷臣奏金川平定請皇上御殿受賀奉旨統於恭上皇太后徽號次日舉行是日皇帝率王公百官先詣皇太后宫行禮畢御殿受賀頒詔天下又奏準恭遇加上皇太后徽號並册封攝六宫事皇貴妃貴妃妃嬪諸典禮自四月初五日始至初九日王公百官入內奏對及公所辦事咸蟒袍補服十五年册立攝六宫事皇貴妃為皇后加上崇慶慈宣康惠皇太后徽號曰崇慶慈宣康惠敦和皇太后十六年聖母皇太后六十萬壽加上崇慶慈宣康惠敦和皇太后徽號曰崇慶慈宣康惠敦和裕壽皇太后以上典禮均與順治八年同二十年平定準噶爾恭上崇慶慈宣康惠敦和裕壽皇太后徽號曰崇慶慈宣康惠敦和裕壽純禧皇太后典禮與乾隆十六年同欽定大清會典則例卷五十七
