  text: 欽定四庫全書欽定大清㑹典則例卷二十六
  hash: sha256:d9f911369bf545f20492234f48a04382adaa86760d77e9651c6954dc165aabc5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_029-1a, image: WYG0620/WYG0620-0498a.png}
body:
  text: 吏部考功清吏司人命一命案檢驗康熙九年題準凡檢屍官員聽信仵作有傷報稱無傷或將打砍傷痕報稱跌磕傷者降二級調用轉詳之上司罰俸一年如上司批令復檢竟不復檢將傷痕不行全報少報者降一級調用十四年議準凡檢屍毋得三檢如違例三檢者罰俸一年二十五年議準委令武職典史等官驗屍者將委令之上司降一級畱任又議準凡命案實繫毆傷致死而揑報傷風及因他病死者承問府州縣官降一級調用司道罰俸一年督撫罰俸六月雍正三年奏準凡人命呈報到官該地方官立即親往相驗止許隨帶仵作一名刑書一名皂隸二名一切夫馬飯食均自行備用並嚴禁書役人等不許需索分文其果繫輕生自盡毆非重傷者即於屍場審明定案將原被鄰證人等釋放如該地方印官不行自備夫馬取之地方者照因公科斂律議處書役需索者照例計贓分别治罪如故意遲延拖累者照易結不結例處分七年議準京師五城内外有旗民雜處地方凡有人命領催總甲互相推諉每致遲延不報身屍難以相驗兇犯易於遠颺嗣後地方遇有命案如繫民地應總甲呈報如繫旗地應領催呈報倘遲延不報别經發覺將應管之領催總甲照律治罪如已報而佐領兵馬司互相推諉察明地界將該管官照推諉事件例議處又議準凡控告人命如有誣告情弊將誣告人照律治罪不得聽其自行攔息其間或有一時誤聽人言情急妄告於未經驗屍之先盡吐實情自願認罪呈辭求息者則是已知悔過應予以自新之路訊明該犯果無賄和等情照律定擬完結如有敎唆情弊將敎唆之人照律治罪該地方官有徇私賄縱者該督撫題叅照故出人罪例分别議處又議準按律内檢驗屍傷若牒到不即檢驗致令屍變者將該地方官降一級調用如鄰邑代驗遲延亦照此例行凡州縣官如遇鄰邑佐貳移請代驗人命將接文及赴程時刻於代驗通報文内聲明據報人命之佐貳官亦一面移請鄰邑州縣官相驗一面將移請代驗情由報明該管府州察覈如鄰邑之州縣官並無别故巧為諉卸不往相驗者經上司察出將鄰邑之州縣官照不應重律降三級調用如鄰邑之州縣官實在患病並有緊要事務不能前往代驗者該州縣出具確實印結並取同城官不致扶同揑結通報上司存案如有虚揑將扶同出結之同城官照徇情例降二級調用乾隆元年議準凡人命呈報到官如正印官公出本邑與鄰邑壤地相距不過五六十里而鄰邑印官未經公出者即申報鄰邑印官代往相驗其或鄰邑地處窵遠不能朝發夕至或印官又經他往勢難兼顧者即𣲖委佐貳代驗仍聽正印官審理而代驗之員必繫同知通判州同州判縣丞等官毋得濫委雜職仍令該督撫飭令代驗各員相驗時必須稽察嚴密詳細驗看初供傷痕毋許草率朦溷茍且塞責其有日後復將屍傷詳請覆檢若檢出别情與初驗傷痕不符將代驗官照檢驗不實例分别議處又覆準凡鬭毆重傷之人除附近城郭以及事簡州縣可以往驗者仍命正印官親詣驗看外其離城窵遠之區及繁冗州縣實繫不能逐起親驗者應委佐貳捕巡等官速往據實驗報仍聽州縣定限保辜倘佐貳捕巡等官驗報不實照例議處如州縣官實能往驗而怠弛推諉槩委之佐貳捕巡等官致滋擾累揑飾等弊者仍照定例議處六年覆準人命案件該州縣官不立即親詣相驗故意遲延致滋擾累者該管知府司道督撫不行揭報題叅者將該知府降一級調用司道罰俸一年督撫罰俸六月七年奏準凡人命案内傷痕有致命傷痕有不致命傷痕或將致命傷痕報出不致命傷痕遺漏未報再或拳傷報稱踢傷木器傷報稱鐵器傷之類罪無出入者罰俸一年十二年覆準黔省所屬有原無佐貳及雖有佐貳而府廳州縣並不同城者倘印官公出準令經歴知事吏目典史等官酌帶諳練仵作如法相驗寫立傷單一面仍請鄰邑印官驗明塡報至直省各督撫所屬州縣内並無同城佐貳及地方廣袤與黔省情形相似者亦一例酌量辦理其餘仍照定例遵行倘經歴知事吏目典史等官於初驗時畧有增減後經察出即將原驗之佐雜等官亦照檢驗不實例分别議處一命案緝兇康熙十五年題準官員所屬地方有殺死人命州縣官知情隱匿不行申報者革職不知情不行申報者降一級畱任二十二年議準旗下家人莊頭等倚勢霸占把持衙門或將平民打死此等事發者若繫内府人將該管官降一級畱任若繫王貝勒貝子公家人將該管理家務官亦降一級畱任若繫民公侯伯大臣官員家人將各主降一級畱任公無級可降應照例罰俸一年四十二年奉㫖筆帖式等有打死家人妄行不端之事者著革退四十七年覆準凡命案地方官從前不知不報後即自行察出通報將本案審明不論年月遠近皆免其議處若被上司察出或被旁人告發者仍照官員所屬地方殺死人命不知情不行申報例處分四十九年覆準命案兇犯在逃承緝官員初叅以六月扣限覈叅將承緝官住俸勒限一年緝拏如限滿不獲罰俸一年再限一年緝拏限滿不獲罰俸二年仍再限一年緝拏限滿不獲降一級畱任兇犯照案緝拏其殺人兇犯如果隱匿本境該管官知而容隱不行拏究别經發覺將容隱之官照知情隱匿不行申報例革職如該管官委不知情繫地方棍徒容隱者止將容隱之人治罪如先雖容隱後仍自行出首亦準免罪雍正二年遵㫖議準八旗官員有奴僕違犯敎令依法決罰邂逅致死及過失殺者仍照律勿論外凡官員將奴僕非故殺責打身死者罰俸二年故意毆殺奴僕者降二級調用持刃殺死奴僕者革職治罪將伊族中家僕非故意毆殺打死者降二級調用追人一口給付死者之主故意毆殺族中家僕者降三級調用追人一口給付死者之主持刃殺死族中家僕者革職治罪四年議準凡地方有路死人命即以讐盜未明通報自報出之日起扣限一年緝獲乾隆十五年改為六月如逾限不獲將該地方官照緝兇不力例察叅議處如緝獲之後審繫讐殺仍照例定擬審繫盜殺仍將疎防職名補叅五年議準凡人命除實繫因病倒卧自死無傷者許地方官驗詳掩埋外如將受傷身死之人作為病斃擅自掩埋結案者發覺之日將該地方各官照毆死揑報病死例議處再有不肖官員慮兇犯莫緝將讐盜命案竟行隱匿不報者事發之日將地方各官幷上司皆照諱盜諱命例議處七年議準京城内除倒卧身死無傷者許該管官驗詳立案掩埋外如有受傷身死無名之人令五城大宛二縣該管各官一面報部一面緝拏即詳開年貌服色多張告示招人識認設立首報賞格務期弋獲按其初報到官之日扣限一年緝拏兇犯乾隆十五年改為扣限六月如限滿不獲將承緝之該管本地方官照緝兇不力例指叅處分如日後察明實繫盜殺仍照京城盜案例覈叅議處若協緝接緝等官能於限内拏獲兇犯一名者準予紀録一次拏獲數多者以次遞加如被旁人出首拏獲者給以奬賞又議準命案内如誣告反坐敎唆假命及致死卑幼威逼自盡等案原無抵償之犯如果情節明顯罪應軍流者各該督撫審明發落仍將各案於年内彙題原招送部察覈如有情節不符分晰題駮令再行確審察有弊端照失出入例議處又議準凡命案兇犯在逃承緝州縣官一面詳報上司一面備文移知附近鄰邑遍行訪緝如能拏獲别縣正兇於審明結案後將拏獲之鄰邑地方官隨招附入題請議敘拏獲一名者準紀録一次二名者準紀録二次三名者準紀録三次至拏獲四名以上者準加一級又議準凡官員接緝命犯能於一年限内拏獲一案首犯者準紀録一次一案之内首從悉行拏獲準紀録二次至前官任内有殺人兇犯隱匿不報接任各官以到任日為始限三月察出揭報如逾限不能察報别經發覺者將接任州縣官降一級畱任接任同城知府罰俸一年接任不同城知府在百里以内者罰俸九月在百里以外者罰俸六月接任直隸州知州照知府例議處接署之官亦照此例議處未及三月者免議八年議準凡承緝命案之本官未經緝獲内有升遷降調因事離任者仍按限咨叅分别議處外其接任官命犯案件如前任官有正兇未獲者以到任之日起限一年緝拏限滿不獲罰俸一年逃犯仍照案緝拏十三年覆準凡命案内之首犯脱逃其承緝接緝各官在勒緝限内仍扣限覈叅議處至勒緝年限已滿照案緝拏後該管各官不實力察緝捕獲者令該督撫於年終彙題册内覈叅按其不獲名數分别議處州縣吏目典史各官一年内二三名不獲罰俸六月四五名不獲罰俸九月六七名以上不獲罰俸一年以上應行議處官員覈叅一次之後即免其重複叅處仍令照案緝拏若接緝之員果能於照案緝拏之後年終彙題之前拏獲兇首者除承緝各官無庸議敘外將接緝之州縣吏目典史等官按其拏獲名數二三名以上者紀録一次六七名以上者紀録二次其承緝接緝各官一年内拏獲之數與不獲相當者皆準其功過相抵統令該督撫於彙題册内將各案情由以及承緝年分一年内已獲幾名未獲幾名並各官職名逐一聲明仍於貼黄内開敘簡明總數刑部細加察覈㑹同本部察議乾隆三年議準官員故意毆死奴僕及毆死族中家僕議以降調者雖有加級紀録不準抵銷七年議準凡州縣所屬地方有殺死人命州縣官知情隱匿不行申報該管上司明知屬員有諱命情弊隱匿不行揭叅者各降三級調用不知情失於覺察者同城知府降一級畱任司道罰俸一年督撫罰俸六月不同城在百里以内者知府罰俸一年司道罰俸九月督撫罰俸六月百里以外者知府罰俸九月司道罰俸六月督撫罰俸三月直隸州知州照知府例處分仍令該督撫將知情與不知情並道路遠近於疏内聲明以憑照例察議州縣官不知情不行申報者降一級畱任上司免議十一年覆準凡承審命案上司並無批駮情節者仍令按限審解外其有屢經駮察方經批準實屬遲延有因之案令該督撫據實聲明報部準其以檢驗之日扣限起如有假揑展限情弊照例叅處賊盜一承緝叛逆順治十八年議準同城失守將道府州縣印捕官皆革職提問同知通判經歴照磨知事檢校州同州判縣丞主簿等官皆革職屬邑失守將該管道員住俸催勦知府既無兵馬之責如不同城不議罪又議準承緝叛逆人犯官員革職戴罪承緝接緝官停其升轉責緝協緝官住俸戴罪協緝督緝官罰俸六月催緝將承緝官限三年緝拏乾隆十五年改為扣限二年緝拏如不獲降一級調用如有加級紀録準抵將盜賊仍照案緝拏其接緝協緝官員以賊案發覺之日計算如未滿三年仍停其升轉緝拏竢滿三年將接緝協緝官員罰俸一年督緝道員罰俸六月皆免其停升其未獲賊犯照案緝拏或所屬地方有姦徒潛住左道惑衆結黨作亂或造寫妖書偽印迷惑等事隱匿不報皆革職提問該管上司各降四級調用督撫降一級調用如將叛逆人犯及人犯之父母兄弟妻子縱放脱逃及逃犯未獲作為已獲頂替者叛逆未滅謊報已滅者亦照此例處分如地方叛逆夥黨有即能除滅或將脱逃叛逆人犯即獲者皆免議如叛逆家屬不行解部或聽其賣贖或謊稱亡故皆降二級調用如起解遲延並叛逆人犯出入境内不能察獲者皆降一級調用該管上司罰俸一年又議準接緝叛犯各官停其具題止將接管日期咨部停升竢年限滿後照例叅處又議準官員將在逃反叛正犯並未察出出具並無印結後被旁人出首者將未經察出之州縣革職知府降四級調用司道降二級調用督撫降一級畱任如斬絞人犯及重要人犯脱逃未經察出出印結後被旁人出首州縣官降二級調用府道罰俸一年如將在逃叛逆牽連之人及軍流人犯未經察出者州縣官罰俸一年如將重犯官員自行藏匿者革職至姦細出入境内不能察拏者州縣官降四級調用該管上司降二級調用其姦細放火兇徒專責歩軍五城三營大宛二縣嚴拏如被别處官員人等拏獲者該汛地官員亦照此例議處康熙十七年題準凡親身招撫偽官兵者應行議敘以示鼓勵若不行據實呈報上司上司不行詳察以少稱多謊奏請功將具題官降二級畱任謊報官革職乾隆六年議準聚衆為匪人犯脱逃各省通緝之案不論本省及外省有能將通緝人犯拏獲者該督撫具奏每一名紀録一次如拏獲要犯每一名準其加一級一京城緝捕竊盜康熙十五年題準京城闗内如有大盜二三十人帶弓矢將人砍傷刼去財物該管文職不便照平常盜案例議處將該管之兵馬司官革職賊案令接任官照案緝拏三十七年覆準京城闗廂内乃輦轂重地遇有白晝賊盜致死人命奪去財物該管官員將賊犯當場全獲以及一月之内全獲者免議如一月之内拏獲一半者將專汛官罰俸一年兼轄官罰俸六月賊犯照案緝拏如一月内該管官員不行緝拏致賊脱逃者將專汛官降二級調用兼轄官降一級調用所有加級紀録不準抵銷賊犯令接管官照案緝拏其直隸各省城内遇有白晝賊盜致死人命刼去財物之事該管各官不行嚴拏照强盜入城池行刼之例議處雍正七年議準大興宛平二縣承緝之案原繫直隸總督叅處者仍聽直隸總督照定例叅處外其有刑部見審内行文五城大宛二縣緝拏之案如闗繫偷盜倉庫錢糧並隱匿緊要重犯等項察明該管地方即於文内增注要犯勒限緝拏字樣該衙門於文到之日按限緝拏如限滿無獲將該司坊官大宛二縣初叅降二級畱任罰俸一年限一年緝賊全獲者準其開復一年内緝賊一半者免其議處如一年之内獲賊不及一半降三級調用未獲賊犯交與接任官照案緝拏其餘見審内尋常命盜行文緝拏之案如限滿無獲繫司坊官承緝者令該城御史呈報都察院咨行該部題叅繫大宛二縣承緝者令該府尹題叅皆照外省承緝不力例議處倘該城御史不行呈報都察院及順天府不行題叅經刑部都察院察出將該御史府尹題叅一幷交部議處乾隆三年覆準五城地方令巡城御史督飭該管司坊等官實力緝捕盜賊設法嚴比捕役務獲正賊究擬如司坊官縱容捕役養賊及苦累失主等弊或經該城御史察叅或被受害事主告發審實該司坊官照溺職例革職如一年限内所轄地方竊賊稀少或竊案雖多緝獲過半者準予記功遇有保題之時許其開明保奏如一年限内竊盜甚多拏獲不能過半者量予記過其有玩盜殃民等弊該管官題叅照例議處六年奏準五城三營地方遇有被盜案件彼此闗㑹於被盜報官之日為始扣限三月緝拏無獲都察院㑹同歩軍統領合疏題叅交部察議八年題準五城地方有失竊案件該司坊官即行申報該城御史及都察院山東道御史於失事之日起勒限四月緝拏如限内全獲及半者免其叅處如四月之内賊犯尚未全獲或雖拏獲不及半者該城御史叅送到部將該司坊官住俸勒限一年緝拏限内全獲及拏獲及半者準其開復如逾限不獲該城御史按限題叅將該司坊官罰俸一年賊犯照案緝拏其未經照案緝拏者先由山東道御史按限提比其有廢弛怠玩者聽山東道御史據實叅奏該廵城御史有不據實報叅山東道御史有不實力稽察者令都察院將該御史等察明叅奏交部議處十四年題準五城地方如有失竊案件既經事主呈報該司坊官隱諱不行詳報該城御史即行察叅將該司坊官照例降一級畱任竊犯限六月緝拏限内拏獲準其開復限滿不獲降一級調用緝犯交與接任官照案緝拏其有未報别經發覺者免其諱竊處分仍於發覺之日為始將未獲賊犯限六月緝拏限滿不獲罰俸三月竊犯照案緝拏如賊已拏獲者免議又覆準五城如有盜案要犯拏獲到案尚未審擬該司坊官不行羈禁擅自發保者將該司坊官罰俸一年因而脱逃者將該司坊官降一級畱任限一年緝拏如限内拏獲準其開復限滿不獲照所降之級調用逃犯交與接任官勒限一年緝拏能於限内拏獲者準其紀録一次限滿不獲罰俸一年逃犯照案緝拏如别城及鄰邑地方官有能拏獲此等逃犯者每一名準紀録一次五城命案要犯取保脱逃亦照此例分别議處一地方緝捕竊盜康熙七年議準凡强盜入城池倉庫衞所殺官刼民搶奪獄犯將承緝州縣印捕官並捕盜同知通判住俸於題叅疎防之日扣算限一年緝拏盡獲開復若限滿不獲降一級調用有加級紀録皆準抵銷未獲賊犯存案緝拏若一月内擒獲一半者初叅免其議處仍停升餘賊限一年緝拏全獲者免議如所限一年内不全獲罰俸一年賊犯照案緝拏接緝協緝官員既非其任内所出之事免其停升照案緝拏同城知府亦照州縣例議處不同城者免議兼轄道員罰俸六月限一年催緝限滿不獲再罰俸一年賊犯照案緝拏署事官照離任官例罰俸一年九年題準捕役誣拏良民為盜私用非刑害人致死者將該管官革職如道府不行據實察報者降二級調用按察使降一級調用不行察出之督撫罰俸一年如未經致死者降四級調用道府不行據實察報者降一級調用按察使罰俸一年督撫不行察出罰俸六月又題準武職屬官兼轄等官如獲賊訊明為盜情由即速行交送有司官員審理若不速行移送有司官私用非刑審理誣良為盜致死者將不行察出之總督罰俸九月若未致死者罰俸六月十年題準督撫題叅地方失事應照四月六月之限皆以失事之日為始扣算具題如該督撫將該管各官題叅到部本部不必具題將所叅各官停其升轉竢兵部將武職覈明後具題到部之日將先經停升之案注銷照例議處十一年題準官員約束不嚴致本衙門捕役夥賊為盜或捕役雇覓人役持票夥盜者皆革職致撫綏之兵復聚為盜者降一級調用十四年議準總督有統轄全省兵馬之責如城内失事及鎭店道路刼失餉鞘皆罰俸六月如夥賊二三百人擄掠鄉村勒人取贖降二級畱任又議準白日内有賊黨竪旗總督照平常失事例題叅將總督罰俸六月又議準官員如二年之内不論是否同夥拏獲别汛盜賊十五名者將專管官加一級拏獲三十名者不論俸滿即升其兼轄官員訪獲三十名者加一級訪獲五十名者不論俸滿即升京官具呈刑部外官具呈督撫具題到日竢刑部覈明是實與此例相符者交部議敘如藉端妄拏良民者照誣拏良民例處分十五年題準凡盜案如有必要問明事主之處應準取問不得因事主以强賊具報反借端吹求縱役需索更換衙門將事主提審苦累若有將事主苦累致死者將該管官革職治罪不行察報之上司各降三級調用不行察叅之督撫各降一級畱任若未致死者將該管官各降三級調用上司各降一級畱任督撫罰俸一年十八年題準凡事主報明失盜地方官不即行嚴緝反勒索事主被受害之人告發者將該管官革職如巡撫不行題叅别有糾叅告發者將巡撫降三級調用二十年議準道路村莊被刼承緝州縣印捕官住俸限一年緝拏兼轄道官罰俸六月免其停升限一年催緝限内拏獲一半者免罪餘賊照案緝拏若限滿不獲州縣官皆降一級畱原任再限一年緝拏道員罰俸一年賊犯照案緝拏同城之知府與捕盜同知通判管轄數州縣應照兼轄官員例初叅停升罰俸六月限一年緝拏限内不獲罰俸一年照案緝拏同城知府以下既有承緝知縣其知府應照同知通判例議處不同城知府免其處分三限不獲州縣印捕官再畱任一年如一年内能獲盜過半照例開復如再不獲照例降一級調用賊犯交與接緝官照案緝拏有加級紀録準其抵銷若未滿一年之限升遷照離任官例罰俸一年署事官照城内失事例處分二十五年議準直隸四路同知所轄地方失事將該同知並失事地方官仍照定例處分外至該同知所屬管轄地方失事或於失事之際即行全獲或一月内全獲者該督審明刑部覈覆五夥者紀録一次十夥者紀録二次二十夥者加一級其該同知所轄地方盜案應一年考覈一次如一年内所出盜案獲完者免其議處獲完一半以上者降一級畱任不及一半者降一級調用竟不獲者革職令該督將各同知名下失事案件獲盜確數扣算一年明白造册報部察覈又議準地方官遇有盜案止報巡撫不報總督者罰俸六月又議準捕盜同知通判等官藉捕盜竊名色及人命鬭毆犯姦等事濫差衙役苦累小民致死者將該管官革職不行察報之上司降二級調用不行察叅之督撫各降一級畱任若未致死者將該管官各降三級調用上司降一級畱任督撫罰俸一年二十九年遵㫖議準地方遇有盜案遲延呈報者察明並無别故應照踈防例議處三十五年覆準地方失事限年緝賊之後該員等捐納加級紀録槩不準抵銷三十六年題準盜案初叅並限滿該督撫將承緝之員不照定例題叅僅以承察遲延題叅明繫徇庇屬官規避處分將該管官仍照盜案例處分外將該管上司降三級調用督撫降一級畱任又議準直省督撫一切盜案將獲盜日期備載疏内以憑詳覈如有不行開載者罰俸一年雍正元年議準承緝盜案各官務期必獲盜首如限内不獲盜首雖獲盜過半於免罪之外仍罰俸一年再限不獲盜首者罰俸二年三限不獲者降一級畱任如盜首果繫病故在某處者必須察驗供認實有確據方準免其處分若假藉别州縣之盜指為本案盜首别州縣亦扶同搪塞或先報盜首脱逃後經審出仍在該地方隱匿或揑報盜首病故後於别案發覺者將從前假藉扶同隱匿揑報之該地方官照諱盜例革職又議準凡鄰境他省之地方官有能拏獲别案内首盜質審明確者該地方官加一級若拏獲失事州縣案内夥盜者每按二名紀録一次又議準盜犯於初獲到案時即訊明曾經行刼某處同夥幾人共刼幾次審擬定案以後不許聽其任意狡供倘續獲之賊有所供出之案仍應行察亦以初供為主如有不肖州縣賄買盜供輾轉行察希圖銷案者革職二年議準押解盜犯中塗致有脱逃者將僉差不愼之該縣照例議處所有加級紀録不準抵銷三年議準地方遇有盜案一面申報上司即一面闗㑹鄰境州縣官遍處察緝有能於一月内拏獲鄰境案内首盜者加一級再紀録一次拏獲夥盜者每一名紀録一次至一月後拏獲者仍照前例議敘又議準州縣申報盜案該廳員遍檄所轄地方協同緝拏三月内全獲一夥盜犯者將廳員準其紀録二次又奏準凡竊盜三犯曾經刺字者如州縣官不依律究擬擅自輕縱督撫指叅照失出例議處若不照贓究擬並不依律刺字者亦照失出例議處又奏準凡强盜慘殺事主以及放火行姦又或刼奪倉庫城池衙門並積至百人以上者此等兇惡之盜首脱逃雖繫接緝之員亦照承緝盜首之例按限處分四年諭安民必先弭盜而捕盜之法在於速拏聞有交界地方失事盜賊竄匿鄰境有司以地非管轄不便徑拘必用移文闗提掛號添差方許緝拏以致濡遲時日聞風遠颺即使日後拏獲而贓已花銷懸案不結凡繫地方官均有弭盜之責何分此疆彼界嗣後交界地方失事探實贓盜之處無論隔縣隔府隔省一面差役執持印票即行宻拏一面移文闗㑹拏獲之後仍報明該地方官添差移解倘捕役藉端誣害良民照例從重治罪各該有司務須協力稽察使姦宄無可潛藏以副朕息盜安民之至意欽此又議準承緝盜犯官員於獲盜初審之時如實無窩家之案即於招内聲明毋得誣攀良民其訊明盜犯有窩家者於獲盜過半之内務獲盜首並獲窩家始準其免議如年限内只獲盜首並獲夥賊過半而窩家無獲者將地方各官亦照不獲盜首例議處若實有窩家之案地方官畏避不獲之處分因將窩家删去經上司審出將該地方官照諱盜例處分又題準盜犯越獄及中塗脱逃並從遣所逃囘或從部發遣在塗脱逃之盜犯地方官有能拏獲一名者紀録一次拏獲二名者紀録二次拏獲三名者加一級如有能拏獲三名以上者應予加級紀錄按此遞加又遵㫖議準地方編排保甲該地方官有不實力奉行稽察盜賊者專管州縣官照不能察緝姦民例降二級調用兼轄官繫同城降一級調用不同城降一級畱任統轄官降一級畱任如上司揭報題叅者免議五年議準凡苗蠻殺刦或倚山負險或恃衆窩藏令專汛文武官弁各率兵役協力擒拏如有緝拏遲延藉端推諉令文武互相揭報題叅將遲延推諉之官降一級調用又議準凡有呈報强刦盜案責令州縣印官不論逺近無分風雨立即㑹同營汛飛赴事主之家詳驗前後出入情形有無撞門毁戸有無遺下器械油撚之類事主有無拷撩綑紥傷痕並訊地鄰更夫救䕶人等有無見聞影響當場訊取確供皆塡注通報文内如州縣官不親詣詳驗或竟將未曾目見之情形揑作親詣塡報將州縣官照溺職例革職該管道府與直隸州知州並管捕廳員將不親驗情形之屬官徇庇不揭者照徇庇例降三級調用如遇地方失事而印官公出佐貳捕官一面㑹同汛弁驗看先行緝捕一面申請鄰邑印官覆加驗看據實申報倘鄰邑印官推諉不即赴驗或將未曾目見之情形附㑹佐貳捕官揑作親驗者將鄰邑印官照徇庇例降三級調用至外地人民行商過客有失事者亦責令居停或令船戸與事主一同據實報官地方官亦即親身飛赴驗看情形嚴緝務獲追贓給主倘民人有揑報等情及地方官有隱諱抑勒與不行親驗等弊皆照例分别議處其盜案内果有虚實情形未分盜贓未確限内不能完結者許承審官將限内不能完結情形逐細聲明據實詳報該管上司上司各官詳細察明如果是實即行報部準其展限四月倘該承審官有將易結之盜案不行速結濫請展限該督撫等不能詳情度理漫為咨部經部察出將濫請展限之有司官照易結不結例革職轉詳咨部之司道府並直隸州等官各降一級畱任督撫罰俸一年又奏準直省督撫轉飭府州縣等官將紳衿之家一例編次保甲聽保長稽察如有不入編次者該地方官詳報題叅比照脫戸律治罪地方官瞻徇情面不據實詳報者照徇庇例議處又奏準保正甲長須選勤愼練達之人㸃充如有豪横之徒藉名武斷者該地方官徇縱不究照徇庇例議處又議準凡地方容畱面生可疑之人者許保正甲長牌頭據實首告照例給賞若知而不首照例治罪仍令州縣及捕盜等官於所屬地方不時稽察密訪或有面生可疑之人出入其家即是窩主立時究問得實將該犯拏禁照例擬罪拏獲之州縣捕盜等官照承緝盜犯每案全獲例紀錄二次倘不實力奉行察訪或被别處拏獲盜賊供出窩家者將該管州縣捕盜等官仍照例罰俸一年又議準凡道路村莊刦失餉鞘䕶送官革職地方官革職畱任同城知府住俸不同城知府免議道員罰俸六月皆限一年緝拏全獲開復若限内獲賊過半已獲盜首者將地方官仍畱任同城知府降一級畱任道員罰俸一年未獲賊犯皆照案緝拏倘逾限一年獲賊不及過半或過半而盜首無獲者將地方官革任同城知府降一級調用未獲賊犯交與接任官照案緝拏有加級紀錄準其抵銷如一經失事鄰汛官員及地方官即能獲賊過半已獲盜首者將地方官並同城知府及該管道員皆免其處分至刦失錢糧交與該部照例行令分賠六年覆準凡偷揠山礦聚積地方除該管官知情隱匿不嚴行緝拏者仍照例革職外如雖非知情隱匿但失於察緝以致礦徒聚衆潛匿地方及經發覺又不上緊緝拏以致礦徒逃遁全未捕獲者將該地方官降三級調用未獲礦犯交與接任官照案緝拏若已經察緝應按所獲名數分别處分其獲犯未及一半者降二級畱任勒限一年緝拏限滿全獲準其開復倘限内僅獲一半者降一級調用限滿獲犯仍未及一半者降二級調用未獲礦犯交與接任官照案緝拏如一經察緝即獲犯過半者降一級畱任勒限一年緝拏限滿全獲準其開復倘限滿仍止獲過半者再罰俸一年帶所降之級照案緝拏全獲之日準其開復七年議準各省直隸州遇有盜案疎防失事之後將該管之州同與專汛印捕各官一并指叅其無州同者即以州判指叅皆照同知通判例分别議處限年督緝如限滿不獲亦照同知通判限滿之例處分其本州境内逃盜等案亦責成州同州判協同緝拏如地方失事以及限滿未獲皆照例察叅又議準文武官員衙署被竊失事之員即行申報其承緝承審文職仍照竊盜定例處分若不行申報别處發覺將不行申報之員降一級畱任竊犯限一年緝拏限内全獲準其開復限滿不獲降一級調用至衙署内實繫強刦或隱匿不報及以强報竊將本官題叅革職仍畱該地方勒令設法出資懸賞雇覔民壯與接任官協同緝捕如已獲盜過半準其囘籍若逾限不獲勒限協緝三年方準其囘籍又覆準盜案内窩線不獲止獲夥盜者承緝官照未獲盜首例叅處又議準盜賊遠颺他省窩藏如已有實據而隔省州縣徇庇不行實力擒拏或縱令轉窩鄰境者將州縣印捕各官皆照徇庇例降三級調用又議準竊賊被獲將無辜良民挾讐詐陷或指窩贓妄行攀害承審官隨即訊明除將被攀之人即行釋放外其誣攀平人之賊犯加等治罪如地方官故意徇縱不將竊賊誣攀情由詳報加等治罪者或經上司察出或被受害之人告發將承審官照失察誣良例誣攀致死者革職未經致死者降四級調用八年覆準番人入内地為盜該管之土司有俸者住俸竢三年無犯仍予俸禄若三年内連犯三案者革去職銜無俸土司犯盜一案者降職一級戴罪圖功竢三年無犯銷案如三年内連犯二案者革去職銜擇應襲之人承襲並令該撫於疎防本内將土司有俸無俸之處注明以便覈議又議準城内地方及村莊道路設有墩舖者如遇失事無論夥盜多寡文武一例處分至偏僻村莊曠野道路向無防汛兵丁並未設有墩舖者如遇失事無論盜夥多寡文職仍照定例武職照盜賊十人以下之例議處督令兵捕協同緝捕毋許推諉其失事地方有無防汛兵丁設立墩舖之處令該督撫等於疎防疏内聲明以便察議又議準捕盜同知通判等官如有不以弭盜安民為念所屬州縣盜犯無獲並不按限提比徇情玩忽將同知通判照徇情例降二級調用倘廳員提比而州縣徇庇捕役不行解比廳員據實通詳將州縣官照徇庇例降三級調用又覆準盜案接緝向無處分嗣後前官去任將未獲盜犯交與接緝之州縣印捕官限一年緝拏限滿不獲罰俸一年賊犯照案緝拏如限内有能獲賊雖不及半亦免其議處十年議準盜案踈防獲賊過半該地方官應得開復者若必竢該撫審題結案刑部覈覆後始準開復則盜案或有遲至數年未結以致應行開復之員不能升轉而應行議處之員轉得遷延嗣後盜案踈防照督撫所題有應行開復者準其開復如有應行議處者亦即為議處仍知照刑部如審題覈覆之時倘有徇隱揑報等弊將地方官幷各上司照例從重議處十二年議準竊盜結夥至於十人以上雖不行强地方官亦難辭咎統以獲犯訊供之日起承審限期其踈防諱盜等項處分皆照强盜例察叅議處又議準奉天各州縣及旗莊各地方照直省州縣之例令旗民官員一例編立保甲㑹同管束互相稽察倘有失事同叅踈防一例處分十三年議準凡一人行刦及一人行竊臨時行强之案仍照舊例毋庸題叅踈防於限内拏獲者亦不得濫邀議敘如限期已滿不獲仍照例題叅議處又覆準凡盜案内首犯脱逃其承緝接緝各官在勒緝限内仍扣限覈叅議處至勒緝年限已滿照案緝拏後恐該管各官不實力察緝捕獲應令該督撫於年終彙題册内覈叅皆按其不獲名數分别處分州縣吏目典史各官一年内二三名不獲罰俸六月四五名不獲罰俸九月六七名以上不獲罰俸一年不能及半者罰俸六月道府同知通判直隸州知州州同州判各官應總計所屬地方被刦案數一年内屬官將首犯名數拏獲不能及半者罰俸六月以上應行議處官員覈叅一次之後即免其重複叅處仍令照案緝拏若接緝及督接緝各官果能於照案緝拏之後年終彙題之先拏獲盜首者除承緝各官毋庸議敘外將接緝之州縣吏目典史等官按其拏獲名數二三名以上者紀錄一次六七名以上者紀録二次督緝督接緝之道府同知通判直隸州知州州同州判等官總計所屬地方被刦案數如能董率屬官拏獲過半者準其紀錄一次其承緝接緝督緝各官一年内拏獲之數與不獲之數相當者準其功過相抵統令該督撫於彙題册内將各案情由以及承緝年分一年内已獲幾名未獲幾名並各官職名逐一聲明仍於貼黄内開敘簡明總數刑部細加察覈㑹同本部察議乾隆元年議準地方如有一家先後被刦一夜屢次被刦之案雖不知是否一案盜夥但地方屢遭刦掠明繫文武各官視同膜外不實力弭盜安民該督撫提鎮立即指名題叅照不能察緝姦民例降二級調用又議準内洋失事文武並叅外洋失事專責官兵文職免其叅處其内洋失事文職處分照内地無墩防處所武職處分之例初叅停其升轉二叅罰俸一年三叅罰俸二年四叅降一級畱任又議準䕶送餉鞘官員如有失鞘若不由大道不執票赴營伍州縣掛號撥兵䕶送並分賠銀限内不能賠補及雖經分賠還項而地方官尚未緝獲賊犯者該解官革職之案不凖開復如解官經由大道執票掛號所失錢糧限内賠完者竢該地方官獲賊之日將解官一幷附請開復如賊犯雖未緝獲該解官果能限内竭力將所失錢糧獨賠還項者革職之案亦準其開復又覆準凡捕役豢養竊賊坐地分贓該管官平時不行稽察或知風拏獲不依定例按所豢名數多寡分别治罪只藉端責革者降二級調用其該管上司不行察出同城者降一級調用不同城者降一級畱任又覆準捕役人等將平素雖曾犯竊業經改悔仍勒餽送及地方偶有失事任意私拏拷打者除將捕役照例治罪該管州縣照例議處外將不行察訪之典史亦照失察衙役犯贓例分别議處若故縱者仍照縱役犯贓例革職其失察之總捕照失於覺察例罰俸一年二年覆準各省督撫提鎮飭行各營將弁嚴飭塘兵務於防汛晝夜巡邏或遇搶奪刦掠力行擒拏倘有截刦不行救䕶盜去不即尾追甚至盜賊出没漫不知覺者該管官知情徇隱照徇隱例降三級調用或失於覺察照失於覺察例罰俸一年至惡役與盜賊聲氣相通明知某案繫某人偷竊利賊餽獻抗不擒拏應令各該督撫即令印捕各官嚴加訪察如有前項不法情事按律懲治倘該管官知情故縱照衙役犯贓知情故縱例革職或失於覺察照失察衙役犯贓例分别議處三年議準凡已革捕役令地保加意稽察如有窩匿滋事地保畏威不首扶同徇隱者將地保人等照例治罪如州縣官不實心奉行經督撫覈叅將不實心奉行之州縣照不能察緝姦民例議處又覆準各省州縣申報竊案令該管上司詳載册籍於歲終彙覈按其緝獲多寡量記功過以為勸懲其有地方竊案甚多並不實力緝拏以及縱捕養姦苦累事主等弊該督撫據實題叅分别議處四年議準各衙門捕役如將竊盜及為匪之人不行詳察準其承充將準其承充之本官降一級調用又奏準捕役誣拏曾經犯竊之人指為見在跴緝之强竊盜犯拷逼敎供致死者將該管官照誣良為盜例減為降三級調用如拷逼敎供未致死者減為降一級調用又議準凡盜案疎防其州縣印捕承緝等官以及該管之各上司如繫帶印公出者初叅免其處分仍停升勒限一年緝拏如限滿不獲仍照承緝限滿不獲例議處若繫交印公出該督撫於疏内聲明到部免其承緝處分無庸停升限緝囘任之後照接緝官察議其丞倅等官及各上司原無接緝處分者皆免其議處未獲賊犯照案緝拏其署印官照承緝官議處又奏準地方有誘拐等犯該地方官如不實力緝拏經該督撫察叅將該地方官罰俸一年人犯照案緝拏至承緝拐逃案犯亦照承審姦拐等案之例勒限四月緝拏逾限不獲即照前例議處五年議準凡前任逸盜未獲接任廳員能將前任全未拏獲一案盜犯緝拏全獲者準其紀録三次拏獲過半者準其紀錄一次於獲賊一半之外能獲盜首者準其紀錄二次四路同知緝獲前任逸盜者亦照此例又議準竊盜臨時同夥拒捕與白晝夥衆搶奪殺傷人者若未經獲賊並雖獲賊而為首及下手之兇犯未獲者皆照强盜案件初限即將專兼統轄各官揭叅疎防勒限比緝悉照强盜例分别議處若已獲有為首下手兇賊惟夥賊未經拏獲者免其槩叅疎防夥賊照案緝拏果能限内全獲審實附招議敘亦照拏獲盜犯例分别議敘又奏準事主以强報竊之案後經發覺令地方官據實確覈申報該督撫取具專兼統轄各官從前並無諱盜印結報部其未經確覈朦溷出結者察出將專轄官及扶同徇隱之出結各官令該督撫叅送到部將揑結官照溺職例革職扶同加結之該管官照徇庇例議處又題準承緝官將一案盜犯於四月限内全獲者每案準其紀録二次如有一名逾限不準議敘又題準凡盜田野穀麥菜果及無人看守器物之案所有專兼統轄各官皆免開叅疎防如拒捕傷人致死正犯在逃仍照命案例按限勒緝正兇限滿不獲照例叅處又奏準事主呈報失竊地方官詳細研究如有强刦情節即㑹同營汛親詣事主之家詳細驗看果繫强刦據實通報如實繫竊案出具並無抑勒諱飾印甘各結隨文申送該管上司地方官申詳竊案時亦令將事主原報呈辭備細鈔録呈報呈辭内如有强刦情節該地方官並未聲明親詣驗看者令該上司指駮驗看如因事主報竊即以失竊定案後經察明原報呈辭内原有强刦情節而地方官並未親詣驗看及該上司並不指駮驗看者叅送到部即將不親詣之地方官降二級調用不指駮之道府同知州判降一級調用刪減强刦情形轉報者革職六年覆準凡老𤓰賊在曠野地方肆行殘害不得以是仇非盜立案凡道路掩埋無主身屍如有背負及放氣被勒戳傷情形有繫老𤓰賊謀害者察明確實將專兼統轄文武各官皆照盜案例揭叅疎防勒限緝拏限滿不獲照盜案例議處倘有希圖避重就輕濫以是仇非盜立案者察出照諱盜例議處其直隸各省地方如有老𤓰賊居住令該地方官實力嚴稽保甲訪拏如該地方官有能拏獲一名者照拏獲鄰境盜首例議敘如有拏獲别汛老𤓰賊者亦照此例議敘倘地方官不能拏獲經犯事地方及别州縣拏獲或指名赴本地方闗拏者將該地方照不實力編排保甲稽察例議處至拏獲老𤓰賊已經供出窩隱之家承問官有心隱諱止圖草率結案者照盜案刪去窩家例革職如該員不能窮究窩家後經别官審出承問官照不取緊要口供例罰俸一年七年議準接緝官能將前官未獲一案盜犯全獲者準其加一級拏獲過半者準其紀録二次於獲賊一半之外能獲盜首者準其紀録三次又議準各省盜案巡撫親行確審如地方官將良民擬盜改供該撫將此等情由審出不即改擬者皆照故入例議處如已改擬不將地方官指叅者照徇庇例降三級調用再地方官或希圖銷案刪改供招督撫嚴察題叅革職如督撫瞻徇不舉照徇庇例降三級調用若失於確察將不行詳察據以轉報之司道罰俸一年不詳察具題之督撫罰俸六月又覆準凡遇事主被盜不行呈報後經本管州縣察出或拏獲盜犯審明補報者毋論前任後任仍照例取具印結繳報免其議處如經上司訪聞飭令拏獲或經别處獲盜供出移拏始據察明具報者將該州縣照所屬地方有殺死人命不知不行申報例降一級畱任該管府廳巡道若訪聞行拏或本屬州縣察出補報者皆免其議處其别處發覺者將同城之道府同知通判等官罰俸一年不同城在百里内者罰俸六月不同城在百里外者罰俸三月十五年覆準本官失察捕役為竊降一級調用如有將捕役為竊之案諱飾不報者一經發覺即將該管官革職至捕役為盜例應革職者自行察出應減為革職畱任捕役為竊例應降一級調用者自行察出應減為降一級畱任十六年諭盜案承緝處分例載印捕官限一年緝拏若限滿不獲州縣等官降一級畱任至三限不獲州縣印捕官再畱任一年如再不獲降一級調用若未滿一年之限升遷者照離任官例罰俸一年其遇告假丁憂等事離任亦照此辦理因而承緝各官於例應降調之先告請病假離任皆得按例僅以罰俸完結是明予以規避之路也緝盜乃地方官專責其例應處分自不得巧圖倖免如果繫幹練循良之員該上司據實保題自屬可行若曲為瞻徇令得卸事自全處分不及盜案之塵積日久未必不由於此著該部將此例别行定議具奏欽此遵㫖議定嗣後凡州縣官承緝盜案除奉㫖題補之闕如無合例之人不論何項叅罰均準保題其特㫖升調與迴避别補及别案革職降調丁憂治喪離任者仍照定例處分至告病請假及終養者如初叅未獲例應住俸處分既輕為期尚逺亦應照例辦理外其二叅三叅例應降一級畱任者遇有病假終養離任即議以於補官日降一級畱任三年無故開復其四叅例應降一級調用者遇有病假終養離任議以補官日降一級調用再察官員任内有承督未完事件如承緝案犯並徵收承追錢糧等項􅍁項繁多處分互異若未經限滿之先離任者向例皆以罰俸一年完結今既將盜案遵㫖别行定例其别項例有展叅各案亦應統照此例如叅限未滿告請病假及終養離任例應住俸停升降級降俸及罰俸三月六月九月者仍皆以罰俸一年完結其餘處分皆各照本例察議不得槩照離任官例僅議罰俸凡例有展叅之案皆將離任官員因何事故離任之處該督撫於咨題文内隨案聲明以慿覈議一諱盜順治初年定州縣官將盜案隱諱不報或諱强為竊者皆革職康熙五年題準州縣官地方失事勒令事主減報盜數將未獲賊犯謊報溺死殺死者革職司道府等官不行詳察遽以轉報罰俸一年督撫不詳察具題罰俸六月十二年覆準拏獲盜賊審問時供出已先行刦之處審明仍行文該督撫若事主已經報官將地方官照諱盜例處分如事主未報失事未有實據者該督撫取具該地方官並無諱盜印結繳報若報後被旁人告發或被科道官糾叅確察諱盜情實將該管地方官以諱盜不報例處分十五年題準或本汛失盜彼此推諉不報者亦照諱盜例處分如將盜案已經申報彼此推諉者將不應推諉之官降一級調用轉詳官罰俸一年如上司將州縣申報盜數擅自刪減者照州縣例處分如州縣官不確察盜數申報或不開載失事地方官職名申報者皆罰俸一年雍正二年覆準州縣有諱盜不報該管之道府捕盜同知通判扶同徇隱者降三級調用如止失於覺察將同城之該管等官降二級調用不同城在百里内者降一級調用不同城在百里外者降一級畱任至督撫不能稽察屬官任其隱諱如繫知情降一級畱任不知情罰俸一年仍令各該督撫於題叅疏内將同城不同城及道里在百里内外逐一聲明以便分别察議三年議準如有地方官畏疎防承緝處分藉端嚇阻事主抑勒改供諱盜不報者勘實題叅照諱盜例革職若事主以竊報强挾制官府妄行控告者亦審明治罪以遏刁風又議準州縣官如有諱盜不報及以强為竊者其捕盜之丞倅專官察出即行揭報者免議倘失察徇隱分别處分七年議準接任之官於到任三月内務將前官諱盜之案察出揭報如逾限不能察出或經發覺將接任印捕官皆革職畱任接任同城該管官降一級畱任接任不同城該管官罰俸一年到任未及三月免議接署各官亦照此例議處乾隆元年議準凡有呈報强刦盜案仍照例令該管印官㑹同營員赴勘外其以失竊具報者訊供確實應無庸㑹勘仍出具並無抑勒諱飾印甘各結隨文申送該管上司存案倘事主果有諱强為竊情弊察出照例治罪如該地方官有抑勒改報諱强為竊者别經發覺仍照諱盜例革職欽定大清會典則例卷二十六
