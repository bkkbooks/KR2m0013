body:
  text: 户部權量一尺秤順治十五年題準各闗量船稱貨務使秤尺準足不得任意輕重長短康熙元年題準直省尺斗等秤均照部頒前式畫一遵行違制者究處一法馬順治十一年諭徵收錢糧各督撫嚴飭有司務遵部頒較定法馬有私自增加者不時稽察欽此十七年覆準凡起解錢糧令管解官面驗部頒法馬左右分兑以杜私弊雍正五年諭部中所頒法馬輕重合宜各布政使司照所頒之式較準製成法馬彈用仍令各屬畫一遵奉但銅質磨輕異於原頒分兩者可咨部請領換給欽此十一年議準法馬由部審定輕重工部鑄造各布政使司遣官赴領本部司官同工部司官面加詳較將正副法馬封交赴領官齎囘各布政使將部頒副法馬收貯行用正法馬如正法馬年久與副法馬輕重不符即用副法馬彈兑以正法馬送部換鑄虚揑不符者交部議處部頒法馬由一分至九分一錢至九錢一兩至十兩二十兩三十兩五十兩百兩二百兩三百兩五百兩正副各一副又議準各布政使司錢糧解部者將部頒法馬封交解官齎部庫官將庫存原法馬較準合一然後兌收如有短少將解官叅處勒追倘將法馬私行改鑄者按律治罪或庫官故為輕重任意勒索亦察明嚴叅又議準各省布政使將州縣鑄造正副法馬與部頒法馬較準呈巡撫驗明發囘州縣錢糧解司時將副法馬印封齎司較對兌收如有故為輕重任意勒索者即行題叅又議準各處雜項銀均以市平交納每千兩較平少三十六兩應照依庫平折算兌收十二年奏準八旗收發銀照戸部庫平製造法馬分給其各佐領下亦照庫平設立準等以發兵餉一升斗斛順治五年定户部較準斛式照式造成發坐糧廳收糧又定工部鑄鐵斛二張一存戸部一發倉場侍郎再造木斛十二張頒發各省十二年題準較準倉斛容積之數鑄造鐵斛存貯戶部備式頒發倉場侍郎漕運總督直省布政使司各一布政使照式轉發糧道各倉官較準收糧康熙六年覆準徵收漕糧務遵順治十二年部頒鐵斛如年久口面凹損即請重鑄新斛頒發仍將舊斛送部如有參差互異苦累軍民者將經管官指叅解送舊斛遲延及破損遺失者議處四十三年諭朕見直𨽻各省民間所用等秤雖輕重稍殊尚不甚相懸絶惟斗斛大小迥然各别不獨各省不同即一縣之内市城鄉村亦不相等此皆牙儈評價之人希圖牟利之所致也又升斗面寛底窄若稍尖量即致浮多若稍平量即致虧額弊端易生職此之故於民間甚屬未便嗣後直省斗斛大小作何畫一其升斗式様可否底面一律平準以杜弊端至盛京金石金斗闗東斗亦應一幷畫一著九卿詹事科道詳議具奏欽此遵㫖議準直省府州縣市廛鎮店馬頭鄉村民人所用之斛均令照戸部原頒鐵斛之式其升斗亦照戸部倉斗倉升式様底面一律平準盛京金石金斗闗東斗皆停其使用鑄造鐵斗三十鐵升三十發盛京戸部順天府五城倉場直𨽻各省巡撫令轉發寧古塔黑龍江等處及各布政使司糧道府州縣倉官通行曉諭地方民人一例遵行四十五年覆準陜西徵收糧米支放兵餉均用永豐倉斗較之部頒斗斛每石浮多三斗應令照依舊斗之數以部斗收支停用舊斗雍正八年題準各糧道様斛原與部頒鐵斛較準飭發但用木板製造日久朽敝不無參差亦照布政使司之例將部頒鐵斛頒發各糧道永逺遵行乾隆九年皇上得東漢嘉量圓形較其度數中今太蔟又考唐張文收作嘉量方形乃仿其遺制用今律度御製嘉量方圓各一範銅塗金掌之工部陳之殿廷其上為斛其下為斗左耳為升右耳為合龠其重二鈞聲中黄鐘之宫親為之銘曰皇子聖祖建極憲天度律均鐘洞契元聲微顯闡幽何天衢亨小子纘緒寰區撫臨協時月正日同律度量衡製兹法器列于大廷匪作伊述大猷敬承遵鐘得度率度量成量為權輿律諧六英猗聖合天天心聖明七政是齊為萬世法程如衡無私如權不凝如度制節如量祗平律得環中紹天明命永寶用享子孫繩繩我日斯邁而月斯征中元甲子乾隆御銘庫藏國初設立戸部三庫一曰銀庫在部署一曰段疋庫在東華門外一曰顔料庫在西安門内一總理庫務順治初年統歸户部管理後分屬各部寺收支兼設巡庫科道尋裁康熙三年仍歸部管理雍正元年特命王公大臣總理三庫鑄給印信八年奏準更鑄管理户部三庫衙門印信一管庫官役順治初年題準設後庫滿郎中四人員外郎二人司庫六人筆帖式十人十二年定分為銀庫段疋庫顔料庫三庫設理事官二人掌庫印增設司庫三人筆帖式二人康熙二十五年定將管庫官分𨽻三庫各按所司掌稽出納滿洲掌印郎中每庫各一人員外郎每庫各一人司庫每庫各二人筆帖式每庫各八人庫使銀庫十有二人段疋庫顔料庫各十人經制書吏每庫各一人顔料庫内監六人樓軍八人匠役四十二人銀庫匠役三人雍正二年設大使每庫各一人增設員外郎每庫各一人銀庫銀匠三人皂役三人庫丁四十人段疋庫庫役二十一人顔料庫樓軍二十八人顔料庫庫使一人大使書吏每庫各一人皂𨽻每庫各二人裁銀庫司庫一人筆帖式二人庫使六人段疋庫筆帖式五人庫使一人顔料庫筆帖式四人匠役一人内監六人設三庫掌案主事一人筆帖式二人書吏二人皂𨽻四人乾隆三年奏準增銀庫大使一人經制書吏二人十三年奏準看守三庫官兵銀庫旗員五人兵十人段疋庫旗員四人兵五十人顔料庫旗員八人兵四十二人均令上三旗選委賢員遇換班之日前往稽察仍令所委稽察官在庫投遞職名以備注册如有空班不到該旗立即題叅倘稽察官徇隠姑縱經庫官察出除將守庫官叅處外並稽察官亦交部議處一選補庫官康熙四十四年諭銀庫段疋庫顔料庫郎中員外郎向繫將本部官斟酌選補嗣後將各部院官員保舉引見欽此乾隆三年奏準三庫郎中員外郎在庫行走三年滿後於各部院衙門滿郎中員外郎内遴選保送引見調補司庫五年一更期滿以應升主事即用司庫員闕於三庫筆帖式庫使内遴選題補又題準增銀庫大使一人於三庫筆帖式内遴選題補五年期滿照例以應升之官即用九年奏準三庫掌案主事並三庫司庫大使筆帖式庫使均三年更代主事年滿於部院滿主事内遴選保送引見調補司庫年滿於各部院滿正七品從七品小京官内遴選保送引見調補庫大使年滿於各部院滿筆帖式内遴選保送引見調補各以原銜食俸停止五年期滿保題升用之例掌案主事三庫筆帖式年滿於各部院滿筆帖式内保送每員闕遴選二人保送引見調補三庫庫使年滿於各部寺庫使内遴選保送引見調補一銀庫乃天下財賦之總滙出納均有常經各省嵗輸田賦鹽課闗稅雜賦除存畱本省支用外凡起運至京者咸入焉田賦由各州縣運赴布政使司由布政使司解部鹽課或場官經徵申解鹽運使司或鹽運使經徵均由鹽政委官解部闗稅由各闗監督按例徵課分季解部雜賦解部與田賦同直省贓罰銀彚解按察使司除解刑部公用外餘亦解部均入庫收貯寶泉局鑄出制錢亦入庫收貯以待度支順治初年定直省起解本色物料折色銀到部各該司察驗移文掌庫官照數兌驗收貯出給庫收付覆各司十二年題準掌庫官司庫每嵗終將出納銀錢造册呈堂覈算十六年題準直省起解錢糧徑投各部免赴京畿道挂號驗批康熙十四年議準管庫官將庫内物件不行固貯以致庫司等偷盜者降一級調用罰俸一年四十五年諭凡庫内錢糧皆有交代所以易於盤察惟戸部銀庫貯銀甚多盤察甚難其出入數目必不能清楚著將每年新收銀别行收貯至用銀時將舊銀挨用則易於盤察而數目亦得清楚矣欽此雍正二年題準各省將解送銀段顔料限定日期或差官某人或差役某人某項銀段顔料若干木鞘包箱若干均用印封封固於某日起程幾日到部豫行知會大使文到令大使呈報總理三庫大臣及庫官竢銀物解到之日將批文登記號簿送承發科即令該司司官公同監收呈報總理大臣至劈鞘時令大使看劈如有補交短少銀者令大使公同該司官到庫驗收將㸃鞘承辦之處專責大使門官不得干與八年覆準嗣後凡解銀及顔料香木等項到部均限一月内驗收給發批迴十年奏準頒給各省正副法馬嗣後解銀將副法馬封交解官齎領至部與庫貯原法馬較準合一然後兌收如有短少將解官叅處倘有將法馬私行改鑄者察出叅奏按律治罪庫官故為輕重察實嚴叅十二年奏準解部銀如有短少將原銀交解官看守行令兌發官親身赴京到部自看彈兌令其對證明確若無短少將庫官從重議處如果短少將兌發官及解官分别議處所闕銀著落兌發官賠補又奏準嗣後地丁銀解交元寶闗鈔鹽課漕項悉解散碎銀以便給發又議準外解贓罰銀除原文投刑部外銀批徑投到部由部收足後知會刑部覈案完結又奏準八旗支領兵餉務令叅領佐領驍騎校等赴庫眼同庫官彈兊收領領囘親身散給以免扣剋又奏準各省元寶輕重不等令該督撫等轉飭州縣於傾鎔時驗足成色兊準分兩入鑪鎔鑄出鑄之後如輕重適符部頒法馬毋庸更加滴珠者文内聲明别鞘裝載如有輕短者毋庸囘鑪重鑄亦毋庸更加滴珠但將應加滴珠之銀覈準數目另封入鞘戸部彈兊之時繫足數者如數驗收以備給發官軍俸餉其不足者即用所封滴珠之銀加平彈兊其元寶入於碎銀内給發乾隆三年奏準兩淮鹽課均令傾成元寶解交一段疋庫凡各省解到紬段絹布皮絲棉線麻等項均付庫收貯順治初年定三處織造錢糧事宜均𨽻戸部八年定改𨽻工部康熙三年定織造事宜𨽻工部錢糧歸戸部報銷又定江寜蘇州杭州三織造應解大蟒段小蟒段金線蟒段暗蟒段三等蟒段立蟒段大閃段小閃段糚花段寸蟒糚段次糚段中錦草錦金字段補段補服料羅段片金羅片金倭段㡌段次㡌段滿水段裙蟒段蟒紗立蟒紗糚花紗裙蟒紗紗片金金字紗補紗大段次大段亮花段衣素段次衣素段各色光素段次光素段揚段次揚段彭段次彭段宫紬各種紗羅紡絲綾西絹杭紬三梭布三線布油墩布苧布白苧布夏布絲緯絲絨繡線絹線生絲手帕以上各項如庫中應需某項酌量均派於豫年八月内具稾呈堂移付江浙二司轉行各該織造辦解定限於次年八月内解部如派後再有闕少不敷者随即加派酌量限期辦解其價直均由各該司覈銷山西布政使司應解生絹千二百疋農桑絲絹二百疋遇閏加四十四疋三梭棉布二千四百九十八疋丈八尺有竒舊繫江蘇辦解雍正三年改歸山西江蘇布政使司應解五色三梭布五千疋浙江布政使司應解白綿二百斤以上採辦價直皆由部覈銷舊解今停者直𨽻山東花絨河南衣絨山東河南濶棉布江蘇黄白絹黄絲絹白麻安徽狐皮稅絲絹土絹江蘇安徽生絹農桑絹棉布麻安徽江西苧布浙江杭細白絲黄絲價銀扣存布政使司庫按數解部順治十六年覆準解到絲綿絹疋等項已經委司選驗堪用者該庫不許覆驗躭延抑勒多收違者治罪康熙五十年奉㫖嗣後如用采紬著内務府出給印文委官到部取用事完仍令原取之官親身赴部繳明五十八年覆準段疋庫照銀庫例動支舊存物料將新收者别行收貯雍正七年奏準江寜織辦段紗照杭州之例每年於藩庫見存銀内先支二萬兩辦理餘銀竢派文到日找給又奏準上用御衣水運原用二船嗣後裁去一船上用段疋仍歸陸運自雇驘脚乾隆十年奏準嗣後三處織造採買上用絲每兩經絲準銷銀八分二釐緯絲準銷銀七分七釐糚絨絲準銷銀七分五釐均於浙江之南潯雙林二處置買官用