員庫内年終報解部庫察收無額設庫官各省同一地居衝要之分巡道庫府庫直𨽻州庫及分駐苖疆之同知通判庫均按地方大小距省逺近酌撥司庫銀分貯各庫以備急需每嵗布政使司入春秋季報册咨部察覈無額設庫官各省同一州縣衞所庫收貯本色正雜賦銀存畱者照數坐支起運者徵解布政使司庫按催徵限期造具完欠數目册随時申報司撫入奏銷考成無額設庫官各省同一盤察康熙十五年題準各省布政使司管糧守道或有升降將一應經收經放並實在錢糧令其逐一造具清册交代至所造交代文册若布政使司升任本省巡撫者令本省總督確察具題如無總督省分該撫不便自行具題令新任布政使司覈明具題如升調别任並降革事故離任者均令本省巡撫確察具題其交代錢糧有侵欺透冒那移墊解等弊均照例處分至督撫不行覈明朦溷徇庇具題者事發將督撫一并嚴加議處二十四年議準各省藩司遇升任或降調交代時必將其任内收放錢糧令督撫親身確察如有侵那虧欠者即行題叅如無虧欠即具並無侵那甘結送部察覈二十八年議準各省藩司交代之時雖令督撫親身盤察具結送部但未有逐嵗盤察之例嗣後令各巡撫於每年奏銷時將司庫錢糧親身盤察如無虧空於奏銷本内保題倘仍有虧空將巡撫照例治罪五十年議準各省鹽運司庫貯鹽課責任與藩司相同嗣後運使交代亦照藩司交代之例將舊官任内收放錢糧新官交盤出結造具四柱清册呈詳巡鹽御史具題分送部科稽察如有徇隠情弊察出一并議處追賠雍正八年議準各省驛道升轉離任時交代錢糧令造具四柱款册該督撫具題報部察覈十一年議準各省糧驛二道庫貯錢糧向於奏銷時責成藩司盤察出結保送未將出入數目随時移會藩司覈對嗣後凡有收支款項數目均令随時知會藩司存案每年奏銷時仍將本年出入款項支存確數及各年各款支存銀數備細造册移司該布政使逐款覈對出具盤察清楚印結送部察覈其每年奏銷奉部題覆之後該督撫仍行知該布政使司存案覈對又議準各省驛道庫貯錢糧交代時旣繫造册具題糧道乃各省漕項錢糧筦鑰其新舊交代自應一例題報嗣後各省糧道如有升轉離任新舊交代將任内經手錢糧亦造具細款四柱清册具題送部察覈乾隆四年議準各省鹽道庫止貯正雜鹽課向無盤察之例通行管鹽督撫鹽政將道庫鹽課錢糧於每年奏銷時親臨盤察虧則題叅足則出結題報如有隠匿扶同等弊一經發覺照例叅處五年題準直𨽻霸昌口北二道庫有豫備軍需銀天津通永大名三道庫嵗有搶修及豫備要工銀均應不時盤察嗣後各道庫内有原貯河工錢糧例應河督盤察者將分貯兵餉並令河督就便盤察結報其餘道庫令藩司委官盤察結報盤察府州縣例詳見田賦一畱貯雍正五年議準各省布政使司庫貯錢糧悉令造入春秋二季報册候撥至冬季大撥時又將各省應存及次年額徵悉行撥充兵餉司庫幾無餘剰倘有急需鞭長莫及應按地方之逺近存剰之多寡酌畱數十萬兩令該督撫公同封貯藩庫如有動用之處題明動用除直隸近京無庸畱貯外山東藩庫畱貯十萬兩山西河南湖北陜西廣東各二十萬兩江蘇安徽江西福建浙江湖南甘肅四川廣西雲南貴州各三十萬兩封貯備用每年入季册報部察覈一分貯雍正八年諭向来大宛二縣常有速辦之公事不得不那庫銀以濟用而上司察知每以虧空題叅至於罷黜治罪實為可憫用沛特恩於大宛二縣各發帑銀萬兩存貯該縣倘遇有速辦之公事準其詳明府尹動支近思辦理軍需之州縣其急切應付之處刻不容緩而該州縣並無存貯備用之項朕意欲於辦理軍需及事務繁劇之州縣亦仿大宛之例酌畱帑銀以備急切之用其如何舉行俾辦公有頼而弊竇不生著大學士等悉心定議具奏欽此遵㫖議準按省分之大小直隸山東山西河南各存留十有五萬兩江蘇安徽江西各十萬兩福建二十萬兩浙江湖北湖南各十萬兩西安甘肅四川各三十萬兩廣東十萬兩廣西十有五萬兩雲南貴州各二十萬兩均分貯府庫直隸州庫如有急切公務具文請領該府州立即給發該州縣辦理之後據實開報該府州轉申布政使督撫覈實嵗終造册咨部察覈乾隆五年議準各省分貯急需銀有因軍需動用者亦有始終未經動用者若不随時酌宜或久貯不加察覈恐日後漸啓侵虧於急切需用時轉多貽誤令該督撫酌量地方情形是否仍應分貯抑或歸并司庫酌留項下備用妥議報部又覆準直省分貯府州庫内急需銀經各該督撫就地方情形定議咨部直隸原分貯銀十五萬兩仍分貯道府庫十一萬兩餘四萬兩提囘司庫候撥山東原分貯十五萬兩均歸入司庫酌留項下封貯山西原分貯十五萬兩仍分貯各府四萬兩餘十一萬兩提囘司庫河南原分貯十五萬兩仍分貯府州二萬兩餘十三萬兩歸入司庫江蘇原分貯十萬兩仍分貯府庫二萬兩道庫運司庫六萬兩餘二萬兩歸入司庫安徽原分貯十萬兩仍分貯府庫五萬兩餘五萬兩歸入司庫江西原分貯十萬兩仍分貯府庫三萬兩餘七萬兩歸入司庫福建原分貯二十萬兩浙江湖南廣東原分貯十萬兩均仍分貯各府州庫湖北原分貯十萬兩仍分貯府州庫五萬兩餘五萬兩歸入司庫陜西原分貯三十萬兩仍分貯府州庫十萬兩餘二十萬兩歸入司庫甘肅原分貯三十萬兩仍令分貯府州庫二十二萬兩餘八萬兩歸入司庫四川原分貯三十萬兩仍分貯府州庫敘永松潘二同知庫二十萬七千兩餘九萬三千兩歸入司庫廣西原分貯十五萬兩仍分貯府庫六萬六千兩餘八萬四千兩歸入司庫雲南原分貯二十萬兩仍分貯各府庫萬八千兩餘十有八萬二千兩歸入司庫貴州原分貯二十萬兩仍分貯道府庫台拱八寨同知庫都江丹江清江通判庫三萬六千兩餘十有六萬四千兩歸入司庫各開造酌留項下封貯備用每年入季册報部察覈一寄貯雍正十年覆準各省沿邊營汛去省窵逺兵丁得餉甚遲且逐季赴藩庫請領更多盤纒運脚之費若兩季兼領餉一到營全數給發又恐兵丁任意花費請將官兵所領兩季餉銀寄貯同城文官庫内武弁撥兵看守按月給發於兵丁有益但各省支放不同營制不一令各督撫各據該省情形詳悉議定直隸貴州二省仍按季支給山東河南二省分撥附近州縣按月支給其山西之潞安澤州大同等營江南之潛山徽州等營及河標各營江西之吉安等營福建之臺澎南澳延平建寜等營浙江之象協各營湖廣之榖城彞陵等營陜西之固原等營四川之松潘等營廣東之瓊州一鎮及水師營廣西之永寜等營雲南之昭通永北永順各鎮營均離省遥逺所需兵餉準赴藩庫總領兩季領囘之日寄貯同城府州縣庫仍照例按季按月散給欽定大清會典則例卷三十八
