body:
  text: 吏部考功清吏司升選一開闕截限康熙十五年議準督撫糾參貪酷官員應革職提問或應解任質審者皆開闕銓補外官奉㫖提解來京者亦開闕銓補直隸官員除提解來京審問者開闕銓補外其質審來京不繫提拏者不開闕若此省官員有發彼省質審訊問者仍開闕本省內者不開闕二十八年覆準凡具題應出之闕十二日以內到者於十七日以內具題作本月之闕十三日以後到者作下月之闕其不具題微員之闕二十日以內到者作本月之闕二十一日以後到者作下月之闕三十九年題準升轉等官以科鈔到部之日開闕革職降級病退等官到部分司第二日該部即付文選司出闕二十日到部者本日即分司該司即於本日付文選司作本月之闕至外任病故官員以病故之日起限一月內由各該處移咨送部以該處咨文到部之日開闕雍正元年遵㫖議準各官如有侵那錢糧被參者皆令離任開闕或應還職者赴部别補不必懸闕久待三年覆準滿漢雙單月升選各官得闕之後如有保留暨奉㫖扣除者其員闕留於下月補授其候具題奉㫖方準開闕者務於截限以前具題如有遲延罰俸三月如繫有意遲延壓班滋弊者如受賄請託及縱容失察書吏受賄等項各從重論書吏送刑部治罪又覆準凡升轉降調革退回避病故各官員闕該衙門於五日內行文過部開闕如逾限五日之外尚在本月截限以前者免議其逾至本月截限日期以後者皆照壓闕例分别處分若文已到部事屬考功等司不即回堂移付文選司開闕亦照此例議處乾隆六年奏準凡遇官員升選將不應升之人擬升不應開之闕誤開者將不行詳察錯誤辦理之司官降一級留任隨同畫押各官罰俸兩月七年奏準凡本月應開之闕或至截闕限期之後科鈔始行到部如在未經驗看考試之前即令補掣同本月月官引見如在引見之後將闕存留於下月銓選之期將原選月分應選之人擬用同下月月官引見於摺內聲明至每月十二日以前應辦開闕之本倘於二十日以內有例不進本日期由部專摺奏聞請㫖開闕十四年奉㫖道府等官患病題請解任其員闕應題者即簡選具題應請㫖或歸月選者該部即行察明辦理不必候部覆準方行開闕著為例又奏準外任降調官員奉㫖依議之後即行開闕其有令督撫出具考語送部引見者亦行開闕至外任推升京職尚未引見續經降調奉㫖俟引見之日將降調之處奏聞請㫖者若將該員所升之闕即行開選則該員原由推升得闕引見既經開闕則無由引見若不即行開闕則見任官員降調尚行開闕而得補未經引見者轉不開闕未為允協請嗣後推升京職人員有似此者將本人所升員闕即行開選外俟本人到部之日别行奏請引見請㫖如以原官補用即將所降之級帶於新任如照部議降調即照所降之級别補二十一年奏準知縣以上應行具題各官定例於每月十二日到部者作本月之闕日力寬裕可以從容辦理其州同縣丞以下例不具題各官定例二十日以內到者作本月之闕繫指已經降革等項即應出闕者而言至見在應行察議之官應否出闕尚須酌定若為日過迫恐滋草率嗣後議處州同縣丞以下等官十五日以內到部者作本月之闕十六日以後到部者作下月之闕一官員回避康熙三年題準外任官員見在上司中有繫宗族者皆令回避九年議準官員有應回避之闕不行申說回避者降一級調用四十二年遵㫖議準選補官員所得之闕在五百里以內均行回避或應在部呈明或應在本籍本任督撫處呈明回避之例均詳載銓選例內若有以遠報近以近報遠希圖規避擇闕之美惡者或經部察出或到任後督撫題參照規避例革職如無規避揑報之處不行申說回避者照不行回避例降一級調用雍正七年議準各省候選雜職人員於起送赴選册結時即於地方官呈明祖籍地方官察明一並開載册內送部除祖籍之員闕回避外將他省之員闕掣補如不豫先報部至臨選時方行具呈者照例議處又覆準外任官有外姻暨鄉會試分房取中之人例應回避者亦皆回避至考官外任督撫其屬官內有繫伊取中者咨部存案遇舉劾時於本內聲明考官外任司道其屬官內有繫伊取中者申報督撫存案如有舉劾督撫本內亦將該員與司道誼繫師生之處一並聲明凡督撫司道有所舉劾倘於取中之人有徇私廢公等情察出將徇私舉劾之督撫司道交部照例議處乾隆七年奏準月選各官例應回避之闕除故意揑飾希圖規避及隱匿不報者或别經發覺或到任後經督撫糾參仍照定例分别議處外至於應行回避之處過堂時未經呈明至掣籤後自行察出呈報者將該員照例議處如繫州縣等官以上例得引見之人即於本內聲明請㫖引見恭候欽定如繫佐雜等官不應引見者令其再掣别闕照微員無級可降甫經到任之例令該督撫試看一年如能黽勉供職效力贖愆該督撫報部注册於試看之日起扣限三年無過開復如不能黽勉效力該督撫照例題參又議準凡應行回避隱匿不報者照不行申說回避例降一級調用至揑稱回避希圖規避者發覺將揑報之人照規避例革職本人揑報規避其扶同徇隱之人照本人揑報例革職出結官照揑結例降二級調用九年覆準見任各官有任所與原籍鄉僻小路在五百里以內者均令呈明該督撫酌量改調回避至在部候選各官亦照月選回避之例如月分所出之闕有鄉僻小路與原籍相距在五百里以內者悉令於二十四日過堂時呈明回避如應聲說回避而不聲說並虛揑者一經察出皆照例議處十四年奏準凡官員遇有回避原籍五百里以內之闕者皆有别闕可以補用故例有揑報遠近及不行呈明之處分以杜規避遠闕之弊至孤闕人員見此闕回避他處即無可補之闕每誤以為不必回避以致失於呈明請嗣後議處未經呈明回避之孤闕人員照應申上而不申上罰俸九月例議處十八年議準山僻小徑與大路原有不同該員等領憑時難以周知若到任後詳請回避者即行議處未免無所區别嗣後凡本籍鄉僻小徑與任所在五百里以內例應回避人員於到任後三月以內詳請回避者免議如三月以外始行詳請者照例議處一官員文結康熙二十九年覆準凡例監吏員捐納候選主事小京官同知通判知縣等官令該督撫將此等官員三代履歷籍貫年貌及有無假冒頂替情弊逐一詳察取具府州縣衛所印結照直隸各省部限速行報部考對如原籍並無其人及察送後病故者該督撫令地方官詳察取具印結咨部注銷若督撫地方官將假冒頂替者不行察出即出保結將已故之人揑稱見存移送者發覺將假冒頂替之人交與該部治罪出結之地方官照假冒出結例革職該督撫照錯選假官例降一級罰俸一年其出結定限以文到之日限兩月速行察明報部違限者照欽件違限例議處若府州縣衛所官員不行出結抑勒遲延者令該督撫將抑勒情由指參照升官離任藉端抑勒遲延例各降二級調用六十年覆準凡候選候補官員赴選文結內小有舛錯不符者取旗文同鄉京官印結改正槩不準駮詰其駮詰文結換到之日毋庸再扣五十五日之限如有應駮詰者限二十日移察投供驗到人員限十日內即行察明若並無舛錯不符之處限二十日即行注册銓補其捐納人員咨册到部亦限二十日內察明倘條例內不應駮詰之處任意駮詰或已注册後無可駮詰而臨選又故意駮詰以致絀前伸後去此取彼者將司官照應結故為駮詰例罰俸六月書辦送刑部治罪一貢監考職康熙五十七年覆準各省領文赴考貢監生該地方官取具本生親供里鄰結狀黏連地方官印結該撫給與咨文保送赴部其在監肄業者國子監取具本生親供黏連同鄉京官印結給與印文保送赴部旗人令該都統取具本生親供黏連該參領佐領保結都統印文保送赴部考試如有試卷筆跡與親供筆跡不符即繫假冒頂替察出將本生黜革與頂替之人一並治罪雍正元年題準貢監考職將九卿翰林等官職名開列請㫖欽㸃試官出題考試本部司官按名察對內有字跡不符聲音不合者不送試官閲取其實繫本生應試者將試卷封送試官看閲各照應得職銜取定大小名次先後仍行令國子監並各省巡撫嚴加察核給咨本人飭令親齎赴部投文驗到方準考試如有假冒頂替等弊察出將濫出印結之原籍地方官照濫行出結例革職加結轉詳之知府直隸州照豫先不行察出例降一級調用布政使司督撫照失於詳察例罰俸一年其出結之同鄉京官暨給文之國子監各官皆照原籍地方州縣官例議處國子監堂官照督撫例議處若本生入場之後有換卷代倩等情止應將巡察等官議處出結轉詳咨送各官無從稽察皆應免議旗人由各該都統咨送考職如有假冒頂替等弊將該都統及參佐領各官交與兵部照例議處又議準凡考職貢監取具文結到京者恩拔嵗副貢生令將出貢中式年分有貢單者呈驗貢單並年貌籍貫三代親供送部捐納貢監將原捐執照送部呈驗並年貌籍貫三代及捐納年分事例親供送部仍於卷面備細注明以憑察核至考試之年由部奏請欽㸃閲卷官並請㫖㸃滿漢監察御史二人本部滿漢司官各二人臨期將該生逐一㸃名挨次給卷編列字號分坐令該御史不時巡察如有包攬代作等弊察出題究治罪倘該御史不行嚴察致滋弊端應照失於詳察例罰俸一年倘繫瞻徇隱匿應照徇隱例革職又議準監生考職京官印結之外再取同鄉同考監生五人連名互結結內注明並無假冒頂替字樣倘有扶同等弊發覺之日本生照詐假官律治罪出結官照濫行出結例處分互結監生照知情詐假官例治罪出結互結人等如扶同徇隱假冒頂替自應照此例議處治罪若本生入場之後有換卷代倩等情止將巡察等官議處出結官及互結監生皆應免議再監生真僞原據文結但京官出結之時有本生委實在京及至臨期倩人代考者出結京官無憑察核考試之日將出結京官𫝊至考處㸃名識認其識認倘非本生即令出結官舉出該御史拏究如出結官知情不舉察出一並照例議處又議準貢監考定職銜除將職銜執照給發本人外部中一面注册一面行文知照各該省轉行各州縣存案俟截取時令該地方官將各省執照與部咨核對相符給咨候選如職銜年貌籍貫不符及假冒頂替等弊咨部斥革治罪乾隆元年議準恩貢拔貢副榜貢生準以州同州判縣丞分别考取嵗貢並捐納貢監生準以主簿吏目分别考取照依考定職銜名次注册入於雙月選用令其在籍候選二年奏準各省恩拔副榜嵗貢捐貢考職及監生考職無論在籍在監各俟肄業期滿一例咨送考試倘有仍前索取陋規倒提年月者或被科道糾參或經别處發覺將該管官降二級調用不行察出之堂官降一級留任書吏人等交送刑部治罪其納賄之貢監生即行褫革三年奏準向例貢監生每年考試一次為期太近嗣後於鄉試之年各貢監生情願考職者就原籍具呈取具地方官文結申送督撫於三月內轉行咨送到部五月內考試九年奏準考職定例分别等第録取恩拔嵗副授以州同州判縣丞等職監生授以主簿吏目等職向來凡應考人員無論多寡不顧文字優劣盡行録取嗣後務擇其文理優通者酌量録取寧少毋多雖不必定有額數亦不得過為濫觴著為定例永遠遵行一吏員考職雍正十二年議準在京各部院衙門書吏並各館供事役滿報部彚至三月於本部關防考試一次本部堂官委出司官稽察將試卷封固存貯俟年終各省吏員試卷到齊之日由部一並校閲考定名次品級奏聞請㫖其年滿書吏考職之時各部院衙門照例咨送仍取具本吏親筆親供黏連印結保送赴部考試如試卷筆跡與親供筆跡不同者察出假冒頂替將本吏黜革與頂替之人一並治罪又議準各省吏攢役滿各衙門印官取具本吏親筆親供里鄰結狀黏連地方官印結保送巡撫巡撫於每年七月內齊集考試其所考試卷即行封固並各典吏著役日期履歷清册送部定限十月內到部考定名次品級咨發巡撫存案仍將執照一並給發各巡撫轉發各該衙門令吏員自行領取其本省考試時該巡撫嚴行稽察倘有假冒頂替託人代考等弊事發將頂替之人及託人代考之人照律治罪巡綽官失於稽察者罰俸一年巡撫罰俸六月至典吏未經役滿溷入考職察出將典吏照律治罪結送官降一級調用收考官罰俸一年降罰一引用律例雍正八年諭國家法令科條原一定而不可易其有應行從重者亦必待朕酌其情罪特頒諭㫖此加倍二字非臣工所可擅定者也嗣後凡有議罪議處之條皆應照本律定擬其有負恩犯法情罪重大應從重定擬必須執中於法之至平至允不得擅用加倍字樣開朦溷苛刻之端負朕立法牖人警省防間之至意欽此十三年十一月覆準文武官員犯笞杖等罪分别公私此定例也向來部內議處不分公私槩一私罪處分應行改正嗣後議處官員引用律文按照笞杖等罪定議者皆照例分别公罪私罪繫公罪笞一十罰俸一月笞二十三十各遞加一月笞二十者罰俸兩月笞三十者罰俸三月笞四十五十各遞加三月笞四十者罰俸六月笞五十者罰俸九月杖六十罰俸一年杖七十降一級杖八十降二級杖九十降三級皆留任杖一百降四級調用私罪笞一十罰俸兩月笞二十罰俸三月笞三十四十五十各遞加三月笞三十者罰俸六月笞四十者罰俸九月笞五十者罰俸一年杖六十降一級杖七十降二級杖八十降三級杖九十降四級皆調用杖一百革職乾隆五年議準凡議處官員例無正條必須旁引比照者如比照則例可以引用全條務將全條載入如不便引用務將所引則例或一段或數語載入稿內如例無可引比照律文定擬者亦務將律文或一段或數語引用定議總期案情例意兩相吻合不得徒取字面相似以滋髙下之弊如律例並無正條又無可旁引比照之案令該司官將案情詳細察核酌定處分該堂官等再行斟酌定議於疏內聲明請㫖著為定例以備引用又議準部內承辦議處事件自罰俸以至降革款項繁多情事各别除將應行議處官員故行割裂增删例文援引比照免議者其中必有情弊自有應得處分毋庸更行定議外嗣後承辦之員有將情罪相符之例不行引用擅行割裂增刪别條摘取字面以致將不應處官員竟行革職降調離任者别經發覺除將本人開復外將承辦之員照所議降革議處如於議處之後未經發覺之先自行察出準其改正照承問失出改正免議例免議七年奏準官員議處悉照本條律例定議其有應從重定擬者亦必取自上裁非奉特㫖不得擅用加倍字樣違者以故入人罪論一官員罰俸康熙四年題準凡原任內事件應罰俸者升任官員於新任罰俸降調官員照所降之級罰俸裁闕給假丁憂解任等官皆於補官日罰俸至離任官員有虛降虛革及初選官員有應罰俸者皆照此例行雍正元年恩詔王等以下世爵以上兼攝任內有罰俸之罪照兼攝職銜罰俸其餘銀仍著給與三年遵㫖議定各官任內凡有承追承緝督催等項未完事件應議降俸住俸降職降級革職及罰俸三月六月九月仍令催追緝拏等案於未經滿限之先或别經降調離任或升遷離任或保題升轉及丁憂事故離任皆以罰俸一年完結假如承緝城外失事盜案例有四參該員於初限二限三限四限內未經滿限之先離任皆照離任官例議結本案已得處分統俟完解銀知照到日準其察銷若四限已滿離任者仍照夲例議處其餘承督未完例有展參事件皆照此辦理又如初參處分之案已經奉㫖尚未奉準部文遇有事故離任則應將初參處分之案咨明改照離任官例議結將初參處分之案察銷若已經奉準部文别行起限者應俟例限滿日同接任官一並察參如起限之後未及一月離任者免議本案得過處分亦俟完解銀知照到日察銷一月以後離任者照例議處至於承督未完案件如催追錢糧該員特旨豁免緝拏罪犯緝拏特旨免罪之類雖在原任並無催追之責者應將見參及原參各案一並察銷若特㫖升調各官原任內因承督未完案件應議降俸住俸降職降級革職等案仍皆以罰俸一年完結如遇有應罰俸三月六月九月者各照原任內處分議結七年諭外任大小官員罰俸之例如罰俸一年者則將本年應領俸銀扣抵如再有罰俸之案則勒限一年追出俸銀解部如一年不完又罰俸一年輾轉增加常有因一二年之罰俸而積至數年或十數年者此例不甚妥協在罰俸多案之州縣與力薄難完之微員深為可憫著該部通行各省凡有此等罰俸之人若該員情願照所罰之俸豫先完納以圖銷案為升遷之地則聽其自便倘力不能完即將伊任內應得之俸逐年扣抵不必勒限追繳又定例凡有休致革職病故之官其應追罰俸銀悉行豁免惟江南等省該員有休革等事只將虛俸豁免其在罰俸以前食過之俸仍行追出直省例不畫一今著將休致病故官員食過之俸槩行免追其革職之人則追編俸以示懲警著直省亦照此一例遵行欽此十二年議準革職留任官員如有罰俸事件仍行罰俸亦照見任官員之例俟開復日逐年扣抵不必勒限追繳若該員情願將所罰之俸豫先完納聽其自便乾隆三年覆準知縣以下佐二雜職等官因貪贓枉法革職者任內有降罰案件仍追編俸如實繫因公罣誤革職無論任內降革案件多寡食過編俸一槩免其追繳十六年遵㫖議定承緝盜案定例勒限三年限滿不獲豫以降調處分其或有緝限未滿有事故離任者向照離任官例以罰俸一年完結以致限期屆滿例應降調之員亦得假藉告請病假希圖幸免嗣後凡州縣承緝盜案除奉㫖題補之闕如無合例之人不論何項參罰皆準保題應題應調之闕凡任內有降調例有展參不準題升調補仍照定例辦理其特㫖升調與回避别補及别案革職降調丁憂治喪等事離任者仍照定例處分至告請病假及終養者如初參未獲例應住俸處分既輕為期尚遠亦照舊例辦理外其二參三參例應降一級留任者遇有病假終養離任即議以補官日降一級留任三年無過開復其四參例應降一級調用者遇有病假終養離任即議以補官日降一級調用再官員任內有承督未完事件如承緝案犯並徵收承追錢糧等項若於未經限滿之先離任者向例皆以罰俸一年完結今既將盜案遵㫖定例其别項繫有展參各案亦應統照此例如參限未滿告請病假及終養離任例應住俸停升降職降俸及罰俸三月六月九月者仍以罰俸一年完結其餘處分均各照本例察議不得槩照離任官例僅議罰俸一官員降革康熙十五年議準凡已經革職官員如有前任事故到部議處必分開應降應革題明注册不得止以毋庸再議將前任事故一槩抹銷倘事後辨復還職仍將前任事故逐一察核如再有應革之罪不得即與還職如有應降之罪即照原職降級如有應罰之罪仍於補官日罰俸雍正三年議準官員兼文武職銜並世爵者若犯貪汚行止不端例應革職者不論何任事發將本身所有各職悉行議革其世爵交與該旗應承襲之人準其承襲若繫溺職官治罪者將佐領兼管文武之職革退其世爵應否存留該旗具題請㫖至奉特㫖革退各官繫由武任獲罪革退者其所兼之文職世爵應否去留該部院衙門及該旗各具奏請㫖在文任內獲罪革退者其所兼之武職及世爵應否去留該旗具奏請㫖其因公罣誤止革本職之罪者在文任罣誤革其文職仍留所兼之武職及世爵在武任罣誤革其武職仍留所兼之文職及世爵降級調用者於何任議處即由何任降調革職留任者於何任議處即停何任之俸若所剩之職尚有餘俸仍行給與因病具呈者照例停俸文職以病痊補官日給俸若文職兼世爵所犯之事不由職任得者世爵大就世爵議處職任大就職任議處六年諭革職降調留任之員再有降革處分朕復加恩寬免留任者將後案注冊俟前案開復再將後案計至三年無過準豫開復其有數案處分者計案遞加永著為例欽此七年遵㫖議定凡議處內外微員除京察大計舉劾及例載加級紀録不準抵銷者仍照舊例遵行外其文職從七品以至正九品雖屬微員尚有級可降如緣事例應降級留任向議以革職留任者今止議以降級留任三年無過準其開復如繫承督等案於事完之日開復如數案降級留任仍按年逐案開復例應降級調用向議以革職者今止議以革職留任三年無過開復凡無級可降微員及各部院筆帖式如一案內所降調之級過於三級者即行革職不準留任或已經革職留任未經開復又遇别案降調即行革任如遇降級留任仍準其留任逐案開復又諭凡外任文武官員因公罣誤革職者朕恐其人材尚屬可用而罷黜之由乃限於定例不忍使之廢棄終身是以格外施恩於部議革職之時往往酌量降㫖令其於交代後該上司出具考語送部引見此朕愛惜人材體恤下情之意惟是外官在任參罰之案常多每有先經革職奉㫖來京引見之人陸續又有别案革職者此等官員著交部察明若續參之案情罪重於前案非繫因公罣誤則不應引見若後案仍繫因公罣誤與原參革職之案情罪相同仍著引見於摺奏內將該員共有處分幾案之處聲明候㫖欽此又議準外任官員有先經緣事降調奉㫖引見如陸續又有别案降調者該員到京之日察明該員降調處分共有幾案統於奏摺內聲明引見候㫖八年遵㫖議定凡京外無級可降之員遇應行降調之案在三級以內者該管官將居官如何之處出具考語送部如居官好者議以革職留任三年無過開復居官平常者議以無級可降革職或甫經任事尚未定其賢否該管官聲明到部議以暫行革職留任仍令該管官試看一年如能供職效力該管官報部注册準於奉文試看之日扣限三年無過開復如不能供職效力照例參革十年遵㫖議定凡內外官員升任之後遇有原任事發情罪尚輕應行降調者皆於見任內議以降調十三年遵㫖議定在京無級可降微員原由引見補授者遇應行降調之案於各該管官出具考語分别去留具題外省無級可降微員並盛京各省將軍都統督撫等衙門筆帖式等其例應降調者即於題參咨部之日將該員居官如何之處於本案內先行聲明部內將應革應留之處序入本內其有本案內未將該員居官如何之處聲明者部內咨詢到日將該管官出具考語及應革應留之處附入彚題乾隆二年奏準凡捐職考職借補小闕各員遇大計六法以及特參例止降調者除候補候選捐納即用原屬應行選補之人仍準其照原銜降調外至考職捐職各員如照其原銜降調補用是竟以降級調用轉得升遷與例未協應止照見職降調其原有虛銜準其隨帶降調之任不準照原銜升轉倘見任無級可降即行革任仍給與原銜令其休致不準補用十年奏準各省見任官員推升得闕如未經引見奉㫖補授適遇丁憂降革後經服滿開復赴補者例內皆仍歸原升月分升用是推升各員雖未引見繫已經升任之員遇有事故起復既例得以升闕補用則遇有降調應皆從升任內降調十二年諭各省文武官員有因公罣誤部議降調繫該員應得之處分部覆時酌其情罪或令該督撫出具考語引見酌量録用已屬格外之恩至於降㫖依議降調之員自應照所降之級赴部候補乃又有送都察院考核引見之例此等人員有原參督撫所出考語平常遲至數年俟督撫離任始行赴部更有降調並不請咨考語赴部及督撫屢更復以無憑出具考語呈請引見者既滋弊竇抑且事屬重復大抵為政貴簡而得要例愈繁而弊愈多嗣後著停止其在京文武並旗員及各駐防人員因公降革有令該堂官該旗大臣出具考語引見者又有送都察院考核者條例亦覺繁多不免啓趨避之途其如何刪繁就簡酌中定例之處著大學士九卿並八旗都統詳議具奏欽此遵㫖議定嗣後在京各部院司官及五城正指揮等官並旗員因公罣誤至於降革者其中如有辦事勤練人材可用之員任內並無錢糧不清及治罪之案該管大員會同都察院詳加察核如果應行引見交該管大員出具切實考語保奏引見應否去留候㫖定奪十五年諭向來因公降革人員朕令該督撫出具考語送部引見後仍令以州縣等官補用又經别案降調定例復應送部引見朕思該員既加恩寬宥必其人才尚堪録用若復令往返交代更替轉多拮据嗣後此等人員引見未滿三年者遇有因公降革之案皆令該部將應否復行引見及免其引見之處於本內聲明請㫖即已經升選者察繫未滿三年亦照此例行欽此一官員降罰抵銷康熙元年覆準凡紀録四次抵銷降一級紀録二次抵銷罰俸一年紀録一次抵銷罰俸半年若紀録浮於降罰之數者除抵銷外餘仍留注册如應罰俸一年止有紀録一次者準其抵銷罰俸半年仍罰俸半年二年議準官員有不論俸滿即升及卓異一次或加一級者皆準抵銷降一級又議準因公罣誤及因錢糧未完降革官員後經開復將任內原有之加級紀録皆準給還至於老病休致官員原任內如有加級紀録仍準注册後遇事故準其抵銷九年議準官員將先經抵銷之加級紀録卓異即升等項後又重抵銷者罰俸一月十五年議準京察大計處分官員任內先有即升及卓異不準抵銷隨帶若别項加級紀録不準抵銷仍準隨帶至處分拖缺錢糧官員有軍功及錢糧全完加級紀録者準抵銷别項加級紀録皆不準抵銷雍正三年諭朕體恤臣工凡官員辦事著有勞績者無論大小皆敕部議敘其有過誤致干吏議者亦照例處分夫一人之身有功有過一官之級有降有加舊例官員降革留任停其升轉必三年無過方準開復降後雖有恩詔加級不準抵銷殊非以功補過開人自新之義嗣後降級留任官員遇有恩詔及議敘加級皆準以加一級抵銷降一級庶人皆奮勵勉圖後效亦鼓舞吏治之一道也至降級後捐納加級者不得抵銷前案欽此八年遵㫖議定凡議處內外官其定例所載不準抵銷者均於本內將該員原有加級紀録卓異即升與例載不準抵銷相符之處一並聲明其餘例應抵銷者即於議以降級罰俸時察明該員加級紀録卓異即升槩行抵銷至降級留任之員原繫虛降除戴罪承追督催督運完納賠補賠修及限年承緝督緝等案必俟本案完結日方準開復外其因公罣誤降級留任者如有加級紀録均準其抵銷除捐納加級不準抵銷遇有恩詔加級及議敘加級皆準抵銷倘被議之員有加級紀録應行抵銷而該司官遺漏失錯者若自行察出檢舉仍照定例罰俸兩月如明知遺漏不自行檢舉被堂官察出或本人詳報上司咨參者將該司官照不行詳察例罰俸六月若司官遺漏抵銷而本人明知受屈隱忍不行詳明被科道糾參或該管上司察出咨參者將本人加級紀録不準於本案改正抵銷仍照議處司官之例處分十二年題準軍功紀録二次準抵降一級軍功加一級準抵降二級如遇降一級調用之案將加一級抵銷免其降調仍給還軍功紀録二次其軍功紀録一次準抵銷罰俸一年乾隆四年奏準在京官員遇有罰俸之案如願將議敘加級改為紀録抵銷罰俸者準其改抵其抵銷外餘剩紀録察其隨帶之級所改者升任時仍準隨帶若非隨帶之級所改者在任時抵銷過紀録一次二次或三次者升任時槩行注銷若在任時所改紀録並未抵銷罰俸照例準其將紀録一次帶於新任至一人而加數級者如遇處分案件皆按其加級年月之先後次第挨順抵銷再例內有不準抵銷者如引用正條原有不準抵銷字樣照例不準抵銷若比照處分定議者仍準抵銷七年諭官員紀録一次抵罰俸半年若遇罰俸一月至五月因不至銷去紀録一次遂不準抵銷照常罰俸又有因兩三案並發所罰之俸雖至銷去一次紀録亦不準抵銷照常罰俸於伊等生計亦屬無益嗣後旗員應罰之俸不至銷去紀録一次者著照王等紀録之例暫行注册俟再遇罰俸案件合算抵銷以示體恤欽此八年諭在京各衙門事務皆繫滿漢堂司公同辦理至遇罰俸處分旗員只注册合算漢官則照常罰俸例未畫一嗣後在京臣工有罰俸案件不至銷去一次紀録者皆照旗員之例注册合算欽此又奏準定例革職官員後經開復將任內原有之級紀均準給還又定例官員原參重罪審虛尚有輕罪應降級罰俸者察明該員原任內如有加級紀録即行抵銷是開復之員於本案內應行議降議罰其從前之加級紀録尚得抵銷本案降罰至别案降罰注册若因其案件業經議結遂將原有之級紀槩不議抵未免偏枯況該員既得本案開復則原任內所有之級紀例準給還與非繫夲案開復别行起用人員前任內加級紀録不準隨帶者不同似應準其一例抵銷庶為平允嗣後凡遇開復革職人員如有降罰之案有加級紀録應行抵銷者令該督撫於該員開復之後察明該員降罰注册各案咨部核議如有例應引見者即於引見文內聲明準其抵銷十四年諭近定因公降調人員如以原官補用仍將所降之級帶於新任嗣後引見時如經朕特㫖降補者不拘所降級數槩行注銷不必隨帶欽此十七年奏準外省官員遇有議處案件只繫降調離任者自知縣以上例具專疏題覆微員入於彚題至處分僅止罰俸及議降議罰有加級紀録抵免之案無論官之大小亦皆附入彚題但思方面大員不當與州縣佐二等官槩入彚題之列嗣後道府以上各官例應降調之案雖有加級紀録抵免者亦皆專疏具題若止罰俸及降革留任處分應仍照舊例彚題完結十八年議準凡革職官員業已降補他職者即繫離任之人其前任級紀等項應不準其帶於新任至於部議降調革職奉㫖從寬留任人員雖經部議究未離任其任內級紀未便槩行注銷嗣後內外各官有部議降調革職人員奉㫖從寬留任者其加級紀録以及即升卓異皆準其隨帶又奏準凡司官遺漏抵銷之案除罰俸降級留任之案及雖經議以降調尚未至開闕離任者仍照舊例處分外至降調之案本有加級紀録不察明議抵以致本員離任者應從重議以降一級留任一官員開復順治初年定內外官員有因事故降級留任者三年無過方準開復如三年之內復有降級者即以後降之日為始計滿三年開復其三年之內遇有罰俸案件將罰俸月日扣除外官令該督撫詳核咨部題請復還原級京官令該衙門堂官詳核咨部由部具題康熙九年議準內外官員倘不將降級罰俸情由察明遽行咨請開復者將咨請官在內為該衙門堂官在外為該省督撫罰俸六月轉詳之司道府等官罰俸一年如該堂官督撫將本官續有之降級罰俸情由不行聲明咨請開復者罰俸一年如本官已經申呈開復該管上司抑勒不詳者罰俸一年該堂官督撫不咨部者罰俸六月若屬官隱瞞已身罪過呈請開復者罰俸一年三十八年諭嗣後官員有因公罣誤降級者三年滿日開復時停其具題該部繕摺具奏欽此雍正四年諭向來革職留任官員從無開復之例但年久奉職無愆亦應開復以示鼓勵嗣後革職留任之員如四年無過該督撫等題明準其開復著為定例欽此又議準凡革職降級官員不應開復督撫濫行保題開復奉㫖交議者將濫行保題之督撫降一級留任如將應行開復官員抑遏不行題請者亦照此例降一級留任八年遵㫖議定凡官員被參革職發審者如審繫全虛督撫並該衙門於本內聲明照例準其開復不得稱已經革職毋庸議完結如革職發審之員有别案降革者本案審虛止將審虛之案開復其别案降革不得槩與開復如革職發審之員有别案革職留任降級留任及罰俸案件者本案審虛亦將審虛之案開復照例於補官日仍將從前降革留任罰俸之案皆帶於新任至原參重罪審虛而該員尚有笞杖輕罪例應降級罰俸者亦於本內聲明將該員原參革職之案準其開復按其所犯輕罪應降級者降級應罰俸者罰俸照例分别議處乾隆五年奏準凡內外降革留任官員於三年四年限內遇有罰俸案件如能全數繳完及京官按季扣完者皆免扣罰俸月日各照原限計滿三年四年題請開復如罰俸銀未全數通完即按其完過銀數計算免其扣除罰俸月日如全未扣繳者仍照向例扣除罰俸月日計滿年限題請開復七年議準凡例應革職降調奉㫖留任官員再遇處分例應革職降調復奉㫖留任者將後案注册扣算前案滿日即將後案接扣三年滿日準其開復有數案革職降調皆繫奉㫖留任者計案遞加如一案內一人而議處兩層降級革職皆奉㫖留任者開復時作一案計算或前有一案降級革職隨後又有一案降級革職或兩案降級革職皆在離任之後於一次奉計算㫖留任者仍作兩案如未經開復之前遇有例應降級革職留任處分不便計案遞加其後案在前案年限之內者前案開復後案皆準其開復若後案在前案年限之外者總以後降後革之日為始計滿年限方準其一例開復十四年議準在外督撫在京三品以上大員遇有降革留任等案扣滿年限即從各本衙門將年限內有無過愆之處逐一察明如年限內並無罰俸及别案降革留任事故或雖有降罰之案業經以級紀抵銷者準其咨部具題開復若有罰俸之案未經抵銷應照定例俟罰俸之銀繳完扣完再行咨送開復或别有降革留任之案亦照定例後案在前案限內滿者前案限滿後案並行咨送開復後案在前案限外滿者俟後案限滿一並咨送開復至若開復之限已滿續有議處之案應行罰俸及降革留任者其後案處分既在前案開復限滿之後應仍將前案移送開復由部逐一詳核具題其應行開復案件原可隨時咨報察辦不必限定彚題一處分遇赦雍正十二年奏準凡官員承追督催等項案件遇赦皆於赦後起限限滿仍未完結皆作初參處分至承追督催官員已經察議咨行赦後别行扣限承辦者從前原議處分皆準寬免若遇赦時參限次數屆滿止將處分寬免不必别行起限一議處出師官員雍正九年議準差往出征官員遇有議處之案例應罰俸者準其注册於事竣之日補行罰俸應降級留任革職留任者仍按年限咨題開復應降級調用者帶所降之級仍留軍營效力於事竣之日該管官將該員出具考語給咨送部引見請㫖其例應革職之案即於議處本內將該員應否仍留軍營效力之處聲明請㫖如準留軍營效力亦俟事竣之日該管官將該員出具考語給咨送部引見請㫖以上降革留營效力官員暫停開闕準照原官支食俸餉等項以資養贍一兩任內議敘議處雍正十一年四川省題請議敘拏獲賭具由部議覆具題奉㫖此本內議敘之處該部照例於總督任內議敘又於署提督任內議敘但拏獲賭具僅一案以一人而兩處議敘未免重復巡撫總督皆著紀録二次嗣後有似此一人而兼數任者遇有議敘事件若僅止一案只就一任內議敘如遇有處分事件亦只就一任內處分將此永著為例一合辭具題康熙十三年議準凡承行具題官革職將列名具題官降四級調用如承行具題官降級調用將列名具題官降一級留任如承行具題官降級留任將列名具題官罰俸一年如承行具題官罰俸一年將列名具題官罰俸六月如承行具題官罰俸六月將列名具題官罰俸三月如承行具題官罰俸三月將列名具題官免議一行取職名遲延康熙九年議準官員奉上司行取職名遲延者罰俸一年轉催官罰俸六月乾隆四年奏準凡屬員應行參處事件該專管上司如並無情節應行察詢者即當依限揭參若專管上司揭報遲延皆照事件遲延例議處不得藉本人自行開送職名遲延名色希圖推卸一從重歸結乾隆四年奏準凡官員議處案件實繫一事而其中有兩罪名相因而致者如承審事件錯擬罪名有失入之人即有失出之人職司關汛衙役賄縱出口失察出口之人即失察賄縱之人似此確繫一事而罪名實為相因自應從重議處再如命案檢驗錯認傷痕以致不能審出實情又如清文譯漢情節舛錯以致事件誤行準駮似此所犯罪名雖有先後實繫一事相因而及亦應按其所犯重罪議處再科場內作弊頂冒之人又復作弊換卷所犯雖屬二事而作弊總屬一人既與兩次犯罪者不同即與兩次失察者有間似此犯罪止繫一人而處分應有兩罪者亦應從重定議至頂替換卷等弊犯罪各有數人或先發覺者一起後發覺者一起察參既分兩次失察亦屬各項即應分案議處此外如辦理公務失察衙役犯贓又失察家人犯贓所犯之人既有兩種失察之咎亦必逐案分議又如盜案疏防一日數起倉場放米前後冒領雖同在一日共屬一事而疏防冒領皆不得溷行牽引再如列款糾參一案之內而罪名實不相同刑名錢穀一人之事而款件各不相涉皆應仍照向例分别察議欽定大清㑹典則例卷十二
