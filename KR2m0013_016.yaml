  text: 欽定四庫全書欽定大清會典則例卷十三
  hash: sha256:6028db98b2f705b427c8860b334ddcec483b838aef2ea8e621bc2a0de325a5b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_016-1a, image: WYG0620/WYG0620-0296a.png}
body:
  text: 吏部考功清吏司期限一在京衙門事件期限康熙四十六年定部院事務毎月將已未完結之處造册分送六科科鈔並見理事件造册分送各道勘對限期有遲延違誤者察叅將遲誤之人照遲延例分别議處注銷册内遺漏事件者照失察案件例罰俸兩月行察月日難結情由不行聲明及已經聲明尚有舛錯朦溷者照行察未結槩稱已結注銷例罰俸三月又議準各部院承辦科鈔事件凡行詢各部及外省不能依限完結者於毎月注銷册内將行察縁由逐一聲明如有行察未結之案槩稱完結注銷者察出將承辦注銷之人照文卷舛錯例議處雍正十二年定部院一切應行文事件均於到司五日之内即令行文其有訛誤舛錯之處未經察出者將專管直日之漢司官照文卷舛錯例議處至於應行文事件遺漏未行或遲延日久滿漢各官均難辭咎應將滿漢各官一幷察叅遺漏未行者照例罰俸兩月再各部院衙門彼此文移均兼清漢嗣後如字内有舛錯訛誤之處未經察出並將專管直日之滿司官照例議處又議準各部院咨文事件於文到之日該司務廳按日登紀號簿呈堂標到部日期分發各司該司又按每日所收咨文注明日期定稾即將原咨黏連稾後並於稾内將咨文到司日期注明如有辦理遲延者該堂官計日扣限易於稽察如有行察各衙門者亦令按次詳載以憑察覈乾隆五年議準各衙門具題事件以交繕本處日期為止九卿會議事件以九卿上班日期為止如應行察者承辦衙門除去咨詢日期按限完結遲延一日至十日者罰俸一月十日以上罰俸三月二十日以上罰俸六月三十日以上罰俸一年該堂官於屬官逾限事件自行察叅者免議倘逾限既未完結又未察叅經别衙門察叅如承辦官罰俸一月者堂官免議承辦官罰俸三月者堂官罰俸一月承辦官罰俸六月者堂官罰俸三月承辦官罰俸一年者堂官罰俸六月十四年奉㫖嗣後各部事件在本部題結者吏禮兵工等部及各衙門均定限二十日戸刑二部定限三十日行察會稾繫吏禮兵工及各衙門主稾者定限四十日户刑二部定限五十日内所會各衙門各定限五日戸刑二部定限十日逾限即行叅處十五年諭嗣後各該衙門支領文移遇有不兼清漢及一切應駮事件皆令收文之員囘明堂官移察本處並將移文之員畱待咨覆收文處不得隨收隨駮無可稽考如此則察覈尤為詳密而作偽者無所容將此永著為例欽此十六年戸部覆準各衙門如有自行奏準工程及事非常格外支領等項務將辦理縁由備具清漢文移報明戸部户部驗確即知會該衙門出具印領委官齎赴户部覈對相符然後劄庫給發十七年議準部院衙門各司屬中移付事件凡有闕題奏等案均照各衙門會稾定限移覆付督催所稽察照例注銷一稽察八旗事件乾隆二年覆準凡各旗都統叅領所辦事件有未妥協以及遲延者稽察該旗御史不行察出叅奏别經發覺者將察旗之御史照不行詳察例罰俸六月倘有瞻徇情面明知錯謬不行叅奏者照徇情例降二級調用三年定稽察内務府衙門並上三旗之御史亦照稽察八旗之例不必逐年更換如該御史有升遷離任等項事故即令新補之人辦理稽察倘有遲延違限該御史察出題叅將承辦之郎中員外郎等官及徇隱之内務府總管均照事件違限例議處如該御史徇隱不叅照不據實陳奏例降一級調用一筆帖式繙譯限期雍正元年覆準各部院繙譯筆帖式於漢稾既定後限一日即行繙譯繁難者限二日具稾説堂倘有誤承辦事件記過一次再有犯者將該筆帖式即行革退倘有串通經承洩漏招搖等弊將該筆帖式與經承一例治罪一各省承辦欽部事件限期康熙九年議準凡欽部事件以文到之日為始通限以四月具題其兼管二省之總督所管隔省事件限以六月具題陜西總督所管甘肅兩廣總督與廣東巡撫所管瓊州雖繫本省地方相隔窵逺應照隔省例限以六月具題臺灣遠在海中限以十月具題其承辦官已經辦理完結申詳督撫督撫具題遲延所有違限月日專責督撫計月處分不得分坐道府州縣等官又議準督撫違限一月者罰俸三月違限二月者罰俸六月違限三月者罰俸九月違限四五月者罰俸一年違半年以上者降一級畱任違一年以上者降二級畱任違二年以上者降三級調用十五年議準承辦欽部事件各官均照定限辦理完結如案情繁重限内必不能完結者承辦官將此情由申詳督撫題明展限如承辦官將易結之事遲延不結或將難結情由不豫行申詳督撫經督撫題叅雖期限未滿及逾限不及一月者將承辦官罰俸三月至逾限一月及一月以上者不論事件已結未結將承辦官罰俸一年督撫計月處分乾隆十五年奏準官員辦理欽部事件逾限不及一月完結者比照逾限不及一月事未完結罰俸三月之例量為酌減罰俸一月又奏準凡接扣限期均請於初叅限滿之日接扣二叅限期不得以接到部覆之日始行起限致滋延展一督撫展限康熙二十二年議準督撫監臨科場日期準其按日扣限隔省出境者準令題請展限若在本省内不準展限二十三年議準督撫新任接署者均以接署日期扣算原限四月者準展限兩月原限六月者準展限三月完結又議準布政使暫行䕶理巡撫印務者不準展限乾隆三年覆準凡通行各省督撫妥議等案或應博採輿論或應相度情形必須轉行所屬詳悉妥議申報該督撫始能彚覈咨題及至各屬察覆到齊該督撫彚行詳定或有未協之處又須駮詰往返均需時日嗣後凡通行各省督撫提鎭按伊本地情形詳悉妥議察議案件各該督撫於四月六月正限之外若事理易結者準其展限兩月事理難結者準其展限四月該督撫分别咨題事件按限完結十五年奏準通行各省察議事件凡專行一府一州者限四月完結原屬寛嚴允協毋庸酌減請將通行各府州察議事件易結者定限六月之外不準加展兩月其難結者六月之外加展兩月完結不準展限四月至有不需地方官察議在省司道可以覈定聲覆者若照四月扣限未免延緩應酌減兩月以兩月扣限題咨一邊遠展限康熙九年議準各省苗疆繫邊遠地方承辦事件於正限外展限兩月又題準廣東瓊州欽部事件限六月具題命案於六月正限之外準展限兩月乾隆十五年議準廣西苗疆潯州府屬之武宣縣南寧府屬之宣化縣横州永淳縣柳州府屬之馬平縣雒容縣柳城縣羅城縣融縣懷遠縣象州來賓縣思恩府屬之賓州遷江縣上林縣慶遠府屬之思恩縣共十六州縣湖南苗疆永州府屬之道州寧遠縣永明縣寶慶府屬之邵陽縣武岡縣新寧縣辰州府屬之沅陵縣瀘溪縣辰溪縣漵浦縣沅州府屬之黔陽縣麻陽縣郴州屬之桂陽縣桂東縣宜章縣興寧縣靖州幷靖州屬之會同縣澧州屬之永定縣桂陽州幷桂陽屬之臨武縣藍山縣二十二州縣細察情形與内地無異不準展限其餘仍照舊加展一應結事件故為駮詰乾隆四年覆準凡部院將應結之事駮詰者如各該稽察之科道衙門察出叅奏交部將該司官罰俸六月堂官罰俸三月又議準凡議敘案件一案之中有一二字重複錯誤原卷可以察明者即察明改正準與議敘不得藉端駮詰及巧為需索如有濫行駮詰者將承辦之員察明題叅照應結駮察例議處如有不肖官吏藉此需索者訪明嚴叅交部治罪赴任一文憑定限康熙九年議準各官命下後將文憑用印移送吏科塡限給發又議準官員赴任呈繳文憑時該布政使察明部科印信限期相符者即行咨繳或有油痕水跡破損等項不得駮囘倘仍有書吏藉端需索等弊許本官據實詳報該上司即行究處雍正七年議準各官自京赴任及在原籍赴任訃道里遠近酌量憑限造册移送吏科順天限十日奉天限三十日直隸限二十日江蘇省江寧常州鎮江限四十五日淮安揚州限四十日蘇州松江限五十日安徽省安慶寧國限五十五日池州太平廬州限五十日徽州限六十日鳳陽限四十日山東省濟南兗州東昌青州限三十日登州萊州限四十日山西省太原潞安汾州大同寧武朔平限三十日平陽澤州限三十五日蒲州限四十日河南省開封歸德彰德衛輝限三十日懷慶河南限三十五日南陽汝寧限四十日陜西省西安延安限五十日鳳翔漢中限五十五日甘肅省平涼鞏昌限五十五日慶陽寧夏臨洮限六十日西寧涼州甘州限七十日浙江省杭州紹興寜波限五十五日湖州嘉興限五十日金華衢州嚴州限六十日溫州處州台州限六十五日江西省南昌饒州廣信建昌南康撫州臨江瑞州袁州限六十日九江限五十五日吉安限六十五日贑州限七十日南安限七十五日福建省福州興化泉州邵武限八十日延平建寧汀州限七十日漳州福寧限八十五日臺灣限百有十日湖廣省武昌漢陽德安襄陽限五十日安陸鄖陽黄州荆州限五十五日湖南省長沙常德限七十日岳州限六十五日寶慶永州限八十日衡州辰州限七十五日四川省成都限八十日寧遠䕫州限八十五日順慶限九十日敘州重慶限九十五日保寧限百日雅州限百有五日龍安限百有十日廣東省廣州肇慶限九十日韶州南雄限八十日惠州限九十五日髙州限百日廉州雷州限百有五日潮州瓊州限百有十日廣西省桂林平樂限百日柳州慶遠梧州潯州限百有五日思恩南寧太平泗城限百有十日雲南省雲南臨安楚雄澂江廣西曲靖武定東川烏䝉限百有十日姚安大理景東順寧鶴慶䝉化永昌永北元江開化限一百十有五日廣南麗江威遠鎮沅限百二十日貴州省貴陽思南鎮遠都匀平越安順南籠遵義限百日思州限九十五日石阡黎平限八十日銅仁限九十日威寧限百有五日其八品以下在籍候補候選及在外推升例不引見官員將文憑封發督撫驗看給發者除將發憑到省日期扣算外應以得闕省分與原籍原任地方比較遠近定限順天至奉天山東山西河南均限三十日江蘇湖北陜西均五十日安徽浙江均五十五日江西六十日湖南甘肅均七十日福建四川均八十日廣東廣西均九十日貴州百日雲南百有十日奉天至順天直隸均限三十日山西五十日山東河南陜西均六十日湖北七十日江蘇安徽江西浙江甘肅均八十日湖南九十日福建四川均百日廣東廣西均百有十日雲南貴州均百二十日直隸至奉天山東山西河南均限三十日江蘇湖北均五十日安徽五十五日浙江陜西均六十日江西湖南甘肅均七十日福建四川貴州均八十日廣東九十日廣西雲南均百日山東至順天直隸山西河南江蘇安徽均限三十日浙江湖北均五十日奉天江西陜西均六十日福建湖南均七十日甘肅七十五日四川廣東貴州均八十日廣西九十日雲南百二十日山西至順天直隸山東河南陜西均限三十日甘肅四十日奉天湖北均五十日江蘇安徽江西湖南均六十日浙江四川均七十日福建八十日貴州九十日廣東廣西雲南均百日河南至順天直隸山東山西江蘇安徽陜西均限三十日湖北四十日江西甘肅均五十日奉天浙江湖南均六十日貴州七十日福建四川均八十日廣東廣西雲南均九十日江蘇至安徽限二十日山東河南江西浙江湖北均三十日順天直隸湖南均五十日山西福建陜西四川貴州均六十日奉天甘肅廣東廣西均八十日雲南九十日安徽至江蘇限二十日山東河南江西浙江湖北均三十日直隸湖南均五十日順天五十五日山西陜西福建四川均六十日貴州七十日奉天甘肅廣東廣西均八十日雲南九十日江西至江蘇安徽福建浙江湖北湖南均限三十日廣東四十日河南五十日順天