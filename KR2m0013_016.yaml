避例革職倘督撫將規避情由代為徇隐亦照徇庇例降三級調用如該員任内承辦事件能否於半年内完結之處該督撫不於兩月限内覈實咨部者照欽部案件違限例分别議處一赴部投文限期康熙十五年議準候補候選等官起文赴部在京者限十五日直隸限兩月山東河南山西限三月江南江西浙江陜西湖廣限四月福建四川兩廣貴州限五月雲南限六月均令照此限内到部投文若有違限者皆照赴任違限例處分乾隆十四年奏準候補候選各官與已經得闕者不同況領咨之後或因資斧艱難或因選期尚遠以及患病阻滯等情若槩照赴任違限例議處殊覺過重嗣後投文違限取有事故印結送部者免議若無前項情節無故遲延違限至半年以上者得官日罰俸六月一年以上者罰俸一年如司官不行詳察致有錯誤亦照例議處一教職文憑康熙五十六年議準直省教職文憑以到布政使司之日計算限一月給發該員將給發日期報部如布政使司違例照欽部事件違限例處分其教職領憑之後以布政使司發憑之日起限一月内赴任違者一例察叅照文憑違限例處分一臺灣瓊州給憑限期康熙四十三年議準福建臺灣廣東瓊州遠隔海洋升員領憑於交代兩月定限外再展限兩月教職領憑於一月正限外再展限一月起觧各項人犯於兩月正限外再展限兩月命案於六月正限外再展限兩月官員歸旗仍限三月内囘旗毋庸展限一巡撫濫行給憑康熙四十三年議準月選郎中以下知縣以上官員並在京升用在外見任推升道府運同同知州縣各官仍照例引見外其見任論俸推升例不引見官員吏部具題奉㫖後將憑封發該撫詳加驗看如果居官好有才能者即行給憑令其速赴新任有年老不及者即行具題由部别行銓選如將年老不及者給憑令赴新任不能供職發覺之日將給憑之巡撫照保薦不實例降二級調用一繳照逾限雍正五年題準各省調來引見囘任各官由部照憑限日期給與執照該員到日令督撫察明囘任日期咨報並原領執照繳部有囘任違限者該督撫照赴任違限例題叅逾限十日以外即照違限一月例議處如有患病等情照官員領憑赴任中塗患病例察覈乾隆五年議準凡奉㫖命往各省人員由部給照前往其繳照違限如中塗果有患病及風水阻滯等情皆照領憑赴任中塗患病例察叅其有並無事故逾限察叅到部者照赴任違限例分别議處具題仍將違限不及三月應否照領憑赴任違限不及三月寛免之處於本内聲明請㫖十八年議準嗣後繳憑違限官員均由吏科於每年六月底年終彚題交部察議其繳照違限官員亦毋庸逐案具題以滋瑣屑應照吏科之例亦於毎年六月底年終彚題完結一外官攜帶家口康熙二十五年議準外任官員除攜帶兄弟妻子外漢督撫準帶家人五十名藩臬準帶家人四十名道府準帶三十名同知通判州縣準帶二十名州同縣丞以下官員準帶十名其所帶婦女亦不得過此數漢督撫有管兵之責如有多帶者令其自行陳請至旗員有邊疆差遣之事非民官可比督撫所帶家口不許過五百名司道以下等官所帶家口照漢官加一倍如違定數多帶者降一級調用一旗員子弟隨任雍正五年遵㫖議定外任大小旗員帶族人赴任所者永行禁止若繫適親子弟十八嵗以上亦不得帶赴任所倘私自帶往及隱瞞嵗數不令囘旗者察出將該員解任親送子弟來京仍交部照外官違數多帶家口例降一級調用失察之該旗都統照不行詳察例罰俸六月一外任旗員家人册報督撫雍正五年議準外任旗員到任後限三月内將所帶家人姓名年貎册報督撫如管事家人有更換者亦册報督撫倘本官有虧空者該督撫將管事家人一幷審訊若有歸旗追比不能完結者著將管事家人照拖欠錢糧家産全無之子孫治罪例治罪若本官册報不實任其飽颺贖身及隱射為民者皆照隱匿逃人例治罪家人照三次逃人例發遣其不行詳察各官皆照失察逃人例處分得財者並計贓以枉法從重論一州縣收用長隨乾隆元年議準嗣後州縣收用長隨比照旗員家人之例於到任後限三月之内將長隨姓名籍貫年貌並令管何項執事一一開明造具印結分報該管上司存案或有辭退囘籍及驅逐者亦即開具事由申報上司察覈倘本官以劣蹟贓􅍁被叅即將長隨一幷看守審明完結至見在州縣之長隨亦令一幷據實開報以便稽覈如該州縣官將所用長隨册報不實經上司察出指叅即將該州縣官照遺漏造册例罰俸三月倘該管各上司未經察出據册轉報者罰俸一月十四年議準各省督撫務令將州縣長隨按季察覈出具並無册報不實印結申送督撫衙門存案如督撫以及上司不實力稽察别經發覺將該管上司照失於覺察例議處督撫照不行詳察例議處一奉差不復任康熙十五年議準凡奉差事竣復任遲延者照赴任違限例處分一迎接新官乾隆二年議準新官到任令舊官於書役内量撥數人止準在交界處所等候呈送須知册籍其餘書役槩令隨印交代不許約結多人執批遠迎並將頭接二接三接陋習嚴行禁止如舊任官一任書役多人中塗遠按將舊任官照不行管教例罰俸六月新任官令其遠迎將新任官照上司令屬員出界遠迎例罰俸一年離任一官員交代康熙十五年議準凡各省督撫於州縣官離任交代時先將接任正署各官到任日期咨報户部限兩月交代若本官將錢糧等項事件不候交代明白即行離任者將本官降二級調用督撫罰俸一年至各項錢糧册籍等項未完詐稱完結或假揑印結申詳或増改投遞者革職如本官將册籍等件未交代以前被衙役燒燬擲水藏匿等情降一級調用至衙役乘機作弊侵匿庫銀者照失察衙役侵盗錢糧例處分其鹽課錢糧未經交代清楚離任之官巡鹽御史運使等官皆照此例處分雍正五年遵㫖議準凡官員交代按限清楚者該督撫咨户部如有遲延該管上司揭報該督撫將遲延縁由察明開注如繫舊任官不於定限内將錢糧等項清白造册交送者將舊任官罰俸一年新任官免議如舊任官遲至例限將屆始將册籍造送新任官又不上緊察覈以致遲延將舊任官罰俸一年新任官罰俸六月如舊任官已將錢糧等項清白造册交送而新任官推諉不接以致遲延將新任官罰俸一年舊任官免議督催不力之上司罰俸六月倘限滿不行察叅即繫該督撫及各該管上司徇庇應聽户部扣限題叅照徇庇例議處如無未清錢糧等項事件上司藉端抑勒遲延者將抑勒之司道府等官各降二級調用督撫降一級畱任其署任官新任官如有抑勒亦照此例處分又議準州縣倉糧多至五萬石以上者於交代定限兩月之外展限一月六年奉㫖錢糧交代五萬兩以上者亦令展限一月十萬兩以上者展限兩月十五萬兩以上者展限三月著為定例又議準倉穀五萬石以上者展限一月其二萬五千石以上者準展限十五日至或一人而有兩處交代者準展限一月乾隆元年覆準直省各府州縣委署之官一經到任即令舊任之員將任内一切正雜錢糧等項造册交代署任官依限交盤如實有虧空難於接受即行揭報如易於交盤而署任官故意延挨希圖卸責以致遲延者將署任官降二級調用按此條原奏因署任官毎於交代時故意延挨不即盤收展轉之間新任官已到復從新任官到任之日起限而署任官全局脱卸則是有意遲延與實在難於交盤而遲延者有間同一議處未為妥協是以處分從嚴謹將例意注明以免與前條新任官推諉不接以致遲延一條牽溷如該監盤上司徇隱不舉降一級調用九年覆準官員奉調入闈者必須扄瑣在闈所有交代項下有無虧闕無由而知應將奉調入闈公出日期準其扣除展限十四年覆準司道府存倉米穀亦照州縣例二萬五千石以上者展限十五日五萬石以上者展限一月一升補離任康熙十五年議準升任官不候文憑即行離任將本官降二級調用至官員遇應離任時該上司不即委官署理者罰俸六月一交代限外出結雍正八年覆準府州縣交代錢糧各照定限如已授受清楚申送冊結務於文内注明到任與出結各日期其申送到府州即按程塗册内日期計算至該管府州加結文内亦即注明到省程塗日期如到任在限外出結亦在限外即行揭叅若州縣相隔遥遠册結雖到在限外而出結實在限内免其叅處仍將出結日期報部察覈再有兩月定限已逾按其程塗日期計算已屆仍無册結繳司該撫即行指叅倘該州縣揑報出結日期及該管之府州通同徇隱等弊令各該撫據實報叅一交代遲延康熙三十八年議準官員交代不於兩月内察明呈報上司者仍照定例遵行外至兩月之外如再遲延該督撫務將遲延之故確覈題叅如止以遲延題叅而不察明因何遲延之故者將申詳之司道府等官皆照徇庇例降三級調用督撫照含糊具題例降一級畱任一遲延二叅雍正六年議準官員盤察交代正限内不能完結該督撫劾叅到日照例議處再限兩月完結如逾限不結照易結不結例革職一知府交代乾隆六年覆準凡知府到任無論正署悉照州縣之例咨部扣限兩月交代令該管道員按限督催接任之人盤量清楚即照例取造册結咨部察覈如有逾限交代不清立即分别叅處一直隸河官交代雍正十三年議準直隸河工錢糧及存貯物料堆積土牛等項事宜令廳汛各官毋論實授署事遇有升遷事故均照州縣倉庫錢糧之例定限兩月造具交代清册移送新任官察覈新任官逐一覈明出具交代清楚印結呈送該管上司考覈咨部如舊任官將錢糧物料工程等項不交代明白或新任官扶同徇隱及抑勒遲延並該管上司督催不力以致違限等情該督照例題叅議處所蓋堡房責令該管汛官隨時察驗稍有破壞即行修葺完固交代之時飭令接任官造册送部倘有破壞接任官即行揭報請叅責令賠修驗明完固題請開復如該管廳官不加督察或扶同徇隱或損壞堡房不令該管汛官隨時修葺一經揭報照礮臺邊界烽墩等項不催之上司例叅處至承修工程如保固限期未滿而該員遇有升調縁事離任者不在交代之例照例著令承修之官保固期滿毋致疎虞一敎官交代乾隆六年議準各學正副教官離任時均照州縣之例將從前奉到頒發存貯書籍器物並一切經手學田租穀之項造册出結交與按任之人覈明接受造册出結由該府州縣察明加結詳司轉送督撫學臣各衙門存案仍將交明縁由報部倘離任之官有心隱匿者察明題叅闕失者責令賠補若接任之官不行察明濫出册結接受即著接受之官暨加結之府州縣賠補府學教授責成知府加結分賠州縣教官交代既有州縣督催毋庸再令知府加結如逾限交代不清亦照州縣之例咨叅議處又議準凡新任及别學接署者均令交代出結若教授學正教諭離任而本學訓導署理及訓導離任而本學教授學正教諭兼攝者該員原繫經管之人毋庸送册具結十四年議準教職交代不過書籍祭器學田等項非州縣官可比所有兩月限期酌減一月限一月完結一倉廒交盤雍正五年諭直隸各省倉穀若有前任官折價存庫者不許新任官接受交代仍令前任官買穀交倉不許顆粒短少其該管督撫上司亦不得徇情寛縱倘有故違定將本官及該管官分别從重治罪永著為例欽此六年遵㫖議準凡州縣不將倉廒黏補修理以致米穀霉爛者照溺職例革職並令先動帑銀將霉爛米穀照數買補實貯仍勒限一年内照動帑買補銀數賠完如限内不完依律治罪再各府州縣倉廒均造入交盤項内新舊交代若有木植燬爛牆垣傾圮滲漏者著接任官即行揭報不準接受將前任官照原議例議處賠補如接任官有徇情濫受者即繫接任官之責亦照例議處仍令賠修其霉爛虧空米穀即著落接任官限年賠完如限内不完亦照例治罪再新舊交代或有故為抑勒及交代遲延借辭飾報者令該督撫據實指名題叅乾隆四年覆準陜省州縣交代之時令於限内將正項錢糧交代清楚再展限一月將社倉米穀稽覈交代如有虧空據實詳揭報部審追如無虧空結報上司存案一自理案件及奉行條例造入交盤雍正十三年覆準各省州縣交代時將任内自行審理户婚田土錢債等項案件黏連卷宗鈐蓋印信造入交盤册内仍彚録印簿摘取事由照依年月編號登記注明經承姓名隨同卷宗交代並將累任遞交之案一幷檢齊加具並無藏匿抽改甘結交代接任之員交代完日照例報明上司察覈倘有不肖胥吏違玩不行察明交代並有乘機隱匿増改作弊等情將失察之該管官照失於詳察例罰俸一年乾隆九年議準凡有關定例之部文該督撫接到三日一槩通行藩臬衙門到司之後專管該司於行府之外分移各道到府之後於行州縣之外並分移丞倅等官則大小臣工嫻習律例並令大小衙門將奉行條例委撥專書彚總齊全入於新舊交盤之内倘有疎忽將該管官照遺漏行文例察議其該管典吏照遺失官文書律治罪一徇隱虧空康熙十五年議準司道府州縣新舊官交代之時如前官任内有侵欺透冒那移墊解並拖欠未清等弊署官新官徇隱不行揭報交代後始行察出者該督撫覈實題叅將虧空之官照例革職治罪接任官照徇隱虧空例革職欠項照例賠補如有侵那拖欠等弊接任官不受交代通詳督撫司道府而上司不行詳報題叅徇庇舊官逼勒新官交代者新任官即行據實報部將逼勒之上司以徇庇例議處本官於别省員闕調補雍正四年遵㫖議準州縣交代除實在民欠外其有將已徵之錢糧侵蝕虧空揑稱民欠令接任官接受者接任官即行揭報督撫司道該督撫即行題叅或該督撫䕶庇離任之人該管知府知州畏慮分賠因而抑勒交盤者被勒之人直揭部科部科代為陳奏所揭司道府州等官行令各該督撫據實確審定擬具奏其干連督撫者將具揭之人與前任虧空之人皆押來京交都察院審明將抑勒之該督撫以徇庇例議處或繫誣揑枉揭將誣揑枉揭之人交與刑部加倍治罪倘前官虧空後官瞻徇容隱不報出結接受者將欠項坐後官賠補及已經接受本身離任之時有虧空未清始稱繫前任虧空者將欠項追賠外仍照徇隱虧空例革職其出結之人後經調任他省該管上司有因該員從前揭報之故多方搜求借端誣䧟者許該員於都察院呈辨果繫叅處寃抑將該上司照屈廉為貪例議處如該員本有應得之罪藉從前揭報之名誣行呈辨者交刑部治罪一三品以上官員離任雍正五年諭三品以上京官升轉之日其原任内若無同堂辦事之人仍令本人辦理竢吏部具本開闕奉㫖補用人員之後方行卸事其兼管别衙門者亦一例遵行欽此一離任康熙十四年議準凡解任督撫部文到日令其離任巡撫事務令總督署理總督事務令巡撫署理如無總督之省及總督兼管之省巡撫解任將勅書印篆交與布政使䕶理二十五年議準凡官員不許將離任督撫具題保畱若有違例題請者降一級畱任乾隆五年覆準各省督撫以屬官才具不勝繁劇題請調簡不必等候部覆於拜疏日即令離任員闕别委署理倘該員任内有承追督催經徵展叅等案由部别行議駮並令該督撫立即題叅分别議處其䑃溷具題之上司亦一幷察議至調繁之員統竢部覆議準方離原任十五年諭各督撫於屬官有題請革職休致别行降補改用教職以及丁憂告病之𩔖應離任者皆一面具題一面即行委官收取印結署事並將任内經手錢糧一一清察毋得瞻徇著為令欽此一裁汰康熙九年議準裁汰官員别無事故久戀者降一級調用容畱之該管官罰俸一年督撫罰俸六月十八年議準督撫題請裁汰冗員不候㫖即裁者罰俸一年一外官卸事交盤限内出署乾隆元年覆準外省官員卸任之後務於交盤限内即行出署别居不得久占衙舍如不依限出署接任官即詳明上司稽察將舊官降一級調用接任官聽其久住不行詳報者罰俸一年欽定大清㑹典則例卷十三
