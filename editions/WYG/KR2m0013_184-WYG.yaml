body:
  text: 火器營一建置康熙三十年設火器營以公侯大臣為總統専理營務訓練官軍所屬設䕶軍叅領十有六人旗各二人鳥槍驍騎叅領滿洲旗各二人䝉古旗各一人管鳥槍散秩官滿洲旗各五人䝉古旗各二人管礮散秩官滿洲旗各四人䝉古旗各一人鳥槍䕶軍校滿洲旗各十人䝉古旗各四人鳥槍驍騎校滿洲旗各十人䝉古旗各四人以上官校均兼任八旗滿洲䝉古每佐領下鳥槍䕶軍三名鳥槍驍騎四名礮驍騎一名又定火器營總統無定員由特簡叅領員闕由䕶軍統領該旗都統㑹同本營總統於該旗叅領内遴選引見簡委其管理槍礮㪚秩官驍騎校員闕由該旗都統於本旗滿洲䝉古散秩官驍騎校内揀選鳥槍䕶軍校員闕由䕶軍統領於本旗䕶軍校内遴選各咨送本營至止操日以官軍一半留營看守槍礮旗纛衙署以一半發囘本營行走又定火器營鳥槍䕶軍驍騎人各給鳥槍一八旗各給子母礮五鳥槍營每旗設海螺各十有二礮營每旗設海螺各五又定火器營旗纛各按旗色䕶軍用金龍三角纛驍騎用金龍方纛均頂飾豹尾加白號帶以為别旗亦如之甲胄䕶軍校䕶軍驍騎校驍騎均與八旗䕶軍驍騎營同又定每年七月十六日開操遇閏七月即於閏七月十六日開操次年四月十六日止操年節封印日暫行停止每月初四初九十四十九二十四二十九等六日演礮初二初七十二十七二十二二十七等六日演鳥槍初六十六二十六等三日較射冬季八旗合操於安定門外鑲黃正黃兩旗敎場内列陣操演陣式詳兵部三十五年鑄給管理滿洲火器營銀印雍正三年奏準游牧察哈爾八旗䕶軍既有總管副管統轄其八旗䕶軍叅領各二人應撤囘京師改補火器營鳥槍䕶軍叅領為火器營専設官餘仍以旗員兼任九年設筆帖式八人十年奏準以朝陽門内隆福寺前官房一所為火器營公署乾隆四年奏準火器營請照前鋒營䕶軍營之例以本營䕶軍叅領驍騎叅領内簡命四人協理事務一演礮乾隆十四年奏準每年秋後奏請往蘆溝橋演放子母礮十日候㫖行十八年奏準竢漢軍演火礮鳥槍事畢本營總統率叅校軍士往蘆溝橋演放子母礮十日開操第一日祭礮由太常寺掌行一應禮儀均與八旗漢軍同圓明園八旗䕶軍營雍正二年議準圓明園専設八旗䕶軍守衞於禁苑周圍建營房八所選京中八旗官軍前往駐劄以王公二人統轄營務設營總八人五品䕶軍副叅領十有六人六品署副䕶軍叅領三十二人䕶軍校八十人䕶軍三千名按旗分住各統以營總佐以叅校每營總給房十有三間副䕶軍叅領二人各給十間署副䕶軍叅領四人各給八間䕶軍校十人各給六間䕶軍三百七十五名各給三間又奏準營總員闕於八旗䕶軍副叅領内遴選副叅領員闕於本營署副叅領内遴選署副叅領員闕於䕶軍校内遴選䕶軍校員闕於䕶軍内遴選均由總統王公引見補授又定本營官軍操演每月歩射六次春秋二季習騎射演鳥槍遇軍政之年一例考驗一應親隨兵養亷及官軍優䘏均與在京八旗䕶軍營同又定八旗官軍俸餉按季按月於户部闗支外禄米月餉左翼於清河本裕倉右翼於安河豐益倉就近支領是年設教養兵九十六名六年議準鑲黃正黃正白鑲白四旗於適中之地共立學舍一設教習二人正紅鑲紅二旗共立學一設教習一人正藍鑲藍二旗暨内府䕶軍營各立學一各設教習一人均於八旗文生員内咨取選補月給銀二両嵗給米四十二斛二斗四年期滿如敎導有方生徒内有考取録用者列為一等咨部以筆帖式即用其僅能教導約束生徒者列為二等咨囘該旗怠惰者將生員褫革又奏準八旗營總各鑄給闗防七年定增設副䕶軍校七十二人每月食餉五兩十年奏準增設三品䕶軍叅領八人原設五品副叅領陞為四品原設六品署叅領陞為五品又增設䕶軍校三十二人副䕶軍校四十人隨闗防筆帖式三十二人三品叅領員闕於八旗䕶軍副叅領内選補其營總員闕即於三品叅領内選補筆帖式員闕於䕶軍内選充仍食䕶軍本餉餘照舊例乾隆三年奉㫖圓明園八旗䕶軍營增設教養兵三百八十四名十二年奉㫖以京城八旗䕶軍八百名移駐圓明園增設䕶軍校副䕶軍校各十有六人增設營房二千三百二十八間照前分給官兵居住十六年奏準鑄給圓明園總統印即於總統王公大臣内列名奏請欽簡一人掌印以營總叅領各二人䕶軍校四人筆帖式八人隨印協理事務其選補陞降均照八旗䕶軍營隨印辦事之例二十一年奉㫖圓明園䕶軍營學舍肄業子弟令専習淸書其膏火等項仍照舊例欽此遵㫖議準敎習選用繙譯生員生徒内有以繙譯考取録用者列為一等咨部以筆帖式用餘仍舊一守衞雍正二年定圓明園門汛警蹕共百處日以營總四人副䕶軍叅領八人署副䕶軍叅領十有六人䕶軍校䕶軍千名入直夜傳更籌十有六恭遇聖駕至圓明園及還宫自圓明園至紅橋以副䕶軍叅領署䕶軍叅領四人䕶軍校䕶軍八十名於路旁兩翼清蹕如聖駕由水路自暢春園西南門經聖化寺至長春橋以營總三人䕶軍叅領副䕶軍叅領十有六人䕶軍校䕶軍二百四十名於長河兩岸淸蹕乾隆四年恭逢皇太后駐蹕暢春園圓明園改設門汛共七十六處以營總䕶軍叅領各二人副䕶軍叅領署䕶軍叅領十有五人䕶軍校䕶軍七百六十名守衞暢春園增設門汛十九處日以營總一人署副䕶軍叅領四人䕶軍校䕶軍一百九十名守衞夜傳更籌八八年定每遇駕駐静宜園設門汛五十一處日以營總二人䕶軍叅領一人署副䕶軍叅領十有三人䕶軍校䕶軍五百十名守衛夜傳更籌十車駕往還均以營總䕶軍叅領各三人副署䕶軍叅領二十人䕶軍校䕶軍五百二十名於經由之路左右清蹕恭遇駕詣黑龍潭大覺寺行禮以營總䕶軍叅領各三人副署䕶軍叅領十有四人䕶軍校䕶軍七百名沿塗淸蹕十年定增設長春園門汛二十處日以䕶軍叅領一人副署䕶軍叅領四人䕶軍校䕶軍二百名守衞夜傳更籌八十八年増設淸漪園門汛六處日以副䕶軍叅領或署䕶軍叅領一人䕶軍校䕶軍六十名守衞駕幸静明園清漪園以營總䕶軍叅領各三人副署䕶軍叅領九人䕶軍校䕶軍二百四十名沿塗淸蹕健鋭營乾隆十四年諭去嵗金川用兵朕思我滿洲兵向用雲梯攻城因命八旗於前鋒䕶軍内選擇年壯人材勇健者千人特命大臣監視操演所選兵丁各奮勉學習不數月間皆已精練隨征金川功成凱旋如令仍囘本營隨行行走則伊等前功徒費且我滿洲舊日技藝仍至廢弛若將伊等専設一營演習技藝均可為精鋭兵丁而於緩急之用更有裨益即朕遇有行幸令伊等隨往圍獵學習行走更得嫻熟竢囘軍之日不必令囘本營専設一營令大臣數人管轄操演特簡大臣一人總統其如何設立營伍學習操演遇朕行幸如何隨蹕再如何施恩使得陞轉之塗著大學士公同管轄操演之大臣等詳議具奏欽此遵㫖議準演習雲梯兵千名原委翼領四人前鋒叅領十有六人前鋒校四十一人管轄今既専設一營應將雲梯兵千名分為兩翼每翼設翼領一人統轄八旗選前鋒叅領八人副前鋒叅領八人前鋒校五十人鑲黃旗九人正黃正白二旗各八人正紅等五旗各五人以上翼領叅領䕶軍校各官不能兼任均應専設至雲梯兵千名上三旗五百名一旗一百六十六名二旗一百六十七名下五旗五百名每旗百名此内設副前鋒校四十人什長五十名隨印筆帖式四人又定健鋭營總統以王公大臣兼任請㫖特簡翼領員闕於本營叅領内叅領員闕於副叅領内副叅領員闕於署叅領内署叅領員闕於前鋒校内前鋒校員闕於副前鋒校筆帖式内均由總統遴選擬定正陪引見補授副前鋒校闕由總統於筆帖式什長内什長筆帖式闕於前鋒内前鋒闕於委前鋒内委前鋒闕於敎養兵閒散壯丁及八旗驍騎敎養兵内敎養兵闕於壯丁内拔補十五年鑄給健鋭營銀闗防又定日以叅領一人前鋒校前鋒十名守衞静宜園宫門駕幸静宜園移駐碧雲寺孔道又奏準健鋭營八旗官軍住房左翼在東右翼在南翼領叅領各給官房十有三間副叅領十間署叅領八間前鋒校六間前鋒三間委前鋒二間又奏準昆明湖趕繒船八號以健鋭營前鋒軍習演駕船水戰所用敎習把總十人水手一百十名行文天津福建各水師營選送天津把總四人水手四十四名福建把總六人水手六十六名把總年滿送兵部仍交該直省録用其員闕於水手内由本營總統選補水手闕咨該直省補送以上兵弁駐於船塢其弁兵俸餉由内務府支給又奏準健鋭營官軍隨駕於京中官軍内分撥十分之四其軍政親隨兵養亷官軍優䘏均與京城同支米與圓明園同官馬人各一匹每匹給官價銀六兩限一年内買足十六年增造新趕繒船二十四號輪換使用十七年奉㫖健鋭營賞給敎養兵百名每名給食餉銀二兩上三旗五十名下五旗五十名又奏準健鋭營操演事繁嗣後隨駕撥官軍十分之二又定恭遇行幸隨駕並操演時翼領著黃色馬褂前鋒叅領藍鑲黃馬褂兵丁黃鑲藍馬褂又定旗色左翼鑲黃右翼正黃均繪金龍制同前鋒營加以黃號帶大纛同又定每月逢四九日操演雲梯大隊三槍逢二七日演撲躍馬騙馬三槍舞鞭舞刀射箭逢三五八十等日操演水戰其一六日各於本旗較馬歩射放槍恭遇駕駐圓明園每日操演水戰常日用船四號四旗各二十五人共百人逢八日大操用船八號八旗共二百人均翼領率所屬隨時訓練戰船各用本旗色金龍旗幟十八年奉㫖健鋭營增設署前鋒驍騎千名又增敎演水師漢侍衞十人又奏準本營所增兵丁應設官管束每旗増設署前鋒叅領各二人副前鋒校各五人此内以署前鋒叅領二人副前鋒校旗各一人委前鋒旗各十有五人駐紅石山署叅領員闕於本營前鋒校内遴選引見補授副前鋒校闕由總統遴委二十一年奉㫖裁趕繒船八號二十三年奏裁趕繒船八號並裁隨船水手四十八名三旗虎槍營康熙二十三年黑龍江將軍送到精騎射善殺虎新滿洲四十名到京分𨽻於上三旗設虎槍營以内大臣或侍衞一人為總統每旗各以大臣侍衞叅領官員内設虎槍總領每旗設長三旗設虎槍人百二十名凡大狩行田皆從虎槍總統總領皆著黃色馬褂槍長紅色馬褂虎槍人白色馬褂衿均鑲以青雍正元年奏準每旗設虎槍總領二人虎槍長七人副長七人每旗虎槍人百六十名學習虎槍人四十名如遇行田隨蹕人等所領錢糧路費馬匹等項皆由本營移文各該旗支領乾隆三年奏準請鑄給闗防三旗設筆帖式三人如遇行田隨蹕人等所領俸禄錢糧路費馬匹均由本營行文支領欽定大清㑹典則例卷一百八十
