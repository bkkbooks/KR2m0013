body:
  text: 工部都水清吏司水利畿輔水利順治九年遣官修理石景山以南至蘆溝橋一帶決口隄岸十二年修築薊州及玉田豐潤三河三縣決口隄岸十四年修畿輔隄岸十五年修築内河邢家口白馬灣殷家􅋡流棉花市龍王廟五處決口隄岸康熙元年諭八旗都統及有司官不時稽察嗣後隄岸決壊之處其田土屬旗人者都統督旗人自行修築屬民者有司官督民自行修築永定為例欽此七年題準蘆溝橋隄岸衝決動帑修築又題準霸州等處隄岸衝決動帑修築十二年濬玉泉山一帶河道増修髙梁橋白石橋諸牐壩二十一年修築石景山至蘆溝橋一帶隄岸二十六年議準直屬旗荘田地隄岸令旗民互助協修該州縣㑹同屯領催酌取近土修築二十九年建玉泉山石牐一座疏濬河道三十二年修復霸州苑家口傾圮舊隄三十三年修濬靜海大城任邱雄縣隄岸河道三十九年大修畿輔各州縣清河子牙河官隄民隄共長千五百二十餘里又覆準漳河隄岸衝決将廵撫照總河例議處分司道府照督催等官例議處同知等官照承修官例議處五十二年諭石景山隄工闗繫緊要若交與永定河分司兼管則駐劄遥逺難於廵察著仍照前委部員防守修理堂上官不時廵察倘有坍塌之處即行奏聞欽此雍正二年諭石景山渾河隄工甚屬緊要著詳勘修理欽此四年特命親王大臣察勘直𨽻地方自四年為始節次興修畿輔水利又奏準直𨽻之水經流有三北為白河即北運河南為衛河即南運河其匯畿輔西南六十餘河之水為巨浸東至直沽合白河衛河同入海者為淀河又淀之下流南來者為子牙河北來者為永定河皆水濁泥多横激壅淤為淀河患故淀治而水利興必河治而淀乃就理向患永定河濁流由勝芳河之西奔騰南下今自范罋口别開長淀河一道面濶十五六丈深四五尺不等長三十餘里引渾水遶王慶坨之東北入三角淀直趨而東俾濁水無復南流淤淀又東安武清地當濁流之下稍每苦泛溢今由柳岔口至韓家樹三十餘里築隄以防其衝子牙河為滹漳滏陽大陸諸水下流水汛泥多今将兩岸之隄加髙培厚束其流使不得盪激衝決由大城之王家口入淀藉淀河清流之力刷之使河流泥沙不致淤淀又週淀舊有欽隄一道迴環千里自康熙三十七年修築之後幾三十年日就圯壊一遇暴漲衝決漫溢今自清苑以下文安以上凡隄身低薄殘闕之處悉為加髙増厚修治補葺建牐設壩鑲以樁葦堅以夯硪又開張家觜勝芳河以瀉其流俾不至㑹同玉帶諸河浸嚙隄根又苑家口河身逼窄每致漫決濬中亭河十望河以洩其漲又柴火淀在其上游急流直衝隄岸開口頭村引河掘張青口毛兒灣等處導歸中亭以緩其勢以分其澑庶幾欽隄鞏固一勞永逸又奏準莽牛河為白溝支津雨潦則溢而東決日久衝澑自成河形下無所歸泛濫田野為固壩諸州邑之患應濬治良鄉以南經涿州固安霸州等處一百七十餘里令河身深濶至髙橋以下導之入淀則白溝之暴漲可減又奏準新安當漕雹二河之衝廬舍時遭漂浸自三台村以南開引河一道使漕河入雹雹河入淀則上流諸水不致泛溢又於新安城北築隄二十餘里以䕶縣治建姜石觜牐俾小殷淀大殷淀等處營田旱澇有備又奏準髙陽豬龍河自柴淀口河身南徙之後舊河斷流新河界連任邱藉隄為障近復決䗫螂口而東任邱西北村荘盡被淹浸鄚州一帶通衢往來病渉今築攔河壩障之使西濬車道口引流歸淀堵築䗫螂放水諸口以斷其流涸出任邱被淹之地俾民復業又於任邱之棗林荘等處髙築引道十餘里復開王村順子口消南來之積水以便南北行人往來又奏準雄縣之趙北口為西淀咽喉舊有隄長七里設橋八座今増橋為十一座並以木易石空其橋下各濬深丈餘使暢濶深廣水勢順流直達柴火淀而東下庶河流無滯淀淀貫通又奏準京南以滹沱河為大澤綿亙千有餘里時決時淤其次為任縣泊即大陸澤次為寧晉泊即河薄落皆為巨浸並㑹於􅇭陽河自滹沱填淤河髙於泊入滏之路惟雞爪河一道不足以消全泊之漲而穆家口為二泊傳送之口淺隘不能暢流今並令疏濬深至九丈不等廣至八丈有餘長至三十餘里又築隄邢家灣以防其決濬深王甫隄橋之下以舒其流二泊涸地盡成膏腴復展揠營上村黄兒營等處從此二泊之㑹於滏陽者下流無滯又奏準還鄉河即浭水委折蛇行舊有三灣九曲之稱河道狹而隄堰卑東決則淹豐潤西決則淹玉田今於劉欽王木匠等荘河身之狹者濶之修築隄工之殘闕者且拓廣而加髙之俾水不旁溢兩邑無衝漫之患又議準灤薊天津文霸任邱新雄等州縣各專設營田之官行文江浙兩省召募老農每省各送三十人每月酌給工食糧米令課導耕種不敷再募竢本地人耕種得法令其回籍小民力不能耕者官給錢糧經理牛種秋成後嵗收十分之一足額而止有力之家率先奉行者計圩田多寡分别奨賞其出貲代人營田者民則分别奨賞官則分别議叙仍嵗收十分之一歸還原本其官田數萬頃分地遣官㑹同地方官首先舉行為民倡率其濬流圩岸以及瀦水節水引水戽水之法仿照成規各因地畝形勢節次興修所須農器水車等物亦行文江浙二省各送匠人五名教導本地匠人依式成造照召募老農之例一例支給工食竢本地造作如法令其回籍至民間田舍有害水道者計畝均攤通融撥抵視本田畝數加十之二三其河淀淤地已經成熟升科而必須開闢者将附近官田照數撥補違者照例治罪五年修整天津教場老君堂渠横口單街四處隄工十二年議準修築玉田豐潤各處受水圍堰又議準加修馬營林南倉至宋家口一帶舊堰以障西流並疏濬鴻橋河中泓淤淺又議準寳坻縣南岸官隄大呉家荘新安鎮險要之處每年視水勢大小緩急令地方官備辦物料堵搶又議準加修潮河隄堰自小河口至南小荘之東與還鄉河西堰相接柳沽石臼窩二處各設涵洞以資宣洩又議準還鄉河兩岸堤堰設嵗修銀於通永道庫内豫期酌用乾隆元年覆準還鄉陡河辦工銀令直督總河具題察覈是年加修石景山南北兩岸石工二年諭直𨽻河道水利闗繫重大若但為目前補救之計而不籌及久逺終無裨益總督總河所奏尚非探本清源之論著特遣大臣親往詳勘形勢籌度機宜應如何改移開濬修築之處熟商妥議酌定規模仍交總督總河督率所屬遵照辦理欽此又奏準揠濬蘆溝橋橋底淤沙並濬引河一道麻峪村橋口用柳圏填石子築攔河壩増築小堰三十餘丈又奏準東西兩淀為畿輔衆水之匯應増設垡船􅙳夫疏濬淀中河道以利宣洩其入淀故道尋源溯流悉濬舊址支流􅆜港一槩深通俾環淀諸邑永無漫溢之患又奏準直𨽻清河隄岸起清苑縣界迄獻縣之臧家橋週迴於順天保定河間三府之境沿河繞淀為數十州縣生民之保障名曰千里長隄築培髙厚以防潰決底濶八丈頂濶二丈髙一丈為率修成坦坡之形並疏濬支河以資節宣瀕河村荘増建板橋便民行走嚴禁攔河疊道横絶中流俾支河暢達以收分減之效三年題準加築石景山隄岸四年諭直𨽻地方水利未講以致水漲則受其患而平時未獲其益此衆所共知者前屢降諭㫖令總督等悉心籌畫善為經理續據陳奏大槩講論河道情形至如何消除積水俾民間田畝收水利而免水患未曽詳晰奏及朕思此時乃水落之際又值年榖收穫正宜董率官吏及時經營不但工程可以早竣而無業貧民亦可藉以餬口若不趁此時速為料理為未雨綢繆之計轉瞬春水長發又恐難於施工朕為閭閻疾苦時厪於懐為封疆大吏者當體此意欽此遵㫖議準直𨽻經流之大者永定子牙南運北運四河東西兩淀永定河葉淀之東漸為疏引使入西沽之北别行入海濬子牙新河使上流諸水得以歸淀開河之東隄於蒲港等窪漸引而東入西沽之南别行入海揠去北運河南岸沙觜深濬減河培補隄岸加築南運河兩岸遥隄揠河身以行正澑濬減河三十餘里入老黄河以達於海開揠西淀白溝河故道使入中亭於九橋之下橋南别疏一河由藥王廟行宫之南出張青口疏濬青門河由毛兒灣開口從十望河故道别派分流疏濬中亭河深濶即以取出之土堆築成隄金門牐之西引河改由東道使不入中亭以免壅決於苑家口疊道建設木橋使洩水通行則西淀之咽喉暢矣疏濬東淀三义淤淺楊家河卞家窪諸處多疏淀河數道並行而東同㑹於西沽則東淀之尾閭亦暢矣四河順軌兩淀暢流各州縣之積水自可消除又覆準天津郡城東門外至鹹水沽以下茶棚加築疊道作為遥隄頂濶二丈底濶六丈髙六尺開揠賀家口舊有小河東通海河分洩藍田積水何家圏雙港通海河各舊河溝分消郭家泊諸處積水白塘口舊河一道石牐一座宣導窪水歸於海河尚不能盡洩大泊大淀之水陂水窪起遶藥王廟逾王家荘至北里口應開引河一道過白塘口石牐以歸舊海河又自大淀起遶大韓家荘巨葛荘等處别開引河一道俾窪水同歸於海永逺保障五年覆準南運河青縣鮑家觜西岸灣坡裁直暢流出口淤淺揠濬深通以免淤塞堵築東岸厰口築挑水遥月等隄堰以資捍禦又張洪橋以南一帶民隄加髙培厚復於李豹家荘等處開設涵洞田間積水放入河中可免水患接築茍家營迤北髙阜土埂坦坡土堰捍禦子牙新河之東運河之西鳳臺等窪旋轉倒漾新河東隄羅家營等處開溝隄内各窪􅅹水洩入新河子牙舊河廣福樓舊有横堰基址補築坦坡横堰揠濬新河深通以受黑龍港支河之清水暢流歸淀王家口為子牙河入淀之尾閭開濶荘頭村起至臺頭歸清河可以暢流無阻開揠楊家荘河脣舊口引河經閻畱二荘由朱家窪等處獨流大坑歸入淀河子牙渾水由西南斜向東北水滿聽其平漫各窪水落歸槽濁泥澄地清水入淀一帶被水窪地漸同受淤盡變膏腴各窪淤平就勢築隄水經獨流大坑由楊柳青以達西沽可無淤墊之患官家河攔牛河一㮣揠濬子牙西岸大隄加培髙厚又覆準寳坻縣東淀等荘衆水匯歸開河疏濬以消積水七年覆準正定府滹沱河斜角頭隄迤下北岸近澑之處加築順流挑水柴土壩五座又於五壩以下築魚鱗挑水壩三座九年議準農政之要水利為先旱澇之防溝洫為急北方地勢平衍原有河渠淀泊水道可尋然或行之未久輒就罷廢或奉行不善轉致虚糜遂以為北地水利不可興聽其自盈自涸而莫為之均節淫潦則巨浸為災炎烈則暵乾是患有水無利而獨受其害雖天時之不齊亦人事之不豫誠使相度形勢因地制宜疏濬有方蓄洩有備平時受樂利之益而旱澇收補救之功自可流澤無窮惟是欲興水利必将全省地形之髙下水道之原委詳細察勘通盤籌畫務使脈絡貫通以圗經久若遽遣大臣齎帑前往開濬即将見在就振之民酌令就工給直無論待哺之民緩不濟急實恐草率從事迄無成效應令直督詳加察勘凡河渠淀泊或見在流行而未甚通利或已經淤阻而故道可尋将應行揠濬修築各事宜詳酌妥議次第舉行又奏準疏濬宛邑北岡窪趙新店房良二邑順水河溝雅河良邑黄管屯陽茨尾二河並良涿莽牛正支河歸於拒馬為受水之地白溝河為拒馬下流開通十里舖支河十三里支河蘆僧河分減白溝漲汛開十九垡支河五里之下馮家營起直南開河一道接入蘆僧堅築兩岸子堰又自十里舖至新橋窰築土堰一道以防衝溢新城縣南闗諸處疊道建橋開揠雄縣王克橋西槐二支河以備蓄洩以資灌溉又議準開濬陳家溝賈家沽二河展拓唐縣雹水村舊有廣渠接開新河建立橋牐涵洞堵築正定縣搭園荘大林濟洩水河口濬西栢棠村河引水至䕶城河大鳴泉小鳴泉楊家泉以及無名諸泉之水灌注存蓄以復舊規鴨子觜固營村等處開河建牐以備節宣十年覆準直𨽻興修水利劃明界址分遣印汛各官照依所管各村荘設立渠長每遇汛退冰融水涸之時督率有地居民疏濬修補又覆準修築寳坻縣芝麻窩新安鎮等處隄工開濶新安縣新河並展拓府河疏濬望都保定安肅各處道溝溝河城河又疏濬定興縣雞爪泉安肅縣萍泉㑹歸瀑河十一年覆準疏濬馬頰河引水歸海慶雲縣王家窪開渠一道疏濬髙墓臺窪開揠四鄉洩水溝渠疏濬鹽山縣宣恵河十二年覆準接濬寧晉泊内七里河揠趙州大石橋舊河及鉅鹿縣鹽池柳窪油坊大小韓家寨五村鹻地揠濬順徳府達活野狐二泉一山東水利康熙二十九年修復郯城縣禹王臺舊址遏沭水使由故道以免沂郯邳宿嶧諸州縣水患三十三年山東小青河漫溢築青沙泊南隄疏濬孝婦河俾㑹清河水入海以免新城髙苑諸縣水患四十三年疏濬戴村壩淤塞舊河築和尚林越隄逼水仍歸故道以免東平州一帶水患雍正三年開濬小鹽河並疏治膠萊新河以資民田四年揠濬濮州之魏河聊城之洩水河並開濬鬲津趙牛等河五年覆準疏濬濟南府屬之管氏倪倫温聰漯刁强等河又覆準東省安山湖開濬支河六道並於六隄口建牐以利節宣九年議準戴村新壩拆低與舊壩相等髙岸改作漫坡洩水通沙乾隆四年奏準開濬小清河自山頭店至萬家口及還河清沙泊逐一疏通隄岸照舊修整對門郭家二口隄岸加培髙厚圍築月隄以為重門保障改軍張牐為滚水石壩疏通支脈溝俾水循軌下注下截河自灣頭至淄河門逐一疏通兩截分行尾閭通達庶水有歸宿永免泛溢五年議準濟南府屬之繡江河自四營荘上至明水鎮下至金盤荘計長二十里資以轉石磑灌稻田北口應建設滚水鐵心小壩以備節宣則循軌之水可以分資灌溉六年奏準臨清徳州館陶夏津武城恩縣徳州衛諸處因漳水全歸運河與衛水汶水合流爭趨勢甚洶涌開通直𨽻元城縣和兒寨村北河溝與漳河故道相連嚴禁小民築壩阻水聽其宣洩以分水勢臨清恩縣一帶民修隄堰酌量増培分别修築又加修聊城縣䕶城隄岸又覆準揠濬徳州東陵海豐等州縣子河宣洩運河内漳衛汶漲發之水由鉤盤河逹老黄河入海以衛徳州一帶及直𨽻呉橋等縣民田廬舍十二年諭據山東廵撫奏稱沂州府屬之蘭山郯城二邑河道淤塞隄堰坍頺為每年被水之由應動帑疏築等語疏築堤堰為利民之舉且二邑河道淤塞以致屢被水災以工代振實屬應行但河務所闗須将上源下委審度周詳然後可以興舉著悉心妥酌勘實奏聞欽此遵㫖履勘沂州府屬蘭山郯城二邑河道隄堰上下周環循源溯委按沂河發源臨朐縣沂山西嶺㑹沂水䝉隂費縣諸處山河之水合流下注經蘭郯二縣至江南邳州蘆口分流一由徐塘口入運一入駱馬湖由六塘河歸海蜿蜒數百里地勢建瓴土性浮鬆下游武河陷泥芙蓉燕子等河瀰漫相連向有民修隄堰應寓振於工以衛田廬蘭山縣境内舊有柳青河一道起自縣城迤北雲白湖下達齊溝歸入沂河郯城縣境内舊有墨河一道起自縣城東北墨泉下達江南宿遷縣境内歸入駱馬湖一並開濬以洩卑窪積水又議準青州府屬瀰河一道經由臨朐益都夀光等地方受龍泉南陽七里河諸水東北入海去夏山水暴漲河東岸衝開一百五十丈舊河口淤起沙埂應堵築決口揠平沙埂以資捍禦孫家窪之東開濬引河導入淄河以資宣洩上游各窪層層開濬疏消積水又議準蘭山江風口河脣建碎石滚水壩五十餘丈約攔水勢俾歸正澑河形深處亦建碎石滚水壩一百六十餘丈尋常之水由沂河循軌下注有餘之水滚減而出一由漿水汪入武河出邳州沙家口入運一由漿水汪出柴口仍歸沂河以緩其勢並修補清水龍潭胥家重坊等口河形深處酌建碎石戧工填砌呉家口以減其勢並於李家荘馬頭鎮河水兜灣之處臨河一面填砌碎石以資捍禦又奏準山東運河北自桑園與直𨽻接壤南至臺荘與江南毗連自北而計之初受漳衛之水次受汶泗之水又次接沂河之水下流注於黄淮河身兩旁承以諸湖束以長隄東隄蓄納西堤宣洩水小則開湖以濟運水大則藉湖以受水其間山泉坡水􅆜河支港與夫牐壩涵洞橋梁斗門皆闗蓄洩機宜應隨時修濬一山西水利雍正九年議準太原平陽汾州三府同知令其兼管水利将太原等各府所屬渠道飭令水利同知每嵗於農隙時親詣所屬地方不時詳察倘有應増渠道及修築之處即勸導有田各戸按畝出力貧富維均其大同等府州所屬渠道照舊責令地方官一並稽察管理乾隆四年覆準修築陽曲縣㑹城西門外被衝䕶城隄堰六年奏準山西省北䕶城土堰每年六月中水發大澑直抵土堰酌議每年嵗修銀六百兩交陽曲縣豫為辦料於冬春水涸之際培築土堰其餘物料豫貯河干一遇水發𦂳工資以搶修年終造報察覈十年議準文水縣永樂等三村去年夏間被水淹漫應築堰一道工長二千一百六十五丈以保村荘又覆準晉省水西門外䕶城隄堰兩旁種樹俾根深盤結以資鞏固十一年覆準疏濬臨晉猗氏聞喜安邑夏五縣涑水河道臨晉猗氏二縣建分水石牐一座隄下建砌涵洞一座又覆準修理垣曲縣䕶城石隄又覆準疏濬山西省城牛站門外壕渠以資宣洩一河南水利康熙十二年議準修復河南安陽縣萬金渠引洹水灌田雍正四年覆準開濶河南百泉東西民渠口門以資灌溉洹河自石橋第十洞處每嵗築石子壩開渠引水其西三十三洞盡行疏濬又覆準小丹河上下開濶秦渠董下渠各建分水渠口灌田小丹河内舊有分灌民田之十六口門盡行堵塞五年覆準疏濬安陽等縣各泉源幫砌石岸輝縣百泉池南建設斗門築堰建牐並疏濬各泉以資灌溉又疏濬萬泉寺泉源獲嘉縣開揠丹河河内縣上秦渠進水口門改建石牐並疏通西東民渠建小涵洞修武縣開濶丹河乾隆二年諭朕聞河南省之葉縣西平遂平襄城郾城等縣今年皆遭水患蓋縁河南土地平衍河流不能盈尺雖有去地二三丈者究竟與地勢相平之處居多且向來渠道率多淤填是以一遇山水驟發不能宣洩廬舍田禾盡遭淹漫著委官踏勘悉心計議将如何疏導河流加増隄岸以防暴水漫溢妥商定議辦理欽此遵㫖議準培築郾城縣沙河隄工四段葉縣沙河隄工一段及西平縣洪河隄工瀕河貧民寓振於工又覆準修築鄭州中牟縣賈魯河河道隄堰自張家橋迤東乾柴李家荘等處至新河口隄長二千二百八十二丈加培民堰増築圍隄三年奏準修築汲淇濬湯等縣河隄彰徳府城濠支河安湯二縣羑河以工寓振四年諭今年六月豫省地方大雨如注川澤交盈分洩不及開封等屬被水之州縣甚多朕心甚為軫念已屢降諭㫖多方籌畫振䘏撫綏因思濟饑拯溺目前之補救維殷而陂澤河渠善後之經營宜亟豫省地方有淮潁汝蔡諸水經緯其間凡舊有河道皆達江湖苐因故道被淹無支河導引是以水無容納之區勢必旁溢下有壅塞之處澇即難消聞見在撫臣檄令各屬勘估興修但愚民無知上游方事疏濬而下游填實阻隔仍致水無去路於事何益著細心熟籌專委管理河道明晰水利之大員親勘全局通盤計算務使一槩疏濬深通毋令各分疆界稍有阻滯再豫省之賈魯河原由江南地方全注入淮是廬鳳等處即豫省之下游也此時見有欽差大臣興修廬鳳河渠亦當同為畱意從來疏濬河道時上游十分用力下游百計阻撓各處人情如此不獨豫省為然是在封疆大吏洞悉其弊勿為所欺庶幾原委暢流永無泛溢之患可将朕㫖即行豫省並有河道之各省督撫知之欽此又覆準豫省興修水利疏濬河道自把縣交界下連柘城淮寧鹿邑之永利溝老黄河舊河故道一槩深通河土分堆兩岸以資攔束五年覆準乾河涯乃汴河故道與城濠相通下至紅沙灣入於沙河應開通以消省城積水並建砌甎溝石橋石牐又議準豫省地髙居江南之上游開封以南祥符等沿河七州縣之水皆歸渦河綿長四百餘里逾亳州䝉城抵懐逺縣匯入於淮開濬賈魯新河入淮之水分洩入渦賈魯河北岸中牟縣四十五里舖建設石牐中牟祥符陳畱把睢柘城淮寧鹿邑等八州縣開濬河道並築攔水壩以分其勢渦河南岸分流漳河一道揠濬乾溪溝以為容納之區渦河經由亳州城北改石橋為浮橋以暢河流庶江豫兩省可無漫溢之患咸資灌溉之利八年議準疏濬永城鹿邑淮寧西華等縣河道増培隄岸以資堵禦十五年奏準豫省恵濟河分減賈魯河暴漲之水宣洩各州縣溝坡雨水酌改濬河之土加増大隄停築子堰酌畱口門用石包裹以防暴流刷汕一江南水利順治十七年修築江南當塗髙淳二縣廢圩更名忠恵圩令有司不時培䕶康熙十年開蘇屬劉家河松屬呉淞江以洩太湖俾由故道入海十一年濬蘇屬呉江長橋一帶以洩太湖水勢十九年江南水患淹没民田疏濬白茆港孟瀆河築壩建牐又修七丫河一帶並開福山港三丈浦諸河二十一年濬蘇屬支塘至新市舊河仍令嵗修蘇松河道牐壩專責蘇松常道管理年終報部三十三年覆準呉淞水利飭令江水經由地方各官每年於秋冬水涸時各加疏濬不致上游泛溢四十七年議準疏濬蘇松常鎮所屬支河港蕩修建新舊牐壩以資灌溉四十九年濬徐邳境内房亭等河雍正五年諭地方水利闗繫民生最為緊要如江南戸口繁庶宜更加修濬時其蓄洩以防旱澇向來屢有條奏之人但未經本省督撫奏請朕意亦久欲興修以資農務因海塘工程正在營治且水利事闗重大必得實心辦事之人方有裨益我皇考念切民依周知稼穡因康熙四十六年廵省江浙所至必細騐水土燥濕髙下之宜詳考五榖種植之性躬親講求将附近太湖及通江潮之處條分縷晰特頒諭㫖令江浙督撫於蘇松常鎮杭嘉湖地方疏濬河港以資灌溉修建牐壩以便啟閉皆用公帑不使絲毫出於民力恩至渥也乃當時督撫諸臣不能仰體惟以虚文奉行縻費帑金二十餘萬飽官吏之侵漁而無實效朕即位以來事事仰體皇考之貽謨永圗民生之逺計據該撫陳奏應是地方不可緩之事凡建立牐壩疏濬河流務期盡除淤塞以杜泛濫之虞廣蓄水泉以收灌溉之益其一應公費皆動用庫帑支給一切工程交與該督辦理見任部屬及候選部屬府州縣人員内有具呈願往効力者選十數人帶往江南不必令出資財惟令辦理事務酌量委用欽此又諭朕軫念民依以蘇松地勢稍下特遣大臣㑹同督撫開濬水道為久逺之計太湖之水歸海劉河白茅二河為要必徑直深廣令水暢出方能一勞永逸圗誌所載二河形勢數十里一徑直趨入海無少曲折因年嵗久逺海口為潮淹塞悉成平陸太倉常熟之紳衿土豪霸占耕種報科者十無二三今既開濬務必盡去新漲之地畝以復故道聞懐私利巳之徒投遞公呈或請别開支河或請别開新道其言紛紛不一倘以似是之言或惑於聽聞或希圗微利或稍徇情面或依違遷避使積水不能暢出數年後仍漸致壅塞則汝等罪不可逭矣當秉公詳勘務為一勞永逸之計欽此又諭江南水利緊要須實力奉行務期有濟朕思牐工自需辦理候時至於疏濬河渠無須等候先将要緊應濬河渠即行酌議乘此春夏交接之時速行疏濬勿致誤農大凡作工之處多繫就食貧民勿令姦徒包攬欽此遵㫖勘得蘇松常鎮水利並藉太湖以為吐納西北承宜興荆溪百瀆之水西南承杭湖苕霅諸山溪之水而皆由三江以入於海一自呉縣之鮎魚口經蘇郡之婁門㑹城諸水逾崑山至太倉之劉河出天妃牐入海是為婁江一自呉江之長橋出𤓰涇港由龐山湖經長洲崑山青浦嘉定以至上海合黄浦以入海是為呉淞江一自白蜆港過澱泖湖㑹浙省杭嘉諸水入海是為黄浦江實太湖之尾閭闗七郡之休戚疏其下流使水有所宣洩自不至泛溢貽害民田又議準呉淞天妃二牐各設牐夫二十名白茅牐設牐夫八名徐六牐設牐夫六名九曲得勝孟瀆三河三牐各設牐夫四名責令經管官夫敬謹看守至徐六牐照浙江三江牐之例豎立水則騐水消長隨時啟閉倘該管官夫受賄徇情啟閉不如法者将該管官指叅又議準禁止河道壅滯河濵新近攤占田地其無礙河道者聽其自便其濵河居民架水板房有礙河道者坍圯之後不許再行修造至濵河未報升科之新漲地畝並越砌石磡實繫妨礙河道之處皆令速毁如有不肖紳衿以及土豪藐法抗違者令分管水利各官詳報該督撫欽差水利大臣㑹同題叅照例治罪若水利各官失於稽察或通同受賄縱容擾累該督撫即行糾叅分别議處又議準水利同知通判縣丞主簿等官各兼水利銜在於所屬河道並牐内外不時廵察於農隙時督率疏濬又江常鎮道蘇松太道均兼水利銜以便督率又議準唐家壩舊存牐基復建為牐唐家牐旁南北陳家二壩改作涵洞二座務期灌溉有資又議準江南開濬河道所用土方照漕河定例濬河之土四面各濶一丈髙一尺為一方給銀九分積髙一丈為一大方給銀九錢六年議準一切支河溝港淤淺水難存蓄令水利官於農隙時勸諭盡力疏濬深通足資灌溉又議準呉淞天妃七浦三牐各設牐官一人白茅徐六涇二牐共設牐官一人均令河道總督於河工効力人員内選補九曲得勝孟瀆三河牐交與該縣縣丞就近管理又開濬揚屬烏塔溝槐子河界河車路海溝伍佑場王家港牛灣㤗城以東各處淤淺以資灌溉又議準劉荘青龍橋改為石牐鮑家壩運鹽河建築土隄鹽城石噠口天妃口廖家口草堰口如臯苴河洋黄沙洋各増建石牐董家溝徐家涵等處建設涵洞以資宣洩又議準修復呉淞江陳家渡漫工建築夾壩七年諭疏濬山東濟寧嘉祥等縣及江南徐沛等州縣水道使歸宿於海山東江南二省向來被水之州縣皆成樂土朕思此項工程既於民生大有裨益則舉行不宜稽遲應先委官前往專司督修之事以便備辦物料早動工程欽此八年議準串場河道王家港新洋港牛龍港草堰口廖家港五處積沙照呉淞白茅等海口之例用犁船犁鬆用混江龍按時疏濬又議準泰州興化縣所屬各鹽場適中之東臺地方設立水利同知一人統轄泰州興化縣所屬串場河道並各處牐壩每遇疏濬海口之時令同知督率牐官牐夫啟閉雇覔水手人夫乘迴潮之勢用混江龍拖刷務使海口通暢十年議準如臯之岔河以北至豐利場二十八里岔河以東至掘港場五十里各就淺深分段増濬俾蓄水五尺以利運行又議準如臯之力乏橋至泰州栟茶場鹽河濬深蓄水五尺開濬白駒草堰等場河道並揚州府城内之城河城外之遶城河一槩疏通十一年諭江南范公隄為沿海之籓籬鹽場之保障原繫商人捐修工程聞見在殘闕甚多急應修築堅固見據兩江總督委官確勘料估著一面具題一面作速興工使沿海窮民得以傭工餬口但工程綿逺需大員督率料估悉心察辦欽此又諭據奏江南通州所屬范隄殘闕之處業已修築完竣所有庫發工價銀各場竈總感戴國恩情願急公効力悉已繳還運庫等語朕允從江南總督等之請發帑修理范隄原繫保䕶鹽場加恩竈戸之意其工費銀何用竈總捐輸著出示曉諭照數給還勿使不肖官吏人等侵蝕中飽欽此十二年修補泰州屬之栟茶地方舊隄移進三四里别築新隄如臯縣屬之豐利掘港馬塘通州屬之石港西亭餘西餘中餘東呂四及泰州屬之丁溪草堰興化縣屬之白駒劉荘鹽城縣屬之伍佑等場范隄並令鑲築防風又議準范隄緊要之處計程三百五十六里照黄運湖河之例每里設堡夫一名共三百五十六名令其朝來暮返每日擔積土牛修補殘闕責成各該河員稽察又議準范隄照黄河隄岸成例隄頂修開車道埠口責令場官督率附近商民隨時培補乾隆元年諭三代以前不言水利溝澮之制時蓄洩備旱澇尚書周禮所載為田功計者其利甚溥開渠引水溉田育榖始於戰國蓋因阡陌既開溝澮尋尺已失其舊也厯代言水利者得失叅半總以相土宜順水勢近不擾民逺可利人為主今江南所屬蘇松常鎮四府太倉一州見在興修支河仿河工海塘之例督撫分委降革廢員及本籍候選考職人等効力承修朕思渠港圩壩附近溉田原宜開濬以備旱澇但開濬之法須河身深廣蓄洩得宜其揠取塗泥逺移他處或培窊下之地或築隄岸之上方為久計若雇夫取土堆貯河旁雨淋水潦旋即入河不久淤塞務名無實徒滋煩擾至古隄舊渠倘遇旱澇不為田害便宜仍舊紛更改築甚無謂也今蘇松等處内地支河原不比河工海塘之險古隄舊渠如元和至和等塘民利往來田資灌溉至今受益呉本澤國三江震澤支流四溢如丘與權單鄂郯亶趙霖夏原吉周忱等所論水利考據精覈得失瞭然今効力人員相度形勢諳練自遜前人倘有夾塘蓄水石渠洩河止宜加修不必改築若有必應開濬建築之處督撫畱心細勘並飭州縣協辦工程一應調遣臂指易使至常州等州縣按畝科錢以供大修朕已降㫖停止倘有官吏藉端中飽即絲毫擾累經朕訪聞必嚴加議處嗣後督撫以至州縣建言為民興利或利小而害大或利在目前而害伏於後或有利無害而其事易創難成皆宜詳審熟籌慎之於始以體朕恵養元元之至意欽此又諭史書詳誌河渠經術兼明水利誠以國計民生所闗也果使水道疏通脈絡流注陂澤非沮洳之藪隄防有蓄洩之方旱澇有備而田廬無虞其有裨於閭閻誠非淺鮮我皇考軫䘏􅀺元興行水利凡直省泉源河湖莫不濬導俾民得以灌溉轉瘠為腴至於蘇松之太湖呉淞白茅劉河歸海要道並淮揚之槐子烏塔河泰州如臯運河串塲車路海溝等河尤不惜帑金專員督理将各河故道或為豪强侵占者諭令嚴察清出始得一一開通建牐築隄按時啟閉使近水田畝均霑膏澤貨船鹽艘遄行無阻利賴甚溥但自開濬以來已閲數年圩岸不免坍頺沙泥不免淤積朕思與其嵗久濬築事難費倍不若逐年疏葺事易費省著江南督撫暨河道總督令管理水利河務各官及濱河州縣各於所屬境内相視河流淺阻每嵗農隙募夫揠濬定為章程逐年舉行必令功施可久恵濟民生毋得視為具文玩誤工作及陽奉隂違絲毫擾累欽此又議準串場河新建並原有石牐十座泰州屬小海草堰二牐歸小海草堰各場大使就近管理鹽城縣石噠口一牐歸鹽城縣縣丞管理廖家港草堰口二牐歸新興場大使管理泰州屬丁溪牐歸丁溪場大使管理興化縣白駒南中北三牐歸白駒場大使管理二牐歸安豐司廵檢管理一牐仍令泰州興化鹽城三州縣管河佐雜人員各就本汛河道海口協同管理小海草堰青龍噠口四牐各設牐夫六名丁溪廖家港二牐各設牐夫四名草堰口白駒南中北四牐各設牐夫二名又議準王家港新洋港二處每處設立犁船二􅃗混江龍二具責令泰州州同鹽城縣丞收管仍令東臺同知督令地方官每遇春秋二汛按日拖刷深通二年諭自古致治以養民為本而養民之道必使興利防患水旱無虞方能使蓋藏充裕緩急可資是以川澤陂塘溝渠隄岸凡有闗於農事豫籌畫於平時斯蓄洩得宜潦則有疏導之方旱則資灌溉之利非可委之天時豐歉之適然而以臨時振䘏為可塞責也朕御極以來宵旰憂勤惟小民之依是咨是詢前後諭㫖諄復再三但化導自在有司而督率則由大吏近日直省督撫惟甘肅廵撫以興水利倉儲為請西安廵撫亦有勸民鑿井灌田之奏尚能留心民食知本計之所當先其餘能盡心於吏治官方命盜錢糧諸事者尚不乏人而於民生衣食本源未能切實講求地方守令亦惟刑名錢榖自顧考成至以愛養百姓為心畱意於稼穡桑麻如古循吏所為者蓋不可得即如直𨽻今年夏初少雨深以暵旱為憂及連雨數日尚不甚大而永定河隨有漲溢之患決口至四十餘處低窪之地多被水淹雖因山水驟發然水性就下其經行之處自有定所設豫為溝渠以洩之為塘堰以瀦之自可以分殺水勢不致為洪流衝突漫衍如此之甚是皆平日不能豫為籌畫所致也東南地方每有蛟患考之於古季夏伐蛟載在月令今土人畱心者尚能豫知有蛟之處掘地得卵去之則不為害且蛟行資水遇溪澗而其勢始大田疇雖不可移而廬舍塋厝尚可遷就髙阜之地以避之是亦未嘗不可先事豫防惟在實心體察耳該督撫有司務體朕痌瘝乃身之意刻刻以民生利賴為先圗一切水旱事宜悉心講究應行修舉者即行修舉或勸導百姓自為經理如工程重大應動帑者即行奏聞妥協辦理興利去害俾旱澇不侵倉箱有慶以副朕恵愛黎元至意欽此又議準江省各屬濱江近海湖河交錯全資水利以濟民生一切河道凡闗糧艘往來及江河湖海要區專資通洩之處遇有淤淺責令水利各官於藩運二庫公銀並河庫及藩庫所存鹽規銀内動項修濬其支河􅆜港地方官每嵗勘明於農隙時相度勸導順從民願疏濬修築是年修築蘇州府屬長洲常熟二縣境内元和塘三年修築松江府婁縣䕶城石隄建砌寳應縣境内西隄柳園頭迎湖石工二百二十丈是年修濬安徽所屬夀州蔡城塘鳳陽縣山河臨淮縣鹿塘滁州衛黄慶圩全椒縣張巴等圩廣徳州秀水壩桐城縣袁家圩定逺縣響水壩四年開濬運鹽中河下場河建築子堰又開濬甘泉縣邵伯湖臨湖引河荷包塘及河尾拆修寳應縣東岸黄浦牐又奏準工程報竣例應奏銷興修水利工段繁多承辦既有先後竣工亦有早遲各工告竣㑹同騐收即造册分案報銷是年又興修淮揚所屬山陽阜寧二縣之魚濱河興化縣之白駒牐下南中北引河髙郵州之通湖橋馬飲塘河江都縣之灣頭通河分司所屬之十場鹽河通州之黄河洋范公隄又奏準各省民隄民堰有闗於民田廬舍應行修築而民力實不能辦者該督撫豫行題明照以工代振之例動用公項酌量興修五年覆準天妃廟口建牐一座拆修白駒三牐其上岡北草堰二牐移建於串場河外口其餘各牐如有損壊分别修葺以資堵禦鹻水之患又疏濬淮揚各屬東塘河道加幫范堤以及栟茶斜角二場隄工修整楊子橋牐底落低三尺牐之金門收小修葺俾得一槩疏通以資水利又修築山陽阜寧鹽城江都甘泉髙郵寳應興化泰九州縣河渠兩岸田圩各髙四尺底濶八尺頂濶二尺以作隄防又奏準上江地方濱臨江淮地多山岡其間鳳陽府屬虹縣枯河頭潁州府屬亳州乾溪溝和州大洋河姥下河牛屯河含山縣銅城牐河來安縣龍尾壩河均令開揠疏濬六年議準松江府城西二里涇河乃黄浦江宣洩要路一壩横亙中流急宜開放設立木栅一道中畱栅門二量加嵗修又奏準疏濬句容縣自晏公廟迤東馬鞍山至陳家溝河道又奏準修濬海州境内薔薇髙橋二河並薔薇河下尾神州廟後舊石牐七年諭朕思江南水災之後振䘏乃一時之補救而所以安養民生者全在明嵗之農功自被水迄今已經兩月雖水漸減退不為大害而瀰漲之勢仍似從前若疏濬稍後機宜則今嵗田地斷不能盡皆涸出小民春耕無望彼嗷嗷待哺者何以為生況此時搭棚棲止於長隄者豈可以久處亟宜講因地制宜之䇿其如何疏濬水道涸出田畝以安民業以奠民居著欽差大臣河道總督江南督撫妥議速為經理欽此是年興修淮徐所屬各