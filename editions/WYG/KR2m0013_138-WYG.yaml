又覆準寳豐縣蘭泉等堡有自來泉一道按地鋪設石槽引水其接連導引之所架置木飛槽引水以灌附近田畝又覆準疏濬恵農渠西河起寧夏縣河西寨至平羅縣石觜子長二百二十里有竒建牐設橋架置木飛槽以資灌溉又覆準甘省平番縣野狐城地方開渠一道又覆準金縣定逺鎮自滴水崖起至馬家荘開修渠道六年議準修理靖逆衛舊開渠道又議準靖逆衛蘑姑溝等處新開渠道五十四里工竣設渠夫二十名常川廵察七年議準前年六七月間黄河疊次泛漲恵農渠隄衝決修濬隄埂渠又從四堆子起至通順橋以下直抵西山脚截築横埂一道以障狂瀾九年議準去年六月靈州永寧洞衝坍秦渠中斷移南三十丈重建石洞加築秦渠附近撈河揠濬展濶量築隄埂改建利濟橋又議準堵築秦州周家磨新開河口並吕二溝闕口等處築壩堵塞以除水患疏濬舊有小渠以濟民用十年議準寧夏四堆子地方起馮家廟至五堆子築遥隄一道加培六堆子以下殘闕舊隄恵農渠尾梢展開深濶以資引灌永保汕刷十一年議準開揠狄道州引河増築大壩加建長隄以避洮水衝射城基之患又覆準西安𤓰州等處渠道増設渠兵八十名水利外委一人統率渠兵應用器具如有殘闕必須修補者準水利外委造册估報動項製造請銷如遇新舊更換交代明白報㕔存案又議準昌潤上下九牐自首迄尾輪流封閉次第澆灌充足之後挨次自下而上專令水利縣丞督率堡長不時廵防並令水利同知親往稽察如有截壩偷水等事按法責懲仍将姦民追照驅逐别招新戸頂補承種又議準寧夏縣屬髙崖子起至平羅牐堡四堆子月隄止順河長埂一道嗣後間嵗一修加髙培厚其應用人夫埂以内每田一分出夫一名埂以外每田二分出夫一名竢二三年後仍令埂内一例分撥又議準四堆子以下至八堆子中間一帶老埂於每嵗農隙時将殘闕之處飭令該管官督率民夫逐漸修補一式齊整以資䕶衛一四川水利雍正十一年覆準新津華陽二縣修淘通濟堰攔河砌石為埂截流而東灌溉田畝十二年覆準修理眉州蟇頤堰乾隆六年議準哨汛城築隄一道遏禦頂衝隄之上流開揠河路使水性循軌而下九年覆準去嵗五六月内寧逺城河被衝淤墊别決新河一道墊築新河開通舊河一廣東水利康熙五十五年築廣東海康遂溪二縣圍隄以衛洋田雍正五年議準廣肇二府所屬圍基責令廣南韶道肇羅道不時親詣工所督率修理如式堅固毋致江水漲發之時臨期周章倘該道怠玩偷安以致衝決坍卸並偏袒紳衿富戸欺壓貧民藉端滋擾縱役需索者即指名題叅九年覆準重建遂溪縣辛壬兩字號隄岸並修補丁字號隄岸及麻烈等牐乾隆元年奏準廣肇二屬圍基動撥廣東鹽運司庫存貯遞年融羡等項銀四萬餘兩借商生息以為嵗修之用又奏準廣肇二屬圍基改建石工二年議準搶築海康井鬼等七字隄柳字下牐遂溪甲乙等十字隄乙字牐並丁戊兩字麻烈大牐三年覆準築竣海康縣衝決隄岸又覆準海陽縣東南北三隄加築灰石隄䕶隄以固上游借闗税銀十萬兩給鹽洋二商營運生息積至三年次第辦理竢五年歸還原本工完如有餘别為生息以備遞年嵗修之用其潮陽揭陽澄海饒平恵來等縣舊有隄岸給與嵗修銀以舒民力四年議準修築始興縣南門外河隄五年議準加築海康井鬼等七字隄遂溪甲乙等十字隄並接砌乙丁戊三字大小牐二座七年議準粤東圍基頂衝險工及竇門壩用石砌築以資捍禦每年動支鹽規生息銀嵗加修理其一應土工令水利各官於農隙時督率圍民加培髙厚永為定例九年議準三水縣南岸圍土建用石工以殺水勢又議準搶築海陽縣東南北三隄十年議準海陽縣東南北三隄用三合土築砌土牆磯頭用頑石堆填十一年議準續築海陽縣蔡家圍隄工十二年議準修築始興縣南門外河隄一廣西水利雍正八年議準修葺臨桂縣黄泥等十三陡鑿石九處開鑿雒容縣陸路又修興安縣以至全州一帶河道修整舊陡三十六處以資轉運米榖灌溉田畝十年議準増修臨桂縣鰱魚等七陡増鑿一百三十五處又覆準臨桂縣修築鰱魚等二十陡每陡設夫二名共設夫四十名東西兩陡各設渠目一名每名嵗給工食銀六兩照興安縣陡河之例撥嵗修銀六十兩於存公銀内動支以備分修之用年終造册覈銷又興安縣二十三陡除舊設夫四十六名外増設夫一名乾隆四年覆準臨桂縣鰱魚陡河上之門山灣魦鰍橋二處加築兩陡給嵗修銀六兩於鹽道庫貯存公銀内支給按年造報察覈每陡設夫二名每名嵗給工食銀六兩五年覆準興安縣馬石橋設立牐版並設陡軍二名專司啟閉每名嵗給工食銀六兩遇閏加増又每年増設嵗修銀二兩十一年議準築復興安縣三里橋等處陡門四座疏濬分水潭等處河道並修砌陡埂新増四陡設陡夫八名以司啟閉嵗給工食銀四十八兩一雲南水利康熙十年雲南雲津河衝溢増南城外石橋二洞以殺水勢二十一年又修雲南城外金汁諸河及舊廢牐壩二十七年修雲南松華壩及金汁等六河牐壩引水資昆明各縣灌溉雍正十年議準修濬龍盤金稜銀稜寳象海源馬料明通馬溺白沙諸河増修石岸牐壩橋洞又議準昆陽州増設水利同知一人駐劄海口常川廵察遇有壅塞不時疏通設或衝塌立即堵築其餘各州縣凡有水利之處将同知通判州同州判經厯吏目縣丞典史等官皆準加水利職銜境内河道溝渠責令專理除雲南一府仍歸糧道管轄其各屬在迤東者統歸迤東道管轄在迤西者統歸迤西道管轄仍令各該府察勘騐報各該道考察詳明聽督撫酌覈勸懲又議準昆明六河酌定嵗修銀八百兩昆陽海口酌定嵗修銀二百兩臨安三河酌定嵗修銀三百兩動支鹽道衙門合秤銀給發興修用則報銷不用則存貯以備大修之需又議準疏濬臨安㠄峩曲靖南寧羅平新興路南和曲趙雲南鄧川浪穹各州縣河道重修禄豐縣廢橋定逺縣建設石隄永北府羊保山建築石壩順寧府河造鐵索橋増修阿迷州至八達通粤河道又濬嵩明州河口經尋甸東川由牛攔江達金沙江周環川江復抵昭通以通舟楫十二年議準修濬鶴慶府漾弓河又修禄豐縣石隄五十丈昭通府西門開濠引水入城以資灌溉十三年議準開鑿恩安魯甸擦拉諸河建牐以資蓄洩乾隆二年諭水利所闗農功綦重雲南跬歩皆山不通舟楫田號雷鳴民無積蓄一遇荒歉米價騰貴較他省數倍是水利一事不可不急講也凡有闗於民食者皆當及時興修總期因地制宜事可謀成斷不應惜費如難奏效亦不必强作欽此五年議準開濬龍盤江金稜銀稜海源寳象馬料諸河修建橋牐涵洞隄岸又昆陽海口改建石岸六年覆準滇省恩安縣開塘四區以濟兵民汲飲七年議準開鑿黒龍硐修濬青口河又開恩安縣礲硐水源建大壩一座培修李子灣蓄水隄基建木牐一座又修建水塘壩補卧箐山蓄水隄基建木牐一座又曬魚口河開溝建壩以資蓄洩灌溉民田八年議準安寧州築石壩六座開渠百六十里有竒以資灌溉九年議準疏濬大理府洱海淤沙以除榆郡水患嗣後責令地方官就近督修按田出夫五年大修一次仍令該道不時稽察毋致復淤十年議準開鑿南寧縣亮子口黒寳灘等處灘河二十餘里又修陸涼湖嚴芳橋梁十一年議準開鑿金沙江下游新開灘至黄草坪等灘河以利舟楫又議準開修金沙江兩岸陸路十二年議準開通大闗鹽井渡水陸道路每年動支運銅節省銀三百兩以為嵗修之用又覆準安寧州葡萄橋石龍壩等處開渠引水分灌民田十四年欽差大臣覆勘奏準金沙江自四川敘州府城内起至雲南小江口止共計水程一千四百餘里内上游之蜈蚣嶺至下游之黄草坪一段工程實於運銅無益其自黄草坪以下至新開灘約五百八十餘里亦有數大灘尚繫人力可施可以直達瀘敘於運銅有益應棄其無益留其有益仍酌給嵗修銀以利輓運又議準大修昆明六河昆陽海口隄岸牐壩橋梁河道一貴州水利順治十七年修貴州黔河乾隆三年覆準開修黔省都匀府由舊施秉通清水江至湖南黔陽縣直達常徳又由獨山州三脚􅋭達來牛古州抵粤東河道縴路一槩修治以資輓運以濟商民十年議準開鑿畢節縣赤水河道起赤水河渡口至猿猱地方大小六十八灘欽定大清㑹典則例卷一百三十四
