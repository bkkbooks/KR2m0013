body:
  text: 禮部祠祭清吏司䕶日䕶月附一日月食救䕶儀順治三年定日食前期由部具題在京文武各官均赴禮部救䕶用勘合分行直省各官均於本衙門救䕶其勘合字號直隸用雨字山東格字山西致字河南正字江南雲字江西準字福建皆字浙江以字湖廣各字陜西誠字四川其字廣東及字廣西席字雲南若字貴州柔字康熙二年定日月食勘合奉天府用光字七年定日食於太常寺衙門救䕶十四年定日月食歸欽天監職掌前期欽天監推􅈫分秒時刻奏聞科鈔到部仍用勘合分行直省各官均於本衙門救䕶至期由部遣司官一人前往觀象臺督同欽天監官測驗所食分秒仍令欽天監奏覆凡遇日食結采於禮部儀門及大堂設香案於露臺上鑾儀衞設金二鼓二十四於儀門内兩旁教坊司設樂於露臺下設各官拜位於露臺上皆嚮日欽天監官報日初虧鴻臚寺鳴贊官贊排班各官咸朝服序立鳴贊官贊進贊跪叩興樂作各官行三跪九叩禮畢樂止禮部堂官上香畢鳴贊官贊跪各官皆跪教坊司官奉鼓及枹進贊擊鼓救䕶禮部堂官擊鼓三聲衆鼓齊鳴贊上香樂作贊起立上香畢各官起立班首官上香贊跪各官仍跪欽天監官報復圓金鼓止鳴贊官贊跪叩興各官復行三跪九叩禮樂作禮畢樂止各官皆退月食集太常寺救䕶儀同六十年議準閏六月初一日日食欽天監推得京師盛京朝鮮日食四分五分餘者救䕶其日食二三分者皆不頒行六十一年奏準本年十一月十五日月食凡無執事之九卿詹事科道等官咸素服前往太常寺行三跪九叩禮不作樂仍擊金鼓救䕶雍正十三年奏準本年九月初一日日食各官素服赴禮部救䕶與六十一年䕶月食儀同乾隆二年奏準日月薄蝕官員齊集祗跪救䕶所以謹天戒嚴對越也但自初虧以迄復圓爲時久暫不等每見應齊集各官多有因不能久跪推託事故不能齊集者或有年老衰病跪久委頓不能支持者又或徙倚蹲踞有礙觀瞻事闗典禮豈容䙝越請將吏戸兵刑工五部分爲五班及文武各衙門亦各分配班次附於五部每班令禮部堂官一人領班祗跪禮部都察院監禮等官及鴻臚寺贊禮等官亦輪流更換初虧復圓行禮時五班官員咸就班行禮初虧行禮後五班官員内除年老不能久跪者退立外餘均輪替其更替之人暫退祗候勿許讙譁笑語其祗跪官員務必整齊嚴肅敬謹從事倘有託故不到及怠玩失儀者監禮官即糾叅照例議處庶齊集各官無不祗畏恪恭始終無怠七年四月十五日月食二分一秒照康熙六十年之例均不頒行又議準救䕶日月食止擊鼓鳴金毋庸作樂十一年諭月朔之期朝臣例具補服若值日食仍具補服殊非敬畏之意嗣後月朔如遇日食皆常服永著爲例欽此十三年奏準月食爲月入地影本體失光故各省見食分秒皆同日食爲月體掩日日距地遠月距地近人在地靣有東西南北之殊故各省見食分秒各異舊例月食三分以上按各省見食時刻頒行日食三分以上按各省見食分秒時刻頒行不及三分者均不頒行但日體光盛人難仰窺月體光清人所共覩或遇輕雲薄霧日色亦有淡時若食在三分以内不豫行傳知恐觀者致生駭異請嗣後凡遇日月交食無論一分以下及二分三分皆由欽天監前期五月具題請㫖勅部通行直省布政使司盛京奉天府轉行督撫提鎭將軍所屬各衙門並朝鮮國一體欽遵三分以上者救䕶不及三分者不行救䕶仍繪圖進呈十四年諭凡日月交食授時者原可推算而得而春秋之例又紀日而不紀月朕惟懸象著明人所共仰雖爲晷運之常有自不若光朗之恒度無事於諱不可不謹故禜社奏鼓自古重之舊制交食分秒時刻頒行各省不及一分者不行救䕶後定爲三分以上方行救䕶又經禮部奏定不見食省分並不及三分者皆不行知夫不先期行知則二三分者原可見食將致反生疑駭不以爲靈臺失占即爲有司怠事非所以克謹天戒也嗣後仍循曩制一分以上者即令救䕶前期五月具題請㫖無論見食不見食省分皆頒行其不見食省分不必救䕶欽此方伎一隂陽學康熙十三年議準在外隂陽學等官由該撫將應補之人咨部詳察注冊停其具題塡給劄付移咨該撫行令任事雍正七年覆準各省星學等應責令隂陽學管轄由地方官遴選素行端方者咨部照例給劄一醫學由直省地方官遴選諳於醫理者咨部給劄與隂陽學同一僧道天聰六年定各廟僧道設僧錄司道録司總之凡通曉經義恪守清規者給與度牒又定僧道不許買人爲徒違者治罪崇德五年題準新收僧人納銀送戸部覈收隨給用印度牒令僧綱司分發又定滿洲蒙古漢軍有爲巫師道士跳神驅鬼逐邪以惑民心者處死其延請逐邪者亦治罪順治二年定内外僧道均給度牒以防姦僞其納銀之例停止凡寺廟庵觀若干處僧道若干名各令住持詳詢籍貫具結投僧道官僧道官加具總結在京城内外者均令呈部在直省者赴所在地方官呈送彚申撫按解部頒給度牒不許冐充溷領事發罪坐經管官又定内外僧道有不守清規及犯罪人爲僧道者令住持舉首隱匿不舉一幷治罪頂名冐領度牒者嚴究治罪又定内外寺廟庵觀凡有明朝舊勅盡令繳部不許隱藏又嚴禁京城内外不許擅造寺廟佛像必報部方許建造其現在寺廟佛像亦不許私毁僧道住處不許私遷移出佛像及自置緣簿募化並不許私削髮爲僧僧道官住持縱隱一幷治罪三年定在京寺廟庵觀不許僧尼道士溷處及閒雜人居住工部及五城察明僧道官有容隱者一例重懲又定嚴禁京城僧道沿街設置神像念誦經咒或持擊梆磬募化者該管僧道官即行重治如住持募化罪及闔寺如散衆募化罪坐住持及該管僧道官一幷治罪六年題準内外僧道必有度牒方準住持焚修該部刋刻度牒印發各布政使司及順天府察境内僧道素無過犯者每名納銀四兩給與度牒一紙各州縣於歳底申解該司彚解戸部仍報部考覈從前給過度牒一幷追繳八年奉㫖僧道均免納銀如有請給度牒者該州縣察覈呈報司府呈禮部照數給發是年定皇城内不許作道場九年諭僧尼道士已領度牒者務恪守清規用本等衣㡌住居本寺廟如未領度牒私自爲僧尼道士及用番僧衣服往來者照例治罪欽此十一年定禁止創建寺廟其修理頽壞寺廟聽從其便但不得改建廣大十五年題準直省僧尼道士已經給過漢字度牒者盡令繳出送部照數換給淸漢字度牒並確覈先年已納銀者換給新牒未納銀者納銀給牒十七年議準僧道度牒免其納銀令各該撫詳開年貌籍貫及焚修寺廟備造清冊並送紙張投部印給度牒康熙元年定凡作道場者止許在本家院内其當家建設席棚揚旛懸榜及僧道張繖奉持香帛遶街行走取水畫地開酆都穿戴甲胄等項悉行禁止違者僧道杖二十爲民該管僧道官革職其作道場之家繫官交該部議處繫民治以違禁之罪又定凡有邪病請巫師道士醫治者須領巫師道士禀知各都統副都統用印文報部方許醫治違者將巫師道士交刑部正法其請醫治之人交部議罪四年題準興京盛京及京城寺廟僧道均遵㫖建設外其前代勅建寺廟應各設僧道十名私建大寺廟各設八名次等寺廟各設六名小寺廟各設四名最小寺廟各設二名又題準本戸不及三丁及十六歳以上不許出家違例者治罪僧道官及住持知而不舉者一幷治罪罷職還俗六年禮部通計直省勅建大寺廟共六千七十有三小寺廟共六千四百有九私建大寺廟共八千四百五十有八小寺廟共五萬八千六百八十有二僧十有一萬二百九十二名道二萬一千二百八十六名尼八千六百十有五名共計寺廟七萬九千六百二十有二僧尼道士十有四萬一百九十三名十二年議準無爲白蓮焚香聞香混元龍元洪陽圓通大乗等邪教惑衆聚會念經執旗鳴金聚衆拈香者通行八旗直省嚴行禁飭違者照例懲責十三年定僧錄司善世闡教講經覺義左右各二人左善世由右善世補右善世由左闡教補左闡教由右闡教補右闡教由左講經補左講經由右講經補右講經由左覺義補左覺義由右覺義補右覺義以候補僧官補道錄司正一演法至靈至義左右各二人左正一由右正一補右正一由左演法補左演法由右演法補右演法由左至靈補左至靈由右至靈補右至靈由左至義補左至義由右至義補右至義以候補道官補如無候補之人行僧錄道錄司選取在京僧道送部部出題考試取經典諳熟並爲人端潔者十名或取二十名咨送吏部存案按名遞補皆不支俸又議準在外僧道府所屬僧綱司道紀司州屬僧正司道正司縣屬僧會司道會司均由各該撫將應補僧綱道紀之人咨部詳察轉咨吏部補授準其注冊停止具題仍知會到部塡給劄付移咨該撫行令任事又定内外僧道官專管天下僧道恪守戒律清規違者聽其究治若所犯與軍民相涉者在京申部酌審在外聽有司斷理又定京城内外寺院庵廟宮觀祠宇不許容留無度牒僧道及閑雜人等居住歇宿十五年題準凡僧尼道士不領度牒私自出家者杖八十爲民有將逃亡事故度牒頂名冐替者笞四十度牒入官該管僧道官皆革職還俗又題準直省僧道停止給與度牒十六年定京城内寺廟庵院不許設教聚㑹男女溷雜並不許建設髙臺演劇斂錢酬神賽㑹僧道錄司及該管僧道官不時稽察有違禁者執送到部將本人及寺廟住持一幷治罪該管僧道官不行稽察由部處分二十二年議準盛京僧道仍給與度牒二十三年議準福建臺灣僧道舊牒追繳送部換給新度牒二十六年覆準無頼狂徒假藉僧道爲名或稱祖師降乩或妄逞邪說託言前知或以虗妄之談鼓動愚蒙至有羣相禮拜甘作徒從者嗣後此等邪教通行八旗五城各省督撫地方官令其嚴行禁止四十八年覆準鳴金擊鼓聚衆燒香男女溷雜等弊曾經嚴禁在案恐相沿日久舊俗復熾再扶鸞書符招搖夤緣之輩皆應永行禁止嗣後如有仍前擅行者該地方官即行究治如不實心察究在京或經該部察出外省或經督撫察出將該管官指名題叅五十年諭直省創建寺廟多占據百姓田廬既成之後愚民又爲僧道日用糾集銀錢購買田地給與以致民田漸少且游民充爲僧道藏匿逃亡罪犯行事不法實擾亂地方向原行禁止因日久漸弛著各督撫暨地方官除原有寺廟外其創建增造永行禁止欽此又覆準直隸各省嚴飭地方官槩不許創造寺廟該僧道官不時稽察取具甘結呈報並不得容留外來可疑之人如有故違致生事端依律治罪雍正元年覆準江南浙江等省禁止婦女遊山入寺二年覆準愚昩之徒縱令婦女成羣聚會往寺廟進香有壞風俗嗣後將寺廟進香起㑹之處嚴行禁止犯者照例治罪其住持及守門人不禁者同罪又覆準寺廟禁軍民妻女入廟燒香及扮神賽會其民閒春秋義社祈報者不在此例著都察院分晰出示並令司坊官明白曉諭七年覆準遊方僧道等責令僧道官管轄地方官遴選恪守清規者咨部照例給劄十三年十一月諭四民之中惟農夫作苦自食其力最爲無愧飭庀八材以利民用非百工莫備士則學大夫之學故祿其賢者能者至於商賈阜通貨賄亦未嘗無益於人而古昔聖王尚慮逐末者多令不得衣絲乗車推擇爲吏以重抑之令僧之中有號爲應付者各分房頭世守田宅飲酒食肉並無顧忌甚者且畜妻子道士之火居者亦然夫一夫不耕或受之饑一女不織或受之寒多一僧道則少一農民乃若輩不惟不耕而食食必精良不惟不織而衣且衣必細美室廬器用玩好百物爭取華靡計上農夫三人肉袒深耕尚不足以給僧道一人不亦悖乎朕與二氏之學皆洞悉其源流今降此㫖並非博不尚佛老之名也蓋見今之學佛人豈獨如佛祖者無有即如近代髙僧實能外形骸清靜超悟者亦稀今之道士豈獨如老莊者無有即如前世山澤之癯實能凝神氣養恬夀命者亦稀然茍能遵守戒律焚修於山林寂寞之區布衣粗食獨善其身猶於民無害也今則不事作業甘食美衣十百爲羣農工商賈終身竭蹶以奉之而蕩檢踰閑於其師之說亦毫不能守是不獨在國家爲游民即繩以佛老之教亦爲敗類而可聽其耗民財溷民俗乎著直省督撫飭各州縣按籍稽察除名山古刹收接十方叢林及雖在城市而願受度牒遵守戒律閉戸清修者不問外其餘房頭應付僧火居道士皆集衆靣問願還俗者聽之願守寺院者亦聽之但身領度牒不得招受生徒所有資産如何量給還俗及守寺院者爲衣食計其餘歸公留爲地方養濟窮民之用並道士亦給度牒之法該部詳悉妥議具奏欽此乾隆元年諭朕前以應付僧火居道士竊二氏之名而無修持之實甚且作姦犯科難於稽察約束是以酌復度牒之法使有志修行者永守清規而無頼之徒不得竄入其中以爲佛老之玷其情願還俗者量給資產其餘歸公留爲養濟窮民之用此亦專爲應付僧火居道士而言也名山古刹閉戸清修者在所不問前降諭㫖甚明見交與王大臣九卿㑹議乃聞外省傳述錯誤一切僧道皆有惶惑不安之意恐將資產歸公遂爾弊端百出有將己身田宅詭寄他人戸下希圖藏匿者有謀囑書吏分立花戸詭名以多報少者有減價速求售賣變銀入橐者且有局外匪類從中藉名索詐者夫此僧道既謀利戀財如是揆之仙佛之法乃糠秕稂莠也即取其私橐歸公以養濟貧民亦何不可之有天下後世自有公論但朕之本意原以天地好生之心爲心一物不得其所如己推而納之溝中此庸愚無知之僧道亦天下之一物耳朕何忍視同膜外況朕先所降㫖甚明原以䕶持僧道而非有意苛削僧道今觀伊等情形是愚昩無知被人恐嚇而不知原降之諭㫖也著該部先行曉諭去其迷惑至於應付僧火居道士之資產因無所歸著是以有養濟窮民之説䆒竟國家養濟窮民豈需此區區之財物亦可不必稽察歸公此處著重議具奏又聞外閒有尼僧一種其中年老無依情願削髮者尚無他故其餘年少出家之人心志未定而强令寂守空門往往蕩閑踰檢爲人心風俗之害且聞江浙地方竟有未削髮而號稱比邱者尤可詫異似亦應照僧道之例不許招受生徒免致牽引日衆有情願爲尼者必待年齒四十以上其餘槩行禁止著將此一幷入於㑹議中妥議具奏欽此遵㫖議準嗣後僧錄等令地方官於戒僧内選擇樸實謹愼之人報部充補道錄等應於道士内無家室實在住廟者詳愼選擇充補其現在受戒僧人全眞道士素守清規具有保結者均應頒給度牒若經僧道等官之手易滋需索擾累應行令順天府奉天府直省督撫轉飭該地方官將各僧道年貌籍貫並焚修所在繕造清冊取具互結加具印結申送該督撫彙齊報部照冊給發度牒仍飭各地方官當堂給各僧道收執遇有事故將原領度牒追繳如有改名更替或藉名影射及私行出家者皆照違制律治罪至於應付僧人令該地方官傳集靣詢果繫實心出家情願受戒者準其給與度牒不願受戒者即令還俗編入里甲爲民若老邁殘疾既難受戒又難還俗者察實亦給與度牒許其看守寺廟以終天年又如深山僻壤寺廟僧人不能遠出受戒及俗家並無所歸者亦姑給與度牒仍别注冊永不許招受生徒至在京及直省道士果無家室實心住廟焚修者應給與部照無庸給牒火居道士則勒令還俗如有年老别無營運者亦暫給與部照永不許招受生徒其尼僧一項亦應照僧道之例願還俗者聽其還俗無歸者亦暫給與度牒不得招受少年女徒嗣後婦女有年未四十出家者該地方官嚴行禁止至各寺廟所有資產應免稽察以省紛擾頒發牒照所需紙板工價等項均於戸工二部支取歳終奏銷又覆準年少沙彌道童察其果無父兄可依者應暫留寺觀造冊備案年至二十不願受戒及二十以内力能謀生願還俗者聽至年少女尼不準暫留庵廟惟四體偏廢五官闕陷及實無所歸應照原題内僧道殘疾之例暫行給牒以贍餘生又覆準八旗人等不得入天主教應令各該旗都統等通行曉諭禁止違者從重治罪三年議準直省僧尼道士頒發牒照宜豫籌清釐之法俾有成數可稽見在應付火居人等止給本身牒照不準招受生徒庶牒照止有繳銷而無續增其合例應招生徒之僧道亦必年逾四十始許招徒一人所招之人即於其師原領牒照由地方官注明所招者之年貌籍貫簮剃年月用印鈐蓋取具五人互結存案師故即爲本人之牒照次第相傳不必别給該州縣歳終彙報該撫該撫隨五年審丁之期别具清冊報部如所招之人身有過犯應還俗問罪者即於其師牒照内除名亦不準其師續招若招徒無過病故者準其報明地方官再行招受即於牒照内注明以防影射因水火盜賊而遺失牒照亦許呈明咨部再給若其師收徒之後犯罪應追繳牒照者應將牒照即行繳銷所招生徒願還俗者聽願出家者别聽投師注名牒照至已故之牒照不得暗行隱匿見在之牒照不得私相授受均責成僧道官實力稽察地方官不時察覈如有隱匿影射情弊將僧尼道士勒令還俗治以頂替假冐之罪僧道官容隱者斥革還俗仍照違令律笞責地方官不行察覈者照失察例罰俸三月僧道等年未四十而招受生徒或招受不止一人者照違令律笞責僧道官容隱罪同地方官失察奪俸四年覆準僧道情願投師者該師將所招之人報地方官察明年貌籍貫並取具鄰族地保並無過犯甘結存案至遠來投師之人應令居停住持呈地方官咨取原籍地方印甘各結到日方準簮剃是年奏準自乾隆元年起至四年止共頒發過順天奉天直隸各省度牒部照三十四萬一百十有二紙遵照原議令其師徒次第相傳不必再行給發各督撫仍於五年審丁之期别具淸冊報部又覆準應付僧火居道士内有老邁殘疾及深山僻壤俗家無可歸者姑給印照仍令該地方官察明此項牒照即大書不許招受生徒字樣鈐蓋印信其年終彙繳之牒照令該管僧道官當堂靣繳即將銷字印記牒照並截去一角繳送督撫報部覈銷五年諭僧道亦窮民之一朕不忍槩從沙汰故復行頒給度牒使有所覈察今禮部頒發牒照已三十餘萬張而各省繳到者尚少是或仍事因循僅奉行故事則甚非朕所以禁游惰勤力作之本意矣著該督撫留意善爲經理並著於歳終將所減實數具奏欽此七年覆準直省僧道由部於歳終將僧道所減實數奏聞業經令各該督撫繕黄冊進呈别造清冊送部察覈逐年冊籍井然可稽應將隨五年審丁之期造冊報部停止八年覆準直省有未曾領牒照之僧道游手托名察明曾經過犯即勒令還俗編管爲民若素無過犯實心出家者準令投師傳牒别欵附冊年終奏報至於外來投歇驗無牒照者許令住持報地保鄰甲呈官驅逐囘籍若違例私自容留犯案事發將住持僧道分别治罪地方官徇隱議處十八年覆準聚衆爲匪之案多由姦邪僧道主謀平時煽惑愚民日漸釀成大案應令該地方文武各官察照元年四年議準僧道牒照確取保結詳咨授受頂給之定例實力奉行如遇公事之便就近親至庵廟寺觀細加體訪務使姦宄之徒不能溷跡僧道以削患於未萌如文武官仍視爲具文以致藏姦匿匪煽惑愚民釀成逆案一經發覺將該管地方官及該管上司並武職各官皆照不能察緝姦民例分别議處再僧綱道紀等司乃專管僧道之人如該管内有爲匪不法之徒即應隨時稽察舉首如坐視不問瞻徇隱匿别經發覺者將僧綱道紀等司嚴提究審如果明知縱容犯繫逆案者即照知情故縱逆犯本律分别已行未行按律定擬若止失於稽察並無徇縱情弊亦當咎其平日不能約束坐以不應重律杖八十十九年諭前經降㫖禮部頒發僧道牒照復令各督撫歳終將所減實數具奏此原欲敺游手爲良農畧示沙汰之意耳乃十餘年來各省奏報不過具文從事且若輩即盡令歸農安得餘田而與之轉不免無籍爲匪耳據實嚴察或滋擾有名無實甚無謂此綜理日久所悉正不必襲復古闢異之跡也欽此一畨僧禁例天聰七年定喇嘛班第出居城外清淨之所有請念梵經治病者家主治罪又定喇嘛班第有容留婦女及不呈請到部私爲畨僧私蓋寺廟者治罪順治四年定畨僧不許私自遊方有遊方到京者著發囘原籍十八年題準京城内白塔居住畨僧九名西大達廟居住畨僧八名及額木齊喇嘛應照舊留住外其餘喇嘛班第均令於城外居住如有擅自進城居住者將喇嘛送刑部照違法例治罪康熙六年議準凡喇嘛班第令該管大喇嘛逐日詳察由部每月詳察有請誦經治病者於大喇嘛處言明準去仍令交還大喇嘛二十三年覆準嗣後番僧所到處不過三日即令起程違者留住家長寺廟住持及失察官員皆令治罪番僧除犯死罪外所犯别罪停其入官仍照律治罪遞解原籍又定班第不許服用金黄色黄色伍巴什伍巴三察不許服用金黄色黄紅色如上賜者準用違者治罪乾隆元年諭從前部議給發僧道度牒一事每歳發給數目作何題奏未經議及恐有司視爲具文無從稽考著各省將給過實數及事故開除者毎年詳晰造冊報部該部於歳終彙題今年初次奉行其題奏之處著於乾隆二年爲始至番僧給發度牒亦照此例行欽此一正一眞人承襲乾隆十二年覆準江西張氏世居龍虎山眞人名號非朝官卿尹之稱存其舊名正所以别於流品前因無案可稽兩遇覃恩加至光祿大夫封及三代邀榮逾分理應更正嗣後應不許援引假藉懇請題給封典至正一眞人有統率龍虎山上清宮道衆之責視提㸃演法稍優按太醫院使秩正五品醫巫類本相等應將正一眞人亦授爲正五品從前所用銀印繳部換給其眞人承襲由來已久不過令其奉祀宮觀非若文武勲階爲國家酬庸之典爰及苗裔以示顯庸者可比嗣後有闕應補仍由該撫察其子孫應襲者取具地方官印結咨部襲補照道官例注冊至於朝覲爲述職大典筵燕實惠下隆恩未便令道流厠身其閒應請一槩停止以肅體制内監一内監禁例順治三年定凡有私自閹割者本身及下手之人皆處斬全家發邊遠充軍兩鄰及歇家不舉首者一幷治罪有司里老人等仍不時察訪如或容隱一例治罪又定民閒有四五子以上願以一子報官閹割者聽有司造冊送部候收補之日選用又定先年内監曾經發囘者若非奉㫖取用有地方官文書起送而私自來京圖謀進用者問發邊衞充軍康熙四年題準凡私自閹割子孫者從重治罪其該管大小官員一幷分别治罪十九年題準服役用内監除王以下入八分公以上公主以下郡君以上不議外縣君不入八分公以下至覺羅民公以下官民人等除先有内監不議外嗣後如買用投充者内監入官收用之人交該部從重治罪二十二年題準縣君不入八分公一品大臣準用内監三名二品大臣準用二名不許越數多用其餘官民人等均照舊例不許私自買用投充違者治罪二十三年題準凡年老患病内監願歸民籍者聽其不能歸者準令禮部收養每四名合給房屋一閒每名月給銀五錢米一斛房屋銀米由戸部工部支給亡故者交五城埋葬又定嗣後有􅫬騙及强勒閹割者仍照律治罪外其父母情願將伊子閹割及本身情願閹割者免治罪二十四年奉㫖滿洲家僕及内監家僕有逃走在外私自閹割者不宜内用有已經内用者交禮部發囘原主嗣後著嚴行禁止四十年覆準宮中内監需人王等以下入八分公以上多羅貝勒女郡主以上所用内監不得太多親王各許用二十五名世子郡王各二十名長子貝勒各十有五名貝子八名入八分公六名公主十名郡主五名縣主四名其郡君不入八分公等仍照前許用三名民公侯伯一品大臣減去一名許用二名二品大臣減去一名許用一名嗣後有比定數少者候宮中内監充足之日到部聲明方許買用除看守墳墓衙門内監外王貝勒貝子公公主郡主縣主縣君大臣等及不應用内監職分之官員見在所有内監均交與八旗直隸各省五城嚴禁將内監一幷送部照前送内府􅂤選所用之内監若繫王貝勒貝子公公主郡主等者因前未定數目仍照例由戸部給身價銀五十兩郡君不入八分公民公侯伯大臣等原定有内監數目若有越數及不應用内監官員之内監將内監徹囘入官其主交與該部嚴加議處每年著該部都統佐領稽察一次如不行察出或内監自行出首或被旁人出首將該管官交該部議處雍正元年奉㫖嗣後十七歳以上内監不必收二年奉㫖新進内監察明不是旗人年十五六歳以下者著掌儀司㑹計司首領内監驗明引見若將旗人帶來一經察出將原保人員驗看首領内監一幷治罪五年諭從前放出爲民之内監並諸王貝勒等放出爲民之内監潛住京師者不少此等多繫年老有病平昔怠惰不守本分之人既經放出除効力年久本管本主保留外不許仍留京師居住屢降諭㫖甚明今仍有留京生事者可見向來全不察拏虗應故事且在京必有容留之家著交内務府總管步軍統領五城御史似此放出爲民之内監除有保留外在京潛住者著嚴緝發囘原籍嗣後放出爲民之内監仍然違㫖者一經發覺將容留之人從重治罪内務府總管步軍統領廵視五城御史一幷交部議處如保留爲民之内監有生事犯法者將保留之人亦著議處欽此乾隆五年奏請嗣後新進内監在二十歳以内者仍許投部移送其二十歳以外者均責令本籍州縣官出具文結申部轉送仍將文結存部備察奉㫖新進内監在二十歳以内者著改爲十五歳以内八年定新進内監由部咨送内務府内務府驗收後即將收到名數咨部注冊備案十三年議準看守壇廟應用之内監有闕向例由太常寺咨呈本部將各王公府第放出之陳内監召募轉送充補惟是此輩既不由地方官保送又不由各王公府第移送惟憑見在壇廟當差之内監具結認保其中雖有盜逃等情部中無憑稽覈嗣後闕人需補太常寺咨呈到部由部咨呈宗人府於近支王等府第輪流挨次愼選老成敬謹堪以供役之内監撥送到部由部轉送充補欽定大清會典則例卷九十二
