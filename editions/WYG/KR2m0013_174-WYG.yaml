body:
  text: 領侍衞府一宮門宿衞三旗侍衞各分六班乾清門内左右門為内班左右翼侍衞各三十人侍衞班領各一人署班領各一人率侍衞入直書坐門禁夜守扃鑰太和門為外班三旗侍衞什長各一人率侍衞曁入侍衞班之親軍三十人入直每班以領侍衞内大臣一人内大臣或散秩大臣一人統之如領侍衞内大臣或奉差或兼他職以内大臣散秩大臣奏簡署理中和殿以散秩大臣一人率外班侍衞親軍十人入直一巡幸宿衞御營以内大臣一人散秩大臣一人入直御前大臣侍衞及乾清門侍衞分五班更番入直御營正門内班侍衞二十人侍衞班領一人前東西隅侍衞各十人侍衞班領一人後東西隅侍衞各十人署班領二人正門外侍衞什長三人率入侍衞班之親軍三十人宿衞恭奉慈輿行幸皇太后行營正門侍衞班領一人侍衞十人後隅署班領一人侍衞十人一朝㑹扈從皇帝御太和殿受朝前引侍衞二人自乾清門後左門引至殿後止後扈大臣二人自乾清門扈從如繫宮内御前大臣自隨出後同前引大臣十人於殿北階下立候駕至前引十大臣按翼前導進殿由左右趨至寳座前北上東西面序立後扈大臣二人隨升於御座後東西僉立豹尾班侍衞於寳座下兩旁序立大朝日先於中和殿行禮前引十大臣内大臣散秩大臣侍衞與部院有執事官於中和殿南兩旁序立均東西面北上駕御中和殿座鴻臚寺官引東西班各官就拜位北面立後扈大臣於殿階視排班齊趨入班行三跪九叩禮殿前後直班侍衞各就立處隨行三跪九叩禮畢内大臣侍衞先由太和殿後門趨入各供執事後扈二大臣進至階下前引十大臣進至御道左右駕興導從如前駕御太和殿慶賀禮成駕還宮直日侍衞班領率豹尾班侍衞於乾清門階下御道左右行三跪九叩禮御殿賜茶前期行文禮部移取進殿兩翼王公大臣職名如數分委侍衞至期侍衞班領四人什長四人率侍衞隨尚茶正尚茶舁茶案自殿階二成左右升一成中階至殿檐下侍衞等分立兩旁竢尚茶大臣進茶退侍衞班領二人由左右門入殿視三等以下侍衞各奉茶入先授王公次授後扈前引大臣茶什長四人由左右次間門入視侍衞徧及殿内外大臣及講官茶畢出隨茶案由兩旁魚貫而退大燕日竢進酒大臣進酒退内府執事官舉反坫至檐下御前侍衞各奉巵酒進至御前以待親賜王公大臣酒領侍衞内大臣二人起立指示一二等侍衞巡酒分賜王公百官皆令徧及失儀者劾之外國來朝及召見使臣或於便殿或於駐蹕行宮前引後扈大臣皆侍班御前侍衞乾清門侍衞直日侍衞班領率豹尾班侍衞均於殿内按翼序立其應入坐次王公大臣侍衞均由領侍衞内大臣辦理恩賜曲燕同駕詣皇太后宮行禮前引侍衞二人自乾清門前導至永康左門止還宮導如前至乾清門止前引大臣十人於隆宗門内立豹尾班侍衞於乾清門階下立候駕至前引大臣按翼前導將至慈寧門階止豹尾班侍衞隨至左右牆角止後扈大臣隨升階上行禮時在後僉立前引十大臣入於隨從御前大臣班内按翼行禮禮成仍前引至隆宗門内止駕還宮後扈大臣率侍衞班領豹尾班侍衞赴慈寧宮門外階下甬道左右行三跪九叩禮御門聽政届時直班侍衞引部院翰林科道等官由後左門入日常入奏官亦均由侍衞引進豹尾班侍衞於乾清門階下左右牆角立領侍衞内大臣直班内大臣侍衞於左右階下侍衞班領每翼一人於階上左右楹前立御前侍衞隨駕出同乾清門侍衞於御榻兩旁立上御座直日侍衞三人隨第一部奏事官至階下侍衞止部臣升階奏事畢降階仍隨退各部依次以三人隨進退如之至大學士等升階侍衞班領各侍衞由左右階降同階下侍衞均退立於螭頭左右竢大學士奏對退仍升階各就原處立駕還宮御前侍衞隨入餘各退如御箭亭侍衞二人前導至降輿處止豹尾班隨行掌蓋於御前擎蓋凡出入禁城行幸亦如之耕耤饗先農禮成御具服殿前引大臣於殿前階上立駕詣耤田引至耕所竢進犁鞭畢前導往返三推禮成引由觀耕臺午階升於御座前左右侍立禮成右翼趨過同左翼由東階降引出後扈大臣隨從如儀御經筵日侍衞二人前導至文華門止後扈大臣隨至寳座左右僉立御前侍衞乾清門侍衞於寳座後兩旁豹尾班於殿外階下均左右序立一宮禁扈從皇太后皇后妃嬪出入以乾清門侍衞四人曁侍衞十人前導如出郊外前引侍衞二十人其餘侍衞在豹尾班後扈從一祭祀扈從太和殿躬閲祝版香帛後扈大臣二人從前引侍衞二人由乾清門後左門引至太和殿後止豹尾班侍衞隨入殿於寳座後立中和殿躬閲祝版前引侍衞由乾清門引入保和殿至中和殿後止豹尾班隨入殿立如前閲畢引由中和殿東階降入後左門還宮凡前引侍衞出入皆由左右門升降皆自東西階躬祀壇廟日除内外直班内大臣散秩大臣曁後扈前引大臣豹尾班侍衞有執事侍衞外内大臣散秩大臣侍衞皆齋戒隨駕出至祭所各入班陪祀凡内大臣侍衞均於紫禁城内齋宿以領侍衞内大臣侍衞班領什長稽察祀日上受福酒福胙用侍衞恭接豫由領侍衞内大臣簡選一二等侍衞引見三旗簡用六人每祀以二人執事奉先殿奠帛獻爵宗室侍衞六十人由領侍衞内大臣列名奏簡前期據掌儀司來文如數發往駕詣壇廟及詣齋宮齋宿均於前期咨取宗人府王公二人前􅄡䕶軍統領一人科道二人各部司官四人同散秩大臣一人侍衞班領一人署侍衞班領一人侍衞什長二人在豹尾班後列隊管轄前期一日繕名籤具奏又於午門壇廟堂子門外前引後扈大臣曁御前大臣侍衞上馬下馬處分委親軍校親軍馭馬駕出陳設鹵簿前引侍衞二人自午門外乘馬御輦前後執鐙侍衞四人輦前執提鑪侍衞二人皆步從輦後豹尾班執槍侍衞十人佩儀刀侍衞十人佩弓矢侍衞二十人選身體魁梧四品以上者以領侍衞内大臣一人侍衞班領二人領之黄龍大纛以領侍衞内大臣一人或用内大臣散秩大臣一人侍衞什長二人領之南北郊壇前引侍衞二人自乾清門前引至午門外止前引大臣十人於太和門北階下立豹尾班侍衞於乾清門階下立候駕至前引大臣按翼前導後扈大臣按翼隨行自午門外乗馬至壇門下馬及壇豹尾班侍衞於壇内壝門外兩翼序立前引大臣圜丘於三成階上方澤於二成階下按翼北上東西面侍立後扈大臣隨升壇於駕後僉立祈穀於祈年殿前引大臣由左階升駕入殿門按翼於中門外北上東西面侍立後扈大臣隨入於駕後兩旁僉立豹尾班侍衞隨入至三成階下左右僉立餘儀與前同饗太廟前引扈從等儀與祈年殿同恭遇親告於中殿前引大臣由殿東導引升中殿東階至階上竢駕入左門按翼於中門外北上東西面侍立豹尾班侍衞入㦸門左翼由前殿東隨行右翼由前殿西各行至中殿東西階下序立如前禮成由前殿西行至㦸門隨出躬祭奉先殿前引大臣十人於景運門内立駕至前引大臣十人引由誠肅門奉先門左門入餘與饗太廟同後殿上香行禮前引大臣十人由東夾道引進至後殿候駕入殿門按翼於中門外穿堂内北上東西面侍立豹尾班止立於夾道門外躬祭社稷壇前引大臣十人於駕後北上東西面侍立後扈大臣二人在後僉立上陞壇上香後扈大臣隨升餘如前儀親祀日月壇前引後扈儀與北郊同展拜堂子前引大臣十人由太和門前導至堂子街門引進内門中門由甬道引至丹陛止候駕過皆於甬道北南嚮立隨行禮畢左翼五人趨過甬道仍由内門中門引出如遇拜纛引出内門嚮南引至纛前退立駕後南上東西面侍立禮成引出親告傳心殿前引後扈如常儀入景行門至傳心殿門外駕入殿後扈大臣隨入前引大臣止於殿門外豹尾班止於景行門外階下均左右序立躬祭陵寢饗殿前引大臣十人由幄次導引後扈大臣二人從由隆恩門左門入升隆恩殿左階駕入殿門後扈大臣隨入前引大臣於中門外豹尾班於階下均分左右北上東西面序立禮成如駕詣明樓前前引大臣引由東階降自殿東至陵寢門外止立後扈大臣隨入豹尾班由殿東西行立於陵寢門外左右階下躬謁山陵惟後扈大臣扈從如常儀孝賢皇后陵寢豹尾班分翼立於大門外左右階下内大臣侍衞皆不隨入於門外隨班行禮一巡幸扈從車駕時巡田獵御前大臣侍衞乾清門侍衞皆從六班輪直侍衞或一班或兩班隨往乘輿出入以直班侍衞二人前導與在京同如奉皇太后慈輿行幸則三班隨往日以侍衞二十人前導二十人左右翊衞均屬櫜鞬豹尾班侍衞二十人後衞以領侍衞内大臣一人侍衞班領二人領之黄龍大纛前以領侍衞内大臣或内大臣一人散秩大臣一人侍衞什長二人領之御前擎蓋以乾清門侍衞更番執事皇太后輿前以侍衞前導翊衞後從均如前儀皇子遣祭陵寢或奉差遣圍獵奏簡領侍衞内大臣一人散秩大臣二人率侍衞隨從䕶衞一常朝坐班三旗領侍衞内大臣侍衞隨侍衞班親軍均分兩翼鑲黄旗為左翼正黄旗為右翼正白旗半為左翼半為右翼每日黎明除内外班直宿内大臣侍衞外内大臣侍衞等均㑹集於太和門門左右次各設榻二重東西嚮㪚秩大臣以上得與坐本班侍衞按次坐於兩稍間負壁北上東西嚮鑲黄正黄二旗侍衞在東西三四間一等侍衞齊前楹為第一班二等三等藍翎侍衞為二三四班東西上正白旗侍衞在東西次間各二行北上均北面序坐三旗前鋒䕶軍叅領列坐於左右門之外各東西嚮王公入朝領侍衞内大臣以下咸降榻坐於一等侍衞之前直班侍衞什長令侍衞知㑹尚茶由内頒茶左右各二筩至門下兩翼侍衞什長各二人起立視侍衞等分授王公内大臣及前鋒䕶軍叅領一二等侍衞茶宗室侍衞漢侍衞不散茶新授侍衞隨學習侍衞班領什長教之茶畢以次退凡遇齋戒日素服日不頒茶萬壽聖節元日前後凡七日元宵節前後凡三日朝晡二次上朝亦如之一朝㑹坐次順治年間定皇帝升殿受朝羣臣行禮畢賜王公大臣坐後扈大臣二人於御座旁左右僉坐前引大臣十人於寳座前東西面坐領侍衞内大臣内大臣散秩大臣於入八分公後第三行上三旗䕶軍前鋒統領侍衞各按品級於四五六行以次序坐又定元日元宵節賜大臣燕領侍衞内大臣内大臣散秩大臣兼武職之文大臣都統前鋒統領䕶軍統領曁各省來京陛見之將軍都統總管城守尉均按班次序坐又定每歳終將應入坐次之一品大臣及前鋒䕶軍統領外省來京將軍等職名開列進呈恭候欽定又定大燕日開列王公大臣奏請欽命一人進酒乾隆二年奉旨大學士著入殿坐領侍衞内大臣之上八年奉旨嗣後御殿日殿内秖令大臣等坐侍衞等皆令侍立不必坐十五年奉旨嗣後大學士坐次仍著在領侍衞内大臣之上協辦大學士事務尚書著在領侍衞内大臣之下署領侍衞内大臣之上一升除領侍衞内大臣員闕除奉特旨補授外將滿洲都統内大臣散秩大臣及各省滿洲將軍職名開列具奏恭候欽簡内大臣員闕將散秩大臣都統前鋒䕶軍統領各省滿洲將軍職名開列亦如之散秩大臣無定額多由特恩補授或一時不敷差委於入八分不入八分公民公侯伯子男鎮國輔國將軍及一等侍衞内簡選引見或授散秩大臣或委署散秩大臣均恭候欽定世襲散秩大臣員闕移咨該旗辦理康熙七年奉旨額英吉徳立額駙巴克貝勒此二人自各䝉古未歸之前來歸故改入滿洲旗勿令散秩大臣間斷三十七年將額英吉徳立額駙巴克貝勒兩族人員引見奉旨著曉諭巴克貝勒族人等伊族之圖胡祿克見任散秩大臣竢圖胡祿克年老休致後仍將伊族人員引見勿致斷門上大臣欽此五十六年諭朕近日簡閲實錄見武功郡王事蹟深為嘉嘆今日問諸吉理其孫内無一榮顯大員吉理著授為散秩大臣嗣後散秩大臣必令其孫一人接替朕所降諭旨專為不忘武功郡王配享太廟附葬興京陵寢特表識之欽此六十一年奉旨達爾漢轄於太祖髙皇帝時以子撫育宮中與王等一同行走閲實錄内載於五大臣之中著有勞蹟非可以遺棄之家其孫希佛官階已大著授為散秩大臣令在門上行走又思正紅旗公彭春之祖和和里額駙當太祖皇帝時原在五大臣内正藍旗鄂善之祖達爾漢額駙亦在五大臣之内乃我家當年同一處之人伊等之事朕不降旨則致遺棄該旗王等何由得知此兩家雖籍隸五旗著察其子孫内有可授散秩大臣者引見補授散秩大臣在朕門上行走再十六大臣内布爾金侍衞之孫原在部行走曽在景山馬射傷足即見任鑲紅旗嚮導䕶軍叅領額里格之父年不甚老亦著引見雍正十年奉旨阿齊圖緣罪革職從前皇考恩旨令額英吉徳立額駙巴克貝勒族中不斷一散秩大臣見今阿齊圖族中奏事侍衞寳徳人去得著授為散秩大臣二等侍衞安褚庫人亦去得見在巴里坤軍營亦授為散秩大臣鑾儀衞掌衞事内大臣員闕將領侍衞内大臣内大臣列名疏請補授隨印協理事務侍衞班領員闕於侍衞班領署班領什長内不論等級遴選引見補授侍衞班領員闕於署班領什長内遴選署班領什長員闕於侍衞内遴選亦如之初選侍衞皆授為三等及藍翎侍衞歳以冬月推升一等侍衞員闕於該旗二等侍衞内二等侍衞員闕於三等侍衞内三等侍衞員闕於藍翎侍衞及五品以上世爵親軍前鋒䕶軍諸校内藍翎侍衞員闕於該旗侍衞筆帖式及七品官世族子弟並親軍前鋒䕶軍執事人内均引見補授至勲戚後裔内有特旨初選卽授為一二等侍衞者卽坐補本旗員闕宗室侍衞㑹宗人府王公引見補授不論鎮國輔國奉國奉恩將軍先選三等侍衞遇員闕以次升補亦如之上駟院侍衞每旗七人司轡司鞍侍衞無定員隸上駟院其兼尚虞鷹鷂房鶻房狗房十五善射善騎射善射鵠善強弓善撲等侍衞各有專管統在三旗額内均無定員上三旗及附入於上三旗之下五旗親軍校員闕由領侍衞内大臣遴選引見補授親軍闕於本佐領下䕶軍驍騎及教養兵閒散壯丁内選補隨侍衞班行走之親軍由本旗親軍内遴選弓馬人材及世胄子弟拔補均由隨印協理事務侍衞班領遴選呈本旗領侍衞内大臣補授順治年間以漢廕生簡選侍衞量給等次康熙二十九年議準新中武進士内人材强健弓馬優長者拔置侍衞附於三旗一例置宿扈從三十七年奉旨以宗室中人優而善射者選取侍衞無定額雍正五年奉旨一甲一名武進士授為一等侍衞二名三名授為二等侍衞二甲簡選十人授為三等侍衞三甲簡選十六人授為藍翎侍衞永為定例七年議準宗室侍衞共設九十人并入三旗隨班行走此内一等侍衞九人二等侍衞十有八人餘皆著為三等侍衞宗人府㑹領侍衞内大臣遴選引見補授其侍衞什長卽於宗室侍衞内補授主事員闕於三旗侍衞筆帖式内遴選引見補授移咨吏部注册按俸升補筆帖式員闕於貼寫筆帖式内按資開列咨吏部考職補用三年期滿如題留者候補本處主事移咨吏部者由部調選貼寫筆帖式員闕主事於親軍内考試拔其尤者呈領侍衞内大臣覆驗補用一統領親軍三旗每佐領親軍二名鑲黄旗滿洲八十五佐領䝉古二十八佐領共親軍二百二十四名内親軍校十有五人五旗移入六十五佐領親軍一百三十名内親軍校十人正黄旗滿洲九十三佐領䝉古二十四佐領共親軍二百三十四名内親軍校十有五人五旗移入六十七佐領一半佐領親軍一百三十五名内親軍校十有一人正白旗滿洲八十六佐領䝉古二十九佐領共親軍二百三十名内親軍校十有五人五旗移入五十八佐領一半佐領親軍一百十有七名内親軍校九人三旗親軍每旗選六十人隨侍衞班行走其餘親軍校親軍盡隨三旗䕶軍營䕶軍校䕶軍一同直宿當差一考察甄别侍衞例不入軍政其有人材不及行走怠惰及年老有疾者該侍衞班領什長隨時據實呈明領侍衞内大臣覆覈分别去留具奏請旨恭候欽定京察之年考覈領侍衞府主事筆帖式賢否出具考語塡造四柱清册移送吏部都察院吏科京畿道考察一習射鑲黄旗每月於初二十六日騎射初六十一二十一二十六日步射正黄旗於每月初三十七日騎射初七十二二十二二十七日步射正白旗於每月初四十八日騎射初八十三二十三二十八日步射雍正三年奏準三旗親軍令侍衞班領及親軍校管束察其騎射行走該旗差務仍照常例行一服飾後扈前引大臣一二等侍衞升級新補者歳於十二月行文内務府支領緣貂朝衣端罩豹尾班侍衞支領蟒袍恭遇巡狩支領黄馬褂内大臣侍衞入朝均挂數珠除御前侍衞乾清門上駟院侍衞及各執事侍衞外咸佩刀直宿曁巡狩駐蹕宿御營内大臣以下咸佩刀凡大閲領侍衞内大臣至親軍咸甲胄侍衞什長親軍校咸負龍旗班領二人率親軍鳴海螺凡遇簡命重臣為將或經畧督師應否頒給黄龍大纛由領侍衞内大臣臨時請旨一兼職領侍衞内大臣補授内閣大學士各部院尚書掌鑾儀衞事八旗都統者兼攝辦理出為將軍總督者其領侍衞内大臣事務欽簡署理内大臣散秩大臣亦如之一養廉領侍衞内大臣每人歳給銀九百兩内大臣散秩大臣四百兩均於春秋二季咨户部支領領侍衞内大臣兼閣部者並支内大臣散秩大臣兼侍郎副都統者不并給兼將軍總督巡撫者不給御前侍衞乾清門侍衞及批本處筆帖式每年賞銀萬兩於户部支領按人數均分一優䘏雍正七年定三旗各領銀二萬兩生息以資公用由各旗協理事務侍衞班領辦理乾隆十四年奏準此項銀交各該旗辦理所得之息交内務府廣儲司收貯用時陸續於廣儲司支領仍令協理事務侍衞班領收管三旗内班侍衞每旗各日給飯銀二兩外班侍衞人各給飯銀五錢貼班侍衞每人給飯銀亦如之入侍衞班之親軍在圓明園直班每班各給飯銀二錢五分在外直班之親軍校親軍每人各給飯銀一錢五分均於公用銀内動用凡侍衞月給馬乾制錢三貫咨各該旗轉行戸部支領領侍衞府主事筆帖式於圓明園直班每人領飯銀五錢在京十十一十二此三月每旗領飯銀八兩餘月五兩侍衞奉差無論逺近給以幫貼銀十兩亦於公用銀内動用凡公用銀每於年終逐款開明送廣儲司奏銷欽定大清㑹典則例卷一百七十
