body:
  text: 户部户口上一編八旗壯丁國初定各旗人丁三年編審一次又定每壯丁三百名編為一佐領又定每佐領編壯丁二百名又定新滿洲壯丁酌量攙入舊壯丁内編成佐領康熙四年題準滿洲蒙古佐領内有餘丁多至百名以上願分為兩佐領者聴十三年覆準八旗每佐領編壯丁一百三四十名將餘丁彚集别編佐領或餘丁僅百名以上不及定額者該旗都統副都統佐領酌量無誤充伍當差出結移送到部亦準編為佐領二十三年諭八旗滿洲蒙古每旗均設佐領百貟欽此又諭編審八旗佐領事宜令户兵二部㑹同具題欽此雍正四年諭上三旗定設漢軍四十佐領下五旗定設漢軍三十佐領欽此又覆準八旗壯丁屆三年編審之期由部請㫖行文八旗都統盛京及直省駐防滿洲蒙古漢軍將軍都統副都統各交與該佐領驍騎校領催等將新舊壯丁逐户審明編造清冊並將編審之各佐領驍騎校領催姓名保結開寫送部其未成丁及非正身良家子弟並應開除人丁各該旗都統驗實開除將開除緣由注明送部其滿洲蒙古及漢軍户下額丁皆令開清花名附載冊内覈明送部至捕牲烏喇捕牲人丁由部委出旗貟筆帖式前往編審若將未成丁及非正身之子弟假冐入冊或將應入冊及不應開除之壯丁隠匿開除在京將各該旗都統在外將各該將軍都統副都統以至領催悉行治罪五年覆準八旗人丁三年編審一次凡已成丁者皆入冊病故者開除各佐領造户口清冊二夲一咨部一存夲旗其户口冊内開寫一户正身某人有官職者開明某官某人無官者開寫閒散某人上書父兄官職名氏旁書子弟及兄弟之子並户下若干人其各省駐防旗貟以及外任文武各官子弟家屬皆行文各該將軍督撫察審照此造具清冊咨送竢各處冊籍到齊之日各該旗附入佐領冊内鈐印報部存案七年覆準八旗正身壯丁每逢編審之年無論在京在屯嵗滿十五該管官貟細加察驗務無假冐方準入冊應裁者亦必詳察聲明緣由注冊送部至八旗漢軍勲舊佐領下若無正身可選驍騎兵丁之人即在户下拔用嵗滿十五亦令該管官貟逐名編審注冊以備拔補乾隆四年覆準凡遇比丁之年將駐防人貟及外任旗貟户口均照右衞等各駐防造送丁冊之例每旗各造丁冊二分鈐印送部一分留部存案一分咨旗辦理六年覆準八旗丁冊三年編審一次各該旗察明佐領下凡已成丁及未成丁已食餉之人皆造入丁冊分别正身開户户下於各名下開寫三代履厯其户下人之祖父或繫契買或繫盛京帯来或繋帯地投充或繋乾隆元年以前白契所買均於夲名下注明正户子弟均作正身分造其從前造入丁冊之人有逃亡賣出者編審之年聲明裁除造冊二分鈐蓋都統印信一送部一存該旗至外省駐防及旗人外任文武各官子弟家口遇比丁之年由部先期行文該管大貟稽察照在京旗人之例造冊二夲鈐印咨部一存部一發該旗各該旗按冊覆覈附入夲旗佐領丁冊内鈐印送部如將應入冊之壯丁隠瞞不行造入或將未成丁幼童編入丁冊者覈叅交部議處一旗貟壯丁著績分户國初定首先登城壯丁準其開户並將胞兄弟適伯叔帯出仍償原主身價順治九年議準内府三旗佐領内管領下官貟有軍功勞績奉特㫖令其開出内府佐領内管領者各歸上三旗旗下佐領五旗王公府屬即包衣有滿洲佐領有旗鼓佐領管領即辛者庫原與旗下佐領有間旗鼓佐領下人尤不得濫厠漢軍之列但繋盛京帯来自内府分出已經編入冊籍者均準其與旗人一例考試選官其於夲王公府屬會經効力夲王公準其開出管領下者止許移於府屬佐領惟著有軍功勞績或奉特㫖或由王公奏準令其開出府屬佐領者各歸夲王公所屬旗下佐領或歸上三旗旗下佐領其父兄子弟閒散者準其帯出見有職任者不準帯出乾隆七年諭聞五旗王公宗室等府屬佐領下人丁内多有不得錢糧該王公等不能養贍者伊等繋由盛京随從進京舊人之子孫世代効力因王公等原分藍甲錢糧限於定額不能徧養以致資生無業甚屬可憫從皇考曽將上三旗内府佐領下人等附於漢軍旗下選取驍騎今八旗滿洲蒙古佐領下自恩賜増設䕶軍驍騎教養兵額之後正户閒散皆得錢糧間有人丁稀少之佐領遇驍騎等闕不得應選之正户閒散以致選取户下者有之見有此等空闕若由不得錢糧之府屬佐領下人内選取則伊等既得錢糧以資養贍家口而旗下佐領亦獲好兵之用著交與該王公等察明各府屬佐領下有不能養贍之正身滿洲蒙古舊人子孫開寫姓名咨送該滿洲蒙古都統等於人丁稀少之佐領下遇有驍騎等闕以備選取其選取驍騎等之後不準離夲佐領惟單身在旗下當差行走如該王公等有題補䕶衞典儀及調補别項差使各聴其便欽此又定王公之子孫閒散宗室亦有分予佐領者此等人原繫正身如不能養贍遵㫖交夲旗都統備補驍騎或交進上三旗内府存於公中不得鬻與旗下官貟以良為賤至王公宗室自買旗下家奴原繋户下亦不得竄入正户冊内以賤為良又定籍没人丁凡繋旗人户下者均令旗人領買不得作為正户及聴其贖身為民一旗貟子弟随任國初定旗貟子弟竢十八嵗登載部冊後方許分居如未及嵗擅分居者議罰順治十七年題準凡旗貟子弟有職任者不拘定限嵗數準其分户雍正十二年題準旗貟子孫随任在外者各省駐防及河工効力旗貟子弟至十八嵗以上皆令歸旗當差肄業若有無故逗遛隠漏丁口者照例治罪乾隆七年諭向来旗貟子弟自幼随任在外至十八嵗者例應来京若有欲留任所協辦家務者準督撫代為題請聽候部議其新授外任旗貟子弟在京長養過十八嵗以上者非奉特㫖不得随任此舊例也朕思旗貟子弟不許擅随任所者一則􅂲在地方滋事一則留京以備該旗當差如外任旗貟能嚴加約束為督撫者又不時稽察則皆知守分循理可無慮其多事至該旗佐領若夲有可以當差之人而父兄外任者將子弟帯往則夲人既可省兩處食用該佐領閒散之人又得當差支領錢糧以資養贍洵為兩便之道嗣後外任旗貟子弟十八嵗以上者在外任令該督撫題請在内著呈該都統具奏準其随任其不願随任者亦聽之若随任之後或出署交遊及干預地方之事著督撫即行糾叅從重議處欽此又諭下五旗王公屬下人貟升授外任欲將子弟帯往任所者如繫見在王公門上當差之人該旗稟問王公如無用處奏明令其随任如有用處即停其前往欽此又奏準外任旗貟子弟至十八嵗以上有情願留在任所者照例申報上官該督撫咨報部旗存案嵗終由部將人數彚奏在内旗貟升授外任願將子弟帯往任所者呈報該旗都統具奏準其随任一壯丁别寓雍正十三年議準八旗正身壯丁或寓親友或流落鄉屯向未入冊者補入夲旗丁冊内勒限六月首報其從前􅅗住盛京多年者即入於盛京冊内約束當差若不呈報該旗􅅗匿私往别處者照逃人例治罪該管叅領佐領並不行地方官察究者照例議處若從前並未居住盛京􅅗匿他省者勒令一年内自首押令歸旗免其治罪一給印票執照雍正十三年定凡八旗在京官貟兵丁閒散另住户下人等均令該佐領給與印票開明各年貌家口以備街道歩軍尉察驗其在鄉屯之候選及革職官貟閒散另住户下人等每户給與執照開明年貌住址生業以備地方官察驗各佐領所給印票先送該叅領挂號押用鈐縫關防每於嵗底封印後呈送都統存貯備考一分晰户丁順治八年定原在盛京編審正户人有告稱是伊奴僕者不準歸幷繋户籍内人有告稱非伊家奴僕者亦不準出户雍正二年覆準八旗開户義子人等不得越佐領認户仍留在夲佐領下當差如有越佐領認户自稱正身與原主無渉者該旗都統即拏交該部從重治罪三年議準旗下奴僕或藉别旗名色買贖或自行贖身旗民冊籍均無姓氏者察出即令歸旗其有随主出差外任私有蓄積鑽營勢力欺壓夲主贖身者自康熙五十二年恩詔以後雖在民籍究明欺壓是實亦令歸旗若果繫數軰出力之人夲主念其勤勞情願聽其贖身為民旗部有案可稽州縣有籍可據為民者仍歸民籍舊主子孫不得藉端控告乾隆三年議準盛京帯来奴僕原屬滿洲䝉古直省夲無籍貫帯地投充人等雖有籍貫年逺難以稽考均準開户不準放出為民乾隆元年以前白契所買作為印契之人令在夲主佐領下聴選歩軍當差竢三軰後著有勞績夲主情願放出為民者呈旗咨部覈明冊籍有伊祖父姓名籍貫者準其為民仍行文該管地方官注冊止許耕作謀生不準考試四年議準國初俘獲之人年分已逺與投充之人迷失籍貫者無别至逺年印契所買奴僕之中有盛京帯来帯地投充之人原繋旗人轉相售賣雖有籍貫亦無從稽考均應開户不準為民如内有實繋民人印契賣與旗人契内尚有籍貫可稽者照乾隆元年以前白契所買家人之例効力過三軰後準其為民又議準乾隆元年以後白契所買之人因未入丁冊是以準其交價贖身與乾隆元年以前白契所買作為印契者不同應準其贖身為民又議準八旗户下家人開户向由各該旗聲明夲主念其世代出力情願準其開户者該叅佐領族長族人列名具保咨部無論何項人等覈明上次丁冊有名並冊内注繫陳人者即準開户至旗下家奴放出為民向由夲主念其數軰出力勤勞年久情願放出為民呈報夲旗咨部轉行地方官収入民籍為民今既將盛京帯来奴僕及帯地投充人等並乾隆元年以前乾隆元年以後白契所買之人分别定例應行各旗將奴僕之祖父籍貫令各主據實開報畫押叅佐領詳察呈報都統送部凡遇比丁之年即照此次造冊於編審内注明遇有開户為民之案以便稽考又議準乾隆元年以前八旗奴僕放出為民有未經呈報旗部者該旗察明果繫數軰出力其主情願放出編入民籍地方官有冊可據者準其為民其乾隆元年以前放出為民未入民籍以及元年以後始入民籍者應令歸旗作為原主户下開户壯丁至於設法贖身之户或繫自備身價或親戚代為贖身均應歸原主佐領下作為開户若有實繋買主用價契買後又向買主交價贖身者應歸買主佐領下作為開户如繋開户壯丁用價買出者買主原非正身其名下不便復有開户之人應仍歸原主佐領下作為開户又議準旗下家奴將民人之子抱養既經繼與家人為嗣即與家人無異應造入伊主户下以便稽察又議準八旗正户從前撫養並随母改適人等或跟随外任或在鄉居住未及呈報因未造入丁冊或因丁冊無名不準自首者總屬户口不清之人未便任其脱漏令各旗察明分晰彚奏咨部别載冊籍如有正户人之妻因夫亡改嫁與正户及嫁與户下家人者其前夫所生之子原繋正身應準其随母改適竢撫養成丁仍歸夲宗其子母情願依倚者準其依倚仍造入生父夲宗丁冊若民間子弟自幼随母改嫁與正户旗人者照户口不清例别載冊籍至户下家人之子随母嫁與正户以及民間之子随母改嫁與户下家人者統以户下造報以後遇有随母改嫁人等叅佐領確察報明都統存案仍於編審之年注明丁冊咨部察覈又議準從前正户旗人之子自幼給與旗民正身及户下家人撫養呈請歸宗者該旗覈實取具兩姓族長族人保結並該叅佐領印結送部存案準其歸宗又議準八旗造報丁冊内有向開正户一户後經造為開户人等或繫随母改適或寄入親屬户内原繋别立一户迨後被人欺壓造入户下作為開户原非户下家人可比準其呈旗察明果有被人欺壓情弊分晰具奏咨部更正至從前造入户下後經造為開户並向來造為開户人等若果繫正身當時即應呈明更正何至數十年之後以待子孫分别此等停其更正以杜冒濫又議準八旗絶户家奴如夲主有同族人等即編入族人户下無族人可歸無論家下陳人契買奴僕均準於夲佐領下開户看守主墓年力壯者於夲佐領下選充歩軍内有乾隆元年以後白契所買之人準其贖身身價照絶户財産入官例辦理十二年奏準旗人家奴有借名設法贖身私入民籍者除已經議結外以後或被首告或經察出其曽報部旗伊主得過身價者令歸旗入於原主名下作為開户不準歸夲佐領下其未經報部報旗者無論伊主曽否得受身價均令歸旗仍作為原主户下家奴不準歸入佐領作為開户二十一年諭八旗别載冊籍之人原繋開户家奴冒入正户後經自行首明及旗人抱養民人為子者至開户家奴則均繫旗下世僕因効力年久其主願令其出户見在各旗及外省駐防内似此者頗多凡遇差使必先盡正户正身選用之後方準將伊等選補欲自行謀生則又以身隸旗籍不能自由見今八旗户口日繁與其拘于成例􅃱生計日益艱窘不若聽從其便俾得各自為謀著加恩將見今在京八旗在外駐防内别載冊籍以及養子開户人等皆準其出旗為民其情願入籍何處各聽其便所有本身田産並許其帯往此番辦理之後隔數年候朕酌量降㫖此内不食錢糧者即令出旗其食錢糧之人若一時遽行出旗其生計不免拮据應如何定以年限裁汰出旗之處交與該部㑹同八旗都統等詳悉定議具奏欽此遵㫖議準一别載冊籍養子開户人等凡在京署任各貟不準實授文武官貟停其升轉旗貟竢貟闕裁汰其外任綠營貟弁及文職等官應即令出旗為民所借宗人府並各旗滋生以及應扣各項銀仍在伊等名下坐扣完結倘有病故緣革者所借各項均準寛免至見在捐納候選並閒散進士舉人生貟繙譯進士舉人生貟等亦即準其為民一别載冊籍並養子開户人等令各該旗詢明情願入籍何處由該旗徑咨該地方官收入民籍仍造冊咨部存案至見在食錢糧人等有願退糧為民者亦一例辦理其餘見在當差人等停其調選竢有闕裁汰遇有婚喪事不準支給恩賞銀一見在當差人丁内情願退糧為民並革退兵丁未完庫銀以及代扣庫銀亦一例豁免一别載冊籍人等有具呈告退見食半俸餉整俸餉及陣亡人等之父母妻室賞給半俸餉者仍準其支食病故裁汰外省駐防官兵閒散内别載冊籍養子開户人等亦照此辦理仍令各該將軍等就近詢明願入何省民籍造冊咨送旗存貯一别載冊籍人等典買地並老圏地見令準其管業如有典賣者照乾隆七年之例令其典賣與旗人永不準典賣與漢人至見在官兵内有認買官地官房未經扣完如願交見銀準其交納如無見銀交納將房地交回户部扣過俸餉將租息扣除餘剰銀準其給還一漢軍改歸民籍及外省住居乾隆七年諭八旗漢軍自從龍定鼎以来國家休養生息户口日繁其出仕當差者原有俸餉足資養贍苐閒散人多生計未免窘迫又因限於成例外任人貟既不能置産另居而閒散之人外任即有親友可依及手藝工作可以别去營生者皆為定例所拘不得前往以致袖手坐食困守一隅深堪軫念朕思漢軍其初夲繋漢人有從龍入關者有定鼎後投誠入旗者亦有緣罪入旗與夫三藩户下歸入内務府王公府屬撥出者以及招募之礮手過繼之異姓並随母因親等類先後歸旗情節不一其中惟從龍人貟子孫皆繋舊有功勲閲世既久自無庸另議更張其餘各項人等或有廬墓産業在籍者或有族黨婣屬在他省者朕意欲稍為變通以廣其謀生之路如有願改入原籍者準其與該處民人一例編入保甲有不願改入原籍而外省可以居住者不拘道路逺近準其前往入籍居住其有原籍並無依賴外省亦難寄居不願出旗仍舊當差者聴之所有願改歸民籍與願移居外省者限一年内具呈夲管官覈奏如此屏當原為漢軍人等生齒日繁籌久逺安全之計出自特恩後不為例此朕格外施仁原情體䘏之意並非逐令出旗為民亦非國家糧餉有所不給可令八旗漢軍都統等詳細曉諭仍詢問伊等有無情願之處具摺奏聞欽此八年諭朕前因八旗漢軍户口日繁生計未免窘迫又限於成例不能出外營生特降諭㫖除從龍人貟子孫無庸更張外其餘各項入旗人等有願改歸民籍與願移居外省者準其具呈夲管官覈奏原指未經出仕及微末之貟而言至於服官既久世受國恩之人其夲身及子弟自不應呈請改籍而朕亦不忍令其出旗此後文職自同知等官以上武職自守備等官以上不必改歸民籍欽此十二年諭朕因八旗漢軍人等生聚日繁家計未裕於乾隆七年特頒諭㫖自從龍人貟子孫外願改歸民籍移居外省者準其具呈夲管官具奏旋據漢軍都統等分晰辦理允行在案朕觀漢軍人等或祖父曽經外任置立房産或有親族在外依倚資生及以手藝􅅗往直隸各省居住者頗自不少而按之功令究屬違例伊等潛居於外於心亦自不安朕思與其違例􅅗居孰若聴從其便亦可各自謀生嗣後八旗漢軍人等願在外省居住者在京報明該旗在外呈明督撫不拘逺近任其随便散處該督撫咨明該旗每年彚奏一次以便稽察務令安静營生無得強横滋事如此則於功令不相妨礙伊等亦得安居樂業生計有資矣欽此遵㫖議準漢軍情願在外省居住者在京報明該旗咨部部咨各省其在外呈明督撫者亦一面咨明該旗一面咨部仍於每年底各省造冊送部彚總奏聞一旗人撫養嗣子國初定無嗣人撫養他人之子許報明夲主貝勒該旗都統送部注冊増入夲佐領壯丁數内若私自撫養者斷回本宗順治十八年題準凡無嗣人存日撫養兄弟族人之子準承受家産其撫養他人及奴僕之子不準承受若存日未曽立嗣身故後準近房承受若夲族無人存日保結撫養異姓之子亦準承受若無族人又無撫養異姓人照絶户家産例辦理康熙七年覆準凡撫養他人子為嗣殁後其子夲生父母年老乏嗣仍令歸宗又題準凡無嗣人家産繫兄弟之子承受有親生女者給家産三分之一若疎族人承受其女給家産五分之二若撫養異姓之子承受及應歸佐領撥給者其女均給家産之半如數少難分及有分撥餘剰者均給承受之人凡分給女子無論人數止於應給分内分撥雍正十二年議準無嗣人請繼立異姓親屬為嗣者務令該旗取兩姓情願甘結並各該管叅佐領及族長保結送部存案以杜占奪財産之端如無兩姓甘結不準其所遺絶户家産照例辦理乾隆四年議準八旗無嗣人如有同宗及逺近族人昭穆相當可繼為嗣者由該旗叅佐領呈報都統咨部準其承繼不得過繼異姓以亂宗支如無同宗及逺近族人昭穆相當可繼為嗣者除户下家奴民間子弟雖與正户旗人分屬至親不準承繼外其有正户親屬情願過繼者取兩姓族長並該叅佐領印結咨部準其承繼倘有同宗可繼揑稱並無族人溷繼異姓者按律治罪一旗人買賣奴僕國初定旗下買賣人口赴各該旗市交易若越至他旗市被執者身價二分入官一分給拏獲之人又定滿洲壯丁越旗賣出被首者身價二分入官一分給首告之人買主無罪該管佐領知情者治罪壯丁徹回撥給夲旗不知情者壯丁徹回撥給夲佐領下貧人又定有將人父子兄弟夫婦分賣者所賣之人均入官順治五年覆準投充人即繫奴僕願賣者聽十年題準八旗買賣人口均令該領催注冊備考民人令親鄰中證立契赴夲管衙門挂號鈐印均免輸税如不注冊無印契者即治以私買私賣之罪十八年覆準旗下赴市買賣人注冊時該翼覈明給印照康熙二年題準八旗買賣人口兩家赴市納税注冊令領催保結列名若繫漢人令五城司坊官驗有該管官印票準買八年題準旗人買民為僕令夲管官用印若隔屬官用印照拏解良民例議處所買之人釋放為民買者賣者各責懲有差又議準有將定例後所買之人揑作定例前年月用印者事發用印官及買者賣者皆加等治罪十五年題準旗下買民令正印官用印準買若在地方犯罪逃出賣身者保人繫民枷三月杖一百繫旗人枷三月鞭一百原價追還給主賣身人逓解夲地方官枷三月杖一百仍照所犯罪依律究治其旗人詭稱民人賣身者枷三月鞭一百保人繋旗人枷三月鞭一百繫民杖一百流徙尚陽堡若繋逃人照常鞭刺又定賣身假揑籍貫姓名不從實開寫者枷兩月鞭一百仍斷與買主保人繋旗人枷一月鞭一百繫民枷一月杖一百十八年題準凡旗人買僕由用印衙門呈部轉行督撫令地方官曉諭里甲如用印官十日内不將買人緣由報部者罰俸一年竟不報者降一級二十二年議準滿洲蒙古家人違禁賣與漢軍漢人者買賣之人繋官罰俸一年繋旗人鞭一百繋民杖一百如佐領内管領驍騎校及收税官知情者罰俸九月領催鞭八十所買之人並價皆入官其喀爾喀厄魯特人亦不許漢軍漢人買用違者繋官降一級調用繋旗人鞭一百繋民杖一百所買之人入官五十二年議準白契所買之人若在買主家長大年久養為義子可以當差者令充歩軍雍正元年覆準白契賣身之人經買主配與妻室者不準贖身若未經賣身之先或已定親未經完娶賣身旗下女家並不知情者必問女家情願方許配合如女家不情願者聽其别嫁三年覆準八旗滿洲䝉古家下開户人等間有懶惰不能度日串通原主賣身他家賣後日久又稱滿洲肆行勒詐者一經發覺將原主一并議罪並將冊籍徹回給後買之人為奴四年覆準吉林有民人願入旗為奴者照京師例報知該地方官給與印文準其買賣乾隆四年題準奉天買賣人口令兩造該管官驗明文契鈐蓋印信關防準其注冊一出差官駐防官兵買僕康熙八年諭差遣官貟並督撫提鎮大小各官不許買良民為奴及轉相餽送永行禁飭違者照畧賣良民例治罪欽此二十一年題準直省駐防各官及提鎮以下等官槩不許買夲省之民違者降二級調用若縱令家人買者照夲官買人例議處該管官失察者降一級留任其駐防兵量許買人令賣身人親至地方官處取具親供存案契内寫情願字様用印鈐蓋若未經取親供文契雖有情願字様實屬勒買者買主枷一月鞭一百若夲官囑兵丁買者照夲官買人例議處如夲主在京家人當兵在外駐防者準買其在外駐防官之家人當兵者不準買二十六年諭駐防滿洲漢軍將軍以下官貟兵丁夲省買人如有不容行詢原籍勒令地方官用印者著該督撫指名題叅嚴加議處欽此一口外買帯漢人順治六年題準漢人不許帯出口外如口外人有来盛京購買馬匹乘機買人口者不準放出八年題準朝鮮貢使隠匿人口帯往者鞭責計日罰銀若夲地人隠匿逃往者正法一捕牲壯丁及黒龍江官兵買僕雍正十二年議準捕牲壯丁人等解送貂皮来京置買旗下奴僕者令管轄前来之總管副管佐領驍騎校領催等並賣主之佐領驍騎校領催等各具保結在於左右兩翼税契其典賣民人者令總管等報明大宛二縣將典賣僕人姓名籍貫注冊若黒龍江官兵来京置買旗下奴僕者取具同来官貟保結呈明夲旗都統注冊照例税契典買民人亦照例報明大宛二縣注冊違者僕人斷回買主照溷買例治罪管轄官叅處若將所買之人三年内得重價轉賣與人者照畧賣人口律治罪該管各官以失察例議處一竈户賣身康熙三十九年題準鹽竈户賣身旗下者事發後將賣身人枷三月杖一百回原籍著役引進保人枷兩月杖一百仍行文該地方官追取身價交還原主如不能償著引進保人代償一禁賣贖叛逆人犯康熙三年題準已撥給山海關外叛逆人犯妻子家僕有私行偷賣及贖去者事發繫官革職繋民杖一百流三千里繫旗人枷兩月鞭一百専管各官降二級調用七年覆準私贖叛逆家屬照例治罪人口身價均入官一投充人口順治元年定凡旗下漢人有父母兄弟妻子情願入旗同居者地方官給文赴部入冊不許帯田地投充二年題準近京地方管莊人等強壓愚民及工匠勒令投充者在内許赴户部五城御史順天府在外赴道府州縣告理審實令歸原籍又題準有假籍投充冒名奴僕溷託厮養或悍奴欺壓故主部民陵厲夲官及慢侮縉紳傾陷富室占騙人口財物者事發治以重罪三年題準自次年為始漢人投充旗下永行禁止七年題準投充人置買民間房地者房地並價銀入官買賣兩造從重治罪八年諭投充人有生事擾民者夲主及該佐領如知情皆連坐前此有司因責懲旗人曽經問罪以致投充人益加横肆嗣後地方官遇投充人有犯與屬民一例究治户部刋示曉諭欽此十七年題準投充人誣稱不繋投充者審出鞭一百如果不繋投充欺壓良民者亦鞭一百又題準有將正户人告稱繫伊奴僕者鞭八十其投充人先未在地方納糧後將房地納糧輙稱不繫投充者審明枷一月鞭一百地方官溷報者以抗違論經承杖八十其民人住種旗人房地年久告稱繫自己房地者杖八十又覆準各莊屯均設領催責成稽察如旗人有指稱投充欺詐百姓者解部究審若屬假冒地方官依律究擬康熙二年覆準凡投充人父兄伯叔住居旗人房屋及種旗地其子弟㸔守故土墳塋或子弟住居旗人房屋及種旗地其父兄伯叔㸔守故土墳塋者行地方官察其輸糧在先冊内載名者即斷歸民如投充後輸糧者仍斷與旗人八年諭投充人生事害民者夲主及該管佐領連坐夲犯正法妻孥家産入官罪不至死者夲犯及妻孥入官嗣後地方有司遇投充人犯罪與屬民一例責治欽此十五年題準嗣後有以投充旗下之人稱為納糧之民者地方官降一級調用轉申之上司罰俸一年巡撫罰俸六月先稱不繋投充後報投充者地方官罰俸一年該管上司罰俸六月巡撫罰俸三月雍正三年議準投充之人私自為民後經發覺將同族之人誣攀為同祖或夲主因家奴之同族稍有産業誣告為投充之子孫者審明將誣攀誣告之人從重治罪一出征俘獲人口順治五年覆準俘獲人口有將其父子兄弟夫婦分賣者仍令給還完聚賣主鞭責九年題準陣獲人口準其贖回凡有贖人者令適親家屬領歸其身價兩家各取其半康熙三十年議準出征所獲之人有親戚情願来旗完聚者不得作為奴僕有願回夲籍者聽欽定大清㑹典則例卷三十二
