稍成片段在三畝以上者照旱田例十年之後以下則升科砂石磽确不成片段刀耕火耨更易無定瘠薄地土雖成片段不能引水灌溉者均永免升科其水濱河尾田土淹涸不常與成熟舊田相連人力可以種植在二畝以上者亦照水田例六年之後以下則起科如不成片段竒零地土以及雖成片段地處底窪淹涸不常不能定其収成者止給照存案永免升科貴州所屬凡山頭地角竒零地土可以開墾者悉聽民夷墾種免其升科山石攙雜工多獲少依山傍嶺雖成丘叚而工淺力薄者亦聽民夷墾種永免升科如有水源可引力能墾耕者一畝以上照水田例以六年升科不及一畝者亦免升科至無水可引地稍平衍可墾為旱田者二畝以上亦照旱田例以十年升科不及二畝者亦免升科十一年諭廣東髙雷亷等府屬勘出可墾荒地大抵山岡磽􅇤者居多開墾原非易易小民未霑収穫之益先慮升科之累是以未墾者聽其荒蕪即已經承墾者亦生畏縮之意朕思各省生齒日繁地不加廣貧民資生無䇿今髙雷亷三府荒地既與平埔沃壤不同即聽該地民人墾種一概免其升科欽此一各學田租順治元年定直省各學貧生聽地方官覈實申報提學於所在學田内動支銀米酌給十四年題凖直省學田不許豪強隠占令各督撫將州縣額徴田租逐一清釐又覆凖學租歸學政衙門為修學及贍給貧生之用江蘇安徽學租該學政三年自行報銷餘省均由布政使司毎嵗造冊奏銷一屯田國初差御史廵視後裁廵屯御史歸廵按兼管㝷裁廵按令各省廵撫布政使司管理毎嵗造冊報銷順治七年題凖衛所屯田分給軍丁承種其科徴較民地稍輕今既裁汰歸并州縣凡有運糧之衛所屯田仍舊徴収其無運糧之衛所屯田均照坐落州縣民田例起徴九年覆凖運軍已經改民其軍衛田地照民地例輸納各按坐落地方使有歸著以杜溷淆又覆凖廣東屯糧全徴本色屯丁苦累令本折各半徴収十年覆凖江南秣陵廣武英武三衛路隔長江輸糧不便照例折銀徴觧十三年覆凖屯衛錢糧考成照依州縣正項錢糧定例十四年覆凖軍民冊籍不分賦役易於紊亂嗣後民冊當差者衛所不得告攀軍冊有役者州縣不得重派民佃軍田者照地納租毋得再派軍役軍佃民田者止完正賦毋得派及民役十五年覆凖四川利州等衛皆繋軍籍未徴丁徭令改入民籍一同當差十八年題凖雲南衛弁職田向繫収租凖俸嗣後各歸衛所以本七折三輸納康熈六年覆凖江南石城等衛屯田改折太重仍舊徴収本色十年覆凖廣東屯糧十倍民田減照民地重則起科十五年覆凖各衛所荒田坐落州縣境内縣勘則誆稱軍地衛勘則詭為民田令督撫嚴檄州縣衛所各官逐一清釐不得推諉以滋隠射三十四年諭雲南屯田錢糧較民田額重數倍民甚苦累嗣後照河陽縣民田上則徴収欽此三十五年覆凖雲南屯地亦照屯田例徴収又覆凖江南漕運按糧用丁屯田仍徴糧免其徴租三十六年覆凖湖南辰州衛歸并瀘谿縣該衛屯則糧重賦輕該縣民則糧輕賦重改照民田科則徴収四十年題凖湖南沅州龍陽黔陽靖州各屯田賦役全書内譌刋之浮糧概行豁免雍正八年覆凖陜西甘肅所屬歸德所之保安堡額徴糧米若令歸德所徴収百姓既須逺赴輸納兵丁又須逺赴支領均有未便嗣後即令保安堡守備徴収如有未完照依分數議處九年題凖廣東屯户丁口向繋按名輸納自雍正十年為始将額徴丁銀按額徴屯糧均攤徴輸又題凖運丁将田私典以致有田無租應察明確是原丁及原丁的屬子孫力能贖囘者凖其照契取贖如非原丁及原丁的屬無人者不得溷贖又題凖屯衛田畝凖典與軍户不得私典與民違者将田歸衛典價入官仍照例治罪乾隆元年諭朕聞廣東有屯糧羡餘一項原繫衛所官弁徴収毎正糧一石収榖三四石不等除正米撥支兵餉外餘榖悉繫衛所官弁侵蝕入已嗣後該督撫察出題報留備振糶之用但屯田額糧本重於民田今以一石之糧徴収至三四石屯民其何以堪又聞各省軍田額糧較之民地亦重從前軍田畝數原多嗣後漸次清釐田主亦屢經更易而糧米仍輸舊額自屬苦累可傳諭各該督撫詳加察覈將如何定頭徴収並革除額外加徴之處議奏欽此各省遵㫖覈奏由部覆凖裁減豁免又覆凖從前陜省公務浩繁應役需人於州縣屯丁内暫留為看守城樓倉庫及各衙門之用毎名給旱地一頃將額徴銀糧給應役之用今差務漸減應酌量裁減其存留各丁於毎年原給銀糧外再動支存公銀二兩議裁屯丁所給地畝應徴銀糧照數徴収二年諭各省屯糧科則輕重不等州縣屯糧有較之民田過重者有同一屯地而徴糧之本折多寡不同者有同一科則而額糧之重輕相去懸殊者念此屯民皆吾赤子若地瘠糧重未免輸納維艱著該撫秉公確覈各就原額糧則之重者酌量裁減具題請㫖欽此又覆凖甘肅所屬柳林湖等處屯田地方遼濶屯户衆多通判等官僅止數員耳目難周酌留熟諳屯務之生監農民並設立屯長總甲渠長分理所需口糧盤費在於存公項内動撥四年覆凖陜西安西鎮屬口外屯田盡行開墾盡可藉民力營田以供兵食應陸續召募農民商賈及兵之有餘丁者承種所獲糧榖民得六分官収四分委安西道與通判管理督率餘地聽百姓報墾納糧五年題凖出運漕船額設屯田止許得當年租銀不得層累疊加立劵豫支至已經加租之田如力能囘贖者即退還價直别租力不能囘贖者竢租價滿日别租如指稱加租名色立劵私交者將該丁革退與出銀租田之人皆依私典軍田例治罪其田追給新丁仍追取租價入官六年覆凖各省屯田定限一年無論在軍在民一并清出歸軍贍運八年題凖湖廣湖南所屬軍屯田地典賣與民相沿年久應盡行清釐量為區别將民買軍田情願應差者凖其管業如軍置軍産隨田應差者亦凖仍舊管業其田均不凖取贖至民買軍田不願應差及軍買軍産田去差存者均凖原丁取贖若原丁貧不能贖令典買者毎嵗别助費以濟漕運又覆凖湖廣湖北衛所屯田各清出原額除納賦之外按量多寡分别助費官徴官給均分各船濟運其故絶逃亡之户民人頂種者見在納糧貼運實與屯丁無異若此項田有出售者仍令額軍歸買十二年覆凖各衛屯田果繫典賣與民許備價取贖由衛所移明州縣飭令民人収價退田倘地方官不即飭退照承察遲延例扣限分别察議如不即備價溷控退田以及一時草率不行詳察誤以民田行移州縣取贖旋即更正者将衛所官弁比照丈量地畝不明白詳報例議處若實繫民田與軍無渉故作軍田揑報希圖溷冒者比照荒熟地畝不分晰明白溷報州縣官例議處一土司貢賦康熈五年覆凖四川廣西雲南貴州各土司繫邊方世職其錢糧完欠不必照流官例考成六年覆凖四川石砫土司有山坡草地應納之糧均折銀按三年一徴七年覆凖各土官經徴錢糧一年内全完者督撫題明奨賞銀牌花紅永為定例五十一年覆凖四川化林協屬各土司三年一次貢馬照例折價交収雍正四年覆凖徴収土賦不許額外科派私行需索六年題凖四川松潘口外熱當磨下二寨番民原納青稞因地方寒冷顆粒無収毎年照例改納馬匹八年諭廣東瓊州府屬各處生黎皆誠心嚮化願附版圖輸納丁糧朕念生黎無田可耕本不忍収其賦稅但伊等既傾心嚮化若將丁糧全行豁免恐無以逹其抒誠納貢之悃忱著將逓年毎名輸納丁銀二分二釐之數減去一分二釐止収一分以作猺賦該地方文武大員應時時訓飭所屬加意撫綏悉心教飬務令安居樂業各得其所欽此又題凖四川建昌鎮寜越營所屬番民等傾心慕義輸賦歸誠毎年納榖糧二十二石歸入寜越營輸納撥充本營兵餉九年奏凖土司故絶及以罪削除者嵗貢馬匹凖其開除十年議奏四川玉舒納克書南城巴喀等各番納馬一匹以十兩折徴奉㫖十兩尚多再減二兩十二年覆凖四川阿臚等六枝夷民撥歸四川建昌鎮管轄照例三年一貢乾隆二年諭向來四川土司舊有貢馬之例其不貢本色而交折價者則毎匹納銀十二兩朕因四川驛馬之例毎匹止給銀八兩獨土司折價較多蠻民未免繁費比降諭㫖將土司貢馬折價照驛馬之數裁減四兩定為八兩以示優䘏至廣西土司毎三年貢馬一次亦繫折價十二兩所當一體加恩使土司均霑惠澤著照四川折價之例毎馬一匹減銀四兩定為八兩永著為令欽此又覆凖甘肅武都西寨珍堆三族番民改土歸流應納田糧折色照例免徴耗羡又題凖廣東新寜縣上川猺户素居内地民猺相安凖其别立猺户將從前投寄民户之荒熟地畝収歸猺户熟地聽其輸賦荒地聽其墾種升科其民户寄糧照數開除三年諭湖北所屬忠峝等土司田地應徴糧銀奉照原額秋糧銀數按田均輸作為定額毋庸别立科則欽此四年題凖四川建昌所屬木裏土司地方深山窮谷産馬無多毎年所納貢馬照例折銀應徴蕎糧離營窵逺山路﨑嶇夷民背負上納甚屬艱難將毎年應納蕎糧照折淨倉斗米價赴會鹽營上納供支兵餉十一年題凖四川三齊等番民歸𨽻茂州營管轄毎年應納麥糧六十石按户均算秋収赴州完納十二年覆凖松潘鎮屬畨民輸年貢納貝毋該地掘取年久根苗稀少若輸年輸納未免苦累照例令其納銀交營折給兵米又題凖湖廣永順等處土苗田地較之内地科則糧額輕減嗣因改土歸流已入版圖内地百姓利其糧輕産賤陸續前往爭相購買除從前内地人居住苗界已久置有産業者不必令其遷居退産仍聽相安外此後毋論居住年分久暫並有無置買産業一概不許再買苗田如有内地民希圖糧輕再買苗田及土苗貪得重價賣田與民者將苗民分别責懲仍令苗人備價囘贖其有外來之民貪圖苗土攜帯眷口前來者不許地方官給照經過塘汎亦不得放行如地方官不行稽察濫凖買賣者照例議處一丈量順治十年覆凖直省州縣魚鱗老冊原載地畝丘段坐落田形四至等項間有不清者印官親自丈量十二年題凖部鑄歩弓尺分頒直省使丈量時悉依新制又覆凖州縣錢糧與原額相符者勿再紛更其闕額地方於農隙時州縣官親率里甲丈量上官以次受成不得差委滋擾十三年諭州縣有地無糧有糧無地者逐一清丈欽此十五年覆凖山東明藩田産相沿以五百四十歩為一畝今照民地例勘丈概以二百四十歩為一畝廣十五歩縱十六歩又覆凖直省有荒蕪田畝選委亷幹官履畝清丈無得隠漏十六年覆凖陜西膚施縣地五畝零折正一畝甘泉縣地三畝零折正一畝令地方官清丈照舊徴賦十八年覆凖江南蘇松等府地糧荒熟溷淆令州縣官􅂿勘分晰造報察覈康熈元年覆凖山東民地内錯雜竈地有在本省者有在直𨽻者累年不清令廵鹽御史及地方官清丈各正疆界四年覆凖丈量弓尺均照舊式如各州縣有私自更改者該督撫指名題叅又覆凖直省田地荒熟相間恐有隠占應踏勘丈量如有司及里書弓手攤派詐擾令督撫題叅七年覆凖陜西洛川縣地八畝零折正一畝宜川延川縣地四畝折正一畝令丈明照舊改正四十四年覆凖湖廣地方大半濱江嗣有修築隄堘将隄身所壓之田及兩邊取土之地丈明估價補償原主雍正三年諭從來兩省接壤之地其界多有不清間有一省之内各州縣地界亦有不清者毎遇命盗等事則互相推諉礦厰鹽茶等有利之事則互相爭競甚非息事寜民之意各省督撫其共矢公心勿存私見詳細清釐如與鄰省地界有不清者則兩省各委實在賢員公同勘定若本省内地界有不清者即委本省賢員勘定地皆朕土人皆朕臣此盈彼絀悉在朕版圖之内無容分視也雖地界或間有難定之處但平心勘畫即使稍有不協然一定之後久逺得以遵據永無推諉爭競之處於地方大有禆益矣欽此四年覆凖内務府網户從前有強占民間地畝令地方官清丈給還原主如無原主即行招種五年覆凖民間爭訟田土大率為界址不清非勘丈無以判其曲直而清其頃畝飭令地方官凡訟渉田土務宜清丈以定界限以除欺隠之弊又覆奏四川昔年荒蕪田地漸皆墾闢但從來並未丈勘止計塊段插占管業又土著與流民各居其半田土不知頃畝邊界均屬溷淆此侵彼占爭訟繁興應委員按畝清丈以息爭端以絶欺隠應於各部司官内簡選四人命往川省又於候補候選州縣内簡選十六人令其帯往會同松茂建昌川東永寜四道將丈量事宜秉公妥酌分委帯往人員逐處清釐所到地方令州縣官撥户書弓手跟隨勘丈事竣計算來川民户按畝撥給新墾田分别水旱照例升科備造清冊報部稽覈如有姦民脅衆阻撓公事照聚衆至四五十人之例治罪地方官不善撫綏以致聚衆者指名題叅從重議處奉㫖此本内但稱姦民阻撓按律治罪並未議及百姓如實有寃抑下情如何凖其陳訴甚屬疎漏著通行曉諭丈量案内百姓果有寃抑下情凖其十數人同到督撫或欽差官處控告秉公審理所控虚妄將本人加倍治罪所請會同四道丈量著於小京堂科道内簡選並令各部堂官將司官保送其帯往丈量之員於庶吉士主事中行評博候補候選州縣内簡選一并引見又覆凖江南安河淀等處至水家墩一帯地方新淤地畝差部院司官會同地方官及該管河員履畝丈勘又山鹽二邑沮洳水淀涸成髙阜令清丈官員一并丈勘分别年分均給士民領種輸租又覆凖江南沿江濱海田地潮水衝激沙土不免坍漲居民於新漲地内開墾成田久不升科而所坍田地舊額猶存行令督撫擇委賢員清丈新墾者令據實確報升科果繫無田輸賦者凖予開除其餘凡有此等田地均令清丈六年覆凖沿江濱海淤漲地畝五年一丈新墾者升科坍塌者除賦七年覆凖陜西朝邑縣與山西蒲州接壤原以黄河為界河流西徙則西坍地畝朝邑尚在賠糧東漲田疇蒲民率多占墾界址溷淆紛爭不息令清丈分界將二省錢糧應豁應徴確察定議八年覆凖四川田地奉㫖命科道等官會同川省四道丈量事竣松茂道屬原冊載上中下田地萬八千一百十有八頃山下地估種二千五百五十三石各有竒今丈得十有四萬九千八百四十七頃八十九畝下地估種及衛地糧共六千七百七十四石八斗應徴丁條糧租徭銀二十四萬八千六百三十六兩各有竒川東道屬原冊載上中下田地九萬九千八百四十頃有竒今丈得十有九萬八千七百三十一頃七畝酉陽石砫六土司報納秋糧千四百十石一斗應徴丁條糧及折徴銀共十有九萬八千八百二十八兩三錢又石砫司應納倉斗米豆折徴銀九兩五錢各有竒永寜道屬原冊載上中下田地萬八千七百四十頃有竒今丈得三萬八千七十六頃三畝應徴丁條糧銀七萬四千一百八十八兩二錢有竒建昌道屬原冊載上中下田地二萬二千一百五十四頃有竒今丈得四萬三千二百十有七頃十有六畝冷邊長官司報增耔種二石四斗應徴丁條糧折色馬價差期銀十有一萬三千三百六十兩二錢蕎麥糧萬六千百有七石一斗本色倉斗米豆萬八百二十四石三斗各有竒均應照清釐田地科則徴収按年造入奏銷冊具題察覈十三年覆凖江南江蘇所屬腹内地畝為漕田近水泥灘沙地為蘆洲均有坍漲或漲墾不報升科或坍荒不為請豁或新漲已成漕田仍報升蘆課或蘆洲久成熟地並不轉則升科均履畝清丈如原繫報升蘆課已經開墾成熟者令隨本處漕田則例轉科其接連漕田之新漲勘明實繫漕田照漕田報升不得揑稱蘆地其實在坍闕者即為豁除又覆凖公占田地如開河築隄建立營房等項及水衝沙積荒廢田畝不能開墾者覈明分别豁減又覆凖坍漲田地責令業户将坍漲之處隨時取具里鄰甘結呈報以憑清丈升除其並無坍漲之處亦取具業戸里鄰甘結存案統於奏銷案内分晰具題至屆五年清丈之期仍照定例委員履畝確勘如隨時丈勘有升除不確之處即将承辦之員指叅乾隆元年諭朕聞濱海之鄉坍漲不常田無定址於是豪強得恣侵占而爭端日興其責在地方有司熟悉土宜按制定法彌釁於未然而平其爭於初發則可為良吏矣夫州縣有司非盡不知愛民者特以田土情形未能稔悉不得不寄耳目於吏胥而滑吏姦胥又往往與土豪交通變亂成法予奪任意弱肉強食為厲無窮獄訟繁興端由於此至若沿海所漲之沙鄰邑互爭有司又各袒所屬益滋紛擾此皆徇私而未識大體者朕以天下為一家而州縣官各膺子民之責亦當體朕之心以為心又焉忍伸此屈彼長其姦而導之攘奪哉前此海濱要地增設大員弹壓果其秉公察看經理得宜應即令界址劃然各歸其産不當遷延嵗月仍假姦民之便而使窮黎久致失業也夫豪強不懲則無以安良善經界不正則無以杜爭端該督撫應飭所屬親民之員毋以姑息怠緩從事庶令民業各正而爭訟亦自少息矣欽此又覆凖江寜溧水髙淳六合四縣有田在此縣而完糧在彼縣者謂之寄糧令各該縣将坐落區圖田畝科則造報委員勘丈確實將應徴錢糧畫清改𨽻於有地之縣入額辦賦又覆凖沿海沙田坍漲靡常令五年清丈一次坍者即題報豁免漲者造報升科果無坍漲亦即題明毋得彼此抵補三年奏凖江南常州府屬靖江縣田賦漲則均減坍則均增五年清丈之例從未舉行以致一戸報漲而通邑減一户報坍而通邑增糧無定額民鮮適從令照例遴員履畝確察升免實數造冊題報五年奏凖直省弓尺長短不齊應令各督撫將見行丈地之弓尺較凖長短製造式様送部存案凡有應丈田地照依各本省送部弓式秉公丈勘如有私行增減任意盈縮將丈地官嚴行治罪督撫等失察一并議處十五年奏凖自順治十二年部鑄弓尺頒行天下康熈年間復行嚴禁如有盈縮定以處分迨後各省弓尺多有不齊參差無定乾隆五年行直省各將該地方舊用弓尺開明報部惟直𨽻奉天江西湖南甘肅四川雲南貴州並兩淮河東二鹽場仍遵部頒弓尺並無參差不齊至山東河南山西江蘇安徽福建浙江湖北西安等省或以三尺二三寸或以四尺五寸或以六尺五寸或以七尺五寸為一弓或二百六十弓或七百二十歩為一畝長蘆鹽場三尺八寸為一弓三百六十弓六百弓六百九十弓為一畝均未遵照部頒弓尺今若令各省均以部定五尺之弓二百四十弓為一畝倘部頒弓尺大於各省舊用之弓勢必田多闕額正賦有虧小於舊用之弓又須履畝加徴與民生未便且經年久逺一時驟難更張除直𨽻奉天等省原遵部頒弓尺毋庸置議外其山東河南等省弓尺不齊之州縣已據各該撫開明不齊縁由報部存案亦毋庸再議增減嗣後有新漲新墾升科之田務遵部頒弓尺丈量不得仍用本處大小不齊之弓如有私自增減盈縮照例處分一丈量禁令順治十五年覆凖州縣衛所丈量地畝遲延及丈量後不即確報不送丈冊檄催又不申詳及監丈互相推諉者分别議處康熈二十八年奉㫖丈量地畝地方經管各官務須潔已奉公實心任事勿得藉端科斂如有濫派滋擾者事發照貪官例從重治罪雍正三年定凡丈量疆界於農隙之時舉行所委官員不得私受請託収取餽遺及科派百姓騷擾經過地方如有發覺從重治罪五年議凖丈量之時若有豪強脅衆阻撓公事者照例治罪六年覆凖首報隠匿田畝業主於丈量之日勾通作弊丈多報少者弓歩手及里胥照例治罪業主仍以隠匿論十三年諭江南江西湖廣等省蘆洲均繫沿江沙灘坍漲靡定是以定例五年一丈令地方官踏勘據實報聞而不肖官吏往往藉此納賄行私已坍者不得豁除正賦新漲者轉可脫漏升科此種積弊甚為民害嗣後屆期丈量令該撫於通省道員内選賢能夙著者率同州縣履畝清釐凡有盈縮均按見在實數升除毋使漏課亦毋使賠糧如不肖官吏或有藉端需索等弊即指名叅處不得姑容徇庇自千咎戾欽此一開墾順治元年議凖州縣衛所荒地無主者分給流民及官兵屯種有主者令原主開墾無力者官給牛具耔種六年定州縣以勸墾之多寡為優劣道府以督催之勤惰為殿最毎嵗終載入考成又定地方官招徠流民不論原籍别籍編入保甲開墾無主荒田給以印信執照永凖為業又定招民開墾荒田起科之年有司親察成熟畝數院司勘實奏請徴糧不得豫徴私派九年題凖八旗壮丁退出及首告清出並各省駐防遺下之地照開荒例招墾又議凖陜西荒地酌調歩兵給發牛種令其屯墾又議凖各省屯田資本皆取贓罰及空闕廪俸裁扣工食等銀不得輕那司庫餉銀十二年題凖各邊口内曠土聽兵墾種不得往口外開墾牧地十三年覆凖州縣招人開墾勢必給發牛種以資耕作令於原穫息米豆草内動支去原貯地方稍逺者量動屯本銀内給發次年繳完一半三年照數完納十五年定各省荒地督撫一年内開墾二千頃至八千頃以上道府開墾千頃至六千頃以上州縣開墾百頃至六百頃以上衛所開墾五十頃至二百頃以上分别予敘不凖以二三年墾數合算康熈元年題凖荒地未經開墾揑報墾熟者督撫道府州縣等官分别議處又題凖有將熟地稱為新墾者議處督撫布政使司失察一并議處三年題凖同知通判不與知府同城自勸民開墾者照州縣例議叙署印官亦一例議叙七年題凖四川招民墾荒凖予議叙十四年覆凖江南浙江江西有田存丁絶及田多丁稀者招同里甲之户丁耕種承納錢糧又議凖地方官希圖議叙虚報開墾者照例議處十五年議凖開墾田畝徴糧全完取結題報者應隨奏銷一同具題遲誤者照例議處又議凖各省報墾勸墾荒闕田地應按照年限分數並起科年分水田六年旱田十年及額糧數目統於嵗終取結造冊題報仍竢升科之年將新增地畝並額徴銀糧草東按年分晰造報奏銷以憑覈對又題凖招墾荒田不照例起科先期勒徴或過期不徴或私減地畝定額錢糧者分别議處二十二年覆凖免徴暫荒田地竢百姓歸耕之年起科二十六年奏凖盛京地方曠土甚多令發遣之人屯種二十七年奉㫖嗣後民間若有出首開墾田畝不必拘定年限均自出首之年徴収錢糧該管官亦免其議處欽此又議凖私墾之田實繫無主給與原墾之人起科若有主給還原主起科如有不肖官役藉端擾民不給原主或有豪強霸占該督撫題叅治罪二十九年議凖川省荒地甚多流寓之人情願在川居住墾荒者將地畝永給為業三十二年議凖陜西招民開墾凖予議叙又題凖雲南明代勲莊田地照老荒地招墾免其納價又題凖陜西西安鳯翔二府自西北至東二千里遭荒流散今招民墾種毎頃給牛具銀五兩毎畝榖種七合計銀一分四釐毎頃人工四名給銀八錢八分均動支庫項飭令一年之内將荒地墾種全完流民招囘復業四十一年覆凖山東荒廢明藩基地民人情願納價者毎畝納銀五兩給以印帖守為恒業四十三年覆凖天津附近荒地開墾萬畝以為水田將江南閩粤等處水耕之人出示招徠安插計口授田給與牛種限年起科又議凖各省墾荒田地如有地方官隠匿入已該撫不行嚴察止據各州縣揑報具題者該督即行題叅並將不稽察之司道府官一并叅處四十四年覆凖湖廣湖北所屬荒地願墾者凖其開墾無力者本省文武官捐給牛種招墾將墾過畝數具題議叙雍正元年諭口外地方遼濶開墾田地甚多將京城無産業兵丁移駐於彼殊為有益著古北口提督定議再著總理事務王大臣等㑹同該部詳議具奏欽此遵㫖議凖将在京八旗滿洲䝉古驍騎内選熟諳農務者八百名前往熱河喀喇河屯樺榆溝三處開墾又諭府州縣官能勸諭百姓開墾地畝多者凖令議叙督撫大吏能督率各屬開墾地畝多者亦凖議叙欽此又諭開墾水田以六年起科旱田以十年起科永著為令欽此又諭開墾一事於百姓最有禆益但向來有司需索陋規致開墾之費浮於買價百姓畏縮不前往往膏腴荒棄嗣後有可墾之田聽民相度地宜自墾自報地方官不得勒索胥吏亦不得阻撓欽此二年議凖西寜布隆吉爾地方遥逺情願前往者少直𨽻山東山西河南陜西五省軍流人犯連家口發遣之人有能種地者令其前往地方官撥給地畝動支錢糧採買耔種耕牛給與三年覆凖福建臺灣各番鹿場閒曠地方可以墾種者令地方官曉諭聽各番租與民人耕種又議凖安西屯墾應募之兵未習土色地氣應就沿邊郡邑雇覓農人毎兵三名給幫夫一名自開墾至秋穫皆令指引竢屯墾既嫻將雇覓之幫夫裁退又覆凖灤薊天津文安霸任邱新城雄等八州縣設立營田令江浙二省督撫召募老農各送三十人每月酌給工食令其課導耕種竢本地之民耕種得法令其囘籍所需農具水車等項亦令江浙二省各送匠人五名将式様及造作之法教導本地匠人一例給發工食如耕種之小民力不能辦官給正項錢糧代為經理嵗収十分之一補項三年覆凖灤薊等處營田有力之家率先遵奉者按圩田多寡分别奨賞四年覆凖張家口外地畝分作十分招種如招種八分以上題請議叙不及五分題請議處又覆凖四川地方勸諭開墾民苗愚鈍不知開墾之法有湖廣江西在蜀之老農給以衣食令其教墾竢有成効督撫題給頂帯送歸原籍不願囘籍者聽其自便又覆凖滇黔二省廣行開墾地方官招民開墾及官生捐墾者将墾熟田地歸於開墾佃户於次年起科民間自墾者按照年限起科又覆凖滇黔二省廣行開墾並定開墾事例凡官員招募佃户資送開墾者按户數多寡議叙軍民自備工本者按畝多寡議叙又覆凖滇黔二省開墾工本六年扣還五年覆凖滇黔二省招民開墾委員及地方官将所領工本招募良民開墾數多田皆成熟者三年之内凖其議叙倘虚應故事招募匪類領銀潛逃或開荒草率不能種植報糧者照才力不及例指叅所費工本著落該員賠補又覆凖各省州縣原荒地畝有難於墾復者如積鹻未消浮沙漲漫山石磽瘠低窪積水之區實難限年報墾者該督撫將難於墾復情形於報冊内聲明仍令所屬設法開墾不入年限之内六年題凖各省入川民人每户酌給水田三十畝或旱田五十畝若有子弟及兄弟之子成丁者每丁水田增十五畝或旱田增二十五畝一户内實在老少丁多不能飬贍者臨時酌增除撥給之數外或有多餘三五畝之地亦凖一並給墾其竒零不成丘段之地就近酌量安置給以照票収執管業又覆凖寜夏所屬之插漢拖輝地方招民開墾借給帑項以為蓋房買牛具耔種之資凡陜西各屬無業民户願往者計程塗逺近酌給路費至彼地時毎户授田百畝又題凖各省入川民人按户給地毎户給牛種銀十二兩所給之銀著落民户本籍之府州縣賠補所領人户名下免其扣還又覆凖插漢拖輝招民開墾毎户借給牛種銀十兩至起科之年分作十年扣還七年諭國家承平日久户口日繁凡屬閒曠未耕之地皆宜及時開墾或以食用無資力量不及遂不能趨事赴功徘徊中止亦時勢之所有著各省督撫各就本地情形細加籌畫轉飭有司作何勸導其情願開墾而貧寒無力者酌動存公銀榖借給以為牛種口糧竢成熟之後分限三年照數還項欽此又覆凖滇省烏蒙東南之田土山場建設流官招民墾種但地廣田多非民力所能遍墾應令兵民一并承墾毎户不得過二頃之外仍量給牛種銀統於三年内分年完納又題凖粤東通省開墾工本每畝定以五錢至二三錢於存公項下支給不敷之銀在闗羡銀内動支分限三年扣還又題凖四川結覺沙罵等處清出漢民五十七户應押送囘籍有無籍可歸之户令其開墾餘荒應需房屋牛具等項在於存公銀内動支又覆凖直𨽻荒蕪之地訪求原主召諭開墾倘原主不自墾種别擇願耕之人凖其耕種日後原主有願復原業者令給還墾本方凖復業不得恃強爭奪違者按律治罪八年覆凖四川松茂道屬報墾荒田九百十有二頃六十七畝荒地七千二百七十九頃十有八畝川東道屬報墾荒田三千九百四十九頃三十二畝荒地九千八百六十二頃六十八畝永寜道屬報墾荒田千九百八十一頃三十畝荒地三千七百二十七頃六十八畝建昌道屬報墾荒田十有二頃六十六畝荒地三十七頃二十一畝各有竒荒田墾種六年起科荒地墾種十年起科九年題凖安慶開墾案内凡領墾之人貧寒無力令其呈明地方官結報於存公銀内每畝借給銀一錢以為資本於常平倉内給榖二斗以為耔種分限三年還項如有揑名冒領侵扣分肥發覺之日結報官名下追賠十年覆凖陜西甘肅所屬之𤓰州地土肥饒可墾將疏勒河上流築壩開渠引水入河再於安家窩舖對岸渠道疏濬深通引水溉田其費於屯田銀内動撥十一年覆凖陜西髙臺縣屬之柔逺堡鎮夷堡口外雙樹墩等地方開墾所需開渠夫價口糧於軍需銀内動支所借耔種即於本年扣還牛具等銀分作五年匀扣又覆凖𤓰州安插囘民耕種地畝所需加修渠道牐壩夫役工本於正項内動支借給牛具耔種口糧分作四年扣還又覆凖川省新設苗疆河東河西各處髙田下地已經成熟而山林坡岡之間猶未盡闢應招徠樹藝但苗民耕耘無力毎户賞給牛具耔種以資耕種如苗民不能全墾招民墾耕酌定年分分别升科十二年覆凖各省山田或先可耕種後因水衝僅存石骨並濱江濱海之田前經報墾後經水侵坍塌者將屆升科之年令督撫委官復加詳覈據實具題請豁又覆凖三姓城東南法爾㤗村地方寛濶將發到為奴之民選取循良有妻者暫停撥給令其開墾給與牛具房屋耔種又奏凖粤人慣耕水田旱田不諳種植髙雷亷瓊等處平坡山􅅢及沿海一帯平壤宜菽宜麥皆可有秋只縁居民不曉土膏地脈之宜一切農具又不適用以致地有餘利令山東河南二省選善種旱田者二十人送粤教耕布種又覆凖凡承墾之初若不定以限期先行曉諭誠恐業户居住僻逺無從周知令各州縣凡遇開墾先行開明土名界址出示曉諭定限五月内許業户自行呈明如逾限無報即将執照給原墾之人承種管業又覆凖陜西甘肅所屬鎮番縣口外柳林湖地方屯墾應需築壩建隄開渠工料並夫役口糧於軍需銀内動撥其借給牛車農具等銀分作五年扣還又覆凖陜西中衛縣白馬寺灘地廣可墾動支插漢拖輝工程餘銀開渠建槽又覆凖各屬開墾地方有司不實力奉行以少報多希圖議叙及至升科之年按冊有餘按畝不足報墾之官已濫邀叙典按任之官以報部定額難於詳免勢必於里甲中匀派飛灑殊非勸墾本意各省州縣官冊報開墾督撫務委隔屬賢員丈勘所墾之數與所報之數果屬相符取結送部凖其議叙倘有不符即將原報之官題叅如委官蒙溷一并處分又覆凖墾地有附近豪強之家冒認已業率衆搶割禾稻者按律治罪又覆凖劣衿土豪藉開墾名色将有業户之田濫報開墾者照侵占律治罪里甲地鄰及濫給執照之地方官一并議處又覆凖久荒之地凡有古塜周圍留地四丈不得開墾十三年諭各直省勸令開墾荒地以廣種作以資食用俾無曠土游民原繫良法美意然必該督撫董率所屬官吏實力奉行毫無粉飾俾地方實有墾闢之田民間實受耕穫之利以此造報升科方於國計民生有所裨益乃朕見各省督撫題報開墾者紛紛不一其中多有未實或由督撫欲以廣墾見長或地方有司欲以升科之多迎合上司之意而其實並未開墾不過將升科錢糧飛灑於見在地畝之中名為開荒而實則加賦非徒無益於地方而實貽害於百姓嗣後凡造報開墾畝數務必詳加考覈實繋墾荒然後具奏不得絲毫假飾以滋閭閻之擾累欽此又覆凖開墾地畝以多報少以少報多或將先墾之地重報開墾及荒熟地畝不分晰溷報者分别議處又覆凖凡抑勒首報開墾者嚴行飭禁其已報之田詳加稽覈如果繋虚揑不實即題請豁除無得䕶過文飾又覆凖凡隠匿新漲沙洲不報升科揑稱補坍冒占並以漕報蘆者許業户據實指首免追從前隠漏糧賦乾隆二年奏凖凡荒地開墾應先行呈報如土著呈報在先即凖土著承墾如流寓呈報在先即凖流寓承墾三年諭山西屢年首報欺隠地畝皆經題報升科但聞從前首報欺隠時有果繋畝數浮多情願報出升科者亦有地方官奉行不善按照原額荒闕勒令灑派具詳者著該撫曉諭從前首報欺隠人等如果畝數浮多應行升科再令據實首報照數輸將倘地畝並無欺隠浮多而地方官按照原額荒闕勒令灑派者亦著據實呈明該州縣詳報該撫别委賢員確覈題請豁免欽此又題凖歸化城開墾地畝應徴糧草除離城五十里以内者不給脚價外其在五十里以外者亦除去五十里将其餘里數照太原朔平二府屬之例毎米一石毎百里給銀一錢每草百斤毎百里給銀七分在於存公銀内動給五年諭豫省地土原有水田旱田二項祗以旱田賦輕水田賦重一經改種必須題請加賦朕思水田収穫倍於旱田若可改種則易瘠土而為沃壤於民間自有裨益至加增科則為數無㡬且此繋見在輸糧田畝非新墾隠匿者可比嗣後情願将旱田改作水田者悉從其便錢糧仍照原定科則徴収免其改則加賦但各州縣地形不同土性逈别其不便改種者地方官不得勉強抑勒欽此又題凖直𨽻官山官地以具呈先後承墾民地先盡業主如業主力不能墾始許他人承墾墾成之日業主不得追奪六年覆凖陜省荒地全無出産者招民開墾其有見在割漆砍竹採取構皮木耳等項者聽民自便地方官不得目為荒地強令墾種亦不得以見穫微利勒報升科凡文武官及紳士将新墾地及熟地隠匿一畝以上至一頃以上者分别議處一應軍民隠地一畝以上至一頃以上者分别責懲所隠田地入官所隠錢糧按年行追州縣衛所道府布政使司督撫等官将隠地察出自二十頃以上按畝紀叙不能察出者分别議處竈地隠漏亦照此例地主将本身地呈報州縣而州縣不呈報司道府等官或州縣已報而司道府不詳明督撫者皆照例處分又覆凖陜省無主荒地設法勸墾官為插標招墾給照為業竢升科之年覈明等則酌定糧額題報若本地人力無餘凖令鄰近無業之人承墾給照之後即編入土著保甲之内令該管保長等稽察再地廣民稠若不定以額數易啟包占之弊其平衍易収之地每一壯丁定以五十畝為率山岡沙石難収之地毎一壯丁定以百畝為率其父子兄弟如均繋壯丁再行酌量加增七年題凖浙省新漲沙塗除孤懸海外向繫封禁者不凖墾種外其餘附近内地先行勘丈明確詳立冊籍如某處新漲沙塗若干頃定以百畝為一號挨次編冊出示曉諭凡承墾者照依示内號數具呈無論民竈以首先呈報者為凖印官即於原文冊内注明給照竈則移場經理民則歸縣管辦並令各墾户將原承號數自立界石於地頭毎十號為一甲承及十號印官親詣㸃驗稽察十甲之中選擇老農一人責令專司教導六年之内果能化斥鹵為膏腴將原立老農從優嘉奬給以花紅免其雜派差徭又題凖陜省未墾荒地有業主情願自墾者不必勒以年限或墾後力不能繼亦凖其續行具呈官為招墾至於招墾給照之後其地即永給墾户為業所議之價有力者見交稍有力之家少者二年多者三年照價清還如期限已滿墾户他去别為招墾日後不得仍執前照復爭此地又題凖陜西甘肅所屬地處邊徼從前開墾之始小民畏懼差徭藉紳衿報墾自居佃户迨至相傳數世忘其所自或年嵗偶歉拖欠租糧或役使不從口角嫌隙業主之子孫既欲奪田換佃而原佃之家忿爭越控靡有底止嗣後如佃户果繋原墾之子孫其業主不得擅更原墾之地業主子孫欲自種者凖將肥瘠地畝各分一半立明合同報官存案業主轉移他徙土田曠廢承種之户積苦耕犁應差納課既已有年姦民不得藉端爭控即原業之子孫囘籍亦不便全令給還計其抛荒年分酌量分給至三十年以外是否原業之子孫無從考究則概不分給如有業主囬籍在一二年之内者将當年所穫耔粒全給承種之户承辦糧差次年仍歸原業九年諭外省鎮將等員不許在任所置立産業例有明禁朕聞臺灣地方從前地廣人稀土泉豐潤彼處鎮將大員無不創立莊産招佃開墾以為已業且有客民侵占番地彼此爭競遂投獻武員因而踞為已有者亦有接受前官已成之産相習以為固然者其中來歴總不分明是以民番互控之案絡繹不休若非徹底清釐嚴行禁絶終非寜輯番民之道著逐一察勘凡歴任武職大員創立莊産察明並無侵占番地及與民番並無爭執之案者均令照舊管業外若有侵占民番地界之處秉公清釐民産歸民番地歸番此後臺郡大小武官創立莊産開墾荒地永行禁止倘有託名開墾者将本官交部嚴加議處地畝入官該管官通同容隠一并議處欽此又議凖浙省上虞之夏蓋湖餘姚之汝仇湖闗繋水利自應使之寛深容納庶旱潦有資蓄洩無礙凡有湖蕩之地詳加察勘除已經報墾地畝外其餘蓄水之處劃明界限不許再行開墾阻塞水道其從前已墾地畝亦令覈明有無升科分别辦理十一年議凖官地民業凡有闗於水道之蓄洩者一概不許報墾倘有自恃已業私將塘地陂澤改墾為田有礙他處民田者察出重懲如果有可墾之地應改之田於水道並無妨礙仍聽民間報官勘明凖其開墾改則升科若地方各官任民溷請改墾察勘不實者該督撫即題叅議處又題凖閩省臺地綿亘二千餘里近山有水之處皆屬膏腴人力易施種植之穫倍於内地雖經禁止内地民人不許私買番地但日久法弛姦民趨利如鶩嗣後如再有姦民私買告發之日將田歸番仍照律計畝治罪荒地減一等強者各加一等其有潛入生番界内私墾者照律嚴懲十八年題凖嗣後民間報墾荒地布政使司刋刻執照鈐蓋司印豫發各州縣竢墾户呈報勘明即將業户姓名畝數四至填明照内給發業户給過司照數目及業户姓名畝數四至嵗終造冊彚報藩司察覈其開墾成熟者於應起科之年照例徴収其承墾之後或因丁壮消亡或因地土磽薄墾不成熟者凖令呈報地方官勘明銷繳原給執照如業户不請司照即以私墾治罪地方官察勘不實或私行濫給亦即題叅議處一勸課農桑國初定低田種稻黍秫檾麻髙阜種粟榖又定縱馬食人田禾者牧長牧副等各鞭責照所踐榖數追賠順治八年題凖農民力耕甚賴牛力有屠宰耕牛者照律治罪十二年覆凖民間樹植以補耕穫地方官加意勸課如私伐他人樹株者按律治罪十五年覆凖桑柘榆柳令民隨地種植以資財用十七年覆凖設立里社令民或二三十家四五十家聚居毎遇農時有死喪疾病者協力耕助康熈十年覆凖民間農桑令督撫嚴飭有司加意督課勿誤農時勿廢桑麻十三年覆凖王以下不得因行獵蹂躙人田禾違者分别察議每地六畝追銀三兩給償地主雍正元年恩詔直省府州縣衛所農民果有勤於耕種務本力作者令該地方官不時加奬以示鼓勵二年諭國家休飬生息數十年來户口日繁而土田止有此數非率天下農民竭力耕耘兼収倍穫欲家室盈寜必不可得周官所載廵稼之官不一而足又有保介田畯日在田間皆為課農設也今課農雖無專官然自督撫以下孰不兼此任其各督率所司悉心相勸並不時咨訪疾苦有絲毫妨於農業者必為除去仍於毎鄉中擇一二老農之勤勞作苦者優其奨賞以示鼓勵再舍旁田畔以及荒山不可耕種之處度量土宜種植樹木桑柘可以飼􅁞􅀥栗可以佐食桕桐可以資用即榛楛雜木亦足以供炊㸑其令有司課令種植仍嚴禁非時之斧斤牛羊之踐踏姦徒之盗竊至孳飬牲畜如北方之羊南方之彘牧飬如法乳字以時於生計不無禆益所賴親民之官委曲周詳多方勸導庶踴躍爭先人力無遺而地力可盡不惟民生可厚風俗亦可還淳該督撫等各體朕惓惓愛民之意實力奉行欽此又諭農民勤勞作苦手胼足胝以供租賦飬父母育妻子雖榮寵非其所慕而奬賞要當有加其令州縣有司擇老農之勤勞儉樸身無過犯者嵗舉一人給以八品頂帯榮身欽此又議凖督撫率府州縣官舉行勸農春至勸耕秋至勸斂如有輕視民隠不實力奉行者照例議處四年議凖直省設立先農壇耤田每嵗仲春亥日督撫及府州縣衛所等官率所屬耆老農夫恭祭先農之神其耕耤照九卿行九推之禮五年議凖直𨽻州縣閒曠之地令相其土宜各種薪果如各處河隄栽種柳樹陂塘淀澤許種菱藕蓄飬魚鳬其地宜桑麻者尤當勤於栽種令地方官察其勤惰分别奬懲又諭修舉水利種植樹木等事原為利濟民生必須詳諭勸導令其鼓舞從事不得繩之以法如地方官因闗繫考成督課嚴急奉行不善該管官即據實奏聞欽此又諭米榖為飬命之寳既賴之以生則當加意愛惜資之者衆尤當隨時撙節各省地土其不可以種植五榖之處不妨種他物以取利其可以種植五榖之處則當視之如寳勤加墾治樹藝菽粟安可舍本逐末棄膏腴之沃壤而變為果木之場廢饔飱之恒産以倖圖贏餘之利乎至於烟葉一種於人生日用毫無裨益而種植必擇肥饒善地尤為妨農之甚者也惟在良有司諄切勸諭俾小民醒悟知稼穡為身命之所闗非此不能生活而其他皆不足恃則羣情踴躍皆盡力於南畝矣朕生平愛惜米榖每食之時雖顆粒不肯抛棄以朕玉食萬方豈慮天庾之不給而所以如此撙節愛惜者實出於天性自然之敬慎並不由於勉強且以米榖乃上天所賜以生飬萬民者朕既為億萬生民計不敢輕忽天貺爾等紳衿百姓獨不自為一身一家之計乎若果加意愛惜隨時撙節則天必頻頻賜賚長享盈寜之福若恣情縱欲暴殄天物則必上干天怒水旱灾祲之事皆所不免又聞江西廣西地方竟有以米穀飼飬豚豕者以上天之所賜小民終嵗勤苦之所穫為豢飬物類之用豈不干天和而輕民命乎朕所以惓惓訓諭者惟期天下之人專務本業以杜浮靡愛惜物力以圖久逺思之思之母忽朕言欽此八年諭農事貴乎及時二月土膏初動三月即為播榖之期直𨽻已得雨二次何以遲延觀望直待四月下旬方始播種倘小民怠惰偷安為民父母者則當開導勸課使之踴躍趨事於南畝又耔種牛力或有不敷則當留心體察設法相助不致有後時之歎况雨澤之遲早有無非人所能豫料假若霖雨愆期徬徨觀望則從前之怠惰遲延豈非小民自謀生計自荒恒産耶或如西北寒冷之鄉布榖不宜太早又當一論若畿輔可以早種之地又當甘雨既霖之時而乃䄂手逍遥以待時雨之再沛此皆愚民習於懶惰而地方有司又不以民事為念漠然不加董率之故著該督傳朕諭㫖通行申飭倘再有牧民之官輕視農事不實心化導任百姓之悠悠忽忽有誤播種之期者必從重議處欽此乾隆二年諭天下土地不為不廣民人不為不衆以今之民耕今之地使皆盡力焉則儲蓄有備水旱無虞乃民之逐末者多而地之棄置者亦有之縱云從事耕耘而黍髙稻下之宜水耨火耕之異南人尚多不諳北民率置不講此非牧民者之責抑誰之責歟朕欲驅天下之民使皆盡力南畝而其責則在督撫牧令必身先化導毋欲速以不逹母繁擾而滋事將使逐末者漸少奢靡者知戒蓄積者知勸督撫即以此定牧令之短長朕即以此課督撫之優劣至北五省之民於耕耘之術更為疎畧其應如何勸戒百姓或延訪南人之習農者以教導之牧令有能勸民墾種一嵗得榖若何三嵗所儲若何視其多寡為激勸非竒貪異酷極昏極庸者毋輕率劾去使久於其任則與民相親而觀課有成著該部㑹同九卿詳悉定議欽此遵㫖議凖仿照周禮遂師之制於鄉民之中擇熟諳農務素行勤儉為閭閻信服者毎一州縣量設數人董率勸戒地方官考績之法必寛以嵗月庶久道化成而無欲速不逹之弊如勸戒有方境内地闢民勤穀豐物阜積貯如茨如梁該督撫於三年之後據實題報官則交部議叙老農量加奬賞倘有教導無方強勒滋擾以及希圖奬賞揑辭妄報者指名題叅又諭自古致治以飬民為本而飬民之道必使興利防患水旱無虞方能使蓋藏充裕緩急可資是以川澤陂塘溝渠隄岸凡有闗於農事務籌畫於平時斯蓄洩得宜潦則有疏導之方旱則資灌溉之利非諉之天時豐歉之適然而以臨時拯䘏為可塞責也朕御極以來宵旰憂勤惟小民之依是咨是詢前後諭㫖諄復再三但化導自在有司而督率則由大吏該督撫有司務體朕痌瘝乃身之意刻刻以民生利賴為先圖一切水旱事宜悉心講究應行修舉者即行修舉或勸導百姓自為經理如工程重大應動用帑項者即行奏聞妥協辦理興利去害俾旱潦不侵倉箱有慶以副朕惠愛黎元至意欽此三年諭據河南廵撫奏稱種樹為天地自然之利臣欽奉諭㫖隨飭地方官多方勸諭桑柘榆柳棗梨桃杏各就土性所宜隨處種植一年之内成活之樹共計百九十一萬有餘等語朕御極以來軫念民依於勸農教稼之外更令地方有司化導小民時勤樹植以収地力以益民生今覧該撫所奏是豫省一年之内已種樹百餘萬之多朕思中州接壤畿輔為南北往來之衝並未聞有教民種植滋事繁擾之處安見豫省之法不可仿行於他省耶至五榖乃民命所闗國家設立倉儲原以濟小民之緩急但倉儲有限而人數繁多是在督撫大員董率州縣官勤勤懇懇勸勉化導俾百姓各盡力於南畝野無曠土户無游民縱不能如古人耕九餘三亦必令有所儲蓄以備不虞則克盡牧民之本圖矣倘襲取虛文不求實政或且刑驅勢廹使閭閻未受蓋藏之益而已受煩苛之擾此又國法之所不貸者可將此傳諭各督撫善體朕心勉力為之欽此七年諭周禮太宰以九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧飬蕃鳥獸其為天下萬世籌贍足之計者不獨以農事為先務而兼修園圃虞衡藪牧之政故因地之利任圃以樹事任牧以蓄事任衡以山事任虞以澤事使山林川澤丘陵之民得享山林川澤丘陵之利夫制田里教樹畜岐周之善政管敬仲亦云積於不涸之倉者務五榖也藏於不竭之府者飬桑麻育六畜也如果園圃虞衡藪牧之職以次修舉於民生日用不無禆益國家承平日久生齒日繁凡資生飬贍之源不可不為急講夫小民趨利如騖亦豈甘為惰窳舉山林川澤天地自然之利委為棄壤哉良以疏闢之初豪強既羣起而爭管業之後姦民又多方􅆷賊地方有司毎視為貲産細故不為申理此所以寜荒其業耳督撫大吏身任地方所當因地制宜及時經理其已經開墾成産者加意保䕶或荒墟榛壤以及積水所滙有可疏闢者多方相度籌畫俾地無遺利民無餘力以成經久優裕之良法至於竭澤焚林並山澤樹畜一切侵盗等事應行禁飭申理之處轉飭地方官實力奉行該督撫不時稽察務令從容辦理以期實效毋致絲毫滋擾尤毋得日久因循以仰副朕惠飬斯民之至意欽此八年議凖民間種烟一事廢可耕之地營無益以妨農功向來原有例禁且種烟之地多繋肥饒自應通行禁止惟城堡以内閒隙之地可以聽其種植城外則近城竒零菜圃願分種烟者亦可不必示禁其野外山隰土田阡陌相連宜於蔬榖之處一概不許種烟凡向來種烟之地應令改種蔬榖又諭朕維飬民之本莫要於務農州縣考成固應用是為殿最而向來功令不專以此課吏者固其事甚樸無可炫長其迹似迂驟難見效又或上司之察勘難周有司之條教易飾不似催科聽斷捕盗等事之顯而有據也督撫察吏毎於此等本計轉視為老生常談漠焉不甚加意以致州縣之吏趨承風㫖專以簿書期會為先而農事反居其後不知為治之道本舉而末自隨之如果南畝西疇人無餘力于耜舉趾日無暇時則心志自多淳樸風俗自鮮囂凌人知急公而閭閻無待追呼矣人知畏法而盗賊因以浸息矣本計既端末事亦次第就理如此則州縣之考成似疏而實密即督撫之察覈可簡而不煩日計不足月計有餘民生大有禆益即治道亦漸致郅隆若夫朝令夕申意非不美束縛馳驟適以擾民為督撫者當善體朕意毋視為具文毋事於塗飾誠以實心化導其屬俾屬吏亦實心勸課其民庶幾野無游惰之風家有蓋藏之樂朕以此訓示督撫業已至再至三不啻耳提面命今復降此諭實願與天下共敦本計故不厭其言之重而辭之複也各省督撫其共勉之欽此九年題凖直𨽻天津河間各屬土性宜棗種植最多深冀亦産桃梨至於榆柳楊樹之類河窪鹻地各有所宜令民間於村頭屋角地畝四至隨宜廣種始足以資利益如有旗地可種樹木之處應令該管各官勸諭旗人亦可多為栽種欽定大清㑹典則例卷三十五
