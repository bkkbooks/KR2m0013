front:
  text: 欽定四庫全書欽定大清㑹典則例卷二十一
  hash: sha256:ef070d6c281462b45ba92541ca39c11f642a88652b20579dd093e41833e4213f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_024-1a, image: WYG0620/WYG0620-0416c.png}
body:
  text: 吏部考功清吏司本章一本章違誤康熈六年題準本章被墨汚者将墨汚本章之員罰俸一月又議準本章内錯寫官銜或從旁添字或錯字者将不加詳對之主事罰俸一月錯寫之筆帖式罰俸兩月堂官免議九年議準官員将題本遺漏印信者罰俸一月又議準批寫票籖如将工部知道錯批兵部知道等類者大學士罰俸一月學士罰俸兩月又題準督撫将奉㫖駮察案件含糊具題者降一級留任又題準督撫将㑹議事件並未㑹同議定畫題遽稱合辭題覆者罰俸六月十年題準督撫本内有𦂳要字貼黄内遺漏或貼黄内所有之字本内遺漏者罰俸三月十五年議準凡官員将慶賀表文計册舛錯或遺漏不奏或遺漏字様及藉端推諉或遲延及不差的當人塗中躭誤以致水火盜失者皆罰俸一年如用印歪斜糢糊顚倒失用及繕寫潦草不列職名或破裂染汚者皆罰俸六月督撫亦照此例處分五十四年議準凡定議事件間有兩議者每議各有滿漢堂官署名具奏免議如滿堂官與滿堂官一處漢堂官與漢堂官一處各自署名具奏其奉㫖準行者免其議處不準行者罰俸六月又議準凡奉㫖交九卿㑹議具奏者九卿意見相同照例畫題倘别有所見者各書其意另冩一欵一并啟奏雍正二年諭嗣後本内援引新例之處不可用新例字様繫何年所定之例只将年分寫入𫝊諭内閣交各部衙門通行各省欽此三年議準地方民務大小公事皆用題本本身私事皆用奏本如有應用題本而用奏本應用奏本而用題本者罰俸三月六年遵㫖議定凡議革議降官員除在京各官不必夾籖外官先經别案革職休致者亦毋庸夾籖外其見在議處之外官自知縣以上遇有降調革職案件及外任補授之京官因伊原任内案件議處降調革職者察明該員從前何官升補及奉有褒嘉諭㫖或經督撫保題並曽奉特㫖寛免者均於本内夾籖進呈十二年覆準凡各部院題奏内㑹稾事件有應行之處皆責令主稾衙門通行知㑹不得推諉遲延以専責成如有推諉遲延及遺漏之處将主稾衙門照例分别議處乾隆四年奏準屬官呈請上司代題代奏事件如将實在情節不行逐細聲明含糊呈請将呈請之員降一級留任五年議準凡交代遲延承審遲延與承緝承追不力事件該督撫皆不必具題止照例限咨明各部其處分入彙題完結又議準錢糧盗案限滿之日該督撫停其具題止咨各部覈明聼該部照例處分具題又奏準凡見任州同縣丞以下㣲員遇有革軄解任事故年老有疾休致並患病調理丁憂終養等項經各督撫恭送到日皆照例行文辦理一面開闕銓選一面照例彙題遇有降罰處分亦照例彙題降罰革軄解任均繫一月彙題老病休致患病調理丁憂終養均繫半月彙題其候補州同縣丞以下微末軄銜督撫咨恭到日照例據咨斥革均附入一月彙題七年議準凡題奏内校對册籍事件如司官未經詳察致有遺漏舛錯者将司官照例議處未經察出之堂官免議十三年諭向來各處本章有題本奏本之别地方公事則用題本一己之事則用奏本題本用印奏本不用印其式沿自前明葢因其時綱紀廢弛内閣通政司藉公私之名以便上下其手究之同一入告何必分别名色著将向用奏本之處槩用題本以示行簡之意将此載入㑹典該部通行𫝊諭知之欽此十九年諭户部議覆陜西廵撫奏請估變西寧縣庫收貯段疋一摺此案先經該撫咨請部示戸部以不便據咨遽議駮令具奏到日冄行辦理一切政務惟論其事之可行與否若事在可行督撫業已咨部該部復行令具奏及奏到之時原不過照議覆準徒多徃返案牘之繁甚屬無謂况部臣奏準與督撫自行陳奏又有何别耶嗣後督撫咨商各部事件著該部将應駮者即行咨駮應準者亦即定議奏聞毋得沿襲陋習仍以具文從事将此𫝊諭各該部知之欽此一漏洩本章康熈十七年議準凡奉㫖事件未到部之先即行鈔𫝊報知者将𫝊報之人交部治罪該科給事中罰俸六月雍正五年遵㫖議定凡陳奏本章除㝷常通行事件照舊承辦外凡闗渉緊要之事督撫提鎮陳奏本章将副本掲帖用密封字様投遞通政使司收到密封副本堂官親拆别載册籍封固收貯各部院收到密封掲帖堂官親拆交司官密行收貯謹愼辦理其督撫提鎮有緊要事件及緝拏人犯之案移咨各部院亦密封投遞各部院堂官親拆交司官承辦在京各部院有緊要事件文移咨呈亦必密封投遞其知照各省督撫提鎮文書亦必密封遞發該督撫提鎮親拆收貯各省督撫提鎮以至州縣徃來公文亦将緊要事件密封投遞各本官親拆收貯如将應密之事並不密封以致漏洩者将封發官察恭如收受承辦官不行謹慎以致漏洩者将收受之承辦官察恭事理重者降一級留任輕者罰俸九月科道官察出不糾恭罰俸六月又議準凡提塘與衙役人等漏洩密封事件仍照定例分别議處外其雖非密封但未經御覽批發之本章即鈔寫刋刻圖利者該管官失於覺察該管科道不行察恭皆照漏洩密封事件例分别議處其紅本科鈔遍𫝊天下應令承辦官詳悉校對敬謹奉行如有增减錯漏者将承辦校對之員照錯誤本章例議處一遺失本章康熈六年題準遺失科鈔者罰俸兩月十七年議準遺失紅本者降一級留任二十五年議準官員将誥勅質當者革軄或蟲蛀損傷或潮濕破壊染汚及差人道路差錯者皆罰俸六月如被水火盗賊燬失者免議仍準題請重給雍正二年山西廵撫疏稱河東運判䕶理運司将欽頒運司上諭並未察收交代題恭奉㫖著免議此不過朕之訓飭諭㫖無甚闗礙嗣後朕之訓㫖或致遺失水濕染汚毁壞該督撫提鎭行文内閣奏明給與不必題恭該部知道欽此乾隆四年遵㫖議定凡已進呈之本章應行發出者如批本處未發内閣即行恭奏内閣未發部院即行恭奏該部院未經行文督撫即行恭奏不必轉相詢問若将進呈後之本章批本處及内閣遺漏未曾交出别經發覺始行察發将經手遺漏之員比照将表文遺漏遲延例罰俸一年同日該班不行檢察之員照不行詳察例罰俸六月奏事處亦照此例若已經交出到部而遺漏不行知照該處各咨行事件已經議結不行文該處者将遺漏行文之員照議處經手遺漏各員例察議至於已經移咨該處而他處或有遺漏未經知照者照遺漏行咨例罰俸兩月又議準凡有降罰承追等案一經奉㫖考功司即行文知照文選司其補官日帶於新任降罰者應於該員補官日文選司行文知照如有遺漏不行知照者将司官照遺漏行咨例罰俸兩月書吏治罪印信一誤用印信康熈九年議準官員應用堂印事件誤用司印應用司印誤用堂印及署事官兼轄官錯用印信皆罰俸三月倒用印信亦照此例處分雍正三年議準地方民務大小公事皆用題本用印具題本身私事皆用奏本雖有印信之官亦不準用印若違定例題奏通政使司衙門察恭交部照誤用印信例罰俸三月一漏用印信乾隆四年議準地方各官徃來文移以及呈報上司事件均於正面鈐印如有刮補字樣以及增注錯落接扣之處均鈐葢印信倘有遺漏鈐葢者照各衙門行移文書漏使印信律罰俸一年一印信糢糊康熈九年題準印信糢糊或不請換或本章咨文用印糢糊由部察出者将不請換印之官罰俸六月如督撫将更換情由不行咨題者亦照此例處分詳請更換之官免議如印信損壞已換給新印不将舊印繳送者亦照此例處分雍正八年議準鑄印局鑄送印信闗防筆畫錯誤将不行磨對之鑄印局各官罰俸六月不行驗明之堂官罰俸三月其領印之員於領受之時不将錯誤之處驗㸔聲明日後被人察出者将領印之員亦罰俸六月一妄用印結牌文康熈十五年議準官員豫給用印白結者罰俸一年又題準軄官擅寫牌文給與族人者革軄又議準濫給家僕門子印結捐納官軄及濫給因罪革退衙門人役印結復入衙門者皆革軄雍正四年議準地方各官妄用印信及非正印官而擅用印信者皆降一級調用十二年議準各省藩臬鹽道知府設有經歴凡文移徃來令其公同用印其經歴印信悉歸經歴自掌如擅将經歴印信收掌自用致生那移情弊該督撫題叅将擅收經歴印信自用之員照妄用印信例降一級調用又議準五城一應曉諭禁約等事應於各該地方通衢張貼印示外其一切官民舖户門首應令五城御史嚴飭各該司坊官不得濫給印示倘有不肖之人仍前濫給者該御史一經見聞立即題恭将該員照妄用印信例議處若繫吏役人等受賄求託本官給發者除該員照例議處外並将吏役交刑部治罪若該城御史見聞既實並不恭奏者或别經察出或被科道糾恭即将該城御史照不行詳察例議處冄順天府經歴照磨及大宛兩縣間有出給印示者應一例嚴禁倘有徇情濫給者亦照司坊官之例議處其不行恭察之各該上司照廵城御史之例議處一空白印信乾隆二年覆準各部院衙門行移事件司官囘明堂官用印将所行事件並用印數目登記號簿其在外各衙門下行牌票並上行平行文移均令鈐印編號一應空白悉令嚴行禁止倘有仍用空白事發将不行稽察之在内堂官在外督撫司道照不行詳察例罰俸六月不行回明用印之司官及仍用空白之府州縣等官皆照豫給用印白結例罰俸一年如有督撫司道向州縣提取空白文結者亦照此例罰俸一年五年覆準内外大小凡有印信衙門均於封印前一日酌量件數各用空白印紙並文移封套以備封印後遇有緊要公文之用仍各登記號簿在京衙門呈堂收貯外省衙門同印信在内衙存貯有緊要文書方行填用開印後除用去者登記册籍外将所存件數各堂官及各印官驗明銷燬如有官吏藉端作弊及該堂官該督撫及各上司不行察出者皆照禁止空白印信例分别議處書辦照例治罪一濫行出結康熈二十九年題準地方官代頂冒人員出結者革職雍正十二年覆準候選簡選人員例用同鄉京官印結凡出結各官務令本衙門設立號簿将出過印結縁由登記簿内毎至月終按照數目縁由彙造清册呈堂咨部察覈如册内無名即𫝊赴選人員究問倘有豫用空白印結者令該堂官照豫給空白例恭處一給結冒領建坊銀乾隆四年議準凡請領節婦建坊銀如繫再醮之人應行議處出結官者令各該處即将知情濫結與並不知情之處於咨䟽内據實聲明如知繫冄醮不應請領之人濫行出結請領者将出結之人照徇情給結例降二級調用如實繫不知再醮縁由冒昩給結後經自行檢舉者照不行察明給結例罰俸一年不行詳察之該管官照不行詳察遽為轉報例罰俸六月一隔屬用印買人康熈八年題準旗人買民人者用本管地方官印信若在隔屬官用印給與之官照拏解良民例降一級留任如有将定例以後所買之人説作定例以前年月日用印給與者将地方官并買賣之人皆加等治罪一那移年月用印康熈八年議準凡将定例後事件作為定例以前年月日期用印給與者将用印之官降一級調用一禁止無印小票乾隆六年覆準各省文武大小衙門凡一切差票均令鈐葢印信如無印信衙門即用鈐記所有硃標小票衙單永行禁止倘有仍用無印小票衙單者令該上司不時察報題恭将出無印小票之員照文移遺漏鈐葢印信例罰俸一年欽定大清㑹典則例卷二十一
