  text: 欽定四庫全書欽定大清會典則例卷六十一
  hash: sha256:a3547ee4fb8b36aef0371cbbc0e9685091c942791d80b13cf0cea3d6c8a57641
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_064-1a, image: WYG0622/WYG0622-0085a.png}
body:
  text: 禮部儀制清吏司耕耤一耕耤順治十一年世祖章皇帝躬祭先農壇行耕耤禮畢御齋宫慶今為成宫賜羣臣燕曰勞酒是年題準耕耤前一日順天府以龍亭三載躬耕耒耜鞭稻種青箱以采亭四載諸王從耕麥種榖種青箱九卿從耕豆種黍種青箱至午門外亭止順天府官奉耒耜種箱由左門入陳設於太和殿階下竢上御中和殿閲祭先農祝版畢戸部官奉入中和殿依次陳設上御殿閲視畢還宫戸部官奉出太和殿下授順天府官奉出午門置各亭内送耕耤所至日上禮服詣先農壇致祭畢御具服殿更龍袍王以下文武各官更蟒袍補服順天府官陳龍亭於采棚内左右陳采亭於采棚外東西從耕位禮部堂官奏請行耕耤禮導駕官同太常卿導上至耕位南嚮立從耕三王九卿各就耕位立不從耕王以下各官在席棚外序立鴻臚寺官贊進耒耜戸部尚書北面跪進耒耜贊進鞭順天府尹北面跪進鞭禮部鑾儀衞太常寺堂官導上秉耒三推黄耒駕以黄犢教坊司今為樂部和聲署樂工歌三十六禾辭順天府丞奉青箱戸部侍郎播種耆老隨後覆土畢鴻臚寺官贊受耒耜戸部尚書跪受耒耜贊受鞭順天府尹跪受鞭各置亭内禮部太常寺堂官導上御觀耕臺南嚮坐王以下文武各官按翼序立次三王各五推次九卿各九推皆朱耒駕以黝牛順天府屬官執青箱播種耆老隨後覆土畢各就侍班位立禮部尚書奏耕耤禮成導上由東階降出先農門乘輦教坊司作導迎樂至齋宫門樂止齋宫内大樂作駕至齋宫檐前降輦陞座樂止王公由左右門入文武各官由東西旁門入按翼序立丹陛樂作順天府尹率所屬官及耆老農夫行三跪九叩禮畢樂止由西門出率農夫終畝賜王公坐候耕畢順天府尹暨丞率大興宛平縣官由東門入報終畝鴻臚卿進至殿門外跪奏親耕既成禮當慶賀鳴贊贊排班王公於丹陛上文武各官於丹墀内各序立丹陛樂作贊跪叩興各行三跪九叩禮樂止諸王由殿左右門入貝勒以下各於原立位行一叩禮序坐賜茶畢大樂作上御後殿樂止光禄寺設燕畢禮部尚書奏請御前殿大樂作上陞座樂止王以下文武各官皆就原位行一叩禮序坐進燕教坊司作樂進酒王以下文武各官咸於坐位跪一叩復坐教坊司承應用大樂隊舞雜劇燕畢諸王出殿門就原立位貝勒以下咸起立鳴贊贊排班行一跪三叩禮各出齋宫門外祗候駕興鹵簿前導導迎樂作上還宫王公從衆皆退又奏準耆老每人賞布一疋康熙十一年聖祖仁皇帝親行耕耤禮前期一日遣官祗告奉先殿是年耕耤日因值日壇齋戒停止行慶賀禮筵燕作樂雍正二年世宗憲皇帝祭先農壇行耕耤禮前期一日祗告奉先殿是年題準躬耕帝耤教坊司領樂官四人頂帶老人四人工歌三十六禾辭者十有二人司金司鼓司版者各六人麾五色采旗者五十人執叉扒鋤箒披簔戴笠者二十人順天府耆老三十四人上農夫十人中農夫十人下農夫十人皇帝右秉耒左執鞭耆老二人牽牛上農夫二人扶犁工鳴金鼓歌三十六禾辭招颭采旗唱和隨行三推三返畢次從耕三王各耆老一人牽牛農夫二人扶犁五推五返畢次從耕九卿各耆老一人牽牛農夫二人扶犁九推九返齋宫進燕丹陛樂作奏雨暘時若之章進酒管絃樂作笙簫合奏奏五榖豐登之章進饌清樂作奏家給人足之章餘儀與順治十一年同又奉㫖今年耕耤朕四推四返御齋宫賜王公大臣茶停止筵燕賞耆老農夫布各四疋欽此八年奏準二月十二日行耕耤禮前一日遇素服日期停止閲農器榖種至期行親耕禮如儀停止筵燕乾隆三年皇上舉行親耕禮停止筵燕與雍正二年同五年奏準三月初十日屆耕種之期適逄閏歳節氣尚寒此次令順天府尹照直省督撫例行至來歳春和再請舉行親耕之禮八年耕耤設樂用和聲署正二人丞二人率署史歌禾辭者十有四人司金司鼓司版司篴司笙司簫者各六人麾采旗者五十人董以樂部典樂一人九年親耕奉㫖朕四推四返不御齋宫不賜茶三王一推一返後九卿即行從耕欽此十三年車駕東巡遣官致祭先農壇其耕耤禮令順天府尹照直省督撫例行二十年改齋宫為慶成宫二十三年諭吉亥耤畝所重劭農黛耜青箱畚鎛蓑笠咸寓知民疾苦之意而設棚懸采以芘風雨義無取焉吾民凉雨犁而赤日耘雖襏襫之尚艱豈炎濕之能避且片時用而過期徹所費不啻數百金是中人數十家之産也其飭除之欽此一直省耕耤雍正四年議準奉天直𨽻各省於該地方擇地為耤田以雍正五年為始每歳仲春府尹督撫及府州縣衞所等官率所屬耆老農夫行耕耤禮該督撫將設立耤田畝數報明戸部禮部存案五年議準直省各擇東郊官地潔淨豐腴者立為耤田如無官地動支帑銀置買民田以四畝九分為耤田每歳耕耤之日祭先農禮畢各官咸易蟒袍補服省城督撫秉耒知縣執青箱知府播種府城知府秉耒佐貳執青箱知縣播種州縣正印官秉耒佐貳執青箱播種專城衞所正印官秉耒如無屬員即選擇耆老執青箱播種耕時用耆老一人牽牛農夫二人扶犁悉照九卿之例九推九返農夫終畝耕畢各率耆老農夫望闕行三跪九叩禮其農具用赤色牛用黒色箱用青色所盛耔種各從其土之宜即著守壇農夫灌溉耤田地方官不時勸課將每年所收米榖及用過粢盛數目造册報布政使司送戸部覈實至各省耕耤日期每歳十一月頒時憲書後交欽天擇日由部奏請欽定通行奉天府府尹直𨽻各省督撫轉飭所屬同日舉行永著為令是年諭嗣後耕耤日爾部豫先擇定日期奏明行文各省督撫同日一體遵行仍將遵行耕耤日期奏聞欽此又覆準吉林黑龍江二處將軍照各省督撫府州縣衞所之例該將軍毎歳舉行耕耤之禮親蠶一親蠶雍正十三年議準京師於北郊擇地建先蠶壇每歳以季春已日遣禮部堂官一人承祭直省各府州縣均於北郊設立先蠶壇以季春已日致祭一切禮儀均依祭先農典禮乾隆元年議準停止建立先蠶壇改立先蠶祠宇至期遣禮部堂官一人承祭其各省蠶壇皆罷設七年議準皇后親饗先蠶暨躬桑禮分兩日舉行每歳以季春之巳吉日祭先蠶躬桑以蠶生未眠之前風日晴和為良日若致祭之明日蠶尚未生竢蠶生時内務府具奏若蠶已生即於是日進筐鉤皇后御交泰殿閲視又明日行躬桑禮又議準皇后躬桑從採桑者九人妃嬪二位公主福晉以下輔國公夫人以上三人文官左副都御史等官以上武官副都統暨二品官以上命婦共四人公主福晉夫人等由宗人府開送大臣命婦由内務府開送均於前期一月移取無事故者奏請欽㸃又定設蠶宫令一人丞一人經理蠶務以首領内監充補由宫殿監督領侍遴選列名奏請欽㸃又定設蠶母二人於内外命婦中擇年髙迪吉嫻於禮儀者為之總理禮儀之事不必移居蠶室皇后躬桑率蠶婦以從獻繭奉繭以進皇后繅三盆手相其儀蠶婦二十七人以舊經内苑育蠶熟悉蠶事者為之居蠶室朝夕飼養又議準執事女官典儀二人掌奏請皇后行禮之儀贊引二人掌恭導皇后行禮之儀傳贊六人掌分導從採暨蠶母受筐唱贊行禮之儀對引二人掌引導前引十人在對引前導引相儀二人在皇后後隨宜襄贊補闕八人凡執事有遺闕者補之前期三月内務府列應執事人名奏請欽㸃命下之日令内監監視習儀禮成之後分别賞賚臨期内務府請㫖行又議準皇后採桑時照耕耤三十六禾辭之例唱採桑歌執采旗者四十人司金鼓版六人司笙簫篴十有八人歌者十人在桑林外東西序列咸以内監充之先期令内監監視演習又議準繭成之日蠶婦報蠶宫令蠶宫令報内務府擇獻繭及繅絲吉期以聞及期蠶母率蠶婦擇繭之圓潔者貯筐獻皇后皇后受繭以獻皇太后皇帝仍分賜妃嬪訖皇后率妃嬪親臨織室蠶母蠶婦全獻繭之所登者相儀命婦奉盆水蠶母納繭於盆皇后三繅妃嬪五繅畢遂布於蠶婦之吉者使繅而朱緑元黄之以供郊廟黼黻之用九年奏準賞執事女官皆表裏各二疋蠶母各銀二十兩蠶婦各銀十兩欽定大清會典則例卷六十一
