金儀測象玉律定時四野八荒洵不遐遺淀有蘺隰有葹對時育物萬邦是綏省方設教用致雍熙無封靡于爾邦惟日孜孜六觧咨我三公及爾庶司豈敢怠安無平不陂建國親侯王者無私卜云襲吉昆命元龜農事告成秋以為期倬彼雲漢奎畢井觜揆文奮武營壘車騎象緯昭囘聖人法之以補以助上繼姚嬀億萬斯年壽考維祺整法駕揚華旗六軍雷動萬馬星飛白山嵃嵃綠水澌澌騶虞至鳳凰儀于疆于理王心則怡七觧𣺌渺川原坦然逶迤遺秉滯穗如京如坻各峙乃粻以饗我師鳥獸充牣碩大蕃滋莫不震疊永藉保釐七騶既馭萬衆咸随鍧鍧鼓鐸幡然旌麾逐獸追禽大㦸長鉟為鐃為鐲載常載旂左律右鉞平於有司瞻彼翠華朱英㽔㽔星旗月鈒錦韀珠戣禮百神奠四維王用三驅勿競厥威我求懿德永王保之八觧張皇六師如虎如羆天休震動周道驅馳䇿勲在廟莫不寅威戢千韜矢説禮敦詩天子是毗九觧灼灼芙蓉花毵毵楊柳枝旜旐婀娜畫龍與螭干盾騰拏逐豹與麋湛湛甘露酌以玉巵陛下千萬嵗撫御萬國歸銜羈十解王㑹有圗天葩芬竒爻閭赤帟元繚碧基文蜃大蠏孔鳥臯鷄隃冠尊耳露犬星施白鹿黄騏獻其貔皮在彼澤宫璧水瀰瀰樹爾侯矣射熊與貍槐宸高聳􅁄路朋熹鳴葭駐䍐麗日和颸四牡騤騤以車伾伾飲至言歸十一解骖四鸞駕六螭彤雲分五老珠露浥三峗訪姑射拜希夷執衡與規循理因資昭假遲遲㳟已無為十二觧誕敷文德懷柔神祇天命靡諶念兹在兹周原稼穡小民之依蠲租賜復王言如絲裁成輔相於鑠純禧首山之陽毋采爾薇商山之顔毋采爾芝三老五更惠和宣慈有馮有翼爾性爾彌袒而割牲謙謙是撝示我周行瑟鼓笙吹十三解矗矗恒山幽冀之治絳雲紫霞岐岐嶷嶷青書綠笈神所䕶持包王孕帝駕軒鑠羲元泉神草瑞勒豐碑爰命太常爰詔后䕫式祀上帝饗以騂犧獻琮璧奏咸池奎聨璧合星斗陸離洞簫玉琯鳯羽麟差十四觧中澤有葵南山有桋豈弟君子佩玉履􅋒遭逢明盛文煥功巍三墳五典煌煌麗辭願續雅頌永鎮厜㕒欽定大清㑹典則例卷一百一
