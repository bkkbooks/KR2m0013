body:
  text: 樂部和聲署鐃歌大樂章大清朝第一大清朝景運隆肇興俄朶奄有大東鵲銜果神靈首出壹戎衣龍起雲從一解雷動奏膚功舉松山拔杏山如捲秋蓬天開長白雲地蹙凌河凍混車書山河一統聲靈四訖萬國来修貢二解皇宅中垂綂瓜瓞唪唪聖繼聖功德兼隆昇平頌怙冒如天恩澤濃三解人壽年豐時雍風動荷天之寵慶宸遊六龍早駕一朶紅雲奉扈宸遊六師從幸萬里歡聲共四時仗第二御句芒春載陽震位峙東方順時令駕蒼龍骖吉良見垂虹青䓑漸芳行慶施惠恩波浩蕩一解御祝融晷正長南極星輝朗駕朱路萬騎騰驤賛俊傑遂賢良二解蓐收節露華初降金風乍凉兑列西方載白旗乘戎路移天仗萬寳告成一人有慶天垂貺三解顓帝司方水泉始涸天際彩虹藏乘元路駕鐵驪雲衢晃瀁萬疊明霞奉太陽四時節物邀歡賞四解皇謨聖德欽無兩舜日光天壤花明彩仗齊雲暖龍旗颺際昌時咸翹企仙輿降際昌時咸翹企仙輿降承天眷第三承天眷際風雲萬國車書奉一人衣冠快覩唐虞盛九域抒丹悃殊荒重譯盡来庭和氣召嘉禎一解稽古訓溯昌辰元首明哉勵股肱一心敬怠丹書儆宵旰不遑寜日新又日憲湯銘翼翼更欽欽二解端不為繁華麗錦繡春端不為玉樹菁葱太液澄喜今日調和玉燭烽煙靖不敢忘百年有備軍容整那辭得陳師鞠旅擁旄旌皇衷切憂盛更危明三解㤗階奕奕璣衡正功業麟兮炳千春清宴歌億載登豐慶喜金支紛旖旎蓬山境喜金支紛旖旎蓬山境貢琛球第四琛球輸貢外藩歸化隸版圗正朔咸尊奉樂浪郡在海東安南國粤嶠闢蠶叢日本國畏威震悚琉球國奉朝請與内臣同一解萬邦虎拜咸修貢干羽何湏用東風入律吹干呂青雲涌海安瀾更上獻河清頌海安瀾更上獻河清頌錦繡乾坤第五錦繡乾坤佳麗御世立綱陳紀四朝輯瑞徵師濟盻皇畿雲開雉扇移黎民引領鑾輿至安堵邨邨颺酒旗恬熙御鑪中靉靆瑞煙霏恬熙御鑪中靉靆瑞煙霏一解鸞聲嘒嘒来雲際九奏韶鈞沸觀光仰赤球扈從盈朱芾奉皇􅂬晝三接天顔喜奉皇歡晝三接天顔喜中天盛世第六中天盛世鬯安寜瑞麥嘉禾表歳成騶虞白象出郊坰共祝吾皇聖嵩嶽欣傳萬歳聲葱蘢佳氣滿都城萬里黄圗鞏帝京衣冠文物際時亨海隅寜謐無邊警巷舞衢歌樂太平喜今日金甌一統萬年清徧閭閻操縵歌風絃誦興更郊原野蠶成繭柘隂輕一解時和歳稔調金鼎鳳扆花相映青疇麥兩岐黄隴禾同穎屬車臨喜萬歳聲遙應屬車臨喜萬歳聲遙應奉宸歡第七奉宸歡天單厚風光輦路浮遐阡邇陌都是黄雲覆羽盖春旂斒似繡正田家作苦勸耕時休馳驟金鐙鞭敲豹尾懸車後藏富於民於民藏富晴開五雲第八晴開五雲移翠輦臣庶咸歡忭載見兮載見懷遠復懷遠聖人朝縵雲歌復旦一解際中天一氣鴻鈞轉習習和風扇龍津燕影低柳陌鶯聲囀望龍旌迢遞過晴巘望龍旌迢遞過晴巘瑞雲籠第九彩仗瑞雲籠度晴巒幾重金鑪高擁香煙浮動杳靄大夫松和鸞到處和鸞到處百靈從玉檢金泥編珠毓貺不數漢家封駕六龍第十駕六龍御翠華帝德光天下薄海内總一家四徼外正朔加者聲靈赫濯被四表曁荒遐扈翠華第十一扈翠華兮載馳御帝車兮載脂命風伯兮叱雲師灑道兮如絲清飇兮應時四時念第十二仲春時司馬教振旅喜韶和綠荑芳草滋平楚執鐃執鐸兼賁鼓盤旋處如組還如舞一解念春日萬彚初榮膴況田家負耒牽牛方作苦解罝去絡仍弛罟天心祜應節彌甘􅒴二解仲夏時司馬教茇舎暢恢台銛蘆茂草披平野名州名邑驅征馬行圍罷落日征袍卸三解念夏日赤輪炎似炙況我民體足霑塗泥没踝櫛風沐雨無晨夜休嚴駕沖黙居臺榭四解仲秋時司馬教治兵喜颯爽金風初勁角弓鳴載旂載旐孑旜旌戢軍營萬寳正秋成五解念秋日氣爽又風清況郊原農事方終稼旣成用遵周禮詰戎兵望龍旌壺漿父老迎六解仲冬時司馬教大閲正平郊獸肥草淺寒威冽建旗樹表疏行列多懽悦誰道裘如鐵七解念冬日一陽初動脈況南郊陶匏明水將誠潔草甲方萌芽未茁居金闕萬國来朝謁壯軍容第十三壯軍容威四方礪戈矛森甲仗剖文犀七屬爛如銀帯鮫函璀璨難名狀者的是金城保障一解有純鈎巨闕和盤郢魚腸更有湛盧紫電承影含光又豪曹似水素質如霜賽莫邪干將二解官笴最精良象弭魚服竹箭弧桑更紅翎白鏃飲羽危梁控弦徹札有猿臂軍中飛將三解潤銛鋒鸊鵜初瑩鎔堇錫龍雀成雙文似靈龜象侔白虎是靈寳亦曰含章比昆吾切玉百辟純鋼四解垂氏弦木檿弧斯剏冬幹春膠烏號繁弱明月當弸朗九合既成二弓交韔五解振金鐃鳴金鐲畫角悠揚月明時風静夜清吹還三唱踴躍軍心壯似鳳鳴又如鶴唳更籌響刁斗傳千帳六解表和門旌旆揚象七星建九斿置九章藉翡翠鸞鳳煒煌曵招搖韜素錦黄龍大纛在中央七解鏤衢鞍翠羽蹙金梁珊瑚鞭瑪瑙勒靡麗非常啟譁囂盛朝不尚但推轂求良將雲行雷動正正堂堂日初昇第十四日初昇雲光曉旌旗暖龍鱗耀望雲山紫翠千重度耕隴桑麻隐約黎民􅂬樂道餘糧棲畝又長嘉苖一解不讀書知忠孝作與息耕和鑿玉泉流膏雨千塍晴雲飲炊煙萬竈黎民歡樂道餘糧棲畝又長嘉苖二解景融怡風料峭太和㑹豐年兆嗿其饁士女媚依鎛斯趙曽孫迎勞黎民歡樂道餘糧棲畝又長嘉苖三解食君恩深難報願聖壽如山岳稼既同跂脚髙眠戸不閉官清訟少黎民歡樂道餘糧棲畝又長嘉苖四解翠華臨霓旌導遵平陸登山嶠但則見蔀屋衡茅一个个體温腹飽不知不識日上眠方覺惟祝君王真有道厪恫瘝薄賦輕徭敷敎澤愛親敬老黎民歡樂道餘糧棲畝又長嘉苗道餘糧棲畝又長嘉苗嘉祥曲第十五溯嘉祥華平朱草毓中唐龍圗授龜書畀擾澤馬駕騰黄延喜玉從天貺屈軼草階前長一解睹榮光白麟赤雁與芝房游河渚赤文綠字舒蘭葉五色成章仙􅕴葉葉滋春圃瑞羽鏘鏘鳴女牀亦有祥麐一角和鳴鳳在高岡二解日重光戴冠抱珥出扶桑月重輝星重潤玉繩轉南極熒煌竹葦露甘如醸蒲箑風如秋爽三解舞鸞凰非煙樓閣繡衣裳寳鼎見騶虞出浮沆瀣泛天漿稽往牒探珊􅃠陳瑞物難名狀四解唯我皇不矜異物與殊祥闢四門明四目求俊乂顯賢良愛稼穡垂旒纊措吾民春臺上練吉日第十六練吉日兮選佳辰百僚具兮輿衞陳屏翳弭節兮玉宇無塵煌煌兮帝車奕奕兮天輪一解命太常兮奉牲用昭告兮百神潔粢盛兮肅明禋將展軨兮效駕行下觀兮勤民二解甸師清畿兮縟草如茵野廬掃路兮香霧承輪封人設枑兮左墄右平掌舎具儀兮爰象太宸玉輦兮鏘鏘屬車兮隐轔三解扇㣲颸兮清幰扈細靄兮朱輪備天官兮周衞盛輿服兮時廵虎賁兮肅肅徒旅兮駪駪四解前驅兮按部後隊兮如鱗徵萬玉兮警塗詔弭策兮八神五解軼浮景兮騰青霄駟蒼螭兮骖絶塵陵高衍兮嵱嵷陟巒阜兮輪囷六解仰皇輿兮肅震岳獻圗兮川貢珍若湛露之晞朝陽兮儼列宿之拱北辰七解䕃華蓋兮翊句陳綃紈綷䌨兮旟旐逡巡配帝居之元圃兮象太乙之威神八解旖旎兮霓旌八方兮列陳表朱兮離位植皂兮元𡨕飛縞兮象兑峙靑兮直震九解流星旄電爥兮盼坱圠以無垠九旂紛而揚斾兮五輅委蛇以接軫盛天下之壯觀兮將豐鎬之是遵頌高山之荒作兮仰一人之饗親謁珠丘第十七謁珠丘杳靄松楸展几筵敬仰先猷國家積累惟忠厚篤公劉一解緬音容霜露春秋設綴衣大貝天球愾聞僾見如親覯溯前庥二解奉犧尊㫖酒思柔覲羮牆蘋藻初羞萬方玉食尊親久無湏效漢代衣冠月出游三解寢園展祀尊堂構文謨武烈光前後蔥蘢佳氣浮縹緲祥雲繡億萬載升恆景福從天祐四解高山天作扶輿秀遼海環其右鍾祥瑞氣蟠翊運靈光茂萬斯年永奠定天同壽萬斯年永奠定天同壽御黼座第十八御黼座肅朝儀沛宮法駕陳元㑹雲深處天門詄蕩太極崔巍一解九賔設彤闈啟扶桑初擁曈曨日傳臚句羣僚濟濟百辟師師盡呼嵩冠帯委蛇二觧獻琛球圗王㑹呼韓稽顙瞻雲日無中外雕題鑿齒鳥弋黄支慶躬逢盛世威儀三解中天華闕浮佳氣締造經營萬載基世德念豳岐天澤陳冠履看到處祥颸晻藹羽盖葳㽔看到處祥颸晻藹羽盖葳㽔長白山第十九長白山遠峙開原冠髙峯峻極于天巉巖兮插漢千里兮㠝岏一觧考山經曽傳不咸稽地志亦號商堅唐名兮太白有潭兮在巔二觧闥門潭萬頃迴湍鼓天風㶑灎文瀾源深兮流廣三江兮出焉三觧鴨緑江流自山南混同江北海之源愛滹兮東注萬折兮千盤四觧醫巫閭縹緲雲端桃花洞下有飛泉嚴冬兮不冰常燠兮無寒五觧木葉山石磴盤桓華表山鶴影蹁躚乳峯兮懸澑井冽兮寒泉六觧石門谿屹立巖前儼雙扉雲壑連綿迴合兮諸峯窈窕兮羣巒七觧松花江波影澄鮮北流兮並海西旋混同兮合流自古兮長川八觧遼河兮泙湃狂瀾遼澤兮泥淖蹣跚布土兮為橋既成兮孔安九觧飛瀑巖瀑布常懸翠雲屏雲影連蜷聖水兮傾盆萬松兮晝寒十觧平壌城箕子名藩大寜城漢曰新安演範兮陳疇帯礪兮河山十一觧鍾扶輿虎踞龍蟠植靈基天作髙山拱衛兮陪京永奠兮萬年布爾湖第二十布爾湖明如鏡庫里山秀列雲屏風来千頃碧雨過數峰青萃扶輿淑氣是天地鍾靈一觧有天女兮降生池畔吞朱果兮玉質晶瑩珍符脗合爰生聖二觧神靈始生即能言睿知聰明不待學徇齊敦敏至德莫能名三觧日角珠庭稽古帝握褒履已更龍顔戴干荷勝岐嶷總天生四觧當是時厥有三姓角雌雄亂靡有定蠻觸互相争五觧汲清泉言至河濵見真人如日如雲稽首共来迎六觧覩堯眉衆姓咸驚是非常天不虚生葵藿早輸誠七觧念吾曹原非好爭今有主得荷生成從此戢戎兵八觧定三姓尊為貝勒似岐州虞苪質成荒度始經營九解溯從来誕聖厥多瑞徵華胥履跡青雲繞身樞星照野虹流太清瑤光貫月元鳥承罌載稽典籍辭難罄肆皇清至人首出乾坤篤生自羲昊軒農瑞籙祥經莫與京建遼陽第二十一建遼陽爰築崇墉矗金城兮萬雉控列辟兮朝宗遠邇兮歸懷庶邦兮是同一觧懾天威爭執鞭弭歌孔邇願受帡幪興朝正朔咸尊奉遂荒大東二觧有哈逹首鼠両端數渝盟自外陶鎔天兵一舉咸驚悚似草從風三觧有輝發反覆不常外生成夜郎自雄六師迅發如雷動棄甲投弓四解有烏喇包藏禍心逞螳臂欲試車衝戈鋋一指雕弧控似掃蚍蠓五觧有葉赫憑陵負嵎似游鱗翔洋釡中狡焉潜結朝鮮衆朝夕羽書通六觧有朝鮮僻處海濵與葉赫狼狽交通蛩蛩甘草相承奉結壘似屯蜂七觧閔明季陽九方丁如懸罄杼軸其空朝鮮葉赫相愚弄勢蹙不知窮八解四路兵掎角来侵無紀律誰適為雄一時烏合無拳勇號令馬牛風九觧五十萬封豕長蛇肆貪狼非不恟恟只緣逐利非心奉臨事各西東十觧恣侵陵師出無名我天朝用詰兵戎堂堂八陣天威聳落葉掃秋風十一解壹戎衣為救黎元曽不費蒿矢桃弓遼陽建後金湯鞏王業首岐豐瀋陽城第二十二瀋陽城王氣所鍾氤氲五采縹緲如龍信佳哉欎欎葱蔥一觧析木津箕尾之東上連天弁右抱神宮濟津梁霄漢垂虹二觧近北極象逼穹窿元菟置郡都䕶安東越金元頻建畿封三觧我皇朝氣運方隆此惟與宅用恢厥功相隂陽宅土之中四觧維廣寜仡仡崇墉石梯連磴香水春溶十八盤萬樹青松五觧若旅順臨海居衝番彞麕集估舶雲從轉南漕天庾斯充六觧取廣寜唇齒圻封惟兹旅順亦是率從啟鴻圖駿烈豐功七觧左朝鮮右際雲中卜維洛食龜筮斯從叶天人是為大同八解帯渾河滄海朝宗白山控峙石柱雲封是神臯