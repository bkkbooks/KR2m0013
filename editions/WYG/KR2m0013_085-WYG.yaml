body:
  text: 康熙六十年四月初六日奉㫖朕披覽史冊於前代帝王每加留意書生輩但知譏評往事前代帝王雖無過失亦必刻意指摘論列短長無一人為帝王公言者朕見厯代帝王廟每朝崇祀不過一二主或廟享其子而不及其父或配食其臣而不及其君皆因書生議論而定甚未允當況前代帝王曾為天下主後世之人俱分屬臣子而可輕肆議論定其崇祀與不崇祀乎今宋明諸儒人尚以其宜附孔廟奏請甚多至古帝王宜入廟崇祀從未有人奏請前代帝王皆無後裔後之君天下者繼其統緒即當崇其祀典朕君臨宇内不得不為前人言也朕意以為凡曽在位除無道被弑亡國之主此外盡應入廟即一二年者亦宜入廟崇祀爾等將朕此㫖寫出㑹同從容詳議具奏欽此康熙六十一年四月初三日奉㫖這所議應崇祀之處皆是但其中尚有應詳細斟酌者明代甚近朕少時嘗問有明遺舊宦官愍帝無甚過失皆由萬厯泰昌天啟時衰微及至愍帝雖勵精圖治終不能補救也國之滅亡皆伊祖所壊於愍帝何涉稗官野史所載豈足為憑愍帝不可與亡國者一例同論而萬厯泰昌天啟實不應入崇祀之列至從前所配享之功臣大槩皆開國元勲居多如明之徐達不過一草莽武夫劉基係元之進士皆遭遇成功遂以元勲配享或有治安之世輔佐太平有功君國者反不得與配享之列是皆未為允當大學士㑹同九卿詹事科道將此等處詳悉從容確議具奏欽此乾隆四十九年七月初二日奉上諭朕因覽四庫全書内大清通禮一書所列廟祀厯代帝王位號乃依舊㑹典所定有所弗愜於心敬憶皇祖實録有勅議増祀之諭令查取禮部原議紅本則係康熙六十一年十一月内具題爾時諸臣不能仰體聖懐詳細討論未免因陋就簡我皇祖諭㫖以凡帝王曽在位者除無道被弑亡國之主此外盡應入廟即一二年者亦應崇祀煌煌聖訓至大至公上自羲軒下至勝國其間聖作明述之君守文繼體之主無不馨香妥侑不特書生臆論無能仰喻髙深即厯代以來升歆議禮未有正大光明若此者也乃㑹議疏内聲明偏安亡弑不入祀典而仍入遼金二朝不入東西晉元魏前後五代未免意有偏向視若仰承聖意而實顯與聖諭相背朕意若謂南北朝偏安不入正統則遼金得國亦未奄有中原何以一登一黜適足啟後人之訾議即因東西晉前後五朝有因簒得國擯而不列如操丕不得為正統之例殊不知三國時正統在昭烈故雖以陳夀三國志之尊魏抑蜀而卒不能奪萬世之公評至司馬氏簒竊以還南朝神器數易如宋武帝崛起丹徒手移晉祚自不能掩其簒奪之罪其他雖祖宗得國不正而子孫能繼緒承休即為守文中主亦不可概從缺畧況自漢昭烈以至唐髙祖統一區夏時之相去三百餘年其間英毅之辟節儉之主史不絶書又安可置而不論至於後五代如朱温以及郭威或起自冦竊或身為叛臣五十餘年更易數姓中華統緒不絶如綫然周世宗承藉郭氏餘業憑有疆域尚不失為令主此而概不列入則東西晉前後五代數百年間創守各主祀典缺如何以協千秋公論他若元魏雄據河北地廣勢强太武道武勤思政理講學興農亦可為偏安英主並當量入祀典以示表章朕前命館臣録存楊維楨正統辨諭内詳晰宣諭以維楨所辨正統在宋不在遼金之説為是所以存春秋綱目之義見人心天命之攸歸且檢閲孫承澤春明夢餘録所載明代崇祀古帝王位號原未列遼金二朝今帝王廟崇祀遼金而不入東西晉前後五代似此互相入主出奴伊於何底是皆議禮諸臣有懐偏見明使後世臆説之徒謂本朝於厯代帝王未免區分南北意存軒輊甚失皇祖降諭之本意也至明之亡國由於神熹二宗紀綱隳而法度弛愍帝嗣統時國事已不可為雖十七年身厯勤苦不能補救傾危卒且身殉社稷未可與荒淫失國者一例而論是以皇祖睿裁將神熹二宗撤出而愍帝則特令廟祀褒貶予奪毫釐不爽實千古大公定論乃諸臣於定議時轉復將漢之桓靈増入豈未思炎漢之亡亡於桓靈而不亡於獻帝乎從前定議未將東漢全局詳審論斷轉使昏闇之君濫叨廟食所議未為允協夫自古帝王統緒相傳易代以後饗祀廟庭原以報功崇徳至於嚴簒竊之防戒守成之主或予或奪要必衷於至當而無所容心於其間方協彰癉之義所有厯代帝王廟祀典著大學士九卿更行悉心詳議具奏並著於定議後交四庫館恭録皇祖諭㫖並朕此㫖於通禮廟饗卷首以昭殷鑒厯朝垂示萬年之至意欽此乾隆四十九年七月二十八日奉上諭據大學士九卿等㑹議増祀兩晉元魏前後五代各帝王一摺並聲請唐憲宗金哀宗應否一體増祀等語憲宗處唐中葉各鎮節度憑陵跋扈僭叛不臣憲宗命將專征削平淮西厥功頗偉在有唐一代中尚屬英主其末年被弑係禍變猝乘與荒亂失徳召變致衅者不同至金哀宗處衰弱之時國勢已不可問推其致敗之由實因熙宗海陵淫虐階厲哀宗自縊殉國與明之愍帝事同一例自應一體増祀餘俱著照所議行欽此
