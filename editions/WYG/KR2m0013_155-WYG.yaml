  text: 欽定四庫全書欽定大清㑹典則例卷一百五十一
  hash: sha256:e5a0d650b008dedfba2a9b9accdee2bb15fb55ef59ead34a46d3d725ffc60c4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_155-1a, image: WYG0624/WYG0624-0710a.png}
body:
  text: 通政使司一題本定例順治二年定在外督撫鎮按等官一應漢字本暨在京各衙門除題本外一切奏本不分公私均赴司投進違者叅駮雍正三年議準督撫提鎮等官遇地方公事皆用題本本身私事皆用奏本違者叅處七年定嗣後舉劾屬官及錢糧兵馬命盜刑名一應公事照例用題本外其慶賀表文各官到任接印離任交印及奉到勅諭頒發各直省衙門書籍或報日期或繋謝恩並代通省官民慶賀陳謝或原題案件未明奉㫖回奏者皆屬公事應用題本至各官到任升轉加級紀録寛免降罰或降革留任或特荷賞賚謝恩或代所屬專員謝恩者均應用奏本槩不鈐印乾隆四年議準凡賞賜書籍如繋槩行頒發各衙門存貯交代者其陳謝應用題本若賞賜本人祗領者其陳謝應用奏本如代屬官謝恩即非專員在二三人以上者亦皆用奏本十三年諭向來各處本章有題本奏本之别地方公事則用題本一已之事則用奏本題本用印奏本不用印其式沿自前明盖因其時綱紀廢弛内閣通政使司藉公私之名以便上下其手究之同一入告何必分别名色著将向用奏本之處槩用題本以示行簡之意欽此一本章格式順治八年題準每幅六行每行二十格平行寫十八字章内稱宫殿者擡一字稱皇帝稱上諭稱㫖稱御者擡二字稱天地宗廟山陵廟號列祖諭㫖者均出格一字寫首行列衙門官銜具奏人姓名末幅具年月日内外一式遵行康熙三年題準督撫提鎮等官題奏本章無貼黄者由司題叅四年題準内外衙門清漢字黏連本章無貼黄者免叅若止具漢字而無貼黄者題叅一本章體制順治初年定不論題奏本章不得過三百字貼黄不得過百字雍正二年議準凡興利除弊奨善懲惡一應條奏𦂳要本章務須詳明暢達其貼黄亦不得遺略含溷均不限定字數乾隆三年議準題奏本章不得濫用頌揚套語屢奉諭㫖訓飭若外省恭謝陳情本章乃臣子感激隆恩及敬抒悃忱之意原與陳奏地方事務不同倘過於簡略亦非拜颺之體且稽古人陳謝箋表類多文藻可觀雖繁簡不一未有徑情直致者然或堆砌套語不切情事其中悃忱轉為虛文所掩究無當於敬謹之誼嗣後督撫提鎮各官恭謝陳情等本或用駢體或用散叙務期能達情愫而止不得濫用浮辭重複見長十五年議準凡直省錢糧命盜及因事敷陳之本章情節不同勢難畫一者毋庸拘定其通行典禮或循例題報如鄉試入闈耕耤日期學政報滿考試教職節婦請旌照案緝拿彚題過失殺人等件事體既屬相同辦理應歸畫一務遵定式勿得繁冗一具本人員在京六部及院寺等堂官在外文官督撫武官将軍都統提鎮其餘均令上司官代奏順治二年題準在外督撫鎮按到任及慶賀本章均準封進謝恩槩免司道等官事件聽督撫代題總兵官除事闗軍機及兵馬錢糧外其餘悉歸督撫題達違者執法題叅十年題準各省大計之年布按都司運司及府州縣等官均具本造冊送司康熙十年議準各省大計布按都司運司仍照舊例封投本冊其府州縣等官停止具本造冊又定在京官員事闗通省沾恩合辭陳謝之本皆赴司恭進由司送閣三十七年奉㫖文官侍郎以上武官總兵以上如有遺本準其投遞通政使司封進以下官員如有遺本一槩駮回五十一年議準尚書都御史侍郎副都御史宗人府府丞通政使司通政使詹事府詹事大理寺卿太常寺卿順天府尹光禄寺卿太僕寺卿僉都御史今裁左右通政今改通政副使大理寺少卿詹事府少詹事太常寺少卿鴻臚寺卿太僕寺少卿國子監祭酒通政使司左右叅議今改通政使司叅議光禄寺少卿鴻臚寺少卿均許進遺本其不及具本者聽乾隆三年議準直省所進本章僅有隨本批文一紙並無注銷總冊其間遲誤無由稽考遺失更難覺察且督撫提鎮一遇升遷轉調新舊交代之際倘有不法書吏提塘營私作弊将𦂳要本章藏匿沉閣均未可定嗣後直省督撫提鎮等官無論升任調任見任務将奏過本章開明月日備注事由詳列數目按季造具印冊二本一送司一送内閣以便察覈又議準各省将軍副都統均防守大員各有題奏本章應照督撫提鎮之例将奏過本章每季造具印册咨送内閣及本司察覈一接受本章雍正二年題準每年封印後所到本章令提塘官送司驗收貯庫如有𦂳要事件到日即封送内閣轉奏其尋常本章均竢次年開印之日校閱明白封送内閣七年奏準各省督撫提鎮投遞各衙門掲帖凡闗渉𦂳要事件均用宻封投遞其尋常事件亦不許先行刋刻傳播皆經屢次定例遵行但各省投遞掲帖不免别封豫投之弊而通政使司止按期收本不察掲帖之先後分發提塘投送或致先期洩漏因而鑽營謀幹舞文弄法亦未可定且拜疏未上具掲先行先後失序亦屬非宜嗣後督撫提鎮凡有掲帖均隨本章同發其掲帖封套注明月日開單送通政使司稽覈於送本次日發提塘分投各衙門如提塘私行探報先期傳播者察出送刑部治罪十一年奏準向例直省本章由司接收将正本封固移送内閣副本貯庫備案後經條奏正本副本并交内閣以致本司無全本册案無憑稽考嗣後直省本章除正本副本外亦照各部院之例隨本開具掲帖送司存案十二年奏準嗣後直省具題本章由司於交送内閣之後仍将各衙門掲帖加謹收貯竢送本五日後交各提塘分送則分送掲帖與本章進呈之期相近各衙門辦理事件既不遲延亦可杜書吏傳謄漏洩之弊十三年奏準各部院彚送本章尚非每日常有之事至直省本章交提塘官齎赴本司自行跪呈至安設黄案於二堂當門亦屬褻瀆嗣後将黄案安設於大堂正中每日令經歴知事等官二人侍立案旁該堂官在二堂辦事遇有送本人員立即傳知堂官一人出立案旁敬謹接受乾隆十一年奉㫖通政使司堂官甚多而所司惟有接受本章之事嗣後每日著堂官一人在衙門直宿一程途限期康熙二十四年覆準一應本章均令原題衙門計算道里逺近豫定程限掲帖内並令填注日期其年月上所用印信改鈐於日期之上以便稽察其提塘承差齎送本章原題衙門給發火牌向來沿塗驛遞止填注並無需索等弊字様鈐盖印信嗣後經過驛遞用印時即令一并増注各驛所到起發日時同本章投司由司察明有違限者将堤塘承差交該部治罪如有情弊從重科斷至原題衙門本章掲帖批廻内不填日期到京後方於印文上加注者除提塘承差交部治罪外原題之督撫提鎮等官由司題叅交該部議處雍正三年議準直省督撫提鎮鹽政等官遇有𦂳要本章連站星馳外其尋常本章由該處至京各有一定限期兵部及司存案均於批廻内注明同本章投司将批廻限期按站察覈塗中或猝遇大雨或隂雨連綿河水暴漲路塗泥濘繋專差送進者取具經過地方官印結隨本批呈明繋驛遞馳送者由地方官出具印結甲報到司免其遲延處分倘有故意稽留及提塘沉壓情弊察出交該部治罪乾隆十九年覆準嗣後本章督撫等務遵兵部定例差遣二人給騎二匹倘遇中塗患病等事即令管驛官於火牌内注明扣除騎馬一匹令一人按限馳送其慶賀表箋均令豫期辦理封發提塘立限遞送毋庸專差滋擾至齎送本章人有揑飾患病等情地方官不察遽行出結者事發罰俸一年直𨽻總督兼理總河駐劄保定古北口提督宣化鎮天津鎮均限三日到京馬蘭鎮泰寧鎮均限二日正定鎮長蘆鹽政駐劄天津暨天津都統均限四日熱河副都統限五日山海闗監督限六日盛京將軍限八日吉林將軍限十二日黑龍江將軍限十八日奉天府尹限八日河東總河駐劄山東濟寧州限七日山東廵撫兼提督駐劄濟南府限五日青州將軍限六日登州鎮五六七八月限二十二日餘月限十六日兗州鎮五六七八月限十六日餘月限十二日山西廵撫兼提督駐劄太原府限六日大同鎮暨右衛副都統均限四日歸化城都統限五日建威將軍駐劄右衛限六日太原鎮駐劄平陽府限九日河東鹽政駐劄安邑限二十日河南廵撫兼提督駐劄開封府限八日七時河北鎮駐劄懐慶限八日十時南陽鎮限十一日二時兩江總督駐劄江寧府暨江寧將軍均限十三日四時鎮海將軍駐劄鎮江府限十三日漕運總督駐劄淮安府限十二日江蘇廵撫駐劄蘇州府限十四日四時安徽廵撫駐劄安慶府限十五日狼山鎮駐劄通州限十三日蘇松鎮駐劄崇明夀春鎮駐劄夀州均限十四日江南提督駐劄松江限十七日兩淮鹽政駐劄揚州府限十六日江南河道總督駐劄清江浦限十日嵗報兵馬奏銷册籍繁多限十二日江西廵撫駐劄南昌府暨南昌鎮均限十八日南贑鎮駐劄贑州府限二十二日六時閩浙總督福建廵撫均駐劄福州府暨福州將軍均限二十七日建寧鎮限二十三日汀州鎮海壇鎮駐劄福清縣均限二十八日福建陸路提督駐劄泉州府限二十九日水師提督駐劄同安縣限三十日臺灣鎮扣除過海日期自大輪驛起限三十日金門鎮駐劄同安自大輪驛起限三十日漳州鎮限三十一日南澳鎮駐劄廣東潮州府南澳限三十二日福寧鎮限三十三日浙江廵撫兼理鹽政駐劄杭州府暨杭州將軍均限十七日乍浦副都統限十六日浙江提督駐劄寧波府暨衢州鎮均限二十日定海鎮限二十二日黄巖鎮處州鎮均限二十五日温州鎮限二十七日湖廣總督湖北廵撫均駐劄武昌府限十四日六時襄陽鎮限十四日荆州將軍暨宜昌鎮均限十六日湖南廵撫駐劄長沙府限十八日九時湖廣提督駐劄常徳府限十八日永州鎮限二十一日一時有半鎮筸鎮駐劄五寨司城限二十二日陜甘總督陜西廵撫均駐劄西安府暨西安將軍均限十三日延綏鎮駐劄榆林鎮城暨河州鎮均限十五日涼州將軍莊浪副都統均限十六日甘肅廵撫駐劄蘭州暨固原提督均限十七日興漢鎮限十八日寧夏將軍暨寧夏鎮均限二十三日涼州鎮西寧鎮均限二十四日甘肅提督駐劄甘州府限二十八日肅州鎮限三十一日安西提督限三十四日四川總督兼廵撫提督松潘鎮均駐劄成都府暨成都副都統均限二十四日川北鎮駐劄保寜府限二十三日重慶鎮限二十九日建昌鎮駐劄寧逺府限三十四日兩廣總督駐劄肇慶府廣東廵撫駐劄廣州府暨廣州將軍均限三十二日左翼鎮駐劄順徳縣限三十二日六時右翼鎮駐劄韶州府限二十六日廣東提督駐劄恵州府限三十四日碣石鎮限三十五日六時髙雷鎮駐劄髙州府限三十七日潮州鎮限三十八日六時瓊州鎮限四十四日廣西廵撫駐劄桂林府限二十三日十一時有半廣西提督駐劄柳州府限二十六日十時有半左江鎮駐劄南寧府限三十一日十一時有半右江鎮駐劄百色地方限三十八日雲貴總督雲南廵撫均駐劄雲南府臨元鎮駐劄臨安府暨昭通鎮均限四十日曲潯鎮限三十三日楚姚鎮駐劄楚雄府限四十二日雲南提督駐劄大理府暨開化鎮均限四十五日鶴麗鎮駐劄鶴慶府暨永北鎮均限四十八日永順鎮駐劄永昌府限四十九日普洱鎮限五十日貴州廵撫駐劄貴陽府限二十八日鎮逺鎮限二十五日古州鎮駐劄黎平府限二十七日貴州提督駐劄安順府安籠鎮駐劄南籠府均限三十日威寧鎮限三十五日如督撫提鎮出廵塗次暨總河察勘工程學院按試各府隨處拜進本章各按道里逺近増減限期一本章違式順治八年題準本内擡頭錯誤應擡書不擡書不應擡書而擡書本面揠補摺皺沾汚破損訛字遺字接縫處遺漏背印空白空幅頭行官銜雙列年月下遺書官銜前後官銜不符本内僅書某官不書名者均屬違式由司掲送内閣叅處又定貼黄違式一並掲叅康熙四十七年議準本章有不合式者由司駮囘於每月終將駮囘㡬件所駮何事彚本具奏雍正二年停止駮囘本章乾隆三年議準直省本章除𦂳要事件停止駮囘外其謝恩陳情等本或本官品級未到或賞賜物件不應奏謝者由内閣交司轉駮仍詳載册籍按季彚奏七年議準直省將軍都統督撫提鎮副都統一應本章如有奉㫖飭行者仍遵㫖飭行其奉特㫖交部議處者均照在京各衙門錯誤本章之例議處一登聞鼓㕔順治元年設登聞鼓於都察院門首每日御史一人輪流監直十三年將鼓㕔衙門移設於長安右門外滿漢科道輪流監直康熙十二年題準在外民人告旗人及旗下家人告主强壓霸占者均令赴刑部具告審結後果屬寃枉仍向原問衙門覆告如不與準理許告狀人開明年月日期案情始末並審駮言辭赴司告理詳察情節取閱原案寃枉屬實方準具疏其餘仍照例用印送該衙門覆審六十年停差科道將鼓㕔事務交司管理其舊設筆帖式二人書吏六名皂𨽻六名並𨽻焉雍正八年題準鼓㕔衙門舊有科道輪流廵直自歸并通政使司管理以來因未有專管之員致有越過㕔牆妄行撃鼓等事嗣後鼔㕔衙門應令通政使司每日令叅議一人輪流掌管並令該衙門知事委役晝夜廵察遇有撃鼓之人由司訊取口供果有寃抑確據奏聞請㫖交部昭雪若有誣妄越訴等情即送部按例治罪加一等發落如有揑開大欵欲思洩忿並將法司督撫衙門已結事件輒圖翻案聚衆撃鼓謊告者將首犯照擅入午門長安等門内呌訴寃枉例發邉衛充軍餘人減一等發落如究出教令主使之人身雖不行亦照首犯治罪附登聞鼓木榜條例順治十七年諭刑部民間果有寃抑自當據實呈告以求伸理乃近來刁風日熾常有持刀抹項故為情急以圖倖準深為可惡以後再有此等除所告不與準理本人按法究懲其妻子流尚陽堡爾部即遵諭傳飭欽此凡狀内事情必闗繋軍國重務大貪大惡奇寃異慘方許撃鼓其户婚田土鬭毆等細事及在内未經該衙門告理在外未經督撫按三處告理與已經告理尚未結案者並不準封進仍重責三十板如繋職官送刑部折贖舉人送禮部監生送國子監生員發順天府責治凡登聞之設原以伸辨寃枉近有無賴棍徒本無寃枉或希圖報復或受主使劈鼓抹項持刀詐害者明繋無賴刁徒嗣後如有此等除原狀不準外將本人送刑部責四十板照例於長安門外枷一月示衆凡設鼓原恐民間受屈於貪官汚吏及官民被陷重罪寃枉無伸俾得直達天聽近見復辯官職者紛紛見告事多虚㒺不惟長囂陵之風且原非國家設鼓之初意也嗣後凡官員被革被降者既繋職官均應赴通政使司具奏庶蠅營之徒不致日集都門覬仕宦之㨗徑矣至於姦民假託條陳希圖倖進尤可痛恨並應嚴禁凡告鼓狀必明白開具情節不許黏列欵單如列欵單不與準理狀後仍書代書人姓名如不書代書人姓名亦不與準理凡民間寃抑必親身赴告果本身羈禁亦應的親正身確具籍貫年貌保結方準抱告違者不準其有姦徒代人撃鼓挾騙者即令直鼓官即時拏送五城嚴訊的實照光棍例治罪大理寺一具題重辟事件奉㫖三法司覈擬者直省掲帖到寺左右寺官即據掲詳覈察所擬罪名是否與律例相符出具讞語呈堂竢刑部定槀送寺畫題時視其讞語意見相同無疑義者堂屬一同畫題或情罪未明律例未協將稾送還刑部再為叅酌若彼此意見仍有異同該左右寺官即擬稾别為一議呈堂送刑部都察院酌量議覆其在京見審重辟左右寺官司讞者詣刑部會御史及刑司聽其獄獄成各質成於其長卿及少卿詣刑部會刑部都察院堂官聽之務期平允乃畫題會疏順治十年題準凡奉㫖三法司覈擬事件刑部審明成招定罪注定讞語送都察院參覈都察院參覈既確送大理寺平反會稾具題三衙門議同者合具讞語不同者各出讞語具奏十二年諭三法司覈擬死罪在京者堂上官面同研審在外題奏者各將原招詳察明白面同議覆當虛心商酌務期情罪適當律例允協欽此十五年議準凡事闗三法司覈擬者刑部官悉備全招讞語與寺院官面相商議在外督撫題準事件各具册掲詳覈一會覈事件刑部將稾面鈐盖司印注明縁由付督催所彚齊轉交直日司分用印文移送法司衙門畫題限十日内亦用印文送囘如稾内有酌議改易之處限五日内即將應酌議改易之處用印文聲明縁由送囘刑部察覈定議刑部仍用印文將應否改易之處聲明再送法司衙門一會審事件刑部即知會都察院本寺堂官率屬官至刑部衙門秉公會審定案畫題倘飾辭推故竟無堂上官到部者交部議處一會審限期限一月完結有應行提質及患病之犯以提到及病愈之日為始仍將應扣限期及三法司會審日期並於科道衙門注銷册内聲明倘三法司不即會審以致逾限吏役得以乘機舞弊者其會審遲延之堂司官交部分别議處一重囚稱寃原問官難辨理者許移文會三法司堂官覆審果有寃枉及情可矜疑者奏請定奪一秋審刑部隨各省秋審重辟具題到部先後將原案貼黄及法司督撫讞語刋册進呈御覽仍分送本寺八月内本寺會同九卿詹事科道於天安門外金水橋西詳覈情實緩決矜疑分擬具題一朝審刑部監候秋決重囚每年於霜降前摘𦂳要情節刋册進呈御覽仍分送本寺霜降後十日本寺會同九卿詹事科道於天安門外金水橋西詳覈其情實緩決矜疑分擬具題詳見刑部一熱審每年於小滿後十日起至立秋前一日止如立秋在六月内以七月初一日為止左右寺官同都察院掌道御史各就所管司分會刑部司官將刑部見審案件審擬呈堂枷責等輕罪人犯照例減等發落笞罪寛免十日一次彚題其人犯交該旗該地方官暫行保釋竢立秋後送部發落如重囚内有可矜疑者請㫖定奪詳見刑部每逢熱審之期杖責人犯無論題達重案及一應事件統於減等之中遞行八折發落一永逺枷示之犯雍正六年諭朕前曾降諭㫖在京在外有奉㫖永逺枷示之人令各衙門該管官於嵗底奏明今著各衙門將奏摺交與大理寺大理寺彚齊開列名單開具所犯畧節進呈並將各案情由詳細繕摺隨名單一并進呈均用漢字繕寫欽此十年諭大理寺所奏永逺枷示人犯於嵗底彚奏時即將各該犯曾否改悔之處由該旗該管處保送開注該犯名下一并進呈若釋放之後仍不知悛改生事妄行定將保送人員照徇庇欺罔例治罪欽此欽定大清㑹典則例卷一百五十一
