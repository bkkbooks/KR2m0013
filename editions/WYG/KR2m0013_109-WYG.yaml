疎技藝應酌量變通辦理嗣後營兵中武進士有情願囘營効力者準仍食馬兵糧隨營差操遇有署事處一體酌量委署又奏準注册營用之漢武進士有情願隨營學習者在部具呈考騐分發有題闕之省分學習試用在籍者於督撫衙門具呈考驗咨發有題闕之鄰省學習試用該督撫收入標下給與經制馬兵糧報部注册定以五年為滿果弓馬嫻熟諳練營伍遇有守備應題補者察其人地相宜即行題補如學習未滿五年已届銓選之期仍照原班挨次銓選其弓馬次等者該督撫造册送部銓選倘弓馬庸劣怠惰廢弛令囘本籍報部注册毋庸銓選至漢軍武進士有情願隨標學習者分發巡捕營直隸馬蘭鎮泰寧鎮學習其給與馬兵糧及分別優劣録用均照漢武進士之例行十五年奏準簡選三等以衛守備用之武進士及充補提塘之三等武進士再加簡選分别等次一二等者以營用三等者仍以衛用如復行考驗有較前弓馬生疎者均令囘籍學習嫻熟再赴部考驗簡選一武舉録用雍正七年議準武舉㑹試落第具呈情願隨營差操者由部咨囘本省分發各標協營効力該督撫提鎮等給與經制馬兵糧與外委千把一例差操如偷安規避咨部除糧内有已經簡選衛所千縂年分已深選期将近者行文該省給咨赴部仍歸本班選用年分較淺選期尚逺者効力三年期滿如果材技優嫺曉習營伍該督撫提鎮等保送到部考驗分發鄰近省分以營千總拔補分發之後将簡選注銷不得復歸本班銓選至未經簡選者効力三年期滿如果材技優嫻曉習營伍該督撫提鎮等保送到部考驗分發鄰近省分以把總拔補此等應拔千把之武舉到標後與營中應拔千把者秉公較量一例簡拔若繫由營兵中式之武舉在本省隨營差操者保送到部後仍發囘本省止迴避本營其餘各營準其拔補乾隆十八年覆準武舉㑹試不中具呈分發隨營差操者向未定以額數今酌定直隸陜甘各分發三十名山西江南福建各分發二十名河南浙江湖廣四川雲南各分發十五名山東江西廣東廣西貴州各分發十名均令該督撫提鎭酌量營分就近發徃隨營差操一功加録用原定經制千把總及外委千把總無職任効用官因功加至都督等銜並副将署副将銜者以游擊用加至叅将署叅将游擊署游繫銜者以都司用加至都司署都司守備署守備銜者以守備用康熙十一年題準功加各官咨部選用時原領功劄令本人赴部親繳如不将原劄親繳者不準引見注册二十四年題準功加應用游擊都司守備等官有因人多壅滯願降補千總把總者準其降補雍正三年覆準功加應用都司者準以都司守備兼用又議準功加應用游擊都司者以雙月推用應用守備者單月雙月皆立一班推用班次見月選又議準外委千把及無職任効用官内有因功加至都司等銜以下署守備銜以上者該督撫提鎮㑹同考驗分為三等其人材超羣技藝純熟者為一等或曾經血戰帶有傷痕者亦列為一等保題送部引見将加都督等銜副将署副将銜者以游擊用加叅将署叅将游擊署游擊銜者以都司用守備加都司署都司守備銜者以守備用其引見候補之際或令在侍衛上行走或發巡捕營當差或發囘原營候推由部臨時請㫖其人材技藝雖不及保題之格尚屬可觀者為二等造册報部遇該省把總員闕與兵丁輪班以三闕之一拔補功加如能盡力巡防技藝精進許再行保題送部引見仍以功加應得之官用平常者止照把總升轉若技藝尚須學習營伍尚未諳練者為三等均留營食糧如學習果能諳練堪以保題者亦許再行保題送部引見仍以功加應得之官用可以拔補把總者仍許咨部拔補把總功加千總銜者該督撫提鎮考驗将列為一等之人造册送部與功加署守備銜以上考驗二等者相間拔補把總餘均留營食糧至功加之見任千把總有人材超羣技藝純熟堪以保題者槩不論俸保題送部引見即以功加應得之官用人材技藝稍次者千總六年俸滿以守備補用仍帶功加銜把總止挨次拔補千總人材技藝不堪録用者咨部注册又議準功加人員未得授職者該督撫提鎮收入標下効力給與糧餉即於額兵數内扣算如差操勤慎給以外委把總劄付率領兵丁巡防地方以觀後効若身倚功加差操懈怠及在地方生事者小過酌量懲治大過報部斥革将功劄注銷十一年議準功加人員老病不能差操者給守糧半分不扣小建朋銀月支餉銀五錢或於建曠項下動支或於公項内動支該督撫酌量辦理統於年終造册報銷乾隆十八年遵㫖議準軍功議敘人員向按功加等次兼銜給劄推升時照京俸一年作年半算今加銜既經刪除以歸簡易凡軍功議敘之人毋庸給以虚銜将功加等次入於劄内遇應升時均以一年作年半較俸又守備有功加者向例原升游擊今按次推升都司若與尋常守備一例升轉未為平允嗣後都司員闕應盡守備有功加者先行升用十九年覆準兵丁初次立功者向来注册竢下次有功照把總例議敘按其等次遞算加銜所有頂帶即照銜服用今既刪除加銜除在標尋常操演不許照銜服用外至在軍營之時若立有功績向例應給何項職銜者即照職銜給與頂帶服用以示鼓勵於事竣囘營之後除功績僅得把總頂帶者該督撫提鎮照例拔補外其有屢著功績加至千總頂帶以上者統令陸續咨部由部引見作何録用候㫖遵行又覆準向例千把總等加至署副将以上者以游擊用加署游擊銜以上者都司守備兼用加署守備銜以上者以守備用今既刪除加銜所有功加等次即照此計算嗣後功加十等以上者照加副将以上銜之例用功加六等以上者照加署游擊以上銜之例用功加二等以上者照加署守備以上銜之例用一廕生改武雍正十二年議準廕生願改武職者具呈吏部咨送到部考驗弓馬技藝将年力精壯者引見恭候欽定選用侍衛外其餘或交巡捕營當差或交外省督撫提鎮隨營試用竢弓馬熟嫺營務通曉在巡捕營者由該統領引見交部按品補用都司按人文到部先後補用守備衛千總於各班之末輪用一人守禦所千總歸入劄班内用在外省試用者該督撫提鎮按品題補給咨赴部引見恭候欽定又議準廕生改用武職者在京一品尚書等官在外總督将軍廕生均以都司銜管都司用在京二品侍郎等官在外巡撫提督廕生均以署都司銜管都司用在京三品副都御史等官在外總兵官布政使廕生均以守備銜管守備用按察使加一品銜副将廕生均以署守備銜管守備用二品銜副将廕生以守禦所千總用小銜副将廕生以衛千總用乾隆十一年議準廕生向有改補武職之例如将門之子未諳文藝而弓馬熟習者具呈本部以武職補用十六年奏準改武廕生分發巡捕營者由該統領引見交部按品推用至分發外省試用者均由該督撫按品題補原不歸部銓選但若遇該省並無題補之闕則録用無階嗣後各省學習期滿之廕生如無闕可以題補者該督撫提鎮給咨送部引見恭候欽定如蒙準其補用照巡捕營改武廕生之例歸班銓選一難廕守備雍正十一年議準難廕應用守備人員赴部候選時考試弓馬技藝引見應以營衛守備補用之處恭候欽定如以營用者入於雙月劄班内與澎臺俸滿千總相間補用以衛用者入於衛守備劄班内補用一提塘録用康熙六十一年議準各省提塘員闕限部文到日該督撫即行簡選合例人員送部頂補如不速行簡選将督撫題叅照遲延事件例議處如簡選之人領文不即赴部在路逗遛者亦照赴部違限例議處雍正六年議準各省提塘令該督撫於本省武進士及候補候選守備内簡選家道殷實小心謹慎之人取具地方官印結申送考驗咨部頂補三年期滿如果勤勞無過由部注册照本班即用怠惰偷安貽誤塘務者将該提塘斥革如将應密事件豫通信息及恐嚇詐騙交刑部治罪其出結申送之該地方官照濫舉匪人例議處督撫照失察例議處乾隆五年奏準各省提塘将届期滿於十月以前即行文該督撫豫行簡選合例人員按照定限送部頂補六年奏準武進士充補提塘三年期滿歸於効力班下按年滿日期科分名次推用但分别營衛之條尚未畫一有未經簡選至充補提塘期滿即照中式名次前一半以營用後一半以衛用者有已經簡選即按簡選等次定其營衛推用者按提塘既由武進士充補期滿之後與武進士同一推用守備其分別營衛之處應照武進士簡選之例畫一辦理嗣後武進士充補提塘三年期滿如有未經簡選者不準歸班由部照例簡選分別一二三等以營衛推用均歸入効力班下仍按期滿先後科分名次擢用一材官録用原定本部額設材官四十名武舉有情願効力者具呈充補飛遞馬上公文本報雍正十二年議準額設材官四十名内裁汰二十名乾隆五年議準材官二十名於武舉内取用三年期滿由部考驗弓馬一等者引見恭候欽定以營衛守備分別補用次等者以守禦所千總注册候推其弓馬生踈人材不及者停其推用仍令學習下次再行考驗三次不到者除名七年奏準簡選一二等武進士情願充材官効勞者照武舉一例當差三年期滿歸入効勞班選用如武進士武舉同日期滿令其掣籖選用如武進士内同日期滿照從前簡選年分等第名次選用欽定大清㑹典則例卷一百五
