body:
  text: 兵部武選清吏司職制三一八旗世爵及武職外用乾隆元年議準自山海關至殺虎口保徳州並古北宣化大同所屬地方均繫沿邊關隘要地副叅游都守等官以三分留與緑旗補用以七分給與旗員對品補用補用之後五年為滿如果熟諳營伍人地相宜準該督提等以各該員應升之官題補其餘咨部轉咨該旗按該員原職應升之官先盡升補又議準河屯營副将標下千總一員把總二員並分防喀喇河屯龍鬚門波羅樹森吉圖各千總大店子馬圏子喇嘛洞虎什哈丫頭溝二溝中六溝八溝營左右司各把總歸八旗補用其餘千總仍照舊悉歸河屯營及内地沿邊弁兵内簡選拔補六年議準八旗武職外用沿邊各闕於補用之後不拘年限如果弓馬嫻熟諳練營伍除以該員應升之官題補其餘未得題補者統以五年為滿該督提出具考語給咨送部由部考驗引見並将例有題闕之省開單請㫖分發遇員闕題補其所遺沿邊員闕仍於在京八旗武職内簡選補用如有不能熟悉營伍不宜外任者咨部發囘各該旗仍在原處行走以原職應升之官補用至副将内有整飭營伍堪膺表率之任者不拘年限該督提出具考語保送到部注册将該員仍留原任竢各省總兵官闕與緑旗營副将一例論俸開列具題恭候欽定補授又議準直隸山西沿邊副将以一等侍衛王府長史前鋒䕶軍驍騎叅領步軍翼尉並一品二品世爵補用叅将游擊以二等侍衛前鋒侍衛副叅領佐領歩軍協尉三品世爵補用都司以三等侍衛步軍副尉步軍尉四品世爵補用守備以藍翎侍衛五品世爵及親軍校前鋒校䕶軍校驍騎校補用副将分左右翼輪用叅游都守八旗輪用均於員闕時行文領侍衛内大臣鑾儀衛火器營八旗都統前鋒䕶軍步軍統領等簡選三四人出具考語咨送到部考試弓馬簡選引見恭候欽定補授又奏準直隸内地副将叅将游擊都司守備以三分補用旗員七分補用緑旗第一次補用旗員第二第三補用緑旗第四補用旗員第五第六補用緑旗第七補用旗員第八第九第十補用緑旗其應用旗員者由部行文該督於見任沿邊旗員内簡選熟悉營伍之人題請調補所遺沿邊之闕仍於在京八旗武職内簡選補用此内由沿邊調補内地之叅游都守遇有應升之闕仍準其題補其調補内地未經題升者仍接算前任邊俸扣滿五年該督出具考語給咨送部引見恭候欽定分發各省遇闕題補至調補内地之副将竢有總兵官闕亦與緑旗副将一例論俸開列具題又奏準巡捕三營馬蘭鎮泰寧鎮千總並直隸山西沿邊千總将前鋒䕶軍與緑旗輪流間補行令八旗内務府於前鋒䕶軍内簡選三十五名引見交部分發直隸十五名山西省十二名馬蘭鎮二名泰寧鎮二名巡捕營四名将姓名掣定注册竢有各該處千總員闕掣補給劄赴任二年之内如行走好熟悉營務各該處出具考語保送由部引見将各省守備題闕數目開列隨摺奏聞恭候分發各省果有技藝出衆與各該處營伍相宜者準其以守備題補倘有行走怠惰不宜營伍者即咨送囘部仍發原處行走将及用完之日仍行令八旗内務府簡選引見七年奏準陜西甘肅沿邊並四川松潘鎮均地處邊陲番夷錯雜應分用旗員以資彈壓陜甘應題補之副叅游都守共二百有九員四川松潘應題補之副叅游都守共十有六員無論沿邊腹地第一次員闕補用旗員第二三四五次補用緑旗再有員闕照此輪用凡遇員闕應以旗員補用者按照旗分咨取應用之人考驗簡選三四人引見恭候欽定補授至補授之後如果熟諳營務遇有應升之闕準其與緑旗人員一例簡選題補其開列推升亦與緑旗一例較俸升轉倘不宜外任即咨送囘部仍發各該旗令在原處行走竢有該員原職應升之官先盡補用至陜甘二省千總一百九十三員四川松潘千總十有八員第一次員闕補用前鋒䕶軍第二三四五次補用緑旗再有員闕照此輪用由部行文左右二翼前鋒統領八旗䕶軍統領簡選人材壯徤弓馬嫻熟言語明白者每旗各保送十人咨部考驗引見記名注册遇有陜甘松潘千總員闕應補旗員者掣籖補用補用之後均照緑旗千總之例一例六年俸滿如有材技優長熟悉營務者準其不拘年限以守備題升其未經題升食俸已滿者該督照緑旗俸滿千總之例出具考語送部引見恭候欽定倘有不能熟悉緑旗營務不宜外任者即咨送囘部發囘各該旗仍在原處行走又議準上三旗親軍内簡選身材壯徤弓馬嫻熟語言明白者每旗酌量保送一二人送部入於八旗前鋒䕶軍内公同考驗引見八年遵㫖議準從前所定旗員分用緑旗員闕之例原繫将滿漢升途通行籌酌今按陜甘松潘所屬各營補用之旗員乃與緑旗一例升轉則直隸山西沿邊補用並直隸調補内地各旗員均應照陜甘松潘之例無庸定以年限令該督提試看如弓馬嫻熟諳練營伍遇有應升之闕與緑旗一例簡選題補如有不能熟悉營伍不宜外任亦不必拘定五年之限隨時咨部仍照原議發囘各該旗令其在原處行走竢有原職應升之官先盡升補所遺沿邊之闕仍将在京八旗武職簡選補用其餘未得題補者均與緑旗各官一例較俸升轉所有五年俸滿保送之例應請停止又奏準前鋒䕶軍補用千總陜甘二省並四川松潘一鎮定以五闕補用一人照緑旗千總之例六年俸滿今将巡捕營並直隸山西亦照陜甘四川之例五闕補用一人則前鋒䕶軍補用無㡬然若與緑旗間用則又礙緑旗進身之階請嗣後巡捕三營直隸山西沿邊等處並馬蘭寧泰二鎮額設千總均以三分之一補用前鋒䕶軍竢有員闕第一次補用前鋒䕶軍第二次三次補用緑旗再有員闕照此輪用所有原定保送之例應請停止均照例六年俸滿出具考語保送引見如有技藝出衆諳練營伍者不拘年限遇有守備員闕即準題補其行走怠惰不宜營伍者仍照原議發囘原處行走其保送之千總到部引見時恭候欽定或發囘原任省分或發徃鄰省以守備題補或交巡捕營當差其人材勞績不稱題補之選者不必隨營候推亦留旗在原處行走仍給與千總頂帶遇有簡選升用之處與應升之人一例簡選升用又奏準陜甘二省及四川松潘一鎮應題副叅游都守並直隸山西沿邊各關分用旗員原以邊疆𦂳要滿洲人材衆多弓馬素嫻以之分任可以表率弁兵整飭營伍方於邊疆有益近見各處有将年力就衰及年少世爵不宜外任之人保送驗其弓馬並非出衆殊失邊疆期於得人之意嗣後凡遇咨取應用人員務須詳慎簡選将年力精壮弓馬優嫻者秉公保送如實在無人即聲明咨覆若各處均無人可送及所送之人皆不堪用即将其次應用旗分咨取遴選引見倘各處保送人員内由部考驗人材弓馬僅可選取一人不便引見即咨取其次應用旗分人員一并簡選三四人引見如應取鑲黃旗人員只選一人即咨取其次應用之正黃旗一并簡選三四人引見若将鑲黃旗人員補授再有員闕仍於正黃旗取用若将正黃旗人員補授再有員闕鑲黃正黃二旗均停其咨取即将其次應用之正白旗人員簡選引見補授其餘旗分照此辦理九年奏準直隸山西陜甘松潘各闕分用旗員原議專用滿洲並無兼用蒙古之例但滿洲兼入蒙古旗分人員因其原屬滿洲準其一例簡選而蒙古兼入滿洲旗分人員見在已分隸滿洲旗分均在滿洲旗分升轉乃補授沿邊各闕不得與滿洲一例簡選殊未畫一嗣後應與滿洲人員一例簡選補用又奏準各省豫保千總為數無㡬候補守備人多應将分用旗員之陜甘二省及四川松潘一鎮應題守備除第一次員闕照例分用旗員外其第二次掣用豫保千總第三四五次在於候補人員内簡選題補至川省並未分用旗員之標協營如有應題守備員闕以第一次歸豫保千總掣補第二三四次歸候補人員題補再有員闕皆照此輪用十年奏準鷹房狗房鶻房三處一二品廕生騎都尉兼入各執事行走者以都司補用三品廕生藍翎侍衛雲騎尉並候補職官及有頂帶人員選入各執事行走見食俸禄者以守備補用閒散及驍騎等選補各執事人見食錢糧者按其差使與前鋒䕶軍相等以千總補用直隸山西沿邊補用旗員乃分定地方按照旗分挨次補用陜甘松潘乃以題闕五分之一分用旗員按照旗分輪流補用其都司守備員闕遇有分用旗員者行文鷹房狗房鶻房三處按照咨取旗分将行走已過五年人去得者公同簡選一人出具考語保送赴部與各處送到人員一同考驗簡選引見請㫖補授至應用千總一人由部照䕶軍前鋒補用千總之例行文三處将行走已過五年人去得者不拘人數簡選出具考語保送到部考驗引見奉㫖準其注册後歸入八旗滿洲見用千總前鋒䕶軍之内一例按照旗分遇有員闕繫分用前鋒䕶軍者公同掣籖補用十三年奉㫖京師䕶軍叅領䕶軍校䕶軍内有曾經出師並騎射優者簡選補授緑旗各官其圓明園䕶軍叅領䕶軍校䕶軍等非京城經制官兵是以並未與選但此内旣有可以選用之人且差務較前有增看来皆可黽勉将事自應照京城一例簡選補授以示鼔勵嗣後簡選補授緑旗各官時入於京城各該旗㑹同圓明園總統等一例簡選又奏準前鋒䕶軍補用千總六年俸滿應行保送之人如果材技優長堪膺保題者遇有守備員闕即準題補其才力技藝雖堪保題尚覺稍次者保送来京隨到隨令軍機大臣㑹部再加考驗擇其實堪升用者引見或發囘原任之省及隣省以守備題補或交巡捕營當差或仍令囘旗於原處行走均候欽定其不中選者毋庸引見以守備銜囘旗於原處行走按年滿日期候推至材技均屬平常者不必送部引見給與千總職銜咨囘該旗於原處行走又奏四川夔州協副将員闕或令該督簡選題補或於一等侍衛内簡選引見恭候命下嗣後即照此辦理奉㫖著簡選引見欽此十四年奏準静宜園之健銳營叅領前鋒校内除本營應升外若有可以應升外省者歸入京城各該旗㑹同健銳營總統一例簡選十五年奉㫖從前降㫖沿邊及直隸地方營協叅用八旗滿洲人員原因旗員弓馬素優人材驍勁習於勞苦整頓營伍是其所長是以令其分班補用今行之數年邊方營伍漸次整飭而旗員之於外任相宜者亦悉經擢用嗣後緑營分用旗員者自都司以上應稍為裁減俾得其平兵部再行詳悉定議具奏欽此遵㫖議奏直隸山西二省沿邊都司以上三七分用旗員者酌減一分以六分補用旗員四分補用緑旗陜甘二省四川松潘鎮都司以上五分之一分用旗員者改為六分之一以第一次員闕補用旗員第二三四五六次補用綠旗再有員闕照此輪用奉㫖直隸山西沿邊地方都司以上員闕著以五分補用旗員五分補用綠營官員欽此又諭朕前因緑旗營伍廢弛兵力軟弱皆由将弁不能約束訓練所致是以分用旗員以資鈐轄邇来因簡用過多業将游撃以下之闕量加酌減今觀侍衛協領叅領内才具稍優者皆已陸續外用副叅等闕仍屬過多旗員内漸少出色之人而綠旗員闕亦未免稍偏朕因材器使内外原屬一體但隨時委用輕重務在合宜自應量為調劑且向来旗員内升者即藍翎侍衛亦皆以為榮初無欣羨外任之意若樂於外任可以偷安且多得俸薪則所見卑鄙已甚滿洲淳樸之風當不出此總之操縱在朕向之多用綠旗不可歎向隅今之簡用滿洲不可歎阻途所有分闕簡用之處該部再行定議具奏欽此遵㫖議準直隸沿邊副将四員以三用緑旗一用旗員山西沿邊叅将十有一員以七用綠旗四用旗員直隸内地由部推補之副叅向於十闕之内将見任沿邊旗員調補三人以七歸部推補今副叅員