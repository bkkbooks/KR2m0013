body:
  text: 刑部刑制一刑制順治元年諭各衙門應責人犯悉遵用鞭責不許用杖又奏準五刑中死罪居二曰斬曰絞明律分别差等絞斬互用我朝法制罪應死者止用斬刑嗣後麗重典者仍分斬絞按律引擬至以板易鞭尤當酌得其中定以三鞭準一板三年除割脚筋法又舊例犯重辟減等者鞭一百貫耳鼻奉㫖耳鼻在人身最為顯著此刑永革除之四年定五刑之制一曰笞刑自一十至五十每十笞為一等凡五等用小竹板折責每十笞折責四板二十應折責八板者除零責五板三十折責十板四十折責十五板五十折責二十板旗人旗奴犯應笞者以鞭代之不折責二曰杖刑自六十至一百每十杖為一等凡五等用大竹板折責折責之數與笞刑等凡行杖不得過百罪重於杖者枷示應枷者先枷後責三曰徒刑發本省驛遞自一年至三年每半年為一等凡五等各依年限應役役滿回籍五徒各予以杖徒一年者杖六十徒一年半者杖七十徒二年者杖八十徒二年半者杖九十徒三年者杖一百到配折責四曰流刑安置逺方終身不返分二千里二千五百里三千里為三等三流並杖一百到配折責惟緣坐問流者不杖五曰死刑曰斬曰絞皆有立决監候之别五刑之外有遷徙離鄉土一千里之外安置曰充軍較流為重凡五等曰附近發二千里曰邉衛初曰沿海今改邊衞發二千五百里曰邊逺發三千里曰煙瘴曰極邊煙瘴初曰永逺今改極邊發四千里五軍並杖一百到戍所折責曰邊外為民發邊外安置曰雜犯流罪準徒四年曰雜犯斬絞準徒五年死刑之最重者為凌遲為梟示又定獄具之圖一曰板以竹箆為之大頭徑二寸小頭徑一寸五分長五尺五寸重不得過二斤一曰枷以乾木為之長三尺徑二尺九寸重二十五斤一曰杻以乾木為之長一尺六寸厚一寸一曰鐵索即鉗也一名鍊以鐵為之長七尺重五斤一曰鐐以鐵為之連環重一斤徒罪以上用之命盜重案供辭不實男子用夾棍以梃木三根中梃木長三尺四寸旁木各長三尺上圓徑一寸八分下方濶二寸自下而上至六寸於三木四面相合處各鑿圓窩徑一寸六分深七分婦人供辭不實用桚指以圓木五根為之各長七寸徑圓各四分五釐又定贖鍰之法曰納贖分有力稍有力為二等若軍民有力若舉人監生生員冠帶官犯非姦盜詐偽者若官員革職有餘罪及革後别犯流以下罪者並聽納贖受贓者不準有力者每笞一十贖銀二錢五分如納米五斗如納穀一石以次遞加至徒三年贖銀十有七兩五錢如納米三十五石如納穀七十石總徒四年贖銀二十兩五年贖銀二十五兩稍有力者笞一十力役一月折銀三錢每一等加役十五日折銀一錢五分以次遞加至徒三年贖銀十兩八錢總徒四年贖銀十有四兩四錢五年贖銀十有八兩曰贖罪若官員正妻若婦人有力及例難的決者每笞一十贖銀一錢以次遞加至杖一百贖銀一兩犯徒流者皆折杖計數如應杖六十徒一年共折杖一百二十是也誣輕為重者亦如之曰收贖若老幼廢疾天文生及婦人犯非姦盜者每笞一十贖銀七釐五毫遞加至杖一百流三千里贖銀四錢五分絞斬贖銀五錢二分五釐贖鍰遞加之法如收贖每笞一十贖銀七釐五毫笞五等每一等加銀七釐五毫至笞五十贖銀三分七釐五毫自杖六十至杖一百亦五等每一等亦如笞罪加法至杖一百贖銀七分五釐若徒一年則倍加銀七分五釐贖銀一錢五分徒五等每一等則以七分五釐折半為三分七釐五毫遞加至徒三年贖銀三錢若流二千里仍加銀七分五釐該銀三錢七分五釐流三等每一等亦折半以三分七釐五毫遞加至流三千里贖銀四錢五分絞斬死罪仍加銀七分五釐該贖銀五錢二分五釐其贖罪納贖之數有輕重而加法悉準乎此又定刺字之法犯逃盜者犯謀故及拒捕殺人者外省死囚決不待時者皆應刺字旗人刺臂奴僕刺面民犯徒罪以上刺面杖罪以下刺臂再犯者亦刺面刺面在鬢之下頰之上刺臂在腕之上肘之下逃犯刺左餘犯刺右初犯刺左者再犯累犯刺右初犯刺右者再犯累犯刺左罪名刺左者地名刺右罪名刺右者地名刺左地名謂遣犯應刺所遣地方者字方一寸五分畫濶一分有半並不得過限立決者獄成即刺監候者奉㫖始刺餘犯皆於起解責釋之前刺之若官員犯侵盜旗人正身脱逃及準盜論罪與婦人有犯者不論輕重皆免刺又定死囚禁内監軍流以下禁外監其强盜十惡謀故殺及奉特㫖拏問之犯手足頸各絏三道竊盜鬭毆人命及軍流徒犯之情重者手足頸各絏一道情輕各犯及罪止杖笞與婦人犯輕重罪者止絏頸一道老幼廢疾者㪚禁婦人犯罪應禁者别置一室曰女監八年諭天下罪囚斃於囹圄者何限有死於疾病有死於饑餓有死於刑拷有死於官吏虐害囚徒之陰謀諸如此類未可悉數朕心惻然在良有司濟以醫藥給以口糧非刑有禁陵虐有禁内外交通毒謀陰害有禁督撫廵按時加申飭該道府親為稽察州縣有犯前弊分别㕘處庶獄囚不至無故枉死用昭朝廷法外之仁欽此又定刑部司獄司設醫生一名醫治病囚十二年定一應流犯皆照律例所定地方發遣其解部流徙者改流尚陽堡十三年題準凡旗人犯軍罪者枷三月流罪枷兩月徒罪枷一月仍責以應得鞭數十六年覆準在京軍民人等犯流罪以上及姦盜强盜知情故縱罪囚以卑犯尊衙蠹犯贓等罪仍不準收贖外其犯徒罪以下有力者皆照例分别收贖旗下婦女除犯姦盜逃走等情的決外餘亦準贖十七年奏準縻北雖在屬國地方但在邊外今後有徒縻北者皆改發寧古塔十八年議準旗人犯徒一年者枷二十日一年半者枷二十五日二年者枷三十日二年半者枷三十五日三年者枷四十日流二千里者枷五十日二千五百里者枷五十五日三千里者枷六十日軍罪枷三月雜犯死罪準徒五年者枷一百五日又定審問官有擅用匣牀捕獲强盜有妄用腦篐毛竹連根大板及竹籤烙鐵等刑肆行酷虐致斃人命者從重治罪又定凡反叛案内應流人犯皆流徙寧古塔康熙元年定凡流徒人將妻室及未分家之子一幷流徙如無妻室者取具該管官印結繳部隱漏者事發議處官員革職後犯杖罪者仍準收贖又定凡犯人有願認工贖罪者呈明刑部移咨工部會同將該犯情罪與工程覈對輕重相準奏請工竣之日免罪又奏準有創設非常刑具肆行苛虐者從重治罪二年諭流徙人犯有止應將本身發遣者有并及妻子者後欲令其夫妻完聚故令一并發遣但其妻子本繫無罪嗣後如反叛重案緣坐干連人犯仍照例遵行外其餘流犯身死妻子皆免流徙欽此六年定認工贖罪之例槩行停止又定旗人犯罪有力情願折贖者照民人例折贖二十年諭凡重案悉歸刑部擬罪早完一日牽連者即得早安一日如遇齋戒不能審理亦應前期速結更聞所用枷恐有大小板有厚薄所帶鐵鎻亦輕重不一發在各門罪犯輒受門軍汚穢嚇詐此等情弊著稽察嚴禁欽此二十一年諭朕以逆冦殲滅海宇蕩平躬詣盛京謁陵因而廵行邊塞見烏喇地方風氣嚴寒由内地發遣人犯水土不習難以資生念此輩雖干憲典但旣免死原令安全若仍投畀窮荒終歸踣斃殊非法外寛宥之初念以後免死人犯皆發尚陽堡者改發遼陽至反叛案内流犯仍發黑龍江當差不必與新兵丁為奴以昭朕軫䘏矜全之意欽此二十三年奏準刑罰闗繫人命凡審讞用刑務遵定式不得恣行酷虐致滋寃濫三十七年奉㫖各監口有刑具曰大鐐與匣牀無異又短夾棍止長尺許大枷重百三十斤瓦樣重板此皆酷虐之刑著嚴行禁止四十一年定内外問刑官濫用夾棍致死人命者照例嚴行治罪其學政鹽院闗差以及佐貳官不許擅用夾棍如有應行刑訊事送問刑衙門審理雍正三年奏準監禁罪犯分别内外内監以居重囚要犯外監以居見審輕罪再聽審之人其女監别作牆垣隔别以杜串通口供之弊又定各省監獄高築牆垣以資防範其地勢低窪者改造高阜狹隘者酌量寛展其枷示暫羈之處亦必繕治完固該管官不時稽察毋令獄官禁卒任意陵虐弛懈疎防四年議準嗣後旗人所犯徒罪仍照舊例折枷鞭責完結有犯軍流者若繫滿洲䝉古亦停議遣若繫漢軍及内府佐領旗鼓佐領辛者庫即内管領各官及閒散人等按所犯流罪遠近照律定發各省州縣地方安置應發邊衛邊遠充軍者亦按其所犯照律編發應極邊煙瘴者酌發雲貴川廣地方此等軍流人犯内有人材弓馬好或祖父陣亡及本身有戰功者準免發遣仍照例折枷每一等加十五日十三年諭嗣後發遣人犯有應發寧古塔等處者皆改發三姓地方給與八姓一千兵丁為奴計一千人足數之後再行請㫖欽此乾隆元年奉㫖黑龍江寧古塔吉林烏喇等處若槩將罪人發遣則該處聚集匪類多人恐本地之人漸染惡習有闗風俗朕意嗣後如滿洲有犯法應發遣者仍發黑龍江等處其漢人犯發遣之罪者應改發於各省煙瘴地方著總理事務王大臣會同刑部議奏欽此遵㫖議準除滿洲蒙古漢軍有犯發遣者仍照定例發往及旗下家奴應發遣者亦照舊例發往為奴外其民人有犯如强盜免死減等及窩盜三人以上之犯應發遣黑龍江等處者皆令各該督撫覈明該犯妻室改發雲南貴州四川廣東廣西極邊煙瘴地方其各項平常發遣人犯情罪較輕酌發雲貴川廣煙瘴少輕地方交與地方官嚴行管束又覆準各省州縣所用刑具務皆按定式製造不得用短夾棍及大板重枷仍令該管道府稽察有不遵定式者即行糾㕘至徵比錢糧應用小板輕枷薄以示懲下限完糧即行釋放又强盜及十惡謀故殺人等案重犯仍照例用鐵鎖扭鐐各三道其餘鬭毆人命以及軍流徒罪等犯止用鎖扭各一道笞杖人犯止用鐵鎖有違例濫用者㕘處二年諭漢軍犯軍流等罪者其親族墳墓盡在京師邊方遠土風俗頓殊平時不習生計類難存活且與百姓錯處不無滋擾仍照例枷責完結欽此三年議準嗣後内府佐領旗鼓佐領辛者庫有犯軍流徒罪者照漢軍例枷責完結五年奏準過失殺傷人律應收贖而例内止有收贖過失殺人銀數並無過失傷人若干銀兩之文按過失殺人絞罪收贖銀十有二兩四錢二分今將收贖過失傷銀數其致傷輕重應得罪名合算折銀别立一圖附諸圖之後以便稽考不成傷笞二十贖銀三錢五分四釐手足傷笞三十贖銀五錢三分二釐他物傷笞四十贖銀七錢九釐拔髪方寸以上笞五十贖銀八錢八分七釐内損吐血杖入十贖銀一兩四錢一分九釐折人一齒一指眇一目者杖一百贖銀一兩七錢七分四釐折人二齒二指者杖六十徒一年贖銀三兩五錢四分八釐折肋墮胎眇人兩目及刃傷者杖八十徒二年贖銀五兩三錢二分二釐致成廢疾者杖一百徒三年贖銀七兩九分七釐成篤疾者杖一百流三千里贖銀十兩六錢四分五釐二十年奉㫖旗人犯罪充徒例得折鞭枷號者原指常犯而言若告主旗奴則當有别嗣後旗奴告主應問徒罪者著予實徒不準鞭枷完結又奏準旗奴告主應得徒罪限滿之日交與各該本旗照例官賣仍令為奴其價給還原主律綱凡擬罪條例詳見復大清律例全書者兹不載一律令順治元年定問刑衙門準依明律治罪先是國初律令重罪有斬刑輕罪用鞭責至是始有用明律之制又奏準故明律令當斟酌損益刋定成書俾中外知所遵守又奏準文官犯罪先下吏部覆議如所坐重大必奏請革職後方送刑部問擬武官隸兵部亦如之在外府州縣各官被革應逮問者行該撫按就近提訊具獄報讞法司但於爰書覆覈不得徑行句攝是年奉㫖法司會同廷臣詳繹明律㕘酌時宜詳議允當以便裁定成書頒布天下二年奉㫖令修律官㕘酌滿漢條例分别輕重差等彚集進呈四年律書成名曰大清律集解附例御製序文頒行天下計書十卷共四百五十八條律編為六曰吏律戸律禮律兵律刑律工律總律之大凡别為一編曰名例其目首列律母八字之義曰以以者與實犯同謂如監守貿易官物無異正盜故以枉法論以盜論並除名刺字罪至斬絞並全科曰準準者與實犯有間謂如準枉法準盜論但準其罪不在除名刺字之例罪止杖一百流三千里曰皆皆者不分首從一等科罪謂如監臨主守職役同情盜所監守官物并贓論數皆斬之類曰各各者彼此同科此罪謂如各色人匠撥赴内府工作若不親自應役雇人冒名私自代替及替之人各杖一百之類曰其其者變於先意謂如論八議罪犯先奏請議其犯十惡不用此律之類曰及及者因類而推如彼此皆罪之贓及應禁之物則入官之類曰即即者意盡而復明謂如犯罪事發在逃者衆證明白即同獄成之類曰若若者文雖殊而會上意謂如犯罪未老疾事發時老疾以老疾論若在徒年限内老疾者亦如之之類次列五刑之圖刑具之圖均詳刑制次曰十惡一謀反謂謀危社稷二謀大逆謂謀毁宗廟山陵及宫闕三謀叛謂謀背本國潛從他國四惡逆謂毆及謀殺祖父母父母夫之祖父母父母殺伯叔父母姑兄姊外祖父母及夫者祖父母父母但謀但毆即坐伯叔以下須據殺訖方入惡逆若謀而未殺自當不睦之條蓋惡逆者常赦不原不睦者會赦原宥五不道謂殺一家非死罪三人及支解人若採生造畜蠱毒魔魅六大不敬謂盜大祀神御物乘輿服御物盜及偽造御寶合和御藥誤不依本方及封題錯誤若造御膳誤犯食禁御幸舟船誤不堅固七不孝謂造言咒罵祖父母父母夫之祖父母父母及祖父母父母在别籍異財若奉養有闕八不睦謂謀殺及賣緦麻以上親毆告夫及大功以上尊長小功尊屬九不義部民殺本屬知府知州知縣軍士殺本管指揮千戸百戸吏卒殺本部五品以上官長若殺見受業師及聞夫䘮匿不舉哀若作樂釋服從吉及改嫁十内亂謂姦小功以上親父祖妾及與和者次曰八議一議親二議故三議功四議賢五議能六議勤七議貴八議賓凡應議者犯罪實封奏聞取㫖不許擅自句問若奉㫖推問者開具所犯及應議之狀先奏請議議定奏聞取自上裁其犯十惡者不用此律應議者之祖父母父母妻及子孫犯罪亦如之若皇親國戚及功臣之外祖父母伯叔父母姑兄弟姊妹女壻兄弟之子若四五品官之父母妻及應合襲廕子孫犯罪從有司依律追問議擬奏聞取自上裁其犯十惡反逆緣坐及姦盜殺人受財枉法者不用此律其餘親屬奴僕管莊佃甲倚勢虐害良民陵犯官府者加常人罪一等止坐犯人不在上請之律若各衙門追問之際占恡不發者並聽當該官司實封奏聞區處在京在外大小官有犯公私罪名所司開具事由實封奏聞請㫖不許擅自句問若許推問依律議擬奏聞區處仍候覆準方許判決若所屬官被本管上司非理陵虐亦聽開具實蹟實封徑自奏陳内外大小文武官犯公罪應笞者一十罰俸一月二十三十各遞加一月四十五十各遞加三月應杖者六十罰俸一年七十降一級八十降二級九十降三級皆留任一百降四級調用吏典犯者笞杖決訖仍留役内外大小文武官犯私罪應笞者一十罰俸兩月二十罰俸三月三十四十五十各遞加三月應杖者六十降一級七十降二級八十降三級九十降四級皆調用一百革職離任吏典犯者杖六十以上罷役文武官任滿得代改除致仕等官與見任同封贈官與其子孫正官同其婦人犯夫及義絶者得與其子之官品同犯罪者各依職官犯罪律擬斷無官犯罪有官事發公罪笞杖以上依律納贖卑官犯罪遷官事發在任犯罪去任事發公罪笞以下依律降罰杖一百以上依律科斷本案黜革笞杖以上折贖皆免若事干埋沒錢糧遺失官物雖繫公罪事須追究明白但犯一應私罪並論如律其吏典有犯公私罪名各依本律科斷文武官犯私罪罷職不叙追奪誥勅削去仕籍除名者官爵皆除僧道犯罪曽經決罰者追收度牒並令還俗軍民竈戸各從本色發還原籍當差定加减之法凡稱加者就本罪上加重謂如人犯笞四十加等即坐笞五十之類一稱减者就本罪上减輕惟二死三流各同為一减如犯死罪減一等即坐流三千里減二等即坐徒三年犯流三千里者減一等亦坐徒三年加者滿數乃坐謂如贓加至四十兩縱至三十九兩九錢九分雖少一分亦不得科四十兩罪之類又加罪止於杖一百流三千里不得加至於死本條加入死者依本條加入絞者不得至斬凡同僚犯公罪者並以吏典為首首領官減吏典一等佐貳官減首領官一等長官減佐貳官一等四等官内如有闕員亦依四等遞減科罪本衙門所設無四等官者止準見數遞減若同僚官一人有私自依故出入人罪論其餘不知情者止依失出入人罪論若下司申上司事有差誤上司不覺失錯準行者各遞減下司官吏罪二等若上司行下所屬依錯施行者各遞減上司官吏罪三等亦各以吏典為首凡一人犯罪其於律應減者若為從減謂其犯罪以造意者為首從者減一等自首減謂犯法知人欲告而自首者聽減二等故失減謂吏典故出入人罪放而還獲正減一等首領官不知情以失論失出減五等比吏典又減一等通減七等公罪遞減之類即上同僚犯公罪條並得累減定首從之法凡共犯罪者以先造意者為首依律斷擬隨從者減一等若一家人共犯罪止坐尊長若尊長年八十以上及篤疾歸罪於共犯罪以次尊長若無以次尊長方坐卑幼謂如尊長與卑幼共犯罪不論造意獨坐尊長以尊長有專制之權也如尊長年八十以上及篤疾於例不坐罪即以犯罪之次長者當之婦人與卑幼男同犯雖婦人為首仍坐卑幼男侵損於人者以凡人首從論造意為首隨從為從侵謂竊盜財物損謂鬭毆殺傷之類如父子合家同犯並依凡人首從之法為其侵損於人是以不獨坐尊長若共犯罪而首從本罪各别者各依本律首從論若本條言皆者罪無首從不言皆者依首從法其同犯擅入皇城宫殿等門及同私越度闗同避役在逃及同犯姦者律雖不言皆亦無首從二人共犯罪而有一在逃見獲者稱逃者為首更無人證左則決其從罪後獲逃者稱前獲之人為首鞫問是實還將前人依首論通計前決之罪以充後問之數若犯罪事發而在逃者衆證明白或繫為首或繫為從即同獄成將來照提到官止以原招決之不須對問定累犯之法凡二罪以上俱發以重者論罪各等者從一科斷若一罪先發已經論決餘罪後發其輕若等勿論重者更論之通計前所論決之罪以充後發之數其贓應入官物應倍償盜應刺字官應罷職罪止者各盡本法犯罪已發未論決又犯罪者從重論已徒已流而又犯罪者依律再科後犯之罪不在從重科斷之限其重犯流者依工樂戸留住法三流並決杖一百於配所拘役四年若已徒而又犯徒者依後所犯杖數決訖照徒年限應役亦總不得過四年又犯杖罪以下亦各依數決之本條别有罪名與名例不同者依本條科斷若本條雖有罪名其心有所規避罪重者自從所規避之罪論其本應罪重而犯時不知者依凡人論本應輕者聽從本法定容隠之法凡同居不限籍之同異雖無服者皆是若别居大功以上親及外祖父母外孫妻之父母女壻若孫之婦夫之兄弟及兄弟妻有罪彼此得相為容隠奴婢雇工人為家長隠者皆勿論若漏泄其事及通報消息致令罪人隠匿逃避者亦不坐其小功以下相容隠及漏泄其事者減凡人三等無服之親減一等若犯謀叛以上者不用此律定讀律之準凡律令垂為法守内外諸司百執事不得妄生意見變更成法嵗終各從上司考校有不能講解律義者論罰有差律中有稱乘輿車駕御物者尚方服御之物並同稱制者懿㫖令㫖並同稱期親祖父母者曽髙同稱孫者曽元同適孫承祖與父母同緣坐者各從祖孫本法其適母繼母慈母養母與親母同稱子者男女同緣坐者女不同稱與同罪者止坐其罪正犯至死者同罪之人得減一等不在刺字斬絞之律若受財故縱與同罪者全科其故縱謀反叛逆者皆依本律稱罪同者至死不減等稱監臨者内外諸司統攝所屬有文案相闗涉及别處駐劄衙門看管兵糧水利之類雖非所管百姓但有事在手者即為監臨稱主守者内外各衙門該管文案吏典專主掌其事及守掌倉庫獄囚雜物之類官吏庫子斗級攢攔禁子並為主守其職非統屬但臨時差遣管領提調者亦是稱一日者以百刻計工者從朝至暮不必百刻為限稱年者以三百六十日稱人年者以籍為定稱衆者三人以上稱謀者二人以上謀狀顯蹟明白者一人同二人之法稱道士女冠者僧尼同若於其受業師與伯叔父母同八年諭今後滿漢大小官員有犯或被人告發該衙門先將犯事緣由具奏必奉㫖革職然後送刑部審問永著為例欽此十年奏準朝廷禮待大臣平日則遇以恩有罪亦存其體近日將滿漢諸大臣得罪鎖禁發門當此寒天凍地無論寢食艱難日久成疾且通衢大路大臣免冠帶鎖褻辱難堪非所以廣皇仁存國體也嗣後大臣有犯法刑部候審定案治以應得之罪其鎖禁發門之例停止又奏準周官八議首曰議親今宗室有犯與民無異竊謂法不可寛而禮不可辱嗣後除有大罪請㫖定奪外餘皆斟酌輕重永除鞭鎖之條以昭睦族之恩至滿洲盤家之法在律謂之籍沒惟謀反重犯用之餘不在此例槩行除之以昭䘏下之典十一年奏準漢官輕罪皆議罰俸滿官則有贖身之例嗣後滿官緣事應贖身者照漢官例改為罰俸至滿官前程皆由戰功而得嗣後文職送吏部武職送兵部議處其罪犯重大者議革後方下刑部究擬又奏準刑法禁於已然之後而教諭彌於未然之前請勅法司仿古大誥之制國家用刑欵件擇其重大者編緝成書頒告天下廣為傳誦則人知洗心滌慮而自干斧鉞者寡矣十二年奏準明罰勅法使民知而不敢犯也今天下各衙門止有律書一部小民不得與聞故犯法者衆令督撫將刑律有闗於民者摘而刻之有司於春秋暇日為之講説並令學官常為士子講習又寧古塔地方窵逺嚴寒至其地者九死一生今將遼東各地諒其逺近酌罪輕重流之不必專發寧古塔又諭帝王以徳化民以刑輔治故律例最宜詳慎茍輕重失宜則官胥得以任意出入欲政平訟理其道無由朕覽讞奏本章引用律例每有未協爾部速將滿漢文律繕寫進呈朕將詳覽更定頒示遵行欽此十五年議準三品以上各官兄弟子姪犯杖罪者準折贖四品以下不準十七年校訂律例以盛京定例及屢奉上諭並刑部衙門定例分晰應入律各欵繕滿漢文册進呈康熙六年奉㫖刑部酌定見行則例詳晰分欵陸續進覽九年刑部將律例繙譯清書進呈十八年諭國家設立法制原以禁暴止姦安全良善故律例繁簡因時制宜總期合於古帝王欽䘏民命之意向因人心滋偽輕視法網强暴之徒陵虐小民故於定律之外復嚴設條例俾其畏而知儆免罹刑辟乃近來犯法者多姦宄未見少止人命闗係重大朕心惻然其定律之外所有條例如罪不至死而新例議死或情罪原輕而新例過嚴者應去應存著九卿詹事科道㑹同詳加酌定議奏欽此遵㫖將更改條例繕冊奏準刋刻通行名曰見行則例二十八年奏準律例一書有仍襲前代之舊文而於本朝法制絶不相䝉者如郡王將軍中尉親自赴京者罪如京操官輪操軍失於赴京者罪如近京民戸孳生牧養如校尉緝事察訪皆屬前代弊政久革不行如安樂自在等州非見在流犯之地如炒鐵運甎等事非見在徒犯之役如吏典犯辟長官處決然後報部如在京軍民犯杖軍發别衛民發别郡如詭寄田地全家抄沒如誤傷致死責賠一人之類見今明載律文實非通行令甲所當删定改正以成善本應請勅下三法司諸臣㑹同詳覈將律例之分刋者合之新舊之不符者通之輕重之可疑者酌之務期盡善然後刋刻全書勒成定本領示中外永行遵守三十四年定刑部見行則例分别載入律内有清漢文義互相參差者通加改正或罪有本律而例繫重複者即行删除或名目事欵舊有今無及舊無今有者酌量増刪或一欵應分兩條或數條同屬一欵者悉與分并其今雖不行而宜備㕘考者仍照例附載以備比引考證别部事例間有與律義相合者亦照刑部見行例採入如律例内有應具題請㫖者竢别題請㫖至於律文仿自唐律辭簡義該誠恐講晰未明易致訛舛特為彙集衆説於每篇正文後増出總注疏解律義期於明白曉暢使令易知今酌定名例四十六條謹録清漢文各六本進呈三十六年奉㫖新纂律書名例朕已覽閲奏聞後又有更改處發回刑部將更改之處増入著九卿詳閲具奏四十六年輯成大清律例四十二本謄繕清漢文進呈雍正元年奏準自康熙四十七年起至六十一年止見在遵行定例一百十有五條内有應刪應改者令律例館總裁速行審定並前纂成四十二本一并交與九卿互相㕘酌考訂畫一謄繕進呈三年諭朕自臨御以來欽䘏刑獄每遇法司奏讞必再三覆覈惟恐稍有未協又念律例一書為用刑之本其中條例繁多若不校訂畫一有司援引斷獄得以意為輕重貽誤非小特命纂修官刻期告竣今據將所纂全稾進呈朕逐一詳覽其有應行駮正者已一一批示但明刑所以弼教闗繫甚大著九卿㑹同細看務期斟酌盡善以副朕慎重刑名之意欽此是年頒行大清律集解附例凡三十卷通計律文四百三十六條律有總注或標舉大意或逐節分疏或釋正文而兼及小注或詮本條而旁通别義異同條貫眉目井然律後附例共八百二十四條分為三項曰原例繫累朝舊例凡三百二十一條曰増例繫康熙年間見行例凡二百九十條曰欽定例繫欽奉上諭及内外臣工條奏凡二百有四條六年諭律例舊文有八議之條厯代相沿已久我朝雖載其文而實未嘗行者蓋有深意存焉夫刑法之設所以奉天討罪至公至平無容意為輕重者也若於親故功賢等故為屈法以示優容則律無一定尚可謂之公平乎且此等或以効力宣勞為朝廷所倚眷或以勲門戚畹為國家所優崇其人既異於常人尤當秉禮守義以為士民倡率乃不自愛而罹於法尤非蚩蚩無知者比而執法者又曲為之宥何以懲惡而勸善乎如所犯果出無心情有可原則臨時酌量加恩未為不可若豫著為令是於其未有過之先即以不肖待之名為從厚實乃至薄也且使恃有八議之條任意為非必有自干大法而不止者是又以寛容之虛文轉陷之於罪戾矣今修輯律例八議之條仍令載入特頒諭㫖俾天下曉然於此律之不可為訓親故人等亦各知所儆惕而重犯法是則朕欽䘏之至意也欽此十三年諭國家刑法禁令之設所以詰姦除暴懲貪黜邪以端風俗以肅官方也然寛嚴之用又必因乎其時從前朕見人情淺薄官吏營私相習成風㒺知省改勢不得不懲治整理以誡將來今人心共知警惕矣凡各衙門條例有從前本嚴而朕改易從寛者此乃從前部臣定議未協朕與廷臣悉心斟酌而後更定以垂永久者應照更定之例行若從前之例本寛而朕改易從嚴者此乃整飭人心風俗之計原欲暫行於一時竢諸弊革除之後仍可酌復舊章此朕之本意也向後遇此等事件則再加斟酌若有應照舊例者仍照舊例行欽此十三年十一月諭古者刑不至大夫蓋以維國體而勵臣節國體不維則無尊卑上下之辨臣節不勵則大臣擁高爵大官而有徒隸無恥之心此賈誼所以諄切辨論也朕欲風勵天下使人各自愛共敦節行尤宜自大臣始大臣有不自愛者朕仍設廉恥以養之庶幾動其天良激厲鼓舞嗣後三品以上大員身罹罪譴即奉㫖革職拏問者法司亦不得遽加夾訊如有不得不用者亦必請㫖將此永著為例欽此乾隆元年奏準刑罰世輕世重自昔為然而寛嚴之道如溫肅之異用而同功時而崇尚惇大禁令漸弛道在整飭不得不濟之以嚴時而振興明作百度具張道在休養不得不濟之以寛寛嚴合乎大中而用中本乎因時蓋所謂中無定體隨時而在是以世宗憲皇帝遺詔惓惓於條例之寛嚴有宜再加斟酌之諭深有望於我皇上繼志述事敷時繹思紹執中建極之謨永臻於蕩平正直之治也伏讀大清律集解附例一書所刋原例増例欽定例三項非盡見行之條而自刋刻後至今前例又多酌改若不加以㕘訂歸於畫一恐内外問刑之官易於援引舛錯而吏胥因得高下其手足滋任意輕重之弊應請特簡大臣為總裁官將所刋刻律例並自刋刻後至今通行各例統加檢覈有宜因時變通如先經定例而後已改易者或前例未協而未經改定者應作何斟酌損益寛嚴得中逐一縷析條分務期平允其應刪除者即行刪除應増入者即行増入應更正者即行更正應仍照舊例行者亦即酌復舊章除律文律注仍舊外其刋入之例必將某條附載某律之處確切不移務使宏綱細目大小咸該仁育義正折衷盡善纂輯成書恭請欽定刋刻頒行又覆準纂修律例必詳慎無遺而後可垂永久督撫臬司等各有刑名之責其輕重詳畧之間倘有所見據實敷陳勅交該館以資採擇五年頒行大清律例凡四十七卷律文四百三十六條悉仍舊本刪律總注其注内有於律義有所發明實可補律之所不逮者則竟别立一條著為成例附例千有四十二條以次附列刪原例増例各名目又奏準乾隆四年十二月以前之例已經逐條奏準通行其乾隆五年以後之例依乾隆元年奏準嗣後有陸續増修之處仍定限三年一次編輯附律例之後頒行直省永著為例六年諭律例一書原繫提綱挈領立為章程俾刑名衙門有所遵守至於情偽無窮而律條有限原有不能纖悉必到全然該括之勢惟在司刑者體察案情隨時詳酌於無枉無縱則可不可以一人一事而頓改成法也本朝大清律周詳明備近年以來又命大臣等斟酌重修朕詳加釐定見在刋刻頒行而新到任之臬司科道等條陳律欵者尚屬紛紛至於奉天府丞竟奏請酌改三條夫以已定之憲章欲以一人之臆見妄思變易究竟不能盡民間之情弊而朝更夕改徒有乖於政體嗣後無得輕議紛更如果所言實屬有當該部亦止可議載冊籍不得擅改成書欽此聽斷一斷獄天命元年諭凡事一人獨斷必致生亂國人有事當訴於公所五日一聽斷之有私訴於諸臣之家者必當執送其私行聽斷者治罪凡貝勒諸臣有罪束身靜聽公斷有執抝不服者重治之欽此二年諭生殺之際不可不慎聽斷之官必詳審始末而後定擬倘事有未協勿挾忿爭競庶能得情欽此五年諭凡有下情不得上達者書訴牒懸諸木朕據其辭之顛末以便審鞫其令豎二木於門外欽此十年定漢人犯法皆一體審擬以協公平凡有告訐者所告實則坐有罪之人虛則反坐天聰五年定凡訐告諸貝勒者向例準其離主嗣後定之以條欵一除八分外訐告私行採獵及告私行隠匿出征所獲者一私殺人命者繫原告及被害人近支兄弟一姦滛屬下婦女者繫原告及本夫近支兄弟一所屬從征効力戰士訐告隠匿不報乃以私人濫薦者一本旗人欲行互訐而貝勒控制不許申訴有告發者皆準離主仍罰貝勒銀有差此外凡以細事許訴者不準離主但視事之輕重審斷至諸貝勒審事枉斷人死罪者罰銀六百兩枉斷人杖罪贖罪及私遣人出境交易怠忽職業擅取民間財物馬匹將本旗女子不行報出短價私買者皆罰銀二百兩又定訐告之事兩造未陳先拘見證同衆面鞫務得實據若不速問見證致兩造知覺潛相囑託支飾規避者按事大小治罪六年諭凡訐告諸貝勒者斷離本主與否悉照前議其餘彼此許告者務皆從實如告二事以上重者審實輕者審虛免其坐誣仍準離主如告數欵輕重相等審實一欵亦免坐誣如所告多實及虛實相等者原告準其離主所告多虛者不準訐告兩事以上而輕者實重者虛與告一事而情輕訴重者除實欵應坐被告外其誣告之欵反坐原告若子告父妻告夫同胞兄弟相告者果繫反叛逃亡等罪許其訐告其餘有訐告者被告照常擬外原告罪亦同之不準離主欽此九年諭凡鬭毆原告被告宜聽法司審問聞漢人與滿洲蒙古鬭毆同類各相幫助是不遵國法而亂行也犯者必重懲之欽此順治元年定鬭毆及戸婚田土細事止就道府州縣官聽斷歸結重大事情方赴撫按告理在京仍投通狀聽通政使司察實轉送刑部問擬其五城御史有應受理送問者方準送問非繫機密重情入京越訴者加等反坐又定凡已經審結之案非奇寃積枉不得復起葛藤至旁觀出首多屬傾誣百姓告訐官長尤為刁悖且民間婦女輒拘訊公庭亦傷廉耻之化嗣後永行禁止二年定刑部專司詳讞例不受辭嗣後民間辭訟在外歸撫按監司在内歸順天府宛大二縣五城如果有寃抑赴通政使司投告察審送部問擬刑部不得仍前濫收辭訟四年定凡鞫獄須依原告人所告本狀推問若於狀外别求他事摭拾被告人罪者以故入人罪論同僚不署文案者不坐若因其所告本狀事情法應掩捕搜撿因而撿得被犯别罪事合推理非狀外摭拾者不在此限諸衙門鞫問刑名等項必據犯者招草以定其罪若吏典人等為人改寫及代寫招草増減情節致罪有出入者以故出入人罪論若犯人果不識字許令在官不干礙之人依其親具招情代寫又定凡鞫獄官推問罪囚有同起内犯罪人伴見在他處官司停囚專待其人對問者雖彼此職分不相統攝皆聽行文句取文到後限三日内即將所句待問人犯發遣違限不發者一日笞二十每一日加一等罪止杖六十仍行移本管上司問罪督令解發若起内應合對問同伴罪囚已在他處州縣事發見問者聽輕囚移就重囚少囚從多囚若囚數相等者以後發之囚送先發官司并問若兩縣相去三百里之外者各從事發處歸斷移文知㑹違者笞五十又定有司於獄囚鞫問明白追勘完備軍流徒罪各從府州縣決配至死罪者在内法司定議在外聽督撫審錄無寃依律議擬法司覆勘定議奏聞候有回報應決者委官處決故延不決者杖六十若犯人反異原招家屬代訴稱寃即便再與推鞫事果違枉即同原問原審官吏通問改正囚犯明稱寃抑不為申理者分别故入失入罪論又定官司斷罪皆須具引律例若律有數事共為一條官司止引所犯本罪者聽其特㫖斷罪臨時處治不為定律者不得引比為律若輒引比致罪有出入者以故失論律以頒降日為始若犯在已前者並依新律擬斷如事犯在未經定例之先仍依律及已行例定擬其定例内有限以年月者皆以限定年月為斷若例應輕者照新例行律令該載不盡事理斷罪無正條者援引他律比附應加應减定擬罪名申該上司議定奏聞若輒斷決致罪有出入以故失論又定凡盜公取如强盜搶奪竊取如竊盜掏摸皆為盜器物錢帛之類須移徙已離盜所方謂之盜珠玉寶貨之類據入手隠藏縱在盜所未將行亦是其木石重器非人力所勝雖移本處未駝載間猶未成盜不得以盜論馬牛駝驘之類須出闌圏鷹犬之類須專制在已乃為盜其未成盜而有顯蹟證見者依已行而未得財科斷又定勘問謀殺人犯果有詭計陰謀者方以造意論斬助毆傷重者方以加功論絞謀而已行人贓見獲者方以强盜同辟毋得據一言為造謀指助勢為加功坐虛贓為得財一槩擬死致傷多命若鬭毆及故殺人獨毆曰毆有從為同謀共毆臨時有意欲殺非人所知曰故其共毆人傷皆致命以最後下手重者當其重罪如當時身死則坐後下手者當時未死而過後死者當究明何傷致死以傷重者坐罪若原謀共毆亦有致命傷以原謀為首至亂毆不知先後輕重者有原謀則坐原謀為首無原謀則坐初鬭者為首以堪殺人之事為戲如比較拳棒之類因而殺傷人者為戲殺戲傷因鬭毆而誤殺傷旁人者為誤殺誤傷各以鬭毆殺傷論若耳目所不及思慮所不到初無害人之意而偶致殺傷人者為過失殺依律收贖其鬭毆傷而未死者驗傷官親往不得舁傷者就驗驗明立限責令犯人保辜以手足他物傷者限二十日刃及湯火傷者三十日打傷肢體及破骨墜胎者五十日限内因傷身死者擬抵限外身死及限内因他故死者各科傷罪又定官司撿驗屍傷若承委牒到託故遷延不即撿驗致令屍變及不親臨監視轉委吏卒若初撿與復撿官吏相見扶同屍狀及不為用心撿驗移易輕重増減屍傷不實定執致死根因不明者正官杖六十首領官杖七十吏典杖八十仵作行人撿驗不實扶同屍狀者罪亦如之因而罪有増減者以失出入人罪論受財故撿驗不實者以故出入人罪論贓重者計贓以枉法各從重論又定凡贓欵有六曰枉法贓以五兩為一等一兩以下杖七十一兩至五兩杖八十遞加至五十五兩杖一百流三千里至八十兩擬絞無禄人各減一等至一百二十兩擬絞贓各主者通算全科曰不枉法贓以十兩為一等一兩以下杖六十一兩至十兩杖七十遞加至一百二十兩杖一百流三千里一百二十兩以上擬絞無禄人各減一等罪止滿流贓各主者通算折半科罪曰竊盜贓與不枉法贓同以一主為重并贓論罪曰監守盜以二兩五錢為一等一兩以下杖八十一兩至二兩五錢杖九十遞加至三十兩杖一百流三千里雜犯三流總徒四年四十兩擬斬雜犯準徒五年曰常人盜以五兩為一等一兩以下杖七十一兩至五兩杖八十遞加至五十五兩杖一百流三千里雜犯三流總徒四年八十兩擬絞雜犯準徒五年曰坐贓以十兩為一等一兩以下笞二十一兩至十兩笞三十遞加至八十兩杖一百自徒以上以百兩為一等百兩杖六十遞加至五百兩杖一百徒三年彼此俱罪之贓及犯禁之物則入官若取與不和用强生事逼取求索之贓並還主以贓入罪正贓見在者官物還官私物給主已費用者若犯人身死勿徵餘皆徵之又定遇告訟人命除内有自縊自殘及病死而妄稱身死不明意在圖賴詐財者究問明確不得一槩發撿其果繫鬭殺故殺謀殺等項當撿驗者在京委刑部司官及五城兵馬司京縣知縣在外委州縣正印官務須於未撿驗之先即詳鞫屍親證左兇犯人等令其實招以何物傷何致命之處立為一案隨即親詣屍所督令仵作如法撿報定執要害致命去處細驗其圓長斜正青赤分寸果否繫某物所傷公同一干人衆質對明白各情輸服然後成招或屍久發變青赤顏色亦須詳辨不許聽憑仵作溷報擬抵其仵作受財増減傷痕扶同屍狀以成寃獄審實贓至滿數者依律從重科斷凡自縊溺水身死别無他故親屬情願安𦵏官司詳審明白準告免撿若事主被强盜殺死苦主自告免撿者官與相視傷損將屍給親埋𦵏其獄囚患病責保看治而死者情無可疑亦許親屬告免覆撿若據殺傷而死者親屬雖告不聽免撿八年諭刑部今後凡有奏告之人在外者當先赴司道府州縣陳訴若不審理再訴之督撫廵按若不準或枉斷當赴都察院擊鼓鳴寃都察院問果寃枉不與具奏仍赴通政使司具本奏聞在京有寃枉者先赴五城御史順天府大宛二縣告理若御史府縣接狀不準或審斷不公再赴都察院通政使司申告如例其應呈應訴六部衙門者照舊準理若内外大小衙門明知寃情蔽不上聞許具本至午門前進奏自後仍有妄行聲寃告奏者問以重罪欽此十年諭帝王化民以徳齊民以禮因姦人為惡害及善良所以不得已而用刑然必情罪允孚斯加者無悔而受者無怨故法者天下之平朕亦不得任喜怒為輕重也凡官司犯事朕即有意見不肯遽自裁斷必下部議者意以十師之任職在明允而膺斯任者又皆親信大臣必能仰體朕心審察得情不致寃濫今該部私心揣度以為事經上發若從輕擬恐以情面生疑庇䕶為咎不如重擬以作自全之計甚至所犯事情不就事論事而反引已結舊案文致重法如此舛謬大不合理朕於政事最重刑獄奏讞本章必再三覆閲每有改正但恐日有萬幾或一時不及致詳竟批依議死者不可復生誤者不可復改此悔彼怨咎將誰歸以後問刑衙門議事大臣問擬人罪務要詳審真情引用本律一切鉤索羅織悉宜痛革書云罪疑惟輕所當深念如情罪重大憲典具存又不得藉口故出以致漏􅃠務平心守法使人不寃以幾刑措之治欽此康熙元年奏準我朝當一代創典之始革明季末流之弊立法不得不嚴而用法未嘗不寛故雖屢定成案必下三法司覈擬者誠恐畸輕則縱畸重則苛也乃刑部讞案内情輕而反比重律法重而反從輕擬者不可勝舉嚴飭刑部嗣後凡兩造口供不全録者即為作弊引律不確合者即為欺公治以不職之罪九年定凡承審欽件限期專責督撫計月處分不許分坐司道等官如有提犯行察限内實難完結者承問官詳明督撫題請展限如承問官不行詳請及易結不結者皆罰二十年諭帝王以徳化民以刑弼教所闗最重近覽法司章奏議決重犯甚多愚民無知或由教化未孚或為饑寒所廹以致身罹法網深可憫惻凡問刑各官審理重案有律例未諳定擬失當草率完結者有膠執成見改竄供招深文羅織者有偏私索詐受囑徇情顛倒是非者有一於此民枉何由得伸兹特嚴加申飭務期持亷秉公痛改積習加意祥刑以副朕尚徳好生之至意欽此二十二年議準凡控告案内人犯有咨八旗並總管内務府行提者即日解送過部越二日不行解送者將該管官議處若行提屯内居住人等每日定限五十里照限送部違限者鞭五十其行直𨽻府州縣提人者亦每日定限五十里文到五日内起解若不照限申解將該管官題㕘議處或别有事故限内不能起解者據實報部若刑部司官將應結事件藉名行察推諉遲延者題㕘議處二十三年諭向因刑部審理遲延屢加申飭今積案已完宿弊漸革惟在外各衙門因循積習刑名案件有經年累嵗不結者或因承審官不能秉公妥擬希圖茍且完結以致上官屢行批駮沉案積久不清或因上官意有偏徇藉端頻行駮審因而營求滋弊顛倒是非此等弊端如何立法永絶俾訟簡刑清克稱平允九卿等詳議欽此遵㫖議準各省人命重案每案限六月審結州縣自理事件限二十日越訴事欵必有礙本官不便控告或審斷不公須將控過審過情節開明狀内方許準理惡棍包攬辭訟從重治罪承問官不依律治罪嚴加議處上司除𦂳要重大事情許差人至州縣其餘小事止許行牌催提下屬審詳案件原批某衙門即於某衙門完結不得一官未結又委别官辭狀止許一告一訴告狀人止告正犯確證不許波及無辜牽連婦女及續告原狀無名之人二十五年諭刑曹民命攸闗國典所繫必以中正之心行平恕之道使法蔽其辜毋縱毋枉必得真情始免寃抑若惟以深文為能事鍜鍊為盡職及獄辭既具奏牘已成即反覆推詳欲求其更生之路亦甚難矣朕於爾諸臣章疏有情可矜疑罪未允協者皆駮令覆審嗣後其各體朕懐殫心竭慮矢慎矢明以副祥刑之意欽此又定在京衙門承審事件限一月審結被證在外者以到齊日為始内外移咨行察者以文到日為始催至三次無囘文者題㕘又定直省審理人命事件定限六月盜案限一年如案内正犯及要證未獲情事未得確實者題明展限按察使自理事件限一月完結府州縣自理事件限二十日審結上司批審事件限一月審報若隔屬提人及行察者以人文到日起限如有遲延情弊該督撫察㕘徇縱者一并議處又定人命呈報到官該地方印官立即親往相驗止許隨帶仵作一名刑書一名皂𨽻二名一切夫馬飯食皆自行備用並嚴禁書役人等不許需索分文其果繫輕生自盡毆非重傷者即於屍場審明定案將原被鄰證人等釋放違者分别議處又定充軍人犯在京兵部定衛在外廵撫定衛仍鈔招知會兵部其問該邊外為民者鈔招解送戸部編發又定各省民人在京犯該流罪並免死減等流犯如無妻室及無應追埋葬銀者順天府定地發配如有妻室及應追銀順天府轉發原籍地方令其追銀僉妻各照本省所定應流地方發配三十九年諭州縣取原供時雖不得情亦必飾辭具詳上司覆覈然後達部即有寃抑刑部何由周知凡承問官初審未得實情及上司批駮後果能審出不妨改正若明知已誤又復隠諱則寃抑莫伸矣各宜虛衷詳鞫務得實情欽此又議準凡州縣官審擬詳報案内有可疑舛錯之處毋得交與原問官審理著别委賢員就犯人地方確審如審出别情將原問官題㕘照例議處四十年議準各府州縣人命案件六月限滿照例題㕘後又於四月限内不行完結復㕘遲延者照易結不結例議處並將督催之臬司承催之道府一并㕘處如承審官或為勢壓或以賄囑故為延緩聽訟不平鍜鍊失實等項該督撫隨時察覈題㕘四十四年議準巧吏蠧胥率多鍜鍊羅織刪竄供辭惡徒姦棍亦復串通賄囑翻改成招嗣後命盜等情取明口供高聲朗誦即於紙尾填注該犯姓名令其親自畫押以清宿弊四十八年奉㫖應結之事即當議結不必數駮致増事端五十二年議奏凡在外民人與在京居住旗人為地方房產主僕名分等事册籍皆在戸部外省不便完結者應聽戸部審理其中有互相鬭毆重傷或搶奪等情戸部㑹同刑部審結又議準旗民互相訐告如干連命盜及有職之人緊要當差之人不便發審者仍行提解部審結外其年老有疾退差在屯居住旗人及莊頭與民賭博爭產㛰婣等細事皆在理事同知處控告審理詳報督撫完結五十三年諭朕詳閲各省命盜案件自審結以至具題或逾時經嵗又間有部駮覆審者案内牽連之人雖輕罪不免羈禁以竢完結離家失業至於饑寒病斃者往往有之朕深用憫惻以後直省刑名除重犯應軍流徒罪仍行候㫖完結外所有杖笞以下輕罪該督撫於審結日即行發落不必羈候部覆其不闗題請在外審結者仍照舊例欽此又題準監追贓銀及分賠等項限一年通完死犯減二等軍流免罪追完三百兩以上承追官交部議叙如承追不力議罰再限一年如完本犯仍準減等如再不完軍流充發死罪監追承追督催各官交部議處再限一年著落家屬追賠家產盡絶者保題豁免倘題後别有財產皆入官出結各官照例議處五十七年奏準各省審擬案件有所引律例不符或前後情辭互異經部院駮令詳審承審官有失出失入之罪而督撫亦自涉䝉溷之愆遂始終徇庇不即改正嗣後駮審事件務令虛心詳鞫細按律例即行改正具題其承問官從前錯擬免議若終不改正該部院提全案覆覈改正將該承審官及該督撫一并議處又奏準刑部提拏人犯到部重罪仍行收禁其徒罪以下不必監禁交與該佐領及該地方官保出候審竢完結後即行發落雍正二年諭朕覽命案奏牘如故殺謀殺尚少而以鬭毆傷人者甚多或因口角相爭或因微物起釁揮拳操戈一時殞命及至抵罪雖悔何及此皆愚民不知法律所致殊可憫惻古有月吉讀法之典聖祖仁皇帝上諭有講法律以儆愚頑一條蓋欲使民知法不可犯律無可寛畏懼猛省遷善而逺過也爾部可摘取毆殺人命等條疏解詳明令各省地方官刋布曉諭俾知鬭毆律尚如此則故殺謀殺罪更可知互相講論時存警惕以化其好勇鬭狠之習庶命案可以漸少矣欽此又議準盜犯審實之後又復供於别案行刦者槩不準行至其攀出夥盜在别案已經審實不必提質但行文取供較其兩案從重歸結官民人等有兩案犯罪而前案罪輕先行題結竢後案具題之日仍將前案輕罪叙入從後案重罪歸結如前案已擬重罪後案罪輕至後案具題之日亦將前案重罪聲明仍歸前案定擬有犯數案者亦將各案所擬簡明登載於最後題結本内統從重罪科斷三年議準在京八旗五城解部案件訊明無干即予釋放直隸山海闗古北口等處笞杖以下並證左牽連人等皆停解部釋放取保倘必須審訊再行拘提命案屍親亦止取供免解至各省州縣案件速行完結必須申解上司者應擬笞杖等犯亦取供保釋不得濫行監禁差拘違者㕘處又定每年四月初一日至七月三十日時正農忙辭訟内除命盜重案照舊受理其餘槩行停止至八月初一以後方許聽斷五年議準杖笞等輕罪五城自行照例完結不必送部若罪重於笞杖者五城審明送部再步軍統領衙門亦繫司刑之地其杖笞以下之罪照例自行完結若罪重於杖笞者審明亦送刑部六年諭律例之設乃詳察情理揆度至當而後定者也審擬罪案之時應引某條則引之斷無輕重任意或介兩可之理常見奏章内往往有先引一條復云不便照此治罪更引重罪以治之此乃臣下營私之陋習或欲以嚴刻之名歸之於上或冀法外之恩巧於開脱均非明允之道以後外省本章有兩引條例者駮回將情由㕘奏若當引輕律而故坐重罪亦難逃朕之洞鑒内外執法臣工各宜凛遵欽此十三年九月諭本年恩詔赦欵甚多但奴僕告家主之案名分攸闗情罪可惡毋得援恩詔赦免蓋凡官民人等身蹈過愆大干功令者自然不能掩蓋且無人不可舉首斷不容奴僕挾制短長妄行首告而紊尊卑之定分也嗣後遇有奴僕首告家主者雖所告皆實亦必將首告之奴僕仍照例重治其罪永著為令欽此乾隆元年諭朕聞姦宄不鋤不可以安善良風俗不正不可以興教化閭閻之大惡有四一曰盜賊三代聖王所不待教而誅者也二曰賭博干犯公令貽害父兄以視周官之罷民未麗於法而繫諸嘉石收之圜土者罪有甚矣三曰打降即周之所謂亂民孟子所謂賊民也四曰娼妓則自周以前人類中未嘗有此此四惡者刦人之財戕人之命傷人之肢體破人之家敗人之徳為善良之害者莫大於此是以我皇考愛民之深憂民之切嚴申科禁戒飭守土之官法在必行日夜捕緝積嵗月之久然後道路少響馬老𤓰賊而商旅已寧賭博及造賭具者漸次改業而家室以安聚黨打降者斂跡而城市鄉鎮鮮聞鬭囂娼妓逺藏不敢淹留於客店此皇考十有三年政教精神所貫注而海内臣民顯見其功效實享其樂利者也朕自嗣位以來捐免租賦豁除賠累裁革積弊増廣赦條無非惠保良民使得從容休息衣食滋植而無識諸臣誤謂朕一切寛容不事稽察以致大小官吏日就縱弛民間訛言諸禁已開風聞直省四惡皆微露其端倪即如天津一帶私鹽横行無忌恐其他類此者相繼而起是守土之官敢悖世宗憲皇帝之明㫖墮十有三年之成功而戕賊善良傷敗風俗也自後州縣官有政令廢弛使四惡復行於境内者該督撫不時訪察即行嚴㕘督撫司道郡守有不能董率州縣殫心捕治者或被内外臣工覈實劾奏或朕訪聞得知必以溺職治罪與通苞苴受賄賂者等决不輕貸爾諸臣慎毋泄泄沓沓自取殃咎戒之戒之欽此又覆準相驗屍及鬭毆傷重之人除附郭及事簡州縣仍令正印官親詣驗看外其離城窵逺之區及繁劇州縣準令佐貳廵捕等官據實驗報仍聽正印官填注傷單詳報受傷者定限保辜倘代驗官驗報不實照例議處如州縣實能往驗而怠於從事輒委佐貳等官致滋擾累揑飾等弊仍照例議處又覆準虧空人員務須按照定例嚴追如實繫家產全無覈勘確實者準其照例豁免不許溷開借欠等項希圖搪抵其果繫近年債負確有原劵中保可慿被開之人力能交納者方準追抵如將逺年無慿書扎記簿指為欠項䝉溷開抵槩不準行地方官聽囑徇情妄拏無辜追比者照故勘平人律治罪又覆準州縣官接收呈辭除命盜重情立即訊究詳報外其餘一切呈辭統於五日内悉行批發不得任意遲滯以及沉擱内銷其準理事件每事止許一差限日拘齊隨到隨審不得輾轉改期致滋拖累違者嚴行㕘處又覆準相驗屍傷本邑與鄰邑壤地相距不過五六十里而本邑印官公出鄰邑印官在署即請鄰邑印官代驗其或鄰邑地逺不能朝發夕至而印官又經他往方許别委佐貳代驗代驗之員必繫同知通判州同州判縣丞等官毋得濫委雜職又覆準各省臬司遇州縣承審重案毋得任意刪改故為増減倘有情罪供招不符處即駮飭確審供内有字樣不符者令其改正於招内聲明如有藉簡招妥招名色故為刪改又令將改本繳銷者將該臬司照問刑官改造口供例議處又覆準强刦盜案令該管印官會營弁察勘若竊案毋容會勘止令出具並無抑勒諱飾印甘各結申送該管上司存案如有抑勒改報諱强為竊者照諱盜例議處又覆準事繁州縣設仵作三名中縣設二名小縣設一名仍於額外再募一二人令其跟隨學習將洗寃錄等書督令講解熟習如有招揺賄囑妄報匿傷等弊將該仵作嚴行治罪三年覆準凡所屬軍民赴上司控告戸㛰田土等事其辭狀務皆收理察無寃抑者仍批明出示不得濫準拖累若察其果有寃抑審斷未允者即行親訊歸結倘將稱訴寃枉之案不行準理或準理而仍發原問衙門收審者該督撫即行題㕘照例議處又覆準鄰封闗提人犯限文到二十日内拏解如無故逾限不發將該地方官照事件遲延例議處聽信地保差役揑稱並無其人並久經外出空文回覆掯不發人者將該地方官照匿犯不解例議處又議準直省外結事件罪繫杖徒以下令該管按察使詳加察覈其有情事可疑口供未確必須覆審定擬者仍令駮回原問官確審妥擬詳結若果供辭確實毫無疑義僅於問罪引律之處輕重稍有未協者即行改正免其駮回仍將府州縣所擬未協之處於文内聲明聽候督撫察覈五年諭盜賊刦奪固為地方之患法不容寛而䑕竊狗偷之輩昏夜潛踪伺隙乘便亦足以侵傷良善擾害行人不可以為非重大之案而置之不問也朕聞直隸山東江南河南等省頗有行客單少不能禦侮被匪類邀截於路强取銀錢行李而走者又假作進香之人乞丐之類以肆其搶奪者在本人失物無多未必盡行報官而地方希圖省事或隠諱不察或緝捕不力以致宵小無所懲儆此風不可漸長著該省督撫等嚴行申飭不時稽察倘有仍蹈故轍者必加以㕘處毋得寛縱欽此又諭弭盜為安民之要務朕聞各省聨界之處多有積窩巨匪久慣豢盜殃民隔省往拏必須赴地方官掛號添差稽遲時日又或地方官不能上緊協拏以致要犯風聞逺遁盜案久懸不結向䝉世宗憲皇帝洞悉其弊特降諭㫖凡地方失事探實贓盜之處無論隔縣隔省一靣差役執持印票即行密拏一靣移文關㑹聖諭煌煌實為息盜安民之良法及近年各省督撫奉行不力以致被盜之省辦理掣肘夫膺牧民之任者均有弭盜之責原不容有此疆彼界之分著嗣後凡有鄰省聨界地方積窩逃盜訪實之後或徑行差捕或知會密拏庶盜案易結盜源易清而鄰境彼此均受其益如有司等仍以為具文岐視怠忽經朕訪聞必於該督撫是問欽此又覆準承審命案及欽部案件州縣府司各照例分限審解如限四月者州縣限兩月解府州府州限一月解司司限二十日解督撫如限六月者州縣限三月解府州府州限四十五日解司司限一月解督撫限一年者州縣限七月解府州府州限兩月解司司限四十五日解督撫仍將起解年月日期於疏内聲明以便察覈其逾限者各照例議處六年覆準州縣審理刑名案件審解之後招報該道其該府如何覈轉及督撫藩臬如何批示之處並令備錄詳報該道以慿察覈又覆準原問官審斷未當固執成見必應改委别員承審者將應行改委起限緣由聲明未經㕘展者咨部察覈已㕘展者具疏題明如上司明知屬員限期將届故為别委希圖展限將該上司照徇庇例議處又覆準地方官於農忙停訟期内凡遇墳塋地土等項務須隨時勘斷至事闗緊要或證左人等見非務農即不得以時值停訟藉辭推諉亦不得濫差羈候致滋擾累十年諭親民之官審理辭訟秉公剖決乃職分所當然在官無可居之功在民亦不言感朕聞外省陋習有於辭訟審結之後勝者自以為得計糾集親友鄰里製斗造匾懸挂公堂以為媚悦無識有司亦恬然受之不以為怪此等阿諛獻媚之習適以啟好訟生事之端且流為粉飾沽名之弊澆風斷不可長嗣後著嚴行禁止其有仍前挂斗送匾者各該督撫將縱容徇隠之有司即行㕘處并將本人一并治罪欽此十八年奉㫖承審欽部案件向例限六月審結者著改為四月又諭朕因督撫㕘劾屬員並不實心究審惟推諉承審各官遷延滋弊交部别立限期按例分别舊限六月者改為四月限四月者改為兩月原欲使被㕘者不致屈抑日久或疑為期太廹不思督撫列欵糾㕘必經確訪至察審時果能虛公研鞫虛實無難立辨即謂定制須由道府州縣次第審詳此不過外省陋習耳究之所委道府州縣亦無不迎合上司意指則仍是督撫自定之案亦安用是虛文為耶然案情有難易道路有遠近此後凡督撫㕘官能依新限速辦固見敏幹如新限内必不能完結即著將實在情由豫行摺奏其尚在舊例限期之内寛其議處若仍狃於積習致逾舊限該部隨本察㕘欽此又覆準凡遇報到人命印官公出同城並無佐貳而地方廣袤相距鄰封遙逺按繫吏目典史分轄地方即飭該吏目典史驗立傷單申報印官覆驗其距城有數日之程不能即時往返者該吏目典史一靣移㑹該管廵檢就近往驗填注傷單一靣申請印官覆驗填圖通報如印官不能即回即申請鄰邑代驗填圖通詳倘吏目廵檢等相驗不實照例分别㕘處又諭各省審㕘案前已勅部嚴立限期但督撫題㕘屬員即欵跡昭著不過摘印看守必竢奉準部文始行提訊若雲貴等遠省往返已逾數月是於未起限之先已稽延半載且從來督撫㕘員斷無懸擬被屈不令審究之理是㕘則必革昭雪須竢審明是以速審速結為是然大員或慮體制攸存嗣後文職道府以上武職副將以上仍照舊例於題㕘得㫖部文到日再行提訊部文亦著速行其餘文武官員於具題日即將案内應質人犯拘齊審究如督撫同駐省分一靣具題一靣行知承審衙門照例提審庶是非早辨案牘易清著為令欽此欽定大清㑹典則例卷一百二十四
