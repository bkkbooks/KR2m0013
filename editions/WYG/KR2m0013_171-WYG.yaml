body:
  text: 内務府奉宸苑一建置康熙二十三年設奉宸苑鑄給印信簡内務府總管一人掌之管理一切苑囿事務凡有題奏照上駟院武備院例自行題奏設郎中一人員外郎四人主事一人筆帖式九人四十年奏準増設筆帖式一人雍正元年奏準增設筆帖式二人六年奏準奉宸苑卿定為三品十三年奏準增設筆帖式二人乾隆十四年奉㫖奉宸苑卿定為二人由侍衞内務府官各簡一人補授仍簡大臣兼管院事十六年奏準増設郎中一人筆帖式二人一奉宸苑所𨽻景山瀛臺蠶壇闡福寺永安寺南花園河道萬壽寺髙亮橋行宮各設八品苑丞未入流苑副各一人樂善園行宮八品苑丞未入流苑副各三人翰林花園未入流苑副一人初設八品催長二人領催十有二名康熙二十五年増設八品催長四人雍正二年增設八品催長二人乾隆四年增設催長一人領催四名十一年闡福寺增設催長一人領催一名十六年奏準增設八品催長三人領催六名以八品催長改為八品苑丞其由領催委署之副催長改為未入流苑副領催改為執事人一南苑設官順治十八年設員外郎二人康熙八年於員外郎二人内改一人為郎中二十三年設筆帖式六人二十四年奏準苑内原有大紅門小紅門東紅門南紅門西紅門五門又增設正國寺門黄村門廻城門雙橋門共為九門大紅門設四品總領一人領催二名驍騎十有八名其餘八門每門各設五品防禦一人領催一名驍騎九名並屬南苑郎中管轄三十年奏準新舊行宮各設未入流苑丞一人苑副二人三十六年奏準南紅門行宮設未入流苑丞一人苑副二人五十二年奏準南紅門行宮增設苑副一人雍正元年奏準增設員外郎一人又於筆帖式内委署主事一人乾隆元年增設主事一人十八年增設八品催長一人聽差人十有五名一暢春園設官康熙年間定設郎中一人八品苑丞三人未入流苑丞十人筆帖式十人四十三年設西花園八品苑丞二人未入流苑副八人筆帖式二人一圓明園設官雍正元年奉㫖圓明園設筆帖式四人又增設筆帖式四人二年設苑丞六人苑副十有二人五年增設筆帖式四人七年奉㫖苑丞六人著授為六品賞戴藍翎苑副十二人以六人授為七品六人授為八品乾隆六年奏準於筆帖式内委署苑副二人增設學習筆帖式二人八年設主事一人增設七品八品苑副各一人十六年奏準設七品庫掌一人於筆帖式内委署苑副五人又奏準長春園設六品苑丞一人七品八品苑副各一人二十年奏準圓明園協理事務郎中員外郎闕即於本處主事及六品苑丞内簡選引見補授一静明園設官康熙三十一年奉㫖澄心園著改名静明園設未入流苑丞一人未入流苑副三人筆帖式一人乾隆五年奏準由西花園撥往八品苑丞一人未入流苑副一人十八年奏準苑丞二人授為七品苑副四人授為八品一静宜園設官乾隆九年奉㫖著於西花園静明園二處苑副内各簡選一人在香山行宮行走又奉㫖設管理事務員外郎一人十年奏準設八品苑丞一人未入流苑副一人筆帖式一人十二年奉㫖以香山行宮為静宜園增設八品苑丞一人未入流苑副一人筆帖式一人十六年奏準八品苑丞二人改為七品未入流苑副四人授為八品又增設七品苑丞一人八品苑副一人筆帖式一人於七品苑丞内簡選一人協理事務十七年奉㫖祭祀所用鹿交静宜園餧養一清漪園設官乾隆十六年奉㫖以萬壽山行宮為清漪園又奏準設六品苑丞一人七品苑副二人八品苑副二人筆帖式四人八品催長一人由奉宸院撥往未入流催長一人十八年奉㫖由上駟院撥送七品牧掌六人改為七品苑副副牧掌六人改為委署苑副十九年増設六品苑丞二人一湯山行宮設官康熙五十四年題準設八品苑丞一人未入流苑副二人効力筆帖式二人乾隆四年增設未入流苑副一人一升除本苑郎中員外郎主事及管理暢春園事務郎中暢春園西花園湯山等處八品苑丞闕均由内務府簡選應升人員引見補授稻田場六品庫掌景山瀛臺等處八品苑丞闕均由苑簡選應升人員引見補授暢春園西花園等處未入流苑副闕均由内務府簡選人員補授景山瀛臺等處未入流苑副執事人静明園未入流苑丞苑副湯山未入流苑副闕均由苑簡選補授總管圓明園事務大臣奉特㫖簡任協理園内事務官員或該園總管大臣等奏委或奉特㫖除授其六品苑丞七品八品苑副員闕均由該園總管大臣等􅂤選應升人員引見補授本苑圓明園暢春園静宜園稻田場等處筆帖式員闕均由内務府掣籖補授一園𨽻園戸暢春園等處園隸共八十九名瀛臺長工九名花匠二名瓦匠一名豐澤園長工十有三名花匠三名瓦匠一名勤政殿長工六名花匠二名淑清院長工一名服役人一名花匠一名紫光閣長工五名服役人七名花匠一名五龍亭長工三名服役人二名花匠一名承光殿原有長工四名復於所屬長工花匠内簡選長工十有八名花匠二名景山長工十有四名東果園長工五名服役人六名花匠一名外虎城長工三名服役人一名水車房長工八名南花園長工十名服役人十有四名花匠三十名中海長工十名花匠四名南海長工十名北海長工十名凡掃除所需箕箒轆轤等物及水車房所需水具花匠所需盆盎均移咨各該處支取康熙年間定景山瀛臺静明園南花園等處園戸匠役每名各給養贍家口地六十畝月支銀一兩各園園戸匠役各給地三十畝月支銀一兩米一斛功徳寺園頭一名花匠二名種花地二十畝豐臺園頭一名花匠二名種花地六十畝將容城房山等縣取租地二十頃分給二處園頭備辦正陽門外三里河金魚池投充園頭一名月支銀一兩米一斛長工二名每名各給地六十畝月支銀一兩附於旗鼓佐領下支領其園頭長工闕各以其子弟充補乾隆二十年奏準増設之園戸各給地三十畝月支銀一兩凡園隸闕於管領下閒散人内選補園戸闕於旗鼓佐領下閒散人選補匠役闕於旗鼓佐領下選補不得其人於五城召募民人充補仍附旗鼓佐領下支領錢糧地畝乾隆七年奉㫖瀛臺等處長工著改名園戸一苑戸初定南苑苑戸每名給地二十八畝康熙三十年題準新舊行宮設灑掃苑戸十有六名五十二年題準南紅門新舊行宮增設苑戸三十二名又定湯山苑戸每名月給銀五錢米一斛各項匠役各給地三十畝月給銀一兩米一斛五十六年題準永慕寺設苑戸十名乾隆十二年奏準湯山苑戸七十名毎名月支銀五錢米一斛銀較各處獨少嗣後每名各支銀一兩米照舊支領至該處地方雖覺遼濶但苑戸七十名不免過多應裁去二十名奉㫖湯山苑戸著裁去三十名一海戸原定南苑海戸一千八百名今一千六百名内千戸二名總甲二十二名小甲八十八名廵青海戸四十八名門軍八十一名海戸一千五百五十九名有闕以其子弟頂補康熙十一年奏準南苑海戸每名各給地二十八畝二十七年奏準增設海戸四百名即以海戸子弟充補每名照例撥給地畝五十一年奏準裁千戸二名總甲十名小甲四十名門軍四十五名海戸五百三名原給之地悉行徹囘總甲每名各増給地三十二畝小甲及廵青海戸每名各増給地十二畝尚餘地八十八頃八十八畝仍為羊草地其牆外馬道及通州等處退出地畝七十四頃交戸部令該州縣徵收錢糧一蠶戸雍正六年奉㫖圓明園於七年起著養蠶設立首領内監内監各一人管理蠶事乾隆九年建先蠶壇設八品催長一人領催二名内監二人園戸二十名又議奏先蠶壇飼蠶供事蠶婦蠶母均由内府三旗簡選因不甚諳練於圓明園養蠶民婦内選撥五戸在蠶壇當差同蠶婦蠶母隨時往蠶室教習使其熟練奉㫖養蠶民婦交奉宸苑竢有園戸闕不必别選即將養蠶戸充補十年奏請前於圓明園撥給奉宸苑蠶戸五名候補園戸其看守掃除等項差務自應一體充當如值養蠶之期仍充本役較之園戸實屬有間按圓明園蠶戸分例每名歳支銀十有二兩米二十四斛冬令並給煤炭棉布五年一次給與狐皮㡌領羊裘至本苑所屬園戸苑戸每名例給養贍家口地六十畝歳支銀十有二兩五年一次給羊皮十張麤布二丈今以蠶戸充補園戸自應仍支蠶戸分例竢其子孫長成頂補園戸之時再照園戸分例給與地畝錢糧奉㫖此五名蠶戸竢園戸闕即行坐補仍領蠶戸分例其子孫頂補亦著領蠶戸分例十七年奏準圓明園蠶戸撥往萬壽山織染局當差一網戸初定霸州網戸四十六名江南網戸六名每名月支銀一兩歳支米二十四斛均附於旗鼔佐領下支領其江南網戸六名每年輪流四名在京該班除所領錢糧外總漕衙門每名月給養贍家口銀三兩其不該班之網戸二名除在京應領錢糧外每名月給飬贍家口銀一兩再於内府佐領内管領下簡選閒散人二十名演習刺船每名月支銀二兩歳支米二十四斛沙河網戸二十六名効力當差不給錢糧乾隆十七年定江南網戸均令在京當差一雜徵康熙年間定玉泉山稻田場委司官二人管理設筆帖式二人領催十有三名聽差人四名每年豫領帑金以便雇人耕種十六年奏準每年歩糧橋至玉泉山一帶河道共徵租銀三百八十九兩有竒又奏準紫禁城䕶城河歳徵蓮藕租錢三十貫又奏準三海蓮藕除貢進外餘令變價於每年四月内奏銷雍正元年奏準玉泉山稻田場設六品庫掌一人增設筆帖式二人二年奏準每年所得稻米除供内廷應用及備貯耔種外餘米交大宛二縣依時價糶銀交廣儲司庫三年奏準玉泉山稻田場歸并奉宸苑管理原委司官二人令回本任歳於苑屬官員内委出一人與庫掌協同辦理裁筆帖式一人領催八名再按每年恭進内廷應用細米及應貯稻共計不過六七百石今功徳寺水田七頃四十四畝甕山水田八頃十有一畝各有竒所得稻已敷一年之用畱此二處官種外其六郎莊北塢蠻子營黑龍潭等四處稻田地應租與附近居民徵租所種官地停其領帑即於地租銀内動用其用過餘剰數目於歳終具奏稻草變價銀一并入奏六郎莊水田五頃四十八畝四分一釐每畝租銀六錢旱地三頃七十五畝二分九釐每畝租銀三錢北塢水田九頃三十七畝七分一釐每畝租銀五錢至七錢不等旱地一頃八十八畝二分二釐每畝租銀一錢五分至二錢不等蠻子營水田十頃八分三釐每畝租銀四錢三分至六錢五分不等旱地一頃二十五畝三分五釐每畝租銀二錢黑龍潭水田五頃三十一畝六分九釐每畝租銀五錢旱地五十四畝三分一釐每畝租銀二錢石景山水田四頃八十二畝六釐每畝租銀六錢三分功德寺頭圏水田一頃三十五畝九分八釐每畝租銀四錢三分至七錢不等旱地一頃八十七畝五分三釐每畝租銀二錢五分至三錢不等甕山旱地一頃一畝一分三釐每畝租銀三錢六郎莊房基地十有五畝一分九釐共租銀十兩荷花池四畝八分租銀四兩功徳寺房基地九畝五釐每畝租銀一兩房十間每間租銀一兩荷花池十有二畝四分五釐租銀八兩洩水河荷花池一區租銀七錢甕山荷花池一區租銀三兩五錢以上水田三十六頃三十六畝六分應徵銀二千有四十三兩五錢旱地九頃三十二畝八分應徵銀二百二十九兩六錢各有竒並房租地基租荷花池租及變價稻米稻草銀每歳除種地製備器皿雇覓人工使用外餘銀交廣儲司庫於次年二月奏銷每年於豐澤園後演耕耤禮種旱地一畝三分所種旱稻熟時碾得細米供獻奉先殿壽皇殿恩佑寺福佑寺安佑宮五處各一斗交送尚膳房二斗餘盡交奉先殿備每月供獻之用淑清院旱地七分三釐每年委會計司莊頭一名種麥所獲之麥咨交内管領官三倉大光明殿旱地四畝二分每年委會計司莊頭一名種瓜於進鮮之前交送甜瓜二箇供獻慈寧宮佛前再交髙麗黄瓜十六條送尚膳房乾隆九年議準德勝門外向有荷花池一區每年僅徵租銀四十五兩今勘得内有稻田九十四畝六釐一毫旱地三畝九分二釐九毫荷花池七十六畝五分五釐蒲地五十四畝七分一釐共地二頃二十九畝二分五釐擬定稻地每畝徵銀四錢三分荷花池蒲地每畝徵銀三錢旱地每畝徵銀二錢五分共應徵銀八十兩七錢有竒歳入奏銷又奏準德勝門内銀錠橋西所有官稻田三頃向屬本苑管理後因地勢髙窪不等難以耕種奏交會計司所有房屋交官房租庫管理年來挑揠河道疏濬順利業經栽種荷花已成荷池除房屋仍聼官房租庫收租外所有荷池地畝應仍歸苑管理以昭畫一擬定每年徵收租銀五十兩彚入奏銷一橋牐雍正四年奏準自下清河以上各牐交奉宸苑管理六年奏準圓明園後河隄蕭家河及西牆外出水河五空牐出水河東門外舊有出水河五道石橋三座並蕭家河之石橋均交奉宸苑管理其圍牆所有木橋令圓明園苑丞等管理又覆準凡瀛臺静明園湯山髙亮橋等處所用松木橋版柁梁牐版牐繩等項有損壞者由苑移咨工部更換又定看守内外河道牐軍三百五十名每名月支米一斛牐軍闕召民充補各給印票三年更換看守城外河道五城總甲二十名每月二次赴苑㸃卯乾隆十二年議準下清河以上栁村等牐自雍正四年歸苑管理只有牐官一人牐軍四十八名皂隸二名今柳村牐牐官所管之萬年牐小東牐永慶牐及圓明園北隄一帶河道橋牐並新増牐板之兩空牐四空牐等處地方遼濶牐亦繁多牐官軍役不敷應差行文順天府轉咨直隸總督於天興牐牐軍撥出三十名前往柳村應差歸并牐官管束其應得錢糧及一切調撥差委事宜均令該牐官自行承辦再栁村牐及北隄一帶河道橋牐均與圓明園内圍相通闗繫𦂳要每年六月至八月大雨時行並飭令天興牐牐官親赴柳村牐協勘河道十六年奏請清漪園前昆明湖向因河道窄狹並未設有宮殿又無應役園戸是以本苑酌撥牐軍於行船河路隨時芟草濬淤今湖靣寛展均圍繞宮殿之間闗繫𦂳要見在清漪園有專管大臣又設苑丞苑副及園戸等役百有餘名請嗣後鳳凰墩並昆明湖所有附近水面橋牐並廣潤祠静明園外船塢等處承應拉牽提牐濬淺各項差務於本苑酌撥牐軍五十名統歸清漪園管理其鳳凰墩至長春橋以及髙亮橋一帶河道橋牐並青龍橋夏令看守各牐仍由苑管轄奉㫖清漪園亦繫爾苑應管之地何必委令一處管理所奏撥給牐軍五十名分令管轄為數甚少即撥給百名亦屬無多爾等公同商辦不必奏聞一修船康熙年間定暢春園等處船每年修艌由該總管等奏請瀛臺三海等處船每年由苑奏請修艌雍正五年奉㫖圓明園暢春園西花園聖化寺等處船均交奉宸苑管理每年修艌著該苑察明奏聞修理銷算遵㫖議定圓明園暢春園瀛臺三海等處船由苑每年於二月内察勘奏請修理三海拖牀每年黏補一次其修艌黏補所用桐油咨戸部領取杉木鐵葉釘炭絨繩工匠咨各該處領取魚鰾木賊草錚磨匠咨武備院領取辦買灰麻給發工價銀咨廣儲司領取彚題覈銷三海暨静明園湯山大小船每年所用黄花竹篙槳櫂䉡繩及鋪墊之物有應更換者均由苑移咨各該處領取乾隆十六年奏準圓明園静明園暢春園湯山瀛臺三海等處船歳由苑委官估計奏交各該處修艌但各處船多且大小不一臨期約估竊恐不能周詳且領帑之後又分交各該處自行承辦其錢糧是否實用船身果否堅固本苑勢難遍察嗣後圓明園静明園萬壽山等處即交各該處每年按時自行奏請修理其暢春園湯山瀛臺三海等處船仍由苑辦理一稽察乾隆八年奉㫖大西天經厰萬善殿皆奉宸苑所屬地方嗣後交該苑登載册籍管理稽察其廟宇地靣不時掃除務令潔淨又奉㫖時應宮神像供噐亦著奉宸苑登載册籍不時稽察一修理乾隆八年奏準瀛臺永安寺等處小修工程所需銀請於稻田場地畝銀内動用六百兩存畱備用奉㫖著照所請動支稻田場欵項不必拘數歳終即行奏銷九年奏準大西天經廠及萬善殿時應宮殿宇房屋牆垣如有滲漏倒壞應行修理者除應用物料仍向各該處行取外其應買物料並給𤼵工價所需銀在三千兩以内者即於存貯瀛臺歳修銀内動支隨時辦理統於歳終奏銷此外如有修造所需物料工價數至五千兩者並令奏聞辦理十年奏準勤政殿豐澤園淑清院等處各門牕氊簾竹簾雨搭遇有損壞向繫各該處自行修補自乾隆六年修理以來懸挂已經數載此内除氊簾竹簾稍有破損酌量修補應用外至雨搭一項請交工部門簾庫將堪用者挑換絨繩其破壞者交該庫委官修補嗣後宮殿門牕氊簾竹簾及三海船塢雨搭如有應行修補者亦交該庫修補又定景山南花園等處房屋牆垣有應修理覈明丈尺移咨營造司修理二十年奉㫖嗣後不必存畱稻田場地畝銀如有應修之處奏明修理織染局一建置康熙三年奉㫖織染局交内務府總管管理舊隸工部又奏準設員外郎一人筆帖式三人領催六人九年設司庫一人庫使六人二十四年增設領催一人專司買辦六十一年設司匠二人乾隆十六年移織染局於萬壽山裁員外郎凡應辦事宜簡總理萬壽山大臣兼管其辦事官繫奏委無定員一織造叚紗康熙初年無定額四十七年奏準歳造叚紗三十八疋屯絹二百疋大紅長毛氆氌四十疋交廣儲司叚庫雍正七年奏準改織暗花屯絹寧紬宫紬八絲叚料均按三節進呈其每年額交叚庫紗槩行停止一物料所用絲移文浙江布政使司觧送染絲各色顏料戸工二部支取一靛戸西頂藍靛場四十名大通橋十名漷縣三十名沙窩場二十名每名各給地二十四畝歳徵靛百斤共徵靛萬斤雍正十年奏準官用西頂靛戸地七畝七分除靛三十五斤每年見徵靛九千九百六十五斤除染絲應用外餘靛由局照例每斤定價二分三釐折銀交廣儲司庫一匠役康熙初年設匠役八百二十五名二十五年裁一百五十一名四十七年裁二百名五十九年裁一百二十八名雍正四年裁十有五名十三年裁一百四十一名乾隆五年奏準裁氆氌匠十有四名屯絹匠十有四名十六年奏準裁各項匠役五十二名繡匠四十名歸隸廣儲司衣庫又奏準増設南匠十有二名各月給銀三兩米二斛見存京匠七十名内織匠二十六名絡絲匠二十二名絡經匠六名挑花匠四名揀繡匠二名染匠五名畫匠一名帶匠四名均由局召募民人充補各給印信照票每名各給官房一間内月給銀二兩五錢者六名二兩者十有七名一兩五錢者四十七名每名按季闗支米二十一斛均呈堂咨戸部給領一蠶戸乾隆十七年奏準蠶戸十有三人移往萬壽山歸并織染局每名每年給食銀十二兩米二十四斛夏季藍布單袍掛各一件冬季藍布棉袍掛襖褲各一件五年一次冬給狐皮㡌領布面羊裘一件欽定大淸會典則例卷一百六十七
