body:
  text: 禮部儀制清吏司儀衛一王公儀衛崇徳元年定親王銷金紅繖二纛二旗十立𤓰骨朶各二吾仗四郡王銷金紅繖一纛一旗八卧𤓰二吾仗四貝勒旗六骨朶紅仗各二繖纛視郡王貝子畫雲紅繖一豹尾槍二旗六紅仗二城内止用繖仗鎮國公紅繖一餘視貝子城内止用紅仗以上各執事人均青衣紅帶青帽銀頂上挿紅翎輔國公豹尾槍一餘視鎮國公城内止用紅仗執事人青衣紅帶藍翎紅氊帽鎮國將軍金黄繖一旗六城内用前引二名後從六名輔國將軍旗繖視鎮國城内用前引一名後從四名奉國將軍旗四城内用後從四名又定王公等至御前均不得設儀衛順治九年題凖親王紅羅繡五龍曲柄繖一紅羅銷金繖二紅羅繡花繖二紅羅繡花扇二青羅繡孔雀扇二立𤓰卧𤓰骨朶吾仗各四大纛二條纛二旗十大刀二豹尾槍二馬六匹京城内止用曲柄繖一繡花繖扇各二立𤓰卧𤓰骨朶吾仗全馬四匹世子紅羅繖一卧𤓰骨朶吾仗各二大纛條纛各一旗八大刀二減紅羅繡花繖豹尾槍餘視親王京城内止用銷金繖二繡花扇二立𤓰卧𤓰骨朶吾仗全馬四匹郡王吾仗四條纛二減紅羅繖大纛大刀餘視世子京城内用馬二匹立𤓰卧𤓰骨朶吾仗全繖扇視世子貝勒紅羅銷金繖二紅羅繡花扇二立𤓰卧𤓰骨朶吾仗各二條纛一旗六馬四匹京城内止用銷金繖一立𤓰卧𤓰骨朶吾仗全貝子紅羅銷金繖一減卧𤓰及馬餘視貝勒京城内止用立𤓰骨朶吾仗鎮國公紅羅銷金繖一青羅繡孔雀扇一骨朶吾仗各二旗六京城内止用骨朶吾仗輔國公儀衞視鎮國公鎮國輔國奉國各将軍仍照崇徳元年例各儀衛出京城乃許全設遇元日萬夀聖節冬至大朝日除纛旗外餘均全設至下馬牌止又定親王至午門外郡王至闕下貝勒以下在闕門外下馬牌各下轎馬又定王公均得乘明轎王以下貝勒以上用轎夫八人貝子公四人貝勒貝子公乘轎至皇城外易馬入如願乘馬者聽康熙六年題凖親王郡王轎夫執事人用繡團獅緑段衣貝勒貝子公轎夫執事人素綠段衣二十四年題準宗室親王世子郡王馬韁即扯手用金黄長子貝勒貝子用紫不得給與内外官員其從前給過者槩行禁止六十一年十二月奉㫖向例親王豹尾槍二大刀二郡王則無親王著給豹尾槍四大刀四郡王給豹尾槍二大刀二乾隆二年覆凖金黄秋香色鞦轡惟特恩賞用金黄朝衣坐褥之王等許用其餘親王以下均不得用二十一年奏凖世子増豹尾槍二長子儀衛與貝勒同一公主以下儀衛崇徳元年定固倫公主清道旗二銷金紅繖一青扇一拂子二金水盂一金盆一紅仗吾仗各二轎車均用紅蓋紅幃青緣蓋角青垂幨和碩公主減旗及金盂餘視固倫公主轎車紅盖紅幃藍緣蓋角藍垂幨以上赴朝止用繖扇紅仗吾仗郡主減金盆及紅仗餘視和碩公主轎車青蓋青幃紅緣蓋角紅垂幨赴朝用繖扇吾仗縣主紅仗二減扇吾仗餘視郡主車青蓋藍幃紅緣蓋角紅垂幨郡君銷金青繖一紅仗二車藍蓋藍幃紅垂幨赴朝各用繖紅仗縣君紅仗二車藍蓋藍幃紅緣青垂幨赴朝用紅仗鄉君車與縣君同順治九年題準固倫公主曲柄繖一紅寳相花繖二青寳相花扇二紅孔雀扇二纛二立𤓰卧𤓰骨朶吾仗各二轎車均用紅蓋紅幃青緣蓋角紅垂幨和碩公主減寳相花扇餘視固倫公主轎車紅蓋紅幃青緣蓋角青垂幨郡主減曲柄繖卧𤓰餘視和碩公主轎車紅蓋紅幃藍緣蓋角藍垂幨縣主紅寳相花繖一青花扇二立𤓰吾仗各二轎車青蓋青幃紅緣蓋角紅垂幨郡君車青盖藍幃紅緣蓋角紅垂幨縣君車藍盖藍幃紅垂幨鄉君車均藍盖藍幃鎮國公女青緣紅垂幨輔國公女紅緣青垂幨康熙六年題準公主郡主轎夫執事人用繡團獅綠段衣縣主轎夫執事人素緑段衣公主以下鄉君以上赴朝儀衛至紫禁城止固倫公主許隨入婦女五名和碩公主郡主四名縣主三名郡君二名縣君鄉君一名三十年定固倫公主轎車金黄葢紅幃紅緣葢角金黄垂幨和碩公主紅蓋紅幃金黄緣葢角金黄垂幨郡主紅葢紅幃青緣葢角紅垂幨縣主紅蓋紅幃藍緣葢角藍垂幨郡君紅葢藍幃藍緣蓋角紅垂幨縣君青蓋青幃紅緣葢角紅垂幨鎮國公女鄉君青蓋青幃藍緣葢角紅垂幨輔國公女鄉君青蓋藍幃紅垂幨乾隆二年覆準金黄馬韁金黄轎襻惟公主王福晉得用郡主夫人以下均不得用一福晉夫人儀衛崇徳元年定親王福晉清道旗二銷金紅繖一青扇一拂子二金盂一金盆一紅仗吾仗各二轎車紅蓋紅幃青緣蓋角青垂幨赴朝止用繖扇紅仗吾仗郡王福晉減金盂紅仗餘視親王福晉轎車紅蓋紅幃藍縁葢角藍垂幨赴朝用繖扇吾仗貝勒夫人銷金紅繖一拂子紅仗各二轎車青蓋青幃紅緣蓋角紅垂幨赴朝用繖紅仗以上執事人均青衣紅帶青㡌銀頂上挿紅翎貝子夫人車青葢藍幃紅緣葢角紅垂幨鎮國公夫人車藍葢藍幃紅垂幨輔國公夫人車藍葢藍幃青緣紅垂幨鎮國將軍夫人車青葢藍幃青垂幨輔國將軍夫人車藍蓋藍幃藍垂幨奉國將軍淑人車藍葢素幃藍垂幨親王以下各側室儀衛均降適一等順治四年定親王福晉曲柄繖一紅方繖二紅繡花繖二青繡花扇一紅繡孔雀扇一纛二立𤓰卧𤓰骨朶吾仗各二郡王福晉紅繡孔雀扇二減曲柄繖方繖青花扇卧𤓰餘視親王福晉貝勒夫人紅繡花繖一青繡花扇一立𤓰吾仗各二王以下貝勒以上各側室均降適一等親王福晉以下各轎車之制惟輔國公夫人改用藍盖藍幃紅緣蓋角青垂幨餘均與初定例同九年題準親王福晉曲柄繖一紅繡寳相花繖二青繡寳相花扇二紅繡孔雀扇二纛二立𤓰卧𤓰骨朶吾仗各二轎車紅蓋紅幃青緣蓋角紅垂幨世子福晉減寳相花扇轎車青垂幨餘均視親王福晉郡王福晉減曲柄繖卧𤓰餘視世子福晉轎車紅蓋紅幃藍緣盖角藍垂幨貝勒夫人紅繡寳相花繖一青繡寳相花扇二立𤓰吾仗各二轎車青蓋青幃紅緣葢角紅垂幨貝子夫人以下奉國將軍淑人以上車餙均如舊制康熙六年題準親王福晉側福晉郡王福晉轎夫執事人用繡團獅綠段衣郡王側福晉貝勒夫人轎夫執事人用素緑段衣凡福晉夫人赴朝儀衛至紫禁城止親王世子福晉許隨入婦女四名郡王福晉三名貝勒夫人二名貝子公夫人一名三十年定親王福晉轎車紅葢紅幃青緣蓋角金黄垂幨世子福晉紅蓋紅幃青緣蓋角紅垂幨郡王福晉紅蓋紅幃青緣蓋角青垂幨長子福晉紅蓋紅幃藍緣蓋角藍垂幨貝勒夫人紅蓋青幃青緣蓋角紅垂幨貝子夫人紅蓋藍幃藍緣蓋角紅垂幨鎮國公夫人青蓋青幃紅緣蓋角紅垂幨輔國公夫人青蓋青幃藍緣葢角紅垂幨以上各側室均降適一等鎮國將軍夫人青蓋藍幃紅垂幨輔國將軍夫人藍蓋藍幃紅垂幨奉國將軍淑人青蓋青幃青垂幨奉恩將軍恭人同車自長子福晉以上朱轅貝子夫人以下紫轅奉國將軍淑人以上黒轅輪均用朱其幃蓋幨公夫人以上用雲段鎮國將軍夫人以下用素段一京官儀衛崇徳元年定固倫公主額駙畫雲紅繖一豹尾槍二旗六紅仗二執事人青衣紅帶青氊帽銀頂上挿紅翎城内止用繖仗超品公和碩公主額駙杏黄繖一豹尾槍二旗六城内止用前引二名從人十名民公郡主額駙豹尾槍一從人八名餘視超品公子都統尚書縣主額駙減豹尾槍用從人六名餘視公内大臣大學士副都統䕶軍統領前鋒統領侍郎郡君額駙旗六城内止用前引二名從人四名一等侍衛䕶衛叅領前鋒參領縣君額駙學士郎中旗四城内止用從人四名二等侍衛䕶衛鄉君額駙佐領員外郎旗二城内止用從人二名三等侍衛䕶衛䕶軍校主事以下官許用從人一名順治三年定公掌扇貼方金一塊一品官扇貼圓金四塊二品官扇貼圎金三塊三品官扇貼圎金二塊四品官用灑金扇五六七品官用黒素扇八九品官用白素扇六年定公以下四品官以上用大小灑金扇各一文職用甘蔗棍二武職用椶棍二八年題準民公和碩公主額駙杏黄繖二旗十大小扇二各貼方金四侯郡主額駙杏黄繖一旗十扇二各貼方金三伯扇二各貼圓金一餘視侯一品官旗八扇二各貼圓金四繖視伯二品官旗六扇二各貼圓金三繖視一品三品官扇二各貼圓金二餘視二品四品官旗四灑金扇二宗室覺羅之有官者各從其品惟扇柄及棍皆髤以朱以上旗繖在京城内不得用進皇城内止用小扇不得用大扇及棍又定官民等鞍韉牙縫不得用黄色九年題準公侯伯都統尚書内大臣大學士及漢文官三品以上皇城外許乘四人煖轎願乘馬者聽漢武官不凖乘轎各官扇上均書清漢字官銜康熙元年題準滿漢公侯伯都統内大臣鎮國將軍子輔國將軍䕶軍統領前鋒統領副都統男大學士學士尚書左都御史侍郎左副都御史鑾儀使通政使大理寺卿以上在皇城外許乘四人煖轎願乘馬者聴又定停止滿漢學士左副都御史鑾儀使通政使大理寺卿設儀衛乘轎又定公和碩公主額駙旗十杏黄繖二金黄棍四執事人青衣綠帶紅氊帽銅頂上挿綠翎京城内止用繖一侯伯郡主額駙減繖一餘視公都統鎮國將軍内大臣縣主額駙子滿漢大學士尚書左都御史旗八杏黄繖一棍二執事人青衣綠帶紅氊帽銅頂輔國將軍郡君額駙䕶軍統領前鋒統領副都統男滿漢侍郎學士九卿正卿鑾儀使左副都御史歩軍統領旗六餘儀衛執事人均視都統三品官儀衛視輔國將軍四品官旗四京城内一品官以上用繖一棍二二品官用棍二三年定男散秩大臣在京城内停設儀衛散秩大臣内有世襲子爵者得設儀衛如子四年題準四品以上官乘馬許用繁纓在京大九卿詹事以上武官男副都統散秩大臣以上許用一人引馬前導餘官不得僭用六年定都統鎮國將軍内大臣縣主額駙子滿漢大學士尚書左都御史執事人帽頂上挿綠翎七年題準凡加太師公和碩公主額駙金黄棍四改為紅棍四棍端用銅瓖執事人用綠布衣綠帶紅氊帽銅頂上挿綠翎繖扇照前定例又定民公及加級侯郡主額駙金黄棍四改為紅棍四棍端用銅瓖執事人衣帽照前定例八年題準在京官停用杏黄繖金黄棍民公以下官員均照順治八年例又定公以下官員出京城許用鞍籠閑馬前導軍民人等不得用違者治罪三十九年奉㫖衣服鞍轡原有禁例今觀鞍轡等餙甚為僭越下至家奴鞦􅌱皆用鋄金朕御鞍轡未嘗以金餙之如此之類尤當嚴禁遵㫖議準馬鞍惟三品官輕車都尉以上許用虎皮及狼狐皮有品級無品級筆帖式及庫使舉人官生貢監生員䕶軍領催以至兵民等馬鞍不得用繡及倭段䌈線瓖緣鞍韂紅托鞦轡等物不得用鋄金雍正元年諭大小官定有品級近有不分官職馬繋繁纓使人引馬嗣後著八旗都統歩軍統領都察院嚴行稽察如有此等即行拏奏如大臣等徇情踈忽察出將該管並大臣等一并議處又諸王有賞所屬人員鞍轡者著行文該旗注册嵗終彚奏欽此七年諭聞近來引馬繁纓之屬有不按定例任意假借者嗣後大城内著歩軍統領稽察外城著五城御史稽察倘有違例僣越之人歩軍統領御史不叅奏别經發覺者將稽察之人一并處分欽此乾隆十五年諭本朝舊制文武滿漢大臣凡遇朝㑹皆乘馬並不坐轎從前滿洲大臣内有坐轎者是以降㫖禁止武大臣坐轎未禁止文大臣今聞文大臣内務求安逸於京師至近之地亦皆坐轎若謂在部院行走應當坐轎則國初部院大臣未嘗坐轎此由平時不勤習技業惟求安逸之所致也滿洲大臣當思本朝舊制遵照奉行似此並不演習乗馬倘遇𦂳急官差將何如耶嗣後文大臣内年及六旬實不能常乘馬者著照常坐轎其餘著禁止再王公等不分老㓜一槩坐轎亦非古道嗣後長朕一輩之王等著照常坐轎其餘王公内有髙年者亦許坐轎餘皆乘馬王等既有儀衛除年節列儀衛坐轎朝賀外平時皆著乗馬將此通行傳知倘禁止後有坐轎者著察旗御史即行察叅若御史不叅奏經朕訪聞一并治罪斷不寛宥欽此又諭前因諸王及部院滿洲大臣等皆互尚安逸行動坐轎並不乘馬經朕降㫖禁止坐轎是令伊等嫻習武藝勿致廢弛滿洲舊制之意並非謂大臣等不應坐轎也近聞王大臣内竟有坐車者試思坐車與坐轎何異視此乃王大臣等全未識朕欲挽回滿洲舊制之意轉似有心致朕降㫖亦覺赧顔誠不知伊等是何居心也朕思王大臣早起來圓明園連朝奏事或身有疾病坐轎亦未為不可嗣後諸王及滿洲文職一品大臣如早起來圓明園或身有㣲疾者著照常坐轎王大臣等不識朕意仍總不乘馬專坐轎者經朕察出必懲數人以為衆戒伊等各宜仰體朕體䘏之意勿致廢弛滿洲武藝應乘馬之處照常乘馬黽勉向上再八旗大臣以不應坐轎久經禁止近聞有坐車者但伊等有何勞苦官差亦尚安逸坐車耶且伊等既有教訓官兵之責理宜為衆表率嗣後八旗大臣及部院二品以下堂官内倘有坐車之人著御史等即行指名題叅朕必將違禁之人治罪斷不寛宥欽此二十一年諭今王公大臣之轎夫開設賭場者甚多不獨將旗人引誘以失生理殊為可憫致令旗人流於匪僻無所底止關繋尤重是以朕從前降旨王等一品文大臣及年老之文大臣坐轎其餘槩不準坐轎者一則不致廢弛乘馬二則為旗人計將轎夫開設賭塲之事清理之意今年少官卑人員皆行坐轎若不嚴行管束縱令轎夫開設賭場豈非欲儉省其工直誠如此尤可恥也應將伊等察出從重處分但為日已久又無專委察叅之人此次朕不深究嗣後惟準親王郡王大學士尚書坐轎其貝勒貝子公都統等皆不準坐轎從前因年老之二品文臣皆令坐轎是以年少之大臣等亦照伊等坐轎嗣後二品文大臣及京堂官無論年老與否槩停坐轎仍令坐轎之王大臣等將轎夫各令在其家或於方近居住加意管束倘有令其逺居開設賭場者將該王大臣等一并議處此次降㫖以後仍有私行坐轎縱令轎夫開設賭場者著歩軍統領及該衙門該旗御史等即行叅奏從重議處若不嚴察以致懈弛仍蹈舊習将失察之衙門官員一并治罪斷不輕恕欽此二十二年諭外省駐防將軍及綠營之提鎮出行則皆乘輿夫將軍提鎮有總統官兵之責若養尊處優自圖安逸亦何以表率營伍而作其勇敢之氣况旗人幼習騎射即綠營中亦必以其弓馬優嫻始歴加升用乃一至大僚轉致狃於便安忘其故歩此豈國家簡擢之意耶京師都統副都統既皆乘馬而滿洲侍郎則無論年逾六旬亦皆不得乘輿即朕廵省所至尚每日乘馬而行乃外省武職獨相沿陋習此甚非宜嗣後將軍提督槩不許乘輿其編設轎夫並著裁革如有仍行乗坐者照違例治罪可通行傳諭知之欽此又諭前因外省將軍提鎮有表率營伍之責出皆乘輿恐致狃於便安是以特行禁止但此内宣力已久之年老大員又未可一槩而論嗣後如年逾七十不能常行乘馬者令該員自行酌量奏聞請㫖餘不得假藉欽此一外官儀衛康熙五年定各省駐防將軍副都統視在京都統副都統七年題準文官總督杏黄繖二金黄棍二旗八扇二兵拳二鴈翎刀二飛虎旗二獸劒二藤棍二皮槊二槍四迴避牌二肅静牌二廵撫減兵拳鴈翎刀飛虎旗及槍二餘同布按兩司減旗二及獸劒藤棍槍餘視廵撫道府杏黄繖一旗四扇一藤棍二皮槊二迴避牌二肅静牌二同知通判知州知縣藍繖一扇一藤棍二皮槊二迴避牌二州同州判縣丞藍繖一藤棍二雜職竹板二武官提督藤棍皮槊改用刑杖二餘視總督總兵大刀一減兵拳鴈翎刀刑杖及槍二餘視提督副將杏黄繖一金黄棍二旗六扇二廻避牌二肅静牌二叅將逰撃都司杏黄繖扇各一旗四藤棍二廻避肅静牌各二守備減牌餘視都司一命婦車輿崇徳年間定超品公命婦車青蓋青幃青垂幨公命婦藍垂幨餘同都統尚書子等官命婦車青蓋藍幃藍垂幨内大臣大學士副都統䕶軍統領前鋒統領侍郎等官命婦車藍蓋藍幃藍垂幨一等侍衛䕶衛叅領前鋒叅領學士郎中等官命婦車藍蓋素幃藍垂幨二等侍衛䕶衛佐領等官命婦車素蓋素幃藍垂幨順治九年題準公命婦車青蓋青幃綠緣盖角綠垂幨侯伯命婦車青蓋青幃綠垂幨一品官命婦車青盖青幃青垂幨以上均用銀頂二品官命婦車青蓋藍幃青垂幨三品官命婦車藍蓋藍幃青垂幨四品官命婦車藍蓋藍幃藍垂幨五品以下官命婦車藍蓋藍幃無垂幨以上均用錫頂庶民妻藍蓋藍幃無垂幨黒油木頂康熙元年題準三品以上官命婦車用銀頂四品以下官命婦用錫頂庶民妻同違者治罪三十年定三等公夫人車綠蓋青幃藍緣蓋角綠垂幨侯伯夫人車綠蓋青幃藍緣葢角綠垂幨内大臣都統大學士尚書左都御史子一品夫人車青蓋青幃綠緣蓋角綠垂幨散秩大臣前鋒統領䕶軍統領歩軍統領副都統侍郎學士左副都御史通政使大理寺卿詹事府詹事男夫人車青蓋青幃綠垂幨以上各幃蓋幨均用素段一等侍衛叅領歩軍翼尉王府長史太常太僕光禄寺卿國子監祭酒大理寺少卿内閣侍讀學士翰林院講讀學士侍讀侍講少詹庶子洗馬鴻臚寺卿郎中給事中御史太常太僕光禄寺少卿輕車都尉淑人車青蓋青幃青垂幨以上車均用銀頂閒散宗室二等侍衛佐領貝勒司儀長欽天監正内閣侍讀國子監司業鴻臚寺少卿通政使司叅議中允員外郎歩軍協尉騎都尉恭人車青蓋藍幃青垂幨三等侍衛雲騎尉宜人以下車藍葢藍幃青垂幨以上均用錫頂幃蓋幨用布轅輪均用黒自公以下有頂帶官員以上各命婦均從夫見在品級不準以加級用欽定大清㑹典則例卷七十二
