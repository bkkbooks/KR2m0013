body:
  text: 鴻臚寺一奏請陞殿順治九年定毎月初五十五二十五日為常朝日遇齋戒日期不請陞殿餘日由寺具題傳知遇雨雪亦由寺具奏請㫖豫於初三十三二十三等日準各衙門移送應謝恩之王公各官承襲世爵陞遷兼銜加級紀録照舊供職降秩開復革職留任寛免解任各職名及百人具奏請㫖如不及百人具奏不請陞殿若遇覃恩大典百官皆謝恩各執事者多照三大節儀奏請御中和殿執事各官先行禮五鼓將謝恩官員職名繕清漢疏齎送内閣内閣官奉至殿内豫設黄案上本寺堂官詣乾清門請駕導引唱贊行禮均如儀乾隆八年奏準嗣後奏請陞殿定於初一初十二十日具奏一紏察順治初年定三大節暨凡遇慶典文武各官失誤朝賀行禮失儀者由寺指名題叅常朝日謝恩由寺委官於午門外收取職名不到者指叅交吏兵二部議處十四年議準凡遇常朝日各官有實因患病者由禮部劄知本寺如假託偷安由寺題叅又定外任官員緊急赴任者具朝服本寺官引至午門前行三跪九叩禮其新選外任官限於給憑十日内由寺委官引禮四品以上於午門前五品以下於天安門前辭謝赴任如無故逾期由寺指名題叅一演禮順治初年定外國朝貢使臣至京由禮部先期知㑹本寺赴寺演習朝儀届期委官引禮遇慶賀日行禮鳴贊官由右掖門引入序於右翼之末以次行禮其頒賞謝恩均鳴贊序班贊引行禮一朝㑹贊相禮儀元日冬至次日萬壽聖節皇帝率羣臣朝於皇太后宫是日五鼓本寺滿堂官二人率鳴贊二人豫至慈寧門次間牖外檐下東西面避立設王公拜位於階下甬道左右設一二品官拜位於長信門外甬道左右均各按班次引王公鳴贊二人引王以下入八分公以上詣隆宗門外階下左翼在北右翼在南祗竢引百官鳴贊二人引不入八分公以下公侯伯子男一品二品文武官自長慶門入至長信門外仗南鳴贊序班四人引三品以下文武各官於午門外均按翼東西面北上序立又自永康左門熙和門午門内外分設鳴贊傳示百官行禮駕出隆宗門候過引王公等隨豹尾班後進永康左門南門皇帝陞階引右翼王公自長信門内仗南趨過西旁兩翼王公均於儀駕後東西面北上序立皇帝就拜位引王公百官各由仗南進就拜位東西上北嚮立左班鳴贊一人奏跪拜興皇帝率羣臣行三跪九拜禮興右班鳴贊一人奏禮成皇帝復位引右翼王公仍立原位引左翼王公於南垣下西上北面序立引百官仍復原班序立候駕過引兩翼王公隨出均東上北嚮序立於永康左門之南候駕還宫皇太后聖壽行禮與三大節同恭遇聖壽大慶十年一次宣表設表案於慈寜門左門外東旁西嚮皇帝率羣臣跪宣表官宣表畢復表於案贊奏行禮均如前儀恭加上皇太后徽號前期恭上奏書設奏書黄案一於中和殿内正中一於慈寧門閾外正中均南嚮至日設冊寶黄案一於太和殿内御座前正中設冊寶龍亭於案左右設黄案一於慈寧門階下一於門閾外正中均南嚮設宣讀冊寶案於門外左門之東壁西嚮引三品以下官於午門外引王公於丹陛上引一二品官於右翼門外旁垣東西面南上序立冊寶龍亭至跪候駕過隨行至慈寧宫各就班位行禮儀均與三大節同恭奉慈輿廵幸遇皇太后聖壽皇帝率王公内大臣侍衞一二品官於行營黄幔城外三品以下官於網城外行禮本寺官贊引與在京禮同三大節大朝御殿由寺設表案於殿内左楹之南筆硯案於右楹之南東西嚮是日皇帝率羣臣朝於皇太后宫禮成還宫本寺官引王公暨二品以上官由右翼門入至太和殿前王公班於丹陛上一二品官於丹墀引百官由左右掖門昭德門貞度門入外國使臣隨右班至丹墀各就班次東西面重行北上序立本寺執事各官赴中和殿行禮畢趨出贊禮鳴贊東西各二人立殿門外第二楹前卿及鳴贊左右各一人序王貝勒於第四楹階下貝子公於王後鳴贊序班各二人序百官於丹墀均北上東西面立駕陞殿樂止階下三鳴鞭畢右班鳴贊一人贊排班引禮鳴贊各引王公於丹陛鹵簿㦸前進就椶薦稍後引百官由丹墀鹵簿仗前進各就品級山稍後嚮上立班齊乃贊進引禮鳴贊進前引王等於椶薦上貝子等於椶薦後百官各就品級拜位退至仗内東西面立左班鳴贊贊跪王公百官咸跪贊進表宣表官奉表跪宣畢復表於案退贊王公百官行三跪九叩禮成右班鳴贊贊退班引禮鳴贊二人進前引王公百官退出仗外仍復原班立次引外國使臣行禮每國各為一班均序於右翼班末贊禮鳴贊四人退由左右階降立於仗内對丹陛左右階石䦨版第一柱東西面立贊禮引禮鳴贊引使臣自仗南進至九品品級山拜位行禮如儀禮成鳴鞭駕還宫竢樂止各引王公由太和門午門左右門百官由昭德門貞度門午門左右掖門出恭遇慶典頒詔設詔案一於殿内左檻之南一於丹陛正中引王公集太和殿丹陛上百官集丹墀内進表行禮一如元日竢禮部堂官受詔降引百官由昭德門貞度門午門端門天安門左右門出至金水橋南東西甬道南北上東西面立贊排班引百官夾御道北面序立贊有制衆皆跪宣詔畢贊行三跪九叩禮興贊退班引退如駕不御殿王公不齊集引百官於午門外兩翼序立詔至跪候過隨行至天安門外跪聽行禮如儀大燕日殿中陳設畢引内外王公大學士内大臣暨入殿侍燕大臣并丹陛上侍燕台吉侍衞等立丹陛上引百官按翼班於丹墀内各青幕下竢駕御殿陞座樂止引王公暨殿内侍燕大臣等進殿各序坐進茶進酒均如儀鳴贊等分立於丹陛三成皇帝進茶進酒時均舉手傳示百官行禮燕畢引王公大臣出序王公於丹陛上百官於丹墀内鳴贊四人進至檐下東西面立贊排班引王公百官各就拜位贊進贊行一跪三叩禮成引復原班立駕還宫竢樂止引出如儀公主納徵及下嫁日燕於保和殿是日卿二人鳴贊二人豫引額駙暨族人蒙古王公台吉等詣皇太后宫於門外行三跪九叩禮畢引至殿前右翼序立鳴贊四人立於檐下皇帝御殿樂止引額駙暨族中䝉古王公台吉等至御道西東上北面立聽贊行三跪九叩禮畢引侍燕王公大臣侍衛由左門入引額駙暨族人䝉古王公台吉等由右門入均北上東西面序立進酒大臣進酒時引額駙族人出至御道右東上北面跪侍燕王公大臣於本位跪均隨進酒大臣行一叩禮畢仍引入殿各序坐燕畢引額駙暨族人出至御道右聽贊行一跪三叩禮餘儀與大燕同皇子婚禮納采設燕於福晉父第成婚設燕於皇子所居宫外均結采是日鳴贊二人引福晉父及族人之有官者暨本旗大臣二品以上官序於東席引應入燕大臣二品以上官序於西席均北上東西面就席一叩坐賜茶廵酒各一叩跪飲畢仍一叩燕畢引各官望闕行三跪九叩禮下嫁䝉古之固倫公主和碩公主暨科爾沁三親王一貝勒喀爾喀澤卜尊丹巴胡圖克圖來朝還國均於朝陽門或東直門外接官㕔迎送由寺鳴贊官二人引公主䝉古王等於㕔内東在内王公於㕔内西均北上東西面序坐引内大臣侍衞一品文武官按翼坐於㕔外兩旁青幕尚茶攜茶出賜茶畢引公主於㕔内望闕行六肅三跪三叩禮引䝉古王貝勒於㕔外望闕行三跪九叩禮不贊車駕廵幸恭遇萬壽聖節本寺官引扈從王公各官隨皇帝詣皇太后行宫黄幔城前行禮鳴贊四人於黄幔城門外左右立奏行三跪九拜禮成皇上御行殿鳴贊四人左右各二人於旌門外序立本寺官引王公一二品官於黄幔城外三品官以下於網城外聽贊行三跪九叩禮逢五日常朝皇帝御殿不具表如王公謝恩行禮鳴贊左右四人立於殿檐下百官謝恩行禮鳴贊序班左右四人立於仗内均如大朝儀外國使臣行禮同禮成賜茶鳴贊二人引王公進殿列坐如朝鮮國正使有職銜稱君者行禮畢自仗外引自西階升由殿右門入序坐於右翼輔國公之下皇帝進茶時鳴贊分立三成舉手傳示百官行禮御殿冊立前一日設節案於太和殿内御座前正中設冊案於御座左寶案於右引王公百官侍班一如大朝儀宣制官奉制立於殿檐下第三柱鳴贊二人引正副使於丹墀内聽贊行三跪九叩禮畢引由右階升至丹陛御道之左西上北面立宣制官進至中門之東西面立贊有制正副使跪宣制官宣制畢退大學士授節引正副使由中階降引舉冊寶案各官於左右門入舉冊寶案由中門出隨行並徹節案由左門出引王公進殿賜茶如儀尊封太妃設冊寶印案於御座之南中門兩旁冊封妃嬪設節案於太和殿寶座前正中設冊寶印案於寶座左右兩旁引正副使入殿授節前徃冊封王貝勒設節案於太和殿丹陛正中冊寶印采亭於丹墀左右引正副使詣案前授節前徃恭遇親行尊封禮是日御太和殿南面立閲冊寶印訖詣太妃宫鳴贊左右各二人豫立宫門檐下奏進冊進寶印宣讀官宣冊寶印文奏跪拜興皇帝行二跪六拜禮視學釋奠於先師禮成本寺官引兩翼王公均由㦸門右門出至廟門外輿前東上南北面序立引百官均由持敬門出豫詣太學彝倫堂階下左右北上東西面序立候駕是日豫設御書案於彝倫堂内御幄前正中稍南設祭酒講書案於中門内之左設司業講書案於右東西嚮皇帝御彝倫堂移御書案近御座引王公三品以上官入堂内四品以下官於階上東西面序立鳴贊左右各二人立階上引禮鳴贊引國子監祭酒司業等官率太學諸生於庭聽贊行三跪九叩禮畢賜王公大臣坐引祭酒司業由左右門入至講席引諸生環立於露臺上聽講祭酒司業一叩就席坐講經書畢退出立於原班禮部尚書奉制出授宣制官宣制官跪受鳴贊序班引諸生各就拜位贊有制衆咸跪宣制官宣制訖贊行三跪九叩禮畢豫引祭酒以下官及諸生趨至太學外西旁南嚮排跪送駕王公從百官以次退春秋二季經筵先期由寺設御書案於文華殿内御座前稍南設講案於殿内正中是日鳴贊二人引講官暨大學士九卿科道各官至丹墀内東西面序立皇帝御經筵陞座引各官於丹墀鳴贊四人立殿檐下東西第二楹前贊行二跪六叩禮引復原班滿漢卿引講官暨各官由東西階升進殿内九卿科道兩旁僉立講官東西面序立鳴贊一人進至殿檐下東第二楹贊進講講官行禮進講畢候皇帝闡發經義羣臣跪聆訖滿漢卿引各官出至丹墀原班立鳴贊贊行二跪六叩禮成引入賜坐賜茶畢引出退立原班候駕還宫引各官出至協和門賜燕燕畢引各官至太和門外謝恩行一跪三叩禮不贊恭進實録聖訓前期設書案於保和殿内御座前正中設表案於殿門外稍東均南嚮本寺堂官鳴贊十人於纂修館前引至太和殿階下亭止監修以下官行一跪三叩禮纂修官恭奉實錄聖訓卿二人引由中階升入太和殿中門陳於案監修以下官於丹陛東行三跪九叩禮鳴贊官引王公入太和門左右門至丹陛上文武各官入昭德門貞度門至丹墀内均按翼序立皇帝御保和殿恭受實録聖訓行禮畢御中和殿執事各官行三跪九叩禮不贊駕興御太和殿本寺官引監修總裁纂修提調各官入百官班内序立鳴贊贊排班班齊贊進衆進贊跪王以下各官咸跪宣表官一人進至殿中門外西面跪代致辭曰和碩親王臣某等文武羣臣奏言恭惟先帝神功聖德纂修實録成書昭垂萬世羣臣懽忭禮當慶賀奏畢鴻臚卿宣制曰實錄告成朕心懽慶與卿等同之宣畢鳴贊官贊羣臣行三跪九叩禮成本寺堂官引王公入殿内百官各就坐賜茶駕還宫各退恭進玉牒不宣制餘儀與恭進實録同文武鄉會試宣㫖於午門外鳴贊官二人引正副主考官同考各官於御道左右行三跪九叩禮不贊發榜後次