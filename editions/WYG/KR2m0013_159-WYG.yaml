body:
  text: 太僕寺國初置太僕寺附於兵部武庫司直隸山東河南江南額徴馬價六十餘萬兩解寺貯庫歳終考覈奏銷至廵幸沿途需用馬駝由寺豫備應用康熙七年議凖直省額徴馬價銀歸戸部考覈奏銷九年以兵部大庫種馬二場歸寺管理雍正三年建本寺衙署乾隆六年奏凖本寺口外兩翼馬場均齊賞罰及扈從料理行營駝馬並支領錢糧雖設有員外郎主簿等官向未分定職掌亦未鑄給印信一切稾案惟以畫押為慿恐日乆弊生難免偷改抽換及彼此推諉應將見在員外郎八人分為左右二司以廵幸需用黄布幔城網城及分撥牽領馬駝等事歸左司承辦以兩翼馬場均齊賞罰等事歸右司承辦以題奏本章承發文移等事歸主簿承辦筆帖式十有六人以十人分於左右二司六人分於主簿廳其左右兩司及主簿廰各鑄給印信以昭信守十四年奏凖本寺承辦口外兩翼均齊賞罰暨廵幸沿塗辦理行營䭾載黄布幔城網城並撥給駝馬等事皆關緊要額設司官不敷於筆帖式内遴選二人給以委署主事銜仍照本職食俸升轉一扈從康熙年間定京城御河橋東直門及通州之張家灣三處各設一館餧養駝一百五十隻以備廵幸䭾載行營幔城網城其駝於三月趕赴天津牧放五月趕赴口外牧放九月囘館餧養每駝日支豆六升草二束在館廐長一人月給銀三兩歳給米四十八斛廐副五人廐丁二十一人均月給銀一兩米一斛毎人各養場内馬一匹以備乘騎至每年員外郎以下等官及廐長等隨徃兩翼印烙察㸃孳生暨扈從辦理行營等事皆用館内所養之馬守館人八名毎人給地三十五畝令其取租以作工食又定馬場官員因公事來京於御河橋館内住宿每人日支口糧米二升隨來兵丁人等每名日支米一升馬每匹日支草一束均移咨戸部支領又定恭遇廵幸由寺開列堂官職名請㫖簡用一人扈從辦理行營幔城網城之事司官筆帖式酌量帶徃用駝百隻凖帶餘駝十八隻凡中塗駝有疲乏殘廢者奏明凖以所帶餘駝更換倒斃者察騐耳尾注册亦以餘駝撥補沿塗每駝日支草一束豫咨户部行令該管官照數供應隨徃之廐長等移咨户部每人日給盤費銀一錢三分乾隆十六年奏凖八旗佐領下合計額設駝八百餘隻嗣後䭾載幔城網城在於八旗額設駝内取用所有太僕寺餧養駝百五十隻並在館廐長廐副廐丁及守館人等悉行裁汰十七年奏凖三館餧養駝既經裁汰所有房屋應行交部辦理但向來䝉古官兵來京支領俸餉及遞送文移均在御河橋館内住宿應將此館存留其東直門張家灣二館並看館人原給地畝一幷交部辦理再原設廐長廐副廐丁共二十七人每年出場印烙察㸃孳生馬匹及辦理行營等事皆隨徃承辦未便槩行裁汰應酌留十人仍給本身錢糧以供前項差使再天津原有牧駝葦地一區應一幷交部辦理至本寺司官筆帖式等出場並扈從均騎三館所養之馬今既經裁汰嗣後如遇此等差遣司官筆帖式照䕶軍校例廐長等照驍騎例移咨兵部撥給官馬户部給與路費所需帳房移咨工部支領事竣繳還一司牧國初定口外兩翼騍馬羣每羣設牧長一人牧副一人牧丁十人騸馬羣每羣設牧長一人牧副一人牧丁十有二人均於䝉古内按各該旗選補牧長人等所需鞍轡每人各一副飼秣所需木槽鍁鐝鑞杓等項每羣各二件均五年一次移咨工部給發由兵部撥車運送到場若增設馬羣照增設之數咨取康熙三十三年奏凖騸馬羣牧丁每羣各增二人四十四年奏凖左右兩翼各設總管一人於在京應用人内簡選題請補授三年報滿更代届均齊時本寺堂官親徃口外察騐該員經管之馬分别孳生及倒斃多寡交與該部議叙議處又議凖兩翼各設騍馬羣翼領一人騸馬羣翼領一人遇有員闕將應升之人引見補授四十五年奏凖兩翼馬場總管各鑄給關防以專職掌又議準總管準戴孔雀翎翼領準帶藍翎又議準兩翼馬場牧長牧副牧丁每月各給銀一兩三年連閏共三十七兩一次彚總給發雍正元年議準牧長牧副牧丁每月應給銀停其彚總給發每年春秋二季由寺移咨户部照數支領又議準牧長内有當差年久勤慎者簡選授為恊領每翼騍馬羣四人騸馬羣一人兩翼共設十人定為八品又奏準兩翼總管停用在京人員於察哈爾佐領等官及世爵内簡選一人馬場翼領等官内簡選一人擬定正陪由寺引見補授又奏準馬場副管兩翼共設一人防禦兩翼各設一人驍騎校兩翼共設三人䕶軍校兩翼共設八人䕶軍兩翼共設三百十有四人每翼各以䕶軍五十人專司捕盗其餘入於牧長等内當差副管員闕於防禦内簡選防禦員闕於驍騎校内簡選驍騎校員闕於䕶軍校内簡選䕶軍校員闕於䕶軍牧長内簡選均由總管保送到寺擬定正陪引見補授至驍騎校三人除毎翼各分一人外餘驍騎校一人同副管一人於兩翼輪流補用如副管於左翼補授則以驍騎校歸之右翼副管繫右翼補授則以驍騎校歸之左翼均報兵部注册至兩翼翼領員闕於協領内簡選協領員闕於牧長内簡選亦由總管保送到寺擬定正陪引見補授又奏準兩翼總管定為正四品副管防禦定為正五品翼領定為正六品協領定為正七品賞給半俸有世爵銜大者照大銜食俸䕶軍月給銀二兩並牧長等月給銀由該總管造册送寺覆覈移咨户部給發八年奏準騍馬羣牧丁每羣各裁二人十年奉㫖馬場官員照八旗察哈爾之例賞給全俸乾隆十三年奉㫖上駟院所屬馬場其統轄管理有副都統職銜總管一人太僕寺馬場每翼雖有䝉古總管一人並無統轄大員亦應補授統轄總管欽此又奏準馬場統轄總管鑄給關防以專職掌一牧課原定每年春季本寺滿堂官一人徃口外將馬駒騐騸秋季徃口外將騸過三歳之駒撥給入羣每三年將馬場均齊一次届期奏請欽㸃前徃至員外郎每年春季徃口外稽察孶生倒斃各數並訓練馬駒逐一印烙秋冬往口外驗視肥瘠並訓練馬駒有未印烙及印烙糢糊者補行印烙又定騍馬羣每三年均齊時比原額孳生多者議賞孳生少及闕額者議罰騸馬羣均齊時倒斃少者議賞倒斃多者議罰其馬駒内如得調習馴良者送進御廐備用又定馬場賞罰於題奏奉㫖後委司官筆帖式前徃會同該總管頒賞懲治應罰之馬照數追交入羣康熙十七年題準太僕寺官員不許擅騎羣内之馬又議準騸馬羣訓練不熟不堪騎用一分以上者該管官罰俸三月二分以上者罰俸六月三分以上者罰俸九月四分以上者罰俸一年五分以上者降一級畱任六分以上者降二級留任七分以上者降三級調用至牧長牧副牧丁等訓練不熟不堪騎用五匹以上至二十匹者牧長鞭一百牧副牧丁鞭八十二十匹以上者牧長鞭一百降為牧丁牧副牧丁鞭一百若訓練純熟皆堪騎用者牧長賞豹皮端罩一件毛青布十疋牧副牧丁各賞毛青布十疋四十一年議準騍馬羣三年之内三馬應孳生一匹於應孳生額數之外多孳生一百六十匹以上者賞牧長毛青布六十疋牧副四十疋八十匹以上者賞牧長毛青布四十疋牧副二十疋一匹以上八十匹以下者賞牧長毛青布二十疋牧副十疋於應孳生額數之内少孳生五十匹以下者牧長牧副牧丁各鞭四十牧長仍罰牲畜一五百匹以下者牧長牧副牧丁各鞭五十牧長仍罰牲畜一七百匹以上者牧長牧副牧丁各鞭六十牧長仍罰牲畜一九若於原均齊時所給數内闕少者將牧長牧副牧丁各鞭八十牧長仍罰牲畜二九至該管翼領統計所管馬羣如七羣八羣得賞者賞翼領縁領羊皮段袍一件毛青布二十疋九羣十羣得賞者賞狼皮或狐皮端罩一件毛青布二十疋十一羣十二羣以上得賞者賞狼皮或狐皮端罩一件緣領羊皮段袍一件毛青布二十疋如七羣八羣受罰者翼領罰牲畜一九九羣十羣受罰者罰牲畜二九十一羣十二羣以上受罰者罰牲畜三九若所管馬羣賞罰各半者翼領無賞無罰又議準馬場應賞皮袍端罩移咨工部給發布疋移咨户部給發運送車及䕶送兵移咨兵部給發雍正元年議準協領所管之馬如十二羣至十四羣得賞者賞毛青布十疋十五羣以上得賞者賞毛青布二十疋十羣至十四羣受罰者鞭五十十五羣以上受罰者鞭六十三年奏準總管所管馬羣除騸馬羣並兼入騸馬羣騍馬羣之小馬䮘馬馬駒外孳生以五百匹為一分闕少原額以二百匹為一分孳生一二分者存案三分者加一級三分以上者按其分數存案加級闕少不及一分者免議闕少一分者罰俸六月二分者罰俸一年三分者降一級畱任四分以上者革職又議準馬場䝉古有犯罪應罰馬者改為罰牛又議準兩翼騸馬騍馬以一百六十八羣為定額騸馬十六羣不過五千匹騍馬一百五十二羣不過三萬五千匹合共以四萬為止四萬之外多餘者奏明請㫖四年議準每年由寺稽察馬場照例具奏仍交兵部詳覆覈奏又奏準每年察㸃馬場之後所有倒斃馬皮交張家口監督收領於年内解送到京令製造庫擇其堪用者存畱不堪用者由寺照時價變賣將價銀奏交户部如監督故意遲延不依限解送者察叅五年奏準協領所管十八馬羣内十二羣以上得賞者賞毛青布十疋若皆得賞者賞毛青布二十疋有因馬羣受罰應鞭五十六十者均停其鞭責罰牲畜一七八年奏準騸馬羣將原交之數作為十分一年内倒斃一分者仍準賞給牧長賞毛青布二十疋牧副十疋倒斃二分者無賞無罰倒斃三分者牧長罰馬一五入於馬羣牧副鞭四十若倒斃過多牧長牧副牧丁各鞭一百牧長降為牧丁仍罰馬三九入於馬羣十三年議準統轄總管通計兩翼之馬孳生以千匹為一分闕少原額以四百匹為一分多孳生一二分者存案三分者加一級三分以上者按其分數存案加級闕少不及一分者免議闕少一分者罰俸六月二分者罰俸一年三分者降一級畱任四分以上者革職十五年覆準場内馬駝有病者該管協領加意調治若繫齒老殘傷倒斃者騐明印烙剝取其皮注册十日内報翼領翼領報總管總管報統轄總管於夏冬二季造册報寺察覈一牧場康熙年間定兩翼牧場統計見有之馬均匀分配定為騍馬四十羣騸馬八羣十一年奏準場内生􅋪之馬由總管開報每匹用藥一兩在上駟院支取調藥蘇油八兩在户部支取二十三年增騍馬二十四羣三十三年增騍馬十六羣三十六年增騍馬四羣騸馬八羣三十九年增騍馬三羣四十五年增騍馬六羣四十八年增騍馬二十七羣四十九年增騍馬八羣雍正元年增騍馬二十四羣乾隆五年奏準兩翼馬場共計騍馬一百五十二羣騸馬十有六羣按雍正三年議定在場之馬以四萬匹為止若孳生多餘奏明請㫖從前因用兵動用八旗官馬即將孳生多餘者照數撥補今八旗官馬均足定額又無别處可用見在兩翼除四萬匹之外共孳生多餘七千二百二十四匹内騍馬一千五百二匹分為八羣統計騍馬一百六十羣騸馬五千七百三十二匹分為十六羣統計騸馬三十二羣兩翼均分各在該管場内牧放八年議準兩翼馬場原各有一定處所恐日後不無溷淆應立界以垂乆逺左翼四旗東以布濩衣卜拉克為界西以察漢齊勞臺為界相距計一百五十里南以都什山為界北以虎時呼蘭臺山巴顔托羅垓為界相距一百三十里右翼四旗東以庫努克托羅垓努赫圖溝為界西以朱魯臺烏赫爾齊勞為界相距一百五十里南以克衣格逹瓦都得衣哈喇為界北以布爾噶蘇臺河南岸為界相距三十二里各該翼騍馬騸馬照所定之界㳺牧其中彼此不得侵越並不許私自墾種十五年覆準兩翼總管令其在騍馬騸馬羣適中之地居住