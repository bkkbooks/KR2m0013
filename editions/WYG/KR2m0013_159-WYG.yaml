將廩生一例治罪乾隆十年議凖凡冒籍順天中式之進士舉人及貢監生員除入籍二十年並無原籍可歸者不議外其未滿二十年及雖滿二十年尚有原籍可歸者統以部文到日一年為限由科甲出身之見任京官及候選之進士舉人貢監各赴大宛二縣具呈申詳順天府尹廩增附生赴教官具呈申詳府丞學政均一例咨回原籍其生員食餼挨貢悉照舊例按本生年分次第出仕直省之大小各官繫原冒大宛二縣中式及捐納出身者若非入籍已滿二十年並無原籍可歸均呈報該管上司改歸原籍各分報吏禮二部注册倘逾限不改一經察出生監照例褫革候選進士舉貢見任京外各官照例革職該管官自行察出免議若被科道糾叅旁人告發照例罰俸一年至府考審音之時由府丞移咨都察院奏請滿漢御史二人會同府丞審音以杜弊竇内有樂舞生應試者亦一例審音如聲音不合究出冒籍情弊本生廩保照變亂版籍律杖八十革去衣頂申送之地方官照徇庇例議處受財者各計贓從重論教官門斗婪贓計贓治罪一順天鄉試順治初年定凡順天鄉試一應事宜及貢院房舍均隸於府雍正十二年覆準貢院房屋號舍並收貯三場應用什物應設專官管理於貢院西轅門内空基蓋造房屋十二間令順天府照磨移住掌管貢院及一應存貯官物十三年覆準貢院號舍原設八千三百十有五間今應試士子日增每科鄉試皆别蓋蓆棚排列坐位方能敷用應增建號舍千六百八十五間並前合成萬間之數乾隆九年覆準順天鄉試向設謄錄書手七百六十名於順天府所屬州縣吏書内取用今應試士子日增應加增二百四十名共足千名以敷謄錄之用除原設七百六十名仍於順天府所屬州縣取用外不敷二百四十名於保定府屬之安肅定興新城容城雄新安天津府屬之天津易州屬之淶水等八縣每縣取用書吏三十名照順天府額編工食之數於地糧項下分作三年畱支届期給發造入奏銷册内報部覆銷十一年奏準鄉試士子有自擕上蠟者令監試官騐看如蠟多而製造不同者即時剖看仍豫備上蠟數百斤如剖看無弊即將豫備上蠟補給士子納卷時仍照舊例每場納燭價六分委官製造重蓋油燭㸃名時同試卷散給如燭不堅好將承辦官叅處一會試供具雍正八年覆準向來會試供給由順天府移取直隸布政使司庫帑委大宛二縣佐雜官承辦直隸總督彚案題銷嗣後每逢會試之年委賢能司官督率辦理發銀之時禮兵二部堂官會同府尹傳集内外委官當堂給發務令各行户實領如有官吏藉端需索令行户呈告該堂官題叅交部嚴加處治事竣由部會府尹題銷乾隆元年覆準鄉會試册開場内食物向來皆照前科價直銷算物貴時貽累行户賤時冒銷帑項殊未妥恊應令大宛二縣訪時價豫造細册鄉試呈送府尹會試呈送禮兵二部存案其承辦之官即照所報時價發銀採買十一年諭文武科場需用器皿食物向由順天府委大宛二縣動用帑銀分發各行户備辦近聞承辦之人不能料理妥協以致各行户未領銀之先吏胥有折扣價直需索陋規之弊及至發價之時復任意短發扣剋中飽著順天府嚴飭大宛二縣即將前項弊端革除如仍蹈故轍一經發覺定將該管各官一幷議處欽此一順天文鄉試順治年間定用正副主考官二人由府題請勅下禮部於京官中取學行兼優者疏名上請簡用又咨呈吏部取五經同考官十六人吏部禮部會同開列應差官職名題請欽㸃其内簾糾察滿漢御史各一人内監試滿漢御史各二人外廵察滿漢御史各二人由府咨呈都察院開列應差御史職名咨送禮部題請欽㸃又外簾官十六人由府咨呈禮部行文各衙門取科甲出身之員外主事中行評博内閣中書國子監助教守部進士舉人並翰林院庶吉士行取主事列名題請欽㸃八月初六日府丞同主考及執事各官辭朝赴順天府筵燕入場三場題目府尹恭進豫期具題揭曉日期至期府丞恭奉進呈題名錄至内閣進呈次日主考及執事各官同中式舉人入朝謝恩赴府筵燕武鄉試由府呈請兵部堂司官為外場考試官又題請勅下兵部開列翰林官職名具題欽㸃二人為内場正副主考官又咨呈吏部題請欽㸃小京官四人為同考官又咨呈都察院轉送兵部題請欽㸃御史二人為監試官又取京衛經歴列名題請欽㸃四人為外簾官其餘悉照文場例行凡府屬文武舉人會試由府尹給文送禮部兵部凡遇殿試傳臚日府尹府丞於長安門外為三及第簮花披紅赴府燕畢送狀元歸第一豫備公事雍正七年諭京師大興宛平二縣知縣常以虧空被叅朕體察其故二縣在輦轂之下每有一時急辦公事不能遲緩者只得那移庫帑以濟用而支領還項未免躭延時日其上司察知庫帑有虧不得不照例叅劾此等虧空實有可原之情朕體恤臣工不忍聽其因辦公而遭罷黜為思備用之道著大宛二縣各領户部銀萬兩永逺存貯遇有速辦公事詳明府尹動支應用竢支領銷算之時仍復歸還原項歳終報部覈銷如此則辦公有頼備用有資倘再有虧空國帑或藉名擅動備用銀者定從重治罪欽此一和雇民車雍正十年諭京中運送軍營之器械甚多驛站雖備有官車不能敷用不得不雇募民車寛裕給價惟是官吏奉行不善每於數日之前即將商民之車拘集驛站地方令其守候備用至起運之日始給運價其餘躭閣之日並不準算以致商民探知信息即皆逺避行旅畏懼不前不可不嚴行禁止可詳悉定議具奏欽此遵㫖議準軍營器械據承辦運糧商人代保令車户運送照兵部定例給價至公事需用之車交與大興宛平房山三縣雇募内務府酌量公事之緩急用車之多寡先期行文順天府轉飭該縣等和雇不必定以五日之限止須加給二日草料銀作正報銷再定例雇募民車行走之時日給銀七錢二分在塗住歇日給銀五錢二分今酌議如遇回空之差行走十日者以七日計算每司召募於起程前一日給以工食一畫界分治雍正十二年議準京師東西南北四城與大興宛平及外州縣地方犬牙相錯彼此溷淆皆由城屬不隨京營汛地管轄州縣不隨外營汛地管轄之故嗣後悉照京營舊制凡城屬地方有越出京營界外者就近各歸大宛二縣管轄大宛二縣地方有夾雜京營界内者就近各歸四城管轄各按界址豎立石碑永逺遵守奉天府一每年立春前一日府尹率各官迎春於東郊一慶賀每年恭遇萬壽聖節皇太后聖夀皇后千秋及元旦冬至令節本府官朝服齊集篤恭殿行禮恭進慶賀表箋一每月逢五日本府官朝服赴篤恭殿前齊集一陵寢四時大饗本府官朝服隨班行禮一每月朔望陵寢供獻府尹朝服赴陵前排班一每年二八月上丁日致祭文廟府尹率各官照例行禮一治賦國初定田賦每畝徴銀三錢丁賦每丁徴銀一錢五分至二錢不等順治八年定山海關外荒地甚多有願出關墾地者令山海道造册報部分地居住康熙五年定白旗堡小河西兩處地畝令府尹給民耕種照熟地例輸賦廣寧寧逺兩縣曠地給民開墾十七年定奉天府旗民錯居清丈難以定限令地方官每年設法清釐許民自首不論多寡隨勘隨報十九年奏準奉天地東自撫順起西至寧逺州老君屯止南自蓋平縣攔石起北至開原縣止共丈出民界内地五萬二千七百二十六頃五十畝又定奉天新來之民在民界安插緣邊次第墾種其原在旗界内居民有願移於民界墾種者有仍願在旗界内墾種原地者聽從其便至民人力不能開墾又復霸占者嚴察治罪二十五年定錦州鳳凰城等處荒地分撥民丁給牛屯墾與旗丁同二十六年定奉天曠土甚多令府尹廣置官莊多買牛種酌量發遣人足應差使外餘盡令其屯種所收米榖依時豐歉照例輸納設立官倉收貯二十八年議準嗣後民丁不許在旗界内墾種三十二年定民田改徴米豆每畝二升五合至七升五合不等三十三年定承徳等州縣額徴米以秫黍及黑豆一斗五升折算一斗暫徴一年五十二年諭州縣徴糧之官皆有考成盛京並無考成故每年拖欠嗣後盛京等處徴收米豆官員亦著考成欽此又定奉天所屬州縣米豆存貯太多蓋藏浩繁仍改為徴銀五十四年議準奉天州縣旗民雜處年乆暫免其搬移嗣後賣房者在民界内之旗房令其賣與民丁違者照侵奪例治罪五十五年定嗣後所勘民界内居住房屋不許賣給旗丁賣買時報明該管官違者嚴察治罪又定承徳等州縣仍照舊例徴收米豆又定民丁開墾地畝仍在地方官處具呈轉報盛京户部將墾過畝數年終彚册報户部察覈五十八年定奉天州縣官如因公出差委所屬吏目典史等監收民賦不得私委子弟書吏及私行借給違者令府尹題叅如府尹徇情不糾事發一并交部議處雍正元年定奉天存貯米豆甚多倉廒不敷將每年地丁米豆暫於元二兩年酌量徴銀以作蓋倉之費二年定自四年為始地畝徴米人丁徴銀所收銀遇有蓋倉州縣題請動用餘解盛京户部充餉竢收貯黑豆需用將完題請照舊徴豆四年定令府尹會盛京將軍户部侍郎同差徃勘丈地畝大臣將十四城界内民田公同委賢能屬官勘丈倘有隱匿不清發覺日將勘文官從重治罪六年定奉天文出新舊民地以五分徴收粟米以五分照三分一畝例徴銀所徴銀解交盛京户部充餉仍將徴過銀米數目造入每年奏銷册内具題八年定自本年為始將奉天所屬每户下不拘新舊地畝統以十分計算分為三則以四分為上則三分為中則三分為下則按數徴收又定遼陽等州縣共收岫巖民地三百四十頃八十八畝一分又收鳳凰城並附近岫巖民地六百二十二頃二十五畝九分離城遙逺自本年為始全數徴銀十一年定奉天所屬州縣俸工餼廩祭祀等項在於各屬地丁銀内存畱支銷府屬上司衙門俸工在於附近州縣地丁銀内動支所餘地丁及房號雜稅仍照例解盛京户部充餉一立學康熙二十八年定奉天滿洲䝉古漢軍考取生員令盛京將軍副都統等騐馬歩射能射者交府丞考試雍正五年定奉天所屬見在滿合字號生員一百十有九人其見於府城及承徳界居住者仍隸府學餘著詢明居址撥歸各州縣學每遇歳科兩試由該學申送府丞考試一案發落按名次補廩補增出貢嗣後滿童生考試先令該將軍將居址開送府丞以慿撥入州縣各學乾隆二年定盛京照京師設學以敎宗室覺羅子弟於見任司官筆帖式内選能繙譯者分敎清書於奉天舉貢内選有學問者分敎漢書於閒散官以下領催驍騎以上選諳練騎射者分敎馬歩射令將軍府尹會同本學總管稽察均以五年期滿清書騎射敎習分别等第優者清書敎習交部議叙騎射敎習交本旗以應升遇闕即用漢敎習出具考語給咨赴宗人府引見恭候欽定覺羅子弟將軍府尹考試分等第奏請以盛京陵寢各衙門筆帖式用宗室子弟候人數衆多應行考試時由將軍請㫖十五年定奉天生員向由府丞選拔應令會同府尹在公所覆試騐看一奉錦二府屬生童均由府丞考試一祠祀天聰三年建先師廟於城東南隅殿三間㦸門三間廟門一座康熙元年重修都城隍廟五年增修學宫並建啓聖祠三十二年重修啓聖祠三間四十九年增修大成殿為五間大成門一座啓聖門一座繚垣二百丈雍正九年建先農壇於徳盛門外東南隅十一年建社稷壇於天祐門外西南隅前建風雲雷雨山川壇欽定大清會典則例卷一百五十五
