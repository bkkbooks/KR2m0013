body:
  text: 吏部考功清吏司漕運一漕運考成順治初年定官員收兌漕糧多攙糠粞砂土者該管官革職監兌官降一級調用其抵通兌交漕糧米多糠粞及有砂土者押運官革職管糧道降一級調用如無糠粞砂土經收兌勒掯不收者降二級調用至京通各倉支放米時如倉級等攙和砂土該監督不行稽察究處者降一級調用十年覆準各省糧道經管漕糧十分全完者加升一級欠一分者罰俸一年再運糧掛欠一分者降一級調用欠二分者降二級調用欠三分者革職凡欠二分三分者初次與二次處分同康熙三年題準坐糧㕔經管漕糧欠不及一分者罰俸六月欠一分以上不及二分者罰俸一年八年定倉場侍郎經管各省漕糧欠五釐以上至一分者罰俸一年三年連欠五釐以上至一分者降一級戴罪督催四十九年覆凖山東河南二省漕糧數少經管糧道十分全完者加升一級江南江北浙江江西湖廣漕糧數多經管糧道十分全完者加升二級至總漕於各省漕糧十分全完者加升二級未完照考覈倉場侍郎例議處五十年覆凖州縣水次兌米糧道監兌官親往稽察如有私自改折漕糧者該州縣及領運官皆革職米照數交賠監兌官降二級調用糧道降二級畱任又覆凖監兌官同糧道親身督押到淮一有短少該督即行審明題叅米畱旗丁兄弟子姪一人交與監兌官購買赶幫交兌押運千總出具甘結呈報如押運等官揑具丼結者降二級調用五十一年覆凖各省押運同知通判一次無欠者加一級二次無欠者加二級三次無欠者不論俸滿即升一次掛欠者降一級留任二次掛欠者降二級留任三次掛欠者降三級調用仍將掛欠之米分賠雍正四年奉㫖押運官員均令該督撫出具考語送部抵通之日倉場總督送部引見乾隆元年奏凖京通各倉監督定以二年更代差未滿時有俸滿應升人員凖其照常升轉仍竢差滿更代至差滿之後若照贏餘米議敘恐出入之際易滋弊端應請停止如果能出入公平糧儲無虧倉厫不致滲漏米糧不致霉變任滿時令倉場侍郎保題交部議敘凖其加一級四年覆凖山東河南押運薊糧官員如有逗遛掛欠失風等事亦照例處分若抵薊全完並無事故該總漕覈實具題亦照例分别次數議敘一漕糧限期順治初年定每年漕糧經徴州縣限十月開倉十二月兌完又定河漕總督理應督率各官挑淺疏通糧艘如不豫行挑淺疏通以致遲誤者請㫖議處如囘空船不行力催又不題叅地方官者皆降二級留任又定官員催䟎漕船無故容後幫之船前行前幫之船後行者罰俸一年漕船入境日期該管官不察明轉報者罰俸六月又定各省漕糧江北限十二月過淮江南江寜蘇松等處限正月内過淮江西浙江湖廣限二月内過淮山東河南限正月全數開行又江北限四月初一日抵通江南限五月初一日抵通江西浙江湖廣限六月初一日扺通山東河南限三月初一日抵通均限三月内完糧康熙十二年議準有司無糧軍衛不備船以致遲誤過淮違限一月以上者督撫罰俸三月糧道監兌官罰俸六月違限二月者督撫罰俸六月糧道監兌官罰俸一年違限三月以上者督撫皆住俸戴罪督催竢糧船扺通交明開復糧道等官各降一級調用如經徴州縣衛所等官船到無米有米無船及過十二月者皆罰俸六月過正月者各罰俸一年過二月者各降二級留任至總漕繫通管漕糧催趲尤其専責及過淮以後令總河星速催趲如依期過淮而抵通遲誤者河漕二督及沿河道員州縣等官亦照督撫遲誤過淮例處分又議凖白糧過淮抵通遲誤者亦照遲誤漕糧例處分又議凖監兌漕糧未經兌完揑報兌完或漕船未經開行揑報開行者皆降二級調用又議凖完糧在原限三月之外違限不及一月者將押運等官罰俸三月一月以上者罰俸六月二月以上者罰俸一年三月以上者降一級留任十七年議凖漕船自淮安至天津計程二千三百五十餘里沿􅂗州縣衛所於重運北上催令出境如原限半日而違限一時原限一日而違限兩時原限一日半而違限三時原限兩日而違限半日原限四日以上而違限一日原限六日以上而違限一日半原限十二日而違限兩日者專催官罰俸一年督催上司罰俸半年如原限半日而違限三時原限一日以上而違限半日原限兩日以上而違限一日原限四日以上而違限兩日原限六日以上而違限三日原限十二日而違限四日者專催官降一級調用督催上司罰俸一年如違限之期與原限之期相等專催官降二級調用督催上司降一級調用如違限之期逾於原限之期専催官革職督催上司降二級調用又押運官自受兌以至交倉曾於一二處逾限者罰俸半年三四處逾限者罰俸一年五六處逾限者降一級調用七八處逾限者降二級調用十處以上者革職其囘空漕船如過逆流其間設有牐壩蓄水之處均照重運定期無牐壩之處原限十二日者改限九日原限四日改限三日原限三日改限二日原限日半改限一日又順流有牐壩之處亦照重運定例無牐壩之處原限半日者改為三時一日改為半日四日改為兩日五日改為兩日半如有不行力催以致違限沿􅂗文武官弁並隨幫官皆照催趲重運例議處至天津以北至通州繫逆流重運糧船每二十里限一日其囘空船繫順流每五十里限一日山陽以南至浙江其重運糧船如順流每四十里限一日逆流每二十里限一日囘空船如順流每五十里限一日逆流每三十里限一日如有違限催趲押運官按違限日期皆照前例議處湖廣江西並江南等處行長江以至儀徴皆由大江因風輓運難以逐程立限令該督撫或繫重運或繫囘空飭該地方官作速嚴加催趲出境其自儀徴至天津如有違限亦照前例議處設或有非常風阻冰凍淺滯等事難以副限均令報明免其議處三十五年議凖豫省輝安河内三縣農務在於每年三四月而漕船抵臨在於五月應於五月初一日為始封版塞渠如不封版塞渠以致漕船阻滯者將經管官降一級調用該管官罰俸一年該撫不行察叅罰俸六月三十九年議凖漕糧盤壩過牐運至京通各倉監督抽一二袋驗㸔入厫限三月内全完若米到不即盤過及驗㸔時有藉端抑勒許運丁首告監督降二級調用倉場侍郎不行察叅罰俸一年雍正元年議凖漕糧冬兌冬開如船到無米有米無船以致開兌遲延將州縣衛所官照例察叅如該管上司徇庇不行稽察以致誤漕者該督撫指名題叅將該管上司照徇庇例議處二年議凖湖南州縣漕務於十一月運至岳倉如遲至十二月中旬到者照過十二月兌開例議處如過十二月到者即照過二月兌開例議處如州縣糧米依期到次軍衛船已備而監兌領運㕔弁交兌稽遲至過十二月者亦即照過二月兌開例議處如能依限過淮題明開復五年遵㫖議凖江浙湖廣江西四省糧船過淮違限仍照定例議處於抵通完糧之日將過淮違限日期扣算如過淮違限十日已經處分者將抵通完糧違限十日扣出免其處分凡日期多寡照此扣除其道逺之省以九月初十日為限逾此限而不完糧者將押運等官照抵通違限例議處乾隆二年議凖牐官越漕起版洩水誤漕者該㕔官不行稽察致誤漕務者降一級留任如曲為囘䕶徇隠不報者降三級調用一旗丁收書康熙二十六年題凖運丁正身不押運雇覓匪徒及舵役代運者將押運通判罰俸六月三十九年議凖各倉放米時如有倉役人等抑勒留難向領米之人需索銀錢該監督失察者照失察衙役犯贓例議處倉場侍郎罰俸六月若知情故縱者革職治罪倉場侍郎罰俸一年又議凖坐糧㕔及各倉書役人等向運官運丁指稱費用勒索坐糧㕔監督失察者照失察衙役犯贓例議處倉場侍郎罰俸一年如監督等通同需索者革職治罪倉場侍郎不行察叅者降三級調用五十一年覆凖旗丁須僉家道殷實之人令千總保結呈報衛守備府㕔等官再加驗㸔加具印結如有掛欠千總守備照例處分外一幫掛欠府㕔等官罰俸一年糧道罰俸半年數幫掛欠照此遞加罰俸雍正五年覆準僉派收書徴收糧米務令遴選老成殷實書吏如有僉派匪人侵蝕漕糧者書吏照律治罪州縣官照溺職例議處侵蝕米糧即著官役名下嚴行追補至州縣收糧倘有贏餘飭令糧道不時盤驗每斛應有餘米若干計算明白存為修倉振濟之用年終將存貯動用數目造册報部仍令該撫不時稽察如有扶同徇隠及各州縣藉名私加斛面苦累小民者即行叅究一修造漕船康熙十四年議凖官員修造漕船或謊報朽爛或修造未竣報稱已完或朽爛漕船冊報掩飾者皆降二級調用如承造漕船推委不行監造或檄催日久不完竣者皆降一級調用該管官督催不力者罰俸一年如船朽爛不估價申報者亦罰俸一年一糧船夹帶私貨康熈二年題凖漕運重船除定例凖帯土冝外不許夹帶私貨淮安濟寜地方嚴加稽察如有漕船夹帯私貨沿塗包買通同商人搭船者將不行嚴禁之該管糧道罰俸一年監兌官降一級調用押運官降一級留任十五年題凖淮安濟寜地方官失察糧船夹帯私貨者罰俸一年雍正三年議凖糧船闖牐闖闗及倚恃糧船任意販載私鹽不服盤詰持械傷人若押運等官不行約束知情故縱將押運等官革職隨幫照例責革如該管闗牐各官藉端勒索故意留難亦許押運等官呈明該督撫題叅究治又議凖糧船繫合幫結隊而行不畏盗賊火礮鳥槍無所取用應行禁止通飭糧道衛備運弁嚴禁搜察倘於糧艘之中仍帯火礮鳥槍者事發除將本犯照私藏鳥槍例責四十外將失察之該管官照失察銃礮鳥槍例分别議處一糧船漂燬康熈二十一年題凖押運官弁廵察不謹以致失火燒燬漕船者降一級留任地方官不行恊救延燒别船者罰俸一年又題凖漂没船糧著沿􅂗催䟎各官及汛地文武官親臨確勘是實各出保結取具運官結狀該督撫確察具題到日照例豁免如運糧官丁未經漂沒船糧謊報漂沒並故將船放火漂流及雖繫漂流損失不多乘機侵盜者照律治罪米照數賠補其沿􅂗催䟎各官及汛地文武各官不親臨確勘的實遽出保結者皆革職如該督撫不緝察確實遽行題豁後致詐冐事露将具題督撫降二級調用雍正元年覆凖漕船在内河失風押運官失於防範者罰俸六月五年覆凖沿􅂗地方官除遇風水平順仍照定例原限日時催趲出境不得遲誤外若遇風色不順並水勢漫大該地方官與押運官弁公同計議暫停守候一面即將守候日期申報該管上司並總漕衙門於入境出境日時冊内僉注明白倘有不顧風色水勢催趲前進在内河致有疎虞將地方官罰俸一年押運官罰俸六月一竢風息水平仍須立刻催趲出境無得藉辭守候任其停泊如有揑稱風水未便停泊逗遛者總漕該督撫據實察叅将地方官降二級調用押運官降一級調用乾隆四年覆凖汎水漲發猝不及防能戽水救船修艌抵通漕糧並無虧折能買補全完者皆毋庸議處仍照例議敘倘船非滿號不能戽救米有掛欠雖買補全完者仍照例議處十四年覆凖漕船囘次雖交與地方官收管仍著隨幫官弁約束稽察遇有風火事故即将該隨幫官弁職名報叅如新運千總既經接收幫船将接收日期呈報之後遇有事故即将新運千總職名察叅或糧船減存在次遇有事故運隨二弁皆不能兼顧即察明收管之地方官開叅至漕船既已囘空到次押運同知等官一運之事已畢實與隨幫專為空船而設者不同應將押運同知等官免其叅處一盗賣漕糧順治初年定旗丁於未經扺通之先沿􅂗盗賣米糧押運同知通判等官不行察究者各降一級留任康熈四十三年議凖重運入境責令該管道府州縣往來廵察如失察盗賣一起者州縣官罰俸六月道府罰俸三月二起者州縣官罰俸一年道府罰俸六月三起者州縣官降一級留任道府罰俸一年四五起以上者州縣官降一級調用道府降一級留任乾隆三年覆凖漕船抵通如有交倉不足無故掛欠者一槩不凖買别幫餘米抵補仍令倉場將掛欠之幫逐一開明移咨總漕著落領運官丁分賠於下年起解搭運如運滿無完照例叅處其有沿􅂗失風失火事故等船所運漕糧一時沉失並搶救濕米等項事出意外令總漕察明沉失搶救濕米之數報明戸部移咨倉場於本倉餘米内買補扣抵不凖在通購買交納至給旗丁行月等項日用餘米抵通餘剩令坐糧㕔察明給與驗票凖其售買如有私相買賣秔粟二米及交納不敷官丁在通購買糧米抵補虧闕者交與通永道並通州知州察拏究治該道員知州不實力稽察被倉場及廵漕御史拏獲即題叅交部照失於詳察例罰俸一年四年覆凖失察盗賣一二起合算米數至五十石以上者將該地方官降一級留任道府等官罰俸一年失察一起以至三起合算米數至百石以上者将該地方官降一級調用府道等官降一級留任又覆凖州縣官一年内能將盗賣漕糧拏獲二次者紀録一次道府等官於所管境内一年内能拏獲至四次者紀録一次再有多獲照此遞加一漕船囘空康熈五十一年覆凖凡抵通遲延之船倉場勒限交糧囘空不可遲誤新運其不能依限囘空者令總督察明該省減存船數依限兌運開行如無減存船即将本省漕船搭運或本省漕船不能搭運即行捐輸雇船依限兌運開行其遲滯船來年開凍之時沿河文武官弁速催抵次如有不行設法雇船依限兌運開行即将在南之糧道監兌州縣等官題叅照過淮違限例議處如有遲滯船不行速催抵次即將在北沿河催趲囘空之文武各官題叅照催趲漕船定限例内囘空違限計時日分别議處康熈六十一年覆凖副丁跟隨重運過淮抵通交糧完日押運官同隨幫官逐名察㸃令其管押頭舵水手回空押運㕔官所押尾幫船糧起卸完日坐糧㕔即将批迴印發呈送户部察驗令其押空南下如坐糧㕔抑勒批迴不行印發投驗者聽該㕔官呈報倉場将坐糧㕔題叅照抑勒遲延例降二級調用又議凖押運官不候掣批輒行押空回任者罰俸一年若不遵定例管押回空從陸路回省者照差遣官員枉道例議處其回空船過淮違誤者皆照重運過淮違限之例議處欽定大清會典則例卷十七
