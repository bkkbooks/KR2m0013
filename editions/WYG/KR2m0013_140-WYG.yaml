body:
  text: 工部都水清吏司噐用表匣順治元年定皇帝恭進皇太后表文用明黄髤堆金瀝粉龍匣髙三寸長一尺六寸濶六寸王公百官恭進皇太后表文皇帝表文皇后箋文用黄綾匣髙六寸長一尺八寸濶五寸五分均杉木質準内閣典籍㕔来文辦造一奏書匣順治八年定皇帝恭進奏書於皇太后用杉木匣以明黄雲龍叚糊飾髙二寸一分長一尺一寸五分濶五寸八分準内閣典籍㕔来文辦造一實録匱康熙十一年奏準每匱長四尺一寸五分濶二尺二寸髙四尺五分枬木質外用銅鍍金鈒雲龍文葉包瓖内用黄綾糊飾香杉木格每匱連底蓋五層長三尺四寸濶一尺六寸七分髙三尺一寸匱格均無定數準該館来文辦造一玉牒匱順治十八年奏準用大匱四每匱濶四尺縱三尺九寸髙三尺七寸插盖箱十每箱濶三尺一寸縱一尺九寸髙六寸均杉木質二匱漆用黄色二匱紅色四箱黄色六箱紅色均戧金雲龍文準宗人府来文辦造康熙十年奏準每次纂修玉牒匱箱各增髙六寸乾隆十年纂修玉牒告成累年加增匱髙至八尺五寸箱髙至五尺四寸一記注匱順治元年定歲造記注匱一松木質長二尺五寸濶一尺六寸髙二尺銀硃漆飾用鐵葉包裹歲準該衙門来文辦造一頒詔金鳳乾隆十四年奏準鳳髙二尺一寸五分長四尺七寸䕶雲長五尺一寸前濶一尺八寸五分後濶七寸承詔朶雲濶三尺四寸均用鈒銅飾金鳳口銜明黄絲組懸以朶雲轉軸而下準内閣典籍㕔来文供用用畢仍由部收貯一詔勅及文武殿試金榜順治元年定詔書及金榜均用硬黄紙表裏二層勅書分三等一金龍香箋表裏四層用檀香屑夾造面繪泥金雲龍背灑金一畫龍箋表裏三層香墨繪畫一印邊龍箋表裏二層香墨刷印均黄色準内閣典籍㕔来文辦造一世襲佐領印軸乾隆三年覆準八旗世襲佐領應設立黄紙印軸將原立佐領原委及承襲支派備書於軸給發佐領各族長等收執以慿稽考其長短尺寸難以豫定應移咨工部先造千軸計長三丈四丈五丈者各三百軸十丈者百軸其周圍螭邊款式及縱廣尺寸均照功牌式樣嗣後成造均依兵部所需數目及来文内長短尺寸辦給十四年覆準游牧察哈爾及盛京等處佐領應給印軸七十有九計長五十丈者一四十五丈者五十有三丈者一十有二丈者五十有一丈者三八丈者三七丈者九六丈者十有八五丈者三十一四丈者一三丈者二一功牌康熙十一年定功牌分五等一等功牌長三尺六寸五分二等長三尺三寸五分三等長三尺五分四等長二尺八寸五分五等長二尺六寸五分均廣一尺一寸五分用白礬紙棉紙表裏二層周圍香墨印邊作螭文紫綾為面軸用紫榆木準兵部来文辦造一糊飾順治初年定太和殿保和殿中和殿文華殿牕格用朝鮮貢紙每年糊飾黄綾博縫二年一次糊飾各壇廟牕格路鐙由太常寺移咨外藩朝貢各館舍由禮部理藩院移咨到部委官糊飾一設案順治元年定朝會慶賀諸典禮設表案經筵設御書案講案頒賜表裏諸物設賞案賜燕設食案殿試及新進士朝考庶吉士散館等試各閲卷官設公座書案均準各衙門咨文由部供用一進士赴燕簮花順治元年定新進士賜恩榮燕應用綵花五百枝狀元金飾銀花一枝準禮部来文辦給一各衙門需用器物内閣送本需用皮箱包袱油單照咨取數目每二月辦給一次修書各館需用厨匱案椅筆墨硯由部辦給禮兵二部㑹試筵燕需用盤碗錫器之屬由部委官辦給事竣徹回禮部燕外國貢使供應同䝉古王台吉等需用案椅鐙檠馬槽諸物照理藩院咨文由部辦給凡頒詔頒勅書需用畫筩油單命將出師及欽差官需用勅筩印匣印池皮箱鎖鑰袱褥等物均照各衙門来文如數辦給上駟院需用馬槽及馴象所需用蓋象棉被氊條均由部辦給修造樂器需用桐梓木材及修造器物應用毛竹斑竹熏竹黄花竹筀竹實心竹㯶竹檀木均行文江浙等省辦解成造玉器需用寳砂行文直隸靈夀平山二縣辦解織造一制帛順治八年定江寧織造局設神帛機三十張歲織帛四百端又準部移文額造二千端其文兼清漢曰郊祀制帛曰告祀制帛其色青黄曰奉先制帛色白曰禮神制帛青赤黄白黑五色曰展親制帛曰報功制帛均色白曰素帛色白不織文一勅誥康熙元年定江寧織造局設官誥機三十五張遇應用之時由部豫期行文該織造如式置辦誥命用五色及三色紵絲文曰奉天誥命勅命用純白綾文曰奉天勅命均織升降龍文兼清漢字又定一品玉軸鶴錦面二品犀軸螭錦面三四品貼金軸五品角軸均牡丹花錦面六七品以下槩用角軸小團花錦面一校尉服色國初定校尉衣用大紅色織團葵花文每件五幅長四尺三寸濶一尺七寸袖八寸康熙元年覆準校尉衣停織花紅叚用木紅色照内織染局三絲式樣織造十六年奏準舁輦輿校尉織紬地擎執校尉織絹地一采繒國初定每采紬一疋用經絲十一兩緯絲十一兩織成長三丈六尺濶一尺六寸染以各色以供國家慶典陳設結采及采棚采亭並各公廨一應慶賀典禮結采之用康熙三年覆準采紬色尚鮮明多貯無益嗣後遇應用之時令江寧蘇州杭州三局照部行數目織染解部無庸每年造辦一潞紬每疋重六十四兩長八十尺濶二尺四寸小潞納每疋重十有六兩長三十尺濶一尺七寸歲由山西長治髙平二縣織造解部轉送内務府撿收康熙十四年覆準長治縣歳織潞紬六十二疋小潞紬一百八十六疋髙平縣歲織潞紬三十八疋小潞紬一百十有四疋如額解部十七年題準潞紬每疋準銷銀十二兩五錢小潞紬每疋準銷銀二兩七錢五分關税一直省工關税額以乾隆十八年奏銷册計之共二十七萬一千五百四十六兩有奇一盛京胡納胡河大凌河小凌河六周河太子河清河鶯納河大莊河