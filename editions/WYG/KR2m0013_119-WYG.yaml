五月以上者承修官革職督修官降三級調用将軍督撫提鎮降三級留任又議準承修官将未經修完之船揑報完工者革職督修官降二級調用将軍督撫提鎮降一級調用如承修官詳報未完督修官以完工轉報者督修官革職承修官照限議處承修督修官詳報未完将軍督撫提鎮以完工具報者将軍督撫提鎮革職承修督修官照限議處又議準船屆修造之期該管官不将船上什物交明致頭舵兵丁人等偷竊因而短少殘闕者除頭舵兵丁人等治罪追賠外将該管官降一級調用該上司不揭叅者降一級留任至交船之時頭舵兵丁人等有藉端勒索者照例治罪将該管官照衙役犯贓例議處若官弁藉端勒索者革職提問該上司明知不揭叅者降二級調用乾隆三年議準修造内河廵哨船照戰船扣限如有逾違不及一月者免議一月以上者承修官罰俸六月兩月以上者罰俸一年三月以上者罰俸二年四月以上者降一級留任五月以上者降一級調用督修官違限一月以上者罰俸三月兩月以上者罰俸六月三月以上者罰俸一年四月以上者罰俸二年五月以上者降一級留任五年諭東南沿海一帶如山東江南福建浙江廣東廣西等省皆設有戰船以為海防之備今承平日久官弁漸覺疎忽朕聞戰船數目竟有報部之虗名而十分之中不免闕少二三者至於大修小修之時毎因船數太多難以察覈該營官弁及州縣官通同作弊将所領帑銀侵蝕入已報修十船其實不過七八船而又塗飾顔色以為美觀仍不堅固且更有不肖官弁令子弟親屬載販外省或賃與商人前徃安南日本貿易取利者以朕所聞如此雖未必各省皆然然亦難保必無其事可傳諭該省督撫提鎮等嗣後嚴行稽察加意整頓務令諸弊盡除以重海防倘将來再有風聞經朕特遣大臣前徃察出虗冒廢弛則該管之大員咎亦難辭欽此十四年議準各省外海内河水師戰船哨船修竣經督撫提鎮驗後令承修官将船身長濶丈尺並船内一應噐具寛厚尺寸造具清册送督撫提鎮鈐印存營毎於嵗終委官按册盤察同軍装噐械一并出結保題如有滲漏損失照例題叅十七年覆準戰船出洋必需加用頭巾插花借助風力駕駛始能迅速應一例製備以資廵哨除江南省沙唬廵快等船福建省艍䑩等船皆輕便易使毋庸製備又廣東省虎門協營海道紆迴砂礁錯雜不必製備外其餘沿海各省一應戰船皆製備頭巾插花所需工料銀於營中公費及司庫備公銀内動支毎屆該船修造之時将頭巾插花一例造報修換仍将用過工料報部覈算欽定大清㑹典則例卷一百十五
