body:
  text: 兵部職方清吏司詰禁一保甲國初定凡州縣鄉城每十户立一牌頭十牌立一甲長十甲立一保正每户給印牌一張書姓名丁數出則記其所徃入則稽其所來其客店亦令各立一簿将每夜宿客姓名所帶行李牲口及作何生理徃來何處逐一登記明白至扵寺觀亦分給印牌上書僧道人數姓名稽察出入如有奉行不力或徒委吏胥需索擾害者叅劾照例議處康熙二十五年題準近京屯莊旗民雜處各州縣將旗民均編立保甲各立甲長稽察盗賊如有面生可疑者即拏送地方官訊究倘甲内旗人為盗或屯領催窩盗者即觧送刑部治罪三十六年覆準八旗暨内府佐領下人有在近京地方開窰者亦令地方官編立保甲令甲長不時稽察如在地方生事即觧送刑部治罪雍正四年諭弭盗之法莫良於保甲乃地方官憚其煩難視為具文奉行不實稽察不嚴又有藉稱村落竒零難編保甲至各邉省更藉稱土苖雜處不便比照内地者此甚不然村莊雖小即數家亦可編為一甲熟苖熟獞即可編入齊民茍有實心自有實效嗣後不實力奉行作何嚴加處分保正甲長及同甲之人能據實舉首者作何奨賞隠匿者作何分别治罪著九卿詳議具奏欽此遵㫖議準嗣後每户給印牌一張書姓名丁數偶有出入必使注明不許容留面生可疑之人若村落竒零户不及數即就數編立至熟苖熟獞已經向化應一例編立保甲如地方官不實力編排以致盗賊窩藏将州縣及營汛專管官照不能察緝姦民例降二級調用兼轄官繫同城者降一級調用不同城者降一級留任䏻察出詳揭者免議保正甲長牌頭及同甲之人果能實力察訪據實舉首照捕役獲盗過半以上例地方官按名數酌量奬賞倘牌頭於所管内瞻狥隠匿事發之日繫强盗照不應重律折責繫竊賊分别輕重酌量懲警若牌頭曽於甲長保正處首告不據實轉首者一經發覺甲長照牌頭減一等發落保正減二等發落牌頭免坐若屯堡村莊聚族百人以上保甲不能徧察者選擇族中人品剛方者立為族長如有匪類令其報官究治倘瞻狥隠匿與保正一例治罪五年覆準紳衿一例編入保甲聴候稽察如抗不遵依比照脱户律治罪地方官狥情不詳報者照狥庇例議處其保正甲長紳衿免充輪直支更看柵等役亦準免至齊民内有衰老廢疾及孤寡之家子孫尚未成丁者均準免支更看柵及一應差徭又覆準各處大小船易於藏姦令地方官取具船户隣右保結編列號數於船兩旁刋刻某處船户某人姓名給以執照該船户持照攬載地方及營汛官弁不時稽察其採捕漁船姦良更難分辨照陸路保甲之例以十船編為一甲一船有犯盗竊者令九船公首若隠匿不報事發将同甲九船一并治罪至漁船停泊之處百十成羣多寡不等十船一甲之外如有餘船即以竒零之數編為一甲地方及營汛官弁随時留心㸃驗不得虚應故事又覆準保正甲長準免本身差徭如有借名武㫁鄉曲者嚴察革究一切户婚田土不許干與專一稽察盗賊及人命賭博䓁事又覆準保甲之法苖民謂之合樁除隔省並生苖地方或村寨相逺不必合樁外其村寨附近令其合樁防守十一年議準臺屬多流寓之人除立有産業兼有父母妻子者自有十家甲牌可稽其並無家室産業如佃户傭工貿易之類取具業主房主鄰右保結附於甲牌之末彚報以備稽察乾隆二年議準編立保甲原為消弭盗賊務令保正甲長逐户稽察如有踪跡可疑者即行呈報倘有瞻狥隠匿按律治罪至於塘汛兵丁原非徒供差使實為弭盗安民而設各該督撫提鎮飭令營汛官弁嚴飭塘汛兵丁晝則循環守望夜則輪流廵邏如遇行踪詭秘逐加盤詰若有搶截刦掠不䏻救䕶擒拏甚至盗賊出沒漫無知覺者除将兵丁斥革重加責懲外該管官知情狥隠者降三級調用失察者罰俸一年四年議準貧民入四川者聴其散居各府州縣佃種者令業主出結貿易者市鄰出結依附親故者親故出結寄居寺廟者留居之地主出結與土著一并編入保甲互相覺察如有生事可疑之人許原出結並鄉保鄰右人等首報又議準江南浙江福建府州縣内搭棚山居以墾地種麻煽冶開爐造紙做菰䓁項為資生計者其閒土著甚多亦有鄰省失業流寓之人均照保甲例按户編排責成地主並保長出具保結倘居住星散不論棚數多寡自為一甲互相稽察又議準廣東州縣民人有入山搭寮取香舂粉砍柴燒炭為業者照保甲例編排每寮給牌一張令寮人互相保結擇老成謹慎者為寮長寮户聴其鈐束遇有遷移加増寮長及互結之人将牌赴縣更正倘窩藏姦宄容隠不報者發覺連坐營汛官弁每月撥兵廵察一次不許生事擾累内有未經報官搭寮居住者即送文職官察審如漫不經心約束以致窩蔵姦匪者照例議處八年奏準山西陜西邊外䝉古地方種地民人甚多姦良難分即於種地民人内擇其誠實者每堡設立牌頭四名總甲一名令其稽察十二年題準浙江玉環山管轄島嶴所有居住民人一例編立保甲並分别是農是漁不許溷雜十三年覆準山西陜西邊外設立牌頭總甲令其稽察姦匪如有罪犯逃徃䝉古地方行竊並情有可疑之人即禀報該管官觧回原籍該管官於春秋二季取具牌頭總甲並無容隠甘結注册一緝盗順治初年定武職各官諱盗不報者革職又題準營汛官弁能獲大盗窩家者紀録二次獲小盗窩家督撫提鎮酌量給賞如不實力察訪别經獲盗供出窩家将該管専汛官罰俸一年十八年題準山海大盗千百成羣攻䧟城池官弁臨陣敗遁該督撫提鎮題叅照律治罪又題準鎮店路塗被盗刦失餉鞘將䕶送營汛官弁革職康熙四年題準盗案踈防将經制專汛官題叅不得以外委官題叅塞責五年議準營汛官弁遇有盗案繫殺人刦物者務訊問明白一面追捕一面申報該管之上司以便通行緝拏若不申報或借名擒勦殺害良民者該官弁革職提問該提鎮於此䓁劣員不申報總督及總督不即題叅者總兵官降一級留任提督罰俸一年總督交吏部議處如無總督省分聽提督題叅無提督省分聴總兵官題叅又議準盗案失事限年緝拏各官若将未獲盗犯揑報死故者革職兼轄官不詳察轉報者罸俸一年督撫提鎮不詳察具題者罰俸六月七年議準城内被盗刦掠殺傷官民並搶奪倉庫獄囚者專汛官住俸限一年緝拏全獲開復限滿一名不獲降一級調用獲未全者降一級留任再限一年緝拏全獲開復如仍未全獲但能獲過半者再降一級留任未獲盗犯照案緝拏全獲開復如二年限滿獲盗尚不及半降二級調用若能於一月内獲盗一半者停升未獲盜犯限一年緝拏全獲免議限滿仍不全獲降一級留任未獲盗犯照案緝拏全獲開復同城兼轄官皆照此例議處其同城副叅等官作統轄題叅者照兼轄官例議處不同城兼轄統轄官初叅罰俸六月限一年緝拏限内獲一半者免議未獲盜犯照案緝拏若限滿不獲罰俸一年仍令照案緝拏同城提鎮罰俸六月限一年督緝限滿不獲罰俸一年九年議準姦細出入境内專汛官不能察拏者降四級調用兼轄官降二級調用十年題準總督題叅盜案本省限四月兼管省分限六月廵撫提鎮題叅盜案限四月均以失事之日為始扣算具題如有逾限專責具題之督撫提鎮計月處分不分坐屬官十一年題準盜賊偽稱名號侵犯城池者事屬叛逆專汛兼轄各官皆革職總兵官降二級調用提督降二級戴罪圖功若盜賊聚集一二百人竪旗放礟焚燬鄉村搶刦擄殺者專汛官革職兼轄官降二級調用總兵官降二級提督降一級皆戴罪圖功聚集六七十人焚燬鄉村搶刦擄殺者專汛官革職兼轄官降二級總兵官降一級皆戴罪圖功提督罰俸一年至盜賊聚集地方鄰近之提鎮並駐防官及副叅游各官不親領兵勦滅止差守備千把總末弁前徃者各降二級調用其専汛兼轄統轄各官聞有盜賊聚集不遞行申報者皆革職督撫提鎮聞報不遣官兵㑹勦以致賊勢蔓延官兵失利者皆降三級調用若有此等盗賊竊發即能勦撫淨盡者皆免議又議準地方道路村莊被盗失事其設有墩舖防兵者專汛官住俸限一年緝拏兼轄官罰俸六月限一年督緝限滿不獲専汛官降一級留任再限一年緝拏兼轄官罰俸一年盜犯照案緝拏三限不獲專汛官仍留任再限一年緝拏如再不獲降一級調用若繫偏僻村莊曠野道路向未設有墩舖防兵者専汛官停升兼轄官罰俸三月皆限一年緝拏限滿不獲專汛官罰俸一年再限一年緝拏兼轄官罰俸六月三限不獲専汛官罰俸二年再限一年緝拏四限不獲專汛官降一級留任盜犯照案緝拏其副叅等官作統轄題叅者照兼轄官例議處若兼轄統轄官獲盗一半者免議專汛官獲盗過半兼獲盜首窩家者亦免議至失事地方有無墩舖防兵該督撫提鎮於題叅本内聲明以便分别察議又議準道路村莊被盗失事無論有無墩舖防兵提鎮皆不議處又議準奉差及赴任官員被盗失事無䕶送官兵者專汛兼轄官照地方被盜失事例議處有䕶送官兵者若在該管地方又繫所屬官兵䕶送将専汛官降二級調用兼轄官降一級留任統轄官罰俸一年若被殺擄無䕶送官兵者専汛官降二級調用兼轄官降一級留任統轄官罰俸一年有䕶送官兵者専汛官革職兼轄官降二級調用統轄官降一級留任又題準盗賊行刦事主於本日或次日據實呈報該管官不即接受或接受不即申報及接受呈報不即緝拏或追及盗賊不䏻擒獲致令脱逃或不親身追捕止差弁兵前徃者皆革職若事主二三日呈報者盗賊已經逺遁止照地方被盜失事例議處至附近營汛各官事主呈報不即接受者革職如以非本管營汛不即緝拏或追及盜賊不䏻擒獲致令脱逃或不親身追捕止差弁兵前徃者降一級調用其盗賊經過營汛該管官止追出界外不能緝拏及不親率官兵追捕止差弁兵前徃者降一級留任該督撫提鎮於題叅踈防本内将各官曽否接受申報及曽否親身追捕情由聲明如含糊隐飾後經察出將具題之督撫提鎮罰俸一年又題準盗案疎防不將經制専汛官職名開報僅以外委開報者開報官降二級調用轉報官降一級留任具題官罰俸一年又題準各標協中軍官經管錢糧不作兼轄若失事繫該員營汛地方者仍照例題叅疎防又題準盗案失事因公出境之官皆免議十五年題準該管營汛内遇有盗案彼此推諉不報皆照諱盗例議處如已經申報復又推諉者推諉官降一級調用轉詳官罰俸一年二十一年議準京城廵捕營有搶奪路行婦女及以藥物邪術迷拐男婦子女者失察専汛官罰俸一年兼轄官罰俸六月有匿名揭帖黏貼通衢専汛官不察拏者罰俸一年兼轄官罰俸六月三十二年奉㫖官弁兵丁有擒拏盗賊中傷及傷亡者皆照陣傷陣亡例分别䘏賞三十五年覆準盗案處分有加級紀録者皆準抵銷若於限年緝獲之後捐有加級紀録者不準抵銷三十六年議準督撫提鎮題報盗案將獲盗月日備載本内如不開明具題者罰俸一年三十七年議準盗案均於限内題叅疎防其有强竊仇盗疑似未明者限内報部存案竢文職審明如實繫被盗即將疎防各官察叅照例議處四十一年議準近京地方被盗失事不先報地方官徑自報部遷延時日致盗逃脱者槩不準行又議準京城廵捕營地方竊賊揠門掘壁偷竊財物在該管營汛内拏獲或經别管營汛官兵拏獲者免議若經民人拏獲送究者將該管官罰俸三月又議準京城前三門關廂内被盗失事將専汛守備兼轄叅將游擊皆降二級留任仍罰俸一年該汛千把總送部各責四十板馬歩兵各責四十板皆限一年緝拏不獲専汛兼轄各官皆降三級調用千把總革職兵丁革糧送刑部枷四十日責四十板盗犯交與接任官限一年緝拏又覆準京城前三門關廂内盗賊白晝搶奪財物傷人致死該管營汛官弁當時全獲及一月内全獲者免議一月内獲一半者専汛官罰俸一年兼轄官罰俸六月如一月内無獲専汛官降二級調用兼轄官降一級調用加級紀録不準抵銷盗賊交接任官照案緝拏該汛兵責四十板直省城内盗賊白晝搶奪財物傷人致死該管營汛各官照城内被盗失事例議處又題準盗賊潛匿居住該管地方不能察拏别經被獲供出從前居住地方將該管専汛官降二級調用兼轄官同城者降一級調用不同城者降一級留任統轄官亦降一級留任四十二年議準京師五城地方光棍借端挾詐勒騙錢財攪擾市肆行兇者責成廵捕營官弁察拏如知情不察拏者革職得財私放揑稱逃脱者革職同兵皆交刑部治罪失察者將該管叅將游擊各罰俸一年守備千總把總各降一級調用至守備千總把總拏獲光棍不即送叅將游擊衙門叅將游擊不即送歩軍統領者皆罰俸一年統領不速審結經稽察御史叅奏按遲延月日議處又議準王公大臣官員等家人領本生理霸占關津要地倚勢網利不令商民貿易挾制有司干與辭訟肆行不法及民人借貸王公大臣官員等銀指名貿易欺凌地方該管専汛官不察拏者革職兼轄官降一級調用統轄官罰俸一年至有此等霸占之事差官訪察仍復徇隐不據實申報者革職四十三年議準守備不作兼轄至水師守備有帶兵輪防哨廵之責盗案疎防同叅游一例議處四十五年覆準老瓜賊肆行不法營汛官弁差兵在該管地方晝夜更番廵緝如不實力廵緝責四十板知情故縱者照窩藏容隐例治罪能拏獲並出首者照拏獲鄰境盗賊例給賞如營汛官弁不能稽察致兵懈於廵緝降一級調用若能拏獲别汛老瓜賊照拏獲鄰境盗賊例議叙又議準道路掩埋無主身屍有被勒戳傷形跡繫老瓜賊謀害察驗確實將専汛兼轄統轄官題叅疎防照地方被盗失事設有墩舖防兵之例議處倘濫以仇盗未明詳請立案者照諱盗例議處五十一年議準京城前三門關廂内被盗失事一年内獲盗一半者専兼各官皆免議如一年内獲不及半専兼各官仍照例議處五十二年議準官員兵丁有擒拏盗賊中傷平復能當差者仍照陣傷例給賞若中傷殘廢不能復當差者照八旗兵丁例給與半分身價雍正元年議準直𨽻四路捕盗同知地方被盗失事捕盗千把總於失盗之日即住俸停升一年限滿不獲責二十棍全獲開復如該汛地方三年並無盗案或三年内凡有盗案均能全獲者該督察明具題將千把總不論俸滿以應升之官即用又議準廣東將軍督撫提鎮標下官弁有貼防地方者若附近村莊河道失事將貼防官弁并叅照専汛一例議處又議準地方不逞之徒㰱血結盟為盗専汛官不察拏者革職提問如平日失察一遇發覺即能擒獲者免議二年議準失事隐諱不報或以强為竊以多為少賄囑事主通同隐諱者専汛官革職兼轄統轄官扶同隐諱者降三級調用如止繫失察同城者降二級調用不同城百里以内者降一級調用百里以外者降一級留任提鎮知情者降一級留任失察者罰俸一年均於題叅本内將知情失察及同城不同城並道里百里内外逐一聲明分别議處如専汛官隐諱兼統各官察出申報者免議三年議準盗案必有為首之人承緝専汛官務獲盗首如盗首初限不獲雖獲盗過半仍罰俸一年再限不獲罰俸二年三限不獲降一級留任如盗首果繫病故有確據者準免議處若假借别州縣所獲之盗指為本案盗首或先報盗首脱逃後經審出仍在該地方隐匿或揑報盗首病故後於别案發覺者假借隐匿揑報官照諱盗例革職又議準承緝官能將一案盗犯全獲者紀録二次又議準營汛官弁能於一月内拏獲鄰境失事案内盗首者加一級紀録一次拏獲夥盗者毎一名紀録一次一月以外拏獲鄰境失事案内盗首者加一級拏獲夥盗者毎二名紀録一次其兵丁繫一月以内拏獲鄰境失事案内盗首者賞銀二十兩拏獲夥盗者毎名賞銀十兩一月以外拏獲鄰境失事案内盗首者賞銀十兩拏獲夥盗者毎三名賞銀五兩均令原失事地方各官捐給若離任該督撫提鎮捐給四年議準盗案實無窩家者即於招内聲明若審有窩家承緝専汛官必獲盗過半兼獲盗首窩家始免議處如限内止獲盗首並獲盗過半而窩家不獲者仍照不獲盗首例議處倘實有窩家因畏避處分將窩家刪除者照諱盗例革職五年議準餉鞘被盗失事地方専汛官革職留任限一年緝拏全獲開復如限内獲盗過半兼獲盗首者仍留任緝拏倘逾限一年獲不及半及雖獲半盗首未獲者革任未獲盗犯交與接任官緝拏同城兼轄官住俸限一年緝拏全獲開復限内不獲降一級調用不同城兼轄官初叅罰俸六月限一年緝拏統轄官不論同城不同城皆照不同城兼轄官例議處提鎮初叅罰俸三月限一年督緝限滿不獲罰俸六月盗犯照案緝拏若一經失事當即獲盗過半兼獲盗首者専汛兼轄統轄官皆免議或經營汛及州縣各官當即獲盗過半兼獲盗首者専汛兼轄統轄官亦皆免議未獲盗犯照案緝拏又議準解官押運餉鞘潛行小路不由大道並不執票赴營汛挂號撥兵䕶送者遇有失事該營汛官止照地方被盗失事例議處六年議準京城廵捕營有奉㫖緝拏要犯並關繫重大盗賊等犯脱逃經管應捕之官城外者責成専汛官住俸限一年緝拏一月内拏獲者免議一年限滿不獲降一級調用犯人交接任官緝拏若非經管應捕之官能於一月内拏獲者一名紀録二次一月以外拏獲者一名紀録一次又議準地方被盗失事外委千把總停其㧞補限一年緝拏限滿不獲責二十棍再限一年緝拏三限不獲革去頂帶仍限一年緝拏四限不獲革去外委盗犯交與接任官照案緝拏若能限内拏獲過半兼獲首窩者免議獲盗過半首窩未獲者仍照例按限叅處又議準餉鞘到境如解官欲就小路行走不遵營汛官弁勸阻該營汛官弁即詳報督撫提鎮題叅如希免䕶送聽其行走小路將該營汛官弁罰俸一年其解官執票赴營汛挂號該營汛官弁不照定數撥兵及所撥之兵中塗私回者解官徑報該督撫題叅將該營汛専管官弁罰俸一年兵責革七年議準衙署被竊該員據實申報者免議其承緝承審之文職仍照竊賊例處分若諱匿不報將該員降一級留任限一年緝拏獲賊開復一年限滿不獲降一級調用八年議準城内及地方被盗失事該提鎮照定限察取疎防職名開報總督題叅無總督省分該鎮開報提督題叅無提督省分該管兼轄統轄官開報該鎮題叅如逾限不開報者罰俸六月又議準前官諱盗之案接任官於到任三月内察出揭報者免議如逾限不能察出别經發覺將接任官革職留任接任兼轄官同城者降一級留任不同城者罰俸一年到任未及三月者免議接署官亦照此例議處又議準前官去任未獲盗犯交與接緝官限一年緝拏限滿不獲罰俸一年盗犯照案緝拏限内但能獲盗雖不及半亦免議處獲過半者紀録二次全獲者紀録三次若盗止二三名接緝官於一年限内拏獲一半兼獲盗首及獲盗過半者免其議處仍紀録二次其僅獲一半盗首未獲者止免議處毋庸議叙又議準盗賊逺颺他省潛匿居住已有實據經失事地方官關移察緝該管專汛官不實力協拏致令輾轉窩藏鄰境者降二級調用九年議準衙署被盗失事專汛兼轄統轄官皆照城内被盗失事例議處又議準衙署被盗失事據實申報者該督撫提鎮依限題叅疎防照例議處諱盗不報者革職仍留原任地方勒令出資懸賞與接任官協同緝拏竢獲盗過半準其回籍十年議準盗案疎防均照該督撫提鎮題本議結有應開復者即準開復應議處者即行議處皆知照刑部存案如題審覆覈之時有諱報揑報等弊將專汛兼轄統轄官各照本例處分十一年議準拏獲盗犯供出先次行刦之處審明即為行察若事主已經呈報將專汛各官照諱盗例議處事主未經呈報或失事未有實據者該督撫提鎮取具專汛兼轄統轄各官並無諱盗印結報部無庸察駮即照疎防例議處又議準諱盗之案若盗全獲者各官皆免議十二年議準竊賊一夥至十人以上雖不行强營汛官弁不能察拏照强盗例以疎防例察叅又議準盗竊田野糓麥果菜及噐物無人㸔守者專兼各官皆免察叅十三年議準盗首未獲除見在勒緝限内例應扣限察叅者仍逐案察叅外至勒緝年限已滿照案緝拏後該督撫提鎮於年終彚題將承緝接緝督緝各官一年内已獲㡬名未獲㡬名詳晰聲明二三名不獲者罰俸六月四五名不獲者罰俸九月六七名以上不獲者罰俸一年又議準凡遇十人以上竊案以獲犯訊供之日起限將疎防各官察叅又議準因公出境各官遇有盗案疎防及失察等事該督撫提鎮將該員於何月日因何事公出之處聲明報部如並未因公出境揑報規避處分者革職徇情轉報官降二級調用其升遷降調及有事故離任之人原任内遇有疎防失察等事果繫因公出境接任官察明具詳督撫提鎮報部倘不具詳誤將職名開送者罰俸一年轉報官罰俸六月乾隆元年奏準京師五城地方設立柵闌毎處廵捕營撥歩兵三名看守毎日定以二更為度不許夜行以防盗賊除奉㫖差遣及部院衙門差遣外遇有延醫及生産嫁娶行走之人並𦂳要等事有鐙籠者方許驗放如無故夜行該兵拏獲於次日呈報該營解送歩軍統領衙門責十五板三年議準地方有光棍結夥輪姦婦女孩童之案犯人逃脱不獲專汛官照盗案例扣限四月察叅其初叅以後限内仍不能獲將專兼各官皆照地方被盗失事例分别議處倘專汛官諱匿不報及該上司徇隐不叅照諱盗例分别議處又議準地方有兇徒結黨生事或雇募多人持械肆横該管專汛官知情故縱者革職失察者降一級留任又議準弁兵拏獲鄰境竊犯該管官察其所獲多寡酌量記功鼓勵四年議準京城廵捕營地方竊案止將專汛官議處兼轄官免其叅劾又議準盗入城内搶奪倉庫獄囚者不同城之提鎮亦罰俸六月又議準承緝接緝官能於照案緝拏之後年終彚題之先獲盗三名以上者紀録一次六七名以上者紀録二次督緝各官總計所屬之地方盗案一年内獲盗不及一半者罰俸六月過半者紀録一次若承緝接緝督緝官一年内拏獲之數與不獲之數相當功過相抵無庸議處議叙至彚題一次之後即免重複叅處盗犯照案緝拏又議準官員該管營汛内有竊賊臨時拒捕傷人者若賊無獲並雖獲賊為首及下手之人未獲者將専汛兼轄各官題叅疎防勒限緝拏照盗案失事例分别議處其已獲為首及下手之人者免叅疎防未獲賊犯照案緝拏如於限内將案内賊犯全獲者紀録二次又議準道路村莊盗賊白晝搶奪財物傷人致死若犯未獲及雖獲犯而為首並下手之人未獲者該管營汛各官照地方被盗失事例議處已獲為首及下手之人雖夥黨未全獲者免叅疎防六年奏準京師五城廵捕營地方盗案於報官之日為始扣限三月緝拏若逾限無獲都察院㑹同歩軍統領題叅又奏準城内被盗失事外委千把總初叅停其㧞補限一年緝拏限滿一名不獲革退外委獲未全者革去頂帶再限一年緝拏全獲開復獲過半者仍留外委未獲盗犯照案緝拏全獲開復如二年限滿獲盗尚不及半革退外委未獲盗犯交與接任官照案緝拏又奏準被盗失事地方原未設有經制専汛官止令外委廵防者督撫提鎮於本内聲明止將外委官題叅疎防又奏準兼轄官統計一年之内所屬各員有拏獲鄰境盗犯議叙至加一級或紀録四次者由督撫提鎮察明咨部將兼轄官紀録一次再有多者照此遞加又奏準被盗失事官員因公出境經該管上司委官署理營務者遇有盗案該督撫提鎮於叅本内聲明免其承緝處分回任之後照接緝官例察議盗犯照案緝拏若繫暫行差委未經委官署理營務者仍照承緝官例察議又奏準署印官繫題署咨署者照承緝官例察議若暫行委署者照離任官例罰俸一年該督撫提鎮於題叅本内聲明分别察議又議準地方有仇盗未明之案該管専汛官協同文職緝拏以呈報之日為始限三月内訪察明白若不能察出仇盗實情者罰俸三月仍限一年緝拏限滿不獲照文職緝兇不力例議處八年題準京城廵捕營地方緝案以失事之日起限四月緝拏限内全獲及獲賊過半者免議限内無獲及獲不及半者將専汛官住俸限一年緝拏竢全獲或獲過半皆準開復若逾限不獲將専汛官罰俸一年賊犯照案緝拏十年議準採生折割之犯殘忍狠毒該營汛官弁有能拏獲正犯者照拏獲鄰境首盗例議叙督緝之該管上司照協同拏獲之例議叙如犯事地方不能察拏經别營汛拏獲者將該管專汛及兼轄各官照不實力編排保甲例分别議處若此等兇犯潛匿該管營汛地方不能察拏或經人首告或經别處關㑹該管營汛官並不察拏或揑稱並無其人者照諱盗例革職十五年議準地方有關渉叛逆之犯向例承緝督緝各官均限以三年緝拏今減去一年將承緝之專汛官革職戴罪限二年緝拏不獲降二級調用犯人照案緝拏督緝之兼轄官降二級戴罪限二年緝拏不獲降一級調用統轄總兵官罰俸一年其接緝協緝各官以案發之日計筭如未滿二年停其升轉緝拏竢滿二年將各官罰俸一年犯人照案緝拏以上各官若遇有恩赦免其處分承緝者仍停升轉照例勒限緝拏以案發之日算起計滿三年開復接緝協緝者不停升轉犯人照案緝拏十六年議準武職各官緝盗是其専責地方一有盗案勒限緝拏不獲議以降調惟是緝限未滿遇有事故離任者向照離任官例罰俸一年完結以致限期屆滿例應降調之人亦得借告請病假名色希圖倖免嗣後武職及衛所各官承緝盗案除奉特㫖升調與迴避别補及别案革職降調丁憂治䘮等事離任者仍照離任官例處分至告請病假並終養者如初叅未獲例應住俸處分既輕為期尚逺亦照離任官例議處外其二叅三叅例應降一級留任者遇有病假終養離任即議以補官日降一級留任三年開復四叅例應降一級調用者遇有病假終養離任即議以補官日降一級調用該督撫提鎮將各該員因何事離任之處於題咨内隨案聲明以憑覈議十七年議準鄰境官弁有能拏獲發塜見屍為首兇犯毎名紀録一次拏獲四名以上者加一級一捕逃順治十一年議準衛所及營汛官弁獲解八旗逃人十五名者加一級三十名者加二級兼轄官視其所屬有獲解逃人三十名者加一級六十名者加二級統轄總兵官所屬有獲解逃人四十五名者加一級九十名者加二級提督所屬有獲解逃人二百名者紀録一次四百名者加一級再有多者各照此遞加總以一年一叙若不至加級紀録之數者又并一年議叙仍不足者將前一年獲解之數截去仍留一年獲解之數於次年接算不準三年合算又議準官員拏獲八旗逃人詳報總督提督給咨遞解屬廵撫總兵官轄者詳報廵撫總兵官給咨遞解該督撫提鎮均於毎年四月内將所屬官弁獲逃數目造具清册二本一送部備案一送刑部竢刑部覈明咨部議叙康熙四十一年議準京城廵捕營守備千總把總拏獲八旗逃人至六十名者加一級叅將游擊督率屬員拏獲逃人至百二十名者加一級再有多者照此遞加又議準近京地方有賣身旗下之人原有房産守分度日於民人並無擾累者許令居住原無房産者均令伊主收回若倚仗賣身旗下恣意横行把持武斷賭博姦滛窩盗勾逃訐訟作證擾累民人者該管専汛官申報上司照逃人例察拏送部治罪若仍容居住不行申報専汛官罰俸一年兼轄官罰俸六月統轄官罰俸三月乾隆三年議準八旗逃人居住衛所營汛地方該管官並不察拏别經發覺捕獲察其居住未過六月者免議已過六月者該管官降一級留任過一年者降二級調用倘知情容留居住不察拏者革職至兼轄官視其所屬二年内有一官失察逃人者罰俸一年二官失察逃人者降二級留任三官失察逃人者降二級調用統轄總兵官所屬二年内有一官失察逃人者罰俸九月二官失察逃人者罰俸一年三官失察逃人者降一級留任四官失察逃人者降二級留任五官失察逃人者降二級調用提督所屬二年内有四官以下失察逃人者皆罰俸六月五官以上失察逃人者降一級留任五年議準駐防逃人居住地方營汛官弁接到該旗及各衙門移㑹即差兵役協同拏獲者免議如不差兵役協拏以致脱逃察繫居住六月以内者將該員罰俸二年至失察居住過六月一年及知情容留仍照例分别議處一緝私順治年間定地方行使廢錢専汛官不察拏者一起降二級調用二起降四級調用至三起者革職康熙十七年題準大夥賣販私鹽至十人以上帶有軍噐専汛官徇縱不拏者革職兼轄官降二級調用失察者専汛官革職留任兼轄官降二級留任皆限一年緝拏獲半即準開復限滿不獲専汛官革任兼轄官降二級調用其本汛雖未拏獲經别汛全獲亦免議不全獲者仍照例議處又議準官弁一年内拏獲十人以上帶有軍噐大夥私鹽者一起紀録一次二起紀録二次三起加一級四起加二級至五起者不論俸滿即升兼轄官視其所屬一年内有拏獲三起者紀録一次六起紀録二次九起加一級再有多者照此遞加三十九年覆準私鹽拒捕能全獲者各官皆免議若夥黨衆多不能全獲或獲二三名及兵被殺傷専兼各官初叅免其處分限一年緝拏限滿不獲専汛官罰俸一年兼轄官罰俸六月統轄官罰俸三月鹽犯照案緝拏四十四年議準小夥販賣私鹽不及十人及十人以上不帶軍噐者專汛官失察一次降二級二次降四級皆留任至三次者革職兼轄官一次降一級二次降二級三次降三級皆留任至四次者降三級調用雍正三年議準地方私鑄錢及將制錢私燬専汛官知情者革職治罪失察者一起降三級調用二起革職兼轄官一起降一級二起降四級皆調用至三起者革職統轄官一起降一級二起降二級三起降三級皆調用至四起者革職提鎮一起降一級二起降二級三起降三級皆留任四起降四級調用至五起者革職如有從前失察今能拏獲不論年月逺近免議文職拏獲同城之武職並免議交界之所經别屬之員拏獲者亦免議其拏獲私鑄私燬不論本管及别屬地方一起紀録一次二起紀録二次三起紀録三次四起加一級又議準經紀舖戸將私錢販賣攙和行使不察拏之専汛官一起降三級調用二起革職兼轄官一起降二級留任二起降四級調用至三起者革職統轄官一起降一級二起降二級皆留任三起降三級調用至四起者革職提鎮一起罰俸一年二起降一級三起降二級皆留任四起降三級調用至五起者革職船戸夾帶私錢押船官知情者革職失察者降三級調用六年議準地方礦徒私自聚集該管官知情隐匿者革職平日失察及經發覺並不實力察拏以致全無捕獲者降三級調用獲不及半者降二級留任限一年緝拏全獲開復限滿僅獲半者降一級調用獲不及半者降二級調用未獲之犯交與接任官照案緝拏如一經發覺比即獲犯過半降一級留任餘犯限一年緝拏全獲開復限滿仍止獲過半者罰俸一年餘犯照案緝拏十年議準山東山西河南等省出産硝黄有結夥私行販賣者不論出産及經過地方失察之専汛官照失察小夥私鹽例議處船户夾帶者押船官照夾帶私鹽例議處乾隆六年奏準失察小夥私鹽降級留任各官限一年緝拏限滿無獲専汛官罰俸一年兼轄官罰俸六月各帶所降之級再限一年緝拏限滿無獲専汛官再罰俸一年兼轄官再罰俸六月各帶所降之級鹽犯照案緝拏十四年奏準天津阿城淮安儀徴等處原繫産鹽地方該督撫轉飭地方營汛官弁於糧船經過之時嚴行稽察舵丁水手應需食鹽毎船總不許出四十斤之外如不實力稽察以致舵丁水手夾帶過四十斤以外者運官照例議處該營汛官弁罰俸六月十六年議準各省武職官弁經上司委辦鹽務即有緝私疏引之責遇失察大小私鹽將承辦官照専汛例議處總辦官照兼轄例議處如拏獲大夥私鹽照所獲起數分别議叙一禁賭原定官員賭博及開場容留賭博者皆革職治罪雍正九年議準稽察屬官賭博専汛官責之兼轄官兼轄官責之統轄官如明知不揭叅者别經發覺將稽察官降三級調用若失察繫同城者降一級留任不同城者罰俸一年察出揭叅者免議又議準地方有製造賭具之家不察拏者專汛官革職兼轄官革職留任統轄官降一級留任若繫舊製賭具藏留在家専汛官在任半年不察拏者降一級調用又議準地方有製造賭具之家經官弁拏獲察繫新製未及半年者專汛官加二級兼轄官加一級統轄官紀録二次又議準地方有描畫紙牌之家不察拏者専汛官降二級調用兼轄官降二級留任統轄官罰俸一年若將描畫紙牌出境販賣販賣地方専汛官不察禁者罰俸三月拏獲之員照拏獲賭具例議叙又議準本汛有製造賭具之家經别處訪聞察拏本汛協同拏獲或本汛有製造賭具之人攜徃别處販賣經本汛訪聞察拏而彼處協同拏獲者此等協拏情由由拏獲之人申報該督撫察覈於疏内聲明皆免失察處分六年奏準専汛官失察民人賭博者毎案罰俸一月又奏準民人賭博専汛官能察拏及經同城文武官察拏者免議因公他出者亦免議又議準拏獲賭具之人隨本案議叙其該管兼轄統轄官統竢察明所屬一年内别無失察製造賭具及舊製賭具販賣賭具與失察賭博等事將所屬拏獲賭具之案於嵗終彚册報部分别起數議叙如所屬一年之内但有一案失察者將别案拏獲賭具槩不準議叙如屬官有失察等案該管兼轄統轄官皆察出揭叅者將揭叅之官仍按起數議叙倘兼轄統轄官因所屬拏獲賭具希圖議叙將該屬别案失察徇隐不報者降二級調用十一年議準官員拏獲賭具繫武職拏獲免同城文職處分文職拏獲免同城武職處分若經接壤鄰境拏獲其製造賭具地方之該管官繫失察未過半年者免議至並非接壤鄰境及失察已過半年者如曾經差人協拏免議未經差人協拏者仍照例議處又議準後任官拏獲造賣賭具之人其前任官如失察未及半年離任者免議失察已過半年者仍照例議處若將失察已過半年之前任官揑報未及半年改移日月代為掩飾者除將該員拏獲之案不準議叙外仍降一級調用未經察出之兼轄官罰俸一年統轄官罰俸六月能察出者免議至拏獲之後接任官到任半年以内因賭博發覺究出製造賭具或舊存牌版刷印不過半年即能拏獲者均準議叙其應議處議叙各官該督撫察明前後官到任離任日期均於題咨内聲明又議準官員將鄰境新製賭具未及半年之案協同拏獲者毎起紀録一次至四起者加一級同屬該管上司管轄者上司功過相抵不準議叙十二年議準失察賭博之專汛官於照例議處時將該員從前拏獲賭具議叙之加級紀録悉行注銷如該員已經數任後有失察賭博之案將前任内拏獲賭具議叙之加級紀録一并注銷其該管各上司除因所屬别員拏獲賭具議叙之加級紀録不必注銷外如因失察賭博之屬官從前拏獲賭具同案議叙之加級紀録亦悉行注銷若該員失察賭博時該上司先已離任或該員調任别省其失察之處已與原上司無渉所有該上司從前因該員議叙之加級紀録免其注銷至上司本身失察賭博仍將從前所有自行拏獲賭具議叙之加級紀録並因屬官拏獲賭具議叙之加級紀録悉行注銷其失察製造賭具舊製賭具並販賣賭具等案皆照此例十三年覆準拏獲賭具如繫舊製存留或雖新製而失察已過半年止免失察處分不準議叙倘將舊製存留賭具揑報新製及失察已過半年而揑報在半年以内者將揑報官降二級調用濫行轉報之兼轄官降一級調用不加詳察之統轄官罰俸一年至兼轄統轄各官能將揑報情由察出揭叅者其本案如兼轄統轄例應議叙即將揭叅之兼轄統轄官照例議叙如例不應議叙既能揭叅準免議處乾隆五年議準官員同城拏獲製造賭具者不分文武將首緝之人加二級協拏之人紀録二次首緝兼轄統轄官照例議叙協拏之兼轄統轄官不準議叙此等協拏情由拏獲之人申報督撫察覈於題咨内聲明分别議叙若並未協拏揑報協拏者革職扶同揑報之兼轄官降二級調用統轄官罰俸一年提鎮罰俸六月若兼轄官據詳轉報並非有心扶同者罰俸一年如地方有造賣賭具之人該専汛官漫無覺察經兼轄統轄官拏獲者將失察之人議處拏獲之人照例議叙九年議準拏獲賭具議叙不論文武毎案止準首緝一人協拏一人如有以三四人題請濫邀議叙者除不議叙外仍將題請官照例議處十四年奏準地方有製造賭具之家經營汛官弁於半年内拏獲者因其可以捜察銷燬㧞本清源自應照例優叙若繫拏獲經過販賣之賭具與拏獲製造者有間止將首緝之人加一級協拏之人紀録一次其該管兼轄統轄官於嵗終彚册報部察明所屬有議叙加一級者兼轄官紀録二次統轄官紀録一次廵防一海外廵防康熙二十八年議準水師總兵官不親身出洋督率官兵廵哨者照規避例革職四十三年覆準廣東沿海地方以千把總㑹哨副叅游毎月分廵總兵官於毎年春秋二季出洋總廵四十七年覆準江南蘇松狼山兩鎮各於本管洋面親身總廵毎嵗一輪將出洋回汛日期呈報該督提察覈又覆準浙江定海温州黄巖三鎮出洋總廵毎年定於二月初一日起至九月底止五十年諭朕於水陸兵丁年久深悉其情事船至海洋必竢風候若不候時不察風汛而欲强行必至兵船同損官兵皆繫朕歴年養育之人如遇有賊自應効死若無賊而徒以廵哨受傷實為可惜該總兵官須留意於此大加謹慎欽此五十一年議準海洋廵哨官弁盤獲形迹可疑之船如人數與執照不符並貨物與税單不符者限三日内稽察明白如繫賊船交與地方官審究果繫商船即速放行申報該上司存案如以賊船作為商船釋放或以商船作為賊船故意稽遲擾害者皆革職索取財物者革職提問該上司察出揭叅者免議如釋放賊船該上司失察者照失察諱盗例議處稽遲擾害商船該上司失察者照失察誣良為盗例議處五十三年覆準各營廵哨船刋刻某營某字某號舵工水手人等各給與腰牌備書姓名年貌籍貫又覆準山東與盛京對峙水師官兵各廵本管洋面金州之鐵山舊旅順新旅順海帽坨蛇山島並頭雙島虎坪島筩子溝天橋厰菊花島等處皆繫盛京所屬令該將軍委撥官兵廵哨北隍城島南隍城島欽島砣磯島黑山島廟島長山島小竹島大竹島至直𨽻交界武定營等處止並成山頭八家口之罘島崆峒島養馬島至江南交界等處止皆繫山東所屬令登州總兵官委撥官兵廵哨至鐵山與隍城島中間相隔一百八十餘里其中並無泊船之所自鐵山起九十里之内盛京官兵廵哨自隍城島起九十里之内山東官兵廵哨如遇失事各照地界題叅又覆準官弁駕船廵哨如船被賊焚刦者革職提問船仍著落賠補若實繫遭風擊碎該管上司察明出結詳報該督撫提鎮保題免其賠補動支錢糧修造倘有揑報情弊將該官弁革職提問濫出結之該上司革職保題之督撫提鎮降一級留任五十五年覆準福建水師提標五營澎湖水師二營臺灣水師三營分撥兵船各書本營旗號每月㑹哨一次彼此交旗為驗如由西路去者提標哨至澎湖交旗澎湖哨至臺灣交旗皆送臺灣鎮察驗由東路來者臺灣哨至澎湖交旗澎湖哨至廈門交旗皆送提督察驗如某月無旗交驗遇有失事照例題叅五十六年覆準福建臺澎兩協副將嵗率三船親身出洋總廵各本管洋面兩協游守分廵各本汛洋面海壇金門二鎮各分疆界為南北總廵毎嵗提標撥出十船以六船歸廵哨南洋總兵官調度四船歸廵哨北洋總兵官調度其臺澎二協副將金門海壇總兵官均於二月初一日起至九月底止期滿徹回至各營分廵官兵挨次更換如遇失事各照例題叅五十七年覆準廣東南澳屬閩粤交界瓊州孤懸海外南澳總兵官及瓊州水師副將各率營員専廵各本營洋面自南澳以西平海營以東分為東路以碣石鎮總兵官澄海協副將輪為總廵率領鎮協標員及海門逹濠平海各營員為分廵自大鵬營以西廣海寨以東分為中路以虎門香山二協副將輪為總廵率領二協營員及大鵬廣海各營員為分廵自春江協以西龍門協以東分為西路以春江龍門二協副將輪為總廵率領二協營員及電白呉川海安硇洲各營員為分廵共分為三路毎年分為兩班廵察如遇失事照例題叅雍正三年議準官弁出海廵哨如有洋面失事隐諱不報者該將軍督提訪實題叅革職四年題準直𨽻天津水師官兵於四月起至九月止駕船出洋廵哨八年議準福建浙江廵哨官兵船挨次兩月更換如風潮不順到汛愆期統竢陸續到汛交代具報該上司察覈遇有叅處之案憑報文内職名揭叅又議準各省沿海營汛原分水陸水師惟在大洋遊廵其陸路