body:
  text: 吏部稽勲清吏司守制終養附一旗員丁憂順治十八年題準奉差出征滿洲䝉古漢軍文官丁憂以囘京日守制康熙十二年題準在京滿洲䝉古漢軍丁憂者在家居䘮百日後即入署辦事其二十七月内遇朝㑹之期停其朝㑹竢服滿始令上朝在外滿洲䝉古漢軍文官丁憂者令其解任照漢官例以聞訃日為始不計閏守制二十七月又題準盛京守陵旗下文官暨吉林杭州江南西安京口等處駐防並各省督撫布按衙門筆帖式均照在京滿洲䝉古漢軍文官例守制又題準在京漢軍補授漢闕者照漢官一例離任守制乾隆二年諭在京八旗文武各官遇有親䘮例於持服百日之後即入署辦事原以旗員人少若令離任守制恐致誤公而伊等在二十七月之内仍各以私居持服以自盡其心惟是朝㑹祭祀之期或有執事或應陪祀之處仍皆一體行走未加分别俾盡孝思嗣後在京旗員有親䘮者二十七月之内凡遇朝㑹祭祀之禮應一槩免其行走欽此又奏準八旗文武官員遇有親䘮百日後仍令入署辦事照常支俸以資養贍其二十七月之内凡入朝進署一切公務及進至御前應用吉服時仍用吉服一切朝㑹祭祀之處皆免其執事再二十七月内除奉特旨升用人員其餘遇有升遷停其開列升轉至服滿後較俸之時仍準其算俸至八旗生監舉人進士二十七月内亦停其考試銓選竢服滿後始準銓選考試五年奏準八旗文職官員如有親䘮及服滿者令本人於親故聞訃及服滿之日即呈眀該叅佐領該旗覈實將見任筆帖式以上暨見在候補文職各官於每月三十日截限以前造册報部其事故在本月三十日以内未及册報者亦令於下月初五日以内報齊考試取中並各項候補筆帖式見在注册應用人員内於每月十五日截限以前造册報部其事故在本月十五日以内未及册報者亦令於本月二十日以内報齊其盛京陵寢等處暨駐防所屬文武旗員如有親䘮及服滿者亦令本人於親故聞訃及服滿之日即呈眀該管官其該管官於本人呈報之日限十日内出咨報部如丁憂服滿文職旗員不即呈報照丁憂呈報遲延例罰俸一年若本人已經呈眀該叅佐領暨各該管官轉報遲延皆交部分别議處一旗員外任丁憂康熙六十一年遵旨議準凡八旗丁憂官員照例即令該督撫速催進京若有錢糧不清者照例題叅其錢糧清楚者即令依限歸旗將該員起程日期報部注册仍取該旗都統印結報部乾隆元年奏準外任旗員呈報丁憂凡一切公務槩不準其差委於該員聞訃時詳眀督撫即行委官署理飭令交代清楚各按省分逺近計程定限給咨歸旗將該員聞訃暨起程日期咨部並咨該旗存案該員歸旗後以在任聞訃之日為始不計閏扣二十七月服滿咨部起復補用至該員未經丁憂先奉差委如實繫緊要公務聞訃後勢難别委接辦者令該督撫將縁由聲眀竢事竣後給咨歸旗亦準其以聞訃之日丁憂服滿起用若該員所辦差事可委員接辦者仍飭令交代清楚勒限歸旗其歸旗違限者該旗咨部按其遲延月日照領憑赴任例分别議處倘該員在任並無差委事件聞訃後希圗逗遛鑚營差委及所奉差事已經委員接受仍故意遲延不行交代者該督撫據實題叅照官員聞䘮仍行戀職例革職各該上司於聞訃之員不即催令歸旗復行差委及可以别委事件不勒令交代任其借端留滯者將差委之上司照濫委廢官例降一級調用十四年諭各部院八旗滿洲䝉古官員凡遇親䘮百日滿後仍在各本處行走其用於外任之滿洲䝉古官員遇有親喪照例丁憂離任囘京後亦令守制二十七月但滿洲䝉古不似漢人衆多且旗員亦不應聽其閒居不得當差嗣後外任滿洲䝉古官員丁憂至京已滿百日後著該旗引見或於該旗或扵部院朕酌量委用欽此十七年覆準八旗外任官員如有父母在本旗病故者令該家屬於五日内呈報該旗取具印結咨部具題開闕一内外漢官丁憂原例凡内外漢官丁憂承重者具文報部以聞訃之日為始不計閏二十七月如朦溷具報者丁憂官不準起補該管官罰俸六月一内外官員丁憂通例康熙五年題準内外官員丁憂皆開眀適親父母有無過繼及為祖父母承重者亦開眀是否適長孫有無伯父及伯父之子如疏咨結狀互異將溷呈出結代報官罰俸六月若咨結題疏内有一處開眀者免議準其守制九年議準官員丁憂即報該管上司旗下取該都統印結漢官取原籍印結其印結遲延或字様不符以致往返駮詰稽遲者罰俸六月或繫呈報之員不符或繫本旗本籍印結不符將不符之員議處又題準官員短䘮並聞伊父母祖父母䘮仍行戀職者革職不準援赦或假揑丁憂承重報上司者革職其丁憂未畢有出仕就考者與短䘮同又議準相繼丁憂各官不行申報並裁汰官員聞訃不報即行囘籍者皆於補官日罰俸一年若官員已報丁憂該管官不行轉報以致部内升選補授者將不行轉報之司道府州縣等官罸俸一年督撫罰俸六月如丁憂官未經呈報罪在本官地方官免議如本官已經呈報地方官未行轉報者罪在地方官本官免議如地方官已報上司上司遺漏不報者罪在上司地方官免議十四年議準見任官員聞䘮不報擅自離任者降二級調用雍正三年諭督撫丁憂者不得遽行送印其任内文卷擇司道一人代行聽候諭旨方行離任欽此十年覆準直隸各省地方等官無論有無軍需辦理如遇丁憂於聞訃日即行呈報上司仍令暫行視事該上司即委員速赴交代如委員未到準其素服視事若遇祭典朝賀皆委屬員代行竢委員到任後方準丁憂之員交印離任如該員已經呈報丁憂該上司不即行委員者罰俸六月如委員不即行赴任接受交代者罰俸一年乾隆二年覆準丁憂官員囘籍守制除因䘮事與人往來外如有親赴省城更易服色干謁地方官並送禮赴席者指名題叅將該員於補官日降三級調用十七年覆準見任各官其父母有在籍病故者該家屬取具鄰族甘結於五日内呈報本籍州縣該州縣加具印結於五日内徑詳督撫督撫分别題咨並即移咨任所知照該員令其離任仍將該員聞訃日期咨部扣算年限起復其在京各官有父母在原籍病故者向無督撫具題之例應令原籍督撫亦於定限内取具印結咨部由部分别題咨開闕至京外各官有本員聞訃日期在先各該督撫移咨在後者仍以本員聞訃日期咨部開闕一新選新補官員丁憂乾隆七年奏準凡新選新補内外官員在京聞訃及父母在京病故者皆取同鄉京官印結呈報丁憂準其守制仍行令原籍地方官出具印結報部一候補候選官員在籍丁憂康熈六年題準凡在籍官員丁憂令該地方官申報督撫督撫報部注册如有遲延不報者察叅一為人後者為其本生父母繼母治䘮康熈三年題準内外官員出繼為人後者遇本生父母之䘮自願囘籍治䘮者京官具呈到部具題外官督撫具題除路程外定限一年限滿起文赴補十二年題準官員為人後者遇本生繼母之䘮情願治䘮者亦照生母例準其給假乾隆二年覆準内外大小官員出繼為人後者遇本生父母之喪槩令囘籍治喪除路程外定限囘籍一年起文赴補在京各官取具同鄉京官印結中書以上等官呈部具題其餘各官呈部注册在外官取具原籍印結知縣以上督撫具題其餘各官咨部注册又在京候補候選在外試用等官遇有本生父母之䘮亦令取結具呈囘籍治䘮一年限滿起文赴部補用如有匿喪不報者照匿䘮例革職無䘮詐稱有䘮舊䘮詐稱新䘮規避者照揑䘮例革職一停止在任守制雍正十三年十月諭父母之恩昊天罔極而䘮禮以三年為斷者所以節仁人孝子之哀而使有所極也三年之䘮猶不能終則百行皆無其本矣魯公禽父衰絰而即戎孔子以為有為為之也古者諸侯之大夫士雖有既葬而服國事之禮然古之仕者不出其鄉殯殮皆親窀穸既營雖使絰而即事義尚可安也今之仕宦近者有數百千里含斂不知宅兆未卜而宴然扵官所情能自已乎往者道府以上要員間有督撫保題在任守制而特旨從之者其後遂習為故常並及州縣微員其中有平日督撫所親信而欲留者有竟自願留者有多方營求以得之者而不得者且用為恥夫事親孝故忠可移於君使其人本仁孝而強奪其情則儳然不能終日必至愴恍昏迷廢弛公事若以為安則忍戾貪冒之人也國家安所用之而所治士民亦安能服其政教乎自後必其地其任其事其時決不可少是人而無能相代者乃準保題以憑覈奪餘皆停止永著為例欽此一官員起復順治初年定凡起復官員在籍守制者服滿由該地方官起送康熙三年題準官員丁憂如不能囘籍依墓守制者服滿由寄居地方官起送九年題準地方官如將革職之官不詳察眀白給結起復者罰俸一年十二年題準在外滿洲漢軍丁憂官員服滿具呈該都統報部起復一服滿起文赴部程限原例在京一閱月直隸四閱月奉天同山東山西河南六閱月江南江西浙江湖廣陜西八閱月福建四川兩廣貴州十月雲南一年康熈元年題準官員服滿患病該巡撫布政使司即將本官患病情由取具地方官印結咨部注册若未經先咨者照違限例議處三年題準本官具呈之時該地方官即行咨部若遲延日期除水程外照咨文違限例分别議處如未呈報接任官不知情者免議又題準官員領文赴部中塗患病暨實繫因事遲誤者取具該地方印結免議九年議準凡服滿起復官員照地方逺近除路程外違限半年以上者免議違限一年以上者罰俸一年違限二年以上者休致一官員終養順治十三年題準凡内外官員有祖父母父母年老無伯叔兄弟者準其終養康熙三年題準父母年七十以上其子均出仕在外戶内别無次丁者或有兄弟篤病不能侍奉者或母老雖有兄弟而同父異母者皆準囘籍終養其父母年至八十以上雖家有次丁願歸養者亦聽京官具呈到部具題外官督撫代題仍取同鄉官印結督撫互相代題竢應補之日起文赴部補用七年題準漢軍外官亦照漢官例準其終養九年題準繼母亦準終養五十八年議準告假囘籍官員遇親老篤疾者地方官出具印結呈詳督撫保題到日許暫留在籍侍奉竢親病痊可給咨赴補雍正五年議準凡應補應選外官果有親老情願終養者於本省起文時即具呈該地方官轉詳咨部在籍終養若見任官員或父母衰疾迎養維艱詳請終養者該督撫察該員政務並無怠忽倉穀錢糧並無虧空取結具題準其囘籍終養再或從前家有次丁出仕之後兄弟忽遭事故無人侍奉者該督撫取具原籍地方官印結具題準其囘籍終養如兄弟别無事故親年雖老妄請終養者照規避例革職乾隆二年議準官員吿請終養該督撫察眀取具印結一面題咨一面飭令交代清楚即給咨準其囘籍不必守候部覆倘告終養之員有情雖可憫而與例不符者仍照舊例具題請旨聽候議覆遵行如有浮開年歳假揑事故借端規避者事發照規避例革職出結官照徇情例降二級調用五年議準滿洲䝉古在京文職旗員皆不準告請終養外其有補授外任旗闕如盛京五部司官筆帖式並陵寢官員奉天寧古塔黑龍江等將軍衙門以及吉林烏拉齊齊哈爾及驛站闗口官員筆帖式各省駐防將軍城守尉督撫随印筆帖式及理事同知通判其補授外任漢闕如督撫布按道府等官如遇祖父母父母年七十以上其子均出仕在外戶内别無次丁或有兄弟篤疾不能侍奉或母老雖有兄弟同父異母及父母至八十以上雖家有次丁而願請歸養者準其呈報該管上司題奏到日由部行令該旗出具確實印結報部準其照漢官一例終養凡察眀政務錢糧交代給咨以及應補等項均照漢官之例再滿洲䝉古候選候補外任旗闕者原無投供驗到之例吏部照伊等年月先後挨次選補如有情願呈請終養者亦照此例以上滿漢各官如有浮開年嵗假揑事故借端規避等情及出結官皆照漢官例議處十四年奉旨向例官員以親老改補近地者仍令坐補原闕所以杜規避也而告請終養之員未有坐補原闕之例夫父母年逾耆耋許令侍養乃國家錫類之令典然親年子所素知何必竢涖任後方行告請安知其非因見闕平常將來即可銓補他闕藉以自便其私是轉為巧於規避者開㨗徑矣嗣後官員親老與終養之例相符者於未得闕前許其呈請其已經銓選抵任者將來亦坐補原闕著為例欽此改籍更名復姓附一官員改籍順治年間定官員寄籍他省願改歸原籍者在京令本人取具同鄉官印結本部移咨該省轉飭地方官出具確實印結咨部在外令本人呈眀督撫取具地方官印結咨部見任京官中行評博以上外官知縣以上由部具題更改其餘見任及候選官員據咨注册如有假冒情弊察出將本人革職治罪出結官照代頂冒人員出結例革職一官員更名復姓康熈三年題準漢軍漢人見任官員在内中書行人評事博士在外知縣以上皆令具題其餘見任及候選官員均由部覈眀注册旗下取該都統印結漢人在京取同鄉京官印結在外具呈地方官咨部準其更復旗人移咨戶兵二部暨該都統漢人止咨戶部又題準督撫有更名復姓者許互相代題乾隆二年覆準官員出繼為人後者於起文赴部選補時即將本身三代姓氏存歿一并開列文内送部存案選補之後即行知照該省如有出仕之後始行出繼歸宗者即著該員取本旗籍印結詳報咨部改正三代倘於父母疾篤之時假揑出繼歸宗豫為匿䘮戀職地歩者一經發覺照匿䘮例革職不準援赦扶同出結之旗籍各官照徇情例降二級調用四年覆準官員復姓者除漢軍官員應聽該旗確實察眀移咨戶部辦理準其歸宗者移咨本部準其復姓外其旗員更名及見任官員呈請更名復姓事件在内中行評博在外知縣以上皆令具題其餘見任官員及候選官員均由部覈眀注册如有假冒等情將該員革職治罪出結官照代頂冒人員出結例革職一稽俸雍正七年覆準本部設立稽俸㕔凡滿洲䝉古漢軍文職各官及筆帖式等應給俸祿事件各官内有升任解任降俸罰俸之案均令稽俸㕔逐一注眀以憑察覈每年春秋二季給俸之時該㕔將各衙門及八旗都統所送彚册與存㕔底册覈對相符始移咨戶部按數支領十二年覆準在京各官領俸應令各衙門各旗将應行支領以及降罰等案分晰聲眀造具清漢册春季於十二月十五秋季於六月十五以前申送到部細加覈對移咨戶部闗支再在京各衙門漢官均照舊例以二月八月初七日為準如初七日以前有除授升遷及罣誤開復者準其補領病老告休物故革退者悉行裁扣若越初七日以後雖有除授升遷及罣誤開復之員一槩不準補領病老告休物故者亦不補裁革職之員仍行裁扣欽定大清㑹典則例卷二十九
