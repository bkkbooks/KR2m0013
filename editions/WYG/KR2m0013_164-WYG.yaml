body:
  text: 内務府會計司一設莊三旗皇莊園圃鑲黄旗大莊一百五十九所半莊五十九所園三十二所共地四千三百八十六頃正黄旗大莊一百四十六所半莊五十四所園二十九所共地四千一百二十三頃正白旗大莊一百五十三所半莊五十八所園三十九所共地四千二百七十九頃坐落順天永平天津保定宣化府所屬各州縣及喜峯口古北口外等處稻田莊共水田二十五頃十有五畝旱地二頃八十八畝坐落涿州房山玉田等州縣豆糧六莊計地四百九十二頃八十六畝坐落武清縣康熙八年題準將各莊編為一二三四等毎十年編一次九年奏準於附近莊頭内選四人於南苑安設四莊毎莊給地十有八頃十二年奏準南苑増置莊一所又奏準房山縣設稻田莊一所計水田二頃八十四畝玉田縣設稻田莊一所計水田六頃六十畝旱地一頃二十畝又奏準安設瓜園菜園除額給地外並予飬家口地一百二十畝牛四頭蒲簾一百二十五秫稭三千五百束均免差一年二十一年奏準涿州設稻田莊一所計水田七頃八十畝旱地一頃六十八畝二十三年奏準山海關外莊頭毎十年委本司官前徃編定等次又奏準暢春園内餘地及西厰二處種稻田一頃六畝令附近之莊頭壯丁毎年輪種給與石景山等處地十有一頃三十四畝四分以為耕種稻田之資三十四年奏準歸化城安設皇莊十有三所各給地十有八頃四十五年奏準捕牲烏喇地方於蜜户内簡選五人安設皇莊五所毎莊定壯丁十四名給以牛具令其開墾五十一年奏準豐臺安設菜園十有一所除給地外並予鑿井六口牛四頭房三間五十五年奏準盛京莊頭毎十年委本司官前徃編定等次五十七年奏準各州縣莊頭子弟内簡選十五人於駐馬口外彌陀山等處安設皇莊十有五所各給荒地十有八頃令其墾種六十年議準涿州入官稻田三頃令附近莊頭承種雍正元年奏準山海關外莊頭等次改令錦州副都統編審造册送府停止司官前徃三年奏準山海關外一等莊給地五十四頃二等五十一頃三等四十五頃四等三十九頃如有不足額者將各莊餘地補給其餘地畝令地方官召民耕種輸租户部六年奏準將豆稭七十二莊均改為半莊并入見有半莊共計半莊一百七十有一又議準向來各莊但有居住村名地畝數目未載四至令内務府司官㑹同户部及地方官逐一丈量各造四至清册三本分貯内務府户部直隸總督衙門以備察覈七年議準丈量口外莊頭等原額地畝並自墾地畝甚屬過多且不畫一將見在莊頭各給地三十九頃所餘之地共二千九十頃五十二畝按毎莊三十九頃之數於莊頭子弟及誠實壯丁内選五十三人増設莊五十三所又奏準將房山縣入官稻田七頃九十五畝増設莊一所又奏準關内三百二十二莊内定為一等五十七莊二等十有六莊三等三十八莊四等二百十有二莊口外一百三十八莊均定為一等十年奏準菜園附近無畦地可給者以旱地五畝抵畦地一畝合計給旱地九頃乾隆元年奉㫖盛京編審莊頭等次著内務府司官會該管官辦理二年奏準歸化城十有三莊墾地二千六百餘頃毎莊各給六十頃外尚餘地一千九百餘頃交地方官募民耕種輸租户部四年奏準菜園瓜園地亦照莊地丈量四至造册存案八年奏準自康熙二十三年編審等第以來凡地畝寛裕者皆已陸續升等加差若仍照例編等必至有名無實應停止十年編等之例十年奏準國初以來附京耕種地畝自二三十頃至四五十頃不等嗣後此等地畝如莊頭繫子孫弟兄及族人承種者不必議減外其欠糧或緣罪革退及絶户以異姓承種者均以十八頃為一分九頃為半分餘地足十八頃九頃者増設大莊半莊竒零不足數者交地方官召民耕種輸租户部十一年奏準專設暢春園西厰莊頭除舊給石景山地十有一頃三十四畝四分外將附近州縣入官地増給六頃六十五畝六分以足十八頃之額十三年議準瀛臺麥田毎年委附近莊頭一人辦理一徵輸康熙年間定房山縣稻田二頃八十四畝毎畝歲徵稻米三斗六升玉田縣稻田六頃六十畝毎畝歲徵稻米二斗四升旱地一頃二十畝毎畝徵糧四斗六升二合又奏準關内一二等莊歲輸大豬二或常用豬四三四等莊輸常用豬三十五年奏準投充豆糧莊地照銀莊例毎畝徵銀五分應納豆一斤斗毎斤斗合倉斗三斗六升抵銀二錢合計地一畝抵銀三分外餘銀二分折草一束共納豆三千二百二十五石草八萬一千九百四十六束各有竒又奏準豆稭莊七十二所納糧額數減糧莊之半納廐豆稭酌量匀攤毎豆稭十有六束束重七斤抵糧一斗八升外納秫稭百二十束束重十有五斤又奏準凡御馬日給豆二升五合九勺草十六七斤不等駑馬日給豆二升五合八勺草十有一斤毎年自九月十五日入莊至次年四月初一日出青合飬馬日期按莊頭等次分撥其豆準於額糧内抵除養什木騸馬二羣毎年冬季毎羣額給豆三百六十石騍馬六羣額給豆三百二十四石毎豆一石抵糧一石牧馬人役毎羣歲給糧二十一石六斗三旗應差馬一百五十匹毎馬日給豆五升四合毎年額給一百八十日出差倒斃按日扣除均於莊頭糧額内撥給大凌河騸馬十羣毎年冬季毎羣額給豆九百十有四石四斗榖草三萬束羊草七萬四千束騍馬三十羣額給豆四百五十三石六斗榖草一萬八千束羊草六萬束十八年奉㫖應交各廐黑豆著將黑豆倉米各交一半二十一年議準盛京糧莊所納糧米給與三旗人丁口糧外餘於該莊作窖收貯又奏準涿州稻田旱地徵輸額數與玉田縣同科三十年奏準各莊頭收存之糧覈明實數或十莊或五莊收聚一處擇殷實之莊作窖收貯三十四年奏準歸化城十三莊毎莊歲徵米二百石由歸化城都統徵收貯本處旗倉四十五年奏準捕牲烏喇五莊歲納糧八百四十斤石八斗毎斤石合倉石三石六斗令該處總管徵收貯倉備用其出入數目仍令報府五十年奏準各莊交倉額糧送廐草豆毎年委司官一人催長二人監視交送如有不收本色勒索遲延者準其呈堂察叅若狥庇不舉監視官一并議處五十一年奏準一等莊歲納糧二百五十石二等二百二十石三等一百九十石四等一百二十石均毎石折米五斗半分莊歲納糧六十石榖草千束束重七斤秫稭一百四十束束重十有五斤又奏準盛京一等糧莊歲納糧三百二十二石二等二百九十二石三等二百六十二石四等一百九十二石又奏準山海關外糧莊分四等納糧與盛京同科外不論等次毎莊各納雜糧二十九石一斗六升於額糧内抵除雍正元年奏準關内莊頭交納之豬足用關外莊免其納豬又奏準減御馬一羣駑馬五羣並減御馬草照駑馬例日給十有一斤共減草六十六萬千一百四十二束令莊頭等減半額定三十三萬五百七十一束交送各廐毎年自九月十五日起至次年三月三十日止合計日期將所需草豆並節省交廐草豆數目通算於莊頭内酌量逺近按等次分撥其居處窵逺難以飬馬者全交草豆餘按分定日期牧飬又奏準口内糧莊納糧毎石折銀五錢分東西二路委官二人徴收二年題準口外莊頭交倉所餘之糧毎粗糧二石折米一石令運至熱河等處貯倉毎運米十石抵除陳糧一石毎年委府屬官一人徵收三年奏準盛京及關外各莊不論等次歲輸鵞一又奏準辦造祭神糕餈應用紅黏榖令各莊豫進數升呈樣本司官㑹同内管領司爼官等驗看將佳者選出二十莊毎莊令納二十九石五斗二升再皇子分封後一年内府第祭神應用紅黏榖别選二莊所納之數同以上均於額徵雜糧抵除至應用白黏榖亦豫進數升呈司爼官驗定佳者選出六莊各納榖三斗六升毎年八月祭神令朝陽門外及房山縣莊頭各一人各交蘇子二斗白小豆二升紅黏榖三斗六升又奉先殿薦新及内廷進鮮應用大黄米粟米糜米粱米大麥米均令朝陽門外莊頭八人交進又奏準關内莊不論等次各歲納秫稭二百二十三束又奏準關内莊頭交倉所餘之糧委官折銀催交廣儲司口外莊頭米糧運交熱河倉六年奏準駐馬口外彌陀山等處十有五莊毎莊歲納米二百倉石由右衞將軍徵收貯該處旗倉又奏準豆糧六莊其地一百十有六頃六十四畝者歲納豆五百二十二石三斗六升地八十七頃三十二畝及八十七頃三十一畝者均納豆三百八十六石九斗六升四合地七十三頃七十三畝者納豆三百二十八石九斗三升二合地六十四頃六十六畝者納豆三百九石五斗六升四合地六十四頃三十三畝者納豆二百九十石二斗三升二合均以倉斗計算又奏準餧飬駑馬小馬駝驢驘停給倉米照倉米數目折給黒豆其御馬内馬仗馬皆肥馬減去倉米一半亦按減去數目折給黑豆又奏準盛京累年所徵額糧存貯二萬石備用外餘交地方官減價平糶將銀貯庫其銀糧數目報府察覈七年議準官三倉所用雜糧停其交納關内一二等糧莊毎莊納銀六十八兩八錢三四等莊納銀六十兩二錢口外糧莊毎莊納銀四十一兩二錢八分各令徵收官徵交廣儲司庫又奏準關内毎莊額徵秫稭二百二十三束各折銀六兩八錢八分又議準入官稻田七頃九十五畝毎畝額徵稻米二斗四升八年奏準山海關外應徵租糧毎石折銀二錢令該副都統徵收交廣儲司庫十年議準口外租糧交熱河總管令直年官分二次徵收粗糧折米貯倉雜糧折銀交廣儲司庫十二年議準各廐圏毎黒豆一石四斗四升倉米二石一斗六升均隨煤四十五斤炭四斤八兩將半分莊頭額納秫稭以煤七斤八兩炭十有二兩抵秫稭一束令各莊均匀輸納又議準上駟院慶豐司各廐圏所用羊草令各該處將需用數目咨南苑領取十三年奏準車駕廵幸沿塗莊頭交納尚膳房雞子毎箇作銀一分於折色銀内抵除其慶豐司隨徃乳牛上駟院駕車驘沿塗交納草豆於額糧内抵除關内糧莊不論等次毎莊歲輸廣儲司紅花八兩内管領掃箒二十笤箒三十瓢十有九芥子一斗蓼芽菜子一斤其鷹鷂房所用飄翎花爆作所用麻稭造佛處所用麥䴬廣儲司所用麥稭均準各該處來文分交各莊輪流輸納營造司等處所用稻草亦準來文令稻田莊交納關外莊不論等次毎莊歲輸茜草五十斤線麻十有八斤小根菜蒥蒿菜各十有六斤黄花菜十斤又奏準南苑牧飬之騍馬一千六百餘匹並送大凌河分撥各羣毎羣冬季増給豆五十石榖草三千八十束羊草萬一千五百二十束豆於額糧内撥給草交各莊交納不準抵糧上駟院馬廐十有七驘廐一毎廐日給鐙油一斤慶豐司所屬内三牛圏毎圏歲給油一百二十斤南苑三牛圏毎圏歲給油六十斤乳潼牛圏歲給油五十斤均按關内莊等次分令交納乾隆三年奏準盛京莊頭窖貯米糧定為三萬石毎年除支給内管領下人丁口糧外將用剩新糧易出陳糧照時價出糶銀交盛京户部四年奏準一應關繫錢糧之事歲委員外郎二人專司又奏準關外各莊歲輸茜草毎斤折銀七分令該副都統徵交廣儲司庫又奏準關内各莊改折秫稭銀由司徵收交廣儲司庫五年奏準各莊毎年減納豬一口舊欠者按價折銀交廣儲司庫六年議準於盛京窖貯糧三萬石内撥出萬石貯奉天府倉毎年將交到辛者庫人即内管領下食月米人等新糧易陳糧支給又奏準凡遇車駕廵幸用過各莊榖草毎束作銀一分一釐於折色銀内抵除十七年奏準將營造司所屬開平居住交納缸盆莊頭一名並原給官地九頃有竒改隸本司作為半分莊頭一徵輸考成康熙二十四年奏準各莊糧均有定額不得溢徵應徵者亦不準免又議準山海關内糧莊於額外多