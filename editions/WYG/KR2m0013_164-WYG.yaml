督催所有未完錢糧歸入次年奏銷按限催追完報如一年應徵錢糧全完者承辦官紀錄一次催長領催記名升轉如應徵錢糧三年全完者官加一級催長領催以應升列名升轉十三年議準一年錢糧全完者承催官照例紀錄一次外其連三年全完者停其加級只準紀錄一次至六年全完者準加一級乾隆二年奏準催徵莊頭投充人等應交銀草停止委官前往徵收均令該屯領催催齊彙交如有拖欠者該屯領催從重治罪如三年内並無拖欠者該屯領催給以九品頂帶以示鼓勵四年奉㫖莊頭人等應交錢糧前因委官往屯催徵恐擾累莊頭人等是以停止委官今思若秪令領催等前往率屯領催催徵伊等夥同滋生弊端更覺擾累莊頭人等著仍照前委官催徵遵㫖議準莊頭投充人等有拖欠錢糧者將應徵錢糧分為十分欠一分者枷二十日鞭四十欠二分者枷四十日鞭六十欠三分者枷兩月鞭八十欠四分至五分者枷三月鞭一百皆不革退按分治罪所欠錢糧不準寛免入於次年應徵數内一并嚴追欠六分至七分者枷一月鞭四十欠八分至九分者枷四十日鞭六十欠十分者枷兩月鞭八十皆革退所欠錢糧準其豁免九年議準暫交各州縣召民承種地畝毎年應徵錢糧地方官有追催不力以致拖欠者於毎年覈銷時按未完分數造具清册移咨該督將該州縣職名咨送吏部察議十年題準拖欠差務錢糧至八分九分之莊頭原定枷四十日鞭六十者改為枷兩月鞭八十至十分之枷兩月鞭八十者改為枷三月鞭一百仍照定例自六分至十分者皆革退莊頭充為壯丁其所欠仍予豁免一編審康熙十六年奏準毎三年一次將該處官員列名具奏除委數人察比莊頭投充人等編造丁册二本一咨户部一貯本處又奏準莊頭投充人子弟編入丁册内如有逃亡者咨刑部轉行該地方官緝捕六十一年奏準莊頭投充人子弟有情願考試者準其考試乾隆五年議準累年比丁册内若無伊祖父姓名者不準入册如有揑稱妄入丁册爭控地畝者交慎刑司治罪一勘災雍正二年奏準納銀莊頭投充人等呈報旱澇委官察勘確實若繫莊頭按地毎畝免徵銀一錢一分一釐若投充人按地毎畝免徵銀三分草一束如揑報五頃以下者鞭八十十頃以下者鞭一百二十頃以下者鞭八十枷一月全行揑報者鞭一百枷兩月十一年奏準莊頭投充人等地畝如遇旱澇一面呈報地方官一面呈報本處該管官呈堂奏委官㑹同地方官履畝詳察分數取具該地方官印結到日分晰具奏照例豁免乾隆十一年奏準嗣後莊頭人等偶遇旱澇停其委除司官察勘即令莊頭人等將被災地畝坐落頃畝數目一面呈府存案一面呈報該地方官詳報附近大員委鄰近州縣及時監同履畝察勘按其被災分數詳報該督取具地方官及委官並無隱漏揑報印甘各結陸續咨府與原報數目詳加覈對如果相符其應免差務應給口糧即照例辦理統竢該督咨到彙齊具題倘有揑報及與原册不符照例治罪如地方官或有隱漏虛報附近大員揭報該督題叅一奏銷毎年徵收銀草數目並用過餘存銀草實數均於次年歲終具題乾隆二年奏準毎年應徵銀草定於十一月内完納將一年舊管新收開除實在數目於十二月内呈堂具題欽定大清㑹典則例卷一百六十
