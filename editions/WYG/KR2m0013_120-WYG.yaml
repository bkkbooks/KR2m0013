body:
  text: 兵部職方清吏司公式一八旗綠旗通例一通例順治年間定官員犯笞杖等罪分别公私定議公罪笞一十者罰俸一月二十者罰俸两月三十者罰俸三月四十者罰俸六月五十者罰俸九月杖六十者罰俸一年七十者降一級八十者降二級九十者降三級皆留任杖一百者降四級調用私罪笞一十者罰俸两月二十者罰俸三月三十者罰俸六月四十者罰俸九月五十者罰俸一年杖六十者降一級七十者降二級八十者降三級九十者降四級皆調用杖一百者革職又定武職各官有應降一級者準以加一級或紀錄四次抵銷罰俸一年者以紀錄二次抵銷罰俸半年者以紀錄一次抵銷又定老病休致武職各官任内有承督未完之案令接任官完結者本官已經休致免議若有侵那貪酷營私等弊仍照例處分又定武職各官有承督之案初叅援赦免議限期又滿仍未完結復叅者均以赦後起限仍作初叅處分又定武職各官經上司糾叅之後乃将上司列款訐首者将訐首之事不準行仍照例處分又定營員議處察明何繫專管何繫兼轄統轄照例議處若處分止稱該管官者止将專管官議處不及兼轄統轄官又定武職戴罪圖功者或别立軍功或将原案盗賊全獲或遇恩赦均準開復若三年内原案盗賊獲半地方寧謐者亦準開復如續有議降之案以後議之日計算三年無過開復其議處之時例應戴罪圖功者該員如有軍功加級紀錄及薦舉者準其抵銷免戴罪圖功又定旗員緣事有降級留任者按所降幾級即降俸幾級應降級調用者各按品級遞降世爵緣事應降級留任者亦按所降幾級即降俸幾級應降級調用者毎一級罰半俸三年二級罰半俸六年降級多者照此遞加竢罰俸扣完之日再行升轉若世爵兼有文武職任所犯由職任得者不論世爵大小皆就職任議處不由職任得者世爵大就世爵議處職任大就職任議處又定旗員叅領以下及領催人等於本任内應辦之事果能奮勉例應議敘者由部将鈐印號紙分發各旗都統遇有應行紀錄者即於號紙内書明事蹟用旗印鈐蓋給與該員收執於歲終彚奏若奉特旨賞給紀錄或由部議敘紀錄亦於歲終彚奏造册咨部存案紀錄積至四次者準作加一級又定武職各官緣事降級留任及降級照舊管事者三年無過開復革職留任者四年無過開復其降級留任者三年内復有降級留任之案以後降之日為始計滿三年開復革職留任者四年内復有革職留任之案以後革之日為始計至四年開復康熙十一年議準武職大員将曾經奉旨永不敘用之人私用為官者革職至叅官有不書名者将掲報具題官各罰俸六月二十三年覆準武職各官有議處之案到部或專本題準或彚本題覆宜分别辦理以昭畫一如盗案錢糧處分例應革職降調者逐案專本題覆若例止降俸降職降革留任罰俸戴罪督催等項入半月彚本題覆其錢糧案内如馬政驛站之類有造報違限並分数未完之文職經督撫題叅到部者本部無庸具題将該督撫所叅違限月日及未完分數移咨吏部議處至本部應入彚題之案繫本月内到者於次月内兩次彚題完結其中或情節未明應駮詰者即具槀咨察竢覆到日再議又覆準見任千總把總及功加効用各官有病故及老疾告退者皆先行報部将原劄繳銷於年終彚題若續有議處之案覈明應免議者準其免議二十六年議準旗員本身出征因軍功所得世爵若犯賭博宿娼枷責以上罪者即議黜革雖有襲次不準承襲其餘所犯之罪應黜革者免其黜革永停半俸竢身故後仍準子孫按次承襲支食全俸若本身効力随衆所得世爵緣事應黜革者即議黜革雖有襲次不準承襲至父祖所得世爵承襲之子孫緣事應黜革者即議黜革察明應襲之人承襲三十九年議準提鎮闗繫重大緊要之事例應議處者仍照定例議處至裁汰戀職未經察出遲延開復與丁憂違限未經咨報及一應無闗緊要之事並定例内未經開載應比照督撫之例罰俸一月至六月者皆免議處四十二年議準官員已經革職有前任之事到部議處必将應降應革分晰題明注册不得止以毋庸再議一槩抹銷倘革職之案辯明開復仍将前任之事逐一察明如有應革之罪不得即與開復有應降級者即照原官議降有應罰俸者議於補官日罰俸又議準已經革職各官除重大事情仍照例議處題明注册外其餘原任内所有事故皆免議處又覆準内外武職大員如有亷能屬官屈為貪劣題叅審明涉虚将原誣掲官降二級調用具題官降一級調用又覆準升任降調裁汰給假丁憂解任武職各官如遇原任之事有應罰俸者升任官於新任内罰降調官於降補任内罰裁汰給假丁憂解任官於補官日罰至初任官有應罰俸者於到任日罰又題準将軍都統貪婪副都統不據實叅奏副都統貪婪将軍都統不據實叅奏提督貪婪總督不據實叅奏總兵官貪婪提督不據實叅奏發覺審實之日無論同城不同城皆降三級調用又覆準綠旗武職該管上司将屬官經管事務並在任月日錯誤開報以致本官革職者将開報上司降二級調用督撫提鎮降一級留任降級者将開報上司降一級調用督撫提鎮罰俸一年罰俸者将開報上司罰俸六月督撫提鎮罰俸三月如将不應叅之官開報誤叅未經處分經部察出改正繫革職降調将開報上司罰俸一年督撫提鎮罰俸六月繫虚革虚降住俸罰俸者将開報上司罰俸六月督撫提鎮罰俸三月雍正元年議準千總把總經督撫提鎮以廵防懶惰盗劫頻聞及營伍廢弛私離汛地咨革者雖遇赦免罪仍行革職又覆準武職各官以暴虐被叅者遇赦雖免革職仍勒令休致三年覆準武職各官原任内有承督未完之案應議降俸降級革職及罰俸三月六月九月仍令承督者未滿年限之先或别案降調離任或升遷離任或報題升轉離任皆以罰俸一年議結若奉特旨升調原任内承督未完之案應議降俸降級革職者仍照離任官例罰俸一年完結如止應罰俸三月六月九月者皆各照依原任處分議結又議準武職各官升任後除原任内所有軍功加級準其隨帶外其曾經奉旨賞給隨帶之級及議敘並捐納所加之級原有隨帶字様者仍準隨帶其餘均改為紀錄一次至對品調補及品級相同改補者所有一應加級均準隨帶又議準八旗文武官兼世爵佐領有犯貪汚行止不端革職者不論何任事發所兼之官悉行議革其應襲之世爵佐領該旗将應襲之人奏請承襲若因溺職革職者将佐領并所兼文武之職議革其世爵應否存留該旗具奏請旨至奉特旨革職由武職内獲罪者其所兼文職應去應留該部院等衙門具奏請旨所兼世爵該旗具奏請旨由文職獲罪者其所兼武職應去應留該旗具奏請旨若不兼文職止由武職獲罪者其所兼世爵應去應留該旗具奏請旨其因公罣誤止於革職者由文職罣誤革文職仍留所兼武職及世爵由武職罣誤革武職仍留所兼文職及世爵若不兼文職止以武職兼世爵者由武職罣誤革武職仍留世爵因公罣誤降級調用者於何職議處即由何職降調革職留任者於何任議處即停何任之俸若所剰世爵尚有餘俸仍行給與再由世爵佐領簡選之侍衛因家貧不能行走經領侍衛内大臣奏退侍衛者囘旗仍在世爵佐領上行走若因怠惰規避行止不端叅革者将世爵佐領悉行議革該旗察明應襲之人奏請承襲四年議準武職各官有降級留任革職留任者計滿三年四年無過在京旗員二品以上在外将軍都統副都統及綠旗提督總兵官自行奏明準其開復旗員大小世爵及叅領協領以下綠旗副将以下等官由該管大員詳察咨部題請開復倘不覈明該員降罰情由遽請開復者罰俸六月有轉詳官者将轉詳官罰俸一年如該管大員将該員降罰之案不行聲明遽請開復者罰俸一年至本人已經呈請開復該上司不為轉詳者罰俸一年已經轉詳該管大員不為請開復者罰俸六月若本人隐瞞已身降罰事故遽請開復者罰俸一年至旗員如總管城守尉等官無大員統轄者自行呈部由部題請開復五年諭官員先叅婪贓革職提問者原因婪贓被叅故革職以便審訊如審無婪贓其罪不至於革職自應準其開復倘因已經革職遂謂無庸議未免寃抑嗣後凡被叅革職訊問之員審繫無罪者皆著以開復定擬不得稱已經革職無庸議将此永為定例欽此又奉旨嗣後停俸降級革職留任之人奉特旨升補者将停俸降級革職留任之處覈明奏聞又覆準在籍武舉並候選衛所千總等微員有把持公務武斷鄉曲一切犯法之事例應革職審問者該督撫咨部斥革彚題如審繫無辜咨部彚題開復若在籍微員有犯法之事不行懲治将地方官照徇庇劣員例議處至該微員本無劣蹟而地方官挾嫌揑款掲報者将地方官照揑報劣員例議處六年奉旨嗣後降調革職留任之員再有降革處分朕復加恩寛免留任者将後案注册竢前案開復再将後案計至三年無過準予開復其有數案處分者計案遞加永著為例又議準八旗所屬各官貪婪該管官不據實詳掲經将軍都統副都統題叅審實之日繫知情者無論同城不同城将該管官降三級調用統轄官降二級調用失察者同城之該管官降一級留任統轄官罰俸一年不同城百里以内者該管官罰俸一年統轄官罰俸九月百里以外者該管官罰俸九月統轄官罰俸六月在京巡捕營不詳掲屬官貪婪者照此例行直省副将叅将至千總把總貪婪該管官不據實詳掲經督撫提鎮題叅審實之日繫知情者無論同城不同城将親標該管官降三級調用統轄官降二級調用失察者同城之親標該管官降一級留任統轄官罰俸一年不同城在百里以内者親標該管官罰俸一年統轄官罰俸九月百里以外者親標該管官罰俸九月統轄官罰俸六月衛所各官不詳掲屬官貪劣者照此例行如統轄官将貪劣屬員申報将軍都統副都統督撫提鎮該管官不詳掲或該管官申報統轄官統轄官不申報将軍都統副都統督撫提鎮或該管官申報将軍都統副都統督撫提鎮竟不申報統轄官者亦照此例分别議處其不同城各官於疏内将里數聲明以慿察議倘里數聲明失實将轉詳官照徇情例議處至貪婪之處該管上司正在訪察而将軍都統副都統督撫提鎮先已發覺即行詳掲者該管上司止照失察例議處再題叅貪劣屬員不将未經詳掲之該管各官附叅者罰俸一年署印官不詳掲貪劣屬官者如任事不及一月免議一月以上與實授官一例議處至科道糾叅貪劣官款蹟審實之日将不詳掲之該管統轄各官分别議處不題叅之将軍都統副都統督撫提鎮皆照統轄官議處又議準将軍都統副都統督撫提鎮等聞有貪劣屬員行令該管官訪察該管官不即速申覆或洩漏風聲以致貪劣官自盡潛逃者将該管官罰俸一年其自盡者如有威逼致死情由審實有確據者将威逼之官革職提問至屬員互相訐告該管官不行詳報及經将軍都統副都統督撫提鎮知覺行令訪察又復詳報遲誤或将軍都統副都統督撫提鎮訪察屬員優劣該管官不速申覆者皆罰俸一年若該管官未奉将軍都統副都統督撫提鎮明文即将屬員拘拏羈禁者革職又議準武職各官裁汰告假丁憂者補仕後準接算前俸所有原任即升加級紀錄準其隨帶緣事應降應革遇有恩赦免議及本案審虚開復或奉旨以原叅之案本屬寃抑復還原職者均準接算前俸所有即升加級紀錄亦準隨帶如並非本案開復及業經緣事降革奉旨起用者不準接算前俸所有即升加級紀錄不準隨帶又議準八旗老病休致各官原任内所有加級紀錄仍行注册後遇議處準其抵銷