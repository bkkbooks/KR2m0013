職如議處之人甫經任事尚未定其賢否該管官将甫經任事之處聲明報部於議覆本内議以暫行留任仍令該管官試看一年如能供職報部注册於奉文試看之日扣限起至三年無過開復如不能供職該管官即行叅革此等微員於分别去留具題之後交與都察院堂官秉公驗看若去留允當即具摺奏聞若将應去者議留應留者議去或内有人才可用或在行間曾出格効力者都察院将情由聲明引見至外省駐防驍騎校以下微員無級可降者該管官於題咨之日即将該員居官如何之處於文内聲明由部覆覈将應去應留之處敘入議覆本内請旨其有未将該員居官如何之處聲明者由部咨察該管官竢出具考語到日将該管官所出考語及應去應留之處附入彚題請旨以上京外八旗無級可降微員如一案内降調過於三級者即行革職不準留任或已經革職留任未經開復又復别案降調即行革任如遇降級留任之案仍準留任逐案開復至綠旗七品武職乃無級可降之員如緣事應降級留任者仍議以降級留任三年無過開復若承督等案於事完之日開復若有數案仍逐案開復應降級調用者該督撫提鎮於題咨之日即将該員居官如何之處於文内聲明由部覆覈若該員降調之案在三級以内於議覆本内将居官好者議以革職留任三年無過開復平常者議以無級可降革職如議處之人甫經任事尚未定其賢否該督撫提鎮等将甫經到任之處聲明報部於議覆本内議以暫行留任仍令該督撫提鎮等試看一年如能供職報部注册於奉文試看之日扣限起至三年無過開復如不能供職該督撫提鎮等即行叅革其有題咨文内未将該員居官如何之處聲明者由部咨察該督撫提鎮等竢出具考語到日将應革應留之處附入彙題請旨至一案内所降調之級過於三級者即行革職不準留任或已經革職留任未經開復又遇别案降調即行革任如遇降級留任之案仍準其留任逐案開復其千總雖繫六品遇有降二級調用之案準照七品官之例行乾隆元年奉旨嗣後侍衛等差使遇有議處著領侍衛内大臣即行議奏三年議準旗員五品以上者遇有降革罰俸之案該管官題叅送部其一切因人連累等事該管官咨叅送部繫降調革職者專本題覆繫虚革虚降罰俸者入於半月彚題完結至六品以下等官降革罰俸之案均令咨部議處入於彚題完結四年議準内外旗員遇有罰俸之案除原有紀錄準其抵銷外若任内有議敘加級願改為紀錄抵銷罰俸者準其呈明毎級改為紀錄四次遇有罰俸之案照數抵銷其抵銷所剰紀錄於升任時覈明繫隨帶之級所改者仍準隨帶不繫隨帶之級所改者改後抵銷過一二次或三次者槩行注銷若所改紀錄並未抵銷罰俸升任時準以紀錄一次帶於新任其餘一應加級不準改抵又議準在京旗員三品至五品因公降革如任内無錢糧不清及治罪之案者該管大員将該員降革原案咨送都察院察覈實屬因公者咨囘該處由該管大員出具切實考語引見請旨非繫因公者無庸引見其外省駐防降級調用官由該将軍都統副都統等察明該員降調原案咨送在京該旗轉咨都察院察覈實繫因公者行文該處将該員出具考語咨送來京引見非繫因公者仍案所降之級候補駐防革職官除已經在外留飬者無庸議外如已經歸旗亦照在京旗員之例辦理直省副将以至守備因公降調者竢交代清楚後該督撫提鎮出具切實考語給文赴部由部将該員原叅之案咨送都察院察覈實繫因公者由部将該督撫提鎮所出考語並都察院察覈緣由聲明引見請旨非繫因公者照例候補至巡捕營叅将游繫守備遇有因公降革無錢糧不清及治罪之案者該統領将該員降革原案咨送都察院察覈實繫因公者由該統領出具考語引見請旨非繫因公者降調人員該統領咨部候補革職者令其囘籍又議準一事之内有两罪名者不必重科惟案罪名大者議處至事非一案或一時同發或先後並發仍逐案議處又議凖檢舉處分例内定有專條者仍照例遵行外其並無明文者在京八旗副都統以上在外将軍都統副都統及提督總兵官所辦事務始初無心錯誤或繫失察後經察出檢舉由部将照例處分及應否寛免之處两議請旨其餘在京八旗叅領巡捕營叅将以下在外協領及副将以下無心錯誤自行檢舉者各按應得處分减等如例應革職者議以革職留任應革職留任者議以降四級留任應降級調用者議以降一級留任應降級留任者議以罰俸一年應罰俸一年者議以罰俸六月應罰俸六月者議以罰俸三月應罰俸三月者免議本人既以檢舉减等其該管上司均免失察處分倘所犯之事繫有意營私别經發覺希圖减等倒提月日及斷罪失入已行論决者雖自行檢舉不準減等又奏準在京巡捕營武職各官如有議敘加級願改為紀錄抵銷罰俸者呈該統領咨部毎級改為紀錄四次遇有罰俸之案照數抵銷其抵銷所剰紀錄於升任時覈明繫隨帶之級所改者仍準隨帶不繫隨帶之級所改者改後抵銷過一二次或三次者槩行注銷若所改紀錄並未抵銷罰俸升任時準以紀錄一次帶於新任其餘一應加級不準改抵又奏準武職各官有一人而加數級者遇有處分按其加級年月先後依次抵銷又議準候補候選及議處之武職人員内如有應行呈明情節赴部具呈聽候批示辦理具呈一次之後復行揑辭妄瀆者槩不收錄倘實屬寃抑自赴都察院具呈有應行準理者由都察院調取原案詳考定例如實屬舛錯奏請更正若部内辦理未協将堂司官奏請察議有營私受託等弊都察院即行察叅五年議準八旗印房總辦俸餉及各叅領總辦事務一年内並無遺漏逾限者将承辦官各紀錄一次各佐領下事務三年内並無遺漏逾限者将佐領驍騎校各紀錄一次領催族長應給紀錄者注册咨部備案竢得官之日給與未得官之日遇有過誤将注册之紀錄抵銷其應給紀錄者該都統将紀錄號紙給發於年終奏聞咨部注册又奏準武職降級留任各官三年内遇有罰俸者如将所罰之俸繳完及按季扣完者免其扣除罰俸年限計滿三年開復革職留任各官四年内遇有罰俸者如将所罰之俸繳完亦免其扣除罰俸年限計滿四年開復如降革留任之員罰俸未經全完者各按完過銀數免其扣除罰俸月日若全未繳完扣完皆将罰俸月日扣除計滿年限開復六年奏準八旗武職該管上司将所屬官員經管事件並月日不行察明謊開以致本官革職者将申報上司降一級調用将軍都統等降一級留任如本官降級者将申報上司降一級留任将軍都統等罰俸九月本官罰俸者将申報上司罰俸六月将軍都統罰俸三月如将不應叅之官誤報題叅未經處分經部察出若繫革職降級事件将申報上司罰俸一年将軍都統等罰俸六月若繫虚降虚革及住俸罰俸事件将申報上司罰俸六月将軍都統等罰俸三月又議準王公所屬六品以下官原繫咨部補授如有過犯照例咨革至五品以上官有應革者該王公據實叅奏交部察議入於半月彚題完結又議準外省駐防官有應議處之案如例無專條者繫将軍都統副都統照在京都統副都統例定議總管副管翼領城守尉協領叅領防守尉照在京叅領例定議佐領防禦驍騎校照在京佐領驍騎校例定議其在京副叅領步軍副尉有議處之案如例無專條者副叅領照叅領例定議歩軍副尉照步軍協尉定議又奏準直省武職各官如被上司恃勢抑勒許該員詳報該将軍提鎮覈叅若将軍提鎮徇庇或自行抑勒許該員詳報總督覈叅如總督徇庇或自行抑勒該員受屈難伸及該省未經設有總督者準其直掲部科至督撫親標及衛所各官被上司恃勢抑勒許詳報督撫覈叅若督撫徇庇或自行抑勒亦準其直掲部科該部科察明掲内情辭果有實據即行具奏事闗将軍總督提鎮者交巡撫察審事闗巡撫者交總督察審事與督撫皆闗者請旨簡命察審該上司暫免解任審明上司抑勒屬實照例議處若明知上司訪款掲叅乘叅本未到之先揑砌誣掲該部科察明情辭無據将該員奏明解任原掲發交總督確實察審果繫誣掲将該員革職如該員被叅本罪輕於所誣之罪者於本罪外仍治以誣告之罪倘本罪重於誣告即從重歸結又奏準武職各官有例應議處之案奉該管上司行取職名該員開送遲延者罰俸一年轉催官罰俸六月若屬官例應議處並無應詢緣由該管上司掲報遲延者按限期處分不得藉屬員開送遲延希圖推卸至行取例應議處職名該管官不行開送經将軍都統副都統督撫提鎮以徇庇附叅者降二級調用七年議準世爵所得加級後經補授别任其品級與世爵相等或較小於世爵者均準隨帶若品級大於世爵将應行隨帶者準其隨帶應改紀錄者改為紀錄至職任内先得加級後經承襲世爵無論職任兼與不兼若世爵品級與職相等或較小於職任者均準隨帶若世爵品級大於職任将應行隨帶者準其隨帶應改紀錄者改為紀錄其佐領任内所得加級後升叅領以上等官雖仍兼佐領亦察明應隨帶者準其隨帶應改紀錄者改為紀錄又議準旗員緣事議處應議降一級二級留任兼罰俸一年二年者除加級紀錄足抵降罰之數準其抵銷外如加級紀錄不足抵降罰之數将見有加級紀錄抵銷仍分别議以降級罰俸降級之員竢三年無過開復未經開復之先即罰俸年限已滿止照所降之級食俸罰俸之員按所罰之數扣除又議準副驍騎校䕶軍校等遇有議處之案無俸可罰無級可降皆以鞭責完結罰俸一月者鞭一十两月鞭二十三月鞭三十六月鞭四十九月鞭五十一年鞭六十降一級留任者鞭七十降一級調用及降二級留任者鞭八十降二級調用及降三級留任者鞭九十降三級以上調用及革職留任者鞭一百仍留當差如犯革職之案鞭一百革退至領催兵丁有犯如例無專條者亦照此鞭責八年奉旨向來在京八旗武職及外省駐防並在京文武官員遇有罰俸之案準其将議敘加級改為紀錄抵銷惟在外文武各官不在此例朕思大小臣工雖職分有大小之殊而以功抵過均屬一體嗣後外省地方文武各官有情願将議敘加級改作紀錄抵銷罰俸者著照在京文武官之例準其抵銷又覆準在京八旗武職及巡捕營叅将以下各官遇有罰俸三月之案不至銷去紀錄一次者将罰俸之處注册竢再遇罰俸三月之案合算抵銷十三年議準武職各官若因公降革向有送都察院察覈引見之例徒滋弊竇應行停止嗣後在京旗員因公罣誤至於降革其中有辦事勤敏人材可用並無錢糧不清及治罪之案者該管大員㑹同都察院察覈如果應行引見由該管大員出具切實考語保奏引見外省駐防者由該将軍都統副都統等出具切實考語咨送各該旗覈明引見應去應留均候旨遵行至在京巡捕營叅将游擊守偹等官有因公罣誤至於降革者其中有辦事勤敏人材可用並無錢糧不清及治罪之案者該步軍統領㑹同都察院察覈如果應行引見由該步軍統領出具切實考語保奏引見應去應留候旨遵行十四年奉旨近定因公降調人員如以原官補用仍将所降之級帶於新任嗣後引見時如經朕特旨降補者不拘所降級數槩行注銷不必隨帶又覆準在京旗員二品以上在外将軍都統副都統及綠旗提督總兵官遇有降革留任之案於年限屆滿時各開具事由咨部由部察例題請開復不必自行陳奏十六年議準叅領以下等官辦事並無遺漏遲誤者分别給以紀錄原屬鼓勵旗員之意其一人兼數任者即給以數任紀錄未免過優嗣後叅領兼印房辦事又兼佐領者止給以叅領紀錄佐領兼印房辦事者於印房任内給以紀錄部院各官兼佐領者準給以佐領紀錄其餘所兼之任均不準重複紀錄十九年覆準守備以上各官遇有因公降調者準以功加一等抵銷降一級免其降調欽定大清㑹典則例卷一百十六
