body:
  text: 禮部祠祭清吏司中祀一一春分朝日順治八年題準大明之神從祀圜丘外更立日壇毎年於春分日卯時致祭又定祭日壇凡遇甲丙戊庚壬年親詣行禮餘年遣官行禮雍正四年奏準日壇向繫露祭請照社稷壇之例於壇下别設神龕以備風雨並香鑪上增設鑪蓋乾隆十一年奏準向例日壇如遇皇帝親詣行禮之年於壇北門内甬道西設更衣大次今具服殿已經告成請停設更衣大次一秋分夕月順治八年題準夜明之神從祀圜丘外更立月壇毎年於秋分日酉時致祭以北斗七星木火土金水五星二十八宿周天星辰配饗又定祭月壇凡遇丑辰未戍年親詣行禮餘年遣官行禮乾隆三年諭今年夕月舊例乃遣官之年但朕即吉之後凡祭祀典禮初次舉行朕皆欲躬親以展誠敬八月初十日夕月朕親詣行禮欽此四年奏準月壇舊於酉時致祭皇帝親詣行禮於酉時前六刻申時三刻請駕至壇尚隔酉時二刻此次皇帝親詣月壇行禮謹擬於酉時前四刻申時五刻請駕至壇適合致祭之時十三年奏準皇帝親詣月壇具服殿亦已告成請照日壇之例停設更衣大次中祀二一祭前代帝王廟順治二年定每嵗春秋仲月諏日遣官祭帝王廟増遼太祖金太祖金世宗元太祖明太祖五帝増金代功臣斡魯宗翰宗望明代功臣徐達劉基等從祀康熈六十一年諭歴代帝王每朝不過崇祀一二君或廟饗其子而不及其父或配食其臣而不及其君應将凡曽在位除無道被弑亡國之主外盡宜入廟崇祀又諭明愍帝無甚過失國亡乃伊祖所致愍帝不可與亡國者例論神宗光宗哲宗三君不應入祀其歴代配饗功臣有治安之世輔佐有功者應量加増補欽此十二月世宗憲皇帝祇遵聖祖仁皇帝諭㫖増祀帝王各立神牌每代合原祀為一龕増祀功臣亦各立牌位合原祀入兩廡依次安設正殿原祀太昊伏羲氏炎帝神農氏黄帝軒轅氏為一龕帝少昊金天氏帝顓頊髙陽氏帝嚳髙辛氏帝堯陶唐氏帝舜有虞氏為一龕夏王禹商王湯周武王漢髙祖光武為一龕唐太宗遼太祖金太祖世宗為一龕宋太祖元太祖世祖明太祖為一龕東廡原祀風后臯陶龍伯益傅說召公奭召穆公虎張良曹參周勃馮異房元齡李靖李晟許逺韓世忠斡魯宗望巴延劉基西廡原祀力牧䕫伯夷伊尹周公旦太公望方叔蕭何陳平鄧禹諸葛亮杜如晦郭子儀張巡曹彬岳飛宗翰穆呼哩徐達正殿増祀夏王啟仲康少康杼槐芒泄不降扃厪孔甲臯𤼵商王太甲沃丁太庚小甲雍已太戊仲丁外壬河亶甲祖乙祖辛沃甲祖丁南庚陽甲盤庚小辛小乙武丁祖庚祖甲廩辛庚丁太丁帝乙合原祀夏共十有四王商共二十六王為一龕周成王康王昭王穆王共王懿王孝王夷王宣王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王考王威烈王安王烈王顯王慎靚王合原祀三十二王為一龕漢惠帝文帝景帝武帝昭帝宣帝元帝成帝哀帝明帝章帝和帝殤帝安帝順帝沖帝桓帝靈帝昭烈帝唐髙祖髙宗睿宗元宗肅宗代宗徳宗順宗穆宗文宗武宗宣宗懿宗僖宗合原祀漢共二十一帝唐共十有五帝為一龕遼太宗景宗聖宗興宗道宗宋太宗真宗仁宗英宗神宗哲宗髙宗孝宗光宗寧宗理宗度宗端宗金太宗章宗宣宗合原祀遼共六帝宋共十有四帝金共五帝為一龕元太宗定宗憲宗成宗武宗仁宗泰定帝文宗寧宗明太宗仁宗宣宗英宗景帝憲宗孝宗武宗世宗穆宗愍帝合原祀元共十有一帝明共十有二帝為一龕共増祀一百四十三君原祀五龕増二龕共七龕東廡増祀功臣倉頡畢公髙仲山甫魏相耿弇宋璟裴度李沆王曽富弼文彦博李綱文天祥布呼密常遇春楊士奇于謙劉大夏十有八人合原祀風后傅説召公奭召穆公虎張良曹參周勃房元齡李靖許逺李晟韓世忠十有二人並原祀西廡蘷伯夷伊尹鄧禹諸葛亮郭子儀曹彬宗翰穆呼哩徐達十人移入東廡按朝代序次共四十人西廡増祀仲虺吕侯尹吉甫劉章丙吉馬援趙雲狄仁傑姚崇李泌陸贄斡魯吕䝉正冦準范仲淹韓琦司馬光趙鼎托克托李文忠楊榮李賢二十二人合原祀力牧周公旦太公望方叔蕭何陳平杜如晦張巡兵飛九人並原祀東廡臯陶龍伯益馮異耶律赫嚕宗望巴延劉基八人移入西廡按朝代序次共三十有九人東西共増祀四十人合原祀以次分列共七十有九人又定正殿每代設籩豆一案原每位一案五帝龕統改三案共十六案其禮神制帛仍每位一端每案設帛篚一兩廡四位共一案末案三位一案素帛每位一端兩廡各増帛篚二並増香案二鑪二其上香儀皇上親祭一上香遣官致祭三皇位前三上香雍正二年世宗憲皇帝親祭帝王廟改從三上香儀乾隆元年六月遵㫖議準諡明建文帝為恭閔惠皇帝入於帝王廟設位於明大祖之下又議準帝王廟脯醢宜豐加増鹿脯鹿醢鹿一正殿仍用兔醢兩廡易兔醢為醢醢加増豕一乾隆四十九年大學士九卿遵㫖議増入祀晉元帝晉明帝晉成帝晉康帝晉穆帝晉哀帝晉簡文帝宋文帝宋孝武帝宋明帝齊武帝陳文帝陳宣帝元魏道武帝元魏明元帝元魏太武帝元魏文成帝元魏獻文帝元魏孝文帝元魏宣武帝元魏孝明帝唐憲宗後唐明宗後周世宗金哀宗撤出漢桓帝漢靈帝一巡幸祭帝王陵寢順治十六年世祖章皇帝巡幸畿輔遣官各一人祭明代十二陵各禮神制帛一牛一羊一豕一陳香燭酒果遣官上香奠帛獻爵讀祝行禮如儀康熈十三年聖祖仁皇帝巡幸畿輔道經昌平遣官各一人致祭明代十二陵陳設祭品及行禮儀與順治十六年同二十三年聖祖仁皇帝南廵至蘇州諭明太祖一代開創令主功德並隆朕巡省方域將及江寧鍾山之麓陵寢斯在朕優禮前代況於其君實賢可遣祀如禮欽此又奉㫖明太祖陵已遣官致祭但朕既抵江寧其親為拜奠是年躬詣明太祖陵祭酒行禮二十八年聖祖仁皇帝南巡至會稽有㫖議祭禹陵禮部以遣官致祭後恭請親詣祭酒具奏奉㫖堯舜禹湯文武皆前代聖君遣官致祭後方行親詣祭酒未為允協禹陵朕將親祭之祭文内可書朕名又諭祭以敬為主禹陵僻處荒村恐滋䙝慢凡供獻粢盛禮儀諸事著都察院同徃省視欽此是年親撰祭文躬詣行禮祭日自門外降輿歩入率扈從文武各官行三跪九拜禮又頒發御書地平天成匾額懸於饗殿是年聖祖仁皇帝駕至江寧親詣明太祖陵致祭至大門前降輿歩入饗殿行三跪九拜禮至陵前祭酒三爵行一跪三拜禮四十二年聖祖仁皇帝西巡狩遵㫖議定鑾輅所經有應祭之帝王陵寢與御路相近在三十里内者奏聞詳則地祗例又題準女媧氏陵在平陽府屬趙城縣與御路所經相距止八里應照例遣官致祭祭文由翰林院撰擬香帛由太常寺祭品由地方官備辦遣祭官於扈從大臣内開列具奏恭候欽命一人徃祭行禮儀與因事遣祭同是年聖駕至陜西分遣官祭周文王武王成王康王漢高祖文帝宣帝唐高祖太宗宣宗陵儀均與祭女媧氏同又諭文王武王皆古之聖君非他帝王可比且向以孔子聖人已書朕名致祭矣此祭文内亦須書名欽此又議準聖駕回鑾經過豫省孟津縣漢光武陵與御路相近十有五里遣官致祭禮儀與祭陜西漢陵同乾隆十年諭從前皇祖巡幸路經昌平曾遣官致祭明陵此次進口路過昌平應如何遣官致祭之處該部察例具奏欽此遵㫖議準照例遣大臣各一人徃明代十二陵致祭其應用祭品行文該地方官先期豫備承祭官應將扈從之滿漢文武大臣職名開列具奏恭候欽命前徃十三年諭上古聖皇神靈天亶道法淵源所自曲阜為少昊金天氏舊都有陵在焉朕東巡所歴瞻眺松楸情殷仰止宜躬親祀事祗薦馨香以展誠敬欽此是年車駕東巡幸魯親祭少昊金天氏陵御龍袍衮服扈從守土各官咸蟒袍補服陪祀駕至陵門前降輿由中門入饗殿陳設祭品及行禮儀均與祭帝王廟同十四年議準車駕巡省中州御道所經在鄭州有周世宗陵相離一里有竒在湯陰縣有周文王廟相離二里在孟津縣有漢光武帝陵相離十餘里經該撫察明在御道三十里内應循例遣官展虔十五年議準帝王陵寢凡遇慶典遣官秩祭禮有常經聖祖仁皇帝聖德如天鑾輿所屆特於會稽禹陵江寧明太祖陵親詣奠獻皇帝南巡狩由江南至浙江理合請㫖照康熙二十八年親祭之例舉行一應禮神香帛祝版及祭器等項應帶徃者由太常寺帶徃應豫備者由太常寺如式開明行文該地方官敬謹製辦以光祭典又奏準皇帝親祭禹陵明太祖陵應行禮儀請照親祭少昊金天氏陵之例祭日御龍袍衮服行二跪六拜禮扈從大小官員及守土官文官知府武官副將以上咸蟒袍補服齊集陪祀不陪祀各官咸蟒袍補服跪候送迎均由太常寺行文吏兵二部轉傳文武各官並行知江南浙江各督撫一例欽遵奉㫖行三跪九拜禮又奏準皇帝親祭禹陵駐蹕處距陵十有三里親祭明太祖陵駐蹕處距陵九里應於日出前㡬刻請駕載入儀注均奉㫖著於日出前四刻十八年奏準皇帝恭謁泰陵禮畢回鑾道經房山親詣金陵致祭扈蹕内大臣侍衞文官郎中武官參領輕車都尉以上守土官文官知府武官副將以上及金代後裔完顔氏在京官員咸蟒袍補服陪祀其不陪祀之扈從各官咸蟒袍補服於行宮前跪送不陪祀守土各官及陪祀完顔氏官於金陵大門外道右跪迎皇帝御龍袍衮服乘輿出行宮至金陵内垣門外降輿入大門中門詣饗殿行二跪六拜禮上香奠帛獻爵讀祝致祭儀均與祭少昊金天氏禮同是日遣官祭金世宗陵祭畢賜完顔氏官員幣各有差二十一年車駕東巡詣少昊金天氏陵上香行禮儀與十三年同一因事遣官祭帝王陵寢順治八年世祖章皇帝親政遣各部院侍郎以下四品以上堂官致祭帝王陵寢分為七處遣官共七人黄帝軒轅氏周文王武王成王康王漢高祖文帝宣帝後魏文帝唐高祖太宗憲宗宣宗陵遣官一人少昊金天氏帝堯陵遣官一人太昊伏羲氏商高宗漢光武帝周世宗宋太祖太宗眞宗仁宗陵遣官一人炎帝神農氏帝舜明太祖陵遣官一人夏王禹陵遣官一人女媧氏顓頊高陽氏帝嚳高辛氏商王湯中宗金太祖世宗元太祖世祖明宣宗孝宗世宗陵遣官一人遼太祖陵遣官一人祭文由内院撰擬香帛由太常寺移取祭品用牛一羊一豕一登一鉶二簠簋各二籩豆各十均行文各該地方官豫備承祭官由兵部給與勘合諏吉致齋世祖章皇帝親閲祭文香帛遣行康熙六年恭奉世祖章皇帝配饗南北郊禮成是年聖祖仁皇帝親政遣官致祭帝王陵寢禮儀與順治八年同十四年册立皇太子遣官致祭帝王陵寢禮儀與六年同二十年以滇南蕩平遣官七人祭帝王陵寢於承祭官外委禮部太常寺筆帖式各一人典守祭文香帛遣行之日並各給黄繖二御仗二龍旗二牌二餘與六年同二十七年孝莊文皇后升祔太廟禮成遣官致祭帝王陵寢與二十年同三十四年畿輔災傷山西地震遣官七人祭帝王陵寢與二十年同三十六年以平定朔漠遣官致祭帝王陵寢與二十年同四十二年聖祖仁皇帝五十萬壽遣官祭帝王陵寢陳祭文香帛於午門外禮部堂官敬閲畢安奉龍亭舁部授承祭官付筆帖式齎徃餘與二十年同四十八年册立皇太子遣官八人祭帝王陵寢太昊伏羲氏商高宗漢光武帝周世宗宋太祖太宗眞宗仁宗陵遣官一人炎帝神農氏帝舜陵遣官一人女媧氏商王湯陵遣官一人黄帝軒轅氏周文王武王成王康王漢高祖文帝宣帝後魏文帝唐高祖太宗憲宗宣宗陵遣官一人少昊金天氏帝堯陵遣官一人顓頊高陽氏帝嚳高辛氏商中宗金太祖世宗元太