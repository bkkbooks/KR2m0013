十二陵一次嗣後每年春秋二季於該旗都統處具呈前徃昌平明陵致祭至遇有應徃江寧陵祭明太祖之處禮部屆期請㫖令其前徃應辦事宜均照初次例行七年諭自古帝王皆有功德於民雖世代久逺而敬禮崇奉之心不當懈弛其陵寢所在乃神所憑依尤當加意防衞勿使褻慢至於徃聖先賢名臣忠烈芳型永作楷模正氣長畱天壤其祠宇塋墓亦當恭敬守䕶以申仰止之忱著各省督撫轉飭各屬將境内所有古昔陵寢祠墓勤加巡視防䕶稽察務令嚴肅潔淨以展誠恪若有應行修葺之處著動用本省存公銀委官料理朕見歴代帝王皆有保䕶古昔陵寢之勅諭而究無奉行之實朕雍正元年恩詔内即以修葺歴代帝王陵寢通行申飭地方恐有司相沿積習視為泛常嗣後著於每年冬令該地方官將防䕶無誤之處結報督撫該督撫造册轉報工部彚具奏聞倘所報不實一經發覺定將該督撫及地方官分别議處明太祖陵在江寧昔我聖祖仁皇帝屢次南巡皆親臨祭奠禮數加隆著江南總督轉飭有司加意防䕶其明代十二陵之在昌平州者自本朝定鼎以來即設立内監陵户給以地畝令其虔修禋祀禁止樵牧聖祖仁皇帝時屢頒諭㫖嚴行申飭著該督轉飭昌平州知州昌平營叅將委官時加巡視務令地境之内清淨整齊倘陵户或有不敷著該督酌議增設此南北明陵二處亦著該督撫於每年嵗終册報工部彚奏欽此乾隆元年諭各省帝王陵廟均宜嚴肅整齊以昭敬禮聞湖廣地方炎帝神農氏陵廟殿宇牆垣丹雘合度而帝舜有虞氏陵規模狹隘丹青剥落不足以肅觀瞻著該督撫轉飭有司動用公項即行修葺其他處陵廟若有類此者著該督撫委官察勘動用存公銀酌量修理務令完整再各陵向來未設陵户無人看守者可酌設數户令其專司巡察灑掃永著為例欽此十年奏準前明愍帝在位十七年未嘗營及陵寢迨身殉社稷就葬妃園坏土僅掩至為慘憫遭際世祖章皇帝應天順人撫有寰宇躬幸愍帝陵酹奠慟悼又憫其荒凉庳隘勅令修葺所有饗殿三楹配屋數椽應令直隸總督轉飭有司量為修葺以免剥落傾圮又諭金朝陵寢近在房山嵗久榛蕪未經修葺朕惟金太祖金世宗功德載在史書景仰傳之奕禩我世祖章皇帝聖祖仁皇帝隆禮有加並御製碑文勒諸貞珉以垂不朽顧念國家祀典光昭雖以時遣官將事而一切饗殿繚垣儀制所存觀瞻宜備其令直𨽻總督前徃相度有應增修芟治者即行奏聞工竢之後朕將躬親展奠以昭敬禮前朝之意欽此十六年諭朕時巡至杭州禹陵在望緬惟平成之德萬世永頼皇祖聖祖仁皇帝曾親祀焉爰東度浙江陟會稽式遵皇祖舊典躬薦馨於宇下厥有姒氏子姓世居陵側應世予八品官奉祀該督撫擇其有品行者一人充之昭崇德報功至意欽此遵㫖議準選得姒恆甸世譜系出宗支準授為八品官並令世襲以奉祀會稽陵廟烝嘗一祭先師孔子行釋奠禮崇德元年定遣官致祭先師孔子以顔子曾子子思子孟子配饗五年定每年二月八月上丁日行釋奠禮順治二年定每嵗春秋仲月上丁日祭先師孔子遣大學士一人行禮翰林官二人分獻國子監祭酒祭啟聖公於啟聖祠均以先賢先儒配饗從祀自後每年二月八月上丁日致祭如遇有事改次丁或下丁通行府州縣衞各學遵行又定每月初一日聖廟行釋菜禮設酒芹棗栗祭酒於先師位及四配位前三獻十哲兩廡位前以監丞博士等官分獻次詣啟聖祠行禮分獻官亦隨行禮十五日司業上香行禮與朔日同九年世祖章皇帝視學釋奠先師孔子前朝於大内致齋四配十哲兩廡各遣官分獻王以下公以上文官三品武官二品翰詹官七品以上暨國子監官咸齋戒陪祭又題準視學前期由部遣官行取衍聖公率孔顔曾孟仲五氏世襲五經博士孔氏族五人顔曾孟仲族各二人乘傳赴京及五氏子孫見任京官者咸與祭又奏準視學釋奠之禮是日早工部設更衣大次於大成門外之左南嚮陪祭文武官先詣廟庭左右恭竢咸朝服東西面序立駕出長安左門至成賢街國子監祭酒司業率學官貢監生朝服跪迎街左駕至廟門外降輿贊引官恭導由中門入至大次少憇太常卿奏請行禮皇帝出大次盥洗入大成中門升階入殿中門北嚮立分獻官入右側門至階下夾甬道立王公入左右門由中階左右升文武官豫由左右側門入按翼於東西序立均北面衍聖公在東班之首五經博士曁五氏有官者以其官序諸生在東班之末序立迎神上香行二跪六拜禮王公百官均隨行禮司帛跪進篚皇帝受篚拱舉仍授司帛奠於案司爵跪進爵皇帝受爵拱舉仍授司爵獻於神位前樂三奏酒一獻不讀祝送神行禮如前釋奠畢出大成門入大次更衣御彜倫堂講書詳見儀制司禮成還宫十四年議準祭先師祝文稱至聖先師孔子通行直省各學十七年以修葺太學告成世祖章皇帝視學釋奠與九年禮同康熙八年聖祖仁皇帝視學釋奠與順治九年同二十三年御書萬世師表匾額恭懸大成殿並頒發直省學宫二十八年御書孔子贊並顔曾思孟四子贊勒石摹搨頒發直省二十九年議準學宮闗繫文教凡官民人等經過者皆下車馬並禁於學宮内放馬汚踐三十五年覆準平定厄魯特噶爾丹朔漠永清仿王制天子出征執有罪反釋奠於太學以訊馘告之禮遣官釋奠於先師勒石太學與致祭闕里禮並行五十一年諭朱子發明聖道軌於至正特加優崇升配大成殿十哲卜子商之次又奏準朱子升配大成殿前期遣官二人祗告先師孔子及朱子位前五十四年題準范仲淹學問精純經綸卓越應從祀聖廟位列西廡先儒韓愈之次雍正元年諭至聖先師孔子道冠古今德參天地樹百王之軌範立萬世之宗師其為功於天下者至矣而水源木本積厚流光有開必先克昌厥後則聖人之祖考宜膺崇厚之褒封所以追溯前徽不忘所自也粤稽舊制孔子之父叔梁公於宋眞宗時追封啟聖自宋以後累代遵循而叔梁公以上則向來未加封號亦未奉祀祠内朕仰體皇考崇儒重道之盛心修崇德報功之典禮意欲追封五代並饗烝嘗用申景仰之誠庶慰羮牆之慕内閣禮部會同確議具奏又諭五倫為百行之本天地君親師人所宜重而天地君親之義賴師教以明自古師道無過於孔子誠首出之至聖也我皇考崇儒重道超軼千古凡尊崇孔子典禮無不備至朕䝉皇考教育自㓜讀書心切景仰欲再加尊崇更無可增之處故勅部進封孔子以上五代今部議封公上考前代帝王皆有推崇之典唐明皇封孔子為文宣王宋眞宗加封至聖文宣王封聖父叔梁紇為齊國公元加封孔子為大成至聖文宣王加封齊國公為啟聖王至明嘉靖時以王繫臣爵改稱為至聖先師孔子改啟聖王為啟聖公雖皆屬尊稱朕意以為王爵較尊孔子五世封王之典著諸大臣議奏欽此遵㫖議準自叔梁公以上至木金父公凡五代並追封為王爵木金父公為肇聖王祈父公為裕聖王防叔公為詒聖王伯夏公為昌聖王叔梁公為啟聖王其啟聖祠向繫專祀叔梁公故以啟聖為名今聖朝異數合祀五代應更名為崇聖祠改造匾額增設神牌及一應祭器交與工部竢造完日欽天監擇吉入祠至入祠之日遣官一人讀文祗告祝文由翰林院撰擬每年春秋丁祭牲牢酒醴籩豆簠簋毎神位前皆照啟聖王例陳設將追封字樣通行直省府州縣衞畫一遵行原奉上諭二道頒發國子監勒石廟庭以光祀典二年世宗憲皇帝視學行釋奠禮與康熙八年同是年諭祔饗廟庭諸賢皆有羽翼聖經維持名教之功然前代進退不一而賢儒代不乏人或有先罷而今宜復舊闕而今宜增其從祀崇聖祠者周程朱蔡外或有可升而祔者以昭崇報均闗大典九卿翰林詹事科道會同國子監詳考定議以聞欽此遵㫖議準明洪武二十九年黜揚雄從祀𢎞治八年黜吳澄從祀嘉靖九年林放蘧瑗鄭康成鄭衆盧植服䖍范寗七人改祀於鄉公伯寮秦冉顔何申黨荀況戴聖劉向賈逵馬融何休王肅王弼杜預十三人黜其從祀今議得二十二人中林放蘧瑗秦冉顔何鄭康成范寗六人允宜復祀孔子弟子縣亶牧皮孟子弟子樂正子公都子萬章公孫丑漢諸葛亮宋尹焞魏了翁黄幹陳淳何基王栢趙復元金履祥許謙陳澔明羅欽順蔡清本朝陸隴其二十人允宜增祀又宋横渠張子之父廸增入崇聖祠從祀又奏準十一哲内閔氏後裔世襲博士遇視學大典率其族二人赴京觀禮據衍聖公咨送到部應照五氏子孫之例準其與祭又議準大成殿四配十一哲每位一案兩廡二位共一案崇聖祠四配異案兩廡二位共案其兩廡内有單位者仍獨設一案是年以平定清海遣官釋奠於先師勒石太學與康熙三十五年同三年諭先師孔子聖諱理應迴避按毛詩及古文此字讀作期音者甚多嗣後除四書五經外凡遇此字並加邑為邱地名亦不必改易但加邑旁讀作期音庶協尊崇至意欽此四年議準視學釋奠禮儀載在會典惟春秋二祭均遣大學士行禮向未載有親詣儀注今特㫖親詣行禮為尊師重道之曠典謹擬陳設犧牲籩豆仍照春秋丁祭禮儀請照雍正二年視學釋奠行二跪六拜禮立獻帛爵一次不讀祝文不飲福受胙四配位前遣尚書四人分獻十一哲及兩廡從祀位前遣侍郎四人各分獻並載入會典永逺遵行又奏準視學釋奠舊儀不讀祝今親詣行禮實屬曠典請照康熙二十三年親祭先師闕里讀祝文致祭行禮是年仲秋丁祭世宗憲皇帝親詣行禮畢諭禮部太常寺儀注内開奠帛獻爵皆不跪朕今跪獻非誤也若立獻於先師之前朕心有所不安將此諭衆知之爾衙門可記載嗣後照此遵行欽此五年諭聖祖仁皇帝聖誕舊例禁止屠宰至聖先師孔子師表萬世聖誕日亦應䖍誠致祭朕惟君師功德恩被億載普天率土尊親之戴永永不忘而於誕日尤當加謹以展恪恭思慕之忱非以佛誕為比擬也著大學士九卿會議具奏欽此遵㫖議準每嵗三月十八日聖祖仁皇帝聖誕每嵗八月二十七日至聖先師孔子誕辰恭值此二日自大内至王公文武各官以及軍民人等均應致齋一日不理刑名禁止屠宰永著為令是年御書生民未有匾額恭懸大成殿並頒發直省懸於學宮七年十二月以重修闕里聖廟慶雲見於曲阜世宗憲皇帝親詣太學祭告十一年二月世宗憲皇帝親祭先師孔子禮成諭禮部嗣後親詣行禮於香案前行三上香禮欽此乾隆元年議準聖廟脯醢宜豐鹿脯鹿醢加增鹿二正位及四配崇聖祠正位仍用醢十一哲兩廡崇聖祠配位兩廡易醢為醓醢加增豕二再祭聖廟於前一日陳設與各處例不畫一交太常寺照各廟之例辦理竢祭畢仍交國子監官分胙二年遵㫖議準國子監大成殿及大成門易黄瓦崇聖祠易綠瓦並修至聖先師神牌重飾見新以肅觀瞻是年御書與天地參匾額恭懸大成殿命頒發直省懸於學宮又覆準元儒吳澄仍應從祀於太學在西廡先儒趙復之次三年諭今年春祭先師孔子朕降㫖親詣行禮舊例春秋二祭皆遣官我皇考尊師重道始定親祭之禮今覽太常寺奏進儀注朕躬獻爵一次其亞獻三獻之爵則豫設於案朕思旣行親祭仍當從三獻之儀著太常寺重繕儀注進呈欽此是年三月皇帝視學講學行釋奠禮與雍正二年同又覆準冉氏卜氏端木氏言氏顓孫氏各有五經博士照閔氏仲氏子孫之例行取該博士率其族二人乘傳赴京與祭又奏準元聖周公後裔東野氏五經博士準率其族二人與祭又覆準先賢有子若升配大成殿為十二哲在先賢卜子商之次東位西嚮移朱子神位於西在先賢顓孫子師之次前期祗告照康熙五十一年朱子升配之禮五年仲秋仲丁親祭先師禮儀與三年春祭同九年仲春上丁親祭先師與五年禮同十一年議準崇聖祠四配位前應增分獻官國子監助教二人贊引官太常寺贊禮郎二人其陳設四案增帛二爵六以備典儀以昭誠敬十四年以平定金川遣官釋奠於先師勒石太學與雍正二年同十八年奏準按太學春秋丁祭大成殿内十二哲東西各豕首一每位豕肉一盤兩廡先賢先儒百二十三位東西各豕首六每位豕肉一盤崇聖祠内四配東西各豕首一及兩廡每位各豕肉一盤共用豕二十有九徒為煩瑣而陳設之處不足以昭整肅謹按乾隆十三年車駕東巡親祭先師孔子照闕里春秋祭禮十二哲東西各少牢一案兩廡各少牢三案崇聖祠四配兩廡東西各少牢一案又考順天府府學每年丁祭十二哲東西各少牢一案兩廡各少牢二案較太學見行之例轉覺整齊應將太學春秋丁祭闕里牲品畫一改正以與禮儀相稱又十二哲東西各篚一帛一未免太􅂤請照崇聖祠四配位各異帛之例每位一帛東西共篚二以昭畫一又按兩廡位次皆東西嚮先賢先儒南北分列向於中閒牆壁空處設案案上供豕首六皆倚於壁前設香帛案分獻官各一人皆嚮牆壁空處奠獻於禮未協應照帝王廟分獻之例兩廡各用分獻官二人各增香帛一案俾得就位行禮以嚴昭假再十二哲兩廡向皆於各位前豫奠一爵其分獻官行三獻禮則統奠三爵於香案以太常寺執事人不充數故也嗣後丁祭十二哲兩廡三獻請均令肄業諸生奉爵令東西分獻翰林官各奠三爵其兩廡分獻國子監官四人一如帝王廟之例各統奠三爵以光祀典又奏準按聖廟兩廡從祀先儒位次謹依史傅按年序次行令國子監於月朔釋菜時移請依次序位置以光典禮公羊高周人子夏門人穀梁赤周人子夏門人伏勝秦博士漢文帝時命晁錯往受尚書高堂生秦季人至漢時傳士禮董仲舒漢景帝時爲博士武帝時爲江都相孔安國漢武帝時諫議大夫后蒼漢武帝時博士毛萇漢武帝時河閒獻王博士杜子春漢哀帝時人劉歆門人鄭康成漢桓帝時人諸葛亮漢昭烈時人范寗東晉武帝時豫章太守王通隋文帝時人韓愈唐德宗貞元八年舉貢士宏辭范仲淹宋眞宗大中祥符八年進士胡瑗宋仁宗景祐初蘇湖教授歐陽修宋仁宗天聖八年進士司馬光宋仁宗寶元初進士楊時宋神宗熙寧九年進士程子門人尹焞宋神宗時人程子門人羅從彥宋神宗時人楊時門人胡安國宋哲宗紹聖四年進士李侗宋哲宗時人羅從彦門人張栻宋高宗末以蔭補官呂祖謙宋孝宗時進士陸九淵宋孝宗乾道八年進士蔡沈宋孝宗時人朱子門人黄幹宋寧宗時人朱子門人陳淳宋寧宗時人朱子門人眞德秀宋寧宗慶元五年進士魏了翁宋寧宗慶元五年進士何基宋理宗時人黄幹門人王栢宋理宗時人何基門人陳澔宋末人趙復宋末元初人私淑朱子金履祥宋末元初人王柏門人許謙宋末元初人金履祥門人許衡元世祖時國子監祭酒吳澄元人武宗時國子監丞薛瑄明永樂十九年進士胡居仁明正統時人陳獻章明正統十二年進士王守仁明成化十七年進士蔡清明成化二十年進士羅欽順明𢎞治六年進士陸隴其本朝康熙庚戌進士一闕里祀典順治八年世祖章皇帝親政遣四品以上堂官一人致祭先師闕里祭文由内院撰擬香帛由太常寺移取祭品由該地方官備辦承祭官由兵部給與勘合世祖章皇帝親閱祭文香帛遣行均與致祭帝王陵寢禮同康熙六年世祖章皇帝配饗南北郊禮成是年聖祖仁皇帝親政遣官致祭先師闕里與順治八年同十四年册立皇太子遣官致祭先師闕里與六年同二十年以滇南蕩平遣官致祭先師闕里承祭官外委禮部太常寺筆帖式各一人典守祭文香帛遣行之日給繖仗牌旗與遣祭帝王陵寢同二十三年議準鑾輅東巡經過闕里應照本處祀典致祭先師又議奏躬詣闕里致祭照順治九年康熙八年視學釋奠之禮於駐蹕次日致祭御龍袍衮服行禮行在儀仗皆陳設迎神送神行二跪六拜禮讀祝畢於跪處行三拜禮配位十哲兩廡啟聖祠均遣官分獻扈從王公大臣官員照例陪祀地方官文官知府武官副將以上衍聖公曁各氏子孫見有官職者咸陪祀其不陪祀各官並地方官於行宮前兩旁列跪迎送咸蟒袍補服致祭時停用本處樂章奉㫖尊禮先師應行三跪九拜禮亦應用樂著考例詳議具奏欽此遵㫖議準大禮攸闗特加隆重迎神送神均行三跪九拜禮再闕里所用樂章雖與國學小異亦皆尊崇師道之辭應即用此樂章致祭但恐樂工未諳禮儀應令太常寺酌委司樂及樂舞生先期馳驛前徃指示肄習至樂工袍服亦應將太學所用樂工袍服攜徃備用以光盛典又奏準聖駕詣先師廟行禮由曲阜南門入及廟由廟門入大中門至同文門於奎文閣前降輦詣齋宿所更衣大次内少憇鴻臚寺官引陪祭各官文由東金聲門武由西玉振門入衍聖公曁諸文臣五經博士各氏子孫在廟庭阼階下諸武臣在廟庭西階下均東西以次序立贊引官恭導聖駕自奎文閣步入大成門由中道詣大成殿就拜位行禮陪祀王公拜於杏壇之上分獻官拜於杏壇之下獻帛爵乃升殿廡已獻還拜於下陪祀各官拜於甬道東西均北面是年御製祭先師文親詣釋奠周視廟庭車服禮器畢詣齋宿所大次更衣復命駕至孔林跪祭酒三爵每祭酒行一拜禮扈從王公大臣暨衍聖公皆隨行禮又諭至聖之德與天地日月同其高明廣大無可指稱朕向來硏求經義體思至道欲加贊頌莫能名言特書萬世師表四字懸額殿中非云闡揚聖教亦以垂示將來欽此又特命以御前曲柄黄蓋畱設廟庭又御製碑文及闕里詩賜衍聖公以下陪祀五經博士等銀幣有差又諭周公古大聖人制禮作樂垂示萬世今廟在曲阜應行致祭事闗大典大學士會同禮部翰林院詳議具奏欽此遵㫖議準道統之傳上自堯舜至於周孔今躬祀闕里復命致祭周公廟庭禮儀隆盛洵為萬世章程應令該衙門撰擬祭文遣官致祭奉㫖致祭周公禮宜隆重其遣親王及禮部尚書偕徃以示朕尊崇先聖之意是日御製祭文遣官齎徃致祭又題準致祭元聖周公祝版用白紙黄縁墨書祭用禮神制帛一羊一豕一果五盤尊一爵三香帛爵由太常寺祭品牲醴由地方官備辦祭日讀祝文奠帛爵行三獻禮二十四年議準增擴孔林地畝十有一頃有奇免其稅糧二十五年諭孔子聖集大成道隆德備參兩天地卓冠古今歴代帝王咸所師法朕硏精經傳志切欽崇應勒廟碑朕親撰文書丹以昭景行尊奉至意欽此二十六年議準御書聖廟碑文遣官齎送闕里設黄蓋御仗鼓吹迎送恭摹勒石於大成門外金聲門之右又奏準御書周公廟孟子廟碑文亦照文廟如式恭摹勒諸貞珉二十七年孝莊文皇后升祔太廟禮成遣官致祭先師闕里與二十年同二十八年衍聖公奏請修理闕里聖廟奉㫖發内帑興修於三十年四月鳩工二十九年議準述聖向未建有專祠應仿顔曾孟三廟規制建立子思子廟春秋致祭載入祀典三十二年重修聖廟落成詔遣皇子詣闕里告祭祭日具蟒袍補服於杏壇上行禮隨徃大臣侍衞及守土官衍聖公五氏子孫有官職者咸於杏壇下陪祀餘儀與遣官祭先師闕里禮同是日祭告禮成皇子詣孔林至洙水橋下馬步至先師墓前行三跪九叩禮畢跪祭酒三爵每祭酒行一叩禮從官暨衍聖公皆隨行禮三十四年畿輔災傷山西地震遣官詣先師闕里致祭與二十年同三十六年以平定朔漠遣官致祭先師闕里與二十年同四十二年聖祖仁皇帝五十萬壽遣官祭先師闕里陳祭文香帛於午門外禮部堂官敬閲畢安奉龍亭舁至部授承祭官付筆帖式齎徃與遣祭帝王陵寢同餘與二十年同四十八年册立皇太子遣官致祭先師闕里祭文香帛陳午門外禮部堂官敬閲畢授承祭官付筆帖式齎徃餘與十四年同五十二年聖祖仁皇帝六十萬壽遣官致祭先師闕里與四十二年同五十七年孝惠章皇后升祔太廟禮成遣官致祭先師闕里與四十八年同六十一年十一月世宗憲皇帝登極遣官祭先師闕里御中和殿親閲祭文香帛遣行與遣祭帝王陵寢禮同雍正元年聖祖仁皇帝升祔太廟配饗南北郊禮成遣官致祭先師闕里與康熙六年同二年覆準聖廟音樂佾舞大禮攸闗聖祖仁皇帝頒發中和韶樂非常異數今闕里所奏音節未諧由無指授所致應令闕里司樂選擇數人衍聖公給文赴太常寺演習精熟轉相傳授至樂舞生等亦令擇人充用毋致參差不齊其冠服等項均照太學式樣畫一製備五年覆準樂舞生入學充附原因尊崇至聖將在廟學習供事之人格外加恩相沿日久惟據衍聖公指名移咨並非廟庭供事諸生溷入宮牆實屬冒濫行令該學政會同衍聖公將見在樂舞生秉公甄别不諳音律者裁汰照數選一百五十名造具年貌籍貫清册每學臣考試酌取四名入曲阜學充附其兗州府學充附之三十六名槩行停止七年諭修理文廟工程務期巍煥崇閎堅緻壯麗纖悉完備燦然一新著該撫會同衍聖公詳加相度倘舊制之外有應行增設者有應加修整者悉著估計奏聞增發帑金葺理丹雘總期經理周密毫髮無憾以展尊禮先師至誠至敬之意欽此又諭聖廟應建碑亭二座著動支正項錢糧鳩工興造衍聖公所請捐資辦理之處不必行欽此八年諭惟至聖先師孔子道冠百王功高萬世朕景仰企慕寤寐勿諼備舉崇奉之儀用申報享之意念世襲官爵歴代皆有成規惟聖廟執事之員向來未有爵秩所當廣置官僚以光祀典今欲特設聖廟執事官三品者二人四品者四人五品者六人七品者八人八品九品者各十人咸按品級給與章服每逢聖廟祭祀之時虔肅冠裳駿奔趨事凡此人員著衍聖公於孔氏子孫内選擇人品端方威儀嫻雅者報部充補彙奏以聞每年各給俸銀二十兩其孔氏子孫内有情願充補之人或曾經出仕而退休在籍者或身有職銜而未曾出仕者以及貢監生童等皆可入選若屆鄉試之期有情願入場者準以監生入場應試著大學士會同該部定議具奏欽此遵㫖議準聖廟向有管句典籍司樂等官分司執事而設官不過數員職銜又止七品制度威儀未為周至嗣後應廣設官僚三品者二人四品者四人五品者六人七品者八人八品九品者各十人均按品級給與章服每祭祀時令虔肅冠裳陪祀執事以光祀典其俸銀於山東藩庫支領充補由衍聖公選擇悉遵諭㫖施行又覆準重修闕里聖廟各工告成諸儀悉備請遣官告祭以光鉅典應將王公大臣職名開列具奏恭候欽命祭文由翰林院撰擬香帛由太常寺備辦徃祭之日欽天監諏吉啓行奉㫖遣皇五子及郡王一人徃祭欽此又奏準皇子致祭先師闕里照例具蟒袍補服隨徃之大臣侍衞官員地方官衍聖公五氏子孫有官職者咸陪祀禮成展謁孔林一應祭祀事宜行禮儀注並執事官均交太常寺辦理又奏準康熙三十二年告祭先師闕里未經議及崇聖祠此次皇子徃祭請遣分祭官於大成殿致祭之時崇聖祠亦同時行禮是年皇子致祭先師闕里禮儀與康熙三十二年同郡王致祭崇聖祠與京師崇聖祠承祭官行禮同又諭聞孔林饗堂牆垣間有年久傾圮之處朕尊崇先師夙夜罔斁今廟貌已經鼎新林院允宜修葺著欽天監選官前徃會同衍聖公相度方位宜於何時營治詳慎定議屆期朕命大臣前赴曲阜令衍聖公協同修理務令崇閎堅固光垂永久以昭朕尊禮先師之至意欽此是年頒發祭器於闕里凡登鉶簠簋籩豆尊爵均依照經圖舊式範銅為器俾藏諸聖廟永為世守九年諭孔林工程仍著原修闕里廟工之員及衍聖公敬謹監修會同該撫料度定議具奏欽此又奏準御書聖廟碑文遣官齎送闕里敬謹鐫刻照例備鼓樂迎送自京至曲阜沿塗各官在十里以内者咸朝服迎送十年覆準至聖園林工竣應勅交衍聖公將修建聖廟欽頒上諭並發帑修工各事宜編纂成書恭請欽定嘉名以昭尊禮先師崇儒重道之至意十三年九月皇帝登極遣官詣先師闕里致祭御中和殿親閱祭文香帛遣行與康熙六十一年同乾隆二年世宗憲皇帝升祔太廟配饗南北郊禮成遣官致祭先師闕里禮部堂官於大堂敬閲香帛授承祭官一應事宜均與遣祭禮同四年奏準闕里十一哲位前祭器無鉶應同升配有子位前均增造鉶一四配應設二鉶從前止有鉶一亦應照例增加頒發以符典禮十二年諭朕幼誦􅂤編心儀先聖一言一動無不奉聖訓為法程御極以來覺世牖民式型至道願學之切如見羮牆辟雍鐘鼓躬親殷薦而未登闕里之堂觀車服禮器心甚歉焉仰惟皇祖聖祖仁皇帝巡幸東魯親奠孔林盛典傳於奕禩皇考世宗憲皇帝崇聖加封重新廟貌遣朕弟和親王恭代展祀未以命朕意者其或有待與朕寅紹丕基撫兹熙洽思以來年春孟月東巡狩因溯洙泗陟杏壇瞻仰宮牆申景行之夙志所有應行典禮大學士會同該部稽考舊章詳悉具議以聞欽此遵㫖議準康熙二十三年聖祖仁皇帝致祭闕里即用闕里禮樂今鑾輿親詣先師闕里致祭所用禮樂請遵康熙二十三年之例舉行又乾隆八年欽定聖廟樂章頒發曲阜及天下學宮今親詣闕里自應禮明樂備但恐本處樂工於欽頒樂譜或有未諳應令太常寺量委司樂及樂舞生前徃演習應用又康熙二十三年聖祖仁皇帝御詩禮堂講書畢即日詣孔林行三祭酒禮今皇上學宗洙泗志切羮牆亦請於講書禮成詣孔林行祭酒禮又元聖周公廟近在曲阜聖祖仁皇帝特命親王禮臣致祭今鑾輿親詣闕里亦請遵舊章遣官讀文致祭其應用祭文由翰林院撰擬香帛由太常寺齎徃祭品等項由地方官豫備致祭闕里儀注由太常寺孔林祭酒儀注由禮部均屆期具奏致祭周公遣官承祭由禮部先期請㫖其餘一應事宜均照康熙二十三年典禮舉行又議準闕里樂工於欽頒樂譜未諳應即用在京樂生樂部會同太常寺照文廟應用人數選擇司樂官三人樂生五十人屆期太常寺委官率徃至中和韶樂康熙年間已經造送有年如有不整齊者應令漆飾見新樂生冠服已如式製就均無庸攜徃其執事人員向例用孔氏生員所用冠服應仍其舊又議準闕里舊有啟聖祠在大成殿西金絲堂後至雍正元年特封先師五代為王爵因復建崇聖祠於大成殿東詩禮堂後春秋祭饗以仰承世宗憲皇帝尊師重道推原所生至意其舊存啟聖祠並祀啟聖夫人别為聖裔家廟於禮未為不合惟是四配位及從祀先儒仍附舊祀尚未妥協應令衍聖公相度情形將四配從祀神牌移置崇聖祠兩旁敬謹安設鑾輿恭詣闕里致祭先師五代應於崇聖祠行禮無庸兩祠分祭又議準康熙二十三年聖祖仁皇帝遣祭周公廟時奉㫖次日致祭祭品不能取辦一時是以舊典所載僅用五果禮屬從宜今據該縣呈報毎嵗春秋祭祀周公所用簠簋豋鉶祭品已備即籩豆之實亦皆春秋常供非土産所乏鑾輿東巡遣祭元聖典禮攸隆自應照毎嵗春秋祭品用羊一豕一登一鉶一簠簋各二籩豆各八令該地方官豫行措辦以光祀典其遣官致祭應遵康熙二十三年之例致祭元聖周公遣親王一人行禮致祭配饗之魯公遣禮部尚書一人行禮十三年奏準皇帝親祭先師其四配十二哲兩廡並崇聖祠致祭請於扈從之尚書侍郎内閣學士内奏遣如有不敷請照康熙二十三年之例於各衙門三品以下堂官内奏遣崇聖祠有四配及從祀先儒請於扈從之翰詹科道内咨取四人分獻令太常寺豫期先將祝版齎徃内閣委中書一人同徃敬謹繕寫屆期太常官恭奉至祭所安設是年車駕至曲阜先詣先師廟上香御龍袍衮服乘輿出行宮行在鑾儀衞設騎駕鹵簿不作樂由廟大門入大中門至奎文閣前降輿贊引太常卿二人恭導至更衣大次少憇出盥洗畢恭導駕入大成門由中階升大成殿詣香案前立司香官奉香盤跪進皇帝三上香司拜褥官展拜褥皇帝就拜位行三跪九拜禮興恭導駕出殿至奎文閣前乘輿作樂還行宮翼日駕詣先師廟行釋奠禮扈從官及守土官衍聖公五經博士各氏子孫咸陪祀如儀御詩禮堂講書禮成更常服詣孔林祭酒禮儀均與康熙二十三年同是日御龍袍衮服詣周公廟上香行一跪三拜禮又諭朕東廵躬詣闕里致祭先師顔曾思孟四賢作配殿庭雖從與饗但聞其故里尚有專廟應分遣大臣恭奉香帛前徃致祭以展誠敬向在書齋曾製四賢贊景仰之忱積有日矣其勒石廟中致朕崇重先賢之意欽此十四年以平定金川遣官致祭先師闕里與二年同是年議準車駕南廵江浙鑾輿經過山東應請遣官致祭先師闕里其元聖周公廟近在曲阜亦請遣官致祭十五年册立皇后遣官致祭先師闕里與十四年同十六年崇慶慈宣康惠敦和裕壽皇太后六十萬壽加上徽號遣官致祭先師闕里與十五年同二十年諭平定準噶爾㨗聞以數十年逋宼迅就廓清荒服敉寧中外䝉福乃我國家無疆之休緬惟皇祖聖祖仁皇帝削平三孽於康熙二十三年諏吉東廵親祭闕里武功文德彪炳簡册朕仰承先緒集此大勲保泰持盈彌深兢業親告成功於太廟郊社嶽瀆諸祀次第遣官敬謹舉行以昭茂典先師孔子闕里應恪遵成憲躬詣行禮用申誠敬且自瞻謁林泉已逾六載仰止之念時切於懷擬於明嵗春月自京起鑾恭詣曲阜翠華所經亦以體察吏治清問閭閻行慶施惠以稱朕法祖尊師之至意所有應行豫備事宜該部詳議以聞欽此二十一年鑾輿親詣曲阜致祭先師禮成親祭元聖周公廟遣官分祭四配專祠禮儀與十三年同又覆準孟廟配享從祀各主尚皆仍侯伯封號未協禮制應改書先賢先儒樂正克公孫丑萬章公都子四人皆稱先賢某子陳臻屋廬連陳代高子孟仲子充虞徐辟彭更咸邱䝉桃應季孫子叔浩生不害盆成括及從祀之唐臣韓愈宋臣孔道輔皆稱先儒某氏某以昭畫一一直省府州縣釋奠於先師之禮順治初年定每嵗春秋仲月上丁日府州縣各行釋奠禮以地方正印官主祭陳設禮儀均與國子監丁祭同康熙二十五年議準直省武官協領副將以上遇聖廟祭祀照例文東武西陪祀行禮四十九年諭直省府州縣春秋致祭先師凡同城大小武官均照文官入廟行禮欽此五十年題準我朝樂章皆用平字因州縣未曾頒發仍襲前明錯用和字著直省各巡撫通行府州縣儒學皆改和字為平字以歸畫一雍正五年覆準每嵗春秋丁日致祭先師大典攸闗今直屬惟司道府州縣官於丁日行禮其督撫學政則先期一日於階下行九叩禮謂之祭丙典制所無且行禮前後儀節滌器視牲晉爵奠斚儀文隆備今但行九叩禮亦未允協嗣後省㑹之祭督撫學政於上丁日率司道府州縣各官齊集致祭學政考試各府即於考試處聖廟行禮各府州縣守土正印官率屬於本處聖廟行禮毋得簡率從事均照典制遵行十年覆準崇聖祠内五代神牌遵照成式繕刋通行各省督撫改正畫一製造安設乾隆六年議準學宮從祀先賢先儒神位次序以京師太學成式通行直省府州縣遵照書題按東西先後次序安設一直省祀名宦鄉賢祠順治初年定直省府州縣建名宦鄉賢二祠於學宫内毎嵗春秋釋奠於先師同日以少牢祀名宦鄉賢皆地方官主祭行禮一先賢先儒後裔世襲五經博士順治十二年覆準宋儒朱熹有功聖學應照先賢顔曾思孟後裔世襲之例考其宗譜適裔取具族長保結州縣印結由部咨吏部給劄授為五經博士於江南婺源縣原籍崇祀世襲罔替康熙九年覆準宋儒程顥程頤照予朱子後裔世襲之例考其宗譜適裔各給劄授為五經博士一人奉祀祠廟二十四年議準元聖後裔東野氏按照宗譜以其適裔一人授為世襲五經博士又議準宋儒周敦頤後裔照二程朱子之例予以五經博士一人給劄世襲二十六年覆準宋儒張載子孫照先儒周程朱三氏後裔之例予以世襲博士奉㫖張載乃前代名儒其子孫既與官職必眞正適派方無負崇儒重道之意著該撫再行詳察務得實據到日定議具奏欽此遵㫖行令該撫詳加察覈送到宗譜宗圖果繫適裔具題給劄授為世襲五經博士二十九年議準先儒朱子後裔於福建崇安縣奉祀授為世襲五經博士照例給劄與江南婺源縣同三十八年議準先賢閔氏子騫端木氏子貢後裔照仲氏子路後裔世襲例各按照宗譜以其適裔一人授為五經博士四十一年議準宋儒邵雍後裔照周程朱張之例考其宗譜給劄授為世襲五經博士五十一年覆準先賢言氏子游後裔照閔子子貢之例授為五經博士給劄世襲五十九年議準先賢卜氏子夏按照宗譜以其適裔一人授為世襲五經博士六十年議準先賢冉有後裔照各先賢後裔之例世襲五經博士一人雍正二年奉㫖先賢冉雍冉伯牛子張有若四人後裔均照增置五經博士一人予以世襲是年議準博士子弟應承襲之人若不讀詩書不識禮義濫膺承襲有玷先賢先儒殊負聖朝崇儒重道之意應由該撫送部考試果文理通曉照例注册竢襲職時具題給劄一祭傳心殿康熙二十四年議準文華殿之東建傳心殿奉皇師伏羲氏皇師神農氏皇師軒轅氏帝師陶唐氏帝師有虞氏王師夏禹王王師商湯王王師周文王王師周武王均正位南嚮先聖周公東位西嚮先師孔子西位東嚮應用祭器照帝王廟式樣成造龕案等項酌量尺寸交工部備造毎嵗御經筵前期太常寺奏遣大學士一人行祗告禮皇帝御經筵皇太子出閣講書均祭告奉先殿傳心殿二十五年議準御經筵前一日如皇帝親詣傳心殿祗告祝文由翰林院撰擬前期太常官奉祝版送至傳心殿祝版房安設祭日㸃香燭設鉶一實以和羮籩二實以龍眼栗實豆二實以醓醢鹿醢奠帛爵讀祝文致祭皇帝御衮服行禮又議準傳心殿奉安各神牌應行致祭遣禮部尚書一人行禮又諭傳心殿焚帛之處與屋檐相近遇風甚屬可虞著該部會同太常寺議奏欽此遵㫖議準傳心殿垣内地面窄狹無可移置之處祭前一日將焚帛鑪移於東門外寬闊潔淨之處竢焚帛畢仍移於内收貯又議準毎嵗御經筵後皇太子春秋會講均先詣傳心殿行祗告禮又定毎月朔望太常寺堂官一人供酒果上香行禮乾隆六年諭春秋舉行經筵例應先期祗告傳心殿當年皇祖曾經親詣行禮以昭誠敬今經筵屆期朕親詣傳心殿行禮所有應行事宜著該衙門察例具奏欽此遵㫖議準雍正四年經大學士等定議祗告之禮除嵗暮祫祭太廟有一定日期躬耕耤田必用亥日仍前一日祗告外其餘祭祀皆於本日祗告等語今年二月經筵應照例於本日祗告傳心殿皇帝御衮服行禮一應事宜均照康熙二十五年之禮欽定大清㑹典則例卷八十二
