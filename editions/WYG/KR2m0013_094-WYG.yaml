body:
  text: 禮部祠祭清吏司喪禮四一皇太子喪禮乾隆三年十月十二日端慧皇太子薨是日諭皇次子永璉乃皇后所生朕之適子爲人聰明貴重氣宇不凡當日蒙皇考命名永璉隱然示以承宗器之意朕御極以後不即顯行册立皇太子之禮者蓋恐幼年志氣未定恃貴驕矜或左右諂媚逢迎至於失德甚且有窺伺動摇之者是以於乾隆元年七月初二日遵照皇考成式親書密㫖召諸王大臣靣諭收藏於乾清宮正大光明匾之後是永璉雖未行册立之禮朕已命爲皇太子矣今於本月十二日偶患寒疾遂致不起朕心深爲悲悼朕爲天下主豈肯因幼殤而傷懷抱但永璉繫朕適子已定建儲之計與衆子不同一切典禮著照皇太子儀注行元年密藏匾内之諭㫖著取出將此曉諭天下臣民知之欽此遵㫖議準謹按會典内並未開載皇太子喪禮我朝典禮凡沖齡薨逝皆不成服今皇太子喪禮謹公同酌議除奉㫖辦理喪儀之王大臣暨由宗人府奏請奉㫖成服之王公及皇太子侍從執事人員咸應成服外其内府佐領内管領下官員䕶軍驍騎人等應以六百人成服王公官員齊集喪次咸素服摘冠纓紫禁城行走午門前朝會各衙門辦事公所仍綴纓緯皇帝素服七日若詣皇太子金棺處請摘纓緯親王以下有頂帶官員以上咸摘冠纓素服七日成服王公官員兵丁人等於初祭日除服直省官員於奉文之日咸摘冠纓素服三日在京四十日直省二十日停止嫁娶音樂再幼殤例無引旛今請照雍正年間懷親王喪儀仍用引旛其製造册寳贈諡號一應典禮交與各該衙門辦理奉㫖在京官員軍民人等初祭以内著停止嫁娶作樂直省於文到日爲始三日内停止嫁娶作樂又奏準應制服人員奏除上三旗侍衞九十人内大臣散秩大臣應成服者由領侍衞内大臣具奏請㫖外藩額駙王公台吉公主福晉郡主等於服内來京者摘冠纓去耳環朝鮮使臣在京令其素服七日又奏準本月十二日皇太子薨照例輟朝七日和碩親王以下奉恩將軍以上覺羅民公侯伯以下有頂帶官員以上公主福晉以下鎮國將軍一品夫人以上咸齊集奉㫖公主福晉等著於十三日齊集見今天氣寒冷嗣後每逢祭日齊集餘日不必齊集又奏準皇太子薨逝行文各省摘冠纓三日軍營非各省可比應令軍營官弁兵丁素服三日停摘冠纓又奏準上書房侍皇太子讀書大臣官員六人咸令成服又議準十三日辰時皇太子入金棺吉十六日卯時奉移吉金棺照例用枏木内襯采段素段七層發引日束以紅織金段三道幨帷咸用秋香色龍段設几筵陳銀五供百日内朝夕奠獻羮飯肴饌日中奠饌筵朝晡奠獻時儀駕全設奉移以前王以下各官咸齊集十六日奉移金棺於田村豫日行啟奠禮設儀仗陳冠服几筵前設祭品列饌筵於露臺兩旁設祭文案於殿東檐下用金銀定以紙爲之後仿此一萬楮錢一萬五色楮帛一萬饌筵十有五席羊七酒九尊王以下有頂帶官員以上公主福晉以下鄉君大臣命婦以上咸齊集禮部堂官奉祭文入設檐下西案上是日皇帝親臨祭酒竢上食畢讀祝官奉祭文於閾外正中北嚮跪衆皆跪哀暫止讀祭文畢舉哀祭酒三爵每祭遣官一叩衆隨行禮舉哀畢各退讀祭文官奉祭文内監奉冠服送至燎所燎畢各退奉移之日王公等於東華門外閒散宗室覺羅於景山後左翼各官於騎河樓西口右翼各官於景山東柵䦨漢官於地安門外齊集皇帝親臨視送屆時辦理喪儀王公大臣内務府鑾儀衞工部堂官率校尉等奉移皇太子金棺祭酒三爵每祭一叩金棺由東華門中門出登大轝禮部堂官祭轝祭酒三爵衆隨行禮靈駕發前列儀駕鞍馬二十七匹散馬二十三匹駝十有八執事王大臣官員左右翼衞成服之王公隨行侍衞班領率皇太子豹尾班槍六儀刀四後隨所過門橋遣散秩大臣一人祭酒靈駕所至王以下各官各於齊集處舉哀跪迎候過步送年老有疾王大臣及漢官豫往田村殯宮大門外齊集公主福晉以下大臣命婦以上豫於大門内齊集成服婦女於命婦後齊集靈駕至各舉哀跪迎王公大小官員咸於殯宮大門外分翼序立執事王大臣奉安金棺設几筵祭酒三爵衆隨行禮畢各退百日内奠獻不齊集成服之王公内有執事人員除服後分爲三班於奠獻時入内舉哀内府官員䕶軍驍騎人内以五十人爲一班更番入内舉哀祭文由翰林院撰擬饌筵尊酒由光禄寺羊隻由慶豐司近前饌筵由内管領楮錢次幕等物由工部豫備又奏準二十三日行初祭禮用金銀定楮錢各十有一萬畫段一萬楮帛五千饌筵六十三席羊二十一酒二十五尊皇太子儀駕全設是日皇帝親詣致奠親王以下入八分公以上大學士内大臣於二門外齊集民公侯伯以下有頂帶官員以上於大門外齊集近支王等福晉等於殯殿内齊集和碩福晉以下大臣命婦以上於二門内西旁齊集皇帝乗輿由中門入至月臺上降輿入殯殿於東旁坐讀祝官奉祭文至閾外正中跪讀哀暫止衆皆跪讀畢竢進饌畢進奠几大臣進爵皇帝於坐次祭酒三爵每祭衆皆行一叩禮乃徹饌皇帝囘鑾讀祝官奉祭文送燎所遣官祭酒三爵衆隨舉哀行禮畢各退大祭及百日致祭皆遣親王行禮是日成服人皆除服剃頭皇太子近前侍衛執事人内監等至百日後剃頭次日繹祭用金銀定楮錢各七千五百饌筵九席羊三酒三尊辦理喪儀大臣暨禮工二部内務府光祿寺堂官及内府成服官員男婦齊集二十七日大祭禮與初祭同次日繹祭與前次繹祭同十一月行初周月禮適逢齋戒改期初七日用金銀定楮錢各二萬五千饌筵十有七席羊七酒七尊設儀駕齊集行禮二三周月皆用金銀定一萬楮錢一萬一千饌筵十有一席羊五酒五尊百日致祭用金銀定楮錢各三萬楮帛一萬饌筵十有九席羊七酒七尊設儀駕照例齊集百日後每日三次奠獻周月致祭皆停止冬至歳暮清明中元皆設饌筵十有五席羊五酒五尊清明不焚楮帛進挂楮錢寳花一座中元冬至歳暮用金銀定楮錢各一萬五千皆不齊集期年致祭禮儀與百日同再皇太子金棺漆飾三十五次照欽天監擇吉於本年漆飾二三次竢明春再行漆飾又奏準十一月初六日行册諡禮命親王郡王爲正副使於前期一日遣官各一人祗告太廟後殿奉先殿至日鑾儀衞陳皇太子儀駕於田村殯宮大門外内府官設册寳案各一於几筵前左右設祀案於左鴻臚寺官設册寳案於太和門階上正中設采亭於階下正副使及執事各官咸素服於階下東旁序立内閣學士奉絹册寳大學士隨行升中階設各案上行一跪三叩禮退立階下之東禮部堂官引正副使由東階升詣册寳案前行一跪三叩禮興正使奉册副使奉寳由中道降階設采亭内一跪三叩興校尉舁亭前列黄蓋御仗由中道出正副使後隨内大臣侍衞於午門内金水橋跪送王以下奉恩將軍以上於午門外常朝處跪送侯過隨行采亭由長安右門出阜成門民公侯伯以下四品官以上豫往田村殯宮大門外分翼齊集竢采亭至跪迎亭入中門至二門止正副使詣亭前一跪三叩興奉絹册寳進殿陳設於案詣香案前上香宣册寳官各宣册寳如儀畢正副使行一跪三叩禮由殿西門出次鴻臚寺官引王以下入八分公以上於二門外引民公以下四品官以上於大門外按翼序立太常官引承祭官就拜位上香讀祝奠帛三獻爵行禮如儀禮成奉祝文絹册寳送燎所焚訖承祭官及衆官皆退正副使復命奏册諡禮成次日以册諡端慧皇太子禮成由部頒行各直省並行知朝鮮國王令該國王官員等於文到日素服三日軍民人等三日内不嫁娶不作樂其進香之處照例停止又奏準端慧皇太子百日後應照明悼恭太子止用素羞之禮每月朔望獻酒三爵供果實十有二盤㸃香燭行禮未葬之前每遇四時及周年禮仍照原議辦理其朔望致祭請㫖豫命内大臣散秩大臣數人輪流行禮四時及周年致祭由部奏遣王貝勒承祭十一月行周月致祭禮皇帝親臨祭酒儀與初祭同陳羊酒饌筵照原議行二三月奠皆承祭官將事四年期年小祥照百日禮陳設羊酒饌筵楮帛如數陳儀駕衆齊集皇帝親臨祭酒儀與初月祭同五年再期大祥設儀駕陳羊酒饌筵楮帛如數衆照例齊集皇帝親臨祭酒咸與期年儀同六年端慧皇太子忌辰一應祭儀與再期同七年忌辰親王以下奉恩將軍以上及内府官員咸齊集民公侯伯以下三品官以上一半齊集公主福晉命婦停止齊集餘儀與六年同是年奏準端慧皇太子園寢卜吉於朱華山動土興工遣工部堂官一人祗告后土司工之神八年奏準端慧皇太子金棺移送朱華山園寢明年山嚮不宜安奉請於今年卜吉安葬見在饗殿工程未竣請暫葢蘆殿致祭是年十月忌辰祭儀與七年同十一月初六日奉移端慧皇太子金棺恭送朱華山安葬先期一日行祖奠禮設儀駕衆齊集陳羊酒饌筵楮帛皆如啟奠皇帝親臨祭酒儀與期年同至日王以下奉恩將軍以上民公侯伯以下有頂帶官員以上於大門外齊集公主福晉以下尚書子一品夫人以上於柵闌内齊集竢皇太子金棺過跪舉哀金棺升大轝陳儀駕鞍馬八匹於前禮部堂官祭轝祭酒三爵乃啟行辦理喪儀王公大臣禮工二部堂官内務府總管及奏遣往送之王公内大臣侍衞皆隨行所過門橋皆禮部官祭酒沿途分爲四程每程豫蓋蘆殿安奉金棺畢奠饌筵一祭酒三爵送往之王公大臣官員皆隨行禮至園寢日在陵寢貝勒公及不直班之大小官員咸於朱華山附近處道右跪迎舉哀侯過隨行皇太子金棺入暫安蘆殿行遣奠禮奠饌筵一祭酒三爵送徃之王公大臣官員及齊集之貝勒公大小官員咸隨行禮十一日質明陳太平車於隧道於金棺前行遷奠禮用金銀定楮錢各一萬楮帛一萬饌筵十有五席羊七酒九尊設儀駕齊集行禮如儀屆時祭酒三爵奉移金棺升太平車祭酒三爵移太平車由隧道入地劵奉安石床掩閉劵門祭酒三爵衆舉哀隨行禮畢卒哭各退九年饗殿告竣製造神主遣禮部工部堂官各一人朝服上香行禮由部行文内閣兼書清漢端慧皇太子神位字樣刻字塡青均内閣禮部大臣上香行禮塡青畢奉安神主於櫝内供於饗殿東廡擇吉行題主禮至日豫設神座於饗殿正中設奠案五供香几於座前設主案於香案之東屆期禮部堂官啟櫝恭奉神主於案大學士詣案前行一跪三叩禮興西嚮題畢禮部堂官恭奉神主跪安神座行一跪三叩禮退題主畢陳牛一羊二帛一爵三承祭親王上香奠帛讀祝三獻行禮如儀禮成内府執事官恭奉皇太子神主安奉寢室四時行大饗禮一皇子喪禮順治年間定皇子榮親王薨逝追封榮親王治喪視親王加厚卜葬於黄花山園寢歳時祭饗康熙年間定凡皇子初殤皆備小式朱棺袝葬於榮親王園寢惟開墓穴平葬不封不樹雍正六年皇八子懷親王薨是日奏準皇八子薨逝金棺照例用枏木内襯五層漆飾十五次皇帝輟朝三日大内咸素服三日不祭神是日親王以下奉恩將軍以上民公侯伯以下騎都尉品級官員以上公主福晉以下二品夫人以上咸齊集奉移前每日二次供獻陳設親王儀衞至暫安處於祭日陳設儀衞奉移大轝用舁夫八十人由五城選用金棺前陳列儀駕鞍馬散馬各十有五駝八後隨豹尾槍四大刀四每過門橋皆祭酒金棺至東直門外外殯所奉安畢陳設五供祭酒三爵百日内日朝奠肴饌日晡奠饌筵各一初祭用金銀定楮錢各七萬饌筵三十有一席羊十有九酒十有九尊設儀衞遣官讀文致祭祭文由翰林院撰擬次日繹祭用金銀定楮錢各二千饌筵五席羊五酒五尊大祭如初祭次日繹祭如前繹祭周月致祭用金銀定楮錢各一萬饌筵十有五席羊九酒七尊百日致祭與月祭同未葬期年及中元冬至歳暮清明皆與月祭禮同惟清明不焚楮帛設挂楮錢寳花一座百日後停止月祭十三年十一月諭朕兄皇長子乃皇妣孝敬皇后所生朕弟皇八子素爲皇考所鍾愛當日曾以親王禮殯葬今朕眷念手足之誼均著追封親王一切應行典禮著宗人府㑹同禮部察例具奏欽此遵㫖議準追封親王諡號由内閣擬字進呈恭候欽定應用紙册由工部製備册文由内閣翰林院撰書封諡日期由欽天監選擇屆期由部奏遣大臣各一人前往殯處讀文致祭祭日設金銀定楮錢各一萬饌筵十有五席羊九酒七尊宣讀册文祭畢同祭文送燎祭文由翰林院撰擬祭品由各該衙門備辦見今修造園寢竢安葬後照封諡字樣製造神牌遣大臣往祭安設饗堂每年清明中元歳暮皆照例祭祀乾隆三年黄花山端親王金棺皇三子金棺於十月二十二日移送東直門外懷親王金棺於二十六日移送陳設儀衞隨行沿塗各蓋蘆棚咸於十一月初五日安葬又議準端親王懷親王皇三子既葬後每年中元歳暮致祭各用金銀定二千楮錢一千清明用挂楮錢寳花皆肴饌一饌筵一羊一酒一尊十三年正月初一日悼敏皇七子薨逝是日諭皇七子永琮毓粹中宮性成夙慧甫及兩周岐嶷表異聖母皇太后因其出自正適聰頴殊常鍾愛最篤朕亦深望教養成立可屬承祧今不意以出痘薨逝深爲軫悼建儲之意雖朕衷黙定而未似端慧皇太子之書㫖封貯又尚在襁褓非其兄可比且中宮所出於古亦無遭殤追贈槩稱儲貳之理但念皇后名門淑質在皇考時雖未久承孝養而十餘年來侍奉皇太后承歡致孝備極恭順作配朕躬恭儉寛仁可稱賢后乃誕毓佳兒再遭夭折殊難爲懷皇七子喪儀應視皇子從優著該衙門遵㫖辦理送入朱華山園寢欽此又議準皇七子薨逝擇吉於初二日奉入金棺照懷親王之例金棺用枏木執事官員内監等摘冠纓不成服除齋戒王公不齊集外其餘王大臣公主福晉照例齊集初四日奉移曹八里屯暫安設親王儀衞鞍馬散馬各十有五匹駝八百日内遣散秩大臣一人侍衞三十人在喪次大祭後執事人員皆綴冠纓百日後剃頭初祭大祭皆讀文致奠百日内日奠肴饌饌筵皆照懷親王例辦理再皇七子繫出痘薨逝所有應焚楮帛暫存貯統於百日致祭時送燎初六日由内閣鈔出追贈皇七子諡曰悼敏皇子十一日行初祭禮用金銀定一萬楮錢一萬饌筵三十一席羊十有九酒九尊親王以下奉恩將軍以上民公侯伯以下四品官以上公主福晉以下大臣命婦以上咸齊集讀文祭酒行禮如儀次日繹祭用金銀定楮錢各二千饌筵五席羊五酒五尊内務府官員齊集行禮二十三日行大祭禮皇帝親詣祭酒三爵餘與初祭同次日繹祭與前繹祭同二十七日行周月奠獻禮用金銀定楮錢各一萬饌筵十有五席羊九酒七尊衆齊集行禮與初祭同二三周月致祭儀同四月初七日行百日致祭禮陳金銀定楮錢各一萬饌筵十有五席羊九酒七尊齊集行禮與周月同又奏準本月十七日奉移悼敏皇子金棺於朱華山園寢二門外暫安版房内先期於十五日行禮奠禮用金銀定楮錢各一萬饌筵十有五席羊九酒五尊陳儀衞衆齊集至日親王以下四品官以上咸於大門外齊集公主福晉命婦於二門内齊集内管領祭酒三爵奉金棺升大轝衆咸於齊集處候過立舉哀内務府堂官祭轝祭酒三爵金棺啟行前列校尉於馬上陳儀衞鞍馬八匹金棺後内監等隨行次内府䕶軍叅領䕶軍校領執豹尾槍佩儀刀䕶軍隨行過門橋禮部官祭酒禮工二部堂官各一人及在喪次行走之散秩大臣侍衞等咸送往八旗官各一人兵八十名左右翼副都統二人隨往䕶衞沿塗分爲四站豫蓋蘆棚毎站分爲三十班每班夫八十名各備夫四名及夫頭等咸服綠段繡獅花衣各城御史司坊等官照例前往約束各部院郎中以下主事小京官以上各旗叅領以下散秩官員以上每班各四人鑾儀衞官四人更番指引進退金棺至蘆棚奠饌筵一内管領祭酒三爵衆隨行禮每日駐宿處皆如初將至園寢在陵貝勒公大臣及不直班之官員咸於朱華山附近處候迎金棺於道右立舉哀候過隨行至朱華山園寢安奉版房奠饌筵内管領祭酒三爵送往之王大臣官員並在陵齊集之貝勒公大臣官員咸隨行禮二十三日行暫安禮致祭陳設禮儀與前奉移禮同禮畢衆各退入劵以前四時致祭照懷親王例期年内歳暮清明及中元冬至皆照周月禮用金銀定楮錢各一萬饌筵十有五席羊九酒七尊清明設挂楮錢寳花一座期年適逢歳暮改期於二十七日照百日禮致祭見在劵工未竣毎祭應用饌筵羊隻楮帛等物交陵寢禮部工部内務府總管辦理祭日以陵寢官祭酒九月二十五日奉悼敏皇子金棺安葬先期行奉安禮用金銀定楮錢各一萬饌筵十有五席羊九酒五尊在陵之貝勒公大臣官員咸齊集祭畢祭酒三爵移金棺近隧道屆時祭酒三爵移金棺入地劵安奉石牀掩閉墓門畢祭酒三爵衆隨行禮各退是日儀衞皆焚訖又奏準悼敏皇子金棺安葬後製造神主於端慧皇太子龕内東旁安設四時之祭增爵三帛一不請神主出龕祝文内增書悼敏皇子諡號於端慧皇太子之次又奏準悼敏皇子神主工竣於十一月初二日刻字初三日填青初五日題主奉㫖命内閣學士一人禮部侍郎一人題主十五年三月十五日皇長子定安親王薨是日諭皇長子誕自青宮齒序居長且年逾弱冠誕育皇孫今遘疾薨逝朕心深爲悲悼宜備成人之禮著追封親王一切喪儀該部詳察典禮具奏至彌留之際遷移外所以便殯歛雖屬内廷向例但當沉綿疾亟令其遠遷朕心實有所不忍况園亭不同大内著即於皇長子所居别室治喪其親王爵即令皇長孫綿德承襲朕近年屢遭哀悼之事於至情實不能已侍奉慈闈自當以禮節情且皇長子幼而質弱朕加恩顧復念其未能承受厚福原非端慧皇太子悼敏皇子望其可屬承祧者比雖父子至情實不能忍而輕重所繫朕豈不知明諭至此諸王大臣可不必爲朕過慮矣欽此是日奏準皇長子薨逝金棺照例用杉木漆飾十五次内襯錦綺五層皇帝輟朝三日衆素服三日和碩親王以下奉恩將軍以上民公侯伯以下騎都尉品級官員以上公主福晉以下二品官命婦以上咸齊集男摘冠纓女去首飾皇長子福晉側福晉及所生皇孫皇孫女咸成服剪髪摘耳環至百日除服剃頭二十七月内素服所屬婦女内監近侍皆成服剪髪摘耳環百日除服剃頭奏遣近支王公成服於大祭日除服剃頭散秩大臣三人侍衞六十人及内管領二人内務府委出佐領下男婦成服於大祭日除服百日剃頭每日奠獻二次設儀衞至十七日奉移以後停止奉移之日衆齊集金棺前列儀衞鞍馬散馬後以内府䕶軍叅領率内府䕶軍執豹尾槍四佩大刀四隨行禮部官祭酒三爵乃啟行所過門橋禮部官祭酒至靜安莊暫安處禮部堂官祭酒三爵安奉畢衆各退百日内日朝奠肴饌筵晡奠果饌筵各一皆内管領祭酒初祭大祭滿月百日等致祭皆禮部堂官一人祭酒初祭用金銀定楮錢各七萬畫段一千各色楮帛九千饌筵三十一席羊九酒九尊讀文致祭衆齊集祭文由翰林院撰擬次日繹祭用金銀定楮錢各二千饌筵五席羊五酒五尊大祭如初祭禮次日繹祭如前繹祭禮周月百日四時期年等祭咸照懷親王例百日後四時之祭不齊集不設儀衞奉㫖發引著於十九日移送以前著三次奠獻十六日諭内務府禮部等議皇長子和碩親王喪於第三日移殯靜安莊東園輟朝三日等語定議之意想因皇長子别室近在御園之内不欲延留恐傷朕心其輟朝之期亦照親王定例但三日移殯爲時太速朕實有所不忍且齒序居長理當從優著改於第五日發引殯既未移亦不忍遽易常服視事著輟朝素服五日欽此十八日遵㫖奏準皇長子薨逝欽奉諭㫖追封親王應請封號嘉名交與内閣撰擬諡號由宗人府具題請㫖交内閣撰擬均進呈欽定令欽天監擇日追封翰林院内閣撰擬冊文祭文製造紙冊各衙門備辦祭品由部奏遣大臣一人前往讀文致祭宣讀冊文陳設儀衞照例齊集是祭用金銀定楮錢各一萬饌筵十有五席羊九酒七尊祭畢冊文同祭文送燎至建立神主事宜於相度寢園已定後交各該衙門照例辦理其皇長孫襲封親王之處應竢受封日將應行典禮再行具奏又議準皇長子喪禮五日素服以後初祭以前大臣官員咸常服不挂素珠初祭以後挂素珠四月初一日起照常用補服二十三日行初祭禮皇帝親詣致祭於東旁坐祭酒三爵每祭皇孫及衆行一叩禮餘儀悉照原議二十七日諭皇長子定安親王之事大臣官員等皆未剃頭是因皇子尚未分封向無成例衆人皆欲於大祭後剃頭此意固是但未遇齋戒可以過大祭剃頭今遇大祀陪祀大臣官員等若不剃頭於齋戒之意不符執事並陪祀大臣官員等皆著於四月初一日剃頭其餘照常於大祭後再行剃頭欽此又奏準四月初五日皇子等致祭和碩定安親王一次羊酒祭筵祭物咸與周月禮同二十五日近支親王等致祭五月初三日公主等致祭禮同是日皆陳設儀衞王公官員福晉命婦等咸齊集初六日奏準謹按冊封親王定例均頒給冊寳遣正副使持節往封而追封之禮從前謹備紙冊遣官承祭儀式稍屬參差今此次追封和碩定安親王應於紙冊外增設紙寳塡寫欽定封號嘉名以昭備物竣追封日遣正副使同冊文恭送前往宣讀致祭所需紙寳交該衙門製備初九日行大祭禮皇帝親詣祭酒儀與初祭同二十三日奏準本月二十九日遣正副使詣定安親王殯前追封致祭是日王公官員福晉命婦照例齊集設親王儀衞於殯所大門外内府官設冊寳案於左右設香案於正中設祭文案於東檐下鑾儀衞設采亭於午門前正副使素服詣内閣冊寳前一跪三叩恭奉由午門中門出置於亭跪叩如前校尉舁亭前列御仗黄蓋執事官素服隨行由端門天安門長安左門中門出由東直門至靜安莊入正門至殯所大門外亭止正副使詣亭前一跪三叩正使奉冊副使奉寳由中門入陳於案行一跪三叩禮退至門内嚮上立讀祝官奉祭文設於案正使詣香案前上香復位立宣冊寳官各詣案前以次宣冊寳畢復於案正副使行一跪三叩禮由左門出立於左旁乃進饌讀祝官奉祭文詣正中跪正使詣奠几前跪衆皆跪讀文畢正使祭酒三爵每奠一叩衆隨行禮畢徹饌恭奉祭文冊寳送燎祭用金銀定楮錢各一萬饌筵十有五席羊九酒七尊祭文内書正使之名正副使由部將領侍衞内大臣散秩大臣内閣學士禮部堂官職名具奏恭候欽命又奏準五月十五日月祭適逢北郊齋戒之期應改於十三日又奏準六月十五日月祭二十五日百日致祭皆適逢小暑應照例於奠畢時將楮錢同衣冠收貯竢中元日送燎又奏準定安親王喪儀自百日至期年每月朔望增饌筵一羊一再期及三年皆照期年禮期年後安葬以前四時致祭皆饌筵七席金銀定楮錢各二千五百羊三酒三尊清明設挂楮錢寳花一座二十七月照百日禮致祭期年之祭陳儀衞衆齊集四時之祭不設儀衞停止齊集王福晉等皇孫等咸遵㫖於百日除服十七年二十七周月適逢小暑照例將楮錢收貯於中元送燎餘悉照原議如百日禮是年九月奏準本月十七日和碩定安親王金棺移送園寢先期於十五日行祖奠禮用金銀定楮錢各一萬饌筵十有五席羊九酒五尊陳儀衞衆齊集至日内務府總管祭酒三爵和碩親王以下奉恩將軍以上民公侯伯都統尚書子以下佐領騎都尉等官以上於大門外按翼齊集公主福晉以下二品夫人以上各照原齊集處序立候金棺至各舉哀金棺升大轝禮部堂官祭轝候金棺啟行各退金棺前校尉於馬上陳列儀衞金棺後令内監等及内府䕶軍叅領䕶軍校䕶軍等以次執豹尾槍佩大刀隨行所過門橋禮部官祭酒禮部工部内務府堂官及辦理喪儀之王大臣原成服之王公侍衞散秩大臣侍衞等咸往送八旗每旗官一人每翼副都統一人兵八十名行走道路酌量修理每站分爲三十班每班夫役八十名豫備夫四名咸交與五城選用各服綠段繡獅花衣各城御史司坊官部院衙門郎中員外主事小京官八旗叅領以下等官每班四人管束夫役鑾儀衞官更番指示進退咸與前奉移時同沿塗分爲三宿豫蓋蓆棚福晉皇孫於蓆棚後住宿金棺至宿處内務府堂官祭酒三爵衆隨行禮每宿次皆同至園寢日安奉畢祭酒三爵衆隨行禮九月二十日行遣奠禮衆齊集陳羊酒饌筵楮帛如祖奠二十五日行奉安禮設饌筵一羊一楮錢五萬陳儀衞衆齊集奠獻行禮畢福晉皇孫豫往墳園候移金棺近園寢祭酒三爵至吉時安於石牀畢掩閉石門内務府總管祭酒三爵衆隨行禮焚儀仗訖各退每年清明及中元歳暮奠設肴饌果饌各一羊一酒一尊清明設挂楮錢寳花一座歳暮用金銀定楮錢各一千其神主龕及祭器等項交工部製造又奏準定安親王奉安園寢在密雲縣董家莊距皇陵遙遠所需祭品不能歸幷陵寢辦理每年照親王例清明及中元歳暮三次致祭饌筵羊酒應由内務府令内尚茶尚膳房委人前往豫備竢定親王分封出府後一切祭祀交王府自行奠獻又奏準定安親王神主安奉饗堂應遣滿漢大學士各一人題主内閣學士禮部堂官各一人監視刻字填青奉㫖命内閣學士一人禮部侍郎一人題主欽定大清㑹典則例卷九十
