body:
  text: 禮部儀制清吏司風教一名宦郷賢崇祀順治元年定名宦鄉賢風教所關提學官遇有呈請務須覈實確據若有受人請求妄舉者師生人等即以行止有虧論其從前冒濫者徑自革除雍正二年覆凖名宦鄉賢相沿嵗久冒濫實多行令各省督撫學臣秉公詳察如果功績不愧名宦學行允協鄉評者將姓名事實造册具結送部覈準仍許留祀若無實蹟報部革除嗣後有呈請入祀者督撫學臣照例報部覈明如私自批行入祀事覺將請託與受託人等治罪出結具詳地方官一并議處三年覆凖名宦鄉賢照旌表節婦嵗終彚題例令各省督撫學臣秉公察覈每年均於八月以前彚題並將事實册結送部詳察庶免冒濫入祀之弊乾隆十四年遵㫖議凖名宦鄉賢嗣後督撫題報到日該部務確覈事跡倘名實不能相副即秉公指駮將詳報不實之地方官照例題叅庻名器不致濫邀而教化益臻純備二十年諭直省建立名宦鄉賢祠即古者瞽宗之祀所以崇徳尚賢與斯祀者必其人實可當之無愧方足以光俎豆而式鄉閭其典綦重近時大臣中有以祖父得把鄉賢具奏謝恩者夫大臣身居九列部臣督撫誼屬同官彼此瞻狥勢所不免即使採訪悉為公當而悠悠之口難保其必無遺議又况名實未必盡孚者乎且入祠既多朝貴先人則潛徳韜光之正士必且恥與為伍崇祀大典將不以為榮而以為辱至實在政績茂著徳望皆隆者或子孫不能自振必轉致湮没無傳矣當其具呈公舉雖托之輿論而主持為首者乃繫婣族衿士貢諛徵賄何所不有風勵激勸之謂何不亦瀆典章而褻名器乎朕亦非謂大臣祖父必不可入祀也果使政事人品足為矜式自必久而益彰何妨待之十數年後而必及其子之備位大僚亟亟題請以至公之舉而冒至私之名乎嗣後見任九卿祖父槩不得題請入祠其身後鄉評允當者聽著為令欽此一旌表節孝順治五年題凖孝子順孫義夫節婦自元年以後曽經具奏者仍行廵按再為覈實造册報部具題旌表九年諭諸王宗室覺羅内有孝友義順及守節貞烈者宗人府覈實具奏交禮部題請旌表欽此又題凖直省孝子順孫義夫節婦州縣官申府府申道道申廵按御史廵按御史覈實奏請下部察勘覆凖旌表滿洲䝉古漢軍孝子順孫義夫節婦該管佐領驍騎校送參領參領送都統副都統都統副都統送部由部覈實奏請旌表又題凖割股或致傷生卧氷或致凍死恐愚民仿效不凖旌表十年題凖宗室内節孝者各依等第頒發恩賜親王固倫公主親王適福晋給銀百兩段十六疋世子和碩公主親王側福晉世子福晉給銀九十兩段十四疋郡王郡主世子側福晉郡王適福晉給銀八十五兩段十二疋貝勒縣主郡王側福晉貝勒適夫人給銀八十兩段十一疋貝子貝勒側夫人郡君貝子適夫人給銀七十五兩段十疋鎮國公貝子側夫人縣君鎮國公夫人給銀七十兩段九疋輔國公鎮國公側室鄉君輔國公夫人給銀六十五兩段八疋鎮國將軍輔國公側室給銀六十兩段七疋輔國將軍鎮國將軍夫人給銀五十五兩段六疋奉國將軍輔國將軍夫人給銀五十兩段五疋奉恩將軍奉國將軍淑人給銀四十五兩段四疋奉恩將軍恭人給銀四十兩段三疋鎮國将軍輔國將軍奉國將軍奉恩將軍女及閒散宗室並妻女給銀三十五兩段二疋以上均由戸部頒給由内院撰勅一道奨諭凡旌表貞烈者自固倫公主親王福晉以下輔國公夫人以上欽賜羊酒紙張内院撰文遣官致祭鎮國將軍夫人以下閒散宗室妻女以上部給羊酒紙張内院撰文遣官致祭凡覺羅内有節孝者給銀三十兩段一疋有貞烈者給羊酒紙張内院撰文遣官致祭又題凖凡旌表節孝在直省府州縣者官給銀三十兩滿洲䝉古漢軍支户部庫銀三十兩聽其自行建坊十二年題凖各直省孝子順孫義夫節婦各該督撫於每年十二月照例覈實具奏禮部覆覈分别題請旌表滿洲蒙古漢軍令叅佐領察實保送都統副都統再加覈實嵗終送部分别題請旌表十三年題凖親王薨妾媵殉節者禮部給羊酒紙張内院撰文遣官致祭十四年題凖凡婦人已受誥封者不更旌表十五年定直省有實在孝子撫按確勘詳開事實具題由部覆覈確實請勅吏部考試酌量選授官職如有冒濫揑報將原舉官叅處十七年題凖廣西殉難婦女有親屬者給銀建坊無親屬者共支銀六十兩立碑通鑴姓氏以表貞烈十八年諭滿漢節婦凖一體給米欽此康熙六年議凖民婦三十嵗以前夫亡守節至五十歳以後完全節操者題請照例旌表七年定貞節婦女實行逐一開明取具親戚該管官保結詳加覈實送部不得僅以年嵗已及草率濫送十一年議凖强姦不從以致身死之烈婦照節婦例旌表地方官給銀三十兩聽本家建坊十四年題凖凡節婦已經覈實到部者雖病故亦凖彚題旌表二十七年諭夫亡從死前已屢行禁止近見京城及各省從死者尚多人命關繫重大死亡亦屬堪憐修短聽其自然豈可妄捐軀體况輕生從死事屬不經若復加褒揚恐益多摧折嗣後夫歿從死旌表之例應停止自王妃以下及小民婦人從死永行嚴禁如有必欲身殉者赴部及該管官司陳訴竢奏聞定奪欽此三十五年題凖節婦自三十嵗以内守節至五十嵗者即行旌表過五十者將遲延縁由報部三十七年諭興起教化鼓舞品行必以孝道為先孝子尤宜褒奨八旗貧人克盡孝道誠為非易如有盡孝於其父母者覈實奏聞欽此五十一年題凖鑲紅旗有受聘未婚之女聞訃剪髪成服居夫墓側守節三年從容自縊與尋常輕生者不同奉㫖照例旌表五十二年覆準民間貞女未婚聞訃矢志守節絶食自盡照例旌表五十四年覆凖有孀婦撫子守志因親屬逼嫁投繯原非激烈輕生照五十二年貞女例旌表五十九年覆凖節孝昭著所司不覈明詳報者交部議處所屬上司不轉詳題請旌表者交部一并議處通行八旗直省一例遵行雍正元年諭恩詔内開旌表節義乃彰善大典每見直省地方有力之家尚能上逹而鄉村貧寠之人則多湮没無聞著該督撫學臣及有司遍加採訪務使苦寒守節之家同沾恩澤至節婦年逾四十而身故計其守節已逾十五載以上者亦應酌量旌奬欽此遵㫖議定凡八旗直省督撫學臣令所在有司遍加採訪凡有節義之人從前因無力不能上逹者悉行申報督撫學臣其守節十五載以上逾四十而身故者亦令各該地方官據實報明一例旌表直省督撫學臣覈實於嵗終彚題八旗都統於嵗終彚送禮部由部每年二月内將前一嵗八旗直省題送孝行節義彚題請旌永為定例又諭恩詔内開旌表節義給銀建坊民間往往視為具文未曽建立恐日久仍至泯沒不能使民有所觀感著於地方公所設立祠宇將前後忠孝節義之人皆標姓氏於其中已故者則設牌位於祠中祭祀用闡幽光而埀永久其建坊銀仍照舊支給欽此遵㫖議凖設立祠宇應行順天府奉天府直省府州縣衛分别男女每處各建二祠一為忠義孝弟祠建於學宫之内祠門内立石碑一通將前後忠義孝弟之人刋刻姓氏於其上已故者設位祠中一為節孝祠别擇地營建祠門外建大坊一座將前後節孝婦女標題姓氏於其上已故者設位祠中八旗分左右翼擇地各建二祠一應碑坊刋題姓氏皆照此例每年春秋二次致祭直省交與各府州縣衞守土官兩翼交與大宛二縣其建立祠宇碑坊銀各省府州縣衞動用正項錢糧修造仍報工部奏銷左右兩翼祠宇碑坊交與工部營造仍令各所在有司不時修葺三年議準兵民節烈原宜一例旌表因事由學校以致營伍未經舉報行令直省督撫提鎮學臣宣諭該地方文武官弁詳察營伍中有三十嵗以内守節至五十嵗以後及守節十五載以上年踰四十身故者出具印結移該學教官照民間取結之例加具印結申報州縣轉詳督撫學臣具題由部彚請旌表永為定例如有隠漏不報及冒濫妄舉等弊察出將該管官題叅處分又覆凖孝女以父母未有子姓終身奉親不嫁照孝子一例旌表四年鑲白旗貞女未婚聞壻病故自盡家人救甦至次日剪髪摘環哭徃壻家願終身守墓該旗都統奏請旌表奉㫖如此貞節甚屬可嘉理應旌表又覆凖雲南總督具奏順治十六年有監生遭流寇被害妻妾及女皆投崖而死至今無嗣照廣西殉難婦女無親屬之例令該地方官支銀六十兩立碑通鑴姓氏又有民人妻妾投水自盡見遺一子照廣西殉難婦女有親屬之例給銀三十兩自行建坊其節孝祠内設位題坊悉照恩詔定例遵行五年覆凖定例旌表孝子順孫義夫節婦惟孝婦旌表未有成例但婦女孝行無虧宜邀旌典應準給建坊銀三十兩其節孝祠題坊照恩詔遵行又諭各省建立忠義節孝祠表揚徳行著行文各省督撫詳加察勘有無冒銷果否堅固之處不得稍有朦溷並令各地方官將建立祠宇造入册内前後交代欽此六年諭據福建廵撫奏稱孝子李盛山割肝救其母者母病愈後孝子傷重自故請加旌表部議以割肝乃小民輕生愚孝向無旌表之例應不凖行朕念割肝療疾事雖不經而其廹切救母之心實難得而可憫已加恩凖其旌表矣嘗讀韓愈之文曰母疾則止於烹粉藥石以為事未聞毁傷肢體以為養茍不傷於義則聖賢當先衆而為之矣又讀朱子書曰割股固自不是若誠心為之不求人知亦庻㡬今乃有以此要譽者是先儒論及此者屢矣本朝順治年間定例割股或致傷生臥氷或致凍死恐民仿效不凖旌表伏思我世祖章皇帝聖祖仁皇帝臨御萬方立教明倫與人為善而於此例慎於旌表者誠天地好生之盛心聖人覺世之至道視人命為至重不可以愚昧而誤戕念孝道為至𢎞不可毁傷正理立法垂訓實有深意存焉但向來地方有司未嘗以聖賢經常之道與國家愛養之心明白曉諭開導編氓是以愚夫愚婦救親而捐軀殉夫而殞命者往往有之既有其事若不予以旌表恐無以彰其苦志而慰其幽魂所以數十年來雖定不予旌表之例而仍許其奏聞且有邀恩於常格之外者仰見聖祖皇帝哀矜下民之聖心固如是之周詳而委曲也孝經曰身體髪膚受之父母不敢毁傷孝之始也孟子曰事孰為大事親為大守孰為大守身為大此皆言人子一身乃父母之遺體雖一髪一指不可偶有虧損以傷父母之所遺也孔子曰父母惟其疾之憂蓋父母愛子之心無所不至偶有疾病尚以為憂設有不肖忤逆之子父母且恕而矜之其純孝之子而父母之憐愛又當如何也豈有以已身患病之故割其子之肝肉充飲饌而和湯藥其父母之心斷無不驚憂怵惕不安之理若因此而至於傷生又豈所忍聞者乎夫父母有疾固人子所當盡心竭力之時而孝道多端實不容効命捐軀於一節孔子曰生事之以禮死𦵏之以禮祭之以禮是人生孺慕之誠原通百年而無間者也人子一人承先啟後負荷甚鉅若舍生殞命於倉卒之間而忘宗祀繼續之重恐非所以為孝也况人子於親本乎天性倘能盡至誠純孝之實則親病雖篤呼籲請禱力省一身之過誓願為一正人如此必能感天地動鬼神何須割肝刲股以為回生之良劑乎家庭之行惟在至誠至敬善體親心不必以驚世駭俗之為著竒於日用倫常之外也至若婦人從一之義醮而不改乃天下之正道而其間節婦烈婦亦有不同者烈婦以死殉夫慷慨相從於地下固為人所難能然烈婦難而節婦尤難蓋從死者取决於一時而貞守者必閲夫永久從死者致命而遂已而守貞者備嘗其艱難且烈婦之殉節捐軀其間情事亦有不同者或廹於貧窶而寡自全之計或出於憤激而不暇為日後之思不知夫亾之後婦職之當盡者更多上有翁姑則當奉養以代為子之道下有後嗣則當教育以代為父之道他如脩治蘋蘩經理家業其事難以悉數安得以一死畢其責乎是以節婦之旌表載在典章而烈婦不在定例之内者誠以烈婦捐生與割肝刲股之愚孝其事相類假若仿效者多則戕生者衆為上者之所不忍也向來未曾通行曉諭朕今特頒諭㫖著地方有司廣為宣布務期僻壤荒村家諭戸曉俾愚民咸知孝子節婦之自有常道可行而保全生命之為正理則倫常之地皆合中庸不負國家教養矜全之徳矣倘訓諭之後仍有不愛軀命蹈於危亡者朕亦不槩加旌表以成閭閻激烈之風長愚民輕生之習思之思之特諭欽此八年江西廵撫以夫亡從死未婚烈女二人請旌經部具題請㫖仍恩凖旌表十一年議準河南商水縣十二嵗㓜女婁氏拒姦致死當幼稚之年守正不汚實属貞烈應照例旌表以慰幽魂並令該地方官設位於祠十三年諭凡烈婦輕生從死昔年聖祖仁皇帝曽降㫖禁止朕於雍正六年又降㫖曉諭至周至悉數年以來因各省奏請旌表烈婦者尚少朕是以格外加恩凖其旌表今數日之内題奏殉夫盡節烈婦烈女多至十數人直隸則有田氏等五名江蘇則有許氏等四名可見地方官未將從前諭㫖剴切曉諭鄉曲愚民尚未深悉聖祖仁皇帝與朕重惜民命之至意以致民間婦女激烈捐軀者更多於前嗣後若槩予旌表恐轉相則效易至戕生深可憫惻著地方有司將朕前㫖廣為宣布俾遐陬僻壌家諭戸曉倘宣諭之後仍有不顧軀命輕生從死者不槩予旌表以長閭閻憤激之風欽此是年十月覆凖婦人守節有受封在先夫死在後之命婦仍照例無庸旌表其三十嵗以前夫死守節迨撫孤成立之後因子顯逹始獲受封應一例旌表以發潛徳以廣皇仁又議準舉報節孝向例皆由生監具呈經縣申府以至司撫其中衙門甚多胥吏輾轉弊端百出應令各直省督撫飭所屬州縣將一應例合旌表之節婦並貞女孝子詳悉條例遍示鄉城士民令本家開載事實具呈並飭鄉鄰族長於具呈日一并據實投逓甘結該學該州縣覈其事實確據即行加結詳報該督撫確覈存案據實彚題無庸徃返駮詰致滋弊端至於給坊銀亦應令本家具領當堂騐發不經吏胥之手庻潛徳幽光不致湮没而旌揚盛典亦無遺漏之處乾隆元年順天府尹以未婚之女自縊殉夫題請旌表經部定議節烈輕生事在奉㫖禁止之後不便凖旌具題奉㫖著加恩旌表二年議凖舉報節孝該州縣學確覈加結徑詳督撫學政覈實彚題仍備文申報府司存案其各直省凡有節孝並令督撫主稾㑹同學政具題以昭畫一三年貴州廵撫以黄平州烈婦郭氏遇逆苗猖獗舅姑及夫皆被害氏激烈罵賊觸石而死幼女二姑年十五嵗同母殉節家童關保年十二嵗背負家主幼子避難全生均應題請旌表經部覈議以烈婦母女例得旌表至家童向無旌表之例而幼童關保年僅十二似兹忠義實屬可嘉可否凖予旌表以示風勵具題請㫖奉㫖著加恩旌表六年議凖道姑雖不在兵民婦女之列而禦暴全貞實為貞烈應照例旌表又議凖粤西遣婦以僉遣夫亡孤踪殉節與激烈輕生者有間應予旌表以闡幽貞七年議凖童養之妻尚未成婚而能以禮自持堅拒夫之和姦因而致死應照例旌表令建坊於烈女父母之門十年議準節孝於生前題坊至旌表後身故者應一例入祠以示風勵又議凖曽經旌表之節孝間有一二貧苦難以存立之人應令督撫分飭各州縣覈實取具鄰族及印官各結酌量給與口糧俾存活有賴不致失所十一年議凖旗人已經開戸之節婦雖與見在戸下服役者不同究與良家子有間應止許給銀建坊其節孝祠内題坊設位之處悉行停止以昭名分以别等威十四年遵旨議準旌表節孝乃朝廷風化所關必視良有司奉行以實斯徳意及於閭閻而觀感興於衆庶嗣後舉報節孝請令直省督撫訓示地方有司實心體訪諮於學校詢於輿論如繋夫亡守志舅姑年老無依婦兼子職奉養終身或宗祧所繋藐孤夐孑撫育有成以綿嗣續或外廹强暴毁形見志事近捐軀終保貞潔或境處單㣲甘心荼蓼饑寒并廹秉節念堅如斯之類孝義兼全阨窮堪憫允宜亟為表彰具結詳報督撫學臣秉公覈定彚疏題請旌表給銀建坊殁後致祭祠内以光俎豆其在荒村僻壤孤苦單寒舉報無力易至隠没者尤宜搜訪詳報以昭顯幽闡㣲之義如因仍故習委之隣族呈報胥役覆覈以致舉報不實單寒遺漏均照定例叅處督撫不據實糾叅别經發覺亦交部議處至於尋常守節者原有表閭之例應令地方官於本家呈報時覈其年例相符詳明督撫學臣酌量給匾嘉奨附疏彚題仍於祠内官為立石竢身殁之後鐫題姓氏以免湮没無庸建坊祠祀八旗節孝亦照此例畫一辦理十五年覆凖尋常守節之節婦於題凖後照欽定清標彤管字様給與匾額一旌表義行雍正二年覆凖湖廣黄岡縣民鄧一隆八世同居家逾百口閨門雍睦給與建坊銀三十兩表其坊曰八世同居之門十年題準湖南沅江縣生員譙衿七世同居孝友敦篤給建坊銀三十兩於忠孝節義祠内題碑並奉特賜御書世篤仁風四字以彰義門是年以陜西武功縣生員李倬同州生員劉運惇七世同居具題請旌奉㫖據陜西廵撫奏稱武功縣生員李倬同州生員劉運惇承家孝謹七傳皆合族而居懇請旌揚以光盛典等語李倬劉運惇同居七世敦睦可風著照湖廣譙衿例朕親書匾額頒賜以示嘉奬其建坊題碑之處仍著照例行欽此御書賜李倬敦睦可風四字劉運惇敦本厚俗四字乾隆二年題凖山西翼城縣生員李煊七世同居給銀建坊於忠孝節義祠内題碑是年奏凖民間有捐資周急惠濟本鄉者經該督撫旌表均應遵照欽定樂善好施字様永為成式由部覆本内聲明頒給十年題凖江南桐城縣監生錢雲鳳共㸑百口同居七世應準其旌表建坊題碑與二年例同十六年題凖陜西富平縣民韓文星同居一十二世共㸑八十一人華隂縣舉人李睿聚族而居一門八代同堂共食五十二人均凖旌表建坊題碑與十年例同十八年題凖福建漳州府貢生陳荗椿六世同居應凖旌表建坊題碑與十六年例同一百嵗旌表康熙九年議凖命婦孀居夀至百嵗者題明給與貞夀之門匾額建坊銀三十兩四十二年覆凖老民年登百嵗者照例給與建坊銀並給昇平人瑞匾額老婦夀至百嵗建坊懸額與命婦同雍正六年諭年届一百一十八嵗之人實為希有著於定例賜坊銀三十兩外加增兩倍共賞銀九十兩嗣後年至一百一十嵗加一倍賞賜至一百二十嵗者加兩倍賞賜更有多得夀算者按其夀算加增著為定例欽此乾隆元年題凖湖北江夏縣夀民湯雲山年届一百三十一歲請照雍正四年加倍賞賜之例於坊銀三十兩外再加三倍賞賜共給一百二十兩奉㫖著加賞上用段一疋銀四十兩欽此五年題凖正黄旗夀婦索綽絡氏夀紀百齡居同五世應照例給銀六十兩建坊並給與貞夀之門及五世同居字様十一年題準元年題旌一百三十一嵗夀民湯雲山又届十年閲年一百四十一嵗題請旌表應加賞銀三十兩奉㫖著賞給上用段五疋銀五十兩再加恩特賜匾額以旌人瑞欽此遵旨由内閣撰擬再閲古稀四字頒賜夀民懸額旌表十二年題凖原任内務府總管丁皂保連閏凖作百嵗恩賞朝衣一襲上用段十疋銀千兩給與期頤國瑞四字匾額十七年題凖廣東惠來縣生員詹星斗壽至百嵗請照例凖其旌表奉㫖生員詹星斗年届期頤實為膠庠人瑞著加恩給與國子監學正職銜仍於常例外賞給上用段二疋欽此一收養孤㓜雍正二年諭聞廣渠門外有育嬰堂一區凡孩稚之不能養育者收留於此數十年來成立者頗衆夫養少存孤載於月令與扶衰䘏老同一善舉為世俗之所難朕心嘉悦特賜御書功深保赤匾額並白金千兩順天府尹等其宣示朕意並倡率資助使之益加鼔勵再行文各該督撫轉飭有司勸募好善之人於通都大邑人煙稠集之處若可以照京師例推而行之其於字弱䘏孤之道似有裨益而凡人怵惕惻隠之心亦可感發而興起矣欽此一一産三男康熙二年定凡一産三男或男女並産八旗由禮部具題直省由該督撫具題由部題覆行户部準給米五石布十疋十三年定一産三男仍凖題覆其男女並産及一産三女者不必具題三十三年諭一產三男令禮部定議即交户部具奏照例賞給欽此三十五年諭嗣後如有一産三男等事該督撫具題著該部照例行文賞給停止單題嵗終彚題以聞欽此一收埋枯骨順治九年題凖直省饑饉死者暴骨草野各令委官掩埋仍將埋過數目報部又令各地方官於空閒官地設立義塜凡死不能𦵏及無主暴骨盡行收埋如有好義之人收瘞貧屍及掩埋枯骨數多者有司勘實給匾旌奨十年詔八旗貧無𦵏地者每旗各撥給塋地三百畝康熙十七年議凖三旗内府佐領每一佐領給塋地三十六畝滿洲䝉古每佐領給塋地十有八畝漢軍每佐領給塋地十畝二十四年議凖直省地方如有無主暴露枯骨各該地方官建置義塜立法收埋仍咨報部鄉飲酒禮一鄉飲酒禮順治元年定京府及直省府州縣每嵗於正月十五日十月初一日舉行鄉飲酒禮設賓介主人衆賓之席順天以府尹為主直省府以知府州以知州縣以知縣為主大賓擇鄉里年髙有徳之人位於西北介以次長位於西南三賓以賓之次者為之位於賓席之西衆賓序齒列坐司正以教職為之主揚觶以罸失儀者贊禮讀法以生員為之以申明朝廷之法敦序長幼之節二年定順天府詳稽鄉飲酒禮舊制移送禮部題請施行嗣後每嵗由順天府具題將所舉賓介等姓名履歴呈部存案鄉飲酒讀律令曰律令凡鄉飲酒序長幼論賢良髙年有徳者居上其次序齒列坐有過犯者不得干與違者罪以違制失儀則揚觶者以禮責之康熙元年議凖奉天府州縣行鄉飲酒禮儀與順天同四年議凖錦州府州縣行鄉飲酒禮儀與奉天同雍正元年諭鄉飲酒禮乃敬老尊賢之古制近聞年久視為具文所備筵燕亦甚草率應加謹舉行欽此是年順天府舉行鄉飲酒禮特命禮部堂官前往監禮嵗以為常乾隆二年覆凖鄉飲之典必賓介得人始足以示觀感而興教化應通行嚴飭嗣後所舉賓介務擇齒徳兼優允協鄉評之人如地方官徇情濫舉即應題叅若所舉得人而不法之徒或有藉端阻撓者亦應嚴加究治十八年覆凖各省舉行鄉飲事不畫一且竟有頻年闕畧不舉致曠大典者應令各省督撫轉飭所屬府州縣每嵗遵照定例於正月十月舉行二次其賓介之數據舊儀所載鄉飲酒圖有大賓介賓一賓二賓三賓衆賓與大僎一僎二僎三僎之名按儀禮賓若有遵者諸公大夫則既一人舉觶乃入注言今文遵為僎又曰此鄉之人仕至大夫者來助主人樂賓主人所榮而遵法者也或有無來不來用時事耳又曰不干主人正禮也謂之賔者同從外來耳大國有孤四命謂之公又疏言一人舉觶為旅酬始乃入即是作樂前入又戴記坐僎於東北以輔主人所謂席於賔東助主人樂賓者也其言主人親速賔及介而衆賓自從之至於門外主人拜賓及介而衆賓自入三揖至於階三讓以賓升拜至獻酬辭讓之義繁及介省矣至於衆賓升受坐祭卒飲不酢而降皆無一言及僎者所謂不干主人正禮者也嗣後應令順天府及直省府州縣先期訪紳士之年髙徳邵者一人為賓次為介又次為衆賓皆由州縣詳報府尹督撫覈定舉行其本地有仕至顯官偶居鄉里願來觀禮者依古禮坐於東北順天府及直省㑹城一品席南嚮二三品席西嚮各府州縣三品以上席南嚮四五品席西嚮無則闕之不立一僎二僎三僎之名不入舉報之内仍將所舉賓介造具姓名籍貫清册送部存案倘鄉飲後間有過犯按所犯輕重詳報禠革咨部除名并將原舉之官議處欽定大清㑹典則例卷七十一
