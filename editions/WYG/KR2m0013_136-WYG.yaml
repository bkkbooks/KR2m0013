body:
  text: 工部都水清吏司河工二一工式隄高一丈者上寛三丈下寛十丈先於本土鏟去地皮草根坑窪不平之處均填補整齊施以水硪然後加以新土層層潑水夯硪期於一律堅實總以籤試不漏為度月隄首尾屬於大隄河流逼近隄根者於大隄之外如式圍築越隄形式與月隄相仿隄外圍築使水流遶越而過遙隄離大堤稍逺築隄以為重障縷隄水緩之處單隄兀立以資收束埽江南河工埽高自五尺至一丈作一丈長計料用柴二十三束至五十束秫稭二十二束至五十束草百五十束至三百束柳二十束至七十束大纜一條至四條小䌁四十條至一百二十條畱橛一根至八根籤樁一根楸頭滾肚繩一條填埽眼用柴八束至十五束草二十束至四十束河東高自五尺至二丈作十丈長計料用柳草各四百束至七千二百束大纜小䌁各百條至四百條畱橛二根籤樁二根篐頭繩三十條至一百四十條揪頭繩二條至八條滾肚繩二條至十條埽箇高丈餘者用穿心繩一條填埽眼用栁草各七十五束至千二百束直隸高自三尺至一丈作一丈長計料用葦四十束至四百五十束大葦綆七條小葦綆七條至二十條揪頭滚肚繩一條畱橛籤樁各二根填埽眼用葦四束半至五十束以上均令相機酌用總以不出此數為度其式有魚鱗龍尾丁頭等名用以挑溜開行䕶隄作障牐迎水裹頭各横長三丈雁翅各斜長六丈金門口寛二丈二尺由身直長二丈四尺分水雁翅各斜長八丈裹頭各横長三丈砌石二十四層高二丈八尺八寸每丈用牆面石一丈裏石一丈裏石之後以河甎襯之每丈用甎七十塊牆石之後下馬牙樁每丈每路二十段入裏下梅花樁每丈每路十五段牆石每丈扣生鐵錠二箇熟鐵鋦二箇牐底鋪石悉照上下裹頭迎水分水寛長丈尺鋪砌再於底石之下每丈下梅花樁三十段横竪扣生鐵錠四箇牐上下每丈每路下關石樁二十根外接築三合土每方用石灰十石沙淤土九十石三合土每丈下頂土樁二十段三合土上下口每丈下關土樁每路二十段兩牆各二十四層除蓋面一層外其餘每層金門兩牆下版雙槽並上下裹頭迎水分水雁翅轉角共十有六處每處用熟鐵錠二箇牐版二槽用木厚八九寸長如金門口寛之制每塊用鐵環二箇啓閉用麻繩二條絞關石六塊每塊長五尺每石一丈用灌砌石灰一石每河甎一塊用灌砌石灰一升每灰一石用糯米汁五升三合土每灰一石用汁米六升每米一石用熬汁柴二十束滚水壩每座上裹頭各斜長三丈高一丈三尺二寸上雁翅各長三丈高一丈八寸金門由身各長四丈高九尺六寸下雁翅各長十丈高一丈二尺束水牆各長六丈高一丈四尺四寸下裹頭各長四丈高一丈五尺六寸牆面石後襯砌裏石裏石之後襯砌河甎牆石之下每丈每路下馬牙樁二十段入裏每丈每路下梅花樁十五段面石每丈接頭扣生鐵錠二箇與裏石合縫扣熟鐵鋦二箇照金門鋪砌壩底横長七十丈上下坦坡中鋪石脊寛二十丈底石下視土質之浮堅定下樁之稀密或上口下鎖口樁二路下口下關石樁三路石縫每丈横竪扣生鐵錠四箇聨絡一片砌石襯裏襯甎砌灰灌汁熬汁等項均與建牐同遇水勢盛漲即令開放水從壩脊滚出水涸之時仍於脊上用柴土疊鑲關攔堵禦束水壩攔水壩凡遇全流門户宣洩過多藉以蓄畱水勢磯觜壩尖出河流以分水勢竹絡壩以竹簍盛貯碎石成砌每簍長一丈或九尺高三四五尺寛五尺至七八尺不等每兩簍横放交接之處上下空縫均用塊石填實上面簍縫用竹編紥聨絡與簍面一式平整每石簍用絆簍篾纜一條每纜一條用勾纜樁二根用以洩漲涵洞每座口寛二尺四寸由身直上四丈五尺上水裹頭各横長三丈迎水雁翅各長九尺下分水雁翅各長六尺裹頭各横長三丈砌石三層高三尺六寸每丈用雙料面石一丈洞底後四角裹頭迎水分水皆用料半石鋪砌上用蓋面石一層牆石後襯以河甎每丈用河甎七十塊牆石下每丈每路下馬牙樁二十段梅花樁十五段洞底石下每丈每路下頂石梅花樁三十段洞口上下迎水分水每丈每路下關石樁二十段雙料石每丈用灌砌石灰一石料半石每丈用灌砌石灰七斗五升河甎每塊用灌砌石灰一升汁米熬柴均與建牐同木龍編木自五層至十一層長自數丈至數十丈寛自三四丈至八九丈均測水勢淺深覈定規制以挑河面大澑其底層餘澑用地成障木龍面層中心空檔之上仿天平架式搭架上繋麻繩障繋於架上從龍身中空檔插下直入河底大澑遇障不能經過自順障斜趨衝刷對岸沙灘再木龍逺出河心迎澑安設龍底竪繫纜直柱扣繫上纜岸上用犁戧帶住纜頭不令走移紥龍時逐層縱横編木畱眼方二尺以作戧位貫以大戧從眼插入河底以防大澑衝動每戧安設葫蘆架一座上用股車挽住戧頭大纜便於絞車隨時起下旁岸紥成升關木木龍漸次升出每次駕用眠車絞關匠夫齊力升犁頂住澑頭每龍身之前設䕶盤以䕶龍挑澑六楞障長二丈四尺高六尺中心龍骨一根用攢木十八塊週圍六面龍脊楞木六根兩頭中間三處各用大撑木十根每面用小撑木十二根編以柳笆升關木一根夾樁二根柢橛一根畱橛二根下於埽外攩澑䕶埽三楞障長二丈高五尺三面龍骨三根中心空檔編以栁笆大小撑木與六楞相仿栁簰長四丈頭寛一丈四尺尾寛二丈高十七層一順一横成造每層順木六路每層横木通梁五道斷梁八道貫心接樁四根升關木二根靠關木三根排木障長三丈用接樁八根離埽數尺挨順監籤四路深入河底樁頂出水每路二根中留空檔計十二層横下排木間以栁枝逼澑挂淤每接樁一根用楊木二根隂陽筍扣搭合縫旁加幫木皆用鐵篐救生樁每長十丈釘樁木二十根每根長二丈九尺入土一尺管木十根每根長二丈三尺竪檔高四尺釘梯木一根横檔寛五尺一二寸梯木長九尺兩頭出樁木之外各一尺八九寸二尺不等俾遭風溺水之人得以攀援而上康熙十七年題準築隄取土或百丈外或里餘近者離隄二十丈或十五丈外每堆土六丈為一層杵三遍硪三遍層層杵硪期於經久堅固又題準河工頂衝之地即以舊隄為縷隄於舊隄之外别築遥隄以為重門保障二十八年題準竹絡壩務令如式建造使水從壩過而壩不動揺水動沙停而壩益堅固三十九年議準嗣後加幫之隄將原隄重杵再加新土創築之隄將平地杵深數尺加土建築又議準平常工程向用龍尾埽稀釘排樁一遇風浪即易塌卸均令停止又議準嗣後一應石工無論馬牙梅花等樁皆用整木深釘無論面裏丁頭等石鏨鑿務極平整石灰重篩用米汁搗杵膠黏又用鐵錠鐵鋦聨絡該道㕔驗看如違掲報又覆準分修工程每人有一定丈尺令總河於分修之官交界處所各立石樁上鑴修理官姓名舊隄亦立石編號鑴明舊隄字様造冊報部如有不依定式致被衝決者治以罪三十九年覆準永定河工程刷岸太甚者間下大埽其平常下埽以四五六七尺為度四十年題準石工所用馬牙梅花等樁土堅之地用一木二截土鬆之地仍用一木整樁四十二年諭洪澤湖風浪危險每致損船著於沿湖坡岸釘樁木以廣救濟欽此又奉旨指示河澑險要地方頂大隄起下長樁大埽建築挑水大壩長出河流挑澑開行上水建築雁翅並䕶崖埽下水接下魚鱗埽䕶崖埽埽上一式加鑲與大隄平四十四年高家堰險要之所增設救生樁五處雍正二年覆準河工鑲墊理宜畫一自雍正二年為始每工程寛長一丈高一尺用葦柴三十八束秫稭如之永為定式遵行五年議準月隄離河甚逺者就近圍以套隄甚長者上下截以格隄作重門保障又覆準黄河大澑頂衝及埽灣之處遇河崖汕塌近至隄根當多募人夫廣用鍁鍬將臨河隄崖受衝處所切成斜坡復伐取密葉大栁懸於坡上以禦急澑十一年議準河工需用石料雙料面石裏石寛厚均一尺二寸單料面石裏石寛一尺二寸厚六寸河甎寛五寸厚三寸三分長一尺二寸又議準河工修防全在臨時審度應探水勢之淺深酌量用埽之大小層路之多寡籖樁之粗細加鑲之寛厚隨時覈定又議準沉水大埽並埽上加鑲每長一丈用秫稭三十八束水淺防風每單長一丈用秫稭三十束土半方又議準河工鑲填每寛長一丈高一尺柴工用柴三十八束栁工用栁二十八束草工淮揚道所屬用草一百十有四束淮徐道所屬用草一百九十束均壓土五分如水勢深涌於鑲填之上籤樁一根又定龍尾埽毎長十丈高一尺用栁十八束葦柴十八束小䌁百條每條重六斤又議準建築牐壩須於上流先築排樁土壩一道攔水施工量河面寛深毎丈籤下排樁十根夾木二根蘆笆四片絆纜二條壩内填土十三年奏準河東工程埽壩舊例長一丈用柴三十八束黄運湖河水深之處沉下大埽與埽上加鑲水深湍激蟄陷靡常自應照數動用其水淺之處因恐風浪汕刷隄根用柴鑲䕶抵檔名為防風雖有蟄陷尚非頂衝者可比每丈應節省八束著為定式乾隆五年議準清口乃黄淮交匯之區繫黄運湖河之樞紐應於風神廟前東壩接長三十丈只留口門二十丈以資收束運口頭壩外拆去蓄清壩自東向西接長五十五丈運口頭壩之南接長挑水壩如磨盤墩式迴流入運六年議準黄河自宿遷經桃源至清河二百餘里運河南岸自宿遷十字河至清河雙牐通築縷隄二萬五千二百五十二丈又格隄九道自十字河至桃源九里岡通築萬一千四百八十四丈又格隄五道應以運河南岸縷隄作黄河北岸遙隄八年議準堵築河口皆水深澑急若下梗埽鑲接勢必滲漏須先用軟鑲盤築壩臺猶恐水激撼動加細長麻繩兜纜拴繫並用長大楊樁梅花籤丁按層鋪土搥壓庶免滲漏接下丁頭埽除例用工料外加用粗長滚肚揪頭麻繩拴繫橛樁上加鑲墊背後接築靠隄以資堵閉十一年諭朕聞洪澤湖周圍寛廣五百餘里遇風起浪涌船有漂溺之患康熙年間聖祖仁皇帝特設救生樁釘於石工之外被溺之人全活甚多今夏家橋地方有舊葦壩一座並高堰迤南順水壩一座皆有口門為遭風船躱避之所於行舟甚屬有益再於高堰㕔屬之老隄頭山旴㕔屬之高㵎壩迤南又徐家灣周橋四處各增設䕶隄救生壩俾沿河一帶人船恃以安全欽此又覆準裏河㕔屬運口為淮揚運河之關鍵全賴口門收束頭二三壩口門以不出四丈為度一經費順治初年定經徵河銀三百兩以上嵗内全完者紀錄一次又定河工嵗修錢糧先給一半餘竢物料交完方準找給康熙七年題準額銀不及三百兩者不準紀錄又定江南浙江等屬額徵河銀分令各㕔就近收支二十二年議準直隸山東河南江南浙江河工錢糧有蠲災闕額銀八萬兩令該撫於地丁錢糧内照數撥補二十四年覆準嗣後搶修工程五百兩以内者該督詳開各工細數造冊彚題三十二年奉旨河庫錢糧著照盤察州縣錢糧例行三十五年題準江南既設管河道一應河工錢糧均歸道庫支收三十七年題準大工嵗修錢糧均交與總河自行經管三十八年覆準裁江南管河道錢糧仍照舊例歸於各㕔收放四十七年諭河工動用錢糧輒以數萬數十萬計河官當估計之時先故浮估以為日後節省之地此皆河工積弊嗣後凡有修理工程河道總督務親詣察勘確估具奏不可一任河官浮冒估計欽此四十八年覆準河道錢糧令淮徐道管理清江地方並無城垣不便收貯應於淮安府城内建庫收貯仍令道役看守廵察五十二年議準嗣後山東河南河庫每年令各該撫盤察江南河庫毎年令總河盤察出具並無虧空印結送部存案出結後有虧空者除責令各賠外仍將該督