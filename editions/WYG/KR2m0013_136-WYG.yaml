内豫計需用之料動支見存河庫銀備辦十分之七分貯𦂳要之處備用仍委就近州縣盤察如辦不足數以侵蝕錢糧例題叅治罪倘盤察之人扶同徇隐將短少物料照倉庫錢糧例分賠仍將失於督察之該管道與扶同徇隐之盤察官一併題叅分别議處又議準直隸各河工每葦柴一束長一丈徑五寸乾者每束銀一分五釐濕者一分三釐五毫青者一分秫稭亦以長一丈徑五寸為一束乾者每束銀九釐五毫濕者七釐五毫青者六釐稻草十斤為一束價銀一分至一分六釐􅐨每斤價銀一分四釐至二分各有差麻每斤價銀六分十年奏準總河所轄各㕔所出河租􅐨麻若干官栁若干兵採草若干每嵗造册報部十一年議準豫省上南河下南河上北河下北河黄河歸河沁河等七㕔東省黄河運河捕河泇河上河下河海贛等七㕔需用土方無論水旱每方價銀自八分一釐至二錢一分六釐運河土方附近取土者每方價銀九分六釐隔河取土者每方價銀一錢二分隔河用船裝運者每方價銀一錢四分水内撈土者每方價銀二錢四分杉木樁料圍圓一尺一寸至三尺每根價銀自一錢七分至七錢永為定例又議準江南黄運湖河興舉甎石樁埽柴草工程需用各項物料淮徐等所屬及徐屬同知今改銅沛邳睢宿虹桃源宿遷運河裏河外河山安海防高堰山旴安清中河揚河揚糧江防等十四㕔柴仿照柳枝青濕乾之例酌定每年九月至十二月交工柴性帶潮仍照三十斤之數稱收正月至四月柴性微乾每束酌定二十六斤若五六七八等月新陳交際柴性全乾每束酌定二十二斤用十六兩官秤稱收永禁篐收之法再有短少即行叅究樁木圍徑不等長自一尺以下及一尺至五尺其價自七分至二十一兩六分不等内徐屬㕔樁規價直與市價相仿高堰山旴二㕔各工樁木由湖渉險轉運維艱按市價加入運脚較與漕規相符其邳睢等十一㕔各按地之逺近照徐屬等處酌量遞減土方從乾地揠土每方價銀八分如有積水加戽水銀一分五釐搶築及加幫隄工並填壩壓埽等工土價分别逺近乾濘難易酌定八則每方價銀自一錢二分五釐至二錢五分石料計丈給銀雙料面丁石每丈自九錢至一兩九錢雙料裏石每丈自四錢至九錢單料面丁石每丈自三錢六分至九錢五分各有差單料裏石各㕔均照雙料裏石折半給銀石灰每百斤價銀自七分二釐至一錢四分四釐汁米每石價銀一兩二錢熟鐵每斤價銀四分生鐵一分五釐鐵索鐵釘每斤價銀三分自雍正十年為始凡歲修等工均照此例估銷十二年議準江南葦蕩營舊額葦柴一百五十萬束自雍正十二年為始加增葦柴二十萬束統計正柴一百七十萬束飭令左右二營分採全數交工按例繳價解庫按年清額永為定例又議準葦蕩營額採柴各㕔雇船自運六十萬束交貯工所其餘一百一十萬束仍令浚船及期趲運交厰又議準江省所屬各㕔近處乾地取土離隄十五丈至五十丈每方銀一錢二分五釐逺處乾地取土離隄五十丈以外至百丈及近處濘地取土離隄十五丈至五十丈每方銀一錢三分六釐逺處濘地取土離隄五十丈以外至百丈每方銀一錢五分隄根有積水坑塘遶越乾地取土離隄五十丈以外至百五十丈每方銀一錢七分遶越濘地取土離隄五十丈以外至百五十丈每方銀一錢八分隔隄隔河逺處乾地取土離隄二百丈以外至三百丈每方銀一錢九分隔隄隔河逺處濘地取土離隄二百丈以外至三百丈每方銀二錢水底取土離隄三十丈至五十丈每方銀二錢五分按欵刋榜永為定例遵行又議準江南葦蕩營原額葦地八千頃九十三畝有竒於産葦稠密處所丈明原額畝數飭令營兵照額採取葦柴交工濟用又覆準江南江防同知疏濬引河每土一方給銀一錢一分又議準豫省河工每年搶修所用秫稭先期酌定敷用之數與歲修同時發帑於十一月内一同照數辦足運貯工所價直亦照歲修之例每百斤以七分報銷永定成規十三年議準葦蕩營丈出淤地一千八百十有一頃九十五畝有竒産葦茂密以雍正十三年為始令左右二營增採正柴五十五萬束按年清額永為定例又議準東省黄河搶修工程需用秫稭照豫省搶修之例於山東管河道庫節省銀内酌量工程之緩急需用物料之多寡動支銀五千兩給發黄河㕔依限辦料貯工價直照歲修例畫一報銷又議準直隸揠河旱土每方價銀七分泥濘土每方銀九分蘆根土每方銀一錢四分各道同水中撈土天津永定大名三道均每方銀一錢一分通永清河二道均每方銀一錢八分又永定河道水葦板方每方銀一錢三分通永河道礓石土每方銀八分築隄旱土天津通永大名三道均每方銀一錢永定河道每方七分清河道每方一錢六釐六毫離隄十五丈至三百丈乾地濘地取土各道均與江南土方之例同水中撈土離隄三十丈至五十丈天津通永清河大名四道與江南例同永定河道每方銀二錢一分又議準山東運河需用河甎每塊長尺有二寸寛五寸厚四寸價銀一分六釐面石每丈運脚自十里至二三十里價銀一兩八錢三十里外至四十里加銀一錢裏石每丈價銀九錢生鐵料每斤價銀一分石灰每百斤一錢四分四釐汁米每石一兩六錢又議準豫省需用楊樁上北上南二㕔在洛陽濟源等縣採辦洛陽與濟源相對運至上北河㕔屬原武汛以百五十里為則陽武汛以二百里為則封邱汛以二百五十里為則運至上南河㕔屬滎澤汛以百五十里為則鄭州汛以二百里為則陽武汛南岸隄工在中牟縣工段之内以二百五十里為則下北下南二㕔在鞏孟孟津等縣採辦孟津與孟縣斜對在洛陽縣之下運至下北下南二㕔屬祥符汛以二百五十里為則陳留汛以三百里為則自陳留至蘭陽河道無多亦以三百里為則儀封汛以三百五十里為則沁河黄河歸河三㕔在溫偃師等縣採辦偃師與溫縣相對在鞏孟之下運至沁河黄河二㕔屬武陟汛以五十里為則運至黄河㕔屬滎澤汛北岸以百里為則運至歸河㕔屬考城汛以三百里為則商邱汛以三百五十里為則虞城汛以四百里為則東省需用楊樁黄河㕔屬曹單二汛在曹州單曹城武定陶金鄉六州縣採辦曹汛各工曹縣以五十里為則曹州以二百里為則定陶縣以百五十里為則單縣城武縣均以百里為則金鄉縣以二百五十里為則單汛各工單縣以五十里為則金鄉城武二縣均以二百里為則曹縣以百里為則定陶曹州均以二百五十里為則自四百里以至五百里照加一脚價扣算以次遞減每根圍圓自一尺至五尺長自一丈三尺至五丈三尺購辦在四百里者每根價銀六分至三兩四錢五分遞減至五十里者每根銀三分九釐至二兩三錢四分三釐五毫脚價在内乾隆元年覆準德州城濠所産蘆葦責令地方官經管採割備用又議準直隸楊樁通永大名清河三道樁規圍圓一尺至四尺長一丈二尺至四丈三尺價銀八分六釐至十兩八錢五分七釐永定河道樁規徑四寸至一尺長一丈五尺至三丈四尺價銀二錢五分至一兩二錢各有差天津道樁規長一丈五尺徑八寸者價銀六錢徑七寸者五錢徑六寸者四錢又奏準江南江防同知歲修江工採辦碎石每百斤定銀一分二釐二年諭豫東二省河工所用歲修搶修之柴皆州縣領銀採辦交工應用每斤價直搶修給銀九毫歲修給銀六毫此十餘年之例昨據欽差條奏豫省歲修六毫之價不敷採辦請槩給九毫以裕民力朕已允行但思東省與豫省河道毗連壤地相接所需物料價直大率相同豫省既已加增則東省歲修之價亦應照豫省之例給與九毫俾運工車價敷足小民益可踴躍趨事欽此又諭豫東二省河工所用歲修搶修之柴向因給價不敷採買已降旨每斤加至九毫以紓民力兹聞江南徐州所屬州縣濵臨黄河與山東河南接壤有葦蕩難以挽運藉用秫稭之處甚多採辦之價亦覺不足所當一體加恩者著將應加價直照豫東之例加至九毫著為定例欽此三年議準豫東二省河工需用物料險要工程隨時交收其每年所備歲修搶修物料均於八月以前布政使司照額撥銀移解道庫該道於八月内給㕔印各官分頭採辦承辦之官務於十二月内全數交工備用遲誤者叅劾嚴加議處又覆準豫東二省承辦秫稭交工時令附近不管河工之同知通判驗收五年議準河工各㕔汛可以增辦蘆葦者飭令河官增辦應用河灘地内可種蘆葦之處勸民栽種以資應用八年議準東省坑塘窪地所栽葦草每束重二十斤雇人採割並運送到工脚價共給刀工銀六釐又議準直隸河甎長寛價直均照山東運河之例豆渣石青白石每長一丈寛厚一尺均給價銀三錢四分豆渣石每里遞加運費二分青白石每里遞加運費二分二釐五毫又議準豫省山稍草每束重三十斤給價銀二分七釐蘆根每束重七斤價銀五釐四毫草每束重七斤雇夫採割給刀工銀一釐六毫坑塘葦束價直與東省同又議準永定河石灰每百斤價銀二錢通永天津二道各減五分汁米每石槩給銀二兩八錢熟鐵料價與江南同生鐵錠每斤價銀永定河一分六釐天津通永各增一分生鐵片每斤價銀永定通永各一分二釐天津減二釐九年覆準嗣後河工各㕔交代經手工程錢糧務將各項存貯物料一并交清如有虧闕立即叅究追賠又奏準江南河工豐碭銅沛二㕔鑲修工程專辦秫稭每年七月内酌定銀數分發各州縣承辦定限十月完半年内全完令不管河工之㕔官秉公驗收又議準江南豐碭銅沛邳睢宿虹運河桃源桃清裏河外河山安海防高堰山旴等十三㕔需用楊木照豫東二省樁規視木之大小路程之逺近接算運費加增價直十六年奏準江南木龍工程累年新木舊木並淤損之木詳悉分别按年確覈以上年存工存厰之木為舊管以本年增購及别工撥用之木為新收以折損沙淤及移撥别工者為開除以見在存工木龍並存厰木植為實在造具四柱清册送部察覈欽定大清會典則例卷一百三十二
