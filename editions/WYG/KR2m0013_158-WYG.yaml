body:
  text: 光禄寺一祭祀執事恭遇親祀各壇廟飲福受胙夲寺卿少卿進爵進胙爵胙案左右滿署官各一人専司爵盤乾隆四年奏準祭祀壇廟太常寺移文取監宰官夲寺委署正一人赴宰牲所㑹執事官監宰牲瘞毛血十七年奏準大祀宰牲增光禄寺卿一人監視一頒胙祭天地社稷宗人府内閣各十斤六部理藩院都察院大理寺通政使司詹事府鑾儀衞京畿道各七斤順天府太常寺太僕寺光禄寺六科五城起居注各五斤翰林院國子監鴻臚寺太醫院欽天監中書科各四斤内務府掌儀司牲俎半分祭太廟前代帝王廟宗人府内閣各二十斤六部理藩院都察院大理寺通政使司詹事府鑾儀衞京畿道各十有五斤順天府太常寺太僕寺光禄寺六科五城起居注各十斤翰林院國子監鴻臚寺太醫院欽天監中書科各七斤内務府掌儀司牲俎一分胙肉由太常寺交送夲寺分派委官監視傳知各衙門於祭所支領一滿席一等席用麺百二十斤紅白饊支三盤餅餌二十四盤又二椀乾鮮果十有八盤二等席用麺百斤品數與一等席同三等席用麺八十斤紅白􅠑饊三盤棋子四椀麻花四盤餅餌十有六盤乾鮮果十有八盤四等席用麺六十斤紅白􅠑饊三盤棋子四椀麻花四盤餅餌十有六盤乾鮮果十有八盤五等席用麺四十斤品數與四等席同六等席用麺二十斤紅白􅠑饊三盤棋子二椀麻花二盤餅餌十有二盤乾鮮果十有八盤萬夀聖節元旦朝賀公主郡主成婚各燕皆用四等席燕朝鮮國進貢正副使西藏達頼喇嘛班陳額爾徳尼貢使除夕賜下嫁外藩公主暨䝉古王公台吉等饌筵皆用五等席毎席用熟鵞一經筵講書衍聖公来朝及朝鮮進貢押物等官安南琉球暹羅􅃡甸蘇禄南掌等國貢使都綱喇嘛畨僧来京各燕皆用六等席毎席用熟雞一經筵用熟鵞一乳酒毎瓶十斤黄酒毎瓶十有五斤乳茶以筩計筵席茶酒數目均照禮部劄辦送奠筵曰近前饌筵曰随筵曰午奠筵近前饌筵用麺百三十斤由内務府造辦品物移寺備進随筵用麺百二十斤由寺造辦妃嬪近前饌筵用一等随筵用三等貴人近前饌筵用一等随筵用四等常在答應女子近前饌筵随筵均用五等皇太子近前饌筵用一等随筵用二等皇子近前饌筵用一等随筵用三等應用燒酒及品物均據内務府来文辦送滿一等席價銀八両二等席七両二錢三分一釐三等席五両四錢四分四等席四両四錢三分五等席三両三錢三分六等席二両二錢六分一漢席文武㑹試考官入闈出闈各燕用漢席主考知貢舉等官毎席用肉饌蒸食果實三十四器同考官監試御史提調官毎席用肉饌蒸食果實三十一器内簾外簾收掌四所及禮部光禄寺鴻臚寺太醫院各執事官毎席用肉饌蒸食果實二十六器酒毎席一斤實録會典等書告成賜燕用漢席與入闈出闈燕同文武殿試讀卷等官賜飯用漢席毎人日給三餐毎席肴饌十椀糕餅四盤乾果八盤酒一斤午餐去糕易鮮果一盤閲卷之末日午餐加寳裝花一座鵞肉一盤餅餌四盤小菜四碟進士給二餐朝餐人給湯一椀饅頭四午餐人給餅四梨二茶一廵文武進士恩榮燕會武燕皆用漢席讀卷執事各官毎席寳裝花一座大小錠二十八大小饅頭二十二糕餅三盤鵞雞猪羊前蹄五生鵞雞羊肉四熟肴饌八椀果實五盤進士毎席寳裝花一座絹花三朶中小錠二十八饅頭二糕餅四盤羊雞魚三生羊肉一熟肴饌八椀乾果五盤湯三椀酒一斤漢席所用品物各按時價覈銷一誦經供品喇嘛僧道啓建道塲誦經經棚供獻齋筵應用品物均依掌儀司来文由寺委官辦送監經官毎餐人各素饌一席十二器執事各官毎餐二人合素饌一席由寺備供喇嘛僧道等所需齋食各折價給銀大喇嘛日給銀四錢五分文賛徳木齊日給銀三錢衆畨僧日給銀一錢五分掌印僧道官日給銀三錢九分僧道官日給銀二錢六分衆僧道日給銀一錢三分鋪排日給銀九分鼓手日給銀六分五釐歩軍日給銀四分如有薫壇各給七日半齋銀又定承辦漢席及祭筵卓飯誦經供品齋食應用茶役厨役蒸鍋匠黏果匠拖鑪匠均計工給直毎工一錢五分其中正殿等處喇嘛誦經造辦飯食應用厨役工直㩀掌儀司来文數目覈給大官署一供用蔬菜奉先殿薦新蕓薹菜茼蒿莱蘿蔔茄子黄瓜香瓜西瓜由署辦送上墳奠筵所需香𤓰西𤓰鮮菜各㩀所司移付給𤼵朝鮮安南琉球西洋暹羅􅃡甸蘇禄南掌及土魯畨鄂羅斯諸國貢使内藥房醫生通曉天文之西洋人毎日廪給所用蔬菜㩀禮部劄欽天監太醫院来文給𤼵一供用猪及猪肉設行户一人和買毎猪五十斤内用給價三両一錢五分外用二両五錢小猪三錢九分猪肉内用毎斤六分五釐外用毎斤五分猪油内用毎斤五分二釐外用毎斤五分蹄毎斤二分八釐心肺毎副二分八釐肝毎斤二分七釐胃四分猪首毎斤二分舌二分腰子一分五釐尾五分管毎根一分五釐脊髄毎斤八分四釐大腸毎條二分八釐小腸毎條一分九釐醃肉毎斤六分五釐燻肉毎斤八分火腿肉毎斤一錢奉先殿節序忌辰之祭應用猪及肉饌文武會試賜燕用猪肉均由署備送大内種痘祀神應用猪下嫁外藩公主郡主等館於京師月給猪及猪肉咸安宫景山教習廪給用猪肉及各處增用猪油㩀内務府来文給𤼵恭鑄金寳用猪鑄印用猪首除夕賜来京朝賀之下嫁外藩公主郡主縣主額駙䝉古王貝勒貝子公台吉塔布嚢等猪朝鮮諸國貢使従人毎日給猪肉據禮部劄給發通曉天文之西洋人内藥房醫生廪給猪肉據欽天監太醫院来文給發乾隆十三年定尚膳房應用猪及猪肉等物按月分三旬支銀竢尚膳来文開數覈銷一收貯器物原存方卓五十九條卓一百十有四策卓四百十有七紅油卓五百六十一紅油髙卓二金漆髙卓一奠卓四乾隆十五年