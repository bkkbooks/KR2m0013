body:
  text: 都察院四一侍儀順治三年定朝㑹御殿都察院滿漢堂官先入候駕應行禮者於中和殿行禮畢趨出於太和殿西檐東嚮立乾隆十四年議準壇廟内聖躬對越之地向例用御史四人侍儀與陪祀王公百官行禮之處用御史監禮無别實為未稱嗣後用禮部都察院堂官各二人分立東西侍儀以隆體制若遣官致祭仍用御史四人監禮一朝㑹糾儀順治初年定常朝糾儀東西班滿漢御史各二人天安門外宣詔午門外頒時憲書頒賞文武鄉㑹殿試進士舉人謝恩東西班滿漢御史各二人十四年定御經筵設滿漢御史各一人殿内東嚮立十八年題準大朝日滿漢御史稽察有失誤者題叅康熙五年題準凡朝期鴻臚寺將謝恩官名數先送印册到院臨期糾儀御史照册察收職名二十年題準殿右檐下設滿御史二人王公行禮處東西班設滿御史各二人百官行禮處東西班上中下滿漢御史各二人五十四年定御門聽政設滿漢御史各二人於西階下東向立有跪立升降失儀者指名題叅雍正二年奉㫖嗣後朝㑹行禮該稽察御史嚴察遇有失儀者即行糾叅若不糾叅經朕令人察出必行治罪又諭行禮排班於左右兩翼選侍衛四人令隨御史稽察有不按班次往來行走者著御史指與侍衛拏叅欽此又題準凡遇朝期各部院漢官亦分列左右翼排班庶序次齊而稽察亦易十二年議準常朝大小官員務遵定例按品序坐如攙越失次或有起立拱揖聚談不恭者糾儀御史同吏禮二部司官題叅如徇情不行叅奏者一并議處再坐班時看守午門闕門端門之官兵將閒雜人等約束不得任其出入行走倘不遵定制亦令糾儀御史題叅分别議處十三年議準常朝日八旗官照部院各官儀注按品列坐竢察班御史等挨次收取職名如有攙越班次及爭遞並代遞職名者御史等題叅乾隆元年議準凡大朝日書役閒雜人等交與守衛午門闕門端門之官兵嚴行管束各官從役等著該旗差出之驍騎校㑹同守衛朝房之歩軍尉歩軍等嚴行管束臨坐班時令從役等退出闕左右門外嗣後如有前後行走無忌者御史等將管束不嚴之官並其主一并叅奏二年奏準恭逢皇太后聖誕及元日長至行慶賀禮設滿御史二人於慈寧門外檐下避立二人於長信門外儀駕之末設漢御史二人於午門外又奏準設漢御史二人於闕門二人於端門均各分東西班稽察一應各官家人不許擅入違者拏究治罪其主交部議處又奏準常朝日滿漢文武大小官均如期齊集坐班如有事故先期於朝單内聲明至期御史等逐一稽察如有無故不到者題叅六年奏準常朝日八旗官如仍前疎忽到班寥寥無㡬御史等將官員過少旗分察明緣由題叅一祭祀糾儀順治初年定壇廟祭祀皇上行禮處東西班滿御史各二人侍儀王公行禮處東西班滿御史各一人百官行禮處東西班滿漢御史各二人告祭天地太廟社稷東西班滿漢御史各二人祫祭前期一日告祭中殿東西班滿漢御史各二人後殿東西班滿漢御史各二人躬耕耤田所東西班滿漢御史各二人備侍御齋宫滿漢御史各二人祈雨報祀東西班滿漢御史各二人救䕶日月食東西班滿漢御史各四人祭祀監宰牲滿漢御史各一人專委掌京畿道十八年題準凡祭祀令滿漢御史稽察有失誤者題叅又題準凡祭祀齋戒滿漢官職名均由太常寺開送令滿漢御史稽察有失誤者題叅康熙二十五年議準凡祭祀各官排班有喧語失儀及祭未畢先趨走往來者御史題叅雍正元年奉㫖躬祭壇廟日令滿御史二人於駕未出之前在外管轄駕出於豹尾班後黄龍大纛前管轄於齋戒前一日開列職名送領侍衛内大臣具奏五年奉㫖壇廟祭祀所闗綦重理宜潔誠齋戒嗣後令御史二人前往壇内稽察如有不恭即行叅奏七年議準凡遇天壇地壇祈榖三大祀令旗下大小官員各在本衙門齋宿奉㫖在旗下衙門齋宿時令都統御史察旗叅領侍衛照常稽察九年議準嗣後祭祀御史禮部官飭令陪祀執事官各行管束從役人等不得擅入栅䦨如有將轎馬擅入栅䦨喧擁者照例分别治罪該管官故縱者議處十二年議準陪祀官或在本任衙門齋宿或在署理辦事之處齋宿必注明册内以憑稽察又奏準凡祭祀車駕出入午門外左右翼各令御史二人稽察齊集各官按班跪迎跪送乾隆元年議準祭太廟社稷陪祀執事官著在公所齋宿交與稽察齋戒之都統御史等稽察二年議準陪祀各官於太常寺文到之日該管官嚴行稽察務令到署齋戒不得藉端規避其實有疾病事故者聲明緣由行文到院察覈至齊集處御史收取職名倘有無故不齋戒或已開明齋戒而不至齊集處者皆指名題叅五年奏準祭祀日陳設祭品畢令御史㑹同太常寺官徧行廵察如有褻慢諧笑者題叅七年奏準躬祭大典扈從大臣官員例應於午門前乘騎者仍令領侍衛内大臣等分撥親軍伺候牽馬並交與後管内大臣御史等管束毋致喧譁其僕從人等不許溷入馳驟如違例牽馬入朝乘衆雜㳫馳驟者該管官拏究并將其主叅處十年覆準御齋宫日陪祀官員接駕後各擇潔淨處所齋宿稽察齋戒之都統等定於申酉時在壇門外察收職名至四更時禮部本院委官察收職名如陪祀不到者題叅十年奉㫖嗣後祭祀齊集處著承行稽察之部院於次日繕摺開注情由呈覽又議準祭祀齊集處文官由吏部武官由兵部開列名單移都察院稽察吏部滿漢官亦令稽察又奏準每祭祀齊集處滿漢御史各一人率筆帖式二人收取文三品武二品以上職名如遇躬詣行禮均繕摺奏聞十四年奉㫖嗣後凡遇齋戒有衙門之大臣等雖兼别職皆著在本衙門齋宿無衙門之領侍衛内大臣散秩大臣等著在紫禁城内齋宿如有違者一經察出定行治罪近侍御前侍衛等亦著在紫禁城内齋宿又議準凡祀壇廟親詣行禮以滿漢都御史侍儀王公行禮處以滿御史百官行禮處以漢御史監禮外若遣官行禮壇上殿上以滿漢御史各二人百官行禮處以滿漢御史各二人監禮以上糾儀等事均按資輪直由掌京畿道辦理一鄉㑹試監察順治八年題準順天鄉試及㑹試差滿漢御史各二人監試十七年議準房官闈中作弊許主考不時糾叅若主考通同作弊許監試御史不時糾叅十八年題準順天鄉試差漢御史二人入場總理諸務二人管理捜檢㑹試差漢御史二人為内場監試二人為外場監試康熙三年諭監試廵察御史除應廻避者不開外其餘各員都察院開送禮部列名題請欽此十年題準嗣後鄉㑹試内場監試外場廵察仍兼差滿御史十八年議準順天鄉試設内簾監試滿漢御史各一人㑹試亦照此例行如考官私訪聚談薦卷私通小帖分閲硃卷私帶入房有闗科場情弊者即行題叅三十六年停止内簾監試三十九年復設内簾監試滿漢御史各一人雍正二年諭闈中謄錄弊端甚多其有賄囑者則謄錄精工否則潦草舛錯致誤佳文著知貢舉監試御史嚴行申飭其謄錄不工者必重加責懲令其重錄並令對讀官嚴飭各生悉心校對勿使錯誤倘外簾官失察日後發覺將該管官一并議處欽此六年議準鄉㑹試外簾官私閲試卷許監試御史題叅如隱匿疎漏未能題叅者别經發覺將御史一并議處七年議準鄉㑹試筵燕該衙門委官專司其事吏役從人不許擁擠上堂如有玩法擁擠者即行拏究監試御史將該管官指名題叅乾隆四年諭科場夾帶文字乃士子最下之劣習若不嚴行察禁則荒疎不習之人多得僥倖入彀而真才轉致遺棄於掄才之典大有闗繫著監試御史先行出示曉諭臨㸃名時再加告誡務將夾帶之弊盡行革除倘仍有不肖之徒玩視功令者即行叅奏交部照例治罪毋得姑容欽此六年諭入場之時監試御史等必須嚴加捜檢不可虛應故事倘有寛縱疎漏必將該管官從重議處欽此又諭凡有闗渉科場情弊者著都察院五城御史歩軍統領順天府内外簾監試御史即行嚴拏治罪不稍寛貸欽此又議準順天鄉試監試提調官責令彌封所官於各役彌封時毋得别所人役擅行往來彌封後約謄錄所官呈堂交送毋許兩所人役近身私語責今謄錄所官呈堂交送如有草率淡抹者即行責懲仍令重謄責令對讀所官務令一對一讀庶無差誤該監試等仍不時稽察並嚴飭各所實力奉行如有不遵將該管官題叅九年奏準順天鄉試外場廵察御史均由該處先期奏請欽命於七月二十八日即往貢院大門外駐宿凡運送供給及進院夫役並主考同考官從役均由外場廵察驗明捜檢以杜執事人役代士子懷挾之弊再八旗送考之叅領並每翼委出甎門之叅領姓名先期行文各旗開送外場廵察如送考之叅領等官不按旗分任憑士子濫行及甎門叅領一任送考之人擁擠該御史題叅其各省貢監等亦於甎門外各増守備一人協同㸃名給籤如守備等約束不嚴該御史題叅九年奏準順天鄉試官旗民籍一例嚴捜如有徇私即將監試官糾叅十年奏準㑹試外場廵察御史及叅領守備等官均照順天鄉試例行一武鄉㑹試監察順治八年題準順天武鄉試及武㑹試差滿漢御史各二人監試康熙五年題準武鄉㑹試監試廵察御史照康熙三年文場之例行雍正元年覆準武㑹試外場所取好字號皆令外場考試官與監射御史當靣注定較對明白務於十一日全完十二日即將號册親交兵部堂官按册印清卷面並將號册所注好字號各就省分謄清一本均用兵部堂印送入内場十二年奏準武㑹試兵部應按圍場字號請欽命四人每圍各有一人監試至第三場天字地字二圍監試即在二門東邊㸃天地二圍所取之人黄字宇字二圍即在二門西邊㸃黄宇二圍所取之人按名散卷乾隆三年覆準武鄉試分圍監試均照武㑹試例行四年覆準武鄉試令提調監試各官武㑹試令知武舉監試御史將外場較射册帶入内場其選入單雙好字號者於交卷時驗明原填某號技勇令其覆驗如全不相符嚴加詳察果繫頂冐立叅送部又議準武㑹試設内簾監察御史一人一殿試監察順治十八年題準凡文武殿試差滿漢御史各二人監試一考試貼寫中書漢中書見任筆帖式官學教習各館謄錄生㧞貢生朝考貢監生考職均滿漢御史各一人監察乾隆十七年覆準考試教習等事在午門之内至百人以上者該衙門行文到院開列滿漢御史各二人於奏委考官時恭候簡命滿漢御史各一人以資彈壓以上監試堂劄京畿道挨資開列呈堂咨送一㑹同審音乾隆十年議準順天府考試童生該府丞移咨到院奏差滿漢御史各一人㑹同審音一出差順治十八年題準凡出差御史命下門上即大書迴避不見客不受書札凡送書辦人役一槩不收燕㑹餞送槩不得與竢領勅三日内即出京信宿不停沿途及入境後私書私餽一槩不許接受御史入境及出廵地方原有本等儀從執事人役其鋪陳等物原繫自行攜帶所用蔬菜米麪原繫自發公費銀買辦如分外供應皆繫地方官獻媚取容所當嚴禁即御史攜帶主文書役家人廚役前站之類以致擾驛累民久經禁革除額設事物儀從外如有前項等弊督撫訪確即將所用之物所帶之役拏問題叅分别議處如督撫徇情隱諱事發一并治罪出差御史入境之後各官逺接叅謁久奉㫖禁革如所屬官員越境叅謁者該御史指名題叅其出差御史與督撫既有糾叅之例如繫公事許㑹同辦理此外如設席飲酒彼此餽送互相結納者一槩禁革如有前項等事都察院及科道覈叅一并議處乾隆元年議準遇有應差科道均照資俸通行引見其曽經出差者在履歴下注明如有託故規避者該堂官即行指叅八年諭嗣後廵城察倉官員如别有差遣在三月以内者該衙門委員署理如繫過三月之差者著奏請署理欽此十年奉㫖嗣後凡請㸃差皆著引見又議準凡廵城廵臺廵察盛京黒龍江等差由院先行摺奏引見欽命後復繕本具題十六年奏準滿漢科道不論所奉何差為期在一年外者將科道通行開列具題恭候欽命一人署理在一年内者由院委署至科道已奉廵城察倉等差而又别奉差遣需人署理者向例在三月外者題署三月内者委署今亦以一年為斷畫一辦理一廵城順治十年題準新資御史先試廵城雍正元年諭廵視五城御史甚屬緊要向例滿洲漢軍漢人三人嗣後一城只差二人漢軍著歸漢人班内筆帖式亦著隨御史更換欽此又奉㫖前因廵城裁去御史一人故將漢軍御史歸并漢人班内分差廵城其餘仍照漢軍御史舊例不必更改欽此二年奉㫖御史廵城闗繫緊要嗣後著都察院通行開列候朕簡用欽此五年諭廵視五城甚屬緊要嗣後著將御史給事中一并引見欽此乾隆元年奏準請以一年更換滿御史一年更換漢御史輪流更代則滿漢官莅任均有二年之久事務可以周知其滿御史任事之日漢御史已經熟悉漢御史任事之日滿御史已經熟悉凡遇一切公事官吏無由欺隱實於地方有益三年奏準廵城將籍隸大宛之科道槩令迴避不必開列五年奏準滿漢廵城御史如遇事故皆應更換之時恐二人均繫新任事務未能熟悉將曽經廵城各御史内差出一人以一年為限竢一年滿後仍照例引見更換則滿漢御史新舊相兼足資治理一廵倉順治二年定差御史一人廵視京通各倉康熙二十年題準倉糧闗繫緊要差滿漢御史各一人稽察二十六年停差廵倉雍正五年諭在京各倉每倉或都統或副都統各一人御史中不論滿漢每倉各委一人專任稽察之責其支放奏銷等事不必經管惟倉房滲漏牆垣損壞與倉内鋪墊及匪類盜竊各弊察出即行文倉場侍郎知之若倉場侍郎等遲延不及時辦理妥協即據實奏聞倘不能察出弊端以致虧損倉糧著落稽察之都統副都統御史與倉場監督等官分賠其通州三倉即照此例交與通永道通州副將稽察其失察分賠之例亦與京倉同欽此十二年諭向因倉庾闗繫緊要在京十倉每倉或都統或副都統各差一人御史各差一人專任稽察之責於倉場不無裨益但從前未定更代之期見在各員中有至三四五年尚未更換者朕思日久因循易生懈怠且或偶有疎虞該員慮干失察因而掩飾彌縫亦未可定著定為三年更代屆期各倉一同吏換若有接任之人未滿三年即屆更代之期者亦一例更換欽此十二年議準京中各倉每年户部各撥銀百兩交貯倉場侍郎衙門凡有一應竒零修葺之處令該倉監督確估申報倉場侍郎並稽察之都統御史察看領銀及時修補至工程在百兩以上者應令稽察之都統御史㑹同倉場侍郎察看確估具奏興修乾隆十年議準稽察倉場都統等若有出差患病服制等事在二三月以内者行文都察院交與稽察之御史專行廵察有應辦者即行辦理十三年諭差都統御史稽察倉務並非只令稽察倉廒㵕漏亦令其監察盜米等弊稽察之大臣官員僅察倉廒㵕漏其盜領私出等弊以為非其責任不行察看並非差徃本意著都統御史等嚴察盜領私出等弊毋得疎慢欽此十七年奏準京通各倉每倉奏簡御史或給事中一人不論滿漢專司稽察年終更代將一年内並無短收多放攙越廒座之處據實奏明交户部存案一廵漕順治二年定專差御史一人催趲漕運十四年停差廵漕雍正七年諭糧船過淮之時著差御史二人前往淮安專司稽察不許官吏人等向旗丁額外需索以致擾累其糧艘中攜帶物件除照例許帶外該旗丁如有挾帶私鹽及違禁等物者亦著該御史稽察至糧船抵通之時其該管衙門官吏及經紀車户人等恐有額外需索亦著差御史二人前往稽察淮安廵漕著於二月初差往通州廵漕著於三四月内差往不必拘定滿漢各一人著都察院按期開列請㫖欽此乾隆二年議奏每年差往廵漕御史四人令一人駐劄淮安府廵察江南江口起至山東交界止令一人駐劄濟寧州廵察山東臺莊起至直𨽻交界止令一人駐劄天津府廵察天津起至山東交界止令一人駐劄通州仍廵察至天津府止各按所廵地方務使漕運遄行剔除諸弊如有不法弁丁即行題叅於三年為始照依駐劄地方各司稽察奉㫖南漕兩處皆給與驛馬北漕不必給與驛馬三年諭向例漕運進京皆差御史前往山東江南廵視稽察今年十一月山東疏濬運河必須過完囘空糧艘方可興工著都察院堂官將差往濟寧廵漕之御史先行引見即令前往山東督押囘空尾幫南下一竢尾幫出山東境後即駐劄濟寧協同河道總督辦理築壩濬河事務欽此又議準駐劄濟寧天津通州之廵漕御史應照駐劄淮安之例均給與欽差官闗防四年覆準除廵察北漕御史二人不給與驛馬外其駐劄天津御史一人出廵以臨清為界往返千有餘里所用船及廪給口糧應照廵察南漕之例支給至駐劄通州御史一人出廵僅抵天津且有坐糧廳船可以乘坐毋容給船其廪給口糧一例給與十年奉㫖每年冬月差往山東廵漕御史兼有稽察疏濬河道之責著都察院即照例請㫖嗣後皆於十月内奏請差往欽此十七年奉㫖廵視通州漕務向例只委科道一人專司督催漕運而倉場事務則槩不與聞但通倉積弊甚多見委大臣盤驗所有一應收兑新漕支放俸米均著該給事中等就近稽察又諭通倉收兑漕糧積弊甚多見已特差給事中御史等四人駐通稽察其水次盜賣攙和等弊向所不免淮安濟寧天津廵察等官職所專司各有分地將來抵通交收倘有短少定當根究於何處盜賣以治其罪并將該廵察官嚴加議處欽此一廵鹽順治元年定兩淮兩浙長蘆河東各差御史一人廵視鹽課八年議準廵鹽御史一年更代又題準除長蘆離都城甚近舊不立限期兩淮定限五十日兩浙六十日河東三十日在内以辭朝日為始在外以交代日為始計程往囘並不許枉道囘家如違限十日以上量行叅罰一月以上重加叅處兩月以上題叅調用康熙五年題準兩淮兩浙河東廵鹽御史以到任日為始扣至九月足即行報滿由院豫為題請新差御史照定期赴任接徴不得一日空懸六年題準以後鹽差御史遇閏之年應令連閏在任十三月算一年差滿考覈又題準鹽差遇閏月之年照户部題定新例作十三月近差扣至十一月仍於兩月前報滿逺差扣至十月仍於三月前報滿如無閏月之年照康熙五年舊例遵行三十年議準福建兩廣各差廵鹽御史五十九年議準兩廣鹽務交與總督兼管停差廵鹽御史雍正元年議準福建鹽務交與總督兼理停差廵鹽御史四年奉㫖兩浙鹽務交與廵撫兼理停差廵鹽御史又定兩淮河東長蘆鹽政報滿更代本院具揭内閣辦理新勅竢勅書送到日該鹽政即將舊勅具揭恭繳院轉送内閣一廵察臺灣康熙六十年諭每年自京差御史一人前往臺灣廵察此御史往來行走彼處一切消息可得速聞凡有應奏事宜亦可條奏彼處之人皆知畏懼至地方事務御史不必管理欽此遵㫖議準每年差滿漢御史各一人前往廵察一年更代如有應行條奏事件具本條奏雍正五年諭臺灣逺隔海洋向來督學官員難以按臨考試是以將學政交與臺灣道兼管朕思道員管理地方之事又兼學政未免稍繁每年既差御史二人前往臺灣廵察應將學政交與漢御史管理甚為妥協見今御史在彼著即辦理臺灣學政嗣後永著為例欽此九年諭臺灣地方闗繫緊要廵察御史新舊兼用始為有益滿御史已畱任一年漢御史亦著畱任一年欽此乾隆十二年諭向因臺灣為海外要區設立廵察御史原以表正風俗稽察彈壓除剔弊端近㨿該撫奏該御史等於養㢘外又分派臺鳳諸彰四縣輪直每季約需費三四百金其出廵南北兩路供養夫車廚傳賞給各社畨黎操閲犒兵皆令各縣措備該衙門濫準辭訟差拘滋擾於額設胥役之外更有姦民挂名恃符生事該廵察既有專制一方之意而屬官極意承應雖有情弊亦復上下相䝉等語大凡廵察之員或因一二事隨時特設尚於地方有益至限年更換在該廵察等奉命逺行既已視為傳舍及至彼處而積習相沿因循滋弊懦弱者茍幸無過坐待𤓰期喜事者擅作威福諸事多所掣肘夫御史所以稽察人者也今乃自作弊後先相襲恬不為怪豈朕差徃本意其乾隆五年以後廵臺御史著交部嚴察議奏臺灣本有總兵道府文武大員足資彈壓一切案件原屬本省督撫察覈可不必别差廵察以滋煩擾著大學士九卿詳議具奏欽此遵㫖議準臺灣廵察自康熙年間設立以來迄今二十餘載兵民均各安堵未便因海宇寧謐遽弛防範應仍舊設立毋庸撤囘臺灣向分南北兩路滿漢廵察每年繫一路廵察隨從太多或致滋擾嗣後令其於每年農隙之時分路各廵察一次毋庸多帶僕隸以省糜費十七年諭臺灣文有道府武有鎮營足資彈壓廵察三年更代徒擁虛名事權則不如督撫切近又不如守令介在其間在有志向上者或以多事致敗而循分供職者多致志氣隳頺於公事殊無裨益所有廵察臺灣御史著三年一次命往事竣即囘不必畱駐候代著為例欽此一廵察盛京吉林黒龍江乾隆十二年諭盛京等處廵察官員昨已降㫖撤囘令屆三年該衙門將應否差往請㫖今思三年屆期一時差遣未必得如許賢員應分别年分陸續差遣方為妥協其廵察所至將軍以下倘有簠簋不飭政事失宜官兵擾累及案件有無逾限皆廵察分内應察之事游牧地方各有大員管理其是否實心任事選補屬官有無屈抑並上駟院等衙門馬羣事務是否妥協亦應一一體察於差竣之日據實奏聞既可悉彼處吏治民情廣明目達聰之益而廵察人員之能否盡職即可定其殿最欽此遵㫖議準廵察盛京以十四年為始廵察吉林以十五年為始各三年一次請㫖差遣十七年諭向來廵察盛京吉林均於科道内由都察院引見簡用至廵察黒龍江則於科道部員内由吏部引見辦理殊不畫一嗣後廵察黒龍江亦著於科道内由都察院引見欽此一考選御史順治十一年定漢官由貢生出身者不準考選十三年題準滿漢見任三品以上堂官子弟不準考選十五年議準凡試御史任事一年考覈實授如奉差在外差滿考覈康熙十九年議準漢官非正途出身者雖經保舉不準考選二十年議準捐納歳貢不準作正途考選滿漢督撫子弟亦不準考選四十四年奉㫖嗣後郎中補授御史停用試字員外主事照常用試字雍正三年議準御史試俸如有一年期滿未能深信者再試一年考覈七年諭向日由員外郎以下授為御史者有試俸一年題請實授之例若奉差在外則不得與在京者一體題請深為未協嗣後出差御史試俸一年期滿者具題請㫖著為例欽此十三年議準滿洲䝉古御史員闕照漢御史之例於郎中員外郎等官内保送引見補授漢御史員闕由郎中員外郎編修檢討考選主事由中行評博升任者不拘食俸年限準其考選由别項升授者食俸二年方準考選中行評博由知縣升任者準其考選又議準漢軍御史照滿御史之例由郎中員外郎等官内保舉引見補授乾隆三年諭御史員闕向來皆繫部院堂官將合例司官簡選保送翰林編檢亦在保送之列由吏部引見朕親加簡用此定例也但思部院司官及編檢人數甚多各堂官保送皆就所見舉出不過什之一二其餘衆員朕未遍覽或有可任科道而不在保送之列者亦未可定朕意欲將翰林部屬通行引見司官著該堂官出具考語引見編檢毋庸出具考語著掌院學士引見記名之後續交吏部竢有御史員闕按其品級俸次開列引見候㫖補授補用將完之日吏部再將如何考選别行請旨欽此六年奏準漢軍御史歸并漢人内一例補授七年諭古者諫無專官故進言之路廣三代而下始設官而責之以言然陽城馬周之起布衣而為御史其事猶可風也著大學士九卿督撫擇素所深知之人有骨鯁之氣質樸之風而復明通政治者不拘資格列名封奏朕將錄用焉欽此八年奏定將部曹編檢合例人員奏請考試後吏部引見記名補用十一年諭向例御史由保舉考試補授後因條奏引見記名特用今看來不若仍復舊制為妥著九卿於應行考選人員内秉公保舉請㫖考試引見候朕簡用欽此十三年奏準嗣後滿漢人員記名用為御史者按記名之先後照例引見補授又諭各御史風聞言事不域以地但既按省分道專司稽察該省事務則本省之人自應廻避本省其應如何定例著妥議具奏欽此遵㫖議準除見任御史内其所任之道在本省者由院酌撥别道移知吏部注册外嗣後遇有御史員闕如有奉㫖記名及應補人員應迴避本省者察明扣除即將其次之人引見補授十七年諭國家設官分職期於有裨實政若同一官而差分階級於官制體統未協如翰林部曹小京官補用御史既經簡擢同列諫垣即應無所區别乃舊有五品六品之分試俸不試俸之異舊例相沿宜歸書一嗣後給事中著仍為正五品御史皆改為從五品不必試俸欽此一内升外轉順治十七年議準御史有叅大姦大蠹興利除弊者别為一册以定優劣升轉時可即據為甄别十八年議準御史每年二月八月内升外轉各一人康熙十二年題準漢軍御史應入漢御史内論俸升轉雍正元年諭嗣後科道内升外轉不必拘定食俸年限盡行開列欽此十年定科道曽奉㫖記名褒奬議叙及申飭訓誨處分著繕一單於題請升轉㸃差時將單隨本進呈備覽乾隆元年奉㫖嗣後科道官内升外轉者竢補官日離任其未得升之先仍食原俸辦事三年議準滿洲䝉古科道照漢科道之例於每年二月八月内一并開列具題恭候欽定内升外轉各一人八年議準宗室御史遇滿御史升轉之時一例開列只令内升不令外轉十六年諭科道近列臺垣優絀易見自可不時擢用而定例内升外轉給事中則一年一次御史則一年兩次每逢奏請時自康熙雍正年間至今率降㫖停止者多每年徒増此題奏繁文於治理亦復無益嗣後三年舉行一次著為例欽此十九年定内升外轉京畿道將各道條奏繕造黄册進呈滿道槀漢道畫題漢道稾滿道畫題一補授掌道雍正元年奉㫖嗣後掌河南京畿二道著都察院簡選具題乾隆十五年議準按乾隆十三年軍機處㑹同吏部都察院議覆御史久於其任一摺内稱河南京畿道掌印仍聽都御史簡選保題外其餘各道均令滿漢一人為掌印其一道内有滿漢御史各數人者即以滿漢資深者各一人為掌印是資深為掌印專指本道見任御史而言原奏甚明候補人員不在其内嗣後一道有滿漢御史數人者只就本道見任資深者轉為掌印不得與候補之人通較資俸一補授給事中雍正五年定給事中員闕將任内並無降革事故之御史開列職名咨送吏部引見補授五年定䝉古御史轉補給事中後將滿洲人員補授竢䝉古給事中升轉之後再將䝉古人員補授御史乾隆八年議準宗室御史遇給事中員闕亦一例開列與滿御史通行引見如奉㫖轉科其所遺宗室御史員闕照䝉古御史之例將滿洲人員補授其稽察宗人府事務即令轉補之宗室給事中協同見在宗室御史一同稽察如宗室給事中升補之後再將宗室人員補授御史一臺制沿革康熙二十八年設滿洲御史二十四人五十七年設䝉古御史二人雍正五年設宗室御史二人乾隆十三年議準滿御史二十八人足敷辦理漢御史則有三十七人定數過多應照滿御史之數裁汰九員亦定為二十八人又諭御史向有坐道協道之分坐道徒屬空衘並不辦本道之事協道則以次遞遷其制沿自前明糺紛無謂今既定為二十八員與滿御史畫一應就見在十有五省即以此二十八人分理之省分事繁者多分數人並令稽察在京各部院衙門則可省紛更而專職業於體制方為允協著定議具奏欽此遵㫖議準按從前御史止有河南江南浙江山西山東陜西六道分察各部院事件其餘各道皆附於六道之中今既各歸各道其稽察事件自應分隸各道按事繁簡以定額數再十有五省御史舊例止有十四道雖有京畿一道專刷卷宗並不稽察直隸事件其直𨽻事件均分隸各道今將京畿道與河南等道合為十五道京畿道照舊刷各部院卷宗並辦理直隸及盛京等處刑名案件稽察内閣順天府大宛二縣應設滿漢御史各二人河南道辦理河南省案件稽察吏部詹事府歩軍統領衙門五城並辦理本衙門特交轉交之事及文武官考覈一應具控呈辭應設滿漢御史各二人江南道辦理江南省案件稽察户部寳泉局宣課司左右翼監督在京十二倉總督漕運衙門兼察三庫月摺事件應設滿漢御史各四人浙江道辦理浙江省案件稽察禮部都察院應設滿漢御史各二人山西道辦理山西省案件稽察兵部翰林院六科中書科總督倉場衙門坐糧廳大通橋監督通州倉應設滿漢御史各二人山東道辦理山東省案件稽察刑部太醫院河道總督衙門兼察覈五城竊盜命案應設滿漢御史各三人陜西道辦理陜西省案件稽察工部及寳源局應設滿漢御史各二人湖廣道辦理湖廣省案件稽察通政使司國子監應設滿漢御史各二人江西道辦理江西省案件稽察光祿寺應設滿漢御史各二人福建道辦理福建省案件稽察太常寺應設滿漢御史各二人四川道辦理四川省案件稽察鑾儀衛應設滿漢御史各一人廣東道辦理廣東省案件稽察大理寺應設滿漢御史各一人廣西道辦理廣西省案件稽察太僕寺應設滿漢御史各一人雲南道辦理雲南省案件稽察理藩院欽天監應設滿漢御史各一人貴州道辦理貴州省案件稽察鴻臚寺應設滿漢御史各一人除河南京畿道掌印仍由院簡選保題外其餘各道均令滿漢各一人為掌印其一道内有御史數人者即以資深者為掌印嗣後倘有出差事故該道乏人辦理者應聽院酌委署理再宗人府事件專責宗室御史稽察仍與䝉古御史同列滿御史之内一例升遷一同辦事其餘滿御史稽察八旗内務府及滿漢御史序次差務秋審等項仍照舊辦理所有増設湖廣等八道印信照例鑄給又議準滿御史並無坐道槩稱監察御史殊未畫一嗣後應照漢御史之例分隸十五道定為某道監察御史二十年奉㫖京畿道著列於河南道之前舊隸河南道之事著京畿道辦理舊隸京畿道之事著河南道辦理一直月乾隆四年定本院直月日以滿御史一人監收各部院八旗一切文移並内閣傳鈔事件筆帖式一人登記册籍在署直宿一督催所乾隆十三年奏準照各部例設立督催所按年輪委滿漢御史各一人凡各廳各道五城承辦事件著所委御史實力督催按限完結如限内不能完結著該處移知縁由倘無故遲延著督催御史具稾呈堂察覈糾叅如督催御史有意瞻徇一并糾叅一兩廳分掌乾隆六年奏準向例凡有欽部事件及議處等事繫河南道今京畿道承辦科道差五城注銷並管轄吏役等事繫經歴承辦繕本及滿官册籍繫都事承辦其餘五城詳報一切刑名錢糧及各部移咨案件並無專管之員皆繫六房書吏徑行定稾呈堂辦理按經歴都事為本院首領之官事務尚簡嗣後吏户刑等部闗渉事件歸并經歴掌管禮兵工等部事歸并都事掌管其行文稾靣列銜畫押呈堂如有遲延舛錯書吏不法等弊將承辦之員照各部司官例議處十七年奉㫖改滿都事二人為滿漢各一人一筆帖式定額乾隆十四年題定滿洲三十五人䝉古二人漢軍五人分隸各道兩廳一吏役定數都察院堂書吏三十三人皂役二十五名傳事驍騎二十八名經歴廳書吏四人皂役四名都事廳書吏一人皂役二名京畿道書吏九人皂役四名河南道書吏五人皂役六名江南道山西道山東道書吏各四人浙江道福建道雲南道書吏各三人陜西等七道書吏各二人江南等十三道皂役各二名稽察宗人府御史所屬書吏三人欽定大清㑹典則例卷一百四十八
