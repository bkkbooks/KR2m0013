body:
  text: 戸部關税上一直省關税以乾隆十八年奏銷册計之共四百三十二萬四千有五兩有竒一京師崇文門税十萬二千一百七十五兩有竒凡直省商貨入京均分地道按數科税照部頒見行條例徴收一左翼右翼税各萬兩凡八旗買受田房皆驗契鈐印計價毎兩收税銀三分牲畜之陳於街市者計價亦每兩收税三分入店則按牲畜之大小徴收一通州分司税即坐糧􅆹一萬二千六百四十七兩有竒凡水陸貨物皆計價科税伏地貨每價一兩徴銀八釐起京貨毎價一兩徴銀三釐惟糯米按石牲畜按數油進店出店按簍麯進店出店按塊通州張家灣酒糖舖零剪紬絹舖分别上中下三行按月科税均照部頒見行條例徴收一直𨽻天津關舊為河西務康熙元年改税七萬四千五百六千九兩有竒凡往來商貨有正税商税二項正税各按出産地道計數徴收商税按物價每兩徴銀四分均照部頒見行條例船税按梁頭六尺徴銀六錢二分七尺七錢二分八尺八錢九尺九錢二分一丈一兩二分丈一尺一兩一錢二分丈二尺一兩三錢丈三尺一兩六錢八分丈四尺二兩一錢八分丈五尺二兩五錢八分丈六尺二兩九錢八分河西務民駮船運糧抵通舊徴糧料雍正二年改於通州徴收乾隆二年免税一山海關税三萬二千二百兩凡陸路往來及海洋進口商貨均分地道按斤疋件副箱簍包擔科税有論車䭾者各因其物照部頒見行條例徴收船料梁頭五尺徴銀九分二釐六尺一錢五分九釐七尺二錢二分九釐八尺二錢八分七釐九尺四錢二分一釐一丈九錢八分六釐丈一尺一兩一錢四分六釐丈二尺一兩三錢六釐丈三尺一兩四錢九分六釐丈四尺一兩六錢七分八釐丈五尺一兩八錢六分四釐丈六尺二兩四分六釐丈七尺二兩二錢九釐丈八尺二兩六錢一分五釐民船加倉每倉二兩糧馬倉口每倉三兩竹木簰筏每甲一錢大者為簰小者為甲一張家口税二萬兩殺虎口税萬六千九百十有九兩有竒潘桃口税七千六百四十五兩古北口税二千六百九十九兩胡納胡河税二千有三十兩輝發穆欽税二百八十兩白都訥税二百有七兩凡牲畜計價直每兩收税銀三分貨物分地道照部頒見行條例徴收一龍泉紫荆獨石等關口税四千三百有六兩有竒繫落地税地方官随時酌收無定例一奉天牛馬税四千八十八兩凡旗民貿易牛馬駝驘計價一兩收税銀三分驢每頭收小數錢七百文以制錢三十三文為一百每羊收税銀五分豬計價每千錢收小數錢三十文邊豬謂販來者收小數錢百文圏豬謂自畜者收小數錢九十文舊例屠戸飯舖别徴湯税乾隆四年革除一鳳凰城中江税三千二百九十四兩凡朝鮮國貢使往還與内地客商互相貿易不拘何項貨物内地商人計價一兩收税銀三分朝鮮人免税一山東臨清關税四萬三千三百有五兩有奇凡商貨按部頒見行條例徴收船税有隨單料梁頭丈六尺徴銀一兩九分丈四尺七錢六分丈二尺五錢三分八尺小料一錢一分空民船三錢三分三釐有奇人載船九錢五分一釐有奇又有單料船按正補二料丈一尺徴銀二兩六錢八分丈二尺二兩八錢三分丈三尺二兩九錢七分丈四尺三兩一錢一分丈五尺三兩三錢七分丈六尺三兩六錢一分鹽船按正補二料丈一尺徴銀一兩八分丈二尺一兩二錢三分丈三尺一兩三錢七分丈四尺一兩五錢一分丈五尺一兩七錢七分丈六尺二兩一分舊例長船五尺納鈔十五貫自六尺至九尺每尺加十五貫一丈一百十有五貫丈一尺一百六十五貫丈二尺一百九十貫丈三尺四尺各加二十貫丈五尺二百五十五貫丈六尺三百貫雜船五尺納鈔十貫六尺七尺各加五貫八尺三十貫九尺四十五貫一丈至丈四尺各加三十貫丈五尺二百五十貫丈六尺三百貫毎鈔一貫折銀三釐一毫七絲三忽雍正六年更定新例米麥雜糧照滸墅關例籖量計石米麥每石徴銀二分二釐雜糧一分一釐補鈔每貫折銀三釐又米麥雜糧按正補二料按船之梁頭丈一尺徴銀五兩五錢六分丈二尺五兩七錢一分丈三尺五兩八錢五分丈四尺五兩九錢九分丈五尺六兩二錢五分丈六尺六兩四錢九分舊例小麥雜糧補料按船之梁頭丈尺徴收五尺至七尺均照船料丈二尺補税八尺九尺均照船料丈四尺補税一丈至丈六尺均照船料丈六尺補税亦計鈔折銀雍正六年更定新例工關税四千五百七十二兩有奇税銀解部例見工部一山西武元城税一千二百三十一兩有奇税銀解部例見工部一江蘇海關税七萬七千五百有九兩有奇凡商販内地貨物出洋及販外洋貨物進口者按斤疋箇件連副雙隻條把包簍木按根按圍板按塊科税船料每出洋科税一次梁頭一丈以外至二丈每尺徴銀一兩二丈以外每尺二兩貿易捕魚船每年徴收二次梁頭一丈以内每尺徴銀一錢五分一丈以外每尺二錢二分五釐折收分數安南商船進口出口均七折徴收東洋商船進口六折出口不論貨物槩徴銀百二十兩閩廣商船三月至八月進出均七折徴收九月至二月進出均五折徴收山東關東商船並各口貨税均八折徴收優免分數安南關東山東商船均優免十分之一東洋閩廣商船均例免五分優免五分乾隆二年定一滸墅關税四十九萬五千二百二十六兩有奇凡商船貨物有籖量作擔科税者雍正六年定大梁頭船前後量面廣腰廣底廣與深長因乘加五算活梁頭江駮船量兩邊齊釘花與深長因乘加五算活梁頭江舥船量濶搭一邊放一邊與深長因乘加五算活梁頭内江船量濶兩邊齊釘花與深長因乘加四算正江小欄水船量濶兩邊齊釘花與深長因乘加四算小江舥船量濶搭一邊放一邊與深長因乘加四算正江擺江船量濶兩搭不放與深長因乘加三算外江船量濶頂一邊搭一