  text: 欽定四庫全書欽定大清會典則例卷十五
  hash: sha256:f043fd9eea23ca612b6366794438a188c1e9990ac3bb425a0bda3069a6bdda52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_018-1a, image: WYG0620/WYG0620-0341a.png}
body:
  text: 吏部考功清吏司户口一編審人丁康熙二十五年題凖各省五年編審壮丁一次統於年終造冊具題如不照限題報者将經管各官皆照違限例議處如府州縣官假編審造冊科派小民者革職提問司道等官明知朦隐不報者亦革職提問若掲報督撫不行題叅或被百姓首告或被科道指叅将督撫亦革職五十二年欽奉恩詔續生人丁永不加賦如該府州縣各官於定額之外将新増人丁私派錢糧者革職提問司道等官不掲報督撫不察叅皆照私派例分别議處一買賣人口康熙三年題凖凡撥給山海關以外叛逆人犯妻子家僕有私行偷賣贖去者賣贖之人繫官革職專管各官各降二級調用如偷賣贖軍流等犯妻子家僕者亦照此例議處十七年覆凖八旗滿洲䝉古家人不許賣給漢軍民人違者将所買之人并價均入官買賣之人繫官罰俸一年收稅官罰俸九月其滿洲䝉古家人有違例贖身放出為漢軍民人者繫官亦照買賣例處分其喀爾喀厄魯特亦不許漢軍民人買違者繫官降一級調用将人入官十八年題凖旗下人買民人無論地方著用正印官印信凖買令用印衙門速呈户部由户部轉行該撫令該地方官暁諭如用印官十日内不将所買緣由呈報户部者罰俸一年如竟不呈報者降一級留任又議凖凡旗下家人将誘來人口隐藏在家販賣其主明知匿而不首者繫官革職若不知情失於覺察者罰俸三月若各該管之人或拏獲或出首或犯人自行投首者将該管官并其主皆免其議處又議凖官員該管地方如有誘騙掠賣人口藏頓窰子老虎洞等處該地方官不行嚴加察拏知情故縱者革職該管上司皆降三級調用又議凖京城地方如有聚衆搶奪路行婦女及以藥餅迷去幼小子女或用術拐男婦子女或賣或自為奴婢者将不行嚴禁之該管官罰俸一年在外直省地方如有搶奪迷拐等事不行嚴禁之州縣捕官罰俸一年印官罰俸六月本管知府及總捕㕔各罰俸三月至搶奪迷拐人犯之主知情不舉繫有職者革職又議凖旗人買良人為娼或将家下婦人縱為娼者娼婦入官其主繫官革職治罪家人将已自置僕婦縱為娼者其主不知情繫官降一級留任罰俸一年若知情繫官亦革職治罪族長繫官罰俸一年城外交與五城司坊官察拏若不察拏被傍人拏獲将司坊官罰俸一年該城御史罰俸三月雍正十二年覆凖官媒人等将婦女私養在家糾結匪𩔖局姦圖騙如非繫當官交領私具領状将婦女久養在家逾限不賣希圖重利者該管地方官不行實力察拏或被上司察出或别經發覺将該地方官照不實力奉行察訪窩家例罰俸一年乾隆四年覆凖凡違禁掠賣番仔之内地民人文武官弁稽察不力者照外國之人私自進口不行察報例專管官降一級調用該管上司罰俸一年知情故縱者照諱盗例革職受賄徇縱者叅革治罪又奏凖官員出差買女人者分别强和察議強娶者革職和娶者降三級調用一隐瞞秀女乾隆三年奏凖旗人隐瞞秀女者繫官革職平人交刑部治罪族長及該管官知情者降二級調用族長及兵丁鞭七十若不知情該族長草率具結者繫官罰俸一年兵丁鞭五十在屯之秀女如有隐瞞遺漏等弊将差徃稽察之領催照在京族長例議處一臺灣民人偷越苖地乾隆二年覆凖臺灣民人偷越苖地該地方文武官弁如有實力廵察一年之内拏獲十名者将拏獲之該地方文武官弁凖其紀録一次再有拏獲按數遞加議叙倘不實力廵察致有偷越之事别經發覺将該管文武官弁照失察民人擅入苖地例降一級調用上司罰俸一年若有賄縱情弊照私放出口例将該管官革職計贓論罪如兵役人等不實力廵察致有偷越之事如兵役有受賄故縱情弊者失察兵役之該管文武官弁如繫失察照失察衙役犯贓例議處如繫故縱照縱役貪贓例革職田宅一開墾荒地順治十五年覆凖丈量地畝遲延限期及丈量之地不明白詳報不送文冊檄催又不申詳或飭令該員監丈互相推諉者州縣官各罰俸一年該管官各罰俸六月康熙元年題凖各省荒地道府一年内開墾千頃以上者紀録一次三千頃以上者加一級四千頃以上者加一級紀録一次六千頃以上者加二級州縣官開墾百頃以上者紀録一次三百頃以上者加一級四百頃以上者加一級紀録一次六百頃以上者加二級竢起科時該督撫取具甘結具題之日分别紀敘如有未經開墾揑報者督撫布政使降二級罰俸一年道府降四級調用州縣官革職如墾地後有復荒者道府州縣官将開墾之加級紀録削去督撫布政使罰俸一年道府降一級住俸州縣官降三級住俸皆勒限一年督令開墾如依限一年内有墾完者凖其開復如限内不墾完者督撫布政使降一級再罰俸一年道府降二級調用州縣官降三級調用如前官墾過熟地後任官復荒者督撫布政使道府州縣官照經管開墾官復荒治罪倘有隐匿熟地稱為墾田者道府州縣官皆照未經開墾揑報例議處如督撫布政使未經察出亦照揑報例議處十五年題凖官員開墾荒地不照定例年分起科先期勒徴或過期不徴或私減地畝定額徴糧者州縣官革職道府各降三級調用督撫布政使各降一級留任如不照所限年分豫詳請徴或勒民開墾及開墾地畝以多報少以少報多或以先墾之地後又重報開墾及荒熟地畝不分晰明白溷報或應徴在民錢糧不察出者州縣官各降一級調用該管上司罰俸一年又議凖見任文武官並休致鄉宦或将熟地或将新墾増地隐一畝以上者降四級調用隐十畝以上者革職隐一頃以上者革職杖一百凖其折贖永不叙用其所隐田地入官所隐錢糧按年行追進士舉人生員貢生監生隐一畝以上者革去職銜隐十畝以上者革去職銜杖一百凖其折贖永不敘用其所隐田地入官所隐錢糧按年行追一應州縣官員将所隐田地不行察出不及二頃者降四級調用二頃以上者革職道府直隸州知州等官将所隐田地不行察出不及五頃者降二級調用五頃以上者降四級調用督撫布政使将隐地不行察出不及十頃者降一級留任十頃以上者降二級留任罰俸一年又官員因不行察出隐地處分之時先有察出隐地並因墾地有加級紀録者凖抵其餘加級紀錄不凖抵銷其地主已将本身地呈報州縣而州縣不呈報司道府官或州縣已經呈報而司道府官不詳明督撫者皆照隐地官員例處分其原首地主免罪總督廵撫以下州縣官以上離任之後如有隐地被接任官察出其升遷降調休致告病者皆照見任官例處分十六年題凖州縣官實心勸諭首出隐地二百頃以上者紀録一次六百頃以上者加一級八百頃以上者加一級紀録一次千頃以上者加二級該督撫仍不時察訪如有藉勸首名色滋事擾民該督撫即指名題叅照揑報開墾例革職十七年覆凖不肖官員有希圖議敘謊報開墾及察出隐地累民多徴錢糧者此等事發覺将謊報官照揑報開墾例議處加級紀錄卓異即升皆不凖抵銷雍正十二年覆凖各省督撫凡有開墾冊報即别委隔屬賢員履畝丈勘所墾之數與所報之數果屬相符取結送部勸墾之官凖其題請議敘倘丈勘之數與報墾之數不符即将原報墾之官題叅照以多報少以少報多例降一級調用如委勘之員一時朦溷或經督撫指叅或經日後發覺将委察出結之員亦照此例降一級調用至於山田或先可耕種後因水衝僅存沙石者難以播種並濱江濱河之田前經報墾後因水浸或經坍塌者應於水田六年旱田十年将届升科之期令該督撫按年委官覆加察覈如果有坍塌更改之處據實具題請豁其成熟田地仍行分别升科如有應行改正而互相徇隐者督撫察叅皆照荒熟地畝不分晰明白例降一級調用升科以後山田水田或彼衝此長彼漲此坍以新長者補衝以新漲者抵坍實在衝坍者即予開除仍将每年開除抵補細數造冊報部如該地方官不實力奉行督撫確察題叅亦照例降一級調用督撫不題叅别經發覺罰俸一年又覆凖凡藉開墾名色将有業户田産串通里甲地鄰朦官給照地方官不行察明濫給執照者照不分晰明白溷報例降一級調用乾隆十六年覆凖湖廣沿江州縣两岸多産蘆葦坍漲不常其坍没地畝印官竟有從未履丈率行據報請豁道員不過按冊抽察其中不免坍少豁多之弊嗣後嚴飭州縣逐一確切察明入冊道員詳細稽覈倘州縣仍前草率道員訪出掲叅如有扶同一并分别議處倘州縣及道員等仍前玩忽該督撫不即題叅部中按限察覈将該督撫一并叅處一撥給地畝康熙九年題凖凡官員撥補地畝不詳察部文原定􅍁項錯誤撥給或原定􅍁項有不便撥給情由不豫先詳明擅與改撥者皆罰俸一年二十四年議凖承辦撥地官員有意不遵部文徇情改撥者将該員降三級隨旗行走一旗人違禁外省置産雍正十二年覆凖八旗人員置買産業於各省者令各旗人員據實首報交與該省督撫按其産業之多寡酌量限期勒令全數變價回旗如有隐匿不首及首報不實者令督撫訪察題叅照侵占田宅律治罪所置財産照例入官如有地方官扶同徇隐不行究叅或被傍人首告或因他事發覺将不行實心察究之州縣官降二級調用未經察出之知府降一級留任督撫司道罰俸六月至於察禁以後仍有違禁於各省置産私相授受或託民人出名詭名寄户等事一經察出田産入官照律治罪地方官失於覺察照失於覺察例罰俸一年一入官田産康熙十四年議凖官員凡入官田産隐匿不舉者革職未經察出之知府降一級調用司道罰俸一年廵撫罰俸六月其令人居住耕種不納租銀者州縣官降一級調用該管官罰俸一年如估價短少或不候估價部文即賣者皆罰俸一年該管官罰俸六月雍正七年題凖田房産業一經入官即令本犯家屬立将契劵呈官出業該管官眼同原主秉公估定價直出示速售有願買者即給與印照照内開明不許原主勒索找價仍令買主出具並無假冒影射甘結存案如該管官仍有縱容原主踞占影射者或被旁人首出将踞占之家屬並影射之親友皆照隐瞞入官財物房産律坐贓論罪該管官照徇隐例治罪該管各上司照徇庇例降三級調用倘並無影射情弊而首告之人故行揑辭陷害按律反坐至所典房地及質當物件應責令原主勒限取贖歸還原本如逾限不贖即開明原本價直出示招售又虧空貪贓官吏一應追賠銀各該督撫委清察官産之員會同該地方官令本犯家屬呈明時價當堂将田房什物分别低昂公同確估詳登冊籍申報上司仍令本犯家屬眼同售買完項如有侵漁需索等弊許該犯家屬並買主首告将侵漁需索之官吏照侵盗錢糧及受枉法贓律從重治罪該管上司不行嚴察故為徇庇照徇庇例降三級調用又題凖凡應變價之田房産業價估千两以上者僻小州縣或無有力之家及雖繫通都大邑而價直至數千两一時不能即售令該督撫酌量分作年限完解限内不完罰俸六月二年以後不完罰俸一年如有售主先交價銀一半或三分之一即令其管業其餘銀各於年限清交給與印照該管官先将分年完解之處詳明上司咨部存案至所收銀逐年解交藩庫出具庫收送部察覈如一年限内完解不及該年分數者将該地方官察叅罰俸六月二年不完者罰俸一年三年以後不完每年罰俸一年若一年限内全完千两一案者凖其紀録一次以次遞加十三年覆凖入官産業如經管胥役占住侵租該管官毫無覺察或别經發覺或被上司訪出題叅照縱役婪贓例革職乾隆十五年奏凖承辦千两以下者限半年變完千两以上至數千两者該督撫酌量分作一年或二年變完十六年覆凖契稅銀繫屬雜項原與地丁等項正課不同若一例處分未免漫無區别但不肖有司将契稅銀任意侵匿而該管上司乃竟全無覺察或已經察知仍不據實詳報自應分晰情節酌定處分以專稽察之責嗣後所屬州縣倘仍有侵收契稅情弊即行據實指叅繫直隸州侵收者将該管道員繫州縣侵收者将該管知府直隸州知州皆一并察叅仍将或繫徇隐或繫失察於疏内分晰聲明如繫有心徇隐照徇庇例降三級調用如止於失察者照屬員因事受財同城知府失於覺察例降一級留任一擅責佃戸雍正十二年議凖凡不法紳衿私置板棍擅責佃戸勘實鄉紳照違制律議處衿監吏員革去衣頂職銜照律治罪地方官容隐不行察究經上司訪出題叅照徇庇例處分失覺察者照不行察出例罰俸一年如将佃户婦女占為婢妾者皆革去衣頂職銜按律治罪地方官徇縱肆虐者照溺職例革職不能詳察者照不行察出例罰俸一年該管上司徇縱不行掲叅照不掲報劣員例議處至有姦頑佃户拖欠租課欺慢田主者照例責治所欠之租照數追給田主欽定大清會典則例卷十五
