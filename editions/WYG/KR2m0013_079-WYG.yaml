即速虔誠祈禱欽此遵旨擇日致祭天神地祇太歲等壇遣王大臣各一人行禮又諭此次祈禱雨澤前期一日暨祭期共二日齋戒禁止屠宰得雨即不必祈禱若不雨應祈禱社稷壇前期三日暨祭期共四日齋戒禁止屠宰欽此是月祈禱天神地祇太歲三壇即得雨霑足照例奏請報祀前期齋戒奉旨此申報致祭不必禁止屠宰欽此九年諭京師及附近府屬如天津河間等處自冬徂春兩雪稀少今清明已屆農事方殷朕心深為憂惕宫中黙禱已非一日矣此時雖未至雩祭之期亦當敬謹祈求以祈膏澤早降著禮部順天府虔誠祈禱速議舉行欽此遵旨議準於關帝廟城隍廟設壇擇日同順天府官率僧道各十二人先一日薫壇祈禱五日王以下各官咸致齋不理刑名照常辦事民間禁止屠宰九卿輪赴虔禱並於黑龍潭虔誠祭禱五日不雨復薫壇祈五日又致祭凝和廟雲神時應宫龍神宣仁廟風神昭顯廟雷神虔誠祭禱五日仍不雨齋祈如初復分祭黑龍潭五所得雨則用牲報謝如不雨遇行常雩禮停祈闗帝廟城隍廟即分禱於神祇等壇又諭京師自春徂夏雨澤愆期風霾時行朕心憂惕親製祭文遣官虔禱於宣仁廟著禮部太常寺遵照典禮即於初八日敬謹舉行欽此又諭雩祭之典所以為百榖祈膏雨也從前大臣等定議禮儀悉照圜丘之制朕思目下畿輔雨澤愆期此次舉行雩祭正望恩迫切之時非毎夏常雩可比其先期前詣齋宫及祭畢回鑾朕皆御常服不乘輦不設鹵簿不作樂以示虔誠祈禱為民請命之意欽此太常寺奏請皇帝躬閲祝版玉帛香應否仍龍袍衮服祭日應否仍御禮服駕詣圜丘祭畢回鑾不陪祀王公百官赴午門前迎送應否照常朝服奉旨恭視上帝祝版玉帛不敢御常服自應仍御衮服午門前迎送王公各官均服常服欽此是年常雩日皇帝由齋宫歩至圜丘行禮回鑾徹樂仍照七年原議遣官祈禱於神祇各壇甘霖疊沛乃遣官報祀並於常雩以前曾經祈禱之各廟均報祀如常儀十年奏準祈禱雨澤自四月二十一日至五月初十日祭告各壇適值夏至大祭在邇應竢大祭方澤後再行祈禱報祀又奏準祈雨儀前期皇帝詣齋宫不設大駕鹵簿不作樂祀日皇帝雨冠素服陪祀王公大小官員亦用雨冠素服其午門前迎送各官咸常服二十四年六月諭朕躬祭方澤值祈雨之時竭誠籲懇未獲甘霖夏至已踰廹不可待後日即進宫徹膳䖍齋思過待命十一日敬舉大雩之禮以祈天佑一切禮儀該部速議以聞欽此遵旨議準大雩祀昊天上帝於圜丘不設列祖配位仍設四從神位於第二成東西嚮祀前一日皇帝御常服詣太和殿視祝版執事官咸常服已刻皇帝詣壇齋宿常服乘騎出宫不乘輦不設鹵簿不陳樂前引後扈大臣侍衞咸常服導從午門鳴鐘不陪祀王公百官常服跪送駕至南郊由壇西門入至昭亨門外降騎歩行入壇恭視壇位上香行禮如儀祀日皇帝雨冠素服歩禱於壇扈從官暨陪祀執事各官咸雨冠素服不燔柴不進俎不飲福受胙餘樂章樂舞及玉帛器數悉與常雩同皇帝行三獻禮畢復位北嚮立司樂協律郎引舞童十有六人衣元衣執羽翳進至第一成壇上為八列賛引官奏跪皇帝跪羣臣皆跪舞童乃舞皇舞按節歌御製雲漢詩八章歌畢退贊引官奏拜興皇帝率羣臣行三拜禮興乃徹饌送帝神望燎並如常雩儀禮成皇帝還宫午門鳴鐘不陪祀王公百官常服跪迎如初儀是日遣官一人告祭方澤次日油雲四布甘雨普降四郊霑足卜吉分遣官報祀圜丘方澤社稷一如大祀儀大祀二一大祭北郊順治元年定毎歲夏日至大祭地於方澤以五嶽五鎭四海四瀆從祭八年尊封肇祖原皇帝興祖直皇帝永陵山為啟運山景祖翼皇帝顯祖宣皇帝陵山為積慶山太祖高皇帝福陵山為天柱山太宗文皇帝昭陵山為隆業山從祭方澤附五嶽五鎭之次又定凡親祭方澤飲福受胙如圜丘禮十六年奉移景祖翼皇帝顯祖宣皇帝陵祔興京啟運山停積慶山從祀康熙二年尊封世祖章皇帝孝陵山為昌瑞山從祭方澤祔三陵山之次雍正五年奏準大祭方澤皇地祇配位前金鑪應各増鑪蓋交與工部敬謹製造乾隆元年尊封世宗憲皇帝泰陵山為永寧山從祭方澤祔四陵山之次七年議準修理方澤齋宫毎夏至大祭先期一日詣壇齋宿南郊詳見八年諭嗣後朕大祭地於方澤既豫宿齋宫其壇北門外幄次不必張設欽此九年諭夏至祭方澤朕先期一日詣壇齋宿但彼處樹木新植尚未成陰天氣炎熱扈從人多不免有病暍者今歲炎熱甚於舊歲此次不必前詣壇内齋宿仍於宫内齋宫住宿嗣後遇親祭之年該衙門兩請候㫖竢樹木成陰後仍照例齋宿壇内此次前徃致祭正當祈雨之時不乘輦不設鹵簿著即傳諭各該衙門知之欽此十一年諭今歲夏至致祭地壇齋宫樹木漸次成陰扈從人等已有憇息之所況逢時雨之後天氣清凉朕仍照原議前徃壇内齋宫住宿欽此十三年諭朕覽吏部等衙門所奏致祭地壇陪祀之文武大臣官員其中不到者甚多嗣後凡遇一應朝祀大典應行齊集之處如有仍蹈前轍者朕斷不為之姑容至稽察齋戒之大臣尤宜敬謹從事豈有轉不陪祀之理此後宜一例齋戒欽此十四年諭稽古明禋肇祀郊壇各以其色地壇方色尚黄今皇祇室乃用緑瓦蓋仍前明舊制未及致詳朕思南郊大饗殿在勝國時合祀天地山川故其上覆以青陽玉葉次黄次緑具有深意且南郊用青而地壇用緑於義無取其議更之至兩郊壇宇雖歳加塗塈而經閲久逺應勅所司省視所當修整者敬謹從事大學士會同各該衙門詳考典章具議以聞欽此遵旨議準北郊皇祇室蓋用緑瓦繫沿明舊制應依方色改易黄瓦以符坤徳黄中之義壇宇有當修整者咸交與工部敬謹辦理俾可經閲久逺其壇内需用器物亦遵定制増飾見新再興工前期各殿宇神位理宜恭請於别殿暫時安奉地壇内向無别殿應於繕修皇祇室前期將舊有供奉祝版及籩豆房五間重加修飾敬製平臺六座安奉皇地祇神版於中列聖神牌於左右東西兩旁敬製平臺各一座安奉從壇神牌竢工竣之日恭請還御十五年奏準方澤二成臺面琉璃惟中含六六陰數其餘皆繫湊合於義無取請照圜丘壇制鋪石就壇面鑿眼以備安設幄次其石數一成正中仍照舊制用三十有六八方均以八八積成縱横各二十四路二成倍一成八方八八之數半徑各八路庶與偶數相應而甎式匀稱益堪永久又奏準方澤壇舊制正位幄次縱文六尺五寸廣丈二尺配位幄次縱丈五尺廣丈一尺較圜丘幄次為大而方澤正位牲俎設幄内配位牲俎半在幄内半在幄外體制不免參差職事趨蹌亦覺太狹應將縱廣尺寸均改為丈二尺照圜丘壇制皆於幄次外設牲俎以昭畫一又奏準地壇皇祇室緑瓦已遵旨改用黄瓦所有内外壝牆及各門向覆緑瓦請一色改用黄琉璃又奏準南郊正位配位神龕内外設幄幔三層北郊正位配位神龕僅設一帷體制未能畫一請照南郊龕式増設又舊制龕案帷色均用金黄今請改用明黄又奏準北郊陳設一應器用均從方色用明黄又奏準南郊設請神位龍亭十祈榖壇設請神位龍亭六以備祭祀時迎送之用惟北郊繫職事官奉請不設亭應增造請神位鳳亭十座以昭畫一十六年奏準修理北郊皇祇室擇吉興工前期遣官告祭天地太廟後殿奉先殿社稷屆期詣皇祇室以奉請神位祗告皇地祇列聖從壇神位禮部尚書率太常官恭奉各神版至暫奉神位所敬謹安設於新製平臺上興工之日各遣官祭后土司工之神儀均與修祈榖壇禮同十七年奏準北郊工竣除祗告天地宗社請竢南郊工竣日舉行至擇吉恭請神位還御皇祇室應遣官詣暫奉神位所祗告皇地祇列聖從壇神位禮部尚書率太常寺官恭奉各神版還御奉安畢行一跪三叩禮並於是日遣官祭后土司工之神均與興工禮同欽定大清會典則例卷七十六
