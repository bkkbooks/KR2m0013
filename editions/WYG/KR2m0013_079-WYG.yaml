body:
  text: 禮部祠祭清吏司大祀一一大祀南郊順治元年定毎歲冬日至大祀天於圜丘以大明夜明星辰雲雨風雷從祀十二年諭禮部郊祀大典朕自即位以來必誠必敬間遣官恭代亦必如禮致齋今十一月二十五日冬至祀天已於十九日遣官恭代但因駐蹕南苑致齋日期爾部未經題明内院諸臣亦未奏知偶失記憶忽然猛省不勝悚惕朕為天之子昭事當䖍既有疎忽何敢自隱即選擇吉日祗申祭告爾部奏行欽此十四年諭南郊祀天禮宜嚴重其前祀五日朕親詣視牲祀前一日朕親宿齋宫如遣官恭代亦著詣壇齋宿視牲永著為令欽此又定修理天壇神版遣太常寺卿一人赴神位前上香行一跪三叩禮恭奉神版於神庫内修理告成之日仍恭奉神版至原位奉安畢行一跪三叩禮退康熙三年諭冬至四從壇分獻向來遣副都統侍郎不合應以都統尚書一品大臣分獻欽此十二年奏準神樂觀内大殿所懸匾額繫太和殿三字應改為凝禧殿五十八年諭祭祀天壇朕雖年邁必欲親詣於祭前陞壇瞻仰省視俎豆量力跪拜退處帷中竢恭代親王行禮畢然後回鑾將朕親詣之意於祝文内序明欽此雍正二年奏準天壇大祀上帝位前金鑪一幄前門鑪二配位前金鑪各一應於各鑪上設蓋祀時委太常寺官各一人恭候皇帝上香後即行安蓋所設鑪蓋行工部製造五年諭天壇内有羣飲嬉遊者應令禮部太常寺嚴行出示禁止仍不時令司官前往稽察如有此等之人即行嚴拏交部治罪欽此八年諭朕自御極以來毎值圜丘大祀必親詣行禮至誠至敬以展對越上帝之悃忱今年冬至之日恭遇皇考聖祖仁皇帝忌辰禮部太常寺引康熙三十九年及四十五年正月初七日祭祈榖壇恭遇世祖章皇帝忌辰遣官恭代之例奏稱今年郊祀之期應照此例遣官恭代朕為此五中展轉今年不親行郊祀之禮於心甚為不安其如何得展朕心而又符合典則著大學士九卿敬謹妥議具奏欽此遵旨議準記稱君子之祭必身親涖之有不能親則使人攝可也周禮春官亦稱大祭祀若王不親則攝祀唐宋之制大祀與國忌同日者樂備而不作然議者謂饗神不可無樂未若攝祀之當乎禮也應仍遣官恭代以展明禋乾隆七年奏準郊祀典禮最鉅是以歴代制度車輦儀仗備列尊崇所以肅明禋而重禮制也周禮祀天用玉輅晋宋以後並皆遵循無異唐宋參用大輦或乘輦自齋宫赴壇或祀畢御輦還宫雖儀節間有不同皆乘輦輅親祀南郊前期詣齋宫請御玉輦為宜又議準冬至前一日躬詣南郊齋宿鑾儀衞使率屬陳大駕鹵簿於午門外奉輦官進玉輦於太和門階下祗候已刻太常寺堂官恭請皇帝乘禮輿出太和門降輿陞輦鑾儀衞使跪奏請發鑾駕駕發警蹕午門鳴鐘鼓翊衞諸臣照例於應乘馬處乘馬左右傍輦從行至南郊駕由昭亨門左門入至鋪椶薦處降輦贊引官二人導入内壝左門詣圜丘視壇位分獻官分詣神庫視籩豆神廚視牲牢畢贊引官二人導駕至降輦處陞輦詣齋宫從祀王公百官蟒袍補服按左右翼立齋宫外候皇帝降輦陞禮輿入乃退各歸齋所是夜嚴更宿衞警蹕環巡次日太常寺堂官按時請駕乘禮輿出齋宫陞輦至鋪椶薦處降輦入更衣幄次竢安奉神位畢皇帝具禮服出幄次贊引官二人恭導詣壇行禮祀禮既成皇帝入幄次更衣畢出昭亨左門外陞輦至太和門鑾儀使奏請降輦陞禮輿還宫又奏準大祀圜丘祈榖方澤供設鑪鐙籩豆均於駕未至前陳設惟進俎竢典儀官於獻玉帛之後唱進俎庖人始於壇下舁進香鑪鐙几亦須移於兩旁竢沃湯畢始安復原位倉卒間豈能必其端正且進俎九十餘人環繞壇上未免進退不齊似非敬謹之意嗣後大祀圜丘祈榖方澤所進之俎亦如籩豆豫先陳設其獻玉帛後典儀官唱進俎止須執湯壺官進前沃俎贊引官恭導皇帝詣神位前拱舉進俎毋庸庖人臨時舁進其香鑪鐙几亦省移請之煩又奏準向例大祀天地祈榖如皇帝親詣行禮迎神樂作皇帝詣各神位前上香復位後東西兩門鑪司香官始行㸃香安鑪蓋嗣後請照各壇廟於請神位時兩門鑪豫為㸃香薰壇其安設鑪蓋請照時饗太廟例㸃香畢隨安鑪蓋又諭禮部奏稱冬至前一日視祝版常例御補服今恭遇皇太后聖誕值穿吉服日期視祝版詣齋宫皆應御龍袍衮服等語朕思乘輦前往齋宫鹵簿全設大禮所關自應御龍袍衮服嗣後若遇豫日應詣齋宫齋宿之祭其視祝版詣齋宫皆應御龍袍衮服隨從人等皆穿吉服永著為例欽此十二年奏準皇帝御齋宫日詣皇穹宇皇乾殿皇祇室内上香次詣壇視壇位又次閲籩豆畢詣齋宫十三年諭向來郊壇大祀凡遇遣官恭代之日大學士等均不齋戒陪祀蓋因會典開載定例有武官公以下輕車都尉以上文官尚書以下員外郎品級以上之語是以親王及内大臣大學士等咸不陪祀朕思王等天潢近派原與臣僚不同自當隨駕前往内大臣等職司環衞若專顧陪祀則禁直必至曠誤惟親行扈從亦為合宜若大學士乃政府之臣為百僚表率尤當敬謹齋宿以為衆倡何以轉不陪祀揆厥由來蓋縁明代大學士僅列五品在尚書以下文官以尚書為冠則大學士等已在其中至我朝雍正年間大學士既定為一品在尚書之上則所稱尚書以下應改為大學士以下嗣後一切祭祀大學士等均令齋戒陪祀將此載入會典欽此十四年諭朕於兩郊大祀先御齋宫以齊一思慮記曰齋者耳不聽樂孔子曰三日齋一日用之猶恐不敬二日伐鼓何居言不敢散其志也今齋宫宵漏下鳴畫角嚴鼓以為節雖異於宫懸合奏而吹角鼓鼙軍中之容豈所謂專致其精明者與此蓋相沿前明弊典未更後此嚴更鼓角不當用之齋次大學士其會同該部定議以聞欽此遵旨議準齋戒以交神明防外聲之感乃以肅内心之敬鼓本樂器而用兼施於軍角為軍樂而後遂設於鹵簿齋壇之夕嚴更鼓吹畫角其義誠無所取請嗣後齋宫吹角嚴鼓悉行停止以昭肅穆又議準兩郊壇宇嵗修向有著令而金碧采章或日久不鮮階級甎甓間有損闕堊赤間有漫漶均應敬謹修理俾可經閲久遠其壇内供器用物亦遵定制增飾見新再興工前期應恭請神版於别殿安奉天壇大饗殿地處尊嚴應於繕修皇穹宇時恭請皇天上帝神版列聖神牌於殿内安奉兩廡安設從壇神位竢工竣還御後乃節修皇乾殿又諭圜丘張幄次及陳器品處過窄既議鼎新可將圜丘三成臺面仍九五之數量加展寛則職事者得以從容進退益昭誠敬爾等詳議具奏欽此遵旨議準圜丘舊制照明官司尺一成徑廣五丈零九寸當九五之數稍涉牽合而三成用十二丈則於奇義無取今擬照律吕正義所載古尺制度一成面徑九丈為一九二成面徑十五丈為三五三成面徑二十一丈為三七則天數一三五七九於此而全合三成徑數共四十五丈脗合九五之義幄次亦可加展廣深陳設器物職事人員咸得從容進退以昭誠敬其壇面甎塊原制上成圓面九重二成七重三成五重未免參差今壇面既加展寛應請均用九重遞加環砌一成自一九遞至九九二成自九十至一百六十二三成自一百七十一至二百四十三體制庶為整齊計毎塊長三尺六寸有竒上廣三尺五寸有竒下廣一尺勢難用甎應取用艾葉青色石庶質性堅良可以經久至毎成四陛之外闌版圍繞毎成四面一成毎面十八扇二成毎面二十有七三成毎面四十有五總計三百六十扇亦與周天度數相符以上三成臺面並闌板長闊高厚階級廣深均按古尺略加增減悉與九數相合以上應乾元之法象十五年奏準圜丘展寛幄次應請更新皇穹宇皇乾殿内供奉神龕内外帷幔並供奉各案外帷均應用青色織金龍段以符體制圜丘壇面既改用青石其張設幄次所需柱木應即於壇面鑿眼安設無事更用拴絆石鼓致礙進退趨蹌其皇穹宇臺面前檐砌墁舊制雜用石與琉璃並請照圜丘壇制均用青白石鋪墁以昭畫一又奏準圜丘内外壝牆皇穹宇門樓圍垣向覆緑瓦均請改用青色琉璃以符體制又皇穹宇扇面牆垣上截舊飾青灰並改用青色琉璃砌墁又奏準天壇内供奉神龕寶座一切器用塗飾丹漆並蓋袱等物布帛色雜用青黄均請照制禮從類辨色從方之義將天壇陳設器物色皆用青又奏準郊壇陪祀官行禮雖有定位但皆臨時設立版位恐就列不免參差難以整肅請仿殿陛朝儀於行禮處安設品級拜石按班就次庶免隕越其内壝門内東西陳設樂器亦於地面立石俾方位昭然又奏準天壇興工應先於祈榖壇經始竢繕修完竣乃節修皇穹宇圜丘又奏準圜丘祈榖壇方澤臺階上下陳設銅鼎成式不一體制亦粗應將舊鼎各按方圓改鑄又舟以承尊各壇所設尊案體制不齊請三壇正位設案一可受一尊東配位共設一案可受三尊西配位共設一案可受二尊以昭畫一十七年奏準修理圜丘皇穹宇擇吉興工前期遣官祗告天地太廟後殿奉先殿社稷屆期詣皇穹宇以奉請神位祗告皇天上帝列聖從壇神位禮部尚書率太常官恭奉各神版至祈年殿敬謹安設興工之日各遣官祭后土司工之神儀均與祈榖壇禮同十八年奏凖南郊工竣遣官祭后土司工之神擇吉恭請神位還御前期一日遵照原議遣官祗告天地太廟後殿奉先殿社稷至日恭詣祈年殿奉請神位還御太常寺鑾儀衞官率校尉設龍亭於祈年殿前禮部尚書詣殿内上香行三跪九叩禮畢太常官詣各神位前一跪三叩恭請神版安奉各龍亭内跪叩如初舁亭依次行出祈年門進成貞門至皇穹宇恭奉上帝神版配位從位神牌奉安皇穹宇上香行禮如前一孟春祈榖順治元年定毎嵗正月上辛日祀上帝於南郊為民祈榖十四年題準順治十五年正月初四日上辛祈榖之期前三日齋戒正值元旦改期於十四日次辛行禮十七年諭帝王奉天子民禮隆禋祀饗帝大典所關尤重必儀物克備乃足昭對越之誠向來郊祀惟冬至用燔柴禮祈榖未經舉行雖祀典原有差等而同為祀上帝典禮不宜有異嗣後祈榖皆行燔柴欽此康熙二十八年諭祈榖祝文毎年皆用定式既為民祈求宜直抒情事去歲直隸亢旱已經蠲免振濟但三冬雨雪甚少朕心仍切焦勞此祝文該衙門將朕肫懇䘏民之意切實撰擬進覽欽此三十七年諭大祀圜丘樂舞生班次與王等行禮之處相逺觀瞻甚屬整齊惟祈榖壇陪祀王等向來序立於樂舞之前樂舞生或因地狹而動不合禮應將樂舞生移列於前王等在後行禮爾等詳㸔議奏欽此遵旨議準量看祈榖壇地面自大饗殿門檻南至臺階縱六丈五尺原設樂舞位去石階一丈今移列於前去石階二丈其餘二丈為諸王行禮之地樂舞生去殿門三丈有竒前引大臣序立於檐下左右與奏樂處相去一丈餘庶觀瞻整肅而佾舞位次亦不致以地狹越禮五十四年諭據太常寺奏春祭祈榖壇於初十日上辛致祭但次年正月初十日雖繫上辛尚未立春從前亦有於次辛下辛致祭之時大學士會同太常寺議奏欽此遵旨議準於正月三十日下辛行禮雍正七年諭定例正月上辛日祈榖於上帝若上辛在正月初五以前則於次辛行祈榖之禮雍正三年五年均以次辛祈榖由舊章也但思元旦朝賀者朕躬之禮儀上辛祈榖者祀天之大典明年正月初二日上辛禮部題請於十二日中辛行祈榖禮朕思若以正月而論則十二日為中辛若以立春後而論則十二日為下辛矣因元旦朝賀筵燕而展祈榖之期朕心深有未安著定於初二日上辛行禮先期照例敬謹齋戒停止朝賀筵燕嗣後若元旦逢上辛之期則於次辛祈榖如在初五以前或值初七日世祖章皇帝忌辰著該部兩奏請㫖欽此九年奏準正月十七日祈榖