掲報督撫司道該督撫即據掲題叅或督撫司道䕶庇離任之員該管知府知州畏慮分賠因而抑勒交盤者被抑勒之員直掲部科部科代為陳奏掲司道府州等官令各該督撫據實確審定擬具奏有干連督撫者將具掲之員與前任虧空之員均押解赴京交都察院察審明確將抑勒之督撫一并治罪或繫誣揑將誣揑之員交刑部加倍治罪倘前任官虧空後任官徇隠不報出結接受者坐後任官賠補或已經接受至本身離任之時有虧空未清稱繫前任虧空者將欠項追賠外仍治以徇隠私受之罪其出掲之員經調任他省該管上司有因該員從前掲報之故多方搜求藉端誣䧟者許該員於都察院呈辨果繫叅處寃抑將該上司議處如該員本有應得之罪藉從前掲報之名誣揑呈辨者於本罪之外加倍治罪又議準糧道交盤錢糧照布政使司交盤之例造具細欵四柱册具題交部將動撥各款覈對又覆準知府直𨽻知州離任時除本任内倉庫錢糧仍照定例限兩月交代其所轄州縣一切正雜錢糧再限一月造册交代令署官盤察出結如署官察出虧空掲報即著前任府州均半分賠署官亦與新任官造册交代如逾限不即交代及該管官督催不力者一并議處五年諭凡属新舊官交代遲延大約由於舊官案件不清者多而由於新官勒索者少若新舊一例處分未為允恊著九卿分别定議具奏欽此遵旨議準凡督撫覈叅交代遲延即將情由詳細確察如果繫舊任官希圖掩飾不於兩月内將任内錢糧等項徹底清白造册交送新任官則遲延之咎専在舊任官與新任官無渉該督撫即將舊任官因何遲延緣由明白開注指叅將舊任官照例罰俸一年新任官免議如舊任官已徹底造册送交而新任官推諉不接以致遲延者該督撫即將情由注明指叅將新任官照例罰俸一年舊任官免議如舊任官至限期將屆始將冊籍造送新任官又不即上𦂳察覈以致遲延則其咎固在舊官而新任官亦難辭責該督撫將此情由亦行分别注明指叅將舊任官罰俸一年新任官罰俸六月其督催不力之上司仍照定例議處又議準嗣後各省州縣凡一應經管事件仍照舊例兩月交代報部惟積貯倉糧必逐一盤察嗣後倉糧多至五萬石以上者報明上司準於定限兩月之外展限一月六年諭向来州縣交盤錢糧倉榖均以兩月為限但額徴數少之地方自可依限清楚其額數繁多之處亦照兩月定限未免太迫從前曾降諭旨凡州縣倉榖五萬石以上者準其展限一月盤察交代嗣後州縣錢糧交代五萬兩以上者亦令展限一月其十萬兩以上者展限兩月十五萬兩以上者展限三月著為定例通行直省遵行欽此又覆準州縣官交代時應交銀米如有盈餘據實報出照附餘錢糧作數或花戸完納偶錯或官役俸工養廉工程物價前官未及支銷者當確覆給還不得槩作盈餘溷報八年覆準嗣後倉糧二萬五千石以上者展限十五日一人有兩縣交代者再展限一月乾隆元年議準委署之官如果易於交盤而故意延挨希圖卸責者該監盤上司察明掲叅照無未完錢糧盜案新官藉端抑勒遲延例降職二級調用監盤上司徇隠不掲叅者照例降一級調用二年題準修理文廟學宮例於學租銀内動用報銷新舊交代之際或有殘闕損壞應行修整之處察明學租多寡工程大小照例聲明交代其祭器樂器原有者造册交代未備者陸續接辦又題準州縣忠義節孝祠宇令前任官修整交代後任官接受修葺如有動帑建立未久坍塌者原辦之官賠補又先農壇及農具社稷風雲雷雨山川城隍諸神壇墠以至營房墩臺柵䦨火具水銃等項已經修備者照例交盤未完備者照案接辦又古昔帝王陵寢先賢祠宇社學青海碑及建牐浚河等事前任官料理未竣各交明接任官照例接辦不得推諉又議準清河桃源宿遷三處新修橋梁道路令地方官新舊交代之時照例造入交盤册以専責成又題準存匱存庫號箱并存倉廒口各册新官到任前官止造簡明總册三日内移交其應行交代之堂簿串根册籍批領卷宗四柱册及一應自理辭訟文册限半月内移交如有舛錯案據未全新官向經承追比一月内新官務將應交册卷追齊察覈又題準承追錢糧虧空侵那贓罰贖鍰代賠分賠等項先將存庫銀錢存倉租息米榖收清次察交存官物田房有無抵換盜賣倒塌荒廢私占私侵及分賠案内倉榖官物有無霉變短少未變價直是否敷足未完銀米是否有著確覈原案遵照定限清察册報又題準未完民欠有無官役侵蝕揑報之處如徴比時有以已完控告者立即根察訊處又題準承修承造承辦事務動用錢糧咨題報部續奉覆減駮追者均應本案完結如繫未經報部奉上司駮追者應於交代限内有則補交歸款無則請叅虧空又題準州縣新舊交代該管知府不得輾轉苛求以致不能依限清楚如有此等經州縣通詳止叅知府遲延職名但不得於正限滿日藉辭諉卸其有應駮詰事件照例駮行覈轉因而遲延逾限者咎在造册舛錯之州縣其知府督催不力照例議處又題準交代之際原恐新官被前官胥役欺蔽是以定例委官協盤使新舊允服交代速結倘委官躭誤不到以致遲延或已到而有通同徇隠偏袒苛累等情皆分别掲叅三年題準廣西煙瘴俸滿於報滿之時督撫將各官居官實蹟出具考語分别題咨仍委員前往交代撤囘内地候升一盤察倉庫康熈二十八年題準嗣後各省巡撫於每年奏銷時親往藩庫盤察錢糧如無虧空即於奏本内保題保題之後仍有察出虧空者照二十七年題準新定交盤例治罪又於嵗終令知府將州縣經徴帶徴錢糧調取比册詳察倘有徴多報少虧空情弊申報藩司巡撫如知府徇匿不舉亦照新定交盤例議處又題準糧驛二道貯庫錢糧責成藩司各府貯庫錢糧責成各道令每年嵗終親往盤察如無虧空即具保結申送巡撫倘保結之後仍有察出虧空者該撫題叅將藩司各道皆照例革職分賠三十九年題準上司盤察所属倉庫例於年終時限甚迫準自次年奏銷以前秉公親察據實出結又題準嵗終知府盤察州縣錢糧除例應存留外其餘於三日内起解藩庫如三日内不起解即掲報題叅四十四年覆準知府年終盤察出結之後仍令不時盤察無論何時察出立即報叅免其治罪分賠或别案發覺始行掲報者仍照例治罪分賠如有知府需索州縣者亦許州縣通報司道督撫題叅治罪如督撫不具題或被科道糾叅將督撫照徇庇例處分雍正元年議準嗣後藩庫錢糧每年奏銷時該省有總督者令總督㑹同巡撫親察無總督者責成巡撫盤察錢糧無闕出具印結於奏銷本内保題如有虧空該督撫題叅如扶同徇隠一并治罪照例分賠如督撫抑勒下司那借濫動以致虧空者該布政使司即照新舊官交代不明之例通詳各部院或具掲密送各部院據掲奏聞將督撫議處又覆準知府盤察倉庫凡一應禮物永行禁止又諭總督有管轄兩三省之責或隔二三年或隔三四年於題明巡察地方之便㑹同盤察藩庫欽此一究追虧空順治九年題準錢糧徴解支放各有款項若為公務移緩就急謂之那移假公濟私謂之侵盜軍興公用不得已而借用謂之透支藉端開銷謂之冒破令撫按清察追抵康熙九年覆準胥役經收管解令連名互結如有侵盜令互結者同賠若經管官不行取結亦令賠補又題準侵那錢糧家産盡絶遇赦免追即行題結妻子免交刑部十年題準承追侵那錢糧初次限四月追完逾限不完降俸二級戴罪督催再限一年全完如仍不完罰俸一年十一年覆準州縣侵那錢糧司道府官本年及次年察出者免議如遲至三四年始行察出者仍照失察例議處又題準承追侵那錢糧初限展至一年又題準州縣官將已徴錢糧作為民欠恣意那用者革職提問司道府官隠匿不報者革職如已申報而督撫不題叅者降五級調用又議準州縣官侵盜錢糧上司不即察出或據詳代為開銷者司道府降職一級調用督撫罰俸一年若前任州縣等官侵盜後任官不行察出或代為開銷者降職一級調用前任官那移後任官不行察出者罰俸一年布政使抑勒州縣衛所官故那錢糧者照那用正項例處分督撫不題叅照徇隠例議處其州縣侵那司道府官察出者免議又題準官員承追侵那錢糧如有家産果盡不據實詳請豁免以致各犯父子夫妻分離者承追官罰俸一年巡撫罰俸六月又題準赦前侵欺錢糧各官不交吏部議處者將該部司官罰俸三月堂官罰俸兩月又題準凡侵盜錢糧人犯揑報逃亡並不起解者州縣官降職一級調用該管上司罰俸一年起解遲誤者州縣官罰俸一年該管上司罰俸六月又題準州縣官將衙役侵盜揑為民欠知府遽為轉報者罰俸六月十六年題準侵盜錢糧應發解人犯未經部題入官之前全完或已題未發解之先全完者並免入官十七年題準各省有因軍需動用錢糧刻不容緩者司道官申詳督撫一面咨題一面動用若司道並未申詳擅自動用督撫先未題咨徑為請銷者督撫降職二級司道官降職五級皆調用若司道申詳督撫不咨題擅令動用者司道官免議督撫降職五級調用皆不準開銷責令賠還十八年議準州縣官將已徴錢糧那用詐稱民欠司道府官隠匿不報者皆革職提問督撫徇縱不叅者革職又題準凡該管上司逼勒下属那移庫銀本官自首審實免議上司照貪官例治罪如逼勒至死者許家属赴督撫具告督撫不準理許赴通政使司鼓廳具告審實將逼勒者抵罪不準理者革職二十七年題準藩庫交代錢糧如有侵盜虧空等弊將隠匿不叅之該督撫革職如督撫有侵盜入己之處照侵欺例從重治罪又議準州縣虧空知府不掲報反逼新任官出結者革職三十九年諭近見各省督撫等先以官員虧空倉庫銀米題叅後以家産盡絶保題者甚多此等虧空銀米作何著落追還著九卿詹事科道㑹議具奏欽此遵旨議定嗣後倉庫銀米如有虧空審明是侵是那著落虧空官追還有實繫家産盡絶不能完結者著落嵗終申報保題之各上司官名下追完至起解銀兩及漕糧等項已經起程之後如有虧空者將解官運官審明追還實繫家産盡絶不能完納者亦著落差遣不慎之該管上司名下追完如有藉端私派於民者從重治罪四十年覆準凡虧空之案専責藩司於部文到日嚴督府州縣各官務遵四月定限將侵那審明招解如逾限將州縣官掲叅遲延限後又滿四月再叅遲延將本管知府皆照易結不結例議處藩司於限内不據實掲報後以遲延掲報塞責者亦照易結不結例處分至各州縣修理城池等項雖繫私捐仍令通報如虧空事發各該撫藩司將私捐修理之項審作那移正項者承審官照徇縱例議處又覆準各省倉庫收貯帑銀米榖如私行動用督撫題叅革職提問審出侵盜那用分别治罪四十四年覆準凡知府盤察出結之後州縣一有虧空知府無論幾時察出掲叅免其從重治罪四十五年題準旗員虧空該旗保題家産盡絶將虧空之員入辛者庫即内管領此後察出家産隠匿等弊將保題之都統副都統議處均攤賠補又覆準州縣錢糧節年那新補舊或借貸掩飾知府盤察時確有實數無由覺察及事發據實掲報將虧空之州縣治罪其節年盤察之知府免議四十七年議準虧空官有從前任所私蓄被親友借取有圖書文約可據者題明察追扺補欠項四十八年議準虧空帑銀審繫徴收制錢往外易銀未囘虧空倉榖審繫浥爛或借給里民均不作侵那果能叅後限内全完準其開復五十年議準虧空官如有見任居官之子情願代父賠還者即於其子任所按限扣追完日免罪五十一年議準旗員虧空錢糧該督撫察明家口備造清册解部交與該旗察追倘承問官有嚇索任所貲財及聽該犯官隠匿或將奴僕放出為民等情將承問官并造册等官治罪至該犯官歸旗如有偷賣房地屯莊隠匿財産等情將該管官治罪又議準州縣虧空錢糧知府止將本年掲報其積年虧空直至題叅之後始報察出者仍將通同隱匿之知府照例題叅五十六年覆準嗣後虧空案内如果繫民欠揑報全完或私借倉糧揑報無欠除私借之員照律治罪其揑報官照虚出通關鈔律計所出之銀數并贓以監守自盜論其實在民欠著落原借之人完納其那移有抵即令接任官催徴若揑報私借之項該員情願一年内代民全完準其開復五十九年議準州縣虧空錢糧知府從前果有扶同徇隱情弊别經發覺者將知府叅革其虧空錢糧令知府獨賠又覆準州縣官恃有上司分賠之例將庫銀藏匿假揑虧空者審實著落本犯名下獨追還項仍照例治罪又覆準凡州縣虧空如知府察出掲報司道司道不即轉掲及司道已經轉掲督撫不即題叅許知府竟掲部院將不轉不叅之督撫司道議處著令分賠又議準嗣後州縣官虧空錢糧倘知府掲報而布政使司不即轉掲或已掲而督撫不即題叅者許掲報官徑報部院將徇庇之上司照例議處仍令分賠其衛所等官虧空屯衛等項錢糧照虧空地丁例議處又覆準各省虧空錢糧皆因夤緣餽送禮物所致發覺之日與受皆著革職嚴飭督撫照例實心奉行其有上司逼勒交盤以致虧空者許新任官據實直掲部院科道衙門題叅審明將逼勒各官照例議處具掲之新官令其赴部調補别省又覆準嗣後該督撫不盡心防範於未虧空之前竭力補苴於虧空發覺之後將督撫照例議處仍令分賠完補六十一年十二月諭自古惟正之供所以儲軍國之需當治平無事之日必使倉庫充足斯可有備無患皇考躬行節儉裕國愛民六十餘年以来蠲租賜復殆無虛日休養生息之恩至矣而近日各省道府州縣虧空錢糧者正復不少揆厥所由或由上司勒索或繋本人侵漁豈皆因公那用皇考好生如天不忍即正典刑故此輩每恃寛容毫無畏懼恣意虧空動輒盈千累萬督撫明知其弊曲相容隱及至萬難掩飾之時又往往改侵盜為那移勒限追補視為故事究竟全完者絶少新任之人上司逼受前任交代初畏大吏之勢雖有虧空不得不受繼啓效尤之心任意侵蝕更藉此挾制上司不得不為之隱諱展轉相因以致庫藏全虛一旦地方或有急需不能支應關繋非淺本應即時徹底清察重加懲治但念已成積習姑從寛典除陜西省外限以三年各省督撫嚴察所属錢糧凡有虧空無論已叅未叅均於三年之内如數補足毋得苛派民間毋得藉端遮飾如限滿不完定從重治罪若三年補完之後再有虧空除被上司勒索及因公那移者分别處治外其實在侵欺入已者確審具奏即行正法倘仍徇私容隱或經朕訪實或被科道糾叅將督撫一并從重治罪即如山東藩庫虧空至數十萬雖以俸工補足其實不能不取之民間額外加派山東如此他省可知以小民之膏血為官司之補苴地方安得不困乎既虧國帑復累民生大負皇考愛養元元之至意此朕斷斷不能姑容者至於署印之官尤須慎重簡擇諺云署印如行刼皇考每言及此未嘗不恨署印之人始而百計鑽營既而視如𫝊舎肆意貪婪圖飽慾壑或取媚上官供其索取貽害小民尤非淺鮮其於前任虧空視作泛常接受交盤復轉授新任茍且因循虧空愈甚嗣後如察出此等情弊必將委署之上司與署印之員一并加倍治罪決不姑貸欽此雍正元年諭將虧空錢糧各官革職留任催追必致貽累百姓既然獲罪革職豈可留任嗣後虧空錢糧各官即行革職著落伊身勒限追還欽此又諭嗣後凡委官署印應遴選賢能如署印官虧空錢糧著落遴委之督撫布政使分賠有將虧空錢糧勒逼接任官收受情由著接任官開列情由徑報部科即據實奏聞欽此又覆準有司内私那帑項為已捐升並為子弟納職致有虧欠者督撫覈叅照侵盜例治罪其子弟所捐職銜革去該管上司不加詳察通同徇隱勒逼接任官收受者或被科道糾叅或被受害之人首告將該管上司無論見任離任嚴加議處其虧欠帑銀著令分賠又議準直省督撫於州縣開徴之始令知府遴選賢員與該管官同封銀匱每十日二十日别委賢員當衆拆封立即起解其存貯倉榖按季盤察出結轉報如有徇隱情弊將知府並委員即行題叅照徇庇例議處再題叅虧空官時即於任所嚴追並即行文原籍地方將家産人口逐一嚴察造册存案如任所不能完行文原籍變價補足如原籍地方官不行察出或被旁人首告或被科道糾叅亦照徇庇例議處又議準各省從前虧空其有著落銀内如有人亡産絶者該督撫即照無著銀所定年限補完報部仍令該督撫每於嵗終將前項有著無著銀完過若干之處逐一分晰造册具題如照從前怠玩不盡心催追每年完不足數者即將各該督撫並司道等官交與吏部從重議處又覆準虧空官員察其子有出仕者解任發追完日仍補原官二年諭朕惟錢糧固属緊要而民情尤宜體䘏聞有州縣官虧空百姓情願代賠者此端斷不可開虧空官未必愛民百姓貧富不等斷無闔縣情願代賠之事或繋蠹吏土豪勾連藉端科歛或不肖紳衿平時出入衙門通同作弊及本官被叅猶冀復任因而號召多事之人連名具呈闔縣願賠後官畏懼處分接呈入手即差役按里追呼名為樂輸實繋强派其為民累不淺嗣後紳衿情願幫完者聽其自行完納其有闔縣具呈者即將為首之人從重治罪知府州縣擅準督撫察叅議處至因公那移之項依限全完定例準其開復督撫題請全完即給咨本官令其随本引見驗看可用者即用如不可用以原品休致其年老及不願補之人亦於本内聲明不必来京欽此又議準布政使司乃方面大吏專管通省錢糧若有虧空法宜加等嗣後布政使司虧空無論侵那皆按侵盜之律治罪果能一年内全完減等發落如一年内不能通完即將本犯正法仍變家産追賠若督撫通同徇隠别經發覺將督撫革職仍令分賠或有督撫勒索以致虧空許布政使於未叅虧空之前開具實跡徑報通政使司轉奏將督撫照貪婪例交與該部從重治罪其或布政使自有虧空恐督撫盤察先行誣報者審明時將布政使從重治罪又諭凡官員虧空錢糧倉榖該管上司失於盤察自應革職分賠但定例虧空官員審無侵盜入已之項勒限一年内賠補全完準以原職補用而失察革職之上司反不得與本官同開復似屬可憫嗣後虧空銀榖限内全完例應開復者該督撫覈明原叅失察之上司一并題請開復欽此三年覆準凡州縣虧空錢糧於疏内聲明將該管上司應否分賠之處察明一并具題若不聲明具題督撫照徇庇例議處又議準州縣虧空審明確繋知府徇隠獨賠之項將知府革職離任本犯擬罪監追即搜本犯任所財物及原籍家産勒限一年變賣賠補無論本犯完補或知府協同完補皆能於限内全完繋侵盜之項本犯擬死罪者照例減二等發落擬軍流徒杖者照例釋免繋那移之項至二萬兩以上者本犯照例釋免未至二萬兩者本犯及徇庇之知府悉準其開復如一年限内無論侵盜那移本人家產不能完補即將本人照見在未完之數治罪發落其未完帑銀照數著落徇隠之知府勒限一年完補若能於限内全完者準其開復如不完再限一年完補若能於二限内全完者照原職降一級調用如二限内完不足數者再限一年完補若能於三限内全完者照原職降二級調用如三限内不完即將知府家產扺補雖賠補全完亦不準其開復如遇分賠之項亦先在本犯名下勒限一年追補全完將本犯分别侵那照例發落開復如限内本人止完一半例得開復者仍照例竢知府全完之日皆準開復如本犯限内全無完補及不足一半仍照例將本人監追照依原虧之數令知府分賠一半勒限一年全完準其開復如不完再限一年能於二限内全完準其開復於補官日罰俸一年如二限内完不足數再限一年能於三限内全完照依原職降一級調用若三限不完及本犯名下應追未完者皆不準開復未完之銀仍著落分賠四年諭各省虧空動稱無著之項夫錢糧未經徴收則欠在民既經徴收而有虧空則欠在官州縣官不能完則上司有分賠之例本人雖已病故而子孫有應追之條何得藉口無著以虛國帑此皆督撫等瞻徇情面不肯大破積習所致蓋自存不肖之心以已身見為督撫恐將来亦被牽累故目前豫留地歩也從前彌補虧空皆捐俸工銀扺補及朕有旨不許捐輸俸工今則皆稱以耗羡抵補夫耗羡亦出於民乃不問當日督撫等所以致此虧空之由而動稱耗羡彌補以百姓之脂膏飽有司之谿壑豈朕憫惜元元之至意乎今特沛寛恩凡各省虧空未經補完者再限三年寛至雍正七年務須一一清楚如屆期再不全完定將督撫從重治罪如有實在不能依限之處著督撫奏聞請旨欽此又覆準凡州縣那移虧空審明繋知府不掲報應著落分賠之項將知府革職其虧空銀米仍依那移虧空年限先於本犯名下盡數著落嚴追一年限内全完將本犯及不掲報之知府皆照例準其開復二限三限補完本犯照例分别發落若三年限滿不能完足本犯仍照原擬治罪果繋家産全無無力完帑將未完銀米等項著落不掲報之知府分賠一半其餘一半入於無著項下完結其知府分賠一半銀勒限一年完補限内全完準其開復不完再限一年完補能於二限内全完準其開復於補官日罰俸一年如二限内完不足數再限一年完補能於三限内全完照原職降一級調用如三次限滿不完不準開復未完銀仍著落追賠五年諭向来内外文武官虧空甚多我聖祖皇帝深知其弊屢降諭旨諄諄戒飭袛以聖心仁慈寛大冀其悛改不忍加誅乃此輩不知感戴反至肆行無忌日積月累虧空之數愈多朕即位以来念此虧空之項關繋國帑豈能以國家一定經費任貪官汚吏之侵漁且聞貪婪之員平日侵蝕國帑而被叅之後則將所有貲財藏匿或送歸鄉里或分寄宗族親黨之家及接任官察出虧空則故作貧窶之狀希冀遷延數年援家産盡絶之例以圖豁免是以被叅虧空之員令搜察其宦囊家産並及其寄放之處蓋不欲使貪汚之輩盜國帑剝民膏以飽囊橐也此輩本有應死之罪但朕念弊端已久相習成風若遽然按律治罪則誅戮者衆幾於不教而殺此心有所不忍故令完補虧空全其性命此朕仁育義正用中之大道原欲暫行二三年使天下咸聞朕諭共知朕心若再有犯者則按法律治罪今已曉諭四年不得謂之不教而殺矣上年已令九卿酌定條例嗣後有侵盜虧空之官則按所定之例治罪有應正法者即照例正法其搜察宦囊家產及於寄放宗族親黨之處應不必行矣諭下之日即著停止此輩若知朕化導保全之恩盡洗從前侵剋之弊實伊等之福亦朕之所深望若仍執迷不悟顧貲財而不䘏身命亦其自取不足憫惻著遵諭行欽此又諭各省屬官虧空而上司明知故縱者令徇隠之上司各賠一分永為定例欽此七年覆準凡有虧空劾叅之後一面於任所嚴追一面移咨該旗籍察其房地産業毋得仍聽本家子弟奴僕居住收租令該管官照額徴租收貯公處嵗底造册報部察覈竢該督撫咨覆到日如該員欠項不完或完不足數者即將房地産業及所收之租一并抵補如各該員欠項已完即將入官房產及收過租銀照數給還本家至家産扺補虧空之數尚有多餘者仍給還本人八年覆準浙江嗣後應追侵盜那移各案除不及千兩者仍照原限勒追外其千兩以上萬兩以下者再定限一年二萬兩以下者再定限二年毎年應完一半三萬兩以上者再定限三年毎年應完三分之一如能依定限内通完者承追州縣毎案紀録一次督催知府毎三案紀錄一次道員毎五案紀錄一次督撫布政使按察使毎十案紀錄一次若逾限不完或未通完者將承追之州縣每案罰俸一年督催知府每案罰俸六月司道督撫每案罰俸三月將千兩以上萬兩以下款内下欠之銀再限一年戴罪督催其二萬兩以下初限一年款内下欠之銀歸入第二年項下統再限一年戴罪催完至三萬兩以上初限一年款内下欠之銀即歸入第二年數内一并戴罪催完若仍未通完將承追之州縣降一級留任督催之知府罰俸一年司道督撫各罰俸六月將千兩以上萬兩以下之款並二萬兩以下款内應追之銀再限一年戴罪催完其三萬兩以上之款兩年限内尚未通完者將下欠之銀歸入第三年數内一并戴罪催完倘各能照數通完將承追州縣所降之級準其開復若不能通完將承追州縣照所降之級調用督催知府降一級留任司道督撫各罰俸一年其接任承追督催等官仍照依到任之日扣限如果正犯家產已盡正身已故及並無的屬子孫不能賠補者該地方官察明確實取具印甘文結申府加結轉詳保題豁免倘題後欠帑人員别有田産貨財房屋人口寄頓發覺者盡籍入官將出結州縣革職督催知府降二級調用司道降一級留任督撫罰俸一年其所欠銀米等項著落出結各官賠補十三年題準八旗辦理虧空案件仍照例將房屋田地人口變價還項其墳園房屋人口祭田一槩不得入官其從前已經入官者亦請旨勅令該旗逐一清察給還又諭凡州縣錢糧之虧空總不出侵盜那移二項當其侵那之時官固主之而經手之經承自無不知也乃不及禀阻且從而慫恿以便作姦分肥迨至本官監追而經承且優游於事外本官問重罪而經承僅得不行禀阻之處分故凡虧空纍纍多由於官吏之相成也朕意以為經承庫吏經管倉庫之人亦宜重其處分之例更定以勸懲之法凡州縣官到任則先簡選殷實老成吏胥二人以充錢糧總吏通詳報部凡徴收錢糧即令随徴報解不得存留内署承辦五年該縣無虧空者即將總吏咨部以九品雜職即用本官少有虧空總吏力行禀阻如不聽從徑赴院司呈明免罪若該吏不行禀阻致本官以虧空糾叅即將經承一同監追減本官一等治罪如此則經承有所責成廹於勸懲不敢順從本官擅動國帑亦杜絶虧空之一法其如何詳悉定例之處著九卿㑹議具奏欽此議準例見刑律乾隆元年諭戸刑二部奏請遵奉恩詔豁免欠帑人員内察其原案有應追繳者有不應追繳者朕思不應追繳之案與其赦免於事後何如詳審於事前使人無拖累而事易辦理即如開欠一節原繋借貸交接之私情遇本人或有虧空及應追之項自當聽其自行索討以清公帑今乃令將平日欠銀之人開出即按開出之人著令完繳是以私債而成公項從前辦理殊未妥協其他分賠代賠著賠名色甚多如道府有稽察州縣之責州縣設有虧空道府非属分肥即繋疎縦責令分賠實属允當若因錢糧數多一人未能歸結而令旁人分賠代賠著賠則本属牽連而日久難完又不得不為開豁於國帑仍無裨益其應如何分别定例俾事不滋擾而法在必行著戸刑二部妥議具奏欽此遵旨議準各旗省拖欠各案錢糧除漕運鹽銅追賠各有成例並虧空倉庫錢糧監臨主守各官以及收支辦解並侵貪那移保送家産盡絶後有隠匿發覺一切獨賠分賠代賠著賠載在定例畫一遵行外其分賠案内如果米榖收存不慎官物遺失不全自應掲報題叅著追若既經接受出結即與前任無渉乃藉端分派前任各官賠還殊累無辜嗣後遇有霉變米榖短少官物著落接受出結之員按數賠補及徇庇之上司分賠不得藉端攤派又分賠案内如支銷錢糧原有一定款項額數若違例開銷理應著落擅動濫給之人照數賠補乃竟有私自動用並不報部及至日後奏銷時始行造報開除及察出與定例不符駮令追賠因為數多一人不能歸結或著属官公捐或令接任分賠徒滋擾累嗣後如有濫行動用例不準銷等項仍著落擅動之人賠補不得抑勒分派又代賠案内如拖欠錢糧原止應著落本身的属及定例内應行分賠著賠之人乃承辦之員因欠帑之獨力難賠或産盡無著因而輾轉株連如分居别産之弟兄親属並不知情之親友主僕旁人於公帑實未侵漁私財又非寄頓勒令賠補尤為拖累應行禁止毋得株連又代賠案内如承估承變承追原有一定例限其遲延不力各有應得處分如察估之員勘報不實及承變承追以多報少瞻情延緩帑項懸闕者著令賠償若察勘本無不實催追本無徇縱袛因變抵不敷與夫公項無完遽令代賠殊有未協嗣後察估追變之員該管上司察明果無情弊仍在本人名下歸結不得勒令代賠又著賠案内如地方荒歉借給貧民米榖或開墾借給牛具耔糧及借給吏役兵丁辦公帑銀原繋題明咨部行令出借按限扣追如經手揑報自應著賠若遇人亡産絶無可扣追槩令賠補實属屈抑嗣後凡有奉文出借之項除揑飾侵漁未經報明私行借動即行治罪著追外如繋奉文借給實無可追即確察出結照例歸於無著案内題豁又承追各項贓罰銀定例著落本犯嚴追如果家産盡絶例應保題豁免乃本犯無完贓項無著輒將親族株連拖累更有逺年無據贓私其人已故無可質訊即著子孫追補殊覺失平嗣後依律著落本犯勒追完結其有律應身死勿徴者亦照例免徴至逺年贓私必察有實據方可著追槩不得於本犯之外濫追賠補又議準虧空人員經管錢糧所属有借支借領與夫同官那借出有印領者均繋虧空帑項該員既以虧空題叅治罪借欠之項自應分别議處追還至其平日債負或幫助親友以及同官私借雖有文約並無印領者無論逺年近年有無確據總以借貸交接私情並非有虧於公帑應聽其自行索討不準抵追十二年諭向来督撫徇庇属員有虧空倉榖並不留心稽察據實題叅及至該員身故無可彌補始行掲報不得已上下通同倒提年月以掩飾從前不能稽察之故雍正五年間属官虧空有上司賠補分賠之例是以稽察嚴密官員知所畏懼虧空之案甚少近来此例不行所以貪風復熾不可不加意整頓稽察属官乃督撫專責果其實心詳察耳目何患不周果其察出即叅属官何至不知畏懼敢於任意虧空乃平日因循寛假明知虧空冀其自行彌補及至水落石出僅以題叅了事本任既無可著追旗籍又聲明豁免相習成風無可底止將来虧空之案由此日増於吏治深為有害嗣後虧空官未完銀米著巡撫以下分賠欽此又諭州縣官侵蝕倉庫非因公那用可比此等貪劣之員多有身故事發以後不過於家属名下勒限著追遷延一二年率以家産全無保題豁免且並有父没而子乘機盜帑移罪於父已仍得坐擁厚貲者故無以儆貪風夫父子一身也子代父罪亦理之宜嗣後侵貪之案如該員身故審明實繋侵盜庫帑者即將其子監追著為例欽此又覆準嗣後州縣虧空經該管道府察出掲叅各免其失察處分如例應責成盤察保結之属員竢其離任身故始叅實繋從前盤察不實直至事已敗露始行覈叅希圖卸責應無論其掲報與否將該管道府以失察附叅雖無徇隠情弊仍照失察州縣虧空例分别議處十四年題準嗣後除失察知府直𨽻州虧空之道員等官照失察例降四級調用外至失察州縣虧空既責成盤察不實之知府其道員自應量為酌減該管道員不豫行掲叅州縣虧空者降一級留任庶道府各有處分而辦理亦有區别矣十五年諭向来州縣虧空本犯無力完帑將徇隠之革職知府勒限賠補至限滿不能全完例止革職别無治罪之條夫以已經革職之員復議革職不過照例注册虛文從事耳此等劣員在任時既已通同徇隱代賠時又可任意延挨帑項虛懸刑章倖免凡稽察之不嚴代賠之不力未必非此例有以啟之也部臣托之空言而朕亦明知托之空言而允之上下相䝉成何政體朕一惟務實不尚虛文侵貪之弊尤不可不亟為整飭嗣後侵貪案内應代賠之知府限滿不完作何分别治罪之處該部另行定議具奏欽此議準例見刑律一追賠拖欠雍正二年議準凡追賠各項拖欠帑銀以一年為一限計其應追之數分為三限令其完償其有不按限交完者見任官初限不完解任令同二限銀戴罪完納如二限内將初限二限之數全完以原官補用如僅完初限二限未能全完仍戴罪追比若初限二限並不完納將職銜革去同三限銀一并嚴追此三限内能將三年分數全完者仍開復補用能完二年分數者復其職銜戴罪完納能完一年分數者仍革職嚴追倘三限均不能完交刑部治罪所欠帑銀於家属名下嚴追無官人等初限不完監禁仍同限銀并追如二限内將初限二限之數全完暫予釋放如僅完初限二限不能全完仍監禁追比若初限二限並不能完令該旗該地方官將家産封守仍同三限銀一并嚴追此三限内能將三年分數全完本身釋放免罪家産給還能完兩年分數者將本身釋放家産仍封守在官能完一年分數者暫免其變産治罪倘三限均不能完即將財産籍没變賣抵償本身交刑部治罪其分年多者總以三限己未完之數遞等定其處分如三限均不能完則不待限滿即行治罪或年限已滿計算未完帑銀在一二限之内仍照一二限之例處分均再限一年完納如一年不能全完亦即治罪至追比之項有分二年者一年不完照初限例處分二年均不完即照三限例治罪倘二年内完一年之數再限一年仍不能完或完不足數亦即治罪乾隆元年議準外任大小官凡遇降革留任及降職降俸住俸等項務於吏部議明具題後將降革住俸之銀照數分别扣解按季造册報部三年議準雜職㣲員俸稟有限革職後仍議勒追窮員羈留任所情實可憫嗣後除貪贓枉法革職任内有降罰案件照例仍追編俸外如實繋因公罣誤毋論降罰案件多寡所有食過編俸槩行免追一奏銷順治三年定官員造報各項文册遺漏重開數目舛錯或多開少報遺漏職名者罰俸三月該管官未經察出據册轉報者罰俸一月九年覆準直省銷算錢糧逐款備造支解完欠清册送部察覈十二年覆準州縣銷算錢糧册案不清布政使司提究經承不得擅提印官離任曠職康熙六年覆準直省錢糧由部察覈不必别設磨勘司責成各司於奏銷時詳加磨勘按年送御史刷卷七年題準一應錢糧皆繋地丁所出凡催提徴解均稱地丁錢糧除鹽課茶稅關稅蘆課並漕糧白糧各倉米榖等項考成既與地丁錢糧有異仍令照舊其土司進貢物料折色本色物料雜稅當稅稅契牙稅牛驢稅贓罰折贖等項非地丁所出亦仍舊各款開列至文武官師生空闕及扣罰俸銀随時追取學租支給餘剩解部亦應照舊開造其餘一應地丁錢糧嵗終奏銷時該撫將通省錢糧若干起運若干存留若干撥過兵餉若干辦買顔料若干餘剩若干詳明造册具報不必開列款項以便稽察又議準有司奏銷遲延舛錯以致違限者督撫題報時將有司叅處督撫免議如督撫行催不力或属員申報不即具題者并將督撫處分七年題準直省錢糧毎嵗終廵撫造奏銷册一本開列已完未完數目送部十一年題準奏銷册直省布政使司總數府州縣細數皆載舊管新收開除實在四柱以憑稽覈十五年覆準凡造報各項文移遲延者照欽部事件違限例分别月日議處二十二年題準凡應行完結錢糧故畱疑竇並不分晰溷行造册題報以致款項不符者府州縣衛所官降職一級調用轉報之司道等官罰俸一年督撫罰俸六月若督撫察叅者免議至經管錢糧各官將徴收起存原額及支銷總散數目詳加覈算明白該督撫等覆加磨算如造册内數目舛錯遺漏者府州縣衛所官罰俸一年督撫及轉報之司道等官各罰俸六月如督撫司道等官造册舛錯遺漏者止將督撫等議處又奏銷錢糧册結必須随案送部若司道府州縣衛所官將册結遲延不送違限一月罰俸半年二月罰俸九月三月罰俸一年四五月降職一級留任六月以上降二級調用一年以上革職如司道等官己申送而督撫不即送部違限五月以下照司道等官例處分六月以上降二級留任一年以上降三級調用二十八年議準每年未清錢糧後雖竢各項歸結但不肖官不實心奉行往往别生支節故意躭延不免舛錯遺漏遲延諸弊令巡撫布政使司毎年冬杪將見在未完各項事件分晰造具簡明清册送部以便稽察此項册籍皆布政使司經管令布政使司造送如有假藉造册名色致累各属者督撫題叅議處六十一年十二月諭戸部工部一應奏銷賦銀米榖物價工料必詳察覈實開造清册具奏毋得虚開浮估倘有以少作多以賤作貴數目不符覈估不實者事覺之日將堂司官從重治罪欽此雍正七年議準直省地丁錢糧奏銷定例直隷山東山西河南陜西令四月到部江蘇安徽江西浙江湖廣令五月到部福建四川廣東廣西雲南貴州令六月到部務須遵照定例依限奏銷其有不能依限奏報者題請展限或實因州縣造册遲延具題叅處者除造册遲延之州縣照例議處竢造送之州縣彙齊奏銷外其具題之日即將各該州縣已完未完數目並造册遲延之各該州縣己未完數目一同據實造册先行送部察議八年覆準盛京徴收稅課及糶賣糧價一面報解盛京戸部一面注明年月分晰細數造册呈報稽察御史察覈如有交收數目不符及監督等將應交之銀遲延不交管庫人員將應收之銀不即覈收刁難需索等弊御史據實題叅如御史藉稽察名色刻意苛求滋擾者令盛京戸部亦據實題叅又題準山西大同朔平二府僻處邊隅播種收成氣候獨遲必竢九月登場方始開徵催納若一例於四月奏報經徵僅止數月各員徒受叅罰自雍正八年為始於次年年終别册奏銷十年奏準各省奏銷登答有遲延二三年甚至遲延數十年始次第請結者增改牽溷實滋弊竇除嗣後本年一應奏銷登答務於次年十月内按限清理如果頭緒繁多實有不能赴限者督撫題明量予展限倘有任意遲延希圖牽溷者叅劾議處十一年題準江南安徽巡撫駐劄安慶藩司駐劄江寧與各省撫藩同城者不同其奏銷旣照各省之例由藩司彙造送覈自雍正十二年為始量予展限一應奏銷定為六月題報至各官分别考成仍照定制扣限截數不得稍有䝉溷又覆準江南江蘇所屬每年奏銷錢糧定限於五月内具題向有四月造册之限今奏銷帶徵錢糧積有十五年之多若於五月内詳報與常年奏銷一時交集實恐辦理不及將帶徵錢糧加展兩月至七月詳題十二年覆準各省攢造奏銷册籍於例限之前令各屬先造草册一本申布政使司覈對無訛發囘照造如款項舛錯數目不符即於草册内分晰指出計程塗遠近定限發囘别繕補送如果有案情繁雜覈算不清及怠玩屢催不應者準其提取造册之經承察詢不得濫提以免各書吏跋渉守候之累以杜司胥抑勒需索如承總司胥將各處造送草册溷行發改故意苛駮者察出究治如布政使司徇隱故縱及提取多人在省覈造者督撫即行題叅又奏準各省奏銷見年錢糧即將每年未完項下續完若干仍未完若干並動用存貯各數目令該省分别年限彙造清册别繕題本隨本年奏銷同題該部按年察覈别行繕本隨本年奏銷一幷題覆其餘年限案内咨部者統於年内分年確覈彙題又奏準凡指駮款項奏銷登答仍照例槩用咨文若仍有未明本部亦行咨駮仍扣四月限期覈辦竢一案全數登明報部彙總題結乾隆元年題準熱河完糧以六月為麥秋九月為大秋分為兩限完報至次年四月奏銷限内不獲全完準於奏銷册内造明扣滿年限掲叅一撥册雍正二年議準春秋撥册共三本奉文酌畱封貯備用册一本徵收各項舊管新收開除實在四柱册一本分晰應畱應撥細數册一本冬撥估餉册共四本督撫提鎭標協官弁兵馬應支俸餉册一本各項實在貯庫銀册一本額徵地丁民賦册一本額徵雜稅册一本春秋冬撥册由部按册覈對酌省分繁簡存畱藩庫其春秋二季撥册酌量撥銀解部以充京餉之用冬季撥册通計各省官俸兵餉總數如本省銀敷用者按數撥給動用其有不敷者酌計附近贏餘省分令該省運解協濟定限四月解半九月全解如逾期未到者覈叅康熙三十一年題準直隷除供應陵寢及緊要事務所用者該撫一面動用一面報部至别項錢糧仍咨部動撥違者照例議處三十四年覆準嗣後見在應用錢糧該撫一面動用一面報部若非見在卽需錢糧尚有時日者仍咨部撥給三十七年覆準直屬辦買豆草供應行糧及驛站工料車價官役俸工等項嗣後停其逐案咨部撥銀一面動用一面報部雍正四年覆準行令直省將已徵見存帑銀悉造入季報册内將已奏銷未奏銷款項分别開明報部聽候撥解倘不分别開造或以未經奏銷不造入季册者經部察出即題叅議處又覆準直省督撫及一應經管錢糧衙門嗣後春秋二季報部册内務將一應貯庫錢糧並什物等項照數報部其庫貯錢糧什物或因原案未結從前未經報部者即行逐一察明照數造入季報册内所有應變什物先行變交至未完事件統於原案内歸結十二年奏準直𨽻除大興宛平二縣外其餘州縣遇有緊要公務難以緩待者準令一面申部一面詳明該督至戸口田産錢糧等項一切文移案件統由總督覈明咨部如有違例擅自報部者即將該州縣交部議處其部内應行事