body:
  text: 戸部田賦四一催科考成順治七年題準督徴錢糧知府直𨽻州知州以所轄各属之完欠計分數布政使司以通省之完欠計分數十八年覆準錢糧議處官員於未離任前催徴全完準與開復至後任官代徴完者不準康熈二年覆準除漕糧白糧各倉米榖鹽課蘆課顔料等項不并入徴催地丁錢糧考成外其各部寺一應起解賦銀總作十分考成又題準徵收錢糧本年内全完者紀録一次三年相接均全完者加一級又題準地丁錢糧經徵之州縣官未完不及一分停升罰俸一年一分降職一級二分至四分遞降至四級並戴罪催徴五分以上革職督催之布政使司道府直𨽻州未完不及一分停升罰俸半年一分罰俸一年二分降職一級三分至五分遞降至四級並戴罪督催六分以上革職巡撫未完不及一分停升罰俸三月一分罰俸一年二分降俸一級三分降職一級四分至六分遞降至四級並戴罪督催七分以上革職又議準衛所錢糧亦作十分考成經徴照州縣督催照司府例議處又題準州縣官叅後戴罪催徴之地丁錢糧限一年全完不復作分數限内不完原叅不及一分降職一級一分降三級二分降四級三分降五級皆調用四分以上革職四年題準經徴督催文武各官除一年内二三員接徴全完並署任不久者不議叙外凡起運錢糧一年内全完者經徴之州縣官五萬兩下五萬兩上至十萬兩上督催之道府直𨽻州十萬兩上至二十萬兩上均自紀錄一次遞加至紀錄三次巡撫布政使司五十萬兩下紀錄一次五十萬兩上至百萬兩下紀録二次百萬兩上加職一級經徴之千總守備千兩下上至三千兩上議叙視州縣督催之都司五千兩下上至萬兩上議叙視知府又題準凡錢糧未完各官如遇恩赦該撫確察赦前月日扣除以赦後月日起算限年催完至限滿續叅時注明赦前赦後分數具題如年限内原叅赦前未完分數全完止照赦後未完分數議處若年限内原叅赦前未完分數尚未全完仍合赦前赦後分數一并議處如原叅分數均在赦前年限内未經全完者仍照初叅分數以初次例議處又議準各官止完地丁錢糧而本色顔料及起運雜項未完者不準議叙或將未完錢糧揑報全完或一年内二三官接徴全完揑報一人徴完者州縣衛所官革職司道府都司降職二級巡撫降職一級皆調用如州縣等官申報未完司道府都司以完申報者司道府都司革職州縣等官免議如司道府都司申報未完巡撫以完題報者巡撫革職司道府等官免議又題準直𨽻知州督催属縣錢糧叅後未完照一年半例議處經徴本州錢糧叅後未完仍照一年例議處又題準限滿未完各官限内又遇恩赦者扣除赦前月日止以赦後計算年限察叅又題準有司叅後續完錢糧者該管官一面給批收一面申報督撫題請開復又題準有司叅後續完錢糧題請開復如該管官遲延不報藉端駮詰留難者聼督撫指叅督撫不即具題者一并議處又議準叅後戴罪催徴之地丁錢糧州縣官年限内不全完者原叅未完不及一分降職一級留任再限一年戴罪催徴仍不全完照原降之級調用原叅未完一分以上能催完至八九釐者降職三級留任再限一年戴罪催徴仍不全完照原降之級調用原叅未完二分降四級三分降五級皆調用四分以上革職九年覆準州縣經徴錢糧督撫察其有無敲朴過嚴以致百姓流亡嵗終於奏銷册内注明有無累民字樣取具不扶同甘結報部方準議叙十年題準催徴錢糧大小各官或因事故離任按其所欠分數應虚降虛革者皆照離任官例罰俸一年至革職者仍行革職十二年覆準叅後戴罪督催之地丁錢糧巡撫限二年布政使司道府直𨽻州限一年有半原叅不及一分者初限不完降職一級二限不完降職二級仍戴罪督催三限不完降三級調用原叅一分以上者繫照州縣例議處督催之都司限一年有半衛所官限一年原叅不及一分者初限不完停升罰俸一年二限不完降職一級仍戴罪督催三限不完調用又題準凡已叅未經離任之官於接任並署印官未到之先將拖欠在民錢糧催徴全完者仍準開復十五年議準不作分數雜項錢糧如覈明未完者降俸二級戴罪催徴完日開復如年限内不完者罰俸一年仍令催徴又題準有司叅後續完錢糧該管官不為詳報或將不應開復者申請開復皆罰俸一年巡撫罰俸六月或重報開復及遺漏續完各官職名者亦罰俸六月二十三年題準直𨽻順天等府撥給旗下地畝將别州縣衛所額外開墾官屯等地補還其應輸糧課考成歸受補州縣徴比之事歸受撥州縣二十六年題準存留支剰銀有未完者照雜項錢糧例處分裁扣充餉銀歸并起運内總作分數考成三十年議準撥補地租代徴官亦作十分考成照催徴錢糧例酌量減輕經徴之州縣衛所未完不及一分停升一分罰俸三月二分罰俸六月三分罰俸一年四分降俸一級五分降俸二級六分降職一級七分降職二級八分降職三級九分降職四級皆停升戴罪催徴完日開復至十分者革職督催之布政使司道府直𨽻州未完不及一分免議一分罰俸兩月二分至十分視議處經徴官一分至九分廵撫未完不及一分免議一分二分皆罰俸兩月三分至九分以上視議處經徴官一分至七分皆停升戴罪督催完日開復署印官在任不及一年者未完不及一分免議一分二分罰俸兩月三分四分罰俸三月五分六分罰俸六月七分八分罰俸九月九分罰俸一年十分降一級調用署印不及一月亦免議叅後催徴限一年全完限内不完原叅不及一分罰俸九月一分二分降職二級三分四分降三級五分六分降四級七分八分降五級皆調用九分十分革職督催之廵撫限二年司道府直𨽻州限一年有半限内不完不及一分罰俸六月一分二分降職一級三分四分降五級五分六分降三級七分八分降四級九分十分降五級皆留任接徴接催官以到任日為始亦限一年全完限内不完照初叅例處分其代徴租銀關移本處給發如給發不實照監守自盗例治罪受撥之州縣衛所不移催代徴官及不將未完分數申報上官者歸入正項錢糧處分内議處已移催申報免議四十三年覆準嗣後未完降住罰俸等項銀報叅原欠之見任各官上官均免叅處報叅原欠之見任府同知州同縣丞以下佐貳雜職等官府州縣免其叅處如有離任官未完者即以接任承追之官報叅學租一項州縣未完止叅承追州縣無庸開報督催之知府惟江南江寕常州掦州三府儒學徴收學租向例奏銷册内造於知府項下今知府既無督催考成嗣後三府學租於奏銷册内别行開造如有未完將儒學教官開報至官生空闕一項亦照此例遵行四十五年題準蘇松常鎮四府属經徴錢糧限滿未完革職官令其革職留任四十六年覆準江蘇賦繁州縣錢糧三載全完内雖有奉蠲之年仍準即升雍正二年諭貴州通省地丁錢糧不足十萬兩若照成例止有經徴各官得邀議叙督催各官雖極効力終不得與今或照十萬兩以下一年内全完之例議叙或竢二三年督催全完再行議叙戸部㑹同吏部定例議奏欽此遵旨議準嗣後黔省知府直𨽻州知州督催應徴錢糧嵗内全完者照十萬兩以下之例議叙五年題準浙省額徴南秋等米除給本處兵餉外餘解省倉支給滿漢官兵俸餉織造匠糧此項因繫冬徴彙入奏銷案内掲􅄁徴解遲延止於罰俸累累拖欠應别疏題銷將已完未完數目報部經徴州縣官未完不及一分免議一分罰俸六月二分住俸三分降職二級四分三級五分六分以上革職皆令戴罪催徴完日開復叅後違限不完者倍處如應罰俸六月者住俸應住俸者降職二級降職二級者降四級降職三級者革職戴罪催徴完日開復應革職戴罪者實降二級調用署印官照署徐淮等倉錢糧未完事務處分督催之巡撫藩司等官未完不及一分免議一分罰俸三月二分罰俸六月三分住俸四分降職二級五分三級六分以上革職皆令戴罪督催完日開復叅後違限不完者倍處應罰俸三月者罰俸六月應罰俸六月者住俸應住俸者降職二級降職二級者降四級降職三級者革職戴罪督催完日開復應革職戴罪者實降二級調用至州縣徴收南秋等米一年限内全完千石以上至五千石照地丁五萬兩以下之例紀錄一次五千石以上至萬石照五萬兩以上十萬兩以下之例紀錄二次萬石以上照十萬兩以上之例紀錄三次督催知府直𨽻州糧道一年限内全完萬石以下紀錄一次萬石以上紀錄二次二萬石以上紀錄三次布政使司照地丁議叙之例議叙七年議準州縣經徴錢糧嵗内全完原有議叙之例恐有司希圖紀錄過於急廹又或以尾欠未清揑稱完足嗣後將嵗内全完議叙之例槩行停止其奏銷以前果能通完槩予議叙乾隆十二年議準本年奏銷未完各官照例随本題叅部㑹吏兵二部議處題覆如部覆奉旨之後該省已接準部文續報叅後徴完者由督撫將議處之案題請開復若部覆已經奉旨尚未行文該省咨到叅後全完者由部據咨題請開復其有未經題覆該省咨到叅後全完者即於本案奏銷内扣除免議十三年覆準錢糧未完案内各官續報全完如繫别案革職以及佐雜㣲貟毋庸槩行具題止用咨文報部覈明轉咨吏部辦理十五年覆準江南江蘇所属乾隆元年起至九年軍民舊欠地丁驛站河工等銀除淮徐等属乾隆六年以前永行停緩外如各州縣衛欠數在萬兩以内者限一年徴完萬兩以上至三萬兩以内者均作二年三萬兩以上至五萬兩以上均作三年五萬兩以上至十萬兩者均作四年十萬兩以上者均作五年徴完州縣官初限不完者降職二級仍同次限分數并徴如二限已滿止完足上限之數者仍帶原降之級留任一年再同下限分數并徴以後按年應徴分數總以完足上限之數止欠本限分數者照此例議處如上限本限均有未完即照所降之級調用其接徴之員槩以接徴之日另起初限亦照此例議處各衛漕項未完處分照文職例察議一帶徴接徴離任署印官催科考成順治十二年覆準經徴完欠宜分任事久暫凡開報經管官職名必注明到任離任月日不得前後那移康熈二年題準凡限内接徴接催之官均接前任官總作十分題叅至廵撫等官催徴限滿逾期不將所欠督催分數及属官分數題叅者照原叅分數加等治罪又題準官員催徴錢糧於未催完之先被别案降調離任者仍罰俸一年又題準升轉官如本任有未經銷算錢糧扣足分内月日分數全完後方許赴新任若本任内未完即赴新任者降職二級該管官遇属官有任内未完錢糧即準赴新任者降職一級皆調用督撫罰俸一年五年覆準帶徴節年錢糧原限二年全完者如限内全完州縣官萬兩以上紀録一次道府直𨽻州二萬兩以上紀錄一次四萬兩以上紀録二次州縣官二萬兩以上道府直𨽻州六萬兩以上均不竢俸滿即升布政使司十萬兩以上紀錄一次二十萬兩以上紀錄二次三十萬兩以上不竢俸滿即升七年題準巡撫升任其原叅督催之案不必照舊属各官每案降級照離任官例每案罰俸一年九年覆準限年錢糧接徴接催均不必别作分數止照前官所遺分數内續完幾分即與扣算若本年繫一官經管而年限内有二三官接管者止於前官未完分數内按接管月日分算若本年繫二三官經管而年限内止一官接管者彙算二三官未完分數内除續完分數題叅十年覆準署印官任事日久一年内經徴錢糧全完者亦照例議叙十四年題準年限錢糧未完道府直𨽻州同繫督催應與布政使司一例處分至接徴接催官半年期限太迫將接徴州縣衛所亦限一年接催司道府直