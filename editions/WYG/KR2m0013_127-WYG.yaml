body:
  text: 兵部武庫淸吏司武科一武鄕試事例順治二年題準武鄕試定於子卯午酉年十月舉行各省武生該州縣給文由布政使司造册彙送監臨主考官考試照額取中又題準順天武鄕試由部遴委滿漢司官各一人爲提調外塲監射官四人由部將司官遴委外場考試官四人將送到内大臣大學士都統職名開列監試御史二人將送到滿漢御史職名開列内場正副考試官二人將送到編檢職名開列受卷彌封官四人將送到進士舉人出身之員外郎主事中行評博國子監助敎守部進士舉人並行取主事職名開列均於臨期密題請旨簡用至同考官四人由吏部將應開列各官職名密題請旨簡用監門巡綽搜檢官兵及金鼓旗角等項由順天府咨呈到部行巡捕營分撥備用又題準各省武鄉試以本省巡撫爲監臨主考官同知以下知縣以上科甲出身者遴選四人爲同考官又題準武鄕試内外場考試及執事各官需用筵燕供給並銀牌金花杯盤表裏筆墨心紅紙張等項在京由順天府照例行文各衙門支取備辦事竣覈銷在外聽巡撫酌量於司庫支取備辦事竣覈銷又題準武鄕試上馬燕插花給表裏下馬燕插花均照文場例十六年題準直隸各府奉天府及各衞武生均歸順天府鄕試康熙十七年題準直省中式武舉試卷親供限出榜後十日内解部磨勘二十三年題準武鄕試中額順天一百四十名山東六十名山西一百十名河南六十名江南一百六十一名江西四十四名福建五十名浙江五十名湖廣五十名西安五十名甘肅五十名四川四十二名廣東四十名雲南二十七名貴州二十名廣西人數不足不設科竢應試人多再定中額二十六年覆準順天等府取中一百八名漢軍四十名奉錦二府三名其各省照文舉額數山東四十六名山西四十名河南四十七名江南六十二名江西五十七名福建五十四名浙江五十四名湖廣五十名陜西二十名甘肅二十名四川四十二名廣東四十三名雲南四十二名貴州二十名廣西三十名又覆準直省中式武舉試卷停其解部磨勘四十九年覆準陜西甘肅原取中武舉各二十名今於原額外各増中十名五十二年議準新中武舉内有弓馬不堪人材不及技勇不合式者將考試官照文科塲例議處雍正二年覆準湖廣分南北二闈鄕試武生中式原額五十名湖北湖南各分二十五名又覆準陜甘武鄉試再增中額各十名七年奉旨各省考試武舉例用該省巡撫爲主考官其閱看文字則用屬下舉人進士出身之同知州縣等爲同考官朕思各省巡撫多有平日未曾學習騎射技勇者忽司衡鑒之任何以評定舉子外場之優劣從今科爲始各省巡撫考武舉時著就近省城之提督總兵官一人同考外場秉公拔取務令得人以光大典若提鎭駐劄路遠或因公他出則令總督或提鎭遴委副將一人代之又覆準武鄉試中額湖南減一名四川減二名廣東增一名貴州增三名十年議準山西止有巡撫江西湖南廣西貴州等省雖有總督均繫隔省應令巡撫監臨主考會同提鎭較閱馬歩射技勇其江南福建浙江湖北四川廣東雲南等省頭場二場照例巡撫會同提鎭較閱總督親往監臨以重體統至三場仍以巡撫爲主考官十三年奉旨順天武鄉試正副考官向例止開列編檢嗣後著將開坊翰林官一幷開列乾隆元年諭陜甘之人長於武事其人材壯健弓馬嫻熟較他省爲優向來武闈鄕試中額每省各四十名應試之人每以限於額數不能多取其如何量行廣額取中之處著該部議奏欽此遵旨議準陜甘二省每省原額取中四十名今酌加十名各取中五十名又題準順天武鄉試向例止有御史二人監試但旣分天地黃宇四圍考較馬歩射技勇監試御史應增二人每圍以一人監試又覆準武鄕試向例於十月初九至十二日考試馬歩射技勇爲期甚迫嗣後武鄕試外場應於十月初七日爲始大省人數多者於初五日爲始考試馬歩射並技勇十三日入闈十五日考試策論又覆準武鄕試考試馬歩射之期天晴無雨仍照定期考試若遇天雨泥濘準令暫停竢晴明再行考試仍將展限緣由題奏九年覆準武生有年屆六十以上者不準入鄕試場一武會試事例順治二年題準武會試定於丑辰未戌年九月舉行揭榜之日由部堂官攜印入場鈐榜張掛部前又題準武會試之年豫期通行直省督撫除武舉内已經推選並丁憂有事故者不準會試外其餘於四月以後八月十五日以前悉行給發文批盤費赴部察驗準其會試又題準會試之年六月内由部遴選滿漢司官各二人開列職名題請簡用滿漢各一人提調會試事務知武舉官一人將本部左右漢侍郎職名開列外場考試官四人將送到領侍衛内大臣大學士都統職名開列監試御史四人將送到滿漢御史職名開列内場正副考試官二人將送到内閣六部都察院翰林院詹事府各堂官職名開列同考官四人將送到進士舉人出身之給事中郎中員外郎主事職名開列收掌試卷官將送到中書科中書職名開列受卷彌封印卷等官將本部漢司官遴委監門巡綽搜檢供給等官將門千總及順天府送到各官遴委均於臨期密題請旨簡用又題準武會試策論題部委司官一人齎送内閣恭進其揭曉日期豫行題明於是日將場内謄繕題名錄由部堂官恭進又題準武會試於九月初四日外場考試等官在部筵燕應用一等席十有二看席一二等席六十七十三日内場考試等官在部筵燕應用一等席十看席一二等席二十四三等席十有六發榜次日内外場考試官在部筵燕應用一等席十有四二等席二十五三等席十有六行文光祿寺豫備筵燕作樂行文樂部鳴賛官行文鴻臚寺各照例豫備其賞賜内外場考試等官表裏行文戸部支取銀牌金花杯盤行文工部支取又題準武會試中額取中二百名康熙三年題準武會試取中百名三十三年覆準武舉於頭場二場合式之後試第三場策論將直隸山東山西河南陜西定爲北卷取中五十名江南江西福建浙江湖廣四川廣東廣西雲南貴州定爲南卷取中五十名三十六年題準各省武舉來京如過九月初五日投文者不準會試五十二年諭近見直隸各省武進士額數或一省偏多一省偏少皆因不知其所學弓馬武藝止憑文章取中以致弓馬嫻熟學習武藝之人多有遺漏嗣後考取進士不必拘定額數竢天下會試武舉齊集京師著該部將各省赴試到部武舉等照例考試弓馬將合試武舉等實數察明豫行奏聞朕計省之大小人之多寡照考取文進士例按省酌定取中武進士額數考取之時就本省卷内擇其佳者照所定之數取中如此則弓馬武藝好者不致遺漏矣欽此又議準會試武舉由部會同外場考試官考試外場完畢卽將八旗漢軍及直隸各省合式武舉實數並注記弓馬好者分晰開明繕摺具題請旨定取中名數雍正二年特恩賞給落第武舉盤費四川廣東廣西雲南貴州每人賞銀十兩江南江西福建浙江湖廣陜西每人賞銀七兩直隸山東山西河南每人賞銀五兩五年諭今科落第武舉八旗直隸密邇京畿不必賞賜其各省落第武舉每人賞銀四兩乾隆元年覆準武會試向例於九月初七日起至十二日止考試馬歩射技勇爲期甚迫嗣後武會試外場定於九月初五初六初七等日考試馬射初八初九初十等日考試歩射技勇十一日將合式武舉内復加簡選好字號十二十三等日收卷塡明籍貫履歴十四日將試卷移送貢院外簾各官編號㸃名十五日考試策論又覆準武會試考試外場若遇天雨泥濘準奏明展限又覆準武會試内外場考試官及各執事官需用供給並筆墨心紅紙張等項向由部於戸部支銀並支米麫給發大宛二縣五城坊官承領供應但文會試一切供給等項均繫順天府承辦嗣後武會試亦照文會試之例令順天府赴戸部支領承辦事竣照依時價及用過實數徑報戸部覈銷如有不敷徑赴戸部補領至刋刷會試錄登科錄需用之銀順天府卽於所領戸部銀内解部應用統於動用項内報銷四年覆準文會試有監試滿漢御史六人至内簾監試又有滿漢御史二人惟武會試止用滿漢御史四人外場監試後卽入内場稽察㸃名散卷等事並未設有内簾監試御史是以内龍門均繫主考官親視啓閉但主考較閱策論不便兼管别務應增御史一人在内簾監試視内龍門啓閉並稽察一切事務再武會試舉子雖不及文會試人數之多而受卷彌封向各委官一人未免過少應各增一人五年覆準武舉領得會試盤費除人文皆不到部及文到人不到者仍行追繳若行至中塗有患病丁憂者取具該地方官印結報部或已到京投文後患病丁憂者取具同鄕官印結報部皆免追繳十八年覆準武舉年屆六十以上者不準給與文批會試一武鄉試武會試兼行事例順治二年定鄕會試外場頭場試馬射縱馬三次發九矢中二者爲合式二場試歩射發九矢中三者爲合式再開弓舞刀掇石以試技勇歩射布侯馬射氊毬三場試策二問論一篇又定順天武鄕試及武會試皆分天地元黃今改天地黄宇四圍考試馬歩射技勇鄕試外場考試官會本部侍郎順天府府尹府丞及御史分圍考試會試外場考試官㑹本部尚書侍郎及御史分圍考試又定順天武鄕試及會試所有論二篇策一篇均由内場考試官出題各省鄕試由巡撫出題十七年題準馬射以中四者合式歩射以中二者合式是年奉旨武鄕會試馬射以中四矢爲合式歩射以中一矢爲合式不合式者不準取中康熈七年覆準第一場馬射以中三矢者爲合式十三年覆準頭場考試馬射樹的各距三十五歩縱馬三次發九矢中三矢者爲合式不合式不準試二場二場試歩射樹大侯高七尺濶五尺以八十歩爲則中二矢者爲合式不合式不準入三場馬歩射後再以八力十力十二力之弓八十斤一百斤一百二十斤之刀二百斤二百五十斤三百斤之石試其技勇弓必開滿刀必舞花掇石必去地一尺三項内能一二者爲合式全不及者亦不準入三場三十二年奉旨歩射大侯以八十歩爲則太逺善射之人多致遺棄嗣後着改爲五十歩以中二矢爲合式又議準歩射大侯以五十歩爲則務以中的者爲準如中侯上之旗侯下之足者皆不作中四十一年覆準武場立空白印册二本第一場馬射合式者於面上用印記時令本人親塡籍貫年貌第二場合式者仍令本人親塡對其字跡相符準入三場並將親塡册封貯至拆號之時將本人中式策論墨卷與前册磨對字跡如有不符作弊顯然者褫革察䆒四十八年諭武經七書朕曾閱過其書文義多駮雜不能皆合乎正道孟子云仁者無敵又曰天時不如地利地利不如人和與其用權謀行師曷若以王道行仁義之爲愈也前此征三逆取臺灣平定塞外䝉古朕親經理軍務且曾躬厯行間深知用兵之道如七書所言安可盡用卽今於七書中作何分别出題及增用論語孟子出題之處應行定議欽此遵旨議準嗣後鄉會試三場作論二篇時務策一篇其論第一篇以論語孟子出題第二篇以孫子吳子司馬法出題至考試生童亦照此出論題止令作論二篇又議準直隸各省綠旗營兵有通曉文義願應武鄉試者在充伍地方令該管官申送與武生一同鄉試於原額内取中如不中仍令歸伍見任營千把總門衞所千總並年滿千總有通曉文義願應武會試者令該統領督撫提鎭咨送年滿千總在京候推者由部臨期出示令其自行赴部具呈與武舉一同會試於原額内取中如不中見任千把總仍歸原職年滿千總仍候推其兵丁及千把總如鄉會試中式之後有願歸原職原伍者聽是年諭朕觀八旗漢軍人等用於文職者多而用於武職者甚少嗣後武鄉會試亦著八旗漢軍人等考試所增額數不過數名可以收勇健人材之用於武科甚爲有益欽此遵旨議準嗣後八旗漢軍内府旗鼓佐領下未入流筆帖式庫使由官學生補授之外郎及閒散人等有願考試武生者該旗開具姓名移送順天府照例申送學政考取武生八十名鄉試時將所取武生並中書及部院衙門六品七品八品筆帖式不論上朝未上朝廕生監生以及監生之䕶軍驍騎領催各執事人等有願應武鄉試者該旗亦開具姓名移送順天府與武生一同鄉試取中四十名不中者仍令當差會試取中八名均照文場别編合字號五十一年議準本省見任官子弟臨期頂食名糧冒濫入場中式者將保送出結官降二級調用轉結官降一級調用五十二年題準武會試外場考試官將馬歩射技勇人材可觀者選取好字號密開姓名交監試御史令提調印卷彌封等官别編字號移送内簾先於好字號卷内擇其文理通曉者取中如不足額卽於合式内取中五十三年議準文生有願改入武場武生有願改入文場者照文武生員鄉試例申送鄉試文舉人有願改武場武舉人有願改入文場者亦照文武舉人會試例申送會試中式者各造入新册不中者仍各歸入文武原册不準再行改考雍正元年覆準八旗滿洲亦照漢軍考試武生武舉之例武生取四十名武舉取二十名又覆準文武鄉會試錄事同一例文場試錄例旣刋刻武場試錄亦應照例刋刻嗣後順天武鄉試錄由府尹恭進各省武鄉試錄送部彙齊恭進武會試錄登科錄由部刋刻恭進二年覆準各省武鄉試將馬歩射技勇人材可觀者選取别行記注編列好字號内簾閱卷先於好字號内取中如不足額再於合式卷内取中非好字號或以文章好取中之處於解部鄉試錄内注明以憑會試察對七年奏準八旗副驍騎校前鋒䕶軍驍騎人等有願應武鄉試者準其應試又奏準順天武鄉試及武會試頭場二場試弓馬技勇人材分别䨇好單好字號將䨇好字號之人編入東文場坐號單好字號之人編入西文場坐號歸號之後令巡綽官按號察對倘有不符立卽訊究仍將字號移送内簾試官先於䨇好字號内擇其文理平順者取中如不足額卽於單好字號内搜其條暢者補中足額又議準會試時如各省送到武舉弓馬人材皆不堪者將鄉試取中之監試各官照文場例處分十一年議準順天武鄉試及武會試先期行文歩軍統領委巡捕營官二人各帶兵二十名於東西甎門外照册㸃名搜檢放入甎門大興宛平縣官在大門兩旁照牌㸃入大門内仍令搜檢監試御史按名給卷一切送考人等不許擁入甎門又議準鄉試武生及會試武舉等齎文赴部取同省同考五人連名互結準其入場無結者不準頭二場面上所用印記毋得洗去倘有頂冒等弊準互結之人立時舉首十二年諭朕御極以來於滿漢人材廣開登進之途冀收得人之效是以雍正元年定有滿洲亦準考試武場之例今已行之十年未見有宜用綠旗之才況滿洲弓馬技勇遠勝於漢人將來行之日久必至科場前列悉爲滿洲之所占而滿洲文藝不及漢人又恐考試内場時不免有傳遞代作等弊似於作養人材之道未有裨益著行停止欽此乾隆元年議準各省監生有素習騎射願入武場者準與武生一同鄉試其中式者造入武舉册内不中者仍歸監生原册不準再行改考二年議準馬射步射各少中一矢者不準入内場若馬射少中一矢步射合式步射少中一矢馬射合式者再試技勇若弓刀石三項皆一等者亦準其合式闕一者不準果有勇力過人技藝出衆準一同選入好字號又議準武鄉會試三場卷面號印令監試提調同受卷彌封等官親用不得假手書吏致滋弊端又覆準武鄉會試每圍各以御史一人監試原爲杜弊防姦頭二場考試畢所有三場㸃名册亦按圍分造令各圍監試御史於㸃名時各認其考試之人倘有頂冒代倩等弊卽行察究三年覆準武鄉會試選取單好字䨇好字號者皆作暗記密開姓名移送内簾倘不愼密以致洩露將外場考試官及監試御史交部議處四年覆準武鄉試令提調同監試各官會試令知武舉同監試各官將外場考試册帶入内場繫單好雙好字號於本人交卷時將原册所塡馬步射技勇逐一詢問如舉對相符者卽準給籤放出有一二項相符者亦準給籤放出如與原塡馬步射技勇全不相符果繫頂冒照例察究六年覆準武鄉會試卷有將字號誤印者將承辦官照例察叅外其取中之卷於塡榜時察對原册如有合式卷誤印單雙好字號者卽不準取中若原繫單好雙好字號誤印合式者仍準取中七年覆準文武準其互試原欲簡拔全材但日久弊生夾帶傳遞換卷皆勢所必有内簾但憑文取中外簾稽察甚難應將文武鄉會互試之例永行停止又覆準武鄉會試外場考試官等當外場校閱馬歩射技勇之時若商酌稾案未免妨碍應竢校閱完畢於退食之後再行辦理至於單好雙好號册皆繫密記關繫綦重向將本部同御史號册各帶入内場察對編號而外場考試官號册並不帶入内場但同繫外場公定亦應一例察閱嗣後外場考試官號册一幷封固帶入内場以重關防八年奏準監生向照文生之例準入武場一次見在文武互試旣經停止則監生自不準入武場但監生原有區别其由武生捐納者原繫武生出身應不準入文場仍照舊準入武場應試至由廩增附生及俊秀捐納者槩不準入武場九年議準外場馬射九矢中四歩射九矢中二方爲合式行之已久近於中數已經合式者不復令其再射應將中數合式者亦必令足九矢之數則選取單好雙好亦可就中數之多寡以定高下又覆準各省武鄉試考試外場好字號中亦照順天武鄉試之例分别雙好單好三場閱文先盡雙好次及單好如不足額再於合式卷内選取又覆準武