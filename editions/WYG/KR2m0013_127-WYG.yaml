政考取武生童騎射該督撫提鎭不得委本籍武職會同考試或同城武職皆繫本籍之人卽於附近别府之副將叅將游擊内調委一人會同考試又議準地方官若有不公不法凌辱士子生童等身受其害者準其赴該管上司衙門控告秉公審理如控告屬實卽將地方官叅處屬虛將該生童等治以誣妄之律倘該上司袒䕶地方官不卽準理或剖斷不公將該上司議處若有豪橫之徒逞其私忿聚衆罷考脅制官長者審實照例分别首從治罪其逼勒同行罷考之武生褫其衣頂武童記名停其考試如合邑合學同罷考武生全褫衣頂武童全停考試已經懲治之後果能洗心滌慮改過自新該督撫會同學政察實具題請旨倘學政市恩邀譽暗中寢息或將罷考案内之人濫行收考並該督撫通同徇隱以及董率無方不能約束之敎官一幷交部處分至生童罷考之時或有同城武職從中調處寢息其事者罰俸一年十三年奉旨文武生員名列膠庠各應專心舉業嫻習技藝以圖上進豈可又掛名營伍若已經入伍之兵如有粗知文義願應考試者原有準入武場一體鄉試之例不必又附名學校若以一身而兼顧兩途必且互相牽制轉致兩誤嗣後文武生員一槩不許濫收入伍如故違成例一經察出卽將該營將弁該學敎官一幷題叅議處又奏準八旗漢軍敎養兵如有情願應試者準與武童一例應試乾隆元年議準武生該學政於歳試時隨棚舉報優劣一次造册送部仍竢三年任滿彙題至科試後不必舉報優劣其有抗糧唆訟行止不端者仍許各地方官隨時詳報大過請革小過分别戒飭三年議準武生童首重騎射學政會同武職考試原欲其秉公詳愼不滋弊竇但營伍舊制副叅游等官籍隸本省者止迴避五百里若於考試之時仍以本省武職校射誠恐故舊婣朋彼此相連不免夤緣請托應令各省督撫提鎭於考試時將校射副叅游等官均用别省籍貫之人凡籍隸本省者不得選委四年覆準各省會同學政校射之武職奉到委文之日加謹關防封門迴避該提調官畱心訪察不得與本地人士私相往來以及家人兵丁私自出入竢考試旣畢照常辦事五年奏準武生情願告給衣頂者除篤疾之人照例令該學敎官據實具詳準給衣頂外其有以年老告給衣頂者察其入學已經三十年無論衰病與否均爲合例或入學雖不滿三十年而其年已及七旬者亦爲合例統令呈明該學敎官察驗確實出具印結申詳學政卽準給予衣頂不必親赴學政衙門候驗又覆準武生降爲靑社者如未滿十科不準給予衣頂其入學已及三十年及年屆七十者雖未滿十科亦準給予又奏準緣事褫革武生除包攬辭訟武斷鄉曲及一切實繫本身重犯於律無可貸者仍永行褫革外其因人連累並本身事犯情有可原及罪在杖一百以内革後能改過自新者均準以原名應童生試曾捐監生者亦許以原名復捐其褫革武舉有似此情節願考試者亦準其一例應童子試以圖上進皆令取具里鄰甘結報地方官及敎官察明加結申送學政如有隱匿重情䝉溷濫邀者仍應斥退其應行收考者毋許地方士庶挾嫌告訐六年奏準武職有將文武生員濫收食糧者罰俸一年八年覆準武童額進一名準府試取二十名送學政照額選取如有逾數多送者照文童之例許學政裁去不準收考又覆準武生原以外場爲重若照文生年屆七十方準給予衣頂則頺顔白髪之人張弓挾矢萬難努力嗣後實在年屆六十者雖未滿十科亦準給予衣頂又覆準各省文鄉試如五等文生不敷對讀卽兼用四等武生對讀之後免其錄遺準入武場鄉試十年奉旨直省文武生員三年歳考一次若臨場不到卽行黜革其遊學患病皆取結開報限三月内補考近聞各處士子有任意遷延屢次欠考者此風漸不可長嗣後除無故臨㸃不到卽行黜革外凡繫病假生員其上屆開報者下屆果繫遊學未歸患病未痊該敎官察驗確實再行詳請展限一竢病痊囘籍卽送補考如欠至三次以外不準展限竟行黜革倘有扶同揑報不行詳請展限者該學政嚴察將敎官叅處以專責成一八旗考試事例原定八旗考文童生文舉人由部將領侍衞内大臣大學士尚書都統䕶軍統領職名開列具奏請簡四人監試騎射考文進士由部將領侍衞内大臣大學士都統職名開列具奏請簡二人監試騎射考筆帖式及繙譯童生舉人進士由部將領侍衞内大臣職名開列具奏請􅂤二人監試騎射均擇其能合式者準入内場考試其奉天八旗考文童文生由該將軍副都統等驗其騎射能合式者送該府丞考試雍正七年議準八旗考文生員舉人進士者於未考騎射之先每旗委叅領一人每叅領下委賢能官一人令其送考本佐領内管領下各委領催一名率領應試之人與委出之叅領等令其識認各旗將所委送考識認叅領等職名同應試名册一幷咨送禮部存案由禮部造册送部傳集叅領等察對名册及試騎射入場之時該叅領等親身識認送考如叅領等本身不到者各罰俸一年領催鞭五十發配一編發順治十六年題準刑部問擬充軍人犯開明籍貫送部照軍衞道里表開載衞所附近充軍者發二千里邊衞充軍者發二千五百里邊遠充軍者發三千里極邊充軍者發四千里煙瘴充軍者發煙瘴地方亦四千里如無煙瘴卽以極邊爲煙瘴以上充軍人犯給傳牌一紙劄行順天府令沿塗府州縣差役遞解取具收管送部仍移咨該撫取具地方官文結並原發傳牌繳部察覈其在外省問擬軍犯由巡撫定衞發遣鈔錄本犯供辭送部若於定衞充發之時恭遇恩赦者咨送刑部援免軍犯起解時或於塗中病故卽委官相驗果繫患病身故並無别情者移咨刑部銷案例應僉妻者免其發遣在配所病故者該撫察明病故情由取具該管官印結送部所遺妻室準其囘籍又定刑部審擬外遣之犯應發寧古塔吉林黑龍江等處安置咨部差役遞解康熙五年題準遣犯應給車移付車駕司撥給罪犯有家口者每六人一車若内有老幼男女病廢者卽一二人亦給一車六年題準軍犯配所脫逃拏獲之日杖一百折責四十板發原衞充軍遇赦免其杖責仍發原衞充軍十一年覆準軍犯到配該管官加意防範撫䘏無令至於饑寒若軍犯有單身逃逸者初叅該管官罰俸六月兼轄官罰俸三月限一年緝拏限滿不獲該管官罰俸一年兼轄官罰俸六月有攜妻同逃者初叅將該管官罰俸一年兼轄官罰俸六月限一年緝拏限滿不獲該管官降一級畱任獲日開復兼轄官罰俸一年又題準軍犯中塗脫逃押解官住俸勒限一年督緝限内不獲罰俸一年行文各省照案緝拏二十三年奉旨凡充軍流徙犯人於盛暑嚴寒時發遣在塗苦累嗣後冬十月至正月夏六月停其發遣又議準軍流遣犯未經起解者遇盛暑隆冬仍照例停遣外若已至中塗者初冬十月照常接遞至十一月初一日方準停遣竢次年春融起解如抵配所不遠本犯情願前進者將不停遣緣由移咨前塗州縣一例接遞其從配所逃囘被獲者照逃人例解囘原配雖遇盛暑隆冬不準停遣二十八年覆準永遠充軍本犯身故無子僅存妻室有欲囘籍察明報部準其各囘原籍雍正三年奏準充發人犯酌定名數分起解送如案内人犯衆多至五名以上者每五名作一起先後解送押解官役嚴加約束在塗毋致生事擾累地方又奏準凡充發軍犯各計罪人原籍之府屬照所限道里遠近定衞發配皆不得任意充發致有趨避四年覆準各省衞所有改爲州縣及裁汰歸幷州縣者嗣後充發軍犯卽發於改設歸幷之府州縣管轄仍注軍籍當差以該州縣爲專管官該府爲統轄官有脫逃疎縱等事照例叅處十三年十一月奉旨從前發往各處安置人犯有情罪尚輕而在外已過三年能安靜悔過者各該督撫開明所犯情罪具奏請旨乾隆二年奉旨軍流人犯已到配所者向例遇赦不準放囘今特加恩此等人犯内除情罪重大及免死減等實繫兇惡强徒外其餘因事議遣在配已過三年安靜悔過情願囘籍者令該督撫覈奏請旨準其囘籍又覆準閩省收到軍流人犯令各州縣安插如軍犯年逾六十不能自食其力撥入養濟院按名給以孤貧口糧年未六十已成篤疾者亦準撥給若本犯挾有㣲資習有藝業者聽其各自謀生交地保管轄其少壯軍犯實繫貧窮又無藝業者初到配所該管官就近酌量安插管束仍按本犯妻室子女每名每日照孤貧給以口糧自到配日爲始以一年爲率所給口糧令該撫於各州縣存貯倉穀項下動用報銷迨至一年後本犯習於風土不難自食其力且年力强壯尚可使用各州縣有驛遞之所卽令充當夫役一例給以工食毋許胥役剋扣滋擾該管官仍於每月朔日按名㸃驗七年覆準各直省收到軍犯無論有衞無衞均照閩省之例辦理其應給口糧各州縣有存貯倉穀者照倉穀項下開銷無存貯倉穀者於存公項下報銷十年覆準各直省收到軍犯除老疾孤貧及充驛站水草等項夫役仍照定例辦理外其按里充配之處止照軍犯應遣府分轉行各該撫於該府所屬州縣覈明里數均匀撥令充役毋令擁聚一處以致擾累地方十一年諭自古明罰飭法所以弼教而大辟之外又設有軍流之條此卽移郊移遂屛諸寄棘之遺意也朕今歳特沛恩綸將斬絞人犯量加酌減夫大辟人犯情罪較重尚已從寛而軍流所犯罪輕轉使之遠離故土殊堪憫惻其令直省督撫各就所在地方將從前軍流人犯内已過十年安分守法别無過犯者分别咨部覈議該部奏請省釋其有居住已久自能謀生不願囘籍者聽欽此十二年覆準貴州各屬地方狹隘苖多民少與他省不同充軍人犯聚集太衆與苖人日相往來所關非細嗣後各省應發貴州軍犯徑解巡撫衙門就地方情形通融安插他省有苖民雜處之州縣亦照此例行又覆準各省發遣廣西軍犯統於所屬州縣内照該犯應配道里遠近酌量安置不得撥發土司所屬地方致生事端又廣西太平府屬之寧明州慶遠府屬之東蘭州鎭安府屬之天保縣歸順州奉議州五處煙瘴極重免其分撥安置十六年覆準奉天府爲國家畱都根本重地風俗最爲淳樸凡發往軍犯聚集兹土大爲風俗之害嗣後軍衞道里表内所載順天等處充軍人犯編發奉天安置者悉行停止如有應遣之犯照道里相符之江南山西山東陜西等省分别發遣十九年覆準軍衞道里表内載各省編發附近軍犯有直隸河間天津等府邊衞有順天保定等府邊遠有宣化順德等府極邊有永平府易州畿輔之地外省豈得指爲邊遠極邊嗣後外省編發軍犯止照各省應發地方計里充配其編發直隸府州之處永行停止欽定大清㑹典則例卷一百二十三
