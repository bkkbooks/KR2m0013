原發鑰匙令各省送部貯庫一繳憑順治四年議凖各官領憑到任後送該撫藩司繳部並到任日期均按季繳報内有違限吏科覈實題叅雙單月選法雜條銓選班次已於雙單月條内詳載其有不入班次及並非毎月銓選常法逐條分纂以􅇱稽考一扣除别補雍正六年奉旨扣除别補人員爾部於每月月選之前將該員應否令其一體掣籤之處具奏請㫖七年定見任推升人員扣除之後仍留原任竢又屆應升班次有該員應得之闕由部於月選之前將應否一體升補之處具奏請旨一遇闕即用雍正十二年議凖奉㫖凡即用人員無論雙單月不入班次即用又議凖裁闕赴部别補之員人文到部無論雙單月不入班次即用又議凖各官選補推升如該督撫將前官題留或别題有人該員未經奉旨仍歸原班補用已經奉旨不入班次即用或有已經領憑尚未赴任該員情願在彼省効力者許其前往遇有相當之闕題補其已經前往無任可到者留於該省遇應得之闕補授若一時無應得之闕暫令委署候闕題補如有應歸月選之闕即行扣留知照該省題補乾隆四年奏凖各項官員如有奉旨指明以何衙門補用及以何省補用並見在止存三闕四闕者不論雙單月遇闕凖其先補一計闕選用乾隆四年奏凖奉旨補用人員除外任降革起用均歸於單月開復應補班内以奉旨日期與各項候補人員投文日期通較先後挨補其凡有本班可歸者仍歸本班銓選如有並無班次者歸於月選不論雙單月是否積闕一幷計算竢五人之後選用一人照奉後挨旨日期先補其郎中員外郎主事凡有應歸月選之闕無論保題月選一幷計算五人之後選用一人十一年議凖凡五闕後應用人員已經選補尚未奉旨旋經扣闕下月遇有員闕即行選用至下次數闕人員仍由該員初選之闕算起其續補之闕仍行積算一特用部屬乾隆四年奏凖凡奉特旨補用部屬人員除本人原繫候補候選降革廢官並原繫見任部屬仍以部屬升用及外任改補京職者均竢補官後再行赴部任事外其餘見任在京文職武職奉旨以部屬用者如業經指定部分即令其先在該部額外行走仍食本身原俸竢有闕該堂官遵旨題補未經指定部分者掣籤分發各部行走亦照本身職銜食俸竢有闕由部照例銓補一降調官員得闕後引見雍正十三年議凖知縣以上官員蒞任後緣事降調者該員赴部候補得闕時不論品級均與月選官一同引見請旨其未經補闕以前如有業經引見奉旨照所降之級用者竢月選得闕時繫知縣以上仍照例引見繫不應引見之員無庸再行引見一廕生外用乾隆元年奏凖廕生引見奉旨内用者本有正班外其有奉旨以同知知州用者應歸於雙月一選一升之後選用一人以通判用者歸於雙月四選一升之後選用一人以知縣用者歸於雙月捐班之前選用一人七年定難廕生應用外任者均歸於雙月捐班之前選用一小京官學習期滿乾隆元年奏凖各部保舉學習七品小京官三年期滿該堂官出具考語咨送外用者以通判歸於單月一應補一捐納之後選用一人一察奏廢官乾隆三年奏凖都察院察奏廢官引見奉旨以主事用者歸於單月行取學習散館庶吉士降補捐納輪用一周之後選用一人一保舉選用乾隆四年奏凖各省保舉孝廉方正及保薦幕賓奉旨以知縣用者歸於雙月五十一人之後選用一人奉旨以佐雜等官用者歸於單月一應補一捐納之後選用一人以直隸州州同州判用者竢單月補用二人之後選用一人直隸州州同州判舊無捐班孝廉方正奉旨以教諭用者歸於雙月以復設教諭恩拔副捐輪用一周之後選用一人以訓導用者歸於雙月以復設訓導肄業人員選用兩班之後選用一人一教職俸滿雍正四年議凖各省教職六年俸滿該督撫學政保題引見奉旨以知縣用者歸於雙單月舉人班次之後各選用二人一鹽場大使庫大使俸滿乾隆四年奏凖舉人候選知縣及貢生候選州同州判補授鹽庫大使五年期滿保題以應得之闕用者繫知縣歸於單月舉人四人之後選用一人繫州同州判歸於單月一應補一捐納之後選用一人繫直隸州州判歸於單月補用二人之後選用一人一各學教習期滿康熙七年議凖國子監教習由貢生考補者三年期滿國子監咨送到部以知縣注冊入於本年簡選舉人之後選用雍正七年奏凖教習舉人繫應選知縣之員請入於雙月五舉之後選用一人奉旨舉人教習期滿著該管官將伊等教習如何之處具奏引見如盡心教習較衆更加勤慎交部以應得之闕即用其中等者照部議於雙月五舉之後補用一人十三年議凖舉人教習奉旨以知縣用者應將從前五舉選用之例酌改歸於雙月十舉之後選用一人其由貢生出身者原非應得知縣之人今教習期滿奉旨以知縣用應歸於雙月升選五十一人之後選用一人其以教職用者舉人以學正教諭入於雙月四選一升之後選用一人恩拔副榜貢生入於雙月恩拔副捐輪用一周之後選用一人歲貢以復設訓導入於雙月兩挨貢一捐納之後選用一人乾隆二年議凖咸安宫景山教習於進士内考取如進士不敷於各省舉人内考取咨送充補七年議凖盛京左右兩翼漢學教習於盛京生員内各選二名令其教習三年由盛京禮部徑送本部考試視其文義優劣分别考取以教諭訓導注冊仍歸本省舉人貢生等内照年分先後挨選又議凖各學教習引見後仍照期滿日期先後挨算如同日期滿者掣籖補授其未經銓選以前有由貢生中式舉人舉人中式進士者凖其仍歸教習班内銓選十一年議凖咸安宫景山教習期滿向有即用之例嗣後除奉旨即用者仍遵旨即用外其進士奉旨以主事用者歸於雙月主事一班之後選用一人至進士舉人以知縣用者照各學舉人教習之例歸於雙月各按進士舉人本班於兩班之後選用一人以教職用者亦照各學教職班次於四選一升之後選用一人十四年議凖各學舉人教習未滿時有中式進士者照咸安宫景山教習之例歸於進士教習班内選用一司官外用府道乾隆十四年議凖各部漢郎中升用道府由部於各部俸深郎中豫行截取十人令各堂官秉公保舉出具考語分别才具或宜於繁或宜於簡或只可留部辦事者一幷咨送過部引見恭候欽定奉旨記名以繁闕簡闕用者按其俸次遇有闕挨次升用竢將次用完再行截取奉旨留部人員屆應升時凖其於見任内加一級注冊十五年議凖凡升用道府之員例應計俸一年滿後方凖截取倘計俸一年人員不敷十員之數即不拘人數多寡截取升用如無合例之員不敷升用遇有漢班應升之闕即將外班應升人員抵補仍積漢班之闕十七年諭吏部以此次各部院保送道府滿洲郎中僅止三員輪用滿班不敷銓用請以滿郎中用道員滿員外郎升用知府一摺固亦因時變通之道然國家用人内外一體在外則地方為重在部則曹務攸司何必急資外補始足展其才力近年滿官保送外任者多以致各部院幹練出色之司官漸少其見任同知通判州縣内俸深而未得升用則不乏其人當酌為疏通嗣後除特㫖除授外滿洲司官保送道府之例著暫行停止此議著存案竢數年後朕酌量滿司官應外用之處照所議行其漢郎中向繫論俸截取該堂官分别宜用繁闕簡闕及不宜外任引見注冊輪選而該堂官即有以應簡而濫列為繁舉任失當者朕曾降旨申飭見在司官中明敏練達勇往任事者亦殊難其選皆由樂外轉而輕曹署所致其應如何酌量久任之道該部一幷定議具奏欽此遵旨議凖郎中必食俸二年方凖截取以道升用員外郎必食俸三年方凖截取以知府升用如無合例之員以外班抵補其升轉與員外郎相同之内閣侍讀亦凖其較俸截取一主事等官外用直隸州知州乾隆十三年奏凖將六部滿漢主事令各該堂官秉公遴選保送吏部彚齊人數引見記名後遇有直隸州知州選闕按依俸次歸於雙月一滿班一漢班輪流間用十五年議凖品級升轉與主事相同之宗人府經歴都察院都事經歴大理寺寺正太常寺滿寺丞光祿寺滿署正均令各該堂官一例遴選保送補用不必按月分班定以一滿一漢計闕輪用一候補候選人員告降康熙五年議凖通判告降以按察使司經歴知事布政使司都事鹽運使司經歴外府經歴京外縣丞外衛經歴用州同州判告降以縣丞用正九品之主簿等官告降以從九品等官用十四年題凖提舉告降以府通判用衛經歴告降以府經歴用二十二年題凖運副告降以府通判用凡例内未經指出者不凖告降降補之後不凖仍帯原銜凡告降官均令取具在京文官印結具呈投部凖其告降以具呈日期注册附於本年本行人之末選補乾隆七年遵旨議定漢軍貢監生一例凖其考取主簿吏目職銜有願改降各項雜職者亦凖其告降其考定主簿職銜告降者凖以吏目選用其考定吏目職銜願改降從九品者凖其以巡檢等官選用願改降未入流者凖其以典史等官選用察雙月選法主簿吏目皆四選一升嗣後漢軍歲貢及捐納貢監者均於四選一升之後選用一人至巡檢典史等官選法亦繫四選一升四選内用在京書吏一人在外吏員二人其京外班次内各分一考職一捐納請嗣後漢軍由吏目改降巡檢未入流者凖其以應得之闕竢在京書吏一考職一捐納之後選用一人其改降人員不凖遞行改降一本籍接壤廻避順治十二年題凖在京戸部司官刑部司官廻避各本省司分戸部福建司兼管直隸八府錢糧直隸人亦應廻避在外督撫以下雜職以上均各廻避本省教職原繫專用本省止廻避本府康熙四十年覆凖五城兵馬司正副指揮吏目等官順天府人均令廻避四十二年遵旨議定候補候選知縣各官其原籍在見出之闕五百里以内者均行廻避於每月二十日截限後將原籍住址及界連省分接壤相去見出之闕在五百里以内者如本人原籍住址在某縣或在城在鄉以住址地方扣算至界連省分程途若干又由界連省分扣算至見出之闕所屬地方繫道闕則應以所轄之地計算繫知府州縣闕則應以本府屬州屬縣屬交界地方計算程塗若干自本人原籍住址至見出之闕共計程塗若在五百里之内即應廻避逐一分晰呈明幷取具同鄉京官印結於二十四日過堂時投遞令其廻避以别闕掣籤又議凖江蘇安慶湖北湖南甘肅西安原繫兩省毋庸廻避其在五百里以内者仍行廻避雍正四年遵旨議定漢軍人員京官不補刑部司官在外廻避順天直隸各官其直隸布按以上漢軍人員仍一體開列十三年議凖各省佐貳雜職駐劄地方在原籍五百里以内者亦令迴避乾隆七年議凖在外推升及在籍候選官員於掣籤行文給憑之後有在五百里以内者呈明各該督撫確切察明移送印結咨部迴避將原闕開選本員别補又議凖寄籍人員凡寄籍原籍地方均令廻避如浙江人寄籍順天則直隸浙江兩省均應廻避之類每月月選在部驗到各官如有寄籍者於二十四日過堂時取具同鄉京官印結將原籍呈明廻避在籍候選者於起送赴選文結時將原籍聲明咨部均以别省之闕掣補九年議凖官員鄰省接壤原闕與原籍相距五百里以内者均應迴避定例内雖未指明官塘大路以及㨗徑小路之分但既在五百里以内自總在應行迴避之例應通行各省見任各員有任所與原籍鄉僻小路在五百里以内者均令呈明該督撫酌量改調迴避如迴避之員任内有展叅各案不凖離任行令該撫扣滿年限照例察叅如該員於限内開復銷案再行題請令其迴避至在部候選各員亦照月選迴避之例如月分所出之闕有鄉僻小路與原籍相距在五百里以内者悉令於二十四日過堂時呈明迴避如應行迴避而不聲說並虚揑者一經察出照例議處十五年遵㫖議定滿洲補授直隸州縣官員凡在五百里以内者悉行迴避其應用盛京州縣之員所屬地方境内如有荘地應令該員於掣籤時呈明迴避别行扣補其見任道府同知等官有荘地在所轄之内者行令該督該府尹察明奏調並月選時有掣得道府同知等闕該員所轄境内有荘田地土於掣籤時即為呈明扣補又漢軍凡奉特旨補授人員不行迴避嗣後滿洲道員以下等官如繋奉特旨補授者亦應照漢軍之例毋庸迴避等因奉旨滿洲漢軍人員補授直隸省五百里内道府以下員闕經朕特旨補授者向不迴避但伊等如見有荘田在所轄本境之内亦應呈明該上司報部存案將来如有徇庇等弊便於稽察餘依議十八年議凖山僻小徑與大路原不同該員等難以周知若到任後詳請迴避即行議處未免無所區别應酌定限期凡本籍鄉僻小徑與任所在五百里以内例應迴避人員於到任三月以内詳請迴避者免議如三月以外詳請者照例議處一親族迴避康熙三年題凖在京各部院尚書侍郎以下筆帖式以上適親祖孫父子伯叔兄弟若在同衙門照官小者迴避十年議凖京官同衙門補授同官應迴避者令後補者迴避京官惟適親祖孫父子伯叔兄弟迴避此外宗族親屬槩不迴避外官有闗繋刑名錢榖考覈糾叅者不分逺近繋族中均令官小者迴避族中之人雖服制已逺而聚族一處者情誼闗切均令官小者迴避若支分派逺散居各省各府籍貫迴異於同姓實為疎屬毋庸迴避若在五服之内者雖住處不同仍行迴避雍正七年議凖外婣親屬若母之父及兄弟妻之父及兄弟已之女壻適甥分屬至親同在外官不能無所瞻顧亦令官小者迴避至母兄弟之子姨母之子雖服制三月親屬漸逺毋庸迴避乾隆九年奏凖外任司道原屬同官向無兒女婣親迴避之例若本身兒女婣親而為上司下屬者則闗繋舉劾與司道同官者不同應令迴避一師生迴避雍正七年議凖鄉㑹考試官取中之人以外官員闕銓補者為數甚多毋庸迴避至中式閱文之同考試官鄉試㑹試合計不過數人若取中之人為督撫司道而考官適在下屬應令官小者迴避如考官外任督撫其屬官内有繋伊取中者咨部存案遇舉劾時於本内聲明考官外任司道其屬官内有繋伊取中者申報督撫存案如有舉劾於督撫本内亦將該員與司道誼繋師生之處一并聲明以憑察覈至知府與所屬州縣一切刑名錢榖之案考覈盤察最為親切如分屬師生均令官小者迴避直隸州知州管轄屬縣與知府同有誼闗師生者亦令其迴避此等迴避之員即以本省州縣之闕交與督撫酌量具題調補若在部候補候選人員將月分所出州縣之闕察明屬某府或某省直隸州管轄見任知府直隸州内與伊等有師生之誼者即令該員於吏部過堂時照親族迴避之例取具印結聲明迴避掣籤時以他闕令其掣補其考官見任督撫司道而取中之人在部候補者毋庸迴避竢到任後申明存案如考官見在候補而取中之人見任該省督撫司道仍令其將該省所出之闕於過堂時聲明迴避至佐貳教職原無地方專責均毋庸迴避一迴避調補康熙四十二年題凖凡迴避别補之員人文到部歸於單月不入班次即用雍正三年諭外任官員迴避本族例皆赴京别補朕思督撫兩司及統轄全省之道員其本族之人迴避者自應赴京别補若分巡數府之道員及知府同知通判知州等官所管止於一府一州一縣鄰府即非其所轄其屬縣職分卑微若必一例赴京别補未免往返稽遲艱難拮据深可軫念嗣後遇此等迴避人員著該督撫即於本省内調補欽此乾隆七年議凖總督有兼轄兩省三省其布按兩司及通轄全省之道所屬官員内如有應迴避者本省雖無可調之闕總督所轄之鄰省亦凖其酌量調補又議凖凡應迴避人員在部候補候選各官於二十四日過堂時取具同鄉京官印結呈明旗人取都統印結凖其迴避以别闕掣補在外推升及在籍候選官員該督撫移送印結咨部凖其迴避將原闕開選本人給咨赴部别補一坐補原闕順治初年定各官霉爛倉榖及虧空錢糧全完開復並道府州縣等官病痊起用者均坐補原闕雍正十一年議凖州同以下微員患病如才能出衆者病痊咨部亦仍以原闕補用乾隆二年奏凖凡月選官員有籤掣逺省具呈親老改補近地者將所出逺闕别行銓選外行文該員原籍督撫察明委繋實情由部具奏凖其以近地之闕改補到任後停其保題升轉竢將來該員應補之時仍令坐補從前所掣之原闕在任三年無過再行凖其通算前俸升轉四年奏凖知縣病痊起用引見奉旨不必坐補原闕以知縣用者歸於單月開復人員選用五班之後選用一人五年議凖凡親老改補近地人員到任後如有才守兼優政績卓著與卓異之例相符者凖其一例保舉列為正薦竢引見凖其卓異注冊即凖其歸於卓異班内以近地升用如未經升用丁憂竢應補之時凖其照卓異官員候補之例遇闕即補免其坐補原闕其卓異仍帯於新任若循分供職未經薦舉卓異者仍令照例遵行再親老改補人員停其保題升轉其有不能勝任題請調簡者亦應凖調將来應補之時仍令坐補原闕七年議凖凡坐補原闕人員人文到部由部察明原闕如繋在外遴選者即給與執照分發各原省分交與該督撫酌量差遣竢有原闕出時具題補授如繋應歸月選者歸於單月遇闕補授如雙月有闕亦留下月坐補原闕之人又議凖道府以下佐雜以上各官病痊如奉旨不必坐補原任者歸於單月應補班内以奉旨日期與投文日期通較先後補用知縣開復别立一班是以将病痊不必坐補原任人員定以開復五班之後選用其道府以下佐雜以上無論服滿開復均為應補合算一班是以通較日期先後十一年覆凖例應坐補原闕人員有不勝原闕之任者該督撫給咨赴部照投文日期先後歸於月分以事簡之闕補用知縣於單月開復人員選用五班之後選用一人道府以下佐雜以上以奉旨日期與投文日期通較先後補用十四年奉旨向例官員以親老改補近地者仍令坐補原闕所以杜規避也而告請終養之人未有坐補原闕之例夫父母年逾耆耋許令侍養乃國家錫類之令典然親年子所素知何必竢蒞任後方行請告安知其非因見闕平常将来即可銓補他闕藉以自便其私是轉為巧於自便者開㨗徑矣蘇為正到任甫及二年即請終養顯有規避情弊此本所請不凖行著再留任三年以示懲戒嗣後官員親老與終養之例相符者於未得闕前許其呈請其已經銓選抵任者將来亦坐補原闕著為例欽此十六年奏凖病痊人員奉旨照例用者以原闕坐補奉旨仍以原官用者照不必坐補之例辦理又奏凖知縣告病續經降調病痊引見仍以知縣用者應照例以原闕坐補十八年奏凖月選官員籤掣逺闕例得呈明親老改補近地其備擬知縣因尚未得闕例不豫先呈明嗣後如由備擬知縣引見奉旨補授者該員呈明親老應照月選官貟籤掣逺闕之例别行銓補並行文該員原籍地方察明該貟是否親老咨覆到部照例以近地之闕改補竢将來應補之時仍行坐補原闕一孤闕改補康熙四十二年題凖在京候補孤闕六品以下官貟凖其對品調補又定凡員闕盡行裁汰之候補官員以對品别官改補照投文先後挨補與各項應補人員通較先後惟佐貳官不改正印若止存三闕四闕候補官貟外官不分品級六品以下小京官其部屬主事以上例應不入班次坐補原衙門者不在此例具呈闕少補授無期各照對品原闕改補者将專行人補完方凖改補欽定大清㑹典則例卷五
