  text: 欽定四庫全書欽定大清㑹典則例卷五
  hash: sha256:252a6dc6d1e911df9158fee602ac4e852f78c2861b81cf2d67459bf8c848a876
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_008-1a, image: WYG0620/WYG0620-0129a.png}
body:
  text: 吏部文選清吏司月選二一分月選官順治初年定雙月推升大選單月急選康熙三年改為同月籤選五年議準仍分月選一投供驗到康熙二年定人文到部每月初一日投供又題凖正月開印後令補投供驗到開印日投赴選咨文仍以初一日計算四年題凖候選官自投文到部後隔一選期銓補人文到部至選期自前月初一日至次月二十五日凡隔五十五日初選官投互結並同鄉京官印結候補官止投原籍印結及京結均令親身赴部如人先到而文結在後或文結到而人不到均行扣選三十九年題凖每月初二日起司官將驗到人員詳察造冊呈堂豫行細閱以免臨選舛錯乾隆六年奏凖奉㫖即用人員免其取具文結竢投供驗到扣滿限期再行選用至月官引見扣除指明以何項員闕别用及親老奏明改補近地人員均繫已經得補之人如下月即有闕出上月未及投供仍凖銓選若無闕亦令投供驗到二十年奏凖滿洲蒙古外任道府同知通判州縣等官丁憂仍在原衙門行走者服滿後亦照各項候補候選人員之例取具服滿赴補文結到部一例投供扣限方凖銓選以杜擇闕之弊其候補道府各官竢赴部驗到後遇有請㫖道府員闕方凖夹單請㫖簡用二十一年奏凖八旗外任丁憂在各衙門行走人員服闋後堂官詳加甄别其勤慎辦公堪膺外任者奏聞請㫖照例外用否則奏聞停其外用仍留衙門行走以京官升用一閏月停選康熙九年題凖閏月不行選官其候選官亦不令投供驗到一京察大計停升順治十三年議凖内外各官遇京察大計之月題明停其升補竢出榜後仍按各月所出之闕升補一截取候選官員康熙四年諭候選各官酌量出闕多寡應截留者留京其餘聴其回籍竢選期将近咨令赴部欽此雍正元年議凖進士知縣均令回籍照原甲第名次候部截取赴選十年定應升知縣之教職以及經歴等官按其俸次最深任内無叅罰案件及下第舉人補授教職按其科分名次輪班應選者豫行截取二十人乾隆三年奏凖酌量截取不拘二十人之數令該督撫詳加驗看給咨赴部其俸次在前應截取之人見任内有叅罰事故未獲截取續經銷案即補行截取仍較俸升用乾隆七年奏凖逺近省舉人知縣每次截取三科竢選用将完再行具題截取十七年議凖見在截取到部舉人第二科開選即具題再行截取一科以足三科之數遇有簡發不致乏人一候選文結順治初年定旗員取本旗都統印文漢官取原籍地方官印結開明科分名次年貌籍貫及三代履歴並無假冐頂替違礙事故在京郎中以下小京官以上在外道府以下七品官以上取具同鄉京官印結人文到部於單月初一日驗到如有該撫咨報起程之文而無原籍印結者不凖入選康熙十年題凖截取官員如丁憂回籍服滿起文赴部者仍照原班名次挨選又議凖候選官若塗中遺失赴選文取具該地方印結投部察對與該省咨報本官起程日期相符者凖取京官印結候選雍正元年題凖候選候補官員已經取過赴選文結投部再於新例加捐者停其重取文結乾隆九年奏凖加捐人員如已捐雙月選用又加捐本班先用及已於舊例捐不論雙單月即用又在新例捐不論雙單月者所捐班次與應用月分並無更易無庸於加捐後再行扣限至由雙月改捐單月及由單月改捐不論雙單月者班次已經更易雖不必重取文結應於戸部咨文過部後扣足供限銓選一候補文結順治初年定凡丁憂治䘮服滿及病痊假滿漢官取具原籍印文旗員取具都統印文其裁汰廻避降調及降革還職解任開復者均取具原任印文人文到部於雙月初一日取具京官印結投部驗到單月遇有員闕照赴補之文先後挨補其部寺司務不專補原部寺員闕遇單月所出各部寺員闕補授京官候補坐補原衙門惟部寺司務通補内閣中書不歸月選具題補授不拘雙單月人文到部遇有員闕由内閣移送凖其先補康熙四年題凖官員有起赴補之文到部因原案降調者或起降調之文到部因别案降調者或因前案開復而復還官級者或已照所降之級銓補尚未赴任而隨復還官職者均照原文補授九年題凖官員補授之後或前官留任或督撫題補有人及裁汰其新補之官未經給憑與已領慿而未到任者不必再行起文仍照原文補授若已經前往赴任則應留本省題補别見外官别補條凡服滿官員文已到部未補復丁憂者服滿起文到部仍照前文補授服滿文内有候補字様停其重取文結候補官員止将候補之文投部身在原籍患病取具該地方印結投部在籍調理竢病痊再行起文赴部照後取之文補授至各官赴補之文到部文選司付察考功司本官離任前後有無别項事故無事故者凖其候補服滿者由稽勲司察明移付文選司凖其投供雍正十一年諭部屬官員嗣後除告假開復二項仍照舊例於單月銓補外其丁憂起復人員著不論雙單月遇闕即行補用欽此乾隆八年奏凖官員降革之後業已囘旗回籍後經開復者凖其取具本旗原籍咨文赴部銓補一正八品以下候選候補官康熙六十年題凖八品以下應選人員停其投供驗到在籍候選文慿咨發該撫驗看如有出身不正行止不端及年老殘疾之人咨部革退雍正七年議凖冊報到部之考職吏員由部開明令該督撫府尹𫝊齊驗看衰老者休致年力精壯者照限彙冊報部如已驗之人将次用完再行文各省驗看凡正八品以下官均給文咨部即凖候選考職吏員經年久逺多有年力衰邁故必驗看報部方凖銓選十二年議凖書辦入籍順天及在順天等處著役者候選雜職於起送赴選冊結之日即於地方官處呈明祖籍一並開載冊内送部其有掣籤發慿之後始行申報者照例議處乾隆十一年議凖候補正八品以下各官照初選例在籍候補此内有由知縣以上奉㫖降至知縣以下等官未經引見者例得與月官一同引見應仍令赴部投供驗到與在籍各官通較補文日期先後補用其餘各項人員候補之文到部照文到日期注冊扣限五十五日挨補十二年議凖截取吏員凖督撫府尹驗看彙冊送部後續有單咨送部者竢将来截取之日一并歸入驗看彚齊造冊送部十六年議凖考職吏員照例截取驗看其自揣年力衰邁者免其赴驗均令報部給以頂帯注冊嗣後截取驗看統以五年為率一教職候選候補順治十年議凖教職就近選補令在籍候慿仍取地方官印結並親供三代履歴本身年貌報部康熙四十九年議凖候補教職撫臣考試後停其按名具題止令咨部考試等第詳載俸滿保題例雍正二年覆凖候選教職人員遇有丁憂病故者按月報部注冊十二年議凖各省候補教職夲省補文到部不論五十五日單月遇有員闕挨次補授雲南貴州廣東廣西四川福建教職均由各省督撫題補候補之文到部将執照給發該省照例題補雲南等省教職乾隆十九年均改歸部選一文結分投部科不凖臨選駮察康熙五十一年議凖凡赴選官員取具文結分送部科五十七年覆凖候選候補各官文結内均各開明三代履歴年貌籍貫有無過繼字様如有假揑將出結官一并議處六十年題凖赴選文結内小有舛錯取有都統咨文同鄉官印結即凖改正不行駮察如有應行駮察之處限二十日内駮察文結換到亦不再扣五十五日之限至投供驗到各員限十日内察明二十日内注冊其注冊日期亦不再扣五十五日之限其服滿病痊文内有候補候選字様者停其重取文結一文結投部定限康熙四年題凖在京者限十日直𨽻限兩月山東山西河南限三月江南江西浙江湖廣陕西限四月福建四川廣東廣西貴州限五月雲南限六月乾隆十四年奏凖候補候選官員咨文印結投部無故違限半年以上者罰俸六月一年以上者罰俸一年一開闕截限國初定内外官員推升更調告假遷葬省親告假遷葬省親等項乾隆七年定以各衙門咨到之日開闕增設復設等項以奉㫖科鈔到部之日開闕丁憂終養竢稽勲司移付文選司開闕休致吿病解任質審降調革職提問及大計京察甄别處分官員均竢考功司移付文選司開闕斥逐官據督撫咨冊開闕病故官京官由本衙門咨文外官由督撫咨冊或科鈔揭帖先到者即行開闕承襲官爵者由該旗咨送開闕在京領慿及外官奉差到京病故者據該城司坊官申報開闕順治十五年議凖各官員闕科鈔咨文到部送司按日登記呈堂稽考康熙十年題凖每月所出之闕均於二十日為止若截限以後遇有員闕皆歸次月二十八年覆凖凡具題應出之闕十二日以内到者於十七日以内具題作本月之闕十三日以後到者作下月之闕其無庸具題之闕二十日以内到者作本月之闕二十一日以後到者作下月之闕三十九年題凖每月二十日截限之後大選推升急選人員有事故扣除者人闕皆扣即算一班下月不必還補竢再挨到班次方行擬補乾隆四年奏凖升任官員有病痊補行引見者竢奉㫖凖其升補後其原任之闕不論該員病痊月分但察其原升選月分應歸雙月者仍歸雙月銓選應歸單月者仍歸單月銓選十年議凖各衙門遇有保題之闕不拘保奏先後總視保題之本闕出在何月所遺之闕照例歸次月銓選其有遞行保題後出之闕應歸月選者均按原題之闕出在何月應歸單月者仍歸單月應歸雙月者仍歸雙月十五年議凖外任推升官員具題後行文各省督撫即将該員承辦事件察覈給咨赴部或須半年以上方可完結不能依限赴部者豫為咨部奏聞開闕十七年奏凖推升官員不能依限赴部引見該督撫咨文到部應照例奏聞開闕者其開闕限期照議覆科鈔日期辦理一議官掣籖國初定二十日截限二十一二兩日司議二十三日堂議後出序單二十四日過堂同官同日及兼項者掣定二十五日於天安門外封籤公同看掣出差外任及在籍人員堂官代掣臨期無故掣籤不到者付考功司議處一月官考驗順治初年定京官主事以上外官知縣以上及由知縣升任之中書評事博士等官並各部寺司務直隸州州同州判均令考試初制當堂考其身言糊名考其書判分等取選後停其考試一例銓選康熙三十七年諭大選急選官員有年老衰廢者吏部即停其掣籤仍奏明引見欽此五十三年議凖月選官掣籤後會同九卿驗看雍正三年奉㫖嗣後凡有棚民之州縣員闕吏部於月官履歴進呈時一并具奏又覆凖月選各官於繕寫履歴後令其切實條陳十一年奉㫖進士舉人例應銓補知縣該部堂官於銓選時詳加甄别凡年老才庸之人即令改教十二年議凖月官掣籤後將各官名單咨送各衙門㑹同九卿乾隆七年定例増入詹事科道驗看如此内有行止不端出身不正並年老衰病祖父有錢糧虧空者即行舉出又議凖推升官員到部有患病未經驗看者附於每月月選官後補行驗看考試引見十三年十一月諭嗣後月官考試履歴如果伊等於政治確有所見凖其據實條陳或自述其何以居官何以蒞事亦凖其敷納若胸中無欲吐之言止許繕寫履歴其濫用頌聖套語槩行禁止欽此乾隆三年奏凖月選官有年逾六十而所掣之闕在三千里以外者於進呈履歴時一并聲明具奏十七年諭向例月選官員由九卿驗看所以澄銓敘而辨官材典至重也但九卿人衆往往互相觀望不肯實心體察虚應故事屢經𫝊㫖申飭而積習不悛且或有托故不到者如此則審官量材之寄其何賴焉嗣後月選各官應由九卿驗看者該部屆期取九卿職名奏請特㸃驗看如仍蹈故習朕則咎歸㸃出之人欽此又奏凖每月開列九卿名單請㫖欽㸃之時將滿漢掌科掌道職名亦開列請㫖㸃出一二人随九卿於驗看時悉心酌議倘