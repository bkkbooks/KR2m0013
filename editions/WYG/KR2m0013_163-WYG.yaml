各段一綾一未仕者銀各十有二兩内大臣散秩大臣年高者給蟒段一雍正元年定各直省督撫題報年逾百歲之男婦奉㫖加賞銀幣者由庫遵㫖賞給一優䘏内監及執事人役順治初年定宮殿門及陵寢首領内監内監等歲給段布衣㡌有差又定治辦奉先殿祭品厨役等毎四年給與羊裘一領康熙二十八年議準内管領下掌管内外事男婦及各項匠役採蜜壯丁游牧處男婦等歲給布棉羊皮有差又議準贊祀婦長毎人歲給官用段光素段青素段官紗小潞紬綾紡絲杭紬各一贊祀減青素段餘同又議準内監僧道均給與四季衣服又議準歲給守陵首領内監毎名官用青素段紡絲各一毛青布五棉四斤内監毎名彭段杭紬各一毛青布四棉三斤茶膳房婦長毎名官紗二朝鮮貢布二婦人毎名屯絹一朝鮮貢布一皆據掌儀司開明人數由段庫委庫使二人移付都虞司委領催一人驍騎四人送徃分給又定歲給内廷各處坐更内監毎人布面羊裘一或折麤布一棉花八兩狐皮領一據宮殿監來文給發三殿文華殿新進坐更内監應給狐皮㡌狐皮領據營造司來文給發奉先殿茶膳房新進内監應給羊裘狐皮領據掌儀司來文給發雍正三年奏準圓明園内承應水手毎名春夏給單布衣一襲秋冬給棉布衣一襲毎五年各給羊裘一狐皮㡌領各一一匠作銀作司成造金銀器皿首飾裝飾數珠小刀皮作司洗刷皮張成造各鐙及寶蓋流蘇瓔珞之屬銅作司鑄造銅鍚器皿及成造樂器染作司染洗綾紬布疋絲絨棉線氆氌及鍊絹彈粗細棉花衣作司成造衣服縫合皮毛繡作司刺繡花作司成造各色綾紬紙絹通草供花及燕花缾花各作見設各項匠人一千二百有六名内召募民匠二十一名康熙二十五年奏準匠役有特等精巧者給食銀二兩次等精巧者一兩五錢雍正六年議準凡成造物件食糧匠役如不敷用許雇民匠幫工自二月初至九月杪為長工日給制錢一百五十四文自十月初至正月杪為短工日給制錢一百三十四文乾隆五年議準匠役闕六庫郎中同該庫官遴選充補一年者為學手二年為半工三年為整工如三年後不能造作即革除有特等精巧者奏明加増錢糧欽定大清㑹典則例卷一百五十九
