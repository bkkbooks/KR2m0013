body:
  text: 吏部考功淸吏司邊禁一邊禁康熙十二年題準外國之人私自進口該管地方官不行察報者降一級調用該管上司罰俸一年十四年議準土官地方失事止限年緝拏限滿不獲降一級畱任如斬絞重犯脫逃亦限年緝拏限滿不獲應降一級二級三級調用者止降一級畱任應降四級五級調用者止降二級畱任應革職者止降四級畱任如遇貪酷不法等罪所犯重大仍行革職如諱盜因公罣誤例應革職等罪者皆免革職亦降四級畱任二十一年議準土司地方將逃人失察一名或被别土司拏觧或逃出之人供在某土司處將該土司降一級若在伊該地方明知故行隱諱不行出首者照隱匿逃人例革職二十二年議準滇黔土司無論逃人逃兵有拏解六十名者準加一級如多獲者亦照此數遞加不及加級者令該督撫酌量奬賞三十年題準土官凡有欽部案件奏銷錢糧及遲誤表箋等項皆應照處分流官定例一例處分但土官不食俸祿如有罰俸降俸等事皆照其品級計俸罰米每俸銀一兩罰米一石移貯就近常平倉以備賑荒四十二年題準湖廣鎭筸紅苖旣設同知通判分界管理苗務其五寨司土官土民應聽該廳管轄遇有逃盜等事照例將土官一幷處分四十三年題準紅苗歸誠納糧特設土官管轄除苗人有犯輕罪者仍聽土官自行發落外若有犯殺死人命强盜擄掠人口搶奪財物及捉拏人口索銀勒贖等情責令土官將犯罪之苗拏解道廳治罪如土官將犯罪之人藏匿不卽行解送者革職又題準紅苗捉人勒銀取贖者令土官将犯罪之苖解送道廳衙門審理治罪外其該管土官雖不知情但平日不嚴行約束有一起者將土知府知州罰俸三月有二起者罰俸半年有三起者罰俸一年若該管官知情不行禁止者皆革職不準折贖責四十板若繫敎令或通同取利者革職不準折贖枷示三月又題準黔楚相接之苗每因小忿動輙撡戈殺擄彼此拏人其該管土官雖不知情但平日不嚴行約束以致彼此互相搆釁聚衆不及五十人者將土知府知州罰俸三月至五十人者罰俸半年至百人者罰俸一年百人以上者革職若繫知情不行禁止者革職不準折贖枷示一月責四十板若繫敎令或通同商謀希圗均分財物者皆照首犯一例治罪四十七年覆準民人擅入苗地民苗結親往來該管各官失於覺察者降一級調用該管上司罰俸一年又議準各省地方遇有民苗爭訟事件該督撫嚴飭該管各官作速察審完結如地界兩省或有關提之人或有會勘之處兩省大吏務須和衷辦理不得互相推諉如不肖有司託故稽遲巧爲推卸者該督撫指名題叅照例分别議處若該督撫任其遲延推卸不行題叅亦照例議處雍正二年諭四川陜西湖廣廣東廣西雲南貴州督撫提鎭朕聞各處土司鮮知法紀所屬土民每年科派較之有司徵收正課不啻倍蓰甚至取其馬牛奪其子女生殺任性土民受其魚肉敢怒而不敢言莫非朕之赤子天下共享樂利而土民獨使向隅朕心深為不忍然土司之敢於恣肆者大率皆漢姦爲之指使或緣事犯法避罪藏身或積惡生姦倚勢横行此輩粗知文義爲之主文辦事敎之爲非無所不至誠可痛恨嗣後督撫提鎭宜嚴飭所屬土官愛惜土民毋得視爲魚肉毋得濫行科派如申飭之後不改前非一有事犯土司叅革從重究擬漢姦立置重典切勿姑容寛縱以副朕子惠元元遐邇一體之至意欽此三年覆準凡土官病故限六月内具題承襲其該督撫未經具題之先亦卽令應襲之人照署事官例用印管事地方官如有抑勒沉閣畱難者將該管上司皆照違限例議處其支庻子弟中有馴謹能辦事者許本土官詳報督撫具題請旨酌量給與職銜令其分管地方事務其所授職銜視本土官降二等如夲土官繫知府則所分者給與通判銜繫通判則所分者給與縣丞銜照土官承襲之例一例頒給勅印號紙其所分管地方視本土官多不過三分之一少則五分之一此後再有子孫可分者亦再許其詳報督撫具題請旨照例分管地方再降一等給與職銜印信號紙四年遵旨議定熟苖熟獞皆一例編排保甲不許容畱面生可疑之人地方官有不實力奉行不能稽察盜賊或别經發覺將專管州縣官降二級調用兼轄官繫同城降一級調用不同城降一級畱任統轄官降一級照舊辦事如上司揭報題叅者免議至巖疆交界地方兩地文武互相稽察使匪類不能潛聚毋得彼此推諉倘保甲鄕勇人等有疎縱姦徒怠玩巡緝及互相隱匿等弊地方官未經察出該督撫題叅照例議處七年議準無土官管轄之生苖爲盗地方各官照野賊苗蠻之例議處野賊苗蠻例載中樞政考其有土官管轄之熟苖爲盜刦殺擄掠男女財物該土司明知故縱者革職養盜殃民者革職提問如實繫失察致苖蠻侵犯城池及聚一二百人或六七十人城内爲盜村莊道路行刦此等大夥盜賊將該管土官亦革職該地方官不實力緝拏互相隱諱將該地方官並該管各上司照民人爲大夥盜賊例議處大夥盜賊例載中樞政考其苗蠻聚集人數無多平常盜案責該土官限一年緝拏限滿不獲降一級畱任竢獲盜之日開復該地方官初叅停升限一年緝拏限滿不獲罰俸一年照案緝拏至鄰近苖蠻地方民人被盜未經獲賊之先將該管各官停升竢獲盜之日訊明來去踪跡如盜起自内地以文職爲專管官降二級調用以武職爲兼管官同城者降一級調用不同城者降一級畱任統轄官降一級照舊管事上司官已經報明叅奏免其議處若盜自外來武職照專管官治罪文職照兼管官治罪其土官中有能嚴行鈐束擒勦賊盜一應案件於一年内全結者該督撫具奏加一級一年完結過半該督撫酌量奬賞又議準凡姦民出入苗地把守軍兵失於覺察及知而故縱皆照律治罪外其商賈人等已經驗明如兵役藉端抑勒索詐者兵役治罪該地方各官一幷題叅照失察衙役犯贓例議處又議準私通土苗及容畱外省流棍者失察各官照民人擅入苖地例議處又議準辦理土苖事件除不關緊要者照常行文外其緊要事務有應行申報之處及各上司有應行批飭之事均由内署寫就鈐印釘封飭發仍於各内署按年月日期造具印册密行掛號存案其文武平行衙門緊要文移亦照此例均不得經書吏之手如仍令書吏鈔寫以致洩漏事發之日將夲官照洩漏密封例分别議處又議準凡土苖夷猓有犯命盜搶奪爭訟等案如該犯住居土官所轄地方該土官經州縣移會徇庇不行拏解該州縣卽揭報督撫題叅將該土官革職擇伊子弟之賢者承襲如果案犯在逃照内地承緝之例六月限滿不獲將該土官承緝不力職名咨叅限一年緝拏限滿無獲將該土官降一級畱任竢緝獲本案兇苗或能拏獲别案兇苗準其開復若應議降級畱任計至五案將該管土司革職擇伊子弟之賢者承襲如該犯居隔省隔邑均以文到之日爲始限四月務行拏解限滿不解如繫庇匿卽將庇匿之員指名題叅照徇庇例議處若果繫犯逃無獲照承緝兇犯例六月限滿初叅住俸勒限一年緝拏年限滿日復叅降一級畱任計至五案亦行革職又議準土苗夷猓命盜等案無論案之大小皆照内地所定事件限期審結承審案件以獲犯到官之日爲始盜案限十月命案竊案限六月雜案限四月限滿不結照例咨叅接扣限期完結如仍不審結該督撫題叅照易結不結例議處至苖夷有犯軍流徒罪折枷責之案仍從外結卽鈔招咨送刑部察覈其罪應論死並情關重大者一槩不準外結亦不準牛馬銀抵償務按律定擬題結如有不肖之員或隱匿不報或改揑情節在外完結者事發之日將該員照溺職例革職其失察之該管各官一幷議處八年覆準改土歸流之土司家口應令各該督撫據實確覈其妻妾子女與應遷之父母兄弟照例遷徙外如該犯止有妻妾並子嗣及子嗣幼小又無應遷之父母兄弟卽將伊妻妾幼子免其遷徙安插於本省省城令地方官稽察管束勿許生事至犯軍流罪改土歸流之土司家口無論有子無子照例隨同本犯遷徙外如夲犯未遷之先身故及子嗣幼小者亦將伊妻妾幼子免其遷徙安插省城令地方官稽察管束勿許生事該督撫卽將應行遷徙與應畱本省情由於疏内聲明取具地方官印甘各結報部察覈如該地方官有揑報並無子嗣及子嗣幼小别無應遷之父母兄弟等弊將揑報之該管地方官照軍流人犯無年老父母稱有有以次成丁稱無之例降二級調用轉詳之上司罰俸一年具題之督撫罰俸六月又議準土司並家口遷於遠近省安插者飭令該地方官不時稽察毋許生事擾民出境如疎縱土司本犯將該地方官照軍流罪犯取保脫逃例議處如疎縱土司家口照疎脫遞囘原籍人犯例議處又覆準凡兇手盜首逃匿土司地方不拘本省鄰省該土司能解拏五名以上者紀錄一次十名至十四名紀錄二次十五名者加職一級三十名者加職二級如一年不敷議敘之數準幷次年接算議敘不準三年合算又覆準土司隱匿兇犯逃人不行拏解竢獲犯之日訊明如繫土司受賄將土司革職提問不準親子承襲擇本支伯叔兄弟子姪取具宗圖並夷衆信服印甘各結題請承襲如繫隱匿不報革職審無受賄情弊仍照定例承襲十二年議準新定苗疆地方塘汛兵丁擅役苗民需索强買等情及各衙門差役經由苗寨擅動苗夫科斂索詐該管文貟如有故縱者革職提問不行察出之該管知府降二級調用兼轄之司道降二級畱任督撫降一級畱任如兵役滋事擾累事發不行申報復希圖掩飾曲爲徇隱者將該員革職不行察出之該管知府降一級調用兼轄之司道降一級畱任督撫罰俸一年如並不知情止於失察者將該員降一級調用不行察出之該管知府降一級畱任兼轄之司道罰俸一年督撫罰俸六月十三年覆準土司省分其土官土人如有差委公務並緝拏逃盜等事應遠赴外省者許呈明該管官轉報本省督撫請領咨文牌照知會所往省分外省督撫於伊事竣日計程勒限毋許逗遛仍給與咨文執照知會本省督撫倘土官土人不請咨文執照私赴外省者將土官革職土人治罪不行管束之夲省該管文武各官降一級調用失於察報之外省地方官罰俸一年如土官土人有潛往外省生事爲匪别經發覺者土官革職土人治罪不行管束之該管文武各官降二級調用失於察報之外省地方官降一級調用又覆準貴州雲南四川等省棍徒勾串頑苗綑掠人口輾轉販賣令地方文武巡緝各官年終分别勸懲如一年之内有能拏獲興販棍徒並頑苗十五名者紀錄一次拏獲三十名者紀錄二次拏獲四十五十名者紀錄三次拏獲六十名者加一級再有多獲者照數遞加紀錄至一百二十名者加二級若拏獲一百二十名以上者以應升之官卽用若一年之内不能拏獲爲别處拏獲者每五名罰俸一年十名罰俸二年十五名者降一級調用二十名者降二級調用滿五十名者革職該管土司無降級之例滿三十名者革職其所獲興販棍徒頑苖必將被掠人口一幷拏獲審實定擬報部方準照數紀奬如有以少報多者將原報官照謊奏請功例革職若該督撫及該司道等容其朦溷者照謊奏請功具題官例降二級畱任如有買囑誣報妄拏良民陷害者照誣良爲盜例分别議處乾隆二年議準臺灣地方如有民人不法等事許令武弁移送地方官究治如兵丁生事滋擾亦許文員關會營伍責懲如有彼此推諉者照推諉例罰俸一年並飭各該地方汛防員弁實力奉行彼此按月稽察取具並無兵丁滋擾印結轉報該上司察覈如或有意徇縱將該地方官照徇庇例議處又議準臺灣漢民不得擅娶番婦違者土官通事照民苖結親媒人減一等例各杖九十地方官照失察苖民結親例降一級調用三年議準黔省苖民買賣子女謀媒用印地方官於契上鈐印時不實加詳察確實將苖民男婦濫行用印賣與川販者照外番私自進口地方官不行察報例降一級調用如來歴分明胥役家人於驗契用印時故意抑勒藉端需索許買主賣主當官禀明將胥役家人計贓治罪官繫失察照失察家人衙役犯贓例分别議處如繫故縱照縱役貪贓例革職至印買苖口後有帶囘原籍别地方者令其報明地方官給與路照塡注男女姓名年貎關汛員弁驗明契照放行如有兵役無故畱難勒索財物者許其禀明按律究治倘並無用印契照冒稱良民所買苖口賄通關汛縱放出境者一經發覺兵役計贓定罪該管員弁亦按失察故縱受財各條分别議處又覆準黔省古州都江八寨丹江台拱清江各廳員所用通事務宜愼選承充止許奉差傳譯苗語不得私至苖寨需索擾累一應苖民事件許令赴該廳員衙門訴告該通事如有把持朦溷等弊立卽嚴拏責革究治仍令古州道不時畱心訪察倘該通事有需索擾累情弊該廳員失於覺察比照新定苗地失察兵役滋事擾累例降一級調用如有意徇縱不行究治者將該廳員比照兵役滋事擾累良苗該管官曲爲徇隱例革職五年覆準歸化城䝉古命盜等案人犯繫民人由同知協理筆帖式申報都統委蒙古官承緝至事主屍親報呈内不開兇盜是蒙古是民人者蒙古官雖無疎防之例亦應與同知筆帖式分塗緝獲勒限察叅竢拏獲兇盜後審明是蒙古將不應叅之該協理筆帖式等原叅議處各案悉行銷案開復如審明兇賊繫民人將不應叅之蒙古官記過之案注銷罰過之牲給還倘有以蒙古報民以民報蒙古者一經察出題叅將申報之協理筆帖式照諱盜諱命例革職轉報之同知等皆照諱盜諱命上司例分别議處蒙古官亦照内地諱盜諱命之例革職其大朔二府衛所管轄地方與西四旗雜處該管文員衛弁照例分别責成辦理至西四旗游牧總管所部蒙古有犯命案者察叅到日皆照八旗滿洲官兵閒散互毆至死例將專管之佐領驍騎校照八旗佐領驍騎校議處兼轄之叅領照八旗叅領議處總管副管照八旗都統副都統議處其太僕寺馬羣官員所部蒙古如犯命盜案件察叅到日專管之協領兼管之翼長統轄之總管等官亦照此例分别議處再各協理筆帖式所轄地方如有强劫及搶奪傷人行竊拒捕蒙古民人交渉案件經事主告報到官該筆帖式卽移會蒙古官員訊供如事主向蒙古官告報該蒙古官亦卽呈明都統會同該筆帖式訊供各通報各該上司分别勒限協緝仍分别盜犯是蒙古是民人繫民人將同知筆帖式等題叅疎防照盜案勒限緝拏逾限不獲將筆帖式照承緝官例該同知照督緝官例按限議處如繫該同知自行承辦事件仍照承辦官例議處繫蒙古其承辦之蒙古官員交理藩院議處其餘搶竊並未拒捕傷人各案亦令各行逐案通報其承緝之筆帖式將已未緝獲各案㑹報巡撫等衙門分别飭記功過蒙古官員仍照例按限叅處倘應報之案該筆帖式與蒙古官隱匿不報或諱盜爲竊減重作輕者察出將承辦官員題叅該協理筆帖式照諱盜例革職該管上司亦照諱盜上司例議處蒙古官亦照内地諱盜例革職其餘搶竊細事如不據實申報者將協理筆帖式等罰俸九月再歸化城蒙古民人交渉命案應令就近各協理筆帖式會同該管蒙古官星馳往驗不必更由同知申報都統簡委以致遲誤其各扎薩克等處部落亦令就近各協理筆帖式馳赴該地方㑹同該管官相驗至會審夷漢事件究出實情之後民人照内地律例治罪蒙古照蒙古例治罪如蒙古例内並無正條者呈明都統援引刑部律例治罪如各該員擬罪不當蒙古則由都統覈正民人則由同知覈正務使定擬罪名歸於平允倘有彼此存私偏執己見該上司訪聞卽行題叅其會審限期該都統已經委員該員務於五日内起程赴協理筆帖式衙門會審卽將會審日期報明該管上司存案仍照定例命案扣限六月盜案扣限十月其欽部事件及一切限期均照内地所定限期辦理如任意遲延分别按限察叅倘有瞻徇推諉以致案懸不結者卽照易結不結例叅處至歸化城蒙古刼殺搶竊應該都統等自行審理之案皆以人犯到官之日爲始照内地欽部事件例定限四月審結咨送理藩院覈擬具題逾限不結將承審遲延各官據實指叅其有會同别旗及各扎薩克官員審理者道里相隔逺近不等應仍照内地例盜案統限十月人命搶竊統限六月完結十九年覆準臺灣地方逼近生番雖設立界址嚴密巡察而突行戕殺之事仍所時有向來該督撫等將該管文武員弁開叅疎防均照民苖出入例議以降一級調用但内地命盜案件均有承緝年限限滿不獲始行降調至生番殺人之案一經指叅卽罹降調誠恐承緝之員明知降調在邇不上緊設法緝拏其或畏避處分諱匿不報應照内地命盜承緝之例嗣後生番殺人之案皆扣限六月察叅將地方文武各官議降一級畱任勒限一年緝拏限内拏獲準其開復不獲卽照所降之級調用海防一海防康熙十一年題準凡官員兵民私自出海貿易及遷移海島蓋房居住耕種田地者皆拏問治罪該管州縣知情同謀故縱者革職治罪如不知情革職永不敘用該管府道各降三級調用總督統轄文武降二級畱任巡撫不管兵馬降一級畱任文武官員有能拏獲本汛出界姦民者免罪拏獲别汛出界姦民十名以上者紀錄一次百名以上者加一級總督巡撫統轄全省道府管轄數州縣該管地方文武官員拏獲或被兵民拏獲者總督巡撫道府皆免議至道府所屬之人出界如被上司拏獲或非本汛繫别處拏獲者仍照定例處分督撫亦照此例如將違禁出海貿易之人不行舉首反以外海作爲内地或爲隱匿或擅給印票往來偵探通商漂海皆革職提問其轉詳並未經察出之道府各降三級調用總督降二級畱任巡撫降一級畱任其出界曬鹽者亦照出界例處分又題準海賊殺刼村莊民人地方文職州縣官與同城知府等官各罰俸一年該管同城道官罰俸六月照案緝拏十二年題準在洋行走之船經過地方各官並買貨物之地方各官知船經過縱其行走者革職不知者免議又議準官員奉遷沿海居民將不應遷之民妄遷應遷之民不遷者革職如未遷民之先不報上司或安插遷民稱地窄田稀無可撥給者各罰俸一年十五年議準姦商於逆賊接壤處所將硫黃熖硝等物販賣與賊不論官兵民人皆拏問治罪妻子家口入官該管官知情故縱者以同謀論亦拏問治罪其不知情者州縣官革職提問府道各降五級調用總督廵撫降三級畱任將鹽布等物販賣與賊者販賣之人及知情故縱之該管官皆照販賣硝黄例治罪其不知情者州縣官革職府道各降三級調用總督巡撫降一級畱任若將由夲汛販賣之人盤獲其該管文武各官皆免罪拏獲之官議敘十名以上者紀錄一次二十名以上紀錄二次三十名以上紀錄三次四十名以上紀錄四次五十名以上加一級百名以上者加二級若不繫本汛地方於别汛盤獲販賣之人十名以下者紀錄一次十名以上者加一級二十名以上加二級三十名以上加三級四十名以上加四級五十名以上者不論俸滿先行升用百名以上者越升一級卽用至於盤獲一人審時供出夥黨繫由捉獲犯人審出該管官免治罪倘若誣拏良民將誣拏之人照律反坐又議準違禁將熖硝硫黃軍器等物私載在船出洋貿易者仍照例處分防守地方該管官員通同知情縱放者亦照律治罪如不知情者專汛官革職兼轄官降四級調用統轄官降二級畱任督撫降一級畱任二十三年題準山東江南浙江廣東各海口除夾帶違禁貨物仍照例治罪外商民人等有欲出洋貿易者呈明地方官登記姓名取具保結給發執照將船身烙號刋名令守口官弁察驗準其出入貿易三十三年議準内地商人往外國貿易原坐去船損壊更換船來者到關時禀明地方官並海關監督驗㸔相符準其進關如坐去船不曾損壞竟造船帶來或暗帶外國之人偷買違禁之物者海關監督並防守海口地方官不行察出皆降一級調用四十二年覆準出洋漁船止許用單桅樑頭不得過一丈舵水人等不得過二十名取魚不得越出夲省境界未造船時先行具呈州縣該州縣詢供確實取具澳甲戸族里長鄰右當堂畫押保結方許成造造完報縣驗明印烙字號姓名然後給照其照内仍將船户舵水年貎籍貫開列以便汛口地方官弁察驗如有違例將給照之州縣降二級調用加級紀錄不準抵銷船户舵水人等如有越數多帶或詭名頂替者汛口文武官員盤察不實亦降二級調用内有夾帶熖硝硫黄釘鐵樟板等物接濟姦匪者其取結之州縣官汛口盤察之文武官弁皆革職如繫賣放者革職杖一百流二千里其内港取魚五六人之小船不在此例又覆準商賈船許用雙桅其樑頭不得過一丈八尺舵水人等不得過二十八名其一丈六七尺樑頭者不得過二十四名一丈四五尺樑頭者不得過十六名一丈二三尺樑頭者不得過十四名於未造船時亦具呈該州縣取供嚴察確繫殷實良民親身出洋船户取具澳甲里族各長並鄰右當堂畫押保結然後準其成造造完該州縣親驗烙號刋名然後給照照内將在船之人詳開年貌履歴籍貫以備汛口察驗其有樑頭過限並多帶人數詭名頂替以及汛口盤察不實賣放者罪名處分皆照漁船加一等惟夾帶違禁接濟物件其罪名處分與漁船一例其有謀利之富民自造商船租與他人及寒薄無賴之人租船者失察之州縣官罰俸一年明知造船受租而容其造者降二級調用又如隔縣别府外省之人欲造船者必於各該本縣呈明察實該縣具印結申詳督撫轉飭沿海造船之地方州縣成造仍照例察驗舵水槓椇刋烙號數姓名其違犯之罪名處分皆照商漁船一例遵行如有不遵例報官私自偷造者失察之州縣汛口各官降一級調用五十一年覆準内地往臺灣之人該縣給發照單如地方官濫給往臺灣照單經該督撫題叅一次者罰俸六月二次者罰俸一年三次者降一級畱任四次者降一級調用如有良民情願入臺籍居住者令臺灣府縣察明出具印文移付内地府縣知照該縣申報海道稽察仍令報明該督撫存案若臺灣府㕔縣官不行察明以致姦宄叢雜居住經該督撫察出題叅照隱諱例議處又議準姦匪船隻出入海口若遇失事將守口官罰俸一年至盜從外洋竊發原非守口官所能越汛稽察遇有失事發覺咎在分巡委巡將守口官免議至外洋行刼之後散黨登岸溷冒入口守口官失於覺察者仍照定例罰俸一年其有盜由海口以内奪船偷越出洋遇有失事發覺卽將失察守口各官皆照海洋失事初叅例降一級畱任本案内如有逸盜勒限一年緝拏全獲準其開復限滿不獲照所降之級調用若本案已無逸盜定以三年有能拏獲别汛姦船以及本汛並無失事者皆令該督撫察明具題到日亦一例準其開復五十三年覆準漁船出洋不許裝載米酒進口亦不許裝載貨物違者嚴加治罪其守口各官不行盤察者照失察姦船出入海口例罰俸一年五十五年覆準凡内洋失事專兼各官仍照内地盜案定例處分若果繫外洋被刼難定專汛兼轄應將文職免其處分倘繫内洋失事揑稱外洋後被事主告發或察出之日將專兼各官皆照諱盜例處分既經事主告發該管督撫若不察明據實掲報題叅者照徇庇例議處五十九年覆準沿海各省出洋商船礮械軍器槩行禁止攜帶如地方官不嚴察禁止致商船仍行私帶者照失察鳥槍例罰俸一年雍正五年覆準山東民人往奉天貿易及奉天民人有過海者凡船出口入口該州縣給與印票將客人姓名貨物及賣貨地方同船戸水手姓名開載票内守口官驗明掛號放行其往奉天傭工人等該州縣察明姓名年貌籍貫給與印票方許航海竢到卸船地方守口官驗對印票年貌相符者準其入口囘時該地方官於原領票内鈐印令其帶囘本地方察覈如貿易傭工人等並無印票或與票内年貌未符及兵役人等刁難勒索者守口官自行察出者免議如有疎縱等情降二級調用七年議準每年沿海各汛出巡之後督撫不時密加體訪倘遇洋面失事文武官弁如有恐嚇賄囑不行通報情弊該督撫訪實題叅照諱盜例議處又議準拏獲偷渡過臺人犯問明從何處開船將失察水汛及本地文武各官照失察姦船出入海口例罰俸一年如文武衙門隱匿不報者或被告發或被上司察叅將該管之兼專文武各官皆照諱盜例分别議處八年覆準如有將黃金販賣出洋者照鐵貨銅錢等物私出外境下海律治罪其督關守口官弁受賄故縱者與犯人同罪失於覺察者照律叅處若官弁兵役藉端畱難抑勒商民者察叅議處分别治罪九年諭據廣東布政使奏稱鐵器一項所關綦重不許出境貨賣律有明禁乃粤東地方出産鐵鍋凡洋船貨買向未禁止臣到任後檢察案册見雍正七八九年造報夷船出口册内每船所買鐵鍋少者自一百連至二三百連不等多者買至五百連並有至千連者按鐵鍋一連大者二箇小者四五六箇每連約重二十斤不等百連約重二千餘斤如一船帶至五百連約重萬斤帶至千連約重二萬斤計算每年出洋之鐵為數甚多誠有關繫請嗣後此項鐵鍋應照廢鐵之例一例嚴禁毋論漢夷船槩不許貨賣出洋違者該商船户人等卽照綑載廢鐵出洋之例治罪官役通同徇縱亦照徇縱廢鐵例議處凡遇洋船出口仍交與海關監督一例稽察至於商船每日煮食之鍋仍照舊置用官役不得藉端勒索滋擾如此則外洋之鐵不致日積日多於防姦杜弊之道似有裨益至煮食器具銅鍋沙鍋皆屬可用非必盡需鐵鍋亦無不便外夷之處於朝廷柔懷遠人之徳意原無違碍等語尺鐵不許出洋例有明禁而廣東夷船每年收買鐵鍋甚多則與出洋之功令不符矣所奏甚是嗣後稽察禁止及官員處分商人船戸治罪之處悉照所請行倘地方官弁視爲具文奉行不力經朕訪聞或别經發覺定行從重議處粤東旣行察禁則他省洋船出口之處亦當一體遵行著該部通行曉諭永著爲例欽此十二年覆準商人置貨販洋由本籍地方取結給照其中小本商民請照而往迨從外番貿易囘至内地復欲奔囘夲籍請照程塗稍逺勢所不及又有已在夲籍請照到廈其報配之船業至滿載欲搭别船因照違碍廢時守候於小商多有不便飭令廈防㕔察明此等情節卽取具行户船主保結準其赴㕔請給印照前往該㕔將給照原由一面行知該地方官其請照各商仍俟囘棹之日赴㕔銷單如該㕔有朦溷給照令該督撫嚴察題叅將該㕔照盤察商船不實給照例降三級調用如該㕔胥役有勒索等弊亦令該督撫分别知情失察題叅將該㕔照衙役犯贓例分别議處其該船舵水貨客囘棹之日或有在番地因賑目不清及别項事故者仍照例取具同鄕鄰船客商水手等甘結報明廈防㕔移文該地方官存案下期囘日報銷又覆準海洋重地非内地可比該汛地方文武官弁拏獲偷渡外番十名以上者專管官紀錄一次兼轄官毋庸議敘二十名以上者專管官準其紀錄二次兼轄官準其紀錄一次三十名以上者專管官準其加一級兼轄官準其紀錄二次四十名以上者專管官準其加二級兼轄官準其紀錄三次五十名以上者專管官準其以應升之官卽用兼轄官準其加一級倘不實力稽察以致疎縱十名以上者專管官罰俸一年兼轄官免議二十名以上者專管官降一級畱任兼轄官罰俸六月三十名以上者專管官降二級畱任兼轄官罰俸一年四十名以上者專管官降三級畱任兼轄官降一級畱任五十名以上者專管官降一級調用兼轄官降二級畱任至官弁兵役如有隱徇賄縱該督撫分别嚴叅治罪其各官弁有降級畱任之案倘能别案拏獲按其拏獲名數抵銷如三年内並無過犯稽察嚴宻本汛内果能肅清令該督撫提鎭察明保題準其開復若有偷渡人犯希冀開復揑飾諱隱一經發覺題叅交部議處該督撫提鎭不行詳察溷行保題者亦交部議處十三年覆準東省豆船並無印票裝運出口及有匿票私賣與原票不符一經察出根究明確販豆人等按律分别治罪該管官不行詳察致有偷漏私越情弊别經發覺照失察姦船出入海口例罰俸一年仍令該督撫不時稽察如有藉稱給票驗票名色勒索畱難苦累商民等情卽行指名叅處乾隆元年覆準各處汛口官嚴詰販米出海如有地棍姦牙將米穀偷運出口及在洋接濟姦匪者該管文武各官除通同受賄知情故縱仍照違禁貨物出口律治罪外如或巡察懈弛及偷越各處汛口後經别汛拏獲審明失察偷運米百石以上穀二百石以上者將各該官弁皆降一級畱任米百石以下穀二百石以下罰俸一年米不及十石穀不及二十石者罰俸六月又議準船戶貪圖獲利在沿海地方私攬無照之人裝載偷渡過臺該地方文武官弁失於覺察者照失察姦船出入海口例議處如有意隱匿不報照諱盜例議處二年議準過臺商船舵水人等令原籍州縣官將各該舵水年貌鄉貫塡明照中或因有事别雇就地給單塡注取具船戶行保甘結汛口各官驗明放行臺地各官仿照内地設立十家牌塡注實在籍貫人口確數並作何生理遇有事故一例開除每月出具並無招攬游民結狀報明所司察覈如有違碍一經發覺將出結船戶人等照例治罪不行實力稽察之地方各官該督撫察明叅送到日照失察偷渡例分别議處五年覆準沿海關汛所有文武官弁巡察掛號之處嚴行飭禁不許藉端需索故意畱難如有此等情弊卽行察叅將守口官弁照衙役犯贓例分别議處如守口官弁藉端畱難抑勒苦累商民别經發覺將守口官弁照藉端抑勒例降二級調用該督撫提鎭失於覺察罰俸一年十三年覆準雜糧麥豆偷運出洋接濟姦匪者其文武官弁失察故縱處分皆照偷運米穀出洋定例處分十四年覆準商民出洋貨物一應銅器廢銅皆嚴行禁止不許攜帶各洋貨賣如將紅銅黄銅私販各洋貨賣其關汛文武官弁不行捜檢察拏知情故縱者皆照出洋漁船夾帶硝黄釘鐵等物汛口之文武官弁革職例革職如繫賣放者照例革職治罪若止於失察者降一級調用十九年覆準各省商漁船在洋除實繫搶奪並未刼盜者仍照搶奪辦理外如有盜刼之案溷以搶奪具報希圖規避處分者將揑報之文武各官照諱盜爲竊例革職欽定大清㑹典則例卷二十四
