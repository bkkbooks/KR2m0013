body:
  text: 兵部武選清吏司官制一領侍衛府官制原定領侍衛内大臣六人内大臣六人一等侍衛六十人二等侍衞百五十人三等侍衞二百七十人藍翎侍衞九十人散秩大臣奉㫖補授無定員康熙三十七年設宗室侍衞無定員又定以武進士之騎射優長人材强壯者擢授為侍衞分於三旗隨班行走無定員雍正三年奉㫖藍翎侍衞内選材技優長者為四等侍衞七年議準宗室侍衞共設九十人并入三旗隨班行走此内一等侍衞九人二等侍衞十有八人其餘均為三等侍衞一鑾儀衞官制順治年間定掌衞事内大臣一人鑾儀使滿二人漢二人冠軍使滿七人漢軍三人雲麾使滿二十人漢軍八人治儀正滿二十人漢軍二十二人整儀衞滿十有三人漢軍十有六人康熙三十年裁漢鑾儀使一人一驍騎營官制順治年間定都統滿洲䝉古漢軍八旗各一人副都統旗各二人驍騎叅領滿洲漢軍旗各五人蒙古旗各二人佐領按壯丁多寡隨時編設無定員驍騎校每佐領下一人親軍校滿洲蒙古上三旗四十五人屬領侍衞内大臣管轄下五旗無定員屬本王公府管轄雍正元年設副驍騎叅領滿洲漢軍旗各五人蒙古旗各二人八年議準漢軍上三旗每旗各均為四十佐領下五旗每旗各均為三十佐領除八旗原有二百六十五佐領及二半箇佐領外増設佐領三人並増足二半箇佐領為兩佐領共定為二百七十佐領再下五旗漢軍佐領除親王郡王所屬照舊分屬外其貝勒貝子公等既有府屬佐領則所屬之漢軍佐領悉歸入各旗作為公中佐領滿洲蒙古佐領以見編設之數計之鑲黄旗滿洲八十五人蒙古二十八人正黄旗滿洲九十三人蒙古二十四人正白旗滿洲八十六人蒙古二十九人正紅旗滿洲七十四人蒙古二十二人鑲白旗滿洲八十四人蒙古二十四人鑲紅旗滿洲八十六人蒙古二十二人正藍旗滿洲八十三人蒙古三十人鑲藍旗滿洲八十七人蒙古二十五人一前鋒營官制順治初年定前鋒統領左右翼各一人八旗前鋒叅領旗各二人前鋒侍衞旗各二人前鋒校旗各十有二人均滿洲蒙古兼用乾隆十七年奏準設前鋒校委署前鋒叅領旗各一人給與五品頂帶仍食前鋒校月餉一䕶軍營官制順治年間定八旗䕶軍統領旗各一人䕶軍叅領滿洲旗各十人蒙古四人䕶軍校每佐領下一人雍正元年設副䕶軍叅領旗各十有四人乾隆十七年奏準設䕶軍校委署䕶軍叅領旗各七人給與五品頂帶仍食䕶軍校月餉一步軍營官制順治年間定提督九門步軍統領一人步軍總尉二人八旗副尉二十四人步軍校三百三十六人内九門每門城門尉城門校漢軍門千總各二人外七門每門城門尉城門校各一人漢軍門千總各二人康熙三十年步軍統領兼管巡捕三營三十四年步軍營設委署步軍校八旗滿洲各五人蒙古漢軍各二人捕盜步軍校四十人即於步軍校内遴選委用乾隆十九年改步軍總尉為步軍翼尉副尉為協尉叅尉為副尉城門尉為城門領城門校為城門吏一火器營官制康熙三十年建設火器營特簡大臣總理雍正年間定為六人間以王公總理設八旗鳥槍䕶軍叅領十有六人驍騎叅領滿洲旗各二人蒙古旗各一人管礮散秩官九十六人䕶軍校一百十有六人驍騎校五十二人均以八旗滿洲蒙古官兼任雍正三年奏準火器營鳥槍䕶軍叅領作為専設之官餘仍以滿洲䝉古兼任一圓明園官制雍正二年八旗設營總八人副䕶軍叅領十有六人署副叅領三十二人䕶軍校八十人以王公大臣二三人統轄之七年設副䕶軍校七十二人十年設䕶軍叅領八人増設䕶軍校三十二人副䕶軍校四十人乾隆十二年増設䕶軍校副䕶軍校各十有六人一健鋭營官制乾隆十四年議準演習雲梯兵别立一營分為兩翼每翼設翼領一人八旗設前鋒叅領副前鋒叅領各一人前鋒校各五人一白塔信礮官制順治十年白塔礮臺設信礮官左右翼各二人雍正二年白塔信礮改設總管一人司信礮官八旗各一人乾隆八年奏準白塔信礮官令步軍統領管轄一南苑官制康熙二十四年奏準南苑舊有五門今増四門合為九門大紅門設四品總尉一人餘八門設五品防禦各一人一内府三旗官制原定内府三旗各設滿洲佐領三人内管領十人正黄旗設朝鮮佐領一人旗鼓佐領四人順治十八年内府三旗滿洲佐領下各設䕶軍校二人旗鼓佐領内管領下各設䕶軍校一人康熙十六年奏準内府三旗各編為五叅領每叅領設䕶軍叅領一人驍騎叅領一人每佐領下設驍騎校一人二十年奏準内府三旗䕶軍校内委署叅領五人䕶軍内委署䕶軍校五人二十三年議準内府三旗各裁䕶軍校十有二人三十四年奏準内府三旗増設滿洲佐領六人旗鼓佐領六人正黄旗朝鮮佐領一人每佐領下設驍騎校一人四十三年奏準内府三旗每叅領各増設副叅領一人雍正元年奉㫖内府三旗増設䕶軍統領各一人照八旗叅領品級定為三品九年奏準内府三旗每旗各増設䕶軍叅領二人侍衞委署叅領二人䕶軍校委署叅領五人再䕶軍内每旗各増設副䕶軍校五人一圓明園内府三旗官制雍正二年設圓明園内府三旗䕶軍叅領三人副䕶軍叅領三人署副叅領三人䕶軍校九人七年設副䕶軍校三人十年設營總一人一王公所屬官制順治八年定親王各設長史一人散騎郎四人一等䕶衞六人二等䕶衞六人三等䕶衛八人四品典儀二人五品典儀二人六品典儀二人世子長史一人散騎郎三人一等䕶衛六人二等䕶衞五人三等䕶衞六人四品典儀一人五品典儀二人六品典儀二人郡王長史一人散騎郎三人一等䕶衞六人二等䕶衞四人三等䕶衞五人五品典儀二人六品典儀二人長子長史一人散騎郎二人一等䕶衞二人二等䕶衞四人三等䕶衞六