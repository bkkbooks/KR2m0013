内開銷一功臣専祠順治十一年勅建祠於廣寧門外嵗以春秋仲月致祭定南王諡武壯孔有徳並妃白氏李氏每祭素帛三羊一豕一果品五盤尊一爵九康熙十九年勅建祠於安定門外嵗以春秋仲月致祭宏毅公諡恪僖遏必隆並縣主一品夫人舒舒覺羅氏祭品用素帛二餘與武壯王祠同雍正二年勅建祠於朝陽門外嵗以春秋仲月致祭太師定南將軍一等公諡勤襄佟圖頼並一品夫人覺羅氏次太傅安北將軍内大臣都統一等公諡忠勇佟國綱並一品夫人他塔喇氏温都氏次太傅領侍衞内大臣一等公諡端純佟國維並一品夫人赫舎里氏每祭用素帛七羊三豕三果品十有五盤尊三爵二十有一是年勅建祠於徳勝門外嵗以春秋仲月致祭少保兼太子太傅一等公中和殿大學士諡文襄圖海並一品夫人覺爾禪氏鈕祜禄氏每祭用素帛三羊一豕一果品五盤尊一爵九乾隆二年勅建祠於安定門外嵗以春秋仲月致祭光禄大夫宏毅公額宜都祭用素帛一爵三牲醴果品與各祠同十四年勅建祠於東安門内嵗以春秋仲月致祭太子太保内大臣議政大臣内務府總管一等男兼一雲騎尉追封一等承恩公諡恪僖哈世屯並一品夫人覺羅氏次户部尚書内務府總管一等男兼一雲騎尉追封一等承恩公諡敏果米思翰並一品夫人穆溪覺羅氏博爾濟吉特氏次一等男兼一雲騎尉兼察哈爾總管追贈一等承恩公諡莊慤李榮保並一品夫人覺羅氏祭用素帛七羊三豕三果品十有五盤尊三爵二十有一一雙忠祠乾隆十六年諭駐藏大臣等奏朱爾墨特那木扎爾自立名號潜遣其心腹堅叅扎錫等通欵凖噶酒稱䇿旺多爾濟那木扎爾為汗且求其發兵至拉逹克地方以為聲援幸值凖夷内潰所遣使人回藏被獲得其逆書並餽獻諸物是其隂蓄異志勾結凖夷罪不容誅設非都統傅清左都御史拉布敦協力同心决計先發則其貽害藏地將不可言是二臣之心甚苦而有功於國家甚大應特建雙忠祠合祀二人春秋致祭丕昭勸忠令典傅清既有専祀著不必從祀家廟該部會同内務府酌撥官房營度以聞欽此遵㫖建雙忠祠於崇文門内合祀都統一等伯諡襄烈傅清左都御史一等伯諡壯果拉布敦照例安設牌位春秋致祭每祭用帛二羊一豕一果品五盤尊一爵六一春秋致祭八旗左右翼及直省府州縣忠義孝弟祠節孝祠雍正二年諭旌表節義給銀建坊民間徃往視為具文未曾建立恐日乆仍至泯没不能使民間有所觀感著於學宫内建忠義祠一所立石碑一通於學宫附近處購買基址建節孝祠一所立大牌坊一座其石碑牌坊將前後忠孝節義之人悉標姓氏於其上已故者設牌位於祠中春秋祭祀用闡幽光以垂永乆欽此遵㫖議凖行令順天府奉天府直𨽻各省府州縣衞分别男女各建二祠一為忠義孝弟之祠建於學宫之内祠門内立石碑一通將前後忠義孝弟之人刋刻姓氏於其上已故者設牌位於祠中一為節孝之祠别擇地營建祠門外建大坊一座將前後節孝婦女標題姓氏於其上已故者設牌位於祠中每年春秋二次令直省各府州縣衛守土官致祭其建立祠宇碑坊銀動用正項錢糧報工部奏銷一直省祭厲壇順治初年定直省府州縣各立厲壇於北郊每年清眀日七月十五日十月朔日用羊三豕三米飯三石並香燭酒醴棉帛以祭本境無祀鬼神府稱郡厲縣稱邑厲咸以有司承祭祭日豫設城隍神位於壇行家祭一王公家祭崇徳元年定宗室封王者立家廟致祭順治五年定宗室封王無嗣者於太廟後殿兩廡祔祭有嗣者令其子孫立廟致祭廟制正殿七間臺基髙二尺一寸院内東西房三間貯祭噐及祭獻等項西廂房三間貯樂噐臺基皆髙一尺六寸大門三間臺基髙一尺六寸院内西旁門一座院内東旁設燎鑪一座大門外西旁設宰牲房三間其正殿廂房大門皆五色彩畫花草上用緑琉璃瓦殿門墻外用紅土内用白堊院牆用紅土緑瓦蓋頂帛鑪亦用緑瓦牌位髙二尺濶四寸朱紅色上刻追封諡號墨書安於朱紅木龕内設紅片金帳幔其廟中王位以居中為尊餘分列左右如止一王正設中間每於正月四月七月十月歳暮日前期三日齋戒候饗太廟諸王陪祭禮成各囘府致祭凡有薦新品物如太廟未獻之先不許家廟薦獻如王有事不得親祭令子弟代祭如無子弟令䕶衞代祭其奠帛祭品該王自行偹辦引賛人於所屬官員内選充其祝文内閣撰給體式又定莊親王立一廟禮親王巽親王謙郡王共立一廟肅親王立一廟饒餘郡王端重親王共立一廟頴親王順承郡王共立一廟豫郡王立一廟克勤郡王衍禧郡王共立一廟雍正九年定怡賢親王立一廟欽定大淸㑹典則例卷八十四
