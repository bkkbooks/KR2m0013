春秋妥侑世世血食顧念古者大烝之祭凡法施於民以勞定國者皆得並列祀典永受眀禋則我朝名臣良弼其經邦佐治黼黻昇平者皆祭法所必登朕欲為之建立祠宇乆矣即如怡親王之精白一心忠誠體國勲在社稷澤被生民其功徳隆盛又豈一切効忠宣力者之所可比倫乎洪惟太祖太宗創業垂統厥有一徳佐命之良世祖撫綏萬邦實多奮庸熙載之彦迨我聖祖臨御六十餘年間良臣碩輔後先相望據朕所深知者舉其一二如大學士公圖海公頼塔大學士張英尚書顧八代馬爾漢趙申喬河道總督靳輔齊蘇勒總督楊宗仁巡撫陳璸等持躬正直奉職公忠或垂節鉞之勲或勵冰霜之節俯仰無愧為朝野所共欽終始不渝無瑕疵之可指此等靖共爾位不愧古大臣之風者正不乏人既樹羽儀於一世宜隆俎豆於千秋且使世世為臣者觀感奮發知所慕效羣以臯䕫稷契共相期許則眀良喜起之盛朕於斯有厚望焉著於京城内選擇吉地特建廟宇命名賢良祠春秋以時展祭其應入祠之人著大學士會同該部察眀本朝滿漢文武大臣才徳著聞完名全節者詳慎開列具奏請㫖將來繼起之臣亦並得沾被恩光永為盛典欽此遵㫖議凖怡賢親王宗功元祀宜為賢良之首其良臣碩輔如大學士公圖海公頼塔大學士張英尚書顧八代馬爾漢趙申喬河道總督靳輔齊蘇勒總督楊宗仁巡撫陳璸等均宜入祠崇祀以光祀典並將其餘擬定入祠滿漢文武大臣繕録事宜開列名單恭呈御覽竢命下之日奏請欽賜匾額行令欽天監擇日懸挂其應行入祠之大臣製造牌位各按爵秩品級叙次安設及撰文設祭均照昭忠祠之例交各該衙門敬謹辦理十年諭原任將軍阿爾納恪謹持躬忠誠奉職從前西陲用兵宣力年乆收復土魯番平定青海均有勞績原任都統馮國相謹慎小心樸誠自矢服官辦事從無過愆向來各旗公庫皆有虧空惟馮國相所管正藍旗全無欠闕此即其出納謹嚴操守潔清之實據伊乃朕藩邸之人知之有素阿爾納馮國相二人應否入賢良祠著九卿會議具奏欽此遵㫖議凖將軍阿爾納都統馮國相均入祀賢良祠又諭賢良祠之王大臣應各立小傳以記生平事蹟著擬稾進呈欽此又欽定原任大學士范文程榜式逹海大學士阿蘭泰李之芳吳琠張玉書李光地富寧安張鵬翮領侍衞内大臣福善費揚古尚書勵杜訥徐潮姚文然魏象樞湯斌提督張勇王進寳孫思克總督趙良棟于成龍傅臘塔均凖入祀賢良祠又遵㫖議凖原任大學士寗完我魏裔介都統李國翰提督施琅䕶軍統領莽依圖定西將軍公愛星阿將軍佛尼勒總督孟喬均入賢良祠又奉㫖原任大學士額色黑王熙總督李國英都統根特副都統褚庫巴圖魯此五人均入賢良祠又諭原任領侍衞内大臣公尹徳乃額宜都之孫居心謹厚行已端方朕所悉知似應入賢良祠著詢問九卿具奏欽此遵㫖議凖尹徳應入祀賢良祠並立傳以垂永乆十一年禮部具奏賢良祠工竣擇吉㳟懸御書崇忠念舊四字匾額禮部會同工部太常寺堂官前期將王公大臣神位照原議各按爵秩品級序次安設讀文致祭其前殿承祭官一人由太常寺前期奏遣内大臣散秩大臣尚書都統後殿遣太常寺堂官一人行禮嗣後春秋遣官承祭均照例遵行奉㫖依議賢良祠之王公大臣等著於本家各賜祭一壇欽此又議凖賢良諸臣入祠之日太常寺先期知會王大臣之後裔至期齊集祠内分班行禮嗣後凡遇春秋二祭亦照例先期知會齊集陪祭十二年諭原任大學士田從典品行端直老成謹愿居官亷潔奉國公忠應入賢良祠以風有位欽此又諭原任大學士髙其位端方亷潔忠厚和平簡任綸扉夀登大耋應入賢良祠以旌耆舊欽此又議凖賢良祠前殿供奉和碩怡賢親王神位應照王府園寢設立下馬柱之例於賢良祠大門外設立下馬紅柱乾隆元年諭原任加禮部尚書銜兼國子監祭酒楊名時學問醇正品行端方著加贈太子太傅入祀賢良祠欽此又諭原任大學士朱軾品行端方學術醇正純修清徳望重朝端著加贈太傅入祀賢良祠欽此又議凖原任太子太保内大臣議政大臣一等男哈世屯原任户部尚書議政大臣一等男米思翰均崇祀賢良祠照例請㫖賜祭奉㫖著於本家賜祭一次欽此五年直𨽻題請原任直𨽻總督李衞列祀省會賢良祠奉㫖李衞􅆒歴中外屢任封疆宣力多年勤勞素著亦應入京師賢良祠著九卿會議具奏欽此遵㫖議凖原任直𨽻總督李衞應於京師賢良祠崇祀並照例立傳六年諭原任江蘇巡撫徐士林學問有素忠孝性成著入京師賢良祠以為臣工勸欽此又諭尚書徐元夢人品端方學問優裕踐履篤實言行相符歴事三朝出入禁近小心謹慎數十年如一日謂之完人洵可無愧著加贈太傅入祀賢良祠以示優禮耆舊格外加恩之至意欽此十年議凖賢良祠内前殿製龕案設怡賢親王神位應仍遵原議祀奉其後宇四龕奉祀賢良臣五十八位請合為一龕恭照我朝繼承之序定諸位饗祀之班首序世次之最先者餘則左右分行各按世次序其爵秩如見在配饗大學士宜居前領侍衛内大臣次之尚書都統將軍總督前鋒統領䕶軍統領提督侍郎巡撫副都統各依次安設至世爵列爵五等有子男授尚書都統者亦有侯伯為侍郎副都統者應以尚書都統等秩為序以昭畫一謹將所擬安設神牌左右次序繕册進呈天聰年間名臣贈大學士諡文成榜式逹海崇徳年間名臣大傅兼太子太師内秘書院大學士一等子諡文肅范文程䝉古副都統一等輕車都尉諡襄壯禇庫巴圖魯順治年間名臣少傅兼太子太傅内國史院大學士諡文毅寗完我少師兼太子太師内國史院大學士諡文恪額色黑少保兼太子太保定西將軍内大臣一等公諡靖康愛星阿太子太保内大臣議政大臣一等男加一雲騎尉諡