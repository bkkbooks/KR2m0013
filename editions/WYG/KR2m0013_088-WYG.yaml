body:
  text: 禮部祠祭清吏同羣祀一一祀北極佑聖真君於地安門外日中坊橋東廟曰靈眀顯佑宫順治八年定每年㳟遇萬夀聖節遣官祀北極佑聖真君用白色禮神制帛一核桃荔枝龍眼棗栗各一盤各祠廟果品同饅首五盤餻五盤餅四盤大寳糚花一茶三琖一祀司火之神廟建於地安門日中坊橋西每年六月二十三二日遣官祀火神康熙二年定祀用白色禮神制帛一羊一豕一果品五盤尊一爵三雍正八年奏準每嵗祀火神廟加少牢為太牢乾隆十八年奏準祀火神改用紅色禮神制帛一祀礮神康熙二十八年定每歳九月初一日陳礮位於盧溝橋沙鍋村八旗按翼排列各設神位皆羊一豕一鑪一鐙二爵三共尊二設祝案於鑲黄旗礮位前賛禮郎引承祭都統於鑲黄旗礮位前上香三獻讀祝文行禮餘七旗都統各於本旗礮位前隨承祭官上香三獻行禮各望燎副都統以下等官皆陪祀咸補服康熙三十五年聖祖仁皇帝親征噶爾丹遣官致祭火礮之神行禮如儀三十六年大軍凱旋翼日遣官祭太嵗之神於太嵗殿道路之神於天安門設一壇於安定門外祭隨營旗纛於鑲黄旗教場設一壇於徳勝門外祭隨營礮位於正黄旗教塲各陳牛一羊一豕一果五盤㸃香燭奠帛獻爵讀祝文致祭分遣大臣二人主祭凡管纛之大臣官員皆陪祀於旗纛壇火噐營大臣官員皆陪祀於礮位壇雍正三年定每三年一次遣官祀礮神乾隆十八年定每三年一次祀礮神遣都統或副都統每旗各一人承祭各用太常賛禮郎二人引禮賛禮郎通賛每旗增設酒琖三十祝文内書皇帝遣某官等致祭書鑲黄旗都統名如鑲黄旗都統以事書次旗都統名由太常寺臨時開列具奏火噐營祭八旗礮神乾隆十四年定於盧溝橋沙鍋村致祭每年請㫖舉行祭時共設一案以火噐營總統一人承祭火噐營官員咸補服陪祭上香讀祝獻爵望燎均與漢軍祭礮儀同羣祀二一祭都城隍之神廟建於都城西南隅每嵗秋月諏吉遣太常寺卿致祭順治三年定祭用白色禮神制帛一羊一豕一鉶二簠二簋二􅇼十豆十尊一爵三八年題準每年萬夀聖節遣官致祭用帛一牛羊豕各一果品五盤尊一爵三雍正三年議凖嗣後祭都城隍廟前期太常寺開列部院尚書左都御史題請欽命一人致祭一祭東嶽之神廟建於朝陽門外每年萬夀聖節遣官致祭順治八年定祭用青色禮神制帛一牛一羊一豕一果品五盤尊一爵三一祭昭靈沛澤龍王之神康熙二十年以都城西北三十餘里金山之麓舊有黑龍潭禱雨輒應重建祠宇御製碑文勒石雍正二年以禱雨霑足御製碑文親灑宸翰勒石廟庭乾隆三年諭黑龍潭龍神福國佑民靈顯素著每遇京師雨澤愆期祈禱必應是眀神功徳實能膏潤田疇順成年穀為萬姓之所仰頼昔年皇祖式廓廟貌建立豐碑皇考又復易以黄瓦用昭敬禮今應議加封號以示尊崇著大學士會同該部定議具奏欽此遵㫖議準勅封為昭靈沛澤龍王之神製造神牌安設供奉遣官致祭一次祭文由翰林院撰擬祭品由太常寺備辦每嵗春秋致祭用黑色禮神制帛一羊一豕一簠簋各二􅇼豆各十尊一爵三一祭玉泉龍神廟建於靜眀園内玉泉山乾隆九年奉㫖封京都玉泉山龍王之神為恵濟慈佑龍神十六年奉㫖玉泉山龍神祠易以緑琉璃瓦又諭京師玉泉靈源濬發為水徳之樞紐畿甸衆流環匯皆從此瀠注朕歴品名泉實為天下苐一其澤流潤廣恵濟者博而逺矣上有龍神祠已命所司鳩工崇飾宜列之祀典其品式一視黑龍潭該部具儀以聞欽此遵㫖議準謹按玉泉出西山東流環注京師距通州合白潞以逹於海靈源濬發流澤布恵利頼於畿輔實多允宜列之祀典竢廟工完竣照例遣禮部堂官一人徃祭並請勅賜鴻文勒石祠左用以昭紀神功春秋二祭祭品儀禮均與祭黑龍潭龍神同一祭后土司工之神順治初年定遇大興作隨其營造所在各建采棚設后土司工神位遣官致祭各用白色禮神制帛一羊一豕一果品五盤饅首五盤餻五盤餅四盤大寳糚花一尊一爵三一迎吻祭琉璃窰神並經由一路門神陳設禮儀均與祭后土司工之神同一祭司機之神順治十六年織造局設機祭告司機之神遣禮部堂官行禮一應禮儀與祭司工之神同一祭司倉之神雍正七年覆準通州三倉惟大西倉舊有倉神祠在京城内七倉右翼興平倉舊有太倉神廟請重加修葺左翼擇於海運倉照興平倉廟式建立廟宇城外五倉統於新建之儲濟倉建廟設司倉神位每嵗令倉場侍郎春秋致祭各用帛一羊一豕一果品十盤乾鮮各五尊一爵三京通各倉監督咸朝服陪祭羣祀三一祭先醫順治元年定每年春二月冬十一月上甲日遣官致祭先醫於太醫院署之景恵殿殿中安奉太昊伏義氏神位於正中炎帝神農氏神位於左黄帝軒轅氏神位於右東配句芒風后西配祝融力牧東廡設僦貸季天師岐伯伯髙少師太乙雷公伊尹倉公淳于意華陀皇甫謐巢元方藥王韋慈藏錢乙劉完素李杲神位西廡設鬼臾區俞跗少俞桐君馬師皇神應王扁鵲張機王叔和抱朴子葛洪真人孫思邈啟元子王冰朱肱張元素朱彦修神位以次從祀正殿以禮部尚書一人主祭行禮兩廡以太醫院堂官二人分獻雍正十二年議準春冬二季致祭先醫廟其太醫院御醫吏目等官咸齋戒陪祀一祭關帝順治元年定建關帝廟於地安門外宛平縣之東嵗以五月十三日遣官致祭九年勅封忠義神武大帝雍正三年議準勅封關帝曾祖為光昭公祖為裕昌公父為成忠公製造神牌安奉後殿於五月致祭外增春秋二祭是年奉㫖將關帝大宗後裔在洛陽者授為五經博士世襲罔替嗣後凡有承襲均照雍正二年議定之例由該撫送部考試文理通曉者注册竢襲職時具題給劄四年奏準關帝原籍山西解州後裔照洛陽後裔世襲之例授為五經博士五年奏準每年五月十三日致祭前殿用牛一羊一豕一白色禮神制帛一果品五尊一爵三後殿用少牢餘如前殿春秋二祭前殿用帛一牛一羊一豕一登一鉶二簠簋各二􅇼豆各十尊一爵三遣官一人承祭行三跪九叩禮後殿用帛各一羊各一豕各一鉶二簠簋各二􅇼豆各八尊一爵九遣太常寺堂官承祭行二跪六叩禮十年覆準湖北當陽縣增置世襲五經博士一人奉祀關帝塚墓一直省祭關帝廟雍正七年定五月十三日及春秋二祭並用太牢一祭禦災捍患諸神順治三年以黄河著異加封浙人謝緒為顯佑通濟之神宋末人行四讀書金龍山故俗稱金龍四大王廟祀江南宿遷縣康熙十九年封護國庇民妙靈昭應𢎞仁普濟天妃遣官詣福建莆田縣致祭祭文由翰林院撰擬香帛由太常寺豫偹祭品用帛一羊一豕一簠簋各二􅇼豆各十尊一爵三雍正三年封春秋吳國上大夫伍員為英衞公廟祀錢塘縣唐吳越王錢鏐為誠應王廟祀臨安縣宋張夏為静安公廟祀蕭山縣眀紹興太守湯紹恩為寧江伯廟祀紹興府四年封眀禮部尚書宋禮為寧漕公老人白英為永濟之神均廟祀汶上縣五年覆準封漢蜀郡太守李冰為敷澤興濟通佑王其子李二郎為承績廣恵顯英王廟祀四川灌縣八年加封浙江顯佑侯戴繼元為保濟顯佑侯廟祀徳清縣又封故廣東雷州府海安營水師副將姜起龍為英佑驍騎將軍之神廟祀徐聞縣海口十二年以江西鄱陽湖舊祀唐代忠臣張巡封為顯佑安瀾之神廟祀浮梁縣乾隆二年加封天妃為䕶國庇民妙靈昭應𢎞仁普濟福佑羣生天后三年封河南人黄守才為靈佑襄濟之神廟祀陳留縣四年封江南人張祥為彰靈衛漕之神廟祀清河縣八年封故蜀漢禆將武當為顯佑英濟廣福王廟祀廣西義寧縣二十二年覆準加封天后為護國庇民妙靈昭應𢎞仁普濟福佑羣生誠感咸孚天后於祈報祭文内將封號書眀以上皆所在有司嵗以春秋致祭一巡幸祭先代名臣先賢忠烈祠墓暨本朝名臣康熙三十六年聖祖仁皇帝西巡狩至陕西横城諭趙良棟乃為國宣力建功之臣來朝經過其門遣皇長子及部院諸臣徃奠致祭一次陳福曽為國効力適至此地亦著致祭一次欽此又諭朕躬親至此地寧夏陣亡官員兵丁宜察眀加恩所有陣亡官員遣官致祭欽此四十二年聖祖仁皇帝西巡狩至陕西西安府諭西安百里内若有本朝勲臣墳墓著察眀具奏欽此乾隆十四年議準乘輿巡省中州御道所經於附近輦路之前代名臣忠烈先賢祠墓與本朝勲臣雖屬有間但思表墓式閭自昔著有令典㳟逄皇帝巡俗省方禮隆咸秩應請就該撫咨開祠墓詳加酌議其名臣以從祀帝王廟者為斷如伊尹周公許遠吕䝉正范仲淹司馬光王曾韓琦岳飛等九人先賢以從祀聖廟者為斷如子貢韓愈程顥程頥邵雍朱子許衡等七人其祠墓均應遣賜祭醊以昭曠典又如殷比干墓漢關侯墓晋嵇紹祠唐顔真卿墓皆忠義卓越千古並應一體叨榮祭文由翰林院撰擬香帛由太常寺祭品由地方官豫偹遣祭各官照例開列具奏㳟候欽命徃祭又奏準直督咨稱御道所經有魏裔介宋璟墓考唐臣宋璟配饗帝王廟本朝大學士魏裔介從祀賢良祠祠墓既在御道三十里内亦應遣官致祭祭文祭品香帛均照例由各衙門豫偹十五年議準車駕南巡凡先賢祠墓在御道三十里内者據浙撫咨開到部如唐陸贄宋岳飛眀于謙皆從祀帝王廟眀王守仁從祀文廟本朝徐潮從祀賢良祠皆與中州議準祀典相符理應遣祭又吳越王錢鏐首建江塘功徳在民見在臨安有祠均宜膺祀典祭文祭品及香帛均照例豫偹十六年議準江督咨報境内先賢名臣祠墓到部如㤗伯季札至徳髙風著稱經傳言子㳺范仲淹皆吳産從祀聖廟張玉書趙申喬從祀賢良祠均與奏準遣祭之例相符卞壼曹彬宗澤韓世忠徐逹常遇春方孝孺于成龍傅臘塔湯斌張伯行陳鵬年等皆非江蘇常鎮四府人但或配饗帝王廟或從祀賢良祠或忠義卓著於史册其於江蘇地方或有功斯民或盡節兹土或歸𦵏此鄉祠墓既均在御道三十里以内應一體仰邀遣祭以彰盛典一昭忠祠雍正二年諭朕惟周禮有司勲之官凡有功者書名太常祭於大烝祭法曰以死勤事則祀之凡以崇徳報功風勵忠節也我太祖髙皇帝肇造鴻圖太宗文皇帝式廓區夏世祖章皇帝奄有萬邦自創業以至定鼎將帥之臣致命立功者不少聖祖仁皇帝臨御六十一年中間殱滅三逆永清朔漠以及平定西藏臺灣雖天戈所指如疾風振槁而師旅之臣捐軀馬革及守土之官見危授命者所在多有邇者青海蕩平西域效順然自用兵以來將士奮勇前驅亦有沒於行陣者此皆盡忠報國之臣朕甚嘉之亦甚憫之當於京師建立祠廟春秋妥侑世世血食其偏禆士卒力戰敵愾舎生取義者亦附列左右用褒崇大節揚表芳徽俾遠近觀聼勃然生忠義之心於治道亦有禆益仍令翰林官纂其籍貫事蹟各為立傳彚成一編垂諸永乆九卿詹事科道悉心詳議具奏欽此遵㫖議定交與兵部詳考案卷行文八旗直𨽻各省督撫凡臨陣捐軀守土授命之文武諸臣以及偏禆士卒赤心報國奮不顧身者將籍貫事蹟詳晰繕册具奏其建祠之處交與工部於京城内相度地方鳩工庀材建立祠宇製造神牌㳟請欽定匾額字様行令欽天監擇吉懸挂將文武諸臣之位安設正祠偏將士卒之位安設兩廡入祠之日太常寺前期奏遣大臣一人致祭祭文由翰林院撰擬祭祀事宜由太常寺豫偹每年春秋二祭均由太常寺辦理仍交翰林院詳稽實録國史方畧各館册籍移取兵部清册各為立傳彚成一編垂諸永乆四年遵㫖議準大臣神位於正房安設官員等位於兩傍配樓及後層正房作兩層安設兵丁等位於兩旁羣房内作五層安設正殿設七龕