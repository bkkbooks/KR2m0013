body:
  text: 戸部雜賦下一魚課江蘇安徽額徴魚課銀七十五兩八錢四分有竒按舊典有江蘇等屬魚課銀千四百七十五兩三錢三分又江寧六合丹徒三處時魚折銀並魚塢租水面冬綱共銀五百八十八兩四錢七分有竒外遇閏加銀十有八兩二錢八分有竒其淮防㕔魚稅盡收盡解安徽等屬魚課銀六千九百十有三兩二錢三分有竒錢一萬二千七十五文外遇閏加銀三百五十一兩八錢一分有竒錢七百五十八文今皆裁彙入雜賦項下江西都昌縣設楊林河泊所徳化縣設鶴問寨河泊所額徴魚課銀五千二十二兩八錢有竒福建額徴魚課銀八千四百六兩七錢有竒舊設晉江河泊所今裁浙江額徴魚課銀二千三百九十九兩六錢有竒湖北額徴魚課銀二千八百八十五兩九錢有竒湖南額徴魚課銀二千五十七兩有竒遇閏加銀一百五兩舊設磧磯湖黄江湖湋源湖華家湖沌河蒲澤桑臺湖長江局樟松湖安鄉湖魚苗洋楮塘湖九潭湖共河泊所十有三今皆裁廣東南海縣設官窰河泊所番禺縣設湴湖河泊所澄海縣設東壟河泊所額徴魚課銀三千六百四十兩五錢有竒舊有新安吉安駝河三河泊所今皆裁乾隆元年諭将廣東加增魚税歸善縣千餘兩海豐縣四千餘兩惠來縣五百兩潮陽縣七百兩悉予豁除又廣肇埠租一項亦著免徴欽此六年題準直隸任邱大陸澤水泊地畝因疏濬灃河以致泊水淺狹不産魚息魚船改業每年應交魚税銀準其豁除一田房税契順治四年覆準凡買田地房屋必用契尾每兩輸銀三分康熈十六年題準增江南浙江湖廣各府契税每年蘇松常鎭四府大縣六百兩小縣二百兩安徽等十府州分别州縣大小自五百兩至百兩不等揚州府照賦役全書額徴淮安徐州府屬及寳應霍山宿遷臨淮五河懷遠定遠臨璧虹九州縣均無定額盡收盡解杭嘉湖寧紹金嚴七府大縣三百兩中縣二百兩小縣百兩台衢温處四府仍照見徴造報湖北大縣百五十兩中縣百兩小縣五十兩僻小州縣十兩十七年題準增山東等省田房契税大縣百八十兩至二百四十兩中縣百二十兩小縣六十五兩至三十五兩二十年題準增浙江台衢溫處四府契稅大縣百兩中縣六十兩小縣三十兩二十一年題準增江西萍龍永瀘上定六縣契稅四十三年覆準田房税銀用司頒契尾立簿頒發令州縣登塡将徴收實數按季造册報部察覈雍正四年覆準凡典當田土均用布政使司契尾該地方印契過户一應盈餘稅銀盡收盡解七年題準廣東文武闈鄉試所需各項經費除照例動撥正項外尚有不敷之數向在各州縣業戸買産每兩例徴契税銀三分之外又徴一分充用每年約徴銀二千五百餘兩自雍正七年起準為科場經費造入奏銷册内同正額一例報銷十二年奏準廣東田房二項溢額稅羡自雍正七年至雍正十一年歲終存銀二十萬兩有竒報明戸部以備酌撥嗣後遞年造册報部乾隆元年覆準民間置買田地房産投稅仍照舊例行使契尾由布政使司編給各屬黏連民契之後鈐印給發每奏銷時将用過契尾數目申報藩司考覈十二年奏準民間置買田房産業令布政使司多頒契尾編刻字號於騎縫處鈐蓋印信仍發各州縣竢民間投税之時填注業戸姓名契價契銀數目一存州縣備案一同季册申送布政使司察覈如有不請黏契尾者經人首報即照漏税之例治罪十四年議準嗣後布政使司頒發給民契尾格式編列號數前半幅照常細書業戸等姓名買賣田房數目價銀税銀若干後半幅於空白處豫鈐司印将契價契銀數目大字填冩鈐印之處令業戸㸔明當面騎字截開前幅給業戸收執後幅同季册彚送藩司察覈其從前州縣布政使司備察契尾應行停止一牙帖商行當舖税直隸税銀三萬二千一百五十八兩八錢有竒内當税銀萬四千六百十兩熱河牙税銀五千二百七十兩五錢各行牙帖銀萬二千二百七十八兩三錢各有竒盛京三千八百六十一兩二錢有竒内舖戸行户税銀千三百六十兩七錢有竒經紀税銀二千五百兩五錢有竒山東萬三千二百四十七兩七錢二分三釐有竒内當税銀六千七百五十五兩牙帖銀六千四百九十二兩七錢二分三釐有竒山西三萬五千六百四十七兩七錢有竒内當税銀二萬六千五百六十兩牙帖銀九千八十七兩七錢有竒河南七千三百五十三兩八錢有竒内當税銀五千一百七十五兩牙帖銀二千一百七十八兩八錢有竒江蘇二萬八百六兩八分有竒内當税銀九千六百七十五兩入錢四分牙帖銀萬一千一百三十兩二錢四分有竒安徽萬一千七百四十五兩七錢五分有竒内當税銀三千七百十有四兩九錢九分有竒牙帖銀八千三十兩七錢六分有竒江西五千七百十有八兩内當税銀六百七十五兩牙帖銀五千四十三兩福建七千一百二十兩五錢五分有竒内當税銀四千四百兩牙帖銀二千七百二十兩五錢五分有竒浙江九千五百五十八兩内當税銀五千三十兩牙帖銀四千五百二十八兩湖北五千三百六十兩六錢三分四釐有竒内當税銀二千五百八十五兩牙帖銀二千七百七十五兩六錢三分四釐有竒湖南千二百八十五兩二錢一分六釐有竒内當税銀二百五十兩牙帖銀千三十五兩二錢一分六釐有竒陜西八千五百二十五兩二錢五分有竒内當税銀六千八百六十兩牙帖銀千六百六十五兩二錢五分有竒甘肅八千四百七十七兩二錢二分有竒内當税銀七千七百十有七兩五錢六分有竒牙帖銀七百五十九兩六錢六分有竒四川各行牙帖當税共銀千一百七十兩二錢廣東萬八千四百二十一兩七錢七分有竒内當税銀五百七十五兩牙帖銀萬七千八百四十六兩七錢七分有竒廣西當税銀一百六十五兩雲南當税銀一千六十兩貴州各行牙帖銀五百十有四兩五分有竒康熈三年題準當舖每年納銀五兩大宛二縣大行店舖照當税例每年徴銀五兩十五年覆準京城上等行舖每年徴税銀五兩中等行舖每年徴税銀二兩五錢雍正六年題準直省各屬典當均令布政使司鈐印頒帖交各州縣轉給輸税如有新開典當報司給帖於開設時增税無力停開者即交帖免輸十一年覆準閩省領帖五糓牙行仍照定例按帖輸税一落地牛馬猪羊等項雜課直隸雜税銀二萬六千九百十有九兩六錢有竒内牛驢税銀五千九百九十八兩三錢花布銀一百三十一兩九錢燒缸銀六百十有一兩七錢海税銀七千八百三十五兩一錢河利銀五百三十一兩四錢有竒麻銀八兩七錢榛栗三十六石内解光禄寺八石餘解部轉交内務府丁字沽税銀二千五百七十二兩雜貨税銀九千二百三十兩五錢各有竒盛京三百六十二兩一錢六分山東三萬三千一百六十兩二錢三分二釐有竒内牛驢等税銀二千五百八十七兩四錢三分六釐有竒船筏等税銀萬五千四百三十四兩二錢六分一釐有竒落地雜税銀萬五千一百三十八兩五錢三分五釐有竒山西三萬八千七百六十六兩四錢内溢額商税銀三萬八千二百七十七兩八錢木筏税銀三百六十二兩殺虎堡馬税銀一百二十六兩六錢各有竒河南二萬四千六十五兩七錢内老税銀三千五百九兩九錢活税銀四千四十六兩五錢新增税銀萬六千五百九兩三錢各有竒江蘇二萬四千二百五十二兩三錢九分有竒内雜項税銀千有六兩六錢六分有竒牛驢等税銀三千四十九兩六錢一分商税銀二萬一百九十六兩一錢二分各有竒安徽五千五百六十三兩九錢一分有竒内雜項銀二千九百八十六兩三錢九分牛驢猪羊等税銀二千五百七十七兩五錢各有竒江西九萬一千六十九兩一錢二分有竒雜辦商賈課鈔等税銀九萬七百五十九兩五錢三分有竒牛税銀三百九兩五錢九分有竒福建商雜貨税八千四十四兩九錢六分有竒浙江三千九百七十四兩八錢七分八釐有竒内牛税銀五百二十三兩九錢五分三釐雜税銀三千二十九兩九錢六分五釐有竒馬税銀四百二十兩九錢六分有竒湖北三萬八千六十五兩一錢一分九釐有竒内武昌船料銀三萬三千兩漢陽船税銀八十九兩五錢五分商税銀四千四百十有五兩三錢三分九釐各有竒牛驢馬税銀五百六十兩二錢三分湖南萬五千五百二兩五錢五分七釐有竒内布税銀萬一千四百十有八兩一錢二分商税銀三千九百三十五兩六錢七分一釐牛驢馬税銀一百四十八兩七錢六分六釐各有竒陜西二萬六千九百五十兩八錢九分五釐有竒内課程銀六百二兩三錢七分二釐藥材折價銀五十兩八錢一分三釐各府商筏税銀萬六千九百九十四兩六錢九分三釐畜税銀九千七百三十八兩一錢各有竒駐防徴收畜税銀五十七兩七錢六分磨課銀九十四兩七錢五分七釐有竒礬税銀二兩四錢甘肅萬四千二百五十七兩二錢五分有竒内課程銀千有三十八兩八錢年例盤費脚價銀二十二兩四錢六分有竒匹價銀七百六十兩二錢五分商税銀四千九百八十八兩一錢六分牛驢猪羊等税銀三千七百三十兩二錢六分磨課銀三千五百三十兩五錢七分店租銀一百三十兩二錢七分各有竒褐毯雜税銀四十八兩四錢八分煙税銀八兩四川十有九萬一千二百九十五兩一錢六分有竒内黄蠟折價銀十有四兩六錢四分草耔糧銀一百二十三兩八分秋糧銀七百二十九兩六錢九分水碾磨課銀千一百十有四兩六錢一分雜貨税銀十有八萬九千二百四十八兩三錢四分各有竒油井銀六十四兩八錢廣東十有二萬四百十有七兩三錢九分五釐有竒内落地雜税銀十有一萬九千二百兩六錢四分五釐有竒鑪餉銀千二百十有六兩七錢五分廣西雜税小税銀二萬九百七十九兩六錢有竒雲南十有五萬一千一百六十七兩五錢六分有竒内花斑竹田錢地講戸口等銀五千五百三十二兩四錢一分商税酒税等項課程銀五萬五千二十六兩七錢九分民辦站銀八百四十七兩二錢三分紙筋銀三兩六錢子花銀二百三十四兩四錢一分厰課銀八萬九千五百二十三兩一錢二分各有竒貴州二萬一千四百有八兩三錢九分有竒内雜税銀二萬三百二十五兩九錢八分水銀變價銀一百六十六兩五錢婺川縣鹽税銀九百十有五兩九錢一分遇閏加增銀七十六兩三錢二分各有竒順治元年定凡貿易牲畜按價直每兩納銀三分康熈三十二年題準江南邳州每年額税銀六百十有一兩二錢近來商賈流散闕額将闕額銀豁除嗣後盡收盡解四十八年題準四川成都府卭州所屬州縣新立水碾水磨二十二座課銀五兩三錢三分於四十九年起徴五十一年覆準坐糧㕔衙門督理通州張家灣等處落地税務今遶道避税者多於黄村地方設夫役稽察商賈貨物照例徴税雍正三年覆準雲南府額徴商税四千三百三十五兩四錢有竒曲靖府額徴商税千五百兩六錢有竒大理府額徴商税五百六十三兩五錢有竒楚雄府額徴商税三百四十三兩五錢有竒元江府額徴商税千一百兩額外餘剰銀除存留養亷外共歸正項銀五千九百兩又廵撫衙門舊有各府税規銀八千九百兩除賞兵等費外歸正項銀六千一百兩共歸正項銀萬二千兩解交司庫撥餉五年題準滇省雲南大理楚雄曲靖元江永昌等六府商税又安寧昆明等四十七府州縣㕔土税自雍正六年為始解司充餉又覆準州縣徴收税課凡繫巨鄉大堡載在誌内各集各行每年實在收數若干盡行報出造册送部六年奏準天津大沽口販賣雜糧商船飭令天津縣察明取結一例給與照票其海口税務即交與知縣管理並令大沽營游擊驗票放行将每季所放之船造册報