出境者挐解治罪其番僧若有夾帶姦人並私茶者沿塗官司檢出茶貨入官伴送夾帶人送官治罪若該衙門官縱容私買茶貨及私受餽送增改關文者聼廵按察究又題準進貢番僧應賞食茶須給勘合撥發由茶倉所照數支放不許收買私茶三年題準甘鎮以茶易馬各番許於開市處互市不得濫入邉内又題準民間食用米麥皆停收税四年議準嚴禁州縣借落地税銀名色及勢宦土豪不肖有司設立津頭牙店擅科私税五年議準茶箆止供市馬不許開銷賞番九年覆準地方将領廵緝不許倚托營兵旗人販賣私茶十年覆準茶商舊例大引附茶六十箆小引附茶六十七斤餘今定每茶千斤槩準附茶一百四十斤如有夾帶嚴察治罪又題準凡鎮弁發銀市馬察覈的確準令購買若有載茶易馬者槩行禁止康熈元年題準禁止有司私給税單收税十二年覆準小民肩挑背負尺布斗米蔬果食物貿易者地方官不許徴税十八年覆準産銅鉛厰任民採取徴税銀二分按季造報八分聼民發賣先盡地主報名開採地主無力許本州縣民採取雇募鄰近州縣匠役如别州縣越境採取及衙役攪擾皆照例治罪有墳墓處不許採取倘有不便督撫題明停止二十六年議準自康熈十五年至十九年直隸各省加增田房鹽當牙行等項税銀通行各省免其徴收又免徴湖廣新增鐡茶商茶税銀二十八年題準江寧民間舖面歲輸房號廊鈔等銀悉行豁免四十一年覆準京城内外煤牙悉行禁革其煤牙額税停止徴收四十三年覆準嗣後茶止於陜境交界處盤察行人攜帶十斤以上者停其捜捕有驢䭾車載無官引者即繫私茶照私鹽律治罪失察官弁照例議處四十四年覆準私茶十斤以下向停其捜捕恐姦民計圖免課分帶零運仍照舊緝挐處分四十五年議準嗣後一應牙行照五年編審之例清察更换新帖如有頂冐朋充巧立名色霸開總行逼勒商人不許别投拖欠客本乆占累行者嚴挐究治四十八年覆準姦民希圖射利揑稱牙行於良民買賣之際溷行索詐者令順天府尹通判大宛二縣五城兵馬司嚴行察挐照例從重治罪五十二年諭據四川提督奏稱蜀省一碗水地方聚衆萬餘人開礦差官力行驅逐等語此偷開礦厰之徒皆繫無室可居無田可耕貧民每日所得錙銖以為飬生之計若盡行禁止則伊等何以為生該地方文武官弁作何設法使窮民獲有微利養贍生活但不得聚衆生事妄行不法大學士會同九卿議奏欽此遵㫖議準凡各省所有之礦夲處無業貧民私行採取者各該地方官詢明姓名注册令其開採仍不時稽察毋致生事其外省之人不許開採並嚴禁夲處豪强富戸設厰如有此等情弊該管文武官弁隱匿不嚴行察挐照溺職例革職該督撫将軍提鎮徇庇不行掲叅照徇庇例降三級調用五十五年議準免京城下等行舖税銀雍正三年覆準黄河以東蘭鞏平慶四府秦階二州茶政令湖廣督撫嚴飭産茶各州縣凡商茶照引運茶先行申報本省咨明豫撫轉飭經過地方察驗令陜州驗引移送出關外守取回文備案如該州借名勒索該撫即行題叅治罪如商人離引行茶及夾帶餘茶並将舊引影射者該撫即行挐問又題準嗣後奉天買賣人出威遠堡法庫口至吉林黑龍江等處貿易領取車票繫民即在府尹衙門具呈察驗給票旗人仍照舊例在盛京兵部給票倘官兵胥役等有通同勒索等弊即題叅從重治罪四年覆準陜省茶改令産茶地方官給發船票照依該商引目茶數逐一開明不得别給印票其應行盤察之處照依引目及正茶附茶斤兩盤察驗放不得勒索留難如於部引之外有搭行印票及附茶不依所定斤數多帶私茶者察挐照私鹽律治罪如察驗官故縱失察照例處分如地僻引多致茶壅滯不能行銷該商具呈該司詳報甘撫行令往别司分通融發賣辦課七年題準州縣徴收税銀凡窮鄉僻社些小生理無關課税者永行革除八年題準廣西柳州府舊有牛綱客人入猺獞之地販買納牛税銀四十一兩二錢停止徴解九年諭向來各處落地税銀定例報出税銀八百兩者準加一級多者以次計算年來地方官員皆知守法奉公凡有税課皆隨收隨報不敢侵隱其報出之數每倍於舊額祇恐将來不免冀幸功名之人希圖優叙以致恣意苛索擾累小民且落地税銀非正項錢糧有一定之數可比侵蝕隱匿者固當加以處分而爭多鬭勝者亦當予以處分其作何定議並如何議叙加級處分之處吏部户部悉心妥議具奏欽此遵㫖議準各省落地税銀如徴收正額之外捜求需索以致贏餘之數幾倍於正額者其税契銀如有将民間從前置買産業苛索擾累多收契羡者該督一并指名題叅照例議處至正額外並無苛索擾累實有贏餘報出八百兩者仍照定例準其加一級千六百兩者加二級二千四百兩者加三級如此外雖再有贏餘亦不得過加三級仍令各督撫将並無苛索擾累之處於疏内聲明到日準其議叙又題準廣東曲江惠來陽春等三縣有額無徴税課等銀共七百八十四兩有竒準其永遠豁免十年諭朕聞西寧北川口外白塔地方出産石煤繫附近漢土番回民人採取販賣以為生理每䭾納税錢三十文於西寧委管之員收解充餉約計每年收銀一千九百餘兩近因西陲用兵之際西寧移駐兵弁較前為多率皆用煤以供炊㸑煤價漸至昻貴若仍照前例徴收税錢恐價直不能平減於兵民均有未便著将應徴税錢寛免該督撫轉飭有司實心稽察倘胥吏人等有照例私收或借端需索者務令察出從重究治欽此又奏準木魯烏蘇地方出産金砂附近窮番藉以開採資生應聼其自行開採毋得招集多人生事十一年諭各省商牙雜税固有關國課亦所以便民是以各省額設牙帖皆由藩司頒發不許州縣濫給所以杜增添之弊不使貽累於商民也近聞各省牙帖歲有加增即如各集場中有雜貨小販向來無藉牙行者今槩給牙帖而市井姦牙遂恃為䕶符把持爭奪抽分利息是集場多一牙户即商民多一苦累况牙帖納税每嵗無多徒滋繁擾甚非平價通商之本意著直省督撫飭令各該藩司因地制冝著為定額報部存案不許有司任意加增嗣後止将額内各牙退帖頂補之處察明换給新帖再有新開集場應設牙行者酌定名數給發亦報部存案如此則貿易小民可永除牙戸苛索之弊欽此十二年諭朕聞東省泰山有碧霞靈應宫凡民人進香者皆在泰安州衙門輸納香税每名輸銀一錢四分通年約計萬金若無力輸納者即不許登山入廟此例起自前明迄今未革朕思小民進香禱神應聼其意不得收取税銀嗣後将香税一項永行蠲除如進香人民有願輸香錢者各隨所願不必計較多寡亦祇許本山道人收存以資修葺祠廟山路等費不許官吏經手絲毫染指永著為例欽此又諭湖北太和山香税著照山東泰安州之例永行豁免欽此十三年十月諭朕聞各省地方於關税雜税外更有落地税之名凡耰鋤箕帚薪炭魚蝦蔬果之屬其直無幾必察明上税方許交易且販自東市既已納課貨於西市又復重徴至於鄉村僻逺之地有司耳目所不及或差胥役徴收或令牙行總繳其交官者甚微不過飽姦民猾吏之私橐而細民已重受其擾矣著通行内外各省凡市集落地税其在府州縣城内人煙湊集貿易衆多且官員易於稽察者照舊徴收但不許額外苛索亦不許重複徴收若在鄉鎮村落則全行禁革不許貪官汚吏假借名色巧取著該督撫将通省額徴税額分晰原額新增並原設税口例載貨物應留應革款項造册題報其如何裁革禁約之處詳細造册報部察覈欽此又諭民間活契典業者乃一時借貸銀錢原不在買賣納税之例嗣後聼其自便不必投契用印收取税銀其地方官徴收税課多者亦停其議叙再在京兩翼收税之處亦照此例行欽此又題準直隸正定府屬之挿箭嶺倒馬關及所屬之上城鐡嶺口既收貨物牲畜之税而出入往來空身之人向例復收税錢著永行停止乾隆元年諭廣東有埠租一項乃民間自收之微利前經察出湊修圍基之費今圍基既動公項修築所有埠租一項免其徴收欽此又覆準牙戸如各牙行式微無力貿易有情願報官歇業者即令其開除報部不必竢頂補有人方準退帖違者照例處分又覆準浙江嘉興台州溫州處州等府屬之角里等處各口界址每年應徴商税等銀永行禁革二年題準滇省鎮雄州繫食川鹽徴收過税準其裁革於鹽課銀内開除又題準山東省魚筏税銀五百三十八兩九錢一分有竒免其徴收又題準湖南永州府帶徴商税及常徳府報增餘出鹽鈔昌平熟鐡等税武岡州報增餘出門攤酒醋等税岳州府屬之巴陵縣報增餘出漁税察明繫屬零星商販及額外加增之項準全行禁革又題準湖北安陸府所屬之河家集等十六處襄陽府所屬之雙溝等十集鄖陽府所屬之安陽龍門江峪三處均繫小村落向徴税銀全行禁革又題準平凉府屬之白水鎮布疋煙紙等税臨洮府城褐税並屬府之定羌驛内官營落地布麻褐等税悉行禁革三年題準江蘇等屬落地税銀分别裁留實在各屬請裁銀二千四百四十八兩五錢有竒準予豁除又題準直隸遵化州寶坻縣及容城之白溝河等四集河西務等三處並撫寧之深河山海衛之海洋石門等處宣化府屬之蔚州河間縣之桑家林等處均繫零星交易土産貨物應徴税銀均予裁革又題準四川廣元縣每宰一猪徴銀三分商販活猪已經收税宰猪又徴事屬重複應行裁革至經過䕫關在於本地糶賣之米糧既未載有一例徴收字様似屬額外加徴嗣後免其徴税四年諭昔我皇考惠愛商民恐州縣牙行歲有加增於雍正十一年諭令各督撫飭令藩司因地制冝著為定額報部存案不許有司任意加增止許将額内各牙退帖頂補之處察明換給新帖再有新開集場應設牙行者酌定給帖報部不許濫增近聞江蘇各屬於額帖之外陸續增請者一縣竟有數十張以至百餘張不等此必州縣官聼信吏胥播弄借新開集場準其增設之例或舊業而揑為新設或裁牙而溷請改充徒使貿易小民受其苛索莫可申訴江蘇如此則各省亦必皆然該部即通行各省督撫轉飭布政使司出示曉諭該地方若有新開集場應設牙行者該印官詳確察明取具印結由府州覈實詳司給發牙帖如非新開集場朦溷請增者即行題叅從重議處欽此五年諭近聞外省衙門胥吏多有更名揑姓兼充牙行者此軰倚勢作姦壟斷取利其為市廛之蠧尤非尋常頂冐把持者可比嗣後作何定例嚴禁及地方官失於稽察作何處分之處該部定議具奏欽此遵㫖議準嗣後胥役見在更名揑姓兼充牙行者令地方官嚴察確實即行追帖勒令歇業並将胥役充補牙行之弊永行嚴禁倘不法胥役仍更名揑姓兼充牙行者照例杖一百徒三年如誆騙客貨累商乆候一經告發照例枷一月發附近充軍若地方官奉行不力失於稽察罰俸一年有意徇縱者降二級調用如有受財故縱計贓從重以枉法論七年覆準客商販買米豆皆須投託牙行恐狡獪牙行有意把持高擡價直於中取利行令直省督撫轉飭該地方有司通行出示嚴切曉諭商人既不得藉貨居竒行家更不得把持增價倘有居竒把持等弊即察明究治九年題準嗣後地方官濫給牙帖者該管上司失於稽察将知府照廵綽官失於稽察例罰俸一年司道照不行詳察例罰俸六月若該管上司知情不據實揭報題叅者照徇情例降二級調用牙行承充之時向本殷實厥後漸次式微致有拖欠客本者隨時革换倘州縣仍将銷乏牙行不即革退及並非殷實之人出結申送照衿監充認牙行州縣官奉行不力例分别失察徇縱議處如有枉法受贓等項按律處分並飭令地方官出示曉諭如有姦牙狡獪於發貨之日不令客人與舖戸三面議價立定合同限帖届期同索者許客商赴官具控将該牙革退别募充當如舖戸過限不清有意侵吞客貨者仍将舖戸嚴追地方官倘有陽奉隂違釀成積案者以玩視民瘼題叅又題準安徽等十三府州屬雜税項下牛驢花布煙油等項銀或繫有款無徴印官捐解或空有地名並無市集或重徴經行牙行或雜𣲖於舖家煙户實為擾累悉準予豁免十一年奏準湖廣衡州府設立賣鉛牙行頒給印照官秤凡赴買者該牙依次發貨如官買客販並至先盡官後給客仍聼買賣人等當面議價該牙在旁眼同兌交銀貨以免爭競倘有把持欺壓等事即行革究又題準江蘇碾餉闕額銀出自碾米之户完解因土俗變易民間皆置木礱自做碾戸稍乏並無頂補之人以乾隆十一年為始準其槩予豁免又覆準江蘇額賦之外有城租闕額吏農班餘米軍餉碾餉闕額折糓無徴等項雜辦共銀六百二兩六錢五分七釐均屬有款無徴官民苦累準其照數豁除十七年議準直省地方遼濶凡有種麻植靛燒炭烘茹開礦採捕等事無業窮民羣聚於深山大谷湖濱海􅆜之間務令該州縣親履其地勘明形勢細察來歴繪圖貼說造册申報督撫仍按季覆察該督撫嵗於四月十月内檄令廵道會同營弁稽察出結申報倘地方官及廵察官弁有縱容兵役滋擾累民者該上司即掲報督撫題叅又議準凡産硝硫黄之地除見在官為開採者仍循例妥辦毋許夾帶透漏不時稽察外其乆經封禁之山澤及出産硝黄之地務嚴行申禁倘有頑民私自開採地方官不行嚴挐别經發覺即将該地方官嚴叅議處務令獲犯治罪其不行掲報之各上司失於覺察之該督撫一并交部察議欽定大清會典則例卷五十
