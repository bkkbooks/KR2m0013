body:
  text: 前鋒統領前鋒營一營制天聰八年定巴牙喇即䕶軍前哨兵稱為噶布什賢超哈即前鋒軍順治元年定前鋒校每人給小旗一各按旗色十七年定噶布什賢噶喇衣昂邦漢字稱為前鋒統領噶布什賢章京漢字稱為前鋒叅領壯逹漢字稱為前鋒校又定前鋒叅領以下盔頂用獺尾垂黒纓前鋒校前鋒皆鐵頂垂紅纓康熙五年定前鋒校甲以白繡叚為表前鋒以藍布為表袖裙皆用明甲六年題準每前鋒一名各給甲一胄一櫜鞬一弓一矢七十佩刀一又定八旗前鋒給鳥槍八百八十一海螺十有六前鋒校每人給順刀一䥥一斧一鳥槍什長隊長各梅針箭二十批箭五餘與前鋒校同前鋒各手槍一鉤鞭一麻繩四十絨繩二鋼鈐四餘與鳥槍什長隊長同二十一年題準每歲演習田獵三次春季定於三月秋季定於九月冬季定於十二月每次令八旗簡撥前鋒校前鋒共一百三十人每翼前鋒叅領一人前鋒侍衛一人二十八年定前鋒軍器於八旗䕶軍驍騎閱畢之後定期請㫖㑹領侍衛内大臣檢閱三十三年鑄給前鋒統領印信五十三年改鑄左右兩翼前鋒統領䕶軍統領印二顆雍正四年仍鑄給前鋒統領印二顆五年覆準八旗前鋒每月六次習射適逢有㑹議之事統領等不能兼顧嗣後定期每月於初二初六十一十六二十一二十六日是日停止會議令統領親徃較射六年定大閲頭隊每佐領下前鋒一人每旗前鋒叅領一人前鋒侍衛一人每翼前鋒統領一人即於此數内分出前鋒二百人前鋒叅領侍衛各二人統領一人為殿後軍又定每年八旗合操分前鋒營官軍之半㑹合火器營官軍操演八年議準前鋒内一半習鳥槍每月以初九十四十九二十九等日演放鳥槍合前較射之日共為十日監看鳥槍叅領侍衛各二人監看歩射叅領侍衛各二人仍照䕶軍之例每年春秋二季驗看騎射並擐甲馬歩射一二次三年一次考驗甄别又奉㫖歩行較獵甚為善事人人旣得學習而於行圍之道亦得嫻熟爾等與其較獵一次不若多演數次為佳嗣後於初冬行歩圍時每一旗令行圍二三次其行圍之時著各該旗大臣等親身率徃於前一日奏聞每圍令尚虞侍衛執事人鷹房人或二十人或三十人亦著前徃如此則侍衛執事人等旣得習學而兵丁亦得嫻熟行圍之道矣又定每年秋季前鋒統領㑹䕶軍統領奏聞率所屬兩營官軍演習歩圍兩三次是年設立前鋒統領衙署左右翼各一一行在宿衛扈從前鋒叅領侍衛共八人率前鋒校前鋒共百二十人於御營前一二里外相度形勢安設卡倫偵探立前鋒旗二以為門戸兩旁以次列帳叅衛校士各於帳内廵警宿衛有於卡倫内行走者坐以軍法次日叅衛校士屬櫜鞬控馬於道旁排立候黄龍大纛過各乘馬整隊扈從一升除康熙年間定前鋒叅領員闕於䕶軍叅領驍騎叅領前鋒侍衛一二三等侍衛䕶衛子以下佐領騎都尉以上等官内選擬正陪題補前鋒侍衛員闕於雲騎尉三等侍衛䕶衛前鋒校䕶軍校内選擬正陪題補前鋒校闕於前鋒内選擬正陪題補雍正元年覆準前鋒營左右翼統領各設隨印筆帖式二人又奉㫖向例上三旗前鋒侍衛繫五品戴孔雀翎下五旗前鋒侍衛亦繫五品戴藍翎嗣後下五旗前鋒侍衛皆令戴孔雀翎三年覆準前鋒營左右翼各設協理事務前鋒叅領一人前鋒侍衛一人隨印前鋒校二人其協理事務之前鋒叅領侍衛由該翼統領於本翼四旗前鋒叅領侍衛内選擬正陪引見補授其隨印之前鋒校即於本翼前鋒内選委如行走好辦事勤者薦舉庸劣怠忽者叅劾若統領遇有辦事錯誤處分協理事務叅領等一并議處又奏準三旗前鋒侍衛員闕於侍衛副䕶軍叅領前鋒校内五旗前鋒侍衛員闕於䕶衛副䕶軍叅領前鋒校内各遴選五六人引見補授又奏準前鋒校員闕於本旗前鋒内遴選年久行走好者四五人引見補授七年奉㫖前給八旗副驍騎校副䕶軍校㡌頂藍翎補服並加月餉銀一兩今前鋒營所設鳥槍前鋒什長亦照此例乾隆元年奏準前鋒侍衛照八旗副叅領之例授為四品又奏準嗣後前鋒叅領員闕宗室將軍侍衛三旗侍衛䕶軍叅領前鋒侍衛並準列名六年議準前鋒叅領員闕由該翼統領於本旗䕶軍叅領一二等侍衛宗室將軍一二等侍衛前鋒侍衛内遴選六七人引見補授又議準前鋒侍衛員闕由該翼統領於本旗二二等侍衛䕶衛副䕶軍叅領前鋒校内遴選五六人以委署前鋒叅領一人列於前引見補授又議準前鋒校員闕以本旗鳥槍什長隊長開列若闕多人少於本旗前鋒内每闕遴選四五人均由該翼統領引見補授前鋒鳥槍什長闕於本旗鳥槍隊長内鳥槍隊長闕於本旗前鋒内各遴選充補十七年奏準每旗増設委署前鋒叅領各一人戴五品頂孔雀翎仍食前鋒校餉一拔補前鋒康熙年間定前鋒闕由該統領㑹同䕶軍統領於親軍䕶軍及正身驍騎執事人閒散正身壯丁内遴選充補雍正二年定敎養兵亦準選拔十一年諭據領侍衛内大臣等奏稱親軍係龍驤宿衛不應逺補前鋒朕思親軍雖繫龍驤宿衛然前鋒尤為𦂳要親軍皆由佐領下視其材伎選充者嗣後未滿十年之親軍準其調補前鋒已滿十年者毋得調補著為例欽此一軍政前鋒叅領以下前鋒校以上由本翼統領分别保薦去留三等注考聽欽命王大臣考驗一侍班前鋒䕶軍兩營同直一日每直兩營合簡叅領侍衛等官十人各注考語引見記名者咨兵部注冊一署理前鋒統領有出差者即令未出差之統領兼攝若二人同時奉差乃奏請簡署一官員親隨兵養亷支借俸銀官軍優䘏均與八旗驍騎營同䕶軍統領䕶軍營一營制國初設巴牙喇即䕶軍營統以巴牙喇纛額貞即䕶軍統領佐以巴牙喇甲喇額貞即䕶軍叅領天聰八年奉㫖改巴牙喇纛額貞為纛章京巴牙喇甲喇額貞為甲喇章京又奉㫖每牛彔下以巴牙喇八名出兵二名守禦順治元年定八旗纛章京給大纛各一壯逹即䕶軍校給小旗各一十七年定纛章京漢字稱為䕶軍統領甲喇章京漢字稱為䕶軍叅領壯逹漢字稱為䕶軍校又定䕶軍叅領以下盔頂用獺尾垂黒纓䕶軍校䕶軍盔皆鐵頂垂紅纓又定八旗䕶軍統領每月六次較閱官兵歩射自七月十六日開操遇閏七月即於閏七月十六日開操至四月十六日停止自封印日至開印日暫停春秋二季較閱馬射一次或二次三年一次考驗甄别劣者黜之康熙五年定八旗䕶軍校甲咸以白叚繡花為表八旗䕶軍咸以藍布繡花為表六年題準每䕶軍一名各給甲一胄一櫜鞬一弓一矢七十佩刀一每二人合給長槍一其䕶軍纛上三旗移文武備院纛馬移文上駟院領取下五旗於本旗王公門上輪流行取三十年定八旗䕶軍營每旗各設海螺三十有六三十三年鑄給䕶軍統領印八顆五十三年改鑄左右兩翼前鋒統領䕶軍統領印二顆雍正四年仍鑄給䕶軍統領印八顆五年覆準八旗䕶軍每月六次習射適逢㑹議之事統領等不能兼顧嗣後是日停止㑹議令統領親徃較射六年定大閱頭隊每佐領䕶軍二人每旗䕶軍叅領五人每翼䕶軍統領一人次隊每佐領䕶軍三人每旗䕶軍叅領三人每翼䕶軍統領一人兩翼應援兵每佐領䕶軍一人每旗䕶軍叅領二人每翼䕶軍統領一人於頭隊内分出䕶軍四百人䕶軍叅領八人八旗䕶軍統領一人以為殿後軍麾旗每旗䕶軍各二人䕶軍叅領各二人䕶軍校各十有四人禁約喧譁每旗䕶軍叅領一人䕶軍校一人䕶軍四十人給使官每旗䕶軍校一人七年覆準八旗驍騎營所牧官馬每旗分出九匹與䕶軍飼養八年設立八旗䕶軍統領衙署左右翼各一一八旗䕶軍守衛國初定上三旗䕶軍叅領䕶軍校䕶軍守衛禁闥下五旗䕶軍叅領䕶軍校䕶軍各守該王公府門行圍出征則八旗一律分撥順治初年定鼎燕京仍以上三旗守衛紫禁宫闕景運門䕶軍統領或前鋒統領一人司鑰長一人筆帖式二人司閱門籍䕶軍一人即巴克什䕶軍校䕶軍二十人隆宗門䕶軍叅領一人筆帖式一人司閱門籍䕶軍一人䕶軍校䕶軍二十人後左門後右門蒼震門啟祥門順貞門䕶軍叅領各一人司閱門籍䕶軍各一人䕶軍校䕶軍各十有五人太和門昭德門貞度門協和門雍和今為熙和門中左門中右門左翼門右翼門吉祥門右北門東南西南東北西北四隅紫禁四門内磴道柵䦨䕶軍校䕶軍各十人日則守衛夜則廵更傳籌午門左右門䕶軍叅領一人司門籍䕶軍二人䕶軍校䕶軍三十人東華門西華門神武門䕶軍叅領各一人司門籍䕶軍各二人䕶軍校䕶軍各二十人凡遇己亥日為正黄旗首班子午日為正黄旗二班丑未日為鑲黄旗首班寅申日為鑲黄旗二班卯酉日為正白旗首班辰戍日為正白旗二班輪流宿衛下五旗䕶軍叅領䕶軍校䕶軍仍各守衛該王公府門康熙十八年增太和殿䕶軍校䕶軍十人中和殿五人體仁閣𢎞義閣各十人計日直䕶軍統領一人司鑰長一人䕶軍叅領䕶軍校䕶軍五百二十五人恭遇聖駕駐蹕暢春園則八旗守衛以前鋒䕶軍統領二人駐劄兩翼八旗每旗七汛汛各叅領或署叅領一人䕶軍校䕶軍十人每五日更換其守衛傳籌與紫禁同又每旗前鋒鳥槍䕶軍二汎專管柵䦨及警蹕計日直䕶軍叅領䕶軍校䕶軍七百二十人三十年奏準每遇鄂羅斯進貢貿易來京據兵部移文八旗日委䕶軍叅領二人䕶軍校䕶軍五十人於㑹同舘大門及四圍防汛并稽其出入六十一年十一月奏準隆宗門増設䕶軍統領一人箭亭北上門各増䕶軍校䕶軍十人雍正元年奉㫖順貞門令内府䕶軍統領率内府䕶軍守衛又奏準恭遇聖駕行幸午門東華門西華門神武門各増統領一人又奏準紫禁城外周圍向繫驍騎營官兵守衛請改歸下五旗䕶軍守衛分定界址東華門西華門外以南令正藍鑲藍二旗東華門西華門外以北至城角令鑲白鑲紅二旗北面一帶令正紅旗官軍輪流守衛三年奉㫖見今天氣炎熱凡直班之䕶軍統領以至䕶軍校有年逾六十五歲䕶軍有年逾六十者均著停止直宿以年少者代之有應奏除者即著奏除竢至秋涼仍令赴班直宿其餘守門之䕶軍等於各官奏事出入之際照常具服外至午後準除外服稍為納涼四年奏準隆宗門以統領協理事務前鋒䕶軍叅領一人參互入直又奏準恭遇行幸東華門西華門神武門増統領或協理事務前鋒䕶軍叅領各一人五年議準増防範火班䕶軍校䕶軍八人紫禁城内除太和殿中和殿體仁閣𢎞義閣景運門隆宗門後左門後右門中左門中右門紫禁城四門等十四處䕶軍不調外將左翼門等二十三處䕶軍每處調二名共四十六名或直日䕶軍統領或司鑰長率領前徃七年奏準端門天安門大清門向繫歩軍守衛亦請改歸五旗䕶軍守衛九年奉㫖自今軍興之際軍兵以操演為急務五旗王公等所有門汛䕶軍驍騎著暫停看守各歸本營操演軍事旣竣仍令在該府門汛差務行走此間自令各該府屬佐領下軍兵看守乾隆十二年奉㫖順貞門之西北門令内府䕶軍守衛十五年奏準保和殿東西廊内庫各増䕶軍校䕶軍五人又覆準紫禁城外周圍増設柵䦨八座東華門西華門以南四柵䦨與汎撥相近即令兼守外東華門西華門以北請増四汛再闕左右門向繫歩軍守衛請易以五旗䕶軍若仍前分旗看守難於稽察請照上三旗䕶軍入直紫禁城内之例日以一旗輪直即令五旗司鑰長一人入直闕左門總轄以司各門啓閉日則𨽻於景運門直日統領夜則以前一日下班之䕶軍統領稽察每門及汛均䕶軍叅領或副叅領一人䕶軍校䕶軍十人日計官軍三百有一人每遇甲乙日為正紅旗班丙丁日為鑲白旗班戊巳日為鑲紅旗班庚辛日為正藍旗班壬癸日為鑲藍旗班每旗各二日以次輪流直宿一傳籌紫禁城内五籌逓傳每夕自景運門發籌西行過乾清門出隆宗門循而北過啓祥門迤而西過凝華門迤而北過中正殿後門迤北至西北隅迤而東過西北門順貞門吉祥門東北隅迤而南過蒼震門至東南隅迤而西仍至景運門凡十二汛為一囘紫禁城外八籌逓轉每夕自闕左門發籌西行過午門出闕右門循而西經西一汛至南柵䦨二汛迤而北經三汛柵䦨過西華門經一柵䦨四汛五汛六汛至西北隅七汛迤而東經八汛一柵䦨過神武門經一柵䦨九汛至東北隅十汛迤而南經十一汛十二訊十三汛一柵闌過東華門經一柵䦨十四汛十五汛至南柵䦨循而西經十六汛仍至闕左門凡二十二汛為一囘駐蹕行營内外汛傳籌各五亦如之一禁門啓閉順治初年定恭遇車駕出入各門均啓中門以景運門直班統領率隆宗門叅領祗承其事並令䕶軍清蹕每夕景運門直宿司鑰長率官軍自後左右門中左右門左右翼門太和門昭德門貞度門以次驗視扄鐍午門以隆宗門䕶軍叅領東華門以蒼震門䕶軍叅領西華門以啓祥門䕶軍叅領神武門以順貞門今吉祥門䕶軍叅領分視扄鐍畢遣䕶軍校繳鑰於司鑰長以各門鑰彚貯於篋復加扄鐍其篋鑰司鑰長親自佩之次日各門校領鑰仍令司閉者司啓日以為常雍正四年奉㫖發出景運門隆宗門東華門西華門神武門隂文合符各一扇傳諭䕶軍統領如遇夜有奉㫖差遣及𦂳急軍務應即時啓門者竢大内持出陽文合符至門該䕶軍叅領將該門之隂文合符照驗明白即行啓門仍報知統領其蒼震啓祥等門遇陽文合符至門該䕶軍叅領即報統領親齎隂文合符至門與陽文合符照驗啓門於次日具奏平時啓閉仍遵例行乾隆十五年定端門天安門大清門一如紫禁城門之例委䕶軍叅領一人驗視扄鐍畢各門䕶軍叅領收匙鑰遣䕶軍校報於闕左門直宿司鑰長次日啓門亦如之二十二年奏準文華殿守衛易以䕶軍校二人䕶軍八人銀庫易以䕶軍叅領一人䕶軍校二人䕶軍十人一稽察出入國初定大清門禁門東西翊門均令大臣侍衛䕶軍嚴加守衛稽察出入禁門除直日人員外不許容留閒雜人等凡禁門内外不許背坐不許於御道上坐親王以下出入不得行御道又定王以下文武官入朝至下馬牌處下馬停其儀衛親王郡王貝勒各隨䕶衛二人貝子隨䕶衛一人其餘官員不許跟隨人役入朝又定紫禁城門宻邇宫殿百官執事人等不得擅行出入其王公大小官員執事人等準於應行之門出入者由該直班前鋒䕶軍統領䕶軍叅領詢明放入如聽不應入之人濫行入門或從應入之大臣攜帶入門者察出將直班之前鋒䕶軍統領䕶軍叅領及攜進之大臣分别議處又定凡内閣及各部院衙門堂司官八旗都統叅領官校及各衙門書吏均於午門左門出入其右門王公之外不得行走内大臣侍衛内務府屬堂司官員及各執事人内監厨役工匠服役人等於東華門西華門神武門及應行走之門出入均將姓名所𨽻旗分佐領内管領備細造冊咨送登於版籍工匠服役人等由本管衙門各給以烙火印腰牌書姓名差役持為出入符驗以䕶軍之識字者即巴克什專司檢閱門籍譏其出入籍内無名及不帶腰牌者不準放入又每門設紅杖各二以䕶軍二人更番輪執坐於門口親王以下經行皆不起立有不報名妄自擅入者撻之順治三年定親王入朝至午門外下馬下轎九年題準凡入朝除内大臣䕶軍統領䕶軍叅領侍衛外其餘諸王曁公侯伯大臣以下各部院衙門官員皆由午門出入不許由東華門西華門神武門出入入午門時親王隨䕶衛六人世子郡王隨五人貝勒隨四人貝子隨三人公隨二人民公侯伯都統尚書子䕶軍統領副都統侍郎許隨一人其餘官員入午門不許隨從至紫禁城四門并準厮役人等行走由守門叅校逐一詢明放入無故溷入者送刑部治罪若不逐一詳問致有妄入者該統領察出將守門叅校一并叅奏治罪又定親王乘轎馬至午門外下郡王至午門前兩配樓角下貝勒以下在闕左右門外下馬牌處下馬又定親王以下貝勒以上進午門許隨䕶衛一人貝勒以下不許隨進十年題準漢大臣進午門照九年所定滿洲大臣例許隨從一人康熙元年題準親王以下公以上進午門時隨從人數照順治九年例如至御前止許隨䕶衛一人六年題準親王郡王進午門時止許隨䕶衛二人貝勒以下公以上許隨一人二十一年題準親王以下貝勒以上如未滿十六歲者至御前許隨䕶衛二人又定凡親王以下曁文武官如奉召入朝許由東華門等三門出入其諸王貝勒年未滿十五歲者曁内閣翰林院詹事府官許由東華門等三門進二十二年題準聖駕出入及陞殿上朝官員隨從人役有喧譁擁擠者䕶軍校等嚴拏交各該衙門治罪二十三年覆準大内中路乃鑾輿經由御道官民不得行走午門内交與守門直班䕶軍叅領䕶軍校午門外交與兵部闕左右門天安大清等門交與直班歩軍尉歩軍今五旗䕶軍叅領䕶軍嚴加察緝如有直行御道者繫官交該部題叅議處繫兵民送刑部治罪如直班官員兵丁徇情不舉被科道官糾叅該直班官兵一并究處六十一年十二月奉㫖年老大臣皆皇考舊人自午門外歩行進内奏事甚為勞苦將諸王曁六十五歲以上大臣列名具奏隨遵㫖開列具奏奉㫖凡許令乘馬之六十五歲以上大臣曁親王郡王皆令乘馬由東華門入者至箭亭旁下馬由西華門入者至内務府前下馬其有未至六十五歲而所管事務殷繁朕常召問者亦令乘馬乾隆二年奏準凡遇皇帝臨朝聽政之期令䕶軍統領撥䕶軍於各禁門及館閣門巷等處小心巡視環列䕶衛除朝服官許進午門其餘不得肆行出入又議準凡官員入朝及在公署不許帶雨纓涼㡌凡官員及直班䕶軍等不許著大衫入紫禁城又定凡遇躬祀壇廟及御殿之日各執事官軍人等均於五鼓入内祗候暗中難辨嗣後各令其官員頭目統率而進告明人數一并放入其平時奏事部院臣僚均於昭德門中左門後左門出入又奏準内閣兵部理藩院官并準於景運門隆宗門出入其協和門熙和門昭德門貞度門百官執事人等均準出入惟不準厮役行走擅入者治其主并罪守門官校七年議準凡遇躬祀大典扈從大臣應於午門前乘騎者撥親軍於午門前備馬如僕從人等擅乘馬入闕門雜沓馳驟者該管官即行嚴拏治罪並將其主叅處十五年奉㫖定例惟諸王於紫禁城内乘馬今大臣中朕尚有加恩令乘馬者嗣後在内貝子以上亦準於紫禁城内乘馬十八年奏準王公等進午門隨從人仍請照順治九年定例親王隨從六人世子郡王五人長子貝勒四人貝子三人公二人東華門西華門神武門除内廷行走及直班有政務王公外不得任意行走凡進後左門景運門隆宗門親王世子隨從三人郡王長子貝勒二人貝子公一人二十二年具奏皇帝御殿日三成階上散茶之侍衛執事人並隨王公之䕶衛及有執事官員等或因人多擁擠至立於階上正面請嗣後交䕶軍統領於階上及東西兩角各委䕶軍叅領侍立管轄凡有執事官員等均於兩旁站立倘仍前在階上正面立者䕶軍叅領即行拏交監禮御史指名叅奏奉㫖此奏是丹墀鹵簿後兩邊著令官員侍衛稽察階上兩角令䕶軍叅領管轄之處皆如所奏交各該處奉行至階上散茶見有侍衛其尚茶人等交該管大臣酌量足用不得多委再隨王公等執坐褥者不必需用多人嗣後王公每人止令各隨䕶衛一人内監皆不得升階將此交直班之䕶軍統領務須嚴察違者即行叅奏欽此一各門軍器順治初年定凡禁門及各汛紫禁城四門䕶軍校䕶軍直宿之處並令陳設櫜鞬弓矢長槍等項軍器其數目視直班官軍弓每日令弓匠張弛矢每十日令箭匠端杆磨鏃並礪槍年終見新其平時有應行修整者該直班官軍呈報統領行文武偹院修整雍正元年定各門櫜鞬每八年弓矢十年槍十五年更換一次若未至更換之期至毁損不堪者統領劾奏將官軍嚴處一朝㑹燕饗執事順治初年定上三旗前鋒䕶軍叅領副叅領侍衛均分兩翼鑲黄旗於左翼正黄旗於右翼正白旗半為左翼半為右翼每日黎明除直宿有差外均㑹集於太和門列坐於左右門外隨侍衛一同授茶年節上朝亦如之朝賀燕饗及常朝御殿各按品級隨侍衛行禮侍班大燕日以上三旗䕶軍叅領六人監視䕶軍校䕶軍展王公百官席羃其下五旗前鋒䕶軍叅領侍衛除有差外年節及常日於本旗本王公府第同長史䕶衛等上衙門康熙年間定大燕日以上三旗䕶軍叅領六人舉御饌案一扈蹕車駕在禁城内出入直日前鋒䕶軍於經由之門輪流侍立並稽察官軍清蹕躬祀壇廟統領一人同散秩大臣侍衛班領於豹尾班後管束駕詣南郊八旗每旗委䕶軍叅領四人䕶軍校䕶軍百人自午門起至齋宫分翼於車駕經由之路兩旁清蹕又以八旗叅領八人䕶軍校䕶軍八十人於神樂署周圍清蹕齋宫外設十四汛以八旗䕶軍叅領六人每汛䕶軍校䕶軍十有一人守衛齋宫左門䕶軍統領一人上三旗司鑰長一人䕶軍叅領一人䕶軍校䕶軍二十人宿衛齋宫右門上三旗協理事務叅領一人䕶軍校䕶軍二十人宿衛成貞門西大門上三旗司鑰長一人䕶軍叅領一人䕶軍校䕶軍二十人宿衛外壇西門外下五旗䕶軍叅領二人䕶軍校䕶軍二十人宿衛内壇西門下五旗協理事務叅領一人䕶軍叅領一人䕶軍校䕶軍二十人宿衛圜丘外周圍清蹕䕶軍叅領二人䕶軍校䕶軍二十人駕詣北郊八旗每旗䕶軍叅領四人䕶軍校䕶軍百人自紫禁城至齋宫分翼於車駕經由之路兩旁清蹕又以上三旗䕶軍叅領三人䕶軍校䕶軍六十人於壇外西門至内壇北門清蹕駕御齋宫後於關廂清蹕又以下五旗每旗䕶軍叅領一人䕶軍校䕶軍十人内以兩旗於樂部宿處三旗於壇外西門外各清蹕齋宫設十有一汛以八旗䕶軍叅領八人䕶軍校䕶軍百有十人宿衛齋宫正門統領一人上三旗司鑰長一人䕶軍校䕶軍二十人宿衛内北門内西門各下五旗協理事務叅領一人䕶軍叅領一人䕶軍校䕶軍二十人宿衛駕幸瀛臺承光殿等處上三旗每旗以䕶軍叅領四人䕶軍校䕶軍百人於經由之路兩旁排立清蹕駕幸圓明園南苑等處八旗每旗以䕶軍叅領四人䕶軍校䕶軍百人於經由之路按旗分翼排立清蹕詣雍和宫八旗每旗以䕶軍叅領二人䕶軍校䕶軍五十人清蹕若即由雍和宫幸圓明園每旗以䕶軍叅領六人䕶軍校䕶軍五十人清蹕一行在宿衛扈從康熙年間定凡遇聖駕巡狩視道里之逺近日期之多寡每次合前鋒營計之奏除統領三人營總三人率䕶軍叅衛校士祗承厥事其䕶軍叅領䕶軍校䕶軍酌量委除奏聞一御營康熙初年定駐蹕之地均按嚮導總統等先期指示地盤䕶軍統領營總各一人率䕶軍叅領䕶軍校䕶軍豫徃同武備院卿司幄及工部官設立行營中建帳殿御幄繚以黄髤木城建旌門覆以黄幕其外為網城正南東西各設一門正南建正白東建鑲黄西建正黄䕶軍旗各二自東西門以後三面設連帳網城門䕶軍統領率八旗官兵守衛去網城百歩外八旗各設警蹕帳房專委官兵清蹕御營之前扈從諸臣不得駐宿東四旗在左翼西四旗在右翼均去御營百歩建鑲黄旗䕶軍纛於後正黄旗䕶軍纛於右正白旗䕶軍纛於左各按翼駐宿路中設頓營或一或二亦由嚮導指定地方䕶軍叅領率䕶軍設黄布幔城武備院建帳殿每日輜重行時御營輜重前行三旗營總䕶軍叅領三人率三旗䕶軍纛并行王以下輜重均隨纛行