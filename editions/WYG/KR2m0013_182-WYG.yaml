㫖改為副䕶軍叅領其員闕仍於應選補之人内擬定正陪引見補授又議準䕶軍營每旗印房設隨印協理事務䕶軍叅領副䕶軍叅領各一人隨印䕶軍校二人由該統領於見任䕶軍叅領副䕶軍叅領内各擬正陪引見補授其隨印䕶軍校由該統領於䕶軍校内選委知會兵部存案凡委出叅校仍兼本職毋庸開闕此叅校内有行走好辦事勤妥者該統領保舉庸劣怠忽者叅處若統領因辦事錯誤處分者隨印協理之叅校一并議處又奏準八旗游牧察哈爾每旗䕶軍叅領各二人徹囘京師改補火器營鳥槍䕶軍叅領定為火器營專設官向於䕶軍營䕶軍叅領内兼攝之例停止其游牧察哈爾䕶軍校員闕令察哈爾總管於應升人内選擬正陪送本旗統領驗看騎射引見補授六年奉㫖八旗補授䕶軍校驍騎校之時本佐領下簡選十人仍擬正陪各一人引見以八人備於外若正陪内無可簡用之人即以擬備八人引見其因佐領下無人於該旗簡選引見者止擬正陪各一人不必擬備十二年奉㫖副䕶軍叅領著定為四品乾隆元年奉㫖向例䕶軍校驍騎校皆升補副叅領署叅領今副叅領作為四品署叅領裁汰升途甚少嗣後副叅領員闕將䕶軍校驍騎校等與應行補授人員一并引見六年議準䕶軍叅領員闕由該旗統領會同本翼統領於本旗驍騎叅領冠軍使雲麾使一二等侍衛䕶衛前鋒侍衛副䕶軍叅領宗室一二等侍衛鎮國輔國將軍子男輕車都尉等官内遴選六七人副䕶軍叅領員闕以署叅領一人開列於前再於本旗副驍騎叅領雲麾使治儀正二三等侍衛䕶衛宗室二三等侍衛奉國奉恩將軍及佐領騎都尉雲騎尉世爵官内遴選二人並於䕶軍校内遴選一人均引見補授又議準司鑰長署司鑰長員闕仍照舊例於前鋒叅領䕶軍叅領鳥槍䕶軍叅領内遴選正陪引見補授又議準䕶軍校員闕由該旗統領會同本翼四旗統領於本佐領下親軍前鋒䕶軍領催食四兩錢糧之執事人内有出兵隨圍勞績久著者簡選雖出兵隨圍勞績久著而騎射平常人不及者即不入選止將騎射好人去得者簡選十人擬正陪二人引見其餘八人擬備在外候㫖若本佐領下不得其人於該旗内簡選止擬正陪不必擬備十七年議準停止擬備八人止以正陪二人引見補授又議準紫禁城内外門汛關繫甚重向以䕶軍校等委署叅衛一同直班但身繫䕶軍校究無叅衛職掌且本營並無應升五品職銜雖叅衛員闕例得開列於末品秩似覺逾越請於每旗増設委署䕶軍叅領七人於䕶軍校内遴選人去得嫻騎射能管束者擬正陪引見簡署叅衛給五品頂帶準戴孔雀翎仍食䕶軍校月餉與叅衛一同應差遇叅衛員闕將署叅衛列名於前與應行補授人員一并引見補授其署叅衛員闕即於䕶軍内拔其尤者委署給以金頂藍翎仍食原餉一署印順治年間定䕶軍統領有出差者移咨兵部奏署乾隆十二年奉㫖前鋒䕶軍統領遇有出差事故即以次旗統領兼攝如同時奉差止剰四五人始準奏請簡署十八年奉㫖嗣後䕶軍統領有出差行圍即剰四五人亦不必奏請署印止剰二人再行請㫖一拔補䕶軍康熙年間定䕶軍闕該統領會同本旗都統於本佐領下驍騎執事人歩軍閒散壯丁内均以正身選補戸下人不準雍正元年奉㫖席伯等向不選䕶軍嗣後有人才好者並令入選二年奉㫖凡年老䕶軍除應升䕶軍校驍騎校外其年已老邁又不能在應升之列者若竟革退殊覺可憫著統領會同都統等將伊等移於驍騎營行走其闕即令人材少壯之驍騎轉補如此則䕶軍亦得整齊矣又定敎養兵亦準選拔䕶軍一官員親隨兵養亷支借俸銀官軍優䘏均與八旗驍騎營同嚮導嚮導總統無定員由兵部開列前鋒統領䕶軍統領八旗副都統等職名奏請欽簡數人以一人掌印每旗於前鋒䕶軍營遴選叅領侍衛共四人前鋒校䕶軍校前鋒䕶軍共六人分理厥事遇車駕時巡先期率所屬官軍前徃相度周知山林川涂之道路通橋梁夷險隘計其程塗入告起鑾統領等照常引扈每日駐蹕後以次日程塗及駐蹕之所開列奏聞得㫖交行在兵部通行曉諭闔營安設營盤均由嚮導總統等先期指示擇髙燥之地飭所在有司修築平整頓營看城亦如之欽定大清會典則例卷一百七十八
