body:
  text: 吏部考功清吏司解支一起解錢糧物料康熙四年議凖直隸各省兵餉協餉定為五分限四月内完二分半九月内全完如行師大兵軍餉協濟别省錢糧或遲或誤者革職支給本省兵餉或遲或誤者州縣衛所官降三級司道府直隸州各降二級督撫各降一級皆令其戴罪督催完日開復五年議凖每年撥餉時如所撥餉内有水旱等災蠲免或撥文未到之前别用並解部及重撥之項該省督撫等一面動用别項錢糧照限協解一面将動支緣由開明題報如諉解借端謊行題報或所闕錢糧不動别項錢糧抵解以致遲誤者該管官革職布政使司降三級調用督撫降二級留任至解餉省分督撫照所限月底将起解數目題報如不曽起解謊以起解具題者革職不依所限月底題報者罰俸一年如已徴錢糧撥給稽遲以致兵逃兵譁或察報時将兵逃兵譁情由朦隐不報及報不實者皆革職該管各官将此等情由已經申報而該督撫不行糾叅者降二級調用如已經安定者免議其不候所限四月九月分錢糧分撥時即将十分全徴者經徴官降二級調用督催官降一級調用督撫罰俸一年如官員解送錢糧等項沿塗停閣日期者罰俸一年九年題凖官員起解兵餉漕糧白糧本色顔料等項如該管司道府等官不委見任佐貳濫委廢官匪人解送或中塗誤失者原委之官降一級調用如中塗無有誤失罰俸一年如委見任官解送中塗誤失者原委之官罰俸六月如解官起解錢糧侵欺潛逃者原委之官降一級留任如不曽差官批迴内填寫差官及不差職官者皆罰俸一年又題凖各省採買物料等項承估布政使不照時價確估妄行多開者罰俸一年廵撫罰俸六月如不與上司驗看解送徑行解部者罰俸六月十四年議凖部撥錢糧關繫軍需若限期急廹不能依限起解者先具題展限如擅改部限者降二級調用十五年議凖官員将不應起解之錢糧違例起解者罰俸一年或應免本色錢糧解送折色者降一級調用又議凖官員起解錢糧不行詳察銀匠銀内攙和鉛沙者降三級調用廵撫罰俸一年如解送潮銀者降一級調用廵撫罰俸六月又議凖解送顔料等項如解官中塗乾没交納短少者即照侵欺例治罪又議凖解官到部稽遲所解錢糧全完者一月内仍免其議處逾一月以外者罰俸一年十八年覆凖州縣官隔年豫徴錢糧督撫察叅照私派例将州縣等官革職拏問司道府各官明知不報者将司道府各官革職詳報督撫不行題叅者将督撫降五級調用其豫徴錢糧即凖為次年正項錢糧二十六年題凖委解藉病推諉規避者革職二十八年議凖錢糧物料等項解送到部限一月察覈明白掣給批􅂞倘於限内不行察收及不給發批迴者該堂官即行察叅将該司官照逾限例議處至書役人等指稱估驗掣批掛號等項費用名色借端包攬索詐者許解官解役即於該衙門首告将包攬索詐之人交與刑部治罪繫官革職仍交與刑部治罪如該管官失察者照失察衙役犯贓例議處如明知不舉者照徇庇例降三級調用如解官豫先囑託和同行賄聽其包攬者與受一例治罪如虧空著令賠補者竢完日給批不在計限之内乾隆四年覆凖官員採辦一切物料等項督撫以不能按限完解題請展限經部覆凖之後仍不依限完解者将原題請之督撫罰俸六月十六年遵㫖議定各省委官運辦鹽銅鉛錫等項令該委官領解之日一面申報原委督撫一面申報沿塗督撫一竢入境即報地方官察驗至出境時該地方官驗明無事即具出境印結申報該管上司並知會接省地方官一體嚴察但不得因有盤察出結之責藉端留難不顧委官守候稽遲以致違限如有出境盗賣揑報遭風失火情事該地方官立即申報本境督撫題叅究擬不得諉之原委省分督撫致滋疎縱倘經過地方文武官弁有瞻徇隐匿不行申報境内督撫别經發覺将經過地方文武官皆照糧船謊報漂没汛地文武各官不親臨確勘例革職如地方官已經申報而境内督撫不嚴察叅奏者照不掲報劣員例降三級調用倘有藉端留難等弊該督撫等亦應嚴察如經過地方故為抑勒以致出境稽遲者一并叅處一支放錢糧康熙十四年議凖各營放餉遴委賢能官員親臨察閱抽封稱兌按名給散如奉委官員監放推委不親臨察閱者罰俸一年如已經親臨不抽封稱兌致有劣弁短少色數繫失於詳察者監放官降一級調用如監放官知劣弁有扣剋情弊不即申報事發者監放官照徇庇例降三級調用如有通同扣剋情弊監放官革職提問又議凖各省採買米榖豆草估價均照督撫所定如估價多開者或被旁人首告或被科道題叅審繫情實原估官革職提問轉申官降四級調用奏銷督撫降二級調用如督撫布政使道府等官通同多算者皆革職提問凡米榖豆草多算被上司察出督撫察叅者察出上司察叅督撫免其處分其餘估計奇零雜項既經部駁重估所估價直不確妄行浮開者罰俸一年廵撫罰俸六月十五年議凖軍前供應米豆草等項如地方官将價直浮冒開銷督撫察出題叅照貪官例革職拏問如奏銷完結之後或被科道糾叅或被傍人舉首将督撫一并照貪官例治罪其舉首之人繫官照應升之官加一等優升繫旗人民人授為七品官至民間運到米豆草地方州縣官故意遲延抑勒刁難需索又州縣官解到米豆草司道府等官有故意延挨抑勒刁難需索者督撫察出題叅将經收官員皆照貪官例革職拏問此等情弊被害之人控告督撫而督撫不行凖接糾叅将督撫亦照貪官例治罪如督撫不行察出或被科道糾叅或被傍人舉首其督撫各降四級調用該管司道府等官革職至軍前運到米豆草等項經收委部官員及武官延挨抑勒刁難需索者将軍及統兵大員察出題叅皆照貪官例革職拏問此等情弊經收官員申明将軍統兵大員而不行糾叅者将軍統兵大員叅贊大臣亦皆照貪官例治罪将軍統兵大員不行察出或被科道糾叅或被傍人舉首将軍統兵大員叅贊大臣降四級調用其該管武官革職其出首之人繫官照伊應升之官加一等優升繫旗人民人授為七品官至出征将軍統兵大員並大小官員及督撫提鎮以下大小官員筆帖式欽差部差官員筆帖式科道翰林等官販買米豆草等物囑託地方官多取價直或将民間所賣米豆草作為己物囑託地方官令其收買並經理地方官将所囑託米豆草等物徇庇收買皆照貪官例革職拏問至已備本色不行收納有抑勒折價者将軍統兵大員及督撫察出題叅皆照貪官例革職拏問将軍統兵大員督撫不行察出或被科道糾叅或被傍人舉首将軍統兵大員督撫各降四級調用司道府等官並該管武官皆革職出首之人繫官照伊應升之官加一等優升繫旗人民人授為七品官至将軍統兵大員及大小官員並督撫提鎮以下大小官員筆帖式及欽差部差官員筆帖式科道翰林等官将本身馬匹徇情囑託送入驛站營伍馬匹數内多取價直一應購買馬匹不開實價以少為多濫行開銷者皆照貪官例革職拏問若驛站營伍官員人等申明督撫提鎮而不行題叅或不行察出奏請完結之後或被科道糾叅或被傍人舉首将督撫提鎮皆照貪官例治罪出首之人繫官照伊應升之官加一等優升繫旗人民人授為七品官又議凖支應芻粟物料不發見銀採買借取於民給價短少以致累民者督撫察叅将州縣等官革職拏問明知不報之司道府官亦革職拏問詳報不行察叅之督撫革職又議凖凡官員未經解送正項錢糧之先豫給官役俸銀工食或不按季給發全給重支或違例給發錢多銀少者皆降一級調用轉詳官罰俸一年廵撫罰俸六月又議凖官員應給民價不速給遲延者罰俸一年如半給半不給者降二級調用竟不給者革職雍正五年議凖凡地方有軍需公務督撫不及咨題者行令該州縣墊辦或那庫項或墊已資先行詳明督撫辦完十日内即照實價申詳院司道府該院司道府限两月内覈明題銷倘州縣申報過限或督撫題報後期户部察明月日皆交部議處其司道府逾限不行覈轉亦照例察明交議若該州縣報價不實及督撫不據實覈明題報希圖冒銷者户部題叅州縣照侵欺例治罪督撫司道等官皆照徇庇例議處盤察一清盤庫項康熙十四年議凖官員庫内物件不行固貯以致庫使偷盗者降一級調用罰俸一年二十七年題凖各省藩庫交代錢糧定限两月如有侵欺虧欠等弊将隐匿不叅之該督撫革職如督撫有侵欺入已之處照侵欺例治罪二十八年題凖糧驛二道庫貯錢糧責成藩司各府庫貯錢糧責成各該道如無道員管轄之府委令鄰近道員於奏銷時清盤如無侵那虧空情弊即具保結呈送廵撫倘保結之後仍有察出侵那虧空者該撫題叅将藩司各該道皆革職分賠三十九年覆凖州縣府道收貯錢糧於地丁正項及常平倉榖外一切雜項錢糧該管上司一并照例盤察又題凖上司盤察所屬倉庫例責年終時限甚廹嗣後於次年奏銷前秉公清察據實出結四十四年覆凖盤察州縣倉庫錢糧如有不肖知府需索州縣者許州縣即時通報司道督撫題叅革職如督撫不行題叅将督撫照徇庇例議處五十九年覆凖知府盤察倉庫州縣禮物永行禁止如仍餽送而知府收受者将餽送禮物之州縣收受之知府照餽送禮物例議處雍正元年議凖各省藩庫錢糧於每年奏銷時該省有總督者令總督監同廵撫親身盤察無總督者責成廵撫親身盤察錢糧無闕出具印結於奏銷本内一並保題如有虧空該督撫即行題叅如督撫扶同徇隠不行題叅虧空事發之日将監盤之督撫一并革職照例分賠如督撫抑勒下司那墊濫動以致虧空者該布政使司即據實通詳各部院衙門或通詳不便即具掲宻送各部院衙門據掲奏聞将督撫照貪官例革職拏問又議凖凡銀庫匙鑰司道自行掌管庫使止令看守封識遇有錢糧出入禀明布政使鹽道方許開庫不得自專其藩司鹽道有侵用那移抑勒庫官者許庫官徑行掲報如果舉報得實該督撫廵鹽御史題請議敘以應升之官即行升用其或通同隐匿事發一例治罪如庫官已經據實掲報督撫廵鹽御史徇隐不行題叅照徇庇例議處乾隆二年議凖州縣官徴收錢糧計算道路之逺近酌量錢糧之多寡隨徴隨行解司如有任意遲延不即起解者即令該管府州察報督撫覈叅分别遲延月日議處至該管府州有督催之責自應竭力催解倘有聽其遲挨直至撫司行提催解者将府州一并察叅照督催不力例罰俸六月如州縣批解錢糧而布政使司抵充雜派扣批抑勒不發許州縣官申報督撫徑報部院衙門題叅将布政使司照批囘改那例議處十四年議凖道員知府直隸州知州盤察所屬正項錢糧時将庫貯兵餉一并盤察出結如有虧空即行據實掲報倘該上司並不實力清盤及至交代不清始行掲報照盤察不實例分别察議一虧空分别處分開復康熙九年題凖司道府州縣等官如錢糧米豆正雜等項擅自那移别用者皆革職如正雜錢糧米榖豆草不報明該撫以𦂳急軍需私自那用者降一級留任竢賠完之日聽該督撫題請開復如存留錢糧因公那用者免議四十四年覆凖州縣倉庫錢糧責成知府盤察於每年奏銷時出具所管州縣倉庫實貯無虧印結造冊申詳保題仍令不時盤察無論幾時察出虧空立即掲叅免其革職分賠若州縣虧空知府有扶同徇隐情弊别經發覺者将知府叅革令知府獨賠如知府止繫盤察不實不行掲報或别案發覺始行報出者繫那移将知府革職令知府分賠繫侵欺知府照失察侵盗律議處免其分賠五十九年覆凖州縣官恃有上司分賠之例将庫銀藏匿假揑虧空者督撫據實題叅審明是實著落本犯名下獨追還項仍照例治罪又議凖各項拖欠錢糧該撫每年奏銷或拖欠在民或本官乾没或衙役侵欺逐一題明委繫拖欠在民不能催徴者照定例處分如繫本官乾没者照貪贓例革職提問仍於本官名下追清還項如衙役侵欺者該管官照縱役貪贓例革職其侵欺衙役交與該撫提拏嚴審追清完項州縣官乾没侵欺等情司道府等官豫先不行察出或據詳代為開銷者司道府等官各降一級調用督撫罰俸一年又議凖州縣官如衙役侵欺錢糧揑報民欠知府不行詳察遽為轉報者罰俸六月雍正元年諭虧空錢糧各官若革職留任催追必致貽累百姓伊等既已獲罪革職豈可復留原任嗣後虧空錢糧各官即行革職著落伊身勒限追還若果清完居官好者該督撫等奏明欽此二年諭朕惟錢糧固屬𦂳要而民瘼尤宜體䘏聞有州縣虧空錢糧百姓情願代賠者此端斷不可開虧空之官未必愛民况百姓貧富不等斷無闔縣情願代賠之理或繫棍蠹勾連借端科斂或不肖紳衿一向出入衙門通同作弊及本官被叅猶冀題留復任因而號召多事之人連名具呈稱繫闔縣願賠後官畏承追處分接呈入手即差役按里追呼名為樂捐其實強派其為民累不淺嗣後紳衿富民情願協助者聽其自行完納其有闔縣具呈者即将為首之人治以重罪如府州縣官擅凖派賠著該督撫察叅重處至因公那移之項依限全完定例凖其開復嗣後督撫題報全完即給咨本官令其隨本引見朕觀其人可用者即用如不可用以原品休致其年老及不願補官之人亦於本内聲明給還原職不必來京欽此又諭凡官員虧空錢糧倉榖該管上司失於盤察自應革職分賠但定例虧空官員審無侵欺入已之項勒限一年内賠補全完凖以原職補用而失察革職之上司轉不得與本官一例開復似屬可憫嗣後虧空銀榖限内全完例應開復者該督撫察明原叅失察之上司一并題請開復欽此四年議凖州縣侵那虧空審明確繫知府徇隐獨賠之項将知府照例革職離任本犯擬罪監追勒限三年完補無論本犯完補或知府協同完補但能於一年内全完繫侵欺之項本犯擬死罪者照例減二等發落擬軍流徒杖者照例豁免徇隐之知府不凖開復繫那移之項至二萬两以上者一年内全完本犯照例釋免未至二萬两者一年内全完本犯照例凖其開復其徇隐之知府亦照雍正二年八月上諭上司與本官一同開復之例皆凖其開復如二限三限完補者本犯照例分别發落若三年限滿不能完足即将本犯治罪察實果繫家産全無無力完帑不論是侵是那将未完之項盡數著落徇隐之知府勒限一年完補除徇隐侵欺之項雖經全完不凖開復外繫那移之項能於一年内全完凖其開復一年限满不完再限一年完補若能於二限内賠補全完照依原職降一級調用二限内完不足數再限一年完補若能於三限内全完照依原職降二級調用三限内不完即将知府家産搜察變補若即賠補全完亦不凖開復如州縣虧空知府失於覺察繫侵欺之項除本犯照例嚴追外失察之知府照失察侵盗本律議處免其分賠如繫失察那移例應分賠之項将知府革職其虧空之項亦先在本犯名下勒限三年追補一年内全完将本犯及不行掲報之知府皆凖其開復二限三限完補本犯照例分别發落若三年限滿不能完足将本犯治罪察實果繫家産全無無力完帑将未完之項著落不行掲報之知府分賠一半其餘一半入於無著項下完結其知府分賠一半銀勒限一年完補一年内全完凖其開復不完再限一年完補若能於二限内全完者凖其開復於補官日罰俸一年如二限内完不足數再限一年完補若能於三限内全完者照依原職降一級調用如三限内不完不凖開復未完銀仍著落追賠又議凖州縣錢糧倉榖虧空題叅時一面於任所嚴追一面行文原籍将其家産嚴察存案如任所無完即變價補完若承追地方官不行察出照徇庇例議處乾隆元年覆凖承辦虧空人員如有遲延違限者遵照欽部事件定例違一月者罰俸三月違二月者罰俸六月違三月者罰俸九月違四五月者罰俸一年違半年以上者降一級留任違一年以上者降二級留任違二年以上者降三級調用三年覆凖州縣侵項不能一年内全完者知府革職不凖開復若本犯侵項於一年内全完令該督撫将失察之知府確察平日居官如何出具考語給咨送部引見請㫖七年奏凖凡虧空之案審出民欠那墊是實除将本犯照例議罪外再限四月委官徹底察覈出具並無假揑影射印結再令接任官出具認徴印結仍向欠户催徴如限满不完将接徴官照例叅處倘本無舊欠接任官通同揑結察出與本犯同罪仍令分賠十二年議凖州縣虧空經該管道府察出掲叅各免其失察處分如例應責成盤察保結之屬官竢其離任身故後始叅虧空實繫從前盤察不實應無論其掲報與否将該管道府以失察附叅照失察州縣虧空例分别議處所虧錢糧亦照失察侵那定例分别著賠十四年奏凖道員失察知府直隸州知州虧空照失察例降四級調用至失察州縣虧空既責成盤察不實之知府其道員自應量為酌減如該管道員不豫行掲叅州縣虧空者降一級留任十五年議凖州縣侵欺帑項限满不完既著徇隐之知府賠補則著賠之日即應将知府之原籍房産令該地方官察記冊籍申報上司如能依限代賠全完房産給還仍照例凖其分别開復降調如三限已滿變抵房産仍不足數即照例治罪一清盤倉榖康熙三十九年覆凖凡州縣收貯米榖遇􅄓風大雨等災挽運江海漂流並霉爛者該督撫題叅著革職離任原闕别補限一年之内賠完免罪復還原職别補如逾限一年賠完免罪不復原職二年之内如不賠完仍照律例治罪著落家産追賠五十九年議凖州縣霉爛倉榖不論在任解任以及分賠之知府果能一年限内全完者皆一例凖其開復雍正元年議凖各省存倉米榖雖有知府盤察司道管理不能保其一無徇隐當責之督撫覈實嚴察年終造冊保題至督撫升轉離任将冊籍交代新任督撫限三月察覈奏聞如有虧空即行題叅倘新任督撫徇隠不行據實叅出後經發覺一并照例議處仍令分賠三年遵㫖議定州縣虧空倉榖繫侵蝕入已者照侵欺錢糧例擬斷繫那移者照那移庫銀例擬斷其倉榖令接任官於秋成榖賤時申詳督撫藩司酌動何項錢糧照時價先行買補該州縣出具倉收道府加結報部於虧空人員及妻子名下勒限一年将動用銀照數追補還項如逾限不完照例治罪其有倉厫州縣倘因循怠玩於滲漏處既不黏補應蓋造處又不詳請以致米榖霉爛者革職動帑買補勒限一年照數追賠限内不完照例治罪若倉厫既經修理猶有託名霉爛虧空者亦照例革職治罪又議凖州縣每年借出榖自秋收後勒限徴比務於十月内全數完納造具冊收送部年終令知府直隸州知州親徃盤察府州倉榖責令該管道員盤察出具印結申報如逾限不完或揑造冊收即行掲叅議處仍令欠户照數完納如該管上司不行掲叅照徇庇例議處再倉榖有存七糶三之例其出糶之時該督撫轉飭地方官嚴行察禁如有囤積射利之徒即訪拏按律治罪該地方官若不嚴行察禁該督撫題叅照溺職例議處或有不肖州縣以糶借為名掩飾虧空該督撫即行指叅嚴審是侵是那分别定罪追賠該管道府直隸州知州有不時盤察之責如有徇隐失察等情亦即題叅照州縣官侵那錢糧知府徇隐失察例分别議處所虧倉榖著落賠補如道府直隸州知州已經掲報督撫不行題叅者将督撫亦照徇庇例議處所虧倉榖亦照例分賠乾隆四年奏凖各省常平倉榖初次採買遲延經督撫察叅送部議處将承辦官罰俸一年如再不完将承辦官革職留任完日開復五年奏凖凡州縣官採買米榖如不親身平買運倉轉發里遞分派花户勒令採買者将州縣官降三級調用八年覆凖如有将未進倉榖溷行入冊揑報者照未完之錢糧揑以全完轉報例革職其該管上司知而徇隐照徇庇例降三級調用若止失於覺察照失於覺察例罰俸一年十二年議凖各州縣所需食米務令自行置買不得碾用倉榖該管上司亦不得給發價直令所屬州縣碾榖供應仍令各該督撫不時密行察訪倘有州縣碾用等弊委官盤察若察出将不行掲報之瞻徇各上司一并叅處如已經掲報而該督撫不即題叅者照例議處十八年議凖凡採買撥運糧米經由江洋黄河偶遇風浪猝被漂失者辦運各官立即報明所在地方飛往勘訊明確果無虚揑别情取具承勘不扶印結申詳督撫司道覈實一面咨部一面移咨辦運省分照例具題請豁若遇失水該運官並不報明地方官将運官照沉溺漕船不報例降一級調用如有乘機侵盗等弊革職治罪未經題豁之先不将失水情形立即勘明豫報戸部及該省者照失於覺察例罰俸一年所在官司有瞻徇草率扶同出結情弊照沿塗催䟎各官不親臨確勘的實遽出保結例革職如該督撫不嚴察確實遽行題豁後至詐冒事發所題督撫降二級調用所豁糧照例著落承辦及出結各官名下按數分賠一造冊批廻康熙十五年覆凖官員造報各項文冊遲延或限内並違限不及一月及違限一月者皆罰俸三月違限两月者罰俸六月違限三月者罰俸九月違限四五月者罰俸一年違限半年以上者降一級留任違限一年以上者降二級留任違限二年以上者降三級調用其文冊遺漏重開數目舛錯或多開少造遺漏職名者皆罰俸三月該管各官未經察出據冊轉報罰俸一月如府州縣官員造報奏銷錢糧冊内有數目舛錯遺漏者總督廵撫不行察出經該部察出者将該府州縣官罰俸一年總督廵撫及轉報司道各罰俸六月再督撫司道所造冊内有數目舛錯遺漏者亦各罰俸六月如司道府州縣官将奏銷錢糧冊結遲延不送經該撫題叅或限内並違限不及一月者罰俸三月違限一月者罰俸六月違限两月者罰俸九月違限三月者罰俸一年違限四五月者降一級留任違限六月以上者降二級調用違限一年以上者革職如司道府州縣官将冊結申送督撫而督撫遲延不隨各案一并送到者經該部察出題叅之日将督撫違限五月以下者亦照司道府州縣官例處分如違限六月以上者降二級留任違限一年以上者降三級調用如應行完結之錢糧不行分晰明白溷行造冊将溷行造冊之府州縣官降一級調用溷行轉報之司道罰俸一年不行詳察之督撫罰俸六月如司道官自行造冊不分晰明白者降一級留任又議凖布政使抑勒州縣衛所官将批迴改那或以新填陳以此那彼情弊該督撫指名題叅照那用正項錢糧例處分如該督撫徇情不行題叅者将該督撫照徇情例降二級調用欽定大清會典則例卷十六
