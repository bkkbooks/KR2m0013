body:
  text: 吏部文選清吏司旗員開列一大學士以下三品京堂以上原例開列具題康熙十年議準大學士員闕請㫖開列先將員闕應否開列奏請得㫖後開列具題又奏準各部院尚書改吏部尚書各部左侍郎員闕由右侍郎轉吏部侍郎員闕各部院侍郎亦行開列又議準應補官假滿服滿病痊人員照文到日期開復降級照奉㫖日期與應升官一同開列題請簡用凡應補官均列名在應升之先各項應升官均按衙門次序列名雍正四年遵㫖議定各侍郎員闕未經開列之先奉特㫖補授有人無左右字樣者將見任右侍郎應否轉左或新授之人即授為左侍郎之處具奏請㫖五年奉㫖凡補授大學士尚書時應否令其在議政處行走具奏請旨欽此乾隆十三年諭大學士闕定例請㫖開列亦有遲至一月後始行請旨者朕思大學士職司襄贊如其宣力有年遇有告休病故不忍遽行開列應俟至一月以後乃國家眷念舊臣加恩輔弼之意若緣事降革機務重地未容久曠自應即行開列不必請㫖將此載入會典永著為例欽此一四五品京堂康熙十年題準論俸升補雍正六年議準通政使司副使大理寺太常寺太僕寺少卿鴻臚寺卿等闕均不分滿洲䝉古通行論俸開列升補其郎中應升各闕除內閣侍讀學士仍按滿洲䝉古補用乾隆三年議準滿洲䝉古科道均準內升外轉遇有京堂員闕先將內升科道開列具題補用一人再有闕除科道毋庸開列外將俸深郎中論俸開列四人引見候㫖簡用其出差外任者不行開列如內升科道無人仍將俸深郎中論俸升補科道不準通行論俸四年奏準內閣滿洲漢字侍讀學士員闕將漢字出身之郎中等官論俸擬出十人送內閣考取擬定正陪交部與各項記名議敘人員一同開列引見補授其內閣清字侍讀學士二員將應升各官論俸擬正陪升補五年奏準凡降級補四品京堂人員遇有闕如值內升班次即以奉㫖降級日期與奉㫖內升日期論先後一同開列如值俸深班次將降級應補人員列名在俸深應升人員之前一同引見若奉㫖將降級之人補授無論內升俸深班次均不積算如上次用內升則下次仍用俸深不算過班其通政使左參議光祿寺鴻臚寺少卿員闕將應升之滿員外郎等官除出差外任不行開列外論俸開列四人引見如有降級應補人員列名在俸深應升人員之前一同引見候㫖簡用又奏準奉㫖記名各官如由科道記名者遇有應升與內升之科道論奉㫖日期先後開列具題由郎中等官記名者開列在俸深郎中之前將記名之處聲明一同引見候㫖簡用補授後各按本班照例積算又奏準議敘應升四品京堂之科道郎中等官均論其議敘奉㫖日期先後遇有員闕入於俸深郎中等官開列四人之末依次引見候㫖簡用若遇內閣侍讀學士員闕如繫清字之闕其應升人員無論清漢字樣均行開列如繫漢字之闕其議敘人員察其漢字出身者仍照例開列其由清字出身者停其開列一翰詹官員順治初年定翰林院侍讀學士員闕由侍講學士轉侍讀員闕由侍講轉詹事府左庶子員闕由右庶子轉左中允由右中允轉左贊善由右贊善各轉補雍正四年議準侍講學士侍講詹事府少詹事右庶子洗馬右中允等員闕將應升之翰詹官員與科甲出身之部屬應升官員分班簡用均論俸擬正陪引見請㫖如部屬無科目出身人員即將翰詹官員升補十二年奉㫖滿洲贊善員闕將俸深之小京官筆帖式各一人引見請㫖著為定例欽此乾隆七年議準翰詹員闕凡開復降補人員亦列名於應升官之前一同引見補用十三年奏準嗣後於六部滿員外郎內每部酌定一人作為科甲人員升轉之階遇有員闕將科甲出身之主事等官升用俾翰詹衙門升轉時不致乏人又奏準內閣侍讀學士翰林院侍講學士侍講詹事府少詹事庶子洗馬員闕其論俸應升擬正人員遇有出差者或將論俸擬正之人補授或將其次論俸應升之人别擬正陪引見補授之處皆行奏聞候㫖遵行十六年具奏見出有侍講一闕上次已用部員此次應用翰詹但應升編檢班內止有檢討一人既不便即將該員指補亦不便因無擬陪之人將該員扣除别將部屬人員升用相應請㫖可否將此一人擬正將科甲部屬人員論俸擬陪一并引見之處恭候欽定奉㫖擬陪人員一并引見十九年奏準從前翻譯進士初次引見時因奉有歸進士班銓用之諭旨是以遇有翰詹等闕遂將翻譯進士出身之人一例升用今翻譯鄉㑹試既經議停而翻譯進士與文進士舉人究屬有間其升補翰詹官員之處請一并停止一翰詹兼理部務乾隆元年議準翰林院侍讀學士侍講學士詹事府少詹事庶子等員闕由科道郎中等官升補者均不令兼管部院事務其員闕别行銓選由員外郎等官升補翰林院侍讀侍講詹事府洗馬主事等官升補詹事府中允小京官升補贊善如繫熟練部務之人準各該堂官奏留辦事兼兩處行走其該堂官不行奏留者照例開闕一京堂翰詹開列夾單康熙五十二年議準未報到任官員停其開列升轉雍正五年諭開列京堂翰詹等官照例開列應升人員其轉補及其次應升人員皆著别開單夾於本內進呈欽此乾隆二年議準嗣後旗員遇有親喪於二十七月之內遇有應升停其開列具題四年議準京堂翰詹等官員闕如有應補人員照例開列其應升人員惟罰俸不停升其餘降革留任並各項參罰事故均不開列於題本內聲明扣除至其次應升人員均逐名開列别繕夾單與題本一同進呈如有前項不合例事故亦於本人名下注明七年奏準京官出差外省又經升轉尚未回任者遇有應升雖未到任仍行開列具題一京堂特㫖升補雍正十二年議準凡四品以上京堂有停俸降級革職留任之人奉特㫖升補者即將停俸降級之案由部察明具奏一稽察宗室覺羅各學乾隆二年議準宗室覺羅各學奏㸃滿漢文臣稽察由部行文各衙門咨取三四品科甲出身滿漢文臣學問淵博翻譯精通者開列職名奏請欽㸃十二人兩翼宗學分㸃四人左翼四旗覺羅學分㸃四人右翼四旗覺羅學分㸃四人督率教習勤加訓迪仍同該管王公不時稽察如遇升遷外任事故等項出闕由部别行開列具奏漢員開列一京外應升官員開列原例在京大學士以下京堂翰詹官員以上在外總督巡撫布政使按察使鹽運使均開列具題康熙十年議準大學士員闕請㫖開列先將員闕應否開列奏請得㫖後開列具題又議準各部院尚書改吏部尚書各部左侍郎員闕由右侍郎轉吏部侍郎員闕各部院侍郎亦行開列雍正四年遵㫖議定各部侍郎員闕未經開列之先奉特㫖補授有人無左右字樣者將見任右侍郎應否轉左或將新授之人即授為左侍郎之處具奏請㫖五年奉㫖嗣後開列京堂翰詹等官照例開列應升人員其轉補及其次應升人員均著開單夾於本內進呈其布政使等官應內升者亦開單夾於本內進呈十二年議準應開列具題人員有革職留任降級留任停升停俸督催督造完解等項及未報到任均不開列具題於本內聲明扣除乾隆元年議準小四品京堂員闕將內升之科道具題請㫖俟簡用四人之後再將五品京堂開列升補一人如無內升科道方以應升京堂科道通行開列具題至每年科道內升多寡或暫停難以豫定應將小四品京堂員闕俟內升官員與五品京堂總合用五人之數將在外司道官任內無參罰事故者通行論俸開列十人具題請㫖欽㸃一人來京遇有應升員闕具題升補一次四年議準應行開列人員如有降革留任等項不合例事故除應補人員仍行開列坐補外其應升人員即於題本內聲明扣除至轉補如侍讀學士由侍講學士轉之類凡應轉人員不止一人者均開入夾單其翰林開列轉補京堂及由翰林轉補部院官員開列學士詹事亦開入夾單至應轉人員只冇一闕如各部左侍郎由右侍郎轉之類仍於正本內列名具題轉補不在夾單之內及其次應升人員並應升之外官職銜逐員開載如有降革留任等項參罰不合例事故均於本員名下注明七年奏準京官出差外省又經升轉尚未回任者遇有應升員闕雖未到任仍行開列布政使以下官員食俸未滿三年及任內有參罰案件不準開列如有罰俸未完亦不開列具題十三年諭大學士闕定例請旨開列亦有遲至一月後始行請旨者朕思大學士職司襄贊如其宣力有年遇有告休病故不忍遽行開列應俟至一月以後乃國家眷念舊臣加恩輔弼之意若緣事降革機務重地未容久曠自應即行開列不必請旨將此載入㑹典永著為例欽此十七年奏凖外官由開列升補者例應開闕來京引見其有曾經卓異引見未滿三年者應照推升官員內有卓異未滿三年停其調取引見之例停其引見將文慿封發令赴新任一大學士京堂等官候補雍正十二年定大學士以下侍郎內閣學士以上到京候補止將咨文投部停其赴部驗到遇有闕與應開列人員開列具題三品京堂以下鴻臚寺少卿以上人文到部遇各本項員闕亦與開列人員通行開列應開列人員如應升應轉及其次應升均詳載品級考其內順天府府丞奉天府府丞乃一項之闕得與互相補授以上候補官員開列本內列名在應升官之前乾隆七年議準各項候補京堂有病痊假滿服闋革職還職降級還級官員與奉㫖特用京堂如廢官候選官特㫖起用及見任候補特㫖升用補用之類及內升人員如科道內升及在外司道內升均照投文候補年月與奉旨升用年月較先後依次開列其降級調用應補者人文到部照奉旨降級年月與內升特用及人員較先後依次開列候補京堂如丁憂服闋病痊假滿開復均以文到日期先後為序降級調用者以奉旨降級日期先後為序翰林院修撰編修檢討庶吉士無定額人文到部即行咨送翰林院復任一督撫藩臬等官候補原定督撫有裁汰開復候補者仍令本身到京照所到日期不必起文有病痊假滿服闋者亦令到京取具原籍文結照人文到部遇有員闕與應升人員一并開列具題康熙五十二年定候補布政使按察使鹽運使均令人文到部遇有員闕與應升官員一並開列具題以上候補官員開列本內列名在應升官之前一翰詹衙門升轉原例翰詹開坊開列具題如有候補一并開列雍正十二年定翰詹衙門凡升轉官員皆依編檢之俸共算若有告假丁憂扣除告假丁憂日期較俸升轉俸同者仍行論資乾隆二年議準翰林開坊員闕不必開列多人具題論俸擬正陪引見又諭嗣後遇有翰林院開坊員闕中允贊善司業均翰林開坊之闕仍照舊例翰林院將俸深人員開送二十員爾部引見欽此七年奏準候補官員人文到部遇有員闕翰林院一并咨部引見列名在應升之前又奏準由翰林升轉部院之人如遇翰林應升之內閣學士翰林院掌院學士員闕將翰林轉補部院之太常寺卿以下正三品之左副都御史通政使大理卿宗人府丞與學士升轉相同不行開列大四品京堂以上正四品之太常寺太僕寺少卿鴻臚寺卿順天奉天府丞暨小四品不行開列一并開列詹事員闕將由翰林院轉補部院之從三品及大四品京堂一并開列均列名於翰林官之後一補授祭酒乾隆十一年奉㫖國子監祭酒為成均司鐸之長有造就人才之責嗣後遇有員闕將應行開列及其次應升人員一并引見補授一學政開列康熙二十三年議準直隸江南浙江學政將侍讀侍講洗馬中允贊善由翰林院咨送開列其各省學政由翰林院論俸咨送編修檢討十員與各部進士出身俸深郎中一并開列具題由部屬等官補授者其部屬等員闕即行開選乾隆元年議準部屬出差學政升轉食俸之處應仍就該員原官與各部見任司官一例食俸遇應升之時照例推升具題請㫖以升銜注册任滿回京各照升銜補用五年奏準郎中等官補授學政任滿回京人文到部免其投供驗到如繫未經升任者遇原部應補員闕即行引見補授其已經推升部屬注册者應不論部分遇有應升員闕引見補授推升道府注册者遇闕引見補授至未經差滿遇有丁憂降革事故離任後經服滿開復仍令赴部投供驗到歸於月選遇原部員闕將丁憂服滿之人不論雙單月即用降革開復者歸於單月補用其已經升任部屬及升任道府注册者將丁憂服滿之人照伊升銜不論雙單月即用降革開復者歸於單月先盡補用七年定京堂科道及翰詹衙門庶子以上等官奉特旨簡用者各以原銜提督學政凡學政員闕三年任滿由禮部咨報考試已竣開闕京堂科道並翰詹衙門庶子以上特旨簡用學政及應行出差之侍讀侍講洗馬中允贊善編修檢討等官出差後又經奉旨升轉如在四品以下及三品翰詹官員仍令以升銜提督學政亦無容開闕俟任滿回京若升至三品以上各部院堂官即將學政别行開闕行令回京供職其差往之時原繫三品以上部院堂官特旨簡用者如又經升任由部將學政應否别行開列之處請旨一督撫兼銜順治初年定凡加尚書侍郎銜者總督兼兵部巡撫兼工部雍正元年議準川陜總督控制番羌兩江總督地連江海此二處地濶兵多不論何項官員補授皆授為兵部尚書兼都察院右都御史其餘各省總督由各部侍郎以及别項官員補授者皆改為兵部右侍郎兼都察院右副都御史如各部尚書及左都御史補授者不論省分皆授為兵部尚書兼都察院右都御史至各省巡撫由侍郎補授者改為兵部右侍郎兼都察院右副都御史由學士副都御史及卿員布政使等官補授者皆授為右副都御史乾隆十三年諭黔省古州松桃等處苖疆最關緊要與雲南總督駐劄之地相去窵逺若有事必需督撫㑹商未免遲滯見任巡撫著加節制通省兵馬之銜以資彈壓欽此十八年奏準嗣後凡補授貴州巡撫均即照例加節制通省兵馬銜十四年定凡給銜總督授都察院右都御史總河總漕同巡撫授都察院右副都御史其應否兼兵部尚書侍郎銜由部請旨雍正九年諭山西巡撫著署理山西提督事務給與印信通省武辨聽其管轄欽此乾隆五年諭豫省盜案繁多營伍亦覺懈弛該省止設河北南陽二鎮與巡撫不相統屬諸事不能畫一著照山西之例河南巡撫兼提督銜以便節制稽察欽此八年諭山東巡撫著照山西河南之例兼提督銜給與印信欽此十四年諭江西營伍向繫兩江總督所轄去贑州南昌二鎮甚逺未能詳悉周知時加簡閲是以日漸廢弛江西巡撫著兼提督銜令其就近管轄加意整頓仍聽總督節制欽此十六年奏準河南山東江西巡撫皆兼提督銜從前有由部遵旨兼銜者亦有移咨兵部奏請者察此三省並無提督嗣後補授巡撫由部即照例兼提督銜移咨兵部注册一學政兼銜雍正四年遵旨議準由翰詹衙門各官補授者各以原銜提督學政其由郎中等官補授者二甲加編修三甲加檢討一例授為學院一撰給敕書雍正十二年定督撫補授後即移揭內閣撰給坐名敕書布政使按察使各道運使均撰給傳敕學院移咨禮部轉揭內閣撰給坐名敕書欽定大清㑹典則例卷六
