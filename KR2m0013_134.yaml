body:
  text: 工部虞衡清吏司軍器一八旗鎧仗順治初年定八旗甲兵需用盔甲由兵部移咨每副折給銀四兩八錢八分三釐令其自行辦造康熙十八年題準護軍盔甲每副折給銀四兩八錢八分三釐驍騎步軍盔甲折給銀四兩一分五釐二十二年題準兵丁盔甲每副折給銀三兩七錢並給鳥槍一杆四十五年題準護軍盔甲每副折給銀四兩五錢驍騎步軍盔甲每副折給銀三兩七錢鳥槍兵丁盔甲每副折給銀三兩五錢五十三年題準鳥槍兵丁盔甲每副仍照原價折給銀三兩七錢雍正元年議準護軍盔甲每副鐵葉銀四兩五錢合工料銀共十有二兩定為十有一兩其護軍校盔甲銀十有五兩六錢有奇定為十有五兩二年奉㫖八旗軍器年久殘闕不全兵丁無力修整著賞給庫帑各旗核眀數目照舊設立三年㸃驗之時暫行封貯俟各旗驗畢始令發回以杜那借欽此十一年議準八旗官兵盔甲弓矢櫜鞬等項多不齊備每遇㸃驗私相那借且初授之官新選之兵亦有不及設立者應今各佐領核眀殘闕軍器或繫全無或闕少若干逐細報眀補造借給俸餉以為價直但一時購買不特昻貴亦難堅固請令各該旗將官兵職銜軍器數目造具清册移送到部照依定價按式成造分給其借給俸餉官以四季扣完兵以二十月扣完該管大臣每年於霜降後㸃驗一次仍令各佐領稽察倘年久應修亦照此例造給如兵丁內有升遷調遣者將軍器酌量設立年分折算價值交與頂補之人陸續坐扣錢糧給還本人如新授之官未有軍器願扣俸設立者照例造給又奏準撥給崇文門官房一所設立軍需局遴委賢能司官監造八旗官兵軍器所需工料均分等按旗核定價直官員盔甲一等每副銀二十八兩八錢五分五釐二等每副銀二十兩八錢五分五釐三等每副銀十有七兩六錢八釐八毫八絲護軍校盔甲鑲黃正白二旗每副銀十兩八錢八分二釐八毫二絲八忽正黃鑲白鑲紅三旗每副銀十兩七錢六分二釐八毫二絲八忽正紅旗每副銀十有一兩二錢六分二釐八毫二絲八忽正藍旗每副銀十兩一錢二分八釐八毫二絲八忽鑲藍旗每副銀十兩四錢三分二釐八毫二絲八忽前鋒盔甲鑲黃正白二旗每副銀七兩九錢一釐三毫六絲三忽五微正黃鑲白鑲紅三旗每副銀七兩七錢七分二釐七毫四絲三忽五微正紅旗每副銀八兩三錢七分二釐七毫三絲七忽五微正藍旗每副銀六兩七錢六分六釐五毫三絲六忽五微鑲藍旗每副銀七兩四錢一分一釐八毫三絲六忽五微護軍盔甲鑲黃正白二旗每副銀七兩三錢八分五釐九毫七絲五忽五微正黃鑲白鑲紅三旗每副銀七兩二錢五分七釐三毫五絲五忽五微正紅旗每副銀七兩八錢五分七釐三毫四絲九忽五微正藍旗每副銀六兩二錢八分八厘六毫一絲六忽五微鑲藍旗每副銀六兩九錢一分一絲六忽五微驍騎盔甲正黃旗每副銀四兩六錢二分八厘六毫二絲四忽四微鑲黃旗每副銀四兩六錢五分六厘三毫六絲六忽四微正白旗每副銀四兩六錢四分一釐六絲七忽九微鑲白旗每副銀四兩六錢六分八厘八毫一絲五忽四微正紅旗每副銀四兩一錢六分九厘二毫三絲七微鑲紅旗每副銀四兩七錢二分六厘六忽九微正藍旗每副銀四兩六錢四分一厘七絲二忽九微鑲藍旗每副銀四兩六錢六分八厘八毫一絲五忽四微步軍棉甲兵盔甲正黃旗每副銀三兩六錢四分二厘九絲二忽鑲黃旗每副銀三兩六錢六分四厘五毫五絲二忽正白旗每副銀三兩六錢四分五毫五絲二忽鑲白旗與鑲黃旗同正紅旗每副銀三兩三錢一分四厘八毫五絲六忽鑲紅旗每副銀三兩七錢一分九絲二忽正藍旗每副銀三兩六錢五分四毫二絲二忽鑲藍旗每副銀三兩六錢七分二厘八毫八絲二忽官員櫜鞬一等每副銀四兩二等每副銀二兩九錢三等每副銀二兩兵丁櫜鞬每副銀一兩七錢官員腰刀每把銀三兩五錢六厘兵丁腰刀每把銀二兩二錢八分一官兵帳房定例官員用藍布每架髙六尺五寸下濶丈二尺深六尺四寸兵丁用白布有堂屋者每架髙六尺五寸下濶丈二尺深九尺六寸無堂屋者制與藍帳房同布匹棉線移户部支領零星物料工匠價直由部核給委官成造存貯軍需庫如遇車駕巡幸各旗定數赴部支取事畢繳回年久應修委官驗實隨時修補一新滿洲鎧仗康熙二十七年定新來滿洲官兵咨部按名給發軍器軍裝什物並給豫房價又定新滿洲藍翎侍衛應得盔甲每副折價銀十有三兩五錢平鋄金腰刀櫜鞬折價銀五兩四錢一分鞍轡皮荷包箭囊折價銀六兩四錢二分八旗寧古塔新滿洲兵丁軍器由各該處咨部每人各應得盔甲長槍弓箭罩水缸鐵鍋䥷刀帳房二人共一架共折價銀十兩八錢四分二釐四毫制錢百五十文腰刀櫜鞬箭囊皮荷包鞍轡馬槽共折價銀六兩一錢六分有奇均令該旗及該將軍具領赴部支給自行備造一武狀元銅盔甲定例三年一製需用熟黃銅及紬錦線布於户部支領由部成造其腰刀櫜鞬鞓帶皆鋄金鞾用馬皮襪用藍縀手巾二條荷包一對均令製造庫造給交送兵部一直省兵丁軍器順治四年議準鐵盔每頂工料銀一兩五錢鐵甲每副工料銀三兩三錢七年議準棉甲每副工料銀二兩弓每張銀一兩箭每枝銀四分腰刀每把銀九錢二分鳥槍每杆銀一兩三錢長槍每杆銀一錢十年議準各省軍器或遇闕額或新增該督撫照兵部經制額數具題由部核準成造仍將動支錢糧奏請開銷康熙十七年題準直省兵丁鐵盔甲每副減定銀三兩七錢雍正七年議準各省如遇裁兵所遺盔甲器械數目於年終彙册送部十三年覆準豫省各營補製闕額棉盔甲鳥槍及馬兵花鐵盔甲動用存公銀照數改造工竣造册送部核銷至各營羅鍋帳房等項見今並無用處若備造存貯日久易於朽壞應俟用時報部補製並將堪用之㓲刀藤牌旗幟盔甲鳥槍小旗等項數目造具清册送部察核乾隆十六年奏準各省軍器武備攸關向來增造拆修並未定有章程一應報銷往往同一器械彼此價直多寡懸殊部內惟據舊案核銷而各省又因未定成規並不遵照核減舊案造報以致往返駮詰案牘紛繁遵循無據應令各督撫照城垣衙署之例將一應軍器軍裝什物等項按照各營情形分别輕重大小物料匠工確訪該處價直據實核定造册送部會同九卿定議頒發各省遵行一鑄炮國初遣官監造大炮定名號為神威大將軍康熙十四年鑄造大炮八十位各長七尺三寸口徑四寸九分膛口徑二寸七分底徑六寸七分鐵彈重三斤用火藥一斤八兩炮車全車見雜料則例十五年鑄造五十二位欽定名號為神威無敵大將軍內重二千二百七十四斤銅炮八各長七尺七寸口徑一尺膛口三寸七分底徑一尺二寸鐵彈重八斤用火藥四斤重一千六百十有三斤銅炮二十四位各長七尺六寸口徑八寸五分膛口三寸三分底徑尺一寸鐵彈重六斤用火藥三斤木瓖大炮二十位各重八百十有七斤制同上炮車均全十九年造鋄金龍炮八位各長五尺七寸重二百五十斤至三百斤鉛子重十有三兩至十有四兩二十年造銅炮二百四十位欽定名號為神威將軍各重三百九十斤長六尺六寸火門後徑五寸七分口徑三寸二分合膛鉛子重十有八兩用火藥八兩中的至一百弓用火藥九兩中的至百五十弓口篐之上立星表與甲乙線相等炮車全二十四年造鐵心銅炮八十五位各長五尺二寸重百斤至百二十斤鉛子重四兩五錢至五兩鐵奇炮一位長五尺六寸重三十三斤鉛子重二兩五錢二十五年造鋄金龍炮一位長四尺五寸重八斤鉛子重五兩二錢二十六年鑄炮五位欽定名號為威逺將軍即衝天炮各長二尺一寸重二百八十五斤至三百三十斤生鐵彈重二三十斤大如瓜中虛仰穴兩耳鐵環其法先置火藥於鐵彈內次用螺螄轉木纏火藥撚裹以朝鮮貢紙插入竹筒入於彈內下留藥撚一二寸以達火藥上留藥撚六七寸於彈外餘空處亦塞滿火藥以鐵片蓋穴口外用蠟封固於小膛底下火藥間以木馬加土寸許乃安鐵彈於大膛又加潮土數寸以隔火如放二百步至二百五十步用藥一斤三百步增二兩如放二三里用藥三斤火門施烘藥次以炮尺髙低度數定放之逺近其最逺在炮尺四十五度本度上下若干即減遠若干臨時施放先㸃彈口火藥撚再速㸃火門烘藥二十八年造大炮六十一位欽定名號為武成永固大將軍重自三千六七百斤至六七千斤長自九尺七寸五分至一丈二尺膛口自三寸八分至四寸九分用鐵彈自十斤至二十斤火藥自五斤至十斤鐵軸炮車均全又改造木瓖炮八十位欽定名號為神功將軍各重千斤長七尺一寸膛口二寸七分用鐵彈三斤八兩火藥一斤十二兩炮車全二十九年造鐵子母炮二百有二位各長五尺五寸重八十斤至百斤鉛子重四兩至六兩銅衝天炮八位各長二尺三寸重五百六十斤生鐵彈重三十斤三十四年造銅炮四十八位欽定名號為制勝將軍內四十六位各重五百斤長五尺一寸膛口二寸四分用鐵彈三斤火藥一斤八兩重三百六十斤者二各長五尺用鐵彈二斤火藥一斤五十七年造威逺將軍銅炮十位各長三尺一寸重一百七十餘斤鉛子重十有九兩五十八年造威逺將軍銅炮十有六位各長三尺重一百四十斤鉛子重十有五兩六十年造鐵子母炮六位各長五尺重百斤鉛子重五兩鐵虎尾炮二位各長三尺重二十七斤鉛子重二兩雍正五年造威逺將軍鐵炮十位各長一尺七寸七分重四十五斤鉛子重二十八兩用火藥十有四兩鋄金子母鐵炮十有七位重四十八斤者六各長五尺二寸鉛子重四兩用火藥二兩重四十斤者一長五尺五寸鉛子重二兩六錢用火藥一兩三錢重三十六斤者十各長五尺五分鉛子重二兩五六錢用火藥一兩三錢鋄銀子母鐵炮重四十八斤者十重三十六斤者四子母鐵炮三位重四十八斤者一重三十六斤者二尺寸鉛藥均與鋄金鐵炮同一火藥順治初年定八旗試演槍炮及盛京各駐防等處每嵗操演需用火藥硫黃於西什庫支取硝令直隸山東山西河南四省辦解部委官監製存貯蕩氛廠取用時赴廠給發完日酌量造備又定內務府取用硝黃於西什庫支給藥線及催藥部發工料造給又定內務府取用鳥槍鉛子噴砂照來文給發工料造給康熙三十一年題準八旗試演槍炮火藥移濯靈廠收貯取用又題準濯靈廠每嵗造演放火藥二十餘萬斤烘藥二三千斤外備貯軍需火藥三十萬斤烘藥四千斤如逄運用之年隨時補造足額簡委司官一人經理豫領錢糧督匠辦造雍正二年奏準軍需火藥存貯已過十年者許改作演放火藥陸續取用其額貯之數即行補造三年奉㫖特命大臣管理火藥事務核定價直軍需火藥每斤工料銀二分六釐演放火藥每斤銀一分八釐烘藥均每斤銀一錢五分十年奏準直隸山東山西河南每省每次取硝各十有五萬斤解部應用直隸山東河南題銷工運價直每斤銀二分五釐至二分八九釐不等山西一省每斤題銷銀五分六釐較之三省價直懸殊緣山路﨑嶇雇騾䭾運不能照直隸等省核給且所解之硝成色亦不及三省應將山西例解之硝停其辦運令直隸山東河南各增辦五萬斤解部應用十二年奉㫖八旗操演營兵等演放鳥槍所需鉛子均不拾回徒然拋棄外省兵丁演放鉛子既有拾回之例京城所放鉛子作何拾取之處著八旗並操演營火器營大臣等㑹議具奏欽此遵㫖議準嗣後京城兵等演放鳥槍之鉛子各旗委官兵用心拾取務將實得數目注册收貯俟嵗終各營將每月由部領回鉛子數目並各營各旗每