body:
  text: 禮部儀制清吏司婚禮一一大婚順治八年世祖章皇帝大婚禮前期擇吉行納采禮馬十匹鞍轡具甲胄十副段百疋布二百疋金茶筩一具銀盆一具前期一日行大徵禮黄金二百兩白金萬兩金茶筩一具銀茶筩二具金銀盆各一具段千疋布二千疋馬二十匹鞍轡具䭾甲二十副常等甲三十副遣官各一人以大婚祗告於天地太廟至日早鹵簿大駕樂懸陳設如常儀鑾儀衛官陳皇后儀駕於皇后邸禮部官設案於太和殿正中又設案於皇后邸堂正中設册寳盝於案上又設案於中案之東設采亭二於太和門外階下内院禮部官朝服奉册寳由御道入太和殿陳於案王公百官咸朝服序立世祖章皇帝禮服御殿陞座内院官奉册寳授冊封使臣使臣跪受興由中道奉出禮部堂官前導至太和門外設於采亭鑾儀校舁册寳亭次第行前列御仗二對由協和門出詣皇后邸世祖章皇帝還宫遣親王二人奏請昭聖皇太后幸位育宫今殿保和昭聖皇太后陞輿樂作儀駕前導世祖章皇帝恭迎於太和門内昭聖皇太后輿由御道進位育宫使臣至皇后邸后父率親屬朝服出迎於門外皇后禮服同后母朝服迎於庭使臣奉册寳由中道入置東案上皇后就案南北面跪宣讀官立案左西面宣冊寳文畢次第奉授侍左女官跪接獻皇后皇后祗受轉授侍右女官女官跪接陳於案上盝内皇后興行六肅三跪三拜禮畢皇后陞輿女官奉册寳盝設采亭内儀駕鼓樂前導至協和門儀駕止交内執事人女官奉册寳前行皇后輿由御道入至太和殿階下降輿入宮禮部堂官奏請御殿世祖章皇帝禮服御中和殿諸王入至中和殿世祖章皇帝率諸王詣昭聖皇太后前行禮畢諸王退出復原班立世祖章皇帝御太和殿午門鳴鐘鼓中和韶樂作世祖章皇帝陞座樂止鳴鞭賜后父及親屬燕王公百官咸與燕畢還宮皇后率后母暨公主福晉命婦朝昭聖皇太后於位育宫禮成皇后還宮昭聖皇太后賜后母燕公主福晉命婦咸與燕畢昭聖皇太后乘輿還宮世祖章皇帝恭送如初越三日世祖章皇帝御太和殿王公百官上表行慶賀禮頒詔天下各如常儀是日賜后父母黄金百兩白金五千兩段五百疋布千疋金銀茶筩銀盆各一具馬六匹鞍轡具甲胄櫜鞬各一副弓矢全冬夏朝衣各一襲冬夏衣各一襲貂裘各一領上等玲瓏帶一束賜后兄弟及随從人等服物有差十一年世祖章皇帝大婚禮並與順治八年典禮同惟孝惠章皇后行謁見昭聖皇太后禮於大婚之第三日昭聖皇太后御宮孝惠章皇后率公主福晉命婦行禮如儀乃設燕燕畢各退康熙四年聖祖仁皇帝大婚禮擇吉行納采禮馬十匹鞍轡具甲胄十副段百疋布二百疋以禮部尚書内務府總管充使咸朝服齎至孝誠仁皇后邸后祖率后父朝服出迎於大門外使臣陳禮物於堂陳馬於庭授后父后父跪受訖率子弟望闕行謝恩禮是日設納采燕於孝誠仁皇后邸命公主三人輔臣命婦三人往與燕内大臣侍衛各旗民公以下武官二品以上滿漢文官侍郎以上咸朝服與燕如之大婚前期行大徵禮具黄金二百兩白金萬兩金茶筩一具銀茶筩二具銀盆二具段千疋馬二十匹鞍轡具䭾甲二十副馬四十匹以禮部内務府堂官為正副使咸朝服齎至孝誠仁皇后邸后祖率后父朝服出迎及以禮物授受儀與納采同是日賜后祖父母父母衣服各跪受訖后祖父率子弟於堂之南后祖母率諸婦於堂之北行謝恩禮如儀前期遣官祗告至日𤼵册奉迎閲册寳儀均與順治八年同欽差命婦十一人四人前導七人後随詣孝誠仁皇后邸襄事又以命婦十人恭侍執事於皇后宮以内大臣侍衛翊衛屆時聖祖仁皇帝御殿發册孝誠仁皇后受冊寳行禮均如前儀欽天監官報時孝誠仁皇后陞輿前導命婦於輿前後随命婦於輿後皆乗騎行内大臣侍衛咸從由大清門中門入至午門外儀駕止交内執事人孝誠仁皇后輿入自中門至太和殿階下内大臣侍衛退孝誠仁皇后降輿内監奉册寳前導由中道至中和殿前導後随命婦退恭侍命婦祗迎入宮内監奉册寳授守寳内監訖退聖祖仁皇帝禮服詣昭聖慈壽太皇太后宮仁憲皇太后宮行禮畢御太和殿賜皇后親屬暨諸王百官燕燕畢乃還宮仁憲皇太后率輔臣命婦詣昭聖慈壽太皇太后宮賜后母暨親屬燕如儀諸王百官免随行禮公主福晉命婦免㑹燕至酉時宫中設合巹燕行合巹禮翼日孝誠仁皇后詣昭聖慈壽太皇太后宮仁憲皇太后宮行朝見禮越三日聖祖仁皇帝御殿羣臣上表行慶賀禮頒詔天下儀與順治八年同婚禮二一皇子成婚有㫖以某氏某官某人之女指與某皇子為福晉令欽天監擇吉内務府列夫婦偕老之大臣奏請簡用一人至日召福晉父至宫門大臣傳㫖訖謝恩行禮擇日皇子見福晉父母以内大臣散秩大臣侍衛䕶軍叅領䕶軍校䕶軍等随往均由領侍衛内大臣䕶軍統領簡委納采禮用銜珍珠金大簪三小簪三銜東珠金領約一金耳飾三對金釧二對金衣紐百銀衣紐二百諸色表裏段百棉三百斤製衣貂皮一百四十張製帽貂皮三張製衾褥狐皮二百五十張縁朝服水獺皮七張遣内務府官一人齎往舁以采亭至福晉家福晉父祗受訖福晉父率子弟福晉母率諸婦謝恩各行禮如儀是日賜福晉父馬一匹鞍轡具金十兩銀七百兩狐裘朝衣一薰貂帽一金帶一佩飾全鞾襪各一雙福晉母銜珍珠金耳飾三對狐袍一縁朝服水獺皮六張馬一匹鞍轡具金十兩銀七百兩如福晉父無爵秩者停給朝衣及縁朝衣獺皮給狐衣服一襲是日就福晉第設燕凡五十席羊三十六酒五十缾燕福晉父母其族人之有職者咸與公侯伯以下侍郎男以上一二品夫人咸㑹燕迎娶日具儀衛設采輿導從及各執事用内務府官二十人䕶軍叅領一人䕶軍校四人䕶軍三十六人執事女官用年命相合之大員命婦二人生辰無忌之内務府總管命婦一人内管領命婦十人均由内務府簡用於箭亭暨皇子所居之處咸結采設燕六十席羊四十五酒六十缾燕福晉父母與納采日同合巹燕用羊五燕席以夫婦偕老之内管領辦理是日質明皇子於皇太后皇帝皇后妃嬪前行禮成婚次日皇子偕福晉行禮亦如之如車駕行幸駐蹕竢囬鑾擇吉行禮既婚之九日行歸寧禮皇子偕福晉至福晉家福晉家設燕欵接燕畢偕還率不過午一公主下嫁有㫖指婚乃擇吉命夫婦偕老之大臣傳㫖至日召額駙及其父兄至宫門前大臣傳㫖訖謝恩行禮納采禮具駝一馬八皇太后宮燕三十席羊十有八乳酒黄酒二十缾皇帝前燕六十席羊六十有三乳酒黄酒七十缾額駙於是日早詣午門恭進乃設燕於保和殿暨皇太后宮皇帝御殿行燕饗禮王公候㫖内大臣侍衛暨文武一品官咸與燕額駙之父率其族人之有職者朝服行禮遂入燕其餘大臣官貟停其齊集皇太后御宮行燕饗禮皇后妃嬪咸㑹額駙之母率其族中諸婦朝服行禮遂入燕是日額駙父率族人詣皇太后皇后宮門前行禮額駙母率諸婦詣皇后宫行禮下嫁前一日額駙族人詣皇太后皇帝皇后宫門前謝恩是日遣官齎送妝奩以年命相合之内管領命婦率執事婦女詣額駙第鋪設妝奩至日額駙恭進鞍馬二九甲胄二九馬二十有一駝六燕九十席羊九九乳酒黄酒九十缾是日設燕於保和殿皇太后宮與納采同下嫁日以皇子福晉暨近支王福晉貝勒貝子夫人内年命相合無忌者由内務府奏請欽命一二人送親合巹襄禮以大員命婦陪送以内管領妻及随從婦女咸用年命相合無忌者導從及各執事用内務府官四人内管領二人䕶軍叅領二人䕶軍校二人䕶軍二十人均由内務府簡委其合巹設燕用羊九酒九缾燕席以夫婦偕老之内管領辦理成婚後九日行歸寧禮導引䕶從用内務府官一人䕶軍叅領一人䕶軍校二人䕶軍二十人是日公主於皇太后皇帝皇后暨妃嬪前行禮額駙於皇太后皇帝皇后宮門前行禮一親王婚禮崇徳年間定聘朝臣女為婚者納采禮綴金珠段衣裳九襲段衾褥七具金領約一大小金簮各三金耳飾三對金指環十是日設燕五十席牲三十六酒五十缾成婚日燕六十席牲四十五酒六十缾自親王公主福晉以下咸㑹燕給女父朝衣冠帶鞾各一具女母蟒段衣裳一襲金耳飾一具又鞍馬二匹若聘外藩王貝勒台吉之女納采用牲六十有三鞍馬甲胄各三銀茶筩一段十有一疋布四十二疋率準七九之數燕用牲四十有五聘禮外藩親王女鞍馬甲胄各十有二閑甲二十有四段六十疋布六百疋銀茶盆銀酒盆銀茶筩各一具郡王之女鞍馬甲胄各十閑甲二十段五十疋布五百疋貝勒之女鞍馬甲胄各八閑甲十有六段四十疋布四百疋銀器與親王女同台吉之女鞍馬甲胄各六閑甲十有二段三十疋布三百疋銀酒盆銀茶筩各一具成婚日燕用牲六十有三福晉父母送女来者均給冬夏衣各一襲貂裘各一領鞓帶佩刀櫜鞬各一副甲胄一鞍馬二段三十疋布二百疋銀茶盆銀酒盆銀茶筩各一具女之兄弟來者給時衣一襲給從者三十人衣服有差順治九年定燕日親王以下侍郎男以上公主福晉以下郡君貝子夫人以上咸㑹燕諸王福晉公主等由本家自請民公以下大臣由部傳集聘朝臣之女其父母加給金二十兩銀千兩一世子郡王婚禮崇徳年間定聘朝臣女為婚者納采禮綴金珠段衣裳八襲段衾褥六具金指環八餘與親王同是日設燕四十席牲二十有七酒四十缾成婚日燕五十席牲三十有六酒五十缾㑹燕及給女父母服物與親王同聘外藩王貝勒台吉女納采禮物燕席牲酒均與親王同聘禮聘外藩親王郡王貝勒台吉女與親王聘外藩親王郡王貝勒台吉女同成婚日燕用牲六十有三給女父母及兄弟從人如繫親王郡王並得視親王繫貝勒台吉給段二十五疋布一百五十疋銀茶盆銀酒盆銀茶筩各一具餘衣裘鞓帶櫜鞬鞍馬與親王同給從者二十五人衣服有差順治九年定世子郡王納福晉均如親王例聘朝臣之女其父母加給金十兩銀七百兩一貝勒婚禮崇徳年間定聘朝臣之女為婚者納采禮綴金珠段衣裳七襲段衾褥五具金指環六餘與郡王同是日設燕三十席牲十有八酒三十缾成婚日燕四十席牲二十有七酒四十缾自郡王郡王福晉以下咸㑹燕給女父段衣裳一襲鞍馬一匹閑馬一匹母段衣裳一襲餘與郡王同聘外藩王貝勒台吉之女納采用牲四十有五鞍馬甲胄各二銀茶筩一具叚八疋布四十疋率準五九之數燕用牲二十有七聘禮與郡王聘外藩貝勒女同成婚日用牲四十有五給女父母兄弟從人繫親王郡王均得視親王繫貝勒台吉給女父母時衣各一襲貂裘猞猁猻裘各一鞓帶佩刀櫜鞬各一具鞍馬一匹段二十疋布百疋銀茶筩一具給從者二十人衣服有差順治九年定燕日郡王以下都統尚書子以上郡王福晉以下貝子夫人郡君以上咸㑹燕王福晉等由本家自請民公以下由部傳集聘朝臣之女其父母加給金五兩銀五百兩又定貝勒以下行禮禁用珍珠糚段一貝子婚禮崇徳年閒定聘朝臣女爲婚者納采禮段衣裳六襲段衾褥四具大小金簮各二金指環四餘與貝勒同是日設燕二十席牲十有四酒二十缾成婚日燕三十席牲二十有一酒三十缾自貝勒貝勒夫人以下咸㑹燕給女父母視貝勒減馬一匹餘並同聘外藩王貝勒台吉女納采用牲二十有七鞍馬甲胄各一銀茶筩一具段四匹布十有八疋率準三九之數燕用牲十有八聘禮鞍馬甲胄各六閑甲十有二叚三十疋布三百疋銀盆銀茶筩各一具成婚日燕用牲二十有七給女父母兄弟從人繫親王郡王均得視親王繫貝勒台吉給女父母時衣各一襲貂裘狐