胥威馳六合位重三孤進獻嘉謨出靖邊隅允作中朝砥柱企都俞佐唐虞百辟嚴趨殿陛山呼廝濟濟揚拜歡娛戞鏘鏘依永笙竽萬斯年玉燭安舒河清海晏金甌固榮生虎竹喜溢簮裾十解日舒長時和煦萬彚從兹昭蘇寶篆氤氲裊御爐玉缸香泛酴酥想當年在藻依蒲鎬燕何曾今昔殊慶槐鼎雲需賡君臣相遇曈曨旭日照宸居趨辭一部燕賜衍聖公燕樂奏洙泗發源長之章曰洙泗發源長麟鳳流芳久眷兹後裔克紹箕裘詩書教澤延禮樂家聲舊茅社長膺天眷厚際端冕凝旒桓圭章甫彤廷舞蹈時覲春秋一解詔宗伯使饔人進羞大遒獻酬形虎形鹽訓恭訓儉慈惠兼施寵錫優勵嘉修素風益懋庶不負皇朝渥澤㫖酒思柔二解賜文進士燕樂奏啓天門之章曰啓天門日麗黃金榜趁驊驑緩步青雲上論聖賢事業無涯量況生平溫飽何曽望念鯫生叨渥澤天來廣雖持寸草心莫報君恩蕩涓埃矢竭酬天貺一解玳筵內金壺玉漿月臺上絲竹鏗鏘繼自今木天清敞增泰巖不辭土壤二解賜武進士燕樂奏和氣洽之章曰和氣洽泰階平皇威截烽煙靖念罝亦有干城虎頭猿臂交相慶看鵰翮秋來徑一解須知道羽扇綸巾還有那弓强箭徑更兼之武庫縱橫效折衝驊驑騁執戈殳衛羽林備公侯腹心二解一鄉飲酒御製南陔由庚詩南陔章曰我逝南陔言陟其岵昔我行役瞻望有父欲飬無由風木何補我逝南陔言陟其屺今我行役瞻望有母母也倚廬歸則寧止南陔有筍籜實包之孱孱孩提孰噢咻之慎爾溫凊潔爾㫖肴今爾不飬日月其慆由庚章曰王庚便便東西朔南六符調燮八風節宣王庚容容朔南西東維敬與勤百王道同王庚廊廊東西南朔先憂而憂後樂而樂王庚恢恢南朔東西皇極孰建惟德之依一慶隆舞樂章於鑠皇清受命於天光延鴻祚億萬斯年天開令節瑞啓階蓂共球萬國聖壽千齡粵自我先肇基俄朵長白之山鵲銜朱果綿綿瓜瓞長發其祥篤生列祖積慶重光式廓舊疆東訖海表聖聖相承永世克紹右第一章赫赫神功龍飛崛起戎甲十三奮迹伊始復讐靖難首克圖倫天戈一指震懾强鄰九姓潜侵滅跡如掃䝉古五部來奉大號明師四路五日而殱定鼎遼瀋都城巖巖陳雲五色江冰夜凝天助有德應運而興右第二章天亶聰明覆幬下國逺服邇歸誕敷文德四方來附雲集景從建長命官庶職是綜爰創國書頡文羲畫聲協元音萬古不易爰定軍制綵旐央央或純或間永奠八方締造鴻模創成大業錫福無疆慶鍾千葉右第三章佑啓哲嗣光闡前猷昭宗駿德誕迓天庥攜二綏懷朝鮮歸欵世奉東藩釐爾圭瓉三十五部厥角稱臣西被佛土重譯來賔濯征有明耀師齊魯電掃郊圻有而弗取略地松杏屢殪敵軍百戰百克用集大勳右第四章帝德廣運昭受鴻名建國紀元永定大清敦睦九族彝倫式叙尚德親賢股肱心膂三館是闢鑑古崇儒郊社禘嘗式賁皇圖爵秩以班六曹承政百工永釐萬邦表正威鑠函夏德配蒼穹敬承無斁駿烈豐功右第五章帝授神器統一寰瀛剪滅巨寇乾坤載清一著戎衣若雨甘雨大告武成作神人主躬親大政飭紀整綱制禮作樂昭示典常納諫任賢慎微慮逺定律省刑萬世垂憲克勤克儉忠厚開基景命維新兢業自持右第六章聖神建極道冠百王六十一年福祚久長天縱聰明沖齡御宇孝奉兩宮德隆千古三孽蠢動一舉蕩平海氛永靖浪息長鯨親御六師三征沙漠威肅惠懷鋤頑撫弱禹功底績虞典時巡敷天率土莫不尊親右第七章惟天行健神聖則之典學勤政作君作師無逸為針宵衣旰食一人憂勞綏此萬國文經武緯地平天成中和立極玉振金聲億萬斯年覲光揚烈敬天勤民體元作哲天鑒孔彰翼翼後王儀型皇祖帝祚遐昌右第八章瑤圗炳煥六合雍熙星輝雲爛風雨以時翕受嘉祥調和玉燭治靄皇風道光帝籙東漸西被北燮南諧梯航琛賮畢致堯階日升月恆萬邦䝉福擊壤歌衢嵩呼華祝秩秩盛儀洋洋頌聲紹休列祖永慶升平右第九章一駕幸盛京大燕御製世德舞樂章曰粵昔造清匪人伊天天女降思長白闥門是生我祖我弗敢名乃繼乃承逮我元孫右第一章元孫纍葉維祖之思我西云來我心東依歷兹故土仰溯始謀皇澗過澗締此丕基右第二章於赫太祖肇命興京哈達輝發數渝厥盟如龍田見有虎風生戎甲十三王業以興右第三章爰度爰遷拓此瀋陽方城周池太室明堂不寧不靈匪居匪康事異放桀何心底商右第四章丕承太宗允揚前烈倬彼松山明戈耀雪以寡敵衆杵漂流血惜無故老為余詳說右第五章余來故邦瞻仰橋山慰我追思夢寐之間崇政清寧載啓南軒華而不侈鞏哉孔安右第六章維我祖宗欽天敬神執豕酌匏咸秩無文帷幔再張尊俎重陳弗渝弗替遵我先民右第七章先民宅兹載色載笑今我來思聖日俯照爵我周親藎臣並召亦有嘉賓歡言同樂右第八章懿兹東土允惟天府土厚水深周原膴膴南陽父老於是道古有登其歌有升其舞右第九章我歌既奏我舞亦陳故家遺俗曷敢弗因渾灝淳休被於無垠勿替引之告我後人右第十章一德勝舞樂章曰乾隆聖世瀛㝢乂康元首惟明股肱惟良景運鴻昌休德茂著統馭八埏惠液遐布金川小醜蠢爾𡨕頑惟時弗率跳梁窮邊用申天討聲罪執言長驅驛駕油雲斯屯聖謨廣運決機萬里聿簡賢臣良弼是倚曰忠曰勇經略戎功心堅金石誠格蒼穹身先蒸徒跋履巖阻晨夕盡瘁均勞共苦姦宄是殛逆謀是攘國憲孔昭我武孔揚窟穴犁止岩巢圯止堅卡墮止峻碉毁止爰褫其魄爰喪其膽震懾股栗潜伏於坎如鼠竄穴如鱗遊釡號呼哀籲再三求撫元臣執義憤欲蕩除帝德好生曰免駢誅六條攸約䖍栗遵循恩綸祗奉解網施仁丕革厥心匍匐奔赴除道築壇香雲擁路帝仁覃敷六合滂洋蘇其枯朽賜以再生展也滿兵彌月功成云何其速皇猷是憑神功炳焯乾坤軒豁九重勝算明並日月勒諸琬琰昭諸汗青禮成巨典樂奏升平膚功克奏慶筵是侑太和氤氲翔洽宇宙卿雲糾縵景緯珠聨梯航琛賮億萬斯年一笳吹樂章牧馬歌人君之樂恃此紀綱兆民之樂恃我君王室家孔宜夫君之力朋友有成和輯之德古歌八種成壞兮實人世之常墮迷網中兮欲鎖與情韁愚人無識兮樂兹殊未央執空為有兮謬語其奚當如意寶不澡心於羣經具本性而無明不服膺於佛乘說妙行而聽熒佳兆一人首出萬國尊親湛恩汪濊普被生民百花敷榮一日悅目灌頂寶光萬衆所伏誠感辭良胡畏哉襄以至誠良胡過哉竭已所能良胡僞哉語無文飾良胡怠哉罔敢休息吉慶篇有君聖明逾戴天有臣靖共勝後嗣健婦持家過丈夫如意寶珠惟孝子肖者吟滅除已罪仗佛真言如欲療病惟良藥存菩提鐙兮出衆生於黑暗智慧梳兮櫛六欲之糾纒君馬黃大海之水不可量天府寶藏奚渠央良朋和睦益無方聖有謨訓垂無疆懿德吟人君能仁蒸黎之父君子和平羣相胏附懿厥哲人實維師傳匿智懷私乃民之蠧善哉行惟安惟和心意所欲無二無虞朋友式榖樂土謠分人以財惠莫大焉施人以慧寧不踰旃踏搖娘日將出兮明星煌煌壽斯徴兮秀睂其龐三十維壯五十遲暮莫親祖母莫尊祖父頌禱辭我馬蹀躞行如流水雋英滿座交親悅喜族黨姻婭咸富且貴酌酒為歡既多且㫖慢歌十五歡娛八十衰壯容華茂遲暮悲祖妣最親祖尊哉唐公主遵王之路兮愆尤希素位而行兮夫奚疑丹誠曲罔有敗事兮遵道而行長無離析兮順親之情明光曲瞻彼日月虛空發光聖君聖母焜耀萬邦吉祥師日月之明兮容光必照聖君之明兮蒸黎咸造聖明時際聖明時良我福只橫被恩澤良我祿只微言倐忽變遷順其自然如彼蜃樓余生渺焉際嘉平諸惡莫作菩提薩多瞑朦妄行用墮三塗善政歌經何本本於宗身何本媼與翁罪何本嗔爞爞福何本和雍雍長命辭靡言不適於道兮水萬派而朝宗夫惟外道之妄語兮井自畫而不通窈窕娘惴惴原獸思全其身競競庶士思庇後昆湛露維彼愚人惟知已身維此哲人心周萬民四賢吟六欲相牽微生是戀嘆彼駒光如夢如電賀聖朝慈悲方便永斷疑情極樂淨土不滅不生英流行知之而作兮明哲所由不知而作兮庸愚之儔慮而後動兮卓彼先覺率而妄動兮是乃下流堅固子馬蹀躞兮身不獲康念此身兮本自無常馬騰驤兮生不獲寧念此生兮本自無生月圎良馬之德於田可徵良朋之行相交乃明緩歌良馬云何乘者所思良朋云何久而敬之至純辭惟帝力兮勞來父母力兮免懷乘騏驥兮馳驟仗巨擘兮弓開美封君貢髙專美曰惟不仁擁資自厚不久四分惟不惺惺乃不戒懼凶心常萌誰與共處少年行嗟棄捐於巖穴兮盍逺播夫芳聲嗟終老於草莾兮盍永垂夫令名四天生吟悲哉北邙令聞宜揚北邙悲歟青史不渝宛轉辭瞻彼中林芃芃萬木旃檀有香生是使獨萬類咸若攘攘藝藝民之父母首出一人鐵驪載飛載翔惟翮是憑為聲為律惟心是經射之能中惟指是憑交之能善惟和是恆木槵珠鷇之成雛兮孚化之功羽用為儀兮賦命之隆迪彼愚䝉兮惟聖之功明厥本性兮實在已躬好合曲維勤斯哲安不可懷溺兹小樂至樂難期童阜乾照無私聖教無類謨訓洋洋鑒斯不昧天馬吟騏驥不羣蹇驢鴻鵠不偕斥鷃騶虞不邇狐狸聖哲不昵愚賤大龍馬吟疇知幻軀祕此佛性疇不退轉佛恩來證上德隨落疇其知病下士頓超疇其知競始條理福慧天亶誠哉難覯通人達士豈奚易逅追風赭馬葱兮蒨兮山有芳蘭僮兮祁兮首有妙鬘回波辭元首明哉首出股肱良哉罕匹賢夾輔兮王室莫執左道兮蟊賊長豫景行行止下民堪憐宜泛愛衆母逆忠言平調騏驥適我體櫜鞬衛我身嘉言資我道經史沃我心遊子吟升彼高阜兮思我故鄉有懷二人兮莫出戶堂陟彼崔嵬兮思我故鄉有懷二人兮莫出垣牆平調曲帝王無逸天地和寧辟公膚敏兆民阜成高士吟日之升天為經民之行君為程水之流隨坎盈牝之游駒之情哉生明非冒於貨賄也感兄弟之敬心非貪於飲食也感父老之誠忱髙哉行云何致太平睪然望皇衢人生夫何常善保千金軀民之不能忘令名照神區子孫振繩繩百千萬億餘三章敬遵佛敕如兹甘雨莫行邪惡種兹罪苦圓音身無常花到秋名無常雷不留財無常蜂釀蜜業無常海發漚闌杆賢者斯賢賢不賢不賢賢蜜蜂見花駐蜻蜓去翩翩思哉行千金寶馬不如先人之弊遺嘗盡諸果不如母乳之甘兮法座引電可畏兮時届朱明霜可畏兮五穀將登禍可畏兮歡樂所成罔不可畏兮憶神魂之初降生接引辭火宅無清涼苦塗無安樂鳥路誰能攜閻浮難駐腳化導辭閻浮提界如彼髙山越之維艱盡却今時大海漫漫欲渡良難七寶鞍瞻彼隄岸水則不濫有君牧民當無畔散飛鳥雖疲寧甘墮地君子固窮之死不二短歌嗟余生之歡樂兮似黃離之盈昃感韶光之荏苒兮似葉上之青色及芳華之當齒兮且喜樂以永日夕照時乎時乎時外無時時其逝矣奚與樂為黃離既昃定少溫暾天光既暮曀曀其隂歸國謠皇矣聖世藹如仁君懷哉懷哉日逺日分亦有良朋如兄如弟日遠日離能不遙跂僧寶吟投誠皈命即安且吉如佛塔廟云胡遠别和樂且耽手足提攜如姊如娣云胡遠離婆羅門引酪必成醐父將成祖沙必成邱母將成嫗三部落試觀三界漚起漚滅如彼秋雲乍興乍沒五部落流水何湯湯吾生如是遊雖有聖賢人誰能少滯留一番部合奏樂章大合曲元縡是依明神是祗一心至誠昭事勤只巍巍大君永底蒸民中心愛戴稽首來臣念人生之無常兮合勤修夫善行信百行之咸善兮終和平而神聽染絲曲大君至聖教敷率土敉寧萬邦拜跪奉主公莫丕顯元后惠懷萬方國彥棐恭協贊邦常率土之濱誠意漙將咸拜稽首依戴聖皇雅政辭皇皇聖明無遠弗燭林林衆庶無思不服元化惠心為善去惡聖人之邦長生永樂鳳凰鳴承乾體元惟我聖君光開草昧惟我聖君綱紀庶政惟我聖君父母萬國惟我聖君惟我聖君兮覆幬如天惟我聖君兮自新新民惟我聖君兮中外乂安惟我聖君兮羣慝消淪拜手稽首兮頌溢兆民乘驛使大地茫茫大海滄滄豈伊無寶求之奚方自古在昔為君為王膺圗御宇命不于常實心實政惠此萬邦聖御大寶繄惟我皇繄惟我皇兮疇可與之頡頏欽定大清㑹典則例卷一百
