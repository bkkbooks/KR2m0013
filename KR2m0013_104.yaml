body:
  text: 樂部和聲署一中和韶樂樂章元日黃鐘為宫御殿升座奏元平之章曰維天眷我皇四海升平泰運昌嵗首肇三陽萬國朝正拜帝閶雲物奏嘉祥乘鸞路建太常時和化日長重九譯盡梯航還宫奏和平之章曰聖人延俊英鈞天樂奏繞彤廷華夷一統寧士庶歡欣樂太平寶鼎御香盈祥煙裊瑞靄生簫韶喜九成齊慶祝萬年齡長至黃鐘為宫御殿升座奏遂平之章曰陽回黍谷春萬國衣冠拜紫宸旭日耀龍鱗雲物呈祥福祿臻堯階􅕴莢新熙庶績撫五辰九服共來賓調元化轉洪鈞還宫奏允平之章曰皇心克配天玉琯葭灰得氣先彤廷臚唱宣四海共球奏御筵珠斗應璣璿金鏡朗麟鳯騫人間景福全咨屢省懋乾乾萬壽聖節黃鐘為宫御殿升座奏乾平之章曰祥雲扈紫􅕴四海臣民祝聖齡淑氣轉階蓂堯籙羲圗燦御屏嵩呼遍在廷天呈瑞地效靈南極拱台星億萬載頌康寧還宫奏泰平之章曰皇躬福祿宜永紹鴻圗丕丕基彤陛長仙芝樂奏簫韶丹鳯儀南山獻壽巵人心悅天意隨為德遍羣黎歌樂愷萬年斯元宵節太蔟為宫御殿升座奏怡平之章曰皇心保泰和海宇升平樂事多瓊樹長新柯冰泮春流漲玊河晴雲展細羅擎堯酒泛天波花舞鳥能歌齊拜手賦卷阿還宫奏安平之章曰時雍頌帝堯玉佩鏗鏘慶早朝紫禁瑞煙飄春意凌寒上柳條和風禁苑饒陳仙樂奏簫韶三五正良宵宫漏永月輪高正月太蔟為宫御殿升座奏隆平之章曰敷天協氣鮮新又蒼龍正晨萬國歡心仰紫宸皇天錫嘏懿純陳充庭華瑵金根扇春風風兆人澤如春睿周萬品化洽無垠還宫奏顯平之章曰淵然至道遊神協天行地文照㝢騰華若早輪清明廣大和誾恩滂洋葭葦霑仁念民生生此辰酌於民瑞惟大有寶則賢臣二月夾鐘為宫御殿升座奏隆平之章曰所無逸恭己巖廊萬㝢協嘉祥吹律圜鐘諧舜琯負扆當陽柳風初轉芽黃翠甸輕雷蘇百昌發生心皇奉若寬大詔播天常還宫奏顯平之章曰肅羣后鳴佩鏘鏘拜手仰顒卬初日曈曨奎壁麗明庶風翔普天和氣休穰浹化鷹成鳩眼良躬清明基宥密恩溥洽達要荒三月姑洗為宫御殿升座奏隆平之章曰日麗風和遍寰區新榆改火龍旗荏苒晃鸞坡赫如曦皇升座羣辟集瑤珂拂花茵垂佩多天門蕩蕩無偏頗純嘏詠卷阿還宫奏顯平之章曰瑞靄祥飇映彤墀紅雲繚繞一人淵默德光昭百花中千門曉銅鶴篆煙飄奏仙音駕退朝促耕布榖飛靈沼盈耳說農勞四月仲吕為宫御殿升座奏隆平之章曰玉宸旦婺中天王御法宮乘朱路曳長虹六六泠簫諧女鳯萬物被薰風阜財解慍福祿來同還宫奏顯平之章曰麥秋滿野登桑農繭已成玉衡正泰階平上下交孚寰海靖婦子樂盈寧罄天亙地茂豫桐生五月㽔賓為宫御殿升座奏隆平之章曰禁林清反舌無聲登進忠良佞不行南風假大而宣平坐明堂賞五德法乘離以持衡還宫奏顯平之章曰槿初榮敷與朱明天稷星邊漢影萌紅輪照九神嘉生念農藝夏暑雨穆皇心以靡寧六月林鐘為宫御殿升座奏隆平之章曰鼓含少黃宫諧鳯伏庚光赤帝騎龍嘒彼三星正昏中茂對乘時穆聖衷陳金奏宣景風明光覲辟公還宮奏顯平之章曰彌六合黎元祝頌奉三無帝念淵沖蓊鬱元雲淹宸楓大雨時行黍稷芃虞琴奏皇在宫勤思劇月農七月夷則為宫御殿升座奏隆平之章曰金井桐飄大火流夷則聲清律應秋天行轉蓐收黃茂滿田疇曉光閶闔浮搏拊戞鳴球玉殿千官咸拜手仰宸旒還宮奏顯平之章曰鷹祭蟬鳴届白藏御廪初登榖始嘗秋回禁陛涼皇居奠總章恩膏正溥將零露浥瀼瀼六合顒顒齊所卬潔珠囊八月南吕為宫御殿升座奏隆平之章曰乾坤爽氣澄序宮殿清光靜安設九賓而法見叶九和於天端暗靄揚雲罕玲瓏動玉鑾烈徽猷兮萬世肅纓冕兮千官還宫奏顯平之章曰雲高漢迥參見露白飇清蛚寒汔告成夫萬寶祇祝釐於三壇瑞穀岐而秀玉粢好且完喜盈寧兮百室納嘉慶兮天歡九月無射為宫御殿升座奏隆平之章曰鴻依銀渚菊有黃華隴雲飛木葉下百穀登場罷芳辰逢令嘉黃麾列正衙豹竿移龍鱗射日上朱霞天錫吾皇多稼還宫奏顯平之章曰鞭鳴鐘動簾捲煙斜漾金風香衣駕天屣言還暇黃雲香滿車村村晝響耞處深宫心區夏重恤民家黼扆豳風圗畫十月應鐘為宫御殿升座奏隆平之章曰時合黃純熙修司職顓皇執坎持權聽彤廷珮響玉琯風宣懷黃綰白趨丹陛皇儀展於穆同天光華聖日罘罳煥彩暄到齊編還宫奏顯平之章曰寰海豐穰農夫之慶深宫理化揮絃念艱難稼穡不敢游畋琳琅萬卷環天祿三餘愛清宴探研時幾敕命明良喜起所寶惟賢十一月黃鐘為宮御殿升座奏隆平之章曰七日陽來天地仁萬象一中分人從心上起經綸綱紀三才屬大君答陽臨玉宸無私學化鈞包元履德日勞勤品類盛荷陶甄還宫奏顯平之章曰順氣祥風翺九垠太史正書雲沈幾先物福生人淵默雷聲秉道真八風依序均天根月窟循昭乎若日正三辰不逺復以修身十二月大吕為宫御殿升座奏隆平之章曰斗柄將東四序周佳氣滿皇州嘉平吉日諏翠輅充廷立九斿吾皇御大裘法坐侍王侯服舊德布新猷穆若天儀福祿遒還宫奏顯平之章曰太室黃雲紫氣䝉時雪報年豐天關橐籥充臘鼓催春大地通皇家寶緒隆契合動昭融月西朓日生東萬載回環不息同文進士傳臚㽔賓為宫御殿升座奏隆平之章曰啓丈明五色雲呈珊網宏開羅俊英梧岡彩鳯雍喈鳴氣如珠河似鏡集賢才於蓬瀛還宫奏顯平之章曰海榴舒木槿初榮宣賜宫衣最有名薰來殿角微涼生鳳棲梧麟在囿致皇風於升平武進士傳臚應鐘為宫御殿升座奏隆平之章曰寶殿雲開朱檐日近甲袍金瑣玲瓏看敦詩說禮國士之風王朝楨幹資英俊參帷幄克詰兵戎雲臺繪畫勳名偉績嫓美前蹤還宫奏顯平之章曰玉燭光調金甌綏靖兩階干羽雍容念求賢渭水兆協飛熊中林罝多賢士資心腹雲起風從龍韜豹略後先疏附鵬翼摶風車駕東巡至盛京黃鐘為宫御殿升座奏隆平之章曰維天眷我清一統車書四海寧法駕涖陪京祠謁珠邱展孝誠陟降舊宫庭思祖德答天明佳氣繞龍旍暾聖日海東升還宫奏顯平之章曰文思洽九瀛神孫繼治洊升平皇初七德成締造艱難景命膺撫序惕中情凝旒竚若奉盈照兹萬億齡烈祖武敬其繩駕幸翰林院黃鐘為宫御殿升座奏隆平之章曰龍文五色偕羽葆亭童法駕來祕閣列清才就日瞻雲瀛丈隈象緯正三台糾縵縵卿雲回元首實康哉舟用楫鼎需梅還宫奏顯平之章曰恩光浹面槐瀛洲十八並追陪南山頌有臺酒醴笙簧霖雨諧帝屣下蓬萊金支靄秀華堆文光輝九垓求千里始於隗命經略往討金川以本月律為宫御殿升座奏隆平之章曰臨軒䇿將聖武恢仙仗挾風雷龍驤虎賁羣英來專閫正藉勒銘才神機翊上台恩隆轂是推揚威邊徼圗雲臺承廟略往欽哉還宫奏顯平之章曰絳霄瑞靄六龍回寰㝢靖氛埃天戈遙指閶闔開敦忠秉信閫外裁風雲列陳該崇墉計日摧鋒車電掣天馬徠軍聲歡騰九垓凱旋行慶賀禮以本月律為宫御殿升座奏隆平之章曰慶溢朝端靄祥雲河山清宴鈴旗迢遞送歸鞍赫元戎繄良翰靖獻寸誠丹載干戈和佩鸞功成萬里勒銘還遐邇共騰歡還宫奏顯平之章曰雉扇徐回遍堯封齊銷烽燧依依楊柳六師歸逮春耕修農耒論賞䇿勳隨九重深五絃揮敷天率土裒時對日月耀明威皇太后宮三大節南吕為宫御宫升座奏豫平之章曰慈闈福履昌瑞雲承輦獻嘉祥徽流寶册光玉食歡心萃萬方旭日正當陽綏眉壽樂且康瑤池􅕴葉芳如山阜永無疆還宫奏履平之章曰璿宫瑞靄霏翬翟山河上衮衣寶籙慶璇幃萬國歡愈頌德徽長日麗晴暉青鸞舞鳯在墀康强福祿宜億萬載祝期頤皇后宫三大節南吕為宫御宮升座奏淑平之章曰承天地道光嗣徽音兮儷我皇椒宮壼教彰萬國為儀燕翼昌彤管紀芬芳春雲渥環珮鏘安貞德有常敷內政應無疆還宫奏順平之章曰瑤樞煥上台椒殿風和麗景開晴旭上蓬萊佳氣氤氲遍九垓祥雲護燕禖培麟趾育蘭荄雉扇影徘徊看瑞靄集宫槐一丹陛樂章三大節御殿羣臣行禮奏慶平之章曰鳯凰在藪麒麟在郊坰不如國士充陛廷野無遺賢宗有英夙夜在公在公明明外藩行禮奏治平之章曰我清世德作求若天行天盡所覆畀我清萬方悅喜來饗庭曰豫一人業業兢兢文進士行禮奏慶平之章曰賢關大啓五緯麗宵光九苞彩鳯鳴髙岡日華五色舜衣裳濟濟蹌蹌多士思皇武進士行禮奏慶平之章曰鷹揚鶚薦厲翮九霄清罝在野維干城龍韜豹略蜚英聲肅肅赳赳王國克生宫中行禮奏雍平之章曰關睢四教家邦作孚先黃裳元吉地承天六宫仁順化穆宣麟之趾兮萬福之原駕幸盛京羣臣行禮奏慶平之章曰重熙纍洽紘瀛被仁風穆如神孫臨鎬豐橋山禮成御故宫零露瀼瀼有來雍雍外藩行禮奏治平之章曰四方合敬同愛所尊親思木有本水有源東西朔南咸駿奔純固恪恭日子雲孫命經略往討金川經略行禮奏慶平之章曰金殿晨開銅龍啓推轂恩隆典儀九重上爭歌喜起敷聲教盡仰天威凱旋行禮奏慶平之章曰決勝從容籌上將師行肆靖遐方宣武略更敷文德垂衣治端拱明堂皇太后宫皇帝率王公百官行禮奏益平之章曰皇家燕喜福壽協慈徽千官拜舞萬國瞻依靄璇宮聖日輝皇后率妃嬪公主福晋命婦行禮奏雍平之章同前皇后宮行禮奏正平之章曰正坤維兮儷皇極母儀昭萬國福履永綏將六宫承法則一導迎樂章躬祀郊廟禮成回鑾均奏佑平之章南郊樂章曰崇德殷薦升燎告虔惟聖能饗至諴天眷駕六龍臨紫煙佑命申圗籙綿北郊樂章曰隤爾而靜持載廣生長至修祀聿來光景富媼愈元德升嶽瀆安民物亨祈穀樂章曰民者邦本民食乃天爰卜辛日大君殷薦龍角明祈有年耒耜親天下先雩祭樂章曰炎夏初屆憫我穡夫爰舉常祀盛樂用雩明德馨誠意孚禾稼登斯樂胥太廟樂章曰儀若先典追孝在天鴻慶遐鬯烈光丕顯祀事明神貺宣福庶民千萬年社稷樂章曰分職三大康乂國家平土蕃榖降休中夏薦吉蠲神不遐遍九垓鴻祉嘉東郊樂章曰雍肅音送暾出自東兼燭垂曜與天同用秩典修皇敬通表瑞輝揚至公西郊樂章曰殷仲嘗酎華黍若油興穀繁祉受符天後湧桂華凝彩斿玉燭調千萬秋帝王廟樂章曰時序羣品端在一欽衣德凝命荷天之任景軌儀誠既歆肅駿奔顒若臨文廟樂章曰先聖垂軌千載是祗䖍奉師表景行行止奠兩楹神降之啓後人文在兹先農樂章曰翩彼桑扈仁氣布和千畝親御百祥膺荷保介歆穜稑多帝手推民樂歌堂子樂章曰禋祀隆永維統百靈延福儲祉奠安神鼎修祀祠通紫庭降福祥昭德馨出師凱旋堂子樂章曰維文武略勳業攸崇欽承睿算往征不恭扇仁風在師中月三捷奏膚功一慶典均奏禧平之章視學樂章曰崇聖尊道乾德下交思樂多士化流芹藻鼓篋徵經術昭聽講環宏育陶巡狩方嶽車駕出入樂章曰棽麗六飛入蹕出警省方觀民施惠行慶一人行萬人幸載道歡曕天聖元日進表樂章曰元正朝饗臨御萬方閶闔通啓太平呈象旅貢陳軒樂張遍海隅瞻帝光長至進表樂章曰黃鐘應律玉琯回陽書雲薦瑞迎日履長共球集韶濩張奉金函來萬方萬壽聖節進表樂章曰神聖文武提挈六符綏以眉壽罄宜多祜邁斗維呈瑞圖萬嵗聲山應呼皇太后聖壽進表樂章曰昭受天貺鍾慶發祥文母禔祉福隆尊飬錫類蕃慈訓彰億萬年臨壽康皇后千秋進箋樂章曰坤德柔靜隂教順承螽斯麟角允維嘉應寶册鐫天慶膺永嗣徽如月恆實録告成進呈樂章曰昭示無坱謨烈聿