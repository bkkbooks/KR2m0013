body:
  text: 户部俸餉上一宗室俸禄親王嵗給俸銀萬兩世子六千兩郡王五千兩長子三千兩貝勒二千五百兩貝子千三百兩鎮國公七百兩輔國公五百兩一等鎮國將軍四百十兩二等鎮國將軍三百八十五兩三等鎮國將軍三百六十兩一等輔國將軍兼一雲騎尉三百三十五兩一等輔國將軍三百十兩二等輔國將軍二百八十五兩三等輔國將軍二百六十兩一等奉國將軍兼一雲騎尉二百三十五兩一等奉國將軍二百十兩二等奉國將軍一百八十五兩三等奉國將軍一百六十兩奉恩將軍兼一雲騎尉一百三十五兩奉恩將軍一百有十兩宗室雲騎尉八十五兩宗室雲騎尉品級八十兩以上每銀一兩給米一斛順治七年議準親王歲給俸銀萬兩禄米萬二千斛郡王銀四千兩米八千斛貝勒銀二千兩米二千八百斛貝子銀千兩米千六百斛公銀五百兩米千二百斛八年議準親王俸銀仍舊郡王嵗給銀五千兩貝勒三千兩貝子二千兩公千兩以上每俸銀二兩給祿米三斛九年議準給親王世子俸銀六千兩郡王長子三千兩十年議準親王等俸銀仍舊貝勒嵗給銀二千五百兩貝子千三百兩鎮國公七百兩輔國公五百兩一等鎮國將軍四百十兩以下各遞減二十五兩每俸銀一兩給禄米一斛一公主以下及額駙俸禄固倫公主嵗給俸銀四百兩和碩公主三百兩郡主二百五十兩縣主二百二十兩郡君一百九十兩縣君一百六十兩鄉君一百三十兩固倫公主額駙二百八十兩和碩公主額駙二百五十五兩郡主額駙二百三十兩縣主額駙一百八十兩郡君額駙一百五十五兩縣君額駙一百三十兩鄉君額駙百有五兩順治十年議準自固倫公主以下至縣君每俸銀一兩給禄米一斛額駙亦如之一世爵俸禄一等公七百兩二等公六百八十五兩三等公六百六十兩一等侯兼一雲騎尉六百三十五兩一等侯六百十兩二等侯五百八十五兩三等侯五百六十兩一等伯兼一雲騎尉五百三十五兩一等伯五百十兩二等伯四百八十五兩三等伯四百六十兩一等子兼一雲騎尉四百三十五兩一等子四百十兩二等子三百八十五兩三等子三百六十兩一等男兼一雲騎尉三百三十五兩一等男三百十兩二等男二百八十五兩三等男二百六十兩一等輕車都尉兼一雲騎尉二百三十五兩一等輕車都尉二百十兩二等輕車都尉一百八十五兩三等輕車都尉一百六十兩騎都尉兼一雲騎尉一百三十五兩騎都尉百有十兩雲騎尉八十五兩恩騎尉四十五兩閒散公二百五十五兩閒散侯二百三十兩伯品級官二百五兩子品級官一百八十兩男品級官一百五十五兩輕車都尉品級官一百三十兩騎都尉品級官百有五兩雲騎尉品級官八十兩以上每銀一兩給禄米一斛康熙七年題準外任旗員有革職休致仍畱世爵者該都統册送到部以到京日為始給與世爵俸禄二十八年議準八旗世爵應得俸禄均由該都統造册送部然後支給漢世爵應得俸禄具呈本省廵撫移咨兵部覈明並無事故即於本省給發仍取地方官印結送部察覈三十九年覆準漢世爵無職任者仍給半俸為綠旗武職者其世爵之俸或多於職任之俸準支世爵俸停支職任之俸若世爵之俸較少於職任之俸準支職任之俸停支世爵之俸雍正十二年奏準八旗世爵休致病故及休致有俸者應罰俸銀照舊扣抵十三年奏準漢世爵奉旨擢用京營外省及選用侍衛者均食全俸其發標効力未經授職及自願効力非命往者均給半俸實授始支全俸其奉旨令其囘籍及不能供職回籍並未及嵗承襲在家閒住者均停給俸乾隆二年議準八旗世爵授為外省文職如世爵之俸浮於外俸令於任所支領外任之俸所餘世爵俸銀并世爵禄米均畱京支領若世爵之俸與外俸相等並外俸浮於世爵之俸者俸銀均在任所支領其世爵禄米仍準畱京三年議準八旗世爵二十嵗以下者於各該旗官學敎習清漢文繙譯竢學習三年後該旗都統考列等第引見如有賦性愚魯習於便安者發囘本旗仍照年幼襲爵例只給半俸令其効力行走如行走勤謹三年無過者奏聞準給全俸其在學三年賦性聰明因年未及十八歳未便請旨考試錄用者仍畱學讀書竢年滿二十歲請旨考試四年奏準八旗世爵授外省武職者其世爵俸禄照補授外省文官之例畱京支領俾得養贍家口六年議準世襲佐領兼世爵者年至十六嵗應領全俸之時除世爵全俸少於佐領全俸者令食佐領全俸外如世爵半俸較多於佐領全俸者雖至十六嵗仍令其食世爵半俸若世爵半俸與佐領全俸相等或半俸較少於佐領之全俸者令其食佐領全俸均竢至十八嵗再領世爵全俸十三年覆準兼世爵之外任旗員遇丁憂回旗若别經差委見在行走者仍支世爵全俸如閒居守制别無職任者均給世爵半俸又覆凖八旗世爵補授外任所有餘俸仍照例畱京其不兼世爵之外任旗員停其俸禄畱京如有未完欠項統於任所應得俸銀内按數扣除報部若該員有在京子弟親族情願代扣者準按限代扣完結一在京文武各官俸禄正從一品銀一百八十兩米一百八十斛正從二品銀一百五十五兩米一百五十五斛正從三品銀一百三十兩米一百三十斛正從四品銀百有五兩米百有五斛正從五品銀八十兩米八十斛正從六品銀六十兩米六十斛正從七品銀四十五兩米四十五斛正從八品銀四十兩米四十斛正九品銀三十三兩一錢一分四釐米三十三斛一斗一升四合從九品銀三十一兩五錢二分米三十一斛五斗二升未入流俸銀祿米與從九品同順治元年定一二品漢官嵗給柴薪銀一百四十四兩三品一百二十四兩四品七十二兩五六品四十八兩七品三十六兩八品二十四兩九品十有二兩在俸銀之外五年定各衙門未入流筆帖式月給銀二兩七年奏準内府官不支俸銀月支米二斛十年定旗員每俸銀一兩給米一斛漢官不拘品級嵗支米十有二石十三年議準文武官俸禄不論滿漢一例照品支給裁漢官柴薪銀康熙十年議準在京漢官俸禄各該衙門總領分給凡新除升轉各官遇領俸時吏部兵部咨送到者準給過期者不準補給二十三年覆準在京王以下八旗文武各官俸禄每年於春秋二季覈實人數於未給之前先行題請如有罰俸降級者憑各衙門文移臨時裁扣四十七年題準廵捕營官弁由民籍武職補授者準支給俸薪由旗員補授者不必支給雍正三年諭朕體䘏臣工時深軫念每思經理區畫以贍其俯仰之資舊例在京漢官每年俸米皆支給十二石即可粗足見今漢官攜帶家口者多若俸米仍照舊數食用或有不敷居官者難免内顧之憂嗣後在京大小漢官著照俸銀數目給與俸米俾禄糈所頒足供養贍欽此五年議準桞村牐官嵗支俸銀俸米向在宛平縣地丁項下支領今既隸奉宸苑應入京俸册每春秋二季奉宸苑造册過部領俸時再具印領支給六年諭吏户兵刑工五部堂官内除差往外省署印外俸銀俸米著加倍給與其署理之堂官亦照此賞給若遇罰俸案件將朕分外賞給之俸不必入議欽此八年題準考取中書未補授者照滿貼寫中書例給與俸銀祿米十年覆準八旗副䕶軍校副驍騎校每月食餉銀五兩如遇閏月轉比䕶軍校驍騎校六十兩俸銀多得五兩嗣後䕶軍校驍騎校不必支俸每月支銀五兩十一年覆準在京漢官俸祿令各衙門將應領銀米數目於領俸前一月造册二本咨送吏部稽俸廳稽察有升遷降罰事故應行増除於原册内注明用印一本存案一本送部給發廵捕三營官弁俸禄先期造册咨送兵部覈轉至領俸之期自二月八月初一日起至初七日止遇有除授升遷準其一例關領過初七日不準補支十二年題準八旗内府及王公府屬佐領與旗下佐領均繫四品而支俸則百有十兩殊不畫一應照八旗佐領例每年均支銀百有五兩俸米一例闗支又題準漢世爵送部引見擢用及選用侍衛或分發廵捕三營者準支全俸其漢軍補授門千總者支領銀米照漢弁辦理又議準京官降罰事件奉旨後吏兵二部注册知㑹到部領俸時各該衙門將各官有無事故逐一造册咨送吏兵二部覈對外官調補京職有隨帶降罰案件者亦令本人呈明該上司一例造送候吏兵二部稽察轉咨到部覈實給發又題準在京各官支俸春季於豫年十二月十五日秋季於六月十五日以前造册送吏兵二部考覈移咨到部倘有遺漏或稽察未清銀米舛錯照例叅處在京漢官以二月八月初七日為限凡初七日以前有開復者準其補領老病告休革退物故者悉行裁扣若初七日以後不準補領亦不裁扣革職者仍裁扣至八旗各官册籍過部之後不補不裁革職者仍裁扣出師官弁有議處者竢凱旋之日具奏請旨再京外額外官弁在任辦事俸銀禄米亦照銜支領又覆準盛京等處及各省旗員或由見任調補京職或由見任升轉京職凡册籍未經過部該旗即造入册内支領如册籍過部之後升轉京職者該旗照依該員原銜造册送部補領其調補京職人員亦令照依原銜一例造送所有新任應得之俸統於下季分别入册支領乾隆元年諭八旗䕶軍校驍騎校等多由兵丁選補遇有事故罰俸恐致養贍無資嗣後遇有罰俸案件不必全扣著毎月扣除一半支領一半俾得藉此半餉稍資用度欽此又諭禮部堂官照五部堂官例給與雙俸欽此又諭後食為事君之心重禄乃勸臣之道從前在京文官俸入未足供其日用時廑皇考聖懐是以雍正三年特旨加増漢官俸米而各部堂官又加恩給以雙俸其餘大小各官原欲次第加恩俾得均霑渥澤今朕仰體皇考加惠臣工至意仿照雙俸之例將在京大小文官俸銀加一倍賞給令其用度從容益得專心於官守所給恩俸著自乾隆二年為始再從前賞給各部堂官雙俸時欽奉皇考諭旨遇有罰俸事件止罰正俸其恩俸仍行支給今各官所加之俸亦照此例行欽此又諭向来科道官於奉旨内升外轉之日即離原任俸祿公費均不支領嗣後科道官内升外轉者竢補授後再離原任其未補授之先仍食原官之俸照舊辦事欽此又奏準七品筆帖式嵗支俸銀三十三兩米三十三斛八品筆帖式嵗支俸銀二十八兩米二十八斛九品筆帖式嵗支俸銀二十一兩一錢一分四釐米二十斛五斗五升又議準八旗官在俸册過部後補授者除佐領世爵外凡有原任俸餉者不準補領如無原任俸餉可支春季於正月三十日秋季於七月三十日以前奉旨補授者均準其造册送部補領其緣事開復之員如在正月三十日七月三十日以前者亦準一例補領若在二月八月初一日以後補授者不準補領又覆準由部曹出差學政帶翰林銜仍照原官論俸推升其應得之俸仍由原衙門按季支領二年諭昔年皇考念部務繁多之尚書侍郎特恩加賜雙俸並令遇有罰俸處分免罰加賜恩俸此格外曠典也上年朕將在京文官俸銀槩加一倍大小均霑雖名恩俸實即正俸若遇處分時亦照從前部堂之例不罰加増之恩俸是在京文官竟無罰俸之事何以示懲且與武弁事不畫一未免偏枯嗣後大小京官遇有罰俸案件將本身應得之俸按年按月計算不必分晰扣除欽此又議準批本官傳奏官辦理養心殿造辦處懋勤殿暢春園圓明園中正殿繙書房熱河等處事務之御史郎中員外郎主事筆帖式等官暨實錄館律例館辦事各官雖不隸於各部院衙門亦均屬經制之員非各部未經授職在額外行走候補者可比應一例準其支領恩俸又覆準欽天監滿天文生給與九品俸禄而漢天文生仍舊食餉未為畫一應令欽天監堂官於漢天文生内將精通算法行走勤慎者選取二十四名