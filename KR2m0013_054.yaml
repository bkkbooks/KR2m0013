銜品支俸若三品以下官推授者仍支三品俸十七年題準各省領運千總俸薪銀舊例不論出運停運各照額編支領嗣後出運之年照例支領不遇出運之年不準關支二十一年題準候運千總俸銀仍照舊例支給二十八年覆準張家口等處旗員照保定等城駐防旗員筆帖式例給與俸米二十五年覆準都司改為正四品守備改為正五品專城衛千總雖繫正五品仍照原編專城衛千總俸支給其營千總改為從六品向来營衛武弁原無從六品亦未編有從六品俸銀應照原編營千總廪給每年四十八兩蔬菜二項照例支給四十七年具奏定例各省綠旗官弁均論品級支給俸薪馬匹草料心紅紙張柴炭等項叅將每月七兩游擊六兩守備五兩在京廵捕營向用旗人今民人亦有補用者應照旗人支給奉旨廵捕營官繫民籍見任補授者準其支給旗人不必支給雍正三年議準直隸廵撫改為總督守廵二道改為布按二司應準照銜食俸造入奏銷册内具題覈銷又題準糧船隨幫人員向於明季所遺世襲衛所官内僉選每員額給廩工銀五十四兩今停其選用將簡選武舉候推千總頂補額編廪工仍照舊例支給七年題準奉天文職各官俸銀均照京官例支給其俸米即於本年秋季起在各該處存倉粟米内就近支發又覆準浙省鹽場大使向繫未入流職銜其名下每年原編俸銀三十一兩五錢二分於地丁項下支給今給與正八品職銜每年應支俸銀四十兩除原編俸銀三十一兩五錢二分外每人不敷銀八兩四錢八分於闕官俸銀内支給八年諭新授武弁應以領劄到任之日為始支給俸薪若升遷調補之人未曽接領劄付尚在舊任其俸薪銀應照舊職銜給與以資食用其作何定例該部詳議具奏欽此遵旨議準武職俸薪除新授官弁於到營任事之日起支外其升遷調補之人尚在舊任者仍照舊任職銜給與俸薪竢離營之日停支十二年題準漢世爵送部引見補授外省守備都司者準其支食全俸其發標効力未經得任及情願効力命往者均給半俸受職後準支全俸若奉旨令其囘籍及試看不能供職咨囘原籍並未及年歳承襲在家閒住者槩停給俸又武職支給俸薪於受劄任事之日起支離任之日停支凡調撥出兵直隸等六省大小官弁遞行委署者以委署之日算俸並給與俸禄其分發各省及廵捕三營効力兵弁如繫見任分發効力之人有見任職銜應於到營之日照銜支食俸薪候補分發及原無職銜特旨分發者該督撫等或委署别任即於受劄任事之日照所署任内給與俸薪心紅馬乾等項至該員到營後未經補授委署之時有職銜者照職銜給與一半俸薪無職銜者量給把總俸薪之半其餘心紅馬乾等銀不準支給又覆準學習期滿進士委署試用委任内遇有因公叅罰事件皆照委任官例議以罰俸其已經題署一應照題署之任以奉旨日為始給與額編俸銀十三年奏準各省武職例由受劄之日起俸但劄付有遲速不同嗣後各省官弁關支俸銀均以受劄任事之日為準又覆準各省分發武弁經督撫委署受事尚未接劄付者照所署之職給與一半俸薪全支心紅馬乾等銀竢接劄之日全給署任俸薪其見任題升人員已經任事尚未受劄及未經引見者照舊任職銜支給俸薪新任内支給心紅馬乾等銀乾隆元年諭舊例敎職兩官同食一俸未免不敷養㢘著從乾隆元年春季為始照各官品級給與全俸永著為例欽此又覆準各省官弁除給劄委署者應得俸薪按照本銜支領外其候補試用人員所署之職無原官支食俸薪者即在署任内按照候補試用之例支給其餘均歸截曠造報如署任内俸薪尚有原官支食者即於建曠銀内撥給至見任官弁所署之職無原官支食者即歸截曠項下報部撥用毋令署官任意支食出征遞行委署官弁亦照此例三年覆準部發武舉掣委各幫領運牢役工食向繫扣存解部但官有代運之分而牢役隨幫供役無異未便令其枵腹其工食應準一例支給又覆準佐雜微員俸廩有限革職之後仍議勒追窮員羈畱任所情實可憫嗣後佐貳雜職因貪贓枉法革職者任内有降罰案件照例仍追編俸其實由因公罣誤革職無論任内降罰案件多寡食過編俸一槩免追四年題準湖北湖南試用文職委署升遷事故員闕有馬夫者準其將額編馬夫工食銀與額編俸銀一例支給無馬夫工食者止支額俸其委署出差員闕俸銀工食本有見任之人支食署官俸工停其給與又題準各省運弁俸銀從前或在道庫給發或在屯折項下按季給發未得及時支領嗣後江南江安各幫運弁均在道庫支領出運全數發給候運按季覈給江蘇白糧千總六人鎮江衛分設中幫千總二人並鎮江前後兩幫隨幫均在道庫支領其蘇㤗等衛十有八人向於屯折項下支領者改歸道庫減存銀内給發其屯折項下原編銀減存解司浙江出運之年於道庫減存銀内給發歇運之年於坐編衛所屯餉存畱支給嗣後將該衛所起解屯折先盡存畱按季解司以便支給河南繫各省船撥運其山東臨清前後平山前後徳州任城天津等七幫見運之人在豫省支給俸工於開幫之前全數給發通州運弁俸工赴坐糧㕔按春秋二季支領惟見運軍牢於豫省兌漕時支給徐州前後長淮三幫運弁俸工赴江安糧道全支湖南省岳州増設千總二人在於道庫存剩隨漕銀内支給其荆州荆左荆右三衛岳州衛向在屯折項下支給者出運之年改於道庫三分公項内全支竢徴解本款歸補歇運之年照舊支給江南湖北運弁俸銀於出運之時全支山東或在道庫或在衛所按季支領從無遲延仍照舊例給發又覆準江西南昌等各衛所千總每年應支俸銀因本年未及開徴即需給發無銀動支於上年漕項屯糧銀内先行支給竢各屬徴解歸款五年諭凡遇州縣錢糧停徴緩徴分年帶徴之時其佐雜微員應得俸銀及胥役應領工食若有墊發及未給準於司庫存公銀内如數撥補仍將應徴民欠依限催收解還藩司以清庫項欽此又覆準浙省地丁存畱項下應給俸工役食向以錢一銀九之數造報均屬虚揑嗣後官俸役食統以銀數造報不必列作錢數各省中惟蘇屬官役俸工存畱項下有原編錢數者亦應更正奏銷又奏準分發各省試用人員未得官以前例不支俸而月給薪水銀各省又未畫一嗣後凡奉旨命往各省試用同知知州等官每人月給薪水銀四兩通判知縣等官三兩分發佐雜等官二兩以資養贍均於存公項下動給歳終報部覈銷六年題準各省駐防驍騎校歳支俸銀六十兩按月赴司關領又覆準各省隨標學習武舉給與馬糧一分考驗後分發候補千總之武舉給與把總全俸分發武進士給與千總全俸其分發降級人員照所降應得職銜給與一半俸薪至革職人員有奉旨指定職銜分發試用者照職銜給與一半俸薪並未指定職銜分發酌量試用者照無職銜之例給與把總一半俸薪再見任官員因事降革旋經開復該督撫題請畱於該省補用未經補用以及千把畱標未經拔補之前均不準給與候補俸薪若分發人員到標後緣事降革旋經開復仍令畱標候補者仍於開復之日照應得職銜支給一半俸薪又覆準年滿千總隨營候推給與馬糧一分其發囘以守備題補並發囘原任後經年滿畱標候補守備以及豫行保舉注册年滿離營候補守備者均照分發武進士之例給與千總俸至見任官員特旨簡發補用並奏請帶往别省補用及水陸改調候補裁汰畱標别補均照原任職銜支食俸薪再分發侍衛繫有職無任之人照原職給與全俸又覆準分發武弁署任如有銜大職小者照銜支食一半俸銀照職支食一半薪銀八年題準太原駐防旗員自協領以下並無親丁名糧惟支口糧及馬匹草豆凡因公降革畱任之人若照俸銀一例裁革則家口馬匹養贍無資嗣後各省駐防旗員如遇降革畱任者除停給俸銀外其任内應給額設口糧馬匹草豆照綠旗官弁支食養㢘名糧之例準其支給十年奏準各省武職千把總因貪贓枉法軍機獲罪革職者未完降罰案件仍追食過俸銀如因公罣誤革職者無論降罰案件多寡食過俸銀免其追繳十二年題準敎職告假期内停其食俸將編俸銀按日扣存造入闕官奏銷册内仍將告假回任各日期報部察覈十八年覆準綠旗營武職向繫照銜食俸今既將大小銜刪除則自提督以至守備所食俸銀自當一例更定應將提督定為從一品食俸八十一兩六錢總兵官定為正二品食俸六十七兩五錢各有竒副將以下各官原繫按品定俸毋庸再議一外藩俸祿喀爾喀汗科爾沁三親王歳給銀二千五百兩段四十疋諸部落親王銀二千兩段二十五疋世子銀千五百兩段二十疋科爾沁扎薩克圖郡王銀千五百兩段二十疋諸部落郡王銀千二百兩段十有五疋長子銀八百兩段十有三疋貝勒銀八百兩段十有三疋貝子銀五百兩段十疋鎮國公銀三百兩段九疋輔國公銀二百兩段七疋扎薩克台吉銀百兩段四疋下嫁外藩固倫公主銀千兩段三十疋和碩公主銀二百兩段十有二疋郡主銀一百五十兩段十疋縣主銀百兩段八疋郡君銀五十兩段六疋縣君銀四十兩段五疋鄉君銀三十兩段四疋固倫公主額駙銀三百兩段十疋和碩公主額駙銀二百兩段九疋郡主額駙銀百兩段八疋縣主額駙銀五十兩段五疋郡君額駙銀四十兩段四疋縣君額駙銀三十兩段三疋一等台吉銀百兩二等台吉八十兩三等台吉六十兩四等台吉四十兩一等子二百五兩二等子一百九十二兩五錢三等子一百八十兩一等男一百五十五兩二等男一百四十二兩五錢三等男一百三十兩一等輕車都尉百有五兩二等輕車都尉九十二兩五錢三等輕車都尉八十兩騎都尉五十五兩雲騎尉四十二兩五錢賜達爾漢號者銀二十兩段四疋八品官銀二十兩順治十一年議準䝉古王以下公以上身故停給俸禄竢承襲後各按爵秩支給十八年議準外藩世爵俸照内世爵俸減半頒給康熙三年議準下嫁外藩公主以下薨逝額駙有爵秩者仍準給俸無爵秩者停給十七年題準外藩王貝勒貝子公等已故遇領俸時不竢其子承襲一例支給應得之俸雍正二年覆準青海王貝勒貝子公台吉歳給俸銀就近於蘭州藩庫給發其俸段由理藩院於部中支領差筆帖式一人齎往頒發七年諭從前扎薩克蒙古王等之俸比在内王等少給者並非以内外輕重分别因䝉古王等人多在䝉古地方居住費用有限國帑不足故少給伊等之俸今䝉上天恩庇聖祖皇帝遺惠天下無事數年来豐收國帑尚屬有餘朕為統育天下羣生之大君凡事無不周慮行之䝉古王等以下扎薩克一等台吉以上皆著増俸一倍再尋常一等台吉原不給俸今亦照前扎薩克一等台吉等食俸之例賞給此朕特加之恩亦未便遽定為例嗣後歳終戸部理藩院㑹同將應否倍賞之處奏聞再降諭旨欽此十年諭八旗察哈爾䝉古駐牧近邊與内地人相同効力有年原定例察哈爾官内有職任者給與半俸無職任散秩官給與俸祿四分之一念其皆國家効力舊人特沛恩澤將有職任官給與全俸其無職任散秩官給與半俸欽此又議準乾清門行走之一等台吉歳給銀百兩二等八十兩三等六十兩四等四十兩乾隆二十年議準杜爾伯特等部落汗親王郡王貝勒貝子鎮國輔國公扎薩克台吉等俸銀俸段照喀爾喀汗王公台吉之例頒給每年令各差官乘傳赴京於户部關支欽定大清㑹典則例卷五十一
