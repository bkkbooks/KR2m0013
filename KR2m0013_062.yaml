front:
  text: 欽定四庫全書欽定大清會典則例卷五十九
  hash: sha256:d62f8b631cd2bb61a314cd10356fb872bfe90dba7119601254bdf243be22c04e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_062-1a, image: WYG0622/WYG0622-0054a.png}
body:
  text: 禮部儀制清吏司經筵一經筵順治九年定每歳春秋仲月各舉經筵一次大學士知經筵事以尚書左都御史通政使大理卿學士等官侍班以翰林院官二人進講十四年議準毎歳春秋行經筵禮豫期禮部行知欽天監諏吉内閣酌定講官人數均具疏奏聞經書講章令講官撰擬内閣改定恭呈御覽康熙二十四年文華殿告成經筵前一日祗告皇師帝師王師先聖先師於傳心殿是年定以大學士尚書左都御史學士詹事由翰林出身者充經筵講官雍正三年諭自古修己治人之道載在經書帝王御宇膺圖咸資典學我聖祖仁皇帝天亶聰明而好古敏求六十餘年孜孜不倦朕幼承庭訓時習簡編自即位以來更欲以研經味道之功為敷政寜人之本顧以亮隂之際未舉經筵今八月二十三日為釋服之期爾部可擇日舉行經筵典禮欽此乾隆五年奏準衍聖公入覲來京恭遇經筵即令入班聽講是年諭經筵之設原欲敷宣經㫖以獻箴規朕觀近日所進講章頌揚之辭多而箴規之義少殊非責難陳善君臣咨儆一堂之意人君臨御天下敷政寜人豈能毫無闕失正賴以古證今獻可替否庶收經筵進講之益若頌美過甚不能實踐躬行反滋朕心之愧此後務剴切敷陳期有禆於政治學問勿尚鋪張溢美之虛文而無當於稽古典學之實義欽此七年諭今日舉行經筵典禮禮部據向例以天雨奏請改期朕思魏文侯將出獵而雨左右不欲行文侯曰吾已與虞人期矣豈可無一期會哉乃徃身自罷之夫田獵之娱尚不以遇雨失期况經筵大典業經祭告自應舉行但執事諸臣例應在丹墀内行禮未免衣冠沾濕著衣雨服列班駕到即入殿進講講畢即奏禮成其階下行禮殿内賜茶諸儀停止嗣後遇雨皆照此例欽此一日講順治九年定每歳於春秋仲月御經筵後舉行日講禮嗣後率以為常冬夏至前一日乃輟講又定每日講章滿漢講官分撰繙譯謄繕畢先期以正本進呈御覽又定滿漢進講官滿一人漢二人或三人每日奉副本詣乾清宫設於案行一跪三叩禮畢以次進講講畢行一跪三叩禮退康熙十六年奉㫖講官進講畢免行一跪三叩禮視學一視學順治九年定先期禮部具題差行人召衍聖公五經博士各氏後裔乘傳赴京觀禮至日世祖章皇帝幸太學行釋奠禮畢詣彛倫堂御講幄國子監祭酒講四子書司業講經宣制以勉太學諸生翼日衍聖公及祭酒等上表行禮賜衍聖公内院翰林官祭酒司業五經博士各氏後裔及禮部太常光禄鴻臚寺各執事官燕於禮部越二日於午門前賜衍聖公貂冠朝服滿漢祭酒司業錦縁領袖紵絲袍監丞五經博士各氏後裔筆帖式紵絲袍助教肄業生白金各有差各氏後裔並送監讀書廣國子監鄉試中額十有五名又頒勅諭一道勉勵諸生祭酒奉置采亭率屬前導至太學開讀祭酒率衆行禮畢刋刻懸設彛倫堂越三日衍聖公祭酒司業率五經博士各氏後裔及學官諸生於午門外謝恩十七年重修文廟落成視學禮儀與九年同康熙八年聖祖仁皇帝幸太學行釋奠禮講學於彞倫堂頒勅諭一道賜衍聖公國子監祭酒以下與順治九年同各氏後裔送監讀書者十有五人國子監鄉試廣中額八名雍正二年諭帝王視學大典所以尊師重道為教化之本朕覽史册所載多稱幸學近日奏章儀注相沿未改此臣下尊君之辭朕心有所未安今釋奠伊邇朕將親詣行禮以後奏章儀注稱幸非宜應改為詣學欽此又諭禮部朕於三月内舉行視學釋奠大典衍聖公例應陪祀聞孔傳鐸有疾且值守制之初可令伊子弟一人來京代伊行禮欽此遵㫖行文衍聖公將候襲適長孫並伊子弟列名奏請奉㫖代衍聖公本應令伊適長孫行禮但年尚幼令伊等酌量一人乃以次子候襲五經博士孔繼溥代行禮續由部奏請服色仍照本身品級坐次在一品官之末奉㫖既代衍聖公行禮仍令在原班坐是年世宗憲皇帝詣學典禮與康熙八年同賜衍聖公國子監祭酒以下皆如康熙八年其在京進士舉人與觀禮者與貢監生同賜白金各氏後裔送監讀書者十有五人廣國子監鄉試中額十有八名乾隆二年諭先師孔子聖集大成教垂萬世我皇祖聖祖仁皇帝皇考世宗憲皇帝親詣辟雍登堂釋奠儒臣進講經書諸生圜橋觀聽雍雍濟濟典至盛也朕祗承丕緒嚮慕心殷國學文廟特命易蓋黄瓦以展崇敬竢工程告竣之日朕躬詣釋奠用昭重道隆師作人造士至意欽此是年奏準閔氏冉氏言氏卜氏顓孫氏端木氏世襲五經博士均照五氏之例行取陪祀並取閔冉等氏各二人赴京觀禮三年皇帝視學典禮與雍正二年同重頒勅諭一道四配十二哲後裔暨元聖周公裔東野氏來京觀禮者三十一人均送監讀書廣國子監鄉試中額十有八名是年召見衍聖公暨五經博士各氏後裔等十有八人奉諭爾等皆聖賢後裔因朕視學來京特行召見爾等既為聖賢之後即當心聖賢之心凡學聖賢者非徒讀其書而已必當躬行實踐事事求其無愧方為不負所學况身為聖賢子孫尤與凡人不同不能實加體驗徒騖讀書之名實與祖德家風不能無忝爾等務湏勤思勉勵克紹先傳以副朕諄切期望之意欽此賜衍聖公國子監祭酒以下與雍正二年同加賜衍聖公御製樂善堂文集徽墨二匣貂四至聖後裔五人各貂三五經博士各貂二文集徽墨同一闕里講學康熙二十三年定宣講經書以聖裔賢裔充進講官以大學士充宣勅官經書講章由翰林院撰擬均先期奏請欽定前期一日恭設勅諭於大成門東詩禮堂内東旁案上設講案於堂西檐下陳經書講章於案至日聖祖仁皇帝致祭先師孔子禮畢乃御詩禮堂進講講畢宣勅勅曰至聖之道與日月並行與天地同運萬世帝王咸所師法下逮公卿士庶罔不率由爾等逺承聖澤世守家法務期型仁講義履中蹈和存忠恕以立心敦孝弟以修行斯湏勿去以奉先訓以稱朕懷爾等其祗遵毋替宣訖謝恩畢駕還行宫各退是年賜衍聖公蟒衣狐裘貂裘各一襲表裏各五端知曲阜縣事及五經博士各氏後裔進士舉人貢監生生員各銀幣有差乾隆十三年車駕東巡致祭先師孔子御詩禮堂講學典禮與康熙二十三年同是年奏準設御案於詩禮堂御座南陳講章正本於御案又奏準東野氏閔氏冉氏言氏卜氏端木氏各後裔照孔顔曾孟仲五氏之例同赴講堂聽講是年賜衍聖公蟒衣狐裘貂裘各一襲表裏各五端御製樂善堂文集御製日知薈説十三經二十一史明史唐宋文醇各一部曲阜縣知縣五經博士各采幣一端衣一襲御製日知薈説朱子全書各一部各氏後裔在仕籍者及進士舉人各采幣一端衣一襲貢監生員衣一襲是年諭先師修道立教天下萬世服習聖訓咸有以自善其身況為子孫者乎卿以宗裔奉祠紹封列爵既優崇矣當思淵源何自夙夜敬勉親師向學以植始基慎言謹行以培德器循循詩禮之教異日卓然有所成就允孚令望表率族黨俾當世知聖人之後能守家傳而勿替非徒章服之榮己也豈不休哉其祗遵罔斁欽此又諭朕東廵至曲阜敬禮先師躬詣講堂覩宗廟百官之盛衍聖公既優加賞賚其餘聖賢後裔應一體加恩凡孔氏及十二氏子孫官員著加一級進士舉人各賞銀十兩貢監生員各五兩俾共沐榮恩鉅典欽此又諭朕躬詣闕里釋奠廟堂車服禮器用慰仰止之思念魯國諸生素傳禮教應加恩黌序廣勵人材山東通省入學額數著加恩增廣一次府學大學增取三名中學二名小學一名以廣聖澤以光文治欽此又諭朕此次東巡加恩士類已令增廣入學名數復念十三氏子孫逺承世緒濟濟膠序其中當有文學可觀讀書立品之彦宜加甄㧞以廣恩施其令該學政考驗其文行兼優者數人咨送禮部貢入成均示鼓勵焉欽此欽定大清㑹典則例卷五十九
