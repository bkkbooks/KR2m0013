body:
  text: 鑾儀衛一鹵簿原定大駕鹵簿朝祭均用行駕儀仗於巡幸皇城內用之行幸儀仗用以時巡省方臨祭均乘涼步輦大朝日則設於太和門東玉輅大輅大馬輦小馬輦香步輦並稱五輦乾隆七年奏準大祀親詣行禮均乘禮輿出宮至太和門乘輦又奉旨凡遇祀畢還宮均備禮輿永為定例八年議準大輅改為金輅大馬輦改為象輅小馬輦改為革輅香步輦改為木輅玊輅仍舊以符五輅之制十三年諭朕敬天尊祖寅承毖祀壇廟祭器聿既稽考古典親為釐訂命所司準式敬造質文有章自今歲圜丘大祀為始灌獻陳列悉用新成祭器展虔敬焉古者崇郊饗則備法駕乘玉輅以稱巨典國朝定制有大駕鹵簿行駕儀仗行幸儀仗其名參用宋明以來之舊而旗章麾蓋視前倍簡今稍為增益更定大駕鹵簿為法駕鹵簿行駕儀仗為鑾駕鹵簿行幸儀仗為騎駕鹵簿合三者為大駕鹵簿南郊用之方澤以下皆用法駕鹵簿五輅酌仿周官及唐宋遺制金玉象革木各如其儀乘用亦自今歲南郊始光昭羽衛用肅明禋諭所司知之欽此又議準涼步輦改為金輦更製玉輦大祀南郊乘玊輦北郊太廟社稷壇乘金輦其餘各壇廟均乘禮輿遇朝會則玉輦金輦並設於太和門外巡幸皇城內設鑾駕鹵簿時巡省方設騎駕鹵簿一朝會執事原定皇帝御太和殿受朝賀暨慶典筵燕由禮部鴻臚寺知會先一日本衛委官率校尉鋪棕薦於殿陛至日陳設鹵簿以冠軍使等官六人立於丹陛西階三成各二人皆東面校尉執靜鞭分立於丹墀左右各二人東西面駕出宮午門鳴鐘鼓升座樂止冠軍使等官自一成階傳贊鳴鞭至三成校尉北面鳴鞭者三文武各官行禮畢仍贊鳴鞭如前又定大朝日漏未盡時本衛委官率校尉自禮部舁表箋亭至午門前陳設導以引仗鼓樂又定實録玉牒告成及每年進時憲書均委官率校尉舁進又定每日黎明設常朝四象於天安門外左右排列又定凡遇頒詔委官率校尉設雲盤黃蓋於太和殿丹陛下設龍亭引仗於午門外俟詔出承以雲盤張黃蓋出午門恭設亭內校尉舁亭黃蓋引仗前導於天安門宣讀畢舁至禮部發文武殿試榜舁至長安門外餘與頒詔同又定文武殿試由禮部兵部題請簡用鑾儀使以下等官巡綽考選翰林庶吉士散館考選御史及主考博學宏辭由衛委官巡綽均分撥校尉給役歲貢生於天安門外考試委官校巡綽亦如之又定春秋經筵委官率校尉舁書案至講所又定親征命將及凱旋受俘均照朝會陳設鹵簿一祭祀執事原定冬日至大祀圜丘孟春祈穀孟夏常雩由太常寺知會先二日委官率校尉舁亭至午門前次日舁入太和殿陳祝版玊帛香俟御殿閲畢舁至祀所神庫安設均以引仗前導祀日請神牌委官率校尉舁龍亭又定南郊各祀及大祀北郊皆先一日委官率校尉陳鹵簿於午門外駕詣齋宮鹵簿前導前部鐃歌大樂均設而不作皇帝盥洗冠軍使雲麾使進盥槃帨巾禮畢回鑾鹵簿前導作前部鐃歌大樂以金二鳴鉦三鳴為鼓角作止之節時饗太廟駕出嚴鼓回鑾鳴鐘親祭堂子春秋祭社稷朝日夕月耕藉饗先農親祭前代帝王先師孔子由太常寺知會祭日委官率校尉陳鹵簿午門鳴鐘鹵簿前導臨祭進盥槃帨巾回鑾作樂儀同又定凡遇車駕出入午門及祭祀詣齋宮均委官率校尉鳴鐘又定時饗太廟祭社稷委官率校尉鋪棕薦親祭前代帝王先師孔子傳心殿均委官設拜褥郊外之祭用太常官又定太廟燎爐灰每年委官率校尉送至金海河內又定日食月食救護及迎春洗象旗手衛官率校尉陳設金鼓又定凡遇祭祀以漢冠軍使二人陪祀乾隆十七年奏準大祭北郊祝版亭先一日本衛委官率校尉舁至午門外俟太常寺官奉出恭設亭內官率校尉舁至祀所神庫安設引仗前導祀日請神牌委官率校尉舁鳳亭一本衛官除授原定掌衛事大臣員闕由領侍衛府將應補之領侍衛內大臣內大臣職名開送兵部題請補授滿鑾儀使員闕於滿冠軍使及一等侍衛內簡選滿冠軍使員闕於滿雲麾使內簡選滿雲麾使治儀正員闕於滿治儀正整儀尉內以次簡選如選不得人行文領侍衛府簡選三旗三等侍衛擬補雲麾使藍翎侍衛擬補治儀正滿整儀尉員闕於滿洲蒙古世爵及佐領內簡選均由衛引見補授漢鑾儀使貞闕由兵部將直省提督總兵官及本衛漢冠軍使職名開列題請補授漢冠軍使員闕於漢雲麾使內簡選漢雲麾使員闕於漢治儀正內簡選漢治儀正員闕於漢整儀尉內簡選漢整儀尉員闕於漢軍世爵及佐領內簡選均由衛引見補授又定大計軍政屆期均由衛注考冠軍使以下密咨兵部主事以下密咨吏部彚疏以聞雍正三年奉旨漢整儀尉員闕於漢軍領催驍騎間散人等內簡選引見補授乾隆十三年奏準本衛額設滿漢各官不敷差委嗣後將漢武進士簡拔侍衛藍翎侍衛者每科以十有五人撥入本衛一同當差行走其升用之處仍照侍衛之例十七年奏準每科武進士簡拔侍衛者十人之內以四人撥入本衛當差行走若數有多寡照此酌撥十九年奉旨掌鑾儀衛內大臣貞闕由領侍衛內大臣將領侍衛內大臣內大臣開列請旨補授不必由兵部具奏一軍尉原定佩儀刀弓矢殳戟用上三旗親軍執豹尾槍馭仗馬用內府護軍均於臨時傳用服緣領織金壽字石青段衣冬戴紅絨緯染黑獺皮帽夏戴紅絨緯涼帽事竣仍回原處當差奉輦校尉擎執鑾駕騎駕鹵簿校尉均服紅紬團花遜衣束緑紬帶冬戴紅絨緯豹皮帽夏戴紅絨緯黑氊帽均安銅頂奉輦用起花抹金擎執用素銅插黃翎擎執大駕鹵簿校尉及和聲署史均服紅紬團花遜衣束緑紬帶戴紅絨緯黑氊帽銅頂插黃翎內有擎執金器校尉冬戴紅絨緯染黑獺皮帽夏戴紅絨緯涼帽又定朝祭陳設鹵簿兼用旗尉民尉巡幸皇城陳設鹵簿用旗尉時巡省方陳設鹵簿兼用旗尉民尉皇太后皇后儀駕皇貴妃貴妃儀仗妃嬪采仗用旗尉氊皇貴妃以下紅絨緯黑帽銅頂上插金黃翎大內陳設則用內監又定奉輦旗尉百六十八名擎執旗尉二百四十六名內頭役五十二名奉輦擎執各二十六名每名月給銀二兩五錢餘各月給銀二兩每名每年均各給米四十二斛二斗奉輦民尉六十名每名月給銀二兩米折銀一兩八錢三分三釐三毫左右中前後五所民尉共千三百二十八名內字旗十有五名頭尉三十八名每名均月給銀五錢米折銀四錢五分五釐馴象所民尉共二百有六名內字旗三名頭尉一名每名月給銀五錢米折銀四錢五分五釐旗手衛民尉三百二十二名內字旗六名頭尉四名每名月給銀五錢米折銀四錢五分五釐鼓手旗尉八十八名內頭尉八名月給銀米與五所同上三旗鳴蒙古畫角軍三十名內什長三名每名月給銀四兩餘各月給銀三兩每名每年均各給米四十八斛又定旗尉闕於內府旗鼓佐領內管領下匠役園户間散人內選補鳴畫角軍闕於上三旗蒙古佐領下護軍驍騎間散人內選補民尉闕行文五城將殷實良民保送充補飼象民尉闕即以民尉所生之子充補又定校尉有犯部院各衙門移咨本衛令該管官察送雍正六年奏準民尉闕如不得其人於內府旗鼓佐領下間散人內選補乾隆七年奏準鼓手旗尉八十名並頭尉八名均撥入樂部改名署史令其學習音律又民尉六十名見以內府匠役間散人等借補今將此六十名竟改用旗人亦撥入樂部學習音律其月給銀米及補革等事均由樂部辦理若遇本衛差使仍令照舊承值十三年奏準本衛額設民尉千八百五十六名內有字旗二十四名頭尉四十三名均一例月給銀米九錢五分五釐但字旗頭尉每日衙門辦事兼令約束各民尉當差之處較繁用度實屬不敷是以向來有私行幫貼之弊應將字旗連本身所有錢糧每名月給銀二兩五錢頭尉連本身錢糧每名月給銀二兩又奏準本衛擎執旗尉二百四十六名原按應用之數設立今大駕鹵簿新增儀仗一百十有二共應用旗尉三百六十二名除額設外尚少一百十有六名嗣後遇陳設時所少之人行文內務府將食錢糧服役人等撥送令穿遜衣擎執並委內管領約束事竣仍令回原處當差一譙漏原定本衛每夕委官率校尉登鐘鼓樓直更又定額設更夫二十名由兵部於八旗漢軍佐領下驍騎正身間散人內選補送衛當差每名月給銀三兩共養馬十匹每匹月給草料銀三兩遇巡幸隨圍及駐蹕等處撥往直更候時更香由兵部行文光祿寺給發又定巡幸御營門前每日黎明時本衛扈從官率蒙古鳴角軍鳴畫角署史鳴大小銅角日晡時鳴畫角間作鐃歌清樂鐃歌大樂數闋引退郎嚴更鼓又定遇郊祀先期駕宿齋宮旗手衛官率校尉設鼓角三鳴畫角起更發擂又定郊壇內守更均令本衛官校承直康熙三十一年奏準增設更夫十有二名六十一年奉旨神武門鐘鼓著鑾儀衛官校承直雍正十年議準更夫馬十匹全裁遇有隨圍差使由兵部撥給八旗官馬盤費等項仍由衛支給乾隆三年奏準更夫三十二名不敷應用再增設八名共四十名以供應差十四年諭朕於兩郊大祀先御齋宮以齊一思慮聞之記曰齋者耳不聽樂孔子曰三日齋一日用之猶恐不敬二日伐鼓何居言不敢散其志也今齋宮宵漏下鳴畫角嚴鼓以為節雖異於宮懸合奏而吹角鼓鼜軍中之容豈所謂專致其精明者歟此蓋相沿前明弊典未更後此嚴更鼓角不當用之齋次大學士會同該部定議載入會典欽此遵旨議準嗣後一應典禮陳設鹵簿應用鼓角仍照舊遵行其齋宮吹角嚴鼓之舉與禮意未協應請停止以昭肅穆二十年奏準大閲日陳騎駕鹵簿於行宮門外駕出作鐃歌大樂奏壯軍容之章回鑾作鐃歌清樂奏鬯皇威之章又奏準大閲前期未起更時於行宮門前鳴角鼓鼜欽定大清會典則例卷一百六十九
