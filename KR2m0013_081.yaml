body:
  text: 禮部祠祭清吏司大祀三太廟一毎年四孟月及嵗暮饗太廟崇德元年定四孟時饗並毎月薦新毎嵗聖誕及清明孟秋望嵗暮忌辰均於太廟致祭順治元年定太廟時饗毎嵗孟春於正月上旬卜日孟夏孟秋孟冬於朔日行禮大祫於嵗除行禮孟春時饗如遇祈穀齋戒之期皇帝詣太廟出入導迎樂均設而不作三年定時饗樂作於廟門四年定嵗除前祫祭大建於二十九日小建於二十八日行禮五年十一月恭上肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后廟號尊諡八年定時饗奏樂於殿内文武佾舞全設又定皇帝親饗太廟行飲福受胙禮十年題準毎年元宵節太廟懸張慶成鐙鐙皆連二自正月初七日起至十七日止今於初三日起令工部豫期辦造廟街門中門一南北門各一㦸門三左右門各一正殿十中殿十後殿八東廡西廡各一十六年覆準毎年嵗除前一日奉後殿列祖列后中殿列聖列后於太廟正殿行大祫禮四祖太祖南嚮太宗東位西嚮前期一日遣官祗告後殿四祖又遣官祗告中殿太祖太宗其致齋視牲請閲祝文等儀均與時饗同十七年奉㫖太廟時饗樂舞仍設於殿内祫祭設於殿外康熙九年題準太廟東廡設太牢三十八年議準元旦皇太后聖夀萬夀聖節於太廟後殿遣官行禮雍正元年題準嵗除前一日皇帝親詣太廟行大祫禮豫遣官奉後殿中殿列聖列后神牌奉安於前殿寳座正中肇祖原皇帝居左原皇后居右左一位興祖直皇帝次直皇后右一位景祖翼皇帝次翼皇后左二位顯祖宣皇帝次宣皇后右二位太祖髙皇帝次孝慈高皇后均南嚮太宗文皇帝孝端文皇后孝莊文皇后東位西嚮世祖章皇帝孝惠章皇后孝康章皇后西位東嚮聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后東次西嚮其奠獻行禮樂章與康熙九年同三年聖祖仁皇帝服制二十七月期滿世宗憲皇帝詣太廟行祫祭禮讀文奠獻如大祫儀八年諭饗祀向無上香之儀應酌議増入儀注遵㫖議準時饗太廟照祭社稷壇之禮於迎神樂奏時詣列祖位前跪上柱香次三上瓣香兩廡分獻官上香祫祭及奉先殿太廟後殿皆同儀十二年議準太廟社稷壇内承直人役各於街門上設門籍備書姓名於上並令各帯腰牌責成看守旗員驗明出入如無腰牌出入者立即拏究倘該員不敬謹察驗一經察出指名叅處至旗員内監及刈草人夫令太常寺造具清冊呈部並知㑹内務府御史一同嚴察乾隆元年諭國家式崇太廟妥侑列祖神靈嵗時祗薦明禋典禮允宜隆備今廟貌崇嚴而軒櫺榱桷久未增飾理應敬謹相視慎重繕修以昭黝堊示新之敬著該部㑹同内務府詳議具奏欽此遵㫖議準先行繕修奉先殿應擇吉恭請列祖列后神牌於黄輿暫奉安於太廟中殿寢室自興工以至告成奉先殿朔望暫停祭饗毎月薦新掌儀司官詣太廟薦獻遇時饗仍請太廟神牌至前殿照常行禮竢工竣恭請神牌還御奉先殿安奉禮成後再擇吉繕修太廟再四孟時饗事闗鉅典應請繕修太廟先於前殿設黄幄九座恭請中殿後殿列聖列后神牌於前殿黄幄内安奉先行繕修中殿後殿竢告成時恭請神牌還御中殿後殿再繕修前殿自興工以至告成遇時饗即於中殿照前殿儀祭饗設樂舞於庭其恭請神牌於前殿並請神牌還御欽天監選擇吉期本日均遣官祗告並祭后土司工之神再奉先殿太廟既繕修増飾其後殿寢室神龕内一應陳設器物亦應修飾維新帷幔衾枕等物均照舊式敬謹製造祗告奉先殿事宜由内務府奏辦祗告太廟並祭后土司工由禮部太常寺奏辦祝文均由翰林院撰擬應行典禮儀注由部届期具奏又議準奉先殿興工吉期遣官祗告畢鑾儀衞豫設黄輿五於奉先殿前殿丹陛上均南嚮序列至時内務府總管率屬詣後殿上香一跪三叩各恭奉列聖列后神牌至前殿丹陛上謹奉安於黄輿内一跪三叩退校尉舁輿輿前各列御仗一對禮部太常寺官各二人前導内務府堂屬執事各官均隨行由奉先門恊和門午門端門各中門出至太廟由中門入至丹陛上北嚮序列内務府官各詣輿前一跪三叩恭奉神牌至太廟中殿寢室内依次奉安於太廟各神牌後上香一跪三叩退自興工以及告成均照前儀於太廟薦獻祭饗竢工竣後仍請神牌還御奉先殿二年七月時饗太廟是日大雨奉㫖令陪祀王公於㦸門分獻官陪祀百官於兩廡廊下行禮又奏準修理奉先殿照康熈十八年改建奉先殿例前一日遣官祗告天地太廟後殿奉先殿社稷安磉石豎柱上梁挿劍均遣官致祭司工之神又奏準修理奉先殿迎吻照康熈十八年改建奉先殿例遣官各一人致祭琉璃窰之神曁經由之正陽門大清門午門奉先門之神其迎吻時吻上應用裹金銀花二對大紅段二方龍旗御仗各二和聲署作樂前引承祭官及太常寺堂官執事官並在工各官均簪花披紅行禮祝文由翰林院撰擬承祭官由太常寺奏遣金花銀花等物由工部製造段絹等物由户部移取又諭目今因修理奉先殿恭請列聖列后神牌暫安奉於太廟中殿今八月初九日太宗文皇帝忌辰十一日太祖高皇帝忌辰此二日朕欲親詣太廟中殿上香行禮著總理事務王大臣㑹同禮部詳考禮儀具奏欽此遵㫖議準列聖列后忌辰皇帝親詣奉先殿行禮咸用素服四時祭饗及祗告太廟皇帝親詣行禮咸用禮服並無素服入廟之制此次忌辰應請遣官行禮又奏準繕修奉先殿懸匾額合龍門照例遣官一人祭司工之神承祭官曁太常寺堂官在工執事各官均照例簪花披紅一切事宜與迎吻禮同又奏準修理奉先殿朔望祭饗暫行停止遇有應祗告奉先殿之典即於太廟中殿行禮又奏準皇帝謁陵行禮起駕日及囘鑾次日應祗告奉先殿因繕修奉先殿列聖列后神牌見皆安奉太廟中殿應祗告於太廟中殿奉㫖前一日朕親詣行禮欽此是日奏請照祗告例不設鹵簿王公文武有頂帶官員以上咸朝服在午門外跪候送迎又題準古禮天子三年喪畢合先祖之神而饗之謂之吉祭今世宗憲皇帝服已二十七月請於親詣泰陵釋服後祫祭太廟恭行吉禮於十一月二十四日皇帝親詣太廟行祫祭禮又奏準太廟祝版㳟書列聖尊諡香帛乃神位前奠獻品物其禮畢送往燎所時應由中路行與祭祀各郊壇典禮畫一嗣後時饗並祫祭太廟鑾儀衞司拜褥官設拜褥畢照常退至尊案後立竢送祝帛時皇帝轉立東旁即起拜褥竢奉祝帛官由中路出復設拜褥皇帝復位祭歴代帝王先師遇皇帝親詣行禮皆仿此又奏準奉先殿太廟於各香案前皆増設燭臺一對太廟中殿均用白蠟祭奉先殿太廟向有爵無墊應於奠獻時増設爵墊以昭整肅祭帝王先師亦依此例増設爵墊又奏準繕修奉先殿工竣祗告天地太廟社稷並致祭后土司工之神與興工禮同又奏準奉先殿工竣應由太廟中殿恭請奉先殿安奉列聖列后神牌還御奉先殿皇帝親詣致祭先期開列王貝勒貝子等奏請欽㸃十四人恭奉神牌又奏準繕修奉先殿工竣恭請列聖列后神牌還御奉先殿是日内務府官於奉先殿照大饗禮陳設祭品鑾儀衞官豫設黄輿五於太廟丹陛上均南嚮至時請神牌官詣太廟中殿各寢室前一跪三叩恭奉奉先殿神牌禮部太常寺官前導由中路至丹陛各安奉黄輿内一跪三叩退校尉舁輿御仗五對禮部太常官十人前引由中門出進端門午門中門由協和門出神牌黄輿至午門禮部堂官奏請皇帝御衮服乘輿出宮至景運門外降輿率諸王貝勒貝子公暨陪祀之内大臣侍衞内務府官咸補服在誠肅門外西旁東嚮立恭候黄輿至皇帝率諸王以下跪候過前引大臣十人贊引太常卿二人恭導皇帝隨後行黄輿由奉先門中門入升中階至丹陛上均北嚮贊引官恭導皇帝由左門入太常寺官引恭奉神牌之王等由東西門入掌儀司官引陪祀内大臣侍衞由東西角門入竢校尉退司拜褥官布拜褥於丹陛上贊引官恭導皇帝陞東階至黄輿前正中行一跪三拜禮王等由東西階至丹陛上隨行禮皇帝率王等各就黄輿前跪恭奉太祖神牌諸王恭奉列聖列后神牌興由殿中門入安奉於各寳座司拜褥官布拜褥於香案前皇帝行一跪三拜禮王等咸隨行禮禮畢王等退出殿外至丹陛上各就班序立司拜褥官布拜褥皇帝就拜位行禮與朔望同禮成竢樂闋皇帝詣太祖香案前行一跪三拜禮王等亦各詣列聖列后香案前隨行禮各恭奉神牌由穿堂中路進至後殿以次奉安於各寢室皇帝率王等詣各香案前上香就拜位行一跪三拜禮贊引官恭導皇帝由殿左門出自奉先殿東出奉先門左門至誠肅門外陞輿還宮又奏準太廟興工請先繕修後殿若遇時饗恭請肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后神牌奉安於中殿寳座祭饗恭請太祖高皇帝孝慈高皇后太宗文皇帝孝端文皇后孝莊文皇后世祖章皇帝孝惠章皇后孝康章皇后聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后世宗憲皇帝孝敬憲皇后神牌奉安於前殿寳座祭饗禮成仍恭請列聖列后神牌奉安於前殿黄幄竢後殿工竣恭請神牌還御後殿次修中殿竢工竣再修前殿庻祭祀可以按時舉行其興工及工竣並迎吻插劍等日均照例遣官祗告後殿工竣恭請列聖列后神牌還御中殿凡請神牌皆太常寺堂官率屬恭奉先期祗告皇帝皆親詣行禮三年奏準繕修太廟後殿迎吻時遣官致祭琉璃窑之神並正陽門大清門太廟街門之神安吻插劍合龍門遣官致祭司工之神一應事宜均與修理奉先殿禮同又奏準太廟中殿迎吻安吻插劍合龍門照例遣官致祭一應事宜均與繕修後殿禮同四年奏準繕修前殿興工前一日令太常寺官奉前殿兩廡配饗牌位暫移於中殿東西廡以次安設竢工竣仍奉牌位安設前殿兩廡又奏準繕修太廟前殿迎吻插劍合龍門遣官致祭一應事宜均與繕修中殿禮同又奏準繕修太廟前殿工程未竣孟夏時饗請遣官於中殿致祭各官免其陪祀如孟秋時饗工尚未竣照例奏請又奏準太廟工竣擇吉於九月二十六日致祭請照嵗暮祫祭之儀皇帝親詣太廟行禮前期三日齋戒王公文武百官咸陪祀先期一日遣官祗告又議準太廟毎日上香均守廟官行禮朔望上香太常寺堂官行禮但毎月朔望分詣天壇地壇祈榖壇上香行禮若不敷用太廟仍繫守廟官上香嗣後請於宗室王公内奏請欽㸃王貝勒貝子公二十五人專司其事由宗人府分定班次毎月朔望一人直班朝服上香行禮十三年議準時饗太廟陳設樂舞亦照祫祭例移於殿外丹陛兩旁又諭朕自太和門乘輦恭詣太廟祭畢乘禮輿還宮欽此十四年遵㫖奏準太廟中殿列聖神龕寳牀恭照奉先殿式敬謹修造竢造成謹擇吉恭請神牌暫奉前殿以便安装工竣仍請神位還御十六年奏準太廟中殿列聖神龕寳牀敬謹造成應照例遣官一人於中殿行祗告禮恭請神牌暫奉前殿朔望上香之王公二人分詣神位前上香行禮宗室官恭奉列聖列后神牌王公禮部太常寺堂屬官前導由中路行至前殿安奉於各黄幄内上香行三跪九叩禮退毎日即於黄幄前上香其祗告事宜由太常寺奏辦祝文由翰林院撰擬黄幄由工部豫備又奏準中殿神龕寳牀已經安装工竣謹擇吉恭請神位還御中殿遣官祗告並王公上香宗室官恭奉神牌均如恭請神牌暫奉前殿儀禮成皇帝親詣上香行禮十七年奏準太廟後殿奠帛獻爵一如前殿用宗室官之制均用覺羅官又奏準饗太廟日遇雨雪分獻官陪祀王公仍遵二年諭㫖於兩廡廊下㦸門行禮其陪祀百官於左右門行禮欽定大清㑹典則例卷七十八
