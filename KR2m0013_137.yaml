body:
  text: 工部都水清吏司河工三一修防康熙二年覆準凡黄運湖河大工告竣保固限滿交汛修防其工當大澑頂衝汛水長發在在險急相度情形必須每年動帑用長樁大埽修築加鑲歲以為常嗣後歲修工程令河道總督竢秋汛水涸時即估計具題十八年題準搶修工程雖難豫定或因河流遷徙損及隄岸或因三汛屆臨致壞工程亦應照歲修例估計具題其費以五百兩為率别項大工不在此限二十四年議準搶修工程隄岸牐壩偶被損傷該管㕔官一面申報河道總督一面即運料修防勒令剋期告竣仍詳具工費繕册題銷三十七年議準永定河工照黄河歲修搶修之例辦理五十二年覆準嗣後一應歲修搶修工程均令河道總督親勘以杜冒銷之弊雍正二年議準嗣後歲修工程於本年十月内題估次年四月内題銷逾限不銷者著授受各官賠償工費至搶修工程將衝決丈尺動用何項錢糧報部工完之日彚册題銷遲至次年四月不題銷者如前賠償其歲修及别項大工動用何項錢糧於題估日一并聲明三年議準永定河工程如遇緊要險工一面興修一面具題其歲修搶修工程亦令先行題估工竣題銷以杜侵冒七年諭黄河隄岸乃運道民生所關最為緊要年來殫心經理增卑培薄隄工堅固共慶安瀾獨是工程告竣例應歸汛修防而額設河兵堡夫只能修補水浪衝激之處防備臨時搶䕶之用至於隄身一年之内風雨淋漓車馬踐踏漸至侵損者亦勢所必有而隄逺工多不能責諸寥寥兵役也朕留心訪察已久又復詢問通曉河工之人知河防一覽内載有每歲令夫加高五寸之請即從前總河亦有每丁一名招募幫丁四名給以隄内空地耕種免糧歲令加高五寸之議與朕計慮實相符合朕思隄工雖千有餘里若按丈每年加修五寸計費不過三四萬金倘置之不問一年剝削四五寸合十年而計之其所費之多恐有不止於加修之數者況河流漲漫不時難以豫料何若逐年增修為未雨綢繆之計欽此十年議準歲修工程應編列字號開明起止段落長濶高厚尺寸造册報部至搶險别建之工交汛修防應附入歲修者於題估册内豫為聲明乾隆四年議準山東運河每年春夏之交山水未發令建築草壩以收水勢而濟漕運歸於歲修案内題銷十三年議準江南隄工綿亘數千餘里於每年加高五寸之外歲修搶修内通融辦理以該年節省之數加培隄工一汛候順治初年定分汛防守之法每歲立春後東風解凍候水初至量水一寸則夏秋當至一尺頗為信驗故汛水亦稱信水二月桃始華冰泮雨積川流匯集波瀾盛漲曰桃汛春暮蕪菁作花曰菜花汛四月麥壠結秀擢芒變色曰麥黄汛五月瓜實延蔓曰瓜蔓汛朔野之地山深谷邃冰堅晩泮迨至盛夏消釋方盡沃蕩山石水帶礬腥并流於河故六月中旬之水曰礬山汛七月菽方秀曰豆花汛八月荻薍華曰荻苗汛九月以重陽紀節曰登高汛皆隨時長發其防守之法則統於桃伏秋三汛自清明節起閲後二十日為桃汛自桃汛後至立秋前為伏汛自立秋至霜降節為秋汛汛臨之時該管官弁責令河兵堡夫加謹分防每里設立窩舗舗各標旗編書字號夜則懸鐙鳴金以備搶䕶晝則督率兵夫捲土牛小埽聽用遇有刷損隨刷隨補毋使坍卸至夜分廵守易於曠廢應設立五更牌面分發南北兩岸照更次挨發各舗遞傳如天字舗發一更牌至二更時前牌未到日字舗察明何舗稽遲即時拏究再汛發之時多有大風猛浪隄岸難免衝激應督令隄夫多紥埽料用繩樁懸繫附隄水面縱有風浪隨起隨落足資防䕶又凡驟雨淋漓易致横決應置備簔笠令兵夫冒雨廵守此外非時客汛及十月復槽汛十一月十二月蹙凌汛非三汛可比止令兵夫照常廵守凡黄運河工一例遵行康熙二年議準嗣後黄運河工保固工程及舉劾官弁必以經閲三汛為斷十二年定嗣後三汛平稳令各總河馳驛奏報三十七年議準永定河工照黄運河例令該管官弁督率兵夫分汛防守四十五年議準奏河工急務者限兩三日飛遞馳送雍正十二年議準三汛平稳本章著河臣酌量寛期一疏濬順治二年議準凡濬河面宜濶底宜深如鍋底樣庶中流常深岸不坍塌如無隄之處須將土運於百餘丈外以免淋入河内遇河流淤淺即令疏濬如水澑在中兩岸築丁頭壩以束之水澑在旁順築束水長壩以逼之或排板插下泥内逼水涌刷或排小船或用勺或用混江龍或用刮板皆因地制宜不拘器具十年題準南旺臨清每年於十一月十五日煞壩濬淺每年一小濬間年一大濬康熙三十九年議準嗣後揠河之土盡堆原估隄上層層杵硪成隄不許估計散土滋弊倘濬揠不深以至引水淹漫虚報淤墊者除錢糧不準開銷外以侵帑誤工題叅拏問五十一年議準通州石壩至沙子營地方河道淤淺每年將中流酌量揠濬以利漕運雍正二年覆準南旺臨清均屬漕運咽喉大濬小濬仍遵舊制每年於十一月内煞壩一面確估具題一面興工於正月内完工或因糧船囘南過遲亦必催䟎於正月秒揠濬告竣無誤重運五年議準運河湖河相連之處用刮泥器具引湖水以攻沙如河身有淤墊之處相度疏濬又奉旨所開河道土方若目前圖便堆積河岸將來雨水淋漓必致仍淤河道務令運送逺處以為一勞永逸之計七年議準京口一帶運河為漕船經由要道每歲令該管官及時疏濬以濟重運八年議準串場河道積沙用犁船犁鬆再用混江龍按時疏濬又議準泰州興化所屬各鹽場河道每遇疏濬海口之時令東台同知督率牐官牐夫雇覓水手人夫乘迴潮之勢用混江龍拖刷務使海口通暢十一年覆準直隸運河既有額設淺夫凡糧船經由要道責令以時疏濬乾隆元年諭揚州府儀徵縣江口至江都甘泉二縣所轄三汊河一道共計六十餘里為通江達淮要津向例三年大濬一次撈淺一次需銀一萬六百兩皆商七民三分𣲖捐輸經管里甲不免苛索滋擾而承修各官又復層層侵扣以致撈濬皆有名無實無益工程有累百姓嗣後著將商民𣲖捐之項永行停止亦不必拘定三年之限如遇應濬之年該鹽政委官確估實力疏濬所需工費即於運庫一半充公項下動支毋得虛冒侵肥草率塞責欽此又諭今歲江南夏秋之間天雨連綿淮揚一帶各州縣低窪田畝被水淹漫朕恐窮民失所已諭令督撫加意振䘏俾獲安居今思此等百姓若於冬春之交再令傭工以資力作更為有濟宿遷桃源清河安東以及高郵寳應等州縣均有應行疏濬之河道其安東舊鹽河約估需銀二萬二千餘兩宿桃清高寳等工約估需銀十有二萬餘兩著於今冬明春次第興工即令雇募民夫及時疏濬則於緊要河道既得深通而寓振於工窮黎更得藉以養贍於地方民生大有裨益欽此又議準直隸運河改設河兵責令隨時疏濬河道勿致淤淺又議準串場河道歲以春秋二汛按日拖刷務令處處深通二年奏準疏濬泉河以通泉流每年於十月水落之後嚴飭管泉通判協同管泉各官逐一察勘遇有淤淺募夫疏濬凡濬山泉之河深五尺者上口濶三尺底濶一尺以為定式又奏準東省運河每年定於十一月初一日煞壩疏濬又奏準牐河之水務以四尺為度糧船自無淺阻又覆準德州哨馬營支河照歲修之例每年疏濬又議準東省疏濬泉流應置刮板四十具鐵舀百具捱牌板片六百塊以備臨時撥用三年覆準東省大濬運河按期展限八日小濬按期展限六日四年奏準凡黄水減下之支河每歲秋冬河官勘驗稍為阻礙即令疏濬七年奏準淮揚一帶運河每年伏秋汛過勘明汕刷情形如有淤墊及時揠濬中泓以一丈為準兩邊以八尺為度又定豫省衛河河身寛濶崖岸陡峻河底又多流沙不能築壩揠濬應用船撈濬八年議準丹徒丹陽一帶運河每年測量水勢間段撈濬定限六年長濬一次十一年覆準北運河設立岱船以資撈濬十四年議準裁汰北運河岱船其額設刮板三十具實屬不敷應增置三十具以廣器用以利漕渠一浚柳船江南柳船四十有一大浚船四百七十有二中浚船五十小浚船七十有二分隸㕔營石船四十有四隸葦蕩營柳船長七丈五尺至八丈濶一丈至丈六尺五寸各有差深二尺四寸三年小修工料銀十有九兩四錢五年大修銀二十九兩四錢八年更造銀四十六兩九錢各有竒大浚船長三丈六尺至三丈九尺濶六尺五寸至七尺六寸各有差深二尺五寸小修工料銀七兩七錢大修銀十有一兩六錢更造銀十有七兩三錢各有竒中浚船長三丈濶五尺六寸深尺有八寸小修工料銀六兩五錢大修銀九兩九錢更造銀十有四兩九錢各有竒小浚船長二丈九尺五寸至三丈濶五尺二寸至五尺六寸各有差深尺有八寸小修工料銀五兩四錢大修銀八兩一錢更造銀十有二兩三錢各有竒以上修造年限並與柳船同石船長七丈至七丈六尺濶丈二尺至丈五尺深五尺至五尺四寸各有差修造年限及工料銀並與柳船同河南栁船二十有六分隸各㕔每船長五丈五尺濶丈有三尺深三尺三寸小修工料銀十有四兩一錢大修銀二十兩八錢更造銀四十二兩三錢年限與江南栁船同直隸岱船三百二十分隸天津道屬之子牙河永定河道屬之三角淀清河道屬之西淀内有行船土槽船之别行船長二丈二尺濶四尺五寸深尺有一寸每歲油艌工料銀一兩四錢三年小修銀三兩三錢五年大修銀五兩十年更造銀十兩土槽船長二丈濶四尺五寸深尺有一寸油艌工料銀一兩一錢小修銀二兩六錢大修銀四兩更造銀八兩年限與行船同康熙十七年議準江南河工設大小浚船栁船五百三十有二分隸八河㕔營為疏淤運料之用三十一年覆準江南浚栁船修理照驛站船例開銷自成造之年起限三年小修五年大修八年更造雍正二年議準江南浚船開明三等丈尺式樣令總河移送豫省每汛照式建造五船修理年限悉照江南浚船之例六年覆準豫省浚船額定四十栁船亦照江南之例成造二十二船十二年議準高堰裝運石料歸公船六十號應分隸各㕔濟運物材十三年諭聞河工官員每於裝運工料差役捉船而所差胥役即藉端封捉商船生事騷擾及至三汛搶工則稱裝運緊急物料百般需索甚將重載客船勒令中塗起貨致囘空商船聞風藏匿裹足不前既於客商擾累且於關税虧少河工裝運物料原有額設浚船即使搶築之時浚船或不敷用秖應雇募本地民船協濟運送原不必封捉客船阻遏商旅著河道總督嚴行察禁如該役等陽奉隂違仍前勒索即將該管官題叅欽此又議準高堰歸公船除坍壞不堪修造外額存石船四十有四各㕔向有浚栁各船獨葦蕩一營無額設運料之船應改隸該營管理歸於栁船案内一併修造乾隆三年覆準設直隸河工岱船屬子牙河者百有六十屬三角淀西淀者各八十六年奏準裁豫省浚船四十增栁船四十一年覆準直隸北運河設岱船六十十四年議準直隸岱船大小修理年限如江南之例更造以十年每年一油艌其北運河六十船應裁額存船三百二十内定為行船四十土槽船二百八十修艌更造分别給銀有差河工四一考成保固順治初年定黄運兩河隄岸修築不堅一年内衝決者管河同知通判州縣等官降三級調用分司道員降一級調用總河降一級留任如異常水災衝決者專修督修官皆住俸修築完日開復本汛隄岸衝決隐匿不報別指他處申報者加倍議處如一年外衝決者管河等官革職戴罪修築分司道員住俸督修完日開復本汛隄岸衝決隐匿不報别指他處申報者管河等官降二級調用分司道員降一級調用總河不詳察具題罰俸一年如地方衝決少而申報多者降三級調用轉詳官降二級