如該道不掲報該督不題叅者皆照徇庇例議處雍正二年議準一應工程嚴飭承修官據實估報如估報時仍留覈減餘地者該督撫題叅嚴加議處又議準嗣後給發錢糧交與諳練河務之人修築如修築不堅致有衝決者委官督令賠修不能賠修者題叅革職別委賢員給發錢糧修築將所用錢糧勒限一年賠完準其開復逾限不完交刑部治罪仍著落家屬賠完如力不能完著落發錢糧之上司賠補全完四年諭賠修之例甚屬無益從來河官領帑修工必豫留賠修地歩以致錢糧不歸實用工程斷難堅固即幸而得保無虞而錢糧終歸入己似此情弊相習成風必照侵欺錢糧例嚴加治罪方足示懲著九卿詳議具奏欽此遵旨議準嗣後承修之官估計工程總河與該督撫分司勘明工段丈尺樁埽料物如果與所估數目相符覈實具題發帑興修如估計過多有心浮冒察出即照溺職例革職察勘之官不實心詳覈扶同徇隐即照徇庇例議處至工完之日該總河督撫分司再逐一察勘修過工程果否如式堅固與原估丈尺錢糧數目相符如工程單薄物料剋減錢糧不歸實用以致修築不堅不能保固將承修官指名題叅照侵欺錢糧例分别治罪其侵欺銀著落該員家産勒限追賠所修工程令總河督撫等别委賢員動帑修築堅固工完題銷又議凖直隸子牙河南運河新修工程均照運河例保固三年北運河工程較永定河稍平易較南運河則為險要立限保固二年限内衝決照例賠修五年諭向聞河工不肖之員有將完固隄工故行毁壞希圖興修藉端侵蝕錢糧者著該督時加察訪再有此等不法之員著即奏聞於工程處正法示衆欽此又諭直隸河工衝決之處著落河官與地方官賠修再敢惰玩一并革職枷示工所欽此又諭河工追賠之項其中情由不一有該員侵蝕入己者有修築草率本不堅固易致衝決應當賠修者有當潰決之時該員豫知例當賠修而以少報多先留地歩者甚至有故意毁壞工程以便興修開銷者種種弊端不可枚舉皆法所難寛但亦有經手之人本無情弊而照例則應分賠者在該員情稍可原而承追之時無力全完亦於國帑無益其如何酌量分別定例方為妥協著九卿詳議具奏欽此遵旨議準嗣後黄河一年之内運河三年之内隄工陡遇衝決所修工程原繫堅固於工完之日已經總河督撫保題者承修官止賠修四分其餘六分準其開銷如該員修築錢糧均歸實用工程已完未及題報而陡遇衝決者該總河督撫據實保題亦令賠修四分其餘均準開銷如黄河一年之外運河三年之外隄工陡遇衝決該管各官實繫防守謹慎者該總河督撫察實具題止令防守該管各官共賠四分内河道知府共賠二分同知通判州縣守備共賠分半縣丞主簿千總把總共賠半分其餘六分準其開銷其承修防守各官皆革職留任戴罪効力工完之日準其開復倘總河督撫保題不實照徇庇例議處仍照定例勒限分賠還項又議準永定河新修工程照黄河例保固一年又議準嗣後沿河州縣遇有被淹之處令地方官會同河官親勘被淹情由據實通報如有隐匿民災者照報災怠玩例議處察報不實者照溺職例議處八年議準嗣後不請開放之牐審度形勢果繫不應開放雖限内未開亦應準其保固年限以免承修官守候之苦如本應開放之牐承修官因修築不堅故意不請開放希圖掩飾雖已過三年仍應以開放之日起限保固並將故意遲延之承修官及不行察報之該管官一并叅處十年諭河中石塊木樁牴觸糧艘著河臣嚴飭河道等官於水落時沿塗察看悉行起除以清河路倘辦理疎忽仍有起除不浄等弊著廵漕御史叅奏將該管河道等官從重議處欽此十一年覆準永定河貼砌片石等工仍保固一年别項加修新工保固三年漳河滹沱河並太行隄工照黄河例保固一年其餘平易工程照運河例保固三年十二年議準黄河堡夫挑積土方不及數者專汛文官罰俸一年該管㕔官罰俸六月挑積不及半者專汛文官降職一級留任趲挑該管㕔官罰俸一年兵丁挑積土方不及數並不及半者專管汛弁及該管將備議處亦如之乾隆十年諭從前石林口衝決用過修築工料銀二十三萬九千一百餘兩部議著落河官賠補原以該處舊有土壩致被衝決應照疎防之例賠修苐聞石林土壩乃河臣率民修築之工並未動用錢糧與永定河官隄疎防衝決者有間且七年黄水異漲亦非尋常可比動項既多該管各官勢必艱於賠償著加恩免其追賠嗣後凡有隄防之處務須事先綢繆毋得再蹈前轍若稍有疎虞決不寛貸欽此十五年議準嗣後開濬河道以領帑日為始限十日興工須戽水築隄者準於限外酌展半月計土千方限半月竣工數多者準此加展修建橋牐隄壩等工均限兩月興工工料數百兩及千兩者以興工日為始限三月三四千兩者限四月各竣工其工料自五千兩至萬兩以上者如平易工程亦限四月竣工果工程險要不能依限告竣者準於估報册内豫行聲明酌展限期違者皆交部議處一種植葦柳勸懲順治十三年定瀕河州縣新舊隄岸皆種榆柳嚴禁放牧各官栽柳自萬株至三萬株以上者分别敘錄不及三千株並不栽種者分别叅處康熙九年奏準於沿河州縣擇閒散人授以委官名色專管栽栁三年分别勸懲十五年議準河官種栁不及數者免其處分成活萬株以上者紀錄一次二萬株以上者紀錄二次三萬株以上者紀錄三次四萬株以上者加一級多者照數議叙分司道員各計所屬官員内有一半議敘者紀錄一次全議敘者加一級均令年終題報二十年定武職栽栁照文官例議敘二十二年定河官栽栁成活二萬株以上者紀錄一次四萬株以上者紀錄二次六萬株以上者紀錄三次八萬株以上者加一級多者照數議敘其分司道員因屬員栽栁議敘之例停止三十一年議準河道隄面濶二丈者留八尺為行路其一丈二尺密栽細草遇有坦坡均栽卧栁四十四年諭高家堰石工完者準先予銷算隄根之下廢地可諭河員試令種稻其餘除留取土搶修之地外令捐栽蘆荻以資工料照例議敘欽此四十九年覆準令河南各州縣於官地内責令堡夫廣栽栁樹六十年覆準河隄種植栁樹倘有將栁園地畝墾熟耕種私收耔粒以致草漸稀少動用錢糧購買蘆葦者將失察之地方官嚴叅議處雍正元年議準每年山東河南廵撫飭令近河州縣暨管河各官將沿河空地勘明各捐資多栽栁樹各以種栁細數呈報上司三年後該督撫察覈報部酌量議敘如希圖議敘强占民地累民者即行叅究至河南舊植栁樹年久枯壞者令察勘一并補種三年議準嗣後管河之分司道員同知通判州縣等官於各該管沿河地方栽栁成活五千株者紀錄一次萬株者紀錄二次萬五千株者紀錄三次二萬株者準加一級種葦一頃紀錄一次二頃紀錄二次三頃紀錄三次四頃準加一級其有殷實之民栽栁二萬株或種葦四頃者準予九品頂帶榮身至効力各官有情願捐栽柳葦者亦照此例議敘倘有不肖河官希圖議敘占種民地者題叅從重治罪再各處河營每兵一名每年種栁百株若不能如數栽植者將專汛之千把總罰俸一年守備罰俸半年倘栽植不及一半者專汛之千把總降一級暫留原任戴罪補栽守備罰俸一年五年覆準行令河南沿河州縣等官檢稽地册會同㕔汛將見存栁園並從前坍塌及新淤地畝逐一詳勘丈明立界如有隐占撥補還額廣為栽種乾隆三年奏準嗣後山東河南印河文武官弁於沿河官地内有能捐資栽成小楊五百株者紀錄一次千株者紀錄二次千五百株者紀錄三次二千株者加一級其沿河居民有情願出資在官地栽成二千株或在自己地内栽成千株者給以九品頂帶榮身每年春間栽種次年秋間覈驗栽成數目題明議敘楊樹交汛官收管如栽成不及議敘之數準其次年補栽并算五年議準嗣後沿河州縣地方官有能勸民在沿河坑窪沮洳不宜禾稼地内種葦二百頃以上者紀錄一次四百頃以上者紀錄三次六百頃以上者加一級八百頃以上者加一級紀錄一次數多者照數遞加議敘又議準抑勒栽葦或所栽葦地以少報多者照官員勒民開墾地畝以少報多例州縣官皆降一級調用又議準嗣後州縣官所屬境内有可栽葦草之地勸諭不力計十分之地栽植不及三分者該督撫指叅罰俸六月不及二分者罰俸一年不及一分者罰俸二年二年内栽植仍不及分數者降一級住俸至三年内仍有不行栽植者降二級留任又議準葦栁乃河工必需之料令將栁樹數目葦􅐨地畝一并造入交盤册内再豫東二省全用楊樁各汛報栽成活楊樹交與該管㕔官不時稽察造入交盤如有短少詳叅著落補栽成活足數者開復九年定葦蕩營額柴按年清完依限運交如未完一分者該汛千把總罰俸一年守備罰俸六月叅將罰俸三月未完二分者千把總降職一級留任戴罪督完守備罰俸一年叅將罰俸六月未完三分以上者千把總革職守備降職一級留任戴罪督完叅將罰俸一年均限一年照數督催全完開復如逾限不完照所欠分數千把總分賠六分守備三分叅將一分賠完之後亦準開復若每年餘葦至十萬束以上者準其紀錄一次再有贏餘照數遞加紀錄又覆準江南黄河兩岸柳園丈出官地官民情願捐栽柳樹培養成活者驗明確數一并造報議敘一禁令順治二年定旗下軍船不許零星過牐非時啓閉致妨漕運五年覆準安山南旺兩湖地經升科者聽民佃種其餘湖地不許開墾妨漕永為令又覆準衛河渠口每年四月以後盡行堵塞不許偷放七年覆準運河行舟雖繫進貢及裝載官兵亦不得擅自開牐九年覆準沛縣湖田禁民墾種令蓄水濟漕十三年覆準南旺臨清大濬及各處河官揠濬本境淤淺築壩未開之先豫頒告示禁止一應官船不許先期逼勒開壩貽誤工程又覆準令河臣申明各牐啓閉禁令先放糧船次放官船又次放商民船如有啓閉不時洩水誤漕者指名題叅康熙二年覆準凡奉差及赴任各官定有限期者令糧船讓路又定差船到牐隨漕啓閉有攙越漕運者照例叅處四年河臣請嚴牐河啓閉奉旨有奉緊要勅旨差遣者著照前行如糧船商船齊到牐糧船先過商船繼過如糧船未到商船先到牐官勿得指稱糧船將到强行攔阻仍著放過違者從重治罪其一應往來官船立有欽差牌匾著永行禁止如此等官船藉名緊急擅行啓閉於糧船之前争先者著該督撫指名題叅欽此又議準凡内外顯要職官多置號船縱容家人於漕運河道往來貿易或奉差赴任各官額外私帶貨船並姦徒􅖍藉名色恃强闖牐者河道各官指名呈報河漕總督題叅究處河道各官徇情不報亦即題叅如已呈報而總督徇情不舉者事發一并治罪七年議準畿輔隄岸關繫緊要禁止附近莊佃私開渠口八年議準直隸渾河隄工禁止車行如有損壞者咎歸該管官十一年題準運官停泊漕船不聽督催陵辱牐官責打牐夫攫去牐版致洩水誤漕者革職究擬二十一年議準運河淺澁漕船艱於程限各處兵船務隨漕啓閉停泊如有扭鎖掀版恣意争先者該督指名題叅將領兵將弁嚴加議處二十九年議準漕河開隄遲則稽重運煞隄早則阻囘空嗣後毎年定於十一月十五日煞隄正月二十六日開隄三十年覆準河南河内縣丹河發源太行山至丹河口分渠九道内惟小丹河上秦河二渠通衛濟漕嗣後如雨足之年於三月初用石絡裝石横塞河渠使水歸小丹河入衛濟漕仍留涓滴灌田至五月秒重運已過則開放河渠塞小丹河口以防山水漫溢倘遇亢旱之年自三月朔至五月望令三日放水濟運一日塞口灌田過此以後仍從民便至輝縣束刀泉為衛水之源民閒設五牐以蓄水灌田向例於五月初一日封版放水濟運但五月正農功需水之時應量渠之高下用竹絡裝石堵塞使各渠之水常盈則正流足以濟運餘潤可以灌田其安陽縣之萬金隄亦令仿束刀泉五牐之法用竹絡裝石相時塞牐通渠務使民漕兩無妨礙三十五年諭山東漕船不得過牐以致遲延著差官帶户部印封前去封固牐版須竢水滿開牐以便漕船行走如水不滿雖奉旨事務亦不許開牐果有緊急陸路亦可以行凡内廷需用之物悉停解送欽此又諭自通州以至大通橋民船不行皆有禁令今若令小船行走於民似有裨益著户工二部會同倉場侍郎會議具奏欽此遵旨議準嗣後通州至大通橋應令民船貿易行走若遇糧運緊急之時暫行禁止又奉旨打魚小船亦著行走三十九年覆準裏河淤墊竢糧船過盡即煞壩疏濬一應差使令暫由陸路四十四年覆準南旺湖涸出灘地不許違例耕種令地方官出示嚴禁又覆準嗣後有故決盜決南旺昭陽蜀山安山積水等湖揚州高寳湖淮安高家堰栁浦灣及徐邳上下濵河一帶各隄岸並阻絶山東泰安等處泉源有干漕河禁例者不論軍民槩發邊衛充軍其牐官人等用草卷閣牐版盜洩河水串通取利犯該徒罪以上亦照前問遣又議準漕河各牐務依漕規啓閉官員經過不許徇情擅自開放洩水致稽重運違者不宥四十五年遣官往運河閲視封牐特諭今年水淺自臨清至天妃牐七八百里一時盡封則不利於商人矣當從上流封牐蓄水竢水滿後再開一牐糧船過時他船不許濫放欽此五十三年覆準糧船過牐務遵漕規啓閉按幫放行則水勢充足不至遲誤至於水漲牐溜撞沉搶修乃意外間有之事均準於單内注明務於八月内全數卸完囘空如逾定限倉場侍郎題叅五十四年諭大濬動工之日一應往來船槩行禁止駐防兵船囘空糧船有恃强開壩者拏解究處欽此雍正元年諭每年漕船遲滯皆由運河阻淺運河之水全賴山東諸湖蓄水以資灌注近歲漸就淤積居民或占成田地以致水少不能濟運今宜乘夏秋雨水之時豫為蓄水之計凡沿河田地已經成田者不必追究其未經耕種者速宜嚴禁不可侵占至諸湖隄防須修築堅固引河牐壩務啓閉得宜則湖水深廣運河流通不竭漕艘自無阻滯之虞欽此二年諭運河之設未嘗禁商船之往來但水少時則加意管束水大時聽商船行走京師百貨取給於東南之商賈今若嚴禁則各種載船必一槩阻滯商賈安能流通於民生日用均屬未便欽此遵旨覆準令總河總漕直隸山東河南各督撫檄飭沿河地方官弁遇有商賈客船許於漕船先後乘隙而行毋許漕船攔阻亦毋許商船擁擠又議準運河一帶用强包攬牐夫溜夫二名以上撈淺舗夫三名以上者發附近充軍攬當一名並未用强生事者枷一月杖一百發落又議準小丹河桓河各牐令該撫嚴飭河官不時疏濬仍遵舊制三日放水濟運一日塞口灌田於糧船趲行囘空之期該河官親至水口秉公啓閉將水勢情形設立循環號簿五日一次報明該管印官仍嚴禁偷放如河官通同賣水以致漕船阻滯者指名題叅嚴加治罪五年議準河工關繫重大嗣後有指稱夫頭包攬代雇希圖抑勒良民者照運河一帶用强包攬牐夫溜夫之例治罪二名以上者發附近充軍一名者枷一月杖一百發落十一年議準黄運河工隄頂民房無論舊蓋新修槩令遷移乾隆元年題準山東運河自江南邳州交界北至德州桑園鎮緜長千二百餘里水無來源全賴各牐層層關束務令啓閉以時蓄洩得宜庶於漕政有益二年諭江南黄運兩河隄工向有民人蓋房居住者經河臣等議令拆毁遷移以防作踐旋以小民安土重遷止令移去險要工所之房屋其餘仍舊存留此國家體䘏貧民之恩澤也各隄民房皆無額徵租税惟高郵寳應江都甘泉山陽五州縣每年有應徵租銀三百八十餘兩其間拖欠不完者往往有之若留此輸公之項雖為數無㡬而追呼不免恐有胥吏藉端苛索之弊著將此項租銀永行停止並將累年拖欠悉予豁除惟是隄工乃河渠之保障理宜加意慎重以固河防除見在已成房屋無礙隄工者免其遷移外將來不許增蓋如有違禁增蓋者即驅逐治罪並將徇縱容隐之官弁分别議處欽此又諭今年五月山東雨少運河水淺糧艘不能銜尾而進沿塗揠淺起撥甚費經營而臨清以北更多阻滯朕細加訪察臨清以北全賴衛水合汶濟運而衛水發源於河南衛輝府至臨清五百餘里居民往往私洩灌溉經前任河臣題定每嵗於五月初一日盡堵渠口使衛水全歸運河今日久法弛衛水來源小民不無偷放遂致運河水勢長落不時重運艱於北上目前正當緊要之時所當稽察嚴禁者著直隸河南督撫速行辦理務使衛水不致旁洩糧運遄行無阻欽此又奏準運河舊例於十一月十五日煞壩今改於十一月初一日開壩日期舊例於正月二十六日今不必拘定總以南漕幫船至臺莊牐為準又覆準山東運河自嶧縣臺莊起至臨清州南版牐計四十八牐牐河水無來源應照南旺挑湖之例遇重運盛行官民等船均隨漕開放不許逼勒開牐並頒發告示刋立木榜令各牐永逺遵行又奏準運河各牐收束水勢全在啓閉得宜會牌未到催漕各官不得逼令啓版會牌已到司牐官亦不得故意遲延如有違誤該督題叅治罪四年奏準江南河工天然南北二壩收束諸湖之水為洪澤湖之關鍵責令管河道員封固永不許開欽定大清會典則例卷一百三十三
