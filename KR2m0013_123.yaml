body:
  text: 兵部車駕清吏司馬政一八旗牧馬原定八旗及内府三旗佐領下額設馬駝每年由部酌定留京並出場各數繕摺奏聞並開列副都統職名每翼各簡用二人於立夏後四日率領官兵陸續趕赴口外牧場擇水草豐茂之處加意牧放若照管不周致有闕少著落副都統以下各官賠補其實繫殘廢倒斃者馬扣存三月錢糧駝扣存四月錢糧買補如價有不敷凖於公用銀内動支至出場官兵均聽副都統管轄在場馬駝亦聽副都統分撥官兵牧放進口日期統於八九月間該副都統豫行報部又定八旗出場馬駝内每站各給空草一束囘日進口每站仍各給空草一束均由部移咨户部委司官一人監給康熙二十六年議凖八旗出場馬駝沿塗不加管束踐食田禾者兵鞭八十專管官罰俸九月兼管官罰俸六月副都統罰俸三月領催鞭六十出口並不在場牧放致有縱逸侵擾者兵鞭一百專管官罰俸一年兼管官罰俸九月副都統罰俸六月領催鞭八十照馬駝侵擾之數賠償地主至兵丁强令他人代為牧放及勒索酒食擾累生事者交刑部治罪專管官降一級調用兼管官罰俸一年副都統罰俸九月領催鞭一百革退雍正三年議準八旗馬駝前徃牧場該叅領官員及驍騎校等果加意牧放無有損傷令出牧之副都統㸃驗如一叅領下馬駝較勝别叅領者將該叅領下各官及驍騎校各紀錄一次如一旗馬駝肥壯無有損傷該叅領紀錄二次各官及驍騎校各紀錄一次又奏準八旗出場馬駝所有在場各官遇切近喪事該副都統即令囘京有患病者副都統驗實亦令囘京均移咨該旗補人前徃至於婚嫁之事告假者準給一月之限行咨該旗於事竣催令前徃若馬駝於一月二十日之間將次進口其囘京之人均不必赴場若告假各官逾限不赴場者罰俸一年副都統不察明給假者罰俸六月又奏準八旗各官奉委出場牧放若逗遛觀望不即前徃及到場潛囘者皆革職十三年議準八旗馬駝於出場之時各造具毛齒清册送部存案竢囘京日按册㸃驗印烙統轄副都統以該翼之馬駝覈算兼管官以兼管之馬駝覈算專管官以專管之馬駝覈算如十分之内疲瘦各不及三分者免議若疲瘦至三分者官罰俸九月兵鞭五十四分以上者官罰俸一年兵鞭六十五分以上者官降一級留任兵鞭七十六分以上者官降二級留任兵鞭八十七分以上者官降三級調用兵鞭九十以上疲瘦分數均就副都統兼管官專管官各名下詳細分别不準將在場馬駝通融攤算如官兵希免議處將馬駝彼此頂換使疲瘦皆不至三分者官降三級調用兵鞭八十兼管官降一級留任副都統罰俸一年乾隆五年奏準八旗出場馬駝進口日期不必拘定八月九月令兩翼副都統等視天時冷暖及草枯遲早公同酌定豫行報部十六年奏準八旗牧養官馬共二萬七百七十三匹每匹月給馬乾銀三兩近因京城豆價皆昻所支銀不敷購買應暫為通融籌辦請於所牧官馬内酌撥萬匹在京外牧養熱河撥給馬千匹近京各莊頭撥給馬二千匹此外七千匹交直隸各標營牧養其熱河及各莊頭草料銀由該副都統内務府會計司官赴户部支領按月給發直隸各標營就近於藩庫動支如有減剋料草以致疲瘦者該管官交部議處兵丁莊頭嚴行治罪或有倒斃照八旗之例於馬乾銀内按月扣存買補並請特簡大臣均勻搭配不得槩以疲馬充數如有不肖兵丁乘便將殘廢馬匹私行扺換者一經察出即將本人從重治罪佐領及都統等一并交部嚴加議處十七年奏上年因京師草豆價昻八旗牧養官馬每月所支馬乾銀不敷購買經大學士等遵㫖議奏將八旗官馬撥出萬匹交與直隸各標鎭營並熱河副都統及近京莊頭分領牧養竢次年草豆價平仍分與八旗官兵牧養察目下京師草豆較上年價直已減此項馬匹或仍交直隸等處牧養或遵照原奏留京牧養奉㫖此項官馬前經交直隸各標營牧養臕分既屬充足且聞於該兵丁等亦屬有益著不必交熱河副都統及各莊頭竢囘鑾後撥出萬匹皆交與直隸總督仍前分撥牧養又奏準八旗出場馬駝令兩翼副都統等加意牧養竢水草乾枯應進京時一面奏聞一面將馬駝陸續趕赴進口十九年奏準八旗官駝照官馬例交與直隸總督分給各標營牧養一各省牧馬乾隆元年議準陜西甘州提標涼州西寧肅州三鎭標各設馬場一處每場牝牡馬千二百匹以游擊一人為總統每場分為五羣每羣牡馬二百匹牝馬四十匹以千把一人為牧長外委千把一人為牧副兵十名為牧人三年均齊一次届期由總督委官逐場察驗敘明賞罰具題仍將各場原牧及孳生馬數與應賞應罰之處並各場官兵姓名詳造一册咨部察覈牧馬兵丁每月給銀三錢於司庫扣貯提鎭建曠項下動支報明户部需用鍋帳於存營項下撥給所牧馬匹不論牝牡每三匹取孳生馬一匹三年内一羣之馬多孳生一匹以上者為三等賞千把總加一級外委紀錄二次兵每名賞銀一兩多孳生八十匹以上者為二等賞千把總加二級外委加一級兵每名賞銀二兩多孳生一百六十匹以上者為一等賞千把總外委均以應升之官即用兵每名賞銀三兩所賞銀亦於建曠項下動支呈報户部如少孳生二十匹以下者為三等罰千把罰馬五匹外委及兵各責四十少孳生四十匹以下者為二等罰千把罰馬七匹外委及兵各責五十少孳生八十匹以下者為一等罰千把罰馬九匹外委及兵各責六十如於原牧數内闕少者千把革職罰馬十八匹外委革去頂帶仍各責八十兵責八十所罰之馬歸入馬羣覈算其提鎭游擊統計五羣以為賞罰五羣得賞之游擊加二級提鎭加一級四羣得賞一羣得罰之游擊加一級提鎭紀錄二次三羣得賞二羣得罰之游擊提鎭無庸議賞議罰三羣得罰二羣得賞之游擊降一級留任提鎭罰俸六月四羣得罰一羣得賞之游擊降一級調用提鎭罰俸一年五羣全罰之游擊革職提鎭降一級調用若於原牧數内闕少者除將千把罰出馬數補入外餘著落游擊提鎭各半分賠四年議準江南地方潮濕夏秋之際馬繫於槽熱氣薰蒸易致疲瘦必得閒空之地以飼水草今江寧駐防八旗督標中左安徽撫標左右提標中左右前後安徽游兵潛山徽州寧國蕪采廣德廬州泗州江寧城守左右松江劉河金山柘林青村泰興京口八旗京口協左漕標中左右廟灣鹽城小關海州淮安城守東海河標中左以上各營均繫舊有牧地不必别設只須再為勘定界址毋令越占其竒兵𤓰洲青山溧陽池州蘇州城守右南匯黄浦平望江隂靖江楊舍孟河掘港三江京口水師佃湖蕭營以上各營實在騎操馬均在四十匹以下或在槽餧養或就近牧放無庸設立場地又蘇州撫標左右福山常州揚州河標右等營馬匹雖在四十匹以上或該處並無曠土或分汛差撥難以聚牧應毋庸設立場地其浦口六安亳州壽春鎭標中左右蘇州城守中左川沙吳淞太湖左右鎭江崇明鎭標中左右並竒營狼山鎭標中左右京口隨旗左右京口協右泰州以上各營實在騎操馬均在四十匹以上向無牧場均應擇地設立内中浦口崇明鎭標中左右並竒營繫夏秋半支料乾之營應酌量每馬一匹給草地一畝以供芻秣其餘均繫長年全支料乾之營原無藉放青不過於夏秋酷暑時使其安閑散適應酌量五馬給草地一畝其所需之地均準於各營官基内撥給如無官基即擇民地於朋扣銀内按價買給豁免租糧其肯賣與否聽從民便飭令地方官毋得短價抑勒仍將所撥官基並擇買民地畝數及豁免租糧造册報户部至舊有新設牧地均令四圍栽柳編籬只留一門出入或四圍掘溝令兵看守仍四圍堅立限碑倘兵丁牧放越界踐食田禾不論多寡旗軍鞭一百營兵責四十若踐食過多應依毁伐稼穡者計贓準竊盜律分别治罪仍革伍所食田禾追賠給主該管旗營各官失於覺察者罰俸六月如不能禁飭以致兵丁馬匹越界踐食田禾者降一級調用倘有心縱容該管旗營各官革職至江蘇等屬有牧馬草場岡地租及省衞項下羣牧田畝名色見屬民業非繫牧地者仍遵照舊例辦賦各營不得倚占十三年議準甘州提標涼州西寧肅州三鎭標各設駝場一處每處牝牡駝二百為一羣每羣以千把總一人為牧長外委千把總一人為牧副兵九名為牧人仍委守備一人督率經理以五年均齊一次牧駝兵丁每月給䩺鞋銀三錢均準於司庫建曠項下動支呈報户部所需鍋帳準於存營項下撥給千把總外委兵丁因邊地游牧較内地不同五年均齊為期久遠應酌定議賞以示鼓勵每牝牡駝百於五年内孳生四十者無庸議賞於額數之外多孳生一駝至十駝者為三等賞千把總紀録二次外委紀錄一次兵每名賞銀一兩多孳生十一駝至二十者為二等賞千把總紀錄三次外委紀錄二次兵每名賞銀二兩多孳生二十一駝以上者為一等賞千把總加一級紀錄一次外委加一級兵每名賞銀三兩所賞銀由總督於均齊之年酌動何項於疏内聲明覈給每牝牡駝百於五年内倒斃二十駝者毋庸議罰若倒斃逾二十駝之額不論多寡總以續得孳生抵補其餘再計孳生如少孳生一駝以上者為三等罰千把總罰俸六月外委及兵各責四十少孳生十一駝以上者為二等罰千把總罰俸九月外委及兵各責五十少孳生二十一駝以上者為一等罰千把總罰俸一年外委兵丁各責六十至經理守備如千把總外委得一等賞者準其紀錄三次得二等賞者紀錄二次得三等賞者紀錄一次如千把總外委得一等罰者經理守備罰俸一年得二等罰者罰俸九月得三等罰者罰俸六月每届五年均齊之期由總督委官前赴各處牧場印烙將數目及牧放官兵姓名分晰造册叙明賞罰具題至孳生牡駝於五年均齊之後照例配搭孳生其餘牡駝騸割别牧以備撥用再孳生駝内如有老弱不孳生者準其據實呈驗變價所有空闕在於孳生駝内頂補仍算入孳生之數以定功過一直省營馬順治年間定各省營馬闕額該督撫提鎭或就近買補或報部撥給六年題準官員騎坐馬皆繫自備名曰例馬每月照數支領草料提督準例馬十有五匹總兵官十有二匹副將八匹叅將游擊各六匹都司守備各四匹千總把總各二匹至兵丁騎操馬酌量各營情形或馬歩各半或馬四歩六或馬三歩七或馬二歩八或馬一歩九或不設馬皆於奏銷案内照各營實在數目開造報部察覈知照户部銷算草料八年題準副將以下把總以上每月於應支銀内扣二錢馬兵扣一錢歩兵扣五分守兵扣三分名曰朋扣存貯營中以備買馬之用若有餘剰由部覈明於奏銷本内題交户部充餉又題準營馬對敵及追盜賊損失者免其賠補走脱被竊失者著落本人賠補若倒斃者每馬以十兩為額令其賠補名曰賠樁毎年遞減一兩至十年者免其賠樁準動支朋扣銀購買十六年題準官員例馬提督準二十匹總兵官十有六匹副將十有二匹叅將八匹游擊以下仍各照舊數又覆準将軍督撫提鎮買營馬者將應買數目報部副将以下買營馬者呈明該管之督撫提鎮報部康熙三年議準江南江西福建浙江湖北湖南四州廣東廣西雲南貴州等省營馬以三年賠樁過三年者免直𨽻山東山西河南西安甘肅以五年賠樁過五年者免四年題準三年賠樁之省一年倒斃本兵賠銀七兩合隊二兩本管官一兩二年倒斃本兵賠銀六兩五錢合隊一兩七錢本管官八錢三年倒斃本兵賠銀六兩合隊一兩四錢本管官六錢三年以後免其賠樁動支朋扣銀買補五年賠樁之省一年倒斃本兵賠銀七兩合隊二兩本管官一兩二年倒斃本兵賠銀六兩五錢合隊一兩七錢本管官八錢三年倒斃本兵賠銀六兩合隊一兩四錢本管官六錢四年倒斃本兵賠銀五兩五錢合隊一兩本管官五錢五年倒斃本兵賠銀五兩合隊七錢本管官三錢五年以後免其賠樁動支朋扣銀買補又題準廣東地方潮濕馬易倒斃賠樁準照十兩減半一年倒斃賠銀五兩二年倒斃賠銀四兩五錢三年倒斃賠銀四兩三年以後免其賠樁五年題準廣西地方瘴濕馬易倒斃賠樁照廣東之例又題準營馬倒斃如符年限者準用朋扣銀買補若年限不符除照例賠樁外亦準用朋扣銀買補其價直𨽻每匹九兩山東十兩山西八兩河南八兩五錢江南十有三兩九錢七分江西十有六兩八錢二分四釐福建二十二兩浙江十有六兩湖北湖南十有五兩西安八兩廣東二十一兩九錢廣西二十兩雲南二十一兩八錢貴州二十兩二錢二分有竒甘肅四川除貢馬抵補外其不敷之馬甘肅每匹給價八兩四川每匹給價十有二兩十一年題準官兵不扣朋銀者該管官罰俸一年提督罰俸六月無提督之省總兵官罰俸六月又題準直省營馬朋樁奏銷有總督之省由總督題報無總督之省由巡撫題報在京巡捕營由該叅將呈報本部察覈奏銷又題準將軍督撫提鎭標下各官請買例馬者不得過四百匹十六年題準營馬倒斃不報照常支領草料將該管官議處二十四年題準山西河南湖北湖南西安四川等省營馬闕額開數報部移咨甘肅巡撫將招中茶馬撥給無庸動支朋扣銀招中茶馬舊於甘肅設洮岷河州西寧莊浪甘州五茶馬司及開城安定廣寧黑水清平萬安武安七監歲遣御史一人經理康熙七年歸甘肅巡撫兼理至四十四年停止招中茶馬三十七年覆準四川營馬倒斃停其牽領茶馬準用朋扣銀買補四十四年覆準山西河南湖北湖南西安營馬倒斃原繫朋扣銀買補於康熙二十四年令牽領茶馬補額見今招中茶馬已經議停所有各該省營馬倒斃仍準用朋扣銀買補四十五年覆準直省營馬倒斃遞年加增必致朋扣不敷買補嗣後如倒斃過多實有冒銷情弊該督撫提鎭即行題叅四十七年題準營馬倒斃該管官驗明耳尾將倒斃日期出結詳報督撫提鎭一面動朋扣銀買補仍將新馬價直毛齒領騎兵丁姓名按季造册報部仍於年終奏銷由部察覈題覆五十五年議準營馬朋樁等册按季造報繁冗擾累甚屬無益嗣後統於一年奏銷案内造報一次雍正元年題準江南江西福建浙江湖北湖南四川雲南貴州等省營馬騎過三年倒斃者免其賠樁廣東廣西二省減半賠樁騎過三年倒斃者亦免賠樁直𨽻山東山西河南西安甘肅等省營馬騎過五年倒斃者免其賠樁均準動支朋扣銀買補七年覆準官兵朋扣銀有經督撫提鎭題奏撥修船及軍装器械並賞號公務差遣等事之用者均入於奏銷案内由部察照準其開銷又覆準山西河南西安甘肅四省營馬開報倒斃不得過十分之三十一年議準直𨽻山西河南西安甘肅馬價在十兩之内山東亦僅十兩均未便以十兩賠樁應以七兩為額如騎一年倒斃賠樁七兩二年倒斃賠樁六兩以下按年遞減若騎過年限免其賠樁準動支朋扣銀買補又覆準福建營馬五千七百七十一匹毎年準開報倒斃九百三十五匹十二年議準營馬除口外差遣及在軍前倒斃者皮臟免其變價外江南督標每匹變價一兩五錢提標一兩安徽撫標一兩二錢蘇松撫標九錢二分有竒湖北湖南一兩其餘直省均五錢發給馬價時將皮臟變價扣除於奏銷册造報察覈又議準買補營馬遵照定價發給不得短少分釐所買之馬果繫臕壯方準收營如有扣剋擾累該管官革職計贓治罪若任兵丁以不堪用之馬充數者該管官降三級調用又議準四川營馬照驛馬之例給價八兩又覆準廣東營馬五千二百六十六匹每年準開報倒斃九百二十一匹又奏準福建廣東營馬開報倒斃每年各有定數山西河南西安甘肅每年不過十分之三至直𨽻山東江南江西浙江湖北湖南四川雲南貴州開報倒斃數無一定嗣後均不得過十分之三額外浮開者減去不準開銷又議準四川營馬既將原價減去四兩照驛馬給以八兩所有賠樁銀應照直隸等省之例以七兩為額按年遞減乾隆元年議準武職大小官給有親丁名糧以為養亷此内有馬糧者若令其備馬則養亷不沾實惠遇草料昻貴且多賠墊公用反致拮据嗣後親丁之馬無庸實備止支領草料以補用度之所不足但此馬原繫營中額數竟不籌及一旦調遣需用難免闕乏應令各官弁照本身應得親丁馬若干匹備價存營竢有需用之時再行購買二年議準親丁之馬既備價存營則官弁並無實馬餧養嗣後開報倒斃止將兵丁見有之馬按額開銷如以存價溷入實在營馬額内揑報倒斃者降一級調用若存價已經買馬準其照例開報倒斃九年議準外委千總把總原領之馬即供騎操原未令其存價遇有倒斃統入營馬數内開報倒斃動支朋扣銀購買十五年覆準廣東馬價因營中公費不足每匹扣存三兩補公費之所不足應即照扣存之數嗣後將原價減去三兩以十八兩九錢作為定價報銷至公費别籌酌增又奏準廣西馬價每匹減去三兩以十七兩報銷是年奏銷營馬直隸九千六百六十八匹山東三千三百七十七匹山西五千二百五十五匹河南二千百有一匹江南五千六百三十八匹江西一千三百八十九匹福建四千九百八十三匹浙江三千六百三十四匹湖廣四千四百三十八匹陜西四萬五千二百九十八匹四川五千五百九十九匹廣東五千二百六十七匹廣西一千五百十有一匹雲南五千六百二十五匹貴州三千八百十有一匹十六年諭滇省各營騎操馬匹定例三年以外準報倒十分之三其額外溢倒之馬從前該督提等皆於朋扣等項内通融買補並未著賠嗣據該督察出奏聞仍請從寛免其賠樁經軍機大臣等議令照例按數賠補但念邊方水土餧養馬匹與他處情形不同自來通融籌辦相沿已久今若復令賠樁兵丁未免拮据嗣後滇省馬匹除額定十分倒三按例分别年限著賠外其溢額倒斃馬匹著加恩免其賠補樁銀仍照從前通融辦理以示軫䘏兵艱之意若兵弁等因有此㫖或致餧養失宜溢倒過多者該督提等嚴行叅處欽此二十年議準營馬價直除直隸山東山西河南江蘇安徽江西西安甘肅四川等省或僅在十兩以内或據該督撫察覈實無浮冒無庸議減福建酌減三兩準以十九兩報銷浙江減二兩準以十四兩報銷湖北湖南減一兩準以十四兩報銷廣東再減九錢準以十八兩報銷廣西再減一兩準以十六兩報銷雲南減三兩八錢準以十八兩報銷貴州減二兩二錢準以十八兩報銷一馬禁順治五年定見任文武官及兵丁準其養馬其餘人等不許養馬七年議準䝉古馬來京不許商販私買違者治罪十二年議準䝉古馬來京如有商販私買者旗人責成該管官民人責成五城司坊官嚴行察緝又議準䝉古進貢馬駝之外有多帶願於塗間賣者聽若有通曉䝉古語言之人前往邊界與䝉古交結並遠相迎接買其馬駝者交刑部治罪所買馬駝入官守口官私放此等人出口者革職至䝉古到館之後未進貢之先有入館私買貢馬貢駝者繫官降一級罰俸一年常人鞭一百如有搶奪偷盗者無論官民皆交刑部治罪十五年題準文武官武進士武舉兵丁捕役等準養馬以備乘騎均令印烙十六年題準民人聽其養馬無庸察禁康熙元年題準除滿洲䝉古漢軍及漢文武官武進士武舉兵丁捕役外其民人違禁養馬者仍照例治罪三年題準民人違禁養馬者責四十板失察之該管官罰俸一年又覆準官員解送軍前馬匹沿塗應加謹餧養不許漫不經心以致疲瘦若疲瘦三匹以下者免議十匹以下者罰俸三月二十匹以下者罰俸六月三十匹以下者罰俸九月四十匹以下者罰俸一年五十匹以下者降一級留任六十匹以下者降一級調用六十匹以上者革職又題準軍需馬匹有交與州縣餧養者若有疲瘦照解送軍前馬匹例計數議處十年題準民人仍準養馬無庸察禁十二年題準民人養馬仍行禁止又議準在京旗人私往外省販馬繫正户將該佐領驍騎校罰俸一年領催鞭五十繫僕人伊主有官者罰俸一年常人鞭一百該管佐領等免議於馬販名下追銀十兩給拏首之人仍交部治罪至在外駐防各官不呈請該將軍都統等移咨本部私遣家人來京買馬者罰俸一年十五年題準大小官弁將自畜馬匹勒令營伍收買多取價直者照貪官例革職提問又題準親王出征準帶馬四百匹郡王三百匹貝勒二百匹貝子百五十匹鎭國公百匹輔國公八十匹不入八分鎭國公七十匹輔國公六十匹將軍八十匹副將軍七十匹䕶軍統領前鋒統領副都統各六十匹署䕶軍統領署前鋒統領署副都統各四十匹前鋒叅領䕶軍叅領驍騎叅領署䕶軍叅領署驍騎叅領一等侍衞䕶衞各三十五匹散秩官前鋒侍衞二等侍衞䕶衞各二十五匹委署官三等侍衞䕶衞各十有八匹䕶軍校驍騎校各十有二匹署䕶軍校署驍騎校各八匹䕶軍領催各六匹驍騎各四匹内閣學士與副都統同侍讀學士與叅領同侍讀與散秩官同筆帖式與驍騎校同多帶者不準又題準督撫提鎭差遣官役買馬若於票外多買及攜帶商販私買者許經過地方官察拏不察拏者降一級留任差遣之督撫提鎭罰俸一年十六年議準姦匪圖利將馬在賊境接壤販賣與賊者不論官兵民人各照律治罪該管官兵知情故縱者以同謀論失察者文職州縣官武職專汛官皆革職提問道府及兼轄官皆降五級調用該管總兵官降三級調用督撫提鎭降三級留任若販馬之人由本汛拏獲文武各官皆免罪將拏獲之官議叙十名以上者紀錄一次多者照數紀錄五十名以上者加一級百名以上者加二級其不繫本汛有能盤獲十名以下者紀錄一次十名以上者加一級二十名以上者加二級三十名以上者加三級四十名以上者加四級五十名以上者不論俸滿即升百名以上越升一級即用拏獲販馬之人將所獲之馬盡行賞給二十九年題準民人養馬無庸察禁三十一年奉㫖一應馬匹永行禁止宰殺貨賣交與歩軍統領及五城司坊官察拏又議準偷盜八旗官兵馬者分别匹數治罪其牧馬之人自行盜賣者亦照偷馬賊治罪至屯莊居住旗人賣馬者令上稅準賣民人既準養馬彼此買賣皆所不禁或驛站買用或兵民買用令報明本處地方官上稅準其買賣不上稅者照例處置又覆準八旗官兵屯莊牧養之馬被偷失主即時報該營汛官兵帶領兵丁追緝到交界地方交與鄰近營汛官弁接遞追緝獲賊官每案紀錄一次兵於賊名下每匹追銀一兩給賞若失主呈報該營汛官弁不即領兵追緝鄰境不即接遞追緝者官毎案降一級罰俸一年兵責二十板又覆準向來各省買馬均先在部領票經過地方文武官驗票放行如有姦匪將私馬附入票内影射行走難於稽察嗣後各省將軍督撫提鎭等若須買馬令豫先報部本部暫停給票聽其往各口及京城照數購買買到之日由部印烙然後給票票内注明馬數並所往該省路徑令經過地方文武官將票内馬數及本部印烙驗明放行若無本部印烙及馬比票内數多者察拏治罪如經過文武官不行察拏文官交吏部議處經過地方之專汛官罰俸一年又議準京城内外旗民收獲逸失馬駝者不許隱匿變賣即日呈報該管官送部由部交館所監督餧養仍移咨八旗並牌行五城有認領者開明逸失日月及毛色口齒繫旗人取具佐領印結繫民人取具地方官印結由部察對毛色口齒相符準其認領如過一月無人認領交館所監督變價解交户部三十二年覆準買賣馬匹者止令買馬之人上稅地方官計價收納至於州縣買補驛馬兵丁買補營馬雖為公用其中恐有影射亦令照例收稅其收過稅銀歲終造入奏銷册内報部察覈三十五年覆準直省購買營驛馬匹除赴各口及京城者由部印烙給票外若赴鄰境省分就近購買該督撫提鎭豫行移會赴買地方之督撫地方官照例收稅仍印烙給與照票以憑沿塗稽察三十九年覆準偷盜之馬經過地方該官弁無從知繫偷盜之馬所有職名免其察叅該官弁能拏獲偷馬賊者每案紀錄一次拏獲之人每匹向賊追銀一兩給賞四十二年奏準八旗官兵因公事領騎官馬宜申明禁令令加意照看不許倒斃遺失但不立定章程辦理恐難畫一嗣後領騎各該處先將官兵及佐領姓名並應領馬數造册送部由部照册編立印單注明給馬旗分領馬時各該處出具印領交該管官赴部親投由部察對相符給與印單照數領騎囘京時領馬官兵將馬交還原給旗分如有未交還者該旗將領馬官兵及佐領姓名開明咨部由部行文各該處限兩月交還若馬有倒斃遺失逾兩月之限尚未賠補由部叅奏將倒斃遺失馬匹之人繫官罰俸一年兵鞭八十不催追之都統等及該管各官罰俸六月領催鞭五十仍著本人賠補倘再逾兩月仍不賠補將倒斃遺失之人繫官降三級留任完日開復兵鞭一百都統及該管各官罰俸一年領催鞭八十仍著本人賠補其因公事領用官駝者亦照此例行又奏準八旗官兵因公事領騎官馬給馬旗分該佐領别作記號印烙於囘京交還時照原印烙記號驗收若領騎之宫兵欲將好馬留用詐稱倒斃遺失賠補後其原印烙記號之馬經本人認出將領騎官兵照偷馬例治罪五十三年覆準各省販馬人等暗結將軍督撫提鎭親屬將疲瘦不堪用之馬坐索髙價不肖文武官弁代為壓勒甚至無驛站之州縣並管歩兵之頭領亦行勒索應令將軍督撫提鎭嚴察禁止若有此等情弊即指名題叅從重議處倘徇隱不叅經部察出或被科道察出將該將軍督撫提鎭一并從重議處五十四年覆準餧養軍需馬匹疲瘦五十匹以上者將府道罰俸三月百匹以上罰俸六月百五十匹以上罰俸九月二百匹以上罰俸一年二百五十匹以上降一級留任三百匹以上降一級罰俸一年雍正三年奏準八旗兵丁所養馬駝如有疲瘦不堪用者鞭五十該佐領驍騎校罰俸三月叅領副叅領罰俸一月若並不餧養冒領錢糧者鞭一百革退冒領錢糧追繳該佐領驍騎校罰俸一年叅領副叅領罰俸六月八年議準騍馬聽民人畜養無容察禁至騸馬為營驛之所必需除八旗人等及漢文武見任候選候補官文武進士舉人生員武童準其畜養外其餘民人一例察禁見在畜養之騸馬各令變賣近京二百里以内者由户部照時價收買撥與八旗畜養二百里以外及各省地方由州縣官照時價收買以補營驛闕額均不許假察禁之名留難扣剋以致擾累民人九年諭前據旗臣奏請禁止民閒畜養騸馬比時發與大學士九卿會議準行頃聞不許畜養騸馬民閒有不便之處著不必禁止仍照舊畜養該部即通行曉諭並行文各省知之欽此十年題準八旗馬駝有私賣與人者繫官革職兵鞭一百革退該管官不能察出罰俸六月該管都統等罰俸三月十三年覆準八旗馬駝每年出場牧放其佐領下留京之馬原備緊要差遣必待本部印文方準撥用若官員以私事乘騎駝載者罰俸九月乾隆三年覆準八旗官兵因公事領騎馬駝宜令大員監看察禁弊端嗣後於給馬駝時該旗副都統一人前往稽察六年奏準大小官員將自畜馬匹抑勒營伍收買多取價直若經營驛據實詳揭該督撫提鎭不題叅者照徇庇例議處詳揭之營官以應升之官即用督撫提鎭失察者罰俸一年十二年奏準盛京地方嚴禁朝鮮收買大馬原有深意今朝鮮國人來京往往私買大馬帶囘應令左右兩翼嚴禁不許朝鮮購買並令山海關等口嚴行察拏若通事人等圖利代為購買察出一并治罪十四年奏準京城八旗所需馬全在兩翼購買關口官弁遇商販人等持有兩翼印票者立即放行毋得禁阻欽定大清會典則例卷一百十九
