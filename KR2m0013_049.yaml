body:
  text: 戶部鹽法下一直省鹽差順治初差長蘆兩淮兩浙河東巡鹽御史各一人直𨽻山東山西河南江南江西浙江湖廣陕西鹽政一年更差其福建四川廣東廣西雲南貴州六省鹽務舊隸巡按後改隸巡撫康熙七年定長蘆等四處鹽差於六部郎中貟外郎及御史內每處選差滿漢官各一人筆帖式各二人十年題準鹽差御史不拘滿漢每處止差一人十六年停止鹽差筆帖式如差滿御史仍帶筆帖式一人又覆準京城及采育里地方鹽引向由崇文門監督徴收嗣後責成大宛二縣行銷與各州縣一例考成三十年題準增設福建廣東廣西巡鹽御史四十六年命廣東巡撫兼理鹽課五十九年覆準將兩廣巡鹽御史徹回鹽政交總督管理雍正元年議準各鹽差筆帖式停其差往又覆準福建鹽課令各州縣徴收興泉道管轄著總督管理鹽務二年覆準令各該御史將鹽法諸書按年纂輯繕呈御覽並照式送部以備恭考又覆準雲南麗江府改土歸流其鹽井交與知府督令經歷煎鹽於本處行銷又覆準廣東發帑收鹽如産鹽無幾之小場地方官就近督收淡水等各場皆地勢廣逺産鹽甚多該督遴選廉幹之貟分委督收又覆準廣東運使管理五省鹽政復設經歷一貟以供差委四年覆準福建鹽場大使六貟業經裁汰但鹽政必須専官料理方能裕課請簡同知通判知州知縣等四五人發往福建委任場務仍遇貟闕題補應得之官又奉㫖兩浙鹽政交巡撫管理十二年題準福建鹽政衙門改為鹽法道専管鹽政一貢鹽順治初年定供用庫白鹽二十四萬一千六百六十六斤內官監白鹽六萬二千斤青鹽七萬二千五百斤光祿寺青白鹽十有四萬二千斤以上每百斤加耗三十斤鹽甎萬斤計六百六十七塊鹽滷二千四百斤神樂觀鹽六千五百二斤每百斤加耗三十斤戶部都察院巡鹽御史官吏食鹽二十一萬百有六斤每百斤加耗十斤以上均由長蘆興國等場辦解遇閏照數加解又題準部院等衙門鹽交戶部收貯給發四年題準給發宗室及官貟兵匠人役食鹽額數七年題準光祿寺鹽交本寺收十一年題準諸王各官按俸銀每兩給鹽一斤十二年題準內官監鹽交宣徽院收十五年題準供用庫鹽交宣徽院收十七年題準將各衙門巡鹽御史食鹽均令變價解部充餉康熙元年題準各監庫鹽仍令戶部收貯三年題準光祿寺鹽仍交戶部收貯嗣後除內府取用外餘令運司變價解部如遇取用仍解本色二十八年題準長蘆運使煎辦貢鹽九十餘萬斤內務府光祿寺每年取用三十餘萬斤自二十八年為始止令煎辦四十萬斤其餘五十餘萬斤停其煎辦每包折價銀七錢五分報部三十三年覆準將長蘆三十三年三十四年額解鹽停止俟用完時冉照例移解五十一年議準長蘆運使解送備用青白鹽十萬斤甎鹽百斤於五十一年起至五十五年止停止解送折價解部俟五年後每年止解青白鹽六萬斤甎鹽四千斤交光祿寺仍將應折價銀報部察核雍正六年題準青白鹽停解四年乾隆十二年題銷光祿寺解青白鹽三萬斤內務府解白鹽二十萬斤其甎鹽折價交與戶部停其解送一鹽法考成順治初年定直省鹽課每年巡鹽御史及兼理鹽法巡撫開列屬官職名分數具奏其州縣原額並完缺細數運使及管鹽法司道彙造清册送部察核康熙三年題準州縣衛所官銷引缺一分者停其升轉二分者降俸一級三分者降俸二級四分者降職一級五分者降職二級六分者降職三級七分者降職四級皆戴罪催銷完日開復又題準御史差滿交代離任將經徴帶徴鹽課總作十分未完不及一分者罰俸一年一分以上降俸二級二分以上降職一級三分以上降職二級皆留任四分以上降職三級調用五分以上四級六分以上五級皆調用七分以上革職廣東廣西福建四川雲南貴州兼管鹽法巡撫鹽課初恭未完一分者罰俸三月二分六月三分九月四分一年五分降俸一級六分二級七分降職一級八分二級九分三級十分四級皆戴罪督催停其升轉運提分司大使未完不及一分者停升罰俸六月一分罰俸一年二分降職一級三分二級四分三級五分四級皆戴罪催徴六分以上者革職經管鹽法司道府州縣官鹽課初恭未完不及一分者停升一分以上降俸一級二分三分降職一級四分五分三級六分七分四級皆戴罪催徴完日開復八分以上革職署運提分司大使未完不及一分者罰俸三月一分六月二分九月三分一年四五分降職一級六七分降職二級皆調用八分以上革職署理不及一月者免議署管鹽法司道府州縣衛所官未完一二分者罰俸三月三四分六月五六分九月七八分一年九十分者降職一級調用署理不及一月者免議接徴接催官不必各作十分以本年鹽課總作十分扣算議處參後大使限一年全完分司限年半全完限內不完照州縣官地丁錢糧例處分運使提舉限年半全完限內不完照布政使地丁錢糧例處分管鹽法州縣衛所官限一年全完限內不完原恭不及一分者降職一級一二分三級三四分四級五六分五級皆調用七分以上革職兼管鹽法司道府直隸知州限年半全完限內不完原參不及一分者降職一級停其升轉一二分降三級三四分四級五六分五級皆調用七分以上革職兼管鹽法巡撫限二年全完限內不完原恭不及一分者停升一二分者降一級三四分二級五六分三級七八分四級九十分五級皆戴罪督催凡降俸降級等官均候交代有能於離任之先將鹽課全完者即準開復如年限鹽課接徴接催官原參無名者接算前官總作十分限半年全完如不完照初恭分數參處四年題準經管鹽課官報眀巡鹽御史察核完缺方許離任如有未完即準其離任將御史降二級調用又覆準廣西州縣官咨眀廣東巡撫察核銷引完額方許離任六年題準凡遇閏年巡鹽御史以十三月差滿十二年題準各官任內鹽課未完别案降調丁憂離任者罰俸一年鹽池牆垣倒壞行鹽無術商販不行㦯食鹽不遵舊例藉口不行鹽者皆議罰俸一年又題準各官銷引未完八分以上者革職其戴罪督銷者限一年銷完如未完一二分者降三級三四分四級五六分五級皆調用七分以上革職又題準前官已完銷引責成後官一年內繳部如不行送部及題報鹽引遲延或申報鹽引前後不符者該管官罰俸巡鹽御史兼管鹽法巡撫照例議處又題準鹽引未經題明私自那撥者該管官降一級調用巡鹽御史降一級留任兼管鹽法巡撫罰俸一年或將此縣引賣與别州縣未經申報者府廳官罰俸一年布政使按察使罰俸六月十四年題準巡鹽御史鹽課未完二三分者照舊議降級仍留任兼管鹽法巡撫恭後不完應降級者皆留任督催完日開復至接管官半年期限太迫州縣大使改限一年司道府直隸州知州運使等官年半巡撫二年如不能完照初參例處分署司道府州縣等官不及一月者免議分司大使州縣等官原恭不及一分年限內不完者降一級留任冉限一年催徴如再不完照所降之級調用十七年題準各官察出竈地升科均照察出地丁錢糧例議叙二十七年題準雲南土商小販赴井支配令將行鹽各府州縣定完缺考成處分令其領運行銷先行鹽後納課四十四年題準鹽政文移向由都察院轉行轉送嗣後鹽政一應事宜有關各部者該部徑自行文該差該差亦自行咨呈達部仍具呈都察院存驗四十五年覆準嗣後有商人告領帑銀者坐商責令巡鹽御史等官運商責令督撫州縣官確察行鹽地方廣狹鹽本家産厚薄出具印結並諸商連名互結送部察核五十年覆準運司交代照藩司交代之例造具册結詳巡鹽御史具題察核如有遲延徇隱等弊照例題參交該部照藩司交代之例議處至甘肅四川雲南貴州等省未設運使其管理鹽課錢糧官交代之時亦照此例其運司運判提舉等官均有催徴錢糧之責亦照州縣交代之例令該御史備具册結呈報部科五十八年議準兩廣課餉考成止列嵗內經徴各官職名嗣後兩廣行鹽州縣將嵗外接徴之官亦按起止月日未完分數計算考成别册附參其果䏻於嵗內將引餉徴解全完或前官未解接任官能催徴全完者照地丁經徴例議叙雍正二年題準河東奏銷例於四月嗣後與地丁錢糧一例總於六月到部又題準河東舊例殘引均於三年內通融繳部新引令巡鹽御史親齎赴任自雍正二年為始每年舊引均於奏銷時一次繳部以杜重復影射之弊嵗前頒發新引及時行銷又覆準嗣後各省直隸州督銷鹽引巡緝私鹽原繫府同知經管者改歸州同原繫通判兼管無州判者交與州同管理如銷引不完及巡緝私鹽不力該撫即照例恭處六年覆準起解鹽課協餉該鹽政督撫巡鹽御史豫先移㑹前塗督撫飭撥官辨護送交代嚴飭解官由大路挨站而行如有踈虞該管督撫即將經過之文武官辨照例題恭著落分賠倘該督撫御史不移會督撫解官不知㑹地方仍行小路一有踈失各官照疏防例議處其不移㑹之督撫御史照僉差不慎例議處私行小路之解官照枉道例處分所失餉銀著落解官名下追賠如不能完即著落原差委之上司賠補至解官欲就小道該地方官詳報題參倘地方官聽其由小路行一並題恭又議準鹽課未完經徴各官均按分數議處而缺課商人從未有處分之例是以各商固結陋習視缺課為泛常嗣後未完鹽課錢糧經徴各官仍按照分數議處外將各商名下應完鹽課作為十分未完不及一分者責二十板未完一分者枷一月責二十板二分者枷四十五日責二十五板三分者枷兩月責三十板四分者枷七十五日責三十五板五分者枷三月責四十板以上缺課各商題恭之日扣限一月全完者免處逾限不完即照此例枷責如能於枷限內照數全完立時釋放免責若枷限滿日仍不完納除杖責外即將該商咨恭革退所缺課項以引窩變抵未完六分者杖六十徒一年限四月全完七分者杖七十徒一年半限六月全完八分者杖八十徒二年限八月全完九分者杖九十徒二年半限十月全完十分者杖一百徒三年限一年全完以上自六分至十分皆將該商鎖禁能於限內全完革退不許充商免其杖徒之罪倘逾限不完除將該商發配外其名下所缺課項均著落引窩家産變抵如額徴錢糧果能數終如數全完令鹽政按其課項多寡量給花紅匾額以别優劣七年覆準兩浙各場鹽課錢糧令場貟就近設匱徴收原封解交各縣折並是代徴之場貟非専管官可比嗣後除兼管専管各官仍照舊例處分外其代徴場貟如舊例初恭未完不及一分罰俸六月者今應免其議處一分罰俸一年者罰俸三月二分降職一級者罰俸六月三分降職二級者罰俸九月四分五分降職三級四級者罰俸一年皆免其停升催徴冉舊例未完六分以上者皆革職今未完六分應降職一級未完七分降職二級仍令戴罪催徴至八分以上者革職再初恭處分既已改輕則原參各官亦不便仍照舊例議處嗣後代縣催比之場貟舊例原恭不及一分年限內不全完降一級留任者罰俸六月原恭一分年限內不全完降一級調用者罰俸一年原參二分三分年限內不全完降四級五級調用者皆降一級留任再限一年催徴如冉不完照所降之級調用原參四分五分年限內不全完革職者降一級調用至原恭六分以上年限內不全完者革職若有一場坐落兩縣者其場貟兩地未完分數合算並案議處又議準山東商人賣鹽完日即令繳銷殘引如過期不繳將該州縣照失察例議處如運使不揭報照狥庇例議處知情者加倍治罪乾隆三年題準兩淮鹽課於二月奏銷四月考核嗣後永著為例以歸畫一四年覆準長蘆河東兩淮兩廣各道庫鹽課遇奏銷交代照閩浙之例令管理鹽政大吏盤察六年題準各省經徴鹽課督銷鹽引催徴各官能於奏銷前催徴全完或前官並未徴解接任官於奏銷前催徴全完總以一官全完一年課引者無論正署均照地丁錢糧全完例議叙其兩浙代徴場貟處分本屬減輕不便與經徴官一例議叙嗣後兩浙代徴場貟全完五萬兩以上者準其議叙五萬兩以下奏銷前全數通完統計兩年合算若將兩年應徴之數徴收全完亦準其議叙通融銷售地方不準議叙正課雖完本年帶銷之項未完者亦不準議叙十六年覆準滇省司井各官及行鹽各屬經管鹽課款項交代時不能依限完結多繫前任款項未清或竈戶領薪待煎或鋪販轉銷未售煎收不及致後任不肯接受應將前官任內已發薪本流滷及鋪販之鹽並一切應行交代之項分别應追應接辦理又覆準滇省管井提舉大使等官繫專司督煎其行銷責成各屬與井貟無涉嗣後鹽課奏銷管井督徴職名免其開列至兼管井務之知府同知知州知縣大使等官有本任兼銷鹽者仍照例開列至兼管鹽法之知府直隸州知州定例原有議處議叙之條滇省鹽課奏銷自應遵照定例開列其井官督煎有無惰誤作何議叙議處前例未經定議嗣後滇省井官如按年督煎足額準照課欵全完五萬兩以下議叙之例紀録一次若鹽井被水以致惰誤數至十萬斤以內限二年五萬斤以內限一年不及三萬斤限半年皆令趲補逾限不完將原督煎之數計作十分按未完分數參劾照鹽課未完分數例議處其督催未完之鹽道亦照此例議處若非被災偶因雨侵滷淡煎辦不敷分别多寡勒限趲補如為數無多限兩月三萬斤以上至五萬斤限半年五萬斤以上至十萬斤限一年逾限不完著落井官賠繳課款竈戶追繳薪本如課項延緩不繳即行咨參照本身雜項錢糧不完例議處至於無故惰煎數至十萬斤以內咨恭到日照行鹽無術例罰俸一年至二三十萬以上即行題恭照溺職例革職著賠課銀追繳薪本若隱匿惰煎不按月造報者即照規避例報恭其課薪皆著落該貟追賠至滇省各井款內每年共應借墊薪本等銀四十萬兩除原題官本六萬兩外其借墊借發銀三十四萬兩務令於次年奏銷時催完入册報部未完參劾照雜項錢糧例議處十七年覆準長蘆商雇巡役飭令各該州縣詳察實在需役若干定為額數老病者更換病故者選補不必分隸營汛佐雜衙門統歸該州縣管束以專責成以資巡緝不許給票專差以致生事擾民其商雇看守灘坨人役歸各該場貟就近管轄又覆準長蘆州縣如遇水旱災傷鹽引不能行銷經鄰邑代銷者該督及該鹽政據實聲眀免其議處外若並非災歉之嵗銷引不及分數雖經代銷仍按其未完分數恭處於次年詳加察核以原參分數為準如能比上年多銷一分即準其題請開復不能多銷㦯更不及上年分數除不準開復外仍按本年未完分數恭處統俟次年比較多則均行開復少則仍令戴罪至本地督銷額引業至八分以上其通融代銷僅止一二分者無庸加以參處十八年覆準廣西官辦引鹽皆責成知府督銷凡銷鹽解餉每半月一報本府稽察如鹽引未完州縣官照例議處並將該管知府參劾按其所屬額引彙計分數俟戶部核眀會吏部定議照州縣督銷商人鹽引未完例處分其銷存鹽價即責成知府盤察如有虧空不即揭報分别徇隱失察議處分賠一鹽法禁例順治元年覆準場竈照額煎鹽大使親驗按月開報運使如有隱匿以通同治罪其商人不許濫委雜役行鹽水程填眀賣銷地方完日同引繳察不得告改或鹽引焚溺取具地方官印結察實補買八年諭巡鹽御史及運司不許於額課外勒索侵剋如有貪縱各官許商民首告治罪欽此十三年題準鹽政衙門不許商役互充十四年題準勢豪不許占攬引窩商鋪不許自定價直如有專利害民串通經紀攙賣勒索等弊該御史嚴行禁飭十六年題準商人載鹽大小船均用火烙印記船頭不許濫行封捉十六年議準將領衛所官辨縱兵私販該州縣官緝拏揭報恭處十七年題準鹽場設立公垣場官專司啓閉凡竈戶煎鹽均令堆貯垣中與商交易如藏私室及垣外者即以私鹽論商人領引赴場亦在垣中買築場官驗眀放行倘有私販夾帶等弊該場官役一並重處又題準鹽船過關止納船料如有藉端盤驗額外苛求者以枉法治罪又題準凡獲大夥私鹽必究訊窩家經紀所過地方有無徇縱管鹽司道扶同不舉者一並參究不許以肩擔背負竒零小販塞責又議準貧民食鹽四十斤以下者免稅四十斤以上者仍令納課又覆準竈丁不許充當衙役又覆準口外鹽不許侵入長蘆行鹽之地如有違越照私鹽恭處康熙五年題準天津大沽鹽船出口巡鹽御史印給號票填眀人數地方防汛官辨察驗放行如無印票及人數不符夾帶違禁貨物者拏獲治罪地方文武官辨踈縱者照所定出境例處分七年題準州縣衛所官勒令百姓買引私𣲖戶口銷鹽者革職司道府都司不察報巡鹽御史管鹽巡撫失於覺察照例議處九年題準凡旗人販賣私鹽照例治罪外其主繫官罰俸繫平人鞭責佐領內管領驍騎校罰俸領催屯長鞭責其馬場牧人有犯私鹽者領去之營總恭領等皆罰俸領催等各鞭責十五年題準各官該管界內有私煎販賣者繫伊衙役革職繫軍民人等降調如旗人私煎販賣本主自行拏獲者免議十七年題準興販私鹽文武失於緝捕者如不及十人或十人以上不帶軍器仍照例議處十人以上帶有軍器者專管官革職兼轄官降級留任限一年內緝獲一半以上者還職不能緝獲者照例降革該督撫巡鹽御史提督總兵官不題參者照徇庇例議處若専管官一年內能獲大夥私販一次至五次者分别議叙兼轄官亦照例議叙二十一年題準凡私鹽經沿途官兵捕快盤獲者徇縱場官及失察官一並議處二十七年覆準各場折課等銀令竈總分催各竈自封投匱如劣襟蠹役營充竈總包攬收納照包攬州縣錢糧例治罪二十八年議準私梟全獲沿途失察武職免議又議準武職拏獲别汛私梟者準豫議叙又題準鹽店設立小票私畜鹽丁槩行禁止有擅用者照違禁例治罪三十年覆準十人以上帶有軍器興販私鹽繫本汛將賊拏獲一半以上者失察各官照例免其處分其本汛雖未拏獲被别汛全獲者亦免其處分别汛雖拏獲少一二人者仍照例處分又覆準巡緝私鹽原繫運使專責令在所轄地方巡緝私鹽毋許差人别往他方巡緝藉端生事擾害地方挾制有司三十三年議準運丁挾帶私鹽沿塗各官失察謊稱出境者降調四十四年題準嗣後興販私鹽事發該管吏目典史知州知縣守備千把總等官失察一次至三次者照例議處道府直隸州副將恭將游擊等官失察一次至四次者照例議處運使運同運判鹽場大使均繫専管鹽務之貟以後竈丁販賣私鹽大使失於覺察及知情者處分運同運判照該管州縣官例處分運使照府道例處分至關津過往回空糧船官座船如有夾帶私鹽在船者將夾帶私鹽之人照興販私鹽例治罪管船同知通判守備千總文武官辨知情不知情分别處分三十八年覆準江廣糧艘回空至楊州關令押運官辨於該御史衙門先遞報單總􅒩並該御史選委能貟公同盤驗如有夾帶私鹽將押運官辨失察各官一並參劾並令龍江等三關凡遇回空糧船到關亦一例盤察如有私鹽即移報督撫御史會同題恭四十六年覆準私販致礙官引皆係積梟巨囤所致嗣後鹽法衙門將私販之徒凖其用刑拷訊除正罪外其餘不得濫用刑訊四十七年覆準河南陳州舞陽等屬改食蘆鹽汝寧一府仍食淮鹽蘆商各守口岸毋得紊亂經制永逺遵行又議準淮南綱鹽令該巡鹽御史親行盤察分銷船至江楚地方鹽道即給水程地方官不得藉名盤察需索那借又覆準巡鹽御史到任差人坐守各場口名為緝私實即射利急行裁革又覆準私鹽之充斤皆由總啇不革官自為私各賣已鹽以圖一時之利令將總商革去違者該督撫即行指恭五十六年題準兩淮河曲江汊湖港海濱地方皆繫私犯要隘嗣後各省棍徒來境私販地方官失察照從前九卿所定處分例處分其地方官有能拏獲私販鹽千斤以上者將該管官辨核實題請議叙雍正元年諭國家欲安黎庶莫先於厚風俗厚風俗莫要於崇節儉周禮一書上下有等財用有度所以防僭越禁驕奢也孟子亦曰食時用禮菽粟足而民無不仁朕臨御以來躬行節儉欲使海內之民皆敦本尚實庶康阜登而風俗淳夫節儉之風貴行於閭里而奢靡之習莫甚於商人朕聞各省鹽商內實空虗而外甚奢侈衣服屋宇窮極華靡飲食器具畢求工巧俳優伎樂恆舞酣歌燕㑹嬉遊殆無虗日金錢珠貝視為泥沙甚至悍僕豪奴服食起居同於仕宦越禮犯分罔知自檢驕奢淫佚相習成風各處鹽商皆然而淮揚為甚使愚民尤而效之其弊可勝言哉司鹽政者宜約束商人嚴行禁止出示曉諭諄切勸戒使其痛自改悔庶循禮安分不致蹈僭越之愆而省一日之靡費即可以裕數日之國課且使小民皆知警惕敦尚儉約於民生亦有裨益庶不負朕維風振俗之意若仍前奢侈不知悛改或經朕訪聞㦯經督撫恭劾商人必從重治罪鹽政各官亦不能辭徇縱之咎欽此又議準杜絶糧船私販將為首旗丁按法重處二年議準販賣私鹽交與地方官不時嚴加察緝除竒零肩賣者不必緝拏倘有大夥鹽梟督撫㑹同將軍撥旗兵協捕其私販為首之人與裝載私鹽之船戶拏獲一同治罪拏獲及出首之人照鹽數議叙又議準令京口將軍分撥兵丁於揚子江之三江口瓜洲揚州口等處巡察私鹽又議準嗣後如有積梟藉稱貧民將私鹽潛行窩囤興販貿易者令地方官辨及鹽政衙門一同稽察又覆準令各省管鹽督撫巡鹽御史將商人每年應完錢糧務於奏銷限內照數完納如有拖缺即將該商革退引窩别募殷實商人承頂所缺錢糧著落該商家産追賠其原出結各官交該部嚴加議處如有通同徇隱以缺作完等弊於發覺之日將該管各官一並從重治罪四年議準回空糧船經過産鹽所在該地方文武官辨不行力催任其逗遛與遊客囤戶等私相交易至有夾帶之事者將該地方文武官辨並押空官辨恭劾照例議處運丁遊客囤戶等照販賣私鹽人等例加等治罪該管鹽務運使等官掣鹽出場務將餘鹽嚴行巡察不許夾帶如有徇隱踈縱發覺之日將運使等官令該巡鹽御史照失察私鹽例題恭議處其竈丁人等亦照販賣私鹽律治罪又覆準每年糧船回空之時於瓜洲江口分委瓜洲營辨協同廳貟實力搜察又覆準糧船旗丁水手南北往返必須食鹽準其於受兌上船處每船帶鹽四十斤于交卸回空處亦準其帶鹽四十斤多帶者同私鹽例從重治罪六年議準拏獲私販本犯脫逃者即將裝帶私鹽之腳夫水手拘獲到案詳究本犯踪跡勒限務獲照例於私販上加治逃罪售與之人亦照私販例治罪其腳夫水手分别懲治若大夥興販照强盜例勒限嚴緝地方文武官辨照溺職例議處又議準拏獲私鹽務將人鹽數目據實詳報如有將私鹽入已或與各役分肥不行據實詳報並大夥拒捕之案以多報少者即將該管官辨指名題恭計贓治罪其有未經侵匿者照徇隱例處分上司知情故縱及雖不知情未經揭恭或於别處發覺者將該上司照失察例分别議處又題準拏獲私鹽必詳究其買自何地賣與何人一並取具確供照興販私鹽例治罪若買自場竈將該管場司並沿途失察各官題恭議處其不行首報之竈丁照販賣私鹽例治罪倘承審官不究私鹽之來由草率完結亦照例恭處又議準嗣後拏獲私鹽計其斤數之多寡定罪名之輕重如三十斤以下者仍照例擬以杖徒三千斤以上者即照越境販鹽例問發邊衛充軍七年題準山東永埠等場灘廣鹽豐率皆路積應於各場適中設立鹽坨除計口量留食鹽外其餘鹽盡數運入官坨按季造册出結送運使察核乾隆元年諭私鹽之禁所以除蠹課害民之弊大夥私梟每為盜賊逋藪務宜嚴加緝究然恐其輾轉株連故律載私鹽事發止理人鹽並獲其餘獲人不獲鹽獲鹽不獲人者槩勿追坐至於失業窮黎肩擔背負易米度日不上四十斤者本不在察禁之內蓋國家於裕商足課之中而即以寓除姦愛民之道德意如是其周也乃近見地方官辦理私鹽案件每不問人鹽曾否並獲亦不問販鹽斤數多寡一經捕役汛兵指拏輒根追嚴究以致挾怨誣攀畏刑迫認干纍多人至於官捕業已繁多而商人又增私雇之捕水路又增巡鹽之船州縣毗連之界四路密布此種無賴之徒藐法生事何所不為凡遇姦商夾帶大梟私販公然受賄縱放而窮民擔負無幾輒行拘執或鄉民市買食鹽一二十斤者並以售私拏獲有司即具文通詳照律杖徒又因此互相攀染牽連貽害此弊直省皆然而浙江尤甚朕深為憫惻著各省督撫嚴飭各府州縣文武官辨督率差捕實拏姦商大梟勿令踈縱其有愚民販鹽四十斤以上被獲者照例速結不得拖纍平人至貧窮老少男婦擔負四十斤以下者槩不許禁捕所有商人私設鹽捕巡船幫捕汛兵皆嚴飭停止毋得滋擾地方俾良善窮民得以安堵欽此又題準六十嵗以上十五嵗以下及少年之有殘疾者其婦女亦止老年而孤獨無依者許其背負鹽四十斤易米度日如不合例之人槩不許藉端興販其稽察之法令於本縣報名驗實注册給以印烙腰牌木籌每日卯辰二時赴場買鹽擔賣一日止許一次並止許行陸路不許船載又覆準沿河文武官辨凡糧船經過在於河干竭力稽察除留食鹽外其餘夾帶之鹽照私鹽例入官十七年奏準長蘆堆鹽之地梟棍匪竊每肆偷扒以致商竈不敢多積令場貟照例製造鳥槍上刻場名編號注册每灘坨發一二杆擇老成謹飭之役給與收執遇有匪竊施放恐嚇仍令該鹽政不時稽察如有輕行施放者將該管場貟照例恭處其各灘坨增造鳥槍之時仍令册報兵部察核一引目由單順治元年定寶泉局刋鑄銅版刷印鹽引每引納紙硃銀三釐附同正課交都轉運鹽使司按年解部以供刷印三年差官督理淮浙引務加戶部侍郎銜駐劄揚州六年鑄戶部鹽引印以鈐鹽引七年停差督引部院仍令運鹽使司官吏赴部關領十三年定巡鹽御史先領二季鹽引赴任其二季仍委官赴領康熙十一年鑄戶部鹽茶銀印二顆鈐鹽茶各引十二年定長蘆山東河南兩淮兩浙每年四季鹽引豫支戶部庫銀刷印交新差御史帶往俟解到紙硃銀補庫十六年題準將長蘆各場竈戶地丁錢糧自十八年為始刋刻由單分送本部戶科察驗給散各竈戶二十八年議準場竈向無全書刋刻易知由單易於稽核不必造賦役全書三十年覆準鑄戶部山東司鹽引之印二顆鈐各鹽引三十五年覆準鑄鹽引銅版長蘆十有一塊山東六塊河東六塊兩淮十有四塊花馬大池一塊小池三塊漢中府西和漳縣二塊兩浙八塊四川一塊福建四塊兩廣八塊六十一年覆準令寶泉局照舊式鑄造新版六十四塊其糢糊舊版即交銷燬乾隆六年題準鑄換鹽引新版六十四塊其舊版即繳銷十三年各省由單均解交戶部以備稽察又題準新鑄鹽引銅版長蘆十有一塊山東六塊河東六塊兩淮十有四塊福建八塊兩浙八塊四川一塊兩廣八塊其花馬大小池西和漳縣毋庸鑄換舊版交與寶泉局銷燬又定例各省鹽引每於嵗終各該督撫鹽政差委官役赴部請領部按其請領之數刷印給發引式戶部為鹽法事山東清吏司案呈照得某運司某處鹽法題準各項事例已經通行遵奉訖所有引目除場竈丁守禦官吏軍民權豪勢要官運鹽貨偷取插和場戶運鹽攜帶軍器諸人買食私鹽載鹽不用官船七款另文申飭外其題定鹽斤繳引二款並行鹽地方合行開列鑄造銅版印刷給付客商收執照鹽前去發賣施行須至行者一某處某運司凡客商賣鹽每引淨鹽若干斤為一引給半印引目每引完納引價隨即給引支鹽一凡客商興販鹽賣不許鹽引相離違者同私鹽追斷如賣鹽畢五日內不繳退引者杖六十將舊引影射鹽貨同私鹽論僞造鹽引者處斬以上二款各省同一起運官鹽每引二百斤為一包經過批驗所依數掣摰稱盤但有夾帶私鹽隨發有司追斷客商貨賣官鹽自揚子江至湖南襄鄖皆依經過官司辨驗鹽引如無批驗所掣摯印記者笞五十押回盤驗此款止載兩淮鹽引內右引客商收執照鹽準此另文申飭七款一各場竈丁除正額鹽外將餘鹽夾帶出場及私煎貨賣者絞兩鄰知私煎而不首者杖一百充軍一凡守禦官吏巡檢司巡獲私鹽皆發有司審問犯人絞有軍器者斬鹽貨車船牲畜入官引領牙人及窩藏寄放者杖一百發烟瘴地面充軍自首者免罪常人捉獲者賞銀十兩仍究何場竈戶所賣依律處斷運鹽司盤獲私鹽隨發有司追斷不許擅問有司通同作弊脫放與犯人同罪一凡諸色軍民權豪勢要人等乘坐私鹽船不服盤驗者杖一百軍民發煙瘴地面充軍有官者依律斷罪罷職一將官運鹽貨偷取或將砂土插和抵換者計贓比常盜加一等如繫客商鹽貨以常盜論若商人將所買官鹽插和砂土貨賣者杖八十一起運官鹽並場戶般運上倉將帶軍器者並行處斬一諸色人買私鹽食用者減犯私鹽人罪一等因而販賣者處絞一各處運載官鹽許用官船轉運如竈戶鹽丁用别船裝載即同私鹽科斷欽定大清㑹典則例卷四十六
