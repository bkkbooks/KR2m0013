body:
  text: 户部蠲䘏三一蠲賦順治三年覆準江西疊被旱澇將三年分漕米除已開幫解京外餘悉豁免五年覆準山東夏津蝗災免賦一年朝城罹土賊之患所欠糧米悉行豁免六年覆準直省災傷奉㫖蠲免各地方於起存項下均減如存留無餘即於起運款内減除若有司藉無項可免使小民不霑實惠者該管上司科道指叅八年覆準湖廣延燒貯倉米豆準予開除又覆準地方災傷題蠲後州縣以應免數目刋刻免單頒發已徵在官者準抵次年正額官胥不給單票者以違㫖計贓論罪十三年覆準河南磁州蝗災汲縣輝縣水災按分數蠲免十五年覆準浙江寧紹二府屬颶風霪雨被災田畝按分數免本年正額錢糧康熙四年遣部員往勘山西災荒見年正賦並舊欠槩行蠲免又覆準山東棲霞寧海等州縣衞遭冦亂瘟疫荒地亡丁徭賦槩予蠲免六年題準奉蠲地方官將應免錢糧取每圖見年里長結狀分送部科察覈如有已徵在官不行流抵次年及不扣除應蠲分數一槩徵比侵蝕或經題定蠲免分數後故將告示遲延不即通行曉諭或稱止蠲起運不蠲存畱或於由單内扣除不及蠲額者州縣衛所官皆以違㫖侵欺論罪上司不行詳察使災民無告者道府降三級調用督撫布政使都司降一級調用又題準蠲災流抵如本年蠲免者填明次年由單之首如流抵次年者塡明第三年由單之首州縣衛所官不開載確數者議處八年題準直省州縣災傷不得以闔境地畝總算分數仍按區圖村莊地畝被災分數蠲免又恩詔蠲免江南等省康熙元二三年舊欠地丁等項錢糧欽此九年覆準織造局種藍田因旱澇蟲蝕免本年納靛十二年詔江南蘇松常鎮淮揚六府連年災荒免明年地丁錢糧之半欽此十五年覆準蠲免銀增減造册者州縣衛所官降二級調用該管司道府都司罰俸一年督撫罰俸六月如被災未經題免之先報册内塡入蠲免者州縣衞所官罰俸一年該管上司罰俸六月十八年覆準直屬地震通州三河平谷本年徭賦並撥補地畝錢糧盡行蠲免香河武清永清寶坻免十分之二金吾等衞所照坐落州縣例分别蠲免又覆準凡流抵錢糧應蠲已徵者給與紅票次年按數抵免又覆準蠲免錢糧州縣官侵蝕肥己者照貪官例革職提問督撫司道府官不行稽察令州縣任意侵蝕者皆革職二十八年諭今歳畿甸亢𤾉將直隸被災州縣衞所本年地丁各項錢糧除已徵在官外其餘未經徵收及康熙二十九年上半年錢糧盡行蠲免欽此又諭朕過邳州親見彼處田地多為水所淹没應納地丁及漕項錢糧均著蠲免節年逋欠亦盡予豁除欽此又諭今年湖北亢旱為災已遣官會同該督察勘今據將武昌等府所屬二十九州縣八衞所災傷分數勘明具奏朕心深為軫念武昌等四府今年錢糧前已全蠲其被災二十州縣四衞所康熙二十九年上半年地丁錢糧著與蠲免荆州安陸二府所屬被災九州縣四衞所本年地丁錢糧除已徵在官外其未經徵收及二十九年上半年錢糧亦盡行蠲免欽此三十年諭保定等處被災既經續報且見在供辨軍需其應完錢糧悉行豁免欽此又覆準蠲免陜西西安鳳翔二府屬渭南扶風等二十一州縣衞並都司所屬民屯更名地畝本年旱災額賦三十一年覆準江西九江府屬瑞昌縣自洪下源頭起至烏石止沙石堆積及水決田地七頃九十七畝九分零蠲免三十年分應徵錢糧又覆準江西永寧縣起蛟水決田地蠲免三十年分應徵錢糧三十二年諭朕恭謁山陵沿塗察訪民隠見今歳雨水過溢田禾被淹没者甚多穀耗不登米價騰貴又聞順天河間保定永平四府所屬皆然目前米價既貴將來春夏之際時直益昻小民艱粒鮮飽若來歳錢糧仍然徵收朕心實有未忍順天河間保定永平四府康熙三十三年應徵地丁銀米著通行蠲免所有節年舊欠亦準予豁除欽此又諭陜西西鳳二府連被災傷屢經轉粟蠲租又招集流民散給牛種然後流民復還鄉井今雖雨澤霑足百榖阜成而甫脱饑寒未饒生計將西鳳二府被災州縣衞所康熙三十三年地丁銀著通予蠲免欽此又覆準陜西西鳳延漢四府並興安一州本年課程匠價銀及牲畜地税等銀照地丁一㮣蠲免又覆準山西河津滎澤二縣被水衝卸入河田地錢糧準予蠲免三十三年諭山西平陽府澤州沁州所屬地方前因旱蝗災傷民生困苦已經蠲免額賦並加振濟而被災失業之衆猶未盡覩盈寧其康熙三十年三十一年未完地丁錢糧五十八萬一千六百餘兩米豆二萬八千五百八十餘石通行蠲豁用紓民力戸部行文該撫嚴飭該府州縣官悉心奉行務俾人沾實惠倘有已完在官揑稱民欠及己奉蠲免仍復重徵官吏作姦侵漁中飽一有發覺定以軍法從事遇赦不宥欽此又諭江蘇鹽城等五州縣存水田畝地丁錢糧漕米均照該督撫所題蠲免欽此又覆準山東邱縣地畝被漳河水淹所徵銀米照數蠲免又諭河南百姓連年為陜西運送米糧甚為勞苦今陜西田禾大穫應補運折耗米糧著通行豁免欽此三十四年諭直隸順天保定河間永平四府所屬地方被水將康熙三十五年地丁銀米全予蠲免欽此又諭奉天等處今年田畝薄收本年錢糧通著蠲免欽此又諭宣化府屬地土瘠薄秋禾被災今年錢糧除已完納外未完者均免徵其康熙三十五年錢糧仍照順天等四府通行蠲免欽此又恩詔山西陜西江南浙江江西湖廣廣東福建等省康熙三十三年以前節年積欠及帶徵未完銀米皆著豁免欽此三十五年諭江南淮揚徐泗等處去歳水勢驟發被災小民困苦萬狀朕心深為憫惻三十五年一應錢糧盡行蠲免其三十四年未完錢糧於三十七年帶徵欽此三十六年諭海州等十八州縣三衞被九分十分重災田畝本年應徵地丁銀米及此項田畝所有漕糧漕項著通行蠲免欽此又諭江南山陽高郵被淹蕩租均著全免欽此又諭直隸宣化府屬三十六年地丁銀米既予蠲免其宣屬受災地畝所有補給通州等州縣者其錢糧亦一例蠲免欽此又諭淮安揚州鳳陽等處比來水患頻仍浸漫隄岸田多淹没耕穫無從百姓艱於粒食經朕屢振屢蠲被災地方賴以安堵但久歉之餘恐致資生匱乏朕廑憫殷切未嘗稍釋於懷若不大沛恩施安能使小民各得其所著將海山陽安東鹽城江都高郵泰興化寳應壽泗亳鳳陽臨淮懷逺五河虹䝉城盱眙靈璧等州縣並被災各衛所康熙三十八年一切地丁銀米等項及漕糧盡行蠲免欽此三十八年諭昨歳淮揚兩屬被災錢糧曾經該督撫具題部議照例減免三分今念百姓餬口維艱安能辦賦應破常格用沛特恩淮安府屬之海山陽安東鹽城揚州府屬之江都高郵泰興化寶應九州縣並淮安大河二衞康熙三十七年未完地丁漕項等銀十有九萬米麥十萬石各有竒著全予蠲免欽此又覆準浙江龍游縣被水錢糧照例蠲免其沙壓田地及蘭谿縣水衝田地皆按分數蠲免又諭朕聞鳳陽府屬去歳潦災甚重將康熙三十七年該府屬壽泗盱眙靈璧等十一州縣並泗州一衞未完地丁漕糧等項著一槩免徵欽此又題準直隸通州等六州縣額設紅撥船共六百隻撥運南漕每船給地十頃免其正賦嗣後紅撥船地畝凡遇災傷蠲免之年照民地一例蠲免又諭淮揚所屬海州等州縣衞連年河流浸漫編氓艱於粒食朕心深切軫念已將康熙三十八年錢糧均行蠲免今春南廵目睹民間疾苦恐致失所復將康熙三十七年未完錢糧盡予豁除諭令所司將沿河隄岸堅固修築乃修防未竣夏秋又致衝決田廬盡没水中特命該撫往駐被災地方動支積貯米穀並將漕糧截留親行振給今念清河口河流未通民田仍遭淹没耕穫無從百姓饘粥尚屬艱難來年租賦安能輸辦著將被災海山陽安東鹽城江都高郵泰興化寶應大河等州縣衞康熙三十九年地丁銀米等項及漕糧漕項銀盡行蠲免欽此又覆準山西平定等十一州縣年歳歉收蠲免節年民欠又覆準福建臺灣府屬三縣康熙三十七年七月颶風大作被災田園應徵之粟照例豁免又諭直隸霸州文安大城等三州縣地居窪下被水最甚雖遇豐年民猶艱食其三州縣節年積逋及本年應徴地丁正項户部即將應蠲錢糧備細察明豁免欽此四十五年諭今歳漢江水大南鄭等縣城垣田舍被水衝没且米價騰貴小民艱食所有本年應徴錢糧著豁免明年以後地丁錢糧亦著暫行停徴欽此四十六年諭江浙地方頃因偶被旱災隨命按數減徴豁免漕欠並分截本年漕糧令該督撫親往散振猶念民間生計未裕兹特再施膏澤用𢎞休養康熙四十七年江南浙江通省人丁共徵銀六十九萬七千七百餘兩著悉予蠲免其本年被災安徽廵撫所屬七州縣三衛江蘇廵撫所屬二十五州縣三衛應徵地畝銀一百九十七萬五千二百餘兩糧三十九萬二千餘石浙江二十州縣一衞所應徵地畝銀九十六萬一千五百餘兩糧九萬六千餘石四十七年亦著免徵所有舊欠帶徵銀米亦暫停追取竢開徵時一并輸納欽此又諭從來漕米槩不停徵即蠲除節年額賦亦不及漕項朕念江南地方見被旱災除新徵糧米别有諭㫖酌量截畱散振外其四十三年以前江蘇廵撫所屬各府州縣未完民欠漕項銀六十八萬七千餘兩米麥三十一萬一千八百餘石著該撫覈明悉予全免欽此四十八年諭朕念江南淮安徐州揚州三府地卑積水被災獨重秋禾未播種者甚多雖本年錢糧業經全免又曾遣官分振而失業之民宜加格外之恩以𢎞休養康熙四十九年淮揚徐三屬邳州等十九州縣三衛額徵地丁銀五十九萬三千八百餘兩著通行蠲免又河南歸德府屬商邱等六縣山東兗州府屬濟寧等四州或被夏災或被秋災雖已各依分數例免額賦並宜更施膏澤用厚民生四十九年商邱等縣應徵地丁銀二十萬二千四百餘兩濟寧等州縣應徵地丁銀十有四萬六千六百餘兩著通行蠲免欽此又諭漕糧例不蠲免念浙江被災之後民力艱難其緩徵漕米著免徵收欽此又諭今歳直省各處皆獲收成惟廣東三水清逺高要高明四會五縣福建侯官縣福防㕔所屬福右衞二處甘肅靖逺衞環縣鎮原縣固原州固原衞平涼縣平涼衞崇信縣慶陽衛靈州所會寧縣寧夏中衛寧夏所古浪所十四處今歳夏秋被災各督撫已經奏聞其明年應徵廣東省三水等五縣額銀七萬七千九百餘兩米一萬七千六百餘石福建省侯官縣等二處額銀三萬六千六百餘兩米六千四百餘石甘肅靖逺衞等處額銀四萬七千七百餘兩糧八萬八千五百餘石草八十四萬三百餘束盡予蠲豁欽此五十五年諭前因甘肅靖逺衞等處歉收既已多方籌畫蠲振頻施復將甘肅被災二十八州縣衛所康熙五十四年額徵銀及糧草通行蠲免但被災之餘民鮮蓋藏若非再沛𢎞施恐來歳辦賦猶艱除寧州隴西清源狄道臨洮五州縣衞五十五年額徵賦銀糧草已經蠲免外其靖逺等二十八州縣衞所五十五年額徵銀九萬七千八百七十餘兩糧二十三萬九千餘石草二百五十三萬七千餘束亦盡予蠲免欽此五十九年恩詔地方災傷已經察勘蠲免賦役者有司不遵仍行濫徵及但免有力之家致窮民不霑實惠者事發決不饒恕欽此雍正元年覆準康熙六十年山東濟兗東青四府屬歴城等四十九州縣衞所二麥被旱成災應徵銀二十三萬二千一百餘兩照例蠲免四年議準江南昭陽湖田地嗣後如遇涸出收成之歲每畝悉照舊額徵科倘遇水淹即勘實題請豁免該州縣有將涸出地畝仍報水淹或以已報涸出後即有水淹不為申報請免者該督撫即行題叅如徇隱不叅及州縣申報水淹不即委官勘實題請豁免者一經發覺將該督撫一并嚴加議處五年諭上年湖北地方有數州縣被水收成歉薄已降諭㫖令有司動用倉穀減價平糶以惠窮民今聞夲年四五月間有數處雨水稍多江流泛漲沿江之地未免近水被淹如武昌府屬之咸寧蒲圻嘉魚三縣武昌武左二衞漢陽府屬之漢陽漢昌二縣荆州府屬之江陵縣荆州衞黄州府屬之黄陂黄梅二縣皆繫濱江之地田畝有被水之處米價漸昻朕心深為軫念著該地方官加意撫䘏朕又思此縣衞數處既覺被水若仍令其輸納錢糧民間未免竭力著將今歳錢糧全行蠲免倘有已經完納者準作雍正六年應完之項此朕格外施恩該地方大小官吏務須實力奉行使小民均沾惠澤倘有絲毫侵隱假藉之處一經察出定從重治罪再各省藩庫皆有酌畱銀備用因湖北並無存剰銀是以未曽酌畱今既有蠲免之州縣恐俸餉公用等項一時或有不敷見在湖南藩庫有存貯銀三十萬兩著將銀十萬兩就近撥解湖北布政使司再將兩淮鹽課銀撥二十萬以十萬兩解送湖南補項以十萬兩解送湖北備用湖北既有銀二十萬兩則公項需用可以動支竢徵收還項之時即充藩庫酌畱之數又聞湖南近江州縣亦有數處被水著總督廵撫確實勘明亦照湖北咸寧蒲圻等縣衞之例將今歳錢糧蠲免欽此又覆準浙江仁和等州縣雍正四年秋禾被淹其應徵錢糧照分數豁免又諭玉田縣之還鄉河隄岸衝決附近田廬有被淹傷損之處著將被水之地明年錢糧蠲免一年欽此六年諭免直隸省七年分起運銀四十一萬七千八百餘兩欽此又覆準州縣被災之處或將已徵在官者匿為民欠希圖蠲免嗣後應將全免之州縣作次年蠲免其被災本年之錢糧即於次年徵納又覆準浙江江山縣陡被蛟水勘實成災田地又被水衝成溪應徵銀米照例蠲免又題準四川建昌鎭屬酥州糯白瓦等處番民水旱田糧被雪打水衝雍正七年被災窮番應納蕎糧準其豁免又覆準直隸西寧縣雍正八年秋禾被災按分數蠲免又諭直隸霸文安大城豐潤滄静海等六州縣及梁城一所常有水患康熙三十四五並四十二等年民欠米穀經年已久著加恩豁免欽此十三年諭西郵用兵以來甘肅等處運送糧餉不能不藉民力朕已屢沛恩膏兹聞甘省入夏以來雨澤愆期著將雍正十三年甘肅通省所屬應徵地丁錢糧全行豁免欽此又諭聞四川巴江津長壽綦江涪瀘永璧山合江等州縣九姓等九土司今年雨水較少收成稍薄朕心深為軫念今各省舊欠錢糧已降㫖通行豁免而川省並無逋欠之項得邀赦免之恩此巴縣等處本年未完錢糧著即全行豁免欽此又諭江南宿遷睢寧桃源三縣見在新淤涸復改科地糧額徵銀全行豁免其十三年淤地未完錢糧亦免徵收欽此又諭漕白南米向來雖無蠲免之例朕念浙江收成歉薄著將仁和等四州縣實在被水各戸本年應徵漕白南米亦照地丁之例格外加恩豁免欽此乾隆二年覆準湖北漢川江陵二縣並屯坐漢川江陵之武左荆州荆左三衞元年夏被水災其各項南米及銀準予豁免又議準丁糧銀嗣後被災地方令總督廵撫確實勘明或分年帶徵或按分數蠲免臨時具題請㫖再丁銀一項未經攤入地糧以前原繫别款徵收不與地糧一例蠲免自雍正六年丁銀攤入地畝均徵之後設有災荒自應一例酌免行令各省倘遇災荒減免錢糧即將丁銀統入地糧銀内覈算蠲免以昭畫一又題準江南碭山縣元年被災學田照例準其蠲免又題準八旗餘絶地畝被災亦照入官地畝之例準其減免租銀又革退網戸地畝被災照入官地畝之例覈明分數按等減免又諭豫省西華等四縣被水其應免錢糧照例蠲免欽此又諭湖北沔陽州地勢低窪田畝坍塌淤漲靡常積有逋賦雍正十二年該督題請丈明其十三年乾隆元年未經清丈民欠悉行蠲免欽此又諭免陜西靖邊定邊安定葭神木府谷米脂呉堡等八州縣被災地畝正耗銀本色糧草按地蠲免欽此又諭上下兩江雨澤愆期收成歉薄將雍正十三年乾隆元年分安徽所屬未完地糧蘆課及米穀麥豆等項應分年帶徴者著一并豁免乾隆二年江蘇所屬江常鎮淮揚徐海七府州屬有緩徴停徴銀米亦著豁免欽此又諭乾隆元年曾借給瓜州回民耔種並脚價銀向畱為分年帶完之項每歳輸將不免多所顧慮著將此項糧銀全行豁免欽此四年諭上年十一月寧夏地震民人被災甚重著將寧夏寧朔平羅新渠寳豐五縣本年應徴地丁及糧草雜税等項悉行豁免如有舊欠亦著蠲免倘附近州縣有被災之處亦著勘明奏聞欽此又諭朕因上年安徽旱災甚重曽降諭㫖將雍正十三年乾隆元二年分未完地糧蘆課及米穀麥豆等項例有帶徴者全行豁免今宿州及鳳臺靈璧石埭三縣雖未被旱所有未完雍正十三年乾隆元二年錢糧亦繫被災緩徴之項著一例豁免其舊欠之隨徴耗羡並被災各屬帶徴元二兩年之災緩漕糧著遵照前㫖悉隨正項豁免至未經被旱及勘不成災之各州縣所有催徴舊欠錢糧力不能完應行豁免者一并遵照辦理欽此又諭甘肅被水被雹之處雖有輕重不等但一州縣中有被災之處則通州縣内必不能十分豐收糧米未必寛裕著將水雹之州縣不論成災不成災所有乾隆四年應徴地丁錢糧悉行寛免欽此又諭甘肅所屬秦安等十五州縣均有水雹偏災應徴銀草分别蠲免今碾伯靈州中衞亦有被災之處著將此三州縣衞三年分應徴銀草與秦安等州縣一并加恩分别寛免欽此又諭江蘇被旱歉收將乾隆二年江常鎮淮揚徐海七府州屬被水停徴銀米等項降㫖豁免又聞海州及安東蕭碭三縣連年被水在淮徐等府内又屬被災獨重之區著將此四州縣所有雍正十三年乾隆元年地漕等項悉行豁免欽此又題準江南安東泰豐沛海沭陽等六州縣被水旱冰雹所有屯河灘河田地租銀按照分數蠲免又諭甘肅寧夏地震之後必加意休養方能培復元氣著將寧夏寧朔平羅三縣額徴銀草再寛免一年欽此又題準直隸入官並網户旗退公産餘絶等地被災所有應徴租銀照例蠲免又題準江南安徽宿鳳等十五州縣並鳳陽等四衞秋被水災無為合肥等四州縣秋被旱災所有地畝並屯折學田等項應徴銀米麥一例蠲免五年諭從前寧夏等處地震為災本年平羅地方又有被水旱之處著將賦銀糧草全行豁免並將夏朔二縣及平羅未被災村莊所有乾隆六年額徴賦銀糧草亦寛免一半欽此又題準將安徽宿州鳳臺靈璧石埭等縣雍正十三年並乾隆元二等年被災未完地丁扛脚銀並存畱項下未完俸工等項及米豆學租蘆課升科馬田租稻實在民欠者均子豁免六年諭乾隆二年八月間福建閩侯官等縣遭遇風災更有借給倉穀銀令其分年陸續交清今有力之民雖經清完尚有閩侯長連建五縣未完倉穀銀著全行豁免欽此又題準江蘇豐沛等十州縣衞五年分夏秋水旱蟲傷被災應徴地丁屯折蘆課河租銀米豆一槩豁免又覆準湖南湘鄉臨武二縣本年夏被水災地畝條餉等銀豁免又諭朕御極以來愛養黎元蠲免正賦之外復將雍正十三年以前各屬積欠陸續豁除以息民問追呼之擾今各省未完正項銀米豆草並雜項租穀積欠已久多繫貧乏之户無力輸將況江蘇所欠獨多目今見被水災待恩撫䘏著將各項悉行豁免若諭㫖未到之先或有續完即咨部扣除再江浙二省尚有未完漕項銀米豆麥向來不在豁免之例今既蠲除各項著將漕項一并免徴欽此又題準江南上元江寧等二十八州縣衞秋禾被水民屯蘆灘地畝應徴地丁屯折河租蘆課學租銀米豆一槩蠲免七年諭江南上下兩江今年水漲逾常該督撫陸續奏報者不下數十州縣朕每一覽奏宵旰靡寧已屢降諭㫖令該督撫加意撫綏毋使失所又特命大臣前往會同該督撫等拯救目前之災荒永除將來之水患但念此等被災之地夏已無收秋更失望小民困苦其何以堪況此數十州縣有今年被災特甚者有今年稍輕而連年被災者見又水漲未消亟待振䘏其流離顚連之状時在朕心目中所有本年應納錢糧著該督撫勘明被災各州縣先行緩徴次第將確數分别具奏請㫖蠲免欽此又諭據湖廣督撫奏報湖北之荆州安陸漢陽襄陽徳安湖南之長沙衡岳常徳澧等府州所屬之州縣及沔陽武昌襄陽三縣夏月被水淹没田廬禾稼又據江西廵撫奏報贑州吉安南安三府所屬州縣有被水較重之處今思江廣二省雖繫偏災而被水之民未嘗有偏全之别著該督撫於被水地方將應徴錢糧先行出示緩徴然後察勘照例題請蠲免欽此又覆準江蘇所屬江浦等二十九州縣衞被災應蠲地丁等銀二十三萬七千三百七十七兩歲夫銀萬一百三十九兩蘆課等銀千四百四十九兩學租銀六十八兩本色米八千一百九十四石又山陽等二十六州縣衞漕項銀三萬三千五十三兩五錢九分米麥豆十有一萬八千八百三石一斗六升各有竒均準蠲免又覆準安徽所屬壽州等二十州縣衞應蠲地丁漕項銀十有七萬八百十兩四錢米千七百四十五石四斗五升豆六十六石四斗二升八合麥二百四十四石八升内泗旴二州縣黄快丁銀攤入民田徴收應照民丁遇災一并免徴於册内别款造報應免銀十有一兩五錢四分各有竒均準蠲免八年題準甘肅所屬臯蘭狄道金固原華亭鎮原寧逺寧寧朔碾伯平番禮等十二州縣六年夏秋二禾被雹被水地畝賦銀糧草準其豁免又奏準安徽所屬上年被災之鳳潁泗等府州縣衞除定例按照成災分數豁免外有蠲餘應行帶徴地丁銀米麥及隨漕銀米麥一并寛免又奏準江蘇所屬山陽等二十六州縣衞七年夏秋被災田地除已經按照成災分數請豁外仍有蠲剰地丁屯折等銀米及蘆課雜租學租等銀此二十六州縣衞連年積歉上歲復被水災將蠲餘應納錢糧一并豁免又題準江蘇八年秋水旱災荒漂水等十五州縣衞所田地並海州沐陽贛榆二縣及漂陽鹽城二縣學租銀米等項均準其豁免又題準長蘆鹽政所屬興國富國豐財嚴鎮海豐等塲並滄州鹽山慶雲海豐青南皮衡水東光等州縣春秋雨澤愆期被災分數不等竈地草蕩丁糧等均各按分數一并蠲免又題準東省八年分臨邑縣秋禾被霜成災地銀準其蠲免九年諭乾隆三年寧夏地震鎮標及外路協防兵丁在於寧夏府庫借支帑銀除扣完司庫外尚有未完銀一萬九百餘兩見在著追朕思寧夏地震之後屢值歉收兵丁倍覺艱苦深為憫惻著將此項未完銀悉行豁免欽此又題準甘省高臺縣屬三清灣等處屯田五年分被旱傷䑕食其原借耔種糧米準其豁免又題準浙省九年杭州府屬仁和等三十二州縣並杭州前右二衞湖衢嚴三所仁和等八場田禾被旱被水田地扣免地丁屯餉等銀南秋等米及竈蕩田地應徴各銀均準豁免又題準陜省平羅縣五年分河水泛漲秋禾被淹借給窮民口糧耔種均準豁免十年題準陜省五七兩年咸長等縣共衝坍民地項下所有應徴本折糧折色均徭銀屯地項下應徴本折米糧更名地項下應徴本色及折價糯米折色銀均準按數豁免又題準甘肅八年夏秋被災之臯蘭金靖逺平番靈碾伯等六州縣被災地畝賦銀糧草又靈州被水衝坍地畝糧米又高臺縣被雹打水淹地糧均準蠲免又題準江西玉山縣五六月早禾被旱勘明田地繫止種一季應照秋收之例所有應蠲賦銀準按分數蠲免又諭近聞江蘇所屬海安東蕭碭山四州縣連年被水在淮徐二府内被災獨重朕心深為軫念著將此四州縣雍正十三年乾隆元年未完地漕等項悉行豁免欽此十一年諭朕加惠黎元將天下錢糧分年蠲免一次今直隸輪免之年宣化府所屬各州縣應徴屯糧例在不蠲免之内但念宣屬地處邊隅上年被災較重今春雨澤稀少見在降㫖加振與常時不同著將本年額徴屯糧蠲免三分之一欽此又奏準福建臺灣官莊租息照滇省官莊之例準蠲免十分之三又諭江蘇海州及沭陽贛榆二縣頻年被水小民生計艱難其應徴地漕銀米已降㫖停緩惟是積歉之區朕心廑念今歳復遭水患著將三州縣十年以前積欠地漕銀米槩行豁免其淮安分司所屬之板浦徐瀆中正莞瀆臨洪興莊等六鹽場十年以前未完折價銀亦一例豁免欽此又題準江蘇山陽等二十四州縣衞十一年秋禾被水田地地丁屯折河租等銀本色米糧準其蠲免至清河等州縣衞應蠲漕項銀米麥豆一并準免十二年諭吉林地方上年雨水勤霜降早收成歉薄著加恩將應交米糧均子寛免欽此又題準江南睢寧縣十一年分夏被雹災秋復被災應徴賦銀及漕項銀米麥一并蠲免又題準長蘆所屬豐潤縣管轄之越支場十一年分被水地畝按分數蠲免又題準安徽壽宿等二十三州縣衞十一年分秋被水災又泗州學田亦被水災銀米麥一并蠲免又題準江蘇山陽等二十六州縣衞乾隆七年夏秋被災田地蠲剰地丁漕項銀米豆麥等項已經奉㫖豁免尚有未完起存地丁等銀米雜項學租令將確數分别造册一并豁免又覆準山東齊河等八十五州縣衞所被水被雹成災田地應蠲賦銀二十四萬一千九百四十三兩四錢有竒準予豁免又覆準山東鄒平等五州縣及即墨收并衞地續報被水成災田地應蠲賦銀一千九百二十五兩六錢有竒準予豁免十五年諭朕廵洛祀嵩甫經豐樂鎮即已降㫖蠲免經過州縣十分之三其地年歳順成是以照例蠲除數日所過州縣體察農功夏麥告豐晩禾覺歉秋牟播種亦復待時深為軫念其歉收之處著再加恩統前蠲免十分之五令該撫詳悉勘明分别辦理欽此又題準江淮等屬被災學田五頃二十七畝有竒應蠲四分銀十有七兩六分有竒準其蠲免又題準江淮揚徐海五府州屬夏秋雨水過多河湖山水並發被災田地共八萬三千二百七十頃三十七畝應蠲免地丁等項銀六萬五千五百九十八兩五錢本色漕糧漕贈米麥豆一萬六千四百七十九石五斗各有竒十六年諭朕清蹕南廵道由山左所有經過州縣既已特沛恩膏兹攬轡觀風知連歳有秋視戊辰東廵之時閭閻大有起色為之慶慰尚念該省有積年緩徴帶徴未完米穀皆因災出借之項雖疊遇有收而按年催比民力不免拮据著將被災借穀應於十五年起分作五年帶徵及鄒平等屬帶徴未完穀共九十七萬五千餘石槩行蠲免欽此又諭朕車駕南廵乘時布澤蠲除積欠疊沛恩施更念江蘇之宿遷等州縣上年被水稍重雖經格外加振可以接至麥秋該督撫等自督率地方官按期散給災黎均沾實惠而清蹕所經倍深軫䘏著再加恩將經過之宿遷清河桃源三縣被災貧民上年借出耔種銀悉行免其徴還以紓民力欽此又諭江南揚州府屬之興化縣積淹荒廢田畝錢糧久經停緩後歸冬勘辦理於乾隆九年起按年勘報豁免其元年至八年原緩未完賦銀米麥仍應分别催輸荒户殊為拮据朕翠華南廵廣敷惠澤著將此項原緩未完賦銀米麥一并勘明加恩豁免以甦民困欽此又諭徐州府屬沛縣濱湖地畝近年以來屢被水災所有應徴租銀自乾隆十年起按年勘報蠲豁而九年以前積欠未完租銀以不在勘豁之例仍須照數輸納貧民未免拮据著將乾隆九年以前應徴未完租銀三千一百餘兩一并加恩豁免欽此又題準浙省淳安縣於乾隆十五年早禾被水被蟲成災五六七八九十分不等地三百二十二頃二十八畝有竒共蠲免地丁銀七百六十八兩二錢米三石九斗各有竒又題準浙江永嘉樂清瑞安平陽等四縣乾隆十五年秋禾被蟲勘明成災田一千六百八十六頃三十四畝有竒應徴地丁銀四百十有八兩六錢米二千九十六石九斗各有竒又溫州衞被蟲田三十五頃三十三畝有竒應徴地丁銀五十一兩九錢軍儲銀十有七兩三錢各有竒玉環㕔被水田四十四頃九十畝有竒應徴穀四百四十石一斗有竒均準蠲免又題準甘肅大荔等縣本年秋禾被水成災地畝應徴地丁銀二千十有四兩一錢朝邑等縣成災租地應徴穀四十五石六斗各有竒均準蠲免又題準山東嶧縣等七州縣秋禾被水成災六七八分地二萬五千三百七十二頃九十四畝有竒應徴地丁等銀一萬一千三百五十五兩六錢準其蠲免十七年題準浙江永嘉場十五年秋禾被蟲成災五六七八分田三頃九十五畝應免十五年場課正珠車銀二兩六錢有竒又題準徽寧池鳳和廣六府州屬歙績等二十三州縣衞上年水旱偏災田地二萬八千三百四頃一畝有竒應免銀四萬六千十有一兩九錢米一千六百八十六石五斗六升豆一千五百二十六石二斗七升各有竒又題準山東鄒平等州縣秋禾被水成災五六七八九十分計地十萬九千七十八頃九十畝有竒應免地丁等銀九萬一千三百二十一兩六錢有竒又題準浙江海寧等州縣㕔衞所場乾隆十六年早禾被旱被蟲勘明成災田七萬八千二百六十三頃三畝有竒應免地丁銀二十一萬七千六百十兩四錢米一萬八千三百三十五石一斗穀二千六百四十三石七斗滴珠等銀二千九百九十七兩四錢各有竒又題準湖南善化等三縣乾隆十六年被旱成災地二千四百七十四頃三十四畝有竒應免銀一千一百七十三兩米二百七十七石九斗各有竒又題準山東壽光等五州縣麥禾被潮成災十分地一千七百三十四頃六十九畝有竒應免銀四千三百七十一兩四錢有竒十八年題準浙江仁和等縣場乾隆十七年秋禾被水成災田二千七百二十頃七十九畝有竒應徴地丁等銀八千八百七十三兩五錢米六百七十九石七斗海寧縣公租銀三十四兩各有竒均準豁免又題