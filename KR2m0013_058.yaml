徵一年雍正二年復念二省去歳收成雖稔百姓元氣方復舊欠新徵恐難兼顧諭令該撫將實在民欠分作三年帶徵以紓民力今二省春雨未足著將河南康熙五十九年至六十一年帶徵錢糧及雍正元年未完民欠並從雍正二年起限寛作五年帶徵山東康熙五十八年至雍正元年帶徵錢糧為數更多著從雍正二年起限寛作八年帶徵欽此又覆準長蘆被水食鹽壅積未消將雍正三年秋冬二季引課等銀分作二年帶徵又覆準長蘆各場竈地被水將雍正三年青滄二分司被災十六場額徵課銀於雍正四年帶徵又覆準山東曹縣黃水衝決太行隄田地被淹應徵新舊錢糧緩至明歳麥熟後徵收四年諭去秋北方多雨直隸所屬七十三州縣被水歉收已將被災地畝之錢糧照例蠲免其應徵額賦又復停徵朕思一省之中既有七十餘州縣收成歉薄則鄰封隔縣必有謀生覓食之人著將雍正四年通省應徵額賦一并停其徵收欽此又諭去歳畿南被水將雍正四年錢糧通省均令緩徵今年錢糧尚且緩徵則從前未完之欠豈有反急徵之理速飭各地方官凡一應舊欠錢糧一槩緩徵欽此又諭江蘇所屬之蘇松常鎮四府地廣人稠需米甚多四府所屬漕兑共一百四十餘萬石居七省漕糧三分之一今州縣既有被水之區恐小民輸納匪易著將成災五分以上之地畝應出漕米緩徵一半其緩徵一半漕米著於雍正五年秋收後帶徵欽此十年覆準浙江嘉興府屬之石門桐鄉湖州府屬之歸安烏程本年雨雹秋禾被傷其應徵漕米等銀緩至十一年秋成後分作兩年帶徵至南米繫給兵餉之項先借倉穀碾放亦竢來秋帶徵十一年覆準江南南匯等縣並金山鎮海等三十四州縣衞十年秋海潮湧漫風雨蟲傷其本年應納地丁錢糧及十年以前各項舊欠皆緩至十一年秋成後徵收又覆準浙江杭屬之海寧嘉屬之海鹽石門桐鄉湖屬之安吉烏程歸安長興徳清武康嚴屬之遂安十一州縣本年春有冰雹麥豆被傷應徵新舊錢糧緩至秋成後徵收十二年諭今年六月間江蘇地方雨水積多州縣低窪之地被水淹浸應徵新舊條糧著緩至來年麥熟開徵再應納南漕等米亦準明秋折納欽此乾隆元年諭陜甘民人自軍興以來急公效力甚屬可嘉屢年叨䝉皇考疊沛恩膏朕又降㫖將本年應徵錢糧甘省全行豁免陜省止徵一半以昭格外之恩上年陜省收成未稱大稔今年春夏之際未免輸納艱難著將應徵一半額賦寛至收成後開徵欽此又諭甘肅平涼府所屬㕔及州縣並鞏昌府屬西固㕔慶陽府屬環縣及寧夏府屬靈州之花馬池石溝等堡中衞之香山一帶上年收成少歉著將緩徵本色米糧自元年為始分作五年帶徵欽此又覆準湖北漢川公安等七州縣並武左沔陽等五衞本年夏被水災其不免分數錢糧此時急難催徵至公安縣雖不成災收成既歉日用不敷其本年應完之項一并緩至來歳麥秋徵收又諭各省緩徵錢糧例於下年帶徵以完國課朕思年穀荒歉有分數多寡不同若本年被災尚輕次年幸值豐收則帶徵尚不致竭力若本年被災較重則民間元氣已虧次年即遇豐收小民既完本年應輸錢糧又完從前帶徵之項必致竭蹶著勘明被災不及五分者緩至次年徵收其被災較重者分作三年帶徵被災稍輕者分作二年帶徵以紓民力欽此五年諭天津地勢低窪屢被水災著將天津所屬帶徵之項自本年為始分作五年徵收欽此又題準福建臺灣府屬鳯臺二縣三年分秋被旱災其田園官莊應徵銀米被災八九十分者分作三年帶徵五六七分者分作二年帶徵六年諭福建臺灣地方上年秋間闕雨收成較常歉薄今春以來米價日漸昻貴小民謀食艱難納課尤為竭蹶多年舊欠已槩行豁免至乾隆四年以後未完銀粟統竢本年十月成熟之後徵收欽此七年諭甘肅地處西陲民貧土瘠頻歳軍興連遭亢旱除蠲免民欠並帶徵之項外其乾隆元年以後借欠之項著分作六年帶徵欽此又題準浙江仁和等州縣衞六年分被災田地按分數除蠲免外其應徵地丁銀米分作二年三年帶徵餘杭安吉二州縣又復被災其應帶徵錢糧緩至麥收後起徵至竈蕩田地除蠲免外其應徵課銀按照被災分數亦分作二年三年帶徵海寧被水沙地繫除扣蠲免下剰租銀緩至八月徵輸又諭朕念甘肅地瘠民貧前特降㫖民欠借糧一槩蠲免今思從前有因糧闕以銀一兩作糧一石借為耔種口糧之需者如蘭鞏平慶等屬原借以銀作糧即與借糧無異此等抵借之銀事同一例自乾隆七年為始分作六年帶徵欽此又諭上年山東歴城等十七縣衞秋禾被災朕特降諭㫖將應徵新舊錢糧並漕米黒豆一槩緩至今歳及次年兩年帶徵於麥熟後起限嗣因二麥不登復緩至秋成後完納但各州縣中有疊被災傷之歴城等十三縣今歳雖獲有秋而民力未甦舊欠新徵一時並納未免拮据著將歴城等縣並收并之衛地其應徵四五兩年舊欠及帶徵六年之地丁並出借之口糧耔種槩緩至八年麥收後起徵分年完納欽此八年諭朕從前降㫖將江省清河等十二州縣衞乾隆五年以前未完帶徵銀統行停緩竢年歳屢豐民間元氣漸復之後再行酌量定限分年帶徵兹又念山陽阜寧鹽城甘泉高郵泰興興化寳應淮安大河揚州等十一州縣衞上年被災亦重豐碭山贛榆三縣災雖稍輕而均繫連年被水之地所有十四州縣衞乾隆五年以前未完地丁漕項銀米著將清河等十二州縣衞及山陽等十四州縣衞乾隆六年帶徵地丁漕銀同兩年以前未完之項著一并停緩竢年歳屢豐之後酌量奏聞又淮安分司所屬板浦等六鹽場乾隆二三四等年帶徵未完折價銀未曾歸入停緩之内朕思竈戸與民人無異著與民戸一例停緩以示朕優䘏民竈之至意欽此又諭甘肅蘭州府屬之臯蘭狄道靖逺金縣平涼府屬之平涼涇州靈臺固原鹽茶㕔鎮原靜寧華亭慶陽府屬之安化寧夏府屬之中衞花馬池甘州府屬之張掖等處舊欠地丁銀自乾隆元年起至二三四五六七等年積算其數較之一歳正額幾至加倍若責令一時輸將民力實為竭蹶著將臯蘭等十五州縣衞及鹽茶㕔節年舊欠地丁銀糧分作四年帶徵欽此又諭河南永城鹿邑夏邑三縣乾隆四六七三年未完帶徵緩徵銀十有四萬餘兩按各縣原欠數目自乾隆九年為始均作三年徵收欽此又諭河南今夏雨澤不齊其察勘成災者已照例振䘏其開封府屬之陳畱滎陽汜水彰徳府屬之湯隂衞輝府屬之淇延津並陜州等七州縣勘不成災之地畝錢糧著緩至明年麥秋徵收欽此九年諭陜西安西道屬沙州衞地處邊外天寒土瘠著將未完雍正十三年借給牛驘價銀自乾隆九年起分作三年帶徵欽此又諭江蘇淮揚徐海四府州屬疊被水災乾隆六年四屬災户共借大麥粟穀耔種牛草銀難以一并完納著於本年麥收後開徵分作三年至十一年秋收全完再乾隆八年江鎮淮揚海等屬歉收安東阜寧鹽城海高郵興化寶應等州縣所借粟米榖銀著準其分限兩年自本年起至十年秋後全完欽此又諭山東齊東等十九州縣衞被旱歉收已降㫖將應徵錢糧照例分别辦理但尚有勘不成災之地畝例不在寛免之列著將濟南府屬之齊東陵徳平原德平臨邑等州縣及德州衞武定府屬之惠民海豐樂陵商河濵霑化陽信利津東昌府屬之武城恩夏津沂州府屬之日照南鄉等各州縣並安東衞應徵乾隆八年地丁及帶徵錢糧寛至本年秋成後再行徵輸欽此又諭甘肅地方向來積欠繁多朕曽降㫖將張掖臯蘭等九州縣民欠自乾隆八年始分年帶徵又將武威西寧二縣帶徵雍正十三年至乾隆三四年之項一并蠲免此外應徵舊欠理應輸納但念甘肅邊陲土瘠民貧著將張掖肅高臺臯蘭河狄道靖逺安化平涼涇靈臺靈中衞及武威西寧等州縣衞屢年未完積欠賦銀米草再行寛緩自乾隆九年為始分作六年帶徵欽此又諭山東濟南府屬之歴城章邱徳州武定府屬之惠民陽信泰安府屬之平隂肥城沂州府屬之沂水蒙隂青州府屬之博興高苑等共三十六州縣衞勘不成災之地畝例應徴輸朕念各州縣麥收原屬歉薄若因勘不成災將新舊錢糧一時並徵小民未免拮据著將乾隆九年應徵地丁寛至本年十月後起徵其節年舊欠緩至來年麥熟後徵收欽此又諭山東濟武東青等府屬有連被災傷之州縣上年被旱今歳夏麥又復失收之齊東陵德平徳臨邑平原惠民陽信海豐樂陵商河濵利津霑化恩並見被災之博興樂安等十七州縣及徳州等衞所有八九兩年借給口糧耔種等項銀穀均緩至十年麥秋後徵完又上年夏麥被旱今夏麥復被旱災之歴城章邱鄒平齊河濟陽長清青城蒲臺肥城平隂博平高苑等十二縣所有八九兩年借給耔種口糧等項銀榖亦緩至十年麥熟後徵收其被旱雹未深如禹城蘭山沂水蒙隂舘陶高唐臨清等七州縣所借銀米等均於本年秋後徵收還項欽此又諭山東青州府屬之博興樂安二縣夏麥被旱秋收有歉薄之處著將本年錢糧緩至來年麥熟後徵收欽此又諭山東武定府屬地本鹻薄兼以連年被災著將惠民陽信海豐樂陵濵商河利津霑化蒲臺青城等十州縣乾隆九年未完錢糧十年應徵新賦槩緩至本年秋成後徵收其八九兩年出借口糧耔種應於本年夏秋兩熟分别徵完者亦著緩至秋後開徵欽此又諭山東濟武東青四府屬内積歉之州縣衞所除四五兩年未完無幾仍照例徵收外其六七八九十等年被災案内緩帶錢糧自十一年起分作五年帶徵每年徵完一年之欠其節年出借口糧耔種亦著分年徵收欽此又議準直隸節年本年民借口糧耔種工本等項數至萬石以上者共二十處鹽慶二縣為民欠最多之地將所借米榖分作三年帶徵河間府屬之河間故城寧津獻景任邱呉橋天津府屬之滄南皮静海保定府屬之雄新城等州縣民欠自萬餘石至二萬石以上將新舊借項均作二年帶徵又交河阜城青威清河等縣並深州民欠萬石以上者將本年借項徵還其節年舊欠分作二年帶徵又宣化府上年普屬被災之後本年亦多有冰雹成災之區應將所欠均作二年帶徵又題準江南壽宿等二十州縣衞秋禾被水應徵本年漕糧漕項及蠲剰銀米未完節年漕項銀米均照例分别分年帶徵緩徵又諭直隸鹽山慶雲二邑節年民欠倉糧米榖價銀等項分作三年帶徵但念二邑繫積歉之區元氣尚未全復著將鹽山慶雲本年應帶徵民欠等項緩至十二年秋成完納欽此十二年諭山東歴城等二十縣衛被雹朕已諭令緩徵今續報濟南府之徳州陵縣德州衞泰安府屬之泰安肥城東平東阿平隂等縣武定府屬之青城利津霑化等縣兗州府屬之滋陽曲阜寧陽鄒金鄉嘉祥汶上壽張等縣並濟寧衞東平守禦所曹州府屬之渮澤鉅野鄆城單武城沂州府屬之費東昌府屬之博平清平高唐恩青州府屬之博興高苑樂安等州縣共三十四州縣衞所六月下旬大雨時行山水陡發晩穀未免傷損所有應徵新舊錢糧槩緩徵收欽此又諭安徽宿虹等處秋禾被水著將宿州靈壁虹二縣並宿州衞應徵漕項銀米暫緩徵收其未完積年漕項亦著停緩照例分年帶徵欽此又題準江南乾隆十二年七月颶風驟雨潮水衝決濱臨江海之常熟等十七州縣並蘇州太倉鎮海金山四衞民屯沙洲田禾花豆衝没又夏秋雨澤愆期上元等十二縣並揚州儀徵鎮江三衞被旱災田地丁銀米按分數蠲免蠲剰銀米按被災輕重分年帶徵十三年新賦緩至秋成後啓徵各年舊欠地丁銀米緩至來年麥熟後徵輸如有勘不成災收成歉薄應徵本年地丁銀米並借欠耔種亦緩至來年麥熟後徵收又災田漕糧漕項所有被災較重之上海鎮洋寶山常熟昭文太倉通七州縣並蘇州太倉鎮海金山四衞災田按分蠲免銀米南匯嘉定上元江寧句容六合丹陽甘泉九縣所有本年災田漕糧均緩至明冬帶辦漕項銀與地丁一例緩徵又諭山東省明歳繫輪免錢糧之年乾隆十二年未完地丁銀應於奏銷前接欠催徵朕思本年齊河等州縣被災田畝應完錢糧已照例蠲緩其勘不成災及不被災之處與災地毗連者收穫未能豐裕將應徵未完錢糧於奉到諭㫖之日加恩停緩展至十四年帶徵以紓民力欽此又諭山東被災各縣境内有上年秋成少歉尚未成災者雖非被災民人可比但與災地均屬毗連輸將未免拮据所有應徵舊欠錢糧亦著加恩緩至麥熟後開徵俾民力得以稍紓欽此又覆準山東徳州等二十二州縣衞二麥被旱鄒縣等十州縣衞二麥被雹貧乏之户借貸耔種口糧及時趕種以冀有收成災地畝錢糧緩至秋後分别緩帶以紓民力十三年諭山東今歳應徵之因災出借各穀七十六萬餘石春借穀四十六萬餘石又本年帶徵之穀十數萬石及麥本耔種漕倉項下應徵積欠錢糧為數甚多一時銀穀並徵即屬大豐以一年而完積年之欠民力未免拮据著加恩於今歳歳底截數所有未完穀内將春借一項於明年麥熟後徵收一半秋成徵收一半畱其餘力以輸該年正供其屢年因災出借之常監等穀槩寛至十五年起分作五年帶徵俾民力紓徐完納以示優䘏窮黎之意欽此十六年諭江蘇之淮徐等屬上年秋禾被水已經加恩蠲振所有餘剰應徵漕米豆麥等項緩至今冬帶徵但念該地上年被水稍重即使今歳秋成豐稔而災歉之餘民氣正宜培養若令新舊並輸小民生計難免拮据著將淮安府屬之清河桃源安東大河徐州府屬之邳州宿遷睢寧直隸海州所屬之沭陽等八州縣一衞本年應行帶完乾隆十五年災蠲餘剰漕項米麥豆分作三年帶徵以紓民力欽此又諭甘省各屬舊欠錢糧之外尚有額徵芻草一項不在蠲免之例著將乾隆元年至十四年未完草一千五百萬餘束分作十年帶徵以紓民力欽此又諭東省今歳偶被偏災應行振䘏事宜已加恩分别辦理此内濮東平東阿壽張渮澤范濟寧鉅野金鄉平隂等十州縣收成較為歉薄小民辦賦維艱著將本年應徵額賦銀三萬餘兩帶徵節年舊欠銀二萬三千餘兩一例緩至明年麥熟後完納欽此十七年諭陜省今年被旱偏災屢降㫖令該督撫加意撫䘏其勘不成災及與災境毗連州縣應徵銀糧雖定例不準蠲緩而該處收成究屬歉薄小民既謀食用復効輸將未免拮据著加恩將韓城麟遊南鄭西鄉城固褒城沔洵陽平利三水中部樂川宜君寧羌興安隴邠汧陽鳳略陽石泉長武鎮安雒南等二十四州縣本年未完地丁銀四萬八千餘兩本色糧一萬三千餘石緩至來年麥熟後帶徵完納其節年民欠常平社倉糧及南鄭一縣未完乾隆十六年屯豆五百餘石一并緩至麥熟後徵還以紓民力欽此又題準蘆屬興國富國豐財蘆臺嚴鎮海豐等六場竈地並滄州慶雲二州縣歸并裁場竈地實在被水成災八九分不等竈地共六百二十一頃五十四畝竈丁一百八十九名各有竒内照例蠲免十分之四六銀二百八十三兩一分有竒尚應徵銀三百六十二兩一錢七分分作三年帶徵又興國富國豐財蘆臺濟民嚴鎮海豐等七場並滄南皮鹽山慶雲青等五州縣實在被水成災五六七分不等竈地共二千七百八頃五十八畝竈丁一千一百四十名内照例蠲十分之一二銀三百六十八兩七錢三分有竒尚應徵銀二千四百三十六兩八錢三分分作二年帶徵十八年諭山東武定府屬之利津霑化蒲臺海豐登州府屬之蓬萊榮成福山棲霞等縣曹州府屬之濮州范縣應徵節年欠榖統於本年秋後起限徵收分作兩年完納以紓民力欽此又諭山東掖濰昌三邑被水各村莊應追舊欠錢糧借穀緩至明年麥熟後徵收以紓民力欽此一通商雍正三年諭今歳直隸天津等處地方被水米價甚昻去歳曾令盛京由海道運過糧十萬石著行文該將軍府尹等將盛京糧十萬石仍由海道運至天津新倉竢到日交與地方官收貯盛京等處倉内每年將所貯陳米出糶易進新米若所出陳米足十萬石即令運來倘不足十萬石酌量以賤價買足十萬石之數運來今歳若獲豐收價平即行買運若價直騰貴有不便之處即令將軍等將不便之處奏明再若有商民自海運米者不必禁止聽其運至天津貿易天津以外不許他往山東登州等處販賣欽此四年諭聞山東登青萊三府連年豐稔商販自東而西者絡繹不絶著該撫酌量動帑採買分貯於濟南等屬米少之州縣再勸諭各商販多運至濟南等三府俾民間得以收買存貯則明歳青黄不接之時米價不致騰貴欽此八年議準行令盛京將軍奉天府尹轉飭守口官弁如有商民販運米穀者聽其出口該管州縣給與商民船票該省地方官弁於原票上鈐印填注到口日期如無鈐印即察究治罪十年奏準凡有商賈販運米穀至山東直隸糶賣者米船一到即便放行其臨清淮揚等關將梁頭米税自五月至七月暫行寛免秋收之後再行徵收乾隆元年諭近年以來直隸地方收成歉薄民食艱難從前議開海運以資接濟續經盛京將軍奏稱錦州等處米穀加貴請永禁海運部議準行比時朕降諭㫖今歳直隸收穫平常仍照朕㫖明歳再照將軍等所請行朕聞秋冬收穫之後各商民攜帶資本前赴海城蓋平等處採買雜糧秪因時屆隆冬海風勁烈舟楫難行已將所買米糧收貯各店春融裝運該商民惟恐地方有司遵照明年停運之議閉遏留難甚為惶懼朕思商民此糧購買在先暫行存貯各店不應在明年禁止之内且奉天素稱産米之鄉雖因振運過多價直視昔加貴然較之直隸歉收之地待粟而炊其情形緩急實相逕庭著竢明年内地麥熟之後再將海運禁止此亦酌盈劑虛有無相通之道可即行文傳諭直隸總督盛京將軍等並出示令商民知之欽此又議準行令督撫轉飭管理關務各官凡有米船過關即詢明該商如果前往被災各邑糶賣者免其納税給與印票責令到境之日呈送該地方官鈐蓋印信以便回空覈銷如有免税米船偷運别省並未到被災地方先行糶賣者將寛免之税加倍追出仍照違禁例治罪四年諭上年直隸米糧騰貴曾降諭㫖準商賈等將奉天米糧由海洋販運以濟畿輔民食以一年為期今弛禁之期已滿而京師雨澤未降恐將來民間不免需米之處聞奉天今歳收成頗稔著再寛一年之禁商賈有願從海運者聽其自便可行文直隸總督盛京將軍等知之欽此七年諭上年直隸天津河間等屬被旱歉收朕臨幸奉天目睹秋收豐稔米價平賤即降㫖該督令其前往販運至次年秋收為止本年三月内又經臺臣奏請寛限朕已降㫖寛至今冬今據該督奏稱直屬米價雖見在平減而津屬慶雲等縣見被偏災慶邑本屬少米之鄉天津又為商賈叢集之地請再將奉天海禁寛展一年俾民食得有接濟等語著照所請奉天海運準再展限一年欽此十二年諭向來海禁綦嚴原以防姦商透漏接濟姦匪之弊但東省上年被水地方目下振借各項需用米糧倘奉天可以通商販運而稽察嚴密不致偷越自於災地有益著行文詢問山東廵撫盛京將軍是否可行奉天糧米可以運往若干如何按數給照撥運山東如何驗照稽察俾商販流通不致透漏而奉天米價又不致於騰貴如果可行一靣辦理一靣奏聞此因山東偏災一時權宜之事嗣後不得援以為例欽此又奏準福建臺灣雖隔重洋然與漳泉二府同隸一省商民船來往如織原不在禁例即如江南之崇明縣向有給照赴内地買米載回之例今以海外之米買運内地與弛海禁者有異嗣後如遇臺郡豐稔之年應聽漳泉二府商賈及在臺之漳泉二府民人自十月起至次年二月止於地方官處請照買運倘買運過多以致臺郡米貴及臺郡並非豐稔之年仍令該道府詳報停止又議準暹羅國産米甚多如有商民願往暹羅國買米造船運回者給與牌照以便驗放無阻仍嚴飭各兵役毋得需索擾累若商民無糧米載回只載貨而歸者倍罰船税以示懲儆又諭直隸總督奏稱天津靜海二縣今歳偏災較重見在加恩普振但二縣地處窪下産米無多又僻在海隅商販稀少米無来路不得不為明春豫籌調劑請暫開奉天海運等語著照所請準其暫開一年竢明歳秋收後停止其如何給照採買察驗發糶以杜偷漏之弊該督董率有司妥協辦理並諭盛京將軍知之欽此一勸輸順治十年覆準士民捐助振米五十石或銀百兩者地方官給匾旌奬捐米百石或銀二百兩者給九品頂帶捐多者遞加品級十一年題準見任官並鄕紳捐銀千兩米千石以上者加二級銀五百兩米五百石以上者紀錄二次銀百兩米百石以上者紀錄一次生員捐米三百石準貢俊秀捐米二百石準入監讀書十二年覆準令各省地方照京師例設厰煮振以濟饑民事竣仍將捐輸官民姓名並銀米數目彚册題報議敘十八年題準凡捐穀每二石折米一石豆照時價計銀議敘康熙元年題準捐銀米不分本屬隔屬如一年内捐及額者題請議敘七年覆準滿洲蒙古漢軍並見任漢文武官弁捐輸銀千兩或米二千石者加一級銀五百兩或米千石紀錄二次銀二百五十兩或米五百石紀錄一次進士舉貢生捐銀及額出仕時照見任官例議敘生員捐銀二百兩或米四百石準入監讀書俊秀捐銀三百兩或米六百石亦準送監讀書富民捐銀三百兩或米六百石準給九品頂帶捐銀四百兩或米八百石準給八品頂帶八年題準停止督撫捐助議敘之例三十四年諭自天津兩次運送盛京米糧所到日期甚速大有裨益兩次運米官捐輸官均著議敘欽此遵㫖議準郎中同知通判州同及八品筆帖式等官各加一級其捐輸脚價官一次者紀錄一次二次者紀錄二次捐輸脚價商人該撫酌量奬賞六十年覆準山陜被災地方紳衿富户並内外見任官願捐米者計官職之大小捐米之多寡具呈該地方官照數收捐出給實收隨收隨報督撫題明轉咨吏部遇有闕即升富户題明破格旌奬又覆準令各省督撫遇有轉徙饑民來至境内地方官並富民人等有情願捐貲養贍全活多人者督撫覈實題薦從優議敘雍正十一年諭聞上年秋月江南沿海地方海潮泛溢蘇松常三府近水之人遭值水患其本地紳衿士庶中有雇覓舟楫救濟者有捐輸銀米煮振者今年夏間人有時症紳衿人等又復捐輸方藥資助米糧似此拯災扶困之心不愧古人任䘏之誼風俗淳厚甚屬可嘉著該督撫宣㫖褒奬仍遵前諭將捐助多者具題議敘少者給與匾額登記册籍免其差徭並造册報部欽此乾隆二年覆準被災貧民該地方富户如有出資安插不致流離失所者該督撫察明富户用過銀米實數作何優賞之處即於題銷振濟銀米疏内分别議奏以示奬勵十三年諭朕覽山東通志内恭載皇祖諭㫖東省小民皆依有身家者為之耕種豐年所得者少凶年則已身並無田産有力者流於四方無力者即轉於溝壑此等情狀東省大吏庶僚及有身家者若能輕減田租以各贍養其佃户不但深有益於窮民即汝等田地日後亦不致荒蕪訓諭諄諄誠切中東省民生利弊也今朕省方問俗親見民情風土歳偶不登閭閻即無所恃南走江淮北出口外揆厥所由實緣有身家者不能贍養佃户以致資身無策動輒流移夫睦婣任䘏自古為重利豈專在窮乏富户均受益焉轉徙既多則佃種之人少鞠為茂草富者不能獨耕也若有無相資使農民不肯輕棄其鄉即水旱無虞大困貧固資富之食富亦資貧之力不計其食而但資其力窮民復何所圖繼自今該撫董率郡縣有司實力稽察勸諭務使曉然於貧富相維之道俾閭里通周急之情斯黎民享安土之樂朕於東省有厚望焉欽此十六年諭浙省温處等郡米貴降㫖加意撫綏已據該督撫前後奏準撥運鄰省倉穀陸續平糶並招徠商販特免商税俾米穀流通民食充裕但思窮黎待哺孔殷外來商販雖已雲集而山鄉僻壤市販未必盡敷本地有穀之家或能以任䘏為心出其所餘照官價一例平糶更足以助官糶之所不及雖零星積聚豈能如官倉足給衆人之求然隨鄉分糶於民食亦殊有濟在富民推其贏羡嘉惠桑梓孰無此心惟是刁悍乘機或短予價直或冐領告貸甚或倡衆搶奪種種不法遂致富民聞風相戒以為善不可為兹特諭各該督撫凡遇地方水旱米價騰貴即應明切曉諭以天時水旱不齊偶值偏災無不飛章入告立即隨時籌畫百姓惟當安分奉法靜候施恩若藉端生事轉罹罪愆有負國家之德惠其能敦任䘏而出糧平糶者地方官為之主持實力稽察遇強橫滋事之徒速即嚴行懲處務令姦匪歛跡富民無所顧慮則窮黎受惠多矣所有平糶富民計其所糶之數照樂善好施例優加議敘以示奬勵欽此一嚴奏報之期順治十七年覆準直省災傷先以情形入奏夏災限六月終旬秋災限七月終旬州縣官遲報逾限一月以内者罰俸六月逾限一月以外者降一級調用二月以外者降二級調用三月以外者革職撫司道府官以州縣報到日為始如有逾限者照此例處分仍限一月内續將報災分數勘明造册題報各官如有違限者亦照前定例議處以此永著為例康熙四年題準州縣以被災情形申報布政使司如布政使違限亦照道府州縣官例處分六年題準各旗報災不得過七月二十日七年題準各旗災地逺近不一難以徧驗準寛至八月初十日逾期不準十五年議準被災地方撫司道府州縣官遲報情形及遲報分數逾限半月以内者罰俸六月一月以内者罰俸一年一月以外者仍照從前定例議處又議準勘災不委㕔官印官仍委教官雜職察勘或妄報饑荒或地方有異災不申報者原委官罰俸一年若止報廵撫不報總督及報災時未繳印結册内不分晰明白者罰俸六月督撫照例處分雍正六年議準一月内造報被災分數為時太廹嗣後造報分數勘災之官寛以十日察覆上司寛以五日總以四十五日為限其勘災監振官所有欽部事件準照入闈之例扣限至徵收錢糧年限等案定限一年為日甚多仍循舊例乾隆二年題準地方倘遇水旱災傷督撫一面題報情形一面遴委大員親至被災地方董率屬官酌量被災情形視其饑民多寡先發倉廪及時振濟仍於四十五日限内題明加振竢振務告竣之日將振過户口需用米糧造册題銷其被災頃畝分數即於勘災之日覈實保結隨疏聲明至應免錢糧數目於具題請振日起再扣限兩月造報六年諭德惟善政政在養民以天下之大天時固有不齊地形亦復不一雨澤稍愆則高阜之地防旱雨水既足則低窪之地慮淹總期先事豫籌始可有備無患言念及此雖當豐稔之年而朕宵旰憂勤實不敢暫釋於懷也向來各省報災原有定期若先期題報便不合例朕思按期題報者乃指具本而言至於水旱情形為督撫者察其端倪早為區畫隨時宻奏則朕可倍加修省而人事亦得以有備若過拘成例則未免後時矣至於督撫之報災有故為掩餙不肯奏出實情者亦有好行其徳希冀取悦於地方者惟公正之大臣既不肯匿災以病民亦不肯違道以干譽外此則不能無過不及之失朕痌瘝在抱再四思維匿災者使百姓受流離之苦其害甚大違道干譽雖非正理以二者較之究竟此善於彼寧國家多費帑金斷不可令閭閻一夫失所此朕之本念也各省督撫皆當仰體隨時留心以副朕惠鮮懷保之意欽此七年議準甘肅地處極邊節候甚遲河西一帶尤覺山高氣冷收成更晩且風氣與内地不同受災之田不止水旱兼有冰雹風沙蟲蚒霜雪之患於定例之外稍加變通河東之鞏昌蘭州二府河西之寧夏西寧甘州涼州四府直隸肅州並口外安西靖逆二㕔倘夏秋二禾於六九兩月内被災仍照定限申報其有六九兩月田禾在地本屬青蔥而此後忽被災傷者準其各展限半月夏災不出七月半秋災不出十月半即為勘明申報仍將被災日期於題疏内詳悉聲明以便察覈一辨災傷之等順治十年諭京城内外該部確勘被災户口據實登報直省督撫凡有災傷地方勘明分數奏請振䘏欽此又題準報災之法著令督撫速覈分數馳奏又題準江南浙江各屬旱災被災八分九分十分者免十分之三五六七分者免十分之二四分者免十分之一有漕糧州縣衞所準令改折十六年覆準報災地方督撫遴選賢能道府㕔官履畝踏勘不得徒委州縣十八年覆準八旗旱澇地畝遣各部侍郎以下該旗副都統以上官率户部司官筆帖式至被災地方該佐領領催指明勘驗若造册舛漏責在部院筆帖式冒指地畝責在佐領領催其災傷輕重地勢高下不詳加踏勘責在差往大僚事發照例察議康熙四年定八旗遇災地畝停遣副都統等勘驗止令驍騎校領催等詳勘保結送部具題十六年覆準陜西疊遭荒亂十五年正賦涇州等處免九分崇信等處並鹽茶㕔免八分莊浪縣免七分寧逺等縣免六分通惠縣免五分伏羌等縣免四分所屬學租銀亦照分數蠲免雍正六年諭蠲免之例著加增分數以惠蒸黎其被災十分者著免七分九分者著免六分八分者著免四分七分者著免二分六分者著免一分將此通行各省知之欽此又諭君民上下之間休戚相同夲屬一體論語曰百姓足君孰與不足是民間之生計即國計也自古人君有不䘏民之災濟民之困者無此情理而至於歉歳蠲免之數往往多寡不同者則時勢盈絀為之出於不得已也如明洪武時凡水旱地方税銀即與蠲免成化時被災之地以十分為率減免三分𢎞治時全荒者免七分九分者免六分以是遞減至被荒四分免一分而止我朝順治初年凡被荒之地或全免或免半或免十分之三以被災之輕重定蠲數之多寡順治十年議定被災八九十分者免十分之三五六七分者免十分之二四分者免十分之一康熙十七年議定歉收地方除五分以下不成災外六分者免十分之一七分八分者免十分之二九分十分者免十分之三此例見在遵行凡此多寡不同之數或旋減而旋增皆因其時勢為之亦非先後互異意為損益也嘗見地方有司每不願蠲免太多者蓋恐蠲免並減其耗羡不利於已耳此貪吏之見也朕嘗謂若於蠲免之時有所吝惜而平日不能禁官吏之侵漁是將災黎之脂膏飽姦貪之慾壑矣數十年來雖定三分之例然聖祖仁皇帝深仁厚澤愛養斯民或因偶有水旱而全蠲本地之租亦且並無荒歉而輪免天下之賦浩蕩之恩不可勝舉而特未曾更改舊例者蓋恐國家經費或有不敷故仍存成法而加恩於常格之外耳朕即位以來清理虧空剔除弊端數年之中庫帑漸見充裕用沛特恩將蠲免之例加增分數以惠蒸黎其被災十分者著免七分九分者著免六分八分者著免四分七分者著免二分六分者著免一分將此通行各省知之欽此九年題準八旗災地各該佐領具結報都統差旗弁察勘赴部呈告部委司官驗實具題乾隆元年諭各省地方偶有水旱蠲免錢糧舊例被災十分者免錢糧十分之三八分七分者免十分之二六分者免十分之一雍正年間我皇考特降諭㫖凡被災十分者免錢糧十分之七九分者免十分之六八分者免十分之四七分者免十分之二六分者免十分之一實愛養黎元軫䘏民隱之至意也朕思田禾被災五分則收成僅得其半輸將國賦未免艱難所當推廣皇仁使被災較輕之地畝亦得均霑恩澤嗣後著將被災五分之處亦準報災地方官察勘明確蠲免錢糧十分之一永著為例欽此三年題準民間起火之家撲救不力之地方官照例處分其延燒之户該督撫確勘實在被火情形分别酌給應振銀數動用存公銀報部察覈五年議準夏月被災如秋禾種植將來可望收成者統竢秋穫之時確勘分數别行辦理其間或有得雨稍遲播種較晩必須接濟者令該督撫酌量或借耔種或貸口糧秋後免息還倉又議準冰雹為災舊例有貸無振續經定例一例振䘏且損傷禾稼多在夏月令地方官察勘情形統照夏災定例辦理六年覆準甘肅邊徼氣寒土地磽薄民間種植就其土宜分種夏麥秋禾而一地之内既種夏禾則不能復種秋禾播種秋禾則不能先種夏禾若夏禾既經被災則已終歳失望如必竢秋穫之時始行察勘統辦災户不能久待嗣後甘肅夏禾倘遇災傷督撫勘明可否復種秋禾應否量加振䘏題明辦理七年議準一方被災若秋禾已種齊全可望收穫者統歸秋成辦理若種植止有一季其夏災即準照秋災辦理又議準各省種植兩季之地若夏災被水横流衝決不能復種秋禾亦即與秋災無異仍準其照例加振又議準各處或遇風災該督撫等確實勘驗如一時民食艱難即於常平倉穀内酌借耔種口糧秋成還倉免其加息倘或損傷大田必需振濟者即具題請㫖遵行一興土功使民就傭康熙三十一年諭運送潼關米十五萬石為數甚多又鄖陽山路﨑嶇難於輸輓著停止鄖陽運米將襄陽等處米穀運送十萬石其運送事宜遣部院堂上官一人前往管理所運米皆見給脚價如陜西流民在襄陽等處地方有情願運米者著即給價令其運送既可以濟轉輸亦可俾流民還籍欽此五十三年覆準令陜甘各州縣修城俾窮民得以傭工度日雍正四年諭朕軫念東省被水窮民粒食維艱特允山東廵撫之請於大清河興疏濬之工令乏食小民得力役之資為餬口之計今天氣和暖土脈鬆潤正施畚插之時去秋該撫奏請設厰振濟今赴工者衆粥厰可以停止但念此就食小民其中豈無老弱殘疾不能赴工者煮振既停麥秋之期尚逺此輩窮無所歸之人或仍致失所朕心深為憫然著山東廵撫將不能赴工之窮民察明若干每日仍給與升合之資候至秋收後停止所用銀均作正項開銷該撫嚴飭各州縣官務實心奉行以副朕養育百姓之至意欽此乾隆二年諭今年春夏之交直隸山東兩省雨澤愆期二麥歉收朕已多方籌畫接濟民食且令直隸總督有應興工作以次舉行俾小民得藉營繕以餬其口今思山東百姓多仗二麥度日今歳麥秋收穫既薄雖屢降諭㫖蠲振平糶仍恐閭閻尚有艱食之虞著該撫悉心計議如開渠築隄修葺城垣等事酌量舉行使貧民傭工就食兼贍家口庶可免於流離失所也再年歳豐歉難以懸定而工程之應修理者必先有成局然後可以隨時興舉一省之中工程之大者莫如城郭而地方何處為最要要地又以何處為最先應令各省督撫一一確察分别緩急豫為估計造册報部將來如水旱不齊之時欲以工代振即可按籍而稽速為辦理不致遲滯於民生殊有裨益欽此十三年諭山東興修沂河兩岸隄工該部議照以工代振之例土方工價準給一半乃繫向來成例自應照此給發惟是東省被災甚重其民情之艱窘實非他處可比若拘常例給發恐赴工之民仍不足以餬口著加恩將此項土方工價按數全給俾其食用有資欽此一反流亡使民生聚康熙四十三年諭朕因山東流民流入京城者甚多特命大臣官員設飯厰數十處分行煮振近見直隸河間等府百姓來赴振厰者甚衆雖目前逐日散給究非長策若不早令回籍必致坐誤農時廢棄本業今山東省饑民已遣官分送回籍直隸總督可將所屬各官内作速選擇賢能者前來京師將流移人民悉行收領俾各回原籍仍捐給耔粒令得耕種田畝無失生計如此則饑民庶不致仳離流散矣欽此雍正元年諭直隸山東河南流民有就食京師不能回籍者著五城御史察詢口數量給盤費送回本籍毋致失所欽此遵㫖議準每口每程給銀六分其間有老病不能行走者每口每程加給三分以為脚力之費委官䕶送一面行文直隸山東河南廵撫飭令地方官逐程出具收給轉送至原籍若有中塗患病者令地方官留養醫治竢病痊之日再行轉送毋致失所九年議準直隸山東河南窮民因秋成無望渡河而南以圖就食令沿河州縣於各渡口詳加察詢所過地方有力不能自達者量給路費仍知照各州縣安插如有親朋可依得以傭工易食者聽其自便其乞食者用截漕米糧照例計口振給其聞家鄉得雨欲囘本籍者即資給遣回不願即歸者於來春耕種之候仍皆給以資糧令其回籍凡資給之費照例動用存留公項造册送部如有浮冒扣剋等弊指名題叅乾隆四年諭今歳河南被災頗重江南亦有歉收之州縣聞豫省及上江民人貧苦乞食轉徙道路有前往九江口而官吏禁止不許渡渉者此雖得之傳聞未必不確著河南安徽廵撫悉心體察安輯撫綏毋致流移失所倘已離本鄉行至他省彼地督撫即應飭令有司設法救濟免於凍餒於春暖時資送回籍毋得膜視或他處有似此出境覓食人民亦照此辦理欽此七年諭今年上下兩江水災甚重朕宵旰憂勞百端籌畫以拯吾民之困阨但思此等窮民在本地引領待振者固多而挈家四出覓食於鄰省鄰郡者亦復不少著江南及河南山東江西湖廣等省督撫各嚴飭地方有司凡遇江南災民所到之地即隨地安頓留養或借寺廟或蓋篷厰使有棲止之所動用該處常平倉穀計口受糧據實報銷並訓諭約束不得藉端生事至於災民聚集衆多之處則更委道府大員專行督察及冬月水消春初耕種之時有願歸本鄉者即資送回籍知照本籍照例安插並給以麥種俾得及時趕種其不願回籍者亦不必强悉遵前諭行欽此十一年議準奉天流寓乏食窮民照資送流民回籍之例辦理將支給花名動用銀數報部察覈十三年諭向來外省有資送流民之例蓋因地方小有旱澇而愚民輕去其鄉以致抛棄室廬荒蕪地畝是以國家施恩格外酌道路之逺近計人口之大小差委官役䕶送還家使復故業用意良厚然至饑饉洊臻本處米糧實已乏絶而鄰封尚可覓食不得不扶攜奔赴茍延性命此等嗷嗷待哺之氓若必驅還故里豈能坐以待斃勢又將顧而之他南北東西輾轉資送在鄰省既不勝其煩勞而於災民轉益流離失所廷臣中嘗有以此入告者朕思災輕之地不可令其抛棄失業自當照例資送倘遇積歉之年本處無以餬口轉徙他鄉或倚托親舊以濟其乏或傭工種佃以食其力且其中極無倚賴者國家復有留養之例是惟在地方官憫其流移之苦無分畛域隨宜安插竢災氛平復土地可耕然後使回故里勞徠安集加意撫綏亦未始非權宜之道惟在權其輕重相其緩急斟酌辦理未可執一而論山東去年被災甚重朕屢次加恩振䘏發帑截漕費已不貲而尚免流移若近省督撫仍復拘例飭令資送實於災民無益應令地方有司就所至之境酌量妥協辦理如有親舊可依者聽其自為謀食其或無所倚靠即為撫留設法安插不必拘定成例嗣後凡有災重之區饑氓外出為督撫者皆當體朕痌瘝一體之意善為安輯俾令得所依歸可即行文各督撫等知之欽此十八年諭御史奏請勅諭江南鄰省督撫照舊例留養流民春融資送回籍等語留養流民之法前曽行之有名無實轉滋多事且於災民實無裨益導之使輕去其鄉耳近日廵撫已經具奏故未準行蓋與其留養於異方何如厚加振䘏使不流移轉徙之為愈今年淮徐等處被水朕疊次降㫖多方籌濟截漕撥餉不惜數百萬帑金加恩撫䘏以留養資送之費計之何啻百分之一二豈有愛焉若以留養資送所需增為本地振濟豈不更霑實惠乎夫以災地專委多員挨戸察振尚恐不能一無遺溢鄰省州縣各有應辦事務又何從辨其災黎徒滋姦民在本地則乗機溷冒及資送則聚衆强搶去而復返日不暇給而實在被災流民或依傍親屬或傭工餬口又必逐一稽留安插於伊等生計益致拘礙故停止此例欽此欽定大清會典則例卷五十五
