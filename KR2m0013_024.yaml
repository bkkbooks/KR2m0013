front:
  text: 欽定四庫全書欽定大清會典則例卷二十一
  hash: sha256:9b0f44ed68ce68522967a0ba31efa853cdc9978645c22681354f63f8ccdcdc34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_024-1a, image: WYG0620/WYG0620-0416c.png}
body:
  text: 吏部考功清吏司本章一本章違誤康熙六年題準本章被墨汚者將墨汚本章之員罰俸一月又議準本章內錯寫官銜或從旁添字或錯字者將不加詳對之主事罰俸一月錯寫之筆帖式罰俸兩月堂官免議九年議準官員將題本遺漏印信者罰俸一月又議準批寫票籖如將工部知道錯批兵部知道等類者大學士罰俸一月學士罰俸兩月又題準督撫將奉旨駮察案件含糊具題者降一級留任又題準督撫將會議事件並未會同議定畫題遽稱合辭題覆者罰俸六月十年題準督撫本內有緊要字貼黃內遺漏或貼黃內所有之字本內遺漏者罰俸三月十五年議準凡官員將慶賀表文計册舛錯或遺漏不奏或遺漏字樣及藉端推諉或遲延及不差的當人塗中耽誤以致水火盜失者皆罰俸一年如用印歪斜糢糊顚倒失用及繕寫潦草不列職名或破裂染汚者皆罰俸六月督撫亦照此例處分五十四年議準凡定議事件間有兩議者每議各有滿漢堂官署名具奏免議如滿堂官與滿堂官一處漢堂官與漢堂官一處各自署名具奏其奉旨準行者免其議處不準行者罰俸六月又議準凡奉旨交九卿會議具奏者九卿意見相同照例畫題倘别有所見者各書其意另寫一欵一并啓奏雍正二年諭嗣後本內援引新例之處不可用新例字樣繫何年所定之例只將年分寫入傳諭內閣交各部衙門通行各省欽此三年議準地方民務大小公事皆用題本本身私事皆用奏本如有應用題本而用奏本應用奏本而用題本者罰俸三月六年遵旨議定凡議革議降官員除在京各官不必夾籖外官先經别案革職休致者亦毋庸夾籖外其見在議處之外官自知縣以上遇有降調革職案件及外任補授之京官因伊原任內案件議處降調革職者察明該員從前何官升補及奉有褒嘉諭旨或經督撫保題並曽奉特旨寬免者均於本內夾籖進呈十二年覆準凡各部院題奏內會稿事件有應行之處皆責令主稿衙門通行知會不得推諉遲延以専責成如有推諉遲延及遺漏之處將主稿衙門照例分别議處乾隆四年奏準屬官呈請上司代題代奏事件如將實在情節不行逐細聲明含糊呈請將呈請之員降一級留任五年議準凡交代遲延承審遲延與承緝承追不力事件該督撫皆不必具題止照例限咨明各部其處分入彙題完結又議準錢糧盜案限滿之日該督撫停其具題止咨各部核明聼該部照例處分具題又奏準凡見任州同縣丞以下微員遇有革職解任事故年老有疾休致並患病調理丁憂終養等項經各督撫恭送到日皆照例行文辦理一面開闕銓選一面照例彙題遇有降罰處分亦照例彙題降罰革職解任均繫一月彙題老病休致患病調理丁憂終養均繫半月彙題其候補州同縣丞以下微末職銜督撫咨恭到日照例據咨斥革均附入一月彙題七年議準凡題奏內校對册籍事件如司官未經詳察致有遺漏舛錯者將司官照例議處未經察出之堂官免議十三年諭向來各處本章有題本奏本之别地方公事則用題本一己之事則用奏本題本用印奏本不用印其式沿自前明蓋因其時綱紀廢弛內閣通政司藉公私之名以便上下其手究之同一入告何必分别名色著將向用奏本之處槩用題本以示行簡之意將此載入會典該部通行傳諭知之欽此十九年諭户部議覆陜西巡撫奏請估變西寧縣庫收貯段匹一摺此案先經該撫咨請部示戶部以不便據咨遽議駮令具奏到日冉行辦理一切政務惟論其事之可行與否若事在可行督撫業已咨部該部復行令具奏及奏到之時原不過照議覆準徒多往返案牘之繁甚屬無謂况部臣奏準與督撫自行陳奏又有何别耶嗣後督撫咨商各部事件著該部將應駮者即行咨駮應準者亦即定議奏聞毋得沿襲陋習仍以具文從事將此傳諭各該部知之欽此一漏泄本章康熙十七年議準凡奉旨事件未到部之先即行鈔傳報知者將傳報之人交部治罪該科給事中罰俸六月雍正五年遵旨議定凡陳奏本章除尋常通行事件照舊承辦外凡關涉緊要之事督撫提鎮陳奏本章將副本揭帖用密封字樣投遞通政使司收到密封副本堂官親拆别載册籍封固收貯各部院收到密封揭帖堂官親拆交司官密行收貯謹愼辦理其督撫提鎮有緊要事件及緝拏人犯之案移咨各部院亦密封投遞各部院堂官親拆交司官承辦在京各部院有緊要事件文移咨呈亦必密封投遞其知照各省督撫提鎮文書亦必密封遞發該督撫提鎮親拆收貯各省督撫提鎮以至州縣往來公文亦將緊要事件密封投遞各本官親拆收貯如將應密之事並不密封以致漏泄者將封發官察恭如收受承辦官不行謹慎以致漏泄者將收受之承辦官察恭事理重者降一級留任輕者罰俸九月科道官察出不糾恭罰俸六月又議準凡提塘與衙役人等漏泄密封事件仍照定例分别議處外其雖非密封但未經御覽批發之本章即鈔寫刋刻圖利者該管官失於覺察該管科道不行察恭皆照漏泄密封事件例分别議處其紅本科鈔遍傳天下應令承辦官詳悉校對敬謹奉行如有增減錯漏者將承辦校對之員照錯誤本章例議處一遺失本章康熙六年題準遺失科鈔者罰俸兩月十七年議準遺失紅本者降一級留任二十五年議準官員將誥敕質當者革職或蟲蛀損傷或潮濕破壞染汚及差人道路差錯者皆罰俸六月如被水火盜賊燬失者免議仍準題請重給雍正二年山西巡撫疏稱河東運判護理運司將欽頒運司上諭並未察收交代題恭奉旨著免議此不過朕之訓飭諭旨無甚關礙嗣後朕之訓旨或致遺失水濕染汚毁壞該督撫提鎮行文內閣奏明給與不必題恭該部知道欽此乾隆四年遵旨議定凡已進呈之本章應行發出者如批本處未發內閣即行恭奏內閣未發部院即行恭奏該部院未經行文督撫即行恭奏不必轉相詢問若將進呈後之本章批本處及內閣遺漏未曾交出别經發覺始行察發將經手遺漏之員比照將表文遺漏遲延例罰俸一年同日該班不行檢察之員照不行詳察例罰俸六月奏事處亦照此例若已經交出到部而遺漏不行知照該處各咨行事件已經議結不行文該處者將遺漏行文之員照議處經手遺漏各員例察議至於已經移咨該處而他處或有遺漏未經知照者照遺漏行咨例罰俸兩月又議準凡有降罰承追等案一經奉旨考功司即行文知照文選司其補官日帶於新任降罰者應於該員補官日文選司行文知照如有遺漏不行知照者將司官照遺漏行咨例罰俸兩月書吏治罪印信一誤用印信康熙九年議準官員應用堂印事件誤用司印應用司印誤用堂印及署事官兼轄官錯用印信皆罰俸三月倒用印信亦照此例處分雍正三年議準地方民務大小公事皆用題本用印具題本身私事皆用奏本雖有印信之官亦不準用印若違定例題奏通政使司衙門察恭交部照誤用印信例罰俸三月一漏用印信乾隆四年議準地方各官往來文移以及呈報上司事件均於正面鈐印如有刮補字樣以及增注錯落接扣之處均鈐蓋印信倘有遺漏鈐蓋者照各衙門行移文書漏使印信律罰俸一年一印信糢糊康熙九年題準印信糢糊或不請換或本章咨文用印糢糊由部察出者將不請換印之官罰俸六月如督撫將更換情由不行咨題者亦照此例處分詳請更換之官免議如印信損壞已換給新印不將舊印繳送者亦照此例處分雍正八年議準鑄印局鑄送印信關防筆畫錯誤將不行磨對之鑄印局各官罰俸六月不行驗明之堂官罰俸三月其領印之員於領受之時不將錯誤之處驗看聲明日後被人察出者將領印之員亦罰俸六月一妄用印結牌文康熙十五年議準官員豫給用印白結者罰俸一年又題準職官擅寫牌文給與族人者革職又議準濫給家僕門子印結捐納官職及濫給因罪革退衙門人役印結復入衙門者皆革職雍正四年議準地方各官妄用印信及非正印官而擅用印信者皆降一級調用十二年議準各省藩臬鹽道知府設有經歷凡文移往來令其公同用印其經歷印信悉歸經歷自掌如擅將經歷印信收掌自用致生那移情弊該督撫題參將擅收經歷印信自用之員照妄用印信例降一級調用又議準五城一應曉諭禁約等事應於各該地方通衢張貼印示外其一切官民鋪户門首應令五城御史嚴飭各該司坊官不得濫給印示倘有不肖之人仍前濫給者該御史一經見聞立即題恭將該員照妄用印信例議處若繫吏役人等受賄求託本官給發者除該員照例議處外並將吏役交刑部治罪若該城御史見聞既實並不恭奏者或别經察出或被科道糾恭即將該城御史照不行詳察例議處冉順天府經歷照磨及大宛兩縣間有出給印示者應一例嚴禁倘有徇情濫給者亦照司坊官之例議處其不行恭察之各該上司照巡城御史之例議處一空白印信乾隆二年覆準各部院衙門行移事件司官回明堂官用印將所行事件並用印數目登記號簿其在外各衙門下行牌票並上行平行文移均令鈐印編號一應空白悉令嚴行禁止倘有仍用空白事發將不行稽察之在內堂官在外督撫司道照不行詳察例罰俸六月不行回明用印之司官及仍用空白之府州縣等官皆照豫給用印白結例罰俸一年如有督撫司道向州縣提取空白文結者亦照此例罰俸一年五年覆準內外大小凡有印信衙門均於封印前一日酌量件數各用空白印紙並文移封套以備封印後遇有緊要公文之用仍各登記號簿在京衙門呈堂收貯外省衙門同印信在內衙存貯有緊要文書方行填用開印後除用去者登記册籍外將所存件數各堂官及各印官驗明銷燬如有官吏藉端作弊及該堂官該督撫及各上司不行察出者皆照禁止空白印信例分别議處書辦照例治罪一濫行出結康熙二十九年題準地方官代頂冒人員出結者革職雍正十二年覆準候選簡選人員例用同鄉京官印結凡出結各官務令本衙門設立號簿將出過印結緣由登記簿內每至月終按照數目緣由彙造清册呈堂咨部察核如册內無名即傳赴選人員究問倘有豫用空白印結者令該堂官照豫給空白例恭處一給結冒領建坊銀乾隆四年議準凡請領節婦建坊銀如繫再醮之人應行議處出結官者令各該處即將知情濫結與並不知情之處於咨疏內據實聲明如知繫冉醮不應請領之人濫行出結請領者將出結之人照徇情給結例降二級調用如實繫不知再醮緣由冒昧給結後經自行檢舉者照不行察明給結例罰俸一年不行詳察之該管官照不行詳察遽為轉報例罰俸六月一隔屬用印買人康熙八年題準旗人買民人者用本管地方官印信若在隔屬官用印給與之官照拏解良民例降一級留任如有將定例以後所買之人説作定例以前年月日用印給與者將地方官并買賣之人皆加等治罪一那移年月用印康熙八年議準凡將定例後事件作為定例以前年月日期用印給與者將用印之官降一級調用一禁止無印小票乾隆六年覆準各省文武大小衙門凡一切差票均令鈐蓋印信如無印信衙門即用鈐記所有硃標小票衙單永行禁止倘有仍用無印小票衙單者令該上司不時察報題恭將出無印小票之員照文移遺漏鈐蓋印信例罰俸一年欽定大清會典則例卷二十一
