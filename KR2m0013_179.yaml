body:
  text: 八旗都統訓練一大閲天聰七年定大兵合操分八旗護軍為左右翼漢軍馬步軍為一營滿洲步軍為一營四面環列前設紅衣炮三十及各種大小炮既成列營中三發炮護軍聲喊而進鬭角而退次漢軍馬步軍次滿洲步軍次炮手發炮進退之節均與護軍同順治十三年議準大閲之禮酌古準今三年一舉永為定制十六年諭大閲典禮三年一行已永著為例連年尚未修舉今不得再緩著即傳諭各旗官兵整肅軍容候七月朕親行閲視該部即詳考應行事宜擇吉具奏欽此康熙二十四年諭國家武備不可一日懈弛舊例每嵗必操練將士習試火炮傳諭八旗都統等豫為整備朕將親閲焉欽此三十年奏準本年春季開操每佐領前鋒各一名護軍各六名鳥槍護軍各一名驍騎各四名漢軍驍騎各二名每旗炮十位每炮兵十名火器營兵千五百名前隊前鋒四百名前鋒參領六人侍衛四人每佐領護軍各三名每旗護軍參領三人每佐領鳥槍護軍各一名鳥槍護軍參領各二人每佐領驍騎各二名每參領散秩官二人驍騎校二人漢軍每旗炮十位每炮官一員兵十名鳥槍兵千五百名官校每旗各五人二隊每佐領護軍二名每旗護軍參領三人每佐領驍騎一名漢軍驍騎二名每參領散秩官二人驍騎校二人協隊前鋒二百名前鋒參領各二人侍衛三人每佐領護軍一名每旗護軍參領二人每佐領驍騎一名每參領散秩官一人驍騎校一人護軍纛每旗三杆驍騎纛每參領二杆都統前鋒統領護軍統領副都統參領等均令帶海螺既成列令鳥槍護軍火器營兵各放鳥槍一次再鳴螺進兵至所指處鳴螺收兵回兵時每翼護軍統領一人副都統一人每旗驍騎參領一人每旗護軍五十名護軍參領一人護軍校每參領二人驍騎四十名驍騎營官每參領一人驍騎校一人領催二名令殿後回兵雍正六年兵部援三年舉行之例具奏奉㫖著準備大閲又議準大閲之禮最為緊要八旗參佐領閒散世爵護軍校驍騎校及領催護軍驍騎應令都統副都統選賢能簡精鋭整飭槍炮旗纛金鼓畫角海螺鹿角之屬開列王公大臣銜名請㫖簡命數人管領行陳豫期操演列營布陳進止步武應繪圖式恭呈欽定以垂定制乾隆三年議奏大閲之禮照順治十三年定例三年一次具奏請㫖辦理事宜照雍正六年規制舉行奉㫖朕於眀年大閲嗣後遇朕親閲之年該部豫期具奏先命王大臣操演仍三年一次請㫖一合操順治七年諭我朝原以武功開國頻年征討不臣所至克捷皆恃騎射今荷天庥天下一統勿以太平而忘武備尚其益習弓馬務造精良欽此八年題準八旗演武教場各隨旗分建設十三年奏準冬季農隙之時令官兵披執操演以習武事十八年題準改設鑲黃旗教場於安定門外正黃旗於德勝門外正白旗於東直門外鑲白旗於朝陽門外正紅鑲紅兩旗均於阜成門外正藍旗於崇文門外鑲藍旗於宣武門外各設演武㕔該都統等以時督率訓練康熙三十年奉㫖八旗兵丁令每月操演如不每月操演則不能熟練各該管大臣將各該旗官兵操演如遇大雨令其停止又議奏向例春秋二季操演八旗官兵今請於二季令八旗合操四次此次在草橋操演大閲令在南苑操演具奏奉㫖此次操演在兵丁既有照常甲胄射箭之役其春秋二季四次操演止令春秋一次擐甲每月操演著在各旗教場如尋常止操演排列進退不必屬櫜鞬止令帶弓骲箭於會操處簡選佳者令其騎射奬勵平常者申飭即如爾等去年合操收兵時止顧向左而右翼遂曠豈非兵丁不熟練之故乎再草橋操演不免踐踏簡親王牧場草橋與南苑逺近相似又不妨踐踏即馬匹逸失亦易尋覓嗣後著在新衙門西北隅曠地操演八旗合操時上三旗著在內尚茶備茶頒賜各旗令該王公備茶頒給雍正十年諭自古兵可百年不用不可一日不備是以帝王之治天下未有不以武備為先務者而兵丁之演習武藝亦未有不勤加訓練而能有成者從來士農工商各習一業茍不專心竭力則其業必不精况兵丁所司者皆戰鬭之事彎弓挾矢冒鏑衝鋒非膂力剛強不能披堅執鋭非技藝嫻熟不能克敵宣威奈何怠惰茍安虛度嵗月不思國家設兵之本意不念己身專司之職業乎國家承平日久人人耽於安逸武備漸覺廢弛今當邉陲用兵之際是以降㫖令勤操演又念操演之兵若仍令其直班則其力難兼顧而功夫亦有間斷是以不令直班俾得專心訓練又復給以飯銀資其日用無非體恤爾等之勤勞也爾等各宜勉力學習如騎射長槍之類必令純熟精強以成國家之徑旅以柔弱怯懦為耻以安逸華麗為戒人之力量用則日增不用日减如出城操練之際正可演習步行又何必騎馬乘車徒多靡費若此等者一經察出必從重治罪欽此又諭八旗兵丁訓練甚為緊要若仍令直班則操演未有專功技藝難以純熟是以特加簡選令其每日操演分作兩班輪流當差然人果有上進之志何時不可黽勉何地不可學習即如爾等換班之時原可練習技藝雖直班之地不便演放槍炮而開弓角抵舞棍趨走等技藝在領班之大臣官員未嘗不可訓練爾等勿以未經入選操演自甘懦弱不勤加練習也欽此又諭八旗訓練之兵朕從前特降諭㫖鼓勵訓誨大臣官員等理宜將此諭㫖不時宣讀令兵丁記憶乃兵丁至今尚有未聞朕之諭㫖者著交與訓練兵丁之大臣及八旗都統等將朕所降諭㫖多行謄録於各旗操演及會操之處宣讀令兵丁聼聞其守衛及直班之處亦著張掛兵丁無事閒坐時著該管官教其熟讀記誦兵丁熟習之後自互相砥礪各加奮勉而每日熟讀亦可學習國語如兵丁於半年後尚有不能記憶朕之諭㫖者將該管大小官員定行治罪欽此乾隆四年奏準八旗各營官兵合操按向例共用八千七百餘人若於四分之內减去三分在兩黃旗教場可以操演嗣後於每年春季將本旗各營官兵合於一處各於本旗教場操演二次八旗各營官兵於鑲黃正黃二旗教場合操一次至秋季仰善窪操演之時奏眀日期將八旗各營官兵會於一處合操二次其隊伍號令官兵數目均如大閲之制詳見兵部七年諭聞八旗合操時該都統等皆在帳幕對坐閲看若不親入隊伍其進退之節何能熟練嗣後合操時令該都統等輪流親入隊伍操演欽此十七年奏準八旗漢軍管領藤牌參領四人散秩官驍騎校各十有六人領催四十人藤牌兵八百名每年春秋二季四旗合操二次八旗合操一次若遇八旗會操大閲之年仍令守護炮位入隊操演又諭朕恭閲太宗文皇帝實録內載崇德元年十一月癸丑日上御翔鳯樓集諸親王郡王貝勒固山額貞都察院官命𢎞文院大臣讀大金世宗本紀上諭衆曰爾等審聼之世宗者䝉古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕批覽此書悉其梗槩殊覺心往神馳耳目倍加眀快不勝嘆賞朕思金太祖太宗法度詳眀可垂久逺至熙宗合喇及完顔亮之世盡廢之耽於酒色盤遊無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗豫為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功雖垂訓如此後世之君漸至懈廢忘其騎射至於哀宗社稷傾危國遂滅亡乃知凡為君者耽於酒色未有不亡者也先時儒臣巴克什逹海庫爾纒屢勸朕改滿洲衣冠效漢人服飾制度朕不從輒以為朕不納諫朕試設為比喻如我等於此聚集寬衣大袖左佩矢右挾弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寬衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有更變之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫻於騎射所以野戰則克攻城則取天下人稱我兵曰立則不動搖進則不回顧威名震懾莫與爭鋒此番往征燕兵出邉我之兵威竟為八大臣所纍矣故諭爾等其謹識朕言欽此朕每敬讀聖謨不勝欽凛感慕惟深國家開創之時我祖宗躬親勞瘁勤求治理矩矱相傳罔敢渝越以立萬世之丕基至於今咸受無疆之福者皆仰遵眀訓所致也我朝滿洲先正遺風自當永逺遵循守而勿替是以朕常躬率八旗臣僕行圍較獵時時以學習國語熟練騎射操演技勇諄切訓誨無非率由舊章期以傳之奕􅑤永綿福祚惟是我皇祖太宗聖訓所垂載在實録若非刋刻宣示則纍朝相傳之家法外廷臣僕何由共悉且自古顯謨令典多泐之金石曉諭臣工我皇祖太宗之睿聖時申誥誡昭示來兹益當敬勒貞珉永垂法守著於紫禁箭亭御園引見樓及侍衛教場八旗教場各立碑刋刻以昭朕紹述推廣至意俾我後世子孫臣庶咸知滿洲舊制敬謹遵循學習騎射嫻熟國語敦崇淳朴屏去浮華毋得稍有怠惰式克欽承彝訓兾億萬世子孫共享無疆之庥焉欽此十八年諭騎射國語乃滿洲之根本旗人之要務朕今嵗校閲京城世爵其射箭尚可觀及人材英俊者已施恩選取侍衛並分在各處令其學習行走其射箭甚劣不堪教化者察眀革職别行承襲至各省駐防亦皆有世爵若不教訓騎射國語伊等近於素餐安逸之習必致學為不善著各省將軍都統等將伊等不時教導務使騎射優嫻國語純熟如有教訓不化騎射甚劣者該將軍都統等即指名參奏革職别行承襲欽此一官兵較射順治年間定每月初二初六十二十六二十二二十六等六日較射春秋各甲胄步射二次騎射二次又定每年較射於七月十六日起至次年四月十六日止若逢閏七月即於閏七月十六日起恭遇萬夀聖節及封印日期皆暫停較射雍正五年覆準每月初四初八十三十八二十三二十八等六日定為八旗驍騎營較射之期是日停止會議令該都統等親往較閲八年奏準操演之日若遇有應奏之事每旗於副都統內輪班存留一人親詣教場較閲除出差直班實有事故外官員一二次不到申飭記過三次交部議處兵丁一二次不到鞭責示懲三次責革該都統等若不親詣教場或有徇庇官兵者察出一並議處乾隆六年議準每年春秋二季官兵擐甲胄步射二次該旗議定日期咨報兵部聼部稽察其春秋二季演習馬射由兵部定期通行官兵內有年逾六旬者免馬射十一年奏準官兵較射之日該都統等遇奏事及㑹議者均留副都統前往較閲不得委參領代往並令該旗將較射大臣職名先期送稽察該旗御史聼御史親往察看如不遵定例即行參奏十八年議準八旗官兵習射既有該都統等及御史公同監視兵部復委官不時稽察其嵗終造册送部之例停止一操演火器康熙二十八年奏準每年秋季由兵部具奏八旗漢軍於蘆溝橋演放槍炮操演隊伍於九月初一日八旗各運大炮十位至蘆溝橋於橋西每旗立槍營炮營各一每旗都統或副都統一人率參佐散秩官驍騎校兵丁炮手前往行文工部修飾炮車並關支火藥火繩木牌每日早八旗各放炮百出記打牌中的數目計一月飯後列陳演放進步連環槍炮餘暇演槍打牌計半月先回凡赴橋兵丁炮手均豫支九月兵餉為整裝及盤費開操第一日由太常寺奏除都統一人承祭餘八旗或都統副都統率參佐官校隨班行禮祭畢乃發炮開操越十日兵部奏請遣兵部堂官一人驗操是日豫設采棚於八旗之中在橋都統參領均先赴炮場場官校導引兵部堂官過橋聲炮三至炮場衆迎入采棚兵部堂官正坐都統副都統兩旁列坐參佐皆兩旁侍立傳令乃放炮各十出兵部司官筆帖式分驗各旗均記載中的數目放炮畢乃各乘馬官校仍前導都統隨行至將臺參佐豫列陳於臺前兵部堂官登將臺都統副都統參佐官校各入本旗隊伍傳宣