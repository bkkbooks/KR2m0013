之人轉致染其陋習應令㸃出之大臣等嚴加訓飭如於一年内能悔過自新者凖其居住若仍不悛改即著發徃拉林專管之大臣仍於一年報滿之日將應去應留之兵丁據實具奏分别辦理此後若再有為匪兵丁即繋大臣不能盡心稽察其咎亦奚辭餘依議一改補乾隆元年議凖旗員補授緑旗營弁五年俸滿有於營務不甚相宜者該督提咨部轉交該旗仍以旗員補用副將以歩軍翼尉城守尉協領改補叅將游撃以前鋒䕶軍驍騎各叅領改補都司以前鋒侍衛副叅領歩軍協尉佐領及各省駐防防守尉改補守備以歩軍尉五品防禦改補其由副將改補歩軍翼尉各官均仍照從二品頂帯食俸遇應升之官一同開列七年議凖文職改補旗員給事中御史郎中道知府以副叅領佐領城門領改補同知知州以歩軍尉監守信礮官改補主事通判知縣以驍騎校改補小京官司府首領官州縣佐貳筆帖式以城門吏改補該都統等量才噐使或令印房辦事或令隨旗行走試用一年果能黽勉遇應補之官擬定正陪引見補授一降補乾隆五年議凖領侍衛内大臣内大臣都統駐防將軍等一品官降一級調用者聼兵部具題其降二級調用者繋滿洲以陵寢總管歩軍翼尉城守尉協領前鋒䕶軍驍騎各叅領擬補䝉古以游牧總管副管協領前鋒䕶軍驍騎各叅領擬補漢軍以在京叅領駐防協領擬補降三級調用者繋滿洲以陵寢翼領信礮總管前鋒侍衛䕶軍驍騎副叅領佐領歩軍協尉城門領防守尉擬補䝉古以前鋒侍衛䕶軍驍騎副叅領佐領歩軍協尉城門領擬補漢軍以副叅領佐領歩軍協尉城門領駐防叅領擬補降四級調用者滿洲漢軍皆以監守信礮官歩軍副尉駐防防禦擬補䝉古以歩軍副尉駐防防禦擬補二品之前鋒䕶軍歩軍各統領副都統鑾儀使散秩大臣降一級二級三級調用者與一品官降二級三級四級調用之例同遇有應補之官聲明降調情由列名於應升各官之後一同引見㳟候欽定至一品官降五級調用二品降四級調用者不補前鋒䕶軍驍騎諸校除該員原有世爵者令以世爵在旗行走外其無世爵者帯所降之級隨旗行走三年無過該都統等出具考語引見請㫖將降五級之一品官凖其照降四級例擬補降四級之二品官照降三級例擬補若降級數多至無官可補者停其補用又奏凖在京八旗三品官降一級調用以四品官擬補降二級調用以五品官擬補降三級調用以六品官擬補其四品官降一級二級調用與三品官降二級三級之例同五品官降一級調用與四品官降二級之例同遇應補之官聲明降調情由列名於應升各官之後一同引見恭候欽定至三品官降至四級以下四品官降至三級以下五品官降至二級以下調用無官可補者皆停其補用有世爵者隨旗行走又奏凖各省駐防三品以下官降級調用均以本處駐防官按品擬補此等降調之人遇有應補之官令該將軍都統副都統於咨送應升官引見時將該員降調情由聲明一并咨送該旗列名於應升各官之後引見㳟候欽定其總管城守尉防守尉及該處所屬官降級調用者悉令囘旗竢該旗出有各處總管城守尉防守尉所屬員闕由該旗都統等按其所降之級與應補之闕相符聲明降調情由列名於應升各官之後一并引見恭候欽定降至無官可補者停其補用七年奉㫖八旗降調各官遇應補時引見未授者至三次引見時聲明具奏八年奏凖三品官降四級四品官降三級五品官降二級調用者皆以七品城門吏補用十一年奉㫖嗣後外省開復降調各官遇有應補時調取引見至驍騎校繋豫行保送已經引見之人毋庸調取引見若降調驍騎校仍照例引見又奉㫖嗣後各省駐防降調各官於初次來京引見時即聲明具奏又奏凖在京武職及各省駐防官因公罣誤至於降革者内有才品擾長任事勇徃者本任内並無虧空錢糧應行治罪之案該管大員會同都察院詳加察覈如果應行引見交該管大員出具切實考語保奏引見其各省駐防官咨送該旗引見應否去留㳟候欽定十三年奏凖各省駐防降調之官逺省二次近省三次引見未䝉補用者照應得品級凖令休致停其來京引見八旗都統襲爵一列爵國初定班爵之等有八曰公曰侯曰伯曰子曰男曰輕車都尉曰騎都尉曰雲騎尉自公至輕車都尉又分三等曰一等公二等公三等公侯以下亦如之授爵自雲騎尉始一襲次順治十八年題凖一等子襲十四次二等襲十三次三等襲十二次一等男襲十次二等襲九次三等襲八次一等輕車都尉襲六次二等襲五次三等襲四次騎都尉襲二次雲騎尉襲一次康熙九年題凖初授世爵凖襲次數越十五次者世襲㒺替給與誥命一承襲康熙元年題凖凡世爵一人并襲至公侯伯者其子弟承襲時原授之爵各人分襲七年題準凡一人兼得之世爵不凖子孫分襲若繋一人并襲二三人所授之爵仍與二三人分襲五十八年諭有本身効力立官之人或因年老患病告退移與其弟兄子孫承襲其承襲之人病故即為襲次已完不凖承襲雖立官之人見在亦即為襲次已完不凖襲爵甚屬可憫似此効力立官之人如本身見在情願與子孫承襲者仍應凖承襲著議政大臣大學士等㑹同八旗都統副都統及部院衙門滿洲堂官議奏欽此遵㫖議凖効力軍功立官之人所得之官給與伊子孫承襲雖襲次已完若原立官之人見在聼其給與應襲之人承襲若無應襲之人即留與伊本身給食全俸似此等之人令各旗察眀照例引見承襲永為例雍正三年奉㫖嗣後八旗世爵分應列名之人如遇患病縁事情由均於譜内本名下注眀又奉㫖八旗承襲世爵將原授爵人之子孫按其名数詳列譜牒如一譜不能盡者即繕二譜具奏又議凖世爵官犯十惡及軍機獲罪其子孫雖遇赦亦不凖襲其因命案罪擬斬絞及因枉法婪贓侵盗錢糧以財行求等案革職治以枷責者其子孫亦不凖襲如遇恩詔所獲罪與應免之條相符者其子孫照常開列此外因公私罪治以枷責者凖其子孫承襲若獲罪不凖子孫承襲之本人奉㫖復加録用者其子孫照常開列十一年奉㫖譜牒所載正陪人員内有見在軍前者均於本名下注眀乾隆三年議凖承襲世爵以得爵人之子孫承襲無子孫以親兄弟之子孫承襲無親兄弟子孫以親伯叔之子孫承襲無親伯叔子孫按其譜牒擇宗支相近者承襲其見在所襲世爵繋受爵人之長房子孫承襲其員闕即以原官之子孫擬正别房之子孫擬陪原官或無嗣或犯罪其子孫不應承襲仍於長房之别支内簡選擬正繋别房之子孫承襲其員闕以原官之子孫擬正長房之子孫擬陪原官或無嗣或犯罪其子孫不應承襲即於長房之子孫内簡選擬正其餘族人擬陪列名原授爵人有子孫未獲承襲經兄弟之子孫承襲者其員闕以原授爵人之子孫承襲兄弟之子孫止於譜内注眀承襲次數不凖與正陪之選原受爵人無嗣有親兄弟之子孫未獲承襲經伯叔之子孫承襲者其員闕以親兄弟之子孫承襲伯叔之子孫止於譜内注眀承襲次數不凖與正陪之選原受爵人無嗣継族人為嗣者族人之子孫得與選正陪若繼異姓為嗣者不凖原受爵人之長房子孫願讓於次房承襲者聼一人有兩世爵經長房次房之子孫分襲而原受爵人尚有三房子孫其員闕以原官之子孫擬正未經襲爵之子孫擬陪兩世爵繋一支承襲者其員闕以未經承襲之支選擬正陪以上分得擬正或擬陪或列名均於譜牒本名下詳注縁由引見時將譜進呈㳟候欽定六年奏凖應襲爵人本身殘廢别無應襲之人乃奏請給餉飬贍竢其後有子嗣再行請襲一推恩續封乾隆十五年諭我國家軍前立功致身効力之人給以世爵乃崇德報功之大典此等世爵内有世爵㒺替者有襲有次數者並不畫一究其原由從前初建大業之時人人奮勇立功迨大業既建尚有未經平定之處復加平定是時立爵之人甚衆其所授之爵不便均作為世襲㒺替故順治九年恩詔以前所授之爵凖其世襲㒺替恩詔以後所授之爵作為襲有次數即陣亡授爵亦如之第按陣亡之人皆繫捐軀盡節所遇之時雖有先後而為國捐軀並未有異此等臣僕朕實軫念况旗人藉俸餉度日若恩詔以後所授之爵不分别定議槩定為襲有次數則將來生齒日繁世爵日少於旗人生計甚有關繫朕意將恩詔以後所授之爵内有陣亡授爵襲次已完者賞給七品官世襲㒺替則其子孫得以永永沐恩於國家昭忠叙功之典相符而人亦咸知感奮矣但辦理此事不可不詳加察覈即如和通呼爾罕諾爾地方征戰有實屬陣亡者有陣亡未甚眀晰者其絶嗣之人雖經撫養兄弟之子孫究非親子亦不凖列入著軍機大臣八旗大臣將恩詔後陣亡授爵者究其根據詳其姓氏雖襲次已完仍應賞給七品官世襲㒺替其悉心㑹同定議具奏凡旗人應知朕格外特恩静聼辦理以仰承恩澤若有冀倖争告者即繫負恩定行從重治罪將此通行曉諭知之欽此遵㫖議凖順治九年恩詔以後或出戰陣亡或受傷身死或遇難盡節或充使被害從前已經授爵該旗詳考勅書幷部册相符其襲次已完者各賞一七品官世襲㒺替襲次未完者注册竢襲次已完再行賞給若繫一人合襲兩世爵者内有一襲有次数之爵竢日後分襲時覈係陣亡之子孫再行賞給十六年覆凖順治八年恩詔内開原有襲次者均凖世襲㒺替給與誥命原無襲次今恩詔中凖授騎都尉者給與敕書陣亡者凖襲病故者不凖其効力軍前所得雲騎尉凖承襲一次等語是詔前原有襲次世爵皆凖世襲㒺替似詔前無不世襲之爵但從前有給與誥命注明世襲㒺替者亦有給與敕書注明襲次者從前總以誥敕為憑分别辦理並非詔前之爵槩予世襲㒺替今考滿洲䝉古漢軍内偉績殊勲授爵在恩詔以前者雖雲騎尉亦無不世襲㒺替而詔前授爵按次承襲不凖世襲㒺替統稽襲次已完者見在承襲八旗共有二百餘人此内漢軍十居七八漢軍内定鼎後歸順者又居大半其如何辦理之處雖閲年乆逺無籍可稽在當日必有區别自未便輕議更易謹按乾隆十五年諭㫖順治八年詔後所立世爵内因陣亡賞給之爵遇襲次已完者著賞給七品官令其世襲㒺替欽此今考順治八年詔前按次承襲之世爵二百餘人内陣亡官約有二三十人應一並交與原議之王大臣定議具奏竢命下之日通行八旗遵照辦理又覆凖順治八年恩詔以前陣亡授爵襲次已完者各賞一七品官襲次未完者准於襲完後賞給又外任地方官及綠旗營弁内有為國捐軀父子被害全家受難者凖賞一七品官世襲㒺替又征戰受傷後傷發身亡者其子孫亦給一七品官凖襲一次又奏凖恩賜陣亡後裔世襲七品官稱為恩騎尉一承襲譜牒雍正十一年覆凖襲爵譜牒繕造二本一鈐旗印送内閣存貯一鈐叅領佐領關防圖記送該旗公署存貯至嵗終有應行増入者纂輯一次積至十年仍繕一本送内閣存貯一察覈世次乾隆五年奏凖八旗承襲世爵除順治九年恩詔並未加官與詔後並無軍功之官並恩詔後初立軍功之官無可注銷者或恩詔所加之官與詔後軍功所得之官業經送吏部覈定無可再銷者或世襲罔替或襲有次数均毋庸送吏部察覈該旗照誥勅奏請承襲奉㫖後將誥勅送部注册如誥勅内有應行注銷者送吏部覈定再行請襲欽定大清㑹典則例卷一百七十五
