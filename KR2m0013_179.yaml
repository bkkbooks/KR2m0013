之人一并列名如無軍政卓異之人將年乆軍前効力之人擬陪引見補授其記名人員已經升轉即將從前記名之處報部注銷升任後復於新任記名者仍照記名之例升用六年議準官兵内從前有出征隨圍未經升用縁事降革復行録用者遇升選時出征隨圍準其通論若已經升用縁事降革復行録用者不準通論七年議準出征官兵得列等次者一經升用將等第報部注銷列二等注册者遇選用時將記名之處繕入名籖具奏升用後亦即注銷八年奏準凡論食俸餉年分繫自㓜承襲世爵佐領者以食俸之年為始繫自㓜補教養兵者以十六嵗為始又奏準由京城補授吉林等處官年滿保送注册應升者該旗行取來京與應升之人一同引見補用如未經補用囬任後復遇應升則停其行取繕名籖奏補如囬任已過一年仍行咨取十三年奏準盛京邊門要任必須才力幹練之人如遇該員才具平庸不能勝任者即不論本旗本翼選取能員具奏調補毋庸送京引見迨後員闕仍歸本旗選補至城守尉協領繫專城大員如遇調補均令送京引見十六年奏準記名旗員内如有人品平庸者該管大員具奏將記名册注銷其侍班人員於該旗奏事之日别項引見人少將侍班十人引見如人多即行停止該都統等酌量務於一年内引見一次至前鋒叅領等侍班一二年輪一次仍照舊例行二十年奉㫖各省城守尉協領及各地方總管等官應各該旗簡選補授者由本旗引見如應八旗公補向由兵部引見辦理殊未畫一見今有直年都統辦理八旗事務則此等公中簡選之旗員理應直年都統引見嗣後應各該旗簡選補授者仍著本旗引見其公中簡選者著直年都統引見兵部引見著停止一補授叅領順治初年定滿洲䝉古叅領員闕以佐領郎中員外郎歩軍協尉前鋒侍衛一二三等侍衛䕶衛子以下雲騎尉以上世爵官擬正陪具題補授漢軍叅領員闕以佐領郎中員外郎歩軍協尉子以下雲騎尉以上世爵官擬正陪具題補授雍正三年奏準叅領員闕以副叅領五人不分正陪按其年分通行列名引見簡補其佐領以下各官毋庸開列乾隆元年奏準八旗滿洲叅領員闕照宗室侍衛等補授䕶軍叅領例行文領侍衛内大臣及宗人府將近支宗室侍衛鎮國將軍以下奉恩將軍以上簡選咨送與副叅領一同引見簡補一補授副叅領康熙四十年増設八旗委署叅領毎叅領各一人以八旗世爵親軍前鋒䕶軍驍騎諸校及歩軍尉簡選引見委署雍正元年諭每叅領下向止叅領一人因不敷用是以各委署一人昨議政大臣奏稱䕶軍校驍騎校繫微末之員不稱管束之任停其委署等語其説亦是今將委署叅領即作為五品副叅領嗣後副叅領員闕仍將䕶軍校驍騎校一并簡選引見若叅領副叅領奉有差遣别行奏請委署如此則責任專而管轄得力旗人升轉之途亦不至壅滯至見有之委署叅領應分别優劣優者即授為副叅領其餘令各囬原任欽此十二年奉㫖副叅領作為四品乾隆元年奉㫖從前䕶軍校驍騎校均升副叅領委署叅領今副叅領作為四品委署叅領業經裁汰而䕶軍校驍騎校之升闕甚少嗣後副叅領員闕將䕶軍校驍騎校與應升各官一同奏請引見六年奏準滿洲䝉古漢軍副叅領員闕由該旗以印房理事之佐領及世爵内遴選正陪二人並於驍騎校内遴選一人一同引見簡補七年奉㫖副叅領員闕將驍騎校一同引見少屬越等嗣後補授副叅領之驍騎校著在外備用將擬正陪之人引見如應升人員内不得其人再令驍騎校引見十七年議準嗣後印房六品官驍騎校於副叅領等員闕仍照例簡選升補外其七八品官均不得越次保舉十八年奏準補授副叅領八旗辦理殊不畫一嗣後副叅領員闕將印房理事之佐領世爵並應升各官遴選引見補授其簡選驍騎校之處停止一世襲佐領順治初年定八旗滿洲䝉古漢軍世襲佐領員闕其子孫不論有官無官及年嵗未滿均得與擬正陪具題補授雍正元年奉㫖補授世襲佐領若有應行列名而不列名者於家譜本名之下注眀情由三年奉㫖嗣後八旗世襲佐領家譜内著將原立佐領人之子孫按其名數盡行開入如一譜不能盡書即繕兩譜具奏又奉㫖八旗世襲佐領凡應列名之人如遇患病縁事一切情由均於本人名下注眀四年議準原管佐領世管佐領内如有年老衰庸不能辦事者引見休致於本人子弟及近族人内遴選奏補如本族無人其佐領繫祖父宣力所得不便革除者於該旗内簡選才能之人引見兼管此等兼管之人叙功治罪與佐領同七年諭凡原管佐領雖經異姓管理數次遇員闕仍應於原立佐領人之子孫内遴選補授如本族一時不得其人再於該旗應升人内選補竢原管佐領人之子孫長成仍行歸還如此方為允協永著為例欽此十一年奉㫖嗣後家譜所載正陪人員内有見在軍前者均於各名下注眀十二年覆準八旗擬補世襲佐領將出闕人之子孫簡選擬正若無子孫於親兄弟内簡選擬正近族内簡選一人擬陪仍於有分宗支内每支簡選一人通行引見簡補乾隆元年諭八旗專管佐領及佐領下人等彼此争訟不息是以皇考特降諭㫖交内閣㳟察實録定為原管佐領世管佐領業經傳行八旗再此内或别有情由其心不服者令將縁由聲眀於雍正九年已降㫖通行曉示迄今數載鑲黄旗都統始行察奏則别旗仍有似此者亦未可定今若不覈定則爭訟將無底止著總理事務王大臣察辦如何永著為例定議具奏欽此遵㫖議準八旗原管佐領世管佐領其原得佐領縁由並佐領下人原繫何處人編入此佐領均覈眀造册自佐領以下至兵丁閒散均開列姓氏於本名下畫押該旗彚總具奏將畫押册籍鈔録三本一本存本旗公署一本存兵部一本兵部鈐印交該佐領收貯以備稽考如日後再有爭告之人即覈對原册將爭告之人送部治罪佐領襲替時將新襲人姓名增注於册本旗族長亦别造一册存貯其族長更換時仍行交代該旗於嵗終將各佐領族長等存貯之册㸃驗若有遺失損壊私行改竄者本人交部治罪仍將將原册較對更正三年諭向來八旗補授佐領並無家譜由該旗大臣分别簡選具奏補授續因旗下大臣辦理不免偏執是以定有家譜迨既有家譜之後仍將不應補之人列入其應補之人轉致刪除且其佐領根由終未眀悉夫八旗佐領根由若不詳察定議日後終不免於爭訟是以降㫖令王大臣辦理今八旗議奏家譜其原管佐領或繋功臣帶來所屬人丁編為佐領或因功績茂著賞給人丁編為佐領此等佐領員闕原立佐領人之子孫不論曾否管過佐領均應有分原立佐領人之親兄弟雖曾管過佐領其子孫不準得分世管佐領或繫將帶來之人編為佐領令其承管者或初編佐領時即經管理後積有數軰作為世管佐領者又有分編佐領時即令承管者此等佐領原立佐領人之子孫準擬正其餘管過佐領人之子孫酌其譜系逺近並管理次數有應得擬正之分應得擬陪及擬備之分者又原立佐領人之子孫念分不應得之族人繫一祖所出請一并得分或其本支内已有佐領將别佐領讓給無佐領之支或每支各管一佐領再補授佐領内有將出闕人之子孫擬正原立佐領人長房之子孫擬陪若出闕之人並無子孫將原立佐領人長房之子孫擬正或次房之子孫擬正長房之子孫擬陪至於家譜或將有分之人開入或不論有分無分一並開入將情由旁注之處均未議及又原立佐領内有滋生之佐領補授時有於原立佐領黏寫黄籖亦有於滋生佐領黏寫黄籖辦理亦未畫一今清理佐領根源原期永為定例若不詳悉日後終不免於紛爭旗下大臣遵行亦難著原辦理之王大臣逐一詳覈具奏此外别簡王大臣將所奏之佐領詳細較閲分别正陪備用之分應否載入家譜及如何黏籖之處分晰詳議畫一辦理並將八旗承襲世爵鈔録家譜一同定議具奏欽此遵㫖議準承襲原管佐領繫原立佐領人之長房子孫管理佐領員闕以出闕人之子孫擬正别房管過佐領人之子孫擬陪出闕之人或無嗣或獲罪其子孫例不應補仍於長房之别支遴選擬正别房之子孫管理佐領員闕以出闕人之子孫擬正長房之子孫擬陪出闕之人或無嗣或獲罪其子孫例不應補即於長房之子孫内擇無佐領之支遴選擬正其出闕之支與其餘族人通行遴選擬陪並列名擬備又原立佐領人之子孫有奉㫖將佐領按支分給者各自按支承襲又原立佐領人之子孫衆多奉準每支各選一人者員闕按支遴選不分正陪一同引見候㫖簡補又原立佐領人之長房子孫願讓與次房擬正陪承襲者察繫管過此佐領之子孫始準讓給又原立佐領人之子孫無嗣繼族人為嗣者其族人之子孫得與正陪之選若繼異姓為嗣者不準又原立佐領人無嗣未曽繼立者員闕以親兄弟之子孫次及親伯叔之子孫不論曽否得過佐領一例得與正陪之選伯叔祖之子孫雖經管過佐領不準與選其兩三佐領同在一支者員闕以無佐領之支擬正出闕之支擬陪兩姓互管一佐領者同兩支各管一佐領者以出闕人之子孫擬正彼一支擬陪兩支之族人列名兩姓各管一佐領者同三姓四姓互管一佐領者出闕人之子孫擬陪各姓通行遴選擬正及列名承襲專管佐領繋原立佐領人之子孫管理佐領員闕以出闕人之子孫擬正管過此佐領人之子孫擬陪族人列名備選若繫原立佐領人伯叔兄弟之子孫管理佐領員闕仍以原立佐領人之子孫擬正出闕人之子孫擬陪族人列名備選餘與原管佐領同承襲世管佐領原立佐領人無嗣未曽繼立者員闕以親兄弟之子孫承襲無親兄弟子孫次及親伯叔之子孫無親伯叔子孫次及近族不論曽否管過佐領者均得擬正擬陪若原立佐領人無嗣有親兄弟之子孫未獲承襲經親伯叔之子孫承襲者其員闕以親兄弟之子孫擬正其親伯叔之子孫亦得與選至伯叔祖之子孫曾伯叔祖之子孫管過此佐領者準其擬陪髙祖以上以及逺族管過此佐領者準其列名均不得擬正又原立佐領人之子孫願讓與伯叔兄弟以及逺族之人擬正陪承襲者不論曾否管過佐領皆準讓給又原立佐領人之子孫因本支内已有佐領可襲於别支佐領分雖應得願不與選者亦聼又一族人編成之佐領出闕人之子孫擬正其餘族人通行擬陪列名餘與原管佐領同八旗察哈爾奉天等處原管專管世管佐領員闕均照此例辦理又議準佐領獲罪除犯十惡及軍機得罪者雖遇恩赦其子孫亦不得承襲外其餘情罪尚輕者子孫仍準承襲其不準承襲之人奉㫖復加録用或從發遣處放還及於辛者庫即内管領下食月米人放出者其子孫照常開列又獲罪人子孫既不準承襲别支又無應襲之人察繫陣亡之子孫該旗具奏請㫖六年奏準世管佐領出差有逾半年者於該佐領之本族官員内簡選一人引見署理如本族内無應署之人於該旗内簡選一人引見署理十七年奉㫖世管佐領員闕其應襲之子孫有在拉林阿爾楚哈地方種地者若分應擬正照例咨取來京引見止繫擬陪列名可於在京分所應得之人内選取如再不得人將種地人列名進呈不必行取來京一補授公中佐領順治初年定八旗滿洲䝉古漢軍公中佐領員闕以公侯伯大學士尚書都統以下䕶軍驍騎校以上官擬定正陪具題補授雍正元年議準八旗察哈爾世管佐領下滋生人丁編為公中佐領者遇員闕以該佐領應升之官並滋生此佐領之原佐領下應升各官通行選補又巴爾虎公中佐領員闕於該佐領應升官内選補出闕之人有軍功者其子孫得與選四年奉㫖公中佐領員闕與原管世管佐領不同䕶軍校驍騎校乃六品微員