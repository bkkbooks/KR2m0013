對原册將爭告之人送部治罪佐領襲替時將新襲人姓名增注於册本旗族長亦别造一册存貯其族長更換時仍行交代該旗於嵗終將各佐領族長等存貯之册㸃驗若有遺失損壞私行改竄者本人交部治罪仍將將原册較對更正三年諭向來八旗補授佐領並無家譜由該旗大臣分别簡選具奏補授續因旗下大臣辦理不免偏執是以定有家譜逮既有家譜之後仍將不應補之人列入其應補之人轉致刪除且其佐領根由終未眀悉夫八旗佐領根由若不詳察定議日後終不免於爭訟是以降㫖令王大臣辦理今八旗議奏家譜其原管佐領或繫功臣帶來所屬人丁編為佐領或因功績茂著賞給人丁編為佐領此等佐領員闕原立佐領人之子孫不論曾否管過佐領均應有分原立佐領人之親兄弟雖曾管過佐領其子孫不準得分世管佐領或繫將帶來之人編為佐領令其承管者或初編佐領時即經管理後積有數輩作為世管佐領者又有分編佐領時即令承管者此等佐領原立佐領人之子孫準擬正其餘管過佐領人之子孫酌其譜系逺近並管理次數有應得擬正之分應得擬陪及擬備之分者又原立佐領人之子孫念分不應得之族人繫一祖所出請一并得分或其本支內已有佐領將别佐領讓給無佐領之支或每支各管一佐領再補授佐領內有將出闕人之子孫擬正原立佐領人長房之子孫擬陪若出闕之人並無子孫將原立佐領人長房之子孫擬正或次房之子孫擬正長房之子孫擬陪至於家譜或將有分之人開入或不論有分無分一並開入將情由旁注之處均未議及又原立佐領內有滋生之佐領補授時有於原立佐領黏寫黃籖亦有於滋生佐領黏寫黃籖辦理亦未畫一今清理佐領根源原期永為定例若不詳悉日後終不免於紛爭旗下大臣遵行亦難著原辦理之王大臣逐一詳核具奏此外别簡王大臣將所奏之佐領詳細較閲分别正陪備用之分應否載入家譜及如何黏籖之處分晰詳議畫一辦理並將八旗承襲世爵鈔録家譜一同定議具奏欽此遵㫖議準承襲原管佐領繫原立佐領人之長房子孫管理佐領員闕以出闕人之子孫擬正别房管過佐領人之子孫擬陪出闕之人或無嗣或獲罪其子孫例不應補仍於長房之别支遴選擬正别房之子孫管理佐領員闕以出闕人之子孫擬正長房之子孫擬陪出闕之人或無嗣或獲罪其子孫例不應補即於長房之子孫內擇無佐領之支遴選擬正其出闕之支與其餘族人通行遴選擬陪並列名擬備又原立佐領人之子孫有奉㫖將佐領按支分給者各自按支承襲又原立佐領人之子孫衆多奉準每支各選一人者員闕按支遴選不分正陪一同引見候㫖簡補又原立佐領人之長房子孫願讓與次房擬正陪承襲者察繫管過此佐領之子孫始準讓給又原立佐領人之子孫無嗣繼族人為嗣者其族人之子孫得與正陪之選若繼異姓為嗣者不準又原立佐領人無嗣未曽繼立者員闕以親兄弟之子孫次及親伯叔之子孫不論曽否得過佐領一例得與正陪之選伯叔祖之子孫雖經管過佐領不準與選其兩三佐領同在一支者員闕以無佐領之支擬正出闕之支擬陪兩姓互管一佐領者同兩支各管一佐領者以出闕人之子孫擬正彼一支擬陪兩支之族人列名兩姓各管一佐領者同三姓四姓互管一佐領者出闕人之子孫擬陪各姓通行遴選擬正及列名承襲專管佐領繫原立佐領人之子孫管理佐領員闕以出闕人之子孫擬正管過此佐領人之子孫擬陪族人列名備選若繫原立佐領人伯叔兄弟之子孫管理佐領員闕仍以原立佐領人之子孫擬正出闕人之子孫擬陪族人列名備選餘與原管佐領同承襲世管佐領原立佐領人無嗣未曽繼立者員闕以親兄弟之子孫承襲無親兄弟子孫次及親伯叔之子孫無親伯叔子孫次及近族不論曽否管過佐領者均得擬正擬陪若原立佐領人無嗣有親兄弟之子孫未獲承襲經親伯叔之子孫承襲者其員闕以親兄弟之子孫擬正其親伯叔之子孫亦得與選至伯叔祖之子孫曾伯叔祖之子孫管過此佐領者準其擬陪髙祖以上以及逺族管過此佐領者準其列名均不得擬正又原立佐領人之子孫願讓與伯叔兄弟以及逺族之人擬正陪承襲者不論曾否管過佐領皆準讓給又原立佐領人之子孫因本支內已有佐領可襲於别支佐領分雖應得願不與選者亦聼又一族人編成之佐領出闕人之子孫擬正其餘族人通行擬陪列名餘與原管佐領同八旗察哈爾奉天等處原管專管世管佐領員闕均照此例辦理又議準佐領獲罪除犯十惡及軍機得罪者雖遇恩赦其子孫亦不得承襲外其餘情罪尚輕者子孫仍準承襲其不準承襲之人奉㫖復加録用或從發遣處放還及於辛者庫即內管領下食月米人放出者其子孫照常開列又獲罪人子孫既不準承襲别支又無應襲之人察繫陳亡之子孫該旗具奏請㫖六年奏準世管佐領出差有逾半年者於該佐領之本族官員內簡選一人引見署理如本族內無應署之人於該旗內簡選一人引見署理十七年奉㫖世管佐領員闕其應襲之子孫有在拉林阿爾楚哈地方種地者若分應擬正照例咨取來京引見止繫擬陪列名可於在京分所應得之人內選取如再不得人將種地人列名進呈不必行取來京一補授公中佐領順治初年定八旗滿洲䝉古漢軍公中佐領員闕以公侯伯大學士尚書都統以下護軍驍騎校以上官擬定正陪具題補授雍正元年議準八旗察哈爾世管佐領下滋生人丁編為公中佐領者遇員闕以該佐領應升之官並滋生此佐領之原佐領下應升各官通行選補又巴爾虎公中佐領員闕於該佐領應升官內選補出闕之人有軍功者其子孫得與選四年奉㫖公中佐領員闕與原管世管佐領不同護軍校驍騎校乃六品微員