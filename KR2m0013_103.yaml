body:
  text: 樂部神樂署一中和韶樂樂章圜丘黃鐘為宮九奏迎帝神奏始平之章曰欽承純祜兮於昭有融時維永清兮四海攸同輸忱元祀兮從律調風穆將景福兮乃眷微躬淵思髙厚兮期亮天工聿章彝序兮夙夜宣通雲軿延佇兮鸞輅空濛翠旗紛裊兮列缺豐隆肅始和暢兮恭仰蒼穹百靈祇衛兮齋明辟公神來燕娭兮惟帝時聰協昭慈惠兮逖鑒臣衷奠玉帛奏景平之章曰靈旗爰止兮樂在縣執事有恪兮奉玉筵聿昭誠敬兮駿奔前嘉玉量幣兮相後先來格洋洋兮思儼然臣忱翼翼兮告中虔進俎奏咸平之章曰吉蠲為饎兮肅豆籩升肴列俎兮敢弗虔毛炮繭栗兮薦膏鮮致潔陶匏兮香水泉願垂降鑒兮駐雲駢錫嘉福兮億萬斯年初獻奏壽平之章曰玉斚肅陳兮明光桂漿初醖兮信芳臣心迪惠兮奉觴醴齊載德兮馨香靈慈徽眷兮矞皇勤仰止兮斯徜徉亞獻奏嘉平之章曰考鐘拂舞兮再進瑶觴翼翼昭事兮次第肅將睟顔容與兮蒼几輝煌穆穆居歆兮和氣洋洋生民望澤兮仰睨玉房榮泉瑞露兮慶無疆終獻奏永平之章曰終獻兮玉斚清肅秬鬯兮薦和羮磬管鏘鏘兮祀孔明旨酒盈盈兮勿替思成明命顧諟兮福羣生八龍蜿蜒兮苞羽和鳴徹饌奏熙平之章曰一陽復兮協氣伸盥薦畢兮精白陳旋廢徹兮敢逡巡禮將成兮樂欣欣瞻九閶兮轉洪鈞福施下逮兮佑此人民送帝神奏清平之章曰升中告成兮暗靄壇場穆思回盻兮雲駕洋洋臣求時惠兮感思馨香願蒙博産兮多士思皇天施地育兮百穀蕃昌殖我嘉師兮正直平康望燎奏太平之章曰隆儀告備兮誠既將有虔秉火兮􅌊越芳雷車電邁兮九龍驤紫氛四塞兮靈旗揚蒸民蒙福兮順五常惟豫小子兮敬戒永臧祈穀迎帝神奏祈平之章曰帝篤佑民兮求莫匪舒小民何依兮飲食惟需莫嘉於榖兮萬事權輿為民請命兮豈非在豫日用辛兮百辟趨暾將出兮東風徐惟豫小子兮敬盥陳孚皇皇龍駕兮穆將愈奠玉帛奏綏平之章曰念兹稼穡兮惟民天農用八政兮食為先雨暘時若兮玉燭全粒我蒸民兮迄用康年仰三無私兮昭事虔奉璋承帛兮栗若臨淵進俎奏萬平之章曰鼎烹兮苾芬嘉薦兮無文升繭栗兮惟犉羶薌達兮干雲昭民力兮普存惟明德兮馨聞初獻奏寶平之章曰初獻兮元酒盈致純潔兮儲精誠瑟黃流兮罍承酌其中兮外清明儼對越兮維清帝心歆假兮綏我思成亞獻奏穰平之章曰犧尊啓兮告虔清酤既馨兮陳前禮再獻兮祠筵光煜爚兮非煙神悅懌兮僾然惠我嘉生兮大有年終獻奏瑞平之章曰終獻兮奉明粢苾芬嘉旨兮清醴既釃神其衎兮錫祉禮成於三兮陳辭願灑餘瀝兮沭羣黎臣拜手兮青墀徹饌奏渥平之章曰俎豆具陳兮庶品宜肸蠁昭鑒兮荷帝慈饌告備兮玉几登歌洋溢兮廢徹不遲肅微忱兮告終事上帝居歆兮錫純禧送帝神奏滋平之章曰祗奉天威兮弗敢康小心翼翼兮昭穹蒼雲垂九天兮露瀼瀼翠旗羽節兮上翺翔臣拜下風兮肅倣徨願沛汪澤兮民多蓋藏望燎奏穀平之章曰卬首兮天閶混茫一氣兮浩無方􅌊蕭束帛兮薦馨香精誠感格兮降福穰穰四時順序兮百穀以昌臣同兆姓兮咸荷恩光雩祭迎帝神奏靄平之章曰粒我蒸民兮神降嘉生雨暘時若兮百穀用成龍見而雩兮先民有程臣膺天祚兮敢不祗承念我農兮心靡寧肅明禋兮殫精誠靈皇皇兮穆以清金支五色兮罨靄霓旌奠玉帛奏雲平之章曰玉帛載陳兮磬管鏘鏘為民請命兮惕弗敢康令清和兮遂百昌麥秀岐兮禾茀稂日照九兮時雨滂俾萬寶兮千斯倉進俎奏需平之章曰越十雨兮越五風三光昭明兮嘉氣蒙天所子兮渺躬豫小子兮凛降豐紛總總兮賴皇穹犉牡鬺烹兮達臣衷初獻奏霖平之章曰酌彼兮罍洗飶芬兮椒香愧明德兮維馨假黍稷兮誠將願大父兮念兹衆子穆將愈兮綏以豐穰亞獻奏露平之章曰再酌兮醑清仰在上兮明明庶來格兮鑒誠曷敢必兮屛營合萬國兮形神精承神至尊兮思成終獻奏霑平之章曰三酌兮成純備物致志兮敬陳多士兮駿奔靈承無斁兮明禋維蕃釐兮媪神雨留甘兮良苗懷新徹饌奏靈平之章曰禮將成兮舞已終徹弗遲兮畏神恫願留福兮惠吾農神之貺兮協氣融遂及私兮越我公五者來備兮錫用豐送帝神奏霮平之章曰祥風瑞靄兮彌靈壇上帝居歆兮風肅然左蒼龍兮右白虎般裔裔兮糾縵縵仰九閶兮返御介祉釐兮康年望燎奏霈平之章曰碧翏翏兮不可度思九奏終兮爟火晳而神光四燭兮休氣夥頤安匪舒兮抑抑威儀帝求民莫兮日鑒在兹錫福繁祉兮庶徵曰時御製大雩樂章瞻彼朱鳥鶉首是臨協紀辨律羽蟲徵音萬物藝生有壬有林有事南郊陟降維欽瞻仰昊天生物為心維國有本匪民伊何維民有天匪食則那為民祈福平秩南訛我祀敢後我樂維和鼉鼓淵淵童舞娑娑自古在昔春郊夏雩旱則致禱田燭朝趨盛禮既陳神留以愈雷師闐闐飛廉衙衙霈時甘霖利我新畬於穆穹宇在郊之南對越嚴恭上帝是臨庇蔭嘉榖用將悃忱惴惴我躬肅肅我心六事自責仰彼桑林權輿粒食實維后稷百王承之永奠邦極惟豫小子臨民無德敢懈祈年潔衷翼翼命彼秩宗古禮是式古禮是式值兹吉辰玉磬金鐘大羮維醇元衣八列舞羽繽紛既侑上帝亦右從神尚鑒我衷錫我康年惟天可感曰惟誠恪惟農可稔曰惟力作恃天慢人弗刈弗穫尚勤農哉服田孔樂咨爾保介庤乃錢鎛我禮既畢我誠已將風馬電車旋駕九閶山川出雲為靈澤滂雨公及私興鋤利氓億萬斯年農夫之慶方澤林鐘為宮八奏迎神奏中平之章曰吉蠲兮玉宇開薰風兮自南來鳯馭紛兮後先嶽瀆靄兮徘徊肅展禮兮報功沛靈澤兮九垓奠玉帛奏廣平之章曰式時吉土兮中壇毖我郊兆兮孔安辟公趨蹌兮就列考鐘伐鼓兮舞干黃琮纎縞兮既奠靈光下燭兮誠丹進俎奏含平之章曰禮行樂奏兮未央嘉肴有踐兮大房牲牷告歆兮惟恪民力普存兮肅將厚載資生兮無外兒筵來格兮洋洋初獻奏大平之章曰醴齊融冶兮信芳博碩升庖兮鼎方清風穆穆兮休氣翔神明和樂兮舉初觴洽百禮兮禋祀罄九土兮豐穰亞獻奏安平之章曰一茅三脊兮縮漿山罍雲羃兮馨香介黍稷兮芳旨再滌犧尊兮敬將樂成八變兮綴兆儼皇祇兮悅康終獻奏時平之章曰紫壇兮嘉氣盈旨酒思柔兮和且平凛兹陟降兮心屏營禮成三獻兮薦玉觥含𢎞光大兮德厚靈佑丕基兮永清徹饌奏貞平之章曰玉俎列兮庶品該黃琮告徹兮雲翔徊晏隂定兮曦景回南訛秩兮日恢台肅惟昭明兮孔邇覃博厚兮奠九垓送神奏寧平之章曰靈旗兮雲路遵飛龍蜿兮髙旻隂儀粹兮德純眷四海兮無塵配皇穹兮兩大綏下土兮蒸民太廟時饗太蔟為宮六奏迎神奏貽平之章曰肇兹區夏世德欽崇九州維宅王業自東戎甲十三奮起飛龍維神格思皇靈顯融奠帛初獻奏敉平之章曰於皇祖考克配上天越文武功萬邦是宣孝孫受命不忘不愆羮牆永慕時薦斯虔亞獻奏敷平之章曰毖祀精忱洋洋如生尊罍再舉於赫昭明藹然有容愾然有聲我懷靡及惕若中情終獻奏紹平之章曰粵若祖德誕受方國肆豫小子大猷是式欲報之德昊天罔極殷勤三獻中心翼翼徹饌奏光平之章曰庶物既陳九奏具舉告成於祖亦右皇妣敬徹不遲用終殷祀式禮如兹皇其燕喜還宮奏乂平之章曰對越無方陟降無迹寢祏靜淵孔安且吉惟靈在天惟主在室於萬斯年孝思無斁大祫迎神奏開平之章曰承眷命兮撫萬邦嗣丕基兮祖德昌溯謨烈兮唐哉皇虔嵗祀兮式舊章肅對越兮誠悃將尚來格兮仰休光奠帛初獻奏肅平之章曰粵我先兮肇俄朵長白山兮鵲銜果綿瓜瓞兮天所佐明之侵兮殲其左混中外兮逮乎我奉太室兮安以妥亞獻奏協平之章曰紛葳㽔兮列聖臨儼對越兮心欽欽陳纎縞兮有壬林擊浮磬兮彈朱琴恪溥將兮俶來歆錫嘉祉兮天地心終獻奏裕平之章曰椒飶芬兮神留俞爵三獻兮旨清醑萬羽干兮樂孔都禮明備兮罔敢渝神醉止兮咸樂胥永啓佑兮披皇圖徹饌奏誠平之章曰祝幣陳兮神燕娭尊俎將兮反威儀悅且康兮徹弗遲不可度兮矧射思禋有成兮釐百宜鑒精誠兮茀祿綏還宮奏成平之章曰龍之馭兮旋穆清神之御兮式丹楹瞻列聖兮僾容聲回靈眄兮佑丕承維神聽兮和且平繼序皇兮亶休徵社稷壇春以夾鐘為宮秋以南呂為宮七奏迎神奏登平之章曰媪神蕃釐兮厚德隆嘉生繁祉兮功化同壇壝儼肅兮風露融我稷翼翼兮黍芃芃望雲駕兮驂鸞龍植璧秉圭兮冀感通奠玉帛初獻奏茂平之章曰恪恭禋祀兮肅且雍清醑既載兮臨齋宮朝踐初舉兮玉帛共洋洋在上兮鑒豫衷亞獻奏育平之章曰樂具入奏兮聲喤喤鬱鬯再升兮賓八鄉厚德配地兮佑家邦綏我豐年兮兆庶康終獻奏敦平之章曰方壇北宇兮神中央盈庭萬舞兮帗低昂酌酒三爵兮桂醑香清雖舊邦兮命溥將徹饌奏博平之章曰大房籩豆兮儼成行歆此吉蠲兮神迪嘗廢徹不遲兮餘芬芳桐生茂豫兮百穀昌送神奏樂平之章曰孔蓋翠旌兮隨風揚龍輈容與兮指天閶咫尺神靈兮隔穹蒼願流景祚兮貺皇章望瘞奏徵平之章曰玉既陳兮延景光禮既洽兮恭瘞藏願神聼兮時豫匡垂神佑兮永無疆祈雨報謝祈雨以夾鐘為宮報祀以南呂為宮六奏迎神奏延豐之章曰九土博厚兮阜嘉生方壇五色兮祀孔明氓力穡兮服耕仰甘膏兮百穀用成熙雲路兮瞻翠旌殷闓澤兮展精誠奠玉帛初獻奏介豐之章曰神來格兮宜我黍稷兩圭有邸兮馨明德罍尊湛湛兮干羽飭油雲澍雨兮溥下國亞獻奏滋豐之章曰奏齍明兮申載觴龍出泉兮靈安翔周寰宇兮滂洋載神庥兮悅康三獻奏霈豐之章曰帗容與兮奮皇舞聲逺姚兮震靈鼓爵三奏兮縮桂醑號屏來御兮德施普徹饌奏綏豐之章曰協笙磬兮告吉蠲神迪嘗兮禮莫愆心齋肅兮增惕乾咨田畯兮其樂有年送神奏貽豐之章曰撫懷心兮神聿歸華蓋郅偈兮驂虬騑洪釐渥兮雨祁祁公私霑足兮孰知所為望瘞奏溥豐之章曰宣祝嘏兮列瘞繒貺允答兮時欽承髙原下隰兮以莫不興歌率育兮慶三登日壇太蔟為宮七奏迎神奏寅曦之章曰曦馭兮寅賓光煜爚兮紅輪春已融兮交泰循典禮兮明禋嚴大采兮祗肅神之來兮如雲奠玉帛奏明曦之章曰杲黃道兮暾出東肅將享兮玉帛同美齊翼兮王君公盥以薦兮昭格通初獻奏清曦之章曰御景風兮下帝扄酌黃目兮椒其馨爵方舉兮歌且舞漾和盎兮龍旗青亞獻奏咸曦之章曰再舉勺兮鬱金香嘉樂合兮舞洋洋德恢大兮神在沛淡容與兮進霞觴終獻奏純曦之章曰式禮莫愆兮昭清終以告虔兮休成願神且留兮鑒茹以妥以侑兮忱誠徹饌奏延曦之章曰物之備兮希德馨神欲起兮景杳冥徹不遲兮咸肅穆照臨下土兮瞻曜靈送神奏歸曦之章曰雲車征兮風馬翔猋萬里兮臨萬方報神功兮以時享祈神祐兮永無疆月壇南呂為宮六奏迎神奏迎光之章曰繼日代明兮象麗天式遵九道兮臨八埏玉律分秋兮西皓躔聿修毖祀兮樂在縣奠玉帛初獻奏升光之章曰少采兮將事玉帛兮載陳式舉黃流兮挹犧尊籩豆靜嘉兮肴核芬亞獻奏瑶光之章曰齊醍兮載獻神之來兮肅然仰肸蠁兮鑒顧挹清光兮几筵終獻奏瑞光之章曰戞瑟鳴琴兮鋗玉鏘神嘉虞兮申三觴金波穆穆兮珠焆黃休嘉砰隱兮溢四方徹饌奏涵光之章曰對越在天兮禮成徹登豆兮湛露零神悅懌兮德馨世曼夀兮安以寧送神奏保光之章曰駕卿雲兮景星御和風兮霞軿神留俞兮壇宇福率土之黃丁帝王廟春以夾鐘為宮秋以南呂為宮六奏迎神奏肇平之章曰撫時兮極隆造經綸兮顯庸總古今兮一揆貽大寶兮微躬仰徽猷兮有嚴閟宮豫稽首兮下風奠帛初獻奏興平之章曰莽若雲兮神之行豫仰止兮在廷承筐篚兮既登偃靈蓋兮翠旌鑒豫情兮歆享薦芳馨兮肅成亞獻奏崇平之章曰二觴兮酒行念昔致治兮永清瞻龍衮兮若英願紹錫兮嘉平終獻奏恬平之章曰鬱鬯兮獻終萬舞洋洋兮沭清風龍鸞徐整兮企豫示周行兮迪豫衷徹饌奏淳平之章曰盍肴蒸兮畢升五音會兮滿盈禮將徹兮虔告鑒孔忱兮載翼載登送神奏匡平之章曰羽幢繚繞兮動回風和鸞並馭兮歸天宮五雲擁兮髙馳翔願回靈盼兮錫年豐駕羣龍兮一氣中焄蒿芬烈兮實冥通望神光兮遙燭惟終古兮是崇文廟春以夾鐘為宮秋以南呂為宮六奏迎神奏昭平之章曰大哉至聖德盛道隆生民未有百王是崇典則昭垂式兹辟雍載虔簠簋載嚴鼓鐘奠帛初獻奏宣平之章曰覺我生民陶鑄賢聖巍巍泰山實豫景行禮備樂和豆籩嘉靜既述六經爰斟三正亞獻奏秩平之章曰至哉聖師克明明德木鐸萬年惟民之則清酒既醑言觀秉翟太和常流英材斯植終獻奏敘平之章曰猗歟素王示豫物軌瞻之在前師表萬祀酌彼金罍我酒惟旨登獻雖終弗遐有喜徹饌奏懿平之章曰璧水淵淵芹芳藻潔既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成日月昭揭送神奏德平之章曰煌煌辟雍四方來宗既陶樂育多士景從如土斯埴如金在鎔佐豫敷治俗美時雍直省文廟六奏迎神奏昭平之章曰大哉孔子先覺先知與天地參萬世之師祥徵麟紱韻答金絲日月既揭乾坤清夷初獻奏宣平之章曰豫懷明德玉振金聲生民未有展也大成俎豆千古春秋上丁清酒既載其香始升亞獻奏秩平之章曰式禮莫愆升堂再獻響協鼖鏞誠孚罍甗肅肅雍雍譽髦斯彥禮陶樂淑相觀而善終獻奏敘平之章曰自古在昔先民有作皮辨祭菜於論斯樂惟天牖民惟聖時若彝倫攸敘至今木鐸徹饌奏懿平之章曰先師有言祭則受福四海黌宮疇敢不肅禮成告徹母疏母瀆樂所自生中原有菽送神奏德平之章曰鳬繹峩峩洙泗洋洋景行行止流澤無疆聿昭祀事祀事孔明化我蒸民育我膠庠先農壇姑洗為宮七奏迎神奏永豐之章曰先農播穀克配彼天粒我蒸民於萬斯年農祥晨正協風滿旜曰豫小子宜稼於田奠帛初獻奏時豐之章曰厥初生民萬彚莫辨神錫之庥嘉種乃誕斯德曷酬何名可贊我酒惟旨是用初獻亞獻奏咸豐之章曰無物稱德惟誠有孚載升玉瓚神肯留虞惟兹兆庶豈異古初神曾子之今其食諸終獻奏大豐之章曰秬秠穈芑皆神所貽以之饗神式食庶幾神其丕佑佑我黔黎萬方大有肇此三推徹饌奏屢豐之章曰青祇司職土膏脈起日涓吉亥舉耕藉禮神安留俞不我遐棄執事告徹豫將舉趾送神奏報豐之章曰匪且有且匪今斯今靈雨崇朝田稼萬金考鐘伐鼓戞瑟鳴琴神歸何所大地秧針望瘞奏慶豐之章曰肅肅靈壇昭昭上天神下神歸其風肅然玉版蒼幣瘞埋告虔神之聽之錫大有年先蠶壇仲呂為宮六奏迎神奏庥平之章曰軒轅御籙時西陵位正妃柔桑沃載陽遲黼黻元黃共祀事稱繭更繅絲龍精報貺椒室宗師初獻奏承平之章曰春隄栁綻金倉庚有好音衣褘翟致精忱后月躬應教織絍柘館式齋心黃流初薦肸蠁如臨亞獻奏均平之章曰清和日正長靈壇水一方紆香陌執籧筐桑葉隂濃風淡蕩八育普嘉祥黃流再薦降福穰穰終獻奏齊平之章曰神臯接上園葭蘆翠浪翻鶯聲滑藕花繁天棘絲絲初引蔓三薦潔蘋蘩雲依寶鼎露浥旗幡徹饌奏柔平之章曰公宮吉禮成有齋奉豆登僮僮被肅肅升廢徹毋遲咸祗敬法坎不常盈萬方衣被百福其朋送神奏洽平之章曰神風拂廣筵靈香下肅然儀不􅑯禮無愆禺馬流星相炳絢玉蝀亙平川萬方衣被瑞繭登編神祇壇祈雨報謝天神黃鐘為宮地祇林鐘為宮六奏迎神奏祈豐之章曰雲車馳兮風斾征雷闐闐兮雨冥冥表六合兮穹青橫大川兮揚靈紛總總兮來會穆豫心兮齋明奠帛初獻奏華豐之章曰束帛戔戔兮筐篚將昭誠素兮鬯馨香瘼此下民兮候有望神垂鴻祐兮未渠央亞獻奏興豐之章曰疏羃兮再啓芳齊兮載陳惠邀兮神貺福我兮民人終獻奏儀豐之章曰犧尊兮三滌旨酒兮思柔誠無斁兮嘉薦神燕娭兮降休徹饌奏和豐之章曰禮既成兮孔殷潔明粢兮苾芬廢徹兮不遲至敬兮無文送神奏錫豐之章曰流形兮露生苞符兮孕靈介我黍稷兮曰雨而雨神之格思兮祀事孔明岱廟林鐘為宮六奏迎神奏祈豐之章曰資元氣兮鎮青陽鼓橐籥兮孕靈祥行時令兮東巡式展禮兮誠將奠帛初獻奏華豐之章曰金壇肅穆兮黼帷張瑟黃流兮茅縮漿昭誠素兮舉初觴神斯陟降兮格馨香亞獻奏興豐之章曰日觀兮雞鳴天門兮鳯翔犧尊兮再獻維神兮降康終獻奏儀豐之章曰醴齊兮三薦金牒兮輝煌申至敬兮無祈鑒豫誠兮齋莊徹饌奏和豐之章曰瞻石閭兮在望實籩豆兮大房黍稷兮非馨明德兮是將送神奏錫豐之章曰禮成兮孔臧神駕兮龍驤膚寸而合兮觸石而起彌於六合兮降福穰穰嵩廟林鐘為宮六奏迎神奏祈豐之章曰維靈嶽兮鎮中央展時巡兮洛之陽虔望秩兮懷柔儼對越兮神光奠帛初獻奏華豐之章曰石闕岧嶤兮鳴鳯翔奏瑶笙兮肅祼將初奉斚兮陳篚筐至誠昭格兮福無疆亞獻奏興豐之章曰潁水兮安怡維嶺兮青蒼黃琮兮告薦椒醑兮芬芳終獻奏儀豐之章曰香升兮華黍三滌兮嘉觴答靈響兮嵩門登萬寶兮咸昌徹饌奏和豐之章曰三臺蔚兮峻極二室鬱兮相望告徹兮維時懷德兮靡忘送神奏錫豐之章曰雲車兮龍驤仰止兮髙閶玉漿含滋兮金璧呈瑞配天作鎮兮長發其祥望祭長白山六奏迎神奏祈豐之章曰天作髙山兮作而康鍾王氣兮應期昌巡豐沛兮來望躬禋祀兮虔將初獻奏華豐之章曰飶黃流兮進初觴緬仙源兮心遫莊靄佳氣兮鬱蒼蒼欣來格兮惠無疆亞獻奏興豐之章曰朱果兮實蕃靈淵兮澤滂清尊兮再獻綿祚兮純常終獻奏儀豐之章曰具薦兮玉饌三酌兮瓊漿思王迹兮彌欽清緝熙兮敢忘徹饌奏和豐之章曰松花水兮湯湯鴨緣波兮泱泱神飫兮錫釐如川至兮莫量送神奏錫豐之章曰祀事兮孔臧昭假兮永明邁周岐兮越殷土萬有千嵗兮長發其祥太嵗殿太蔟為宮六奏迎神奏保平之章曰協兹五紀嵗月日辰天惟顯思神職攸分於赫太嵗統馭百神承天之德隂隲下民奠帛初獻奏定平之章曰禮崇明祀涓選休成潔齋滌志量幣告誠祈福維何福我蒼生陳饋奉酎瞻仰雲旌亞獻奏嘏平之章曰百末蘭生有毖其香升歌清越磬管鏘鏘牲牷肥腯嘉薦令芳神其歆止在上洋洋終獻奏富平之章曰執事有嚴再拜稽首三爵既升以妥以侑盥薦有孚肅兹籩豆神其歆止人民曼壽徹饌奏盈平之章曰王省惟嵗有報有祈六氣無易平衡正璣嘉生蕃祉澤及蜎飛百禮以洽承神吉輝送神奏豐平之章曰神兮旋馭肅瞻景光靈飇上下無體無方嘉承惠和億兆溥將嵗嵗大有神其迪嘗祈雨報謝迎神奏需豐之章曰持元化兮富媪神秉嵗籥兮六氣均馳雲車兮風旗殷闐闐兮天門情倣徨兮孔殷神之來兮康我民奠帛初獻奏宜豐之章曰薦嘉幣兮芳醴清練豫素兮升飶馨紛肸蠁兮格歆甘膏沃兮神所令亞獻奏晉豐之章曰啓山罍兮攝椒漿侑神宮兮靈洋洋族雲興兮使我心若惠嘉生兮降康終獻奏協豐之章曰清斚兮三㪺揚翟籥兮載愈靈回翔兮六幕澤雱霈兮遍八區徹饌奏應豐之章曰禮儀備兮孔時音繁會兮徹不遲昭靈貺兮迓蕃祉田多稼兮汜濩之送神奏洽豐之章曰顧億兆兮誠求渥甘澍兮神之休慶時若兮百昌遂惠我無疆兮嵗有秋欽定大清會典則例卷九十九
