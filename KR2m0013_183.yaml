監禁人犯應需口糧於户部支領煤炭於工部支領雍正元年奏準三營馬匹每年需豆三萬六千餘石穀草六十一萬餘束照採買價直折銀連閏按季支給官兵不令召買採辦嵗計節省升合脚價人工銀五千餘兩仍於時價内每兩扣銀一錢節存銀庫又定豆草價直令五城司坊官確訪時價造報户部依所訪價直扣除一成折給三營官兵自行採買四年奏準安定門大街草厰衚衕入官房一所共六十七間作為歩軍統領衙署五年奉㫖城外所有官房千四百三十四間地四百畝有竒著交巡捕三營官弁取租存於歩軍統領衙門以為賞賚番役之用九年奏準將官房租銀内嵗支八百兩以為各官養亷之費十年諭見今天氣炎熱著歩軍統領於各門設立氷水解暑湯藥以解行人煩渴即於工部所窖冰塊應用如尚不敷動用崇文門宣課司餘糧採買辦理永著為例其解暑湯藥交太醫院官定方配製欽此又奏準巡捕三營額設馬歩兵丁五千名馬兵一千四百四十名守兵三千五百六十名内除統領坐糧九分翼尉坐糧各四分叅將遊守千把等共親丁名糧三百八十五分外實在充差馬歩兵番四千五百九十八名經制官弁及馬歩兵番每年共扣朋銀三千一百四十六兩四錢向因辦理公務無項可動是以將所準馬價作為各項公費之用年終以驗準馬匹開銷而兵丁之倒馬者令停遲二三月以馬乾銀買補相沿已久此雖以公完公但徒有朋銀虛名究無給價實迹令將應行裁革之費一槩革除其必需公項在於官房租銀内動補至辦理鄉會武場及每月兵部堂考各省武弁八旗生童騎射處墊築馬道搭葢棚厰置備公案旗籌箭垜修理堆撥器械激筩救火器具等項嵗需銀八九百兩千兩不等實屬無項動支請照各省營汛設立公費名糧之例將巡捕三營額兵内每營準設公費名糧十分馬歩各半每年約餉乾銀千餘兩足敷公用至於兵丁馬匹已過五年倒斃與例相符者即動朋扣銀照例每馬定價銀九兩買補足額仍赴兵部驗看印烙十二年奏準歩軍統領衙門捕盜官員三營將備以及番役等拏獲人犯向無公所羈禁皆原差領囘看守聽侯審擬是以蠹役人等藉口守候待質飲食盤費之需致滋竇弊擬以衙署之内設立羈禁審犯之所仍請照監犯例支領柴米别委弁兵看守以杜兵番之藉端勒索但見有公署既無餘地且問事之處密邇街衢亦多未便請以瞻雲坊官房一所計九十四間作為衙署舊有之官房六十七間仍交與内務府察収又奏準巡捕三營遊守向無官給衙署是以隨地出資僦居不得於本汛𦂳要地方居住見在内汛皆然其外汛落鄉更難得堪作官廨之所皆於闗廂附近租賃民房既不便稽察巡緝且措辦房租實屬拮据請照五城坊官之例於該汛適中地方給與官房以為衙署似於汛守有益見在京城官房可作衙署者共五十處其房間多寡不等應酌量分撥將阡兒衚衕官房一所擬用二十九間撥給中營遊擊棉花衚衕一所撥給西南一守備上三條衚衕一所撥給東南二守備各十有七間朝陽門外大街一所計十有七間撥給外正東守備左安門外石佛庵一所撥給外正南守備十有四間左安門外興隆寺一所撥給南苑牆守備十有六間爛麪衚衕一所撥給南營遊擊二十九間小市一所撥給東南一守備牛街口一所撥給西南二守備各十有八間西直門外闗廂西計二十間撥給外南一守備東河沿一所撥給内北東守備延壽寺街一所撥給内北西守備各十有六間東直門外一所撥給外東北守備十有七間徳勝門外十有二間撥給外西北守備朝陽門外一所撥給外西一守備十有六間再中營外東南汛内及北營遊擊駐劄之處皆無官房南營外南二外南三汛内雖有房屋而間數不敷請將安定門外官地二畝有竒撥給北營遊擊廣渠門外馬館地内撥給外東南守備一畝令其起葢衙署右安門外官房七間增蓋四五間撥給外南二守備廣寧門外官房五間增葢六七間撥給外南三守備其所需工料銀即於本衙門存公房租内動用工竣日造冊咨送工部覈銷十三年奏準增設司務一人筆帖式四人請於房租銀内酌給三百兩以為養亷飯食之費又奏準八旗滿洲䝉古漢軍協尉各增養亷歩甲三分副尉捕盜歩軍尉各增養亷歩甲二分歩軍尉委署歩軍尉各增養亷歩甲一分乾隆三年奏準本衙門設有員外郎二人主事二人司務一人筆帖式十有二人書吏四名每年司官支領飯銀百兩筆帖式支領飯銀五十兩均於房租銀内給發但筆帖式差務繁雜所得飯銀實不敷衣食鞍馬之用至書吏向無飯銀供役維艱往往懸闕召募乏人應請筆帖式每人嵗增銀三十兩書吏每月各給銀四兩統於房租銀内給發六年奉㫖巡捕三營兵丁向未給有生息銀歩軍統領衙門入官房租一項除積年公用外見存銀萬餘兩著以九千兩賞給巡捕三營生息以為惠濟兵丁之用其如何委官經管該統領酌量辦理遵㫖議準歩軍營所轄八旗三營大小各官約五百餘員其中不免乏用之人著分别等差定以三四十兩之數有願支借者取保借給每月二分取息四季扣俸完本竢得息銀即酌量開賞仍於年終造冊報部察覈再見在初經營運應暫以二分起息竢日久息多該統領即酌量裁減於奏銷冊内聲明報部又議準歩軍營内舊無帳房該兵丁等每遇出差巡邏修道等事皆至露宿當三冬嚴寒雨雪時殊堪憐憫應於每旗滿洲設帳房二十架䝉古漢軍各十架共需帳房三百二十架即在工部庫貯項内揀選撥給應用又議準内外營馬草料均有一定價直獨三營馬匹給領豆草由五城司坊官採訪時價呈報户部支放價貴之時每月營馬一匹領至三両三四錢價賤之時領至二兩一二錢至一兩八九錢不等多寡懸絶漫無一定章程其中開報經手胥吏不免隨意高下而往返察覈動需時日營中每不能如期闗領不免借貸墊用加息償還之累應請嗣後三營馬匹豆草無論年嵗豐歉價值低昻酌中覈定每月營馬一匹酌給銀二兩五錢户部按月支放免其扣存加一節省按照實數覈給仍於嵗終將領過銀數造冊咨送户部察覈題銷七年奏準三營生息銀照直省滋生銀例每月以一分五釐取息九年奏準巡捕三營數年以來生息銀至六千四百四十餘兩自應酌量開賞但當差兵丁為數甚多若遇婚喪等事槩行賞給恐不敷用請自本年四月起三營兵丁遇有喪事交該營叅遊守等官詳悉察明實繫父母本身妻室照直𨽻例賞銀四兩先行開賞如有父子兄弟同在營食糧者不得重領至漢軍兵丁除有父子兄弟在旗當差者遇有喪事該旗領賞外其實止本身在營食糧者移咨該旗交該叅佐領察明出具印結咨送本衙門照民兵例賞給其喜事暫行停賞竢息銀敷用日再行議給統於年終報部察覈十年奏準三營兵丁遇有喜事照直𨽻例每名賞銀二兩二十一年奏準移歩軍統領衙署於地安門外日中坊橋之東一本屬文武官陞除員外郎員闕由本衙門移咨吏部轉行各部院於主事内簡選通曉滿漢文移熟悉刑名人誠實者咨送本衙門由統領簡選一二人同本衙門主事引見補授主事於本衙門司務筆帖式内選擬正陪引見補授司務於本衙門筆帖式内選擬正陪咨送吏部引見補授筆帖式移咨吏部照簡選督撫筆帖式例轉行各部院於筆帖式内將老成諳練者保送㑹同統領簡選由吏部引見調補左右翼歩軍翼尉員闕由本衙門行文該翼四旗滿洲都統䕶軍統領於驍騎叅領䕶軍叅領内每旗各簡選一人由統領引見補授八旗滿洲䝉古漢軍協尉於各該旗城門領副尉歩軍尉内簡選如歩軍營内無可陞之人行文各該旗於男以下騎都尉以上簡選若䝉古漢軍協尉員闕該旗内無可選之人將滿洲旗員通行遴選均擬定正陪引見補授副尉於該旗歩軍尉内選擬正陪歩軍尉㑹同該旗都統於委署歩軍尉及雲騎尉前鋒校親軍校䕶軍校驍騎校城門吏隨旗行走之五六七八品官調旗對品補用之部員内選擬正陪委署歩軍尉會同各該旗都統於雲騎尉䕶軍校驍騎校隨旗行走之五六七八品官選擬正陪均引見補授捕盜歩軍尉於該旗歩軍尉委署歩軍尉内簡選委用内九門城門領員闕於該旗副尉歩軍尉内簡選如歩軍營内無可簡選之人會同該旗於騎都尉雲騎尉等世爵内選擬正陪引見補授年老官員尚堪任用者亦準選擬内九門城門領䝉古旗分亦準與選引見城門吏由該旗都統於前鋒䕶軍領催驍騎内選擬正陪引見補授門千總移咨兵部銓補監守信礮總管員闕由八旗直年都統於八旗世爵及監守信礮五品官引見補授監守信礮五品官由該旗都統於騎都尉雲騎尉䕶軍校驍騎校六七八品官内選擬正陪引見補授巡捕三營叅將員闕以遊擊題補遊擊以守備題補守備以千總題補均由該統領簡選諳練地方材技優長之人引見補授千總以把總拔補把總以外委千把總及兵丁並發營補用之人選補外委千總以外委把總拔補外委把總於百總内拔補凡營弁降級調用者照所降之級仍以巡捕營弁補用乾隆八年奏準監守信礮官改𨽻歩軍統領管轄一拔補兵丁舊例八旗歩軍領催及捕盜歩軍均於該旗歩軍内拔補歩軍移咨該旗於本佐領下願充歩軍之正身開户及印契白契所買家人内選補如孤寡貧窮並無家人者準借親戚家下人充選内九門驍騎咨取八旗滿洲驍騎調補外七門驍騎咨取八旗漢軍驍騎調補十六門門軍皆召募民人充補每月給餉銀一兩米三斗内九門礮手咨取八旗漢軍礮手選補監守信礮領催礮手及歩軍均由該旗選補巡捕三營兵丁闕召募民人充補歩軍及三營番捕人役皆召募民人充補康熙五十三年暢春苑增設巡捕營兵百二十人奉㫖此增設馬歩兵著將漢軍閒散人等選補嗣後巡捕三營兵丁亦將漢軍與民人一并簡選雍正二年議準城門闗繫𦂳要門軍不宜召募民人應由八旗滿洲䝉古漢軍敎養兵内擇其壯健者充補仍食敎養兵餉再照門軍例每月給米三斗又定八旗敎養兵至二十五嵗不能騎射革退者仍準佐領鈴用圖記送本統領選補歩軍三年奉㫖圓明園增設巡捕營兵三百八十名著將内府佐領内管領下閒㪚人等選補乾隆三年議準巡捕三營有漢軍閒㪚并内府人等充補兵丁之例令八旗開户人等若選補驍騎既恐侵占滿洲正身食糧之數歩軍鐵匠等又繫養贍孤寡不便令其分占是開户人等終不得進身之路請嗣後營兵令八旗將開户及别載冊籍閒㪚人内有年力精壯弓馬可觀情愿就選者咨送同内府閒㪚人漢軍閒㪚人以及召募民人一例選充并準拔補管隊百總頭目至别載冊籍人雖與開户人等有别究其根本原同如有兵丁拔補頭目後果有才技優嫻實心効力者止準其拔補外委千總仍不得補用守備及經制千總把總四年奏準各門額設門軍四十人遇有闕八旗因無壯健敎養兵皆將幼丁咨送不惟不勝啟閉之任且不足以肅觀瞻見有三十餘闕計八旗額設歩軍二萬一千餘人若以此内選補門軍六百四十人所餘歩軍尚有二萬四百餘人看守堆撥柵闌巡街墊道一應差務仍屬敷用請嗣後門軍有闕停選敎養兵即於歩軍内擇其年力精壯者撥補仍食歩軍糧餉亦無庸别補歩軍七年議準選補三營兵向繫按月辦理將漢軍一項作為一月别載冊籍並開户人等與召募民人三項作為一月是三營兵闕漢軍應得一半有餘但八旗咨送之漢軍弓箭人材好者甚少每逢選補漢軍之月因無人可補不便將名糧遷就往往於别項應募人内選補是以民兵較之漢軍覺多應令八旗漢軍都統嗣後務將弓馬可以學習人材壯健者多為簡選照例案月委叅領送本統領衙門選補又議準外七門向無礮手請每門增設二名即於本門驍騎額内選補八年議準監守信礮領催礮手由統領咨該旗於領催礮手内選送調補監守信礮歩軍於該旗歩軍内調補一禁令順治初年定御道上不許閒人坐立親王以下出入不許由御道上行又定凡有人越京城者將管城門之城門領城門吏千總及城上直班之歩軍尉各降三級調用越城而未過者各降二級調用若越城之人未經上城即被拏獲者該管官皆免議又定京城内起更後閉柵闌自王以下官民人等槩禁行走歩軍尉等分定街道輪班直宿歩軍協尉仍行巡邏兵部不時委官察驗若柵闌不閉及不直更者領催鞭三十歩軍鞭二十七直宿歩軍尉罰俸兩月直宿協尉罰俸一月除奉㫖差遣各部院衙門差遣外其因喪事生産及問病延醫祭祀嫁娶行走者直宿歩軍尉領催歩軍等詳問事故記其旗分佐領姓名開柵闌聽出仍跟隨遞送交與附近該直歩軍放行如無事故夜行者如王公等登記姓名繫官或婦女即送至其家向鄰右説明被獲時辰繫民即於拏獲處所羈留均於次日呈報協尉轉報統領翼尉將無事故夜行之王公等請㫖交宗人府察議官員請㫖交部罰俸一月平人鞭五十若拏獲之人脱逃者直宿歩軍尉罰俸三月直宿協尉罰俸兩月如得財徇情縱放者直宿歩軍尉革職直宿協尉降三級調用若未經起更之先妄拏竢起更以後向鄰右説明或不向鄰右説明即行送部者將直宿歩軍尉罰俸三月直宿協尉罰俸兩月領催歩軍各鞭一百又定歩軍尉看守街道曠班不直宿者罰俸兩月不竢天明擅離汛地者罰俸一月領催有曠班不直宿者鞭五十擅離汛地者鞭三十歩軍曠班不直宿者鞭四十擅離汛地者鞭二十其失察領催歩軍之歩軍尉罰俸一月又定看守倉庫官物等處曠班者繫官降一級罰俸一年兵丁鞭六十八年題準官民人等孝服白帶摘纓者不許於闕左右門長安左右門出入大淸門下馬牌石闌前不許民人貿易又定皇城内住居人家遇有喪事但令僧道誦經禮懴外不許大作鼓吹送喪日皇城内不得撒颺紙錢康熙十三年定每嵗小暑起至立秋止由禮部移知傳行三營禁止砍伐樹木焚化紙錢清明節由禮部知㑹行内九門禁止掛紙錢佛朶出城又定正陽門永禁官民出殯又定如遇祭地壇安定門於祭前十日日壇月壇朝陽阜成二門各於祭日均由太常寺知會轉傳各門禁止出殯二十三年題準大内中路乃鑾輿經行御道不許官民行走午門内交與守門直班䕶軍叅領䕶軍校午門外交與兵部闕左右門天安門大淸等門交與直班歩軍尉歩軍今改歸五旗䕶軍叅領䕶軍校䕶軍嚴加察緝如有直行御道上者繫官交該部題叅議處繫兵民送刑部治罪如直班官員兵丁徇情不舉被科道官糾叅將直班官員兵丁一并交部議處二十九年奉㫖起火原繫禁止之物城外空地無人之所尚無妨礙今街道間即溷行㸃放房屋稠密草廬衆多甚屬可虞應嚴禁察拏其大臣院内㸃放者亦著一并嚴禁再花爆每於年節㸃放由來已久仍聽其便至唱稲秧歌不論忌辰素服日期皆於通衢肆行唱演且成羣女裝穿甲執棍互演跳舞甚屬非理著歩軍統領嚴加巡察緝捕餘仍聽其戲演三十四年奉㫖風筝從前亦繫禁止者今著準撒放其繫鈴鴿尾者嚴行拏禁四十三年奉㫖街道舖户人等從前設立木牌續於木牌地方改立捲篷後又於捲篷之前設立木牌多方占據街塗嗣後著該衙門察勘如有似此者斷不可準其修造五十九年奉㫖大城根下立有糞場致有穢惡之氣再天地壇乃至潔之處而附近地方亦有似此者悉令遷移於大道空逺處雍正二年定城内歩軍人等見有失火之處即報知相近該旗如繫東南正藍鑲白西南鑲藍鑲紅東北鑲黃正白西北正黃正紅各二旗往救如皇城之内每翼兩旗往救倘報火之歩軍有誤照曠誤火班例官員罰俸一年兵丁鞭五十失察之該管官罰俸兩月四年諭婦女寺廟燒香早行禁止今仍有拴繫駕馬前赴燒香者此習甚陋著嚴行禁止欽此七年奉㫖提督衙門及内務府畨役凡繫奉公守法實心効力者朕已加優賞以示鼓勵乃伊等小人竟有乘該管大臣耳目之不及生事訛詐至被騙害之人因番役皆繫爾等所屬惟恐瞻徇庇䕶不敢控訴隱忍含寃以致不法番役毫無忌憚不可不立専司稽察者今特簡王大臣等不時嚴察并出示曉諭如有番役仍前生事妄行訛詐等情許於稽察王大臣處具呈首告王大臣等量其情罪輕重或即奏聞治罪或知㑹該管衙門懲治俾番役咸知畏懼而無辜之人不致負屈於以輯暴安良大有裨益欽此十年奉㫖京城舊例每值三伏居民人等晩間聽其露處乘凉見今天氣炎熱傳諭歩軍統領著仍照例行十三年九月奉㫖日今天氣漸寒京城内外居民稠密火燭尤宜謹慎著歩軍統領飭所屬弁兵小心防範勿得稍有疎懈再嗣後倘遇有失火處如延燒房屋至三四十間以上即行奏聞十月諭古之葬者厚衣之以薪葬於中野後世聖人易之以棺槨所以變通宜民而達其仁孝之心也本朝肇迹闗東以師兵為營衛遷徙靡常遇父母之喪棄之不忍接之不能故用火化以便隨身奉持聊以遂其不忍相離之願非得已也自定鼎以來八旗䝉古各有寧居祖宗墟墓悉𨽻鄉土喪葬可依古以盡禮而流俗不察或仍用火化者狃於沿習之舊不思當年所以不得已之故也朕思人子事親送死最為大事豈可不因時定制痛自猛省乎嗣後如逺鄉貧人不能扶柩囘里不得已攜骨歸葬者姑聽不禁外其餘一槩不許火化倘有犯者按律治罪族長及佐領等隱匿不報一并處分朕又聞漢人多惑於堪輿之説購求風水以致累年停柩漸至子孫貧乏數世不得舉葬愚悖之風至此為極嗣後守土之官必多方勸導俾得按期葬埋以妥幽靈以盡子職此厚人倫美風俗之要務也欽此遵㫖議準京師旗民飭令歩軍及巡捕三營每嵗春秋嚴禁火化犯者重懲並出示勸令及時安葬以厚風俗乾隆元年諭據都察院審訊首告因事行賄刑部司官得銀五百兩一案全繫歩軍統領衙門番役等夥同匪類揑辭誣陷供證確鑿都察院又稱番役私用之白役人等俗名圓扁子並非額設衙役亦無定數每藉番役名色嚇詐生事若遂其所欲則將事件消弭否則告知番役捕治得受賞銀飽其谿壑且往往出銀設計誘人犯法民間甚為擾累向來歩軍統領衙門番役及内務府番役恣行不法往往遇事生風戕賊良善其索詐騙害之惡不可枚舉是以我皇考特命王大臣不時約束稽察此時稍知畏法歛跡今則日久廢弛復逞故智即如此案乃目前之顯然敗露者其他更不知凡幾朕又聞番役等竟將京城内外地方各人私自分管且將六部等衙門事件各令一人訪察此則可惡之尤甚者從來番役之設不過緝捕潛藏之盜賊逃竄之罪人與賭博宰牛等類至於部院之事自有該管大員與職司稽察番役何人而敢於私自窺伺以持其短長乎著歩軍統領嚴行禁止並將白役圓扁子之𩔖盡行革退不許私留一人致滋閭閻之擾嗣後倘有被番役等騙害者準本人赴刑部都察院控告該部院即據實奏聞朕必將番役等嚴審治罪不稍寛貸欽此二年議準五城闗廂設立米厰平糶原以接濟貧民自應嚴禁囤販但民間買米之人有離廠遙逺老弱婦女每藉小販到門就便買食此等小舖有米舂碓然後米可流通價不昻貴嗣後不許姦民串買囤積至四五十石及買作燒鍋之用其餘肩挑背負不過數石者槩免察究三年議準見今禁止米舖不許堆積米過五十石原為使市米流通無如姦商多賃房屋一舖散作數家或數十家不等巧為囤積應行令歩軍統領五城御史順天府尹不時稽察嚴拏究治其肩挑背負不過數石者仍準其糴買五年奏準盛京等處旗人身故祖塋遙逺不能送囘呈請火化歸葬者由該佐領申報都統移咨歩軍統領衙門委官往驗火化再京外旗人奉差告假出外身故無力扶柩囘京者呈報該處官員火化㩦囘其餘槩不準火化違者治罪佐領族長隱匿不報者交部議處欽定大淸㑹典則例卷一百七十九
