八百分撥各門均足敷用無庸再行備辦其演礮所需烘藥火藥鉛彈白布等物應照八旗之例於户工二部支領至所需礮手内城九門每門原額設二名於守門兵丁内選補其外城七門並無礮手應照例令歩軍統領亦於見在守門兵丁内各選補礮手二名令其學習放礮以供將來演放之用再八旗漢軍礮位繫三年一次演放原為操演火器營兵丁而設此項城門貯礮與八旗不同如亦以三年演放一次為期太速請以九年為期照例運至蘆溝橋隨八旗礮位令漢軍火器營協同演放運送車費及火藥礮子等項臨期令統領酌量辦理至此外未經演放之各門存礮仍照舊謹慎収貯各門城上九年奏準内外各城門安設礮位原議將各城礮内揀選百六十位每門各安設十位嗣經工部委官驗明可以成就礮車者只有七十九位餘均小礮不堪應用隨於八旗礮局餘存銅鐵大礮撥給一百十有九位以敷安設今屆八旗演礮之時將各城門存貯大礮並八旗礮局撥給餘存大礮共一百九十八位運至蘆溝橋設放揀選堪用者僅一百四十二若仍照原議之數安設不敷分布應酌請内城九門仍照原議各安設十位外城非内城可比七門各安設五位其餘剩堪用礮十有七位與各旗礮局存貯如有應用之處再行動撥其廢礮五十有六亦交與八旗存貯礮局十八年奏準各城門礮仍照舊例停止演放一緝捕康熙二十四年議準歩軍所管汛地有犯私鑄私燬及攙和小錢行使事發該管官知情者革職照例治罪失察者歩軍尉降一級罰俸一年協尉副尉降一級留任翼尉統領各罰俸一月有能拏獲者不論年月逺近皆免議繫本衙門官拏獲者該汛失察官免議若經別衙門拏獲失察之該管官仍議處又定歩軍營兵並無私仇別故因公事敎訓將該管官殺死者統領翼尉罰俸六月協尉副尉罰俸一年歩軍尉罰俸二年記讐殺死或因公挾仇刀傷該管官者統領翼尉罰俸三月協尉副尉罰俸六月歩軍尉罰俸一年又定城内黏貼匿名揭帖該歩軍尉等官不行緝拏別經發覺歩軍尉罰俸一年協尉副尉各罰俸六月翼尉罰俸三月統領罰俸一月又定番役兵丁私用非刑害人該管官不約束者革職又定歩軍尉汛内有違禁開設店面容留來路不明之匪類者將歩軍尉罰俸一年協尉副尉各罰俸六月翼尉罰俸三月統領罰俸兩月二十五年題準旗下逃人若歩軍尉拏獲至六十名者加一級協尉督率歩軍尉拏獲百二十名者加一級翼尉統計所管四旗歩軍督率拏獲至四百八十名者加一級統領督率八旗歩軍尉及番役拏獲至九百六十名者加一級數多者照此遞加議敘又議準歩軍尉等所管汛地内有在路身死者歩軍尉不將情由申報刑部罰俸六月又定歩軍營兵有犯鬭毆致死者統領翼尉罰俸三月協尉副尉罰俸六月歩軍尉罰俸一年又定旗員將歩軍拏至家中禁打者審實革職如禁打損傷者審實革職交部治罪若延醫祭祀嫁娶燕會因而夜行歩軍勒索不肯放行者歩軍鞭五十因被歩軍勒索即責打有傷者罰俸六月又題準歩軍尉於一年内拏獲强盜五名者紀録一次十名紀録二次十五名加一級三十名加二級協尉副尉所管歩軍尉等一年内拏獲强盜十名者紀録一次二十名紀録二次三十名加一級翼尉所管一翼歩軍尉等一年内拏獲强盜二十名者紀録一次四十名紀録二次六十名加一級統領所管八旗歩軍尉與番役等一年内拏獲强盜四十名者紀録一次八十名紀録二次百二十名加一級其所獲多者各照本管應得議敘按數遞加歩軍尉於一年内拏獲竊賊及强惡六十名以上者紀録一次百二十名以上者加一級二百四十名以上者加二級協尉副尉所管歩軍尉等一年内拏獲竊賊及强惡百二十名以上者紀録一次二百四十名以上者加一級翼尉所管一翼歩軍尉等一年内拏獲竊賊及强惡二百四十名以上者紀録一次四百八十名以上者加一級統領所管八旗步軍尉及番役等一年内拏獲竊賊及强惡四百八十名以上者紀録一次九百六十名以上者加一級拏獲多者均照數議敘如繫協尉副尉翼尉親身拏獲者照歩軍尉議敘至歩軍尉名下所獲之數雖不及紀録其統領翼尉仍總計議敘拏獲强盜竊賊惡徒均由刑部定擬彚咨兵部議敘二十六年覆準拏獲持刃傷人之賊首先擒拏之人賞銀十五兩第二人賞銀十兩第三人賞銀五兩若所獲繫但持刃而未至傷人者不給賞三十七年議準京城内遇有强盜白晝傷人搶奪財物該汛歩軍尉等將賊犯當場拏獲及一月之内全獲者免議如一月内拏獲一半歩軍尉罰俸一年協尉副尉罰俸六月賊犯照案緝拏如一月内不嚴緝致賊逺逸者歩軍尉降二級調用協尉副尉降一級調用所有加級紀録不準抵銷翼尉罰俸一年統領罰俸六月汛地歩軍等各鞭一百賊犯交與接管官照案緝拏又議準步軍領催等將拏獲賊犯得財私放該管歩軍尉失於覺察其贓在十兩以下者罰俸一年十兩以上者降一級留任知情故縱者革職四十一年議準京城内盜賊傷人刼去財物將該汛歩軍協尉副尉各罰俸九月翼尉罰俸六月統領罰俸三月盜案照數緝拏該汛直宿歩軍尉降二級留任罰俸一年限一年緝獲本汛管街領催歩軍及本汛看守柵闌歩軍各鞭一百如一年内拏賊一半歩軍尉準其開復一年限滿獲不及半無別案失事者歩軍尉降二級調用本汛領催歩軍看守柵闌歩軍皆枷一月鞭八十一年不獲又失事者歩軍尉降三級調用本汛領催歩軍看守柵闌歩軍枷四十日鞭一百革退未獲逸犯交接任官照案緝拏驍騎堆撥相近處失事該直班官罰俸一年驍騎照歩軍例治罪又議準惡徒在街肆行無忌或藉端挾詐勒騙財物公然搶奪攪擾市肆行兇者責成該汛歩軍尉並歩軍翼尉協尉副尉不時緝捕有失察