body:
  text: 歩軍統領一建置順治元年設提督九門歩軍統領歩軍翼尉歩軍協尉歩軍尉等官鑄給歩軍統領印信統轄八旗歩軍營歩軍領催歩軍是年建廵捕南此二營設叅將二人遊擊二人把總十人以兵部主事一人督之又設筆帖式四人十四年建廵捕中營設叅將一人遊擊一人把總五人康熙三十年命歩軍統領兼管廵捕三營換給提督九門歩軍廵捕三營印信是年奏準増設守備十五人千總六人把總三人又設南營暢春園守備一人把總一人中營南苑牆守備一人千總一人把總二人又増設筆帖式四人五十一年増設暢春園守備一人把總一人又増設静明園把總一人六十一年設員外郎一人雍正元年增設圓明園守備一人千總一人把總一人八年增設員外郎一人主事二人十二年建歩軍統領衙署於京畿道衚衕三營增設千總七人把總六人十三年增設司務一人筆帖式四人一門禁順治初年定午門外朝會坐班行禮處各官隨從交該旗委出之驍騎校並管守朝房之歩軍尉槩行驅逐倘有容留將驍騎校歩軍尉及從役之本主皆罰俸一月又定每月逢五常朝日由禮部咨兵部轉行本衙門於黎明啟正陽門又定恭遇御門聽政日城外居住官員應早入者由兵部行文於曉鐘後啟正陽門又定遇壇廟祭祀日期内外城陪祀各官有應早入城出城者均由太常寺先期咨兵部轉行於五鼔後啟門内務府衙門遇有祭祀出城取水豫期行文或早啟或遲閉其餘各部院八旗有應早啟城門出入者均豫具印文移咨兵部覈明應行者轉行本衙門啟門放行如無兵部印文槩不準啟又定凡遇朝會之期本衙門委歩軍協尉四人副尉四人歩軍尉十有六人歩軍酌量差撥在午門外大淸門内御道兩旁禁止喧譁又於長安左右門外每門委捕盜歩軍尉二人阻逐閒人康熙三十一年定凡遇行幸駐蹕暢春園城内各衙門按日前往奏事傳知西直門德勝門西便門駐蹕南苑傳知正陽永定等門均酌量早啟遲閉其平常行人仍於黎明時放行三十八年議準正陽門城門領驍騎等皆由八旗充補毋庸議調其崇文等八門城門領城門吏千總若令各按本翼調門看守管轄不致瞻徇於門務有益應將鑲黄正藍二門城門領城門吏千總等即對調看守其正白鑲白二門正黃鑲藍二門正紅鑲紅二門城門領城門吏千總等亦令照此對調看守其兵丁等仍按各旗留門看守雍正四年奉㫖歩軍統領衙門及正陽西直二門各給陰文合符一扇傳諭歩軍統領如遇夜有奉㫖差遣及𦂳急軍務應即時啟門者正陽西直二門竢大内持出陽文合符至門該城門領將該門之陰文合符照驗明白即行啟門仍報知統領其餘各門遇陽文合符至門該城門領即報統領親齎陰文合符至門與陽文合符照驗啟門於次日具奏平時啟閉仍遵例行七年奉㫖大清天安端門此三門向繫歩軍營看守若調用䕶軍八旗䕶軍校䕶軍等是否足敷差遣令䕶軍統領等酌議具奏欽此遵㫖議準上三旗看守之處甚多下五旗叅領䕶軍校䕶軍惟有看守紫禁城之責請將大淸門天安門端門每門委下五旗䕶軍叅領一人䕶軍校二人副䕶軍校二人䕶軍十有六人看守其灑埽仍令歩軍營管理乾隆十二年議準車駕廵幸有叩閽人在歩軍營管轄之内者該管歩軍尉罰俸六月協尉罰俸二月該汛歩軍鞭八十若在御路稍逺在歩軍營管轄之外者歩軍尉罰俸三月歩軍協尉罰俸一月歩軍鞭四十又定凡遇駕宿齋宫統領於附近城門内直宿翼尉一人協尉副尉四人於壇内直宿外垣以内設八旗歩軍汛二十四處歩軍尉十六人每汛領催一人歩軍六人竟夕巡邏三營叅將遊擊各一人在要路防守外垣外三營共設汛四十處每汛歩兵四人每十汛千把總各一人徹夜巡邏守備二人往來稽察又定乘輿經過在大城内各街道由統領率屬督領歩軍修墊埽除若大城外屬京汛所轄之街道由統領率八旗歩軍及三營官兵修墊埽除如遇橋梁有應行修理者即行大興宛平二縣搭葢修理一守衛皇城内各處汛守分旗畫界鑲黃旗滿洲地方在紫禁城北東自地安門箭亭皇城牆起西至地安門甬路分中接正黃旗界北自火藥局皇城牆起南至三眼井接正白旗界中設歩軍尉二人後各旗同分汛十每汛設歩軍十有二人後各旗同柵闌十有八座每座設歩軍三人後各旗同景山後管理街道灑水兼管河道歩軍尉一人後各旗歩軍尉職掌同歩軍百二十人後各旗歩軍人數同正白旗滿洲地方在紫禁城東北東自内府庫東口東牆起西至景山東牆止北自三眼井起南至銀牐風神廟接鑲白旗界分汛十有一栅闌十景山東門設歩軍尉歩軍如前鑲白旗滿洲地方在紫禁城東東自騎河樓東牆起西至北池子止北自宣仁廟起南至北池子南口並望恩橋北接正藍旗界分汛十栅闌十有三北池子街設歩軍尉歩軍如前正藍旗滿洲地方在紫禁城東南東自東安門東皇城牆起西至南池子街止北自北池子街並望恩橋起南至蒼蒲河皇城牆止分汛十有一栅闌九南池子口設歩軍尉歩軍如前正黃旗滿洲地方在紫禁城北東自地安門甬路分中起西至西十庫止北自侍衞敎場皇城牆起南至𢎞仁寺分中接正紅旗界分汛十有二栅闌十有六内十座各設歩軍三人餘六座即附近汛兼管地安門内設歩軍尉歩軍如前正紅旗滿洲地方在紫禁城西北東自景山西門起西至西安門皇城牆止北自𢎞仁寺分中起南至西安門甬路分中接鑲紅旗界分汛十有二栅闌十有七内十一座各設歩軍三人餘附近汛兼管景山西門設歩軍尉歩軍如前鑲紅旗滿洲地方在紫禁城西東自大高殿門分中接正紅旗界起西至西安門皇城牆止北自西安門甬路分中起南至大石槽皇城牆止分汛十有二柵闌二十四内一座即附近汛兼管光明殿後設歩軍尉歩軍如前鑲藍旗滿洲地方在紫禁城西南東自西華門起西至西苑門止北自慎刑司接鑲黃旗界起南至南府皇城牆止分汛十有二栅闌九内三座即附近汛兼管西華門外設歩軍尉歩軍如前以上八旗均按該管地方逺近界址防守稽察夜則巡更擊柝每汛設立更籌自初更起上下汛往來傳送至黎明乃止皇城外大城内各處汛守分旗畫界鑲黃旗滿洲地方在大城北䝉古旗同東自新橋起西至舊鼓樓大街接正黃旗界北自安定門城根起南至紅廟後接正白旗界中設歩軍尉五人後滿洲各旗同分汛五十三每汛歩軍十有二人後各旗歩軍人數同柵闌九十四座每座歩軍三人後各旗同激筩十有三後各滿洲旗同䝉古旗地方東自東直門北小街口接本旗漢軍界起西至新橋西接本旗滿洲界北自北城根接本旗滿洲界起南至汪家衚衕西口接正白旗界中設歩軍尉二人後䝉古漢軍各旗同分汛二十二栅闌二十九激筩四後䝉古漢軍各旗同漢軍旗地方在大城東北東自東直門城根起西至新橋東接本旗䝉古界北自角樓迤西接本旗滿洲界起南至南水闗接正白旗界分汛十有七栅闌二十七正白旗滿洲地方在大城東䝉古漢軍旗同東自朝陽門北城根起西至地安門大街分中接鑲黃正黃旗界北自汪家衚衕西口起南至大市街接本旗䝉古界分汛五十一栅闌九十䝉古旗地方東自拐棒衚衕東口接鑲白旗界起西至皇城牆止北至兵馬司衚衕接本旗滿洲界起南至報房衚衕接鑲白旗界分汛二十栅闌三十五漢軍旗地方東自朝陽門城根起西至雞鵝市接本旗滿洲界南自南小街口接鑲白旗界起北至何家口接本旗滿洲界分汛十有四栅闌三十一鑲白旗滿洲地方在大城東䝉古旗同東自東城根起西至皇城牆止北自炒麪衚衕西口接正白旗界起南至金魚衚衕東口接本旗漢軍界分汛四十六栅闌八十䝉古旗地方東自城根中心臺起西至東安門止北自小石槽衚衕接本旗滿洲界起南至小街口接本旗漢軍界分汛十有三栅闌三十五漢軍旗地方在大城東南東自東城根起西至王府大街院府衚衕口止北自金魚衚衕東口起南至就日坊三條衚衕接正藍旗界分汛十有二栅闌十有八正藍旗滿洲地方在大城南䝉古漢軍旗同東自城根起西至皇城牆轉西至長安左門止北自三條衚衕起南至小報房衚衕西口接本旗䝉古界分汛四十五栅闌八十七䝉古旗地方東自城根起西至敷文坊東口接本旗漢軍界北自小報房衚衕起南至城根止分汛十有九栅闌四十五漢軍旗地方東自敷文坊東口起西至碁盤街分中接鑲紅旗界北自兵部街北口接本旗滿洲界南至城根止分汛十有五栅闌十有五正黃旗滿洲地方在大城北北自德勝門城根起南至皇城牆西北角止東自地安門分中接鑲黃旗界起西至水闗橋止分汛五十五内一汛止設歩軍五人栅闌九十一内三座繫附近汛兵兼管激筩十有五䝉古旗地方在大城西北漢軍旗同北自北城根起南至官園口止東自橫橋起西至西直門止分汛十有八栅闌三十内二座繫附近汛兵兼管漢軍旗地方北自北城根起南至臭皮衚衕接正紅旗界東自水闗接本旗滿洲界起西至橫橋接本旗䝉古界分汛十有八栅闌四十一内一座繫附近汛兵兼管正紅旗滿洲地方在大城西䝉古漢軍旗同北自臭皮衚衕起南至丁字街止東自大市街分中起西至馬石橋接本旗䝉古界分汛三十八栅闌七十九内六座繫附近汛兵兼管激筩十有四䝉古旗地方北自朝天宫前起南至武衣庫衚衕止東自馬石橋起西至阜城門止分汛十有四栅闌三十六内六座繫附近汛兵兼管漢軍旗地方北自倉夾道北柵闌起南至西安門分中止東自皇城牆起西至大市街分中接本旗滿洲界分汛十柵闌十有四鑲紅旗滿洲地方在大城西南北自按院衚衕起南至南城根止東自瞻雲坊分中起西至西城根止分汛四十八柵闌九十六内十一座繫附近汛兵兼管激筩十有四䝉古旗地方在大城南漢軍旗同北自絨線衚衕接本旗滿洲界起南至宣武門止東自六部口起西至大濠止分汛十有三柵闌二十三内二座繫附近汛兵兼管漢軍旗地方北自刑部門分中起南至南城根止東自碁盤街分中起西至六部口接本旗䝉古界分汛十柵闌三十九内七座繫附近汛兵兼管鑲藍旗滿洲地方在大城西蒙古旗同北自丁自街接正紅旗界起南至瞻雲坊接鑲紅旗界止東自皇城牆起西至河漕沿止分汛五十栅闌九十七内六座繫附近汛兵兼管䝉古旗地方北自武衣庫衚衕接正紅旗界起南至按院衚衕止東自河漕沿起西至西城根止分汛十有五柵闌二十四内四座繫附近汛兵兼管漢軍旗地方在大城南北自灰厰接本旗滿洲界起南至刑部門分中接鑲紅旗界止東自長安右門起西至瞻雲坊接本旗滿洲界分汛十柵闌三十四内三座繫附近汛兵兼管以上二十四旗均按該管地方逺近界址防守稽察夜則廵更擊柝每汛設更籌自初更起上下汛往來傳送黎明乃止大城外三營分管地界東三汛北營外西一守備汛内所轄至大王莊觀音堂止中營外正東守備汛内所轄至雙橋止外東南守備汛内所轄至北鹿司村止均接通州界南二汛中營外正南守備汛内所轄至南苑北牆止南營外南二守備汛内所轄至西紅門三官廟止均接舊州營界西二汛南營外南三守備汛内所轄至大井村止外南一守備汛内所轄至田村府君廟止均接拱極營界北二汛北營外正北守備汛内所轄至淸河利水橋河沿止接鞏華營界又外東北守備汛内所轄至羊房村止接沙河汛界以上各汛統以南北中三營叅將各一人中營所屬馬兵汛五十四歩兵汛五十五柵闌百九十三鳥槍百激筩五南營所屬馬兵汛六十二歩兵