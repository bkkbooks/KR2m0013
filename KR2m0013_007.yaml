body:
  text: 吏部文選清吏司月選一一旗貟按闕補用順治初年定凡官貟𨽻滿洲旗者以滿洲額闕用𨽻䝉古旗者以䝉古額闕用𨽻漢軍旗者以漢軍額闕用不得互相調補一旗貟改公額康熈十年題凖各部郎中堂主事定為公額八旗通行升用又題凖䝉古貟外郎以下官貟亦改為公額八旗通行升選雍正六年奏凖科道郎中貟外郎堂司主事及小京官等貟闕均定為公額八旗通行升選至鑾儀衛主事一貟為上三旗公額仍照定例升選乾隆十四年奏凖内閣中書清字本房七貟漢字本房七貟作為公額八旗輪用一科甲除授乾隆四年諭今年繙譯㑹試取中二十二人雖從前有照例殿試之議但此科人數甚少不必舉行殿試皆著賜進士出身吏部引見候朕酌量録用其優者以六部主事即用次者在主事上學習行走該堂官照例題補又次者照滿洲進士例選用内有見任者即在任候升不必出闕欽此又奏凖内務府旗鼔佐領下閒散文舉人與八旗漢軍閒散文舉人一例選用知縣其内府旗鼔佐領下文舉人出身之内務府筆帖式等仍不凖其與外旗一例較俸升用主事等闕其内府閒散繙譯舉人並繙譯舉人出身内務府筆帖式等内務府均有應升應選之闕不凖其與外旗人貟一例升選六年諭滿漢進士原屬一體嗣後滿洲進士亦著照依甲第名次選用知縣俾其漸悉民瘼學習外任之事欽此又奏凖䝉古進士一例照依甲第名次選用知縣其繙譯進士繫分闈中式應附於夲科之後挨名選用又議凖嗣後翰林院典簿詹事府主簿光禄寺署丞國子監監丞博士典簿等貟闕不論雙单月除滿洲䝉古進士繙譯進士不行銓補外悉歸滿洲䝉古舉人挨科分名次擬定正陪補用其有由舉人筆帖式中式進士情願具呈留夲衙門行走者仍凖其在夲衙門行走遇應選知縣之時仍照甲第名次選用知縣未選知縣之前若俸次已深應升漢字堂主事者亦凖升補至如单月有闕遇科甲出身之降調人貟其品級應用小京官者亦凖其一例補用七年奏凖滿洲䝉古文舉人出身之筆帖式與閒散文舉人一例按科分名次凖以知縣銓補又奏凖滿洲䝉古進士繙譯進士及文舉人於未用之先定期考試其考試之處由部彚齊人數奏請欽㸃大臣考試試卷進呈後引見其奉㫖外用者進士與漢進士照甲第名次選用舉人歸於雙月知縣兩班之後照科分名次選用知縣不凖外用者以國子監監丞等小京官十三闕用國子監監丞一闕博士一闕典簿一闕翰林院典簿一闕詹事府主簿一闕光禄寺署丞八闕十六年奏凖見任筆帖式中式繙譯進士奉㫖以知縣歸班選用者令其在任候升不行開闕嗣後如各項候補筆帖式中式進士奉㫖歸部銓選者遇伊等應補筆帖式時亦應凖其一例選用得闕後仍照見任之例在任候升十九年奏凖八旗繙譯㑹試之設原欲令滿洲人等學習國書並非專以科名為重乃近年以來八旗應試之人多事鏤刻字句希圗中式於實在繙譯文義轉覺相去逾逺况八旗通曉漢文者既可專就文闈以博科第而曉習繙譯之人原皆可考取内閣中書及筆帖式庫使等項亦不必藉郷㑹試以為進身之階請嗣後除繙譯生貟應仍照舊考試留為伊等考取中書筆帖式之地其鄉㑹二試請永行停止一各官開闕康熈三十九年題凖凡大小官貟由開列推升者以奉㫖科鈔到部日開闕承襲官爵者由該旗咨到日開闕保題調補回旗等項由各該處咨到日開闕休致告病觧任質審降調革職及京察甄别處分官貟竢考功司移付文選司日開闕病故者由該衙門該旗咨部日開闕其科鈔咨文移付等項每月三十日以前到部者作夲月之闕三十日以後到部者作為下月之闕其事闗開闕各衙門均於五日内行文到部繫考功等司者即行回堂移付文選司開闕至竢具題奉㫖方凖開闕者均於每月二十五日以前具題如有遲延皆照例議處一各衙門留闕雍正十三年議凖各部院滿漢郎中以下等官貟闕例應題補者務於每月三十日截限以前將所題之人咨部察明是否合例並知照各該科道以便稽察其保奏人貟亦應定於次月截限以前即行保奏如所題之人遇有出差事故亦於截限以前即行咨部歸於月分銓選倘已過截限之期始行咨留者一概不凖題補或留闕之後又復輾轉遲延逾限不能題補一經察出叅奏將該堂官交部察議乾隆四年議凖凡奉㫖交部補用及奏眀留部題補者無論應題不應題之闕仍凖該堂官酌量奏請補用九年題凖各部滿漢司官貟闕近日保題者多歸選者少致令應升及候補候選之人多致壅滯於銓法未為均平請令各部院堂官覈明各司辦理事宜定為題闕注册各按闕底保題刑部向例遇有闕出咨一留一所題闕數未免過多請嗣後滿漢司官貟闕如有三闕凖其咨二留一其例應保題之滿漢各官應仍照舊例於截限以前將所題之人合例與否行文到部察覈咨覆後聽該衙門自行引見補授倘保題無人仍咨部歸入月分銓選十三年覆凖滿司官照漢司官一例分司定額其有䝉古司官者亦令該堂官一并酌覈分𣲖自分定之後止許該堂官量材更調不得更有増减一留館開闕雍正十三年議凖各部司官筆帖式奏明留館辦事者其貟闕歸部别選各照原銜食俸升轉竢該館告成時各回原衙門於額外辦事遇有原衙門應補之闕即行坐補乾隆三年奏凖凡有奉特㫖升用人貟該館仍留在館行走者由部奏聞請㫖一議官掣籖雍正三年覆凖凡奉㫖即用及扣除别補迴避人貟無論雙单月不入班次即行選用捐納議叙人貟較日期先後補用降調候補開復人貟較文到先後補用如議叙人貟同日奉㫖捐納人貟同日到部有俸者論俸之深淺食俸相同者論資格之先後如捐納議叙人貟注有即用字様雖繫同日同俸凖以本班先用又覆凖郎中以下等官每月於三十日截限初一至初三日司議初四日堂議初五日傳齊各官到部將籖封固公同籖掣其十二月正月封印前後所出之闕均於二月初五日掣籖仍按雙单月升選出差外任者堂官代掣掣籖之後見任者咨取本衙門堂官考語見任及候補者咨取各旗察眀該貟本身及祖父有無拖欠錢糧覆齊後引見其部院堂官出具考語有辭語含糊與例不合者即行文該衙門更改至外任官貟掣籖後行文該管官出具考語給咨該貟赴部附於每月月選官後補行引見出差患病者差滿病痊之日亦附於每月月選官後補行引見一清漢字分闕順治初年定滿漢貟外郎以上及司主事小京官等貟闕升選各官均不分清漢字様通行補用堂主事翰林院典簿等貟闕均按清漢字様分别補用雍正十二年奏凖六部漢字堂主事不論雙单月將由科甲出身人貟升用五人後將繙譯舉人出身之小京官筆帖式論俸升用一人单月有闕其科甲出身之降調人貟亦凖一例補用一科甲出身知縣改補乾隆八年議凖滿洲科目人貟已就知縣各官有自揣不勝民牧之任情願補用小京官者凖其於臨選之時呈明改補不論雙单月遇有國子監監丞等十三闕通照改補日期先盡補用其不自度量必欲銓選知縣等官及到任後不能勝任者該督撫即分别題叅如果有不宜外任為人實繫謹慎才尚可用者該督撫將伊應否改補小京官之䖏具本聲明送部引見恭候欽定倘䝉俞允即以國子監監丞等十三闕不論雙单月遇有闕出通較奉㫖日期與見在應選文舉人等輪流間用一官貟迴避康熈三年題凖各部院尚書以下筆帖式以上祖孫父子親伯叔兄弟若同一衙門令官小者迴避十年議凖同衙門補授同官應迴避者將候補之人迴避乾隆十四年奏凖旗貟月選如有應迴避者掣籖後呈明即凖迴避以别闕掣補如有一人一闕應迴避者扣除歸下月銓選仍行文該旗取具本旗都統印結送部存案如繫應升應選者照例以迴避日期較各項年滿即用日期先後銓選其外任年滿並各項即用迴避人貟補用時仍照從前年滿即用日期先後補用十六年題凖滿洲聚䖏京城而支分𣲖逺旗分各異者亦與漢人之散居各處者無異嗣後滿貟雖繫同住京城而旗分各别又出五服之外應照漢貟支分𣲖逺各省各府毋庸迴避之例毋庸迴避十八年奏凖繙書房筆帖式十貟由户刑二部各撥五人令專在繙書房行走一應京察保送由繙書房大臣甄别與户刑二部原無闗礙與同一衙門行走者有間應毋庸迴避又奏凖各衙門出差人貟有適遇祖孫父子親伯叔兄弟升至同衙門者向來皆令迴避惟是出差之貟既未在衙門行走應竢差滿回京之日再令其迴避一旗貟終飬乾隆九年遵㫖議凖旗貟補用外任如陵寢及東三省官貟筆帖式各省駐防將軍城守尉督撫随印筆帖式雖繫外任究非地方有司可比有告請歸旗終飬者應仍照舊辦理無庸再議外其滿洲䝉古見任藩臬道府同知通判州縣及滿洲䝉古理事同知通判等官如遇祖父母父母年老例得終飬者照例凖其具呈該管上司出具切實考語題奏到日由部咨察該旗出具確實印結報部令其回京各該䖏引見請㫖遵行至漢軍外任官貟從前告請終飬者均照漢人例辦理但漢軍滿洲䝉古均繫旗人在旗在部均可補用原與漢人不同嗣後漢軍外任各官告請終飬者亦照此例令其回京各該䖏引見請㫖凡滿洲䝉古漢軍告終飬外任各官引見時除奉㫖以旗貟補用者應聼各該旗辦理並奉㫖指明以何部何官即用者照例補用外如奉㫖以部貟改補者自應按照品級改補如藩臬均繫大貟例應改補京堂應照例與應升人貟開列具題請㫖如繫道府例應以各部郎中貟外郎補用理事同知通判及地方同知例應以主事補用知州與地方通判例應以七品小京官補用知縣一項因飬親以京官補用者仍應以科甲小京官改補漢軍知縣因飬親以京官用者以各部院衙門漢軍七品筆帖式改補其應改補小京官以上人貟均於雙月升選五人後選用一人其漢軍知縣應改補筆帖式者入於各本旗應用筆帖式人貟内無論是否積算於用五人後選用一人至見任京職應升應選外任各官如有親老在堂二三年即屆終飬之期者由部於伊等將及應用之時每項按人數多寡截取數貟咨察該旗令其自揣如有親年衰老難以久任情願終飬者即於該旗呈明取具確實印結咨部轉奏停其補用外任仍在見任京職行走再滿洲䝉古漢軍候選外任者止有進士舉人之筆帖式并閒散進士舉人應選知縣一項其滿洲䝉古候選知縣人貟告終飬者如繫見任之貟仍令見任上行走繫閒散科甲候選知縣者以應用科甲小京官照科分名次補用漢軍候選之閒散進士舉人告請終飬在京無應用之官應照見任知縣告請終飬之例以七品筆帖式補用此等候選人貟亦於將屆選用之前每項截取數貟咨察該旗如有親老情願終飬者呈明該旗照例取結報部注册停其銓選外任此等外任改補及候選改補京官與見任停其升選外任各貟如飬親之際遇有在京有應升之闕仍凖其與京官一同較俸升轉再飬親無一定年限至應補之日補用外官不免有衰老之人應令各該堂官於各貟起復之時察明該貟年力並無衰老咨部仍以應得外任補用如有實在年力衰老者停其補用外任仍令在京職上行走再此等人貟在京養親之際未經升任者如繫外任改補京職之人遇有應得之闕照丁憂起復之例補用如繫在京見任及候選改補京職之人歸於本班遇有應得之闕先盡選用如養親之際已經升任者照伊見任京官品級應用之外任不論雙单月升補選用五人之後選用一人以上各貟如有應遴選引見者亦照例與記名人貟一同引見再州縣佐貳以及雜職漢軍人貟在京並無可補用之官此等人貟無論見任及候補候選如有告終養者均無庸題奏移咨到部轉咨該旗遇有應行簡補差使之處如有情願充補者準其充補竢伊等應補之日仍以各應得外任歸於夲班先盡選用至漢軍捐納各項人貟如有因親老告終飬者竢應補之日仍歸原班選用再服滿候補開復赴補並由見任降補各官有親老請終飬者即令該貟於起文赴補之時呈明該旗取結報部停其補用外任令各該處照見任外官終飬之例將該貟引見請㫖如䝉恩以京官補用亦照伊品級以京官補用至一應升轉與應補之日補用外任之處均照見任外任改補人貟之例辦理此等呈報終飬各官如咨察時並不豫行呈眀及赴任後二三年内復請終飬者槩不凖行倘有假揑事故浮開年嵗藉端規避等情一經發覺將該貟及出結各官照例議處一官貟丁憂起補乾隆二年議凖官貟遇有丁艱在二十七月内者除奉特㫖升補外其餘凡有升遷停其開列升轉服滿後仍凖算俸五年奏凖凡應升應選應補人貟已經銓補得官適遇親喪扣除及服制内因過班過闕未經銓用者如繫雙月之人仍歸雙月先盡銓用单月應用者仍歸单月先盡銓用如繫數闕之貟服制内過闕者服滿後凖其不積算闕即用至過班過闕人貟内有同月同班服滿者以每月截限以前先行掣定名數挨次銓補其各省之終飬旗貟至應補之日如未滿年分一年以外者仍以外任用在一年以内者再扣一年半年以内者再扣半年均以京官用病痊起補人貟已經坐補得任又因服制扣除服滿後如京闕官貟凖其以京官通補如盛京陵寢等處官貟凖其以盛京陵寢等處貟闕通補如繫有年限之闕凖其以有年限之闕通補内有年限未滿者照旗貟終飬之例扣限補用如奉㫖指定何衙門者服滿時仍以指定衙門補用一官貟丁憂借署乾隆十五年遵㫖奏凖丁憂道府人貟其借署應照改補之例道貟以郎中借署知府以貟外郎借署同知知州以主事借署通判以七品小京官行走知縣以八品小京官行走遇有七八九品小京官貟闕均凖借署至由小京官筆帖式外用以次升至道府等官丁憂者除原衙門有相當貟闕仍在原衙門行走外其原衙門並無品級相當應行奏署之闕及由閒散舉人進士升任並無原衙門可以行走者應傳令該貟等赴部掣籖分發部院衙門額外行走遇有相當闕出令該堂官奏請署理至丁憂回旗引見奉㫖不宜外任同知通判州縣等官亦照以上借署之例辦理竢服滿之日題請實授一官員患病候補乾隆元年議準患病解退官貟病痊咨送候補者入於單月原衙門有闕先盡坐補四年奏準滿洲文職各官無論見任及推升擬補尚未到任人貟如實繫患病令該管官委官驗看並無揑餙者酌給假期咨部存案在家調治不得逾六月之限如逾限不痊即咨部開闕竢病痊仍以原衙門補用其額外食俸官貟亦照此例定限如逾限不痊即行停俸病痊仍在原衙門行走如各貟無疾揑稱有疾者發覺照例議處一先後記名人貟論俸乾隆十三年奏準嗣後記名以道府用之滿洲郎中以同知通判用之滿洲小京官止於同日記名人貟内論俸升用其後次記名者竢前次人貟用完再將後次記名人貟論俸升用一廕生錄用康熈十年題準滿洲一品官廕生以貟外郎用二品官廕生以部院司主事都察院經歴大理寺寺丞光禄寺署正用三品官廕生以通政使司經歴太常寺典簿部寺司庫光禄寺典簿用四品官廕生以鴻臚寺主簿用如學習期滿該部院奏留以本衙門筆帖式補用者遇本衙門本旗貟闕準其坐補䝉古一品官廕生以貟外郎用二品官廕生以司主事用三四品官廕生以部院筆帖式用均竢學習期滿奏明留部歸班分别叙用乾隆元年奏準文武官貟廕生廕監生至十八嵗有情願在武職行走者該旗咨部準其随旗行走其年二十以上者咨部引見如奉㫖以旗貟用者令其隨旗行走分部學習者令其掣籖分發各部院衙門試看學習照品級食俸二年期滿該堂官出具考語㨿實奏聞移咨到部按伊品級照例銓補三年議準各部院年滿廕生仍遵照奏準之例令該堂官甄别如果有才識出衆之人即指名保題留部以該貟應得之官題補其行走勤謹堪辦部務者奏明咨部歸於月分照期滿日期先後選用其未得官之先仍在本衙門學習行走食俸候補不準濫行題補其行走平常不能辦理部務者咨回該旗隨旗行走四年奏準分部廕生二年期滿該堂官照例甄别除歸班選用者得闕引見候㫖簡用外其留部補用之貟該衙門於伊等期滿奏聞之時已經引見遇有貟闕知照到部照例題補其雖經奏留尚未引見者於得官時該堂官仍行引見凡滿洲䝉古補廕復廕之例與漢官廕生同一雙月升選原定郎中以下等官先盡即用之人如無即用之人宗人府理事官各部院郎中將應升官貟論俸擬正陪升補宗人府副理官各部院貟外郎一升一選應升官與一品廕生分闕間用各部院衙門司主事大理寺寺丞都察院經歴光禄寺署正等貟闕用應升二人二品廕生一人學習期滿進士一人散館庻吉士一人年滿大使並三庫司庫一人較年滿日期先後用宗人府經歴各部院清字堂主事都察院都事太常寺寺丞等貟闕用應升二人二品廕生例不選用清字堂主事等闕仍將應升之人抵補學習期滿進士一人散館庻吉士一人年滿大使並三庫司庫一人如進士庻吉士二項皆無人將應升之人抵補一人漢軍大理寺寺正用應升一人二品廕生一人通政使司經歴太常寺典簿部寺司庫用俸深筆帖式應升一人三品廕生一人鴻臚寺主簿用俸深筆帖式應升一人四品廕監生一人其小京官内通政使司清字知事大理寺評事太常寺博士部寺司務無論升選二人後用年滿大使