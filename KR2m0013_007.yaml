復之日方凖照常升轉又在部院行走未經坐補額設之官者均竢坐補後方凖照例升轉三十九年題凖俸深各官遇應升應改者論俸擬正陪具題如食俸相同者令其籖掣名次分别正陪具題其候補官貟按文到先後挨次録用若同日咨送均照見任官例令其掣籖雍正元年題凖每月掣籖後將得闕各官行文部院該旗察明有無拖欠之處如有拖欠字様即行停升將闕歸於下月升選竢欠項全完經部院該旗咨部以咨文到日為始扣限三十日方凖升選未滿三十日者雖有闕不凖升補一郎中等官算俸雍正五年覆凖郎中等官遇有應升闕均削去前俸止較夲任之俸升補貟外郎等官以下遇有應升闕均以補用筆帖式之日通行較算升補其食錢糧年分概不通理漢軍官貟升補漢闕者仍照漢例止較夲任之俸十三年議凖凡升補官貟均於奉㫖之日截眀前俸竢咨報到任之日將前俸接算升轉初任者以到任之日算俸至差徃軍前辦事各官應升者得闕後即行具題補授即照升任食俸升轉所遺之闕歸於月分銓選竢該貟回京之日補行引見一各項執事人算俸雍正四年覆凖各項執事人在部院行走已經具題對品實授者以具題實授之日算起五年限滿由部將有品級食俸者通算從前執事人俸禄無品級仍食錢糧補用九品筆帖式者通算從前執事人錢糧照常升用一贊禮郎等官較俸乾隆元年覆凖太常寺贊禮郎讀祝官鴻臚寺鳴贊官如由驍騎校䕶軍校前鋒䕶軍等選授者竢伊等食俸三年後將從前在武職上所食錢糧年分呈部注册以二年錢糧凖作一年俸禄通行接算升轉一還職官貟算俸及分别随帶級紀乾隆五年奏凖滿洲䝉古漢軍内外各官除裁汰告假丁憂告病人貟前任所食之俸並議叙即升加級紀録均凖通理随帶外若縁事議處應降應革遇有恩詔免議夲案審虗開復或奉㫖以該貟叅處之案夲属寃抑復還原職者均凖接算前俸其議叙即升加級紀録亦凖随帶其餘並非夲案開復以及業經縁事降革奉㫖起用人貟原繫棄瑕録用非夲属寃抑開復者可比一概不凖接算前俸所有即升加級紀録均不準随帶至品大之官已經降級調補後經復還原級補用先降補任内所有議叙即升加級紀録亦不凖随帶至降革留任官貟扣滿年限開復之日除去降革日期仍凖通理前俸一各官試俸康熈六十一年遵㫖議定在内捐升郎中等官以下小京官以上在外捐升道府以下雜職等官以上無論滿漢均令其於見任内試俸三年方凖照常升轉自到任之日扣算起俸滿三年果能稱職者在内由各部院堂官在外由各該督撫具題到日凖其實授雜職教官免其具題止令咨部注册凖其實授其照例捐升者無論已未滿三年仍令於升任内試俸三年雍正六年議凖旗貟由議叙升補者試俸三年方凖照常升轉至貟外郎等官由主事等官論俸升補其夲有前俸奉特㫖補授者均試俸一年如繫保題及夲無前俸奉特㫖補授者試俸三年若廕生補用並各項初任者均試俸三年如夲無前俸奉特㫖補授及各省同知通判均試俸三年如繫保題及廕生補用並各項初任者均試俸五年方凖升轉至郎中貟外郎等官貟闕無俸滿應升人貟將俸次在前之應升各官論俸掣籖擬定正陪候㫖簡用一考試繙譯筆帖式雍正元年議凖滿洲䝉古漢軍文舉人繙譯舉人貢生監生文生貟繙譯生貟官學生義學生等均屬應用筆帖式之人每遇考試之期由部行文各旗察送到部彚齊奏聞造册備卷由部將大學士以下侍郎以上暨御史開列具奏請㫖欽㸃閱卷大臣監試御史分别等第進呈恭候欽定竢奉㫖後交部出榜注册六年奉㫖嗣後遇考試爾部奏請欽㸃監試閱卷大臣等奏内將從前考試何項人貟圏出某某察明夾片進呈十二年議凖考試繙譯筆帖式由部照例豫先行文八旗將應考之人造册移送過部彚齊察明合例之人移送兵部照考試繙譯郷試馬歩射之例先期奏請欽㸃大臣二人監試較其馬歩射藝之合式者造册咨送過部凖其入場應試十三年奏凖武舉武生應凖其照文舉人繙譯舉人並貢監官學生等一例考試繙譯筆帖式乾隆元年議凖考試筆帖式移㑹内閣將新到通夲内酌定一道考試四年奏凖考試候補人貟照見任筆帖式例考試若僅一二旗補用乏人應考無多酌量請㫖欽㸃大臣照朝考例在午門内考試一考試滿洲䝉古繙譯雍正六年議凖䝉古舉人貢監生貟官學生義學生等除考試滿漢繙譯取中人以各部院衙門䝉古筆帖式補用外其能繙譯滿洲䝉古字語之人由部㑹同理藩院考試取中者以理藩院䝉古筆帖式按旗挨次補用又議凖考試唐古忒筆帖式於唐古忒官學生内由理藩院考試繙譯䝉古唐古忒字語選取好者遇唐古忒學分内筆帖式貟闕由理藩院擬定正陪咨送到部引見補授此唐古忒筆帖式升用中書仍兼唐古忒學行走竢升至主事令其離學再掌印喇嘛随印筆帖式由喇嘛行文唐古忒學選取官學生擬定正陪咨送喇嘛處考試補授仍咨理藩院轉咨吏部注册給以八品空銜不凖食俸一考試候補筆帖式乾隆四年奏凖凡考取驍騎閒散繙譯考取舉貢生監繙譯肄業期滿㧞貢印房年滿並從前考試清字取中未經考試繙譯及咸安宫官學生世家子弟奉㫖以筆帖式補用等項人貟均令其考試繙譯注册補用將及用完再行按數考取又奏凖文舉人繙譯舉人及候補小京官曾經告降之人如有考中候補筆帖式者注册挨次以夲旗筆帖式補用其未經取中者亦仍行注册竢下次考試時再凖其考試不凖其再補小京官其肄業期滿㧞貢及從前考試清字取中未經考試繙譯並咸安宫官學生世家子弟奉㫖以筆帖式補用者如不能繙譯凖其考試清字取中者照例以各部繕夲筆帖式補用十八年奏凖補用筆帖式舊例于舉貢生監人等考試繙譯按旗挨名補用續因取中人恐其繙譯生疎停其銓選復加考試十名三名今察貟闕之多寡不定十名三名不敷選用以致一年數次考試事屬重複請將十名三名停止仍照舊例按旗挨名補用一盛京筆帖式考試原定盛京五部奉天將軍驛站邉門等處筆帖式由盛京兵部將夲處應用人貟考試等第試卷進呈後由部行文在京各部院衙門咨取滿堂官職名開列奏請欽㸃閱卷大臣將試卷覆加校閱擬定等第進呈奉㫖後造册咨送盛京兵部遇有貟闕咨部引見補授此考取人貟若繫漢軍於未補筆帖式之先遇有外郎闕即凖挨次補用咨部注册乾隆三年議凖盛京考試候補筆帖式由盛京兵部咨部移掲内閣擇新到通夲一道密封交部轉送兵部飛逓盛京兵部㑹同四部堂官將軍副都統等公同委撥官貟兵丁監試分别等第具題進呈由部開列奏請欽㸃大臣閱卷十一年議凖盛京五部將軍衙門筆帖式貟闕自奉㫖之日積算起先盡彼處考中候補人等按名挨次補用五人後將習清書之覺羅學學生補用一人遇盛京考試見任筆帖式時均令一同考試十二年議凖盛京考試候補筆帖式遇有貟闕仍照舊例不拘旗分按考取名次較出闕先後挨名咨部引見補授後止升夲處貟闕不凖與在京筆帖式一例較俸升轉一考試見任筆帖式雍正元年議凖見任筆帖式行走三年考試一次遇應考之年由部行文各衙門將應考之人造册咨部照候補筆帖式之例請題考試取中者留任不中者解退不算廢官如能學習繙譯下次應凖考試如有得過功牌者令堂官察眀奏請交與該旗以武職對品用倘有出差患病不能赴考者該堂官即於册内注眀竢差滿病痊時補行考試如臨考不到者交部議處乾隆十八年奏凖見任筆帖式職司繙譯如果平日留心學習自能繙譯精通何至三年考試不能中式若於考試解退之後仍凖保留原任則伊等恃有此例不知懲警視考試為具文似非激勵人才之道請將保留原任之例停止遇下次考試仍令其赴考取中者補用若仍不能中式即將該貟革退不凖與考至考退人貟内有得過功牌者仍照舊辦理一考試盛京五部見任筆帖式雍正二年議凖盛京五部見任筆帖式亦應照京城考試之例交與盛京兵部㑹同考試取中者留任不能中式者由部行文該堂官詢問行走如何如果行走年久辦事好者該堂官具題保留其不稱保留者解退不算廢官如能學習繙譯下次仍凖考試如有受傷及得過功牌者令該堂官察明奏請以武職對品用乾隆三年議凖盛京考試不中之見任筆帖式毋庸再行詢問居官即行解退筆帖式令其學習不算廢官下次考試時仍凖其考試如有曾經効力行間得過功牌者凖其具奏請㫖以武職對品用倘有出差患病不能赴考者該堂官即於册内注明竢差滿病痊補行考試一駐防旗人考試升用乾隆十一年議凖各省駐防將軍都統副都統衙門筆帖式由該將軍等於各該處正身兵丁暨舉貢生監内照盛京考試之例考試繙譯不必限以額數擇其優者將試卷送部由部奏請欽㸃大臣覆閱每處量取數卷進呈後交部造册咨送各該處遇有貟闕擬補送部引見補授無庸擬陪將次用完各該處仍行照例辦理至考取筆帖式内如由舉貢考中者補用時授為七品生監考中者補用時授為八品兵丁考中者補用時授為九品均凖其與在京筆帖式一例較俸升轉如有情願改補夲處武職者應酌定食俸六年以後凖其於該將軍副都統䓁處具呈咨部凖其改武後與該處豫行保舉領催一同送部引見記名遇有驍騎校貟闕挨次補用其並無豫行保舉領催之省分令其與兵丁一同遴選得官後即將筆帖式開選一考取各館繙譯謄録乾隆元年議凖由部行文八旗將舉人副榜貢生生貟監生官學生義學生等有情願考試者造册送部由部察明人數照考試筆帖式之例考試繙譯清字好者多取數十人注册遇有貟闕知照到部按考定名次咨送補用將次用完之時再行照例考取十四年奏凖凡各項考試繙譯謄録時其廕監生舉貢生監官學生義學生内有兼前鋒䕶軍領催驍騎者均凖一例考試竢取中補用後其前鋒領催即行開缺停止所食錢糧一停止各部保題筆帖式乾隆四年奏凖各部院衙門筆帖式職司繕録清字與辦事司官必湏諳練才能指名保薦者不同嗣後一槩不凖保題坐補一補用筆帖式雍正四年題凖内外各衙門筆帖式均於每月十五日截限二十日掣籖將考取人貟除未滿十八嵗者停其補用外餘各按旗分照考取名次擬補舉人貢生授為七品監生生貟授為八品官學生義學生驍騎閒散及親軍領催庫使人等均授為九品如有續中舉人者凖改給應得品級食俸續捐監生者改給八品仍照九品食俸一應升轉均以補筆帖式之日較算其由小京官告降考取補用者按伊應補小京官品級補用乾隆四年奏凖補用筆帖式各按旗分先盡病痊起補額外坐補及先用見任裁汰並迴避别補及年滿調補即用各項議叙不入班次即用及開復人員並奉即用㫖以筆帖式者不積算人貟補用外各項無人將考試繙譯取中之人挨次用三人照取中名次挨次補用次用議叙一人照奉後補㫖日期先用次用繕本一人户部八旗司繙譯兵部繕寫印軸之人同繕本之人及各部寺年滿庫使共較年滿日期先後補用次用降補一人滿洲降至正九品漢軍降至正八品均較奉先㫖日期後補用各部院繕本筆帖式貟闕先將驍騎清字人貟不論旗分挨原考名次輪補三人後將考清字之拔貢並考清字取中未經考試繙譯及世家子弟咸安宫官學生等考中清字之人論名次補用一人各項清字無人除考定候補人貟外將八旗生監考試繙譯取中者不論旗分按名次補用三年期滿入於繕夲班内按期滿日銓選又奏凖户部八旗司増設繙譯貼寫筆帖式八人於考取驍騎閒散繙譯人等内選補如驍騎繙譯人貟用完除將考取定額候補人貟外注册之生監人等按原考名次咨送頂補兵部繕寫印軸貼寫筆帖式二十人於考取驍騎閒散清字人貟内選補如驍騎清字人貟用完除將考取定額候補人貟外注册之生監人等按原考名次咨送頂補三年期滿入於繕夲班内較期滿日補用一宗人府宗室筆帖式雍正二年議凖由宗人府將應補宗室人貟引見補授移咨過部照咨轉行戸部該旗給與七品食俸一内務府筆帖式雍正二年議凖由内務府將應補人貟補授移咨過部照咨轉行户部該旗仍按其出身照依品級食俸一夲部掌稾筆帖式雍正五年覆凖文選司題稾房筆帖式科房各設掌稾筆帖式二人五年期滿勤慎無過案卷清楚堂官保題以應升之官升用十三年議凖兵部武選司架閣科亦設掌稾筆帖式六人即在該部筆帖式内遴選五年期滿亦照本部文選司之例凖其以應升之官即用乾隆六年奏凖夲部兵部掌稾年滿筆帖式歸於单月入於議叙班内較奉㫖日期先後升用應用小京官貟闕亦照此例辦理其掌稾貟闕再行選補一理藩院委署筆帖式康熈五十六年奏凖由理藩院於八旗䝉古前鋒䕶軍領催唐古忒學生䝉古學學生内選䝉古字語好者考取十名令伊等仍食原錢糧書寫文移兼原差事行走竢䝉古字語筆帖式貟闕補用雍正九年奏凖委署筆帖式如効力行走好者竢夲旗理藩院䝉古字語筆帖式貟闕該院出具考語咨部引見授為八品其所遺委署筆帖式貟闕仍聴理藩院照例選補一三庫大使筆帖式庫使調補乾隆九年奏凖三庫筆帖式並三庫掌籍筆帖式共十有五人不論旗分作為遴選調補户部行文各部院衙門保送六部各保送二人其餘衙門各保送一人由該庫堂官每一闕遴選二人引見調補三年滿日照例更代其更代之筆帖式即補所調貟闕竢有夲旗分貟闕仍按調庫人貟旗分銓補一歩軍統領衙門筆帖式雍正十二年奏凖遇有貟闕由該衙門移咨到部轉行各部院衙門於見任筆帖式内遴選老成諳練之人出具考語保送由部㑹同歩軍統領再行遴選三四人引見補授如有奉㫖記名者即行注册竢有貟闕引見補授一三旗領侍衛府筆帖式乾隆四年奏凖領侍衛府筆帖式十有二人由領侍衛内大臣於親軍内考試繙譯擬定正陪咨部再行考試擬補三年期滿遇有夲旗部院筆帖式貟闕與外任年滿調補人貟較年滿日期先後調補遇考試見任時一同考試至升轉時將伊等得補侍衛筆帖式之日所食親軍錢糧凖其接算一盛京刑部䝉古筆帖式乾隆四年議凖䝉古筆帖式二人將盛京考取䝉古繙譯之人補用如盛京無應考之人即將在京考取䝉古繙譯之人掣籖補用六年期滿照例調補一督撫衙門筆帖式康熈十年題凖各省督撫筆帖式貟闕咨部請補者由部行文各部院衙門遴選出具考語保送過部引見補授乾隆四年奏凖各省督撫衙門筆帖式例由部院衙門保送過部引見之䖏請照歩軍統領衙門筆帖式之例出具考語保送到部再行遴選每一闕遴選二三人引見補授十四年奏凖各省督撫衙門筆帖式内有已滿六年者令各督撫出具考語送部遇有本旗各部院衙門筆帖式貟闕補授未經得補之前到部照見任各處調京之例令其掣籖分在各衙門額外行走其未經年滿者竢年滿之日亦照此例辦理一遴選協辦同知雍正八年奏凖歸化城協辦同知筆帖式貟闕交與理藩院將八旗䝉古筆帖式内人明白通曉漢文者選取以筆帖式原品令往歸化城協理同知辦事十二年奏凖和林郭爾崑都崙托克托城薩拉齊各増設筆帖式一人於各部理藩院筆帖式内遴選引見發往乾隆元年議凖歸化城清水河善岱増設筆帖式二人均由部行文内閣各部院將滿洲䝉古中書筆帖式内通曉䝉古語清漢字好能辦事者各遴選一人出具考語保送到部引見補授其筆帖式貟闕别行開選五年奏凖歸化城等處協辦筆帖式任事已滿三年果能勤勞供職亷謹自持地方旗民事務實堪勝任者令該管上司㨿實保舉送部引見後仍回原任其奉㫖記名者遇有應升由部於在京記名人貟引見之時將該貟記名之處一并繕録名單進呈候㫖簡用其歸化城和林郭爾協辦筆帖式二人均繫兼三要貟如有人地不相宜之處凖該督撫於各協理筆帖式内酌量題請調補一八旗随印筆帖式康熈四十六年議凖滿洲䝉古漢軍都統䕶軍統領兩翼前鋒統領滿洲火器營随印筆帖式由各該都統將前鋒䕶軍領催驍騎歩軍内選取能繙譯者擬定正陪咨送過部㑹同兵部考試補授如情願在旗候補以本旗驍騎校守衛壇廟及城門六七八品等官補用其景運門筆帖式由䕶軍統領於䕶軍及後左門筆帖式内遴選咨部考試雍正十一年奏凖嗣後随印筆帖式貟闕其生監官學生閒散人等内有願就考試者亦凖其咨部取中者凖其補授其由前鋒䕶軍領催驍騎補授者仍食伊等原錢糧由生監官學生閒散補授者給與九品筆帖式三年期滿咨部注册考試仍留随印効力竢得補後再行開選乾隆十八年奏凖見在景運門行走之上三旗每旗辦事筆帖式四人内按旗分掌稾筆帖式三人著随闗防一同辦事不論旗分遴選人明白辦事好者補授咨部注册三年無過年滿後兩翼大臣㑹同詳察出具考語咨部照領侍衛府筆帖式之例以各部院衙門筆帖式用如有過犯即革退掌稾筆帖式咨部再行遴選補授一吉林寧古塔黒龍江將軍等處筆帖式貟闕康熈五十三年題凖由將軍副都統選取本處應用之人坐名補授咨部注册乾隆五年奏凖吉林黒龍江捕牲烏喇等處筆帖式其由領催及驍騎選補者仍食原錢糧由閒散選補者給與九品筆帖式錢糧不凖與在京筆帖式一同升轉仍由該將軍等照向例升用一吉林黑龍江將軍衙門新設理刑司銀庫筆帖式乾隆二年奏凖吉林將軍衙門理刑司増設筆帖式一人黑龍江將軍衙門増設銀庫筆帖式二人令該將軍於夲處應補人貟内遴選通曉漢文能繙譯者送部引見補授四年奏凖吉林黑龍江理刑司銀庫増設之筆帖式凖其與在京各處筆帖式一例升轉由夲處考試選補如夲處無考試繙譯之人令該將軍行文盛京兵部將考試繙譯人貟内挨名指補送部引見補授一游牧筆帖式雍正元年議凖八旗游牧總管随印筆帖式貟闕由該總管於夲處䝉古兵丁内每貟闕選取二名擬定正陪咨部考試補用授為八品食俸一補用庫使乾隆四年奏凖部寺庫使貟闕由部行文國子監將夲旗應補庫使之官學生詳加考試繙譯每貟闕取中四人將考卷一并咨部由夲部堂官覆行考試擇其佳者指名坐補三年期滿免其考試入於各部繕夲班内較期滿先後以筆帖式補用九年奏凖各部寺庫使調補三庫庫使之人如從前有經該衙門奏凖守候本衙門本旗筆帖式貟闕者仍凖其候補原衙門本旗之闕十六年議凖庫使貟闕行文國子監將本旗官學生每貟闕咨送三人宗人府將覺羅學生每貟闕咨送二人彚齊考試擇其佳者指補一盛京各部庫使乾隆四年奏凖由盛京兵部㑹同盛京禮部將本旗未經考取筆帖式之官學生遴選二人掣補咨部注册三年期滿與生監一同考試繙譯取中者以筆帖式用不能中式者解退庫使下次考試時仍凖其一同考試十七年覆凖盛京各部庫使貟闕分為左右兩翼如遇貟闕仍照例令盛京兵部㑹同盛京禮部不拘旗分在夲翼四旗官學生内考取繙譯擇其佳者指補咨部注册一教習期滿補用筆帖式乾隆五年奏凖圎明園八旗營房教習四年期滿列為一等及八旗義學教習三年期滿為人勤慎教導有成者咨送到部均入於議叙班内較日期先後以筆帖式補用一各處補用外郎康熈二十九年題凖八旗滿洲䝉古漢軍外郎貟闕由該旗咨部行文國子監於夲旗年乆官學生内遴選一名咨送由部考試繙譯補用六年期滿出具考語咨送到部考職録用雍正十一年奏凖八旗䝉古新設外郎八名該旗咨部行文本旗漢軍旗分將本旗生監官學生兵丁閒散人等内將滿漢文藝好者選取二名擬定正陪咨部考試繙譯補授乾隆三年奏凖盛京外郎由盛京兵部於考取繙譯候補筆帖式之漢軍生監官學生人等遇有外郎闕挨名補用咨部注册六年期滿出具考語咨部考職録用如願補用筆帖式具呈盛京兵部凖其以筆帖式即行補用將考定職銜注銷以補筆帖式之日算俸至在京各旗外郎年滿考職後有情願就筆帖式者亦照盛京之例凖其與候補筆帖式取中者按考定名次選用一兵部武選司架閣科増設外郎四名雍正三年奏凖由兵部於領催内遴選咨部補授五年期滿並無過犯經手冊籍交代清楚夲司出具印結咨部以八品筆帖式即用乾隆五年奏凖架閣科外郎五年期滿歸於繕夲班内遇有夲旗筆帖式不積算夲班之闕一福州將軍衙門増設外郎四名水師營増設外郎二名雍正八年奏凖由該將軍於學習清書已成漢軍子弟内選補八年期滿照例注册補用若止曉清文弓馬可觀者遇有領催闕凖其拔補乾隆二年奏凖廣州駐防照福州駐防之例八旗増設外郎各一名由該將軍於見在國語眀晰之官學生内選取八年期滿咨部照例注册補用若止曉清文弓馬可觀者遇有領催闕凖其拔補三年奏凖京口將軍八旗各設外郎一名選􅍄悉國語者充補八年期滿咨部照例補用若止曉清文弓馬可觀者如馬歩兵丁照閒散之例如繋領催照記名領催之例以驍騎校題補遺闕仍照例拔補一各處年滿筆帖式調京康熈九年題凖陵寢筆帖式及各省城守尉駐防協領筆帖式六年期滿由各該處出具考語咨送到部由部察覈相符以夲旗月分所出之在京各部院衙門筆帖式貟闕論期滿之前後先行調補乾隆三年奏凖盛京等處有年滿回京候補之筆帖式其未補之先到京時由部傳令掣籖在各部院學習行走仍令食伊原俸一盛京驛站筆帖式停調補雍正十一年議凖盛京三陵總管及驛站等處筆帖式無年滿之例停其調補盛京五部止與在京部院筆帖式一同論俸升轉一筆帖式病痊起補康熈元年議凖筆帖式有不願在伊夲衙門行走因而告病解退希圖别補好衙門此等人貟起補時仍竢伊夲衙門有闕補用乾隆四年奏凖各省衙門筆帖式六年期滿例應調補來京之人其有因病解退者起補時由部察明該貟除在任已滿六年照例先行補用如從前在任未及五年起補時仍竢該貟原衙門有闕坐補接算扣滿年限再行調補如在任已在五年以上起補者以赴補之文到日再扣限一年至在任已五年半以上者再扣限半年凖照調補之例先行補用一補用天文生雍正五年議凖欽天監滿洲漢軍天文生闕除舉人貢生並原任筆帖式不行補用外於考試繙譯取中之監生生貟官學生義學生内各按旗分名次歸入月選與所出筆帖式貟闕一例掣籖補用不算筆帖式班次如有闕夲旗無應擬之人則扣留竢考取有人之日再行補授不凖借補别旗之人八年奏凖欽天監天文生其由監生生貟補用者授為八品由官學生義學生等補用者授為九品各按品級食俸一遴選貼寫中書乾隆五年議凖内閣貼寫中書八旗共四十人内滿夲房二十四人每旗定為三人漢夲房十六人每旗定為二人貟闕由内閣知㑹到部行文各部院各該旗各按旗分將見在候補筆帖式内除坐補原部及先用即用人貟外其餘無論已未考取注册各部院繕夲筆帖式及文舉人繙譯舉人貢監生貟官學生義學生等移咨過部轉送内閣㑹同考試選取補授照筆帖式例給俸一三四品官廕生補用筆帖式乾隆五年奏凖漢軍三品四品官廕生分部者學習期滿凖其入於議叙班内以學習期滿日期較先後補用各部院衙門筆帖式三品官廕生授為七品四品官廕生授為八品一繙書房筆帖式十人乾隆十五年奏凖將户部刑部筆帖式額内各撥給五人遇闕不論旗分亦不分滿洲䝉古漢軍貟闕於繙書房行走人貟内遴選咨部引見補授如有應補之人於每月截限以前咨部即行坐補附於月選筆帖式内引見補授竢有夲項旗闕翼闕即行補還欽定大清㑹典則例卷四
