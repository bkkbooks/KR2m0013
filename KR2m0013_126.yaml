body:
  text: 兵部武庫淸吏司軍器一軍器通例國初定軍器由部定式移文工部製造按名給發仍令該管官隨時稽察有損壞者修整補製如有盈餘器械畱營以備增補朽敝者悉行銷毁順治五年定八旗甲兵需用甲胄軍器移文工部製給或給銀令其自製直省兵丁需用鎧仗動支本地錢糧造給報部覈銷其守䕶陵寢兵丁及八旗新滿洲寧古塔新滿洲人等應給弓箭甲胄等項軍器該管大員奏準咨部弓箭由部給發甲胄等項由部轉行工部造給又議準官弁製造緊急軍器不依限完竣以致遲誤者革職若遲誤豫備軍器者降一級調用雍正元年奏準官兵將軍器質當者官革職兵鞭一百革退軍器追繳還官失察之該管官罰俸一年五年覆準官兵遇升遷事故其本人舊有軍器繫動官銀置備者給與頂補之人若本人自備者除官員軍器聽其自便外兵丁軍器該管官視其器械之利鈍酌量定價給新補之兵卽將新補兵丁名下應領錢糧陸續扣給原主六年奏準官兵私賣軍器者革退交刑部治罪失察之該管官罰俸一年乾隆十五年諭八旗官兵器械闕少者均咨部官爲造給器械内弓箭尤爲緊要惟賴不時整理善爲收貯從前兵部八旗都統會議訓飭八旗官兵將器械善爲收貯曾經奏準施行今都統等或因日久廢弛不以爲事亦未可定著再行傳諭務遵原奏畱心訓飭稽察欽此一盔甲之制原定以鐵二片製如帽形上銳下平合而成之曰盔卽兜鍪高五寸圍圓一尺九寸其合縫處壓以鐵梁曰盔梁盔前安鐵一片曰遮睂濶寸餘圍長九寸上覆鐵檐一如蓋形曰舞擎濶六分長四寸三分爲覆椀於盔上其上仰者爲盔椀徑一寸六分高一寸二分圍圓五寸安管一長二寸圍圓一寸以插盔槍俗名狀㡌頂槍長三寸六分槍上爲盤以垂髦上安頂頂各有品制詳見於後垂於項後者曰䕶項垂於兩耳者曰䕶耳䕶耳之下曰䕶頸均以布爲表官用錦段或施綵繡無定式傅以鐵葉䕶項用鐵葉九䕶耳二用鐵葉各六䕶頸同馬兵鐵甲甲衣長二尺二寸下廣尺有一寸䕶肩二各長尺有一寸廣尺有三寸袖二各長尺有二寸上圍圓尺有二寸下圍圓九寸䕶腋二各長一尺上廣九寸凹其中以承腋其末銳遮襠一方八寸左襠一方六寸甲裳長二尺六寸幅二每幅上廣尺有二寸下廣尺有五寸均以布爲表官用錦段施綵繡無定式甲衣用鐵葉一百三十有六每葉長二寸五分廣二寸甲裳用鐵葉一百十有六䕶肩甲袖䕶腋遮襠左襠五分均用小鐵葉長一寸六分廣一寸四分歩兵甲衣長二尺甲裳長二尺六寸閒有無裳者餘同皇帝大閱甲胄原定胄以革髤漆頂三層上銜東珠承以金升龍三飾碧䃁㺨珍珠靑紅寶石貫槍植管鏤蟠龍周垂薰貂纓二十有四長六寸五分紅片金裏下爲圓座座下金盤自頂至盤高一尺一寸胄前梁中正龍銜黃寶石梁左右鏤金梵文三重上重八次十有八間以金瓔珞次二十有四前爲舞擎又下爲䕶額髤金龍二中間火珠自胄梁至䕶額高八寸五分圓座以下皆鏤龍雜飾諸寶後垂䕶項明黃段表月白裏靑倭段緣左右䕶耳䕶頸以明黃縧四相屬當耳處爲鏤空金圓花以達聰皆繡金龍中敷棉外布金釘胄襯石靑段表紅段裏亦敷棉上綴紅絨頂甲明黃段表月白裏青倭段緣中敷棉外布金釘上衣下裳左右䕶肩左右䕶腋左右袖裳間前襠左襠裳亦分左右凡十有一屬皆以明黃縧金鉸聯綴服之衣前繡升龍二後正龍一䕶肩䕶腋前襠左襠各正龍一裳幅金線相比爲金鍱五重袖以金絲段緣黃段運肘處爲方空袖端月白段皆繡金行龍兩袖各綴明黃縧約於中指䕶肩接衣處月白段金線緣各繡金龍雜飾珠寶後橫浴鐵雲葉鏤行龍周以花文前懸䕶心鏡徑五寸五分周鋄金花以金鉸四屬之乾隆二十一年又定大閱胄前梁中飾金剛石螣蛇一餘銜飾均用東珠甲亦如之順治十七年奉旨領侍衞内大臣都統盔頂已有定制仍令上挿雕翎下垂貂尾餘皆著去雕翎貂尾定議具奏遵旨議凖親王郡王盔用起花金頂嵌綠松石珊瑚寶石者聽不得擅用東珠下垂薰貂二十四條爲髦貝勒貝子盔起花金頂髦同入八分公盔插蜜䑕尾領侍衞内大臣都統盔插雕翎二作燕剪形均垂貂尾十二條爲髦内大臣内行走之公侯伯和碩額駙郡主額駙㪚秩大臣盔均插蜜䑕尾垂朱髦隨旗行走之公侯伯統領副都統盔均插獺尾垂朱髦上三旗侍衛鑾儀衞官盔插豹尾下五旗王府長史䕶衞典儀盔插猞猁猻尾垂朱髦王府長史垂黑髦前鋒䕶軍營叅領副叅領侍衞盔插獺尾垂黑髦前鋒校䕶軍校驍騎校前鋒䕶軍均鐵頂垂朱髦驍騎營叅領以下官盔插獺尾垂朱髦領催驍騎均垂黑髦凡鐵頂各旗異制以示别康熙五年題準八旗前鋒校䕶軍校甲以白段爲表前鋒䕶軍繡甲藍布爲表侍衞䕶衞前鋒䕶軍甲及裳均用明甲施鐵葉於外曰明甲八旗驍騎甲繡布爲表各如本旗之色又定直省督撫提鎭盔插雕翎垂貂尾副叅以下盔插獺尾垂朱髦馬歩兵盔槍鐵頂朱髦製甲之式與八旗同又定鎭國將軍輔國將軍奉國將軍奉恩將軍甲胄均視一品乾隆二十一年欽定棉胄以革髤漆頂植銅鍱䕶項䕶耳䕶頸均敷棉䕶軍校䕶軍前鋒垂紅纓䕶項以下石靑色驍騎校驍騎鹿角兵礟手垂黑纓䕶項以下各從旗色甲亦敷棉䕶軍校驍騎校前鋒䕶軍均全身驍騎無左右袖鹿角兵礟手無裳及左右袖左襠色如胄制官綺表綢裏外布黃銅釘鋄金兵綢表布裏外布白銅釘鋄銀二十三年奏定兩翼前鋒統領䕶軍統領胄頂均植雕翎二垂貂尾又定胄頂垂薰貂纓親王郡王均十有八貝勒貝子均十有四又定直省總兵胄頂植薰獺尾垂紅纓副將植獺尾均繡蟒五叅將以下亦植獺尾不施繡又定固倫額駙縣主額駙郡君額駙縣君額駙鄉君額駙子男甲胄各視其品所應得與冠服同又定甲縧親王郡王用金黃色貝勒以下用石靑色與冠服同雍正十一年奏準官員盔甲區爲三等一二品官爲一等盔之䕶項䕶耳䕶頸甲衣前後甲裳左右䕶肩䕶腋遮襠左襠共繡團蟒十有五三品至五品官爲二等繡團蟒十有一䕶腋及遮襠左襠不繡六品至八品官爲三等甲衣甲裳䕶肩繡團蟒六餘皆不繡按等定價令工部製造一弓箭之制原定弓胎用榆木或欇木南方或削巨竹爲之取材之法視竹木之理平正端直張而不破胎長三尺七寸其面傅以牛角背加以筋膠外飾樺皮胎一而角兩接接處用鹿角一塊固以筋膠加煖木皮於外曰弓靶兩弰以桑木爲之各長六寸三分瓖以牛角刻鍥其末以受弦彄弰與胎鬭筍相接處光削一面以鹿角爲方釘於角端曰墊弦弓弦有二一曰纏弦用蠶絲二十餘莖爲骨外用絲線橫纏以束之纏線分三節隔七寸許空一二分不纏則不張弓時可摺疊收之一曰皮弦剪鹿皮爲之用於戰陣弓力强弱視胎面厚薄筋膠之輕重爲斷一力至三力用筋八兩膠五兩四力至六力用筋十四兩膠七兩七力至九力用筋十八兩膠九兩十力至十二力用筋斤十兩膠十兩十三力至十五力用筋二斤膠十二兩十六力至十八力用筋二斤六兩膠十四兩箭笴以楊木柳木樺木爲質取圓直之杆削成之别用數寸之木刻槽一道曰箭端箭笴必取範於端以均停其首尾刻銜口以駕弦曰括其端受鏃凡鏃冶鐵爲之曰鈚箭曰梅針皆戰箭施於敎閱者曰骲箭以寸木空中錐眼爲竅矢發則受風而鳴又謂之響箭鐵鏃上加骨角小哨者曰鳴鏑黏羽翎於箭括曰箭羽順治二年題準每年秋季於昌平密雲二處採弓胎弓稍萬副需用樺皮於寧古塔採取令司弓一人率每旗弓匠長各一名弓匠各二名前往驗採又定兵部設箭匠十名以造官箭八旗每佐領下設弓匠一名製造官弓康熙六年題準官弓交八旗司弓製造採伐弓胎於八旗内選司弓一人每旗弓匠長一人弓匠十名各乘官馬領四十日行糧每年伐弓胎弓稍五千二百副武備院選二千副每旗給四百副以備製造官弓之用令鄰近驛站支車運送至京其採取弓胎如不敷用具奏增採寧古塔將軍隔一年選委官兵採取樺皮七萬二千二百張以備用又題準製造官弓繫軍前應用者由部選取委官解送各省支取者由各該處委官同該旗司弓等選給至直省督撫提鎭駐防將軍都統副都統及武狀元等應賞給官弓均由部行文八旗領取給發十九年題準造箭務要箭心堅長手鑽安釘如草率造作將匠役治罪又議準匠役製造弓箭擅改式様售賣者鞭五十所造之物入官雍正五年議準靑鶴翎一等每箭五枝價銀一兩八錢二等一兩六錢三等一兩四錢蟬鵞翎一等每箭五枝價一兩七錢二等一兩五錢三等一兩三錢鸕鶿翎一等每箭五枝價一兩四錢二等一兩三錢三等一兩鸛翎一等每箭五枝價一兩二等八錢鴇翎一等價七錢二等六錢芝麻鵰戰箭每百枝價八兩鴈翎每百枝價五兩定價之後舖戸有任意高擡時價者照把持行市律治罪一旗纛之制原定八旗旗纛各以本旗之色爲辨滿洲都統纛方幅惟鑲黃鑲白鑲紅鑲藍左幅稍銳各長五尺七寸廣五尺繪龍竿長丈有二尺鐵頂朱髦惟正紅旗用黑髦䝉古漢軍都統纛同佐領纛方幅長四尺二寸廣五尺不繪綵竿長丈有二尺髦頭色黑領催小旗長一尺五寸廣一尺八寸竿長五尺八旗同式而於鐵頂各異其製以示别䕶軍營纛各如本旗之色裁方幅爲三角邊作火熖形直長五尺五寸斜長七尺三寸繪龍竿長丈有二尺鐵頂朱髦正紅旗用黑髦䕶軍校小旗三角直長尺二寸斜長二尺三寸竿長五尺五寸八旗同式而鐵頂各異其製以示别前鋒營旗方幅長二尺三寸廣尺有八寸繪飛虎竿長六尺頂插豹尾髦頭色赤火器營旗纛䕶軍驍騎各如其本營之式均加白號帶以别之直省標營大纛裁方幅爲三角直長五尺八寸斜長一丈邊作火熖形或繪雲蟒或繪飛熊隨地異製無定式鐵頂朱髦什長旗三角直長二尺三寸有竒斜長三尺八寸邊作火熖形鐵頂朱髦此外有先鋒旗督陣旗門旗令旗禀事旗均隨營異製大帥旗以黃布爲之方幅廣丈有八寸長丈有四尺兩面大書帥字號帶一長丈有五尺廣一尺竿長丈有六尺刻木葫蘆爲頂乾隆十七年奏準旗纛繫兵丁所瞻視舊制各省將軍都統副都統補授時卽照其人本旗旗色由工部造給旗纛如有改授卽爲更換不惟繁冗且於瞻視亦無準則嗣後將各省將軍都統副都統分定鑲黃正黃正白三旗旗色盛京西安江寧綏遠城將軍天津都統熱河副都統皆用鑲黃旗色吉林寧夏靑州杭州福州將軍歸化城右翼都統山海關副都統皆用正黃旗色黑龍江涼州廣州荆州將軍歸化城左翼都統成都副都統皆用正白旗色各將軍都統兼轄之副都統各視將軍都統旗色又定伊犁將軍察哈爾都統均用鑲黃旗察哈爾副都統右翼用正黃旗左翼用正白旗一給發軍器順治五年題準馬兵每名各給甲一胄一櫜鞬一弓一箭四十腰刀一歩兵每名各給甲一胄一腰刀一其歩兵弓箭兵給弓一箭三十長槍兵給長槍一鳥槍兵給鳥槍一直省兵丁器械照此例給發康熙六年題準八旗世爵曁文武官各備甲一胄一弓二櫜鞬一腰刀一其箭數視品秩之大小以定等差公五百五十侯五百伯四百五十子四百男三百五十輕車都尉二百五十騎都尉二百雲騎尉百五十武官一品至五品視子男以下六品以下官均一百文職一二品與子男同三品京堂視武職二品官例四品京堂科道郎中視三品官例員外郎視四品官例營兵䕶軍前鋒領催各七十驍騎各五十世爵官大於爵者照官職箭數爵大於官者照世爵箭數直省督撫提鎭及武職副叅以下各官應備弓矢甲胄各按品級定數與八旗武職同三