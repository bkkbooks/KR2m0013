刀藤牌手十名執牌刀挑刀手十名礮手十名永遠畫一演習又議準滇黔粤三省各營每兵千名内以百名操演大礮兼習牌刀以六百名習鳥槍以二百名習弓箭以百名習藤牌其不足千名營分亦照此數遞減分派十年議準閩省水路則海面遼濶陸路則山深箐密鳥槍一項最爲利用於定例每兵千名設鳥槍四百之外再增鳥槍百杆十二年議凖火藥關繫緊要必須豫備方爲有益督撫提鎭將所轄各營酌量每年應用之數動公費製造潮濕地方豫備三年高燥地方豫備五年加謹收貯每年所用火藥卽於收貯數内動支仍照動支數目製造貯庫出陳易新按年造册報部該管官如遇升遷事故離任照倉庫錢糧例交代若虧闕及不堪應用者責令專管官賠補仍罰俸一年該管上司罰俸六月乾隆元年議凖民閒不許製鳥槍其鄉村險僻之處防虎防盜鳥槍在所必需各該省督撫確察各州縣内有實在應用地方照兵丁鳥槍式樣製造書鏨姓名具呈地方官編號注册備案如非應用地方有私藏或私造售賣者將私藏私造之人責四十板鳥槍入官失察之該管官罰俸一年若兵丁有藉稽察鳥槍擾害民閒者革糧該管官罰俸一年五年議準滇黔二省地多山箐陰雨不常弓箭一遇潮濕之時險仄之地不能應手施展唯弩弓以木爲質其力最勁爲行軍之利器令弓箭手各兼習弩弓以資利用十一年議準兵丁操演所需鉛彈火藥火繩應動用工費但各營動用議有定數若操演之時或因兵施放生疎欲令多放數次則此項鉛藥火繩須兵自備因而該管官恐兵無力不免草率了事終於不能純熟嗣後槩動公費製給以便多爲演習十五年議準湖廣武昌鎭前後水師二營地界川江水操弓箭技有難施惟鳥槍極爲便利照沿邊沿海省分每兵千名設鳥槍四百一簡覈軍器順治五年題準每年秋季奏請㸃驗八旗䕶軍營驍騎營器械春季奏請㸃驗前鋒營歩軍營器械令該管官互相稽察又定㸃驗軍器若盔甲弓箭等項全無者繫官革職兵鞭一百革退軍器虧闕及箭上無字並書他人姓名者官罰俸一年兵鞭五十軍器朽壞者官罰俸兩月兵鞭二十如所屬官兵有盔甲弓箭等項全無及軍器闕少或朽壞者一名至五名該管都統等罰俸三月叅領等罰俸六月六名至十名都統等罰俸六月叅領等罰俸九月十名以上者都統等罰俸九月叅領等罰俸一年二十名以上者都統等罰俸一年叅領等降一級畱任三十名以上者都統等罰俸二年叅領等降一級罰俸一年至佐領驍騎校等所管兵數無多有軍器闕額朽壞一名至三名者罰俸六月四名至六名罰俸一年七名至十名降一級畱任内府及王公府屬佐領管領下有十名以上者降一級罰俸一年二十名以上降二級畱任雍正元年奏準游牧八旗察哈爾官兵軍器由部越一歳開列滿洲䝉古都統統領副都統職名奏請恭候欽㸃一人前往稽閱十年議準直省各營軍裝器械屬督撫所轄者督撫委官盤察提督所轄者提督委官盤察皆取本營並無闕少及委官並無揑飾印甘各結存案各於年終保題一次至於各鎭有屬督提統轄者由該鎭委官盤察取印甘各結並加具保結送督提察覈於年終保題若無督提統轄各該鎭委官盤察取結亦於年終保題其保題之時各將所屬軍裝器械數目分晰標營造册並保結送部察覈如保題之後仍有闕少將從前盤察之官罰俸六月督撫提鎭罰俸三月倘委官明知闕少扶同揑結報稱並無闕少者降三級調用又議準各營軍裝器械以都守爲專管官副叅游爲兼轄官若無故闕少經督撫提鎭題叅將專管官罰俸一年兼管官罰俸六月照數分賠繫兼管官察出揭報者免議止令專管官獨賠皆限六月賠完如逾限不完將專管官住俸兼管官停升竢賠完之日開復若繫兵丁闕少經該管官察出揭報追補足額者免議至於新舊各官將軍裝器械限一月交代如無闕少新官造册出結詳報督撫提鎭年終報部若交代之時舊官推卸不交新官勒索不受皆照交代遲延例分别議處至病故官弁闕少軍裝器械者繫兼管官病故著落專管官獨賠專管官病故著落兼管官獨賠倘專管兼管官一時病故著落從前未經察出之專兼各官分賠其闕少各數果繫年久朽壞出師闕損及因公動用者準動公費製備免其議處分賠倘有藉端科累兵弁製備者照因公科斂例議處又議準督撫提鎭將營中盔甲弓箭鳥槍藤牌刀槍旗幟鍋帳鉛藥鍬棍等項按照題定額數製備一有損闕該管官卽詳報隨時修整準其動用公費務期齊全足用如有盈餘擇其堪用者存營以備增補其朽敝者酌量銷毁以免竊賣之弊十一年議準營中一應軍器遇有闕損不按時修整及修整而收貯不謹以致朽爛或將豫備鐵木等項堆貯潮濕地方以致鏥蝕者將該管官罰俸六月仍令照數賠補又議準失火燒燬官兵房屋盔甲器械等物者該管官罰俸六月若因公他出者免議又議準大礮攻守兼資必平時豫備齊全臨時方能得用督撫提鎭嚴飭該管官將見有大礮建置礮車加謹蓋藏以避風雨潮濕每年十月閒演放一次以防鏥蝕一有損壞詳明動項製造如本營未備而别營有餘者通融撥取若有蓋藏不謹及遇有損壞並不修整者將該管官照燒燬軍器例議處又議準營汛兵丁所帶腰刀該管官不時察驗遇有損壞卽時修整如損壞不堪使用及有白鐵無鋼者將兵責革該管官罰俸一年乾隆元年議準修補一應軍裝器械該管官估定價直呈報該提鎭察無浮冒準其動用公費銀修補完日委官察驗出結申送提鎭該提鎭陸續移會布政使司幷詳督撫存案該營於年終將一營共計工費若干各項開銷若干見存若干逐一分晰造册送布政使司覈對倘有浮冒及與提鎭原文舛錯者駮令覈減更正仍詳督撫覈叅將造册官罰俸一年至於差遣官兵盤費於公費内動支者取具各官領狀亦照此辦理四年題準各省將軍都統副都統於到任時將所屬同城親標旗營一應軍裝器械限兩月委官盤驗其外屬各營軍裝器械限三月委官盤驗各保題一次仍取具該管官並無虧少印結及委官並無揑飾印結存案於年終保題仍將所屬各營軍器數目造册送部察覈倘委盤保題之後仍有闕額别經發覺者將盤驗之官罰俸六月將軍等罰俸三月委官扶同揑結者降三級調用十四年議準營兵號衣之外别有應差衣帽向繫坐扣餉銀官辦尺寸有定各兵身材不齊長短不能合式且雇覓縫人費用較多其中不肖官弁隊長不免扣尅染指嗣後不必官辦令兵自行製備免其坐扣餉銀該上司不時察驗務使潔淨整齊不至闕乏以肅軍容十六年覆準鳥槍爲緊要軍器倘有年久不堪適用者令該管官驗看確實準其重造其舊槍鎔化之鐵加謹收貯以備增造各項軍裝之用十八年諭八旗軍器例應每年特簡王公大臣㸃驗但歳一㸃驗殊覺繁擾嗣後著三年一次㸃驗旣寛㸃驗之限臨時務宜實心察覈不得草率了事若朕親閱時軍器仍有虧闕損壞者必將㸃驗之王公大臣治罪至㸃驗之年將八旗前鋒營䕶軍營驍騎營内府䕶軍官兵軍器仍照例㸃驗外其内府佐領下驍騎及王公府屬兵丁軍器皆停其㸃驗欽此兵籍一八旗拔補兵闕順治初年定每佐領下親軍闕由䕶軍驍騎閒散壯丁内拔補前鋒闕由䕶軍驍騎閒散壯丁内拔補鳥槍䕶軍闕由䕶軍驍騎内拔補䕶軍闕由驍騎閒散壯丁内拔補驍騎闕由歩軍閒散壯丁及開戸戸下人内拔補歩軍闕由閒散壯丁及開戸戸下壯丁内拔補每佐領下領催由驍騎歩軍内拔補該旗將拔補之數按季報部察覈倘有懸闕不補冒領錢糧或違例拔補者察實劾奏康熙七年題準盛京寧古塔西安江寧杭州等處駐防驍騎病故有子嗣者準其頂補若無子嗣該將軍副都統將其戸下壯丁頂補驍騎如有應承受家產之主在京情願取囘其戸下壯丁者該都統印文咨部確察果實準其徹囘卽於彼處壯丁内酌補若原繫戸下充兵令往駐防者本身病故應撥正身壯丁往補二十五年題準西安等省駐防驍騎病故其已充伍之子弟内有願扶柩來京者亦準來京願在外者仍畱充兵如有闕額該將軍等於滿洲䝉古舊壯丁内選擇補用果無堪擇人丁移咨到部撥人往補如不令舊壯丁充驍騎止以新丁充數者該將軍及該管官皆照例議處二十六年覆準每佐領下將不應入伍之人錯誤拔補者該管佐領驍騎校罰俸三月叅領罰俸一月領催鞭五十如繫徇情拔補者將徇情之叅領佐領驍騎校降三級調用領催鞭八十如佐領驍騎校領催徇情而叅領不知或驍騎校領催徇情而佐領不知止於失察者仍照錯誤拔補例處分其入伍之人革退又議準八旗驍騎年未衰老尚堪効力輒稱年老規避令家人頂替者鞭一百革退容隱之該管佐領驍騎校皆罰俸六月叅領副叅領罰俸三月都統副都統罰俸一月其職官子弟能入學肄業與考者免其入伍外若有指稱讀書游蕩失業該管官容隱不令入伍者皆照容隱例處分五十二年題準雇倩漢人壯丁稱爲滿洲令其充伍該佐領驍騎校皆罰俸三月領催鞭五十其驍騎所領餉銀餉米交與該旗著落本主照數追取入官其雇倩之人仍令爲民雍正元年議準八旗選補驍騎於滿洲壯丁内視其能騎射者選補如不敷選補於開戸滿洲戸下滿洲家下舊人内選補其得與充補之人務選善於國語騎射者方準入伍如滿洲閒散人不能國語者給限三年學習三年後不能習熟者不準選取二年奉旨八旗各増設敎養兵六百人其如何選補之處該旗定議具奏遵旨議準滿洲旗佐領下人數多寡不甚相懸所選四百六十名應令各旗不論佐領在叅領内選取䝉古漢軍旗下佐領數目多寡不同論旗選取恐有不均應不論旗分合計八旗總數按其佐領多寡均匀選取其選取時必擇實繫貧乏及嫺於騎射可以學習之正身餘丁至於叅領佐領所屬閒㪚滿洲多寡不一亦務令均匀從公選取如有徇情違例選取者照例議處至敎養兵有能勤於學習嫻於騎射者遇䕶軍驍騎闕亦準拔補又八旗都統等議奏選取驍騎該佐領與驍騎校等先將正身人等擇其應得者告知叅領叅領等復加詳閱擇其尤者送都統副都統驗其人材公同選取如本佐領下正身人内有應補驍騎之人而佐領驍騎校不舉惟將佐領之兄弟族中家下人等選取者卽行革退給與佐領内貧苦單丁倘佐領族中果有寡婦孤子貧苦之人應畱者仍行畱給又選取驍騎令於正身人内選取若有未便之處仍於佐領下開戸滿洲戸下滿洲内擇其善騎射者選取再每佐領下領催繫佐領驍騎校以下辦事之人應將見在家下人之充領催者悉行革退其開戸者照常畱役嗣後如有領催闕皆於正身驍騎閒散滿洲内選取或其中無可取之人於本佐領下䕶軍内調取有違例選取者發覺之日將佐領驍騎校與本叅領該都統等一幷議處奉旨據爾等所奏内有正身將正身選取驍騎如正身滿洲少時將戸下滿洲選取等語倘正身滿洲最多之佐領其孤寡之人不得錢糧何以爲生有似此者爾等將該佐領下人悉行傳集遍行曉諭其如何給與孤寡錢糧不令匱乏之處再行議奏欽此遵旨議準寡婦之子年幼不可充驍騎者止令其爲敎養兵若以額内驍騎爲寡婦養贍誠恐不肖之徒藉養贍寡婦之名將驍騎恣意與家下人充補未免冒濫至家下人等充驍騎者多正身滿洲充驍騎者少如遇委署䕶軍及選取䕶軍之時恐其不能接續嗣後驍騎仍應於正身及開戸人内擇其善騎射者選補或該旗内果有孤貧寡婦無錢糧養贍者將其佐領下人傳集曉諭令其家人充驍騎外餘仍照前議行又議準革退旗員内有家計艱窘情願充䕶軍驍騎者驗看騎射準其選補又諭凡年老䕶軍除應升䕶軍校驍騎校外其年已老邁不在應升之列者若竟革退殊覺可憫著統領會同都統等將伊等轉補驍騎營行走其䕶軍闕卽令人材少壯之驍騎轉補如此則䕶軍亦得整齊矣欽此又覆準領催闕於該佐領下正身驍騎閒散内選補若佐領下人無可選者會同䕶軍統領於本佐領下識字䕶軍内調補有不遵定例選補者該叅佐領驍騎校曁都統等一幷照例議處八年覆準八旗候補候選微員選期尚遠情願充驍騎者聽遇應選時仍許按班補用又覆準自發遣處寛免放囘及自行贖囘人等之子並籍没家產人等之子有願充䕶軍驍騎者驗看騎射準其選補十一年議準前鋒闕由前鋒統領會同䕶軍統領於䕶軍驍騎敎養兵執事人閒散壯丁内選補其親軍内有未滿十年者亦準選補前鋒䕶軍闕由䕶軍統領會同都統等於該佐領下驍騎敎養兵歩軍執事人門散壯丁内選補若該佐領下無可補之人於該叅領下通融選補至席伯人等有材技出衆者亦準選補䕶軍十三年議準各旗歩軍及鐵匠闕於開戸人及家下人内選補若繫孤寡並無家人者準借親戚家人無論白契印契均準選補其鐵匠著役後不準别充差役該管處秉公甄别分作三等一等給餉四兩二等給餉三兩三等給餉二兩不入等者給銀一兩應領之米照銀數給發詳見武備院又覆準革退兵丁内除犯十惡及因軍機獲罪殺傷人命帶軍器脫逃外有情願充補䕶軍驍騎者驗看騎射亦準選補如果改過行走勤愼者有應升之處準其列名又奏準選補驍騎該佐領等不將應補之人呈送都統等驗看私行頂替者降二級調用其頂替之人革退乾隆元年覆準八旗敎養兵除閒散餘丁照常選補外如旗下有年幼並無產業及無驍騎等錢糧養贍者年過十歳該叅領佐領據實具保該都統等覈實卽行選補二年覆準敎養兵年至二十五歳不能騎射者佐領具文聲明鈐以圖記送歩軍統領衙門選補歩軍三年覆準八旗生齒日繁而驍騎限有定額應將正身選補不應用開戸之人其見在開戸人内已經選補者毋庸革退再歩軍匠役等闕例應選取家下人若開戸人内有情願應選者亦準選取又奉旨陣亡開戸分戸領催驍騎之子孫著爲正身與軍營徹囘别載册籍之人一例選取驍騎又議準八旗敎養兵闕於該叅領所屬正身餘丁並奉旨作爲正身别載册籍及自首别載册籍人等内年十歳以上者選補如有不敷將九歳以下之餘丁亦準選補至鰥寡孤獨貧困無依者不論年歳均準選補其革退官兵覈其所犯原繫輕罪及年老無子或自幼殘廢未經當差者皆準給敎養兵錢糧以資養贍又議準在京驍騎闕不準將駐防壯丁徹囘頂補四年議準駐防驍騎闕先將正身壯丁選取其正身中有年力稍幼而三年後可以造就者亦準選取如再不敷準其於開戸分戸人内年力精壯技藝可觀者選取充補六年奏準八旗所出驍騎闕在每月初十日以前者於本月錢糧册籍未過部之前選補將新補驍騎應得錢糧一幷造入册内送部其在初十以後者於下月初十日以前選補如將初十日以前所出之闕遲延不報及呈報後該管官不卽選補或已補不造入册内送部者將呈報遲延造册遲誤不卽選補之該管官照例議處又議準八旗滿洲䝉古旗驍騎闕先於正身内選補如不得其人再於本佐領下閒散壯丁及開戸家人内擇其善騎射者選補漢軍旗驍騎闕不準選取開戸家人二十一年議準八旗選拔䕶軍及䕶軍調補驍騎仍照舊例令都統與䕶軍統領一同選拔如䕶軍内曾歴行間及行走年久年老尚健者仍令調補驍騎外若年齒旣壯而騎射平常者著該䕶軍統領嚴行敎誨若敎而不改卽行革退䕶軍駮囘該旗都統等復加驗看調補歩軍以爲衆戒補步軍後果能奮勉勤習騎射嫻熟國語竢過三年後再行拔補驍騎一直省考拔營兵順治初年定歩守兵選身材强壯技藝可觀者考拔馬兵於歩守兵内考拔又定兵餉應照例覈實給發若官弁扣剋或虛冒兵餉者皆革職提問不揭報之該管官照不揭報劣員例分别議處若督撫提鎭於糾叅疏内不將不揭報各官幷叅者罰俸一年康熙四年題準考拔營兵必須秉公選擇若將使令之人溷充者降二級調用未經察出之兼轄官罰俸一年統轄官罰俸六月督撫提鎭罰俸三月又題準營兵拔補入伍卽爲本營經制額數若營官升任别省將經制營兵帶往十名以下者罰俸一年十名以上者降一級畱任三十八年諭直省營制額兵虛伍冒餉者甚多甚干法紀嗣後須加省改如有濫行冒支扣尅者事發從重治罪欽此又議準各營官弁給發兵餉之時在省令布政使司糧道在府州縣令各正印官將兵餉會同該官弁如數封固按名散給如有扣尅等弊照例議處又題準提鎭兵餉令同城道員監放五十一年覆準兵丁頂名食糧者準其報明改正其經制兵丁遇有事故卽開除注册一有召募將所募新兵年貌籍貫按季造册出具並無頂冒印結送部其應扣截曠糧餉照例造入截曠項下倘該管官並不詳察將頂名替冐之兵溷行造報者照虛冒兵餉例議處五十二年議準臺灣營兵以三年爲滿由内地各營選年力精壯有身家者撥往換班各該營造具年貌籍貫並注明疤痣箕斗清册三本一存原營一交廈門㸃兵官覈驗一交臺灣驗明收伍換囘之日仍照册稽察發囘各原營其在臺灣逃亡裁革兵闕不得在彼募補於臺灣呈報到日各原營卽照數選兵撥往廈門無論水陸計有十名以上卽委千把百隊等一名搭船管押前往歸伍如換班時有私相頂替及換名不換人者將管押官革職内地該管官與臺灣該管官各降二級調用總兵官不稽察者降一級畱任提督罰俸一年總督交與吏部察議如察出揭報題叅者免議五十三年議準各省官兵俸餉領結歳終彙齊於奏銷前一月齎送察覈不必按季齎送五十五年議準兵餉旣於奏銷案内造册分送部科其文武官監放印結停其造送五十七年議準營中若有假冒兵挾制官司擾累地方該管官不能察究者革職兼轄官降四級調用不題叅之督撫提鎭降二級調用如實無假冒營兵督撫提鎭取具該管及兼轄官印結於歳終具本保題雍正二年覆準營兵悉屬經制原備巡防戰守除公務差遣之外該管官有以私事驅使者督撫提鎭題叅議處五年奉旨臺灣換班兵丁著該管官選勤愼可用之人撥往倘兵丁到彼有生事不法者或有發覺或被駐臺官叅出將選撥之該管官一幷議處十年議準營兵有闕該管官秉公考拔報明上司察覈如有勒取財物者革職計贓治罪兼轄並統轄官知情不揭報者皆降三級調用失察者兼轄官降一級畱任統轄官罰俸一年督撫提鎭不叅究者罰俸六月雖不勒取財物或濫用私人或聽受囑託將該管官降三級調用若將操練嫺熟並無過犯之營兵任意革退補用匪人以致營伍曠廢者降二級調用如因勒取財物不遂者革職兼轄官不揭報者降一級調用又議準各省營中公費勢在必需向來每多攤扣兵丁糧餉甚爲苦累嗣後於額兵内每百名扣出二名以作營中公費乾隆六年議準經制營兵原爲分防巡守豈可藉端冒占今各標協營於省會及提鎭駐劄地方各設提塘每名給糧一二三分不等又各營設有書識每名給糧一二三分不等均屬冒濫嗣後提塘不許私設若有應需辦理之事該標協營自給工食雇募不許濫給名糧至各營書識除本身糧一分外不許多給準於公費内量給工食照例年終造册報銷又奏準臺灣換班兵丁由内地各營選撥如到臺生事不法將原選撥官降一級調用八年諭各省兵丁全以册籍爲憑必姓名年貌人册相符始足以杜鑽營侵冒之弊從前頂名食糧之人屢經飭令首報更正定有處分不許復行徇隱近聞各營尚有頂冒之習皆緣舊册相沿稽察不力以致弊竇漸開於營制甚有關繫今特再降諭旨此次仍許其據實首報更正造册報部以嚴考覈並令各將軍督撫提鎭出結報部嗣後仍畱心稽察倘再有頂名冒功等弊或經叅奏或經訪聞定將各官弁照例嚴加議處該將軍督撫提鎭等亦咎有攸歸欽此又奏準各省標協營有公費名糧例以每兵百名抽出二名作營中公用乃報部册内仍開造虛名名實不符嗣後總以公費名糧若干於册内聲明無得以虛名造報十年諭國家養兵將責以披堅執銳陷陣摧鋒之用故當召募之始必擇其身材强壯技藝可觀者方準入伍朕聞外省兵丁有闕惟馬糧繫督撫提鎭親行拔補至歩糧則由營弁驗補因而徇情市惠往往將猥弱不堪之人濫行收錄虛縻糧餉者有之又向例兵丁有闕先盡餘丁頂補餘丁不足始募民人充伍餘丁一項原繫將營中淸出火糧收養兵丁子弟每名月給餉銀五錢旣可貼補兵丁之不足且以造就人材立法本非不善乃兵丁因餉銀有限凡子弟之壯大者皆令别業資生而以幼小羸弱之丁充補其數徒然占食半餉難以造就成材國家何能收養兵之實用直省督撫提鎭等宜思設兵者經國要畧簡募者敎錬先資旣往者姑不追究嗣後遇兵丁有闕無論馬歩戰守及餘丁務須親自驗收不可憚勞委之營弁倘一時事冗不能親閱亦必令親信大員代看庶有一兵卽得一兵之用於詰戎之道方有裨補其不實力奉行或經科道糾叅必重處不貸欽此又奉旨直省設立營汛遠近不一若槩送督撫提鎭衙門考試則相距遙遠之兵丁往返跋渉不免苦累是以從前所降諭旨内原有督撫一時事冗不能親閱準其委令親信大員代看況委官代看之後督撫提鎭於巡視之時原可復加考覈亦不致滋生弊端恐各省督撫提鎭或有拘泥前旨不能酌量辦理者亦未可定著通行傳諭知之十二年議準營兵應行連環保結之法令五人連具一結互保若無人互保該管官畱心察驗果弓馬人材均屬可觀明白訓誨畱營以觀後效平常者革退毋令匪類充伍又議準給發兵餉向繫飭發流單塡注應領之數至各兵名下有借給接濟應扣之項不入流單之内其中若有剋減各兵無由知悉嗣後於給發兵餉之前三日將應領若干應扣若干出示曉諭仍於給發之日覈對流單數目按名給發以杜該管官弁侵扣之弊十六年奏準兵丁給以糧餉資其養贍又於額兵百名之内酌扣二分以充公用但營中費用甚繁倘或不敷又須按名坐扣兵丁未免拮据應按各省情形酌量増加俾公用不乏兵丁得全支糧餉均沾實惠直隸總督提督二標公用足敷無庸増扣其餘各鎭標準於原扣二分之外增扣一分山東準於二分之外增扣二分山西撫標公用足敷無庸增扣其餘各鎭標原扣不及二分準其加扣以足二分河南地廣兵單不能再扣公用不敷之處别行籌辦江南江西福建四川原扣三分無庸再増浙江原扣三分續減一分準照舊仍扣三分湖北湖南雲南貴州準於原扣二分之外增扣一分陜甘總督提督安西提督西安巡撫各標公用足敷無庸增扣其餘甘撫及各提鎭標準扣三分廣東廣西向以扣存馬價作營中公用尚屬不敷準其酌扣一二分一直省約束營兵順治初年定營兵生事擾民該管官失察者降一級畱任兼轄官罰俸一年統轄官罰俸九月若以私事差遣營兵或令營兵貿易者革職如營兵在於差遣貿易地方生事擾民者照故縱例革職提問兼轄官不揭報者降二級畱任統轄官罰俸一年至於官弁生事擾民責打平人者革職致死者革職提問兼轄官不揭報者降二級畱任統轄官罰俸一年提鎭罰俸六月又定營兵違禁販馬該管官不察究者罰俸一年兼轄官罰俸六月統轄官罰俸三月康熙十年題準官弁給餉稽遲侵扣暴虐以致營兵譁譟者革職繫提鎭親標將該弁之該管上司及提鎭皆降二級調用至中軍承辦錢糧繫本營兵譁譟者革職若别營兵譁譟照該管上司例降二級調用繫提標外屬營兵譁譟將該提督降一級畱任鎭標外屬營兵譁譟將該鎭降一級畱任提督罰俸一年又題準營兵譁譟該提督徇情不叅及叅劾不以實者降二級調用若繫該管官唆使譁譟者革職提問巧飾呈報者革職又題準官弁有給餉稽遲侵扣暴虐等弊許兵丁赴督撫提鎭衙門告理若不告理妄行挾制本官擅聚譁譟或該管官弁已故之後以曾被苦累藉口嚇詐譁譟者將爲首者正法十一年題準官弁苦累營兵以致私逃者降一級調用兼轄官降一級留任統轄官罰俸一年又題準營兵爲盜將該管官革職兼轄官降三級調用統轄官罰俸一年能察報者免議其營兵爲盜日月在該管官公出之前事發於公出之後者仍照例議處若爲盜月日在該管官公出之後事發於未囘之前者免議若該管官隱匿不報及以公出揑飾者革職又覆準貼防兵爲盜將該處專汛兼轄統轄官照地方官失事例議處領兵貼防官革職貼防之兼轄官降二級留任統轄官罰俸一年十三年題準營兵窩盜豢盜及受贓漏信令盜脫逃者該管官降二級調用兼轄官同城者降一級調用不同城者降一級留任統轄官降一級留任如該管及兼轄統轄各官徇縱不察究者照諱盜例分别議處十八年題準營兵有繫奴僕叛主投充者該管官卽行訊究若知情不舉降二級調用失察者罰俸一年又奏準營兵容畱反叛家屬充伍該管官知情不舉革職失察者降二級調用二十八年覆準營兵侵占官地辱罵職官者該管官降二級調用兼轄官降一級畱任四十一年覆準就撫人丁情願爲民者聽若情願爲兵該管官約束不嚴以致復爲盜者將該管兼轄統轄各官照營兵爲盜例分别議處雍正六年議準營兵有應納錢糧抗欠不完州縣官將數目開明移會該管官照數追交州縣如不實力追交照州縣催徵錢糧未完分數例議處九年議準營兵犯賭該管官自行察報者免議失察者罰俸三月若明知不究别經發覺罰俸一年十二年議準營兵犯命案該管官卽時拏送有司審理者降一級畱任如並不拏送致令脫逃降一級調用兇犯交與接任官協同文職限一年緝拏限内拏獲照文職接緝命案例議敘不獲罰俸一年若該兵於犯事之先已經革糧編入里甲者聽文職緝拏武職免議如别營兵犯命案脫逃鄰汛官弁拏獲照文職拏獲鄰境兇犯例議敘十三年議準營兵有犯竊案經文職審確卽移交該管官綑打插箭遊營再送文職照例發落將約束不嚴之該管官降一級調用如案未發覺該管官能察拏送審者免議倘囑託文職代爲開脫者革職若旣經發覺揑稱開除名糧在先犯案在後降二級調用乾隆四年覆準營兵誣拏良民指爲盜賊私用非刑致死者該管官革職兼轄官不據實呈報者降二級調用未經察出之總兵官降一級調用提督罰俸一年如未致死該管官降四級調用兼轄官不據實呈報者降一級調用未經察出之總兵官罰俸一年提督罰俸六月若誣拏曾經犯竊之人指爲見在躧緝强竊盜賊考逼敎供致死者該管官降三級調用未致死者降一級調用六年奏準營兵煎販私鹽該管官自行察究者免議若失察别經拏獲者革職又議準營兵因戸婚田土之事與民訐訟者一面囘明該管官一面赴地方文職官呈告聽候審斷該管官不許收接兵辭加看移送違者照擅受民辭例議處十二年議準營兵私逃除將苦累之該管及兼轄官仍照例議處外若並無苦累無故私逃能於百日内拏獲者該管各官皆免議如百日不獲該管官罰俸一年兼轄官罰俸六月其在軍營私逃者以五日爲期五日不獲卽照此例議處至於該管官規避處分將私逃兵丁以革伍辭糧揑報者照隱匿不報例議處欽定大清㑹典則例卷一百二十二
