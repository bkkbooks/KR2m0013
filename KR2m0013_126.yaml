刀藤牌手十名執牌刀挑刀手十名炮手十名永遠畫一演習又議準滇黔粵三省各營每兵千名內以百名操演大炮兼習牌刀以六百名習鳥槍以二百名習弓箭以百名習藤牌其不足千名營分亦照此數遞減分派十年議準閩省水路則海面遼濶陸路則山深箐密鳥槍一項最為利用於定例每兵千名設鳥槍四百之外再增鳥槍百杆十二年議凖火藥關繫緊要必須豫備方為有益督撫提鎮將所轄各營酌量每年應用之數動公費製造潮濕地方豫備三年高燥地方豫備五年加謹收貯每年所用火藥即於收貯數內動支仍照動支數目製造貯庫出陳易新按年造册報部該管官如遇升遷事故離任照倉庫錢糧例交代若虧闕及不堪應用者責令專管官賠補仍罰俸一年該管上司罰俸六月乾隆元年議凖民間不許製鳥槍其鄉村險僻之處防虎防盜鳥槍在所必需各該省督撫確察各州縣內有實在應用地方照兵丁鳥槍式樣製造書鏨姓名具呈地方官編號注册備案如非應用地方有私藏或私造售賣者將私藏私造之人責四十板鳥槍入官失察之該管官罰俸一年若兵丁有藉稽察鳥槍擾害民間者革糧該管官罰俸一年五年議準滇黔二省地多山箐陰雨不常弓箭一遇潮濕之時險仄之地不能應手施展唯弩弓以木為質其力最徑為行軍之利器令弓箭手各兼習弩弓以資利用十一年議準兵丁操演所需鉛彈火藥火繩應動用工費但各營動用議有定數若操演之時或因兵施放生疏欲令多放數次則此項鉛藥火繩須兵自備因而該管官恐兵無力不免草率了事終於不能純熟嗣後槩動公費製給以便多為演習十五年議準湖廣武昌鎮前後水師二營地界川江水操弓箭技有難施惟鳥槍極為便利照沿邊沿海省分每兵千名設鳥槍四百一簡核軍器順治五年題準每年秋季奏請點驗八旗護軍營驍騎營器械春季奏請點驗前鋒營步軍營器械令該管官互相稽察又定點驗軍器若盔甲弓箭等項全無者繫官革職兵鞭一百革退軍器虧闕及箭上無字並書他人姓名者官罰俸一年兵鞭五十軍器朽壞者官罰俸兩月兵鞭二十如所屬官兵有盔甲弓箭等項全無及軍器闕少或朽壞者一名至五名該管都統等罰俸三月參領等罰俸六月六名至十名都統等罰俸六月參領等罰俸九月十名以上者都統等罰俸九月參領等罰俸一年二十名以上者都統等罰俸一年參領等降一級留任三十名以上者都統等罰俸二年參領等降一級罰俸一年至佐領驍騎校等所管兵數無多有軍器闕額朽壞一名至三名者罰俸六月四名至六名罰俸一年七名至十名降一級留任內府及王公府屬佐領管領下有十名以上者降一級罰俸一年二十名以上降二級留任雍正元年奏準遊牧八旗察哈爾官兵軍器由部越一歲開列滿洲蒙古都統統領副都統職名奏請恭候欽點一人前往稽閲十年議準直省各營軍裝器械屬督撫所轄者督撫委官盤察提督所轄者提督委官盤察皆取本營並無闕少及委官並無揑飾印甘各結存案各於年終保題一次至於各鎮有屬督提統轄者由該鎮委官盤察取印甘各結並加具保結送督提察核於年終保題若無督提統轄各該鎮委官盤察取結亦於年終保題其保題之時各將所屬軍裝器械數目分晰標營造册並保結送部察核如保題之後仍有闕少將從前盤察之官罰俸六月督撫提鎮罰俸三月倘委官明知闕少扶同揑結報稱並無闕少者降三級調用又議準各營軍裝器械以都守為專管官副參遊為兼轄官若無故闕少經督撫提鎮題參將專管官罰俸一年兼管官罰俸六月照數分賠繫兼管官察出揭報者免議止令專管官獨賠皆限六月賠完如逾限不完將專管官住俸兼管官停升俟賠完之日開復若繫兵丁闕少經該管官察出揭報追補足額者免議至於新舊各官將軍裝器械限一月交代如無闕少新官造册出結詳報督撫提鎮年終報部若交代之時舊官推卸不交新官勒索不受皆照交代遲延例分别議處至病故官辨闕少軍裝器械者繫兼管官病故著落專管官獨賠專管官病故著落兼管官獨賠倘專管兼管官一時病故著落從前未經察出之專兼各官分賠其闕少各數果繫年久朽壞出師闕損及因公動用者準動公費製備免其議處分賠倘有藉端科纍兵辨製備者照因公科斂例議處又議準督撫提鎮將營中盔甲弓箭鳥槍藤牌刀槍旗幟鍋帳鉛藥鍬棍等項按照題定額數製備一有損闕該管官即詳報隨時修整準其動用公費務期齊全足用如有盈餘擇其堪用者存營以備增補其朽敝者酌量銷毁以免竊賣之弊十一年議準營中一應軍器遇有闕損不按時修整及修整而收貯不謹以致朽爛或將豫備鐵木等項堆貯潮濕地方以致鏽蝕者將該管官罰俸六月仍令照數賠補又議準失火燒燬官兵房屋盔甲器械等物者該管官罰俸六月若因公他出者免議又議準大炮攻守兼資必平時豫備齊全臨時方能得用督撫提鎮嚴飭該管官將見有大炮建置炮車加謹蓋藏以避風雨潮濕每年十月間演放一次以防鏽蝕一有損壞詳明動項製造如本營未備而别營有餘者通融撥取若有蓋藏不謹及遇有損壞並不修整者將該管官照燒燬軍器例議處又議準營汛兵丁所帶腰刀該管官不時察驗遇有損壞即時修整如損壞不堪使用及有白鐵無鋼者將兵責革該管官罰俸一年乾隆元年議準修補一應軍裝器械該管官估定價直呈報該提鎮察無浮冒準其動用公費銀修補完日委官察驗出結申送提鎮該提鎮陸續移會布政使司並詳督撫存案該營於年終將一營共計工費若干各項開銷若干見存若干逐一分晰造册送布政使司核對倘有浮冒及與提鎮原文舛錯者駮令核減更正仍詳督撫核參將造册官罰俸一年至於差遣官兵盤費於公費內動支者取具各官領狀亦照此辦理四年題準各省將軍都統副都統於到任時將所屬同城親標旗營一應軍裝器械限兩月委官盤驗其外屬各營軍裝器械限三月委官盤驗各保題一次仍取具該管官並無虧少印結及委官並無揑飾印結存案於年終保題仍將所屬各營軍器數目造册送部察核倘委盤保題之後仍有闕額别經發覺者將盤驗之官罰俸六月將軍等罰俸三月委官扶同揑結者降三級調用十四年議準營兵號衣之外别有應差衣帽向繫坐扣餉銀官辦尺寸有定各兵身材不齊長短不能合式且雇覓縫人費用較多其中不肖官辨隊長不免扣尅染指嗣後不必官辦令兵自行製備免其坐扣餉銀該上司不時察驗務使潔淨整齊不至闕乏以肅軍容十六年覆準鳥槍為緊要軍器倘有年久不堪適用者令該管官驗看確實準其重造其舊槍鎔化之鐵加謹收貯以備增造各項軍裝之用十八年諭八旗軍器例應每年特簡王公大臣點驗但歲一點驗殊覺繁擾嗣後著三年一次點驗既寬點驗之限臨時務宜實心察核不得草率了事若朕親閲時軍器仍有虧闕損壞者必將點驗之王公大臣治罪至點驗之年將八旗前鋒營護軍營驍騎營內府護軍官兵軍器仍照例點驗外其內府佐領下驍騎及王公府屬兵丁軍器皆停其點驗欽此兵籍一八旗拔補兵闕順治初年定每佐領下親軍闕由護軍驍騎間散壯丁內拔補前鋒闕由護軍驍騎間散壯丁內拔補鳥槍護軍闕由護軍驍騎內拔補護軍闕由驍騎間散壯丁內拔補驍騎闕由步軍間散壯丁及開戶戶下人內拔補步軍闕由間散壯丁及開戶戶下壯丁內拔補每佐領下領催由驍騎步軍內拔補該旗將拔補之數按季報部察核倘有懸闕不補冒領錢糧或違例拔補者察實劾奏康熙七年題準盛京寧古塔西安江寧杭州等處駐防驍騎病故有子嗣者準其頂補若無子嗣該將軍副都統將其戶下壯丁頂補驍騎如有應承受家産之主在京情願取回其戶下壯丁者該都統印文咨部確察果實準其徹回即於彼處壯丁內酌補若原繫戶下充兵令往駐防者本身病故應撥正身壯丁往補二十五年題準西安等省駐防驍騎病故其已充伍之子弟內有願扶柩來京者亦準來京願在外者仍留充兵如有闕額該將軍等於滿洲蒙古舊壯丁內選擇補用果無堪擇人丁移咨到部撥人往補如不令舊壯丁充驍騎止以新丁充數者該將軍及該管官皆照例議處二十六年覆準每佐領下將不應入伍之人錯誤拔補者該管佐領驍騎校罰俸三月參領罰俸一月領催鞭五十如繫徇情拔補者將徇情之參領佐領驍騎校降三級調用領催鞭八十如佐領驍騎校領催徇情而參領不知或驍騎校領催徇情而佐領不知止於失察者仍照錯誤拔補例處分其入伍之人革退又議準八旗驍騎年未衰老尚堪效力輒稱年老規避令家人頂替者鞭一百革退容隱之該管佐領驍騎校皆罰俸六月參領副參領罰俸三月都統副都統罰俸一月其職官子弟能入學肄業與考者免其入伍外若有指稱讀書遊蕩失業該管官容隱不令入伍者皆照容隱例處分五十二年題準雇倩漢人壯丁稱為滿洲令其充伍該佐領驍騎校皆罰俸三月領催鞭五十其驍騎所領餉銀餉米交與該旗著落本主照數追取入官其雇倩之人仍令為民雍正元年議準八旗選補驍騎於滿洲壯丁內視其能騎射者選補如不敷選補於開戶滿洲戶下滿洲家下舊人內選補其得與充補之人務選善於國語騎射者方準入伍如滿洲間散人不能國語者給限三年學習三年後不能習熟者不準選取二年奉旨八旗各增設教養兵六百人其如何選補之處該旗定議具奏遵旨議準滿洲旗佐領下人數多寡不甚相懸所選四百六十名應令各旗不論佐領在參領內選取蒙古漢軍旗下佐領數目多寡不同論旗選取恐有不均應不論旗分合計八旗總數按其佐領多寡均勻選取其選取時必擇實繫貧乏及嫺於騎射可以學習之正身餘丁至於參領佐領所屬間散滿洲多寡不一亦務令均勻從公選取如有徇情違例選取者照例議處至教養兵有能勤於學習嫻於騎射者遇護軍驍騎闕亦準拔補又八旗都統等議奏選取驍騎該佐領與驍騎校等先將正身人等擇其應得者告知參領參領等復加詳閲擇其尤者送都統副都統驗其人材公同選取如本佐領下正身人內有應補驍騎之人而佐領驍騎校不舉惟將佐領之兄弟族中家下人等選取者即行革退給與佐領內貧苦單丁倘佐領族中果有寡婦孤子貧苦之人應留者仍行留給又選取驍騎令於正身人內選取若有未便之處仍於佐領下開戶滿洲戶下滿洲內擇其善騎射者選取再每佐領下領催繫佐領驍騎校以下辦事之人應將見在家下人之充領催者悉行革退其開戶者照常留役嗣後如有領催闕皆於正身驍騎間散滿洲內選取或其中無可取之人於本佐領下護軍內調取有違例選取者發覺之日將佐領驍騎校與本參領該都統等一並議處奉旨據爾等所奏內有正身將正身選取驍騎如正身滿洲少時將戶下滿洲選取等語倘正身滿洲最多之佐領其孤寡之人不得錢糧何以為生有似此者爾等將該佐領下人悉行傳集遍行曉諭其如何給與孤寡錢糧不令匱乏之處再行議奏欽此遵旨議準寡婦之子年幼不可充驍騎者止令其為教養兵若以額內驍騎為寡婦養贍誠恐不肖之徒藉養贍寡婦之名將驍騎恣意與家下人充補未免冒濫至家下人等充驍騎者多正身滿洲充驍騎者少如遇委署護軍及選取護軍之時恐其不能接續嗣後驍騎仍應於正身及開戶人內擇其善騎射者選補或該旗內果有孤貧寡婦無錢糧養贍者將其佐領下人傳集曉諭令其家人充驍騎外餘仍照前議行又議準革退旗員內有家計艱窘情願充護軍驍騎者驗看騎射準其選補又諭凡年老護軍除應升護軍校驍騎校外其年已老邁不在應升之列者若竟革退殊覺可憫著統領會同都統等將伊等轉補驍騎營行走其護軍闕即令人材少壯之驍騎轉補如此則護軍亦得整齊矣欽此又覆準領催闕於該佐領下正身驍騎間散內選補若佐領下人無可選者會同護軍統領於本佐領下識字護軍內調補有不遵定例選補者該參佐領驍騎校暨都統等一並照例議處八年覆準八旗候補候選微員選期尚遠情願充驍騎者聽遇應選時仍許按班補用又覆準自發遣處寬免放回及自行贖回人等之子並籍沒家産人等之子有願充護軍驍騎者驗看騎射準其選補十一年議準前鋒闕由前鋒統領會同護軍統領於護軍驍騎教養兵執事人間散壯丁內選補其親軍內有未滿十年者亦準選補前鋒護軍闕由護軍統領會同都統等於該佐領下驍騎教養兵步軍執事人門散壯丁內選補若該佐領下無可補之人於該參領下通融選補至席伯人等有材技出衆者亦準選補護軍十三年議準各旗步軍及鐵匠闕於開戶人及家下人內選補若繫孤寡並無家人者準借親戚家人無論白契印契均準選補其鐵匠著役後不準别充差役該管處秉公甄别分作三等一等給餉四兩二等給餉三兩三等給餉二兩不入等者給銀一兩應領之米照銀數給發詳見武備院又覆準革退兵丁內除犯十惡及因軍機獲罪殺傷人命帶軍器脫逃外有情願充補護軍驍騎者驗看騎射亦準選補如果改過行走勤愼者有應升之處準其列名又奏準選補驍騎該佐領等不將應補之人呈送都統等驗看私行頂替者降二級調用其頂替之人革退乾隆元年覆準八旗教養兵除間散餘丁照常選補外如旗下有年幼並無産業及無驍騎等錢糧養贍者年過十歲該參領佐領據實具保該都統等核實即行選補二年覆準教養兵年至二十五歲不能騎射者佐領具文聲明鈐以圖記送步軍統領衙門選補步軍三年覆準八旗生齒日繁而驍騎限有定額應將正身選補不應用開戶之人其見在開戶人內已經選補者毋庸革退再步軍匠役等闕例應選取家下人若開戶人內有情願應選者亦準選取又奉旨陳亡開戶分戶領催驍騎之子孫著為正身與軍營徹回别載册籍之人一例選取驍騎又議準八旗教養兵闕於該參領所屬正身餘丁並奉旨作為正身别載册籍及自首别載册籍人等內年十歲以上者選補如有不敷將九歲以下之餘丁亦準選補至鰥寡孤獨貧困無依者不論年歲均準選補其革退官兵核其所犯原繫輕罪及年老無子或自幼殘廢未經當差者皆準給教養兵錢糧以資養贍又議準在京驍騎闕不準將駐防壯丁徹回頂補四年議準駐防驍騎闕先將正身壯丁選取其正身中有年力稍幼而三年後可以造就者亦準選取如再不敷準其於開戶分戶人內年力精壯技藝可觀者選取充補六年奏準八旗所出驍騎闕在每月初十日以前者於本月錢糧册籍未過部之前選補將新補驍騎應得錢糧一並造入册內送部其在初十以後者於下月初十日以前選補如將初十日以前所出之闕遲延不報及呈報後該管官不即選補或已補不造入册內送部者將呈報遲延造册遲誤不即選補之該管官照例議處又議準八旗滿洲蒙古旗驍騎闕先於正身內選補如不得其人再於本佐領下間散壯丁及開戶家人內擇其善騎射者選補漢軍旗驍騎闕不準選取開戶家人二十一年議準八旗選拔護軍及護軍調補驍騎仍照舊例令都統與護軍統領一同選拔如護軍內曾歷行間及行走年久年老尚健者仍令調補驍騎外若年齒既壯而騎射平常者著該護軍統領嚴行教誨若教而不改即行革退護軍駮回該旗都統等復加驗看調補步軍以為衆戒補步軍後果能奮勉勤習騎射嫻熟國語俟過三年後再行拔補驍騎一直省考拔營兵順治初年定步守兵選身材強壯技藝可觀者考拔馬兵於步守兵內考拔又定兵餉應照例核實給發若官辨扣剋或虛冒兵餉者皆革職提問不揭報之該管官照不揭報劣員例分别議處若督撫提鎮於糾參疏內不將不揭報各官並參者罰俸一年康熙四年題準考拔營兵必須秉公選擇若將使令之人溷充者降二級調用未經察出之兼轄官罰俸一年統轄官罰俸六月督撫提鎮罰俸三月又題準營兵拔補入伍即為本營經制額數若營官升任别省將經制營兵帶往十名以下者罰俸一年十名以上者降一級留任三十八年諭直省營制額兵虛伍冒餉者甚多甚干法紀嗣後須加省改如有濫行冒支扣尅者事發從重治罪欽此又議準各營官辨給發兵餉之時在省令布政使司糧道在府州縣令各正印官將兵餉會同該官辨如數封固按名散給如有扣尅等弊照例議處又題準提鎮兵餉令同城道員監放五十一年覆準兵丁頂名食糧者準其報明改正其經制兵丁遇有事故即開除注册一有召募將所募新兵年貌籍貫按季造册出具並無頂冒印結送部其應扣截曠糧餉照例造入截曠項下倘該管官並不詳察將頂名替冒之兵溷行造報者照虛冒兵餉例議處五十二年議準臺灣營兵以三年為滿由內地各營選年力精壯有身家者撥往換班各該營造具年貌籍貫並注明疤痣箕斗清册三本一存原營一交廈門點兵官核驗一交臺灣驗明收伍換回之日仍照册稽察發回各原營其在臺灣逃亡裁革兵闕不得在彼募補於臺灣呈報到日各原營即照數選兵撥往廈門無論水陸計有十名以上即委千把百隊等一名搭船管押前往歸伍如換班時有私相頂替及換名不換人者將管押官革職內地該管官與臺灣該管官各降二級調用總兵官不稽察者降一級留任提督罰俸一年總督交與吏部察議如察出揭報題參者免議五十三年議準各省官兵俸餉領結歲終彙齊於奏銷前一月齎送察核不必按季齎送五十五年議準兵餉既於奏銷案內造册分送部科其文武官監放印結停其造送五十七年議準營中若有假冒兵挾制官司擾纍地方該管官不能察究者革職兼轄官降四級調用不題參之督撫提鎮降二級調用如實無假冒營兵督撫提鎮取具該管及兼轄官印結於歲終具本保題雍正二年覆準營兵悉屬經制原備巡防戰守除公務差遣之外該管官有以私事驅使者督撫提鎮題參議處五年奉旨臺灣換班兵丁著該管官選勤愼可用之人撥往倘兵丁到彼有生事不法者或有發覺或被駐臺官參出將選撥之該管官一並議處十年議準營兵有闕該管官秉公考拔報明上司察核如有勒取財物者革職計贓治罪兼轄並統轄官知情不揭報者皆降三級調用失察者兼轄官降一級留任統轄官罰俸一年督撫提鎮不參究者罰俸六月雖不勒取財物或濫用私人或聽受囑託將該管官降三級調用若將操練嫺熟並無過犯之營兵任意革退補用匪人以致營伍曠廢者降二級調用如因勒取財物不遂者革職兼轄官不揭報者降一級調用又議準各省營中公費勢在必需向來每多攤扣兵丁糧餉甚為苦纍嗣後於額兵內每百名扣出二名以作營中公費乾隆六年議準經制營兵原為分防巡守豈可藉端冒占今各標協營於省會及提鎮駐劄地方各設提塘每名給糧一二三分不等又各營設有書識每名給糧一二三分不等均屬冒濫嗣後提塘不許私設若有應需辦理之事該標協營自給工食雇募不許濫給名糧至各營書識除本身糧一分外不許多給準於公費內量給工食照例年終造册報銷又奏準臺灣換班兵丁由內地各營選撥如到臺生事不法將原選撥官降一級調用八年諭各省兵丁全以册籍為憑必姓名年貌人册相符始足以杜鑽營侵冒之弊從前頂名食糧之人屢經飭令首報更正定有處分不許復行徇隱近聞各營尚有頂冒之習皆緣舊册相沿稽察不力以致弊竇漸開於營制甚有關繫今特再降諭旨此次仍許其據實首報更正造册報部以嚴考核並令各將軍督撫提鎮出結報部嗣後仍留心稽察倘再有頂名冒功等弊或經參奏或經訪聞定將各官辨照例嚴加議處該將軍督撫提鎮等亦咎有攸歸欽此又奏準各省標協營有公費名糧例以每兵百名抽出二名作營中公用乃報部册內仍開造虛名名實不符嗣後總以公費名糧若干於册內聲明無得以虛名造報十年諭國家養兵將責以披堅執鋭陷陳摧鋒之用故當召募之始必擇其身材強壯技藝可觀者方準入伍朕聞外省兵丁有闕惟馬糧繫督撫提鎮親行拔補至步糧則由營辨驗補因而徇情市惠往往將猥弱不堪之人濫行收録虛縻糧餉者有之又向例兵丁有闕先盡餘丁頂補餘丁不足始募民人充伍餘丁一項原繫將營中淸出火糧收養兵丁子弟每名月給餉銀五錢既可貼補兵丁之不足且以造就人材立法本非不善乃兵丁因餉銀有限凡子弟之壯大者皆令别業資生而以幼小羸弱之丁充補其數徒然占食半餉難以造就成材國家何能收養兵之實用直省督撫提鎮等宜思設兵者經國要略簡募者教錬先資既往者姑不追究嗣後遇兵丁有闕無論馬步戰守及餘丁務須親自驗收不可憚勞委之營辨倘一時事冗不能親閲亦必令親信大員代看庶有一兵即得一兵之用於詰戎之道方有裨補其不實力奉行或經科道糾參必重處不貸欽此又奉旨直省設立營汛遠近不一若槩送督撫提鎮衙門考試則相距遙遠之兵丁往返跋涉不免苦纍是以從前所降諭旨內原有督撫一時事冗不能親閲準其委令親信大員代看況委官代看之後督撫提鎮於巡視之時原可復加考核亦不致滋生弊端恐各省督撫提鎮或有拘泥前旨不能酌量辦理者亦未可定著通行傳諭知之十二年議準營兵應行連環保結之法令五人連具一結互保若無人互保該管官留心察驗果弓馬人材均屬可觀明白訓誨留營以觀後效平常者革退毋令匪類充伍又議準給發兵餉向繫飭發流單填注應領之數至各兵名下有借給接濟應扣之項不入流單之內其中若有剋減各兵無由知悉嗣後於給發兵餉之前三日將應領若干應扣若干出示曉諭仍於給發之日核對流單數目按名給發以杜該管官辨侵扣之弊十六年奏準兵丁給以糧餉資其養贍又於額兵百名之內酌扣二分以充公用但營中費用甚繁倘或不敷又須按名坐扣兵丁未免拮據應按各省情形酌量增加俾公用不乏兵丁得全支糧餉均沾實惠直隸總督提督二標公用足敷無庸增扣其餘各鎮標準於原扣二分之外增扣一分山東準於二分之外增扣二分山西撫標公用足敷無庸增扣其餘各鎮標原扣不及二分準其加扣以足二分河南地廣兵單不能再扣公用不敷之處别行籌辦江南江西福建四川原扣三分無庸再增浙江原扣三分續減一分準照舊仍扣三分湖北湖南雲南貴州準於原扣二分之外增扣一分陜甘總督提督安西提督西安巡撫各標公用足敷無庸增扣其餘甘撫及各提鎮標準扣三分廣東廣西向以扣存馬價作營中公用尚屬不敷準其酌扣一二分一直省約束營兵順治初年定營兵生事擾民該管官失察者降一級留任兼轄官罰俸一年統轄官罰俸九月若以私事差遣營兵或令營兵貿易者革職如營兵在於差遣貿易地方生事擾民者照故縱例革職提問兼轄官不揭報者降二級留任統轄官罰俸一年至於官辨生事擾民責打平人者革職致死者革職提問兼轄官不揭報者降二級留任統轄官罰俸一年提鎮罰俸六月又定營兵違禁販馬該管官不察究者罰俸一年兼轄官罰俸六月統轄官罰俸三月康熙十年題準官辨給餉稽遲侵扣暴虐以致營兵譁譟者革職繫提鎮親標將該辨之該管上司及提鎮皆降二級調用至中軍承辦錢糧繫本營兵譁譟者革職若别營兵譁譟照該管上司例降二級調用繫提標外屬營兵譁譟將該提督降一級留任鎮標外屬營兵譁譟將該鎮降一級留任提督罰俸一年又題準營兵譁譟該提督徇情不參及參劾不以實者降二級調用若繫該管官唆使譁譟者革職提問巧飾呈報者革職又題準官辨有給餉稽遲侵扣暴虐等弊許兵丁赴督撫提鎮衙門告理若不告理妄行挾制本官擅聚譁譟或該管官辨已故之後以曾被苦纍藉口嚇詐譁譟者將為首者正法十一年題準官辨苦纍營兵以致私逃者降一級調用兼轄官降一級留任統轄官罰俸一年又題準營兵為盜將該管官革職兼轄官降三級調用統轄官罰俸一年能察報者免議其營兵為盜日月在該管官公出之前事發於公出之後者仍照例議處若為盜月日在該管官公出之後事發於未回之前者免議若該管官隱匿不報及以公出揑飾者革職又覆準貼防兵為盜將該處專汛兼轄統轄官照地方官失事例議處領兵貼防官革職貼防之兼轄官降二級留任統轄官罰俸一年十三年題準營兵窩盜豢盜及受贓漏信令盜脫逃者該管官降二級調用兼轄官同城者降一級調用不同城者降一級留任統轄官降一級留任如該管及兼轄統轄各官徇縱不察究者照諱盜例分别議處十八年題準營兵有繫奴僕叛主投充者該管官即行訊究若知情不舉降二級調用失察者罰俸一年又奏準營兵容留反叛家屬充伍該管官知情不舉革職失察者降二級調用二十八年覆準營兵侵占官地辱罵職官者該管官降二級調用兼轄官降一級留任四十一年覆準就撫人丁情願為民者聽若情願為兵該管官約束不嚴以致復為盜者將該管兼轄統轄各官照營兵為盜例分别議處雍正六年議準營兵有應納錢糧抗欠不完州縣官將數目開明移會該管官照數追交州縣如不實力追交照州縣催徵錢糧未完分數例議處九年議準營兵犯賭該管官自行察報者免議失察者罰俸三月若明知不究别經發覺罰俸一年十二年議準營兵犯命案該管官即時拏送有司審理者降一級留任如並不拏送致令脫逃降一級調用凶犯交與接任官協同文職限一年緝拏限內拏獲照文職接緝命案例議敘不獲罰俸一年若該兵於犯事之先已經革糧編入里甲者聽文職緝拏武職免議如别營兵犯命案脫逃鄰汛官辨拏獲照文職拏獲鄰境凶犯例議敘十三年議準營兵有犯竊案經文職審確即移交該管官捆打插箭遊營再送文職照例發落將約束不嚴之該管官降一級調用如案未發覺該管官能察拏送審者免議倘囑託文職代為開脫者革職若既經發覺揑稱開除名糧在先犯案在後降二級調用乾隆四年覆準營兵誣拏良民指為盜賊私用非刑致死者該管官革職兼轄官不據實呈報者降二級調用未經察出之總兵官降一級調用提督罰俸一年如未致死該管官降四級調用兼轄官不據實呈報者降一級調用未經察出之總兵官罰俸一年提督罰俸六月若誣拏曾經犯竊之人指為見在屣緝強竊盜賊考逼教供致死者該管官降三級調用未致死者降一級調用六年奏準營兵煎販私鹽該管官自行察究者免議若失察别經拏獲者革職又議準營兵因戶婚田土之事與民訐訟者一面回明該管官一面赴地方文職官呈告聽候審斷該管官不許收接兵辭加看移送違者照擅受民辭例議處十二年議準營兵私逃除將苦纍之該管及兼轄官仍照例議處外若並無苦纍無故私逃能於百日內拏獲者該管各官皆免議如百日不獲該管官罰俸一年兼轄官罰俸六月其在軍營私逃者以五日為期五日不獲即照此例議處至於該管官規避處分將私逃兵丁以革伍辭糧揑報者照隱匿不報例議處欽定大清會典則例卷一百二十二
