body:
  text: 兵部武庫淸吏司軍器一軍器通例國初定軍器由部定式移文工部製造按名給發仍令該管官隨時稽察有損壞者修整補製如有盈餘器械留營以備增補朽敝者悉行銷毁順治五年定八旗甲兵需用甲胄軍器移文工部製給或給銀令其自製直省兵丁需用鎧仗動支本地錢糧造給報部核銷其守護陵寢兵丁及八旗新滿洲寧古塔新滿洲人等應給弓箭甲胄等項軍器該管大員奏準咨部弓箭由部給發甲胄等項由部轉行工部造給又議準官辨製造緊急軍器不依限完竣以致遲誤者革職若遲誤豫備軍器者降一級調用雍正元年奏準官兵將軍器質當者官革職兵鞭一百革退軍器追繳還官失察之該管官罰俸一年五年覆準官兵遇升遷事故其本人舊有軍器繫動官銀置備者給與頂補之人若本人自備者除官員軍器聽其自便外兵丁軍器該管官視其器械之利鈍酌量定價給新補之兵即將新補兵丁名下應領錢糧陸續扣給原主六年奏準官兵私賣軍器者革退交刑部治罪失察之該管官罰俸一年乾隆十五年諭八旗官兵器械闕少者均咨部官為造給器械內弓箭尤為緊要惟賴不時整理善為收貯從前兵部八旗都統會議訓飭八旗官兵將器械善為收貯曾經奏準施行今都統等或因日久廢弛不以為事亦未可定著再行傳諭務遵原奏留心訓飭稽察欽此一盔甲之制原定以鐵二片製如帽形上鋭下平合而成之曰盔即兜鍪高五寸圍圓一尺九寸其合縫處壓以鐵梁曰盔梁盔前安鐵一片曰遮睂濶寸餘圍長九寸上覆鐵簷一如蓋形曰舞擎濶六分長四寸三分為覆碗於盔上其上仰者為盔碗徑一寸六分高一寸二分圍圓五寸安管一長二寸圍圓一寸以插盔槍俗名狀帽頂槍長三寸六分槍上為盤以垂髦上安頂頂各有品制詳見於後垂於項後者曰護項垂於兩耳者曰護耳護耳之下曰護頸均以布為表官用錦段或施綵繡無定式傅以鐵葉護項用鐵葉九護耳二用鐵葉各六護頸同馬兵鐵甲甲衣長二尺二寸下廣尺有一寸護肩二各長尺有一寸廣尺有三寸袖二各長尺有二寸上圍圓尺有二寸下圍圓九寸護腋二各長一尺上廣九寸凹其中以承腋其末鋭遮襠一方八寸左襠一方六寸甲裳長二尺六寸幅二每幅上廣尺有二寸下廣尺有五寸均以布為表官用錦段施綵繡無定式甲衣用鐵葉一百三十有六每葉長二寸五分廣二寸甲裳用鐵葉一百十有六護肩甲袖護腋遮襠左襠五分均用小鐵葉長一寸六分廣一寸四分步兵甲衣長二尺甲裳長二尺六寸間有無裳者餘同皇帝大閲甲胄原定胄以革髤漆頂三層上銜東珠承以金升龍三飾碧䃁㺨珍珠靑紅寶石貫槍植管鏤蟠龍周垂薰貂纓二十有四長六寸五分紅片金裏下為圓座座下金盤自頂至盤高一尺一寸胄前梁中正龍銜黃寶石梁左右鏤金梵文三重上重八次十有八間以金瓔珞次二十有四前為舞擎又下為護額髤金龍二中間火珠自胄梁至護額高八寸五分圓座以下皆鏤龍雜飾諸寶後垂護項明黃段表月白裏靑倭段緣左右護耳護頸以明黃縧四相屬當耳處為鏤空金圓花以達聰皆繡金龍中敷棉外布金釘胄襯石靑段表紅段裏亦敷棉上綴紅絨頂甲明黃段表月白裏青倭段緣中敷棉外布金釘上衣下裳左右護肩左右護腋左右袖裳間前襠左襠裳亦分左右凡十有一屬皆以明黃縧金鉸聯綴服之衣前繡升龍二後正龍一護肩護腋前襠左襠各正龍一裳幅金線相比為金鍱五重袖以金絲段緣黃段運肘處為方空袖端月白段皆繡金行龍兩袖各綴明黃縧約於中指護肩接衣處月白段金線緣各繡金龍雜飾珠寶後橫浴鐵雲葉鏤行龍周以花文前懸護心鏡徑五寸五分周鋄金花以金鉸四屬之乾隆二十一年又定大閲胄前梁中飾金剛石螣蛇一餘銜飾均用東珠甲亦如之順治十七年奉旨領侍衛內大臣都統盔頂已有定制仍令上插雕翎下垂貂尾餘皆著去雕翎貂尾定議具奏遵旨議凖親王郡王盔用起花金頂嵌緑松石珊瑚寶石者聽不得擅用東珠下垂薰貂二十四條為髦貝勒貝子盔起花金頂髦同入八分公盔插蜜鼠尾領侍衛內大臣都統盔插雕翎二作燕剪形均垂貂尾十二條為髦內大臣內行走之公侯伯和碩額駙郡主額駙散秩大臣盔均插蜜鼠尾垂朱髦隨旗行走之公侯伯統領副都統盔均插獺尾垂朱髦上三旗侍衛鑾儀衛官盔插豹尾下五旗王府長史護衛典儀盔插猞猁猻尾垂朱髦王府長史垂黑髦前鋒護軍營參領副參領侍衛盔插獺尾垂黑髦前鋒校護軍校驍騎校前鋒護軍均鐵頂垂朱髦驍騎營參領以下官盔插獺尾垂朱髦領催驍騎均垂黑髦凡鐵頂各旗異制以示别康熙五年題準八旗前鋒校護軍校甲以白段為表前鋒護軍繡甲藍布為表侍衛護衛前鋒護軍甲及裳均用明甲施鐵葉於外曰明甲八旗驍騎甲繡布為表各如本旗之色又定直省督撫提鎮盔插雕翎垂貂尾副參以下盔插獺尾垂朱髦馬步兵盔槍鐵頂朱髦製甲之式與八旗同又定鎮國將軍輔國將軍奉國將軍奉恩將軍甲胄均視一品乾隆二十一年欽定棉胄以革髤漆頂植銅鍱護項護耳護頸均敷棉護軍校護軍前鋒垂紅纓護項以下石靑色驍騎校驍騎鹿角兵炮手垂黑纓護項以下各從旗色甲亦敷棉護軍校驍騎校前鋒護軍均全身驍騎無左右袖鹿角兵炮手無裳及左右袖左襠色如胄制官綺表綢裏外布黃銅釘鋄金兵綢表布裏外布白銅釘鋄銀二十三年奏定兩翼前鋒統領護軍統領胄頂均植雕翎二垂貂尾又定胄頂垂薰貂纓親王郡王均十有八貝勒貝子均十有四又定直省總兵胄頂植薰獺尾垂紅纓副將植獺尾均繡蟒五參將以下亦植獺尾不施繡又定固倫額駙縣主額駙郡君額駙縣君額駙鄉君額駙子男甲胄各視其品所應得與冠服同又定甲縧親王郡王用金黃色貝勒以下用石靑色與冠服同雍正十一年奏準官員盔甲區為三等一二品官為一等盔之護項護耳護頸甲衣前後甲裳左右護肩護腋遮襠左襠共繡團蟒十有五三品至五品官為二等繡團蟒十有一護腋及遮襠左襠不繡六品至八品官為三等甲衣甲裳護肩繡團蟒六餘皆不繡按等定價令工部製造一弓箭之制原定弓胎用榆木或欇木南方或削巨竹為之取材之法視竹木之理平正端直張而不破胎長三尺七寸其面傅以牛角背加以筋膠外飾樺皮胎一而角兩接接處用鹿角一塊固以筋膠加暖木皮於外曰弓靶兩弰以桑木為之各長六寸三分瓖以牛角刻鍥其末以受弦彄弰與胎鬭筍相接處光削一面以鹿角為方釘於角端曰墊弦弓弦有二一曰纏弦用蠶絲二十餘莖為骨外用絲線橫纏以束之纏線分三節隔七寸許空一二分不纏則不張弓時可摺疊收之一曰皮弦剪鹿皮為之用於戰陳弓力強弱視胎面厚薄筋膠之輕重為斷一力至三力用筋八兩膠五兩四力至六力用筋十四兩膠七兩七力至九力用筋十八兩膠九兩十力至十二力用筋斤十兩膠十兩十三力至十五力用筋二斤膠十二兩十六力至十八力用筋二斤六兩膠十四兩箭笴以楊木柳木樺木為質取圓直之杆削成之别用數寸之木刻槽一道曰箭端箭笴必取範於端以均停其首尾刻銜口以駕弦曰括其端受鏃凡鏃冶鐵為之曰鈚箭曰梅針皆戰箭施於教閲者曰骲箭以寸木空中錐眼為竅矢發則受風而鳴又謂之響箭鐵鏃上加骨角小哨者曰鳴鏑黏羽翎於箭括曰箭羽順治二年題準每年秋季於昌平密雲二處採弓胎弓稍萬副需用樺皮於寧古塔採取令司弓一人率每旗弓匠長各一名弓匠各二名前往驗採又定兵部設箭匠十名以造官箭八旗每佐領下設弓匠一名製造官弓康熙六年題準官弓交八旗司弓製造採伐弓胎於八旗內選司弓一人每旗弓匠長一人弓匠十名各乘官馬領四十日行糧每年伐弓胎弓稍五千二百副武備院選二千副每旗給四百副以備製造官弓之用令鄰近驛站支車運送至京其採取弓胎如不敷用具奏增採寧古塔將軍隔一年選委官兵採取樺皮七萬二千二百張以備用又題準製造官弓繫軍前應用者由部選取委官解送各省支取者由各該處委官同該旗司弓等選給至直省督撫提鎮駐防將軍都統副都統及武狀元等應賞給官弓均由部行文八旗領取給發十九年題準造箭務要箭心堅長手鑽安釘如草率造作將匠役治罪又議準匠役製造弓箭擅改式樣售賣者鞭五十所造之物入官雍正五年議準靑鶴翎一等每箭五枝價銀一兩八錢二等一兩六錢三等一兩四錢蟬鵝翎一等每箭五枝價一兩七錢二等一兩五錢三等一兩三錢鸕鷀翎一等每箭五枝價一兩四錢二等一兩三錢三等一兩鸛翎一等每箭五枝價一兩二等八錢鴇翎一等價七錢二等六錢芝麻雕戰箭每百枝價八兩鴈翎每百枝價五兩定價之後鋪戶有任意高擡時價者照把持行市律治罪一旗纛之制原定八旗旗纛各以本旗之色為辨滿洲都統纛方幅惟鑲黃鑲白鑲紅鑲藍左幅稍鋭各長五尺七寸廣五尺繪龍竿長丈有二尺鐵頂朱髦惟正紅旗用黑髦蒙古漢軍都統纛同佐領纛方幅長四尺二寸廣五尺不繪綵竿長丈有二尺髦頭色黑領催小旗長一尺五寸廣一尺八寸竿長五尺八旗同式而於鐵頂各異其製以示别護軍營纛各如本旗之色裁方幅為三角邊作火熖形直長五尺五寸斜長七尺三寸繪龍竿長丈有二尺鐵頂朱髦正紅旗用黑髦護軍校小旗三角直長尺二寸斜長二尺三寸竿長五尺五寸八旗同式而鐵頂各異其製以示别前鋒營旗方幅長二尺三寸廣尺有八寸繪飛虎竿長六尺頂插豹尾髦頭色赤火器營旗纛護軍驍騎各如其本營之式均加白號帶以别之直省標營大纛裁方幅為三角直長五尺八寸斜長一丈邊作火熖形或繪雲蟒或繪飛熊隨地異製無定式鐵頂朱髦什長旗三角直長二尺三寸有竒斜長三尺八寸邊作火熖形鐵頂朱髦此外有先鋒旗督陳旗門旗令旗稟事旗均隨營異製大帥旗以黃布為之方幅廣丈有八寸長丈有四尺兩面大書帥字號帶一長丈有五尺廣一尺竿長丈有六尺刻木葫蘆為頂乾隆十七年奏準旗纛繫兵丁所瞻視舊制各省將軍都統副都統補授時即照其人本旗旗色由工部造給旗纛如有改授即為更換不惟繁冗且於瞻視亦無準則嗣後將各省將軍都統副都統分定鑲黃正黃正白三旗旗色盛京西安江寧綏遠城將軍天津都統熱河副都統皆用鑲黃旗色吉林寧夏靑州杭州福州將軍歸化城右翼都統山海關副都統皆用正黃旗色黑龍江涼州廣州荆州將軍歸化城左翼都統成都副都統皆用正白旗色各將軍都統兼轄之副都統各視將軍都統旗色又定伊犁將軍察哈爾都統均用鑲黃旗察哈爾副都統右翼用正黃旗左翼用正白旗一給發軍器順治五年題準馬兵每名各給甲一胄一櫜鞬一弓一箭四十腰刀一步兵每名各給甲一胄一腰刀一其步兵弓箭兵給弓一箭三十長槍兵給長槍一鳥槍兵給鳥槍一直省兵丁器械照此例給發康熙六年題準八旗世爵暨文武官各備甲一胄一弓二櫜鞬一腰刀一其箭數視品秩之大小以定等差公五百五十侯五百伯四百五十子四百男三百五十輕車都尉二百五十騎都尉二百雲騎尉百五十武官一品至五品視子男以下六品以下官均一百文職一二品與子男同三品京堂視武職二品官例四品京堂科道郎中視三品官例員外郎視四品官例營兵護軍前鋒領催各七十驍騎各五十世爵官大於爵者照官職箭數爵大於官者照世爵箭數直省督撫提鎮及武職副參以下各官應備弓矢甲胄各按品級定數與八旗武職同三