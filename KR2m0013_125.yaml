四十由驛站遞送者挨察繫何驛黴濕破損將馬夫笞四十司驛官罰俸兩月至駐防官將軍都統副都統等有本章黴濕破損者亦照此例行九年議準文武各官來往公文有事關軍機及緊要刻難遲緩者一面由馬上飛遞一面將飛遞緣由知會驛道備案其收受飛遞公文之衙門並沿塗轉送之各州縣驛亦將何年月日收受轉送飛遞公文之處知會驛道該驛道察明按季彙册呈報督撫督撫於年終咨部察核其一應尋常事不準飛遞騷動驛馬有違例擅用馬上飛遞者降三級調用如收受飛遞公文之衙門並沿塗轉送之各州縣驛竟不知會驛道通同容隱或驛道徇庇失察及驛道已經揭報督撫並不參者皆照私用驛站夫馬例分别議處十一年議準在京各部院衙門有緊要之事咨行外省由部給發火牌遞送者及督撫提鎮來往緊要公文關繫錢穀刑名提拏人犯者所用封套均以棉紙厚褙釘封鈐印發行其尋常由鋪司遞送之事亦須加增包封如有擦損遲誤察出將該鋪司夫役及該管官照例議處十二年議準督撫提鎮以下各衙門有咨呈在京各部院公文於公文之外别具印單將角數及何年月日封發之處一一注明令提塘隨公文投遞各部院察對明白於原來印單內注明收到日期發還原行衙門以憑稽考有無抽壓遺漏十三年覆準督撫提鎮差官齎送本章除緊要事務連站馳遞外其尋常事務各照該處題定到京限期日行站數於火牌內注明經過司驛官察明應付如有越站急馳至傷驛馬者官降一級調用役杖六十因而傷死驛馬者官降二級調用役杖七十仍追馬還官若倚奉差索取驛遞財物者交刑部治罪至駐防將軍都統副都統等差官兵齎送本章如有越站急馳至傷驛馬者照此例行乾隆三年議準奉天將軍及五部府尹有緊要公文交盛京兵部由驛遞送尋常咨行在京部院及咨行各省公文歸并直隸提塘辦理由通州知州發鋪司交提塘察明分送至在京部院發往奉天各衙門緊要公文由部交驛遞送尋常公文均交直隸提塘由通州知州發鋪司即送到奉天所屬地方交馬快即送六年奏準司驛官抗不應付以致遲誤緊急最要專奏本章者降二級調用七年奏準由軍機處交出發寄外省督撫提鎮緊要公文均由內閣加封交部再行加封轉發或照常飛遞或晝夜限行三百里或限行六百里由部於月底照彚奏勘合火牌之例繕摺奏聞十三年奏準福建省並無驛馬來往公文皆繫驛夫走遞水路則風信不時渡涉維艱陸路則崇山峻嶺登涉不易所有軍機處交出發寄緊要公文一入福建之界無論限行三百里六百里總照律載遞送公文之例每晝夜槩行三百里十四年覆準廣東省山海交錯並無驛馬與福建情形相同所有發寄緊要公文一入廣東之界無論限行三百里六百里每晝夜槩行三百里十四年諭朕巡幸所至見驛馬需用甚多此皆各部院發京事件並不俟本報一同發往各任意交發所致驛馬甚關緊要豈可任意擅動嗣後各處發京事件著於本報發回之便彚齊交發如有速行刻難緩待者著行在兵部將某日某衙門所交某事十日一次彚奏兵部所發事件亦著造入如道路不遠為期不致十日者著於回京後再行具奏欽此十五年諭向來軍機處交出公文籤發馬上飛遞者定限日行三百里遇有最緊要事件始以日行六百里字樣加籤公文緩急既有不同則遞送遲延處分亦應分别差等乃吏部議處此等案件不按三百里六百里之分但稽核時刻逾違皆照扣關公文例議以降一級調用此例殊未允協見干例議積案甚多著量加區别除沉匿軍情機密事件仍照驛站舊例議處外其軍機處交出緊要事件限日行六百里者倘有逾限準照扣關之例議處若繫軍機處常行事件限馬上飛遞日行三百里者逾限之處照公文遲延例議處著為令再軍機處交遞公文原繫酌量事件以定程期嗣後非遇緊急最要事件亦不得以日行六百里籤發欽此十六年奏準遞送本報渡涉江河因風不順有舟楫之所難施者準取具確實印結報部準其免議十八年覆準軍機處交出發寄外省緊要公文及部院衙門緊要公文有晝夜限行六百里者沿塗驛站若有遲延除不及三刻例無處分及雖逾三刻以上或因猝遇大雨或陰雨連綿或河水暴漲並路塗泥濘者取具印結報部始準免議但此等限行六百里之事皆繫責成馬夫遞送奔馳之際或馬驚被跌或渡涉被溺或馬夫因此致斃此皆非無故遲延準其取具印結送部免議又具奏恭遇車駕巡幸經由地方官酌量道路遠近設立臺站將本部各衙門筆帖式領催撥往以備馳送往來本報及緊要公務該筆帖式等除接收轉遞之外别無一事廩給口糧由地方官供應不免分外需索地方官又以該筆帖式等繫由京撥往無所鈐制諸事或多掣肘嗣後嚴行訓飭如稍有擾纍即行察參奉旨嗣後凡應行安臺之處該督撫照例安設報明該部所有馳送事件即於本省武辨內酌量委用並令於數站之內遴委地方官一人往來稽察十日彚報行在兵部一次以憑察核其由京委撥筆帖式領催之處永行停止又奏準恭遇車駕巡幸所有撥往臺站之筆帖式領催見今奉旨永行停止今於本省武辨內酌量委用惟東華門外向繫由部遴委筆帖式領催帶領館所驛馬豫備馳送奏章本報及緊要公務今各省雖委武辨而東華門繫京城收發彚總之處所有內閣及各衙門交發之事及有自外遞者皆待收領原與别站不同應照舊將本部筆帖式領催遴委又奏準督撫提鎮近來屢以尋常之事及並非關繫軍務者擅用火牌由驛馳送甚或每日限行六百里司驛各官因此多罹參劾馬匹因此益致疲瘦且奔馳頻煩遇有要務轉不能依限迅達於事機恐有遲誤嗣後督撫提鎮奏摺必實繫緊急軍務不可片刻遲待之事及奉有諭旨令以六百