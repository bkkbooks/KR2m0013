內準倒斃二分牛價每頭準開銷銀四兩七錢雍正六年議準驛站馬匹無論接任署任限一月內交代清楚如有逾限該督撫即將新舊各官遲延情由分别指參交代之時該管上司委官同新舊各官秉公驗明當收當退即據實出結仍取具委官並無偏袒徇庇印結存案倘有授受不公任意去取及故行推諉之處許委官詳報督撫核參若舊任官求情新任官並不察驗勉受交代或隱忍不報遽行出結者不議舊任官將新任官降一級調用如舊任官並不虧闕而新任官有意苛求不受交代降二級調用至委官有偏袒徇庇等情者照徇情例議處七年議準江南驛馬江以南者點驗之時每十匹倒斃三匹不算闕額限一月內買補江以北者點驗之時每十匹倒斃二匹不算闕額限以半月內買補此外再有闕少或倒斃雖在數內隱匿不報不將截曠草料扣除以及藉稱應闕之馬遲延不即買補者該上司據實揭參至每年倒斃雖準四分若不至四分者即將馬價扣除報部充餉八年議準司驛官將額馬虧闕冒銷錢糧者仍照例革職勒追若僅止疲瘦察明果繫地當孔道及山路﨑嶇或站塗遙遠差使繁劇者題參本內據實聲明將該員暫行解任以題參之日起限一月內賠補其員闕委官署理限內賠補全完題請準其復任限內不完即革職勒追十二年議準驛馬除口外差遣及在軍營倒斃者皮臟免其變價外湖北每匹變價一兩其餘直省均變價五錢於奏銷册內造報察核乾隆元年覆準山西西安甘肅驛馬向因牽領茶馬補額是以不報倒斃逮後停止茶馬遇有倒斃繫司驛官捐賠實為苦纍嗣後此三省驛馬每年十分之內準其報倒斃二分動價買補又議準黑龍江所屬呼倫布俞爾十臺每臺壯丁十名每名給馬二匹牛三頭每年準倒斃二分其買補價銀每馬準開銷六兩每牛準開銷五兩在於驛站項下動支五年覆準浙江驛馬十分之內準報倒斃二分動價買補六年奏準買補倒斃馬價各省雖有額設銀然動支之數常有盈縮今參酌屢年奏銷示以一定直隸馬價口內準開銷九兩口外準開銷七兩山東十兩山西西安甘肅四川均八兩河南八兩五錢江蘇安徽浙江均十有三兩九錢七分江西十有七兩湖北湖南十有五兩雲南二十一兩八錢貴州二十兩二錢有竒各照定價買補造入奏銷册內察核又奏準在外文武大小各官將自畜馬匹勒令驛站收買多取價直者革職提問失察之上司罰俸一年若有此等情弊經司驛官據實詳揭督撫不題參者照徇庇例議處詳揭之司驛官以應升之官即用一驛船順治十二年覆準應付各項差使有由水路行者照例給船康熙五年題準出差官兵及駐防官兵由水路行者按人數多寡給船繫上水頭號船坐五十人給縴夫十有五名二號船坐四十人縴夫十有二名三號船坐三十人縴夫九名小船酌量坐人縴夫不過五六名繫下水頭號船縴夫八名二號船縴夫給六名三號船縴夫四名小船縴夫不過二三名七年覆準出征官兵下水船仍給縴夫外其餘駐防官兵及移駐官兵下水不給縴夫上水頭號船給八名二號船六名三號船四名至小船坐十五人以上者給縴夫三名坐十五人以下者給縴夫二名又題準一應差使例應給船者若經由之州縣驛並無額設準雇民船每一里給銀三分於驛站錢糧動支造入奏銷案內察核十一年題準官員將應差之船不詳上司私自撥用或擅行估價者罰俸一年十四年議準出征官兵所需坐船縴夫有不照數應付縴夫闕少者降二級調用船闕少者降一級調用該管上司催辦不力者罰俸一年至應付駐防及移駐官兵各船縴夫遲延者罰俸一年十八年題準出征及駐防移駐官兵需用船及縴夫如驛站額設不敷準雇民船每一里給銀三分其例應給縴夫者以百里為一站每名發工食一錢給與船戶雇用多者照數增給二十六年題準驛站額設差船繫驛道專管不得分委州縣修造若恐照管難周準委亷能佐二官監辦按照各該省題定小修大修拆造年限造具船身丈尺材料工價清册送部並送工部由部主稿會同工部核銷二十八年覆準奉差各官從水路行者若止換船因未支縴夫不赴州縣驛用印鈐蓋者免其察議又題準官兵額外多索船夫及強勒越站行走者照馳驛越站多索例處分雍正七年議準駐防官兵家口及寡婦由水路歸旗者該將軍等將押送官兵並家口數目確核合算如五十人撥頭號船一隻四十人撥二號船一隻三十人撥三號船一隻骨殖一具算家口一人其口糧照家口實數發給如押送家口之官私攬貨物者革職兵私攬客貨該員失察者降一級調用八年議準驛站差船於倉門之上刋刻字號以杜私賃私借之弊九年議準驛站差船每十船編為一甲每甲立一甲長如不足十船五六船者亦編為一甲一二船者即附入各甲之內均令挨號銜尾停泊不許離幫每船給保甲牌一面將船丁頭舵水手實在姓名年貌籍貫注明懸挂船首一甲之內互相稽察保結如有容隱匪類及酗賭等事不出首者并坐若遇出差加雇水手務擇土著良民亦將姓名年貌籍貫注明以備沿塗盤詰乾隆三年議準貴州苖疆各州縣有雇募苖船應差者其船容載無多僅需一二人即可撑駕逆水以三十里為一站順水以八十里為一站每船每站給銀一錢五分一驛車原定本部館所及直隸通州永平河間設有額車應付差使若額車不敷準其雇用至直隸未設車之各州縣並山東山西河南西安甘肅等省遇有勘合火牌例應給車者均準其雇用雇價造入奏銷案內報部察核康熙五年題準應付各項官兵四人給車一輛發遣罪犯有家口者六人給車一輛內有老幼男女病廢者即三人亦給車一輛七年題準雇車價直以百里為一站每站給銀一兩多十里增銀一錢少十里減銀一錢按里數遞為增減在於驛站錢糧內開銷至盛京吉林黑龍江等處應付驛車均照此例行十四年題準運送物料每六百斤給車一輛不及六百斤者酌給舁夫馱馬又題準無車地方及不能行車之處每車一輛折給夫四名三十四年題準本部館所額車每車歲給買價銀一兩四錢移咨戶部給發三十七年覆準官員運送軍營米糧及一應軍需等物所用官車宜沿塗照看若損壞一車至十車者為數甚少免其議處仍照常議敘如損壞十一車至二十車者降一級二十一車至三十車者降二級三十一車至四十車者降三級四十一車至五十車者降四級五十一車至六十車者降五級皆留任此等損壞驛車之見任候選候補各官所有議處準將應得議敘加級減等降抵如有議敘在一等者應降一級改作二等應降二級改作三等應降三級改作四等有議敘在二等三等者亦照此按等降抵內有微員無級可降者革職留任三年無過開復其舉監生員及投誠外委間散贖罪人等除照議敘等第降抵外如無級可降免議雍正三年議準本部館所額設車二百五十輛節年裁去百輛若遇差使繁多額車不敷即牌行五城司坊照數雇用雇價每車每里給銀一分每百里給銀一兩按里數遠近增減所需雇價移咨戶部給發十一年議準內府遇有公事需車由總管酌量緩急多寡先期行文順天府該府尹計需車在二百輛以內者令大興宛平二縣雇用若多至二百輛以外大興宛平雇用二百輛其餘繫東北二路差使令順義香河二縣均勻雇用西南二路差使令懷柔固安二縣均勻雇用均於起運之前二日每車日給銀五錢二分沿塗行走每車日給銀七錢二分在塗住歇每車日給銀五錢二分其車行走十日者回空以七日計算每車日亦給銀五錢二分其銀各該縣按數即行總發不許遲緩扣剋事竣造册報部核銷移咨户部照數撥給乾隆十七年奏準奉差及駐防赴任解送銀物等事有例應給車者原應於領票後赴館所領車逐站更換乃因館所額車繫單馬木輪行走不便遂自雇車長行出京持票於沿塗驛站折給車價日久弊生真偽難以稽察嗣後凡例應給車者均令在館所領車沿塗驛站見車換車不許折價部於給車票時即牌行近京首站令其察對相符方準應付該司驛官仍一面報部一面傳知下站以憑彼此稽察欽定大清會典則例卷一百二十一
