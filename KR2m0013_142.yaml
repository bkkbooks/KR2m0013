  text: 工部製造庫一製造庫職掌順治元年設製造庫十六年裁歸內監局本年改歸工部十八年定鹵簿車駕儀仗舊屬營繕司設局分造今改歸都水司雍正元年定都水司所隸册寶儀仗簾子庫門神庫織造器用匠役均改歸製造庫管理一册寶定制皇帝御寶大箱髙一尺三寸方一尺二寸木質朱髤繪紅黃金雲龍裏糊黃綾貯寶小箱髙九寸方八寸五分金質鈒香草花文箱架髙二尺一寸方一尺八寸楠木為之雕刻龍文朱髤貼金邊釘金什件寶色池連蓋髙三寸四分方六寸四分純素金質其袱褥墊袋等件皆用黃綺皇太后皇后金册皆十頁每頁髙七寸一分濶三寸二分用三等赤金十有八兩寶匣六成金百有八兩寶色池六成金六十兩盛册大箱髙一尺三寸長一尺三寸五分濶一尺小箱髙九寸長一尺濶六寸五分盛寶大箱髙一尺三寸見方一尺二寸鑰匙匣一髙七寸長一尺濶五寸五分均用楠木為之瀝粉雲龍鳯掃金髤飾裏糊眀黃綾箱架二各髙二尺一寸見方一尺八寸楠木雕龍鳯玲瓏縧環牙版朱髤掃金象牙鑰匙牌三二面雕刻龍鳯文泥金清漢字各繫眀黃線繐五段面絹裏銷金袱六箱架套衣二鑰匙匣套衣一寶色池袱一夾褥一夾墊五棉墊七均眀黃片金為之眀黃紗寶色袋一黃案二各見方三尺髙二尺七寸黃油飾眀黃雲段案衣二凡墊雕皇后几箱袱刻繪髤均用鳯文皇貴妃金册十頁每頁髙七寸一分濶三寸二分用八成金十有五兩寶匣五成金百有五兩寶色池五成金六十兩册寶大箱各一均杉木朱髤繪紅黃金鸞鳯裏糊眀黃綾册小箱鑰匙匣各一杉木黃油瀝粉鸞鳯滿掃金眀黃綾裏箱架二用紫椴木雕玲瓏鸞鳯朱髤滿掃金以上長濶尺寸均與皇后箱架同象牙鑰匙牌一二面雕鸞鳯雲泥金刻清漢字縧繐全夾袱四箱架棉套二夾褥一夾墊五棉墊六鑰匙匣棉套一寶色池册寶袱三均眀黃雲段眀黃紗寶色袋一案二松木成造尺寸油飾案衣皆與黃案同貴妃金册十頁用七成金十有五兩寶匣百有五兩寶色池六十兩均五成金妃金册十頁用七成金十有四兩八錢印匣百兩印色池五十六兩六錢均五成金册匣繪雲鳯色皆用金黃餘與皇貴妃同嬪金册四頁用六成金十有四兩六錢二分册大小箱鑰匙匣各一繪雲鳯裏用紅綾箱架一棉套一夾袱二鑰匙匣棉套一均紅雲段銷金册袱一夾墊五夾褥一箱架棉墊四皆紅段案一紅油飾用紅雲段案衣餘制與妃同皇太子金册寶匣寶色池制與皇貴妃同盛册大箱髙一尺三寸長一尺三寸五分濶一尺木質朱髤繪紅黃金雲龍盛册小箱髙九寸長一尺濶六寸五分木質朱髤瀝粉金雲龍均黃綾糊裏寶箱箱架袱褥墊袋等制同前親王世子金册十頁用五成金每頁十有五兩尺寸同上寶匣銀質飾金百有十兩寶色池四十八兩册大箱各一髙一尺三寸長一尺四寸濶一尺小箱各一髙九寸長一尺濶七寸杉木朱髤鈒銅花雲裝製裏糊紅綾箱架各一髙二尺一寸見方一尺八寸椴木雕斗牛雲文朱髤五采貼金邊釘銅質鍍金什件架套各一夾袱各二夾褥各一箱架棉墊各三夾墊各八皆以紅段為之親王世子福晉册制同郡王飾金銀册十頁每頁十有四兩銀印匣印色池重百四十兩箱架袱褥墊袋等項均與親王同郡王福晉册如之公主金册四頁制如親王箱架袱褥墊袋同貝勒貝子及夫人並郡主縣主郡君皆紙册每頁髙一尺一寸濶七寸五分貼金雲龍面用金黃潞紬裏糊黃紡絲銀籤各二鎮國公以下奉恩將軍以上給授誥命長丈六尺髙一尺描金龍五采裝顔玉軸二牙籤一文武有功人員恩旨世襲敕書長一丈用黃朝鮮貢紙印以龍邊以上紙册誥敕均備造貯庫由中書科陸續移取一太廟尊藏玉册玉寶每玉册計十頁各髙九寸濶四寸五分厚四分聨以黃線扁縧上下二頁各鐫升降行龍一滿鐫流雲清字五頁漢字三頁玉錢一徑二寸厚六分錢孔見方五分鐫天下太平清漢字册文填青徽號填金玉寶交龍紐紐髙二寸六分寶臺髙一寸九分見方五寸鐫清漢文玉寶大箱見方一尺一寸三分髙一尺三寸二分楠木成造朱髤掃金泥金雲龍雲鳯抹金銅質什件小箱見方八寸六分髙一尺六分楠木成造箱內匣一銅抹金什件朱髤掃金泥金雲龍雲鳯玉册大箱長一尺三寸九分濶九寸髙一尺三寸三分楠木髤飾掃金泥金雲龍雲鳯小箱長一尺七分濶六寸六分髙九寸七分楠木朱髤掃金泥金雲龍雲鳯抹金銅什件以上箱裏均糊黃綾貯册寶大箱濶三尺五分深一尺九寸髙二尺二寸五分杉木朱髤抹金什件奉册寶案長三尺七分濶一尺九寸七分髙二尺六寸五分杉木朱髤抹金銅印色池見方六寸一分髙一寸三分厚六釐玉寶袱一眀黃羅段泥金圑龍玉册夾套一墊褥一均用眀黃片金大小寶箱內棉褥各一册箱內棉褥一均眀黃段册寶大小箱眀黃羅段銷金龍鳯袱各一册寶總箱袱一用明黃三線布一鹵簿國初定皇帝大駕鹵簿笓頭八畫角二十有四掆鼓四十有八大銅角八小銅角八金四金鉦四杖鼓四龍頭笛十有二拍版四肅靜旗二金鼓旗二白澤旗二門旗八日月旗各一雲雨風雷旗各一五星旗各一二十八宿旗各一北斗旗一五嶽旗各一四瀆旗各一青龍白虎朱雀神武旗各一天鹿天馬旗各一鸞麟熊羆旗各一青龍纛赤龍纛黃龍纛白龍纛黑龍纛各四青龍幟赤龍幟黃龍幟白龍幟黑龍幟各四黃麾二絳引幡傳教幡告止幡信幡各四政平訟理幡二儀鍠􅌁八羽葆幢四青龍白虎朱雀神武幢各一金節四豹尾幡四龍頭竿幡四方天㦸四豹尾槍二十弓矢各二十儀刀二十仗馬十吾仗立瓜卧瓜金鉞御仗星各六品級山七十二座棕薦三十鋪靜鞭三十條黃曲柄龍繖四黃直柄龍繖八紅直柄龍繖白直柄龍繖青直柄龍繖黑直柄龍繖各二黃直柄瑞