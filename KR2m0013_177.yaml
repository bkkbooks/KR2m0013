body:
  text: 八旗都統三田宅一宗室莊田順治元年諭户部我朝定都燕京期於乆逺凡近京各州縣無主荒田及前眀勲戚駙馬公侯伯内監殁於寇亂者無主莊田甚多爾部清釐如本主尚存及有子弟存者量口給與其餘分給東來諸王勲臣兵丁人等令各府州縣鄉村滿漢分居各理疆界以杜異日爭端今年從東先來諸王各官兵丁及見來在京各部院官著先撥給田園其後至者再酌量撥給欽此又定諸王貝勒貝子公等準於錦州各設莊一所蓋州各設莊一所其額外各莊悉令退出二年題準給諸王貝勒貝子公等大莊每所地四百二十畝至七百二十畝不等半莊每所地二百四十畆至三百六十畆不等園每所地六十畆至百二十畆不等又題準分給園地内務府總管四十八畆親王管領三十六畆郡王以下府管領三十六畆各府執事人員皆給地有差又題準王以下各官所属壯丁計口給地三十六畆停支口糧五年題準親王給園十所郡王給園七所每所地百八十畆六年題準襲封王貝勒貝子公等祖父所遺園地除撥給應得之數外其餘地畆不必徹出仍留本家又題準凡加封王貝勒貝子公等各照本爵撥給園地七年題準公主各給園地三百六十畆郡主園地百八十畆縣主郡君縣君園地百五十畆又題準撥給親王園八所郡王五所貝勒四所貝子三所公二所每所地百八十畆嗣後凡初封王貝勒貝子公等皆照此例撥給鎮國將軍園地二百四十畆輔國將軍百八十畆奉國將軍百二十畆奉恩將軍六十畆一官軍畿輔莊田順治元年定民間無主田房撥給八旗壯丁每人三十畆三年題準副都統以上官各給園地百八十畆地六十畆四年題準叅領以下官各給二名壯丁地一名三十畆又題準各官帶來壯丁給地不敷每佐領下再給十名壯丁地六年題準公侯伯各給園地三百畆子二百四十畆男百八十畆都統尚書輕車都尉百二十畆副都統侍郎騎都尉六十畆一等侍衞䕶衞叅領四十二畆二等侍衞䕶衞三十畆三等侍衞䕶衞雲騎尉二十四畆又題準各官致仕者督撫布按縂兵給園地三十六畆道副將叅將給園地二十四畆府州縣游守等官給園地十有八畆又題準新來壯丁每名給地三十畆七年題準八旗舊壯丁每名徹出地六畆撥給新壯丁康熙二年題準新來佐領給地三十畆領催給地十有八畆又諭户部朕纘承祖宗丕基撫育羣生滿漢軍民原無異視務俾各得其所乃惬朕心比年以來復將民間房地圏給旗下所以致民生失業衣食無資流離困苦深為可憫嗣後永行停止其今年所圏房地悉令給還民間爾部速行曉諭昭朕嘉恵生民至意至於旗人無地亦難資生應否以古北等口邉外空地撥給耕種其令貝勒大臣確議以聞欽此遵㫖議準張家口喜峯口古北口獨石口山海闗外各有曠土如宗室官員及兵丁有願將壯丁地畆退出取口外閒地耕種者該都統副都統給印文咨送按丁撥給九年議準喜峯口獨石口外既無閒地正紅旗又無赴邉外領地之人不必撥給今以古北口外地撥與鑲黃旗正黃旗羅文峪外地撥與正白旗冷口外地撥與鑲白旗正藍旗張家口外地撥與鑲紅旗鑲藍旗又題準官員兵丁地畆不許越旗交易其兵丁本身種地不許全賣二十年題準滿洲新歸旗者停給園地二十四年議準直𨽻州縣百姓墾荒田地停止圏撥如有各處壯丁及新滿洲將皇莊並上三旗内務府及八旗禮部光禄寺丈量所餘地撥給竢此項地撥完時再行請㫖雍正六年覆準旗莊地畆冊貯内務府及户部凡各州縣檢閲原冊例應申請咨部轉行知照往返動需嵗時屢據民人控告旗荘強霸不結之由總因冊案未易清釐州縣官雖知隱占情弊不便懸斷以致旗荘益得恣行兼并應行文内務府宗人府八旗都統將内府大糧荘頭及内府官兵投充當差人等見在實有地畆由内務府覈眀實數並坐落州縣鄉村名下地叚四至造具清冊咨送户部其親王以下閒散宗室以上荘頭及府属官兵投充當差人等地畆由各府属佐領管領造四至清冊覺羅八旗荘頭及官兵投充人等地畆由該旗造具清冊咨送户部務須一様二本一留部存案一由部轉咨直督𤼵布政使司照造清冊鈐𤼵州縣與民人糧地清冊一同存貯嗣後有旗民互爭之案檢冊覈對不難勘丈訊斷再此内帶地投充人户有隱數頃或數十頃者亦應徹底清理一並行文内務府及八旗都統遍行傳示如有前項隱瞞地畆以奉㫖之日為始定限一年令在該管處自行首眀照例免罪首報地畆别造清冊咨送户部題眀仍著輸租當差如過限一年及首報不實或被告𤼵將地入官嚴加治罪造送冊籍之官一并交部議處至此項冊籍頒𤼵以後每年不免有移换之處應於每年終令両翼監督將税買過旗地若干造具清冊二本彚報户部咨行各属知照注冊以備察覈七年諭八旗地畆原繫旗人産業不準典賣與民向有定例今竟有典賣與民者但相沿已乆著從寛免其私相授受之罪各旗務將典賣與民之地一一清出奏請動支内庫銀照原價贖出留在各該旗給限一年令原業主取贖如逾限不贖不論本旗及别旗人準其照原價承買欽此十二年題準八旗地畆坐落直属州縣為數浩繁片叚錯落非逐佃勘丈無由知其確數而該佐領下領催人等貪圗私取租銀句連地户將餘出地及絶户地隱匿不報亦有佃户因無業主取租乗機隱漏認為已業者更有隱匿年乆竟認為墾荒首報者此非經管人員不能悉其界址底裏令八旗都統各委叅領一人於農隙時㑹同州縣清丈所有餘地及絶户地案照肥瘠酌定租數交地方官徵租彚觧户部倘有恃強阻撓勘丈者理事同知㑹同地方官審理嗣後凡有報出絶户之地一面報部一面委官勘眀交地方官徵租乾隆二年奏準官用旗地向在入官地内動撥今入官地畆已經分給各旗作為公産未便再行動用按直属有駐防旗人交出在京所受之地及各荘頭退出之地又有八旗丈出餘地並户絶無人承受之地嗣後荘園人等當差官地及奏免給還並各項官用應行補還者統於前項地内動撥至旗人來京當差應得地畆亦在此内撥給又奏準凡興工修築動用旗地地方官於興工日將畆數姓名旗分造冊咨送撥補三年諭朕前以旗人生計貧乏者多將八旗入官地立為公産收租觧部按旗分給以資養贍此等地内有定鼎之初圏給八旗官兵開除田賦者亦有旗人與百姓自相交易出銀置買仍在州縣納糧者原属不同若以入官之後一槩定為公産不準民贖殊非朕軫念畿輔黎赤之本懐嗣後除原圏官地不準民間置買外其旗人自置有糧之地見在入官者不論旗民準照原估價直變賣將銀交各旗料理生息分給旗人俾沾恵澤欽此四年諭八旗議奏將公産地價贖回民典旗地等語我朝定鼎之初將近京地畆撥給旗人在當日為八旗生計有不得不然之勢其時旗人所得地畆原足以資養贍嗣因生齒日繁恒産漸少又或因事急需將地漸次典與民間為業閲年乆逺輾轉相授已成民産今欲將從前典出旗地陸續贖回必須於民全無擾累辦理始為妥協再此項地官員内尚湏扣俸認買貧乏兵丁食餉有限無從措價勢必至盡歸富户富户即肯周濟親族亦豈能多為分給則贖地一事未必於貧乏旗人有益可將此㫖行文直𨽻總督詳悉妥議欽此五年遵㫖議準民典旗地動公項取贖在百姓不苦於得價還地實懼其奪田别佃應令地方官於贖地時詢眀見在佃種人姓名及見出之租數造冊送直月旗轉傳八旗備案嗣後無論何人承買仍令原佃承種其租銀照冊收取不得分外需索至民有在旗地内造房立墳者如已退地其從前蓋造房屋並墳墓所占地基只令丈眀畆數照例交租不許勒令遷移再民典旗地不下數百萬畆典地民人不下數十萬户若一時槩令首報否則治以隱匿官田之律未免滋擾按老圏旗地界址甚眀老圏之内但有民産即繫私典應勘眀地畆界址旗色佐領及原業主姓名將承買公産餘銀先交地方官取贖至圏外旗地或繫民人帶地投充或繫旗人自置其有出典與民者應竢圏地贖畢公産尚有餘銀再訪原贖之家陸續辦理不必豫期行文稽察又取贖民典旗地貧乏兵丁既無從措價亦不能多買按八旗公産及旗退餘存入官等地並此項贖回民田不下數千萬畆應詳察八旗閒散人内有正身情願下鄉種地者上地給與百畆中地給與百五十畆下地給與二百畆令攜家口居鄉耕種初種之年量給牛種房屋之資又覆準八旗都統於閒散正户中選人安静居家勤儉者善為開導令下鄉耕種不必指定人數亦不必拘定年限陸續𤼵往下鄉之後仍準簡選當差初下鄉屯每户給房四間每間折銀十両令地方官蓋造每名給牛具耔種口糧等銀百両如承買公産人等有願令子弟下鄉耕種者亦照此辦理於公産項下給𤼵又覆準如有旗民互相典賣公産地畆者將賣地人等嚴行治罪出給圖記售賣之該佐領等交部議處屯領催荘頭設法典買旗地之民槩行治罪地畆價銀一并入官七年奏準凡旗人地畆有無私行典給民人之處於每嵗底交各該佐領出結呈報都統備案民人交里長甲長亦於年終將有無私典旗地之處察眀出結禀報該州縣轉詳直督存案如有私典情弊一經察出繫旗人該佐領即行呈報都統民人州縣官即行詳報直督皆照例治罪地畆及地價一并入官如該管各官失於覺察或經發覺或被首告將佐領驍騎校領催州縣官甲長等一并交部議處八年奏準八旗承買公産地畆人等有情願赴屯自種者均給與印信執照令其呈報該地方官驗看回旗之日銷燬如有從前赴屯種地者各該旗詳細察眀按名補給印信執照十一年奏準凡民典旗地不論契典年限當以十年為率其在十年以内者照原典之價十年以外者每十年減原價十分之一五十年以外者均以半價令原業主取贖如原業主不願回贖該旗出示曉諭準令各旗官兵照減價具呈認買為業其扣交地價均照公産五限之例辦理又議準贖回民典旗地如原業主無存者準令原業主之子孫及同胞弟兄適親伯叔及適親兄弟之子等回贖該叅佐領等出具實属親属並無揑飾印結送部辦理如原業主並無應贖之人方準逺族人並異姓人等具呈認買倘有藉原業及原業之適属姓名代贖者察出將出結之叅佐領等叅處仍將冐名代贖之人嚴行治罪十二年奏準八旗滿洲䝉古漢軍閒散人及情願告退錢糧下屯種地者該旗即行保送下屯後本人不準來京當差其下屯種地之旗人子弟内有情願來京考試當差者仍照原議辦理認買公産地畆人等子弟有願下屯種地者一例準令前往除給與房地外其應給牛具耔種銀各該旗委該叅佐領等㑹同察旗御史每户先給銀十分之三以為料理車脚般移之費下存七分該旗委叅佐領等赴該州縣㑹同地方官將牛具耔種估需價直即行購備按户支給餘剰銀給與各該户以資生計十三年奏準開濬河道占用旗地各該属於興工以前先行丈眀占用地畆數目詳開原業姓名旗色佐領村荘叚落造具清冊送部咨行各該旗定限半年察眀取結送部覈對相符者準其撥補如逾限不行咨覆及咨覆不符者槩不準撥補倘原業内有升遷外任或撥往外省駐防者該旗一靣行文該處一靣報户部扣限辦理十四年題準贖回民典旗地千八百六十九頃五十八畆並場園房屋地基各項用銀十有九萬八千一百五十五両有竒餘剰銀應歸續𤼵接贖地價銀内為將來贖地之需十六年奏準八旗正户原準其下屯耕種今有不肖之徒冒領房屋牛具等銀任意花消逃回京城者不一而足應令直督察緝逃户依律治罪嗣後旗人停其下屯種地十八年議準旗下奴僕及開户人典買旗地請定限一年令其自行首報官為回贖如繫其主地畆應比民典旗地之例量為加重將十年以内者即照原價減給十分之一十年以外減給十分之二以次按年遞減竢官為回贖後聼其業主交價認領或典價本多一時不能湊交準其照民典旗地之例於俸餉内分五限扣交若將地畆賣給家奴是其主原不知自顧生計反得將已棄之産分限扣俸減價認贖未免太優應令交足見銀方準認領至旗人將地畆典賣與别姓奴僕則與奴占主産有乖名分者不同應照民典旗地之例減給原價十分之一仍按年分遞減但實繫典出者方準原業主於俸餉内照例分五限扣價認領其賣出者即將地贖回入官不準認領亦不準他人承買此等入官地及確準認領而原業主無力並無俸餉可扣不能認贖者均交八旗内務府作為旗人公産官為收租每於嵗終將收過租息數目彚奏請㫖賞給貧乏旗人以資養贍仍令該旗及地方官不時嚴行稽察倘有逾限不行首報或經清釐之後復違例典賣者一經𤼵覺即徹地入官將業主售主照例治罪並將失察徇隐之該叅佐領及地方官交部分别議處其民典旗地嗣後一并停其召買交與該旗作為公産將所收租息歸入此案於嵗終彚奏増給貧乏旗人一盛京等處官兵荘田國初創業東土扈從將士按旗分處各有定界繼因歸附益衆糧不足支展邊開墾移両黃旗於鐵嶺両白旗於安平両紅旗於石城両藍旗所分張義站靖逺堡地瘠以大城地與之順治五年題準沙河所以外錦州以内八旗官員家丁每名給地三十六畆又題準官員荘屯両黃旗設於承徳縣沙河所両白旗設於寕逺州兩紅旗設於承徳縣塔山兩藍旗設於錦州十二年題準遼陽鐵嶺至山海關八旗荘地多有在邊外者相沿已乆不必遷移令照舊種住惟酌量邊界開門勿誤耕穫康熙十二年題準旗人有墳墓在盛京欲從京城遷往就近守䕶者若將在京所受地畆退出準撥給盛京熟地不退者撥給荒地十九年議準由京城遷往盛京當差官兵及安荘人等有將在京地畆退還願領盛京地畆者將彼處旗人墾出餘地並未墾荒地酌量撥給二十五年題準錦州鳯凰城等八處荒地分撥旗民給牛屯墾每十六丁内二丁承種餘十四丁助給口糧農器又題準黒龍江黙爾根地方由户部各差官一人監看耕種黙爾根令索倫逹虎里官兵耕種黒龍江令盛京將軍户部侍郎酌量開墾雍正十一年題準喜峯口駐防兵丁百名將鐵門闗外大屯官地分給每名給地一頃十有五畆七分有竒菜園四分有竒令其耕種照民例分别科則按畆輸租租銀留充兵餉乾隆元年覆準口外熱河地方設立驛站營汛官兵皆有恩賞額地後因滋生日乆遂於額外之地各自開墾今悉行丈出除原額外所有餘地應令按畆納糧至古北口乃邊闗重鎮駐防兵丁挈家戍守沿邊瘠地皆繫自力逐漸開墾出息無多丈出之地應悉賞給免其輸糧又各䝉古丈出餘地若令納糧恐不敷養贍又内府當差鷹手捕牲人鞍匠等散處口外皆有開荒地畆伊等原在内府當差不便令其一例納糧均將見在丈出餘地注冊亦免其納糧嗣後如再有開墾即照例按畆徵輸三年覆準黒龍江湖蘭地方設立官荘令盛京將軍於八旗開户人内選能種地壯丁四百名絜帶家口前往開貇每壯丁一名撥給地六十畆蓋給草房二間每十丁合編一荘共設官荘四十所每十荘設領催一名共設領催四名管理由盛京遷移家口每名給碾磨銀五両其家口每人給整備行裝銀二両沿塗各給口糧撥驛站車送至吉林由吉林撥運糧船仍給口糧送至湖蘭初至湖蘭每丁給冬夏衣帽其家大口每月給糧二斗四升九合小口半之每開墾地六畆給耔種二斗每荘給牛六隻如有倒斃動支庫貯牛價銀買補再湖蘭安駐兵丁各有墾種地畆不能代官荘人等助墾於每荘額給牛六隻外各多給牛二隻令全出已力墾種此牛如有倒斃無庸補給每牛月給牛料糧一石二斗其家口糧給一年牛料糧給両月皆停止每丁所受之地嵗納粗細糧三十石第一年免輸第二年交半第三年全納再委撥官兵採木造屋每間各給飯銀四両動支庫銀倉糧令該將軍等分晰歸欵奏銷竢安設官荘事竢令盛京將軍再於八旗開户人内詢眀有願往湖蘭墾種官地之人應増設官荘若干再議具奏六年議準湖蘭地方寛衍可設官荘之處尚多應將前設四十官荘之閒丁一百三十八名内選擇五十名増設官荘五所撥地開墾每名給地六十畆及牛種器具口糧並每年應納糧數均照二年之例但選撥官荘閒丁不比他處移住其每丁應給房二間每間給銀四両五錢令其自行蓋造無庸别撥兵丁至餘丁備補各荘空闕七年議準湖蘭左近溫得亨山並都爾圖地方土性肥饒水草佳羙應將盛京將軍所送願墾官地開户人内選能種地壯丁五十名増設官荘五所撥地開墾其資送及撥給田房牛種器具衣帽口糧並應納糧數均照二年之例再六年増設官荘五所合之此次所増官荘五所已足十荘之數亦照例増設領催一名管理一直省駐防官兵荘田順治四年題準江寕駐防旗員給園地百八十畆至六十畆不等西安駐防旗員給園地二百四十畆至二百十有五畆不等又定浙江駐防官兵不給田俸餉照經制支領五年題準各省駐防官兵家口半攜去者其在京園地半徹全攜去者全徹六年題準外省駐防旗員初任未經撥給園地者準令撥給其加級升任者不復増給凡應給地六十畆以下者户部撥給六十畆以上者奏請撥給七年題準駐防官兵量給園地兵及壯丁每名給地三十畆臨清州太原府以無主地並官地撥給保定府河間府滄州以八旗退出地撥給康熙三十一年題準將山西陽曲太原二邑所属享堂等六屯地畆撥給晉省駐防官兵三十二年議準各省駐防之八旗官兵均在所住處給與地畆一井田改屯地雍正二年覆準内務府餘地共一千六百餘頃拖欠錢糧人等所交地共二千六百餘頃以二百餘頃作為井田將無産業之滿洲䝉古漢軍共選百户前往耕種每户授田百畆凡八百畆為私田百畆為公田共力同養公田委户部司官勘丈設立村荘蓋土房四百間給與種地人口糧耕牛耔種農具以便耕種並於八旗廢官内各簡選一人前往管理五年奉㫖旗人犯枷責治罪革退官兵並無恒産令於京城附近直𨽻地方耕種井田又奉㫖井田地方止有一人管理著於彼處再設驍騎校四人領催八人料理事務其俸餉升轉悉照在京驍騎校領催之例乾隆元年奏準設立井田以來所有承種之一百八十户縁事咨回者已有九十餘户循環頂補大都皆不能服田力穡之人行之未見成效行令確察實力耕種安挿得所者改為屯户按畆納糧於附近州縣倉内收貯備用原設領催改為屯長約束屯户聼該處防禦管轄原設驍騎校徹回該旗補用不能力穡之户咨回本旗停其撥補原領田房交州縣賃耕取租觧部又議準改屯人户故後有子孫者自應頂補倘無子寡婦情願守節並無親属可依者留地四十畆養贍即令本屯人代種完糧身後仍將地入官召種再各村向設鄉長一名專供督責井户農務交糧稽察逃盗賭博等事仍留供役果能勤慎準其㧞補屯長一牧馬草場畿輔牧場鑲黃旗坐落武清縣寳坁縣東自唐畦西至陳林荘七十里南自張家荘北至上馬臺九十里正黃旗坐落天津府西北自俞家荘東北至小稍子口三十五里西南自孫家荘東南至狄家荘四十七里正白旗坐落天津府東自好字沽西至白家荘四十二里南自城兒上北至清溝六十五里正紅旗坐落甕山十有五頃蘆溝橋西髙陵二十七頃六十畆鑲白旗坐落通州二十四頃八十四畆鑲紅旗坐落順義縣天竺馬房村三十五頃二十八畆蘆溝橋四頃八十畆正藍旗坐落豊臺王蘭等荘東西三十里南北五十里鑲藍旗坐落草橋十里廊房八里順治二年題準御馬場王貝勒貝子等馬場各按本旗地方牧養又題準天師庵草場設場尉筆帖式及書役甲兵廵守又題準近京廢地均撥給壯丁墾種如撥給有餘方準為牧場六年題準順義清河漷縣沙河蘆溝橋五處荒地千四百十有八頃四十四畆潞河沙河清河桑乾河両岸各長五里濶三里皆令丈作馬場又題準嗣後棄地作為牧場永行停止如沙地不堪耕種者仍準牧馬十二年覆準親王牧馬場方二里郡王牧馬場方一里額外多占者察出撥給壯丁康熙元年題準天師庵草場歸并崇文門部員管理其原設官役甲兵皆裁十二年題準太僕寺牧場向繫户部撥給入官人看守今内府並諸王貝勒等馬就牧場内餘丁選補看守如無可選者仍行令户部撥給三十年題準徳州駐防官兵向在滄州牧馬因越省不便將霑化縣邵家荘所有荒地令作馬場其應徵地畆銀準其豁免雍正二年議準八旗存留牧場並牧場餘地差八旗都統一人率户部賢能官二人每旗賢能官一人令直督委道員一人公同察勘其有可以墾種者交與地方官召民墾種其不堪耕種之處仍交八旗作為牧場盛京牧場順治五年題準奉天中前所前屯衞中後所三處地令八旗均分為牧場自東迤西先給两黃旗次两白旗次两紅旗次两藍旗康熙二年題準錦州大凌河牧場東至右屯衞西至鴨子厰南至海北至黃山堡仍留備用牧馬不許民間開墾乾隆十三年議準大凌河馬場長百餘里濶三四五六十里不等甚属寛廣今既裁減馬羣應於馬場西界橫截十里給與官兵就近耕種以資養贍但恐伊等日後圖利私行侵占開墾耕種有礙馬場令差往大臣㑹同該副都統並總管覈眀應裁牧場地址編定四至注冊備考又奏準錦州大凌河馬場東至右屯衞西至鴨子厰南至海北至黃山堡丈得東西長九十里南北長十有八里至六十里不等折算約二百九十餘里計地萬七千九百餘頃此内應遵照原議自西界橫截十里㑹同該副都統牧羣總管丈量西邊自南至北長十八里有竒東邊自南至北長二十里有竒其自東至西應截地内南界窄狹北界有山有足截十里者有不足十里者照依地勢裁給計地已有九百三十八頃有竒隨分定界址東至杏山北至濠溝西至鴨子厰南至七里河北至金厰堡將裁截所在建築封堆以杜將來私墾一撥給官房順治十一年議準八旗官員兵丁均照分定地方居住若遇調遣更地仍準住原處有情願置屋遷移者聼從其便都統副都統不許強令遷移如欲自蓋房屋者該都統副都統察給本旗空地準令自造至外來歸附人員應得房屋照所得旗分買屋安挿若無房屋行文工部於本旗空地蓋給康熙三十四年題準於大城八門外每旗蓋造住房二千間共萬六千間無房屋旗人每人給房二間居住雍正元年覆準八旗取租官房有傾斜者若租住之人願以已力修理該管官將修理價直及如何修理之處料估計算報該管大員令其修理居住其修理價直竢抵完房租之日再行取租三年諭旗下所存之官房若令各該旗管理叅領等或有作弊之處亦未可定相應調旗管理鑲黃旗官房著正白旗管理正白旗官房著鑲黃旗管理鑲白旗官房著正藍旗管理正藍旗官房著鑲白旗管理正黃旗官房著正紅旗管理正紅旗官房著正黃旗管理鑲紅旗官房著鑲藍旗管理鑲藍旗官房著鑲紅旗管理欽此乾隆二年奉㫖賞給公産地價銀十有六萬七千餘两建造官房分給八旗貧乏旗人居住十年奏準凡修理房屋各旗酌量所得租銀數目將應行修理者修理如所剰銀不敷動用其工程可緩者竢續得租銀時再行修理若不能乆待必需及時修理者該旗奏眀縁由交工部委官料估修理十六年奏準八旗生齒日繁無業旗人未免不敷居住之慮京畿重地空隙之處理宜修建整齊請將分給八旗屯種人户存退餘絶地租銀及直属見存續行入官並未賣公産等地嵗入租銀令歩軍統領察眀京城空隙地基給價置買交與工部估建官房賞給貧乏旗人居住其臨街市房屋或有坍塌詢眀原業情願售賣者照例給價置買一并修建完日交各旗該管官不時稽察或有私相典售者將房屋撤出價銀入官照律治罪該管官失於覺察亦照例議處再乾隆二年分給旗人官房或有坍塌及不肖之人私相典售者令各旗嚴察毋得徇隱如有坍塌之處一并確估修理按八旗隙地五百三十八處内自修者二百七十八處無庸建造者五十四處其餘空地二百六處約可蓋房三千九百六十一間委官估計按年陸續興修一承買入官房地雍正十一年議準見銀認買官房拆修聼其自便指扣俸餉認買官房竢價直照數扣完之日聼其拆修若將認買之房希圖獲利本身並不居住全行拆賣者永行禁止或於十間之内拆毁三四間將甎瓦木植變賣修理鋪靣房屋或拆此修彼移住者皆將情由呈該叅佐領報都統存案準其拆修如繫認買别旗之房亦照例呈本旗行文售賣官房旗分存案準其拆修有房人員或指俸餉或交見銀認買房屋給無房之子弟居住或因本身房屋不敷居住别買大房者皆令呈報準其認買如一人名下認買二三所或指他人名姓認買者槩行禁止該管大員或因繫本管不得認買指他人名姓承買或不肖之人將指俸餉認買之房於未經坐扣完日私行典賣或竟拆毁變賣甎瓦木料者通行禁止大小官員若非本管房屋情願指俸認買者聽其自便以上各條如有違者或經察出或被旁人首告即行叅奏照例治罪十二年奏準凡本身入官房地如繫分家别住之叔伯兄弟有情願認買者準其認買至本身及親子孫槩不準認買倘有濫行具呈及濫準認買者將具呈之官兵分别議處準其認買之該管官交部察議又議準認買入官房地人口之官兵有以見銀認買者即著將銀先交户部給𤼵回文該旗行文两翼給𤼵印信執照報部若指俸餉買者竢俸餉坐扣完日再行移咨两翼給𤼵執照報部備案毋庸納稅乾隆二年覆準入官房屋價千两以上至數千两者除一二品以下官員並兵丁等認買價直數百两者除三品以下官員並兵丁認買外其一二品大員果無房屋居住取具該管官印結報部方準認買若有房居住者應禁止認買倘一二品大員内有房居住詐稱無房濫行認買及該管官扶同揑結者察出一并交部分别議處四年諭從前䧏㫖令將入官地仍賞與八旗以為恒産隨經八旗大臣議請借支庫銀於京城空地蓋屋賞給無房之人居住將公産地租陸續補庫其續收地租作何賞給永逺接濟再議具奏等語朕思此項地畆皆繫旗人舊業有因拖欠錢糧入官者有貪婪官吏抵應賠欵項入官者既賞還八旗人等仍留公官辦不但所得地租分散之時勢難均齊而地畆租銀官收之數亦必少於私收分賞衆人則人多數少無濟於事勢必隨手花費此項地畆仍令八旗官兵或指俸餉或交見銀承買為業則八旗人等各得立産於生計自有裨益承買價銀即補蓋房之費其餘銀作何辦理及見有地作何視其肥瘠酌量等第别定價直令其認買户部八旗大臣等詳晰議奏欽此遵㫖議準一等地每三十畆作價銀四十八两二等地三十八两三等地二十八两四等地十八两荒地十二两凡官兵人等領買者無論銀數多寡分作五次限五年交完其指俸餉抵買者令坐扣五年完結如一人名下入官地坐落一處頃畆數多承買之人俸餉不敷坐扣者準先交不敷銀其餘按季按月坐扣俸餉若無力先交不敷銀準將不同居之親族俸餉抵買或與異姓無産之官兵合買買後任其分割如合買人内或有事故不準一人獨退其未完銀令同買之官兵竢本身應扣地價完日再行接扣地畆即令接扣之人管業再雍正七年曽奉諭㫖動支庫帑贖回民典旗地令公産地價除抵還蓋造官房所借庫銀外原繫八旗應辦生息之項即以此項銀𤼵地方官贖回報部先令原業主照原價交官給還原産如原業主不願承領即準各旗官兵及閒散人或扣俸餉或交見銀承買倘旗民圖利私相説合隱匿不報及典地年乆原業主不知坐落典主有心隐匿者皆照隱匿官田律治罪六年奏準拖欠錢糧人等報出所典房地詢眀房地原主如願限一年内照原典價贖回或願指俸餉坐扣贖回者仍聼原主贖回如不願贖回將房地照例入官變賣一承追帑項雍正三年奏準侵盜那移等贓交旗行追人犯限一年追完如不能完著落犯人之妻及未分家之子再限一年追完如仍不完實属無力者該佐領驍騎校叅領保呈都統副都統保題豁免倘保題後有房業人口可以賠補者察出盡行入官將保呈之佐領驍騎校革職所欠之項著令賠補都統副都統叅領一并革職至一應贓私果力不能完者即予豁免不得株連親族倘濫及親族追賠將承追各官從重治罪又奏準承追虧空官能將虧空人所匿房産察出及能催追於限内完結銀至二千两者準紀録一次四千两者紀録二次六千两者紀録三次八千两者準加一級若所追納又有多於此者皆按此數予以加級紀録四年奉㫖虧空銀交各該處催追令將完納數目行知承辦之旗於嵗終彚奏其中如有家産已完等情令該旗奏聞著為定例五年奉㫖凡入官房産所變價直較原欠之數有餘者將餘銀給還本人六年諭各省虧空賠補之項該員任所無完例於本籍本旗追變仍令觧交該省歸欵但應完銀多寡不同少者有行李舟車之費多者有道路疎失之虞往返觧送殊多周折且各省藩庫均属國家公帑原無區别嗣後有行旗行籍追補等項該員交納之時在籍者即於本省布政使司衙門具呈交納布政使察收貯庫候撥申報廵撫該撫將所收數目咨報户部户部行文知照應觧省分在旗者即於該旗具呈該都統咨送户部行文知照應觧省分如此則官員賠補錢糧者就近完納可免運送之煩欽此又諭拖欠公庫銀所以令該管之人分賠者蓋以當時經管錢糧之人將公帑借給之時或徇情受託或剋扣分肥不論人家産之厚薄濫行借給致成虧空無可著追揆情定罪是以責令分賠以示懲戒但分賠多人各人名下自有應賠之數若該員將應賠之數完納其情已畢倘將他人不能完納之數加於見在之人則一人又代衆人分賠殊於情理未恊嗣後凡属分賠之項本人止完自已名下應賠之數若同賠之人有無力完帑者將此分賠銀豁除歸結不得於他人名下濫行攤𣲖著通行八旗奉為定例欽此十三年覆準辦理虧空如繫墳園房屋人口祭田一槩不準入官從前有已經入官者亦請㫖令該旗逐一清釐給還本人又覆準虧空賠累追贓捜撿家産等案槩不許提訊婦女倘有刻薄官員侮辱婦女或經告𤼵或經該上司察出照違例治罪倘該上司徇庇及失察者一并議處乾隆元年奏準凡闗祭田如三頃以下即撥出給還本人如有十餘頃者以三頃給還本人其餘仍入官又議準本官經管錢糧所属有借支借領與夫同官那借出有印領者應開抵追完至平日債負或幫助親友以及同官私借雖有文約並無印領者無論逺年近年有無確據應遵諭㫖一槩不準開扺又議準承察承估承變承追原有一定例限其遲延不力各官自有應得處分如覈估之人勘報不實希圖朦溷及承變承追以多報少瞻徇延緩以致帑項懸闕者著令賠補實属允當若察勘本無不實催追並無徇縱止因變抵不敷公項未完遽令代賠殊有未協嗣後察估察變之官該管上司察眀果無情弊仍在本人名下歸結不得勒令代賠其遲延不力照例議處欽定大清㑹典則例卷一百七十三
