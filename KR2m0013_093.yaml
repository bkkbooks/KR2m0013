body:
  text: 禮部祠祭清吏司喪禮三太妃喪儀順治十八年正月初七日皇考貞妃薨一切祭儀悉從妃禮康熙四年十二月二十五日皇曾祖夀康太妃薨奉㫖致祭奉安事宜皆於滿百日後舉行自薨逝日為始聖祖仁皇帝輟朝三日大內以下宗室以上三日內咸素服不祭神王以下奉恩將軍以上民公侯伯都統尚書以下佐領騎都尉以上公主福晉以下奉恩將軍恭人以上咸齊集初祭用引幡以楮為之一金銀定以楮為之七萬楮錢七萬畫段萬端饌筵三十一席牛一羊十有八酒九尊讀文致祭次日繹祭金銀定五千楮錢五千饌筵五席羊三酒三尊大祭與初祭同奉移豫日致祭用金銀定楮錢各萬饌筵十有三席羊五酒五尊至日啓送盛京福陵妃園寢期年歲暮淸明之祭一應禮儀悉從妃例六年十一月三十日皇考恪妃薨聖祖仁皇帝輟朝三日大內以下宗室以上三日內咸素服不祭神王以下奉恩將軍以上民公侯伯都統尚書子以下佐領騎都尉以上公主福晉以下奉恩將軍恭人以上照例齊集初祭大祭繹祭及奉移豫日致祭皆與夀康太妃喪禮同皇祖康惠淑妃薨聖祖仁皇帝輟朝三日大內以下宗室以上三日內咸素服不祭神王以下各官公主福晉命婦照例齊集初祭大祭繹祭奉移豫日致祭及期年淸明歲暮之祭皆與夀康太妃喪禮同十三年十一月二十日皇祖懿靜大貴妃薨聖祖仁皇帝親詣冠摘纓緯祭酒行禮輟朝三日大內以下宗室以上咸素服不祭神王以下奉恩將軍以上滿漢民公侯伯以下四品官以上公主以下鎮國將軍夫人以上民公侯伯夫人以下一品夫人以上咸齊集初祭大祭繹祭羊酒楮帛饌筵之數皆與康惠淑妃同百日致祭用金銀定楮錢各二萬五千饌筵十有五席羊七酒七尊奉移盛京豫日致祭用金銀定楮錢各一萬八千五百饌筵十有五席羊七酒七尊期年致祭與奉移禮同清明歲暮之祭皆與祭康惠淑妃禮同二十八年四月初三日皇考恭靖妃薨聖祖仁皇帝輟朝三日大內以下宗室以上三日內素服不祭神王以下一品官以上公主福晉以下一品夫人以上咸齊集初祭大祭周月百日清明中元冬至歲暮及奉移奉安致祭一應禮儀與六年恪妃喪禮同三十三年六月二十一日皇考寧慤妃薨聖祖仁皇帝親詣冠摘纓緯祭酒行禮餘儀與二十八年恭靖妃喪禮同四十八年六月二十六日皇考端順妃薨一應禮儀與三十三年寧慤妃喪禮同五十二年十月三十日皇考淑惠妃薨聖祖仁皇帝親詣冠摘纓緯祭酒行禮餘儀與四十八年端順妃喪禮同雍正五年閏三月初六日皇考榮妃薨十年四月初七日皇考惠妃薨十一年八月二十五日皇考宜妃薨乾隆元年八月初八日皇祖宣妃薨一應禮儀皆與康熙五十二年淑惠妃喪禮同二年正月初二日皇祖熙嬪薨照例輟朝三日一應禮儀悉從嬪例是年四月初七日皇考齊妃薨皇帝親詣冠摘纓緯祭酒行禮餘儀與元年宣妃喪禮同四年三月十六日皇祖謹嬪薨一應禮儀與二年熙嬪喪禮同五年十月三十日皇祖成妃薨一應禮儀與元年宣妃喪禮同八年四月初一日皇祖慤惠太妃皇貴妃薨由部以輟朝五日具奏奉㫖輟朝十日皇帝親詣冠摘纓緯祭酒行禮一應禮儀與雍正三年敦肅皇貴妃喪禮同九年四月十八日皇祖順懿密太妃薨奉㫖除事出之日不計外輟朝三日皇帝親詣冠摘纓緯祭酒行禮餘儀與五年成妃喪禮同是年六月二十三日皇祖通嬪薨十一年六月二十八日皇祖襄妃薨一應禮儀與四年謹嬪喪禮同十八年十二月二十日皇祖純裕勤太妃薨皇帝親詣冠摘纓緯祭酒行禮二十二年四月初七日皇祖定妃薨皇帝親詣冠摘纓緯祭酒行禮餘儀皆與九年順懿密太妃喪禮同一皇貴妃喪儀雍正三年十一月二十三日敦肅皇貴妃薨世宗憲皇帝輟朝五日大內以下宗室以上十日內咸素服不祭神所生皇子摘冠纓截髮辮成服二十七日除服百日剃頭皇貴妃宮中女子內監皆剪髮截髮辮成服姻戚人等成服皆大祭日除服百日剃頭特簡公大臣辦理喪儀奏遣近支王公七人內務府總管一人散秩大臣三人侍衛九十人成服大祭日除服剃頭尚茶尚膳人等成服皆大祭日除服百日剃頭內府三旗佐領內管領下官員男婦以三分之一成服大祭日除服剃頭執事內管領下人員大祭日除服百日剃頭皆停止截髮辮剪髮初薨日親王以下奉恩將軍以上民公侯伯以下四品官以上朝夕日中三次設奠咸齊集公主福晉以下縣君一品夫人以上朝夕奠齊集至奉移後惟祭日齊集百日內三次奠獻百日後至未葬以前每日中一次奠獻朔望仍三次皆內府官及內府佐領內管領下成服男婦齊集每奠獻遣內管領妻祭酒三爵每祭一叩衆隨行禮畢各退二十八日奉移金棺於阜成門外十里莊先期行奉移禮致祭金銀定七千五百楮錢七千五百饌筵七席羊二酒五尊設儀仗讀文致祭齊集行禮奉移日禮部堂官祭輿金棺啓行王以下各官咸隨行所過門橋禮部堂官祭酒公主福晉命婦等皆先往殯宮祗候奉安祭酒行禮畢各退越日行初祭禮用金銀定楮錢各九萬畫段千端楮帛九千饌筵三十五席羊二十一酒二十一尊設儀仗齊集行禮與奉移致祭同次日繹祭金銀定楮錢各七千五百饌筵七席羊三酒三尊禮部工部內務府光祿寺堂官及內務府成服之官員執事人等男婦齊集行禮大祭禮與初祭同次日繹祭如前繹祭儀又奏準貴妃晉封皇貴妃於未受册封之前薨金册寶停其鑄造照例製絹册寶備書諡號擇日遣正副使二人讀文致祭先期一日遣官祗告太廟後殿奉先殿告祭事宜由各該衙門辦理絹册寶由工部製造册文祭文由翰林院撰擬册諡吉期由欽天監選擇皇貴妃先封貴妃之金册寶交內務府收貯至日行册諡禮王以下四品官以上公主福晉命婦等咸齊集鑾儀衛豫設采亭於午門外正副使二人詣內閣於册寶案前一跪三叩恭奉册寶由午門中門出安采亭內一跪三叩興校尉舁亭册前寶後黃蓋御仗前導執事官員隨行至殯宮大門外亭止正副使於亭前一跪三叩恭奉册寶由殯宮中門入陳於案册左寶右正使詣香案前三上香畢宣讀官以次宣讀册文寶文畢復於案退讀文祭酒致祭行禮如儀初周月致祭用金銀定一萬楮錢一萬一千饌筵十有一席羊五酒五尊設儀仗齊集行禮二三周月致祭同百日內遇清明致祭不焚楮錢用挂楮錢寶花即佛朵一座中元冬至歲暮致祭用金銀定楮錢各一萬五千皆饌筵十有五席羊五酒五尊設儀仗齊集行禮百日後清明用挂楮錢寶花一座中元冬至歲暮金銀定一萬楮錢一萬一千皆饌筵九席羊三酒三尊四年三月行百日致祭禮用金銀定楮錢各二萬五千饌筵十有五席羊七酒七尊設儀仗齊集行禮儀與大祭同是年十一月期年致祭用金銀定楮錢各一萬八千五百饌筵十有五席羊七酒七尊設儀仗齊集行禮儀與百日致祭同五年再期致祭用金銀定二萬楮錢一萬饌筵九席羊五酒五尊設儀仗齊集行禮儀與期年同六年奏準皇貴妃在殯已逾三年所有朔望三時奠獻每日中奠饌筵應行停止每月朔望奠饌筵一席羊一四時致祭用金銀定楮錢各一萬饌筵十有一席羊五酒五尊清明用挂楮錢寶花一座忌日用金銀定楮錢各一萬八千五百饌筵十有五席羊七酒七尊不設儀仗內管領下官員執事人等齊集每致祭時辦理喪儀公大臣及禮部工部內務府光祿寺堂官各一人前往監視致祭令內管領妻祭酒朔望祭祀令宮殿監領侍祭酒掌儀司官一人監視奠獻乾隆二年奉移金棺隨孝敬憲皇后送往泰陵先期行奉移禮用金銀定楮錢各一萬八千五百饌筵十有五席羊七酒七尊設儀仗齊集行禮沿塗駐宿奉安於蘆殿左閒奠饌筵一席至日奉安於隆恩殿西蘆殿次日行奉安禮致祭用金銀定楮錢各一萬五千饌筵十有三席羊五酒五尊設儀仗辦理喪儀王大臣暨送往之公大臣官員在陵之貝勒大臣官員暨貝勒夫人大臣官員妻等咸齊集禮畢各退至葬日先期行奉移禮致祭與前奉安致祭儀同屆期恭移金棺升太平車從葬泰陵十年正月二十六日慧賢皇貴妃薨是日諭皇貴妃髙氏著晉封慧賢皇貴妃欽此遵㫖敬稽典禮請照册諡敦肅皇貴妃之例製造絹册寶書奉㫖加封字樣遣正副使二人行册諡禮前期遣官各一人祗告太廟後殿奉先殿屆期陳設儀仗讀文致祭王公各官齊集行禮儀與雍正三年同又奏準慧賢皇貴妃薨皇上輟朝五日王以下四品官員以上公主福晉以下一品夫人以上咸照例齊集發引日先期行奉移禮百日內三設奠初祭大祭次日繹祭周月百日致祭安葬以前清明及中元冬至歲暮致祭期年再期並三年後致祭一應禮儀皆與雍正三年敦肅皇貴妃喪禮同是年正月二十五日諭皇長子生母哲妃富察氏著追封皇貴妃所有應行典禮該部察例具奏欽此二十六日諭皇貴妃富察氏著追封哲憫皇貴妃欽此遵㫖議準請將追封字樣書於絹册寶前期遣官祗告太廟後殿奉先殿屆期遣正副使讀文致祭行册諡禮與册諡慧賢皇貴妃儀同十六年奉移慧賢皇貴妃哲憫皇貴妃金棺隨孝賢皇后梓宮送往陵寢前期行奉移禮沿塗奠饌筵至陵寢之次日安葬前一日行奉安奉移禮致祭一應禮儀皆與乾隆二年敦肅皇貴妃安葬禮同二十年十一月十六日嘉貴妃薨追諡淑嘉皇貴妃一應禮儀與慧賢皇貴妃喪禮同一貴妃喪儀康熙三十三年十一月初三日溫僖貴妃薨是日奏貴妃薨應輟朝三日大內以下宗室以上三日內咸素服不祭神奉㫖著輟朝五日貴妃所生皇子截髮辮摘冠纓成服至大祭日除服百日剃頭貴妃宮內女子及內監咸剪髮截髮辮成服至大祭日除服百日剃頭姻戚人等成服大祭日除服百日剃頭命皇子三人成服餘皆摘冠纓內務府總管一人及茶膳人員成服至大祭日除服剃頭所屬二內府佐領二內管領下官員人等及伊等之妻成服至大祭日除服百日剃頭初薨日親王以下奉恩將軍以上民公侯伯以下一品官以上朝夕日中設奠三次咸齊集公主福晉以下縣君一品夫人以上朝夕奠齊集至奉移後惟祭日齊集三月內日上食三次百日內上食二次皆內務府官及管領下成服之男婦齊集未葬期年內每朔望上食一次又定貴妃金棺奉移至朝陽門外殯宮行初祭禮用金銀定七萬楮錢七萬畫段千端楮帛九千饌筵三十一席羊十有九酒十有九尊設儀仗齊集行禮次日繹祭用金銀定楮錢各五千饌筵五席羊三酒三尊不設儀仗惟內務府官員男婦齊集大祭與初祭同次日繹祭與前繹祭同初周月用金銀定楮錢各萬饌筵十有一席羊五酒五尊二三周月同百日致祭與周月同未葬期年致祭與百日同咸設儀仗衆齊集清明不焚楮帛用挂楮錢寶花一座中元及冬至歲暮用金銀定二千楮錢一千皆饌筵五席羊一酒一尊又定貴妃金棺奉移妃園寢先期行奉移禮用金銀定楮錢各一萬五千饌筵十有三席羊五酒五尊設儀仗衆齊集沿塗宿次奠饌筵一至陵寢日不直班之大臣官員咸於興龍口之外跪迎舉哀候過隨行奉安園寢蘆殿次日行奉安禮羊酒祭物咸與奉移同皇子及送往之大臣官員在陵寢之大臣官員及其妻咸齊集將入園寢先期行奉安禮致祭禮儀與前奉安同又奏準期年致祭焚楮錢陳饌筵嗣後忌日照妃園寢祭祀之例於饗殿內供果實十二盤酒三爵上香行禮一妃喪儀崇德六年九月十七日關睢宮宸妃薨王以下佐領品級以上固倫公主親王福晉以下副都統夫人以上咸齊集陳設采仗奉移時太宗文皇帝親臨送齊集王以下佐領以上公主福晉以