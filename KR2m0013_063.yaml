body:
  text: 禮部儀制清吏司巡幸一巡幸順治八年定聖駕巡幸别造香寶攜行六部都察院鑾儀衛等衙門官行幸扈從各由禮部别鑄一印加行在二字攜用其特遣侍衛等均用鑾儀衛印又定鑾駕啓行鹵簿樂器照常陳設內大臣侍衛等均於駕後分隊隨行每隊馬首排齊前後相距丈許各隊伍毋許越次遇狹隘處候前隊過畢後隊方行不得溷爭若奉㫖傳後隊侍衛等官由兩旁進退不許衝入儀仗侍衛等官從人均在後隊隨行若侍衛等官易馬至後隊易畢馳入本隊又定巡幸時王貝勒遇乘輿即令執事回避候駕過乘馬隨行扈從王貝勒隨從人員各照定數於大清門外齊集候駕出王等在旁稍後隨行王等各隨護衛三人按該王等左右翼隨行其餘護衛各依旗分次序排列於駕後隨行王貝勒若赴御前止許親身從旁入召問則勒馬稍後缺身恭對如易馬至隨從人員處易畢隨行或赴駐蹕所於三十餘丈外下馬又定扈從大臣官員候駕過並王貝勒護衛過畢按各旗次序隨行若召問時從旁入勒馬稍後缺身恭對赴駐蹕所於六十餘丈外下馬又定乘輿行幸隨駕及不隨駕諸王貝勒咸盛服於太和門齊集候駕出宫於金水橋兩旁序立駕至跪候駕過隨行其不隨駕貝子以下文武各官及隨駕都統咸盛服於午門外常朝處兩旁序立駕出午門皆跪候駕過扈從之都統隨行不隨駕王以下都統以上送駕候㫖乃退隨駕護軍統領副都統參領等各率本旗官兵於駕出之門外排列跪候駕過各照旗按隊隨行回鑾至京城日在京諸王貝勒咸朝服於午門外兩旁序立貝子以下文武各官咸朝服於午門外常朝處兩旁序立駕入端門王以下各官皆跪候駕過王貝勒貝子公等隨進午門駕還宫皆退又定行幸處外藩王公等來朝如設燕大臣會集鳴贊官贊禮不設燕則大臣不集行禮時不贊命坐行一叩禮按品序坐又定乘輿經過地方文官知縣以上武官守備以上在百里內者咸朝服於道右百步外跪迎送百里外者免其迎送駐蹕處地方官不許進獻違者治罪又定行幸時內外官員迎送聖駕均由禮部具題請㫖康熙十年題準聖駕巡幸官員迎送由鴻臚寺具題十四年題準恭迎乘輿百里內官員一次不到者罰俸一年二次降二級調用二十三年聖祖仁皇帝東巡前期頒詔天下凡經過地方各有加恩親王以下覺羅宗室內大臣侍衛內務府武備院上駟院鑾儀衛各官及各旗護軍統領前鋒統領等官均由欽命扈從其各衙門扈從官內閣滿漢大學士各一人滿學士一人漢軍侍讀學士一人滿侍讀一人滿中書九人漢中書二人翰林院掌院學士二人侍讀學士滿漢各一人詹事府滿詹事一人起居注館滿主事一人吏部滿尚書一人郎中二人戶部滿郎中一人員外郎二人禮部滿尚書一人滿郎中二人員外郎二人兵部滿郎中二人員外郎二人主事一人刑部滿郎中一人員外郎一人工部滿尚書一人滿郎中一人員外郎四人主事二人都察院滿左都御史一人御史二人吏工二科滿給事中二人太常寺滿卿一人漢寺丞一人滿典簿一人讀祝官二人贊禮郎六人光祿寺滿少卿一人滿署丞二人太僕寺滿少卿一人鴻臚寺卿滿漢各一人滿少卿一人鳴贊四人國子監滿祭酒一人漢助教一人欽天監滿監正一人靈臺郎一人漢五官正一人博士一人太醫院御醫二人吏目三人各衙門筆帖式及各執事人員均豫行委出按次隨行駕發京師日鹵簿大駕照常陳設隨從不隨從王以下文武各官各跪送隨行如常儀所過地方鴻臚寺官先期傳知百里以內地方官率本地鄉紳士民迎於十里之外本地鎮守滿漢官軍整隊伍亦於十里外恭迎候駕至跪迎跪送均如常儀至山東泰安州躬祭岱嶽渡黃河遣官祭河神至江南江寧府親祭明太祖陵諭江南督撫江南風俗奢華務令潔己愛民敦本尚實勒碑於江寧蘇州安慶三府回鑾至山東躬詣闕里親製祝文致祭先師孔子講書於詩禮堂遣親王致祭元聖周公駕還京師不隨從王以下文武各官朝服跪迎如常儀二十八年聖祖仁皇帝南巡諭朕閲視河工巡省地方恐有司勞煩百姓著行令督撫嚴飭地方官所過道塗停止修治欽此又命部院本章仍日送內閣內閣彚齊三日一次驛送行在辦理至山東躬率文武諸臣望祭岱宗蠲山東二十九年正賦入江南境閲視河工至浙江會稽山躬祭禹陵至江寧府躬詣明太祖陵致祭回鑾至淮安府閲視髙家堰一帶隄岸指授河臣方略駕還京師三十八年聖祖仁皇帝南巡前期諭朕撫馭寰區四方無事獨淮黃兩河為患屢遣大臣督理竟無成功今諸臣請朕親臨指示因命擇吉南行親加詳勘至於吳越襟帶江湖亦為省耕勵俗凡來往所需諸物皆由京師備辦即沿塗日用亦令各該衙門照時價採買並無纎毫擾民倘官吏有私行𣲖取者察出即以軍法從事其扈從官員隨行僕從橫生事端一并從重治罪所經地方百姓不必回避照常貿易耕耘行令該督撫示諭各府州縣欽此駕發京師奉仁憲皇太后由水路行至清河御舟前進臨閲髙家堰歸仁堤等隄防畢回至清口迎仁憲皇太后舟渡河復臨視隄防命截留漕糧二十萬石於被水地方減直發糶至蘇州府諭前京口接駕兵丁朕恐踐傷麥田盡行遣還今往浙省塘路狹隘不必設兵扈從又百姓欲覩朕顔踰疇越陌塞道聚觀不必禁止但令遵令而行欽此又蠲江南浙江纍歲逋賦寬免兩省官吏降罰軍民犯死罪以下槩豫宥釋賜杭州駐防八旗年七十以上老婦白金有差減免各關稅及鹽課增額駐江寧府遣尚書祭明太祖陵復躬詣祭酒回鑾仍由水路奉仁憲皇太后還京師四十二年聖祖仁皇帝南巡閲河由暢春園啓行至泰安州登岱遣領侍衛內大臣於嶽廟致祭蠲山東州縣四十一年未完額賦其東平六州縣並蠲本年正賦入江南境沿塗閲視河防至蘇州府命鴻臚寺卿傳諭本地官員準其來朝浙江官員到杭州時來朝駐江寧遣大學士祭明太祖陵又命皇子往祭酒回鑾以河工告成頒詔天下是年十月聖祖仁皇帝西巡命給事中御史各一人於扈從後察有不法者即時鎖拏并其主參究至地方官私行禁阻民間貿易亦指名題參至山西諭大學士今近歲暮部院各衙門毋以朕行程日逺有誤奏事著照常來奏又奉㫖陜西接駕官員軍民人等不必渡河令在臨潼關等候至潼關城遣禮部侍郎祭華嶽至渭南閲提督標兵騎射自提督以下官皆加一級至西安府命凡帝王陵寢及已故勳臣墳墓在百里內者咸祭之分遣內大臣禮部侍郎學士副都統等祭周文王武王成王康王漢髙祖宣帝唐髙祖太宗宣宗陵又奉㫖周文王武王祭文內書御名又遣散秩內大臣致祭兩故將軍塋賜滿洲駐防官兵及民年八十以上者白金有差蠲陜西纍歲逋賦駕由河南還京師過磁州賜先賢端木子後裔為五經博士四十四年聖祖仁皇帝南巡閲河駕發京師至通州張家灣登舟由山東入江南境臨視河工至蘇州府恭逢三月十八日聖誕百姓爭獻食物奉㫖朕因閲視河工巡訪風俗而來一切用物皆辦自內府所過地方絲毫無擾爾等毋庸有所進獻至松江府御書匾額對聨頒賜青浦孔宅諭江南學臣朕臨幸松江道經青浦據該邑貢監生員等奏稱青浦之北地名孔宅自漢時至聖苖裔避地居此奉至聖衣冠葬焉朕念孔子萬世之師既有遺蹟亟宜表彰因親書匾額對聨以示尊崇著選良工摹刻頒發欽此至浙江杭州府諭朕頃因親閲河工濟江而南見民生殷繁菜畦麥隴逺近彌望可冀豐穰朕心用慰凡車駕臨幸必沛恩膏各省錢糧屢次遞蠲浙江本年正賦又經全免惟是刑獄民命攸關今父老子弟夾道歡迎獨身陷囹圄之人自新無路朕甚憫焉浙閩兩省罪犯除詔款所不赦外其餘死罪以下悉減等發落欽此至江寧府躬祭明太祖陵自蘇州過江寧凡御試士子三中選者給白金令赴京録用有差又奉㫖江南山東地方所屬人犯照浙閩例減等至清河復臨髙家堰遍閲河隄回鑾四十六年諭朕念淮黃兩河工程為東南要務屢次躬臨河上相度指示一切修防疏濬業已次第奏功昨歲河漕督撫諸臣詳勘地形請於溜淮套别開河道直達張福口以分淮勢朕欲即令動帑興築而督撫諸臣又以事關創建合辭請朕親閲九卿等集議復再三陳請朕以諸臣之言奏聞皇太后祗遵慈命擇於本年正月二十二日啓行閲河舟楫往返不御室廬日用所需取辦內府經過府州縣毋得更以豫備行宫供設御用冒侵庫帑科斂閭閻倘有不遵事覺定嚴加治罪其文武大小官員私相餽贈傔從人役生事擾民及姦惡挾私告訐者皆如屢次諭㫖重處不宥即行令各該督撫通飭所屬欽此是年聖祖仁皇帝南巡至江寧遣大學士祭明太祖陵幸演武場閲射又親謁明太祖陵賜扈從大臣侍衛護軍及執事人等金幣有差賜將軍總督副都統巡撫總兵等貂帽貂裘馬匹等物至蘇州遣官祭真武東嶽城隍之神蘇州百姓萬餘人集行宫前進表叩祝萬壽賜江蘇巡撫貂帽貂裘至松江幸演武場閲射賜提督御書衣帽鞓帶及弓矢鞍馬扈從大臣侍衛護軍執事人等金幣有差至杭州賜將軍福建將軍閩浙總督浙江提督福建水陸提督巡撫副都統衣各一襲扈從大臣侍衛護軍執事人等白金有差乾隆十二年諭朕以來年春孟月東巡狩因溯洙泗陟杏壇瞻仰宫牆申景行之夙志復遵慈訓親奉鑾輿秩於岱宗旋蹕青齊觀風布澤以昭省方巨典其應豫備之各衙門檢察事宜先期請旨至行在所需悉出公帑無得指稱供頓儲偫絲毫貽纍閭閻羽林衛士內府人役等各該管大臣嚴行稽察約束並令扈蹕文武臣僚嚴飭傔從毋使侵踐田疇致妨宿麥如有騷擾地方指名需索者立即參奏從重治罪欽此十三年正月諭上年山東歉收朕念民食艱難多方振恤倉儲帑項不惜數百萬以濟災黎而閭閻之欣戚猶且時縈宵旰今歲二月東巡遵循舊典兼以親臨蔀屋下悉民艱雖清塵除道所費皆給於公項絲毫不以纍民而地方官於朕巡幸之所自必力為經營其於百姓撫恤亦必周備但恐力專於此非輦路所經即不免有顧此失彼之虞如鄒滕以北民情尚不致拮据至鄒滕以南實屬收成歉薄倘不思博濟豈能盡免困乏此等處尤宜加意撫綏蓋朕輿蹕所歷即闕於整齊亦無妨礙惟小民地處一偏瞻就不及獨使向隅真堪軫念著該撫董率屬員留心察核務令逺近一體膏澤均霑以副朕父母斯民之望欽此又諭此次東巡經過直𨽻山東地方各營汛兵丁辦差者著該督撫賞給兩月餉銀以昭恩賚欽此又諭朕此次巡幸經過地方目覩麥苖長發出土青葱春疇有望其隨從人等雖經特命大臣管束不許踐踏誠恐人衆稽察稍有未周仍不免於蹂躪著隨來之滿漢科道沿塗一並察看毋得有妨農務欽此是年駕幸山左疊沛恩綸經過被災州縣無論極貧次貧均於見振外溥加一月不經過處所被災七分以上者極貧之民亦加一月以示優恤直𨽻山東經過州縣本年正賦蠲免十分之三山東直輪免錢糧之年所蠲本年正賦例於來歲免徵先於藩庫地丁銀內照蠲數即行動項賞給明年徵輸歸款駕至曲阜親詣先師孔子廟元聖周公廟上香翼日親詣先師廟行釋奠禮御詩禮堂講書詣孔林祭酒並親詣少昊金天氏陵致祭遣官祭元聖周公及魯公御製顔曽思孟四氏贊遣官致祭賜孔氏引駕官內閣中書孔氏及十二氏子孫各官均加一級其進士舉人貢監生員賞白金有差增廣山東通省入學名數大學三名中學二名小學一名十二氏子孫由學政擇其文行兼優者數人貢入成均以示鼓勵又諭朕時邁東巡前詣闕里至於岱宗舊典聿修明禋肇薦東省本年錢糧見已普免因思曲阜泰安歷城鑾輿駐蹕之所也著將三縣乾隆十四年應徵地丁錢糧全行蠲免俾小民均霑厚澤欽此又諭朕時巡方嶽所過地方既蠲租賜復疊沛恩膏而薄斂省刑事宜並舉其山東直𨽻二省監候斬絞人犯五次緩决者著該督撫分别情罪奏請減等其軍流以下罪犯亦著減等發落咸豫自新用昭肆赦欽此又諭朕臨幸東省凡所過地方已經行慶施惠所有分駐旗人亦應酌量加恩將山東之德州青州等處及直𨽻天津滄州駐防官兵年七十八十以上者分别賞賚欽此是年以扈蹕人等安靜奉法王公大臣及官員兵丁均加賞賚於長蘆鹽庫存公銀內動給又諭朕覽山東通志內恭載皇祖諭㫖東省小民皆依有身家者為之耕種豐年所得者少凶年則已身並無田産有力者流於四方無力者即轉於溝壑此等情狀東省大臣庶僚及有身家者若能輕減田租以各贍養其佃戶不但深有益於窮民即汝等田地日後亦不致荒蕪訓諭諄諄誠切中東省民生利弊也今朕省方問俗親見民情風土歲偶不登閭閻即無所恃南走江淮北出口外揆厥所由實緣有身家者不能贍養佃戶以致資生無䇿動輒流移夫睦姻任恤自古為重利豈專在窮乏富戶均受益焉轉徙既多則佃種之人少鞠為茂草富者不能獨耕也何如有無相資使農民不肯輕去其鄉即水旱無虞大困繼自今該督撫董率有司實力勸諭務使曉然於貧富相維之道俾閭閻通周急之情斯黎民享安土之樂朕於東省有厚望焉欽此十四年諭江省督撫等以該省紳耆士庶望幸心殷合辭奏請南巡朕以巨典攸關特命廷臣集議今經大學士九卿等援据經史且仰稽聖祖仁皇帝六巡江浙謨烈光昭允宜俯從所請朕軫切民依省方問俗郊圻近省不憚躬勤鑾輅江左地廣人稠素所厪念其官方戎政河務海防與凡閭閻疾苦無非事者第程塗稍逺十餘年來未遑舉行屢嘗敬讀聖祖實録備載前後南巡恭侍皇太后鑾輿羣黎扶老攜幼夾道歡迎交頌天家孝德心甚慕焉朕巡幸所至悉奉聖母皇太后逰賞江南名勝甲天下誠親掖安輿眺覽山川之佳秀民物之豐美良足以娛暢慈懷既詢謀僉同應允從所請但朕將以明年秋幸五臺經太原歷嵩洛趙魏回鑾已涉冬令南巡之舉當在十六年春正我聖母六旬萬壽之年也將見巷舞衢歌騰歡獻祝稱朕以天下養之至愛上以廣承歡之慶下以慰望幸之忱益深嘉悅屆期諏吉以聞嚮道人員朕酌量先期簡命前往清蹕所至簡約儀衛諸凡出自內府無煩有司供億至行幸宿頓不過偶一經臨即暫停亦不踰旬日前歲山左過求華麗多耗物力朕甚弗取曾經降㫖申飭明歲晉豫等省以及江南皆不可仿效至名山古蹟南省尤多亦秪掃除潔淨足備臨觀而已毋事崇飾倘有頽圯隨宜補葺悉令動用官項且有鹽政存公之項可以報銷但當據實不得任有司浮冒其民間張鐙結采聖祖嘗以為戒載在方册宜其恪遵其慎勿以華侈相尚所司通行曉諭欽此又諭朕前經降㫖於來年秋間巡幸五臺由晉入豫省覽中州回蹕畿輔近日嚮道人員閲看營盤道路回奏稱自太原一路至河南境經由太行山麓甚為﨑嶇狹隘朕省方巡幸惟取民便若因修治道塗重煩民力非朕觀風問俗本意應於春間霸州水獵之便即詣五臺秋間百榖登場後再幸中州欽此又諭閩浙總督浙江巡撫奏請臨幸浙省閲視海塘前因江南督撫等奏請南巡特命大學士九卿會議詢謀僉同業經降㫖俞允江浙鄰封接壤均繫聖祖屢經臨幸之地且海塘亦重務也今據該省士民感恩望幸羣情踴躍督撫合辭代奏宜允所請於十六年春南巡便道前至浙省臨視塘工慰黎庶瞻依之意所至不煩供億勿事興修勿尚華靡已詳具前㫖其共喻焉欽此十五年駕幸中州親祭嵩嶽遣官致祭河瀆衛水周文王廟漢光武帝周世宗陵鑾輿所經蠲免錢糧十分之三歉收者蠲免十分之五駐防官兵及百姓男婦年七十以上者均分别賞賚軍流以下罪犯減等發落經過直𨽻河南營汛兵丁辦差者均賞給兩月餉豫省在籍官員迎駕者賞給職銜又諭此次巡幸河南省方問俗所至推恩尤念祥符為省會之區登封實望秩之所鑾輿駐蹕宜沛優施著將乾隆十六年二縣應徵地丁錢糧全行蠲免俾愷澤均霑以愜小民近光之願欽此又諭朕舉行秋狩覲嶽省方蓋欲周覽民情懋登治理凡地方之利弊官吏之賢否與夫政令之得失清蹕所至日切疇咨河南地宅土中素稱淳朴今值雨暘協應禾稼告登巡行之次親見閭閻望幸童叟歡欣而俗尚敦龎室廬寧輯朕懷深為欣慰顧惟因時保治之方其權實操之自上撫臣表率通省藩臬任寄旬宣以至郡守牧令與民愈親則導民尤切應仰體朕心力行善政敦本訓俗除慝安良教養兼施屏虛文以求實政其在小民亦當敦禮樂務農桑從儉去奢力田孝弟以期共享升平之福朕於該省臣民有厚幸焉欽此又諭明歲恭逢聖母皇太后六十萬壽之年朕於新正恭奉鑾輿巡幸江南浙江省方觀民入疆考績式遵祖烈慶典斯行東南父老共效嵩呼洵升平之盛事惟念江浙二省襟帶江湖程塗稍逺自皇祖聖祖仁皇帝南巡以來異數隆恩昭垂史册迄今四十餘年朕俯從望幸之忱倍切勤民之隱前於大學士九卿等議準兩江總督等奏內已降㫖諄切曉諭又特遣嚮道大員等前往面傳諭旨務從儉約一切供頓絲毫不纍民間凡地方大吏職在旬宣自能仰體朕心遵㫖辦理但恐地方有司奉行不善或窮鄉僻壤未及周知是用再行申諭各該督撫及所屬官民人等尚其凛遵前㫖共期撙節以敦善俗以導淳風如所在行宫與其逺購珍竒雜陳玩好不如明窗淨几灑掃潔除足供信宿之適也經過道路與其張鐙懸采徒侈美觀不若蔀屋茅檐桑麻在望足覘盈寧之象也闤闠通衢人煙稠密正以見懋遷有無之樂不得因道路湫隘俾遷移廛舍或致商民失業也朕翠華所及念切民依惟期宣達羣情勤求治道上以奉慈顔之悅豫下以答黎庶之瞻依凡屬虛文浮費槩宜實力屏除用光巨典其扈從滿漢文武大小官員侍衛等皆當奉公守法不得與地方官往來交際潛通餽遺兵丁以及隨從人等著該管大員各嚴加約束經行所至不得稍有滋擾春苖遍野毋得踐踏違者從重治罪務令白叟黃童並霑膏澤共樂恬熙副朕問俗觀風行慶施惠之至意欽此又諭朕明歲南巡江浙省方問俗務使民商樂業肆不改廛如京口諸處為南北咽喉百貨叢集舳艫銜尾皆民間日用所資不可稍有閒闕恐地方有司因御舟將至惟使河道肅清先期於各處早為攔阻以致商賈裹足不前市價昻貴於民生殊多未便著速行傳諭各該省督撫酌量辦理秖可於三五日期稍令避入支港俟過即放遄行以副朕便民恤商至意欽此十六年諭向例鑾輿巡幸經過地方官員應行接駕由鴻臚寺具奏里數請㫖臨時該寺帶領接駕至駐蹕後復奏聞帶領行禮朕入疆考績地方大吏隨營行走不時召見即州縣各官凡有承辦差務者業已於路旁隨便跪接此皆不在帶接行禮之列其帶接行禮者非散員即武辨教職充數之人此何為者而鴻臚寺官員先期傳示不免滋擾嗣後凡應接駕人員秖令鴻臚寺在京奏請里數得㫖行知其一切繁文及接駕後赴鴻臚寺投遞職名槩著停止以示朕行簡務實之意欽此是年車駕南巡經過山左遣官致祭岱宗先師孔子元聖周公至宿遷登舟踰淮揚抵浙江遣官致祭河瀆淮瀆江瀆海神南鎮會稽山親詣禹陵明太祖陵致祭凡河工海塘咸指授機宜諭以修防之道是年疊頒諭㫖截留漕糧十有五萬石蠲免乾隆元年至十三年江蘇積缺地丁二百二十八萬有竒安徽積缺地丁三十萬五千有竒乾隆十六年浙江地丁錢糧三十萬兩經過直𨽻山東地方蠲免正賦十分之三山東災民借榖分為五年帶徵鄒平等縣從前帶徵未完榖九十七萬五千餘石槩行蠲免經過江蘇所屬之宿遷清河桃源三縣被災貧民所借耔種均免其徵還浙江溫台等屬上年被災之處已振者更豫加振直𨽻山東江浙辦差營汛兵丁各賞兩月餉江南牽纜河兵加賞一月鑾輿所至存問髙年駐防官兵七十八十以上民間男婦年七十以上者均分别賞賚在籍官紳逺迎車駕隨時賞賚或量給職銜或以原官起用其士子獻頌者欽㸃扈從大臣會同學臣試以詩古文辭拔其尤者引見生員貢監欽賜舉人授內閣中書江蘇安徽浙江本年歲試文童府學及州學大學增取五名中學四名小學三名又諭朕經過淮安內外皆水雖有土隄為之防而人煙湊集之區設經異漲其何以堪甚覺怵然亟應改建石工以資保障著河臣會同總督及時建築毋忽欽此又諭此次隨從人等至順河集登陸後所用舟楫令其各回生理恐閘口壅滯多被攔阻窮苦船戶回空並無雇直停泊之候何以資生著遣侍郎一人會同將軍總漕等來往順河集清江浦一帶將此項回空船於二三日內令其盡行過閘以示體恤欽此又諭朕命駕時巡周覽風俗觀民察吏惟日兢兢三吳尤素所厪念也粵自我聖祖仁皇帝巡幸東南先後六舉歷今四十餘年盛典昭垂衢謡在耳頃者入境以來白叟黃童扶攜恐後就瞻愛戴誠意可嘉朕已疊沛恩膏廣敷渥澤惟念大江南北土沃人稠重以百年休養戶口益增習尚所趨蓋藏未裕紛華靡麗之意多而朴茂之風轉有未逮夫去奢崇實固閭閻生計之常經而因時訓俗以宣風而布化則官兹土者之責也其當勵乃實心以行實政無忝教養斯民之任凡兹士庶更宜各敦本業力屏浮華以節儉留其有餘以勤勞補其不足時時思物力之艱難事事惟侈靡之是戒將見康阜之盛益臻父老子弟共享升平之福朕清蹕所至有厚望焉欽此又諭朕向來巡幸地方惟修治道塗此外一無華飾自乾隆十三年東巡該撫等於省會城市稍從觀美後乃踵事增華雖謂巷舞衢歌輿情共樂而以旬月經營僅供塗次一覽實覺過於勞費且耳目之娛徒增喧聒朕心深所不取第見先期業經豫備今歲恭遇皇太后萬壽兆庶亦藉以申祝嘏之忱是以俯順民情至朕待督撫有司惟因其能實心辦事令地方日有起色方加恩奬豫而不知朕心者未必不以辦差華美求工取悅為得計將玩視民瘼專務浮華此風一開於吏治民風所關甚大嗣後尋常行幸槩不準行違者以違制論並諭中外知之欽此二十年諭平定準噶爾捷聞以數十年逋寇迅就廓清荒服敉寧中外䝉福乃我國家無疆之庥緬惟皇祖聖祖仁皇帝削平三孽於康熙二十三年諏吉東巡親祭闕里武功文德彪炳簡册朕仰承先烈集此大勳保泰持盈彌深兢業先師孔子闕里理應恪循成憲躬詣行禮用申誠敬且自瞻謁林泉已逾六載仰止之念時切於懷擬於明歲春月自京起鑾恭詣曲阜翠華所經亦以體察吏治清問閭閻行慶施惠以稱朕法祖尊師之至意欽此二十一年駕幸山左鑾輅所經蠲免錢糧十分之三曲阜一邑錢糧全行蠲免德州青州駐防兵丁辦差者賞兩月餉兵丁內七十八十以上及民男婦七十以上分别賞賚軍流以下罪犯減等發落駕至曲阜親釋奠於先師禮成後詣元聖周公廟上香少昊金天氏陵致祭遣官祭顔曾思孟四氏專祠御新宫一皇帝御新宫順治三年位育宫成世祖章皇帝御新宫是日早內大臣侍衛齊集候隨皇帝臨新宫鑾儀衛設鹵簿大駕於丹陛上東旁捧王等所進慶賀表文奉安綵亭內作樂迎至午門外亭止禮部堂官自亭內奉表進午門左門至太和殿奉安東旁黃案上王以下文武各官咸朝服齊集於太和殿前內院大臣奏請皇帝升座皇帝御中和殿升座內大臣侍衛行三跪九叩禮次內院大臣禮部都察院堂官鴻臚寺鳴贊官行三跪九叩禮畢皇帝御太和殿鳴鐘鼓樂作升座樂止鳴鞭內外王以下公以上及外藩王額駙等在丹陛上兩旁序立鳴贊官贊進贊跪衆皆跪贊進表大學士於東旁黃案上奉表文跪宣畢鳴贊官贊行三跪九叩禮畢各就原位立乃賜燕王等入殿內貝勒以下在丹陛上各官在丹墀青幕內各就坐行一叩禮燕畢謝恩行一跪三叩禮禮成鳴鞭作樂皇帝還宫衆皆退十三年乾清宫坤寧宫景仁宫成擇吉世祖章皇帝御新宫前期一日遣官各一人祗告天地太廟社稷屆期一應禮儀均與三年同次日御太和殿頒詔天下一皇太后御新宫順治十年慈寧宫成擇吉昭聖慈壽皇太后御新宫前期一日世祖章皇帝遣官祗告太廟如儀是日早皇太后儀駕全設於宫門外公主福晉以下郡君輔國公夫人都統尚書子命婦以上咸朝服齊集宫門東皇太后出宫乘輿樂作儀駕前導公主福晉等排班隨後至慈寧宫門公主福晉等止立候皇太后升宫皇帝乘輿自右翼門出內大臣侍衛咸朝服隨後至永康左門皇帝降輿入慈寧門內至丹陛上東旁立內監奏請皇太后升座皇太后御內殿樂作升座樂止皇帝詣正中立內大臣等在丹陛上立侍衛等在丹墀內立鴻臚寺官奏跪拜興皇帝行三跪九拜禮內大臣等皆隨行禮畢皇帝轉立東旁內監奏請皇太后還宫樂作還宫樂止皇帝出乘輿還宫次公主福晉大臣命婦等排班齊集內監奏請皇太后升座皇太后御內殿樂作升座樂止公主福晉等行禮畢公主福晉大臣命婦等入慈寧宫內賜燕燕畢謝恩行二肅一叩禮樂作皇太后還宫樂止衆皆退康熙二十八年寧壽宫成擇吉仁憲皇太后御新宫一應禮儀均與順治十年同乾隆元年崇慶皇太后御慈寧宫前期一日遣官各一人祭告太廟後殿奉先殿如儀是日皇太后儀駕全設於啓祥門外至慈寧門外宫殿監侍等豫設皇太后鳳輿於景仁宫中奏請皇太后具禮服乘輿宫殿監寺等八人咸吉服前引內務府總管內管領等命婦咸吉服隨行由啓祥門出前列儀駕至隆宗門外皇太后鳳輿進慈寧宫中門先暫御後宫執事官豫設皇帝拜褥於慈寧門檻外正中設皇太后儀駕於慈寧門外至長信門外設丹陛樂於慈寧門內設中和韶樂於慈寧宫丹陛上均北嚮設而不作禮部堂官奏請皇帝御禮服乘輿出宫禮部堂官前導由隆宗門至永康左門皇帝降輿禮部堂官恭導皇帝由左階升至慈寧門外東旁立禮部堂官轉傳內監奏請皇太后升座皇太后具禮服升慈寧宫座禮部堂官恭導皇帝詣正中拜褥上立鴻臚寺官引內大臣侍衛於儀駕末排立鳴贊官奏跪叩興皇帝行三跪九拜禮內大臣侍衛等皆隨行禮此行禮時設鳴贊官四員御史二員於慈寧門檐下設御史二員禮部官二員於儀駕末侍儀鳴贊官奏禮成禮部堂官恭導皇帝復原位立轉傳內監奏請皇太后還宫皇太后還宫禮部堂官恭導皇帝出升輿還宫禮部堂官轉傳內監奏請皇后率貴妃妃嬪等詣皇太后宫行禮侍衛命婦豫設皇后拜褥於月臺上正中設貴妃妃嬪拜褥於左右稍後皇后率貴妃妃嬪等具禮服乘輿依次由啓祥門出至徽音左門降輿入大臣命婦前導皇后前行貴妃妃嬪等隨行至慈寧宫月臺上西旁東嚮立貴妃妃嬪等於皇后稍後分班東西嚮立引禮二大臣命婦轉傳內監奏請皇太后升座皇太后禮服升慈寧宫座引禮二大臣命婦引皇后於正中拜褥上立貴妃在左妃在右嬪亦在右咸就拜位嚮上立皇后率貴妃妃嬪等行六肅三跪三拜禮引禮二大臣命婦奏禮成引皇后貴妃妃嬪等復原位立轉傳內監奏請皇太后還宫皇后率貴妃妃嬪等俟奉皇太后御壽康宫是日停止公主福晉命婦齊集停止筵燕免賜茶欽定大清會典則例卷六十
