  text: 欽定四庫全書欽定大清㑹典則例卷一百七十六
  hash: sha256:5db4cfe15e7bd06f1f75700e14d79206cc71579a3b5615c6cc19364f340a379c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_180-1a, image: WYG0625/WYG0625-0564a.png}
body:
  text: 八旗都統教養一旗學雍正七年議準滿洲䝉古每恭領下各設學舍一所十二嵗以上幼丁均準入學習清文國語䝉古學生並習䝉古語其教習於前鋒護軍領催驍騎內擇其人老成通曉清文者二人充補每恭領下委官一人或驍騎校一人教導倫理騎射該旗都統恭領等仍不時稽察每年考試一次能教訓者其教習繫官紀録繫兵丁注册遇有應升之處列名又定八旗漢軍子弟學習清文原屬緊要應令各在本旗就近地方設立學舍一所每佐領下簡選一二人專習清文其教習交與各該旗滿洲都統㑹同本旗漢軍都統於滿洲散秩官並筆帖式或因公罣誤革職降調人員內擇其堪膺訓導之任者二人又於漢軍本旗內擇善射者一二人教習弓箭並令本旗恭領一人不時稽察如子弟文理精通情願考試翻譯者於吏部考取筆帖式即繫閒散亦準考試其教習三年內果能教導有成該旗都統按人數之多寡分别等次請㫖議叙乾隆八年奏準考取八旗義學翻譯教習例由該旗將舉貢生員咨送但教習為人師範務擇其年逾三旬行無匪僻者具結送部驗眀考試至教習內有教導國語之教習亦照此例送考十年奏準教習䝉古官學生之巴克什即教習五年期滿詳加考核不能教導者令歸旗當差人明白實心訓導者分别等次引見恭候記名注册仍留在學遇有該旗應升之闕與應升人員分别簡補十一年奏準八旗義學滿洲教習內原食錢糧之人停給教習公費米未食錢糧之人仍給與公費米十二年奏準八旗舊營房教習於營房兵丁內選取充補令營房居住之旗員並管營房之恭領不時稽察十七年議準八旗未及嵗之世爵食半俸者原有移送官學讀書之例而就學者甚少此輩幼童或因過於溺愛不習技藝或恃身已為官任意作為或見食俸祿為匪人誘惑成丁後長進者少不肖者居多見在未及嵗之世爵一百七十人請於八旗兩翼各設官學二所交工部以米局官房作速修理簡命一二品大臣專管教訓設教習國語及騎射之人學內所用薪炭等物統交管學大臣察例具奏凡八旗世爵內十嵗以上均送官學教習國語騎射三年期滿管學大臣請㫖特簡王公大臣考試已及嵗世爵之國語騎射分别等第奏聞列為一等者引見或在部行走或授為侍衛候㫖簡用以示鼓勵二等者在該旗印房學習行走優者對品補用三等仍留學教導照常支給半俸三年再行考試倘仍無造就之機即行革除將世爵於應襲人員內别行承襲又奏準八旗見在年幼世爵一百七十人內未及十嵗者二十六人十嵗以上堪習技藝之世爵一百四十四人今設立官學各按該旗適中地方擇得左翼鑲黃旗漢軍鑲白旗䝉古米局右翼鑲藍旗䝉古鑲紅旗滿洲米局官房行文工部作速修葺設立官學外鑲黃正白二旗合為一學鑲白正藍二旗合為一學正黃正紅二旗合為一學鑲紅鑲藍二旗合為一學約束官每翼委恭領二人輪流整飭掌管學內一應事宜每學委領催二名驍騎八名看守房屋聼差管理大臣仍不時赴學稽察學業無致怠惰偷安教習國語之人照選漢軍教習之例於本旗滿洲散秩官筆帖式因公罣誤廢員降級調用之人員內選補每翼選補四人見任職官每月支銀二兩無祿人支銀二兩米一斛折銀支給每學設教習二人教習騎射亦於滿洲旗護軍校前鋒護軍內每翼選四名照國子監助教例每月支公費銀一兩五錢每學月給公費銀四兩以為搆買冰塊薪炭之用均於該旗房租銀內動支用過銀數該旗統於嵗終奏銷再教習國語及騎射每旗各一人該旗都統擇人品端方可以為師者送學教習三年期滿議敘不善教授者即行駮回更换官則送部察議兵則責革一録送考試順治八年題準滿洲䝉古子弟歸順天府考試生員通清漢文者翻譯漢字文一篇通清文者作清字文一篇漢軍子弟令順天學院與民童一例考試又定滿洲䝉古考試翻譯與漢人分為兩榜九年定漢軍亦照漢人例考取廪膳生增廣生並按年出貢順治十四年停止八旗考試又定停止考試翻譯滿洲漢人一例考試漢文康熙六年題準八旗有願作漢文考試者各都統開送禮部移送順天學院滿洲䝉古别編一號漢軍與漢人同場考試文優者即入順天府學生員額內又題準滿洲䝉古漢軍應試者照漢童生例禮部轉劄順天府丞先行録取移送學院考試十年議準滿洲䝉古既作漢文亦準考取廪增按年出貢十二年題準旗人照漢人生童一例嵗科兩考試又題準盛京各旗子弟通習漢文者與盛京民童一例考試漢文十五年停止八旗考試二十六年恩詔八旗準同漢人一例考試遵㫖議準滿洲䝉古漢軍照舊考取生員盛京亦照舊考取生員鄉㑹試編入在京滿洲䝉古漢軍數內一並考試二十八年覆準考取滿洲生員宜試騎射不能騎射者不準考試二十九年題準奉天府滿洲䝉古漢軍考取生員奉天將軍副都統等驗馬步射能者送該府丞考試四十八年題準八旗漢軍內府旗鼓佐領下未入流筆帖式庫使由官學生補授之外郎閒散人等有願考試武生者該旗開具姓名移送順天府照例申送學政考試時將所取武生並中書及部院衙門六七八品筆帖式不論上朝未上朝之廕生監生以及監生之護軍領催驍騎執事人願考試武舉者該旗亦開列姓名移送順天府與武生一例鄉試不中者仍各當差㑹試亦照文場例别編合字號五十三年覆準文生員有願改入武場武生有願改入文場者準其起送鄉試其文舉人武舉有願改考者亦照此準其起送㑹試中式者照例造入新册不中者仍歸文武原册不準再行改考五十四年定每逢鄉㑹試兩翼欽㸃都統各一人副都統各二人參領各一人旗員各二人入場約束八旗應試士子三場試畢乃出闈六十年定八旗都統等俟出榜一同出闈雍正元年奉㫖八旗滿洲除照常考試漢文外翻譯亦屬緊要應將翻譯考試秀才舉人進士之處定議具奏遵㫖議準三年考取生員二次舉人一次進士一次鄉試取中舉人見今為數無多暫停㑹試又覆準八旗滿洲照漢軍例亦準考試武生武舉又覆準八旗漢軍武童考試外場由兵部開列八旗副都統職名具題請簡一人㑹順天學政考試奉天武童由將軍委協領一人㑹府丞考試選取學政將選取之人考試策論取進入學二年覆準八旗生員嵗考時該旗都統交各佐領催赴考試如有告假患病緣事及隨任等情令其報明該教官詳察確實申報學政照例補考若有無故不考者禠革其八旗漢軍武生亦照文生員嵗考例舉行至滿洲䝉古漢軍生員內如年老有疾者亦準其告休給與衣頂注册漢軍武生亦照此例又覆準八旗生員特恩給與錢糧贍飬讀書若無考較恐或怠於誦讀令該旗都統於嵗考前將領錢糧生員備造清册咨禮部轉送學政嚴加較閲考居前等者照常領給居四等以下者停其給發遇下次考居一二三等照漢廪生開復例仍給原領錢糧如四等不願再考即將學册除名聼其復歸護軍驍騎當差又議準嗣後令八旗都統遇嵗考之年將各佐領下生員嚴催赴考學臣照考漢生員例優等補廪補增劣等降青降社但八旗生員有考箭之例文理兼長為難如無甚荒謬不必苛求置之後等四年議準向例鄉㑹試每翼用都統一人副都統二人恭領一人旗員二人約束士子若令副都統二人旗員四人盡足彈壓嗣後鄉㑹試每翼除副都統各一人恭領各一人散秩官各一人入闈稽察彈壓三場試畢副都統等亦即出闈七年覆準八旗考試文武生員舉人進士於四月之前禮部行文各該旗咨取名册該旗將姓名年貌造具清册於兩月之前移送禮部㑹同兵部核對如該旗不依限造送禮部據實題恭如禮兵二部不詳加核對以致遺漏舛錯監射大臣題恭仍補改入册準其考試再鄉試之年該學政於六七月間始行科試其考取生員不便拘定四月兩月之限應於科試考取後該旗速行造册送部轉送兵部考試騎射臨考之時每旗委恭領各一人每恭領下委賢能旗員各一人每佐領內管領下委領催各一人率領應試之人送與委出之恭領等官識認於騎射時公同送考並將委出之恭領旗員領催等職名與應試人之花名册一並移送禮部注册禮兵二部核對花名册亦傳集伊等公同對閲毋致遺漏舛錯射畢入場時亦令原委之恭領旗員領催等識認送考如對册考射入場之時該恭領等不親到者該部即行題恭又題準旗下送考童生照外省考試由該旗考試過送本恭領考取再報都統咨送學院入場之日各該佐領親率領催㸃名搜檢或生童等代考夾帶或參佐領不秉公考試察出一並治罪又議準十五嵗以下應考之童子均停其騎射止考試步射如有熟悉騎射情願考試者聼又覆準考試期近兵部咨取副都統等職名時各該旗副都統即擇定本旗老成勤慎能識漢字之領催五名俟宣㫖之日各率至午門前豫備其欽㸃副都統率本旗領催一同入場凡八旗應試人等所編號口柵䦨之外領催加意看守照依卷面字樣放進封號後隨參領等官巡察十年議準八旗童生遇考試之年禮部行文到日各參領遞傳各佐領下童生彚齊造册申送本旗都統擬定考試日期行文翰詹衙門咨取科甲出身滿官一人在該旗公所㑹同參領佐領考試應試童生於試日黎明齊赴該旗公所聼各該佐領㸃名識認以杜頂冒等弊試竣將録取童生數目呈報都統造具三代履歷年貌滿漢清册移送禮部轉送兵部考射其試卷鈐印彌封巡邏搜檢等項均交各該旗委官辦理十一年奏準八旗於考試之時將應考之人詳加分别滿洲䝉古漢軍明白開注於册如有漢軍冒入滿洲額內取中者一經察出將咨送之都統佐領等官交部分别議處十二年諭清釐八旗嵗考不到生員原以杜規避之弊然不肖旗員或藉此生事苛求亦未可定著該都統轉飭參領佐領秉公辦理倘有徇情朦溷及需索苦纍等事該都統即行參究欽此又諭朕御極以來於滿漢人材廣開登進之途冀收得人之效是以雍正元年定有滿洲亦準考試武場之例今已行之十年未見有宜用緑旗之才况滿洲弓馬技勇遠勝漢人將來行之日久必致科場前列悉為滿洲之所占而滿洲文藝不及漢人又恐考試內場時不免有傳遞代作等弊似於作飬人材之道未有禆益著行停止欽此又覆準八旗生員遇嵗科兩試務令該都統轉飭各參佐領及滿洲學教官嚴催各生應期赴考如果駐防各省隨任逺方及實繫患病一時不能赴考者本生豫呈教官教官加具印結申報學政存案仍令各該都統飭令該恭佐領於學政按試文到之前逐一察明緣由出具印結申報該都統行文知照學政並飭發教官造册注明某生駐防某省某生隨任某地某生實繫患病加結申報學政存案如該旗既無知照教官又不申報緣由一任該生揑辭託故抗不赴考扶同徇隱者本生照例除名該管各官恭奏議處又奏準八旗考試之童生照例取具本旗廪生認結該都統將花名册一並送部以免頂冒之弊十三年奏準八旗漢軍教飬兵內有情願考試武生者準其與漢軍武童一例考試又奏準八旗人等有實繫旗下家奴開戶出身者止準由旗下别途進身其本身及子孫永不許其考試乾隆三年議準八旗生員如遇親喪二十七月暫停考試服滿後應行考試者仍令考試又覆準滿洲漢軍考試各有一定籍貫不能溷淆惟內府及王公府屬人員有假充莊頭子弟隸內府管轄編入上三旗者又有舊漢人在內管領下及下五旗王公府屬旗鼓佐領內者此等人員原繫漢人並非滿洲因考試時皆由滿洲都統咨送是以從前每有在滿洲額內入學中式者應令內務府八旗滿洲都統核明內府及王公府屬舊漢人誤在滿洲額內入學出貢應歸入漢軍額內考試者定限三月逐一清出緣由取具該恭佐領印結造册咨禮部存案嗣後內務府八旗都統務嚴飭該管官於考試時逐一稽察其投充莊頭子弟及內管領旗鼓佐領下之舊漢人均别册送部歸入漢軍額內考試有將應入漢軍册之人造入滿洲册內咨送者察出恭奏該管都統佐領照朦溷造册例議處四年覆準嗣後學政嵗試滿學生員如有患病事故者定限科考時補考科考時仍有患病事故者定限下次考試補考統令該管官察核嚴催務於限內補試各省駐防隨任生員距京遙逺原與在籍諸生不同若槩令赴京嵗試多有未便若任不赴考亦與例不符今酌議駐防隨任各生有來京鄉試者即令補行嵗試其因路逺及有事故不鄉試者仍令教官造册注明該生駐防隨任所在加結申詳學政存案並不準止應鄉試不補嵗考致滋規避之弊旗員教官亦不許藉端苛索倘有詐稱駐防隨任及已經考過仍復羈留者明屬徇情朦溷即行恭處至隨任回旗之生員仍按缺考次數照例補試又奏準旗人有因祖父虧空力不能完治以枷責之罪者如繫閒散人應準其考試其有已經出仕及進士舉人因代賠祖父虧空力不能完治以枷責之罪者均照閒散人等準其一例應童子試並得與旗下翻譯等項考試若本身虧空及緣事枷責並原案載有不準考試字樣者不準考試其有曽經發遣及入辛者庫即內管領下食月米人赦回者本身均不準考試又議準翻譯鄉試取中舉人為數已多請舉行㑹試又議準入場之副都統準隨從役五名恭領旗員準隨三名五年覆準八旗投充養育俘獲人等曽在伊主家服役開戶之後究有主僕之分其子孫應不準考試至别載册籍人戶內惟奉㫖準其居官考試及抱飬民人本繫良家者準其考試外其餘考試一槩禁止六年奏準八旗逺年開戶人等內除前奉有諭㫖準其考試之舉監生員仍遵㫖準其考試外至投充養育俘獲人等未經開戶以前在伊主家身供役使曽有主僕之分雖經開戶其本身及子孫考試之處應行禁止至八旗别載册籍之人雖與開戶有間實非正戶可比如令同與考試誠恐冒濫此內有正戶抱養民人别載册籍者本繫良民應準其考試其有從前奉㫖準其居官考試者原繫恩加本身應遵㫖仍準其居官考試外其有奉㫖後考中舉貢生員並捐納貢監者將伊等仍留舉貢生監頂帶終身至伊等子孫及一切别載册籍人等考試之處槩行禁止又議準停止滿洲筆帖式考試武場惟漢軍仍得考試並準其文武改考又議準應試人等有年至五十五嵗以上者免考騎射七年定翻譯㑹試不必别為一場即於文闈㑹試二場時别編號舍一同考試又覆準文武互試之例永行停止九年奏準貢院甎門外八旗分為八處凡送考之恭領等率領應試士子各按旗分隨牌候㸃如有溷行進入者立即治罪先期行文各旗將送考之恭領旗員姓名並每翼委出之甎門恭領姓名開送外場監察御史如送考之恭領旗員有不按旗分一任士子溷入者該御史即將送考之恭領等察恭如甎門恭領一任送考之人溷入擁擠除將溷入之人治罪外仍將該恭領恭處十九年遵㫖議準翻譯鄉㑹之設原欲旗人學習國書並非以科名為重乃近年以來應試之人多事􅍢刻字句希圗中式於實在翻譯文義轉覺相去愈逺况學習翻譯之人原皆可考取中書筆帖式庫使亦不必藉鄉試㑹試始以為進身之階嗣後翻譯生員應仍照舊考試留為伊等考取中書筆帖式之地其鄉㑹試永行停止一旌表順治九年題準滿洲䝉古漢軍孝子順孫義夫節婦該管佐領驍騎校核實送恭領恭領核實送都統副都統都統副都統核實送禮部禮部核實奏請旌表又題準旌表節孝滿洲蒙古漢軍支戶部庫銀三十兩聼其自行建坊十二年題準滿洲䝉古漢軍凡應旌表之人該旗於嵗終彚送禮部禮部題請旌表十四年題準凡婦人已受誥封者不更旌表康熙二十七年諭近見京城及各省尚多夫亡從死者人命關繫重大死亡已屬堪憐修短聼其自然豈可妄捐軀體况輕生從死事屬不經若復加褒揚恐益多摧折嗣後夫歿從死永行嚴禁如有必欲身殉者赴部及該管官陳訴俟奏聞定奪欽此三十五年題準節婦自三十嵗以內守節至五十嵗者即行旌表過五十嵗者將遲延緣由報部五十一年題準受聘未嫁之女聞訃剪髮成服敬守夫墓守節三年從容自縊與尋常輕生者不同照例旌表五十四年覆準孀婦撫子守志因親屬逼嫁投環原非激烈輕生照例旌表雍正元年議準孀婦守節十五載以上逾四十而身故者亦令該管官察報一例旌表又議準八旗分左右翼各建一祠一為忠義孝弟祠一為節孝祠刋刻姓名於牌坊之上已故者設牌位於祠中春秋二季致祭二年議準行文八旗直省巡撫凡臨陳捐軀守土授命之文武諸臣及偏禆士卒詳繕籍貫事蹟具奏交工部於京城內建立昭忠祠春秋致祭三年覆準孝女以父母未有子姪終身奉親不嫁者照孝子一例旌表五年覆準定例旌表孝子順孫義夫節婦其孝婦旌表之處並未有例婦女孝行無虧應請一例旌表乾隆元年議準凡婦人已受誥封者例不更為旌表若三十嵗以內守節逮撫子成立之後因子顯逹始獲受封者亦準其一例旌表十年奏準節孝旌表後身故者一例入祠其從前有於旌表後身故未經入祠之人亦準畫一辦理十二年奏準外省駐防陳亡官兵一例入昭忠祠十四年議準守節之義實緣夫亡守志舅姑年老無倚婦兼子職奉養終身或外迫强暴終保貞潔或境處單微秉節愈堅如斯之類理宜題請旌表給銀建坊歿後致祭祠內以光俎豆至於尋常守節之婦雖云合例不便一槩辦理漫無分别應於本家呈報之時該管官核其年例相符酌量給匾嘉奬附疏彚題於具題之後仍題名於碑不令湮沒優恤一親隨兵順治初年定滿洲都統親隨兵八名䝉古漢軍都統六名護軍統領前鋒統領五名公四名侯伯滿洲副都統三名䝉古漢軍副都統領侍衛內大臣大學士尚書左都御史子二名侍郎左副都御史學士通政使大理寺卿詹事王府長史前鋒恭領護軍恭領驍騎恭領男佐領各一名康熙六年覆準領侍衛內大臣準親隨兵五名內大臣二名十八年覆準散秩大臣準親隨兵一名雍正元年議準見今京城滿洲都統親隨兵八名䝉古漢軍都統六名領侍衛內大臣前鋒統領護軍統領步軍統領五名滿洲副都統三名䝉古漢軍副都統二名步軍翼尉一名其所得銀米向與馬兵相等後經條奏裁減每月止給銀一兩米二斛今應將都統前鋒統領護軍統領步軍統領副都統步軍翼尉等親隨兵仍照舊給銀三兩領侍衛內大臣職任較大其親隨兵數應與滿洲都統同前鋒統領護軍統領亦有管轄兵丁之責其親隨兵數應與䝉古漢軍都統同均支銀三兩此等親隨兵毋庸給米每嵗照米數折銀十有三兩於支米時給發二年奉㫖八旗大臣等親隨兵錢糧有領受者有不領受者此後著一槩照例給與又議準每旗前鋒護軍恭領皆有食一兩錢糧之親隨兵一名今增給錢糧二兩米折銀一兩至前鋒侍衛副護軍恭領向無親隨兵亦給與一名每名食錢糧銀一兩米折銀一兩奉㫖前鋒侍衛亦照恭領給與四年議準驍騎恭領每月給親隨兵餉二兩五錢副恭領一兩五錢均不給米價銀七年奉㫖八旗大臣等應量給飬廉著動用兩浙鹽課餘銀萬兩分給前鋒統領護軍統領前鋒恭領前鋒侍衛等再動用兩淮鹽課餘銀二萬四千兩分給八旗都統以下至恭領等官又奉㫖八旗都統副都統及恭領等朕將兩淮鹽課餘銀每旗賞給千兩其滿洲䝉古漢軍之恭領多寡不同將賞給三旗銀三千兩即於三旗內合算應給都統若干副都統若干恭領若干著管理旗務之王大臣議奏遵㫖議準都統各給二百四十兩副都統各一百七十兩恭領十有二人並管理游牧察哈爾之恭領一人各六十兩副恭領十有二人各四十兩再鑲紅正黃正藍三旗游牧察哈爾恭領繫本處人原食半俸居住游牧地方應不給與此三旗各餘銀六十兩並大臣內有兼職者所餘銀俟嵗終令聲明緣由統於該旗公中收貯遇有應行賞賜之處再請賞給十年奏準八旗護軍校驍騎校定例於每年春秋二季共支領俸銀六十兩今增設之副護軍校副驍騎校等每月皆支領月餉五兩若遇閠月較之護軍校等轉多得銀五兩嗣後請將副護軍校等閏月錢糧仍照常給與護軍校等俸銀與副護軍校等一例每月支給月餉五兩乾隆元年奏準八旗滿洲副都統原有親隨兵三名較滿洲都統少五名今酌增一名䝉古漢軍副都統原有親隨兵二名較之䝉古漢軍都統少四名今酌增一名護軍恭領前鋒參領驍騎恭領原有親隨兵一名今增一名副護軍恭領副驍騎恭領前鋒侍衛原有親隨兵一名今各增半名其上三旗內府恭領等亦一例給與以上各官所給親隨兵均每名給與月餉三兩米折銀一兩於正項錢糧內關支至八旗佐領並上三旗內府佐領奉有諭㫖於本佐領下額設驍騎數內各給一名以為養贍之資其支給親隨兵事宜文官如尚書侍郎等官兼管都統副都統事務者除旗下養廉不支外其都統等任內親隨兵餉應準兼支郎中等官兼恭佐領者亦準兼支恭佐領親隨兵餉都統副都統及恭領有兼佐領者已支都統等任內親隨兵餉其佐領親隨兵餉不準兼支旗員內有賞給都統副都統等職銜見在行走者準照漢軍都統例支給賞給空銜不辦事者不準支給額外都統副都統恭領副恭領等官見在辦事者準照額設官支給其不辦事者不準支給世爵如男以上已有親隨兵若兼都統副都統恭領等官者準支領一處不得重支文官三品以上原有親隨兵者仍照例支給都統等官出差在外已有養廉者其親隨兵餉不準兼支若無養廉者仍準支給又議準八旗佐領內凡有别任出差及不能辦事年少之佐領委人署理者其本人親隨兵餉停其給與應給署理之人其有出兵及往馬場等處差遣之佐領親隨兵餉仍準給與本人如署理之人本身别有親隨兵餉照原奏停其給與二年諭八旗護軍校驍騎校等原繫食俸之人因欲令伊等用度從容故將俸改餉而遇閏之年不得與兵丁一例支領閏餉用度未免拮据著於本年為始凡遇閏月照兵丁例支給閏餉欽此四年奏準賞給八旗都統前鋒統領護軍統領等官養廉銀三萬四千兩除兼理旗務之王公及署理總兵等官外每都統二百兩前鋒統領護軍統領各一百八十兩副都統一百五十兩至八旗兩翼護軍恭領等官除試用並革職留任者不應賞給外餘仍照例按等分給十年奏準每年養廉銀領侍衛內大臣各給銀九百兩滿洲都統各給銀七百兩䝉古漢軍都統前鋒統領護軍統領各給銀六百兩滿洲副都統步軍統領各給銀五百兩䝉古漢軍副都統內大臣散秩大臣鑾儀使上駟院奉宸苑武備院卿步軍翼尉各給銀四百兩管理旗務王貝勒等不給養廉再領侍衛內大臣各旗都統內有兼管兩三任者止照一任支領前項賞銀由戶部按兩季支領三月準給四分十月準給六分見任軍營之大臣照原職給與賞給副都統職銜在軍營者照䝉古漢軍副都統例給銀四百兩或雖不在軍營從前曽在賞例者仍照從前賞給副都統例給銀一百五十兩餘銀照例於年終分給恭領等官印房旗員照副恭領例給與其前鋒恭領前鋒侍衛護軍等營恭領副恭領內有試用並革職留任者不凖給與一恩恤官兵雍正元年奉㫖發內帑銀八十萬分給八旗以資官兵婚喪之用隨遵㫖議準八旗護軍校驍騎校前鋒護軍領催等婚嫁事給銀十兩喪事給銀二十兩驍騎婚嫁事給銀六兩喪事給銀十二兩步軍及食一兩錢糧之執事人等婚嫁事給銀四兩喪事給銀八兩其喪事如祖父母父母及妻子準給與若子孫衆者但視其應得之一人給與至兵丁等病故或無子及其子尚幼即視其本身所應得者給與承辦之人娶妻視本身差使如繫閒散亦照嫁女例給與其父及承辦其事之人戶下兵丁人等不準給與凡遇婚喪等事令該恭領族長察明具保支領如有虛冒等弊將具保之人交部議處二年奉㫖尚膳尚茶執事人等均屬緊要其侍衛著照護軍校驍騎校例執事人著照護軍前鋒例遇有婚喪之事給與恩賞銀再此項銀若於五日一次支領恐貧乏兵丁其喜事尚可稍待若遇喪事必致窘迫著八旗滿洲䝉古都統等合支銀五百兩存貯公署一遇有事即行給發其事件緣由及所給銀數於月終造具清册咨內務府彚核本月餘銀幾何即於下月應領五百兩數內扣除找領存貯三年奉㫖八旗所給恩賞銀官員之子弟有給與者有不給與者夫推恩賞賜理當畫一即如貧乏筆帖式等以其為部院官不令給與似屬難行此必八旗大臣有意節省耳大約每旗每月不過領銀千一二百兩即可足用著八旗大臣詳細議奏遵㫖議凖護軍校驍騎校看守城門官渡等官並部院衙門筆帖式同護軍前鋒及正身領催驍騎執事人等一例給與恩賞銀八年奉㫖聞得八旗見將自首開戶養子準拔護軍驍騎之人於婚喪事裁革恩賞此開戶養子特為注册者原以免佐領人等互相訐告訛詐之事並未降㫖革退今伊等仍照常當差該都統等並不具奏即行裁革甚屬錯謬即令兵丁自首復裁革恩賞誰復據實自首著仍給與恩賞九年議準恩賞銀除見任五品以下官員子弟不準給與外其已故官員之子弟伊本身在何處行走照伊本身給與無嗣孀婦病故其承辦之人在何處行走亦照伊本身給與十年議凖年老患病告退人等內無嗣身故者有族人承辦照本身所應得給與如有子弟未當差者亦照前給與若無族人承辦交該佐領亦照本身所應得給與乾隆元年議準八旗漢軍每旗給生息銀二萬五千兩共銀二十萬兩將每月所得利銀交納內庫以備八旗漢軍支領再八旗漢軍佐領既多寡不同則恩賞銀亦應酌量增減應令鑲黃正黃正白三旗漢軍都統每旗於內務府支領生息銀三百兩其餘五旗每月支領銀二百二十兩均照滿洲䝉古例賞給仍於嵗終彚奏並知照內務府核銷又議準老病告退無嗣兵丁病故視本身所食錢糧賞給無嗣寡婦病故視承辦人之職分賞給向未議及閒散人今酌議閒散人內果繫自幼殘廢不能當差無嗣或子弟幼小遇本身及妻病故子女婚嫁之事均照驍騎例賞給又閒散人之子女幼失怙恃並無伯叔兄弟寄飬在族屬者向例婚嫁之時照承辦人職分賞給似未均平議將閒散人之子女幼失恬恃雖有伯叔兄長皆繫閒散或寄飬在族屬及姻親佐領下者遇婚嫁時均照驍騎子女賞給又因殘疾由軍前駮回裁退錢糧兵丁內如病痊娶妻及子女婚嫁或本身及妻病故凖照原食錢糧得賞又教養兵丁娶妻應照原議視其父兄職分賞給若其父兄皆不在得賞之列又無别依賴者照驍騎例賞給又教養兵丁原議除本身病故不凖給與外其祖父母父母喪事仍視其祖父所食錢糧得賞其祖父若繫閒散照承辦人職分得賞無承辦之人不準給與今定議教養兵及妻病故準照驍騎例賞給其祖父若繫閒散亦準照驍騎例賞給至教養兵補門軍者遇婚喪事均照此例得賞又應襲騎都尉人員因本身殘疾奉恩㫖每月給食二三兩錢糧者病故準照驍騎例賞給其子孫在應得賞之列者婚喪事準照本身所食錢糧賞給又八旗筆帖式庫使例應得賞而內務府筆帖式庫使並未準行應畫一賞給又永食半分錢糧人等之子孫未當差者婚喪事準照原食錢糧賞給又應得賞之兵丁人等其祖父雖繫見任五品以上職官及駐防外省見任五品以上官之在京兄弟兄弟之子例應得賞者遇有婚喪事均準照本身所食錢糧賞給又已故五品以上官之妻病故其子幼小尚未當差且無産業凖照承辦之人賞給又革退官員兵丁人等病故其子孫若在應得賞之列者凖照其子孫所食錢糧賞給至革退五品以上職官及革退兵丁等本身病故無嗣或子孫幼小實無産業者官員準照驍騎例兵丁準照原食錢糧賞給又兵丁等婚喪事已經呈報未及領銀適遇父兄升遷五品以上職官仍凖賞給又五品以上職官其分居弟兄婚喪事凖照本身所食錢糧賞給二年議凖恩恤銀每旗滿洲䝉古每月合領銀千兩分給滿洲旗七百兩䝉古旗三百兩漢軍上三旗每旗給銀三百兩下五旗每旗給銀二百二十兩如官兵喜事繫豫先定有吉期該恭佐領驍騎校領催族長等公同保結申報即可飭令管庫官照例支給如喪事需用促急該族長領催等各用本佐領圖記印領送庫即行支給該恭佐領等出具保結補行申報以便核銷又奏凖鄭家莊漢軍驍騎校正戶兵丁人等婚喪事照滿洲䝉古例給與賞銀四年議凖原食三兩錢糧之教養兵仍照舊例領賞外改食二兩錢糧之教養兵十嵗以上者喪事給銀八兩婚嫁事四兩九嵗以下者不凖給如伊父母事仍照例賞給五年奏準嫁女之家如其父不在或伯叔弟兄承辦者均一例賞給如並無同胞伯叔兄弟或旗中尊長親戚同辦者均照承辦人一例賞給又革退六品以下等官與革退五品以上職官身故無嗣或有子幼小實無産業者凖照驍騎例賞給又告休革退護軍校以下等官及兵丁之妻在夫前身故者如有子孫當差按子孫所食錢糧賞給如無子嗣或有子幼小尚未當差者察明果無産業告休官員之妻照其夫原品級革退官員之妻照驍騎例告退兵丁之妻照其夫原食錢糧革退兵丁之妻照步軍例賞給無嗣孀婦病故向例視承辦人職分得賞惟是並無親族之孀婦及親族繫閒散者並未分晰定議嗣後孀婦身故如並無親族及有親族而繫閒散者官員之妻照領催例兵丁之妻照本夫錢糧閒散人之妻照步軍例賞給如無承辦之人該佐領委領催一人令其承辦再兵丁父母喪及娶妻嫁女如有在屯居住者於報到佐領之日一面取具該佐領族長等甘結一面即行賞給又部院衙門貼寫效力筆帖式婚喪事如所食錢糧在應得賞之列者均照例賞給其食一兩錢糧效力之筆帖式照食一兩錢糧執事人之例賞給在學肄業官學生除五品以上官員之子弟不準賞給外如無産業其父兄又不在得賞之列者照食二兩錢糧之教養兵例賞給六年覆凖婚喪事如有揑報冒領賞銀者將冒領之人從重治罪其子孫永不準給恩賞銀同居之伯叔兄弟內知情者照例治罪其子孫亦永不準給恩賞銀不知情者免議不行詳察以致冒領銀之恭領佐領驍騎校領催族長並稽察之官照例議處若事本屬實多支賞銀者照數追繳稽察官無庸置議外將辦理舛錯之參領佐領驍騎校領催族長等分别議處又議準八旗婚喪恩賞銀革退無嗣之官皆準給賞則告退無嗣之官自應在賞給之列應一例賞給至親軍校前鋒校與護軍校職分相同見在八旗均照護軍校之例辦理亦應一例賞給十二年議凖八旗武職內五品以上官之婚喪事除同居親子弟兄不準請領外分居之子弟兄若在應領之例者視其本身給與若其父兄繫二品以上武職三品以上文職者仍不準給與六品以下武職之祖父母父母本身及妻子女嫁娶等事槩入應領之例給與此內惟藍翎侍衛既由領侍衛內大臣處請領則旗下毋庸重給又奏凖尚茶尚膳侍衛執事人如繫旗人照常按例由該旗請領又奏凖八旗勒令休致革職五品以上武官六品以上文官病故一槩不凖請領六品以下武官七品以下文官內具呈原品休致者視其品級請領若勒令休致與革職者視其子孫所食錢糧請領如無子嗣或子幼尚未當差照教養兵例請領又奏凖閒散進士候補文職微員照驍騎例請領又奏凖閒散舉人貢生監生生員及自幼殘疾不能當差或無子與有子幼小之閒散人並見食孤寡錢糧人等均照教養兵例請領其寡婦視子孫之職分請領若無子孫或子孫幼小未曽當差視其夫之原食錢糧請領倘職分不應請領原繫閒散者照教養兵例請領皆各按本身品級給與其親族人等承辦之處永行停止餘仍照定例遵行十五年議凖八旗恩恤銀停止生息凡應給婚喪銀均於每月移取戶部長蘆兩淮鹽課銀支給十九年議凖食一兩五錢錢糧之教養兵遇婚喪事亦如食二兩錢糧之教養兵給與一公費雍正三年覆凖八旗滿洲䝉古漢軍各處所用紙筆心紅黃綾布匹等項滿洲旗每月需銀三兩䝉古旗每月需銀一兩五錢漢軍旗每月需銀二兩其印房行走人員飯食銀滿洲旗定為十五兩䝉古旗定為九兩漢軍旗定為十二兩嗣後停其咨部領用均於旗下房租內動支再䝉古漢軍旗房租若不敷用於本旗滿洲旗房租銀內動用各旗用過銀數各該旗於嵗終奏銷著為定例至各旗官房均酌量本旗公費留取租息餘房照常凖令認買所有年終彚奏餘剩銀及認買房價皆交戶部收貯如有用處奏明取用各旗所交房屋將賣房銀數行知戶部注册內務府所交房屋將賣房銀數行知內務府注册五年奉㫖嗣後黑龍江吉林等處員闕若自京補授前往者不必論其品秩均賞給盤費銀五十兩乾隆二年奏準八旗滿洲䝉古漢軍各處支用公費紙筆等項每年滿洲旗需銀八九百兩至千兩不等䝉古旗需用一百六七十兩至三百兩不等漢軍旗需用三百餘兩至五百兩不等共需銀七千餘兩每年繕寫奏摺家譜辦理俸餉册籍等項必需銀二千餘兩此外修補官房買補倒斃駝等項共應備用銀五千餘兩此五千餘兩銀內滿洲每旗需銀二百餘兩䝉古漢軍每旗各需銀百餘兩但八旗公用多寡不一各旗備用銀內如有不敷凖於别旗領取應用有餘剩者交戶部存貯按數核算八旗共需銀一萬四千餘兩今八旗㑹同議定滿洲每旗嵗需銀千餘兩䝉古每旗三百兩漢軍每旗五百兩六年議凖自京補授黑龍江吉林等處官員其盤費銀有在本旗房租銀內支給者有本旗房租不敷支給於别旗餘剩房租銀內支給者但房租銀僅敷本旗公用而外省旗員赴任均有定限亦不便久令守候嗣後此項盤費銀如本旗房租銀內見有餘剩即行支給如不敷支給該旗即行文戶部於戶部收存銀內照數支給又議凖都統副都統遇奉差遣往返在一月以上者各給幫貼銀八十兩兩月以上者各給銀一百五十兩至副都統差往寶坻等八處獨石口等六處察看官兵等差官馬一項凖其一例給豫行糧槩行停止於養廉銀內照出差往返一月以上之例給銀八十兩八旗正副恭領每年出馬場向領行糧自應裁除一例於養廉銀內支給照都統副都統一月以上兩月以上給銀之數減半支給十一年奏凖幫貼隨圍人等銀即於找借庫銀內坐扣護軍校驍騎校各一兩前鋒護軍領催各八錢驍騎六錢收貯庫內以備幫貼恭遇車駕謁陵巡幸近處僅止數日者毋庸給與外凡遇進哨等圍在一月者幫貼護軍校驍騎校各二十五兩前鋒親軍護軍領催各二十兩驍騎十五兩在兩月者臨期都統等核算收貯銀數酌量增給由閒散選取之執事人與由護軍驍騎選取之執事人等一例當差亦凖幫貼開戶驍騎若以其無扣幫之銀不行幫給伊等亦繫一例當差之人應於找借庫銀之月於伊等錢糧內坐扣銀各六錢幫貼時亦照驍騎例幫貼如支領幫銀後因事故别差他人其銀應免應追照見行例辦理恭遇車駕巡幸各該旗將坐扣過銀數及各處差出人數於兩三月前行文直月旗今歸直年都統彚總察辦其所扣幫貼銀交廣儲司收貯支領時由廣儲司支領十三年奏凖幫貼隨圍兵丁銀如所扣之項不能接續即於戶部收貯庫銀利息內先行動給陸續坐扣補還原項一老幼官軍優給俸餉順治十二年題凖世爵亡故無人承襲者其妻照伊夫應得俸銀俸米之半養贍終身康熙十年題凖世爵病故將官注銷者其妻亡故原立爵之人親母尚在仍給半俸若原立爵人之母已故而襲世爵人之母尚在者亦給半俸繼母與生母同三十三年題凖未及年嵗承襲人員不上朝當差止給半俸俟長成始支給全俸雍正二年覆凖無嗣之世爵與族人承襲者原有分給俸銀養贍之例但年久或不分給亦未可定嗣後此等襲爵之人著該恭領佐領及族長等將俸餉三分之中分出一分養贍本家之寡婦其原管佐領及世管佐領一族中輪流承襲者毋庸分給十二年議凖八旗致仕官身有世爵其子及兄弟之子未承襲者照不及年未上朝之世爵例給與半俸十三年議凖凡官兵身故無論其妻年嵗有無子嗣情願守節者即具保照例給與半俸半餉乾隆元年諭凡大臣中有引年求退奉㫖以原官致仕者皆繫宣力有年素為國家優禮之人雖經解組仍當加恩以示眷念耆舊之意見在滿漢大學士暨曽任部院尚書豫告在家者均著照其品級給與全俸在京於戶部支領在外於該省藩庫支領永為定例欽此二年議凖武職年老告休曽經出征臨陳受傷及得有功牌者核實請㫖令其原品休致給全俸以養餘年其出征並未臨陳及無功牌者請㫖令其原品休致給半俸其效力有年並未出征者仍照例休致三年諭大學士尚書內原品休致大臣給食全俸永為定例從前諭㫖如自奏乞休朕加恩準令原品休致者著即照此㫖給食全俸其遇京察自陳朕加恩準令原品致仕者該旗該部以應否給食半俸具奏請㫖若非自行奏請朕特㫖令其原品致仕及遇京察自陳部議致仕者不必給食俸祿至於八旗武官具呈告退皆有量其軍功給食俸祿之例嗣後一二品武職大臣若自行奏請朕加恩凖令原品致仕者著該旗察其軍功及食俸年分以或給全俸或給半俸具奏請㫖若非自行奏請朕特㫖令其原品致仕者不必給食俸祿欽此又奏凖八旗賞給半俸半餉官兵身故其寡婦不便於半俸半餉之中復行減半仍給與一年半俸半餉如未及支領一年半俸其世爵已經承襲者除子孫及親兄弟承襲不必給領外若族人承襲其世族既已較遠寡婦周年半俸仍凖支領又奏凖八旗未上朝之世爵例應支食半俸其絶嗣之世襲雲騎尉經八旗都統議定給與半俸銀米如承襲此等世爵之人有年幼未上朝者不便於半俸之中減半支給嗣後凡承襲絶嗣之雲騎尉如有年幼未上朝者照伊應食半俸之數支領又奏凖八旗陳亡官兵之寡婦或絶嗣或子孫年幼無錢糧者業䝉恩賞照其夫原食俸餉給與一半但此等寡婦之子有補教養兵者因其子已食錢糧遽將一半俸餉裁去未免拮据嗣後請仍給一半俸餉俟其子長成當差所食銀米足抵寡婦一半俸餉之數再停支領四年奉㫖朕從前曽降諭㫖世爵內有年老具呈告退者令其兄弟及兄弟之子承襲後再將應否給食半俸全俸之處請㫖具奏今思年老解退之人若有世襲佐領令其子承管俸祿便致重復嗣後告休人員內如有軍前效力本身有世襲佐領者該旗將其兄弟之子承襲仍賞給俸銀若其子承襲將毋庸給俸之處具奏請㫖餘仍照舊例五年議凖八旗開戶兵丁其寡婦錢糧不應給與至軍前定為一二等作為正戶之開戶人等其寡婦仍給與錢糧則出征效力得過功牌戰傷及陳亡之開戶人等亦應照正戶之例給與寡婦錢糧又奏凖前鋒護軍正戶領催驍騎人等內因患病或傷殘退伍及六十嵗以上年老退伍如曾在軍前行走臨陳得有軍功者該管大員核實無論有無房産並有無子孫見在食錢糧者均每月給銀一兩米一斛以養餘年若在軍前行走並未臨陳立有軍功者亦行勘實除有房産尚可度日並有子孫見食錢糧外餘皆每月給銀一兩以養餘年以上應給飬贍之退伍兵丁該將軍都統副都統等咨報兵部由部每年彚奏若未經效力假揑咨送及尚堪當兵之人希圗坐食錢糧揑稱有病傷殘年老退伍者本人治罪該管官並該管大員交部議處其游牧地方兵丁槩不凖給盛京寧古塔等處駐防兵丁止給銀不凖給米六年奏凖駐防官員兵丁身故寡婦情願歸旗者俟到京後照在京八旗之例支給半俸半餉願留彼處依倚子孫及兄弟之子養贍者不論年嵗有無子嗣該管官具保給與一年半俸半餉如繫食半俸半餉官兵之寡婦亦照其夫所食半俸半餉之數給與一年世爵子孫已經襲爵得俸者寡婦半俸停止再在京開戶養子兵丁出征得有戰傷功牌及陳亡者其寡婦給與一年半俸各處開戶養子之寡婦亦照此例辦理又議凖世爵十八嵗世襲佐領十六嵗上朝當差均凖食全俸但各旗內亦有世襲佐領兼世爵者年至十六嵗應食何官全俸從前並無定例嗣後世襲佐領兼世爵者至十六嵗應領全俸時除世爵之俸少於佐領之俸者應食佐領全俸外如世爵半俸較多於佐領之全俸者應令仍食世爵半俸若與佐領全俸相等或半俸少於佐領之全俸者應令食佐領全俸俟至十八嵗再領世爵全俸以昭畫一又議凖向例旗下大臣病故者由該旗咨送吏部察明轉咨禮部給與祭葬今八旗武職大臣病故見在皆咨兵部轉行禮部察辦嗣後八旗文武大臣病故應請恤典者由該旗分别移咨吏兵二部察核行禮部具題又議凖八旗兩翼步軍協尉等有老病告休者該都統察明有無軍功應否給全俸半俸以養餘年具奏請㫖游牧察哈爾護軍校告休者該總管呈報統領察明辦理亦如之又奏凖從前議增教養兵錢糧凡鰥寡孤獨不計年皆凖選取此四項人內得有養贍而無嗣無依之孤身寡婦作何養贍未曽議及嗣後無嗣無依之孤身寡婦給與教養兵錢糧養贍終身七年議凖旗下公中存貯之王公府屬佐領內如有並無養贍之人照上三旗內管領下絶嗣孀婦之例每月給銀一兩家口多者銀米兼給家口少者每月止給銀一兩日後或補驍騎或分給諸王再將錢糧裁除一優恤出征官軍雍正三年議凖出征兵丁內或並無家口其餉銀無人收貯者各該旗佐領封固開明旗分佐領姓名並出征之地方彚齊咨送兵部遇有戶兵工三部解送官物之便搭解軍營交與本身收領仍將收到之處咨覆存案應領月米造册送户部扣留存倉俟凱旋日按照扣存數目支給若本人雖無家口情願將銀米存交親屬代為置辦衣服什物者該旗於出征兵丁起程之前詢明凖交親屬收貯十年諭西北兩路出征之滿洲䝉古漢軍大小官員等於起程時朕令多定跟隨人數其家中親隨兵銀米仍留為該員家口養贍之資並未令其裁革今戶部於本年三月間行文各處以各官在外既有親隨兵家中不應重領銀米將各官親隨兵銀米停其支領且自雍正七年大兵起程之日為始凡家中領過銀米於本人應領俸銀俸米之內照數坐扣還項甚屬錯謬殊非朕體恤出征人員之意著曉諭八旗人員凡軍前大小官員等家中已領之親隨兵銀米不必扣還其應領之項仍照常給與並將此㫖通行各處軍營知之欽此乾隆五年諭朕覽兵部纂修則例內稱從前進藏出兵之官及受傷病故官兵所有豫借銀免其追還繫出自特恩未便纂為成例等語朕思兵丁捐軀行陳情實可憫其豫借銀理應豁免若必待特降諭㫖恐其中不無一二遺漏著永為定例凡遇有此等該部即援例請免則恩恤之典可埀永逺矣欽此一駐防留養歸旗旗員子弟隨任雍正十二年題凖旗員子孫隨任在外者各省駐防及河工效力旗員子孫年至十八以上皆令歸旗當差肄業若有無故逗遛隱漏丁口者照例治罪乾隆五年奏凖外省駐防官員老病退休或緣事革職及降級調用因年力衰邁不願補官者及革退兵丁人等京中雖有子孫並無産業不足養贍而外省子孫居官當兵情願在外居住者凖其就養如無子孫或有兄弟兄弟之子居官當兵情願就養者及無子孫兄弟兄弟之子或有家人當兵足以養贍者均凖就養此等就養人員皆具呈該管大員察明咨部有品級者兵部彚題凖其就養無職之人據咨凖其就養其在京休致革退官兵不凖往外省就養又奏凖年老解任官員因父母墳墓家産皆在盛京呈請往盛京居住者該旗印文咨送有世爵者具奏無世爵者呈報兵部均凖前往五年奏凖駐防病故官兵寡婦有子弟家人已經當兵足以養贍者凖其就養若在彼並無子弟家人當兵情願來京者該管官出具保結該將軍等填給勘合交與押送官約束來京到京之日該旗報兵部給與押送官回文其已經歸旗人等不凖藉端告假復回原駐防處七年諭向來旗員子弟自幼隨任在外至十八嵗例應來京若有欲留任所協辦家務者凖督撫代為題請聼候部議其新授外任旗員子弟在京長養至十八嵗以上者非奉特㫖不得隨任此舊例也朕思旗員子弟不許擅隨任所者一則恐在外滋事一則留京以備該旗當差如外任旗員能嚴加約束為督撫者又不時稽察則皆知守分循理可無慮其多事至該旗佐領若本有可以當差之人而父兄外任將子弟帶往則本人既可省兩處食用該佐領閒散之人又得當差支領錢糧以資養贍洵為兩便之道嗣後外任旗員子弟十八嵗以上者在外任令該督撫題請在內著呈報該都統核奏皆凖其隨任其不願隨任者聼若隨任之後或出署交遊及干與地方之事著督撫即行恭劾從重議處欽此又奉㫖下五旗王公府屬人員升授外任欲將子弟帶往任所如繫見在王公門上當差之人該旗禀問王公如無用處奏明令其隨任如有用處即停其前往又奏凖外任旗員子弟十八嵗以上有情願留在任所者照例申報上官該督撫咨部旗存案嵗終兵部將人數彚奏在內旗員升授外任願將子弟帶往任所者呈該旗都統具奏凖其隨任八年奏凖守皇陵總管翼領防禦病故其子弟在京置有産業情願回京者察明送回如無産業不能回京情願在彼處當差者凖留彼處仍將緣由報該部旗又奏凖各處城守尉四品協領總管等官有由京城補授者有外省保舉者其由京補授之人雖與初設駐防之人不同然久於任所子弟充兵當差䆒與駐防無異此等人員之子弟有情願回京當差者凖其回京有情願在彼處當差及幫家務者均照駐防人員例凖在任所至將軍都統副都統等與文職大員無異其子弟不便在彼處充兵當差嗣後將軍等子弟若已及嵗實有不能離任所情由均先報該旗都統存案該旗於年終彚奏再由京城新補授之將軍都統副都統等有已及嵗之子弟帶往任所者呈報該旗具奏帶往八年奏凖各省駐防旗員回京車腳口糧等項年老患病告退原品休致官員來京候補筆帖式兵丁回京襲職及終養之人仍照從前撥去之例給與降調來京之人照所降之級給與革職之人照驍騎給與再官兵骨殖家口從水路回旗者照例每五十人給一頭號船四十人給一二號船三十人給一三號船每骨殖一具凖作一人其口糧均按照家口實數給與從陸路回旗者官員骨殖每一具給一車家口每六人給一車兵丁等骨殖每一具凖作一人骨殖與人口合算每六口給一車其無骨殖兵丁之家口仍照每六人給一車例督撫給與勘合以便沿塗填注十六年奉㫖各省駐防將軍副都統旗員等非辦理地方事務之文職大臣官員可比嗣後伊等子弟內有年已及嵗願帶往任所者各聼其便該旗不必奏請十七年諭從前旗人凡遇遴選各執事人皆踴躍從事無不欲黽勉出力今選取鷹狗房執事人皆託故規避此風已有年矣今亦毋庸深究但不及今整頓日久恐更致不堪著交該管大臣等嗣後選取鷹狗房執事人時將大臣內何人有子弟及何人之子弟年嵗幾何可以應選而不送名者察明夾片一並呈覽朕别行辦理欽此遵㫖議凖各旗選執事皆以在京官員子弟選取後行走一二年即推無力行走具呈告退殊屬不合應别行察辦至外任大臣官員子弟有奏請帶往隨任者若任其留於任所習於晏安不惟廢棄伊等亦無出身况外任子弟較京官子弟尤覺從容若不咨送似覺不均應將外官子弟一並開列進呈遴選又奏請嗣後各項執事人於外任大臣子弟選取外文職自知府以上武職自副將以上駐防官自副都統以上官員子弟內選取其中有由科甲監生出身者仍令照例考試補用應行文各處將十八嵗以上子弟槩仍送京以備遴選再遴選諸皇子等執事人雖不拘年嵗但雲南等處外任子弟槩令來京應選不惟道路窵逺難於選取且年稚幼丁不免跋涉勞苦應請自二千五百里以內外任大臣官員子弟凖令來京遴選其中或有辦理家務不能遠離或有殘疾不能赴選等情如繫大員自行奏凖知照該旗裁名若例不得奏官員凖呈該管大員轉奏知照該旗如有揑報等情察出從重議處再遴選執事人向由該旗將在京大臣官員子弟內家道殷實年十八嵗以上者咨取遴選諸皇子等執事人不拘年嵗由該處察明年嵗知照應毋庸置議外王公所屬大臣官員子弟止送遴選諸皇子侍從並不選取别項執事嗣後應與在京大臣官員子弟一例遴選奉㫖外任八旗大臣官員均繫滿洲世僕伊等仰䝉朕恩身居外任不能內庭當差伊等之子自應送京充當一應執事差使代為效力且伊等之子選取執事人後如果行走好又可得簡選侍衛補授官員升擢之階若不思大體但以伊等之子充補執事人視為苦差一味規避習於安逸不但終身不得成就徒致暴棄亦非滿洲舊制嗣後外任大臣官員內只有一子者凖留任所外其有二三子者任所凖留一子餘子年已及嵗送京選取執事人差使如有四五子者若亦凖留一子餘子盡送來亰選取執事人則當差人多不免浮費令伊等酌留二三子餘者著送京選取執事人此乃朕教育旗人之至意伊等若不知此意遇選取時復行託故規避即深負朕愛育滿洲之恩矣至皇子之侍從不可將伊等選取伊等見居外任將伊等之子選取侍從在皇子處行走不免藉端鑽營之事反滋繁擾著不必選取又奏凖八旗在京大臣官員子弟外任大臣官員子弟選取各執事時見在辦理並不畫一如不酌定條例難以永逺遵行轉啓干求規避之弊今酌議凡未選差使之閒散養育兵願入義學讀書之閒散捐納監生及捐納候闕之中書小京官筆帖式天文生並考取一應候補各館謄録官至十八嵗均應選取執事其考取之進士舉人貢生廪膳生員翻書房學習之生監咸安宫國子監唐古忒各學生皆不在應選之列再嗣後選取執事人時其外任大臣子弟內或隨任或未隨任由該旗確察咨送直年處彚奏十八年奏凖八旗世爵未及嵗因父兄出仕外任奏凖隨任者將支給半俸槩行停止俟回京後呈報旗部再照例給與又奏凖八旗外任營員以老病告休歸旗因有軍功賞給全俸半俸者均按原品酌減一等照在京旗員之例一例支給俸銀俸米至外任告休文官內有軍功賞給者亦照此辦理又八旗駐防官員內老病告休歸旗遇有軍功賞給全俸半俸者其俸米不必仍照在外之數關支亦照在京之例給與二十一年諭各省駐防兵丁不凖在外私置田産有物故者其骸骨及寡妻仍令各回本旗此定例也朕思國家承平日久在內在外皆已相安一體若仍照例辦理則在外當差者轉以駐防為傳舍未免心懷瞻顧不圗久遠之計而咨送絡繹亦覺紛煩地方官頗以為纍嗣後駐防兵丁著加恩凖其在外置立産業病故後即著在各該處所埋葬其寡妻停其送京但各處情形不同兵丁內有無力置地營葬者亦未可定著該將軍都統等酌動公項置買地畝以為無力置地窮兵公葬之用再向來此等駐防兵丁有因患病事故呈請回京到京後又復選差使者甚屬無謂今既凖其在外置産安葬所有呈請回京之處停止著為例欽此一貸給庫帑康熙年間八旗設立公庫貯銀借給旗下官軍五十三年裁八旗公庫停止旗人領借公庫銀雍正五年諭兵丁等婚喪事已加恩賞銀大小官員內有家資饒裕者亦有家計艱窘者偶遇喪事倉卒之間必至窘迫無措嗣後八旗大小官員內若遇喪事有情願借銀者著戶部借給四月俸銀至下季扣除若遇未及扣除之前緣事革職者除世爵外仍令其賠補如病故者著即賞給免其賠補至行取戶部庫銀恐一時不能即得先將旗下恩賞兵銀給與再行取戶部庫銀還項欽此乾隆五年諭八旗官員有平日指俸借支官銀以及抵買入官房地皆應指俸還項如該員遇有罰俸處分即應照數補交見銀此乃該員借用及置産之私項部旗理應按限催交毋庸復從寬緩但念該員既罰本俸復措見銀並在一時未免生計拮据嗣後罰俸之旗員如有應扣雜項銀著照舊按數坐扣俟完項之日再扣罰俸銀若扣還雜項之外尚有餘俸即將餘俸陸續扣足所罰之數不必勒補見銀至該員所罰之俸未經扣完之日亦不許再借别項如該員遇有喪事凖借四月俸銀亦著展限扣還欽此七年諭八旗兵丁人等不務生計平時不知節儉及受困一時計解燃眉重利借貸見今生計益至窘迫應如何施恩運籌措辦令其不至重利借貸於生計有所接濟之處著軍機大臣詳議具奏欽此遵㫖議凖前鋒校護軍校驍騎校凖借銀三十兩前鋒護軍領催凖借二十兩驍騎凖借十五兩均以五釐作息每月前鋒校護軍校驍騎校坐扣本銀一兩前鋒護軍領催坐扣銀六錢驍騎坐扣銀五錢十月後前鋒校護軍校驍騎校找借銀十兩前鋒護軍領催找借六兩驍騎找借五兩如不願借者各聼其便食二兩錢糧兵丁人等不凖借給令各旗核明應借數目造册咨部領給每月入於錢糧册內由庫坐扣其借銀人員有病故年老告退者凖其豁免獲罪之人著落家産子孫賠補如實無家産子孫不能賠還者該旗察明出結照例治罪所缺銀亦凖豁免年終彚奏不能賠還之銀於所剩利銀內陸續扣補副護軍校副驍騎校亦凖借三十兩覺羅前鋒護軍凖借二十兩借銀後驍騎拔補前鋒護軍領催者前鋒護軍領催升補護軍校驍騎校者俟原借銀扣完十月再凖找借新補兵丁即照應得數目補行支借再因買官房地畝人口拖缺官銀除官扣外下缺錢糧不敷坐扣本銀者不凖借足扣者仍借給弓匠族長等亦照護軍領催之例凖借銀二十兩附入䝉古旗下之厄魯特回子護軍等不準借給親隨兵亦不凖借給借銀兵丁內或升補官員承襲世爵佐領者將未經扣完本利銀入於俸册內坐扣完結八年議凖官員俸銀已有别項坐扣如遇喪事不論俸銀有餘與否均凖借給四月俸銀十一年奏準隨圍人員如有未經起程之先病故及患病不能隨圍在家病故與在塗病故者所領恩賞銀及借過一年或半年俸銀業經製辦行裝費用無存均免其交完十二年奏凖借過滋生銀官員內有隨圍者其本利銀一並展限一季於下季坐扣十五年議凖八旗大小官員遇有喪事凖借六月俸銀喜事凖借四月俸銀欽定大清㑹典則例卷一百七十六
