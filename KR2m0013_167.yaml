body:
  text: 内務府掌儀司三一停止祭神康熙六十一年聖祖仁皇帝大事内務府總管乾淸宮總管内監率掌儀司官司俎官内監人等奉請坤寧宮祭神殿神位恭送堂子安奉百日内坤寧宮停止祭神堂子停止挂紙釋服後委官齋戒監繪神像百日後選擇吉期坤寜宫安神行祭祀禮百日内朔望祭奉先殿素服行禮樂設而不作次年停止保和殿等處筵燕雍正元年元日世宗憲皇帝素服綴冠纓於壽皇殿大門外行禮三月十八日聖祖仁皇帝聖誕世宗憲皇帝素服綴冠纓於几筵前行禮百日後進天鐙不進萬壽鐙除服後進次年太和門太和殿中和殿保和殿坤寜宫張挂門神對聯其餘宫殿皆不張挂雍正十三年世宗憲皇帝大事一應停止事宜均與康熙六十一年同康熙五十六年仁憲皇太后大事坤寜宫百日内停止祭神堂子百日内停止挂紙百日内朔望祭奉先殿素服行禮樂設而不作次年停止保和殿等處筵燕天鐙照常安設不設萬壽鐙除服後進太和門太和殿中和殿保和殿坤寜宫及供佛處張挂門神對聯其餘宫殿皆不張挂康熙十三年仁孝皇后大事内務府總管乾淸宫總管内監率掌儀司官司俎官内監奉請乾淸宫祭神殿神位恭送堂子安奉百日内停止祭神堂子停止挂紙百日後選擇吉期坤寜宫安神行祭祀禮雍正九年孝敬憲皇后大事未曾移請神位堂子每月仍挂紙二十七日内朔望祭奉先殿素服行禮樂設而不作百日後進天鐙及萬壽鐙宫殿均張挂門神對聯諸皇子處不挂皇貴妃之事如十日内奉移殯宫大内十日停止祭神十日後奉移則奉移前停止祭神十日内奉移素服十日十日後奉移奉移以前皆素服貴妃之事大内停止祭神五日妃三日嬪二日近支親王喪聞大内停止祭神三日近支郡王特㫖停止祭神者遵行一成服齊集康熙六十一年聖祖仁皇帝大事世宗憲皇帝截髮辮成服二十七日除服百日後請髮孝敬憲皇后剪髮去耳環成服二十七日除服後帶銀耳環百日後換金耳環仁壽皇太后宫及宫眷乾清宫内庭宫眷咸剪髪去耳環成服二十七日除服大葬後帶銀耳環仍素服二十七月後換金耳環近支王等繫為子者截髮辮成服二十七日除服百日剃頭福晉剪髮去耳環成服二十七日除服帶耳環二十七月内皆素服皇女公主剪髮去耳環額駙截髮辮成服二十七日除服帶耳環百日剃頭二十七月内皆素服皇孫摘冠纓成服皇孫福晋去耳環成服二十七日除服百日剃頭帶耳環二十七月内皆素服皇孫女公主去耳環額駙摘冠纓成服二十七日除服百日帶耳環剃頭二十七月内皆素服宫内女子内監等剪髮去耳環截髮辮成服二十七日除服帶耳環百日剃頭内府三旗官員䕶軍領催各執事人等皆截髮辮内府三旗官員人等妻室皆剪髮去耳環成服二十七日除服帶耳環百日剃頭其恭理喪儀王公大臣及几筵前内府執事官員人等男婦皆二十七日除服以上人員二十七月至几筵前仍素服守䕶壇廟堂子奉先殿壽皇殿坤寧宮祭神殿各陵寝官員内監人等停給孝服免摘冠纓仍百日剃頭見有親喪及家有出喜痘人等暫停給孝服仍百日剃頭在京王以下有頂帶官員以上百日内不嫁娶一年内不燕㑹不作樂直省文武各官一年内不作樂百日内不嫁娶軍民人等百日内不作樂一月内不嫁娶初喪日起親王以下有頂帶官員以上每日三次齊集至二十七日止其致祭日仍齊集下並同近支王公福晉公主等二十七日内每日二次齊集以後分二班每日一次齊集至百日止外藩公主福晉以下佐領三等侍衞妻以上初喪三日内每日二次齊集三日後止内府三旗官員各執事男婦其齊集禮同雍正十三年世宗憲皇帝大事皇帝截髮辮成服百日内孝服百日後請髮綴冠纓素服至几筵前仍去冠纓孝服二十七月行除服禮祭畢除服皇后剪髮去耳環成服二十七日後帶銀耳環素服至几筵前仍孝服二十七月除服換金耳環皇太后宫及宫眷乾清宫内庭宫眷咸剪髮去耳環成服二十七日除服帶銀耳環二十七月内皆素服行除服禮致祭畢換金耳環近支王等繫為子者截髮辮成服二十七日除服百日剃頭仍素服至几筵前不綴冠纓二十七月後綴冠纓福晉剪髮去耳環成服二十七日除服帶耳環二十七月内皆素服皇女公主剪髮去耳環額駙截髮辮成服二十七日除服帶耳環百日剃頭二十七月内皆素服皇孫摘冠纓宫内女子内監等剪髮去耳環截髮辮成服二十七日除服帶耳環百日剃頭内府三旗官員䕶軍領催各執事人等皆截髮辮内府三旗官員人等妻室皆剪髮去耳環成服二十七日除服帶耳環百日剃頭其恭理喪儀王公大臣及几筵前内府執事官員人等男婦皆二十七日除服以上人員二十七月至几筵前仍素服不綴冠纓王以下各官一年内不嫁娶二十七月内不燕㑹不作樂軍民人等一月内不嫁娶百日内不燕㑹不作樂各省文武官員百日内不嫁娶一年内不燕㑹不作樂軍民人等二十七日不嫁娶百日内不燕㑹不作樂餘與康熙六十一年同康熙五十六年仁憲皇太后大事聖祖仁皇帝截髮辮成服二十七日除服百日後請髮寧壽宮宮眷剪髮去耳環成服二十七日除服帶耳環乾清宮内庭宮眷去耳環成服二十七日除服帶銀耳環百日後換金耳環裕憲親王福晉繫為子媳剪髮去耳環成服二十七日除服帶耳環皇子繫為孫者摘冠纓皇子福晉去耳環成服二十七日除服皇女公主去耳環額駙摘冠纓成服二十七日除服帶耳環百日剃頭皇孫女公主額駙與皇女公主額駙同寧壽宮内女子内監尚茶尚膳男婦咸剪髮去耳環截髮辮成服二十七日除服帶耳環百日剃頭紫禁城内除寧壽宫直班人員成服外其餘守衞大臣侍衞官員䕶軍人等乾清宫尚茶尚膳人員皆停