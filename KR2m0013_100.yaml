body:
  text: 禮部精膳清吏司燕禮一大燕禮崇德元年定元旦王貝勒貝子公等每旗各進御前中宮筵席牲酒外藩䝉古王貝勒等每旗各進御前中宮牲酒設燕於崇政殿王以下各官均於殿内按翼依次列坐如停止筵燕免進筵席牲酒又定王以下百官均於殿内序立候進御筵畢王以下都統以上進前立各官於原班立進酒官跪進酒羣臣皆跪進酒官退原處跪皇帝進酒畢羣臣興退至原班列坐又定萬壽聖節設燕王等進筵席牲酒一應禮儀與元旦同順治八年世祖章皇帝大婚禮成御太和殿設慶賀燕内外親王郡王在殿内坐貝勒以下在丹陛上坐文武各官於各翼幕次下坐作中和樂行禮如元旦儀是日恭進皇太后筵席牲酒九年題準萬夀聖節親王世子郡王各進筵席牲酒外藩王貝勒貝子每旗各輪進御前牲酒是日設燕前期由部題請如停止筵燕即免進一應禮儀均與元旦同又題凖冬至日内外王公均進筵席牲酒前期禮部題請如停止筵燕即免進一應禮儀均與元旦同十年題準元旦親王世子郡王各進御前筵席牲酒外藩䝉古王貝勒等各進御前牲酒如有不足由部劄光祿寺增設御筵由尚膳監供辦王以下各官筵席由光祿寺供辦前一日由部題請本日午時筵燕王入殿内坐貝勒以下在丹陛上坐外藩王貝勒亦按爵在内親王貝勒之下列坐文武各官在兩旁幕次内坐朝貢陪臣在幕次末坐又題準王以下公以上於丹陛上立各官於各旗幕次下立皇帝進茶時王以下各官及朝貢使臣皆行一跪一叩禮皇帝進酒時亦行一跪一叩禮興王等入殿内坐貝勒以下各官各就坐次坐十一年世祖章皇帝大婚禮成筵燕與八年同康熙四年題準太和殿筵燕内外王以下公台吉以上滿漢侍郎以上武官二品以上在丹陛上兩旁坐朝鮮國使臣官員厄魯特喀爾喀來使頭目在丹陛上右翼坐文武各官在各旗幕次下坐又題準皇帝陞座内外王以下公台吉以上在殿内坐進茶時就坐次行一跪一叩禮至進酒時内王以下公以上出至丹陛上序立外藩王以下各官均於各坐處立候皇帝進酒時行一跪一叩禮復就坐次坐是年聖祖仁皇帝大婚禮成御太和殿筵燕一應禮儀與順治八年同是日恭進太皇太后皇太后太妃前筵席牲酒八年題準萬夀聖節王等各進筵席牲酒於午時筵燕是日届時王以下各官咸朝服齊集太和門前鹵簿大駕全設鴻臚寺官引文武各官及進貢陪臣人等咸入禮部堂官奏燕備聖祖仁皇帝陞太和門座作中和樂樂止鳴鞭王以下内大臣一等侍衛以上在門下分翼列坐二等三等侍衛在階下分翼列坐文武各官在金水橋南分翼按品級於各旗幕次下坐進貢使臣在右翼班末序坐尚茶進茶王以下各官就坐次行一跪一叩禮次進御筵作丹陛樂王以下公以上至堦下丹墀内序立各官就坐次立進酒大臣奉爵跪進王以下各官皆行一跪一叩禮畢次設王以下各官筵席進饌作中和樂燕畢謝恩作丹陛樂王以下公以上在丹墀各官在金水橋南行一跪三叩禮畢鳴鞭作中和樂聖駕還宮樂止各退二十一年題準元旦親王世子郡王長子貝勒貝子入八分公各進御前饌筵牲酒設燕如常儀二十三年議準元旦筵燕坐次左翼内外王十人在一班坐内外貝勒五人貝子三人公六人在一班坐内大臣及台吉十人為兩班坐一等侍衛為兩班坐二等侍衞為一班坐共七班其餘侍衞在鹵簿外坐右翼内外王十人在一班坐内外貝勒四人貝子六人公十七人為兩班坐内大臣及台吉十人為兩班坐一等侍衞為兩班坐共七班二等侍衞以下在鹵簿外坐内閣大臣於首班内大臣之下序坐都察院堂官日講起居注官原侍立處坐嗣後如有加增官員照此酌量序坐又議準改饌筵為肴羮不用銀器王等停進饌筵改進肴羮筵席親王各十有六席世子十有四席郡王十席貝勒六席貝子四席入八分公二席雍正四年題準元旦賜王公百官燕已刻王公及外藩王公台吉等朝服集太和門文武各官朝服集午門外鹵簿大駕全設設中和韶樂於太和殿檐下設丹陛大樂於太和門均北嚮設御筵於寶座前稍南内大臣内務府堂官禮部堂官理藩院堂官共視設席丹陛上張黄幕陳金器丹陛下鹵簿後張青幕設各官席畢鴻臚寺引百官入理藩院引外藩王公入王以下台吉以上在丹陛上立左副都御史副都統通政使以下各官在丹陛下立午刻禮部堂官奏燕備駕御太和殿中和韶樂作奏太平之章午門鳴鐘鼓陞座樂止鑾儀衞官唱鳴鞭階下三鳴鞭鴻臚寺理藩院官引王公大臣進殿内行一跪一叩禮坐文官三品武官二品以上於丹陛上文武百官於青幕下並行一跪一叩禮坐尚膳䕶軍叅領升邇御筵尚茶進茶丹陛大樂作王以下各官皆就坐次跪行一叩禮進茶畢侍衞分授殿陛王大臣茶光祿寺分授青幕下羣臣茶皆就坐次行一叩禮飲畢復行一叩禮坐樂止展席羃掌儀司官就黄幕下奉爵進丹陛清樂作奏朝天子之章羣臣起掌儀司官進至楹東西嚮酌酒進酒大臣進跪王公百官皆跪掌儀司官跪舉爵授進酒大臣興退進酒大臣由中陛升進至御座側跪進酒興由西陛降復位跪行一叩禮王公百官咸行一叩禮進酒大臣由西陛升仍就進酒處跪接爵由中陛降復位跪掌儀司官跪接爵退掌儀司官一人奉酒巵賜進酒大臣大臣跪受行一叩禮飲畢掌儀司官接巵退進酒大臣復行一叩禮興退入原坐次坐王公百官皆坐樂止乃進饌中和清樂作奏金殿喜重重之章分給各筵恩賜食品及酒各一巵侍衞酌酒授王公大臣光禄寺酌酒授百官皆起跪受爵行一叩禮卒飲再行一叩禮復坐樂止笳吹進歌畢慶隆舞樂進先舞揚烈舞次隊舞大臣進殿舞喜起舞均以樂歌和之舞畢朝鮮國俳進百技並作退鴻臚寺理藩院官引王以下各官行三叩禮丹陛大樂作奏慶平之章鑾儀衞官唱鳴鞭階下三鳴鞭中和韶樂作奏興平之章聖駕還宮乾隆三年題準元旦太和殿大燕定饌筵二百有十席羊百酒百缾親王每人進席八郡王席五均羊三酒三缾貝勒進席三貝子席二均羊二酒二缾入八分公進席一羊一酒一缾親王十有二人郡王八人貝勒六人貝子二人入八分公十有五人共應進饌筵一百七十三席羊九十一酒九十一缾由部行光祿寺增備席三十七酒九缾兩翼稅務増備羊九御燕筵席照例交内務府敬謹備辦六年奉㫖御殿日八旗大臣官員賜茶皆由光祿寺備辦八旗驍騎分賜看來不甚整齊嗣後交尚茶備茶内務府各執事人及内府䕶軍分賜八年奉㫖嗣後御殿及筵燕日殿内止大臣賜坐侍衞等不必賜坐著禮部前期行取應賜茶之王大臣數目每人以侍衞一人授茶其筵燕日與燕大臣衆多若授茶侍衞不敷並令親軍奉授十五年題準元旦太和殿筵燕親王十有一人郡王九人貝勒四人貝子二人入八分公十有二人照三年之例共應進饌筵一百六十一席羊八十四酒八十四缾光祿寺增備席四十九酒十有六缾兩翼稅務増備羊十有六一皇太后宮筵燕順治十年定皇太后宮三大節筵燕皇后率固倫公主親王福晉以下縣主輔國公夫人及公侯伯子都統尚書等命婦以上均與皇太后前筵席尚膳監供辦親王世子郡王各進筵席牲酒外藩貝勒貝子每旗各進牲酒皆交尚膳監收進陳設不足光祿寺供辦康熙四年題準太皇太后皇太后前三大節恭進筵席牲酒七年題準太皇太后皇太后三大節諸王各進筵席牲酒皇后率公主福晉大臣命婦詣宮行禮畢筵燕乾隆三年題準正月初二日皇太后宮筵燕定饌筵三十席羊二十酒二十缾親王郡王每人進席一羊一酒一缾共進席二十羊二十酒二十缾光祿寺增備十席十五年題準正月初二日皇太后宮筵燕業經奉㫖二品大臣命婦咸令與燕按親王十有一人郡王九人應進席二十羊二十酒二十缾光祿寺増備席二十共席四十交内務府收入陳設至恭進皇太后前攝六宮事皇貴妃前御筵貴妃妃嬪前饌筵照例交内務府敬謹備辦十六年題準皇太后萬壽慈寧宫筵燕例設席四十按親王十有一人郡王九人進席二十羊二十酒二十缾光祿寺増備席二十共四十席交内務府收入陳設至恭進皇太后皇后前御筵貴妃妃嬪前饌筵照例交内務府備辦一皇后宫筵燕崇徳元年定皇后前元旦千秋節設燕固倫公主和碩公主親王福晉以下至一品命婦齊集郡主縣主郡君縣君均候㫖齊集如停止筵燕均免齊集一筵燕外藩崇徳元年定喀爾喀來朝五日賜燕一次設筵四十席又定索倫部落進貢每三日賜恩燕一次三年定喀爾喀厄魯特台吉來朝賜恩燕一次又定外藩䝉古王貝勒貝子公台吉等朝賀元旦除元旦大燕外賜恩燕一次七年定喀爾喀厄魯特來進年貢賜恩燕一次崇徳七年西藏逹賴喇嘛遣使來御賜燕一次八年同順治七年逹賴喇嘛使來在部燕三次十年逹賴喇嘛來朝御賜恩燕一次遣親王迎送在塗均設燕順治十一年奏準䝉古王貝勒貝子公台吉都統等以事來京候常朝御殿日隨班行禮在内筵燕一次康熙二十一年定外藩王以下台吉都統以上朝賀來京除夕於保和殿賜燕一次三十九年喀爾喀土謝圖汗及和碩親王來進貢照例賜恩燕一次再燕二次雍正十二年奏準今年輪班朝覲之䝉古王貝勒貝子公等奉㫖停其來京應將除夕燕停止其在京之䝉古王台吉等仍頒賜筵席乾隆元年定外藩䝉古王等慶賀元旦來京除夕在保和殿筵燕一次若奉㫖停其來京隨將除夕筵燕停止其在京之䝉古王等應入燕者照例如數賜給筵席十九年賜杜爾伯特親王車凌等燕於熱河行宮與燕外藩蒙古同二十年賜綽羅斯汗燕於熱河行宮與十九年同二十一年賜杜爾伯特親王伯什阿哈什土魯番公拜和卓等燕於熱河行宫與二十年同一視學筵燕順治九年世祖章皇帝幸國學禮成題準王貝勒貝子公等内院禮部堂官衍聖公四氏子孫在部筵燕一次康熙八年聖祖仁皇帝幸國學禮成筵燕與順治九年同雍正二年世宗憲皇帝幸國學禮成正值齋期於齋戒完日在部賜燕設上席三十中席二十下席三十自衍聖公以下執事各官及五氏子孫咸與乾隆三年駕詣太學釋奠禮成次日賜筵燕於禮部照雍正二年例備席八十外増備席一百三十六席凡執事官及五經博士觀禮五氏子孫咸與一經筵燕順治十四年世祖章皇帝御經筵講官進講畢聖駕還宫衆官咸集協和門光祿寺備燕二十五席燕畢至太和門前内金水橋南謝恩行一跪三叩禮各退康熙二十四年文華殿告成舉行經筵照順治九年筵燕雍正三年仲秋舉行經筵燕經筵講官各官於協和門設席二十有二羊六酒六缾茶十壺與順治十四年同乾隆三年仲秋舉行經筵筵燕與雍正二年同嗣後皆照此例一㑹試燕順治四年題準㑹試主考各官入場燕上席中席各給銀花一對下席無花共結采樓一座采旗六道出場燕主考知貢舉本部堂官每人上席一銀花一對同考官監察御史提調各執事官筆帖式每人中席一銀花一對謄錄彌封受卷對讀守門廵綽供給鳴贊醫官大使儒士教坊司官每人下席一康熙十四年題準㑹試止設出場燕其入場燕簪花均停止二十一年題準㑹試入場出場燕簪花等項仍照舊例行乾隆二年值祈雨齋戒㑹試燕停止主考及執事各官仍分賜銀花一恩榮燕順治三年定殿試進士傳臚畢賜恩榮燕於部簡命内大臣一人主席讀卷官提調官鑾儀衞堂官每人一席監試御史䕶軍叅領受卷彌封收掌用印廵綽填榜供給鳴贊各官每二人一席䕶軍校三人一席由光祿寺備辦康熙六十年因祈雨齋戒傳臚後停止恩榮燕雍正五年殿試諸進士傳臚後賜恩榮燕主席内大臣一人讀卷官十有四人提調官五人鑾儀衞堂官一人各上席一監試官四人彌封官十有二人收掌官十人供給官八人填榜官十有八人䕶軍叅領六人鳴贊四人每二人上席一進士二百二十五人一甲三人各中席一其餘進士二人共中席一乾隆十年題準殿試進士於五月初二日賜恩榮燕本部見在興工修葺此次在翰林院設燕一恭繕神牌筵燕順治五年奉太祖髙皇帝神牌升配圜丘四祖四后恭奉太廟後殿所有監修繕寫官員在部賜燕一次大學士尚書每人一席學士侍郎郎中每二人一席員外郎主事每三人一席撰文辦事中書每四人一席一修書筵燕崇徳年間纂修太祖髙皇帝實錄告成由部備燕於國史院監修總裁纂修各官筵燕一次順治九年纂修太宗文皇帝實錄開館日監修正副總裁纂修謄錄收掌等官於部筵燕一次十二年纂修太祖髙皇帝太宗文皇帝聖訓開館日光祿寺備燕三十席監修總裁副總裁纂修謄錄收掌等官於部筵燕一次本部堂官陪燕康熙六年纂修世祖章皇帝實録開館筵燕與順治九年同十一年纂修世祖章皇帝實錄告成在部賜燕一次主席内大臣監修總裁副總裁每人一席纂修官二人一席收掌官三人一席謄録繙譯官四人一席廕生監生生員共二席禮部堂官共一席雍正元年纂修聖祖仁皇帝實錄因在百日内停止開館燕二年纂修大清㑹典開館日筵燕一次主席大臣一人總裁四人副總裁四人禮部堂官一人共上席十執事官五十三人共中席二十七七年纂修上諭開館日在館筵燕一次席十有三羊三酒一缾茶五壺十年纂修聖祖仁皇帝實錄告成賜燕主席内大臣一人監修總裁一人總裁三人副總裁六人各上席一禮部堂官共上席一纂修官二十七人二人共中席一收掌官八人三人共中席一謄錄繙譯官一百九十二人四人共中席一乾隆六年世宗憲皇帝實錄告成賜燕與雍正十年同一衍聖公來朝筵燕順治元年定衍聖公進表慶賀或襲職來京朝見後在部燕一次隨至之五經博士咸與燕一筵燕外國陪臣崇徳二年定朝鮮貢使至東京燕一次至盛京燕二次回至東京再燕一次順治十年定各國貢使至京禮部㑹同館各燕一次十三年議準荷蘭貢使在部賜恩燕一次部燕二次康熙九年西洋貢使來京在部燕三次雍正三年議準安南貢使在部燕一次回至廣西燕一次四年議準琉球貢使在部燕二次回至福建燕一次五年議準蘇祿貢使在部燕二次回至福建燕一次七年議準暹羅貢使在部燕二次回至廣東燕一次八年議準南掌貢使在部燕二次回至雲南燕一次乾隆十六年議準緬甸貢使在部燕二次回至雲南燕一次一王府筵燕崇徳元年定喀爾喀來朝諸王府皆設燕又定索倫部落進貢按旗燕七次三年定喀爾喀厄魯特台吉等慶賀來朝按旗燕七次又定外藩䝉古王貝勒貝子公台吉等朝賀元旦除元旦大燕外於每旗王府各燕一次本旗王貝勒貝子入八分公咸與七年喀爾喀厄魯特來進年貢按旗燕七次順治十年達賴喇嘛來京五旗王府各燕一次康熙二十一年定外藩王以下台吉都統以上朝賀來京元旦後五旗王筵燕五次雍正五年奉㫖外藩扎薩克王貝勒貝子公台吉等朝賀元旦來京明嵗著左翼王等燕一次右翼王等燕一次乾隆二年奏準按康熙二十一年定外藩王台吉等朝賀來京除夕保和殿賜燕一次元旦後五旗王等燕五次十四日十五日賜燕一次是八旗八次雍正五年將五旗筵燕改為左右翼各一次今年元旦後王府筵燕仍按旗各燕一次又向年筵燕本旗諸王均赴主席之王府陪燕設有樂舞䝉古鼓吹嗣後務循舊制令本旗諸王貝勒貝子公等齊集依次列坐燕賓其樂舞除慶隆舞不許用外禮部見有之雜劇等許其承應至本王府亦宜備鼓吹雜劇以侑賓筵十九年燕杜爾伯特親王車凌等於熱河宗室王公暨四十九旗䝉古王公各設燕一次欽定大清㑹典則例卷九十六
