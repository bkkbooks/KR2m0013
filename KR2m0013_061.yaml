body:
  text: 禮部儀制清吏司册立一册立皇后之禮崇德元年孝端文皇后以適妃正位中宫行册立禮是日設黄幄於清寧宫前設黄案於幄内王公百官朝服序立崇政殿前太宗文皇帝御殿閱册寶命正副使持節至清寧宫宣讀册文行册立禮禮成正副使持節還至崇政殿復命孝端文皇后率公主福晉命婦於太宗文皇帝前行六肅三跪三拜禮諸妃率公主福晉命婦於孝端文皇后前行六肅三跪三叩禮太宗文皇帝御殿諸王率滿洲官上清字表文䝉古諸王率䝉古官上䝉古字表文漢官上漢字表文次第宣讀各行慶賀禮乃賜王公百官燕如儀順治八年十一年康熙四年册立皇后詳見大婚則例康熙十六年孝昭仁皇后正位中宫行册立禮同日孝懿仁皇后肇封貴妃又册封安嬪敬嬪端嬪榮嬪惠嬪宜嬪僖嬪前期分遣官祗告天地太廟後殿聖祖仁皇帝親詣奉先殿以册立告設節案於太和殿正中設孝昭仁皇后册寶案於左右稍前次設貴妃册寶案嬪册案於左右聖祖仁皇帝禮服御太和殿閱册寶王公百官咸朝服按翼序立乃宣制命正副使持節行册立禮正副使至景運門内監接奉節册寶入宫孝昭仁皇后受册寶行禮如儀貴妃嬪各册封禮畢内監出至景運門以節授正副使正副使還至後左門復命聖祖仁皇帝率羣臣詣太皇太后宫仁憲皇太后宫行禮翼日孝昭仁皇后禮服詣太皇太后仁憲皇太后聖祖仁皇帝前行禮各如儀是日命公主福晉命婦免隨行禮越三日聖祖仁皇帝御太和殿王公百官上表慶賀如常儀是日免公主福晉命婦詣孝昭仁皇后宫行禮二十八年孝懿仁皇后正位中宫行册立禮雍正元年孝敬憲皇后以適妃正位中宫行册立禮同日崇慶慈宣康惠敦和裕壽純禧皇太后肇封熹妃又册封貴妃齊妃懋嬪裕嬪典禮與康熙十六年同惟慶賀禮奉㫖竢三年後補行三年補行册立孝敬憲皇后慶賀典禮世宗憲皇帝御太和殿王公百官上表行禮畢御乾清宫孝敬憲皇后率妃嬪於世宗憲皇帝前行禮孝敬憲皇后還宫妃嬪率公主福晉命婦於孝敬憲皇后前行慶賀禮均如儀乾隆元年孝賢皇后以適妃正位中宫同日皇后肇封嫻妃又册封貴妃純妃嘉嬪典禮均與雍正元年同翼日皇帝率羣臣詣皇太后宫行禮皇后率貴妃妃嬪詣皇太后宫行禮皇帝御殿王公百官上表慶賀頒詔布告天下孝賢皇后率貴妃妃嬪詣皇帝前行禮貴妃妃嬪詣皇后宫行禮公主福晉命婦於皇后宫行慶賀禮畢詣貴妃前行禮均如儀十五年攝六宫事皇貴妃正位中宫行册立禮暨慶賀行禮均與乾隆二年同尊封一尊封之禮順治九年世祖章皇帝尊封太宗文皇帝妃二位曰皇考懿靜大貴妃皇考康惠淑妃前期一日遣官祗告太廟屆期設黄幄二於昭聖慈壽皇太后宫前東西相嚮設太妃座於幄内大貴妃在東淑妃在西設儀仗於丹墀内大貴妃儀仗在東淑妃儀仗在西内院今内閣官奉安册於采亭内鑾儀校舁亭内院禮部官前導至太和殿内設大貴妃册於東淑妃册於西均北嚮世祖章皇帝禮服御太和殿南面閱册畢鑾儀校舁亭世祖章皇帝乘輿至昭聖慈壽皇太后宫門外亭止大學士二人奉册世祖章皇帝降輿至黄幄前以次上册行禮是日王公百官不齊集公主福晉以下大臣命婦不行禮十八年聖祖仁皇帝尊封太祖高皇帝妃為皇祖壽康太妃前期一日遣官祗告太廟是日内院禮部官奉册寶設黄案上舁送至太妃宫門前交内監送入宫内太妃受册寶訖内院禮部官各退康熙十五年尊封世祖章皇帝妃四位曰皇考恭靖妃皇考淑惠妃皇考端順妃皇考寧慤妃典禮與順治十八年同雍正二年世宗憲皇帝尊封聖祖仁皇帝妃四位嬪一位曰皇考皇貴妃皇考貴妃皇考密妃皇考定妃皇考通嬪前期一日遣官祗告太廟後殿奉先殿是日於各本宫陳設儀仗采仗大學士禮部堂官送册寶印至宫門前與順治十八年同十三年皇帝尊封聖祖仁皇帝妃四位曰皇祖壽祺皇貴太妃皇祖温惠貴太妃皇祖順懿密太妃皇祖純裕勤太妃前期一日遣官祗告太廟後殿奉先殿屆期皇帝禮服御太和殿閱册寶印畢親詣寧壽宫行尊封禮時以世宗憲皇帝服制不奏樂停止慶賀乾隆元年尊封聖祖仁皇帝嬪四位曰皇祖襄嬪皇祖熙嬪皇祖謹嬪皇祖靜嬪先期遣官祗告太廟後殿奉先殿是日陳設各采仗於寧壽門外禮部堂官内閣學士送册至宫門前餘儀與順治十八年同二年尊封世宗憲皇帝妃二位曰皇考貴妃皇考謙妃是日各陳設儀仗采仗於本宫前餘儀與雍正二年同八年尊封皇祖温惠貴太妃為皇祖温惠皇貴太妃典禮均與雍正十三年同册封一一册封皇貴妃貴妃妃嬪之禮崇德元年孝莊文皇后肇封西永福宫莊妃及册封東關睢宫宸妃西麟趾宫貴妃東衍慶宫淑妃是日設黄幄於清寧宫前設黄案於幄内太宗文皇帝御崇政殿閱册寶宣制命正副使持節至清寧宫行册封禮成妃等率公主福晉以下及大臣命婦於太宗文皇帝前行六肅三跪三叩禮又於孝端文皇后前行六肅三跪三叩禮次公主福晉大臣命婦於妃前各行四肅二跪二叩禮各如儀順治十三年册封皇貴妃前期一日遣官祗告太廟時世祖章皇帝駕幸南苑於行宫正殿閱册寶命正副使持節至隆宗門轉交内監奉節及册寶入宫皇貴妃受册寶行禮均如儀内監傳告禮成以節授正副使正副使持節復命翼日以册封禮成頒詔天下康熙十六年孝昭仁皇后正位中宫同日孝懿仁皇后肇封貴妃又册封安嬪敬嬪端嬪榮嬪惠嬪宜嬪僖嬪前期禮部工部製貴妃册寶妃册印嬪册因册立中宫御太和殿閱册寶宣制命大學士尚書侍郎内閣學士充正副使持節以次隨册立中宫正副使行至景運門轉交内監奉入行禮如儀禮成内監出景運門各以節授正副使復命貴妃諸嬪隨孝昭仁皇后詣太皇太后宫仁憲皇太后宫行禮畢貴妃諸嬪詣聖祖仁皇帝前行禮次詣孝昭仁皇后前行禮其公主福晉以下及大臣命婦奉㫖均免慶賀十八年孝恭仁皇后肇封德嬪儀與十六年同二十年孝懿仁皇后以貴妃晉封皇貴妃孝恭仁皇后以德嬪晉封德妃同日封貴妃又惠嬪封惠妃宜嬪封宜妃榮嬪封榮妃前期製册寶印遣官祗告太廟後殿奉先殿屆期大學士自太和殿以節授各正副使内閣官奉册寶印設各采亭内鑾儀校以次舁亭至景運門轉交内監奉入行禮如儀是年停止慶賀三十九年册封貴妃和嬪良嬪前期製册寶印遣官祗告太廟後殿奉先殿至期舉行典禮與二十年同五十七年册封宣妃和妃成妃密嬪定嬪勤嬪前期製册印祗告太廟後殿奉先殿屆期典禮均與二十年同是日諸嬪增給采仗視妃儀仗内減紅段瑞草繖拂子各一對並命補給端嬪采仗雍正元年世宗憲皇帝册立中宫同日崇慶慈宣康惠敦和裕壽純禧皇太后肇封熹妃暨封貴妃齊妃懋嬪裕嬪典禮與康熙十六年同是日奏請陳設貴妃儀仗公主福晉以下大臣命婦等行慶賀皇后禮畢於貴妃前行慶賀禮奉㫖貴妃前免行禮十二年册封謙嬪前期製金册屆期正副使由太和殿持節行册封禮成女官引謙嬪詣世宗憲皇帝前行六肅三跪三叩禮乾隆二年册立中宫同日皇后肇封嫻妃暨封貴妃純妃嘉嬪典禮與雍正元年同六年嘉嬪晉封嘉妃同日册封愉嬪怡嬪舒嬪先期遣官祗告太廟後殿奉先殿屆期行册封禮與康熙二十年禮同册封禮成嘉妃愉嬪怡嬪舒嬪詣皇太后宫皇帝皇后前行禮均如儀十年貴妃晉封皇貴妃皇后以嫻妃晉封貴妃純妃晉封貴妃愉嬪晉封愉妃暨册封令嬪前期遣官祗告太廟後殿奉先殿屆期典禮與六年禮同册封禮成皇貴妃貴妃愉妃令嬪諸皇太后宫皇帝皇后前行禮均如儀十三年議準皇貴妃册封大典福晉命婦等行禮已有成例惟貴妃行禮外廷無案可稽但皇貴妃攝六宫事不日即正位中宫既已統理内政體制自宜尊崇貴妃亦應一體行禮至皇貴妃儀仗内車輿例用明黄帷金黄幨今請加崇均用明黄其册封前期遣官祗告太廟後殿皇帝親詣奉先殿祗告次日皇貴妃朝於皇太后宫時拜位設於甬路左並嗣後遇大節及慶賀大典内外三品以上官於皇貴妃前進箋慶賀十四年册封攝六宫事皇貴妃同日嘉妃晉封貴妃令嬪舒嬪晉封妃暨册封婉嬪皇帝禮服御太和殿閱册寶印王公百官咸朝服侍班乃宣制命大學士禮部尚書侍郎内閣學士充正副使持節行册封禮翼日應行慶賀及頒詔典禮奉㫖統於恭上皇太后徽號次日舉行又諭禮部所進册封皇貴妃攝六宫事及晉封貴妃儀注内稱公主福晉命婦皆詣皇貴妃貴妃宫行禮等語朕意初封即繫貴妃者公主福晉命婦自應行禮若由妃晉封者儀節較當酌減此一定之差等且今皇貴妃及嘉貴妃同日受封而公主福晉命婦行禮畧無分别則於儀制亦未允協嘉貴妃前著照純貴妃之例不必行禮欽此十六年册封慶嬪頴嬪禮儀與雍正十二年同册封禮成翼日女官引慶嬪頴嬪於皇太后宫皇帝皇后前行禮均如儀十九年册封忻嬪一應典禮與十六年同册封二一册封諸王貝勒貝子崇德元年定是日諸王貝勒及文武各官均於崇政殿前分翼序立内院官奉制册印設殿内黄案上請㫖授封内院官引諸王貝勒依次進跪殿前宣制册官及奉制册官於黄案東西面立次第宣制册畢奉制册印授諸王貝勒王等祗受轉授從官從官跪受王等次第各復原位立册封禮成奉制册印官前引王等隨後進至清寧宫前前引官分翼東西面立鳴贊官贊排班贊進贊跪叩興王等於皇帝前行三跪九叩禮皇后前行三跪九叩禮畢前引官前行王等隨後由大清門次第出諸王貝勒相賀按班次序立互行二跪六叩禮畢各回府第諸王福晉貝勒夫人等各於王貝勒前行慶賀禮畢王府屬官僚各於本王前慶賀行二跪六叩禮貝勒府屬官各於貝勒前慶賀行一跪三叩禮又議準王以下將軍以上均由内院官具奏引至崇政殿前行授封禮順治九年題準諸王貝勒貝子公等受封謝恩禮部具題於每月常朝日進殿前行禮十一年題準封親王世子給金册封郡王給鍍金銀册封貝勒以下皆給授誥命十四年題準親王郡王嗣封者傳至宗人府禮部堂官授册寶該嗣王跪受貝勒以下奉恩將軍以上傳至宗人府宗人府官頒給誥命均跪受若年幼者就府第宣賜十七年題準凡封貝勒給紙制册康熙十二年題準凡封親王世子郡王本部準宗人府咨具題請㫖册封開列官名奏請欽㸃正副使前期一日由部設節案香案册寶案於王殿堂上王府儀衞樂器陳於殿堂前至期設節案於太和殿階上設册寶印采亭於階下引正副使自太和殿持節鑾儀校舁册寶采亭往封王府作樂王等率本府屬官跪迎於府門外之右行受册寶禮畢正副使持節復命樂作王率本府屬官跪送於府門外封親王曰寶郡王曰印貝勒有制册無印其行禮並同又題準封貝子亦給紙制册又題準封親王世子郡王遣内大臣散秩大臣為正使禮部侍郎内閣翰林院學士為副使由部列名奏請欽㸃差宣讀官同往宣讀制册寶印文封貝勒貝子遣内閣侍讀學士侍讀翰林院侍讀學士侍講學士侍讀侍講為正使禮部郎中員外郎主事為副使差宣讀官同往宣讀制册文封鎮國公以下奉恩將軍以上由宗人府禮部給授誥命又定册誥文均由翰林院撰擬中書科繕寫金銀册由工部䥴造一册封公主崇德元年定是日内院官奉制册設采亭内陳設崇政殿請㫖授封持節官前行次册亭次封使至公主府門公主率侍從等迎出儀門之右行受册禮成封使持節復命公主送節至儀門外是日諸王貝勒文武各官咸於崇政殿前分翼序立皇帝陞殿諸公主由右門至崇政殿於皇帝前行六肅三跪三叩禮次進清寧宫於皇后前行六肅三跪三叩禮次詣諸妃前各行四肅二跪二叩禮公主各回府第各府屬官於本府公主前行慶賀禮又議準凡封公主給紙制册順治十一年題準封固倫公主和碩公主同輩者封長公主長一輩者封大長公主均給金册康熙十二年題準封内外固倫公主和碩公主奏遣往封正副使及宣讀制册官均與封諸王例同一册封王等福晉貝勒貝子夫人崇德元年定封王福晉遣使授封與公主同又定封王等福晉貝勒夫人等均給紙制册順治十一年題準封親王福晉世子福晉金册郡王福晉給鍍金銀册貝勒夫人以下均給授誥命十七年題準貝勒夫人亦給紙制册康熙十二年題準封貝子夫人亦給紙制册又題準凡封親王世子郡王福晉奏遣正副使及宣讀官與親王世子郡王例同封貝勒貝子夫人與封貝勒貝子例同鎮國公夫人以下奉恩將軍恭人以上由宗人府禮部給授誥命三十九年奏準王福晉以下貝子夫人以上及郡主縣主郡君未經受封者五年一次由部彚題遣使往封一封郡主縣主郡君順治十一年題準郡主縣主郡君授封禮儀均與公主同又題準封郡主以下均給授誥命十七年題準封郡主縣主均給紙制册康熙十二年題準封郡主縣主郡君奏遣正副使及宣讀制册官均與封貝勒貝子例同縣君鄉君由宗人府禮部給授誥命欽定大清會典則例卷五十八
