body:
  text: 戶部田賦三一州縣經徴錢糧運解布政使司候部撥日起運直𨽻起運銀一百九十一萬三千四百九十一兩四錢八分九毫有竒盛京起運銀二萬六千三十一兩六錢一分七釐七毫有竒山東起運銀二百七十八萬一千六百四十七兩六錢二分八毫有竒山西起運銀二百五十九萬三千五百十有七兩六錢五分八釐有竒河南起運銀二百七十三萬八千二百五十兩三錢六分江南江蘇起運銀一百八十九萬八千九百九十一兩有竒安徽起運銀一百三十七萬九千五百十有二兩有竒江西起運銀一百五十七萬一千三百二十兩一錢九分五釐五毫有竒福建起運銀百有三萬七千六百十有八兩五錢二分五釐七毫有竒浙江起運銀二百十有四萬五千八十三兩二錢八分九釐六毫有竒湖廣湖北起運銀八十二萬三千百有二兩七錢有竒湖南起運銀九十萬三千五百十有七兩六錢六分有竒陜西西安起運銀一百三十五萬六千三百五兩一錢五分五釐有竒甘肅起運銀十有九萬一千五百九十三兩四錢二分七釐有竒四川起運銀四十九萬三百六十四兩一錢八分有竒廣東起運銀八十四萬一千三百七十二兩有竒廣西起運銀二十九萬六千三十五兩七錢三分六釐七毫有竒雲南起運銀十有六萬六千二百一兩六錢五分六釐七毫有竒貴州起運銀七萬五千四百八十九兩五錢九分六釐有竒順治十年覆準起運錢糧布政使司先發給府州縣空白批文百張批文內編定號數府州縣起解時填領解姓名鈐印投司司驗批到先後以杜侵冒又題準直省錢糧州縣籤批解府府但挂號不必轉批州縣印封錢糧到府府但彙解不必拆封上加府印鈐蓋十一年覆準起解錢糧布政使司立驗批簿州縣於起解之先豫期申報司庫填入驗批簿內一面起批限期解交該衙門該衙門仍將批發回不得踵蹈寢批之咎州縣將領過批回實收具文申報登簿存驗十七年覆準州縣解司錢糧批回三注日期一注到司日一注兊銀日一注發批日康熙二年覆準州縣起解錢糧以批回為據令設連環批其式用紙一張聨書字號截為二批豫申巡撫親判銀數限日發回州縣臨起解時將發回連環批一申巡撫存案一發解役赴該衙門交納注收銀數目原批發回州縣即送巡撫對批察驗以杜侵冒遲延之弊又覆準連環號批巡撫隨收隨發到司該司即以批到日收銀隨發批令解役速回不必再以批回送巡撫察驗惟别具文申詳巡撫四年覆準錢糧各有款項起解不容溷淆如布政使司將解到錢糧發換批回改抵别項及府州縣不按款項朦溷抵解布政使司遞為轉報者聽督撫題參七年題準州縣開徴錢糧後逐月報府隨收隨解如藉稱候齊彙解以抗玩治罪府於州縣申報後即轉報布政使司如報收未解府不即速稽察者以徇庇例治罪司於府申報後核參不嚴致日久侵沒者以失察例治罪巡撫本年不核參至事發或交代時始察出者以朦溷例坐罰九年題準凡批回未領稱為已領未發稱為已發者將該管各官議處又議準凡錢糧並未起解申報起解或庫內無銀申報有銀者將該管各官及巡撫分别議處十五年議準官貟將不應起解之錢糧違例起解及應解夲色解送折色者各加議處又議準起解錢糧不加詳察致銀匠於銀內攙和鉛沙並解送潮銀者該管官及巡撫分别議處三十五年題準凡州縣起解錢糧照部頒法馬兌收批回款目相符銀批同解銀解司庫批投巡撫衙門登記發司限日收掣布政使司即日當堂照數兌收出具實收同批呈繳巡撫驗銷遞發州縣存案倘有批無銀及款項不符者布政使司詳報題參四十七年覆準州縣官每季起解布政使司錢糧挨次造報巡撫批回已獲未獲一一注明如藩庫已收錢糧而勒批不給者巡撫題參治罪五十九年議準州縣官將徴收錢糧計道路之逺近量數目之多寡隨徴隨解布政使司如有遲延不解者由府核報參處如州縣批解正項錢糧而布政使司抵兌雜項勒批不發者許州縣申報督撫或徑報部院題參雍正六年覆準州縣起解錢糧徑解藩司彈收號批申撫核對七年議準湖北起解正項錢糧填用批號於聨批內書寫細字首列起解年分某項錢糧額數次開某年月日解過夲項之批號銀數復將見解錢糧用大字分别開填某號批解若干復細字填注彙計已完未完總數起解雜項填用單批編列字號鈐以州縣印信按照司道衙門各自一號起編至百號止陸續填用每批止開見解款項别於批尾黏單開載解過款項銀數月日每黏單內以開載十號為率獲批者於本號之下注明又題準直隸奉天山東河南西安廣東廣西貴州見用單聨號批浙江江西湖南雲南正項錢糧見與湖北之例相符其雜項填用單批應照湖北遵行又山西江南福建甘肅四川均應照所頒單聯批式填解其鹽課米豆等項填用聨批各省不同照夲省例復參以湖北之式行一布政使司運解京餉順治十六年覆準解部錢糧批文册籍各官當堂定限僉發如假手吏胥空懸小日任意違限以及補年月扶同作弊經部察出將解役送刑部究審又覆準領解官役到京須親身赴部交納不許姦猾包攬違者領解官役並包攬之人均送刑部分别究擬康熙二十八年議準凡解送一應錢糧物料到部限三日內驗收掣批如無故不即收明掣批照律計日治罪至書役人等向解役揑稱估驗挂號等項費用名色藉端包攬索詐銀者許被詐之人呈該管官將包攬索詐之人計贓以枉法論該管官失察交吏部議處四十九年題準各省解部鹽課關稅該御史監督皆具批送科領解官役於銀物交足之日將所給實收送科察驗各省督撫織造將解部錢糧並顔料段匹等項先行移會具硃限批文送科俟交完之日即將部中所給實收送科察驗發批如有違限不到及遲延不完或繫包攬需索侵沒或繫解官那移挂欠由科核參交刑部治罪五十七年議準各省解部錢糧必俟堂官親身監兌將批回鈐蓋堂印給發解官倘數目短少銀色低潮察明行文該撫題參若庫官將解到紋銀以低潮駮回已經足數以短少勒索者將庫官題參治罪雍正二年議準凡發解餉銀該布政使司務面同解官兌發令解官畫押庫官鈐蓋印信七年諭各省解部錢糧及各項物件皆有批回向例解官於各部掣批之後即將所出批回赴科挂號原無六道挂號之例蓋既經各部察核其數目又經各科察驗其遲速則事已完備矣乃近年泥於科道一例稽察之説因於六科挂號之後又赴御史衙門挂號致令解官多候時日且開不肖書役需索之端於事務甚屬無益嗣後著將六道挂號之處槩行停止欽此一部撥運解京餉雍正三年奏準直省於春秋二季將實在存庫帑銀造具清册春季限於二月秋季限於八月到部由部據各省所報見存實數酌定數目奏明撥解除僅敷本省需用之福建廣東廣西等省及不敷本省需用之陜西甘肅四川雲南貴州等省存留夲省不解至京餘省春秋二季册報實存銀數酌量存留夲省以備協濟鄰省兵餉並别有所需請撥用外其餘銀悉令解部每年冬各省督撫將本省次年一嵗應需官兵俸餉豫為會計造册咨部由部將各省額徴起運等項銀內按款照數撥給如福建廣東廣西僅敷本省俸餉外尚間有須用協濟者即於鄰近省分撥解陜甘四川雲南貴州等省所需不敷本省俸餉銀於鄰省撥解如山西河南鄰近陜甘直隸山東次近陜甘江西湖廣鄰近四川雲貴浙江次近四川雲貴凡撥協先盡鄰近再盡次近此外各省若别有急需應協濟者隨時於鄰近省分通融撥解藩庫銀如不敷用或動鹽課或請內帑隨時奏聞四年題準戶部撥餉皆按各省册報實存之數以定多寡其解交之期計道里之逺近以定月日督撫於撥解文書到日即將司庫道庫見存帑銀按期起解長蘆山東山西河南限文到六十日到部江南江西浙江湖廣文到八十日到部福建廣東廣西文到百日到部其有册報實存而未歸司道庫者將緣由聲明再定限續解免其處分倘過期不將見存解交者由部題參將巡撫司道議處一解京顔料物件順治九年議準解役中途盜賣照監守自盜律治罪家産變賣追賠州縣官濫委匪人者連坐康熙十四年議準額買顔料等項錢糧各州縣三月內解銀知府即行採辦委官於本年十月內押運進京交納如州縣徴銀不足解府遲誤及知府採辦稽延起運違限者皆降一級完日開復該撫限夲年二月內估價題報如該撫估報逾期布政使司督催不力完欠罔稽皆罰俸六月若本年夲色物料嵗底不能全完者督催之巡撫布政使皆降俸一級戴罪督催完日開復如知府採辦稽遲先給空批卸罪解官者降一級調用或採買物料不堪用者罰俸一年不照時價確估妄行多開者承估之布政使司罰俸一年巡撫罰俸六月如顔料等項不送上司驗看徑自解部者亦罰俸六月又議準解送顔料等項解官中途乾沒交納短少者照監守自盜律治罪久追不完者令該管上司賠足不得派纍小民若解部稽遲一月以內免議一月以外議處解役懲治又議準凡起解本色顔料正項錢糧違該撫批限到京日期一月以外及逾崇文門稅課司挂號日期解到錢糧不即交納延閣者將領解官役題參治罪若有姦蠹嚇詐包攬交納並崇文門人役抑勒等弊皆送刑部究擬二十八年覆準嗣後各省顔料解部該督撫計顔料之多寡路塗之逺近酌給水腳以杜派纍四十五年題準本色顔料仍照定例令各府自行採辦遵限解到如仍違限彙解並不肖解官不親身交庫託人代交者將解官并該管上司題參六十一年題準嗣後各省解到交庫物料限二十日核收給批如不可收者該管官稟明堂官即行駮回如遲延違限將該管官議處一運解協餉雍正二年議準起解協餉布政使司照部頒法馬面同解官左右彈兌即將原法馬公同封固鈐蓋印信給與解官帶去至收餉布政使司處驗明印封公同取出先將法馬左右較兌無差然後將餉銀如前兌收如解官故遺失銀鞘或中途私動印封抵換法馬者收餉之布政使司驗明印信申報督撫題參治罪並將僉差不慎之各上司一并交部議處一解餉給夫馬水腳康熙二十五年題準各省解送米豆草若夲省內解送者不給腳價如運送别省至五百里以外者準給腳價五百里以內者不準給雍正六年題準各省解送餉銀大道仍用車載騾馱一遇深山僻路即飭經過地方官按鞘撥夫二名倘有遲延勒索即行題參如解官將人夫工價折銀侵蝕者該督撫題參治罪乾隆二年議準各省解部及協濟鄰省餉銀馱載夫馬給與勘合管解之貟給與水腳及傾鎔元寶製備鞘篐等費除甘肅四川雲南貴州並無委解京協餉銀外凡直隸起解京餉照例給與勘合夫馬其傾鎔元寶製備鞘篐每千兩給銀六錢水腳費五萬兩以下每站每萬給銀四錢十萬兩以上每站每萬給銀三錢山東起解京餉並撥解陜西之西安蘭州肅州協餉照例給與勘合夫馬各屬解司錢糧均繫元寶毋庸傾鎔止給鞘篐銀一錢三分水腳費解送京餉每站每萬給銀四錢解送西安協餉每站每萬給銀三錢八分解送蘭州協餉每站每萬給銀三錢五分解送肅州協餉每站每萬給銀三錢河南起解京餉並協解陜西西安等府餉銀照例給與勘合夫馬傾鎔元寶例不給費每千兩止給製備鞘篐銀三錢水腳費每站每萬給銀三錢冬春加增五分如有協帶别省餉項令委官約帶水腳掣批日核明按站給發山西起解京協餉照例給與勘合夫馬傾鎔元寶例不給費每千兩止給鞘篐銀三錢水腳費五萬兩以下每站每萬給銀五錢五萬兩以上每站每萬給銀四錢十萬兩以上每站每