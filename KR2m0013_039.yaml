五百四十二兩有竒廣西存留銀九萬四千九百四十五兩五錢五分四釐六毫有竒雲南存留銀四萬三千七百八十四兩二錢九分六釐有竒貴州存留銀萬六千九百六十三兩一錢七分六釐有竒一存留動支康熙元年題準州縣錢糧先盡起運之數全完方準存留雍正六年題準直省存留銀凡官役俸工等項遇支給之時傳集同城文武官公同給發申報奏銷又題準陜西甘肅所屬甘泉寧羌沔略陽白河等縣以糧載丁自丁銀減除有閏月之年不敷存留銀二千二百九十六兩三錢四分無閏月之年不敷存留銀千二百七兩六錢七分於各屬解司起運銀內撥給造報七年題準廣東文武舉人會試酒席銀照依各州縣編徴定額徴收司庫俟會試之期按名給發如有增減通融勻給八年題準廣東中式文武舉人旗匾銀照會試例將各屬額編之銀按名勻給十年題準奉天府屬官俸役食向於盛京戶部支領今各州縣人丁改徴丁銀地畝半銀半米自明年為始奉屬州縣教職佐雜各官俸工等項於各屬地丁銀內存留支銷府屬上司衙門俸工在附近州縣地丁銀內支給長寧縣地丁銀不敷支給就該縣所徴雜稅銀存留支給如再不足就永吉州今改吉林同知雜稅銀內撥補又題準盛京各屬雖二月開徴實俟秋成催比本年不及應用請將上年所徴錢糧照下年應留數目扣存貯庫陸續支給十一年諭國家祀典最宜慎重至於文廟春秋祭儀尤宜備物盡誠以申敬禮聞外省州縣中有因除荒而裁減祭祀公費者朕思銀數若少難於措辦或致祭品簡略或恐派纍民間二者均未可定著各省督撫察所屬有除荒減費之州縣即於存公銀內撥補以足原額務令粢盛豐潔以展朕肅將禋祀之誠欽此乾隆元年諭聞直省州縣地方額徴地丁錢糧項下有起解存留二欵如官役俸工即於存留款內支給若該省有地畝荒蕪糧額豁除者即將官役俸工扣減以抵豁除之數名曰扣荒此亦不得已之辦理也但此扣荒一項自應合省大小官貟均攤方不悖於情理乃聞外省止扣知府以及州縣佐雜教職寒苦之貟而督撫司道轉不在扣除之內此則大非情理矣著該部通行傳諭各直省督撫若該省有荒闕賦銀應於督撫司道大貟及府縣正印官俸工內酌量均攤扣除以抵所闕之數至於佐雜教職等官俸工槩免扣除俾微末官吏得以養贍若有因地方荒闕而裁減祭祀者著遵雍正十一年皇考世宗憲皇帝諭旨於該省存公銀內撥補以重祀典欽此二年諭外省有荒闕賦銀之處向例在於知府以下等官俸工內扣除抵補朕念佐雜微貟力量單薄不應在扣除之內已於乾隆元年三月內降旨諭令在督撫司道大貟及府縣正印官俸工內酌量均攤以抵所闕之數今思官有崇卑役無大小微貟俸工既經免其攤扣其餘各衙門人役皆當差效力之人額支工食數兩藉以飬贍其家若因荒闕扣除則糊口無資情有可憫此項共計十二萬餘兩著於乾隆三年為始各省大小衙門人役工食皆準於地丁項下照額定之數全行支給免其扣荒使執役之人均沾恩澤欽此又題準直省州縣遇歉收之年其編徴工食銀按照分次蠲免者令督撫核計所蠲工食之數循照直隸福建等省撥補災荒扣闕之案專案指𣢾報部動撥題銷又題準陜西西安撥解甘肅俸工裁站銀令長安等縣解交本省布政使司彙行解交以免各縣零星解送之煩三年諭朕聞逺省中式舉人有應領之建坊銀每見主考長塗跋涉即以恩賞之項行其束修之敬而識見淺小之考官亦遂收納不辭此風行之已久今若追溯從前一一清釐徒滋案牘之繁未免優纍究於舉子無補著從寬免其察究嗣後考官各宜恪遵功令不許收受建坊銀該藩司亦必照數給發不得絲毫扣留務使中式舉人實沾恩澤欽此又覆準湖北嵗貢花紅銀通計六年實徴二千二百四十四兩六年應出貢二百七十二名按名勻派每名應得銀八兩二錢五分令各屬每年解司存庫遇出貢之期照派定銀數就近給發以六年報銷一次六年之內有壓貢未出者將餘存銀下屆支給報銷又覆準湖南嵗貢花紅通計六年實徴銀四千二十四兩八錢四分二釐六年應出貢二百五十九名按名勻派每名應得銀十有五兩五錢二分有竒令各屬每年解司存庫給發報銷五年題準湖北會試舉人長夫銀向遇會試之年每名先給銀十兩餘銀俟試後找給嗣後楚省會試文武舉人若干名按人分派全數墊給不必先給十兩於試後補給至會試舉人有無故逗遛及半塗潛歸者照例行追若中塗患病丁憂或已到京投文而患病丁憂者並取具該地方官同鄉官印結詳報均免追繳一部撥留貯各省備用雍正五年覆準嗣後直省田賦戶部於每年春撥時將督撫册報實存應解京餉銀內酌量地方之逺近大小賦銀存剩之多寡豫為留存以備該省不時之需其酌留之銀令該督撫等公同分貯藩庫如有動用之處該督撫題明方準動用本部仍於秋撥時再為酌留如有不行題請私相動用者將該督撫布政使司照擅動錢糧之例治罪其餘實存銀數均於春秋二撥案內悉行解部直𨽻附近京師布政使司庫無庸酌留帑銀江蘇安徽江西浙江湖南甘肅四川廣西貴州各布政使司庫均酌留銀三十萬兩福建布政使司庫酌留銀三十萬四百七十兩有竒雲南布政使司庫酌留銀三十萬三千三百四十兩有竒山西河南湖北西安廣東各布政使司庫均酌留銀二十萬兩山東布政使司庫酌留銀十萬兩八年諭向於大宛二縣各發帑銀萬兩存貯縣庫遇有速辦公事準其詳明府尹動支近思辦理軍需之州縣其急切應付不容刻緩而該州縣並無存貯備用之項朕意欲於辦理軍需及事務繁劇之州縣亦仿大宛之例酌留帑銀以備急切之用其如何舉行俾辦公有賴而弊竇不生著大學士等悉心定議具奏欽此遵