錢糧皆以錢作銀每銀一兩連加耗羡銀一錢五分共折制錢一千一百五十文見今該處錢價昂貴民間納錢比之納銀為費較重朕思民間完納錢糧銀數在一錢以下者向例銀錢聽其並用原以便民若數在一錢以上又值錢價昂貴之時亦令交錢轉致多費是便民而適以纍民殊未妥協著直隸總督飭令各屬民間完納錢糧在一錢以上者不必勒令交錢在一錢以下者仍照舊例銀錢聽其自便欽此二年覆準徴收一應雜項錢糧令納戶包封自投入匱屆期一同監拆如有需索及留包偷取等弊即行參究一催科期限雍正八年諭陜西四川民風淳朴歷年逋賦甚少按每年徴收錢糧之期四月完半十月全完此定例也朕思四月十月既屆完納之期小民必須豫先經營是麥榖未收之時即為輸將之計或因稱貸而受剝於富豪或因豫糶而大虧其價直且如甘肅地方有徴收本色者若在糧榖未穫之前更為竭蹶歷來川陜錢糧既無拖欠陋習著將四月完半者寬至六月十月全完者寬至十一月俟夏麥秋禾築埸納稼之後從容完課俾民力紓徐以副朕愛飬黎元之至意欽此十三年議準徴收地丁銀仍照舊例二月開徴五月停忙八月接徴十一月全完至賦稅出自田畝而物土之宜樹藝榖麥紡績絲布收穫成就早晚多寡各省不同令督撫按照地方情形酌量徴收不必拘定四月完半之數其花戶錢糧在一兩以下者皆繫田畝無多生計不足之人若完不足數即緩至八月接徴全完其力能完半者仍令照數完納乾隆二年題準浙江杭嘉湖三府屬南米向繫春徴四分於冬季辦漕之後復加催輸未免完納艱難兼之漕南二米分款交倉更多跋涉自三年為始應徴南米隨同漕米於十月起一并徴收分别兑運解給其催徴南米各官於十一月初一日起至次年三月底以六月計算應徴月日分數造册題銷一歸轄改徴康熙十二年覆準貴州錢糧向繫府縣分徴並無經徴督徴之異今以貴陽思南鎮逺銅仁安順都勻平越七府所徴錢糧各歸附郭之縣經徴知府止司督徴之責俾畫一遵行雍正六年覆準順莊編里開造的名如一人有數甲數都之田分立數戶之名即歸并一戶或原一戶而實繫數人之産者即分立的戶花名至田畝未經售賣而住址遷移者舉報注明收糧時一並改正田坐彼縣而人居此縣者就本籍名色别立限單催輸又題準陜西綏德衛地雜處於綏德米脂清澗三州縣及榆林十營堡之中將近州者改歸州轄近縣者改歸縣轄其三屯衛地近各堡者改歸各堡管轄應徴本折銀米糧草歸各堡新設文官徴收轉解又延屬東路建安髙家二堡繫葭州所屬柏林大柏油永興三堡繫神木縣所屬鎮羌孤山木瓜園三堡並清水皇甫二營繫府谷縣所屬將此十營堡倉糧改歸所屬州縣徴收又題準福建泉州府同安縣廈門地租銀二千七百十有七兩自雍正六年為始改歸廈門同知就近徴收報銷七年諭聞直𨽻地方有寄莊寄糧之弊往往地寄此處糧寄他處相隔百餘里或數百里之逺即如宣化府懷安縣有人地皆在懷安而寄糧於萬全宣化者有人地皆在萬全宣化而寄糧於懷安者更有見在懷安納糧而寄地於順天府之寶豐相隔五百餘里者在徴糧者則鞭長莫及而寄地者則彼此無關脫漏欺隱之弊勢所不免有司實難稽察催徴朕之所聞如此著直𨽻總督詳察若果有此等事應作何更正改隸之法著該督撫悉心妥議具奏再各省如有此寄莊寄糧者著該督撫亦詳察定議具奏欽此遵旨議準奉天湖北貴州並無寄頓之弊雲南各府州縣所轄地方人戶田地雖有犬牙相錯而程途居址不甚遙隔與寄莊寄糧不同輸納已久未便改隸所有直𨽻山東山西河南江蘇安徽江西福建浙江湖南陜西四川廣東廣西等省寄莊寄糧民屯田地應徴銀米等項自丙辰年為始悉加更正就近徴糧按額報解又議準直隸所屬延慶萬全赤城三州縣及張家獨石二口嵗需不敷米一萬四千七百石零向就保安懷來西寧蔚懷安龍門等州縣撥運協濟未免輸挽艱難議給腳費又糜公帑嗣後除存留本屬支用米數仍照舊徴收本色外其應撥米數自七年為始改徴折色每石折銀一兩解交不敷州縣折給兵丁倘遇米貴之年察明請旨八年題準四川打箭爐口外番糧専責明正土司徴解又議準甘肅階州所屬之南平石門二里民地並額徴地丁銀二百九十兩六分遇閏加銀二兩四錢五分歸并附近之西固同知徴解報銷又覆準奉天府所屬遼陽復海城蓋平等州縣共收岫巖地三百四十頃八十八畝一分又遼陽蓋州徴收鳳凰城民地並附近岫巖地共六百二十二頃二十五畝九分皆離城遙逺小民納米挽運維艱自雍正八年為始改徴折色確察地畝科條分别上中下三則徴收報銷九年題準陜西更名錢糧地畝散處各州縣向繫糧道徴收銀解藩庫糧給兵食納戶零星不能親身赴省多繫戶首包攬勒派又屯衛撥運及民地項下存留之糧雖繫州縣徴收仍由民運均與民不便準其於所屬之州縣徴收運解其咸陽等州縣應需運價於耗糧折徴銀內支給長武等州縣準其每石折銀一兩不敷豌豆於糧道折收銀內採買支給不敷之米令咸長二縣於糶三榖內碾米支給秋收後將所收之銀買榖運倉又題準山東邱縣五營地方大糧寄莊地二百四十八頃五十畝八分零額徴銀九百十有八兩四錢六分零本色米並麥改米二百四十七石五斗三升零遇閏月應徴銀七分六釐零米六斗七升零又學田地三十三畝二分零應徴銀二兩六錢五分有竒自雍正九年為始改歸直𨽻廣平縣管轄照額徴收報銷又題準四川打箭爐口外化林協標兌給兵糧歸於雅州府同知督催兑支十年題準廣西思明土府江洲憑祥上下石西各土州羅白土縣上下二龍司額徴銀糧自雍正十年為始改歸附近之太平府徴解其各土屬流官俸工亦赴太平府支領利州銀糧亦自雍正十年為始改歸附近之泗城府徴解報銷十一年題準江南江寧府官基地租額徴銀豆屬上元者歸上元縣徴收屬江寧者歸江寧縣徴收十三年題準廣西鎮安府屬之小鎮安所轄民田五頃七十九畝零歸歸順州就近管轄每年應徴銀糧照數徴收解司充餉又題準奉天府所屬復州之復盛復寧復古三社地二萬一千一百八十六畝應徴糧米島居之民挽運甚艱改徴銀四百四十四兩九錢零寧海所屬之積金社地八千一百三十四畝應徴糧米向附於别社徴輸今改徴銀一百七十兩八錢有竒乾隆元年覆準福建寺田有繫官掌者其租原以四分給僧養贍六分歸官代僧納糧今將寺田全歸僧收停止官掌每畝應徴銀二錢即向僧人催徴造册報銷又題準福建福州興化泉州漳州延平建寧汀州福寧等府同知通判所徴屯田共銀萬三千七百九十九兩有竒米萬二千二十二石內汀州府同知額徴屯田有江西信豐縣寄莊屯田屯丁銀五百四十三兩七錢八分改歸江西信豐縣徴解其餘屯田各勘明田畝坐落之州縣自乾隆元年為始就近分歸各州縣徴收報銷如有田歸民耕而仍列故軍老戶者即改正的名按戶催輸二年題準直𨽻河間府經歷徴收河間等州縣屯米支給兵糧改歸各州縣就近徴收又題準盛京所屬原納紅册地今丈出餘地除復州金州鳳凰城原徴粟米及盛京倉應徴草豆每年供應三陵祭祀牲牢動用草豆毋庸改徴外其熊嶽岫巖蓋州等處並無支用草豆令改徴粟米開原遼陽錦州義州寧逺等處除撥給各處站草四萬四千九百餘束外餘均改徴粟米每豆一斗改徴粟米一升草一束改徴粟米五合又奏準江寧京口駐防官應支俸內白米向繫蘇松二府編徴解給民間輸納白糧費用繁重嗣後改徴漕米所需白米酌減以粳米抵給並存撥别營兵米一槩改徴粳米照例解赴扺給三年題準山東邱縣五營地方改歸直𨽻廣平縣管轄額徴漕米並遇閏月應徴之米直屬向無漕運照山東漕折定例自乾隆三年為始歸入地糧項下徴解司庫造報又題準浙江改折顔料蠟茶絲等項自乾隆三年為始遵照見今估定價直於開徴前纂入由單頒發催輸照則完納仍將各款價直編纂全書更正開載五年題準江南安徽所屬之石埭縣撥徴兵米二百十有九石六斗田戶竒零輸納維艱改隨丁地折徴解司其兵米仍於貴池縣南米項下撥給又題準浙江錢塘江入海之處兩山夾峙一為南大亹一為中小亹兩亹之中漲出沙地九百三十頃五十八畝一分六釐原與海寧縣地界毗連應徴租銀悉歸海寧縣徴收造報七年題準陜西甘肅所屬之慶陽衛額徴粟米地畝多在髙山坡坎之間可種粟米者僅十之一二其餘止堪樹藝麥豆屯民易米完賦不免虧折跋涉之苦而甘肅兵民又好食麥豆嗣後將米一斗改徴粟米二升麥四升豆一升又題準江南每年額解江寧府折色南豆萬五千二百四十四石二斗八升有竒以供駐防織造官兵秣馬之用令將安徽所屬之當塗蕪湖二縣額徴南豆每石折銀一兩一錢宣城涇貴池銅陵東流五縣並江蘇所屬之上元江寧句容溧水髙淳額徴南豆每石折銀一兩二錢溧陽額徴南豆每石折銀一兩一錢七分共徴豆銀萬八千五十六兩四錢八分七釐秋成委官購買運倉支給餘銀存貯司庫造報一催科禁例順治元年題準官吏徴收錢糧私加火耗者以犯贓論二年題準各官蒞任鋪設銀嚴行禁革違者究治九年覆準直省錢糧應按期徴解有豫徴滋擾者督撫指參十年題準州縣官不許用孤貧衙役恃老行凶下鄉催徴十二年詔各地方錢糧凡橫斂私徴暗加火耗荒田逃戶灑派包賠非時豫借等弊嚴行禁革違者督撫紏參又覆準江南財賦繁多經收諸役包攬侵漁保長歇家朋比剝民令嚴行察訪勒石永禁十五年覆準文武鄉紳進士舉人貢監生貟及衙役有拖欠錢糧者各按分數多寡分别治罪如州縣官徇庇督撫題參督撫容隱科道糾劾十六年覆準民抗田賦逃竄隔屬許本管官申請府道徑行票提如有阻撓督撫究處又覆準有司藉稱徴糧令里中僉報大戶派納銀米傾蕩家産又於正額外立常例名色私斂厲民者嚴行禁革十七年覆準有司私派里中奉承上司凡日用薪米修造衙門供應家具禮物及募夫馬民壯侵蝕婪飽等弊通飭嚴禁又題準州縣奏銷時注明紳襟衙役所欠分數造册申報督撫題參以懲積玩又題準江南紳襟有本戶並無田土他人假冒立戶者有錢糧已完吏役溷開者果屬寃抑許訴理開復經手官役及院司道府分别議處康熙三年題準州縣官徴收錢糧將已完者那用揑稱民欠並加派私徴者革職提問該管之司道府徇隱不報者革職若已經詳報督撫徇縱不參者降五級調用又覆準州縣錢糧上司動用差提名為提手種種需索行令嚴禁四年題準州縣官額外科斂上司徇隱不報許里長甲首小民據實控告五年覆準徴催錢糧原繫州縣印官専責不得濫委府佐及州縣協徴滋擾如道府私委督撫指參督撫濫委科道糾劾六年覆準直省正賦皆有定額地方官遇有别項輒令設法名為設法實則加科嗣後設法名色永行禁止又題準直省錢糧款項咨題違錯駮令覆核在外各官每藉名部駮私斂百姓並衙役侵擾情弊責督撫糾參八年覆準嚴禁知府親至州縣徴糧以杜供應需索之弊十二年覆準州縣應徴錢糧許司道行文立限催提不得差役擾害十五年題準州縣火耗加派被旁人首告經司道府官審出其失察之罪免議十七年議準州縣官藉造册為名收取費用科斂纍民及任意灑派補庫變賣倉糧甚且藉稱錢糧準算部民子女轉送與人者革職提問該管司道府隱匿不報或已申報督撫不題參者皆照不參私派例處分又覆準州縣官剋取火耗加派私徴及司道府徇隱不報者皆革職提問徇縱不參之督撫革職又覆準州縣官隔年豫徴錢糧照私徴例治罪司道府明知不報或已申報督撫不題參者皆照例議處十八年覆準小民完糧州縣官不給印票照私徴例治罪司道府隱匿不報或已申報督撫不題參者皆照例處分二十九年題準山東紳襟戶下地畝不應差徭遂有姦猾百姓將地畝詭寄紳襟戶下因而衙役兵丁效尤免差更有紳襟包攬錢糧將地丁銀米包收代納耗羡盡入私橐官民皆纍令照欺隱田畝例通限兩月將從前詭寄地畝盡行退歸業戶其紳襟本名下田畝令各具並無詭寄甘結存案三十五年覆準湖南陋習里甲之中分别大戶小戶其大戶將小戶任意欺壓錢糧皆大戶收取不容小戶自封投匱甚且驅使服役嗣後小戶令出大戶之甲别立里甲造册編定親身納糧如有包攬抗糧勒索加派等弊該督撫題參治罪三十九年題準直省府州縣陋規雜派有遇差役因公濟私以一派十者有年節派送禮儀者有郡守之交際派之各屬者有府縣衛所官出門中火路費及跟役食用派之里民者有上官差使往來派送規禮下程者有起解餉銀派出解費者又道府有開徴奏銷之陋規徴漕有監兊下縣及差人坐催之規例凡此陋習一概革除又題準徴收錢糧有公然科斂者闔邑通里共攤同出名曰軟擡各里各甲輪流獨當名曰硬馱姦胥土豪包攬分肥苦纍小民皆勒石永禁雍正二年諭百姓完納錢糧當令糧民戶戶到官不許里長甲頭巧立名色希圖侵蝕聞有不肖生貟監生本身原無多糧倚恃一襟輒敢包攬同姓錢糧以為已糧秀才自稱儒戶監生自稱官戶每當地丁漕糧徴收之時遲延拖欠不即輸納通都大邑固多而山僻小邑尤甚該督撫立即嚴察曉諭糧戶除去儒戶官戶名目如再有頑抗生監即行重處毋得姑徇倘有瞻顧不力革此弊者或科道官參劾或被旁人告發必治以重罪欽此又議準直省督撫嚴飭州縣官凡供應上司藉端橫斂一應陋規盡行革除倘仍蹈前轍督撫指參按律處分又議準地方官徴收田賦令酌量銀數多寡擇信實銀匠數人連名互保聽民投鋪傾銷不許包攬如有不肖州縣設立當官銀匠藉官纍民者嚴行禁止並除承充陋規如有包攬需索等弊本官失察即行題參三年議準直省督撫通飭各屬嚴禁州縣官收取蠹書禮物縱容勒索票錢犯者督撫指參州縣官以犯贓論胥吏從重治罪五年議準貢監生員非本身錢糧包攬代納入已以致拖欠者不論分數均黜革治罪若包攬拖欠至八十兩者計贓以枉法論其包攬雖無拖欠亦即黜革再照所納之數追罰一半入官至愚民希圖自便聽人攬納者照不應重律治罪仍追包攬之數入官其不行察出之該管官罰俸一年又覆準江南各州縣經徴積弊每開徴時於經承中僉點一名為總書皆繫姦胥承充行令該督撫將總書名色革去選擇書辦十數人分圖管理每圖每甲設立印簿二本令花戶自注完納於每限下以杜隱閣飛灑之弊其每年帶徴錢糧限三月徹底清釐刋示曉諭六年覆準紳襟應納之糧於印簿及串票內注明紳襟某人字樣按限催比奏銷時將所欠分數逐戶開出别册詳報照紳襟抗糧例治罪如州縣不列册詳報照徇庇例議處又議準各標目兵抗賦州縣官將未完數目開明移會本管官辨追完交解如不實力催追照州縣徴收錢糧未完例議處又覆準上司書吏抗賦州縣一面詳報一面嚴拘革役追比如本管上司阿庇袒護及州縣瞻徇皆照徇庇例議處八年議準文武生員貢監生應納錢糧數目令州縣别造一册送學臣鈐印頒發每完若干照數注明按季申送察核乾隆元年題準州縣收納錢糧務照定例令納戶包封自投入匱不許收書一涉其手如有姦胥違例留包偷取情弊該管府州即揭報題參四年諭廣東徴收糧米支給本省兵食民間因名為兵米聞向來州縣官皆折收銀每一倉石照時價多收銀六七錢至加倍不等收銀之後另買稻榖碾米給兵其買榖或派富戶或派米鋪每石又照時價短發一錢或數分不等甚至有富家希圖結交因事請託並不領價者似此一出一入之間多收少發小民何堪賠纍之苦即云遙逺之地折色徴銀亦可免其輸將量議加增以為運腳亦民所樂從然藉端需索為數太多則事之必不可者著該督撫悉心察禁務令公平辦理倘有仍前滋弊者即行嚴參毋得姑容欽此六年諭朕向來聞得廣東徴收糧米支給本省兵糧者州縣官折收銀每一倉石照時價多收銀六七錢至加倍不等收銀之後另買稻榖碾米給兵則分派富戶米行又照時價短少似此需索扣剋甚屬纍民特於乾隆四年六月頒發諭旨令該督撫悉心稽察嚴行禁革今留心訪察廣東徴收銀米之弊並未革除收本色則浮加斛面收折色則髙擡價銀以及管倉家人倉書斗級各項陋規合算民間納米每石費至加倍有餘且上司衙門所用食米名曰發價其實繳還種種弊端上下朦溷從前奉行不實之咎誠屬難逭若非嚴加整頓何以除民困於將來著交與巡撫徹底清釐實心辦理務令弊端悉剔苛纍永蠲始於地方有益如再有玩忽則咎在該撫欽此又諭國家愛飬黎元莫先於輕徭薄賦朕御極以來加惠閭閻凡所以厚其生計而除其弊端者無不留心體察次第舉行近聞各州縣徴糧一事尚有巧取纍民之處每至開徴之際設立滾單將花戶姓名及應完條銀數目開列單內散給鄉民原使鄉民易知得以照數完納前人立法本善而無如姦書蠹役日久弊生視各戶銀數之多寡於額糧之外或多開數錢至數分不等鄉民多不識字且自知糧額者甚少既見為官府所開遂照數完納即有自能核算者又以浮開為數無幾不肯赴官控告結怨吏胥且恐匍匐公庭廢時失業往往隱忍不言勉強輸納其多收之銀或繫書役先將别戶錢糧侵收那用而以此彌補其數或通縣錢糧正額業經報完而於捲尾之時兜收入己更有不肖有司暗中俵分以飽私橐其申送上司册籍則仍是按額造報並無浮多至於一州縣滾單之多動以萬計而上司難以稽察無從發覺其為民間之害固不減於重耗也朕聞此弊各省有之而江浙為尤甚用是特頒此旨通行曉諭是在各省督撫仰體朕心時加訪察如有仍蹈此弊者即行嚴參不稍寬貸則官吏不得假公行私而小民共受其惠矣欽此欽定大清會典則例卷三十六
