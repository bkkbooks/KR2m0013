body:
  text: 都察院五一巡城職掌順治十年議準令五城御史各率所屬辦理地方之事釐剔姦弊整頓風俗十三年覆準京城內鬭毆錢債等細事如原告被告皆旗人則送部審理如與民互告仍聽五城審結十六年題準京師內外十六門令巡城御史不時巡察康熙十一年題準五城辭訟御史竟行審結徒罪以上送刑部一司坊分理康熙年間定五城兵馬司指揮副指揮吏目専司京城詰緝逃盜稽察姦宄等事又定凡緝賊捕逃禁約賭博驅逐匪類稽察妄造謠言及衙役指官嚇詐私開煤窰糾夥燒炭以至邪教惑人聚衆燒香寺院庵觀坊店等處皆令該司坊等時加巡察四十五年覆準五城副指揮吏目繫佐二官除逃人盜案照舊管理其餘民間辭訟非奉該城御史批發正印官移行不得凖理動刑倘有擅準民辭暨拘禁濫刑縱役索詐等弊該城御史糾參照例議處雍正元年覆準司坊官員不許收受民辭該城御史亦不許批審辭訟又定五城兵馬司職司稽察京城姦宄人命案件以指揮管理逃盜等件以副指揮吏目分地管理中城副指揮管理中西坊吏目管理中東坊東城副指揮管理崇南坊吏目管理朝陽坊南城副指揮管理東南坊吏目管理正東坊西城副指揮管理宣南坊吏目管理關外坊北城副指揮管理日南坊吏目管理靈中坊乾隆元年奏準從前曾經定例五城司坊官槩不許收受民辭該城御史亦不許批審辭訟惟鬭毆賭博司坊官隨到隨審因而司坊官於地方事件槩不準理雖人命盜賊尸親事主迫切投訴亦不審究必待御史飭委始行相驗緝拏需延時日凶身正賊多有逺揚未免貽誤地方事件嗣後人命案件仍令指揮管理盜賊案件仍令副指揮吏目按地分理該司坊遇有尸親事主呈報者即行收受一面詳報該城御史一面親往相驗踏勘其本案人犯即凖察拏審明解院不得遲延時日如有推諉遲誤及藉端滋擾等弊令該城御史參處其逃人土娼責該坊官按地稽察一經告發準其收受緝拏至賭博鬭毆等件該坊官於所屬地方固宜隨拏隨審即别城隔屬塗行夜巡但遇酗酒罵街角口厮打開場賭錢小綹竊物等事隨見隨拏移交該管坊官審理不得以地非所屬過而不問至民間一應辭訟仍遵定例不許擅受皆歸該城御史審理十一年奏準民間房屋債負經該城批發事件該坊録取供辭報明本城結案一事件期限康熙五十八年題準兵馬司案件職分應管之事隨到隨審定限五日內完結詳報本院半月一次注銷若將案件叢積遲延不於限內完結或有縱役訛詐等事由院察參一五城地界雍正五年覆準凡城內地方分隸五城者或憑以牆垣屋址或憑以胡同曲折猶可細按基址劃明界限至城外鄉村與州縣接壤者地勢遼濶雖有四址册可稽但未建立界牌難為憑據一遇命案事件往往互相推諉令五城將城內所轄地方舊有基址界限者再行清理按界分管其所轄城外鄉村與州縣接壤之處按舊造四址清册公同勘定建立界牌以垂永久奉旨城內舊址界限著五城御史察勘建立界牌其城外與州縣接壤之處著巡視直𨽻三路御史於各該管處察明勘定建立界牌十二年定五城交界地方犬牙相錯五城官員會同清理釘設木牌分别交界乾隆二年議準東南西北四城並大興宛平通昌平各州縣令會同確勘劃清界址彼此核對建立石碑仍將四至處所造册繪圖呈送戶刑二部及本院存案至各城犬牙相錯之處均應分立界址其街道寬者亦建立石碑其衢巷狹者仍設木牌中城中西坊地界內城自長安左門居中起迤東至王府大街止街北繫中西坊所轄街南繫南城交界自王府大街北口起至兵馬司胡同東口止街西繫中西坊所轄街東繫東城交界自兵馬司胡同東口起至南鑼鼓巷西口止街南繫中西坊所轄街北繫北城交界自帽兒胡同西口起至大石橋西口止街南繫中西坊所轄街北繫北城交界自大石橋北口起至地安門止街東繫中西坊所轄街西繫中東坊交界自地安門居中起至東華門並小南城一帶地方路東繫中西坊所轄路西繫中東坊交界外城第一鋪東自西月牆起至正陽門大街與中東坊交界南至珠子市與二鋪交界西自西河沿至關帝廟止與北城交界北至正陽門大城牆止第二鋪東自正陽門大街與中東坊交界南至珠市口大街與三鋪交界西至觀音寺前與北城交界北至珠子市與一鋪交界第三鋪東至珠市口大街與南城交界南至永定門城牆止西至石頭胡同與北城交界北至清風巷火神廟以西與北城交界中東坊地界內城自地安門日中坊橋起往南至景山後街中分界西繫中東坊所轄東繫中西坊交界自長安右門外起至瞻雲坊南北大街止街中分界北繫中東坊所轄南繫南城交界自長安大街西口外瞻雲坊起至護國寺西口外止街中分界東繫中東坊所轄西繫西城交界自護國寺西口起迤東至定府大街龍頭井三座橋並地安門外日中坊橋止南繫中東坊所轄北繫西北兩城交界外城第一鋪東自打磨厰長巷上二條胡同北口外起至東河沿四間樓柵闌止與二鋪交界南自小夾道起往北至城牆根止西自正陽門東門外城牆迤東第二垜止與二鋪交界北自正陽門東門大街甬道中起至小夾道止與三鋪交界第二鋪東自蕭公堂起至東河沿南城交界碑止與第一鋪交界南自南蘆草園起至三里河大街中止與南城交界西自正陽門東門外城墻第二垜起至第四垜止與南城交界北自鑾慶胡同起至玉金樓火神廟止與三鋪交界第三鋪東自草厰頭條胡同起至小席兒胡同止與二鋪交界南自東珠市口起迤北至大街路東小夾道止與一鋪交界西自豆腐巷起往東至元帝廟止與二鋪交界北自小夾道起至小蔣家胡同止東城崇南坊地界內城東至城牆止南至崇文門止西至王府