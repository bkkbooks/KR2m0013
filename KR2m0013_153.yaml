以啓弊竇其果繫鬬殺故殺謀殺等項當檢驗者在京委刑部司官及五城兵馬司務須於未檢驗之先即詳鞫尸親左證凶犯人等令其實招以何物傷何致命之處立為一案隨即親詣尸所督令仵作如法檢報定執要害致命去處細驗其圓長斜正青赤分寸果否繫某物所傷公同一干人衆質對明白各情輸服然後成招或有尸久發變青赤顔色亦須詳辨不許聽憑仵作溷報毆傷輒擬償抵其仵作受賄增減傷痕扶同尸狀以成寃獄審繫受贓者依律科斷四年諭律載鬬毆成傷定有保辜之限所以重民命而慎刑罰也聞京城內外鬬毆傷人者各該地方步軍無分輕重即將兩造並拘解審大凡被毆之人受傷雖重尚可醫救一經移動勞頓冒風或至殞命嗣後應分别傷痕之輕重若傷不能行動者禁止移動勒令即時調治著問刑衙門委官親詣驗看其應如何定例通行著三法司議奏欽此遵旨議準嗣後京城內外有鬬毆傷輕者照例送理刑衙門審斷其傷重不能移動者或在衙門控告或被步軍拏獲惟將毆人之犯拏送理刑衙門該衙門即委官帶領仵作親詣驗傷取供定限保辜所有被傷之人擡赴衙門驗傷永行禁止違者將該管官參處十一年題準五城關廂內外地方有旗民之分向例凡遇人命旗地則領催報佐領轉報刑部委官相驗民地則總甲報該城御史委指揮相驗往往領催總甲互相推諉遲延不報以致傷痕難驗凶犯逺揚嗣後遇有人命如繫旗地令領催呈報民地令總甲呈報倘遲延不報將該管之領催總甲照地界內有死人不申報官司律治罪如已報而佐領指揮互相推諉將該管官照推諉事件例議處又定正陽崇文宣武三門內五城分管地方如有民間命案各設總甲一名呈報其身死有無傷痕刑部票委該司檢驗鬬毆活傷則委該坊官看驗倘驗報不實將該司坊官照例參處又定凡五城地方除倒卧身死無傷者許兵馬司驗詳立案掩埋外如有受傷身死無名之人令五城兩縣該管各官一面報部一面緝拏即詳開年貌服色多張告示招人認識設立首報賞格務期弋獲以初報官之日為始扣限一年緝凶如限滿不獲將該司照緝凶不力例參處如日後察繫盜殺仍照京城盜案例參劾議處乾隆六年奏準嗣後五城受傷身死無名之案一經具文報部即令該司嚴緝凶犯並通行各衙門協緝如一年限滿不獲將該司參處十三年奏準向例內城地方旗人遇有命案本家稟明佐領呈報刑部相驗街道遇有命案不分旗民由步軍尉呈報步軍統領轉咨刑部票委該城指揮相驗外城地方有旗民之分遇有命案旗地則由地主或尸親尋覔領催呈報佐領轉報刑部票委該城指揮相驗民地則由總甲呈報該城指揮相驗是外城命案總繫該指揮相驗秪因分别旗民輾轉咨呈稽延時日設遇凶傷謀害重案久延時日不特傷痕難驗亦且凶犯逺揚嗣後凡外城命案不分旗地民地均令總甲呈報該城指揮立即相驗一面呈報該城轉報刑部都察院如繫旗人則一面呈報該旗照定例分别辦理十四年諭向來通緝之案不過行文出票便為了事凶徒潛居坊巷從無過問並未實力察拏京都地大物衆萬方輻輳情偽多端地方官承緝處分自不能過嚴但盜案為首或命案正凶必應治罪之犯不當任其逺揚嗣後發保脫逃及承緝限滿作何議處能緝獲者作何議敘該部定議具奏欽此遵旨議準五城命盜重犯一經拏獲雖未審擬理應羈禁原不應令其取保以致脫逃至脫逃後承緝之司坊官以例無處分並不實力察拏各城司坊官及鄰近州縣又視為通緝之案雖能拏獲例無議敘遂致彼此因循姦匪漏網嗣後五城命盜要犯除未經到案在逃共承緝原定有處分外其拏獲到案尚未審擬不行羈禁擅行發保未經脫逃者將該司坊官罰俸一年因而脫逃者降一級留任限一年緝拏如限內拏獲者開復限滿不獲者照所降之級調用逃犯交與接任官勒限一年緝拏限內拏獲者紀録一次限滿不獲者罰俸一年逃犯照案緝拏如别城及鄰近州縣官有能拏獲者每名紀録一次一盜案康熙四十一年覆準正陽崇文宣武三門關廂內被盜文職兵馬司副指揮吏目皆降二級留任罰俸一年限一年內緝獲全獲者開復不獲者降三級調用交與接任官緝賊雍正三年奏準正陽崇文宣武三門關廂內被盜文職兵馬司官交部降罰賊犯限一年緝拏全獲者開復獲半者免議不及半者仍照定例議處乾隆六年奏準凡五城三營地方被盜應令彼此關會便於協緝嗣後以被盜報官之日為始勒限三月緝拏如限內不獲將文武官辨合疏題參又定凡刑部見審內行文五城察拏之案如關繫偷盜倉庫錢糧並隱匿緊要重犯即於文內加注要犯勒限緝拏字樣該司坊於文到之日按限緝拏如限滿不獲照京城定例議處其餘尋常命盜行文察拏之案如限滿不獲照外省定例議處均令該城御史呈報都察院咨部題參倘該城御史不行呈報經刑部都察院察出將該御史題參一并議處一竊案凡五城坊官在汛地所管之處若被竊賊偷有實據賊被旁人拏獲或事主有受傷實據者將該坊官罰俸三月雍正十一年議凖向來拏獲竊盜呈報該坊官並未定有限期是以捕役得以藉端勒索稽延時日嗣後司坊捕役本日拏獲竊盜即令本日呈報該坊官如晚間拏獲限次日早間呈報該坊官訊明被竊情由將事主年貌姓名住址及所失贓物詳細注册即令寧家不必一同解送該城御史研訊贓物行竊情由察明册籍出示曉諭令事主親身赴該坊照數認領如訊問事主有應追贓物或有夥盜未能全獲者問明事主將贓物詳細注册即令事主寧家俟察明追出贓物再行出示令事主認領至竊盜有應完結者即照例完結有應送部者即送部審訊治罪倘捕役違限不即呈報任意勒索事主許事主赴都察院呈告照恐嚇取財例治罪其坊官失察及縱容者分别議處乾隆三年議準五城坊官如有縱容捕役養賊及苦纍事主等弊或經該城核參或被事主告發審實將該坊官照溺職例革職該捕役照養竊分别名數治罪六年議準五城地方報竊該坊官立即親赴事主家驗明竊迹確察失單勒捕迅速訪拏仍報明本城並都察院立案比緝即於本日密行知會各城坊官協緝如别城捕役能於十日內人贓並獲並三案以上者令本城坊官量加奬勵如别城竊賊潛匿該地方該役不實力協拏及明知故縱者分别責懲七年議準五城地方被竊令事主報明本城並報明該管將辨立即選飭兵丁嚴緝仍移會各營協緝八年議準五城竊案以報官之日為始勒限四月緝拏如限內不獲該城參奏送部議處十四年議凖五城竊案既經事主呈報該坊官如有隱諱不行詳報該城御史核參降一級留任竊犯限六月緝拏限內拏獲者準其開復限滿不獲者降一級調用竊犯交與接任官照案緝拏其有事主未報别經發覺者免其諱竊處分仍於發覺之日為始將未獲賊犯限六月緝拏限滿不獲罰俸三月竊犯照案緝拏如賊已拏獲者免議一發塜之案凡五城地方開棺見尸者以報官之日為始勒限六月緝拏如限內不獲由院核參送部議處欽定大清會典則例卷一百四十九
