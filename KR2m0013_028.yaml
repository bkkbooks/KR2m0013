  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_028-1a, image: WYG0620/WYG0620-0469a.png}
body:
  text: 吏部考功清吏司斷獄一用刑違式順治十八年議凖凡問刑衙門於獄內用柙牀者革職交部治罪康熙九年題準官員將犯人除夾棍拶指之外别用非刑者革職如將婦女用夾棍者亦革職該管上司不察實具報者降二級調用督撫不行題參者降一級留任犯婦有孕亦不得用拶指違者降一級調用該管上司不察實具報者罰俸一年督撫罰俸六月又官員將旗人擅自夾責者降一級調用又題準官員將絞罪犯人誤斬者降二級調用將應監候秋決正法人犯即行正法者降四級調用如將立決人犯於停刑之日違例處決者罰俸六月十一年議準審問小事不準用夾棍內外審事官員若將應夾案內罪不致死之人被夾即死者罰俸一年將不應夾訊之人擅行夾訊者降一級留任被夾之人即死者降三級調用恣意疊夾致死者革職若有别項情由照情由議罪若將不應夾訊之人回堂行夾堂官不行詳愼輕聽夾訊者罰俸六月十四年奏準官員將監禁重犯秋審不行解送或已經解送道路遲延以致秋決愆期者府州縣官降一級調用司道罰俸一年督撫罰俸六月四十五年覆準五城副指揮吏目除逃人盜案照舊管理外其一切民辭非奉御史批發正印官移行不得即行準理動用刑法倘有擅準民辭及拘禁濫刑縱役索詐等弊照例議處雍正七年議準各省督撫設立印簿分發各問刑衙門將某案某人因何事用夾刑及用刑次數逐細填注簿內於年終申繳督撫衙門詳察若有濫用夾棍及用多報少情弊察出指參將濫用夾棍之員照將不應夾之人行夾例降一級留任將用多報少之員照朦溷造册例降一級調用十一年議準凡姦匪將各種避刑邪術私相傳授學習者地方官不行察拏照不禁止邪教例降一級調用乾隆元年議準凡內外問刑衙門所用刑具務皆按照定例式樣製造其在外各省州縣令該管道府遇赴州縣盤察時將所用刑具詳加察驗倘有違例造用者即詳揭題參將州縣官照擅用非刑例革職如道府不行詳揭發覺一並題參將道府照不察實具報例降二級調用督撫失於察參經科道糾參將督撫照失於覺察例罰俸一年如道府已經詳揭而該督撫徇隱不行參奏者將督撫照徇情例降二級調用在京衙門如有不遵定例式樣任意造用者將用刑官照州縣例議處該管官失於察參者照督撫例罰俸一年如該管官明知徇隱不行察參者亦照徇情例處分至強盜及十惡謀殺故殺等案重犯仍照例用鐵鎖扭鐐各三道其餘鬭毆人命等案罪犯以及軍流徒罪等犯皆止用鐵鎖扭鐐各一道笞杖等犯止用鐵鎖倘有違例濫用即行題參交部議處一京城承審事件順治初年定刑部見審案內如繫杖枷等罪限十日完結發遣軍犯等罪應入彙題者限二十日完結命盜等案應會同三法司審理者限三十日完結如案內有應行提質人犯準其傳提到案之日扣限若正犯患病準以病愈之日扣限倘該司官任意因循或三法司官員不即會審以致逾限其承審司官及會審遲延之員令該堂官察明分别交部照例議處再見審案件審結之日除應行監禁人犯照例監禁外餘皆即行發落倘有遲延不行發落以致人犯淹禁書役作弊者除書役照例治罪外承審之該司官亦交部議處康熙三十二年議準凡行提控告案內人犯咨行八旗並總管內務府行提於文到之日即行送部若越二日不行送部者將該管官交部議處若行提莊屯居住人等及行直隸府州縣等處提人者每日定限五十里以文到五日內起解若不照限申解將該管官題參或有别故詳開報部其到部事件在京畿地內者限一月審結在外者以被證到齊日為始限一月審結如有內外移咨詢問者以回文到日為始若刑部司官將應速結案件不行完結故意推諉遲延者堂官指名題參交部議處雍正元年議準凡見審事件其人文送部毋須又提犯證者限十日內説堂完結其提人質審四五日內到部毋庸會審者限半月內説堂完結若必須提人質審並三法司會審仍照定例一月限內完結又覆準五城司坊案件隨到隨審定限五日內完結詳報其巡城案件扣限十日內完結造册送都察院察核注銷若不每日進署將案件叢積遲延不於限內完結照欽部事件遲延例分别議處或有縱容衙役溷行訛詐等事一經察出或被受害人首告照衙役犯贓例分别議處又奏準司坊職守人命案件指揮管理竊盜案件副指揮吏目按地分理遇有尸親事主稟報者該司官即行收受一面詳報該城一面親往相驗踏勘其本案人犯即行拏審解院不得遲延時刻如有推諉遲延以致賊犯潛逃及藉端滋事拖纍平民等弊即將該司坊官照例參處其逃人土娼亦宜責該坊官按地分察一經告發準其收受緝拏至賭博打架則繫議明應管之事嗣後五城御史及該司坊官所屬地方有毆賭等件固宜隨拏隨審即别城隔屬塗行夜宿但遇酗酒罵街角口打架開場賭錢小綹竊物等事隨見隨拏移交該管衙門審理不得以地非所屬過而不問至民間一切辭訟仍遵定例不許擅受皆歸該城御史衙門審理五年議準前三門內五城分管地方除相驗人命及鬭毆活傷驗報不實等案仍將該管之各該司坊官照例參處外其賭博逃盜等案均免司坊官失察處分七年議準户部八旗司審理旗民房地家産主僕爭告之案亦照刑部見審之例限一月內完結如限內不完將承審官員照欽件違限例議處如有提人移詢之處俟人文到日扣限又議準秋審朝審九卿詹事科道務必每日到班若有要緊公事及偶有疾病不能到班者豫行知會將該員未到會審之省分事件不必列名每遇審期都察院委滿漢御史各一人稽察有無故不到者指名題參照推諉事件例罰俸一年八年諭兩三處衙門會議會審之案若一處曾經行催而他處尚不辦理即著行催之衙門具摺奏聞將來遲誤處分之時免其議處倘曾經行催而未奏聞者日後因遲延議處仍將該衙門一並交議倘奏聞之後以為既經具奏此後遲延與已無涉以致事件仍復擔閣者亦將該衙門一並議處著通行各旗各部院衙門知之欽此十三年奏準刑部凡有題咨案件其細小事情駮正者毋庸置議如各省將應擬重罪人犯竟令脫網或無辜之人羅織擬罪刑部司官細心察核駮行覆審果得實情者於呈堂行文之時即將定稿司官注册俟改正後於每年十二月具題交部議敘每一案紀録二次乾隆四年奏準凡旗人爭控户口田房等事於各該旗具呈該旗察明册籍訊明證左出具印甘各結將人文一並咨送户部詳審定擬完結如旗人控告民人者亦令於各該旗具呈民人控告旗人者即令於各該地方官處具呈令該管官取具原告確供並出具印甘各結轉詳咨送户部轉行被告之該管官秉公取具被告確供亦令出具印甘各結轉詳咨部户部詳核兩造確供分别曲直斷理完結如兩造匿情不吐彼此互異礙難斷理者即行提審會同刑部嚴訊定議其中或有因地畝界址不清必須兩造親身履畝互相勘對方能明晰者再將旗人押發州縣令該地方官會同該理事廳審明報部完結以上控告户口田房等事文移往返八旗咨文定限於一月內覆部直隸咨文定限於兩月內覆部如有逾限之處户部取其職名咨送本部兵部核參照欽部事件遲延例議處如該管官有抑勒徇隱等弊許受屈之人據實聲明赴部控告户部會同刑部嚴提審訊或繫該管官有意抑勒瞻徇抑或扶同依附之處察明參奏將有意抑勒瞻徇及扶同依附之員皆照會審事件偏袒不公例降二級調用若並無寃抑妄行控告者按其所誣情節交送刑部治罪十八年諭刑部議駮外省題達案件經督撫遵駮改正者司官得並邀議敘夫指駮案情必有首先立議之人乃將各官通行議敘其中隨同畫稿並學習額外之員均得濫邀敘録非核實之道且由刑曹升調别衙門者恃有加級紀録可以抵銷往往不肯認真勉力辦事因思吏部司官向因議處之案較多别部僅將承辦之滿漢司官各一人開送議處此雖非正例然以吏部議罰可以通刑部議敘其於考課之法方為平允嗣後刑部各司遇有因題駮議敘者著照此旨行欽此一外省承審事件雍正五年奏準官員承審事件命案限六月盜案限一年乾隆十五年奏準盜案改限十月欽部事件限四月發塜搶奪竊賊事件皆限六月乾隆十五年奏準皆改限四月其餘案件一切未經定有限期者皆扣限六月完結乾隆十五年奏準皆改限四月皆以人犯到案之日起限如有隔屬提人及行文詢問者以人文到日起限奉部交審事件以州縣奉文之日起限又奏準凡承審欽部一切事件其四月限者州縣限兩月解府州府州限一月解司司限二十日解督撫乾隆十年奏準改四月限者府州改限二十日解司督撫以二十日分别題咨完結命案六月限者州縣限三月解府州府州限一月半解司司限一月解督撫乾隆十五年奏準六月限者府州改限一月解司督撫限一月分别題咨完結盜案一年限者州縣限七月解府州府州限兩月解司司限一月半解督撫乾隆十五年奏準盜案改限十月州縣改限五月解府州督撫限以一月半分别題咨完結又議準承審命盜欽部事件二參限期亦令州縣限兩月解府州府州限一月解司司限二十日解督撫如逾此分限不能完結繫何官遲延該督撫察明題參即將何官照易結不結例議處乾隆十五年奏準府州改限二十日解司督撫限二十日分别題咨完結又奏準按察使司自理事件限一月完結府州縣自理事件限二十日審結上司批審事務限一月審報如有遲延該督撫察參又奏準官員審理命盜欽部案件如案內正犯及要證未獲情辭未得確實及等候提拏犯證或因隔省行察限內實難完結者承問官將此等情由申詳督撫題明展限至各省關取盜案口供或黠盜不吐實供希圖延案嗣後如有關取必須時日者許該地方官申詳督撫咨部展限又議準各省苗疆及邊逺地方官審理一切欽部命盜案件其初限準展限兩月續參之四月亦照初參展限兩月以通解府解司日期黔省分駐苗疆之州同州判承審案件由州解府者初參覆參均準其於展限兩月之外再展限一月展限兩月者州縣展限一月府州展限一月展限三月者州同州判展限一月府州各展限一月又覆準官員審理事件將人犯審解除臺灣瓊州各省苗疆已經定有展限之例者不準扣除程塗日期外其直省各州縣應核明各州縣至府州府州至省水陸程塗里數先行造册報部存案各州縣將人犯招解每日限行五十里遇有案件遲延與原定道里日期相符者令該督撫於限滿察參時聲明免其議處如解役中塗逗遛者除原限日期外仍不準扣除又議準地方案件有二限必不能完結者許該督撫於二參限滿題參時即將難結緣由疏內聲明將承審各官革職留任再限四月審結如再不能審結題參革任其應易結事件不得溷行題請展限仍照舊例遵行又奏準承審事件初參二參限內如州縣已經招解上司將屬官解到日期故為改遲或苛駮以致遲延許受抑屬官詳報督撫據實題參將故改日期上司照推諉事件例議處苛駮上司照事件應結而故為駮詰例議處屬官免議又議準州縣審理案件於二參限滿不結後無論難結易結將該管之府州職名一並開參如繫難結案件承審之州縣議以革職留任者將揭報之知府直隸州知州罰俸一年如繫易結不結承審之州縣議以革職並三限不能審結議以革任者將揭報之知府直隸州知州降一級留任如州縣官承審案件玩延不結知府直隸州知州並不揭報應照徇庇例降三級調用其知府直隸州知州自行