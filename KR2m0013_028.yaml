軍流徒罪發遣人犯或應本省發配或應解部發遣均以部文到日為始定限兩月起解路塗解送每日定限五十里如兩月內不速行發解者罰俸一年過一年者降一級調用未經行催之上司罰俸半年或將此等人犯兩月內不行發解以致斃獄者降一級調用將未經行催上司罰俸一年至各省審結案內應行解部之入官人口家産亦立限兩月自該省起解其解送人役亦定行程限期違者題參若官員將應解人犯錯解别處者罰俸六月又題準凡叛逆人犯及斬絞流徒笞杖等犯原解未交之先塗路脫逃者皆將原地方該管各官議處其起解之犯已經交與該府州縣脫逃者原地方官免議將承接府州縣該管各官議處其斬絞重犯不加肘鎖少差解役以致脫逃者降一級調用如軍流徒罪等犯不加肘鎖少差解役以致脫逃者罰俸一年逃犯皆照案緝拏如所差解役得重犯賄賂縱脫者將本官照衙役犯贓失於覺察例議處十四年議準官員將未經題結之軍流等犯先行發遣者降一級留任又議準官員將軍流徒罪人犯令人取保脫逃者降一級調用或該犯私回不行察出者罰俸一年如笞杖人犯脫逃者罰俸六月再官員如給軍流人犯出關印文或給執照者降四級調用二十五年議準凡軍流徒犯及免死減等流犯有祖父母父母老疾無倚家無以次成丁者如繫大宛兩縣民人該縣出結府尹確察報部如屬五城民人掌印兵馬司指揮出結巡城御史確察報部如屬外省民人州縣官出結司道府官轉詳督撫督撫確察報部如並無年老祖父母父母而稱為有實有以次成丁者而稱為無該管官不行察明出具印結將出結之官降二級調用轉詳之上司罰俸一年督撫罰俸六月如有此等人犯用財行賄出具印結將出結之官革職提問轉詳之上司降三級調用督撫降一級留任兵馬司照州縣例議處巡城御史順天府府尹照督撫例議處若地方官出結後上司復令察出或原官察出據實首送者免議雍正二年議準外省解犯及解京與京發之犯其情罪重大者於批牌之上注明此繫要犯應令官辨管押遞送字樣即從首先接遞處該千總等親身押送出境交代取收管存案若該州縣無設防之武辨則令吏目典史親身押送出境交代皆於取獲收管內注明某官某辨送交倘有疏虞該撫題參黜革其尋常解犯仍照定例選差押送又議準凡奉旨緝拏之重犯各省督撫及地方官務須嚴行緝拏解部如果所屬地方無獲亦並無人隱藏地方官於年終申報督撫奏聞仍令地方官出具印結報部存案若該地方官出具印結後被旁人首獲審出曾在某處隱藏某家將出具印結之該地方官革職知府直隸州知州降二級調用道員罰俸一年巡撫罰俸九月所有加級紀録槩不準抵銷若該地方各官未出具印結之前如有隱藏被旁人首告拏獲者將該管地方官降二級調用知府直隸州知州罰俸一年道員罰俸九月巡撫罰俸六月所有加級紀録亦不準抵銷如該管各官知情聽其隱藏者與罪人一例治罪如奉旨緝拏重犯該地方官盡心拏獲一名者即準加一級三年議準凡有斬絞重犯州縣官已加肘鎖多差解役脫逃者降一級限一年督緝限內全獲準其開復逾限不獲照所降之級調用至軍流徒罪等犯如已加肘鎖多差解役脫逃者罰俸六月逃犯皆照案緝拏又議準凡知府及直隸州知州所屬州縣若山海巨盜斬絞重犯中塗脫逃有一二案者罰俸九月三四案者罰俸一年五六案以上者降一級限一年催緝限內全獲準其開復逾限不獲照所降之級調用若笞杖徒流等犯中塗脫逃有一二案者罰俸三月三四案者罰俸六月五六案以上者住俸限一年催緝限內全獲準其開復逾限不獲降一級留任仍照案緝拏又奏準發回原籍安插並流徙充軍等犯有在中塗患病者即著該管地方官留養醫治內有隨行親屬病者亦準留養俟病痊起解將患病日期報部如不留養醫治以致病故一二名者將該地方官罰俸一年三四名降一級留任五六名以上降二級調用至凡解部及遞解外省人犯中塗患病原解即報該地方官驗明委繫患病出具印結如取結後病斃者其官役免議未取患病印結塗中斃一二名者將僉差之官罰俸一年三四名降一級留任五六名以上降二級調用四年議準滿洲蒙古漢軍之家奴犯軍流罪者止將本身發遣令該督撫酌發有駐汛辨兵之處給與兵丁為奴若發遣處將犯人疏脫者該管官照軍流人犯脫逃例議處有受賄縱放者照主守故縱受財律治罪五年遵旨議準凡遞回原籍交與地方官收管之犯果無生事出境該地方官於每年冬底出具印甘各結並將遞到人犯數目及有無生事出境之處一並造册報部察核若遞回人犯該地方官不嚴行管束致令脫逃出境者一名罰俸一月二三名罰俸三月四名至六名罰俸六月七名至九名罰俸九月十名以上者罰俸一年仍著落該地方官勒限一年緝拏如逾限不獲每一名罰俸三月四名以上罰俸一年十名以上降一級留任倘業已脫逃該地方官揑稱並未出境或遇别處發覺或被旁人首告將該地方官照溺職例革職該管上司知而不報照徇庇例議處又題準問擬徒罪之犯除順天府所屬州縣民人仍送該府尹衙門發配其餘各省民人皆遞回各該督撫衙門照伊原籍應發地方發配充徒年限滿日交與原籍地方官安插管束不許出境如該地方官管束不嚴致令脫逃出境者經别邑拏獲除將該犯照例治罪外將該管原籍地方官照遞回人犯出境例議處倘各該地方有容留潛住者事發將各該地方官亦照原籍地方官例處分又遵旨議準凡犯法後潛逃各犯其藏匿之窩家除不知情者仍照律免議外至若身繫職官而知情窩隱者除革職外仍照本犯原罪治罪不準折贖至於犯罪之人在於所屬境內藏匿地方官怠忽因循不實力稽察或被旁人首發或被鄰境官司拏獲將該地方官降一級留任如有屬官藏匿罪人該管上司不行察出揭參該管上司亦照此例議處六年議準民間辭訟不於犯事地方呈告則原告易駕虛辭而關提質審被告又易於抗延支飾嗣後户婚田土錢債鬭毆賭博等細事必令於犯事地方告理不得於原告所住之州縣呈告原籍之官亦槩不得濫準行關彼處之官亦不得據關文即為拘發違者將該地方官詳參濫準行關者罰俸一年據關拘發者罰俸六月如有於事犯之地方官處告準關提質審而彼處地方官匿犯不解者照徇庇例降三級調用又議準州縣遞解人犯點解之後或私行雇替或解役短少該管官皆不能覺察直待人犯脫逃而後嚴參究審已屬無及嗣後遞解人犯解到之州縣務將解差點驗如人數不足或有雇替情弊即令就近究明懲治倘解到之州縣瞻徇鄰封情面不行究懲或解至伊境內失囚與僉差不愼少差解役之員一並參處著落緝拏如起解地方官袒護衙役因解到之州縣懲責其差遂含怨致怒於鄰封者該督撫察訪有據即指名題參將袒護之員照徇庇例降三級調用又議準凡發遣人犯酌定名數分起解送如案內人犯衆多至五名以上者每五名作一起先後解送至起解時務必嚴加鎖銬倘解役人等受賄開放若轉解之該地方官因前塗未曾鎖銬不復稽察聽其散行將該地方官與前塗未曾鎖銬官皆按罪犯輕重照不加肘鎖脫逃例分别議處如解犯於經過處所辱官詐財生事不法州縣官隱匿不報者降二級調用該管各上司未經察出者罰俸一年若地方官已經申報而該管司道府不行揭報督撫不行題參者將該管司道府降二級調用督撫降一級調用其申報之州縣免議又遵旨議準凡軍流人犯單身逃遁者該管各官仍照例處分外如攜帶妻子脫逃者初參將該管官罰俸一年兼轄官罰俸六月皆勒限一年緝拏不行稽察之知府同知等官罰俸三月限滿不獲將該管官降一級留任緝獲之日準其開復兼轄官罰俸一年七年議準凡外省官員解送犯人到部限十日內給發批回倘於限內不行察收及不給發批回者該堂官即行題參將該司官照逾限例議處又議準凡律載應流之犯內如詐為制書詐傳詔旨偽造印信謀反叛逆強盜私鹽及左道妖言妄言煽惑商魚船夾帶違禁物件謀殺出使官吏漏泄機密事情採生折割毒藥殺人以藥迷人各等案內流犯皆屬情罪重大在配所脫逃者該管官及兼轄官除初參二參仍照原定例議處外於二參限滿之後再限一年緝拏限滿不獲繫單身脫逃之犯該管官二參罰俸一年者三參即降一級留任緝獲之日準其開復兼轄官二參罰俸六月者三參即罰俸一年繫攜帶妻子脫逃之犯該管官二參降一級留任者三參即降一級調用未獲逃犯交與接任官照案緝拏兼轄官二參罰俸一年者三參即降一級留任緝獲之日準其開復再此等重犯自配所脫逃或私回原籍或仍匿發遣地方其各該地方官原有緝拏之責按限緝獲止應免其處分至鄰境各官果能盡心協捕應豫議敘以示鼓勵嗣後重罪流犯脫逃於鄰境經過之處及潛匿之處各該地方官將單身脫逃之犯盤獲者每一名紀録一次將攜帶妻子脫逃之犯全獲者每一起紀録一次其餘别項流犯脫逃該管各官並原籍地方官仍照定例遵行又遵旨議準凡充發煙瘴之軍流人犯於解送之時安插之所犯人不服拘管或因約束過嚴以致輕生斃命者該督撫察明果無陵虐逼勒致死情弊取具印甘各結將地方官吏人等槩行免議如此等充發煙瘴軍流人犯於經過州縣及安插地方有妄行不法等事州縣官徇情故縱隱匿不報者降二級調用或有疏防脫逃者將該管官降一級留任限一年緝拏限內拏獲準其開復逾限不獲即照所降之級調用未獲逃犯交與接任官照案緝拏又議準隔屬提拏贓盜及命案內斬絞重犯而彼處地方官膜視隔屬重案鄉地鄰保袒護本地方民人以致姦徒得以肆行劫奪許提拏之地方官據實詳明督撫將縱劫之該地方官題參解任俟此案獲犯審明題結之日將解任之員出具考語咨送引見請旨開復如在隔省亦即詳明本省督撫移咨彼省督撫會疏題參將縱劫之地方官摘印解任俟此案犯人既獲審明題結之日方準將解任之員出具考語咨部引見請旨開復至於隔屬本無搶犯情弊而捕役賄縱揑稱被劫者除捕役照例治罪外其誤聽捕役揑稟以致將隔屬官詳揭題參者審明之日將原參之官即行開復將誤聽捕役之員照誤揭例降二級調用又議準各處免死減等發遣人犯從發遣處逃回其容留居住之房主繫官革職不行察拏之州縣官降一級罰俸一年該管知府直隸州知州各罰俸一年五城正指揮照知府議處副指揮照州縣官議處又議準盜案內凡地方官有向隔屬當鋪起贓當商或支飾不認或匿贓先勒當本其該管官袒護當商不即起出移解以致盜案遲延許承審官詳明該督撫將袒護之地方官題參照徇庇例降三級調用隔省者咨會題參亦照此例議處十三年議準凡軍流人犯到配交地方官收領令府廳嚴行稽察如有乘間脫逃者初參將專管官罰俸六月兼轄官罰俸三月皆限一年緝拏不行稽察之府廳罰俸三月限滿不獲專管官罰俸一年兼轄官罰俸六月軍犯飭發該衛著伍其出具收管之員即為專管官至管轄衛所之府廳若衛所已有兼轄官則府廳照統轄官例處分若知府繫兼轄之員則知府已照兼轄官例議以罰俸限緝其失於覺察之處例不重復議處毋庸再議止將該統轄廳員照例處分至軍流人犯到配除專管官不時稽察外仍令該印官每月將人犯點驗二次並造具年貌籍貫册結呈報府廳稽核如該印官不行點驗以致脫逃者將該印官罰俸一年若軍流人犯在配日久或交通官辨生事不法賄囑官吏潛逃無蹤該府廳據實察報止將州縣官分别參處該府廳免其核參若該府廳漫無覺察照失於覺察例罰俸一年並將任其交通之州縣等官照徇情例降二級調用又議準凡徒犯到配發驛收管仍令該印官不時稽察倘該驛官將徒犯私自役使印官即據實詳參將驛官罰俸九月至如徒犯脫逃初參將專管官罰俸六月兼轄官罰俸三月皆限一年緝拏限滿不獲專管官罰俸一年兼轄官罰俸六月有驛丞者以該驛丞為專管知縣為兼轄若該縣無驛丞繫知縣管理者以該知縣為專管知府為兼轄至該驛原有驛丞或因事故離任該縣知縣暫行兼管遇有疏脫將該縣知縣照一人兼兩任例就一任處分其兼轄職名毋庸開參再屬府轄之該驛丞應以知府為兼轄其知縣職名亦毋庸開報若徒犯倩人替代私自回籍該驛官受其賄囑私行縱放將該驛官革職治罪該印官覺察詳報者免議若並無覺察將該印官罰俸一年乾隆元年覆準軍流人犯之妻如有患病留養本犯先行發遣者其妻於病痊日補解時許親屬隨行以免中塗陵辱等弊再軍流人犯之妻如有年過六十以上本屬老病不能隨行及患病遂成篤廢不能補解者仍取具鄰族甘結該地方官勘驗明白加具印結將不能隨行及篤廢不能補解緣由申詳該上司應行報部者報部察核行文本犯遣所俾令知之倘有揑飾情弊將具結之親族里鄰照例治罪犯妻立即補解其不行詳察出結轉詳之地方官照謊報出結例降二級調用轉詳之上司罰俸一年又覆準各屬應拏人犯若果文武同心速行差緝罪犯自難越境潛蹤嗣後一應緝捕事務如文員先行訪知即移會武辨或武辨先行訪知即移會文員皆各遴選兵役合力協拏不得推諉如文員已移會武辨而武辨不即差兵協拏或武辨已移會文員而文員不即差役協拏者皆照遲延推諉例議處至如鄰邑他省沿邊沿海通緝人犯如於文到之後以隔屬岐視文員不移會武辨協拏者照申報盜案互相推諉例降一級調用或武辨不移會文員協拏者亦照此例議處再文武官辨不行移會協拏既定有議處如能實力緝獲亦當量事議敘如鄰邑官辨接到關文之後即能緝獲罪犯並他省沿邊沿海官辨於文到之後果能盤獲匪犯者皆照拏獲鄰境盜犯例每按二名紀録一次再兵役人等乘緝獲人犯最易藉端滋事倘有妄指平民騷擾索詐以及賄縱者依律從重治罪外其失察徇庇之該管官如繫知情故縱照縱役貪贓例革職若失於覺察仍照失察衙役犯贓例議處三年議準隔省關提人犯以文到日為始限四月拏解鄰封關提人犯限文到二十日拏解如無故逾限不發該地方官照事件遲延例逾限不及一月者罰俸三月逾限一月以上者罰俸一年聽信地保差役揑稱並無其人並久經外出以空文回覆不發人犯者該地方官照匿犯不解例降三級調用四年奏準凡遞回原籍無罪之人塗路脫逃者將僉差之員罰俸三月五年奏準凡軍流徒罪人犯在配脫逃有數案人犯同日脫逃者脫逃雖有數人地方官失於防範實繫一次應並案察議至一案內數人分為數日前後脫逃者脫逃日期既有不同地方官失於防範亦有數次按其脫逃次數計案議處又奏準番役拘拏罪犯雖無私拷情弊但不將該犯即行送官或關禁在廟或鎖繫在家私自取供後送本官者將私拷取供之番役照例治罪如該管官不行察究將該管官照失於覺察例罰俸一年六年覆準凡各衙門有差票事竣即宜察銷如差票不銷以致衙役持票恐嚇鄉民犯贓者將該管官照失察衙役犯贓例處分如衙役雖未犯贓將應銷差票遲延不銷該管官照事件遲延例分别議處又議準凡在京問擬笞杖枷責解回原籍人犯應令該地方官安插之後加意稽察管束無許出境生事如有復逃來京者除初次二次本犯仍遞回原籍安插免其治罪該地方官免其察參外其復逃來京至三次以上之怙終不悛之犯拏獲之日雖審無犯案亦按其原犯情罪之輕重分别懲責仍遞回原籍交與該地方官管束如再犯案從重歸結所有疏縱三次來京之地方官照遞回人犯出境例分别議處八年覆準凡軍流人犯除未經起解者六月照例停遣外已解至中塗如遇六月盛暑之時沿塗州縣即照例停遣不得遣令前往如到配將近及單身人犯自願前進者令該州縣訊取確供知會前塗一例接遞仍將該犯不願停遣緣由報部察核十年覆準凡外省罪應徒者除抵籍不逺即遇隆冬盛暑仍行遞解外其離原籍一千里以上者亦照軍流之例未經起解者槩行停解若已至中塗初冬十月經過地方照常接遞至十一月初一日一例停解俟次年春融再遞如已將至原籍訊明本犯情願前進者轉移前塗州縣接遞六月盛暑之時亦準留養倘地方官違例發解沿塗州縣濫行接遞者皆照應流人犯違例發遣例罰俸六月十三年遵旨議定地方官並營衛武職拏獲鄰境逃犯如繫軍流罪犯單身脫逃者每一名紀録一次攜帶妻子脫逃之犯全獲者每一起紀録一次其拏獲脫逃徒犯者二名紀録一次準其前後接算聲明議敘欽定大清會典則例卷二十五
