流齊集又奏準几筵前每日晨朝奠晡時夕奠日中午奠自齊集日為始王公各於該府第齋宿部院堂司官於各該部院旗下都統參佐領及散秩官於本旗衙門齋宿凡二十七日十九日奏準按會典內載孝誠仁皇后喪儀經禮部題準移文直省免其齊集舉哀制服遣官進香蓋緣康熙十三年時值三藩叛逆大兵致討恐在外各衙門舉哀制服有惑觀聽是以禮部題明免直省官民治喪原屬一時權宜嗣後相沿遂未更正考之周禮為王后服齊衰注言諸侯諸臣皆齊衰是內外臣無異也明會典載皇后喪儀十三布政使司及直隸禮部請敕差官訃告在外文武官員軍民人等制服與京師同今大行皇后正位中宮母儀天下忽值崩逝正四海同哀之日見已欽奉諭旨布告中外應俟在京王公百官成服之日將欽奉諭旨謄黃遣官頒下直省令在外文武各官於奉到諭旨為始摘冠纓齊集公所哭臨三日持服通前二十七日而除三日後照常辦事二十七日內文武各官不嫁娶不作樂軍民人等摘冠纓七日七日內不嫁娶不作樂其見在出征官軍悉免舉哀制服督撫以下仍照舊例免其遣官進香又奏準禮稱父在杖不上於堂母后至貴不得不屈於所尊謹擬在京王公百官咸縞素二十七日百日剃頭百日內有應行典禮及朝會坐班咸用禮服吉服入朝奏事皆素服冠綴纓緯百日外入朝奏事用常服二十七月以內遇几筵致祭齊集仍素服去冠纓緯皇子等制服遵旨照百日喪服二十七月內素服詣几筵前喪服行禮二十二日諭禮部大行皇后諡為孝賢皇后所有應行典禮照例奏聞欽此遵旨議準册諡典禮悉遵康熙十三年遣使上孝誠皇后尊諡禮舉行二十三日以奉移梓宮行啓奠禮是日儀駕全設陳冠服設祭品於几筵前列饌筵於長春宮露臺兩旁陳楮帛於景運門外箭亭之南所陳羊酒饌筵楮帛如數王以下有頂帶官員以上公主福晉以下二品官命婦以上咸齊集行禮舉哀皆如儀禮部堂官一人奉祭文二人前引由乾淸門西門入至長春宮陳祭文於左簷下黃案是日皇帝親臨上食畢讀祭文時皇子衆皆跪哀暫止讀祭文畢皇帝旁坐祭酒三爵每祭皇子衆行一叩禮舉哀徹祭案畢王以下各退禮部堂官引讀祝官恭奉祭文由乾淸門西門出至燎所付內監退內務府總管夫人內管領妻等恭奉冠服送燎所欽命之王福晉祭酒三爵衆隨行禮舉哀各退是日奏準恭奉孝賢皇后冠服送燎時齊集婦女若皆隨往自長春宮至乾淸門宮內路徑人多難行應令奏遣之福晉及內府婦女百人隨冠服後行其餘福晉以下咸令於乾淸門外西旁齊集冠服至跪候過隨行二十五日奉移梓宮於景山觀德殿是日儀駕全設陳丹旐於景運門外設册寶於采亭至時皇帝親臨祭酒三爵奉移梓宮由乾淸門西門出王公及直班內大臣侍衛於乾淸門前按翼列跪舉哀梓宮至景運門外登大升輿皇子於左旁隨行奏遣近靈駕行之王公及姻戚等各按翼行內府婦女一百八十人於東華門外乘馬隨行次稍間豹尾班隨行次稍間王公內大臣侍衛隨行所過門橋遣內大臣祭酒左翼大小官員於東華門外右旁齊集漢官在滿官之次齊集右翼大小官員於沙灘齊集均俟靈駕至跪迎舉哀候過隨行靈駕將至親王以下三品官以上於觀德殿大門外齊集四品以下官及內府官員護軍領催等於景山東門外齊集公主近支福晉等及姻戚近支婦女豫由景山後牆門入於殿後兩旁齊集諸王福晉以下一品夫人以上豫於觀德殿二門內齊集二品夫人以下及內府佐領官員護軍領催等之妻於二門外齊集均俟梓宮至跪迎舉哀奉安梓宮於觀德殿設几筵陳儀駕於大門外設册寶於几筵左右皇子祭酒三爵齊集王以下官員以上公主福晉以下官員妻以上皆隨行禮舉哀畢各退是日以大行皇后崩逝照例將敕諭由禮部謄黃頒發直省遣官齎敕諭訃聞於朝鮮國其內扎薩克衆喀爾喀作六路遣官送往哈密靑海等處作二路遣官送往二十九日皇帝親臨行初祭禮儀駕全設陳羊酒饌筵楮帛如數親王以下有頂帶官員以上公主福晉以下二品夫人以上齊集行禮舉哀如儀是日祭畢皇帝除服命妃嬪宮人於二十七日除服次日繹祭陳羊酒饌筵楮帛如數內務府禮工二部堂官辦理喪儀大臣姻戚內府佐領內管領下男婦咸齊集致祭行禮如儀四月初一日孟夏時饗太廟照雍正九年之例承祭分獻執事各官均照常齋戒素服致祭齊戒日不至齊集處舉哀是日奏準梓宮照例於本月初七日起漆飾四十九次初九日行大祭禮皇帝親臨祭酒陳設禮儀與初祭同是日妃嬪宮人皆除服衆皆除服次日繹祭陳設禮儀與初祭次日繹祭同十一日行周月致祭禮陳羊酒饌筵楮帛如數王以下有頂帶官員以上公主福晉以下二品夫人以上咸齊集祭酒行禮舉哀如前儀凡月祭儀同二十七日常雩遣官行禮分獻執事各官咸朝服五月二十一日册諡大行皇后曰孝賢皇后前期遣官一人祗告太廟後殿奉先殿至日皇帝素服御太和門遣親王郡王為正副使齎册寶詣觀德殿行册諡禮儀與康熙十三年同禮成正副使復命次日頒詔天下又奏準是日皇子喪服隨班行禮二十三日奏準帝后雖云儷體而地道臣道天澤昭然升殿視朝事關典制非燕樂可比孝賢皇后喪制應遵用國朝祖制百日後皇帝升殿文武各官及外藩使臣行禮羣臣朝服均如常儀其作樂之處並照常舉行皇帝兩月除沐後即應御門聽政羣臣常服不挂數珠禮畢仍素服百日後如值御門之期羣臣常服挂數珠庶於禮制分義皆為允協再恭檢孝誠仁皇后喪儀案卷內載百日以後期年以內王公以下各官逢初五十五二十五等日咸朝服月朔初十二十等日補服皆挂數珠馬懸繁纓尋常入內奏事常服不挂數珠馬不懸繁纓等語今孝賢皇后百日以後期年以前上朝坐班及入內奏事應悉遵此制至一切典禮應朝服采服之日仍如常儀所有原議入朝奏事用常服之處應通行改正本日奉諭孝賢皇后大事一切典禮朕皆斟酌古今務協其宜蓋皇后坤寧正位體制原尊然以天子之禮視之則節文亦自有别縱令伉儷恩篤亦不可事事從而加厚以致失之太過即或情誼稍有未洽亦不宜事事從而貶抑以致失之不及蓋皇后自有皇后之體制不可以夫妻之私情為之增損於其間也朕於孝賢皇后情誼隆重固天下臣民所共知而經紀喪儀從不肯以一毫私意稍紊典常考明代嘉靖七年孝潔陳皇后之喪閣臣張璁援據古禮以為喪服自期以下諸侯絶特為旁期言若妻喪本自三年報殺為期年固未嘗絶上宜為后服期等語其折衷頗為允當今據大學士等議奏禮儀內如升殿作樂一節凡屬大朝祀典自當照例朕意今年內尋常升殿但鳴鐘鼓樂懸而不作庶為合宜至來年正月將屆期年一切典禮著照康熙十四年之例如常儀餘依議欽此六月十三日諭山東沂州營都司薑興漢奉天錦州府知府金文淳皆於孝賢皇后百日內剃頭經巡撫及副都統參奏已降旨交刑部問罪本朝定制遇有國恤百日以內皆不剃頭倘違例私犯祖制立即處斬亦如進關時令漢人剃髮彼不剃髮者無不處斬之理此百餘年人所共遵不待傳諭而後曉是以會典律例皆無明文蓋以修會典時不過增損明季之舊章明朝原無此制也又以其事本理法所必當然不必載之簡册即如子孫孝養父母當食進食當衣加衣豈待專立科條然後盡其子職亦豈得以律令不載遂為不孝者解免至謂漢人遂可不遵百日之制茍有此心即與不肯剃髮者同尤不容誅也伊等身為臣子豈有不遵國朝定制之理若謂出於不知豈不見他人尚未剃頭何以不推求其故安心違犯此即立行正法以彰憲典亦無可恕然自朕思之律例會典實無明文而部文究未傳諭其所以未經聲明者亦因其為衆所共知今既顯明正其違犯之罪又當曲體其愚昧犯法之情且或遠方僻陋拘於二十七日除服之文遂有陷於不知或見他人有剃頭者即謂事屬可行冒昧觸網此等情節又不得不格外矜原更恐外省見有此兩案諭旨慮蹈徇隱之愆紛紛參奏國家亦無此體制可傳諭各督撫提鎮學政欽差各官等此旨未到之前或見在已經察出之案自當參處不容廢法姑縱其餘未發覺者槩不必再行飭參旗人本屬當知若有喪心之徒不在此寬免之例嗣後將國恤百日內不得剃頭違者立即處斬之處載入會典律例令人共知遵守朕惟率由祖制欲使法在必行並無從寬從嚴之見存乎其間欽此二十一日行百日致祭禮陳冠服設儀駕陳羊酒饌筵楮帛如數王以下有頂帶官員以上公主福晉以下二品夫人以上咸齊集皇帝親臨祭酒儀與初祭同是月十二日小暑適值禁火照常陳冠服祭酒畢仍徹回留至中元焚化七月初十日諭今日見江寧協領員闕保送之佐領尚未剃頭蓋伊等以旨到計日矣皇后大事滿百日剃頭皆當以事出之日為始若以旨到日計之則極遠省分益致遲久不齊從前會典未載入此條而禮部行文時並未明白指示以致外省人員非失之不及則轉至矜持至於太過將此通行曉諭各省駐防處如有似此觀望未剃頭者皆令剃頭纂修會典時詳悉載入欽此十五日行中元致祭禮設儀駕陳羊酒饌筵楮帛如數齊集讀文行禮與初祭同二十九日奏準八月十三日此一日觀德殿三次奠獻如常內外照例停止舉哀八月初七日朝鮮國遣使進香几筵前遣王一人主祭行禮如儀十月初五日以奉移梓宮行啓奠禮陳設禮儀與前奉移觀德殿啓奠禮同初七日奉移梓宮於靜安莊是日儀駕全設陳册寶於采亭王公百官及公主福晉命婦咸分班於觀德殿靜安莊兩處齊集至時奉移梓宮皇子祭酒三爵衆隨行禮舉哀畢梓宮登大升輿皇子詣前祭酒三爵校尉舁行鑾儀衛官更畨翼衛隨行所過門橋遣內大臣祭酒近靈駕隨行王公姻戚等在觀德殿大門內跪舉哀候梓宮過皇子於左旁隨行次奏遣之王公隨行次內務府婦女一百八十人乘馬隨行次稍間豹尾班侍衛隨行次王公百官隨行王以下奉恩將軍以上內大臣侍衛內府官員於景山東門外按翼排跪舉哀民公侯伯以下有頂帶官員以上及間散宗室覺羅等於景山後西旁東嚮跪舉哀候梓宮過隨行貴妃妃嬪及宮人豫赴靜安莊殯宮後左旁祗候公主近支王福晉等於殿內齊集諸王福晉以下二品夫人以上咸於二門內兩旁序立內府官員護軍領催等之妻於大臣命婦後序立均候靈駕至跪迎舉哀王公百官等於大門外排跪舉哀奉安梓宮於殯殿皇子祭酒三爵衆隨行禮畢各退初九日行暫安致祭禮陳羊酒饌筵楮帛如數王公官員公主福晉命婦等咸齊集讀文祭酒舉哀行禮儀均與月祭同初十日諭旗人因孝賢皇后梓宮暫安觀德殿不敢舉行嫁娶亦未可定今皇后梓宮既經安奉靜安莊其有未經嫁娶者著照常舉行欽此二十五日行冬至致祭禮十一月初二日冬至因直齋戒之朝豫於是日致祭陳金銀定五萬楮錢楮帛各五萬饌筵三十一席羊九酒十有五尊王公官員及公主福晉命婦皆齊集讀文致祭行禮舉哀儀與中元致祭禮同十一月二十五日几筵前三次奠獻如常內外停止舉哀姻戚婦女祭酒又奏準王公大小官員兵丁人等仍照例於十二月二十日後張挂門神對聯十二月二十一日行歲暮致祭禮因齋戒改期陳羊酒饌筵楮帛如數齊集讀文致祭儀與冬至同又奏準乾隆十四年正月初一日几筵前照常三次奠獻停止舉哀十四年正月十一日月祭因逢齋戒移於十三日致祭行禮二月十七日行淸明致祭禮不焚楮帛進挂楮錢寶花一座陳饌筵二十五席羊九酒十有三尊齊集行禮儀與歲暮同二十六日奏準金川告捷擇吉於三月初九日祭告几筵遣官及執事人員冠綴纓緯素服行禮三月十一日行期年致祭禮陳羊酒饌筵楮帛如數王以下有頂帶官員以上公主福晉以下三品官命婦以上內府官員男婦咸齊集讀文致祭皇帝親詣祭酒衆隨行禮如儀是日奉旨孝賢皇后喪紀已周於明日起諸皇子前往靜安莊著冠綴纓緯前往齊集人員並彼處執事人員亦著冠綴纓緯七月十五日行中元致祭禮陳金銀定五萬楮錢五萬楮帛一萬饌筵十有一席羊五酒五尊儀與十三年致祭禮同十一月初三日行冬至致祭禮陳金銀定三萬楮錢楮帛各萬饌筵十有一席羊三酒五尊儀與十三年冬至致祭禮同十二月二十五日行歲暮致祭禮陳設禮儀與冬至致祭禮同十五年三月十一日行再期致祭禮陳羊酒饌筵楮帛如數讀文致祭皇帝親詣祭酒儀與期年同六月十一日行服闋致祭禮陳羊酒饌筵楮帛如數王以下有頂帶官員以上公主福晉以下二品官命婦以上及姻戚內府官員男婦咸齊集讀文致祭皇帝親詣祭酒衆隨行禮儀與百日致祭禮同是日諸皇子皆除服是年中元冬至歲暮致祭咸與十四年致祭禮同十二月初二日奏準先經奏定孝賢皇后三周年後遵照孝誠仁皇后在沙河致祭之禮停止每日奠獻及滿月致祭照陵寢致祭例每月朔望獻羊酒果品點香燭四時大祭陳俎豆牲帛醴齊點香燭讀祝文致祭凡遇慶典致祭獻酒桌點香燭讀祝文致祭忌辰照周年禮奠羹飯肴膳饌筵焚楮定讀文致祭雍正十一年奏準改用補服伏思陵寢致祭是於神牌前與几筵前致祭究屬有别三年後若仍照常奠獻又與喪儀無殊謹擬孝賢皇后三周年後應將滿月致祭及每日奠獻皆停四時祭祀忌日致祭不陳冠服不設楮錢惟獻肴膳饌筵讀文行禮舉哀寒食進挂楮錢寶花一座除夕陳楮錢二萬金銀楮定二萬同寶花送燎祭酒於正中咸停齊集仍設儀駕恭遇慶賀祭告仍照見今靜安莊祭告禮行每月朔望獻羊一饌筵一祭酒致祭停止舉哀庶三年後之禮儀與神牌前祭奠皆有分别又奏準靜安莊致祭遣諸皇子輪流祭酒十二日諭次年正月十一日孝賢皇后滿月禮致祭著於初七日次年三周年亦并於初七日讀文致祭至三周年仍照常致祭欽此十七年七月十七日奏準地宮工程於九月內告竣謹擇吉期於十月十三日奉移孝賢皇后梓宮於二十七日安葬地宮九月二十日諭本年十月二十七日行孝賢皇后安奉地宮禮稽之國家舊典皇祖聖祖仁皇帝於孝誠仁皇后孝昭仁皇后孝懿仁皇后皆曾親送自應謹遵祖制但奉移梓宮距安葬地宮之期計逾旬日朕於十月十三日至靜安莊臨送後擬於二十二日自京起鑾恭謁祖陵禮畢屆期詣孝賢皇后陵寢親行視奠欽此又奏準皇后恭送孝賢皇后梓宮應於至陵日先謁四陵畢乃謁孝賢皇后陵寢行禮十月初八日行恭題神主禮前期工部敬製神主於靜安莊几筵殿之東廡繕字掃靑如儀至日陳儀駕於殯宮大門外設黃案於几筵殿內正中設鳳輿於階上屆期欽命大臣一人詣東廡神主前跪上香行三叩禮興恭奉神主禮部堂官導至几筵殿奉安黃案上滿漢大學士二人朝服盥手詣主案前行一跪三叩禮興恭題神主畢復行一跪三叩禮退欽命大臣詣主案前一跪三叩恭奉神主安奉鳳輿於輿前行一跪三叩禮校尉舁輿前列儀駕如儀是日升祔奉先殿詳升祔儀十一日行祖奠禮陳設禮儀與啓奠同十三日奉移梓宮儀駕全設陳册寶於鳳輿近靈駕隨行之王公等姻戚人員於二門外齊集親王以下入八分公以上及送往之大學士內大臣侍衛於大門外兩旁齊集不入八分公民公侯伯以下四品官以上及間散宗室無執事之內府官員於大門外兩廂前排班齊集近支福晉公主郡主等於殿內齊集在外福晉以下二品大臣夫人以上並姻戚夫人婦女咸於大門內右旁齊集內府佐領內管領下官員護軍領催等妻於大臣官員命婦後齊集各於齊集處舉哀皇帝親詣祭酒時皇子行禮衆隨行禮進小輿奉梓宮出大門外登大升輿禮部堂官祭輿三祭酒三叩校尉舁輿靈駕發册寶輿前行校尉執儀駕乘馬按次前導諸皇子暨簡命近行王公姻戚及各執事官皆徒步舉哀隨行次內務府婦女六十人乘馬隨後行次女侍車行恭理喪儀王公大臣內務府禮工二部鑾儀衛堂官於左右巡視翼衛所過門橋遣內大臣祭酒至不送往王公跪送後皇子衆等乃止哀乘騎隨行每舁校更班時皆下馬跪靈駕發仍乘馬舁夫日分三十班以內監十人輪流於靈駕前左右步行諸王各官皆於豹尾班後以次乘馬隨行沿塗分站豫設蘆殿繞以黃幔城網城百步外𥪡下馬柱左右各一漢官及年老王公百官先往蘆殿恭候隨行之王公百官將至宿次相近處豫由别路先至蘆殿後網城門外排班舉哀跪迎靈駕至末班皇子衆皆下馬舉哀隨行儀駕由黃幔城外兩旁行至幔城南門前陳列王公百官候靈駕入幔城後門乃由黃幔城繞至前門外按翼序立舉哀奉安靈駕於蘆殿校尉舁夫皆出乃行夕奠禮祭酒舉哀畢執事官奉册寶交內監設於兩旁闔門皆退恭理喪儀王公大臣戒所在官軍祗嚴宿衛翼日昧爽陳儀駕出册寶啓正門各執事皆辦皇子行朝奠禮詣靈駕前舉哀祭酒三爵衆隨行禮舉哀執事各官率校尉舁夫進恭舁靈駕發皇子跪候過隨行衆舉哀隨行至首班衆止哀乘馬隨行在塗朝夕奠舉哀一如初日送往山陵之王公百官日於殿外黃幔城網城外按翼序立所過五十里內守土官咸素服於道右序立候靈駕至舉哀跪迎至宿次詣網城門外行朝謁三跪九叩禮奠獻時各於右翼班末隨行禮舉哀妃嬪等於早晨朝奠隨行禮舉哀瞻望靈駕發由别路行不與晡奠每程儀同是日奉移慧賢皇貴妃哲憫皇貴妃金棺一同送往十七日梓宮至陵守陵寢貝勒公大小官員皆於興龍口之外跪迎舉哀靈駕由紅門西柵闌入由神路行至陵寢大門外降大升輿升小輿由中門入奉安饗殿設几筵陳册寶於左右皇子祭酒三爵衆隨行禮畢各退是日遣官各一人祗告后土昌瑞山之神十九日行暫安致祭禮儀駕全設陳羊酒饌筵楮帛如數送往之王以下大臣官員以上及陵寢貝勒公大小官員執事人等咸於大門外齊集陵寢居住之貝勒公夫人官員命婦執事人等之妻咸齊集讀文致祭行禮如儀大葬前期三日遣官各一人祗告天地太廟社稷二十五日行遷奠禮設儀駕陳羊酒饌筵楮帛如數王以下大小官員陵寢貝勒公大小官員執事人等陵寢居住之貝勒公夫人官員命婦執事人等之妻咸齊集讀文致祭皇帝親臨祭酒皇子每祭行一叩禮衆隨行禮舉哀至時奉移梓宮皇子祭酒衆皆隨行禮舉哀婦女等豫詣方城西旁候梓宮過舉哀跪迎梓宮由方城入暫安梓宮於蘆殿正中登龍輴北嚮陳册寶於前進饌筵皇子祭酒三爵衆隨行禮舉哀畢各退是日儀駕皆焚訖二十七日皇帝親臨祭酒三爵皇子行禮衆隨行禮舉哀至時欽命諸臣恭率校尉奉移龍輴由隧道入地宮奉安於寶牀設册寶於兩旁石几皇帝親視奉安畢出乃掩閉元宮皇子於祭臺前祭酒三爵三叩衆皆舉哀隨行禮畢卒哭各退是日恭移慧賢皇貴妃哲憫皇貴妃金棺同葬是日以奉安地宮禮成遣官各一人祗告后土昌瑞山之神欽定大淸會典則例卷八十八
