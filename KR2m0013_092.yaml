body:
  text: 禮部祠祭淸吏司喪禮二下孝誠仁皇后喪儀康熙十三年五月初三日仁孝皇后崩奉安梓宮於乾淸宮設几筵建丹旐於乾淸門外之右聖祖仁皇帝輟朝成服妃嬪宮人咸成服咸縞素陳儀駕於乾淸門至隆宗門王以下文武各官皆齊集左翼官於景運門外右翼官於隆宗門外依次齊集王以下入八分公以上進內於丹陛上內大臣侍衛於丹墀不入八分公以下奉恩將軍以上滿漢文武官員輪班於乾淸門外兩旁序立舉哀公主福晉以下縣君奉恩將軍恭人以上民公侯伯一品夫人以下子男等官夫人以上各依班次於景運門外齊集公主親王福晉及縣君進內郡王福晉以下奉恩將軍恭人以上民公侯伯子男夫人皆於齊集處舉哀王以下各官公主福晉以下大臣命婦等咸成服凡守堂子官吏祭神殿執事官員男婦內監壇廟奉先殿官員內監陵寢官員內監出征將軍以下兵丁以上妻子漢官命婦皆停給孝服本家見有出痘及父母新喪人等暫停給孝服几筵前朝晡日中三設奠王以下各官每日早晚齊集舉哀二次凡三日止旗下散秩官仍每日二次齊集簡命大臣辦理喪儀王以下文武各官不嫁娶不作樂凡二十七日民間凡七日止初五日奉移梓宮至西華門外殯宮儀駕全設舁輿校尉民夫首班末班用校尉餘用民夫八十人豫備八人鑾儀衛官四人節示進退文官三品京堂以下給事中御史郎中以上武官公侯伯一等侍衛以下參領輕車都尉王府長史以上每班各四人管束夫役工部夫頭四人司擊響尺後仿此於奉移時禮部尚書祭輿祭酒三爵過門橋遣大臣祭酒聖祖仁皇帝親臨送王以下各官公主福晉以下內府官命婦以上皆豫赴奉安殯宮公主福晉以下在圍牆外序立內府官命婦等在圍牆內序立候靈駕至跪舉哀候過王以下內大臣都統大學士尚書子以上公主福晉以下大臣命婦以上隨進按翼序立舉哀副都統侍郎以下在圍牆外序立舉哀奉安梓宮於殯殿祭酒三爵舉哀各退王以下入八分公以上內大臣侍衛每日淸晨在殯宮大門內齊集不入八分公以下奉恩將軍以上及間散覺羅官旗下官員仍每日兩次在殯宮外齊集舉哀凡祭日及奉移日几筵前仍設午奠晡奠如常遣姻戚大臣夫人祭酒妃嬪公主福晉皇子王公皆不齊集如繹祭儀後仿此在京朝鮮國使臣亦給白布服免其齊集頒敕諭訃聞該國遣官到日照例成服禮部題準見今三藩叛逆大兵致討恐在外各官舉哀制服有惑觀聽移文直省免其齊集舉哀制服及遣官進香初八日奉旨擬上大行皇后諡號遵旨議準册諡典禮請恭擬諡號後由部交欽天監敬擇日期其香絹册寶寶盝册箱等項交工部敬謹製造祗告太廟遣官由該衙門奏遣祗告祭文暨册文寶文册諡祭文由翰林院撰擬正副使由宗人府開列親王郡王等名咨部奏遣其讀祝官宣册寶贊引典儀奠獻各執事官由太常寺選用恭上尊諡儀注屇期具奏一切需用器物照例行文各該衙門辦理十三日行殷奠禮儀駕全設於圍牆內陳金銀定三萬楮錢楮帛各三萬饌筵二十一席羊九酒十有一尊聖祖仁皇帝親臨王以下文武各官公主福晉以下奉恩將軍恭人以上民公侯伯一品夫人以下副都統侍衛命婦以上齊集讀祝文時衆皆跪讀畢祭酒三爵衆皆三叩興舉哀畢讀祝官奉送燎所聖祖仁皇帝還宮衆皆退是日大祭北郊遣官恭代行禮豫期視牲看牲咸素服照常齋戒祭日咸朝服二十一日行初祭禮儀駕全設於圍牆內陳金銀定二十萬五千楮錢十四萬五千畫段萬端楮帛五萬端饌筵八十一席羊二十七酒四十一尊聖祖仁皇帝親臨王以下文武各官公主福晉以下縣君奉恩將軍恭人以上民公侯伯一品夫人以下男夫人以上齊集讀文祭酒行禮舉哀等儀與殷奠同是日聖祖仁皇帝除服妃嬪以下宮人咸隨除服聖駕回宮衆皆退次日行繹祭禮陳金銀定二萬楮錢萬饌筵十有一席羊五酒五尊內務府官員命婦齊集致祭二十五日行奉移致祭禮儀駕全設於圍牆內陳羊酒饌筵楮帛如殷奠之數王以下文武各官公主福晉以下縣君奉恩將軍恭人以上民公侯伯一品夫人以下男夫人以上齊集讀文祭酒行禮舉哀如前儀二十七日奉移梓宮暫安於都城北沙河鞏華城殯宮是日儀駕全設奉移時禮部堂官祭輿所過門橋遣內大臣祭酒聖祖仁皇帝親臨送內大臣侍衛於西安門內齊集王以下奉恩將軍以上於西安門外民公侯伯以下文武各官於大街兩旁漢官於八旗之下各按翼序立靈駕至跪舉哀候過興不往送各官皆退往送各官出城外按旗乘馬隨行公主福晉以下縣君奉恩將軍恭人以上民公侯伯一品夫人以下男夫人以上於德勝門外關廂內齊集靈駕至跪舉哀候過各退至沙河奉安殯宮設几筵祭酒三爵王等各官咸隨行禮舉哀各退二十九日聖祖仁皇帝親至鞏華城行大祭禮儀駕全設陳羊酒饌筵楮帛如初祭之數王以下奉恩將軍以上民公侯伯以下文武各官公主福晉以下縣君奉恩將軍恭人以上民公侯伯一品夫人以下男夫人以上咸齊集讀文祭酒行禮舉哀均如前儀是日滿二十七日王以下各官公主福晉以下大臣命婦等皆至焚燎處兩旁序立姻戚大臣夫人祭酒三爵衆皆跪每祭隨叩祭畢除服各退次日繹祭陳設禮儀與前初祭次日繹祭同六月初三日行滿月致祭禮儀駕全設陳金銀定五萬楮錢五萬饌筵二十一席羊九酒九尊王以下奉恩將軍以上民公侯伯以下男以上齊集祭酒行禮如儀百日內每周月齊集祭酒行禮咸與初周月同百日外惟內府官員男婦齊集致祭初七日行册諡禮諡大行皇后曰仁孝皇后謹按雍正元年恭加改孝誠廟號以仁字重復謹是日內務府官於沙河鞏華城殯宮前陳設儀駕設册寶案各一香案一於几筵前內府官設祭品點香燭鴻臚寺官設册寶案於太和門階上册案左寶案右鑾儀衛官設册寶亭各一於階下正中正副使及執事官皆素服序立於階下之左內閣大臣奉香册寶匣列各案上行一跪三叩禮退立階下之左禮部官奉絹册寶匣豫設采亭內陳設畢禮部堂官奏請聖祖仁皇帝素服御太和門座禮部堂官引正副使由東階升詣册寶案前各行一跪三叩禮興正使奉册副使奉寶由中階降設采亭內行一跪三叩禮禮部堂官奏禮成聖駕還宮校尉舁亭册前寶後黃蓋一柄御仗二對前導由中路出正副使隨後行內大臣侍衛於午門內金水橋兩旁王以下奉恩將軍以上於西華門內滿漢四品以上官於西華門外按翼序立册寶亭至皆跪候過隨行册寶亭出德勝門至鞏華城進南門正副使執事官咸於門外下馬隨祭內大臣侍衛滿漢四品以上官於鞏華城皇城外排跪奉迎采亭由中門入至二門止禮部官豫奉絹册寶設於各案正副使詣亭前行一跪三叩禮奉香册香寶由中路至几筵殿內設於各案册左寶右行一跪三叩禮正副使詣香案前贊引官贊上香正使上香贊宣册宣册官奉册立宣訖贊宣寶宣寶官奉寶立宣訖仍陳於各案上正使奉香册副使奉香寶陳設於几筵前册左寶右行一跪三叩禮由左門退出鴻臚寺官引內大臣侍衛滿漢四品以上官至階下兩翼序立隨承祭官致祭上香奠帛讀祝三獻爵行禮如儀恭奉祝文絹册寶送燎所禮成正副使復命翼日頒詔天下七月初一日孟秋時饗太廟遣官行禮分獻執事各官咸朝服初三日聖祖仁皇帝親至鞏華城行月祭禮祭酒舉哀以後月祭皆親臨十五日行中元致祭禮儀駕全設陳金銀定十萬楮錢七萬畫假萬端楮帛二萬端饌筵二十一席羊九酒九尊王以下奉恩將軍以上民公侯伯以下三品官以上公主福晉以下鎮國將軍夫人以上民公侯伯大臣命婦咸齊集讀文祭酒行禮如儀八月十二日聖祖仁皇帝至鞏華城駐蹕翼日行百日致祭禮儀駕全設陳金銀定五萬楮錢四萬五千楮帛二萬饌筵二十五席羊九酒十有三尊王以下奉恩將軍以上民公侯伯以下男以上齊集致祭自百日後至期年每日仍三次奠獻期年外日一次奠獻三年後朔望獻酒果十三日朝鮮國王遣官進香致祭儀駕全設王以下奉恩將軍以上民公侯伯以下滿漢四品官以上齊集朝鮮使臣於右翼末立陳設祭品上香鳴贊官贊使臣於仗南行三跪九叩禮畢退立原班讀文遣官一人祭酒三爵王以下各官皆跪引朝鮮使臣至拜位跪隨行三叩禮舉哀興復贊行二跪六叩禮畢徹饌焚祭文各退歲暮致祭儀駕全設陳金銀定五萬楮錢楮帛各五萬饌筵三十一席羊九酒十有五尊民公侯伯以下四品官以上公主福晉以下大臣命婦以上咸齊集讀文祭酒行禮十四年正月行題主禮大學士一人詣沙河於奉安升祔奉先殿神主前點香燭一跪三叩恭奉神主禮部官前導至黃案前奉安案上點香燭一跪三叩滿漢大學士各一人朝服盥手詣香案前行一跪三叩禮畢敬點神主復行三叩禮大學士一人詣黃案前一跪三叩恭奉神主奉安鳳輿內一跪三叩興校尉舁輿儀駕全設出鞏華城南門至東華門儀駕止御仗黃蓋前導至奉先殿誠肅門外止王以下文武各官咸於東華門外齊集跪候過各退禮部太常官十人導引內閣大臣隨輿至城肅門是日升祔奉先殿奉安行禮致祭詳見掌儀司淸明日不焚楮帛進挂楮錢寶花一座即佛朵於几筵殿內左旁是日因皇太子出痘照陵寢四時大祭例遣官讀祝奠帛三獻行禮儀駕全設覺羅民公侯伯以下三品官以上齊集素服陪祭停止舉哀期年致祭儀駕全設陳金銀定五萬楮錢楮帛各五萬饌筵三十一席羊九酒十有五尊王以下奉恩將軍以上民公侯伯以下滿漢四品官以上公主福晉以下大臣命婦以上咸齊集讀文祭酒行禮期年後每日奠獻如常儀每滿月致祭陳金銀定五千楮錢五千饌筵五席羊三酒三尊再期致祭陳金銀定三萬楮帛楮錢各萬饌筵十有一席羊三酒一尊王以下奉恩將軍以上民公侯伯以下三品官以上公主福晉以下大臣命婦以上咸齊集讀文祭酒行禮如期年儀淸明日齊集致祭如再周儀不讀文七月十五日行中元致祭禮王以下輔國將軍以上民公侯伯以下男以上公主福晉以下子一品夫人以上齊集讀文祭酒行禮歲暮日直饗太廟王以下公以上皆免齊集鎮國將軍以下四品官以上一半齊集公主福晉以下大臣夫人以上咸齊集讀文祭酒行禮三周年後每月朔望聖節忌辰十月朔並淸明中元冬至歲暮四大祭及遇慶典照常致祭均照陵寢致祭例遣官朝服行禮二十年三月奉移梓宮與孝昭仁皇后同日安葬一應禮儀詳見於後孝昭仁皇后喪儀康熙十七年二月二十六日孝昭皇后崩奉安梓宮於宮中正殿設几筵建丹旐於宮門外之右聖祖仁皇帝輟朝成服妃嬪以下宮人皇太子諸皇子皆成服諸王以下文武官員公主福晉以下八旗二品夫人以上咸齊集舉哀持服二十七日凡守堂子官吏祭神殿執事官員內監壇廟奉先殿官員內監陵寢官員內監出征將軍以下兵丁以上妻子漢官命婦皆停給孝服本家見有出痘及父母新喪人等暫停給孝服以軍興免直隸各省文武官齊集舉哀制服及遣官進香梓宮前一應陳設行禮致祭皆與仁孝皇后同惟衍聖公五經博士在京亦給孝服一例齊集二十八日奉移梓宮於武英殿是日儀駕全設奉移時內大臣侍衛於景運門內西嚮序立王以下各官於西華門內東嚮序立候梓宮至皆跪舉哀候過興公主福晉以下大臣命婦以上先至武英殿門內兩廡階下按翼序立候梓宮至跪舉哀候過興奉安畢祭酒三爵各退是日聖祖仁皇帝親臨二十九日三十日皆親臨諸王以下文武各官每日早晚兩次集武英殿門外隨行禮