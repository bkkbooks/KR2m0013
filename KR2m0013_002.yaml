body:
  text: 太子太保議政大臣領侍衛內大臣禮部尚書臣來保等謹奏為欽奉上諭事乾隆十二年正月初六日內閣鈔出奉上諭國家立綱陳紀布在方䇿所以明昭代之章程備諸司之職掌以熙庶績以示訓行典至巨也大清會典修於皇祖聖祖仁皇帝康熙二十三年越我皇考世宗憲皇帝御極之初即允禮臣之請開館重修九年告竣刋梓頒行閲今又二十年矣其間因時制宜屢有損益向來諸臣每有以重修為請者朕以國家定制豈容數更踵事增文自有部册故槩未準行近以幾餘時加披覽間為討論乃晳由來有不得不重修者蓋緣編纂之初諸臣或沿襲舊文未經考證或略存近制未溯本源或限於案牘之不全或誤自參稽之不審而又未嘗請旨取裁斟酌至當故舛訛疏漏均不免焉夫唐虞分職具載典謨周室經邦詳於官禮書曰監於先王成憲又曰其爾典常作之師既謹度以惟貞宜有條而不紊矧際重熙纍洽之期當禮明樂備之日敕幾慎憲職惟其時是當博考朝章詳稽故實正舊編之紕繆補記載之闕遺用蕆成書垂示法守所有一切開館事宜該部定議具奏欽此欽惟我皇上體乾行健觀賁成文契千聖之精微敬德緝熙於宥密洞六經之奧窔天章炳煥於圖書謨丕顯而烈丕承八表集來同之軌聲為律而身為度萬年垂畫一之程固已元首明而股肱良百官承式朝廷正而天下治庶績其凝蕩蕩巍巍嫓中天而廣運麟麟炳炳際千載而一時者矣乃於敕幾貞度之餘念夫立綱陳紀之本以我朝之會典實立政之隆規溯自聖祖仁皇帝初命纂修列聖之駿業豐功燦如日月及乎世宗憲皇帝再加編輯奕䙫之舊章成憲寶若球圖職要職詳絲聨繩貫大經大法嶽峙川流第三百六十屬載在周官懸象魏者豈無新政若三百有六旬稽諸虞典置餘分者亦有歲差當此百年興禮樂之期共欽明備爰於丙夜覽編摩之舊灼見由來或册府所垂酌時宜而有待損益或渙汗所及踵往事而應著精詳或當時秉筆諸臣有未曾窺之祕笈或向日分編衆手有不及訂之魯魚蓋繼繼承承閲前修已二十餘載必元元本本斯傳信於億萬斯年敕諭在廷重修會典特命臣部議定事宜仰見我皇上殫繼志述事之盛心孝治永光於四海立體國經野之巨典大猷更備於六官者也臣等身依禁籞愧無典册髙文員備容臺謬掌寅清三禮既恭承乎綸綍敢不竭其管蠡除請點監修總裁官例由內閣開列分派纂修提調等官并咨取謄録供事員役支用棹飯工食銀兩需用心紅紙張應備桌匱器皿以及書成議敘等項從前開館俱有成規應聽總裁官照例奏請外所有臣部遵奉諭旨定議條􅍁敬為我皇上臚陳之一朝章宜考本原也按會典一書類舉一朝掌故布在方䇿昭示臣民垂憲萬世所關綦重國家太平翔洽百有餘年議禮制度損益咸宜作聖述明淵源有自而或官司所守僅得其大凡因是紀載之編間失其精意洪惟列聖相承創制顯庸載在實録者至善盡美但金匱石室之藏書非編纂諸臣所得習見應請照國史館之例令纂修官親赴皇史宬詳考有關會典者敬謹鈔録以為全書綱領則憲典有稽本原該備以昭大訓庶幾咸正無缺一書籍宜備參稽也按會典所載皆繫見行規條但質文之尚因革之宜既監前代以折中必綜羣言以參訂倘非廣搜載記通酌古今則舊文沿襲必至舛訛若近制粗存不免簡陋伏見古今圖書集成一書博大精深足資考證從前曾蒙賜給翰林院一部他如明永樂大典亦見貯翰林院如有應行稽考之處應令纂修官赴翰林院核對又三禮及律吕正義二館書已告成校對將竣從前所取書籍見存該館並請俟會典開館之後行文咨取全數交送其他書籍凡有資考據者俱隨酌取以備參稽一卷案宜詳察也按向例纂修會典由各衙門造送册籍以慿編纂惟是各衙門所送册籍或因頭緒紛繁事多罣漏或因閲年久逺案有闕遺若不詳察難以徴信應請敕下在京大小各衙門令各該堂官選委賢能司官專管清釐案卷協同各本司官員務將該衙門所隸應入會典事件分類編年備細造送毋致罣漏其有因年久黴爛遺失者亦令移詢各衙門及外省造送以備該館編纂一纂修官務在得人也按從前編纂會典兼用翰林部屬惟據各該衙門咨送到館即充纂修官其間挨資論俸未必盡能得人此次開館請令總裁官分派各衙門人數行文咨取該堂官公同簡選務擇學問淹博熟諳掌故之員遵照雍正二年諭旨擬定正陪保送到館由總裁官列名具奏恭候欽點至典則之書義取綜核經生之學不乏專家並請照三禮館之例聽該館總裁於進士舉貢內確知經術湛深長於編纂者酌保數人一併具奏以專責成以收實效一考定更正之條宜隨時請旨也按會典編纂舊例繫成書續修祗將應增事例按年敘入至從前已定條􅍁即不復更張此次編纂繫奉特旨重修其原本所載或文鮮參稽舛訛未免或事經臚列援據無慿以及古今異宜諸儒異議隨時折𠂻均非臣下識見所能臆斷應令該館總裁官詳敘原委聲明緣由請旨裁奪其近年續增條件亦應按事按類逐卷進呈恭候欽定一在館辦事宜有成規也按開館修書搜羅經籍召集儒臣俾會聚有地商確有時搜討有藉所以心志齊體裁一而成功易也若各分卷帙於私家纂輯到館之日不過聚談數刻而散則功分於應酬事延於間濶限寬或相習因循時迫必草率成就舛訛疏漏有由來也此次纂修會典請敕令總裁官督率纂修各官每日必及辰而入盡申而散庶幾在館辦事俱有成規不獨勤惰易於稽察年限便於核定且互相討究可以斟酌得宜彼此觀摩亦見智能交奮將見計日程功仰副我皇上敕幾慎典之至意而經緯條貫垂法守於億萬年矣以上六條皆臣等遵奉諭旨詳悉定議是否有當伏候聖裁俟命下之日臣部行文內閣併行文各衙門遵照辦理可也為此謹奏請旨乾隆十二年正月二十三日奏本日奉旨依議欽此會典館總裁大學士三等伯臣張廷玉等謹奏為奏明請旨事臣等奉命纂修會典於上年十二月內進呈宗人府樣本仰蒙聖明指示精詳臣等敬謹編纂務期辭簡事該以副聖意惟是修書義例尚有應請睿裁者謹臚列三條為我皇上敬陳之一會典所載必經久常行之制至各衙門事例有遞損遞益不可為典要者逺則三五年近或一二年必當變通若尺寸不遺一槩登載誠恐刋行未遍更制已多必有如聖諭所云紀載非實一經指摘不覺爽然者國家大經大法守之官司布之朝野百年以來幾經考訂我皇上履中蹈和修明益備應請總括綱領載入會典其中或間有疑似闕略尚須斟酌者則請旨取裁折𠂻至當以垂萬世章程若夫微文末義縷晰條分則吏兵二部各有則例禮部見纂通禮刑部舊有律例皆可隨時修改以適於治其餘衙門未有則例者即交與在館纂修分門編輯仍照禮部原議令各衙門委出賢能司官專掌案册勿致貽誤每修成會典一卷即副以則例一卷先發該衙門校勘實無遺漏訛錯然後進呈恭俟欽定要以會典為綱則例為目則詳略有體庶與周六官唐六典遺意猶為倣佛一春秋編年紀事得失並書會典綜治法之大成以示信從與編年紀事之例逈異舊本每遇大典禮必臚序屢朝行事即一事之更定一節之沿流亦必分年備書誠有如聖諭所云原議舊儀連篇並載反掩正文者況自古治定制禮皆積久而後備後之所詳即前之所略如按時代並紀必致得失相形及臨事稽考則又質文異宜多少異數本欲監於成憲反致無所適從臣等謹請裒集舊典所載並取到各衙門册籍通行校訂自本朝開國以來及見修會典告成以前一應舊章新制皆薈萃源流斟酌詳備於朝廟典禮各定為一儀於官司事例各定為一則化參差之迹成畫一之規書成以後如間有因時損益之處繫畸零節目止於則例內增改即有關繫大體段者亦止刋補一二條無須全書更動庶幾一勞永逸以便遵循一舊會典分别在京文武衙門文職計四十有八武職惟鑾儀衛一官其八旗武職僅於兵典見名似非體裁又按兵部中樞政考及八旗則例雖有旗職升選降革處分各條多繫兵部之職並非八旗官員職掌伏思八旗都統經理兵馬錢糧户口田土世爵佐領等事雖與户兵兩部關會實多本職專行又領侍衛衙門護軍統領前鋒統領居則周廬環衛出則折衝禦侮九門提督衙門統領京營掌管門禁巡捕郊畿皆職任重大應請移取各衙門册籍將職掌事宜專立會典以補從前武職之闕於國家慎重根本設官分職之義庶為明備以上三條就臣等愚見所及公同酌議仰祈皇上訓示臣等董率纂修諸臣恪遵辦理為此謹奏乾隆十三年五月二十八日奏本日奉硃批所議好俱已周到依議欽此
