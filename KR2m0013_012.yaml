body:
  text: 吏部文選清吏司旗員升補一官員加級乾隆五年奏準凡文武改補班聨相等者任內所有加級如原繫隨帶之級仍準帶於各任如繫尋常加級亦照對品補授之例準其隨帶如世爵改補文職品級稍優文職承襲世爵班聨越等者均照升任官之例每級改為紀録一次其有世爵品大文職品小例應開闕之員或奉特㫖仍著兼理部務或經該堂官保留其文職任內所有加級仍照例每級改為紀録一次注册如由公侯伯奉㫖補授卿二大員若遇再升任者其在世爵任內所得加級紀録仍準隨帶在文職任內所得加級亦照升任官每級改為紀録一次又奏準筆帖式天文生其任內先有加級續經改換品級者仍準隨帶俟升任後凡品級考載繫應升者均為升任每級改為紀録一次一武職世爵各官兼理部院順治年間定由郎中員外郎官補授參領佐領者均兼部院行走其由員外郎等官補授參領由主事等官補授佐領者均解部院職任康熙四十五年題準凡由參領男爵輕車都尉補授郎中等官由副參領侍衛騎都尉佐領補授員外郎等官雲騎尉補授主事護軍校驍騎校補授小京官均俟三年限滿遇有升轉將武職食俸年分以上朝之日起通行較算如原繫部院主事筆帖式授為侍衛佐領復用員外郎等官者升轉時將前在部院之俸及見任之俸準其接算其在武職上行走之俸不必通理雍正八年議準由郎中等官承襲輕車都尉由員外郎等官承襲騎都尉由主事等官承襲雲騎尉者均屬班聨相等應令兼理部院其世爵品大文職品小除奉特㫖兼理部務者不行開闕外餘均令世爵上行走所遺員闕即行銓補如果有才能出衆因世爵品大不行兼理者準該堂官具奏保留引見恭候欽定其循分供職者照例開闕不得奏請兼理倘有請托徇情等弊引見時其人不勝保留或保留之後辦事不能妥協即將保奏之堂官嚴加議處乾隆十三年奏準八旗世爵及武職官員改補文職者輕車都尉參領以科道郎中用騎都尉副參領佐領以員外郎用雲騎尉以主事用護軍校驍騎校等以七品小京官用其世爵均仍帶於本身侍衛有奉特㫖以文職用者一等侍衛繫三品應以三品京堂用二等侍衛繫四品應以四品京堂用遇有員闕三品者開列於應升人員之前四品者開列於俸深人員之前請㫖補授此內各員闕如有應用科甲以及考試擬正陪者仍照例不行開列至三等四等侍衛繫五品應將三等侍衛以郎中用四等侍衛以員外郎用藍翎侍衛繫六品應以主事用遇有員闕歸於月分照例補用一宗人府題補各官雍正二年議準宗室理事官由鎮國將軍輔國將軍副理官由奉恩將軍佐領經歷主事由廕生五六品官並考取一等閒散宗室均由宗人府擬定正陪引見補授乾隆二年奏準宗室理事官遇有郎中應升員闕與旗員郎中一例較俸開列升轉一宗人府宗室官員出差乾隆三年議準宗人府理事官凡遇出差亦令該部行文宗人府將才能俸深者保舉一人咨送該部與各部院保送之旗員一同引見候㫖簡用一內務府堂郎中等官升轉乾隆五年奏準內務府官員向由內務府升轉其堂郎中總理六庫事務郎中等三闕經內務府奏準咨送過部以應升之官列名應準其與部院官一例較俸升轉此內有由漢軍郎中遴選調補者應令其以補授堂郎中等闕之日扣算食俸三年之後再行接算前任郎中之俸與漢郎中一例較俸升轉若暫時差往外省本任不行開闕者仍照見任官例論俸升轉其出差例有年限如鹽政關差等項本任員闕內務府别補有人亦應準其論俸仍俟扣滿年限再行擬升未經差滿之時如應升道府準其以升銜注册俟差滿回京照依原升補用其未經差滿之前如尚未升用俟回京之時未經補用以前仍不準算俸得官之後或仍補堂郎中等闕或補授對品官方準一例較俸推升一漢軍典籍升轉乾隆三年議準以推升中書後準其與漢中書較俸以主事同知兼掣與各項應升人員一例推升一漢軍年滿大使升轉乾隆四年奏準户部三庫及户部寶泉局工部寶源局大使均由筆帖式補授五年期滿仍照原筆帖式品級以應升之官用其由漢軍筆帖式補授大使年滿者歸於雙月如遇應升京官班次與漢軍俸深人員分闕間用如遇應升外官班次歸於即升月分與在外各項即升人員通較日期先後補用其未入流筆帖式改為九品者升轉之處仍照品級考所載以州同州判縣丞升轉一京官降調候補順治年間定京堂降官三品以上者悉照品級補用降至正四品者不補大四品如通政使司副使大理寺少卿以小四品用如太常寺少卿太僕寺少卿內閣侍讀學士降至從四品者不補祭酒借補正五品京堂仍支從四品俸乾隆四年奏準從四品內祭酒升轉甚優凡降至從四品者既不準其以祭酒降補自不便照祭酒升轉請以從四品銜管五品京堂事遇有開列引見升轉均列於各項應升人員之前專以應升之四品京堂員闕升轉又奏準京堂降至正五品從五品者不補郎中員外郎以京堂用四品以上京堂降至六品以下者並無堂官可補應停其補用五品京堂降至從五品者亦不補員外郎以堂官用京堂降至從五品者有鴻臚寺少卿可補故仍不補員外郎如降至六品以下悉照所降之級與各項降官一例補用五品京堂降至六品以下均屬司官若一槩不準降補則降一二級即屬無官可補故仍準與降官一例補用其餘各項降官均照所降之級序補惟降從五品者不補鴻臚寺少卿降從九品者不補司務均各照對品别官補用降從六品者不補光祿寺署正以正七品用仍支六品俸與六品一例較俸升轉降至正九品者以九品筆帖式用滿官並無正九品故準補筆帖式升正從八品之闕䝉古官員降至七品以上者準以原銜借補中書降至八品以下者以原銜借補理藩院司務如有情願補筆帖式者準其具呈補用漢軍降至從八品者不補典籍因繫中書升補之官並無應補班次以筆帖式用帶餘級食俸仍升八品官一外任旗員降補京官乾隆十四年奏準各省理事同知通判遇有降調者悉照京官降調至滿洲䝉古知縣事同一例應均以京官降調嗣後凡降一級者即以七品筆帖式改補降至八品者即以八品筆帖式改補降至九品者即以九品筆帖式改補十五年奏準外任道府以下滿洲䝉古人員如由正印降調赴補者準其各按品級遇正印佐二員闕均準降補如由佐二官降調赴補者不準降補正印均以對品别官補用惟降至從六品以下除正七品之知縣一項由正印官降調者尚堪補用外其餘均繫首領並無補用旗員之例考定例內理事同知通判降調者原以京官補用但京官品大外官品小若降至外任無可補之闕槩以京官對品借補未免過優嗣後凡降至從六品以下者皆降一等以京官補用如降至從六品者以正七品之小京官借補降至正七品者以從七品之小京官借補降至從七品者以正八品補用但滿洲䝉古無正八品之小京官應均以從八品之小京官降補降至從八品以及正九品者均以九品筆帖式補用不準仍帶原銜以上降調借補小京官人員有情願告降補用筆帖式者仍按品級準其以七八品筆帖式降補一開列出差監督乾隆七年議準凡户部開列大小各差監督於每年十月內行文過部咨取八旗應出大差官員按旗通行輪俸每旗核送五人應出小差官員較一任俸每旗亦核送五人將職名開單序明俸次移送户部開列一卓異理事同知通判等官升轉雍正十三年議奏歸化城等處同知通判及協理各官停其三年更代其原闕即别行銓補若遇才守出衆者題請升擢不及者黜革供職惟謹者仍照原銜較俸推升奉㫖依議此同知筆帖式等不得題補道府知州等官如有出衆者該督撫保題後以京官越等升用平常者著較底俸升轉乾隆五年奏準各省滿洲理事同知通判如有卓異之官經該督撫具題到部俟來京引見奉㫖注册後歸於每年二四六十月分除各項不積算人員及應選班次仍照例辦理外如遇應升月分不論食俸深淺以應升之官先盡升用仍以升班積算倘有俸次已深者仍準論俸推升其卓異應升之處銷去一官員赴任給照乾隆三年議準選授盛京等處官員以奉㫖之日為始由部咨行兵部給與路引由部給與執照限一月到任倘中塗或有阻滯令地方官驗照詳察情節揭報該部俟該員到任之後將執照呈繳該堂官咨部察銷如有無故違限者察明咨部題參照例議處除公事差遣外有告假來京者各該堂官奏明奉㫖給假者準其來京漢員升補一各部司官升補乾隆元年議準郎中員闕於六部員外郎內通行論俸不拘年限先盡俸深者互相升補員外郎員闕於各本部主事及應升各官通行較俸升補主事員闕於應升應選人員輪班升選其應升班次內將漢小京官與在外知縣各升一次以上推升班次詳載雙月大選例又議準郎中應升道府如有曾任道府因不宜外任改補部屬者俟該堂官保題之後方準一體論俸推升七年議準各部院官補授時其有奉㫖試用及試看者經該堂官保題稱職再行論俸升轉一漢軍司官歸并漢闕雍正五年議準按各部漢軍郎中員外郎主事及盛京漢軍員外郎主事共三十員內除六部理藩院較對清漢本章之堂主事九人仍補用漢軍以各部漢闕升轉外其餘二十一員均裁去於額設漢闕內除戶部禮部無庸增設外本部文選司增設員外郎一員考功司增設主事一員兵部職方司增設郎中一員武選司增設員外郎一員刑部江南司湖廣司陜西司增設郎中各一員浙江司山東司增設員外郎各一員工部營膳司都水司增設郎中各一員屯田司虞衡司增設員外郎各一員以上增設十三員並額設各闕令漢軍漢人一例補授候選者均照投文並捐納日期以應得部分挨次銓補又向例漢軍升轉通算前俸漢人升轉只較本任之俸今漢軍既以漢闕銓補如遇升轉應除去前俸與漢人一例較本任之俸升轉班次詳載月選例一京官算俸康熙二十六年議準小京官與外官較俸升補者連閏二年滿後算作三年遇應升員闕升用未經年滿者不準升轉所餘一日算作日半內閣中書試俸一年仍接算扣限二年滿後算作三年遇應升員闕升用未經年滿者不準升轉餘一日算作日半至凡京官升轉雖有罰俸不行停升將所罰之俸帶於新任一外官算俸原定雲南開化廣西二府正雜等官廣西分防五槽通判新平縣知縣祿勸州知州麗江府知府經歷鶴慶府維西通判劍川州中甸州判黑白二井提舉彌沙阿陋二井大使鶴慶順寧永昌永北四知府劍川州騰越州雲州陜西赤金靖逆栁溝安西衛均算邊俸其餘各省均算腹俸在外有司官員以下雜職以上除不論俸滿即升卓異等項官員遇闕即行升補外司道閲俸二年知府以下閲俸三年方準升轉其邊方司道閲俸年半為二年知府以下閲俸二年半為三年餘一日均作二日算若邊俸腹俸相當則先將邊俸升轉康熙十年題準邊俸官員有裁汰降級還級等官補授腹俸員闕者或原繫邊俸後改為腹俸者原閲邊俸若滿仍計邊俸例升若閲俸未滿以十日作十二日其前後兩任均屬邊地者應準合算如前任邊俸中間任腹俸後任邊俸兩任邊俸已隔者不準合算仍將十日作十二日算凡官員有同日到任者察照原任俸次題疏名次先後升補一升轉論俸扣算日期乾隆四年奏準內外官員均按到任日期較俸升轉如有離任事故者計日扣除外任官員於升任內論俸降補官員於降任內論俸均將前俸截扣調任官員準其通理前俸其舊任卸事以後新任未到之前或本身交代未清或因患病稽留時日及往返程塗候闕日期悉行扣除不準計算如有因承辦公事未竣一時不能赴任經該管官題咨到部所有留辦以後事竣以前日期仍準一例論俸一京員出差軍前升轉雍正十年奏準在京見任各官俸滿應升者除出差內地之員仍照例俟回京時引見補授外其往軍前效力辦事滿漢各官如論俸應升得闕後即行具題請㫖補授準照升任食俸升轉所遺之闕歸月分銓選俟回京時補行引見一府佐州縣閲俸十年引見乾隆十八年諭前令各省督撫保舉堪勝知府人員送部引見其劣者駮回優者已不次擢用至敕部記名者不過備數充用各省府佐州縣千有餘員其中悃愊無華者不見知於上司或有十年不調之嘆而庸才幸膺簡闕無他劣蹟者督撫亦未免茍且姑容殊非澄叙官方之道其各省同知通判及知州知縣內有本任閲俸十年以上者該部察明行文該督撫出具考語陸續送部引見著為例欽此遵㫖議準凡調任服滿裁汰回避等官雖非一任但一官已閲十年自應前後接算行令該督撫出具考語陸續送部引見其議降議革奉㫖留任及降革之後别補原官者皆繫棄瑕録用之人應於留任補任之後計算年月扣足十年再行調取各員任內有降革留任之案於疏內聲明引見其調取之員或題升推升及降革等事例應引見者或本員適有因公來京應引見者該督撫照例給咨引見將十年調取之處一並聲明其調取之後因事故離任者俟將來赴補到部之日引見至將來陸續期滿應行引見各官若逐員調取未免紛繁請嗣後定以三年之期調取一次庶辦理不致參差而遵行較為簡易一官員即升加級紀録順治年間定凡官員因勞績加級紀録不論俸滿即升各官除已經病故革職者不叙外見任官員準於見任注册降調終養丁憂候補者準於補授新任注册休致者準於原任注册如有解任議處等官俟事結之日别行議叙其已經升任各官應叙加級紀録亦準與升任注册如前任之功應準即升者於升任內準紀録四次此指已經升任而言如前經議叙即升尚未升任後復有前任之功應準即升者亦於升任內改為紀録四次此指已經議叙即升尚未升用又應議叙即升者而言又定內外官員前任得有紀録無論調任升任均準隨帶至所得加級除對品調補如調繁調簡或補之特㫖改調回避調類轉補如右轉左侍講轉侍讀郎中補科道之類並非升任者仍準隨帶新任注册如已經升任無論品級大小凡品級考內載應升者皆為升任均不準隨帶改為紀録一次雍正三年題準凡內外大小各官有降級留任者後奉恩㫖加級及議叙加級準抵銷前降之級六年奉㫖在京官員如有情願將議叙加一級改為紀録四次抵銷罰俸者準其抵銷特恩賞加之級不準改抵乾隆四年奏準升任之官前任所得恭遇恩詔及京察加級均不準隨帶改為紀録一次議叙加級題明隨帶者準其隨帶未經題明隨帶者不準隨帶改為紀録一次惟軍功議叙加級不論曾否題明隨帶悉準帶於新任至議叙加級改為紀録之後又經升任抵銷餘剩紀録若繫隨帶之級所改者仍準隨帶若非隨帶之級所改在任時抵銷過一次二次三次者升任槩行注銷若在任時所改紀録並未抵銷只準將紀録一次帶於新任至特恩賞加之級及捐納加級不準改為紀録四次抵銷罰俸至官員處分降級案件應將加級抵銷其有一人而加數級者無論是否隨帶均照加級年月先後次第挨順抵銷又奏準卿二大員議叙加級食俸後經升任如品級相同本無俸可加者仍食本身之俸如三品升至二品及二品升至一品均將食俸一級改為尋常加一級其三品升至二品已將食俸加級改為尋常加級若又經升任改為紀録一次八年諭向來在京八旗武職及外省駐防官員遇有罰俸案件準其將議叙加級改為紀録抵銷惟在外文武各官不在此例朕思大小臣工雖分職有內外之殊而以功抵過均屬一體嗣後外省地方文武各員有情願將議叙加級改為紀録抵銷罰俸者著照在京文武官員之例準其抵銷欽此十六年奏準內外滿漢各官革職後復經起用原屬棄瑕録用所有原任級紀自不應帶於新任其降職人員奉特㫖起用原官或起用之官優於所降之級者所有加級紀録亦不應準其隨帶若既照部議降補無庸將前任級紀復行注銷至官員緣事議革奉㫖降補他職者其罪原應革職而降補出自特恩與平常因公降調者不同其原任級紀亦應槩行注銷不準帶於新任十八年議準部議革職降調奉㫖從寬留任人員雖經部議究未離任與議革人員特㫖降補他職者有閒其任內級紀未便槩行注銷請嗣後內外各官有部議革職降調人員奉㫖從寬留任者其加級紀録準其隨帶即升卓異亦準其隨帶一官員通理前俸康熙三十九年奉㫖凡復職官員必果屬寃抑準復者通理前俸其餘一槩不準接算前俸乾隆五年奏準內外官員除丁憂裁汰告假補授後前任所食之俸並即升加級紀録均準通理隨帶外若緣事議處應降應革遇有恩詔免議及督撫糾參革職提問或公事罣誤降革後經本案審虛開復或欽奉特㫖以該員參處之案本屬寃抑復還原職者均準通理前俸即升加級薦紀等亦準隨帶其餘並非本案開復以及業經緣事降革奉㫖起用人員原繫曾經獲罪棄瑕録用與本繫寃抑開復者不同一槩不準通理前俸即升加級薦紀均不準帶又品大之官已經降級調補後經復還原職補用先降補任內所得即升加級亦不準帶七年覆準向例革職留任降級留任官員開復後其革職降級日期仍接算俸次但思革職留任官員既例不食俸其革職留任日期自應不準算俸至降級留任官員仍照降級食俸其開復後降級日期均準一并較算一官員停升順治十三年議準在京官員任內惟罰俸之案不行停升其别項參處事故均俟開復後再行升用在外官員任內凡有未完參處罰俸事故槩行停升十五年議準各官參罰皆據考功司移付文選司注册後經考功司開復移付文選司若文內年月款項與原付注册前件不符即取考功司原槀較對十六年議準官員被參被訐及因公罣誤議處等事考功司議覆未結雙月擬升之時文選司於十五日以前將應升各官見在有無議處開單付察考功司考功司於二十日察付如考功司移付注有見在議處字樣者即停升轉康熙三年議準內外大小官員除移送停其升轉者停升外其提問官員不候事結即停升轉又議準每月二十日截限截俸後雖有咨送開復者亦不準升乾隆七年議準月選官員均於二十日截限若官員議處之案在二十日以後續到者不行補付亦不停升轉其外官罰俸之案各省所完解銀均令每年按定四季呈報戶部戶部亦按季察核於督撫咨到之日起扣限二十日轉咨到部逐案察銷即準其照常升轉停其扣滿罰俸年限至二十日截俸後知照銀完解者亦不準升一推升離任雍正十三年議準直省推升之道府運同同知知州知縣等官不論何項出身均調來引見其推升之員由部代掣得闕之後具題開闕行文各該督撫將該員任內經手事務交代清楚出具考語給咨赴部引見補授後給憑令赴新任其知縣以下推升官員均毋庸引見由部具題開闕將文憑給發該撫察明任內交代清楚催赴新任又奏準應引見之升任官員其有因薦舉卓異引見後續經推升者由部察明該員引見未滿三年停其調來引見將文憑封發該撫令赴新任如已滿三年者仍令赴部引見一官員即升推升月分順治年閒定每年二月四月六月十月此四月先將不論俸滿即升之員如煙瘴苗疆之類次將不論俸滿升轉之官如押運議叙之類均各照日期先後推升知縣以上照奉縣以㫖日期注册知下照文到日期注册又次升卓異之官以上各官有同日奉㫖者則準俸深者先行升補若無此等官員仍將俸深之人升補八月十二月升授俸深之官此內有不論俸滿即升不論俸滿升轉卓異之官繫俸深者仍論俸升補即升等處不準隨帶一即升推升次序順治年間定京外官員推升如遇月分所出之闕均繫應升者悉按京外品級大小照品級考所載俸深者論俸次先後即升卓異者論即升卓異年月先後先盡京官次用外官京外相同者則以品級大小為序如品級又相同者則以品級考所載先後為序挨次坐升一科道內升外轉乾隆元年奉㫖科道內升外轉者俟得闕後再離原任其未得闕之先仍食原官之俸照舊辦事五年奏準內升外轉官均按品級考注册在任候補繫內升者候闕具題外轉者不必投候補之文驗到亦不必論己未隔五十五日於單月遇闕先補其未經得闕以前如遇丁憂告假降革事故後經服滿假滿開復遇有應升即準具題升補單月應轉員闕亦準即行轉補若一時無應升應轉之闕仍令其原官補用在任候升十六年諭科道近列臺垣優絀尤為易見自可不次擢用而定例內升外轉給事中則一年一次御史則一年兩次每逢奏請時自康熙雍正年間以至今日亦率降㫖停止者多每年徒增此題奏繁文於治理亦屬無益嗣後內升外轉著三年舉行一次永為定例欽此一捐納試俸實授康熙六十一年議準在內郎中以下小京官以上在外道府以下雜職以上均令其於見任內試俸三年方準照常升轉試俸三年實授之後仍接算試俸年月照常升轉不行扣除其從前捐納各官已滿三年者停其試俸未滿三年仍以從前到任日期接算試俸三年見任各官無論己未滿三年又照例捐升者仍令於升任內試俸三年均自到任之日扣算俸滿在內各部院堂官在外各該撫具題到日準其實授雜職教官免其具題止令咨部注册準其實授一額外署職實授順治年間定在京大小官員在部院行走未經坐補正額者俟坐補後方準算俸升轉額外之俸不準通算以實授後到任之日起雍正十二年議準命往試用道府以下州縣以上署職各官銜大闕小銜闕相當者試用一年銜小闕大者試用二年果能稱職該督撫將差委效力署印實在政績序入本內保題實授果繫卓越之才即不滿年限亦準聲明題請乾隆二年奏準佐雜署職官員亦按其銜闕分别試用一年二年果能稱職將差委署事勞績察核咨部準其實授附入月分彚題又定凡署職各官均俟本部覆準實授後再行論俸署職之俸不準通算以實授後到任之日起銜闕相當人員照闕升轉銜大闕小銜小闕大者仍照各原銜升補銜小闕大借署照銜升轉專指試用官員若見任官保題升署升補不在此例十年奉㫖各省要闕有一時不得合例之人該督撫題請越銜補授及升署者雖與定例未符尚因地方緊要或一時不得合例之人起見至署理之人辦理事務與見任無異自應照例俟年限滿日題請實授今署瓊州府之人試用年限未滿該督遽請實授繫有心博屬員之感以致違例辦理近來似此者頗多該督著飭行嗣後有似此者即著該部隨本一并察議欽此一無保舉人員升選康熙六年議準生員例監吏員出身等官經堂官及督撫保舉者方升京官及正印又議準由生員例監吏員出身之郎中員外郎主事無保舉者郎中以運同升補員外郎以運同府同知升補主事以府同知升補仍算京俸與應升人員較俸升轉在外官員由生監吏員出身者無保舉亦不準升京官及正印官乾隆四年議準在外官員如有曾經薦舉卓異一次及督撫指闕保題升用正印官一次者準其以保舉注册與應升京官及外正印官人員一同較俸照常升轉不必復行保舉至在京官員如曾經京察保舉一等一次及該堂官指闕保舉升補郎中員外郎一次者亦應準其以保舉注册照常升補至京官內如戶部寶泉局大使禮部會同館大使鑄印局大使兵部會同館大使刑部司獄五城兵馬司吏目鴻臚寺主簿鳴贊序班理藩院副使順天府照磨司獄大興縣典史宛平縣典史奉天府司獄承德縣典史雖算京俸無保舉人員亦準升除四年奏準八旗漢軍捐納即用人員朝考後方準補用八旗漢軍補用後不論何項出身一同升轉無保舉之例未經朝考者赴部之日由部請㫖照考試漢中書之例在午門內考試詩論恭候欽㸃大臣會同本部堂官閲卷擇其漢文通順字畫端楷者奏聞交部各按其班次銓選其文理不通不堪録取者俟下次考取後再行補用一升銜留任順治年間定凡加銜出自特恩無定秩其開列升轉仍照本任升轉雍正二年奉㫖擬定官員升往别省經督撫保題以升銜留任者必須實屬緊要其人其地必不可更易方許具題請㫖俟奉㫖準以升銜留任後即照升銜升轉如並非緊要一槩不許題留乾隆十六年諭江蘇巡撫奏稱元和縣知縣籤升貴州永寧州知州該員操守謹飭才具幹練懇以升銜暫留任遇有江省相當知州員闕酌量題補等語元和省會首邑既屬人地相宜以升銜仍留原任於理尚屬可行但既留任遇相當知州員闕即行題補又須離任仍於該地方未有裨益轉啓規避之端朕思守令久於其任可以勵官方而收實效既準豫升銜已合古增秩進階之義嗣後知縣籤升外省督撫奏留本任者俟留任五年後遇有相當之知州員闕題補如首郡知府升任道員該督撫題留者視此著為例欽此十八年諭據蘇撫奏丁憂服滿知縣前經推升貴州永寧州知州原任撫臣奏請以升銜仍留元和縣知縣任今回籍服滿來蘇應坐補原闕但該員籍隸山隂在五百里之內與例未符請令赴部别補等語著仍發往貴州以知州補用向來近省知縣內往往有任遠省而該督撫以人地相宜奏請升銜留任者雖因地方起見亦易啓規避之漸嗣後各省奏留人員內如遇丁憂事故起復之日皆令仍赴升任省分候補著為令欽此一推升知縣等官截取雍正十年議準應升知縣之教職以及經歷等官由部按其俸次最深任內無參罰案件及下第舉人補授教職按其科分名次輪班應選者酌量截取令該督撫詳加驗看擇其年力才具可勝牧民之任者出具考語給咨該員赴部照例升選與月選官一例考試引見補授其有年力就衰辦事平常自揣不勝縣令之任者該督撫咨部注册除正印官不準升用外其應升教職佐二等官仍照例升用至教職等官有題定三年或五年俸滿即升者該督撫報滿部議準其即升後給咨赴部仍照即升月分升用以上截取人員將次用完再行酌量截取倘離任後原任內有降罰事故均照離任官例議處將降罰之案帶於新任其俸次在前應截取之員見任內有參罰事件未獲截取續經銷案即補行截取仍較俸升用乾隆十七年奏準俸深應升之教職及經歷等官遇應行截取時令該督撫驗明人才堪勝民牧之任出具考語咨部注册在任候升俟掣籤得闕後行文該督撫給咨赴部引見一即升卓異丁憂候補康熙三十八年定凡外省官員本任內經督撫保薦即升卓異未經升用丁憂者起復赴補之日仍歸單月不入各項候補班次遇闕即補其卓異仍帶於新任乾隆七年議準官員曾經卓異即升未經升用緣事降革後本案審虛開復候補亦照丁憂候補之例畫一辦理一擬升擬選丁憂候補乾隆五年奏準凡各省見任官員推升得闕具題之後應調來引見如未經引見奉㫖補授適遇丁憂事故或緣事降革後經服滿開復俟赴部候補之時仍歸所升班次原繫即升者歸於即升月分先盡升用原繫俸深者歸於俸深月分先盡升用即以升班積算其督撫保題升用人員如已經奉㫖引見緣事離任者俟赴部候補之時引見或準其以升闕仍發往該省别行題補或歸於月分仍以原官候補之處請㫖遵行至佐雜教職例不引見如經部擬升擬選已經具題奉㫖補授該員適遇丁憂事故未及考試驗看到任及各省咨升佐雜等官本部已經議準彚題奉㫖補授該員適遇丁憂事故未及到任者將來服滿開復赴補均歸於應補班內悉照升闕選闕補用其有雖經擬升擬選尚未具題奉㫖及督撫咨升人員尚未彚題奉㫖者仍歸各原班選用八年奏準凡各省升署未經實授人員遇丁憂事故服滿開復赴部者無論己未到任均照試用人員之例令其赴原任省分交與該督撫遇闕酌量題署一京官降補順治年間題準三品以上降至正四品者以小四品京堂補用降至從四品者不補祭酒以正五品京堂借補仍支從四品俸乾隆四年奏準從四品內惟祭酒升轉甚優既不準其降補自不便照祭酒升轉應以從四品銜管五品京堂事遇有開列升轉列於各項五品京堂之先專以應升之四品京堂升轉如通政使司參議光祿寺少卿均繫正五品京堂而參議又繫光祿寺少卿應升之闕其由從四品借補者遇有開列列於通政使司參議之前專升小四品京堂遇有參議不行開列借補又奏準京堂降至正五品從五品者不補郎中員外郎各照依對品以堂官員闕補用如降正五品則以通政使司參議光祿寺少卿補用降從五品則以鴻臚寺少卿補用降至六品以下者並無堂官可補應停其補用四品以上京堂品秩優崇若降至六品以下補用司官與體制不合故停其補用五品京堂降從五品者亦不補員外郎以堂官用降從五品堂官有鴻臚寺少卿可補故仍不補員外郎如降至六品以下悉照所降之級與各項降官一例補用五品京堂降至六品以下均繫司官若一槩不準降補則降一二級即屬無官可補故仍準與各項降官一例補用其各項降官均照所降之級序補悉按品級考所載序補如降從五品以員外郎用降正六品以主事寺丞京府通判都察院經歷用降從六品以光祿寺署正補用之類惟降至從五品者不補鴻臚寺少卿繫堂官不便將司官降補降至正七品者不補大理寺評事太常寺博士評事博士與六品升轉相同故不準補降從七品者不補中書舍人中書亦與六品升轉相同故不補用降從九品者不補司務司務品級雖微升轉甚優故不準補均各照對品别官補用又五品京堂及翰銓科道謫官如遇大理寺寺丞一闕惟五品京堂謫官準其補用謫官寺丞應開鴻臚寺少卿由五品京堂降補未為從優故仍準補其翰銓科道謫官不準降補以對品别官用翰銓科道謫官若準補用寺丞則一經降補即得以鴻臚寺少卿先行開列升轉過優故不準補如已降至署正等官遇有寺丞仍準升轉俟升至寺丞後再行開列鴻臚寺少卿此外各闕均與各衙門降官一例按其品級較文到日期先後補用補用後亦與各項官員一同較俸凡遇應升槩準升轉至品級考所載京堂翰銓科道謫官寺丞開列升轉及謫官補用後推升之處仍準兼升如寺丞應升員外郎繫謫官又應開列鴻臚寺少卿署正應升主事繫謫官又應升用寺丞之類均仍準其兼升一外官降補順治年間定凡在外降級各官皆照所降之級遇相對員闕補授惟布政使降一級不補按察使借補正四品道員仍帶所餘之級運使降級不補道員通判布政使司經歷理問運判州同降級不補知縣佐二不應降正印無論何項出身均不準其補用凡降級官員內有例監生員吏員出身者不論有無保舉不補正印官均以對品别官補用前假繫佐二不降正印此繫無論正印佐二降級由例監生員吏員出身者槩不準補正印均以别官用若原繫正印官由正途出身如應降正印官仍應準補一道府不準改用部曹乾隆十四年奉㫖各省督撫於所屬道府內有不能勝任者或奏請調簡或勒令休致不得仍請以部曹改用此定例也朕思此等人員既以不能勝任經督撫奏請改補內部執例詰駮往返之間轉得遷延時日該員明知不能久留未免志意隳頽視同傳舍甚至縈情囊橐簠簋不飭於地方殊屬無益嗣後各督撫題奏改補人員務於本摺內分晰聲明或宜調簡或勒令休致其才具平常而年未衰老者或以同知降補皆著送部引見有違例仍請改用部曹吏部一面將該員議處一面行令離任毋致貽誤地方此本內山東巡撫所請改補之登州府知府著送部引見欽此一試用借補人員升轉降補乾隆二年奏準凡各省試用人員有大銜借補小闕小銜借補大闕者除小銜借補大闕照銜升轉外其大銜借補小闕之員如原銜繫候補候選捐納即用者準其照銜升轉如原銜繫考職捐職惟河工效力人員準照原銜升轉其各省試用之員均照見闕升轉若各該省有應題升咨升之闕與伊等職銜相當或在原銜以下者仍準該督撫酌量題咨升用至借補各員緣事降調除小銜借補大闕悉照原銜降調外其大銜借補小闕者惟候補候選捐納即用之人準照原銜降調其捐職考職者無論河工效力及各省試用人員皆照見闕降調其原有職銜準其於降補任內隨帶不準照銜升轉如見闕無級可降即行革任給與原銜休致不準補用一借闕候補乾隆四年奏準凡各省大銜借補小闕小銜借補大闕人員服滿開復赴部候補由部察明該員原銜如繫候補候選捐納即用例應照銜升轉者準其照原銜補用如繫捐職考職例應照闕升轉者均令其照闕補用至考職捐職人員惟借補河工者方準照銜升轉如緣事離任後經别補若仍留河工準河臣酌量補用如並不留工赴部候補亦照各省之例槩令照闕補用不準仍帶原銜此內有銜小闕大者即照原銜補用欽定大清會典則例卷九
