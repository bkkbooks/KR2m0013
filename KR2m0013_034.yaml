body:
  text: 户部疆理一京師順天府京縣二州五縣十有七順治初年定順天府領大興宛平京縣二通州昌平州涿州霸州薊州等州五良鄉固安永清東安香河三河武清寶坻順義密雲懷柔房山文安大城保定平谷遵化玉田豐潤等縣十有九康熙十五年升遵化縣為州仍隸順天府雍正四年以玉田豐潤二縣改隸永平府乾隆八年改遵化州為直隸州領玉田豐潤二縣屬直隸雍正九年設寜河縣隸順天府一盛京奉天府府一京縣一州四縣七天命十年自遼陽遷都盛京所屬有蓋州海州錦州金州等州及鐵嶺遼海等衛順治十年設遼陽府附府為遼陽縣改海州為海城縣並隸府治十四年設奉天府罷遼陽府為遼陽縣屬奉天府康熙元年改錦州為錦縣隸奉天府三年以附京首邑為承徳縣設開原鐵嶺二縣改蓋州為蓋平縣並隸奉天府是年設廣寜府並廣寜縣寜逺州四年於錦縣增設錦州府治縣為附郭改廣寜府為廣寜縣隸錦州府雍正七年升承徳縣為直隸州十一年設復州隸奉天府設義州隸錦州府十二年改金州為寜海縣隸奉天府乾隆七年改直隸承徳州仍名縣一直隸省兼管順天府所屬州縣府九直隸州六州十有六縣一百十有二順治初年定保定府領祁州易州安州三清苑附郭滿城安肅定興新城唐博野慶都容城完蠡雄束鹿髙陽新安淶水深澤等縣十有七永平府領灤州一盧龍附郭遷安撫寜昌黎樂亭等縣五河間府領景州滄州二河間附郭獻阜城肅寜任邱交河寜津吳橋故城東光青静海南皮鹽山慶雲等縣十有五正定府領晉州冀州趙州深州定州五正定附郭獲鹿井陘阜平欒城行唐靈壽平山元氏贊皇無極藁城新樂南宮新河棗强武邑衡水栢鄉隆平髙邑臨城寜晉武强饒陽安平曲陽等縣二十有七順徳府領郉臺附郭沙河南和平鄉廣宗鉅鹿唐山内邱任等縣九廣平府領永年附郭曲周肥鄉雞澤廣平邯鄲成安威清河等縣九大名府領開州一元城附郭大名南樂魏清豐東明長垣内黄等縣八康熙三十二年改宣化衛舊隸山西為宣化府領延慶保安州二宣化附郭赤城萬全龍門懷來蔚西寜懷安等縣八雍正二年升天津衛為直隸州領青静海二縣升晉州為直隸州領無極藁城二縣升冀州為直隸州領南宮新河棗强武邑衡水五縣升趙州為直隸州領栢鄉隆平髙邑臨城寜晉五縣升深州為直隸州領武强饒陽安平三縣升定州為直隸州領曲陽一縣三年以大名府屬内黄縣改隸河南四年以河南磁州改隸廣平府六年以山西蔚州改隸宣化府九年升天津直隸州為天津府設天津縣附郭於舊屬二縣外以河間府屬之滄州一州南皮鹽山慶雲三縣並歸府治十一年升易州為直隸州以保定府屬之淶水並新安廣昌二縣皆隸州屬十二年以直隸晉州及無極藁城二縣仍隸正定府屬以保定府屬之深澤縣改隸定州乾隆二年改山海衛為臨楡縣隸永平府十一年改慶都縣為望都縣二十二年裁蔚縣歸幷蔚州一山東省府十州十縣九十有三順治初年定濟南府領徳州泰安州武定州濱州沂州五歴城附郭章邱鄒平淄川長山新城齊河齊東濟陽徳平禹城臨邑平原陵長清新泰萊蕪肥城陽信海豐樂陵利津霑化蒲臺青城商河等縣二十有六兗州府領濟寜州東平州曹州三滋陽附郭曲阜寜陽鄒泗水滕嶧金鄉魚臺陽穀汶上壽張嘉祥東阿平隂郯城費曹鄆城單城武定陶鉅野等縣二十有三東昌府領臨清州髙唐州濮州三聊城附郭堂邑博平茌平清平莘冠邱館陶㤙夏津武城范觀城朝城等縣十有五青州府領莒州一益都附郭臨淄博興髙苑樂安夀光昌樂臨朐安邱諸城沂水蒙隂日照等縣十有三登州府領寜海州一蓬萊附郭黄福山棲霞招逺萊陽文登等縣七萊州府領平度州膠州二掖附郭濰昌邑髙密卽墨等縣五雍正二年升㤗安州為直隸州領東平州一長清新㤗萊蕪肥城四縣升武定州為直隸州領陽信海豐樂陵三縣升濱州為直隸州領利津霑化蒲臺三縣升沂州為直隸州領郯城費二縣升曹州為直隸州領曹定陶二縣升濟寜州為直隸州領嘉祥鉅野鄆城三縣七年裁直隸濟寜州仍隸兗州府十二年升直隸武定州為武定府於所屬三縣外更設惠民縣裁直隸濱州隸府治並将濱州所屬之利津霑化蒲臺三縣均隸府屬其濟南府所屬青城商河二縣亦改隸武定府又升直隸沂州為沂州府於所屬二縣外設蘭山縣附郭並將舊隸青州府之莒州曁沂水䝉隂日照三縣改隸沂州府是年青州府增設博山縣登州府增設榮成縣海陽縣十三年升直隸泰安州為泰安府於所屬三縣外設㤗安縣附郭並将兗州府屬之東平州東阿平隂二縣改隸泰安府又升直隸曹州為曹州府於所屬二縣外增設渮澤縣附郭並將東昌府屬之濮州范觀城朝城兗州府屬之鄆城單城武鉅野等縣改隸曹州府一山西省府九直隸州十州六縣八十有九順治初年定太原府領岢嵐州平定州代州忻州保徳州五陽曲附郭太原楡次太谷祁徐溝清源交城文水嵐興樂平壽陽盂五臺繁峙崞定襄靜樂河曲等縣二十平陽府領蒲州解州絳州吉州隰州霍州六臨汾附郭洪洞浮山趙城岳陽曲沃翼城靈石太平襄陵汾西臨晉榮河萬泉猗氏安邑夏平陸芮城垣曲聞喜絳稷山河津鄉寜大寜蒲永和等縣二十有八潞安府領長治附郭長子屯畱襄垣潞城壺關平順黎城等縣八汾州府領永寜州一汾陽附郭孝義平遙介休石樓臨寜鄉等縣七大同府領渾源州應州二大同附郭懷仁山隂廣靈靈邱馬邑等縣六直隸澤州領髙平陽城陵川沁水等縣四直隸沁州領沁源武鄉縣二直隸遼州領和順楡社縣二雍正二年升蒲州為直隸州領臨晉榮河萬泉猗氏四縣升平定州為直隸州領樂平壽陽盂三縣升代州為直隸州領五臺繁峙崞三縣升忻州為直隸州領定襄静樂二縣升保徳州為直隸州領興河曲二縣升解州為直隸州領垣曲安邑夏平陸芮城五縣升絳州為直隸州領稷山河津襄陵三縣升吉州為直隸州領蒲鄉寜二縣升隰州為直隸州領汾西大寜永和三縣三年設寜武府寜武所改設領寜武附郭神池神池所改設偏關偏關所改設五寨五寨所改設四縣設朔平府大同府地分設領朔州一右玉附郭大同右衛改設左雲大同左衛改設平魯平魯衛改設馬邑四縣是年設陽髙天鎮二縣均衛改隸大同府七年以屬絳州之襄陵縣仍隸平陽府以隸解州之垣曲縣改隸絳州以屬平陽府之聞喜絳縣均隸絳州是年升直隸蒲州為蒲州府於所屬四縣外増設永濟附郭虞鄉二縣升直隸澤州為澤州府於所屬四縣外增設鳯臺縣附郭是年又以屬絳州之興縣仍隸太原府九年以屬隰州之汾西縣仍隸平陽府以屬吉州之蒲縣改隸隰州一河南省府九直隸州四州六縣九十有九順治初年定開封府領鄭州禹州陳州許州四祥符附郭陳畱杞通許尉氏洧川鄢陵中牟陽武封邱蘭陽儀封滎陽滎澤河隂汜水密新鄭商水西華項城沈邱太康扶溝延津濬滑原武臨潁襄城郾城長葛等縣三十有二歸徳府領睢州一商邱附郭寜陵鹿邑夏邑永城虞城柘城考城等縣八彰徳府領安陽附郭湯隂臨彰林武安渉等縣六衛輝府領汲附郭新鄉獲嘉淇輝等縣五懷慶府領河内附郭濟源修武武陟孟溫等縣六河南府領洛陽附郭偃師鞏孟津宜陽登封永寜新安澠池嵩盧氏等縣十有一南陽府領鄧州裕州二南陽附郭南召鎮平唐泌陽桐栢内鄉新野淅川舞陽葉等縣十有一汝寜府領信陽州光州二汝陽附郭正陽上蔡新蔡西平遂平確山羅山光山固始息商城等縣十有二直隸陜州領靈寶閿鄉二縣直隸汝州領魯山郟寶豐伊陽四縣順治十六年裁南陽府屬之南召縣雍正二年升鄭州為直隸州領滎陽滎澤河隂汜水四縣升禹州為直隸州領密新鄭二縣升陳州為直隸州領西華項城沈邱太康四縣升許州為直隸州領臨潁襄城郾城長葛四縣升光州為直隸州領光山固始息商城四縣是年以開封府屬之滑縣改隸衛輝府三年以開封府屬之延津縣濬縣改隸衛輝府以直隸大名府屬之内黄縣改隸彰徳府十一年改直隸鄭州禹州仍隸開封府所屬滎陽滎澤河隂汜水密新鄭等縣並隸府治十二年升直隸陳州為陳州府於所屬四縣外増設淮寜縣附郭並領開封府屬之商水太康扶溝三縣十三年復設南召縣隸南陽府一江南江蘇省府八直隸州三州三縣六十有一順治二年定江寜府領上元江寜附郭二縣句容溧水溧陽江浦六合髙淳等縣八蘇州府領太倉州一吳長洲附郭二縣崑山常熟吳江崇明嘉定寶山等縣八松江府領華亭附郭上海青浦等縣三常州府領武進附郭無錫江隂宜興靖江等縣五鎮江府領丹徒附郭丹陽金壇等縣三淮安府領邳州海州二山陽附郭鹽城清河安東桃源宿遷睢寜贛楡沭陽縣九揚州府領髙郵州泰州通州三江都附郭儀徴興化寶應如臯㤗興海門等縣七直隸徐州領蕭碭山豐沛等縣四順治十三年以華亭縣分設婁縣雍正二年以蘇州府屬之太倉州分設鎮洋長洲縣分設元和崑山縣分設新陽常熟縣分設昭文吳江縣分設震澤松江府屬之華亭縣分設奉賢婁縣分設金山上海縣分設南滙青浦縣分設福泉旋歸幷青浦常州府屬之武進縣分設陽湖無錫縣分設金匱宜興縣分設荆溪江寜府屬之溧陽縣改隸鎮江府是年升邳州為直隸州領宿遷睢寜二縣升海州為直隸州領贛楡沭陽二縣升太倉州為直隸州領鎮洋崇眀嘉定寶山四縣升通州為直隸州領如臯㤗興縣二海門鄉一九年以淮安府屬之山陽縣分設阜寜揚州府屬之江都縣分設甘泉十一年升直隸徐州為徐州府於所屬四縣外増設銅山縣附郭並以邳州曁所屬宿遷睢寜二縣均隸府治一江南安徽省府八直隸州五州四縣五十有二順治二年定安慶府領懷寜附郭桐城潛山太湖宿松望江等縣六徽州府領歙附郭休寜婺源祁門黟績溪等縣六寜國府領宣城附郭寜國涇太平旌徳南陵等縣六池州府領貴池附郭青陽銅陵石埭建徳東流等縣六太平府領當塗附郭蕪湖繁昌等縣三廬州府領無為州六安州二合肥附郭廬江舒城巢英山霍山等縣六鳯陽府領壽州宿州潁州亳州泗州五鳯陽附郭臨淮懷遠定逺虹靈壁潁上霍邱太和䝉城盱眙天長五河等縣十有三直隸和州領含山縣一直隸滁州領全椒來安縣二直隸廣徳州領建平縣一雍正二年升潁州為直隸州領潁上霍邱二縣升亳州為直隸州領太和䝉城二縣升六安州為直隸州領英山霍山二縣升泗州為直隸州領盱眙天長五河三縣十一年増設鳯臺縣隸鳯陽府十三年升直隸潁州為潁州府於所屬二縣外増設阜陽縣附郭並以亳州曁所屬太和䝉城二縣均隸府治一江西省府十有三州一縣七十有七順治五年定南昌府領寜州一南昌新建附郭二縣進賢奉新靖安武寜豐城等縣七饒州府領鄱陽附郭餘干樂平浮梁徳興安仁萬年等縣七廣信府領上饒附郭玊山弋陽貴溪鉛山廣豐興安等縣七南康府領星子附郭都昌建昌安義等縣四九江府領徳化附郭徳安瑞昌湖口彭澤等縣五建昌府領南城附郭新城南豐廣昌瀘溪等縣五撫州府領臨川附郭金溪崇仁宜黄樂安東鄉等縣六臨江府領清江附郭新淦新喩峽江等縣四吉安府領廬陵附郭泰和吉水永豐安福龍泉萬安永新永寜等縣九瑞州府領髙安附郭新昌上髙等縣三袁州府領宜春附郭分宜萍鄉萬載等縣四贑州府領贑附郭雩都信豐興國㑹昌安逺長寜龍南定南寜都瑞金石城等縣十有二南安府領大庾附郭南康上猶崇義等縣四乾隆二十年升寜都縣為直