供戶族宗圖原領號紙詳報督撫於半年內具題請襲由部核對無異題明準襲後將襲替職銜繕入號紙給發如有事故稽遲不能請襲者於半年限內咨部存案日久亦準承襲其不於限內咨部有案者日久不準承襲承襲之人有宗派不清頂冒凌奪各弊察出革職具結之鄰封土官照例議處一議敘順治初年定土官效力勤勞並投誠之後能殺賊拒逆平定地方者督撫具奏優加升賞康熙十一年題準土官徵解錢糧全完者督撫奬賞銀牌花紅二十二年議準滇黔土官無論逃人逃兵叛屬擒獲六十名者加一級數多者遞準加級不及六十名者督撫量加奬賞雍正四年覆準土官土目有隨師效力應議敘之人止就原職加銜如宣慰使司宣撫使司安撫使司則有各司使副使同知僉事等銜招討使司則有招討使副招討使長官司則有長官副長官等銜指揮使司則有指揮使同知僉事正千戶副千戶百戶等銜均照原官品級以次升授遞加至宣慰使指揮使而止如有餘功準其隨帶仍令以本職管事及襲替時亦止以原世職承襲又議準土官能約束土衆擒勦盜賊一應案牘於一年內全結者督撫具奏加一級一年內完結過半者督撫量加奬賞五年覆準各省土官有實心效力擒獲姦匪者照內地文武官擒獲盜首之例加級紀録其立有軍功奉法守職者均照原題以次加銜賞賜朝衣一議處康熙八年覆準野苗虜掠百姓該管土官隱諱不報者降二級留任十年題準土官互相殘殺能自悔過和息者免議十一年題準土官嚇詐部民恣意侵害者革職十四年議準土官不食俸有罰俸降俸之案皆免其處分其因公罣誤應降一級二級三級調用者止降一級留任降四級五級調用者止降二級留任應革職者降四級留任二十一年議準土官緝獲旗下逃人照例解部獲逃兵叛屬解督撫懲治照例安插如該土官地方失察逃人一名或被别土官擒獲或逃人供在某土官處審實將土官降一級知情藏隱者革職三十年題準土官凡有欽部案件奏銷錢糧遲誤之處均照流官例處分但土官不食俸如遇罰俸降俸降級等事均按其品級計俸罰米每俸銀一兩罰米一石移貯附近常平倉以備賑荒四十三年題準黔楚頑苗生事聚衆不及五十人者百戶寨長各罰俸六月五十人者罰俸一年百人者革職百人以上者革職杖責四十不準折贖知情不禁止者革職枷示一月杖責如前不準折贖若商謀指使意在分肥者照首犯治罪四十四年議準凶苗伏草捉人枷肘在巢勒銀取贖所管土官失察者每案罰俸六月積三案革職知而不禁者革職杖四十不準折贖若商謀指使意在分肥者革職枷三月不準折贖其外委無品級俸祿土官遇有捉人勒贖之案杖四十黜革别選雍正二年諭各處土官鮮知法紀所屬土民每年科斂較之有司徵收正供不啻倍蓰甚至取其馬牛奪其子女生殺任情土民敢怒而不敢言莫非朕之赤子而土民獨使向隅朕心深為不忍然土官之敢於恣肆者大率皆漢姦為之指使或緣事犯法避罪藏身或積惡生姦倚勢橫行此輩粗知文義為之主文辦事教之為非無所不至嗣後督撫提鎮務嚴飭所屬土官愛惜土民毋得濫行科斂如申飭之後不改前非一有犯事土官參革從重究擬漢姦立置重典切勿姑容寬縱以副朕子惠元元遐邇一體之至意欽此四年議準土官不遵法度故縱苗猓為盜劫殺虜掠男女財物擾害土民者該督撫察出即題參革職别擇應承襲之人準其承襲至有養盜殃民怙惡不悛者該督撫據實題參嚴拏治罪或應改土為流及别立土官均請㫖施行十三年議準土官土人因公遠赴外省許呈明該管官轉報督撫給咨知會所到地方之督撫察核於事竣日給咨知會本省督撫均計程立限毋許逗遛有不行申報擅自出境者土官革職土人照無引私渡關津律杖八十若潛往外省生事為匪别經發覺者除實犯死罪外徒罪以上皆照軍人私出外境虜掠不分首從發邊遠充軍律治罪其本境及所到汛守官失察者罰俸降調有差乾隆七年議準土官管轄之熟苗為盜該土官明知故縱者革職養盜殃民者革職提問苗蠻聚衆行劫侵犯城池該土官實係失察者革職其人數無多尋常盜案限一年緝獲限滿不獲降一級留任獲日開復又議準苗夷在土官境內或犯命盜搶奪誘拐爭訟之案該土官準州縣移會狥隱不為解送者督撫題參革職擇其賢子弟承襲果正犯逃逸限年半緝獲無獲者咨參再限一年緝拏限滿無獲降一級留任能獲本案及别案凶犯者皆準開復若降級留任至五案者别襲若受賄隱匿不解送者革職提問不準親子承襲取其宗圖擇本支伯叔兄弟兄弟之子為夷衆所信服者題請承襲一改土歸流康熙四十五年覆準貴州平州六硐長官司楊武功貪殘參革復戀職不報其弟武勳襲替應改隸流官五十四年覆準寧谷長官司顧維傑貪虐民命訪拏參革改隸流官雍正五年覆準平浪長官司王秉乾杖責楊氏身死參革究擬改隸流官又覆準石阡土官安𢎞運婪贓不法參革改隸流官七年諭各處土司呈請改土歸流者朕皆不允屢降諭㫖甚明今據四川提督摺奏黃螂土司國保屢次具呈懇請題達且稱祖遺土地多被鄰封侵占兼之轄屬愚頑難以管教惟恐遺纍子孫所有四子倘得學習禮法猶可成人等語朕念該土司國保素知遵奉法紀自會勦米貼軍興以來隨營效力更為恭順其所轄土民亦無助逆惡蹟今屢次呈請改土歸流情辭懇切既於伊身及其子孫有益朕不忍違其所請著給與國保守備職銜並賞銀五千兩為立産安民之用其願居何處著該提督詢明悉心酌議善為安插俾其永遠得所以副朕懷欽此遵㫖議準黃螂土司國保給與守備職銜就近安插成都編入牌中永隸版圖又題準甘肅河州土司蘇成威凶橫不法題參革職遷往河南省城在提鎮駐劄地方安插改設流官管轄又題準甘肅西固土司黃登燭堅錯父子濟惡垊州土司趙廷賢朋比為姦番民不安住牧情願改土歸流將黃登燭堅錯所轄番戶田土歸西固撫夷同知管理趙廷賢所轄番戶田土歸垊州同知管理又題準四川雷波衛長官司一人因滇蠻陸氏不法案內參革改土歸流於善後事宜案內給與土千總職銜又覆準貴陽府屬中曹土司官劉崇恩撫綏無術擅鎖部苗溺職題參應改隸流官又覆準貴州洪番長官司洪邦貴抗違不法題參革職改隸流官八年題準四川天全六番土司抗違征調殘虐不法參革改土歸流九年覆準貴州把平寨長官司蕭來鳯縱僕謀死庭世亮題參革職改隸流官十二年覆準貴州蠻夷長官司副土官李慧濫刑虐民題參革職改隸流官十三年題準湖南上峝百戶向玉樹下峝百戶向梁佐茆岡千戶覃純一等自願改土歸流湖南大刺使百戶聞風慕義請一并改土歸流將茆岡千戶給以千總銜上峝等各百戶給以把總銜各給劄付並將各土辨編入本縣版籍又覆準四川酉陽土司冉元齡父子濟惡暴虐不法題參革職改土歸流家屬安插浙江乾隆二年諭湖廣土官覃慶永等既無防禦之責亦無管束軍人之任懇請辭職應準其請將土官裁汰但朕念其祖父曾經隨征效力不忍令其廢置著賞給千把總職銜準其子孫永遠承襲若有年力精壯情願隨營差操者準其食俸效用才具優長者著該管大員保題照武職例升轉其如何分别定例之處著該部定議具奏欽此遵㫖議準將添平所千戶五人指揮僉事一人均授以千總職銜鎮撫使一人吏目一人忠靖等隘百戶十有九人靖苗司土辨一人均授以把總職銜麻寮所千戶六人均授以千總職銜鎮撫司四人土辨一人櫻桃等隘百戶二十一人均授以把總職銜頒給劄付世襲仍令居住石慈二縣又覆準湖南忠峝土司等嚮化歸誠願入版圖將忠峝等處宣撫使三人忠路等處安撫使七人均授以千總職銜唐崖等處長官司四人百戶一人均授以把總職銜頒給劄付世襲十一年覆準雲南猛緬土司奉廷徵父子殘虐夷民題參革職將土司裁汰所屬地方改隸流官欽定大清㑹典則例卷一百十
