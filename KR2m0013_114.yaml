body:
  text: 兵部武選清吏司恩恤一封贈順治初年定滿漢武職恭遇恩詔一品至五品給誥命六品以下給敕命各官品級均以詔下之日為定八旗武職由都統等造册駐防官由將軍等造册緑旗營武職由督撫提鎮造册咨部核明給以封典滿漢公侯伯均封光祿大夫公妻封為公妻一品夫人侯妻封為侯妻一品夫人伯妻封為伯妻一品夫人仍分别一二三等八旗一品官封光祿大夫妻封一品夫人二品官封資政大夫妻封夫人三品官封通議大夫妻淑人四品官封中憲大夫妻恭人五品官封奉政大夫妻宜人六品官封承德郎妻安人七品官封文林郎妻孺人八品官封修職郎九品官封登仕郎緑旗營武職正從一品官封榮祿大夫妻一品夫人正二品官封驃騎將軍從二品官封驍騎將軍妻均封夫人正三品官封昭勇將軍從三品官封懷遠將軍妻均封淑人正四品官封明威將軍從四品官封宣武將軍妻均封恭人正五品官封武德將軍從五品官封武略將軍妻均封宜人正六品官封昭信校尉從六品官封忠顯校尉妻均封安人五年議準一品官封贈三代誥命四軸二三品官封贈二代誥命三軸四五品官封贈一代誥命二軸六七品官封贈一代敕命二軸八九品官止封本身敕命一軸九年議準官辨緣事革職者追奪誥敕婦人因夫與子受封者不許再嫁違者追奪誥敕照律治罪受封官妻因夫亡歸母家者準其父母領回繳還誥敕十年議準已經題封各官有將姓名履歷遺漏錯誤親身檢舉求增改者準揭內閣撰給又題準受封各官曽祖父母祖父母父母曽犯十惡姦盜除名等罪及經考察並緣婪贓革職者不準封其妻非禮聘正室或繫冉醮及娼優婢妾槩不準封十六年議準詔後緣事革職及軍政降調者不準封贈又題準為人後者應封繼祖父母父母如繼祖父母父母已經受封願將本身及妻室封典貤封本生父母者準其貤封康熙元年議準受封各官未領誥敕又遇恩詔請改新銜者不必具題揭送內閣改給已領者交還原軸亦準改給三年題準八旗武職封典舊隸吏部今改歸兵部職掌其品官封號仍用文銜六年議準八旗世爵年幼未朝者不封丁憂患病候補各官不在見任者不封緑旗營外委千總不封詔後致仕病故官準照原官封贈八年議準應封武職各官祖父母品級大於子孫者祖與父祖母與母各照祖父原官封贈祖父父繫文職移咨吏部祖父品級小者各照子孫官封贈命婦因子孫品級受封並加太字若已故及曾祖祖父在者不加又題準襲伯叔之爵者準封贈伯叔父母襲祖爵者仍封贈其父母凡封母者止封適母生母繼妻所生子謂其母曰生母繼母不準受封適母在所生母不得並封庶母之子謂其母曰所生母適母歿準封若適母已受封所生先歿者準其追贈父官大於子者適母以父官封所生母以子官封封妻者止封正妻一人正妻未封而歿應封繼妻者正妻準追贈繼妻止封一人九年議準詔後緣事革職後經還職者準給封贈十四年議準受封官將誥敕質當者革職如收藏不慎以致蠹蝕損傷或破壞汙及者皆罰俸六月其因水火盜賊燬失者免議均題準請補給十六年題準受封官因軍機獲罪及貪贓革職者所給誥敕皆追奪若祖父原有官未經受封後因子孫封贈者不追奪其因公罣誤革職者止追奪本身誥敕二十七年奏準各官受封每任內止封一次如受封後改任者照所改之職封贈升職加銜者照升職加銜封贈其受封之後並未升轉者雖有加級不準重封八旗武職升轉在詔前者不分己未到任均準封贈緑旗營武職不在此例四十二年議準因公罣誤革職官原領誥敕免其追奪雍正二年奏準緑旗營正七品官封奮力校尉妻封孺人二年覆準適母繼母生母準其並封其四品以下應封父母及本身妻室各官有願將本身妻室封典貤封祖父母者準其貤封二三品官貤封曾祖父母者請㫖定奪又議準八九品官止封本身不封妻室如願將本身封典貤封父母者準父母並封八品官母封八品孺人九品官母封九品孺人十三年十月諭朕登極恩詔內凡內外滿漢官自一品至九品均豫封贈所以錫類敷恩遂臣子顯揚之願勵移孝作忠之風也舊例丁憂官不得均邀封典朕思丁憂之人乃恪遵朝廷定制自盡其為子之情與廢黜在家告假回籍者不同况在任守制者皆得沾恩而丁憂之人轉不邀恩以榮顯其親情既可憫而理亦未協著該部各按其原官品級一並給與封典以成孝思欽此又諭凡官員丁憂守制者遇有恩詔例不準封朕前已降㫖加恩給與封典其養親回籍之人皆因父母年髙棄官歸養幸逮親存適逢曠典而亦格於成例不得請封情屬可憫著將回籍終養人員照原官品級一並給與封典遂其孝思欽此乾隆元年奏準各省額設提塘由武進士遴選充補者準豫封贈又覆準升遷卓異薦舉各官恭遇恩詔之日已離原任未到新任者均照原官品級給豫封典七年議準八旗休致官恩準食俸者照原官封贈二十年諭向來武職封階自二品至五品均得授為將軍此沿襲漢唐以來散官名號之謬也國家制度名實必取相孚今授鉞專征膺閫外之寄者始稱將軍而各省駐防則一品大員也乃以加之都守等辨名不正則言不順此甚無謂考宋制武職原有武功大夫武功郎等階今一品武臣既封大夫其二品至四品宜亦改稱大夫五品以下則皆改稱為郎但各冠以武字可耳令軍機大臣等擬定字樣候朕酌定載入會典以昭典制其從前已領誥敕亦不必追改欽此遵㫖擬定武職封階七等正一品從一品仍均封榮祿大夫正二品原封驃騎將軍今改為武顯大夫從二品原封驍騎將軍今改為武功大夫正三品原封昭勇將軍今改為武義大夫從三品原封懷遠將軍今改為武翼大夫正四品原封明威將軍今改為昭武大夫從四品原封宣武將軍今改為宣武大夫正五品原封武德將軍今改為武德郎從五品原封武略將軍今改為武略郎正六品原封昭信校尉今改為武信郎從六品原封忠顯校尉今改為武信佐郎正七品原封奮力校尉今改為奮武郎二十八年諭旗員武職有封承德郎文林郎者名義亦覺未當應照漢官武職之例六品改為武信郎七品改為奮武郎但漢官武職至七品而止所有旗員之八九品武職仍照舊制為修職郎登仕郎欽此一土司封贈康熙二十七年議準土司各官請封各督撫覆明具題各按品級準豫封贈一廕叙順治年間定凡遇恩詔錫廕領侍衛內大臣內大臣都統民公侯伯子男前鋒護軍步軍各統領副都統鑾儀使散秩大臣外省將軍都統副都統提督總兵官及加一品銜管副將事都督僉事管副將事副將管副將事者各廕一子入監讀書其廕監生未仕而歿或病廢者準其補廕補廕之後又歿及病廢者不準再補十八年議準凡應廕各官不在現任者不準豫廕康熙三年議準凡廕子入監必以適長子如無適長子或有而病廢及有别項職事則廕適長孫無適長孫則廕次子次孫無次子次孫則廕期親兄弟及期親兄弟之子孫無親兄弟及親兄弟子孫則遞及於功服緦麻兄弟及功服緦麻兄弟之子孫均按其倫序以次承廕該管官取具承廕之人年貌姓名文册及親供印結送部題廕得㫖後給以執照十年題準承廕子孫所生在詔前者準廕在後及族派疏遠者不準若本官曾遇恩詔已送子入監讀書後經升任又遇恩詔欲改廕者未仕監生準其改廕其先得恩監準其别送一子入監讀書至本官先遇恩詔廕子後緣事革職其所廕之子未仕停止已仕者不停止本身尚有微職及世爵者所得廕生亦不停止廕監生於承襲之後别授他職及中科目者不準補廕又題準八旗廕監必開明履歷送部察核有因叛逆牽連革職及永不叙用者皆不準廕雍正元年議準廕監生十五嵗以上者送國子監讀書二十嵗以上者咨送吏部分部學習有願在武職行走者照所得廕生品級隨旗行走外省各官廕生監生有願在家讀書者該衙門奏明仍報部注册又覆準武官將不應廕監之人送為廕監或廕監已經襲爵復行補送廕監或將年嵗未滿廕監生揑稱年滿咨送者皆罰俸一年該管佐領驍騎校各六月參領副參領各三月都統副都統各兩月二年議準八旗游牧察哈爾應得廕監生一例準廕有願在武職者準照品級食俸乾隆四年奏準補廕監生亦照承廕例準以詔前所生子孫題廕又詔後革職官復還原職者仍準還廕其别授他職者不論品級均準還廕凡原廕人别無事故者仍給原廕人如殘廢病故或别經出仕中式準將詔前所生子孫題請承廕五年議準奉天黑龍江寧古塔及游牧察哈爾廕生情願來京者令其隨旗行走不願來京者準在本處行走仍令該管官管轄各省駐防廕生不得援以為例七年議準八旗廕監不能以情由準其選子承襲次承襲者聲明承繼之子孫核明承繼日月在詔前者準豫題廕在詔後者不準一陳亡官恤典順治年間定八旗陳亡各官應得贈廕由部開列官階移咨吏部按品贈爵豫廕應得祭葬移咨禮部照例議給康熙十三年題準緑旗營武職陳亡均給以加贈提督總兵官各加贈三級副將參將各加贈二級游擊都司守備各加贈一級應得祭葬行文禮部議給雍正十二年議準緑旗營武職陳亡給廕向例三品以上均廕以守備四品至把總均廕以衛千總似無區别應將陳亡之提督總兵官廕子弟一人以都司用副將參將游擊廕子弟一人以守備用都司守備廕子弟一人以衛千總用千總把總廕子弟一人以把總用又議準陳亡各官應得難廕或因子殘廢不能承襲其孫雖生於題廕之後該督撫將未經請廕緣由核實聲明取具地方印甘各結送部準其補廕乾隆十四年覆準武職陳亡自提督至守備皆有加贈惟千總把總並無加贈同一捐軀死節應一例優恤以勵戎行千總把總陳亡者照守備例加贈一級一故官恤典順治年間定內大臣將軍都統前鋒護軍各統領副都統散秩大臣並休致一二品官病故具有遺本奉㫖交部察例具奏者移咨禮部議恤無遺本者據咨轉行九年議準提鎮任滿三年勤勞死事者均準加贈一級請㫖定奪其未經任滿及休致後病故者不準加贈移咨禮部議給祭葬康熙三年議準提鎮病故未經奉㫖察例具奏者其加贈祭葬均無庸議如奉㫖交部議奏者由部核明該提鎮任滿三年有無降罰之案逐一敘明應否加贈題請欽定副將充提督總兵官贈署都督僉事署都督僉事充提督總兵官贈都督僉事都督僉事充提督總兵官贈署都督同知署都督同知充提督總兵官贈都督同知都督同知充提督總兵官贈右都督右都督充提督總兵官贈左都督雍正二年題準左都督充提督總兵官者無可加贈其奉㫖交部議恤者由部將應否加贈宫保之處恭請欽定乾隆十八年議準凡武職加銜均行停止其故官應得加贈並準其加一級一恤賞陳亡官兵順治初年定出征陳亡八旗官兵各給恤賞都統一等子賞銀千二百兩二等子千五十兩三等子千兩一等男兼一雲騎尉九百五十兩前鋒護軍各統領副都統一等男九百兩二等男八百五十兩三等男八百兩一品官不管兵者如之參領一等輕車都尉兼一雲騎尉七百五十兩一等輕車都尉七百兩二等輕車都尉六百五十兩三等輕車都尉六百兩王府長史照三等輕車都尉例二品官不管兵者亦如之騎都尉兼一雲騎尉五百五十兩騎都尉五百兩不管兵輕車都尉品級官如之佐領四百五十兩雲騎尉四百兩貝勒司儀長不管兵騎都尉品級官如之散秩官三百五十兩雲騎尉品級官如之護軍校驍騎校六品官二百五十兩七品八品官二百二十兩護軍領催及執纛人二百兩驍騎百五十兩委署護軍統領副都統參領散秩官或世爵小及無世爵者各照本身應得陳亡恤賞外再加銀五十兩炮手百三十兩各部通事滿洲䝉古隨役並滿洲家下漢人充棉甲兵者均百兩漢隨役七十兩又定八旗兵丁陳前被傷者分别等第給賞一等傷給銀五十兩二等傷四十兩三等傷三十兩四等傷二十兩五等傷十兩若被遠炮中傷者一等至四等各遞減十兩五等減五兩滿洲䝉古隨役陳前被傷者一等傷給銀三十兩二等傷二十兩三等傷十兩四等傷五兩五等傷二兩五錢各部通事並滿洲家下漢人充棉甲兵者均照此例若被遠炮中傷者一等傷給銀二十兩二等傷十兩三等傷七兩四等傷五兩五等傷二兩五錢向敵人發炮被火藥誤傷者照隨役被傷例漢隨役人陳前被傷一等傷給銀二十一兩二等傷十四兩三等傷七兩四等傷四兩五等傷二兩被遠炮中傷者亦如之又定出征被傷殘廢之人除照陳亡恤賞例減半給賞外其雙目不見或兩手不能展動或兩足不能行走及聲啞者加銀三十兩若傷一目或兩目或一手不能展動或一足不能行走或兩耳聾者加銀十兩若手有一二指不能屈伸難以持弓或足瘸或齒折一半言語不清者不加至傷手一二指尚能持軟弓或傷足未瘸或折傷三四足指或折三四齒或一耳聾者照陳亡恤賞減半例再減銀十兩凡此等傷均令該旗都統副都統取具佐領驍騎校保結參領印結驗明由部分别具題照例給賞十二年議準八旗兵遠方出征除陳亡外有不服水土病故者恤銀二十兩康熙十三年題準緑旗營陳亡官兵各給恤賞提督賞銀八百兩總兵官七百兩副將六百兩參將五百兩游擊四百兩都司三百五十兩守備三百兩守禦所千總二百五十兩衛千總二百兩營千總百五十兩把總百兩馬兵七十兩步兵五十兩其官兵在陳受傷者分别等第給以恤賞一等傷賞銀三十兩二等傷二十五兩三等傷二十兩四等傷十五兩五等傷十兩十七年題準鄉勇及土兵助戰陳亡者照步兵例減半給賞陳前受傷者照各等第減半給賞二十二年題準出征病故文武各官三四品者賞銀五十兩五六品者賞銀四十兩七品以下賞銀三十兩又定出征病故官兵骸骨歸旗準其入城三十二年奉㫖凡在軍前受傷殘廢兵丁雖給一半陳亡恤賞但不得錢糧難以生理伊等雖不能執弓猶可行走著以看守南苑倉庫等處兵丁補用其曽為護軍校驍騎校猶可行走者著以各館廄長牧副補用乾隆五年諭朕覽兵部纂修則例內稱從前進藏出兵之官兵及受傷病故官兵所有豫借銀免其追還繫出自特恩未便纂為成例等語朕思兵丁捐軀行陳情實可憫其豫借銀理應豁免若必待特降諭㫖恐其中不無一二遺漏著為定例凡遇此等事該部即援例請免則恩恤之典可垂永久矣欽此六年奏準外委官陳亡照把總例給銀百兩又議準陳亡及在軍前受傷病故兵丁應得恤賞如無親屬承受者給銀二兩該督撫提鎮委官致祭七年覆準出征病故各官一二品提鎮皆有遺本應否恤賞向繫候㫖遵行至三品以下等官定例載有賞恤之條惟二品副將出征病故者獨無恤賞未免遺漏嗣後副將出征病故者準照三四品例賞銀五十兩一恤賞休退官兵順治年間定八旗武職六十以上乞休解任者察其所歷俸次及原效力處年分題請賞給半俸其年未至六十告病解任者不準內府佐領及王公府屬佐領並子弟襲職官員皆不準給雍正元年奉㫖國家保障封疆惟武臣是賴參將以上責任尤重其年老有疾不能料理以致營務廢弛者自難姑容但其間或有久任戎行曾著勞績者情亦可憫嗣後參將以上有老疾之人該督撫提鎮照例題參仍將從前行間效力之處核明奏聞朕酌量加恩以示篤念舊勞之意乾隆二年奏準老病乞休各官核明曾出征臨陳受傷得有功牌者請㫖令其原品休致給以全俸以養餘年其出征並未禦敵及無功牌者請㫖令其原品休致給以半俸又議準八旗兵丁曾在軍前得過軍功後因患病退伍或傷殘退伍及六十嵗以上年老退伍者交該都統等詳核驗實無論有無房産及子孫見在食餉者均每月給銀一兩米一斛以養餘年若在軍前行走並未出戰立有軍功者亦交該都統等核實如該兵既無房産又無子孫食餉無可倚藉者每月給銀一兩以養餘年盛京等處駐防兵止準給銀不給米以上應給養贍之退伍兵丁由各都統將軍副都統等報部由部每月彚奏若未經效力揑飾咨送及未至衰頺尚堪充伍之人希圖坐食錢糧揑稱有病傷殘年老退伍者本人鞭一百革退該管佐領驍騎校罰俸六月不行詳察之參領協領罰俸三月都統將軍副都統罰俸一月又議準緑旗營兵丁曽經行間效力後因年老辭退並無子孫食糧該督撫察明實繫不能養贍者報部準給守糧一分以養餘年又議準八旗兵陳亡及傷廢亡故人之妻子家無養贍者該參佐領驍騎校具結送都統咨部每月準給一半銀米保送不實者佐領驍騎校罰俸三月參領罰俸兩月都統副都統罰俸一月又議準緑旗營兵丁曾經出征效力身故之後其子幼弱不能充伍者月給銀五錢若親老妻寡無子者月給米三斗一旗員親隨兵名糧原定滿洲都統給親隨兵糧八名䝉古漢軍都統六名前鋒護軍各統領五名民公四名侯伯滿洲副都統三名䝉古漢軍副都統領侍衛內大臣大學士尚書左都御史子二名侍郎左副都御史學士通政使大理寺卿詹事王府長史前鋒護軍驍騎各參領男佐領均一名康熙六年覆準領侍衛內大臣給親隨兵五名內大臣二名十八年覆準散秩大臣給親隨兵一名雍正元年議準領侍衛內大臣職任綦重應照滿洲都統例給親隨兵八名前鋒護軍各統領有管轄兵丁之責應照䝉古漢軍都統例給六名每親隨兵一名給餉三兩每名每年給米十二石每石折銀一兩於領米時給發又議準步軍統領給親隨兵糧九名步軍翼尉四名協尉三名副尉捕盜官二名步軍尉一名均於額設步軍內撥給十一年議準旗員議給親隨兵均有定額如有額外多占者照虛冒兵糧例治罪該管上司不稽察揭報者照徇庇例議處乾隆元年覆準滿洲副都統原有親隨兵三名䝉古漢軍副都統原有二名前鋒護軍驍騎各參領原有一名今各酌增一名前鋒護軍驍騎各副參領前鋒侍衛原有一名今各酌增半名內府三旗參領等照例給以親隨兵以上各官所得親隨兵每名月給銀三兩米一石至八旗佐領並內府三旗佐領令於本佐領額兵數內各賞給一名以為養贍之資其文職如尚書侍郎等官兼管都統副都統事者準其兼支都統副都統親隨兵銀米郎中等官兼參佐領者準兼支參佐領親隨兵銀米都統副都統及參領兼佐領者不支佐領親隨兵銀米賞都統銜有職事者照漢軍都統等官支親隨兵銀米其止賞空銜不辦事者不準給額外都統副都統參領副參領等辦事者照額設官支給不辦事者不準給世爵男以上已有親隨兵若兼都統副都統參佐領職任者止給原官親隨兵銀米不得重支出差在外無養廉者準給有養亷者不準給一緑旗營武職親丁名糧康熙四十二年議準提督給八十名總兵官六十名副將三十名參將二十名游擊十五名都司十名守備八名千總五名把總四名均給與糧餉此外有將使令家人溷充兵額者嚴參議處雍正六年奉㫖康熙四十二年定例自提督以至千把總各給親丁名糧以為養贍家口僕從之需外此則不許一名虛冒夫有一武辨即有親丁此項名糧理應前後官辨接受者嗣後武職去任之時即將親丁名糧停扣不必募補留與接任之人八年奉㫖近聞武職各官若有外遷事故者於離任之日即將親丁名糧按數開除其住支銀米歸作截曠項下彚報充餉俟新任到日方許申報起支朕思署事之人由此涖彼不免往來車馬食用之費且各營署事多繫部發候補試用之人並無俸薪等項應為籌畫養贍之道嗣後武職去任之時其親丁名糧照舊存留不必歸入截曠項下其署事繫候補試用者準其全行支給若繫見任兼理者準支一半將一半留與本營以為修葺衙署增修什物之費如有動用之處每季造具文册申報該管上司察核又奉㫖提鎮以至千把總已給親丁名糧以資養贍今各省增設外委千把尚未議及其所辦者千把總之事而所食者仍止本身一分馬糧一應費用實有不敷著將外委千把總每人給與步糧一分即令其子弟家人頂食以資養贍倘有仍藉辦公名色扣剋兵餉滋擾地方者著該管官即行揭報指參十一年議準武職應得親丁名糧各按本地營伍將馬步守均勻配搭支食如繫馬步兼設之營馬步各半未設步者以一馬抵二步馬糧數多或馬八步二或馬七步三或馬六步四止設步守與馬糧甚少者以二步抵一馬止設守糧者或二守抵一馬或三守抵一馬或三守抵二步若於額定名糧之外多占者革職該管上司不稽察揭報者降三級調用又奏準管轄官兵之京口福州廣州將軍各給親丁名糧百分京口廣州副都統各給親丁名糧五十分福州副都統四十分乾隆三年議準武職親丁名糧原有額數至署任如何支食宜定條例如出師各官其名糧仍照本任全支所有署事之人繫候補試用者酌量議減署副將者減去十分給與二十分署參將者減去八分給與十二分署游擊者減去五分給與十分署都司者減去二分給與八分署守備者減去二分給與六分保題引見各官不免往來車馬之費準支本任名糧一半其一半扣存造報所有署事繫候補試用之人亦按所署之任酌減其見任兼理並遞行委署出師引見各員闕者原有本任名糧應支本任應得之數至升遷事故各官額設名糧並無人支所有署事繫候補試用之人準照署任全支繫見任遞行委署者亦照所署之任全支其最後委署之人繫見任兼理則於本任內全支署任內支一半其一半扣存造報若繫候補試用之人準其照數全支八年諭國家體恤臣工文武皆屬一體文職則給養廉武職則給親丁名糧以資養贍自康熙四十二年部議由提鎮以及千把核定數目之後復於雍正六年特奉皇考上諭令武職去任之時將名糧停扣不必募補即留與接任之人所以體恤之者更為周至是以武職親丁雖年年造册究繫虛名開載實無其人名實不符衆所共知朕思既為武職養廉即應改為養廉名糧將親丁姓名裁去毋庸虛造册籍其各省武職親丁名糧向來如何分别多寡今如何定例之處該部議奏欽此遵㫖議準各省兵丁額設馬步守多寡不齊其支食名糧各按額設之兵均勻搭配是以不能一致至從前造報兵馬册籍皆將親丁名糧開造虛名原屬名實不符嗣後遵㫖改為養廉名糧造報其外委千把例給隨糧一分亦歸入養廉名糧項下一例造報又議準武職親丁名糧與文職之養廉無異文職如遇降革留任養廉並不住支至武職降革留任者止給薪蔬馬料等項其名糧竟不準給辦公未免拮据嗣後大小武職官降革留任者照文職降革留任支食養廉之例準其支食名糧十五年議準扣存一半名糧原為修葺衙署增備什物之用嗣後官辨升遷離任時將每年動用及存剩各數造册交與新任仍申報該管上司察核於年終彚册報部至衙署有無修葺並增補什物等項見存若干亦分析造册與接任官明白交代土司一甘肅土司順治年間定河州指揮使一人指揮同知一人千戶二人指揮百戶一人狄道州指揮使一人岷州百戶四人洮州指揮僉事二人副千戶一人西寧縣指揮使三人指揮同知一人指揮僉事二人碾伯縣指揮同知四人指揮僉事三人試百戶二人平番縣指揮使三人指揮同知一人指揮僉