body:
  text: 八旗都統二戶口一編審丁册國初定各旗人丁三年編審一次又定旗員子弟俟十八嵗登記部册後方許分居如未及嵗擅自分居者議罰順治十七年題準凡官員子弟有職任者不拘定限嵗數準其分户康熙八年題準凡調補管别佐領者止準帶本家壯丁若將兄弟族中壯丁帶往者皆令按人數償還二十四年議準旗人家産原在一佐領者後雖分撥别旗仍令親族承受不論旗分四十七年奉旨嗣後八旗佐領轉調戶口之事悉令奏眀雍正四年覆準八旗壯丁自雍正元年編審後已屆三年傳知八旗都統盛京江寧等省住居滿洲蒙古漢軍將軍都統副都統各交與該佐領驍騎校領催等將新舊壯丁逐户編審造具清册並將編審之各佐領驍騎校領催姓名保結開送户部其未成丁及非正身良家之子弟並應開除人丁各該都統驗實開除其滿洲蒙古漢軍户下額丁皆令開清花名附載册內送部至烏喇捕牲人丁户部委旗員筆帖式前往編審若將未成丁及非正身之子弟假冒入册或將應入册及不應開除之壯丁隱匿開除在京將各該旗都統在外將各該將軍都統副都統以至領催悉行治罪五年覆準八旗人丁三年編審一次凡身及五尺者皆入册病故者開除各佐領造戶口清册二本一咨户部一貯該旗其户口册內開載一戶正户某人繫官開眀某官某人無官者開載間散某人上書父兄官職名氏旁書子弟及兄弟之子並户下人丁若干其各省駐防官兵以及外任文武各官子弟家屬皆令户部行文各該將軍督撫照此造册咨送俟各處册籍到齊各該旗附入各佐領册內鈐印報部存案以後三年編審均照此辦理七年覆準八旗正身壯丁每逢編審之年無論在京在屯年滿十五該管官細加察驗務無假冒方準入册應裁者亦必詳勘聲眀緣由注册送部至八旗漢軍勳舊佐領下若無正身可選驍騎兵丁之人即在户下拔用年滿十五亦令該管官逐名編審注册以備拔補八年奏準各省駐防將軍都統副都統等將所屬官兵壯丁數目察眀具奏不拘在京旗分佐領止據彼處壯丁數目均齊繫四旗駐防於四旗內均齊繫八旗駐防於八旗內均齊别造清册備核其簡選官員拔補領催驍騎即在均齊之旗分選拔在京之原旗分佐領仍照舊注册遇比丁之年咨送各該旗報部或五年十年滋生人丁又至多寡不齊再奏請均齊十三年議準八旗正身壯丁或寓親友或流落鄉屯向未入册補入本旗丁册內勒限六月首報其從前潛住盛京多年者即入於盛京册內約束當差若不呈眀該旗潛匿私往他處者照逃人例治罪該管參佐領並不行地方官察拏照例議處若從前並未居住盛京潛匿他省者勒令一年內自首押令歸旗免其治罪又定凡八旗在京官員兵丁間散别住户下人等均令該佐領給與印票開眀各年貌家口以備街道步軍尉察驗其在鄉屯之候選革職官員間散别住户下人等每户給與執照開眀年貌住址生業以備地方官察驗各佐領所給印票先送該參領編號鈐用關防每於嵗底封印後呈送都統貯庫備考乾隆元年覆準駐防休致革退官員因一時路費不敷本身先行歸旗者其妻子家口限一年內回京如逾限未回即令其子在該處充兵造入丁册不得於當差數年之後又請歸旗至寡婦家口從前在彼處倚子弟充兵度日京中充兵居官之子弟呈請接取寡婦情願回京者準將寡婦接取養贍其兄弟等家口不得一同歸旗再八旗官兵如年五十並無子嗣在京在外又無的屬承祧呈請將親兄弟之子孫調回者準其調回又駐防兵丁內從前撥往時原有父母兄弟在京後因年久户絶無人祭掃呈請回京承祀墳墓者行文該旗察眀京中果繫絶嗣準令一丁帶領家口歸旗承祀又奏準附入京城當差之察哈爾護軍驍騎人等所遺之缺行令察哈爾旗分選補其户口於察哈爾地方丁册內開除造入京城册內遇該佐領護軍校驍騎校員缺與該佐領人等一同簡選其子孫造入京城丁册三年諭前次自軍營徹回開户之領催驍騎內一等二等均著為正户别載册籍和通呼爾罕諾爾烏孫珠爾等處打仗陳亡開户之領催驍騎轉不能與彼一例伊等為國效力陳亡實屬可憫著交與八旗將此等陳亡開户之領催驍騎等子孫察眀亦著為正户與别載册籍之人照例選拔驍騎欽此又奏準附入各旗之投誠新舊厄魯特回子等於丁册內别行注眀其子孫與佐領下正身蒙古一體送補護軍校驍騎校及執事人役四年覆準八旗遇比丁之年將至十八嵗以上者核眀入册分注正户開户之下填載三代履歷其户下人之祖父繫何出身均於本名下注眀良家子弟均作正户分造鈐蓋印册二本一貯該旗一咨户部至各省駐防人員及外任旗員户口凡遇比丁之年亦照此辦理六年議準八旗編丁有以身及五尺造入丁册者有年至十八造入丁册者事不畫一今酌定身及五尺皆造入丁册以杜規避隱漏之弊其從前造入丁册之人已故者固宜開除如有逃亡賣出者編審之年亦應聲眀裁除如將應入册之壯丁隱瞞不行造入或將未成丁幼童編入丁册者核參交部議處又議準編審丁册如將不應入册之幼丁編入丁册或將應入册之壯丁遺漏者該佐領等官例有處分但旗下教養兵例於鰥寡孤獨之家拔取如因繫幼丁不準入册則業經關領錢糧之人丁册尚屬無名今酌議已食錢糧之人不論年嵗大小一并造入丁册以昭畫一八年奏準陵寢總管並奉祀禮部等處所屬旗人遇比丁之年造具丁册咨報該部該旗察核十一年奏準附入察哈爾旗之喀爾喀於比丁之年與察哈爾一例將丁册造報各該旗其入册之人遇有牛羊牧羣護軍領催牧丁缺準其補用一分晰户口國初定八旗户下壯丁首先登城者準其開户並將胞兄弟適伯叔帶出仍償給原主身價銀順治八年定原在盛京編審正户有告稱繫伊奴僕者不準歸並本繫户籍內人有告稱非伊家奴僕者亦不準出户九年議準內府三旗佐領內管領下官員有軍功勞績奉特旨令其開出內府佐領內管領者各歸上三旗旗下佐領五旗王公府屬即包衣有滿洲佐領有旗鼓佐領管領原與旗下佐領有間旗鼓佐領下人尤不得濫厠漢軍之例但繫盛京帶來自內府分出已經編入册籍者均準其與旗人一體考試選官其於本王公府屬曽經效力本王公準其開出管領下者止許移於府屬佐領惟著有軍功勞績或奉特旨或由王公奏準令其開出府屬佐領者各歸本王公所屬旗下佐領或歸上三旗旗下佐領其父兄子弟間散者準其帶出見有職任者不準帶出雍正二年覆準八旗開户義子人等不得越佐領認户仍留在本佐領下當差如有越佐領認户自稱正户與原主無涉者該旗都統即孥交該部從重治罪三年議準旗下奴僕或藉别旗名色買贖或自行贖身旗民册籍均無姓氏者察出即令歸旗其有隨主出差外任私有蓄積鑽營勢力欺壓本主贖身者雖在民籍究眀欺壓是實亦令歸旗若果繫數輩出力之人本主念其勤勞情願聼其贖身為民旗部有案可稽州縣有籍可據為民者仍歸民籍舊主子孫不得藉端控告七年諭佐領下滿洲少者恐廢佐領將户下滿洲及家生子開户人載入正户滿洲册內令充前鋒護軍者其情尚可原宥倘佐領下滿洲本多佐領知而作弊或將養為子嗣之漢人載入滿洲册內令補前鋒護軍理宜治罪再八旗見今開户人及養子補前鋒護軍者甚多若輩即與滿洲等矣其中亦有人去得漢仗好效力行間得厯官階者或佐領等懼罪不報伊等又恐黜退隱忍不首必且令刁惡之人致生訛詐控告等事著交八旗大臣等將朕此旨曉諭各旗佐領有將開户及養子拔為前鋒護軍者各將緣由報眀其開户及養子亦令從實自首並不革退伊等之前鋒護軍如有人去得行走好者有應升之處亦許列名既經開户即繫正户惟别載册籍俾得眀晰可免日後控告之端倘於此時隱忍不吐實情日後察出或被旁人首告從重治罪欽此十二年奏準八旗開户養子人等已補前鋒護軍領催者遵旨首出别載册籍其子弟及從前察核之時未得前鋒護軍領催已造入正户册內之開户養子亦應令各該旗再加察核分晰族支注眀何人之子孫每佐領下造册二本鈐印一存貯該旗一咨送户部備案將總數交直月旗彚奏此後如復有夤緣入正户册內者除治罪外仍載入開户養子册內其選拔前鋒護軍及賞給恩恤銀均照原奏之例遵行如别載册籍人內有軍前行走出衆者該旗大臣將緣由奏眀引見補授官職如遇比丁之年有應增裁之處亦如丁册一例編造十三年奏準八旗有民人冒入旗籍者照過繼民人為嗣例入於别載册籍內嗣後永不許民人冒入旗籍違者除本人治罪外保報之該管官一并交部議處又議準數年以來奉天來京歸旗居住者並不呈眀該管大員止告知佐領等官者甚多伊等身繫甲兵不嚮該管大員告假而來或在彼處妄行不法不能度日希圖僥幸來京亦未可定嗣後如有來京歸旗居住者令其呈報該將軍聲眀緣由用印文咨送來京該旗核實應令居住者奏眀令其居住乾隆三年議準盛京帶來奴僕原屬滿洲蒙古直省本無籍貫帶地投充人等雖有籍貫年逺難以稽察均準開户不得放出為民乾隆元年以前白契所買作為印契之人令在本主佐領下選補步軍俟三代後著有勞績本主情願放出為民者具呈本旗咨報户部核眀祖父姓名籍貫準其為民仍行文該地方官注册止許耕作謀生不準考試乾隆元年以後白契所買之人未入丁册者準其贖身為民四年議準國初俘獲之人年分已逺與投充之人迷失籍貫者無别至逺年印契所買奴僕內有盛京帶來及帶地投充之人原繫旗人轉相售賣雖有籍貫無從稽考均應開户不準為民此內有實繫民人印契內尚有籍貫可稽者照乾隆元年以前白契所買家人例效力過三代後準其為民又議準絶户家人本主尚有同族人等即編入族人户下無族人可歸不論家下陳人契買奴僕均準於本佐領下開户責令看守伊主墳墓年力精壯者準於本佐領下選拔步軍如內有乾隆元年以後白契所買之人情願贖身為民者準其贖身身價照絶户財産入官例辦理又議準八旗户下家人開户向由各該旗聲眀本主念其世代出力情願準其開户者該參領佐領族長族人列名具保咨部無論何項人等詳察上次丁册有名並册內注繫陳人者即準開户至旗下家奴放出為民向由本主念其數代出力勤勞年久情願放出為民呈本旗咨部轉行地方官收入民籍為民今既將盛京帶來奴僕及帶地投充人等並乾隆元年以前乾隆元年以後白契所買之人分别定例應行各旗將奴僕之祖父籍貫於一年限內令各主據實開報畫押參佐領核實呈都統送部凡遇比丁之年即照此次造册於編審內注眀遇有開户為民之案以便稽考至各省旗人俟文到日亦於一年限內造册送旗該旗核眀送户部覆核又議準乾隆元年以前放出為民之户有未經呈報旗部者該旗察出如果數代出力其主情願放出編入民籍地方官有册可據者準其為民如繫藉名設法贖身私入民籍者其主既得身價應令歸旗作為開户其放出為民未入民籍及入籍在乾隆元年以後之户亦令歸旗作為開户再設法贖身之户或繫自備身價或親戚代為贖身者皆應歸原主佐領下作為開户若繫實在用價買出隨又交價贖身者皆應歸買主佐領下作為開户如繫開户壯丁用價買出者買主原非正户正身其名下不應復有開户之人應仍歸原主佐領下作為開户又議準旗下家奴將民人之子抱養既經繼與家人為嗣即與家人無異應造入伊主户下以便稽察又議準八旗正户從前撫養並隨母改嫁適人或跟隨外任或在鄉居住未及呈報因未造入丁册或因丁册無名不準自首者總屬户口不清之人未便任其脫漏令各旗察眀分晰彚奏别行注册如有正户人之子其母改嫁於正户人或嫁於户下家人情願隨母撫養者將本人造入生父本宗册內若民間子弟自幼隨母改嫁於正户旗人者照户口不清例别行注册至户下家人之子隨母嫁於正户以及民間之子隨母改嫁於户下家人者統以户下造報嗣後遇有隨母改嫁人等參佐領即時確察呈報都統存案仍於編審之年注眀丁册咨户部察核又議準從前正户旗人之子自幼給與旗民正身及户下家人撫養呈請歸宗者該旗察實取具兩姓族長族人保結並該參領佐領印結送户部存案準其歸宗又議準八旗造報丁册內有向開正户一户後經造為開户人等或繫隨母改嫁或寄入親屬戶內原繫别立一户逮後被人欺壓造入户下作為開户原非户下家人可比準其呈旗察眀果有被人欺壓情弊分晰具奏咨部更正至從前造入户下後經造為開户並向來造為開户人等若果繫正身當時即應呈眀更正何至數十年之後待子孫分别此等停其更正以杜冒濫六年奏準八旗內無論從前投充及乾隆元年以前契買家奴果繫竈户察眀祖父姓名籍貫確有證據該管官出具印結詳報行文提解始準放出歸竈如有指稱竈丁抗違家主者照例治罪給主七年定王公之子孫間散宗室亦有分與府屬佐領者此等人原繫正身如不能養贍交本旗都統備補驍騎或交進上三旗內府存於公中不得鬻與旗下官員以良為賤至王公宗室自買旗下家奴原繫户下亦不得竄入正户册內以賤為良又定籍沒人丁凡繫旗人户下者均令旗人領買不得作為正戶及聼其贖身為民十二年奏準定例乾隆元年以前放出為民之户果繫伊主情願放出入籍年久者準其為民如乾隆元年以後始入民籍繫伊主念其勤勞情願放出者令歸旗作為伊主名下開户是念其勤勞願放為民之僕尚入原主户下今藉名設法贖身私入民籍者反入於佐領下作為開户似屬輕重不均除從前已經議結之案外嗣後或經首告或被察出其報眀旗部伊主得過身價者令歸原主名下作為開户若未經報眀旗部者無論伊主曽否得受身價均令歸旗仍作原主名下家奴不準歸入佐領下作為開户二十一年諭八旗别載册籍之人原繫開户家奴冒入正户後經自首及旗人抱養民人為子者皆令别載册籍至開户家奴皆繫旗人世僕因效力年久其主願令出户見在八旗及外省駐防內似此者頗多凡遇一應差使先盡正户正身簡選之後方將伊等選補伊等欲自行謀生則又身𨽻旗籍不能自由見今八旗户口日繁與其拘於成例致生計日益艱窘不若聼從其便俾得自謀生計著加恩將見今在京八旗在外駐防內别載册籍及養子開户人等均準其出旗為民其情願入籍何處各聼其便所有本身田産並許其帶往此番辦理後隔數年似此舉行一次之處候朕酌量降旨此內不食錢糧者即令出旗其食錢糧之人若一時遽行出旗於伊等生計不免拮據如何定以年限裁汰出旗交與該部會同八旗都統定議具奏欽此遵旨議準八旗别載册籍養子開户人等既恩準為民凡在京文武官署任者不準實授見任者遇旗員有闕停其升補如期屆應升應調俟漢官有闕作何升調交吏兵二部定議在外文武官即令改歸民籍所借各項官銀仍坐扣完結不準復借其中病故革退者原有應追應免之殊但既準出旗為民若復追欠項難免紛擾應一例豁免見在進士舉人生員翻譯進士舉人生員以及捐納之人需次待用者讀書子弟應試者如何收考録用交吏禮兵等部辦理間散人令各該旗詢眀情願入籍何處徑咨該地方官收入民籍造册咨户部存案至見食錢糧者如願退糧為民亦準一例辦理其見在當差者停其調選俟闕裁汰遇有婚喪等事優恤銀停其支給仍將姓名造册咨部備考借過庫銀照常坐扣完結不得找借病故者本身未完庫銀照例豁免其願退糧為民並革退兵丁未完庫銀以及代扣庫銀既令為民無錢糧可抵亦應一例豁免又别載册籍人內有具呈告退見食半俸半餉全俸全餉者亦有陳亡人父母妻室賞給半俸半餉者仍準支給以養餘年俟身後裁汰至孀婦期年半俸半餉毋庸支給養贍孀婦之教養兵亦停其拔補直省駐防官兵間散內别載册籍養子開户人等亦照此辦理令該將軍都統等就近詢眀願入何省民籍造册送旗存貯仍咨報户部轉行該地方官收入民籍又别載册籍人等典賣地畝及老圈地畝欽遵恩旨令其照常管業如有典賣者照例令其典賣與旗人永不準與漢人私相授受至見在官兵人等認買官地官房未經坐扣完結遇病故革退以及辭糧出旗如願交見銀準其交納無銀交納將房地繳回户部其扣過俸餉將所得租息扣除餘銀給還又開户人內有設法贖身經户部作為公中開户者若準一例為民誠恐漫無區别或交內務府莊頭名下作為壯丁或準其為民詳察根源會同户部分别請旨又議準正紅鑲紅鑲藍等旗漢軍四佐領下皆繫雍正六年自內務府撥出别載册籍之人此等遇闕裁汰後該佐領下並無應補之人請將此四佐領下見食錢糧者分撥該旗各佐領額外當差食餉所存正户俟有闕準其頂補外其餘别載册籍之人有闕陸續裁汰至此等佐領驍騎校仍令在旗當差如繫正户以旗員對品坐補如繫别載册籍俟屆應升之期交部辦理又諭見因八旗户口日繁已降旨將别載册籍及養子開户人內察其未食錢糧者各令出旗自行謀生外其見食錢糧者如何定限裁汰出旗著該部會同都統等議奏至宗室王公等府屬户口有因其效力年久據該王公等咨請撥附旗下佐領者見今八旗别載册籍及養子開户者悉經察眀辦理其宗室王公等府屬户口如仍舊準其撥附則旗人衆多不能遽得錢糧生計未免艱窘彼此均無禆益嗣後宗室王公等府屬户口撥附旗下佐領之處著停止再宗室王公等府屬户口滋生日繁該王公等養贍亦恐拮據著該宗室王公會同各該旗都統等將各府屬户口亦著察眀辦理一次此次辦理之後隔數年似此辦理之處候朕酌量降旨庶此項人等均得自謀生理該王公都統等即遵旨辦理欽此遵旨議準王公等府屬佐領有分給之滿洲盛京隨來滿洲烏喇滿洲辛者庫滿洲北京蒙古分給之漢人辛者庫漢人舊漢人旗鼓佐領下漢人别載册籍漢人匠役漢人校尉漢人投充漢人撫順漢人各名色不同嗣後應將分給之滿洲盛京滿洲烏喇滿洲辛者庫滿洲等仍留府屬佐領外其餘府屬佐領下各項人等酌計人數生息多寡將該王公等情願放出之人皆令出旗為民咨送户部注册自放出為民之後不得仍指伊主名色滋事擾纍地方違者各按所犯嚴行治罪二十二年奏準向例烏喇齊索倫逹虎里選取人材壯健來京者皆并入上三旗勿論勳舊世管佐領後皆遵旨改歸公中佐領今下五旗之佐領內既有并於上三旗當差之公中佐領嗣後烏喇齊索倫達虎里選取來京之人按其本處原繫某旗即入京城某旗公中佐領下如原繫鑲黃旗即入鑲黃旗原繫正紅旗即入正紅旗之類仍在上三旗當差不得并入王公所屬佐領下一閲選秀女順治年間定八旗滿洲蒙古漢軍官員正户軍士間散壯丁秀女每三年一次由户部行文八旗二十四都統直𨽻各省八旗駐防及外任旗員將應閲女子年嵗由參領佐領驍騎校領催及族長逐一具結呈報都統彚咨户部户部奏準日期行文到旗各具清册委參領佐領驍騎校領催族長及本人父母或親伯叔父母兄弟兄弟之妻送至神武門依次序列候户部交內監引閲有記名者再行選閲不記名者聼本家自行聘嫁如有事故不及與選者下次補行送閲未經閲看之女子及記名女子私相聘嫁者自都統參佐領及本人父母族長皆分别議處有殘疾不堪入選者由族長領催驍騎校佐領具結呈報都統聲眀緣由咨户部奏聞康熙年間定閲看秀女時有繫后族近支及母族繫宗室覺羅之女者均聲眀雍正五年奉旨八旗秀女閲選畢將記名數目請旨覆閲其八旗記名三品以下官員之女每月賞銀一兩如記名過五年退出名者著加恩賞銀二十兩在五年內退出名者即停其每月賞銀乾隆三年奏準選秀女時該佐領等取具族長確實保結參佐領等再加詳察如有隱瞞别經發覺隱瞞之人繫官革職繫平人交刑部治罪族長及該管官領催等分别知情不知情議處治罪當選時如遺漏未曽傳知繫佐領驍騎校領催遺漏將佐領驍騎校議處領催鞭責族長家長免議若族長遺漏繫官議處兵丁鞭責不行詳察之佐領驍騎校議處領催鞭責家長免議其在屯之秀女該佐領驍騎校差領催前往稽察如有隱瞞遺漏等弊將差往之領催照在京族長例議處其京城之族長及該管官除知情扶同隱瞞及遺漏不行傳知仍與京城一例處分外草率具結之在京族長該佐領驍騎校比照京城例減一等處分此等隱瞞遺漏情由如該管官事後察出首報將該族長家長照例處分該管官減二等議處族長家長於事後出首將族長家長及該管官減二等議處其有頭面肢體殘病之女令家長同族長報眀該管官送都統等驗眀報部違者家長族長繫官議處兵丁鞭責該管各官免議事後自首者家長減一等處分族長免議五年奉旨三年一次閲選秀女時有事故遲誤及下次閲時又有事故則候至數年有誤婚嫁嗣後閲選秀女時遇有事故不及閲選之秀女年未及嵗尚可候者著候下次閲選若十八嵗以上至二十嵗至閲時又遲誤不及閲選者著該旗都統核眀遲誤緣由具奏或補行再閲或聼其適人别降諭旨又議準八旗秀女例應三年一次户部請旨閲選移咨八旗造册送部照內府選秀女之例俟選後再行聘嫁遇有事故不得閲選俟下次閲選其未經閲選者雖至二十餘嵗亦不準私行聘嫁有違例不待閲選即行聘嫁者該旗都統察參照例治罪六年奉旨嗣後閲選秀女無論大小官員及兵丁每女子各賞車價銀一兩今嵗看過者皆令補給著動用户部廣儲司庫銀八年奉旨選秀女時外任旗員之女若槩令送京閲看路塗遙逺不免往返跋涉之勞嗣後外任文官同知以下武官遊擊以下之女停其送閲十一年奏準選秀女時由京師補授各省將軍都統副都統之女從前既經赴京閲看者仍令其送閲外至各省駐防協領等官之女從前並未曽赴京者仍無庸送閲十二年奉旨應閲秀女於未閲之前私與宗室王公結姻者將母家照隱瞞秀女例議處或雖經王等奏請而母家未曽許字者免議一漢軍改歸民籍乾隆七年諭八旗漢軍自從龍定鼎以來國家休養生息户口日繁其出仕當差者原有俸餉足資養贍苐間散人多生計未免艱窘又因限於成例外任人員既不能置産别居而間散人即有外任親友可依及手藝工作可以别去營生者皆為定例所拘不得前往以致袖手坐食困守一隅深堪軫念朕思漢軍其初本繫漢人有從龍入關者有定鼎後投誠入旗者亦有緣罪入旗與夫三藩户下歸入內務府王公府屬撥出者以及召募之炮手過繼之異姓並隨母因親等類先後歸旗情節不一其中惟從龍人員子孫皆繫舊有功勳閲世既久自無庸再議更張其餘各項人等或有廬墓産業在籍者或有族黨姻屬在他省者朕意欲稍為變通以廣其謀生之路如有願改回原籍者準其與該處民人一例編入保甲有不願改入原籍而外省可以居住者不拘道路逺近準其前往入籍居住其有原籍並無倚賴外省亦難寄居不願出旗仍舊當差者聼之所有願改歸民籍與願移居外省者無論京外官兵間散皆限一年內呈眀本管官具奏如此屏當原為漢軍人等生齒日繁籌久逺安全之計出自特恩後不為例此朕格外施仁原情體恤之意並非逐伊等使之出旗為民亦非國家糧餉有所不給可令八旗漢軍都統等詳細曉諭仍詢問伊等有無情願之處具奏欽此八年諭朕前因八旗漢軍户口日繁生計未免窘迫又限於成例不能出外營生特降諭旨除從龍人員子孫無庸更張外其餘各項入旗人等有願改歸民籍與願移居外省者準呈眀本管官具奏原指未經出仕及微末之員而言至於服官既久世受國恩之人在伊等本身及子弟自不應呈請改籍而朕亦不忍令其出旗此後文官自同知等官以上武官自守備等官以上皆不必改歸民籍欽此十二年諭朕因八旗漢軍人等生聚日繁家計未裕於乾隆七年特降諭旨自從龍人員子孫外願改歸民籍移居外省者準其呈眀本管官具奏旋據漢軍都統等分晰辦理允行在案朕觀漢軍人等或祖父曽經外任置立房産或有親族在外依倚資生及以手藝潛往直𨽻各省居住者頗自不少而按之功令究屬違例伊等潛居於外於心亦自不安朕思與其違例潛居孰若聽從其便亦可各自謀生嗣後八旗漢軍人等願在外省居住者在京報眀該旗在外呈眀督撫不拘逺近任其隨便散處該督撫咨眀該旗每年彚奏一次以便稽察務令安靜營生無得強橫生事如此則於功令不相妨礙伊等亦得安居樂業生計有資矣欽此十四年議準漢軍情願在外省居住者在京報眀該旗轉咨户部户部分咨各省其在外呈眀督撫者亦一面咨眀該旗一面咨報户部仍於每年終各省造册送户部彚總奏聞一旗人撫養嗣子國初定無嗣人撫養他人之子許報眀本王貝勒該旗都統送部注册增入本佐領壯丁數內若私自撫養者斷歸本宗順治十八年題準凡無嗣人存日撫養兄弟族人之子準承受家産其撫養他人及奴僕之子不準承受若存日未曽立嗣身故後準近房承受如本族無人存日保結撫養異姓之子亦準承受若無族人又無撫養異姓人照絶户家産辦理康熙七年覆準凡撫養他人子為嗣歿後其子本生父母年老乏嗣準仍令歸宗又題準凡無嗣人家産除親兄弟承受外若叔伯及兄弟之子承受有親生女者給家産三分之一逺族人承受其女給家産五分之二至撫養異姓之人承受及應歸佐領撥給者其女均給家産之半如數少難分及有分撥餘剩者均給承受之人凡分給女子無論人數止於應給分內分撥雍正十二年議準無嗣人請立異姓親屬為嗣者務令該旗取兩姓情願甘結並各該管參佐領及族長保結送部存案以杜占奪財産之端如無兩姓甘結不準入繼乾隆四年議準八旗無嗣人如有同宗及逺近族人昭穆相當可繼為嗣者該旗參佐領呈報都統咨部準繼為嗣不得過繼異姓以亂宗支若無同宗可繼除户下家奴民間子弟雖與正户旗人分屬至親不準承繼外其有正户親屬情願過繼者取具兩姓族長並該參佐領印甘各結咨部準其繼立倘實有同宗可繼詐稱並無族人溷繼異姓者按律治罪一旗人買賣奴僕國初定旗下買賣人口赴各該旗市交易若越至他旗市被執者身價二分入官一分給拏獲之人又定滿洲壯丁越旗賣出被首者身價二分入官一分給首告之人買主無罪該管佐領知情者治罪壯丁徹回撥給本旗不知情者壯丁徹回撥給本佐領下貧人又定有將人父子兄弟夫婦分賣者所賣之人均入官順治元年定凡旗下漢人有父母兄弟妻子情願入籍同居者地方官給文赴户部入册不許帶田地投獻二年題準近京地方管莊人等強壓愚民及工匠勒令投充者在內許赴户部五城御史順天府在外赴道府州縣告理審實令歸原籍又題準有假藉投充冒名奴僕溷記廝養或悍奴欺壓故主部民陵厲本官及慢侮搢紳傾陷富室占騙人口財物者事發治以重罪三年題準自次年為始漢人投充旗下永行禁止五年覆準投充人即繫奴僕願賣者聼又覆準俘獲人口有將其父子兄弟夫婦分賣者仍令給還完聚賣主鞭責七年題準投充人置買民間房地者房地并價銀入官買賣兩造從重治罪八年諭投充人有生事擾民者本主及該佐領如知情皆連坐前此有司因責懲旗人曽經問罪以致投充人益加橫肆嗣後地方官遇投充人有犯與屬民一例究治欽此九年題準陳獲人口準其贖回令家屬領歸十年題準八旗買賣人口均令該領催注册以備稽察民人令親鄰中證立契赴本管衙門挂號鈐印即免輸稅如不注册無印契者即治以私買私賣之罪十七年題準投充人誣稱不繫投充者審出鞭一百如果不繫投充欺壓良民者亦鞭一百又題準有將正户人告稱繫伊奴僕者鞭八十其投充人先未在地方納糧後將房地納糧輒稱不繫投充者審眀枷一月鞭一百地方官溷報者以抗違論其民人住種旗人房地年久告稱繫自已房地者杖八十又覆準各莊屯皆設領催責成稽察如旗人有指稱投充欺壓百姓者解部究審若繫假冒地方官依律究擬十八年覆準旗下赴市買人注册時該翼察眀給以印照康熙二年題準八旗買賣人口兩家赴市納稅注册令領催保結列名繫漢人令五城司坊官驗有該管官印票準買八年諭差遣官員並督撫提鎮大小各官不許買良民為奴及轉相餽送永行禁飭違者照略賣良民例治罪欽此又題準旗人買民為僕令本管官用印若用别旗及隔屬官印即照拏解良民例議處所買之人釋放為民買者賣者各責懲有差又議準有將定例後所買之人揑作定例前年月用印者事發用印官及買者賣者各加等治罪十五年題準旗人買民令正印官用印準買若在地方犯罪逃出賣身者保人繫民枷三月杖一百繫旗人枷三月鞭一百原價追還給主賣身人遞解本地方官枷三月杖一百仍照所犯罪依律究治其旗人詭稱民人賣身者枷三月鞭一百保人繫旗人枷三月鞭一百繫民杖一百流徙尚陽堡若繫逃人照常鞭刺又定賣身假揑籍貫姓名不從實開載者枷兩月鞭一百仍斷與買主保人繫民枷一月杖一百旗人枷一月鞭一百十八年題準凡旗人買僕由用印衙門呈部轉行督撫令地方官曉諭里甲如用印官十日內不將買人緣由報部者罰俸一年竟不報者降一級二十一年題準直省駐防各官及提鎮以下等官槩不許買本省之民違者降二級調用若縱令家人買者照本官買人例議處該管官失察者降一級留任其駐防兵丁量許買人令賣身人親至地方官處取具親供存案契內書情願字樣用印鈐蓋若未經取親供文契雖有情願字樣實繫勒買者買主枷一月鞭一百若本官囑兵丁買者照本官買人例議處若本主在京家人充兵在外駐防者準買其在外駐防官之家人充兵者不準買二十二年議準滿洲蒙古家人違禁賣與漢軍漢人者買賣之人繫官罰俸一年繫旗人鞭一百民杖一百如佐領內管領驍騎校及收稅官知情者罰俸九月領催鞭八十所買之人并價皆入官其喀爾喀厄魯特人亦不許漢軍漢人買用違者官降一級調用旗人鞭一百民杖一百所買之人入官二十六年諭駐防滿洲漢軍將軍以下官員兵丁本省買人如有不容行詢原籍勒令地方官用印者著該督撫指名題參嚴加議處欽此三十年題準出征所獲之人有親戚情願來旗完聚者不得作為奴僕有願回本籍者聼三十九年題準鹽竈户賣身旗下者事發後將賣身人枷三月杖一百回原籍著役保人枷兩月杖一百仍行文該地方官追取身價交還原主如不能償著保人代償五十二年議準白契所買之人若在買主家長大年久當為父子可以當差者令充步軍雍正元年覆準白契賣身之人經買主配與妻室者不準贖身若未經賣身之先或已定親未曽完娶賣身旗下女家並不知情者必問眀女家情願方許配合如女家不情願者聼其别嫁三年覆準八旗滿洲蒙古家下開户人等間有懶惰不能度日串通原主賣身他家賣後日久又稱滿洲肆行勒詐者一經發覺將原主一并議罪並將册籍徹回給後買之人為奴四年覆準吉林有民人願入旗為奴者照京師例報知該地方官給與印文準其買賣六年諭外省駐防兵丁常買地方民人為僕此內多有匪類往往自恃旗人生事不法朕知甚悉既為兵丁理應隨時隨地勤苦習勞方能日漸壯勇豈可忘其職分所在多置使令之人以求便安之理兵丁所恃以為生者惟在糧餉僕役既多所費衣食亦廣一人所得糧餉何能豢養多人計兵丁僕役男婦不過數人已足多買人口徒費産業何益之有且果繫良民豈肯入旗為奴其入旗為奴者或在地方被事欲圖報復或賭博飲酒懶惰無賴不務本業貧難度日聊圖糊口或繫大盜懼捕或為人命逃避希圖藏身此等之人兵丁何能得其力乎况將犯法為盜之人買為奴僕一經發覺必貽纍已身此皆兵丁愚昧無知貪圖價賤妄思多得奴僕曽不計其豢養之艱難罪譴之株連也應將奴僕中善良者量留足用其餘匪類或索原價放出或賣與無僕之人庶幾易於豢飬既可得力又不至罪譴株連著行文各省將軍副都統通行曉諭嚴禁兵丁收買民人為僕嗣後如有違旨之人著該將軍參處如隱匿不奏著地方大員密奏倘地方大員亦通同徇隱經他處發覺將該管官及地方大員一并從重治罪欽此十二年議準捕牲壯丁人等解送貂皮來京置買旗下奴僕者令管轄前來之總管副管佐領驍騎校領催等並賣主之佐領驍騎校領催等各具保結在於左右兩翼稅契其典買民人者令總管等報眀大宛二縣將典賣僕人姓名籍貫注册若黑龍江官兵來京置買旗下奴僕者取具同行官員保結呈眀本旗都統注册照例稅契典買民人亦照例報眀大宛二縣注册違者僕人斷回買主照溷買例治罪管轄官參處若將所買之人三年內得重價轉賣與人者照略賣人口律治罪該管各官以失察例議處乾隆四年題準奉天買賣人口令兩造該管官驗眀文契鈐蓋印信關防準其注册五年奏準駐防各官不許收買民人為僕違者照例議處若官員縱令家人私買及囑託兵丁買者亦照本官買人例議處該管官據實揭報將軍等察出參處者皆免議駐防兵丁實在並無家人者具呈該管官核實出具保結許其買人不過二名仍令賣身之人親至地方官處取具親供存案立契用印書情願字樣如勒買及見有家人揑稱無家人多買人為僕者兵丁治罪出結之該管官及不能察出之將軍等皆照例議處一旗人逃亡定例投遞逃牌在京者限五日二百里以內限十日四百里以內限十五日將逃自何處及日期姓名年貌服色並初次二次三次有無攜帶軍器詳悉聲眀咨刑部緝拏又定八旗正户及家人逃走自行投回者該旗將逃走次數日月多寡及在外有無為匪分晰咨明刑部其逃繫初次一年以內投回二次六月以內投回三次三月以內投回年十五以下十嵗以上者皆免治罪無庸送部於文內聲眀勾銷逃牌此外應治罪之犯該旗將人文并送刑部乾隆八年奏準外省駐防兵丁逃走除咨報刑部外即開眀逃人年貌知照在京本旗及沿塗有駐防兵丁地方並附近省分一例嚴拏分别次數治罪其窩藏之家及失察各官皆照例治罪又奏準兵丁內有因病狂逸出自行投回者亦有為事牽纍或債負深重藉端逃走年久投回者其事不一嗣後選拔護軍驍騎時令該佐領等確實出保同間散壯丁一例酌量貧富拔取若藉端逃走日久投回人內生計艱難者先補步軍令其效力如無過犯行走勤慎仍照常選護軍驍騎至補護軍校驍騎校時皆不得列名九年奏準旗人逃出斷不潛住京城附近之處應行令直𨽻總督八溝熱河副都統盛京等處將軍蒙古扎薩克等差委官兵務將此等汗邪逸出藉端逃走及失迷被誘之旗人嚴加訪拏即解交刑部審訊若實因病狂逸出失迷被誘者應準選補差事令其效力若繫藉端逃出者即照逃人例治罪交該參領嚴加約束再旗人生計仰仗錢糧若永逺不令食錢糧實屬艱難俟過一年如果改悔該參領出具保結咨送步軍統領拔取步軍如果行走勤慎俟三年後該統領咨送各該旗選補護軍驍騎十年議準八旗正户兵壯如果繫瘋狂汗邪該管各官理宜預為管束乃漫無覺察及至逃走又揑為具報殊非管束旗人之道嗣後除十五嵗以下之幼丁被人拐失或迷失路徑者仍照例通行尋獲外其八旗所報瘋狂逸出汗邪失迷之人如一年內不能拏獲各該都統等於年終將逸失人數開眀具奏交刑部察核會同兵部照駐防旗下家人脫逃例按名數分别議處至兵壯內實繫逃走而該族長等謊報患病發狂該佐領等不確實察眀即為轉報及逃走之人在駐防旗員所屬與文職所屬地方存留居住者皆按例議處再八旗印契白契所買家奴本主並未得力竟爾拐帶財物潛逃雖呈報刑部通緝向有眀例然法久漸弛以致惡奴更名易姓託人轉售應通行順天府五城並各該處地方嚴行察拏又奏準駐防兵丁初次逃走於一年內自行投回免罪者該駐防處往往以該犯兵闕業經别行拔補彼處無産業可依咨報留京是伊等轉得以逃走為留京之計嗣後仍發回原處酌量令其充役不準留京欽定大清會典則例卷一百七十二
