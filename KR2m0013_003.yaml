  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_003-1a, image: WYG0620/WYG0620-0010a.png}
body:
  text: 卷一宗人府卷二内閣卷三吏部文選清吏司官制卷四月選一卷五月選二卷六開列卷七遴選一卷八遴選二卷九升補卷十除授卷十一考功清吏司考績舉劾卷十二升選降罰卷十三期限赴任離任卷十四給假歸籍曠職營私書役卷十五戸口田宅卷十六解支盤察卷十七漕運卷十八錢法鹽法關稅卷十九催徴承追災振卷二十儀制文禁僧道度牒附服飾卷二十一本章印信卷二十二科塲學政教職附卷二十三軍政馬政驛遞卷二十四邊禁海防卷二十五斷獄提解卷二十六人命盜賊卷二十七逃人雜犯禁獄卷二十八修造河工卷二十九稽勲清吏司守制終養附改籍更名復姓附卷三十驗封清吏司世爵封贈廕敘土官書吏卷三十一户部疆理卷三十二户口上卷三十三户口下卷三十四田賦一卷三十五田賦二卷三十六田賦三卷三十七田賦四卷三十八權量庫藏卷三十九倉庾卷四十積貯卷四十一漕運一卷四十二漕運二卷四十三漕運三卷四十四錢法卷四十五鹽法上卷四十六鹽法下卷四十七關稅上卷四十八關稅下卷四十九雜賦上卷五十雜賦下卷五十一俸餉上卷五十二俸餉下卷五十三蠲䘏一卷五十四蠲䘏二卷五十五蠲䘏三卷五十六禮部儀制清吏司嘉禮朝㑹一朝㑹二朝㑹三卷五十七登極尊崇卷五十八册立尊封册封一册封二卷五十九經筵視學卷六十廵幸御新宫卷六十一耕耤親蠶卷六十二授時頒詔頒賞卷六十三進表進書鑄印卷六十四婚禮卷六十五冠服卷六十六貢舉上卷六十七貢舉下卷六十八學校一卷六十九學校二卷七十學校三卷七十一風教鄉飲酒禮卷七十二儀衞卷七十三相見儀卷七十四軍禮卷七十五祠祭清吏司吉禮祭統卷七十六大祀一南郊祈榖雩祭大祀二北郊卷七十七升配卷七十八大祀三太廟卷七十九升袝進册寳附玉卷八十陵寢卷八十一大祀四社稷壇卷八十二中祀一日壇月壇中祀二帝王廟先師廟傳心殿卷八十三中祀三先農壇先蠶壇中祀四天神壇地祇壇太歲殿卷八十四羣祀一羣祀二羣祀三家祭卷八十五凶禮喪禮一上卷八十六喪禮一下卷八十七喪禮二上卷八十八喪禮二下卷八十九喪禮三卷九十喪禮四卷九十一喪禮五䘏典卷九十二䕶日䕶月附方伎卷九十三主客清吏司賔禮朝貢上卷九十四朝貢下卷九十五賓館馬館卷九十六精膳清吏司燕禮卷九十七餼廩牲牢卷九十八樂部一卷九十九樂部二卷一百樂部三卷一百一樂部四卷一百二兵部武選清吏司官制卷一百三職制一卷一百四職制二卷一百五職制三卷一百六職制四卷一百七職制五卷一百八守衞大閲大狩卷一百九出征卷一百十恩䘏土司卷一百十一職方清吏司營制一營制二卷一百十二營制三營制四卷一百十三軍政軍功簡閲卷一百十四關禁海禁卷一百十五詰禁廵防卷一百十六公式一卷一百十七公式二卷一百十八公式三卷一百十九車駕清吏司馬政卷一百二十郵政上卷一百二十一郵政下卷一百二十二武庫清吏司軍器兵籍卷一百二十三武科發配卷一百二十四刑部刑制律綱聽斷卷一百二十五秋朝審欽恤督捕卷一百二十六工部營繕清吏司宫殿壇廟卷一百二十七城垣府第公廨倉厫營房卷一百二十八物材報銷卷一百二十九虞衡清吏司採捕鼓鑄卷一百三十軍器雜料卷一百三十一都水清吏司河工一卷一百三十二河工二卷一百三十三河工三河工四卷一百三十四水利巻一百三十五海塘江防附橋道船政藏冰卷一百三十六器用織造關稅卷一百三十七屯田清吏司山陵墳塋薪炭匠役節慎庫卷一百三十八製造庫卷一百三十九盛京户部盛京禮部盛京兵部盛京刑部盛京工部卷一百四十理藩院旗籍清吏司卷一百四十一王㑹清吏司卷一百四十二典屬清吏司卷一百四十三柔逺清吏司徠逺清吏司卷一百四十四理刑清吏司銀庫卷一百四十五都察院一卷一百四十六都察院二卷一百四十七都察院三卷一百四十八都察院四卷一百四十九都察院五卷一百五十都察院六卷一百五十一通政使司大理寺卷一百五十二太常寺卷一百五十三翰林院起居注詹事府卷一百五十四光禄寺卷一百五十五太僕寺順天府奉天府卷一百五十六鴻臚寺卷一百五十七國子監卷一百五十八欽天監太醫院卷一百五十九内務府廣儲司卷一百六十㑹計司卷一百六十一掌儀司一卷一百六十二掌儀司二卷一百六十三掌儀司三官學藥房附卷一百六十四都虞司慎刑司卷一百六十五營造司慶豐司卷一百六十六上駟院卷一百六十七奉宸苑織染局卷一百六十八武備院卷一百六十九鑾儀衞卷一百七十領侍衞府巻一百七十一八旗都統旗制巻一百七十二户口卷一百七十三田宅卷一百七十四兵制卷一百七十五訓練授官襲爵卷一百七十六教養優䘏卷一百七十七公式卷一百七十八前鋒統領䕶軍統領嚮導卷一百七十九步軍統領卷一百八十火器營圓明園䕶軍營健銳營三旗虎槍營臣等謹案大清㑹典則例一百八十卷乾隆二十九年與㑹典同時編纂告成其書亦與㑹典相輔而行卷首恭載節次所頒諭㫖及諸臣奏議并所定義例伏考本朝㑹典於康熙雍正年間兩經釐定並以例附典連類並載至是乃詔分㑹典與則例各為之部盖典為萬世不易之經例有隨時損益之用考之典則宏綱鉅制固已釐然畢具至於事例條目因時制宜逺則三五年近則一二年其間斟酌變通或奉聖諭裁定或經臣下條列部議覆准精益求精以適於至當非遍考則例莫能詳也讀是編者於明備之中彌見畫一之規而我國家法制周詳之模皇上求治精一之意亦具見於此矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
