尚數百名雖積至十餘名其先到者因資斧告竭又復回籍再難積至二三十名若十餘名即奏請廷試殊於體制未協切思拔貢見例無論考試一二三等均歸國子監肄業嗣後凡拔貢到部由部驗到即劄國子監會同考試文理通者準為拔貢留監肄業荒謬者即行褫革如文理雖不荒謬而辭句疵纍不稱拔貢之選者發回原籍肄業仍將該學政分别議處十二年覆準四川嶽池縣學新設廪生俟十二年後準三年一貢又覆準永吉州學歸同知管轄廪生照舊出貢十三年覆準湖南永順府及所屬永順保靖龍山桑植四縣學新設廪生俟十年後府二年一貢縣三年一貢又覆準陜西潼關縣裁歸同知管轄縣學見在之虛廪實廩留於廳學二年一貢俟三次歲考之後存廪十五名三年一貢又覆準雲南普洱鎮沅二府恩樂縣及黑白琅三鹽學新設之廪生俟十二年後出貢又覆準山東威海靖海二衛生員歸並文登縣學文登額設廪生二十名威靖二衛歸並各二十名作為候廪人多額少挨補無期二年一貢壅滯尤甚應暫準一年一貢首文登縣本籍廪生次威海衛歸並廪生次靖海衛歸並廪生周而復始俟二衛廩生貢完仍照縣二年一貢十五年恩詔直省儒學以正貢作恩貢次貢作正貢又覆準廣東廉州府學廪生三十一名一年一貢羅定州學廩生二十名欽州學廪生九名皆三年兩貢與定例未協嗣後廉州府學三年兩貢羅定州學二年一貢欽州學四年一貢十六年恩詔直省儒學以正貢作恩貢次貢作正貢又諭各省選拔貢生經朕降旨以十二年舉行惟是來京朝考簡選引見發監讀書或以知縣等官試用或以教職即用或以教職歸班序選條例屢經更定朕思選拔於數十百人之中拔取一二人且不糊名易書可以驗其人材考其素行自當精擇以充其選應令該學政於試列前茅之士舉其文行兼優才品出衆者會同督撫掄採以杜濫冒至庠序為陶育人材根本今教職率多昏耄龍鍾濫竽戀棧雖定以六年甄别而上官以閒曹多方寬假非國家設官敷教本意應分以年限詳加澄汰所汰之員即以應授教職之選拔充補於教士當有裨益凡選拔貢生赴部驗到作何定限朝考録用一應規條應詳悉酌定永著為令大學士九卿集議以聞遵旨議準應令直省學政於歲科兩試時凡文理優通之廪增附生觀其才品接其言論合之文章已得其大槩至考拔時悉心體訪不得委任教官以杜奔競照例試以兩場於屢次優等及見列前茅之士擇其文優品端者秉公選拔即隨場咨明督撫存案俟科考事竣八月鄉試以前學政到省録遺時傳齊通省選拔之人有總督駐劄之所會同督撫僅巡撫駐劄之地會同巡撫就學政考院通行覆試一場酌用四書文經文策各一篇次日就督撫署中會同驗看仍將選拔原卷通行較閲如果文品兼優年力富强即通出一榜該學政給與貢單咨文令其赴部正覆原卷均送部磨勘再順天學政選拔滿洲䝉古漢軍生員應於鄉試前奏請欽命大臣會同覆試驗看奉天由府丞選拔應會同府尹在公所覆試驗看福建臺灣府由臺灣道選拔移送福建學政會同督撫覆試驗看倘督撫等别有見聞或驗試不堪充選仍發回原學肄業至到部之期統以其年十月起限四川廣東廣西雲南貴州定限八月於次年五月到部江西福建浙江湖北湖南陜西限六月於次年二月到部直隸奉天河南山東山西江南限四月於次年正月到部禮部即照定限奏請欽命大臣於午門內考試分列三等進呈如有文理荒謬不入等之人學政照例議處外該督撫亦應一並議處至朝考取列優等復經九卿簡選引見其中果有人才出衆仰邀聖鑒或以知縣或以知縣以下等官録用再直省府州縣教職飭令督撫三年一次澄汰將實在年力就衰者勒令休致澄汰員闕即將簡選引見之拔貢照依朝考名次先後充補其補授訓導者以教諭銜管訓導事仍照原銜升轉俟簡選引見之人用完照舊例銓選未入簡選者仍劄監肄業悉照舊例遵行十七年覆準四川成都華陽二縣學各廪生十五名合兩縣廪額正符州學廪生三十名三年兩貢之例嗣後三年之內令兩縣輪流各貢一人二十三年覆準各省考試拔貢第二場試以時務策一五言八韻詩一朝考拔貢試以書藝一詩一各省考試歲貢亦改判為詩以符體制其優生保題到部由部具奏請旨除已經具題之優生照在部考試拔貢例試以書藝二篇外嗣後保送者均照拔貢朝考之例試以書藝一詩一文理明通者升入太學荒疏者發回原學將學臣議處並令各省學政豫於考試優生時即兼試詩題以昭畫一一考試文藝康熙三十六年覆準考試童生出四書題一令作時文小學題一令作論通行直省遵行三十九年覆準嗣後學臣考試生童有將經書小學實能精熟及成誦三經五經者酌量優録其孝經論題原少嗣後將太極圖說通書西銘正䝉一並命題四十五年覆準儒童正考時仍四書文二篇覆試四書文一小學論一雍正二年覆準嗣後學政歲考用四書文二篇科考則用四書文二篇加經文一篇如遇冬月日短則用四書文一篇經文一篇其有經旨不明托拾陳文希圖僥幸不得濫取六年議準歲試士子令作兩書一經遇冬日一書一經科考令作一書一經一策遇冬日一書一策若草率塞責者歲試不準拔在優等科試不準録送又覆準嗣後令該學政嚴飭教官季考月課時於書文一篇外或試以策或試以論務期切近時務通達政治嚴立課程分别優劣以示勸懲倘教官不實心奉行該學政題參議處又奏準選拔考試分為兩場首場四書文兩篇經文一篇二場策一道論一篇判一條兩場全佳再細訪其品行端方應豫選拔即首場文藝僅屬平通而策論果能曉暢古今切中時務再細訪其品行端方亦準選拔若策論品行兩無足取首場文藝縱極優長亦不準選拔考竣將原卷彚送到部細加磨對又覆準舊例儒童正考時四書文二篇覆試則四書文一篇小學論一篇今按小學乃朱子纂輯雖於幼童有裨究不如聖經言簡意該廣大悉備應令學臣嗣後覆試儒童將論題小學改作孝經乾隆元年諭聖祖仁皇帝四經之纂實綜自漢迄明二千餘年羣儒之說而折其中視前明大全之編僅輯宋元講解未免膚雜者相去懸殊直省學政職在勸課實學則莫要於宣揚聖教以立士子之根柢每歲科按臨時豫飭各該學確訪生童中有誦讀御纂諸經者或專一經或兼他經皆開明册報俟考試文藝之後就四經中斟酌舊說異同之處摘取數條另期發問只令依義條對不必責以文采有能答不失指者所試文稍平順童子即豫入泮生員即豫補廪以示鼓勵務宜實力奉行以副朕尊經育才之至意欽此又覆準小學一書與性理相為表裏令該學臣嗣後儒童正考時仍四書題二道覆試時四書題一道其論題一道孝經與小學兼出八年議準各學政歲科兩試及府試縣試於覆試時用小學命題作論一篇必通曉明順者方準收取十七年覆準嗣後令學政案臨之初即將該提調册報能對經解之生童總試一場有能答不失指者於正試卷面上加以經解印記以便閲正試之文藝即可核對經解之卷照例辦理二十三年覆準各省歲試書藝一經藝一科試書藝一策一均增五言八韻詩一考試時學政官豫備韻本以便士子檢閲自定議之後歲科兩周如詩不佳者歲試不得拔取優等科試不準録送鄉試一釐正文體順治八年題準學政歲科考各分四次解卷到部㑹同禮科磨勘所取生童文字以純正典雅為主如詭怪舛謬者本生黜革學政參處凡解卷一次磨勘出四卷以下每卷罰俸三月至五卷以上每二卷降職一級十卷以上革職九年題準說書以宋儒傳注為宗行文以典實純正為尚其有剽竊異端邪說矜竒立異者不得取録又題準歲科試卷優等以大學五名小學三名解部磨勘其有詭僻幽險割裂補綴者磨勘出照題定卷數分别參處解卷時必用原本實卷不許改謄潤色解期務照題定次數不許遲延違者參處康熙二年題準學政每一次解卷內磨勘出一卷者罰俸六月二卷九月三卷一年四卷降職一級五卷二級六卷革職七年題準學政考完兩府即將原卷解部八年題準學政行考事後每六月解卷一次十二年議準生童試卷停其解部磨勘乾隆元年諭國家以經義取士將使士子沉潛於四子五經之書含英咀華發攄文采因以覘學力之淺深與器識之淳薄而風會所趨即有關於氣運誠以人心士習之端倪呈露者甚微而徵應者甚巨也顧時文之風尚屢變不一茍非明示以準的使海內士子於從違去取之介曉然知所别擇則大比之期主司何憑操繩尺以度羣材士子豈能合矩矱以中程式有明制舉之業體備各種如王唐歸胡金陳章黃諸大家卓然可傳本朝文運昌明英才輩出熊伯龍劉子壯以後作者接踵莫不根柢經史自成杼軸足為後學之津梁制藝之科律自坊選之禁垂諸功令而大家名作不得通行士子無由覩斯文之炳蔚率多因陋就簡剽竊陳言間以此幸獲科名又轉相仿效馴致先正名家之風味邈乎難尋所繫非淺鮮也朕特命詞臣裒集有明及本朝諸大家時藝精選數百篇頒示天下以為舉業指南並將入選之文批抉其精微奧窔之處俾學者了然於心目間用以服膺摩擬再弛坊間刻文之禁不拘鄉會墨卷房行試牘準其照前選刻但不得徇情濫觴狂言橫議致釀惡俗朕實嘉惠士子望各精勤厥業以底大成尚敬體朕意共相黽勉欽此又覆凖嗣後學政歲科兩試前列十名試卷仍解送部科磨勘能否文教興起即憑請旨議敘議處三年覆凖雍正十年世宗憲皇帝諭考官所拔之文務期清真雅正理法兼備詳科舉則例十三年皇上諭學者修辭立誠言期有物必理為布帛菽栗之理文為布帛菽粟之文而後可行世垂久詳科舉則例皆欽遵奉行在案今考官所取之文或不按題義托拾子書中怪僻之語以炫新竒致薄植之人私相仿效而置實學根柢於不問其弊非小應再飭考官凡歲科兩試及鄉會衡文務取雅正清真法不詭於先型辭不悖於經義者拔置前茅以為多士程式如仍有題理毫無發明但為險僻怪異不可解之語輒得詭遇者經磨勘官察出即據實參處磨勘官亦務嚴加校閲毋得稍有瞻徇十年諭國家設科取士首重者在四書文蓋以六經精微盡於四子書設非讀書窮理篤志潛心而欲握管揮毫發先聖之義蘊不大相徑庭乎我皇考有清真雅正之訓朕題貢院詩曰言孔孟言大是難乃古今之通論非一人之臆說也近今士子以科名難幸獲或故作堅深語或矜為俳儷辭爭長角勝風檐鎖院中偶有得售彼此仿效為奪幟爭標長技不知文風日卑文品日下有關國家掄才巨典非細故也夫古人論文以渾金璞玉不雕不琢為比未有穿鑿支離可以傳世行逺者至於詩賦掞藻敷華雖不免組織渲染然亦必有真氣貫乎其中乃為佳作今於四書文採綴辭華以示淹博不啻於孔孟立言本意相去萬里矣先正具在罔識遵從習俗難化職此之故自今其令各省督學諸臣時時訓飭鄉會考官加意區擇凡有乖於先輩大家理法者擯棄不録則詭遇之習可除士風還淳朕有厚望焉欽此一頒行書籍順治九年題準今後直省學政將四子書五經性理大全資治通鑑綱目大學衍義歷代名臣奏議文章正宗等書責成提調教官課令生儒誦習講解務俾淹貫三場通曉古今適於世用坊間書賈止許刋行理學政治有益文業諸書其他瑣語淫辭通行嚴禁康熙四十五年諭朕製古文淵鑑資治通鑑綱目等書皆已刷印頒賜大臣此等書籍特為士子學習有益而製可速頒行直省凡坊間書賈有情願刋刻售賣者聽其傳布欽此五十二年御纂朱子全書成頒發兩京及直省刋版通行五十三年諭朕惟治天下以人心風俗為本而欲正人心厚風俗必崇尚經學嚴絶非聖之書近見坊肆間多賣小說淫辭鄙褻荒唐瀆亂倫理不但誘惑愚民即搢紳子弟未免游目而蠱心傷風敗俗所關非細著該部通行中外嚴禁所在書坊仍賣小說淫辭者從重治罪欽此五十四年御纂周易折中成頒發中外聽其重刋以廣誦習雍正元年覆準聖祖仁皇帝欽定孝經衍義一書照康熙五十四年頒朱子全書例發直省刋版通行三年奏準聖祖仁皇帝御製律書淵源百卷照周易折中例頒發中外有情願重刋者聽八年奏準聖祖仁皇帝御纂性理精義書詩春秋三經傳說彚纂每省每書各發二部一部令其重刋流布一部以備校對乾隆元年諭聞皇祖聖祖仁皇帝御纂周易折中尚書詩春秋三經彚纂諸書直省雖已鐫版但士子赴司具呈俟批已不免守候又一人所請止於一部勢難鳩工刷印是以得書者寥寥著直省撫藩招募坊賈自備紙墨刷印通行售賣嚴禁胥吏阻抑需索但使坊賈皆樂於刋刷則士子自易於購買庶幾家傳户誦足以大廣厥傳欽此又覆準淫辭穢說最為人心風俗之害例禁綦嚴但地方奉行不力致向存舊刻銷燬不盡甚至收買各種疊架盈箱列諸市肆租賃與人觀看若不嚴行禁絶不但舊版仍然刷印且新版接踵刋行實非拔本塞源之道應再通行直省督撫轉飭地方官凡民間淫辭小說有收存舊本限文到三月悉令銷燬如過期不銷燬及開鋪租賃者均照定例治罪又定例如有違禁造作刋行者該管官失於覺察者一次罰俸六月二次一年三次降職一級調用嗣後地方官若任其收存租賃明知故縱者照禁止邪教不能察緝例降二級調用三年諭從前頒發聖祖仁皇帝御纂經史諸書交直省布政使司敬謹刋版準人刷印並聽坊賈刷賣原欲士子人人誦習以廣教澤近聞書版收藏藩庫士子及坊間刷印者甚少著直省督撫將書版重加修整俾士民易於刷印坊間有情願翻刻者聽其自便無庸禁止如御纂諸書內有為士子所宜誦習著該督撫奏請頒發刋版流布至武英殿翰林院國子監皆有存貯書版亦聽人刷印從前內務府所藏各書如滿漢官有願購覓誦覽者槩準刷印欽此欽定大清會典則例卷六十九
