body:
  text: 禮部儀制清吏司學校二一諸生考課順治九年題準府州縣提調官員宜嚴束生徒按季考校凡學內殿堂齊房等屋損壞即辦料興工修理其齊夫膳夫學糧學田等項以時撥給不許遲誤剋減生員除干謁瀆擾外宜以禮相待勿得橫肆凌侮十七年議準湖廣平清偏鎮四衛赴貴州考試康熙二十七年覆準湖廣平溪清浪二衛距武昌二千五百里赴試維艱仍令黔省考試雍正元年覆準學宮之內廣置齊舍多設廩膳凡屬生員茍能勤加課藝互相砥礪則親師取友裨益良多著直省學臣通飭府州縣衛教授學正教諭訓導務立課程令其時至學宮面加考試如果有遊學逺館隨任等情教官不得借此苛求至新進生員尤為進身之初應照國子監坐監例令在學肄業俟下案新生至學為滿或有親老家貧勢不能在學肄業者亦必分題考校每月定期使無曠業學臣於按臨時即以文章之優劣定教職賢否五年覆準嗣後令教官按月月課四季季考生員除丁憂患病遊學有事故外照定例嚴加考試如有托故不到者嚴加懲治三次不到者詳革如該教官內果能實心訓迪化導有方學臣即為舉薦若因循茍且視為具文即題參革退六年覆準嗣後府學生員百里以內者其月課仍在府學百里以外者在州從州在縣從縣令州縣學教官帶理月課至府學生員有干犯學規者亦許州縣學教官嚴加約束其歲科考試幫補出貢丁憂起復等項仍歸府學職掌十二年覆準八旗人材英敏者多不可任其優游自便嗣後八旗生員遇歲科兩試務令各該旗都統飭令參佐領及滿教官嚴傳赴試如果駐防各省隨任逺方及實繫患病一時不能赴考者本生豫呈教官教官加具印結申報學臣存案仍令八旗都統飭令參領佐領於學臣按試文到之前將各本旗有事故不能到之生員逐一察明緣由出具印結申報該都統行文知照學臣並飭發教官令其造具清册注明某生駐防某省某生隨任某地或某生實因患病驗明加具印結申報學臣存案如該旗都統既無知照滿學教官又無文申報緣由一任該生揑辭托故抗不赴考扶同徇隱者一經察出將本生照例除名外仍將該管各官照徇庇例一並參處又諭清釐八旗歲考不到生員原以杜規避之弊然不肖旗員或借此生事苛求亦未可定著該都統轉飭參領佐領秉公辦理倘有徇情朦溷及需索苦纍等事該都統即行參究欽此乾隆元年覆準雍正五年定例士子每年四季季考按月月課考課不到者戒飭三次不到者詳革但三次月課為期不過三月士子或因住居遙逺不能如期赴課亦間有之嗣後月課三次不到者該學教官嚴傳戒飭其有並無事故終年不到者詳請褫革四年覆準嗣後學臣歲試滿學生員如有患病事故者定限於科考時補考即科考時仍有患病事故者定限於下次歲試補考統令該管官詳細察核並嚴加傳催務於限內補試再各省駐防隨任之生員距京遙逺原與在籍諸生不同若槩令赴京歲考其中多有未便若聽其竟不歲考亦屬與例不符今酌議駐防隨任各生有來京鄉試者即令補行歲試以符定制其因路逺及有事故不能鄉試者仍照原議令該教官送具清册注明某生駐防某省某生隨任某處加結申詳學臣存案但不許只應鄉試而不補歲考致滋規避之弊該旗員及該學教官亦不許借端苛索倘有詐稱駐防隨任及已經考過仍復羈留者明屬徇情朦溷即行參處至隨任回旗之生員仍按缺考次數照例補考又議準缺考各生各學政務令按次補考即於彚報歲科學册內分别注明以慿察核如有缺考數次只補一次及徑附正考等第者照徇情朦溷例議處又覆準文武生員捐穀準作監生有於歲科考之前該州縣給發倉收者準其免考其雖經報捐尚未交完未經給倉收者仍照例考試十年諭直省文武生員三年歲考一次若臨場不到即行黜革其遊學患病取結開報限三月內補考違限者分别降黜定例綦嚴近聞各處士子任意遷延屢次缺考此風漸不可長嗣後凡繫告假生員其上屆開報下屆果繫遊學未歸患病未痊該學官察驗確實詳請展限一俟病痊回籍即送補考如缺至三次以外不準展限竟行黜革倘有扶同揑報不詳請展限者該學政將教官參處以專責成欽此一廪增名額順治四年定直省各學廪膳生員府學四十名州學三十名縣學二十名衛學十名增廣生員名數同五年設遼學置廪生八十名諸生均就順天府考試九年題準漢軍廪膳增廣生員各二十名不拘旗分歸並順天府學其廪生均有圈撥地畝不給廪餼又題準幫補廪增新舊相間以考案為新丁憂起復病痊考復停降考復緣事辨復者為舊無新盡舊無舊盡新總以考案先後為主如第一是新則先新後舊第一是舊則先舊後新丁憂以下四項考居一二等均照名次先後為序即起復亦不問服闋先後惟考居三等先盡丁憂起復次病痊考復次停降考復次緣事辨復挨次序補如起復等項有一二人同時候補者以文到日先後為序文同到者以原補廩增先後為序若考後有起復準復者序於與考之後不得攙越凡遇廩增有闕該學教官於次日即開明廩增某人某月日某事故見闕應補上首補過某項某人今該補某項某人下首見有某項某人候闕取具本生及上首下首生不致攙越賄屬結狀加結申提調官覆勘無礙申文詳奪若該學留難不報至三日以上提調官遲至七日以上吏皆䆒處其增廣補廩遺下增闕須前詳批允後方許作闕呈詳頂補不得兩項並申如有朦朧攙越者事發教官以贓論本生黜革保結生降罰十三年題準直隸永平府寄學內廩額八十名分四十名歸遼陽府學遼海二縣每學先設廩生五名俟人才漸充仍照縣學增設十六年題準湖南辰州五寨建學設廩膳生六名增廣生八名又題準貴州大學設苖籍廩增各三名中小學各一名康熙九年題準奉天府州縣學各設廪膳生員一名十年議準滿洲䝉古亦照漢軍例設廪膳增廣生員各二十名二十四年覆準錦州府錦縣寧逺州每學增設廩生五名廣寧縣加設廩生二名增生照廪生名數二十六年覆準直隸懷來永寧保安三衛照衛學例設立廪膳增廣生員二十八年覆準貴州貴筑縣照縣學之例設廪增生員又議準滿洲䝉古設廪生增廣生各二十名漢軍各十名三十一年雲南馬龍寧師宗三州呈貢定邊元謀三縣貴州安化縣各照州縣學例設廪增生員三十二年覆準湖廣五開衛照衛學例設廪增生員四十年覆準錦州學向設廪增各五名照承德縣加五名廣寧縣學向設二名加一名錦州府寧逺州遼陽海城二縣各學向各設五名均加二名蓋平鐵嶺開原三縣學向設一名各加一名四十四年覆準陜西平涼衛取進童生改撥府學其廪增不分民衛照考案先後序補四十九年覆準奉天八旗廪增名數滿洲各四名漢軍各二名五十二年覆準廣西西隆州設廪生四名增廣生五名五十五年覆準湖廣嶽州府洞庭湖西六屬於澧州别建考院府學廪增令各分一半又覆準廣東衛所取進童生撥入各府學其廪增即附各府學額內雍正二年議準八旗童生入學額數倍於外府州縣而廪增額數獨少宜為酌加滿洲䝉古廪額定六十名漢軍廪額定三十名增生額與廪生同又覆準盛京滿字號既取進十名合字號取進六名其廪增著照二名取一之例滿號各加二名共六名合號各加一名共三名三年覆準廣西太平土州俟兩經歲科考後生員額多量設廩二名增三名貴州南籠廳設學已經十年照例設廪額二十名四年覆準山西新升之朔平寧武二府學設廩增各二十名右玉偏關左雲平魯四縣學及大同府屬之陽高天鎮二縣學應設廩增各照縣學之例寧武府屬之寧武縣學俟十年再議五年議準陜西新設潼關縣廪增額照縣學例各設二十名又覆準河南胙城縣裁歸延津原設兩縣學廪膳生員共四十名遇闕應停頂補俟扣去二十名後始聽頂補又覆準湖廣鎮溪所酌設廩增各四名又覆準湖北施州衛升為恩施縣應照各縣學例將原設廩增四十名之數各裁去二十名又覆準四川成都縣學舊設廪增各二十名今分設華陽縣應令兩學中分各半威州裁歸保縣應於保縣學設廪增各二十名其威州舊有之廩生三十名即附於保縣學食餼所出廪闕不準頂補增附生於歸并後考列優等與保縣學生員序補廪增馬湖府學舊設廩生四十名暫準於歸并敘州府之屏山縣照舊食餼闕出不準頂補俟扣至二十名之時方準頂補八年覆準四川新津郫新繁德陽梁山五縣原額廪增均各二十名與新設之雙流崇寧彭羅江新寧五縣平分各得十名綿州原額廪增各三十名三分其一與新設之彰明縣眉州原額廪增各三十名分與新設之青神彭山二縣各八名奉節縣原額廪增各二十名分與新設之大寧縣各七名榮縣原額廪增各二十名與新設之威逺縣中分各半俟人文充盛之日學政具題再議九年覆準河東運使學舊設廪增各四十名今冒籍改歸人數較少裁廪增各二十名盡先補者留實廩實增各二十名餘改候廪候增十年覆準直隸新升之天津府照府學例設廩增各四十名附府之天津縣照縣學例設廪增各二十名原設州學廪增各三十名酌留二十名於縣學餘撥入天津府學寶坻縣分設寧河縣廩增仍照舊額增設寧河學廪增各二十名又覆準湖南澧州改為直隸州應將澧州六屬從前撥入嶽州府學各生按其籍貫令州籍者歸州學縣籍者歸縣學其廪增改候廪候增與本州縣生員照考案先後挨次序補又九溪永定二衛歸並安福縣應將二衛原額廩增各二十名盡先補者每衛行實廪增各十名以符縣學二十名之數餘改為候廩候增其二衛舊生散在澧州等處者照依户口田糧撥歸本籍又覆準長蘆所設商竈籍改歸天津府學設廪增各二十名先盡年深者補足餘作候廪候增十三年覆準奉天府永吉州學額設廪增各一名又覆準江南江都縣原設廪增各二十名與分設之甘泉縣學中分各半山陽縣學原設廪增各撥六名鹽城各撥四名歸分設之阜寧縣學山陽仍留廪增各十有四名鹽城各十有六名阜寧撥入廪增各十名又覆準江南新升之徐州府學設廪增各四十名附府之銅山縣學設廪增各二十名其州學原設廪增各三十名酌留二十名於銅山縣學餘十名改入徐州府學又覆準廣西崇善縣為太平府首邑自雍正三年設學以來未定廪增額數應設廩增各四名又覆準山東武定州沂州升府均設廪增各四十名新設附府之惠民蘭山二縣均設廪增各二十名原設州學廪增各三十名均酌留縣學二十名餘十名歸入府學原州學文武生員令武定沂州二府學與惠民蘭山二縣學各半分隸又覆準山東益都縣分設之博山縣設廪增各二十名其由益都淄川萊蕪三縣改隸博山之實廪實增即按原補年月撥入新設額內候廪候增與本學生員論考案名次新舊間補又覆準安徽壽州學原設廪增各三十名今分設鳳臺縣酌分十二名入縣學州學文武生員與縣學四六分隸又覆準河南陳許二州升府均設廪增各四十名原設州學廪增各三十名酌留縣學各二十名餘十名撥入府學又覆準福建新升之福寧府學設廪增各四十名附府霞浦縣學設廪增各二十名古田縣原設廪增各二十名與分設之屏山縣中分廪增各十名永春縣升州與龍巖州均照州學例設廪增各三十名臺灣府彰化縣設學已久文風日盛設廩增各十名乾隆元年覆準河南南陽縣分設之南召縣學設廩增各二十名又覆準陜西同州升府設府學廪增各四十名設大荔縣學廪增各二十名原設州學廪增各三十名酌留二十名於縣學餘十名