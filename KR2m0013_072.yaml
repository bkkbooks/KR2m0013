如過期者候次年補試四年題準學政每歲將次年應貢生員屢經科舉者三人一正二陪詳加考選如年已衰老文理荒疏令其告老取陪貢充選再不得人更取其次陪貢務於挨序中仍寓遴才之意其有停廪降廪科歲考居三等者亦許收復未收復者不許起送其應貢者定限次年三月到部如有濫充於所送內發回五名以上學政照例罰俸又議準由部㑹同內院將見在貢監生嚴加考試除選取存監外其餘革去貢監發回原學分别照廪增附肄業及行學黜名有差是年頒起送貢生廷試單文新式通行直省提學五年設遼學每年起送貢生三人八年恩詔各直省儒學準恩貢一名以正貢作恩貢次貢作歲貢又題準廷試貢生由部㑹同內院吏部於四月十五日赴天安門外橋南行禮考試畢會同閲卷定序送吏部出榜其考試人數當日奏聞九年題準漢軍每年起送貢生二人又題準本年已考正貢遇有事故出闕繫人文未經到部在一年以內者將原給批咨硃卷追繳挨次取年力强壯文學優長者一人補貢定限於應貢年分次年到部方準收考如將年逺貢闕濫補市恩者起送到部即將本生發回革廪肄業學政參究又題準歲貢正陪務以屢經科舉者仍以食餼年深為序同補則以原考案為序除停廩未復者緣事住食廪餼者服闋及告病給假過限不補考者服滿未補而緣事者停降未復而丁憂者皆扣算作曠外其餘槩不作曠停降考復緣事辨復者以文到日為始準其實數降增而復補廪者準前後通算就中較其食餼以年月最深者為正貢其次以是為差每遇考期文到提調官即取教官廪膳里鄰合例甘結備造年貌籍貫科舉次數起送考選如值出巡遇便投考考取領文日即開廪作闕若已領硃卷而丁憂患病者仍作正貢如一年內人文未到部而病故或問革者有司將原領卷單追繳别送考選如領過盤費問革者追病故者免若於考後衰老荒疏不堪充貢者同致仕例不補貢內有揑增科舉隱匿停降及受賄讓貢及爭貢者黜革起送官吏一並察䆒十一年題準直省考貢限一日內考經書策論四篇務取明通淹貫之士照題定科場解卷限期將原卷印封解部磨勘不許轉發謄紅以致改竄文字卷有荒謬者由部㑹同禮科指參又題準直省儒學廪生內通行考試經書策論拔取學行兼優者一人充貢送部學政將各生原卷解部仍令本生謄録硃卷黏連貢單於布政使司起文取該府州縣學各印結齎送投部彚送內院以候廷試各學政仍將拔貢生員姓名籍貫備造文册報部又題準隨征廪生準作貢監生員有軍功二等準作監生更有軍功二等準作貢生此外有軍功作紀録又議準廷試公閲後將恩拔貢生及歲貢生中英年願入監肄業者一並送監依期坐監吏部會同內院本部公考以定職銜十三年題準遼學生有原寄永平府學者準與遼陽府學一例每年各貢一人遼海二縣學二年各貢一人十五年題準歲貢生於部內過堂時詳看年力强壯者方準送監十六年題準廷試貢生試卷用翰林院印御史二人分東西班監試兵部撥步軍尉兵丁赴長安左右門看守工部鋪設考官坐案光祿寺備執事官飯十席並貢生供給鴻臚寺官於天安門外引禮鑾儀衛撥校尉赴考處搜檢看守北城兵馬司備官版四書五經綱鑑大清律送部應用均由部咨劄行取又題準湖南辰州五寨既經設學二年貢一人十七年題準貴州省屬苗生新進者少暫令附大學者三年貢一人附中小學者五年貢一人别立一册將苖生挨年序貢勿與府州縣學額數相溷俟入學人多始照州學舉行康熙元年題準貴州雲南貢生暫免廷試貴州咨送吏部就近改補教職雲南咨行該撫就近考試將試卷封送吏部校閲定銜序選九年題準奉天府府州縣學各五年一貢十年題準直省各學於見考一二等生員內遴選文行兼優者考充拔貢入監肄業又議準滿洲䝉古亦照漢軍例每年貢二人又議準八旗新舊生員通行選拔滿洲䝉古二名漢軍二名入監肄業十四年恩詔直省儒學準以正貢作恩貢次貢作歲貢二十三年議準雲南蕩平後歲貢生暫就本省考試試卷解送到部閲定次序移咨吏部其願就廷試者聽二十四年覆準錦州府錦縣寧逺州三學各二年一貢廣寧縣五年一貢又議準直省各學於見考一二等生員內遴選文藝精醇品行端方者府學二名州縣學各一名準為拔貢入監讀書如該學無文行兼全者寧聽闕額其試卷解部磨勘如察出冒濫者將考官糾參又議準監生止有輸納一途貧窶之士無由觀光將各儒學生員選其文行兼優者準作貢監府學二名其餘各學一名起送赴監如該學無文行兼優者寧闕毋濫其試卷解部磨勘察有冒濫將考官糾參二十六年覆準直隸懷來安寧保安三衛仍各設學照縣例出貢又覆準直省歲貢槩免來京廷試著各學政挨序考準咨部補授訓導捐納歲貢亦聽考送補授願入監肄業者學政給文送部劄監二十八年覆準貴州貴筑縣生員照縣學例出貢又題準滿洲䝉古每年貢二人漢軍每年貢一人三十一年覆準雲南馬龍寧師宗三州呈貢元謀定邊三縣及貴州安化縣生員均照州縣學例出貢三十二年覆準湖廣五開衛生員照例挨年出貢三十三年覆準宣化府學及宣化懷安懷來萬全蔚西寧龍門赤城八縣學照例挨年出貢三十六年題準各省歲貢願入監者停學政起送從本州縣給文準其人文到監肄業是年恩詔直省儒學準以正貢作恩貢次貢作歲貢又題準照康熙二十四年例選拔貢生府學二名其餘各學一名滿洲䝉古二名漢軍一名如無文行兼優者寧闕毋濫三十七年題準三十六年恩詔以正貢作恩貢次貢作歲貢應以本年遇詔之正貢改作恩貢次貢充本年歲貢至歇貢之年仍不準起送通行各學政已經起送本年歲貢到部者移咨吏部改注恩貢該學政換給恩貢單其已經起送本年分歲貢者學政即改作恩貢造册送部其歲貢皆遵恩詔照例挨考一名充本年分歲貢三十九年議準嗣後選拔之年以陪貢充停止選拔四十四年覆準陜西平涼衛生員撥附平涼府學其挨年出貢不分民衛以年月淺深為序五十二年恩詔直省儒學以正貢作恩貢次貢作歲貢又覆準廣西西隆州生員起送貢生三年兩次舉行五十五年覆準湖廣嶽州府湖西六屬湖東四屬既分建考院其挨年出貢定各輪貢一年又覆準廣東諸衛所生員即附入各府學挨年出貢六十一年覆準直省照三十六年例再選拔一次如有冒濫者該學政照溺職例革職雍正元年覆準雲南麗江府止設廪生三十名不便照府學廪四十名每年貢一名之例應照州學例三年貢二人是年恩詔直省儒學準以正貢作恩貢次貢作歲貢其不值正貢之府州縣衛學準以次貢作恩貢再次貢作歲貢二年題準涼州衛學生員舊例二年一貢今照州學例三年兩貢又覆準奉天府學滿字額設廪生六名五年一貢計三十年方能出貢實為淹滯改令三年一貢三年覆準奉天府學民籍生員廪額十名一年一貢未免太速嗣後照錦州府錦縣寧逺等學之例二年一貢又覆準廣西思明府額廪不滿十名一年一貢左州額廪十名養利州永康州額廪不滿十名三年一貢未免太驟嗣後均令四年一貢又太平土州初設學其廪生出貢俟補廪十年後照縣學例二年一貢四年覆準山西新設朔平寧武二府二年一貢其右玉偏關左雲平魯陽高天鎮六縣挨年出貢均照縣學之例五年諭直省拔貢舊例十二年題請舉行一次朕思各州縣每年歲貢較其食廪淺深內多年力衰邁之人欲得人材必須選拔著各省學政於科考時照例府學拔取二名州縣學各一名寧闕毋濫務取學問優通品行端方才猷可用之人令其來京朕將親行廷試令入監肄業如有學問荒陋人品不堪才具庸劣者該學政嚴加議處嗣後六年選拔一次國子監届期題請候㫖欽此又覆準湖廣鎮溪所生員出貢俟補廪十年後照例二年貢一人又覆準潼關衛奉㫖改縣其廪生出貢照縣學例二年一貢又覆準河南胙城縣裁歸延津縣兩學見廪四十名照一縣例二年一貢未免壅滯應於出貢之年準起送二人俟廪額停補扣清後仍照各縣學例二年一貢又覆準復州金州二衛廪生既歸並山東萊州府學若仍每年一貢未免壅滯將萊州府學每年貢二名萊州府一名金復二州廪生輪貢一名俟二衛出貢完日仍照舊每年貢一人六年諭各省考取拔貢原欲遴選儒生以廣教育向例於見考一二等生員內拔其文行兼優者但作文有一日短長而文理平通不列優等者其人或品行端方才猷練達足備國家之用亦未可定嗣後各省學政不必拘一二三等生員均準收考酌量試以時務策論其人果有識見才幹再訪其平日品行端方即正考未列優等亦準選拔俟到成均仍可學習如此則文行兼收可以昭廣攬人材之典欽此七年覆準四川成都縣分設華陽縣其兩學生員自應輪貢前二年成都縣貢一人後二年華陽縣貢一人照此輪轉又威州既歸並保縣所有威州舊廪三十名暫照州學例三年貢二人內有候廪者亦照年分挨貢又馬湖府已經裁汰所屬屛山縣見歸敘州府管轄其府學額廪四十名暫準每年貢一人俟廪額扣至二十名之時歸作屛山縣正額方照各縣例二年出貢一人八年覆準四川新津郫新繁分設雙流崇寧彭三縣德陽梁山分設羅江新寧二縣榮縣奉節分設威逺大寧二縣其生員出貢照縣學二年一貢之例新舊縣輪流出貢又錦州分設彰明一縣照州學三年兩貢之例於應貢之年州貢二名後縣貢一名周而復始眉州分設青神彭山二縣照州學三年兩貢之例州貢一名後青神縣貢一名州再貢一名後彭山縣貢一名亦周而復始九年覆準山西河東運司學生員照縣學之例二年一貢又覆準江西棚民取進入學以後挨廪出貢與本籍生員一例遵行十年覆準直隸天津州改為府府學生員俟十二年後照例一年一貢又寶坻分設寧河縣額設廪生俟十二年後照例挨年出貢又天津縣學廪生應照縣學例二年一貢又覆準湖南嶽州府學廪增各生既改歸澧州及屬州各縣應較其補廪先後與本州縣生員序貢又九溪永定二衛歸並安福縣其廪生照縣學二年一貢之例挨次輪貢又覆準直隸天津府商竈二籍廪生遇應貢之年仍準照例出貢十一年題準各省優生令該學政出具考語具題送部從前止議升入太學並未分晰貢監名色以致一切考試録用皆無著落今擬優生由廪增升入太學者準作歲貢由附生武生者準作監生皆由部換給執照劄監肄業奉旨各省保送優生廪增準作歲貢附生準作監生該部劄監肄業其武生到部時禮部考試文藝兵部考試騎射請旨十二年覆準奉天府復州學廪生三年一貢金州學五年一貢又覆準陜西紫陽山陽商南三學廪生已敷原額自本年起準其二年一貢石泉鎮安二學見在廪生十四名十三名不等暫準其三年一貢平利白河二學見在廪生十名九名不等暫準其四年一貢此四學統俟廪生陸續補足二十名之數仍準照例二年一貢十三年覆準奉天府永吉州廪生五年一貢準於設學之年起算又覆準江南江都分設甘泉縣見在食餼之廪生半撥甘泉應統計二縣廪生食餼先後照縣學二年一貢之例挨次輪貢俟所撥舊廪出貢完後兩縣新補廪生各準其四年一貢又山陽鹽城二縣分設阜寧一縣其見在山陽鹽城分撥阜寧之廪生應各於所撥之縣挨次二年一貢俟分撥舊廪出貢完後新補廪生山陽鹽城各五年二貢阜寧四年一貢又覆準江南徐州升府新設之學廪額未能一時補足俟十二年後照府學例一年一貢其銅山縣學廪生照縣學例二年一貢又覆