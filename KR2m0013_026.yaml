body:
  text: 吏部考功清吏司軍政一軍政國初定官員射箭不到者罰俸兩月康熙十四年題準凡戰船官兵未坐者繋交與地方官看守看守之官不行謹愼看守損壞一號二號者将該看守之官降二級畱任損壞三四號者降二級調用損壞五六號者降四級調用壊至七號以上者革職各該督撫提督總兵官等仍委道府副叅等官不時廵察其官兵所坐之船若殺賊以先或敗賊以後閒住之時交與各該督戰各官謹慎看守不致損壞大将軍将軍等並叅贊大臣仍委叅領總兵官等不時巡察如若損壊将坐船督戰大小各官囘兵之日嚴加議處十九年議準官兵民人等如有私鑄紅衣等大小礮位將失察之專汛官員革職兼轄官降四級調用該督撫降二級畱任又議準官員製造緊急軍需急用器物遲延不行速完者革職若遲延豫備軍需者降一級調用二十五年題準土司番蠻交界之處如有姦商将軍器販賣與土司番蠻之人者繫官民兵丁皆杖一百發邊遠充軍如該管官知情故縱者與軍民一例治罪如不知情者州縣官降四級調用府道降二級畱任督撫罰俸一年又議準各省備造需用盔甲器械戰船等項及有别項應用之處動支錢糧司道等官務須申詳督撫豫行題明動用如不申詳督撫豫為題眀竟行擅動藉辭軍機緊急竟造入奏册請銷者将擅動司道等官革職其所用錢糧均不準開銷令其賠還代為奏銷之督撫降四級調用其司道等官申詳而督撫不行題眀擅令動用者将申詳之司道等官免罪督撫照司道官處分例革職賠還惟有正在𠞰克逆賊之際刻不可緩如有軍需動用錢糧之事督撫司道等官一面具題咨報一面動用若不具題咨報擅自動用督撫司道等官各降五級調用其所用錢糧不準開銷令其賠還若司道等官並未申詳督撫而督撫徑為題銷者降二級畱任未經申詳司道等官各降五級調用申詳督撫督撫不行具題或擅令司道動用與司道無渉免其處分賠還将督撫照此例處分令其賠還其各省供應大兵俸餉米豆等項承管錢糧官員重支不行扣抵将承放官員不論重支銀數多寡降三級調用不行察報之司道等官降三級畱任不行察出之督撫各降一級畱任或司道等官或督撫察叅應免其議處其重領官員如将重領隠匿不行舉首者革職將重領銀米等項照數賠還不行察出之統兵叅領等竢囘兵之日應照乾没侵欺司道府等官豫先不行察出例分别議處至一應製造採買等項如有冒銷侵欺事發皆照戶部軍前供應米豆草東浮冒開銷例議處三十年議準凡交収戰船時武弁縱令兵丁人等藉端勒索使費道府等官通同徇隱照徇庇例處分三十八年覆準各營放餉之時在省令布政使糧道在府州縣令府州縣正印官将兵餉如數稱足㑹同封固按名散給仍令該督撫宻委亷員不時巡察如有闕少扣剋等弊監收官失察者罰俸一年知情不卽申報者照徇庇例降三級調用如有通同扣剋者革職提問又覆準武官内如有藉端科斂兵弁以充私橐者照貪贓例治罪如督撫提鎭不行指叅照不掲報劣員例處分又覆準各省督撫提鎭及副叅游都守家下如果有熟諳弓馬精健人丁準其入伍充兵倘有将薄弱不諳弓馬之人入營充數食糧及不與本營額兵一同訓練者卽照虗冒兵丁例革職提問管兵官員将各營兵丁怠玩不行訓練者該督撫将軍提鎭等徇庇不行覈叅一幷從重議處其督撫將軍提鎭若有不將本標兵丁不時訓練者亦從重議處四十七年題準礮鳥槍等火器特為行圍出兵營伍而設不得擅自私用倘有私藏火礮不行送庫者將失察之該管官罰俸一年五十七年覆準督撫提鎭務須嚴飭各營該管官凡遇兵丁闕從公速補應領糧餉照數給發毋得剋扣侵蝕冒充之人嚴察逐退如該管武職各官不嚴行稽察兵部照例議處外該地方文職知情不報者降二級畱任該管道府不察明轉報者降一級畱任該督撫不行題叅罰俸一年五十八年覆準水師修造戰船如有不肖營員希圖射利包修者將承修官與該營將官皆革職督修官照徇庇例降三級調用督撫降一級調用雍正六年議準凡修造戰船不能堅固未至應修年限損壊者著落承修官賠修六分督修官賠修四分仍将承修官革職督修官降二級調用至修造戰船應於定限之外稍寛限期小修勒限四月完工大修拆造勒限六月完工廣東福建浙江江南江西湖廣等省凡屆修造年分各該協營於修期兩月之前豫先估計造册申報督撫一面具題一面檄行監修官豫先撥銀卽行辦料惟廣東之瓊州福建之臺灣逺隔重洋於修期四月之前領銀備辦山東天津所用物料産自浙江由海駕運於修期八月之前領銀購買則承修之官得以從容辦理倘仍有違誤船工違限未及一月承修官罰俸一年督修官罰俸六月督撫罰俸三月違限一月以上承修官降一級調用督修官罰俸一年督撫罰俸六月違限二月以上承修官降二級調用督修官降一級畱任督撫罰俸一年違限三月以上承修官降三級調用督修官降一級調用督撫降一級畱任違限四月以上承修官降四級調用督修官降二級調用督撫降二級畱任違限五月以上者承修官革職督修官降三級調用督撫降三級畱任如承修官玩視船工將應領之帑延挨請領者照遲延豫備軍需例降一級調用倘該上司等故意抑勒以致遲延者将承修之官免議其抑勒之該上司照抑勒不收漕糧例降二級調用如承修官将未經修完之船揑以完工轉報承修官革職督修官降二級調用督撫降一級調用如承修官申報未完督修官作完申報者督修官革職承修官照限議處如承修督修官申報未完督撫揑報完工者督撫革職承修督修官照限議處十二年覆準凡車輛運送糧米及装載諸物於囘空時驗明車夫人數塡寫印票給與車夫進口時繳票呈驗官弁照票盤詰放行如有夾帶私逃兵役卽行拏解軍營仍将車夫照例治罪倘該管官員不實力奉行致有夾帶私逃一經發覺照守口各官不行盤察例罰俸一年至該處稽察囘空之車如驗無夾帶私逃兵役立卽放行不得藉端抑勒畱難又議準兵丁有竊帶餉米盜騎馬匹脫逃者其逃兵之適屬一經移㑹州縣不論夲省鄰省務飭該地方官向家屬名下嚴追拐逃錢糧馬匹照數賠補還項仍令該州縣嚴究實情差役緝獲如該地方官以無闗考成不行嚴究緝拏照軍犯私囘不行察出例罰俸一年又覆準官兵馬匹截曠銀除在省督撫城守標營務令挨季扣清外其餘離省窵遠各營或因請領下季餉銀之時上季截曠銀未能清算扣除者皆隔一季銷算扣除完結如仍有拖延沉擱等弊該督撫等題叅将營員照虧空例議處司道照乾没侵欺司道不行察出例降一級調用乾隆元年覆準各省州縣鄉村有應用鳥槍地方令民人照營兵鳥槍尺寸製造具呈該地方官編號登册以備稽察如有私藏不編號鳥槍或私造鳥槍發賣者将不行察出之該管官罰俸一年三年覆準各省内河修造巡哨船比照修造戰船之例應量為減輕如逾違不及一月者免其議處一月以上者罰俸六月兩月以上者罰俸一年三月以上者罰俸二年四月以上者降一級畱任五月以上者降一級調用督修官違限一月以上者罰俸三月兩月以上者罰俸六月三月以上者罰俸一年四月以上者罰俸二年五月以上者降一級畱任督撫違限一月以上者免議違限兩月以上者罰俸三月三月以上者罰俸六月四月以上者罰俸九月五月以上者罰俸一年馬政一馬場康熙十七年議準每旗分設騸馬場各一場騍馬場各五場設立員外郎八員專管馬場將騸馬場分作十分馴練不熟不堪用一分以上者将該管員外郎罰俸三月二分以上者罰俸六月三分以上者罰俸九月四分以上者罰俸一年五分以上者降一級畱任六分以上者降二級畱任七分以上者降三級調用再将騍馬場亦共分作十分若於原給數闕額一分以上者罰俸一年二分以上者降一級畱任三分以上者降二級畱任四分以上者降三級調用五分以上者降四級調用雍正七年議準馬羣官員除正額馬外如有孳生至十匹以上者将總管官員紀録一次四十匹以上者紀録二次七十匹以上者紀録三次自百匹至百二十匹者準加一級騍馬羣若比原給數目闕至一分以上者将該管官罰俸一年闕二分以上者降一級畱任又養什木管騸馬羣官員如一年百匹馬内不至倒斃者準加一級倒斃自一匹至四匹者紀録二次自五匹至八匹者紀録一次自九匹至十二匹者毋庸議處議叙倒斃自十三匹至二十匹者罰俸一年倒斃自二十一匹至三十匹者罰俸二年倒斃自三十一匹至四十匹者罰俸三年倒斃自四十一匹至五十匹者降一級畱任如有倒斃數目再多者照倒斃數目計算降級一觧馬順治初定觧送軍前馬匹官員如病瘦三匹以下者免議十匹以下者罰俸三月二十匹以下者罰俸六月三十匹以下者罰俸九月四十匹以下者罰俸一年五十匹以下者降一級畱任六十匹以下者降一級調用比此數多者革職康熙五十四年覆準各省運米馬驘如原購州縣不加意餧養以致疲瘦者皆照觧送軍前馬匹病瘦例議處嗣後如疲瘦五十匹以上者将該管道府官罰俸三月百匹以上者罰俸六月百五十匹以上者罰俸九月二百五十匹以上者降一級畱任三百匹以上者降一級調用一偷販馬匹康熙五年題準直𨽻各省民人或違禁販馬或私作馬牙将馬匹接賣說合評價州縣官不行察出罰俸一年典史吏目驛丞並該管知府同知道員各罰俸六月該督撫各罰俸三月十五年題準官員奉差買馬於部發號票之外多帶馬匹及假藉號票帶買販買者革職所過地方官不行盤詰拏獲者皆罰俸一年若徇情縱放者革職受賄者革職提問其督撫差委官役買馬於馬數之外多帶者将所差買督撫罰俸一年三十九年遵旨議準凡姦徒偷盗馬匹經過地方官員職名著免其行察其州縣各官拏獲偷盗馬賊者每案紀錄一次五十三年覆準馬販人等暗結将軍督撫提鎭子弟將疲憊不堪之馬坐索高價而不肖道府營守代為壓派甚至無驛跕之州縣管歩兵之頭目一槩派索其所屬之官勉強收受那墊應差應行令将軍督撫提鎭嚴行禁止若有此等暗結壓派那墊等弊卽行指叅分别議處上司各官徇庇不行題叅者應照徇庇例議處又議準該管地方官所屬境内除宰殺病死馬匹照律不坐外如有失察宰殺堪用馬一二匹者罰俸三月失察宰殺三四匹者罰俸六月失察宰殺五匹以上者罰俸九月失察宰殺十匹以上者罰俸一年失察宰殺三十匹以上者降一級畱任驛遞一驛遞康熙十一年覆準督撫以下各官違禁私用驛遞夫馬並私發牌票支取夫馬者皆降二級調用其司道以下各官私用驛遞夫馬並私發牌票支取夫馬事覺者將督撫降一級畱任驛傳道降二級調用應付州縣驛遞官員革職如州縣驛遞官員將私牌票申送報部者卽将所報官員離任於應升員闕不論俸滿卽升又題準上司將自己馬匹發與州縣驛遞官員勒令輸價者降二級調用督撫不行訪察題叅者罰俸一年又題準官員將不應給之官濫給勘合或違例多支驛站錢糧者皆降一級調用如多支隨卽扣觧者罰俸六月又題準官員給發勘合火牌内多塡馬一匹者罰俸六月二匹者罰俸一年三匹者降一級調用六匹以上者降二級調用十匹以上者降三級調用又議準官員將應撥之船不詳上司私自撥給或擅行估價者皆罰俸一年十四年議準上司將應給驛遞錢糧不照額數給發或夲人告發或科道糾叅審實照侵欺錢糧例議處又議準餧養驛遞馬匹繫府州縣官專責如有藉口應付不足私令民間餧養幫貼者降三級調用十五年議準凡差遣員役兵部應給勘合火牌尾後將多索驛馬不行用印鈐蓋各處分緣由兼寫清漢一紙黏貼於黏連處所用印鈐蓋給發若差遣員役照數騎坐並無多索者該州縣驛遞官員隨到卽於黏貼内塡明應付過馬匹人數用各該驛印信鈐蓋若有藉稱緊急事務將勘合火牌不與驗看多騎驛馬騷擾驛遞者毋得用印信鈐蓋一面申報各該督撫指名題叅若差遣員役無經過州縣驛印信鈐蓋者仍以多索驛馬按其多騎馬數照律處分如州縣驛遞官員遲挨不卽行鈐蓋印信者照稽遲應付例降一級調用十六年議準凡差使馳驛官員不嚴束同行領催差官並跟役人等以致将州縣驛遞人員辱罵毆打非繫𦂳要而將驛馬故意馳斃驛站額馬已足而乘騎越站索詐財物者將領去之官革職如繫領催差官等拏交刑部從重治罪至無勘牌謊稱奉公差使支取驛遞夫馬舟船應用索詐財物亦皆拏交刑部從重治罪此等情由州縣驛遞官員一面申報上司一面報部察覈情實將申報之官照出首私牌票例離任以應升即升若應付遲誤反行揑􅍁謊報将所報之官反坐革職又覆準恭遇車駕行幸各部院衙門取用馬匹内倒失一二匹者將該執事領去官員罰俸六月五匹以下者罰俸一年八匹以下者降一級畱任十一匹以下者降二級調用十四匹以下者降三級調用十七匹以下者降四級調用十八匹以上者革職其馬匹病傷五匹以下者將該執事領去官員罰俸六月十匹以下者罰俸一年十五匹以下者降一級畱任二十匹以下者降二級調用二十五匹以下者降三級調用三十匹以下者降四級調用三十一匹以上者革職至騎驛馬之内閣中書欽天監太醫院等官所騎馬數旣少不過三四匹如将所騎馬匹病傷一二匹者罰俸六月三四匹者罰俸一年倒失一二匹者亦罰俸一年三四匹者降一級畱任以上馬匹倒傷等項如該管情願賠補者免其議處又議準凡驛站馬匹令州縣官員用心看養若驛丞專管之驛則令驛丞餧養若州縣驛丞等官有不照額補馬及不用心餧養以致驛站廢弛者該管布政使驛傳道知府等指名申報督撫題叅照例革職若布政使驛傳道知府不行申報者降二級調用督撫不行察叅者罰俸一年又議準内府官員執事之人及各部院衙門官員人等並無印信憑據私將民夫等項謊詐索取該地方官即行拏獲一面申報該督撫具題一面申報該部若果情實繫官革職領催執事人等拏交刑部從重治罪拏首地方官員照出首私牌票例於應升卽升又議準安塘筆帖式領催驍騎如有令家人馳驛打圍行走刻剝州縣驛遞官役將驛馬故意馳斃勒索好馬干預地方事務擾害百姓等情該督撫察訪指名題叅將筆帖式領催驍騎皆從重治罪該督撫徇情不叅將該督撫照徇情例降二級調用二十七年題準官員有騷擾驛站者管站官徇情不行報部事發將管站官員照徇情例降二級調用又議準官員因大兵班師將囘空鹽船違例封解者罰俸一年四十五年覆準給發勘合内兵部均照題定程塗將應由省分並中東西道塗塡注明白給發如奉差員役不遵勘牌塡注道塗枉道騷擾者繫官降二級調用首先濫應驛站官降一級調用五十一年覆準督撫司道府官家人不持勘合私騎驛馬者州縣官即行申報從重治罪若徇庇不報違例應付將私動驛馬之上司並濫應州縣驛站官員皆照私用驛遞夫馬例分别處分又覆準如勘合火牌内應用硃筆乃用墨筆塡寫者罰俸三月少塡官役姓名者罰俸六月雍正元年議準升任赴任平常出差及駐防官員挈帶家口赴任一槩停其給發兵牌惟頒詔致祭觧送一切欽用物件及差員領有勅印並解送銀緞等項以及押觧人犯兵部仍照例給發兵牌亦照勘合之例兼寫清漢字一紙黏貼尾單令沿塗驗票取給兵丁即於尾單内塡眀並無多索亦無遲誤緣由用印記鈐蓋若有藉稱緊要事務將兵牌不與驗看多索兵丁照多乘馬匹按數議處騷擾營汛照騷擾驛遞例革職其營汛官員故意抑勒遲延不行鈐蓋印記者許其報明該管上司題叅交與兵部議處又議準驛馬無論接任署事定限一月内交代清楚如有逾限不行交代清楚該督撫卽將新舊各官交代遲延情由分别注明指叅照例議處交代馬時令該管上司委官同新任或署印與舊任從公驗看當受當退卽當㸃驗出結仍取具監看之員並無偏袒徇庇印結存案倘有受授不公任意去取以及故行推諉許監看之員詳報上司該管上司卽行題叅如舊任官有俛求等情新任官並不㸃驗勉爲收受或隱忍不報遽行出結者不議前任之官將新任官照前任官有事件未經淸楚卽放新任之例降一級調用如舊任官已經足額而新任官故意求疵不受交代照無未完錢糧盗案署官新任乘隙藉端抑勒遲延例降二級調用如監看之員有偏袒瞻徇等情將監看之員照徇情例議處又議準各省驛馬飭令該驛道每年㸃驗一次其各府州令其於每年奏銷並盤察倉庫之時一并親加㸃驗倘有闕額疲瘦卽行揭報題叅如果臕壯足額取具該管官印結加具該道府州保結申送督撫察覈如有揑飾徇隱情弊該督撫將該管官並驛道府州一并題叅照例議處六年諭各省所設驛站夫役原以豫備公事之用國家歲費帑金本欲使州縣無賠累之苦民間無差派之擾官民並受其福也但聞各省往來人員有不應用夫而擅自動用者該管之人或畏其威勢而不敢不應或廹於情面而不得不應積習相沿驟難禁止地方夫役並受擾累重負朕加惠官民之至意嗣後惟兵部勘合欽差大臣及督撫入境學差試差或知府下縣盤察及他員奉督撫差委盤察者準其動用夫役其餘槩不準動用倘有違例妄索者著該管官卽行揭報督撫題叅若該管官違例濫應發覺之日照例治罪著各省管理驛站事務之道員不時稽察倘有徇隱一幷處分欽此十二年議準盛京驛站正副監督三年任滿能整飭驛務錢糧不致浮冒保題到部者由部按其原銜以應升之官卽用十三年議準奉差員役所有背包不許過六十斤令頭站驛員稱準斤數開明印單每夜住宿之站該驛員詳加覈估照例裝載並無重包卽於印單内塡寫某驛驗明並無重包字様日間經過驛遞卽可驗單應付若有背包過六十斤許驛官將重包斤數詳揭將擅帶重包至七十斤者降一級調用再有多者照此遞降每十斤降一級重包至百斤革職倘前站隱徇被後站察出將該驛官降二級調用乾隆七年奏準營驛各官不詳請督撫咨呈兵部私自差人來京買馬者罰俸一年二十一年奏準向例官員多支驛站錢糧者降一級調用如多支後隨卽扣觧者罰俸六月等語但應付錢糧有多寡之不齊槩議降調未爲允協嗣後驛站應付錢糧廩給多支至十兩以内者降一級畱任十兩以上者降一級調用其銀兩追交藩庫如多支後未及一年奏銷之期隨卽扣解者仍照例罰俸六月一違誤驛務康熙十一年題準官員將奉旨特差重大事務及緊要軍務官役閉門不容進城或不換驛馬或毆打差員者皆革職提問若齎送上用物件驛遞應付稽遲者府州縣降二級調用或稽遲應付遲誤奏章或不按驛接代彼此互越或違例多給或將他人馬匹充驛馬驅使者皆降一級調用十四年議準官員大兵需用縴夫抗拒不給致縴夫越站者革職提問如全誤不行解到者革職如不照數雇給人夫與闕少者降二級調用官員大兵經臨需用船全無解到者革職如解船短少者降一級調用該管官不力行督催罰俸一年又議準官員將應給移駐官兵口糧船遲延者罰俸一年十六年題準遲誤奏章及不按驛接代彼此互越府州縣繫同城不行稽察者皆罰俸六月三十一年題準舖兵傳遞往來公文府州縣等官不時巡察令其依限速遞若有耽延沉匿諸弊該督撫御史指名題叅該管官每案罰俸三月又議準安南國王如有扣關公文必須開明事由守關官員卽爲收接報明該督撫如抑勒不行收接及轉報遲延該督撫卽題叅將守關官員照遲誤奏章例降一級調用雍正三年由部將違誤驛務之驛丞應照例降一級調用無級可降相應革職但該驛丞遲誤僅止四時又值六月雨水之期不敢拘循舊例卽行開闕謹請應否革職畱任之處等因具奏奉旨此所奏是著革職畱任嗣後遇有如此等事亦將情由繕摺奏明欽此五年覆準各省驛站遞送公文令管站官各立印信號簿上站號簿用下站官員印信於每月終彼此移明考覈倘有沉匿稽延等情卽行詳報該管上司據實題叅不得故為容隱其沉匿平常公文一角者馬夫照例杖六十每一角加一等罪止杖一百提調吏典減一等官又減一等若事干軍情機密文書沉匿者不拘角數馬夫杖六十徒一年提調吏典杖一百革役司驛官革職如有所規避者各從其罪之重者論七年議準各省督撫凡觧送餉銀須豫行知會前塗除有大道可通之處仍用車載驘䭾外一遇深山僻路卽嚴飭經過地方官遵例一鞘兩夫如數撥給倘州縣官有不給夫遲延抑勒者卽行指名題叅將不照數給夫之員照運解餉鞘不照撥定兵丁名數䕶送例罰俸一年將遲延抑勒之員照稽遲應付例降一級調用如解餉官員有將人夫工價折銀侵蝕等弊卽餉鞘未至疎失該督撫亦卽題叅將通同折給銀各官一幷議處乾隆十五年諭向來軍機處交出公文籤出馬上飛遞者定限日三百里遇有最緊要事件始以日行六百里字樣加籤公文緩急旣有不同則遞送遲延處分亦應分别差等乃吏部議處此等案件不按三百里六百里之分但察覈時刻逾違皆照扣關公文之例議以降一級調用此例殊未允協見干例議積案甚多著量加區别沉匿軍情機密事件仍照驛站舊例議處外其軍機處交出尋常緊要事件限日行六百里者倘有逾限照扣關公文之例議處若繫軍機處常行事件限馬上飛遞日行三百里者逾限之處照公文遲延例議處著爲令再軍機處交遞公文原繫酌量事件以定限期嗣後非遇最𦂳要事件亦不得以六百里籤發欽此十六年覆準恭遇車駕巡幸遞送行在之本章實在河水漲發舟楫難施以致遲延時刻者令其隨報聲明送行在兵部察覈仍令地方官確察實在情形於結内聲明送部準其免議外其餘遇雨泥濘馬驚墮跌等情槩不得援請寛免十八年覆準凡馬遞公文馬夫因馬驚跌斃或渡河溺斃等項實有顯跡難以托辭狡飾與無故遲延者有間請嗣後凡馬夫跌斃溺斃等情覈驗明確取有印結報部亦準其免議其無故遲延及因别項情由遲延至三刻以上者仍照定例察議欽定大清㑹典則例卷二十三
