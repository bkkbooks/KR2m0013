body:
  text: 吏部驗封清吏司世爵一世爵等級國初定其等有八曰公曰侯曰伯曰子曰男曰輕車都尉曰騎都尉曰雲騎尉自公至輕車都尉又各有二等凡授爵自雲騎尉始如雲騎尉加一雲騎尉則合為騎都尉再加為騎都尉兼一雲騎尉再加為三等輕車都尉遞加至一等輕車都尉如再加一雲騎尉則為一等輕車都尉兼一雲騎尉再加則為三等男積雲騎尉二十有六為一等公雍正元年諭我國家膺圗受命則有佐命元臣際會風雲開拓疆宇至於承平之世亦有勞臣宣力綏靖不庭凡厥鴻猷駿烈焜耀旗常於是酬庸奬功賜以公爵其中分為一等至二等三等所以第其勳勞表其閥閲同於古者河山帶礪之盟爰及苗裔永久勿替甚盛典也朕考古封爵之制漢唐以來公侯皆繫以郡縣之名而漢世功名顯著者則加以美號如信武冠軍建忠定逺之屬並以榮名垂光史册本朝封王者皆選用嘉美字樣其嗣襲封則因之而公爵則但分等次未有封號字樣朕意欲考其當日勳庸錫以嘉名追加為某公使勳勞之臣顯功丕績常赫赫在人耳目間而其子孫承襲封號亦皆顧名思義共加奮勉世為國家效忠抒力期踵美前人之光以副朕褒念勳舊之至意至於宗室外戚則仿古恩澤侯之例命為奉恩公或承恩公以昭寵錫其如何命名定制並將歷來功臣勳戚加錫美號之處著該部詳察定議具奏欽此遵旨恭擬進呈欽定一二三等公美名褒績公忠達公奉義公超武公雄勇公果毅公信勇公建烈公勇勤公英誠公乾隆十四年諭我朝定鼎以來酬庸賞功列爵惟五分等惟三以表世閥而第宏勳雍正年間因公爵居五等之首仿古封號字樣錫以嘉名此誠篤念勳舊俾奕世子孫承襲者顧名思義意至厚也但封爵之制公侯伯一體優崇前代侯則有冠軍定逺之稱伯則有誠意威寧之號今公爵令名炳著而侯伯僅分等次似屬闕略朕欲推廣其意凡我朝所封侯伯考厥成勞追加美號庶伊嗣人咸念乃祖乃父之忠勤紹修令緒國家實攸賴焉至於子男同位自古以地為號未有别封可仍其舊其侯伯如何詳稽勳績定制命名之處該部妥酌定議以聞欽此遵旨恭擬進呈欽定奉義侯恭誠侯順勤侯順義侯昭武侯延恩侯敦惠伯翼烈伯宣義伯襄寧伯昭毅伯威靖伯襄勤伯誠毅伯昭信伯懋烈伯誠武伯勤宣伯一戰功議敘康熙九年題準統兵參贊都統護軍統領前鋒統領副都統得一等功牌二二三四五等功牌各一授為雲騎尉營總參領散秩官前鋒侍衛得一等功牌三二三四五等功牌各一授為雲騎尉委署同授一二三四五等皆全者方爵或不全有可抵算者準其以上等功牌一箇作下等功牌兩箇下等者不得接算上等若前後兩任所得亦準其合算前鋒校護軍校驍騎校得一等功牌四再得二三四五等功牌各一授為雲騎尉署前鋒校護軍校驍騎校得一等功牌五再得二三四五等功牌各一授為雲騎尉多一倍至數倍者由雲騎尉遞加不足者注册一攻城議敘順治十三年題準一等城池敘六人第一登城者授一等輕車都尉第二人至第六人以次遞減第二授二等輕車都尉第三授三等輕車都尉第四授騎都尉兼一雲騎尉第五授騎都尉第六授雲騎尉餘仿此都統及領雲梯攻戰官辨授騎都尉指路及射箭官辨授雲騎尉二等城池敘四人第一登城者授三等輕車都尉第二人至第四人以次遞減領雲梯攻城及指路射箭官與一等城池同三等城池敘三人第一登城者授騎都尉兼一雲騎尉第二第三人以次遞減領雲梯攻戰官辨授雲騎尉指路官辨克兩城者授雲騎尉克一城者注册四等城池敘二人第一登城者授騎都尉第二授雲騎尉領雲梯官辨與三等城池同五等城池第一無雲梯登城者授雲騎尉率領攻戰官辨克兩城者授雲騎尉克一城者注册又題準凡登城死者不論城池大小均授騎都尉一已攻毁城池順治十三年題準第一先登者授雲騎尉康熙九年題準管領官辨授騎都尉一水戰議敘順治十四年題準遇敵水戰奪一等舟敘五人先登者授騎都尉第二授雲騎尉第三四五注册奪二等舟敘四人先登者授雲騎尉第二三四注册奪三等舟敘三人均注册在舟督戰官辨各照所奪之舟與第二人同其餘官辨與第三人同乾隆五年奏準凡軍功議敘由兵部核定等第移咨到部由部題請授爵一陳亡贈爵康熙九年題準統兵參贊都統授騎都尉兼一雲騎尉前鋒護軍統領副都統授騎都尉委署同營總參領前鋒校護軍校驍騎校暨有頂帶官授雲騎尉一八旗世爵承襲天聰五年諭他國貝子當太平無事舉國來歸者或陳亡或病故子孫準與世襲罔替危急來歸者陳亡準襲五次病故準襲三次若每戰身先有功暨一二次首先攻克城池者或陳亡或病故各照原官世襲罔替仍察其舊日有無罪過别行酌奪有出首叛逆大罪者量授官職準襲六次又自他國太平無事有孑身來歸者陳亡準襲四次病故準襲二次有臨難危急而孑身來歸者陳亡準襲二次病故準襲一次至於無職之人或首先登城或當先戰死準給官爵襲二次拏獲姦細授職者陳亡準襲一次病故不準十年定世爵官員準襲次數有越十五次以上者世襲罔替順治八年題準官員今遇恩詔其原有襲次者均準世襲罔替給與誥命其原無襲次官員今恩詔中準授騎都尉者亦給與敕書陳亡者承襲病故者不準其效力軍前所得雲騎尉者準承襲一次又題準凡得誥敕世爵官員亡故與其子承襲若無子方與親兄弟承襲其承襲官亡故仍與承襲官之子若承襲官無子始與其兄弟承襲九年諭已得誥命之人後又得官職者準其增給其襲次有過十次以上者即準世襲十七年諭各官得世襲不幸無子孫者即斷其承襲無以示鼓勵嗣後承襲如無親生子孫者與親祖父及伯叔兄弟姪男姪孫承襲其輩數疏逺及過繼族中之子不準承襲永為定例欽此十八年題準一等子襲十四次二等子襲十三次三等子襲十二次一等男襲十次二等男襲九次三等男襲八次一等輕車都尉襲六次二等輕車都尉襲五次三等輕車都尉襲四次騎都尉襲二次雲騎尉襲一次又題準襲職舊例應襲子男兄弟原繫職官有以二三人之職兼并承襲至公侯伯者嗣後世爵許以無職親近之人承襲若無其人方準有職親近之人兼并承襲亦不得過子爵康熙元年題準凡世爵合并至公侯伯者或年老或病故其子弟承襲時照原繫幾人之爵仍與幾人分襲將品大之官與其親近子弟若子弟無可分襲者奏請欽定二年諭凡有世爵兼佐領之員或亡故或年老解任願分給弟兄者該部驗眀具題七年題準凡一人所立之爵不準與二三人分襲若一人承襲二三人所立之爵仍與二三人分襲九年題準初授世爵準襲次數越十五次者世襲罔替給與誥命十五年題準八旗官員在民間親生子孫暨親伯叔兄弟兄弟之子孫雖載入佐領壯丁册內為嗣者亦不準承襲十七年覆準各姓新滿洲纍世輸誠進貢復自本土遷於寧古塔烏喇地方與舊滿洲官兵一體效力者分别率衆遷移先後給與世爵五十八年遵旨覆準凡效力軍功原立官之人所得之爵給與伊子孫承襲雖襲次已完若原立官本身見在聽其給與應襲之人承襲若無應襲之人留與伊本身給食全俸各旗遇此等之人均察眀引見承襲雍正十二年奏準承襲世爵人員該旗咨部題覆察其已得誥命之後又得官職者計其襲次有過十次以上者準其世襲罔替未及十次者仍準歸并照依襲次承襲不得槩為世襲罔替又奏準八旗世爵員闕該旗即將出闕緣由並世爵誥敕送部由部察對案卷有恭遇恩詔加級之官應行銷去者察眀銷減咨覆該旗照部所定之爵具奏承襲奉旨後仍咨部注册揭送內閣增書誥敕乾隆二年奏準八旗世爵員闕咨部核議承襲時如有在順治九年恩詔以後計功議敘得官統計襲數未及十次其原立之功實在恩詔以前者該旗於咨內聲眀由部照詔前得官人貟之例一體歸并原官世襲罔替十一年題準凡世襲官員所犯公私等罪治以革職枷責者察其所犯之罪並非枉法婪贓侵盜錢糧等罪其所遺世爵應準承襲如見在乏嗣亦無應襲族人俟生子後仍準承襲若終身無嗣該旗將原領誥敕送部察銷十五年奏準按會典內稱康熙九年題準初授世爵準襲次數越十五次者世襲罔替等語所言越十五次以上者雖未眀言何爵但以襲次類推應是三等伯今部內見辦之案如雲騎尉騎都尉等爵皆照會典所載次數辦理其越十五次以上者尚未辦及是以未經置議若不豫為酌定將來無以遵循按順治七年詔前封爵均繫開創軍功應遵舊例世襲罔替詔後封爵如原封誥敕內有世襲罔替字樣亦仍遵照世襲至未載世襲罔替字樣者應照一等子襲十四次之例遞加襲次至一等公應承襲二十六次將應襲次數載於各爵之下嗣後遇有封爵除奉特旨世襲罔替外其餘均按所開襲次載入誥敕一等公襲二十六次二等公襲二十五次三等公襲二十四次一等侯兼一雲騎尉襲二十三次一等侯襲二十二次二等侯襲二十一次三等候襲二十次一等伯兼一雲騎尉襲十九次一等伯襲十八次二等伯襲十七次三等伯襲十六次一等子兼一雲騎尉襲十五次一等子襲十四次二等子襲十三次三等子襲十二次一等男兼一雲騎尉襲十一次一等男襲十次二等男襲九次三等男襲八次一等輕車都尉兼一雲騎尉襲七次一等輕車都尉襲六次二等輕車都尉襲五次三等輕車都尉襲四次騎都尉兼一雲騎尉襲三次騎都尉襲二次雲騎尉襲一次又遵旨議準八旗陳亡人等從前皆給與世爵今欽奉諭旨將順治九年詔後陳亡人等之子孫格外賞給七品官世襲罔替按順治九年詔後給與世爵人員其子孫見在有承襲官者亦有襲次已完者察眀皆繫從前陳亡給與有襲次之官今與恩旨相符每人賞一七品官令其世襲罔替世爵七品官乾隆十六年奏準定為恩騎尉十六年奏準按順治八年題準官員今過恩詔其原有襲次者均準世襲罔替其原無襲次官員今恩詔中準授騎都尉者給與敕書等語是從前有給與誥命注眀世襲罔替者亦有給與敕書注眀襲次者向來總以誥敕為憑分别辦理並非詔前之官一槩準豫世襲罔替嗣後承襲人員察其詔前所立之官原領敕書載眀承襲次數者仍照例按次承襲再乾隆十五年欽奉諭旨詔後所立承襲之官內有因陳亡給官襲次已完者賞與七品官令其世襲罔替是詔後陳亡世襲已沐殊恩今詔前按次承襲之世爵內有陳亡所立之官亦歸并察辦陳亡世爵案內一例辦理一優給半俸康熙九年題準滿洲蒙古漢軍世爵各官病故無人承襲注銷者其妻存日給與原官半俸十年題準世爵病故注銷者其妻亡故而原立官之人親母尚在仍給半俸若原立官之母已故而襲爵官之母尚在者亦給半俸繼母與生母同一衍聖公襲爵順治元年覆準該撫題請由部具題衍聖公由長子承襲主子思子祀事五經博士由衍聖公次子承襲主聖澤書院祀事太常寺博士由衍聖公三子承襲一衍聖公官屬題補順治九年覆準尼山書院學録由衍聖公咨送弟姪題補四氏學録洙泗書院學録由孔氏生員咨送題補至聖廟司樂由各省生員咨送題補管勾典籍掌書書寫知印奏差由衍聖公保舉堪用人員咨送題補均由部照咨具題康熙四十一年覆準四氏學教授由衍聖公於舉人貢生內遴選送部題補與直省各教授一例較俸升轉雍正二年覆準曲阜縣知縣衍聖公會同山東巡撫於孔氏族中簡選正陪具題引見補授遇大計年分仍令衍聖公會同山東巡撫考核八年奉旨定聖廟增設執事官三品二人四品四人五品六人七品八人八品九品各十人各按品級給與章服每逢聖廟祭祀之時虔肅冠裳駿奔趨事遇有闕令衍聖公會同山東學政於孔氏族中秉公遴選擇其人品端方威儀嫻雅者報部充補由部於年終彚題每年各給俸銀二十兩其孔氏子孫內情願充補之人或曾經出仕而退休在籍或身有職銜而未曽出仕以及貢監生童等皆可入選若屆鄉試之期其充補之生童有情願入場者以監生入場應試乾隆三年議準聖廟執事官給封悉照本身實在職銜給以應得封典原無職銜之貢監生童均以八品給封二十一年遵旨覆準曲阜縣知縣改為在外簡選調補之闕其世職知縣已奉恩旨授為世襲六品官應照衍聖公所請準其専主崇聖祠事仍照各執事官之例簡選咨部題補一世襲五經博士順治元年覆準顔曾思孟仲世襲五經博士由適派子孫承襲令衍聖公咨送題補九年覆準南宗孔氏世襲五經博士由適派子孫承襲康熙二十四年議準周公後裔閔子後裔端木子後裔言子後裔冉子雍後裔冉子耕後裔顓孫子後裔有子後裔卜子後裔關氏後裔宋儒朱子後裔程子後裔周子後裔張子後裔邵子後裔均世襲五經博士令衍聖公交見任博士各將子弟嚴加訓導將應承襲之人衍聖公保送禮部考試果能文理通曉注册存案俟承襲之時衍聖公察案具題準其承襲一眀代後裔世襲延恩侯雍正二年諭朕近於聖祖仁皇帝所貽書笥中檢得未經頒發上諭一道以眀太祖崛起布衣統一方夏經文緯武為漢唐宋諸君之所未及其後嗣亦未有如前代荒淫暴虐亡國之迹欲大廓成例訪其支派一人量授官職以奉春秋陳薦仍世襲之朕伏讀之下仰見我聖祖仁皇帝海涵天覆大度深仁逺邁百王超軼萬古朕思史紀東樓詩歌白馬商周以來無不推恩前代後世類多疑忌以致歷代之君宗祀殄絶朕仰體聖祖如天之心逺法隆古盛德之事謹將聖祖所貽上諭頒發爾等訪求眀太祖支派子姓一人量授職銜俾之承襲以奉春秋祭饗但恐有眀迄今年代久逺或有姦徒假冒致生事端爾內閣大學士即會同廷臣詳明妥議以副聖祖仁皇帝寬仁矜恤之至意欽此遵旨確訪眀代後嗣鑲白旗漢軍知府朱之璉等六人引見奉旨朱之璉著授為一等侯世襲其族內人丁準入正白旗封贈一封贈順治初年定覃恩例給封贈一品至五品皆授以誥命六品至九品皆授以敕命順治五年定一品封贈三代二品三品封贈二代四品至七品封贈一代八九品封本身而止軸制一品四軸二三品三軸四品至七品二軸八九品一軸其軸頭一品用玉二品用犀三四品用裹金五品以下用角康熙五十二年題準凡加級請封人員其級多者仍限以制七品以下不得逾五品五六品不逾四品三四品不逾二品一推封順治初年定父祖見任者不得受子孫封致仕及已故者許給有願棄職就封者聽又定兩子均仕其父母受封從其品大者婦人因子封贈而夫與子兩有官亦從其品大者又定封贈母而父官髙於子者如適母則從父官如生母則從子官或被出未改嫁其子有官者亦準封又定命婦因子孫封者並加太字若已故或曽祖祖父父在不加又定內外官員為人後者已封贈祖父母父母者請以本身妻室應得封典貤封本生祖父母父母者亦準貤封又定凡應封妻者止封正妻一人如正妻未封已歿繼室當封者正妻亦準追贈其再繼者不準給封九年題準宗室女封贈經禮部題賜名爵者不封餘均視其夫若子官給與封贈康熙五年題準父職髙於子者照父原品封贈官卑於子者則從其子官封贈雍正三年議準應封贈母者適母生母繼母皆準給與封贈又議準四品至七品應封一代官有願將本身妻室封典貤封祖父母者準其貤封其八九品官貤封父母者亦準貤封至三品以上貤封曾祖父母者請旨定奪一武職之子見任文職康熙五年題準其封父母照文官例父職髙於子者照原職封贈移咨兵部給與武職誥敕父職卑於子者從子文職封贈一八九品官準封父母不封妻室康熙二十九年議準內外八九品官有捐納榮親封典者不封妻室雍正三年議準凡八品以下各官均準其封父母不封本身妻室如父母已受封準封本身一贈外祖父母康熙四十七年議準仕宦至三品幼為外祖父母撫養其外祖父母歿無嗣者許照伊官階捐贈一給封順治十四年題準京官升授在詔前者不分已未到任皆準給與封贈又題準滿漢各官職銜以詔下之日為定給與封典其有詔後身故者仍準給封又題準凡恩詔內有加級者均準其以新加之級給與封典十六年題準詔後降調官員非犯貪酷者仍給與前任封典康熙六年題準告假患病候補等官不在見任者不準給封十四年議準官員將誥敕質當者革職如收貯不慎致蟲蛀損傷或潮濕破壞染汚等項皆罰俸六月如水火盜賊燬失者免議二十七年題準內外滿漢官員遇前詔已經封過後改任者照改任封贈升任者照升任封贈如前詔已照見任品級受封今雖加級不曾換職者不準重封雍正十三年十二月奏準凡額外郎中員外郎主事並額外主事上學習進士均奉特旨分發各部辦事至內外署事官員或經督撫保題奉旨俞允或奉特旨署理及佐雜微員咨部署理已準部覆並見任之倉監督到任在恩詔以前者一例給與封典乾隆元年覆準凡初選及别補人員在詔後到任者不準請封其奉特旨升授以及推升題升等官已離原任未到新任者仍照伊等前任職銜一例準給封贈又議準凡升銜留任各官準以升銜給封其在本任實授復借管别任者照本任實授品級給封其餘實授及署任各官既在各見任應照各見任給封又議準外任官員有加級者不論新舊不準照加級請封一丁憂終養給封雍正十三年十月諭朕登極恩詔內凡內外滿漢官員自一品以至九品均豫封贈所以錫類敷恩遂臣子顯揚之願勵移孝作忠之風也舊例丁憂人員不得均邀封典朕思丁憂之員乃恪遵朝廷定制自盡其為子之情與廢斥在家告假回籍者不同況在任守制者皆得一體沾恩而丁憂之員轉不得邀恩以榮顯其親情既可憫而理亦未協著該部察眀伊等原官品級一並給與封典以成孝思欽此十二月又諭凡官員丁憂守制者遇有恩詔例不準封朕前降旨加恩給與封典其養親回籍之員皆因父母年髙棄官歸養幸逮親存適逢曠典而亦格於成例不得請封情殊可憫著將回籍終養人員照伊等原官品級一並給與封典遂其孝思欽此一封典不重給舊例官員遇覃恩每任中止封贈一次一補給順治初年定凡各官有應封遺漏者準其彚題補給又定各官領過誥敕偶因水火盜賊燬失者許重給康熙九年題準官員先緣事革職後若還職者仍準其具題補給一改給順治十年題準官員封贈或誤寫姓氏遺忘履歷檢舉求更改者由部揭送內閣改給康熙元年題準內外官員有請改新銜者揭送內閣改給不必具題其初次未領再遇恩詔者仍改給新銜已領者繳還原軸亦準改給一停給順治初年定各官曾祖父母祖父母父母有犯十惡及妻非禮聘正室或再醮不許請封十六年題準各官凡失誤軍機及犯貪汚事革職者不得封贈因公罣誤者仍許封贈其詔後犯事革職及大計京察降調亦不準給封一追奪國初定各官封贈後但犯贓私者並行追奪其祖父有官階非因子孫封贈者不在追奪例又定婦人因夫與子得封者不許再嫁違者誥敕追奪治如律順治九年題準八旗職官之妻已經受封其夫亡故願回母家者許其父母領回繳還誥敕康熙二十年題準凡失誤軍機貪汚革職者追奪若因公罣誤與别項革職者永免追奪一土官請封乾隆三年議準凡土官請封該督撫核眀具題一面出咨徑由提塘遞送投部部限三月彚題得旨後揭送內閣限四十日彙齊用寶限十日本省提塘赴部具領頒發廕敘一官員恩廕順治十八年恩詔滿漢官員文職在京四品以上在外三品以上武職京外二品以上送一子入監讀書三年期滿候銓銓選品級詳文選司一承廕順治初年定凡承廕先廕適長子孫適長子孫出仕或有故方廕適次子孫無適次子孫方廕庶長子孫庶長皆無方廕弟暨兄弟之子應合承繼者其子孫在詔後生者不準廕十八年題準官員非見任者不準廕又題準廕監生未承廕之先曾經緣事治罪者不準廕康熙三年題準各官廕監生其父緣事革職其廕子未仕者革廕已仕者免止於降調者仍留廕六年議準各官不論品級暨宫保等銜均照實俸廕子十年題準文職雖革尚存武職者仍留廕十二年題準原品解任食俸者準廕一補廕順治初年定廕生未仕而故準補一人患病殘廢者驗眀退廕别補已補而又故者不準再補康熙三年題準各官廕監生已得官職暨科目中式者不準補廕六年題準凡遇詔各官廕子均察眀準廕以後稱遺忘補請者不準乾隆四年奏準各官廕監生未經出仕中式暨病故殘廢者均以頒詔日期定為限制許以詔前所生子孫補廕已補而又病故殘廢者不再補又奏準官員復職還廕時如原廕有人别無事故仍給還原廕之人如退廕之人殘廢病故别經出仕中式者準其别將並無事故詔前所生子孫復還原廕再還職之官照舊還廕其革職後别行起用者不論文武職銜如品秩相當及在原品以上皆準復還原廕如革職官後經開復例應降級調用者亦準其復還原廕又奏準補廕還廕均題眀準給一官員加贈順治三年題準官員歿於王事者均照本官應升品級加贈並廕一子入監讀書六月期滿侯銓銓選品級詳文選司四年題準巡撫加副都御史銜者贈右都御史道員贈光祿寺卿知府贈太僕寺卿同知知州通判贈道主簿贈衛經歷典史贈主簿六年題準州同贈知州訓導贈國子監學録七年題準按察使司照磨贈按察使司知事布政使司都事贈都司經歷教諭贈國子監助教州判贈都司經歷八年題準總督加尚書銜者贈太子少保十二年題準歿於王事各官其父母妻有申請恩恤誥敕者察眀題給康熙二十三年題準按察使司贈太常寺卿土官一土官承襲順治初年定土知府同知通判知州州同州判吏目知縣縣丞主簿典史經歷知事巡檢驛丞等文職承襲由部給牒書其職銜世系及承襲年月名曰號紙其應襲職者督撫察實先令視事令司府州縣鄰封土司具結及本族宗圗原領號紙咨部具題請襲又定承襲之土官適庶不得越序無子許弟襲族無可襲者或妻或壻為夷衆信服亦許襲子或年幼由督撫題眀注册選本族土舍護理俟其年十五嵗請襲又定土官年老有疾請以子代者聽又定土官親生之子未滿十五嵗者該督撫題眀注册將土司事務委族人護理俟其子長成具題承襲如土官叛逆被戮即推夷衆所素愛者以繼其職康熙二十一年議準土官受賄隱匿凶犯逃人者革職提問不準親子承襲擇本支伯叔兄弟兄弟之子繼其職三十年覆準土官公罪應降三級以內調用者降一級留任應降五級以內調用者降二級留任應革職者降四級留任如有貪酷不法等罪仍革職遇罰俸各按品級計俸罰米每俸銀一兩折罰米一石雍正三年覆準土官支庶子弟中有馴謹能率衆者許本土官申請督撫題給職銜令其分管地方事務其所授職銜視本土官降二等其分管疆土視本土官或三分之一或五分之一再有子孫可分者分土如前例授職再降一等書吏一供事書役額數內閣供事六十二人稽察欽奉上諭事件處供事五人中書科供事八人吏部書吏九十一人戶部書吏一百有六人三庫書吏八人錢法堂書吏四人寶泉局書吏九人祿米海運富新興平裕豐儲濟舊太太平萬安