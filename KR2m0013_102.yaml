body:
  text: 樂部一典樂順治初年定凡宮懸大樂皆教坊司奏之設奉鑾一人正九品左右韶舞各一人左右司樂各一人協同官十有五人俳長二十人色長十有七人歌工九十八人宮中行禮燕㑹用領樂官妻四人領教坊女樂二十四名於宮門內序立奏樂又定凡祠祭之樂皆太常寺神樂觀司之設提㸃左右知觀協律郎司樂等官樂生文武舞生樂舞儀節令協律郎等官教習每月之三六九日演習於凝禧殿康熙十二年改今名八年奉㫖停止教坊司婦女入宮承應更用內監十五年諭祭祀關繫大典必供事人員通曉嫻熟始克肅將誠敬近見太常寺樂舞生聲容儀節多有未諳嗣後須責令勤加肄習務俾精通不得仍前玩忽欽此雍正元年覆準除樂戶籍更選精工音樂之人充教坊樂工七年奏準改教坊司為和聲署乾隆七年設樂部凡太常寺神樂觀所司祭祀之樂和聲署掌儀司所司朝㑹燕饗之樂鑾儀衛所司鐃歌鼓吹前部大樂即大罕波均隸樂部欽簡禮部堂官內務府堂官各一人暨各部院堂官之諳於音律者總理樂部事務是年奉㫖祭祀壇廟總理樂部堂官在御史侍班處侍立大朝日在都御史侍班處侍立又諭郊廟朝㑹巨典攸關其登歌下管各工必肄業有素方免臨期舛誤此事非可猝就但及今亦當次第辦理太常寺樂舞生每月在神樂觀演樂雖有定例再當於春秋二季令赴掌儀司演習如有不協之處即為訓導俾律呂均諧用昭誠敬欽此遵㫖議準每年春秋於三月九月赴掌儀司演樂一次令總理樂部大臣悉心考驗又議準樂部署正滿漢各一人署丞滿漢各一人侍從待詔供奉供用等官無專員均以禮部內務府太常鴻臚寺官兼充又議準額設樂工百二十人見不足額臨期雇覓民間鼓手承充請將見存人內逐一遴選出身清白通曉音律者仍令承直外其有鑾儀衛鼓手頭領繫內務府人應移隸內務府又有內務府人借補民校之六十餘名應將此項人內一並遴選學習又議準鼓手樂工總名為署史而以所司樂器分别其名鐘曰司鐘磬曰司磬琴曰司琴瑟曰司瑟笙簫塤篪亦如之又議準供用官由司鐘司磬司琴司瑟內選補供奉官由供用官選補供奉官升署丞署丞升署正侍從待詔為署正署丞之加銜不作升轉其內務府人有應選執事及考試翻繹文武生員鄉㑹試仍準其與選與試如繫署史與領催同繫供用官與執事人同繫供奉官與庫掌同繫署正署丞侍從待詔並與主事同署史及供用官已選庫掌及已中舉人供奉官升主事及已中進士署正署丞侍從待詔已升員外郎者均開闕别補餘皆兼銜行走至非內府佐領內管領下之漢人止於本署升轉升至署正而止再有勤勞加為侍從待詔再有勤勞止加級食俸不準升轉别衙門將來如有生員舉人進士出身之外省漢人因通曉音律而為本署官者升至署正準與光祿寺署正一例升轉其員闕應補之人皆總理樂部之堂官㑹同內務府總管遴選如署正署丞員闕奏請補授移咨吏部注册署史闕堂官等選補注册侍從待詔供奉供用無定員者仍照前辦理署正署丞見有可以簡用之人若滿員闕則內府佐領內管領下人通曉音律者甚少應設額以待學習得人見在不必補足又奏準署史冠服有官者各照品級服用無官者仍穿遜衣其署史或有應穿補服之時準照未入流雜職官用黃鸝補服向來遜衣上花補亦換黃鸝至有頂帶官員應照內務府鴻臚寺等衙門之例不論品級均掛素珠侍班委署官與見任同離任不準掛八年改神樂觀為神樂所知觀改為知所十四年奏準嗣後禮部滿尚書職銜加兼管樂部太常寺鴻臚寺字樣著為成例二十年奏準神樂所改為神樂署提㸃改為署正知觀改為署丞品級仍舊以昭畫一一樂章名順治元年議準郊廟樂章纍朝各取佳名以明一代之制除漢魏曲名不可枚舉外梁用雅北齊及隋用夏唐用和宋用安金用寧元宗廟用寧郊社用咸前明用和本朝削寇亂以有天下擬改用平字天壇九奏地壇八奏太廟六奏社稷七奏均用中和韶樂又題準孟春上旬諏吉及嵗除前一日祖迎太嵗樂均六奏樂章用平字二年定春秋二仲月上丁釋奠於先師樂章六奏用平字八年定朝日七奏樂章用曦字夕月六奏樂章用光字均奏中和韶樂十一年定躬耕饗先農樂章用豐字康熙五十五年頒中和韶樂於直省文廟雍正二年議準令闕里司樂選工赴太常寺演習訂正轉相傳授以達於直省文廟詳本條下是年欽定耕藉禾辭及耕藉筵燕樂章乾隆六年奏準謹按黃鐘子位天之統也天壇樂章宜以黃鐘為宮黃鐘下生林鐘林鐘未位地之統也地壇樂章宜以林鐘為宮林鐘上生太蔟太蔟寅位人之統也太廟樂章宜以太蔟為宮至社稷壇亦地也亦宜改用林鐘為宮月生於西酉西方正位也又秋分夕月建酉之月也月壇宜改用南呂為宮至日壇若以日東月西日卯月酉論雖應用夾鐘為宮但夾鐘隂而日為陽揆以人心屬日之義則亦宜用太蔟為宮先農壇為農事也宜以姑洗為宮帝王廟先師廟祭以春秋則宜春以夾鐘秋以南呂為宮太嵗殿則宜以嵗始之律太蔟為宮均應將樂章與字譜逐一核定俾宮商諧暢七年遵㫖議準社稷壇於春秋二仲月上戊日致祭宜春以夾鐘為宮秋以南呂為宮又奏準禱祀天神應從圜丘以黃鐘為宮地祇應從方澤以林鐘為宮樂章用豐字又奏準藉田之樂有三一祭先農壇一親耕時歌三十六禾辭一筵燕時奏雨暘時若五穀豐登家給人足三章先農壇樂章繫順治年間舊文已經進呈改正三十六禾辭無庸别撰惟雨暘時若等三章原為筵燕而設雍正二年以其文不雅馴而令改撰乃仿古樂府體為之實不能施於燕樂又自雍正二年來每年耕藉從未賜燕則此樂本可不奏乃因齊宫今名成宮慶升座諸臣慶賀賜茶及還宮並無樂章誤將此三章燕飲之詩奏中和韶樂而歌之實為未協請嗣後慶成宮升座及還宮均用中和韶樂羣臣慶賀時仍用丹陛大樂且常朝賜茶時本無奏樂之理應行停止至賜燕需樂雖停止筵燕之嵗多而樂章不可以不具請將雨暘時若等章照海宇升平日樂章别行撰擬但其辭不必太長每篇較海宇升平日字數止須四分之一又奏準先農壇若遇不行躬耕之年遣順天府府尹致祭不用本壇樂懸應别撰羣祀慶神歡曲皇后不行親蠶之年奏遣內務府奉宸苑太常寺堂官祭先蠶樂章亦如之皇后親蠶遵㫖不用樂懸應别擬樂章比羣祀慶神歡加隆又奏準賢良等祠繫本朝臣子祭時槩不用樂至其他羣祀雖與大祀中祀有差然非天神地祇即古聖先賢故仍舊用樂但不用樂懸仍奏慶神歡曲以别於大祀中祀所奏之曲當照導迎樂例不登歌而止載其辭於書三獻三奏辭譜皆同再前以祭城隍神議不用樂今按城隍在地祇從壇仍應用樂八年諭向來先農壇親祭始用中和韶樂遣官則同羣祀之例不用中和韶樂按日月壇中祀雖遣官仍用中和韶樂惟不飲福受胙朕思國之大事在農先農壇在中祀之列此次遣親王恭代即著照日月壇之例用中和韶樂永著為令欽此十三年駕幸山左躬祭岱嶽樂章六奏用豐字與祭地祇同樂人用太常寺樂生自京隨往樂器於闕里文廟移用十五年駕幸中州躬祭嵩嶽樂章六奏用豐字與祭岱宗同十八年奏準禱祀社稷樂章七奏用豐字祈雨以夾鐘為宮報祭以南呂為宮又奏準禱祀太嵗祈雨報祭樂章均六奏用豐字一佾舞順治初年定凡壇廟祭祀初獻用武舞干戚六十有四亞獻終獻均用文舞羽籥六十有四引舞旗節四舞皆八佾惟文廟止用文舞六佾引舞旌節二乾隆七年議準大雩禮用舞童十有六人分八列執羽翳為皇舞八年具奏武舞干上有字其字止五種而分八佾必不齊一又多互異必繫年久遺失以訛傳訛謹撰擬八句恭候欽定奉㫖改定雨暘時若四海永清倉箱大有八方敉寧奉三永奠得一為正百神受職萬國來庭一壇廟樂器順治元年定祭祀樂章有九奏有八奏有七奏有六奏所奏樂器均金鐘十有六玉磬十有六琴十瑟四排簫二簫十笛十笙十塤二篪六建鼓一搏拊二柷一敔一司樂章者所執木笏十十四年諭祭祀關國家大典應用樂器尤所以感格神明必精美完好始足肅將誠悃朕觀各壇所用其中尚有敝損非朕祇事天地祖宗社稷及致敬告古帝王聖賢之意爾部即詳行察驗應加修整者節次開列奏請以便修整更換欽此康熙五十二年重造各壇廟中和韶樂五十四年改造圜丘壇金鐘玉磬各十有六是年樂器告成太常寺題請載入典訓奉㫖太常寺為樂器告成請載典訓具奏此樂器原繫明朝所載制度原佳但年久失真不免音律未協之處朕因再為修理並未創造今以制作之功全歸於朕似屬不可大學士九卿詹事科道議奏遵㫖議準前代樂器並未窮究根源釐定矩度今中聲既得損益咸宜若不垂載典冊恐嵗久仍復失傳將起造告成年月一并宣付史館五十五年造祈穀壇金鐘十有六玉磬十有六一壇廟設樂冬至大祀孟夏常雩祀天於圜丘樂部率太常協律郎等設中和韶樂於壇三成階下金編鐘在東玉編磬在西均十有六懸以筍簴設建鼓一於鐘懸之次左麾一柷一笙五搏拊一西嚮右敔一笙五搏拊一東嚮左右執笏司歌章者各五人立於笙前東西嚮左右分列琴十瑟四排簫二簫十笛十塤二篪六均北嚮陳武功文德之舞各八佾於階下引舞旌節四干戚羽籥各六十有四孟春祈穀於祈年殿樂部率太常協律郎等設中和韶樂於殿外丹陛上分左右懸陳武功文德佾舞於樂懸之次與圜丘同夏至祭地於方澤樂部率太常協律郎等設中和韶樂於壇二成階下編鐘在西編磬在東建鼓設鐘懸之次左麾一柷一笙五搏拊一東嚮右敔一笙五搏拊一西嚮琴瑟簫笛塤篪依數分比均南嚮旌節干戚羽籥之屬東西分列與南郊同太廟時饗大祫均樂部率太常協律郎等設中和韶樂於殿外階上分左右懸陳佾舞於樂懸之次並如郊祀儀春秋二仲月祈報社稷樂部率太常協律郎等設中和韶樂於壇下內壝門內分左右懸南嚮陳佾舞於樂懸之次如北郊儀春分朝日樂部率太常協律郎等設中和韶樂及佾舞於壇下南北分列東嚮秋分夕月樂部率太常協律郎等設樂懸佾舞西嚮仲春吉亥饗先農樂部率太常協律郎等設中和韶樂及佾舞於壇下東西分列北嚮器數並同季春吉已饗先蠶樂部率掌儀司內監陳樂於壇下左右六合鼓一方響十有六雲璈二琴四瑟二簫六笛六笙六杖鼓二拍版二均北嚮春秋二仲月諏吉祭帝王廟樂部率太常協律郎等設中和韶樂於殿外階土分左右懸北嚮陳佾舞於樂懸之次如常儀春秋上丁釋奠於先師樂部率太常協律郎等設中和韶樂於殿外階上編鐘在東編磬在西皆十有六懸以筍簴設建鼓一於鐘懸之次左麾一柷一搏拊一笙三西嚮右敔一笙三搏拊一東嚮東西分列琴六瑟四排簫二簫六笛六塤二篪四均北嚮陳文舞六佾於殿外引舞旌節二羽籥三十有六歲旱祈雨於天神樂部率太常協律郎等設樂懸於階下之南陳佾舞於樂懸之次均北嚮如式報祀同祈雨於地祇樂部率太常協律郎等設樂懸於階下之北陳佾舞於樂懸之次均南嚮如式報祭同祭方嶽並同惟無佾舞孟春上旬諏吉及嵗除前一日祀太嵗樂部率太常協律郎等設中和韶樂於殿內分左右懸北嚮陳佾舞於樂懸之次嵗旱祈雨報祀同每嵗祭先醫於景惠殿和聲署官設慶神歡樂於西階下雲璈一笙二管二笛二鼓一拍版一火神廟設樂於西階下顯佑宮關帝廟城隍廟東嶽廟黑龍潭龍神祠玉泉龍神祠均設樂於西階上興工祭后土司工之神和聲署設樂於祭所西序迎吻祭窰神門神和聲署設樂於各壇前西序器數均與祭先醫同一朝㑹燕饗之樂順治初年定元日長至萬壽聖節及常朝皆用中和韶樂羣臣行禮用丹陛大樂躬祀壇廟禮成回鑾乘輿出入一切慶典用導迎樂樂章均用平字燕饗侑食殿廷清樂以樂辭之首句為章名部燕衍聖公及文進士恩榮武進士鷹揚燕鄉飲酒於順天府學皆教坊司作樂承應又定皇太后宫三大節朝賀均用丹陛大樂康熙十六年增設太皇太后宮中和韶樂二十五年增設皇太后宮中和韶樂乾隆六年諭殿陛中和韶樂音律節奏與樂章字句覺有未協可即奏試察明具奏欽此遵㫖議準殿陛中和韶樂關朝㑹之隆儀宜情文之悉備協諸聲韻而定樂章被之管絃以成音律要必人聲既和而後從之謹按見在三大節奏樂十二成惟淑平順平二成每章八句其元平和平遂平允平乾平泰平怡平升平豫平履平十成樂章均每章十句每句四字而按之音律節奏則每章八句每句六七八字不等以十句四字之樂章和以八句六七八字之音律其長短抑揚宜有不盡調協應將樂章字句按音律之節奏以調和之章酌從八句句無拘四字令翰林院酌擬樂章十二成交內務府詳細按律奏試務期調協盡善進呈御覽以昭依永和聲八音克諧之盛七年奏準朝㑹樂章字句太多廷臣禮畢則樂工隨意止樂亦屬非體應用七言四句以排班趨進立定之節候為第一句完奏以節鼓下三句每一跪三叩起立之節候各完一句奏以節鼓九叩禮成恰完四句至皇帝於皇太后前行禮不便與臣下辭同應為五言四句節奏如前謹擬樂章進呈俟欽定後行文禮部內務府令樂工演習奉㫖所奏五言七言近於詩句樂章仍以長短句為是準其字數相與倣佛可也又議準三大節廷臣行禮惟於叩首時奏樂實屬無義可尋且亦不便於用請嗣後定丹陛樂為五節於贊排班聲止之後樂作贊退後羣臣趨至仗末之時樂止以一節為趨進三節為三跪九叩一節為趨退如有進表宣表禮儀則於第一節樂闋羣臣已跪之後進表宣表畢樂再作如此則節奏既分遲速合度樂之始終條理與禮之進退趨蹌適相比附又奏準丹陛樂與中和韶樂音節不同因丹陛樂有章而不歌故樂章字句舊未審詳與中和韶樂一例四字為句按諸音律不相符合自應改正又奏準皇后宮三大節升座還宮均用中和韶樂行禮用丹陛大樂又奏準和聲署導迎樂奏佑平禧平之章向例均繫奉鑾以漢語贊奏嗣後請用贊禮郎以國語贊奏庶與各贊相之禮畫一是年具奏內廷行禮丹陛大樂未載章名謹擬定章名恭候欽定奉㫖用雍平又遵㫖議準元日冬至萬壽三大節並以黃鐘為宮朝㑹燕饗各以其月之律為宮皇太后皇后宮三大節均以南呂為宮八年奉㫖嗣後閏月常朝所用樂章視時憲書所載交節之前用上月宮調交節之後用下月宮調永著為例十七年奏準導迎樂章凡躬祭回鑾皆奏祐平一應慶典皆奏禧平一隊舞崇德二年元日樂舞人等分别伎藝賞銀有差順治十年元日舞官十有六人每人給賜朝衣樂舞人等每名賞銀有差十一年元日舞官各賞蟒假樂舞人等各賞銀有差康熙四年元日舞官各賞蟒假鞍馬樂舞人等各賞馬假紬布有差十二年定舞官各賞蟒假大假樂舞人等各賞紬假布匹有差乾隆八年奏準隊舞名色總名慶隆舞介胄騎射為揚烈舞大臣朝服隊舞為喜起舞竹馬為禺馬所戴面為面具綽爾多密什幫總名為䝉古樂曲綽爾多密為笳吹什幫為番部合奏跳擺索為繩技瓦爾喀隊舞為瓦爾喀部樂伎歌章為司章騎竹馬為司舞彈琵琶為司琵琶彈三絃為司三絃搊筝為司筝拉胡琴為司阮劃箕為司節拍版為司拍拍掌人為司抃髙麗斤斗總名為朝鮮國俳擊鼓人為朝鮮鼓伎吹笛為朝鮮笛伎頭領為朝鮮俳長掌儀司斤斗人奉㫖改為擲倒伎瓦爾喀總名為瓦爾喀部舞者為瓦爾喀部舞人𫾣楪子為擊缶伎竹口琴人為瓦爾喀觱栗伎胡琴為瓦爾喀阮伎糚合子人為火樹童子唱秧歌人為禾辭伎十四年平定金川凱旋賜宴奏德勝舞一樂器順治初年定中和韶樂麾一金編鐘十有六玉編磬十有六琴四瑟二排簫二簫二笛二笙四塤二篪二建鼓一搏拊二柷一敔一丹陛大樂戲竹二方響二雲璈二笛四管四笙四大鼓二杖鼓一拍版一清樂二部一殿廷清樂一丹陛清樂均雲璈二笛二管二笙二小鼓一杖鼓一拍版一導迎樂戲竹二雲璈二笛四管六笙二大鼓一拍版一鐃歌鼓吹畫角二十有四掆鼓四十有八應角鼓八杖鼓二拍版二金二鉦四笛十有二大銅角八小銅角八前部大樂舊名大罕波大銅角四小銅角四金口角四鐃歌大樂大銅角八小銅角八金口角八銅鼓四金二鈸一㸃一鼓一鐃歌清樂雲璈二笛二管二笙二鼓一鈸一㸃一部燕樂雲璈二笛二管二笙二鼓一拍版一雍正二年定耕藉三十六禾辭樂金鼓簫笛笙拍各六領樂官六人乾隆七年定先蠶壇採桑歌樂金鼓拍版各二簫笛笙各六又奏準恭按太和殿皇帝升座所用中和韶樂止有笙四簫二笛二殿廷髙敞惟聞鐘鼓之聲按明㑹典所載樂器笙十有六簫十有二笛十有二多於今數倍嗣後笙請用八簫笛均請用四庶幾克諧至歌工二人似亦太少請增為四人並請宮內應用中和韶樂一例增設一朝㑹燕饗設樂元日長至萬壽聖節常朝樂部率和聲署陳中和韶樂於太和殿檐下金編鐘在東玉編磬在西皆十有六懸以筍簴設建鼓一於鐘懸之西左麾一柷一搏拊一西嚮右敔一搏拊一東嚮左右司歌章者各二人東西嚮左右分列琴四瑟二排簫二簫四笛四笙八塤二篪二均北嚮領樂官東西各四人署史三十五人設丹陛大樂於太和門檐下東大鼓一方響一雲璈二簫二笛四管四笙四杖鼓一拍版一西大鼓一方響一樂皆北嚮領樂官東西各二人樂工二十二人節以戲竹領樂官二人率執戲竹者二人夾丹陛中階立東西面慈寧宮朝賀內監陳中和韶樂於慈寧宮檐下陳丹陛大樂於長慶門內於皇后行禮時移慈寧門內檐下皇后宮朝賀陳中和韶樂於交泰殿檐下陳丹陛大樂於儀駕之南皆左右北嚮太和殿筵燕侑食奏清樂一設於殿外中和韶樂之後一設於丹陛大樂之東巡酒奏慶隆舞樂及諸樂舞均先俟於殿外車駕出入及進穜稑進鉤筐齎榜用導迎樂均領樂官六人率署史二十人豫設於午門外頒朔進春進表箋均領樂官二人率署史二十人豫設導迎樂於禮部欽天監進書豫設於纂修館前迎吻豫設於琉璃窰禮部賜衍聖公燕及恩榮燕兵部鷹揚燕均和聲署設樂器五魁舞舞童五人歌舞均豫俟於大堂露臺下鄉飲酒禮設樂於府學西階下鐃歌鼓吹設於午門外車駕省方䝉古畫角並鐃歌大樂鐃歌清樂設於旌門外左右郊祀回鑾前部大樂設自壇門止於天安門耕藉三十六禾辭樂設於藉田左右親蠶採桑歌樂設於桑園之左右欽定大清㑹典則例卷九十八
