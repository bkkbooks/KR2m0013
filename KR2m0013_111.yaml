body:
  text: 兵部武選清吏司職制五一單月衛守備選法康熙十一年題準由守禦所千總門千總衛千總較俸推升守備每五闕門衛千總用四人守禦所千總用一人乾隆七年奏準單月衛守備員闕將衛所千總議敘即升千總捐升衛守備者用一人衛所千總領運全完加至都司銜奉旨以衛用者用一人再將此四項輪用一周至八人後將守禦所千總議敘即升及俸深應升並領運全完加至都司銜奉旨以衛用者共為一班相間輪用一人又議準門千總食俸年久由部行文步軍統領出具考語送部引見分别營衛注册其奉旨以衛守備用者歸於單月應升班內與衛千總一同較俸推升不準計算京俸又議準即升人員按文到議敘先後推升如同日文到照食俸先後推升應升人員照食俸先後推升捐升人員照輸庫日期先後推升如同日輸庫籖掣先後注册遇闕推升大銜以衛用者照引見奉旨日期先後推升如同日奉旨照食俸先後推升又議準衛所千總加至都司銜具呈告降以衛守備用者照具呈注册日期於用九人之後推升一人俟告降注册之人用完即將此班停止十四年議準衛所千總議敘即升者若遇應升班內俸次已到仍準其較俸推升十八年議準衛千總領運漕糧向來分别省分遠近議敘江南江西浙江湖廣等遠省一運全完加銜一等二運全完加銜二等三運全完歸入即升班內選用山東河南等近省一運全完紀録二次二運全完加銜一等三運全完紀録二次四運全完加銜二等五運全完紀録二次六運全完歸入即升班選用今加銜既經刪除應將衛千總加銜改為加級準其隨帶至於紀録及歸入即升班內選用之處仍照向例行又議準單月衛守備原設兩捐班今此次江振有捐納衛守備者歸入舊有捐班選用一雙月衛守備選法順治初年定由裁汰改推還職降補三甲武進士題準給劄等項挨次選用每三闕各項輪用一人武進士用二人又定雙月衛守備員闕以裁汰改推為一班還職降調為一班武進士為一班年滿咨送為一班功加為一班效勞為一班投誠為一班每八闕各項輪用一人武進士用二人康熙四十八年題準見任千把總年滿千總中武進士應以衛用者於雙月别立一班選用雍正十一年議準難廕議敘以衛守備用者歸入給劄班內選用效力武舉三年期滿以衛守備用者歸入效勞班內選用十二年議準藍翎侍衛奉旨以衛守備用者歸入科班選用乾隆元年奏準見任營守備調取引見奉旨以衛守備用及籖掣營守偹之武進士並效力人員年滿千總引見奉旨以衛守備用者於雙月各班之末設改用班選用見任調取者於改用班內先用七年奏準雙月衛守備員闕將開復降補捐還三項共為一班相間輪用一人簡選三等武進士及奉旨歸入武進士班內以衛用之藍翎侍衛共用二人難廕守備以衛用者用一人效力期滿以衛用者用一人武進士充補提塘期滿以衛用者用一人捐納衛守備用二人見任營守備調取引見以衛用者及掣補營守備之武進士並效力人員年滿千總引見改用衛守備者共為一班用一人又奏準開復降補人員各照奉旨日期先後選用如同日奉旨公同掣籖注册挨次選用捐還原職人員照輸庫日期先後選用如同日輸庫亦公同掣籖注册挨次選用武進士照簡選年月挨科分名次先後選用藍翎侍衛由武進士出身者與武進士同較科分名次選用由世爵出身者按其補授藍翎日期與見在投供武進士之科分年月日期相較選用難廕守備效勞人員各照引見奉旨以衛用日期先後選用如同日奉旨難廕人員照題廕先後挨次選用效勞人員照期滿先後選用如同日期滿照科分名次選用武進士充補提塘者照期滿先後選用如同日期滿照科分名次選用捐納人員每班用新捐三人後間用舊捐一人其舊捐新捐各項均相間輪用如同例捐者照輸庫日期先後選用如同日輸庫公同掣籖注册挨次選用見任營員奉旨以衛用者於改班內選用掣補營守備奉旨改用衛守備者各照奉旨日期先後選用如同日奉旨武進士按簡選年分科分名次先後效勞人員照考職年月年滿千總照注册前後倘有二三項人員同日奉旨掣定先後注册挨次選用九年議準直振例捐納衛守備者為新捐其前新捐班改為舊新捐每班用新捐三人次用舊新捐一人再次用舊捐一人十一年議準新江例捐納衛守備者於原設捐班之下增設二班選用十三年議準川運例捐納衛守備者於新江班次之下增設二班選用又議準東振例捐納衛守備者於人文到部投供照輸庫日期各班用四人之後選用一人如投供無人即將别班選用俟續有投供到部即還班補用一人餘仍於各班四人之後相間輪用十一年議準雙月衛守備原設立六捐班今此項江振捐納衛守備者歸入新江川運兩捐班內即用一守禦所千總選法順治初年定守禦所千總員闕歸於雙月由裁汰改推還職降補三科武舉外委題準給劄效勞等項挨次選用康熙五十三年議準南漕效力領運全完並無事故應以守禦所千總用者設委用班選用又議準效勞期滿考授守禦所千總者設效勞班選用雍正十二年奏準豫籌糧運例捐納守禦所千總者别立一班選用又議準武舉充補提塘應以守禦所千總用者歸入效勞班內即用乾隆五年奏準改武廕生應以守禦所千總用者歸入給劄班內選用七年奏準守禦所千總員闕將開復降調捐還三項共為一班相間輪用一人南漕效力領運全完並無事故者用一人改武廕生應以守禦所用者用一人效力期滿考授守禦所者用一人捐納守禦所者用二人每班用新捐三人後間用舊捐一人豫籌糧運例捐納守禦所者用一人又奏準開復降調人員各照奉旨日期先後選用如同日奉旨公同掣籖注册挨次選用捐還原職人員照輸庫日期先後選用如同日輸庫亦公同掣籖注册挨次選用南漕效力人員三運全完咨部注册各照文到日期先後選用如同日文到公同掣籖注册挨次選用改武廕生照引見奉旨日期先後選用如同日奉旨照題廕改武日期先後挨次選用效勞人員照期滿先後選用如同日期滿武舉照科分名次選用不由武舉出身者照考職年月簡選等第名次先後選用捐納人員舊捐新捐各項均相間輪用如同例捐者照輸庫日期先後選用如同日輸庫公同掣籖注册挨次選用豫籌糧運事例捐納人員照輸庫日期先後選用如同日輸庫亦公同掣籖注册挨次選用九年議準直振例捐納守禦所千總者為新捐從前新捐者改為舊新捐每班用新捐三人次用舊新捐一人再次用舊捐一人十一年議準新江例捐納守禦所千總者歸原設捐班選用十三年議準川運東振各例捐納守禦所千總者均歸原設捐班選用十八年議準守禦所千總原設立三捐班今此次江振捐納守禦所千總者歸入舊有捐班選用一門千總選法康熙四十一年覆準門千總員闕歸入雙月將武舉選用雍正二年議準門千總員闕停用漢人內九門將滿洲武舉選用外七門將漢軍武舉選用又議準漢軍武舉及漢軍捐納千總者門衛並選武舉照簡選年分選用捐納照原捐班次選用十年議準內九門千總照外七門千總之例均用漢軍武舉其漢軍捐納千總者準其一同選用乾隆七年奏準門千總員闕將漢軍武舉用二人次將漢軍監生捐納千總者用一人次將隨幫漢軍武舉用二人再將漢軍監生捐納千總者用一人武舉照簡選年月科分名次選用監生照輸庫日期先後選用如同日輸庫公同掣籖注册挨次選用隨幫照運滿日期選用如同日運滿仍照簡選年月科分名次選用又議準漢軍世家子弟交巡捕營以千總用者準其改補門千總借用捐納二班九年議準門千總捐納二班仍給還捐納人員漢軍候補之世家子弟改補門千總者照無班可歸之例遇用二人後選用一人照奉旨日期先後如同日奉旨令其公同掣籖挨次選用十八年議準門千總原設立兩捐班今此次江振捐納門千總者歸入舊有捐班選用一衛千總選法順治初年定衛千總員闕雙月由裁汰改推還職降補一二科武舉外委題準給劄等項挨次選用每五闕各項輪用一人武舉用四人單月由犧牲所所副論俸推升又定衛千總員闕以裁汰改推為一班還職降補為一班武舉為一班年滿咨送為一班功加為一班效勞為一班投誠為一班每十闕各項輪用一人武舉用四人康熙十一年議準衛千總員闕均歸雙月選用雍正十一年議準一二等武舉各設一科班三等武舉設四科班均照簡選年分挨科分名次選用如一二三等武舉同年簡選而一二等中有科分深於三等者將三等之科班借與一二等選用又議準難廕應以衛千總用者設一廕班照題廕先後挨次選用又議準一二三等守禦所隨幫一二等武舉隨幫三等武舉隨幫一二三等漢軍武舉隨幫各設一隨幫班相間輪班選用此三項內一等與一等較二等與二等較三等與三等較各照運滿日期選用如日期相同仍照簡選年分挨科分名次選用又議準一二三等武舉隨幫內有科分深者設一深科班各照科分名次選用不必復較簡選年分又議準一二三等世爵隨幫及二三等效勞者共設一給劄班相間輪班選用此兩項內一等與一等較二等與二等較三等與三等較各照簡選年分選用又議準捐納衛千總人員設二班選用每班用新捐三人後間用舊捐一人其舊捐新捐各項均相間輪班選用如同例捐者按輸庫日期先後選用如同日輸庫令其公同掣籖注册挨次選用十二年奏準豫籌糧運例捐納衛千總於二捐班之下别設一班選用此班之內先用候補衛千總捐即用之人如無即用之人將改捐之人選用乾隆元年奏準南漕效力人員領重運三次全完咨部注册按文到日期先後選用如同日文到令其公同掣籖挨次選用又奏準一二三等武舉隨幫內有簡選早而選期己屆者於深科班下設一簡選班選用如簡選年分相同按等第名次選用不必復較科分名次又奏準武舉隨幫在塗委領重運一次者設代領重運班於十九班之後選用一人照重運報滿日期先後選用如日期相同照簡選年分挨科分名次選用三年議準南漕重運武舉科分最深者按科分名次先後入於代領重運班內相間輪班選用不必復較簡選年分如科分名次相同令其公同掣籖注册挨次選用七年奏準開復降補捐還三項共為一班相間輪用一人開復降補者照奉旨日期先後選用捐還原職者照輸庫日期先後選用如同日奉旨同日輸庫均令公同掣籤注册挨次選用又奏準衛千總員闕以開復降補捐還三項共為一班相間輪用一人簡選武舉一等科班用一人二等科班用一人三等科班用四人南漕效力領重運者用一人難廕用一人一二三等守禦所隨幫用一人一二等武舉隨幫用一人三等隨幫用一人一二三等漢軍武舉隨幫用一人一二三等武舉科分深者用一人一二三等武舉簡選早者用一人一二三等世爵隨幫及二三等效勞者相間輪用一人捐納者用二人豫籌糧運例捐納者用一人隨幫武舉委領重運及南漕重運之科深者共為一班相間輪用一人廕生應以衛千總用者於各班之末用一人八年奉旨武舉內有隨幫效力年滿之人應以衛千總用者其選用之法按其從前簡選等第分班銓選一等人數無多選期尚速其二等有數十人三等多至二百餘人每年選用不過三四人甚為壅滯朕思衛千總與營千總雖屬有間但武職皆尚技勇亦當及其強壯之時而用之且此項武職既繫隨幫年滿非間散武舉可比若遲至二三十年之久方得録用未免精力就衰難為國家宣力所當酌量疏通著該部詳議具奏欽此遵旨議準衛千總班內設有二捐班繫選用從前捐納之人應將此二班借於三等隨幫選用如本班捐納有赴部投供者仍盡本班先用其豫籌糧運例捐納衛千總己經用完應將所有别設一班移於二班之上選用二等隨幫又議準代領重運人員照檄委代領日期先後選用如日期相同照簡選年分科分名次選用九年議準直振例捐納衛千總為新捐從前新捐者改為舊新捐每班用新捐三人次用舊新捐一人再次用舊捐一人至二等隨幫武舉先因捐納人少遂以捐班借與選用此次直振捐納之人既歸原設捐班選用其三等武舉隨幫應於三等幫班之下增設一班選用十年議準衛千總班次內設有廕班乃選用難廕此項見在無人應將此班借與三等隨幫選用如本班難廕之人有赴部投供者仍先盡本班選用十一年議準新江例捐納衛千總應於原設捐班之下增設江振新班由武舉及候補候選捐納者用二人由監生捐納者用一人十三年議準川運例捐納衛千總亦應增設一班由武舉及候補候選捐納者用二人由監生並監生己捐衛千總職銜捐納者用一人又議準東振例捐衛千總由候補候選捐納衛千總者人文到部投供照輸庫日期於各班用七人之後選用一人如投供無人將别項之人選用續有赴部投供者即還班補用一人仍於各班用七人之後再行輪班選用其由監生捐納衛千總者於東振候補候選者用二人之後選用一人十八年奏準三等隨幫人數甚多銓選壅滯應將見在無人投供之恩廕班照借難廕班例以三等隨幫武舉選用如恩廕人員有赴部投供者仍先盡本班選用又議準衛千總原設立八捐班今此次江振捐納衛千總者準其於各班先用一甘肅衛所官選法康熙五十三年議準甘肅衛所守備千總專用武舉武進士本省之人照例回避其雙月守備千總員闕將科目出身者選用如遇别項人員頂選即將見在投供之科目出身者挨次選用不還班先盡本班科目選用如本班無人即將下班科目挨次選用單月守備員闕如見任俸深頂升人員非科目出身者即將見任科目之人較俸挨次選用亦不還班先盡本班科目推升如本班無人即將下班科目較俸推升雍正六年議準甘肅衛所守備千總五年俸滿照邊俸例題報注册升用一拔補貴州衛千總乾隆三年議準貴州古州衛台拱衛清江左右衛八寨衛丹江衛凱里衛黃平衛各千總員闕由該督於通省千把內簡選通曉文義熟悉苖情辦事勤慎者勿論武舉行伍出身一例調補拔補咨部彚題奉旨後給劄任事五年俸滿果能實心辦理著有成效準以營守備題升一拔補山東𬋩河衛千總乾隆十五年議準山東𬋩河衛千總員闕由該總河於所屬營千總把總內簡選諳練河工之人調補拔補六年俸滿送部引見分别營衛注册升用一門衛所官升營官順治初年定門衛所各千總食俸年深者每年於正七兩月遇營都司營守備員闕專以衛所千總及門千總推升餘月仍將營衛守備推升武選司於正七兩月將衛所門千總俸滿應升者在截限之前開付職方司升用有裁汰停升等項後經補官開復者即付職方司升用移付之後如武選司有闕仍先盡武選司升用乾隆七年議準每年正七兩月都司營守備員闕武選司於衛所門千總守禦所千總內奉旨以營用者按單月推升班次於截限之前開付職方司升用其三月五月九月十一月將衛守備門衛千總開付職方司升用內有裁汰停升等項己經補官開復者亦通行較俸一例開付升用乾隆十九年奉旨職方司銓選均歸武選司辦理一衛所官改營官康熙十年題準衛所官有錢糧之責若於未掣籖以前以不識文義具呈者準以營辨改用掣籖以後以不識文義具呈者以原品休致一難廕衛千總改營官乾隆五年議準貴州難廕衛千總願赴部候補者仍歸班推用外如有告降以把總用者由該督考驗如果年力壯健弓馬優嫻遇把總員闕與各項應用之人比較拔補八年議準邊省難廕衛千總有願告降以把總用者準照貴州之例行一衛所調繁雍正五年議準山東之濟寧江南之江淮興武蘇州鎮江大河揚州泗州浙江之杭州湖北之武昌武昌左衛湖南之嶽州均屬事務繁難遇有守備員闕由總漕於所屬守備內簡選才具優長並無事故者題請調補給咨赴部引見其所遺之闕歸部銓選乾隆八年議準江南之泗州改為簡闕山東之德州改為繁闕又議準調補繁衛守備停其送部引見於議覆奉旨後即給劄赴任十年覆準領運千總有才具平常不勝繁任者總漕印於事簡千總內簡選題請調補又議準江淮衛之三六七八九各幫興武衛之頭三四六七八九各幫淮安衛之二四兩幫廬州衛大河衛之二三兩幫揚州衛之頭幫鎮海衛泗州衛之前後兩幫鳯陽衛之常州幫均屬事務繁難遇有千總員闕總漕照調補繁衛守備之例於事簡千總內簡選題請調補十三年議準杭州衛之頭二兩幫溫州衛紹興衛之前後兩幫事務繁難遇有千總員闕準照江淮等二十四幫之例題請調補十五年議準江南之鎮海鳳陽長淮浙江之嘉興均改為繁闕又議準揚州衛之三幫安慶衛之頭幫建陽衛之寧太幫事務繁難遇有千總員闕準其題請調補十八年議準江淮衛六幫興武衛頭幫九幫鎮海衛後幫均改為簡闕台州衛前幫後幫金衢所幫均改為繁闕一衛所千總分别營衛雍正十一年議準單月推升之衛所千總並正七兩月應升都司之大銜千總由部考核有食俸年久及完糧議敘即升應升者開單行令各該督撫詳加考驗出具考語咨部引見或以營闕用或以衛闕用恭候欽定注册各歸班銓選一簡選武舉康熙三十九年議準漢軍漢人武舉及各省世爵隨幫於會試之年赴部呈報足有百人之數由部將領侍衛內大臣大學士八旗都統職名開列奏請欽點會同考試其馬步射堪用者照例以衛所千總選用不堪者革退又議準簡選武舉考試馬步射皆優者列為一等馬射優步射平步射優馬射平者列為二等馬步射皆平者列為三等均注册歸入各班內以衛千總選用如弓馬生疏者列為四等令回籍學習俟下次簡選之時再行簡選其弓馬不堪人衰者列為五等奏請革退又議準各省同科武舉同具呈簡選者照直隸山東山西河南江南江西福建浙江湖北湖南西安甘肅四川廣東廣西雲南貴州等省先後之序入册一簡發南漕效力康熙五十一年議準候選千總由部簡選三四十人引見恭候欽定發往南漕效力如領押重運無誤咨部注册選用雍正二年議準南漕領押重運效力需人總漕將需用之數具題由部於己經簡選候選衛千總之漢軍漢人武舉並候推守禦所千總內令各取具同鄉京官印結及該旗圗結存案題請會同領侍衛內大臣簡選引見照總漕題請之數恭候欽定發往南漕效力三運無誤咨部注册以衛千總選用一簡發隨幫雍正二年議準糧船回空向設隨幫一人若領押回空無誤以衛千總選用但此等隨幫不過間散之人借此虛冒功名應停其頂補於簡選之武舉及候選守禦所千總人員內有願頂補者在總漕衙門具呈遇有隨幫員闕由總漕咨部給劄頂補三運無誤以衛千總選用乾隆七年奏準糧船回空需用隨幫人員由總漕開明人數咨部由部於候推守禦所千總並簡選以衛千總用之漢軍漢人武舉內有情願隨幫者令其具呈取具同鄉京官印結及該旗圗結存案照總漕咨請之數掣籖給照分發漕標遇頂補隨幫時總漕咨部給劄三運無誤咨部注册以衛千總選用十六年議準隨幫武舉掣定幫次之後如有患病請假者委官驗實取給咨部準其調理病痊日仍令頂補原幫一衛所官降補順治初年定衛守備降一級補守禦所千總守禦所千總降一級補衛千總康熙三十三年議準門衛千總降一級補營千總分發該員本籍附近省分與應行拔補之人一同考驗拔補雍正六年議準門千總皆繫漢軍若降補把總發與巡捕營考驗拔補至衛所守備千總及效力武舉如繫漢軍有降補把總者皆照此例分發乾隆元年議準南漕領押重運人員及隨幫武舉遇有事故或降一級應以營千總用降二級應以把總用者均令赴部按所降之級發原籍附近省分與應行拔補之人一同考驗拔補降三級者無級可降即行革退一衛所官開復擬升順治初年定衛所各官由戶工二部題準開復到部者核對原恭分數將應準銷案各官照截限例每月二十日內到者本月擬升若二十一日後到者扣於下月擬升其原疏內將錢糧已完銷案及未完各官一本彙題到部者不候題覆將應準銷案各官亦準擬升乾隆七年奏準錢糧已完應銷案各官及未完各官并為一本具題到部者仍候題覆奉旨後將應銷案各官擬升一衛所官開闕順治初年定衛所守備千總等官有病故者不必具題由該撫將該員病故日期咨部開闕門千總病故由該統領咨部開闕至因老病請休及告假等項事故咨文到部之日即行開闕入於半月彚題欽定大清會典則例卷一百七
