body:
  text: 禮部祠祭清吏司中祀三一饗先農壇順治十一年定嵗仲春亥日皇帝躬行耕藉禮先期户部禮部堂官偕順天府尹進耕藉耒耜及穜稑種屆期親饗先農之神行三獻禮飲福受胙禮成乃躬耕藉田十二年題準每年春二月致祭先農遣順天府尹行禮大興宛平二縣官陪祀康熙十一年二月聖祖仁皇帝行耕藉禮親饗先農壇前期遣官祗告奉先殿一應禮儀與順治十一年同雍正元年奉㫖明嵗先農壇耕藉之禮朕理當親行凡一應修理之處即行豫備二年二月世宗憲皇帝行耕藉禮親饗先農壇禮儀與康熙十一年同三年奉㫖今嵗朕仍親耕藉田是年致祭先農禮儀與二年同四年奉㫖朕今嵗親耕藉田著禮部豫備是年致祭先農禮儀與三年同以後每年耕藉親祭禮儀皆同七年諭明年祭先農壇朕詣太嵗殿上香不必請神牌欽此乾隆四年議準先農壇飲福受胙禮照日壇月壇之例不必别設拜褥光祿寺堂官恭奉至行禮處皇帝跪受其帝王廟飲福受胙禮同五年禮部以三月初十日屆耕藉之期正值閏嵗春寒奏請遣官致祭先農其耕藉之禮令順天府尹照直省督撫例辦理奉㫖致祭先農壇著遣親王恭代行禮餘依議欽此八年諭向來先農壇親祭始用中和韶樂遣官則同小祀之例不用中和韶樂按日月壇中祀雖遣官仍用中和韶樂惟不飲福受胙朕思國家之大事在農先農壇在中祀之列此次遣親王恭代即著照日月壇之例用中和韶樂永著為令欽此一直省祭先農壇雍正四年覆準奉天府尹直省督撫及所屬府州縣衛各於所治地方擇潔淨之地設立先農壇及藉田自雍正五年為始每嵗仲春亥日各率所屬官以及耆老農夫致祭先農之神照九卿耕藉行九推之禮其設立先農壇並致祭先農皆動支正項錢糧用過數目各該地方官報明户部察核其藉田內所收米粟敬謹收貯供各該處祭祀之粢盛將各處設立藉田畝數令該撫報明户部存案又議準由部每年於十月初一日頒時憲書之後豫擇次年耕藉吉期奏聞行文奉天府尹直省督撫轉飭所屬同日祭先農禮成行耕藉禮仍將遵行日期奏聞五年議準按春秋文義云先農壇髙四尺二寸方廣五丈其各省壇制應髙二尺一寸廣二丈五尺直省先農神牌典制均照京城式樣恭造各於藉田後建先農壇壇後酌建正房三間配房各一間正房中間奉先農神牌東間存貯祭器農具西間收貯藉田米榖配房東間置辦祭器西間令看守農民居住壇之外周圍築土為牆啓門南嚮又題準祭祀陳設供品照各省祭社稷之禮用羊一豕一帛一鉶一簠二簋二籩四豆四主祭陪祭各官均於前期致齊二日祭日具朝服齊集先農壇行禮如祭社稷之儀十三年覆準直省致祭先農大小武職官應與文職官一同與祭俾知耕藉巨典又覆準吉林黑龍江二處將軍皆有民社之任應照直省督撫府州縣衛之制建先農壇致祭命該將軍每嵗舉行以重農事一饗先蠶乾隆元年議準於安定門外北郊建立先蠶祠遣太常卿一人祭以少牢七年建先蠶壇於西苑之東北隅恭饗先蠶之神又議準每年季春之月皇后親饗先蠶由禮部豫劄欽天監選擇三月吉巳日致祭具題請㫖皇后親蠶先期致齊二日恭設齊戒牌銅人於交泰殿屇期以太牢饗先蠶之神不讀祝文行三獻禮飲福受胙並與皇帝親饗先農禮同妃嬪公主福晋以下文武三品大臣命婦以上咸致齊陪祭女官執事者典儀一人贊引二人傳贊三人奉香盤一人奠帛一人獻爵一人奉福酒接福酒各一人奉福胙接福胙各一人以上皆各備一人前引十人相儀二人補闕八人諸執事有遺闕者補之均於宮人內選充如不敷用於內府及八旗命婦能國語者充之均由內務府遴選具奏宫殿監督領侍先期選委內監演禮其應用祭品及饗先蠶樂章均由各該衙門敬謹辦理並於內監中置蠶宫令一人丞一人專司蠶壇繭館諸務十一年諭部議皇后親蠶典禮於不親祭之年照舊制遣太常寺堂官致祭朕思從前建立蠶祠未議皇后親蠶之禮是以照祭祀例遣官今既舉行皇后親蠶典禮若遇不親祭之年自應遣妃一人恭代以昭誠敬為是所有行禮位次及酌定一應儀注大學士會同各該衙門妥議具奏欽此遵㫖議準嗣後每年皇后親蠶或遣妃恭代禮部照例兩請具題如遇遣妃恭代之年著內務府請㫖其遣妃致祭前期齊戒二日不進銅人行禮位次照先農壇遣官恭代之例公主福晋命婦仍陪祀如儀十四年諭皇后親蠶典禮經朕降㫖若遇不親祭之年遣妃一人恭代前因內閣禮部㑹議册立皇貴妃禮儀一疏復經降㫖册封典禮於本年三月後舉行其親蠶禮俟正位中宫後該部照例奏請今據禮部奏稱本年三月內先蠶祭期請照例遣妃致祭此於禮意未協夫妃所恭代者代皇后也有皇后則妃可承命行事皇貴妃未經正位中宫則親祭之禮尚不當舉行何得遣妃恭代應照皇帝不親耕藉遣官致祭先農之例於內務府堂官或禮部太常寺堂官奉宸苑卿內酌遣一人致祭方足以明等威而昭儀制欽此是年遣內務府堂官行禮上香由西階升降一應執事均用太常官十五年具奏十六年季春吉巳宜饗先蠶值車駕南巡尚未回鑾擬遵照皇后不行親祭之年請遣妃一人恭代行禮奉㫖皇后行禮後再遣妃恭代行禮欽此十六年遣內務府堂官行禮一應禮儀與十四年同中祀四一祈禱天神地祇順治初年定為天神壇於正陽門外先農壇之南南嚮壇北立青白石龕四均刻雲形為雲師雨師風伯雷師位為地祇壇於天神壇之西北嚮壇南立青白石龕五刻山形者三為五嶽五鎮啓運山積慶山天柱山隆業山位刻水形者二龕內四周鑿池注水為四海四瀆位左設石龕二刻山水形各一為京畿名山大川位右設石龕二刻山水形各一為天下名山大川位嵗遇水旱則遣官祗告雲雨風雷之神嶽鎮陵山海瀆京畿天下名山大川之祇祈禱有應則報祭均奉主於龕同日致祭十六年停祭積慶山康熙二年封鳯臺山為昌瑞山設位地祇壇乾隆元年封泰寧山為永寧山設位地祇壇與康熙二年同二年奏準天神地祇兩壇增修壇壝牆宇七年奏準神祇壇增撰樂章所有應用樂器照例增設九年奏準神祇壇向未專設祭器樂器應增設以昭誠敬十七年奏準神祇壇本無專祀惟祈雨則祗告於壇而不奏樂自乾隆七年始增設樂章揆之一應因事祗告之禮均不作樂殊未畫一至甘雨霑足報祭告壇僅用酒果脯醢與祈告相同又與報祭之禮未稱請嗣後各壇告祭停止作樂至報祭時均應加籩豆牲牢即將神祇壇樂章用於報祭如此一轉移間則告祭之儀不致互異而報祭之典亦昭隆盛十八年奏準凡祈雨之祭時當待澤孔殷蠲誠致禱與因事祗告之禮原有不同儀文自宜周備今奉諭㫖祭禮用樂以導和氣而格神祇乃事神之禮與齊戒徹懸自致誠恪其義各異且樂足以宣通隂陽之氣祈雨致祭仍以用樂為是欽此嗣後遇祈雨祭告仍用樂章一時巡祭山川康熙二十三年聖祖仁皇帝東巡躬祭泰嶽太常寺備祝版用白紙黃緣墨書祝版內不書御名東嶽神位前陳帛一牛一羊一豕一簠二簋二籩十豆十尊一爵三祝文由翰林院撰擬祝版香帛爵由太常寺齎往祭器祭品牲醴由守土官豫備祭日行在鑾儀衛設鹵簿詣廟不作樂還行宫時作樂聖祖仁皇帝御龍袍衮服內大臣侍衛扈從如儀隨蹕王公官員及守土官文官知府武官副將以上咸蟒袍補服陪祭聖駕至廟內二門降輿入中門詣拜位率羣臣行二跪六拜禮上香奠帛獻爵讀祝致祭均如儀又議準聖駕至黃河應於敕封顯佑通濟神廟遣官一人讀祝文致祭遣官由太常寺題請祝版用白紙黃緣墨書祝文由翰林院撰擬香帛由太常寺祭品由地方官豫備又奉詔遣官遍祭嶽鎮海瀆之祇以禮部太常寺筆帖式一人典守香帛祭文祭文由翰林院撰擬香帛由太常寺移取祭品由各地方官豫備往祭官各給黃繖一御仗二龍旗二牌二二十八年聖祖仁皇帝東巡躬祭泰嶽與二十三年禮同三十五年聖祖仁皇帝北征駐蹕噶爾圖遣大學士致祭山川風雨之神及出卡倫遣祭域外山川之神並祭告風雨之神聖駕至克魯倫河遣祭河神均與因事遣祭嶽瀆禮同三十六年聖祖仁皇帝西巡山陜所過名山大川均遣官致祭駐蹕保德州遣官致祭黃河之神聖駕至橫城復遣大學士致祭均與因事遣祭河瀆禮同四十二年諭朕行幸山西經過地方有應祭嶽瀆及歷代帝王陵寢豫行議奏欽此遵㫖行文直隸山西將應祭之嶽瀆及帝王陵寢相距御路逺近稽考確實咨部定議具奏奉旨在三十里內者奏聞遣官致祭欽此是年聖祖仁皇帝西巡至潼關遣官致祭西嶽華山祭文由翰林院撰擬香帛由太常寺祭品由地方官豫備祭儀照因事遣祭方嶽之禮乾隆十二年議準鑾輿巡幸山東泰山靈嶽近在魯邦宜崇報饗古者因名山以升中原有燔柴之禮聖祖仁皇帝因儀文度數書闕有間後世議封禪者尤多傅㑹不經特允廷議照祀五嶽禮致祭今車駕東巡致祭泰山應遵康熙二十三年之例舉行惟是致祭方嶽向未用樂謹按周禮大司樂奏㽔賓歌函鐘舞大夏以祭山川是山川之祭自古用樂今特舉盛典秩於岱宗請仿古用樂樂章令樂部撰擬樂器樂生均由樂部率往又奏準在京遣官致祭東嶽廟用和聲署樂至祈雨報祀地祇則用中和韶樂五嶽均屬地祇應用中和韶樂擬照地祇壇樂章宫譜增撰樂章並令太常協律郎率樂生豫赴岱廟先期演習又奏準東巡致祭岱嶽帛篚尊爵及登鉶簠簋籩豆等器令太常寺先期運往交該地方官敬謹收貯以備致祭之用又奏準岱廟大門內有二門一曰配天一曰仁安請於配天門內仁安門外設更衣大次十三年諭稽古巡狩翕河喬嶽典禮攸隆朕兹親祀孔廟有事於泰山其四嶽四瀆皆宜薦馨用申誠敬著該督就近遴委大員前往以崇秩祀欽此遵旨議準祭文香帛交各該衙門備辦委筆帖式由京馳驛齎送各該督撫就近遴委大員致祭是年車駕東巡狩秩岱宗至日先詣嶽廟入大門至配天門降輿贊引太常卿二人恭導皇帝入仁安門進殿中門至香案前立有司設拜褥司香官跪進香皇帝三上香畢就拜褥行一跪三拜禮興贊引官恭導出殿至配天門升輿還行宫翼日致祭儀與康熙二十三年同十四年議準鑾輿巡省中州嵩高維嶽禮宜展䖍所有饗祀中嶽樂章禮神供帳及應需一應器物交樂部太常寺遵照東巡祭岱宗之例先期敬謹辦理又奏準嵩嶽廟門有五其四曰峻極門請於峻極門外設更衣大次祭日並前一日駕由中門入至峻極門外降輿十五年奏準鑾輿巡幸中州在河陽及柳園口二處渡河經行輝縣百泉河衛二水屬豫地經流川瀆在車駕經行三十里以內屇時應循例遣官展䖍轉飭有司屆期於傍河相地設壇遣官祗行祭禮祭文由翰林院撰擬香帛由太常寺祭品由地方官豫備遣祭官照例將扈從之滿漢大臣職名開列具奏恭候欽命是年鑾輿巡狩中州至嵩嶽日詣廟上香翼日致祭均與十三年祭岱宗禮同又奏準皇帝於十三年東巡東嶽岱宗已躬親展䖍今將南巡江浙經行山東應照常祭禮遣官致祭岱宗又黃河自入江南境經邳宿而東至小清口淮水㑹之江流經揚鎮二府而東皆鑾輿所必經古者天子巡狩致祭所過名山大川今車駕南巡由宿遷登舟逾淮揚抵浙江河瀆淮瀆江瀆之祇並宜致祭應行文該省督撫飭守土官於黃河江淮擇地設壇屇時遣官致祭再浙江海塘皇帝親臨閲視又㑹稽山為東南望鎮附近皆有専祠兹逢百神懷柔之㑹應一同遣祭如禮用昭盛典又奏準車駕南巡經由江浙每渡江河應遣官上香行