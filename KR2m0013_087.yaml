水龍王之神令河道總督致祭祭文內院撰給遣官齎往祭品由地方官豫備康熙十八年議準封洞庭湖神遣禮部司官齎香帛前往讀文致祭祭文由翰林院撰擬香帛由太常寺豫備二十二年覆準遣官致祭永興縣雞公山神廟內所奉北極佑聖真君祭文由翰林院撰擬香帛由太常寺備辦以禮部司官齎往仍令守土官春秋嵗祀三十七年以霸州新安縣等處屢被水災特發帑金新開河道賜名永定河敕封永定河之神建廟立碑於蘆溝橋遣官齎香帛前往讀文致祭祭文碑文由翰林院撰擬香帛由太常寺豫備三十九年覆準黃運河神加封昭靈效順四字六十一年浙省修築石塘於江海匯流尖山之麓建廟致祭江海潮神雍正二年敕封四海龍神東曰顯仁南曰昭明西曰正恆北曰崇禮均遣官齎祭文香帛交該地方官致祭是年敕封洞庭湖神加涵元匯利四字立廟湖廣常德府遣官齎祭文香帛交該地方官致祭又覆準敕封雲南各鹽井神為普潤龍王之神令該地方官立廟春秋致祭三年覆準山東境內漳河濟漕利運敕封臨清州河為福漕漳河之神館陶縣河為惠濟漳河之神行文該撫飭各地方官恭設神牌嵗以春秋致祭又覆準河南百泉之上衛源神祠通漕濟運應行文該撫恭設神牌致祭一次春秋照例致祭又覆準青海水神於塞外嚴寒之候湧泉濟軍敕封為靈顯青海之神行文該督委官前往致祭將滿漢䝉古三體字封號立碑勒石垂諸永久五年覆準石景山渾河龍神已敕封為永定河神應令河道總督春秋致祭六年覆準河東鹽池敕封為昭惠裕阜鹽池之神有司嵗以春秋致祭七年覆準浙江寧波府鎮海縣蛟門山龍神加封為涵元昭泰鎮海龍神有司嵗以六月朔日致祭又覆準寧夏大渠正閘龍神敕封為寧渠普利龍王之神每嵗守土官春秋致祭八年覆準惠農昌潤二渠工程告竣寧夏寧朔二縣既各建龍王廟不便合祭應令兩縣各設神牌書寧渠普利之神於每嵗春秋仲月辰日照山川禮致祭又覆準直𨽻滹沱河敕封長源永濟滹沱河神飭守土官每年春秋致祭九月覆準陕省大清漢唐三渠相去不過一二十里均在寧朔縣地方三渠各有廟宇照惠農昌潤二渠之例各設寧渠普利神牌每嵗春秋二季三渠分祭其大清渠廟適中應令寧朔縣承祭漢唐二渠臨時各委官往祭祭品祭期均與惠農昌潤二渠同其廟宇亦令增修以光祀典又奏準永定河神建新廟於石景山南龐村告成匾額由內閣撰擬碑文由翰林院撰擬照祭嶽鎮海瀆之禮開列滿漢二品以下四品以上各部院堂官欽命一人往祭十年覆準廣西桂林府興安縣陡河海陽山神敕封為安流襄績海陽山神有司嵗以季秋九日致祭十一年議準永定河神每嵗春秋祭祀所需應於附近石景山之固安房山等縣入官地畝內酌撥八百畝以供祀典十二年覆準山西介休縣有舊泉三新泉六復有井泉一建立水神廟令有司春秋致祭又覆準廣西鬱林州以涌泉著異建立祠宇敕封為昭德沛澤泉源之神有司嵗以春秋致祭乾隆二年諭洞庭湖神福佑一方君山神廟載在祀典其春秋祭品照湘江江神之例動用正項錢糧以昭禮敬欽此十六年覆準永定河神加封為安流廣惠之神廟名惠濟經該督奏明盧溝橋舊有河神廟又石景山廟適符惠濟嘉名應毋庸别營新廟即將二處舊廟酌加修葺將新頒封號於二廟各設神牌廟工告竣之日頒發碑文勒石其盧溝橋廟於乾隆三年已賜有永佑安瀾匾額今御書畿輔安瀾匾額請俟刋刻告成懸於石景山惠濟廟內照例遣官致祭並嵗飭有司春秋展祀勿替二十二年覆準各省府州縣致祭境內山川均以春秋仲月祭社稷壇之戊日同祭一祀太嵗順治元年定每年於正月初旬諏吉及十二月嵗除大建於二十九日小建於二十八日遣官致祭太嵗之神為殿於先農壇東北正殿祀太嵗東廡為春秋月將西廡為夏冬月將又定太嵗神牌新正用黃紙墨書照年建干支書某干支太嵗之神籠於牌上南嚮俟嵗除祭畢同祝帛送燎康熙二十九年祈雨遣官致祭太嵗天神地祇壇望祭四海之神雍正十年祈雨照康熙二十九年例舉行乾隆二年諭天時亢旱已逾兼旬見在䖍誠祈禱尚未得霈甘霖朕心深為憂惕天神地祇壇應竭誠致祭著禮部太常寺即察明典禮具奏舉行欽此遵㫖議準謹按雲雨風雷之神為天神嶽鎮海瀆陵山京畿天下名山大川之神為地祇遇有旱潦間奉㫖遣官致祭案康熙二十九年祈雨奉㫖遣官致祭太嵗天神地祇之神并於城外四面潔淨處所搭造席棚遣官致祭四海之神雍正十年遵㫖祈禱雨澤照康熙二十九年之例遣官致祭今天時亢旱聖心憂惕命察典禮應照雍正十年之例遣官致祭太嵗天神地祇再於城外四面潔淨處所搭造席棚遣官望祭四海之神令欽天監選擇吉期遣官致祭祭文由翰林院撰擬香帛祭品交太常寺備辦席棚交順天府辦理分遣大臣七人前期齊戒竭誠致祭乾隆七年覆準孟夏常雩後不雨禱雨於神祇壇並遣官祈於太嵗十六年覆準各壇祀神均有上香之儀太嵗月將同屬天神則升馨求陽不應與他祭異况偶逢祈雨致祭太嵗儀注見載上香其春冬二祭應照神祇壇例交工部製造爐鐙嗣後孟春嵗除二祭遣官致祭行上香禮兩廡分獻太常官亦隨上香以昭畫一十八年奏準太嵗暨十二月神牌向安奉先農壇神庫祭時請至殿內祭畢復還神庫每遇耕藉之時皇帝饗先農禮成至太嵗殿上香例不請神牌至殿內但於拜殿行禮謹按太嵗壇有正殿兩廡與天神地祇先農有壇無殿者不同應即於殿廡內安奉神牌於神龕前設神座祭時請神牌安奉神座禮成復龕恭遇皇帝上香之時神牌安奉殿內惟不請出神龕庶於禮意允協奉㫖太嵗月將神牌照所奏安奉太嵗殿及兩廡其天神地祇先農神牌亦不應安奉配屋著移奉於正屋欽此又議準太嵗殿見在樂章乃新正嵗除通用與祈禱雨澤之義全不相涉應交樂部别撰樂章照神祇壇皆用豐字以昭畫一欽定大淸㑹典則例卷八十三
