body:
  text: 兵部武選清吏司職制三一八旗世爵及武職外用乾隆元年議準自山海關至殺虎口保德州並古北宣化大同所屬地方均繫沿邊關隘要地副參遊都守等官以三分留與緑旗補用以七分給與旗員對品補用補用之後五年為滿如果熟諳營伍人地相宜準該督提等以各該員應升之官題補其餘咨部轉咨該旗按該員原職應升之官先盡升補又議準河屯營副將標下千總一員把總二員並分防喀喇河屯龍鬚門波羅樹森吉圖各千總大店子馬圈子喇嘛洞虎什哈丫頭溝二溝中六溝八溝營左右司各把總歸八旗補用其餘千總仍照舊悉歸河屯營及內地沿邊辨兵內簡選拔補六年議準八旗武職外用沿邊各闕於補用之後不拘年限如果弓馬嫻熟諳練營伍除以該員應升之官題補其餘未得題補者統以五年為滿該督提出具考語給咨送部由部考驗引見並將例有題闕之省開單請旨分發遇員闕題補其所遺沿邊員闕仍於在京八旗武職內簡選補用如有不能熟悉營伍不宜外任者咨部發回各該旗仍在原處行走以原職應升之官補用至副將內有整飭營伍堪膺表率之任者不拘年限該督提出具考語保送到部注册將該員仍留原任俟各省總兵官闕與緑旗營副將一例論俸開列具題恭候欽定補授又議準直隸山西沿邊副將以一等侍衛王府長史前鋒護軍驍騎參領步軍翼尉並一品二品世爵補用參將遊擊以二等侍衛前鋒侍衛副參領佐領步軍協尉三品世爵補用都司以三等侍衛步軍副尉步軍尉四品世爵補用守備以藍翎侍衛五品世爵及親軍校前鋒校護軍校驍騎校補用副將分左右翼輪用參遊都守八旗輪用均於員闕時行文領侍衛內大臣鑾儀衛火器營八旗都統前鋒護軍步軍統領等簡選三四人出具考語咨送到部考試弓馬簡選引見恭候欽定補授又奏準直隸內地副將參將遊擊都司守備以三分補用旗員七分補用緑旗第一次補用旗員第二第三補用緑旗第四補用旗員第五第六補用緑旗第七補用旗員第八第九第十補用緑旗其應用旗員者由部行文該督於見任沿邊旗員內簡選熟悉營伍之人題請調補所遺沿邊之闕仍於在京八旗武職內簡選補用此內由沿邊調補內地之參遊都守遇有應升之闕仍準其題補其調補內地未經題升者仍接算前任邊俸扣滿五年該督出具考語給咨送部引見恭候欽定分發各省遇闕題補至調補內地之副將俟有總兵官闕亦與緑旗副將一例論俸開列具題又奏準巡捕三營馬蘭鎮泰寧鎮千總並直隸山西沿邊千總將前鋒護軍與緑旗輪流間補行令八旗內務府於前鋒護軍內簡選三十五名引見交部分發直隸十五名山西省十二名馬蘭鎮二名泰寧鎮二名巡捕營四名將姓名掣定注册俟有各該處千總員闕掣補給劄赴任二年之內如行走好熟悉營務各該處出具考語保送由部引見將各省守備題闕數目開列隨摺奏聞恭候分發各省果有技藝出衆與各該處營伍相宜者準其以守備題補倘有行走怠惰不宜營伍者即咨送回部仍發原處行走將及用完之日仍行令八旗內務府簡選引見七年奏準陜西甘肅沿邊並四川松潘鎮均地處邊陲番夷錯雜應分用旗員以資彈壓陜甘應題補之副參遊都守共二百有九員四川松潘應題補之副參遊都守共十有六員無論沿邊腹地第一次員闕補用旗員第二三四五次補用緑旗再有員闕照此輪用凡遇員闕應以旗員補用者按照旗分咨取應用之人考驗簡選三四人引見恭候欽定補授至補授之後如果熟諳營務遇有應升之闕準其與緑旗人員一例簡選題補其開列推升亦與緑旗一例較俸升轉倘不宜外任即咨送回部仍發各該旗令在原處行走俟有該員原職應升之官先盡補用至陜甘二省千總一百九十三員四川松潘千總十有八員第一次員闕補用前鋒護軍第二三四五次補用緑旗再有員闕照此輪用由部行文左右二翼前鋒統領八旗護軍統領簡選人材壯健弓馬嫻熟言語明白者每旗各保送十人咨部考驗引見記名注册遇有陜甘松潘千總員闕應補旗員者掣籖補用補用之後均照緑旗千總之例一例六年俸滿如有材技優長熟悉營務者準其不拘年限以守備題升其未經題升食俸已滿者該督照緑旗俸滿千總之例出具考語送部引見恭候欽定倘有不能熟悉緑旗營務不宜外任者即咨送回部發回各該旗仍在原處行走又議準上三旗親軍內簡選身材壯健弓馬嫻熟語言明白者每旗酌量保送一二人送部入於八旗前鋒護軍內公同考驗引見八年遵旨議準從前所定旗員分用緑旗員闕之例原繫將滿漢升途通行籌酌今按陜甘松潘所屬各營補用之旗員乃與緑旗一例升轉則直隸山西沿邊補用並直隸調補內地各旗員均應照陜甘松潘之例無庸定以年限令該督提試看如弓馬嫻熟諳練營伍遇有應升之闕與緑旗一例簡選題補如有不能熟悉營伍不宜外任亦不必拘定五年之限隨時咨部仍照原議發回各該旗令其在原處行走俟有原職應升之官先盡升補所遺沿邊之闕仍將在京八旗武職簡選補用其餘未得題補者均與緑旗各官一例較俸升轉所有五年俸滿保送之例應請停止又奏準前鋒護軍補用千總陜甘二省並四川松潘一鎮定以五闕補用一人照緑旗千總之例六年俸滿今將巡捕營並直隸山西亦照陜甘四川之例五闕補用一人則前鋒護軍補用無幾然若與緑旗間用則又礙緑旗進身之階請嗣後巡捕三營直隸山西沿邊等處並馬蘭寧泰二鎮額設千總均以三分之一補用前鋒護軍俟有員闕第一次補用前鋒護軍第二次三次補用緑旗再有員闕照此輪用所有原定保送之例應請停止均照例六年俸滿出具考語保送引見如有技藝出衆諳練營伍者不拘年限遇有守備員闕即準題補其行走怠惰不宜營伍者仍照原議發回原處行走其保送之千總到部引見時恭候欽定或發回原任省分或發往鄰省以守備題補或交巡捕營當差其人材勞績不稱題補之選者不必隨營候推亦留旗在原處行走仍給與千總頂帶遇有簡選升用之處與應升之人一例簡選升用又奏準陜甘二省及四川松潘一鎮應題副參遊都守並直隸山西沿邊各關分用旗員原以邊疆緊要滿洲人材衆多弓馬素嫻以之分任可以表率辨兵整飭營伍方於邊疆有益近見各處有將年力就衰及年少世爵不宜外任之人保送驗其弓馬並非出衆殊失邊疆期於得人之意嗣後凡遇咨取應用人員務須詳慎簡選將年力精壯弓馬優嫻者秉公保送如實在無人即聲明咨覆若各處均無人可送及所送之人皆不堪用即將其次應用旗分咨取遴選引見倘各處保送人員內由部考驗人材弓馬僅可選取一人不便引見即咨取其次應用旗分人員一并簡選三四人引見如應取鑲黃旗人員只選一人即咨取其次應用之正黃旗一并簡選三四人引見若將鑲黃旗人員補授再有員闕仍於正黃旗取用若將正黃旗人員補授再有員闕鑲黃正黃二旗均停其咨取即將其次應用之正白旗人員簡選引見補授其餘旗分照此辦理九年奏準直隸山西陜甘松潘各闕分用旗員原議專用滿洲並無兼用蒙古之例但滿洲兼入蒙古旗分人員因其原屬滿洲準其一例簡選而蒙古兼入滿洲旗分人員見在已分隸滿洲旗分均在滿洲旗分升轉乃補授沿邊各闕不得與滿洲一例簡選殊未畫一嗣後應與滿洲人員一例簡選補用又奏準各省豫保千總為數無幾候補守備人多應將分用旗員之陜甘二省及四川松潘一鎮應題守備除第一次員闕照例分用旗員外其第二次掣用豫保千總第三四五次在於候補人員內簡選題補至川省並未分用旗員之標協營如有應題守備員闕以第一次歸豫保千總掣補第二三四次歸候補人員題補再有員闕皆照此輪用十年奏準鷹房狗房鶻房三處一二品廕生騎都尉兼入各執事行走者以都司補用三品廕生藍翎侍衛雲騎尉並候補職官及有頂帶人員選入各執事行走見食俸祿者以守備補用間散及驍騎等選補各執事人見食錢糧者按其差使與前鋒護軍相等以千總補用直隸山西沿邊補用旗員乃分定地方按照旗分挨次補用陜甘松潘乃以題闕五分之一分用旗員按照旗分輪流補用其都司守備員闕遇有分用旗員者行文鷹房狗房鶻房三處按照咨取旗分將行走已過五年人去得者公同簡選一人出具考語保送赴部與各處送到人員一同考驗簡選引見請旨補授至應用千總一人由部照護軍前鋒補用千總之例行文三處將行走已過五年人去得者不拘人數簡選出具考語保送到部考驗引見奉旨準其注册後歸入八旗滿洲見用千總前鋒護軍之內一例按照旗分遇有員闕繫分用前鋒護軍者公同掣籖補用十三年奉旨京師護軍參領護軍校護軍內有曾經出師並騎射優者簡選補授緑旗各官其圓明園護軍參領護軍校護軍等非京城經制官兵是以並未與選但此內既有可以選用之人且差務較前有增看來皆可黽勉將事自應照京城一例簡選補授以示鼓勵嗣後簡選補授緑旗各官時入於京城各該旗會同圓明園總統等一例簡選又奏準前鋒護軍補用千總六年俸滿應行保送之人如果材技優長堪膺保題者遇有守備員闕即準題補其才力技藝雖堪保題尚覺稍次者保送來京隨到隨令軍機大臣會部再加考驗擇其實堪升用者引見或發回原任之省及鄰省以守備題補或交巡捕營當差或仍令回旗於原處行走均候欽定其不中選者毋庸引見以守備銜回旗於原處行走按年滿日期候推至材技均屬平常者不必送部引見給與千總職銜咨回該旗於原處行走又奏四川夔州協副將員闕或令該督簡選題補或於一等侍衛內簡選引見恭候命下嗣後即照此辦理奉旨著簡選引見欽此十四年奏準靜宜園之健鋭營參領前鋒校內除本營應升外若有可以應升外省者歸入京城各該旗會同健鋭營總統一例簡選十五年奉旨從前降旨沿邊及直隸地方營協參用八旗滿洲人員原因旗員弓馬素優人材驍徑習於勞苦整頓營伍是其所長是以令其分班補用今行之數年邊方營伍漸次整飭而旗員之於外任相宜者亦悉經擢用嗣後緑營分用旗員者自都司以上應稍為裁減俾得其平兵部再行詳悉定議具奏欽此遵旨議奏直隸山西二省沿邊都司以上三七分用旗員者酌減一分以六分補用旗員四分補用緑旗陜甘二省四川松潘鎮都司以上五分之一分用旗員者改為六分之一以第一次員闕補用旗員第二三四五六次補用緑旗再有員闕照此輪用奉旨直隸山西沿邊地方都司以上員闕著以五分補用旗員五分補用緑營官員欽此又諭朕前因緑旗營伍廢弛兵力軟弱皆由將辨不能約束訓練所致是以分用旗員以資鈐轄邇來因簡用過多業將遊擊以下之闕量加酌減今觀侍衛協領參領內才具稍優者皆已陸續外用副參等闕仍屬過多旗員內漸少出色之人而緑旗員闕亦未免稍偏朕因材器使內外原屬一體但隨時委用輕重務在合宜自應量為調劑且向來旗員內升者即藍翎侍衛亦皆以為榮初無欣羡外任之意若樂於外任可以偷安且多得俸薪則所見卑鄙已甚滿洲淳朴之風當不出此總之操縱在朕向之多用緑旗不可歎向隅今之簡用滿洲不可歎阻途所有分闕簡用之處該部再行定議具奏欽此遵旨議準直隸沿邊副將四員以三用緑旗一用旗員山西沿邊參將十有一員以七用緑旗四用旗員直隸內地由部推補之副參向於十闕之內將見任沿邊旗員調補三人以七歸部推補今副參員闕第一次員闕用沿邊旗員調補第二三四五次歸部推補陜甘二省四川松潘鎮副將等員闕原於五分之一補用旗員業經改為六分之一今再酌減一分第一次員闕補用旗員第二三四五六七次補用緑旗再有員闕照此輪用至千總員闕除巡捕營馬蘭泰寧二鎮仍照例以前鋒護軍補用外其陜甘松潘千總員闕槩用緑旗停其以前鋒護軍補用又議準直隸張家口副將昌平營參將提標右營遵化營喜峰口宣化鎮標右營各遊擊石塘路居庸路鞏華城山永協左營山海路石門路建昌路潘家口柴溝營懷安城龍門路滴水崖蔚州西城長安嶺各都司提標中營前營黃花路湯泉營山永協右營三屯協右營宣化鎮中營張家口中軍張家口左營獨石口右營萬全營膳房堡新河堡洗馬林堡西陽堡鎮安堡龍門所東城礬山堡懷來城周四溝堡四海冶堡岔道城左衛城各守備均以旗員補用又議準山西殺虎口副將新平路助馬路偏關營河堡營各參將大同鎮標中營右營各遊擊天城髙山渾源欣州靖逺營朔平朔州鎮西保德各都司大同鎮標中營左營右營前營北樓小石口應州平魯寧武殺虎協右營各守備均以旗員補用十七年奏準俸滿到部之滿千總會同軍機大臣簡選實堪升用之人引見其不中選者發回該旗以守備候推惟是此項人員因千總年滿回京簡選不堪外用令回原處當差今若仍以守備推用不惟得官無期而以不堪外用之人復推用守備似未允協嗣後滿千總俸滿到部仍照原議會同軍機大臣考驗有才技實堪升用者引見恭候欽定其不中選者即咨回該旗當差不必歸班選用遇有驍騎校護軍校等員闕令該管大員與應升之人一例簡選酌量補用十八年遵旨議準直隸山西沿邊及陜甘松潘應用旗員之副參遊都守員闕於用滿洲四人之後用蒙古一人均照滿洲之例按翼按旗輪次咨取至應用千總員闕於八旗蒙古所屬親軍前鋒護軍每旗各保送四五人送部考驗簡選引見記名亦俟滿洲補用四人之後掣補蒙古一人又奏準鷹房狗房鶻房滿洲各執事人外用沿邊千總之例停止十九年奏準旗員外任副將已滿三年者一年一次調回於到齊之時由部引見所遺之闕將應用之侍衛等官調補二十年諭武職在部候選者本屬無多每遇外省奏請簡發例須移取旗員一同簡選文移往返未免稽緩嗣後該部行文各該管大員於應用參將以下之侍衛參佐尉校等官每處豫送數人到部考驗引見遇簡發時即與在部候選候補緑旗人員一同簡選俟將次用完仍令再行豫送以免臨時稽候欽此一漢世爵外用國初定漢官得世爵者不必注衛籍取具本籍文結支𣲖宗圖給與敕書雍正八年議準伯子男以副將用輕車都尉以參將用騎都尉又一雲騎尉以遊擊用騎都尉以都司用雲騎尉以守備用凡年及二十以上者該督撫咨送到部引見或留京學習或分與督撫提鎮標下學習效力三年如果弓馬嫻熟諳練營伍該管大員出具考語具題按其品級以應得之官補用倘不用心學習行走懶惰該管大員奏請令其回籍如行止卑汚題參革退將應襲之人別請承襲一武進士録用順治三年題準一甲一名授參將二名授遊擊三名授都司二甲均授守備三甲均授署守備十二年議準一甲一名起合計百名止選授營職其餘選授衛職康熙十一年議準自一甲一名起前一半選授營職後一半選授衛職二十九年議準新中武進士由部請旨交領侍衛內大臣引見選推侍衛四十八年議準直省見任千把總年滿千總中武進士者別立班次以營衛守備推用五十一年奉旨考取武進士除選擢侍衛外其餘補參將遊擊守備等官皆有整飭營伍之職未登仕前不知事宜仕後安有裨益今嵗武進士勿令回籍分發八旗交與護軍統領令其學習騎射教以儀度如遇隨圍給與馬匹錢糧每進士一名月給銀三兩有患病告假丁憂終飬等事照例給假其才力不及者題參斥革優長者不拘科分名次即行補用平常者三年滿日注册悉令歸籍候選雍正元年奉旨武進士停止分發八旗學習五年奉旨一甲一名授為一等侍衛二名三名授為二等侍衛二甲簡選十名授為三等侍衛三甲簡選十六名授為藍翎侍衛嗣後永為定例又奉旨前科武進士大半授為侍衛餘皆得挨次選用今科武進士朕恐其多選侍衛轉不能盡心學習所以簡選侍衛者甚少但伊等一時未得録用置之間散殊為可惜今特廣為加恩將未選侍衛之滿洲蒙古進士授為藍翎侍衛交與領侍衛內大臣令其效力行走漢軍進士交與該旗以驍騎校補用其餘有人材可用者分發各省賞給千總俸著該督撫提鎮試看如果效力勤謹人材去得者著以守備題補六年議準在部投供武進士由部奏請欽點大臣會同本部秉公簡選將弓馬嫻熟人材可觀者以營守備注册平常者以衛守備注册各照科分名次推用如弓馬生疏人材不及令回籍勤加學習果學習有成再赴部聽候簡選其未經投供之武進士陸續到部由部酌量人數多寡或一年二次或一年一次奏請會同簡選嗣後武進士每科恭候欽選侍衛之後奏請會同簡選均以營衛分别注册選用乾隆元年議準到部之武進士奏請欽點大臣簡選分為三等一等二等者以營守備用三等以衛守備用如弓馬生疏令其回籍學習嫻熟遇簡選之時準再簡選其從前簡選注册以衛守備用之武進士再行考試亦定為一二三等分别營衛注册按從前簡選年月科分名次推用如有較前弓馬生疏者仍令回籍學習嫻熟再赴部考試一例簡選五年奉旨各省營兵鄉試中武舉者仍準食馬兵糧隨營差操遇有千把總員闕與營兵一例較拔此見行之例也至已中武進士者除選擢侍衛外餘皆離營候選開除名糧此雖優待武進士之意但恐開糧之後衣食匱乏且離營日久漸疏技藝應酌量變通辦理嗣後營兵中武進士有情願回營效力者準仍食馬兵糧隨營差操遇有署事處一體酌量委署又奏準注册營用之漢武進士有情願隨營學習者在部具呈考驗分發有題闕之省分學習試用在籍者於督撫衙門具呈考驗咨發有題闕之鄰省學習試用該督撫收入標下給與經制馬兵糧報部注册定以五年為滿果弓馬嫻熟諳練營伍遇有守備應題補者察其人地相宜即行題補如學習未滿五年已屆銓選之期仍照原班挨次銓選其弓馬次等者該督撫造册送部銓選倘弓馬庸劣怠惰廢弛令回本籍報部注册毋庸銓選至漢軍武進士有情願隨標學習者分發巡捕營直隸馬蘭鎮泰寧鎮學習其給與馬兵糧及分別優劣録用均照漢武進士之例行十五年奏準簡選三等以衛守備用之武進士及充補提塘之三等武進士再加簡選分别等次一二等者以營用三等者仍以衛用如復行考驗有較前弓馬生疏者均令回籍學習嫻熟再赴部考驗簡選一武舉録用雍正七年議準武舉會試落第具呈情願隨營差操者由部咨回本省分發各標協營效力該督撫提鎮等給與經制馬兵糧與外委千把一例差操如偷安規避咨部除糧內有已經簡選衛所千總年分已深選期將近者行文該省給咨赴部仍歸本班選用年分較淺選期尚逺者效力三年期滿如果材技優嫺曉習營伍該督撫提鎮等保送到部考驗分發鄰近省分以營千總拔補分發之後將簡選注銷不得復歸本班銓選至未經簡選者效力三年期滿如果材技優嫻曉習營伍該督撫提鎮等保送到部考驗分發鄰近省分以把總拔補此等應拔千把之武舉到標後與營中應拔千把者秉公較量一例簡拔若繫由營兵中式之武舉在本省隨營差操者保送到部後仍發回本省止回避本營其餘各營準其拔補乾隆十八年覆準武舉會試不中具呈分發隨營差操者向未定以額數今酌定直隸陜甘各分發三十名山西江南福建各分發二十名河南浙江湖廣四川雲南各分發十五名山東江西廣東廣西貴州各分發十名均令該督撫提鎮酌量營分就近發往隨營差操一功加録用原定經制千把總及外委千把總無職任效用官因功加至都督等銜並副將署副將銜者以遊擊用加至參將署參將遊擊署遊繫銜者以都司用加至都司署都司守備署守備銜者以守備用康熙十一年題準功加各官咨部選用時原領功劄令本人赴部親繳如不將原劄親繳者不準引見注册二十四年題準功加應用遊擊都司守備等官有因人多壅滯願降補千總把總者準其降補雍正三年覆準功加應用都司者準以都司守備兼用又議準功加應用遊擊都司者以雙月推用應用守備者單月雙月皆立一班推用班次見月選又議準外委千把及無職任效用官內有因功加至都司等銜以下署守備銜以上者該督撫提鎮會同考驗分為三等其人材超羣技藝純熟者為一等或曾經血戰帶有傷痕者亦列為一等保題送部引見將加都督等銜副將署副將銜者以遊擊用加參將署參將遊擊署遊擊銜者以都司用守備加都司署都司守備銜者以守備用其引見候補之際或令在侍衛上行走或發巡捕營當差或發回原營候推由部臨時請旨其人材技藝雖不及保題之格尚屬可觀者為二等造册報部遇該省把總員闕與兵丁輪班以三闕之一拔補功加如能盡力巡防技藝精進許再行保題送部引見仍以功加應得之官用平常者止照把總升轉若技藝尚須學習營伍尚未諳練者為三等均留營食糧如學習果能諳練堪以保題者亦許再行保題送部引見仍以功加應得之官用可以拔補把總者仍許咨部拔補把總功加千總銜者該督撫提鎮考驗將列為一等之人造册送部與功加署守備銜以上考驗二等者相間拔補把總餘均留營食糧至功加之見任千把總有人材超羣技藝純熟堪以保題者槩不論俸保題送部引見即以功加應得之官用人材技藝稍次者千總六年俸滿以守備補用仍帶功加銜把總止挨次拔補千總人材技藝不堪録用者咨部注册又議準功加人員未得授職者該督撫提鎮收入標下效力給與糧餉即於額兵數內扣算如差操勤慎給以外委把總劄付率領兵丁巡防地方以觀後效若身倚功加差操懈怠及在地方生事者小過酌量懲治大過報部斥革將功劄注銷十一年議準功加人員老病不能差操者給守糧半分不扣小建朋銀月支餉銀五錢或於建曠項下動支或於公項內動支該督撫酌量辦理統於年終造册報銷乾隆十八年遵旨議準軍功議敘人員向按功加等次兼銜給劄推升時照京俸一年作年半算今加銜既經刪除以歸簡易凡軍功議敘之人毋庸給以虛銜將功加等次入於劄內遇應升時均以一年作年半較俸又守備有功加者向例原升遊擊今按次推升都司若與尋常守備一例升轉未為平允嗣後都司員闕應盡守備有功加者先行升用十九年覆準兵丁初次立功者向來注册俟下次有功照把總例議敘按其等次遞算加銜所有頂帶即照銜服用今既刪除加銜除在標尋常操演不許照銜服用外至在軍營之時若立有功績向例應給何項職銜者即照職銜給與頂帶服用以示鼓勵於事竣回營之後除功績僅得把總頂帶者該督撫提鎮照例拔補外其有屢著功績加至千總頂帶以上者統令陸續咨部由部引見作何録用候旨遵行又覆準向例千把總等加至署副將以上者以遊擊用加署遊擊銜以上者都司守備兼用加署守備銜以上者以守備用今既刪除加銜所有功加等次即照此計算嗣後功加十等以上者照加副將以上銜之例用功加六等以上者照加署遊擊以上銜之例用功加二等以上者照加署守備以上銜之例用一廕生改武雍正十二年議準廕生願改武職者具呈吏部咨送到部考驗弓馬技藝將年力精壯者引見恭候欽定選用侍衛外其餘或交巡捕營當差或交外省督撫提鎮隨營試用俟弓馬熟嫺營務通曉在巡捕營者由該統領引見交部按品補用都司按人文到部先後補用守備衛千總於各班之末輪用一人守禦所千總歸入劄班內用在外省試用者該督撫提鎮按品題補給咨赴部引見恭候欽定又議準廕生改用武職者在京一品尚書等官在外總督將軍廕生均以都司銜管都司用在京二品侍郎等官在外巡撫提督廕生均以署都司銜管都司用在京三品副都御史等官在外總兵官布政使廕生均以守備銜管守備用按察使加一品銜副將廕生均以署守備銜管守備用二品銜副將廕生以守禦所千總用小銜副將廕生以衛千總用乾隆十一年議準廕生向有改補武職之例如將門之子未諳文藝而弓馬熟習者具呈本部以武職補用十六年奏準改武廕生分發巡捕營者由該統領引見交部按品推用至分發外省試用者均由該督撫按品題補原不歸部銓選但若遇該省並無題補之闕則録用無階嗣後各省學習期滿之廕生如無闕可以題補者該督撫提鎮給咨送部引見恭候欽定如蒙準其補用照巡捕營改武廕生之例歸班銓選一難廕守備雍正十一年議準難廕應用守備人員赴部候選時考試弓馬技藝引見應以營衛守備補用之處恭候欽定如以營用者入於雙月劄班內與澎臺俸滿千總相間補用以衛用者入於衛守備劄班內補用一提塘録用康熙六十一年議準各省提塘員闕限部文到日該督撫即行簡選合例人員送部頂補如不速行簡選將督撫題參照遲延事件例議處如簡選之人領文不即赴部在路逗遛者亦照赴部違限例議處雍正六年議準各省提塘令該督撫於本省武進士及候補候選守備內簡選家道殷實小心謹慎之人取具地方官印結申送考驗咨部頂補三年期滿如果勤勞無過由部注册照本班即用怠惰偷安貽誤塘務者將該提塘斥革如將應密事件豫通信息及恐嚇詐騙交刑部治罪其出結申送之該地方官照濫舉匪人例議處督撫照失察例議處乾隆五年奏準各省提塘將屆期滿於十月以前即行文該督撫豫行簡選合例人員按照定限送部頂補六年奏準武進士充補提塘三年期滿歸於效力班下按年滿日期科分名次推用但分别營衛之條尚未畫一有未經簡選至充補提塘期滿即照中式名次前一半以營用後一半以衛用者有已經簡選即按簡選等次定其營衛推用者按提塘既由武進士充補期滿之後與武進士同一推用守備其分別營衛之處應照武進士簡選之例畫一辦理嗣後武進士充補提塘三年期滿如有未經簡選者不準歸班由部照例簡選分別一二三等以營衛推用均歸入效力班下仍按期滿先後科分名次擢用一材官録用原定本部額設材官四十名武舉有情願效力者具呈充補飛遞馬上公文本報雍正十二年議準額設材官四十名內裁汰二十名乾隆五年議準材官二十名於武舉內取用三年期滿由部考驗弓馬一等者引見恭候欽定以營衛守備分別補用次等者以守禦所千總注册候推其弓馬生踈人材不及者停其推用仍令學習下次再行考驗三次不到者除名七年奏準簡選一二等武進士情願充材官效勞者照武舉一例當差三年期滿歸入效勞班選用如武進士武舉同日期滿令其掣籖選用如武進士內同日期滿照從前簡選年分等第名次選用欽定大清會典則例卷一百五
