城使車撒放牲畜損壞城脚及大清門前御道正陽橋及各門月城等處作踐損壞者交刑部治罪康熙二年覆準内城街道令滿漢御史街道㕔歩軍翼尉協尉管理外城令街道㕔五城司坊官管理三年覆準街道分左右翼差本部滿漢司官各二人管理十四年覆準内城街道交歩軍統領外城交街道㕔分理四十三年奉㫖街道交歩軍統領専管四十七年奉㫖著給事中兼管街道五十年奉㫖凡一應舊有瓦房偏廈侵占街道者暫免拆毁竢盖造時清出又議準正陽門外東西兩邊房屋並豬市口民房以新溝為限準其修理盖造至小街有溝者以溝為限無溝及街道原繫參差不整或一面繫空地者均以左右鄰房不占官街者為準仍將該戸礙道尺寸報部備案日後更造清出還官五十二年覆準監督街道仍差本部滿漢司官各一人定限一年更代雍正二年諭九門石路損壞行走維艱交工部歩軍統領公同詳勘將應修補之處確估以次修理再西直門外石路修至髙梁橋暢春園石路有損壞者亦著修理此工著動内庫銀欽此又諭聞前三門外溝渠壅塞人家存水街道泥濘行路艱難如有積水之處作何疏通毋使居民受累歩軍統領察覈奏聞著該城監察御史街道㕔營弁㑹同料估啟奏動用内帑修理如有騎溝大房著拆毁賞銀以償其費欽此又覆準皇城一帶地方禁止當街汚穢曬晾皮張三年諭廣寧門外大路低窪大雨時行則積水處車輛行李往来甚難著步軍統領支部庫銀修理石路欽此又諭直隸總督今年六月以後雨水過多橋梁道路多被渰沒京師為四方輻輳之地士民商賈往来雲集今聞近京各處道塗積澇行李維艱諸物騰貴朕心深為軫念爾可轉飭各地方官悉心籌畫其大路中積水之處作何疏洩窪圮之處作何修墊通州一路可交與通永道副將古北口一路可交與提督及該管州縣官宣府一路可交與總兵官及該管州縣官近京一帶可交與大興宛平良鄉等縣及涿州速令相度地勢設法修理使行旅無阻不可藉端科派以便民之政轉致累民欽此又諭御史條奏道路甚髙相應刨揠將刨出之土止住空軍只裝半載出城不費錢糧等語若攔止空車趕車之人必怨怨則進城之車必少進城之車少物價必貴與民生無益見今京城禁止成造土坯此土情願取去成造土坯及填墊院基溝渠者聽其取用餘土亦著動正項錢糧豈可勞衆欽此又諭新修九門石路有被重車壓陷者著即修理嗣後日久再有車壓塌陷處歩軍統領由部支領錢糧修理欽此又議準紫禁城週圍御河街道有堆積處悉行禁止嗣後仍令歩軍統領清理並於左右兩翼内委所屬官弁不時廵察四年奏準通州牛欄山昌平州道路交地方官察看遇有低窪随時修整六年奏準京倉運道一槩修整石路工竣令保固三年又奏準察勘石路自廣寧門外至小井村土道自右安門外至草橋南並夾石路之䕶土木釘荆笆悉令平坦堅固至竣保固三年七年諭正陽門外天橋至永定門一路甚是低窪此乃人馬往来通衢若不修理一遇大雨必難行走至廣渠門内之路亦著一并察勘具奏欽此遵㫖察勘廣渠門道路毋庸修理左安門道路微窪交街道㕔將刨揠街道附近所起之土運往鋪墊再天橋起至永定門外弔橋一帶道路應改建石路以圖經久又諭自朝陽門至通州京東大路曾發錢糧修墊土道今復壓壞此道行人既多且繫京城大小官員支領俸米必由之路著由朝陽門至通州大道皆鋪墁石塊酌量可容二車兩旁土道亦著修理平整欽此又諭平治道路王道所先是以周禮有野廬合方之職自四畿達之天下掌其修治俾車馬所至咸蕩平坦易津梁輻輳行李通達無雨雪羈滯之累邇年以来廣寧門外已修石道通州運糧之處亦修整髙爽往来行人頗為便利今直隸至江南大道車輪馬跡踐壓歲久致通衢竟成溝塹兩旁之土髙出如谷一遇雨水衆流匯歸積澇難退行人每苦泥濘或至守候時日朕心深為軫念但此通行大道久成窪下勢難培築增髙而道旁髙阜甚多若於大道相近之處别開一道工力似屬易施其間或有地形斷續應修建橋梁或溝塍淤積應疏濬水道或所開之逕有借用民田者應補給價直並除錢糧或繞行之路有逺隔村莊旅舍者應引歸故道使有頓宿特遣大員於今年夏秋之交自京師起程由良鄉至宿遷大道一路踏勘將作何别開新道詳悉議定估計工價繪圖呈覽欽此遵㫖察勘直隸山東江南三省道路自宛平縣長新店至景州劉智廟應修道路長五萬五百五十丈修建橋梁四十八座自劉智廟至郯城紅花埠驛應修道路長四萬二千十有九丈修建橋梁九十四座自宿遷桃源至清河縣王家營應修道路長萬一千八百十有二丈修建橋梁二十座並責令該州縣於道旁補栽柳樹春秋親往察勘奉㫖工部即行文三省動正項錢糧乘此農隙之時委官作速興工務於明春雨水前告竣仍差官往勘其修過橋梁道路交該地方官随時修整並令新舊交代永著為例又題準黔省通滇大路陡窄紆盤改由鎮寧州屬黄果樹岔而入别闢新路至普安州屬蒿子卡歸於舊路並修整花局阿藥郎岱等處道路開平斗郎箐打鐵簡古等關石龍那貢烈當趕場豬場等坡務令一式平坦沿塗河溝各建大小木橋西林一渡置造渡船安設六驛均歸各該地方官管轄八年諭通州石路及兩旁培土前已降㫖交地方官但恐伊等未必實心培墊著工部每季委司官前往察勘並諭地方官知之欽此又奏準通州石路及兩旁培墊土道交與地方官管理令沿塗保甲居民随時平墊車轍又奏準直隸山東江南三省道路令各州縣補栽柳樹以庇行旅又奏準外城房屋坍塌者多著五城御史會同街道㕔驗勘凡繫舊房見修者令照舊地不得侵占十年題準蘆溝橋琉璃河橋兩邊雁翅毋得搭盖房屋有礙行旅十一年諭由京師至江南道路往来行旅繁多朕於雍正七年特遣大臣官員前往督率地方官修理平治不惜帑金成功迅速又令道旁種樹以為行人憇息之所比時河東總督董率河南官種樹茂密較勝他省經過之人皆共見之凡此道路樹木皆朕降㫖交與地方官随時留心保䕶者近聞官吏怠忽日漸廢弛低窪之處每多積水橋梁亦漸折陷車輛難行道旁所種柳株殘缺未補且有附近兵民砍伐為薪者此皆有司漫不經心而大吏又不稽察訓戒之故著𫝊諭該督撫等轉飭有司照舊修理務令平坦整齊或遇雨水泥潦随損随修不得遲緩其應補柳株之處按時補種並令文武官弁禁約兵民不得任意戕害倘有不遵將官弁題叅議處兵民從重治罪欽此十二年覆準川省南北兩路驛站北路之觀音碥牛頭山劍門關五侯坡南路之金雞嶺飛龍關大關山小關山大相嶺飛越嶺金釵碥大胡梯小胡梯等處山路坍損應動項修整凡遇陡壁臨深之處建造偏橋增設扶䦨十三年恩詔各省要路橋梁間有損壞行人勞苦著地方有司申報各督撫奏明修理乾隆二年議準京師朝陽廣寜二門石道交地方官三年一次察勘如有圮塌報部修理三年諭川省逺在西陲道路之難甲於天下其中棧道偏橋更為險隘每年資藉民力随時修補未能一勞永逸行旅艱辛深可軫念著四川廵撫會同西安廵撫委官確勘將應修之處分别南棧北棧兩省分任修理即動該省存公銀以為工費工竣之後交地方官不時稽察如遇暴雨大水衝塌過多仍準詳報酌動公項修整俾永逺堅固以便行人欽此遵㫖議準陜省棧道自鳳翔府寳雞縣起經漢中府鳳褒城沔寧羌等州縣南接四川廣逺縣界綿長九百餘里其咸寧縣棧道偏路改田庫峪口至舊縣關鎮安縣舊縣關偏路棧道改由關西折入西平峪至舊司川省棧道自劍州起至廣元昭化一帶長四百二十餘里凡遇山水相逼紆折之處随勢開鑿増廣偏路偏橋疊橋砌路增設木筏接渡懸巖峭壁大谷深淵建築短牆並設木䦨保䕶六年題報棧道工竣令地方官不時廵察其存剰各項鐵器貯州縣庫内以為歲修之用遇地方官新舊交代造入册内以專責成十二年奏修畿輔低窪道路奉㫖交地方官随時辦理十五年恩詔各省要路橋梁有損壞者著地方有司申報該督撫動項修理十六年恩詔同十九年諭五城街道泥土歳久填積増髙行路居人均屬不便著管理河道溝渠大臣等詳悉察勘量其修理之費動支官帑除去積土堆置就近城外隙地此番官辦後随時畚除自易為力並令該管衙門酌照從前煤車回空携帶沙土之例善為經理勿仍壅積但不得任聽兵役抑派滋擾欽此一除道康熙四十年題準京城内墊道交歩軍統領城外令大宛二縣分理四十一年題準修橋墊道著動用道庫雜項錢糧報戸部會同本部覈銷五十五年議準車駕行辛沿塗修墊銀交本部扈蹕侍郎齎往沿塗給發事竣奏銷五十六年題準修墊營盤大營每座給夫八十名頓營四十名修墊道路每里日給夫五名每夫日給銀六分乾隆元年諭時際東作方興農事伊始毋得因朕謁陵經過地方多覔人夫修墊道路致妨農業欽此又諭修理謁陵道路著酌定一路修理毋得屢行改易以勞吾民欽此六年諭哨鹿經由之路皆皇祖所行舊路朕今年前往所由道路橋梁皆著畧為修理俾可行足矣斷不可妄抉地方田畝擾累黎民至沿塗所有行宫如院宇墻垣有倒壞之處不必令工部官修理著勘明交内務府總管修理欽此八年奏準修墊道路每里日給夫五名之外再加増二名大營每座八十名頓營每座四十名各加倍給夫十一年議準喜峯口一帶道路以山頂分界南屬薊州北屬遵化州自山北至昭西陵二撥紅樁一帶道路安設栅䦨歸石門工部經理十四年奏準直隸所屬修墊道路諸費統於司庫存公耗羡銀内動用報銷由部委官前往監修之例一槩停止十六年奏準廵幸未經駐蹕其大營頓營地基經嚮導大臣奏明指辦者皆令報部準其覈銷十八年奉㫖嗣後有水之河搭橋乾河不必搭盖又諭朕廵幸經過地方所有道路橋梁自應照例辦理至道旁茶棚一項随從官員原無暇憇息徒供僕隸人等蹂躙作踐而地方官又多此一番豫備甚屬無謂著停止欽此又奏準每次廵辛供帳什物均由京中置偹齎往應用其由地方官偹辦如大營頓營動用席片木橛等物亦皆動支公帑辦理但存一取用名色即啟將来藉端訛索濫應冒銷之漸應全行裁革嗣後令該管處大臣先期詳定應用物件數目由京置偹齎往如閲時既久必須增補者呈報總理行營大臣奏聞辦理又奏準大營盤每座新修地面給夫一百八十名舊地九十名頓營盤每座新修地面給夫百名舊地五十名修墊道路開荒每里給夫四十名熟地三十名一御道種樹雍正二年奉㫖自西直門徳勝門至暢春園沿塗皆著種柳岔道亦著栽種皆著動用錢糧栽完樹木令人看守遵㫖議準令西北二城大宛二縣各該地方分為四叚看守三年奏準種樹令保活三年如三年内有枯焦者原種樹官補種如各該地方官不敬謹看守以致樹木被人折壞牲畜嚙傷及偷盗者並令各該地方官補種四年奏準西直門至暢春園栽柳九千二百九十七株徳勝門至孃孃廟栽柳三千二百三十四株六年諭沿塗所植樹木已閲四五年矣看来不甚茂盛此皆草率所致圓明園正陽門前樹木繫敬謹種植甚覺整齊茂盛向例道旁樹木有乾枯者令補種近日竟不補種朕所經由之路尚且如此則他處僻路可知著内務府工部堂官五城官員察奏欽此遵㫖議準西直門徳勝門至暢春園一帶沿塗柳樹枯焦損失著落原種樹及看守各官限一月内照數補栽嗣後令五日澆灌一次如逾限不完即指名題叅其應賠種樹官内有不能賠補者著落本部堂官賠種種後