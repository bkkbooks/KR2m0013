body:
  text: 工部都水清吏司海塘江防附一海塘職掌康熙初年設浙江海防同知二人雍正八年議準浙江杭州府糧捕同知管糧通判令其就近分管東西兩塘十一年議準浙江海塘設海防道一人兼轄沿海州縣除原設海防同知二人外再増設海防同知一人令其分管塘工又議準浙江新設海防道應移駐海寧稽察塘工其海塘同知三人除乍浦同知仍舊駐劄外舊同知一人移駐海寧新同知一人移駐仁和十二年諭浙省海塘關繫重大固須詳慎尤戒遲疑若總理者不肯擔承將分任者愈為瞻顧因循草率迄無逺圖其何以謀奠安而垂永久海塘一應工程毋得推諉竝毋得稽遲欽此又議準江南寳山縣主簿移駐髙橋上海縣丞移駐黄家灣華亭縣丞移駐漕涇各依本縣地界管理海塘工程令松江府同知太倉州同知統轄十三年議準浙江海塘増設引河通判一人専司疏濬乾隆元年議準江南増設海防道一人駐劄松太二屬適中之地専管海塘歲修工程事務原管塘工之同知州同丞簿各官聽其調遣三年議準寳山縣主簿仍令駐劄適中之地専管寳邑境内沿海各塘遇有雨淋潮刷坍損之處隨時報明修理九年覆準鎮洋塘工令該縣甘草司廵檢就近管理十二年奏準浙紹所屬塘工令紹興府水利通判兼管十三年議準浙省仁錢蕭三縣塘工需用錢糧歸海防道辦理十九年奏準裁汰浙江海防道北岸仁和海寧海鹽平湖四縣塘工歸杭嘉湖道管轄南岸蕭山山隂㑹稽三縣塘工歸寧紹台道管轄北岸自八仙石起至戴家石橋計塘工八十餘里改歸西防同知専管自戴家石橋起至談仙嶺計塘工八十七里仍歸東防同知専管自談仙嶺起至江南交界仍歸乍浦海防同知専管以重責成其南岸塘工向歸紹興府水利通判管理終非専官應將北岸海防通判改為南塘通判移駐紹郡之三江城専管南岸塘工凡有塘工各縣所設之廵檢典史聽同知通判稽察調遣一塘工康熙五十七年覆準浙江海寧塘工塘脚建坦水排樁密布大石填砌中間一層低一層如魚鱗之比附縱遇潮汐衝撼不能動揺雍正三年議準海塘之内一槩增建複塘以防海嘯五年諭吳淞石塘當日勘估之時於海潮紆緩處酌量修築土塘盖因工程浩大諸臣勘估為節省錢糧起見故如此定議但東南財賦之區灌溉田畝保聚室廬全頼海塘捍衛朕思海潮衝激風濤旋轉難定土塘歴年經久未免可虞不若一槩盡修石塘為一勞永逸之計著確行勘估詳悉定議具奏欽此遵㫖議準松屬新築石塘之外土塘二千四百餘丈一槩改築石塘七年覆準松江一帯海塘平鋪實砌每丈用條石六十七丈長大樁木百根石塊六面鑿齊合縫平稳用楊桃藤糯米為汁和灰抿縫十年議準江南塘工需用青石及鋪底黄石每丈連運費給銀六錢六分黄脚地石每丈連運費給銀六錢一分由逺處開採者每丈各加銀五分由海運者各加銀九分又覆準松江海塘外層縱横鋪砌之石用鐵筍聨貫每丈用五十三筍有奇每筍重二斤又議準每石一丈用樁木百根土鬆之處樁長一丈四五尺餘樁以一丈二尺為率十一年奏準浙江仁寧二邑草塘均改建大石塘奉㫖尖榻兩山之間建立石塘以堵水勢類挑水壩之意所見固是若再於中小舋開揠引河一道分江流入海以減水勢似更有益從前雖經開揠旋復壅塞者皆因惜費省工之故今若倍加工力開揠兩工並舉更覺妥備石壩建後即有沙漲而石塘亦可漸次改建以為永久之計欽此乾隆元年議準嗣後歳修土塘塘頂加髙一尺塘面幫濶二尺塘底幫濶四尺五寸塘内坡開尺有五寸塘外坡開三尺二年議準浙江仁寧鹽平四縣塘工應量準丈尺編列字號以二十丈為一號建堅碑碣刋刻字號以専責成又議準松郡歲修土塘塘身兩旁取土每方銀七分二釐一里以内者八分一里以外並隔河取土者九分至二里者一錢連夯硪工費在内四年覆準浙江塘工需用條石用營造尺量厚一尺濶尺有二寸每丈準銷銀七錢三釐如係洞庭金山石外加過壩運費銀七分石宕等山海運大塊石每萬斤準銷銀八錢四分六釐内河辦運洞庭山茅响山大塊石每萬斤一兩四錢一分均連運費在内運船每石萬斤給水脚銀二錢有奇又議準浙江海塘土方價直分别逺近乾濕著為等則取土在三十丈以内者乾地每方銀一錢一分濕地一錢二分對江取土用船載運及遶越城坦二三里者乾地二錢四分濕地二錢五分取土在三十丈以外至百丈者照江南河工取土之例三十丈以外至五十丈者乾地一錢二分五釐濕地一錢三分六釐五十丈以外至百丈者乾地一錢三分六釐濕地一錢五分九年題準浙江海塘建竹簍石壩每丈用竹簍二每叚中放丁簍兩頭安放鳳尾順簍外臨水貼簍每丈下關簍排樁二十根東西兩頭下迎潮抵溜裹頭排樁以䕶簍底沙脚一歲修雍正八年定浙江海塘令經管之官歳一修葺其官兵俸餉均於歳修銀内支給十二年議準松太所屬沿海塘工每歳扵十一月察勘正月内興工三月内告竣十三年奉㫖浙江修理海塘工程著用正項錢糧又覆準浙江海塘緊要之處酌量動銀分發産柴各縣及時購買豫期解交塘工委官驗收加謹分貯遇有緊急工程一面詳報一面撥用仍將所用物料造入歲修案内報銷如有餘剩扣除現存數目再覈數給銀如前購買責令海防道不時稽察如有辦料短少侵蝕帑項及堆貯不慎朽爛柴料以致不堪應用者揭叅追賠又議準浙江開濬中小舋南港兩處引河工竣製就混江龍鐵箆子等器具用夫撈淺嗣後每年按季豫期領銀雇夫疏濬年終據實造册詳送該管司道轉送督撫覈實入於海塘歲修案内一并聲明具題報銷所需濬船在於江口兩岸銀杏西興兩埠額設渡船内調取八船輪流應用又覆準海塘應修築之工估計册籍均令承修官會同地方正印官詣工確估會造清册由該道詳覈轉送督撫達部工完據實題銷倘彼此推諉致修築遲延者正印官及承修官一并叅處又覆準嗣後遇有坦水石塊衝卸樁木欹斜承修官即詳報該道確勘估計修理完固入於歲修案内題銷又覆準海塘緊要工程遇有坍損承修官一面督率在塘兵弁上緊搶堵一面飛報該道親往察勘覈明估計飛馳轉報如工非緊要不應搶修揑飾危險希圖冒銷者詳叅究處該道察勘不實徇庇朦溷者一并題叅又覆準修築塘工覈計所費飭令承修官専案請領不得將數案之銀牽溷并領亦不得通融那用領銀之後將辦過物料名色數目申報該道委官察驗加具保結倘有虧闕及那移掩飾情弊將承修官揭叅如委官察驗不實通同徇隐者一并叅處又議準浙江新築土備塘工責令承修官於工竣後起限保固三年新築條石塊石各塘保固一年附石土塘各保固半年搶修加築草塘保固三月限内如有坍塌即著落承修官賠修如遇異常潮汐實非人力可施察明工程本屬堅固錢糧皆歸實用者雖在限内亦準取結保題免其賠修如物料茍簡工程草率錢糧不歸實用以致工程坍塌者雖屬異常潮汐亦必將承修官照例題叅著落賠補乾隆元年諭朕聞浙江紹興府屬山隂會稽蕭山餘姚上虞五縣有沿江沿海隄岸工程向由附近里民按照田畝派費修築而土豪衙役於中包攬分肥用少報多甚為民累著將按畆科錢之例停止其隄岸工程遇有應修叚落著地方大吏委官確估於公項内動銀興修報部覈銷永著為例欽此又奏準寳山䕶城土圩濵臨海澨潮汐衝刷每年相度情形入於塘工歲修案内確估加培又覆準浙省江海塘隄均闗緊要嗣後修築塘工皆令動支司庫銀按季豫造清册咨部存案仍竢本案竣工别造細册分别請銷二年奏準停止疏濬浙江塘工中小舋引河又議準松太所屬華寳二縣土石塘壩各工如係新築石塘離海里許或土塘雖不及里許坐非頂衝急溜者限保固三年如石塘並坦水石壩單路石壩加樁坦坡玲瓏石壩等工離海不及一里及在一里以外坐當頂衝急溜者均令保固三年其土塘離海不及一里及在一里以外坐當頂衝急溜者保固二年搶修柴埽各工保固一年倘於限内坍塌均著落承辦官賠修如限内遇有異常潮汐實非人力可施以致坍塌者察明工固帑實該督撫保題免其賠修如物料茍簡工程草率者雖由異常潮汐仍照例題叅著賠又議準海塘工完之日限四月題銷四年奏準仁寧二縣一帶草塘暫停歳修五年議準松太所屬石土塘工一應歲修搶修工料繁多不拘於何項動給工竣之日均令覈實報銷六年議準松太海塘闗繫緊要酌撥銀四千兩交海防道經管分發松江府太倉州各半存貯以為塘工修理之用十九年奏準浙江海塘經費每年額撥引費銀萬兩為歲修之用尚屬不敷今既裁汰海防道又將兵四百名改為堡夫又裁汰馬戰守兵三百名所遺俸工役食月糧餉米約計每年裁省銀萬兩應歸入海塘經費於歲修案内撥用報銷一塘汛雍正八年議準浙江海塘照河工之例専設千把總二人兵二百名分於東西兩塘看守并令兵丁修補零星塘工十一年議準浙江仁寧兩縣塘工增設兵八百名建堡房四十間海鹽及平湖之乍浦建堡房二十間以便兵丁棲止十三年議準浙江海塘兵丁增至千名今引河既盖堡房應以四百名撥於引河新工以資疏濬餘六百名仍留東西兩塘照舊分防乾隆元年議準江南增設海防道所轄道標兵丁應於塘工分汛防守以資調遣十九年奏準改浙江海塘兵四百名為堡夫又裁汰馬戰守兵三百名一夫役雍正十三年議準江南松江府屬沿海土塘長二百五十里分為四十四叚每叚設塘長一名每名歲給工食銀七兩二錢盖造堡房一間令其日夜看守並令修補浪窩獾洞十二年諭朕聞浙江海塘工程見在修理尖山已堵築三分之一人心極為踴躍但尖山夫役日給銀三分六釐似覺不足今當初春之月水長潮平䟎築工程著照引河挑夫之例日加銀一分四釐共足五分之數又聞從前運石每方給銀八錢九分四釐六毫今運送多費人力著每方增銀六分俾夫役等工食寛裕欽此乾隆二年議準松江一帶沿海石塘計長七千一百餘丈每四百五十丈設塘長一名共設塘長十有六名每名盖堡房一間日給工食銀二分遇閠加増小建扣除五年議準江南寳山縣民築土圩五千一百二十丈計二十八里設塘長五名建堡房五間又議準寳山縣對江墩新舊土塘計長三十里舊設塘長四名應增設二名照例盖造堡房九年覆準寳山鎮洋二縣顧涇港加築續築土塘四千二百二十九丈有奇應設塘長四名建堡房四間十九年奏準浙江海塘額設兵千名應於守兵内選四百名改為堡夫一應土石柴塘遇有蟄陷坍卸堡夫即報廵捕轉報㕔官察勘如止些小坍損即調集附近堡夫修砌完固北岸設堡夫三百名一里一夫南岸設堡夫百名二里一夫均酌設夫頭分司管束每名給堡房一間月給銀一兩一江防康熙十三年議準楚省襟江帶湖民間廬舍田畝建設隄堘以為保障濵江一帶地方有司専令漢陽府知府武昌黄州襄陽荆州安陸徳安六府同知分督江夏武昌蒲圻黄梅鍾祥京山天門江陵公安石首監利十一縣縣丞潜江縣主簿沔陽荆門二州州同咸寧嘉魚漢陽漢川廣濟當陽雲夢應城孝感松滋十縣典史每逢夏秋汛漲各於所屬境内董率隄老圩甲搭盖棚房置偹樁簍柴草蘆葦鍬筐等項器具堆貯棚所晝夜住隄廵邏看守防䕶春冬興工修築三十九年議準湖廣素稱澤國全頼築隄髙厚責令地方官於每年九月興工次年二月告竣如修築不堅以致衝決將督撫照總河例道府照督催官例同知以下照承修官例各議處五十四年諭江隄與黄