body:
  text: 兵部武選清吏司職制四一保舉事例康熙四十七年議準福建廣東二省武進士舉人生監民人内有練習水師事宜願隨官兵出洋廵哨効力者該督撫豫先列名咨部果能擒盜立功保舉引見敘用雍正三年議準各省武職各官有例應題補者該督撫提鎮分别水師陸路將見任屬官内擇其才守兼優勤慎奉職或洞悉水師事宜者豫行公同保舉其有事故者除失察大盜革職畱任戴罪圖功不準保舉外如有降職降級住俸降俸及承追督催未完案件均於保舉本内聲敘由部覈明引見未滿三年與例相符者均題明注册其未經引見及引見已滿三年者均題明調取引見陸續送部恭候欽定注册竢有本省員闕應題補者各按應升之官掣籖補用五年諭各省副將叅將著該省督撫提鎮㑹同分别列為一等二等三等出具考語密咨兵部將履歴年歳籍貫繕摺進呈其副將叅將中有曽經特用及該上司題升者亦皆仍分别等次出具考語一體咨部務期秉公據實毋得瞻徇情面欽此六年諭從前降㫖令各省督撫提鎮將副將叅將分别列為一等二等三等出具考語宻咨兵部繕摺進呈但思人之存心行事亦有先後易轍者若以等次考語既定不便改易則身列優等者或有自恃妄為之心而身列下等者不復有奮勵上進之念非隨時造就之道也著再行文督撫提鎮等若咨部之後該員或怠惰前修或悛改舊習雖無功績劣跡不至於保薦恭處者則亦當優等降為劣等劣等升為優等著督撫提鎮據實移咨兵部不必作難回䕶若前任上司所定而後任有應當更改者亦照此咨部不必執一著將此通行各省武職等皆令知之欽此十三年奉㫖水師各官員闕皆關緊要見在通曉水師可以補用者甚少爾部行文福建廣東總督於千總内簡選熟諳水師者福建省著保舉六人廣東省著保舉四人送部授為藍翎侍衞行走以備簡選水師之用乾隆六年奉㫖副將等分别等次之處累年各省咨部具奏者皆不畫一且各該員新舊不一復不時升調若不定以限期各省督撫勢難遵行嗣後者以五年舉行一次永著為例又奉㫖各省副將恭將從前曽降諭㫖令督撫提鎮㑹同分别等第五年舉行一次見在陸續咨部著將所保一等之副將叅將皆送部引見永著為例又奏準直省副將叅將該督撫提鎮分别列為一等二等三等其漢軍將軍標副將叅將及廵捕營叅將由該將軍統領分别等次亦於五年舉行一次又奏準副將叅將列為一等者調取引見如䝉準其一等注册遇有各省總兵官闕將應升人員照例開列具題仍將保舉一等之副將繕摺隨本進呈副將員闕亦將應升人員照例開列具題仍將保舉一等之叅將繕摺隨本進呈九年奉㫖著各省總督廵撫提督於所屬副將内慎選可勝總兵之任者秉公保舉具奏又奉㫖各省督撫提督保舉能勝總兵之副將朕皆降㫖令送部引見但此等保舉之副將一省中或有數人若一時送部則營伍辦事未免乏人著各該督撫提督斟酌先後陸續送部引見十年議準各省豫保各官有已過三年未經升用者令各該督撫提鎮詳加考驗甄别如果堪升用出具考語咨部仍照例掣補其有弓馬技藝不如從前辦理營伍並無進益及年力已非精壯不堪升用之人即咨部注銷又奏準乾隆九年議準陜甘二省及四川松潘一鎮守備員闕乃在外題補者第一次用旗員第二次掣用豫保千總第三四五次於候補人員内簡選題補至四川通省各標協營守備未經分用旗員者遇有題補之闕第一次歸豫保千總掣補第二三四歸候補之人題補在案今察各省候補之人甚多亦必與豫保千總分用始得均平嗣後除陜甘二省松潘一鎮仍照九年之例分用外其各省候補守備與豫保千總照四川通省補用守備例第一次歸豫保千總掣補第二三四次歸候補人員題補再有員闕照此分用十一年奉㫖各省叅將例應將軍督撫提鎮分别等次五年舉行一次送部引見今届舉行之期除照定例舉行外著各省將軍督撫提鎮於所屬叅將内擇其可勝副將之任者秉公保舉具奏將所保之人酌量送部引見以備朕陸續委用又奏準各省保舉之一等副將一等叅將若前因保舉總兵副將已經引見未滿三年者均免其送部於密咨到部時將該員保舉總兵副將曽經引見並所奉諭㫖聲明具奏即將一等注册十四年奉㫖從前曾降㫖令各省督撫提督於所屬副將内保舉堪勝總兵官之人經各督撫提督陸續保奏調來引見人皆平常並無傑出之才朕於其中簡擢數人亦秪將就錄用總兵官為將領之統率必須才具出衆乃能勝任今遇員闕一時難得其人著該督撫提督再於所屬副將内擇其實在堪勝總兵官者各保二三人倘副將内乏人即於叅將内選擇亦可該督撫提督不得以中平之人濫膺兹選亦不得因朕有此㫖遂委之無人以圗規避務須實心遴選據實保舉奏聞送部引見候朕酌量簡用又奏準武職豫保各官原因要地需人是以行令各該將軍督撫提鎮簡選豫保注册向例無論新舊遇闕一例掣升惟是豫保千總一項雖應掣升守備但六年俸滿即應離任非若豫保應掣升副叅游都之人並不離任在部論俸可升在外遇闕得題者可比是以有豫保注册多年尚未掣升亦有甫經豫保即得掣升者其先保之人竟至守候無期似屬偏枯嗣後豫保千總遇有應掣守備員闕時先將前次注册之人掣升完日再將其次注册之人掣升又奏準江南浙江陸路守備員闕第一次歸豫保千總掣補第二次歸候補人員題補再有員闕照此分用一題補事例直隸河屯協副將都司督標前後二營各游擊守備易州營游擊守備杜勝營八溝營各都司馬蘭鎮標左右二營黄花山良鄉汛房山汛淶水汛水東村土城子各守備山東臨清營膠州營文登營各副將都司臺荘營德州營即