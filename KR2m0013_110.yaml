師營游擊守備廣東崖州水師營參將守備俸滿之日該督提察核具題調回內地俟本省水師員闕題請調補乾隆四年奉㫖廣西右江水土惡劣地方其駐劄參守等官皆準分别年限報滿候升而總兵官以繫特簡大員不準移調於情理未協應令該督撫悉心斟酌或量移善地駐劄如不便移駐亦當於通省總兵官內限年移調著定議具奏欽此遵㫖議準廣西右江總兵官三年俸滿該督提題報到日由部將左江鎮並附近右江鎮之貴州安籠鎮廣東右翼髙州各鎮總兵官職名開列具題恭候欽㸃一人調補其所遺員闕即將右江總兵官補授七年奉㫖朕從前因右江總兵官員闕地處邊瘴水土惡劣是以降㫖令三年調換今二年之內連故二鎮朕心深為軫惻覽本內開列之人恐亦未必熟習右江風土或於附近總兵副將內熟習風土者簡選升調一人或將右江總兵官改為副將並酌量移駐與見在駐劄地方相離稍遠以免瘴癘著該部詳議具奏欽此遵㫖議準右江鎮駐劄地方水土最為惡毒其員闕雖將附近右江之貴州安籠鎮廣東右翼高州鎮同左江總兵官開列請㫖調補恐未必熟習右江風土難免瘴癘之虞若遽議移駐則邊疆要地無重鎮彈壓亦屬非宜嗣後應令該督提於本省副將內擇其熟習右江風土者簡選題升如本省副將不得其人於廣東通省副將內一并簡選如仍無可題之人該督提豫將兩省副將無可題補緣由報部即比照吏部廣東瓊州府屬煙瘴地方用附近雲貴等省人員之例將各省見任副將內籍隸兩廣湖南雲南貴州等五省人員開列具題恭候欽㸃補授俟俸滿之日即行報部調回內地遇有各省總兵官員闕由部具題請㫖補授八年議準湖廣苖疆之沅州辰州施南永綏永順寶慶靖州七協副將臨武宜章桂陽三營參將遇有員闕該督提於通省副將參將內簡選調補十年議準湖廣永綏靖州二協副將桂陽營參將皆最要苖疆如遇員闕該督提先盡內地合例副將參將簡選調補如內地實無可調之人於疏內聲明由部將豫保人員掣補其沅州辰州寶慶施南永順五協副將宜章臨武二營參將皆次要苗疆如遇員闕該督提於內地簡選副將參將調補倘一時不得人地相宜由部以卓薦一等記名之人開列請㫖補授又議準臺灣水師陸路各外委員闕均就臺兵考拔三年報滿與內地外委互相調補十八年奉㫖右江總兵一官地處邊瘴水土惡劣必得與該處服習者始可題補若所保人員內有遇降革事故該部即按例議駮恐一時難得相宜合例之人而總兵大員膺封疆重寄今秪由該督提簡選請㫖補授亦非慎重簡畀之意嗣後右江總兵官將届俸滿著該督即於本省副將內豫行簡選不必拘以有無事故但擇其人地相宜堪勝總兵官之任者擬定正陪送部引見候朕簡用又奏準廣西右江鎮標左營游擊改為都司仍準在外題補一降調補用順治年間定提督降一級不補總兵官降銜一等借補副將如降二級及總兵官降一級皆以副將用若降級多者依次以參將等官補用副將降一級補恭將參將降一級補游擊游擊降一級補都司都司降一級補守備守備降一級補守禦所千總守禦所千總降一級補衛千總衛千總降一級補營千總營千總與門千總降一級補把總把總無級可降革職以上應補副將者俟人文到部之後遇有員闕與應升之人一同開列恭將以下衛千總以上挨班補用應補營千總把總者到部後分發各該員原籍附近省分交該督撫提鎮與該省應行考拔之千總把總一例考驗拔補門千總降一級應補把總者分發巡捕營以把總拔補康熙三十七年議準巡捕營各官降級調用者照所降之級仍以巡捕營用雍正十三年議準降級調用武職各官如有奉特㫖從寬免其降調仍以原官補用者準以原官補用餘按所降之級降補乾隆十七年奏準外海水師降補人員因並無部推之闕該員等到部後皆奏請引見或發往該員本省或發往鄰省有外海水師之題闕者交與該督等以該員應用之闕酌量題補至內河水師降補人員向來未有辦過成例該員等一經降調赴部其恭將游擊尚有部推之闕可以銓補至守備一項部推雖有八闕先經奏準第一闕用水師藍翎侍衛第二闕用造册送部選用之水師年滿千總再有闕出均照此輪用在案是降調赴部應補內河水師守備無班可歸按內河水師守備題闕江南十有二廣東三嗣後內河水師守備照外海水師之例遇有降調守備者由部引見請㫖發往有內河水師守備題闕之江南廣東二省交與該督等與應補人員一例酌量題補再察內河水師部推都司止有四闕亦經奏準補用水師藍翎侍衛如有降補都司之人亦無班可歸察內河水師都司題闕江南四浙江一嗣後遇有降補都司赴部者並照守備一例辨理一引見事例順治年間定巡捕營參將游擊守備及門千總推升外任時引見請㫖補授康熙六十一年議準在部投供候選副將以下門衛千總以上得選後引見請㫖補授其見任論俸推升恭將以下守備以上均停其引見由部具題奉㫖後將劄票封發該督撫提鎮詳加驗看如有年老有疾人材不及者即題明勒令休致部中别行推補如將年老有疾人材不及者給發劄票令其赴任不能供職將該督撫提鎮照徇庇例議處雍正十一年奉㫖嗣後雲貴兩廣福建四川參將以上人員除未經引見外若有引見已過三年應令赴京者著該督撫先行請㫖不必即令起程一升銜留任順治初年定武職記名各官已經選升别任者其原任除繫水師營緊要者許該督撫提鎮題請以升銜留任外其餘一槩不準乾隆二年議準陜西甘肅四川廣西雲南貴州武職各官俸滿推升他省者應否以升銜留任請㫖遵行如升銜留任之員實能稱職該督撫等察明遇有員闕無論應選應題準其照升銜題補若推升他省因與人地相宜不便即令升去經該督撫等題留者其員闕或經補用有人該員遇有本省題闕準其題補十年議準陜西甘肅四川廣西雲南貴州各官推升他省經該督撫題留者向來遇有題闕準其題補但該員原闕或别經補用有人而應題之闕部中又以豫保之人掣補未免守候需時應將陜西甘肅四川廣西雲南貴州題留各官其原闕别經補用有人留於該省候闕者遇有該省應題之闕停其將豫保之人掣補即將題留各官按照相當之闕指名請㫖補授十三年諭向來河工武職原不諳營伍該部論俸推升他處既於營務無益而河工轉少一熟練之人是以該總河每每奏請留任該部亦必議準似此一升一留習為故套員闕又復久懸殊非體制嗣後此等河工武職遇推升時作何留工升用之處該部定議具奏欽此遵㫖議準江南河營參將一員游擊二員守備二十員河東河營守備三員直隸河營守備一員若皆於本營題補則大闕無多而直隸河南山東各營又無大闕可補若皆以升銜留任則千把以及河兵難得進身之路嗣後參將如小銜者推升時加銜一等留任直加至參將銜仍留原任於開列副將本內聲明游擊如小銜者推升時加銜一等留任直加至游擊銜仍留原任有參將闕題補如無參將闕論俸推升仍加銜留任小銜守備如應升時加銜一等留任直加至署都司銜仍留原任有游擊闕題補如無游擊闕論俸推升仍加銜留任其守備員闕仍照舊於河營千把總內簡選遞行題補拔補以上游擊應升參將署都司銜應升游擊之守備守備應升都司其中果有弓馬優嫻長於營伍者該督豫出考語造册送部遇有河標應題之闕與該員銜品相當者亦準酌量題補十五年覆準臺灣孤懸海外遠隔重洋必得熟練之人方於地方有益若調臺未滿又復推升他省頻易生手實於要地未宜應將臺灣見任游擊如值較俸推升之時停其推升他省加銜一等仍留原任俟該員臺俸期滿該督提題報照例升用十八年議準內河水師各官向與陸路通行較俸遇應升時有水師員闕即行升用若無水師員闕皆加銜留任按內河水師各官既必須以水師之闕升用應止於水師內較俸升轉其外海水師及河營各官均由在外題補不由部推但從前亦與陸路通行較俸遇應升時加銜留任仍俟題補徒屬虛文嗣後應聽各該督提酌量題升均無庸與陸路較俸升轉亦不必加銜留任一武職養親乾隆元年議準武職大小各官除見辦緊要機務不準告終養外其餘父母祖父母年七十以上家無以次成丁許回籍終養或雖有兄弟而篤疾不能侍奉與母老雖有兄弟而同父異母皆許回籍終養其父母年至八十以上雖家有次丁者亦許回籍終養各將終養情由呈報該上司轉詳督撫提鎮取親供印結題明終養倘有假揑規避將本官革職出印結官降二級調用不行詳察轉報之該管上司罰俸一年九年諭向來文官原有親老調補近省之例武職雖與文官不同其為養親則一但改歸本省補用殊多未便若於附近省分改補亦屬可行著該部議奏欽此遵㫖議準武職各官因親老改補近地者發往原籍附近有題闕省分交與督撫遇闕題補俟該員應補之日該督撫報部仍俟原授之任有闕題請調補一病痊起用康熙十一年題準提督總兵官除年老有疾題請休致外其年力未衰因患病回籍調理者病痊之日原籍督撫驗看具題若在原任省分調理者病痊之日該省督撫驗看具題均送部引見候㫖簡用又題準副將以下衛千總以上各官因病告請休致者該督撫提鎮委驗題請休致若告病涉虛本官革職委驗出結官降一級調用具題之督撫提鎮罰俸一年提鎮告病由總督驗看具題無總督者巡撫具題若告病涉虛本官降二級調用代題之督撫降一級留任雍正七年諭向來外官告病回籍者不復再行起用朕從愛惜人才起見已降㫖定例於該員告病之時該督撫若看其居官尚好即於本內聲明俟將來病痊之後赴部引見仍以原官補用文職已有此例文武本屬一體以後武職告病者悉照文職之例行欽此十一年議準副將以下衛千總以上除年老有疾告休者不復起用外其年力未衰一時患病平日居官好經該督撫提鎮題請解任調理者於病痊之日驗看具題送部引見仍以原官補用又奏準營千總把總患病告請調理除尋常供職者不復起用外其有居官好人材尚可驅使者該督撫提鎮委驗出結於文內聲明準其解任調理病痊之日報部補用倘規避揑飾本官革職委驗出結官降二級調用不行詳察轉報之該管官罰俸一年乾隆八年奏準武職除年老有疾告休者不復起用外其有年力未衰一時患病平日居官好該督撫提鎮請解任者游擊以下各官準其回籍調治俟病痊之日即令原籍督撫照例驗看具題送部引見仍以原官補用至副將參將令該督撫提鎮於題請解任調理本內將應否令其回籍之處聲明請㫖十七年奉㫖兵部議奏滿千總因親老請改補近省一摺滿洲在旗原有行走之處何必改補近省嗣後此等員辨如有以親老為請者皆令回旗在原處行走十八年議準巡捕南營游擊先因推升四川撫標右營游擊奉㫖以升銜留任今病痊起用例應坐補原闕但旗員若照緑旗官員坐補原闕之例發川候補於旗員體制殊為未妥請將該員發交巡捕營仍以游擊補用嗣後旗員遇有升任遠省以親老留任仍應坐補原闕者即照此辦理一回避事例原定雙月單月選補各官均回避本省又定外海內河水師及河營各官不拘本省之人均準題補又定屬官於上官有錢糧盜案考核賢否等項屬其管轄若繫同族雖服制已遠而聚族以處者令官卑者回避至支分派遠散居各省各府籍貫回異者毋庸回避若在五服之內雖住處不同仍令回避其外姻親母之父與兄弟妻之父與兄弟已之女壻適甥均令官卑者回避如有應回避不行申報回避者降一級調用雍正十一年議準豫行保舉各官亦應分别回避嗣後陸路都司以上於本籍五百里外員闕籖掣補用守備於隔府别營員闕籖掣補用至水師各官不拘籍貫營分遇有該員應升之官準籖掣補用乾隆五年奏準開列陸路總兵官時仍將回避本省於摺內聲明九年議準有題闕省分除水師河營各員闕毋庸回避本省其內地陸路各官籍隸他省者原屬居多遇有員闕將他省之人簡選題補本省之人槩不得題補本省之闕如該督撫提鎮等違例題補者交部議處至邊疆苖疆各官亦應回避本省但地方既屬緊要用人稍當變通如遇員闕令各該督撫提鎮先盡籍隸他省之人簡選勝任者題補如果無籍隸他省之人照豫保之例陸路都司以上於本籍五百里外守備於隔府别營均準其題補仍於疏內將無他省之人可題及該員籍貫營制里數逐一分晰聲明給咨送部引見恭候欽定如再不得其人令該督撫提鎮奏請由部將卓薦保列一等記名之人開列請㫖簡用又議準八旗滿洲補用外任從前並未議及應行回避之例但緑旗各官定例內服制已遠而聚族以處者仍令回避其支分派遠散居各省各府者毋庸回避至滿洲親族服制雖遠其住居皆在京師非若漢人散居各省各府者可比似應與緑旗武職回避之例稍加分别嗣後八旗補用外任者在五服之內令其回避其五服以外服制已遠毋庸回避十二年議準副將參將無論水師陸路均回避本省游擊都司守備準於五百里外及隔府别營題補至千總本屬微員發往他省不免俯仰拮据之慮仍留本省題補不必回避又議準河營參將員闕令該督於籍隸他省之河員內簡選題補如果無籍隸他省熟諳河務之人準於本省人員內保題請㫖補用仍將緣由於保題疏內聲明又覆準副將參將原繫大員恐滋瞻顧廢弛之弊是以均令回避本省但水師與陸路不同若必盡用他省之人恐一時不能熟練情形轉於水師無益嗣後陸路副參仍回避本省其水師副參毋庸回避倘瞻顧廢弛擾纍地方該督撫提鎮題參從重議處又覆準豫保注册應升副恭之參游內有籍隸本省者於鄰近省分調掣江蘇安徽互相調掣湖北湖南互相調掣雲南貴州互相調掣福建浙江廣東互相調掣陕西甘肅四川互相調掣十五年議準定例內地陸路各官不得題補本省之人至邊疆苖疆各省如無他省之人可題本省之人自都司以上於本籍五百里外守備於隔府别營均準其題補原指邊疆苖疆之省分而言乃各督撫提鎮有將內地陸路均援此例題請者實與定例不符嗣後雲南貴州四川廣西陕西甘肅湖廣等省地處險要及切近苖獞之營汛仍照例聲明辦理其餘內地槩不準援照此例題請如仍違例題請將該督撫提鎮請㫖交部議處一丁憂事例順治初年定武職大小各官遇有親喪在任守制二十七月照常供職不準回籍康熙二十六年議準提鎮丁憂由督撫題報副將丁憂屬將軍轄者由將軍題報屬督撫轄者由督撫題報其專屬提鎮轄者由提鎮題報皆離任回籍守制服滿之日起文赴部候補參將以下遇有親喪皆在任守制雍正二年議準參將以下各官遇有親喪除軍機調遣不準給假治喪外其餘無論獨子與非獨子父母在任故者準給假歸葬在籍故者準給假奔喪該將軍督撫提鎮酌量定限如任所與原籍近者不得過六月遠者不得過十月將給假日期報部事畢依限回營若於定限之外藉端遲延逗遛者照赴任違限例議處衛所官親喪亦照此例行若見在運糧者運糧回日準其給假凡遇親喪各官二十七月之內遇朝賀祭祀一應慶典免其齊集行禮未滿服制之前不行升轉較俸升轉之日將回籍治喪離任月日扣除七年奉㫖官員在任守制者若遇朝賀筵燕祭祀典禮齊集之處準委屬官代行再官員偶患風寒肢體等疾亦準委屬官代行其代行緣由提鎮報明禮部副參以下報明督撫提鎮十三年十一月奉㫖三年之喪不得嫁娶違者奪爵褫服乾隆三年議準官員出繼為人後者遇本生父母身故提鎮由督撫題報副將由該管之將軍督撫提鎮題報皆準回籍治喪一年限滿起文赴部候補參將以下各官除軍機調遣不準給假其餘報明督撫提鎮給假回籍治喪依限回營辦事以聞訃之日為始一年內停其升轉至較俸升轉之時將給假離任月日扣除又議準見任官遇有親喪未經報部之先已論俸推升其原任已補授有人者令赴新任辦事接扣服滿日報部如報部之時原任尚未補授有人者將所升之任扣除别補該員仍留原任俟服滿後再行升轉四年覆準定例參將以下在任守制服未闋之前不準升轉此原指見任實授之官而言至分發各項候補人員到營之後隨衆差操適遇親喪若不準其委署則無俸薪養廉難免拮据况其間有才技兼優之人恐日久閒曠不免生疏嗣後各項候補人員遇有親喪除於二十七月內不準題補拔補外若遇人地相宜之任準其一例簡選委署俟服滿後照例題補拔補六年奏準在部候選候補各官於籖掣得官之後未經給劄之先遇有親喪取具同鄉京官印結令其回籍守制俟服滿日起文赴部候補如已經給劄者照見任官例給假治喪十二年諭副將丁憂者例應離任守制俟二十七月期滿始行補用但旗員向皆持服百日期滿即行當差並不俟二十七月且滿洲官丁憂後三年內並無差使閒散安居不但於生計無益人亦漸至頺惰嗣後除提鎮內丁憂者皆深知簡用之人朕酌量委用外其選用副將之旗員內遇有丁憂由侍衛升用者著在一等侍衛上行走由前鋒參領護軍參領驍騎參領等官升用者著在各原處行走遇參領副參領員闕即行坐補由世爵升用者著仍在原爵行走若由步營及王府升用者原處無品級相當之闕臨時著該旗辦理具奏請㫖以便酌量委用俟二十七月期滿應行補用時仍著照例補用欽此一停止入籍康熙五十年議準見任及丁憂休致事故解退之提鎮並副參游都守等官皆不許在任所置立産業入籍如有已經置立者限六月內變賣回籍五十一年奉㫖武職駐劄地方不許入民籍立産業其已立産業者令變賣回籍若身殁後有實不能遷移者督撫察明具奏請㫖雍正元年議準提鎮副將均繫大員不許在見任地方置立産業即丁憂休致事故解退之後亦不許在彼入籍居住此內或於任內置有産業已經身故實有不能回籍者該督撫具奏請㫖參將以下各官任所置有産業或本身丁憂休致事故解退或已經身故子孫留住任所有欲在彼入籍者該地方官呈報督撫準其入籍居住田土丁糧與土著一例輸納乾隆二年議準緣事革職之人果無原籍可歸如任所安葬祖父墳墓閲年已久不得已欲在彼入籍者副將以上等官該督撫具奏請㫖恭將游擊都司該督撫察核報部由部移咨該員原籍如果無産業宗族該原籍地方官出具印結送部準其入籍如有假揑將本人照例治罪押令回籍不行詳察出結之地方官照濫行出結例議處至守備以下革職微員原籍如果無産業墳墓取結報部準其入籍十八年諭各省武職大員在任所置立産業身故後子孫不能回籍該督撫代為具奏請㫖者多即準行及按之定例則武職原不許在任所置産入籍康熙年間曾通行稽察豫以半年之限勒令回籍隨降㫖設有身故者準令代奏請㫖此蓋辦理之初加恩寬恤而其後遂相沿成例此該部濫觴非初制也武職雖無民社之寄然於在任時憑藉威勢安保無營私侵占諸弊且以建旄擁節之大員求田問舍多方為子孫計又安望其能整飭營伍彈壓地方耶茍非生前置産則身故以後子孫當經營歸殯又何暇置産其有産者率在任時違制所置督撫不行恭出耳嗣後武職大員仍照舊例不許在任所置産入籍督撫亦不得代為奏請該部通行傳諭知之欽此一更復姓名康熙三十七年議準官員改復本姓名者恭將以上該督撫等具題游擊以下均咨部注册該督撫仍於年終彚題各照改復姓名換給劄付欽定大清㑹典則例卷一百六
