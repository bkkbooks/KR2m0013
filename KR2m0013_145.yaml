body:
  text: 理藩院王會清吏司一朝覲順治五年定蒙古王貝勒貝子公台吉都統等準於年節來朝六年題準蒙古朝覲之期每年定於十二月十五日以後二十五日以前到齊一朝儀國初定蒙古王貝勒等凡遇年節皆會集於各扎薩克處咸朝服望闕行三跪九叩禮康熙二十六年題準朝覲來京之王等凡遇祭祀一例齋戒遇朝會按班齊集違者罰俸六月三十二年議準蒙古王貝勒及俄羅斯等處來使如遇年節冬至及凡遇慶賀皆行三跪九叩禮來使凡遇召見賜茶及賜燕均行三跪九叩禮食畢行一跪三叩禮三十九年覆準王貝勒台吉等來朝凡遇祭祀壇廟齋戒行禮處停其陪祀令於午門外按翼排班候聖駕出入時與不陪祀之在內王公一例迎送一班次順治八年題準各蒙古分為兩班循環來朝十五年題準承襲王貝勒貝子公爵未及十八嵗者免其年節來朝至十八嵗始令入班朝覲康熙元年題準每年元旦令歸化城土默特二都統輪班來朝留一人辦事副都統亦如之五十九年題準年例朝覲蒙古二十四部落定例分為兩班將班次曉諭應來之王貝勒貝子公台吉等令其按期朝集如有事故令協理旗務之台吉一人前來若協理旗務之台吉亦有公事及患病等情即遣本旗內大台吉代覲仍將情由用印文送院察核如並無事故托辭不朝者將該管扎薩克等一并題參治罪雍正四年諭向來四十九旗王台吉等分為兩班來京其家中即有要務或身抱病疴亦必前來交春始回本地明嵗冬季又復直班為期既近冬月往返勞苦深可軫念嗣後有願來請安者當於青草時仍令前來其循年例來京者分為三班二年一朝俾得休息欽此遵旨議準蒙古朝覲內扎薩克分為三班一年一班輪流來朝不直班之扎薩克令該旗協理旗務台吉一人前來公主之子孫姻戚台吉等一家一人亦分為三班輪流來京一班哲里穆盟會內科爾沁親王一人郡王一人貝勒一人鎮國公一人輔國公一人郭爾羅斯一等台吉一人召烏達盟會內敖漢郡王一人巴林郡王一人翁牛特貝勒一人巴林貝子一人敖漢輔國公一人卓索圖盟會內土默特貝子一人喀喇沁貝子一人輔國公二人扎薩克一等塔布囊一人錫林郭爾盟會內蘇尼特郡王一人阿霸垓郡王一人蒿齊忒郡王一人阿霸哈納爾貝勒一人烏朱穆秦貝勒一人蘇尼特貝勒一人阿霸垓貝子一人烏朱穆秦鎮國公一人輔國公一人烏蘭察布盟會內吳喇忒輔國公一人伊克召盟會內鄂爾多斯貝勒一人輔國公一人歸化城土默特輔國公一人二班哲里穆盟會內科爾沁親王一人郡王一人扎賴特貝勒一人郭爾羅斯鎮國公一人科爾沁輔國公三人郭爾羅斯輔國公一人召烏達盟會內翁牛特郡王一人扎魯特貝勒一人喀爾喀左翼貝勒一人敖漢貝子一人巴林貝子一人翁牛特鎮國公一人扎魯特鎮國公一人巴林輔國公一人卓索圖盟會內喀喇沁郡王一人鎮國公一人錫林郭爾盟會內蒿齊忒郡王一人蘇尼特郡王一人阿霸哈納爾貝子一人烏蘭察布盟會內四子部落郡王一人毛明安貝勒一人喀爾喀右翼貝子一人吳喇忒鎮國公一人毛明安扎薩克一等台吉一人伊克召盟會內鄂爾多斯郡王一人貝子二人扎薩克一等台吉一人三班哲里穆盟會內科爾沁親王二人郡王二人貝勒一人貝子一人杜爾伯特貝子一人科爾沁鎮國公一人輔國公二人召烏達盟會內奈曼郡王一人敖漢郡王一人阿祿科爾沁貝勒一人扎魯特貝勒一人翁牛特貝子一人敖漢輔國公一人克西克騰扎薩克一等台吉一人卓索圖盟會內土默特貝勒一人附喀爾喀貝勒一人喀喇沁貝子一人錫林郭爾盟會內烏朱穆秦親王一人阿霸垓郡王一人蘇尼特輔國公一人阿霸垓輔國公一人烏蘭察布盟會內喀爾喀右翼貝勒一人貝子一人吳喇忒鎮國公一人喀爾喀右翼鎮國公一人伊克召盟會內鄂爾多斯貝勒一人貝子一人各令按班來朝乾隆五年奏準擢於御前乾清門行走之內扎薩克王貝勒以下台吉以上分為兩班令其每年萬夀年節輪班來朝十年奏準蒙古王公扎薩克等皆辦理一旗事務之人盟長又繫總理一盟會事務逺離遊牧來京久住不免諸事貽誤再擢於御前乾清門行走之人其中盟長扎薩克等甚多分為二班每年來京久住遊牧事務恐有貽誤嗣後除間散王公額駙台吉等照常兩班來朝外其盟長扎薩克不必入於兩班或遇年班或有事來京仍令在御前乾清門行走十四年奏準間散行走之額駙等分為三班一年一班輪流來朝一敘次順治十年題準蒙古親王在內親王之下郡王在內郡王之下貝勒在內貝勒之下貝子在內貝子之下公在內公之下以次敘坐十八年題準年節來朝或進貢或會集坐次先一二等台吉次蒙古子次三等台吉次蒙古都統次四等台吉蒙古副都統次蒙古參領佐領其蒙古男以下雲騎尉以上各按品級分别敘坐康熙五年定一二等台吉令於內大臣之下敘坐一貢物國初定歸化城土默特二旗每年四季貢馬百匹段百匹順治二年題準歸化城土默特二旗四季貢馬百六十三匹免其貢段十四年題準歸化城土默特二旗每年貢石青二千斤康熙十三年題準每年節進貢科爾沁等十旗共進十有二九計羊百有八隻乳酒百有八瓶鄂爾多斯六旗吳喇忒三旗共進九九計羊八十一隻乳酒八十一瓶餘二十五旗共進三九計羊二十七隻乳酒二十七瓶由院察收交與禮部二十三年題準年節進貢阿霸哈納爾二旗喀爾喀一旗共進三九計羊二十七隻乳酒二十七瓶由院察收交與禮部二十四年題準蒙古王等年節進貢每旗止令進羊一隻乳酒一瓶交與禮部二十九年奉旨科爾沁王台吉並王福晉夫人等所進湯羊每年定例太多嗣後進羊數不得過二三三十四年奉旨土默特效力甚苦嗣後馬鹿鷹鷂等貢永行停止四十年停止歸化城土默特進貢石青四十一年科爾沁旗分台吉等之妻進貢湯羊奉旨蒙古進羊亦非容易嗣後進皇太后前者照常進貢進於朕前者著停止乾隆元年覆準蒙古各旗扎薩克每年十二月各進羊一隻乳酒一瓶著為定例今鄂爾多斯别分一旗其管旗之扎薩克台吉等願貢羊酒應準其照例進貢一貢道科爾沁郭爾羅斯杜爾伯特扎賴特均由山海關土默特扎魯特阿祿科爾沁敖漢奈曼喀爾喀左翼喀喇沁翁牛特均由喜峯口阿霸哈納爾阿霸垓蒿齊忒烏朱穆秦巴林克西克騰均由獨石口喀爾喀右翼四子部落蘇尼特毛明安均由張家口歸化城土默特鄂爾多斯吳喇忒均由殺虎口以達京師一禁約順治五年定蒙古每年四季各旗遣一人來京聽事十四年題準外藩固倫公主親王以下縣君公以上或以朝貢或以嫁娶及探親等事欲來京師者皆報院請旨不得私來康熙四年題準除下嫁蒙古公主郡主外王以下扎薩克台吉以上以進貢來者不必題請又題準歸化城土默特亦於每年四季各旗遣一人來京聽事十三年題準台吉等年老有疾不能親來者方準遣使代貢年壯無疾遣使者不準三十三年覆準蒙古王等隨來兵丁絡繹不絶著於各旗台吉參領驍騎校內選一人為頭領監管倘有搶掠竊盜事發一并議處並行文各扎薩克嗣後凡無貢物空身來者停其給發印文四十三年議準蒙古台吉定為一年一次進貢如有情願來貢者準其進貢該扎薩克將台吉等職名貢物開載印文進口時該管官察明人數貢物亦用印文差緑旗步兵齎送其扎薩克印文交稽察館務官詳勘願來之台吉亦照正貢例安置五十六年覆準蒙古台吉等進貢人入口時令守邊口官察明貢物即用印文交步兵齎送不得遲延勒索如違交部嚴究議罪又議準進貢之台吉等由該扎薩克處各將職名年貌貢物數目並願來之台吉逐一開明給印文令其來京倘將册內無名品級未到之台吉徇情濫給印文令來者將該扎薩克王貝勒貝子公台吉等各罰俸一年協理旗務台吉各罰牲畜五九雍正七年定四時進貢聽事之處改為十月內來京一次乾隆十二年議準每年冬季進貢之台吉等均編班次令其輪流行走有千餘台吉之旗令二三百人前來五百以上之旗令百餘人前來止二三百之旗來者不得過六十人若有事故不能來者不得逼勒其願來之台吉務先詢明每人給印文一紙開載姓名以杜冒替並將各旗所來名數彚造一簿先期報院以備察核二十七年議準每年冬季進貢之台吉定於六月內造册報院核對後行文該扎薩克準其來貢又奏準冬季進貢之台吉均編班次令其輪流行走凡有千台吉之旗令二百人前來五百台吉之旗令百人前來百台吉之旗令二十人前來仍照例先期報院屆期給與印文以杜冒替有故不能來者毋得逼勒一騎從順治五年題準蒙古王等來京親王準隨五十人郡王四十五人貝勒四十人貝子三十五人鎮國公輔國公各三十人台吉都統等各十人於定額之外多來者不準支給食物草料十年題準蒙古王等來京親王及隨從人共馬十五匹郡王及隨從人共馬十匹貝勒及隨從人共馬八匹貝子固倫額駙及隨從人共馬六匹公和碩公主額駙郡主額駙縣主額駙及隨從人共馬四匹公主之子及從人共馬三匹台吉及從人共馬二匹若台吉等隨其王貝勒來者止定本身馬一匹固倫公主視親王郡主視郡王縣主視貝勒郡君視貝子縣君視公都統子以下雲騎尉以上各本身馬一匹均行文户部支給草料此外馬駝交禮部馬館飼養十八年題準公主郡主等與額駙同來隨從人員悉照來數支給食物草料若額駙等獨來固倫額駙準隨四十人和碩額駙三十人多羅額駙公主之子二十人固山額駙十有五人餘人不準支給食物草料康熙六十一年議準凡固倫公主來京準隨護衛官二十三人婢女十三人僕從十四人在館養馬六十五匹坐馬十五匹和碩公主護衛官十四人婢女十六人僕從十人養馬六十匹坐馬十三匹郡主婢女二十人僕從十三人養馬五十匹坐馬十匹縣主婢女十八人僕從十二人養馬四十匹坐馬八匹郡君婢女十五人僕從十人養馬三十五匹坐馬六匹縣君婢女十二人僕從八人養馬二十五匹坐馬四匹鄉君婢女一人僕從九人養馬十匹坐馬三匹宗女婢女一人僕從七人養馬八匹坐馬三匹若固倫公主之固倫額駙和碩公主之和碩額駙來京均準隨護衛六人隨從九人僕從十人養馬三十五匹坐馬六匹郡主之和碩額駙隨從十三人僕從十二人養馬三十五匹坐馬六匹縣主之多羅額駙隨從十人僕從十人養馬二十五匹坐馬四匹郡君之多羅額駙隨從八人僕從七人養馬二十五匹坐馬四匹縣君之固山額駙隨從三人僕從七人養馬十五匹坐馬三匹鄉君額駙僕從六人養馬八匹坐馬一匹若親王來京準隨長史護衛等官二十三人隨從七人僕從十人養馬六十匹坐馬十五匹惟科爾沁之土謝圖卓里克圖達爾漢三親王養馬六十五匹郡王長史護衛等官十八人隨從七人僕從十人養馬五十匹坐馬十匹貝勒司儀長護衛等官十一人隨從九人僕從十人養馬四十匹坐馬八匹惟科爾沁達爾漢親王旗一貝勒養馬六十五匹坐馬十五匹貝子護衛等官八人隨從七人僕從十人養馬三十五匹坐馬六匹公護衛等官六人隨從六人僕從八人養馬二十五匹坐馬四匹扎薩克台吉僕從十人養馬十匹坐馬三匹公主之子孫台吉隨從三人僕從三人養馬十五匹坐馬三匹姻戚台吉僕從六人養馬十五匹坐馬三匹台吉僕從四人養馬八匹坐馬一匹都統子副都統男等來京各準隨僕從四人養馬五匹坐馬一匹長史護衛參領佐領騎都尉雲騎尉驍騎校等僕從各一