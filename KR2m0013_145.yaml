段匹一俸幣固倫公主俸銀千兩俸段三十和碩公主俸銀二百兩俸段十有二郡主俸銀百五十兩俸段十縣主俸銀百兩俸段八郡君俸銀五十兩俸段六縣君俸銀四十兩俸段五鄉君俸銀三十兩俸段四固倫公主之固倫額駙俸銀三百兩和碩公主之和碩額駙俸銀二百兩俸段各九郡主額駙俸銀百兩俸段八縣主之多羅額駙俸銀五十兩俸段五郡君之多羅額駙俸銀四十兩俸段四縣君之固山額駙俸銀三十兩俸段三科爾沁土謝圖卓里克圖達爾漢三親王俸銀二千五百兩俸段四十其餘親王俸銀二千兩俸段二十五科爾沁扎薩克圖郡王俸銀千五百兩俸段二十其餘郡王俸銀千二百兩俸段十有五貝勒俸銀八百兩俸段十有三貝子俸銀五百兩俸段十鎮國公俸銀三百兩俸段九輔國公俸銀二百兩俸段七扎薩克台吉俸銀百兩俸段四一等子俸銀二百五兩二等子百九十二兩五錢三等子百八十兩一等男俸銀百五十五兩二等男百四十二兩五錢三等男百三十兩一等輕車都尉俸銀百有五兩二等輕車都尉九十二兩五錢三等輕車都尉八十兩騎都尉俸銀五十五兩雲騎尉俸銀四十二兩五錢雍正七年諭蒙古王以下扎薩克一等台吉以上著通行增賞俸銀一倍再間散一等台吉從前無俸亦著照從前扎薩克一等台吉所食俸銀百兩之數賞給嗣後著户部會同理藩院於年終將倍賞之處請旨欽此十年議準乾清門行走之一等台吉嵗給俸銀百兩二等八十兩三等六十兩四等四十兩一振恤國初定蒙古如遇災荒令附於該扎薩克及各旗富戶喇嘛人等設法養贍如仍不敷該會內人等共出牛羊協濟養贍仍將協濟被災人口數目造册送院倘連嵗飢饉該會內力乏不能養濟著盟長會同該扎薩克等一同具報到院由院請旨遣官察勘發帑振濟將該扎薩克王貝勒貝子公台吉等次年俸銀豫行支取一并入於振濟項內使用振濟後該扎薩克王等仍不能養恤屬下又至窮困者即將窮困之戶徹出給與該會內賢能扎薩克等養贍康熙三十年遣官五路分察蒙古各旗佐領內貧人奉旨前蒙古等處盜賊稀少今乃日見奏報良由窮困所致彼擕妻挾子前來若盡行收留彼無遺類矣今爾等往會彼屬王貝勒及耆老輩計議作何長久營生使貧人得所不致邊土流亡確議具奏欽此遵旨議準衆蒙古王貝勒以下耆老什長以上謹遵恩旨嚴行曉諭各旗嗣後均擇水草佳處遊牧輕役減稅務求永逺營生之道今先察明貧乏之户著本旗扎薩克及富户喇嘛等撫養不足則各旗公助牛羊每貧台吉給牛三頭羊十五隻每貧人給牛二頭羊十隻令其孳育永作生理勿為盜賊亦不致流亡取具衆旗承領養贍貧人數目印給一并送院注册存案倘日後有以貧窮告者照册將該管扎薩克議處有告振不實者仍治以罪雍正元年諭郭爾羅斯乏食白都訥倉糧頗多即將此米散振但止給與米糧糊口並無産業何以為生向者給産業買牲餼之事皆委富戶富户茍且塞責所給蒙古之物浮報數倍蒙古並不得實惠科爾沁一旗與他蒙古不同世為國戚恪恭巽順歷今百有餘年今聞伊屬下之人乏食朕心軫惻著齎帑銀三萬兩往振再差大臣一人司官一人往郭爾羅斯旗下將實在窮苦並無牲餼之人察明數目按伊戶口足用之數給與乳牛羊隻欽此又諭今年口外蒙古地方雖獲豐收但科爾沁敖漢等十六處扎薩克地方收穫未豐宜加特恩科爾沁五旗著賞銀三千兩此項銀交與見今在京科爾沁王等帶去將科爾沁土謝圖親王等五旗未能豐收者察明賞給敖漢等十一旗著賞銀六千兩可簡司官二人分兩路送往會同各該扎薩克將未能豐收者察明賞給欽此五年諭索倫達虎里等處兩年馬匹牲畜多有倒斃豐歉不一兵丁生計稍艱著動戶部帑銀五千兩交總管副都統與將軍公同商酌養育索倫窮苦之人及賞給效力兵丁欽此乾隆十一年奏準烏蘭察布一盟會六旗遭旱蒙古益窮見據該扎薩克等及各旗有牲畜富戶咸已兼顧養贍應加鼓勵請將此次養贍窮蒙古人內辦理旗務王台吉等如後遇罰牲之案視其養贍人數多寡將應罰之牲按數抵銷間散台吉官員人等入於勤勞公事人內亦按其養贍人數多寡一例分賞罪罰牲畜以示奬勵十二年諭據差往察核拯救蘇尼特等六旗被災貧人之尚書奏稱烏朱穆秦四旗被災較輕其下二萬餘口貧窮蒙古均并於該旗養贍無庸拯救等語該扎薩克等如此辦理雖繫其分內之事朕甚嘉之著特加恩此四旗內養贍貧人之王貝勒貝子公等著賜俸半年其無俸之副台吉量賜銀四十兩小台吉二十兩官員白丁喇嘛入於賞給罪罰牲畜之內均照去年烏蘭察布之盟施恩辦理欽此二十七年議準哲里穆召烏達卓索圖三會盟所屬遊牧尚有可耕之地是以康熙年間議令三盟長之扎薩克等每旗各設一倉每年秋收後各佐領下壯丁每丁輸糧一斗貯倉以為歉收振濟之用其收放數目並未定有奏銷之例嗣後三盟長各扎薩克於每年秋收後將收納支放實數各造具印册報院年終彚奏欽定大清會典則例卷一百四十一
