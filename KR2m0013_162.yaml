body:
  text: 欽天監時憲科一推步之法順治元年用西洋新法二百恆年表以太宗文皇帝天聰二年戊辰為元自天正冬至次日子正初刻起算康熙七年題準各通書均不及選擇厯書萬年厯通書大全三書但選擇厯書內闕山嚮正五行等二十四事其正五行於三台通書內取用其餘於通書大全內所載合厯法公規等條取用其餘重雜無用者悉令刪去八年議準仍用洪範五行十七年續修康熙永年表三十二卷告成三十二年議準選擇厯書萬年厯並通書大全三書內山嚮洪範五行等二十四件合為一書共成十册名曰欽定選擇厯書同萬年厯永逺遵行書版交禮部收貯五十四年御定星厯考原告成五十六年奉旨時憲厯內所列男女九宫以上元為中元傳誤已久著欽天監照依星厯考原具題改正五十七年欽定七政四餘萬年厯告成雍正三年聖祖仁皇帝御製律厯淵源百卷刋刻告成內厯象考成四十二卷律吕正義五卷數理精蘊五十三卷世宗憲皇帝御製序文頒行天下令監官欽遵厯象考成推算以康熙二十三年甲子為上元十年重修考成交食表一卷又奏準御製律厯淵源及考成後編書版均交監收貯願刷印者聽並頒賜各省聽其翻刻以廣流傳乾隆六年欽定協紀辦方書三十六卷萬年書十二卷告成書版交監收貯願刷印者聽七年增修考成後編十卷告成一時憲書每年二月初一日進呈來嵗時憲書式俟御覽畢翻譯刋印四月初一日咨呈兵部由驛遞各省布政使司書式各二本一本用印存司署一本不用印照式刋刻鈐欽天監時憲書印至期頒發本省十月初一日恭進繕録清漢字御覽時憲書各一本刷印清漢蒙古字時憲書各一本清漢字七政時憲書各一本皇太后皇后刷印清漢蒙古字時憲書各一本清漢字七政時憲書各一本均用黃綾面套皇貴妃貴妃妃刷印清漢蒙古字時憲書各一本清漢字七政時憲書各一本均用金黃綾面套嬪刷印清漢蒙古字時憲書各一本清漢字七政時憲書各一本用紅綾面無套以上時憲書均不鈐時憲書印黃棉紙包封頒賜時憲書於王公均清漢蒙古字時憲書各一本清漢字七政時憲書各一本王貝勒用紅綾面貝子公用黃裱紙面公主給清漢蒙古字時憲書各一本用紅綾面均紅棉紙包封八旗各部院衙門大臣堂官滿洲給清字蒙古給蒙古字漢軍漢人給漢字時憲書各一本均黃裱紙面每旗每衙門共一紅棉紙包封其八旗滿洲官員給清字蒙古官員給蒙古字漢軍官員給漢字時憲書各一本均交各旗分發各衙門漢官每人給漢字時憲書一本交各衙門分發其各衙門坐書於初三日行文赴監支取守陵官員及山海關副都統盛京吉林黑龍江將軍盛京五部侍郎內務府總管佐領馬蘭鎮泰寧鎮等處文武官各給一本應領清字蒙古字漢字時憲書行文赴監支取直隸九府奉天錦州二府每府給漢字七政時憲書二本時憲書千本大興宛平二縣每縣給七政時憲書二本時憲書九十本熱河理事同知給漢字時憲書三百本廣昌縣給漢字時憲書二百本具文申監支取蒙古藩王各給蒙古字時憲書百本由理藩院頒發朝鮮國王給紅綾面漢字時憲書一本其官屬給黃紙靣漢字時憲書百本由禮部頒發以上均鈐時憲書印是日值孟冬時饗太廟恭遇親詣行禮於五鼓進呈遣官恭代於黎明進呈監官設黃案二於太和門正中設黃案二於午門外正中設紅案八於午門外兩旁工部設龍亭一於監署大堂正中設黃亭八於大堂兩旁設紅案八十於兩廊下監官恭奉進皇太后皇帝皇后皇貴妃貴妃妃嬪時憲書設龍亭內頒賜王公大臣時憲書置黃亭內八旗各衙門官員時憲書置紅案上於龍亭前行一跪三叩禮校尉舁亭八旗兵丁舉案御仗前導樂部和聲署作樂三科官導引堂官後隨自長安左門中門進至午門前監官由亭內恭奉進呈時憲書安設黃案上頒賜王公百官時憲書安設紅案上校尉徹亭置兩旁監官恭奉進呈書由午門中門入至太和門設黃案上堂官行三跪九叩禮授內務府官恭捧進呈退出王公百官齊集午門前鴻臚寺官贊引宣旨行禮王公以下跪領如儀詳禮部儀制司御覽時憲書首列都城節氣時刻次列太歲干支年神九宫次列六十花甲次列三合天喜等神次列逐月合朔弦望逐月干支納音生剋日名紀宿建除用事日下並注吉神節候中氣交宫月下止注交節月神九宫後紀年男女九宫下列宜忌等日內注六十七事祭祀祈福求嗣上册進表章頒詔覃恩肆赦施恩封拜詔命公卿招賢舉正直施恩惠恤孤惸宣政事布政事行惠愛雪寃枉緩刑獄慶賜賞賀燕會入學冠帶行幸遣使安撫邊境選將訓兵出師上官赴任臨政親民結婚姻納采問名嫁娶進人口般移安牀解除沐浴整容剃頭整手足甲求醫療病裁製營建宫室修宫室繕城郭築隄防興造動土竪柱上梁經絡開市立劵交易納財修置産室開渠穿井安碓磑補垣掃舍宇修飾垣牆平治道塗伐木捕捉畋獵取魚栽種牧飬納畜通用時憲書首列都城節氣時刻次列太歲干支年神九宫次列各省各蒙古部落日出入晝夜節氣時刻次列逐月合朔弦望逐日干支納音紀宿建除用事每月下仍列節候月神九宫及中氣交宫後列紀年男女九宫下列宜忌等日末列監官銜名內注三十七事祭祀上表章上官入學冠帶結婚姻會親友嫁娶進人口出行移徙安牀沐浴剃頭療病裁衣修造動土𥪡柱上梁經絡開市立劵交易納財修置産室開渠穿井安碓磑掃舍字平治道塗破屋壞垣伐木捕捉畋獵栽種牧飬破土安葬啓攢刋造時憲書刷印紙包封紙裝潢綾絹顏料於戶部支領肇墨版片棕麻及頒發直隸盛京蒙古部落朝鮮應用箱籠等物於工部支領順治元年西洋逺臣進新法測天等儀並新法書式奉旨西洋新法推驗精密見令定造時憲新厯悉依此法為凖遂令西洋人修正厯法二年新書告成頒行天下面刻欽天監依西洋新法印造時憲厯日頒行天下偽造者依律處斬有能告捕者官給賞銀五十兩如無本監厯日印信即同私厯康熙五年復用舊法時憲書靣去依西洋新法五字改為欽天監奏準印造時憲厯日頒行天下八年令西洋人治時憲書三十一年覆準科爾沁等蒙古部落二十四處歸化城杜科爾沁爾伯特敖漢扎賴特爾郭爾羅斯特巴林牛奈曼喀阿祿科沁扎魯翁特爾喀穆秦克西克騰蘇喀喇沁阿土默特爾烏朱阿霸垓尼特霸哈納蒿齊忒吳四子部落爾毛明安喇忒鄂多斯太陽出入節氣時刻載入時憲書五十二年覆準厄魯特喀爾喀等諸蒙古部落並哈密地方十有五處布隆堪布爾嘎蘇泰爾厄格塞楞格城桑金答賴湖山肯忒山克倫河巴拉斯圖拉河韓喀爾喀河克勒和邵格衣札布韓河鄂爾昆河厄爾得尼招薩空推河翁機河薩克圖古里克善古爾班賽堪阿蘭山哈密城太陽出入節氣時刻增入時憲書一例頒發六十一年十一月恭進雍正元年時憲書式奉旨書面止載欽天監奏準印造一段自偽造者以下載於後面雍正三年奉旨時憲書面欽天監奏準一段改為欽天監欽遵御製厯象考成印造時憲厯日頒行天下五年諭嗣後時憲厯中逢列祖忌辰應將結婚姻燕會喜慶等事均不載入方是至朕宫中每遇列祖列后忌辰皆素服齋居御厯中忌辰更不當載入巡幸燕會等字樣著欽天監詳議奏請永為定式欽此遵旨議準凡恭遇列廟忌辰注安撫邊境安牀解除求醫療病裁製繕城郭築隄防經絡立劵交易納財修置産室開渠穿井安碓磑補垣掃舍宇修飾垣牆平治道塗伐木捕捉栽種牧飬納畜餘事不注又奉旨民厯內逢忌辰仍注豎柱上梁開市十三年奏準時憲書內遇齋戒日期於日旁加圈作記列聖列后忌辰加圈亦如之十三年十月恭進乾隆元年時憲書式奏準書前面改為欽天監欽遵御製數理精蘊印造時憲書頒行天下後面改為如無本監時憲書印信即同私造乾隆二十年奉旨凖噶爾諸部盡入版圖其太陽出入節氣時刻宜載入時憲書頒賜正朔以昭中外一統之盛二十二年覆準增黑龍江古林白都納三姓尼布楚太陽出入節氣時刻載入時憲書又覆準伊犁等蒙古部落並巴里坤土魯番二十處巴里坤薩伊犁魯哈布他克爾拜他克穆鳥穆齊嗒巴噶台穆壘海吉安齊齋爾沙波羅他拉勒魯克沁都烏沙克他爾哈拉拉庫爾珠爾斯空吉斯哈什土哈薩克魯番太陽出入節氣時刻增入時憲書一例頒發一七政時憲書首列五星伏見目録次列逐月逐日七政經緯宿舍度分於月注正橫斜升於五星注晨夕伏見後列七政行最高卑及月孛羅㬋計都宿度乾隆五年議準正交為羅㬋中交為計都古法以出黃道南為正交西法以入黃道北為正交依古改正並增紫氣以備星家四餘一推月五星陵犯時憲書均按視差法推其犯掩時刻及相距度分按日排注其犯掩次數宫分摘序目録列於書前歲終十二月恭進雍正九年奉旨改月五星陵犯厯為月五星相距時憲厯十三年奏準改為月五星相距時憲書乾隆十八年奏準月五星相距書照日月交食例凡不見者均不載入一日月交食日食分秒時刻隨地不同月食分秒天下皆同惟時刻各異帶食則分秒時刻月食亦隨地不同皆各按法推算前期五月繪圖具題旨下禮部通行天下救護自初虧起至復圓止帶出地平自見食起至復圓止食不及一分不行救護康熙六十一年定日食三分以內者不頒行乾隆六年定月食三分以內者亦不頒行十三年定日月交食三分以內者皆頒行不救護又定日月交食三分以下例不救護者不具題仍於五月前摺奏禮部將見食省分行文知照不見食省分無庸行知十四年諭凡日月交食授時者原可推算而得而春秋之例又紀日而不紀月朕惟懸象著明人所共仰雖為晷運之常有自不若光朗之恆度無事於諱不可不謹故禜社奏鼓自古重之舊制交食分秒時刻頒行各省不及一分者不行救護後定為三分以上方行救護又經禮部奏定不見食省分並不及三分者皆不行知夫不先期行知則二三分者原可見食將致反生疑駭不以為靈臺失占即為有司怠事非所以克謹天戒也嗣後仍循曩制一分以上即令救護前期五月具題請旨無論見食不不食省分皆頒行其不見食省分不必救護欽此一春牛圖每年立春日禮部進呈春山土牛後由監分送諸王貝勒各一圖天文科一測量儀器康熙八年奏製新儀奉旨舊有儀器觀象臺舊設渾簡儀明正統年製仍著收存勿令損壞十二年新製儀器告成一為天體儀一為黃道儀一為赤道儀一為地平經儀一為地平緯儀亦名象限儀一為紀限儀安設臺上舊儀移置臺下别室十三年編著新儀製法用法圖説並恆星經緯度表十六卷名曰新製靈臺儀象志五十二年御製地平經緯儀安設臺上乾隆九年駕幸觀象臺御製璣衡撫辰儀安設臺上命於紫微殿前增築月臺將前明舊儀安設月臺十九年御製儀説二卷新測恆星經緯度表三十二卷名曰御製儀象考成一測日圭表平案長一丈六尺二寸立表高八尺上設橫梁用影符以取中影西法立表加高二尺上端安銅片中開圓孔徑二分午正日光自圓孔射至平案成撱圓形南界為日體上邊之影北界為日體下邊之影中心為中影京師夏至影長二尺九寸四分冬至影長一丈九尺九寸四分因案長不及長影之數又於北端設立表高三尺五寸冬至之影上立表二尺七寸有四釐一測候之法交食陵犯日出入晝夜節氣時刻隨地不同皆以北極高度東西偏度推算占候八節風占皆用題本即日具題如封印後暫用奏本即日帶回俟開印後仍用題本送內閣占驗交食止用所食月分朔望干支月