士等官初任時各給貉皮端罩一件行文工部支領康熙九年題準滿洲天文生照未入流筆帖式給與餼廩二十一年奏準天文生隂陽生每月加給公費銀一兩五錢三十三年奏準天文生隂陽生餼廩每月增給五錢每人月支銀一兩五錢雍正八年定天文生以生員補用者照八品筆帖式食俸乾隆元年奏準未入流滿天文生照未入流筆帖式給與九品俸二年議準漢天文生照滿洲漢軍天文生之數考選二十四人給與九品俸其餘仍給餼廩太醫院一訪擇良醫康熙四十七年覆準太醫院見有御醫吏目等百有五人每日各處輪直需用一百十有一人差多人少實不敷用應於直省民醫暨舉貢生監有職銜人內擇精通醫理情願效力者酌增二十名布衣赴該院具呈其有職銜者該地方官給照亦於該院具呈遴選補用如效力年久實有成效布衣與醫士醫生照常補授外其有職銜者該院將應用情由開明具奏移送該部於伊等應用職銜準其先用其御醫吏目醫士等老疾不能行走者呈院驗實奏準告退病愈仍赴院具呈準其原額補用若推委託故不具呈補用在外行醫者交該部嚴加議處若非實因年老有疾該院徇情準退者一并議處雍正元年諭良醫須得老年經厯多者但伊等憚於逺行嗣後果有精通醫理療疾有效者或將伊等子弟輩授為經厯吏目微職以示鼓勵著大學士等議奏欽此遵旨議準令九卿暨直省督撫各舉灼知之年老醫生該地方官資以路費護送到京報禮部交院試用果能醫理精通療疾有效即奏明照例在院授職外仍聽報出伊子弟等一人如繫見任官以應升之官即用候補候選者以應得之職即用貢監生員以經厯即用布衣以吏目典史即用又覆準行文直省巡撫察所屬醫生詳加考試果有精通類經注釋本草綱目傷寒論三書者題請為醫學官教習每省設立一人準其食俸三年如果勤慎端方貢入醫院授為御醫其員闕即於本省學習人內簡選補授凡所屬州縣衛習醫人令其訪明考試即將三書教習有精通者呈報巡撫給咨赴院考試上者授以吏目醫士等官其有年力不能赴京者留為本省教授待補一內局修製藥餌本院官診視調劑御藥參看較同會近臣就內局合藥將藥帖連名封記具本開載本方藥性治症之法於日月之下醫官近臣書名以進置簿凡進藥奏本既具隨即登簿年月下書名近臣收掌以慿稽考煎調御藥本院官與近臣監視二服合為一服俟熟分為二器其一器御醫先嘗次院判次近臣其一器進御若將方奏明交與內藥房按方煎調者內藥房辦理一內府設東西御藥房二所院使院判御醫吏目醫士各分班輪直一隨侍車駕行幸有奉旨點用者有按班輪委者皆給夫馬車輛裝載藥材仍給帳房需用等物均申禮部轉咨各該部給發雍正二年諭太醫院官先年出外甚是清苦嗣後隨行出外如何優給之處著議定以為常例欽此遵旨議準隨行出外凡堂官一人給帳房一架行李車一輛馬四匹每日給盤費銀三錢醫官醫士等人各給馬三匹盤費銀二錢三人共給帳房二架載行李車一輛驍騎二人隨行看守馬匹車若四人照依前例若五人增帳房一架車一輛驍騎二人一諸王公主府暨文武大臣請醫視疾本院官奉旨差官前往其治療可否均明晰具奏外藩公主額駙暨台吉大臣請醫亦奉旨差官前往申部給驛馬箱篋繩氊油單等項其藥材於內藥房支領或於藥庫給發回日銷算一軍前需醫奉旨差官先由禮部選委二人具題乘驛前往並遣兵部官一人送至軍前一文武會試定例取醫士一人入場供事由院遴選通曉醫理熟諳方脈者申送禮部委用如有用過藥材開單量給藥價事畢與各執事官一同赴燕一診視獄囚順治八年題定設刑部應差官帶醫士二人每月給發藥價銀米效力滿六年劄回到院升授吏目十一年定該督捕應差冠帶醫士一人與刑部同如本院需用即申明取回别選充補康熙十三年又增設醫士一人例各同前一本院醫官醫士習業設九科御醫吏目醫士醫生各専一科曰大方脈小方脈傷寒科婦人科瘡痬科針灸科眼目科口齒科正骨科一考試醫士醫生本院堂官於素問難經本草脈訣暨本科緊要方書內出題考試擇其學術精通者頂補如習業荒疏經年雖久不準頂補仍發教習廳肄業一教習本院設教習廳於御醫吏目內擇學品兼優者充補有進院業醫暨醫官子弟均送教習廳課其誦讀康熙二十三年題準遴選本院官二人在外衙門教習與首領庫官輪班直宿以應傳差一升除院使由左院判升補左院判由右院判升補右院判由御醫升補御醫由吏目升補吏目由醫士升補其御醫以下員闕堂官將內直勤勞者申送禮部轉咨吏部題授如內直補完方將外直應升各官按俸開列申送其各官員闕奉旨特用者不在此限一初進醫生定例察本身無過犯通曉醫理者仍取本院醫官醫士保結方準入院遇醫生闕於初進醫生內考取申部頂補醫士於醫生內考取申補其醫士升補吏目亦必考其方脈精明品端勞著者申禮部轉咨吏部題授一給品服雍正元年定醫士許用從九品冠帶如欽天監天文生例七年定御醫均授七品許用六品冠帶挂數珠八年定吏目許用八品冠帶一給廩餼雍正元年定醫士月給銀一兩五錢公費飯銀一兩五錢米九斗八年題準增設食糧醫官三十人每人月給銀二兩乾隆二年奏請食糧醫官三十人可否永為定例奉旨著為定例一藥庫委官二人於醫士內選委專管辦買藥材二年一換任滿二年升豫授吏目如著有勞績量加職銜倘代替乏人仍令留任管理一藥材舊例各直省出産藥材地方每年解納本院生藥庫收貯委官驗其所辦優劣其出入皆由禮部順治十六年分歸本院職掌十七年題準選本院官一人兼攝庫務頒給印信設庫役十名十八年定生藥庫復歸禮部職掌康熙三年定錢糧總歸户部本院以庫印繳還禮部其直省嵗解藥材本色並折色錢糧均由户部收貯附庫一內藥房所需藥材均按定例給價令藥商採辦每三月一次奏銷行文到院轉咨户部藥商赴部領銀其藥材均以生藥交進由內藥房醫生切造炮製一祭先醫禮每年二月十一月上甲日於本院之景惠殿致祭遣禮部堂官一人主祭本院堂官二人分獻兩廡雍正十三年議準春冬致祭先醫令堂屬官一例陪祀欽定大清會典則例卷一百五十八
