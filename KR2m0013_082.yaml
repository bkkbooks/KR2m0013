body:
  text: 禮部祠祭清吏司升祔一升祔神主入廟順治元年定鼎燕京奉太祖高皇帝孝慈高皇后太宗文皇帝神主奉安太廟遣官行禮如時饗儀五年奉肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后神主入太廟世祖章皇帝親詣太廟後殿奉安神位行大饗禮如儀八年奉孝端文皇后神主升祔太廟前期一日遣官祗告太廟届期世祖章皇帝親詣行禮先奉神主祗見太祖高皇帝孝慈高皇后太宗文皇帝世祖章皇帝恭代行三跪九拜禮興恭奉神主奉安於太宗文皇帝之次行一跪三拜禮畢行大饗禮如儀十八年奉世祖章皇帝神主升祔太廟前期一日遣官祗告太廟届期聖祖仁皇帝親詣行禮先奉神主祗見太祖高皇帝孝慈高皇后太宗文皇帝孝端文皇后聖祖仁皇帝恭代行三跪九拜禮興恭奉神主奉安於太祖高皇帝神位之西旁東嚮行一跪三拜禮乃行大饗禮後殿遣官行禮均如時饗儀康熙九年奉孝康章皇后神主升祔太廟行祗見列聖列后禮次行大饗禮與順治八年儀同二十七年奉孝莊文皇后神主升祔太廟前期遣官祗告太廟届期大臣二人恭奉世祖章皇帝孝康章皇后神主避立於旁聖祖仁皇帝恭奉神主奉安於拜位恭代行祗見太祖高皇帝孝慈高皇后太宗文皇帝禮三跪九拜興恭奉神主奉安於孝端文皇后之次行一跪三拜禮興大臣二人恭奉世祖章皇帝孝康章皇后神主奉安於拜位聖祖仁皇帝恭代行祗見孝莊文皇后禮三跪九拜興大臣二人奉安世祖章皇帝孝康章皇后神主於寶座一跪三叩退行大饗禮與九年同五十七年奉孝惠章皇后神主升祔太廟時聖祖仁皇帝聖體違和遣皇子親王恭代行禮王公百官陪祀與親詣同先是恭議升祔位次聖祖仁皇帝諭曰皇太后乃朕適母應奉安於孝康章皇后之上欽此至日太廟前殿設孝惠章皇后寶座於世祖章皇帝寶座之次孝康章皇后寶座設於孝惠章皇后寶座之次至中殿安奉世祖章皇帝神位居中孝惠章皇后神位居左孝康章皇后神位居右均南嚮先奉神主行祗見列聖列后禮次行大饗禮與九年同雍正元年由部具奏古帝王升祔太廟必以皇后配饗夏商而後遵為定制其或不同入廟者周人有閟宮之祀漢世有别寢之饗爰至唐宋有坤儀奉慈之殿所以推廣尊親之義申展無盡之孝思也自是配祔太廟者皇后字上一字與廟諡同奉祀别廟者則但有諡號而不加廟諡纍代相因其配祔之位或一帝一后或一帝二后宋太宗徽宗則四后先後升祔禮制不同本朝太祖高皇帝三后惟孝慈皇后稱高皇后升祔太廟太宗文皇帝二后孝端皇后孝莊皇后並稱文皇后先後升祔太廟世祖章皇帝三后孝惠皇后孝康皇后並稱章皇后先後升祔太廟孝獻皇后則但於孝陵饗殿奉祀此我朝之定制也前內閣九卿等恭議加上聖祖仁皇帝三皇后尊諡因未定配饗之儀故皇后字上未敢加以仁字今謹擇於九月初四日聖祖仁皇帝升祔太廟則先皇后配饗之禮理宜詳定前奉上諭仁孝皇后作配皇考孝敬寬仁坤儀懋著欽遵諭㫖謹按典禮仁孝皇后允宜配位太室同饗玉筵應於皇字上加以廟諡仁字但與尊諡仁字重復恭請改題神主曰孝誠恭肅正惠安和儷天襄聖仁皇后神位擇吉升祔太廟孝恭仁皇后性成慈孝德著謙和體坤道以承乾備母儀而啓聖允宜齊登清廟並奉蒸嘗閣臣議上尊諡即具加廟諡與孝誠仁皇后同祔太廟此天地之經義不易之常典無庸更議孝懿皇后徽音淑德著美彤闈慈愛聖躬勤勞篤摰孝昭皇后流輝椒掖正號璇宮其應否升祔太廟事關巨典宜合廷臣詳考古制稽核正典確議以定奉㫖總理事務王大臣內閣九卿翰林詹事科道㑹同詳稽典禮確議具奏遵㫖議準前代祔廟之制各有不同自夏商以及六朝太廟神主皆一帝一后至唐睿宗昭成肅明二后並祔太廟宋之太祖則三后並祔太宗四后並祔朱子及有宋諸儒皆無異說欽惟孝誠仁皇后作配宸極懋著坤儀孝恭仁皇后德茂承乾祥開育聖慈仁孝儉為天下母允宜如禮臣所奏同祔太廟欽惟孝懿皇后孝昭皇后前奉諭㫖孝昭皇后恪恭溫順樹範宮闈孝懿皇后徽音淑德慈撫朕躬恩勤備至均應恭上尊諡以昭示萬年仰惟皇帝大孝不匱之聖心謹按宋代四后祔廟之大典謹於孝懿溫誠端仁憲穆奉天佐聖皇后孝昭靜淑明惠正和欽天順聖皇后並加上尊諡廟諡仁字均稱仁皇后恭造神主同祔太廟又奏準恭按孝誠仁皇后孝昭仁皇后孝懿仁皇后安奉奉先殿神牌曾於殯宮行題主禮升祔奉先殿今恭上尊諡同祔太廟禮應於廟中改題請將三后升祔奉先殿業經題主神牌諏吉恭請至太廟恭製神主處照改題之例飾漆塗金備書尊諡升祔前期遣大學士二人恭行改題掃青禮俟聖祖仁皇帝神主祔廟之日恭奉三后神主依次升祔太廟祔奉先殿神主别於奉先殿神庫敬製恭題同日升祔又奉㫖朕惟母后升祔太廟大典攸關欲伸臣子之孝思必準前代之成憲務得情理允協乃可昭示萬年孝昭仁皇后孝懿仁皇后繼位中宮孝恭仁皇后誕育朕躬母儀天下按先儒祔廟之議一元后一繼立一本生以次並列今母后升祔位次當首奉孝誠仁皇后次奉孝昭仁皇后次奉孝懿仁皇后次奉孝恭仁皇后庶於古禮符合而朕心亦安欽此是年九月初一日聖祖仁皇帝孝恭仁皇后山陵事竣是日行題主禮畢世宗憲皇帝恭奉聖祖仁皇帝神主親王一人恭奉孝恭仁皇后神主安奉黃輿按程恭設黃幄行朝夕奠初四日行升祔禮前期三日遣官祗告天地太廟社稷至日在京文武大小官員咸朝服跪迎於大清門外世宗憲皇帝御祭服率王公內大臣侍衛等朝服跪迎於端門外聖祖仁皇帝神主黃輿將至太廟街門恭奉三后神主親王三人詣恭奉神主處於孝誠仁皇后孝昭仁皇后孝懿仁皇后神主案前各行一跪三叩禮恭奉神主各奉安於黃輿俟聖祖仁皇帝孝恭仁皇后神主黃輿入街門中門三后黃輿依次隨行至廟南門外黃輿止世宗憲皇帝恭奉聖祖仁皇帝神主親王四人恭奉孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后神主升祔太廟世宗憲皇帝恭代行祗見列聖列后禮乃以次奉安神主於東旁太宗文皇帝之次行大饗禮如儀乾隆二年三月初五日皇帝恭奉世宗憲皇帝神主以親王恭奉孝敬憲皇后神主升祔太廟皇帝恭代行祗見列聖列后禮乃奉安神主於西旁世祖章皇帝之次先期遣官祗告天地宗廟社稷祭日行禮如時饗儀一恭加上列聖列后尊諡崇德元年恭上覆育列國英明皇帝尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝廟號太祖並恭上孝慈昭憲純德貞順成天育聖武皇后尊諡太宗文皇帝親詣行禮次日諸貝勒率大臣文武各官上表行慶賀禮順治元年恭上寬溫仁聖皇帝尊諡曰應天興國𢎞德彰武寬溫仁聖睿孝文皇帝廟號太宗五年追尊肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后奉安太廟後殿世祖章皇帝親詣行禮如時饗儀越三日行慶賀禮頒詔天下康熙元年恭加上太祖尊諡睿武𢎞文定業六字恭改廟號武皇帝曰高皇帝上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業高皇帝恭上孝慈昭憲純德貞順成天育聖武皇后尊諡曰孝慈昭憲敬順慶顯承天輔聖高皇后恭加太宗尊諡隆道顯功四字上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝六十一年十二月諭朕仰荷祖宗眷佑纘承大統恭上皇考聖祖仁皇帝尊諡敬念太祖高皇帝太宗文皇帝世祖章皇帝三聖相承功高德盛載考典章加上尊諡因念孝莊文皇后翼運啓期育成兩帝朕在沖齡備膺慈愛孝康章皇后誕育先皇懿徽流慶孝惠章皇后德隆福厚篤愛朕躬朕意宜並加尊諡但追尊固屬至情而推崇必遵定禮爾部可稽考載籍酌古準今㑹同確議具奏俾朕得稍展思慕之誠欽此遵㫖議準恭加太祖尊諡端毅二字上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業高皇帝恭加太宗尊諡敬敏二字上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝恭加世祖尊諡定統建極四字上尊諡曰世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝恭加孝慈高皇后尊諡仁徽二字上尊諡曰孝慈昭憲敬順仁徽慶顯承天輔聖高皇后恭加孝端文皇后尊諡哲順二字上尊諡曰孝端正敬仁懿哲順莊敏輔天協聖文皇后恭加孝莊文皇后尊諡至德二字上尊諡曰孝莊仁宣誠憲恭懿至德翼天啓聖文皇后恭加孝惠章皇后尊諡慈淑二字上尊諡曰孝惠仁憲端懿慈淑純德順天翼聖章皇后恭加孝康章皇后尊諡溫穆二字上尊諡曰孝康慈和莊懿恭惠溫穆崇天育聖章皇后雍正元年奏準恭加列祖列后尊諡應行令工部將見奉神牌於廟中潔淨處所髤漆飾金令中書翰林官各一人備書新加上尊諡掃靑時奏遣滿漢大學士各一人具朝服上香行禮先期五日遣官祗告天地社稷至日太常寺奏請皇帝禮服詣太廟行恭加上尊諡禮禮成聖駕還宮易衮服詣奉先殿行禮如儀十三年九月十三日諭尊祖孝親誼應並重報本追遠禮有加隆兹者恭上皇考大行皇帝尊諡緬惟燕翼之謀宜備追崇之典太祖高皇帝太宗文皇帝肇造洪基創垂大業世祖章皇帝統一方夏撫育萬邦駿烈鴻猷敷揚莫罄皇祖聖祖仁皇帝深仁厚澤淪浹寰區久道化成功齊覆載朕自沖齡仰䝉慈愛宮庭撫育厚眷獨鍾仰思至德之難名恆念洪恩之莫報夫宗廟之徽稱有制而報本之忱悃無窮應詳稽典禮酌古準今恭議加上太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝尊諡以展孝思此朕追慕至情崇先特典後世子孫不得奉為成式又敬念列祖尊諡既已加崇列后尊諡並應恭議加上爾部詳酌典禮一并定議具奏欽此遵㫖議準恭加太祖尊諡欽安二字上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝恭加太宗尊諡昭定二字上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝恭加世祖尊諡顯武二字上尊諡曰世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝恭加聖祖尊諡中和二字上尊諡曰聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝又恭加孝慈高皇后尊諡懿德二字上尊諡曰孝慈昭憲敬順仁徽懿德慶顯承天輔聖高皇后恭加孝端文皇后尊諡慈僖二字上尊諡曰孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后恭加孝莊文皇后尊諡純徽二字上尊諡曰孝莊仁宣誠憲恭懿至德純徽翼天啓聖文皇后恭加孝惠章皇后尊諡恭安二字上尊諡曰孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后恭加孝康章皇后尊諡端靖二字上尊諡曰孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后恭加孝誠仁皇后尊諡淑懿二字上尊諡曰孝誠恭肅正惠安和淑懿儷天襄聖仁皇后恭加孝昭仁皇后尊諡安裕二字上尊諡曰孝昭靜淑明惠正和安裕欽天順聖仁皇后恭加孝懿仁皇后尊諡和恪二字上尊諡曰孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后恭加孝恭仁皇后尊諡慈純二字上尊諡曰孝恭宣惠溫肅定裕慈純贊天承聖仁皇后其恭加尊諡應行典禮均與雍正元年同一恭進玉册玉寶順治二年太祖武皇帝孝慈武皇后太宗文皇帝玉册玉寶告成恭進太廟奉安遣官恭代行禮九年恭進四祖考皇帝四祖妣皇后孝端文皇后玉册玊寶世祖章皇帝親詣行禮十八年世祖章皇帝玊册玉寶告成恭進太廟奉安遣官恭代行禮康熙十三年孝康章皇后玉册玉寶告成恭進太廟奉安禮部工部奉設行禮康熙三十三年恭進孝莊文皇后玉册玉寶告成恭進太廟奉安遣官恭代行禮五十九年恭進孝惠章皇后玉册玉寶告成恭進太廟奉安遣官恭代行禮雍正六年具奏太廟玉册玉寶告成擇吉遣官祗設奉㫖册寶告成恭進太廟奉安事關大典朕當親詣行禮應行禮儀著詳悉定議具奏其恭奉玊册玉寶著開列王公大學士各堂官八旗都統請㫖是年恭進太祖高皇帝孝慈高皇后太宗文皇帝孝端文皇后孝莊文皇后世祖章皇帝孝惠章皇后孝康章皇后重造玉册改鐫玉寶聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后新製玊册玉寶於太廟奏遣恭奉册寶之王公大臣等二十六人世宗憲皇帝親詣行禮乾隆四年恭進太祖高皇帝孝慈高皇后太宗文皇帝孝端文皇后孝莊文皇后世祖章皇帝孝惠章皇后孝康章皇后聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后重造玉册改鐫玉寶世宗憲皇帝孝敬憲皇后新製玉册玉寶於太廟是日工部豫於太廟街門內奉祠署恭造册寶處所設采棚陳玉册玉寶於案禮部堂官奏請皇帝御禮服詣采棚案前恭閲册寶上香行禮王公大臣等恭奉册寶奉安於太廟中殿皇帝行禮如儀一功臣配饗太廟崇德元年以武功郡王武功郡王福晉配饗太廟設位東廡直義公費英東宏毅公額宜都配饗西廡順治元年以武勳王揚古利配饗太廟設位西廡九年以忠義公圗爾格昭勳公圗賴配饗太廟設位西廡十一年以多羅通達郡王多羅慧哲郡王慧哲郡王福晉多羅宣獻郡王宣獻郡王福晉配饗太廟設位東廡雍正二年議準忠達公圗海配饗前期遣官一人祗告太廟由部㑹同太常寺豫將龕座几案依次安設至期遣大臣詣造功臣神主處上香行一跪三叩禮奉主出設采亭內前列引仗二迎主至長安右門外引仗采亭止奉主大臣奉主鴻臚寺官二人前引由北門進入天安門左門太廟街門北門太廟南門西門㦸門右門太常寺贊禮郎二人接引至太廟階下甬道右百官拜位處嚮上立奉主大臣跪安功臣神主於拜位興退代行三跪九叩禮不贊禮畢奉主興太常官引至西廡設於位次龕內退行一跪三叩禮出至時饗時同饗神主龕位几案由工部製造祭告大臣由太常寺奏遣奉主大臣由部奏遣祭文由翰林院撰擬采亭引仗由鑾儀衛豫備八年議準怡賢親王配饗太廟先期祗告太廟至期奉王主郡王至造神主處上香行一跪三叩禮奉主設采亭內前列吾仗二由長安右門之北門入至天安門外吾仗采亭止奉王主郡王奉主由各門進升東階至甬道左安王主於階上王拜處興退代行三跪九叩禮奉主仍由東階降設位東廡畢行一跪三叩禮退俟時饗時同饗餘均照二年功臣配饗儀乾隆十年議準勤襄伯鄂爾泰配饗太廟設位西廡儀與雍正二年同十五年議準超勇親王䇿凌配饗太廟設位西廡儀與乾隆十年同二十年大學士張廷王配饗太廟設位西廡儀與十五年同欽定大清㑹典則例卷七十九
