  text: 欽定四庫全書欽定大清㑹典則例卷一百五十七
  hash: sha256:ce9950dfb81568e143703ca6e5c8146770e3a2b02bc96f75824da9e06fc0a97c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_161-1a, image: WYG0625/WYG0625-0121a.png}
body:
  text: 國子監一成均之教順治年間定彝倫堂乃視學御講之所本監堂上官不得中堂而坐及中門出入王以下文武各官亦不得由中門出入又定恩貢生選拔貢生副榜貢生貢監生功貢生準貢生皆準入監肄業又定生員俊秀援例入監事例不一由各該部題準遵行或入監肄業或在籍準作監生免其入監又定滿漢官員子弟或奉㫖入監讀書或遇恩詔分别內外文武品級各準送一子入監讀書又定諸生入監日本堂嚴察年貌籍貫經書務取連名保結以防冒名頂替之弊又定本監堂官每升堂就位助教以下以次赴堂序揖次助教以下分東西相嚮揖次各堂學生排列恭揖又定滿洲䝉古漢軍漢人各肄業生入監日謁先師畢赴彝倫堂露臺上序立謁見祭酒司業行四拜禮隨詣各堂師相見行二拜禮又定滿漢肄業生於朔望日隨行釋奠禮外有講書覆講上書覆背諸課程每月三次周而復始祭酒司業及六堂學官講四書性理通鑑博士講五經又定肄業各生祭酒三月季考一次司業每月月課一次務期齊集不許託故規避又定滿洲䝉古漢軍例監生入監限二十四月漢人恤廕難廕考滿各廕生限六閲月恩廕生官生二十四月恩貢生恩拔貢生六閲月嵗貢生八閲月副榜貢生內廩膳六閲月增附八閲月選拔貢生內廩膳十有四月增附十有六月準貢生三閲月例監生內廩膳十有四月增附十有六月俊秀二十四月三年議準監生肄業資斧不繼回籍取費或各官子弟送親隨任及寒暑疾病量準給假日期作曠候補九年定恭遇車駕詣學陪祀五氏生員準入監讀書十一年定覺羅廕生照各官例入監讀書期滿仍開送宗人府十七年議準監生未經準假遽自私歸者照例黜革康熙三十一年覆準國子監季考月課雖有成例恐日久廢弛嗣後考試務親身督課分别奬勵每月朔望令滿漢肄業生齊集講書如視為具文不實心奉行從重議處三十三年定恭遇東巡躬詣闕里選五氏生員入監讀書五十二年定宗室官一品二品照滿漢大臣例其未入八分公照民公例均恩廕一子入監讀書雍正八年議準各省恩拔副歲貢生入監肄業者每旬以二五八三六九為期分為兩班課其學業别其勤惰務必按期赴監不許一名託故不到凡於講課之期每年賞銀六千兩以為飯食之費所餘銀以備諸生遇有事故實力不足者量加賙助九年奏準將毗連國子監街南官房一所賞給本監令助教及肄業人等居住又奏準國子監六堂助教有分司教導之責向來係外省學官升轉令祭酒司業秉公甄别年老衰憊者以原品休致學問平常者以應得之官改補所遺員闕令九卿於進士舉人內各舉所知送吏部引見補用十二年議準漢監丞典簿員闕於守部進士並學習期滿舉人內情願簡選者於吏部投具履厯引見恭候欽㸃補授乾隆元年奏準八旗拔貢生肄業期滿咨呈吏部以筆帖式分班銓選遇官學助教員闕準與各部院咨送人員一同考選再漢軍拔貢生仍準簡選川廣雲貴四省州縣佐二官二年覆準在外肄業諸生令祭酒司業嚴立課程時其考校俾恪守成規與在內肄業生一同講習又議準肄業貢監設立經義治事二條明經者或一經或兼經務取御纂折中傳說諸書探其原本於人倫日用之理切實講明治事者如屢代典禮賦役律令邊防水利天官河渠算法之類或專治一事或兼治數事務窮其源流考其利弊司成考課之時必以湛深經術通逹時宜驗稽古愛民之識三年期滿即其所學定其等第以示勸懲又覆準學中設簿每日更令助教等官一人稽察出入諸生如有事故告假者悉令將事由登記於簿月終移送監丞呈堂察核有肄行出入及出入過多者勒令出學本堂師容隱者察出記大過一次又覆準肄業生有剽獵浮華不務實行者堂師即行紏舉勒令出學徇隱者記過一次又議準祭酒季考司業月課出四子書題一道五經講義各一道治事䇿問各一條至六堂助教等官每月按堂考課亦照此例又奏準嗣後六堂肄業生以三百人為額每堂五十人在內肄業者三十人歲支膏火銀二十四兩在外肄業者二十人嵗支銀六兩凡到監之貢監生詳加考驗擇文優品端者充補又奏準肄業生三年期滿由監照例咨呈吏部照例歸班銓用教職其有志期深造仍願留監究心經義治事者監臣驗其學問人品可觀者準其留監如其中果有學術優深人品卓越者監臣詳加考試照各省書院例秉公薦舉引見候㫖簡用三年諭武英殿録書需人著國子監於肄業正途貢生內擇其年力少壯字畫端楷情願效力者選十人送殿以備謄録其在監每月膏火之費照舊給與遇闕照例補送俟數年後行走若好該管王大臣秉公具奏酌量議叙欽此又奏準裁去在外肄業止留內肄業一百八十人詳慎考取嚴加課督每嵗加膏火銀六兩五年覆準每於嵗終將肄業各生人數奏明除選用佐二等官及考補教習其餘諸生有三年期滿者咨部銓用其未滿三年而肄業已在一年以上者監臣復加簡選果繫材可造就準其留監餘即咨回本籍歸原班挨次補用其願留京應試者聽又覆準助教學政學録各官或分課或輪班必須在學講誨其實力奉行者分别記功京察列為優等怠惰不職者重則即行題參輕則分别記過京察列為下等六年奏準於內肄業一百八十人內撥出二十四人作外肄業計其膏火可給一百二十人監臣仍詳加考驗分肄六堂倘月課季考有曠怠不到者即行扣除又奏準將欽定四書文頒賞六堂每堂五部十一年奏準向來貢監生到監先行考到列一二等者再行考驗貢生列一二等監生列一等者方準入監肄業令各省拔貢生仍與各項貢生一例考到考驗又奏準嗣後直省援例貢監生造冊報部即將本生年貌籍貫三代履厯造冊送監在部報捐者部給小票後亦將本生年貌籍貫三代履厯造冊送監本監别設號簿列名銓記各給印票一紙在外者發與督撫轉給本生在部報捐者本生親身赴領倘有斥革病故一靣報部一面將印票送銷每票本生輸銀二錢以充辦事者紙筆飯食之費十三年奏準見在司業滿洲二人䝉古一人漢一人將滿司業裁去一人以符體制十七年奏準漢助教員闕本監於學正學録內擬定正陪二人引見升補其學正學録員闕移咨吏部將記名人員補用十九年奏準學正學録員闕於進士舉人內考取引見補用一官學之教順治二年定酌取京省生員教習八旗子弟每年月給米二斛以資贍飬二年內果教習有成由監咨吏部考用十二年覆準停取八旗教習生員禮部㑹同國子監於監生內嚴加考試選補教習有成優加録用十六年題準教習既改用監生今後考選教習令本監自行取用十七年覆準考選教習止用恩拔副嵗貢生其準貢例貢不準考取康熙元年定八旗官學生每月赴監講書一次翻譯一次五日射箭一次又定八旗滿洲䝉古漢軍隨印外郎闕由本旗咨報吏部行文到監於本旗年久官學生內遴選一人咨送吏部考試翻譯補用三年議準八旗教習將在監恩拔副嵗貢生齊集鬮補四年奏準停止恩拔副歲教習於官廕準例監生內未經考職者考試補用六年議準教習闕人先盡恩拔副歲官廕等生如無此項仍將準例監生考取又議準舉人願就教習者與恩拔副歲官廕準例監生一例嚴加考試凡遇闕人於五日內傳集應考諸生彌封試卷封門出題即日取定不許將文理荒踈者充數十二年議準八旗教習先因停止恩拔副歲故將官廕準例充補今既經議覆應仍照舊例令其考充教習其舉人官廕準例監生應停考用又定恩拔副歲貢生考充教習者連坐監期積三十六月報滿雍正元年奏準於八旗䝉古護軍領催驍騎內有通曉經籍明白翻譯熟練國語䝉古語者選取䝉古教習十有六人分旗在學與助教一同教習䝉古官學生二年覆準令祭酒司業傳助教教習等每月親臨官學不時巡察奬勤警惰每月傳至監考試一次四年奉㫖滿助教一官有教訓士子之責若只考字則雖年少不學但工繕寫者皆可入選可傳諭各部院衙門將滿洲筆帖式內為人老成有行止者保舉引見其應考翻譯者仍照例考試五年奏準翻譯舉人準其與八旗文舉人副榜貢生一例考試取補助教又議準每旗額設官學生滿洲六十人䝉古漢軍各二十人滿洲額內以三十人在滿洲書房習清字三十人在漢軍書房習漢字凡有學生闕數該旗不必拘定佐領通擇聰明俊秀子弟申送本旗都統驗看交國子監當堂考録年幼者令學清文稍長者令學漢文又議準向來每旗官學共十三四間不等實屬狹隘應將見在官房交還每旗别給官房一所二十餘間量可容百人誦習者著該旗修理俾諸生聚處其中又議準就八旗教飬兵額數內撥出滿洲三十名䝉古漢軍各十名將所有錢糧分給官學生計滿洲䝉古學生每月銀一兩五錢漢軍學生月銀一兩由本旗關領又覆準官學生習漢字者每旗設教習五人輪流更代功課難以稽察令該教習每人分定學生若干人日處學中専心訓導每人月廪銀二兩米二斛在户部支領每年人給夏秋衣一襲二年人給冬衣一襲在工部支領又覆準漢教習入館後本監堂官不時稽察懶惰者即行斥退其勤謹無過者三年期滿照例咨吏部以知縣序選如有善於誘誨者再留三年俟六年期滿咨部以知縣即用十年奏準八旗漢軍記名舊家大臣子孫內無力延師者左翼二十一人右翼十有一人每人月給銀二兩令其就各本旗官學該助教與教習等課讀清漢書再於兩翼滿洲內選教射教習各一人閒日赴學教國語並馬步射每人月給銀三兩乾隆元年議準八旗世爵年二十以下者分撥各旗官學一同教習三年期滿該旗大臣逐加考試分别等第引見録用每學各增漢教習一人各撥教射教習一人其應給月費等項照例支領二年奏準賞給八旗官學欽定四書文學各五部三年奏準八旗子弟選取入學三年之內令其専誦經書朝夕講課三年後監臣考驗擇其材質聰穎有志力學者歸漢文班分隸教習令其専心講誦其年齒已長願學翻譯者歸滿文班分隸助教令專心翻譯又奏準學生歸漢文班者不必專讀四書亦使講求經史為有用之學每三年一次監臣録其可以應考者奏請欽㸃大臣來監考驗取其明通者授為監生由官學而升太學使與拔貢人等明經治事期滿擇尤異者一同保舉考選録用又奏準八旗世爵在官學學習三年期滿引見録用其雖滿三年而年未及二十嵗者仍留學讀書俟滿二十歲然後請㫖考試四年奏準各部寺八旗庫使員闕由監將本旗官學生嚴加考試翻譯取中四人并卷咨送吏部再行考擇充補六年奏準官學生歸漢文班者邇年以來頗知奮勉但諸生年幼度其資力止能於四書外專治一經史冊浩繁乍難責其研究見在加意教導至明年八九月閒擇其可以應考者繕摺奏聞請欽㸃大臣試以經文一篇論一道其中文理明順者酌量拔作監生今該旗注冊咨送本監與漢貢監生一同肄業講求明經治事之學期滿果有尤異者準豫保舉八年奏準官學漢教習每人給印冊二本該教習將三年內所教學生若干名並學業功課詳細填注俟期滿時一冊交新教習收存照例填注一冊呈送監臣察核慎重分别如有實心訓課著有成效者列一等其訓課勤謹稍獲成效者列二等出具考語繕單引見一等者可否用為知縣並二等者或用知縣或用教職恭候欽定仍歸原班銓選其列一等者仍照原議令在學再行教習三年果實心實力始終如一再將教習成效叙入摺內再填考語引見準以知縣即用十年奏準嗣後䝉古教習酌以五年期滿監臣詳加考核實不能教導者斥令歸旗當差如有為人明白實心訓課者分别等第填注考語引見恭候簡用記名注冊以應升之護軍校驍騎校補用仍留在學行走由監行文該旗遇有員闕與在旗應升人員分班間補十一年奏凖滿洲助教員闕除舉人及恩拔副嵗貢生仍照舊考試外其見任筆帖式等止準舉人及恩拔副歲貢生生員出身之筆帖式坐補至考試時於請翻譯題一道之外再請漢文論題一道欽㸃大臣嚴加考試如果清漢兼優方準録取引見充補教習十五年奏準考試滿助教準多取數人咨呈吏部一同引見俟記名後遇有員闕挨次補用十六年奏準向來官學漢教習員闕例由監臣將肄業之恩校副優歲各貢生考取充補嗣後先期請命大臣一二人至監㑹同監臣公同考取將試卷彌封詳閲又議準嗣後各部寺八旗庫使員闕吏部行文到監將本旗官學生考試翻譯每闕一人咨送三人與覺羅官學生一并由吏部考擇充補十七年奏準八旗世爵既經於兩翼設立官學教導將見在官學肄業之世爵子弟咨回各旗外所有八旗官學各增設之漢教習一人相應裁汰教射教習亦咨回本旗行走又奏準教射教習既經咨回則每學教射未有専員䝉古教習每學見設二人但䝉古學生止二十人內有他處行走例不開闕實在不過十數人無庸二人教習嗣後止以一人教習字話以一人教習騎射行文該旗遴選語音嫻熟弓馬可觀者充補一算學之教雍正十二年奏準康熙五十二年設算學館於暢春園之䝉養齊簡大臣官員精於數學者司其事特命皇子親王董之選八旗世家子弟學習算法又簡滿漢大臣翰林官纂修數理精蘊及律吕諸書至雍正元年告成御製序文鐫版頒行自明季司天失職過差罕稽至此而推步測驗罔不協應際此理數大備之時正當淵源傳授垂諸億萬斯年應於八旗官學增設算學教習十有六人教授官學生算法每旗官學擇資質明敏者三十餘人定以未時起申時止學習算法乾隆三年奏準設立官學教飬八旗子弟專以讀書翻譯為業以備將來録用至算法一藝理數精微非童稚所能驟通況以一時之暫教授三十餘人勢難遍及按算法乃欽天監專司其如何教習録取之處應令酌量辦理其官學生習算法槩行停止又奏準算學設漢教習二人即於奏停八旗官學內教習算學之人充補月廩等項照八旗官學漢教習例五年期滿果能盡心訓課著有成效者該管大員奏交吏部議叙舉人筆帖式充補者文與欽天監以靈臺郎補用貢監生員充補者以挈壺正補用官學生算學生充補者以博士補用將來教習員闕於奏停教習拔補完日令該管大員㑹同欽天監於學內教習有成之人考選充補又奏準就欽天監附近專立算學一所額設學生滿洲漢人各十有二人䝉古漢軍各六人滿洲䝉古漢軍即於八旗官學內擇其從前曽學算法資性相近願學者不拘旗分選取漢人無論舉貢生童或世業子弟取同鄉京官印結具呈國子監㑹同管理算學大臣考試秉公録取又奏準算法中線面體三部各限一年通曉七政共限二年每季小試歲終大試由算學㑹同欽天監老試勤敏者奬勵怠惰者黜退别補又奏準算學生每月膏火照官學生例在本旗咨領至漢算學生旅食京師非漢軍在京有家産可比較漢軍官學生加銀五錢由監於户部領給又議準欽天監天文生向於本旗考取生監補用令應將五年期滿算學生學有成效者由該管大員㑹同欽天監秉公考取擬定名次咨吏部注冊俟各本旗天文生員闕挨補至考取生監停其補用再天文生每旗滿洲二人漢軍一人並無䝉古今算學生既有䝉古六人為數無多應與滿州算學生一同考送吏部按定名次歸各該旗補用漢算學生五年期滿一同考取舉人引見以博士用貢監生童以天文生補用四年奏準算學隸國子監管轄應稱國子監算學所有考校一應文移案卷即用監印鈐蓋又奏準算學教習之飯食衣服由監行文支給六年議準滿洲䝉古漢軍算學生向例與官學生一同考試監生惟有童生考取漢算學生者不得與考嗣後漢算學生有通習經史者照官學生例俟考取監生時咨送國子監一例考驗果文理明通授為監生應鄉闈試十年奏準欽天監肄業生二十四人撥歸算學肄業無庸别給膏火倘教習不敷即選學業有成之算學生協同分教已補者即食本俸未補者仍領學生膏火一應教習應試考取天文生均照算學生例十二年奏準算學額設教習三人協同分教三人嗣後教習未滿五年分教未經實授遇有升任如實心訓課勤慎稱職之人均仍留教習令滿五年奏明交部議叙一四夷之學康熙二十三年議準琉球國願令陪臣子弟四人赴京授業準其入監讀書二十七年諭琉球國送到陪臣子弟三人入監讀書著安置得所欽此遵㫖議準每人冬給段面羊皮袍褂紡絲𥜗袴染貂帽鹿皮鞾氊襪春秋給段棉袍褂紡絲衣袴涼帽馬皮鞾段襪夏給紗袍褂羅衣袴紡絲被褥所用紙筆墨等項月給銀一兩五錢從人三人每人冬給布羊裘𥜗袴貉皮帽牛皮鞾布襪春秋給布棉𫀆褂夏給單布袍衣袴布被褥雨涼帽並所用器皿煤炭均交工部給發其官生每人口糧食物照進貢都通事之例從人亦照進貢從人之例交禮部給發由監於附近房屋撥給十餘間為住居之所又議準琉球國陪臣子弟入監讀書取貢生一人令其教習博士一人専管董率祭酒司業等不時稽察俾講解經書學習道藝雍正二年議準琉球國陪臣子弟入監讀書照康熙二十七年例遴選文行兼優貢生盡心訓迪委博士一人董率本監堂官不時稽察其教習生廩糧咨部考職等項照官學教習之例其子弟住房食用四時衣服亦統令稽察務令得所乾隆六年奏準鄂羅斯遣子弟入學習讀清漢書本監於滿漢助教內簡選文理明白者滿漢各二人引見候㫖簡用滿漢各一人令其兼管教習學生衣服飲食等項由理藩院給發九年奏準鄂羅斯學漢助教準為額外助教咨部别行銓補十五年奏準鄂羅斯學滿助教既非専設之員其漢助教亦不必於額外専設應行裁汰以昭畫一嗣後照滿助教例以六堂內助教兼管鄂羅斯學務一録送鄉試康熙三十九年覆準祭酒司業力行考課之法考課不闕者準其應試若臨期始到不準入場六十一年題準應試貢監於鄉試前一年起文到部自鄉試本年正月為始月課季考無闕仍取連名互結及本堂助教等官結狀方準移送入埸如有頂冒等弊事發一并治罪雍正六年覆準外省貢監赴京闈鄉試者令本籍地方官取本生地鄰甘結加具印結付本生親齎限鄉試年二月到監其閩粵滇黔四川湖南準展限兩月到監由監移送順天府察明收老七年奏準見在肄業之人在六年未經定例以前到監者準仍照舊例取具同鄉京官印結並取五生連名互結由監察明移送順天鄉試如有假冒頂替等弊一經察出將出結互結之人一例治罪十三年諭據奏直省貢監生録科無論有無本籍地方官文書皆令取同鄉京官主事以上印結等語朕思各省地方大小不同京官有無多寡不一若槩令取具同鄉京官印結其中逺省貢監無熟識之京官勢必啓抑勒鑽營之弊詳細妥議具奏欽此遵㫖議準嗣後遇鄉試之年除從前已有本籍地方官文結見在肄業之貢監生由監臣核明録送外其餘貢監生無論逺近各省均取本地方官文結親身到監投驗仍恐尚有賄藉頂冒等弊於録科時取同考五人互結方準收考又覆準從前已有本地方官文結到監肄業因期滿及告假回籍於鄉試年到監名為復班此復班之貢監生有為期未久本監見可稽察者準其送考倘稽察不實有頂冒情弊事覺將監臣交部議處又議準今年鄉試届期有本年在京新捐貢監生若令取具本地方官文結往返需時勢不能赴埸期暫聽其取同鄉京官印結及五生互結準其録取後不為例乾隆元年奏準嗣後遇鄉試年在京新捐貢監生實屬本籍窵逺難取本地方文結者準取同鄉六品以上京官印結及同考五生互結録科送考又奏準在京貢監從前曽有本籍文結到監肄業應過鄉試有案可稽者遇鄉試年許令取同鄉六品以上京官印結同考五人互結録科送試一進士題名雍正二年諭國子監進士題名碑始於唐時新進士榜後於慈恩寺塔下題名立碑自宋明以至我朝皆建碑國學按甲第先後刻姓名籍貫於上凡以重科名也今太學㦸門外所立本朝厯科題名碑自順治丙戍科起至康熙戊戍科止考㑹典諸進士釋菜後禮部題請工部發銀百兩交國子監立石題名康熙三年輔政大臣裁省此典每科皆進士捐資立石我國家振興文教凡鄉㑹試動用帑金數萬朕即位之始即開恩科誠以科目一途實取士用人所繫題名之典豈宜遺闕著工部動用正項令國子監將雍正癸卯甲辰兩科題名碑即行建立康熙辛丑科亦行補建嗣後每科仍照舊例題請庶士子觀覽此碑知讀書之可以榮名益勵其自修上進之志欽此欽定大清㑹典則例卷一百五十七
