body:
  text: 内務府都虞司一内府三旗之制順治初年定内府三旗每旗設滿洲佐領三人旗鼓佐領四人正黄旗設朝鮮佐領一人凡滿洲朝鮮佐領及内管領下之滿洲䝉古等每二丁設驍騎一名旗鼔佐領下不論丁每佐領設驍騎五十名每佐領内管領下各設領催六名又定滿洲佐領下各設䕶軍十有五名旗鼔佐領下各十名二内管領下合設十有五名均隸領侍衛内大臣管轄又奏準三旗支領俸餉悉照八旗之例行十八年奏準滿洲佐領下各增設䕶軍五名䕶軍校二人旗鼔佐領及内管領下各增設䕶軍十名䕶軍校二人康熙十三年奏準内府䕶軍改隸内務府總管管轄十六年奏準每旗各編為五叅領每叅領設䕶軍叅領驍騎叅領各一人又議準驍騎叅領於司官内簡選引見補授令其兼理旗務每佐領各設驍騎校一人二十年奏準每旗於䕶軍校内委署叅領五人於䕶軍内委署䕶軍校五人二十一年奏準滿洲九佐領朝鮮一佐領每佐領下各給小旗三杆旗鼔十二佐領二十内管領每佐領内管領下各給小旗二杆䝉古䕶軍小旗二杆共小旗九十六杆每一小旗設䕶軍校一人䕶軍十名又議準滿洲朝鮮佐領及内管領下除革職官員復充驍騎外其餘三丁設驍騎二名滿洲佐領下戸下人每佐領準充驍騎十有二名内管領十名其滿洲佐領下孤兒寡婦無正丁可充驍騎者準其將戸下人入於滿洲數内充補旗鼓佐領每佐領下設驍騎八十名二十三年議準裁䕶軍校三十六人䕶軍三百六十名三十四年奉㫖内府䕶軍仍著領侍衛内大臣管轄又奏準三旗增設滿洲六佐領旗鼔六佐領正黄旗增設朝鮮一佐領每佐領下照例設驍騎校一人三十六年奏準每旗設侍衛委署䕶軍叅領三人四十年奏準滿洲仍以三丁設驍騎二名其戸下人之充驍騎者每佐領下額定五十名内管領下十有五名四十二年奉㫖裁各佐領内管領下領催二名驍騎一名四十三年奏準每叅領各增設副叅領一人於司官内簡選引見補授令其兼理事務雍正元年奉㫖三旗各設䕶軍統領一人定為三品又奏準旗鼓佐領下官不準管理滿洲佐領又奏準内府䕶軍仍隸内務府總管管轄三年奏準三旗䕶軍統領各給纛一杆又奏準每佐領内管領下各額定驍騎五十名餘均令扣銷其戸下人充驍騎以及分給王等家下人驍騎之例均令停止如不敷五十名之額者令内務府總管選補又議準内府旗鼔佐領内管領下選取十八歲以上三十歲以下能射之壯丁三百八十名撥充緑旗兵交步軍統領按闕挨補四年奏準内府三旗驍騎叅領各鑄給關防輪流直月辦理本旗事務佐領各鑄給圖記五年奏準各佐領下設領催委署驍騎校一人七年奉㫖内管領下官不準補授佐領又奏準内務府司官及内庫官均不準兼管叅領叅領員闕於侍衛内府人為侍衛者六品文武官及散秩官員内簡選引見補授定為五品副叅領員闕於八品以上官内簡選引見補授定為六品又奏準凡武職自䕶軍統領叅領以下六品以上照部例於每月終截限次月初十日以内遴選應升人員於二十五日以内引見補授又奏準䕶軍統領各鑄給關防又議準委署䕶軍校改為副䕶軍校準戴藍翎九年奏準三旗增設訓練兵二千名編為二營每營各設頭目二人副頭目四人均於廢官内遴選引見補授所需軍器移咨各該處備用又議準每旗各增設䕶軍二百名編為鳥槍䕶軍各增設䕶軍叅領二人侍衛委署叅領二人䕶軍校委署叅領五人䕶軍校十有五人令其管轄其應補䕶軍叅領於驍騎叅領内簡選引見補授令其兼管應補侍衛委署叅領䕶軍校委署叅領及䕶軍校照例遴選引見補授再䕶軍内每旗各增設副䕶軍校五人其統轄之員開列内務府總管職名請㫖欽定並於内府三旗䕶軍統領内奏簡一人協理至需用鳥槍六百杆奏交造辦處製造火藥等物移咨工部取用其見有鳥槍驍騎六百名亦令照依鳥槍䕶軍學習連環等技計新舊䕶軍共千二百名應按佐領内管領分隸額數滿洲十五佐領朝鮮二佐領下各定為二十五名旗鼓十八佐領内一佐領定為十九名其餘十七佐領各定為十八名三十内管領下各定為十五名以上各䕶軍闕如夲佐領内管領下無可充選之人準於本旗别佐領内管領下遴選充補十年奉㫖正黄旗朝鮮二佐領著為世管佐領嗣後遇員闕該叅領開送適派子孫並家譜由内務府引見補授欽此十三年奏準訓練兵二千名撥囘舊營將滿洲十五佐領朝鮮二佐領三十内管領每佐領内管領下各定為驍騎八十九名旗鼔十八佐領每佐領下各定為驍騎五十九名尚餘驍騎五名視佐領下之人丁較多者增一名見在各佐領内管領下共額定驍騎五千二百五十名其頭目副頭目等均照例以應升之官補授一切軍器交各該處收貯每年春秋二季仍令該叅領等督率操演又奏準停止補授副叅領及委署驍騎校又奏準裁副䕶軍校又奏準將鳥槍䕶軍撥囘舊營當差其三旗所設䕶軍叅領原繫驍騎叅領兼管仍令在本任行走侍衞委署叅領編入舊營前設立鳥槍䕶軍營時只設䕶軍校三十人今將副䕶軍校三十人均授為䕶軍校所遺員闕停其補授一切軍器交各該處收貯每年春秋二季仍令該䕶軍統領督率操演乾隆元年議準䕶軍叅領驍騎叅領各給親隨兵二名副䕶軍叅領一名有半佐領於本佐領下各坐一名均照例支餉其䕶軍統領照八旗䕶軍叅領之例給與親隨兵又奏準三旗武職遇軍政之年準兵部移咨照八旗之例出具考語咨送欽命之王大臣等考察九年議準内府䕶軍統領員闕於奉㫖記名京察準為一等之郎中及卓異記名䕶軍叅領並盛京佐領内簡選補授如由郎中升授者照例兼任佐領員闕於五品以上文武官内奉㫖記名並卓異俸深應補人員簡選補授照例兼任䕶軍叅領員闕以奉㫖記名卓異侍衛委署叅領及員外郎為一班俸深侍衛委署叅領為一班分班間用均序俸開列如由員外郎升授者照例兼任侍衛委署叅領員闕以䕶軍校委署叅領卓異者為一班年久者為一班分班間用論年開列䕶軍校委署叅領員闕以䕶軍校卓異者為一班年久者為一班論年開列䕶軍校員闕於䕶軍内遴選補授論年開列驍騎叅領員闕於六品以上文武官京察準為一等及卓異者為一班俸深散秩官及侍衛為一班分班間用驍騎校員闕於佐領下無品級頭目筆帖式領催執事人内遴選補授論年開列朝鮮佐領員闕照世襲佐領之例奏補朝鮮佐領下驍騎校員闕於朝鮮佐領下無品級頭目及領催内遴選補授論年開列朝鮮六七品通官員闕於通曉朝鮮語言通官内遴選補授論俸開列八品通官員闕於應升人員内遴選通曉朝鮮語言者補授論年開列凡見任侍衛委署叅領食俸二年䕶軍校委署叅領食見職錢糧二年䕶軍校食見職錢糧十年䕶軍食䕶軍錢糧十有五年方準升補其應升驍騎校各項人員均以行走二十年者方準補授凡議敘應升即用人員别為一班與應升人員分班間用凡議敘以應升列名人員與應升人員一例論俸遴選錄用凡引見人員除補授䕶軍統領及佐領内管領不拘額數外餘特題人員盛京佐領均擬定正陪各一人引見未用者下次即擬正遇有事故處分仍照例停其升轉十一年議準凡各該處甄别之筆帖式未入流司庫及委署庫掌庫使庫守並執事人領催等應降補驍騎者由司分别佐領内管領將名籤貯筩遇有驍騎闕不拘滿洲旗鼔掣籤坐補十二年奏準前經定例䕶軍叅領員闕以員外郎升授兼任與一應看守輪班操演之事未免顧此失彼嗣後䕶軍叅領員闕停其兼補員外郎十三年奏準將内府三旗學習解馬花馬箭之䕶軍等别編為一營給纛五杆大小旗一百二十八杆引馬旗十二杆號令旗二號衣一百三十三件解馬鞍轡三十副金一面海螺十有八於三旗䕶軍校内各簡選二人委署叅領再各簡選二人為前鋒校於䕶軍内各簡選二人委署前鋒校仍屬䕶軍統領管轄十四年議準將學習解馬花馬箭之䕶軍等重加甄别擬定一等四十名每名歲底給衣服銀八兩二等五十名每名六兩三等三十名每名五兩十六年奏準簡府屬司官内能事者每旗以五人掌内府驍騎叅領關防辦理事務其原設叅領皆為副叅領應直宿察班監放銀米等差又議準將三旗叅領歸幷一處設立公廨每旗選諳練之驍騎校一人領催五人辦理文移案牘再於每旗各選取驍騎二十名聽候差遣十七年奏準内府三旗䕶軍校委署前鋒叅領給以五品虛銜準戴孔雀翎仍食䕶軍校原餉十八年定嗣後内府驍騎叅領等遇有事故其所掌關防照佐領之例移付該司呈堂别委司官署理一圓明園三旗之制雍正二年議凖圓明園增設内府三旗每旗設䕶軍叅領各一人侍衞委署叅領各一人䕶軍校委署叅領各一人䕶軍校各三人䕶軍各四十名内委署䕶軍校各一人其升遷選補及增裁俸餉均由總統圓明園八旗事務王公大臣辦理由司據咨應存案者存案應咨者轉咨十年奏準增設四品營總一人十三年奏準裁委署䕶軍校一盛京三旗之制順治初年定設佐領三人奏簡一人掌關防司庫三人筆帖式三人催長一人每佐領下設領催六名驍騎二百三十名輪班守衞盛京宮殿及䕶送進京貢物康熙十七年奏準設驍騎校三人又議準佐領員闕竢移文到日遴選在京五品以上文武官驍騎校員闕該佐領遴選本處人員保送到京均由府引見補授領催闕該佐領遴選充補具呈報府雍正七年奏準盛京佐領以下員闕以該處人文到日定限三十日引見補授十年奏準盛京内府官及執事人並莊園子弟内年二十以下十歲以上者選六十人於將軍所屬官學習清漢文藝該處筆帖式執事人闕準其充補兼準應奉天考試乾隆九年議準盛京佐領員闕定例遴選在京人員嗣後應於記名卓異䕶軍叅領驍騎叅領郎中員外郎内管領内遴選驍騎校員闕照該處保送人員擬定正陪均引見補授又議準盛京内府三旗共設驍騎校三人司庫三人領催十有八名驍騎六百九十名守衛宫殿周圍僅有班房六座今宮内增設班房三座大淸門增委官一人因官員不敷看守令頭目在官員數内進班至執事人領催等均在班管轄驍騎進班惟是驍騎額内有頭目九名庫使十名執事人領催五十八名雖在驍騎額内並不得充驍騎之差行走見在官員分内進班應將此等驍騎裁汰作為各項頭目執事人庶次第攸分各知鼔勵計裁驍騎七十名其餘六百十有三名守衞宮殿班房九座每班房以驍騎十名每班需用驍騎九十名作為三班輪直合計共需驍騎二百七十名尚餘三百四十三名令其齎送貢物以及圍獵等差盡足敷用所裁驍騎停其選補奉㫖著再增驍騎十七名作為七班又奏準盛京銀庫除額設司庫三人外只有庫使十名應增六名專令承辦庫務隸司庫管轄十二年奏準大計及軍政之年盛京内府佐領將五年内行走功過録呈内務府考察具題以示勸懲其司庫筆帖式驍騎校等令該佐領分别等第出具考語咨盛京將軍覆覈送府考察又奏準盛京宮殿外兩掖又增設班房三座共班房十有二座見有驍騎六百三十名此内有各項專差所餘驍騎不敷守衞除王多羅樹居住之打獵驍騎三十名看倉驍騎六名三旗委署領催二十四名準其開除外於内府三旗增設驍騎七十八名共驍騎六百四十八名守衞宮殿班房十有二座每班房以驍騎九名每班需用驍騎一百八名作為六班輪直十七年奉㫖盛京内府三旗佐領皆繫同品官並無董率辦事之人未免推諉掣肘貽誤事務盛京地方緊要著設内務府總管一