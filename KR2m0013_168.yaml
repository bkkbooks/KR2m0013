一匹改養駝一隻四十九年武備院奏準八旗司幄二十七名每人願自出貲各置馬一匹應照官馬例給與牧芻之費如内有增減據咨文各該佐領内管領覈明增減雍正四年奏準内府各佐領所養駝三十五隻均令裁退交内府作價交庫其執事人䕶軍等所養官馬八百五十二匹每年分一半出口牧放委叅領一人散秩官或驍騎校二人副䕶軍校三人率䕶軍十二名驍騎七十名前徃監視管束仍各給與路費不論官兵每人十兩自京抵口每馬日給草一束移咨戸部沿塗給𤼵至馬匹毛色及監牧人員花名造具清册鈐用司印齎呈出場副都統七年具奏除圓明園䕶軍等所養官馬外其餘執事人䕶軍等所養官馬七百六十四匹應照例分半出口牧放奉㫖馬匹無多停其出場著往南苑牧放或令牧丁兼看或委官員兵丁看守内務府總管酌量辦理遵㫖議準委驍騎校一人副䕶軍校一人領催二名驍騎十名監視牧放每半月一次更代八年奏準内府三旗所養官馬仍照例出場牧放九年議準將執事人所養官馬二百八十九匹分給八旗抵補前往軍前馬匹之數其出口牧放減除驍騎叅領一人散秩官一人驍騎校二人領催六人驍騎四十六名十一年奏準出口放靑之馬如有遺失者均著落出場副都統官員賠補乾隆三年奏準監視馬匹出場官員兵丁每人日給銀一錢共豫給六箇月盤費各給銀十八兩按起程囘京日期計算扣除十六年議準三旗習練技藝之䕶軍所飬官馬如有殘疾不堪馳驟者令將原馬售賣限三月以所售之價並所領馬乾增湊買補如倒斃之馬亦令變價限五月以所變之價並所領馬乾增湊買補倘遇價昂不敷買補準動餘平銀仍飭䕶軍等將傷殘倒斃之處隨時呈報注册以備考覈一盛京聽差馬國初定聽差馬三羣每羣馬五十匹各設牧長一人牧丁六名歳無倒斃者牧長賞毛青布二十疋牧丁十疋倒斃一匹以上至六匹皆無庸議被人盜去者不論多寡照數著賠若不加調習倒斃七匹以上至九匹牧長牧丁各鞭八十十匹以上各鞭一百其老疾殘廢不堪應差之馬交該佐領賞給貧苦匠役康熙二十年奏準聽差馬羣每羣增馬二十匹二十三年奏準每羣減馬二十匹每年定議賞罰據盛京佐領今由府盛京内務總管文到之日具題其應補馬匹移咨上駟院於養什木馬羣内駑馬撥給牧長牧丁均由該佐領於所屬人丁内選補例賞布疋咨廣儲司支領一齎送公文順治十一年奏準内務府一應移咨盛京黑龍江等處公文鈐司印實封呈堂轉咨兵部齎送慎刑司一處分康熙十一年奏準議處内府官員有與吏兵二部頒定律例相符者即照依吏部兵部律例定議雍正十二年奏準内府官員應議降級調用之案免其調用應降一級調用者加罰俸一年應降二級調用者加罰俸二年雖有紀錄不準抵銷乾隆七年奏準嗣後内府官員遇有降調之案將有加級可抵者照依抵降免其罰俸其無級可抵者仍照雍正十二年原議雖有紀錄不準抵銷一審讞順治十八年定凡首告機密及干涉職官之事皆請㫖鞫問康熙十一年奏準審擬罪案皆依刑部律例定擬又議準凡奉特㫖及奏準交司審理之案有情罪重大應擬死罪者移咨三法司會審由府主稾具題奉㫖後交刑部照原題治罪十六年奏準凡奉㫖交審及各衙門咨送審擬並内府佐領内管領下人互相控告及有職官控告等案内如有執持兵器並罪至杖一百以上及事關旗民者皆送刑部定擬其一切枷示刺字人犯皆交刑部枷示刺字乾隆三年奏準内管領下漢人及旗鼔佐領下人有犯軍流徒罪者皆照八旗漢軍之例折枷一𤼵遣順治十六年奏準凡内府應𤼵遣捕牲烏喇人犯及各部院衙門咨送𤼵遣捕牲烏喇人犯均呈堂移送都虞司𤼵遣應𤼵黒龍江寧古塔等處及雲貴等省煙瘴地方人犯呈堂咨送兵部𤼵遣雍正五年奏準凡撥發莊屯之犯將伊妻及同居之子一幷𤼵往其分居當差之子準其存畱至已經撥𤼵莊屯人等有私自逃囘潛住京城者或被番役拏獲或被旁人首告皆𤼵遣廣西雲南貴州等省煙瘴地方其窩藏之家若旗人鞭八十民責三十板如莊頭呈過逃牌者免其治罪未呈逃牌者鞭一百倘有受賄徇情等弊審明按律重懲乾隆二年奏準撥發莊屯人犯如遇父母切近親屬在京身故等情準其禀明該管莊頭給與執照來京再跟隨莊頭赴京辦差者不以逃論其無故初次逃走者鞭一百二次者鞭一百枷四十日皆仍充原莊壯丁三次者鞭一百枷兩月𤼵充口外壯丁四次者𤼵遣雲貴等省煙瘴地方再撥發莊屯人等其妻子一同𤼵往至本犯身故之後其妻子向無囘旗之例嗣後照𤼵遣捕牲烏喇人犯之例其妻子有不願隨往者聽至本犯身故後其妻子願來京者呈報該管官察明準其來京一支取官物及相驗人役順治十八年奏準凡審理重案有應夾訊者呈堂移咨刑部取用刑具並取用刑人役有應檢驗屍傷者移咨刑部委司官率領仵作穩婆㑹同檢驗填錄屍格康熙十一年定凡擬罪律例及處分則例均於各該部移取一設監雍正五年奏準内府佐領内管領下犯罪人除見審及奉㫖交司枷示鎖禁者照常在司監禁其已經審明定罪及尚在候審並欠帑催追人等將入官房屋修理三所分别男女監禁内府三旗各委官一人領催三名驍騎七名每日輪班看守女犯移付掌關防内管領傳喚年老婦人㸔守一矜䘏雍正三年奉㫖慎刑司監禁人犯並無官飯伊身雖有應得之罪亦照刑部之例賞給官飯遵㫖議準照刑部之例每人日給老米一升移咨戸部領取其運米車及煮飯鍋均移文各該處取用罪犯五十名以内日給煮飯煤三十三斤炭三斤四兩咨工部領取合計一年所用米煤炭數目各造淸册二分一呈堂存案一送戸部覈銷六年奏準煤炭改用木柴每人日給木柴一斤八兩移付營造司每年夏至日起至七月三十日止日用冰二塊移付掌闗防内管領交送又奏準監犯有患病者移咨刑部傳醫官診視一追比贓贖康熙十一年奏準凡老幼廢疾收贖職官納贖銀追交廣儲司庫雍正四年奉㫖嗣後内務府催追拖欠官帑及應完贓私應枷禁鎖禁者著枷禁鎻禁催追俟交完日再行治罪著為例乾隆元年諭嗣後職官舉貢生監等有罪應發給黑龍江寜古塔等處兵丁者不得加以為奴字様欽此一拘禁内監順治十八年奏準内監有罪由上駟院拘禁康熙三十年奉㫖有罪拘禁内監著𤼵往新設甕山馬廐㔍草雍正五年奉㫖𤼵往甕山㔍草人犯皆極惡之徒該管人員不行嚴加管束怠忽從事以致犯罪内監近有脱逃者不可無專管稽察之人嗣後著内務府總管稽察如果有遵法改過自新者即著寛免怙終不悛者更加懲治若廐長廐副等仍然怠忽不嚴行管束者亦加懲治又奏準甕山拘禁内監等亦照慎刑司監犯之例由上駟院日給官飯六年奏準甕山㔍草内監等每年春季各給麤藍布袷襖一件單褲一條冬季各給麤藍布棉襖一件棉褲一條棉襪一雙三年一次冬給老羊皮袍一件均呈堂移咨廣儲司支領乾隆八年奏準將拏獲逃走二次之内監定為鞭一百𤼵往甕山永逺㔍草十年議準内監初次逃走被獲仍照例𤼵往甕山㔍草一年期滿内廷行走者交暢春園當差不許出門掌儀司營造司所屬者交該司當差其二次逃走被獲者改為發甕山帶鎖㔍草三年後均交掌儀司嚴加管束充當苦差其三次逃走被獲者比照刑部督捕則例三次逃走𤼵寧古塔黑龍江之例𤼵往捕牲烏喇充當苦差至甕山地方地厰牆低惟廐長廐副二三人稽察難周不免疎縱之虞將内監等見在居住房屋牆垣交與該處酌量修整務令住宿一處增委内府領催一名驍騎五名嚴加看守此内如繫限年㔍草者該廐長於將滿之前呈報該司仍照舊例奏請釋放如緣罪𤼵往㔍草者不定以年限每年察明數目呈司於歲終聲明情罪奏聞再按向例内監逃走自行投囘者枷三月鞭一百交掌儀司充當苦差嗣後内監初次逃走六月以内自行投囘者鞭八十六月以外者枷一月鞭八十二次逃走三月以内自行投囘者枷一月鞭八十三月以外者枷兩月鞭一百三次逃走一月以内自行投囘者枷兩月鞭一百一月以外者枷三月鞭一百皆令在掌儀司充當苦差三次後復行逃走者雖自行投囘亦照初次逃者被獲𤼵甕山㔍草一年例治罪奉㫖嗣後甕山㔍草年滿内監不必交暢春園當差𤼵往熱河當差令彼處總管内監嚴行管束不許出門如暢春園當差内監數目不敷於熱河舊内監内撥給十三年奏準逃走内監内有更名改姓私投王公宗室宗室女及大臣並口外䝉古王額駙門下潛身者限一年準其投首如果於限内將逃出私投王公門下情節據實首出除將本犯免罪外其收畱之家槩從寛免倘仍照前隱忍不報過限不行首出一經拏獲不論逃走次數除將本犯𤼵遣捕牲烏喇充當苦差外其不行詳察即行收畱之家一幷交該衙門察議嗣後凡王公宗室宗室女及大臣並各䝉古王額駙等收畱内監時務須畱心詢訪的確方準收畱倘情形稍有可疑者即咨送内務府察驗十七年奉㫖三次逃走内監𤼵往黑龍江給兵丁為奴永著為令又奉㫖嗣後拏獲逃走内監著交宮殿監督領侍等辦理十八年奉㫖嗣後初次逃走内監拏獲者交呉甸㔍草一年期滿交進自行投囘者免其㔍草一年交宮殿監督領侍等辦理欽定大淸會典則例卷一百六十四
