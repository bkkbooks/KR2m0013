其取中之數應如何分别令湖南湖北巡撫公議著湖廣總督從公酌定具奏欽此遵旨議凖湖南湖北分闈考試湖北酌中舉人五十三名副榜十名湖南酌中舉人四十九名副榜九名又覆凖廣東人文日盛增解額二名副榜亦照例加增一名又覆凖陜西鄉試奉恩詔廣額二十名將丁聿二號內亦擇其文之優者取中一名又覆凖山東鄉試耳字號分中二名今廣額遞加至二十名名共七十二名其耳字號並未加增嗣後照前二十三名分中一名之數於二十六名內分中一名共取中三名又覆凖閩省人文日盛加增解額四名二年世宗憲皇帝視學將國子監本科鄉試中式加增十八名七年題凖貴州一省原轄十一府四十州縣共計五十一學每科鄉試除加五經二名外額中三十六名以學數計之大約十學之中取中七名今新歸黔轄十有三學內除清溪玉屏繫改衛為縣南籠繫改廳為府原屬黔省管轄地方非他省新歸之府縣可比永豐一州繫廣西長壩等地方割附黔省向未設學毋庸議外其歸黔之川省遵義府及所屬正安遵義綏陽仁懷桐梓五州縣並湖南之開泰錦屛天柱三縣共計九學應按十學取中七名之數於貴州中額外酌量加增六名黔省既經議加則四川湖南自應議減應將四川中額內減去四名湖南中額內減去二名又覆凖臺灣五學應試士子别編臺字號於閩省中額內取中一名又奉旨明年會試取中額數廣至四百名壬子科各省鄉試每正額十名加中一名其十名之外有零數者亦加中一名八年議凖陜西榆林神木府谷吳堡靖邊安塞保安七處應照甘肅寧夏之例别編木字號於每科中額內取中一名十二年議凖宣化府旦字號加中一名與夾字號皆各額中四名十三年奉恩詔會試額數俟禮部臨期請旨廣額外鄉試大省加三十名次省二十名小省十名又議凖閩省臺字號再加中一名乾隆元年議凖順天鄉試皿字號照會試五經分南北中卷之例將奉天直𨽻山東河南山西陜西編北皿字號江南江西福建浙江湖廣廣東編南皿字號照舊額各取中三十九名外其四川廣西雲南貴州四省别編中皿字號十五名取中一名如零數過半者亦凖加中一名如人數不及十五名仍附入南皿無庸别編中皿字號又議凖江南分上下江字號取中下江照中省之二等取中七十二名上江照小省之二等取中四十八名共增額二十一名所有兩省官卷照例於正額內計算取中其副榜亦各照定例計算取中又奏凖奉天宣化定額各中四名今恭遇特恩應令士子均沾請將夾旦二字號各加中一名又議凖陜西鄉試將聿丁字號量增一名每科聿字號取中二名丁字號取中二名共額中四名又覆凖廣東商籍恭遇恩科廣額應令士子均沾請於民籍之外此次别額取中二名嗣後遇鄉試之年該布政使司於場前投卷之後豫計商籍人數移咨內簾如數滿二百卷以及數百卷即照康熙六十一年之例取中二名如數僅及百卷仍遵照原議取中一名均於民籍外别設解額中式後改歸原籍又覆凖四氏子孫於毛詩之外亦令兼習他經其願治他經者即以他經應試仍編耳字號不拘何經主考官擇其文之佳者取中三名三年皇帝視學廣國子監本科鄉試中額十八名又覆凖四川寧遠一府如應鄉試士子至三十名以上者凖其編為寧字號於本省額內取中一名若不及三十名之數仍照常取中無庸别編字號又議凖將來臺郡士子來京會試果至十名以上奏請欽定中額以示鼓勵六年議凖順天鄉試其廣東應試之貢監改編中皿字號憑文取中額數仍照舊例計算七年議凖陜西聿字號入場卷數聿右較聿左僅居三分之一著一科同編聿字號憑文取中一科分編左右字號各中一名九年議凖直省中額除零數不計外於十分中酌減一分順天鄉試滿洲蒙古共額中三十名酌減三名漢軍額中十三名酌減一名南北皿均額中三十九名各酌減三名中皿向例於十五卷中中一名今酌改二十卷取中一名直𨽻貝字號額中一百十有三名內除夾旦字號各額中四名鹵字號額中一名均毋庸議減外貝字號酌減十一名江南省上江額中五十名酌減五名下江額中七十六名酌減七名江西額中百有四名酌減十名浙江額中百有四名酌減十名福建額中九十四名除臺字號取中二名毋庸議減外酌減九名廣東額中七十九名內除商籍一名毋庸議減外酌減七名河南額中七十八名酌減七名山東額中七十六名除四氏學三名毋庸議減外酌減七名陜西額中六十七名除甘肅聿字號取中二名寧夏丁字號取中二名榆林等七處木字號取中一名均毋庸議減外酌減六名山西額中六十六名酌減六名四川額中六十六名酌減六名雲南額中五十九名酌減五名湖北額中五十三名酌減五名湖南額中四十九名酌減四名廣西額中五十名酌減五名貴州額中四十四名酌減四名一官卷康熙三十九年議凖在京滿漢文官京堂以上及翰林科道吏禮二部司官武官參領以上在外文官藩臬以上武官提鎮以上其子孫同胞兄弟及同胞兄弟之子皆編為官卷順天鄉試滿洲蒙古漢軍各於卷面滿合字號之下直𨽻生員直省貢監各於皿貝字號之下各省鄉試諸生皆於卷靣編書官字字號别入號房會試亦於各卷靣上滿洲蒙古漢軍滿合直𨽻各省南北字號之下編書官字字號别入號房各項貢監由監鄉試者國子監收録照例分别官民卷歸本省鄉試者與生員一例分别官民卷取中不必分經滿合字號大臣官員子弟居多如民卷百卷取中五卷則官卷二十卷取中一卷其直省如定額十卷民卷取中九卷官卷取中一卷其副榜亦照此計取其各省鄉試官員子弟數少者不必别編官字號會試四川廣西雲南貴州及鄉試夾字旦字耳字聿字丁字等卷不必編官字號五十一年覆凖陜西甘肅寧夏文武官員子弟不必編入丁聿字號彚入通省文武官員子弟內同編官卷慿文取中又議凖會試官卷停止雍正元年覆凖官卷少之省分但擇其文理清通者取中若文理荒疏者多不能足額則寧闕毋濫以民卷內佳卷補足中額六年覆凖官員子弟應試必繫適子孫及同胞兄弟並同胞兄弟之子方凖編入官字號若已經出繼者不凖編入十三年議凖貴州鄉試其應入官卷者别編官字號照每十卷內民卷取中九卷官卷取中一卷之例取中其副榜亦照例計取如官卷內佳文不敷中額考官慿文酌取其不足之額仍將民卷補足又議凖貢監生員編列官卷原以父兄官職為定如别房子孫為嗣者務令於該生出繼之時呈報本地方官逐一核明的實取具印甘各結申詳學政行令該教官注册存案至鄉試之年詳加察核如不豫行呈明臨場始具呈出繼者一槩不凖至回籍官如有降調革職等情例有部文知照本省嗣後遇鄉試之年令地方官申詳督撫核明本官有無降革緣由詳加分别造送其恩養螟蛉異姓之子不許假藉冒充溷入官卷如有因本房無官卷之例揑造出繼或已經出繼因本房有官卷之例改回本房及本官已經降革而子孫兄弟及兄弟之子猶指稱官卷並以恩養螟蛉溷入官卷者除將本官革職本生黜革照例治罪外其瞻徇情面朦溷出結造送之教官州縣皆照徇情例降二級調用知府直𨽻州知州照朦溷造册例降一級調用布政使照不行察出例降一級留任巡撫學政皆照失於稽察例罰俸一年又覆凖宣化府屬别編旦字號取中尚未分别官民字樣應將宣屬旦字號官卷并入直𨽻貝官字號內取中乾隆元年議凖滿洲官卷於舊額之外酌增三名六年議凖廣西著一例設立官卷照定額計算九年奏凖內閣侍讀亦有經辦科場事件其子弟應試應照吏禮二部司官之例編入官號十七年議凖京官文四品外官文三品武官二品以上及翰林科道各官其子孫同胞兄弟同胞兄弟之子鄉試者得編官字號餘並不得溷冒至官卷中額照舊額減定順天鄉試滿字號中六名合字號一名貝字號四名南皿二名北皿一名各省鄉試江蘇四名安徽二名浙江六名江西五名福建四名山東河南山西各三名湖南湖北陜西四川廣東雲南各二名廣西貴州各一名必應試足十卷者别編官字號不及數者入民卷如佳文甚少不足中額者以民卷補中二十三年遵旨議凖鄉試官卷中額直𨽻江南江西福建浙江湖廣六大省均以入場官生每二十名取中一名山東山西河南陜西四川廣東六中省以十五名取中一名廣西雲南貴州三小省以十名取中一名順天鄉試滿洲蒙古漢軍官卷照小省以十名取中一名南北貢監生官卷照中省以十五名取中一名其各官卷或有不足二十名十五名十名定數者仍遵從前不及十卷不編官號之例無庸别編官卷以杜濫取或大省官生試卷數至三十一名中省至二十三名小省至十六名以上計其零數已逾定數之半應照順天鄉試别編皿號之例零數過半者凖其計算亦各取中一名多不及半者不凖計算再官卷名數總以見在定額為限不得於額外取中如官卷不敷照例以民卷補足一回避順治十五年題凖凡鄉會試考官同考官監臨知貢舉監試提調之子及宗族應試者除實繫同宗照例回避外其餘同姓無干之人及先曾同譜今遵上諭禁革連宗絶往來者應慿文去取不凖仍引宗誼避嫌乾隆元年覆凖同姓無服者不必回避其翁壻甥舅繫有服之姻親應令回避至外場執事各官與內簾之專司文字者不同嗣後外簾官之子弟族人及姻戚等均毋庸回避三年覆凖內簾官子弟及本族之人仍照舊例回避其雖繫同姓並非本族者不得開入回避以致溷淆十七年議凖會試及順天鄉試外簾監試知貢舉及提調官子弟宗族及有服姻戚有應試者照例回避二十一年覆凖順天鄉會試外簾執事官子弟姻族均令回避不凖與試一磨勘順治二年定前場文字以明理會心不愧先程者為合式後場以出經入史條對詳明者為合式各卷解到之日由部會同禮科磨勘如決裂本題不遵傳注引用異教影合時事遮入俚言諧語及小結大結不分明甚至作全不可解之語並後場空踈五策原問十不憶五者酌量所犯重輕核參首嚴弊幸次簡瑕疵此外字句偶疵風簷寸晷不妨寬貸十五年題凖磨勘試卷內有字句可疑者正副主考官一卷罰俸九月二卷一年三卷降一級四卷降二級五卷降三級皆調用六卷革職七卷革職提問如有經書文內文理悖謬不遵小注及論內文理悖謬表判不合題策內所對非所問皆為文體不正一卷罰俸六月二卷九月三卷一年四卷降一級五卷降二級六卷降三級皆調用七卷以上革職如字句疵蒙謬纍及不諳禁例者每卷罰俸三月同考官字句可疑者一卷降三級二卷降四級皆調用三卷革職提問如文體不正者一卷降一級二卷降二級三卷降三級皆調用四卷革職五卷以上革職提問如字句疵蒙謬纍及不諳禁例者每卷罰俸一年舉人磨勘出文體不正及字句可疑者褫革字句疵蒙謬纍等項罰停會試二科其不諳禁例者停會試三科如行文內筆誤二三字不礙禁例者停會試一科錯落題字者停會試二科同考官未經抹出者罰俸一年又定場中墨筆增改罪在主考藍筆增改罪在同考各降三級調用又定場中取中各卷房考藍筆未經點到者降一級調用主考官失察者罰俸一年其副榜雖繫不中之卷亦應藍筆全點如有不全點者罰俸一年主考官各罰俸九月中式硃卷上應先填名次後填姓名墨卷靣雖原有舉子姓名亦應填寫名次如硃卷有止填名次不填姓名者墨卷應有本生姓名在上不填名次者主考各降一級調用十七年議凖試藝雷同勦襲偶然幸中者磨勘得實立行黜革康熙七年題凖四書五經文章策論表判有全篇雷同勦襲者正副主考官一卷罰俸六月二卷九月三卷一年四卷降一級五卷降二級六卷降三級皆調用七卷以上革職同考一卷罰俸九月二卷一年三卷降一級四卷降二級五卷降三級皆調用六卷以上革職舉人罰停會試二科又定墨卷題內字及文字內錯謄謄録不照原字謄録自行改正對讀官不行對明徑送內簾者一卷謄録對讀官各罰俸九月二卷一年三卷降一級四卷降二級五卷降三級皆調用六卷以上革職舉人罰停會試二科謄録對讀生發該地方官責革其內簾主考同考官免議墨卷未落硃卷謄録遺句主考抹出同考官未經抹出者罰俸六月十八年議凖舉子黜革一名者同考官革職黜革二名以上者同考官革職提問正副主考官舉子黜革一名者各降二級調用黜革二名者降三級調用黜革三名以上者革職舉子罰停會試三科者每一名同考官降一級調用正副主考官各罰俸一年罰停會試二科者每一名同考官降一級留任正副主考官各罰俸九月罰停會試一科者每一名同考官罰俸一年正副主考官罰俸六月四十年題凖直省鄉試解卷到部者由部即奏請欽點九卿翰詹科道等官會同磨勘如有餽送需索事發按律從重治罪乾隆元年覆凖磨勘鄉試卷應令都察院科道五品以上科甲出身之京堂及中贊以上之翰詹官會同磨勘六年議凖每科鄉試中式之卷固有成數而各衙門磨勘之人難以豫定嗣後請照衙門定為分股之法由部行知各該衙門將各職名移送過部酌量人數多寡分定磨勘卷數行知各該衙門照數辦理遇有升遷事故之人該衙門自行均攤代辦至題結之期北五省試卷定於十一月或十二月江南等省定於十二月其最逺省分正月開印後題結如磨勘已完而故意遲延者即將承辦之人照事件遲延例參處二十一年諭向例各省鄉試硃墨卷解送到部即命翰詹坊局以上及京堂科道等公同磨勘所以慎重科場稽察弊竇典至重也其磨勘諸臣不過按數按省分派若不於卷靣注明某官某人磨勘字樣以専責成則已經夾籖者尚知為某人摘出其未經夾籖者或不過虛應故事陽博寬厚之名隂省校閲之煩而盡心乃事者轉不無觀望殊失磨勘本意著以下科為始磨勘硃卷皆於卷靣填寫銜名俟該部彚卷後朕别簡人於每束內量取數卷特交大臣再詳加校勘呈覽朕仍於此中復行收閲如有草率從事者即交部照例分别議處則磨勘各官及特簡大臣之是否詳慎均難逃朕之洞鑒矣著為例欽此又諭鄉試磨勘一事前已有旨令於下科為始將來詳加覆勘自不致視為具文惟是三場試藝篇幅繁多士子風簷寸晷中檢點偶踈輒干指摘其以磨勘獲咎者轉得有所藉口且設科立法程材無取繁文虛飾今士子論表判䇿不過雷同勦説而閲卷者亦止以書藝為重即經文已不甚留意衡文取士之謂何此甚無謂也三場試以書藝經文足覘素養繼之五策更可考其抱負之淺深又何庸連篇纍牘為耶嗣後鄉試第一場止試以書文三篇第二場經文四篇第三場策五道其論表判槩行刪省至會試則既已名列賢書且將拔其尤者備明廷制作之選淹長爾雅斯為通材其第二場經文之外加試表文一道即以明春會試為始鄉試以己卯科為始著為例如此則士子闈中不得復諉之於日力不給而主試者亦可從容盡心詳較無魚目碔砆之溷且鄉試第二場止經文四篇斯潦草完篇者當在所黜専經之士得抒夙學而淺陋者亦知所奮勵去浮文而求實效期足稱國家賔興大典可傳諭該部遵行再向來會試例不磨勘未昭慎重亦著寬至庚辰春榜後奏請一例委員磨勘欽此一供具順治二年定貢院需用物件由工部備辦又定例會試需用匠作人夫並置辦筆墨等項由部咨取户部銀五百兩交提調官酌量支發有餘􅌳回户部又定會試由提調支領户部銀二百七十兩給發內外委官以備場中應用器皿並發刷印刻字匠工價等項其用過銀數由部題銷又定會試供給照例劄行順天府取大宛二縣稅銀二千三百餘兩解部之日即令兩縣內外委官具印領辦買供給事竣後委官造册報部其用過銀由直𨽻巡撫題銷十六年覆凖謄録對讀飲食責成供給官親驗務令鮮潔按時給發有給發不時不潔者聽該所官呈知貢舉究處康熙十年題凖令承辦過會場器皿旗牌等項交順天府收貯遇會試之年由部行順天府取用五十一年奏凖會試揭曉寬限十日增支領銀四十兩二錢有竒共領銀三百十兩有竒雍正元年覆凖順天鄉會試場內所用筆墨紙及竹木器於考畢日交所司官收貯照卓倚之例至筆墨紙張等項日銷之物嗣後於科場供應銀內一例奏銷又覆凖貢院內應用卓倚器皿向繫工部承辦順天府收貯日久廢弛器皿不存多向五城借用嗣後應令順天府支用工部錢糧備造應用試畢交大宛二縣收貯貢院倘有遺失損壞著落賠補數年後果係不堪應用題明補造六年覆凖每逄會試之年遴選賢能司官辦理供給發銀之時本部堂官一人會同順天府尹傳集內外委官堂堂發給務令各行户實領如有官吏藉端需索行户等呈告該堂官立行題參交部照例嚴加議處其有能辦事節省錢糧者該堂官即會同順天府據實奏聞七年奏凖鄉會兩試外場應用器皿責令五城兵馬司於入簾之時將所備器皿詳開一單移送外監試徹闈之日該監試御史照單發還令兵馬司敬謹收貯接任時交代明白倘有擅取一物者照毁棄官物律治罪追賠八年奏凖外場監試有彈壓巡察之責應於揭曉後仍駐劄文場俟主考等官起身時將各官行李驗明放出率領地方官進內將備用官物並供給所內存剩物件逐一公同細加稽察其中有無毁壞及存剩多寡之處均令經手各官出具收管行文各該處交明存貯以備來科之用又覆凖嗣後科場由部會同順天府尹豫將科場內外各官供給列為三等並書役人數口糧食物分别多寡等次每遇科場刋刻清單於初次筵燕時分給各官入場閲對支給並令內外監試御史一同稽察將逐日出入供給物件各登一册揭曉之日即令交部俟辦理供給官造册到日一并較對會同順天府尹題銷十一年題凖貢院房舍以及存貯應用號板卓倚牀架錫器等項向無官員管理以致官物遺失損壞無可歸咎應將順天府照磨一官移駐貢院就近撥給官房一所居住令其掌𬋩貢院並經管一應存貯物件每遇科場及别項考試該員亦封入場內稽察料理如有作踐官物者許該員稟明該𬋩官究處其非繫考試之時有進內作踐者輕則聽該員自行懲治重則拿送順天府嚴究仍驗明立案修葺報部倘該員平時不加謹照看將官物致有損失該府尹題參議處又題凖場內官員應用卓倚等項照供給之例每官一人應用若干議定額數臨期照數鋪設不得短少事竣之日即開單交與順天府照磨經管場內官員各遵定額不得縱容僕從於額外濫取十三年諭向來文武科場需用器皿食物等項定例皆繫順天府委大宛二縣動用錢糧分發各行户備辦近聞承辦之人不能料理妥協以致各行户未領銀之先吏胥有折扣價值需索規禮之弊及至發覺之時又復任意短發扣剋中飽著順天府尹嚴飭大宛二縣將前項情弊立即革除倘仍蹈故轍一經發覺定將該管各官一并議處欽此乾隆元年覆凖遇鄉會場期即令大宛二縣先按場內應需食用等物照依時價造具細册鄉試申送順天府會試呈報本部存案其承辦之官即照所報時價應需銀轉行直𨽻布政使司於司庫內支取應用不足者仍於司庫補領有餘繳還司庫又覆凖三場舉子飯食所需之米應視人數增減直𨽻從前鄉試不過六千餘人每場需米十石三場銷算米三十石今應試舉子日增則人多米少實不敷用嗣後場內舉子食用之米照依六千舉子每場給十石之例按數加增又覆凖場內供給雖有定額而增取物件向無印票為據其中或有濫取冒支情弊應將場內支取什物開具某處取用某物若干清單送提調官鈐蓋關防內委官登號辦繳仍令內外監試察驗交總理供給所收發又覆凖科場向例大宛二縣縣丞在場內辦理供給謂之內委官兩縣典史在場外督催供給謂之外委官但內委官二人先期領銀發與行户臨時關防場內外委官呼應不靈各行户不免違誤將內委縣丞移出一人在場外督催供給將外委典史移調一人入場內協同辦理二年覆凖自今科會試為始場內夫匠人等所領小米皆改老米行文户部支領永著為例四年諭會試屆期天氣尚寒凡入場士子除照例賞給布棉襏襫及薑湯茶餅外著按名給與木炭許其攜帶手爐以溫筆硯可即出示曉諭入場舉子知之欽此又諭士子入場者定例給與粥飯近聞辦理草率不堪充食士子等不能均沾實惠著提調官加意料理務期妥適周遍並令監場副都統等留心察看毋得疏忽欽此九年覆凖鄉會試給諸生官燭頭場四條二三場各三條均用淨蠟每條計重二兩應照蠟直每名定價六錢二分令士子同卷價交納十一年奏凖士子納燭價時止令每場納價六分備重蠟蓋靣油燭於點名時同試卷散給如燭不堅好即將承辦官參處一禁令順治二年定生儒入場如有懷挾片紙隻字者先於貢院前枷示一月問罪發落如有倩人代作文字及受倩託之人均枷示問罪其搜檢官役知情容隱者坐又定場內供應人役或有豫將文字埋藏號舍及出入處所或巧為傳遞又有外簾各官與諸生相識者餽送飲食往來滋弊監臨宜嚴行禁約容隱者坐又定直省府州縣地方每遇鄉試之年先期榜示禁約仍令巡捕員役嚴加緝訪如有假稱考官親識誆騙士子汚纍考官及士子央凂營幹者皆照例枷示三月發煙瘴地方充軍部科各衙門糾參須慿實據不得輕信風聞輒形章奏如有親識書吏家人指稱本官誆騙本官自能舉發者議敘士子自能舉首者免罪科舉入場及開榜之日如有挾讐忌才私書匿名紙帖揭於街衢或編就歌謡豫先傳播以致場中雖取中不敢填榜者在內聽巡城御史及五城兵馬司在外聽按察使司緝拏依律治罪主試官亦不得避嫌妄退文卷如生儒因訟牽告在官候審不繫緊要等證亦許科場畢日問理至於文體險怪鑒别不精勿得摘取一二影響字句指為關節轉滋辨端十六年議凖舉子進場如大門搜檢無弊至二門搜出者將大門官役處治又定京闈有冒籍中式者在內科道在外撫按核實參革發回原籍十七年議凖科場作弊有關節授受的據者許指名告發如挾讐誣揑匿名帖造作歌謡者照光棍例治罪康熙三十九年覆凖主考官有交通屬託賄賣關節夤緣中式事發情實者按律從重治罪其父兄為子弟作弊有官者革職提問無官者從重治罪又覆凖監生有餽獻禮物詩文假名士刻遺卷並招徭作弊者巡城御史察實糾參交刑部治罪又覆凖在京冒籍舉人以部文到日為始限兩個月具呈自首本部核明改歸原籍過期者不凖行仍照例褫革又定冒籍中式者其收考送考出結官學政及地方官教官皆議處六十年議凖鄉會試榜後考試官有不公之處許下第舉人生員據實赴該𬋩衙門控告若有聚衆竟往考試官處打閙令該地方官立即嚴拏送刑部從重治罪又議凖直𨽻冒籍舉人進士照康熙三十九年例自首改歸原籍違者交刑部照假官例治罪又議凖直𨽻保定等衛軍户有頂冒中式者照假官例治罪送考及出結官照徇庇例處分雍正元年覆凖中式之人如有聯號換卷傳遞埋藏夾帶文字等弊審實將失察之監臨提調監試巡察各官照容隱例降二級調用外簾搜檢及各所官照溺職例革職如通同受賄者送刑部計贓治罪又覆凖正副主考及同考官出場風聞某考官所中有弊即行舉奏將中式之人請旨覆試舉奏官免其失察處分倘明知而不舉則必有通同作弊之處或經科道糾察或被旁人告發交與刑部審實照律治罪又覆凖考官士子交通作弊一應採名受賄聽情關節中式者審實將作弊之考官並夤緣中式之舉子處斬皆立決四年諭科場關繫大典若闈中閲卷果有不公許應試士子親身赴察院控告奏聞若不軌之徒假揑汚穢之辭以泄私忿而撓公事則國法斷難寬宥著步軍統領及順天府尹五城御史密訪嚴拏即行參奏從重治罪欽此八年議凖應試舉子毋許於未發榜之前鈔録闈中文字送人批點並不許榜後刋刻落卷漫生怨望如有場前鈔録闈中文字送人批點並榜後刋刻落卷者一經發覺將舉子並加批之人交部分别議處至科場之內果有作弊等事許應試舉子赴禮部出名據實首告本部即行參奏交刑部質審實則究處虛則反坐又覆凖新中舉人止許榜下赴燕用鼓樂迎導外餘日槩不得濫用新中進士例給旗匾其旗杆禁刻龍虎等形同宗通譜之家不得懸挂匾額違者該州縣官申報督撫學政指名題參又議凖鄉會試除座師房師照舊以師生往來不得袒護黨援外至對房薦卷與本人毫無關涉何得濫認師生藉端交結應一槩嚴行禁止倘有仍前濫認者或經察出或經首告交部嚴加議處至果有黨援袒護實情比座師房師袒護黨援之例加一等治罪十一年議凖鄉會試卷每本定價一錢二分令該提調官自行辦置不許再招卷户其紙價工費之外盈餘卷價即為辦事吏書人等飯食之費若有再立卷户仍前增價重等之弊照闕主例參處十三年議凖凡本生父母期年之服非他期親之服可比若期年中出身應試與禮不合亦於心不安應通行直省嗣後凡諸生遇本生父母之喪令其呈明期年內不許應試其有隱匿不報朦溷干進者事發照匿喪例治罪永著為例欽此乾隆元年諭國家三載賓興擇經明學優之士登之賢書以儲任用典綦重也從前北闈滋弊相習成風及我皇考御極釐剔廓清十餘年來士風安靜實為向時所未有但恐積久法弛人情生玩苞苴賄賂未敢即行而或採虛聲以收人望假援引以市私恩不知糊名易書乃朝廷取士之律令設防維不謹暗通關節則考官得以營私舉子得以幸進豈惟獲罪於君抑亦獲罪於天矣亦思科舉大典為國樹人始進不正人品早已不端國家亦安所用之乎考官奉命掄才不能登選公明乃罔上舞弊以干國法無論自困噬臍即令彼清夜捫心又何以自容乎朕臨御方始特開恩科深期士風醇茂人才日興亦望爾臣工恪恭厥職各知自愛以襄盛典自今以後凡與校文之盛者務各痛洗舊習杜絶請託之私矢慎矢公無負朕之簡用倘有勾通關節者國法具在朕不能為若輩寬也至於士子讀書稽古尤宜立品端醇居心恬淡豈可奔競鑽營妄生憤悶倘有場前鑽刺及榜後生事為人心風俗之害者著步軍統領及五城御史密訪嚴拏按法治罪以昭尚賢簡不肖之典欽此又覆凖鄉試之年各省中式舉子槩於赴省填書親供之後即將應領坊銀當靣給發不拘名次隨到隨給毋得扣留抑勒以滋弊竇如有奉行不實或令士子虛出領狀或將公項朦溷報銷者聽督撫題參議處三年覆凖科場需用等項並舉子試卷如有攤派擾民或於定價之外需索者繫官該督撫題參繫吏嚴拏究處計贓照因公科斂律分别治罪如該𬋩上司徇隱不報者一并題參議處四年諭科場為取士大典士子始進不端安望其實心為國我世祖聖祖歷加飭毖特置重科以懲不法皇考世宗憲皇帝教誡醇切數科以來風清弊絶人知義命自安朕御極以來再三申命期考官士子中矢素心無得復蒙奔競夤緣之陋習丙辰丁巳兩科亦稱清肅今會試屆期公車雲集風聞士子中竟有不肖之徒行險僥幸希圗弋獲奔競鑽營思逞故智者雖未有實據而浮言不盡無因惡習斷不可長為此嚴加訓飭應試士子務當洗心滌慮安命立品主考官留心覺察杜絶弊端著步軍統領密行訪察如確有實據即行拏究立置重典倘有造言生事之徒恣意誣衊並書匿名榜帖有意陷害者亦嚴拏究處以肅風紀以端士習欽此一下第舉人雍正二年諭上年天下舉人會試來過一次今年會試者甚多恐往返道路及在京守候盤費均難接濟特加恩賞將入場之雲南廣東廣西貴州四川五省舉人每名賞銀十兩福建浙江江南江西湖廣陜西六省舉人每名賞銀七兩直𨽻山東河南山西四省舉人每名賞銀五兩禮部務按進場舉人名籍給與俾得均沾實惠即於明日出榜時一同出示曉諭勿致稽遲遺漏欽此五年議凖各省教職衰老荒疏應請將各省會試下第舉人落卷取出檢閲如文理明順交與吏部引見恭候簡用令回本籍候補各該撫會同學政將本省見任之學正教諭詳加甄别內有文藝不通年力衰憊者照例令其休致所遺員缺即將此項舉人照依科分名次題請補授其升任丁憂事故等員闕亦先盡此項舉人題補在任六年果能董率士子著有成效該督撫照例題請議敘其有志上進者仍凖會試若先經驗看以知縣注册之人遇伊等截取應選之年免其離任投供仍按各科名掣補後行文調取引見八年遵旨議凖賞賜下第舉人盤費銀雲南貴州二省每人七兩四川廣西二省每人六兩江南江西福建浙江湖廣陜西六省每人五兩山西河南山東每人四兩直𨽻每人三兩其在京中書舉人等不必賞賜乾隆元年諭仲春以來農事方興雨雪時降麥秋有望殊屬可喜但羣士入闈衣履未免霑濺在羣士學古入官上焉者可服在大僚其次亦將膺民社之宰自當以天下之樂為樂不以霑濺為苦而朕心不免軫念著即發庫帑各賜白金三兩為修整衣履之用欽此隨遵旨察是科會試入闈士子計四千三百有九名按名頒給共銀萬二千九百二十七兩二年議凖會試之後簡選下第舉人文理明通者大省四十人中省三十人小省二十人引見欽定令回本省以學正教諭即用七年議凖會試落卷即令正副考官於正榜中額外將各房所有薦卷照乾隆二年所定大中小省額録取明通者如有不敷將備卷內文尚清妥者補足於會榜揭曉後交禮部拆號填書姓名籍貫知會吏部請旨命王大臣驗看簡選引見照例補用千年擇取落第舉子明通之卷補用教職與七年例同又覆凖各省赴京會試未經中式之教職由部於揭曉日除給發批文外令該教職等於揭曉後五日內赴部領照即起程回任仍令該撫將教職回任日期報部察核十七年諭今嵗萬壽恩科各省計偕雲集而中額所取例有定數其下第舉子中年力才具可以及時録用者特豫格外加恩簡選引見分别以知縣用教職銓補俾早列仕版目今巡幸塞外若俟回鑾再行簡選未免守候需時著在京總理事務王大學士及點出尚書三人於會試揭曉後即行會同簡選大省四十人中省三十人小省二十人候朕回鑾以次引見其年在七十以上難以復圗進取者並著該部察明具奏候朕酌量加恩欽此又諭今年舉行萬壽恩科禮部會試士子雲集其中有年臻耄耋尚與觀光者雖未經入彀而龐眉鶴髮偕試禮闈亦場屋中人瑞也所有八十以上之徐文靖等四人皆豫翰林院檢討職銜七十以上之張簡等十人皆給豫國子監學正職銜見任學正王延年著該部引見再降諭旨用賁殊恩以光盛典欽此一賜燕順治二年定會試正副主考官二月初六日於午門前行禮赴禮部簪花筵燕各給表裏二端出場次日行禮簪花筵燕如前直省鄉試與會試同十五年定殿試傳臚後三日賜恩榮燕於禮部欽命內大臣一人主席讀卷執事各官並進士皆簪花教坊司承應乾隆七年議凖考官簪花筵燕之處該衙門委官專司其事凡吏役從人不許擁擠上堂爭取肴饌違者拏究監試御史即將該管官指名題參照約束不嚴例議處一賞賫順治二年定直省鄉試中式者按名各給旗匾銀二十兩順天於户部領取各省於布政使司領取會試中式者各給旗匾銀三十兩於户部領取殿試一甲三名加給銀五十兩各於本省布政使司領取舉人公車由布政使司給與盤費各按其省分至京之道里逺近以為差十五年定殿試傳臚後五日於午門前領賞賜狀元六品朝冠朝衣補服帶鞾襪進士各銀五兩次日狀元率諸進士上表謝恩又次日狀元率諸進士詣先師廟行釋菜禮易冠服禮部題請立題名碑於大成門外雍正元年定殿試進士二名以下賞給表裏各一端八年諭各省會試舉人向例給與盤費銀所以體恤士子助其資斧之需朕聞各州縣舉人皆赴布政使司衙門領取道塗跋涉守候需時吏胥又多勒索扣剋之弊士子所得無幾嗣後著從本州縣衙門照數領給該州縣取各舉人領狀申報布政使司於奏銷册內報部察核庶吏胥無侵剋之事而士子亦免跋涉守候之苦矣若州縣稍有扣剋需索而督撫失於覺察者經朕訪聞將督撫一并議處欽此九年覆凖會試舉人盤費銀前奉諭旨著從本州縣領結以免其跋涉守候之苦但此項銀原繫三年一領未便令其久貯州縣庫內致滋侵那之弊應將各屬所徴盤費銀按年解交司庫至會試之年令各州縣於庫貯雜項銀內支給布政使司將所解盤費銀發還原項惟是會試盤費乃各州縣額編錢糧若以本州縣之額徴即支給本州縣之舉子其中多寡不均應令各屬將應試舉子豫報布政使司該布政使將各屬所徴盤費合計通省人數均勻分定飭行各州縣按數支給庶屬均平至舉人會試咨文應令該舉子呈本州縣代為詳請布政使司飭發該州縣轉給以免其赴司領咨之煩至於應給盤費銀如有扣剋需索等弊應令該撫即行題參乾隆五年覆凖嗣後會試舉子支領盤費銀如有無故逗遛及離家不逺旋即潛歸者仍照例行追其有中塗患病及丁憂者取具該管地方官印結報部或已經到京投文而丁憂患病者亦即取具同鄉京官印結報部均免追繳欽定大清會典則例卷六十七
