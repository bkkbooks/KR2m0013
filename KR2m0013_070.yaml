  text: 欽定四庫全書欽定大清會典則例卷六十七
  hash: sha256:018efe27944c53016987fc295f6eea1b706f741b1ae4583b4a669abe7e11e646
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_070-1a, image: WYG0622/WYG0622-0197a.png}
body:
  text: 禮部儀制清吏司貢舉下一試規順治二年定會試及順天鄉試考官擬題已定先莊繕一通向闕設案恭奉題紙陳設畢考官等行一跪三叩禮然後進呈不得過卯辰二時鄉試順天府尹奉進會試禮部堂官候於朝房儀制司官候於貢院前點名畢內簾傳出進呈題紙監試提調各一人奉至大門內立儀制司官於大門外立覿靣交明即將院門封閉司官奉至朝房隨堂官恭進二三場進題同又定諸生領卷歸號時有在號外停立者扶送監臨詰問深夜受卷時監臨坐堂上嚴督受卷官分經收卷有五十卷即時封號入箱剩有零餘亦即封鎖如法交卷出闈必點籖稽察有卷發籖籤完必繳毋使不完者闌出務令卷數與人數相合其大門內關防務極嚴緊不許一人闌入以杜傳遞十五年定殿試前一日鴻臚官設策題案於太和殿內東旁又設案於丹陛正中光祿寺備試案於東西廊下至日早法駕鹵簿樂懸陳設如常儀王公百官咸朝服按翼序立禮部鴻臚官引貢士以次入序立於太和殿丹墀東西班末名次單者居左雙者居右禮部鴻臚寺堂官奏請上御禮服御殿樂作升座樂止鳴鞭大學士於東案上奉策題出至殿簷下授禮部尚書禮部尚書跪接至丹陛中案前跪陳於案三叩興舉案降自中階之左設於丹墀御道正中鳴贊贊如儀讀卷及執事各官就拜位行三跪九叩禮畢鳴鞭駕還宫讀卷執事等官各就次祗俟王公百官皆退鑾儀校舉試案列丹墀東西均北嚮禮部官散題貢士跪受畢鳴贊贊行禮衆三叩興各就試案對䇿畢受卷掌卷彌封等官均於左廡簷下收貯於簏送讀卷官校閲是日如駕不升殿王公百官不齊集不設鹵簿餘儀同前康熙九年議凖主考官場內發題過卯辰二刻者罰俸六月二十四年議凖會試第一場四書題目恭請欽定於初八日午後密封發內閣交禮部官密送內簾考試官刋刻給散其五經及二三場題目仍令考官擬出亦遵前例恭進嗣後會試並順天鄉試均照此例行四十七年覆凖鄉會試出題考試次日士子務盡放出不許宿場若次日內不能完卷連宿場內者將監試提調及本生一并交部議處通行直省一例遵行五十三年覆凖凡考試舉子入闈皆穿拆縫衣服單層鞋襪只帶籃筐小凳食物筆硯等項其餘别物皆截留在外舉子進院漢人責成營辨旗人責成都統等務照卷號押進號舍督門封固不許私從柵闌出入日暮即行封門不凖收卷貢院外窩鋪席棚不許挨墻搭蓋令巡綽官兵晝夜傳籌巡察食物進院監試細心檢放如有疏縱容隱一經弊發除作弊者從重治罪外各該𬋩官皆行議處雍正元年定會試及順天鄉試第一場四書題考官密擬鄉試由順天府會試由禮部均於初七日齎奉進呈恭候欽定於初八日發出仍各奉交場內二三場試題於十一十四日五鼓照前恭進七年覆凖號軍於初八日點進頭埸之後不必令其出場即於貢院內右翼空房歇宿俟三場既畢令其出場八年諭今年會試舉人進場時天氣尚寒皮衣任其隨便帶用其所需用大小板凳皆凖帶進但只可用單層板凳不許用雙層夾底其搜檢之人仍照例搜檢欽此又覆凖鄉會試舉子凡木匱木合嚴行禁止槩不凖帶進違者照科場條例治罪又覆凖鄉會兩科宿場舉子有謄文未完應令監試提調等官親身察閲傳至至公堂看其謄完並令背誦文字數行以别真偽十二年題凖各省鄉試應照順天鄉試之例將號板按各號名數編書字號巡綽官飭令號軍看守該舉子既歸本號如有擅出號房般移號板者送監臨官究處仍令監試提調等官逐號挨察督同封固乾隆元年覆凖貢院外圍墻應行順天府尹轉飭大宛二縣於修葺貢院時按照舊例將圍牆一周遍覆棘茨務令如式以資防範三年覆凖士子入闈毋許攜帶坐凳又覆凖士子入場不按牌上名次爭先擁進及領卷後不歸本號者即行扶出如有閧聚多人紊亂場規者將為首之人禠革枷示至試卷真草不全例應貼出其有塗改鬼名妄書别語除實繫病狂無知貼出免究外其有意妄書者將本生禠革治罪各該教官題參降一級調用至學政於録科時亦宜較量優劣分别去取如或濫行收録致蹈前弊並將該學政罰俸一年四年奏凖頒發御纂周易折中欽定書經詩經春秋傳説彚纂御注孝經御批資治通鑑綱目全書欽定大清律仿刻宋板四書周易義例啓蒙附論性理大全孝經衍義律書淵源康熙字典日知薈説樂善堂全集至四書大全請敕部買備應用其禮記大全候纂輯告成再請頒發以上等書各發二部分交禮部順天府收貯俟鄉會兩場之期移送內簾應用四書題目由考官恭擬密奏鄉試交順天府會試交禮部恭進欽定仍鎖封發出轉交內簾九年議凖士子入闈服式氊服單衣皮衣去靣氊衣去裏薄硯油袋筆𬋩鏤空水注用瓷燭臺用錫單盤空柱細柄柳筐玲瓏格眼木炭二寸餅餌破切凡不遵定式者不凖携帶至點名時京闈於甎門外各省於貢院頭門外令士子依牌序進不得攙越二門內搜檢之役兩行排立士子魚貫相次搜畢放入一試卷順治二年定將士子所坐字號分為兩截如天字一號天字為一印一號為一印自天字起至師字止共七十二字自第一起至第七十止共七十號編號時先將七十二字之印逐卷輪完後將七十號數之印信手探出即印於各字之下每一巡畢將此號印别收不用以防重誤但用筆即係作弊各省號房數雖不同均仿此又定題字錯落真稿篇數不符謄真作行草書及越幅曵白油墨汚染他如初場破題七也七矣七焉承題七夫七蓋七甚矣七乎七歟起講七意謂七若曰七以為小結七蓋大結七大抵七抑七嗟夫之類二場表失書年號及賀表進表謝表錯誤之類犯者貼出三場五䇿題應書第一問第二問第三問第四問第五問不得誤書全題違者貼出若不屬關節字靣及不繫大差者不必苛求十二年題凖南北試卷均不書四書䇿論字樣以歸畫一十五年題凖墨卷失格違禁應貼不貼者受卷官降二級調用不應貼而貼者如之又題凖彌封一所硃墨卷靣字號皆從此印弊竇最多切宜重加防範號簿封送監臨人役嚴取互結該所官親自印號勿經人役之手卷到各官分經及生員監生信手掣籖用印不許間人窺看墨卷號必與硃卷號相對頭場卷必與二三場相對卷號必與簿號相對監生生員必須分别毋得相溷至於各役彌封時必須專心閲視無使竊去以致割換見有折角針眼等弊登時究治封盈一箱本所官親送堂上仍約謄録所官公同交收不許兩所人役近身私語又謄凖謄録各役如謄録潦草淡抹句字差落些小失誤責令重録重者枷革若截去文字那東移西作姦舞文以枉法贓律治罪至硃必一色紙必一律並宜申飭如謄録錯誤對讀生未經對出以致內簾駮出者該所官視卷後本生名字即發學黜革對讀各生不許干與代書違者革究又題凖如硃卷內作字草率遺落成行硃淡無色洗改洗補責在謄録字訛句落不細心詳對注改責在對讀倘有不遵各役各生及各經𬋩官一并參處又定謄録錯落多至數行或對讀任錯不改者謄録對讀官各罰俸九月又定對讀向用藍筆各省參差不齊行令各省改用黃筆違者官降一級對讀生黜革治罪其因本所官之命誤用者坐本所官本生免議十六年覆凖受卷各役倘有汚損試卷等弊重責枷示其有竊掠攙換迷失等弊即交送治罪如該所官失察容隱者知貢舉及監試提調官察實會參分别議處又題凖各所官吏汚損試卷者除文字棄燬不全外餘皆注明某號卷某人汚損存册外簾其卷照例謄進仍將棄燬汚損之人嚴行究處又議凖對讀向有黃筆今改用紫康熙七年題凖前後場卷錯印卷號重用號印並用印糢糊者經𬋩官罰俸三月其經𬋩號印官重送號印及移送號印字畫糢糊者罰各如之點名册將姓名錯開者經𬋩官罰俸三月卷册相同貼示錯書者經𬋩貼示官罰如之又題凖卷靣籍貫不明收卷官不檢出駮回者罰俸六月分經收卷如有舛錯誤收交送彌封所彌封所官不加詳察錯印各經字號送內簾者受卷彌封所官各罰俸三月自行檢舉呈明改正者免議又題凖彌封所失印卷上條記送謄録所者該所官罰俸三月其應試諸生試卷各有應編字號彌封官將卷靣籍貫錯印者罰俸六月主考官照錯編字號中式於拆卷時未及校對改正者正副考官各罰俸六月又題凖謄録所見彌封所失印條記私自差役送令補印者該所官罰俸三月謄録書手姓名誤書卷皮靣者該所官失察及察出而不行呈明者皆罰俸三月十六年議凖鄉試順天府豫備空白試卷十本會試禮部豫偹空白試卷十本交與監試御史遇有遺失錯汚等項給發補換二十六年覆凖凡科場試卷油汚墨染字畫猶可辨識卷頁稍有破損及題目字樣表判策內一定字樣點畫遺失擡頭小差草稿錯落等項原無關於弊竇應停其貼出仍行謄送餘如例所載又覆凖順天鄉試原有空白試卷十本交與監試御史如遇失錯汚損等項許其給發嗣後應多備空白卷候用三十年奉旨八旗號房著與漢人分編字號别坐雍正元年覆凖鄉會試硃卷字號提調官除將千字文內不佳字樣及數目字與號數重復並亞聖孟子名應回避者均行揀去外卷多之省分恐不敷用舊例每字十號令加倍為每字二十號卷少之省分仍照舊例每字列為十號六年覆凖科場除違例應貼之卷收卷官照例呈送監臨貼出外其應送彌封所試卷每十卷收卷官即用紙封固送彌封所如受卷官將試卷與提調等官先行翻閲在京許監試御史外省許監臨指名題參將收卷并提調等官各降二級倘有指示改正等弊各降三級監試監臨官隱匿疏漏不題參者各降二級皆調用十一年議凖闈中硃卷彌封之後例用三不全字號印於卷靣字畫不全每難辨别往往有彼此溷淆者嗣後紅號仍用完全字樣每科令提調官别刻新用其糢糊舊印及不全字號槩行銷燬乾隆二年議凖鄉會試三場卷靣所用號印令監試提調同四所各官在至公堂分卷親用不得復假書吏之手以滋弊端二十一年覆凖三場試卷不合式者向例止貼示至公堂應截角貼出貢院門外則犯貼之生可以講求規條知所避忌且與一二場貼示之例亦得畫一一閲卷順治二年定主考與各房同坐一堂隨分隨閲隨取隨呈去取權衡專在主考不得但慿房考薦閲倘有執拗憤爭者即會同監臨提調指參十五年題凖殿試讀卷率於試後三日聖駕御中和殿讀卷各官至丹墀行一跪三叩禮入殿內東西靣序立讀卷官居首者執卷至御前跪讀畢俟內監接卷設御案三叩興復位立各讀卷官以次進讀如前儀讀三卷畢有旨免讀各官即執卷同至御前跪內監以次接卷設御案各三叩興退俟親定甲乙御書一甲三名名次於卷畢餘卷發內閣官領收聖駕還宫讀卷官乃隨按名次拆卷填書黃榜十六年覆凖司試各官分别三場遍閲合訂先録其全瑜者若首場工而後場不稱黜不與選首場平通而二三場辭理博雅斷據詳明者並與收録十七年議凖同考官不許分注批語止列職名其同考官均照品級序列如有違式不列及署名顛倒者責歸主考官各降職一級又議凖房官闈中作弊許主考官不時據實指參或主考通同房考作弊內許監試御史外許該撫按不時糾察其撫按所取簾官內有關節賄賂敗露者察明係某撫按取用一並治罪又議凖同考閲卷之時同經各官同堂公閲不許私相商訂不許别經同考干與飲食寢宿各歸房舍不得恣論縱談責成主考嚴行申飭如有故違立刻扶出具題參處倘主考官徇庇不舉該撫按體訪得實一并題參康熙七年題凖正副主考官遺批取中字同考官遺批公薦字罰俸六月又覆凖會試及順天鄉試正副主考同考入闈各歸本房不許私訪聚談至閲卷時同考官各以薦卷置中間案上御史驗明內無私通小帖方送主考收閲如有情弊即行糾參如同考內有暗通關節而主考姑容取中聽御史題參若同考不將佳卷呈薦或將荒謬之卷妄薦者主考會同御史核實題參同考閲卷佳者止圈點句讀御史驗明送主考詳閲照例注批填榜之後即行封鎖其各房落卷皆令各同考官批出不中緣由開榜後禮部順天府出示於十日內令本生領取原卷閲看不許藏匿勒索如同考官妄抹佳文本生即赴部具呈驗實糾參若本生文原不佳妄行控告除黜革外仍交刑部照誣告例從重治罪又議凖考官私訪聚談薦卷私通小帖私帶硃卷入房凡在場內目擊等項情弊御史容隱不指名題參别經發覺御史降二級調用又議凖闈中閲卷令各官鬮分硃卷若干即於卷面上用某經某房木印如某房有弊即將本房官處分五十年議凖各房考薦卷之外主考並將餘卷遍加校閲庶佳卷不致遺落雍正元年議凖主考有搜落卷之責每因房考已經批抹文字雖佳不肯取中恐磨勘時干礙房考處分今照會試例房考批抹之文主考搜出佳文仍行取中至於房考理應細心詳閲如文內字句隱僻一時不能看出以致塗抹應寬免處分若文理明顯挾私妄抹仍照定例行六年覆凖試官閲卷必將後場試卷盡行細加校閲頭場經書文藝固期純粹而作判亦須將二死三流等律引斷明確作策亦須通達時務切中利弊首場雖佳而二三場草率者不得取中若首場雖僅平通而後場明確通逹者亦得取中不得專責首場忽略後場如經磨勘策判有剿襲雷同將主考房官一并題參照文體不正例議處七年議凖直省鄉試分經取中自有定額如各房校卷之時其佳卷多者凖其盡數呈薦不得以本房額滿屈抑英才其實無佳卷者亦不得濫取充額主考官統閲通場之卷拔其尤者分經取中不必限以每房額數至取定之後將呈薦佳卷多者分給佳卷少者之房其會試亦照此例取中乾隆三年覆凖考試各官凡嵗科兩試以及鄉會衡文務取清真雅正法不詭於先型辭不背於經義者擬置前茅以為多士程式如有好為怪異於題意毫無發明但鈔録子書中人不經見之語以妄希詭遇者槩置勿録倘試官仍有濫收等弊經磨勘官察出即行據實參處並將所取之人分别議處其磨勘各官亦應照例嚴加校閲毋得稍有瞻徇又議凖順天鄉試詩經五房卷數甚多難以遍閲應於禮記房酌撥詩經一二百卷令其兼閲一出榜順治二年定闈中閲卷須立程限計自分卷以至徹棘約可半月以八日完前場以七日完後場草榜填號外簾皆不得與草榜已定臨填榜時方延入監臨等官公同拆卷對號拆號之日隨將硃墨卷並黏硃卷大書名姓墨卷大書名數監臨隨督同外簾官將硃墨卷逐一磨勘硃卷字號無差及文字內無關節可疑字樣即用印鈐蓋差人星馳解部以慿磨勘拆號既畢填書已完正副二榜同貼不得先貼副榜致妨勘對亦不許過時方貼副榜致滋弊竇又定會試題目榜上年月及界縫處應用禮部堂印鈐蓋發榜前一日禮部堂官一人滿漢司官各一人攜印入場填榜其禮部堂官職名開列具題欽定滿漢司官各一人由部簡委又定會試揭曉日期由主考官公同議定移送禮部奏聞又定揭榜以後刋刻試録登科録皇太后皇帝皇后前各進呈一本又定正副主考如有丁憂事故不曾入場者試録後序用同考官內居首一人銜名撰刻止許撰序不許干與主考之事又定出榜後各省解送試卷山東山西河南陜西以九月到部江南江西浙江湖廣以十月福建四川兩廣以十一月雲南貴州以十二月遲延者聽部科糾參八年題凖直省取中舉人硃墨卷令主考監臨布政使知府等官於出榜日公同在場內將中式硃墨卷每十卷為一封各用印信是日即起程解部定限順天出榜次日到部山東山西河南限二十日到部江南陜西限四十日到部江西浙江湖廣限五十日到部福建限七十日到部雲貴川廣限九十日到部如違限十日者府尹布政使罰俸一月解送官議處其中式舉人提學傳集令將本身籍貫花名親書於出榜十日後照解卷限期到部以便磨對十五年題凖不許場內刋刻録條止許繕書進呈出至衙門方許刋録如有盜録飛報在內五城御史在外撫按及地方官嚴拏重究被索之家許首告又定殿試讀卷後一日早法駕鹵簿樂懸陳設如常儀鴻臚官設榜案於太和殿內東旁設黃案於丹陛正中設采亭一於午門外王公百官咸朝服按翼序立各進士咸公服立丹墀東西班末上御禮服乘輿出宫樂作升座樂止鳴鞭鳴贊贊讀卷執事等官均就拜位行三跪九叩禮畢內院大學士奉榜出至殿簷下授禮部尚書禮部尚書跪接降自中階之左跪陳於丹陛中案上三叩興鴻臚官引各進士以次就拜位北靣立鴻臚官贊有制衆皆跪宣制官傳制曰某年月日策試天下貢士第一甲賜進士及第第二甲賜進士出身第三甲賜同進士出身乃唱第一甲第一名某二成三成鳴贊官接傳凡三傳序班引令出班前跪次一甲二名次一甲三名均傳唱如前儀次傳第二甲第一名某等若干名第三甲第一名某等若干名不引令出班贊跪叩興衆行三跪九叩禮畢復位立贊舉榜禮部尚書舉榜至階下授禮部司官由中道出至午門前跪設采亭內三叩興鑾儀校舁行乃作樂前導出長安左門懸榜狀元及諸進士均隨榜出鳴鞭樂作聖駕還宫樂止王公百官各退順天府具繖蓋儀從送狀元歸第越五日狀元率諸進士上表謝恩鴻臚官設表案於午門外正中狀元奉表率諸進士咸朝服由長安左門入至拜位序立鴻臚官引狀元詣案前跪陳於案三叩興退就拜位鳴贊贊跪叩興衆行三跪