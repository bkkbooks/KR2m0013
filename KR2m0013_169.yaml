body:
  text: 內務府營造司一巡視皇城順治初年定設巡皇城人十有二名頭目四名東華門西華門神武門門隸各七名景山北上門門隸六名東西栅闌門隸各五名康熙十六年定凡皇城內居住旗人如移居城外該佐領內管領具結由司用印移知步軍統領雍正八年奏準歲簡本司員外郎一人直年與直年步軍協尉輪直巡視皇城牆垣掌管城內街道乾隆四年議準歲簡員外郎二人直年辦理錢糧出入及巡視皇城一承應警蹕康熙十六年定凡遇車駕出入皇太后皇后妃嬪宮眷出入如在城內由司轉咨步軍統領城外分咨步軍統領及工部街道廳先期淸蹕又定凡本司內監備用步障有應更換者由司呈堂移付廣儲司更造雍正十二年覆準每月終將轉咨步軍統領事件彙册用堂印移咨步軍統領衙門核對一六庫三作匠役木庫司物材鐵庫司鑄造鐵器器皿庫司藤竹木器柴庫司柴薪炭庫司煤炭石灰房庫司涼棚席篷檾麻鐵作司打造鐵器花爆作司造煙火花爆油漆作司繪堊六庫各設庫掌庫守均未入流三作各設司匠領催惟鐵作司匠給八品銜康熙十年定六庫三作各項匠役共四百五十一名額闕於原佐領內管領下選補各項召募民匠共二百八十四名額闕於工部咨取月各給銀一兩米二斛於各該佐領內管領下支給召募民匠附於三旗旗鼓佐領下支給雍正六年奏準成造花爆及鰲山鐙向例監修官一年更代嗣後改為五年更代至第四年即委出一人隨同學習次年接任又奏準工匠不敷準於額外雇募長工日給制錢一百八十文短工一百四十文十二年奏準不拘長短工每工槩給制錢一百五十四文乾隆五年議準司屬南木匠雕鑾匠石匠搭材匠共一百五名內召募六十三名選取四十二名嗣後此四項匠役闕停止各佐領內管領下選取均召募民匠應役一修造順治十八年定凡乾清門以外紫禁城以內有修理工程物價在二百兩以上工價在五十緡以上者奏交工部不及此數者呈堂轉咨工部辦理仍㑹同夲司官監修其葺補小修仍由內工部即今之營造司辦理又定大內有葺補之處令內監匠人修理又定凡雜項修理按佐領內管領下地畝勻分壯丁佐領下一分內管領下二分又定內管領所分廄館房舍應隨時修理者令其所屬服役人丁承應其雜修各項匠役不給飯錢若遇大工聚集夫役委官監修者匠役及雇工領催驍騎等均給飯錢康熙二年定皇城牆垣及御河橋梁有應修理者奏交工部修理又奏準凡一應工程均咨欽天監擇吉奏聞興工十六年定凡三殿所懸門簾雨搭並鋪設氊毯等物有應修補者由司呈堂移咨工部辦理紫禁城上每年除草咨掌儀司交欽天監於三伏內選擇日期並移會工部鑾儀衛届期奏聞率領該管人員及夲司搭材匠十有五名工部搭材匠二十名鑾儀衛校尉會同上城芟除草棘紫禁城內溝渠每年於二月移咨工部工部司官率領人役會同內管領等監視疏濬十九年奏準每年冬令三殿前遇有積雪傳集內府三旗佐領下驍騎人等夲司官率領掃除又奏準每年三月奏交工部於內左門內右門等處搭蓋涼棚至九月拆卸宫門各處涼棚由司移咨工部將應用物料運送到時知會總管內監定期夲司官率領人役搭蓋拆卸時仍知會工部收回原料又議準各司院等處房屋器皿有應修造者據各該處咨文交該庫作修理成造將用過工料數目呈堂察核雍正八年奉旨嗣後凡紫禁城內蓋造小房均用㼧瓦乾隆十一年奏準凡夏月宮內搭蓋涼棚並養心殿造辦處需用舁送什物托板架木等項停其移咨工部即交該司辦理除所需席箔竹竿麻繩照定價辦買應用外其杉槁架木量其足用咨取工部貯庫備用夲司食糧搭材匠役遇有搭造涼棚定為每名給制錢三十文如食糧搭材匠不敷準其雇覓民匠照例每名日給工價銀一錢四分其所需銀錢於官房租內動支並令該司將涼棚長濶丈尺豫行開報呈堂察核所需物料與例相符方準支領再搭造涼棚除不及一月即行拆卸者毋庸置議外其一月以外至三四月者拆卸時該司官察驗揀選底席尚堪應用者仍留於次年作面席用其面席雖經風雨色變損壞亦未可即行開除仍令收貯遇有外項搭蓋遮暘之處應用至杉槁架木竹竿長短不齊用時必須鋸截席片麻繩久經風雨不免傷耗應按用過次數日期並如何鋸截傷耗若干之處亦令該司分晰呈堂照例核銷十六年奏準向例每年三伏內紫禁城上芟草一次但自夏至秋仍復叢生嗣後至十月內再芟一次作為二次永為定例每年遵照辦理毋庸具奏一直殿及營繕內監太和殿中和殿保和殿文華殿首領內監各二人內監各十名木作瓦作表糊作首領內監各一人副首領內監各一人內監共四十名康熙十六年定凡四殿三作首領內監闕由司呈堂具奏交總管內監等於副首領內監內選補三作副首領內監闕於三作內監內遴選由司呈堂充補四殿三作內監闕均移付掌儀司撥補四殿內監七年一次三作內監四年一次各給羊皮細布新進內監移付廣儲司給狐皮帽狐皮領武備院給皮鞾雍正十一年定三作首領內監給八品頂帶乾隆七年奉旨營造司首領內監每名各賞給月費銀七錢三分三釐內監二十名各給六錢六分六釐又定營造司首領內監月費著裁汰三作內監二十分月費裁去五分每分折給制錢六百文一徴輸石灰煤炭設灰軍煤軍炭軍各以其地三十五畝草子匠各以其地四十二畝編為一丁灰軍五百三十一丁草子匠八丁共地一百八十九頃二十一畝每地七畝徵銀二錢一分草七束每束折銀二分應徵銀九百四十六兩五分嵗交靑白石灰包金土灰萬斤抵銀十一兩二錢五分土千斤抵銀三兩餘銀徵交廣儲司煤軍五百三十五丁草子匠三丁共地一百八十八頃五十一畝應徵銀五百六十五兩五錢三分嵗交煤草煤萬斤抵銀十六兩五錢餘銀徵交廣儲司每地六畝交草七束共徵草一萬八千八百五十一束束重七斤交會計司分發各廄炭軍五百二十八丁共地一百八十四頃八十畝應徵銀五百五十四兩四錢折交黑白炭白炭千斤抵銀十兩五錢黑炭千斤抵銀三兩二錢七分五釐每地六畝交草七束共徵草萬八千四百八十束交會計司發各廄同各設千總二人把總四人外郎四人即於三項軍丁內選補每人各給地三十五畝免其賦又每年內管領需用荆筐米篩器物分令三軍交納每荆筐折銀二分五釐米篩折銀一分五釐雍正八年籍沒入官炭軍十有二名共地七頃六十八畝按畝徵科如前一長夫內府三旗佐領下人每地三十畝為一丁每十有二丁編長夫一名內管領下每地三十畝為一丁每八丁編長夫一名每夫月交銀二錢一分七釐七毫該參領三年一次編造清册送司察核雍正十二年議準三旗共編長夫二百五十八名每月交銀五十六兩一錢六分遇紫禁城及各行宮運送物件即動用此項銀雇夫一編審康熙十六年奏準三年一次奏委夲司官一人編察所屬石灰煤炭丁數造具六册三册存司三册咨送工部六十一年奏準石灰煤炭軍子弟準其考試一官給印票炭軍出口燒炭每年工部給票三百紙於八月內繳銷舊票換給新票盛京居住砍伐木槽箭幹匠人每年户部給票八十四紙於二月內盛京佐領今由府盛京內務總管委官齎繳舊票換給新票雍正十一年議準軍丁出口燒炭暫行停止將所領印票徹回其應交之炭令伊等從地畝錢糧採辦乾隆八年議準炭軍應交炭仍照從前出大水峪河防口燒炭之例於工部領票出口燒炭交納一支取官物順治十八年定奉先殿及諸祭祀燎所應用楊木葦柴據掌儀司咨文呈堂轉咨工部支領康熙十六年定凡領出紫禁城外修理成造器皿及領用各庫物料均鈐用司印移會景運門直班護軍統領又定皇子公主婚嫁應用木植器皿據掌儀司咨文照數造給所需木架火把轉咨工部支領采棚行工部辦理又定凡牛羊各圈應用木槽三年一次更換由司辦理其餘牧具咨工部支領一奏銷雍正元年奉旨嗣後內務府行文工部咨取一應物料不必聲明何項應用只將所用物料數目開載咨取工部亦將夲月給過內務府物料數目開載入册其餘何項用過之處著每月取用之各司院詳開呈內務府總管將用過數目核對與工部黃册一同具奏倘有不符即行聲明如不聲明具奏被朕察出咎歸內務府總管五年議準內廷及圓明園取用工部煤炭木柴數目並炭軍所納黑白炭及筐篩等物灰軍所納靑白石灰包金土筐篩及草煤軍所納煤各餘剩若干每年於五月內具題前一月委官察核七年奏準內管領所屬秫秸厰改歸夲司柴庫管理會計司所屬各莊應交秫秸二百二十三束折銀六兩八錢八分由會計司催交夲司採買應用其用過銀數嵗終題銷十三年奏準各處所用秫秸有應換給木柴者換給木柴應用其必用秫秸者動用官房租銀買辦其各莊所納秫秸折價銀令會計司徵交廣儲司庫一官房取租雍正四年奏準凡買辦奇零物料令承辦官聲明所用數目移付官房收租庫領取年終將用過銀數造册呈堂核銷具題慶豐司一牧所定額順治初年設內牛圈三於西華門外設外牛圈三供乳餅圈一於南苑設羊圈六於豐臺設牛羣一百九十八羊羣二百四十於張家口外游牧地方康熙二十三年奏準內三牛圈每圈養全耳騸牛五其分例乳牛專供內廷取乳者隨時增減無定額南苑三牛圈每圈養全耳騸牛七分例乳牛額外乳牛均隨時增減備給莊園騸牛六又乳牛八十别自為圈專供乳餅乳湩又奏準豐臺六羊圈定額一等羊千有二十二等羊二千四百牝羊六十又奏準張家口外游牧處增設牛羣四十二羊羣一百二十三十一年奏準養什木設牛羣五每羣乳牛九十牡牛五騸牛五於張家口外牛羣內撥給又定內三圈遇有增換之牛向外三圈取用外三圈及乳餅圈豐臺六羊圈牛羊嵗於張家口外取用不堪畜養者並送口外牧放三十四年奏準豐臺六羊圈內減一等羊五百四十定為四百八十減二等羊一千三百二十定為一千八十又奏準凡䝉古王貝勒等年例所貢之羊均入豐臺六圈餧養三十八年覆準張家口外游牧處增設牛羣二十三十九年議準於張家口外羊羣內撥萬羊於逹里岡崖分設三十羣四十年奏準內三牛圈增駕車牛六牡牛三青牛一四十二年奏準達里岡崖增設羊羣三十又奏準張家口外游牧處增設牛羣三羊羣九十一又覆準每年七月委官往張家口外領取牛羊將選定牛羊烙印入圈如印記糢糊於覆看時補印其游牧各羣及在京牛羊圈所用鐵印記如年久損壞交武備院更換四十四年覆準張家口外游牧處牛羊羣額牛三萬羊二十一萬牛一百二十為一羣羊四百為一羣又奏準張家口外游牧處增設牛羣二十二羊羣九十九四十五年奏準達里岡崖增設羊羣五十四十八年奏準達里岡崖增設羊羣七十五十二年議準達里岡崖羊羣定額十萬羊不準闕少五十八年奏準內三牛圈減全耳騸牛三南苑三牛圈減全耳騸牛十有三備給莊園牛盡行裁汰供乳餅牛圈減乳牛十有五又奏準豐臺六半圈減一等羊一百二十定為三百六十減二等羊三百六十定為七百二十減牝羊二十定為四十六十一年奏準豐臺六羊圈增一等羊一百二十定為四百八十增二等羊二百四十定為九百六十雍正元年奏準豐臺六羊圈增一等羊一百二十定為六百增二等羊二百四十定為一千二百又覆準供乳餅牛圈增乳牛十又奏準每年取用張家口外牛定為五百羊一千八百送回口外牧養牛不得過二百羊不得過六百二年覆準供乳餅