外各圏毎年共需用竹箒笤箒草筐瓢桶柳罐檾麻轆轤繩索木􅱾木杠扁担簸箕等項由掌關防内管領處支給内外各圏共需用斗秤如有損壞由工部更換以上均令各廐長呈夲司轉行各該處給發康熙二十三年奏準每年往張家口外取送牛羊委夲司官日給盤費銀一錢牛圏廐長四人羊圏廐長三人各八分牛圏廐丁一名羊圏廐丁六名各五分定為往返四十日於戸部支領並於兵部領出口信票又奏準凡内外各圏煑豆每倉石一石四斗四升隨煤四十五斤炭四斤八兩除半莊額徴秫稭每束抵煤七斤八兩炭十有二兩外不敷煤炭移付會計司轉咨工部具印領取用内三圏各嵗給鐙油一百二十斤外三圏各嵗給鐙油六十斤供乳餠圏嵗給鐙油五十斤均由會計司分撥各莊交送又覆準内三圏每年自六月初五日至七月十五日日給冰三塊由掌關防内管領處給發雍正二年奏準供獻大白乳餠所用蜜糖麥麪由掌關防内管領處給發又覆準外牛羊圏周圍土牆如有倒壞該廐長呈報夲司勘實按每長一丈髙六尺需用制錢九十文合計數目移付官房收租庫領取修理乾隆七年覆準内三圏所用運豆草車䥷刀鐵鍋如有破壞均呈夲司轉咨營造司更換一勸懲康熙二十一年奏準牛羊圏廐長均授為八品二十三年奏準每年一次察看内外各圏所養牛羊如較别圏疲瘦者廐長罰俸六月廐副鞭五十二年皆屬疲瘦者廐長革職與廐副各鞭一百充為廐丁如三年之内餧養牛羊皆較别圏肥盛者量加給賞二十四年議準每三年一次察驗倒斃牛羊除遇瘟疫倒斃者存案不議外每牛百頭倒斃七頭以下每羊百隻倒斃五隻以下廐長賞給緣蠎段領袖段袍一領廐副緣糚段領袖彭段袍一領牛倒斃八頭以上十二頭以下羊倒斃六隻以上九隻以下皆無庸議牛倒斃十三頭以上羊倒斃十隻以上廐長罰俸六月廐副鞭五十二十九年奉旨牛羊圏廐長自賞給官職以來牛羊闕少疲瘦更甚皆著革職仍照前例不必給與品級三十年奏準每牛百頭倒斃十三頭以上羊百隻倒斃十隻以上廐長鞭八十廐副鞭五十三十二年奏準餧養牛羊乃廐長廐副專責較别圏肥盛倒斃數少給賞之例均應停止三十三年奏準張家口外牧羣定為牛三頭每三年孳生一牛羊三隻每三年孳生二羔如於額外多一牛二羔者牧丁各賞毛靑布一疋少一牛牧丁責二鞭少一羊責一鞭多三牛十五羊者五羣領催各賞毛靑布一疋少三牛十五羊者領催各責一鞭多六牛三十羊者十羣長各賞毛靑布一疋少六牛三十羊者十羣長責二鞭多十五牛七十羊者協領各賞毛靑布一疋少十五牛七十羊者協領各責一鞭賞布不過六十疋罰鞭不過百再協領繫職官應賞毛靑布至二十疋折賞段一疋鞭責準其折贖四十五年覆準張家口外牧羣每三牛三年孶生一牛少一牛者牧丁責二鞭少三牛者五羣領催責二鞭少六牛者十羣長責二鞭鞭責皆不過百牧丁於額内少一牛至十者枷一月鞭八十少十一至二十者枷四十五日少二十一至三十者枷兩月少三十一至四十者枷七十五日以上各鞭一百少四十以上枷三月鞭一百發遣捕牲烏喇充當牲丁每三羊三年孳生二羊少一羊者牧丁責一鞭少十五羊者五羣領催責二鞭少三十羊者十羣長責二鞭少百羊者照例合計治罪外少一百五十者牧丁枷一月少二百者枷四十日少二百五十者枷五十日少三百者枷兩月少三百五十者枷七十日少四百者枷八十日少四百五十者枷三月少五百者枷百日以上各鞭一百少五百五十以上枷百日鞭一百僉妻子發給捕牲烏喇牲丁為奴少千五百者將十羣長照例合計治罪外少二千枷一月少二千五百枷四十日少三千枷五十日少三千五百枷兩月少四千枷七十日少四千五百枷八十日少五千枷三月少五千五百枷百日以上各鞭一百少六千以上枷百日鞭一百革退十羣長充當牧丁四十八年議準嗣後游牧牛羊羣於定額内不準闕少闕少者從重治罪其三年一次均齊議行賞罰之例槩行停止凡有額外孳生者該總管察明奏聞雍正六年奏準捕牲烏喇見存牛二百十有八頭亦照牧羣之例每三牛閱三年取孶生牛一頭令直年官報府如有闕少照例治罪十三年奏準停遣烏喇直年官毎年孳生牛由該總管呈報乾隆五年議準内三圏所養乳牛之牛犢如有倒斃由司確勘按月呈堂存案統計一年出入牛犢百頭内額準倒斃五十頭按三箇月覈算呈堂注册如逾額倒斃十頭以上記過一次二十頭以上記過二次再逾者按十頭之數遞加覈計如倒斃未及額數一半者記功一次並無倒斃者記功二次外三圏乳餠圏所養乳牛之牛犢如有倒斃亦統計一年出入牛犢百頭内額倒斃三十頭按三箇月覈計呈堂注册如逾額倒斃五頭者記過一次再逾者按五頭之數遞加覈計如倒斃未及額數一半者記功一次並無倒斃者記功二次以上内外牛圏均扣至一年彙報功過有功一次準抵過一次其記過之廐長由堂辦理廐副以上由司責處記功者酌量保舉以示鼓勵果繫時疫災傷由司勘實注册免議六年議準凡隨圍出外備往乳牛之牛犢令本司扈從官嚴飭廐長等加意餧養如有倒斃損傷别行記過如果塗遇寒暑以致倒斃亦由本司扈從官確勘囘京之日呈堂注册一交納官物康熙二十三年議準凡圏内全耳騸牛如有倒斃均令瘞埋乳牛騸牛靑牛牡牛牛犢遇有倒斃牛皮移交武備院每月尙膳房用過羊及倒斃羊皮均移交廣儲司倒斃牛羊肉據奉宸苑咨文交景山暢春園圓明園等處餧虎及餧鷺鷥如奉文停止牛肉瘞埋羊肉由廐長分别一二等羊定價變賣銀交廣儲司又議準張家口外牧羣所有老疾不堪牧養之牛羊該總管察明具奏到日移咨吏部委各部院家道殷實司官前往該處變賣事竣奏聞以所變價銀交廣儲司四十二年奏準張家口外牛羊羣每羣給牡馬一騍馬二不準倒斃於三年均齊時每羣交孳生駒一四十五年奏準達里岡崖羊羣亦照張家口外例每羣給馬取孳生五十年覆準游牧各羣額外孳生牛羊及老病不堪餧養者均令變價銀交廣儲司又議準凡内羊圏外羊羣歲於春秋二次剪羊毛送交武備院又覆準張家口外牧羣每年倒斃牛羊皮該總管呈報到日武備院廣儲司各委官一人率領催匠役前往會同稅務監督於倒斃牛羊皮内揀選堪用者酌量應用額數令該監督雇車運送至京五十八年奏準張家口外游牧處開墾地二十六頃每畝歲交穀一斗雍正元年覆準游牧處開墾地畝尙多除應交榖二百六十石外再加穀二百四十石共為五百石每穀二石折米一石共應交米二百五十石於下堡城内建倉收貯四年議準停止委官率領催匠役往張家口外揀選牛羊皮令稅務監督會同該總管揀選運送至京是年該總管奏請仍照舊例令庫官率領匠役等出口揀選皮張奉旨仍令該總管會同稅務監督量一年足用揀選佳者交送又議準毎年額交武備院牛皮三百張小牛皮一千五百張犢皮二百張所交廣儲司羊皮視其倒斃之數擇佳者盡數交送無定額五年奏準毎年張家口外除交送牛羊皮外餘剰牛皮均令變價交廣儲司餘剰羊皮賞給看守牧羣之窮苦䝉古其倒斃牛羊皮内如朽爛牛皮五張羊皮八張者牧丁責十鞭領催八鞭十羣長五鞭多者按數遞加不過百鞭如朽爛牛皮至二百張羊皮至八百張者總管副管有品級協領等各罰俸六月無品級協領鞭三十加一倍者總管等各罰俸一年無品級協領鞭五十再加一倍者總管等各降一級無品級協領鞭六十六年奏準下堡城内收貯之米準其借給無力䝉古秋收徵還乾隆二年奏準游牧處歲徵米二百五十石歸幷萬全縣倉收貯仍準借給䝉古秋收還倉五年奏準游牧處地畝遇有災荒亦照戸部之例蠲免十五年奏準每年春季二歲以上羊每隻剪毛六兩新生羊羔剪毛二兩秋季除齒老殘疾生羔母羊並新生羊羔不剪外其二歲以上羊每隻剪毛五兩交納仍令該總管每年將春秋二季所有羊數及交過羊毛數目造具清册呈報付司察覈如於定額闕少將該總管副管協領等分别叅處一奏銷康熙二十三年定毎年内外十三圏出入牛羊數目於次年二月内呈堂繕本題銷四十八年議準游牧牛羊羣每年額外孶生數目據該總管具奏以交司日起限一月之内奏銷欽定大清會典則例卷一百六十五
