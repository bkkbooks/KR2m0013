body:
  text: 理藩院理刑清吏司一名例國初定邊内人在邊外犯罪依刑部律邊外人在邊内犯罪依䝉古律八旗游牧䝉古牧場人等有犯均依䝉古律治罪又定凡罰以九論者馬二犍牛二乳牛二㸬牛二嵗牛二犙牛三嵗牛一以五論者犍牛一乳牛一㸬牛一犙牛二又定凡罪應罰牲畜而言無有者三九以上擇令其旗内大員設誓一九以下令其佐領設誓又定凡犯罪應罰稱無牲畜者令佐領或於佐領内擇一人設誓後有隱瞞發覺者仍将其牲畜罰取設誓之人罰一九又定凡王貝勒貝子公額駙協理旗務台吉不令設誓於其旗台吉内擇令一人設誓又定凡罪罰牲畜少一數者鞭二十五二數鞭五十三數鞭七十五四數以上罪止鞭一百又定凡罪罰牲畜交該盟長扎薩克等照數追取賞給旗内實心効力之人仍将賞過牲畜報部察覈又定受犯人所罰牲畜者其扎薩克使人取㸬牛一被罰牲畜人之扎薩克使人於十畜内取一二十内取二三十内取三此外不準多取又定凡取罰牲畜夲主計九數取一不足九者不取又定凡首告者於所罰牲畜内取一半給之康熙二十六年定凡食俸之䝉古王貝勒貝子公台吉官員有犯私罪應罰取馬匹牲畜者照常罰取若犯公罪律應罰馬匹牲畜者皆視所犯之罪罰其俸幣無俸者仍罰馬匹牲畜又定凡犯罪兩造勿得私和如私自議結有職者罰三九庶人罰一九著伊旗扎薩克使人至罪人之扎薩克處㑹議遲至二日不使人者計日将扎薩克罰㸬牛一每二日罰㸬牛一罪未結之前不騎烏拉不與供給罪已結給罰之時議騎罪人旗烏拉與以供給授罰牲畜之扎薩克使人勿論㡬九牲畜所取不得越於三數此外給扎薩克禮馬一匹受罰牲畜之扎薩克使人勿論㡬九止取㸬牛一十日内不全給所罰牲畜者罪人之旗繫王罰馬十匹貝勒貝子公等罰馬七匹台吉罰馬五匹即於彼牧場内拏取如将拏取之馬搶奪者将情由聲明報部除搶奪所罰王貝勒等之馬匹及罪人應罰之馬匹牲畜照數追取外王貝勒等皆罰俸三月又定凡首告人罪不令出首之人設誓令被告設誓又定凡出首人罪之人及罣誤之人有應於夲旗内聽其情願歸投者不準歸投管旗之王貝勒貝子公協理台吉及伊等之子孫名下於不管旗之王貝勒貝子公閒散台吉内任其擇主歸投又定凡不招承應死重罪又無證據槩為疑獄令設誓完結又定凡䝉古毆人至死應擬絞者遇赦免罪於免罪之人追罰三九牲畜給死者親屬又定凡犯死罪於事未發覺之前來部首控者免死鞭一百并妻子發遣鄰境給與効力之台吉等為奴畜産給與事主又定凡收贖䝉古死罪人犯令給九九馬準贖贖其妻子者聽由兩造家主如䝉古人犯死罪事闗内地民人者其妻子向無給内地民人之例欲贖此等罪人視其妻及十嵗以上子女數目各取二九牲畜妻子一并令贖如不贖妻子其罪人亦不準贖又定盜犯未至十嵗者不以盜論又定台吉官員等袒䕶賊盜設誓後原贓發覺稱非袒䕶賊盜發誓不承認者令其伯叔設誓如不設誓台吉罰五九官員及十家長罰三九又定凡籍没盜犯之畜産如事主繫喇嘛不準給主按法罰取盜旗人民人牲畜正法之犯人妻子亦不準給事主皆賞給䝉古内公務効力之台吉為奴乾隆六年定䝉古王等犯公罪應罰馬百匹或九九牲畜貝勒貝子公等應罰馬七十匹或七九牲畜台吉等應罰馬五十匹或五九牲畜者皆定為罰俸一年王等若應罰馬四十匹或五九牲畜貝勒貝子公等應罰馬三十匹或四九牲畜台吉等應罰馬二十匹或三九牲畜者皆定為罰俸九月王等若應罰馬三十匹或二十匹或三九牲畜貝勒貝子公等應罰馬二十匹或十五匹或二九牲畜台吉等應罰馬十匹或一九牲畜者皆定為罰俸六月王等若應罰馬十匹或一九牲畜貝勒貝子公等應罰馬七匹或一七牲畜台吉等應罰馬五匹或一五牲畜者皆定為罰俸三月如繫私罪及所犯雖公而無俸者仍依夲罪罰其馬匹牲畜二十七年議準嗣後罪罰牲畜除夲案具題者毋庸議外其照例罰取並未題奏之案扎薩克等将一年内罰過牲畜若干於某項公事効力人員賞給牲畜若干之處詳細造冊報院年終彚奏一次一盜賊國初定失去牲畜過三日禀明附近扎薩克緝捕若不禀明緝捕每牲罰羊一冒認亡失牲畜者罰三九錯認者罰一九因無失主隱匿者罰一九收騎遺失牲畜者罰一五又定遺失牲畜行人勿得擅取取者以盜論為人收留失羊過一宿者二十以下準取一羊多則每二十取一給與收留之人又定窩隱盜賊者王罰九九扎薩克貝勒貝子公罰七九台吉罰五九台吉為盜者罰七九若事發不承認者令其伯叔設誓無伯叔令伯叔之子設誓但知盜情而不首者王罰三九扎薩克貝勒貝子公罰二九台吉罰一九又定賊已發覺王等不行拏解致疎脱者以窩盜論康熙四年題準外藩䝉古各旗佐領下有為盜者該佐領罰二九驍騎校一九領催一七十家長鞭一百罰一九佐領下有盜二次者佐領罰二九驍騎校罰一九皆革職領催鞭一百罰一九革役十家長鞭一百籍其家一叅領下有盜三次者叅領罰三九一旗下有盜三次者管旗王貝勒貝子公等各罰五九都統副都統各罰三九所屬人為盜者該王貝勒貝子公台吉各罰三九庶人家奴為盜其主罰一九王以下若能嚴察所屬将為盜人拏解者免罪仍給所罰之半若失於稽察被他人拏獲者都統以下所罰並給之王等所罰入官八旗游牧察哈爾䝉古人為盜被獲二次者該總管罰三九副管及佐領各罰二九驍騎校領催十家長等咸照外藩例科之牧場人為盜其牧長亦照佐領治罪五年題準外藩地方有夥刦喀爾喀馬匹等物者除照例治罪如數賠還外共罰給一九所餘家産妻子入官若喀爾喀人多報失物令其設誓照數賠給不設誓止賠見在之數若喀爾喀人夥刦内地者為首一人斬二人以上斬一人餘人鞭一百罰該夲主一九移文令其送至又定台吉為匪為盜者即革去台吉為庶人将馬匹牲畜取回給與被盜之人将其所屬人丁徹出給與近支兄弟該扎薩克照疎忽例議處若為匪之台吉仍不悛改復為匪者該扎薩克即充作奴僕服役若改過不復為匪三年後該扎薩克将情由報院轉奏復給台吉原銜六年題準捉獲盜賊不報院私議完結者以盜論所罰牲畜給首告人管旗王以下至十家長一并治罪又定凡䝉古偷盜他人馬駝牛羊四項牲畜一人盜者不分主僕絞決二人盜者一人絞決三人盜者二人絞決糾衆夥盜者為首二人絞決為從者皆鞭一百罰三九其正法盜犯之妻子畜産皆籍没給事主十六年題準在邊界禁地偷竊刦奪被獲者該管王貝勒等以下並該夲主嚴行治罪若不獲将所入汛地該管王貝勒治罪兼令賠償竊奪之物十七年題準旁人捉獲盜馬賊者所籍没家産牲畜以一分給之一分給事主又定王貝勒等諱盜者無論管旗不管旗各罰俸一年無俸之台吉各罰五九又定凡被盜牲畜務将數目毛齒及失事月日報明扎薩克存案日後有一不符及並未報明存案者皆不準行又定凡被盜牲畜夲主認出有言他人所給者即令其人對質其人不承認即令原人設誓如設誓不治罪但将所認牲畜還夲主又定被盜馬匹在圍場軍前認識其人别有所得情由者别給以馬将所認之馬取回又定偷盜牲畜被旁人邀獲者一牲給價二牲以上十牲以下者給一牲多則每十給一事主稱非被盜而不給者令佐領驍騎校設誓設誓者不取價否則取價若並未邀獲賊物詐取發覺者其詐取之人以盜論又定偷宰牲畜遺去旁人收取其肉者即令賠補原贓踪跡在界内令管旗都統設誓如不設誓者治以罪又定凡失去馬匹訪有踪跡而無見證者不令設誓行人若於曠野失去並無見證跟踪追尋經過村荘則取見證又定凡失去牲畜於舊游牧處訪有踪跡雖經他往游牧仍令設誓又定凡踪跡去人居處一箭之内者令其設誓過一箭者無庸設誓又定凡搜檢須同見證不容搜者以盜論又定被盜牲畜因人潛來密告認出原物即将藏牲畜者以盜論又定凡被盜之人因人密告具控者務将其人姓名指出所告屬虚或别經尋獲罰密告之人三九牲畜令前設誓之台吉及被誣之人平分罰具控人三九牲畜全給被誣者又定凡偷盜金銀器皿及皮張布匹並衣服食物均按數賠補所盜物件至二嵗牛價者罰三九至羊價者罰一九未至牛價者罰一九未至羊價者罰犙牛一又定盜豬狗者罰牲畜五盜雞鵞鴨者罰犙牛一仍追賠所盜物件二十二年題準外藩䝉古人入内地為盜者事發令賠所盜物仍籍其妻子畜産入官四十四年奉㫖前此數年口外偷馬之事斷絶今又有盜者殊屬可惡将此為從賊人皆解進京給與大臣之家為奴又覆準偷馬為從賊盜仍留在外必復為賊應将伊等夲身妻子及正法為首賊盜在逃為首賊盜之妻子皆令解送内務府其踈脱賊犯之驍騎校皆着來京當苦差行走雍正元年諭偷盜一二牲餼即将䝉古立絞人命重大嗣後應改為擬絞監候暫行一年若䝉古盜案從此漸少則照此例行倘比往年較多則照原定之例擬罪欽此四年奏準八旗游牧察哈爾及各牧場馬羣内差出捕盜兵丁若拏獲盜犯即将盜犯所騎之馬給與原拏之人拏獲三次之後繫䕶軍於䕶軍校驍騎校内列名驍騎選取䕶軍閒散選取驍騎牧場馬羣人等亦竢有應升之闕録用若行竊之人繫承緝兵丁之親屬而瞻徇不拏照隱匿盜賊例治罪五年奏準凡盜四項牲畜為數無多情節甚輕者擬絞監候仍籍没畜産給付事主其妻子暫留該旗竢夲犯減等僉解鄰近盟長給効力台吉為奴又定凡官員庶人夥衆或一二人行刦致殺人者不分首從斬梟傷人已得財者不分首從斬決妻子畜産皆籍没給付事主若止傷人未得財者為首擬斬監候畜産給事主妻子暫寄該旗竢夲犯減等僉發鄰近盟長給効力台吉為奴為從盜犯籍没畜産給付事主外并妻子僉發鄰近盟長給効力台吉為奴又定一人行刦未至殺傷人者将夲犯妻子畜産一并解送鄰近盟長給効力台吉為奴如二三人以上将起意一人擬絞監候籍没畜産給付事主妻子暫寄該旗竢夲犯減等僉發鄰近盟長給効力台吉為奴為從盜犯妻子畜産一并解送鄰盟長給近効力台吉為奴又定凡盜賊被事主或旁人追趕致拒捕殺人者為首斬決妻子畜産籍没給付事主從犯並妻子發遣南省給駐防兵丁為奴畜産給事主傷人不致死者為首擬斬監候畜産給事主妻子暫寄該旗竢夲犯減等僉發鄰近盟長給効力台吉為奴從犯並妻子畜産解送鄰近盟長給効力台吉為奴乾隆五年議準嗣後一二人盜牲畜者仍照前例若三人以上偷盜者只将起意之一人為首餘皆以為從論若偷盜之際分路而行或偷盜二三處或前後偷盜數次者各按其情節分别首從治罪又定官員庶人或一二人夥同搶奪物件殺人傷人或偷竊牲畜等物被事主人等知覺追赶以致殺人傷人者舊例不分首從皆斬妻子牲畜給與失主但未分别强竊似覺未協嗣後除行强之盜案仍不分首從外其偷竊牲畜以致殺傷人者将為首一人擬斬立決從犯擬斬監候家産牲畜仍追給事主七年定嗣後八旗㳺牧察哈爾䝉古偷盜牲畜及犯别項罪名者皆照䝉古律例如䝉古律例所未載再照刑部律例辦理十四年奏準䝉古地方均繫游牧並無牆垣易於偷竊是以定例綦嚴但䝉古一切衣食等物大半買之於内地内地人持貨赴邉日積月累迄今歸化城八溝多倫諾爾數處所集之人已至數十餘萬今䝉古偷竊内地人牲畜皆照䝉古律擬絞内地人偷竊䝉古牲畜仍依内地竊盜計贓治罪䝉古内地人相聚一處情同罪異殊未平允嗣後内地人如在邉外地方偷竊䝉古牲畜者照䝉古例為首擬絞監候為從議罰三九又定䝉古偷竊四項牲畜為從之犯發遣鄰近盟長雖屬定例但此等不肖䝉古妻子家産仍在一處䆒亦罔知畏懼徒有益於鄰近盟長按喀爾喀行竊從犯既改為鞭一百罰三九牲畜給與事主人犯仍留夲旗嗣後各䝉古行竊為從之犯皆照此例行将發遣鄰近盟長給台吉為奴之處停止一疎脱罪囚康熙二年題準死罪犯人脱逃者收管官罰三九驍騎校革職罰二九領催鞭一百兵丁鞭八十若非死罪犯人脱逃者收管官罰二九驍騎校罰一九領催鞭八十兵丁鞭五十如被旁人拏獲即以所罰牲畜給之無拏獲人給扎薩克王貝勒等十三年定刦奪死罪犯人者不分首從皆斬刦奪非死罪犯人者為首人罰三九餘人各罰一九一發塜康熙十三年題準發掘王貝勒貝子公等墓者為首一人擬斬監候妻子家産籍没餘人各鞭一百罰三九發掘台吉墓者為首一人擬絞監候餘人各鞭一百罰二九發掘官員墓者為首一人鞭一百罰三九餘人各鞭一百罰一九發握庶人墓者為首一人鞭一百罰一九餘人各鞭八十罰一九所籍没家産所罰牲畜皆給墓主一違禁採捕康熙十七年題準外藩䝉古王公主郡主等所屬人私向禁地盜採人參者為首擬斬監候妻子家産牲畜並所獲皆入官為從鞭一百家産牲畜並所獲入官妻子免其籍没王公主郡主以下台吉以上遣屬下人往者各罰九九都統以下驍騎校以上遣家奴往者皆革職領催十家長正户遣家奴往者鞭一百革去領催十家長各罰一九所遣家奴夲身妻子家産牲畜並所獲皆入官遣正戸人往者管旗王以下十家長以上皆照遣家奴例治罪正戸人及家奴偷採人參其該管與家主不知情者皆鞭一百罰三九旁人首發者交戸部照入官之參折半價給賞私買私賣者繫䝉古鞭一百罰一九又定私入禁地採參捕貂被獲其主明知故遣者不分王貝勒貝子公台吉皆罰俸九月無俸之台吉及官員庶人皆罰三九所獲參貂入官車及牲畜均賞給旗下効力之人又定王公主郡主等所屬旗人及家人捕牲人有私赴禁地採參捕貂被獲者財主及為首之人皆擬絞監候家産牲畜籍没為從者正戸鞭一百罰三九家奴枷兩月鞭一百罰其主三九見獲參貂盡行入官又定凡偷採參貂私行買賣被旁人拏獲者将參貂交納戸部買者賣者各鞭一百罰一九賞給拏獲出首之人又定王以下庶人以上有往黑龍江𤓰爾察索倫買貂明知違禁遣人邀取販賣者王貝勒貝子公台吉罰俸一年無俸之台吉罰五九官員庶人罰三九攜商私往為首者擬絞監候為從者罰三九所擕價夲入官乾隆四年議準拏獲圍場内偷捕牲畜之犯若繫䝉古交八溝理事同知初犯再犯皆鞭一百三犯罰一九毋庸送部六年奏準偷捕圍場内牲畜者初犯枷一月再犯枷兩月三犯枷三月令在圍場附近地方示衆滿日皆鞭一百繫䝉古交扎薩克嚴行約束十年奉㫖此彚奏在圍場内私行採捕之案皆民人及察哈爾䝉古並無扎薩克䝉古可見附近圍場之扎薩克等平素留心公事能将所屬人等嚴加約束殊屬可嘉著傳諭奨勵俾益加勉力再察哈爾總管及同知等平素疎忽不嚴行管束所屬並交部察議十三年奉㫖從前拏獲偷入圍場射獵樵採之人由該總管送部治罪後因設立地方官将此等人犯停止送部即交地方官辦理但禁約圍場究與地方官無渉嗣後如有鬭毆辭訟等事照常令地方官辦理完結外倘圍場内有偷入射獵樵採等事該總管拏獲時仍照舊例送部治罪即交該地方官轉行解部嵗終該總管将拏獲數目報部彚察二十七年議奏圍場禁地向例拏獲賊犯分别初犯再犯三犯遞加枷號殊不足以示懲如嗣後有犯除偷採蔬果及割草者仍照定例辦理外其盜砍木植偷打牲畜之犯審繫初次二次發往烏魯木齊等處種地犯至三次即發烏魯木齊等處種地兵丁為奴地方同知通判等官照約束不嚴例降一級調用道員照失於查察例罰俸一年該總管照兼轄官例降一級留任該扎薩克照疎忽例加一等罰扎薩克俸一年協理台吉罰俸九個月無俸者罰牲畜七見獲偷木民犯十一名打鹿民犯四名及應議各官即照此例辦理奉㫖旗民私入圍場盜伐木植偷打牲畜及防範不嚴之該地方䝉古扎薩克等自應照見定之例懲治但此次拏獲賊犯及應議各員尚在未定新例之前俱着從寛照舊辦理嗣後有犯即照新例定擬傳諭䝉古扎薩克等知之一人命國初定外藩䝉古鬭毆傷人目折人手足致成殘疾者罰牲畜三九平復者罰一九傷孕婦致墮胎及毆損人齒牙者各罰一九斷人髮辮及帽纓或以鞭桿毆人者各罰牲畜五互毆有傷相等者無罪順治十五年題準鬭毆傷重五十日内死者将毆人之犯擬絞監候又題準夫故殺妻者擬絞監候康熙五年題準射砍家奴割截耳鼻者王罰五九貝勒貝子公罰四九台吉罰三九職官罰二九庶人罰一九賞給被傷家奴致死者以故殺論又定王等以刃刺殺所屬人及家奴並故殺仇殺醉殺者罰馬四十匹貝勒貝子公罰馬三十匹台吉罰三九牲畜死者親屬一并開出賞給所罰於旗内聽所欲往投主若無仇隙誤傷致死者報明情由不報者王等各罰俸九月無俸之台吉等仍罰三九入官死者親屬不準開出都統副都統殺死家奴者罰三九叅佐領驍騎校罰二九庶人罰一九皆給死者親屬聽所欲往投主誤傷致死者於扎薩克處報明情由不報者仍按數罰牲六年題準奴僕弑家主者凌遲十三年題準因戲誤傷人致死有人見證者罰三九無見證可疑者令其設誓設誓者罰三九不設誓者擬絞監候又題準官民人等與妻鬭毆誤傷致死者罰三九給妻家妻有罪不報明而擅殺死者罰三九入官又題準故殺他旗之人及謀殺仇殺者除償人外王罰馬百匹貝勒貝子公七十匹台吉五十匹給死者親屬庶人為首擬斬為從擬絞各監候皆籍没家産牲畜給死者親屬為從不加功者夲身並妻子家産牲畜皆解送鄰近盟長給効力台吉為奴又題準為首迎殺投到之逃人者官擬絞庶人擬斬各監候為從者罰三九一失火國初定因熏野獸窟穴致失火者罰一九給見證人延燒致斃人者罰三九給死者之家其餘失火者罰牲畜五給見證人延燒致斃人者罰一九給死者之家延燒致斃牲畜者照數賠償康熙十三年題準挾仇放火致斃人者官擬絞庶人擬斬各監候除妻子外皆籍没畜産給與事主致傷牲畜者官革職庶人鞭一百除妻子外畜産皆給與事主乾隆十八年覆準嗣後凡内地民人出口貿易不戒於火致延燒牧場者皆照䝉古熏野獸窟穴失火例罰取牲畜無牲者比照牲畜折價罰銀一犯姦順治十三年議準王等姦人妻者罰九九貝勒貝子公等罰七九台吉官員庶人等罰五九皆給與夲夫以他人之妻為妾者罰三九與主母私通者姦夫凌遲姦婦斬決将姦夫妻子没為家奴服役一畧賣康熙二十二年定凡䝉古人将内地男婦子女誘騙販賣或為妻妾奴婢者不論良賤己未賣成如被誘之人不知情将為首誘人者擬絞監候為從者鞭一百罰牲畜三九被誘之人不坐若被誘之人知情為首鞭一百罰牲畜三九為從及被誘之人各鞭一百又定䝉古人誘騙良人為妻妾子孫奴僕販賣與人者不論已賣未賣皆鞭一百罰三九被誘之人知情鞭一百一雜犯國初定帽緯長出帽檐及戴卧免帽剪開檐毡帽脇間擊髮囊皆繫違禁被人見者王貝勒等罰馬一匹庶人罰犙牛一又定庶人在王前明出惡言者罰三九犯扎薩克貝勒貝子公等罰二九犯台吉等罰一九雖非面言而審實者亦坐詬罵都統者罰一九犯副都統罰七犯叅領罰五犯佐領罰三又定扎薩克所遣人貝勒等擅責罰三九庶人擅責罰一九又定凡挾仇首罪而取牲畜者王罰三九貝勒貝子公罰二九台吉罰一九仇取牲畜給還原主随所願處遣往又定外藩䝉古以他日為嵗朝者王罰一九扎薩克貝勒貝子公罰七台吉罰五庶人罰馬一皆給與出首之人又定射砍他人牲畜致死者除抵償外罰一九致死馬者加倍抵償未致死者罰犙牛一康熙十三年題準庶人雖在不管扎薩克事之貝勒貝子公台吉前明出惡言者亦照扎薩克例罰取牲畜十七年題準外藩各旗庶人冒稱台吉進貢者鞭一百驍騎校冒稱佐領進貢者革職仍各罰牲三九同來台吉知情冒賞者革去台吉罰牲五九二十八年定凡王貝勒貝子公台吉等出邉口除票内開載軍器外帶出金刃者各罰俸六月無俸之台吉等罰一九庶人有犯罰一五又定不令行人歇宿致凍死者罰一九未致死者罰㸬牛一令其歇宿而被盜者所失財物牲畜槩令房主賠償又定将行人所乘牲口以為伊所遺失而誤取者罰牲畜五給被取之人又定出痘病人歇宿人家或設法賣病因而傳染致死人者罰三九雖痊可罰一九如未沾染罰馬一匹又定凡有瘋疾之人令其祖父伯叔兄弟子姪親屬㸔守如無親屬令鄰舍里長㸔守如失於㸔守致傷人者鞭八十又定凡行兇之人不可留於夲旗者并妻子解送鄰近盟長給公事効力之台吉為奴一審斷國初定凡王等審理已決之事復行控告覆審無寃抑者罰妄告人一九扎薩克貝勒貝子公等所審者罰告人牲畜五官員所審者罰告人馬一匹又定凡辭訟令夲人控告若旁人代控及罪已審結夲人不告旁人代訴者皆罰馬一匹給原審人順治八年題準外藩䝉古人有訟赴各管旗王貝勒等處伸告若審理不結令協同㑹審旗分之王貝勒等公同審訊仍不結王等遣送赴院如未在王貝勒處伸告越次赴院者一槩發回康熙元年題準䝉古擬定死罪犯人由扎薩克審明報院由院㑹三法司定擬具奏其應監候秋後處決者照刑部秋審例㑹滿九卿議奏九年題準凡已結事件稱有寃枉者仍赴夲院告理又稱寃枉許赴通政使司鼓㕔告理十三年題準非扎薩克貝勒貝子公台吉等有犯照扎薩克貝勒等一例議處三十三年覆準山海闗外科爾沁土黙特等旗凡偷盜爭奪之事舊例皆由盛京刑部行文到院㑹審往返定議方得完結嗣後遴選應升䝉古旗員一人筆帖式二人令往盛京居住除人命大案確審取供咨部具題外一應細事即㑹盛京刑部審結其有與口外扎薩克㑹審與該将軍㑹審之事並令一并審結毋得遲延雍正二年議準䝉古人告状必列姓名方與準理若誣告者原告及見證皆罰三九又定䝉古王等以下庶人以上因爭戸口致訟雍正元年以後者審理雍正元年以前者不準審理又定凡提拏大盜不給以致脱逃者王貝勒貝子公台吉等皆罰俸一年無俸之台吉等罰牲畜五九又定凡捕獲盜賊送該扎薩克處收禁若在盛京及歸化城等處拏獲者即在犯事處收禁該扎薩克率領㑹審之台吉審訊乾隆六年議準凡應擬斬絞監候之䝉古等繫科爾沁扎頼特杜爾伯特郭爾羅斯十旗喀喇沁三旗土黙特兩旗扎魯特兩旗敖漢王旗分柰曼王旗分喀爾喀左翼旗分者送八溝理事同知監禁巴林兩旗阿霸哈納爾兩旗翁牛特兩旗烏朱穆秦兩旗阿霸垓兩旗蘇尼特兩旗蒿齊忒兩旗阿禄科爾沁貝勒旗分克西克騰扎薩克台吉旗分及喀爾喀土謝圖汗部落十九旗車臣汗部落二十一旗厄魯特郡王旗分貝子旗分者送多倫諾爾理事同知監禁鄂爾多斯七旗歸化城土黙特兩旗呉喇忒三旗喀爾喀右翼旗分毛明安扎薩克台吉旗分四子部落王旗分喀爾喀超勇親王部落二十一旗扎薩克圖汗部落十五旗者送歸化城理事同知監禁又議準凡在多倫諾爾地方䝉古民人互訟事件令該同知㑹該旗審擬完結凡八旗游牧察哈爾命盜重案呈報刑部㑹院完結其喀爾喀扎薩克各旗䝉古命盜重案呈院完結至商民事件仍由口北道轉報該督完結七年議準八旗游牧察哈爾命盜案件如兇犯盜犯屍親失主皆繫䝉古並無内地民人者令該總管等就近㑹同知通判審明定擬鞭責輕罪照例發保徒流以上罪犯即交該同知通判等收禁一面報部一面将鞭責之犯先行發落竢院㑹刑部等衙門奏準之後将應決之人犯即於犯事處正法軍流以下人犯照例折枷完結其定擬斬絞監候之犯並令嚴行監禁秋審時該總管造具年貌清冊報部若䝉古内地人交渉命盜案件該總管委官㑹該同知通判審明定擬應保出者準其保出應監禁者交該同知通判等收禁繫直隸民人該同知等即呈報口北道該按察使總督該督覆覈具題繫山西民人即呈報歸綏道該按察使巡撫該撫覆覈具題仍各咨該總管存案若所定之罪與該總管意見不同亦著申文報部竢刑部㑹夲院詳加改正定擬覆奏立決人犯於犯事處正法軍流以下照例完結監候人犯仍令該同知通判監禁秋審時由該督撫詳察具奏十一年議準八旗游牧察哈爾䝉古應入直省秋審之犯令該同知等於每年四月初旬察明各犯年貌旗分佐領及犯罪原由出具切實看語申送該督撫覈題免其提審以省拖累再口外䝉古人犯分定旗分解送多倫諾爾等處各同知監禁者原指各旗自行審理案犯而言至沿邉理事同知通判均有辦理䝉古内地民人之責所有承審人犯自應夲處監禁不得藉辭解送十二年議準八旗游牧察哈爾䝉古民人交渉事件仍㑹同知通判等審理如案犯專繫䝉古與内地人無渉者應令各總管自行審理又議準八旗游牧察哈爾䝉古偷盜牲畜擬絞減等之犯正身䝉古照旗人例折枷家奴仍照舊例發鄰近盟長給効力台吉為奴十五年議準八旗游牧察哈爾左翼四旗䝉古與民人交渉之案在鑲黄旗地方犯事附近張家口者即歸張家口同知收禁在正白旗地方犯事附近獨石口者即歸獨石口同知收禁在鑲白正藍二旗地方犯事附近多倫諾爾者仍歸多倫諾爾同知收禁二十六年覆準白都訥地方辦理䝉古命盜案件毋庸專派司官由院於筆帖式内遴選辦事好通曉䝉古語者一員引見以委署主事遣往三年一次更換三年内辦事果好準船厰将軍保題坐補主事倘有劣跡即叅奏治罪派出之員令其馳驛來往遇有大事㑹同該将軍審理日支廪給銀照庫倫等處減半定為七錢五分於該處地丁銀内支銷一限期乾隆五年奏準設立督催所每月各司所辦事件将已完未完造冊覈對並送稽察院務之科道察覈夲院仍照六部之例三月彚奏一次二十七年議準夲院行文移詢事件不得概作已完於冊内聲明竢覆到辦結後方準開除至行文去處逺近不一若不酌定限期難以稽察除新舊各回部及都爾伯特烏里洋海等處地方較逺難以定限行令遵照見行事例速辦外如内扎薩克與喀爾喀諸部落有奉㫖特交及事闗具奏者無論限期文到即行辦理仍将奉到日期及辦結起行交發驛站日期聲明報院遲延有因者免議其無故任意遲悞者将扎薩克等叅奏分别察議至平常事件内扎薩克定限四個月喀爾喀等定限六個月無故逾限者将扎薩克照例察議該司官不遵照定例行催及督催所官遺漏不能察出者由院叅奏交部察議銀庫一職掌康熙四十六年設立銀庫並鑄給理藩院銀庫闗防設郎中一人員外郎一人司庫一人筆帖式二人庫使四人郎中員外郎由各部院司官内遴選保送吏部引見補授司庫筆帖式庫使由戸工二部司庫筆帖式庫使内選委仍各兼夲任行走雍正元年因夲庫郎中員外郎同時奉差辦事乏人奏請照例遴選引見令其専任庫務停止兩處行走奉㫖見今未届䝉古來京之時雖除賢能司官並無事可辦若除尋常司官又無裨益著除身家殷實之御史令其兼理又奏準庫使四人裁二人司庫筆帖式仍照舊額司庫由吏部於應升人員内選補筆帖式由吏部銓補庫使由吏部考取十一年覆準御史與司官同辦庫務易於通同瞻徇嗣後在庫行走之御史停其管理錢糧令其稽察弊竇以専責成其管理庫務司官向於各部遴選二人今不拘郎中員外郎定為二人均由夲院司官内遴選引見補授每三年一次更代一主守書吏一人皂隸三人婁軍五人其皂隸三人一由夲院婁軍及工部皂隸婁軍内撥充其二皆隸夲庫行走看守旗員二人兵二十名均由正藍旗滿洲咨送一支領康熙四十年奉㫖䝉古王台吉等來京除餧養馬駝外一應日用廪給及薪芻等物均照部定價直折銀統計一年所需若干著理藩院照數支給又議準每次支領廪給銀五萬兩薪芻銀五千兩均於戸部庫内給發量其将完先行具奏如前支給其等次詳見廪給則例視館中人數多寡一年或一次或二次支銀不等乾隆二十七年奉㫖停止餧養馬駝一例折給銀兩一奏銷康熙四十六年定每月将在内行走及到來之䝉古王台吉等發過廪給銀若干薪芻銀若干各具一摺奏聞每年十一月起至次年十月止将一年所發廪給薪芻細數及王台吉姓名造冊二夲進呈並将舊管新收開除實在銀數彚疏随冊奏聞雍正九年奉㫖爾院領催人等此二年來差遣甚多宜加優䘏嗣後務按道里之逺近事之緩急自五十兩至十兩編為等次酌量給銀以為行装之費三月一次彚題並将去嵗至今之出差領催人等察明補給乾隆五年奏準領催等差往附近地方自二月至七月不準給銀八月至正月給銀十兩差往䕶送三省駐防兵丁前往軍營者給銀二十兩送八旗游牧察哈爾駐防兵丁及差往鄂爾坤止霜者均給銀十兩每年差往法庫西勒圖庫倫等處送果品與喇嘛者給銀三十兩騎官馬無行糧之差給銀十兩差往哈密𤓰州西寧打箭鑪青海等處者二月至七月給銀十兩八月至正月給銀二十兩差往軍營及恰克圖庫倫等處者亦如哈密等差之例差往喀爾喀地方在沙漠以内者二月至七月不給銀八月至正月給銀十兩在沙漠以外者二月至七月給銀十兩八月至正月給銀二十兩差往内地扎薩克程逾千里有行糧者不給銀有應給者仍以道里逺近事之緩急時之寒暑酌量給發每三月一次具奏以聞欽定大清㑹典則例卷一百四十四
