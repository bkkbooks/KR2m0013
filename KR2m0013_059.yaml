body:
  text: 禮部儀制清吏司嘉禮朝會一一御殿受朝天聰年間定元日行朝賀禮崇德元年定元日進慶賀表箋長至萬壽聖節進表慶賀與元日同惟長至不設燕又定每月初五十五二十五日皇帝御殿聽政順治八年定元日長至萬壽聖節為三大節又定歲遇三大節在外直省文武官均設香案朝服望闕行禮與京朝官同九年定每月初五十五二十五日皇帝御殿文武百官上朝一臨朝章服崇德元年定元日前三日起至第九日止上元節十四日起至十六日止各官咸朝服順治二年定元日前後七日王公百官咸朝服十一年題準上元前後三日王公百官朝服不理刑名不辦事遇有要務仍辦理康熙十年議準凡遇應具朝服補服日奏事官咸朝服補服違者本部指參十二年議準官員宜具朝服日而服不如制者罰俸一月十四年題準每月常朝日御殿行禮後羣臣入內奏事止具補服如不御殿仍具朝服其應具補服之日咸補服二十二年題準萬壽聖節前後七日羣臣咸朝服不理刑名照常辦事五十二年奏每年三月十八日恭逢萬壽聖節王以下文武百官朝服七日在暢春園蟒袍補服但今歲恭逢皇帝六十大慶非尋常可比應自三月初一日起至月終咸朝服蟒袍補服後每遇十年照此例行奉旨著自初一日至二十日乾隆元年諭嗣後御門聽政若遇逢五朝期各官咸補服奏事不必用朝服永著為令一陳設崇德八年定元日陳設鹵簿長至萬壽聖節同順治元年定鼎燕京御皇極門今太和門受羣臣朝鴻臚寺設御座於皇極門正中設表案於門東簷下九年定大朝常朝鑾儀衛陳鹵簿於太和殿前陳步輦於太和門外陳大駕於午門外陳馴象於大駕之南陳仗馬於丹墀中道左右均東西相嚮乾隆六年奉旨太和殿內所設筆硯案著於東邊居中安設御殿之日若有表則移案於西設表案於東若無表仍於東邊居中安設一樂懸崇德元年定元日慶賀奏樂長至萬壽聖節亦如之順治八年定大朝常朝教坊司設中和韶樂於太和殿東西簷下設丹陛大樂於太和門內均北嚮康熙八年定皇帝御座大朝奏元平之章常朝奏隆平之章還宫大朝奏和平之章常朝奏顯平之章均用中和韶樂王公百官行禮奏慶平之章外藩使臣行禮奏治平之章均用丹陛大樂大朝常朝同二十二年題準長至御座改奏遂平之章還宫改奏允平之章萬壽聖節御座改奏乾平之章還宫改奏太平之章餘如前一班位順治十八年定親王世子郡王長子貝勒貝子入八分鎮國公輔國公等在丹陛上序立康熙元年題準凡典禮上朝及常朝齊集不入八分公民公侯伯鎮國將軍都統子尚書第一班輔國將軍護軍統領副都統前鋒統領侍郎男步軍翼尉大九卿第二班奉國將軍一等侍衛護衛參領輕車都尉步軍協尉小九卿郎中第三班奉恩將軍二等侍衛護衛騎都尉佐領員外郎科道官第四班三等侍衛護衛雲騎尉鳴贊官主事步軍尉第五班護軍校驍騎校筆帖式第六班其次各照職銜不論加級違者察出送部議處十六年題準每朝期及大朝齊集滿官公侯伯鎮國將軍都統尚書左都御史子及凡一品官第一班輔國將軍護軍統領前鋒統領步軍統領副都統侍郎學士左副都御史通政使司通政使大理寺卿詹事府詹事男及凡二品官第二班奉國將軍步軍翼尉長史參領一等侍衛護衛太常寺卿太僕寺卿光祿寺卿祭酒通政使司副使大理寺少卿少詹事侍讀學士侍講學士侍讀侍講庶子洗馬鴻臚寺卿理事官郎中給事中監察御史太常寺少卿太僕寺少卿輕車都尉及凡三品官第三班奉恩將軍步軍協尉佐領司儀長二等侍衛護衛欽天監正內閣侍讀司業光祿寺少卿鴻臚寺少卿通政使司參議中允員外郎騎都尉及凡四品官第四班三等侍衛護衛雲騎尉步軍尉贊善欽天監副太常寺丞主事大理寺正光祿寺署正都察院經歷及凡五品官第五班護軍校驍騎校通政使司知事大理寺評事鳴贊司務司庫等各職掌官及六品筆帖式第六班七品官及七品筆帖式第七班八品官八品筆帖式第八班九品官第九班漢官尚書左都御史第一班侍郎學士左副都御史宗人府府丞通政使大理寺卿詹事第二班太常寺卿順天府尹太僕寺卿光祿寺卿通政使司副使大理寺少卿少詹事讀講學士祭酒庶子侍讀侍講洗馬太常寺少卿鴻臚寺卿太僕寺少卿順天府丞第三班通政使司參議大理寺丞中允贊善司業光祿寺少卿鴻臚寺少卿修撰編修檢討庶吉士給事中御史吏部司官五部郎中第四班五部員外郎宗人府經歷順天府治中欽天監正太醫院使光祿寺丞第五班五部主事都察院經歷都事理藩院判大理寺正欽天監副太醫院判太常寺丞京府通判京縣知縣兵馬司指揮欽天監五官正鴻臚寺丞大理寺副光祿寺署正第六班大理寺評事太常寺博士中書科中書內閣典籍撰文中書辦事中書各部司務大理寺司務通政使司經歷太常寺典簿京縣丞兵馬司副指揮鑾儀衛經歷詹事府主簿正字録事翰林院典簿待詔京衛經歷欽天監五官靈臺郎祠祭署奉祀等官第七班五經博士國子監丞博士典簿助教學正學録典籍理藩院知事欽天監主簿五官保章正太醫院御醫太常寺協律郎等八品官第八班理藩院副使太常寺贊禮郎鴻臚寺鳴贊等九品官第九班武職參將遊擊在三班守備等官在四班千總等官在五班隨旗上朝官照在部院衙門職掌品級其降級上朝官照所降品級部院衙門官有兼銜則從其銜之大者倘有不遵序次者由吏部禮部科道題參議處八旗官由都統送部參處如該管官徇情不察送者一并議處二十二年題準直省行慶賀禮將軍總督加將軍銜提督為一班巡撫副都統提督加左右都督銜乾隆十八年裁加銜總兵官為二班加都督同知以下銜總兵官協領參領巡鹽御史織造郎中督關郎中布政使按察使各道為三班佐領督關員外郎知府副將參將為四班防禦督關主事司庫同知通判遊擊都司為五班驍騎校知州知縣守備為六班有品級筆帖式有品級庫使經歷州同州判縣丞千總等官為七班滿洲蒙古漢軍官分兩翼漢官分文東武西雍正二年覆準漢官照八旗官分左右兩班將吏禮刑三部宗人府通政使司翰林院詹事府太常寺光祿寺鴻臚寺國子監吏科禮科刑科內閣中書欽天監太醫院分為左班將戶兵工三部都察院大理寺鑾儀衛太僕寺四譯館中書科戶科兵科工科行人司乾隆十三年裁順天府大興縣宛平縣五城兵馬司三營為右班均立於鑾駕之末聽贊唱依次排班行禮六年定盛京文武各官朝賀照在京文武官品級序定班次乾隆二年覆準以吏戶禮翰詹通政等衙門為左班兵刑工都察院大理寺等衙門為右班六年奏準行在恭遇萬壽聖節羣臣行禮班位王公大臣在網城內三品以下官在網城外七年覆準外省文官自督撫以下道府以上武官自將軍都統以下協領副將以上或入覲來都或奉調在京者如遇皇帝御殿之日各於吏兵二部先期報名咨送禮部都察院鴻臚寺或有事故不能行禮亦報明填注至期投遞職名一例入班行禮總督加尚書銜者列於六部尚書之末巡撫加侍郎銜者列侍郎之末加副都御史銜者列副都御史之末布按二司列小九卿之末道府列部郎之末將軍都統提督列都統之末副都統總兵官列副都統之末協領副將等官列參領之末十一年覆準六科班次隨六部分列左右吏科戶科禮科在左班兵科刑科工科在右班十七年覆準百官朝班舊例以文官無一品故尚書以下班皆越品今尚書侍郎已升一二品各官應皆依品列序毋許越次參差內惟少詹事翰林院侍讀侍講學士仍列三班庶子侍讀侍講國子監祭酒司經局洗馬改列四班中允贊善司業修撰編修檢討庶吉士改列五班其京營武職朝班及外省提鎮等官來京遇事入朝請照康熙二十二年所定直省武職望闕行禮班位提督二班總兵官三班副將參將四班遊擊五班守備六班千總等官七班均附列於右翼各班之末一侍班順治年間定大朝常朝以內閣大學士學士翰林院掌院學士讀講學士詹事府詹事少詹事都察院左都御史左副都御史及記注官滿漢各一人侍班雍正元年定記注官用滿漢各二人一執事引王公鴻臚寺官二人引百官鴻臚寺官序班各二人引外國使臣鴻臚寺官二人贊禮鳴贊官四人宣表官一人傳鳴鞭鑾儀衛官六人乾隆十年奏準行在恭遇萬壽聖節行禮照在京例設鳴贊官贊禮一糾儀順治九年定皇帝御殿設禮部司官四人於王公行禮處吏部禮部司官各四人於百官行禮處糾儀十四年題準朝期入班後有越次拱揖聚談慢易不恭者糾儀官題參十五年題準朝班各官有言語喧譁附耳交談或背面坐立及無故踰越御道者糾儀及引禮官指名題參康熙二十年題準皇帝御殿設滿御史二人於殿簷下設滿御史東西各二人於王公行禮處設滿御史東西各二人漢御史東西各二人於百官行禮處侍立糾儀其常朝及八旗上朝坐班之日班首以滿漢御史各一人班末以滿漢御史各一人吏部禮部亦委滿漢司官監視如有越次私語或互相背坐及先自起散者指名題參知而不糾者議處雍正二年覆準常朝日遣侍衛四人監視如有坐立越班跪拜失儀御史指與侍衛即指名拏參交刑部治罪稽察不嚴者議處八年議準外官朝賀設糾儀官省會用道員一人如無道員用府同知一人外府用同知一人如無同知用通判如無同知通判用教官一人州縣均用教官一人屆期糾儀官黎明先至文武各官行禮時糾儀官旁立監視禮儀如有越次失儀及違誤不到者糾儀官糾報督撫指名題參如有徇隱一并參處又定盛京各官朝賀糾儀用盛京禮部司官二人一賜坐順治九年定大朝常朝行禮畢賜羣臣坐郡王以上進殿內貝勒以下在丹陛上百官在丹墀內均照班次跪行一叩禮坐皇帝進茶王公百官均就坐次行一叩禮光祿寺執事官授羣臣茶羣臣受茶就坐次行一叩禮飲畢復行一叩禮十二年題準凡朝期皇帝御殿王以下公以上進殿內兩旁序坐十八年題準凡典禮上朝及常朝王以下入八分公以上進殿內序坐不入八分公以下文武官於原立位序坐乾隆二年奉旨朕御太和殿向來大學士皆立於殿外簷下即於殿外賜茶嗣後立位仍照舊例賜茶時令坐於殿內領侍衛內大臣之上八年奉旨嗣後御殿及筵燕日殿內止大臣賜坐侍衛等均著侍立不必賜坐賜茶時若侍衛輪流奉授不免舛錯遺漏嗣後授茶時著禮部前期取應坐之王公大臣數目每一人令侍衛一人授茶仍依次接回庶奉授便捷亦不至舛錯遺漏其設燕日與燕大臣衆多若授茶侍衛不敷著令親軍奉授又議準御殿日除文官三品武官二品以上照舊賜茶其四品以下官惟殿內之記注官丹墀內之外國使臣賜坐賜茶其餘百官但賜坐停止賜茶十五年奉旨嗣後大學士坐次仍著在領侍衛內大臣之上協辦大學士事務尚書著在領侍衛內大臣之下署領侍衛內大臣之上朝會二一元日天聰六年元日太宗文皇帝御篤恭殿受賀次日筵燕順治八年題準元日皇帝率大臣侍衛等詣皇太后宫行禮畢御殿受賀雍正七年奉旨元日朝賀凡三品以上之大臣年逾七十者不必隨班行禮俟百官朝賀禮畢朕還宫後至乾清門行禮一長至順治八年題準長至於次日御殿王公百官上表慶賀行禮直省文武官進表慶賀均如元日儀一萬壽聖節崇德元年定聖節日御殿進表慶賀儀與元日同順治八年題準聖節日皇帝先謁太廟行禮次詣皇太后宫行禮畢御殿受賀康熙五十二年聖祖仁皇帝六十萬壽聖節直省官員紳士耆庶均豫期赴闕自三月初一日為始分建龍棚自西直門至暢春園相屬二十里恭祝萬壽十七日聖祖仁皇帝御輦陳鹵簿大駕由暢春園進宫王公內外臣民夾道分班跪迎是日遣官祗告天地宗廟社稷至日御殿受賀啓大清門中外臣工外藩王公使臣上表稱賀軍民耆老皆準於午門前行禮排班直至正陽門外是日頒詔分遣官致祭嶽鎮海瀆長白山帝王陵寢先師闕里是月二十五日賜燕廷臣及直省來京慶祝萬壽臣民年六十五歲以上者於暢春園諭各省老人云書稱文王善養老孟子云七十者非帛不暖非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫動言移風易俗之效驗而不暇講孝弟之本心朕因今日之會思孝弟之念少輕而求移風易俗是其所厚者薄而薄者厚矣若天下之人皆知孝弟為首重此端移風易俗之本禮樂辭讓之根非淺鮮也昨日甘霖大沛四野霑足朕心大悅爾等毋誤農時速回本地欽此又諭前旨載入上諭十六條內通行直省府州縣及凡有土司之處於朔望並行宣講以廣教化欽此又題準嗣後聖節日一月內不理刑名又奏準每歲三月十八日聖節百姓虔齋祝嘏止屠一日雍正五年諭朕今年五十前已屢有諭旨宣示諸臣不行慶賀之禮昨督撫具奏皆稱今年進京慶祝萬壽朕思聖祖仁皇帝久道化成聖德神功蟠天際地當年五十聖壽之時尚未允行慶賀之典朕臨御以來時時有勵精圖治之念乂安海宇之心而實在善政善教可造福於社稷蒼生者何事可以自信正當君臣交相警勉期於有成又安可為此粉飾之事以滋煩擾乎朕之待下惟有一誠爾等事君果矢誠懇之念於隱微寤寐之中尊君親上如詩書所載元后父母之誼豈不勝於拜舞彤墀效稱觴祝嘏之儀節乎况一人具本奏請來京慶祝則衆人亦必效法具奏焉有天下將軍督撫提鎮皆離職守而來京慶祝之理諸臣既無全來之理而又各具本章多此陳奏即朕所切戒之具文假相也於吏治民生有何禆益而為乎外任諸臣皆不必具本奏請來京只照常年例行若因地方事務應來陛見者朕自别降諭旨其各省耆老等若有欲來京慶祝者著地方官切止之髙年之人長塗跋涉未免勞頓非朕體恤之意倘違朕意而來京均不許奏聞朕亦不加恩賜伊等若果有感恩戴德之忱何不訓誨子孫勸導鄉人使各為良善各務本業而僕僕道路以為報效朝廷乎再各省地方若有指稱萬壽建立經壇或聚梨園喧譁糜費者此皆生事不安本分之徒誘惑愚人希圖財利尤宜嚴禁以杜浮囂詐偽之風倘地方有司不行嚴禁經朕訪聞定照欺罔之律治罪著將此通行各省轉飭各府州縣咸使聞知欽此乾隆五年諭八月十三日為朕誕辰聞內外臣工以今年為朕三十萬壽之期欲行慶賀貢獻之禮朕甚不取今年春間外省督撫提臣中曾有請八月進京陛見朕批諭止之蓋朕年甫及壯不言慶賀且朕所望於內外臣工者總在實心實政為國家宣猷效力不在稱觥祝嘏之儀文著即傳諭內外臣工等仍照常年之例行若有在常例之外者悉皆停止欽此一常朝國初定凡王以下各官升賞或因事沐恩者於每月常朝日行謝恩禮親王郡王貝勒貝子等謝恩者皆啓奏進內行禮官員為有功升賞謝恩者亦啓奏進內行禮其因事謝恩者於大清門外行禮如革職官不許具朝服行禮外藩王貝勒貝子等及外藩官謝恩均候常朝日行禮如遇要務即啓奏候旨行禮凡王以下文武官升遷謝恩行三跪九叩禮賜銀幣等物謝恩行二跪六叩禮賜食謝恩行一跪三叩禮凡賞賚謝恩常服不贊順治九年定八旗武官除元日元宵聖節及常朝外每月初一初十二十日具公服於午門外分翼坐班如遇巡幸除朝期外每日於午門外坐班用常服又定王公大臣凡遇恩賞均於每月常朝日進內行禮在京文武各官辭朝見朝者於殿前丹墀內行禮如是日不御殿見辭等官不論品級大小均在午門外行禮外藩王公台吉等來朝及喀爾喀等進貢來使亦於常朝日行禮凡升賞謝恩及辭朝見朝等官皆豫期報部具題遵旨行禮十年題準凡常朝日謝恩見辭文武官四品以上太和殿前行禮五品以下午門外行禮均詳開職名及行禮緣由豫報鴻臚寺呈部一并奏聞又定凡外藩來朝王以下公台吉等進貢來使內有宜令速回者不拘朝期即引至午門前行禮十二年題準凡朝期王以下公以上在午門內朝房齊集又定京官謝恩者如遇聖駕行幸候回鑾日行禮吏兵二部推選及以公務來京者不必守候即在天安門外金水橋南行禮赴任十四年題準凡朝期各官有實在患病者本衙門知會鴻臚寺如假托偷安鴻臚寺參處又定凡急選大選並推升文武官於該衙門領憑後赴鴻臚寺投遞報單遇朝期謝恩辭朝如遇免朝即引至午門前或天安門外行禮有應速赴任者不拘朝期行禮即令赴任如鴻臚寺不收報單致赴任愆期者各官赴部呈明題參又定凡頒詔及册封外藩屬國之奉使等官於命下日親赴鴻臚寺投遞報單遇朝期行辭朝禮如不遇朝期該寺即引至午門前行禮隨令起程十八年題準凡典禮上朝及常朝親王以下入八分公以上在丹陛上行禮不入八分公以下於丹墀內行禮又定常朝日有升級賞賜及京官外升外官來京應行禮者如遇御殿不論品級皆令殿前行禮如免朝於午門外行禮康熙十二年題準凡朝賀常朝及接駕送駕日官員無故不到者皆罰俸一月詐稱上朝罰俸一年揑供同上朝之官罰俸兩月其已注病而不在家者罰俸一年四十年議準凡朝期官員有病者取具該堂官印文咨送如揑病保送者罰俸三月將堂官一并議處雍正二年覆準皇帝御殿日未明以前鴻臚寺官左右各二人引左右翼官從兩掖門入各就本班坐鼓嚴咸起立聽唱贊由仗南引進依次排班行禮乾隆二年奏準每逢朝期除在內廷行走大小官員外凡滿漢文武大小官均於黎明齊集坐班如果有事故先期於朝單內聲明至期都察院吏禮二部官稽察若有無故不到者指名參奏倘有徇隱一并參奏議處仍知會步軍統領衙門每逢朝期曉鐘時即啓正陽門俾各官早入朝班三年覆準每月初一初十二十日旗員坐班禮部兵部各委司官二人稽察以肅進退又覆準文武月選官於選授之後吏兵二部開列名單先行知會鴻臚寺俟領憑領劄十日之內鴻臚寺傳集演禮謝恩四品以上如有逾期不到者鴻臚寺指名題參四品以下送吏兵二部察議彚奏六年奏準每逢朝期八旗官員除有公事外不赴朝班者稽察御史會同該部將官員過少旗分察明緣由指參交部察議乾隆十七年覆準常朝坐班各部院寺堂官除實有事故不能到班者許於册內聲明其餘即本署奏事仍留一人率屬就列毋庸曠闕違者參處又坐班向無定時今定冬春以辰正夏秋以卯正至時糾儀官先出各官依次列坐後時至者指參禮部暨都察院堂官東西各歸本班毋庸别立班次以歸畫一一御門聽政順治二年定凡題奏本章均由內院啓奏請旨下部覆奏施行又定每日奏事吏戶禮兵工五部輪流首奏刑部常列三班並令翰林科道同奏事官齊進侍班記注康熙十三年奏準各部漢司官照滿司官例各隨堂官入奏又覆準凡聽政日諸臣奏事齊集後左門外豫將報單交乾清門直日侍衛班領臨入奏時侍衛引部院堂官各率所屬依次而進其不奏事官不得擅入二十一年諭諸臣奏事勞苦少展御門晷刻春夏以辰時三刻秋冬以辰時五刻為期啓奏各官俾得從容入奏欽此五十七年定聽政之日侍班翰林於啓奏折本時即退下雍正二年奉旨吏部奏事著在各部院衙門之後三年奉旨每逢聽政於滿漢翰林院編修檢討內按俸以四人侍班班在科道之上一朝門禁例國初定大清門禁門左右翊門均令大臣侍衛護軍嚴加守衛稽察出入內門除直日人員外不許容留間雜人大臣侍衛等皆於大清門朝夕齊集凡禁門內外不許背坐不許於御道上坐凡親王以下出入不得行御道又定王以下文武官入朝至下馬牌處下馬停止儀仗親王郡王貝勒各隨護衛二人貝子隨護衛一人其餘官員不許跟隨人役入朝順治三年定親王入朝至午門外下馬降輿九年題準凡入朝除內大臣護軍統領護軍參領侍衛外其餘諸王暨公侯伯大臣以下各部院衙門官員皆由午門出入不許由東華門西華門神武門出入入午門時親王隨護衛六人世子郡王五人貝勒四人貝子三人公二人民公侯伯都統子護軍統領副都統尚書侍郎許隨一人其餘官員入午門不許隨從又定親王至午門外郡王至午門前兩配樓角下轎馬貝勒以下在闕左右門外下馬牌處下馬又定親王以下貝勒以上進午門許隨護衛一人貝子以下不許隨進十年題準漢大臣進午門照九年所定滿大臣例許隨從一人康熙元年題準親王以下公以上進午門時隨從人數照順治九年例如至御前止許隨護衛一人六年題準親王郡王進午門時止許隨護衛二人貝勒以下公以上許隨一人二十一年題準親王以下貝勒以上如未滿十六歲者至御前許隨護衛二人又定親王以下暨文武官奉召入朝許由東華門等三門出入其諸王貝勒年未滿十五歲者暨內閣翰林院詹事府官許由東華門等三門出入二十二年題準聖駕出入及升殿上朝官隨從人役有喧譁擁擠者步軍尉等嚴拏交各該衙門治罪二十三年覆準大內中路乃鑾輿經行御道官民不得行走午門內交與守門直班護軍參領護軍校午門外交與兵部闕左右門天安大清等門交與直班步軍尉步軍今五旗護軍參領護軍嚴加察緝如有直行御道者繫官交該部題參議處繫兵民送刑部治罪如直班官員兵丁徇情不舉被科道官糾參者該直班官兵一并究處二十七年題準禁地會議大臣不許嚮諸王跪語六十一年十二月奉旨年老大臣皆皇考舊用之人自午門外步行進內奏事甚為勞苦將諸王暨六十五歲以上大臣列名具奏隨遵旨開列具奏奉旨凡許令乘馬之六十五歲以上大臣暨親王郡王皆令乘馬由東華門入者至箭亭旁下馬由西華門入者至內務府前下馬其有年雖未至六十五歲而所管事務殷繁朕常召問者亦令乘馬乾隆二年奏準凡遇皇帝臨朝聽政之期令護軍統領撥護軍於各禁門及館閣門巷等處小心巡視環列侍衛除朝服官許進午門其餘不得肆行出入又議準凡官員入朝及在公署不許帶雨纓涼帽凡官員及直班護軍等不許著大衫入紫禁城七年議準凡遇皇帝恭祀大典扈從大臣應於午門前乘騎者領侍衛內大臣撥親軍於午門前備馬毋得臨期遲誤如僕從人等乘馬入闕門雜沓馳驟者該管官即嚴拏治罪并將其主參處十五年奉旨定例惟諸王於紫禁城內乘馬今大臣中朕尚有加恩令乘馬者嗣後在內貝子以上亦準於紫禁城內乘馬十八年奏準王公等進午門隨從人仍照順治九年定例親王隨從六人世子郡王五人長子貝勒四人貝子三人公二人進太和門親王世子隨從三人郡王長子貝勒二人貝子公一人東華門西華門神武門除內廷行走及直班有政務王公外不得任意行走凡進後左門景運門隆宗門親王世子隨從三人郡王長子貝勒二人貝子公一人二十二年奏皇上升殿丹墀班後昭德門貞度門階下東西增設滿漢御史各二人禮部司官二人侍衛二人稽察如有失儀越班任意起坐蹲踞者即指與侍衛立拏參處再殿階備茶之侍衛人員及各執事人等並隨王公等護衛官員有立於階上正面者殊失體制令護軍統領委護軍參領於階上東西角分立毋許執事官員人等站立正面違者護軍參領即拏交監禮御史指名糾參奉旨階上備茶尚茶人員務酌量足用委出不必多人再王公等隨從攜坐褥者於伊等護衛內每人只準一人內監無許隨從將此交與直班護軍統領等嚴行稽察違者即行參奏朝會三一元日皇太后宫朝賀順治八年題準元日設皇太后儀駕及丹陛大樂皇帝御禮服率王公大臣侍衛詣皇太后宫行禮畢公主福晉以下都統尚書子命婦以上詣皇太后宫行禮康熙八年題準元日太皇太后儀駕中和韶樂全設皇太后儀駕丹陛大樂全設皇帝御禮服率王公以下內大臣侍衛暨都統尚書子以上咸朝服先朝於太皇太后宫畢次詣皇太后宫行禮如儀次日皇后御禮服率公主福晉以下都統尚書子命婦以上咸朝服朝於太皇太后宫畢次詣皇太后宫行禮如儀二十二年題準元日寧壽宫行禮諸王內大臣侍衛在寧壽門外儀駕末文武百官在午門外糾儀御史二人在寧壽門外二人在儀駕末二人在午門外監禮六十一年十二月諭羣臣奏請雍正元年元日詣皇太后宫行慶賀禮奉皇太后懿旨前皇帝登極巨典攸關故勉從諸王大臣所請今元年元日尚在聖祖仁皇帝服制百日之內何忍即行慶典其遵旨停止慶賀行禮欽此乾隆元年諭朕前降諭旨明年元日停止御殿受朝皇太后前照常行禮今奏聞皇太后蒙降懿旨明年元日尚在世宗憲皇帝服制二十七月之內皇帝既不受朝其王大臣赴慈寧宫行禮亦著停止欽此二年奏準嗣後午門外行禮增設御史四人在午門外闕左右門禁止各官從人不得擅入違者拏究治罪其主議處又奏準長信門外二品以上官行禮設鳴贊二人午門外各官行禮設鳴贊四人十二年議準向例凡遇慶賀大典皇太后宫行禮公主福晉以下止及一品大臣命婦按祭先蠶壇二品大臣命婦皆與請嗣後凡遇慶典令二品命婦亦入班行禮十四年諭朕閲禮部所進儀注朝賀皇太后宫行禮之世爵官止列公侯伯子而男爵則未之及蓋因男爵原繫二品向例惟一品大臣在長信門前行禮後以人數過少增入侍郎副都統而禮部所進儀注仍循前例不及男爵是五等之班竟闕其一未為允協著一并增入欽此一長至節皇太后宫慶賀順治八年定長至次日皇帝率羣臣詣皇太后宫行禮儀與元日同惟不設燕康熙八年定長至次日皇帝率王公以下大臣侍衛都統尚書子以上先朝於太皇太后宫次詣皇太后宫行禮皇后率公主福晉以下都統尚書子命婦以上先朝於太皇太后宫次詣皇太后宫行禮並與元日同一皇太后聖壽慶賀順治十四年題準皇太后聖壽日皇帝率內大臣侍衛內院禮部官詣皇太后宫行禮與元日同康熙九年題準皇太后聖壽日皇帝率王公羣臣行禮皇后率公主福晉以下都統尚書子命婦以上行禮均與元日同三十九年仁憲恪順誠惠純淑端禧皇太后六十聖壽王以下輔國將軍以上民公侯伯子滿漢大學士內大臣都統尚書左都御史護軍統領前鋒統領副都統滿漢侍郎直省將軍總督巡撫提督總兵官各恭進慶賀儀物陳於午門外聖祖仁皇帝率羣臣詣寧壽宫行禮妃嬪暨公主福晉以下都統尚書子命婦以上詣寧壽宫行禮如儀四十九年仁憲恪順誠惠純淑端禧皇太后七十聖壽各官恭進慶賀儀物聖祖仁皇帝率羣臣行禮妃嬪暨公主福晉以下詣寧壽宫行禮與三十九年同乾隆二年奏皇太后聖壽日皇帝於皇太后前進表儀注奉旨每年用進表儀注凡遇大慶之年用宣表儀注五年諭皇太后萬壽聖誕普天同慶凡大小臣工咸服蟒袍七日不理刑名永著為例欽此十六年皇太后六十聖壽先期皇上建壽安宫為奉觴之所王公宗戚六部八旗卿寺各衙門直省督撫在京紳士耆老自高梁橋至西華門豫設采棚樂劇恭祝聖壽二十日皇太后鑾輿自暢春園進宫上御龍袍衮服乘騎前導王公大臣咸蟒袍補服滿漢命婦咸采服各於祝壽采棚前夾道跪迎皇太后頒賜賞賚有差皇太后還宫上率皇后皇貴妃貴妃妃嬪侍皇太后於壽安宫稱慶前後凡九日上率王公大臣詣慈寧宫恭上崇慶慈宣康惠敦和裕壽皇太后徽號進册寶行禮皇太后聖壽日上率王公大臣侍衛詣慈寧宫宣表行禮皇后率皇貴妃貴妃妃嬪於慈寧宫行禮均如儀是年奏準十一月二十五日恭遇皇太后六十聖壽自十四日起至二十八日止王公百官咸蟒袍補服不理刑名又奏準恭遇皇太后六十聖壽王以下公以上及內外大臣請照康熙三十九年四十九年例各進獻儀物恭祝聖壽奉旨皇太后懿旨停止進獻禮物欽此又奏準皇太后聖壽日凡大小官員之休致暨降革官赴闕慶賀蒙恩豫品銜者許隨見任官入班行禮進士舉人貢生並有頂帶官於午門外生監耆老於天安門外各行禮一元日皇后宫慶賀康熙八年定元日設孝誠仁皇后儀駕於太和殿時修尚乾清宫工未竣前設丹陛大樂於中和殿前皇后詣太皇太后皇太后宫行禮畢御宫升座公主福晉以下縣君鎮國將軍夫人以上民公侯伯以下都統尚書子命婦以上咸朝服行慶賀禮十年奏準設皇后儀駕丹陛大樂於坤寧宫前雍正元年奉旨皇后宫三大節朝賀俟三年後舉行一長至節皇后宫慶賀康熙八年定長至次日行禮與元日同一千秋節慶賀康熙十一年定皇后千秋節儀駕樂器各陳設如儀皇后率公主福晉以下都統尚書子命婦以上詣太皇太后皇太后宫行禮畢還宫升座公主福晉以下行慶賀禮與元日同雍正六年題準皇后千秋節王公百官咸蟒袍補服欽定大清會典則例卷五十六
