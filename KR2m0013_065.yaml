body:
  text: 禮部儀制清吏司授時一頒朔順治二年時憲書成欽天監進呈御覽世祖章皇帝御武英殿文武各官咸朝服齊集午門外頒朔行禮是年題定每年十月初一日黎明欽天監官設黄案於午門外正中設紅案於午門外兩旁欽天監自署内設龍亭一采亭八奉恭進皇帝皇太后皇后時憲書於龍亭奉頒給王以下各官時憲書於采亭陳設畢行一跪三叩禮校尉舁亭前設香亭和聲署作導迎樂出欽天監署自長安左門進至午門外欽天監官奉恭進皇帝皇太后皇后時憲書陳正中黄案上奉頒給王公百官時憲書陳兩旁紅案上陳設畢舉黄案由中門入欽天監監正監副從隨至太和門陳於左右階上監正等於丹墀左行三跪九叩禮授内府官奉時憲書入恭進皇帝皇太后皇后欽天監官徹案各退是日黎明貝子公暨文武百官咸朝服集午門外鳴贊官贊排班貝子公立甬道上百官立甬道兩旁均北面東班西上西班東上贊有制衆皆跪鴻臚寺官宣制曰欽天監進某年時憲書其賜王公百官頒行天下宣畢羣臣行三跪九叩禮畢親王郡王各令所屬依次跪領貝子公親跪領文武官各以其長一人跪領回署頒給所屬官各退十八年定朝鮮國每年十月朔遣使齎咨赴部恭領時憲書豫劄欽天監封送儀制司本司郎中朝服於司署頒發來使跪領齎回本國康熙三十二年頒時憲書於内扎薩克科爾沁等二十四部落均以各來使請安之便按名給發五十三年頒時憲書於外扎薩克喀爾喀等十有五部落與科爾沁等部落同雍正三年定頒給青海扎薩克王台吉等時憲書於每年頒俸幣時一同給發七年議準定例欽天監每年給發各衙門時憲書外聽匠役備紙刷印售賣以便民用今各省布政使司亦應照例請自八年為始每歳四月由欽天監頒發考定時憲書式令各布政使司敬謹刋刷鈐蓋庫貯欽天監時憲書印信凡見任文武大小官及在籍有職官舉人貢生等各給一本以彰敬授人時之意其刋刻紙墨工價各動用正項錢糧至於各省民户繁多勢難遍給應將所刻書版發貯公所聽匠役或書坊備紙刷印赴布政使司鈐蓋欽天監時憲書印發賣每本定價一分二釐俾深山僻壤咸知時序月令仍飭該地方官嚴禁偽造務使官書廣布以便民用如有偽刻私書及揑稱繳官於定價外需索等弊將該有司從重治罪督撫如不察究并嚴加議處十二年覆準毎逢頒朔之日八旗都統各部院堂官各率所屬並諸王府祗領屬官咸朝服齊集午門外行三跪九叩禮御史二人監禮部委滿漢司官二人收職名如有公事不克親赴豫行知會其無故不到及不朝服行禮者指名叅處務恪遵定制整齊敬謹以光大典至頒給百官時憲書三品以上官應仍於午門外祗領其餘滿漢文武有頂帶官員萬三千餘人一時難以遍給徃來擁擠恐無以肅觀瞻而昭典禮應照向例於午門外行禮後各赴欽天監祗領乾隆二年覆準散給青海扎薩克王台吉等時憲書於每年五六月間同俸幣給發似覺稍遲應先期於毎年十月將次年時憲書由兵部交驛站發徃青海散給十六年奏準孟冬頒朔請由欽天監豫日行文至期貝子公以下至文武正貳各官咸朝服齊集依次跪領恭竢宣制行三跪九叩禮如有無故不到者糾儀御史於次日叅奏照無故不朝叅律議處至直省時憲書頒到之日督撫亦應有接受之儀舊典未備請酌定儀注纂入會典通禮恭呈御覽頒發遵行以仰承皇帝欽若時憲之至意十九年定孟冬頒朔於午門親王郡王貝勒亦令親領行禮是年頒時憲書於杜爾伯特部落與喀爾喀部落同一迎春順治初定毎年立春芒神春牛由順天府豫備屆期由部會同恭進前二十日劄欽天監選取導引之天文生八名造册送部取候時官二人於午門前祗竢屆期告時劄順天學政選取生員七十五人各具頂帶公服恭舁芒神春牛案送至午門外同本部官恭進又行文内務府於立春日豫除内監恭進芒神春牛竢於乾清門慈寜門又行知歩軍統領䕶軍統領内務府於立春日屆時啟長安左門天安門端門午門協和門永康左門之中門又定凡遇立春時刻或在暮夜或在子丒等時均由部奏明擇寅卯辰等時恭進又定毎歳各省府州縣官豫造芒神土牛於東郊外立春日各官朝服迎春於東郊陳芒神土牛設香燭酒果贊禮生贊排班贊跪叩興各官行一跪三叩禮興贊跪奠爵領班官奠酒三爵贊叩興各官跪叩如前興隸舁芒神土牛香亭鼓樂前導各官朝服後隨回至署陳於堂前各官執采仗環立土牛兩旁贊擊鼓樂工擂鼓贊鞭春各官環擊土牛三以示勸耕之義康熙十三年覆準直省府州縣迎春於東郊各官拜芒神土牛止用鼓吹采亭其勒令鹽商當鋪行户裝演故事臺閣排列金珠張鼓樂樹旗幟並科𣲖里長提取車馬優伶等項嚴行禁止如有前項糜費並各官藉端𣲖累由督撫科道糾叅交該部議處頒詔一頒詔順治元年定頒詔之日設鹵簿大駕於午門外設御座於皇極門今門太和正中設詔案於丹陛上東旁王以下文武各官咸集大學士奏請御門陞座鳴鞭執事各官行禮畢鳴贊官贊排班贊進贊跪王以下文武各官皆跪贊頒詔大學士自案上奉詔書於丹陛上東旁立宣畢鳴贊官贊行三跪九叩禮興退復原班立賜燕謝恩禮成鳴鞭駕還宫衆皆退詔書謄黄刋頒天下八年定頒詔之日設鹵簿大駕於太和殿前設黄蓋雲盤於丹墀内設龍亭香亭於午門外設宣詔髙臺於天安門外鴻臚寺官設詔案於太和殿内之東又設黄案於丹陛上正中王以下公以上咸朝服齊集於午門内滿漢文武各官咸朝服齊集於午門外領催外郎耆老等齊集於天安門外内院官奉詔書至乾清門用御寳畢奉至太和殿内陳案上禮部官引王公等進至丹陛上引文武各官入午門左右掖門至丹墀内各序立禮部堂官奏請皇帝御禮服陞太和殿鳴鐘鼓作樂鳴鞭王以下各官上表行禮畢大學士進殿内案前奉詔書至太和殿檐下授禮部尚書禮部尚書跪受至丹陛正中陳於案行一跪三叩禮奉起由中階䧏設雲盤内禮部官奉雲盤上覆黄蓋由中道出文武各官後隨王公等進殿内序坐賜茶畢鳴鞭駕還宫王公等各退禮部官至午門外奉雲盤設龍亭内行一跪三叩禮校尉舁亭香亭在前龍亭在後前列御仗導迎樂作至天安門外橋南禮部官於龍亭前行一跪三叩禮奉詔書設高臺黄案上覆以黄蓋鴻臚寺官贊排班贊進衆官各按班次立贊有制衆跪宣讀官於臺上西面立先宣清文次宣漢文畢鳴贊官贊各官行三跪九叩禮畢禮部官奉詔書仍設龍亭内校尉舁亭作樂由大清門出禮部堂官豫由長安左門詣部恭候竢詔至率所屬跪迎於儀門甬道之右司官奉詔至大堂陳於黄案禮部堂官率所屬行三跪九叩禮興恭閲詔書謄黄䥴刻頒行天下又定如駕不御殿文武百官咸朝服齊集於天安門外金水橋前餘奉詔宣詔等儀與御殿同十一年議準頒發外國及直省詔書均由内院用寶畢交與禮部外藩䝉古遣内院理藩院官各一人朝鮮國遣正副使二人具題請㫖命徃直省先委行人司如行人員少取中書科中書如中書科人數不敷於内院中書鑾儀衞首領官國子監欽天監上林苑監四譯館酌量取用屬官具題遣徃是年題準詔書所至地方官具龍亭采輿儀仗鼓樂出郭迎接朝使下馬奉詔書設龍亭中南嚮朝使立於亭東地方官朝服北嚮行三跪九叩禮鼓樂前導朝使上馬於亭後隨行至公廨門外衆官先入文武分東西序立候龍亭至公庭中朝使立龍亭之東西嚮禮生贊排班樂作衆行三跪九叩禮朝使奉詔授展讀官以教官為之展讀官跪受詣開讀案前宣讀衆官皆跪宣讀畢展讀官奉詔書授朝使朝使奉設龍亭中衆官行三跪九叩禮畢皆退督撫即謄黄分頒司道府州縣衞所又題準凡詔書經過地方官員軍民人等咸跪路旁候詔過方起如出使在外官員遇詔即出迎郊外至公庭中禮生先引出使官行三跪九叩禮後本處官行禮至開讀時出使官仍隨班跪聽一同行禮康熙二年題準凡詔書經過地方五里以内府州縣衞文武官咸出城迎送違者或頒詔官指名報部或督撫題叅皆降二級留任五里以外者不必迎送八年題準凡頒詔漢督撫省分遣漢官滿督撫省分遣内院禮部筆帖式十二年題準凡頒詔赦及恩賜徃朝鮮内大臣散秩大臣侍衞均候㫖命往仍將内閣侍讀學士侍讀翰林院侍讀學士侍講學士侍讀侍講禮部郎中員外郎主事照依職銜為正副使具題遣往二十一年題準頒直省滿漢督撫詔書於内閣中書翰林院筆帖式行人司官内酌委齎送其頒行將軍提督等謄黄詔書並付齎送督撫官員帶往詔書用御寶謄黄不用齎詔官由各衙門簡選均赴禮部大堂掣籤分遣齎送二十七年題準頒行直省滿漢督撫詔書減去内閣中書一人翰林院筆帖式一人委禮部筆帖式二人奉㫖每處著一人去雜𣲖已通行禁止恐地方官假藉頒詔妄行科𣲖著嚴行禁止四十二年覆準各省頒詔官應於起程日起算往返直隸限十五日河道總督河南山西二十日山東二十五日漕運總督四十五日江南六十日江西浙江湖廣陜西七十五日貴州九十日福建四川廣東廣西百有五日雲南百二十日該省督撫即將詔到日期報部察覈其頒詔官如果江湖風阻疾病躭延取具經過地方官印結到部倘有故意遲延違限者交該部從重議處四十八年奉㫖頒詔官如有紆道行走及沿途生事擾累驛遞者著該督撫即行指叅雍正元年諭頒發詔書禮部筆帖式人少不足以供各處之用且必得少知自愛材尚可用者方可差往著將各部院筆帖式令各該堂官與總理事務王大臣會同簡選差往欽此乾隆十四年奏準頒詔儀節應增金鳳朶雲工部前期設金鳳於天安門上正中設宣詔臺於門上東第一楹詔由午門奉出至天安門上聽詔百官耆老等分翼排班於金水橋南跪聽宣詔官宣讀畢鴻臚寺官贊行三跪九叩禮奉詔官將詔書啣以金鳳承以朶雲由天安門上繫下禮部官接受設采亭内迎出長安左門餘如前儀十七年定直隸總督齎詔官一人附謄黄七道分頒天津都統直隸提督馬蘭泰寜天津宣化正定等處總兵官山東巡撫兼提督齎詔官一人附謄黄三道分頒青州將軍登州兗州總兵官山西巡撫兼提督齎詔官一人附謄黄三道分頒綏逺城將軍太原大同總兵官河南巡撫兼提督齎詔官一人附謄黄二道分頒南陽河北總兵官兩江總督齎詔官一人附謄黄八道分頒江蘇安徽巡撫江寜京口將軍江南提督狼山蘇松壽春等處總兵官漕運總督江南河道總督河南山東河道總督齎詔官一人江西巡撫兼提督齎詔官一人附謄黄二道分頒南贑南昌總兵官閩浙總督齎詔官一人附謄黄十二道分頒福建巡撫福州將軍水師陸路提督金門汀州海壇臺灣福寜漳州南澳建寜等處總兵官浙江巡撫齎詔官一人附謄黄八道分頒杭州將軍乍浦副都統浙江提督定海黄巖溫州處州衢州等處總兵官湖廣總督齎詔官一人附謄黄八道分頒湖南湖北巡撫荆州將軍湖廣提督鎭筸宜昌永昌襄陽等處總兵官陜甘總督齎詔官一人附謄黄十五道分頒陜西甘肅巡撫西安寜夏涼州將軍甘肅安西固原提督西寜延綏寜夏肅州涼州興漢河州等處總兵官四川總督齎詔官一人附謄黄六道分頒成都副都統四川提督川北重慶建昌松潘等處總兵官兩廣總督齎詔官一人附謄黄九道分頒廣東巡撫廣州將軍廣東提督左翼右翼瓊州潮州碣石高雷等處總兵官廣西巡撫齎詔官一人附謄黄三道分頒廣西提督左江右江總兵官雲貴總督齎詔官一人附謄黄十一道分頒雲南巡撫提督開