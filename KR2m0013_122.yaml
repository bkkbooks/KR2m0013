body:
  text: 兵部職方清吏司公式三綠旗一章奏文册順治初年定提鎮將慶賀表箋遺忘推諉不奏或將字樣舛錯遺漏者罰俸一年不列職名失用印信及用印歪斜糢糊顛倒繕冩潦草破裂染汚者罰俸六月又定武職各官一應文移皆鈐用印信無印信者鈐用關防條記均編列號數封發不許擅用空白致滋假揑増減之弊若有擅用空白者罰俸一年督撫提鎮不能察出者罰俸六月康熙十一年題準提鎮本章𦂳要之字貼黄内遺漏貼黄所有之字本章内遺漏或疏册互異者皆罰俸三月又議準提鎮將督撫職掌之事擅自題奏者罰俸三月越叅文職者罰俸一年所叅之事不議又議準提鎮有不繫密事妄稱密奏及借公行私以私事具奏者降二級調用至一應本章有不應密而密者罰俸六月又議準前任官題奏準行之事續經題奏停止後任官不察停止緣由仍照舊行者罰俸六月三十八年議準提鎮不許於遺本内薦舉屬官四十二年議準督撫提鎮㑹題之事有因錯謬遲誤奉㫖議處者察明何繫承行具題何繫列名具題分别輕重議處如承行具題官例應議以革職者將列名具題官降四級調用承行具題官降級調用者列名具題官降一級留任承行具題官降級留任者列名具題官罰俸一年承行具題官罰俸一年者列名具題官罰俸六月承行具題官罰俸六月者列名具題官罰俸三月承行具題官罰俸三月者列名具題官免議又覆準督撫提鎮㑹議之事並未㑹議畫題遽稱合辭具題者罰俸六月又議準革職降級之武職各官以寃枉控告者如果有寃枉該督撫提鎮方許題奏如將並無寃枉之事溷行題奏者將督撫提鎮降一級留任轉詳官降二級調用若將並無寃枉之事並不詳察推卸咨部者將具咨之督撫提鎮罰俸一年五十三年議準各省提塘除傳遞公文本章並奉㫖科鈔事件外其餘一應小鈔槩行嚴禁違者照刷造小説淫辭例革職治罪雍正五年議準凡提鎮本章事關𦂳要者將副本揭帖用密封字樣封固投遞通政使司咨呈各部院公文有關𦂳要之事者亦密封投遞在京各部院有𦂳要之事咨劄各省提鎮亦密封發遞該提鎮親拆收貯至提鎮與督撫並屬官往來公文繫𦂳要之事亦用密封投到親拆收貯如將應密之事不密以致漏洩重者降一級留任輕者罰俸九月六年議準提鎮辦理大小公事均用題本鈐印本身私事均用奏本不準鈐印如有應用題本而用奏本應用奏本而用題本者罰俸三月七年議準保題官員督撫提鎮有應列名㑹槀者出具㑹題印結隨本送部又議準提鎮等題奏本章如奉㫖飭行者遵㫖飭行若奉㫖交部察議者將該提鎮等照在京各衙門錯誤本章例罰俸一月九年奉㫖文武官有將地方不可施行之事妄行條奏舉行經後人復請更改者將原奏之人交部議處倘原奏本是而後人妄行指摘或有意翻案者經朕察出亦必從重議處將此永著為例十一年議準提鎮摺奏之事奉有硃批諭㫖於下次奏事之時封固恭繳倘任意遲延及隠匿不繳者革職乾隆三年奏準提鎮病故任内應繳硃批諭㫖有子孫隨任者於原任省分呈送就近之督撫提鎮代為恭繳子孫在他省者於所在省分呈送就近之督撫提鎮代為恭繳至休致降革提鎮任内奉到硃批諭㫖有應繳者呈送就近督撫提鎮代為恭繳其降革來京候㫖之提鎮有應繳硃批諭㫖呈部代為恭繳又議準提鎮密封陳奏之事關繫重大若彼此關通商酌以致漏洩一經發覺按事輕重議處四年議準武職各官來往文移及呈報上司事務均於正面及年月之上鈐用印信内有黏補字樣及増注錯落接扣之處皆以印信鈐葢有漏用者罰俸一年五年議準武職衙門有印信者於封印前一日酌量應需文册封套牌劄等項之數準將印信豫用空白加謹收貯以備封印後遇有𦂳要之事填用仍登記用過數目開印日將未用者驗明銷燬如收用不謹以致溷冒作弊按其事之大小照例議處不能察出之上司罰俸六月十三年諭向來各處本章有題本奏本之别地方公事則用題本一已之事則用奏本題本用印奏本不用印沿自前明盖因其綱紀廢弛内閣通政使司借公私之名以便上下其手究之同一入告何必分别名色著將向用奏本之處槩用題本以示行簡之意將此載入㑹典欽此又議準各省提塘鈔發本章必須謹慎有應密之事必竢科鈔到部十日之後方許鈔發如有邸報先於部文者該督撫將提塘叅處十八年諭元旦長至萬夀三大節外省文職臬司以上武職副將以上例得隨進表箋稱賀朕思督撫提鎮封疆大吏事皆專逹表賀為宜藩臬副將既不得專逹章疏其由督撫附進表箋亦可不必且不過由部送閣存貯並不呈覽此亦向來虚文陋習甚無取焉其槩停止欽此一儀制康熙十四年題準車駕廵幸所過地方守備以上等官接送之處臨時由鴻臚寺具奏請㫖如所定里數之内有一次不到者罰俸一年兩次不到者降二級調用三十三年奏準提鎮勅書内閣撰出由部發給該省提塘領交又議準提鎮到任前一日署事官將印信關防等項遣官齎送又議準武職各官將勅書誥命質當者革職其勅書誥命及劄付關防收藏不謹以致朽爛並損壞者罰俸六月如被水火盗賊毁失者免議均仍補給又議準武職各官印信糢糊不詳請鑄換者罰俸六月督撫提鎮不據詳題咨者亦罰俸六月若已換新印不將舊印繳部者亦照此議處三十九年覆準官兵人等越分僭用服色如五爪龍立龍團補服之類者繫官革職繫兵枷一月責四十板僭用之物入官未經察出之專管官每案罰俸三月兼轄官每二案罰俸三月統轄官每三案罰俸三月僭用尋常服色者繫官罰俸一年繫兵責二十板未經察出之專管官每案罰俸一月兼轄官每二案罰俸一月綂轄官每三案罰俸一月四十二年覆準武職各官於應用朝服之日不用及違例錯用者罰俸一月又覆準外任武職各官辭朝不投職名者罰俸三月五十年議準提督有事故離任印信交總兵官署理總兵官有事故離任印信交副將䕶理如該鎮未設有副將者即交叅將䕶理雍正三年諭各省督撫提鎮頒有王命旗牌所以重節鎮之權崇天室之威也但傳守既久或遇地方卑濕蟲蛀漆剝或因閲嵗滋多形製毁敝而該督撫提鎮以王命旗牌損壞例有恭處但藏之神笥不敢修整甚有豫防損壞將所頒王命旗牌收貯照樣别造者尤為不可嗣後各督撫提鎮所頒王命旗牌務須加謹收䕶勿致損傷亦不得别造其有地方卑濕閲嵗滋多不免蟲蛀漆剝形質毁敝者從寛免其處分聽其一面照式整修一面咨部欽此四年諭武職有整飭營伍操演兵丁之責理宜服習騎射為士卒先近聞副將游守等官竟有乘轎不乘馬者習安養惰莫此為甚且身為武臣而以乘馬為勞與職守大相違背何以訓練兵丁嗣後副叅游守等官槩不許乘轎以長怠惰之習倘有不遵該督撫提鎮即行指名題叅欽此十三年議準盔甲旗纛軍裝等項除考驗日期及本管大員經過察㸃準其穿戴披執外至一應欽差及往來大員經過之時該營汛弁兵有違例披執迎送者將該管官罰俸一年又諭凡標營大小武職均係職典戎行有官守之責至於執事應差之人悉皆入伍兵丁非如文職之書吏皂役可比皆當愛惜其力以備營伍之用朕聞外省提鎮赴任時第一次批令千把總率兵役數十名及儀從等物越省遠迎第二次則令守備率兵役百餘名迎至交界第三次則繫中軍官率兵數十名沿塗迎候至於副恭游守等官其所轄弁兵等有至交界處迎接者有至舊任駐劄處迎接者新官赴任常無定期以致弁兵在外淹留曠廢職守且塗次資斧非動公費即出已資公費乃軍裝器械之需已資乃仰事俯育之項以迎迓之虚文耗公私之實用此等陋習不知起於何時遂至今相沿未改此提鎮等不能體朕愛養弁兵之心之一端也著該部傳㫖嚴行禁止並將如何迎接之處斟酌定議俾大小武職遵守通行倘有違越不遵者並嚴定處分以示懲儆欽此遵㫖議準提鎮赴任所属官弁於是日迎接除隨役外司事兵丁不得過十名出城不得過五里副將叅游等官赴任本標官弁於是日迎接除隨役外司事兵丁不得過五名出城不得過三里至從境内經過者止許在本管營汛經過處迎接如大小官弁違越不遵者皆照例議處乾隆元年諭督撫有節制重寄而提鎮乃彈壓大員凡到任離任及因公出境入境例應具題者所以慎職守重封疆也川陜江西等省提督與總督隔省駐劄遥遠無赴省相見之例惟雲南廣東福建浙江等省因赴任之初由省而見總督者有因廵察地方離省不遠順便謁見者盖因苗疆重地或濵海要區當日軍務倥偬海氛未靖之初是以不行題逹竟赴省城與總督面商機務此乃一時權宜遂爾相沿成習此時若不酌定恐大小官弁視為固然徒長奔競之風而不顧職守之曠誤與否是不可不防其漸也嗣後提鎮之與總督若繫尋常事袛許文移往來如有𦂳要公務必須親見總督面言者或總督有應行檄調面議者均將因公起程及回署日期繕疏題明至所帶兵役不得過三十名免致兵丁擾累汛守空虚永著為例欽此五年奉㫖武職專司營伍騎射是其本分向因偷安坐轎並不乘馬曽䝉皇考頒發諭㫖嚴行禁止煌煌聖訓自應永遠欽遵乃近聞江南武職復蹈從前陋習多不乘馬自副叅以下至都司守備皆公然乘坐四轎甚至有前呼後擁喧耀街衢者江南如此他省諒亦不免夫人情習於勞則精神振作習於逸則志氣委靡况身為武職而憚於乘騎開驕惰之端啟廢弛之漸又何以飭戎行而率士卒乎各省督撫提鎮務將朕㫖通行申飭如仍不遵奉即指名題叅交部議處欽此六年奏準副叅游都守等官習安養惰並不乘馬擅自違制乘轎者革職又奏準官員帽頂補服坐褥各照本身見任品級不許計算加級違者罰俸六月該上司失察者罰俸三月其補服頂帶不相符者亦照此例議處又奏準屬官多帶兵丁越境迎送上司有因事營求或乘便賄賂者革職提問如止出境迎送並無營求賄賂者罰俸九月至上司必欲屬官越境迎送屬官畏其威勢迎送者如有勒索情弊或被屬官詳揭或經督撫恭劾將上司革職提問如止令迎送無勒索情弊者罰俸一年其迎送之屬官免議七年奏準在外提鎮以下副將以上見任來京者若並無疾病事故凡值祭祀耕耤之期先期在附近地方齋宿仍聲明齋宿處以憑稽察屆期投遞職名各按品級隨班行禮若有事故不能齋戒者聲明填注至遇皇上御殿受賀諸大禮亦一例隨班行禮提督列於都綂之次總兵官列於副都綂之次副將列於恭領之次有事故不能行禮者亦聲明填注十三年奏準車駕廵幸有民人申訴如去御路稍遠不在官兵管轄之内者專汛官罰俸三月兼轄官罰俸一月十六年覆準盔甲旗纛軍裝等項若遇天時陰雨雖繫㸃察操演日期悉令免其穿戴披執以防潮濕損壞二十二年諭外省駐防將軍及綠營之提鎮出行則皆乘輿夫將軍提鎮有總綂官兵之責若養尊處優自圖安逸亦何以表率營伍而作其勇敢之氣况旗人幼習騎射即綠營中亦必以其弓馬優嫻始厯加升用乃一至大僚轉致狃於便安忘其故步此豈國家簡擢之意耶京師都綂副都綂既皆乘馬而滿洲侍郎則無論年逾六旬亦皆不得乘輿即朕廵省所至尚每日乘馬而行乃外省武職獨相沿陋習此正非宜嗣後將軍提鎮槩不許乗輿其編設轎夫並著裁革如有仍行乘坐者照違例治罪可通行傳諭知之欽此又諭前因外省將軍提鎮有表率營伍之責出皆乗輿恐致狃於便安是以特行禁止但此内有宣力已久之年老大員又未可一槩而論嗣後如年逾七十不能常行乘馬者令該員自行酌量奏聞請㫖餘不得假藉欽此一錢糧原定武職各官將經手錢糧乾没侵欺者革職提問照例勒追如繫兵丁字識侵欺者照例治罪勒追該管官革職又定武職各官將正雜錢糧擅自那移别用者革職若因𦂳急軍需未經報明督撫私自那移應用者降一級留任竢銷算清完之日開復至存留公用錢糧因公那用者免議那移米豆草者亦照此例分别議處康熙九年題準武職各官觧送錢糧沿塗停閣日期者罰俸一年四十二年題準運到軍營米糧豆草經收武職各官延挨不收及不收本色勒索折價者綂兵將領察出題恭將經収官革職提問此等延挨勒索情弊經監放錢糧官據實申報統兵將領徇隠不題叅者亦革職提問若繫失察將統兵將領等降四級調用經収武職之該管官革職至統兵將領等及武職大小各官販賣米糧豆草屬託地方官多取價直或將民間所買米糧豆草作為已物屬託地方官令其収買者皆革職提問如將此等情弊舉首者繫官以應升之闕先用繫常人授為七品官又議準武職各官有承追之銀千兩以下者於文到日限一年追完不完罰俸一年再限一年不完降一級留任再限一年追完開復不完照所降之級調用若承追千兩至五千兩者以五年為期每案每年追完二分不及二分者初叅降俸二級二叅罰俸一年三叅降一級四叅再降一級皆留任五年限滿追完開復不完照所降之級調用承追五千兩以上者以十分為率勒限五年初叅降俸二級二叅罰俸一年三叅降一級四叅再降一級皆留任五年限滿能完至七分者準其開復未完之銀再行按年起限不及七分照所降之級調用至接任官以任事之日起扣限承追如本人實屬無力完帑承追官出結呈報由督撫題請豁免不得株連親族倘濫行着落親族代賠將承追官革職若豁免後本人見有産業悉行入官出結官革職該管上司照文職例分别議處所欠之銀着落出結官賠補該管上司有逼勒出結之事不行出首者將出結官並逼勒之上司皆革職又議準武職各官有承追之銀於一年限内追完三百兩以上之案者每案紀錄一次千兩以上之案五年限内追完者紀錄一次接任官以任事之日起限於一年限内追完千兩以上之案者加一級五千兩以上之案者加二級萬兩以上之案者加三級此等加級遇别案承追應降調者準其抵銷若一年限内追完萬五千兩以上之案者以應升之闕即用乾隆六年奏準軍營販賣米糧豆草多取價直及將民間所賣米糧豆草屬託地方官令其収買舉首之常人即授為七品官未免太優應改為給與八品頂帶一漕運原定江南江西浙江湖廣糧多路遠運官限内抵通全完者一運加衘一等二運加衘二等三運議叙即升不復加衘至三運後仍按運數加衘山東河南糧少路近運官限内抵通全完者一運紀錄二次二運加衘一等三運紀錄二次四運加銜一等五運紀錄二次六運議叙即升不復加銜至六運後仍按運數相間紀錄加銜其重運効力武舉繫領運江南江西浙江湖廣遠省者每運全完於補官日紀錄二次領運山東河南近省者每運全完於補官日紀錄一次三運既滿咨部注册推用又定運官已經升任遇前任内應議叙即升者於新任内加銜一等又定各省漕糧江北各幫限十二月内過淮江寧蘇州常州鎮江及廬州幫限正月内過淮江西浙江湖北湖南限二月内過淮山東河南限正月内全數開行其過淮各幫如違限十日者運官綑打二十仍令督運違限一月者綑打四十革職戴罪督運如現在議處之時户部咨到糧已全完者準免議處又定過淮違限革職戴罪督運之員於完糧後由總漕題請開復又定各省漕糧經徴衞所官未完一分以上者罰俸六月未完二分以上住俸未完三分以上降二級未完四分以上降三級未完五六分以上革職皆戴罪徴収完日開復其叅後仍違限未完者加倍議處應罰俸者住俸應住俸者降二級應降二級者降四級應降三級者革職皆仍戴罪徴収完日開復應革職者即實降三級調用白糧考成亦照此例署印官照屯糧署印官例議處又定隨漕輕齎等項經徴衞所官初叅未完不及一分停升罰俸一年未完一分降職一級未完二分降職二級未完三分降職三級未完四分降職四級皆戴罪徴収未完五分以上者革職署印官照正印官例議處不及一月者免議以上經徴未完官初叅之後再限一年全完限内若仍不完不復作分數照原叅分數議處不及一分者降一級留任再限一年全完若仍不完降一級調用未完一分者限内完至八九釐降三級留任再限一年全完若仍不完降三級調用未完二分者限内若仍不完降四級調用未完三分者限内若仍不完降五級調用未完四分以上者限内若仍不完革職又定各省漕糧山東河南限三月初一日抵通江北限四月初一日抵通江南限五月初一日抵通江西浙江湖北湖南限六月初一日抵通均於三月内完糧限内完糧者準其議叙若山東河南江北完糧在三月之外江南江西浙江湖北湖南完糧逾九月初十日者均以違限題叅違限不及一月者罰俸三月一月以上者罰俸六月二月以上者罰俸一年三月以上者降一級留任内有因過淮違限已經議處者將抵通完糧各日期扣除免其議處過淮違限十日將抵通完糧違限十日扣除凡日期多寡均照此筭領運白糧官亦照此例又定漕船抵通運官以通幫之糧計算如有掛欠不及一分者責二十革職發南限一年追完免罪復職不完革職掛欠一分者責三十掛欠二分者責四十掛欠三分者責六十皆革職各按掛欠分數發南限一年追完免議不完交刑部治罪掛欠四分者責八十掛欠五分者責一百皆革職各按掛欠分數發南限一年追完仍聽刑部議結掛欠六分以上者即交刑部治罪旗丁管駕一船即以一船之糧計算如有掛欠各按其分數發南限一年追完不完交刑部治罪又定運官掛欠漕糧發南追比者户部倉場咨到之日即行開缺限内全完題請開復赴部候補又定僉運旗丁除文生員專功舉業準其優免外其捐納貢監及武生一例僉運如武生遇嵗考之年呈報學政於回日補考又定運官領運漕糧剋削旗丁或將應給錢糧侵扣不發或將月糧修船等銀自行領出收貯抑勒不發或因需索不遂酷責旗丁者皆革職究擬又定奉㫖差遣及赴任各官均有定限漕船應讓路放行其買賣並一應行船應令照常行走如漕船立纛監旗鼓吹張號强横武斷運官不行察禁者罰俸一年又定漕船到汛不速催䟎無故容令先後越幫者專汛官罰俸九月兼轄官罰俸六月其漕船入境日期不察明轉報者專汛官罰俸六月若前汛催䟎不力致礙次船後汛之員申報倉場將前汛之員察恭議處至不親赴水次催䟎並坐視前船阻塞不行申報者亦照催䟎不力例議處又定漕船出運以十年為滿號該管守備先期請領料價成造倘有遲延致誤冬兌冬開者革職如揑報成造或釘稀板薄不合式者降二級調用仍將料價著落賠補至奉委成造託故推諉並日久不告竣者皆降一級調用又定漕船在大江黄河洪澤湖遭風漂没勘實題明準與豁免運官免議其在内河失風及氷凌擦漏沉溺運官失於防範者罰俸一年若遇汛水漲發猝不及防失事之船果能戽救修艌抵通全完並無虧折運官免議仍照完糧例議叙沿塗催䟎之汛官亦免議處倘船非滿號米有掛欠雖買補全完仍照例議處沿塗催䟎之汛官不能協同䕶救以致漂没者照失於防範例罰俸一年又定漕船遭風漂没沿塗催䟎之汛官不即申報者罰俸一年不親臨確勘遽出保結者革職康熙三年題準運官領兌漕糧抗不赴次及赴次恣意勒索淋尖倚勢摃打或不約束旗丁致令爭索斛面酒席恥辱糧官或沿塗生事騷擾阻壓行船不許前進恃强毆官鬭斃民命運官縱容坐視及隨幫領押回空任意停泊兵役前往催䟎抗不遵依轉縱旗丁毆打者皆革職究擬沿塗專汛官不察拏者降二級調用若已抵津通責成天津總兵官通州副將稽察防範如不行察拏副將降二級調用總兵官降一級留任如沿塗專汛官及副將能察拏申報者槩免議處已經申報而該管之各鎮不察叅者降一級調用又題準運官緣事應革職審擬其未經起程者該督撫即行審擬别簽領運已經起程者除命盗等項重情即革職審擬至尋常一切罣誤竢交糧完日押令回省審結又題準漕船所過地方有汛兵需索銀錢者該管官照失察衙役犯贓例議處汛官需索者將該管上司照不揭報劣員例議處需索之人皆計贓以枉法論如止收受土儀禮物繫官罰俸九月兵丁笞四十若汛官汛兵需索或旗丁行賄運官不申報者照應申不申例議處知情故縱者照以財行求律與旗丁一并治罪又題準官員已簽領運若抗違規避誤漕者革職又題準運官擅準呈辭拘繫新簽領運之人以致誤漕者照誤漕例議處又題準運官攬載客貨及私載已貨者革職若旗丁於應載土宜之外攬載客貨私載已貨運官失於覺察者降一級調用又題準衞官揑告運官侵糧希圖奪運以致誤漕者革職又議準運官並非因公羈絆以私事逗遛不親押運至糧船抵通起卸之後始行趕至者皆革職其因公羈絆於糧船抵通起卸後始行趕到者罰俸六月至領運北上運竣南旋托故回籍者革職二十一年題準抵通漕糧有糠粞砂土者領運官革職如無糠粞砂土収糧官抑勒不収者降二級調用二十六年題準運官廵察不勤以致失火燒燬漕船者降一級調用該管專汛官不實力撲救以致延燒别船者罰俸一年二十七年題準運官需索旗丁不遂不顧風浪逼渡江湖以致漂没糧米淹斃人口者追埋葬銀給死者之家漂没糧米著落賠補二十八年題準運官縱容旗丁捉船撥淺漫無約束者照例議處二十九年題準運官領運漕糧停泊演戲逍遥任催不理或凌辱牐官强開牐版洩水以致誤漕者革職究擬至不按程前進沿塗脱幫遲誤者降二級戴罪督運若催䟎不力揑報水淺搪塞者罰俸六月又題準衞所官觧送撥船遲誤或以朽壞之船應數者罰俸一年又題準運官領運白糧私行與人者革職提問四十六年題準各省旗丁限内過淮抵通全完者總漕賞給花紅如抵通交糧於額數之外有管運三年陸續多交百石者倉場咨部注册管運六年於額數之外陸續多交二百石以及管運二十年雖交糧無多而並無掛欠事故者均由倉場覈實咨部給以九品頂帶榮身又議準給有頂帶之旗丁及管運之捐納貢監生武生有干犯漕規者與旗丁一例懲治又議準運官除犯贓失守軍政紏叅及隠匿逃人之罪者不準以完糧議叙抵銷其因公罣誤應降級調用者準以見在議叙之加衘一等抵銷降一級已加之衘不準抵銷議叙紀錄者亦準抵罰俸若罪至革職者不準抵銷五十年議準漕糧未經兑完揑報兑完漕船未經開行揑報啟行者皆降二級調用五十一年題準衞所官収兑漕糧多攙糠粞砂土及將漕糧私自折者皆革職又議準旗丁須僉家道殷實之人由該管千總察實出具保結呈報守備等官覆驗加結如有掛欠將濫行出結之千總守備皆降一級調用又題準運官抵通無欠倉場給發限單令其即回協同隨幫管押漕船到淮呈驗限單如到淮違限者照規避例革職雍正二年覆準衞所漕船開行過十二月者罰俸半年過正月者罰俸一年過二月者降二級留任其湖南漕糧限十一月運至岳倉如州縣漕糧旗丁漕船均到水次運官収兑遲延致過十二月者照過二月開行例議處如能依限過淮題請開復三年議準漕船夾帶私鹽者運官降三級調用隨幫禠革如倚恃漕船任意販載不服盤察者運官革職隨幫責四十禠革若於該管幫船一年之内並無私鹽者紀錄一次隨幫於補官日紀錄一次至回空三次並無私鹽者該管官將隨幫出具印結咨部以千總推用四年議準漕船私帶礟者失察之該管官降一級調用失察私帶鳥槍者罰俸一年又題準領運漕船若遇風色不順水勢浩大該專汛官與運官公同計議暫停守候即將守候日時申報上司及總漕於入境出境册内注明倘不顧風色水勢催䟎前進在内河致有疎虞者運官與專汛官皆罰俸一年如揑稱風水未便停泊逗遛者運官與專汛官皆降二級調用又議準漕糧潮濕霉變致有虧折者運官革職限一年賠補完日送部引見請㫖開復不完究追其居官優者督撫保題留任亦限一年賠補完日開復不完革任究追又議準出運旗丁犯罪責令該幫運官拏解有司究治如疎縱脱逃及遲延不解者按旗丁所犯輕重照例分别議處又議準旗丁攙和水米運官不能察出者革職如隠匿不報革職枷示竢旗丁將糧米賠完日釋放十年議準漕船夾帶硝黄者運官照夾帶私鹽例議處十三年議準漕船出運遇有風火事故應賠造而擅行雇募者降一級調用應賠造而擅行買補及應買補而擅行雇募者皆罰俸九月又議準旗丁盗賣漕糧領運官不能察出降一級調用其沿塗稽察之專汛千把總失察盗賣米數不及五十石者一起罰俸六月二起罰俸一年三起降一級留任四五起以上者降一級調用其有失察一二起合算米數至五十石以上者降一級留任一起以至三起合算米數至百石以上者降一級調用兼轄游守失察盗賣米數不及五十石者一起罰俸三月二起罰俸六月三起罰俸一年四五起以上者降一級留任其有失察一二起合算米數至五十石以上者罰俸一年一起以至三起合算米數至百石以上者降一級留任專汛兵丁失察盗賣者每起杖八十乾隆五年議準運官領運薊糧抵薊全完照山東河南近省例議叙又議準運官中塗遇有降革病故等事該上司委令隨幫代押限内抵通完糧者如在天津以南咨部歸於代押重運班内推用如在北河委令代押者補官日紀錄一次又議準運官在塗患病不能押運詳報所在地方印官㑹同前後幫運官驗實出具並無假揑印結請委隨幫代押竢抵通完糧後將隨幫分别議叙又議準湖廣漕船過淮以後失事賠造不及者將該船暫減一年限一年修造免以督造不力議處其未經過淮以前失事者仍按限賠造七年議準領運薊糧有攙和薊州白土者照攙和水米例議處又議準江南江西浙江湖廣遠省運官遇截留漕糧如數通完離水次五百里以外者紀錄一次千里以外者紀錄二次二千里以外者照抵通全完例加衘一等山東河南及不過淮之各幫遇截留漕糧如數通完離水次五百里以外者紀錄一次千里以外者照近省抵通例議叙至委領重運効力武舉及中塗代押之隨幫武舉管押江南江西浙江湖廣遠省截留漕糧如數通完離水次五百里以外者補官日紀錄一次千里以外者補官日紀錄二次山東河南及不過淮之各幫截留漕糧如數通完離水次五百里以外者重運武舉準作一運隨幫武舉準作押空一次千里以外者補官日紀錄一次又議準漕船隠匿逃人將不行察拏之運官降二級調用隨幫武舉於補官日降二級調用若回空漕船隠匿逃人該運官尚在交糧未經上船者免議八年奏準旗丁不親管運將僉運之衞守備罰俸一年運官不能察出降一級留任又議準戴罪督運之員如於總漕題叅未經議結以前能以完糧報部者準免議處其已經題結者照過淮違限例總漕於完糧後題請開復九年議準松江江西湖南漕船過淮準於正限外展限十日十四年議準漕船丁舵水手應需食鹽每船不得過二十斤有逾數夾帶者運官照例議處專汛官罰俸六月又題準漕船回次責成隨幫武舉約束防範遇有風火等事將職名察叅如有新運千總接管即將新運千總察叅其减存在次漕船千總隨幫不能兼顧者責成該管地方官約束防範十五年題準溫州衞屯租徴收濟運有限内不完者照雜項錢糧例議處十七年諭前因江西鉛山等幫沿塗使用陋規一案已降㫖交該督撫河漕提鎮逐一叅劾治罪今漕運總督來京朕命將南漕舊規分别應裁應給各欵數目與軍機大臣等㑹議將各省漕船陋例分别裁革立定章程通行曉諭遵守夫因事餽遺借端勒索均干禁令况漕糧事關天庾豈容不肖弁役恣行婪賄但據該總漕酌定規例章程之内即有必不可盡革之處則從前弁役雖借此侵漁而按其情罪䆒繫相沿陋規與營私納賄者有間所有從前令各該督撫河漕提鎮叅劾治罪之處著加恩寛免朕辦理諸務輕重自有權衡裁制全無成見既經察出弊竇自應禁革而經營承辦必不可已之費亦當酌定條欵俾知法守嗣後各該管上司官不時嚴行稽察如有不肖弁役或將已裁陋規私自婪收或於定數之外多行勒索即據實嚴恭將與者受者一并治罪該管官不行揭報及上司徇隠不即恭劾别經發覺定將失察之督撫提鎮等從重治罪欽此又奏準南漕舊規既經酌給有條裁革有禁運官旗丁倘或有婪收勒索諸弊皆干嚴譴惟是向來頭幫旗丁為諸弊叢生之根則責成頭幫旗丁是亦剔弊清源之法嗣後頭幫旗丁復行科斂將已裁陋規私自婪收或於定數之外多行勒索者令各幫旗丁於該管衙門呈控審究確實計贓分别首從定擬若運官及營汛官受賄令該管上司即行叅革治罪若兵丁受賄運官及營汛官或故縱或失察亦分别題叅交部議處至旗丁挾嫌揑控者照誣告律分别加等治罪又奏準旗丁盗賣漕糧將運官捆責四十數至五十石以上者降一級百石降二級皆調用二百石者革職十八年議準武職加衘既經删除嗣後運官領運遠省者一運全完加