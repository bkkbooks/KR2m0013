鎮聽其離任者亦照此例議處二十二年題準兵馬錢糧册結所關緊要造報皆有定限必須詳慎核對明白若朦溷造報故留疑竇以致𣢾項不符者降一級調用轉報官罰俸一年提鎮罰俸六月繫提鎮核參者將造報轉報官議處若册內數目或有舛錯遺漏者造報官罰俸一年轉報官及提鎮各罰俸六月如册繫提鎮自造有舛錯遺漏者亦罰俸六月至造報轉報官將册籍遲延不送經提鎮題恭或限內並違限不及一月者罰俸三月違限一月者罰俸六月二月者罰俸九月三月者罰俸一年四五月者降一級留任六月以上者降二級調用一年以上者革職若册結已經申送而提鎮不即題咨違限五月以下者照造報官例議處六月以上者降二級留任一年以上者降三級調用至造尋常一應册籍不關繫錢糧者若有舛錯遺漏罰俸三月轉報官罰俸一月如有遲延仍按月分議處二十三年議準武職衙門前官有侵欺那移拖欠未清之項接任之署任官新任官於交代限期內徇隱不報至交代後始行察出者不議前官竟坐接任官名下照例議處如有侵那拖欠等弊接任官不受交代通詳督撫提鎮及該上司而督撫提鎮及上司不揭報題參徇庇前官逼勒接任官交代者接任官即據實報部將逼勒各官以徇庇例議處接任官調補别省三十二年覆準福建之臺灣澎湖升任官均令新舊交代其直隸山東山西河南江西湖北湖南西安甘肅等省升任官劄票到日照部定限期速赴新任所有營務委官署理不必新舊交代江南福建浙江四川廣東廣西雲南貴州等省升任官如有人堪以委署該督撫提鎮即行委署不必留候交代如無可委署之人仍留候新舊交代將留候交代違限緣由報部如無故違限照赴任違限例議處四十五年覆準提鎮有奉旨調取來京者行文該督撫計程定限給咨赴部投遞聽候引見仍將起程日期豫行報部引見後回任日期亦行報部雍正九年議準督撫提鎮核參武職交代遲延案件將遲延情由詳細確察如舊任希圖掩飾不於兩月內將任內錢糧等項造册交送經督撫提鎮指參將舊任官罰俸一年接任官免議舊任官遲至例限將屆始將册籍造送接任官又不上緊察核以致遲延者舊任官罰俸一年接任官罰俸六月舊任官已明白造册交送而接任官推諉不接以致遲延者接任官罰俸一年舊任官免議其督催不力之上司仍照例罰俸六月十二年議準在京鑾儀衛漢鑾儀使及巡捕營各官領俸清册春季於上年十二月十五日以前秋季於六月十五日以前依限造送到部移咨户部關支其有降罰事故者由部於奉旨後注册並知會戶部備案領俸之時該衙門將各官有無事故造册送部由外任升調者若有隨帶降罰之案該員具呈該衙門即於册內注明均交稽俸廳將各官降罰並見在照何品級食俸之處核對確實一并移送戶部倘造册遺漏舛錯照例議處十三年議準武職各官赴任如有中塗旅店舟次患病難行及風水阻滯違限止一二月者該員呈報該省督撫提鎮咨報部科免其參處若違限至三月以上果有阻滯實情取具該地方官印結申送部科免議如無地方官印結及並無事故借端觀望遲延不赴新任並繞道歸里揑稱中塗患病者皆按違限月日議處乾隆元年奉旨朕因各省提督總兵官未經識認者甚多是以降旨令其酌量先後來京陛見向來提鎮到京皆赴部投文聼候引見但此例不行已久督撫提鎮同為封疆大吏督撫既不赴部引見則提鎮到京亦準其即赴宮門請安候朕宣召不必先行赴部至起程赴京及回任日期仍循舊例報部以便稽察三年議準凡通行督撫提鎮按本地情形詳細察議事件各該督撫於四月六月正限之外若事易結者展限兩月難結者展限四月該督撫分别題咨按限完結各省提鎮有總督統轄者凡通行察議事件由總督彚覆該提鎮毋庸别定限期其無總督統轄之提鎮遇通行察議事件照該省巡撫易結難結之例分别題咨按限完結如逾限不結皆照欽部事件遲延例分别議處六年奏準在京革職官曽經問有罪名者限一月起程回籍五城司坊官將起程日期報部並知會原籍倘不即起程違限一月以上者本人照例治罪巡捕營專汛官不於限內催令起程容留一人者降一級留任二人者降一級調用三人者降二級調用四人者降三級調用五人者降四級調用六人以上者革職兼轄官容留一二人者罰俸一年三四人者降一級留任五人以上者降二級調用十人以上者降四級調用步軍統領於所屬巡捕營地方容留一二人者罰俸三月三四人者罰俸六月五人以上者罰俸一年十人以上者降一級留任又奏準外任革職官交代完日即行起程不得過五月之限該督撫提鎮等將起程日期報部並知會原籍倘不即起程違限一月以上者本人照例治罪專汛官不於限內催令起程容留一人者降一級留任二人者降一級調用三人者降二級調用四人者降三級調用五人者降四級調用六人以上者革職兼轄官容留一二人者罰俸一年三四人者降一級留任五人以上者降二級調用十人以上者降四級調用提鎮所屬地方容留一二人者罰俸三月三四人者罰俸六月五人以上者罰俸一年十人以上者降一級留任其有寃抑欲赴都察院具呈申理者地方官給咨來京事竣發回原籍如借端留滯者照例治罪徇情容留之五城司坊官交吏部議處又奏準漢侍衛及鑾儀衛行走之漢世爵等官請假回籍者呈該管官酌定日期具奏請旨其往返程塗在京者限十五日直隸限兩月山東山西河南限三月江南江西浙江湖廣陜西限四月福建四川廣東廣西貴州限五月雲南限六月除往返日期外在家均許住四月依期回京如違限一年以上者罰俸一年二年以上者休致十一年奏準各省督撫提鎮奉到部文務令按限完結題覆咨覆之日將準咨月日及有無遲逾隨案聲明以便察核若遺漏不聲明者照例議處十四年奏準豫行保舉及調取引見官回任由部給與驗票向未定有限期此等官均有見任職守如或逗遛日久職任久懸於營伍地方不免遺誤嗣後豫保送部以及奉旨調取引見仍回原任各官發給驗票照赴任限期填注令依限回任將驗票申繳督撫提鎮察核將有無違限之處聲明報部如有違逾照赴任違限例議處至簡發各省補用者亦照此例辦理十五年覆準欽部事件承察承辦官逾限不及一月完結者比照逾限不及一月罰俸三月之例酌減罰俸一月又覆準辦理邊疆海疆苗疆省分事務提鎮與督撫相同所有限期應展不應展之處照各督撫見定州縣按照營汛坐落之地分晰聲明至加展限期地方不準再扣道里日期又議準各省提鎮有通行察議事件繫專行一營者限四月完結繫通行各營易結者限六月完結難結者加展兩月完結至通行察議之事有不需各營議詳在本標將領可以核定聲覆者限兩月完結如逾限不結察照違限日期議處至新任接署以及巡察營汛均照例加展又奏準營汛各官遇有承緝承修承造等項事件均於初參限滿之日接扣二參限期不得以接到部覆之日始行起限又奏準承緝各項人犯營汛各官原有協同地方文職察緝之例應照文職盜案限四月無名凶犯限六月叛逆人犯將原定三年之限減去一年限以二年如限滿不獲各照原例議處又奏準候選候補武職各官赴部投文違限向照赴任違限例議但赴任者皆繫已經得官之人恐其逗遛規避貽誤地方是以定例綦嚴至候補候選原與已經得官者不同當領咨之後或因資斧艱難或因選期尚遠或因患病難行若槩照赴任例議處殊覺過重嗣後投文違限無故遲延違限在半年以上者得官日罰俸六月一年以上者得官日罰俸一年如果有患病及風水阻滯等情取具該地方官印結送部免其察議一緝解康熙三年題準監犯踰城及由水門逃走者城守官罰俸三月已開城門逃走責在有獄官城守官免議又議準營汛各官將應解犯人遲延不解者罰俸一年十一年題準監犯將已閉城門之鎖扭壞逃走者城守官革職當時全獲者免議獲一半者降一級留任雍正三年議準押解斬絞重犯該管官僉差不慎未經如數撥兵加鎖致脫逃者降一級調用已經如數撥兵加鎖脫逃者降一級限一年緝拏全獲開復不獲照所降之級調用押解流徒等犯未經如數撥兵加鎖致脫逃者罰俸一年已經如數撥兵加鎖脫逃者罰俸六月七年議準府州縣監有重犯該管專汛官撥兵協同文職巡防如監有大盜過十人以上者加兵巡防其府州縣內有提鎮副參等駐劄者輪委千把總稽察倘監犯越獄文職會同該千把各差兵役追捕不獲照盜案專汛官例議處又議準軍犯到配所免其墩鎖該管衛所官曲為防範不使至於飢寒如在配所本犯單身脫逃初恭將該管官罰俸六月兼轄官罰俸三月限一年緝拏限滿不獲該管官罰俸一年兼轄官罰俸六月攜帶妻子脫逃者初參將該管官罰俸一年兼轄官罰俸六月限一年緝拏限滿不獲該管官降一級留任緝獲之日準其開復兼轄官罰俸一年若在中塗脫逃者僉差不慎之營員住俸勒限一年督緝限滿不獲罰俸一年軍犯照案緝拏又議準斬絞重犯越獄鄰境營汛官於一月內拏獲者每名加一級再紀録一次一月外拏獲者每名加一級鄰境兵丁拏獲越獄之犯繫斬絞者每名賞銀二十兩軍流以下每名賞銀十兩於原疏防官名下追給八年議準押解人犯經由之處該營汛官撥兵護送時照牌票點明犯人及撥兵數目相符再行起解如兵數闕少或有代解等弊即詳報上司核參將僉差之官按罪犯輕重照僉差不慎例分别議處如隱匿不報别經發覺亦照僉差不慎例分别議處十三年議準武職拏獲鄰境逃犯如繫軍流之罪單身逃脫者每一名紀録一次攜帶妻子脫逃全獲者每一起紀録一次徒罪二名紀録一次準其前後接算一救火康熙九年議準京城巡捕營地方有姦細凶徒放火不能察拏之專汛官降四級調用兼轄官降二級調用又議準武職各官所管地方失火延燒文卷倉厫者專汛官罰俸一年如將錢糧文卷擅藏私家以致焚燬者將該員降一級調用二十六年議準京城巡捕營地方失火延燒民房十間以下即能撲滅者免議如不能撲滅延燒十一間至三十間者千把總守備罰俸九月遊擊參將罰俸六月三十間以上者千把總守備罰俸一年遊擊參將罰俸九月二百間以上者千把總守備降一級調用遊擊參將降一級留任四百間以上者千把總守備降二級調用遊擊參將降一級調用六百間以上者千把總守備降三級調用遊擊參將降二級調用乾隆十年覆準直省地方失火延燒民房如繫城內將在城駐劄之專汛官兼轄官照巡捕營例按間數分别議處至城外村莊失火延燒民房有該管官在於該處駐劄者亦照巡捕營例按間數分别議處若駐劄與失火地方相隔撲救不及延燒民房十間以上即能撲滅者免議十一間至百間者專汛官罰俸九月兼轄官罰俸六月百間以上者專汛官罰俸一年兼轄官罰俸九月五百間以上者專汛官降一級調用兼轄官降一級留任一捕蝗乾隆六年奏準衛所地方蝗蝻生發該管官不即申報上司者革職不親身實力撲滅藉鄰境飛來希圖卸罪者革職提問至衛所及營員奉上司差委協捕並不實力撲滅以致養成羽翼為害禾稼者革職又奏準蝗蝻生發之處能統率兵夫立時撲滅淨盡者將該員紀録一次十八年諭蝗蝻為害甚大朕屢敕督撫大員躬親督率搜捕是以提鎮亦有協同往撲者然若攜帶多人需索供應則農民轉受滋擾捕蝗之害更甚於蝗此尤其大不可者著通行傳諭知之欽此一河工原定武職修築黃河隄岸保固一年運河隄岸保固三年如黃河隄岸於半年內衝決運河隄岸於一年內衝決者將承修官革職黃河隄岸過半年衝決運河隄岸過一年衝決者將承修官降三級調用如過年限衝決者將該汛管河官革職戴罪修築工完開復其有將督修之兼轄官并恭者照文職河道例議處又定隄岸衝決限十日內具報如過十日具報者降一級調用沿河隄岸不豫先修築以致漕船阻滯者降一級調用又定隄岸衝決以少報多者降三級調用轉報官降二級調用若於年限內將所修隄岸衝決隱匿不報指他處呈報衝決者革職轉報官降五級調用又定武官修築隄岸工程均限半年完工如限內不完承修官罰俸一年督修官罰俸六月再限三月完工如再不完承修官降一級調用督修官罰俸一年又定武職修築隄岸有一處夯杵不堅盛水即漏並有一二丈不豐滿合式者降一級調用兩處夯杵不堅盛水即漏並有三四丈不豐滿合式者降二級調用三處夯杵不堅盛水即漏並有五丈以上不豐滿合式者革職督修官察其所屬有一人議處者罰俸一年二人議處者降一級調用三人議處者降二級調用四人以上議處者革職如有議處議敘相同者準其抵算若督修官察出揭參者免議又定衛所官委辦河工私自潛回以致衛夫星散者革職戴罪督催工完日開復又定隄岸衝決有例應革職戴罪賠修者限六月完工督修官降四級留任均俟工完開復如限內不完賠修官革職督修官降四級調用未完工程仍令賠修雍正三年議準山東河南江南各河營每兵每年栽柳百株栽不足數者專管千把總罰俸一年守備罰俸六月栽不及半者專管千把總降一級留任仍令補栽守備罰俸一年至各官捐栽柳秧成活五千株者紀録一次萬株者紀録二次萬五千株者紀録三次二萬株者加一級種葦一頃者紀録一次二頃者紀録二次三頃者紀録三次四頃者加一級四年議準武職修築隄岸工段丈尺樁掃料物等項有估計過多存心浮冒者將該員革職承察官扶同徇隱者照徇庇例議處十二年奏準運河隄岸專汛官督率兵丁照本汛應取土方數目堆積備用不如數者罰俸一年不及一半者降一級留任戴罪堆積完日開復乾隆三年議準河營官辨於沿河官地內捐栽小楊樹五百株者紀録一次千株者紀録二次千五百株者紀録三次二千株者加一級如所栽不及議敘之數準於次年補栽合算議敘其樹交該管之汛官照管培養倘有枯損偷盜在百株以內者責令賠補至百株以上者降一級留任賠補完日開復若將民地指為官地強占裁植希圖議敘者照強占官民山場河泊律治罪九年議準河工採買葦柴武職各官於每年定額之外多採買五萬束者該督計功奬賞至十萬束者紀録一次再有多者照數遞加紀録一隨任親屬順治年間定八旗外任武職各官將任內所生之子隱瞞不報本旗入册者照旗人隱瞞壯丁例議處康熙二十九年奏準八旗外任武職各官因降革休致事故歸旗任內並無未清之事者離任之後該督撫提鎮即令接任官將該員家察明造册出具並無遺漏隱匿印結一并咨報部旗於五月內催令起程照程塗遠近定限有驛大路日行一站無驛僻路日行五十里按日計算扣定到京日期其有水路省分願由水路行者豫先呈報仍照原定限期計算到京均咨報部旗察核如無故不即起程逾限一月以上或中塗逗遛或潛居别處或本身進京而家口仍住别處有職者革職交刑部治罪已革職者交刑部從重治罪若於原任地方起程逾限不及一月或實因患病及有别項情由不能起程或中塗實因患病及有别項情由不能前進者取具地方官印結報部免議至接任官將前任旗員家口聽其隱匿不造入册內並該員已經起程不將日期申報或已經申報而督撫提鎮不咨報部旗以致逗遛生事及中塗妄借事端勒取印結地方官不據實申報遽給與印結者發覺皆照例議處又奏準外任武職例應歸旗者専管官不速催起程容留一人者降一級留任二人降一級調用三人降二級調用四人降三級調用五人降四級調用六人以上革職兼轄官於所轄地方容留一二人者罰俸一年三四人降一級留任五人以上降二級調用十人以上降四級調用提鎮所轄地方容留一二人者罰俸三月三人罰俸六月五人以上罰俸一年十人以上降一級留任雍正五年奏準八旗外任武職各官所有族人及十八嵗以上之親子弟皆不準帶往任所如子弟有實不能相離者呈明該都統將情由具奏請旨其未至十八嵗子弟欲帶往任所者呈明該佐領參領都統存案準其帶往至十八嵗時該旗行文該督撫提鎮勒限歸旗倘私自帶往任所及隱瞞年嵗將該員降一級調用八年議準八旗外任武職各官於到任三月內將所帶家人姓名籍貫册報督撫提鎮如管事家人有更換者亦隨時册報倘本官有虧空等弊將管事家人一并審究若册報不實或聽其贖身為民將該員照隱匿逃人例議處不詳察之該管上司照失察逃人例議處得財者並計贓以枉法從重論乾隆三年奉旨嗣後旗員請留子弟隨任者該部務須察明實有不能相離情由方可奏聞請旨四年奏準八旗外任武職各官其隨任子弟因赴選應試等事來京由任所該父兄造具本人履厯年貌清册呈報該管督撫提鎮移咨部旗仍具文交本人親投該旗察對若任所該父兄繫提鎮大員可自出咨者即自行出咨其不候給咨私自來京或領咨潛往他處有職銜人革去職銜間散人鞭一百如該父兄不為請咨給咨擅令來京罰俸一年若已將情由呈明而該督撫提鎮不給咨者罰俸九月至有事來京仍回原處者呈明該旗移咨該督撫提鎮仍具文給本人投該任所上司察對如不候給咨私回或領咨潛往他處者該隨任子弟照前例議處其各官內有緣事解任應留任所者如隨任子弟有應質問之處由接任官申報該上司咨明部旗仍留任所質問若無可質問其應先歸旗之隨任子弟接任官不為請咨私令歸旗者降一級留任隨任子弟不候給咨私離該父兄任所及潛往他處該地方官未經察出申報者罰俸九月其子弟亦照前例議處五年議準八旗外任武職各官若將任內所生之子過繼與人潛匿别處居住者革職該管上司罰俸一年失察者罰俸六月如於半年內察出揭報者免議六年奏準隨任子弟至應歸旗之年實有不能相離情由欲留任所者繫提鎮子弟該提鎮自行具奏副將以下督撫提鎮代為具奏由部察明實有不能相離情由奏明準其隨任倘父兄將子弟私留任所及隱瞞年嵗不送歸旗將該員解任親送子弟來京仍降一級調用七年諭向來旗員子弟自幼隨任在外年至十八嵗者例應來京若有欲留任所協辦家務者凖督撫代為題請聽候部議其新授外任之人子弟在京長養年過十八嵗以上者非奉特旨不得隨任此舊例也朕思旗員子弟不許擅隨任所者一則恐在地方滋事一則留京以備該旗當差如外任旗員能嚴加約束為督撫者又不時稽察則皆知守分循理可無慮其多事至該旗佐領若本有可以當差之人而父兄外任者將子弟帶往則本人既可省兩處之食用該佐領間散之人又得當差支領錢糧以資養贍洵為兩便之道嗣後外任旗員子弟年至十八嵗以上者在外仍令該督撫題請在內著呈明該都統察奏皆準其隨任其不願隨任者亦聽之若隨任之後或出署交遊及干與地方之事著該督撫即行參奏從重議處欽此又覆準外任武職旗人子弟年至十八嵗以上請留任所者若必逐案題奏未免案牘紛繁嗣後將請留任所情由照例詳明各上司該督撫核實先咨部旗存案俟年終由部彚齊人數具題其在旗初蒞外任官員請將子弟帶往任所者仍由該都統察奏一休致順治年間定武職老病乞休二品以上具疏自陳三品以下在京由都統奏請在外由將軍等具題交部核覆乾隆二年奏準老病乞休各官核明曽出征臨陳受傷得有功牌者請旨令其原品休致給以全俸以養餘年其出征並未禦敵及無功牌者請旨令其原品休致給以半俸一患病乾隆七年奏準內外旗員患病該管大員委官確驗酌量給以假期總不得過六月之限如逾限未痊有職任者開闕若世爵將俸祿停支俟病痊之日具呈該旗都統隨旗當差自當差之日起支俸無世爵者候闕補用至額外食俸官亦照此定限有逾限不痊者即行停俸俟病痊之日仍在原處當差倘無病揑稱患病呈報者將本官降一級調用委驗官罰俸一年出咨之該管官罰俸六月又奏準王貝勒貝子公屬下護衛典儀親軍校等因病解任後經病痊仍以該員原官補用不凖咨補别闕一雜例康熙二十三年議準武職擅受民辭者降一級調用又議準武職各官因事夤緣餽送禮物與者受者皆革職提問如餽送雖未收受並未出首後經發覺將不出首官罰俸一年又議準武職各官有將任所民人買為奴僕者降二級調用縱容家人私買及委託營兵代買者亦照此例議處失察之該管官降一級留任又題準武職見任官員聽任親友招搖詐騙者革職三十八年議準武職進京引見借端科斂所屬官兵以充私橐者革職提問該督撫提鎮不覆參者照不揭報貪劣例議處又奏準武職上司將所屬末辨如有事故並不揭參任意笞辱者罰俸一年笞辱守備以上者降二級調用又議準武職宿娼者革職姦家下有夫之婦者降一級罰俸一年姦軍民妻者革職強姦軍民妻及姦官員妻者革職治罪和姦軍民妻者革職拏獲姦夫姦婦私放者罰俸一年得財者革職雍正五年議準緑旗官辨暴厲毆死奴僕者照八旗毆死奴僕例議處十一年議準武職因公科斂不入已者為首降一級調用為從罰俸一年該管官不揭報者罰俸九月乾隆五年奏準武職家人犯贓本官失察者降一級調用六年奏準在官兵役指稱公事犯贓該管官知情者革職失察贓至十兩以上者降一級留任十兩以下者罰俸一年又奏準武職各官所用食物工料將價直給發遲延者罰俸一年半給半不給者降二級調用全不給發者革職折欠價直照數追還十四年議準運京銅鉛一到該營汛官辨按站交替催趲撥兵巡察將入境出境日期申報督撫稽察若運官無故逗遛及有盜賣情弊亦即據實申報倘知情代為隱瞞照徇庇例降三級調用欽定大清會典則例卷一百十八
