body:
  text: 戸部關税下一直省關差順治元年題準專差戸部漢司官一人照例撰給專勅精㣲批文又定左右兩翼守庫官張家口差滿官收税四年題準荆關通惠河中河清江厰杭州蕪湖西新各關蘆政等差歸并户部差滿洲漢軍漢官五年定差滿司官徴贑關税七年定獨石口殺虎口差滿官筆帖式收税八年定各關專差漢官每關一人九年覆準并西新關江寧倉為一差停獨石口差十一年題準各關兼差戸部滿漢官筆帖式又題準各關差令戸部司官食俸三年者掣籖如無滿俸者方許未滿俸司官掣差又題準關差向無廻避原籍之例今定直省人各避本府邊鎮人各避本鎮京劄差不在此例十三年題準各關專差漢官兩翼差筆帖式張家口殺虎口各差滿官一人漢軍官一人筆帖式一人照例一年更代十五年題準荆州關差部員收税十八年題準凡關差掣籖令滿司官親寫堂官驗封公掣不許書役干與康熙元年題準各關兼差滿漢官筆帖式各一人六部各咨送滿漢官筆帖式各一人輪掣䝉古漢軍皆停差遣又定張家口殺虎口專差滿洲䝉古官二年題準滿官差郎中員外即漢官專差郎中又題準兩翼張家口殺虎口與各關一例輪差六部司官三年題準各關差令六部滿洲䝉古漢軍漢人各司官及筆帖式同掣籖其兩翼張家口殺虎口仍差戸部官筆帖式又題準各關差滿漢官到任未滿四月有事故者補差同先差官更代四月以外不準補差如筆帖式有事故不論月分補差同滿漢官更代又題準除已出各項部差不復差外其差過一次官以囘部月日乆者送戸部輪掣凡在差六月外有事故徹囘者即作一差不及六月者仍補差又題準六部各司留俸淺官一人辦事餘均送差如止一人則不準送又題準各關停差筆帖式兩翼張家口殺虎口仍照舊例四年題準各關税均交地方官管理崇文門歸治中天津關歸天津道龍泉各關口歸井陘道紫荆各關口歸直𨽻守道臨清關歸東昌道揠運廳歸通薊道居庸關歸昌宻道西新關歸江鎮道蕪湖關歸池太道揚州關歸驛傳道滸墅關歸蘇常道淮安關歸淮海道北新關歸浙江布政使荆關歸荆州府同知九江關歸九江道贑關歸吉南贑道太平橋歸南雄府知府遇仙橋浛光厰歸韶州府知府徵收税課兩翼張家口殺虎口仍差戸部滿官七年題準崇文門兩翼選差各部滿漢官北新關改𨽻兩浙鹽運使八年覆準各關仍令六部滿漢官論俸掣差先差過者不準再差并臨清倉臨清關為一差揠運廳居庸龍泉紫荆荆州府贑州府各關仍交地方官管理九年覆準淮安關兼管淮安倉及工部清江厰又題準兩翼專差滿官筆帖式又題準戸部蕪湖關兼管工部蕪湖關工部龍江關兼管戸部西新關仍照各部錢糧覈銷十四年議準各關選差賢能官其筆帖式仍論俸差遣停其議敘議處十六年題準贑關太平關仍差部員十八年覆準各關仍論俸差遣十九年題準潼關山海關照例差六部滿官一人潼關兼收大慶關龍駒寨二處税課二十一年題準鳳陽關照例差六部滿官一人收税舊例鳳陽倉徴收乂題準九江關移駐湖口又題準停差潼關山海關部員仍交地方官分管二十三年覆準福建廣東二省設滿漢海税監督各一人筆帖式各一人又覆準六部司官仍照前差遣外其餘衙門應均分差遣宗人府理事官副理官主事内閣侍讀起居注主事都察院經歴都事共四十二人作一分督捕郎中員外郎主事太僕寺員外郎共五十人作一分理藩院郎中員外郎主事大理寺寺正光禄寺署正共五十七人作一分各照六部司官論俸差遣其各衙門筆帖式亦應均差以吏科國子監歸吏部額内共筆帖式一百十有三人太常寺鴻臚寺戸科中書科登聞鼔院歸禮部額内共筆帖式一百十有六人鑾儀衛起居注歸兵部額内共筆帖式一百十有四人内閣中書歸宗人府額内共一百三十人大理寺光禄寺禮科兵科詹事府通政使司欽天監歸理藩院額内共筆帖式一百五十人太僕寺刑科工科翰林院歸督捕額内共筆帖式一百五十一人都察院歸工部額内共筆帖式一百三十九人亦按年分差遣又題準張家口殺虎口二處停止專差戸部照各關例令各部院官掣差二十四年覆準江南浙江二省設滿漢海税監督各一人筆帖式各一人又覆準西新龍江二關各設專官課税仍照各部銷算二十六年議準四省海差一年更代又議準淮安沙溝地方歸并淮關其朦朧軋東岔河等處不必稽察二十八年諭採捕魚蝦船及民間日用之物並餬口貿易悉免其收税嗣後海關著各差一人欽此又奉㫖關差所遣中書筆帖式不必論其捐納升調年月止以始補筆帖式日計算差遣又覆準沙溝繫朦朧軋東總滙若歸淮關稽察是在海關要地又増一税今將朦朧歸海關軋東歸淮關沙溝免其稽察又覆準西新龍江二關相隔二十里商民兩關稽察難免守候嗣後將西新關歸并龍江關專差監督一人三十年覆凖在京内外共關差二十六處左右兩翼張家口殺虎口古北口潘桃口六處不差漢官崇文門等二十差應差各部院衙門滿漢官將多寡數目計算匀差内務府官照前作二分漢官作二分各部院衙門滿洲䝉古漢軍司官及筆帖式按八旗作八分毎次將俸深官各咨取二人公同掣籖差遣三十三年設立山海關差官管税又覆準張家口徴税在宣府兼收殺虎口税課在右衛兼收三十四年覆準浙海關於寧波府設立衙門將沿海廵邏哨船内撥二十船召募衙役於各口廵察又覆準浙江定海縣設海關衙署並設紅毛館一所令監督往來廵視一年差滿將所徴税銀作為定額四十六年議準山海關外金州牛莊等處交與監督廵察越關漏税所得贏餘據實報部作為定額四十七年定荆關税務工部差官管理五十三年臨清關監督題報闕額奉㫖竢監督任滿交廵撫監收五十四年議準九官臺清河松嶺子等處交與山海關監督廵察收税増課銀三千兩五十五年北新鳳陽天津三關監督題報闕額奉㫖竢監督任滿交廵撫監收又覆準將交與廵撫監收之關税均令其歲終彚解其各關監督所收税銀仍照二十五年題定之例報解至報部簿單停其四季解送竢任滿之日親身投繳五十七年議準江南浙江等五省貿昜商船到厦門就驗不便増税照舊例收泊厦港貿昜者在厦門海關納税收泊江浙各省貿易者在各處海關納税五十八年議準淮關税務於兩河同知内遴選一人管理又議準福建糖船至厦門發賣者令赴該關納税其往浙江江南各省貿易在厦門停泊者免其輸税五十九年議準江海關交與江寧廵撫浙海關交與浙江廵撫即令各該撫分辦八處銅又議準横城地方設口收税交與山海關監督兼管増税銀千兩作為定額又覆準淮安版牐暫交與江蘓廵撫管理雍正元年覆準九江關仍自湖口移歸九江其不由九江經過之江南江西往來商船於大孤塘别設口岸照例徴收令江西廵撫選賢能官二人一駐劄九江一駐劄大孤塘湖廣往江西船若在九江納税至大孤塘即驗票放行江西至湖廣船在大孤塘納税至九江即驗票放行如有重徴苛勒等弊該撫不時稽察題叅又諭嗣後税務交與地方官監收於錢糧地方均有裨益著議奏欽此遵㫖議準淮安等九關均交與廵撫委官兼理外嗣後九江滸墅揚州西新蕪湖太平贑粤海浙海九關停其遣官亦交與該撫令地方官兼管所收税銀照例解部崇文門無地方官可交仍差内務府官山海關差仍將部員論俸開列左右兩翼古北口潘桃口殺虎口盛京渾河即胡納胡河等處均繫小差仍照例差遣部員二年覆準淮安關仍差部員滸墅關交蘇州織造官管理又覆準張家口監督應辦貂皮羊皮免其辦交其運送游牧處羊毛馬牛等皮交與地方官運送毎年節省銀四千兩歸入正額交納四年議準廣西梧潯二府税銀令該撫將實在徴税之數詳悉察覈委亷能官監收毎月盡收盡解一年之後視收過税銀於舊定解額外贏餘若干據實定議具奏又議準㳺牧處應解皮毛仍令張家口監督運送至京所需車價在節省銀内動支據實覈減造册報部統於考覈案内題銷五年題準奉天牛馬税差向例於盛京五部將軍衙門郎中員外郎主事内俸深者委用惟是本地俸深人員未必盡能稱職嗣後奉天牛馬税差於在京部院衙門俸深官内各選一人保送開列引見差往令其盡收盡解如有徴多報少等弊即題叅議處又引見山海關税差奉㫖嗣後内府八旗俸深官不必論内府旗分惟論俸開列六年諭鳳凰城中江税務向來皆繋城守尉等官管理但此處繋外國交易之地關繫𦂳要見今盛京五部司官均繫朕簡選補授之人嗣後著盛京五部侍郎於五部司官内簡選奏聞㸃出管理一年更代欽此又題準嗣後中江税差一年差滿更代令盛京戸部照例簡選保舉送部引見恭候欽差七年題準浙江南北兩關税務令杭州織造官就近管理十三年引見殺虎口監督奉㫖嗣後應出小差俸深官不必令其在部掣籖著與保送官一同引見乾隆二年覆準武昌厰務不必專委武昌府同知照各省之例於就近道府廳官内遴選經管一年期滿題明更代仍於限滿之時將徴收正額贏餘數目具題考覈四年奏準鳳陽關税務照崇文門山海關之例於各衙門保舉及俸深官内開列具題請㫖簡用一年差滿更代其臨清江海蕪湖贑浙海荆太平等關仍交廵撫兼管十二年奏準凡崇文門左右兩翼張家口殺虎口山海關等處税差例繋宗人府六部各保一人内務府保送二人同八旗内府俸深官一并開列題請簡用至用完保送之人再行各衙門咨取惟是税有大小各官才具不同嗣後若保送官用至剰二三人時除所剰人員衙門無庸咨取外應行文别衙門令其保送竢各關差滿一并開列引見又題準中江税銀酌定毎年以三千二百九十四兩作為額徴如朝鮮貿易一年四次之外有多交次數盡收盡解其貿易貨物令該城守尉守邊門官造册報部管理税務仍就近委盛京五部司官監收凡所需用歲給銀二百兩於火耗銀内動支一考覈順治五年題準關差考覈稱職方準囘部有不稱職者該督撫據實題叅十一年題準關差一年為滿凡到任囘部均量地逺近限定日期崇文門限前官任滿第二日到任本任滿第二日囘部河西務限六日臨清關二十日淮安關五十日揚州關五十五日西新關六十二日蕪湖關鳳陽關六十七日滸墅關七十一日北新關九江關八十六日贑關百有十日太平關一百三十五日違者覈叅康熙四年覆準地方官徴收關税以受事日為始扣至一年督撫題報考覈八年題準關税欠不及半分者罰俸一年半分至一分以上者降一級二分以上者降二級三分以上者降三級四分以上者降四級皆調用五分以上者革職闕額錢糧免其追賠溢額不準議叙如有事故以離任日為止作分數考覈至商税不令親塡簿册及不給紅單者罰俸一年如將部頒税簿用關差印塡送或將税簿紅單不按季報部者罰俸半年收税單簿報部限期天津關二十日臨清關二十五日淮安關揚州關滸墅關三十五日蕪湖關西新關四十日北新關四十五日九江關五十五日贑關六十日十一年題準關差囘京原領專勅精㣲批文親繳部科違限一月以内者免議一月以外照例交部議處十四年題準各關欠不及半分者降職一級留任餘照前例全完者紀録一次溢額每千兩者加一級至五千兩以上者以應升先用部差官員不令督撫管轄如地方荒歉河道壅塞自行報部移咨督撫察覆考覈十六年題準各關額税銀二萬兩以上者仍照前例議叙萬兩以上者額税全完紀録一次溢額半分以上加一級一分以上加二級一分半以上加三級二分以上加四級三分以上以應升先用數多者遞準加級十七年定關税足額者不準議叙十九年題準山東仍開海禁令該撫察報船戸毋致匿税二十五年議準嗣後税銀四季報解部科簿單候任滿日彚報有溢額者停其議叙又議準商人親塡簿單令各監督任滿親身帶囘繳送部科察覈四十六年題準蕪湖關粤海關均展限兩月北新關展限三月天津關展限二十日四十九年諭各關請展限者甚多此皆伊等圖利並無益於公事此後將題請展限者著永行停止如有題請者該部嚴察議奏欽此五十四年覆準山海關夏秋霪雨商賈阻滯洋船來者寥寥以致錢糧不足再義州所屬沿邊等口近年姦商漏税著展限一年令監督親身赴舊關九官臺喜峯等口廵察所得贏餘銀作為額税關額錢糧亦令補足五十五年議準嗣後各省關差一年差滿闕欠錢糧題請展限補闕額者交與該部照溺職例革職其所欠銀交與該旗著落家産追賠如有遲滯不將任滿囘京日期於兩月前具呈考察及收税册籍不交納者將出差官暫停升轉竢考察具題完日方許照常升用五十八年覆準浙江南北二關將任滿一年税銀照例按季解部雍正二年題準贑關税銀毎年呈報内部就近充餉五年議準嗣後川省米船到䕫關時即令該府稽察除夾帶私鹽及違禁等物按律究擬外其船之大小照依淮關尺寸則例科税如有别項貨物仍照䕫關舊例收納統歸正項六年題準四川打箭鑪徴收雜税照地方徴税之例每兩收税三分又題準囘空糧船裝載棃棗等物滿載者照重運額載糧米四百石計算合貨四百八十擔平倉者照三百石米算合貨三百六十擔半倉者照二百石米算合貨二百四十擔以小擔每擔四分計算滿載應納銀十有九兩二錢平倉納銀十有四兩四錢半倉納銀九兩六錢豆貨滿載仍以四百石算納銀十有六兩平倉以三百石算納銀十有二兩八錢半倉以二百石算納銀六兩四錢又題準淮關毎年首二三季額銀仍差吏役管解其第四季額銀及一年存庫彚解並贏餘銀自雍正六年為始當季滿之時咨報蘇州廵撫委官解部七年題凖潼關徴收商税較之部頒條例乆已加増往來商販乆已相安若仍令遵照部例徴收徒為官役中飽於商毫無裨益應照見徴之數著為定例勒石關前仍將見行徴收銀歸入正額造報又奏準江海關所屬廟灣口税歸淮安關管理其徴收條例仍照江海關之例並將廟灣口一年應徴商税額徴贏餘數目移咨淮關考覈又題準粤東遇仙橋浛光橋厰徴收税例均照太平橋部頒條例徴收其蘇木檀香胡椒三項税銀仍照遇仙橋條例𣙜徴八年覆準廣西梧潯兩厰酌定歲額每年梧厰徴收銀四萬六千八百二十八兩有竒潯厰每年徴收銀三萬四千一百三十一兩三錢有竒除於此二厰徴收額税内撥給各官養廉歲終别册報部外實存銀二萬八百四十九兩三錢有竒作為正額至此内有每年兼收米榖税銀恐歲有豐歉則税亦有多寡務令盡收盡解據實具題又題準嗣後閩海關徴收海船梁頭税銀如船戸有抗欠不完於考覈册内注明報部存案一面行文原籍追完解交接任監督彚解如該州縣推諉遲延照依督催雜項錢糧之例叅處十一年覆準鳳陽蕪湖兩關平法等子均不畫一交工部成造頒給該管官如有私造故為輕重情弊令該督撫察實題叅其所收商税銅斤水脚銀照正税一例塡入單内給商收執竢早晩放關即驗單截角放行至年滿考覈時將所收正税贏餘若干銅斤水脚若干分造清册報部又題準廣東瓊州等口所收税銀竢季滿具文解交粤海關監督庫内沿塗經過地方撥兵䕶送解役盤費於羡餘項下按程支銷十二年題準四川䕫關徴收商税以雍正十一年奏報銀七萬三千七百四十兩九分有奇作為定額其米船税銀既恐年歲豐歉商販多寡難以定額令該撫不時稽察飭令監收之官據實盡收盡解仍於每年題報時取具並無隠匿印結彚覈報題乾隆元年題準揚州關所過邵伯船裝載豆税準其每石照舊完税一分其滕家壩落地税銀就近歸泰州徴收仍附入揚州關考覈又奏準江西九贑二關鈔課令商人將應納税銀自行投匱收銀之後發三聨單一給商人一交廵撫衙門一存税署以免需索侵隠之弊又覆準淮倉項下徴收商税等銀該關官一年差滿將任内徴收解給錢糧造册具題考覈又覆準張家口居庸關向無火耗其書役飯食等項準照崇文門之例車馱貨物過税收取飯錢以資養贍四年諭上年江安兩省歲旱歉收朕蠲振兼施多方籌畫並令豁免米糧賦税俾商販流通源源接濟於地方甚有裨益續經該督奏請將淮安揚州滸墅鳳陽等關免徴米税竢乾隆四年麥熟時停止朕降諭㫖允其所請今屆麥熟之期聞各屬雨澤尚有未曽霑足之處且上歲歉收之後米價一時未能平減若商販稀至仍恐民食艱難著將上下江各關口米税照舊免徴俾商賈踴躍從事則米船衆多價直自平而民食有賴竢本年九月米榖盛行之時再照定例徴收欽此六年諭各省關税定有正額而盡收盡解自有贏餘此不過杜司𣙜者侵蝕之弊並無有累於商民也但各省年歲之豐歉不同貨物之多寡亦異其贏餘原不能每年畫一近見各關報滿之時如贏餘浮於上年則部中不復置議如減於上年之數即行駮覈司𣙜者唯恐部駮必致逐歲加増年復一年將何所底止苦累商民事有必然之勢朕思關税贏縮相去本不致懸殊若乙年所報贏餘之數稍不及甲年原可不必駮覈若過於短少亦必有情由惟應令督撫稽察則地方實在情形自難逃於公論總之察覈過嚴則額數日増其害在於衆庶察覈稍寛則司𣙜侵蝕其損在於國帑此中輕重固有權衡况清廉之吏斷不肯侵帑肥家而不顧行止者終必敗露亦斷無安享無事之理其如何定例之處著大學士㑹同該部詳議具奏欽此遵㫖議準嗣後各關贏餘銀如與上年數目相仿者戸部即考覈具題如本年所報贏餘與上年數目懸殊令各該督撫就地方情形詳細察覈如無侵隠等弊即據實聲明覆奏倘該督撫覆奏不實及扶同徇隠别經發覺一并交部議處又覆準黄豆一項非麥秫可比雖遇歉年不準免税七年題準通州戸部分司所屬黄村地方準其照舊設立税口稽察漏税是年又諭國家設關𣙜税定其則例詳其考覈凡以崇本抑末載諸㑹典著為常經由來已乆其米豆各項向因商人販賤鬻貴是以照例徴輸苐思小民朝饔夕飱惟榖是頼非他貨物可比關口徴納米税雖每石所收無幾商人藉口額課勢必高擡價直是取之商者仍出之民也朕御極以來直省關税屢次加恩減免又恐𣙜吏額外浮收刋立科條多方訓飭每遇地方歉收天津臨清滸墅蕪湖等關口商販米船槩給票放行免其上課皆以為民食計也但繫特恩間一舉行未能普徧夫以養民之物而𣙜之税轉以病民非朕已溺已飢之懷也今特降諭㫖將直省各關口所有經過米豆應輸額税悉行寛免永著為例俾米榖流通民食充裕懋遷有無者不得藉以居奇小民升斗之給不致有食貴之虞以昭朕惠養黎元之至意至各關口徴收則例不一有徴商税者有徴船料者有商税船料並徴者今既蠲免米税其船料一項若不分晰明確著為規條恐致溷淆滋弊應如何辦理之處著該部詳察妥議具奏欽此又諭朕愛養黎元特沛殊恩將關𣙜米豆等税悉行蠲免以為充裕民食之計但船料一項議論不一見發九卿㑹議尚未覆奏朕思此事並無難辦之處向徴船料者應照例徴收向不徴船料者豈可因免米豆之税而轉加徴船料可即速行文各關知之欽此遵㫖議準將向例徴收空船料銀者遇有裝載米糧過關其應納料銀照依空船料銀之數納料如本繫空船及按年抽單納課者仍照舊例徴收又諭山東臨清關向徴銅補商補相沿已乆報部則統名之為船料前撫臣改為計石上税而將銅補商補歸入石頭徴解是名革而實存也今朕既降㫖蠲各省米糧之税此項亦應一體加恩槩行豁免欽此又題準臨清關所屬之徳州魏家灣尖塚樊厰等處口岸準其照舊設立以便廵察十年奏準行令免徴米豆税銀各關不得借免米豆税銀名色有虧正額有借端闕額者令其賠補其免過米豆税銀虚數停其造報又奏準囘空糧船如無梨棗可帶準其攜帶核桃𤓰子柿餅等物六十擔以抵梨棗之數如有多帶及帶别項貨物者仍按例徴税十一年定嗣後各關任滿具題即將銀數册籍一同起解仍於題本内將委官起解日期聲明題報其册籍到部移送戸科磨對竢戸科發囘之日由部扣限具題如該關題本已到而銀册遲至二十日後未到者取具該管官職名叅處又各關徴收贏餘較上年短少有竢督撫察覈覆奏者仍於題本内聲明未便遽行考覈字樣並令該督撫以奉㫖之日為始扣限四月覆奏逾限未覆者即行咨催又崇文門左右兩翼張家口山海關年滿向不題報今年滿具題各關已經定限考覈則崇文門等關亦應酌定限期嗣後以任滿三月之後即將册籍送部移科磨對又嗣後各關年滿具題而銀册已到及贏餘並無短少者雖有經手案件未清亦應先行考覈其有應追經費銀仍於彼案内著追完結十二年題準福建詔安縣溪雅税館準其改設懸鐘地方以免偷漏又諭昨據工部具奏蕪湖工關較去年短少行令察覈業已降㫖依議今日戸部議稱蕪湖戸關贏餘較去年有餘毋庸置議等語此案工關贏餘雖較上屆不足其戸關較上年贏餘之數足敷抵補如將有餘者毋庸置議不足者再行察覈於考覈功過之意未合即行察覈亦徒多往返登答工部再行察覈之處不必行嗣後著該部照此辦理如一人而兼兩關其比較上年贏餘之處均有不足再令該督撫據實察覈欽此又題準淮安關之廟灣口船鈔向繫按季僉差赴阜寧等五縣協催憑差役按戸徵收難免勒索嗣後令各州縣就近徴收按季解關十三年諭朕降㫖蠲免各關米豆税銀本以食為民天關税優免則市價可減是以不惜千萬正課為小民謀饔飱寛裕計當時内外臣工屢有以但利商賈無益民生為言者槩未允準朕意欲試行數年果否於民食有裨再行酌量乃數年來税免而米豆之價不惟不減且昂貴時或有加明繫姦商不知免税之恩專利自封轉以有限之帑項肥三倍之囊橐無裨閭閻允宜仍復原額且地方偶有偏災即將該處關口應徴米豆税額加恩寛免則䑩舶聞風雲集市直自平駔儈不得居奇窮黎均霑實惠轉得操權自上朕意不專為軍需起見也如既復之後姦商藉端長價弋利妨民該地方官即應嚴行察明究處至淮關因寛免米税後該監督奏準加徴船料今既徴米税仍循舊例行各該監督暨地方官明悉出示曉諭毋令胥役陽奉隂違致滋弊竇欽此又奏準淮關裝運米豆等免税船過關凡滿二百石以至千石之外應報納整單者照例量明梁頭尺寸每尺科以船契銀二錢五分分單每尺科船鈔銀三錢三分照各船實在梁頭𣙜數槩以九折折準尺寸一律科算徴收其未滿二百石僅有二三十石及一百八九十石者準照渡船並小契半鈔大契半鈔之例數滿二十石為渡二徴鈔銀二錢三十石為渡三徴銀三錢四十石為渡四徴銀四錢五十石為渡五徴銀五錢六十石至九十石為渡六皆徴銀六錢如滿百石除徴鈔銀六錢外再報小契一張納銀六錢如百有十石至百五十石除納小契外納鈔銀八錢如百六十石至百九十石契銀按梁頭二錢五分一尺科徴外納鈔銀一兩至自上而下之船有由淮關分口之長山白洋新河後湖四處例先徴收比鈔錢糧今大關雖改收契鈔並非重複並廟灣口例徴梁頭銀均照舊徴收又過關應税貨船並無駮運偷漏情弊未便照米豆等免税船加徴應仍照整單分單舊例徴收準其來囘一載年滿再行别納十四年奏準各關徴收贏餘銀除各關監督向由自行奏聞者仍照舊例辦理其例應報部者該監督於年滿時比較上届若有短少即報督撫確察該督撫出結會奏所有比較上届短少銀數即於各該督撫監督名下追賠再關税考覈定例收税官欠不及半分者降一級留任欠半分至一分以上者降一級欠二分以上者降二級欠三分以上者降三級欠四分以上者降四級皆調用欠五分以上者革職原因正額短少是以分别議處今贏餘雖與正額有閒若不酌定處分恐致懈弛嗣後比較上届短少不及一分者免議外其一分以上者罰俸一年二分以上者罰俸二年三分以上者降一級留任四分以上者降一級調用五分以上者降二級調用仍令按照條例徴收不得藉端滋弊工部所管各關亦一例辦理十五年奏準各關管理税務無論兩任三任均令扣足一年為滿其管關一年零數月者將一年贏餘奏報零月歸於下届統竢扣足一年再行彚奏其各任所徴贏餘較之成數無虧及此任徴多能抵補彼任短少者均毋庸議倘彼任短少而此任所餘之數不能抵補者止將短少之員議處如各任所徴銀數皆少者皆照例議處如前任所徴税課果繋實力稽察盡收盡解令接任之員出具並無揑飾印結送部其已經出結以後接任不得復將短少縁由推諉前任倘接任官員察出前任果有徴多報少侵蝕等弊即據實叅奏如扶同徇隠發覺將出結之員一并交部議處十八年諭各省奏報關税贏餘數較上届短少部議皆交督撫察明情由從未有察出侵蝕情節據實叅劾者章奏往返竟成故套朕思關税時贏時絀勢所不免若無故短少或任意侵肥該督撫自應随時奏聞治罪如果無情弊何必重複聲明致滋案牘嗣後各省奏報關税贏餘數目該部覈覆時毋庸復交督撫察奏欽此又奏準關税贏餘較上届短少無幾者本部随奏覈結較上届短少大相懸殊者令該監督將該年情形據實奏報如無故短少任意侵肥本部即行叅奏仍照數追賠其工部所管龍江等關亦一例辦理一禁令順治九年題準各關差不許留用保家委官等項名色其額設廵攔各製號衣腰牌以杜冐充十年題準令各關差刋示定例設匱收税不得勒扣火耗需索陋規並禁關役包攬報單十一年覆準各關納銀數多給票數少者許商民首告議處十三年題準過關船如有指稱内外官及旗下人夾帶私貨者該關官報部叅處又題準各關當堂設匱設梁頭貨物條例商民親自填簿輸銀投匱驗明放行隠漏者治罪如有濫委差役苛索民閒小船往來衣服食物者該撫察實叅處十四年題準關税照部頒條例刋榜𥪡立關口便商輸納康熙二年題準外國人帶進貨物崇文門不必收税四年題準各關不許復用舊役五年題準嗣後崇文門貨物出門者免税八年議準各關刋榜除去鈔貫字樣明載徴銀數目收税單一樣填寫二紙一留商人一送部察覈九年題準各關召募書吏不許舊役更名復充十一年題準裁各關典吏攢典十八年諭各關額外横徴差役四出擾害商民者該部嚴禁訪叅欽此二十三年覆準福建廣東許用載五百石以下船出海貿易地方官登記人數船頭烙號給發印票令防守海口官弁驗票放行撥船廵哨如有雙桅八槳載五百石以上大船出洋夾帶禁物及文武官弁借端需索者皆從重治罪其進海口内橋津地方貿易舟車等物停止徴税二十四年議準江浙二省亦許出海貿易其禁例與閩廣同又覆準福建沿海無篷桅捕魚船税仍聽地方官徴收其有篷桅船聽監督照例徴收梁頭税課沿海要口均撥哨船衙役廵察二十五年議準州縣官隠匿海口之船至五船者罰俸六月十船以下罰俸一年十五船以下降一級留任二十船以下降一級調用二十五船以下降二級調用三十船以下降三級調用三十船以上革職仍計所隠之船應徴税銀照數賠補又諭橋道渡口處所槩行收税於朕䘏商之意不符著九卿詹事科道㑹議具奏欽此遵㫖議準止收出海入海船税進口内橋津地方貿易船車等物仍停其徴收三十二年覆準設關原以通商便民近多違例濫徴甚至小河小港以及近關之地旱路均行攔截擔負之民盡行檢索嗣後令各該督撫不時訪叅如别經發覺將該督撫一并處分三十四年覆準各關監督所給商人印單不許徹囘如有徹囘多徴等弊該撫題叅議處三十六年議準關差赴任均照各衙門事例聽舊官僉㸃經制書吏如有自京私帶積蠹及年滿復充舊役謀占總科庫頭名色者嚴加議處五十二年議準嗣後出差官攜家口赴任與不酌量關口足用多帶家人及任滿囘京不照題定兩月限内具呈考覈擅買田宅者發覺之日交與該部治罪至衙役除解餉公事仍赴京長接監督在任買優置妾及以闕額藉口題請展限者皆交該部治罪五十三年題準湖廣桂陽等四縣行銷引鹽鹽蠹串通太平關𣙜蠹阻留勒索又太平關統轄三關每過關船勒索單銀橋錢行令督撫嚴行禁止五十五年議準𤓰洲税課司每年額徴税銀向徴貿易小民此後停其徴收令揚州府同知代為捐解並造入該同知經徴由牐額税内别欵清解如該同知再於商民私徴該撫即行題叅其税課大使既無徴收之責著令裁去雍正元年詔各關差除正額錢糧外加増贏餘銀作何減除之處該部酌議具奏遵㫖議準將淮安北新南新鳳陽天津臨清江海浙海荆州等九關加増贏餘銀悉行裁去二年諭國家之設關税所以通商而非累商所以便民而非病民也朕撫御寰區加惠黎庶惟恐民隠不能上逹近聞𣙜關者往往寄耳目於胥役不實驗客貨之多寡而止憑胥役之報單胥役於中未免高下其手任意勒索飽其欲者雖貨多税重而朦蔽不報者有之或從輕報者有之不遂其欲雖貨少税輕而停滯關口至數日不得過是以國家之額税聽猾吏之侵漁以小民之脂膏飽姦胥之谿壑司其事者竟若罔聞又聞放關或有一日止一次者江濤險急河路窄隘停舟候關於商民亦甚不便嗣後𣙜關者務須秉公除弊過關之船随到随驗應收税者納税即放不得任胥役作姦勒索阻滯以副朕通商便民之意至於崇文門收税及分委各口收税之人亦有多方勒索分外苛求之弊京師為四方輻輳之地行李絡繹豈宜苛刻滋擾監收者尤當不時稽察杜絶弊端各省關差若不遵諭㫖經朕訪聞定從重治罪欽此又諭凡商賈貿易之人往來關津宜加恩䘏故將關差歸之廵撫以廵撫為封疆大吏必能仰承徳意加惠商旅也但各關皆有逺處口岸所委看管之家人賢愚不一難免額外苛求及索取飯錢等弊稍不如意則縛送有司有司礙廵撫之面徇情枉法則商民無所控訴矣嗣後著將應上税課之貨物遵照條例逐件刋刻詳單印刷多張各貨店均給一紙使衆人知悉其關上所有刋刻條例之木榜務令𥪡立街市使人人共見不得隠匿屋内或用他紙掩蓋以便高下其手任意苛索立法如此自能剔除弊端各省兼管關税之廵撫受朕委任之重尤當仰體朕心遴選誠實可信之人以任稽察之責必期商民有益方為稱職欽此五年覆準滸墅關豆税舊例丈八梁頭納銀六十七兩三錢小販每石七分近來丈八梁頭有改造深寛者令循例籖量多者依數每石二分六釐遞加其過船倉限槽餘豆亦每石二分六釐小販改每石四分又題準糧船於裝卸馬頭産貨地方令押運官及沿塗催運文武官弁親身察驗如有不法姦丁舵工水手人等沿塗停泊攬載多貨立即申報題叅將運丁照漏税例治罪貨物入官拏獲之兵役量加賞給如有明知故縱及漫無覺察者將該管運弁並地方官皆嚴加議處又題準各商船戸不許私走支河務須直赴關口按例輸課如有包送漏税及隨帶軍器恃衆拒捕等弊將姦徒姦商船戸按律究治地方官議處至於近關土豪或繋無頼或繫革役成羣冒充廵攔撑駕白船横截汊港要路攔阻郷民柴米食用器具不應納税之物勒索銀錢者許監督地方官弁協拏究治又奏準回空糧船許帶土宜六十擔免其輸税伊等勢必將貨分散各船侵欺税課嗣後回空糧船所載梨棗等物仍令輸税又奏準滸墅關嗣後徴收大梁頭船裝載豆貨活梁頭船裝載米貨均令籖量計石收銀四分其紬段每擔輸税銀二錢六分以七十五斤為一擔布每擔輸税銀二錢五分以百二十疋為一擔桐油一擔輸税銀一錢二分至各色貨各樣船應徴條例並令刋刻木榜曉諭商民其各關徴收税銀亦令各關監督將各處見行徴收條例據實陳奏刋榜曉示毋得陽奉隂違倘經接任官察出從重治罪又題準臨清關徴收米麥税銀照滸墅關之例籖量計石每石納銀二分二釐雜糧照原額每石一分一釐船戸應納正糧仍照舊徴輸七年諭各關開放商船向例有部頒號簿近聞各關别設私簿徴收惟於報部之時始將號簿挨日填造其意以水路船往來多寡不齊若據實填簿則不能逐日有徴收數目恐干部駮是以設法匀𣲖填造如此則簿内全非實在數目與商船過税串票毫不相符殊非政體且凡事據實則可以無弊作偽則弊竇叢生今既任意匀𣲖填造則號簿亦為虚設矣嗣後各關於部頒號簿務須據實填寫倘無船過税之日亦即注明不得仍蹈前轍如敢故違定嚴加議處該部亦不得濫行指駮致滋弊端欽此又題準浙省南北兩關及浙海關税徴收税銀事宜均令刋立木榜以便商旅其嘉湖兩府南糧並民間完納漕糧租米等項進關原非商販其船税一槩免徴又奏準鳳陽關所轄之正陽關商船以豫斛三百石為滿料關下裝船以五百石為滿料多餘者為加倉不足梁頭者為小販光州雜貨以擔計税􅤮篷竹木以件計税臨淮長淮照梁頭例盱眙等本處裝載照關下例臨淮桅封船鈔每丈納銀二兩二錢每増減一尺各増減税銀三分並令將各口條例刋榜曉示八年題準天津關向來收税一兩加等耗一分八釐船料一兩加等耗五分八釐著永行禁革又題準嗣後有黄金販賣出洋者照鐵貨銅錢等物私出外境下海律治罪其監督守口文武官弁受賄故縱與犯人同罪失察者照律叅處又題準採捕魚船夾帶米榖皆由私牙代買囤口豫積小船般運停泊游移之故嗣後米牙必擇身家殷實取鄰甲同行保結如串商代買本人並濫保者一例治罪其海口居民多行囤積私糶者鄰甲舉首免罪止究本人容隠發覺並行連坐外來船均令進口停泊其各澚小船令地方官按數察明編號入册取具互結令各營縣汛口官弁兵役實力稽察如有盤出私米及首報者準其賞給十分之三在洋拏獲者給半餘入官充公仍飭廵察兵役不得將海口居民食米指稱私積詐害違者按律治罪又題準福建沿海各屬給照通糴米榖令各營縣官弁察驗照内買米地方準其買足即於照内注明數目移知原籍察對如逾地偷買者拏究該地方官弁或故縱奉行不力者指名題叅九年題準山海關之西北石門寨等處梨税準其每包減税一半止納三分以䘏窮民將各税徴收火耗酌定以每兩扣耗二錢其二錢二分者減去二分二錢五分者減去五分十年議準徴收商税條例令管關者刋刻散給未免隠匿由己應行令各督撫轉飭附近關口之地方官將題定見行條例刋刷小本頒發各行戸散賣每本定價銀二分以為刋刷之資仍委官不時訪察如各關木榜有黏貼掩蓋及書役苛索等弊即詳報上司題叅至地方官刋發條例有不詳晰校定遺漏錯誤或扶同徇隠者一并叅處十二年諭直省關税監督於地方官原不相統轄一切呼應不靈而大小口岸甚多監督一人勢難分身兼顧雖選委書吏廵役公同親信家人稽察收放而地方文武官弁以為無與已事並不協力或轉挾私則姦商之隠漏土豪之把持督撫或不關心監督動則掣肘不獨於税務無補即於地方亦難免擾累嗣後凡有監督各關著該督撫監管所屬口岸飭令該地方文武各官不時廵察如有縱容滋擾情弊聽督撫叅處至監督徴收税課及凡應行事宜仍照舊例遵行不必聽督撫節制如此庶既有專司仍無敢岐視於税課商民似均有禆益欽此十三年諭聞江南淮安版牐地方有土豪人等開立寫船包載等行由該縣濫請司帖合夥朋充為客商之擾累曾經該關差追帖禁止而土豪等仍改易姓名盤踞淮關上下凡有南河北河西河三路豆米貨船内有重載在於關口雇覔小船起駮者輙恃强代雇任意勒索使用不饜不休客商甚為苦累毎致觀望不前朕得之傳聞者著該督撫再行確察倘果有此等情弊即嚴懲禁止毋得視為具文嗣後布政使司衙門亦不得濫給牙帖若他處關口有似此作弊者著該督撫一例察禁欽此又題準山東青白二豆素資江省民食雖不在例禁之内但沿海載運商船出入理宜設法稽察以杜偷賣應令山東海口各州縣衛設立兩聨印票凡有豆船出口將商客船戸年貌籍貫本船字號梁頭尺丈二豆數目出口月日逐一填注票内一給商船一留該處存察該船到次由海關進口上税者該關驗明人船豆數相符即於來票内填明到口日期鈐用關印仍將船票交商進口竢賣完回東呈送原給衙門驗票察銷其由劉河收口者亦令該關别設豆船印票發存口岸竢豆船進口上税之時即將印票驗填進口日期將山東來票截角一并交與本商回東呈繳其有江南客商在東買豆回省者亦由山東給與印票竢回省將票繳存關口一月彚移覈銷仍令山東州縣衛每月將給過豆船票號造册申請咨送江南稽察江南關口亦將每月到關驗過豆數造册申齎咨送山東較對至前次已經出口之船於下次出口船票内令山東各州縣衛照數開載聽江南海關體察前船曾否到省如有未到即關㑹確察嗣後山東豆船倘無印票而載運出口及有匿票私賣並與原票不符之處一經察出根究明確將無印票而載運出口及匿票私賣者船豆皆入官販豆人等照偷運米榖出洋例治罪其與原票不符者果有私賣外洋情事將船豆亦皆入官販豆人等亦照偷運米豆出洋例治罪如無私賣外洋情事或因出口之時二豆數目未經覈準有與原數短少無多者將販豆之人照違制律杖一百船豆免其入官如該管官不行詳察致有偷漏私越情弊别經發覺照失察偷運米榖出洋例罰俸一年又議準各關將徴收税條刋書大字立於關口不得書寫小字懸立僻處違者該督撫即行題叅又近關前後數里之内有設廵役者悉行革除以安商旅乾隆元年諭朕聞外洋紅毛夾版船到廣時泊於黄埔地方起其所帶礮位然後交易竢交易事竣再行給還至輸税之法每船按梁頭徴銀二千兩左右再照則徴其貨物之税此向來之例也乃近來夷人所帶之礮聽其安放船中而於額税之外將所攜置貨見銀别徴加一之税名曰繳送亦與舊例不符朕思從前洋船到廣既有起礮之例此時仍當遵行何得改易至於加増繳送税銀尤非朕加惠逺人之意著該督察照舊例按數裁減並將朕㫖宣諭各夷人知之欽此二年奏準殺虎口肩擔背負攜帶箕筐笤箒鞋襪麥麯等物免其輸税其興販積成車䭾捆擔者仍照例輸納又覆準各省米榖税例龍江西新山海贑殺虎口張家口閩海江海太平南新廟灣成都府等處皆稱向來並不徴收米榖之税崇文門打箭鑪與揚州之滕壩均收酒米之税其餘豆麥雜糧槩不徴收均應遵循舊例毋庸議外至九江粤海蕪湖鳳陽清江厰北新天津浙海等關並廣西之桂林平樂梧州潯州富川賀懷集等府縣皆稱徴收船料揚州由牐淮安宿遷臨清滸墅䕫關等處皆稱籖量計石按例徴税未便遽行更張但米榖為民食所資與百貨不同若不分别豐歉槩行徴收恐歉歲省分致増米價有妨民食嗣後舊徴米税船料各關除豐登之年遵照舊例按則徴收外倘地方偶遇旱澇其附近省分各關口令該督撫即將被災情形具奏請㫖寛免凡米榖船一到即便放行竢該地方秋收成熟方準按照舊例徴收再廣東開建恩平二縣米船税銀均屬奇零商販不同外省大商巨艦永停徴收三年奏準回空糧船稍帶零星梨棗六十石以下免其𣙜課又覆準凡裝載米糧船察明實繋販往歉收地方者免税放行仍給印照至歉收地方關口察驗填明到關月日鈐印發票令其回關察照如回船載有他貨止徴貨税免其船料倘販米船不往歉收地方卸賣者仍照例輸税如有揑稱販往歉收處給有過關免税印票而竟往他處販賣者察出照漏税例罰懲又諭今春因直隸米價昂貴朕特頒諭㫖將天津臨清二關及通州張家灣馬頭等處米税寛免徴收商賈聞風踴躍往來販運民食無闕已有成效嗣因二麥有收經管理天津關報部行直督察覈随經督臣覆奏照例開徴在案近因沿河地方被水較重附京一帶米價加昂見在又開海運商販必多仍應免輸税銀以示鼓舞著將内河前項米糧各税一并暫停徴税俾商賈争趨雲集於畿輔民食自有裨益即速行文督臣等知之欽此又題準出海樵採船每船準帶食鍋一口每名止許攜斧一把在船人數不得過十人令地方官均於照内注明出入察驗有夾帶出口及進口闕少者即行嚴究四年奏準滸墅關續設蠡口港等十三處王莊等十處顧二房廊下等五處口岸廵攔稽察透漏應暫為存留毋庸裁汰仍不作報部經制其附近鎮集船載米不及十石及農民交租辦糧質當米麥並本地土貨㮣不得徴收税銀五年奏準嗣後在京在外官員家眷船過關除無貨物照常驗放如有姦牙土豪假揑京官名帖討關等弊該管關官即行拏究或京官子弟執持父兄名帖討關夾帶貨物希圖免税者照例叅處如該管關官不行詳察及明知瞻徇者一并議處六年奏準嗣後各關領帑委官採辦銅錫鉛經過關口察驗文批數目相符立即放行不得收納税課其有額外多帶餘銅及夾帶别項貨物則照例徴收如有偷漏情弊令該監督報恭其運載船既照時價給發水脚仍輸納税料又題準嗣後各省發帑委官採買振濟及糶三補倉米榖經過各關口免其納税止徴船料七年覆準北新關經過米船準其照舊徴收梁頭課銀不必計石科税其空船過口亦照舊免其納料八年奏準江蘇起運振糶米穀非同客商米穀是以給發水脚止能計站覈給而經由關口難於豫定不能包算船料在内其從前酌定脚費每米穀一石毎百里給銀八釐之例既無應輸船料在内而較之民閒雇募脚價實屬短少毎遇撥運雇覔之時船戸率多畏避若再令其完納船料勢難賠累應將在官撥運米穀免徴船料九年奏準嗣後福建如遇歉收之年委官於米賤省分購買海運接濟不得招商運販以滋弊竇十年題準福建臺灣一府産米素饒泉漳諸府多仰給於臺粟今商漁船般運過多以致漳泉諸府失所援濟嗣後商船毎船止許帶食米六十石於出鹿耳門之先令臺防同知察驗有多帶者分别責懲餘米就地起賣倘不能驗明致有夾帶至入口盤出或别處發覺者將該同知照例分别米榖多寡議處其沿海港汊紛岐難免透漏令地方文武官弁實力廵察拏禁一各關見行條例有單徴商税者有單徴船料者有商税船料並徴者自康熈八年至乾隆十六年節年沿革損益屢經考訂就本關時勢因地制宜應加者加應減者減務期上無虧於國課下無擾於商旅毎關刋刻見行條例各一本由部頒發各關令其遵照徴收部中亦各存一本以備稽考欽定大清㑹典則例卷四十八
