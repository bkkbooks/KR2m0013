票在驛站支取每多需索嗣後槽頭不許前往即於該衙門扈從官內遴委一人持票支取應用並不得令校尉署史私到驛站更換車馬致滋弊竇違者照例責懲十九年奏準駐防各官赴任皆按品級給與車馬口糧及草料除車輛口糧各處例皆畫一無庸置議外惟馬匹一項江寧京口杭州福州荆州西安寧夏涼州成都廣州及寧古塔黑龍江等十二處向有中塗歇餧之例至乍浦莊浪及拉林吉林白都訥三姓渾春默爾根齊齊哈爾胡蘭呼倫布俞爾等處同一道遠駐防又例不歇餧事不畫一且駐防各官挈家眷按站行走於中塗並不住歇是以江寧等處向來請領歇餧草料者亦屬稀少應將中塗歇餧馬匹之例停止二十年覆準雲南貴州四川廣西甘肅五省初選文職知州以下武職都司以下原有給與勘合赴任之例但見在月選文武各官均準借支養亷路費已屬充裕所有勘合填給馬船之例請停止一驛費原定驛站歲需夫馬工料修造車船廩給口糧及棚䥷鞍屉柴薪鐙油藥材雜支所有各項錢糧約計應用之數各於該省田賦內照數編徵直隸額徵銀六十八萬五千八百六十三兩九錢五分有竒米二千四百十有五石六斗豆九千四百二十四石八斗麥麩二千六百九十二石八斗山東銀三十萬三千六百四十四兩五錢七分山西十有八萬一千九百二十八兩七錢八分河南五十八萬二千六百二十一兩七錢四分江蘇十有九萬一千三百三十七兩六錢安徽十有三萬五千九十八兩二錢江西十有八萬二百八十五兩二分福建六萬五千六百五兩六錢五分浙江十萬九千五百三十九兩五錢二分湖北二十萬七千六百二十七兩四錢三分湖南十有四萬一千九百九十五兩六錢七分西安二十六萬一千七百十有二兩六分甘肅十有三萬七千二百五十五兩八錢一分米七千七百三十二石九斗八升五合豆二千一百五十八石二升草八萬五千七百六十六束四川銀五萬八千四百五十二兩二錢二分廣東三萬四千五百五十三兩一錢二分廣西三萬五百四十五兩二分雲南四萬六千五十四兩四錢五分貴州七萬四千八百九十一兩三錢六分各有竒用有存剩及或有裁減報部充餉順治八年題準各省驛站錢糧支用數目該管驛傳道於歲終彚造清册呈報該撫核明具題由部察核奏銷又題準本部館所監督於滿司官內遴選一人指名奏補三年一次更代所有歲需夫馬車及各項錢糧令其經管每季將應用數目造報車駕司核明具稿請咨戶部支領據實給發應用如馬有闕額疲瘦及夫車短少將該監督劾參十年覆準直省驛站錢糧責成驛傳道令各州縣將支用款項造具清册呈送由該道核明彚報該撫具題至田賦項下額徵驛站錢糧將經徵州縣官完缺數目明白登注以憑分别考成康熙六年題準各省驛站有於常例之外動用錢糧者由該撫報部核給若因兵馬動用者由該督報部核給又題準各省驛站錢糧奏銷統限次年五月內具題造册分報部科察核又題準驛站額徵並協濟錢糧以及抵兌等項均作十分考成將夫馬工料修造車船廩給口糧雜支雇募價直造册共為一疏於次年五月具題逾限照例議處七年覆準驛站夫馬小建截曠皮臟變價等項各該撫察明扣存以濟撥補衝繁驛站不敷之用十一年題準盛京歲需驛站馬價銀二千二百六十四兩廩給車價銀七千九十六兩九分由戶部給發司驛官造具支用清册呈報盛京兵部侍郎具題由部察核奏銷吉林歲需驛站馬牛價銀四千三百六十五兩一錢廩給銀五百兩黑龍江歲需驛站馬牛價銀三千五百六十五兩廩糧銀千兩均由戶部給發各司驛官造具支用清册呈報各該將軍具題由部察核奏銷又題準各省驛站奏銷册每省造一省總每府造一府總以節年存剩為舊管以額設實徵為新收以夫馬車船各項工料及廩給雜支雇募價直為開除以本年支用存剩及建曠皮臟變價並節年存剩為實在一府各為一本然後將州縣驛逐一分晰務與府總相符府總務與省總相符至災蠲一項原繫戶部題準所有驛站項下應蠲細數均於驛站奏銷案內聲明以憑本部移咨戶部如果相符即為察核題覆又題準驛站每年扣存建曠皮臟變價並各項存剩銀由部於奏銷後移交户部充餉如有衝繁驛站不敷及災蠲闕額者轉咨户部撥給十二年題準張家口歲需驛站銀三千三百十有九兩四錢七分米八十六石四斗豆千四百四石草二萬一千六百束由户部給發司驛官造具支用清册送部察核奏銷又題準喜峯口歲需驛站銀五千一百四十三兩七錢二分八釐獨石口歲需驛站銀一千一百三十八兩五錢六分豆八百六十一石六斗均由戶部給發各司驛官造具支用清册喜峯口由熱河副都統咨送獨石口由古北口提督咨送由部察核奏銷十四年議準司驛官藉口錢糧應付不敷私令民間幫貼者降三級調用又議準經管驛站上司將應給錢糧不照數實給者照貪官例議處又議準驛站錢糧如夫馬車船工料價直以及雜支等項不但各省不同即一省之中亦有多寡及本色折色不等此皆因地制宜自當永遠遵守不得任意增減嗣後奏銷册內分晰開造毋許籠統不分致滋朦溷十五年議準驛站錢糧各裁十分之四充餉二十年奉㫖前因錢糧匱乏驛站錢糧裁減四分今著準復二分三十四年題準本部館所額設車馬等夫每名月給米九斗鹽菜銀四錢五分四十二年議準口外驛站錢糧皆司驛官豫先支領若不存貯在官私借與人圖利者革職交刑部治罪又議準田賦項下編徵買馬價銀停其專案題報統入驛站案內奏銷如價有存剩移交戶部充餉五十二年題準吉林驛站錢糧管驛官管理三年報滿果無廢弛侵扣等弊由將軍察核保題以該員應升之官即用雍正元年奏準盛京驛站錢糧司驛官正副二人協同管理三年報滿果能整飭並無廢弛侵扣等弊盛京兵部戶部會同巡察官察核保題以該員應升之官即用如三年內廢弛侵扣即會同題參交部議處十一年議準各省驛道經管驛站錢糧凡有收放各數並支銷𣢾項隨時移會藩司每年奏銷時仍將該年出入與節年存剩銀一并造册移會藩司逐一核對相符即具盤察清楚印結報部考核其每年奏銷奉部題覆之後該撫接到部咨即行知藩司備案又奏準喜峯張家獨石等口驛站錢糧令司驛官管理三年一次更代十三年奏準本部館所驛馬停支本色每馬日給草料銀六分七釐五毫每馬月給馬價藥材銀二錢五分以備買補醫治之用每馬歲給雜支銀三兩二錢四分以備鞍屉槽䥷棚廠等項之用駕輦馬照驛馬例支給乾隆二年奉㫖各省草銀每馬一匹河南湖南皆五分浙江江南皆六分山西則四分五分不等該省地狹民稠人多服賈不若江浙等省之舟楫往來到處可通商販是以草料價直平時昻貴而又當秦蜀之衝差使絡繹所有額支銀除去鞍屉各項雜支外每馬一匹實支銀不過二三四分不等以致各州縣咸藉口價直不足纍民採辦甚或從中漁利弊竇叢生閭閻受其擾纍所當酌量變通者著將山西驛站草料銀照江南浙江之例每馬加足六分至鞍屉各項雜支仍照常例毋庸議加嗣後養馬料草悉照時價採買如有絲毫擾纍小民者嚴參治罪朕因山西情形如此特降諭㫖他省不得援以為例十二年覆準直隸四方輻輳差使繁多既有分塗猝辦之勞又有抽調協濟之事原與他省不同一應開銷全在隨時酌劑驛站項下原編徵六十八萬五千八百六十餘兩節年裁減實用僅三十六萬餘兩嗣後總以實用之數酌劑支應若支應果在數內準其開銷十五年奏銷驛站錢糧除節年裁減銀米豆草等項歸戶部充餉外直隸見額銀三十九萬六千二百六十二兩三錢九分有竒米二千四百十有五石六斗豆九千四百二十四石八斗麥麩二千六百九十二石八斗又車價二千四百兩車馬夫工料銀六千一百十有六兩五錢二分坐臺官役廩糧銀五千九百兩車價廩糧各别為一本奏銷盛京見額銀二千六百六十四兩廩給車價銀七千九十六兩九分山東見額銀十有九萬一千三百七十六兩一錢七分山西見額銀十萬五千八百三十一兩一錢七分河南見額銀二十八萬八千九百二十九兩八錢一分江蘇見額銀十有六萬五千七百五兩三分安徽見額銀九萬八千八百十有八兩五錢二分江西見額銀十萬九千九百四十三兩一錢一分福建見額銀三萬二千九百十有二兩九錢一分浙江見額銀六萬五千七百二十三兩七錢一分湖北見額銀十有八萬五千十有九兩一分湖南見額銀十有二萬一百九十四兩一錢七分西安見額銀十有六萬五千八百九十兩五錢四分甘肅見額銀十有三萬一千四十六兩五錢一分米七千二百二十七石五斗七合豆一千九百二十九石六斗草七萬五千六十束廣東見額銀二萬七百三十一兩八錢七分廣西見額銀一萬五千二百十有九兩三錢八分各有竒雲南見額銀二萬六千五百四十一兩四錢五分四川貴州仍照編徵原額以上各直省支銷若有存剩均於奏銷後移交戶部充餉張家口除裁減外實領銀一千五百三十五兩四錢九分米八十四石九斗六升豆一千二百七十四石四斗草二萬一千二百四十束喜峯口除裁減外實領銀四千五百三十兩三錢五分獨石口除裁減外實領銀一千一百二十一兩四錢六分豆八百四十七石五斗六升至吉林黑龍江均仍照原額支領若有存剩於奏銷案內聲明留抵下年之用十八年奏準本部館所監督有經管錢糧之責止用滿司官一人辦理恐難周到應增設漢監督一人協同辦理於漢司官內擬定正陪引見補用又奏準本部館所原設驛車等馬二千匹節年裁減千一百五十匹見存八百五十匹內除車馬一百五十匹屢因供應不敷尚需五城司坊雇募不必裁減至驛馬七百匹雖差使最繁之時曾用二百餘匹以及四百九十匹不等然約計尚可裁二百匹以二馬一夫計之可裁夫百名所有夫馬裁減錢糧照數扣存毋庸支領又奏準黑龍江驛站繫委筆帖式領催同管所有部給關防繫支領錢糧之用向來交與領催執掌體制未免倒置嗣後交與筆帖式專掌領催協辦凡支領驛站錢糧由筆帖式鈐用以專責成欽定大清會典則例卷一百二十
