官兵前往駐防將軍都統準帶家口四十人副都統三十五人協領及三品官三十人佐領及四品官二十人防禦及五品官十四人驍騎校筆帖式及六品官十二人領催驍騎炮手七人匠役人等五人均由部移咨戶部給與沿塗口糧如家口數多者止照定例支給少者照實數支給其前往在近京百里以內者不給口糧又覆準廣西初選文武官自京赴任者照雲貴四川甘肅之例給與勘合火牌二十六年題準八旗文武各官奉差者分别緩急給與勘合除前往江西福建浙江湖南西安甘肅四川廣東廣西雲南貴州等遠省仍照康熙十三年定例遵行外其前往直隸盛京山東山西河南安慶蘇州湖北等近省者尋常緩差一品至六品官所有從役各減二名馬各減二匹七八九品官從役各減一名馬各減一匹若繫急差一二三品官從役各再減一名馬各再減一匹四五六品官馬各再減一匹七八九品官從役止一名馬止二匹不必再減二十八年覆準驛傳道私發牌票違例支取夫馬者革職三十年覆準雲貴廣西四川文職八品以下武職五品以下有丁憂休致裁汰降調卸事後五月內病故者照在任病故例給勘合送其骸骨回籍過五月者不準至領憑前往雲貴廣西四川未經到任在此四省地方病故或由此四省升往别省在此四省地方病故者報明地方官轉詳督撫亦準給勘合其犯罪革職病故者不準又題準奉天將軍及盛京各衙門公事所需勘合火牌皆於盛京兵部取用每年由部給發勘合火牌各二十張交貯備用其用過數目該部於年終造册奏銷至盛京三陵掌關防官由部各給發火牌三張遇有應用之時該管關防官將用過緣由數目報盛京兵部察核彚入該部一案奏銷又題準吉林黑龍江將軍給發勘合火牌各十張其餘各處將軍給發勘合火牌各四張專城副都統給發勘合火牌各三張如有公事用過勘合火牌年終將用過緣由數目造册奏銷三十一年議準直省文武各官及駐防將軍都統副都統有慶賀表箋不許專差齎送擾纍驛站有總督省分彚入總督衙門恭進無總督省分彚入巡撫衙門恭進至奉天吉林黑龍江將軍慶賀表箋專差恭進其所屬各副都統彚入各該將軍衙門恭進三十四年議準公事差遣有應撥兵護送者照勘合火牌之例給與兵牌以憑沿塗察照應付其私事一槩不準撥兵各督撫提鎮一年撥過兵若干名詳開護送緣由於年終造册報部察核彚題又覆準官員解送內外錢糧均給勘合同知通判馬三匹州縣及佐雜等官馬二匹不給廩給口糧其齎送陵寢祭品御用之物並解鄉試卷進京者亦照此給勘合又題準各關差解送稅課除擡銀人夫照數給火牌護送兵丁酌量給兵牌其驛馬槩不準給三十八年奉㫖侍衛內監等騎驛馬者給飯食不必給廩糧又題準雲貴廣西四川文職八品以下武職五品以下各官病故骸骨若無親僕有同鄉之人可以帶回者該督撫察明給勘合三十九年覆準奉差官役有例應撥兵護送者由部給以兵牌亦照勘合火牌之例並給尾單兼録清漢黏貼兵牌之後於交接處用印鈐蓋令沿塗營汛官驗明照數撥兵即於尾單內填明並無多索亦無遲誤字樣用印鈐蓋若有藉稱緊急將兵牌不與驗看額外多索擾纍者該營汛官毋得鈐蓋印信據實揭報本部參奏繫官革職繫役杖一百多索兵一名者官降三級調用役杖八十二名者官降四級調用役杖九十三名以上者官革職役杖一百倘並無兵牌詐索護送兵者該營汛官一面申報該督撫一面報部有職者革職無職者審究治罪至奉差官役並無擾纍多索營汛藉端遲延不即鈐蓋印信者許官役據實申報將該營汛官降一級調用四十五年覆準給發勘合火牌將應經由之州縣驛站並中道東道西道填注明白如奉差官役不遵勘合填注繞道行走除該官役照例處分外將首先濫應官一并議處又議準自京奉差往各省官員人等及外省奉差來京者所用夫馬船車數目奉差緣由並勘合火牌內填注廩糧若干於每月終繕摺彚奏五十一年覆準督撫司道家人私騎驛馬及因事騷擾需索者司驛官即報部參奏若狥庇不報或由部察出或被人首告督撫司道並濫應司驛官一并議處又覆準一應奉差官役所領勘合火牌兵牌事竣即行繳銷如遲延三日以外不繳銷者察出官罰俸三月役笞五十五十五年奉㫖督撫提鎮有緊要奏摺差千總等官或差兵丁或差家人齎進者每一次止許用馬二匹又議準駐防官兵所帶之馬除近京之直隸山東山西河南盛京綏遠城察哈爾游牧等處均無庸於中塗歇餧外其駐防廣州準在山東兗州府江西南昌府各歇餧二十日福州準在江南揚州府浙江杭州府各歇餧二十日成都涼州寧夏準在山西太原府陜西西安府各歇餧二十五日西安準在山西太原府歇餧二十五日荆州準在河南衛輝府歇餧二十五日江寧京口杭州準在山東兗州府歇餧二十五日吉林黑龍江春季準在盛京歇餧二十日冬季準在盛京歇餧三十日又議準盛京寧古塔因公事差遣騎自已馬匹來京者由部移咨户部給與十日口糧如在京候部題覆者給與二十日口糧回日每馬日給空草一束若繫牧場馬匹日給料二升雍正元年諭驛站關繫重大經朕屢加嚴諭然其間積弊難以盡詰有在官之纍有在民之纍如直隸山西差徭更為浩繁雖驛馬足數亦供應不敷乃內而兵部外而驛道於給發馬匹時官吏通情受賄往往所給浮於勘合之數且行李輜重皆令驛卒乘馬背負多至八九人不等所到州縣以見馬換馬向有舊例不敢詰問至督撫提鎮經過之處更惟命是從嗣後照勘合之外有敢多給一夫一馬者許前塗州縣即據實揭報都察院以聽糾參如甲縣容情不揭而乙縣揭報者並甲縣一并治罪其督撫提鎮騷擾驛遞者皆照此例庶少蘇在官之纍至若河南山東諸省離京稍遠謂耳目易欺每驛額設馬匹不過十存三四其草料工食仍照舊開銷且逐年詳報倒斃侵蝕買補之價差使一至則照里科斂將民間耕種牲畜強令當差令其自備物料跟隨守候種種纍民尤屬不法著該地方督撫將所有驛站逐一徹底清察闕額者勒令補買至科斂民間牲畜尤當勒石永禁違者即從重治罪欽此又覆準將軍督撫提鎮以下各官如有家人衙役擅騎驛馬需索驛遞財物令司驛官申報上司該上司即行指參如容隱不參將該上司照狥庇例議處又奏準營汛額兵原為操防而設除頒詔遣祭解運御用之物及奉差官領有敕印並解運餉銀段匹等項押解人犯均給發兵牌撥兵護送外其餘升任赴任或尋常事奉差及駐防官挈帶家口行走者均不準給發兵牌又議準督撫提鎮及駐防將軍都統等有緊要奏摺準差人馳驛用馬不得過二匹若以尋常奏摺擅差人馳驛者察參照例議處二年覆準奉差官役騷擾驛站者許司驛官申報如司驛官應付遲誤亦許奉差員役申報若已經申報而督撫不參及失於覺察者照例議處四年議準各省巡察官一年之內遍經所屬地方按照品級給勘合沿塗有驛站者照例應付無驛站者地方官酌量應付其駐劄之處準日支廩給口糧又議準官員無論內地口外凡有一年差遣者給勘合照各省巡察官之例行又議準奉天將軍及盛京五部府尹各衙門齎送陵寢祭品並一應本章及關繫地方緊要之奏摺每年進貢之物均用勘合火牌其餘不準又奏準駐防官兵家口歸旗該管官將家口實數出具保結呈報該將軍都統等填注勘合給與車船口糧交與押送官兵約束回京如有在塗病故逃走者報地方官出具印結黏在勘合之上其口糧即行住支如家口數目不符多領口糧者該旗核參將開報不實之駐防佐領防禦驍騎校降一級調用協領參領罰俸一年將軍都統等罰俸六月押送官多領口糧者照多支廩給例議處若家口在塗生事將約束不嚴之押送官降一級調用又議準三品以上官準給引馬二匹包馬四匹四五六品官引馬一匹包馬二匹七八九品官引馬一匹包馬一匹無職人等包馬一匹其包不許過六十斤違者照例議處六年議準八旗奉差各官給馬雖有定例但口外軍臺原與內地不同所有馬駝自應酌減方於軍臺有益嗣後一品官應給馬十匹者止給六匹二品官應給八匹者止給五匹三品官應給七匹四品官應給六匹者均止給四匹五六品官應給五匹者止給三匹七八九品官應給三匹者止給二匹庫使領催前鋒護軍各項執事人等應給二匹者止給一匹驍騎照舊給一匹此內文職左副都御史通政使大理卿詹事照二品官例四五品京堂翰詹衙門贊善檢討以上各官科道郎中照三品官例員外郎主事鳴贊照四品官例內閣典籍中書司務司庫照六品官例筆帖式不論品級照八品官例至於包馬䭾載行裝勢所必需但口外無善於背包之人嗣後三品以上官給駝二隻六品以上官給駝一隻七品以下官及無職人等給䭾馬一匹引馬親隨兵之馬自一品以下各官均停止不給又議準漕運總督於糧船過淮之後押尾趲運北上經過州縣驛上水給夫不得過八十名下水給夫不得過五十名所有用過夫數造入奏銷册內報部察核十年議準督撫有會審察勘等事在該管境內行走不由部給發勘合者所需夫役臨時酌用不許過六十名道府及直隸州下縣盤察及各官奉督撫差委盤察者酌用夫役不許過三十名十三年議準奉差官役所帶之包不許過六十斤首站應付包馬時稱準斤數無浮於應付簿上注明鈐印每夜住宿之驛司驛官再加察驗亦於簿上注明某驛驗過並無重包字樣若有過六十斤者稱出斤數詳報重至七十斤者官降一級調用役杖六十再有重者每十斤加一等重至百斤以上者官革職役杖一百倘司驛官明知重包故為狥隱不報經下站察出將狥隱官一并議處又議準解運銅鉛在三十萬斤內者準撥護送兵十二名若銅鉛數有增減撥兵亦酌量增減押解人犯每犯撥護送兵二名其隨行妻子不在撥兵之例或有重大要犯妻子亦應撥兵護送者該督撫臨時酌增仍將緣由報部察核至解運餉銀及各項物料數目不能豫定所有撥兵護送之處該督撫酌量辦理均於兵牌內明白登注又議準奉天將軍齎進本章每次差官一人領催驍騎各一人準用馬四匹五部尋常本章每月一次交直月之部委官同領催彚送並載本章車馬及引馬共準用七匹府尹及稽察御史齎進本章或差役或差家人每次準用馬一匹又議準駐防將軍都統副都統等因齎進本章用火牌者一張止準填馬二匹惟吉林寧古塔黑龍江等處地處口外路塗遙遠該將軍都統副都統等齎進本章準差正副二人每人準帶從役一人如有官物需人背負者於火牌內注明緣由倘違例多用照多填馬匹例議處乾隆四年奉㫖覽兵部所奏驛站月摺由奉天三處移住京師之新滿洲索倫烏喇齊等接取家眷照馳驛例應付廩給口糧夫賞給伊等驛馬原繫特恩接取家眷乃伊等私事非奉差可比復應付廩給口糧殊覺太過嗣後有似此告假接取家眷者止準應付驛馬又議準巡漕御史駐劄淮安濟寧者陸路給馬水路給船駐劄天津者給船不給馬駐劄通州者馬船皆不給如有公事巡行將坐糧廳船撥用至廩給口糧均一例支領又題準巡漕御史所用船若州縣驛並無額設者按道塗遠近每里折價銀三分交該御史雇覓民船該督撫將折給價銀造入驛站案內奏銷六年奏準奉差官役執有勘合火牌藉稱緊急不與司驛官驗看騷擾驛遞多索夫馬車船者司驛官毋得鈐蓋印信一面將騷擾多索情由揭報本部並都察院據揭參奏將騷擾驛遞者繫官革職繫役杖一百多索馬一匹車一輛船一隻者官降三級調用