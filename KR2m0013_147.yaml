body:
  text: 理藩院柔逺清吏司一朝覲分班喀爾喀厄魯特及駐劄額濟內之土爾古特分四班一班扎薩克圖汗及部內貝勒一人輔國公一人病故未襲一等台吉三人土謝圖汗部內親王一人輔國公三人一等台吉二人車臣汗部內貝子輔國公各一人一等台吉二人賽因諾顔部內親王品級郡王世子輔國公一等台吉各一人土爾古特貝勒一人烏蘭烏蘇厄魯特貝子一人賀蘭山厄魯特鎮國公一人推河厄魯特公品級一等台吉一人二班土謝圖汗及部內輔國公品級一等台吉各一人賽因諾顔部內親王貝勒貝子品級輔國公鎮國公輔國公各一人一等台吉四人車臣汗部內郡王一人鎮國公二人輔國公一人一等台吉三人扎薩克圖汗部內鎮國公一人輔國公二人公品級一等台吉一人一等台吉三人賀蘭山厄魯特郡王鎮國公各一人三班車臣汗及部內貝勒輔國公各一人一等台吉四人土謝圖汗部內親王郡王貝子各一人貝子品級輔國公一人輔國公二人一闕病故未襲公品級一等台吉一人一等台吉三人賽因諾顔部內貝勒一人病故未襲貝子品級一等台吉一人輔國公一等台吉各二人扎薩克圖汗部內鎮國公一等台吉各一人烏蘭烏蘇厄魯特貝子一人四班賽因諾顔扎薩克親王及部內郡王貝勒鎮國公各一人輔國公三人一等台吉二人車臣汗部內親王貝勒貝子鎮國公公品級一等台吉各一人一等台吉三人土謝圖汗部內郡王品級貝子輔國公一等台吉各一人扎薩克圖汗部內鎮國公一人輔國公四人一等台吉一人青海分四班一班厄魯特郡王貝子各二人鎮國公一等台吉土爾古特一等台吉各一人二班厄魯特貝勒輔國公各一人一等台吉三人回特輔國公土爾古特一等台吉各一人三班厄魯特親王一人輔國公二人一等台吉三人土爾古特一等台吉一人四班厄魯特郡王貝子各一人一等台吉四人土爾古特一等台吉喀爾喀一等台吉各一人康熙三十九年議準年例來朝之喀爾喀扎薩克等若令與內扎薩克等一例分為兩班朝覲則路塗遙逺殊非體恤之意應將喀爾喀扎薩克分為四班將班次曉諭均令按年於十二月封印前到京其未及嵗之扎薩克不必來朝各令台吉一人代覲五十四年題準年例朝覲喀爾喀扎薩克等旗內如有事故不能來京令協理旗務之台吉一人前來若協理旗務之台吉亦有公事及患病等情即令夲旗內大台吉代覲仍將情由用印文送院察核如並無事故托辭不朝者事發將該管扎薩克等一并題參治罪雍正三年議準青海王貝勒等照喀爾喀例分為四班輪流來朝四年定蒙古朝覲喀爾喀及青海厄魯特等均分為四班一年一班輪流來朝不直班之扎薩克令該旗協理旗務台吉一人前來乾隆五年奏準擢於御前乾清門行走之喀爾喀汗王以下台吉以上分御前為兩班一年一班來京朝覲十年議準乾清門行走之喀爾喀汗暨王等內有兼扎薩克旗務者不必入於兩班著按其夲班來朝到京時仍令其在御前乾清門行走一禮儀坐次康熙二十九年覆準喀爾喀等來使皆行三跪九叩禮土謝圖汗之子坐次在貝勒下車臣汗之弟在公下餘台吉在內大臣下三十二年覆準凡遇年節冬至與各慶賀禮俄羅斯來使俟百官行禮後别為一班行禮賜燕坐次正使在丹陛上儀駕後有頂帶人皆在鑲藍旗之末如蒙便殿賜茶召見賜燕正使坐於內大臣之後一等侍衛之前其餘有頂帶人皆坐一等侍衛之後行禮時令通使一人立於贊禮官旁傳示又奏準嵗除筵燕之喀爾喀汗親王郡王貝勒公扎薩克一等台吉等各按其品秩均坐於右翼內扎薩克親王郡王貝勒公扎薩克一等台吉之次三十九年覆準年例來朝之喀爾喀汗王貝勒貝子公等行禮及恩賜均照內扎薩克之例雍正元年奏準準噶爾來使元旦朝賀著於朝鮮國後第三班行禮乾隆二十年定都爾伯特等部落汗王貝勒貝子公扎薩克台吉各按其品秩序於喀爾喀之次其行禮恩賜均照內扎薩克之例一貢物青海土爾古特貢藏香氆氌馬喀爾喀厄魯特貢駝馬湯羊康熙三十年覆準土謝圖汗車臣汗既留汗號應令仍舊進貢白駝一白馬八其餘概不得進貢九白五十二年奉旨嗣後和拖輝特公寶貝貝勒丹津多爾濟垂扎木山公車木楚克納木扎爾車卜登伊等進馬數不得過十其餘扎薩克進馬不得過五再喀爾喀進貢湯羊王貝勒貝子公數不得過十扎薩克一等台吉等不得過五此外台吉等不得過二五十三年定喀爾喀貢湯羊王等各五貝勒四貝子三公扎薩克台吉等各二台吉等各一一貢道青海由西寧喀爾喀厄魯特土爾古特由張家口獨石口喜峯口西藏由四川之打箭爐一廩給康熙三十年奏準內附之喀爾喀等均晉封汗及王貝勒貝子公台吉爵號來朝者照內扎薩克王貝勒貝子公台吉之例廩給六十一年議準青海親王來京日給銀三兩二錢郡王日給銀三兩貝勒日給銀一兩九錢貝子日給銀一兩八錢公日給銀一兩七錢扎薩克一等台吉日給銀一兩隨從人等並無定數間散台吉日給銀六錢屬下台吉日給銀四錢宰桑宰桑格隆各日給銀二錢護衛格蘇爾各日給銀一錢五分僕從各日給銀五分核給六十日坐馬若干任其酌量其餘馬駝均盡數交館餧養回時路費親王給銀十二兩八錢郡王八兩貝勒五兩貝子三兩七錢二分公扎薩克台吉各三兩七分台吉三兩宰桑二兩五錢護衛二兩僕從每人一分均核給六十日又議準青海遣使來京正使日給銀五錢副使日給銀三錢僕從無定數各日給銀五分核給六十日正使坐馬三匹副使坐馬二匹騎來馬駝盡數交館餧養回時路費正使給銀三兩副使二兩正副使不得過十人又議準平時來貢之喀爾喀厄魯特王貝勒貝子公等均豫十日廩給台吉等以下至來使均豫七日廩給又議準喀爾喀土謝圖汗照親王車臣汗照郡王之例給與廩給宰桑護衛官員各日給銀一錢僕從各日給銀五分均核給四十日騎到馬駝盡數交館餧養回時路費亦照親王郡王之例給與若遣使來京正使日給銀五錢坐馬二匹副使日給銀三錢坐馬一匹其僕從廩給及交館餧養馬駝均與前同回時路費正使給銀三兩副使一兩五錢正副使均不得過十人又議準厄魯特王額駙車凌旺布既未編設旗分佐領其夲身及來使廩給照青海例厄魯特公多爾濟塞卜騰夲身及來使廩給照厄魯特貝勒額駙之例給與又議準請安或進貢之胡圖克圖胡畢爾汗扎薩克大喇嘛各日給銀八錢五分坐馬三匹養馬十四匹副扎薩克大喇嘛日給銀七錢三分坐馬三匹養馬十二匹扎薩克喇嘛日給銀六錢二分坐馬二匹養馬十匹大喇嘛副喇嘛各日給銀四錢七分坐馬一匹養馬七匹噶卜楚拉穆扎木巴各日給銀三錢七分坐馬一匹養馬六匹格隆日給銀三錢坐馬一匹養馬五匹格蘇爾班第各日給銀五分坐馬一匹此等番僧均核定五日廩給如居住誦經者無定例按日給銀馬匹送館餧養雍正二年議準下嫁外藩之公主郡主等如欲來京並令請旨不得擅自來京其奉旨來京者均定以限期照例供給厄魯特額駙準住六十日公主郡主等準住八十日如限滿後仍欲留京者亦須奏明再支供給三年議準厄魯特喀爾喀等坐馬並無定額應照舊例不必計數一例折銀給與其廩給食物亦視內扎薩克王公等之例折給均於院庫動用年終彚疏奏銷四年定青海廩給郡王日給銀四兩三錢五分貝勒日給銀二兩六錢貝子日給銀二兩三錢公日給銀一兩九錢一分扎薩克台吉日給銀一兩三錢一分其坐馬及回時路費均照喀爾喀例仍不計數五年奏準土爾古特貝子丹忠並未編設旗分佐領應照厄魯特廩給之例日給銀二兩三錢五分屬下台吉日給銀四錢宰桑日給銀二錢護衛日給銀一錢五分僕從日給銀五分均核給六十日坐馬無定額每坐馬一匹照例給與草豆柴薪折價銀六分七釐三毫四絲七忽其餘馬駝盡數交館餧養回時路費貝子給銀三兩七錢隨從二十五人日共給銀一錢五分均核給六十日如遣使進貢日給正副使廩給坐馬養馬限期及回時路費均與青海正副使同六年議準俄羅斯夷僧廩給日給銀一錢五分學生日給銀一錢僕從日給銀五分十年議準喀爾喀世子多爾濟塞布騰廩給及坐馬養馬路費等項均視親王之例稍減郡王之例稍增酌量日給銀五兩八錢五分核給十日坐馬十二匹養馬五十五匹回時路費給銀十兩三錢四分隨從三十七人共給銀三兩七錢五分又定青海長子索諾穆丹津廩給及坐馬養馬路費等項均照青海貝勒之例乾隆九年奏準從前郡王額駙阿保貝子多爾濟塞布騰所來之人並無定數向照舊厄魯特例給與六十日廩給駝馬亦不限數照呈報之數入館餧養後將郡王塞布騰旺布屬下人等編設旗分佐領改照喀爾喀例僕從限定人數給與十日廩給來使給與七日廩給伊等皆繫厄魯特扎薩克應與塞布騰旺布均照喀爾喀例給與廩給十八年奏準嗣後年底來京當差之八旗遊牧察哈爾旗下厄魯特散秩大臣副都統日各給銀六錢坐馬三匹一等侍衛子二品官各給銀四錢坐馬二匹二等侍衛三四品官各給銀三錢坐馬二匹三等侍衛以下六品官以上各給銀二錢五分坐馬二匹七八品官司鞍司轡執事人等各給銀一錢五分坐馬一匹入館養馬各按品級交館此內如有御前之散秩大臣侍衛等均照蒙古王台吉之例長支廩給乾清門行走之侍衛官員均照侍衛白啓之例給三十日司鞍司轡人等均有執事給二十日間散侍衛官員請安來京者按其品級給與十日廩給一教養乾隆十二年議準喀爾喀郡王桑宰多爾濟厄魯持貝勒羅布藏多爾濟郭爾羅斯公額爾登額均繫公主郡主之子因其少孤來京教養今居住多年其夲旗地方奴僕甚不識蒙古生計除額爾登額見在內廷讀書不議外郡王桑宰多爾濟貝勒羅布藏多爾濟皆管理旗務之扎薩克嗣後春季應令回居夲旗講究生理學習騎射冬季進京居住照舊肄業俟十八嵗時即令回旗辦事一賞賚順治十二年題準每年進貢九白之扎薩克等賞給重三十兩銀茶筒各一茶盆各一假各三十布各七十賞來使假各三布各二十四僕從布各六康熙三十年奏準喀爾喀貝勒初次進貢應賞給備漆鞍馬一匹銀茶盆一蠎假狐皮袍一襲熏貂帽一鍍金鞓帶佩小刀手帕荷包一副靴襪各一雙假十有五布百五十又奏準喀爾喀等同內扎薩克受封一切賞賜亦應比照內扎薩克凡請安進貢之喀爾喀親王以下公以上夲身前來者不賞外如遣使親王郡王來使賞假二布十有二僕從布四貝勒貝子公等來使假一布八僕從布三進貢來之台吉都統副都統賞假二布十有二參領佐領達爾漢假二布七王等之長史護衛典儀驍騎校間散人等假一布六再喀爾喀土謝圖汗車臣汗等遣使前來仍照前例伊所屬宰桑護衛等夲身前來進貢者準令進貢此內土謝圖汗之古什宰桑照都統例賞給其餘宰桑等均照參領例賞給護衛等照王之護衛等例賞給三十三年定喀爾喀王貝勒貝子公台吉來京請安適逢元旦者照內扎薩克之例給賞三十九年覆準年例來朝之喀爾喀汗王貝勒貝子公台吉等賜燕賞賚及五旗王府筵燕一如內扎薩克之例五十四年覆準西藏拉藏汗青海厄魯特等外藩請安進貢照伊來使品級賞給諸物交與內務府武備院製造俟起程時頒給又覆準賞年例來朝之喀爾喀親王視內扎薩克郡王例郡王貝勒視貝子例貝子公台吉等各視其品級為差所賞假布鞍轡銀茶筒銀茶盆茶葉諸物照價直由户部折銀賞給五十五年議準