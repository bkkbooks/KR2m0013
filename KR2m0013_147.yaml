加郡王品級闢展吐魯番唐吐蕃地雍正四年闢展等處回衆為準噶爾凌虐其回目率衆內附十年以內附之回子頭目厄敏和卓有固守禦賊功封為扎薩克輔國公將伊眷屬安插內地瓜州居住乾隆二十年封為鎮國公二十一年移駐魯克沁二十二年晉封鎮國公厄敏和卓為貝子統轄闢展諸處並封其子蘇賚滿公爵分駐吐魯番地二十三年封厄敏和卓為貝勒夲年加郡王品級賞四團龍補服二十四年封郡王二十五年以其子間散台吉毛薩授為阿竒木伯克分駐伊犂二十六年以西域底定又議將肅州威魯堡居住之闢展回衆亦遷歸故土授回目百户義明和卓為五品伯克以領之其千戶加如拉所領回衆二百五十戶原繫魯古慶回人議於附近闢展之洋海等處分地耕種亦授加如拉為五品伯克並各設六品副伯克一人以佐之統歸蘇賚滿管轄哈拉沙拉古為焉耆國地乾隆二十一年準噶爾既平沙拉斯宰桑兄弟內附一在城東一在城北皆濵海杜河廬帳以居二十三年沙拉斯部叛附和卓木尋伏誅今以伯克領之屬內地庫車古為龜兹國地乾隆二十三年五月大兵進討逆回霍集占至此攻逆黨阿布都克勒木拒守未下攻之閲三月阿布都克勒木竄往阿克蘇六月霍集占來援我師攻諸鄂根河霍集占以殘兵入庫車城七日復西遁八月舊伯克阿集等以城降沙雅爾乾隆二十三年六月我師攻圍庫車賊自沙雅爾來援者為大兵擊敗阿布爾什聞風震懾挈妻子逃奔阿克蘇嗚哈墨第乃遣其子阿三和卓以城內附阿克蘇為逆回霍集占舊部霍集占自伊犂歸以其黨為阿克蘇城伯克賽里木拜城亦如之乾隆二十三年大兵克庫車阿克蘇回衆聞風向化乃逐霍集占所置伯克以城降烏什乾隆二十三年八月大兵至遮爾格吉克得和闐城舊伯克霍集斯及其長子烏什城阿竒木伯克漠咱帊爾等馳書詣軍門投誠遂以烏什城內附喀什噶爾乾隆二十三年六月霍集占既棄庫車而西定邊將軍率師追之抵葉爾羌波羅呢都自喀什噶爾以衆馳赴與霍集占合負嵎固拒相持葉爾羌城下纍月我師還次阿克蘇整軍進逆酋懼我師之復至也霍集占從葉爾羌遁而西波羅呢都復入喀什噶爾盡驅其男婦出城縱火燒廬舍城門為燬脅之偕行衆弗從競入城守賊乃盡掠牲畜驅其丁男千餘人踰山而西與霍集占皆遁我師自阿克蘇進兵指喀什噶爾喀什噶爾之舊伯克人民及從逆酋行脫歸者迎謁途次二十四年閏六月以其城降葉爾羌初國王阿卜里什特父子為噶爾丹所執拘留帳下康熙三十五年因噶爾丹為大兵所破脫身偕其妻子來朝賜衣冠銀幣遣官護送至哈密乾隆二十三年波羅呢都霍集占弟兄既遁葉爾羌之舊伯克回民等以全城降和闐向受回酋和卓木約束乾隆二十三年定邊將軍傳檄往撫時逆酋霍集占遣使在其地六城伯克聞天朝使至即擊逐逆從迎我使臣入城捧檄欣喜傾心降服留散秩大臣等以鎮撫之後賊以和闐僻逺大兵不能至率衆來攻散秩大臣等鼓勵降回悉力守城與賊相持三閲月會定邊將軍等自葉爾羌旋兵阿克蘇途次聞信調兵赴援和闐復定一疆理哈密東至塔爾納沁接喀爾喀界西至喀拉都伯通吐魯番界西南至半池泉星星峽博羅特口接安西府界南至沙磧北至天山接巴里坤界哈密城在安西府城西北八百七十里距京七千一百八十里城二舊城周四里東北二門城東有水西南流新城康熙五十六年建周里許為官兵駐防之所東闌干水西蘇巴什湖夾流十餘里匯於新城之南曰南湖泉甘土肥沃衍蕃庶所屬地蘇門哈爾輝阿思他納桃和氣拉卜楚喀喀拉都伯格子煙墩星星峽下莫艾上莫艾塔爾納沁半池泉栁樹泉博羅特口境外地察罕和爾懷尼爾渾阿薩爾圖伊里克庫穆察克瑪克塔什額錫墨克闢展東至塔庫接哈密界西至伊拉里克接哈拉沙拉界南至沙磧北至博克達山接天山北路界闢展城在巴里坤城西六百里距京八千一百一十里北望天山西北倚金嶺南臨沙山一望沙磧傍崖為城周里許城東八里有湖曰東湖饒蒲葦可畜牧有屯田所屬地塔庫那庫齊克塔木特斯特庫斯洪舒歸色爾竒布魯克沁洋海哈喇火卓阿斯塔克玉門口勒木丕吐魯番交河城雅木什安吉彥波衮托克遜伊拉里克勒木津雅土溝漢燉蘇巴什僧吉木罕和羅穆爾圖拉克布拉里克吉穆薩哈拉沙拉東至烏沙克他爾出蘇巴什山口東南至察罕通格出那林氣拉山口接闢展界西至第納爾河接庫車界北至天山踰山接烏魯木齊界南至沙山入沙磧哈拉沙拉城在特博爾古西八十里踰哈拉烏蘇至其地距京九千一百里東至烏沙克他爾一百七十五里西至第納爾河七百里南至沙山二百里北至祁連山一百四十里舊城向在海杜河西今移建新城於此周一里五分為官兵屯田治所土田良沃魚鹽蒲葦之饒甲於他處所屬城村烏沙克他爾察罕通格楚輝他喀爾齊特博爾古佛和屯有城説爾舒克博爾海噶拉噶阿滿庫爾勒有城撤爾楚䇿特爾英阿薩爾有城布古爾即古輪臺地有城垣當孔道西通庫車鄂博爾庫車東至第納爾河接哈拉沙拉界西至鄂根河接賽里木界南至鄂根河接沙雅爾界北至額什克巴什山通伊犂界庫車城在第納爾河西一百五十里距京一萬八十里城周四里六分六釐南東北三面形圓西一面形方高一丈九尺所屬地阿爾巴特托和鼐常格以下冇官田苦魯納斯哈拉察爾阿里蘇普多烏圖托克提坎銀河伍什哈拉官田止此常義台爾伯運啓刻伯石胎吉克刻勒石沙爾達朗沙雅爾東至托衣坡羅的接哈拉沙拉界南至特里木濵大河西至答阿什根科接阿克蘇界北至鄂根河接庫車界東西二百四十里南北一百八十里沙雅爾城北距庫車城一百五十里踰鄂根河而至城周二里許