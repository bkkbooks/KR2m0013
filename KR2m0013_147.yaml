而圖魯起拜為首戶千有竒曰薩拉巴哈什鄂拓克頭目不一而車里克齊為首戶亦千有竒又一部舊居他拉斯頭目不一而邁他克為首戶四千有竒諸頭目不相統屬推一年長者有事則告俾與聞而已其俗好利喜爭尚畜牧事耕種頗畏法度舊遊牧地在各根喀爾竒拉特木爾圖爾為準噶爾所侵西遷寓居安集延及準噶爾平乃得復其故地乾隆二十三年將軍等追捕逆賊哈薩克錫拉兵臨布魯特界獲其頭目圖魯起鄂庫遣侍衛往撫行數日抵其遊牧珠穆翰恭奉諭旨宣讀畢薩雅克薩拉巴哈什兩鄂拓克人衆咸望闕叩頭願為臣僕時他拉斯頭目邁他克之子額什博洛亦願率所部來降遂至其地撫定其衆於是東布魯特全部皆內附按今布魯特為唐之布露一名勃律瑪木特胡里以年逾九十餘不能遠行乃遣頭目車里克齊圖魯起拜沙三人獻牛羊百頭謁軍門因朝京師扈木蘭行圍賜宴於熱河行宫是年其别部頭目額木爾貝遣使入貢恭獻匕首西布魯特在喀什噶爾西北三百里道由鄂什踰蔥嶺而至與東布魯特相望部落十有五最著者四曰額德格納鄂拓克曰蒙科爾多爾鄂拓克頭目阿濟兼轄之户七百有竒曰齊里克鄂拓克頭目由罵特戶二百有竒曰巴斯子鄂拓克頭目噶爾住戶千三百有竒部落雖分駐牧同地東南扼蔥嶺西迄於哈布爾諸部落共二十萬人逐水草事遊牧漢休循捐毒塞種之遺久思內附以兵阻未得通乾隆二十四年將軍既定喀什噶爾追捕餘孽道經諸部遮道籲請內附乃遣侍衛等往撫阿濟首奉將軍書恭祝如天普覆廣大無外如受養生素賚滿佛之鴻仁如古伊斯千達里之神威如魯斯坦天下無敵之大勇富有四海乾隆大皇帝萬萬夀將軍嘉其誠表於朝詔受之十五部落皆內附諸頭目以未出痘不敢入中國乃遣由瑪特之兄呼達里朝京師詔與觀大閲賜宴山莊二十五年八月遣侍衛往授之敕郊迎祗受如儀安集延在鄂什西北四百里喀什噶爾西北五百里東與布魯特部落錯處其西北為那木干西為瑪爾噶朗又西為霍罕四部各有城地當平陸南控蔥嶺北濵大河那林河從東布魯特境西行過安集延城北又西過瑪爾噶朗城北又西過那木干城北又西過霍罕城南又西北行過撒瑪爾干城北又東南入於達里岡阿鄂謨南北山泉支流滙合襟帶諸城之間土膏沃衍氣候和煦人民殷庶畜牧饒富其人亦布魯特種古大宛國地諸城皆有伯克而霍罕城伯克額爾德尼為之長衆咸聽命乾隆二十四年將軍追捕霍集占遣侍衛等撫定布魯特諸部遂至其地額爾德尼伯克遣都管伯克迎至城內日饋特羊瓜果酒米及氊毺馬匹諸物感慕悅服備極誠敬使旋乃遣頭目托克托瑪哈墨第等謁軍門賚奉額爾德尼等恭進皇帝表文併上將軍書於是四城咸內附托克托瑪哈墨第等朝京師貢馬賜宴瀛臺瑪爾噶朗在安集延西百八十里北濵那林河東與安集延接南揖蔥嶺西有河出蔥嶺北山北行入那林河乾隆二十四年侍衛往撫其城伊拉斯呼里伯伯克以其屬內附霍罕在瑪爾噶朗城西二百里北濵那林河踰河東北通那木干南揖蔥嶺其城伯克額爾德尼為安集延等四城之長乾隆二十四年以四城內附那木干在瑪爾噶朗城西北八十里霍罕城東北八十里南濵那林河東西有水出北山南流入那林河東北與布魯特雜處乾隆二十四年與安集延同時內附塔什罕東北與右部哈薩克接東與布魯特接東南與那木干接距喀什噶爾城千三百里漢大宛康居交界處唐石國地地居平原有城以三和卓分轄回衆曰莫爾多薩木什曰沙達曰吐爾占向為右部哈薩克羈屬嵗供差役莫爾多薩木什即哈薩克所置和卓也為吐爾占所逐於是稱兵久而不解乾隆二十三年參贊大臣追擒哈薩克錫拉至其地遣使往撫塔什罕回衆及右部哈薩克次軍於莽格特城外我使臣既諭哈薩克降復召吐爾占未至方與哈薩克吐里拜戰於河上因諭以睦鄰守土之道並宣示聖主威福乃大感悟與吐里拜釋爭相見如初於是遣其屬莫呢雅斯奉表降九月莫呢雅斯入朝賜宴山莊並獻阿睦爾撒納兄子額什木扎布拔達克山在蔥嶺中之南境西北至伊西洱庫爾淖爾東北去葉爾羌皆千餘里有城郭部落繁盛戶十萬有竒其汗曰素爾坦沙其國負山險扼蔥嶺之右頗擅形勢有河北流經博羅爾拔達克山兩部落之間至伊西得拉克分流一流經北入土斯庫爾一流道西南又北入於伊西洱庫爾淖爾其北鄙之城曰瓦漢在古當為烏秅國地乾隆二十四年八月波羅呢都霍集占自伊西洱庫爾淖爾敗後奔拔達克山副將軍率師追之遣諭其汗素爾坦沙宣示二賊叛逆狀令擒獻素爾坦沙因縛波羅呢都而以兵圍霍集占於密室初素爾坦沙以二逆酋與已同出回派欲縛獻恐諸部不從難之及反覆曉以順逆利害之故遂大覺悟乃刃二酋率其部十萬戶與博羅爾三萬户俱降二酋之尸先後馳獻二十五年遣陪臣額穆爾伯克朝京師貢刀斧及駿馬賜瀛臺曲宴賞賚有加博羅爾在拔達克山東有城郭戶三萬有竒四面皆山西北面有河乾隆二十四年與拔達克山同時內附按博羅爾附近拔達克山應即烏秅國地愛烏罕極西回部自拔達克山西南行須三月程可到其地有哈布爾嗎沙特愷達哈爾三大城其汗愛哈莫特沙居愷達哈爾城四面環山中皆沃土俗以耕種為業所屬回人築室散居不計戶籍丁口戰用鳥槍刀槊不習弓矢在回部中故稱強盛近復兼并鄰部溫都斯坦部落益大乾隆二十七年愛哈莫特沙欽仰天朝威德遣使和卓密爾漢貢馬恭進金紙表文重四譯方至其所貢馬四匹皆髙七尺長八尺竒齊玉斯為哈薩克三玉斯之一在伊犁之西北二千餘里以遊牧為業因大兵平定回部望風歸附時以羊馬至伊犁貿易乾隆二十七年其頭目努喇麗巴圖爾同時遣使入貢烏爾根齊為哈薩克别部其遊牧與竒齊玉斯相近距伊犁亦約二千餘里時與鄰部回人同至伊犁等處貿易乾隆二十七年其頭目哈雅布遣使入貢欽定大清會典則例卷一百四十三
