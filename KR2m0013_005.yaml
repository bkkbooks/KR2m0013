  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_005-1a, image: WYG0620/WYG0620-0054a.png}
body:
  text: 内閣一新除大學士應為某殿某閣大學士兼某部尚書及行走前後班次由内閣具奏請㫖一大學士滿漢各二人外以尚書協辦閣務出自特簡乾隆十三年諭大清㑹典開載内閣滿漢大學士員數無定出自簡在等語本朝由内三院改設内閣大學士未有定數自是官不必備惟其人之意而康熙年間滿漢大學士率用四人至雍正年間以來多用至六人更或增置一二人協辦朕思内閣居六卿之上滿漢大學士應有定員方合體制嗣後著定為滿漢各二人其協辦滿漢或一人或二人因人酌用又大學士官銜例兼殿閣㑹典所載四殿二閣未為畫一其中和殿名從未有用者即不必開載著增入體仁閣名則三殿三閣較為整齊再大學士員闕定例請㫖開列亦有遲至一月後始行請㫖者朕思大學士職司襄贊如其宣力有年遇有告休病故不忍遽行開列應竢至一月以後者乃國家眷念舊臣加恩輔弼之意若縁事降革則機務重地未容久曠自應即行開列不必請㫖將此載入㑹典永著為例欽此又諭向來協辦大學士之設原因大學士有在内廷行走或奉差在外者閣務需人坐辦是以别簡人員協同辦理初無額設之官若由協辦而簡任封疆則不必仍帶虚銜嗣後大學士兼管總督者著帶大學士銜其協辦大學士兼管總督者不必帶協辦大學士銜著為例欽此一侍讀學士以下辦理本章分五所曰滿本房滿侍讀學士二人侍讀四人中書三十九人貼寫中書二十四人專司繕寫清字校正清文曰漢本房滿侍讀學士二人漢侍讀學士二人滿侍讀三人漢軍侍讀二人滿中書三十一人漢軍中書八人滿貼寫中書十有六人專司繙譯清漢文漢中書三人繕寫本單曰䝉古本房䝉古侍讀學士二人侍讀二人中書十有六人貼寫中書六人專司繙譯外藩章奏及繕寫頒行西番屬國詔勅曰滿票籖處滿侍讀三人滿漢本房兼票籖處滿中書二十人貼寫中書八人䝉古本房兼票籖處中書二人曰漢票籖處漢侍讀二人漢中書二十七人專司繕寫清漢票籖記載諭㫖及撰文之事一各部院本章兼用清漢文該衙門委官送内閣大學士票擬發票籖處書籖進呈直省本章不兼清文由通政使司送内閣發漢本房繙譯滿本房謄寫校對無訛侍讀學士侍讀等閱定送大學士票擬發票籖處書籖進呈乾隆四年諭本章出入關繫重大防微杜漸不可不慎嗣後凡有應發本章批本處未發内閣即奏聞内閣未發部院即奏聞不必轉相詢問庶將來朦溷遲延之弊可以永杜矣十三年諭向來各處本章有題本奏本之别地方公事則用題本一己之事則用奏本題本用印奏本不用印其式沿自前明蓋因其時綱紀廢弛内閣通政使司借公私之名以便上下其手究之同一入告何必分别名色著將向用奏本之處槩用題本以示行簡之意欽此一内廷批本處曰紅本房凡票擬進呈得㫖後紅本房批清文發内閣漢學士批漢文每日給事中一人赴内閣親領鈔發各部院奉行一紅本下内閣管副本中書於副本加籖録原㫖送皇史宬收貯一紅本下科該科謄録底本以原本送内閣交典籍貯庫其密封發部者該部亦密封送科由科繳内閣並謄録底本於年終造册送内閣交滿本房貯庫以備編纂一御門日黎明將滿學士名籖奏㸃一人啟奏折本竢各部院奏本畢侍讀學士二人奉本下大學士等進前跪滿學士奏讀折本大學士聆㫖退仍繕票籖進呈一紀載綸音分三册每日發科本章滿漢票籖處該直中書摘記事由詳録聖㫖為一册曰絲綸簿特降諭㫖别為一册曰上諭簿中外諸臣奏摺奉㫖允行及交部議覆者别為一册曰外紀簿以備叅考一遇車駕廵幸進呈本章若駐蹕口内閒一日送本口外閒二日送本其條陳叅奏事件應否接送請㫖遵行以滿票籖處侍讀一人中書五人漢票籖處中書二人隨駕凡行在交出諭㫖及由京送到本章竝隨本送到奏摺進呈發出詳開清單隨本送内閣交票籖處發行一皇上行幸駐蹕圓明園以侍讀中書分班隨直每班滿票籖處侍讀一人中書六人漢票籖處中書二人記載上諭辦理本章繕寫票籖與在京同内批本處發出紅本並奏事處軍機處交出上諭皆察明開單送内閣交票籖處發行一遇皇上御殿日侍讀學士侍讀中書輪班陳設筆墨紙硯於黄案上是日有謝恩官則並陳名疏以備御覽乾隆六年奉㫖太和殿内所設文房四寶御案著於東邊居中安設陞殿日若有表文將文房四寶御案移於西邊居中安設表文御案於東邊居中安設若無表文將文房四寶御案仍於東邊居中安設一慶賀表箋皇帝登極王公百官恭上賀表由内閣撰擬皇帝恭慶皇太后聖壽表每十年行禮時宣讀元旦冬至賀表及王公百官慶賀皇太后三大節表由翰林院撰擬大學士奏請欽定每年遵行行禮時不宣讀王公百官慶賀皇帝三大節表皇后箋皆翰林院撰擬文式大學士奏定頒中外遵行皇太后宫三大節慶賀學士由内閣奉表大學士隨行至永康左門大學士接奉由中門入至慈寧門安設東旁黄案上如奉懿㫖停止行禮奏明將表貯内閣竢下次行禮同進皇帝三大節慶賀大學士二人於殿中門閾外左右跪展表宣表官宣讀一恭上皇太后尊號徽號册立皇后傳禮部堂官一人至内閣親領勅諭奉行事竣具本題繳仍下内閣收貯尊封皇貴太妃皇太妃册封皇貴妃貴妃妃嬪内閣傳㫖交該部奉行金册由工部鑄造册文由翰林院撰擬大學士恭閱進呈中書翰林官分書清漢字金寶由禮部鑄造中書書清篆翰林官書漢篆内閣官㑹同禮工二部翰林院官在内閣監視鑴字填青大學士等行禮如儀一恭上皇太后尊號徽號先期一日皇帝奏書由翰林院撰擬大學士恭閱進呈欽定一五朝實録進呈御覽以中書二人今用侍讀學士侍讀以次進呈周而復始雙日奉進單日接出乾隆六年諭五朝實録寶訓朕已敬謹奉閱一周著再按次進呈朕循環覽誦用展景慕紹述之悃忱欽此一纂修實録聖訓國史㑹典諸書大學士充監修總裁官尚書充總裁官侍郎學士充副總裁官由内閣移取職名題請欽㸃侍讀學士侍讀充纂修官無定員侍讀學士或侍讀一人充提調官中書二人充收掌官開列職名送該館題請書成各繕三部一呈御覽一藏皇史宬一貯内閣惟實録重繕清漢文各一部齎送盛京鳯凰樓尊藏乾隆八年諭奉天乃我朝發祥之地歴朝實録皆應繕寫清漢文各一部送往尊藏竢見在皇史宬内閣藏本寫成後即著在館人員敬謹繕寫其送往儀注大學士㑹同禮部詳議具奏欽此一大内尊藏實録及皇史宬内閣庫所藏均於春秋二季恭請出曝所司官敬謹辦理一各館修書處有請領實録校對他書者該館出具印領赴内閣恭請滿本房檢明卷帙注册給發如但請檢看不領出者同該館官赴庫恭閱一纂修玉牒親王郡王充總裁官大學士充總裁及副總裁官禮部尚書侍郎内閣學士充副總裁官均由欽定纂修提調以滿漢本房侍讀學士侍讀或票籖處侍讀二人滿謄録以滿本房中書六人漢本房中書二人漢謄録以漢票籖處中書八人由宗人府㑹同内閣擬定具題一御製交泰殿寶譜序國初受天命採古制為璽掌以内閣承收以宫殿監正襲以重盝承以髤几設交泰殿中以次左右列當用則内閣請而用之其質有玉有金有栴檀香木玉之品有白有青有碧紐有交龍有盤龍有蹲龍其文自太宗文皇帝以前專用國書既乃專用古篆其大小自方六寸至二寸一分不一嘗考大清㑹典載御寶二十有九今交泰殿所貯三十有九㑹典又云宫内收貯者六内庫收貯者二十有三今則皆貯交泰殿數與地皆失實至謂皇帝奉天之寶即傳國璽兩郊大祀及聖節宫中告天青詞用之此語尤誕謬大祀遵古禮用祝版署名而不用寶聖節宫中未嘗有告天事或道籙祝釐時一行之亦不過偶存其教耳未嘗命文臣為青詞亦未嘗用寶且此璽孰非世世傳守而專以一寶為傳國璽亦不經蓋縁修㑹典諸臣無宿學卓識復未曾請㫖取裁只沿明時内監所書册籍承譌襲謬遂至於此甚矣紀載之難也且㑹典所不載者復有受命於天既壽永昌一璽不知何時附藏殿内反置之正中按其辭雖類古所傳秦璽而篆法拙俗非李斯蟲鳥之舊明甚獨玉質瑩潔如截肪方得黍尺四寸四分厚得方之三以為良玉不易得則信矣若寶無問非秦璽即真秦璽亦何足貴乾隆三年髙斌督河時奏進屬員濬寶應河所得玉璽古澤可愛文與輟耕録載蔡仲平本頗合朕謂此好事者仿刻所為貯之别殿視為玩好舊器而已夫秦璽煨燼古人論之詳矣即使尚存政斯之物何得與本朝傳寶同貯於義未當又雍正年故大學士髙其位進未刻碧玉寶一文未刻則未成為寶而與諸寶同貯亦未當朕嘗論之君人者在德不在寶寶雖重一器耳明等威徴信守與車旗章服何異德之不足則山河之險土㝢之富拱手而讓之他人未有徒恃此區區尺璧足以自固者誠能勤修令德繫屬人心則言傳號渙萬里奔走珍非和璧制不龍螭篆不斯籀孰敢不敬信奉承尊為神明故寶器非寶寶於有德古有得前代符寶君臣動色矜耀侈為瑞貺者我太宗文皇帝時獲䝉古所傳元帝國寶容而納之初不藉以為受命之符由今思之文皇帝之臣服函夏垂統萬世在德耶在寶耶不待智者而知之矣善夫唐梁肅之言曰鼎之輕重璽之去來視德之髙下位之安危然則人君承祖宗賦畀思以永膺斯寶引而勿替其非什襲固守之謂謂夫日新厥德居安慮危凝受皇天大寶命則德足重寶而寶以愈重璽玉自古無定數今交泰殿所貯歴年既久紀載失真且有重複者爰加考正排次定為二十有五以符天數并著成譜而序其大指如此寶譜成於乾隆十一年丙寅越三年戊辰始指授儒臣為清文各篆體書因思向之國寶官印漢文用篆書而清文則用本字者以國書篆體未備也今既定為篆法當施之寶印以昭畫一按譜内青玉皇帝之寶本清字篆文傳自太宗文皇帝時自是以上四寶均先代相承傳為世守者不敢輕易其檀香皇帝之寶以下二十一寶則朝儀綸綍所常用宜從新制因勅所司一律改鑴與漢篆文相配並紀之寶譜序後云又御製盛京尊藏寶譜序乾隆十一年春閱交泰殿所貯諸寶既詳定位置為文記之其應别貯者分别收貯至其文或複見及國初行用者為數凡十雖不同於見用之寶而未可與古玩並列因念盛京為國家發祥地祖宗神爽實所式憑朕既重繕列祖實録尊藏鳯凰樓上覲揚光烈傳示無疆想當開天之始凝受帝命寶符煥發六服承式璠璵孚尹手澤存焉記不云乎陳其宗器𢎞璧琬琰陳之西序崇世守也爰奉此十寶齎送盛京鐍而藏之而著其縁起如此一請用御寶凡誥命勅書常行事件不啟奏如頒給外藩勅諭内閣先期奏請用寶數目先期開具清單知㑹宫殿監及期學士率辦理誥勅侍讀學士侍讀及典籍等官赴乾清門接出與内監公同驗用若遇行幸駐蹕㑹同内務府總管在乾清門驗用畢恭繳一凡請御寶隨往行在學士典籍各一人赴乾清門接出交中書中書齎寶隨從回鑾日黎明學士典籍候齎寶官至公同驗視送至乾清門交内監察收車駕行圍中書輪班齎寶侍讀學士侍讀輪班隨行回鑾日學士驗視交收如例一齎行寶中書采服乗馬負御寶在華蓋前行如不陳設騎駕鹵簿常服在豹尾班後隨行一每年洗御寶内閣先期啟奏至封寶日學士典籍各一人赴乾清門接出洗畢交内監收進洗寶所需器物行内務府支用一凡頒行恩詔大學士承㫖密擬奏請欽定中書用黄紙墨書學士率典籍官奉至乾清門用御寶畢典籍恭奉前行學士隨至太和殿安設黄案上候皇帝御殿大學士奉授禮部堂官頒行儀詳禮部一頒行屬國詔書朝鮮國視直𨽻各省内閣繕寫用御寶交禮部䝉古王等由禮部刷印送内閣用御寶交理藩院一詔勅定式恭上皇太后尊號徽號頒禮部勅諭用香箋墨書頒發各部院勅諭用黄紙朱書皆傳該堂官一人至内閣恭領直省文武大臣及䝉古王朝鮮等各國王黄紙墨書朝覲官黄紙刷印頒賜中外文武官誥命勅命由翰林院撰擬文式大學士奏定於内閣侍讀學士侍讀内簡委一二人專司檢稽按品頒給一品起六句中十四句結六句二品起六句中十二句結六句三品起六句中十句結六句四五品起四句中八句結四句六七品起四句中六句結四句八九品起二句中四句結二句文式存貯内閣刷印草本各官請封由該衙門開具職銜送内閣照應得誥勅將草本填注姓氏發中書科繕寫如有格外加恩應别撰文字者交翰林院撰進順治初撰擬林誥勅由翰院開列職名送内閣題請欽命康熙初年停止承襲䝉古王貝勒等爵及民公侯伯以下世爵以原領誥勅送内閣并將該部揭帖察覈無訛發中書填注承襲人名年月用寶後傳該衙門官至内閣書押領發頒行達賴喇嘛勅書由軍機處或由内閣繕寫交該衙門轉發大内所貯内外王公世爵皇册有應增注者各該衙門於年終奏請咨明内閣是日學士同該衙門堂官赴保和殿内監請出皇册中書增注畢仍交内監收貯八旗世爵家譜各該旗每十年一修送内閣交滿本房貯庫如世爵官有遺忘世系或所得佐領縁由不眀須察家譜者咨明内閣或經奏請得㫖準察内閣同該旗官赴庫檢看頒給督撫學政織造提督總兵官等坐名勅書及布按二司廵守各道副將㕘將游擊等官傳勅由典籍該科給發廵鹽御史勅書學士於午門外給發離任之後皆赴内閣恭繳各關監督精微批文由該科具文送内閣内閣填注職名學士於午門外同該科給事中給發雍正二年定頒發各府州縣訓諭或有焚失汚損者許該督撫咨明縁由内閣移文武英殿刷印補給嵗終彚奏一奉到清漢字上諭每月交票籖處繕寫於次月彚奏一稽察房稽察各部院遲延事件月終彚奏大學士酌委侍讀學士侍讀中書兼司之無定員雍正五年諭朕所交事件甚多諸大臣因何不行覆奏著内閣察明嗣後奉特㫖所交一切事務及簡選引見人員等事每月已結未結著該處聲明情由交送内閣内閣於月終彚奏欽此乾隆二年議準各部院摺奏事件已奉諭㫖即日赴内閣登號三日内録原摺並所奉諭㫖具印文送内閣以備察覈一稽察欽奉上諭事件各部院及八旗欽奉上諭事件並各館修書課程欽㸃滿漢大學士各部院堂官兼領之無定員其應行文移皆用典籍印信雍正八年諭凡朕諭㫖特交事件該衙門有即行辦理者亦有遲久尚未辦理者總因無專司稽察督催之人是以遲速不齊間或至於留滯嗣後著於滿漢文武大臣内㸃出數人總司稽察督催之責於事務大有禆益其滿司官即用議政處辦事之員漢司官著㸃出之大臣簡選委用所有滿漢文武大臣職名著開列請㫖欽此乾隆五年諭前曾定八旗事件及引見官員照六部例三月一次彚奏今各旗雖遵例具奏但無專司稽察之處仍不免有將遲延事件作為限内完結將違誤事件妄行推諉等弊部院事件既由内閣按月稽察其八旗事件著交稽察欽奉上諭事件處照内閣例詳悉稽察仍三月一次彚奏欽此九年諭各館所修之書理宜上𦂳纂輯漸次告竣乃纂修官皆怠忽成習經歴年久率多未成雖天心月窟討論務須精詳魚魯亥豕考據恐其訛謬亦何至易成者亦不即成輾轉躭延竟視為不急之務韋編三易非積日以成者乎其意不過借此多得公費以資養贍所為事君敬其事而後其食者何居且見在所修之書告成後尚有應行編輯者又當開館修輯未嘗不可載筆從事也夫今日之翰林即異日之公卿若所見如此卑鄙其器識豈足以當鉅任嗣後除内廷所修各書未經開館者不必稽察外其餘各館皆著稽察上諭之大臣按月察覈倘仍前怠玩責有攸歸欽此部院八旗凡奉到上諭及摺奏事件即鈔録知照本處按限稽察奏結奉㫖後仍録送銷案統於每月二十五日造册注銷有無故逾限者由本處劾奏無奉到上諭及摺奏事件亦知照備案嵗終將各部院衙門未完事件具奏八旗摺奏咨行並補授官職事件每月造送察覈每三月仍彚册咨送調取各該旗原案逐件校對有逾限者劾奏内閣典籍及當月旗員每十日將奉到上諭録送校對各該衙門承辦事件各修書館滿謄録每人每日繕寫八百五十字漢謄録繕寫千五百字校對各官每人每日校對二十五篇纂修等官功課由各該館總裁酌定咨稽察處奏準遵照每月於初五日前造册送察每三月一次將各館修成書目及有無告竣期限察奏有稽延者劾㕘一諭㫖下各部院交内閣繙譯雍正四年諭朕從前所降諭㫖各部院衙門或將漢文繙清或將清字譯漢者皆不甚妥協甚有關繫著各部院衙門將從前所降諭㫖原繫漢字者陸續送内閣繙清原繫清字者陸續送内閣譯漢仍交各該處存案若止一二句易於繙譯者不必送内閣嗣後所降一應清漢諭㫖皆送内閣繙譯妥協再交各該處施行欽此乾隆十三年奉㫖嗣後内閣凡有奉到清字諭㫖譯漢者皆著覆奏一起居注紀載每年十二月該衙門貯匱送内閣大學士學士驗視加封交滿本房送庫收貯一壇廟陵寢神牌由工部製造送内閣於滿本房中書内擇清字端楷者敬書清文翰林官敬書漢文詳見禮部竢該部鑴刻既成禮部奏請命内閣大臣行禮一尊諡册諡大學士承㫖恭擬奏請欽定傳禮部堂官一人至内閣親領勅諭奉行事竣具疏題繳仍下内閣收貯玉册玉寶香册香寶由工部製造翰林院撰擬册文大學士恭閱進呈中書翰林官分書清漢字及清漢寶篆内閣官㑹禮工二部翰林官在内閣監視鑴字填金填青大學士等行禮如儀勅賜諸王諡號用一字貝勒以下及文武大臣用二字皆大學士擬奏請㫖一陵山封號大學士承㫖恭擬封各山川神祇亦如之一壇廟祝版由太常寺送内閣中書繕寫皇上親詣行禮大學士恭書御名如遣官行禮學士恭書御名每嵗春秋丁祭先師孔子遣大學士一人行禮祭告嶽鎮海瀆長白山前代帝王陵寢孔子闕里開列學士侍讀學士職名移送禮部題請欽命一切祭告祝文由翰林院撰擬大學士詳閱奏請欽定一圜丘方澤祈榖常雩大祀頒勅諭於宗人府及文武各官公署敬書於版齋戒日奉設正堂其辭曰皇帝勅諭陪祀王公文武大臣官員及執事人等兹以乾隆某年某月某日朕恭祀如遣官恭代則曰遣官代祀皇天上帝於圜丘惟爾羣臣其蠲乃心齊乃志各揚其職敢或不恭國有常刑欽哉勿怠祈榖則云恭祀祈年殿皇天上帝於為民祈榖常雩則云恭祀雩夏至則云恭祀皇皇天上帝祗秩常地祇於方澤乾隆十三年諭向來郊壇大祀凡遇遣官恭代之日大學士等皆不齋戒陪祀蓋因㑹典開載齋戒定例有武官公以下輕車都尉以上文官尚書以下員外郎品級以上之語是以親王及内大臣大學士等皆不陪祀朕思王等天潢近派原與臣寮不同自當隨駕前往内大臣等職司環衞若專顧陪祀則禁直必致曠誤惟親行扈從亦為合宜若大學士乃政府之臣為百寮表率當敬謹齋宿以為衆倡何以轉不陪祀揆厥由來當縁明代大學士僅列五品在尚書之下文官以尚書為冠則大學士等已在其中至我朝雍正年間大學士既定為一品在尚書之上則所稱尚書以下應改為大學士以下嗣後一應祭祀大學士等一例齋戒陪祀將此載入㑹典欽此一諸王貝勒以下及一品文武大臣賜祭賜葬應給祭文碑文皆由翰林院撰擬大學士詳閱恭請欽定若賜祭公侯等及二三品大臣䝉古王貝勒由翰林院撰擬文式大學士奏定遵用一新設宫殿廟宇城郭門垣牌扁對聨由翰林院撰擬大學士閱定請㫖裁用其各省府州縣名有改設及增設者由大學士撰擬奏請欽定殿試天下貢士讀卷大學士學士等官前期奏請制策中書恭録執事官監視刋刷至期皇帝御殿大學士奉制策授所司給多士對策讀卷官以卷進呈欽定甲乙中書書大小金榜及三傳摺傳臚日鴻臚寺官於五鼓赴内閣領三傳摺學士率典籍官奉榜至乾清門以小金榜交内侍進呈御覽大金榜用御寶畢典籍恭奉前行學士及執事官隨後至太和殿設黄案上皇帝御殿鴻臚寺官臚傳畢大學士奉金榜授所司出長安左門外揭曉殿試武舉儀同出長安右門外揭曉一庶吉士散館由教習庶吉士大臣奏明人數移咨到内閣内閣擬定日期奏聞並請欽命監試王大臣及閱卷官進呈試卷後欽定甲乙大學士翰林院掌院學士引見次日覆㫖傳吏部堂官一人親領勅諭宣讀越三日吏部具本題繳一命將出師大將軍經畧將軍勅書皆由内閣撰擬皇帝臨遣大學士奉勅印授行儀詳禮部乾隆十四年諭近用新定清文篆書鑄造各衙門印信所司檢閱庫中所藏經畧大將軍將軍諸印凡百餘顆皆前此因事頒給經用繳還未經銷燬者㑹典復有命將出師請㫖將庫中印信頒給之文遂至濫觴朕思虎符鵲紐用之軍旅所以昭信無取繁多庫中所藏其中振揚威武建立膚功者具載歴朝實録班班可考今擇其克捷奏凱底定迅速者經畧印一大將軍將軍印各七分匣收貯稽其事跡始末刻諸文笥足以傳示奕禩即仍其清漢舊文而配以今製清文篆書如數重造遇有應用具奏請㫖頒給一并藏之皇史宬其餘悉交該部銷燬此後若遇請自皇史宬而用者蕆事仍歸之皇史宬若遇因一事特行頒給印信者事完交部銷燬將此載入㑹典欽此欽命總理一切軍務儲糈經畧大臣關防一命重臣經畧軍務則用之奉命撫逺寧逺安東征南平西平北大將軍印各一鎮海揚威靖逆靖東征南定西定北將軍印各一如命將征討開列奏請竢欽定頒給師旋之日均繳内閣收貯皇史宬典籍及滿本房掌管收發軍前章奏文移由大學士酌委内閣官隨行管理出師吉日由大學士請㫖一勾決重囚凡勾到之年秋審既畢刑部將各省情實罪犯名單送内閣交票籖處覈計省分逺近人數多寡分作九起先雲貴次四川廣西廣東福建次奉天陜西次湖廣浙江江西次安徽江蘇次河南次山東山西次直𨽻次刑部罪囚豫交欽天監擇日於冬至六十日前具奏及期監察御史奏勾到本大學士學士㑹同刑部堂官及記注官祗候召入咸常服不挂數珠滿學士一人啓奏囚册漢大學士一人秉筆勾訖交紅本房批清文漢學士批漢文密封發科下刑部施行一清字侍讀學士二員䝉古侍讀學士二員吏部將郎中等官論俸擬定正陪引見補用漢字侍讀學士二員吏部將漢字出身之郎中等官論俸擬出十人移送内閣㑹同大學士考取正陪引見補授漢軍侍讀學士二員吏部將漢軍御史移送内閣考取如漢軍御史不敷將漢軍俸深郎中一同考取正陪引見補授乾隆十七年議準嗣後内閣漢軍侍讀學士員闕不分漢軍漢人兼用又奏準滿侍讀學士員闕一由内閣簡選題補一歸部銓選一滿洲䝉古侍讀員闕於中書内簡選正陪引見補用雍正元年定漢侍讀同漢軍侍讀員闕將漢軍典籍中書簡選如不得人將滿洲中書簡選升用一滿洲漢軍典籍員闕照簡選侍讀例於各中書内選擬正陪引見補用漢軍簡選典籍時如不得人準令滿洲中書並入簡選雍正十年定漢典籍較俸推升一滿中書員闕以本旗貼寫中書補用五人外内閣行文吏部移取各部院筆帖式及由文舉人繙譯舉人出身之筆帖式與本旗貼寫中書同考試大學士擬定正陪引見補用乾隆五年定如遇貼寫中書應升之闕該旗人員不足正陪之數即於八旗貼寫中書内通行論俸補用如遇應用各項舉人出身升補之闕無人應考仍於貼寫中書内簡選引見補用乾隆九年定一䝉古中書員闕吏部以見任䝉古筆帖式並䝉古文舉人繙譯舉人出身之筆帖式及閒散文舉人繙譯舉人咨送内閣考試補用五人後用降調一人免其考試乾隆五年定䝉古中書十六人内四人歸唐古特學出身之筆帖式選補西藏皆用唐古特字故特設唐古特學委官教習以備繙譯屬國章奏及頒行勅諭之用一漢軍中書員闕移取各部院筆帖式繙譯舉人出身之筆帖式及閒散繙譯舉人一同考試補用一漢中書員闕吏部以應考之進士舉人移送内閣大學士定期請㫖考試欽命論題詩題各一道並命閱卷大臣彌封編號在貢院舊制於七午門内考試乾隆年改定考試量取二三十名進呈欽定行知吏部引見按名遞補一滿貼寫中書員闕行文吏部移取八旗願考人員送内閣照考取漢中書例彌封編號欽命繙譯題一道並㸃閱卷大臣在午門内考試每旗各取四名以備漢本房貼寫中書之用其專習清文人員試題由閱卷大臣量出擇其麤曉繙譯能書大小清字者每旗各取六名以備滿本房貼寫中書之用取中試卷進呈欽定行知吏部注册按旗依次坐補乾隆八年定一䝉古貼寫中書員闕於能以竹筆書䝉古字曾在書館効力之各部院額外筆帖式内考選如無此項人員照滿洲貼寫中書例選補竹筆作字用於頒發䝉古取巴勅書三名册命碑文康熙六十年内閣選克什乾隆九年奏準選取六名作為貼寫中書行走一看守皇史宬設尉三人吏十有六人以八旗廢官及閒散人為之尉食七品俸吏月給銀二兩遇有員闕大學士簡選應補之吏頂補行文吏禮二部注册轉知照該旗所遺吏闕由吏部咨取該旗應補之人送内閣一中外奏銷册籍奉㫖留覽者發出時典籍檢察貯庫一每嵗需用心紅紙張黄綾之屬於户工二部支取嵗終以細數具奏各衙門如之欽定大清㑹典則例卷二
