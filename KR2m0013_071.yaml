body:
  text: 禮部儀制清吏司學校一一學校之制順治初遼東十五學寄設永平府於都司學設教官一人兼管自在瀋陽鐵嶺開原四學於寧逺學設教官一人兼管前屯錦州義州右屯四學於廣寧學設教官一人兼管永寧蓋州海州定遼右衞四學五年改設遼學置教官一人十一年覆準商籍生員長蘆鹽運使司所屬在直隸者附河間府學在山東者附濟南府學兩淮所屬附江南揚州府學兩浙所屬附浙江杭州府學陜西所屬附寧夏府學河東運城别設運司學十六年題準直隸山海衞宣府衞學邊逺無可歸幷仍準照舊其懷來衞永寧衞學歸延慶州保安衛學歸保安州龍門所學歸開平州昌平衞學歸昌平州又題準湖南辰州五寨照例設學令辰州府訓導分攝康熙二十六年覆準直隸懷來永寧保安三衞仍各設學令保安州學延慶州學兼攝二十八年議準四川奉節縣為䕫府首邑又兼大寧歸幷應復建學又覆準貴州貴筑縣照例設學即令新貴學官兼攝三十一年覆準貴州安化縣學即令府學兼攝又覆準雲南自平定以來人文漸盛師宗州復設學正一人元謀定邊二縣復設訓導各一人三十二年覆準湖廣五開衞學即令靖州學兼攝五十一年覆準廣西西隆州已建學宮撥武緣縣學訓導移駐以專督課五十三年覆準湖廣鎭溪所修建學宮以瀘溪學訓導就近兼攝五十四年覆準湖廣安陸府鍾祥首邑向未設學諸生附府學考課今建立學宮設教諭訓導各一人又覆準貴州南籠廳修建學宮分普安學訓導司學務雍正元年覆準廣西太平土州設立學宮令生童就近肄業以養利州訓導移駐專司督課二年覆準廣西西陵縣久同西隆州改土歸流照康熙五十年西隆州例建學以思恩府學訓導移駐專司督課三年諭古有諱名之禮所以昭誠敬致尊崇也孔子道高千古德冠百王為往聖繼絶學為萬世開太平自天子以至於庶人皆受師資之益而直省郡邑之名如商邱章邱之類今古相沿不改朕心深為不安自今或改讀某音或别易他字其於常用之際作何廻避著九卿會議具奏欽此遵㫖議奏嗣後惟祭天於圜丘丘字不用廻避外若府州縣地名相犯者由内閣擬字更易山川市鎮由該省督撫稽考更易報部至姓氏相同者加阝作邱常用之際書從古體又諭今文出於古文若書從古體是仍未嘗廻避也此字本有期音毛詩及古文作期音者甚多嗣後除五經四子書外凡遇此字並加阝為邱地名亦不必改但加阝旁讀作期音庶乎允協欽此四年覆準山西威逺衞學廪增附生撥入朔平府學老營所學廩增附生撥入寧武府學其神池利民八角三堡先進寧武學者改歸神池學鎮西衞先進岢嵐州學者改歸五寨學其餘衞所均照改設新縣撥入縣學造册送部又覆準雲南普洱府學教職於元江府學調訓導一人以司啓廸其從前附入元江府學各生令撥入普洱該學政别造清册報部又覆準山西臨晉縣分為兩縣以臨晉縣學訓導分理新縣學務十年覆準長蘆鹽運使司所屬商籍生員在天津州滄州者向附河間府學今天津州升府滄州亦歸天津府屬應改附天津府學考課十一年覆準凡府州縣文廟學宮有應行修理之處該地方官據實確估詳明廵撫學政交與該地方官於學租銀内動支修理竢完工之日委官驗明責令教官敬謹守䕶遇有殘闕即會同地方官酌量修補地方官及教官遇有升遷事故離任時將文廟學宮照社稷各壇墠之例入交盤項内接任官驗明並無傾圯出結接受如有損壞失修之處即揭報叅處乾隆三年覆準甘肅臨洮府並附府之狄道縣移駐蘭城改蘭州學為府學擇地别建臯蘭縣學狄道縣學改為州學六年覆準四川樂山縣學改為嘉定府學三臺縣學改為潼川府學樂山三臺二縣學即令各附府學之内毋庸别建學宮八年覆準甘肅口外安西沙州靖逆柳溝赤金五衞生員向隸肅州學管轄但去肅千有餘里稽察莫及應於五衞適中之安西衞增設教授一人五衞生員均撥歸該教授管轄一學政考校順治九年題準學政歲科兩考定以三年内報完仍竢新任面代不許擅離地方康熙十二年覆準順治十八年經科臣疏請幷歲科為一考今三年内童子入學府學止二十名大學止十五名中學止十二名小學止七八名據直省學政所報文册各學生員三年内每學援納事故黜革等項約三四十名至百名不等三年為時甚久僅行考試一次儲才不廣督責不勤應仍照舊例三年内歲科兩考滿洲䝉古漢軍今既考漢文照漢人一例考試又題準學政考試遲延限内不能完結者降一級調用十八年題準學政考過學册一年二季解部由部於新舊學册嚴加校對如有額外濫取朦報者題叅二十五年題準學政歲考畢造簡明文册解部科校對科考畢亦如之總計三年二次其違限不解者照定例叅處二十六年題準學政於鄉試第二年接任其未考地方多者展限五月少者展限三月報滿若鄉試之年於試前接任竢下次三年歲科試完報滿三十九年覆準學臣歲考後令解全册一次科考後止將錄取生童姓名幫補日月及各項事故分别開報不必别造四柱全册四十年題準學臣歲科解册均由驛遞四十一年覆準鄉試之年遇新任學政於本年到任者準將歲考一二等生員册送科舉以應本年鄉試仍於鄉試後補行科考生員補廩增童生入學均照定例將試册速行送部此後各省學政因鄉試期近科考未遍題請以歲作科者均照此例四十五年覆準學政報部歲科册内有錯誤者該部駮囘改正其名數不符朦溷報部及頂冒等弊並不應補廩增而越補不應降青而竟降者奏交該督撫察明題叅五十年覆準學臣遇有丁憂等事離任將學政印務令該督撫或藩臬署理者定例不許考試其遇鄉試届期但照科考正案送場署印不準錄送遺才雍正元年覆準定例歲科兩考各限一年考完即將簡明文册送部察對歲考較之科考事屬稍繁應將歲考解册再寛限六月以免遲延之咎其科考仍照舊例遵行至造送歲科册内有字畫訛落之處不過謄繕偶誤無闗學政相應免其駮叅行令學政自行改正二年奏準學政通計三年解册兩次不必扣限六年奏準臺灣考試解部文册理應兼理臺灣學政造送但逺隔重洋文移往來不便應將一應册卷别具印文附於福建學政一幷送部十年覆準湖南永順府屬在萬山之中由辰州至永順懸崖鳥道逆水而上實屬陡險準其歲科連考以免跋涉之苦又覆準陜甘地方遼濶非他省可比歲科連試之處業已因地制宜則文武先後之間亦可通融辦理嗣後該省歲科連考之棚發歲試文案後即接行科試文場已畢再出演武場其武生童内外場先後仍照見行例辦理又覆準四川之酉陽州照䕫州寧逺二府之例準其歲科連考乾隆十七年覆準福建臺灣府考校之事向例繋臺灣道管理雍正四年改歸廵視臺灣御史今廵臺御史已定三年一次命往事竣即囘其提督臺灣學政闗防應仍令臺灣道兼管一學政闗防順治初年定提學經臨地方廵捕官量率兵快於交界處防䕶勅印其餘夫馬按臨伺候不得别批迎接官吏師生不許出郭迎送程塗非六十里不得備辦中火有驛州縣及非宿站不必别送下程吏書乘馬自行上下貼轎近行馬夫先送雨具不得近前兵快執肅靜牌於執事前廻避牌於吏書前如遇紆塗曲巷有潛行探聽乘機餽送吏書者即行拏究有容令跪道投書稟見者廵捕員役重究該廵捕官不許代替如違提究又定按臨下馬執事卷摃暫止大門外竢輿夫出守門官吏暫閉大門學政先入安置印匣廵捕官入後堂周視各房牆垣封鎖書吏出堂廵捕官同押摃官驗交卷摃次皂隸繳執事次地方官送聽事員役及柴燭等項驛官送廪給鋪陳總具一册廵捕官搜檢畢乃收入學政更衣升堂守門吏啟門各官吏師生序進逐起禀見遞一應文册畢各囘不再見廵捕官率兵快晝夜廵邏但有沿牆窺竇抛甎擲瓦及行走踪跡可疑者即拏送究新到星相醫卜面生之人驅逐不容留住如違廵捕官責治地方歇家鄰右連坐按臨次日祗謁先師官吏師生禮生止於廟門一躬不禀接行禮畢升明倫堂官生以次揖見應坐者照憲綱序坐講書生員總出一班一揖西嚮立講畢以次下堂東嚮立竢行賞罰畢官吏師生先出不赴謝每日辰時投文申時領文守門吏領出印信號簿二一登記發行公文一遇各衙門遞到公文先檢無磨洗拆動夾帶私書等弊方許登記詳驗批文各幾角幾件廵捕官印驗訖二字付原役投入解審補考比銷各隨牌入舖遞公文亦照前登記每日門吏各注姓名以備稽察如員役刁難需索許禀拏問其考試閲卷之日一應公文皆廵捕官驗送駐劄州縣登簿收貯每一日總為一束候發落完彙開手册送進有批迴者該衙門徑注收發批候發落完日彙送一應書札徑自阻囘有緊急事務傳鼓禀入非緊急事不得傳鼓駐劄處所初到日照常送米麫一次以後發簿照數辦送各該調考州縣不許别送下程如乆住之所柴炭油燭及門皂柴米均酌定數目五日一送筆墨紙張候票取方送送進物件廵捕官搜檢如遇考校日期生儒供給先一日送進每名大餅六枚水果四枚夏月加西𤓰即置考案上教官仍給飯一餐務精潔堪用有以惡濫冒破官錢該吏坐贓問罪各員役供給亦先日豫貯各州縣同日考者先期扣算合用銀若干會同總辦以免偏累事畢通前公費及一應修理衙門置辦器皿給賞花紅紙筆之費一并造册各具總撒數目若干候起馬日呈報以憑察覈九年題準學政湏正已潔操矢公矢慎務得眞才不許曲徇情面生員有荒疎庸耄者即行黜退有揑造流言思逞報復者訪實照例問遣若鄉宦勢豪干托不遂暗行中傷者許徑自奏叅處治又題準學政廵試各府州務親臨遍涖不許於隔别府分調取生儒以致跋涉為害不許令師生匍匐迎送考畢即於本地方發落明示賞罰不許攜帯文卷於别處發案致令吏書乘間作弊士子無所勸懲違者題叅又題準學政奉勅專督學校督撫布按兩司不許侵其職掌學政廵試所屬除教官生員干犯行止合行嚴懲外不許泛受民辭侵官喜事其生員犯罪或事須對理者聽該管衙門提問不許徇庇致令有所倚恃抗拒公法十一年覆準新補學政一經領勅次日即行赴任如有逗遛都中赴席燕會者許科道官指名叅處至於各省舊任學臣考試已竣均於十一月内報滿到部如違定限即題叅議處康熙十八年議準向來歲科兩考積弊有十童生未經府考册内無名鑽求學政徑取入學巧圖㨗便一弊也考試各府州縣衞所童生額外溢取撥發别學明收冒籍以占本學正額二弊也彌封編號印簿及場内坐號紅簿不發該府州縣封貯私存道署暗對字號賄賣三弊也考完一府不將紅案速行發學任意遲延徇私通賄更改等第拔下作上四弊也每考一處令書辦承差快手人等出入過付暗訪生員有家資者先開六等草單嚇詐保等出銀準入三等五弊也文童額少武童額多將文童充為武童入學之後夤緣改文娼優奴隸濫行收取實能騎射者擯而不錄六弊也各府地方設立考場憚於親臨將生童逺調考試各州縣告病生員扛擡驗病困苦難堪七弊也縱容無賴教官包攬生童私通線索効勞分潤名曰作興大壞風教八弊也曲徇上司同僚情面並京官鄉宦私書及親戚朋友隨住地方討情抽豐孤寒之士棄而不錄九弊也報部學册將額外溢取入學童生未經科歲兩考豫附三等其姓名不入新案造入衣頂下以趙甲頂錢乙作為實在之數朦溷禮部十弊也嗣後學道考覈均注剔除十弊不能剔除十弊該督撫即指叅内有貪贓之弊照例革職提問如無貪贓等事照才力不及例降二級調用其考覈疏内不注剔除十弊字樣及未曾剔除而注剔除者或吏部察出或科道糾叅督撫照不報劣員例降三級調用督撫有需索陋規者亦照貪贓例處分至上司同僚京官鄉宦私書及親戚朋友隨住地方討情抽豐及州縣官傳遞私書鄉紳投刺請席者繫官革職繫常人交刑部從重治罪至順天學院任滿時亦開明剔除十弊具題考覈方準囘院今各省皆改學院任滿皆自題十弊剔除若不能剔除或有貪贓等弊亦照學道例處分二十一年覆準嗣後學政凡到所考地方量撥别縣書吏供事其掌案長接名色嚴行禁革屬官一槩不許迎接執事員役不許退堂傳遞關節如遇校閲之日一槩封筩不許傳入間有公事竢試竣之日方許開函投進其生童試卷府縣除正卷外不許多備一卷如有此等情弊聽該督撫據實指名題叅交部從重議處如該督撫徇情被科道官糾叅或旁人出首將督撫一并議處又覆準向來考試地方各州縣官指稱供給名色私𣲖甚多或按丁徵收或逐户科歛每考一府費民間數千餘金嗣後應嚴行禁革如有私派照舊累民者許督撫指叅交部從重議處三十一年覆準學政有將祠生贊禮濫行批設考試生童徇私賄錄至於劣衿學霸包攬武斷者不行究斥行誼修明者不為表揚統令該督撫提叅交部從重議處如督撫徇私事發一并議處三十九年議準學政考試督撫藩臬各道勒索陋規及學政濫與者皆革職提問如有勢宦京官請托投札及教官巡捕進士舉人説情並書吏皂役等討賞等事有官者革職無官者從重治罪若學臣徇情市恩者亦革職一并提問知府如有包攬入學童生要挾勒索將文理不通之童生送考者或學臣申報或督撫糾叅將知府革職提問學政與提調知府扶同作弊者一并革職提問督撫不糾叅學政不申報者皆革職又覆準督撫如有藉名開送童生者照勒索棚規例治罪州縣官賄薦案首及各官効勞分肥提鎮等官説情並學臣扶同者事發皆照例治罪遇有挾制干請者準徑實封奏聞若祖父兄弟為子孫營謀者除本童責革外祖父兄弟有官者革職無官者從重治罪雍正五年覆準嗣後學院所帶吏役酌量足用不許宂濫至承差號吏亦封在場内不許容留一人在外所有一應收發公文催買供應等項悉委提調料理如有吏役在外招揺撞騙許提調即行鎖拏從重治罪又覆準學政考試凡闗防啟閉以及拆卷發案原經提調官之手嗣後提調官如聽學臣貪冒通同作弊以及引誘為非者一經發覺將提調官照貪官例同學政一并革職提問如學政暗收闗節私鬻名器提調官雖無通同引誘情弊而防範不嚴應照溺職例革職再學政按郡考試凡應用員役皆由提調官送用嗣後如有猾吏姦胥招揺撞騙以及受賄傳遞等弊提調官不訪拏察䆒别經發覺將提調官照失察衙役犯贓例議處倘學臣操守清廉杜絶情弊提調不得遂其引誘反行挾制把持者準學政指叅審實將提調官照貪官例治罪十年覆準嗣後順天學政考試地方官册送之皂役在堂上伺候者不必㸃用亦不必收地方供給至於場外合用廵邏搜檢等項人役仍照舊例由地方官撥用學政所帶隨行人役既令場内辦事日久不免弊生務宜嚴加約束不許擅自出入與生童交通語言仍令提調官察驗封鎖不時稽詗十一年覆準從前府州縣院考吏書人等辦事需一月有餘雜費不入正項奏銷之内皆取給於卷價而該管官遂招立卷户平居衙署之糊飾臨時所送識認之試卷皆索之卷户於是明索高價苦累生童嗣後府州縣以及院試無論大中小學每本試卷定價三分令該提調官自行辦置不許再招卷户其紙價工費之外即為辦事書吏人等飯食之費若再立卷户照例叅處十二年覆準各直省學政職司文衡但試卷繁多一已之精神不能遍覽勢不得不延請宿學之士寄以衡鑒然必湏慎擇他省之人方可以逺避嫌疑杜絶弊竇乃學政中往往有希圖簡便即以此府考居前列之生帶至彼府閲卷者其中瞻顧鄉曲勢必暗通闗節廣徇情面兼之書役勾連傳遞消息夤緣説合招揺撞騙等弊皆不能免嗣後學政考試應於未入境之先即延請他省中學問優長操守㢘潔之士同往閲卷如繫兩省接壤之地亦必在五百里之外者方準延請兼令該督撫嚴飭地方官並儒學教官通行曉諭嚴禁士子鑽營隨任妄希衡文如該學政仍蹈前轍即行題叅議處并將同往之該生斥革又議準嗣後嚴飭該學政將斥革之貢監劣生不得冒給衣頂如有夤緣給頂者一經發覺除本生從重治罪外將該學政一并嚴加議處又議準學政歲科造報各册並學政新舊交代底册内凡舊管新收開除實在四柱總數並開復補廪及生員等第緣事黜革等項所注廪增附青社緊要字樣遇有挖補增注之處務鈐蓋印信仍將用印顆數於册尾開注如有遺漏印信之處以致書吏増減作弊者察出將書吏重究外仍將該學政叅處乾隆二年諭安徽應試童生有完納卷價之陋例其費彙交知府直隸知州除修葺考場外其餘則補學政養亷之不足雖每童所出不過錢數十文而在貧寒書生亦不免拮据之苦且學政養㢘朕已特頒諭旨加增更不必取資於卷價至於修葺考場乃地方公事應動存公銀者著將童生交納卷價永行禁止毋使不肖官員及吏胥人等藉名苛索致滋擾累欽此四年議準考試武童騎射定例學臣會同武職校閲武職奉委若不廻避闗防不肖士子鑽營賄囑亦未可定嗣後武職奉委之日封門廻避提調官留心訪察不得與本地人士私相往來以及家人兵目輕行出入七年覆準各省學政守一定之儀制勵師表之風裁不得自損名節取悦督撫於相見之禮不遵會典儀注諂屈過甚或至投拜門下卑同屬僚不得因觀風所取之生童府州縣錄送之首名不問優劣徇情拔取至督撫於學政當以公正亷明相朂不得以勢位意氣相陵十二年覆準學政闗防考試如有暗通闗節弊生於内者責之學政招揺傳遞弊生於外者責之提調官一經發覺各照例處分一教職考覈順治九年題準儒學教官士子觀法所繫提學按臨之日考其學行兼優教有成效者除禮待奬勵外仍據實列薦其行履無過但學問踈淺者姑行戒飭責令勉進有老病不堪者準令以禮致仕若鑽營委署橫索束修卑汚無耻素行不謹者即行叅奏分别究革其有學霸生員書役門夫行私惑誘者一并究擬重治康熙十八年題準各省教職有不由科貢出身者題明送部别用若部選教職未到止許本學及别學官署事不得濫委雜流又題準學政於官員賢否遵照勅諭例應品覈文到各府州縣掌印官即照舊式備造僚屬履歴及以前薦奬戒飭緣由填注考語事實教官更分年力志行學識教規四款内有賢不肖之尤者别具揭帖限一月内送閲按臨再造新任及改節改過者季終續報並將任内作興學校事蹟備申報奪儒學掌印官若遇有升選及會試等事故提調即以年深訓導委署一學皆闕即將别學附近者詳委凡經手書籍器物學糧文卷交盤明白申報批允方許離任如應聘及丁憂等項察無違礙準行即日申報各州縣署印勿得轉委教官即承乏委用亦湏申詳學政批允方行止守倉庫勿干别事各府州縣禮房吏及學吏轉考候詳允方準起用違者究革四十三年諭教官必文學明通方稱厥職近見直省教職官内不諳文學者甚多如此何以訓士著行文直省巡撫將各屬教官通行考試分别具題欽此遵旨議準嗣後教職由部選後赴撫臣考試其考居一二三四等令其赴任五等令歸學習六等革職五十年覆準教官計典分别優劣必由學政嗣後直省任學道者令㑹同藩臬考覈送督撫具題任學院者藩臬二司造送督撫學院會同考覈具題雍正元年諭直隸各省教官乃專教士子之人今準捐納以致不通文理少年反為學問優長年髙齒長之師可乎應照其品級别任補用該部議奏欽此遵旨議準嗣後直隸各省教職除正途照舊選用外其捐納教諭訓導即用先用之人不由舉人恩拔副榜廩生挨貢出身由生員捐納貢生者教諭改以縣丞訓導改以主簿用照捐納日期入於各項捐納班内銓用二年覆準見任教職内從前捐納出身者既令改補别任嗣後專令正途出身之教授教諭學正訓導設立課程實心教習如有抑勒孤寒等弊該學政題叅處分其教習著有成效者即行題薦又覆準敎職由廪生捐納出身者仍許留任四年覆準教官由撫臣考校向例居一二三四等者令其赴任五等者令歸學習但四等文理荒踈未便令其司教嗣後三等者仍照例給慿赴任四五等者悉令解任學習三年再行考試六等者革職至錢糧辭訟二項繫州縣專責教官未定考成但該教官果能訓誨約束則士習漸端自無抗糧興訟等弊嗣後各學教官所屬文武生員除受誣被告及實有寃抑切已不得已之事申訴控理外其有倚恃衣頂抗欠錢糧並揑辭生事唆訟陷人等事該教官即申詳督撫學臣免其叅處如縱容徇庇不行申報者事發將該教官題叅照溺職例革職如該教官果能盡心訓導六年之内所屬士子無前項過犯該督撫學政據實保題準其以應升之官即用其見任之員以雍正五年為始扣滿六年著有成效者準其一例保題又覆準訓迪生員原繫教官專責今八旗生員漢教官不能管攝以致怠忽並不鼓勵讀書嗣後於順天府學設立滿教授一人訓導一人滿進士舉人貢生赴禮部具呈考取文理優通者擬定正陪送吏部引見進士舉人授為教授恩拔副榜歲貢授為訓導令其每月將八旗生員考試一次並以時教令騎射如有文理不通行止不端者該教官申詳學政即行革退如該教官怠惰廢弛有玷厥職許順天學政指名題叅又覆準外省府州縣衞以儒學教官兼理武學京衞大宛二縣武生亦令儒學教官訓誨約束裁汰原設武學官役其見任武學教授訓導令離任照原品别用又覆準凡計典教官賢否皆由知府具報則知府原有稽察之責恐以教官閒員微職不無優容行令各省督撫轉飭各府必從公考覈如有姑息容隱將各該知府照徇庇例題叅議處七年議準教官之職專司訓迪士子除錢糧拆封比較生員拖欠錢糧並州縣會審案件有闗戒飭生員之處仍令赴州縣衙門公同辦理外其一切地方事務均不得干與倘州縣不遵定例仍傳教官同辦地方事務教官違例前徃干與者州縣官照將事務交與不應交之人例議處教官照不應得為之律分别議處乾隆元年諭教職乃師儒之官有督課士子之責素䝉皇考世宗憲皇帝加恩優待屢次訓勉且與有司一體賞給封典朕即位以來念其官職卑㣲恐以宂散自居不思殫心盡職特加品級以鼓勵之按舊例教職兩官同食一俸未免不敷養廉著從乾隆元年春季為始各照品級給與全俸永著為例欽此三年覆準教官為多士之楷模宜潔清自愛不得因循舊習令吏胥門斗索取生員贄見節儀至舉報優劣乃甄别大典倘有寃濫於士品士習闗繫匪輕嗣後各省教官倘有仍前勒索贄見規禮以致舉報優劣不公者令督撫學政覈實嚴叅照藉師生名色私相餽送例革職倘别經發覺將督撫學政照例議處書役門斗家人有索詐等事䆒明本官是否知情分别照例議處書役門斗家人按律以枉法論計贓分别治罪六年諭古者黨有庠術有序民生八歲入小學十五入大學不獨秀而為士者羣居樂業天下實無不教之民是以教化興而風俗厚後世設立教官專以課士已非先王有教無類之意而近來教職多繫衰老庸劣之輩不但不能以道德禮義化導齊民並其課士之職亦不克舉則安用此官為也朕御極之初念其薄俸不足自贍特命增給乃望其修舉職業助興教化非以廪餼為養老之具各教職亦不當以司鐸為養老之官也著該督撫會同學政嚴飭所屬教官務以實心實力勸學興文恪盡課士之責其有年力衰頺及庸劣不稱師儒之席者秉公甄别咨部罷斥庶訓迪得人而於造士育才之道實有裨益各督撫學政仍當時刻留心永久奉行不可茍且塞責欽此十八年諭向例各省教職六年俸滿該督撫學政公同甄别堪膺薦舉者保題送部引見年力衰邁者咨部休致但督撫陋習既不肯輕薦舉亦不肯多咨退是以保題者固屬寥寥而休致者亦不多見蓋視教職為無足重輕初不計其為造士之根本也前以選拔貢生為教職之階曾諭督撫學政令其加意愼重嗣後教職除有劣蹟者隨時叅劾外至六年俸滿堪膺民社者保題其年力未衰可以留任者出具考語送部引見如準留任竢後六年再滿仍如是甄别年老之員即咨部休致有願來京引見者照大計之例該督撫聲明給咨引見至訓導例止得升縣佐該上司尤多忽畧嗣後甄别之例與教職同著為令欽此一童生入學順治四年定直省各儒學視人文多寡分大中小學取進童生大學四十名中學三十名小學二十名八年題準滿洲䝉古漢軍子弟歸順天府考試取進童生滿洲百二十名䝉古六十名漢軍百二十名其滿洲䝉古子弟内院禮部會同考試通清漢文者繙譯漢字文一篇通清文者作清字文一篇漢軍子弟令順天學院與民童同出題考試十一年題準商籍入學長蘆所屬在直隸者照大學例取進在山東者與陜西所屬寧夏府均照小學例取進河東所屬照大學例取進兩淮及兩浙所屬照大學例取進十三年題準減定童生入學名數滿洲取八十名䝉古四十名漢軍百名又題準遼陽府照外府大學例取四十名遼海二縣各取十有二名十五年題準直省取進童生大府二十名大州縣十有五名小學四五名又題準土司子弟有稍通文理者聽土官具申本縣轉申提學收試以示鼓舞入學名數提學慿文酌定十六年題準順天府取進童生二十五名大興宛平二縣各二十名又題準直隸懷來永寧保安昌平四衞及龍門所既經歸幷應試童生取州縣官印結廩生保結不必别立衞册凡各衞學歸并府州縣者皆照此例又題準湖南辰州五寨照例設學取進童生七名又題準貴州省屬大學取進苖生五名中學三名小學二名均附各學肄業康熙四年題準奉天府取進童生承德錦縣各七名遼陽寧逺海城各五名蓋平鐵嶺廣寧各二名錦州府學四名竢人文漸充照大中小學定數再議六年題準八旗有願作漢文考試者各都統開送到部移送順天學院滿洲䝉古别編一號漢軍與漢人同場考試文優者即入順天府漢生員額數内九年題準各直省取進童生大府州縣仍舊中學十有二名小學或八名或七名又題準八旗滿洲䝉古取進童生四十名漢軍四十名滿洲䝉古漢軍應試者照漢童生例由部轉劄順天府丞先行錄取移送學院考試十二年題準盛京八旗子弟通習漢文者與民童同試漢文滿洲䝉古編滿字號取進三名漢軍編合字號取進二名十五年議準停止八旗考試二十二年題準貴州雲南各土官族屬子弟及土人應試貴州附於貴陽等府雲南附於雲南等府各三年一次共取二十五名皆附各府學册後照例解部察覈其土司無用流官之例考取土生不準科舉補廩出貢如不願考試亦不必勒令應考二十六年恩詔八旗準同漢人考試取進童生滿洲䝉古照舊例四十名漢軍減去二十名盛京八旗滿洲䝉古照舊例三名漢軍減去一名又覆準直隸懷來永寧保安三衞仍各取進童生八名二十八年議準增廣江南浙江入學名數小學十有二名中學十有六名大學二十名府學二十五名又覆準貴州貴筑縣照小學例取進童生八名至永寧獨山麻哈普定平越都匀鎭逺安化龍泉銅仁永從十一州縣向未設學應試之人於附近州縣考試入學額數仍於各原額内考取册内注明何州縣人報部又議準四川奉節縣學照小學例取進童生八名三十年覆準奉天滿洲䝉古考取童生增三名共六名漢軍増二名共三名三十一年覆準貴州安化縣照小學例取進童生八名雲南馬龍州寧州呈貢縣各照中學取進十有二名師宗州定邊縣元謀縣各照小學取進八名三十二年覆準湖廣五開衞照中學例考取童生十有二名三十三年覆準宣化府學取進童生酌增二名宣化懷安二縣照大學取十有五名懷來萬全蔚三縣照中學取十有二名西寧龍門赤城三縣照小學取八名又題準滿洲䝉古原取進童生四十名今將上三旗内府滿洲佐領内管領及五旗王公府屬滿洲佐領子弟歸并考試應量增二十名共取進六十名漢軍原取二十名今將上三旗内府旗鼓佐領及五旗王公府屬旗鼓佐領子弟歸并考試應量增十名共取進三十名三十四年題準盛京考試今增八旗内府佐領子弟滿洲䝉古原取童生六名量增四名共十名旗鼓佐領原取三名量增二名共五名三十五年題準守陵千丁家有佐領品級者有監生部用以年滿考職者其子弟許入於盛京八旗漢軍内考試三十六年題準盛京内府佐領子弟嗣後停其考取生員其三十四年所增名數悉行裁去又覆準貴州黎平府文武生員七十四名除三名實繫民籍與部册相符餘皆為土司族屬即繫土司照黔省例將黎平府每考應取土司生員額屬抵算完日再行考取三十八年諭江南浙江人文稱盛入學名數前已加增今著於府學大學中學小學各增取五名舉行一次以示奬勵欽此四十二年覆準河南考城柘城溫登封四縣本繫小學改為中學取進童生十有二名四十三年覆準湖南各府州縣熟苖童生許同民籍應試其取進名數即入該學定額四十四年題準湖廣黃梅縣改復大學雲夢桂陽二縣改復中學照例考取又議準貴州