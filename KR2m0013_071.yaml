歸鳳陽又覆準陜西葭州並所屬之府谷神木二縣復改隸榆林府從前延安府童生入學額内撥入葭州一名應仍歸延安如葭州府谷神木三州縣人文較盛與榆林懷逺二縣童生一例取入榆林府學額進十二名内又覆準奉天長寧縣裁歸永吉州應將長寧縣取進童生二名入於永吉州額内取進四名三年覆準湖南沅州升府取進童生十有五名新設附府之芷陽縣取進童生十有五名苖童三名又辰州府學既撥出沅州及黔陽麻陽二縣酌減入學童生二名存十有八名又覆準甘肅移駐臨洮府照該省府學例取進童生二十名狄道縣升州照該省州學例取進童生十有五名臯蘭縣照中學例取進童生十有二名又覆準貴州南籠改廳為府應照中學例取進童生十有二名四年覆準湖北宣恩來鳳利川咸豐四縣原繫土司改設今應童子試者已百餘人準暫附宜昌府考試别編新字號四縣共酌取童生一二名暫歸恩施縣學管轄又覆準雲南威逺土州從前附考元江府於元江府學取進額數外加取二名今威逺改隸鎭沅府元江府加額二名應撥歸鎭沅於府學取進定額外加取威逺童生二名又覆準直隸山海衞改為臨榆縣從前深河以西童生在山海衞學額内取進今改隸撫寧應將山海衞入學童生文十有八名武十有五名額内撥三名歸於撫寧縣學共取進童生文十有八名武十有五名新設臨榆縣照中學例取進童生文十有五名武十有二名再昌黎樂亭盧龍遷安灤州各有應試童生改隸臨榆該學政於考試時將永平府屬試巻比較如臨榆佳卷果多酌量寛取二三名撥入永平府學無庸别議加額又覆準福建霞浦縣分設福鼎縣霞浦縣學原取進童生十有五名今兩縣平分嗣後取進童生霞浦縣學八名福鼎縣學七名又覆準嗣後凡貴州歸化未久之苖有能讀書赴考者準其報名應試照加額取進其歸化雖經百年近始知讀書者亦準與歸化未久之苗童報名應試於加額内取進其餘歸化年久在未經題請加增苗額之先已同漢童考試者仍與漢童同照原額取進地方官不得因其祖籍苗民以新苗童送試漢童亦不得以既定有苗額阻抑又覆準甘肅臯蘭縣仍照蘭州原額取進童生十有五名五年覆準陜西寧夏府屬新渠寶豐二縣裁汰二縣之民從前原隸靈州寧夏寧朔中衞平羅五州縣今仍歸本籍其户口原不加多若將新寶兩縣入學二十四名之數盡數撥增未免太浮令該學政於五州縣内視人文多寡酌量增取十有六名以八名分隸各學再以八名撥入寧夏府學以符該省大府之例又覆準浙江長興蕭山二縣學照府學例取進童生二十五名又覆準廣東新設之豐順縣照小學例取進童生八名於海陽縣額進之文二十名武十有六名内各減四名揭陽縣之文武各十有五名嘉應州之文二十名武十有二名内各減二名歸豐順縣取進嗣後海揭二縣嘉應州均照減額取進又覆準福建永春州應試童生多至七千名酌增三名共取進童生十有八名又覆準福建德化縣酌增童生入學四名共十有八名六年覆準四川新升之嘉定潼川二府取進童生各十有五名七年覆準河南許州府仍改為直隸州但應試童生三倍於前仍照府學例取進二十名九年覆準直隸遵化州升為直隸州照大學例取進童生文十有八名武十有五名内定文武各三名於所屬之玉田豐潤二縣酌撥州學十年覆準盛京工部所屬五六品官及司匠所屬之千丁與四品所屬之千丁並無差别準其入於奉天府漢軍内考試十二年覆準裁永吉州改為吉林理事同知其文武生童即歸理事同知管轄入學額數照舊例考取十三年諭朕親詣闕里釋奠於先師山東通省入學名數著增廣一次府學大學三名中學二名小學一名欽此又覆準陜西華陰縣屯籍士子向居潼關一縣之半今潼關縣裁歸同知管轄華陰屯户統歸經理原潼關縣取進童生十有二名酌留九名於廳學餘三名以二歸大荔縣一歸朝邑縣取進十六年諭朕問俗觀風南巡江浙念三呉兩浙人文所萃本年歲試文童府學及州學大學著增五名中學四名小學三名欽此又覆準山東膠州學取進靈山衞童生八名今衞籍應試人少減去三名仍存五名十七年覆準四川眉州學加取進童生三名定為十名青神彭山二縣學各加取二名定為六名十八年覆準四川綿州學加取進童生三名定為十名德陽羅江二縣學各加二名定為六名新津雙流新繁彭郫崇寧六縣學各加二名定為八名二十一年覆準江南金山衞學酌減四名歲科兩試準取進文童十有六名仍歸華亭縣收考欽定大清會典則例巻六十八
