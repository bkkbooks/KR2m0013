body:
  text: 兵部職方清吏司關禁一邊關給票順治十一年題準出關印票令霸昌道察驗分給每季将人數造冊報部十三年題準盛京貿易民人府州縣給發印票出山海關之外藩䝉古人員理藩院咨部取票給發十五年題準旗人出關該都統咨部給票採木人工部咨部給票十八年題準宗室差人徃候外藩公主及結婚等事由禮部題明咨部給票康熙元年題準各關口出入人等須按名驗票察對年貌籍貫注冊放行将出口人數花名造册按季送部察覈又題準王府屬下至民人等有願出古北口燒炭者由部給發印票又題準給票出關採伐材木者限一年繳換砍柴燒炭者限六月繳換逾限者送工部察議又題準願徃古北口石塘路潮河川墻子路南冶口二道關外砍柴燒炭者據工部咨文給票十一年題準私給外國接壤邊口印票者革職拏問其餘邊口私給印票者革職十八年題準潘家口桃林口聴旗民採木外其潮河川墻子路南冶口二道關等處有願徃採伐材木者将人畜數目呈報工部咨部給票亦準出關十九年題準願出龍井口採木者亦照例給發關票三十年題準直𨽻各省州縣若有徃盛京貿易者各該府州縣官問明於某年月日去某年月日回開明印文給與本人令其貿易行令山海關守門滿漢各官察驗該府州縣印文放出如無印文不準出關若有違限月日亦不準貿易即行逐回三十三年題準商人出董家口鐵門關採木亦準給票三十四年覆準内地民人不許在邊外居住如有私出邊外居住者察出將守口旗員一并嚴加治罪四十年諭近來䝉古賊盗盡息沿邊地方百姓如有偷盗口外䝉古牲畜者著交與兵部行文沿邊地方各官嚴行禁止若百姓仍照前偷竊發覺之時務将地方各官一并從重治罪欽此又覆準凡砍木燒炭之人工部咨部給票定以限期採木者限一年繳換燒炭者限六月繳換又每人由部給小票一張以備口外盤察又造人數年貌清册發守關口官逐名㸃騐守關口官仍令票頭将部給小票並年貌册内均挂明字號始行放出限滿進口仍令票頭将所領之人率齊到口該守關口官照册騐票相符按名銷號然後放入票内之人如有逃盗罪坐票頭在外病故者準票頭禀明守關口官存案其詐稱病故者事發将票頭一并從重治罪守關口官不行詳察有溷冒放出及遺留在外之匪類不行察拏者降一級調用加級紀録不準抵銷如口外莊頭恃勢容留匪類事發治罪五十一年覆準盛京黒龍江等處官兵及閒散來京人等均令由山海關行走進口時詳記人數姓名回時仍照原進口所記之名察對放行外其盛京吉林黒龍江各處人等有來京買人者具呈該将軍衙門該将軍給以咨部印文準其買人出關時仍令山海總管等將從京城買去之人數詳察報部如有拐騙别故即拏送該部察議若無别故或繫印文所買或繫白契所買男婦每名納稅銀五兩幼童幼女每名納稅銀三兩将納稅人數確驗明白移咨該将軍照咨逐一詳加察詢如有誆騙誘買别故将人一并觧送刑部嚴審具題再将軍等所屬地方有買人賣人者亦皆察詢明白收稅準買收過稅銀數目年終彚報該部交與盛京户部察覈有自京城徃盛京黒龍江等處者仍照例起票至山海關令總管騐票並詢明前徃何處别給咨文仍令各該處地方官驗文呈報如數目舛錯送部察議自京領票出山海關人等回時令山海關總管仍照出口數目察明放入數目舛錯者亦令報部察議再徃吉林黒龍江去者由喜峯口冷口亦可行走凡所買之人不準出此二口如有誆騙之人設法携帶出口嚴責各該衙門管轄番役旗員等不時察拏又覆準古北口至山海關除堵塞關口外見存外九門邊口凡買去之人不準放行令該部行文嚴行禁止山海關行走旗人甚多侍衛官員前鋒䕶軍當差驍騎人等徃盛京吉林黒龍江等處與祖父上墳探親般取家眷人等或有将誘買之人買去雜入役從内帶至彼處轉賣者亦未可定嗣後八旗官兵及閒散人等前徃盛京吉林黒龍江等處所屬地方者繫侍衛令領侍衛内大臣将役從人等逐一騐明令其領取部票前徃繫前鋒䕶軍令前鋒統領䕶軍統領繫驍騎校領催驍騎閒散人等令都統副都統均逐一驗明令其領取部票前徃如有将此等人隠漏多行夾帶者各該管大臣題叅交部治罪雍正二年覆準採辦官用木植該撫将所屬採木商人給以執照開明何項應用數目若干知照守關口官存票備案四年覆準旗人商民有進威逺堡法庫等處邊口者呈明該管官給與印照守關口官驗照放行如給照驗照之官稽遲勒索者皆降二級調用需索財物及賄縱無照人進口者皆革職提問若所屬人等勒索財物照衙役犯贓例議處至無照人私行進口守關口官不察拏者降一級調用加級紀録不準抵銷五年議準出兵種地坐臺人員如遣人進京呈明該将軍並管理種地驛站官給發印照守關口官驗照注册令其進口按季造册報部如無印照拏觧刑部治罪倘不實力稽察聴其入口守關口官降一級調用加級紀録不準抵銷又覆準奉天吉林黒龍江山海關及凡有邊口地方每年将出口人數按季造册申報取具並無匪類出口印甘各結倘守關口官不驗明印票及受賄任其䝉溷出入經該管官察出即行詳報該将軍督撫提鎮題叅交刑部嚴加治罪若該将軍督撫提鎮通同狥庇不嚴察叅處以致匪類越境生事發覺日皆照狥庇失察例分别議處乾隆七年議準關口鎖鑰責成旗員専管若将無票私出之人不行察拏該守關口官降一級調用加級紀録不準抵銷關口直班兵丁鞭八十無票之人冒入别夥出口或潛行偷越及私帶人出口者皆鞭一百若放出私販人口者守關口官革職兵丁加一等治罪受賄縱放者守關口官革職計贓以枉法論兵丁以衙役枉法犯贓從重治罪皆遇赦不宥如旗人将民人詐稱旗人託名入口者旗人鞭八十民責三十板又議準奉天等處與朝鮮接壤地方如有在朝鮮境界漁採或沿海蓋房居住及無票出口越境生事者該地方防守官弁明知故縱不行察拏該管城守尉等官揭報該将軍題叅将防守官弁革職提問倘通同狥庇不行揭報題叅者該管城守尉等官降三級調用該将軍副都統降二級調用若繫私行越渡該地方防守官弁失於覺察拏獲之日審明由何處出口将該處防守官弁降四級調用該管城守尉等官降一級調用該将軍副都統罰俸一年又議準山東民有徃奉天傭工者該州縣詢明姓名年貌籍貫給與印票前徃守關口官察對印票年貌相符準其入口回時該地方官扵原領票内鈐印令其帶回本地方察覈如傭工人等並無印票或與票内年貌不符及兵役人等刁難勒索者守關口官自行察出免議如有踈縱等情降二級調用九年奏準興京開原遼陽三城該将軍委協領一人前徃廵察鳯凰城邊門熊岳副都統委協領一人廵察盛京近海之牛莊蓋州熊岳金州旅順岫巖鳯凰城等處該将軍三年廵察一次十年議準官商有私立小票逺接刨採私參之人至寧古塔貨賣廵察官未經拏獲者降三級調用知情故縱者革職給票官亦照此例議處十四年議準察哈爾八旗牧場等處官兵容留無票民人者察出照容隠例議處繫官降二級調用兵鞭九十隣近䝉古知而不首者亦照此例處分至看守官兵出具並無無票民人私行煎鹻刨掘物件甘結該總管鈐印轉報後有别經發覺者看守官降二級調用兵鞭九十轉報之總管罰俸一年如總管等自行察出拏獲者免議又議準察哈爾總管委出官兵移駐産鹻地方随時廵察其牛羊羣捕盗官兵仍令訪緝牧場盗賊該總管等各按所轄地方每年酌定親徃稽察遇有逰民竊馬盗鹻等事将看守官兵照窩隠逃人例議處總管等失察别經發覺者照約束不嚴例降一級調用一譏察禁物順治初年定朝鮮國人私帶硝黄等違禁之物守關口官捜獲即行報部交與禮部察議若縱令私帶者革職提問失察者革職該管上司降五級調用該将軍副都統降三級留任倘已經捜獲不即報部私帶之人赴部出首後始行報部者守關口官罰俸六月雍正二年議準山海關及奉天吉林等處廵踪官兵除搜獲參鬚參末細小歪斜珠子以及為數無多者毋庸給賞外如一年内捜獲人參至二十斤珠子至四両者該管官紀錄一次廵察人等共賞銀二十兩捜獲人參至四十斤珠子至八兩者該管官紀録二次該将軍副都統紀錄一次廵察人等共賞銀四十兩捜獲人參至六十斤珠子至十二兩者該管官紀錄三次廵察人等共賞銀六十兩捜獲人參至八十斤珠子至十六兩者該管官加一級将軍副都統紀録二次廵察人等共賞銀八十兩再有多獲者照數加賞移咨户部給發如捜察不力以致私帶過關進口者該管官降三級調用廵察人等鞭八十明知故縱者該管官革職廵察人等鞭一百枷一月賄縱者計贓以枉法論從重治罪該将軍副都統察出叅奏者免議狥庇不叅者降二級調用如失扵覺察計人參至四十斤珠子至八兩者将軍副都統罰俸六月人參至八十斤珠子至十六兩者將軍副都統罰俸一年若人參至百斤珠子至二十兩以上者将軍副都統降一級留任七年覆準張家口獨石口出入人等各旗員驗票盤察如有失察私帶違禁之物責在旗員營弁免其處分九年議準沿邊關隘守關口官遇有廢鐵鐵貨潛出邊境貨賣者立即拏究如狥縱出口者革職賄縱者革職提問其鐵鍋農器準其前徃黒龍江等處貿易若商民在内地轉相貨賣關津兵弁借端勒索財物者計贓治罪乾隆七年議凖䝉古進口守關口官兵察明人數軍器數目注册出口時察對原册多帶者不許放出其喀爾喀厄魯特及各扎薩克等如有新編佐領初次置買軍器或将年久破損軍器修補者該扎薩克開明所買軍器數目出具印結呈送理藩院察覈如為數過多或繫全副者具奏請㫖再令購買如所買無多繫尋常帶去應用者咨部給票該守關官驗明部票放行若比票内多帶或與原進口之數目多帶者報明理藩院議處其官員民人将軍器賣給䝉古及守口官兵知情故縱者皆交刑部治罪不知情放出者守關口官革職該管上司降五級調用将軍都統副都統降三級留任又議準硝黄牛角鋼鐵等物及各項軍器不許賣與鄂羅斯厄魯特回子如有私賣偷出邊口不行嚴拏該管官及兵役知情故縱者皆交刑部治罪不知情者守關口官革職該管上司降五級調用将軍都統副都統降三級留任其八旗察哈爾歸化城䝉古人等若将軍器偷賣者該管官亦照此例議處十二年奏準有容留偷刨人參之犯或為接濟米糧者經族長鄉長等拏獲之日将被獲人所有之物賞給外計其所獲人數酌量動支紅票銀二三兩優賞其稽察之官即令守斥堠官並採捕貢貂人等稽察不必委官前徃又議準採捕人役将採捕之物隠蔵私帯者頭領及翼長罰俸一月一互市順治年定青海䝉古貿易在西寜洪水二處康熙十一年議準青海䝉古在鎮海堡北川二門各委頭目貿易每次不得過二百人其因祈禳等事在内地寺廟誦經者止許百人以内按數令頭目管轄百人以外不許進邊又題準䝉古擅進内地搶掠牲畜者専汛官罰俸一年兼轄官罰俸六月有搶掠殺人者専汛官革職兼轄官降二級調用總兵官降二級提督降一級皆戴罪圖功十二年題準外國人私行進口該地方官不察報者降一級調用該管上司罰俸一年又題準外國不論畜髮與否均不許擅進邊口違者守邊官弁皆從重治罪二十三年題準喀爾喀厄魯特貢使來京從各該旗汛地經過者守汛官即委官二人兵五名按次䕶送交與張家口官回時張家口委官一人兵五名䕶送出界如貢使回時有在張家口貿易者事畢守口官速催起身各汛仍照前按次送出汛地如無故淹留将守邊口官議處若貢使在歸化城貿易歸化城土黙特二旗亦照例委官二人兵五名按次逓送出汛違者議處五十九年議準澤卜尊丹巴胡圖克圖庫倫地方鄂羅斯與喀爾喀互相貿易民人叢聚難以稽察嗣後内地民人有徃喀爾喀庫倫貿易者令該管官出具印文開明貨物人數報理藩院給與執照出何邊口令守口官弁驗照放行如帶軍器禁物立即察拏送部治罪雍正二年奏準朝鮮國人每年携帶貨物到中江貿易時有将内地禁止之物私行貨賣者監收税課之鳯凰城城守尉及将軍委出之協領等官知情故縱者革職提問不知情者革職失察之将軍副都統降三級留任十三年議準青海䝉古人貿易不準在洪水鎮海堡等處令其在丹噶爾設市每次不得過二百人或有喜䘮煎茶誦經等事進邊亦不得過百人令該扎薩克呈明辦理青海夷情事務大臣察覈給與印票守口官弁騐票始準行走回日繳銷如䝉古有擅自進邊者該辦理夷情事務大臣視其事酌量辦理報明理藩院察覈乾隆四年議準準噶爾貿易照鄂羅斯三年後貿易一次之例扵子辰申年至肅州貿易先将貨物起程及何時可至邊界之處豫報駐邊大臣轉奏理藩院豫委司官筆帖式馳驛前徃㑹同地方官監看十四年議準民人徃察哈爾等處貿易令多倫諾爾獨石口張家口等處同知驗明人數給以印票並将年貌姓名車數詳載於册以便回日覈對如有不領票私徃者照偷渡關津例治罪海禁一海外耕種之禁康熙十一年題準居住海島民人槩令遷移内地以防藏聚接濟姦匪之弊有仍在此等海島築室居住耕種者照違禁貨物出洋治罪汛守官弁照例分别議處雍正七年議準臺灣繫海外地方防範更宜嚴密南路北路一帶山口生番熟番分界勒石界以外聴生番採捕如民人越界墾地搭寮抽藤弔鹿及私挾貨物擅出界外者失察之該管官降一級調用該上司罰俸一年若有賄縱情弊該管官革職計贓治罪如三年之内民番相安無事将該管官紀録一次社甲兵丁人等該督撫酌加奨賞乾隆九年諭外省武職各官不許在任所置立産業例有明禁在内地且然况海外民番交錯之地武職置立莊田墾種收利縱無占奪民産之事而家丁佃户倚勢凌人生事滋擾勢所不免朕聞臺灣地方從前地廣人稀土泉豐足武職大員無不創立莊産召佃開墾以為已業且有客民侵占番地彼此争競遂投獻武職因而踞為已有者亦有接受前官之産相習以為固然者其中来厯總不分明是以民番互控之案絡繹不休若非徹底清釐終非寧輯番民之道著該督撫将厯任武職大員創立莊産逐一察覈果無侵占番地及與民番並無争控之案者無論本人子孫及轉售他人均令照舊管業若有侵占民番地界之處秉公清出民業歸民番地歸番不許仍前朦溷以啟爭端此後臺灣武職大小各官創立莊産開墾草地永行禁止倘有托名開墾者将本官交部嚴加議處地畝八官該管官通同容隠並行議處欽此一海船製造之禁順治十二年題準海船除給有執照許令出洋外若官民人等擅造兩桅以上大船将違禁貨物出洋販徃番國並潛通海賊同謀結聚及為嚮𨗳劫掠良民或造成大船圖利賣與番國或将大船賃與出洋之人分取番人貨物者皆交刑部分别治罪至單桅小船準民人領給執照於沿海近處捕魚取薪營汛官兵不許擾累康熙四十二年議準出洋貿易商船許用雙桅梁頭不得過一丈八尺如一丈八尺梁頭連兩披水溝統算有三丈者許用舵水八十人一丈六七尺梁頭連兩披水溝統算有二丈七八尺者許用舵水七十人一丈四五尺梁頭連兩披水溝統算有二丈五六尺者許用舵水六十人若舵水越數多帶或詭名頂替守口官弁盤察不出者降三級調用借端勒索者降二級調用受賄者革職計贓治罪若兵有需索情弊該管官照衙役犯贓例議處又議準漁船梁頭不得過一丈舵水不得過二十人取魚不許越出本省境界欲造船者先報明地方官取澳甲里族各長並隣右保結方準成造完日地方官親驗将船身烙號刋名舵水人等取具船户保結然後給照照内将在船之人年貌籍貫分晰填明四十六年議準福建漁船桅聴其用雙用單各省漁船止許單桅欲出洋者将十船編為一甲取具一船為匪餘船並坐連環保結若船主在籍而船出洋生事者罪坐船主五十年議準商漁船給發執照繫州縣専責如營官擅給執照者降二級調用倘借執照為匪将擅給執照之營官革職五十九年議準出洋商船初造時先報明海關監督並地方官該地方官確訪果繫殷實良民取具澳甲里族各長並隣右保結方準成造完日地方官親驗梁頭並無過限舵水並無多帶取具船户不得租與匪人甘結将船身烙號刋名然後給照照内将在船之人年貌籍貫分晰填明及船户攬載開放時海關監督將原報船身丈尺驗明取具舵水連環互結客商必帶有資本貨物舵水必詢有家口来由方許在船監督驗明之後即将船身丈尺客商姓名人數載貨前徃某處情由及開行日期填入船照雍正元年題準出海商漁船自船頭起至鹿耳梁頭止大桅上截一半各照省分油餙江南用青油漆飾白色鈎字浙江用白油漆飾緑色鉤字福建用緑油漆飾紅色鉤字廣東用紅油漆飾青色鉤字船頭兩披刋刻某省某州縣某字某號字様沿海汛口及廵哨官弁凡遇商漁船驗繫照依各本省油飾刋刻字號者即繫民船當即放行如無油飾刋刻字號即繫匪船拘留究訊三年議準西洋人附居廣東澳門共有大小二十五船地方官編列號數刋刻印烙各給執照一紙将船户舵水及商販夷人該管頭目姓名填注照内即以此二十五船為定額不許増置若實繫朽壊不堪修補呈明地方官察驗取具印甘各結申報督撫準其補造仍用原編字號又覆準廣東漁船梁頭不得過五尺舵水不得過五人九年議準商漁船篷上大書州縣船户姓名每字大各徑尺藍布篷用石灰細麪以桐油調書篾篷白布篷用濃墨書黒油分抹字上不許糢糊縮小又奏準商漁船桅披照省分漆飾及篷上書姓名原為稽察姦匪若官弁怠惰偷安不稽察者革職兼轄統轄官不揭報者降二級調用不行題叅之總兵官罰俸一年提督罰俸六月十一年議準徃販外洋商船準用頭巾插花並所樹桅尖其内洋商船及漁船不許用頭巾插花桅尖如違例私用守口官弁不行察報者罰俸一年一出入海洋之禁康熙二十三年題準海氛既靖山東江南浙江廣東各海口除夾帶違禁貨物仍照例治罪外商民人等有欲出洋貿易者呈明地方官登記姓名取具保結給發執照将船身烙號刋名令守口官弁察驗準其出入貿易五十六年覆準商船準在沿海省分及東洋貿易外其南洋之呂宋噶喇巴等處不許前徃皆在南澳等地方稽察截住令廣東水師各營盤緝違者治罪其外國夾板船照舊準其貿易地方官嚴加防範不許生事又覆準渡海人民必由地方官給照守口官弁察驗放行若無照偷渡者嚴行禁止如有廵哨船私帶偷渡者将該管専轄官議處六十一年議準商漁船被風飄至朝鮮如領有執照者該國王照例送回若匪類並無執照私自前徃生事者許該國王緝拏照該國法審擬咨禮部具題請㫖行文該國王於彼處完結仍報部存案並究明由何處出口将失察守口官弁降四級調用該管上司降一級留任提鎮罰俸一年如守口官弁知情故縱者革職提問不揭報之該管上司降三級調用不題叅之提鎮降二級調用雍正三年奉㫖無照民人夾帶船内偷渡者發覺之日将該管督提一并議處五年覆準福建户口殷繁閭閻生計不得不借貿易之盈餘佐耕耘之不足開洋既有益扵百姓且防範嚴密復不致稍有踈虞南洋諸國準令福建商船前徃貿易又覆準廣東地狹民稠照福建之例準徃南洋貿易又議準山東邊海除外来商船各照彼省執照察驗外其登莱二府民人前徃奉天貿易及奉天等處民人有赴山東貿易者入口出口該州縣均給執照将客商船户姓名貨物徃販地方一一填注守口官弁挂號驗照放行若並不稽察或有勒索擾累者照例議處六年議準出洋商船扵出口之處将執照呈守口官弁驗眀挂號填注出口月日放行造册詳報督撫該督撫於每年四月内造册報部回時扵入口處守口官弁将照與船比對相符詳報督撫銷號該督撫扵每年九月内造册報部如出洋人回而船不回大船出而小船回及出口人多而進口人少者該督撫嚴加訊究果繫番欠未清竢來年六七月間乘風駕回其被風飄徃别省者船户取具彼處地方官印結齎回呈驗遭風覆溺者若有餘存之人及同行隣船客商舵水等即訊取確供保結再加地方官印結詳報均扵入口册内聲明報部免其訊究倘留番清欠之船来年仍不駕回揑報遭風飄溺等弊並無彼處地方官印結及餘存之人隣船客商舵水甘結者該督撫嚴察治罪原出結地方官交部議處又議準商船在各省沿海貿易者於出口之處将船照呈守口官弁驗明挂號經過之處於要汛驗明挂號入口之處由守口官弁驗明回櫂之日仍從各原處覆驗挂號而回七年覆準江南浙江商民準照福建商民徃南洋貿易其前徃南洋必經由福建所有商船姓名數目該督撫先期知㑹福建總督轉飭守口官弁察驗放行回櫂之日仍由福建總督知㑹江浙互相稽察又議準福建商船值漁期欲出海取魚者赴地方官呈明換領漁照取具澳甲里族各長並隣右保結同船連環互結準其入海取魚竢魚期過後将漁照繳銷仍換給商照該地方官将換給船照縁由彚報上司存案如過期不歸即行察究永不許出海取魚十二年議準商人置貨出洋必在本籍地方取結給照以防偷越及夾帶違禁貨物之弊其中有小本商人領照而徃迨從外番回至内地到各處發賣貨物並别置貨物趕回因風信屆期又應放櫂不䏻奔回本籍地方請照在福建者準呈明厦防㕔在廣東者呈明南海縣在浙江者呈明乍浦海防㕔各取具行户船户保結給與執照前徃該㕔縣将給照縁由行知該商本籍地方官備案該商回櫂之日各赴請照衙門繳銷如該船舵水客商有在番地交易未清及别項事故原給照衙門取具回行隣船客商舵水甘結移行該商本籍地方官存案下期回日驗銷又議準商船於出口之際舵水遇有事故該船户就近招募取具保結由守口官弁批發執照準其頂補又議準民人偷渡外洋該汛官弁拏獲十名以上者専管官紀録一次兼轄官毋庸議敘兵各賞銀二兩二十名以上者専管官紀録二次兼轄官紀録一次兵各賞銀四兩三十名以上者専管官加一級兼轄官紀録二次兵各賞銀六兩四十名以上者専管官加二級兼轄官紀録三次兵各賞銀八兩五十名以上者専管官以應升之官即用兼轄官加一級兵各賞銀十兩賞銀即於船户名下追給倘不實力稽察致踈縱十名以上者専管官罰俸一年兼轄官免議兵各責二十板二十名以上者専管官降一級留任兼轄官罰俸六月兵各責三十板三十名以上者専管官降二級留任兼轄官罰俸一年兵各責四十板四十名以上者専管官降三級留任兼轄官降一級留任兵各責四十板革糧五十名以上者専管官降一級調用兼轄官降二級留任兵革糧枷一月責四十板其降級留任之人如能拏獲别案偷渡按其所獲名數抵銷若三年内稽察嚴密汛内肅清該督撫提鎮題請開復又議準洋船偷渡民人每在初出洋面之際福建海船挂驗出口之時該汛官弁押交大担汛轉交浯嶼汛撥船押送東椗以外洋面竢其乘風放洋後方許回汛廣東海船挂騐出口之時該汛官弁押交虎門協撥船押送外洋洋面竢其乘風放洋後方許回汛浙江乍浦海船出口即繫大洋寧港海船由鄞縣盤察至蛟門即繫大洋普陀海船由定海盤察至旗頭即繫大洋毋庸撥船押送乾隆元年奏準漁船出口入口守口官弁騐明船照準其出入如盤察不實及借端勒索者降二級調用受賄者革職又議準沿海一應樵採及内河通海之各色小船均報明地方官取澳甲隣右保結編烙船號姓名給照遇晚必停泊人家塘汛處所倘船被賊押坐出洋立即報官将船號姓名移知營汛緝究若租船與人必報明本處澳甲出結報官存案其呈報行船遭風者騐明人夥有無落水受傷必有實據方準銷號其出口入口止赴就近守口官弁挂號稽察不必豫定處所日期或風信不齊進口愆期者取具結狀存案如盤察不實及借端勒索者照漁船例議處三年覆準沿海樵採小船每船許帶食鍋一口所需斧斤每人許帶一把在船人數不得過十名均扵照内注明出入察騐不得越數多帶及進口時故意闕少四年議準内地民人出洋貿易違禁買回番仔人口守口官弁稽察不力者照外國之人私自進口不報例降一級調用該管上司罰俸一年如知情故縱者革職賄縱者革職治罪六年奏準拏獲偷渡民人隠匿不報者官革職兵責四十板革糧賄縱者官革職兵革糧皆治罪又奏準拏獲偷渡之人訊明從何處開船将該守口官弁照踈縱偷渡外洋例按人數分别議處拏獲者照拏獲偷渡外洋例按人數分别議敘若弁兵因公差委所乘船将無照之人偷載專管官知情者革職提問不知情者革職兼轄統轄官不揭報題叅者皆照不揭報劣員例議處又議準噶喇巴番目因出洋不歸留住彼地之漢人在番滋事遂至戕害雖恐擾及商船宜禁止貿易但賀蘭國王責其太過已将鎮守夷目更換再三安慰商船照舊生理則該番原未擾及商客應令南洋照舊貿易其中有至暹羅柔佛等國者亦準徃來至南洋諸國米多價賤回櫂或買米壓載入口餘剩或並未買米載回均聴從商便其商船徃販諸番自宜定限應以三年為限逾期不歸将舵工水手人等不許再行出洋其外洋汛地如有停泊洋船察騐船照有經閲多年者勒令入口交地方官察訊詳究七年覆準商船在扵内地沿海省分貿易者以二年為限二年之後始歸者嗣後不許再出口徃販外洋者以三年為限逾限不歸者該商及舵水人等勒還原籍永逺不許出口其外洋停泊船察驗船照已閲多年者勒令入口交地方官訊究詳察十一年奏準奉天南面均繫海疆金復雄蓋等處地方與山東登萊兩府對峙商船不時來徃私載民人勢不䏻免必須立法稽察凡帶有無照之人来奉天者商貨仍聴起運外其照上無名之人察出逓觧回籍船户治以夾帶私人之罪不必逓觧船亦免其入官十三年議準民人偷渡兵在外洋拏獲者仍照例分别給賞如偷渡船尚在沿海口岸兵於本管界内拏獲原繫分内之事無庸賞給若将别汛沿海口岸偷渡民人盤察擒獲者照外洋拏獲例減半賞給但不得因有賞銀将沿海口岸不應盤察之船借端需索滋擾十九年議準康熙五十六年禁止商船不許出洋貿易其私行前徃者皆違禁偷越之人是以定例不準回籍自雍正五年洋禁既開凡商船之在洋逾限未歸者或因貨物未清守候愆期原與違禁偷越者不同若竟不準回籍情屬可憫嗣後有實因貿易稽留在外今願回籍或本身已故遺留妻妾子女願回籍者均準其附船回籍令船户出具保結於進口時報明該管官令歸本籍安插携回貲財地方官不得藉端需索至無賴之徒原繫偷渡番國潛住多年充當甲必丹供番人役使及本無貲本流落番地哄誘外洋婦女娶妻生子迨至無以為生復圖就食内地以肆招揺誘騙之計者仍照例嚴行稽察該督撫随時酌量辦理又議準出洋貿易商船皆挾貲求利素非為匪且内地各有妻孥産業原未肯輕棄家鄉止因海洋風信靡常商欠取討匪易又或疾病難歸棲身番地或在船充當舵水遭風流落凡此皆繫欲歸不得並非有意淹留見在開洋貿易之民源源不絶而因事躭延者亦頻年有之從前出洋回籍原無定限迨後定以三年倘稍逾限即不得返歸故土似非一體同仁之意嗣後出洋貿易者無論年分久近槩準回籍若本身已故遺留妻妾子女亦準回籍責成帶回之船户出具保結存案仍令該督撫於沿海口岸地方出示明白曉諭令其不必遲廻觀望其携回貲財有不肖官役藉端擾累需索者即嚴行叅處一貨物出洋之禁康熙二十三年覆準熖硝硫黄軍器樟板等物違禁私載出洋接濟姦匪者照例治罪該管汛口文武官弁盤察不實者革職知情賄縱者革職提問兼轄官降四級調用統轄官降二級留任提督降一級留任四十七年覆準出洋船所帶食米不得過五十石如多帶出洋販賣者照例治罪将米入官五十六年覆準出洋船按道里逺近人數多寡停泊發貨日期每人一日準帶食米一升並帶餘米一升以防風信阻滯出口時守口官弁逐一驗明放行不許借端需索又覆準臺灣産米不許私運出洋販賣至漳泉厦門等處米少價貴有船從臺灣帶米至該處者準其照時價糶賣六十一年覆準外洋番國進貢順帶貨物願自出夫力帶來京城貿易者聴如欲在彼處貿易該督撫委㢘能官監看貿易完日造册報部如貢船到岸未曽報官盤驗先行售賣及内地民人為外國收賣違禁貨物者皆照例治罪至不繫進貢之船有裝載貨物前來貿易者照例投行納稅聴其貿易回櫂之日不許收買違禁貨物雍正三年議準附居廣東澳門之西洋人所有出洋商船每年出口時将照赴沿海該管營汛挂號守口官弁将船號人數姓名逐一驗明申報督撫存案如出口夾帶違禁貨物並将中國之人偷載出洋守口官弁狥情踈縱者革職至入口之時亦将船號人數姓名逐一驗明申報督撫存案除頭目過有事故由該國發來更換者準其更換外其無故前來者不許夾帶入口及容留居住若稽察不到将守口及地方該管各官照失察例議處又覆準福建産米無多徃販外番船酌定帶回米以資民食徃暹羅者大船帶米三百石中船帶米二百石噶喇巴大船帶米二百五十石中船帶米二百石吕宋東埔寨馬辰柔桑四處大船各帶米二百石中船各帶米百石仔六坤安南宋居朥丁家盧宿霧蘇禄七處中船各帶米百石於入口時将數目驗明若有多餘一并造報均聴照時價發賣如不足數及有偷漏情弊照接濟姦匪例治罪又覆準外洋行走之船動經數月鐵釘油灰㯶絲黄麻等物準酌量携帶於照内填注數目以備察驗如有動用同船之人出具甘結存案倘有借端多帶者照例治罪七年覆準出洋船食米若於酌定數目之外多帶售賣或實繫接濟姦匪或止繫圗利察出将米入官賣米之人分别治罪守口官弁隠諱不報者革職如受賄故縱革職治罪九年奉㫖鐵器不許出洋貨賣律有明禁乃聞粤東出産鐵鍋凡洋船貨賣向未禁止夷船出口每船所買鐵鍋少者百連至二三百連不等多者買至五百連並有至千連者每連約重二十斤不等五百連約重萬斤千連約重二萬斤計算每年出洋之鐵為數甚多誠有關繫嗣後鐵鍋應照廢鐵之例一槩嚴禁無論漢夷商船均不許貨賣出洋違者照捆載廢鐵出洋之例治罪官役通同狥縱亦照狥縱廢鐵例議處凡遇洋船出口仍交與海關監督一例稽察至於商船每日煮食之鍋仍照舊置用官役不得借端勒索滋擾倘地方官弁視為具文奉行不力經朕訪聞或别經發覺定行從重議處各省洋船出口之處均令一體遵行永著為例又覆準一切廢鐵除内地販賣聴從民便無庸禁止如有将廢鐵潛出邊境及海洋貨賣立即拏究照例治罪該管官知情故縱者革職受賄者革職提問乾隆元年覆準米榖偷運出洋及在洋接濟姦匪該管文武官弁除通同受賄知情故縱仍照律治罪外如繫失察偷運米百石以上榖二百石以上者降一級留任米百石以下榖二百石以下者罰俸一年米不及十石榖不及二十石者罰俸六月二年覆準洋船換買錢若數目過多恐有販銷之弊令守口官弁實力稽察如有姦商圖利多載錢出洋者即拏治罪十三年覆準雜糧麥豆偷運出洋除接濟姦匪者與米一例科㫁外若止繫圖利計所運數目照二榖一米之例減等問擬至官弁受賄故縱及失察處分仍照米榖例行十四年覆準紅黄銅器及銅私販出洋貨賣者分别首從治罪銅及銅器並船均入官守口官弁知情故縱者革職受賄者革職提問失察者降一級調用一軍器出洋之禁雍正六年覆準商船漁船不許携帶槍礟器械至徃販東洋南洋之大船原與近洋不同準其携帶鳥槍不得過八腰刀不得過十弓箭不得過十副火藥不得過二十斤洋商投行買貨即同牙人将應帶軍器數目呈明海關給票照數製造鏨書姓名號數完日報官㸃驗填入照内守口官弁驗明放行回日如有短少即行訊究果繫遺失取通船甘結存案八年覆準徃販東洋南洋之大船準携帶之礟每船不得過二位火藥不得過三十斤造礟時呈明地方官給與印票赴官局製造完日地方官親驗鏨鑿某縣某人姓名某年月日製造字様仍於照内注明所帶之礟輕重大小以備海關及守口官弁察驗回日繳官貯庫開船再行請領倘本船遭風礟致沉失即於所在地方官報明免其治罪如其船無恙妄稱沉失者即行訊究若商船内買有外番紅銅礟許其帶回交地方官給與時價以充鼓鑄之用一沿海弁兵之禁雍正九年議準商船在洋遭風落淺廵哨汛守兵丁不為救䕶轉搶奪財物拆毁其船以致商人斃命或未致斃命皆照例分别首從治罪在船該管官弁如同謀搶奪雖兵丁為首該貟亦照為首例治罪雖不同謀但分贓者照為從例治罪實繫不能約束並無通同分肥情弊者革職若遭風被淹商人救援得生兵丁因而撈取財物者坐贓治罪該管官鈐束不嚴降二級留任其商人淹斃在先見繫飄沒無主船貨因而撈搶入已不報者亦坐贓治罪如見船覆溺因不許搶奪撈取財物阻撓不救以致商人斃命者阻救之人繫官革職兵革糧皆分别首從治罪至沿海汛口弁兵極力救護遭風人船不私取絲毫財物者該管官據實申報督撫提鎮記功遇有水師千把總員闕拔補其守備以上各官救護船二次者紀録一次倘弁兵内因救護人船或受傷被溺該督撫提鎮保題照因公差委弁兵受傷被溺例給與䘏典十年議準臺灣海外重地文武官弁必互相稽察若有貪酷乖張以致起釁生事者如繫武職游守以下等官将不揭報之副將叅將降三級調用不題叅之總兵官降二級調用不告知督撫之文職降一級留任如繫文職同知以下䓁官將不揭報之道府降三級調用不告知督撫之武職降一級留任乾隆五年議準沿海守口官弁察驗挂號之處不許借端需索故意留難如有此等情弊即行題叅將守口官弁降二級調用督撫提鎮失於覺察者罰俸一年若兵有需索留難將兵計贓治罪守口官弁照失察衙役犯贓例議處欽定大清㑹典則例卷一百十四
