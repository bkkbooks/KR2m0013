  text: 欽定四庫全書欽定大清會典則例卷七十七
  hash: sha256:4e30d8d44181010213b299e55ea82ef27ad0eafab384e1ad3aade7683ed7fa4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_080-1a, image: WYG0622/WYG0622-0475c.png}
body:
  text: 禮部祠祭清吏司升配一列聖升配順治五年冬日至恭奉太祖高皇帝配饗圜丘前期遣官各一人祗告天地宗社至日世祖章皇帝恭奉神牌奉安於第一成上帝幄左旁青幄跪安畢興至香案前行一跪三拜禮復位乃行大祀禮神位前上香奠帛進俎三獻均與上帝位前同十四年諭禮莫重於事天孝莫大於尊親朕纘承鴻緒恪修祀典郊祀皆奉太祖武皇帝配饗今思太祖受命上天肇興帝業太宗繼志述事丕振皇猷功徳並隆咸宜崇祀以後冬至祈榖祭天均奉太宗同太祖配饗夏至祭地均奉太祖太宗配饗著為定例其應行儀節爾部卽詳議具奏欽此遵旨議準配饗事宜今夏至在邇冬至尚遠肇舉配饗之典先方澤而後圜丘於序少紊若竢冬至太宗配天之後明歲舉行方澤配饗禮為期太逺應不竢冬至夏至令恭製太祖太宗神牌及寶座几案擇吉先行太宗配饗圜丘祈榖之禮隨行太祖太宗配饗方澤之禮前期遣官祗告天地宗社屆期恭奉神牌配饗圜丘方澤大饗殿一切禮儀均如南北郊儀大禮告成布告天下是年正月上辛祈榖奉太祖高皇帝配饗世祖章皇帝恭奉神牌由大饗殿左門入奉安於上帝位左旁寶座一應禮儀均與五年升配圜丘禮同是年三月奉太宗文皇帝配饗圜丘並大饗殿祀日世祖章皇帝先詣圜丘奉安神牌於上帝幄之右旁青幄禮成詣大饗殿恭奉神牌奉安於上帝位右旁寶座一應禮儀均與恭奉太祖高皇帝配饗禮同是年夏至奉太祖高皇帝太宗文皇帝配饗方澤祭日世祖章皇帝恭奉神牌奉安於皇地祇幄旁東西配位黄幄一應禮儀與升配圜丘同康熈六年諭朕惟自古帝王建極綏猷保民圖治莫不以懋昭先徳祗盡孝誠為務朕纘承丕基躬親庶政恭惟世祖章皇帝功徳兼隆當崇配饗是用上稽前典下協輿情謹告天地宗社率諸王貝勒文武羣臣於康熙六年十一月七日冬至大祀天於圜丘奉世祖章皇帝配饗欽此祀日聖祖仁皇帝恭奉神牌奉安於上帝幄之左旁太祖高皇帝之次第二青幄一應禮儀均與順治十四年同是年十一月十六日奉世祖章皇帝配饗方澤祭日聖祖仁皇帝恭奉神牌奉安於皇地祇幄之左旁太祖高皇帝之次第二黄幄禮儀與順治十四年同九年正月奉世祖章皇帝配饗大饗殿祀日聖祖仁皇帝恭奉神牌奉安於上帝位之左旁太祖高皇帝之次禮儀與順治十四年同雍正元年九月初五日諭自古祖功宗徳制在不祧饗帝饗親祀應並舉仰惟皇考聖祖仁皇帝六十一年豐功厚澤深洽人心四千餘年哲后賢君難侔歴服朕纘承丕緒永念前徽皇考聖祖仁皇帝允宜崇祀郊壇克配上帝以後冬至祈榖祀天祗奉聖祖仁皇帝同太祖高皇帝太宗文皇帝世祖章皇帝配饗夏至祭地亦如南郊祈榖祗奉配饗其應行禮儀爾部詳議具奏欽此是年冬至大祀天於圜丘奉聖祖仁皇帝配饗前期遣官祗告如常儀祀日世宗憲皇帝恭奉神牌奉安於上帝幄之右旁太宗文皇帝之次第二青幄一應禮儀均與康熙六年同二年正月上辛祈榖恭奉聖祖仁皇帝配饗大饗殿祀日世宗憲皇帝恭奉神牌奉安於上帝位之右旁太宗文皇帝之次禮儀與康熙九年同是年夏至奉聖祖仁皇帝配饗方澤祭日世宗憲皇帝恭奉神牌奉安於皇地祇幄之右旁太宗文皇帝之次第二黄幄禮儀與康熙六年同十三年十一月二十日諭自古聖君哲后為上天篤生以乂安寰宇嘉惠元元功徳之盛侔於造化厥後追崇之典必合天並饗以隆祀典詩載思文之什易垂殷薦之文皇哉大矣仰惟我皇考世宗憲皇帝值重熙累洽之後統御乾綱誕敷膏澤顯承帝命黙契天心殫繼述之孝思裕經綸之要道由是宣之為政教飭之為法紀勵百爾之廉能䘏萬民之疾苦蠲逋賦飭軍威靜桁楊籌水旱勸課農桑砥礪風俗惓惓懇懇心勤宵旰之中而慮周垓埏之表至若隆師重道取士増科文徳著焉輯寧邊塞撫乂蠻陬武烈彰焉洋洋聖謨儼如天語煌煌睿藻煥若天文至治光華格於上下如日月之行運無不照臨如雨露之沾濡無不周溥用能合撰帝載協應蒼穹嘉祥畢集朕惟本天本祖之義尚徳尚功之典我皇考世宗憲皇帝允宜崇祀郊壇克配上帝以昭天眷然必輿情允協衆議僉同嗣後冬至祈榖祀天祗奉世宗憲皇帝同太祖高皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝配饗夏至祭地亦如南郊祈榖禮祗奉配饗所有應行典禮爾部㑹同九卿翰詹科道詳議具奏欽此遵旨議準應於乾隆二年冬至奉世宗憲皇帝配饗圜丘乾隆三年孟春上辛奉世宗憲皇帝配饗大饗殿乾隆三年夏至奉世宗憲皇帝配饗方澤其各壇増設供奉世宗憲皇帝神牌及天壇地壇幄次大饗殿奉安神位寶座並神位前一切陳設器用禮部會同太常寺相度地基詳晰妥議交與工部敬謹製造乾隆元年十二月初九日諭仰惟皇考世宗憲皇帝徳並高深恩覃海宇駿烈鴻功垂裕萬世允宜配饗郊壇永崇禋祀朕思來年三月之吉升祔太廟之後配饗之禮理宜敬謹舉行第其時夏至伊邇冬至尚遥若先奉配方澤恐前後之未協若竢冬至南郊然後舉行又覺時日之久曠敬稽我朝順治十四年三月世祖章皇帝恭奉太宗配饗圜丘翼日配饗方澤康熙六年十一月丁未時屆南郊聖祖仁皇帝恭奉世祖配饗越十日配饗方澤兩朝典制均繫特行禮隆儀備燦垂史册且稽之經傳成周郊祀后稷以配天宗祀文王於明堂以配上帝卽月令所謂季秋大饗帝也召誥載三月丁巳用牲於郊釋者謂非常祀而祭天以告卽位也又宋仁宗皇祐二年以大慶殿為明堂合祭天地三聖並侑一如南郊圜丘之儀則是古來因事南郊之禮不必定在二至之時明矣我朝舊制盡孝盡誠與古符合來年世宗憲皇帝配天大禮宜遵照舉行其應行典禮爾部會同總理事務王大臣内閣九卿敬謹詳議具奏欽此遵旨議準乾隆二年三月初五日世宗憲皇帝升祔太廟後其時夏至伊邇冬至尚遥謹遵兩朝舊制於夏至之前欽天監敬選吉日恭奉世宗憲皇帝配饗圜丘乾隆二年夏至配饗方澤仍照原題於乾隆三年孟春上辛日配饗大饗殿恭按太祖太宗配饗時所造青幄規模闊大至世祖聖祖配饗增設青幄照式製造今若仍遵舊制則地勢稍狹應將配位青幄均酌量改造其青幄内供案亦稍加收改配位青幄既經重造上帝青幄亦宜重飾見新二年四月十三日具奏世宗憲皇帝升配圜丘儀奉旨爾部具奏皇考配饗天壇儀注朕敬謹詳閲内稱配饗時朕恭奉皇考神牌升壇奉安於東三青幄等語並未議及祗見上天之儀朕思皇考升祔太廟時先行祗見列祖列后禮畢然後陞座今配饗圜丘亦應先行祗見上帝禮然後陞座於理方協著總理事務王大臣會同爾部敬謹詳議具奏欽此遵旨議準神牌至内壝門外龍亭止皇帝詣龍亭前行一跪三拜禮恭奉神牌進内壝左門升壇向上立太常寺官豫設世宗憲皇帝神拜褥於正中贊引官跪奏世宗憲皇帝配饗天壇祗見皇天上帝皇帝恭奉神牌跪安於拜位贊引官引皇帝退就拜位立贊引官奏跪拜興皇帝恭代行三跪九拜禮畢贊引官跪奏請世宗憲皇帝升座皇帝進前跪奉世宗憲皇帝神牌興奉安於上帝幄之左旁第三青幄退至香案前行一跪三拜禮太常寺官起世宗憲皇帝神拜褥退此行禮時衆官不隨行禮餘均如原奏儀其夏至配饗方澤均如前儀至明歲正月上辛配饗大饗殿已在配天之後不必再行祗見之禮二年四月十六日皇帝恭奉世宗憲皇帝配饗圜丘前期一日遣官祗告如常儀祀日皇帝恭奉神牌祗見上帝禮畢奉安神牌於上帝幄之左旁世祖章皇帝之次第三青幄大祀禮儀與雍正元年同是年夏至親大祭地於方澤恭奉世宗憲皇帝配饗前期一日遣官祗告如常儀祭日皇帝恭奉神牌祗見皇地祇禮畢奉安神牌於皇地祇幄之東旁世祖章皇帝之次第三黄幄大祭儀與雍正二年大饗殿禮同三年正月初六日上辛親祈穀於上帝恭奉世宗憲皇帝配饗前朝一日遣官祗告如常儀祀日一應禮儀與雍正二年同欽定大清會典則例卷七十七
