任十一年題準凡武職各官赴任在塗有耽延事故及患病者取具中塗地方官印結咨報兵科免參雍正十三年議準凡武職赴任有中塗患病及風水阻滯實情如違限一二月不及取具地方官印結者提鎮移咨兵科免其題參若違限至三月以上果有阻滯實情取具地方官印結報科亦免題參如無地方官印結即行題參乾隆八年議準嗣後武職赴任各官自京師到該省會城及府治驛站分别逺近悉照文職之例其在外推升各官由原任地方赴新任者應以新任省分與原任地方比較逺近酌定憑限均照吏部文職到任印册鈔録鈐印存案一應文憑均照册填限給發一功加人員雍正三年覆準凡功加人員令督撫提鎮轉行該營協州縣將該員三代履歷年貌籍貫並取具千把州縣等官印結送兵科稽考一武生考試順治初年定凡直省學政報明到任日期後將考過武生童名數按期造册送兵科察核如有違限遲誤及溷冒情弊由兵科題參一官兵俸餉康熙五十三年覆準直省官兵俸餉領結不必按季責送應於奏銷前一月造册送兵科察核五十五年覆準直省官兵俸餉既於奏銷案內造册送科察核其文武官監放領結停止造送一朋樁奏銷順治初年定凡直省每年奏銷兵馬朋樁册籍限五月內造送兵科察核如有浮冒舛錯者題參一提塘康熙初年定凡各省坐京提塘均赴兵科畫卯月以朔望為期又議準凡題奏奉旨之事下科後令該提塘赴科鈔録封發各將軍督撫提鎮一驛遞奏銷順治初年定凡直省驛遞錢糧支銷數目令該撫年終造册送兵科察核如有浮冒舛錯者題參一郵符奏銷順治二年題準凡直省督撫提鎮學政鹽政等每年終將領過勘合火牌造具清册奏繳到日送兵科察核違例濫給者題參七年議準直省齎送人員皆用部發火牌驗明方準應付如有自發紙牌索取夫馬者不準應付違者兵科糾參與受一同治罪十七年議準督撫濫用私牌及徇庇屬員不參者兵科訪實糾參州縣官如將私牌申報者即與紀録康熙十五年議準凡直省火牌止許齎奏參劾貪官巨憝薦舉大計軍政奏銷錢糧等事其平常事務止許由驛遞送違者兵科題參又定直省督撫提鎮等每年奏繳勘合火牌册籍限五月內送兵科察核又定直省奉差到京勘合火牌由科銷號轉號送部換給仍送科挂號違者兵部會兵科年終彚參又定在京奉差及赴任勘合火牌由科挂號送部給發違者兵部會兵科年終彚參一內外立決人犯奉到諭旨刑科照例發鈔密封下刑部施行一覆奏順治初年定朝審情實人犯本科三覆奏聞雍正二年定秋審人犯亦照朝審例三覆具奏乾隆十四年諭朝審情實人犯由刑科三覆奏其後各省秋審亦皆三覆奏自為慎重民命即古三刺三宥遺制謂臨刑之際必致詳審不可稍有忽略耳非必以三為節也朕每當勾決之年置招册於旁反復省覽常至五六遍必令毫無疑義至臨勾時猶必與大學士等斟酌再四然後與勾豈啻三覆已哉若夫三覆奏本章科臣匆劇具題不無豕亥且限於時日豈能逐本全覽嗣後刑科覆奏各省皆令一次朝審仍令三覆欽此一監視行刑乾隆十四年奉旨朝審人犯著刑科給事中監視行刑一直省爰書順治十一年覆準凡直省重案已結未結者令按察使司各道年終具題造册送刑科察核康熙十二年覆準凡直省人命強盜及應擬死罪等案將全招畫一開列疏內並别造清册送刑科察核二十二年覆準凡直省重罪具題事情照原疏看語揭帖開送刑科核覆外停其照疏造册投送二十五年覆準凡直省已結未結重案停其年終具題造册投送雍正四年定直省州縣原讞情罪果與律例吻合上司溷駮許承審官鈔録原審供册並批駮案卷直揭刑科以憑察核實則將上司議處虛則將屬官治罪一刷卷順治十一年題準每年京畿道今河南道刷卷繕造黃册進呈後赴刑科注銷一贓贖順治初年定凡直省贓罰贖鍰銀穀細數督撫於年終備造文册送刑科察核康熙五十七年議準直省解部贓罰贖鍰等銀批文專投刑部免送刑科磨勘雍正七年定直省解部贓罰贖鍰等銀批文均投刑科磨勘又議準凡直省私鹽變價銀鹽政於差滿之後備造文册送刑科察核一內外工程順治十二年覆準建造宫殿一應工程該衙門先期上請敕下工部會同工科估計以防冒破又議準凡直省修造城垣官署兵房及開濬池塘並修理隄壩石閘橋梁等項工料均造細册送工科察核康熙四年議準凡河工錢糧每年限八月內奏銷屆期備造清册送工科察核並送河道圖式備考十年覆準凡各省糧艘兵船及一切應差船或奉旨新造或經朽爛拆修釘板各工料備造細册送工科察核二十八年議準直省製造盔甲弓箭器械鐵炮火藥鉛彈等項並分給某旗某營均核明經費出入備造細册送工科察核又議準三年大計有關工部銷算並蘆課錢糧均彚造細册送工科察核四十二年奏準凡奉旨建造親王以下及大臣墳塋所用木石等料價直監造官備造細册送工科察核六十年題準凡一應修理工程工價五十兩以上物價二百兩以上者著該處料估啓奏到日工科會同陜西道御史核實工完察銷一各差考核順治九年定凡工部各關口河差因收船稅故謂河差均赴工科親領四季印簿令本商自填船料稅課及竹木柴炭等項數目按季報科一年差滿仍造送總册工科移取工部紅單磨對有舛錯違限者題參康熙十八年題準古北桃林潘家等口木植進口該監督驗明長徑尺寸什一選收記印紅號由海運至通灣令木厰筆帖式照驗紅號察收其所收木植按季備造循環簿送工科核對又議準古北桃林潘家等口徴收木稅以任滿日期計八月內交完差滿交代備造清册分送部科察核遺漏舛錯者題參二十五年議準嗣後工部關稅銀四季報解其工部紅單工科印簿候差滿日彚報停其按季呈報見今領印簿者龍江關蕪湖關荆關通惠河南新關宿遷關辰關榆關潘桃口殺虎口古北口一各差領批順治元年定凡工部各差監督給精微批文由工部送工科挂號具文送於內閣填注職名用寶工科給事中引監督於午門外跪領由科按程定限並回繳日期康熙十一年題準凡工部各差回京之日原領精微批文送科銷號轉繳內閣違限者工科題參一月以內者免議一月以外者議處又定工部各差應領精微批文如奉特旨速行赴任者俟內閣用寶發出工科行文知會該監督出具印文差官赴科請領凡批內注限以領批日為始限一年回繳量省分逺近定為正限再加餘限以為往返路程之期一六科給發敕書康熙元年議準直省總督巡撫由吏科總督漕運總督倉場坐糧廳監督各關監督由戶科學政由禮科提督總兵官由兵科總督河道暨工部所屬之各關監督由工科各給敕書任滿送科繳內閣雍正十二年題準一應坐名敕書及藩臬監司副參遊擊等傳敕均於命下之後內閣官同給事中於午門外頒給本官祗領如有不遵定制者本科題參乾隆十年議準凡應給敕書各官如有外任升轉者內閣官奉敕於該科登號傳該省提塘官齎送該提塘官具領狀鈐蓋戳記送科備考如違例私發或從他處轉寄者察出參處十五年議準各鹽政敕印向來均由都察院委官齎送經刑部定議齎送印信有違定例則嗣後敕書亦應停止委官齎送歸並户科給發提塘官齎往一稽核朝單康熙四十年議準每月逢五常朝之期令給事中更番稽察吏禮二部將各部院所送朝單並所收職名送於當直之科核對如單內有名職名不到者行詢確有事故者免參餘仍指名題參雍正七年議準凡常朝大小官員職名繫吏部司官按班收訖送科核對惟滿洲大小官員常朝職名吏部不行開送各科無憑核對嗣後先常朝一日滿洲大小官員將朝單開送吏部一例齊集按次坐班令吏部司務收受職名同朝單送科核對無故不至者該科參奏乾隆八年議準嗣後朝期應坐班各官並無事故託辭不到者給事中核實題參一直宿順治初年定六科官署每日以給事中一人輪直二日一更代雍正八年諭午門外朝房之南科垣之北有碑亭一所供奉皇考聖祖仁皇帝御製臺省針碑文此地與六科相近即著六科輪班撥人守護每日掃除潔淨敬謹啓閉倘官吏人等仍敢擅入視為憩息之所輪班科員即行參奏如科員不奏經朕訪聞定行交部察議欽此乾隆五年奏準端門外東邊一帶朝房撥給吏科戶科各三間禮科二間西朝房撥給兵科刑科各三間工科二間為收貯册卷之所十八年奏準嗣後六科移取册卷並知會直班官辨同啓封識如有不行知會私自開封者令直班官辨立即拏究一御門侍班康熙二十五年覆準凡聽政日各部院奏事以滿漢給事中各二人侍班班在翰林之次五十四年覆準凡聽政日滿漢給事中各二人與御史同班侍立一御經筵侍班順治十四年定凡御經筵以滿漢給事中各一人侍班在文華殿內西嚮立一驗看月官每月開列滿漢掌印給事中名奏請簡用稽察八旗事務宗人府銀庫理藩院內外館銀庫鄂羅斯來京貿易巡察盛京吉林黑龍江開列滿給事中名奏請簡用巡視五城巡視京通十四倉巡視淮安濟寧天津通州漕運巡察臺灣諸差開列滿漢給事中名引見簡用以上皆與御史同開列不専屬給事中之差乾隆十五年奏準嗣後滿漢科員除巡漕巡察等差為時不甚久逺者仍由都察院按資委署外其奏差學政暨簡署外任例不開闕者該科呈明都察院題請署理十六年奏準嗣後科道不論所奉何差在一年外者將科道通行開列具題恭候簡命一人署理在一年內者由都察院按資委署至科道已奉巡城巡倉等差而又奉别差需人署理者向例在三月外者題署三月內者委署請亦以一年為限以昭畫一一掌印雍正元年奉旨掌印給事中責任緊要交都察院公同簡選保奏又定各科掌印給事中員闕該科移會吏科開列各科不掌印之給事中名送院簡選二人出具考語送回吏科繕本具題用都察院印一升轉凡給事中內升滿漢各一人外轉滿漢各一人每三年一次吏科開列各滿漢給事中之無事故者呈都察院核明送回吏科繕本具題各科給事中陳奏事件均豫送吏科備案屆升轉之年繕造黃册隨本進呈恭候簡用向例每年八月升轉於乾隆十六年改為三年一次舉行一書吏吏科兵科工科各十人戶科十有三人刑科十有二人禮科八人皂役每科各四名欽定大清會典則例卷一百四十六
