body:
  text: 都察院二一六科接本順治年間定凡紅本批發到內閣日以給事中一人赴內閣祗領分發各科雍正六年議準嗣後紅本到內閣不拘滿漢給事中一人親赴內閣祗領十三年議準嗣後九卿會議定稿畫押之後令主稿之部院謄録副稿鈐蓋堂印送於應稽察之科收貯候命下之日該科將副稿與紅本核對倘有私行更改以致不符者本科參奏乾隆十三年諭內閣每日進呈本章朕批發後由六科親領發鈔以昭慎重乃近來該給事中等怠忽成習竟有不親身祗領委之筆帖式等代行者往往不待接本先已散去至次日始行發鈔朕所聞如此夫本章關繫緊要承領乃科臣專責似此因循玩愒必致貽誤朕姑寬其既往著大學士等傳旨申飭將來若不親身承領或發鈔遲延必嚴加議處大學士等亦宜留心稽察如有仍蹈前轍者即行參奏欽此一發鈔順治初年定凡本章命下事屬某部院者由某科即日鈔清漢文諭旨發交某部為正鈔如一事關涉數處者將本章送於别科轉發為外鈔原領本章各貯本科年終彚繳內閣又議準凡內閣發出密本由該科登號原封送部取承領官職名附於號簿該部辦理畢仍密封送科康熙十七年議準紅本已奉旨到科未經到部有豫鈔泄漏者將本科給事中議處泄漏之人交刑部治罪雍正元年覆準凡書吏提塘京報人等除紅本上諭外如有訛造無影之辭者本科給事中察拏治罪五年議準凡紅本科鈔關繫甚重令承辦官詳悉校對敬謹奉行如有增減錯漏繫何衙門所奉諭旨將承辦校對官照錯誤本章例議處乾隆六年議準凡特降諭旨及批發章奏到內閣繫該部承鈔辦理者令該科同赴內閣鈔出並傳知都察院暨衆科道一史書録書順治初年定凡紅本發鈔後本科别録二通供史官記注者曰史書存貯科署以備編纂者曰録書敬謹校對鈐蓋印信史書送內閣録書分貯六科雍正八年諭史書録書每年令滿漢翰林各二人悉心稽察專司其事倘有玩忽潦草之處據實奏聞如徇隱不奏察出一并議處欽此一封駮順治初年定凡部院督撫本章已經奉旨如確有未便施行之處許該科封還執奏如內閣票籤批本錯誤及部院督撫本內事理未協並聽駮正一陳奏順治初年定給事中與御史同有進言之責凡朝廷政事得失民生利弊以時條上百官有姦貪劣迹亦得據實糾彈一注銷吏科稽核吏部順天府户科稽核户部禮科稽核禮部宗人府理藩院太常寺光祿寺鴻臚寺國子監欽天監兵科稽核兵部太僕寺鑾儀衛刑科稽核刑部通政使司大理寺工科稽核工部各衙門所辦之事每月兩次造册送稽核之科注銷依限完結者開除限內未完及逾限有因者於注銷本內聲眀無故逾限者指參各於月杪繕本具題乾隆十四年奏準都察院向無注銷之案稽核歸於刑科一京察順治十三年議準凡各衙門京察册籍定期於三月十五日以前封送吏科吏科準吏部考功司移會會同河南道今京畿道各封門察核應移詢者密封移詢應改正者即行改正屆期過堂吏科掌印給事中滿漢各一人同河南道掌印滿漢御史赴吏部公座會同考察公定去留繕本具題一大計順治四年議準凡直省督撫送到册籍由吏科會核具題一文職畫憑順治初年定外任司道以下各官命下五日內吏部文選司繕寫文憑用印送吏科填限吏科定期令各官齊集畫憑依限填注限十日內送部知縣以上行一揖禮知縣以下均跪如不赴科畫憑逾兩月者將憑送吏部核銷又議準經歷以下雜職等官皆寄憑與該督撫給發該員領憑赴任取具地方官文結報明吏科存案康熙五年議準官員畫憑不到者吏科即移會吏部察核有無事故如一月內呈明事故到部者知照本科凖其補畫文憑如無事故又未呈明違一月以上者罰俸一年亦準其補畫違兩月不到者革職八年議準畫憑官繫候補候選者須核其投科文結如先無文結投科漢官取具同鄉京官印結滿官取具該旗印結捐納出身者驗明捐照方準畫憑又奏準在外推升各官扣除交代日期有錢糧者扣兩月之限無錢糧者扣一月之限在籍候選佐雜各官扣除督撫驗看日期順天府扣一月之限奉天扣四十五日之限其餘直省皆扣兩月之限在外題補教職亦扣限兩月考試驗看以上扣除日期皆填入憑內鈐印送部轉發又題準凡官員領憑到任後該巡撫布政使將原領文憑並到任日期按季繳報有違限者由科題參十一年題準官員赴任在塗有耽延事故及患病者取具中塗地方官印結咨報吏科免參至在外推升各官領憑後如原任內錢糧盜案未完或候交代及患病以致違限者督撫藩司將情由咨部改限令其赴任仍知會吏科稽核雍正七年覆準凡官員領憑赴任以京師至該省扣算限期但各省會城及所屬之府治距京逺近不一其憑限日期自應詳加分别除順天奉天保定等處原限繫將各府計算與驛站相符無庸增減其餘各省憑限將自京至該省會城及府治驛站分别逺近酌量增減其正八品以下在籍候選及在外推升各官文憑封發該督撫驗看給發者將發憑到省日期逐一扣除外應以得官省分與原籍原任之地比較逺近酌定憑限一并造册移送吏科依限填注嗣後自京師領憑赴任者順天限十日奉天限三十日直隸限二十日山東之濟南兗州東昌青州限三十日登州萊州限四十日山西之太原潞安汾州大同寧武朔平限三十日平陽澤州限三十五日蒲州限四十日河南之開封歸德彰德衛輝限三十日懷慶河南限三十五日南陽汝寧限四十日陕西之西安延安限五十日鳳翔漢中限五十五日甘肅之平涼鞏昌限五十五日慶陽寧夏臨洮限六十日西寧涼州甘州限七十日江蘇之江寧常州鎮江限四十五日淮安揚州限四十日蘇州松江限五十日安徽之安慶寧國限五十五日