下一應陋規不許督撫鹽道等官赴井煎鹽居積買賣又題準近井之富民祿豐羅次祿勸元謀和曲六州縣改食白井沙滷原銷黑井鹽統運昆明省店行銷二年覆準黑井産新井二眼除發竈戶薪本役食器具銀萬兩尚存銀萬七千兩將白雲井撥補黑井課銀四千兩雲龍井抵補課銀三千二十兩有竒一並歸公其黑井闕課於新井鹽課內撥補以免互幫又覆準祿豐等州縣改食白井沙滷定價一錢六分姚州及大姚定逺廣通雲南四縣仍食沙滷每斤定價二分其五州縣額鹽分發於民多鹽少之楚雄府蒙化府趙州太和縣鄧川州行銷昆陽州之三泊改食安寧井鹽阿陋舊額撥開化府行銷又覆準易門縣改食白鹽井多出之沙滷照定價一兩六錢完解其原藉阿井額鹽撥開化府增銷三年覆準琅安二井鹽價髙昻量為酌減將麗江土井息銀二千二百餘兩抵補至琅安井額鹽不敷民食令石屏州就近在威逺地方領銷按版抱母等井原銷之鹽分發寧通海河西新興四州縣領銷四年覆準普洱地方新開磨黑磨弄井鹽每年課銀三百六十三兩五錢二分有竒元江府屬猛野磨鋪井鹽每年課銀二百三兩歸入按版抱母等井項下報銷五年覆準黑井正額鹽五百六十餘萬斤內每一斤加銀四分二釐八毫該銀二千四百十有三兩九錢二分又撥給不敷課款鹽二十四萬斤內每百斤加銀二錢該銀四百八十兩於所收沙滷等項盈餘銀內給發又覆準黑鹽發價於定額三分價內每分準其冉減二釐共減銀萬六千一百十有六兩六錢有竒並黑井所加薪本二千八百九十三兩九錢二分共銀萬九千四兩五錢二分有竒於多收沙滷等項盈餘內照數抵補令該管官將每斤減價二釐之處出示曉諭其正項並額外盈餘銀六萬一千九百餘兩照數貯庫如有留抵銀廠虧闕及公用之處造册報部又覆準雲南只舊草溪二井每年升課銀四千二百八十三兩四錢遇閏加增至二井應發薪本銀每斤一分五釐於鹽價內借動發給輪流解還其該井官吏養廉工食等項每月計銀四十兩於正額內開銷九年覆準雲南各井煎鹽均除小建惟黑井小建不除所以纍任井司皆有虧空將小建六日闕額鹽於新出沙滷鹽內煎補乾隆元年題準雲南黑井等井鹽運至昆陽等處行銷鹽價每百斤遵奉諭旨減至三兩以下其應減鹽價等項銀六萬一千一百八十三兩一錢三分九釐四毫有竒即將各井應減盈餘通融抵補以敷正額至裁汰盈餘銀原繫留為地方公事之項今已裁汰應令俟有需用之處别請動項報部三年題準東川一府舊𨽻四川今改歸雲南但滇鹽不敷民食應由川省招商認引徴稅配運其南寧霑益平彝三州縣一並改撥川鹽四年題準由廣東運鹽百萬斤至廣西百色地方由百色至雲南羅平師宗等州需用鹽價腳銀七千六百八十三兩四錢五分五釐於司庫收存銅息銀內照數動發飭令附近粵西之羅平州領運行銷二十萬斤師宗州運銷二十五萬斤廣西府運銷二十五萬斤彌勒州運銷三十萬斤俟運銷完日歸還原借銅本外餘銀解貯藩庫充公五年奏準安寧州地方有洪源井一區每年可煎鹽二十一萬六千斤獲價銀五千三十二兩八錢內除煎鹽薪本役食外餘銀五百八十三兩二錢麗江府地方有老姆三區每年可煎鹽十有八萬四千一百二十一斤獲價銀三千四百十有三兩四錢有竒內除煎鹽薪本役食外餘銀一百五十三兩五錢六分有竒統將二井盈餘銀按年歸入盈餘册內造報七年覆準姚安新開鹽井每年煎鹽二百一萬九千六百斤共賣獲鹽價銀三萬一千九百二十一兩八錢六分內除應給煎鹽薪本人役工食外尚餘銀三千九百四十三兩四錢一分有竒按年歸入盈餘項下造報但新開滷源須增大使一貟其琅井大使業經裁汰應移駐姚安新井十六年覆準昭通東川二府逼近金江開運京銅繫新闢苖疆馱腳裹足不前必須馱回川鹽接濟應將南寧等處原食川鹽二百四十餘萬斤留為昭東二郡行銷其南寧等處食鹽仍飭領銷滇鹽又覆準文山縣領銷阿陋井鹽改撥十三萬斤增給蒙自縣行銷其文山縣不敷食鹽在於每年採買粵鹽數內增買二十萬斤撥給該縣領銷一貴州素不産鹽無額銷之引民間食鹽由小販擔負四川湖廣引鹽零賣貴陽府安順府南籠府平越府都勻府思南府石阡府大定府遵義府以上九府食四川鹽鎮逺府思州府銅仁府黎平府以上四府分食湖南所行之兩淮鹽以貴州布政使司糧驛道兼理以乾隆十八年奏銷册計之共課入七千六百十有五兩四錢有竒順治十七年題準貴陽思南鎮逺三府每鹽百斤徴稅二錢康熙二年題準徴稅府衛在貴陽思南鎮逺石阡安順平逺大定黔西永寧畢節烏撒鴨池等處每鹽百斤徴稅銀二錢四分普安仍徴三錢除黎平就近食湖廣鹽不冉徴稅外共鹽稅銀五千七百三十兩五錢九分四毫定為額數每年間有浮闕據實報解遇閏加稅四百十有八兩四分九釐二毫二十五年覆準貴陽平越都勻思南石阡大定威寧等府州安順府屬盤江以下州縣衛所均食四川鹽普安等處仍食雲南鹽三十四年覆準普安等處自食雲南鹽商民兩病將普安等處改食四川鹽又覆準貴陽等處向食川鹽徴落地稅銀每百斤二錢四分普安等處亦照例徴收雍正十年覆準黔省婺川縣濯水地方設立稅口徴收鹽稅自本年起按年依額起解造報或盈縮不常據實詳報乾隆四年覆準貴州所屬之古州繫新闢苗疆應以古州為總埠丙妹永從三角􅋭等處為子埠聽古州總埠分撥銷售其商人應聽古州同知管理每年銷引三千八百課銀二千五百十兩一錢四分二釐有竒欽定大清會典則例卷四十五
