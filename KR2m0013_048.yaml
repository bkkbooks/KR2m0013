body:
  text: 戶部鹽法上一直省鹽課以乾隆十八年奏銷册計之共行六百三十八萬四千二百三十一引課入五百五十六萬五百四十兩有竒又盈餘銀一百四十五萬四千四百一兩有竒一盛京鹽行奉天錦州二府屬以奉天府尹兼理轄鹽場二十黃旗場竹心臺場大板橋場小板橋場葫蘆套場甜水河場天橋場二道溝場三道溝場四道溝場柴河溝場白馬溝場劉三場柳柴場小鹽場料河堡場團山堡場鐵廠屯場鐵廠屯河西場芝麻灣場均以州縣佐雜官兼司之天聰五年定令守邊官兵稽察煎鹽七年定煎鹽人照價每兩納稅三分帶私鹽者以其半入官順治元年定奉錦各屬鹽場嵗辦供應陵寢長白山祭祀所需白鹽上用白鹽皇莊官莊鹽共六萬六千斤四年定盜賣鹽者鞭八十仍追鹽入官康熙十八年題準奉錦各屬嵗頒引萬三千七百七十四引每引徴課銀四錢七分三釐有竒共徴課銀六千五百二十三兩有竒十九年題準增三千一百引加課銀千四百六十八兩有竒三十年議準停頒引鹽仍聽民自行煎賣一長蘆鹽行直隸順天府保定府永平府遵化州易州河間府天津府正定府冀州趙州深州定州順德府廣平府大名府宣化府河南開封府彰德府衛輝府許州並所屬之臨潁郾城長葛三縣陳州府懷慶府南陽府舞陽一縣以長蘆鹽政總理駐劄天津兼轄山東繫代欽差御史巡視一年更長蘆都轉運鹽使司管鹽法道運使専理原駐滄州康熙二十四年移駐天津轄鹽場十興國場在靜海縣富國場在天津府豐財場在滄州蘆臺場在寶坻縣越支場在豐潤縣濟民場在灤州石碑場在樂亭縣歸化場在撫寧縣隸青州分司運同駐劄天津府海豐場在鹽山縣嚴鎮場在滄州原隸青州康熙十八年改𨽻滄州隸滄州分司運判駐劄滄州以乾隆十八年奏銷册計之共行正鹽九十六萬六千四十六引每引行鹽三百斤正雜課銀六十萬三百九十四兩六錢有竒外餘引五萬盡銷盡報並無定額盈餘銀五萬七百有二兩一錢有竒順治元年題準長蘆正引七十一萬九千五百五十又包課改引三萬五千四百五十有三每引徴課銀二錢六分五釐七毫有竒十二年題準增備用四萬五千引照正引例徴課十三年題準正備改用每引增銀四分七釐八毫有竒又題準河南開封府每引增補額銀六分六釐六毫有竒又題準增正引十有二萬照例徴課十五年題準停止備用新增二項引目每正引攤納課銀七分一釐九毫有竒十七年題準改引附同正掣增順天永平二府屬三千六百引照例徴課康熙二年題準開封府所加補課於正引內均攤每正引共課銀三錢九分六釐四毫有竒五年題準開封府屬杞通太蘭儀五縣改掣蘆鹽增正引萬三千一百八十九紙照例徴課六年題準宣鎮改掣蘆鹽增改千二百引並保安衛改引三百照包課改引薊永正河之例每引納課三錢一分三釐六毫有竒十六年題準每鹽一包加鹽二十五斤每引加課銀七分又議準京師地方自十七年為始納三引之課行兩引之鹽十七年題準正定河間永平宣化等府薊州及大宛之采育營每引鹽加課四分又題準計丁加五萬七千四百六十七正引二萬九千四百九十五改引共徴課銀四萬三千六百四十七兩有竒二十四年覆準河南懷慶府屬因河東鹽少改食蘆鹽增三萬七千二百五十一引照例增正引課銀萬九千二百九十八兩三錢有竒又議準興國場撥給地畝免徴賦銀二十六年題準舊州營汛內黃村等集鎮所行鹽引歸并大宛二縣完銷又題準河南陳州等六屬改食蘆鹽將兩淮課銀照數扣除自二十七年為始增入蘆額共增二萬四百十有九引增課銀九千五百二十兩八錢有竒二十七年題準陳州六屬原納淮課兩倍於長蘆今按課計引將長蘆鹽引照數速行給商行鹽懸枰自賣勿致按丁派食二十八年題準長蘆新增三萬三千二百六十三引課銀萬五千三百餘兩原屬軍需暫增悉行豁免二十九年題準將天津衛十七年所加四千引豁除又覆準陳州六屬額頒二萬四百十有九引照衛輝輪租例每引該銀八釐共銀一百六十三兩三錢有竒於奉文之日為始徴收解部又題準宣化東西兩城深井堡三處將額引除去聽民自行煎鹽包納引課三十年題準懷來等衛六處改食口外鹽仍照舊額納課三十二年題準延懷堡等地方既改設州縣包課銀歸並徴收永寧衛歸並延慶州該包課銀九百七十九兩深井堡改宣化縣該包課銀四十二兩懷來衛改懷來縣保安衛礬山堡亦歸並懷來縣該包課銀五百八十四兩西城東城二堡歸並西寧縣該包課銀四百六十六兩保安州該包課銀五百二十二兩各有竒三十三年議準長蘆加增課銀萬二千兩四十一年議準將漷縣營頒五百五十引歸通州知州管理又覆準大宛二縣加增三萬五千三百十有三引每年應徴課銀同四十三年引額造入奏銷册內報部察核四十七年議準長蘆增行萬引課銀四千二百三十六兩有竒自四十七年為始照數徴收又議準薊遵等處增行萬引徴課銀四千二百三十六兩有竒又議準永屬六州縣增五百七十二引徴課銀二百四十二兩有竒五十四年覆準長蘆京引十有四萬向設京館勾簿商鹽挨次輪銷今革除京館令衆商張家灣買鹽公保老成之商於廣渠門張家灣催科登記别委員發鹽收課立循單給商赴張家灣委貟處驗換環照運鹽止許從廣渠一門進城循單環照月終彚繳雍正元年議準長蘆定例每引行鹽二百五十斤今商欠甚多將見行鹽每包加鹽五十斤以三百斤為一包令各啇照例運銷免其加課徴完日令該御史將所增鹽作何加賦並應否裁存之處題明冉議四年諭去年長蘆巡鹽御史奏稱長蘆竈地久未清理以致民竈爭控不已請將竈戶灘地從前售與民人者許其回贖如無力者仍許見在耕種之民收租納糧俟原業竈戶有力之日再行回贖等語比經九卿議覆準行近聞當年竈地轉售於民其年分久逺有百餘年者業主售主多半變更即有子孫當時價直多寡亦皆遺失或有逃亡等戶更無從質問以致同姓影響之人彼此爭贖紛紛告訐實滋煩擾若必俟原業竈戶有力之日回贖倘原業之人始終無力則此項地畝久久竟成民地亦非清理竈地之良法朕意以為不若將竈戶賣與民人之地交易年近確有實據者令竈戶備價取贖其餘年久迷失之地所有爭告無憑辭狀該衙門均行注銷凡民人所有竈地嗣後止許賣與竈戶永逺為業如有仍轉行典賣與民者照盜賣官地例治罪永以為例如此則數年之後竈地自漸歸於竈戶而無不清之弊矣爾部即行文著山東巡撫長蘆巡鹽御史遵照實心奉行欽此六年覆準長蘆竈丁銀攤入各場竈地徴收按年完納至白鹽一項仍令竈丁辦納又覆準長蘆商人名下應完鹽課作為十分著追永為定例八年題準長蘆掣鹽令該御史按各商銷售醬鹽菜鹽之期豫於春秋二季赴東稱掣驗放其餘已未舂運引鹽委運同運判督催舂運稱掣驗放十年題準直隸鹽價按康熙二十七年原定之數作為標準以見今價直稍為變通每斤酌加銀一釐令商民兩便又題準增薊遵灤等州縣三萬引照例徴課又題準每年頒發餘引五萬以備額引不敷之州縣領運盡銷盡報又題準滄州分司所轄利民等六場歸並各該州縣管理其一應竈課銀令州縣徴收解交長蘆運司收貯其六場大使一并裁汰再青州分司所轄濟民等五場將天津府通判一貟移駐五場適中之越支場専司鹽務十二年題準增薊遵等州萬四千五百引照例徴課乾隆四年題凖長蘆鹽引令各商通融代銷鹽政於批準之後報部察核仍於奏銷册內聲明六年覆準雍正元年長蘆每引加五十斤原議俟各商積欠銀帶徴完日再為加引今自乾隆二年起長蘆綱引並分認儀封縣引每引加課九分三釐二毫薊州永平府正定府河間府采育營每引加課八分四釐七毫有竒懷慶府沙河縣每引加課九分三釐六毫有竒每年共加課八萬九千四百四十一兩九錢三分有竒十年題準灤遷等州縣停止老少牌鹽令商人捐錢將額定負鹽貧民每名日給錢二十文以資養贍由地方官經理十七年諭前因長蘆各商積欠甚多令其每引加鹽五十斤分派行銷續經部核每年應增課銀八萬九千餘兩但蘆商積困之餘舊欠甫清若按斤加課商力未免拮據著將所加鹽減半納課永為定額其乾隆二年至六年應追未完加斤課銀十四萬餘兩著一並加恩豁免欽此又議準天津靜海青滄鹽山五州縣因有牌鹽遂至影射公行透漏夾帶官鹽壅滯應將見在牌鹽盡行裁汰如實在合例老幼殘疾貧民察定額數取具里鄰甘結加具印結開造花名年貌清册送總督鹽政衙門存案照灤州等州縣之例每名日給制錢二十四文天津縣額引七百飭商照例行銷以濟民食一山東鹽行濟南府兖州府東昌府青州府泰安府武定府萊州府登州府沂州府曹州府河南歸德府江蘇徐州府所屬之銅山蕭碭山豐沛五縣鳳陽府所屬之宿州以長蘆鹽政總理山東都轉運鹽使司兼理鹽法道運使専理駐劄濟南府轄鹽場十永利場在霑化縣富國場在霑化縣王家岡場在樂安縣永阜場在利津縣官臺場在壽光縣𨽻濵樂分司運同駐劄蒲臺西田場在掖縣登寧場在福山縣石河場在膠州信陽場在諸城縣濤雒場在日照縣隸膠萊分司運判駐劄濟南以乾隆十八年奏銷册計之共行正鹽五十五萬引每引行鹽二百二十五斤票引十有七萬一千七百四十紙每票行鹽二百二十五斤共課銀二十四萬五千六百八十八兩八錢有竒餘票六萬六千五百紙盡銷盡報並無定額順治元年題準山東嵗行正鹽四十六萬三千七百三十七引每引課銀二錢五釐有竒又行票鹽九萬四千四十七引每引課銀一錢二分八釐三毫十一年題準減正引二十三萬三千七百三十有七照額減課十二年題準復正引萬五千照例徴課十三年題準增正引八萬照例徴課十七年題準停止新增引目課銀按額攤納康熙五年題準開封府屬杞通太蘭儀五縣改食蘆鹽酌減萬三千百八十九引六年覆準復行正引八萬照舊徴課十六年題準每正引加鹽二十五斤加銀四分每票引加鹽二十五斤加銀三分十八年題準每票引升課六分又題準每十引加增一引共加三萬一千一百八十一引每十票加增一票共加九千四百有五票照例徴課二十九年命豁免竈丁等項額外銀萬四千二百八十四兩五錢一分三十五年題準加增五萬引照例徴課五十六年題準加增五萬七千五百五十六引照例徴課五十七年覆準山東嵗行鹽四十五萬引有餘節次漸增著散派舊商行銷雍正三年覆準東運行鹽地方因從前節次漸加引目未經分别州縣止按引數派散是以有引多引少之嫌將魚臺等三十一州縣減去萬八千四百六十引量增於鹿邑等二十一州縣行銷四年題準永利等十場應徴丁銀將一半三千一百二十六兩有竒攤入各場竈地及歷城等州縣民佃竈課之內一半按丁均攤遇有升課地畝仍照例加攤丁銀即將丁銀通核減收七年題準山東舊設分司二貟管理鹽務康熙五十八年裁去膠萊分司今東省十場地方遼濶復設膠萊分司運判又覆準東省嗣後部頒引目封貯司庫照長蘆之例設立水程驗單填注商人姓名及引數目並按程塗里數限以運到日期一到該州縣察明截角又覆準增行四萬九千四百五十二引照例徴課又覆準增行五萬二千九十二票照例徴課八年題準商河等縣增八千六十一票淄川等州縣增八千一百二十五票照例徴課又題準每年頒餘票五萬以備票引不數之州縣領運有餘繳銷乾隆元年題準