每月册内只將本月給過内務府物料數目開列具奏其一應用過物料數目每月令各咨取之司院等處繕摺呈内務府總管察對同工部月册一并奏聞如有不符之處於奏内聲明又奏準内務府各處所用一應外解庫貯物料數目亦一并分晰入於每月册内奏聞二年題準一應修理工程並辦買各項物料所需錢糧一年春秋二季題取户部銀二十萬兩其用過細數除按月奏聞外仍照例於年終繕四柱黄册具奏七年奏準節慎庫應存錢糧總計開除實在數目多有闕少册籍亦有牽溷此皆從前不時加詳察以致積久弊生嗣後將庫内一應出入錢糧每於月終開明舊管新收開除實在繕月摺奏聞至於製造簾架等庫亦應一例詳察凡支取物件收發錢糧一并按月繕册附奏八年奏準節慎庫掌印郎中於各司郎中内簡選奏補一年任滿更代一嵗入銀數潘桃口木稅銀七千六百四十五兩古北口木稅銀一千十有二兩殺虎口木稅銀七千六百四十六兩各有竒密雲縣出口燒炭稅銀二百五十餘兩山東省曠盡裁夫銀四千一百七十餘兩河南省堡夫小建銀五十餘兩江南省曠盡裁夫餘銀千餘兩每年於户部題取銀十萬兩或二十萬兩不等均貯庫以備支放其工程費繁者别行奏明於户部支領欽定大清㑹典則例卷一百三十七
