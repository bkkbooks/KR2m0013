而在京堂官又相距路逺無從稽察遇有應修工程雖照例委官察估究未能覈實妥確殊非敬事之道其如何俾有専屬及應修大小各工如何稽察考覈以昭慎重之處著該部詳議具奏欽此遵㫖議準東西兩陵工部司官從前原屬臣部自乾隆五年將石門郎中等官歸并貝勒等管轄是以遇有應修大小各工均由該貝勒等委該處工部司官估修所需錢糧向不奏聞均咨臣部辦理殊非敬事之道請嗣後東西兩陵工部司官仍歸本部管轄但該處司官原由各衙門司官内論俸升補多有不諳工程者請嗣後凡有竒零黏補工程陵寢重地亦未便不時興作應於每年十月内令該貝勒等通行察勘將實在應修之處彚總具奏由部委諳練工程司官前往會同該處官員詳察果繫應修者即行確估由部覈給錢糧委部員前往會同該處司官修理仍令該貝勒等不時稽察統竢工竣報部由部别委司官按例覈算造册奏銷倘遇必需即行修理之工亦令該貝勒等隨時具奏亦照此辦理庻陵寢司官既有専屬而大小工程亦昭敬謹再考東西兩陵向例由部支領備用銀自五百兩以至二三千兩不等以為祭祀及嵗修之用今修理工程既令奏明由部覈給所有前項備用銀毋庸豫行支給至東西兩陵每年清明孟秋望冬至嵗暮祭祀並修理器皿等項必需之銀仍令該總理等先期分案咨部覈給由部入於月摺奏聞一種樹舊例委官監種限以三年限内乾枯者監種官自行補足限外者由部覈給錢糧補種康熙三十三年覆準陵寢栽樹每二丈種樹一株乾隆十二年奏準各陵遇有枯樹應行補栽累年籠統造報並無定例嗣後各陵大樹以乾隆十三年為始如有枯樹作為五年一次由承辦事務衙門詳細覈明應否補栽分别具奏由部給發錢糧令該處内務府及石門工部官督令樹户揀選栽種至隆恩門以後及兩旁樹株毗近寳城圍牆屢行栽種有關風水嗣後如有枯樹遞年别行注册期滿五年將所記之數分别奏請辦理墳塋一墳塋規制順治初年定親王饗堂五間門三飾硃紅油繪五彩金花茶飯房左右各三間碑亭一座圍牆百丈守塜人十户世子郡王饗堂三間門三飾硃紅油繪五彩小花茶飯房三間碑亭一座圍牆八十丈守塜人八户固倫公主同貝勒貝子饗堂三間門一飾硃紅油不繪彩茶飯房三間碑一通圍牆七十丈守塜人六户和碩公主郡主同鎮國輔國公饗堂門制同貝勒貝子碑一通圍牆六十丈守塜人四户縣主郡君同鎮國輔國將軍碑一通圍牆三十五丈守塜人二户民公侯伯碑一通圍牆四十丈守塜人四户一二品官制同鎮國將軍三品官碑一通圍牆三十丈守塚人一户四品五品官同六品以下官碑一通圍牆十有二丈一造墳工價順治十年題準親王給銀五千兩世子四千兩郡王三千兩貝勒二千兩貝子一千兩鎮國公五百兩輔國公同十八年議準民公六百五十兩侯六百兩伯五百五十兩一品官五百兩二品官四百兩三品官三百兩四品官二百兩五品官至七品官一百兩皆給價令其自造康熙十四年議準鎮國將軍與一品官同輔國將軍與二品官同一碑制順治十年議準親王至輔國公碑身均高九尺用交龍首龜趺親王碑廣三尺八寸七分首高四尺五寸趺稱之世子郡王碑廣三尺八寸首高三尺九寸趺高四尺三寸貝勒碑廣三尺七寸三分首高三尺六寸趺高四尺一寸貝子碑廣三尺六寸六分首高三尺四寸趺高四尺鎮國公碑廣三尺六寸三分首高三尺三寸趺高三尺九寸輔國公同康熙十四年議準鎮國將軍碑身高八尺五寸廣三尺四寸螭首龜趺首高三尺趺高三尺六寸輔國將軍碑身高八尺廣三尺二寸麒麟首龜趺首高二尺八寸趺高三尺四寸民公侯伯碑身高九尺廣三尺六寸螭首龜趺首高三尺二寸趺高三尺八寸一品官碑制與鎮國將軍同二品官碑制與輔國將軍同三品官碑制身高七尺五寸廣三尺天禄辟邪首龜趺首高二尺六寸趺高三尺二寸四品官至七品官碑皆圓首方趺四品官碑身高七尺廣二尺八寸首高二尺四寸趺高三尺五品官碑身高六尺五寸廣二尺六寸首高二尺二寸趺高二尺八寸六品官碑身高六尺廣二尺四寸首高二尺趺高二尺六寸七品官碑身高五尺五寸廣二尺二寸首高一尺八寸趺高二尺四寸一碑價順治十年題準親王給銀三千兩世子二千五百兩郡王二千兩貝勒千兩貝子七百兩鎮國公四百五十兩輔國公同十八年題準鎮國將軍五百兩輔國將軍四百兩康熙二年定官員曾經與諡者工部差官立碑十四年題準鎮國將軍三百五十兩輔國將軍三百兩與諡大臣停其差官立碑皆給價令其自立民公侯伯各四百兩一品官與鎮國將軍同二品官與輔國將軍同三品官二百五十兩一造墳立碑一二品官病故禮部題請如止給半葬即無碑價三品以下歿於王事者禮部始行題請凡工價銀旗員由部節慎庫給發在外直省藩庫給發一石像生民公侯伯一二品官皆用石人二石馬二石虎二石羊二石望柱二三品官減石人四品官減石人石羊五品官減石人石虎一古昔陵寢祠墓順治元年定昌平州明代十二陵設内監陵户禁止樵牧康熙二十八年奉㫖會稽禹陵著地方官修理陵廟增守祠人役三十八年覆準明代孝陵委江寧地方佐貳官一人専司修理傾圯四十一年諭織造官會同地方官動支公項修理會稽禹陵欽此雍正七年諭自古帝王皆有功徳於民雖世代久逺而敬禮崇奉之心不當弛懈其陵寢所在乃神所慿依尤當加意防衛至於往聖先賢名臣忠烈芳型永作楷模正氣長留天壤其祠宇塋墓亦當㳟敬守䕶以申仰止之忱著各省督撫轉飭各屬將境内所有古昔陵寢祠墓勤加廵視防䕶稽察務令嚴肅潔淨以展誠恪若有應行修葺之處著動用本省存公銀委官辦理朕見歴代帝王皆有保䕶古昔陵寢之飭諭而究無奉行之實朕雍正元年恩詔内即以修葺歴代帝王陵寢通行申飭亦恐有司相沿積習視為泛常嗣後著於毎年年底令該地方官將防䕶無誤之處結報督撫造册轉報工部彚齊奏聞倘所報不實一經發覺定將該督撫及地方官分别議處明太祖陵在江寧昔我聖祖仁皇帝屢次南廵皆親臨祭奠禮數加隆著江南總督轉飭有司加意防䕶其明代十二陵之在昌平州者自本朝定鼎以來即設立内監陵户給以地畝令其䖍修禋祀禁止樵採聖祖仁皇帝時屢頒諭㫖嚴行申飭著該督轉飭昌平州知州昌平營恭將並差委人員時加廵視務令地境之内清淨整齊倘陵户或有不敷著該督酌議加增此南北明陵二處亦著該督撫於每年嵗底册報工部彚奏欽此乾隆元年諭各省前代帝王陵廟均冝嚴肅整齊以展誠恪聞湖廣地方炎帝神農氏陵廟殿宇牆垣丹雘合度而帝舜有虞氏陵廟規模窄狹丹青剥落不足以肅觀瞻著該督撫轉飭有司動用公項即行修葺其别處陵廟如有類此者悉令該督撫委官察勘動用存公銀酌量修理務令完整再各陵廟向來未設陵户無人看守者可酌設幾户専司灑掃永著為例欽此又諭雍正七年皇考曾降諭㫖凡往聖先賢陵墓有應行修葺者令各該省動用存公銀委官料理今聞山東之少昊陵帝堯陵廟及周公顏子曾子孟子閔子仲子南宫子各祠廟迄今數載尚未興工殊為怠緩著山東廵撫即委官確估報部興修務期工程堅固可垂永久亦不許委官浮冐侵欺以至工程草率欽此二年議準帝堯陵在濮州城東南六十里雷澤之東榖林莊陵前有饗殿三閒陵南一里有堯母慶都陵陵東五十餘歩有堯妃中山夫人祠舊設祠田百二十畝濠地四十畝州官春秋祭饗至東平州堯陵縁自金末黄河屢決榖林舊址無存明洪武間未經深考始於東平葺陵建廟以祀沿譌已久今不便仍襲前明故事致祭東平應令山東廵撫飭該地方官確勘濮州城東榖林舊址修建饗殿配殿等項並於陵前設堯母靈臺祠配以中山夫人悉如舊制詳加料估動項興修其東平一陵仍令有司以時展祭五年題準直𨽻慶都縣繫帝堯生長之鄉向有堯母陵廟年久坍塌應令該督飭屬動項修理據實報銷六年覆準舜陵雖在湖南而故都實在蒲坂則兩地皆為聖蹟自應時加修葺以昭敬禮今山西安邑縣帝舜陵寢年久傾圯守陵之大雲寺亦漸飄搖應令該撫動用存公銀立限修整工竣報銷九年覆準江寧明太祖陵寢㦸門圍牆朝房廊廡寳城等處均有坍塌委官勘估即於藩庫存公項内動撥興修十一年諭前代帝王陵寢及聖賢忠烈墳墓向來均令修葺防䕶陜西為自古建都之地陵墓最多有不載在會典内者既無圍牆又無陵户著交該督撫察明酌築圍牆以禁作踐以資保䕶欽此十三年覆準陜西一省古昔帝王陵寢會典開載祭者十有三陵如黄帝之橋陵周文王武王成王康王漢高帝文帝宣帝魏文帝唐高祖太宗憲宗宣宗陵此外周秦漢唐之陵尚有數十餘處向來令地方官防䕶每年造册報部而其中多有未築圍牆者又無守陵之户所云防䕶有名無實但陜省帝王陵寢較他省為多而諸王妃嬪亦多塋墓此次酌築圍牆設立陵户未可漫無分别凡古昔帝王皇后陵寢並聖賢忠烈或立徳立功立言炳著史册者所有塋墓應令該撫逐細察明將酌築圍牆丈尺作法先行造册報部次第辦理其諸王妃嬪及先賢忠烈内雖有善足録而考其生平事業未甚表著者無庸一槩築牆防䕶再見在陵寢有陵前無隙地者有止敷圏築圍牆者亦有陵外隙地自數十畝至數十頃不等者倘不乘此清釐日久難免侵占而看守陵墓之户必須每嵗給有工食方有責成應將清出陵外隙地數目無多者給附近居民耕種免其升科充為陵户其地畝多者令地方官酌收租息以為撥給並無隙地陵户工食之用毋庸動支公項仍造具收穫租息並給各陵户工食清册報部察覈再黄帝文武成康之陵周公太公之墓均有饗祠年久不免傾圯應令該撫將應行修葺之處照例先行造具估册咨部委官修葺工竣取具册結報銷其將來所收租息除築牆工資陵户工食外每年積餘即可為修葺各饗殿及先賢祠宇之用統於嵗終將收支數目造册報覈至昔日諸王妃嬪及諸臣之墓雖不在築牆看守之例應仍令地方官留意防䕶不致湮沒凡前賢有後裔者聽其自為防䕶其子孫衰微不能自築圍牆者亦為築牆防䕶統於每嵗防䕶册内逐欵造册報部照例彚入年終具題又奏準明愍帝陵饗殿牆垣傾圮請令直督轉飭有司確估工料動支存公銀量為修葺十六年諭金朝陵寢近在房山嵗久榛蕪未經修葺朕惟國家祀典光昭雖以時遣官將事而一切饗殿繚垣儀制所存觀瞻冝備令直𨽻總督前往相度有應增修除治者即行奏聞率屬鳩工庀事工竣之日朕躬親展奠以昭敬禮前朝之意欽此薪炭一内庭需用木柴煤炭順治初年由部召商發價備辦十一年設惜薪司管理十八年裁惜薪司仍歸部辦遞年照内務府具題數目運送康熙四十年歸内務府商人辦置五十六年煤炭仍歸部辦雍正元年木柴亦歸部辦差滿司官一人管理内務府營造司出具紅票由部登記數目嵗終覈銷八年奏準煤炭監督照木倉監督之例鑄給關防奏委滿司官一人遞年掌管期滿更換並令内務府支取煤炭紅票鈐用印信以便按年察覈十年議準煤炭監督内務府委監督一人公同辦理乾隆七年增設木柴監督一人照煤炭監督之例鑄給關防於滿司官内簡委掌管並以一年為期八年議準辦理内廷圓明園並各項木柴監督正副各一人於滿司官内簡選題委正監督一年期滿即以副作正其副監督别行委補一車駕廵幸南苑需用柴炭内務府行文到部由部咨取兵部驛車裝運差官支放湯泉等處照内務府印文先期委官協同地方官照時價辦買康熙六十年奏準熱河進哨應用柴炭由部委司官二人齎銀前往豫備乾隆十四年議準凡遇車駕廵幸將毎日各處應用柴炭數目若干先期知照該地方官按數備辦運往堆貯届期委司官齎銀前往按照時價採買會同地方官如數支放據實報部由部咨送内務府察對覈銷其圍埸内需用柴炭向繫熱河同知四旗通判喀喇河屯通判等先於圍埸外石片子等處購買雇車運送其木柴閒有不敷在圍埸内砍伐者準銷運費但圍埸以内繫産木之所乃稱由外運往不免浮冒嗣後惟應用之炭仍在圍埸外先為堆貯臨期運往所需木柴價直槩不準銷又奉㫖嗣後凡遇廵幸所用柴炭該地方官酌量應用數目不得多行豫備致滋糜費著内務府臨期奏差該堂官一人稽察辦理十八年議準凡遇廵幸由部將尚茶尚膳等處日用柴炭數目刋刻印票交内務府轉給各該處持票向地方官支領地方官驗票照數給發本部不必委官前往所需銀即令地方官動欵豫備事竣報部覈銷一内廷需用炭墼本部發價令舗户成造供用一壇廟需用柴炭照太常寺咨呈給發炭墼發價令舗户成造一陵寢每嵗祭祀需用柴炭即令本處州縣動項採買報部覈銷昭西陵景陵由薊州孝陵孝東陵由豐潤縣泰陵由易州淶水縣孝賢皇后陵寢由遵化州一在京各衙門及執事人員需用柴薪煤炭各照經制定數支給其無定數者臨時慿文覈發一文武會埸需用柴炭照禮兵二部文移支給一外國貢使人役所用柴薪由禮部行文支取會同館大使驗給外藩來朝公主蒙古王以下暨畨僧等由理藩院咨部照數給發一紅籮炭順治初年定每嵗燒造八十萬斤動支保定府柴夫等銀一萬三千五百三十兩十年題準差主事一人隨裁歸保定府通判管理十二年仍歸部辦康熙三年於户部支銀燒造五十六年令煤炭監督於易州地方採辦供應每嵗與煤炭一并報銷一價直舊例隨時價低昻由部給銀備辦康熙四十五年題準内廷木柴每斤定價銀三釐七毫黑炭每斤七釐八毫煤每斤二釐三毫紅籮炭每斤一分六毫白炭每斤一分三釐其在外支用木柴每斤二釐六毫六絲黑炭每斤五釐九毫六絲煤每斤二釐六絲紅籮炭白炭價同内廷乾隆元年議準内廷木柴每斤銀三釐黑炭每斤六釐煤每斤二釐七絲白炭每斤一分一釐在外支用木柴每斤二釐一毫二絲八忽炭每斤五釐三年奏準黑炭每斤增銀四毫十九年奏準内廷圓明園應用煤炭舊例煤每斤價銀二釐三毫黑炭每斤價銀七釐八毫紅籮炭每斤價銀一分六毫乾隆元年由部會九卿議定煤每斤價銀二釐七絲減銀二毫三絲黑炭每斤價銀六釐減銀一釐八毫紅籮炭照舊準給嗣於乾隆三年因黑炭價直昻貴照減定價直不敷採辦每斤增價銀四毫近年以來煤炭價直愈昻該監督屢以減定價直不敷採辦呈請增加察訪見今煤炭價直較前實屬加增如仍照減定價直給發實屬不敷請照訪察實用數目煤每斤酌給銀二釐五毫黑炭毎斤酌給銀七釐二毫紅籮炭每斤酌給銀一分四釐飭發該監督悉心撙節辦理如有餘剩存為下年之用於應領項下扣除倘有侵蝕遺誤察㕘治罪追賠將來時價稍平仍照減定數目覈給一楊木長柴舊例直𨽻永寧衛八百斤保安衛二千斤懐來衛八百斤美峪所四百斤宣府前衛六千斤蔚州衛萬五千斤宣府南路廣昌城守備五千斤康熙十四年題準宣府各衛停其辦解楊木長柴折銀解交户部懐來保安美峪所仍照原額解送三十年題準懐來保安美峪所增解楊木長柴三千八百斤共額七千斤三十二年題準歸并懐來縣辦解乾隆三年奉㫖懐來保安二縣採辦楊木長柴自乾隆三年為始按照辦解之數動用正項造入地丁册内報銷八年懐來縣增解二千斤一出口燒炭康熙元年題準砍柴燒炭許出古北口石塘路潮河川牆子路南冶口二道關其建昌居庸等十四關口永行禁止乾隆六年奏準鮎魚關大安口黄崖關將軍關鎮羅關牆子路大黄崖口小黄崖口黑峪關等九處準商民出口砍柴燒炭一柴炭稅順治十八年議準古北口木植十分取一大者營繕司備用小者交通州竹木厰存貯辦柴康熙元年題準出口燒炭十分取一通永河道每嵗額徵板木船窰稅銀七千一百十有五兩有竒其循環印簿由部頒給按季册報嵗周彚申考覈所徵銀存貯道庫聽户部撥用一蘆葦舊例直𨽻靜海縣每年解送萬斤雍正元年歸并天津縣辦解一開採煤窰順治六年清理宛平房山兩縣煤窰分為四則上則納稅煤千五百斤中則千斤下則五百斤下下則二百五十斤十年題準煤稅累民準予豁免遞年應用之煤照時價召商辦用煤窰事件聽五城及州縣管理康熙三十二年奉㫖京城炊㸑均頼西山之煤將于公寺前山嶺修平於衆甚屬有益著户工二部差官將所需錢糧確算具題乾隆五年題準各省産煤之處無關城池龍脈古昔陵墓隄岸通衢者悉弛其禁該督撫酌量情形開採又覆準直𨽻地方如在邊疆口外照古北口三道溝等處酌定税額咨部給票張家口外之土木路等處令在懐安萬全二縣口内設廠獨石口外之東槽碾溝等處令在盤道塘子二口内設廠報部給票各應輸稅銀彚入雜稅奏册内報解其在内地官山給發司帖照例納稅餘凡屬民業悉聽自行開採一煤窰禁令順治十二年題準西山過街塔山玉泉山紅石口杏子口一帶煤窰永行封禁十七年題準渾河大峪山埸關繫京城風水不許開窰採石違者從重治罪康熙三十七年題準宣化之采馬坡馬鞍寺等處勒石永禁私採六十一年議準開採采馬坡等處各窰每年納課銀三千兩其小西口四處悉行禁止私採雍正元年奉㫖采馬坡等處煤窰仍準民間開採匠役一食糧匠役順治元年定各監局内監匠役均