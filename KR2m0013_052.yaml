body:
  text: 戸部雜賦上一蘆課乾隆十八年各省册報江蘇蘆地科銀草麥蘆耔粒等地每畆五釐至一錢五分一釐不等耔粒蕩灘熟低等田每畆一分至一錢五分一釐不等密蘆每畝三分至六分不等稀蘆每畝一分五釐至四分不等埂划塘每畝一分至二分不等草泥水光耔粒水影荒白塗水窪等灘每畝一釐至三分八釐不等計蘆地三萬四千三十頃七十三畝零課銀十有二萬六千九百五十三兩五錢一分有竒安徽蘆地科銀基草荻草麥市熟等地每畝一分至三錢三釐七毫不等上中下等熟田每畆一分至一錢不等密蘆每畝三分五釐至六分六釐不等稀蘆每畝二分五釐至五分二釐不等水低等蕩每畝一釐至二分九釐不等草泥水等灘每畝一釐至一分不等蘆墩每畝五分七釐埂划每畝一分水套每畝四分白沙每畝四釐計蘆地三萬一千四百八十五頃三十一畝零課銀五萬一千三百四十七兩二錢四分有竒江西蘆地科銀上地每畝三分至三分五釐中地每畝二分至二分五釐下地每畝一分五釐密蘆每畝三分稀蘆每畝二分上草地每畝二分中草地每畝一分五釐下草地每畝一分魚塘每畝一分草塌地每畆六釐計蘆地四千三百四頃八十七畝六分零課銀六千二百六十八兩三錢六分有竒湖北蘆地科銀密蘆每畝三分二釐至三分四釐稀蘆每畝自六釐至二分二三釐不等中蘆田每畝二分五釐下蘆田每畆七釐上則麥地每畝一分八釐至二分三釐中則麥地每畝一分八釐下則麥地每畆一分三釐中地並中熟地每畝二分五釐熟地每畝二分三釐及二分五釐基地每畆一分二釐至三分二釐五毫不等草塌葫荻湖壋中草塌下草等地每畝各六釐草壋下草壋每畝各三釐計蘆地八千四百八十九頃三十五畝二分零課銀九千八百八十四兩二錢三分有竒湖南蘆地科銀上熟地每畝九釐至一分九釐下熟地每畝八釐三毫至一分密蘆地每畝五釐稀蘆地每畝二釐及三釐成熟地每畝八釐三毫至一分四釐八毫六絲七忽不等耔種地每畝九釐六毫八絲九忽基地每丈科銀五分其按畝科徴者每畝一分至一分九釐不等計蘆地千六百三十六頃十有九畝二分零基地四百六十丈五尺課銀千三百二十九兩三錢五分有竒一茶課江蘇額行茶萬五千引分發江寧茶引所大使茶引八千其餘七千分發産茶之吳縣荆溪縣凡有商販入山製茶貨不論粗細每擔給一引每引額徴紙價銀三釐二毫其徴收課稅例於經過各關按照則例驗引徴收彚入關稅項下報銷安徽舊行茶四萬五千引新增二萬四千九百八十引共六萬九千九百八十引分發産茶之潛山太湖歙休寧黟宣城寧國太平貴池青陽銅陵建徳蕪湖六安霍山廣徳建平十七州縣凡有客商入山製茶每擔給一引每引徴紙價銀三釐三毫其徴收茶課例於經過各關按照則例驗引徴收彚入關税項下解部又歙縣街口司有每年茶牙完納茶税銀四錢三分二釐彚歸地丁奏報雍正十年題準歙休寧黟寧國建徳霍山六縣茶引不敷行銷請增萬八千三百八十引又覆準六安霍山黟建徳寧國五州縣請增萬五千五百引又懷寧桐城宿松望江南陵涇旌徳石埭東流當塗等十縣地不産茶開除八千九百引十三年題準六安歙休寧霍山等四州縣茶引不敷行運五六千引請於額引之外豫頒萬引遇額引不敷即給行運每年所頒餘引同額引一并發貯布政使司庫遇有動用按數給發將給發存剩數目於嵗終造册具題江西茶課額徴銀三百六十五兩七錢行茶二千四百三十八引每引徴紙價銀三釐三毫三絲徴課銀一錢五分雍正九年題準寧州武寧縣額引不敷共增百五十引增課銀三十二兩五錢乾隆二年覆準江西額銷茶引三千紙今南昌等三十二縣地不産茶並無商販領引辦課應停給茶引七百十有二紙豁除課銀百有六兩八錢紙價銀二兩三錢七分九毫浙江茶課額行茶十有四萬引每引交紙價銀三釐三毫北新關每引徴茶税銀二分九釐三毫八絲彚入關税報解康熙五十五年覆準浙省每年例銷茶引十有四萬商人願備本銀將每年解送黄茶親交内庫一切水脚亦願自備今給與執照領引置茶過關投税均如舊例其存剩餘引按年赴部繳銷雍正五年題準浙省産茶獨多銷引數倍他省行銷最遠輾轉興販商無定人應設商人二名每年自備紙價銀四百六十二兩於藩司衙門詳給咨批赴部交納請頒額引到浙呈送布政使司挂驗轉給存貯竢各商販置茶齊全赴北新關輸納税銀管引商人每年辦解各陵寝需用黄茶及供應上用黄茶内廷需用黄茶九十二簍又每銷一引應解茶果銀並盈餘銀四分二釐八毫計十有四萬引每年共解内務府銀六千兩湖北茶課額徴銀二百三十兩行茶二百三十引繫咸寧嘉魚蒲圻崇陽通城興國通山七州縣請領各州縣産茶無幾不足本地日用所有茶引無商可給向種茶園戸經紀中按每引紙價銀三釐三毫徴税銀一兩又均州荆門州鍾祥縣本地舖戸肩販小簍粗茶每引報税一釐八毫名曰落地税盡收盡解乾隆八年四川建始縣改隸湖北施南府舊行茶十有八引隨帶湖北每引徴税銀二錢五分課銀一錢二分五釐共六兩七錢五分湖南茶課額徴銀二百四十兩行茶二百四十引向例茶商皆自陜帶引赴楚採買本省所頒茶引並無客領給發産茶之善化湘隂瀏陽等十七州縣行戸以為一年䕶帖每一引徴紙價銀三釐三毫納税銀一兩甘肅茶課額徴銀六千二百六十六兩三錢二分六釐本色茶十有三萬六千四百八十箆行茶二萬八千七百六十六引每引紙價銀三釐三毫榆林府千引神木同知二百引寧夏府二百七十引三路共千四百七十引每引徴課銀三兩九錢共徴銀五千七百三十三兩又西商大引二萬七千二百九十有六於西寧荘浪洮岷河州甘州五司地方行銷内小引百三十有二在西安鳳翔漢中同州四府州縣售賣每引行茶百斤内交官茶五十斤餘五十斤即為商茶令其售賣作本每茶百斤作為十箆每箆二封每封五斤共徴茶十有三萬六千四百八十箆又漢中府屬西鄉興安漢隂紫陽石泉等州縣所產之茶向不設引止許本地行銷每年徴茶税銀五百三十三兩三錢二分有竒歸入地丁奏銷案内順治初年定易馬例每茶一箆重十斤上馬給茶十二箆中馬給茶九箆下馬給茶七箆七年題準舊例大引箆茶官商均分小引包茶税分差等今定大小引一例平分十年覆準延寧二處商税每引茶百斤量入官茶三十斤每斤折銀一錢三分交庫彚報又覆準各番交易茶馬量齎煙酒以示撫綏十三年覆準新茶中馬既足陳茶變價充餉如新茶不足陳茶兩箆折一中馬十四年覆準私茶私馬變價及贖罪銀原留中馬支用今廣寧開成黑水安定清平萬安武安等七監馬疋蕃庶改折充餉康熙三十二年題準西寧五司收貯茶箆年久難免浥爛每箆十斤變價銀六錢三十六年覆準陜西黄甫堡原額行茶一百三十四引今口外䝉古在殺虎口就近易鹽以致黄甫茶引不行嗣後將額引停其頒發又覆準甘州司積貯茶箆在五鎭俸餉之内銀七茶三每銀一兩搭放直三錢茶一封四十二年題準陜西額行茶二萬七百九十六引發西寧荘浪洮岷河州四司通番易馬内有八百餘小引售西安鳳翔漢中三府人民供食後因大引漸次寝更見今止留小引百餘三府地方人民不足食用今於小引原額内頒五百引給商行茶每引徴茶五箆每箆折銀四錢共徴銀千兩四十四年題準西寧等處所徴茶箆停止易馬將茶變價折銀每新茶一箆折銀四錢陳茶一箆折銀六錢充餉五十七年議準陜西西寧地方原額九千二百四十八引每引照例徴茶五箆折銀四錢徴銀四千兩六十一年覆準陜西西寧荘浪岷州河州界連口外增茶引四千交與總督辦理一年定例之後仍交廵撫辦理又議準陜西西寧等處舊茶悉行變賣以充兵餉雍正三年覆準甘肅四司茶箆自康熙六十一年為始五年内總收本色五年後即將五年以前之茶發出變價挨次出陳存新將變價銀按年題報總以五年為率八年覆準甘肅收貯茶封照依時價發出變賣飭令各司半月一報倘有驟長驟落亦即據實報明並責成各道員稽察七監所費仍將所奏市價按季具結報部變價銀造册奏銷乾隆元年題準甘肅應徴新茶自乾隆元年為始準其每茶一箆折交銀五錢照數徴收竢陳茶銷至八分之後應否改折本色再行酌議具題又新茶雖經改折陳茶銷售猶難將西寧荘浪洮岷河州甘州五司庫貯陳茶每封減價銀二錢嚴飭司茶各官上𦂳變賣取結送部二年題準甘肅商人承辦茶引例由地方官稽察驗放今榆林神木額設茶引赴陜西潼關察驗實屬遶道脚價倍增於商未便嗣後商茶入陜之後將榆林茶令綏徳州察驗神木茶令府谷縣察驗七年覆準甘肅應徴新茶仍徴本色十三年奏準應徴茶封嗣後每年以二成徴收本色八成徴收折色四川茶課額銀萬三千一百二十八兩三錢七分五釐茶税銀四萬五千九百四十二兩三錢七分八釐舊額新增共十萬六千一百二十七引每引交紙價銀三釐三毫課銀一錢二分五釐内邊引八萬四百二十有七每引徴税銀四錢七分二釐腹引九千二百有六每引徴税銀二錢五分土引萬六千四百九十有四每引徴税銀三錢六分一釐按年造報奏銷康熙二十六年覆準四川茶增行邊腹萬有一百五引二十九年四川蓄茶漸茂用茶漸廣增行二千四百二十三引四十一年定四川天全土司增五千六百引又題準四川茶雅州增行二千七十九引卭州三百引榮經縣三千五百有四引四十四年四川名山縣增邊引三千三百有十又題準雅州腹引難銷今改為邊引行茶四十五年題準新繁大邑灌縣增行茶千九百引四十八年覆準增行天全土司茶五百有十引四十九年覆準增行天全土司茶七百二十引又覆準雅州增邊引一千九百八十五十八年議準四川茶課合邊引土引共六萬四千九十八引於松潘打箭鑪行銷令均行飭禁将引繳部應徴税銀暫行停止尋以二處土司相繼歸誠仍發邊土二引行銷雍正三年覆準增卭州邊引一千三百四年覆準雅州成都大邑榮經灌等五州縣額引不敷行銷增邊引八千六百三十有五又覆準天全土司增土引七百七十又覆準增安縣邊引二百五年覆準卭州增邊引千有一百六年覆準四川遵義府改屬貴州其仁懷縣額徴茶税銀六十二兩五錢茶課銀一兩六錢九分三釐又正安州額徴茶課銀二兩自七年為始歸貴州交納七年題準增洪雅嘉定二州縣腹引共三百又天全土民願增土引二千三百有五八年題準天全土民願增土引三千九百四十又題準雅州榮經二州縣茶引節年於打箭鑪地方行銷今因無力行茶改撥新繁峩眉等縣招商認銷邊引二千二百三十有三又覆準四川茶引應徴𣙜課每斤止徴銀四絲九忽有竒實屬太輕若照舊誌每茶一斤徴課銀二釐五毫似覺太重應酌減舊誌之半無論邊土腹引槩以每斤徴銀一釐二毫五絲為額九年題準成都等六州縣增行茶三百六十九引通江縣增六百七十八引又題準灌縣等九縣增邊腹共六百五十二引又題準羅江等四州縣增腹引五十有一新都等四縣增腹引二百二十卭州增邊引一千一百天全州增土引四千二百七十有一十年題準漢銅梁綿竹眉丹稜等五州縣增腹引共三百二十有五又崇寧鄰水雅安汶川卭等五州縣增邊引三千六百有三又題準保寧府屬之巴州通江南江原額邊引二百向繫灌縣商人代領買茶配引行銷請改撥灌縣於九年為始按年行銷十一年題準名山等