鉛礦準其開採嚴飭管厰人員全數開報照例二八收課其所收課鉛照所定之價每百斤以一兩五錢變價解庫又題準廣西臨桂縣澇江煙竹枝二厰懐集縣之上富厰開採日久礲口深遠準其封閉乾隆元年題準貴州遵義縣屬之小洪關鉛厰硐老山空開採無益準其封閉又覆準廣西恭城縣屬之申家猺禾木嶺等礦厰礲深砂薄收課有限準其封閉二年題準廣西懐集縣屬汶塘山礦厰各礲無砂又臨桂縣屬之水槽野雞二處礦厰開採年久礲老砂微均準封閉又題準貴州大定府屬之馬鬃嶺鉛厰普安縣屬之丁頭山鉛厰開採年久硐老山空均準封閉又覆準廣西宣化縣屬之淥生嶺鉛礦試採有效準其開採三年題準廣東開採礦厰原為鼓鑄需銅起見應責成地方官詳細察勘辨明砂色如果實繫産銅山礦始準結報開採其金銀等礦悉行封閉至黑鉛即繫銀母未便䝉溷開採應嚴行禁止其各州縣礦山原屬多寡不等應招募總副各商務責本地殷實良民自備資本赴厰開採不許外省游手閒民溷雜冒充所收銅鉛除照例二八收課外仍将所餘銅鉛每百斤别收三釐又加收三斤以備般運折耗及在厰官役養廉工食之用每年所收課餘銅鉛並動用工本等項照例造册題銷四年奏準山西絳州垣曲縣之毛家灣銅礦苖線旺盛四至均無關礙地方準其開採其鍊出銅照例收課又題準廣東英徳縣屬長崗嶺等山陽春縣屬鸚鵡等山歸善縣屬石門仔等山永安縣屬慶牛窩等山曲江縣屬礬峝蘆溪等山大埔縣屬東山下坑等山愽羅縣屬分水凹等山準其開採所出銅照例收課又題準貴州綏陽縣月亮巖地方産有鉛礦無干礙田園廬墓照例開採收課五年題準廣東原有錫山應酌開三四處即令辦銅各商自備工資分任採辦凡得錫百斤照例二八收課以二十斤交官起解以八十斤歸商作本準其開採又題準雲南羅平州屬卑淅塊澤二厰自停止官收以來外省鉛價日賤既無客販來厰收買鑪戸運銷變售殊難暫行封閉六年題準山西垣曲縣毛家灣銅礦礦砂淡薄開採無益準其封閉又題準貴州威寧州屬銅川河厰産有銅礦準其開採照例二八收課又題準雲南羅平州之卑淅塊澤二鉛厰準其照例開採七年題準四川建昌道所屬之迤北沙溝紫古哵三銅厰川東所轄雲陽界連奉節縣之銅鉛礦厰永寧道所轄長寧縣之茶山溝鉛山並無妨礙田園廬舍準其開採又題準四川會川所屬之沙溝嶺銅鉛並産仍準開採又題準貴州威寧州屬銅川河銅礦並無干礙民間田園盧墓採試有效題請開採每銅百斤收課十斤又奏準黔省思州府屬楓香厰出産黑鉛礦砂勘明無礙民間田墓應行開採又題準廣東曲江英徳歸善愽羅永安大埔陽春等縣之銅山準其封閉又題準開採廣西恭城縣山斗岡銅礦每百斤收課十斤九年題準廣東廣州府增城縣大竹坋井底鉛礦應行試採又題準封閉四川長寧縣茶山溝鉛礦十年題準湖廣宜都縣横磧漢洋二處鐵礦並無妨礙準其開採以資器用二八收課變價解司又題準四川建昌紅銅各厰見採獲銅尚不足鼓鑄勢難又為酌撥㸃化白銅請将黎溪白銅一厰暫行封閉竢各厰紅銅盛旺鼓鑄有餘時再請開採又題準福建延平府屬州縣所轄山場均産鐵砂準鑪戸設鑪開扇照例收課又題準廣西開採各屬銅厰除二八收課外商民所獲餘銅若照部定九兩二錢之價官買商民難免賠墊請将動帑收買餘銅槩行停止其各屬銅厰改為三七收課餘銅聼商自行售賣試行一年如果敷用即永遠辦理倘或不敷再為設法變通又題準四川川東道屬雲陽界連奉節各銅鉛礦厰永寧道屬之長寧鉛厰苖絶準其封閉又題準貴州各厰除收課外每餘鉛百斤鑪民所得收買價銀一兩三錢不敷工本食用之費将蓮花砂硃二厰餘鉛於向定官價一兩三錢外酌增銀二錢每百斤以一兩五錢收買又題準貴州水城通判所屬之猓本底地方産有鉛礦並無干礙田園廬墓似可開採請照蓮花厰之例每鉛百斤收課二十斤每百斤定價一兩五錢變價解庫辦事人役工食等項每月開銷銀三十兩六錢又題準貴州普安州屬之羅朋地方産有鉛礦並無干礙田園廬墓試採有效準其開採嚴飭管厰人員據實開報照例二八收課又題準貴州都匀府丹江所屬之濟川地方産有鉛礦並無干礙田園廬墓似可開採每鉛百斤收税二十斤變價解庫辦事人役工食等項每月開銷三十兩六錢增設廵役八名統於課鉛變價項下開支又題準廣西平樂府恭城縣屬豬頭嶺鉛礦並無干礙田園廬墓發鑪煎鍊成鉛鉛内又分出銀及蜜陀僧照例每鍊鉛百斤收正課二十斤撤散三斤每銀一兩收正課銀一錢五分撤散三分蜜陀僧每百斤收正課二十斤撤散三斤準其開採十年題準廣東韶州府英徳縣洪磜山銅礦應行試採十一年題準四川開採沙溝紫古哵銅厰長寧鉛厰内煎獲銀委官煎驗分晰銀銅鉛計算有虧商本仍以二八收課竢将來礦砂旺盛仍照四六收課又題準福建尤溪縣鐵鑪户歲納課銀十有四兩三錢有竒今勘明鑪戸資本消耗山場柴炭皆盡無人承頂所升課銀準其豁除又奏準廣西銅厰開採年久礲路深遠採取維艱原與從前情形不同工費實属浩繁若照原定二八收課每餘銅百斤給價八兩三錢及九兩二錢之數收買實在不敷商本準以十有三兩之價作為定價收買竢将來礦厰旺盛銅鉛充裕之日據實覈減題報将餘銅收買一半其一半給商自行售賣又題準貴州水城所屬法都地方産有鉛礦照猓木底厰之例準其開採又奏準廣東開採銅鉛礦厰每鉛百斤除徴收課鉛公費外餘鉛七十斤以三十五斤交官給價收買其餘三十五斤聼商自行售賣以濟各商工本又題準貴州思州府屬之楓香黑鉛礦厰礦砂淡薄準其封閉又題準封閉廣東增城縣大竹坋井底鉛礦十二年題準開採貴州威寧州屬大化里新寨地方銀鉛礦砂每出鉛百斤收課二十斤餘鉛歸官收買每百斤給價銀一兩五錢又題準貴州綏陽縣月亮巖坪鉛厰衰微準其封閉又題準貴州思南府屬之天星扒泥洞出産白鉛礦砂並無干礙民間田園廬墓悉照濟川厰之例開採又奏準雲南祿勸州接壤之多那厰復行開採照湯丹厰例收課每餘銅百斤給銀六兩即作湯丹厰子厰報銷又題準封閉廣東英徳縣洪磜山銅礦十四年奏準開採粤西賀縣所屬百應山銅厰抽收課餘之銅按年造報又題準封閉貴州大化新寨地方礦厰又題準封閉廣西恭城縣豬頭嶺鉛礦十五年題準封閉普安州屬羅朋鉛厰又題準封閉貴州天星扒鉛厰又奏準浙江處州府屬之雲和松陽遂昌青田温州府屬之永嘉平陽以及附近平邑淘洗之泰順等縣向有産鐵砂坑今覆明坑户十有五鑪户五十有九坑課酌分三則上則徴銀一兩六錢中則一兩二錢下則八錢鑪餉酌分二則上則徴銀六錢下則三錢歲徴銀共五十八兩令地方官造入奏銷册報部至洗鐵溪河易於淤塞每坑歲繳銀四錢以為疏濬之用又每鐵百斤輸銀一釐以供給票紙張之費十六年題準貴州水城通判所屬之猓木底鉛厰年來礦砂已微應準封閉其附近之茨沖地方産鉛甚旺應移於該處開採照例二八收課每百斤以一兩五錢變價解庫又議準貴州威寧州屬勺彔地方産有銅礦應準開採一九收課餘銅每百斤給價銀八兩官為收買以供鼓鑄之用辦事人役月支銀十兩五錢於所收課銅内變價按名給發十七年題準廣西賀縣所屬之百應山出砂微薄應準封閉又題準四川威遠縣屬之大山嶺鐵鑪溝二處準其開採每十斤收課二斤每斤變價銀二分又覆準浙江永嘉平陽坑鑪等戸及泰順鑪戸因産鐵無多不能徴輸上中課餉準照原定下則徴收其雲邑課餉科則仍照原報徴收至永嘉平陽二縣淘沙坑户與河道無渉免其輸納其松陽遂昌各坑户應徴課銀及濬河銀每年於奏銷課餉册内分晰造報又題準湖南郴州所屬之東沖柿竹園試採錫砂甚旺應令該州州判專司其事照例開採每鍊錫百斤收課二十斤撒散四斤餘錫盡數收買同正課撒散一并解交省局以備鼓鑄又題準四川榮經縣之呂家溝出産銅砂礦苖旺盛見可開採每淨銅百斤照例收課二十斤耗四斤八兩餘銅半給商賣半歸官買每百斤照依商本給價銀九兩八錢又題準廣西思恩縣幹峝山黑鉛礦自乾隆十二年十一月至十六年正月開採已有成效每百斤收課二十斤撒散三斤近又産白鉛礦更加旺盛照例收課撒散至本省鼓鑄需用白鉛若僅資課鉛仍屬無多應将商人所得餘鉛以一半歸官收買同課鉛隨時解司以供鼓鑄一半聼商自賣歸本十八年題準四川天全州屬之大川厰銅礦準其開採每銅百斤照例收課二十斤耗四斤八兩餘銅半歸官買以供鼓鑄又議準川省冕寧縣沙雞鉛厰準照銅厰之例書一收課每淨鉛百斤收正課二十斤收耗鉛四斤八兩餘鉛盡歸官買每百斤給銀一兩六錢又題準雲南祿勸等州縣既出黑鉛應準其開採每百斤收課二十斤以十斤變價充餉五斤變價解司充公五斤為管厰官役養廉工食其收買價直多寶發咱妥妥等三厰每百斤給銀一兩八錢金雞厰一兩六錢二分一水銀硃砂雄黄礦課舊例貴州額徴開州用砂厰水銀千二百六十九斤遇閏加一百三十三斤有竒婺川縣婺川厰徴水銀一百六十九斤有竒均照時價變賣貯庫造册報部康熈元年定貴省開州斗甫厰徴水銀九十五斤遇閏加十斤各有竒又普安縣橋厰招民開採徴水銀三百三十三斤七年題準貴省開州斗甫婺川普安四厰連閏徴收水銀變價撥充本省兵餉九年覆準貴州黔西州屬新開黄土坎厰徴水銀百斤三十八年覆準開州用砂斗甫二厰山頽砂盡改於修文縣紅白巖地方開採辦課雍正元年覆準貴州普安縣濫水橋水銀厰委修文普安二縣恊同管理其修文縣屬水銀厰年久砂淡額課銀六百五十餘兩丁逃難辦将普安縣報解水銀價銀一百六十兩移解修文額課又覆準貴州版厰水銀額課八十兩七錢在濫水厰徴收盈餘銀内抵補其版厰原額即行豁除五年覆準貴州濫水厰水銀税羡銀自本年五月起盡數報部充餉八年題準貴州大定府屬開採硃砂雄黄二厰均照例二八收課又題準廣西恩城土州開採硃砂礦厰照例收課又題準廣西南寧府屬果化土州産有雄黄準其開採乾隆二年覆準廣西恩城土州硃砂礦厰見今止有一二礲口其餘絲毫無獲準其封閉五年題準廣西南寧府屬果化土州雄黄礦厰開採年久礲深礦竭準其封閉十二年覆準廣西鎭安府屬天寶縣孟村淥因礦厰被水難以煎熬移於天寶縣屬之那坡山開採欽定大清㑹典則例卷四十九
