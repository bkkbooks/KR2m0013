太常寺等衙門執事各官照舊先入各司其事外其陪祀大小官員均豫於門外齊集太廟候午門嚴鼓社稷候午門鳴鐘天壇地壇各壇廟候齋宫鳴鐘時方許以次入內排班拱候如有先入及登階觀望者察出參劾又奏準各祭祀之期令鴻臚寺於陪祀官行禮之處豫設品級木牌俾按次序立行禮不致錯亂班次四年奏準致祭城外城內壇廟太常寺行文步軍統領早啓城門以便陪祀各官隨班行禮五年奏準每逢祭祀於陳設祭品之後即令御史會同太常寺官遍行巡察凡陪祀執事各官如有壇廟內涕唾咳嗽談笑喧譁者無論宗室覺羅大臣官員即指名題參六年議準祀日壇皇帝入北門時北班陪祀各官就甬道之西東面立祀月壇北班陪祀各官就甬道之東西面立俟皇帝嚮壇各就班次饗先農壇東班陪祀各官於皇帝入東門之前就甬道之南北面立俟皇帝嚮壇各就班次七年議準大祀天地先祀一日皇帝御齋宫祀日親王以下輔國公以上均於五鼓具朝服赴壇於降輦鋪棕薦處候駕未入八分公暨宗室鎮國將軍以下奉恩將軍以上均五鼓具朝服赴壇按翼排班序立八旗滿洲蒙古漢軍公侯伯以下輕車都尉佐領以上滿漢尚書以下員外郎並員外郎品級官以上漢武官冠軍使參將遊擊以上外任來京官文職督撫以下道府以上武職將軍都統以下協領副將以上均由壇外齋宿處赴壇齊集陪祀如遣官恭代親王以下入八分公以上暨內大臣侍衛不陪祀文武各官咸陪祀太廟社稷以下陪祀王公暨文官郎中並郎中品級官以上武官輕車都尉以上漢武官遊擊以上陪祀均如前例八年議準郊壇祭祀先期一日皇帝詣齋宫是日申酉時並祭日五鼓應稽察齋戒衙門均於壇門外收職名陪祀官齊赴投遞餘祀本日於門外收職名亦如之十三年諭致祭齊集之處向來皆收職名因日久茍且塞責並不按名稽察前往齊集之王公大小官員遂漫不為事怠惰成習嗣後如何委官按名嚴察不致遺漏著宗人府吏部兵部都察院會同詳細妥議具奏欽此遵旨議準王公由宗人府委官開列名單於齊集處稽察其已到者於名單內加圈鎮國將軍以下至宗室官員由宗人府文職由吏部武職由兵部開列職名咨送都察院稽察吏部滿漢官亦由都察院稽察宗人府吏部兵部都察院各繕名摺具奏其因他處齊集不能到者於摺內聲明緣由無故不到者參處若册內緣故不符或開列齊集而不投遞職名稽察官呈明參奏倘該員不行詳察及察出瞻徇不呈參者一并參處至齊集之日臨期有患病等情亦必聲明緣由知照稽察衙門不陪祀之親王以下宗室覺羅有頂帶官員以上滿漢文職京營武職有頂帶官員以上外藩來京蒙古王以下台吉以上均於祀日五鼓朝服赴午門外按翼齊集候駕出入跪送跪迎一恭請神牌順治四年定恭奉太廟神牌用大學士尚書都統康熙九年題準太廟恭奉神牌後殿用覺羅官前殿用侍衛雍正十一年奏準饗太廟奉神牌請照奉先殿用內務府官之例用太常寺官乾隆元年奏準各壇廟祭祀均於質明行事向來太常寺官於曉鐘時即請神牌安設俟皇帝駕至行禮嗣後祭天地祈穀應俟齋宫鳴鐘時請神牌各祭於皇帝降輿時請神牌皇帝駕至均於幄次內恭候奉安神位畢太常寺堂官奏請行禮七年奏準向例各壇廟供奉神牌每月朔望奉祀官詣殿上香嗣後凡天壇祈穀壇地壇太廟每月朔望前一日仍令看守各官啓殿拂拭神幄屆期太常寺堂官各一人上香行禮以昭誠敬其餘壇廟均令奉祀官行禮十四年奏準祭日請送神牌向用太常祀官恭奉嗣後請令禮部尚書一人上香行禮其恭奉神牌仍用太常寺官太廟神牌用宗室覺羅官恭奉其上香行禮令宗人府王公暨朔望上香之王公內每祭以二人將事一執事侍儀順治八年定凡親祭壇廟恭接福胙均用侍衛十六年定凡恭奉福胙均用禮部官康熙十年題準每饗太廟後殿獻爵用覺羅官親詣致祭前殿獻爵接福胙用侍衛餘執事用太常寺官其各壇廟皇帝親祭接福胙均用侍衛餘執事用太常寺滿漢官又題準凡祭各壇廟親詣行禮應用光祿寺堂官恭奉福胙雍正五年奉旨嗣後大祭祀太常寺官有不敷用移取鴻臚寺官七年諭聞祭祀之先太常寺即於壇廟中演禮雖義取嫻熟禮儀實非潔齋嚴肅之道嗣後應於何處演禮著禮部議奏遵旨議準向來各祭祀皆於前二日赴天壇凝禧殿演禮前期一日復至各壇廟中演禮嗣後應令執事等官均以前二日演禮於凝禧殿停其前一日赴壇廟演禮十一年奏準向例太廟獻爵用侍衛獻帛用太常寺官請照奉先殿制饗太廟獻帛爵均用侍衛乾隆元年議準太廟奠帛獻爵用宗室侍衛四十人宗室將軍官員二十人分班奠帛獻爵三年奏準增宗室將軍六人九年議準太廟後殿獻爵用覺羅官二十四人十年奏準朔望太廟上香欽點王貝勒貝子公專司其事十二年諭向來祭饗太廟獻爵奠帛用侍衛及太常寺官朕御極後悉令用宗室人員蓋因宗支繁衍實惟祖德所詒一氣感孚昭格尤為親切且使駿奔走執豆籩有事為榮亦得服習禮儀陶鎔氣質意蓋有在但演習禮節太常寺實所專司宗室既非所屬未必聽其指使嗣後每逢祭祀之期著令宗人府王公一人前往監視俾進退優嫺執事有恪以昭誠敬欽此十四年諭稽古虞書秩宗典三禮周官宗伯掌邦禮而首以吉禮事邦國之鬼神示春官典祀職莫重焉乃者郊壇宗廟以太常為專司而禮部堂官不蒞其事非古也治神人和上下敬服乃職其所有事者何在大學士會同該部並會典館總裁官詳議以聞欽此遵旨議準兩郊大祀皇帝先期躬省壇位親閲籩豆禮部尚書侍郎皆陪從侍儀視牲省牲仍照例題請宗廟社稷日月先農各壇前代帝王先師孔子廟祭前期省牲及祭日視陳簠簋籩豆均以禮部堂官一人敬率太常卿等將事以昭嚴恪再壇廟內躬親對越之地並用禮部堂官二人都察院堂官二人分立東西侍儀以隆體制其陪祀王公百官行禮處監禮仍用御史禮部司官一祭告凡登極上尊號徽號加上徽號皇太后聖壽大慶萬壽聖節大慶册立皇太子均先期遣官祗告天地宗廟社稷並致祭嶽鎮海瀆前代帝王陵寢先師闕里大婚册立皇后先期祗告天地太廟尊封太妃册封皇貴妃貴妃妃嬪祗告太廟後殿奉先殿升祔太廟配饗郊壇遣官祗告天地宗廟社稷並致祭前代帝王陵寢先師闕里追上尊諡廟號加上尊諡奉移梓宫建造陵寢奉安地宫遣官祗告天地太廟後殿奉先殿社稷並致祭陵寢几筵后土陵山親征命將遣官祗告天地宗廟社稷太嵗火炮道路之神大軍凱旋平定邊徼並祗告奉先殿致祭陵寢釋奠於太學致祭嶽鎮海瀆前代帝王陵寢先師闕里皇帝展謁陵寢及巡狩方嶽均祗告奉先殿回鑾至京同皇帝巡幸所至親祭方嶽未至之地特命督撫就近遴委大員遍祭嶽鎮海瀆所過名山大川分遣筆帖式由京齎送祭文香帛帝王陵寢先聖先賢忠烈祠墓前代暨本朝名臣在三十里以內者均遣官致祭詳見幸巡典則嵗暮祫祭功臣配廟皆先期祗告太廟中殿後殿躬耕藉田祗告奉先殿皇帝御經筵祗告奉先殿傳心殿修建郊壇太廟奉先殿宫殿御新宫均遣官祗告天地宗廟社稷興工破土安磉石合龍安門均遣官致祭后土司工之神迎吻祭琉璃窰並經過之壇廟正門皇城紫禁城各門如修建嶽鎮海瀆及諸神廟宇特頒御書並遣官懸匾致祭嵗旱祈雨遣官祗告天神地祇太嵗越七日祭告社稷壇三復不雨乃行大雩禮以上各祭告祝文均由翰林院撰擬香帛祭品由太常寺承辦遣祭外省應用祭品由所在地方官敬謹辦理嶽鎮海瀆遣致祭官共九人北鎮一人長白山北海一人東嶽東鎮一人西嶽西鎮江瀆一人中嶽淮瀆濟瀆一人南嶽一人北嶽中鎮西海河瀆一人南鎮一人南海一人帝王陵寢先師闕里遣致祭官共八人太昊商高宗漢光武帝周世宗宋太祖太宗真宗仁宗陵一人神農帝舜陵一人女媧商湯陵一人黃帝周文王武王成王康王漢高祖文帝宣帝後魏孝文帝唐高祖太宗憲宗宣宗陵一人少昊帝堯陵先師闕里一人顓頊帝嚳商中宗金太祖世宗元太祖世祖明宣宗孝宗世宗陵一人夏禹王明太祖陵一人遼太祖陵一人各用典守香帛祭文筆帖式一人其專祭帝王陵寢先師闕里者帝王陵遣官八人闕里專遣官一人均由部開列侍郎以下四品堂官以上職名恭候欽命兵部給與勘合各給欽差牌御仗龍旗黃繖欽天監選擇吉日屆期陳祭文香帛於中和殿恭請皇帝親閲遣行如不親閲本部堂官謹閲祭文香帛實封陳於本部堂上堂官一人具朝服祗授承祭官交筆帖式齎奉前往欽定大清會典則例卷七十五
