body:
  text: 禮部祠祭清吏司祭統一凡祀分三等圜丘方澤祈穀雩祀太廟社稷為大祀日月前代帝王先師孔子先農先蠶天神地祇太歲為中祀先醫關帝火神北極佑聖真君東嶽都城隍黑龍潭玉泉山等廟炮神司土司工窰神倉神門神賢良祠昭忠祠雙忠祠定南武壯王孔有德果毅公諡宏毅額宜都果毅公諡恪僖遏必隆大學士忠達公諡文襄圖海定南將軍承恩公諡勤襄佟圖賴安北將軍承恩公諡忠勇佟國綱內大臣承恩公諡端純佟國維內大臣承恩公諡恪僖哈什屯尚書承恩公諡敏果米思翰承恩公諡莊慤李榮保等祠為羣祀一按期題請郊廟祭祀於前二歲之十月由部劄欽天監按祀典應卜日者豫擇吉期册開送部由部於前一嵗之正月開列所選吉日並諸祀之歲有定日者具疏以聞命下通行直省一例遵行劄行太常寺按祀期豫行題奏乾隆十四年奏準每嵗各祭祀嗣後由禮部劄行欽天監恭選吉期具題奉旨之後交太常寺按期豫行題請以符周禮大宗伯卜日肆師以嵗時序祭祀之義一齋戒由部行文吏兵二部轉行文武衙門將應入齋戒職名於祭祀前十日開送太常寺宗室鎮國將軍以下奉恩將軍以上宗室覺羅都統以下參領輕車都尉佐領以上文職覺羅尚書以下員外郎並員外郎品級官以上均由宗人府開送八旗滿洲蒙古漢軍公侯伯以下輕車都尉佐領以上滿漢文職大學士以下員外郎並員外郎品級官以上均由吏部開送漢武職冠軍使由鑾儀衛參將遊擊由步軍統領衙門開送齋戒日不理刑名不辦事有緊要事仍辦不燕會不聽音樂不入內寢不問疾弔喪不飲酒不食蔥韭薤蒜不祈禱不祭神不掃墓前期一日沐浴有炙艾體氣殘疾瘡毒未愈者皆不陪祀順治八年定大祀致齋三日中祀致齋二日各衙門均設齋戒木牌十四年世祖章皇帝大祀圜丘在大內致齋二日在壇內齋宫致齋一日陪祀各官均赴壇齋宿康熙三十二年題準陪祀致齋各官有期服者一年不得與齋戒大功小功緦麻殁在京師者一月不得與齋戒在京聞訃者十日不得與齋戒雍正五年諭壇廟祭祀理宜潔淨齋戒嗣後命御史二人各部院衙門司官二人每旗賢能官各一人內務府官二人三旗侍衛二人前往壇內稽察其齋戒臨近時將旗下大臣職名具奏朕酌量遣往稽察欽此又議準應齋戒陪祀各官遇有期年以下之服該衙門豫咨都察院注册臨祭祀時復咨都察院對册有揑報者題參九年議準六科給事中監察御史凡遇祭祀咸令齋戒十年諭國家典禮首重祭祀每齋戒日期必檢束身心竭誠致敬不稍放逸始可以嚴昭事而格神明朕遇齋戒之日至誠至敬不但殿庭安設銅人即坐臥之處亦書齋戒牌存心警惕須臾弗忘至內外大小官員雖設齋戒牌於官署但恐言動起居之際稍有褻慢即非致齋嚴肅之義考明代祀典凡陪祀及執事之人有懸祀牌之例今酌定齋牌之式令陪祀各官佩著心胸之間使觸目警心恪恭罔懈並得彼此觀瞻益加省惕其於明禋大典愈昭虔潔著傳諭各部院八旗並直省文武官一例遵行欽此又奏準大祀中祀凡親詣行禮太常寺先期行文左右兩翼前鋒統領下五旗護軍統領將應齋戒之前鋒統領護軍統領暨前鋒參領護軍參領對品之署副護軍參領等各職名詳悉開送太常寺以便散給齋牌十一年覆準向例各衙門齋戒官職名皆先期行文太常寺轉送都察院稽察但稽察齋戒大臣無齋戒官職名無慿稽察嗣後齋戒之期各部院及八旗齋戒官除照舊知會太常寺轉送都察院外再造册一本並送該寺存貯俟欽點八旗大臣後令赴寺領取按册稽察如各衙門八旗不豫造册移送者著稽察齋戒大臣參奏交與該部將經管造册官照例議處又覆準文武官有署理協辦兼幾處行走者或在本任衙門或在署理協辦衙門齋宿於册送太常寺時注明册內以便稽察乾隆元年議準太廟社稷均繫大祀應照天地祈穀之例凡陪祀執事各官均令在該衙門齋宿稽察齋戒大臣侍衛嚴行稽察七年議準外省文職自督撫以下道府以上武職自將軍都統副都統提鎮以下協領參將以上見任來京凡值祭祀耕藉之期各由吏部兵部先期取齋戒職名照例咨部及太常寺或偶因事故不能從祀者準於册內注明其陪祀之人於應齋戒日期均在附近地方齋宿仍於職名下聲明齋所以便稽察屆期投遞職名又議準大祀天地皇帝於大內致齋二日壇內齋宫致齋一日王以下公以上均於府第齋戒二日壇外齋宿一日宗室奉恩將軍以上在該衙門齋戒二日壇外齋宿一日八旗滿洲蒙古漢軍輕車都尉佐領以上滿漢文職員外郎並員外郎品級官以上漢武職冠軍使參將遊擊以上均在部院衙門及各該衙門齋宿二日外任來京官文職道府以上武職協領副將以上在附近地方齋宿二日前祀一日各赴壇外齋宿如遣官恭代王公不齋戒各官在署致齋三日饗太廟祭社稷王公在府第致齋三日文官郎中並郎中品級官以上武官冠軍使輕車都尉參將遊擊以上在署齋戒三日日月前代帝王先師先農之祭王公在府第致齋二日文武各官在私第齋戒二日遣官致祭王公均不致齋乾隆七年初建先蠶壇皇后親饗先蠶之神致齋二日固倫公主福晉以下鄉君鎮國公夫人以上文官副都御史命婦武官二品大臣命婦以上無事故者均陪祀由內務府移各該衙門知照本人於前期二日齋戒屆期詣壇行禮如遣妃致祭公主福晉命婦致齋同十四年諭凡遇齋戒有衙署之大臣皆在各該衙門齋宿侍衛在侍衛教場齋宿此定例也近來有衙署之大臣內往往因兼別任不在該衙門齋宿而別尋他處齋宿者侍衛等尚有稽察之人大臣等不在公所齋宿其他處則稽察所不到雖云尋他處齋宿究與在家何異凡祭祀齋宿者特以將其潔敬之意所關甚巨此皆日久漸滋之陋習嗣後凡遇齋戒有衙署之大臣雖兼別職務著在各該衙門齋宿其無衙署之領侍衛內大臣散秩大臣等著在紫禁城內齋宿違者經朕察出定行治罪御前侍衛等亦著在紫禁城內齋宿欽此十九年奏準大祀天地頒敕羣臣在京各衙門豫書於版凡有事於圜丘方澤祈穀雩祭均前期三日陳設公署正堂各官致齋以俟陪祀及恭與執事一御齋宫乾隆七年諭朕惟郊壇祭祀必致誠敬以薦明禋歷來前期齋戒悉遵舊制往宿別殿今郊壇建有齋宫若於致祭之期親詣齋宫更為祗肅該部詳酌妥議具奏欽此又諭天壇地壇舊制建有齋宫年久傾圯未經繕修朕意於大祀前期致誠赴壇齋宿行禮其應如何修建之處該部即前往相視繪圖呈覽至興修之時著委內務府熟諳工程之人仍會同工部太常寺委官一同監修欽此又諭日月壇舊有之具服殿該部亦前往相視應作如何修理詳細妥議具奏欽此遵旨議準圜丘祈穀二壇共有齋宫一所方澤壇先農壇各有齋宫一所日月壇各有具服殿一所圜丘祈穀方澤如遇親詣行禮應於別殿齋戒二日齋宫一日或遣官恭代亦令該承祭官詣壇齋宿日月先農等壇均繫中祀致齋二日如遇親詣行禮止於別殿齋戒至應行修葺之處交與該衙門敬謹辦理一玉六等冬日至大祀圜丘孟春祈穀孟夏常雩用蒼璧夏日至大祭方澤用黃琮朝日赤璧夕月白璧均貯太常寺庫中祭社黃圭祭稷青圭貯本壇神庫均祭則陳之既事藏之一制帛七等冬日至祀天於圜丘用郊祀制帛十有二遇告祀用告祀制帛一色均青配位奉先制帛各一色白大明位禮神制帛一色赤夜明位禮神制帛一色白星辰位禮神制帛十有一色青赤黃黑各一白七雲雨風雷位禮神制帛四色青白黑黃各一祈穀雩祀均用告祀制帛一色青配位從壇帛均與冬日至大祀同夏日至祭地於方澤用郊祀制帛一遇祭告用告祀制帛一色均黃配位奉先制帛各一色白五嶽五鎮禮神制帛五青赤黃白黑各一五陵山禮神制帛五色白四海禮神制帛四各如其方色四瀆禮神制帛四色黑饗太廟每位用奉先制帛一東廡每位展親制帛一西廡每位報功制帛一色皆白祭社稷禮神制帛四色黑朝日禮神制帛一色赤夕月禮神制帛一色白從壇禮神制帛十有一色青赤黃黑各一白七饗前代帝王每位禮神制帛一色白兩廡每位素帛一饗先師正位暨四配禮神制帛各一十二哲兩廡均分東西禮神制帛各一色皆白崇聖祠正位每位用禮神制帛一配位東西共禮神制帛四兩廡禮神制帛各一色皆白饗先農先蠶均禮神制帛一色青祀天神祭地祇雲雨風雷為四壇禮神制帛四色青白黑黃各一嶽鎮五陵山海瀆為五壇京畿名山大川及天下名山大川為四壇禮神制帛二十有七色青三赤三黃二黑七白十有二祀太歲正位禮神制帛一兩廡四壇每壇一案每案禮神制帛三色皆白祭先醫正位禮神制帛三色皆白配位東西廡共素帛四關帝城隍北極佑聖真君東嶽等廟各用禮神制帛一色皆白火神廟用禮神制帛一色赤賢良祠及配位均用素帛各一昭忠祠雙忠祠定南武壯王祠及配位用報功帛各一餘均素帛各一一牲四等冬日至大祀圜丘夏日至大祭方澤孟春祈穀孟夏雩祀均用犢四從壇大明夜明用特星辰雲雨風雷嶽鎮海瀆用太牢太廟正殿及東廡社稷壇日壇月壇前代帝王先師先農先蠶神祇太嵗先醫廟正位關帝城隍火神東嶽均用太牢太廟西廡前代帝王廟兩廡文廟四配崇聖祠關帝廟後室炮神后土司工之神窰神倉神門神賢良祠昭忠祠雙忠祠定南武壯王等祠均用少牢一樂四等順治元年奏準圜丘九奏方澤八奏太廟六奏社稷七奏前代帝王先師太嵗各六奏均用平字為樂章佳名日壇七奏用曦字月壇六奏用光字先農壇七奏用豐字乾隆七年奏準先蠶壇六奏樂章用平字又奏準祈禱社稷壇樂七奏神祇壇太嵗殿樂六奏樂章均用豐字一佾舞天地太廟社稷日月前代帝王先農神祇太嵗舞皆八佾文舞生六十四人武舞生六十四人先師廟六佾文舞生三十六人先蠶壇不用佾舞樂無鐘磬餘祭均無佾舞一祝版天壇純青紙朱書地壇黃紙黃緣墨書太廟社稷壇均白紙黃緣墨書日壇純朱紙朱書月壇白紙黃緣墨書前代帝王先師先農先蠶先醫太歲關帝城隍火神東嶽北極佑聖真君等祭祀均白紙黃緣墨書炮神窰神倉神門神賢良祠昭忠祠雙忠祠定南武壯王等祠均白紙墨書一祭器乾隆十二年諭國家敬天尊祖禮備樂和品物具陳告豐告潔所以將誠敬昭典則也考之前古籩豆簠簋諸祭器或用金玉以示貴重或用陶匏以崇質素各有精義存乎其間歷代相承去古寖逺至明洪武時更定舊章祭品祭器悉遵古而祭器以瓷代之惟存其名我朝壇廟陳設祭品器亦用瓷蓋沿前明之舊皇考世宗憲皇帝時考按經典範銅為器頒之闕里俾為世守曾宣示廷臣穆然見古先遺則朕思壇廟祭品既遵用古名則祭器亦應悉用古制以備隆儀著大學士會同該部稽核經圖審其名物度數制作款式折衷至當詳議繪圖以聞朕將親為審定敕所司敬謹製造用光禋祀稱朕意焉欽此遵旨議準凡祭之籩以竹絲編造用絹為裏髤漆郊壇之籩純漆太廟畫以文采豆登簠簋郊壇用陶太廟之豆與簠簋皆用木髤漆飾以金玉登亦用陶鉶則範銅而飾以金貯酒以尊郊壇之尊用陶太廟春用犧尊夏象尊秋著尊冬壺尊嵗暮大祫用山尊均範銅為之獻酌以爵圜丘祈穀常雩方澤諸大祀用匏因其自然承以檀香墊座如爵之制不雕不琢以昭尚質之義太廟爵用玉兩廡用陶社稷正位用玉爵一陶爵二配位用陶日月先農先蠶各壇之爵社稷日月先農先蠶各壇豆登簠簋鉶尊均用陶前代帝王先師及諸人鬼之祭所用豆及登