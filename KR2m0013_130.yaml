body:
  text: 工部營繕清吏司宫殿一營建宫殿順治元年定鼎燕京上大清門牌額二年定正中三殿名殿前曰太和門門之左曰昭德門右曰貞度門東廡之中曰協和門西廡之中曰雍和門太和門之後曰太和殿殿之左曰中左門右曰中右門東廡之中曰體仁閣西廡之中曰𢎞義閣體仁閣之北曰左翼門𢎞義閣之北曰右翼門太和殿後曰中和殿中和殿後曰保和殿殿之左曰後左門右曰後右門四年建午門翼以兩觀中三門東西為左右掖門八年建承天門工成改為天安門十年建慈寧宮十二年重建内宮前曰乾清門東垣之中曰景運門西垣之中曰隆宗門乾清門之内曰乾清宮宮後曰交泰殿殿後曰坤寧宮宮後曰坤寧門坤寧宮之東曰景仁宮承乾宮鍾粹宮西曰永壽宮翊坤宮儲秀宮十四年建奉先殿康熙六年建端門八年重建太和殿乾清宮是年迎坤寧宮吻安交泰殿金頂十八年重建奉先殿二十一年建咸安宮二十二年建文華殿是年建啓祥宮長春宮咸福宮二十五年建延禧宮永和宮景陽宮二十七年建寧壽宮三十四年重建太和殿三十六年重建東暖殿西暖殿承乾宮永壽宮乾隆元年改雍和門曰熙和門十六年改咸安宮為壽安宮一監修宮殿順治十二年覆準凡建造宮殿所司先期具工程上請勅下工部會同科道估計以防侵冒又定修造宮殿竪柱上梁合龍懸匾均請旨遣大臣祭告需用花紅戸工二部支給迎吻遣官一人祭吻於琉璃窰並遣官四人於正陽門大清門午門太和門祭告文官四品以上武官三品以上及科道官排班迎吻各壇廟等工迎吻及祭經由之門均如之是年重建乾清宮坤寧宮交泰殿令八旗滿洲䝉古漢軍每佐領下出工匠一名夫四名管押各匠夫滿洲每旗差管工官一人驍騎校一人每㕘領差領催一名䝉古漢軍每旗差驍騎校一人每叅領差領催一名由部委滿司官四人漢軍司官二人漢司官二人筆帖式五人又題準增委内務府官一人同部委司官筆帖式及内監通事等協同管理又題準五城匠役各委司坊官一人察管其直隸山東山西解到匠役順天府委佐貳官一人協同本部監督官稽察康熙十年題準内廷應用匠夫物料據内務府印文照數給發其紫禁城皇城内一應工程由部確估具題修理如不及千兩由部酌定修理開明物料及需用錢糧行文内務府委官會部監修十八年諭修建宮殿工程緊要每處應差官五人監造工部官員不敷差遣於五部各取賢能官五人及少卿科員開列引見欽此雍正九年奉旨修理紫禁城等工欽㸃王大臣督率内務府工部官員監造乾隆二年修奉先殿五年覆準修造宮殿及紫禁城皇城其工料銀百兩以上管工官將興工日期知㑹科道開工後將所用物料匠夫數目十日一開單移送陜西道御史不時赴工親勘工完總册報部細册移送陜西道會同工部察驗如物料丈尺不符科道會部題叅科道亦不得徇名失實倘興工之日身不親到工完之後又不據實詳察由部會同都察院叅奏再工程銷算或有不能依限完結縁由照例呈明展限由部移會科道察覈八年奉旨南面皇城並長安左右門上蒿草蔓生瓦片亦有脱損者著委官每年拔草苫補一次其東西北三面皇城著五年苫補一次十一年奏準一切工程惟午門以内乾清門以外殿宇並紫禁城皇城内外城垣有應修之處令各該處察勘報部其應急修者會同估計修理稍緩者於伏雨後確估覈修如工程過多一時難竣於冬季備料春融興工工完報部題銷十八年奏準皇城牆垣觀瞻所繫自應修葺完固向來雖間有隨時苫補之處因閱年久遠西南二面尚不甚至剝落東北二面損裂甚多若不加修補將來坍塌益滋糜費應逐段勘估分别修整再永定左安右安等門城牆亦多鹻損雖與城垣根基尚屬無礙但見有鹻入三四進者恐漸至坍塌則費用益多應一幷勘估隨委官詳勘皇城四面内外拆裂者二千三百二十三丈三尺剝落者一千三百二十三丈七尺如按尋常修造其應行拆砌者已至三分之二葺補段落僅止三分之一約覈工料銀二十七萬六千九百餘兩但葺補之處終屬新舊參差未能一式堅整猶恐數年後又將有坍塌之虞是應全行拆造約估工料銀三十一萬六千餘兩請於冬令備料分限四五年次第興修所需錢糧陸續由戸部支領工竣據實覈銷至永定左安右安等門城牆竢皇城工竣再行奏明辦理一工成恩賚順治三年太和殿告成在事滿漢官員各加職銜在工人員各賞朝衣皮裘鞾帽銀幣有差十年以慈寧宮告成照例叙賞有差十三年以乾清宮坤寧宮告成在事滿漢官員各加職銜康熙九年重修太和殿乾清宮告成滿漢各官分别在工久暫賞給鞍馬蟒段表裏匠役賞給銀布有差三十七年重建太和殿告成照九年例官員匠役賞給有差雍正十年修理紫禁城工竣監造王大臣官員紀錄有差乾隆三年重修奉先殿告成在工王大小官員加級紀錄各有差匠役由内務府工部量加賞給壇廟一規制圜丘在正陽門外制圓南嚮三成上成面徑五丈九尺高九尺二成面徑九丈高八尺一寸三成面徑十有二丈高八尺一寸每成面甎用一九七五陽數周圍䦨版及柱皆青色琉璃四出陛各九級白石為之内壝周九十七丈七尺五寸高八尺一寸厚二尺七寸五分四面皆三門楔閾皆制以石朱扉有櫺門外各石柱二綠色琉璃燔柴鑪一瘞坎一外壝方二百四丈八尺五寸高九尺一寸厚二尺七寸門制如前高用周尺餘用今尺下同皇穹宇在圜丘後制圓八柱旋轉重檐上安金頂基周十有三丈七寸高九尺䦨版高三尺六寸東西南三出陛各十有四級左右廡各五間一出陛皆七級殿廡闌檻均青色琉璃圍垣周五十六丈六尺八寸高丈有八寸門三南嚮壇外壝門外東北為神庫五間南嚮神㕑五間井亭一六角