陛砌青白石闌版用白石臺面鋪墁金甎二十年以平定準噶爾勒石於國學大成殿甬道之西又奏準日壇應行興修詳細確估計日壇一座内壝門六神庫神㕑各一井亭一祭器庫宰牲亭各一鐘樓一西北壇門各一牌坊一地面海墁散水甬路月臺燎鑪各垣牆等項均應照舊制修理完整至内垣原繫土牆應照天壇之式用甎兩面瓖砌以資鞏固外垣原髙七尺六寸今應增髙三尺並增砌大甬路二道二十一年奏準社稷壇年久應行重飾見新並於南門外左右增蓋看守房各三間街門内左右增蓋看守房各三間瘞坎舊在壇壝之内今移建於壇壝外西北隅又奏準社稷壇四面壝垣向以五色土隨方堊色請改為四色琉璃甎瓦成砌又奏準月壇應行興修詳細確估計月壇一座内壝門六瘞坎一神庫神㕑各一井亭一祭器庫宰牲亭各一鐘樓一東北壇門各一牌坊一均照舊修理壝垣地面海墁散水甬路月臺燎鑪亦應拆砌完整至内垣亦應兩面砌甎二進外垣增髙三尺增砌大甬路四道一修葺壇廟順治十四年發帑金三萬兩修理京師先師廟十五年覆準各壇廟每屆祭祀太常寺先期移文工部酌量修理康熙二十三年重修黒龍潭龍神廟宇御製碑文勒石二十九年議準順天府學先師廟遇有傾圮之處著該府丞動用大宛二縣庫貯正項修葺工完報部題銷雍正元年諭圜丘方澤日月社稷先農各壇及太廟前代帝王廟眞武廟等處著差給事中御史共九人部院賢能司官工部司官共九人敬謹堅固修理仍令大臣九人分工監修再各壇廟工程從前修過者甚多並未年久即至傾圮皆浮冒錢糧之所致一并嚴加確察欽此三年議準天壇舊有望鐙臺三座鐙杆三根因年久杆木朽爛應行修建又方澤壇東北望鐙臺一座亦應一并修建其鐙杆四根每根長九丈大徑二尺七寸小徑一尺二寸朱紅油飾祭時懸鐙又奏準月壇外牌坊兩邊牆垣雖傾頺已久基址猶存交部照舊修整五年奉旨修理先農壇牆垣嗣後著動正項又諭各處修理壇廟從前皆交與工部修理嗣後不必交與工部如有應行修理處或令太常寺會同工部官估計交與太常寺修理或即交與太常寺估計具題修理其動用何處錢糧並用過錢糧應於何處奏銷著大學士會同太常寺議奏欽此遵旨議準壇廟地方繫太常寺經管嗣後應大修者由太常寺會同工部估計具題交太常寺委官修理該管官不時稽察倘工程不堅冒銷錢糧即指名題叅如有徇隱經科道察出將堂官一并議處其應用錢糧均由部支取工竣即繕黃册具題至每歲祭祀前期小修交太常寺詳計一年需用錢糧若干先期題請由戸部給發年終亦繕黃册具題又奏準月壇牌坊兩邊牆垣已於雍正二年遵旨修理日壇牌坊兩邊牆垣亦應照月壇增造仍會部詳估具奏興工乾隆五年奏準凡壇廟臨祭時糊飾及歲修工程銀千兩以下者仍由太常寺照例修理年終彙銷若千兩以上者太常寺將應修理之處奏請交部估計奏聞由部委官會同太常寺委官公同修理該堂官仍不時察看如工程草率錢糧不清即指名題叅交部議處再太常寺工程不拘大小均令該堂官一人督率該寺匠頭亦由部於見在工役内選老成諳練一人承役如有違慢侵欺各弊交部治罪換役七年諭朕惟郊壇祭祀必致誠敬以薦明禋歴來前期齋戒悉遵舊制住宿别殿今郊壇建有齋宮年久傾圮未經繕修其應如何修建之處爾等即前往敬謹相視繪圖呈覽至興修之時著委内務府熟悉工程之官會同工部太常寺委官一同監修所需錢糧由工部行文戸部支取欽此又奉旨日月壇舊有之具服殿爾等亦前往相視應如何修理詳議具奏八年遵旨修理完竣天壇齋宮新建正殿五間左右配殿六間内宮門一座廻廊六間修理劵殿一座方亭一座宮門六座石橋十座鐘樓一座外圍廊房一百六十三間拆墁月臺修理河道牆垣地壇齋宮改建正殿七間修理左右配殿十有四間宮門一座增建内宮門三間守衞房十有二間日壇移建具服殿三間左右配殿六間宮門一座拆移衙署十有三間月壇修理具服殿三間左右配殿六間宮門一座鐘樓一座並各處拆建守衞房成砌牆垣鋪墁地面甬路九年奏準凡壇廟工程千兩以上者仍照舊例具奏交部會同太常寺修理未及千兩以上之土工木作均咨部委官會同監修仍將工程丈尺造册咨部覈實奏銷其糊飾及歲修祭品各工照例由太常寺委官修理報部覈銷十年奏準天壇等處齋宮遇有應行修理之處由太常寺移咨内務府辦理又奏準先農壇内外牆垣坍塌損壞處甚多請將應行修理之處交部會同太常寺計費興修十二年奏準天壇内垣長一千二百八十六丈一尺五寸髙丈一尺趾厚九尺頂厚七尺外垣長一千九百八十七丈五尺髙丈一尺五寸趾厚八尺頂厚六尺四圍牆頂牆身皆年久損壞完固整齊者甚少應將牆頂坍塌椽題望版朽爛者更新牆身劈裂者用甎包砌其微覺完整者量加插補句抿但如此修理未能周遍閒有剝落損壞仍須隨時苫補且損壞之處包砌城甎見在完整處依舊土牆觀瞻不一應請一律拆修外垣兩掖出檐各四尺四寸酌收一尺二寸牆身内外均鏟去浮土上包城甎二進下包城甎三進舊有泊岸坍塌處用灰土築打内垣裏外出廊外濶六尺八寸舊有檐柱因出檐較濶不能負重以致頭頂沉垂雨水淋濕檐柱朽爛酌將裏外檐均改進四尺八寸不用檐柱牆身内外鏟去浮土上包城甎二進下包城甎三進共需物料工價銀十萬兩有竒又奏準天壇内外垣至泰元門之東見有廢垣一座僅存甎石詢知為崇雩壇乃前明嘉靖年閒建置歲旱則祀上帝以禱雨壇成未經行禮而罷國朝祈雨既祀於圜丘又於每歲孟夏龍見行常雩禮大祀天於圜丘是崇雩壇洵屬無用請交部拆卸亦可為見今修理内外圍垣之用十四年諭兩郊壇宇雖歲加塗塈而經閱久遠應勅所司省視所當修整者敬謹從事欽此遵旨詳勘圜丘壇天青色琉璃闌版門柱甎塊方澤壇黃色琉璃瓦料均有脫釉門柱椽題望版門有應換金碧采章殘舊不鮮階級甎甓閒有損闕堊赤亦多漫漶月臺甬路海墁泊岸水溝等處甎瓦酥鹻均應依式修整請交部委官逐欵詳細估計覈定錢糧數目奏聞及時備辦物料會同太常寺依次敬謹興修十五年諭大享殿前兩廡繫前後兩重乃前明時祫祭所建今祫祭之禮既不舉行而前後兩廡又屬參差竢興修時将後一層拆去再兩郊壇宇工程所用物料皆令各省辦解所需銅亦應著雲南省辦解即酌定數目奏聞行令該省辦解應用欽此十六年諭京師玉泉靈源濬發為德水之樞紐畿甸衆流環匯皆從此瀠注朕品歴名泉實為天下第一其澤流潤廣惠濟者博而遠矣泉上有龍神祠已命所司鳩工崇飾宜列之祀典其品式一視黑龍潭該部具儀以聞欽此遵旨議準維兹玉河欽䝉諭旨業經飭令所司就泉上舊有龍神祠鳩工崇飾聿新廟貌妥侑神靈並請勅賜鴻文勒石祠左用以昭紀神功十七年奏準地壇工程業已告竣各處殿宇牆垣皆新建整齊惟從前舊有洩水溝渠年久湮塞無存一經雨水無從宣洩積潦難消請交欽天監官詳加相度於外垣之内四面開土溝一道使内外諸處雨水各順地勢流入溝内統於東南外垣下洩出歸入䕶城河中庶免雨水積聚之患計溝長七百四十八丈又各處甬路下增揠過水小溝地面起髙平墊出水總匯處成砌劵門嗣後交與太常寺於每年未雨之先飭令壇官董率壇戸先期疏濬毋使壅積淤塞十八年諭朕每歲親耕耤田而先農壇年久未加崇飾不足稱祗肅明禋之意今兩郊大工告竣應將先農壇修繕鼎新即令原督工大臣敬謹將事欽此十九年奏準犧牲所房宇經年久遠閒有傾圮滲漏交與修理兩壇工程處覈估修理又奉旨天壇西面外垣之南相對先農門處增建門一座垣内增建鐘樓一座門外甬路一律成造嗣後遇祭天壇即進新建之南門祭祈年殿仍進北門二十年奉旨神樂所改為神樂署一壇廟禁令順治十四年覆準天壇牆垣外壅積沙土由部委官修治完日交兵部令該營兵丁同守門軍役每年春秋二季平治康熙五年議準各壇廟遇有損壞該管官即行具報如遲延不報以致盜失甎石木植等物將該管官題叅議處又題準各壇廟十有五步之内不許埋葬開溝栽種其附近墳塋令該城御史察勘有力者自行遷葬無力者報部酌量給銀遷𦵏二十四年奏準犧牲所牧管理畜牧準於天壇附近處給房居住三十三年遵旨議準天壇風沙淤壅之處於大路旁栽種柳樹禦風所栽之樹交廵捕三營看守一直省壇廟康熙二十三年詔直隸各省修理文廟銀照舊存畱以供修葺其五嶽五鎭四海四瀆廟宇傾頺者令該地方官修理以昭誠敬二十八年奉旨泰山祠宇舊有儲備修葺工銀嗣後著每歲分給東嶽廟岱頂祠各二百兩令守祠廟祝時加修葺仍令山東廵撫稽察毋使有司剋扣虛冒二十九年奉旨修理闕里聖廟所有物料工價不必動支戸部庫銀著照數發内庫銀採辦其物料著囘空糧船載運三十四年諭凡五嶽五鎭四海四瀆神廟有傾頺者該地方官估計價直具奏修葺欽此四十二年詔修嶽鎭海瀆廟宇如前諭四十六年重修醫巫閭山北鎭廟御製碑文勒石四十七年重修衡山南嶽廟御書匾額並勒碑文雍正元年重修醫巫閭山北鎭廟二年重建闕里先師大成殿令山東廵撫動用藩庫銀庀材鳩工擇日興修務期規制復舊廟貌重新凡殿廡門垣特命易以黃色琉璃瓦又奉旨直省府州縣學宮先師廟及祭器等項如應行修葺凡本籍科甲出身之人及居家之進士舉人生監等平時讀聖賢之書有飲水思源不忘所自情願捐修者聽不必限數亦不必勉强四年覆準各直省督撫飭各府州縣衞所於各該地方擇潔浄之地置耤田四畝九分内設立先農壇壇髙二尺一寸方二丈五尺並建神倉神庫神㕑七年奉旨曲阜聖廟應建碑亭二座著欽差等動支正項鳩工興造乾隆元年諭聞山西霍州中鎭廟殿宇年久未修漸就傾圯著該撫委官確估修葺知會工部欽此二年議準各直省督撫轉飭各地方官將境内各壇應行修理之處詳估工料數目報明督撫咨部動用正項錢糧如式修理工竣報銷至各壇祭器或製造未備以及歲久損壞應行修理者亦轉飭各地方官照依會典開載數目如式修造以備祭饗十年議準各直省先農壇宇如有傾圯及器具不備之州縣即勒限地方官賠補逾限題叅倘因循怠忽除地方官照例議處外該管道府照例降二級調用撫司罰俸一年十五年奏準廣寧醫巫閭山之北鎭廟正殿後殿神庫神㕑鐘鼔樓石牌坊等處滲漏朽折殿宇牆垣采畫塗飾多有剝落委官確估動用盛京户部庫貯備用銀及時興修欽定大清㑹典則例卷一百二十六
