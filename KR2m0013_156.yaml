後如有應行修理之處或令太常寺會同工部官估計或即交與太常寺估計具題修理其動用何處錢糧應於何處奏銷之處大學士會同太常寺議奏遵旨議準按各壇廟地方原繫太常寺經管嗣後各壇廟應大修理者由太常寺詳勘會同工部估計具題交與大常寺官修理令該堂官不時巡察倘有草率浮冒等弊即指名題參如該堂官徇庇容隱一併議處其應用錢糧由工部取用工竣之日即繕黃册具題至每逢祭祀前期小修等項仍由太常寺詳計一年需用錢糧若干先期題請由工部取用年終亦繕黃册具題乾隆五年奏準修理壇廟若銀千兩以下之工程仍由太常寺辦理千兩以上之工程奏交工部會同辦理六年奉旨太常寺奏銷錢糧著交工部察核永著為例九年奏準修理工程銀千兩以上仍照例奏交工部會同核實修理其不及千兩而需土木之功者亦咨工部委官會同修理至糊飾塗塈仍由寺承辦遇有應修之處由寺委官確估支領工部庫銀興修工竣隨分晰造報並取隨工察驗官印結逐案送部核銷十年奏準天壇地壇齋宫著交內務府修理一修理器物順治年間定各祭祀需用祭器收貯神庫本寺官時行稽察如有損壞即知會工部修理其所用瓷器不敷咨工部轉行該省豫期照式燒造所用樂器定於每祀前一月咨工部修理雍正五年定祀前修理樂器歸太常寺辦理於領取工部嵗修銀內支銷乾隆八年奏準太廟樂器十年一次修補各壇廟樂器二十年一次修補一救護月食康熙七年定各官於本寺衙門行禮其齊集行禮各儀仍由禮部鴻臚寺掌行一屬官升除康熙四十年奉旨贊禮郎員闕嗣後著該旗將護軍校驍騎校護軍令其唱贊選聲音宏亮者具奏雍正元年奏準盛京禮部贊禮郎讀祝官員闕請將庫使一并簡選録用七年奏準本寺贊禮郎讀祝官員闕請照盛京禮部之例著庫使一并與選又奏準滿所牧所副在任五年稱職由寺保題交該旗以應升之官用如屬平常奏明撥回本旗倘有疏忽即行題參十年奉旨太常寺滿寺丞員闕交與該堂官於應升人員內簡選熟練之人引見十二年奏準犧牲所裁滿所副一人增漢所牧一人協同辦理所務並委博士五日一次赴所點驗該堂官仍不時稽察如有侵蝕錢糧及洗滌失宜之處即行參究該堂官徇庇容隱一并議處所牧如果實心辦事三年今改五年後出具考語咨吏部具題議敘十三年奏準本寺庫使三年任滿請照户工二部之例暫停考試仍留三年果能勤慎辦事遇本寺筆帖式員闕按次題補如行走怠惰即行咨革嗣後新用庫使以補官日為始五年期滿分别等第照例考核乾隆元年奏準盛京禮部贊禮郎讀祝官六年期滿由寺行文詢問若願來京者準其與陵寢之贊禮郎讀祝官一例轉用本寺贊禮郎讀祝官如願在盛京者仍留本處二年奏準舉人貢生一體簡選贊禮讀祝等官二十年奉旨向來簡選贊禮郎等官新滿洲烏喇齊等皆不與伊等國語純熟字音準切將伊等簡選尚屬合宜著交該衙門嗣後簡選贊禮郎等官將東三省新滿洲烏喇齊一并簡選二十一年覆準嗣後簡選贊禮郎凡文武官及生監官學生皆準與選其所選之文武官仍兼原任行走一支銷每年各祭祀需用物價及雜項支給並陵寢移取備供祭物由寺行户部嵗支銀五千兩存貯寺庫臨期逐項支用本寺徵收各壇草價銀五百一十兩及牲牢倒斃變價銀均歸入正額貯庫每嵗夏季總計一嵗祭祀備物及雜項支給為一册陵寢祭祀之費為一册詳載用過及見存銀數並聲明餘銀存庫入次年正額報銷各具題以聞並造具清册送河南道刷卷欽定大清會典則例卷一百五十二
