body:
  text: 太常寺一題奏祭祀冬夏日至大祀圜丘方澤孟春祈榖孟夏雩祀均前期二十五日具題恭請皇帝親詣行禮或遣官恭代並候欽定大饗太廟祭社稷甲丙戊庚壬年親朝日丑辰未戌年親夕月均前期二十日具題同餘嵗及各中祀均前期二十日題請遣官行禮羣祀惟祭炮神前期具奏無定限各功臣專祠由寺舉行不具題餘均前期十五日題請遣官行禮與中祀同清明七月望冬至嵗暮祭饗永陵福陵昭陵前期四十日具題祭饗昭西陵孝陵孝東陵景陵泰陵孝賢皇后陵寢端慧皇太子園寢前期二十日具題恭遇各陵忌辰具題與四時祭饗同萬夀聖節孟冬朔日祭各陵寢均前期十五日具題若因事祗告由寺行欽天監擇日豫期具奏康熙十年定每年祭祀本寺於豫年八月內行文欽天監擇日送寺遇各祀期前以所定日期具題乾隆十四年議準每年正祭由禮部恭選日期並諸祀之嵗有定日者於豫年題準劄寺豫期由寺照例題請一進齋戒牌銅人順治四年定齋戒牌銅人由禮部官恭進安設於武英殿八年定改設於太和殿又定大祀天地祈榖於上帝饗太廟祭社稷均前期三日進齋戒牌銅人日月前代帝王先農如恭遇親祭均前期二日進齋戒牌銅人如遣官惟前代帝王廟仍進齋戒牌銅人餘均停進康熙九年題準齋戒牌銅人由禮部太常寺官恭設於乾清門中門東第一楹前承以黃案雍正二年奏準天地宗社大祭如遣官行禮奏請停進齋戒牌銅人日月前代帝王廟等祭如遣官行禮停進齋戒牌銅人不具奏至兩祭相連止奏皇帝親詣之齋戒其遣官行禮亦不具奏乾隆七年奏準圜丘方澤祈榖雩祀前期四日太常寺具奏齋戒日期進齋戒牌銅人於乾清門安設二日齋宫安設一日太廟社稷前期四日遇忌辰前期五日具奏於乾清門安設三日日月帝王先農前期三日具奏於乾清門安設二日均祭日徹回皇后親饗先蠶前期三日如遇忌辰前期四日具奏進齋戒牌銅人於乾清門轉交內監於交泰殿安設二日祭日徹回如遣妃恭代奏請停止一閲祝版前期十五日本寺行文欽天監擇閲祝版吉時送寺繕入儀注並委候時官二人前期一日赴寺豫備啓奏時刻本寺官先期送祝版至內閣恭書前期十日行知工部鑾儀衛於前期二日自壇恭舁祝版亭至午門前安奉次日送至祭所並行文兵部轉咨步軍統領凡經行道路灑掃辟除前期二日本寺以閲祝版具奏圜丘祈榖雩祀御太和殿躬閲祝版玉帛香是日設黃案於太和殿中御座之南設香亭於殿內左楹之東設祝版亭玉帛香亭於殿內右楹之西太常寺各官奉玉帛香祗俟於太和門外屆時太常寺卿詣乾清門奏請皇帝御龍袍衮服乘輿出宫至太和殿後降輿御殿立左楹前西嚮司祝自內閣奉祝版入太和門中門玉帛香隨入前列提爐二太常寺贊禮郎十人導引由中階升至丹陛導引止司祝奉祝版各官奉玉帛香進殿中門以次陳於黃案三叩退太常卿展祝文袱執事官設拜褥皇帝詣案前次第恭閲畢就拜位行一跪三拜禮興復位立太常卿韜祝版執事官啓拜褥司祝各官進至案前三叩恭奉祝版玉帛香依次安設亭內三叩退司香官就香亭東奉香合立司拜褥官設拜褥於香亭前太常卿二人恭導皇帝至香亭前立司香跪進香皇帝立上香畢就拜位行一跪三叩禮興復位司拜褥官啓拜褥司香奉香合置亭內退鑾儀衛官率校尉舁亭香亭在前祝版亭玉帛香亭以次由中道出前引如儀太常寺卿跪奏禮成皇帝乘輿還宫太常寺卿隨亭送南郊恭安於神庫方澤太廟社稷以下御中和殿閲祝版是日設黃案於中和殿中御座之南設祝版亭於午門外屆時奏請皇帝御中和殿立左楹前西嚮司祝奉祝版入陳案上皇帝恭閲畢行一跪三拜禮興司祝奉祝版至午門外安設黃亭餘儀同前如遣官恭代行禮本寺官由內閣恭奉至午門外安設黃亭恭送祭所順治二年奏準各壇廟讀祝止讀清文停讀漢文四年奏準太嵗都城隍等祭均仍舊例遣官行禮其祝辭用清文承祭並贊禮均用滿官十六年奏準祝版應書御名者先期送內閣敬書祀前一日皇帝於太和殿中和殿閲畢奉往祭所安設又奏準皇帝閲祝版應增設祝版座安祝版於上不必用手奉視又定祀前二日本寺奏閲祝版並奏簡讀祝官及祀日行禮各儀注奏章用本色紙遇吉慶日用紅色紙雍正二年奉旨據太常寺奏次年正月初八日時饗初七日遇素服日期應照例停閲祝版但大祭祝文朕不親閲於心不安若素服閲祝於禮可行否著大學士九卿等會議具奏遵旨議準躬閲祝版如適遇忌辰大祀天地祝文皇帝仍御龍袍衮服執事官咸補服太廟祝文皇帝常服執事官咸常服不挂數珠社稷壇春秋致祭祝文及日月壇皇帝親祭之年如遇忌辰均太常寺官由內閣恭奉送祭所安設四年奉旨嗣後視太廟祝版遇素服之期仍以素服具奏乾隆元年議準太廟祝文原備列祖列后尊諡廟號誠恐宣讀失儀嗣後祝版仍備書列祖全諡列后但書尊諡廟號又奏準祗告各壇廟用香帛酒果脯醢舊時祝文內書牲帛粢盛等字應令翰林院隨祭品更正改書謹以香帛庶羞之儀四年覆準祭祀繕祝版時內閣委官先期在衙門齋宿恭書其太常寺糊飾祝版亦委官赴內閣敬謹辦理七年諭閲祝版詣齋宫應御龍袍衮服隨從人等咸吉服永著為例詳禮部則例一御齋宫順治十四年定駕宿齋宫是日鹵簿全設至天壇昭亨門西降輿太常寺卿二人恭導入昭亨門左門由神路左升壇北嚮立太常卿跪奏上帝壇駕東嚮立跪奏配位壇駕西嚮立跪奏配位壇又導駕至神庫北嚮立太常卿跪奏上帝籩豆駕西嚮立跪奏配位籩豆又導駕至神厨近前立跪奏燔牛上帝位配位牲駕北嚮立跪奏四從壇牲閲畢駕御齋宫乾隆七年定前期十五日由寺行欽天監擇請駕御齋宫吉時並取候時官二人豫備啓奏時刻前期五日奏請駕御齋宫上香行禮恭視壇位前二日奏御齋宫儀注並奏遣分獻官恭視籩豆牲牢十二年奏準皇帝親閲籩豆或遣官視籩豆恭候諭旨如奉旨閲籩豆前期二日本寺進呈皇帝詣齋宫上香行禮視壇位籩豆儀注如奉旨遣官視籩豆本寺進呈親詣齋宫上香行禮視壇位儀注至遣官恭代先期奏請承祭官恭視壇位並視籩豆牲牢一祭日請駕順治年間定圜丘方澤祈榖均於日出前九刻太廟社稷壇均於日出前四刻日壇於日出前八刻月壇於酉時前六刻帝王廟先師廟均於日出前六刻先農壇於己時前六刻傳心殿於日出前三刻乾隆四年奏準夕月改於酉時前四刻七年由寺具奏向例大祀圜丘於日出前九刻請駕今御齋宫於日出前三刻或四刻請駕候旨遵行又從前皇帝至鋪棕薦處降輦入更衣大次內少憩俟奉安神位後奏請行禮今皇帝由齋宫詣壇行禮謹擬請駕前一刻恭請神位再皇帝由齋宫乘輦至鋪棕薦處降輦不入更衣大次升壇祭畢出昭亨門乘輦理合一并奏聞奉旨著於日出前七刻即於是刻恭請神位朕由齋宫仍入更衣大次候奉安畢詣壇行禮又奉旨躬祀圜丘仍乘禮輿出齋宫正門外乘輦前往至祀畢著於昭亨門外備禮輿還宫永著為例八年皇帝親祈榖前期一日御齋宫本寺具奏請駕時刻奉旨著於日出前七刻是年本寺具奏向例大祀方澤於日出前九刻請駕今御齋宫方澤壇內齋宫較圜丘為近祭日應否於日出前四刻或照圜丘之例亦於日出前七刻請駕候旨遵行奉旨著於日出前七刻十五年奏準皇帝親祭禹陵駐蹕處距陵十有三里親祭明太祖陵行宫距陵九里應於日出前幾刻請駕載入儀注奉旨著於日出前四刻一承祭分獻官並於具題祀期疏內列名請旨承祭官圜丘方澤祈榖雩祀以親王太廟太廟後殿社稷日月以王貝勒貝子公前代帝王廟以領侍衛內大臣散秩大臣都統尚書釋奠於先師以滿漢大學士崇聖祠以祭酒司業恭遇親祭以大學士先農壇太嵗殿以親王郡王先蠶壇以內務府總管奉宸院卿先醫廟以禮部堂官北極佑聖真君火神東嶽及黑龍潭龍神廟玉泉龍神祠以本寺卿少卿都城隍廟關帝廟賢良祠昭忠祠雙忠祠以領侍衛內大臣散秩大臣都統尚書關帝廟後殿以本寺卿少卿炮神以漢軍都統開列具題賢良祠後祠及功臣專祠均以本寺卿少卿承祭分獻官圜丘方澤從位各四人太廟兩廡二人親夕月一人均以領侍衛內大臣散秩大臣都統尚書月壇遣官以侍郎帝王廟四人以侍郎內閣學士副都御史恭遇親祭以尚書左都御史開列具奏春秋丁祭先師廟分獻十二哲咨取翰林院編修檢討二人兩廡用國子監官四人恭遇親祭分獻四配以尚書四人十二哲暨兩廡以侍郎六人開列奏請先醫廟兩廡二人以太醫院堂官太嵗殿兩廡二人用本寺卿少卿均於具題祭期疏內開列崇聖祠四配兩廡用國子監官四人昭忠祠十有三人用本寺官均不開列具題凡開列各承祭分獻官王公行宗人府領侍衛內大臣散秩大臣行領侍衛府都統行八旗各咨取職名豫期奏請欽點數人以備開列內閣大學士學士六部尚書侍郎都察院左都御史左副都御史臨期咨取各職名題請均用滿官惟先師廟滿漢官並開具題得旨祀前二十日或十五日以具題科鈔行分獻官各衙門一祭陵承祭官順治十七年奏準祭盛京三陵以守陵宗室覺羅官行禮康熙八年議準停止盛京祭陵宗室覺羅官居住其盛京及畿輔各陵並遣在京之多羅貝勒以下奉國將軍覺羅男以上行禮忌辰十月朔萬夀聖節照前例致祭十八年議準盛京陵四時祭祀令奉天將軍副都統侍郎等致祭畿輔陵照例遣大臣致祭如遇大慶自親王以下鎮國將軍覺羅文武一品大臣以上奏遣二十四年遵旨祭四陵改由本寺行取宗人府職名列請欽點雍正八年議準盛京三陵承祭官由寺行吏兵二部咨取奉天將軍副都統侍郎各職名開列具題但各官有無差遣事故本寺無從考核嗣後盛京禮兵二部將應與開列各官有無事故於祭期前六十日移咨本寺如具題奉旨之後或有差遣事故者盛京禮部即將彼處無事故之人酌代行禮仍行文本寺具奏乾隆元年奏準特遣宗室將軍六人往駐盛京給以田宅産業永逺承祭三陵六年奏準盛京所駐宗室將軍奏遣承祭三陵如遇事故無應補之人即於奉天將軍副都統侍郎內酌量無事故者代為行禮仍將行禮之人職名及酌代緣由行知本寺具奏一祗告行禮順治初年定袛告天地宗社各陵開列與承祭同又定告祭后土司工窑神門神承祭官以禮工二部滿漢堂官開列康熙二十四年定祗告傳心殿開列滿漢大學士一執事官皇帝親詣行禮以本寺卿二人左右贊引或禮部尚書兼寺卿或禮部侍郎均以滿官嫻禮儀者充之其分獻及各祀遣官行禮贊引均用寺丞以下滿官典儀太廟先師廟關帝廟均滿官二人餘祀用一人唱作樂大祀中祀及羣祀之太嵗殿均用滿官一人贊賜福胙大祀中祀親詣行禮用滿官一人傳贊兩郊各用滿漢官四人祈榖太廟朝日夕月均用滿官二人司香兩郊各用滿官六人太廟九人社稷壇四人日壇一人月壇二人帝王廟十有六人親釋奠於先師用滿五人漢二人太嵗殿滿一人先醫廟滿三人漢二人關帝廟滿四人昭忠祠賢良祠勤襄公祠恪僖公祠均用滿三人祭炮神滿一人漢七人餘祭各用滿一人司帛帝王廟滿三人漢十有三人親釋奠於先師滿一人漢六人太嵗殿滿一人先醫廟滿三人昭忠祠滿三人漢四人賢良祠滿三人勤襄公祠恪僖公祠均用漢三人餘均與司香官同司爵親釋奠於先師滿五人漢十有二人昭忠祠漢七人雙忠祠滿二人顯佑宫獻茶滿一人餘均與司帛官同導進俎