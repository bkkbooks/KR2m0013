body:
  text: 前鋒統領前鋒營一營制天聰八年定巴牙喇即護軍前哨兵稱為噶布什賢超哈即前鋒軍順治元年定前鋒校每人給小旗一各按旗色十七年定噶布什賢噶喇衣昂邦漢字稱為前鋒統領噶布什賢章京漢字稱為前鋒參領壯逹漢字稱為前鋒校又定前鋒參領以下盔頂用獺尾垂黑纓前鋒校前鋒皆鐵頂垂紅纓康熙五年定前鋒校甲以白繡假為表前鋒以藍布為表袖裙皆用明甲六年題準每前鋒一名各給甲一胄一櫜鞬一弓一矢七十佩刀一又定八旗前鋒給鳥槍八百八十一海螺十有六前鋒校每人給順刀一鐮一斧一鳥槍什長隊長各梅針箭二十批箭五餘與前鋒校同前鋒各手槍一鉤鞭一麻繩四十絨繩二鋼鈐四餘與鳥槍什長隊長同二十一年題準每歲演習田獵三次春季定於三月秋季定於九月冬季定於十二月每次令八旗簡撥前鋒校前鋒共一百三十人每翼前鋒參領一人前鋒侍衛一人二十八年定前鋒軍器於八旗護軍驍騎閲畢之後定期請㫖㑹領侍衛內大臣檢閲三十三年鑄給前鋒統領印信五十三年改鑄左右兩翼前鋒統領護軍統領印二顆雍正四年仍鑄給前鋒統領印二顆五年覆準八旗前鋒每月六次習射適逢有㑹議之事統領等不能兼顧嗣後定期每月於初二初六十一十六二十一二十六日是日停止會議令統領親往較射六年定大閲頭隊每佐領下前鋒一人每旗前鋒參領一人前鋒侍衛一人每翼前鋒統領一人即於此數內分出前鋒二百人前鋒參領侍衛各二人統領一人為殿後軍又定每年八旗合操分前鋒營官軍之半㑹合火器營官軍操演八年議準前鋒內一半習鳥槍每月以初九十四十九二十九等日演放鳥槍合前較射之日共為十日監看鳥槍參領侍衛各二人監看步射參領侍衛各二人仍照護軍之例每年春秋二季驗看騎射並擐甲馬步射一二次三年一次考驗甄别又奉㫖步行較獵甚為善事人人既得學習而於行圍之道亦得嫻熟爾等與其較獵一次不若多演數次為佳嗣後於初冬行步圍時每一旗令行圍二三次其行圍之時著各該旗大臣等親身率往於前一日奏聞每圍令尚虞侍衛執事人鷹房人或二十人或三十人亦著前往如此則侍衛執事人等既得習學而兵丁亦得嫻熟行圍之道矣又定每年秋季前鋒統領㑹護軍統領奏聞率所屬兩營官軍演習步圍兩三次是年設立前鋒統領衙署左右翼各一一行在宿衛扈從前鋒參領侍衛共八人率前鋒校前鋒共百二十人於御營前一二里外相度形勢安設卡倫偵探立前鋒旗二以為門戶兩旁以次列帳參衛校士各於帳內巡警宿衛有於卡倫內行走者坐以軍法次日參衛校士屬櫜鞬控馬於道旁排立候黃龍大纛過各乘馬整隊扈從一升除康熙年間定前鋒參領員闕於護軍參領驍騎參領前鋒侍衛一二三等侍衛護衛子以下佐領騎都尉以上等官內選擬正陪題補前鋒侍衛員闕於雲騎尉三等侍衛護衛前鋒校護軍校內選擬正陪題補前鋒校闕於前鋒內選擬正陪題補雍正元年覆準前鋒營左右翼統領各設隨印筆帖式二人又奉㫖向例上三旗前鋒侍衛繫五品戴孔雀翎下五旗前鋒侍衛亦繫五品戴藍翎嗣後下五旗前鋒侍衛皆令戴孔雀翎三年覆準前鋒營左右翼各設協理事務前鋒參領一人前鋒侍衛一人隨印前鋒校二人其協理事務之前鋒參領侍衛由該翼統領於本翼四旗前鋒參領侍衛內選擬正陪引見補授其隨印之前鋒校即於本翼前鋒內選委如行走好辦事勤者薦舉庸劣怠忽者參劾若統領遇有辦事錯誤處分協理事務參領等一并議處又奏準三旗前鋒侍衛員闕於侍衛副護軍參領前鋒校內五旗前鋒侍衛員闕於護衛副護軍參領前鋒校內各遴選五六人引見補授又奏準前鋒校員闕於本旗前鋒內遴選年久行走好者四五人引見補授七年奉㫖前給八旗副驍騎校副護軍校帽頂藍翎補服並加月餉銀一兩今前鋒營所設鳥槍前鋒什長亦照此例乾隆元年奏準前鋒侍衛照八旗副參領之例授為四品又奏準嗣後前鋒參領員闕宗室將軍侍衛三旗侍衛護軍參領前鋒侍衛並準列名六年議準前鋒參領員闕由該翼統領於本旗護軍參領一二等侍衛宗室將軍一二等侍衛前鋒侍衛內遴選六七人引見補授又議準前鋒侍衛員闕由該翼統領於本旗二二等侍衛護衛副護軍參領前鋒校內遴選五六人以委署前鋒參領一人列於前引見補授又議準前鋒校員闕以本旗鳥槍什長隊長開列若闕多人少於本旗前鋒內每闕遴選四五人均由該翼統領引見補授前鋒鳥槍什長闕於本旗鳥槍隊長內鳥槍隊長闕於本旗前鋒內各遴選充補十七年奏準每旗增設委署前鋒參領各一人戴五品頂孔雀翎仍食前鋒校餉一拔補前鋒康熙年間定前鋒闕由該統領㑹同護軍統領於親軍護軍及正身驍騎執事人閒散正身壯丁內遴選充補雍正二年定教養兵亦準選拔十一年諭據領侍衛內大臣等奏稱親軍係龍驤宿衛不應逺補前鋒朕思親軍雖繫龍驤宿衛然前鋒尤為緊要親軍皆由佐領下視其材伎選充者嗣後未滿十年之親軍準其調補前鋒已滿十年者毋得調補著為例欽此一軍政前鋒參領以下前鋒校以上由本翼統領分别保薦去留三等注考聽欽命王大臣考驗一侍班前鋒護軍兩營同直一日每直兩營合簡參領侍衛等官十人各注考語引見記名者咨兵部注冊一署理前鋒統領有出差者即令未出差之統領兼攝若二人同時奉差乃奏請簡署一官員親隨兵養亷支借俸銀官軍優恤均與八旗驍騎營同護軍統領護軍營一營制國初設巴牙喇即護軍營統以巴牙喇纛額貞即護軍統領佐以巴牙喇甲喇額貞即護軍參領天聰八年奉㫖改巴牙喇纛額貞為纛章京巴牙喇甲喇額貞為甲喇章京又奉㫖每牛彔下以巴牙喇八名出兵二名守禦順治元年定八旗纛章京給大纛各一壯逹即護軍校給小旗各一十七年定纛章京漢字稱為護軍統領甲喇章京漢字稱為護軍參領壯逹漢字稱為護軍校又定護軍參領以下盔頂用獺尾垂黑纓護軍校護軍盔皆鐵頂垂紅纓又定八旗護軍統領每月六次較閲官兵步射自七月十六日開操遇閏七月即於閏七月十六日開操至四月十六日停止自封印日至開印日暫停春秋二季較閲馬射一次或二次三年一次考驗甄别劣者黜之康熙五年定八旗護軍校甲咸以白假繡花為表八旗護軍咸以藍布繡花為表六年題準每護軍一名各給甲一胄一櫜鞬一弓一矢七十佩刀一每二人合給長槍一其護軍纛上三旗移文武備院纛馬移文上駟院領取下五旗於本旗王公門上輪流行取三十年定八旗護軍營每旗各設海螺三十有六三十三年鑄給護軍統領印八顆五十三年改鑄左右兩翼前鋒統領護軍統領印二顆雍正四年仍鑄給護軍統領印八顆五年覆準八旗護軍每月六次習射適逢㑹議之事統領等不能兼顧嗣後是日停止㑹議令統領親往較射六年定大閲頭隊每佐領護軍二人每旗護軍參領五人每翼護軍統領一人次隊每佐領護軍三人每旗護軍參領三人每翼護軍統領一人兩翼應援兵每佐領護軍一人每旗護軍參領二人每翼護軍統領一人於頭隊內分出護軍四百人護軍參領八人八旗護軍統領一人以為殿後軍麾旗每旗護軍各二人護軍參領各二人護軍校各十有四人禁約喧譁每旗護軍參領一人護軍校一人護軍四十人給使官每旗護軍校一人七年覆準八旗驍騎營所牧官馬每旗分出九匹與護軍飼養八年設立八旗護軍統領衙署左右翼各一一八旗護軍守衛國初定上三旗護軍參領護軍校護軍守衛禁闥下五旗護軍參領護軍校護軍各守該王公府門行圍出征則八旗一律分撥順治初年定鼎燕京仍以上三旗守衛紫禁宫闕景運門護軍統領或前鋒統領一人司鑰長一人筆帖式二人司閲門籍護軍一人即巴克什護軍校護軍二十人隆宗門護軍參領一人筆帖式一人司閲門籍護軍一人護軍校護軍二十人後左門後右門蒼震門啓祥門順貞門護軍參領各一人司閲門籍護軍各一人護軍校護軍各十有五人太和門昭德門貞度門協和門雍和今為熙和門中左門中右門左翼門右翼門吉祥門右北門東南西南東北西北四隅紫禁四門內磴道柵䦨護軍校護軍各十人日則守衛夜則巡更傳籌午門左右門護軍參領一人司門籍護軍二人護軍校護軍三十人東華門西華門神武門護軍參領各一人司門籍護軍各二人護軍校護軍各二十人凡遇己亥日為正黃旗首班子午日為正黃旗二班丑未日為鑲黃旗首班寅申日為鑲黃旗二班卯酉日為正白旗首班辰戍日為正白旗二班輪流宿衛下五旗護軍參領護軍校護軍仍各守衛該王公府門康熙十八年增太和殿護軍校護軍十人中和殿五人體仁閣𢎞義閣各十人計日直護軍統領一人司鑰長一人護軍參領護軍校護軍五百二十五人恭遇聖駕駐蹕暢春園則八旗守衛以前鋒護軍統領二人駐劄兩翼八旗每旗七汛汛各參領或署參領一人護軍校護軍十人每五日更換其守衛傳籌與紫禁同又每旗前鋒鳥槍護軍二泛專管柵䦨及警蹕計日直護軍參領護軍校護軍七百二十人三十年奏準每遇鄂羅斯進貢貿易來京據兵部移文八旗日委護軍參領二人護軍校護軍五十人於㑹同館大門及四圍防汛并稽其出入六十一年十一月奏準隆宗門增設護軍統領一人箭亭北上門各增護軍校護軍十人雍正元年奉㫖順貞門令內府護軍統領率內府護軍守衛又奏準恭遇聖駕行幸午門東華門西華門神武門各增統領一人又奏準紫禁城外周圍向繫驍騎營官兵守衛請改歸下五旗護軍守衛分定界址東華門西華門外以南令正藍鑲藍二旗東華門西華門外以北至城角令鑲白鑲紅二旗北面一帶令正紅旗官軍輪流守衛三年奉㫖見今天氣炎熱凡直班之護軍統領以至護軍校有年逾六十五歲護軍有年逾六十者均著停止直宿以年少者代之有應奏除者即著奏除俟至秋涼仍令赴班直宿其餘守門之護軍等於各官奏事出入之際照常具服外至午後準除外服稍為納涼四年奏準隆宗門以統領協理事務前鋒護軍參領一人參互入直又奏準恭遇行幸東華門西華門神武門增統領或協理事務前鋒護軍參領各一人五年議準增防範火班護軍校護軍八人紫禁城內除太和殿中和殿體仁閣𢎞義閣景運門隆宗門後左門後右門中左門中右門紫禁城四門等十四處護軍不調外將左翼門等二十三處護軍每處調二名共四十六名或直日護軍統領或司鑰長率領前往七年奏準端門天安門大清門向繫步軍守衛亦請改歸五旗護軍守衛九年奉㫖自今軍興之際軍兵以操演為急務五旗王公等所有門汛護軍驍騎著暫停看守各歸本營操演軍事既竣仍令在該府門汛差務行走此間自令各該府屬佐領下軍兵看守乾隆十二年奉㫖順貞門之西北門令內府護軍守衛十五年奏準保和殿東西廊內庫各增護軍校護軍五人又覆準紫禁城外周圍增設柵䦨八座東華門西華門以南四柵䦨與泛撥相近即令兼守外東華門西華門以北請增四汛再闕左右門向繫步軍守衛請易以五旗護軍若仍前分旗看守難於稽察請照上三旗護軍入直紫禁城內之例日以一旗輪直即令五旗司鑰長一人入直闕左門總轄以司各門啓閉日則𨽻於景運門直日統領夜則以前一日下班之護軍統領稽察每門及汛均護軍參領或副參領一人護軍校護軍十人日計官軍三百有一人每遇甲乙日為正紅旗班丙丁日為鑲白旗班戊巳日為鑲紅旗