㫖改為副護軍參領其員闕仍於應選補之人內擬定正陪引見補授又議準護軍營每旗印房設隨印協理事務護軍參領副護軍參領各一人隨印護軍校二人由該統領於見任護軍參領副護軍參領內各擬正陪引見補授其隨印護軍校由該統領於護軍校內選委知會兵部存案凡委出參校仍兼本職毋庸開闕此參校內有行走好辦事勤妥者該統領保舉庸劣怠忽者參處若統領因辦事錯誤處分者隨印協理之參校一并議處又奏準八旗游牧察哈爾每旗護軍參領各二人徹回京師改補火器營鳥槍護軍參領定為火器營專設官向於護軍營護軍參領內兼攝之例停止其游牧察哈爾護軍校員闕令察哈爾總管於應升人內選擬正陪送本旗統領驗看騎射引見補授六年奉㫖八旗補授護軍校驍騎校之時本佐領下簡選十人仍擬正陪各一人引見以八人備於外若正陪內無可簡用之人即以擬備八人引見其因佐領下無人於該旗簡選引見者止擬正陪各一人不必擬備十二年奉㫖副護軍參領著定為四品乾隆元年奉㫖向例護軍校驍騎校皆升補副參領署參領今副參領作為四品署參領裁汰升途甚少嗣後副參領員闕將護軍校驍騎校等與應行補授人員一并引見六年議準護軍參領員闕由該旗統領會同本翼統領於本旗驍騎參領冠軍使雲麾使一二等侍衛護衛前鋒侍衛副護軍參領宗室一二等侍衛鎮國輔國將軍子男輕車都尉等官內遴選六七人副護軍參領員闕以署參領一人開列於前再於本旗副驍騎參領雲麾使治儀正二三等侍衛護衛宗室二三等侍衛奉國奉恩將軍及佐領騎都尉雲騎尉世爵官內遴選二人並於護軍校內遴選一人均引見補授又議準司鑰長署司鑰長員闕仍照舊例於前鋒參領護軍參領鳥槍護軍參領內遴選正陪引見補授又議準護軍校員闕由該旗統領會同本翼四旗統領於本佐領下親軍前鋒護軍領催食四兩錢糧之執事人內有出兵隨圍勞績久著者簡選雖出兵隨圍勞績久著而騎射平常人不及者即不入選止將騎射好人去得者簡選十人擬正陪二人引見其餘八人擬備在外候㫖若本佐領下不得其人於該旗內簡選止擬正陪不必擬備十七年議準停止擬備八人止以正陪二人引見補授又議準紫禁城內外門汛關繫甚重向以護軍校等委署參衛一同直班但身繫護軍校究無參衛職掌且本營並無應升五品職銜雖參衛員闕例得開列於末品秩似覺逾越請於每旗增設委署護軍參領七人於護軍校內遴選人去得嫻騎射能管束者擬正陪引見簡署參衛給五品頂帶準戴孔雀翎仍食護軍校月餉與參衛一同應差遇參衛員闕將署參衛列名於前與應行補授人員一并引見補授其署參衛員闕即於護軍內拔其尤者委署給以金頂藍翎仍食原餉一署印順治年間定護軍統領有出差者移咨兵部奏署乾隆十二年奉㫖前鋒護軍統領遇有出差事故即以次旗統領兼攝如同時奉差止剩四五人始準奏請簡署十八年奉㫖嗣後護軍統領有出差行圍即剩四五人亦不必奏請署印止剩二人再行請㫖一拔補護軍康熙年間定護軍闕該統領會同本旗都統於本佐領下驍騎執事人步軍閒散壯丁內均以正身選補戶下人不準雍正元年奉㫖席伯等向不選護軍嗣後有人才好者並令入選二年奉㫖凡年老護軍除應升護軍校驍騎校外其年已老邁又不能在應升之列者若竟革退殊覺可憫著統領會同都統等將伊等移於驍騎營行走其闕即令人材少壯之驍騎轉補如此則護軍亦得整齊矣又定教養兵亦準選拔護軍一官員親隨兵養亷支借俸銀官軍優恤均與八旗驍騎營同嚮導嚮導總統無定員由兵部開列前鋒統領護軍統領八旗副都統等職名奏請欽簡數人以一人掌印每旗於前鋒護軍營遴選參領侍衛共四人前鋒校護軍校前鋒護軍共六人分理厥事遇車駕時巡先期率所屬官軍前往相度周知山林川涂之道路通橋梁夷險隘計其程塗入告起鑾統領等照常引扈每日駐蹕後以次日程塗及駐蹕之所開列奏聞得㫖交行在兵部通行曉諭闔營安設營盤均由嚮導總統等先期指示擇髙燥之地飭所在有司修築平整頓營看城亦如之欽定大清會典則例卷一百七十八
