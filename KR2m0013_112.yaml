body:
  text: 兵部武選淸吏司守衞一宿衞順治初年定凡直守禁門禁城大城曠班者革職應廵察不廵察者降二級留任閒人擅入禁門守門官不行察出者罰俸一年又題準守䕶城門官縱令家僕依城搭蓋席棚賃取房價者罰俸六月奴僕鞭八十縱人傍城住宿致失火延燒城門者城門領城門吏門千總各罰俸六月領催兵丁交刑部治罪至失察蓄髪僧人入城者官罰俸一月兵丁交刑部治罪康熙十二年題準直守城門曠班例應革職若因父母之喪及染病不呈明該管官以致曠班者罰俸一年又題準守門官遺失鎖鑰者該班䕶軍校罰俸一年同班䕶軍校罰俸六月錯遞鎖鑰者亦罰俸六月失誤閉鎖殿門者革職侍衞班領及直班侍衞皆罰俸一年五十一年議準車駕廵幸地方經由城門部委滿司官一人在門直宿夜有勘合至門該司官察驗明白準其出入次日報部存案五十五年議準南苑守門官稽察不嚴致賊匪竊去御用物件者降二級罰俸一年領催鞭八十兵鞭一百其不應在内行走之人入内行竊物件盜出紫禁城内枏木及各門上銅葉門釘等物者守門官罰俸六月若在内當差人役竊出者守門官罰俸一月又議準王府守門官不加意防範致有賊匪行竊者降一級罰俸一年因事曠班致誤者罰俸一年雍正四年諭交出隂文合符三件一交步軍統領收存其二交正陽門西直門存貯二門既有隂文合符如遇陽文合符至門照對即行開放不必候步軍統領其餘各門皆著步軍統領將隂文合符親持赴門與陽文合符照對開門倘無陽文合符雖稱有㫖亦不得開門欽此遵㫖議定凡奉㫖差遣及緊要軍務立時啟門者正陽西直二門遇有陽文合符至門該城門領即將合符驗明啟門放行仍報知步軍統領其餘各門遇有陽文合符即報知步軍統領親齎隂文合符赴門驗明啟門放行均於次日奏聞八年題準守衞禁門官兵於門内排列正坐者官降三級調用兵鞭八十九年覆準恭遇御殿及廵幸之地有應開之門不開者䕶軍統領罰俸兩月直班䕶軍叅領司鑰長降一級罰俸一年同班䕶軍叅領罰俸一年䕶軍校罰俸三月十二年議準有醉卧於禁門内者官革職兵鞭一百又題準有人擅進紫禁城叩閽者守門官罰俸六月直班司鑰長罰俸三月又議準凡朝㑹之日守衞午門端門闕左右門各官禁止閒人出入倘失於照管任其出入即將不行攔阻之直門官罰俸一月十三年議準兵丁私倩人代班者鞭六十代班者同罪不行察出之該管官罰俸六月該管大員罰俸兩月乾隆二年議準每月逢五逢十常朝日禮部行文兵部轉咨步軍統領令守城門官於曉鐘後啟門四年題準凡遇致祭城外各壇廟日期城内官竢啟門而出致祭城内各壇廟日期城外官竢啟門而入均由太常寺先期咨部部行步軍統領於曉鐘後啟門又議準恭遇御門聽政日由部行文步軍統領於曉鐘後啟門又議準内務府遇有祭神出城取水先期行文步軍統領啟門放行各部院八旗有應早啟門出入者先期咨部部行步軍統領放行如無兵部印文者不準又議準駕駐南苑及圓明園京城文武各官按日前往奏事步軍統領傳知正陽永定西直德勝西便各門酌量隨時啟閉其平民貿易往來者仍於質明放行七年議準閒人擅入禁門守門官不行察出舊制罰俸一年但門有内外不同其失察處分亦應區别嗣後協和門熙和門東華門西華門神武門並午門以外各門有閒人擅入者失察之守門官罰俸一月兵鞭二十左翼門右翼門昭德門貞度門中左門中右門後左門後右門景運門隆宗門及禁苑門有閒人擅入者失察之守門官罰俸一年兵鞭五十乾淸門内左門内右門禁苑門之宮門有閒人擅入者失察之守門官皆革職又題準守䕶禁門廵夜不接更籌傳遞者䕶軍鞭八十該管䕶軍校罰俸一年䕶軍叅領罰俸六月䕶軍統領不將收放更籌時刻明白曉諭以致失誤傳遞者罰俸三月又議準城門領城門吏門千總容留閒人近門住宿者罰俸六月故縱閒人近門烤火延燒城門者革職領催兵丁交刑部治罪失察蓄髪僧人入城者罰俸一月領催兵丁鞭四十一汛守順治初年定看守街道步軍尉曠班不宿罰俸兩月擅離汛地罰俸一月領催曠班鞭五十擅離汛地鞭三十步軍曠班鞭四十擅離汛地鞭二十失察之步軍尉罰俸一月康熙二十二年議準恭遇聖駕廵幸由部行文滿洲䝉古漢軍八旗都統於城上每旗增設堆舖六座街道每旗增設堆舖十座内城各門於門内每旗增設堆舖一座正陽門八旗輪直其餘各門八旗分設堆舖各一座每座委官二人兵十人直守仍令叅領稽察皇城内外緊要地方將各城上原設步軍移直看守每旗令步軍協尉一人直宿廵察堆舖柵闌官兵令捕盜步軍尉嚴行廵察竢囘鑾日撤囘每年封印日起至開印日止亦如之由部委官以時稽察有曠班及軍器不全者指名題叅雍正五年議準看守倉庫官物等處曠班者官降一級兵鞭六十十二年題準車駕廵幸塗次有叩閽者如在官兵管轄之内該管步軍尉罰俸六月步軍協尉罰俸兩月步軍鞭八十若衝突儀仗叩閽者直班冠軍使雲麾使治儀正整儀尉各罰俸六月閒人充作校尉行走者鑾儀衞堂司各官知而故縱者皆革職失察司官故縱之堂官罰俸一年其止於失察者雲麾使治儀正整儀尉各罰俸一年冠軍使罰俸六月堂官罰俸三月乾隆五年議準恭遇車駕謁陵城上增設堆舖六座分委官兵直守如遇駕幸口外每旗應增設十五座每座委官兵十人晝夜直守叅領二人往來廵察又議準駕駐圓明園及南苑八旗都統於城上每旗增設堆舖六座每座委官兵十二名與城上步軍相閒直守仍令叅領一人管轄六年奏準恭遇車駕廵幸前三門外向繫廵捕營叅將率所屬各官直班看守嗣後將八旗步軍編設堆舖二十座在營兵堆舖相閒增置令步軍尉十六人管轄步軍協尉四人廵察其餘各門外守備在各門弔橋處直班千把各官在關廂處直班加謹守䕶竢囘鑾日撤又議準凡直班處交代不淸即行囘去耆照曠班例減一等處分倉庫曠班應降一級罰俸一年者減一等罰俸一年街道曠班應罰俸兩月者減一等罰俸一月其接班之人因交代不淸擅離汛守者照前例再減一等紫禁城大城直班交代不淸者亦如之又議準禁城外違禁開設店面容畱匪類該汛步軍尉不行廵緝者罰俸一年步軍協尉副尉各罰俸六月步軍翼尉罰俸三月統領罰俸兩月至蓄髮僧人入城棲止該汛步軍尉緝獲者免議如被旁人緝獲將步軍尉罰俸一月十二年題準車駕廵幸塗次叩閽者若去御路稍逺在官兵管轄之外該管步軍尉罰俸三月步軍協尉罰俸一月步軍鞭四十一白塔信礮順治十年奏準前在盛京時凡遇有緊急則鳴鼓以集衆及入北京因京城遼濶設礮於煤山以爲信後復停止今雖太平無事但恐一旦警急無憑集衆議定於白塔山暨九門各設礮五位豎旗五杆遇有警急聲礮爲號旗杆上晝則懸旗夜則懸鐙白塔鳴礮則九門皆應之各旗聞礮聲皆披甲御前内大臣侍衞入直者仍留直所不應入直者左翼於紫禁城東華門右翼於西華門外齊集内府叅領佐領各率䕶軍驍騎於紫禁城北門外齊集前鋒䕶軍統領前鋒䕶軍叅領各率前鋒䕶軍兩黄旗於地安門兩白旗於東安門兩紅旗於西安門兩藍旗於金水橋齊集其都統副都統率所屬官兵於各旗適中之地齊集都統前鋒䕶軍統領親赴午門聽令如都統無人則副都統副都統無人則叅領前鋒䕶軍統領無人則前鋒䕶軍叅領或侍衞前來候㫖步軍協尉各率步軍尉步軍環立城上議政和碩親王以下固山貝子以上各留隨侍屯於本旗䕶軍齊集之處和碩親王領十五人多羅郡王領十人多羅貝勒領八人固山貝子領六人各齊集午門外不與議政王以下公以上各率隨侍屯於本旗䕶軍齊集之處未上朝王以下公以上各在家遣䕶衞一人赴午門聽信其齊集之時自和碩親王以下公以上各令直門官兵留於各門聽調即至王公府屬官兵各齊集於本主之門其白塔鳴礮或奉上諭遣人或部中遣人持有金牌至則舉礮金牌書奉㫖鳴礮字樣藏於禁中如有急不及報聞則各於有急之處舉礮聞礮聲則各礮臺皆舉礮其守白塔礮臺用漢軍兩翼信礮官各二人領催二人每旗驍騎二人各城門礮原有城門領甲兵應量撥人舉礮一夜禁順治初年定京城内起更後閉柵闌王以下官民人等不許任意行走步軍尉等分定街道界址輪班直宿步軍協尉往來廵邏由部委官稽察有不閉柵闌及不傳籌擊柝者察明議處至夜行之人除奉㫖差遣及各部院差遣外其因喪事生產問疾請醫祭祀嫁娶燕㑹者該直宿官兵詳問事故記其旗分佐領姓名住址開柵放行按汛遞交不得羈留繫無故夜行王以下官及婦女均詢記姓名送至其家對鄰右説知被獲時刻民人即羈候均於次日呈報步軍協尉轉報步軍統領將無故夜行之王公及各官等請㫖交宗人府部院察議旗人鞭五十民人笞五十若直宿兵丁徇隱不報或受賄縱放被旁人拏獲首報者鞭一百罰銀三兩給首報之人該管步軍協尉等分别議處康熙十二年題準街道柵䦨不傳籌擊柝及夜行人犯獲後脱逃者直宿步軍尉罰俸兩月步軍協尉罰俸一月領催鞭三十兵鞭二十七若未起更之先妄拏者直宿步軍尉罰俸三月步軍協尉罰俸兩月領催兵丁各鞭一百又題準各官因問病祭祀嫁娶等事夜行步軍故爲留難勒索者鞭五十若因勒索不休即行責打致傷者罰俸六月無故夜行罰俸一月至將步軍捉至家中者審實革職毆傷者交刑部乾隆七年議準失察步軍得財縱放夜行人犯者直宿步軍尉罰俸三月步軍協尉罰俸兩月知其受賄扶同徇隱者步軍尉革職步軍協尉降三級調用一救火順治初年定八旗火班八處每處滿洲䝉古漢軍三旗輪流都統或副都統一人叅領以下官十人兵八十名直宿遇失火都統等即領一半官兵往救其餘官兵仍留該班處備用康熙三十年議準城外失火步軍統領即率屬官開門往救兩翼步軍翼尉親督官軍在門防守次日報部存案雍正二年題準曠誤火班官罰俸一年兵鞭五十失察之該班都統等罰俸兩月又議準海子内失火該管官不行撲滅以致延燒者罰俸一年看守兵丁鞭一百即行撲滅者免議八年諭嗣後東南失火著正藍鑲白二旗往救西南失火鑲藍鑲紅二旗往救東北失火鑲黄正白二旗往救西北失火正黄正紅二旗往救若皇城之内每翼二旗往救步軍等見失火處即報相近旗分不可有誤欽此又議準凡遇内城公廨倉庫及該旗地方失火其報火之步軍及救火之旗分如有遲誤皆照曠誤火班例分别議處責懲大閲一大閱順治十三年奏準冬季農隙之時大閱武事令官兵披執操演宰牛羊設筵燕黜陟賞罰次日進表謝恩十六年諭大閱典禮三年一行已永著爲例連年尚未修舉今不得再緩著即傳諭各旗官兵整肅軍容候秋月朕親行閱視爾部即詳察應行事宜擇吉具奏欽此康熙二十四年諭國家武備不可一日懈弛舊例每歲必操練將士習試火礮爾部即傳諭八旗都統等豫爲整備朕將親閱焉欽此是年聖祖仁皇帝由午門出宣武門八旗都統各帥所部將士擐甲胄屬櫜鞬建旗纛自灣子里夾道分列至拱極城前鋒官軍自蘆溝橋夾道分列至王家嶺山麓官軍排槍列礮分東西次第布列聖祖仁皇帝登王家嶺陞座軍中吹螺角者三發巨礮三排槍相繼齊發已而命將士發巨礮八旗所列將軍礮位及諸火器一時並發凡二次乃御行宮召扈從諸王内大臣等賜燕畢復御黄幄設布侯較射而還三十一年聖祖仁皇帝幸玉泉山