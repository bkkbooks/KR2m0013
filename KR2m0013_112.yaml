旗王一人大臣二人由總理演兵王大臣等行文宗人府吏兵二部咨取職銜奏請欽㸃並委內務府官內管領驍騎校尚茶尚膳人等管理所有饌筵豬羊等物即交王等護衛官員人役協同備辦於大閲日黎明王大臣等並內務府官尚茶尚膳人等公同監看務令暖食周遍十七年奏準八旗漢軍管領藤牌參領八人散秩官驍騎校各十有六人領催四十名散秩官驍騎校領催即於炮營內委撥兼管藤牌兵八百名遇大閲之年令其守護炮位入隊操演二十年奏準大閲日陳騎駕鹵簿於行宮門外駕出作鐃歌大樂奏壯軍容之章回鑾作鐃歌清樂奏鬯皇威之章駕將出聲炮三駕御帳殿開操時軍中三舉炮大閲禮成駕回行宮聲炮三將士各歸營釋甲胄大狩一行圍禁令國初定獵場官兵如行走不齊前後雜亂呼應不靈者該管官罰俸一月䭾獸取箭遷延落後者鞭三十如該管官拔取本人箭者免議被旁人察出該管官罰俸一月越衆騎射擾亂圍場者該管官之馬入官繫平人委署之官鞭五十侍衛護衛亦將馬入官隔山岡射箭者鞭三十追銀五兩給首告之人將同行人遺棄以致凍死者委出首領之人鞭七十繫官罰俸九月在禁約地方畋獵者為首人鞭八十為從者鞭五十所獲之獸入官繫官罰俸一年天聰九年奉㫖凡參領該管汛地務宜申明約束遇野豕及熊勿射但向圍內逐之若遇虎遣人奏聞並傳報諸貝勒其人隨後躡其蹤若朕及諸貝勒已射之獸從人尾追勿因所追之獸脫走而奪他人所射之獸倘有奪去者許同赴驗傷痕官處察視又定圍場內王貝勒貝子公等如誤射王者罰銀三千兩誤射貝勒者罰銀二千兩誤射貝子公罰銀千兩均給被傷之人仍按本爵各罰俸兩月無端妄射者請㫖推問誤射下人者罰俸兩月驗其傷痕輕重照出征受傷等次追銀給被傷之人射死者照陳亡例罰銀賞給外别罰銀二百兩恤其家其傷輕者罰銀百兩未傷者罰銀五十兩均給被傷之人宗室公等被傷加銀百兩宗室被傷加平人二等覺羅被傷加平人一等王貝勒等射傷下人馬匹者罰俸一月馬死追賠凡官員誤射王貝勒等不論有傷無傷皆論死誤傷所乘馬匹免死折贖嚮王貝勒等射箭箭至十步內者鞭五十如射傷平人或致死者照陳亡例追銀賞給外仍鞭一百傷輕者鞭七十射傷馬者鞭五十傷馬而互相隱諱者鞭八十罰銀三十兩給首告之人順治八年定鑾駕啓行陳鹵簿內大臣侍衛等均於駕後分隊隨行每隊馬首排齊前後相距丈許各隊伍毋許越次遇狹隘處候首隊過畢後隊方行不得溷爭若奉㫖傳後隊侍衛等官由兩旁進退不許衝入儀仗侍衛等官從人均在後隊隨行若侍衛等官易馬至後隊易畢即馳入本隊扈從王貝勒等恭候駕出即乘馬在旁稍後隨行王等各隨護衛三人按該王等左右翼隨行王貝勒等赴御前止許親身從旁入召問則勒馬稍後缺身恭對赴駐蹕所於三十餘丈外下馬扈從都統統領副都統等各率所屬官兵按旗以次隨行赴駐蹕所於六十餘丈外下馬康熙二十二年諭圍獵之制貴乎嚴整不可出入參差令左翼官在左右翼官在右統轄而行宗室公等毋得越圍場班次在後逗遛如後逗遛則衆人停待圍場必致錯雜統圍大臣須嚴加管轄欽此又定凡遇舉行大狩先期領侍衛內大臣遵㫖行文各該處豫備應辦事宜應用執事官兵豫行委出按次隨行又定車駕狩田領侍衛內大臣前引大臣前鋒護軍統領咸著黃色馬褂近御大臣侍衛奉有㫖者準服又於隨蹕三旗侍衛內選善騎射者各十有五人亦給以黃色馬褂凡御射之獸令其追獲八旗護軍參領副參領咸著本旗色馬褂鑲黃正黃旗色褂用金黃色八旗副都統如之又定扈從王公親隨護衛馬褂各隨本旗之色親王十有三人世子十人郡王九人長子貝勒八人貝子六人公四人公等以上之子屬櫜鞬隨圍者亦隨三人不屬櫜鞬者令隨營行又定畋獵時鑲黃正白鑲白正藍四旗護軍以次列於左正黃正紅鑲紅鑲藍四旗護軍以次列於右分兩翼各建纛以為表兩哨前隊建白纛兩協建黃纛中建鑲黃纛纛制方竹竿鐵頂紅麾由武備院領取每護軍三人令一人負旗二人射獸嚮內射獸沿圍射畢即回本隊嚮外射者獲獸取箭畢即馳至圍場遷延落後者鞭三十彼此匿獸鞭八十二搶奪柴草鞭八十追還該管官罰俸一月盜鞍轡鞦韂等物鞭八十二罰銀三兩箭不書名罰銀十兩均給拏獲之人無銀者鞭三十失火鞭一百規避鞭七十又定凡用披子箭射中王貝勒等無論有傷無傷皆處死如有義骲箭繫官革職繫平人鞭一百射中貝子公等傷重者亦處死傷輕者鞭一百籍其家未傷者免死折贖傷馬者鞭一百嚮王貝勒等射箭箭至十步內者披子箭鞭五十繫義骲箭免罪傷馬互相隱諱者亦免罪隱匿遺失馬匹兵鞭五十罰銀十兩官鞭責折贖罰銀十五兩均給首告之人該管官統轄不嚴罰俸一月乾隆元年奉㫖專設總理行營王公大臣六人凡行營一應行程圍獵駐蹕守衛等事均隸焉六年諭國家武備不可廢弛朕於秋月出口行圍原以訓練兵丁仿古獮狩之禮昔我皇祖每歲舉行所經由道路及一切事宜皆有章程朕今歲踵行悉遵舊制但恐歷年已久地方官員或藉端擾纍隨從人等或有恣意需索及强買物件不按時價者著直隸總督不時察參毋得容隱欽此又諭朕初次行圍所有經過州縣前經屢降諭㫖不令絲毫擾纍但安營除道未免有資民力朕心軫念著將該地方本年應徵額賦酌量蠲免統計十分之三以昭朕體恤閭閻之意欽此又諭朕行闈回京之後恭閲太宗皇帝實録內載昔太祖時我等聞明日出獵即豫為調鷹蹴毬若不令往泣請隨行今之子弟惟務出外遊行閒居戲樂在昔時無論長幼爭相奮勵皆以行兵出獵為喜爾時僕從甚少人各牧馬被鞍析薪自㸑如此艱辛尚各為主效力國勢之隆非由此勞瘁而致乎今子弟遇行兵出獵或言妻子有疾或以家事為辭者多矣不思勇往奮發而惟耽戀室家偷安習玩國勢能無衰乎此等流弊有關於滿洲風氣是以䝉太祖皇帝諄切訓諭朕此次行圍諸王大臣中竟有耽戀室家托故不願隨往者朕已為姑容亦不必明指其人夫行圍出獵既以操演技藝練習勞苦尤足以奮發人之志氣乃滿洲等應行勇往之事若惟事偷安不知愧恥則積習相沿實於國勢之隆替甚有關繫嗣後倘有不知悛改仍蹈前轍者朕斷不輕為寬宥可遍行傳諭諸王大臣及官兵人等知之欽此八年奏準皇上行圍隨駕官兵跟役或偷其主馬匹衣物或偷他人馬匹衣物逃走以及為竊盜者交行在步軍營嚴加察拏被獲者照行軍例加倍治罪自行在逃走人等如有失察繫在何處出入即將該汛官兵比尋常放過逃人之例加倍治罪十年諭朕向來巡幸所過地方特簡大臣嚴察隨往官兵人等不許蹂躪農田滋擾百姓此次啓行之時正值秋成在望禾稼尚未登場誠恐約束不嚴以致踐踏禾黍有妨農務著都統護軍統領等管理多撥官兵沿塗稽察嚴加鈐轄其隨從官員兵丁亦令將家人跟役自行管束如有不遵禁令傷及田禾者即行參處並行令該督提等遴委員辨一並稽察欽此一各省駐防隨圍康熙四十六年奉㫖杭州江寧西安駐防滿洲官兵無出差行走之事徒自安居暇逸必致頺惰廢弛嗣後此三省令該管大員於官員驍騎校及兵丁內簡選在外省生長之人年力强壯弓馬嫻熟者每省令二十四人來京學習隨圍行走既得熟練騎射亦可分别優劣以備升用五十年議準荆州官兵亦照杭州等省之例簡選來京隨圍學習其人數每省定為十有六人乾隆元年奉㫖駐防官兵學習隨圍之事甚善自三年為始照舊例令輪班前來三年奏準京口杭州漢軍官兵乍浦之滿洲官兵遇行圍之年每處令其簡選八人來京隨圍學習六年奉㫖駐防官兵操演之事甚善朕前已降㫖令照舊輪班前來今年朕行圍哨鹿著該部照例行文各處令其辦理遣赴京城其如何輪班及辦理遣回之處該部議奏嗣後遇朕行圍應否令其前來該部豫行請㫖遵㫖議準駐防官兵來京隨圍學習除杭州江寧等省己經定有額數無庸再議外其福州廣州莊浪凉州寧夏成都均繫邊逺地方太原滄州德州鄭家莊各駐防官兵無多綏遠城駐防官兵繫鎮守邊外要地均無庸令其簡選來京惟天津靑州右衛離京甚近應令每處各選十六人河南選八人來京隨圍學習熱河選二十四人即在本地豫備隨行再杭州等十處學習隨圍官兵共一百四十四人應定以班次杭州京口西安三處為第一班江寧天津右衛三處為第二班荆州靑州乍浦河南四處為第三班遇行圍之年令該將軍副都統照例選送來京到京時照例歸於上三旗護軍統領管轄未出圍以前照行營錢糧給與盤費出圍時照護軍校護軍例給與官馬盤費回時視省分道里遠近酌給盤費又覆準西安漢軍官兵遇行圍之年簡選八人來京隨圍學習又奏準熱河官兵再委百名學習隨圍十七年奉㫖熱河隨圍兵丁著止委五十名一邊外行圍康熙年閒定如駕幸木蘭行圍由理藩院行文喀喇沁扎薩克王等遴選所屬兵或千人或千二百人或七八百人以都統副都統參佐領等官統馭先蒞圍場祗候行圍之制分官軍為兩翼前哨左右建藍纛左翼建白纛右翼建紅纛正中建黃纛䝉古圍制同前纛由工部備往如駕幸盛京吉林黑龍江由兵部行文各該將軍簡選官兵令該將軍統馭前來車駕沿邊行幸由理藩院行文車駕所經沿塗百里內蒙古扎薩克王公台吉選官兵令該扎薩克王公統馭前來一如前制大狩設圍豫期定圍場於某處自某處起經由某處於某處收圍均編定地方至期官兵於黎明即赴圍場布圍成列恭候車駕臨圍射獵又以八旗官軍善騎射者於蒙古圍外環以重圍以射逸出圍外之獸一駐劄行營康熙年間定嚮道奏定駐蹕之地護軍統領營總各一人率護軍參領護軍校護軍豫往相度地勢廣狹同武備院卿司幄及工部官設立行營中建帳殿御幄繚以黃髤木城建旌門覆以黃幕其外為網城正南暨東西各設一門正南建正白東建鑲黃西建正黃護軍旗各二東西門後三面設連帳旌門領侍衛內大臣率侍衛親軍宿衛網城門八旗護軍統領率官兵宿衛又外八旗各設帳房專委官兵禁止喧譁御營之前扈從諸臣不得駐宿東四旗在左翼西四旗在右翼均去御營百步建鑲黃旗護軍纛於後正黃旗護軍纛於右正白旗護軍纛於左扈從人等各按翼駐宿舊制兩翼建八旗護軍纛各一北上前一排為王公次一排大臣侍衛其次大小官員扈從人等各按旗分品秩安立行帳駐北御前大臣侍衛內府官員執事人等均靣去行營二里外前鋒營相形勢設卡倫於路左右八旗各設帳房豎旗幟以為偵哨以禁行人䝉古王公台吉去御營三五里外各酌立營帳路中設頓營或一或二亦由嚮道指定地方護軍參領率護軍建黃布幔城武備院設帳殿每日輜重行時豫期奏請欽㸃大臣數人統轄武備院卿嚮導護軍參領率御營輜重前行次三旗營總護軍參領率三旗護軍纛並行王以下輜重均各隨纛行毋許攙越爭前落後康熙十年奉㫖停用木城均用黃布幔城雍正元年定網城改形圓周設連帳仍開三門各建上三旗護軍旗二守以上三旗護軍於網城十二丈之外又設連帳一重形亦圓四靣各設一門南建正藍鑲藍護軍旗各一東建鑲白西建鑲紅北建正紅護軍旗各二守以下五旗護軍均統以營總去營六十丈八旗各設五帳房禁止喧譁營後去二里增設前鋒卡倫一如營前又定王公去御營三五里以外别立營帳駐宿令隨蹕之宗人府王公統轄如領府事王公等皆不與隨蹕即於隨蹕王公內請㫖以一二人兼攝乾隆六年駕幸木蘭賞賚隨蹕侍衛參領護軍各執事人等白金八千八百餘兩十六年奉㫖今歲木蘭行圍即至多倫諾爾程塗稍遠隨往之侍衛參領護軍及各執事人著照六年木蘭行圍之例加恩賞賚二十年定御營建黃幔城外為網城網城連帳百七十五架設旌門三南門建正白金龍纛二東門建鑲黃金龍纛二西門建正黃金龍纛二周圍建鑲黃金龍三角旗共四十一守以上三旗護軍去網城連帳十有二丈為外城連帳二百五十四架設旌門四南門一日建正藍金飛虎纛二一日建鑲藍金飛虎纛二東門建鑲白金飛虎纛二西門建鑲紅金飛虎纛二北門建正紅金飛虎纛二周圍東南面建正白西南靣建正紅東北面建鑲黃西北靣建正黃金飛虎方旗共六十守以下五旗護軍去外連帳六十文周圍設警蹕帳房四十架每帳房建護軍旗各一東南靣正藍西南靣鑲藍東北靣鑲白西北靣鑲紅共四十以八旗護軍專司清蹕一演習畋獵康熙二十一年題準八旗每歲畋獵三次春季定於三月秋季定於九月冬季定於十二月內舉行每次令滿洲䝉古每佐領下護軍二名驍騎四名內領催一名每旗護軍參領二人內令一人為營總每參領下以護軍校二人委署參領護軍二人委署護軍校八旗共委前鋒校前鋒一百三十名每翼前鋒參領一人前鋒侍衛一人八旗滿洲䝉古委參領一人為營總每參領下委散秩官三人驍騎校一人以散秩官一人為營總八旗漢軍以參領一人為營總每參領下委散秩官驍騎校各二人以散秩官一人為營總每參領下領催二名驍騎二名同赴圍場演習射獵二十三年江寧將軍奏請率標下官兵一年兩次行圍奉㫖所奏極是各省駐防官兵若不令其每年行圍習武漸至怠緩軍士將流於玩愒為非但江寧地方駐防雖久向不曾令其行圍恐民人不知以為駭異著該督撫將習武行圍之處明白傳諭又恐軍士行圍藉端搶奪騷擾地方著該將軍嚴行禁戢雍正八年奉㫖步行較獵甚為善事人人既得學習而於行圍之道亦得嫻熟爾等每年與其較獵一次不若多演數次為佳嗣後於初冬行步圍時每一旗令行圍二三次其行圍之時著各該旗大臣等親身率往於前一日奏聞每圍令尚虞侍衛執事人鷹房人或二十人或三十人亦著前往如此則侍衛執事人等既得學習而兵丁等亦得嫻熟行圍之道矣乾隆六年覆準熱河官兵每年於收穫之後耕種之前在熱河附近地方演習行圍毋致疏懈十六年諭四川提督奏稱向來直省督撫提鎮均有行圍之例擬於冬三月內農事已畢之時察照往例於成都附郭不近田園之地率領官兵前往圍獵往返數日親加訓練等語直省營伍操演武藝不過拘泥成法於安營住宿之地馳騁奔走之勞無從肄習於行陳未有實濟惟行圍可使將辨士卒練習勤勞此奏甚為有益著通行各省陸路提鎮仍照舊例每歲冬季輪撥標兵親身督率實力舉行務使嫻熟嚴整以裨實用但既令出圍若仍復按期操演兵丁未免過纍著於行圍之時酌量停止操演日期以示體恤並嚴加約束不得蹂躪田園占宿廬舍致滋騷擾並不可日久復致廢格欽此欽定大淸會典則例卷一百八
