body:
  text: 理藩院旗籍清吏司一疆理內扎薩克䝉古諸部落壤地相錯形勢相聨東接盛京黑龍江西鄰厄魯特南至長城北踰絶漠袤延萬餘里科爾沁六旗在喜峰口東北八百七十里東西距八百七十里南北距二千一百里東至扎賴特界西至扎魯特界南至盛京邊牆界北至索倫界至京千二百八十里右翼旗駐劄巴燕和碩右翼前旗駐劄席喇布爾哈蘇右翼後旗駐劄恩馬圖坡左翼旗駐劄伊克唐噶里克坡左翼前旗駐劄伊克嶽里泊左翼後旗駐劄雙和爾山扎賴特一旗駐劄土伯新察漢坡在喜峰口東北千六百里東西距六十里南北距四百里東至杜爾伯特界西與南均至郭爾羅斯界北至索倫及杜爾伯特科爾沁右翼後旗界至京二千有十里杜爾伯特一旗駐劄多克多爾坡在喜峰口東北千六百四十里東西距百七十里南北距二百四十里東至黑龍江界西至扎賴特界南至郭爾羅斯界北至索倫界至京二千五十里郭爾羅斯二旗在喜峰口東北千四百八十七里東西距四百五十里南北距六百六十里東至吉林界西至科爾沁界南至盛京邊牆界北至科爾沁界至京千八百九十七里前旗駐劄古爾班察漢後旗駐劄榛子嶺敖漢一旗駐劄古爾班圖爾噶山在喜峰口東北六百里東西距百六十里南北距二百八十里東至奈曼界西至喀喇沁界南至土默特界北至翁牛特界至京千有十里奈曼一旗駐劄彰武臺在喜峰口東北七百里東西距九十五里南北距二百二十里東至喀爾喀左翼界西至敖漢界南至土默特界北至翁牛特界至京千一百十里翁牛特二旗在古北口東北五百二十里東西距三百里南北距百六十里東至阿祿科爾沁界南至喀喇沁及敖漢界西至熱河禁地界北至巴林及克西克騰界至京七百六十里右翼駐劄英席爾哈齊特呼郎左翼駐劄扎喇峰西巴林二旗右翼駐劄托鉢山在古北口東北七百二十里左翼駐劄阿察圖拖羅海又東北六十里東西距二百五十一里南北距二百二十三里東至阿祿科爾沁界西至克西克騰界南至翁牛特界北至烏朱穆秦界至京九百六十里扎魯特二旗在喜峰口東北千一百里東西距百二十五里南北距四百六十里東至科爾沁界南至科爾沁及喀爾喀左翼界西至阿祿科爾沁界北至烏朱穆秦界至京千五百十里左翼駐劄齊齊靈花拖羅海山北右翼駐劄兔爾山南喀爾喀左翼一旗駐劄察漢河朔墩在喜峰口東北八百四十里東西距百二十五里南北距二百三十里東至科爾沁界西至奈曼界南至土默特界北至扎魯特及翁牛特界至京千二百十里阿祿科爾沁一旗駐劄渾圖山東在古北口東北千一百里東西距百三十里南北距四百二十里東至扎魯特界西至巴林及翁牛特界南至喀爾喀左翼界北至烏朱穆秦界至京千三百四十里克西克騰一旗駐劄吉拉巴斯峰在古北口東北五百七十里東西距三百三十四里南北距三百五十七里東至翁牛特及巴林界西至正藍旗游牧察哈爾及蒿齊忒界南至翁牛特界北至烏朱穆秦界至京八百十里土默特二旗在喜峰口東北五百九十里東西距四百六十里南北距三百十里東至養什木地界西至喀喇沁右翼界南至盛京邊墻界北至喀爾喀左翼及敖漢界至京千里左翼駐劄旱龍潭山右翼駐劄大華山喀喇沁二旗又增設一旗在喜峰口東北三百五十里東西距五百里南北距四百五十里東至土默特及敖漢界西至正藍旗王屯界南至盛京邊墻界北至翁牛特界至京七百六十里右翼駐劄席伯河北左翼駐劄牛心山增設一旗在二旗界內烏朱穆秦二旗在古北口東北九百二十三里東西距三百六十里南北距四百二十五里東至索倫界西至蒿齊忒界南至巴林界北至瀚海至京千一百六十三里右翼駐劄巴克蘇爾哈臺山左翼駐劄魁蘇拖羅海阿霸垓二旗在張家口東北五百九十里東西距二百里南北距三百十里東至阿霸哈納爾界西至蘇尼特界南至正藍旗游牧察哈爾界北至瀚海至京千里右翼駐劄科布爾泉左翼駐劄巴顔額隆蒿齊忒二旗在獨石口東北六百八十五里東西距百七十里南北距三百七十五里東與北均至烏朱穆秦界西至阿霸垓界南至克西克騰界至京千一百八十五里右翼駐劄特古力克呼都克井左翼駐劄呼默赫泉蘇尼特二旗在張家口北五百五十里左翼東西距百六十里南北距三百里右翼東西距二百四十六里南北距二百八十里東至阿霸垓右翼界西至四子部落界南至正藍旗游牧察哈爾界北至瀚海至京九百六十里右翼駐劄薩敏西勒山左翼駐劄俄材圖察伯臺岡阿霸哈納爾二旗在張家口北六百四十里東西距百八十里南北距四百三十六里東至蒿齊忒界西至阿霸垓右翼界南至正藍旗游牧察哈爾界北至瀚海至京九百六十里四子部落一旗駐劄烏藍額爾吉坡在張家口西北五百五十里東西距二百三十五里南北距二百四十里東與北均至蘇尼特界西至歸化城土默特及喀爾喀右翼界南至鑲紅旗游牧察哈爾界至京九百六十里喀爾喀右翼一旗駐劄他魯渾河在張家口西北七百十里東西距百二十里南北距百三十里東至四子部落界西至毛眀安界南至歸化城土默特界北至瀚海至京千一百三十里吳喇忒前中後三旗均駐劄鐵柱谷䝉古名哈逹馬爾在歸化城西三百六十里東西距二百十有五里南北距三百里東至毛眀安及歸化城土默特界西至鄂爾多斯界南至黃河及鄂爾多斯界北至喀爾喀右翼界至京千五百二十里毛眀安一旗駐劄車突泉在張家口西北八百里東西距百里南北距百九十里東至喀爾喀右翼界西至吳喇忒界南至歸化城土默特界北至瀚海至京千二百四十里鄂爾多斯六旗又增設一旗在歸化城西二百八十五里沿黃河套