校內以次推升若驍騎校員闕遴選前鋒護軍領催驍騎內弓馬精熟能約束者録用均令該都統㑹同將軍保送到院引見補授四十七年題準寧夏有城守都司一人管轄把總二人兵丁五百名並無應理之事裁去都司改設理事官即令在都司衙門駐劄鑄給辦理䝉古內地人民等字樣關防凡沿邊地方䝉古事件均令㑹同該扎薩克完結不能完結者報院其原有兵丁五百名應撥三百名屬二把總管轄仍令照常守禦其餘二百名聽理事官酌量編為書吏快役此改設理事官於各部院滿洲旗員及本院䝉古旗員內保舉引見補授定為三年更代六十一年覆準湖灘河朔至中衛沿邊鄂爾多斯六旗原設辦理䝉古內地事務官二人㑹同該扎薩克辦理完結均駐劄寧夏如關繫神木榆林等處䝉古事務遙辦恐致遲誤應將此二官分駐寧夏一人神木一人雍正元年諭昔年皇考聖祖仁皇帝由寧夏親征朔漠時巡狩歸化城地方見兩旗官兵委靡弓馬不習因將兩旗都統革退别選京員管轄舊習漸改是以數年來選用京員之例已經停止歸化城土默特兩旗原在四十九扎薩克內其都統副都統等官皆國初歸附之土默特功臣子孫世爵今遵復舊制都統副都統員闕著將兩旗應補人員與原任都統副都統世家子孫及參領內人材可用能約束兵丁曾經效力行間人等保送引見欽此又定土默特什長能與內地人一例當差者準帶藍翎三年奏請歸化城都統所請引見官員每員闕送四五人引見之處應否準行奉㫖此等人若在佐領內推升者照爾等所請只送二人前來若於參領及闔旗內簡選者著照伊等所請將送來人員引見擇其可用者照闕補用其餘可用者記名遇闕録用乾隆十三年議準土默特左翼都統自原任都統丹津病故無後奉㫖以在京旗員補授右翼都統員闕仍於土默特䝉古內補授均由院辦理其原設副都統四員應裁汰二員每翼各留二員歸於兵部補授又議準扎薩克䝉古與同知通判等地方官彼此袒護所屬之人辦理公事不無掣肘應於翁牛特王旗下烏蘭哈達地方遣司官一人駐劄令其將喀喇沁翁牛特二王喀喇沁扎薩克一旗及翁牛特貝子二巴林阿祿科爾沁等處凡有䝉古內地民人交涉事務一并管理再於土默特貝子旗下三座塔地方遣司官一人駐劄令其將二土默特一敖漢喀喇沁貝子及奈曼喀爾喀西勒圖庫倫等處凡有䝉古內地民人交涉事務一并管理仍各㑹同該扎薩克隨事完結倘有不公再赴地方官告知各鑄給關防以昭信守此差往司官定為三年更代照坐辦扎薩克事務官之例每年廩給銀三百六十兩並令每年所管之地遍巡一次别給銀百兩以為公費應於原任台吉蘇克都爾之妻所進十一佐領內擇其年力精壯者設佐領二人領催四名兵六十名分與二處公事差遣毋庸召募書吏又議準見在八溝南邊之民人鄉長等及喀喇沁翁牛持二王旗下事務繫八溝同知辦理喀喇沁貝子扎薩克二旗及敖漢一旗事務繫塔子溝通判辦理均隸於熱河道其土默特事務繫九關臺同知辦理隸奉天府尹但九關臺同知駐劄關內義州相隔較逺難以彈壓且見在土默特貝勒旗下民人寄居者甚多應裁九關臺同知一官所有事務歸并塔子溝通判兼理隸於直隸總督該通判衙門原有捕盜兵丁二十五名今既兼理土默特事務不敷使用應令該提督於所屬兵丁內酌選數名調往駐劄其塔子溝通判原管之三旗內有喀喇沁扎薩克塔布囊一旗應改隸附近之八溝同知兼理十四年諭哨鹿圍場繫䝉古地方宜歸理藩院管轄嗣後圍場總管作為該院所屬欽此十五年奏準克西克騰旗下居住之民開墾地畝雖不甚多亦交與烏蘭哈達駐劄官員兼管每年巡察時就近一并巡察報院十八年議準圍場增設八旗滿洲䝉古兵丁八百名舊設四品總管一人六品官八人地方遼濶不足以資彈壓應將總管改為三品仍照舊例由京師補授六品官改為五品再於左右二翼每翼增設四品翼長一人每旗增設驍騎校一人其補授翼長等官令該總管於本處官員內遴選送院引見補授二十年奉㫖見出歸化城都統班達爾什員闕此都統原繫伊祖杭久功績所立後因伊子以軍務獲罪革退始將别支拖博克補授嗣因伊族內不得其人遂由京城大臣內簡選管理四次後又因伊等子孫內仍有可用之人是以將根敦暨伊子班達爾什補授二次今又出闕都統有辦事之責非世職可比若都統員闕補授伊等子孫不惟不能辦事且本旗台吉大員甚多亦未必服伊管轄應仍照從前别行簡選補授其班達爾什後嗣著特恩賞給對品世職男爵令其承襲承襲後若行走好人去得著保題參領如果勝參領之任著保題副都統朕量其人材即用為副都統都統無為不可其應行承襲見今賞給男爵及補授都統之人著該衙門察奏遵㫖以班達爾什之子賽音畢力克圖等及應補都統之上三旗該處副都統等分班引見奉㫖男爵著賽音畢力克圖承襲都統員闕著副都統阿爾斌補授賽音畢力克圖看來人尚去得著加恩補授阿爾斌副都統員闕令其勉力行走二十三年諭向例歸化城土默特補放參領以下等官令其多選數人咨送引見者誠恐䝉古多跋涉之勞耳按歸化城地近黑龍江黑龍江補放索倫官員止簡選正陪並未咨送多人今補放土默特官令其多送數員引見雖䝉記名亦一時不能得闕徒勞往返嗣後補放土默特參佐領護軍校驍騎校時亦照黑龍江例每闕著送正陪各一人欽此又議準喀喇沁旗分䝉古民人交涉事件向經烏蘭哈達三座塔司官分管者嗣後改歸八溝𣙜稅司官兼理二十六年議準歸化城土默特旗分每翼各設都統一人副都統一人應裁汰都統一人其副都統二人仍令分翼管理都統一人綜理兩翼之事二十七年議準各䝉古扎薩克旗下都統副都統員闕均由台吉內遴選如台吉內不得其人始準於所屬旗人內簡補如台吉內有人而扎薩克狥私越保該盟長察出報院參處嗣後遇有補放員闕並緣事革退者扎薩克報院核眀實繫應補應革照覆遵行年終由院彚奏一次有私自補放革退者亦將該扎薩克參處二十八年諭歸化城都統一闕原繫土默特䝉古世襲之闕後因土默特䝉古風氣日下無可承襲都統之人其闕由京簡員補放土默特賞給世職但隨都統辦事皆土默特䝉古官員役使不得其人以致由京補放之都統不曉彼處情形與䝉古動輒掣肘不能釐剔私弊挽回陋習且歸化城事亦甚簡著將都統之闕裁汰土默特䝉古等即歸併綏逺城將軍管轄將軍管理土默特事務著分為兩翼一駐歸化城一駐綏逺城協同將軍辦事其歸化城副都統綽和諾仍留任福祿著來京候㫖欽此一移駐康熙二十六年覆準索倫貧人求入內地應差者著在索倫地方郎中總管逐一察問有情願充驍騎者安置在默爾根愛渾等處遴選才能分别授為佐領驍騎校歸入該處旗分管理交黑龍江將軍給與錢糧軍器其不願充驍騎者仍留原住地方二十九年定索倫貧人編入旗分每佐領各給馬三匹牛三頭驍騎校各給馬二匹牛二頭驍騎等各給馬一匹牛一頭三十三年覆準巴爾虎二次遷來人丁共六百三十七户八百三十九丁二千七百二十九口內有牲畜營生者四百三十四名五百十有一丁編為佐領安插在胡朱爾河游牧其牲畜少而貧者二百有三户三百二十八丁編為四佐領每佐領各八十二丁選六十名充驍騎餘二十二丁候補遴選才能者授為佐領驍騎校安插在納默爾河之博爾得村地方與達虎里四佐領一處居住照前給索倫窮苦兵丁之例給與盔甲軍器牛畜令該將軍遴選原任人員到院補授原職訓練教養盔甲軍器交工部造發動用博爾得村倉米給與口糧其買備馬牛銀三千九百兩於盛京户部銀庫備用項下支給五十四年覆準郭爾羅斯台吉所進佐領遷在白都訥等處安置者不必歸并原扎薩克地方此後佐領無應襲之人應歸公者即住原籍在公中應差行走該扎薩克照常約束不必遷移永為定例雍正九年議準前後撥在黑龍江編設佐領居住新舊烏良海等自駐防以來伊等生計實無裨益應照從前所收巴爾虎等入於旗分佐領下充驍騎食糧之例將舊住兩佐領之烏良海等交黑龍江將軍新收之烏良海兩佐領下人分給吉林盛京二處交該將軍等均入於各佐領下令充驍騎仍每人給銀三兩以為遷移之費十一年覆準每年進貢貂皮之鄂倫椿哈薩竒人等若歸於穆路蘇黨阿一處則旗分各别相隔又逺於伊等打牲毫無裨益若遷移呼倫布俞爾伊等原繫習慣步獵船漁未慣騎乘亦不能與索倫達虎里一例效力應將哈薩竒二十六丁編為半佐領歸并伊等同旗見駐默爾根後呼馬爾地方編設舊鄂倫椿喀雅楚等兩佐領下駐劄一索倫等處授官康熙八年議準索倫總管為三品副管為四品三十年定索倫達虎里總管員闕令該將軍㑹同總管等遴選應補之人一并咨送具奏引見補授雍正五年諭聞索倫達虎里等處兩年馬匹牲餼多有倒斃豐歉不一兵丁生計稍艱著動户部帑銀五千兩交總管副都統與將軍公同商酌養育索倫窮苦之人及賞給效力兵丁欽此又議準索倫達虎里生齒日繁額設滿洲副管四人索倫達虎里副管四人不敷管束應各增四人遇員闕遴選合例人員引見補授六年覆準捕牲索倫達虎里之驍騎校員闕照補授捕牲索倫達虎里副管佐領之例令黑龍江將軍遴選應補之人擬定正陪保送到院引見補授十一年覆準進貢貂皮之鄂倫椿哈薩竒人等别編半佐領設佐領一人領催三人其應補佐領人員令黑龍江將軍擬定正陪保送引見補授一印信康熙二十五年題準䝉古管旗扎薩克及索倫等處總管均照在內都統之制各鑄給印信以昭信守乾隆十二年議準內扎薩克六盟長均給與印信十九年奏準圍場總管鑄給印信左右二翼翼長鑄給關防一軍功國初定䝉古王貝勒貝子公台吉等有軍功者量其功之大小議敘身故者一例題請賜恤順治十八年題準䝉古人有始從其主歸降及隨軍嚮導指路有功敕給達爾漢號世襲者其頂帶坐褥照䝉古旗員分别給與永襲者同都統雖永襲而功少者同副都統襲六次五次四次者同參領襲三次二次及止授本身者同佐領康熙二年題準台吉等有軍功者量功給與爵級有一等功牌六箇以上者為一等三箇以上者為二等一二箇者為三等有二等功牌二箇以下者槩為四等三十年覆準䝉古雲騎尉非陳亡者不準承襲一㑹盟國初定每㑹設盟長一人各於所屬三年一次㑹盟清理刑名編審丁籍又定㑹集不到者王等罰馬二十匹扎薩克貝勒貝子公等十五匹台吉等十匹以充公用逾期者王以下各按日罰馬又定㑹盟出征圍獵等事不候衆先回者王罰馬十匹扎薩克貝勒貝子公等七匹台吉等五匹隨從人罰取所騎之馬順治元年題準㑹盟敕書由內閣撰給康熙八年題準㑹盟未至及因事傳召不到者都統罰馬五匹副都統四匹參領三匹佐領二匹驍騎校一匹領催罰騸牛一頭什長罰犙牛一頭至而逾期者都統罰馬四匹副都統三匹參領二匹佐領一匹驍騎校罰騸牛一頭領催罰犙牛一頭什長鞭二十七如八旗游牧總管及索倫總管不齊集不如期至者照䝉古部落副都統例游牧副管索倫副管照䝉古部落參領例佐領驍騎校領催什長悉照䝉古部落佐領驍騎校領催什長例分别罰懲十三年定每年春季扎薩克王貝勒貝子公台吉等各將旗下台吉兵丁㑹集一處令其修理器械聽盟長驗看操演又題準內外各扎薩克旗分每年十月一班十二月一班每旗各差一人於盟長處