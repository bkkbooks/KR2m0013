統等勿得在前領纛編隊隨踪而逐追兵遇伏散追遇衝王貝勒都統等接戰起兵時各按纛結隊而行如三三兩兩前後亂行回取什物及酒醉喧譁爭鬭者隨見隨懲夜間勿得髙呼勿得鳴螺仍各將條誡紀律申諭所管兵隊其有一二人離隊行走者拏送該旗王貝勒都統處罰騸牛一頭行兵之際有一二人離伍搶掠被害者將妻子入官該管官治罪失火者斬不許拆毁廟宇不許妄殺平人抗拒者擊投順者撫其俘獲之人勿得剝取衣服拆散夫婦至不堪俘獲者亦勿得傷害剝取衣服俘獲之人勿令看守馬匹凡出征王貝勒等務平定地方救濟生民嚴禁官兵不許搶掠不許陷害良民平定之日升賞若縱兵搶掠指民為賊妄行殺戮者從重治罪與敵人合戰時有將墮馬之人救出與以馬騎者公以下副都統以上酬馬十匹參領輕車都尉以下六匹庶人二匹均於墮馬人名下取給康熙十三年定扎薩克王貝勒等不整理軍器至期㑹之處察出何旗兵丁器械殘毁惡劣即將本旗該管扎薩克罰俸六月台吉之兵丁人等器械殘毁惡劣罰牲畜五其盔尾甲背無名牌軍器自馬絆以上無名牌者罰牲畜三馬不烙印不繫名牌者罰㸬牛一頭梅針大箭兔叉骲箭上無名字者罰犙牛一頭各給拏獲之人又題準官員擅殺投降人者為首絞餘人革職罰三九十五年題準差出從征官員規避者革職罰三九交與該管王等仍令充兵押赴出征領催兵丁人等鞭一百仍遣往軍前又定軍兵有犯邊者王貝勒貝子公台吉等無論管旗不管旗各將户口收斂一面率領合屬兵丁速赴侵犯之處一面行文鄰近旗分即領兵公同救援齊集後共商進討若於侵犯之處不速赴集及鄰近旗分之王等奉調不即領兵赴援者皆革爵又定凡奉差出兵之王扎薩克王貝勒貝子公台吉等不親身前往者革爵仍令從軍不全將旗人帶往者以軍法論於所期約地方一日不到者罰俸三月二三日不到者六月四日不到者九月五日以上者一年又定奉文出兵將官馬騎瘦者王貝勒貝子公台吉無論管旗不管旗皆罰俸六月無俸之台吉仍照例罰馬十匹一製買騎仗順治七年題準䝉古人偷賣馬匹被人執送者以其半給執送之人康熙二年題準䝉古人買軍器帶往者令扎薩克王貝勒貝子公等詳開某佐領下某人買何器械數目若干具文差官報院不差官不詳開者不準給出口信票五年題準擅以甲胄弓矢軍器賣與喀爾喀厄魯特等及給親戚者王罰馬百匹貝勒貝子公七十匹台吉五十匹再䝉古人來京不呈眀本院私買軍器帶回者王等罰三九台吉都統副都統參領佐領護衛官員皆罰一九庶人鞭八十十一年題準䝉古王貝勒貝子公等欲向歸化城買馬駝者報院轉奏請㫖本院給印文令往不得擅行十二年題準公主郡主王貝勒額駙等向歸化城買馬駝者將差往人數報院題眀不得多差又定內外扎薩克䝉古等甲胄弓矢軍器不得賣與俄羅斯厄魯特倘有違禁私行售賣及送給親戚者或被拏獲或被首告無論管旗不管旗王貝勒貝子公扎薩克台吉等皆罰俸一年無俸之台吉罰馬五十匹庶人犯者為首絞監候家産牲畜盡行籍沒為從鞭一百罰三九牲畜所籍沒畜産及罰取牲畜咸賞給拏獲首告之人如奴僕首告家主者將首告之奴僕開户聽其擇主雍正十年定內外扎薩克等滋生壯丁編設佐領或修補損壞器械該扎薩克具保用印文來京製買軍器所買之物不多者本院即給與信票令其出口若所製軍器多至成具者本院請㫖令其製買乾隆六年議準嗣後各扎薩克有印文來買軍器者酌量該旗佐領豫行具奏給票將所買之數核對若已足該旗佐領需用之數暫不準買至於實不堪用之時具文再買如原未買足或察閲軍器大臣令其改換亦著具印文買補甲胄弓撒袋刀槍過二十副鳥槍過十桿硝硫黃過三十斤箭過千枝者皆為成具請㫖之後給與出口信票不及前數者由院行文兵部給票若各扎薩克製買本身需用之物除鳥槍硝硫黃等物外弓矢刀勿得禁又定製買軍器浮於票數或浮於入邊原數被獲者不論管旗不管旗王貝勒貝子公扎薩克台吉等皆罰俸六月閒散台吉管旗都統以下驍騎校以上罰牲畜一九庶人鞭八十多帶軍器入官一優恤康熙十九年題準䝉古四等台吉以上遣往統兵陳亡者照都統例給陳亡優恤銀其餘官兵陳亡傷殘病故應賞恤銀均照內例給與一比丁國初定䝉古壯丁年六十歲以下十八歲以上者皆編入丁册有疾者除之每三丁共一驍騎遇有出征等事以二丁差遣一丁留家又定䝉古壯丁三年一次編審有隱匿者將所隱之丁入官隱至十户者管旗王貝勒等按罰一户出首人令改附願往旗分順治四年題準審丁時數目開載不全後雖聲眀仍以隱丁論十二年題準首隱丁者準在編審之年首告越二三年後首告者不準康熙五年題準䝉古編審丁册照戶部例詳開具題十三年題準䝉古各扎薩克三年一次編審壯丁如有隱匿將所隱之丁仍造入丁册隱至十人者將管旗之王貝勒等各罰俸三月都統副都統罰三九參領佐領罰二九驍騎校罰一九均給與首告人領催什長各鞭八十誣告隱丁者鞭一百罰三九又定歸化城等處無王貝勒管旗如有隱丁者都統副都統各罰牲畜五九參領罰三九佐領革職罰二九驍騎校革職罰一九均給與首告人首告人及所隱之丁仍各留舊佐領若所隱之丁繫䝉古家奴賞給兩旗內官員為奴十八年題準出首隱丁之子弟在所隱內者均準於旗內聽所欲往二十二年題準屬下奴僕出首本主隱丁者照例於旗內聽所欲往擇主若出首他人不許出戶仍將所罰牲畜給與二十九年覆準比丁之年傳示四十九旗著該管王貝勒都統以下什長以上按佐領察核分户比丁造具丁數印册令協理旗務台吉㑹同都統送院限十月內齎到又覆準遇比丁之年索倫等處人丁亦照四十九旗之例察眀造册令總管送院於十月內齎到四十四年覆準嗣後出首隱丁之人照例準其出戶令於貧窮之台吉內擇主一隨丁順治五年題準䝉古親王給壯丁六十名郡王五十名貝勒四十名貝子三十五名公三十名固倫額駙四十名和碩額駙三十名多羅額駙二十名以供役使九年題準䝉古台吉及喀喇沁土默特塔布囊一等者給壯丁十有五名二等十有二名三等八名四等四名康熙三年題準䝉古都統給壯丁四名副都統二名均於本旗內選給參領佐領共一名均於本佐領內選給又定都統副都統參領佐領等於所屬人內補授者照例給與隨丁以供役使若於台吉內補授者本身既有隨丁不必重給十一年題準額駙等所役兵丁雖額駙身故亦不裁汰四十四年覆準定例台吉等各有隨從附丁既令遴選台吉等補授都統佐領等職仍將台吉等原有附丁隨侍行走嗣後不得更以驍騎為從役一陪嫁順治初年定䝉古親王之女照內親王之女郡主陪嫁除乳母夫婦外侍女八人閒散五戶郡王之女照內郡王之女縣主陪嫁除乳母夫婦外侍女七人閒散四戶貝勒之女照內貝勒之女郡君陪嫁除乳母夫婦外侍女六人閒散三戶貝子之女照內貝子之女縣君陪嫁除乳母夫婦外侍女五人閒散兩戶鎮國公之女照內鎮國公之女鄉君陪嫁除乳母夫婦外侍女四人閒散兩戶輔國公之女照內輔國公之女鄉君陪嫁除乳母夫婦外侍女三人閒散兩戶台吉之女照內鎮國將軍輔國將軍之女陪嫁屬下人不得過一對家下人不得過三對再台吉等嫁女既受有聘禮不得比照內鎮國將軍輔國將軍之例不陪侍女應增侍女二人以上陪嫁人數或無力從減及乳母夫婦可否陪嫁之處各聼其便康熙二十一年題準公主郡主等陪嫁人許其守墓及補護衛並閒散使令不得充補驍騎一守墓順治九年題準䝉古親王守墓人十戶郡王八戶固倫公主與郡王同貝勒貝子各六戶和碩公主郡主與貝勒同鎮國公輔國公各四戶郡君與鎮國公同縣君鄉君與其夫同其大臣護衛及曾經出征效力之人不許守墓一族長康熙四十四年覆準䝉古台吉等不立族長無所統屬應每族各設族長稽察本族內􅒬酒行凶等事一什長國初定䝉古地方每十家設立一長令其稽察約束如不設立什長該王罰馬十匹扎薩克貝勒貝子公等七匹台吉五匹又定不設立什長者扎薩克王貝勒貝子公台吉等各罰俸三月乾隆十三年議準䝉古地方民人寄居者日益繁多賢愚難辨應令差往之司官及該同知通判各將所屬民人逐一稽考數目擇其善良者立為鄉長總甲牌頭専司稽察遇有踪跡可疑之人報官究治遞回原籍該司官同知通判每年於春秋二季將所屬民人姓名造成一簿並飭取具鄉長總甲牌頭各無容留匪類甘結存案此內有作姦犯科之人視其所犯輕重將鄉長等分别治罪其托名傭工之外來民人一槩逐回如實繫親戚骨肉倚賴為生者即取具容留之人甘結後有過犯一并治罪又議準䝉古民人借耕種為由互相容留恐滋事端嗣後䝉古部內所有民人民人村中所有䝉古各將彼此附近地畝照數換給令各歸其地此內惟土默特貝子喀喇沁郡王喀喇沁貝子扎薩克塔布囊等四旗民人雜處已久一時難以分移應令扎薩克㑹同司官同知通判等漸次清理又議準喀喇沁三旗自康熙年間呈請內地民人前往種地每年由戶部給與印票八百張逐年換給見今民人前往者衆此項印票竟成具文應行停止嗣後責令司官暨同知通判等察眀種地民人確實姓名見在住址及種地若干一戶幾口詳細開注給與印票貿易民人亦一例察給仍令鄉長總甲牌頭等於年終將人口增減之數報官察核換給印票一立嗣國初定䝉古人無子者將所有家産給本主順治十五年題準䝉古人身殁無子者令其兄弟承受産業十八年定䝉古人恐身後無嗣於身在時具保呈眀該扎薩克王貝勒貝子公等將族中兄弟之子撫養為嗣者準其承受家産如抱養遺失之子及異姓之子家奴之子均不準承受家産若身在時並無養子者將家産令其族人承受倘族中並無兄弟之子身在時曾呈眀該旗收養異姓之子為嗣者亦準其承受家産若身故後同姓中尚有可繼之人而其妻收養異姓之子為嗣者不準承受家産再正妻無子將妾所生之子養為己子者其生子之妾不得嫁賣嫁賣者其子不得為嗣若身故之後既無近族又無養子將家産交與該旗王貝勒等以充公用又定䝉古人乏嗣有欲收養他人之子為嗣者並令呈報該旗王貝勒及都統等注册準其收養仍造入本旗本佐領下丁册倘不行呈報擅自收養者即將所養子徹出交回本家一婚姻國初定䝉古庶人結婚聘禮給馬五牛五羊五十踰數多給者入官聘定後壻故全還女故還半如聘定之女其壻憎嫌不娶者不還聘禮又定䝉古人結親行聘者改為馬二牛二羊二十不得多給違者將多給之牲畜罰取入官少給者勿禁若聘定之後其壻病故將所給牲畜退回男家其女故者給還一半如女家欲退還其壻不願收回者聽再男女婚姻各有其時如議定之女男家遲延不娶致及笄未嫁者聽女家於願婚處别嫁順治十四年題準凡出妻其陪嫁之物已經用完者不準賠償見今什物盡給該婦收回康熙十八年題準台吉等擅與喀爾喀厄魯特結婚姻來往者革去爵秩不準承襲所屬人全給其近族兄弟除妻子外家産牲畜皆入官所屬人隨往者各鞭一百罰牲畜三九將所屬人之女遣令隨嫁女之父不向扎薩克王貝勒處呈眀者鞭一百所遣送嫁屬人不自呈眀者亦鞭一百失察之卡倫官革職籍其家兵丁鞭一百罰三九若將所遣送嫁人誤以為逃人解院者扎薩克王等罰牲畜五九二十二年題準王以下至閒散䝉古違禁與喀爾喀厄魯特唐古忒巴爾虎等貿易結親者照定例治罪其四十九旗協理旗務人等及歸化城二旗都統至閒散䝉古量其品級治罪歸化城都統副都統管理索倫總管等各罰馬五十匹副管等各罰五九皆入官佐領以下至領催什長等有犯皆照䝉古例治罪又定王貝勒貝子公台吉等聘定之婦有乘間謀娶及女家悔婚别嫁者繫王各罰十戶貝勒貝子公七戶台吉五戶聽原聘之夫家簡取不論己未成婚並將其婦離異給與本夫又定䝉古人將他人聘定之婦乘間謀娶或女家悔婚别嫁者繫官罰三九牲畜常人罰一九仍將其婦離異給與本夫將所罰牲畜一并給與又定凡內地民人出口於䝉古地方貿易耕種不得娶䝉古婦女為妻倘私相嫁娶察出將所嫁之婦離異給還母家私娶之民照內地例治罪知情主婚及說合之䝉古人等各罰牲畜一九一徴收順治初年定䝉古王台吉等每年徴收所屬有五牛以上及有羊二十者並收取一羊有羊四十者準取二羊雖有餘畜不得增取有二羊者準取米六鍋有一羊者準取米一鍋其進貢㑹盟游牧嫁娶等事視所屬至百戶以上者準於什長處取一牛一馬之車有三乳牛以上者準取乳油一肚有五乳牛以上者準取乳酒一瓶有百羊以上者準增取氊一條濫徴者罪之雍正六年議準歸化城徴收貿易馬畜稅銀自康熙五十四年經議政大臣議覆令歸化三站每季買馬十五匹備用軍需俟告竣之時將用過稅銀核實報銷計自康熙五十五年至雍正二年共買過馬三百有七匹用過銀二千二百七十八兩有竒合算相符應準題銷再此項徴收稅銀自康熙四十二年始有案可稽自四十二年至雍正五年共收過銀二萬二百五十四兩有竒除買馬用過銀二千二百七十八兩外應存銀一萬七千九百七十五兩四錢有竒皆因修理倉厫文廟教場橋梁渡船買給站丁䝉古帳房應付厄魯特等廩給羊隻並製辦駝屉麻繩紙張等項用去除照册核銷外嗣後每年所收稅銀買用物件均合時價製辦不得浮冒仍照前將一年所收若干用過若干之處造具四柱清册報院乾隆十七年奏準八溝東西二街稅銀於乾隆十四年奏準交地方官徴收東街所徴各項稅銀每年賞給喀喇沁扎薩克王等養贍窮乏䝉古今該扎薩克呈報東西二街稅銀該地方官徴收多寡不一請將賞給東街稅銀仍照舊例交該旗自行徴收其事難行惟是各處收稅均設専官經理今八溝初定收稅章程交地方官永逺辦理二街稅銀難免參差䝉古人心亦不能遵服此項稅銀應將地方官徴收之處停止於本院司官內簡選幹員擬定正陪引見於十分內賞給該旗二三分以為養贍䝉古之用又奏準八溝東西二街稅銀令本院司官前往徴收一年更代應照駐劄三座塔辦事之例每年廩給銀三百六十兩並令該督於八溝地方設立衙署召募胥隸以供差遣仍照例鑄給管理八溝等處稅務關防十八年奏準塔子溝一帶地方耕種貿易聚集民人甚多塔子溝稅務應令八溝收稅司官兼理一例徴收再簡選筆帖式一人前往塔子溝駐劄協辦稅務其收稅司官原議每日廩給銀一兩實不敷用今酌定司官日給銀二兩筆帖式日給銀一兩均一年更代至塔子溝每年所收稅銀如何分賞該扎薩克俟報到之日再行具奏請㫖二十一年覆準烏蘭哈達三座塔司官照八溝之例兼司𣙜稅事務二十五年覆準多倫諾爾貨物較前雖增與八溝情形逈别茶布等項俱自張家口販往毋庸重復徴稅惟自庫倫恰克圖換回貨物及自盛京前來貿易者均由䝉古地方行走此內四項牲畜業經於乾隆十五年設稅起徴而皮張等物未有徴稅之例除販往别售者仍聽各賣處照例納稅外其在多倫諾爾售賣者應一例徴收落地稅再克西克騰木植未進口者向不納稅而見在多倫諾爾民居商販日漸繁多蓋房製器在在皆須木料且自上都河至潘家口一帶地方遼濶易於偷運亦應仿照口內之例徴收木稅所有議增前項稅課自乾隆二十六年為始即令原奏之該御史前往多倫諾爾㑹同該管同知就近試收據實册報俟一二年後辦有章程定額題報二十六年題準歸化城稅務改歸殺虎口監督兼管又議準歸化城為䝉古商民輻輳之處所有煙油酒三項及皮張雜貨等物皆應歸入落地稅內照例徴收其駝馬牛羊除進口外若繞道趕往他省售賣者亦應一例徴稅以防透漏至於鐵器不許出口原指軍器及可以置造軍器之鐵而言若種地農具及平常日用器皿給票驗放毋許守口官辨刁難勒索亦應照例收稅再四項牲畜到歸化城每價銀一兩徴制錢八文向繫土默特䝉古徴收作為公費今既歸入正額仍令土默特等照每年應用之數具領關支該監督於任滿時一并造册報核一田宅順治七年題準外藩䝉古每十有五丁給地廣一里縱二十里乾隆十三年議準民人所典䝉古地畝應計所典年分以次給還原主土默特貝子旗下有地千六百四十三頃三十畝喀喇沁貝子旗下有地四百頃八十畝喀喇沁扎薩克塔布囊旗下有地四百三十一頃八十畝其餘旗下均無民典之地以上地畝皆繫䝉古之地不可令民占耕應令扎薩克等察眀某人之地典與某人得銀若干限定幾年詳造清册送該同知通判辨理照從前歸化城土默特䝉古徹回地畝之例價在百兩以下典種五年以上者令再種一年徹回如未滿五年者仍令民耕種俟屆五年再行徹回二百兩以下者再令種三年俟年滿徹回均給還業主又議準民人在䝉古地方租種地畝賃住房屋務令照原議數目納租交價倘恃强拖缺或經扎薩克行追或經業主房主舉告差往之司官及同知通判等即為承追缺至三年者即將所種之地所賃之房徹回别行召租又議準䝉古台吉官員喇嘛皆稱殷實惟在下兵丁貧乏者多此等殷實之人每倚恃已力將旗下公地令民人開墾有自數十頃至數百頃之多占據取租者是以無力䝉古愈至困窮應令殷實之扎薩克台吉官員公主郡主等陪嫁內監及番僧等地內酌撥三分之一各與本旗窮苦䝉古耕種仍量其家口多寡分給地畝並將撥出數目造册報院嗣後仍有開墾旗下公地强霸窮人地畝者從重治罪十四年覆準喀喇沁土默特敖漢翁牛特等旗除見存民人外嗣後毋許再行容留民人增墾地畝及將地畝典給民人其如何委官巡察等事由院間年一次簡選才能司官二人自次年為始將喀喇沁土默特等旗分為兩路馳驛前往㑹同該同知通判並駐劄辦理䝉古民人事務之官巡察該扎薩克䝉古等若再圖利容留民人開墾地畝及將地畝典給民人者照隱匿逃人例罰俸一年都統副都統罰三九佐領驍騎校皆革職罰三九領催什長等鞭一百其容留居住開墾地畝典地之人亦鞭一百罰三九所罰牲畜賞給本旗效力之人並將所墾所典之地徹出給與本旗無地之窮苦䝉古其開墾地畝以及典地之民人交該地方官從重治罪遞回原籍該管同知通判交該部察議其八旗游牧察哈爾種地居住民人亦交與稽察喀喇沁等處官員㑹同各該總管及同知通判等一并稽察若有容留增墾地畝及典與民人等事即將墾種典地之䝉古民人等交與該總管嚴行治罪民人遞回原籍其並不實力稽察之該管官亦一并交部議處十八年覆準圍場內增設兵丁賞給官房地畝免其納糧每兵丁一名賞給地一頃二十畝令其耕種度日又覆準圍場地方新增駐防兵丁內多呼岱口後興安等處地冷霜早耕種無益應將鑲黃正黃正紅三旗兵丁改賞牲畜每兵丁一名給乳牛三頭每乳牛三十頭各給犍牛一頭羊三十隻令其永逺孳生以資養贍一游牧國初定越境游牧者王罰馬十匹扎薩克貝勒貝子公七匹台吉五匹庶人罰牛一頭又定越自己所分地界肆行游牧者王罰馬百匹扎薩克貝勒貝子公七十匹台吉五十匹庶人犯者本身及家産皆罰取賞給見證人康熙元年題準各部䝉古不得越旗畋獵十九年題準䝉古扎薩克王貝勒貝子公台吉等有因本旗地方無草欲移住相近旗分及卡倫內者於七月內來請由院委官踏勘勘實準行若所居地方生草茂盛甚於所請之處者將妄請之扎薩克議處至他月來請者槩不準四十七年覆準鄂爾多斯貝勒所屬䝉古人等游牧地方嗣後於黃河西河之間柳延河之西所有柳墩剛柳墩房孰西墩均以西臺為界自西臺之外插漢拖輝處暫許䝉古游牧至寧夏平羅營一帶地方人民原於插漢拖輝採取柴薪令限一月內採取五次其採取時給與號牌令人監管來往之人并令該地方官嚴察五十一年議準插漢拖輝地方前於四十七年暫給䝉古游牧今居民不便耕耨若久雜處必至爭訟嗣後以黃河為界永禁游牧雍正五年議準越自己所分疆界肆行游牧者王貝勒貝子公台吉等無論管旗不管旗皆罰俸一年無俸之台吉及庶人犯者仍照例罰取牲畜一卡倫康熙十三年題準䝉古汛地各設卡倫以資防守若有空誤卡倫者佐領革職罰三九驍騎校革職罰二九兵丁鞭一百如擅離汛地佐領驍騎校皆革職兵丁鞭八十本身器械闕少者佐領驍騎校各罰二九兵丁鞭八十佐領驍騎校失察本卡倫人闕少器械者各罰一九十五年題準賊入卡倫竊盜牲畜追賊被殺同往兵丁退縮不戰者各鞭一百罰三九牲畜給被殺人妻子二十年題準在卡倫參領不發遣兵丁各防汛地及佐領驍騎校不在各汛地擅往參領處同住或在汛地而馬匹被盜者參領佐領皆革職罰三九驍騎校革職罰三九領催兵丁鞭八十巡邏兵丁鞭一百二十九年覆準卡倫接連邊外方得整齊除索倫達虎里五卡倫相連不必那移外杜爾伯特郭爾羅斯二旗卡倫原設哈達雅地方與默爾根村莊相近應移於席令吉齊河山頂安設其扎賴特三卡倫亦近索倫游牧之處應將東頭卡倫移於柴河北山頂安設中卡倫移於伊罕克勒河山頂安設西卡倫移於庫哷勒齊山頂安設至科爾沁三卡倫坐落內地與各處窵逺應將東卡倫移於哈布齊河山頂安設中卡倫移於納哈拜齊扎爾漢山頂安設西卡倫移於哈嘛爾口北山頂安設四十四年題準自歸化城至殺虎口方二百里前經安設六處卡倫今按殺虎口歸化城之間有東西兩路東路嶺隘河多雨雪時行走甚難應將所設六卡倫徹去西路平穩應於束爾昆東口安設二十戶為驛再額倫布塔處將土默特人安設二十戶喀拉巴拉克郎孫處將鑲藍旗游牧察哈爾人安設二十戶共六十戶委官三人令其管轄往還巡察以便公差一防察順治七年題準䝉古人出境必於本旗都統禀眀違者將失察之都統副都統參領佐領什長一併議處雍正六年定䝉古王貝勒貝子等有前往五臺山誦經禮拜者隨往之人王不得過八十人貝勒貝子不得過六十人均照例給與進口印票又定內外各扎薩克䝉古皆令由山海關喜峯口古北口獨石口張家口殺虎口出入入關口時均告眀該管官辨詳記人數出關口時仍令察對原數放出若有置買物件報院轉行兵部給與出邊執照除此六邊口外别處邊口不準行走一捕逃國初定外藩逃人被獲者罰逃人之主一牛給拏獲之人逃人鞭一百窩隱逃人者罰牲畜一九給逃人之主窩主之什長罰牲畜一九給逃人之什長又定外藩䝉古全旗逃者不拘鄰近與否即刻往追以軍法從事若王等不追者罰馬百匹扎薩克貝勒貝子公七十匹台吉五十匹又定王貝勒等遇有他處逃來之人於二日內將為首逃來者解院若過二日王罰馬十匹兼扎薩克貝勒貝子七匹貝勒貝子五匹又定帶弓矢逃者二十人以下止令本旗追捕二十人以上並令鄰旗扎薩克王貝勒等量逃人多寡備馬匹行糧窮其所往若不緊追王罰馬二十匹貝勒貝子公十五匹台吉十匹中道而返者為首罰牲畜一九餘各罰牲畜五匿逃不速題報者王罰馬十匹貝勒貝子公七匹台吉五匹又定見逃故縱者王等罰十戶扎薩克貝勒貝子公罰七戶台吉罰五戶庶人罰牲畜三九又定卡倫官兵疏縱逃犯及追趕不力者佐領罰三九驍騎校二九皆革職領催革役鞭一百罰牲畜五驍騎鞭一百又定凡捕逃人與逃人鬭死者逃人如有奴僕償還一人並罰給牲畜三九又定䝉古買人出邊者永行禁止順治五年題準䝉古王貝勒等所屬人有私來內地者一槩發還又議準食俸之扎薩克王貝勒貝子公等失察窩留逃人者罰俸一年又題準䝉古地方有流離散失游食糊口賣身年久之疏逺族人懇求歸宗者均不準行倘於住久之旗逃赴别旗即著逐回别旗不即逐回者照窩逃論逃人亦鞭一百仍發回原住之旗康熙五年題準他處逃來之人至各卡倫者卡倫人即送至所投王貝勒處又題準與逃人鬭死者逃人如無奴僕向逃人原主扎薩克王貝勒等取三九賞給十三年題準出卡倫逃往外國之人如追時不曾抗拒者被獲之日將為首一人斬餘絞若持兵抗拒皆斬逃往外國被執送曾拒捕傷人者斬未傷人者鞭一百交還原主逃而未傷人自還者免罪交原主十六年題準追殺率先逃走之人即以其人家産牲畜給之不更給賞如逃人無畜産可給者卡倫佐領賞給蟒段緣領段袍一件段三匹布二十匹驍騎校賞給糚段緣領段袍一件段二匹布十五匹驍騎賞給段一匹布十匹又定他處逃來之人不於二日內解院者王貝勒貝子公台吉等皆罰俸三月無俸者仍照例罰馬二十六年覆準䝉古四十九旗及索倫達虎里等將內地民人及滿洲家下逃人窩留以為奴僕子孫妻妾者甚多嗣後䝉古等雇內地民人耕種之處永行禁止凡邊外生事流民及旗下家奴逃人交與各該管扎薩克各旗佐領不時嚴加緝捕送院照例從重治罪窩留內地逃民之窩主繫官革職鞭一百罰牲畜三九閒散鞭一百亦罰三九將此所罰牲畜皆給拏獲之人若該扎薩克所管人等不加嚴察經院察出或被旁人出首將窩隱正犯照例治罪出首之人奴僕開為正戶閒散人從窩主罰出牲畜三九給與失察之該扎薩克及協理旗務台吉等皆罰牲畜九九都統副都統參領等罰五九佐領驍騎校皆革職罰三九皆入官領催什長等各鞭一百三十二年覆準俄羅斯尼卜楚城守尉送回逃人二名著理藩院行文嘉奬並咨黑龍江將軍嗣後有伊處逃人潛住索倫等處者察出奏聞遣回又覆準凡無票私自出口之民被獲杖一百其妻及未分居之子安插山海關外遼陽等處五十一年覆準喀爾喀因前噶爾丹之亂失散人口若於㑹集處未經收回之人離居已久均在各旗分編佐領載入丁册難以給還嗣後有懇請歸族等事概不準行如從久住地方逃往别處者追回照逃人例治罪有不追回隱匿者照隱匿逃人律治罪曉諭各旗內外衆扎薩克八旗游牧察哈爾各旗下永著為例又覆準鄂爾多斯七旗內有賣去壯丁附丁及驍騎人口逃散糊口甚多委官察眀棄賣逃亡是實該管王貝勒貝子等罰俸三年協理台吉等罰三九都統副都統等罰二九其前未協理旗務至補授後不察眀呈報之台吉等罰一九本旗未賣人丁聽屬下逃散不能收養者貝勒罰俸年半協理台吉等罰二九都統副都統罰一九其擅賣人丁之台吉罰二九台吉已故者其妻罰一九擅賣人丁之驍騎校鞭一百驍騎校已故其妻罰牲畜五若買主有籍貫姓名者行文該管扎薩克及地方官追還人丁交該旗收領不給原價無籍貫姓名者行文內扎薩克衆喀爾喀及沿邊神木等處槩行嚴察限一年送還如一年內不能察交或被告發將該管扎薩克官員等治罪其察出送還者該旗收領行文報院嗣後各旗養育人丁不時嚴察若再有賣去壯丁及逃散人口者將該扎薩克經管之人皆從重治罪一驛站康熙二十八年題準殺虎口距歸化城二百餘里驛站勞苦原設胡齊特口之四十戶驛站與鑲藍旗甚近殊屬無用應移於歸化城中間酌量安設三十一年諭䝉古各旗按地方形勢動用部帑設立驛站中間相去百里察貧人給與役食應差俟年例朝覲王等來時議奏欽此遵㫖議準各䝉古地方皆應安設驛站以便公務除二土默特奈曼喀爾喀左翼科爾沁二郡王等六旗由山海關邊外行走二郭爾羅斯杜爾伯特等三旗在黑龍江大路此九旗無庸安設驛站外自喜峯口至扎賴特十九旗為一路計程千六百餘里見有管城二驛除此二百里應安設十四驛自古北口至烏朱穆秦七旗為一路計程九百餘里有鞍子村江鄉十八里臺諸驛除此三百里應安設六驛自獨石口至蒿齊忒七旗為一路計程六百餘里應安設六驛自張家口至四子部落五旗為一路計程五百餘里應安設五驛又自張家口至歸化城六旗計程六百餘里應安設六驛仍為張家口一路自殺虎口至吳喇忒七旗為一路計程九百餘里見有二驛除此二百里應安設七驛又自歸化城至鄂爾多斯二旗計程八百餘里應安設八驛仍為殺虎口一路各路驛站均於水泉形勢之處安設雍正六年議準自張家口以至歸化城前因噶爾丹之役設立庾吉昭化塔拉布拉克穆海圖和林郭兒等五站今應裁汰一切文移交軍臺遞送乾隆十四年諭哨鹿圍場邊口設有䝉古驛站穿行圍場之地不無驚擾此等驛站原為遞送院文於扎薩克而設無甚緊要事件若移設圍場之外不過繞道一二日應於圍場外何處設立察眀議奏欽此遵㫖議準五十家驛站移於圍場界外妹兒嶺東溝安設此內有伊等原種地畝應指定地方照數撥給毋許容留民人令伊等自行墾種一驛官康熙三十一年議準喜峯口古北口獨石口張家口殺虎口等五路每路設管驛䝉古員外郎一人令各掌關防與在京員外郎一例較俸升轉每路設筆帖式二人八年期滿更代照常給與俸祿每驛設領催一人凡管驛各官若有侵欺怠玩以及驛馬損傷者題參治罪三十二年覆準喜峯口獨石口張家口殺虎口驛站前因未設専管之人暫令關口守備把總等管理今每路各設専官凡䝉古往來事件應専委辦理以歸畫一惟古北口一路更屬緊要已特設管站同知一人嗣後站務著該管員外郎與同知㑹同辦理五十八年裁張家口滿洲筆帖式二人設䝉古筆帖式一人専司臺站文移案件六十年題準自屯兵以來驛站勞苦恐䝉古力不能勝貽誤事機特簡大臣一人總統驛站雍正四年議準驛站員外郎所管皆䝉古人從前皆由各部院司官內選除嗣後應由本院選賢能司官補授五年議準殺虎口獨石口兩路筆帖式亦照張家口之例各専設䝉古筆帖式一人七年裁古北口驛站筆帖式一人十二年議定張家口等五邊管驛站官員闕於雍正四年改從本院司官內簡選遣往若將賢能之人選委則本院辦事緊要差務人不敷用若將尋常之人委往又與驛站無益應將五路管驛站員外郎均定為三年一換再張家口古北口殺虎口獨石口四驛各委筆帖式一人惟喜峯口筆帖式二人應裁去一人以歸畫一此項委往之筆帖式亦定為三年更代倘員外郎筆帖式同届應換之期俟新任員外郎任事一年後再將筆帖式更代一驛丁康熙三十一年議準喜峯口一路除舊有二驛外置驛丁六百名古北口一路除舊有三驛外置驛丁三百名獨石口一路置驛丁四百五十名張家口兩路并為一路共置驛丁五百五十名殺虎口兩路并為一路共置驛丁七百五十名均於各路窮戶內擇其强健者選補每丁各給乳牛五頭羊三十隻以資養贍三十五年定驛丁為盜除照例治罪外管驛官罰牲畜一九驍騎校罰一五領催鞭八十雍正六年議準裁汰庾吉昭化塔拉布拉克穆海圖和林郭兒等五處驛站其驛丁五十名仍令各該扎薩克收回一驛馬康熙三十一年議準喜峰口等五路每驛置驛馬五十匹每馬各給價銀五兩每驛給馬價銀二百五十兩䝉古地方水草滋盛不必再給草料每年惟給與倒斃馬價銀一百二十五兩視原額以一半為度仍將買補數目造册報院三十二年覆準䝉古驛站向未設車恐誤公事應於喜峯口一路設五車古北等口四路各設二車其駕車馬於額設驛馬內選用車價照兵部買車例給發三十八年覆準䝉古驛遞差事漸少定例倒斃馬二十五匹給價一百二十五兩未免過多應裁減六匹以十有九匹為度原定馬價五兩應加給一兩五錢以六兩五錢計算嗣後各驛每年定倒斃馬十九匹各給銀一百二十三兩五錢照例買補造册報院六十年題準䝉古驛站自屯兵以來傳報公務押送軍餉火藥錢糧器械農具等項及押解發遣犯人護送投順人等接連馳驛甚屬勞頓此次特簡大臣總統驛站令其督率管驛各官按驛巡察如有闕少馬匹損傷牲畜將管站官所領倒斃馬價銀交與衆扎薩克速為買補再支庫銀萬兩付簡任之大臣齎往如額數仍闕即動此項銀買補足額務令驛站整齊勿致瘦敝雍正六年議準軍臺驛站馬匹倒斃原定四分應裁減二分作為二分倒斃原定駝一匹給價銀三十兩亦應減半定價銀十有五兩又議準自頭站察罕托羅海至十站卓哈諾爾圖所有從前支給五十匹馬之空草錢糧應移咨直𨽻總督裁扣又議準裁汰庾吉昭化塔拉布拉克穆海圖和林郭兒等五處驛站所有馬匹應歸入軍臺驛站於倒斃馬價內扣抵廩給羊隻應一并歸於軍臺又議準喜峰口內站驛馬六十匹殺虎口內站驛馬四十匹獨石口內站驛馬四十九匹古北口內站驛馬二十五匹獨張家口邊內內站驛馬數至百匹應裁減四十匹並將馬夫裁去此項裁減馬匹歸於倒斃馬價內扣抵七年議準殺虎口獨石口古北口喜峯口等邊驛站馬匹四分倒斃之例應照軍臺馬匹一例減去二分若遇雪霰過多之年倒斃較甚者管驛官據實報院再為辦理九年覆準見值軍興阿爾臺路軍臺驛遞甚繁每年二分倒斃實屬不敷應復四分之例駝價亦應照舊例每駝給價銀三十兩俟事簡價平之時再行核減十年議準歸化城及殺虎口等四處地方為來往通衢見值軍興應將八十家二十家薩里沁歸化城四站並殺虎口獨石口古北口喜峯口等四路驛站仍照從前四分倒斃之例支給錢糧乾隆元年議準軍臺驛站倒斃馬駝應於六月起減去一分作為三分給價其殺虎口獨石口古北口喜峯口等四路䝉古驛站亦應裁減一分十九年議準近來駝價已平阿爾臺路軍臺原領倒斃駝價三十兩應減去十兩為二十兩二十一年奏準阿爾臺路軍臺驛站所設馳送公務之駝內兼有牝牡又可每年孳生如與馬匹一例給與三分倒斃價銀似屬過多應酌量減去定為一分一驛使順治十三年題準遣祭䝉古使臣如程塗本近或時值夏秋皆令自備鞍馬如程塗遙逺及時值冬春許乘驛馬一品官給馬十五匹二品十二匹三品七匹四品六匹筆帖式四匹領催二匹兵丁一匹又題準達賴喇嘛來使暨子爵給驛馬十三匹車七兩男給驛馬十匹車四兩郎中員外郎給馬五匹車二兩筆帖式給馬三匹車一兩護軍領催各給馬三匹每二人給車一兩康熙三年題準遣往㑹盟大臣隨行郎中員外郎共六人主事一人筆帖式二人領催六人帶帳房米糧在野外安營駐宿尚書侍郎等各帶本職執事尚書給馬二十匹駝七侍郎給馬十八匹駝六郎中給馬八匹駝二員外郎主事各給馬七匹駝一八品九品筆帖式給馬六匹未入流筆帖式五匹領催三匹兵丁一匹又題準凡差遣筆帖式不準給信牌如衙門官員乏人止遣筆帖式者題請給與九年題準凡奉㫖特遣及本院往各旗遍𫝊事務緊急差遣或巡察卡倫送詔等事自內地馳驛外仍給信牌許乘邊外驛馬如往㑹所經之旗地方遙逺亦給信牌乘邊外驛馬餘惟遣往扎賴特杜爾伯特郭爾羅斯席伯索倫達虎里寧古塔瓜爾察等處者給本院印文照內地所乘驛馬之數乘邊外驛馬其遣往科爾沁烏朱穆秦蒿齊忒吳喇忒鄂爾多斯等處者冬春給院文乘邊外驛馬夏秋自備馬匹遣往喀喇沁土默特敖漢翁牛特奈曼巴林扎魯特克西克騰蘇尼特阿祿科爾沁喀爾喀左右翼阿霸垓阿霸哈納爾四子部落毛眀安歸化城盛京西勒圖庫倫等處者槩令自備馬匹十七年題準凡往㑹盟處自備馬匹者仍各給信牌印文以備急事驅馳三十年覆準䝉古驛站差務繁多嗣後除奉欽差緊要事件外凡封王致祭審理事務察㸃馬羣一應尋常事件均彚集一年兩次於四九月間差往均令由山海關出奉天法庫邊門不許槩乘過冬馬宰殺孳生羊如有浮斂勒索令該扎薩克舉報到院官員筆帖式革職領催拏送刑部如筆帖式領催等私行騷擾官員察舉者免議失察一并議處若冒稱公差勒索馬匹財帛者交刑部從重治罪三十一年議準各扎薩克一應公務皆準馳驛私事勿得擅用三十二年覆準喜峯口等五路驛站設立驛車惟進貢及要差方準應付其餘勿得濫給三十六年覆準驛站苦纍䝉古嗣後特㫖奉差仍準馳驛外各項事務停其馳驛將內八旗各佐領下餧養馬匹仍照兵部所定驛馬之數給與並量地逺近給與月糧令依䝉古定價買羊食用所差䝉古地方多無房舍止宿帳房恐其游牧遷移奉差人不知所在每宿處令䝉古人等即將站道相連之處眀白指示其所乘馬匹差還之日按數交還如有倒斃遺失著落賠償六十年題準從前種地農具送至屯兵地方均交山西巡撫由歸化城雇覔駝車𫝊送嗣後凡解送各項自京馳驛運至口外仍交山西巡撫動用大同府庫銀雇覔車馬運至屯兵之處雍正八年諭前往册封䝉古王福晉郡主之官員每路六人未免太多或讀講學士或侍讀侍講㸃出三人司官三人筆帖式三人著分為三路前往皆賞給盤費銀路用馬匹如何辦給之處大學士等㑹同理藩院議奏欽此遵㫖議準自康熙九年至三十五年册封䝉古王福晉郡主等事均繫口內乘驛口外騎烏拉後因軍興於康熙三十六年停止驛馬路逺及所至旗分多者將內八旗各佐領下餧養官馬輪流騎行近口居住之內扎薩克止一二旗者令騎本人之馬前往自裁驛站以來辦理無異今前往册封王福晉郡主之地方將內扎薩克及卡倫外喀爾喀和托輝特厄魯特等部落分為三路仍照舊例酌量給與驛馬每路各委部院司官二人筆帖式一人每人日給盤費銀各一錢三分永為例十三年定嗣後特㫖差遣者照例馳驛循例奉差遣出大臣侍衛官員在千里之內者照常乘官馬千里之外者乘驛馬按喀爾喀各扎薩克及科爾沁六旗郭爾羅斯二旗扎賴特杜爾伯特奈曼敖漢土默特貝勒等五旗巴林二旗烏朱穆秦二旗扎魯特二旗阿祿科爾沁一旗蒿齊忒一旗阿霸垓二旗阿霸哈納爾二旗蘇尼特二旗喀爾喀右翼一旗毛眀安一旗吳喇忒三旗鄂爾多斯七旗歸化城二旗均離京千里之外喀喇沁三旗土默特貝子一旗翁牛特二旗四子部落克西克騰喀爾喀左翼各一旗均離京千里之內一供應順治十三年題準本院官員領催等於十月至三月差往䝉古地方自備馬匹者準給口糧草料往張家口遞送喀爾喀厄魯特及喜峯口獨石口古北口等處差遣準給口糧馬草四月至九月止給口糧不給馬草康熙三十年覆準䝉古部落照本院所發印文供應差馬餼羊不許規避如不供應差馬者罰牲畜三九不供應餼羊者罰牛一頭其歸順之喀爾喀有雜處四十九旗地方者相其居處與何處相近亦照該旗定例應付違者照前例罰之如奉差人員勒索擾害亦令報院三十一年議準喜峯口等五路差使較黑龍江尤繁應給各驛買補供應羊價銀五十兩三十八年覆準䝉古各驛所定公用羊百隻給價銀五十兩應裁減四十隻以六十隻為額每羊增價二錢以七錢為度每驛各給羊價銀四十二兩該管官將各驛用過羊數造册報院餘銀仍歸次年之用四十四年覆準䝉古等每有公務皆於佐領下分撥供給原非奏定之例屬下人甚為苦纍理合禁止嗣後各扎薩克等將各旗所有罪罰牲畜存貯於該扎薩克處勿令倒斃豫備公務支用五十九年題準喀爾喀地方驛站數年軍務往來甚多擾纍嗣後差遣大臣官員及坐臺官員並部院官員筆帖式領催等行文該將軍均用營中軍需照品級給與行糧其取索喀爾喀食用之例永著停止雍正元年諭理藩院人員來往䝉古地方有不肖之徒肆行無禮勒索凌虐者夫䝉古之與中國不但伊扎薩克王即台吉亦繫賓客豈可令卑末領催肆行凌虐爾衙門嚴行申禁欽此乾隆二十一年諭聞得口外馳驛人員至驛所食飯者例給羊一否則折給羊價銀七錢口外驛站皆繫䝉古曠野之地非內地可比凡馳驛人員理宜給羊不得折給羊價著交與該總管嗣後口外馳驛人員驛所例給羊者仍給以羊將折給羊價永行禁止著為例欽此一開採康熙五十一年覆準喀喇沁楊樹溝雅圖溝大波羅樹等處産鉛察眀地方準令開礦屬內地者準民人開採屬䝉古地者準䝉古開採戶部及本院各委賢能司官一人監視其所定課即令每年納鉛交入錢局但不許造房種地致滋事端五十六年覆準翁牛特巴林克西克騰交界地方樹木行文三旗各令本旗協理台吉都統副都統等公同驗勘分為三分眀立界限如有越界斫伐樹木者治罪將分定界限令各旗繕造印簿送院備考六十一年奏準喜峯口雅圖溝廟兒嶺白馬川等處産鉛委內務府部院司官各一人㑹同斫木人等開採雍正元年奏準見在各處之礦皆令封禁雅圖溝等處鉛礦一例禁止開採一貢貂國初定索倫達虎里及鄂倫椿必拉爾人丁進貢貂皮除有事故者開除外將見年實在人丁令每丁貢貂皮一張此內一等貂皮五百張二等貂皮千張其餘均作三等收用如足數目符等次者送來之人照例賞賜不足不符者交院議處副管罰牲畜二九佐領罰一九驍騎校罰五各入官康熙三十一年奏準每年進貢貂皮上等者五百張內多則十餘張少或二三張不符等次若將該總管等一例議處無以勸懲嗣後於進貢貂皮時詳眀注册所補貂皮好者副管佐領驍騎校等免其議處再貂皮額數缺至百張以上者將副管等議處如缺百張以下從寬免議至次年進貢仍不足額或貂皮不好者題參治罪三十四年諭貂皮等次不及者責在官員著停止官員賞賜其同來之二等三等人員仍照常例賞賜欽此又諭雅克薩等處原出産美貂年來打捕漸至稀少倘以貂皮不及等次仍行議處則官員徒多受纍而貂皮仍無從得其佳者嗣後官貂如已足數而等次不及者著免議欽此三十五年議準數年來送到貂皮雖在多獲之年仍有不符等次者嗣後採捕時仍照常管束督催甫及下山即將各佐領下所得貂皮數目分記皮色一同收貯俟進貂時按前所記數目皮色選擇一等者五百張二等者千張其餘均作為三等按本年丁數令其交足仍鈐蓋一二三等圖記以杜抵換貢到之日由院轉咨戶部㑹同內務府察收乾隆十九年諭收撫之烏良海五百八十五戶向屬準噶爾時每丁歲納貂皮六張今加恩減去二張止納四張其來年應納之貂亦著寬免欽此欽定大清㑹典則例卷一百四十
