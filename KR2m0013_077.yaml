body:
  text: 禮部儀制清吏同軍禮一親征崇德元年太宗文皇帝親統大軍往征朝鮮先期告天告廟頒行軍律令諭朝鮮官民人等在城在野傾心歸服者即同內地臣民乃分兵為左右翼右翼兵由東京大路至渾河排列左翼兵由撫順大路排列聖駕出撫近門設鹵簿吹螺奏樂恭謁堂子行三跪九拜禮復於堂子外建立八纛吹螺奏樂行三跪九拜禮畢遂啓行大軍直抵南漢城西駐營康熙三十五年聖祖仁皇帝以厄魯特噶爾丹悖天虐衆侵掠喀爾喀諸部落宜乘時剪滅輯寧疆圉遣發大兵分道並進躬統六師由中道聲罪致討欽天監擇於二月十三日啓行前期三日分遣官祗告天地宗廟社稷太歲頒行軍律令命皇太子監國至日遣官致祭道路火炮之神鑾儀衛陳鹵簿自午門設至堂子不從征王貝勒貝子公等於午門前齊集候聖駕出跪接隨行從征王貝勒貝子公等於外金水橋齊集候過隨往行禮八旗鳴蒙古畫角軍士每旗四名八旗吹海螺護軍每旗二十五名排列於堂子街門外八旗護軍火器營護軍參領各八人咸蟒袍補服持纛排列於堂子內門之外至吉時聖祖仁皇帝出宫午門鳴鐘不作樂至御河橋鳴角吹螺進堂子街門螺角止禮部堂官恭導就位行三跪九拜禮諸王大臣侍衛等依次序立隨行禮禮畢螺角齊鳴禮部堂官恭導至內門外致禮於旗纛之神畢螺角止鹵簿自堂子設至郭外聖駕出照常作樂由安定門街出德勝門八旗軍分翼陳列先列鳥槍護軍次鳥槍驍騎出征皇子王等旗纛護衛各於本旗護軍之中排列其末旗鳥槍護軍之下列滿洲炮兵次漢軍炮兵次漢軍火器營兵聖駕出郭三舉炮聖祖仁皇帝至陳兵處官兵皆於馬上俯伏候過方起其不隨征王以下有頂帶文武官以上咸蟒袍補服過大軍排列之前分翼跪送並令八旗官兵肅清道路嚴禁僕從馬匹喧雜之聲候聖駕過官兵各整隊伍相隨進發至駐營處前鋒軍過御營前駐劄為二營八旗護軍及驍騎列為十六營火器營兵隨炮兵丁炮手棉甲兵列為四營部院堂司官員筆帖式等列為一營左翼察哈爾兵列為二營緑旗兵各為一營御營網城內建刁斗設巡警二十一處每處以旗員一人內府護軍及執事人十名守衛網城三門每門以護軍及執事人十名守衛外營安設巡警八處每處以旗員一人侍衛鑾儀衛官執事人共十名守衛外營四門共以護軍執事人四十名守衛馬匹牧場於鑲黃等三旗每旗以旗員一人侍衛鑾儀衛官執事人共三十名守之大軍分兩路出口並分翼牧馬前路牧馬路左必留路右以待後路之牧所過城池村舍嚴禁馳騁騷擾輜重出口皆按序結隊而行至居庸關及獨石口並遣官祭山川之神師次青城雨雪交作至駐營處聖祖仁皇帝御雨具佇立曠野俟軍士結營畢始入行營各營舉炊然後進膳復賜網城內帳房食物柴炭以給挽車後至者駐蹕噶爾圖遇雨雪遣大學士致祭風雨山川之神風止雪霽自出卡倫後無水之地甘泉湧出不毛之土豐草茂生因復遣大學士祭告風雨暨域外山河川澤之神凡軍中斥堠哨望聖駕親行巡察申定軍伍常御旌門令諸將士乘騎徐進以次簡閲至西巴臺遣使敕往諭噶爾丹大軍進至庫庫車爾前遣去使臣還奏得噶爾丹所在實音躬率前鋒兵進發次八旗前鋒兵次緑旗兵居鹿角之中次左右翼八旗漢軍大炮鳥槍兵次八旗滿洲兵馬上馱載炮其鹿角後頭隊兵前列各旗內鳥槍護軍次列護軍次列鳥槍驍騎二隊兵亦照前隊排列兩翼援兵每旗子母炮令滿洲鳥槍驍騎兼管此後三旗內大臣侍衛等率黃龍大纛行皇子諸王等各在纛前行內務府官執事人等部院官及蒙古兵皆按列行噶爾丹知聖駕親臨登北孟納爾山望見六師驚遁聖駕至克魯倫河時已竄去數日盡棄鎧甲器械廬帳老弱於塗命大學士祭河神復率前軍追至拖諾分兵平北大將軍追躡聖駕回鑾是年九月噶爾丹敗遁後收集散亡復圖侵掠大將軍報至聖祖仁皇帝親巡行北邊經理機務諭朕出塞試鷹當減從而往諸色人等不得告請從行其部院官照秋圍例從少點出欽此欽天監擇定軍行日期左翼於十七日起程右翼於十八日起程至十九日聖祖仁皇帝駕發京城十月至白塔向歸化城設鹵簿該副都統等率官兵來迎老少男婦皆執香擁集路傍跪接其城中大喇嘛等率其屬排列幡幢作樂迎拜聖駕於南關駐營四方來朝之蒙古王與福晉等及兵民喇嘛各進獻馱馬牛羊食物自歸化城駐蹕赫圖爾根之南前西路戰勝之右衛官兵皆至聖祖仁皇帝親臨賜食引官兵皆令近前坐遍賜之雖僕從無遺次日復賜官兵衣銀食物坐馬遣諸皇子至右衛軍營重賜茶酒又徹御膳分賜官兵十一月至湖灘河朔渡河幸鄂爾多斯地是時河水未凍獨於渡處數里結為堅冰車馬坦行駐營時該王貝勒貝子公及其母福晉等悉來朝覲貢獻馱馬諸物自是聖駕由河岸而行厄魯特人來降者絡繹不絶噶爾丹知部曲潰散遣使納奏復頒敕諭遣使齎往招撫乃自東斯垓統軍回鑾三十六年聖祖仁皇帝三舉北征仍分兩路出師聖駕巡晉及秦就近調遣二月初六日啓行陳設鹵簿由神武門出德勝門經過地方凡遇帝王陵寢先賢墳墓名山大川皆遣官致祭駐蹕保德州遣官祭黃河之神聖駕至橫城復遣大學士祭黃河之神遣皇子祭故將軍之有功疆圉者其前次寧夏陳亡官兵照例遣官奠醊口外王貝勒台吉等先傳諭旨止其請安進貢各地方大員止許單身至黃河兩岸迎接其餘兵丁止於近城地方排列迎接免其披執時哈密已擒逆子俘送軍前青海八台吉懇請來朝厄魯特之部長宰桑等皆納款求降聖駕自黃河舟行回鑾一親征凱旋崇德二年太宗文皇帝率從征王貝勒大臣等班師朝鮮國王率羣臣出王城十里外跪送太宗文皇帝下馬升座該王率羣臣行三跪九叩禮賜該王侍坐於御座之側賜茶該王起謝畢遣大臣二人送還國諭親王等各宜嚴束士卒毋得殺降擾民太宗文皇帝乃於軍中率諸王貝子羣臣以頒師行祭旗纛禮沿塗各地方官率衆逺迎跪候聖駕過隨大軍後至駐營處賜各官遙坐遣大臣賜酒次日駕發時地方官員進獻牛米等物率軍民道旁跪送盛京鄭親王等於齎奏賀表後豫至盛京城二十里外除道設黃幄在盛京王貝子文武羣臣及土默特鄂爾多斯蒙古虎爾哈部長等皆前期祗俟聖駕將臨離營五里許恭迎道左以次序立跪候過隨行太宗文皇帝入黃幄升座王等率衆排班贊禮官贊王等奉表跪進國史院大學士接表跪宣畢王等率衆行三跪九叩禮乃大燕燕畢起行至盛京日恭謁堂子行禮由懷逺門入還清寧宫康熙三十五年五月十三日聖祖仁皇帝自克勒和朔統軍回鑾內外諸王大臣文武各官於行宫東門跪奏厄魯特震驚天威望風逃竄大功已成請行慶賀禮奉旨朕豫料噶爾丹必遁已密諭西路大兵截其歸路信息不久即至姑俟之十八日聖駕駐蹕拖陵撫逺大將軍奏報祗遵廟算大破賊於昭莫多之地捷音至聖祖仁皇帝出行營南門外設香案率皇子諸王及蒙古王台吉等謝天行三跪九拜禮入行營大學士等進賀捷表文皇子在黃幔城內內外王公文武各官在黃幔城外三跪九叩行慶賀禮二十一日至席喇布里圖前留牧卡倫之蒙古王等恭迎聖駕在行宫前三跪九叩行慶賀禮喀爾喀扎薩克等及衆台吉之妻並攜所屬男婦齊集行營東門跪奏噶爾丹恃其強悍虔劉我輩已極今皇帝從天而降滅此凶寇救我喀爾喀通國之患恭謝皇帝再造之恩懇請仰瞻天顔奏入命以次引入黃幔城進見衆皆叩首齊呼萬歲賜茶出復遣官賜燕並賚銀幣衣服有差自後每日王貝勒台吉等來迎行慶賀禮於行宫外燕賚皆同其有名喇嘛及王貝勒母福晉等挈羣來迎貢獻馱馬牛羊無算聖駕行時羅拜道旁絡繹不絶附近衆扎薩克及牧場蒙古率妻子迎獻酒漿酥酪者沿塗環擁命以所獻分頒皇子諸王大臣侍衛凡執事以及僕從均得沾溉六月初二日在京皇太子諸王大臣等奉表稱賀初五日聖駕至獨石口城中居民及二三百里居民列香案歡呼叩首是日在京皇太子諸王大臣來迎初七日駐蹕懷來縣時地方稍旱駕甫至即沛甘霖百姓踴躍跪叩初九日辰刻駕發清河設鹵簿在京皇太子率諸皇子王公文武羣臣咸蟒袍補服於郭外五里道旁跪迎八旗護軍驍騎步軍近京鄉紳士民工商耆老男婦焚香懸采扶攜跪迎命前驅勿警蹕環集者數百萬人歡聲雷動聖駕由德勝門入鹵簿大駕自土城關設至堂子遵旨停排旗纛畫角作樂前導禮部堂官恭導詣堂子就拜位行三跪九拜禮禮成鹵簿大駕自堂子設至午門聖祖仁皇帝還宫是年冬聖祖仁皇帝北巡自歸化城西渡湖灘河朔駐蹕東斯垓厄魯特人絡繹來降噶爾丹遣使納奏乃降敕招撫班師回鑾十二月二十日聖駕由德勝門進神武門還宫三十六年聖祖仁皇帝復臨邊方西踰寧夏駐蹕狼居胥山指授諸將方略截窮寇遁走之路噶爾丹自料立就誅戮仰藥自殺餘黨引衆歸降朔漠蕩平聖祖仁皇帝以六師大捷於行營外設香案率皇子諸王文武羣臣謝天行三跪九拜禮畢回行營羣臣在外行慶賀禮班師由邊外凱旋外藩蒙古王貝勒貝子公台吉等及其母福晉夫人等率衆進獻迎賀者所至無虛日聖駕至清河大設鹵簿皇太子率諸皇子王公在京文武百官咸蟒袍補服出郭外跪迎道旁八旗護軍驍騎步軍及京城附近紳士農賈耆老設香案沿門結采各執香跪迎聖駕由德勝門入詣堂子行禮畢由午門還宫禮部奏請舉行慶典遣官祗祭天地宗廟社稷永陵福陵昭陵暫安奉殿孝陵皇后陵寢及太歲旗纛炮神嶽鎮海瀆帝王陵寢先師闕里均遣官致祭欽天監諏吉日御殿受賀皇太子率王公文武百官進表慶賀直省文武官員咸恭進慶賀表文是日頒詔天下咸使聞知復允羣臣所請宣付史館編年集平定朔漠方略御筆勒銘磨崖刻石於察罕七羅拖諾昭莫多及狼居胥山並建碑太學垂文紀勳昭示萬世一命將出征崇德元年太宗文皇帝命多羅武英郡王貝勒貝子等率諸大臣官兵出師親臨送出撫近門設鹵簿詣堂子行禮又於堂子外列護軍八纛行三跪九拜禮畢親送至演武場誡諭遣行是年命和碩睿親王和碩豫親王貝勒貝子公大臣等率大軍出征分兩翼前後啓行是日巳刻率出師諸王貝勒貝子大臣出撫近門謁堂子吹螺鳴角行三跪九拜禮外列八纛復吹螺行禮畢親送出師諸王等至演武場升御座召諸王貝勒貝子大臣等近前誡諭諸王等率兵聲炮三啓行聖駕入地載門還宫順治元年世祖章皇帝命攝政和碩睿親王同多羅豫郡王貝勒貝子公八旗都統副都統暨恭順懷順智順三王續順公朝鮮世子率滿洲蒙古緑旗兵略定中原詣堂子奏樂行禮又陳列八纛行禮畢大軍聲炮啓行是年命和碩英親王為靖逺大將軍往征流寇賜之以敕是日鹵簿大駕全設於午門外設御座張黃幄於皇極門今門太和丹陛上以所頒敕印陳設簷下東旁黃案上王以下文武各官咸盛服齊集候聖駕出衆皆跪世祖章皇帝御門升座諸王各官立丹墀贊鳴鞭階下三鳴鞭鳴贊官贊排班進跪大將軍率出征官員皆進詣拜位跪內院大臣奉滿洲蒙古漢字三體敕書次第宣畢奉敕印授大將軍鳴贊官贊叩興王及出征各官行三跪九叩禮畢贊退王及各官皆退即起程前行鳴鞭世祖章皇帝還宫衆跪候聖駕過皆退五年命都統為征南大將軍統兵征討江西賜之以敕儀與元年同是年命固山貝子為平西大將軍討陜西叛􅉰賜敕儀與元年同十三年定命大將軍出征禮諸王貝勒貝子公於出師前一日將例賞衣