左右行至黃新莊宫門外排立將軍王公滿漢文武大臣及從征官員咸從三品以下滿漢文武官員於行宫前跪迎如初儀駕還行宫凱歌樂止衆皆退一受降天聰七年孔有德耿仲明率部下自皮島航海來歸太宗文皇帝賞馬二千餘匹陸續接應並備設供帳令暫駐東京休息從容來見勿致勞頓既至豫設黃幄於渾河岸太宗文皇帝升黃幄御座孔有德耿仲明率各官以次序立二人行朝見禮畢復近御座前叩頭抱膝見次各官行三跪九叩禮乃大燕以金巵酌酒親賜之燕畢各賜蟒袍貂裘鞍馬弓矢等物封孔有德為都元帥耿仲明為總兵官崇德元年大封諸王時封孔有德為恭順王耿仲明為懷順王崇德二年太宗文皇帝命致書切責朝鮮諸王並齎敕文往諭朝鮮國王皆服罪請降於是禮臣擇漢江東岸築壇設黃幄聖駕出御營奏樂渡江登壇設鹵簿如常儀朝鮮國王率文武羣臣步行來朝遣官一人迎於一里外引至儀仗下太宗文皇帝降座率朝鮮國王及羣臣對天行三跪九拜禮還座該王率羣臣伏地請罪贊禮官贊排班贊進贊跪三跪九叩畢命該王班次坐於左翼和碩親王之上朝鮮王長子坐於左翼貝勒之下次子三子坐於右翼貝勒之下乃賜燕盡還其俘賜該王王妃及三子大臣貂裘等物率衆謝恩畢聖駕還御營康熙三十五年聖祖仁皇帝駐蹕中拖陵撫逺大將軍奏報勦滅噶爾丹於昭莫多之地遂命安插厄魯特降人於邊外諭駐扎歸化城安郡王等著往阿霸垓西喇穆倫之斥堠於大兵進斥堠之前暫行駐扎如有厄魯特潰散逃竄來投降者令其收受又諭歸化城留大臣一人受厄魯特降人完其夫婦給其衣食如有厄魯特降人分上人下人各給以白金皮衣有差是年厄魯特降人丹巴哈什哈等一百六十口及大將軍送到伊家人一百六十一口均令於張家口外居住其所需衣服衾褥著於張家口司官處支領噶爾丹降人憨都等二百四十三口一同暫居張家口外應給口糧仍以張家口倉中所貯米計口頒發又安郡王解到降人厄魯特綽克圖巴圖爾唐古特宰桑等所屬弓箭手一百十有八人喇嘛四人婦女童稚五十四人奉旨著給綽克國巴圖爾唐古特宰桑茶飯衣服帶此兩人赴安郡王所令酌發此降人厄魯特內配以蒙古兵收服厄魯特之離散者其厄魯特降人家口著善為防護還至張家口外與丹巴哈什哈等一同安插沿塗給伊等行糧駐劄後照常給以口糧三十六年滅噶爾丹有阿喇卜灘等率部衆歸降諭以德意並加奬賞乾隆十四年經略大學士忠勇公平定金川番首莎羅奔等乞命投誠泥首請罪經略奉詔受降遣命番衆於軍門外除道設壇鋪陳供帳至時經略升帳出征大臣等同至營門莎羅奔等率衆喇嘛及頭人番衆跪迎皆服鮮衣舉香作樂至經略帳下俯伏經略責以抗拒之罪示以朝廷如天好生之恩皆泥首伏辜畏威懷德經略遂大為露布馳告京師是年議準受降之儀凡克捷受降軍營應飛章入告得旨允降乃大書露布傳示中外築受降壇於大營之左壇方南嚮壇以南百步許樹大旗書奉詔納降字降者至兵部官率引立旗下經略大將軍出營鼓吹聲炮參贊大臣及各官皆隨行兵部官令降者於受降旗旁北嚮跪匐伏候經略大將軍登壇鼓吹聲炮參贊大臣及一品大臣分翼僉坐隊伍將領等官分兩旁肅立其餘官校兵丁分班排列兵部官引降者抵壇前匐伏經略大將軍宣諭德意訖酌加賞賚軍門鼓吹降者泥首叩謝而退一獻俘雍正二年命將討平青海解送俘囚至京師欽天監擇日獻俘於太廟社稷至期兵部率解俘官員兵丁押所解之俘白組繫頸由長安右門北門天安門右門進至太廟街門外嚮北立候承祭官至俘嚮北跪承祭官入太廟陪祀文武各官分東西班豫集承祭官就行禮位行禮如時饗儀陪祀官隨行禮禮成兵部率解俘官員兵丁押俘至社稷街門外嚮北立候承祭官至俘嚮北跪承祭官入社稷壇陪祀文武官員分東西班豫集承祭官就行禮位行禮如春秋祈報儀陪祀官隨行禮禮成承祭官陪祀官以次出兵部率解俘官員兵丁押俘仍由天安門長安右門出百官各退乾隆十四年議準獻俘之儀凡出師克捷應照雍正二年平定青海之禮以俘獻於廟社如儀一受俘康熙三十六年王師大捷哈密擒厄魯特噶爾丹之子色布騰巴爾珠爾俘獻於駐蹕之神木縣聖祖仁皇帝御行營一等侍衛學士以上諸臣侍立解俘將校引色布騰巴爾珠爾入伏地不敢仰視遂遣送京師時皇太子監國受俘於景運門外箭亭召諸王以下內大臣侍衛都統部院堂官咸集閲畢示衆自午門至長安左門召集滿漢文武官員八旗佐領軍校引俘使衆聚觀畢遵旨拘禁於理藩院仍支給食物旋奉旨赦而不誅至四十年宥釋授以一等侍衛給之妻室雍正二年平定青海於獻俘次日行受俘禮前期一日工部設御座於午門樓簷下正中至日早武備院張黃蓋於樓簷外鑾儀衛設丹陛儀仗於闕門之北設丹墀儀仗於闕門之南設金鼓於丹墀儀仗之南均東西相嚮設仗馬於御道左右設輦輅於天安門外金水橋之南設馴象於輦輅之南設鑾儀衛鐃歌大樂於午門外左右設丹陛樂於儀仗之南設諸王行禮棕薦於丹陛儀仗之內諸王以下文武各官咸朝服齊集內閣翰林院堂官立於午門外之東丹陛儀仗之北都察院堂官立於午門外之西丹陛儀仗之北咸於仗外立王公於闕門之北丹陛儀仗之外接翼序立文武大臣及有頂帶官員於丹陛儀仗之外按翼序立糾儀御史左右各四人分立於丹陛儀仗之下均東西相嚮鴻臚寺官八人分立於丹陛儀仗之末兵刑二部尚書侍郎立於西丹墀儀仗之外兵部司官率解俘將校立於西翼金鼓之外將俘囚押立於後刑部司官立於兵部之次鴻臚寺官報班齊禮部堂官至乾清門奏請世宗憲皇帝御龍袍衮服乘輿出宫午門鳴鐘禮部鴻臚寺堂官前引至太和門內十大臣前引聖駕出太和門鐘止鑾儀衛鐃歌鼓吹大樂全作世宗憲皇帝由東磴道升至午門樓前降輿升寶座樂止十大臣於簷外陛上東西序立豹尾班於御座後左右序立起居注官立於西豹尾班之末承旨大臣二人鴻臚寺官二人立於陛下內大臣散秩大臣侍衛分翼接連豹尾班以次排列至兩觀廊下內鑾儀衛官贊鳴鞭校尉三鳴鞭鴻臚寺官贊解俘將校排班引解俘將校於儀仗前進至御道西北嚮立贊進贊跪叩興丹陛樂作解俘將校行三跪九叩禮興樂止贊退班解俘將校退復原位立鴻臚寺官贊受俘兵部司官率解俘將校押俘至金鼓之下嚮上跪兵部堂官由儀仗內趨至御道之旁奏平定青海所獲叛逆俘囚謹獻闕下請旨刑部堂官趨至御道之旁恭立承旨大臣候旨宣制曰所獻俘交刑部鴻臚寺官接宣刑部堂官跪領旨兵部司官引俘押出金鼓之外交與刑部司官刑部司官將俘押出天安門右門訖鴻臚寺官贊排班引王公於丹陛儀仗畫戟前入文武大臣有頂帶官員於丹陛儀仗前入均至行禮處嚮上序立鴻臚寺官贊進贊跪叩興丹陛樂作王以下文武各官行三跪九叩禮興贊退各歸本班立樂止鑾儀衛官贊鳴鞭校尉三鳴鞭鐃歌鼓吹大樂全作聖駕還宫王以下文武各官皆退是日賜解俘官員兵丁銀幣有差恩賜該將軍等鞍馬采幣其擒獲俘囚之將校及管領擒獲之人分別各加賞賚乾隆十四年議準出師克捷於獻俘次日行受俘禮均如雍正二年之儀二十年擒獲叛逆巴朗孟可特墨爾並雍正年間叛逃之羅卜藏丹津獻俘於太廟社稷悉如雍正二年議定之禮有赦而不殺者奉旨釋縛交理藩院二十一年平定伊犁擒獲達瓦齊獻俘行禮宥罪儀均與二十年同欽定大清會典則例卷七十四
