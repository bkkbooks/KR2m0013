  text: 欽定四庫全書欽定大清會典則例卷八十一
  hash: sha256:b939af6ea0c040dd7ca64a4c07a7fc602cf3322920584b79580f907166d8b332
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0013_WYG_084-1a, image: WYG0622/WYG0622-0549c.png}
body:
  text: 禮部祠祭清吏司大祀四社稷壇一春秋祭社稷順治元年定每嵗以春秋仲月上戊日祭太社太稷太社以后土句龍氏配太稷以后稷氏配壇中石社主半埋土中仍設太社太稷句龍后稷氏神牌祭於壇上每祭壇上敷五色土中黃東青南赤西白北黑隨方築之設樂舞於壝門內壇下兩旁壇官各二人執長竿側立於壇東西以禦飛禽又備四神龕於壇下如遇風雨即以神龕覆護神牌八年定皇帝親祭社稷壇行飲福受胙禮康熙三年秋祭社稷壇恭遇太宗文皇帝忌辰改期中戊日致祭十六年春祭日遇雨太常寺奏請行禮於拜殿奉旨仍照常處行禮雍正六年議準太社太稷神牌均高二尺五寸神座尺有五寸共高四尺籩豆案僅高尺有二寸較各壇稍低應將神座加高一尺安奉神牌共高五尺以符土為五數之古制其籩豆等案應加高尺有三寸共二尺五寸以符五五之數配位神牌各高二尺四寸神座高尺有四寸籩豆案高尺有二寸應將神座及籩豆案均增高一尺以符體制十二年議準社稷壇東旁向不設案太社神位后土句龍氏神位司香官奉香盤拱立甚久恐有不能竭盡恭敬之處請照依壇西旁規制增設一案豫將香盤等物安於案上庶陳設整齊益昭誠敬乾隆十八年奏準增撰社稷壇祈雨報祭之樂樂章皆以豐為名二十四年諭朕此次親詣社稷壇祈求雨澤禮部所開儀注內無薦玊之禮詢其原委則繫相沿舊規並無義意可考夫玉以庇廕嘉榖使無水旱之災載在傳記且於答陰之義更為相稱著飭所司敬謹用玉將事以迓神庥祭之日朕雨冠素服出右門御常輿由右一路行至金水橋應御輦處即步行至壇行禮以申虔禱欽此一直省府州縣祭社稷壇順治元年定嵗以春秋仲月上戊日致祭雍正二年奏準直省府州縣祭社稷壇府稱府社之神府稷之神在州縣則稱州縣每祭用黑色帛各一白瓷爵各三羊一豕一鉶二簠二簋二籩四豆四有司致齋二日屆期朝服祭於壇乾隆二年諭直省府州縣社稷風雲雷雨山川諸神所在有司以時致祭所以肅祀典而迓休和禮至重也省會之地督撫司道駐劄同城向因禮文未載遂不與祭專屬府州縣官行禮朕思督撫司道等官均有封疆守土之任自當虔奉明禋為民祈報凡春秋致祭社稷風雲雷雨山川等壇督撫應率領闔屬文武大小官敬謹行禮提鎮道官駐劄之地一例率屬陪祭其如何分别班次委官監禮及修理壇壝祭器之處該部詳悉定議具奏欽此遵旨議準嗣後直省每逢祭祀之期省會之地督撫將軍都統副都統率領司道文武等官各按品級照例文官列東班武職列西班行禮布政使乃地方正印官仍令主祭其府州縣地方如有提鎮道官亦令各按品級分東西兩班行禮府州縣繫地方正印官仍令主祭前期即令主祭官於教職內委監禮官二人佐二雜職內委監視祭品官一人令其虔誠執事至直省社稷風雲雷雨山川壇壝如有嵗久應修祭器或有未備及嵗久損壞者行令督撫轉飭地方如式修造以重祀典十六年覆準直省壇廟祭祀省會之地以布政使主祭督撫陪祀其有道官駐劄之府州縣地方以府州縣主祭道官陪祀不惟分班行禮陪祀者位尊主祭者秩卑於禮制未協且使屬官因統率大員陪祀之故瞻顧局蹐不克致敬盡誠達其精意嗣後直省社稷風雲雷雨山川各壇春秋二祭省會令督撫主祭布政使以下陪祀其有道官駐劄之府州縣地方亦令道官主祭府州縣等官陪祀照直省丁祭督撫主祭之禮統歸畫一再督撫道官倘遇出巡時仍令布政使暨該地方正印官攝祭至各將軍都統提鎮等皆繫武職仍照向例陪祀欽定大清會典則例卷八十一
