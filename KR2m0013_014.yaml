body:
  text: 吏部考功清吏司考績一京察順治初年定京察六年舉行一次康熙二十四年停止京察雍正元年遵旨議定三年一次在京三品以上滿漢大臣在外督撫盛京五部侍郎奉天府府尹均將三年內事迹過愆據實自陳四年奉旨嗣後凡降罰之案奉旨特免者不必載入自陳本中著吏兵二部一例遵行乾隆十七年諭京察之年部院堂官各省督撫循例自陳求斥罷候旨照舊供職此雖三載考績之義但卿二職贊機務督撫任寄封疆朕量材簡擢日復於懷其有不副委任或克稱簡畀者率已隨時黜陟斷無遼待三年之理凡可俟至京察解退者不過間曹冷署年力衰昏而又非有大過介於可去可留之間者耳且身列大臣謬以斥罷為辭是相率為偽誠無謂也嗣自今內而部院司官外而道府京察大計之例仍舉行以昭激勸其自陳繁文著停止以示崇實武職五年軍政視此欽此一四五品京堂康熙十二年題準將事實詳開册內不注考語移送吏部都察院吏科河南道今京畿道後仿此考察乾隆二年議準京察一等官如內閣侍讀學士開坊翰詹以上官階體制與外省藩臬無異雖列一等毋庸加級十五年諭前經臣工條奏四五品京堂京察列為一等者請引見又有奏布按二司應入大計者均未議準行朕思兩司承辦通省案件大小事務無不由其擬議詳報督撫自必隨時體察優者隨時奏薦稍不勝任必不姑容誤事何待大計之年方入舉劾議駮自屬允當至京官察典屆期三品以上堂官尚具本自陳部院司官亦皆令引見而四五品京堂則不在自陳之列考核之後亦不行引見雖有吏部都察院填注考語之例不過按册過堂虛文應事其中龍鍾庸劣者既得姑容即才具優長精力壯盛堪供驅策者亦無由自見於培養人材澄敘官方之道蓋兩失之嗣後京察年分吏部開列王大臣等職名請旨特點數人將四五品京堂秉公分别一二三等及應留應去具奏引見以定黜陟庶優劣分而人知激勸於實政有裨其王大臣等是否秉公據實自亦不能逃朕洞鑒即於本年為始著為令欽此十八年諭前經降旨部院堂官稱職與否久悉朕懷自可隨時黜陟京察之年停其自陳四五品堂官特命王大臣秉公分别去留奏聞引見至三品京堂官則非尚書侍郎比也今既不令自陳轉得散地容其濫竽可乎其令吏部於京察時將伊等事實别繕清摺候朕親為裁奪欽此一在京各衙門所屬官員筆帖式等康熙十二年議準宗人府覺羅官員聽宗人府注考十八年議準升轉降補各官旗員補授部院各官到任半年者於新任衙門注考未及半年者各該原衙門注考雍正元年議準在京各衙門官員該堂官於三月十五日內詳加考核填注考語分别去留造册密送本部及都察院吏科河南道考察若有徇情遺漏舛錯者本部都察院吏科河南道察出題參其京察文册定於三月十五日到齊本部都察院吏科河南道各封門閲册公同磨對照該衙門所填四格考語分别一二三等會同內閣大學士本部都察院吏科河南道公同考察隨知會各衙門所屬各官以次過堂分别去留吏科河南道均赴本部面議具題四年議準六科滿漢給事中不分掌印不掌印均令都察院堂官注考又議準一應考核在京各官自二月二十五日起暫停其升轉俟事畢出榜後仍照各月出闕先後升補凡科鈔公文中有應行議處考察各官亦暫停其議處俟出榜後察議至奉特旨升調官員仍行遷轉察議官員仍行議處乾隆二年議準應考察各官令該堂官將才守兼優政績卓著者造册移送本部都察院吏科河南道會同大學士考核列為一等繕册進呈本部引見將奉旨準為一等人員加一級注册至盛京五部等衙門所屬一等官員有三年期滿例應以京官調補者俟回京之時引見非三年期滿調回者仍令送部引見以上一等人員遇有奉旨保舉時該堂官即於此項人員內簡選如下次京察之期經堂官降為二三等者不準仍行保送至順天府奉天府所屬城內應入京察各官已準於大計薦舉卓異應毋庸再議四年議準六法應去官員照外官大計之例由部引見五年議準京察四格務須切實注明如守清才長政勤年或青或壯或健稱職者列為一等守謹或政勤才平或才長政平年或青或壯或健勤職者列為二等守謹才政皆平或才長政勤而守平或年青或壯或健供職者列為三等於此四格之外再加確實考語如列在一等而才守政年及稱職等字樣不遵定例開注者考察時即將該員照所注字樣改列等次毋庸駮察其應行議處者必將應去之處注明二等三等人員均以應留造册至新任未試未經到任官員别具一册亦並咨送本部都察院吏科河南道分繕黃册進呈又議準凡考察時保送一等官員不必論其本任食俸統計前後已滿三年者即準保送內除降調補用及廢官起用並非本案開復及不宜外任改補京官者均不準計前俸外如盛京調補及丁憂起復告病起用並外任補授京職官員到任已過半年者均統計前俸其各部額外官員已經補授者從前已經食俸辦事亦準其統計從前日期如前後統計已滿三年均準一例保送又議準近京各工程處委往官員到工未及半年者仍歸原衙門注考已過半年者令各工程處注考六年議準保舉一等官遇有過犯除該員於他處犯出該堂官無從察究者免議如在本衙門犯有貪劣事迹在保舉一等以前者别經發覺審實將原保舉之堂官降二級留任在保舉一等以後者别經發覺審實將原保舉之堂官降一級留任自行參出免議至各衙門筆帖式司庫等官向由該司核定呈堂辦理如繫該司核定保舉之官犯有貪劣别經發覺審實將原核定保舉之承辦司官亦照堂官濫舉例分别事前事後議處堂官照不行詳察例議處其或該司核定後堂官酌改者準其於咨送職名文內聲明將堂官議處該司官免議十八年奏準文職官員內太常寺所屬各壇廟奉祀祀丞並贊禮郎讀祝官協律郎司樂等官禮部所屬堂子七品八品官鑄印局大使會同四譯館序班大使朝鮮通事等官鴻臚寺所屬之鳴贊序班等官各陵寢贊禮郎讀祝官欽天監所屬五官正及博士司書靈臺郎監候挈壺正司晨等官太醫院院使院判御醫八品九品並額外吏目等官向來每屆京察皆沿習舊例填注守政才年四柱考語但此等官員與各部院辦理案件者不同其沿例注考全屬故套嗣後如奉祀等官則但論其禮儀之是否嫻熟行走之是否敬謹鳴贊等官則但論其舉止之是否安詳音節之是否宏暢欽天監官則但論其數學之是否精研太醫院官則但論其醫理之是否通曉令各衙門堂官於三年京察時秉公察核填注切實考語以定去留其四柱守政才年等字一槩不必填注以崇實政一順天府治中通判等官順治十五年題準由順天府尹填注考語開送部院一盛京官員雍正元年議準盛京五部司官奉天府丞以下城內官員均令各部府尹考核填注考語限四月內造册移送本部都察院吏科河南道考察分别去留乾隆十八年奏準盛京五部京察俟由部具題咨覆到日盛京兵部會同各部堂官將本部等衙門考察各官按册唱名宣示以昭甄别以示鼓勵十九年奏準每遇京察之年將熊嶽錦州各城各邊門筆帖式令該管官將軍副都統詳細考察其威遠等六邊門司官筆帖式令管理六邊之將軍詳細考察分别等第擬定去留造册咨送本部各衙門以憑考核一考察官員出差順治十三年議準凡京官有出征公差丁憂養親告假候補降調未補者各該衙門仍填注考語移送乾隆十八年議準出差人員準原衙門保送一等其丁憂告病養親人員並非見任辦事者可比嗣後離衙門未過半年者準其保送一等其已過半年者不得復行保送一大計順治年間定藩臬為一省大吏與督撫親近恐有結納徇情之弊不準卓異康熙六年議準薦舉卓異官揑開事迹者將申詳之司道府州縣官降三級調用薦舉之督撫降二級調用九年題準八法處分貪酷者革職提問如事在赦前免罪永不敘用不謹罷軟皆革職年老有疾皆休致才力不及降二級調用浮躁降三級調用皆不準援赦紀薦加級不準扺銷四十四年諭官員薦舉卓異關繫激勸大典所列事迹務期無加派無濫刑無盜案無錢糧拖欠無虧空倉庫銀米境內民生得所地方日有起色方可膺卓異之選其他所開虛文皆不必入欽此雍正元年恩詔各省官員內有降級罰俸者皆不準卓異此後如果有居官清亷能幹因公罣誤罰俸降級者該督撫亦行卓異欽此又議準雜職內果有才能傑出操守卓越者該督撫開具事實造册送部部院衙門詳加考核合例者引見注册令回原任照例升轉又議準大計考核教職由藩臬二司造送督撫學院會同考核具題又議準大計不入舉劾官員自知縣以上令該管上司出具印結該督撫逐一填注考語造册送部四年議準大計題參各官部院分别議處內除貪酷官員及知縣州同以下微員毋庸引見外至六法各官俟交代清楚該督撫給咨該員來京引見其年老有疾本人不願來京者聽其回籍或非實在老病該督撫不給咨赴部勒令回籍者許其到籍呈明原籍督撫給咨赴部引見其參劾八法人員如有情屬寃抑及避重就輕等弊發覺將該督撫降一級調用原報之司道府等官皆降二級調用六年議準薦舉卓異官員該督撫察明食俸已滿三年其調任官員前任之俸通算無錢糧盜案參罰者開列事實具題由部會同都察院科道考核題覆其合例者行文引見俟奉旨準其卓異注册後令回原任照例升轉再卓異等官給咨引見該督撫即令該員交代清楚於文內聲明並無未清錢糧等案字樣倘奉旨留京及升任後原任內又有錢糧盜案未清發覺者將原薦舉之督撫各降二級調用申詳之司道府州縣官各降三級調用又議準卓異官員原任內有貪酷不法之處原薦舉官即行揭報題參者免議如不行揭報題參經旁人告發科道糾參將原薦舉之督撫降五級調用司道府等官皆革職若官員卓異後或復回本任或升轉他省别犯貪劣審實者其原薦舉之各上司仍與卓異之員同在一省如於未敗露之先察參者免議若不行揭報題參將督撫降二級調用司道府等官降三級調用其不與卓異之員同在一省於該員貪劣之處無從揭報題參者將督撫降一級調用司道府等官降二級調用此等濫舉之上司皆降實級任內雖有加級紀録軍功級紀卓異即升皆不準抵銷司道濫舉知府卓異及州縣濫舉所屬微員卓異其處分與知府同各省學政濫舉教職卓異其處分與督撫同乾隆元年議準浙江地方官凡遇大計之年必察明無鹽案參罰方準卓薦二年議準各省舉行大計務令於所屬各官內秉公考核其佐雜教官除實在庸劣衰朽者照例劾參若果朴實勤謹尚堪供職者不得任意填汰如有率意苛求參劾者將參劾之上司照參奏不實例議處三年奉旨嗣後吏部引見六法官員將該員被參劣迹開單一並進呈欽此六年議準官員卓異後别犯貪劣經同薦舉官揭報題參者與別經發覺不同將升調他處無從揭參之原薦舉官一例免議七年議準凡官員錢糧盜案未清者不準薦舉如督撫因其人品才具破格保舉列為附薦具題者仍令於本內將何項錢糧盜案未清議處之案聲明如有遺漏聲明者一經察出將薦舉之督撫罰俸六月申報之司道府州縣罰俸一年九年議準鹽場各官該鹽政會同督撫考核其有操守廉潔才具優長政事勤敏者開列事實具題有干八法者題參議處十四年覆準卓薦官員如有前任內應徵錢糧因未滿限離任議以照離任官員例罰俸一年完結之案除所罰銀未經抵繳銷案並該員離任之處如繫告病及捐升者恐其中仍有規避情節應不準於新任內卓異外其餘實無規避情節離任者果能於新任內已滿三年並無正項錢糧未完處分應一並歸於合例人員內聲明具題送部引見一土司等官卓異雍正四年議準各省土司果能奉法稱職裨益地方者該督撫不拘三年大計之例隨時薦舉照同知以下官員之例恩賞糚段領袖補段朝衣一件又定土司皆繫世襲之職必遇貪酷不法始行革職其餘處分均與流官不同既無考核亦無優升再土司卓異皆由府道申報或因請託不遂致結嫌啓釁嗣後將土司等官卓異永行停止一內外考察官員告辨康熙十一年議準處分官員控告注考官受賄侵勒者將所告不準行有冠帶者革職無冠帶者交刑部議罪如只呈辨本身寃抑將所告亦不準行有冠帶者初次罰俸九月復控降二級調用其控告通政使司鼓廳者初次罰俸六月復控降一級調用無冠帶者交刑部議罪乾隆六年議準如赴都察院及别衙門控告者亦照具告通政使司鼓廳例議處一被劾人員挾私報復雍正十二年定被劾人員若挾私妄揑察核官别項贓私不干已事奏告以圖報復者不分見任去任官皆革職已革職者治罪奏告情辭不問虛實立案不行一注考違例原定凡官員應注考語者不注不應注考語者違例填注或開報年貌互異及失注應去應留者皆罰俸一年督撫罰俸六月舉劾一京官保舉不實康熙五十二年議準九卿保舉官員內除因公罣誤外如有貪婪事發將原保舉官照督撫濫舉例降二級調用保舉後自行訪出揭參者免議本部司官不行察出保舉之案照失察案卷例罰俸兩月雍正四年議準各部院衙門筆帖式應令各該堂官照司分之繁簡酌量分定額數即將各司筆帖式姓名旗分咨部注册不準私行調撥至考察筆帖式之勤惰應照府州縣統轄佐雜等官例專責該司官考核如筆帖式果能勤謹翻譯稿案無誤令該司官秉公據實於年終公同出具考語呈堂注册遇有保舉之處該堂官即於注册筆帖式內遴選保送倘有因循怠惰託故不到衙門以致案件壅積不能完結者該司滿漢郎中即行具揭呈堂咨革倘郎中等徇情庇護不據實揭報經堂官察出或經科道糾參照正印官不行察報佐二例議處十三年核準部院衙門保舉司官皆令先期將員闕扣留及題補之人一並咨部察核不合例者駮回定限於次月二十日本部截限以前即行保奏如所題之人遇有出差事故亦於次月截限以前咨部倘留闕後保題遲延照督撫保題遲延例議處乾隆三年諭國家宣猷敷政首重得人而以人事君公爾忘私者乃人臣之大義況身列九卿受恩深重彼徇情妄舉者固不足言而視為具文茍且塞責者亦大虧薦賢為國家之道也昔我皇祖皇考延攬羣材常降九卿保舉之旨其濫舉匪人劣迹敗露者每加嚴譴以示懲警朕臨御以來亦間有所咨訪冀收得人之益目今各省督撫皆出朕心斟酌簡用其藩臬二司陸續調來引見亦知其大槩至於道府等官乃方面大員職任緊要目下為州縣之表率將來即可遞進於兩司所當留意於平日以備擢用於臨時者著九卿將可為道府之人各據所知秉公舉出一二人或二三人用露章啓奏不必密封大凡論人之道才品兼長固屬甚善但二者不可得兼若才勝於品雖一時塗飾可觀而心志不誠根本不固將來蕩檢踰間必至難於駕馭若品勝於才雖一時肆應不足而心術端方操守廉潔將來擴充歷練必能不愧循良九卿既受國恩又奉朕旨特行詢問其所舉之人將來除因公罣誤情有可原者不將保官處分外若以劣款被參審實治罪定將保官照濫舉匪人例處分不少寬貸欽此按例內官員將貪酷匪人薦舉卓異者督撫降二級調用司道府等官降三級調用九卿濫舉應照督撫例處分四年覆準凡各部院應行留闕保奏人員務將題補之人於文內聲明並行文知照科道按限稽察除定例開載應行簡選題補之闕應行題補外其餘滿漢司官悉歸月分銓選如該衙門事務殷繁司官內果有才猷出衆勤敏練達者令該堂官將所出之闕應行題補或應行月選之處於摺內詳悉聲明請旨倘有保題遲延者照例議處如不將原闕聲明應題應選者罰俸三月九年題準各部院所出滿漢司官闕近年以來保題者多歸選者少致令挨俸應升與候補候選者多致壅滯應酌量變通除刑部司官員闕準其咨二留一外其餘各部院應令各堂官察明辦理事宜酌定應題額數遇有員闕準其保題仍照舊例於截限以前將所題之人合例與否行文本部察核俟咨覆後聽該衙門自行引見補授倘各衙門保題無人仍歸部選如濫行保題照例察議十四年奏準部院堂官保送應升道府之司官除保送繁闕後經奉旨補用簡闕保送簡闕後經奉旨扣留回任者其優劣相去尚未懸殊該堂官應免置議外如有保送堪勝繁闕至引見時奉旨以不勝外任留部者應將保送不愼之該堂官照失於覺察例罰俸一年一外官舉劾不實康熙六年覆準凡保舉府州縣官照例開列實在政迹倘該督撫將並無實在政迹者妄行空填字樣保薦不實别經發覺者將督撫各降二級調用申詳之司道府直隸州知州等官各降三級用加級紀録不準抵銷九年議準總督貪婪巡撫不行糾參巡撫貪婪總督不行糾參如發覺審實不論同城不同城皆降三級調用藩臬兩司免議其方面以下大小官員貪婪之處司道府等不行揭報被督撫訪實題參將同城之司道府各降三級調用不同城者各降一級留任十四年議準該管上司揭參所屬官員或將經管事件並日月錯開以致本官誤行革職者將申報之上司降一級調用督撫降一級留任如誤致降級者將申報之上司降一級留任督撫罰俸九月如誤致罰俸者將申報之上司罰俸六月督撫罰俸三月如將不應參之官誤報題參未經處分經部察出如繫革職降級事件將誤揭之上司罰俸一年督撫罰俸六月如繫虛革虛降及住俸罰俸事件將誤揭之上司罰俸六月督撫罰俸三月十五年議準委署州縣印務該督撫酌其事簡者令鄰近州縣署理事繁者於同知州判等官內選擇廉能之人署理如委署之後有玷官針司道督撫知覺揭報者免議如不行揭報或經督撫糾參或被黎民控告審實將司道府官皆照不揭報劣員例分别處分如督撫參出後雖揭報不準如督撫不行糾參督撫亦照不揭報劣員例分别處分至將革職降級官員及巡檢大使典史驛丞等官令署州縣印者將司道府官各降一級調用督撫罰俸一年如司道府官不詳督撫擅行委署者皆降一級調用如上司已經委署本官借端推卸不赴者罰俸一年二十五年議準凡督撫濫將屬官坐名保題留任補用者照含糊具題例降一級留任二十六年覆準如令三司首領署理州縣印務者申詳該管之上司照巡檢大使典史驛丞等官令署州縣印例議處五十二年議準降調革職官員賄囑百姓保留者審實將官民皆照枉法例治罪如督撫指稱輿情將革職降調官員題留原任者照徇情例降二級調用轉詳之司道府亦照此例處分又覆準督撫將不應題補調補之闕濫行題補調補者照徇庇例降三級調用轉詳之司道府亦照此例處分如調闕有應調之人以無人具題及濫行奏請升用將該督撫司道府等官亦照此例處分又議準凡出差監督該督撫以商民保留為辭代題者將督撫照含糊具題例降一級留任再監督差期將滿以闕額為辭題請展限者將該監督照戀職例降一級調用雍正元年覆準各省督撫延請幕賓應遴選老成練達深信不疑之人先將姓名履歷具題造册報部如果效力年久勤愼無過該督撫保題議敘如有才守出羣者該督撫特疏薦引從優議敘議敘條例詳載銓選例其司道府州縣等官將管理刑名錢榖幕賓豫將姓名籍貫申報督撫存案計算六年期滿並無參罰事故果能深信其有為有守才識兼優平日實無公私過犯者出具確實印結申送督撫詳加驗看秉公考試除文理欠優才具平常者不準咨部外如果文理優通熟諳吏治才具確有可用方準據實保題將考試原卷一並送部俟直省彚齊之日吏部照考職之例請旨點大臣校閲試卷分别等第給與職銜選用詳載銓選例內如有文理荒謬不諳律例者將原保官照徇情例降二級調用保題之督撫照含糊具題例降一級留任或有冒名頂替者將保送官照頂冒出結例革職或繫出身不明匪人將保送官照濫舉匪人例降二級調用保題之督撫照失於覺察例罰俸一年本人送刑部治罪其考定各員出仕之後除因公罣誤降革外如有貪婪革職者將原保官亦照濫舉例降二級調用保題之督撫亦照失於覺察例罰俸一年督撫自行薦舉幕賓內如有此等情弊皆照原保官例議處以上外任官幕賓如本官緣事降革及執掌書算內號瑣事人等與本官子弟親族來署幫辦者不準保題申送其所延幕賓槩不準延請任所本地之人致啓弊竇如違例延請任所本地之人為幕賓者將延請官照違令例罰俸一年六年遵旨議定署印官於署任內事犯貪劣被參者除將本人治罪議處外其委署之上司自行糾參者免其處分倘上司徇庇私人容隱劣員或自護其短不行參奏於他處發覺時將委署之上司照徇庇例降三級調用又議準臺灣地方文職同知以下等官有貪酷乖張以致起釁生事者將不行揭報之府道降三級調用不行察參之巡臺御史降二級調用瞻徇隱匿不行告知督撫之武職皆照不行察報例降一級留任如武職遊守以下等官有貪酷乖張以致起釁生事者將不行揭報之副將參將降三級調用不行察參之總兵官降二級調用瞻徇隱匿不行告知提鎮之文職亦照不行察報例降一級留任又遵旨議定凡方面以下大小官員貪婪之處劣迹昭著該管各官不行揭報被督撫訪察題參者同城之知府降三級調用司道降二級調用不同城之知府降一級留任司道罰俸一年其因事受財劣迹未著同城之知府失於覺察降一級留任司道罰俸一年其不同城在百里以內之知府罰俸一年司道罰俸九月百里以外之知府罰俸九月司道罰俸六月遇有失察題參該督撫即於疏內將里數聲明以慿察核倘有里數聲明失實將轉詳各官皆照徇情例降二級調用至屬官貪贓上司已確有聞見或士民告發業經審實雖未告發而行賄過付確有其人而不揭報是有心徇庇應無論同城不同城在百里以內百里以外各降三級調用其雖有風聞正在訪察而督撫先已察出若即行具揭者該督撫仍將同城與不同城及不同城在百里以內百里以外之司道府於疏內聲明照例議處其直隸州知州照知府例議處若署知府直隸州知州事不揭報者罰俸一年如知府直隸州知州貪婪司道不行揭報司道亦照知府例議處其司道將貪劣官員申詳督撫知府不行揭報知府申詳司道不行揭報及科道開列本官劣款指參者將本官解任審實不行揭報之司道府等官皆照此定例分别處分並不題參之督撫亦皆照司道例分别處分若督撫既參貪婪官不開未經揭報之司道府職名指參者罰俸一年如將清廉愛民之官屈為貪婪題參審虛者將原報之司道府等官各降二級調用督撫各降一級調用如官員互相訐告該管官不行申報及督撫知覺行察又行遲誤並督撫密行察訪漏泄風聲以致有自盡脫逃等事者皆各罰俸一年其自盡之人如有威逼致死情由經部行詢取具妻子口供審問情實確有證據者將逼勒之官革職提問至管鹽務官貪劣事實或被督撫科道糾參審確者將不參之巡鹽御史及不報之運使等官皆照督撫司道例分别處分如巡鹽御史將伊所屬管鹽貪劣官題參與督撫司道無涉免其議處如將清廉官屈為貪劣題參審虛者將原報之運使等官各降二級調用巡鹽御史降一級調用其總督參過劣員巡撫不必參巡撫參過劣員總督不必參又諭州縣為親民之官地方事務全資料理凡有委署印務者必鄰近地方始能兼顧向來督撫藩司等委官署印每慿一已之私心而不計道里之逺近此習相沿已久近日秉公之上司已將此等陋習滌除而其餘尚有未能盡改者如廣東巡撫以韶州府乳源縣令署廣州府之花縣又以廣州府花縣令署惠州府之海豐縣此皆隔府差委相去數百里之逺者夫州縣一官錢糧必及時徵收盜賊必立時緝捕人命必當時相驗承審案件必如限完結若於數百里之外兼攝印篆不但顧此失彼諸務廢弛而吏役奔忙人犯拖纍種種遲誤之處難以悉數嗣後州縣員闕該上司等必須選委鄰近官員署理倘正印官一時不得其人即遴選鄰近之賢能佐二官署理如繫地方要闕鄰近難得其人則將隔府正印官委署而别委官員以署該員本縣之事務期人地相宜而各縣公務又不致於遲誤斯有裨益倘該上司有市惠徇情任意委署者經朕察出定嚴加處分欽此十年諭向來大計參劾官員除貪酷發審外其餘著送部引見嗣後特參文武官員比照大計之例如浮躁不及等款者亦著送部引見永著為例欽此十二年覆準保舉賢良方正出身人員如犯貪酷不法等事審實察明該員保舉緣由於疏內附參將原保舉之州縣等官降三級調用轉詳之司道府直隸州知州降二級留任不能察出之督撫降一級留任又議準凡督撫糾參屬官必將應參之事備列款迹或無款可列必將所參情由一一據實指出具奏如有不列款迹不據實情含糊具題將督撫照含糊具題例降一級留任所參之官仍行令該督撫秉公確訪或列款迹或將應參情由據實指出題覆到日交部照例分别議處又議準雲貴川廣等省苖疆地方照臺灣之例令文武官辨互相稽察如文職同知以下等官武職遊守以下等官有將苖夷科派擾纍及將土目索詐陵辱等情除將該官辨參處治罪外其同城文武如有曲徇情面含糊隱諱將不行揭報之道府副參並不行告知督撫提鎮之文武官辨皆照臺灣之例分别議處再邊地官兵出征如不肖之官並不親身前往將勦賊辦糧重任專委土辨經理以致惡辨乘機搶奪生事等情亦令文武官互相稽察呈報督撫提鎮嚴訪重處如有瞻徇隱匿情弊亦照臺灣之例分别議處又議準凡各省地方官於升遷降調以及有事故離任之後遇有疏防失察等案如在任時實繫因公出境接任之人務將前官公出月日及因何事公出何處分晰詳報督撫據實聲明聽部察覆倘接任之人將前官公出之處失於察報誤將職名開送者將接任官照失報事故例罰俸一年轉報之上司照不行詳察例罰俸六月十三年議準直省各上司有恃勢抑勒者許屬官詳報督撫即行題參若該督撫徇庇上司不行參究或督撫自行抑勒致屬官受屈難伸者仍準其直揭部科察明揭內情辭如果有抑勒實情即行據揭具奏將原揭一並行令該督撫確審該上司暫免解任如審明該上司果有抑勒情由題參到日照抑勒例議處若屬官已知訪揭題參罪無可逭即乘參本未到之先托砌款迹揑辭誣揭部科者部科察揭內情辭毫無確據即據揭參奏將該員解任行令督撫確審如審繫誣揭將該員革職治罪乾隆元年議準直省應行題補員闕各該督撫於屬官內擇其才守兼優者準以應升之官題補不得越級奏請升用其佐雜等官例不具題亦止準以應升之官咨部請補至因公罣誤降革人員或經該督撫保題留任或奉旨留任者該督撫遵例保題開復後方準再行題請升用如將銜闕懸殊不應題升之人越次保題指闕具奏請升用者將該督撫照含糊具題例降一級留任如將革職降級留任官不俟開復遽行保題指闕奏請升用者將督撫照革職降級官擅行委署例降一級調用又議準督撫保題人員繫道府等官取具兩司確結務將本人居官如何之處出具切實考語進呈御覽並將該員任內事迹於本內聲明照例造册出結送部存案州縣官員毋庸取具道府文結該督撫即將該管上司季報本官任內事迹考語摘取入疏加具切實考語進呈御覽並造清册送部以慿察核所保之人或改操於後致干嚴處者察明從前所開事迹果有確據將出結開報各官準豫免議如所結不實將原結各官仍照例議處又議準凡遇有應行題補之闕於員闕時該督撫接到部文之後限一月內即行簡選題補如無合例之人亦即據實奏聞請旨簡用倘有任意遲延經部科察出將督撫議處違限不及一月者罰俸三月違限一月者罰俸六月違限二月者罰俸九月違限三月者罰俸一年違限四五月者降一級留任違限六月以上者降二級留任違限一年以上者降三級調用又議準直省督撫轉飭府州縣等官保舉孝廉方正詳稽事實造册加結申詳該管上司遞加訪察督撫核實保題倘所舉不實將平日並非敦崇實行之人以夤緣奔競輒行保薦或被旁人舉發或被訪察題參除本人斥革追究外將濫行出結各官降三級調用受財者從重論如各衙門胥役借端需索該管官失於覺察者照失察衙役犯贓例分别議處三年覆準督撫越銜保題如不將越次之處於疏內聲明者將督撫照定例處分若督撫疏內已經聲明越次因人才公務起見奏請者除將所保之人照例題駮外其保題之督撫照承問官錯擬經部改正承問官免議之例免其處分五年奏準各省督撫遵照定例題升調補官員原任及新任內有貪劣等事如繫該督撫等自行察出究參無論該員升任原任貪劣皆免其議處如不行參奏别經發覺者皆照不揭報劣員例分别察議七年議準督撫題補官員任內有參罰事故皆於本內聲明聽部定議已經核參未準部覆案件亦將原參之事敘入本內聽部定議如有遺漏由部察明即於議覆本內將具題之督撫照不行詳察例罰俸六月十年奏準凡上司失察屬官貪劣其不同城之上司在任不及一月者免議十七年議準各省督撫遇教職考核案件例應會同學臣舉行者務遵定例會同辦理其或自行密訪察參之案亦於咨題之後即知會學臣以備稽考一言官奏事不實康熙九年題準言官如將貪婪官員列款糾參審問全虛者或參官員老病衰庸若虛者皆各降二級調用其譏刺條議奉旨議處者或因不據實回奏奉旨議處者或凡事不據實陳奏或並無可據稱風聞具奏者皆各降一級調用如將官員列款糾參有一二處實者免議十四年議準內外無言責大小官員如不繫密事妄行密奏及借公將私事具奏者除所奏不準外各降二級調用或言官及無言責各官借端條奏陷異護黨挾詐報復並允受囑託及行賄作弊具奏者事發將本官革職交與刑部如督撫科道題參應密不密不應密而密者皆各罰俸六月一官員呈辨寃枉康熙九年議準官員辨寃具呈原議衙門不準者許赴通政使司鼓廳控告如寃枉果實將原議不準衙門官罰俸兩月如無寃枉一次控告不準之事又復控告原衙門者將所告情節不準行繫官罰俸六月繫民交與刑部初次控告通政使司鼓廳並無寃枉者罰俸六月又稱寃枉復赴通政使司鼓廳控告者降一級調用如已經革職官員皆交與刑部議罪初次叩閽審虛者罰俸九月復稱寃枉叩閽者降二級調用若於原辭之外揑造言語妄生枝節控告審虛者照定例處分再降一級調用如已經革職官皆交刑部議罪其控告上司受賄私派等事審虛者革職提問又覆準年久已結之案有在部呈辨開復者一槩停止如果有寃枉赴通政使司鼓廳控告至降級革職之官稱伊事寃枉或叩閽或在通政使司鼓廳控告具題者由部察明果繫寃枉將此控告案內寃枉人員一並開復二十五年議準定例內京察大計降級革職官如有將考伊官員以受賄侵勒控告者將所告之事不準行本官有冠帶者革職無冠帶者交與刑部議罪嗣後凡官員將伊列款糾參之後乃將上司列款首告者照此例將所告之處不準行仍交部治罪雍正十三年議準科道被人參劾之後並不靜聽部議候旨裁奪倚恃言官之職妄行具揭陳辨者降三級調用乾隆四年奏準凡候補候選以及曾經議處官員如有應行呈明情節咸準其赴部具呈交與該司將應準應駮緣由詳加考核逐款明晰批示分别辦理至既經具呈一次之後如有復行揑辭妄控者一槩不準收録倘此內果有實屬寃枉應令其自行赴都察院具呈該院察明應行準理者行文調取該部辦理原案及一應定例如實繫舛錯即為奏請改正該部堂官如有辦理未協亦即奏明請旨察議倘有營私受託等弊都察院一經確訪即行參奏一失報逃官康熙九年議準所屬見任官員潛逃不行申報者罰俸一年或有員闕不報者處分同又各官有謊報因公出境者降一級調用一不察假官康熙九年題準凡姦徒私造假印執持假票冒稱職官或謊帶花翎或假稱差官所在地方州縣不行察拏者降一級調用如給此等姦徒印結執照者事發革職欽定大清會典則例卷十一
