body:
  text: 都察院六一官員赴任康熙六十一年議準凡補授外官領憑後交都察院轉行五城司坊官嚴察如有在京久住不依限赴任者即報部題參雍正五年定凡在京補授知縣以上官自奉旨之日起限十日內給發文憑給發之日起亦限十日內交都察院轉行五城兵馬司指揮嚴催照限令其赴任一廢員回籍康熙二十九年定凡京官革職休致解任該部知照各原籍督撫仍移咨都察院轉付五城司坊官嚴催起程將起程日期報部三十年議準除革職提問官照例勒限驅逐回籍外其餘解任休致丁憂等官聼其自便雍正三年諭凡旗員革職離任者皆勒限歸旗康熙二十九年定例漢官革職離任者照旗員例勒限回籍嗣後陸續條陳前後更改且日久廢弛奉行不力嗣後凡漢官革職於任內事結之後即勒限令其回籍若有逗遛任所以及潛住京師遨逰他省者照例治罪其擅自容留之五城及各地方官亦分别處分至朕從前曾令革職解任官或有寃抑赴都察院申理嗣後如有此等人員著在本地方取具文書然後來京事竣之後仍發回原籍不得藉端留滯著該部議奏欽此遵旨議準凡京官革職曽經問有罪名者限一月內起程五城司坊官將起程日期報部並知會原籍地方官照旗員歸旗例依限回籍倘違限不即起程及逗遛中塗並回籍遲延違限一月以上者都察院及該督撫題參照旗員例治罪如該管文武各官或不於限內催令起程或潛住京師五城司坊官専汛武官不察出驅逐皆照容留旗員例議處其革職解任廢官或有寃抑赴都察院具呈申理者先具呈本地方官轉詳督撫給咨來京事竣之日都察院轉行五城司坊官發回原籍仍知會原籍地方官如藉端留滯照例治罪五城司坊官徇情容留者照例議處一鄉會試禁約康熙十七年議準凡遇鄉會試之年場前榜後如有私書匿名紙帖揭於街市或編就歌謠豫為傳播計圖陷害他人者在內聼巡城御史五城司坊緝拏治罪雍正四年諭科場關繫大典若闈中閲卷果有不公許應試舉子親身赴都察院控告奏聞若不軌之徒假揑汚衊之辭以泄私憤而撓公事則國法斷難寬宥著五城御史等密訪嚴拏即行參奏從重治罪欽此乾隆元年諭鄉會試倘有場前鑽刺豫報元魁及榜後生事揑造歌謠為人心風俗害者五城御史訪拏治罪欽此六年諭今鄉試在邇聞不肖士子故智復萌賃倩繕寫細字之人鈔録文藝為入場夾帶之具著五城御史出示曉諭密行嚴拏欽此又議準武闈難保無懷挾繕寫細字之弊應照文場之例令五城御史出示曉諭密行嚴拏九年奏準凡鄉會試坊間擬表刋刻發賣令五城御史出示禁止一書吏役滿康熙三十八年定凡部院衙門書吏五年役滿考職一經出榜曉示即令五城司坊官嚴催回籍取具地鄰一月內起身甘結並司坊官印結報部倘有潛住京城不行察催將司坊官照容留廢員例處分雍正元年奏準各部院衙門盤踞書吏除拏獲者已遵旨遞解原籍外仍飭五城司坊官不時稽察如有潛匿京城或遞回復私自來京者並拏送刑部治罪嗣後考滿書吏各部院移咨都察院令五城司坊立押回籍毋許逗遛如司坊官不行嚴察一并參處一驅逐遊惰康熙五年覆準五城司坊官及巡捕三營官察各該管地方有無業遊手來歷不明之人即送該城遞回原籍仍察明犯事離籍情由擬罪如該管官不行拏送别經察出者議處總甲等並容留居住之房主皆責三十板十年覆準凡無業之人在街道打手鼓踢石毬者繫旗人鞭五十繫民人責二十板又定凡遊手好間之人輪義舞棍演弄拳棒遍遊街市射利惑民打降賭博五城等官拏獲將本犯照違制律治罪仍枷一月即行發落遞回原籍坊店寺院房主容留不報地保人等不行察拏皆照不應重律治罪地方文武官失察照例議處又定凡秧歌腳墮民婆令五城司坊等官盡驅回籍毋令潛住京師若有無藉之徒將此等婦女容隱在家因與飲酒者職官照挾妓飲酒例治罪其失察地方官照例議處雍正五年諭京師為輦轂重地理宜肅清但五方雜處品類溷淆往往有各省遊手姦偽之徒潛來居住招搖生事或呼朋引類訛詐錢財或捕風捉影指稱縴路或打探消息囑託衙門或揑造浮言煽惑衆聽以至開場局賭誘人為非者難以悉數朕思京城內外逺人聚集者雖多皆有容留居住之處或在客店寺廟或倚親友居停或租賃房屋但就其住處稽察自可得其蹤迹如候補候選之人必有仕籍可稽至於讀書之人或應試到監或處館作幕貿易生理之人或行商坐賈或工匠手藝以及醫卜梨園肩挑負販皆必實有本業營生方可聼其在京居住若間散遊蕩出入詭祕託名糊口四方而實無恆業即繫姦偽之徒立宜擯逐嗣後令步軍統領巡城御史順天府督率屬員於九門五城地方嚴加察訪並出示曉諭京城內外客店寺廟以及官民人等凡有容留居住棲止之人果知其行蹤來歷可以深信方許容留棲止倘繫面生可疑蹤迹莫定或人雖熟識而生事妄行者槩不許容留居住若徇情受賄一時姑容經該管官訪出或本人日後事迹敗露必將容留居住之人連坐治罪其作何察訪取具保結之道不使賢愚溷雜並令奉行得宜不致滋擾著九卿定議具奏欽此遵旨議準嗣後飭令五城司坊大宛二縣凡客店庵院不時稽察取具並無容留來歷不明生事妄行之人甘結以憑各衙門察閲其通衢僻巷賃房居住者令房主詢明保人來歷並著兩鄰稽察倘有此等遊棍該鄰右房主協同斥逐毋得徇情若有徇情受賄容留者本犯照律治罪遞回原籍外將客店庵院住持房主一并懲治該管官不行察出照失察例議處至編户居民住有常業及候補候選讀書貿易諸色人等確有憑據者毋庸驅逐倘有藉端勒索溷擾良民者照嚇詐例治罪一邪教康熙五年定凡邪教惑衆該司坊官不行嚴禁五城御史不行糾參一并議處十六年題準凡揑造俚歌刋刻傳頌沿街唱和者內外地方官即時察拏照不應重律治罪若繫妖言惑衆等辭照律擬罪十八年議準凡迎神進香鳴鑼擊鼓肆行無忌者為首之人照邪教惑衆律治罪為從者枷三月責四十板不準折贖五城御史及司坊官不行察拏分别議處二十六年覆準無賴狂徒假籍僧道為名或稱祖師降乩或妄逞邪説托言前知或以虛妄之談蠱惑愚蒙至有羣相禮拜甘作徒從者此等邪教行令五城官嚴行禁止四十八年覆準凡鳴鑼擊鼓聚衆燒香男女溷雜等弊曽經嚴禁恐相沿日久舊俗復熾再扶鸞書符招搖夤緣之輩槩永行禁止違者該司坊官究治雍正二年題準婦人成羣聚會往寺廟進香者令五城司坊官嚴禁又覆準除軍民妻女禁止入廟燒香及扮神賽會外其民間春秋里社祈報者不在此例著都察院分晰出示並令司坊官明白曉諭三年奏準凡妄布邪言書寫張貼煽惑人心者令五城司坊官不時嚴拏又奏準凡坊肆市賣一應淫辭小説在內交與都察院等衙門轉行所屬官辨嚴禁務搜版書盡行銷燬有仍行造作刻印者繫官革職軍民杖一百流三千里市賣者杖一百徒三年買看者杖一百該管官辨不行察出按次數分别議處仍不許藉端出首訛詐乾隆十年奏準五城街衢牆壁間術士多貼淫戲穢惡之方巧立名色哄騙少年迷惑浸淫害人匪淺應令該司坊官嚴行驅逐一私鑄順治十四年議準凡失察私鑄五城坊官一起降一級掌印兵馬司二起降一級五城御史不行察參一并議處十八年議準凡失察私鑄五城坊官一起降二級二起降四級皆調用三起革職掌印兵馬司一起降一級二起降二級三起降三級皆調用四起革職五起御史不行察恭以疏忽治罪康熙二十三年定五城地方盜鑄私鑄及銷燬制錢之人若别經拏獲將失察之五城官員皆照處分錢局官員例議處二十九年覆準凡攙和私錢行使之人察拏被獲繫旗人鞭八十繫民責四十板京城外責令五城司坊官京城內責令大宛二縣官嚴行察拏若仍有攙和私鑄者將該管官每起罰俸一年三十六年議準嗣後銷燬制錢私鑄販賣者如不行察出五城坊官不知情者一起降三級調用二起革職掌印兵馬司不知情者一起降二級二起降四級皆調用三起革職四十四年題準凡失察私鑄五城坊官降三級調用掌印兵馬司一起降二級二起降四級調用三起革職雍正三年議準凡五城司坊官但能拏獲私鑄者不論年月逺近槩免處分文職拏獲準免武職處分武職拏獲準免文職處分果能實心察拏不論本管地方與否視拏獲之多寡量豫議敘若仍前怠玩仍照舊例處分一私銷康熙五十六年議準錢局收買舊器皿廢銅小民圖利致將小制錢燬壞變賣嗣後停其收買行令五城嚴緝燬壞之人治罪雍正五年奏準凡銷燬制錢地方密行嚴察毋致潛藏如怠忽疏縱該地方官革職九年議準京城鋪户有將制錢之邊磋捶令薄攙和兌換鎔化銅末取利者五城御史察拏治罪十三年十一月諭京城中姦徒銷燬制錢著該地方官密訪嚴拏勿稍疏縱倘仍視為具文將該管官重加處分不稍寬貸欽此一嚇詐康熙十一年題準惡徒藉端挾詐勒騙錢財公行搶奪攪擾市肆者責成該司坊官不時巡緝如知情徇庇及不知失察者分别議處雍正二年議準凡部院吏役人等有指稱打點衙門名色招搖撞騙及向拘禁在官之人恐嚇勒詐財物者久干禁例令五城御史實力奉行訪拏懲治一拐騙康熙二年題準八旗買賣人口兩家赴市納稅注册令領催保結列名若繫漢人令五城司坊官察有該管官印票凖買永著為例六年諭凡搶奪婦女拐騙幼子此等姦惡之徒嚴行五城察拏從重治罪如所屬地方不行察拏將該管巡緝官治罪欽此又議準凡聚衆搶奪路行婦女及以藥餅撲項邪術迷拐男婦子女或賣或自為奴婢者審實凡夥謀之人照光棍例皆擬斬立決買者知情減正犯一等不知情者不坐失察之五城坊官議處二十三年定凡私設窰子誘拐人口之犯令五城等官嚴行察拏務盡其類以靖地方若不行察拏照錢局官處分例議處亦不得藉名察拏妄擾良民雍正七年議凖嗣後民人幼孩迷失收留之人呈報該司坊官該司坊官傳人認領即報明刑部若收留不報照誘拐例治罪一霸占雍正八年議準嗣後五城地方私立水窩名色分定界址把持賣水不容他人擔取者照把持行市律治罪該地甲役知有私立水窩不即舉報者照不首告律分别治罪該司坊官不行嚴禁照約束不嚴例議處又議準五城地方民人有喪葬婚嫁等事須用人夫車轎悉聼本家自行雇覓如有私分地界霸占扛擡多取價直不容本家雇覓者立拏枷示兩月杖一百仍令司坊官曉諭永逺遵行該地甲役知有扛擡攬頭不即舉報者照不首告律分别治罪該司坊官不行嚴禁照約束不嚴例議處又定凡京城無帖鋪户如有私分地界不令旁人附近開張及將地界議價若干方許承頂至發賣各項貨物車戶設立名牌獨自霸攬不令他人攬運者各枷兩月杖一百一謠言雍正元年覆準書吏提塘京報人等除紅本上諭外如有訛造無影之辭者該司坊官嚴行察拏二年議準吏兵部科衙役及各省報房探聼事件揑造言語者該司坊官嚴行察拏十三年奏準嗣後無論事之巨細若非據實首告編造歌謡詩辭黏貼街巷者五城御史拏送刑部治罪一賭博鬬毆等件康熙十五年議準凡失察賭博之司坊官每起罰俸一月二起巡城御史罰俸一月三十年覆準凡有造紙牌骰子者該司坊官嚴禁京城見有之紙牌骰子限一月內銷毁雍正元年覆準凡有開鵪鶉圈鬬雞坑蟋蟀盆並賭鬬者該司坊官嚴行禁止三年奏準凡開圈鬬雞鵪鶉蟋蟀者照開場賭博枷責例治罪其該管官亦照開場賭博之該管官例議處十二年諭五城司坊等官各有管轄之地越界拏人固不免滋擾然路遇鬬毆酗酒拐騙嚇詐之徒若因地非管轄遂置而不問以致逃遁無蹤亦非稽察整飭之道似應不論何地皆準其拘執移送該城司坊官聼詳該御史審訊發落至曖昧隱僻不法等事雖訪聞的確猶非刻不可緩則凖其密詳該城御史察拏並密詳本城御史存案如此庶無推諉亦不致攙越其應如何定例著九卿議奏欽此遵旨議準嗣後五城司坊官塗遇鬬毆酗酒騙詐等事不論何城地方均令當時拘執押送該城司坊録供詳解該城御史審訊發落一面報與本城御史存案倘仍泥疆界不即拘執以致案犯脫逃者巡城御史題參照踈脫例議處至曖昧隱匿不法等事各司坊官訪聞的確亦不論何城地方準其密詳該城察拏仍密詳本城存案均歸於各城造册送都察院注銷倘該役藉端訛詐嚇索不遂駕辭妄稟及司坊官擅作威福者該城題參議處再司坊各設捕役專緝匪類盜賊亦不得因非本管地方明知故縱竟不擒緝倘有明知故縱及受賄情弊將該役治罪該司坊照疏忽例議處再五城地方多與大宛二縣接壤自應不分彼此地界一例緝拏乾隆五年議準正陽崇文宣武門內皆繫旗人居址雖有民人錯處而街道則有兵丁察看堆撥柵闌則有兵丁看守又有步軍尉等直宿巡邏不但五城捕役無可參置即司坊亦無從察問是以向例未曽設有巡役遇有逃盜賭博等事既無捕役巡察則司坊官自不應一例參處嗣後正陽崇文宣武門內五城分管地方除人命及活傷驗報不實照例參處外其逃盜賭博等事皆免司坊官失察處分至正陽崇文宣武門外五城分管地方各設巡役遇有人命逃盜賭博等事令該役按地緝拏如該司坊官有失察逃盜賭博等事仍照例參處又議準捕役等如有受賄故縱聚賭窩娼者嚴加治罪將失察之該司坊官議處一煤窰順治十二年題準西山過街塔山玉泉山紅石山杏子口一帶煤窰永行封禁康熙十年題準煤稅纍民準豫豁免遞年應用之煤照時價召商辦用其煤窰事件聼五城州縣管理十七年題準凡爭訟煤窰察收稅原册有名者斷給如無名妄告送刑部議罪五十二年題準紅石口蝎子山自青龍橋迤北髙兒山破頭山楊家頂一帶均關風水行文五城等官通行嚴禁毋許採砍若有將禁止之處私行偷砍石料者察拏治罪嗣後如有修造之處應用石料著欽天監官前往踏看果繫無關地脈之山方許開採又定西山一帶密邇京城地方內外官豪勢要之家私自開窰燒煤鑿山賣石立厰燒灰者問罪枷一月發邊衛充軍干礙內外官員參奏提問乾隆十一年議準按楊家坨軍莊在渾河以西諸處煤窰甚多在香山數十里之外毫無關礙仍應聼民開採其過街塔于公寺東西一帶見有煤窰為數無多稽察尚易且離香山外牆尚有數里所有見在煤窰仍聼開採不必察禁其廢窰內如有情願復開者亦應聼民之便此外附近過街塔如天台山談玉村諸處如有請開者令先呈明該地方官詳報步軍統領順天府委官確勘酌量辦理一質當軍器及藏造雍正二年諭八旗盔甲器械等物曽經禁止質當今再嚴加禁約交與八旗五城以來年為限倘經察出將五城官員治罪或有不肖之徒藉此訛詐者并應嚴禁欽此十二年議準嗣後民間鐡鋪內私造之鳥槍及民間違禁隱藏之鳥槍在京行令五城司坊官勒限兩月嚴行追出交兩翼鐡匠局如逾限不能追出並民間有隱藏不行交出者一經察出將私造隱藏之人並失察之地方官照例分别治罪一戲館康熙十年議準京師內城不許開設戲館永行禁止城外戲館如有惡棍藉端生事該司坊官察拏治罪一經紀乾隆五年議準嗣後京城酒行經紀除每兩應得用銀三分外不得絲毫多取朘削商民違者司坊官察拏治罪一馬匹耕牛康熙三十一年諭一應馬匹不許宰殺貨賣著永行禁止交與五城等官嚴察如有宰馬賣者拏送刑部從重治罪欽此雍正三年定凡旗人將在京馬匹販至外省發賣者處絞説合牙人不分旗民減一等科罪該管佐領等及該管五城司坊官不行察禁者交部議處五年議準嗣後宰賣偷竊耕牛五城司坊官嚴行禁止違者嚴拏照例治罪一火房雍正十二年議準五城及順天府轉飭各司坊官大宛二縣令各處火房設立循環簿將逐日投宿之人詳開姓名住址行業十日一報倘有行止可疑之人即令呈報該地方官詢知住址遞回原籍安插倘不據實呈報將開設火房之人照不應律責處倘遇有患病受傷身死之人並不具報者照移尸律治罪地方官不行察出照失察例議處乾隆二年奏準從前火房不許容留刺字之人以致此輩無處容身嗣後各處火房許前項孤身無業之人宿歇仍照例設循環簿稽察十一年議準五城御史順天府轉飭各司坊官大宛二縣將設立循環簿編察保甲之處遵照雍正十二年及乾隆二年定例實力稽察嗣後開設火房之人容留匪類如有犯強竊案者分别有無知情分贓例治罪保甲人等照所管內有為盜之人瞻徇隱匿例分别責處一保結雍正三年奏準凡部內題結軍流徒犯及免死流犯發遣以前告稱祖父母父母老疾家無以次成丁者如屬五城民人令掌印兵馬司指揮出結巡城御史確察報部若有揑出印結及受賄者從重論失察者交部議處其鄉約地方總甲十家長兩鄰內有徇庇假揑出結者杖一百受財出結者杖一百徒三年若地方官出結後上司復令察出或原官察出及鄉約人等首送者除本犯仍行發遣外官員及鄉約人等皆免議其在人犯咨解到部之後告留養者不準十一年題準嗣後刑部更夫行令五城召募擇勤慎者準其供役又定凡陵寢採買米麥價直及各部院須知雜糧價直並由五城司坊官結報又定凡官員領憑在京病久未能起程者吏科批發該坊察驗該坊據實驗明出具印結報科又定凡鑾儀衛校尉闕於見役校尉親生子及兄弟之子內選擇堪用者充補如校尉子弟不足移文五城召募該坊官察無過犯身家殷實民人出結保送其每月應領工食並出具印領一取保雍正五年議準嗣後五城拏獲輕犯未經審理之先應行收禁者仍令該衙門照常收禁若情罪甚輕令取具的保候審不必監禁如有踈縱等弊即將原保之人一并究治一收管乾隆二年奏準嗣後刑部五城步軍統領衙門審擬竊盜如繫本京之人交保甲收管該地方官不時點驗其不知籍貫者分發大宛二縣安插收管十一年議準嗣後安插人犯除大宛二縣稽察外如屬在五城者該司坊官一并點驗一清理街道順治元年差工部漢司官一人清理街道修濬溝渠仍令五城司坊官分理康熙二年覆準內城令滿漢御史街道廳步軍翼尉協尉管理外城令街道廳司坊官分理十四年覆準內城街道溝渠交步軍統領管理外城交街道廳管理乾隆十九年諭五城街道泥土嵗填積增髙行路居人均屬不便著管理河道溝渠大臣等詳勘量其修理之費動支官帑除去積土堆置就近城外隙地此畨官辦後隨時畚除自易為力並令該管衙門酌照從前煤車回空擕帶沙土之例善為經理勿仍壅積但不得任聼兵役抑勒滋擾欽此一溝渠凡五城溝渠一年一次修理務使疏濬深通不得壅塞該坊副指揮吏目分年輪管一石路廣寧門外石路及兩旁土道令南城副指揮西城吏目東便門至朝陽門外石路及兩旁土道令東城吏目各遵部定丈尺修墊平坦一民房康熙五十年覆準正陽門外大街東西兩邊房屋並珠市口民房以新溝為限準其修理蓋造至小街有溝者以溝為限其無溝並街道彎斜不整或一面繫空地者均以左右鄰房不占官地者為度仍於本戶下注明礙道尺寸立册存案日後更造清出還官雍正十二年議準嗣後旗民不論自置民房與認買官房若整齊堅固不準無故拆賣倘迫於急需只準將院內零星房屋拆賣其臨街羣房不許盡行拆賣該坊官出示曉諭違者察拏乾隆八年奏準嗣後認買官房已經帑頃清完者或因傾頺或因急需外城報該坊官批呈存案準其拆賣其有不告官司將認買官房私行拆賣者仍照原例治罪至於兵民自置房屋無論院內臨街拆賣悉聼其便畨役人等不得藉端勒索又奏準嗣後旗民人等臨街房屋實在拆賣濟急者呈明該旗該坊官察看地方街衢果繫僻巷尚可築牆遮蔽者準其拆賣即行築牆遮蔽倘臨街房屋不得築牆一經拆毁即覺破壞者仍一槩不準拆賣十九年諭京師為萬方輻輳之地街衢廬舍理應整齊周密以肅觀瞻乃近來京城內外別有拆售房屋者行戶等亦藉以居竒射利此陋習也見因八旗人衆居住不敷特發帑金增置以資棲止該管大臣秪圖近便率購舊料致將已成之屋輾轉拆蓋料物必多耗折是因增而轉減於生計亦屬無益著五城御史出示嚴行禁止欽此又定凡民間街道房屋私造私修私拆等事該坊副指揮吏目分年輪管一客店每月置店簿一本赴兵馬司署押訖逐日附載歇店客商姓名人數起程月日各赴所司察照如有客商病故所遺財物別無家人親屬者官為封識移招已故之人親屬識認給還一年後無識認者入官一教場雍正三年議準京城安定門外黃寺前教場乃操演兵丁閲看軍器之地每有路旁掘土為坯市賣者令該坊官不時巡察嚴行禁止違者拏送刑部治罪再八旗教場皆近城垣並令一例察禁一河崖康熙五年題準大城下護城河崖水衝之處工部差官修築外羅城河崖令順天府及五城官修築乾隆九年奏準京城內外沿河植栁行令該坊官時加培護禁止偷折違者察拏一承追凡五城兵馬司承追贓罰變産等項如限滿不完照大興宛平承追雜項錢糧例議處該城御史即將司坊官職名呈報都察院咨部題參如司坊官承追限滿不完該城御史不將職名開送者經都察院刑部察出將該御史一并議處仍令該司坊官將積年承追之項造具清册三本一送都察院一送刑部一存該城御史察核一羈禁順治十六年覆準五城人犯有事關重大者方許羈鋪候審其餘小事不得濫行羈鋪如各役有索詐等情該御史題參按例治罪康熙五十七年覆準嗣後五城司坊官奉行牌票除六部都察院通政使司大理寺順天府步軍統領河南等道本城御史批發事件外其餘各衙門不得擅行牌票交與司坊鎖禁人犯如果有緊要案件必須印文咨明巡城御史轉行司坊凡部院行令該司羈禁要犯該司一面羈禁一面申報都察院一遞解凡各部人犯應遞解者發該司遞解雍正五年議準凡徒罪人犯繫順天府所屬者仍送府尹發配外各省民人皆遞回該督撫照原籍應發地方發配充徒徒限滿日仍令原籍地方官管束不許再來京師違者拏獲之日枷一月責四十板仍行遞回五城兩縣並巡捕營嚴行察拏倘奉行不力仍有容留潛住者將該管官議處總甲人役並容留之房主皆照不應重律治罪乾隆二年議準京城遞回原籍充徒人犯復來京師者定例枷一月責四十板其有再來犯事罪止杖笞者仍照例枷責若所犯罪重於枷責者照本犯應得之罪加一等一并遞回原籍不許出境至具呈廢員內有與例不符及引見未用者應即歸里倘聼從書吏等鑽刺請托該司坊官察拏一供應雍正元年定向來貢院應用案座等物均繫五城司坊借用民間因之總甲捕役等藉端科派種種擾纍嗣後貢院應用諸物著工部備造取用所有派借民間之處槩行禁止又議準鄉會場內所用筆墨紙張及笤帚水桶等物亦著備辦以杜五城借用之擾其水桶等物於考畢日交司坊官收貯至筆墨紙張等項日銷之物嗣後於科場供應銀內一例奏銷十一年題準向來部院各衙門票取各項差務該坊官均令總甲承辦而總甲皆派於民間鋪戶藉端需索在所不免嗣後或竟行裁革或自行承直或給發官價均不得藉口賠墊暗行私斂逐條分晰永久遵行如部院票取東西馬館藥引獸醫文鄉會試雇覓各項長短夫役禮部票取刻字匠及恩榮筵掃除潑水夫役順天府武鄉試票取空白簿武鄉會試外場領運牀椅等物所用車價人夫武會試厨役及應用器物又每遇應送校尉駕衣翎帽並擡夫錢糧各項須用車裝載內務府雇車所用席蓬繩竹光祿寺票取厨役茶夫並蒸鍋等匠各部院發下遞解人犯老病婦女須車驢解送各衙門票取鼓吹采紬並公案公座內務府器皿庫匠作每月票取青竹藤條茶葉鑾儀衛每年六月票行洗象搭棚以上各條盡免總甲承辦永除藉端科派之弊並將各城總甲照捕役工食一例給與倘總甲仍有藉端科派者按律計贓治罪如該司坊官失於覺察該御史題參照失察衙役犯贓例議處若知情故縱照縱役貪贓例議處又定凡耕藉順天府行令該司坊先期習禮屆期督率掃除及料理從耕播種等事鄉會試順天府禮部行令該司坊官料理外場監試供應物件並督率搜檢巡邏場圍武鄉會試順天府兵部行令該司坊官料理外場監射棚厰物件及會試外場監射一切供給鄉飲酒禮順天府行令該司坊官執事決囚刑部行令該司坊官督率巡邏刑部各司步軍統領衙門飭發枷示看守取結養病各犯及飭驗生死傷痕並掩埋病故監犯行令該司坊官承辦又定凡兵部額車如不敷用行令該司坊官雇覔以百里為站每車每站給銀一錢或里數多少遞為增減移咨户部給發一供應夫役康熙九年定凡內府取用匠夫行文到部移咨都察院轉行五城取送如工程緊急行令該坊官取送十年議準嗣後各部院應用工匠夫役移咨都察院轉行五城取用十二年題準五城匠役各委坊官一人察管雍正二年議準嗣後壇廟掃除道路應用夫役歸工部辦理其向五城取夫之例槩行停止十一年題準嗣後文鄉會試內外搜檢等夫以五城捕役聼用揭曉護榜等夫以五城總甲聼用工部所用舁夫行令該司坊官選壯健不生事之人送部仍令該司坊官督總甲管押一書吏中城指揮三名副指揮二名吏目二名東城南城西城指揮副指揮吏目各三名北城指揮四名副指揮二名吏目三名一皂𨽻中城司坊共十有八名東城司坊共二十九名南城司坊共二十名西城司坊共二十九名北城司坊共三十名月各給折米銀三錢九分一總甲中城副指揮吏目各四名東城副指揮吏目各六名南城副指揮六名吏目五名西城副指揮五名吏目六名北城副指揮七名吏目九名月各給工食銀五錢一捕役五城副指揮吏目各二十四名月各給工食銀五錢雍正七年奏準各城一司兩坊每坊額設巡役十有二名地濶人稠巡察不及準於每坊增設捕役十有二名一仵作雍正十一年題準人命最重相驗相驗全慿仵作刑部向無仵作遇有命案隨傳五城仵作相驗嗣後刑部専設仵作二名五城各設仵作一名由本城召募誠實諳練者充當給發工食月各一兩如三年無過月各二兩一所夫中東南北四城各設棲流所一處西城設立二處各所夫一名月各給工食銀五錢均於棲流所存公銀內支領欽定大清會典則例卷一百五十
