body:
  text: 工部虞衡清吏司採捕一採捕定額國初定王以下公以上許遣壯丁於烏喇地方採捕東珠貂鼠人參等物効力勤勞大臣許遣壯丁採取人參順治二年定烏喇捕牲每壯丁嵗徵貂皮十有五張四年題準上好東珠重八分者每一分折貂皮十張重七分五釐及七分者每一分折貂皮九張重六分五釐及六分者每一分折貂皮八張自五分五釐以至一分每一分折貂皮五張每五釐折二張半照數計算重五釐東珠折貂皮二張珍珠一分折貂皮一張不足半分小東珠皆算作珍珠此外黯色有帶東珠酌量折算猞猁猻頭號每張折貂皮六張二號折貂皮五張三號折貂皮四張四號折貂皮三張水獺皮頭號每張折貂皮三張二號折貂皮二張半三號折貂皮二張四號折貂皮一張半五號折貂皮一張末等每二張折貂皮一張豹皮頭號每張折貂皮五張二號折貂皮四張三號折貂皮三張虎皮頭號每張折貂皮四張二號折貂皮三張三號折貂皮二張四號折貂皮一張狐皮每張折貂皮二張狼皮頭號每張折貂皮三張二號折貂皮二張末等折貂皮一張貉皮每二張折貂皮一張小毛貂皮每二張折貂皮一張豺皮每張折貂皮一張上好灰鼠皮每二十張折貂皮一張小毛灰鼠皮每二十五張折貂皮一張虎斑鵰翎芝麻鵰翎每副折貂皮二張鸛翎團鵰翎每副折貂皮一張皮翎損傷者不許觧送每年捕牲壯丁夏季停止一月每名除貂皮二張冬季停止一月每名除貂皮三張又議準東珠重八分以上至一錢每一分皆折貂皮十張五年定停止大臣採參七年定停止宗室公採捕東珠貂鼠等物十年議準每壯丁十名内令五名耕種其五名嵗增貂皮五張共徵二十張康熙五年定烏喇捕牲壯丁兼捕鱏鰉魚八年題準虎皮不準折算貂皮折賞布疋十年議準每旗選壯丁十九名於冬夏二季専捕鱏鰉魚免捕貂鼠其捕牲人役在家病故者準計日扣除貂皮十二年議準次號東珠及兩面有光中間有帶東珠三分折算二分或一面二面微有光東珠二分折算一分無光東珠三分折算一分二十一年覆準豹虎狐貉灰鼠等皮及鵰鸛翎停其捕送上好狼皮别議給賞二十九年覆準上三旗每採捕丁十名置珠軒頭目一名每月給銀二兩採捕壯丁各一兩嗣後五旗採捕東珠貂皮鱏鰉魚壯丁給發錢糧設立珠軒頭目皆著照上三旗例行四十年覆準烏喇捕牲壯丁連幫丁每一名額取貂皮二十張為數過多又因二等有光無光東珠折算貂皮以致議處嗣後停止折算除無光東珠及珍珠珠丁不入正額外珠軒頭目三十三名即定為三十三珠軒每名額定一等二等有光東珠十有六顆又定開採參山刨取人參交内務府辦理雍正八年奏準烏蘇里綏分等處參山招商給票開採每票一張交納官參十有二兩開採二年停止一年其停止之年在額爾敏哈爾敏地方開採十一年奉㫖河中蚌蛤較前稀少其所取頭等東珠酌量作何準抵尋常東珠之處會議具奏欽此遵㫖議準嗣後将捕牲烏喇採捕東珠之内除無光東珠珍珠珠丁不入正額外其上三旗四十二珠軒下五旗三十四珠軒所採東珠一等者每顆準抵尋常東珠五顆二等者每顆準抵尋常東珠四顆三等者每顆準抵尋常東珠三顆四等者每顆準抵尋常東珠二顆其尋常東珠毎顆仍以一顆計算乾隆九年議準烏蘇里綏分等處放票收參改歸官辦或開二年停止一年或連刨三年歇山一年皆令盛京将軍吉林将軍寧古塔副都統會同商酌具奏辦理十五年議準烏喇地方捕牲壯丁採取人參有名無實多将所得人參竊與官領信票之人帶出肥己以致闕欠參數嗣後将採蜂蜜户三百名停其採參専令採捕東珠但珠丁每人嵗給錢糧六兩今此三百名皆繫欠參獲罪之人自不便與捕珠壯丁一例給與錢糧應令効力贖罪定為三旗分十二珠軒将伊等所得東珠别載册籍如果所得之珠在一等者多再令該将軍奏請賞給錢糧十九年諭收撫之烏良海五百八十五户向屬準噶爾時每丁嵗納貂皮六張今加恩減去二張止納貂皮四張其來年應納之數亦著寛免欽此一採捕賞罰順治十年議準烏喇捕牲翼長按壯丁計算額外多貂皮六十張賞銀三錢三十張賞銀一錢五分不及三十張不賞額内欠三十張至六十張責一鞭不及三十張免責領催按壯丁計算額外多貂皮二十張賞銀三錢多十張賞銀一錢五分不及十張不賞額内欠十張至二十張責一鞭不及十張免責賞罰皆按數遞加計算康熙元年定壯丁額外多交貂皮一張賞毛青布一疋闕額者毎一張責三鞭二年議準烏喇捕牲總管以八旗共得貂皮按丁計算額外多百張賞銀三錢額内少百張罰俸銀三錢翼長分管四旗壯丁如額外多得貂皮六十張賞銀三錢額内少六十張罰俸銀三錢二十九年議準嗣後内務府驗看東珠多寡如上三旗所得數多總管翼長等應行賞給許将五旗所採數少之處合算免其處分如上三旗所得不在賞例工部将八旗合算應賞亦著賞給如不足額仍行議處又定索倫等嵗貢貂皮每壯丁應納貂皮一張内一等貂皮五百張二等一千張其餘應作為三等收納如足數及等第者将送來人賞賜不及等第者送來與未來之人一并交理藩院議處三十九年議準貂皮足數不及等第者免其處分若數目不足者仍行處分四十年議準烏喇捕牲壯丁每名額採東珠十有六顆如於額外多一顆賞給採珠人丁毛青布二疋少一顆責十鞭其珠軒頭目三十三名将所得合算如額無賞無罰額外多得三十顆為一分賞給總管翼長彭段各一疋驍騎校潞紬一疋領催等各按旗分内多得一分各賞毛青布四疋如再多得按分加賞額數外多得至千顆總管翼長等加一級驍騎校及領催等按分賞給其額内少十顆為一分将總管翼長驍騎校等各罰俸一月領催等各按旗分内少一分責十鞭再少照算罰責總管翼長驍騎校等至罰俸一年降一級領催等至百鞭為止其上三旗應賞彭段紬布由部行文内務府照例賞給下五旗應行賞給之處行文五旗各王貝勒貝子等自行照例賞給乾隆六年奉㫖向例索倫地方所貢貂皮及等者有賞不及等者無賞因連年所貢貂皮不及等者照常賞賜是以索倫等並不用心捕捉著𫝊諭該将軍今年仍加恩賞賜嗣後所貢貂皮若仍不及等則不賞賜十七年奉㫖今年索倫所進貂皮雖不及等第但既已足數著減半賞給又覆準蜜户三百名十二珠軒捕得東珠一等者多應一例賞給六兩錢糧十八年題準蜜户三旗十二珠軒附於上三旗四十二珠軒内一并定議賞罰一採捕禁令國初定採參之人越己界採取者以偷盗論參還原主越境偷採者參與人畜皆入官其主罰責有差不知情者免議為首之人鞭一百餘皆準竊盜論參入官順治六年題準王貝勒貝子公等採取官參各照分定人數發徃違例差遣者革去一應賞賚止給與見獲人參差去之人入官其屬下人不奉差遣私遣人偷採者本犯入官其主治以重罪十五年議準旗下人偷採人參者枷一月鞭一百牲畜及所得之參一并入官官民家下人有犯其主知情者本犯枷一月鞭一百參與人畜皆入官其主問偷盜之罪不知情者免議本犯枷兩月鞭一百牲畜財物入官若其主知情詐稱不知者加等治罪家人入官奉天等處人民有犯者枷一月責四十板人畜財物入官蒙古席伯瓜兒察等處人有犯者交理藩院議處十六年議準順天等八府人民出山海闗禁約處所偷採人參者照奉天例交户部入官康熙二年題準違禁採參者為首之人處死餘仍照前治罪五年題準偷採人參之舖頭擬絞監候出財招集多人偷採者照為首例處死牲畜等物一并入官六年議準民人附從偷採人參者責二十板其容留貿易不拿送者加等治罪七年題準舊例每年四月八月官役廵踪防緝今令於春秋二季豫行廵緝又題準偷採人參之人未經起發拏獲者出財之主並為首之人各枷一月鞭一百為從繫旗人鞭一百民責四十板馬牛布疋等物入官八年題準偷採人參出財之主並為首之人已得參者照例擬死未得參者繫旗人枷兩月鞭一百民枷一月責四十板入官為從之人各枷一月繫旗人鞭一百民責四十板餘照前例九年議準奉天等處招徠之民偷採人參為從者照旗人例雖已得參免其入官枷兩月責四十板十一年題準駐劄盛京官員拏獲偷參之人得財私放者革職交刑部治罪若偷參之人同屯居住知而不首者降一級罰俸六月其採捕人役将採捕之物隐藏私帶者頭領翼長守山海闗官員皆罰俸一月十二年議準奴僕偷採人參其主知情者杖八十詐供不知者杖一百十五年議準旗下民人越境採參已得者将出財之主並為首之人皆擬絞監候聞拏投部不準自首為從繫旗人枷一月鞭一百繫奉天等處人枷兩月責四十板牲畜等物入官繫内地民人並妻入官奴僕偷採人參其主知情者繫官交該部議處旗人鞭八十民責三十板偷採之人枷一月鞭一百人與牲畜皆入官若其主知情詐稱不知者繫旗人鞭一百民責四十板不知情不坐本犯枷兩月鞭一百牲畜等物入官若未得參者出財之主並為首之人繫旗人枷兩月鞭一百民不分奉天内地皆枷一月責四十板同妻一併入官餘皆照前例十七年議準偷採人參為從者不分旗人民人皆枷兩月又議準偷採人參已得者出財之主為首之人擬斬監候為從繫旗人枷三月鞭一百牲畜等物入官民不論奉天内地皆枷三月責四十板妻子牲畜等物入官奴僕偷採人參其主知情者繫官革職旗人枷兩月鞭一百民枷兩月責四十板不知情不坐本犯枷三月旗人鞭一百民責四十板未得參者出財之主並為首之人繫旗人枷三月鞭一百民不分奉天内地皆枷三月責四十板妻子一并入官為從之人枷兩月旗人鞭一百民責四十板其藉稱採取官參多帶人數在界外偷採者為首之人照例處死其餘照為從例治罪若採取蜂蜜松子之人在自己界内山上偷採人參者率去之領催頭目各枷兩月鞭一百餘各枷一月鞭一百人參入官至盛京所屬看墳及居住之人有偷採人參者将縱放之屯領催枷一月鞭一百失察者鞭一百各旗佐領下人有偷採人參者将縱放之佐領驍騎校革職領催革退枷一月鞭一百失察者佐領驍騎校罰俸一年領催鞭一百府屬佐領下人有偷採人參者将縱放之府屬佐領驍騎校領催皆照旗下例處分無品級管領領催各枷一月鞭一百失察者将領催鞭一百府屬管領鞭八十民人有偷採人參者将縱容之百家長責四十板十家長枷一月責四十板失察者十家長責四十板百家長責三十板外藩王公主等所屬之人有偷採人參者交理藩院議處凡拏獲偷採人參皆交户部變價一半入官一半給賞拏獲之人其廵察官兵見踪不追徇情縱放者官革職領催革退枷一月鞭一百驍騎鞭一百門尉筆帖式皆革職枷一月鞭一百其山海闗等邊門不加盤察縱放偷帶人參入闗者直日守尉都司驍騎校等皆革職領催革退枷一月鞭一百驍騎鞭一百其私買參賣參者各枷一月鞭一百十九年議準凡違禁偷採人參仍照康熙十五年定例治罪為從之人各枷兩月繫旗人鞭一百民責四十板其邉外居住山海衛所屬兵民及盛京直隸山東沿海處所有偷載人參貿易者照偷採人參例治罪二十年議準山海衛所屬城堡民兵偷採人參者亦照康熙十五年定例治罪又題準寧古塔烏喇人在禁河内採捕蛤蜊及採蜂蜜水獺人偷採東珠者照偷採人參例為首者擬絞監候為從者枷兩月鞭一百二十一年議準凡採取官參之人各給印票上三旗人用户部内務府印信下五旗人用户部印信該管主編號給票以便稽察如無信票私自行走或有信票越界行走並不照票内定數多帶人畜者廵察官兵即拿送部治罪徇情縱放者官革職領催枷一月鞭一百驍騎鞭一百若得財縱放及将人參隠匿入已不全送官者官革職兵丁串通者一并交刑部計贓照律治罪有能出首者財物一半給賞一半入官官員一年内拏獲百名以上者紀錄一次二百名以上者紀錄二次三百名以上者紀錄三次四百名以上者凖加一級多者按數議叙拏獲馬匹一半入官一半給賞拏獲之人人參盡行入官如誣告無辜之人官革職兵丁枷兩月鞭一百如拏獲之人揑情控告審虛者照誣告重律治罪若毁壊盛京鳯凰城等處邊柵私自出入官員領催兵丁守闗門門尉筆帖式不察拏及通同受賄者照廵察官兵例治罪二十三年議準凡民人在口外居住者不論有無產業悉令移進口内如有違禁在村莊潛住及避居山谷中捕牲者令屯領催村莊頭拏交守口官轉解刑部治罪其喜峯口古北口外附近地方有别處人來捕牲或在山谷中搭窩鋪捕牲者交管驛官長人等察拏呼搭哈山谷中有指稱淘金聚集匪人者交與鷹手並喀爾沁王察拏波羅城附近村莊有匪人潛住者交與巴林翁牛特之各主驅逐不聽驅逐者亦行拘拏此等拏獲之人皆交送守口官轉解刑部從重治罪如守口官推諉遲延日期所拏之人竟解刑部将守口官從重議處至内府走山之人並鷹手及採取木料之人悉照捕牲人例皆令於户部起票伐樹燒炭之人令於工部起票其口外有地之人雇覓内地人民種地者亦令向户部起票方許出口若口外無票行走之人令所在地方察拏八旗口外居住莊頭人等到别旗村口捕牲或在山谷中搭窩舖捕牲所在之人不行察拏或被旁人出首或被廵察人等拏獲將失察之人交守口官一並解送刑部從重治罪莊頭革去交其主更換如不更換一並治罪其屯領催莊頭及驛站頭領人役將應察拏之人不拏或互相推諉不與協拏者事發皆聽刑部從重治罪若巴林翁牛特之莊頭等将無票之人隱匿不逐又不察拏被人首發者莊頭交理藩院治罪雅圖溝黑山度山流河口波羅城等處地方有在彼處存住窩藏無票匪人者皆交附近居民察拏若有詐稱伐樹燒炭起票轉賣及匪人私買假票潛藏居住並違禁放鳥槍行走者皆從重治罪二十五年定偷刨人參之人著提解來京審擬具奏二十八年定偷刨人參之人其馬匹帳房等物著給與拏獲兵丁三十三年定偷刨人參之人事發将所出邊口防守官員一並治罪四十年議準刨參之人拏獲後如有将無干人讐報者不論旗民皆枷責仍照為從例分别發遣雍正二年議準山海闗等關口除搜獲參鬚參末細小歪斜珠子及分兩無多者無庸給賞外如有搜獲人參至二十斤珠子至四兩者該管官紀錄一次廵察人等共賞銀二十兩搜獲人參至四十斤珠子至八兩者該管官紀錄二次廵察人等共賞銀四十兩搜獲人參至六十斤珠子至十二兩者該管官紀錄三次廵察人等共賞銀六十兩搜獲人參至八十斤珠子至十六兩者該管官加一級廵察人等共賞銀八十兩再有多獲者照數遞加賞給由户部給發至東珠有大小不同有光無光之分難以懸定如有拏獲者臨時酌量給賞倘搜察不力致私帶人參珠子至闗者該管官照失察律降三級調用廵察人等照不應重律杖八十眀知故縱者該管官革職廵察人等杖一百枷一月受賄賣放者計贓以枉法論從重治罪其廵察踪跡官員兵丁應行賞給治罪之處仍照舊例行又定偷採人參出財之主並為首之人其一人所放之人至百名以上所收之參至五百兩以上者仍照舊例擬絞監候人不滿百名參不滿五百兩者出財之主並為首之人枷三月鞭一百為從之人枷兩月鞭一百或一二人刨參所得不至十兩者交與盛京刑部旗人鞭一百民責四十板遞囘原籍九年奏準偷採人參財主及為首之人所放人至百名以上所收參至五百兩以上者仍照例擬絞監候人不滿百名參不滿五百兩者杖一百流三千里乾隆三年議準偷刨人參人不滿百名參不滿五百兩者首犯既經減流為從應再減一等杖一百徒三年旗人及奉天民照例枷責發落仍分别刺字牲畜等物給拏獲人充賞人參入官奴僕有犯其主知而遣去者杖八十知而詐供不知者杖一百繫官交部議處不知者不坐若未得參者財主及為首之人繫旗人枷兩月鞭一百盛京及内地民人皆枷一月杖一百並參送户部入官為從枷一月杖一百若一二人刨參所得參不至十兩交與盛京刑部繫旗人鞭一百民杖一百仍照例刺字如一二人刨參未得者減二等旗人鞭八十民杖八十皆遞囘原籍免刺又奏準拏獲販參之犯所販參至五百兩以上者擬流不滿五百兩者擬徒不滿十兩者杖九十皆免刺字七年議準旗人度越禁約處所偷採人參所放人自一二名至十名所收參自一二兩至十兩杖六十徒一年人以十名遞加參以五十兩遞加分别擬以徒流人加至八十名參加至三百五十兩以上仍擬滿流其並無財主舖頭一時烏合各出資本參繫自得者人自十名至三十名參自十兩至不滿百兩為首比財主舖頭各減一等人至三十名以上參至百兩以上為首照財主舖頭定擬為從各減一等未得參各減二等皆免刺仍分别旗民照例枷責發落外省流民無論人數參數已得未得皆照例遞囘原籍倘有人多參少參多人少者各從其少者治罪九年議準額爾敏哈爾敏地方産參甚少刨夫人等偷越封禁山林有闗長白山風水不便開採令嚴行封禁十四年議準領票刨參人夫例給鳥槍應察眀人數多寡批給鳥槍填眀票内出口驗放囘山稽察違例私帶者照商民應用鳥槍不報官私造例杖一百其將鳥槍轉給售賣偷刨之人比照軍人将軍器私賣與人發邊遠充軍律減一等杖一百徒三年該管官不能察出交部議處鼓鑄一鼓鑄局錢順治元年置工部寶源局鼓鑄京錢康熙二十三年議準寶源局每月分二卯鼓鑄每卯鑄銅五萬斤每鑄錢萬串支給匠工物料錢二千二百串有奇四十三年議準每卯鑄銅六萬斤五十四年議準寶源局每年鑄錢定限三十六卯每卯需銅三萬六千斤鉛二萬四千斤雍正元年議準寶源局加鑄錢四卯四年奏準寶源局照寶泉局於舊例四十卯外加鑄一卯六年奏準觧部潮銅覈定成色減價報銷其錢按照估定成色分别搭配如九成銅以銅六鉛四配鑄每百斤加銅二十斤九五銅以銅五五鉛四五配鑄每百斤加銅十斤乾隆元年奏準鑄錢之法以八成至十成配為五等如銅繫十成者以銅鉛各半九五者以銅五五鉛四五九成者以銅六鉛四八五者以銅六五鉛三五八成者以銅七鉛三搭配鼓鑄四年奏準寶源局鑄錢每年應給工料錢四萬串有奇嗣後每串折銀一兩於正四七十等月由户部按季於扣存兵餉銀内頒發監督按數按名分給五年議準改鑄青錢其銅鉛㸃錫照數配合則銅錫正當較準未便仍照黄錢舊例應将各省辦觧色銅總以十成覈算除淨銅按銅鉛百斤内用紅銅五十斤白鉛四十一斤八兩黑鉛六斤八兩㸃銅錫二斤配鑄外九五銅向繫銅每百斤加銅十斤今加五斤九成銅向加二十斤今加十斤八五八成皆照此遞行覈給其加給銅即於本銅内動給亦繫色銅自宜詳細覈算每五斤應加銅各四兩去鉛四両則合配均匀與改鑄數目畫一較之從前配數尚有節省嗣後觧部銅九成以上者照定例寛裕折算應作九五即以所加之耗銅八斤加給五斤合作十成其加給之銅每五斤仍加銅四兩去鉛四兩給發鼓鑄每百斤應節省二斤十二兩寶源局見存庫銅二十四萬九千三百餘斤内除十成銅外其九五九成八五八成可節省銅七千餘斤歸入正項增鑄再雲南觧京銅五百七十餘萬斤内交寶源局一百九十餘萬斤以每百斤節省二斤十二兩覈算約節省銅五萬餘斤年終将節省確數入於新收項下搭配鼓鑄使青錢不致高下攙雜六年奏準将雲南應觧寶源局加運銅五十六萬八千餘斤加鑄二十卯得錢十有一萬三千餘串又奏準寶源局工價仍令鑪頭領錢照市價易銀給發匠人十年議準寶泉局乾隆十年額鑄錢六十九萬餘串繫畱放兵餉之用寶源局額鑄錢三十四萬五千餘串除各工應用錢六萬串餘錢二十八萬五千四百餘串為數無多請将寶源寶泉二局於本年額鑄外帶鑄五卯加鑄二十二卯共可得錢四十五萬八千六百三十串有奇流通民間以平錢價十六年奏準寶源局嵗收雲南銅二百有五萬餘斤除每年額鑄六十一卯用銅一百六十九萬餘斤存銅三十五萬餘斤黑白鉛錫亦有餘剩見在庫存銅錫鉛等項本年額鑄之外約共存二百七十餘萬斤應請照户部例每年加鑄十卯需用銅二十七萬七千餘斤白鉛十有九萬二千餘斤黑鉛三萬三千餘斤錫一萬餘斤每年可得淨錢五萬六千六百餘串以利民用一管理鼓鑄順治初年設滿漢監督官三人専司出納十七年題準差滿漢司官各一人筆帖式一人一年更代康熙十五年題準不論滿漢止差司官一人筆帖式一人二十七年覆準仍差滿漢司官各一人筆帖式一人一年更代四十四年題準寶源局監督由部保舉滿漢才能司官引見補用三年更代五十三年覆準嗣後錢法率以正月為始年終為止次年五月奏銷不計閠滿漢監督於奏銷後更換銅不交完責在商人卯不足數責在監督或商人限内交銅甚少逾限始觧足者卯數不足咎不在監督統於奏銷疏内聲眀完欠照各省州縣徵收正項錢糧未完分數之例交吏部議處其監督有升遷事故離任者接任官以六月為準不足六月再接一年多於六月者即於奏銷後報滿更代雍正元年題準滿漢監督仍一年更代七年奏準寶源局僅有筆帖式一人局吏數人管理局事並未設有大使應照寶泉局例設立大使二人於本部筆帖式内簡選補授乾隆十一年奏準寶源局大使請照刑部司獄定例年滿囘部在額外筆帖式上行走遇有本部及各該旗筆帖式員闕照例移咨吏部陸續坐補嗣後補用大使之筆帖式員闕亦毋庸别選竢五年期滿後仍囘原任候升十二年奏準寶泉寶源兩局大概畫一惟寶源局尚未給有印信不免互異請鑄給工部督理京省錢法字様闗防以専責成又奏準寶泉寶源二局監督嗣後每年新舊滿漢互相更代一出錢順治初年定寶源局鼓鑄制錢按卯報部運赴節慎庫驗收以備給發各工之用雍正元年議準户部給發兵餉每月約放銀三十四五萬兩不等銀八錢二搭放每次約需錢七萬串每年兩月搭放一次共需錢四十二萬串有奇除寶泉局嵗鑄交庫錢四十萬五千一百六十八串盡數搭放尚少制錢一萬五千餘串應将寶源局給發工匠餘剩制錢每年咨取二萬串增放兵餉户部二八月對搭制錢放餉之例改為每兩月銀八錢二搭放一次又奏準部存額定銅鉛即著寶源局如數鑄錢可得二十一萬一百九十餘串除留給匠役工價一萬一百九十串餘錢二十萬串移送户部為每年春秋二季給發兵餉之用四年議準本部每年留錢萬餘串實不敷用嗣後每年二八月只交户部二萬串配給兵餉其餘仍留工部支用五年議準寶源局嵗鑄錢二十餘萬串計應支工價每年存留十萬串以備各工取用若本年有餘剩之錢留足次年十萬串之數其餘全交户部搭放兵餉倘遇大工需錢至十萬串不能足用者别行奏請十二年議準從前鼓鑄制錢重一錢四分寶泉局每卯用銅鉛十有二萬斤得錢一萬二千四百八十串寶源局每卯用銅鉛六萬斤得錢六千二百四十串今制錢改鑄一錢二分每卯兩局共節省銅鉛二萬五千七百十有四斤有奇其