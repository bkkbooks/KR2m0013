其自張灣轉運已攜法馬赴部後有雲南銅陸續觧到無憑較準稱收應照依原頒法馬别鑄一副頒發應用五年議準京局改鑄青錢應需黑鉛五十萬斤令貴州總督於柞子等厰收買分觧兩局每年減辦白鉛五十六萬斤至㸃銅錫十有五萬斤令廣東廵撫辦觧十年題準廣東採買洋錫應觧寶源局七萬五百七十一斤每百斤給銀十有三兩五錢買運供鑄十四年題準貴州黑鉛出産稀少應改歸湖南辦觧每年額運寶源局鉛十有一萬六千七百六十一斤十有三兩有奇仍分上下兩運觧京欽定大清㑹典則例卷一百二十九
