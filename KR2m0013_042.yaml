body:
  text: 户部倉庾一京師十有三倉禄米倉五十七厫南新倉七十六厫舊太倉八十九厫富新倉六十四厫興平倉八十一厫均在朝陽門内海運倉百厫北新倉八十五厫在東直門内太平倉八十六厫在朝陽門外均建國初本裕倉三十厫在徳勝門外清河康熙四十五年建萬安倉九十三厫在朝陽門外雍正元年建儲濟倉百有八厫裕豐倉六十三厫在東便門外雍正六年建豐益倉三十厫在徳勝門外安河橋雍正七年建大通橋號房四十八間朝陽門號房五十八間舊設大通橋號房六十四間朝陽門號房二十八間雍正五年朝陽門增建十四間又移大通橋河東十六間於朝陽門通州二倉西倉二百厫在新城中倉一百十有九厫在舊城南門内均一國初建舊有南倉八十厫乾隆十八年奏裁通州石壩號房百有六間舊設六十八間被燬十二間雍正五年動支通濟庫銀增建五十間土壩號房二十五間舊城南門外號房十間新城南門外號房二十五間康熙五十四年覆準凡修造倉厫照一應修建例三年内如有坍塌滲漏木料損壞著落原監造官賠修雍正三年奏準通倉向有席片鋪墊例無板木京倉以板木鋪墊十年一換應將京倉木板展限至十六年一換所餘木板鋪墊通倉四年題準京倉舊例每厫用松板五十塊楞木五根給鋸板工價銀八兩四錢嗣後每厫滿鋪用松板百有十塊並將松板鋸一為四以代楞木應用松板五十二塊鋸板工價每厫準給銀十二兩九錢三分七釐十二年覆準建造京倉看倉旗員兵丁等房舖共四十一處定限三年保固並令倉場侍郎随時察驗修補各倉置造木斛每張例給工料價直銀七錢限三年一造乾隆六年奏準各倉厫鋪墊板木定例十六年一換今皆屬堅固整齊毋庸拘定十六年之限統竢每季放空之後察有朽壞者動用每年所收板木随時修理每厫抽換數片至數十片不等其工價照滿鋪之例覈算於輕齎項内給發又奏準倉中竹席板木向繋收貯各倉空厫今積貯充實並無空厫收貯應於倉厫相間之處依兩邊厫牆下用柱脚上加檩椽蓋瓦前檐砌牆後檐用牐板每倉修蓋三五處以資收貯七年奏準各倉厫上設氣樓牕槅每致鳥雀出入傷耗糧米嗣後均用竹篾編成隔孔釘於牕牖之上又奏準京城内外各倉有安設博縫者惟富新等倉向未安設照式加增八年奏準各倉厫抽換板片例應工部委官察驗覈銷每因新糧到通需厫貯米不及候驗嗣後抽換厫板新糧未到之先及糧務完竣之後仍咨工部委官察驗如遇新糧到通之時由倉場侍郎委官就近察驗咨部覈銷一總督倉場戸部右侍郎順治十五年定滿漢各一人駐劄通州新城總理京通各倉糧務其漕運總督各該督撫及沿河文武衙門凡漕運文册應報倉場者均照報部體式應舉劾者照例舉劾各項應行事宜倉場造册報部察覈又覆準每年春間出巡閱看牐河㸃驗石土兩壩經紀車戸駮船督令坐糧㕔催置布袋以備新糧到壩起運又覆準漕白糧船抵天津督率沿河文武官弁往来催運並察驗北河淺阻令坐糧㕔督夫疏濬深通毋致糧艘阻滯又議準重運糧船到通督令坐糧㕔起卸過壩騰空漕船頒給限單催令囘空又覆準各倉收糧完竣分晰各幫完欠數目造册具題交部察覈又覆準輕齎由牐等銀倉場侍郎督催各省糧道按年越漕先解嵗終將收放銀數造册題銷各省未經解完者將巡撫糧道題叅仍催補解康熙二年題準倉場督收各省漕糧除帶運米不算外其扣收餘米抵欠算入正運數内總作十分考覈未完五釐以上至一分者罰俸一年三年連欠五釐以上至一分者降一級督催雍正三年覆準漕白糧船抵通日期及起過糧數囘空船數並石壩外河水勢深淺五日一次具奏七年題準漕白二糧及通濟庫錢糧奏銷向未定有限期酌定於次年五月内造册具題一坐糧㕔滿漢各一人管理北河濬淺修築隄岸牐壩催趲漕船抵壩囘空督令經紀車戸轉運交倉兼管通濟庫銀出納及抽收通州税課事務由各部院簡𨕖賢能科道司官送部引見差委二年更代所屬通濟庫大使一人通流慶豐牐官各一人經管石壩軍糧經紀百名白糧經紀二十五名土壩車戸二十名舊設五十名康熙二十五年裁二十五名雍正十二年又裁五名普濟牐平下牐軍糧水脚各二十六名平上牐慶豐牐各十有三名白糧水脚每牐二名舊設石土二壩外河船戸三十五名康熙二十九年裁并白糧經紀土壩車戸又有石壩裏河水脚二十六名雍正五年裁歸漕糧經紀各役十年踐更由通州知州𨕖殷實良民承充不許旗人充役並不許父子兄弟同充康熙二年題準坐糧㕔經管漕糧除帶運米不算外其扣收餘米抵欠算入正運數内總作十分考覈未完六釐以上不及一分者罰俸六月一分以上不及二分者罰俸一年一大通橋監督滿漢各一人管理石壩運到漕白二糧抽驗斛面督催車戸分運京倉兼收随糧松板經管軍糧車戸三十二名水脚十有三名舊設軍糧車戸二十八名白糧車戸十三名水脚二名雍正十年裁白糧車戸水脚增軍糧車戸四名歸并著役一各倉監督除豐益倉由内務府委官管理外在京十二倉通州二倉每倉設滿漢監督各一人管理漕白二糧交納上倉及收貯支放等事祿米倉看倉旗員五人兵七十名經制吏二名攢典二名皂隸五名花戸二十九名小甲二名南新倉看倉旗員四人兵四十名經制吏二名攢典二名皂隸四名舖軍三名花戸二十六名小甲二名舊太倉看倉旗員六人兵四十名經制吏二名攢典二名皂隸六名舖軍二名花戸二十四名小甲二名海運倉看倉旗員二人兵四十名經制吏二名攢典二名皂隸六名舖軍二名花戸二十五名小甲二名北新倉看倉旗員二人兵四十名經制吏二名攢典二名皂隸六名舖軍二名花戸二十六名小甲二名富新倉看倉旗員四人兵四十名經制吏二名攢典二名皂隸七名舖軍二名花戸十有八名小甲二名興平倉看倉旗員四人兵四十名經制吏二名攢典二名皂隸六名舖軍二名花戸二十四名小甲二名太平倉看倉旗員四人兵四十九名經制吏二名攢典二名皂隸四名花戸二十八名小甲二名萬安倉看倉旗員四人兵三十九名經制吏二名攢典二名皂隸六名花戸二十四名小甲四名本裕倉看倉旗員四人兵六十名經制吏二名攢典二名皂隸四名舖軍花戸小甲均以在京八倉各役輪流承直裕豐倉看倉旗員二人兵四十名經制吏二名攢典二名皂隸六名舖軍二名花戸二十四名小甲二名儲濟倉看倉旗員四人兵七十名經制吏二名攢典二名皂隸六名舖軍二名花戸三十名小甲二名豐益倉監督繫内務府委官管理書攢四名貼寫二名皂隸四名舖軍二名花戸二十六名小甲二名看白二名通州西倉看倉旗員二人兵百名經制吏三名攢典三名舖軍二名花戸十有八名甲斗二十四名舍人十有八名中倉看倉旗員二人兵七十名經制吏二名攢典五名舍人九名舖軍一名花戸九名甲斗十有二名順治元年定通倉監督一年更代十八年定兩翼滿漢監督一年更代康熙三年題準京通各倉監督二年更代六年議準各倉均令三年更代乾隆元年覆準大通橋及京通各倉滿漢監督向繫任滿之時行各部院保送引見補授未免有需時日恐致貽誤倉務嗣後豫行内閣簡送滿漢官各二人吏禮兵工四部大理寺滿漢官各一人戸刑二部滿官各二人漢官各三人宗人府理藩院國子監太常寺太僕寺鴻臚寺滿官各一人光禄寺滿漢官各一人中書科漢官一人送部引見候㫖記名注册遇有員闕掣籤補授又覆準大通橋監督員闕令倉場總督於各倉監督内簡𨕖引見調補又覆準京通各倉監督任滿之期向例一年二年三年不等嗣後均以二年為滿滿漢一年一人更代如二年内有俸滿應升者照常升轉仍竢差滿更代又覆準各倉監督差滿向例按贏餘米多寡議叙應行停止如二年之内出入公平糧儲無虧倉厫不致滲漏米色不致霉變任滿時倉場侍郎即保題議敘加級如有虧空題叅議處又覆準京通各倉額設滿漢監督各一人每逢收支糧米之時不能兼事稽察嗣後收支之時由倉場移咨戸部於記名候補監督人員内撥赴倉場分委各倉監看並不時檄委收支事竣仍囘本衙門辦事四年議準各倉花户經管啓閉倉厫收支糧米出入量兌非誠實良民充役難免需索竊盜之虞且恐積年占據習久弊生應限五年役滿别擇土著良民充補取具里鄰甘結及聨名互結報倉場咨部存案十七年奏準各倉監督二年一換未免太促應改為三年更代一内倉監督本部滿司官二人司其出納之事每年糧船到通由總督倉場侍郎撥運漕白二糧進倉又直隸布政使司嵗解芝麻屯豆由部交倉供支内務府太常寺光禄寺理藩院會同四譯館白糧欽天監太醫院宗學旗學内監等秔米並内務府油房芝麻賓館牧馬黑豆專隸本部不屬倉場設經制吏一名皂隸四名斗級十名順治初年定專委本部廣西司滿漢司官經管康熙三十二年題準在於應除小差之滿洲䝉古漢軍年久司官内挨次除用一人管理任滿照京通各倉之例新舊交代考覈雍正元年奉㫖内倉監督於戸都滿司官内委用二人十一年覆準内倉滿監督二人向繫二年更代若一時並更接任之人恐未諳練嗣後内倉監督錯綜更代以慎倉儲一稽察倉儲雍正五年諭在京各倉每倉或都統或副都統各一人御史中不論滿漢每倉各委一人專任稽察之責其支放奏銷等事不必經管惟倉房滲漏牆垣損壊與倉内鋪墊及匪類盜竊各弊察出即行文倉場侍郎知之若倉場侍郎等遲延不及時辦理妥協即據實奏聞倘不能察出弊端以致虧損倉糧著落稽察之都統副都統御史與倉場監督等官分賠其通州三倉即照此例交與通永道通州副將稽察其失察分賠之例亦與京倉同欽此五年覆準各倉積弊每於收米發米之時胥役串通家人少進多出監督失於覺察漸成虧空嗣後如虧空發覺將胥役照侵盜錢糧例比監督減一等治罪其虧空之米著落監督賠六分書攢賠二分頭役花户合賠二分照例勒限一年全完限内不完著地方官將家産變賠十二年奉㫖巡倉都統御史定為三年一次更代乾隆元年奏準向例各倉監督三年差滿題請欽㸃王公大臣會同倉場逐厫察驗今監督差滿定以二年錯綜更代若陸續奏請察驗不免紛繁應限以四年奏請察驗一次三年奏準各倉存貯糧米向例以算法二五覈算每多錯誤嗣後以積方之法酌定二年以内見方一尺照三斗一升六合之法三年以外者每見方一尺照三斗四升之法其二年以外三年以内者每見方一尺照三斗二升八合之法丈算鑄造鐵尺分交户部倉場並各倉嗣後均照此尺丈量折算如違叅究十六年奏準新漕進倉若厫門全不上板直至深秋始行封閉恐生弊端應令收一厫即封一厫如恐米質蒸變應於厫門上檐空出厫板四五尺宣通蒸氣以下所上厫板即行加封以防弊端統竢深秋風髙物燥之時即全行上板封閉嚴密至收貯封閉日期仍令各倉呈報稽察之都統御史察覈十七年諭巡視通州漕務向例止差科道一人專司催督漕運而倉場事務則槩不與聞但通倉積弊甚多見委大臣盤驗著增差科道四人前往巡視漕務凡收兌新漕支發倉米皆著就近稽察至在京各倉雖經委有專員亦著一同留心稽察務期諸弊肅清以副委任欽此又奏準京倉向以都統一人御史一人專司稽察但都統因有旗務不能親身赴倉多繫委官代理御史間日一至亦不能每日赴倉稽察未為周宻嗣後除都統直班御史在城理訟日期外酌量輪流到倉稽察如或疎畧令巡