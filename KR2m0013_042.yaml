速報倉場存案仍封貯米樣上鈐印信隨船呈驗倘有虧折短少不得在通買補照漕糧例於次年搭運交倉又奏準京城各局厰領運京倉米每石給脚價制錢三十五文本裕倉每石給制錢七十文通州二厰領運通倉米每石給制錢二十文解錢車價每串四文十一年奏準各倉變色米按成估報酌減糶賣又奏準五城領運通倉米每石定脚價七分其米錢解運部庫及一應席片紙張等費每糶米萬石準銷銀三十兩乾隆二年奉㫖撥米五城各厰平糶又奏準於近京東西南北四鄉增設八厰撥米平糶以濟民食每厰書吏二名斗級八名夫役四名令地方官撥給工食每官從役三名共給銀五錢夫役每名日給銀六分書吏每名日給銀八分以為日用之費各倉運米到厰令倉場及順天府撥車運送發糶米每石準折耗二升糶價銀錢兼收十日一次解部三年奉㫖八旗牧養馬駝黒豆在所必需今户部因倉貯豆少請每月減半支放朕念兵丁等若自行增買不免多費且在京收買恐市價益復髙昻今年山東河南二省收成尚好應於山東採買五萬石河南採買三萬石共八萬石足敷支放之用著該部行文山東河南二省巡撫酌量地方情形動支正項錢糧分令各州縣採買嚴禁短價病民及胥役侵蝕等弊務湏於河凍之先委官運送抵通勿致有誤臘月以後支放之用其豆價並脚價等項仍造册報部覈銷欽此六年奏準各倉發糶氣頭厫底米向繫各監督直檄五城領糶並不移會御史嗣後令各倉監督將米數移會五城御史酌委司坊官領糶又奏準五城十厰並通州糶賣各倉氣頭厫底米定例每月之一日六日投批逢月之五日十日交錢嗣後每厰頒發循環簿二本令其逐日登填糶賣米數錢數並實存米數按月送部換給仍以一六投批五十交錢無論多寡盡數交納倉場侍郎於部檄發糶文到之日就各厰近地將倉米按十一分均分令各厰領糶如一倉米多即分兩厰米少一厰并領二倉本裕倉米酌令北城領糶通州米除通厰支領外匀給東南二城七年題準五城糶米錢年終報銷務以十二月三十日為止截定數目造報庶免舛錯察覈亦易清楚再次年開印日起定限兩月彚齊送部如有遲延照例叅處八年題準古北喜峯等口如果收成豐稔米多價賤奏明動藩庫銀委官按時採買以四萬七千餘石運交薊遵等倉供應陵寢支放餘均運通收貯其豫東二省應運陵糈之四萬七千餘石仍運通倉備用九年奏準京通各倉每季支領俸米兵餉均有氣頭厫底向例随報随發各城按成減價發糶嗣後每年分作兩次京倉夏秋二季並通倉春季留於十月以後發糶京倉冬春二季通倉秋季留在三四月間發糶十年題準豫省祥符等九縣採買黑豆四萬石運至通倉連運價雜費每石合銀九錢一分二釐三毫由通運京脚費計程四十里每石加車價銀五分二釐統計價費在一兩以内應統限十一月内辦起務於来春三月全數抵通自通運京兌交倉場侍郎代收轉運需用布袋等項就近借撥一京通官役公費倉場滿漢侍郎每年各給銀二千四百兩舊例千四百兩雍正六年加給千兩坐糧㕔滿漢二人每年各給銀二千二百兩舊例千二百兩雍正六年加給千兩又通濟庫餘平分給銀多寡不等均於茶果銀内動支大通橋滿漢監督每年各給銀五百兩倉場衙門筆帖式四人每年共給銀千八百兩雍正元年議準坐糧㕔茶果銀漕白二糧每船納銀十兩小米每船納銀七兩除各幫頭及有事故船不納外按到通船實數交納多寡無定如全漕抵通約收銀六萬餘兩以為各官公費吏役飯食苫蓋黄船疏濬塢河修理牐壩及催漕快船收買各幫交剰餘米豆價等項之用四年奏準各倉茶果銀每米一厫納銀六十兩七分作放米修厫之用三分給吏役以備造册刷卷等費仍令坐糧㕔徵收其不足一厫者按米遞減封貯通濟庫竢驗明各倉放米數目開報倉場照數批給永為定例七年奏準白糧進倉向例每船各項需銀三十五六兩嗣後將各船陋規銀裁減十分之六存四分為雇募倉役之用其漕船抵通每起米一石運軍貼經紀車户制錢二十二文每大米一石經紀貼大通橋各役制錢一文小米二石亦貼制錢一文至漕糧運進京倉每大米一石小米二石大通橋車戸貼倉役亦如之其倉場並坐糧㕔衙門各書役舊有飯銀酌量存留餘悉裁革八年奏準將應存應革各款均勒石昭示以杜額外需索之弊十三年定通濟庫大使一人每年給銀二百兩庫吏一名給工食銀百二十兩庫役四名共給工食銀六十兩均於茶果銀内動支又奏準各倉脚價每領銀百兩向給倉場書吏紙筆飯食銀八兩應行裁革别於茶果銀内按各倉應領脚價數目酌量撥給乾隆三年奏準京通十五倉滿漢監督每年各給銀三百兩於坐糧㕔茶果項下動支又奏準内倉向收白糧茶果銀一千六百餘兩以為監督筆帖式吏役飯食一應雜費之用今白糧議減改進漕糧所收茶果等銀僅六百餘兩不敷支給每年撥給運米口袋萬條聽該倉變價應用九年奏準各省糧船到通應交茶果銀向繫運軍自行交納往往交不足數除山東河南二省糧船不過淮仍照舊交納外其各省皆令糧道於各軍應領耗贈項内每船扣茶果銀十兩封交押運㕔官到通覈算批解坐糧㕔衙門交納如遇中塗截留仍行散給運軍以為起米囘空之費十三年奏準向因内倉應得脚價茶果等銀不敷辦公將每年殘袋準給萬條令其變價以資公用今官袋既停製造應於坐糧㕔茶果銀内照殘袋變銀八百兩之數給發以為辦公之用一直省州縣衞所各設常平倉凡米麥榖豆髙粱咸貯該管官司其出納嵗歉振借平糶年豐出陳易新計一嵗之出入造具奏銷册籍申府司達督撫彚造送部察覈直隸江南福建各設倉大使二人山東五人山西三人江西浙江各一人西安四人廣東八人其餘直省府州縣衞所均有倉無額設大使順治十三年議準積榖振濟務令修葺倉厫印烙倉斛𨕖擇倉書糴糶平價不許别項動支倉榖康熙二十五年題準黑龍江黙爾根地方起造倉厫收貯米榖雍正四年覆準凡地方倉厫有滲漏及牆垣木植不堅全者所需工費無多該地方官即為修補若年久傾圮甎瓦木植破碎朽壊者該地方官即詳明上司委官估計工費報部即動支正項修蓋其有地方厫座無多將倉糧寄貯僧寺道院者或並無寄貯之處將米榖露囤者該地方官即詳請督撫察勘確實將作何建倉之處酌量具題倘州縣官漫不經心因循怠玩不修補倉厫不詳請修蓋以致米穀霉爛者照溺職例革職限一年内照動帑買補之數賠完如限内不完即照侵蝕錢糧例以未完米榖之數依律治罪倉厫既經修造猶有托名霉爛虧空者察出即照侵蝕例治罪六年諭積貯米榖所以備旱澇緩急之需民命攸闗若倉厫不足必有霉爛虧折等弊嗣後著將各府州縣倉厫入於交盤項内新舊交代若有傾圮滲漏及木植朽壞之處著接任官即行揭報不準接受倘有徇情濫受者即繫接任官之責除照例處分外仍令賠修欽此遵㫖議準各府州縣倉厫入於交盤項内交代如有傾圮滲漏著接任官揭報將前任官照例議處賠修如接任官徇情濫受即將接任官議處責令賠修其霉爛虧空米榖著接任官限年賠完若接任官藉端勒索亦即題叅十一年議準喜峯口倉就近歸於遷安縣經管每間貯榖五百四十石計算應建倉厫二十六閒乾隆四年議準興建倉厫準於存公銀内動給照例每間給銀二十兩貯米五百石一直省義倉社倉春則支借秋成還倉設正副社長司其出納每嵗報該管地方官察覈一直省地方水陸通衢設倉以備緩急其所貯米榖或供兵糈或佐常平計出納之數嵗終彚入倉糧奏銷册内申報督撫送部察覈一直省營倉提鎮協駐劄之地及凡屬沿邊沿海及離省遥逺者皆設倉貯榖以備軍士借糶委營弁經理以上均詳見積貯則例欽定大清會典則例卷三十九
