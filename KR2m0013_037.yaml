body:
  text: 户部田賦一一上三旗皇莊園圃詳見內務府一宗室莊田鑲黃旗宗室整莊四所半莊一所園一所共地三十六頃六十畝坐落大興通武清平谷河間各州縣正黃旗宗室整莊五所半莊十二所莊四所園三所共地百有六頃五十六畝坐落涿易二州大興宛平三河寶坻順義房山保定雄任邱各縣正白旗宗室整莊四所莊一所園二所共地三十六頃坐落順天府及通州香河寶坻房山各縣沙河所等處正紅旗宗室整莊百四十五所半莊三所整園五十所半園十所園四所共地千二百四十四頃十有六畝零坐落昌平涿遼陽州及宛平文安保定定興淶水海城蓋平各縣鑲白旗宗室整莊百七十六所半莊五所莊八所整園八所園二十所果地靛地網户獵户等地七十六處共地千七百十有七頃十有四畝零坐落通昌平霸薊遵化灤易滄遼陽等州大興宛平良鄉固安永清東安香河三河武清寶坻密雲懷柔房山玉田平谷豐潤遷安臨榆樂亭保定河間任邱保安海城蓋平鐵嶺各縣鑲紅旗宗室整莊二百九十八所半莊二十三所莊五所整園一百十有一所半園二所共地二千六百三十頃一畝坐落通涿昌平霸灤滄延慶等州大興宛平永清香河寶坻房山新城河間肅寧各縣及張家口外等處正藍旗宗室整莊五百四十四所半莊百五十一所莊二十二所整園百有三所半園十有九所園七十三所果園菜園牧地五處共地五千三百十有三頃二十四畝零坐落通涿昌平霸薊遵化灤易遼陽錦寧逺等州大興宛平良鄉永清東安香河武清順義懷柔房山保定玉田平谷豐潤盧龍昌黎樂亭新城青無極保安承德開原廣寧開平各縣及冷口外等處鑲藍旗宗室整莊二百三十一所半莊六十三所莊九所整園百有二所半園二所園三所共地二千二百五十四頃七十四畝零坐落昌平灤安遼陽錦等州大興宛平固安永清東安懷柔蠡髙陽海城蓋平開平各縣順治元年諭户部我朝定都燕京期於久逺凡近京各州縣無主荒田及前明皇親駙馬公侯伯內監歿於寇亂者無主莊田甚多爾部清釐如本主尚存及有子弟存者量口給與其餘盡分給東來諸王勳臣兵丁人等蓋非利其土地良以東來諸王勳臣兵丁人等無處安置故不得已而取之可令各府州縣鄉村滿漢分居各理疆界以杜異日爭端今年從東先來諸王各官兵丁及見來在京各部院官著先撥給田園其後至者再酌量撥給欽此又定諸王貝勒貝子公等凖於錦州各設莊一所蓋州各設莊一所其額外各莊均令退出二年題凖給諸王貝勒貝子公等大莊每所地四百二十畝至七百二十畝不等半莊每所地二百四十畝至三百六十畝不等園每所地六十畝至百二十畝不等又題凖分給園地內務府總管四十八畝親王府管領三十六畝郡王以下府管領三十畝各官執事人員皆給地有差又題凖王以下各官所屬壯丁計口給地三十六畝停支口糧五年題凖親王給園十所郡王七所每所地百八十畝六年題凖襲封王貝勒貝子公等祖父所遺園地除撥給應得之數外餘地不必徹出仍留本家又題凖凡加封王貝勒貝子公等各照本爵撥給園地七年題凖給公主園地三百六十畝郡主百八十畝縣主郡君縣君各百五十畝又題凖撥給親王園八所郡王五所貝勒四所貝子三所公二所每所地百八十畝嗣後凡初封王貝勒貝子公等皆照此例撥給鎮國將軍園地二百四十畝輔國將軍百八十畝奉國將軍百二十畝奉恩將軍六十畝一畿輔官兵莊田鑲黃旗滿洲初次給地萬一千六百三十一頃六十畝二次給地二千五百三十八頃九十畝三次給地千三百十有三頃十畝蒙古初次給地千七百九十四頃三十畝二次給地千七百頃有十畝三次給地四百十有三頃七十畝漢軍初次給地二千頃有四十畝二次給地千一百八十八頃三十畝三次給地一千五十三頃共壯丁地二萬三千六百三十三頃四十畝坐落通涿昌平霸薊遵化灤安易等州大興宛平良鄉固安永清東安香河三河武清寶坻順義密雲懷柔房山文安大成保定玉田平谷豐潤盧龍遷安昌黎樂亭清苑滿城安肅定興新城唐容城完蠡雄髙陽新安淶水河間肅寧任邱交河青南皮獲鹿赤城宣化各縣永寧衛良牧署采育里開平沙河驛德州古北口冷口張家口喜峯口羅文峪獨石口石匣等處正黃旗滿洲初次給地四千四百六頃四十畝二次給地九千一百七十四頃九十畝三次給地千八百七十三頃八十畝蒙古初次給地七百五十六頃九十畝二次給地千一百二十七頃十畝三次給地千八百八十四頃六十畝漢軍初次給地千二百七十四頃二十五畝二次給地千八百七十八頃七十五畝三次給地千一百六十七頃十有五畝共壯丁地二萬三千五百四十三頃八十五畝坐落通涿昌平霸薊遵化灤安易滄等州大興宛平良鄉固安永清東安香河三河武清寶坻順義密雲懷柔房山文安保定玉田平谷豐潤盧龍遷安樂亭清苑滿城安肅定興新城唐望都容城完蠡雄髙陽新安淶水河間肅寧任邱交河青南皮獲鹿開平赤城宣化各縣古北口冷口張家口獨石口石匣等處正白旗滿洲初次給地五千七百二十七頃三十畝二次給地三千三百二十六頃七十畝三次給地四千三百三十四頃十畝蒙古初次給地千二百九十三頃七十五畝二次給地千二百四十七頃五十五畝三次給地千九十四頃五十八畝漢軍初次給地八百六十七頃六十畝二次給地千四百六十五頃二十畝三次給地千四百三十九頃七十畝共壯丁地二萬七百九十六頃四十八畝坐落通涿昌平霸薊遵化灤安易滄等州大興宛平良鄉固安永清東安香河三河武清寶坻順義密雲懷柔房山文安保定玉田平谷豐潤盧龍遷安撫寧昌黎樂亭安肅定興新城容城完雄髙陽淶水河間肅寧任邱交河青南皮宣化各縣羅文峪張家口獨石口古北口等處正紅旗滿洲初次給地二千一百二十九頃八十八畝二次給地五千三百十頃八十四畝零三次給地二千一百二十頃七十畝蒙古初次給地二百三十五頃六十八畝零二次給地七百六十五頃六十畝三次給地五百五十五頃三十畝漢軍初次給地二百七十八頃十畝二次給地六百四十頃八十畝三次給地三百七十頃二十畝共壯丁地萬二千四百七頃十畝坐落通霸昌平灤等州宛平良鄉固安永清東安武清寶坻順義密雲房山文安保定樂亭清苑安肅定興蠡雄任邱各縣河西務等處鑲白旗滿洲初次給地六千二百六十八頃五十畝二次給地二千六百七十四頃二十畝三次給地二千二百九十頃二十畝蒙古初次給地千十有四頃三十畝二次給地千八百六十一頃九十畝三次給地九百五十六頃十畝漢軍初次給地六百有九頃二次給地三百有三頃三十畝三次給地四百六十六頃八十畝共壯丁地萬五千四百四十四頃三十畝坐落通涿昌平霸薊遵化灤易滄延慶等州大興宛平良鄉固安永清東安香河三河武清寶坻順義密雲懷柔房山文安大城保定玉田平谷豐潤盧龍遷安樂亭滿城安肅定興新城容城雄新安淶水河間肅寧任邱交河青靜海南皮赤城各縣良牧署開平沙河驛張家口喜峯口冷口羅文峪等處鑲紅旗滿洲初次給地千一百頃七十畝二次給地五千七百八十七頃十有五畝三次給地二千六百十有二頃二十五畝蒙古初次給地三十五頃四十畝二次給地千三百四十五頃五十畝三次給地六百四十三頃二十畝漢軍初次給地三百七頃八十畝二次給地六百三十頃三次給地五百九十三頃七十畝共壯丁地萬三千五十五頃七十畝坐落通涿昌平霸灤滄延慶等州宛平良鄉固安永清東安香河三河武清寶坻順義房山大城保定豐潤盧龍遷安樂亭清苑安肅定興新城唐望都完蠡雄淶水河間肅寧任邱天津各縣河西務等處正藍旗滿洲初次給地六千一百九十八頃七十五畝二次給地三千九百九十二頃七十畝三次給地二千二百七十九頃四十畝蒙古初次給地千二百三頃二次給地七百二十三頃九十畝三次給地七百十有一頃六十畝漢軍初次給地八百八十三頃九十五畝二次給地七百三十二頃九十畝三次給地四百十頃四十畝共壯丁地萬七千一百三十六頃六十畝坐落通涿昌平霸薊遵化灤易延慶等州大興宛平良鄉固安永清東安香河三河武清寶坻順義密雲懷柔房山保定玉田平谷豐潤遷安昌黎清苑滿城安肅定興唐容城雄髙陽新安任邱青南皮各縣良牧署等處鑲藍旗滿洲初次給地六千五百有二頃八十畝二次給地二千三百四十頃九十畝三次給地千四百六十頃四十畝蒙古初次給地千五百四十八頃三十畝二次給地二百四十頃七十八畝三次給地三百二十二頃二十畝漢軍初次給地七百五十八頃七十畝二次給地四百八十三頃六十畝三次給地四百五十三頃六十畝共壯丁地萬四千一百十有一頃二十八畝坐落昌平涿安易等州大興宛平永清東安香河三河武清密雲房山盧龍樂亭定興蠡髙陽淶水河間任邱獲鹿各縣河西務獨石口張家口等處順治元年定民間無主田房撥給八旗壯丁又奏凖清釐無主之地安置旗下莊頭如內有有主之地犬牙相錯勢必旗民雜處爭端易生應按州縣大小定撥地之多寡務使旗人聚處一方阡陌廬舍耕作牧放互相友助而後以清出無主之地與有主之地互換令旗民我疆我理界限分明經理各别二年諭户部民間田房有為旗人圈占改換他出者視其田産美惡速行補給務使均平倘瞻顧徇庇不從公速撥從重處分欽此又題凖民間墳墓有在旗人地內者許其子孫隨時祭掃三年題凖副都統以上官各給園地百八十畝地六十畝四年題凖參領以下官各給二名壯丁地每壯丁三十畝又定撥給地畝以見在為凖嗣後雖增丁不加減丁不退各官雖升遷不加已故降革不退又奏凖上年八旗圈地內薄地甚多以致收成無望況今年東來旗人又無地耕種若將逺處府州縣屯衛故明勳戚等田撥給又恐無力者艱於運送應於近京府州縣內撥換去年薄地並給今年東來旗人其被圈之地於未被圈州縣屯衛內撥還仍照遷移逺近豁免賦稅四百里者凖免二年三百里者凖免一年以後無復再動民地庶旗民兩便又題凖撥給兵丁地畝有告稱不能耕種者不凖又題凖圈撥地內如有集場仍留給民間以資貿易又定嗣後民間田屋永停圈撥五年題凖南苑海户每户給地十八畝又題凖各官帶來壯丁給地不敷每佐領下再給十名壯丁地六年題凖各官致仕者督撫布按總兵給園地三十六畝道員副將參將給園地二十四畝府州縣逰守等官給園地十八畝又題凖公侯伯各給園地三百畝子二百四十畝男百八十畝都統尚書輕車都尉百二十畝副都統侍郎騎都尉六十畝一等侍衛護衛參領四十二畝二等侍衛護衛三十畝三等侍衛護衛雲騎尉二十四畝又題凖新來壯丁每名給地三十畝七年題凖八旗舊壯丁每名徹出地六畝撥給新壯丁十年題凖直屬民間房地有被圈一半者不必撥補全圈者以未被圈之房地均攤補給本州縣房地或不足以鄰近州縣存剩房地酌量撥給又題凖嗣後圈占民間房地永行停止十五年題凖舊例勳戚莊屯租榖在部報收嗣後令於各本主報納多寡聽其自便康熙元年議凖遣官發帑修築近京八旗護莊隄岸二年題凖新來佐領給地三十畝領催給地十八畝又題凖守衛孝陵內大臣給園地九十畝三年題凖守衛孝陵總管給地七十二畝翼領各給地六十畝防禦各給地三十六畝郎中給地三十六畝員外郎尚茶尚膳讀祝官贊禮郎並內監等各給地三十畝筆帖式內務府執事人各給地二十四畝驍騎禮工二部執事人每名各給地六畝嗣後守衛各主事陵官兵奉祀執事官員皆按例撥給地畝副內管領與員外郎同驍騎校與筆帖式同六年題凖八旗地有坍塌成河者凖與換給其出鹻及被淹地不凖換給八年諭朕撫育羣生滿漢軍民原無異視比年以來復將民間房地圈給旗下致民生失業深為可憫嗣後永行停止其今年所圈房地悉令給還民間爾部速行曉諭至旗人無地亦難資生應否以古北等口邊外空地撥給耕種其令貝勒大臣確議以聞欽此遵旨議凖圈撥民間田房屢行停止邇來有因旗下退出荒地復行圈補者有遊牧等處投來人丁復行圈撥者有因圈補時復圈接壤民地者百姓失業堪憐今張家口殺虎口喜峯口古北口獨石口山海關外各有曠土如宗室官員及兵丁有願將壯丁地畝退出取口外間地耕種者該都統給印文咨送按丁撥給九年議凖喜峯口獨石口外並無間土正紅旗亦無赴邊領地之人不必撥給外應將古北口外地撥給鑲黃正黃二旗羅文峪外地撥給正白旗冷口外地撥給鑲白正藍二旗張家口外地撥給鑲紅鑲藍二旗又題凖官兵地畝不許越旗交易兵丁本身種地不許全賣又題凖官員撥補地畝不遵部文擅撥給别項地畝者罰俸一年十五年覆凖官員不對閲部册支給口糧地畝者罰俸兩月筆帖式等罰俸一月其校對册籍乃司官職掌堂官不必議處二十年題凖新滿洲來京歸旗者停給園地二十四年議凖直𨽻州縣百姓墾荒田地停其圈撥如有各處壯丁及新滿洲將上三旗皇莊並內務府及八旗禮部光祿寺丈量所餘地畝撥給俟此項地畝撥完時别行請旨又議凖撥給地畝不論多少停遣筆帖式均差司官撥給如不照旗員退出之地取撥將别項地畝撥給者降三級隨旗行走四十五年議凖撥給地畝自康熙十三年後均繫將八旗退出地方官收存地畝撥給至今遵行但春間二三月內已經耕種應停撥給俟九月間秋成後始行撥地其撥給地畝移咨內務府奉宸苑轉付八旗司並行直撫大宛二縣知照至旗人已給之地畝不凖更換其初次應行給地之新滿洲於八旗餘地內丈給五十一年議凖安設莊屯應給屯長地畝並換給地畝均俟內務府具題移咨到部行令該撫核明之日與內務府委官公同換給五十二年覆凖容城縣丈出餘地十有一頃七十二畝零原繫旗退地畝仍交與莊頭耕種每畝納銀三分草一束五十三年覆凖撥補莊頭地畝在各該旗退出輸租地內均勻撥給不得指圈民地五十四年覆凖莊頭拖欠租銀並各處官徴官解租銀照正雜錢糧定為一年催解如逾限不完將承追官照例題參雍正三年覆凖駐防外省旗人交出地畝並內務府所交丈出餘地應徴銀錢糧米别立一案奏報考成每年按數徴完銀錢解部糧米存貯各州縣備用仍於年終將銀錢糧米數目由部造册具題如有未完照未完錢糧分數例題參議處六年題凖直屬地方旗民雜處時有互爭田土之事應行文內務府宗人府及八旗都統將旗莊圈賞投充各項地畝暨皇莊地畝核明坐落四至其餘某旗某王公官兵有地若干坐落某縣村莊四至某處造具清册二本一送户部存案一送直督照式造册鈐印發各州縣收貯如有旗民互爭田土即據册察勘審結此內帶地投充人户有隱漏地畝一并徹底清釐至此項案卷每年不免移換令兩翼監督於嵗終將稅過旗地若干造册報部咨行各屬存案七年諭八旗地畝原繫旗人産業不凖典賣與民向有定例今竟有典賣與民者但相沿已久著從寬免其私相授受之罪各旗務將典賣與民之地一一清出奏請動支內庫銀照原價贖出留在各該旗給限一年令原業主取贖如逾限不贖不論本旗及别旗人均凖其照原價承買欽此十二年題凖八旗地畝坐落直屬州縣為數浩繁片假錯落非逐細勘丈無由知其確數而該佐領下領催人等貪圖私取租銀句連地户將餘出地畝及絶户地畝隱匿不報亦有佃户因無業主取租乘機隱漏認為已業者更有隱匿年久竟認為墾荒首報納糧者此非經管人員不能悉其界址底裏令八旗都統各委參領一人於農隙之時會同州縣清丈將所有餘地及絶户地畝按照肥瘠酌定租數交地方官徴租解交藩庫彚行解部倘有恃強阻撓勘丈者令理事同知會同該地方官審理嗣後凡有報出絶户之地一面報部一面委官勘明交地方官徴租十三年奏凖園頭牲丁壯丁人等所有賞給當差飬家房地本不應違例典賣苐彼此授受相沿已久倘不勘明徹回在園頭人等固當差乏資若概行徹回又恐鄉愚失業令逐細詳勘如紅册內開載之房地並餘地本屬官物此不論紅契白契或典或賣或指産借銀以租抵利等項均繫應行徹回者如紅册內不載之房地並餘地本為私業此繫不應強徹者如用紅契典賣在册房地繫經官授受之項無論何年交易並已入民糧未入民糧此在應徹之內應追給全價應免治罪者如用白契典賣在册房地繫私相授受之項其在康熙三十九年清徹以前交易者民人納糧當差既久此在應徹之內應追給半價亦應免治罪者其在康熙三十九年清徹以後交易者無論已入民糧未入民糧此在應徹之內不應追價且與受之人均應治罪者如園頭牲丁人等將在册房地藉親友出名典賣與人此不論紅契白契皆在應徹之內既應追給全價仍應治藉名之典賣人罪者如將册外典賣之房地揑報為紅册內之房地希圖蒙溷徹回此在不應徹之內仍應治詐冒之罪者如將私置旗産典賣與人此繫在不應徹之內應聽取贖者以上典賣房地有册內册外應徹不應徹之分有典契賣契紅契白契之别徹時又有應追價不應追價應治罪不應治罪之殊應遣京堂官內務府總管各一人率賢能司官各二人再令直督委道員一人會同前往各州縣照內務府紅册徹底清釐其應行追價給還民人者分别追償如有應行治罪者一面清徹即一面治罪仍將地畝數目四至村莊造具印册四本一存本州縣其三本呈本部內務府並該督以備稽考乾隆二年奏凖官用旗地向在入官地內動撥今入官地畝已經分給各旗作為公産未便再行動用按直屬有駐防旗人交出在京所受之地及各莊頭退出之地又有八旗丈出餘地並户絶無人承受之地嗣後莊園人等當差官地及奏免給還並各項官用應行補還者統於前項地內動撥至旗人來京當差應得地畝亦在此內撥給又奏凖凡因興工修築動用旗人地畝責成地方官於興工之日即將畝數及姓名旗分造册咨部撥補倘無故遲延以致旗民失業該管上司即行參劾三年諭朕前以旗人生計貧乏者多令王大臣議將八旗入官地畝立為公産收租解部按旗分給以資飬贍此等地畝內有定鼎之初圈給八旗官兵將田賦悉行開除者亦有旗人與百姓自相交易出銀置買仍在州縣納糧者兩種原屬不同若以入官之後一概定為公産不凖民買殊非朕軫念畿輔黎赤之本懷嗣後除原圈官地不凖民間置買外其旗人自置有糧之民地見在入官者不論旗民凖照原估價直變賣將銀解部交各旗料理生息分給旗人俾沾惠澤欽此四年諭從前降旨令將入官地畝仍賞與八旗以為恆産隨經八旗大臣議稱借支庫銀於京城空地蓋屋賞無房人居住將公産地租陸續補庫其續收地租作何賞給永逺接濟别議具奏等語朕思此項地畝均繫旗人舊業有因拖欠錢糧入官者有貪婪官吏抵應賠欵項入官者既賞還八旗人等仍留公官辦不但所得地租分散之時勢難均齊而地畝租銀官收之數亦必少於私收分賞衆人則人多數少無濟於事勢必隨手花費此項地畝仍令八旗官兵或指俸餉或交見銀承買為業則八旗人等各得立産於生計自有禆益承買價銀即交部以補蓋房之項其餘銀作何辦理及見有地畝作何視其肥瘠酌量等第别定價直令其認買該部會同八旗大臣等詳晰議奏欽此遵旨議凖第一等地每三十畝作價銀四十八兩二等地作價銀三十八兩三等地作價銀二十八兩四等地作價銀十八兩荒地作價銀十二兩凡官兵人等領買者無論銀數多寡分作五次限五年交完其指俸餉抵買者令坐扣五年完結如一人名下入官地畝坐落一處頃畝數多承買之人俸餉不敷坐扣者凖先交不敷銀其餘按季按月坐扣俸餉若無力先交不敷銀凖將不同居之親族俸餉抵買或與異姓無産之官兵合買買後任其分割如合買人內或有事故不凖一人獨退其未完之銀令同買之官兵俟本身應扣地價完日再行接扣地畝即令接扣之人管業再雍正七年曾奉世宗憲皇帝諭旨動支庫帑贖回民典旗地今公産地價除抵還蓋造房屋所借庫銀外原繫八旗應辦生息之項應即以此項銀發地方官贖回報部先令原業主照原價交官給還原産如原業主不願承領即凖各旗官兵及間散人或扣俸餉或交見銀承買倘旗民圖利私相説合隱匿不報及典地年久原業主不知坐落典主有心隱匿者均照隱匿官田律治罪又諭户部爾等會同八旗議奏將公産地價贖回民典旗地等語我朝定鼎之初將近京地畝圈給旗人在當日為八旗生計有不得不然之勢其時旗人所得地畝原足以資飬贍嗣因生齒日繁恆産漸少又或因事急需將地畝漸次典與民間為業閲年久逺輾轉相授已成民産今欲將從前典出旗地陸續贖回必須於民全無擾纍辦理始為妥協再此項地畝官員內尚須扣俸認買貧乏兵丁食餉有限無從措價勢必至盡歸富户富户即肯周濟親族亦豈能多為分給則贖地一事恐未必於貧乏旗人有益可將此旨行文直𨽻總督詳悉妥議欽此五年遵旨議凖一民典旗地動公項取贖在百姓不苦於得價還地實懼其奪田别佃應令地方官於贖地之時詢明見在佃種人姓名及見出之租數造册三本一本存地方官處其二本送部一存部備案一咨送直月旗轉傳八旗鈔録備案嗣後無論何人承買仍令原佃承種其租銀照册收取不得分外需索如本佃抗欠租銀許地主呈官别佃若並未欠租而莊頭土豪無故增租奪種者審實治罪再田主果欲自種則佃人雖不欠租亦當退地若田主並非自種而揑稱自種别佃者審實亦量治其罪至民有在旗地內造房立墳者如已退地其從前蓋造房屋院落並墳墓所占地基只令丈明畝數照例交租不許勒令遷移如有額外苛索及逼勒遷移者照例治罪一民典旗地不下數百萬畝典地民人不下數十萬户一二年間未必盡能取贖若一時概令首報否則治以隱匿官田之律未免滋擾按老圈旗地界址甚為分明老圈之內但有民産即繫私典無法可以隱匿應勘明地畝界址旗色佐領及原業典主姓名造册報部將承買公産餘銀先交地方官取贖至圈外旗地或繫民人帶地投充或繫旗人自置其有出典與民者應俟圈地已盡取贖公産尚有餘銀再訪願贖之家陸續辦理不必豫期行察如此則旗産漸裕而於民全無擾纍一取贖民典旗地貧乏兵丁既無從措價即措價亦不能多買按八旗公産及旗退餘存入官等地並此項贖回民田不下數千萬畝應察明八旗間散人內有正户正身情願下鄉種地者上地給與百畝中地給與百五十畝下地給與二百畝令攜其妻子居鄉耕種初種之年量給牛種房屋之資如此則貧乏旗人永無飢寒之憂其為利賴實屬無窮又覆凖八旗都統於間散正户中選其為人安靜居家勤儉者善為開導令下鄉耕種有一户則令一户前往有數户則令數户前往不必指定人數亦不拘定年限陸續發往下鄉之後仍凖簡選當差初下鄉屯創立家業每户給房四間每間折銀十兩令地方官蓋造每名給牛具耕種口糧等銀百兩如承買公産人等有願令子弟下鄉耕種者亦照此辦理由部於公産項下給發又覆凖如有旗民互相典賣公産地畝者將賣地人等嚴行治罪出給圖記售賣之該佐領等交部議處屯領催莊頭設法典買旗地之民悉行治罪地畝價銀一并入官六年諭聞八旗兵丁在部具呈買置官地及到該地方領地之時往往移甲換乙將瘠薄更易膏腴非復原指産業而歸旗之限又迫不得不回京師及嚮部中具呈部中據呈行詢該地方官又復支吾塞責不能為之清理大失公平之義著該部定議作何稽察欽此遵旨議凖交與直𨽻總督於道員並同知通判等官內酌委數員專司督率稽察倘有仍前串通更換等弊州縣官不為清理致旗人羈延守候者察出即將該地方官嚴加參處如承委之該管官失於覺察一并參劾議處七年議凖清徹莊頭典賣田畝照雍正十三年原議辦理如應徹地內民人已經立墳蓋屋即令秉公定租存案八年議凖清徹直屬各州縣莊頭私行典賣當差官地內有白契典賣一項其在雍正十三年以前立契交易代莊頭納糧者承種雖久嵗有輸納之費所獲未足抵其原本酌議給與半價其並未代莊頭納糧當差者承種至今為時既久地內所獲租息已足抵其原價將地徹交莊頭當差不追還價銀若在雍正十三年以後交易者受典之年雖獲地內租息實不足以抵其原本地既徹交莊頭應在莊頭名下追給民人半價有立契雖在雍正十三年而種地在乾隆元年者亦照雍正十三年以後辦理以及出典在雍正十三年以前而乾隆元年以後又有找價者止追所找之半價至所徹地內有民人已費工本種植秋麥者或莊頭給還民人種植工本或俟民人收麥後將地退還莊頭兩聽其便如莊頭名下應追全價半價不能當時交還其有飬家餘地及自置地畝可撥者酌定租數令民承種限年以租抵償限滿退還莊頭管業其實在並無餘地可撥者民價自不應虛懸即酌量給民承種議定租數年限以抵全價半價之數限滿退交至應徹地畝除莊頭情願自種者毋庸置議外其有不能自種者令兩造自定租數仍許原種之民認佃按年交租若嗣後莊頭仍將官地私相售典及小民明知官地擅行典買者一經察出或被首告即將地畝徹出於莊頭名下追出原價入官照盜賣盜買例一并治罪如莊頭等將官地揑稱自置民地並藉親友出名典賣乃繫誆騙鄉愚發覺之日即將地徹出於莊頭名下追出原價給主將莊頭照盜賣例治罪倘地方官徇隱不報並漫無覺察者照例議處九年覆凖民典旗地不論契載年限總以十年為率在十年以內者照原典之價十年以外者減原價十分之一五十年以外者以半價取贖於承買公産案內撥銀二十萬兩交直𨽻總督或按典地年分之近逺或按坐落州縣之邱段驗明原契按年定價隨清隨贖造册報部行文八旗令各原業主照贖價交官領回原産倘原主不願回贖凖令各旗官兵承買或贖買均照五年之限辦理未經官兵贖買之先每年交直督按坐落州縣徴收官租贖買之後將交部地價亦交直督作為陸續贖地之需又覆凖各旗情願下屯耕種人丁造具數目清册飭交直督並令八旗都統遴委賢員於九月開圈之日給咨前往會同該地方官將地畝之肥瘠毗連之逺近按照旗分及坐落州縣詳細較勘搭配均勻按數撥給毋致此盈彼絀稍有偏枯仍令編成邱段將某人應得某村莊地畝數目逐一分晰造具册結送部以備考核至應需房屋行令該督通飭各屬將應撥地內如有隨地房屋酌給居住或有傾圮應行修葺者轉飭各屬據實確估造册並將無隨地間房之各州縣别行庀材興工蓋造應需之銀在於公産地價項下支領十一年題凖民典旗地原議以十年為率十年以外者減原價十分之一取贖如典地在十一二年或十八九年均減十分之一必至二十年始減原價十分之二則所給價直未免偏枯應以十年為率十年以外者每年遞減至五十年以外者仍以半價取贖其原價較時價過重者飭令地方官隨時體察務使地畝價直兩得其平取贖之案有造報原册有與契載年分逺近地數銀數多寡不符者除契內地多年逺價少以契為凖若契內之價多於册報察驗無浮照契取贖均於册內聲明更正如契偽價浮即照册內之價取贖其文契年分地畝少於原報均照此質驗明確倚實妥辦至於原典轉典年分均驗對契册以原典為主定價回贖如原典價輕轉典價重即照原典之價取贖其轉典之價著落原轉典之人聽其自行補還如册內造繫轉典無論價輕價重總按契內原典之價回贖册內造繫原典價重契內轉典價輕者仍照原册之價回贖至於找價每有不經中保私相授受者其中誠偽難分應酌定年分以重區别自乾隆五年四月奉到部咨議凖回贖以前實繫原報遺漏察驗中契無偽時日相符者凖其并算取贖如五年五月以後復以找價填契內者概不凖給找價以杜虛冒至各屬回贖之案均照原册年分逺近按次取贖如典主因事逺出並無家屬及佃種之人可以質問者即將地畝交官徴租原價代為貯庫俟其事畢回家具呈驗實給發再原典莊窠場園等地概許取贖如原典房屋或有倒塌拆蓋者均應照原報間數酌除典價若民於原典旗地內自蓋房屋及已立墳塋者飭令丈明畝數照例聽其租賃不得居竒病民仍令八旗都統直𨽻總督嚴禁旗民私相典售每嵗終取具該佐領及地方官保結存案如有發覺照隱匿官田例治罪地畝價銀並追入官該佐領地方官照失察例議處又奏凖八旗官兵承買公産房地乃惠育旗人之至意若令原業減價取贖而八旗官兵各照原價呈買則贖買有減價原價之不齊應照依官贖減價令原業主贖回如原業主不願贖回凖令各旗官兵亦照減價具呈認買扣交地價均照公産五限之例辦理又奏凖八旗公産地內有未經承買以及存退餘絶地畝共六千四百餘頃於乾隆七年酌留千頃以為各案撥補之用每年官收租息為數既輕土豪胥役包攬侵漁之弊在所不免應於本部及內務府各遴選賢能司官一人並令直督特委大員同率地方官履畝詳勘地之肥瘠將每畝實應出租若干照鄰畔地畝租數秉公定議如地好租多整分莊頭仍照例給地十八頃半分莊頭給地九頃不凖多加如地窪土薄租數甚少亦比照所辦差務酌量加增編成邱段其新設莊頭照例免差一年十二年奏凖贖回民典旗地間有丈出餘地如原業自行取贖或原業之子孫及親伯叔兄弟兄弟之子取贖者將丈出餘地不論多寡一并指交管業無庸别行作價倘原業無力取贖或無應贖之人應循例召買即照原典地畝所減價直計畝作價承買又奏凖八旗間散人等下屯種地尚需時日見在東作方興各佃已照舊耕種恐旗人到屯收地佃户未及收穫工本無償應按照耕種月分之久速以定成規秋麥繫豫年布種春融加以耘耔應以三月為率如旗人三月以前到屯令議還工本交出地畝若四月到屯則麥將成熟工力已多令於收穫之時主佃各半分收秋禾粟榖等項繫三四月布種五六月耘耔應以五月為率旗人五月以前到屯議給耔種將地交還六月以前到屯並償工本若七月到屯則收成已屆工力全施亦令主佃各半分收至九月以後到屯者本年租銀仍令官徴官解又奏凖八旗保送下屯種地人户原議內已經下屯種地之人仍凖其來京簡選當差但有始勤終惰之輩將所領之銀不務農事任意費用逮至接濟無資則藉來京簡選差使以掩飾其虧折嗣後下屯種地本人不凖來京當差如其子弟及兄弟之子有情願來京考試以及選補差使者仍照原議辦理又種地人户下屯之後或有在屯病故者所遺房地其妻子可以承種聽其照舊管業如無妻子而原報下屯家口册內有適屬可以承種者核明詳報凖其承種如止存妻室並無應行承種之人即將房地徹出令地方官召佃徴租其寡婦孤身情願回旗者即於租息銀內動給銀二十兩資送歸旗若本旗無親屬可倚情願在屯居住者照例於原給地內上地酌給四十畝中地給六十畝下地給八十畝土房四間仍令居住至下屯種地人户皆散處於各州縣或遇偏災及青黃不接之時令各該地方官會同理事同知察勘明白與民人一例動給常平倉榖借貸振恤十四年題凖贖回民典旗地千八百六十九頃五十八畝並莊窠場園房屋地基各項用銀十有九萬八千一百五十兩有竒存銀二千三百七十兩有竒並扣京市平銀七千二百兩應歸續發接贖地價銀內為將來贖地之需十八年議凖嗣後旗下奴僕及開户之人典買旗地請定限一年令其自行首報官為回贖如繫其主地畝應比民典旗地之例量為加重將十年以內者即照原價減給十分之一十年以外減給十分之二以次按年遞減俟官為回贖後聽其主交價認領或典價本多一時不能湊交凖其照民典旗地之例於俸餉內分五限扣交若將地畝賣給家奴是其主原不知自顧生計反得將已棄之産分限扣俸減價認贖未免太優應令交足見銀方凖認領至旗人將地畝典賣與别姓奴僕則與奴占主産有乖名分者不同應照民典旗地之例十年以外減給原價十分之一仍按年分遞減但必繫典出者方凖原業主於俸餉內照例分五限扣價認領其賣出者即將地畝贖回入官不凖認領亦不凖他人承買此等入官地畝及確凖認領而原業主無力並無俸餉可扣不能認贖者均交於八旗內務府作為旗人公産官為收租每於嵗終將收過租息數目彚奏請旨賞給貧乏旗人以資飬贍仍令該旗及地方官不時嚴行稽察倘有逾限不行首報或經清釐之後復有違例典賣者一經覺察即徹地入官將業主售主照例治罪並將失察徇隱之該參佐領及地方官交部分别議處其民典旗地嗣後一并停其召買交與該旗作為公産將所收租息歸入此案於嵗終彚奏增給貧乏旗人俾飬贍益得充裕一盛京各駐防官兵莊田國初按旗分處各有定界繼因邊內地瘠糧不足支展邊開墾移兩黃旗於鐵嶺兩白旗於安平兩紅旗於石城兩藍旗所分張義站靖逺堡地瘠以大城地與之又定差往蓋州收租領催給園地六十畝又定分撥地畝緣邊次第挨給若不論疆界選擇膏腴徇情撥給者分别責罰又定錦州蓋州各官莊屯原非欽賜者概令退出順治五年題凖沙河所以外錦州以內八旗官員家丁每名給地三十六畝又題凖官員莊屯兩黃旗設於承德縣沙河所兩白旗設於寧逺兩紅旗設於承德縣塔山兩藍旗設於錦州十二年題凖遼陽鐵嶺至山海關八旗莊地多有在邊外者相沿已久不必遷移令照舊種住惟酌量邊界開門勿誤耕穫康熙十二年題凖旗人有墳墓在盛京欲從京遷住就近守護者若將京城所受地畝退出凖撥給盛京熟地不退者撥給荒地十九年議凖由京城遷住盛京當差官兵及安莊人等有將京城地畝退還願領盛京地畝者將彼處旗人墾出餘地並未墾荒地酌量撥給二十五年題凖錦州鳯凰城等八處荒地分撥旗民給牛屯墾每十六丁內二丁承種餘十四丁助給口糧農器又題凖黑龍江默爾根地方由部各差官一人監看耕種默爾根令索倫逹虎里官兵耕種黑龍江令盛京官兵耕種又題凖鳯凰城等八處差大臣三人司官八人會同盛京將軍户部侍郎酌量開墾雍正十一年題凖喜峯口駐防兵丁一百名將鐵門關外大屯官地分給每名給地一頃十有五畝七分一釐四毫菜園四分六釐七毫八絲令其耕種照民例分别科則按畝輸租租銀留充兵餉乾隆元年覆凖口外熱河地方設立驛站營汛官兵皆有恩賞額地後因滋生日久遂於額地之外各自開墾今悉行丈出除原額外所有餘地應令按畝納糧至古北口乃邊關重鎮駐防兵丁挈家戍守沿邊瘠地皆繫自力逐漸開墾出息無多丈出之地應悉賞給免其輸糧又各蒙古丈出餘地若令納糧恐不敷飬贍又內務府當差鷹手捕牲人鞍匠等散處口外皆有開荒地畝伊等原在內務府當差不便令其一例納糧均將見在丈出餘地注册亦免其納糧嗣後如再有開墾即照例按畝徴輸二年覆凖黑龍江湖蘭地方設立官莊令盛京將軍於八旗開户人內選能種地壯丁四百名挈帶家口前往開墾每壯丁一名撥給地六十畝蓋給草房二間每十丁合編一莊共設官莊四十所每十莊設領催一名共設領催四名管理由盛京遷移家口每丁給碾磨銀五兩其家口每人給整備行裝銀二兩沿塗各給口糧撥驛站車輛送至吉林由吉林撥運糧船仍給口糧送至湖蘭初至湖蘭每丁給冬夏衣帽其家大口每月給糧二斗四升九合小口半之每開墾地六畝給耔種二斗每莊給牛六頭如有倒斃動支庫貯牛價銀買補再湖蘭安駐兵丁各有墾種地畝不能代官莊人等助墾於每莊額給牛六頭外各多給牛二頭令全出已力墾種此牛如有倒斃無庸補給每牛一頭月給牛料糧一石二斗其家口糧給一年牛料糧給兩月皆停止每丁所受之地嵗納粗細糧三十石第一年免輸第二年交半第三年全納再委撥官兵採木造屋每間各給四兩飯銀動支庫銀倉糧令該將軍等分晰歸欵奏銷俟安設官莊事竣令盛京將軍於八旗開户人內再察有願往湖蘭墾種官地之人應增設官莊若干再議具奏六年議凖湖蘭地方寬衍可設官莊之處尚多應將前設四十官莊內間丁一百三十八名選擇五十名增設官莊五所撥地開墾每名給地六十畝及牛種器具口糧並每年應納糧數均照二年之例但選撥官莊間丁不比他處移住其每丁應給房二間每間給銀四兩五錢令其自行蓋造無庸别撥兵丁至餘丁備補各莊空闕七年議凖湖蘭左近溫德亨山並都爾圖地方土性肥饒水草佳美應將盛京將軍察送願墾官地開户人內選能種地壯丁五十名增設官莊五所撥地開墾其資送及撥給田房牛種器具衣帽口糧並應納糧數均照二年之例再六年增設官莊五所合之此次所增官莊五所已足十莊之數亦照例增設領催一名管理一各直省駐防官兵莊田順治五年題凖江寧駐防旗員給園地百八十畝至六十畝不等西安駐防旗員給園地二百四十畝至二百十有五畝不等又定浙江駐防官兵不給田俸餉照經制支領五年題凖各省駐防官兵家口半攜去者其在京園地半徹全攜去者全徹六年題凖外省駐防旗員初任未經撥給園地者凖令撥給其加級升任者不復增給凡應給地六十畝以下者户部撥給六十畝以上者奏請撥給七年題凖駐防官員量給園地兵及壯丁每名給地三十畝臨清太原以無主地並官地撥給保定河間滄州以八旗退出地撥給康熙三十一年題凖將山西陽太二邑所屬享堂等六屯地畝撥給晉省駐防旗下官兵三十二年議凖各省駐防之八旗官兵均在所住處給與地畝一井田改屯地雍正二年覆凖內務府餘地共一千六百餘頃拖欠錢糧人等所交地共二千六百餘頃內以二百餘頃作為井田將無産業之滿洲蒙古漢軍共選一百户前往耕種每户授田百畝凡八百畝為私田百畝為公田共力同飬公田委本部司官察勘設立村莊蓋土房四百間給與種地人口糧耕牛耔種農具以便耕種並於八旗廢員內簡選前往管理雍正五年諭旗人枷責治罪革退官兵並無恆業在京間住倚靠親戚為生以致良善之人被纍維艱而伊等無事間遊不能不生事為非將此等人察出令於京城附近直𨽻地方耕種井田欽此又諭井田地方止有一人管理著於彼處再設驍騎校四人領催八名料理事務俸餉升轉照在京驍騎校領催之例若升轉後仍在彼處效力者即令其帶銜在彼居住此二年在彼勤慎可用應補驍騎校之人著保送到部引見補授欽此乾隆元年奏凖設立井田試行十年以來所有承種之一百八十户緣事咨回者已有九十餘户循環頂補而八旗咨往種地者大都遊手無藝不能當差之人到井田後仍不能服田力穡行之未見成效行令確察實力耕種安插得所者改為屯户按照地畝完納屯糧於附近州縣倉內收貯備用原設之領催改為屯長約束屯户聽該處防禦管轄原設之驍騎校徹回該旗補用不能力穡之户咨回本旗停其撥補原領田房交州縣賃耕取租解部又議凖井田每户原給田百二十五畝以十二畝五分為公田十二畝五分為室廬場圃以百畝為私田公田之糧向繫盡收盡報今既經改為屯莊自應按畝完納屯糧應核定科則遵照徴收改屯人户故後有子孫者自應頂補倘無子寡婦情願守節並無親屬可倚者留地四十畝飬贍即令本屯人代種完糧俟伊身後仍將地畝入官召種原撥霸州固安永清新城四州縣之地今將附近霸州者令霸州防禦管轄附近固安者令固安防禦管轄各村向設鄉長一名專供督責并户農務交糧並稽察逃盜賭博等事仍留供役如果能勤慎屯長有闕凖其拔補又定井田改屯地共百五十四頃九十八畝有竒徴租解部奏報又議凖井田驍騎校在外耕種多年一旦徹回未有可補之闕凖暫留種地俟該旗有闕拔補之日即令該驍騎校回京將地畝交還該州縣一撥給外藩田土國初定蒙古分為五等一等給莊屯三所園地九十畝二等給莊屯二所園地六十畝三等以下止給莊屯不給園地順治五年題凖丈量分給外藩邊外地畝令各守界限不許越境十八年題凖察哈爾大臣侍衛等酌量各照品級撥給莊屯康熙二十年題凖蒙古新編歸旗者停給園地一畿輔牧場鑲黃旗牧馬場地坐落武清寶坻縣東自唐畦西至陳林莊七十里南自張家莊北至上馬臺九十里正黃旗牧馬場地坐落天津府西北自俞家莊東北至小稍子口三十五里西南自孫家莊東南至秋家莊四十七里正白旗牧馬場地坐落天津府東自好字沽西至白家莊四十二里南自城兒上北至清溝六十五里正紅旗牧馬場地坐落甕山十有五頃蘆溝橋西髙陵二十七頃六十畝鑲白旗牧馬場地坐落通州二十四頃八十四畝鑲紅旗牧馬場地坐落順義縣天竺馬房村三十五頃二十八畝蘆溝橋四頃八十畝正藍旗牧馬場地坐落豐臺王蘭等莊東西三十里南北五十里鑲藍旗牧馬場地坐落草橋十里廊房八里順治二年題凖御馬場王貝勒貝子等馬場皆令各按本旗地方牧飬又題凖近京廢地均撥給壯丁墾種如撥給有餘方凖為牧場六年題凖順義清河漷縣及沙河蘆溝橋五處荒地千四百六十八頃四十四畝潞河沙河清河桑乾河兩岸各長五里濶三里均令丈作馬場又題凖嗣後棄地作為牧場永行停止如沙地不堪耕種者仍凖牧馬十二年覆凖親王牧場方二里郡王牧場方一里額外多占者察出撥給新壯丁三十年題凖德州駐防官兵向在滄州牧馬因越省不便將霑化縣邵家莊所有荒地令作馬場其應徴地畝銀凖其豁免雍正二年議凖八旗存留牧場並牧場餘地差八旗都統一人率本部賢能官二人每旗賢能官一人令直督委道員一人公同察核其有可以墾種者交與地方官招民墾種其不堪耕種者仍交八旗作為牧場一盛京牧場順治五年題凖奉天中前所前屯衛中後所三處地畝令八旗均分為牧場自東迤西先給兩黃旗次兩白旗次兩紅旗次兩藍旗康熙二年題凖錦州大凌河牧場東至右屯衛西至鴨子厰南至海北至黃山堡仍留備用牧馬不許民間開墾乾隆十三年議凖大凌河馬場長百餘里寬三四五六十里不等甚屬寬廣今既裁減馬羣應於馬場西界橫截十里給與官兵就近耕種以資飬贍但恐伊等日後圖利私行侵占開墾耕種有礙馬場令差往大臣會同該副都統並總管核明應截牧場地址編定四至注册備考又奏凖錦州大凌河馬場東至右屯衛西至鴨子厰南至海北至黃山堡丈得東西長九十里南北長十八里至六十里不等折算約二百九十餘里計地萬七千九百餘頃此內應遵照原議自西界橫截十里會同該副都統牧羣總管丈量西邊自南至北長十八里有竒東邊自南至北長二十里有竒其自東至西應截地內南界窄狹北界有山有足截十里者有不足十里者照依地勢裁給計地已有九百三十八頃有竒隨分定界址東至杏山北濠溝西至鴨子厰南至七里河北至金厰堡將裁截之處建築封堆以杜將來私墾欽定大清會典則例卷三十四
