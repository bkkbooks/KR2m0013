運及回空漕船舊例遇有非常風阻冰凍淺滯之事難以副限者報明免議嗣後漕船抵壩守候齊幫及山水漲發閘溜難行並撞沉搶修均準於單內注明免其恭處六十一年題準重運及回空漕船一入境汛地方文武官及河官率領兵役親往催行出境毋許停留生事倘有運軍舵工水手生事為匪專管各官並不親往河干彈壓協拏照溺職例處分兼轄等官照例議處雍正三年諭山東河南糧船過天津關日期自雍正四年起照依南漕三日一報欽此五年題準漕船若遇風色不順並水勢浩大地方官與押運官辨公同計議暫停守候於入境出境册內注明如但稱風色未便停泊逗遛者地方官及押運官辨皆照例議處七年題準漕船過淮之後經過皂河濟寧臨清三處定例繫總河題報今山東河南增設總河嗣後重運糧船過濟過臨令河東總河題報其過皂河日期仍令江南總河題報乾隆四年題準各運官豫將出運船數開單呈送總漕轉發經過各汛各汛辨兵候船入汛即照驗放行倘有勒索遲延者核明究恭五年題準黃河設立救生二船每船舵工水手十名每名月給工食銀一兩每年於正二三月保護漕船濟運護漕後聼其渡載覓食不給工食其船三年一修所需每年舵水工食及歲修之費令江安蘇松糧道於六升米折項下各半支給十年拆造每船給工料銀百兩仍在六省出運漕船行贈銀內派給又題準黃河兩岸有傍河漲錨小船原繫民船向來漕船經過遇有意外事故雇其裝載米貨往往乘機逺揚運軍不能追尋應令州縣官詢明船戶姓名取具地鄰甘結給以腰牌填明水手年貌住址船身兩旁編列號數俟交還糧貨該軍船酌給雇價倘有乘機撈搶逺遁者州縣官嚴拏究治七年題準山東糧船不到淮不由總漕給發程塗限單受兑之後令運官即呈報總河及巡漕御史以便稽察催行八年題準脫幫遲誤降級督運之官如題恭未經部議以前有完糧報部者準扣除免議已經題結者照過淮違限例總漕於完糧後題請開復十年題準漕船應增縴夫著運辨運軍自募不得槩令多增如短縴人夫勒索運軍各汛千把拏送巡漕衙門懲治汛辨拏送不力及故行捆打運軍勒加縴夫並縴夫暗串兵役朋比為姦者照縱役例議處其漕船入汛運軍不遵催行無故停留者該汛㑹同運辨責處一淮通例限順治十二年諭漕運至為重務年來拖缺稽遲弊非一端漕督固應盡心料理各處督撫亦當分任責成除湖廣漕糧暫留充餉外江南江北江西浙江等處漕糧著該督撫督率所屬各糧道州縣衛所等官恪遵漕規冬兑春開務依限到淮其到淮以後漕督察驗催趲抵通交納河南山東漕糧該督撫督率所屬各官徴兑開行知㑹漕督察催北上繫何地方遲誤者自督撫以至州縣衛所等官應擬何罪屬何省分者應限若干月日戶部詳確議奏欽此遵㫖議準各省漕糧過淮應限月日均照議單開載江北各府州縣限十二月以內過淮江南江寧蘇松等處限正月以內過淮江西浙江限二月以內過淮山東河南限正月盡數開行如有司無糧軍衛船不齊備以致過淮違誤者罪在巡撫並未議定何罪亦未議定總督責成今議違限一月以上督撫罰俸三月糧道監兑推官罰俸六月違限二月者督撫罰俸六月糧道監兑推官罰俸一年遲至三月以上者督撫住俸戴罪督催俟糧船抵通交明開復糧道等官降一級調用其領運等官如兑糧及期開行過淮違限十日者總漕衙門捆打二十違限一月者捆打四十革職戴罪督押俟交糧全完開復如經徴州縣衛所等官船到無米有米無船過十二月者各罰俸半年過正月者各罰俸一年過二月者各降二級留任至漕督管理通漕催趲尤其專責及過淮以後總河星速催趲如過淮及期而到通遲誤者河漕二督及沿河鎮道將領州縣等官亦照督撫糧道監兑等官遲誤過淮例嚴加議處十七年覆準押運同知通判過淮抵通違誤者照糧道例處分康熙十一年題準山東河南限三月初一日到通江北限四月初一日到通江南限五月初一日到通江西浙江湖廣限六月初一日到通各省糧船到通均限三月內完糧如三月內不完舊例不論月日多寡各罰俸半年今議原限三月之外押運等官違限不及一月者罰俸三月一月以上者罰俸六月二月以上者罰俸一年三月以上者降一級留任又題準白糧過淮抵通違限督運各官皆照漕糧違限例議處三十四年題準漕白二糧過淮定例總漕將船糧數目陸續具題嗣後每年過淮漕糧總數繕造黃册專疏具題四十一年題準各幫過淮違限實因兑竣開行隆冬水涸之故將過淮展限一月若再有遲延照舊例加倍處分四十三年題準運官過淮違限例應革職戴罪督押者停其升轉俟該辨領運漕糧全完題請開復準其推升五十一年諭凡事不求根本止務枝葉斷無實效條奏漕糧一事者止以塗間耽閣開兑遲誤陳奏其漕船稽遲根原從無一人言及朕南巡數次河道漕運知之甚悉如上江漕船皆入儀徴河口下江漕船皆入瓜洲河口因大江泊船不便而四千餘艘彼此相爭入口灣泊必俟到齊始挨次開行則守候之間甚至遲誤若凡一幫全到在先不必等候各幫隨令起行過淮其續到者亦照此勿令守候止以船到即令起行則前幫得以早行後幫船慮其隔絶自然奮勉追行如此則回空重運斷不致遲誤將此情由議奏欽此遵㫖議準各省漕船照常令進儀徴瓜洲河口至三㲼河時凡有一幫到齊即催趲先行過淮如有前幫船不全總漕委官帶領後幫全到船越過先行其有停阻河道爭相漫越者嚴行約束該糧道嚴催尾押過淮如有不依限兑運催趲過淮以致遲誤將糧道監兑押運催趲各官題參照例處分又題準過淮違限一二月者仍照舊例處分外其違限二月以上或七十日者督撫降一級戴罪督催糧道監兑等官各降二級調用違限八九十日者督撫皆降一級留任糧道監兑等官各降三級調用又題準江南漕船仍依原限正月以內過淮五十七年題準江北江西浙江湖廣漕船過淮仍照舊例扣限至過淮既不展限一月嗣後如有違限仍照舊例處分停其加倍議處雍正元年奏準部發效力武舉委運事竣坐糧廳勒限一月到淮考核如有過淮違限革職捆打之案總漕照例發落題請開復三年題準漕白糧船抵通日期及到通起過糧數謄卸回空船數目並石壩外河水勢深淺五日一次奏聞六年題準過淮抵通向例各按定限扣算題參嗣後江南江西浙江湖廣糧船過淮違限已經議處者於抵通完糧之日將原參過淮違限日期準其扣除免議道逺省分以九月初十日為限逾此限不完糧者官辨從重治罪十一年題準廬州衛頭幫向隸江北原限十二月內過淮今應照江寧等幫於正月以內過淮十三年題準運官過淮違限部議革職之案未經開復不準議敘加銜乾隆元年題準淮揚運河河底加髙自應疏濬將乾隆二年回空漕船及早一月過完乾隆三年重運展限於三月進瓜洲江口二年奏準開濬運河增建閘壩欲回空之迅速必令重運之先期將乾隆二年重運過淮之例暫為變通如領運千總違限三日監押督催等官違限十日一槩題恭果能空重依限過淮加等議敘若運軍空重亦能依限抵通全完者準作五運前後全算滿日給以頂帶榮身三年奏準疏濬運河應以正月二十四日開壩之日起限江北河南幫船均限一月內全數過淮江西浙江湖廣幫船冉限一月內全數過淮如有違限照例核恭九年題準糧船過淮限期向按各省程塗酌定未分各府逺近及道路難易江南下江之松江府與浙江道路相等但松江必由蓴泖澱山等湖湖南經涉洞庭江西必由鄱陽不能遄行前進各幫到淮均在浙江湖北等省之後應將江南松江府及江西湖南幫船於過淮原限外寬限十日十年題準各省過淮違限之運辨例應捆打除違限不及十日者仍照例免議違限十日應捆打二十亦仍照例準其完糧扣除免議如違限一月及一月以上者於過淮時該督按違限日期即照例捆打發落於題恭案內聲明一回空例限順治初年定河漕總督專管漕運如回空船不力催又不題恭地方官者降二級留任又回空漕船如後船已過前船未到者押空官照例恭處十二年題準沿河督撫鎮道等官遇回空糧船入境立刻催行將入境出境日時報部察核十六年題準漕船回空到淮總漕將各船照重船過淮例令押空官先期投驗限單察明各幫原過淮船數如有闕少按律治罪其山東河南二省不過淮者專責糧道稽察康熙四年議準漕船到通限十日內回空倉場定立限單責成押幫官依限到淮沿河各官立催過汛如汛地官不力催指名題恭五十一年題準回空漕船倉場侍郎給發限單將經過州縣界址照原定限日刋入單內令沿河州縣注明出境入境時日至淮申繳總漕察驗别給抵次限單亦令沿河州縣注明入境出境時日各船抵次之限不得出十一月終將限單申繳巡撫稽察五十八年奉㫖回空漕船於限內到次者不必具奏限內不到者著聲明題恭六十一年題準押運通判所押尾幫船糧起卸完日坐糧廳即將批回印發送部察驗令其押空南下如通判及隨幫托故不親管押回空以致水手生事者照規避例議處如坐糧廳留難不發批回者亦照例議處又題準運辨交糧完日坐糧廳立給完呈限單勒限一月到淮投驗如有逾限照規避例議處乾隆二年題準山東自備船於交糧之日除留頭船一二人在通候領䉡羡完呈等項外其餘各軍令倉場侍郎給與空身限單勒令回次各軍到次將限單繳送各衛所察驗如有違逾分别責懲仍將限單填明到次日期彚送糧道考察倘有違誤不到别詳僉補仍將運軍嚴究如有沿塗生事發覺該衙門詳報究治留通運軍事竣回次如有違誤一例究治欽定大清會典則例卷四十二
