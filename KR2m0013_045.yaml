body:
  text: 戶部漕運二一漕糧徴收順治九年題準各省漕糧向繫軍民交兑軍彊民弱每多勒索嗣後定為官收官兑酌定贈貼銀米隨漕徴收官為支給民間交完糧米即截給印串歸農軍民兩不相見一應浮費槩行革除雍正二年諭地丁漕米徴收之時劣生劣監遲延拖缺不即輸納大干法紀該督撫立即嚴察曉諭糧戶除去儒戶官戶名目如再有抗頑不肖生監即行重處毋得姑徇倘有瞻顧不力革此弊者題參治罪欽此四年議準蘇松二府所收倉糧交兑之外果有贏餘該州縣報明存貯公所以為修理倉厫及振濟之用倘有藉贏餘名色加收斛面及該道扶同徇隱察出從重治罪六年諭江浙徴收漕米但擇乾潔不必較論米色準令赤白兼收秈粳並納永著為例欽此八年題準州縣徴收糧米豫將各里各甲花戶額數的名填定連三版串一給納戶執照一發經承銷册一存州縣校對按戶徴收對册完納即行截給歸農其未經截給者印官摘戶追比若遇有糧無票有票無糧即繫吏胥侵蝕監禁嚴追十年咨準江南句容縣地處山陬多産秈稻歲額漕糧四萬有竒向來徴兑悉繫糶秈易粳於民未便嗣後著將土産秈米完漕輸納毋庸糶秈易粳乾隆元年題準農民完納漕米到倉州縣驗明米色隨到隨收嚴禁蠹書留難等弊違者參處二年題準州縣漕糧原額田地向有荒闕凡遇報墾升科於漕糧正耗內加入升科兑運如無荒闕漕糧足額遇有升科漕米皆解司充餉倘有誤將足漕州縣升科應行解司之項造入漕項奏銷者題明改正三年題準河南漕糧向止合邑總額並無每畝應徴定數今酌定祥符等州縣各照見額漕米數目按實在行糧熟地除原不徴漕之更名等地外無論倉口新升一例均派核明某則地每畝徴米若干徴銀若干遇閏加增銀米若干載在全書遇有升除按則增減其改徴黑豆全書內統以米數開造四年諭湖北每年額徴糧米運通倉者名曰北漕給荆州官兵者名曰南漕二項合收分解永逺遵行如有分項徴收零星多取者該督撫嚴恭治罪倘别省收漕地方有分收者該督撫酌量察禁欽此五年覆準各省漕耗等項久經酌定成規而不肖有司竟有立名需索苦纍民間者應令督撫力為釐剔道府密行訪察州縣有不按定例需索加派私行改折及縱容胥吏舞弊侵蝕道府即行揭參治罪倘有徇隱督撫覺察將道府一并題恭究處又題準江南蘇松糧道所屬漕糧按照區圖派厫收納河南江西浙江湖南不分區圖隨厫收納江南江安糧道所屬及山東湖北糧多之處按照區圖糧少之處不分區圖收納毋致糧戶擁擠守候又咨準江南海州漕米官折官辦為數無多令該州購買白色乾潔好米交兑不準紅白兼收六年諭江南下江地方秋雨連綿米色稍減從前原有赤白兼收之例該地方官酌量可收即日收兑抵通之後或慮不能久貯即發為俸餉之用欽此八年題準各省收兑漕糧斛式向來底面尺寸相等因口大邊濶易於浮溢應改鑄小口鐵斛頒發倉場並有漕各省一例遵用其從前原頒大口鐵斛繳銷又題準徴收漕糧令督撫嚴飭州縣於開倉時親詣稽察若因公他出暫委佐二官監收其州縣在倉看守之親戚人等以及經手吏役如有包攬浮收交通舞弊即行揭報嚴恭究處監收佐二官扶同隱匿一并究恭十年諭聞江南下江漕糧緊兑之時印官不能處處親驗吏胥等遂多方刁難小民不能等候情願議扣自九五折至九折不等向來徴收漕糧弊竇甚多江蘇之漕甲於諸省尤為積弊之藪著有漕地方大小官員嚴行釐剔如有仍蹈故轍者經朕聞知或被御史恭劾必重加處分欽此十三年題準豫省粟米向例黃白兼收其額徴之麥無論黃白淺深耔粒大小均許兼收一白糧徴收順治初年定白糧米色責令糧道監兑等官公同親驗如有米色不純等弊指恭治罪各該州縣交兑時即將白糧樣米封貯運通以慿察驗十二年題準州縣官交兑白糧照漕糧之例冬兑冬開該督撫於開幫之日注明交兑月日列疏題報如有遲誤按例議處乾隆二年諭聞得江浙兩省民間輸納白糧較漕糧費用繁重甚屬艱難朕心深為軫念諭令該部詳考據奏兩省歲運白糧二十二萬餘石太常寺光祿寺各賓館需用二千餘石王公官員俸米約需十五六萬石內務府禁城兵丁及內監食用等項需萬石尚餘五萬石存倉等語朕思光祿寺等處所支原以供祭祀及賓館之用在所必需其王公官員俸米應用白糧者可酌量減半以粳米抵給至賞給禁城兵丁及內監食米亦可將白糧裁減給以粳米如此則每年所需白糧不過十萬石仍照常徴收起運其餘十二萬石著漕運總督㑹同該督撫酌行改徴漕糧其經費銀米均照漕例徴收以紓民力欽此又題準江浙二省運京白糯每歲應需九千石均攤科算浙江原辦運白糯正米五千二百四石照例採買辦運江蘇常州府原辦運白糯正米九百八十石九斗六升二合今派九百七十七石蘇州府白糯正米原辦運四千二百六十八石二斗八升四合零今派二千八百十有九石以足九千石之數餘均改徴漕糧至松江府太倉州屬偏處海濱採買艱難將白糯全改漕糧五年題準江南崑山新陽二縣荒瘠田蕩應徴白糧六百二十一石有竒於各縣南米內通融辦運七年題準浙江杭嘉二府有應徴白糯米但浙地素不産糯應隨漕統徴粳米官為易糯舂辦兑運一漕糧蠲緩順治初年定漕糧原有定額凡荒地無徴者該督撫勘實具題準豫豁免仍責令各州縣招墾毋致久荒又定災傷地方應徴漕糧及改折漕價當年不能完納者酌量被災輕重或全行緩徴或緩一半或分作兩年三年帶徴又定凡田地沿江沿海坍沒水中無從徴漕者保題豁免康熙七年題準凡漕糧已經寬期帶徴遇帶徴之年復被災傷其上年帶徴之糧準其分年壓徴帶補九年題準漕糧寬期帶徴漕項銀原無帶徴之例如有被災過重州縣該督撫題請寬緩者亦準分年帶徴十年題準荒闕田地題豁漕糧隨漕銀米一例準蠲二十一年題準築隄占用民田應徴漕糧準其豁除三十年諭京通各倉纍年積貯之糧恰足供用應將起運漕糧逐省蠲免以紓民力除河南明歲漕糧已頒諭免徴外湖廣江西浙江江蘇安徽山東應輸漕糧著自康熙三十一年為始以次各蠲免一年欽此雍正八年諭前因河南亦有被水州縣特降諭㫖令該督按照歉收分數蠲免漕糧今據該督奏稱豫省州縣收成雖有不等實未成災且士民踴躍輸將今歲漕糧見在完交兑運等語士民等急公奉上甚屬可嘉但被水州縣雖未成災而收成分數既有不等著該督仍將歉收分數照例蠲免即將已兑漕糧準作雍正九年正供以示朕加惠豫民至意欽此十年題準凡水淹田畝例於每年冬底確勘一次涸則起徴淹則停免嗣後淹田漕米先於糧册删除照壓徴之例俟冬勘後涸則次年帶徴淹則題請豁免十三年諭雍正十二年以前民缺未完漕項銀全行豁免嗣後遇有恩詔均入於豁免內永著為令欽此乾隆二年題準漕糧上供天庾難容闕額即漕項銀亦辦漕之需從前間有蠲免出自特恩原非定例倘有被災地方令有漕督撫確勘實在情形或應分年帶徴或按分數蠲免臨時具題請㫖遵行六年咨準各省凡遇災傷多將漕項彚入地丁並請蠲緩以致牽溷嗣後無論咨題案件有關漕項者專案造報一漕糧改折順治初年定起運漕糧例不改折間有被災地方準其暫時折解八年題準漕糧改折後百姓有先期完納本色者準抵下年漕米仍於下年應徴本色內照數扣徴折色又題準漕折銀即應起解如該地方官有意延緩者應按分數恭處又題準江浙兩省被災除一二三分者不必議折外應以四五六七分為輕災每石徴本色六斗折色四斗八九十分為重災每石徴本色五斗折色五斗其折色漕米每石折銀一兩四錢九年題準南北交旱豫計折漕江南江西浙江每石折銀一兩五錢山東河南每石折銀一兩二錢十年題準本地被災改折糧額不必復於鄰邑撥補起運十七年題準漕糧內向有給軍辦運灰石之米因停辦灰石米仍運通嗣後永折銀著徴解戶部聼工部按年支取備辦灰石以應工程之用十八年題準漕糧改折止許照價徴收如仍藉兑漕為名濫行科索者即行參處又題準漕糧遇有改折其隨漕輕齎席木贈截等銀照數徴解又題準起運漕糧正米一石例有耗米並給軍行月贈耗等米如遇改折一例按照時價折徴康熙八年題準河南漕糧遵賦役全書每石折銀八錢九年題準浙省嘉湖二府被災每米一石折徴銀一兩十年題準蘇松常等府被水糧米每石折銀一兩麥每石折銀四錢徴收十一年題準沭陽海州地瘠民貧漕糧折徴每石徴銀八錢十六年題準河南粟米價賤每石於八錢內節省銀一錢五分解部餘銀六錢五分辦運五十八年議準河北附近水次等府州縣粟米每石令民閒上納節省銀一錢五分其餘六錢五分即徴本色起運至不近水次之州縣仍照舊例八錢折徴雍正元年諭浙省杭嘉湖所屬被災十四州縣額徴漕米三十二萬石朕恐荒歉之歲民間納米為難著令徴收一半改折一半其改折之價著照康熙九年例每米一石折銀一兩又念被災之後所交米色未能純一其十六萬漕米著令赤白兼收欽此六年題準河南去水次稍逺之府州縣均照部議徴收本色惟南陽汝寧二府屬縣河南府屬盧氏嵩永寧三縣及光汝二州並屬縣額徴漕糧路逺難運又離水次最逺之靈寶閿鄉二縣共酌減米萬五千六十二石有竒均免辦解分撥內黃濬滑儀封考城等五縣協辦於五縣地丁銀內扣除完漕照部價每石八錢以銀六錢五分辦運節省一錢五分徴解糧道補項其南汝等府屬每石折徴銀八錢解司以抵濬滑等五縣所除地丁之數七年題準江蘇通州漕糧兑給狼山營兵米將附近水次州縣南米改抵通州漕糧九年諭浙江杭嘉湖三府今歲小有蟲災米粒稍碎不能完漕應令減價折收以示體恤著照雍正元年四年之例每石以一兩折徴解部欽此十一年題準山東河南額徴粟米內改徴黑豆十二萬石運供在京官兵並支應理藩院賓館等項牧馬之用一應起卸均照漕例遵行乾隆二年諭江南淮揚一帶於今冬大濬運河自運口以至瓜洲計程三百餘里分隸淮安府之山陽揚州府之江都甘泉髙郵寶應五州縣管轄將來築壩開工之後舟楫難通民間輸納漕米須用車驢陸運未免竭蹶又淮安府之鹽城阜寧二縣與山陽接壤向於淮城內外交倉兑運則納漕與山陽等五州縣無異朕心深切軫念江南所屬漕糧雍正八年十一年有改徴折色每石納銀一兩之例著將今歲山陽等七州縣應納漕糧照此例改徴折色欽此又題準昭文縣薛家沙地劃歸通州管轄應徴漕米三百八石有奇照通州漕糧之例均留充狼山營兵餉其應運之米在於昭文縣南米內改抵補額又題準河南臨漳縣減徴黑豆統作米數折徴解部應需黑豆仍於應徴本色漕米內徴運又題準江南蘇常鎮揚太倉通六府州屬額徴之麥向給運軍行月二糧遇有餘剩易銀解部但各屬産麥稀少買交不便嗣後隨漕徴米給軍餘剩每石易銀九錢造報又覆準豫省漕糧米豆向因各府州縣以水次遙逺運兑維艱酌給腳價令各州縣運至水次交兑但祥符等三十一州縣原給腳價多寡參差不敷所用嗣後每石每里給銀八毫一絲六忽於隨漕耗米及原定腳價銀內動支若仍不敷於節省銀內增補餘剩節省銀解部其永城等十九州縣離水次更逺將額徴米豆折銀令州縣選役赴水次採買兑運又題準江蘇嘉定寶山二縣額徴漕米例繫永折今白糧截減已改徴漕米四千九百二十六石其永折漕米亦照數改徴本色起運又題準山東河南改徴黑豆不敷支給於河南粟米內再改徴二萬石山東粟米內再改徴四萬石三年題準贑州府屬寧都縣原額起運漕米因距省稍逺兑運維艱先經題定留抵兵米將奉新等縣兵米解省抵作漕米今該縣新升漕糧正副米二石四斗七升二合照例徴解贑縣抵作贑縣應徴之兵米即於贑縣額徴本色兵米內扣米二石四斗七升二合解省抵作寧都縣升增漕糧仍於奏銷各册分晰造報嗣後寧邑續升漕糧均於贑縣兵米內一例改兑抵解至寧都縣漕米抵解贑縣兵糧其耗米一斗九升三合應令寧邑照例扣徴移解贑縣為兑漕之費其餘運費令贑縣照派定漕糧款册徴收辦理四年諭聞海州及贛榆縣素不産米漕糧皆採買於鄰郡今年二州縣被水稍廣民力未免艱難其成災地畝應徴漕糧聼該督撫察勘題請蠲緩外至勘不成災之處民力亦覺艱難著將本年應納並上年緩徴漕糧均準其折色每米一石折銀一兩按數交官起解免其購運以紓民力欽此又諭聞贛榆縣地瘠民貧又值連年被災著將未被水之田應徴漕糧照本地交納粟米例一并改徴折色俾多留米榖於瘠邑庶民食不至匱乏欽此又題準河南改徴黑豆繫於各州縣應徴粟米內派徴永城等十九州縣折徴粟米購買維艱採辦之米於祥符等州縣徴解以祥符等州縣應收之豆於永城等州縣採買七年題準江西瀘溪縣折徴漕糧向定折價八錢不敷採買嗣後於每年八月借司庫存公銀發該縣及時採買按照買價徴銀還項又題準江蘇海贛二州縣不産米穀漕米皆購諸外境運赴清江交運經過淮黃兑運維艱嗣後準照江西瀘邑之例辦理又題準湖北通山當陽二邑僻處山陬不通舟楫漕糧難於兑運嗣後改徴折色官為採辦每石連腳耗定價一兩二錢五分八年題準江南嘉定寶山二縣應輸漕白二糧向繫折徴官為採辦每年十月定價派徴至十二月採買時價長落不一難免盈縮參差改照江西瀘溪縣例每年豫動庫項購買核明買價出示徴收又題準山東附近青州州縣粟米徴運青州支放兵糧其改徴黑豆州縣仍徴粟米兑運將扣存兵米價銀採買黑豆運通所需運青不敷腳價以及隨漕幫貼等費統於米折銀內動給九年題準河南粟米內再改徴黑豆二萬九千三百五十六石六斗六升有奇又題準河南改徴黑豆頻年加增其永城等州縣購辦之豆不必於祥符等州縣改徴粟米即照數徴豆起運十一年題準河南祥符等四十州縣額徴粟米內每年改徴小麥萬石同漕米黑豆一同徴收運通交納由倉場侍郎轉運內務府收用其運赴水次應需腳價令該撫照舊每石徴收節省銀一錢五分以資運費自乾隆十二年為始照數改徴起運十四年題準江南沭陽縣完漕粟米買自東省陸運維艱嗣後準其採買糙秈兑運又題準江南寧國旌德太平英山四縣漕糧向繫民折官辦每年豫估派徴官為措銀墊辦於官民均有未便準照海贛二州縣之例先動司庫銀及時採買兑運將用過銀數按米計算照數徴收歸款十六年諭京師官兵牧養馬駝需用黑豆甚多豫東二省向為出産黑豆之地自雍正十年以來已於二省漕糧粟米內節次改徴每年合計額解黑豆二十萬九千餘石以供支放八旗馬駝之用該省小民至今稱便但見在豫東二省額徴運通粟米尚有三十七萬餘石計支放官兵俸餉外每歲多有餘剩似可再為酌量改徴以裨實用著該撫等於額徴粟米內各按地方情形視其出産之多寡分别實數每歲再改徴黑豆一二萬石同從前改徴黑豆一例兑運在豫省多留此數萬石之粟米既可以資民間口食而京師黑豆價直亦可不致昂貴倘加徴黑豆於閭閻完納漕糧實有未便之處亦即據實陳奏不必勉强從事欽此遵㫖議準東省閘河內外有漕州縣向皆出産黑豆前經改徴黑豆完漕之時以豆抵米糧戶樂輸應將泰安萊蕪肥城東平東阿寧陽金鄉濟寧汶上陽穀渮澤鄆城單范觀城朝城聊城博平茌平莘等二十縣及濮州就其産豆多寡區别定數曉諭完糧五升以上之花戶令其米豆兼收共改徴黑豆三萬石同應徴粟米一例依限徴完交兑運通至豫省地方粟豆兼産豆多粟少之區粟價常昂於豆價自節年改徴黑豆小民樂於輸將徴運無誤今應自本年為始於應輸粟米內改徴黑豆二萬石將額徴粟米照數除抵至漕糧每石向有節省銀一錢五分徴為運赴水次腳價之用亦仍照前徴收以資運費一漕糧運船各省漕船原數萬四百五十五號直隸三十有九山東干五十四江南江安糧道所屬四千八百八十七蘇松糧道所屬六百四十八浙江千九百九十九江西一千有二湖廣八百二十六內除漕糧折銀徴解及灰石改折並分載帶運及坍荒田地應蠲漕糧裁減船數外以乾隆十八年實運船數計之共五千四百八十八船直隸三十七號協運河南山東九百七十五號內漕船三百九十六自備船三百三十五運本省者七百三十一船協運河南者二百四十四船江南江安糧道所屬二千八百八十六號除協運河南百二十五船撥運蘇松等屬千八百三十五船運本省者九百二十六船蘇松糧道所屬四百三十九號浙江五百六十九號江西三百四十八號湖北百二十號湖南一百十四號河南無出運衛所船繫直隸山東江南等省就近協運四百有六號江南運白船一百三十六號在通省漕船內三年抽調一次浙江六十三號在通省漕船內撥定長運白糧順治初年定奉委修造漕船各官或詐報朽爛或修造未竣報稱已完或將朽爛船册報掩飾者皆降二級調用承造官推諉不行監造或不能依限完竣者各降一級調用該管官督催不力者罰俸一年如朽爛船不估價申報者亦罰俸一年十二年覆準貼備造船江寧各衛屯米每石協濟銀三分黃快船每丁協濟銀五分官舍餘丁編為三則上則納銀五錢中則納銀三錢下則納銀二錢審定造册徴收解厰安慶衛以屯田勻配上下兩運公同貼造新安宣州二衛按屯田編徴貼造建陽衛於屯丁銀內加徴貼造廬鳳淮揚徐滁等衛蘇太等衛所及山東各衛均按清出丁舍編徴貼造浙江按清出閒丁每丁徴銀四錢江西每丁徴銀二錢五分湖廣每丁徴銀二錢以供貼造若船多銀少盡數勻攤又覆準僉造漕船除額給料價外將各衛所舍餘閒丁按年編審納銀為幫貼之費十四年議準成造漕船例有軍三民七造船料價例於州縣民地徴十分之七衛所軍地徵十分之三並減存行月等銀供用東省所增新糧應需船載仍於額設銀內撥補成造十五年議準湖北修造漕船所給料價官役髙下其手竟非原數不得不私派幫貼嗣後應令官修官造以蘇軍困又題準各省新升漕糧運船不敷例動輕齎銀雇募民船裝載應令各省豫為題請補造康熙四年題準漕船僉造之年如有衛所官帶領運糧軍戶勒索幫貼等弊該督撫嚴禁有違犯者指名題恭又題準造船屯軍不僉不解責在府廳衛所解軍不造責在糧道該督撫指名題恭又覆準嗣後漕船十年限滿必須察驗確實應造者造應修者修仍將每年修造船若干造册題報又須總漕親驗實繫不堪出運者方許改造倘有可用舊船不驗明駕運該督撫察實題恭其有過號漕船自行造買赴厰領銀者槩行禁止七年題準漕船改造司漕之官親驗如有仍可加修再運者即於歲徴造船料價內量給加修銀仍令載運照年扣算九年覆準楚省軍三料價因漕不起運裁充兵餉今楚漕見在復運此軍三料價自應照舊編徴為造船之用嗣後既有民七軍三料價毋得將别項動用十三年議準漕船十年滿號舊例照額船數目凡額船十船每年成造一船嗣後如滿號之船尚可加修出運仍令其加修出運一二年逮至朽腐不堪準其成造不必泥於加一之數十七年題準漕船載米不過四百石入水不過六捺空船以四捺為度十九年覆準造船料價既有額支之銀其清出丁銀槩飭解部又覆準定例停運漕船雖然限滿未經運糧仍令加修出運二十二年題準各省漕船載正耗米共五百石土宜六十石二十六年題準各省漕船仍照各衛所見運船數成造十分之一又題準各省歲修銀多寡不同今酌中畫一通漕一例每年出運一船給修費七兩五錢二十七年題準各省修船銀定例在糧道庫內支給報銷其江安蘇松等處修艌銀向繫各衛官軍於過淮時造報總漕批給今酌議停其解淮統歸糧道給發其天津通州二處三修銀在通濟庫內支領三十四年覆準江西漕船每船準隨帶百石小船一隻過百石者不準隨帶又題準運船不足不早為僉丁補造又不設法雇募者降一級調用經管僉造漕船不力玩誤者罰俸一年衛所官解送漕駮船遲誤朽爛者罰俸一年五十二年題準回空船如遇煞壩濬淺未經進口給銀修艌俟開壩飛挽受兑雍正二年議準各省造船料價安慶新安宣州建陽金山鎮江蘇太鎮海等衛並江西各衛所船向例給各軍料價在本地方設厰成造湖廣各衛所船定例糧道將料價分發武昌漢陽二糧廳在於武漢二厰成造其江淮興武廬州鳳陽滁州徐州淮安大河揚州儀徴等衛船於江寧府及淮安清江等厰成造浙江各衛所船於仁和錢塘二厰成造山東各衛所船於淮安山東厰成造均隸船政同知管理其料價銀除動支額編民七軍三料價銀外倘有不敷或動關稅或動減存漕項並支剩行月銀或動輕齎及蘆課銀均漕臣臨時題請撥補今船政同知既經裁革應統歸糧道管理令運軍支領料價赴厰自行成造所有不敷料價即於道庫減存漕項銀內動支其蕪湖淮安杭州等關額供造船銀飭令解部又覆準糧船到次立即給銀修艌如運軍有事故者即著該船舵工修艌倘有遲誤以及虛領錢糧不修艌者總漕即將糧道監兑押運衛備等官題恭議處所領修艌銀仍著落運軍賠補三年覆準漕船料價令糧道如數親給如有侵扣等弊總漕將糧道等官題恭議處侵扣之銀嚴追入官四年題準湖北湖南見運漕船俟運滿十年一例請造其餘各省仍每年照十分之一咨部請造又題準山東不産桱木每年應造漕船先期造册報部隨給價豫往南省購辦如有浮冒扣剋等弊將該管道官題參其木料不堅實者著糧道賠造濟運又題準各省見存漕船數目準部行令徹底清釐今按江興廬鳳等衛原額漕船三千六百六十五號九分內灰石改折分灑帶運及減存船四百五十五號九分此外尚有新安等衛永減荒減積闕暫減輪減等百八十三船見運三千二百十船江西十四幫原額一千有三船內除并造減淺七十四船止存九百二十九船又有減存積闕二百二十一船實在見運七百有八船蘇太等衛原額六百四十八船內灰石灑帶減存一百有四船見在實運五百四十四船浙江額船久逺案卷無考照上年册開原奉單派千五百五十八船內灰石灑帶減存三百四十三船見在實運千二百十有五船湖北原額漕船並減存各卷於康熙二十七年焚燬無存見在實運二百二十八船湖南原額一百八十二船見皆實運山東原額並自備七百三十一船內輪流減存二十三船共實運七百有八船內自備船三百十有二號又協運河南原額三百二十七船內輪流減存三十九船見在實運二百八十八船天津右衛所原額自備旗船十九號內灑減船二隻實派出運自備十七船通州右所自備船二十號嗣後各省漕船將實在見運船數作為定額內除運軍自備船例不給料價及湖北湖南見運漕船俟運滿十年一例請造外其餘各省見運漕船每年將滿號之船均照十分之一咨部請造如有可以加修出運者仍令加修出運不得將尚堪加修之船冒請成造五年奏準催漕船按汛成造每船給銀三十七兩六錢三分三釐於稅課銀內動支又别於茶果銀內每歲支給小修銀二兩十年期滿照例别造八年題準排造漕船給過料價取具各辨軍並無需索剋減印甘各結送部覆核仍俟前項糧船過淮時令總漕親驗又題準山東及江南之廬鳳等衛成造漕船定例將舊船解厰充作裏料如並無底板解厰者交銀五十一兩又題準江西滿號漕船不堪加修者準其在北拆賣改造駮船將價銀解交糧道驗給親造九年諭江南江淮興武二衛運軍名下有應追鑽夫底料銀十萬八千一百餘兩此項自康熙四十二年至雍正元年前後共二十載各軍僉替更換不一見今著追之人未必繫當日領米之人其力既不能完未免有所拖纍且今承追接催各官參罰纍纍有礙考成亦可軫念朕思雍正三年以前拖缺錢糧之各案正在清釐豁免而運軍效力漕儲尤朕所加恩體恤者著將江興二衛應追造船夫役及底料銀悉行豁免以示朕恩恤運軍之至意欽此又題準江興二衛因無贍運屯田又無什軍幫貼料價不敷製造造船夫役及底料銀仍應照從前支給之數給發除鑽夫銀五十兩原無增減其底料銀以十分計算每分銀五兩一錢若無底料者全給銀五十兩有奇或有底料不足則照不足分數補給在徴收餘丁協濟銀內動支奏銷又題準河南山東減存七十四船之內量存三十船以備兩省升科新漕撥補之需其餘四十四船停其製造又揚州衛二幫減存六十六船之內留三十二船其餘三十四船準其停造每船追底板銀五十一兩解部又題準回空漕船無需雙桅舊例令運軍賣桅木一根雍正三年奏準禁止嗣後仍準賣桅木一根以資路費又覆準漕船篷桅什物嚴禁通州木厰不許串通盜賣盜買十年覆準初次出厰之年槩不支給修艌銀惟江南省纍年獨支嗣後停其支給畫一遵行十一年覆準各省滿號漕船令糧道先期請造豫備物料原船到次即時興工倘隱匿不造及請造遲延將衛備恭革如將舊船掩飾及造不如式者將監造官衛備運軍究擬賠追糧道不親驗及徇隱不揭者并恭處十二年覆準湖北漕船將届歲造之期該撫將解部漕項銀豫年於季報册內酌定數目登明留備暫存道庫按限盤察至漕船輪造之年糧道於豫年冬兑時將各季報册內存留數目彚繕清册同該年應造軍船清册申送總漕總漕於重運漕船過淮驗看後即核明送部核覆該撫接準部覆之後將所需物料先期完備原船到次立即興工配造濟運其動用銀仍入各年漕項奏銷册內具題核銷又題準修造漕船擅自買補揑報完工及私雇民船出運者將該衛備及運辨恭革究擬乾隆五年覆準漕船遇有事故應賠造者回次之時即令遵例賠造倘有藉辭減歇違至次年興造者將督催衛辨照例題恭又覆準歲造新船當年不支三修銀惟各省賠造之船當年仍支嗣後一例停給六年題準湖廣糧船向俟通幫限滿一齊修造運料鳩工不免草率易於朽腐嗣後嚴飭衛備運軍務遵定例按式成造並飭糧道詳驗總漕於過淮時覆驗如有造不堅固出運七八年朽腐者據實題恭七年題準山東自備船繫運軍雇募修艌兑運不給三修銀但各軍先期定船修艌無力酌定每年雇船先於該軍應領折色月糧內每船先發銀八兩以資修艌如遇減運於各軍應支四分之一苫蓋月糧內扣抵八年題準湖北適遇截漕減歇應將減存九十餘船於乾隆九年按限配造又覆準定例漕船造不如式監造官辨及糧道皆有處分惟賠造船不合式者未經酌定恭處恐草率塞責嗣後賠造之船務照軍船式樣成造倘有短窄及板木不堅厚者將監造官辨及糧道皆題恭究擬又題準湖廣漕船滿號之年總漕於重運回空時親加驗看擇其堅固者加修出運一次準其留通變賣五六年事故賠造之船於足運後細加察驗如實繫堅固令其再運二次咨部請造所有舊船準其留通變賣倘賠造足運之船已經朽腐該軍希圖二運之後可以變賣揑報堅固該管官察驗不實擅準出運總漕即嚴恭究處又題準山東各幫於額運漕船之外向設量存船三十號留備漕糧新升及不時撥補之用今應裁汰倘有新升漕糧照自備運船之例雇船運送九年題準留通變賣之船沿塗遇有失風事故旋已修造堅固將米分於通幫代運抵通者其船如即在塗次變賣將千總照例議處十年覆準浙江紹興前後兩幫漕船向繫加一成造緣奉十年滿號一例報造之文不能符合加一之數嗣後每幫每年留歇八船將米分各船加載遞年輪運輪歇以符歲造加一之數其輪歇之船即以滿號留存配造不準支給三修十一年議準揚州衛二幫量存船二十四號原屬虛糜曠設理應裁汰因江興二衛有貧疲軍船將江興三七八幫察明實屬貧疲軍船照數裁減即將揚州衛二幫應裁之船留存抵補又覆準湖北湖南買補足運之船俟抵通交糧之後準其留通變賣將所賣價銀令坐糧廳就近驗明封交隨幫攜帶回次由糧道驗給各軍以為增造新船之用十二年覆準江興二衛幫軍貧疲將漕船千一百八十四號內察明實屬貧疲不堪駕運者按照加一裁減裁船底料照例變價並將裁船應得之行月漕贈銀米分給存運各船以蘇軍困又覆準廬州衛三幫輪減漕船與揚州衛二幫量存輪運船事屬相同全數裁汰以省糜費將裁船照例變價十三年覆準湖北湖南同省湖北漕糧比湖南少八百餘石漕船多於湖南四十六號船多米少每船應得耗米水腳等項較少事例既不畫一運軍未免偏枯將湖北裁汰四十八船存船百有八十均裝額運漕糧仍將各船應運漕糧應增銀米各數目造册送部察核裁船底料照例變繳報部又覆準江廣二省失風漕船如果不堪戽修該地方官辨據實察驗出具並無揑飾各結呈報總漕咨部準其折板變價其變價銀令地方官核數封固交該幫運辨呈明該省糧道驗發十四年覆準徐州衛河南後幫歲造漕船向在淮安清江浦船厰成造駕赴河南衛輝水次兑糧程塗遙逺渡河過閘守候風汛有需時日恐誤兑限今酌定在於臨清設厰成造凡遇滿號之年令各軍於歲前自備價銀並飭辨軍先行購料俟準造之日照例於江安糧道庫銀內給發料價成造一駮船順治初年定漕船至天津起駮分運至通設紅駮船六百隻每船給田十頃收租贍船免其徴科康熙三十九年題準紅駮船年久破壞不堪運糧裁革變價原給之田按畝起科歸入地丁奏銷案內起運仍照原收租數分派各省於漕糧項下編徴解糧道庫支發運軍漕船遇淺之時自雇民船起駮四十六年題準紅駮銀照實在抵通船數就近於通濟庫銀內支給倉場侍郎將給過銀數造册奏銷雍正十年覆準漕船遇淺雇船駮運例繫坐糧廳酌定雇價但船戶皆繫州縣百姓不屬坐糧廳管轄不遵約束多索運軍勢所不免應令天津以北各地方官計道里之逺近酌定工食之多寡先期出示曉諭如船戶運軍不遵約束該地方官即行拏究倘地方官奉行不力巡漕御史察明恭處乾隆二年咨準漕船到通每船例給紅駮銀二兩以為雇船駮淺之用向繫漕船到通給發嗣後應於各幫將次抵通之日令隨幫千總率運軍赴領先行散給又咨準北河起駮漕糧向繫運軍自雇民船每多髙價運軍苦纍民船到通亦不免稅嗣後按照米數計程逺近定價多寡官為立契船戶不許額外勒索運軍不得橫奪裝載民船運糧到通免其徴稅如漕糧之外别攜貨物者仍按貨徴收九年題準漕船起駮於楊村等四處設立船行所雇民船較前多有遲滯已將船行悉行裁革嗣後各省幫船在北河起駮飭令運軍遵照定價自行雇募並令該管官不時稽察倘有船戶任意多索或運軍短給價直致啓爭端遲誤漕運者即按律究治十三年覆準紅駮銀每年額徴萬四千五百餘兩遇閏加增銀三百餘兩原給運軍為北河駮淺之用今議於北河增設垡船及􅙳淺夫不時濬淺使漕船米少起駮以免丁纍其置造垡船器具及夫役工食等項於紅駮銀內動支餘剩之銀仍照數分給運軍以備駮淺之用一帶運加給順治十八年題準各省升糧酌令每船分帶外其餘撥減船代運康熙五年題準江西漕船闕額原撥江廣幫船協運其軍船於原派一淺之外加載漕糧應按淺加支行月每石給銀一錢六分五釐十四年題準江南蘇松常三府白糧向來雇募民船受兑嗣後抽選漕船運白各船應載漕糧分於餘船帶運每加裝正米一石給負重銀五分二十五年題準浙江帶運漕米按裁闕船數每船給負重銀四十八兩江南每帶運米一石給負重銀五分浙江所給較之江南數多應照江南之例每石給銀五分二十九年題準山東河南湖廣原繫按米派船向無加裝漕米支給負重之例今湖北帶徴漕米撥用減存船餘米分派各幫帶運其撥用減船行月席木等銀準其照例支給至加載漕米不準支行月及貼運銀米三十三年題準停止江廣協運江西漕船原派漕糧令本省運船加增載運其加裝漕米行月仍照舊例按石支給雍正四年題準山東緩徴漕米各軍雇募裝運照依南漕搭運之例每石給負重銀五分乾隆六年題準湖廣程塗獨逺如重運已經過淮失事者回次之時業屆受兑新漕賠造不及準其暫減一半從容修造完固再令出運其本年應運正耗漕米即分於通幫附搭運通交納若未經過淮失事者去受兑之期尚逺仍令於本年趕緊賠造以濟新運十二年議準江南江西浙江失事漕船如果開兑期迫實繫不及賠造將本年漕糧分於通幫帶運即責成運軍賠造新船一雇募民船順治四年題準各省漕船闕額雇募民船裝運運畢之日不必催令回南聼其自便九年題準各省雇募民船水腳江南蘇松安廬並江西浙江等處每石自三錢至三錢五分揚州府每石給二錢五分均於月糧耗米並輕齎銀內動給十年題準各省凍阻闕船設法雇募待冰泮趕催接運十一年題準雇船水腳全動輕齎倘有不敷於減存行月內動給十二年題準雇募水腳令漕督於輕齎銀內支發不許抵算到通起缺康熙十八年題準山東漕糧若議裁别省協運船責令一年兩運倘遇水旱難以轉回應令别僉殷軍自備雇募船二百三十餘隻共為一運二十年題準浙江雇船至淮每石給腳價銀一錢三十四年題準各省升糧既多停其帶運總漕將升科糧數豫先題明撥船載運四十四年題準江西募船到淮每糧一石給腳價一錢二分米四升五十一年題準回空遲延之船不能依限到次者應運新糧由總漕稽察將該省減存船兑運如無減存船於本省漕糧搭運或本省船不能搭運即捐雇民船依限兑運開行回空阻滯之船於來年開凍時沿河文武官飛催迎淮受兑北上如有不設法雇船依限兑開將在南之糧道監兑州縣等官題恭議處如遲滯船不能迎淮受兑有誤北上即將在北沿河催趲回空文武各官題恭按違限時日分别議處雍正元年題準各省回空漕船若有凍阻者雇募民船兑運抵通不必迎船接換二年諭聞今春丹陽縣及常州府等地方漕船沿塗遇淺槩拏商船起駮且藉名需索貪暴公行得賄者雖空船亦行釋放不遂其欲者抑勒當差有將貨物行李拋棄河干紛紛露積或為風雨所損傷或為盜賊所窺伺該管漕運文武官辨漫無約束毫不經心小民營販資生何以堪此擾害江南總督巡撫總漕繫地方大吏皆當實心體恤稽察周詳奉諭之後若再用起駮當各嚴飭所屬官辨申明約束不得仍蹈前轍欽此又題準漕船並不照額數出運各軍夥雇大船裝運其糧道押運領運等官不詳明少船情由溷報開幫者照徇庇例議處乾隆元年題準自備船例不支三修科價僅給重運銀令其雇募若令回空未免拮据嗣後每年於八月內責軍雇募免其回空二年題準各省雇募民船抵通交糧之後倉場侍郎按其回南水次逺近日期每軍給以空身限單一紙勒令及時回次仍將限單彚送該管糧道察驗四年題準山東漕糧於十二月初旬兑竣開行自備船於八月內雇募運軍多費雇價嗣後寬限一月每年於九月內雇募候兑令糧道察驗倘有遲延即行揭恭又奏準各省重運漕船凡經過地方倘遇天旱水淺萬不能通行之時總漕總河一面奏明一面飭地方官豫備民船駮運將駮過各幫運軍姓名船米貨物數目以及給過船價呈報督撫漕河諸臣及巡漕御史備案其雇募駮船價直官為酌定給發如有運軍扣剋及船户額外勒索者即行究治十二年議準山東河南漕船不比江廣寬大難以責令帶運如失事漕船臨兑賠造不及應運漕糧雇募民船裝運一次仍令勒限賠造接運一白糧運船順治十年覆準漕糧有官造漕船裝運白糧無船每至臨期雇募民船稽遲時日應照漕糧之例攢厰造船給發州縣兑運十一年恩詔白糧民解纍民官解仍以纍民今後於該省漕船分帶以省官民之纍欽此十二年覆準白糧令漕船灑帶恐舂辦束包不能告竣於朝夕責之民則仍加苦纍責之軍則分身無暇應照舊仍令官運十七年覆準白糧運至丁字沽起駮緣漕糧先行白糧繼後每年凍阻故於丁字沽駮運今漕白兼行無分先後自應與漕糧一例原船徑行抵通不許仍於丁字沽換駮永著為例康熙三年覆準浙江白糧用漕帶之法需船百二十六號除六十二號於漕幫內抽出裝運外實應增造新船六十四號并入漕幫僉運十四年覆準江南蘇松常等府白糧照浙江之例抽選漕船運送每船裝運五百石擇運軍殷實船堅固者抽選裝運五年一次更換四十二年題準蘇松常三府白糧於回空無缺之江淮興武等十一幫內無論已運未運簡選殷實運軍堅固漕船五年一次輪運毋致違誤五十六年題準停止輪運雍正四年題準白糧運費多於漕糧仍照舊例於通省漕船內抽選堅固者並纍年無缺殷軍公同掣運五年一次更替如有挂缺即捆打革運追賠照監守自盜律治罪乾隆元年題準江南運白糧船例於通漕船內抽選五年更替但五年之內運軍消長不常致有軍力漸疲運船朽壞之弊嗣後於每年未兑之先責令糧道赴次察驗如運軍力疲船不堅固者别選殷軍補運二年覆準蘇太松常四府州原運白糧二百九十三船今減徴白糧改徴漕糧應減白糧船百五十有七仍令兑漕實起運白糧船百三十有六蘇州府前幫二十有九後幫二十有六共船五十有五應歸并一幫松江府四十五船為一幫常州府三十六船為一幫船數適中應仍其舊又題準浙江原額白糧內改徴粳米即以原運白糧之船領運改徴之米嘉興府屬白糧幫七十六船以三十八船運白三十八船運粳湖州府屬白糧幫五十船以二十五船運白二十五船運粳下次則以今次運粳之船更換運白運白之船更換運粳各半分運遞年輪換七年題準浙江白糧幫船於康熙四十三年題定五年抽調因該省運白各軍挂缺頻仍别軍懼纍不願抽調以至纍年並不遵行至雍正十三年行令仍照康熙四十三年之例但漕白各幫均不願紛更抽調嗣後浙省白糧照舊撥定軍船永逺運送免其抽調十六年奏準江南運白各船從前原議於通省漕船內抽選兑運五年更換但為期太久自宜稍為變通嗣後江蘇運白船定為三年抽調仍照例於通省漕幫內遴選軍殷船固纍年無缺以及並未運過白糧者抽換兑運倘該道衛等違例遴選即行恭處一總漕督漕運順治初年定設漕運總督一人駐劄淮安十二年覆準漕運錢糧盡歸糧道專管其他省協運官軍各該管官將支給行月雇募等項造册移送彚報總漕送部察核康熙二十二年諭漕運總督管理船糧是其專責過淮及回空時令漕督親身往來催趲不致貽誤欽此一巡視漕運順治二年覆準前明漕運設旗甲以挽運之設運總以統領之設漕道糧道以督押之設總漕巡漕以提衡巡察之業已犁然具備况江南初定法制未遑漕運一事無如仍舊為是七年議準漕糧每歲開兑之時各糧道即將該管糧船自為首尾督押把總運官隨幫前進互相訪察並責成沿河各道及管河各官不論兵丁士庶盜賣漕米立時拏報該管撫按及巡漕御史題恭究問倘該管境內盜賣事發該道河官聼巡漕御史糾恭治以不職是年裁巡漕御史又奏準重運漕船抵通交卸例聼巡漕御史督押回南今巡漕御史已裁應自通州起即將原來運糧起卸船交明密雲道押到天津交割明白仍前督押出境自此而南武德東昌各道照前督押直至濟寧呈報總河給發牌票責成沿河各道逐程督押出境至淮安呈報總漕至江寧呈報江南總督至杭州呈報浙福總督各照前責成各道逐程督押交割該管衙門接濟新運如有短少及攬載遲滯將原領官旗察明治罪督押各道一并議處又覆準督押回空向繫巡漕御史職掌今巡漕既裁應責成各兵糧道逐程分押催令星速回南如各船沿塗遲滯有誤新運將該道恭處雍正七年諭朕聞糧船過淮所費陋規甚多嗣後著御史二人前往淮安稽察不許官吏人等向運軍額外需索以致擾纍其糧艘中攜帶物件除照例許帶外如運軍有夾帶私鹽及違禁等物者亦著該御史稽察但不得過於嚴刻吹求以致糧運遲滯至糧船抵通之時其該管衙門官吏及經紀車戶人等恐有向運軍額外需索陋規者亦著差御史二人前往稽察淮安於二月初差往通州於三四月內差往不必拘定滿漢各一人著都察院按期開列請㫖欽此十一年題準嗣後淮安巡漕御史於年前十二月間命往稽察十二年題準嗣後巡察南漕御史令於漕船過淮出臨清之後隨漕沿塗稽察直抵天津如有運河水道石塊木樁該管官察看不實起除不淨以致抵觸漕船及官辨需索稽留等弊即行恭奏乾隆二年題準巡漕御史四人以一人駐劄淮安巡察江南江口起至山東交境止一人駐劄通州巡察至天津止一人駐劄濟寧巡察山東臺莊起至北直交境止一人駐劄天津巡察至山東交境止各按所巡地方巡遊訪察剔除諸弊一分省漕司山東江安蘇松江西浙江湖北湖南各設糧道一人河南以開歸鹽驛道兼理康熙二十二年山東漕糧改折裁糧道官二十九年仍徴本色以開歸鹽驛道兼理順治十年題準各省糧道職掌漕務别衙門不得干與有勢要把持及不服鈐束者指實恭奏十六年覆準糧道專司漕運諸務督押過淮盤驗後即令回任料理新漕除山東河南糧道照舊押運抵通外餘省令總漕巡撫於本省管糧通判中遴選一人督押抵通十七年覆準糧道不得别委俾得專司漕務毋誤職掌康熙十年覆準荆州等四衛軍船武昌左衛增補漕船聼湖南糧道催運武昌等六衛所軍船聼湖北糧道催運雍正四年題準糧道皆有公事辦理若令押船過天津諸事必多遲誤應令總漕於江蘇二糧道內每年委一人親押過山東入閘俟江南糧船盡數過淮即回本任一監兑漕糧山東以武定府同知濟南兖州東昌泰安曹州五府通判河南以歸德衛輝懷慶三府通判江南以江寧蘇州松江鳳陽四府管糧同知蘇州安慶寧國池州太平廬州揚州七府管糧通判松江鎮江徐州三府糧捕通判淮安府軍捕通判浙江以湖州府同知杭州嘉興二府通判江西以南昌吉安臨江三府通判湖北以武昌漢陽黃州安陸德安荆州六府通判湖南以長沙衡州嶽州三府通判康熙六年題準向來漕糧專以府推官監兑凡米色之美惡兑運之遲延及運軍橫肆苛求衙役需索姦蠹包攬攙和等弊皆責令監兑官嚴行禁戢今各省推官既裁監兑事宜委府同知通判照推官例舉行五十一年題準監兑官務令坐守水次將正耗行月搭運等米逐船兑足親督到淮聼總漕盤驗雍正元年題準漕糧開倉將兑之時委定監兑官不得以别項公事差委七年覆準漕糧開兑之期監兑官親赴水次驗明米色純潔與押運官面交糧船開行之後仍令親押到淮聼總漕盤驗如有糧數不足米色不純照溺職例議處一押運府判山東通判一人河南通判一人江南通判七人浙江通判三人江西通判二人湖北通判一人湖南通判一人順治十六年覆準江浙漕運令總漕會同該巡撫於管糧通判內每省遴委一人專司督押管束運軍嚴加防範以杜沿塗侵盜攙和等弊康熙二十九年議準押運官不得攜帶侍妾優人及多帶童僕其餽送積弊盡行革除仍將管押幫船自開行日期計程嚴督催趲三十四年題準嗣後漕船回空應令通判管押如徑從陸路回南照差遣官枉道例議處押空過淮遲誤照重運過淮違限例議處雍正四年諭押運同知通判抵通之日著總督倉場侍郎送部引見欽此乾隆元年題準江南向設押運官五人江西向設押運官一人船多人少前後遙隔未便稽察應於江西增委一人江南增委二人該督撫遴選委用分幫管押一應抵通回空均令沿塗稽察議叙議處悉照定例二年題準山東漕糧於泰安武定曹州三府同知通判內遴委管押凡閘外先進糧船閘內抵通回空糧船以及輪押薊糧並監兑等事與濟南兖州東昌三府管糧通判一同辦理三年議準押運官引見後部內給與限單趕幫督同前進到淮總漕察核有違誤逾限即行恭處四年題準籤算漕糧之法其間伸縮盈虛易滋弊竇嗣後籤量盤察之時著漕運總督親率善算之人赴船細核一應無事人等毋得多留在倉如有勾引滋弊者立即嚴拏究處六年題準山東東昌府上河通判向繫專理運河河道工程兼管聊城等十四州縣糧務該員事務紛繁難以兼顧應將聊城等十四州縣糧務改歸東昌府清軍理事同知管理七年題準重運過淮之時令淮安府糧捕通判協同漕標營將秉公籤驗倘籤驗不實有辨丁營役舞弊營私該督即行題恭九年題準籤盤營衛互用於籤盤之日拈鬮勻分著為定例總漕及巡漕御史照此稽察如有改易成規即行恭奏十年咨準松常二府船糧即令各府監兑府判押運抵通蘇太二府州所屬之長洲元和吳吳江震澤五縣船亦令監兑之管糧通判管押北上其常熟昭文崑山新陽太倉鎮洋嘉定寶山等八州縣及鎮江府屬船糧將應委增設押運官二人先期委一人豫赴常昭等處水次一人豫赴鎮屬各縣水次稽察船糧催督開行趲押抵通其米色行月上船等件仍責監兑經理兑齊開行之時將各官管押幫船數目造册報部十二年奏準湖北糧船無多不需多官料理於六府通判內裁減三人一沿塗催運康熙元年題準淮北淮南沿河鎮道將領等官均有趲重催空之責漕船入境各按汛地立即驅行毋使停滯如催趲不嚴以致糧船停泊及縱運軍登岸生事聼所在督撫題恭二十六年題準江南京口瓜洲渡江相對之處令江鎮道董率地方文武官遇有重運亟催過渡並令京口總兵官巡視河干一同催護過江如遇大風督令標兵操舟豫備遇有船及江心不能近岸收口者設法挽收三十六年題準京口總兵奉裁催護漕船即令副將管理四十五年題準漕糧至臨清德州等處河水淺阻山東巡撫簡委賢能官自濟寧隨押督催遇淺疏濬催出山東地界將出界日期奏報如催趲不力照例題恭五十一年題準各省空重漕船有在淮揚以及蘇松南河遲延者江南巡撫取催趲不力並押運領運官辨職名題恭其在淮安以至天津北河遲延者總漕倉場侍郎行文各該督撫取專催督催不力各官並押運官辨職名題恭雍正三年奏準天津至通州沿河各有汛地遞相催趲倘前汛不行力催有礙後船及漕船到汛不親赴河干並坐視前船阻滯不行申報者倉場侍郎題恭四年題準天津關內舊設三十八汛沿塗趲運今以蔡村以上每五里造船一隻蔡村以下每十