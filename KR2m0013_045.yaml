勿許竄入民籍責令該管糧道分别造册五年一編審倘有朦溷不清及受賄擾民者指名題恭康熙四年題準衛所內倘有不法强徒强索民閒富戶與逺年絶軍同姓者幫貼運費總漕督撫嚴察究治二十二年題準運軍不許投竄别差倘有避運投旗隱漏不報者總漕即行題恭二十五年議準各省衛所運軍舊例每船自十名至十一二名不等今酌定每船額設十名各省一例僉差二十六年題準運軍不親押運以子弟代運者定例將運軍及代運之人發邊衛充軍嗣後將該管官辨一并分别議處三十五年覆準漕船出運每船僉軍一名其餘水手九名雇覓有身家並諳練撐駕之人充役如有濫充以致侵缺者將僉軍不慎之官題恭四十一年題準江南江淮興武二衛無贍運屯田原減駕軍二名準其照舊增設四十五年覆準全漕杜缺務在僉軍須用殷實誠厚之人僉軍之例親僉責在糧道舉報責在衛守備用舍責在運辨保結責在通幫衆軍一軍無保不準僉運一軍有缺衆軍同賠五十一年題準每年於本軍子弟及兄弟之子再僉一人為副軍隨運如抵通缺糧留本軍追比令副軍駕空回南如重運到淮短少令本軍駕運北上留副軍買米趕幫又覆準每幫十船連環保結互相稽察如有折乾盜賣等弊有能出首者酌量賞給如隱匿不首事發本軍照律治罪其餘九軍一同責懲所缺米數即令買補運通又題準僉差運軍必須千總保結呈報衛備府佐等官驗看加具印結如有缺糧者將各官一并恭處五十二年題準湖廣僉軍責成衛備其道府府佐二官照舊驗看加結五十三年題準江西屯田悉歸州縣管理其僉差運軍即責令州縣保結六十一年題準糧船回空額設副軍務令親身押空其雇募頭舵工及水手取具互保各結報明該管官存案雍正二年議準衛所等官僉差運軍致令差役擾害地方又或以徴收錢糧為名藉端科派者該上司題參照例議處三年題準各省幫船雇募水手及頭工舵工責成衛備及領運千總令前後十船互相稽察並取本軍甘結十船連環保結一船生事十船連坐糧道及押運等官沿塗稽察並許地方官㑹同察訊倘有隱匿不報者總漕察出一并題恭若總漕不題恭别經發覺者將總漕一并交部嚴加議處六年奏準舊制凡軍籍內身家殷實堪充運者槩行句僉並以十名為率舍二軍八著為定額其各衙門書吏承差及生員餘丁皆在僉運之內嗣後除文學生員專攻舉業者準其優免外其援納之俊秀貢監及武生均一例僉運如武生遇歲試之年呈明學政運回補考八年題準沿塗短縴夫聼運軍臨時酌量雇募沿河地方鎮備等官加謹巡察匪類並將短縴夫役俟糧船過完驅散回籍又題準各省衛所於糧船未經抵次之先務選殷實運軍秉公結報驗看注册俟糧船回空如領運之軍有犯事故者即將注册軍名僉補倘有僉選不實或賣富差貧將經僉看驗各官照例題恭乾隆八年題準江淮興武二衛運軍每有竄入黃快船內躲避僉運之弊嗣後黃快船丁仍歸民賦項下辦理將見運及備僉餘軍逐一句考每戶下將子孫兄弟及兄弟之子若干並住居州縣都圖鄉鎮逐一開注五年一次造册送部稽察如有隱匿察出將該軍按律懲究該管官照例參處一漕船交兑順治七年題準官丁兑米入船即將所載米數懸於倉口聼糧道不時察驗以杜盜賣九年題準漕船到次嚴刻限期隨到隨兑隨兑隨開不許久戀水次不得守候全幫藉端遲延十二年題準運軍兑糧交兑明白出有完糧通關過淮虧少責在運軍不得牽纍糧戶違者嚴究治罪又議準徴收漕糧定限十月開倉十二月兑完如州縣衛所等官船到無米或有米無船過十二月者罰俸半年過正月者罰俸一年過二月者降二級留任十七年議準各州縣漕糧總漕頒發全單糧道頒發號單開明船米數目刋定贈耗分發各州縣每兑完一單著令衛官填注收數一船兑足即出給水程勒令開幫又覆準漕兑首重米色其有倉蠹作姦攙和滋弊責成監兑官核驗究處如米色果繫乾潔辨軍故意勒索即按法重處十八年議準收兑漕糧糧道先將各衛軍船分定前後臨兑之時州縣懸牌挨次輪兑不得陵越康熙二十八年題準漕糧兑運事竣定例將兑完過淮日期並船糧細數奏報巡撫不得過二月漕司不得過三月河道不得過四月嗣後各省漕船開行之後巡撫即具疏題報如遲至二三月始題者恭處五十年議準監兑漕糧未經兑完揑報兑完或漕船未經開行揑報開行者降二級調用督撫不題恭察出將督撫糧道監兑文武各官一并從重議處五十一年議準監兑官務令坐守水次將米逐船兑足同糧道親押到淮盤驗如有短少審明題恭仍留運軍子弟或兄弟之子一人交與監兑官購補足數雇船趕幫取具押運等官甘結呈報總漕察核五十四年題準各州縣交兑漕米舊例照取四升裝成二袋用印封固解送倉場驗收嗣後水次兑糧每船裝米一石糧道親驗鈐印加封到淮之日總漕拆封對驗加封抵通倉場侍郎率坐糧㕔驗明起卸其樣米仍作正收受雍正元年諭江西省産漕各州縣運糧到省又自省倉運上軍船故有腳耗扒夫修倉鋪墊等項編載全書歷來支給已久自康熙二十三年部中誤駮不準支給行令追還嗣後一例駮追究無完解至三十四年聖祖仁皇帝特頒諭㫖將從前已經支給者均免追賠恩至渥也至康熙三十八年部議又以腳耗與扒夫等項分晰未清仍令扣追不知腳耗乃貼運之總名扒夫等項乃支給之細數其實一事非兩項也自康熙三十八年至今已二十餘年應追銀五十一萬餘兩米六十一萬餘石積纍既多究無完解追比日久官民均受其纍朕知之甚悉著將從前積缺盡免追賠嗣後準其支給以副朕加惠黎元體恤有司之意欽此又議準漕糧開兑開幫之日總漕務將各糧道所屬糧船數目運軍