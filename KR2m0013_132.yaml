罪例議處九年奏準壇廟工程物料銀二百兩工價錢五十串以上者太常寺自行奏明咨部委官㑹同估修其銀不及二百兩錢不及五十串者咨部即行㑹同辦理照例奏銷一監工官員康熙二十二年題準修理工程管工官員筆帖式估計浮冒者題參議處匠役交刑部治罪三十九年諭工部每遇工程或瞻徇情面委官監工多由請託其具題册籍止開總數並不詳開細數且修造不堅於三年內倒壞亦未定有監修官賠修之例是以官員皆茍且塞責虛糜錢糧此後凡遇工程必簡賢能司官引見委用務令堅固修造三年內倒壞定例令其賠修每月具題册籍將監管工程司官職名及物料估計支用錢糧逐件詳明分晰細數造册具奏倘有估計浮多支取扣剋等弊察出定行重處欽此遵㫖議奏一應工程匠役工價銀百兩以上者部簡賢能司官引見候㫖令其監造如工程不堅三年內倒壞將監造官革職戴罪勒限賠修工完開復不完革任著落家産賠補竒零工程仍照舊委官㑹同該處官員監造用過錢糧每月逐一開明具題料估浮多者官員交部議處作管交刑部治罪奉㫖從前完過工程若三年內倒壞者亦照此例令其賠修五十八年奏準一應工程部選賢能官料估核算再掣籖别委司官筆帖式作管修工不必交與原估官承修以杜冒銷雍正二年覆準一應修理工程令該修理處委官㑹部公同料估監修工完仍别行委官察驗如有浮冒即行參處其浮冒錢糧催追繳庫七年奏準各司案件必廉敏練逹之人専司坐辦則大小事件始末原委得以詳盡若槩令兼辦工程轉恐顧此失彼請於滿漢司官內選才具優長勤敏辦事者司各二人責令坐辦並將善於翻譯之筆帖式酌量選委以供翻譯校對其餘各官量其才之短長分别工程大小輪流經理凡銀數在百兩以下工程量選勤敏之筆帖式分辦至各項解送差委司官不敷亦擇才能筆帖式委署主事同見任司官一同分委一料估康熙十九年定各處工程經都察院察核者停其豫估具題同內務府修理者仍照例題報四十三年奏準凡一應修理匠夫工價銀至五十兩以上者各該處料估具題㑹部公同監修三年內倒壞者令其賠修至竒零工程仍照常委官修理雍正七年奏準向來一應工程皆委出之承修官自行料估是以易起浮冒嗣後専設料估所凡有工程皆先期料估核定别委能員承辦俟工竣日仍令該所協同承修官據實詳核按工銷算其應需官吏即於四司內簡選滿漢司官四人筆帖式四人書辦六名如二年內所估工程一一詳明確當别行奏聞量豫議敘如通同徇私作弊或經察出或因首告即行題參將該所官吏交部嚴加治罪八年奏準各省題銷事件工程作法物料價直未有一定成規令各該將軍督撫將工程緩急物料貴賤確訪本處市價造册具題以備稽察乾隆四年諭百工物料價直原屬隨時增減各省不同即一省之中各郡縣亦不畫一今豫定數目永遠一例遵行則價賤之年必有餘資以飽官吏之私橐弊在侵漁錢糧為害尚小若價貴之年採辦不敷勢必科斂閭閻弊在苦纍百姓為害甚大惟在各省督撫遇有辦理物料之處留心訪察詳確綜核既不使承辦之人恣意浮冒虛糜國帑又不至苛刻從事過於減少致滋賠纍庶為公平之道又豈豫定程式所能杜絶弊端乎欽此遵㫖議準價直定例誠難遵行但所需物料均照時價估報倘承辦各官有未能實力奉行轉藉時價低昻任意輕重在部既無成案足憑又無成規可照恐滋弊端請將各省所造物料價直册籍仍存部以備參考嗣後一切修建不必拘泥定價令該督撫轉飭承辦各官悉照時價確估造報工竣别委官察勘取具並無揑飾印結詳報該督撫等確訪時價詳細核明據實題咨由部核銷倘承辦官浮開揑報照冒銷錢糧例指參委官察勘不實亦以扶同徇隱例參處至京城物料等項價直定例有年復於乾隆元年由部會同內務府確訪時價酌中更定似無過寬過刻之處即時價偶有低昻亦令承辦官據實聲明聽部就近察訪酌量辦理五年奏準由部將用工用料作法定例陸續頒發各直省七年奏準各省估報册籍仍不能按照作法造報恐用工用料款項繁多未諳者不免遺漏舛錯復頒發簡明作法册式使修建一切工程易於遵守十六年議準各省一應工程緩急不同河工隄岸關繫民生應修之工固難稽遲時日而城垣倉庫修坍補闕若必俟估册覆定方準鳩工則坍塌愈多滲漏愈甚其事實有難行至其餘工在可緩而估册違例者原可先行指駮嗣後各處工程於題估時即悉心酌核如繫緊工則令其一面興修於題銷時察核若屬緩工而估册違例者則就估册指駮俟估册核定始準興工工完報銷之日如悉與原估相符按例準銷無庸駮減或工程改易有增估續估之處令其先行報部於報銷册內詳細聲明聽部察核十八年議準直省修建工程有緩急之分緊工一面估報一面興工工竣據實核銷緩工先照估册核定然後興工今本省估册合式者甚少一經部駮動逾歲月不特案牘滋繁抑且工程遲緩嗣後緊急工程照舊辦理其餘一應工程於興工之前皆令先造估册送部俟部覆準修理即行興修完竣之後别造實用工料清册委官察勘具結報銷一核銷康熙十年議準凡建造工完將原估核減實用存剩錢糧數目分為四條繕造黃册具題四十年題準嗣後如有大工程需用銀萬兩至數萬兩者其柴炭繩席鐵料等項需用萬兩至數萬兩者均令專册奏銷不得彙於雜項一并造册雍正十三年覆準各省工程報銷册內有洗補增注字均用印鈐蓋并於册尾將用印數目登注其錢糧總數亦一槩鈐印倘有遺漏將造册官題參議處謄繕書吏按律治罪乾隆五年奏準在京工程採辦物料各承辦官遵照定例發銀如有贏餘並無别項需用竟行侵蝕入己者一經察出照冒銷例參處倘其間或有匠作搬移等費許將緣由呈明以聽核奪如該員並不呈報竟行開銷經部察出即將情由察明參奏交吏部照應申上而不申上律罰俸九月九年奏準各項工程原估修十丈者工完止有九丈即應將少修工料扣除辦買物料向例直銀一兩今按時價止需銀九錢即應照依時價扣除均不得謂之節省至如所用匠夫原估見行作法應需匠十名今工竣止開九名應需夫十名工竣止開八名此乃實在節省嗣後工程凡有核減其實非節省者應仍照數著追若實繫節省方準其照數抵銷至於自行墊銀一案各省報銷册內開報甚多著該督撫等飭令承修官照原估興修據實造報如原估工料實有不敷必需加增者亦必先事估報即或工程緊急勢難緩待亦應一面興修一面委官確估報部不得任承修官浮開墊用如有續估工料不豫行報部遽於報銷册內聲稱捐墊完竣即本項內有核減銀亦不準抵銷十六年議準各省報銷册有有意浮冒違例多開者亦有不諳册式分晰未明者向來由部按款開單指駮令其别造妥册報銷但册籍繁多所開之單不得不歸簡要而外省官吏或自護前非計圗塞責或不能細心理㑹以此例彼按單減造故續造之册仍有未妥勢必往返駮詰致多塵案嗣後報銷册到部如駮款繁多開單不能詳盡者就原册將應駮之款多黏浮籖詳細指示即將原册發回令其照籖改正别造妥册同原册一并繳部察核如駮款無多易於聲說者仍照舊開單指駮令其照單聲明無庸别行造册並核明各册除開單黏籖之外如餘款並無牽制即可先為銷算應準者即準銷給發應減者即核減著追餘俟别册聲明到日再行核結至有工程本小銀數無多者款項雖未清晰自可酌量核算如有浮多即核減令其追繳不必往返駮詰耽延時日十七年覆準各省工程向來報銷止造細册一本核算之後將册存部備案是以止將核減數目開單行知或有仍難理㑹之處嗣後直省報銷工程均令各該督撫等造具正副二册送部核算有應行核減者即將核減款項數目於副册內逐一注明鈐印飭發該省備案遇有别工造報即照式畫一辦理又題準凡在外各處修造百兩以下者由部注册年終奏銷百兩以上者工完日開明工料數目送科道詳勘如有浮冒即行題參又議準各部院遇有修造由部委官估計核定工料具題交管工官修理工完日將實用過銀錢物料及節省餘剩銀錢物料數目具題造册送部銷算一報銷期限康熙二十八年覆準內工所用錢糧萬兩以下千兩以上者自完工日起限八十日內令管工官核明報部外工所用錢糧科道官稽察相符到日萬兩以下限八十日五萬兩以下限百二十日十萬兩以下限百六十日十有五萬以下限二百日二十萬以下限二百四十日核明報部銀數多者照前加限其清册到部由部察所用銀繫萬兩以下千兩以上之册限五十日具題五萬以下限七十日十萬以下限九十日十有五萬兩以下限百有十日二十萬兩以下限百三十日錢糧多者亦照前增限具題完結如管工及銷算各官不能如限完結皆交部議處五十九年題準凡遇緊急工程給發管工官清字文卷完工之日令管工官於四十日內呈遞料估該司官於四十日內核減銷算有應繳錢糧者亦於四十日內繳庫倘有逾限不繳及限內不徹清字文卷者即行題參雍正七年奏準嗣後遇奉㫖修理緊急工程不及先行料估核算者酌量工程之大小部給錢糧委官速行修竣呈報自工竣起限十日內呈遞銷算清册限十五日內該司核算呈堂如有應繳錢糧限五日內交庫其銷算清册或有違限照事件遲延例交部議處應交錢糧不依限交庫照侵蝕例治罪該司官不據實呈明照承追虧空不力例察議至一應尋常工程所需物料工價銀二百兩以內者定限一月五百兩以內定限二月自千兩至二千兩以內者定限三月三千兩至五千兩以內者定限四月如五千兩以外再有加多至三千兩以上者加限一月均令按限如式完工亦於十日內呈遞清册或有續估之處則按請領錢糧日期逐案報銷不得前後牽溷至銷算日期及應繳錢糧亦照前議定限如所用錢糧至二千兩以上者準於十五日外加限五日萬兩以上再加限十日核算明白即行照例題銷其二百兩以上者彙册題銷凡一應工程除盛暑隆冬奏明暫行停止外或有不依定限完工者照玩誤工程例議處倘修理未完限期已迫而規避處分揑報工竣察出别行指參其有應繳銀不遵定限交庫即將該員參奏革職勒限四月移咨各該處嚴行催追限內完者準其開復逾限不完照侵蝕正項錢糧例治罪仍著落家産追完此外或有工程浩繁辦料維艱數至三萬兩以上别行具奏定限又奏準各項工程例應於工竣日繳餘剩銀向皆因循怠忽致多積缺雖已立定限催追不完參處之例但工程繁多若無專司催工之官恐積久怠玩仍蹈故習請增設一督催所鑄給關防以領其事應需官吏在於四司內選勤敏公直滿漢司官各一人筆帖式二人書辦二名令其照依奏準之例分别督催一有逾限即呈堂參處二年之內果能實心任事請㫖議敘以示鼓勵倘有瞻徇怠忽即行指參交部議處乾隆五年奏準各省工程均令該督撫酌量工程大小修造難易定以限期於估報案內聲明委官督催逾限參處倘有他故不能依限告竣分别題咨展限工竣照例造册詳報該管司道核對報銷如有駮核即按款按限補造逾限不覆以及駮核再三不行據實造報者該督撫核明指參并將該管之司道附參六年覆準凡應追核減銀照依雜項錢糧例計以年限著追如限滿不完將承追官初參降俸二級戴罪督催完納復參罰俸一年如承辦官遇有升遷事故於任所原籍催追限滿不完亦令該督撫等指名糾參交部分别議處十五年議準一應工程核減報銷腳價及一應缺項向照雜項錢糧之例察議此等亦帑項攸關不便任其遲延日月應將三百兩以下之案減為半年追完十九年諭外省動用錢糧及工程報銷應駮應準均有定例乃督撫往往於部駮後輾轉行文詰問不即刻期辦結或據屬官詳禀輾轉聲覆請銷而該部仍復往返駮詰以致塵案纍積逮經年久遠官吏迭更徒滋拖纍此向來相沿陋習殊非敬事勤政之道嗣後報銷之案符例者該部不得濫行駮詰例應駮詰者至三次後該部聲明具奏或按例核減飭交該督撫核令經手官員照數追賠完案或據情酌豫豁銷務令刻期速結仍著於每歲終將未完各案彙摺奏聞其見有從前未結各案豫限一年令戶工二部察明分别辦理欽此欽定大清㑹典則例卷一百二十八
