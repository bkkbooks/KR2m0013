body:
  text: 工部營繕淸吏司物材一琉璃窰燒造各色琉璃甎瓦順治初年定專差漢司官一年更代康熙元年差滿漢官各一人筆帖式二人滿官掣籤漢官論俸十五年改為三年更代十八年仍照舊例一年更代二十年議準琉璃甎瓦大小不等共有十樣除第一樣與第十樣向無需用處毋庸置議其餘甎瓦如各工需用令管工官先將應用實數核算具呈該監督照數請領錢糧黑鉛豫行備辦除冬三月及正月嚴寒停止燒造餘月均以文到日為始定限三月燒造送往工所管工官親身驗看隨到隨收給發實收完日將實用過數目及餘剩數目同實收送部核銷二十五年題準各處工程需用甎瓦同時並造應用物料恐不能齊其竒零工程所用甎瓦交與本工買辦三十三年覆準大小工程需用甎瓦仍交與窰戶等備辦又覆準凡窰戶均令該監督擇身家殷實之人承充仍取具地方官保結著役四十年議準琉璃廠亮瓦廠房屋向例徵收地租今改為按閒徵租交與大興縣徵解戶部免其徵收地租又覆準琉璃廠房租官員有力之家徴銀貧窮小民準其按季徵錢四十一年覆準琉璃亮瓦二廠官地房租官員富戶照常起租其徵錢房屋量免一半隻身貧寒之人免徵房租仍以官地起租雍正二年諭琉璃亮瓦廠官地每月按閒計檩徵租相沿已久朕念兩廠多繫流寓賃住經營小民情可憫惻嗣後止徵地租免其按閒計檩逐月輸納欽此八年議準燒造琉璃物件第二樣至第九樣件數繁多定例內未曽備細開載尺寸式樣燒造之法未免參差應每樣燒造一件上鐫年月日期並式樣名色永存窰廠飭令窰戶照依定式造辦其各工取用物料向來運送時不將開運日期及數目若干報部察驗存案嗣後於初造泥坯之時即將某年月日某工取用字樣印記在旁再行燒造俟辦齊呈明察驗始運往工所該衙門出具印文實收知㑹過部本部管工官亦照例出具實收以備稽察至正數應用之外所餘物料必開明數目報部倘有竒零苫補處即可給發應用其運價仍照例準給再各處咨取瓦料印文到部該司於十日內核算呈堂給發印領該監督親領錢糧封貯公所設一堂印號簿令該監督將每日所用若干逐一填明細數完日將印簿呈繳待核再吻獸一項向例隨所用瓦片樣數核給錢糧但殿宇丈尺各有高低廣狹之分所用吻獸大小不一不必隨瓦片核算宜按其應用尺寸分晰價直給發燒造十年題準琉璃窰滿漢監督一年差滿如一同更代新委之人恐一時未能諳練請將滿漢監督留任一年仍增委滿監督一人協同辦理俟一年期滿舊滿漢監督令其回任再選漢監督一人同辦嗣後每年新舊監督互相更代乾隆三年奏準琉璃瓦料若造坯時即用某工印記則此工之料不得用之彼工未用者存貯在廠需用者燒造不及轉致遲誤即所餘物料欲給竒零之用又因有印記不便給發嗣後瓦料應免用印記又奏準各工物料既令彼此通融若某工所領錢糧拘定給發則彼工之銀尚未用完此工之銀又未領到難以支應請嗣後給發錢糧令該監督封貯公所每月各工所用銀數以次登填於堂印簿內彙總稽察不必泥於某工之銀定為某工之用十九年奉㫖琉璃窰滿漢監督均著一年更代一山東臨清窰燒造細甎順治二年部委司官一人提督臨清甎廠兼理閘務歲支額設甎料銀二萬四千兩燒造城甎六十萬斧刃甎四十萬七年題準額設甎料銀自本年起歲發銀萬兩照銀數豫辦以備帶運八年奉㫖臨清廠燒甎費帑纍民應行停止原委官徹回其造過坯片所費工本並民船長短帶載納價槩行豁免十四年復差本部司官前往臨清㑹同該道燒造水澄細甎應用工料於本省司庫支用工完造册報部核銷十八年題準停止臨清甎差康熙十八年復差本部司官會同山東巡撫動正項錢糧二萬兩燒造滾子甎運價即於本項錢糧內銷算二十八年覆準陵寢需用臨清甎行令山東巡撫豫行燒造二萬塊交糧船帶運五十八年題準山東臨清甎停其燒運於溫泉地方令鋪戶照臨清甎式樣燒造如遇有必需之處報部定數咨取一蘇州窰燒造金甎順治十二年修造乾清宮等宮需用二尺一尺七寸鋪地金甎部委官至蘇州㑹同巡撫估計交地方官動支本省解部正雜改折等銀造辦又題準舊例二尺金甎燒造一正一副尺七金甎燒造一正一副料價繁費每副甎十塊內應減去七塊準造三塊十五年覆準金甎各準一正一副開銷康熙十八年題準令江寧巡撫動支正項燒造二尺一尺七寸金甎萬五十四塊每正甎十準造副甎三二十九年題準令江寧巡撫動正項銀燒造二尺金甎一千四百九十塊一尺七寸金甎千一百五十九塊每正甎十燒造副甎一雍正三年題準令江寧巡撫動正項銀燒造一尺七寸金甎萬塊乾隆四年覆準一尺七寸二尺及二尺二寸金甎均照順治十二年康熙十八年正十副三例燒造一木倉收貯各省辦解木植順治初年定專委滿司官一人監督一年更代六年題準各工需用架木部委官詣江南㑹同地方官召買八年題準各工需用木植令正定山西江西浙江湖廣五處地方購買十五年題準各工需用架木水路不能速到行文江寧巡撫自本年起動支正項歲解二千根備用仍將木植長徑尺寸及用過錢糧數目報部核銷康熙六年修造太和殿令江西浙江湖廣四川督撫訪有採就大楠木或山中見産大楠木將長徑尺寸根數並所需錢糧確估報部凡産於民間住屋內及墳塋內之木不得採非楠木及楠木長徑尺寸不中度者不得採七年題準太和殿工程需用杉木委官㑹同江南督撫動支正項錢糧照時價買辦運工應用八年諭修理宮殿所用楠木不敷量將松木間用停止各省地方採取欽此十四年題準停止江寧採買架木十九年題準江寧巡撫動支正項先買架木六千根解部嗣後仍照舊例每歲辦解二千根二十一年具奏重建太和殿委官分往江南江西福建浙江湖廣四川廣東廣西等省㑹同督撫尋取合式楠木杉木及運費一并估報其官辨商民土司人等有捐助楠木者視所捐多寡大小交部議敘奉㫖該委官及地方官毋藉端生事苦纍土司擾害民人通行禁飭二十三年議準採運木植工價腳費該地方官捐輸運京如有不敷督撫具題戶部撥給正項其江南等省公署楠木並商販杉木停其運送二十六年奉㫖四川酉陽楠木産於崇山懸巖若必令其挽運恐致有纍土司著免解送又諭向來各省捐銀輸木名為急公不過先報虛數並無交庫即行具題希圗利己及至實在支用之時皆繫科斂民財以充原數甚至用少徵多仍侵漁肥已即此一事他皆可知總因沿習陋弊視為固然以致滋纍民生殊非實心急公之誼著通行嚴飭欽此又題準令江南江西湖南動支正項每歲各辦解桅木二十根杉木三百八十根江南解架木二千四百根江西湖南各一千四百根每省各解桐皮杉槁二百根浙江省捐辦架木一千四百根桐皮杉槁二百根又議準房山縣額存揪棍山地每歲應解揪棍十有九萬千二百九十八根解部以備各工取用二十七年覆準嗣後採買竹木等項準動正項錢糧採買年終奏銷三十四年重建太和殿應用木料奉㫖停免採取一應工料發帑購買三十五年題準桅木杉木架木存貯者足用停其辦解三十八年題準令江南江西浙江湖南仍照舊例每年辦解桅木杉木架木六十年題準木倉監督委本部滿漢司官各一人管理一年更代又題準木倉見貯揪棍十萬有竒嗣後令各管工官於工竣時按數繳回足敷各工取用房山縣額徵揪棍停其辦解雍正五年覆準行令步軍統領嗣後凡有官房拆卸楠木驗明報部委官運貯木倉以備各工應用十一年題準木倉滿漢監督一年差滿如一同更代恐新委之人一時未能諳練嗣後一年期滿新舊滿漢監督互相更代一木廠順治初年定通州張灣二處各設木廠每廠差筆帖式二人驗收運京木植康熙二十六年題準通州木廠停差筆帖式將潘桃古北等口運解木植歸通惠河分司管理造册報部其張家灣木廠於本部司官內選一人監督管理一年更代凡江南江西浙江湖南辦解桅杉架槁等木到日部委官丈量記印斧號後交該監督如數暫行收貯俟部委運木官到廠即將木植照數㸃驗交運木倉額設廠役八名以資看守四十年題準裁通惠河分司通州木廠歸通永道管理一灰石順治初年定大工需用石灰委本部官開採燒造於大石窩採白玊石青白石馬鞍山採青砂石紫石白虎㵎採豆渣石牛欄山採青砂石石景山採青砂石青砂柱頂階條等石其青白石灰於馬鞍山磁家務周口懷柔等處置廠燒造運京應用十六年覆準石灰二差并為一差康熙三十五年奉㫖辦買石灰著照戶部例專設監督一人管理四十五年題準大工需用石灰選本部司官請領工運價直開採燒造册報核銷事竣徹回一琉璃物件價直順治初年定每件給銀一錢九年增定每件給銀二錢二分五釐八毫十年題準每件減定為二錢一分十五年題準每件減定一錢八分康熙二年增定每件銀一錢九分五釐六年定每件給銀一錢九分二十年議準琉璃甎瓦大小不等共有十樣內除第一樣與第十樣原無需用之處不議價直外今將燒造所需工料令窰戶各分别大小詳確估算公同酌減照例給發二樣甎瓦並照牆等處需用琉璃花樣每件各給銀一錢九分三樣一錢七分五釐四樣一錢六分九釐五樣一錢四分七釐六樣一錢三分三釐七樣一錢一分九釐八樣一錢五釐九樣每件銀九分雍正元年議準琉璃甎瓦照時確估吻二樣銀一百八十一兩三錢三分三釐鉛六百五十兩自三樣銀一百十有五兩二錢七分二釐鉛六百二十兩遞減至九樣銀八兩五錢八分六釐鉛六十五兩劍把二樣銀二兩三錢鉛十有五兩自三樣銀一兩七錢五分鉛十有四兩遞減至九樣銀一錢七分鉛一兩五錢背獸二樣銀六錢四分鉛五兩自三樣銀五錢鉛四兩遞減至九樣銀一錢六分鉛七錢吻座二樣銀一兩四錢五分鉛十有七兩自三樣銀一兩一錢鉛十有五兩遞減至九樣銀三錢鉛一兩五錢獸頭二樣銀四兩鉛二十一兩自三樣銀三兩三錢鉛二十兩遞減至九樣銀一兩二錢鉛六兩蓮座二樣銀一兩五錢鉛二十一兩自三樣銀一兩四錢鉛二十兩遞減至九樣銀二錢五分鉛二兩五錢仙人二樣銀一兩一錢鉛七兩五錢自三樣銀七錢五分鉛七兩二錢二分遞減至九樣銀二錢鉛二兩五錢走獸二樣銀五錢五分鉛七兩五錢自三樣銀三錢五分鉛七兩二錢五分遞減至九樣銀一錢六分鉛二兩五錢通脊每塊節二樣銀二兩九錢五分鉛二十六兩六錢自三樣銀二兩二錢鉛二十五兩五錢遞減至九樣銀七錢鉛八兩黃道每件二樣銀一兩七錢鉛十有三兩三樣銀一兩五錢鉛十有二兩五錢大羣色條二樣銀一兩四錢五分鉛十有三兩三樣銀一兩四錢鉛十有二兩五錢垂脊二樣銀一兩五錢鉛十有四兩六錢自三樣銀一兩二錢五分鉛十有四兩遞減至七樣銀四錢七分鉛八兩攛頭二樣銀六錢鉛三兩二錢自三樣銀四錢五分鉛三兩一錢遞減至九樣銀一錢六分鉛二兩二錢三分攩頭二樣銀六錢鉛三兩二錢自三樣銀四錢五分鉛三兩一錢遞減至九樣銀一錢六分鉛二兩二錢三分大連甎二樣銀七錢鉛三兩二錢三樣銀五錢鉛三兩一錢四樣銀四錢六分鉛三兩套獸二樣銀九錢九分鉛十兩自三樣銀七錢五分鉛八兩遞減至九樣銀一錢六分鉛二兩二錢三分吻下當勾二樣銀六錢鉛三兩二錢三樣銀五錢鉛三兩一錢四樣銀三錢八分鉛三兩博通脊二樣銀一兩七錢鉛十有三兩三樣銀一兩四錢五釐鉛十