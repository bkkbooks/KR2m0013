body:
  text: 吏部考功清吏司給假一京官給假順治初年定在京大小官員告假祭祖父者食俸十年以上省親者食俸六年以上遷葬者食俸五年以上親老送回原籍者不論食俸康熙十年題凖各官給假取本衙門堂官咨文並同鄉京官印結到部由部具題得旨方凖給假至俸深於應升月分不凖告假其定限直隸各省均一例許住家四月往返路程直隸限四月山東山西河南限六月江南江西浙江湖廣陜西限八月福建四川廣東廣西貴州限十月雲南限一年其衙門咨請暫假員闕不補者不凖至假滿時人文到部令其候補乾隆五年奏凖在京官員有聞其父母患病急欲省覲或父母年逾七十而衰憊者均不俟六年俸滿亦不得定以限期著取同鄉京官印結具呈本衙門該堂官具奏請旨給假回籍該堂官具奏之後即行知照本部開闕不必彚題如有只請暫假數月假滿回任並不聲明例應開闕含糊陳奏者俟知照到部後除仍行開闕外並將具奏之該堂官交部議處其食俸六年告假省親仍照舊例行一道府告假乾隆十六年諭道府等官於請訓赴任時有面奏暫假回籍經允凖者皆於次日具呈吏部覆奏此雖向例而人容有不知者文員告假有何關繫此不過陛見之時以為奏對塞責耳嗣後各省道府等官皆不得於請訓時自行乞假皆令赴部呈明其應否凖行即由該部酌定給以假期仍按月彚奏以昭畫一欽此遵旨議定道府等官告假回籍者有省親及祭掃祖墓之分應除去往返程塗計算如呈請省親祭掃者凖其告假二十日修墓及遷葬者凖其告假一月總不得逾一月之限一教職告假乾隆五年議凖各省教職食俸三年以上如有父母在家不能迎養欲回籍省親及葬親省墓等事凖其咨明州縣官轉詳該管上司察明委繫實情取具該州縣印結計其程塗逺近酌給假期報明存案員闕毋容開選不得一學兩官同時告假亦不得告假之後復行請假如一學只設一官者亦凖一例給假令該州縣暫攝學篆其凖假之員該上司勒限回任倘逾限不到該督撫照例咨參十二年議凖嗣後教職告假期內聽其食俸其假期屆滿果繫一時抱病令原籍地方官驗明結報許其展限一月病痊回任如一月限滿該員病體難以驟痊令原籍地方官照告病例驗明出結通詳咨部别選如有揑飾徇延等弊將該員並地方官照例分别參處再定例內外官員皆按到任日期較俸升轉如有離任事故按日扣除嗣後遇有教官告假該督撫酌定假期務將起程回任日期分晰報部注册升轉時亦照離任事故之例按日扣除又定例調任官員如有未報到任者雖值論俸應升之時不凖升轉今教官既定有告假扣除日期之例嗣後如遇論俸應升之時該員正在告假限內亦應停其升轉俟假滿回任咨報到部之日再行升用一候補候選人員告假康熙十年議凖內外大小候補官員如有情願回籍者具呈凖其回籍俟來京之日仍照原文補授大選官員亦凖給假選授之時仍照原序又議凖凡考取內閣中書有具呈給假回籍者亦凖給假來時仍照考取注册名次挨補一京官告病康熙九年議凖在京漢官告病給假者凖回籍調理停其勒限年分俟病痊之日該督撫咨部注册赴部補用如大學士尚書左都御史侍郎學士左副都御史告病告假自行具奏其餘各官具呈該部院衙門取具同鄉京官並無假揑印結該部院移部彚題凖其回籍調理如身無疾病具呈者將本官降一級調用驗看出結官各罰俸一年堂官罰俸六月其告病回籍官在地方生事營私發覺將本官革職所屬地方官不報督撫者降二級調用該地方官既報督撫督撫不行具題者將督撫降一級留任其丁憂告假回籍官員在地方生事發覺亦照此例二十六年題凖在京各部院衙門滿漢官員告病之後若病痊俟一年限滿方凖起病補用如有不及年限咨部者槩不凖行雍正十二年定凡告病告假丁憂等事皆半月彚題一次值初一十五日不奏乾隆四年奏凖文職旗員無論見任及指闕推升擬補或未經引見與已經引見尚未到任之員如實繫患病均令該管官委官確實察明並無揑飾酌量給以假期咨部存案凖其在家調理總不得過六月之限如逾限不痊即行開闕别補俟病痊之日仍以原衙門補用其額外食俸官員如遇患病亦照此例定限如逾限不痊即行停俸俟病痊之日仍在原衙門行走如無疾揑稱有疾呈報者别經發覺照漢官之例將本官降一級調用驗看官罰俸一年出咨之該管官罰俸六月一外官告病康熙九年議凖總督患病巡撫驗明具題巡撫患病總督驗明具題如無總督之省巡撫自行具奏又議凖告病官員託故詐病者發覺之日令本官赴部驗看如無疾病將本官革職驗看官保結官各降一級調用代題督撫罰俸一年雍正五年諭外官告病督撫察明確實具題令其回籍調治痊可有情願起用者於本籍起文赴部引見仍以原官補用欽此六年諭督撫大吏以事繁任重無人可代力疾辦理竟致不起皆因勉強視事未得調攝雖生死有一定之數然朕軫念大臣勤公事而廢頤養實愀然不忍於懷也嗣後督撫等倘有一時患病難以辦事者不可勉強支持即著一面奏聞一面將印務酌量委人署理俾得安靜調攝則所患自然易於痊可足以慰朕體恤臣工之至意若兩司中有似此者著該督撫仰體朕心亦酌量委人代辦具摺奏聞欽此十三年議凖布政使以下等官告病該督撫委官驗看確實具題令該員解任留於本省調理病痊之日該督撫給文赴部仍以原官補用乾隆四年奏凖見任州同以下告病等官除平常稱職居官無實績可據者令其休致外其有居官勤慎辦事優長實繫出衆之才於告病時不論食俸年限許該管官開列事實加具印結詳報督撫詳加察核委無揑結情弊將該員居官辦事才能出衆之處出具考語咨部注册凖其解任調理病痊之日該督撫給咨赴部仍以原官補用至微員告病例不具題皆由該管官具結申詳司道府固無驗看之責督撫止據結報部嗣後佐雜等官告病如有扶同假揑等弊本官革職驗看官出結官降一級調用督撫司道府等官免其議處又奏凖凡甫經授職尚未到任道府州縣以及佐雜等官如有中塗患病不能赴任者即報明該地方官驗看出結報部凖其回籍調理俟病痊之日原籍督撫給咨應引見者令其赴部引見例不具題者咨部注册均以原官補用至試用之員告病經該督撫題咨病痊起用者亦照見任之例有任者在省調理無任者回籍調理俟病痊之日如州縣以上等官該督撫給咨赴部引見其州同以下等官該督撫給咨該員赴部由部給咨該員赴原試用地方試用八年奉旨外省官員告病者凖督撫題請解任留於該省調理病痊復用者乃國家愛惜人才之意但該員既以患病解任又復留於該省調理未免食用艱難情亦可憫嗣後同知以下官員告病者皆凖其回籍調理病痊照例銓補不必留於該省若道府等官該督撫具題請旨著為定例歸籍一歸旗定限康熙二十六年奉旨歸旗人員皆令該督撫嚴行催促限五月內回旗又議凖革職解任官員歸旗若不撥兵護送取具沿塗官交送印結者罰俸九月二十九年題凖凡應歸旗人員無故不速起程逾限一月以上或已起程中塗逗遛或不進京在他處居住或本身已來而家口在他處居住有官者革職已革職者交該衙門治罪其該管州縣官同城知府不速催起程容留一人者降一級留任二人者降一級三人者降二級四人者降三級五人者降四級皆調用六人以上者革職道員及不同城知府所屬地方容留一二人者罰俸一年三四人者降一級留任五人以上者降一級十人以上者降二級皆調用督撫所屬地方容留一二人者罰俸三月四人者罰俸六月五人以上者罰俸一年十人以上降一級留任倘歸旗人員已經起程該地方官不將起程日期申報或已申報而督撫不行咨明該部該旗以致逗遛生事者亦照此例議處如歸旗人員於原任地方起程逾限不及一月或實因患病及有不得已情由難以起程或已起程中塗患病難行阻滯情實者取具該地方正印官印結報部槩行免議如並無事故妄藉事端謊取印結其地方官不將此等情由申報濫給印結一經發覺將謊取印結之員仍照逗遛逾限例處分出結之地方官照容留例處分又議凖革職降級旗員家口住居原任地方有錢糧未清勒限兩月之外再限六月完結如限滿不完該督撫將承追督催各官題參照例議處一面即將拖欠錢糧之官並家口一并催令歸旗將未完錢糧詳細總數備造清册咨送該部轉交該旗都統變産賠補逾此定限不令起程歸旗亦照容留廢官例處分至原參督催承催官員降俸戴罪督催之案該旗將此項拖欠之錢糧催完該部察明具題咨部察銷雍正三年議凖歸旗人員大路有驛站者每日行一站僻路無驛站者每日行五十里自本任地方照站數里數計算扣定到京日期咨報該部該旗察核四年議凖凡應回旗人員除原無水路地方及能自備腳力並願從陸路回旗者任由陸路外其有水路之處應聽由水路行即於呈內開明由某省水路照原定限期計算到京倘無故逗遛致違定限照原例議處治罪其起程時原地方官不報明督撫及督撫不行咨報該部該旗並沿塗地方官不挨程催逐者仍照容留旗員例分别議處又議凖八旗外任官員凡有降級革職及升轉休致應歸旗者一經離任該督撫即令接任官將該員所有家口逐一詳察共有若干名數備造清册一面依限催令起程一面出具並無遺漏隱匿印結同册一并咨送該部該旗以便察核倘接任官將前任旗員家口聽其隱匿不盡行造入册內或被旁人首告或被該部該旗察出將接任之官及不行察參之各上司并督撫皆照容留旗員例分别議處至沿塗地方官遇有歸旗家口經過務行逐一詳察遞送勿使潛匿在境如有瞻徇遺漏事發將沿塗地方官亦照容留旗員例分别議處如歸旗人員不候造册給咨及沿塗不俟詳察家口撥兵護送竟行越度者許該地方官即行詳報該督撫指名題參照起程逾限中塗逗遛例治罪如聞訃奔喪不候咨文先起行歸旗中塗並無逗遛者照違令私罪例於補官日罰俸一年乾隆四年奏凖外任旗員隨任子弟如該員緣事解任應留任所隨任子弟有應行質問事件由接任官申報上司咨明該部該旗仍留任所候質如無候質事件應先行歸旗之隨任子弟倘地方官不請給咨私令回旗者降一級留任隨任子弟不候給咨私離任所該地方官未經察出申報者罰俸九月其擅自潛往之子弟有職者革去職銜間散人照例鞭責又奏凖各省駐防旗人來京者令各該將軍等察明本人三代造册出結先行知照在京該旗仍出具印文交與本人親身投遞該旗以憑察對至外任文武旗員隨任子弟來京者由任所該父兄造具本人三代年貌清册呈請該管將軍副都統督撫提鎮府尹城守尉等官出咨知照在京該旗仍給文本人親齎投送該旗如任所父兄繫文武大員可以自行出咨者其隨任子弟有事來京即由該父兄自行給咨其有不領咨來京及領咨潛往他處有職者革去職銜間散人鞭一百如隨任子弟之父兄不為請咨給咨擅令來京者罰俸一年如已經呈明而該將軍副都統督撫提鎮府尹城守尉等官不給咨文者罰俸九月至旗人有事來京仍回原處者呈明在京該旗亦照該地方給咨之例出咨知照該地方仍給文本人親投該管駐防或任所上司衙門以憑察核其有不領咨私回或領咨潛往他處及已呈明該旗官員不給咨文者皆照例議處十五年議凖歸旗人員限三月催令起程如有實在不能起程緣由詳報展限一旗員子弟隨任雍正三年遵旨議凖外任旗員子弟至十八嵗以上者不令帶赴任所其未至十八嵗者具呈該都統存案至十八嵗悉令歸旗乾隆三年議凖旗員適親子弟舊繫同居實有不能相離之勢督撫具題到日由部察明不能相離情由具奏請旨如有並非適親子弟或舊非同居並見在該旗當差及已經歸旗之後復請往任協助者槩不凖行五年奏凖外任旗員將任內所生之子隱漏不報本旗注册或假揑過繼潛匿他處除將令其隱匿及潛留外省之員斥革治罪外該地方官在任半年以上不行察出或被旁人告發或别經發覺將失察之該地方官罰俸一年該管之道府罰俸六月如居住失察未及半年及雖過半年自行究出者免議如該地方官明知旗人隱匿之子容隱不行察報者降一級留任該管道府罰俸一年七年議凖旗員子弟至十八嵗以上者悉令歸旗其實有不能相離之情方凖奏請隨任道府等官督撫代奏今欽奉諭旨在外令該督撫題請在內呈明該都統察奏是外任旗員子弟無論在內在外均凖一例隨任若必逐案題奏未免紛繁嗣後外任子弟請留任所者該督撫核實情節先行咨明部旗存案仍俟年終由部彚齊人數具題其在旗各員初蒞外任呈請帶往任所者仍遵旨呈明該都統察奏一漢官回籍定限康熙二十九年議凖漢官革職離任者亦照旗員之例勒限回籍將起程日期報部雍正三年遵旨議凖漢官革職提問應於原籍地方追贓治罪者在內令司坊官在外令該督撫作速催令起程將起程日期報部並知會原籍地方官仍照旗員歸旗例按各省逺近程塗定限有驛站者每日行一站無驛站者每日行五十里除從陸路者任由陸路外其有由水路者亦聽其便並將由某省水路之處即於呈內開明自本任地方照水路程塗站數里數扣定到籍日期該督撫俟本人到籍將日期報部察核其革職免罪之員外官交代完日限三月內京官限一月內該地方官催令起程按照程塗定限回籍倘違限不即起程及逗遛中塗並回籍違限一月以上者都察院並該督撫題參照處分旗員例交部分别治罪倘該管官不速催令起程或他省官員聽其逗遛境內皆照容留旗員例議處同城知府照州縣例議處不同城知府照道員例議處司坊官照地方官同城知府例議處巡城御史照督撫例議處如實因患病及有不得已情由難以起程或中塗患病難行阻滯情實者該地方官出具印結申報督撫察明咨部免議若並無患病並阻滯情事故違定限者本官與容留之地方官皆照旗員例分别議處其解任休致丁憂給假等官應聽其便乾隆二年覆凖革職官員應於原籍地方追贓治罪者仍行給咨押解外其革職免罪之人别無未清事件遵照定限催令回籍免其請咨遞解一容留提鎮等官任所入籍置産康熙五十一年議凖見任提鎮以及副參遊都守並丁憂休致有事故解退之提鎮等官均不許在任所入籍置産令地方各官嚴察如有此等入籍置産者勒限六月逐回原籍若該地方官不行察明不逐回原籍將容留之地方官降一級調用該管道府上司等官罰俸一年督撫罰俸六月一賞給微員路費回籍乾隆三年遵旨議凖各省文職縣丞主簿典史巡檢等微員倘有離任身故實繫窮苦不能回籍者除參革人員有貪劣重􅍁繫有罪之人不得濫行給與路費外其餘雖經參革而無劣迹及丁憂解任告病身故者該地方官各就本省情形按照該員家口多寡程塗逺近於存公項內酌量賞給還鄉路費其病故之員或有親僕扶柩歸里或無親僕而有同鄉近土之人情願代送該督撫察明照例給與勘合令其回籍如病故之員並無親僕與代送之人該督撫仍照例給發勘合令地方官選差的役二名務令送回原籍取具地方官印結送部如地方官選差不的以致中塗遲延或不送至原籍及將病故不能歸葬之員隱匿不報上司者該督撫題參將該州縣官罰俸一年如州縣已報上司上司不行申報者將不報之上司罰俸一年州縣免議曠職一九卿會議不齊雍正七年議凖凡九卿會議除在內廷行走及奏事並該班出差有别項事故不到外其應齊集之九卿務如期齊集或有本衙門辦理緊要事不能到班者將原由行文知會主稿衙門令都察院委滿漢御史二人將有事不到之九卿登記案卷以備日後考核如無故不到者察出即行參奏照推諉例罰俸一年一推諉事件康熙九年議凖官員承辦事件已經遲延因而推諉他人者除將推諉之官照遲延月日處分外因其推諉再罰俸一年若將應辦事件推諉他人者罰俸一年十八年議凖漢官在署不待事畢推諉滿官早歸遲進燕會嬉遊或料理公務瞻徇遲延不行即結司官聽堂官題參堂官聽科道題參皆革職雍正元年覆凖各部院事件到司如清字者譯漢字漢字者翻清字滿漢司官斟酌畫一即定清漢字稿公同畫押回堂遇有事涉疑難遽難定稿滿漢司官或有意見不同各據所見回堂斟酌定議務期依限速結如有故意推諉及遲延者是滿是漢對質即明或繫通同遲延一經科道糾參堂官察出將滿漢司官照例分别議處其各部院衙門事件堂司皆立用印號簿以備稽察又議凖官員將自己遲延事件推諉他人者仍照定例處分其各部院司官內如有故為巧詐徇私誤公者經該堂官察出參奏將承辦之員照規避例革職又議凖除尋常事件仍按日辦理外其有緊要事件均嚴定條約勒限催辦作速完結倘有任意推諉或稱無例可援或稱無案可稽以致遲延者該堂官即行察參送部議處其承辦事件如别有徇情納賄者察出即行題參交刑部治罪一嚴禁燕遊康熙二十一年議凖在外官員居住各城有偷安不早出堂理事任意燕會嬉遊事務叢積者題參革職一案件假手書吏雍正四年覆凖司道知府等衙門一切案件如假手書吏致蠹書作弊者照溺職例革職督撫不行題參照不參劣員例降二級調用一直月官公事錯誤乾隆五年奏凖各部院衙門除內務府太醫院並無委官直月之例外各部院衙門有職掌相同者亦有彼此互異者倘該衙門向例不繫直月官掌管之事若有疏失仍專責該管之官倘向繫直月官之所掌管者如稽察上朝事件若有失誤照失誤朝賀例罰俸一月鈔録上諭並特交事件不校對明確致有舛錯者照本內緊要字遺漏例罰俸三月如奉傳不即赴鈔或鈔出不即交發以致遲延者照遲延例罰俸三月如有遺失者照遺失官文書律降一級留任呈送題奏本章奏事名籤皇帝御門聽政及各衙門該班奏事名單致有汚損者照墨汚本章例罰俸一月失誤者照表文遺漏不奏例罰俸一年軍營奏書報匣挂號舛錯遺漏及呈送遲延照表文舛錯遺漏例罰俸一年交發報匣遲延錯誤者亦照此例罰俸一年接受文移知會並應行文鈔寫傳報送交公務辦理遲延違誤者照疏忽例罰俸三月登記遺誤者照造册舛錯例罰俸三月收受假印文册不行察出者照失於詳察例罰俸一年收掌印信如有遺失者照遺失印信律議處失誤請領鑰匙擅開印封者照擅開官封律罰俸一年遺失鑰匙者照中樞政考遺失鎖鑰例罰俸一年監看印信如有詐為文書盜用印信失於詳察已行者應照失察假官例降一級調用失察盜用印信尚未施行别經發覺者照豫給用印白結例罰俸一年漏用印信及全不用印者皆照漏使印信律議處庫門啓閉不親身會同察驗封鎖者照不應輕律罰俸六月不實力稽察官兵皂役以致間人擅入龍亭並竊失文書册籍存公銀者照防範不嚴例罰俸一年如繫庫貯金銀册寶祭器被竊照遺失制書律議處曠班員役失於察出申報者照疏忽例罰俸三月署中失火照地方官失火延燒文卷例罰俸一年失察賭博照失察衙門書吏犯賭例罰俸三月間人擅入並牲畜損壞官署及不能察禁酗酒鬬毆者照看守疏忽例罰俸三月官員在署酗酒賭博不行申明回堂者照應申上而不申上律罰俸六月再各部院衙門司官筆帖式均繫輪流直月如互相推諉以致曠班者將未經轉交離署之人照中樞政考不交與接班之人曠班例罰俸一年推諉不接班之人照推諉例罰俸一年私離官署者照擅離職役律罰俸九月再各衙門有直宿官員其各司署內有失火賭博酗酒鬬毆竊失等項失於防範覺察應將該司直宿官照見議直月官例議處直月官免議如不繫各官署內及該衙門原無直宿官者直月官仍照例議處其各衙門設有管庫管獄等官者一應庫獄地方是其專責該管官經管直月官免議再各衙門官署損壞以及皂役人等酗酒鬬毆賭博等事皆繫首領官專責直月官止繫夜間巡防約束如繫白晝失察應將首領官照例議處直月官免議夜間失察仍責直月官一筆帖式臨考規避乾隆四年議凖見任筆帖式遇三年應行考試之期臨考規避察明實繫無故不到者革職一教習不實心訓導乾隆四年議凖各旗義學教習如有因循茍且不實心教授以致有誤學生經該處參奏者將該教習照教官因循茍且不嚴加考試例革職一稽誤時憲書進呈康熙十五年議凖官員不會推時憲書承認會推以致有稽進呈者革職永不敘用一撫綏無術康熙七年議凖督撫繫封疆大吏該省百姓如有困苦流離失業拋棄田地徭賦難輸地方毫無治理者或被部院或被科道糾參如果情實將該督撫革職該管司道府官亦革職若各屬州縣等官不行釐剔陋弊不舉行便民之利以致百姓不安生業地方困苦者督撫司道府等官訪察題參將州縣等官革職一虛懸城守康熙六年題凖官員因公事將城守倉獄事務交與不應交之人而去者罰俸一年如上司將城守官員不輪流傳喚盡行傳去以致城空者亦罰俸一年一規避移駐雍正六年遵旨議定凡委官駐劄地方經督撫題凖該員仍戀居城邑不即移駐者將該員照規避革職如該管之地方官聽其規避不行詳報及督撫司道等官不行揭參者將該管地方官降二級調用司道府等官降一級調用督撫降一級留任如該管官及司道府等官已經揭報而督撫不行題參者將督撫降一級調用其揭報之官免議營私一餽送囑託康熙九年議凖官員因事夤緣餽送禮物發覺之日與者受者皆革職如餽送雖未收受不行出首後經發覺者將不出首之官罰俸一年又議凖官員縱容親友在任所招搖詐騙者革職失於覺察者降一級調用十五年議凖官員將上司衙役索銀之事受囑徇隱不報者革職十七年覆凖府州縣等官並無公事謁見逢迎並赴省拜壽行賀夤緣通賄餽送銀錢等物者皆照餽送禮物例處分又議凖督撫差內使人等妄藉訪事為名遍逾州縣並督撫布按自開便門令官役人等出入傳事者革職又議凖官員將遊客星卜及優伶人等或留住省城或轉送各府州縣致擾害地方及在京官員貽書薦送者將薦送之官皆照親友招搖詐騙例革職十八年議凖內外官員除繫至親平日往來外如督撫司道州縣等官赴任時謁見在京大小各官或自任所差家人及子弟提塘人等來往行走者革職大小官員不行自首者亦革職至督撫司道府州縣等官家人子弟提塘往在京大小各官家人家下行走其主知者革職將家人寬免其主不知者降二級將兩家家人皆交刑部治罪提塘有職者革職無職者亦交部治罪其在京大小各官拜見督撫司道府州縣等官餽送裘馬等物及差人至督撫司道府州縣等官任所若督撫司道府州縣等官不行舉出將餽送差人之大小各官及不行舉出之督撫司道府州縣等官亦皆革職如督撫司道府州縣等官向在京大小各官因事營求或諂媚求譽餽送禮物者將餽送收受之人皆革職拏問地方官吏於民間正項錢糧之外濫收苛𣲖諂媚餽送大小官員者將餽送收受之人亦革職拏問十九年議凖上司與州縣借貸等弊發覺者照貪官例革職二十五年覆凖科道官員如果有關國家大事令其陳奏有貪惡者應據實指參其有希圖利已及允受囑託妄行引奏結交朋黨作姦誣陷者事經發覺革職治罪其告假終養丁憂之科道官員有不安分自守包攬錢糧干預辭訟侵害小民並遍遊各省生事晉謁督撫挾詐有據者令該地方官申報督撫題參將本官亦行革職治罪如該地方官隱匿不行申報者降二級調用該地方官既報督撫督撫徇庇不行糾參者將督撫降一級留任三十七年覆凖上司藉訪事為名家人衙役更番迭出陽稱路過隂言採訪抑勒州縣餽遺進奉者革職如州縣官揭報督撫督撫徇庇不行題參許該員開具實迹密封竟逹通政使司奏聞事實將該督撫照徇庇劣員例降三級調用雍正四年奉旨官員因事囑託事發者革職七年議凖凡官員與本地紳襟除慶賀萬壽宣講聖諭舉行鄉飲及一切公事禮節彼此接見拜往毋庸禁絶外如新選官員有本處之人在京餽送禮物投拜門生者令五城御史及順天府稽察題參繫官革職候選之員革去職銜貢監生員革去衣頂如新選官利其所贈即與交通往來受其投拜者革職自行出首者免議若官員未入境時本地紳襟差人持帖逺接交界到公館排席迎風到任後私相餽送及拜為門下聨為宗誼本官不行禁革反行收受禮物私相交結者皆照在京交往餽送例察議其上司與所屬官私相交結往來餽送者亦照此例處分州縣各官令道府稽察道府各官令督撫兩司稽察如州縣官有私相交往餽送情弊而道府不行揭報將道府照徇庇例降三級調用府道等官有私相交往餽送情弊而督撫兩司不行揭報題參者將督撫兩司照徇庇例降三級調用十三年覆凖上司勒薦幕賔長隨許屬官揭報將勒薦之上司照將遊客優伶人等轉送各府州縣例革職或屬官徇隱不行揭報者照受囑不報例革職若屬官營求上司因所薦幕賔長隨有勾通行賄等弊照夤緣餽送例分别議處乾隆五年覆凖凡在京官員與至親切友同鄉世誼往來慶弔原於名節無關設或請託公事瞻徇情面亦不論其為何等之人皆干嚴例至或家資富厚有意結交朝紳計圖光寵其朝紳素無往來情分濫行納結希圖肥潤此等結交並經發覺者照不謹例革職一供應欽差康熙十九年議凖州縣官員藉送奉旨所差大臣官員下程科斂百姓者照貪官例革職提問其督撫司道府廳等官皆照失察貪官例分别處分雍正元年諭欽差出京沿塗地方官向有餽送督撫派於州縣州縣派於里民朕深知此弊於散振催漕看河各欽差大臣官員出京時皆逐一諄諄告誡不令騷擾地方官民但恐陽奉隂違又恐地方官畏懼忽略欽差之愆仍蹈前轍且差去之大臣官員即能潔已自持隨從人役未必盡能遵奉至欽差事畢回京之後督撫或藉欽差公費名色開單分派州縣州縣不敢問其虛實州縣轉派里民里民不敢爭其多寡甚至以科派贏餘或填虧空或充節禮種種弊端深可痛恨著各省督撫於欽差經過之地即將所發上諭大張告示遍諭通衢嗣後欽差務期恪遵訓諭嚴束人役毋得騷擾地方需索餽送如欽差本無需索州縣官藉名私派里民及暗加火耗者著即指名題參至督撫身為大吏尤宜亷潔率屬倘有扶同科派致擾民生者一經察出決不姑貸欽此乾隆二年奏凖凡欽差督撫及一切上司經過地方止許佐二等官於城門驛亭迎送正印各官非有公事傳詢不許輕率出城亦不許蠎衣跪道各學教職率領文武生員迎送一例禁止又議凖欽差上司經過地方各官有意諂媚違例迎送或因事營求或乘便賄賂照諂媚求譽例革職如止違例迎送無營求賄賂等情照擅離職役律罰俸九月若欽差及各上司必欲地方官逺迎逺送並令印官出城迎送致各官畏其威勢違例迎送者如有勒索情弊或被詳揭或經督撫察參照勒索下屬例革職提問如止令迎送無勒索情弊將欽差及各上司照城守官員盡行傳去例罰俸一年地方官皆免議又安置公館呈送下程酒席及供應夫馬車船一切陋規皆嚴行革除如地方官仍有供應及欽差上司仍有勒索者皆照餽送禮物例革職若督撫不行察參照徇情例降二級調用其欽差及各上司隨役家人私自索取本官不知情者照失察衙役犯贓例分别議處如繫知情故縱則與本官求索無異罪坐本官應革職治罪其隨役家人一并交與刑部按律究擬並許被索之人據實詳揭若濫行供應者照濫給例降一級調用倘欽差及各上司因不迎送供應别尋他事中傷者審虛將挾嫌中傷之人降二級調用書役一書役國初定凡在外大小各衙門有侵剋錢糧婪贓遇赦免罪之衙役如復入衙門著役被傍人出首者將復令入役官以知情縱令論革職若有百姓告發或傍人指摘督撫題參降一級留任如非本任內革役不行察出收用者本官降一級調用其不察參之督撫罰俸一年康熙十四年題凖在京部院衙門書辦指稱本司事件犯贓將本犯照律治罪外贓數至十兩以上者將該司官員降一級留任不及十兩者罰俸一年如各員有知情縱令作弊者革職有扶同營私婪贓者照貪官例革職提問又題凖凡正身衙役及額定貼寫幫差之外有白役隨所差衙役嚇詐未經察出之官罰俸六月若官員知繫白役於定數之外濫留應役發牌票差遣公事婪贓纍民按其所犯贓數一兩以下者將本官降一級調用一兩以上者降二級調用十兩以上者革職二十五年題凖衙蠹害民令督撫訪拏司道府州縣等官舉報若司道府州縣等官不報上司照徇庇例降三級調用不行題參之督撫罰俸一年其訪拏衙蠹並贓私數目年終造册題報雍正四年覆凖各衙門考取書辦細加察核毋致有冒籍冒姓頂替諸弊其書役投充時務遵照定例取具確實親供印甘各結方凖著役如無原籍地方官印結者不得收用其年滿送部考職之時各衙門於咨內填寫並無假姓冒籍字樣本部方凖收考若有冒籍冒姓等弊事發本人革去職銜照律治罪其不能稽察之該管官照失察例罰俸六月又覆凖凡額設書役年滿出闕該管官員慎擇僉點取具鄰右及親族並無重役買闕等弊連名保結方凖收録該管官員加具印結申報上司衙門存案如有暗行頂買索取租銀之處將該管官員革職闕主人等按律治罪倘督撫陽奉隂違不除積弊將該督撫照徇庇例降三級調用七年議凖外省府州縣各衙門書役投充務取具並無重役冒充親供互結該地方官加具印結彙造役册申送該管稽察衙門方凖著役每於年終該役出具並無過犯連名互結地方官加具印結申送該管道員衙門如無巡道地方責成守道無道員地方責成按察使令其專管稽察倘有五年役滿不退者將該役斥革治罪或舞文弄法招搖撞騙包攬辭訟侵欺錢糧者該司道訪拏按律治罪府州縣官不行察出照徇情例降二級調用專管司道不行察出失察一二名者罰俸三月失察三四名者罰俸六月失察五名以上者罰俸一年失察十名以上者降一級留任其司道鹽道關差書役責成督撫稽察督撫及總河總漕鹽院書役令各自行稽察如失察者皆照司道例處分書辦有指官撞騙招搖作弊平民畏其本官庇護不敢控告者許赴該管稽察衙門控告事實按律治罪又議凖外省衙門革退書吏將緣事情由及革退日期一并注明詳報督撫一經犯事發覺革前革後不難按册稽核如犯事吏役册上無名將該管官照造册遺漏例議處如規避失察揑稱革役在先犯事在後經督撫察出題參者將該管官革職又議凖在京部院等衙門闕主如仍有潛匿京師及附近州縣地方者事發將該管地方官失察一名者降一級留任二三名者降一級調用四五名者降二級調用六七名以上者革職有能實力奉行拏獲一名者紀録一次二名者紀録二次三名者紀録三次四名以上者加一級至有罪書吏遞回原籍之後仍潛入京師及附京州縣地方者事發亦將該地方官失察一二名者罰俸六月三四名者罰俸一年五六名者降一級調用有能拏獲二名者紀録一次三四名者紀録二次五六名者紀録三次十名以上者加一級八年議凖在外大小各衙門有鄉紳奴僕承充書役者該督撫轉飭該管地方官察明革除取具並無宦僕充當書役印結彚齊送部存案凡充補書役皆確核實非宦僕取具鄰里押結地方官加具印結送上司報部存案倘有實繫宦僕揑稱農民充當其主知而不行首明者照徇庇例降三級調用又遵旨議定各省衙役犯贓本官知情故縱者照縱役犯贓例革職其止於失察實無知情故縱者照在京部院司官之例十兩以上者將該管官降一級留任不及十兩者罰俸一年令各省督撫於題參疏內將本官或繫知情故縱或繫失於覺察詳悉聲明分别議處十一年議凖凡各衙門官員如有聽信請託將役滿及革退書役聽其更易姓名改移籍貫濫凖入册及挂名曠役營求批凖等弊别經發覺如繫役滿革退書役本官明知故縱濫凖入册將該本官照革役復入衙門例革職其役滿革役本官實不知情止繫一時失察凖其承充者降一級調用如繫挂名曠役營求批凖將該本官照徇庇例降三級調用倘前官將役滿革退書役及挂名曠役濫凖承充接任官未經察出揭報經上司察出如繫役滿革退書役將未經察出之接任官降一級調用如繫挂名曠役營求批凖將未經察出之接任官降一級留任十二年議凖各部院衙門役滿書吏於考定職銜後即著五城司坊官限一月內令其回籍倘司坊官將册內有名之人不行催令回籍容留在京城並復行來京潛住將容留之司坊官照容留廢官例按名數分别議處其各部院衙門責革書辦亦交與該司坊官嚴催令於一月內起程回籍並行文本籍地方官嚴行管束如潛住京城將容留之司坊官亦照容留廢官例議處倘實繫失於覺察以致役滿逗遛或業經催令回籍後來京潛住者照失於覺察例罰俸一年其籍隸大宛二縣者令該縣將各役年貌住址三代墳墓造册咨送都察院令該城御史按册確察果繫本京籍貫有墳墓房産可據者仍凖其照例居住其非實在大宛籍貫倘有潛住招搖等弊經該御史察出將濫送册結之知縣照造册舛錯例罰俸一年如該城御史不行察出一經發覺將從前失察之該御史照不行詳察例罰俸六月乾隆元年覆凖在京各衙門書吏額闕務令承充之人報明實在籍貫取具同鄉書吏保結將原籍何處並見在居址地方三代姓氏於結內詳悉聲明該衙門務於十日內即照保結內所開籍貫居址三代姓氏咨行吏部轉行各該省督撫嚴飭該地方官於文到日照例出具印結並取具鄰族人等甘結照各省地方逺近順天府定限四十日直隸奉天山東河南等省定限三月江蘇安徽江西浙江湖北湖南陜西甘肅等省定限四月福建四川廣東廣西雲南貴州等省定限六月務於所定限內將印甘各結咨送到部轉送各該衙門以結到之日凖其著役仍令該督撫飭令該管上司稽察如該地方胥吏人等抑勒遲延不依限出結者除將勒索之書吏計贓治罪外仍將該地方官照失察衙役犯贓例分别議處若繫該地方官抑勒遲延即將該地方官照抑勒遲延例降二級調用如無抑勒情事遲延者仍照事件遲延例議處該管上司不行稽察督催照督催不力例罰俸六月倘有外省書吏揑稱大宛二縣土著之民該地方官不行詳察朦朧出結將濫行出結之地方官照頂冒出結例革職二年議凖各衙門於正額書役並酌增之貼寫幫役外復行多留者降一級留任四年奏凖在京各衙門吏役犯贓該司官員失於覺察及後雖經自行訪出而承辦案件已屬錯誤者仍照例分别議處其有案件並無舛錯而書役在外指騙得贓該司司官能首先訪出究治凖其紀録二次其會同稟究之同司各官亦免其議處五年奏凖在京各部院衙門書吏凡外省府州縣民人充役者若繫各衙門事簡書吏及宗人府律例館供事統俟五年役滿該衙門咨部考職由部彙至三月考試一次考試之後即將該書吏姓名籍貫造册咨送都察院轉交五城司坊官務令一月內回籍取具印結送院存案仍行文該書吏原籍督撫取具地方官到籍日期印結送院備案至內閣即用供事及各部院衙門繁闕即用書吏亦於役滿之後該衙門出具考語咨送到部掣定職銜照例行文該衙門飭令回籍其中有情願簡選人員該書吏呈明本衙門咨送到部照例三月簡選一次簡選之後亦即將該書吏姓名籍貫造册咨送都察院轉交五城司坊官亦限一月內令其回籍欽定大清會典則例卷十四
